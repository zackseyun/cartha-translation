id: 1SA.19.6
reference: 1 Samuel 19:6
source:
  edition: WLC
  text: וַ/יִּשְׁמַ֥ע שָׁא֖וּל בְּ/ק֣וֹל יְהוֹנָתָ֑ן וַ/יִּשָּׁבַ֣ע שָׁא֔וּל חַי יְהוָ֖ה
    אִם יוּמָֽת־־׃
translation:
  text: Saul listened to Jonathan’s voice, and Saul swore, “As the LORD lives, he
    shall not be put to death.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew oath formula: ''As the LORD lives, if he is put to death ...'' The
      particle ''if'' here is elliptical and conveys a strong negation: ''he shall
      certainly not be put to death.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁמַע
  chosen: listened
  alternatives:
  - heard
  lexicon: HALOT
  rationale: The verb שׁמע can mean either 'hear' or 'listen/heed.' In context Saul
    is not merely perceiving sound but heeding Jonathan's appeal, so 'listened' best
    captures the responsive sense.
- source_word: בְּקוֹל
  chosen: to Jonathan’s voice
  alternatives:
  - to Jonathan
  - to the voice of Jonathan
  lexicon: HALOT
  rationale: The idiom שׁמע בקול commonly means 'listen to/obey the voice of.' Rendering
    'to Jonathan’s voice' preserves the Hebrew expression while remaining natural
    English.
- source_word: וַיִּשָּׁבַע
  chosen: swore
  alternatives:
  - took an oath
  - made an oath
  lexicon: HALOT
  rationale: The verb means to swear or take an oath. 'Swore' is concise, idiomatic,
    and fits the direct-speech formula that follows.
- source_word: חַי יְהוָה
  chosen: As the LORD lives
  alternatives:
  - By the life of the LORD
  - The LORD lives
  lexicon: HALOT
  rationale: This is the standard Hebrew oath formula. 'As the LORD lives' is the
    most natural English equivalent and preserves the solemn force of the oath. Per
    doctrine, יְהוָה is rendered 'the LORD.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: The project default for the divine name is 'the LORD,' following the
    doctrinal guidance and established covenant-name convention.
- source_word: אִם יוּמָת
  chosen: he shall not be put to death
  alternatives:
  - surely he will not die
  - if he is put to death
  lexicon: HALOT
  rationale: In oath contexts אִם can function elliptically with an implied negation,
    yielding the sense 'surely not.' The Hophil of מות is causative/passive, 'be put
    to death,' not merely 'die.' The translation makes the oath's intended meaning
    explicit in idiomatic English.
