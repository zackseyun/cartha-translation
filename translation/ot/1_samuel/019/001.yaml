id: 1SA.19.1
reference: 1 Samuel 19:1
source:
  edition: WLC
  text: וַ/יְדַבֵּ֣ר שָׁא֗וּל אֶל יוֹנָתָ֤ן בְּנ/וֹ֙ וְ/אֶל כָּל עֲבָדָ֔י/ו לְ/הָמִ֖ית
    אֶת דָּוִ֑ד וִ/יהֽוֹנָתָן֙ בֶּן שָׁא֔וּל חָפֵ֥ץ בְּ/דָוִ֖ד מְאֹֽד־־־־־׃
translation:
  text: Saul spoke to Jonathan his son and to all his servants about putting David
    to death, but Jonathan son of Saul delighted greatly in David.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'to kill David.' The Hebrew verb is causative ('put to death'), but
      in context the sense is straightforwardly that Saul was speaking of David's
      death.
    reason: lexical_alternative
  - marker: b
    text: Or, 'was very fond of David' or 'loved David greatly.' The Hebrew says Jonathan
      'took great delight in' David.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְדַבֵּר
  chosen: spoke
  alternatives:
  - said
  - told
  lexicon: HALOT
  rationale: The verb דבר in the waw-consecutive narrative form is naturally rendered
    'spoke.' 'Told' would over-specify direct command, while the following infinitive
    phrase supplies the content of the speech.
- source_word: אֶל
  chosen: to
  alternatives:
  - with
  lexicon: HALOT
  rationale: 'Standard directional/object marker after דבר: Saul spoke ''to'' Jonathan
    and the servants.'
- source_word: עֲבָדָיו
  chosen: his servants
  alternatives:
  - his officials
  - his attendants
  lexicon: HALOT
  rationale: In a royal court context, עבד can denote royal servants/officials. 'Servants'
    preserves the Hebrew term more transparently, while remaining natural English.
- source_word: לְהָמִית אֶת דָּוִד
  chosen: about putting David to death
  alternatives:
  - to kill David
  - about killing David
  lexicon: HALOT
  rationale: The infinitive construct with ל expresses the content/purpose of Saul's
    speech. 'Putting David to death' captures the causative nuance of המית while reading
    naturally in English. 'To kill David' is possible but slightly flatter.
- source_word: וִיהוֹנָתָן
  chosen: but Jonathan
  alternatives:
  - and Jonathan
  - now Jonathan
  lexicon: HALOT
  rationale: The conjunction introduces a contrast between Saul's intent and Jonathan's
    disposition toward David. Rendering waw as 'but' reflects the discourse function
    in English.
- source_word: חָפֵץ בְּדָוִד מְאֹד
  chosen: delighted greatly in David
  alternatives:
  - was very fond of David
  - took great pleasure in David
  - loved David greatly
  lexicon: HALOT
  rationale: חפץ denotes taking pleasure in, delighting in, or desiring. 'Delighted
    greatly in David' preserves the positive affection without importing the stronger
    covenantal language of אהב ('love'), which appears elsewhere for Jonathan and
    David. מְאֹד is represented by 'greatly.'
- source_word: בְּנוֹ / בֶּן שָׁאוּל
  chosen: his son / son of Saul
  alternatives:
  - his own son / Saul's son
  lexicon: HALOT
  rationale: Both filial expressions are retained to mirror the Hebrew apposition
    and maintain narrative clarity.
