id: 1SA.19.10
reference: 1 Samuel 19:10
source:
  edition: WLC
  text: וַ/יְבַקֵּ֨שׁ שָׁא֜וּל לְ/הַכּ֤וֹת בַּֽ/חֲנִית֙ בְּ/דָוִ֣ד וּ/בַ/קִּ֔יר וַ/יִּפְטַר֙
    מִ/פְּנֵ֣י שָׁא֔וּל וַ/יַּ֥ךְ אֶֽת הַ/חֲנִ֖ית בַּ/קִּ֑יר וְ/דָוִ֛ד נָ֥ס וַ/יִּמָּלֵ֖ט
    בַּ/לַּ֥יְלָה הֽוּא־׃פ
translation:
  text: Saul sought to pin David to the wall with the spear, but he slipped away from
    Saul’s presence, and he drove the spear into the wall. Then David fled and escaped
    that night.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'to strike with the spear at David and at the wall'; the sense
      is that Saul meant to pin David to the wall with the spear.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְבַקֵּשׁ
  chosen: sought
  alternatives:
  - tried
  - attempted
  lexicon: HALOT
  rationale: The verb בקש commonly means 'seek' or 'attempt.' In this narrative context,
    'sought' preserves the Hebrew wording while naturally conveying hostile intent.
- source_word: לְהַכּוֹת
  chosen: to pin
  alternatives:
  - to strike
  - to smite
  - to hit
  lexicon: HALOT
  rationale: Literally the infinitive of נכה is 'to strike.' Because the phrase includes
    both David and the wall ('with the spear, in/against David and the wall'), the
    idiomatic sense is that Saul intended to strike David so as to fasten him to the
    wall. 'Pin' captures the resulting force implied by the construction better than
    a bare 'strike.'
- source_word: בַּחֲנִית
  chosen: with the spear
  alternatives:
  - by the spear
  lexicon: HALOT
  rationale: 'The preposition ב here is instrumental: Saul uses the spear as the weapon.'
- source_word: בְּדָוִד וּבַקִּיר
  chosen: David to the wall
  alternatives:
  - David and the wall
  - David against the wall
  lexicon: HALOT
  rationale: The Hebrew is compressed and somewhat idiomatic. A formally wooden rendering
    ('strike David and the wall with the spear') obscures the sense. 'Pin David to
    the wall' expresses the intended relation between the two objects while remaining
    faithful to the scene.
- source_word: וַיִּפְטַר
  chosen: he slipped away
  alternatives:
  - he freed himself
  - he escaped
  - he got away
  lexicon: HALOT
  rationale: The verb פטר in this stem conveys breaking free or getting away. 'Slipped
    away' fits the sudden evasive movement in context.
- source_word: מִפְּנֵי שָׁאוּל
  chosen: from Saul’s presence
  alternatives:
  - from before Saul
  - from Saul
  lexicon: HALOT
  rationale: Literally 'from the face/presence of Saul.' 'From Saul’s presence' preserves
    the Hebrew idiom more closely than simply 'from Saul,' while remaining readable.
- source_word: וַיַּךְ אֶת־הַחֲנִית בַּקִּיר
  chosen: he drove the spear into the wall
  alternatives:
  - he struck the spear into the wall
  - the spear struck the wall
  lexicon: HALOT
  rationale: 'The subject remains Saul. The clause describes the result of David''s
    evasion: Saul''s blow lodged the spear in the wall. ''Drove ... into'' is natural
    English and reflects the force of נכה in context.'
- source_word: נָס
  chosen: fled
  alternatives:
  - ran away
  lexicon: HALOT
  rationale: A standard narrative verb for flight; 'fled' is concise and appropriately
    serious.
- source_word: וַיִּמָּלֵט
  chosen: escaped
  alternatives:
  - got away
  - was delivered
  lexicon: HALOT
  rationale: מלט often means 'escape' or 'be delivered.' Here the immediate narrative
    sense is physical escape.
- source_word: בַּלַּיְלָה הוּא
  chosen: that night
  alternatives:
  - in that night
  - during that night
  lexicon: HALOT
  rationale: The phrase is idiomatic in Hebrew narrative. 'That night' is the most
    natural English equivalent.
