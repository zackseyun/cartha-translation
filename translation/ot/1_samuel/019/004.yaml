id: 1SA.19.4
reference: 1 Samuel 19:4
source:
  edition: WLC
  text: וַ/יְדַבֵּ֨ר יְהוֹנָתָ֤ן בְּ/דָוִד֙ ט֔וֹב אֶל שָׁא֖וּל אָבִ֑י/ו וַ/יֹּ֣אמֶר
    אֵ֠לָי/ו אַל יֶחֱטָ֨א הַ/מֶּ֜לֶךְ בְּ/עַבְדּ֣/וֹ בְ/דָוִ֗ד כִּ֣י ל֤וֹא חָטָא֙
    לָ֔/ךְ וְ/כִ֥י מַעֲשָׂ֖י/ו טוֹב לְ/ךָ֥ מְאֹֽד־־־׃
translation:
  text: Jonathan spoke well of David to Saul his father, and said to him, “Let not
    the king sin against his servant, against David, because he has not sinned against
    you, and because his deeds have been very good for you.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'spoke favorably about David.' The Hebrew idiom literally says 'spoke
      good concerning David.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'Let not the king sin against his servant, against David' repeats
      the object for emphasis.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְדַבֵּר ... טוֹב
  chosen: spoke well of
  alternatives:
  - spoke good concerning
  - spoke favorably about
  lexicon: HALOT
  rationale: The idiom דִּבֶּר בְּ... טוֹב means to speak favorably about someone,
    not merely to speak 'good' in a wooden sense. 'Spoke well of' is natural English
    and preserves the positive advocacy Jonathan makes for David.
- source_word: בְּדָוִד
  chosen: of David
  alternatives:
  - about David
  - concerning David
  lexicon: HALOT
  rationale: With דבר plus ב, the preposition marks the person spoken about. 'Of David'
    fits the English idiom 'spoke well of David'.
- source_word: אֶל שָׁאוּל אָבִיו
  chosen: to Saul his father
  alternatives:
  - to his father Saul
  lexicon: HALOT
  rationale: Both are possible in English. 'To Saul his father' stays close to the
    Hebrew order while remaining readable.
- source_word: אַל יֶחֱטָא
  chosen: Let not ... sin
  alternatives:
  - Do not let ... sin
  - Must not sin
  lexicon: HALOT
  rationale: The jussive with אַל expresses prohibition. 'Let not the king sin' preserves
    the formal force and courtly tone better than a flatter imperative.
- source_word: הַמֶּלֶךְ
  chosen: the king
  alternatives:
  - my lord the king
  lexicon: HALOT
  rationale: The Hebrew has simply 'the king,' likely as respectful third-person self-reference
    in direct address. The translation keeps the explicit title without adding 'my
    lord,' which is not present.
- source_word: בְּעַבְדּוֹ
  chosen: against his servant
  alternatives:
  - against his servant David
  - with respect to his servant
  lexicon: HALOT
  rationale: With חטא plus ב, the sense is to sin against someone. 'His servant' reflects
    Jonathan's deferential description of David in relation to Saul.
- source_word: בְדָוִד
  chosen: against David
  alternatives:
  - namely, David
  - toward David
  lexicon: HALOT
  rationale: 'The repeated preposition plus name appositionally clarifies who ''his
    servant'' is. Rendering both phrases preserves the emphasis: ''against his servant,
    against David.'''
- source_word: כִּי לֹא חָטָא לָךְ
  chosen: because he has not sinned against you
  alternatives:
  - for he did not sin against you
  - because he has done you no wrong
  lexicon: HALOT
  rationale: This gives the causal force of כִּי and keeps the same root 'sin' used
    earlier, preserving the rhetorical contrast between Saul sinning against David
    and David not sinning against Saul.
- source_word: וְכִי
  chosen: and because
  alternatives:
  - indeed
  - for
  lexicon: HALOT
  rationale: Here וְכִי introduces a second supporting reason. 'And because' best
    reflects the cumulative argument Jonathan is making.
- source_word: מַעֲשָׂיו
  chosen: his deeds
  alternatives:
  - his actions
  - what he has done
  lexicon: HALOT
  rationale: '''His deeds'' is concise and suitably weighty, matching the plural noun
    referring to David''s conduct.'
- source_word: טוֹב לְךָ מְאֹד
  chosen: have been very good for you
  alternatives:
  - have benefited you greatly
  - have been exceedingly good to you
  lexicon: HALOT
  rationale: The phrase speaks of David's actions as beneficial to Saul. 'Very good
    for you' is close to the Hebrew while still idiomatic in English.
