id: 1SA.19.11
reference: 1 Samuel 19:11
source:
  edition: WLC
  text: וַ/יִּשְׁלַח֩ שָׁא֨וּל מַלְאָכִ֜ים אֶל בֵּ֤ית דָּוִד֙ לְ/שָׁמְר֔/וֹ וְ/לַ/הֲמִית֖/וֹ
    בַּ/בֹּ֑קֶר וַ/תַּגֵּ֣ד לְ/דָוִ֗ד מִיכַ֤ל אִשְׁתּ/וֹ֙ לֵ/אמֹ֔ר אִם אֵ֨ינְ/ךָ֜
    מְמַלֵּ֤ט אֶֽת נַפְשְׁ/ךָ֙ הַ/לַּ֔יְלָה מָחָ֖ר אַתָּ֥ה מוּמָֽת־־־׃
translation:
  text: Then Saul sent messengers to David’s house to watch him and to kill him in
    the morning. But Michal his wife told David, saying, “If you do not save your
    life tonight, tomorrow you will be killed.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “If you do not escape with your life tonight, tomorrow you will be put
      to death.”
    reason: lexical_alternative
lexical_decisions:
- source_word: מַלְאָכִים
  chosen: messengers
  alternatives:
  - agents
  - envoys
  lexicon: HALOT
  rationale: In this narrative context the word refers to human emissaries sent by
    Saul, not angels. 'Messengers' is the most natural and standard English rendering.
- source_word: לְשָׁמְרוֹ
  chosen: to watch him
  alternatives:
  - to guard him
  - to keep watch over him
  lexicon: HALOT
  rationale: The infinitive of שׁמר here describes surveillance outside David’s house
    in order to seize him. 'Watch him' best fits the hostile monitoring context better
    than the more protective-sounding 'guard him'.
- source_word: וְלַהֲמִיתוֹ
  chosen: to kill him
  alternatives:
  - to put him to death
  lexicon: HALOT
  rationale: The Hiphil of מות means to cause to die/put to death. 'Kill him' is direct,
    clear modern English and fits the immediate assassination plot.
- source_word: בַּבֹּקֶר
  chosen: in the morning
  alternatives:
  - at morning
  - by morning
  lexicon: HALOT
  rationale: Temporal phrase indicating the intended time of the killing. 'In the
    morning' is idiomatic English.
- source_word: וַתַּגֵּד
  chosen: told
  alternatives:
  - reported to
  - informed
  lexicon: HALOT
  rationale: The verb נגד introduces Michal’s warning to David. 'Told' is simple and
    natural, while the following direct speech carries the force of the warning.
- source_word: מִיכַל אִשְׁתּוֹ
  chosen: Michal his wife
  alternatives:
  - his wife Michal
  lexicon: HALOT
  rationale: This preserves the Hebrew appositional structure and clearly identifies
    Michal’s relationship to David.
- source_word: מְמַלֵּט אֶת־נַפְשְׁךָ
  chosen: save your life
  alternatives:
  - escape with your life
  - deliver yourself
  lexicon: HALOT
  rationale: The idiom literally involves delivering one's life/self. 'Save your life'
    is concise, idiomatic, and preserves the urgency of mortal danger.
- source_word: הַלַּיְלָה
  chosen: tonight
  alternatives:
  - this night
  lexicon: HALOT
  rationale: With the article and temporal force, the sense is the present night.
    'Tonight' is natural modern English.
- source_word: מוּמָת
  chosen: you will be killed
  alternatives:
  - you will surely die
  - you will be put to death
  lexicon: HALOT
  rationale: The passive participial form here predicts David’s death at the hands
    of Saul’s agents. 'You will be killed' makes the passive and the human agency
    clear in context, whereas 'you will surely die' could sound less specific.
