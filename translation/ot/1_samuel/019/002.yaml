id: 1SA.19.2
reference: 1 Samuel 19:2
source:
  edition: WLC
  text: וַ/יַּגֵּ֤ד יְהוֹנָתָן֙ לְ/דָוִ֣ד לֵ/אמֹ֔ר מְבַקֵּ֛שׁ שָׁא֥וּל אָבִ֖/י לַ/הֲמִיתֶ֑/ךָ
    וְ/עַתָּה֙ הִשָּֽׁמֶר נָ֣א בַ/בֹּ֔קֶר וְ/יָשַׁבְתָּ֥ בַ/סֵּ֖תֶר וְ/נַחְבֵּֽאתָ־׃
translation:
  text: Jonathan told David, saying, “Saul my father is seeking to kill you. So now,
    please be on your guard in the morning, and stay in a hidden place and hide yourself.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'remain in secret' / 'stay in hiding.' The Hebrew combines 'stay' with
      a noun meaning 'secret' or 'hiding place,' followed by 'hide yourself' for emphasis.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּגֵּד
  chosen: told
  alternatives:
  - reported
  - informed
  lexicon: HALOT
  rationale: The Hiphil of נגד commonly means to tell or declare. 'Told' is natural
    modern English and fits direct speech introduction without overstating formality.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - and said
  - ':'
  lexicon: HALOT
  rationale: Retained as 'saying' to reflect the Hebrew speech-introduction formula
    while keeping readable English.
- source_word: מְבַקֵּשׁ
  chosen: is seeking
  alternatives:
  - seeks
  - is trying
  lexicon: HALOT
  rationale: The participle conveys ongoing or current intent. 'Is seeking' preserves
    the progressive force better than a simple present and avoids overinterpreting
    as an attempt already underway.
- source_word: לַהֲמִיתֶךָ
  chosen: to kill you
  alternatives:
  - to put you to death
  lexicon: HALOT
  rationale: מות in the Hiphil means to cause to die, here idiomatically 'kill.' 'Put
    you to death' could imply formal execution, which the context does not require.
- source_word: הִשָּׁמֶר נָא
  chosen: please be on your guard
  alternatives:
  - please watch yourself
  - please take care
  - guard yourself, please
  lexicon: HALOT
  rationale: 'The Niphal imperative of שמר here is reflexive/passive in force: take
    care, guard yourself. ''Be on your guard'' is idiomatic and suits the danger context;
    נָא is reflected by ''please.'''
- source_word: בַבֹּקֶר
  chosen: in the morning
  alternatives:
  - by morning
  - tomorrow morning
  lexicon: HALOT
  rationale: The phrase most straightforwardly means 'in the morning.' 'Tomorrow morning'
    is possible by context but adds specificity not explicit in the Hebrew.
- source_word: וְיָשַׁבְתָּ
  chosen: stay
  alternatives:
  - remain
  - sit
  lexicon: HALOT
  rationale: ישב literally means 'sit' or 'dwell/remain.' In this context of concealment,
    'stay' communicates the intended sense in natural English better than the overly
    literal 'sit.'
- source_word: בַסֵּתֶר
  chosen: in a hidden place
  alternatives:
  - in secret
  - in hiding
  - in a secret place
  lexicon: HALOT
  rationale: סֵתֶר denotes a hiding place, secrecy, or cover. 'In a hidden place'
    preserves the locative sense and avoids making it purely abstract.
- source_word: וְנַחְבֵּאתָ
  chosen: hide yourself
  alternatives:
  - keep yourself hidden
  - conceal yourself
  lexicon: HALOT
  rationale: The verb חבא means to hide oneself. 'Hide yourself' is direct and preserves
    the reflexive sense; paired with the previous clause it intensifies the instruction
    rather than merely repeating it.
- source_word: יְהוֹנָתָן ... לְדָוִד ... שָׁאוּל אָבִי
  chosen: Jonathan ... David ... Saul my father
  rationale: Personal names are transliterated per project philosophy. 'My father'
    is retained explicitly because the possessive is part of Jonathan's speech and
    heightens the personal tension of the warning.
