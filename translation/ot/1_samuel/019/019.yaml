id: 1SA.19.19
reference: 1 Samuel 19:19
source:
  edition: WLC
  text: וַ/יֻּגַּ֥ד לְ/שָׁא֖וּל לֵ/אמֹ֑ר הִנֵּ֣ה דָוִ֔ד ב/נוית בָּ/רָמָֽה׃
translation:
  text: And it was reported to Saul, saying, “Look, David is at Naioth in Ramah.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Behold, David is in Naioth at Ramah.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֻּגַּד
  chosen: it was reported
  alternatives:
  - it was told
  - word was brought
  lexicon: HALOT
  rationale: Passive/narrative form of נגד indicates information being made known
    to Saul without specifying the agent. 'It was reported' preserves the passive
    sense in natural English.
- source_word: לְשָׁאוּל
  chosen: to Saul
  lexicon: HALOT
  rationale: Standard indirect object with proper name; transliterated personal name
    per project philosophy.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - that
  lexicon: HALOT
  rationale: Common quotative infinitive introducing the content of the report. 'Saying'
    keeps the Hebrew discourse structure more transparently than a fully smoothed
    'that' clause.
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: Deictic particle drawing attention to the reported fact. 'Look' is readable
    modern English and preserves the immediacy better than archaic 'Behold.'
- source_word: דָוִד
  chosen: David
  lexicon: HALOT
  rationale: Standard English transliteration of the personal name.
- source_word: בְּנוָיֹת
  chosen: at Naioth
  alternatives:
  - in Naioth
  lexicon: HALOT
  rationale: Proper place name. The preposition ב can be rendered 'at' or 'in'; 'at
    Naioth' reads naturally for a named location while preserving the locative sense.
- source_word: בָּרָמָה
  chosen: in Ramah
  lexicon: HALOT
  rationale: Locative phrase identifying the broader place where Naioth is situated.
    'In Ramah' is the natural English rendering.
