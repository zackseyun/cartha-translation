id: 1SA.19.13
reference: 1 Samuel 19:13
source:
  edition: WLC
  text: וַ/תִּקַּ֨ח מִיכַ֜ל אֶת הַ/תְּרָפִ֗ים וַ/תָּ֨שֶׂם֙ אֶל הַ/מִּטָּ֔ה וְ/אֵת֙
    כְּבִ֣יר הָֽ/עִזִּ֔ים שָׂ֖מָה מְרַֽאֲשֹׁתָ֑י/ו וַ/תְּכַ֖ס בַּ/בָּֽגֶד־־׃ס
translation:
  text: Then Michal took the household idol and laid it on the bed, and she put a
    quilt of goats’ hair at its head and covered it with the garment.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the teraphim,' 'the household gods,' or 'the image.' The Hebrew term
      refers to household cult objects; here it appears to function as a single figure
      in the bed.
    reason: lexical_alternative
  - marker: b
    text: The exact meaning of the Hebrew expression is uncertain; it may refer to
      a woven goats’ hair covering, net, pillow, or similar item placed at the head.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַתְּרָפִים
  chosen: the household idol
  alternatives:
  - the teraphim
  - the household gods
  - the image
  lexicon: HALOT
  rationale: תְּרָפִים refers to household cult objects/idols. Since the term is not
    transparent to modern readers, 'household idol' communicates the sense better
    than a transliteration. Singular English is used because the following singular
    pronominal reference ('its head') suggests the object is functioning here as a
    single figure placed in the bed, even though the Hebrew form is morphologically
    plural.
- source_word: אֶל הַמִּטָּה
  chosen: on the bed
  alternatives:
  - into the bed
  - onto the couch
  lexicon: HALOT
  rationale: Although אֶל often means 'to' or 'into,' with שׂוּם in this context the
    idiomatic sense is placement on the bed as part of the deception scene.
- source_word: כְּבִיר הָעִזִּים
  chosen: a quilt of goats’ hair
  alternatives:
  - a net of goats' hair
  - a cover of goats' hair
  - a pillow of goats' hair
  lexicon: HALOT
  rationale: כְּבִיר is a difficult and relatively rare term. In context it denotes
    some woven or thick textile item made of goats' hair placed at the head to simulate
    hair or a head covering. 'Quilt' is a readable rendering that conveys a substantial
    fabric object without overclaiming precision; alternatives are preserved in a
    footnote because the exact item is uncertain.
- source_word: מְרַאֲשֹׁתָיו
  chosen: at its head
  alternatives:
  - at his head
  - by the head place
  lexicon: HALOT
  rationale: The noun refers to the place at the head/headrest area. English 'at its
    head' fits the immediate referent, the idol/image in the bed. 'His head' is possible
    if the narrator is speaking from the perspective of the disguised David, but the
    nearer grammatical referent in English is the object she arranged.
- source_word: בַּבָּגֶד
  chosen: with the garment
  alternatives:
  - with a garment
  - with the cloak
  - with the covering
  lexicon: HALOT
  rationale: בֶּגֶד is a general term for garment or clothing. The article supports
    'the garment,' likely a specific covering used in the scene. 'Cloak' is possible
    but too specific without clearer warrant.
- source_word: וַתְּכַס
  chosen: covered
  alternatives:
  - concealed
  - spread over
  lexicon: HALOT
  rationale: The verb כסה straightforwardly means 'cover.' This preserves the concrete
    action in the deception.
