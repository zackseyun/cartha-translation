id: 1SA.19.15
reference: 1 Samuel 19:15
source:
  edition: WLC
  text: וַ/יִּשְׁלַ֤ח שָׁאוּל֙ אֶת הַ/מַּלְאָכִ֔ים לִ/רְא֥וֹת אֶת דָּוִ֖ד לֵ/אמֹ֑ר
    הַעֲל֨וּ אֹת֧/וֹ בַ/מִּטָּ֛ה אֵלַ֖/י לַ/הֲמִתֽ/וֹ־־׃
translation:
  text: Then Saul sent the messengers to see David, saying, “Bring him up to me in
    the bed, so that I may put him to death.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “on the bed” or “with the bed.” The Hebrew preposition can be understood
      in more than one way; Saul's command likely means that David was to be carried
      as he lay.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלַח
  chosen: Then Saul sent
  alternatives:
  - And Saul sent
  - So Saul sent
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then' gives natural English
    narrative flow while preserving sequence.
- source_word: הַמַּלְאָכִים
  chosen: the messengers
  alternatives:
  - the agents
  - the envoys
  lexicon: HALOT
  rationale: מַלְאָךְ commonly means 'messenger.' In this court narrative it refers
    to Saul's dispatched men, not supernatural angels, so 'messengers' is the clearest
    rendering.
- source_word: לִרְאוֹת
  chosen: to see
  alternatives:
  - to look for
  - to inspect
  lexicon: HALOT
  rationale: The infinitive of ראה is literally 'to see.' Here it likely means to
    check on or verify David's condition/presence, but 'to see' preserves the Hebrew
    wording without over-interpreting.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - with orders
  - telling them
  lexicon: HALOT
  rationale: Standard rendering of the infinitive introducing direct speech. 'Saying'
    keeps the formal link to the quoted command.
- source_word: הַעֲלוּ
  chosen: Bring ... up
  alternatives:
  - carry ... up
  - bring
  lexicon: HALOT
  rationale: עלה in the Hiphil means 'cause to go up/bring up.' Because David is apparently
    bedridden, English 'bring him up' communicates the command while retaining the
    directional nuance.
- source_word: בַמִּטָּה
  chosen: in the bed
  alternatives:
  - on the bed
  - with the bed
  lexicon: HALOT
  rationale: The preposition ב can be rendered several ways here. Given the context—David
    is thought to be lying there and Saul wants him transported as he is—'in the bed'
    best reflects the image of bringing him while still in it.
- source_word: אֵלַי
  chosen: to me
  alternatives:
  - before me
  lexicon: HALOT
  rationale: 'Direct first-person destination: Saul wants David brought into his presence.
    ''To me'' is the straightforward rendering.'
- source_word: לַהֲמִתוֹ
  chosen: so that I may put him to death
  alternatives:
  - to kill him
  - that I may kill him
  lexicon: HALOT
  rationale: The infinitive construct with ל expresses purpose. 'Put him to death'
    is idiomatic, grave, and slightly more formal than 'kill him,' fitting the royal
    command.
