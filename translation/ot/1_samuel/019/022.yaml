id: 1SA.19.22
reference: 1 Samuel 19:22
source:
  edition: WLC
  text: וַ/יֵּ֨לֶךְ גַּם ה֜וּא הָ/רָמָ֗תָ/ה וַ/יָּבֹא֙ עַד בּ֤וֹר הַ/גָּדוֹל֙ אֲשֶׁ֣ר
    בַּ/שֶּׂ֔כוּ וַ/יִּשְׁאַ֣ל וַ/יֹּ֔אמֶר אֵיפֹ֥ה שְׁמוּאֵ֖ל וְ/דָוִ֑ד וַ/יֹּ֕אמֶר
    הִנֵּ֖ה ב/נוית בָּ/רָמָֽה־־׃
translation:
  text: He too went to Ramah, and he came as far as the great well that is at Seku.
    He asked, saying, “Where are Samuel and David?” And one said, “Look, they are
    at Naioth in Ramah.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the large cistern' or 'the great pit' for 'the great well' (בּוֹר הַגָּדוֹל).
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'And he said'; the subject of the reply is unspecified, so the translation
      supplies 'one' for clarity.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָרָמָתָה
  chosen: to Ramah
  alternatives:
  - Ramahward
  lexicon: HALOT
  rationale: Directional he locale on the place name indicates motion toward Ramah.
    Natural English is 'to Ramah.'
- source_word: בּוֹר הַגָּדוֹל
  chosen: the great well
  alternatives:
  - the large cistern
  - the great pit
  lexicon: HALOT
  rationale: בּוֹר can denote a pit, cistern, or well depending on context. Here it
    functions as a known landmark on the route, and 'well' is the most natural rendering
    in context, while preserving the sense of a water source or excavation.
- source_word: בַּשֶּׂכוּ
  chosen: at Seku
  alternatives:
  - in Seku
  lexicon: HALOT
  rationale: Proper place name; transliterated per translation philosophy. The preposition
    with the article is best rendered idiomatically as location, 'at Seku.'
- source_word: וַיִּשְׁאַל וַיֹּאמֶר
  chosen: He asked, saying
  alternatives:
  - He inquired and said
  - He asked
  lexicon: HALOT
  rationale: The paired verbs mark inquiry followed by direct speech. 'He asked, saying'
    preserves the Hebrew sequence without sounding overly wooden.
- source_word: אֵיפֹה
  chosen: Where are
  alternatives:
  - Where is
  lexicon: HALOT
  rationale: Although the interrogative itself is simply 'where,' English requires
    agreement with the compound subject 'Samuel and David,' hence 'Where are.'
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: Introduces the answer with deictic force. 'Look' is readable modern English
    and preserves the attention-directing function better than archaic 'Behold.'
- source_word: בנוית
  chosen: at Naioth
  alternatives:
  - in Naioth
  lexicon: HALOT
  rationale: Proper place name, likely the settlement or lodgings called Naioth. Transliteration
    is preferred for names. 'At' fits English idiom for location.
- source_word: בָּרָמָה
  chosen: in Ramah
  alternatives:
  - at Ramah
  lexicon: HALOT
  rationale: Locative phrase specifying the Naioth associated with Ramah. 'In Ramah'
    is the most natural English expression here.
- source_word: וַיֹּאמֶר
  chosen: And one said
  alternatives:
  - And he said
  - And someone said
  lexicon: HALOT
  rationale: Hebrew uses singular 'and he said' without explicit subject, but English
    benefits from an indefinite subject since the responder is unspecified. 'One said'
    preserves the anonymity without adding much interpretation.
