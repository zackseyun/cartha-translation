id: 1SA.19.8
reference: 1 Samuel 19:8
source:
  edition: WLC
  text: וַ/תּ֥וֹסֶף הַ/מִּלְחָמָ֖ה לִֽ/הְי֑וֹת וַ/יֵּצֵ֨א דָוִ֜ד וַ/יִּלָּ֣חֶם בַּ/פְּלִשְׁתִּ֗ים
    וַ/יַּ֤ךְ בָּ/הֶם֙ מַכָּ֣ה גְדוֹלָ֔ה וַ/יָּנֻ֖סוּ מִ/פָּנָֽי/ו׃
translation:
  text: And the war broke out again, and David went out and fought against the Philistines
    and struck them with a great blow, so that they fled before him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the war continued' / 'there was war again.' The Hebrew idiom literally
      says 'the war added to be,' expressing renewed or continued warfare.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתּוֹסֶף הַמִּלְחָמָה לִהְיוֹת
  chosen: the war broke out again
  alternatives:
  - the war continued
  - there was war again
  lexicon: HALOT
  rationale: The idiom with יסף + infinitive of היה expresses recurrence/resumption
    ('the war added to be' = 'the war happened again'). 'Broke out again' is natural
    modern English and captures renewed hostilities better than the more wooden 'the
    war continued to be.'
- source_word: וַיֵּצֵא דָוִד
  chosen: David went out
  alternatives:
  - David went out to battle
  - David went out [from Saul's presence]
  lexicon: HALOT
  rationale: יצא literally means 'went out.' The military context implies going out
    to battle, but the object is left unstated in Hebrew, so the simpler rendering
    preserves the source wording while allowing the context to supply the military
    sense.
- source_word: וַיִּלָּחֶם בַּפְּלִשְׁתִּים
  chosen: fought against the Philistines
  alternatives:
  - fought with the Philistines
  lexicon: HALOT
  rationale: The verb לחם in this stem means 'to fight/do battle,' and with ב here
    denotes hostile engagement. In English, 'fought against' avoids ambiguity that
    'fought with' could suggest alliance.
- source_word: וַיַּךְ בָּהֶם מַכָּה גְדוֹלָה
  chosen: struck them with a great blow
  alternatives:
  - dealt them a great defeat
  - struck them down with a great slaughter
  lexicon: HALOT
  rationale: נכה plus מכה is a common Hebrew collocation for inflicting a severe defeat/blow.
    'Struck them with a great blow' stays close to the Hebrew image without over-specifying
    casualties. 'Great defeat' is possible but slightly more interpretive.
- source_word: וַיָּנֻסוּ מִפָּנָיו
  chosen: they fled before him
  alternatives:
  - they fled from before him
  - they fled from him
  lexicon: HALOT
  rationale: The idiom מפני means 'from before/from the presence of.' 'Fled before
    him' is idiomatic biblical English and preserves the sense of retreat in David's
    presence.
