theological_decisions:
- issue: Whether רוּחַ אֱלֹהִים should be rendered with capitalized 'Spirit' or lower-case
    'spirit'
  chosen_reading: the Spirit of God
  alternative_readings:
  - the spirit of God
  rationale: In the Saul narrative, this phrase regularly denotes a divine empowering
    influence from God rather than a mere disposition. Capitalization in English helps
    signal that likely referent while not adding doctrinal content beyond the narrative
    context.
  doctrine_reference: Translation philosophy §1, §3
- issue: How to render Saul's prophetic activity without overdefining it
  chosen_reading: prophesying
  alternative_readings:
  - behaving like a prophet
  - in prophetic frenzy
  rationale: The text states that Saul 'prophesied' but does not specify the exact
    mode. Rendering it simply as 'prophesying' preserves the textual wording and theological
    tension rather than importing a narrower psychological or cultic explanation.
  doctrine_reference: Translation philosophy §3
