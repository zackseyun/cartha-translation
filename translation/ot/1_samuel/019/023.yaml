id: 1SA.19.23
reference: 1 Samuel 19:23
source:
  edition: WLC
  text: וַ/יֵּ֣לֶךְ שָׁ֔ם אֶל נוית בָּ/רָמָ֑ה וַ/תְּהִי֩ עָלָ֨י/ו גַּם ה֜וּא ר֣וּחַ
    אֱלֹהִ֗ים וַ/יֵּ֤לֶךְ הָלוֹךְ֙ וַ/יִּתְנַבֵּ֔א עַד בֹּא֖/וֹ ב/נוית בָּ/רָמָֽה־־־׃
translation:
  text: So he went there, to Naioth in Ramah, and the Spirit of God came upon him
    also; and he went on, prophesying, until he came to Naioth in Ramah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Naioth at Ramah.”
    reason: lexical_alternative
  - marker: b
    text: Or “the spirit of God was upon him.”
    reason: lexical_alternative
lexical_decisions:
- source_word: נוית בָּרָמָה
  chosen: Naioth in Ramah
  alternatives:
  - Naioth at Ramah
  lexicon: HALOT
  rationale: Proper place name is transliterated per philosophy. The prefixed ב with
    Ramah is best rendered idiomatically as 'in Ramah' in English, though 'at Ramah'
    is possible.
- source_word: וַתְּהִי עָלָיו ... רוּחַ אֱלֹהִים
  chosen: the Spirit of God came upon him
  alternatives:
  - the spirit of God was upon him
  - a spirit of God came upon him
  lexicon: HALOT
  rationale: The idiom היה על + person with רוּחַ is naturally rendered as the Spirit's
    coming upon someone. Capitalized 'Spirit' reflects the likely reference to God's
    empowering Spirit in this narrative context. 'Was upon him' is more literal but
    less natural here; 'a spirit' is grammatically possible in isolation but context
    favors the divine Spirit.
- source_word: גַּם הוּא
  chosen: him also
  alternatives:
  - he too
  - even he
  lexicon: HALOT
  rationale: This construction emphasizes that Saul too experienced what had happened
    to the messengers. 'Also' preserves the additive force without overemphasis.
- source_word: וַיֵּלֶךְ הָלוֹךְ
  chosen: he went on
  alternatives:
  - he kept going
  - he went continually
  lexicon: HALOT
  rationale: The finite verb plus infinitive absolute intensifies/extends the action.
    'Went on' captures the durative sense in readable English without awkward literalism.
- source_word: וַיִּתְנַבֵּא
  chosen: prophesying
  alternatives:
  - acting like a prophet
  - speaking prophetically
  lexicon: HALOT
  rationale: The hitpael of נבא in this Samuel context refers to prophetic utterance/behavior
    under divine influence. 'Prophesying' is the standard and sufficiently broad rendering,
    preserving the narrative's theological ambiguity about the exact form of the activity.
- source_word: עַד בֹּאוֹ
  chosen: until he came
  alternatives:
  - until his coming
  - until he arrived
  lexicon: HALOT
  rationale: This infinitive construct with pronominal suffix is most naturally rendered
    as a temporal clause in English.
- source_word: שָׁם
  chosen: there
  alternatives: []
  lexicon: HALOT
  rationale: Retained as a discourse pointer linking back to the previously mentioned
    destination.
