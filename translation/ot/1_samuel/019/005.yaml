id: 1SA.19.5
reference: 1 Samuel 19:5
source:
  edition: WLC
  text: וַ/יָּשֶׂם֩ אֶת נַפְשׁ֨/וֹ בְ/כַפּ֜/וֹ וַ/יַּ֣ךְ אֶת הַ/פְּלִשְׁתִּ֗י וַ/יַּ֨עַשׂ
    יְהוָ֜ה תְּשׁוּעָ֤ה גְדוֹלָה֙ לְ/כָל יִשְׂרָאֵ֔ל רָאִ֖יתָ וַ/תִּשְׂמָ֑ח וְ/לָ֤/מָּה
    תֶֽחֱטָא֙ בְּ/דָ֣ם נָקִ֔י לְ/הָמִ֥ית אֶת דָּוִ֖ד חִנָּֽם־־־־׃
translation:
  text: For he put his life in his hand and struck down the Philistine, and the LORD
    brought about a great salvation for all Israel. You saw it and rejoiced. So why
    will you sin against innocent blood by putting David to death for no reason?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “he risked his life,” literally, “he put his life in his hand.”
    reason: lexical_alternative
  - marker: b
    text: “A great salvation” may also be rendered “a great victory” or “great deliverance.”
    reason: lexical_alternative
  - marker: c
    text: Or, “without cause.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּשֶׂם אֶת־נַפְשׁוֹ בְכַפּוֹ
  chosen: he put his life in his hand
  alternatives:
  - he risked his life
  - he took his life in his hand
  lexicon: HALOT
  rationale: The Hebrew idiom literally speaks of placing one's life in one's palm/hand,
    conveying mortal risk. The main text preserves the imagery in readable English;
    alternatives express the idiomatic sense more dynamically.
- source_word: נַפְשׁוֹ
  chosen: his life
  alternatives:
  - his soul
  - himself
  lexicon: HALOT
  rationale: In this context נֶפֶשׁ refers to one's life rather than the immaterial
    soul. 'Life' best fits the idiom and the battle setting.
- source_word: בְכַפּוֹ
  chosen: in his hand
  alternatives:
  - in his palm
  lexicon: HALOT
  rationale: כַּף is literally 'palm/hand.' 'In his hand' is the more natural English
    expression in this idiom.
- source_word: וַיַּךְ אֶת־הַפְּלִשְׁתִּי
  chosen: struck down the Philistine
  alternatives:
  - killed the Philistine
  - struck the Philistine
  lexicon: HALOT
  rationale: נכה here refers to David's defeat of Goliath resulting in death. 'Struck
    down' is vivid and natural, preserving the action without overflattening it to
    simply 'killed.'
- source_word: וַיַּעַשׂ יְהוָה
  chosen: the LORD brought about
  alternatives:
  - the LORD worked
  - the LORD accomplished
  - the LORD made
  lexicon: HALOT
  rationale: עשה with an abstract object here means to effect or accomplish. 'Brought
    about' communicates divine agency in idiomatic English.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  lexicon: HALOT
  rationale: Per doctrine guidelines, the covenant name יְהוָה is rendered 'the LORD'
    rather than transliterated.
- source_word: תְּשׁוּעָה גְדוֹלָה
  chosen: a great salvation
  alternatives:
  - a great victory
  - great deliverance
  lexicon: HALOT
  rationale: תְּשׁוּעָה can denote salvation, deliverance, or victory. 'Salvation'
    preserves the broader theological sense while still fitting military deliverance;
    alternatives are viable in context.
- source_word: לְכָל־יִשְׂרָאֵל
  chosen: for all Israel
  alternatives:
  - for all of Israel
  - for all the Israelites
  lexicon: HALOT
  rationale: The preposition ל marks benefit or advantage. 'For all Israel' is concise
    and natural.
- source_word: רָאִיתָ וַתִּשְׂמָח
  chosen: You saw it and rejoiced
  alternatives:
  - You saw and were glad
  lexicon: HALOT
  rationale: The verbs are direct and personal, addressed to Saul. Supplying 'it'
    in English clarifies the object of 'saw' from context.
- source_word: וְלָמָּה תֶחֱטָא
  chosen: So why will you sin
  alternatives:
  - Why then would you sin
  - Why should you sin
  lexicon: HALOT
  rationale: The conjunction plus interrogative draws an inference from Saul's prior
    joy. 'So why will you sin' preserves the rhetorical force and the imperfect's
    forward-looking sense.
- source_word: בְּדָם נָקִי
  chosen: against innocent blood
  alternatives:
  - by shedding innocent blood
  - concerning innocent blood
  lexicon: HALOT
  rationale: This construction commonly refers to bloodguilt. 'Against innocent blood'
    is a fairly literal rendering that keeps the covenantal-legal resonance; English
    readers will understand it in context with the following infinitive.
- source_word: לְהָמִית אֶת־דָּוִד
  chosen: by putting David to death
  alternatives:
  - to kill David
  - by killing David
  lexicon: HALOT
  rationale: The infinitive expresses the manner or result of the sin. 'Putting David
    to death' is slightly more formal and suits the judicial-moral tone of the accusation.
- source_word: חִנָּם
  chosen: for no reason
  alternatives:
  - without cause
  - gratuitously
  lexicon: HALOT
  rationale: חִנָּם means without cause or for nothing. 'For no reason' is clear modern
    English; 'without cause' is a strong formal alternative.
