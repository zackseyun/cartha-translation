theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering for
    יְהוָה, following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Rendering תְּשׁוּעָה in a military-deliverance context
  chosen_reading: a great salvation
  alternative_readings:
  - a great victory
  - great deliverance
  rationale: Although the immediate context is military, the Hebrew term carries broader
    theological weight than mere battlefield success. 'Salvation' preserves that resonance
    without denying the concrete historical deliverance.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
