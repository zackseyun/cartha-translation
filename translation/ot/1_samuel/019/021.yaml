theological_decisions:
- issue: Meaning of prophetic activity in Saul's messengers
  chosen_reading: Rendered neutrally as 'prophesied' without specifying whether this
    involved ecstatic speech, inspired praise, or another prophetic manifestation.
  alternative_readings:
  - entered an ecstatic state
  - behaved like prophets
  rationale: The narrative indicates a Spirit-induced prophetic phenomenon, but the
    verse itself does not define its exact form. Preserving the broader term avoids
    importing a narrower theological or phenomenological claim than the Hebrew warrants.
  doctrine_reference: Preserve theological tension rather than resolve it.
