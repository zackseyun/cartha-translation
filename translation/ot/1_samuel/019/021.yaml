id: 1SA.19.21
reference: 1 Samuel 19:21
source:
  edition: WLC
  text: וַ/יַּגִּ֣דוּ לְ/שָׁא֗וּל וַ/יִּשְׁלַח֙ מַלְאָכִ֣ים אֲחֵרִ֔ים וַ/יִּֽתְנַבְּא֖וּ
    גַּם הֵ֑מָּה וַ/יֹּ֣סֶף שָׁא֗וּל וַ/יִּשְׁלַח֙ מַלְאָכִ֣ים שְׁלִשִׁ֔ים וַ/יִּֽתְנַבְּא֖וּ
    גַּם הֵֽמָּה־־׃
translation:
  text: When they told Saul, he sent other messengers, and they also prophesied. Then
    Saul again sent a third group of messengers, and they also prophesied.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they too prophesied.' The Hebrew emphasizes that this group, like the
      earlier ones, was likewise overcome.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'third'; that is, Saul sent messengers a third time.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּגִּדוּ
  chosen: When they told
  alternatives:
  - And they told
  - So they reported
  lexicon: HALOT
  rationale: The verb נגד in Hiphil means to tell/report. English 'When they told'
    smoothly conveys the temporal-sequential force of the waw-consecutive in context,
    linking this report to Saul's next action.
- source_word: לְשָׁאוּל
  chosen: Saul
  alternatives:
  - to Saul
  lexicon: HALOT
  rationale: The preposition is naturally absorbed into the English clause 'told Saul';
    explicit retention as 'to Saul' would be wooden.
- source_word: מַלְאָכִים
  chosen: messengers
  alternatives:
  - envoys
  - agents
  lexicon: HALOT
  rationale: מַלְאָךְ commonly means 'messenger.' In this narrative Saul sends human
    representatives, not angels; 'messengers' is the most transparent and contextually
    accurate rendering.
- source_word: אֲחֵרִים
  chosen: other
  alternatives:
  - another
  lexicon: HALOT
  rationale: Plural adjective modifying 'messengers'; 'other messengers' is the natural
    English equivalent.
- source_word: וַיִּתְנַבְּאוּ
  chosen: they also prophesied
  alternatives:
  - they too prophesied
  - they acted like prophets
  lexicon: HALOT
  rationale: The Hitpael of נבא in this context refers to entering a prophetic state,
    as in the surrounding narrative. 'Prophesied' preserves the established biblical
    idiom without overinterpreting the exact manifestation.
- source_word: גַּם הֵמָּה
  chosen: they also
  alternatives:
  - they too
  - even they
  lexicon: HALOT
  rationale: The phrase adds emphasis that this group, like the previous one, was
    likewise overcome. 'They also' is concise and natural.
- source_word: וַיֹּסֶף
  chosen: Then Saul again
  alternatives:
  - And Saul added
  - Saul continued
  lexicon: HALOT
  rationale: יסף plus following infinitive/finite action often means to do again or
    continue. Here it introduces a repeated attempt by Saul; 'again' best captures
    the iterative sense in idiomatic English.
- source_word: שְׁלִשִׁים
  chosen: a third group of
  alternatives:
  - third
  - a third set of
  lexicon: HALOT
  rationale: In context this ordinal-like form refers to a third dispatch of messengers,
    not the cardinal number 'thirty.' Rendering it as 'a third group of' makes the
    sense explicit in natural English.
