id: 1SA.19.18
reference: 1 Samuel 19:18
source:
  edition: WLC
  text: וְ/דָוִ֨ד בָּרַ֜ח וַ/יִּמָּלֵ֗ט וַ/יָּבֹ֤א אֶל שְׁמוּאֵל֙ הָ/רָמָ֔תָ/ה וַ/יַּ֨גֶּד
    ל֔/וֹ אֵ֛ת כָּל אֲשֶׁ֥ר עָֽשָׂה ל֖/וֹ שָׁא֑וּל וַ/יֵּ֤לֶךְ הוּא֙ וּ/שְׁמוּאֵ֔ל
    וַ/יֵּשְׁב֖וּ ב/נוית־־־־׃
translation:
  text: Now David fled and escaped, and he came to Samuel at Ramah and told him all
    that Saul had done to him. Then he and Samuel went and stayed at Naioth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew Naioth is a place name, likely referring to dwellings or a settlement
      associated with Ramah.
    reason: cultural_note
lexical_decisions:
- source_word: בָּרַח
  chosen: fled
  alternatives:
  - ran away
  lexicon: HALOT
  rationale: Basic sense is to flee/escape from danger. 'Fled' is concise and idiomatic
    in narrative English.
- source_word: וַיִּמָּלֵט
  chosen: escaped
  alternatives:
  - got away
  - was delivered
  lexicon: HALOT
  rationale: Niphal of מלט here complements 'fled' by expressing successful escape.
    'Escaped' preserves the result without importing theological overtones such as
    divine deliverance, which the verse does not state explicitly.
- source_word: הָרָמָתָה
  chosen: at Ramah
  alternatives:
  - to Ramah
  lexicon: HALOT
  rationale: Directional he indicates motion toward Ramah, but because Samuel is the
    primary object of 'came to' and Ramah functions as Samuel's location, 'came to
    Samuel at Ramah' is natural English and preserves the sense.
- source_word: וַיַּגֶּד לוֹ
  chosen: told him
  alternatives:
  - reported to him
  - declared to him
  lexicon: HALOT
  rationale: Narrative Hiphil of נגד commonly means to tell/report. 'Told him' is
    the most natural modern rendering.
- source_word: אֵת כָּל אֲשֶׁר עָשָׂה לוֹ שָׁאוּל
  chosen: all that Saul had done to him
  alternatives:
  - everything that Saul had done to him
  lexicon: HALOT
  rationale: This preserves the comprehensiveness of כָּל and the personal object
    'to him' without embellishment.
- source_word: וַיֵּלֶךְ הוּא וּשְׁמוּאֵל
  chosen: Then he and Samuel went
  alternatives:
  - And he and Samuel went
  lexicon: HALOT
  rationale: The explicit pronoun הוּא adds clarity/emphasis to the subject pairing.
    'Then' smooths the narrative sequence in English while retaining the waw-consecutive
    flow.
- source_word: וַיֵּשְׁבוּ
  chosen: stayed
  alternatives:
  - dwelt
  - sat
  - remained
  lexicon: HALOT
  rationale: Although the verb is literally 'sat/dwelt,' in this travel narrative
    it denotes taking up residence or lodging. 'Stayed' is idiomatic and contextually
    accurate.
- source_word: בְּנוָיֹות
  chosen: at Naioth
  alternatives:
  - in Naioth
  lexicon: HALOT
  rationale: This is a place name, conventionally transliterated. 'At Naioth' fits
    English usage for staying at a locality; 'in Naioth' would also be possible.
