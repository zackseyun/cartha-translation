theological_decisions:
- issue: Rendering of תְּרָפִים, a cultic object associated with household religion/idolatry
  chosen_reading: the teraphim
  alternative_readings:
  - the household idol
  - the idol image
  rationale: The text names the object without explicit commentary. Transliteration
    preserves the cultural specificity and avoids importing more interpretive judgment
    than the verse itself states, while still allowing a footnote to clarify the likely
    sense.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; preserve ambiguity where appropriate.'
