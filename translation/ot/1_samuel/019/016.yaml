id: 1SA.19.16
reference: 1 Samuel 19:16
source:
  edition: WLC
  text: וַ/יָּבֹ֨אוּ֙ הַ/מַּלְאָכִ֔ים וְ/הִנֵּ֥ה הַ/תְּרָפִ֖ים אֶל הַ/מִּטָּ֑ה וּ/כְבִ֥יר
    הָ/עִזִּ֖ים מְרַאֲשֹׁתָֽי/ו־׃
translation:
  text: When the messengers came in, behold, the teraphim was in the bed, with the
    quilt of goats’ hair at its head.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “the household idol” or “the idol image.” Hebrew teraphim refers to
      a cultic household image.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew term rendered “quilt” is rare and may refer more generally to
      a woven covering; “quilt of goats’ hair” reflects its likely function here.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַמַּלְאָכִים
  chosen: the messengers
  alternatives:
  - the agents
  - the envoys
  lexicon: HALOT
  rationale: In this narrative context Saul has sent personnel to seize David; 'messengers'
    is the standard and sufficiently broad rendering for מַלְאָךְ in human-agent contexts,
    without implying angelic beings.
- source_word: וְהִנֵּה
  chosen: behold
  alternatives:
  - look
  - there was
  lexicon: HALOT
  rationale: Retains the vivid deictic force of the Hebrew narrative particle. Though
    slightly formal, it is still readable and preserves the sudden discovery.
- source_word: הַתְּרָפִים
  chosen: the teraphim
  alternatives:
  - the household idol
  - the idol image
  lexicon: HALOT
  rationale: 'The Hebrew term refers to a cultic image/object and is culturally specific.
    Transliteration preserves the source term and avoids over-specifying size or function
    beyond what the text states. Because the verb is absent here, English supplies
    singular agreement from the narrative sense: a single object is being used as
    a decoy.'
- source_word: אֶל הַמִּטָּה
  chosen: in the bed
  alternatives:
  - on the bed
  - toward the bed
  lexicon: HALOT
  rationale: Although אֶל often means 'to/toward,' in this idiom of location after
    a discovery scene it is best represented idiomatically in English as 'in the bed,'
    matching the sense that the object was lying there as a body substitute.
- source_word: וּכְבִיר
  chosen: the quilt
  alternatives:
  - the cover
  - the netting
  lexicon: HALOT
  rationale: The noun is rare and denotes some kind of covering or woven piece. 'Quilt'
    communicates a bed-covering naturally in context without excessive technicality,
    while remaining close to the likely function.
- source_word: הָעִזִּים
  chosen: of goats’ hair
  alternatives:
  - of goats
  - goat-hair
  lexicon: HALOT
  rationale: In context the material of the bed covering is in view, not merely animal
    ownership or source in the abstract. 'Goats’ hair' makes the likely sense explicit
    in natural English.
- source_word: מְרַאֲשֹׁתָיו
  chosen: at its head
  alternatives:
  - at the head of it
  - by his head
  lexicon: HALOT
  rationale: The noun means 'place of the head/head-place.' Because the immediate
    referent is the teraphim decoy in the bed, English 'at its head' is the clearest
    rendering. This avoids implying an actual human person in the bed.
