id: 1SA.19.7
reference: 1 Samuel 19:7
source:
  edition: WLC
  text: וַ/יִּקְרָ֤א יְהוֹנָתָן֙ לְ/דָוִ֔ד וַ/יַּגֶּד ל/וֹ֙ יְה֣וֹנָתָ֔ן אֵ֥ת כָּל
    הַ/דְּבָרִ֖ים הָ/אֵ֑לֶּה וַ/יָּבֵ֨א יְהוֹנָתָ֤ן אֶת דָּוִד֙ אֶל שָׁא֔וּל וַ/יְהִ֥י
    לְ/פָנָ֖י/ו כְּ/אֶתְמ֥וֹל שִׁלְשֽׁוֹם־־־־׃ס
translation:
  text: So Jonathan called David and told him all these things. Then Jonathan brought
    David to Saul, and he was in his presence as before.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'as yesterday, three days ago,' a Hebrew idiom meaning 'as before'
      or 'as formerly.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְרָא
  chosen: called
  alternatives:
  - summoned
  lexicon: HALOT
  rationale: קרא with לְ + person commonly means to call to or summon someone. 'Called'
    is natural English and leaves open whether the action was formal or informal.
- source_word: וַיַּגֶּד
  chosen: told
  alternatives:
  - reported
  - declared
  lexicon: HALOT
  rationale: נגד in the Hiphil means to make known or tell. 'Told' fits the direct-object
    clause and reads naturally in narrative English.
- source_word: כָּל הַדְּבָרִים הָאֵלֶּה
  chosen: all these things
  alternatives:
  - all these words
  - all these matters
  lexicon: HALOT
  rationale: דבר can mean 'word,' 'matter,' or 'thing.' In this context Jonathan is
    recounting the content of Saul's speech and intentions; 'all these things' is
    idiomatic English that preserves the breadth of the phrase.
- source_word: וַיָּבֵא ... אֶל
  chosen: brought ... to
  alternatives:
  - led ... to
  lexicon: HALOT
  rationale: בוא in the Hiphil often means 'bring.' 'Brought David to Saul' best reflects
    the causative sense without overinterpreting the manner.
- source_word: וַיְהִי לְפָנָיו
  chosen: he was in his presence
  alternatives:
  - he was before him
  - he attended him
  lexicon: HALOT
  rationale: The idiom 'to be before someone' can denote being in that person's presence
    or service. Here the immediate sense is restoration to Saul's courtly presence;
    'in his presence' is clear while preserving the relational setting.
- source_word: כְּאֶתְמוֹל שִׁלְשׁוֹם
  chosen: as before
  alternatives:
  - as yesterday and the day before
  - as formerly
  lexicon: HALOT
  rationale: The Hebrew idiom literally refers to recent prior time ('as yesterday,
    three days ago') and functions adverbially to mean 'as previously' or 'as before.'
    'As before' communicates the idiomatic sense in natural English.
