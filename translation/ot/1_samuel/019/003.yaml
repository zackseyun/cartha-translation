id: 1SA.19.3
reference: 1 Samuel 19:3
source:
  edition: WLC
  text: וַ/אֲנִ֨י אֵצֵ֜א וְ/עָמַדְתִּ֣י לְ/יַד אָבִ֗/י בַּ/שָּׂדֶה֙ אֲשֶׁ֣ר אַתָּ֣ה
    שָׁ֔ם וַ/אֲנִ֕י אֲדַבֵּ֥ר בְּ/ךָ֖ אֶל אָבִ֑/י וְ/רָאִ֥יתִי מָ֖ה וְ/הִגַּ֥דְתִּי
    לָֽ/ךְ־־׃ס
translation:
  text: I will go out and stand beside my father in the field where you are, and I
    will speak to my father about you. Then I will see what happens and tell you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'I will see what,' an elliptical expression meaning 'I will see
      what happens' or 'I will see what the situation is.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵצֵא
  chosen: I will go out
  alternatives:
  - I will go forth
  lexicon: HALOT
  rationale: Qal imperfect 1cs of יצא expresses Jonathan's intended action. 'Go out'
    is natural modern English and preserves the directional sense without archaic
    wording.
- source_word: וְעָמַדְתִּי
  chosen: and stand
  alternatives:
  - and station myself
  - and take my stand
  lexicon: HALOT
  rationale: From עמד, with sequential force after the initial imperfect. In English,
    'and stand' fits the planned sequence smoothly. 'Beside' completes the idiom with
    the following prepositional phrase.
- source_word: לְיַד אָבִי
  chosen: beside my father
  alternatives:
  - at my father's side
  - near my father
  lexicon: HALOT
  rationale: The idiom לְיַד literally means 'to/at the hand of,' commonly 'beside'
    or 'at the side of.' 'Beside my father' is concise and idiomatic.
- source_word: בַּשָּׂדֶה אֲשֶׁר אַתָּה שָׁם
  chosen: in the field where you are
  alternatives:
  - in the field where you will be
  - in the field in which you are there
  lexicon: HALOT
  rationale: The relative clause identifies the location of David. English omits the
    redundant adverbial force of שָׁם by folding it into 'where you are,' which preserves
    the sense naturally.
- source_word: אֲדַבֵּר בְּךָ אֶל אָבִי
  chosen: I will speak to my father about you
  alternatives:
  - I will speak of you to my father
  - I will speak with my father concerning you
  lexicon: HALOT
  rationale: The construction דבר ב + person here means 'speak about/concerning' someone,
    not 'speak in you' or 'against you.' 'To my father about you' is the clearest
    idiomatic rendering.
- source_word: וְרָאִיתִי מָה
  chosen: Then I will see what happens
  alternatives:
  - and I will see what
  - and I will observe what
  lexicon: HALOT
  rationale: 'The Hebrew is elliptical: literally ''and I will see what.'' English
    requires completion. ''What happens'' captures the implied outcome Jonathan intends
    to observe.'
- source_word: וְהִגַּדְתִּי לָךְ
  chosen: and tell you
  alternatives:
  - and report to you
  - and declare it to you
  lexicon: HALOT
  rationale: Hiphil of נגד means to make known or report. 'Tell you' is natural in
    context; 'report to you' is possible but slightly stiffer.
