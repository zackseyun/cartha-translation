id: 1SA.19.20
reference: 1 Samuel 19:20
source:
  edition: WLC
  text: וַ/יִּשְׁלַ֨ח שָׁא֣וּל מַלְאָכִים֮ לָ/קַ֣חַת אֶת דָּוִד֒ וַ/יַּ֗רְא אֶֽת לַהֲקַ֤ת
    הַ/נְּבִיאִים֙ נִבְּאִ֔ים וּ/שְׁמוּאֵ֕ל עֹמֵ֥ד נִצָּ֖ב עֲלֵי/הֶ֑ם וַ/תְּהִ֞י עַֽל
    מַלְאֲכֵ֤י שָׁאוּל֙ ר֣וּחַ אֱלֹהִ֔ים וַ/יִּֽתְנַבְּא֖וּ גַּם הֵֽמָּה־־־־׃
translation:
  text: Then Saul sent messengers to seize David. But when they saw the company of
    prophets prophesying, with Samuel standing over them, the Spirit of God came upon
    Saul’s messengers, and they also prophesied.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'band of prophets.' The Hebrew term refers to a gathered group or company.
    reason: lexical_alternative
  - marker: b
    text: Or 'standing among them'; the Hebrew may also suggest Samuel was positioned
      over them in a leading or supervisory role.
    reason: lexical_alternative
lexical_decisions:
- source_word: מַלְאָכִים / מַלְאֲכֵי
  chosen: messengers
  alternatives:
  - agents
  - envoys
  lexicon: HALOT
  rationale: In this narrative context the word refers to human emissaries sent by
    Saul, not angels. 'Messengers' is the most natural and contextually precise English
    rendering.
- source_word: לָקַחַת
  chosen: to seize
  alternatives:
  - to take
  - to capture
  lexicon: HALOT
  rationale: Although the verb is broadly 'take,' here Saul sends men to apprehend
    David. 'Seize' makes the hostile intent explicit without overparaphrasing.
- source_word: לַהֲקַת הַנְּבִיאִים
  chosen: the company of prophets
  alternatives:
  - the band of prophets
  - the assembly of prophets
  lexicon: HALOT
  rationale: The noun denotes a gathered group. 'Company' is readable modern English
    and fits a prophetic group in narrative context.
- source_word: נִבְּאִים
  chosen: prophesying
  alternatives:
  - acting as prophets
  - speaking prophetically
  lexicon: HALOT
  rationale: The participle describes ongoing prophetic activity. 'Prophesying' preserves
    the verbal force and keeps the wording consistent with the repeated verb later
    in the verse.
- source_word: עֹמֵד נִצָּב עֲלֵיהֶם
  chosen: standing over them
  alternatives:
  - standing among them
  - standing as leader over them
  lexicon: HALOT
  rationale: The combination emphasizes Samuel's fixed, supervisory position relative
    to the prophets. 'Standing over them' preserves the spatial and leadership nuance
    better than the flatter 'standing there.'
- source_word: רוּחַ אֱלֹהִים
  chosen: the Spirit of God
  alternatives:
  - a spirit from God
  - God's Spirit
  lexicon: HALOT
  rationale: In this context the phrase denotes divine spiritual influence producing
    prophetic speech, and 'the Spirit of God' is the most natural rendering in English
    biblical style.
- source_word: וַתְּהִי עַל
  chosen: came upon
  alternatives:
  - was upon
  - fell upon
  lexicon: HALOT
  rationale: The idiom indicates the Spirit's coming onto a person or group for empowered
    action. 'Came upon' is idiomatic English and preserves the eventive force.
- source_word: וַיִּתְנַבְּאוּ גַּם הֵמָּה
  chosen: they also prophesied
  alternatives:
  - they too prophesied
  - even they prophesied
  lexicon: HALOT
  rationale: The clause highlights that Saul's messengers joined the prophetic activity
    unexpectedly. 'They also prophesied' is clear and preserves the emphatic addition
    of גַּם.
