theological_decisions:
- issue: Nature of רוּחַ אֱלֹהִים in this narrative
  chosen_reading: 'Rendered as a divine empowering presence: ''the Spirit of God came
    upon Saul’s messengers.'''
  alternative_readings:
  - Rendered more impersonally as 'a spirit from God came upon Saul’s messengers'
  rationale: The phrase in Samuel commonly refers to God's Spirit acting powerfully
    in history. This rendering preserves the theological force of divine agency without
    importing later doctrinal precision beyond the text.
  doctrine_reference: Affirmations; Translation philosophy §3
