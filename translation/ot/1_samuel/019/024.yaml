theological_decisions:
- issue: Meaning of Saul's unclothed state (עָרֹם)
  chosen_reading: Render plainly as 'naked' without importing a theological or moral
    explanation.
  alternative_readings:
  - partially unclothed
  - stripped of royal garments only
  rationale: The Hebrew adjective עָרֹם ordinarily means 'naked.' Some interpreters
    soften it to avoid overstatement or to suggest removal only of outer garments,
    but the text itself does not specify such limitation. To preserve the narrative's
    force and avoid doctrinally motivated mitigation, the main text keeps 'naked,'
    while a footnote preserves the softer possibility.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Nature of Saul's prophetic activity
  chosen_reading: Translate ויתנבא as 'prophesied' without deciding whether this involved
    predictive speech, ecstatic behavior, or both.
  alternative_readings:
  - entered an ecstatic prophetic state
  - behaved like one of the prophets
  rationale: The narrative presents Saul as overtaken by the Spirit in a way associated
    with prophetic activity, but the verse does not define the exact mode. 'Prophesied'
    preserves the theological tension rather than narrowing the phenomenon.
  doctrine_reference: Translation philosophy §3
