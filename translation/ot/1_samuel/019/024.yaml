id: 1SA.19.24
reference: 1 Samuel 19:24
source:
  edition: WLC
  text: וַ/יִּפְשַׁ֨ט גַּם ה֜וּא בְּגָדָ֗י/ו וַ/יִּתְנַבֵּ֤א גַם הוּא֙ לִ/פְנֵ֣י שְׁמוּאֵ֔ל
    וַ/יִּפֹּ֣ל עָרֹ֔ם כָּל הַ/יּ֥וֹם הַ/ה֖וּא וְ/כָל הַ/לָּ֑יְלָה עַל כֵּן֙ יֹֽאמְר֔וּ
    הֲ/גַ֥ם שָׁא֖וּל בַּ/נְּבִיאִֽם־־־־־׃פ
translation:
  text: He too stripped off his clothes, and he too prophesied before Samuel. He lay
    naked all that day and all that night. Therefore they say, “Is Saul also among
    the prophets?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'stripped off his garments.'
    reason: lexical_alternative
  - marker: b
    text: '''Naked'' may refer to complete nakedness or to being stripped down from
      outer garments; the Hebrew does not specify further.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּפְשַׁט ... בְּגָדָיו
  chosen: stripped off his clothes
  alternatives:
  - took off his garments
  - stripped off his garments
  lexicon: HALOT
  rationale: פשט with בגדים denotes removing clothing. 'Stripped off' best conveys
    the force of the verb in natural modern English; 'clothes' is more readable than
    'garments' while preserving sense.
- source_word: גַּם הוּא
  chosen: he too
  alternatives:
  - he also
  lexicon: HALOT
  rationale: The repetition of גם הוא emphasizes that Saul himself, like the messengers
    before him, was overtaken. 'He too' preserves the emphasis idiomatically.
- source_word: וַיִּתְנַבֵּא
  chosen: prophesied
  alternatives:
  - acted like a prophet
  - was in a prophetic state
  lexicon: HALOT
  rationale: The hitpael of נבא in this narrative refers to prophetic speech/behavior
    under divine influence. 'Prophesied' is the standard and least interpretively
    intrusive rendering; more explanatory alternatives risk paraphrase.
- source_word: לִפְנֵי שְׁמוּאֵל
  chosen: before Samuel
  alternatives:
  - in Samuel's presence
  lexicon: HALOT
  rationale: לפני commonly means 'before' in the sense of presence. 'Before Samuel'
    is concise and faithful.
- source_word: וַיִּפֹּל עָרֹם
  chosen: He lay naked
  alternatives:
  - he fell naked
  - he lay exposed
  lexicon: HALOT
  rationale: Though נפל is literally 'fell,' in context with the duration phrase ('all
    that day and all that night') English idiom prefers 'lay.' עָרוֹם is most directly
    'naked'; this should not be softened without textual warrant.
- source_word: כָּל הַיּוֹם הַהוּא וְכָל הַלָּיְלָה
  chosen: all that day and all that night
  alternatives:
  - the whole of that day and the whole night
  lexicon: HALOT
  rationale: This preserves the full duration emphatically and naturally.
- source_word: עַל כֵּן יֹאמְרוּ
  chosen: Therefore they say
  alternatives:
  - That is why people say
  - therefore it is said
  lexicon: HALOT
  rationale: The phrase introduces the explanation for a proverb-like saying. 'Therefore
    they say' is close to the Hebrew while remaining idiomatic.
- source_word: הֲגַם שָׁאוּל בַּנְּבִיאִם
  chosen: Is Saul also among the prophets?
  alternatives:
  - Is Saul too among the prophets?
  lexicon: HALOT
  rationale: This is the established proverbial question from the narrative context.
    'Among the prophets' is the plain sense of the preposition and noun.
