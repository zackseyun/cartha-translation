id: 1SA.19.9
reference: 1 Samuel 19:9
source:
  edition: WLC
  text: וַ/תְּהִי֩ ר֨וּחַ יְהוָ֤ה רָעָה֙ אֶל שָׁא֔וּל וְ/הוּא֙ בְּ/בֵית֣/וֹ יוֹשֵׁ֔ב וַ/חֲנִית֖/וֹ בְּ/יָד֑/וֹ וְ/דָוִ֖ד מְנַגֵּ֥ן בְּ/יָֽד׀־׃
translation:
  text: And an evil spirit from Yahweh came upon Saul while he was sitting in his house with his spear in his hand, and David was playing the lyre with his hand.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a harmful spirit from the LORD.' The Hebrew adjective can mean 'evil' or 'harmful/distressing.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'with hand.' The verse does not explicitly name the instrument here, though the broader context indicates David was playing music for Saul.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתְּהִי
  chosen: came
  alternatives:
  - was
  - came to be
  lexicon: HALOT
  rationale: With רוּחַ as subject and אֶל שָׁאוּל marking direction toward Saul, idiomatic English prefers a motion/event sense ('came upon') rather than the more wooden 'was.'
- source_word: רוּחַ יְהוָה רָעָה
  chosen: an evil spirit from the LORD
  alternatives:
  - a harmful spirit from the LORD
  - an evil spirit of the LORD
  lexicon: HALOT
  rationale: רוּחַ is 'spirit.' רָעָה can denote evil, harmful, or distressing; 'evil' is the most direct lexical rendering here, while 'from the LORD' renders the genitive relation in a way that avoids implying moral evil in the LORD himself. This matches the Hebrew sense of a spirit sent by or proceeding from the LORD.
- source_word: אֶל שָׁאוּל
  chosen: upon Saul
  alternatives:
  - to Saul
  - against Saul
  lexicon: HALOT
  rationale: Although אֶל is basically 'to/toward,' with hostile or afflicting forces English commonly uses 'upon' to express onset or affliction.
- source_word: בְּבֵיתוֹ יֹשֵׁב
  chosen: while he was sitting in his house
  alternatives:
  - sitting in his house
  - seated in his house
  lexicon: HALOT
  rationale: The participle יֹשֵׁב gives a durative/backgrounded action. 'While he was sitting' captures the ongoing scene naturally in English.
- source_word: וַחֲנִיתוֹ בְּיָדוֹ
  chosen: with his spear in his hand
  alternatives:
  - and his spear was in his hand
  lexicon: HALOT
  rationale: This verbless phrase describes Saul's state. English idiom prefers 'with his spear in his hand' in scene-setting narration.
- source_word: מְנַגֵּן
  chosen: was playing
  alternatives:
  - was playing music
  - was making music
  lexicon: HALOT
  rationale: The piel participle of נגן refers to playing an instrument. 'Was playing' is concise and sufficient in context.
- source_word: בְּיָד
  chosen: with his hand
  alternatives:
  - by hand
  - with his hands
  lexicon: HALOT
  rationale: The Hebrew literally says 'with hand.' Since no instrument is named in this verse, the translation preserves the literal expression rather than importing 'the lyre' from nearby context. Singular 'hand' follows the source closely, though English readers may infer instrumental playing.
