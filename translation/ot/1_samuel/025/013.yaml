id: 1SA.25.13
reference: 1 Samuel 25:13
source:
  edition: WLC
  text: וַ/יֹּאמֶר֩ דָּוִ֨ד לַ/אֲנָשָׁ֜י/ו חִגְר֣וּ אִ֣ישׁ אֶת חַרְבּ֗/וֹ וַֽ/יַּחְגְּרוּ֙
    אִ֣ישׁ אֶת חַרְבּ֔/וֹ וַ/יַּחְגֹּ֥ר גַּם דָּוִ֖ד אֶת חַרְבּ֑/וֹ וַֽ/יַּעֲל֣וּ
    אַחֲרֵ֣י דָוִ֗ד כְּ/אַרְבַּ֤ע מֵאוֹת֙ אִ֔ישׁ וּ/מָאתַ֖יִם יָשְׁב֥וּ עַל הַ/כֵּלִֽים׀־־־־׀־׃
translation:
  text: Then David said to his men, “Each man strap on his sword.” So each man strapped
    on his sword, and David also strapped on his sword. About four hundred men went
    up after David, while two hundred stayed with the supplies.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “with the baggage” or “by the equipment.”
    reason: lexical_alternative
lexical_decisions:
- source_word: חִגְרוּ
  chosen: strap on
  alternatives:
  - gird on
  - put on
  lexicon: HALOT
  rationale: The verb חגר in military contexts refers to girding or fastening on a
    weapon. 'Strap on' is natural modern English and preserves the concrete action
    better than the archaic 'gird on.'
- source_word: אִישׁ
  chosen: each man
  alternatives:
  - each one
  - every man
  lexicon: HALOT
  rationale: The distributive construction אִישׁ ... אֶת־חַרְבּוֹ is best represented
    by 'each man ... his sword.' This preserves the masculine singular distributive
    force rather than flattening it to an impersonal plural.
- source_word: חַרְבּוֹ
  chosen: his sword
  alternatives:
  - his weapon
  lexicon: HALOT
  rationale: חֶרֶב specifically denotes a sword, not weaponry in general, so the more
    precise term is retained throughout the verse.
- source_word: גַּם
  chosen: also
  alternatives:
  - too
  - even
  lexicon: HALOT
  rationale: The adverb marks David's own participation in the arming. 'Also' is the
    most straightforward rendering in context.
- source_word: וַיַּעֲלוּ אַחֲרֵי דָוִד
  chosen: went up after David
  alternatives:
  - followed David up
  - went after David
  lexicon: HALOT
  rationale: עלה commonly means 'go up,' and אַחֲרֵי indicates following behind. 'Went
    up after David' preserves both the directional nuance and the military-following
    sense without overparaphrase.
- source_word: כְּאַרְבַּע מֵאוֹת אִישׁ
  chosen: about four hundred men
  alternatives:
  - some four hundred men
  - approximately four hundred men
  lexicon: HALOT
  rationale: The prefixed כ on the number can indicate approximation. 'About four
    hundred men' reflects that nuance more accurately than a bare 'four hundred men.'
- source_word: יָשְׁבוּ
  chosen: stayed
  alternatives:
  - remained
  - sat
  lexicon: HALOT
  rationale: Although the verb literally means 'sat' or 'dwelt,' in this narrative
    context it idiomatically means they remained behind rather than advancing. 'Stayed'
    communicates the sense in readable English.
- source_word: עַל־הַכֵּלִים
  chosen: with the supplies
  alternatives:
  - with the baggage
  - by the equipment
  lexicon: HALOT
  rationale: כֵּלִים is broad ('articles, vessels, gear, equipment'). In a military
    travel context it refers to the group's baggage/supplies. 'With the supplies'
    is clear modern English; 'baggage' is possible and preserved in a footnote.
- source_word: לַאֲנָשָׁיו
  chosen: to his men
  alternatives:
  - to his servants
  - to his people
  lexicon: HALOT
  rationale: In this military setting, אֲנָשִׁים refers to David's fighting men rather
    than generic people or household servants.
