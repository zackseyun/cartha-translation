id: 1SA.25.39
reference: 1 Samuel 25:39
source:
  edition: WLC
  text: וַ/יִּשְׁמַ֣ע דָּוִד֮ כִּ֣י מֵ֣ת נָבָל֒ וַ/יֹּ֡אמֶר בָּר֣וּךְ יְהוָ֡ה אֲשֶׁ֣ר
    רָב֩ אֶת רִ֨יב חֶרְפָּתִ֜/י מִ/יַּ֣ד נָבָ֗ל וְ/אֶת עַבְדּ/וֹ֙ חָשַׂ֣ךְ מֵֽ/רָעָ֔ה
    וְ/אֵת֙ רָעַ֣ת נָבָ֔ל הֵשִׁ֥יב יְהוָ֖ה בְּ/רֹאשׁ֑/וֹ וַ/יִּשְׁלַ֤ח דָּוִד֙ וַ/יְדַבֵּ֣ר
    בַּ/אֲבִיגַ֔יִל לְ/קַחְתָּ֥/הּ ל֖/וֹ לְ/אִשָּֽׁה־־׃
translation:
  text: When David heard that Nabal was dead, he said, “Blessed be the LORD, who has
    pleaded the case of my reproach from the hand of Nabal, and has kept his servant
    back from evil. The LORD has returned Nabal’s evil on his own head.” Then David
    sent and spoke to Abigail, to take her as his wife.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or “has avenged my insult” or “has contended for the cause of my disgrace.”
      The Hebrew uses legal-contest language: “has pleaded the case of my reproach.”'
    reason: lexical_alternative
  - marker: b
    text: Or “has restrained his servant from doing harm.”
    reason: lexical_alternative
  - marker: c
    text: Hebrew “has returned Nabal’s evil on his head,” an idiom for recompense
      falling back on the wrongdoer.
    reason: cultural_note
  - marker: d
    text: Or “to take her for himself as a wife”; that is, to marry her.
    reason: lexical_alternative
  - marker: e
    text: Or 'sent word and spoke to Abigail'.
    reason: previous_rendering
lexical_decisions:
- source_word: בָּר֣וּךְ יְהוָה
  chosen: Blessed be the LORD
  alternatives:
  - Praise be to the LORD
  - Blessed is the LORD
  lexicon: HALOT
  rationale: A conventional Hebrew blessing formula. 'Blessed be' preserves the performative
    doxological sense better than the more interpretive 'Praise be.' 'the LORD' follows
    the doctrinal default for YHWH.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine table, the default rendering of the divine name is 'the
    LORD,' following Jewish reverence tradition and longstanding English convention.
- source_word: רָב אֶת רִיב חֶרְפָּתִי
  chosen: has pleaded the case of my reproach
  alternatives:
  - has avenged my insult
  - has contended for the cause of my disgrace
  lexicon: HALOT
  rationale: The idiom combines ריב ('contend, conduct a legal case') with ריב as
    a noun ('case, dispute'). 'Pleaded the case' preserves the forensic imagery. חֶרְפָּה
    is 'reproach/insult/disgrace'; 'reproach' keeps the formal tone while remaining
    intelligible.
- source_word: מִיַּד נָבָל
  chosen: from the hand of Nabal
  alternatives:
  - at the hand of Nabal
  - from Nabal
  lexicon: HALOT
  rationale: Hebrew idiom 'from the hand of' is retained because it is natural enough
    in English and preserves the sense of agency/source.
- source_word: וְאֶת עַבְדּוֹ חָשַׂךְ מֵרָעָה
  chosen: and has kept his servant back from evil
  alternatives:
  - and has restrained his servant from doing harm
  - and has kept his servant from evil
  lexicon: HALOT
  rationale: חָשַׂךְ means 'withhold, keep back, spare.' In context David blesses
    God for preventing him from carrying out vengeance; 'kept ... back from evil'
    preserves both the restraint and the moral evaluation. 'His servant' refers to
    David speaking of himself in humility before God.
- source_word: רָעָה
  chosen: evil
  alternatives:
  - harm
  - wrong
  lexicon: HALOT
  rationale: The term can denote moral evil or harmful action. Here David recognizes
    his intended bloodshed as morally wrong, so 'evil' best preserves the ethical
    force, though 'harm' is contextually related.
- source_word: וְאֵת רָעַת נָבָל הֵשִׁיב יְהוָה בְּרֹאשׁוֹ
  chosen: The LORD has returned Nabal’s evil on his own head
  alternatives:
  - The LORD has brought back Nabal’s wickedness on his own head
  - The LORD has repaid Nabal's evil upon his head
  lexicon: HALOT
  rationale: הֵשִׁיב with 'on his head' is a recompense idiom. 'Returned ... on his
    own head' is idiomatic English and preserves the image of consequences falling
    back on the perpetrator.
- source_word: וַיְדַבֵּר בַּאֲבִיגַיִל
  chosen: sent word and spoke to Abigail
  alternatives:
  - sent and proposed to Abigail
  - sent and spoke concerning Abigail
  lexicon: HALOT
  rationale: The preposition ב with דבר can mean 'speak to' or 'speak concerning.'
    Given the following infinitive 'to take her for himself as wife,' the sense is
    that David sent messengers with a proposal. 'Sent word and spoke to Abigail' is
    clear without over-paraphrasing.
- source_word: לְקַחְתָּהּ לוֹ לְאִשָּׁה
  chosen: to take her as his wife
  alternatives:
  - to take her for himself as a wife
  - to marry her
  lexicon: HALOT
  rationale: This is the standard Hebrew marriage expression. 'To take her as his
    wife' stays close to the source while remaining natural. 'To marry her' is possible
    but less formally transparent.
