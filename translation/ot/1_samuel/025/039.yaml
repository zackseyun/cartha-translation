theological_decisions:
- issue: Divine judgment and providence in Nabal’s death
  chosen_reading: The verse is rendered to state David’s interpretation that the LORD
    vindicated him and returned Nabal’s evil on his own head, without expanding the
    text into a broader doctrinal claim about every instance of suffering or death.
  alternative_readings:
  - A more interpretive rendering could make explicit that God directly executed judgment
    on Nabal
  - A more muted rendering could avoid the strong recompense language
  rationale: The Hebrew explicitly attributes vindication and recompense to the LORD.
    The translation preserves that attribution while avoiding theological overstatement
    beyond this narrative context.
  doctrine_reference: 'Affirmations; Translation philosophy #1 and #3'
- issue: Moral force of David being restrained from רָעָה
  chosen_reading: Rendered as 'kept his servant back from evil' rather than merely
    'from harm.'
  alternative_readings:
  - kept his servant from harm
  - restrained his servant from avenging himself
  rationale: David’s intended action in the immediate context involved wrongful bloodshed
    and personal vengeance. 'Evil' preserves the moral self-assessment in the Hebrew
    rather than reducing it to mere injury.
  doctrine_reference: 'Translation philosophy #1 and #6'
