id: 1SA.25.44
reference: 1 Samuel 25:44
source:
  edition: WLC
  text: וְ/שָׁא֗וּל נָתַ֛ן אֶת מִיכַ֥ל בִּתּ֖/וֹ אֵ֣שֶׁת דָּוִ֑ד לְ/פַלְטִ֥י בֶן לַ֖יִשׁ
    אֲשֶׁ֥ר מִ/גַּלִּֽים־־׃
translation:
  text: Now Saul had given Michal his daughter, David’s wife, to Palti son of Laish,
    who was from Gallim.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Palti is spelled Palti in some English translations; the Hebrew form here
      supports Palti.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/שָׁאוּל
  chosen: Now Saul
  alternatives:
  - And Saul
  lexicon: HALOT
  rationale: The conjunction ו can be rendered simply as 'and,' but here 'now' gives
    natural English narrative flow while still reflecting the Hebrew connective.
- source_word: נָתַן
  chosen: had given
  alternatives:
  - gave
  lexicon: HALOT
  rationale: The qatal form reports a completed prior action relative to the surrounding
    narrative; English past perfect best captures that Saul had already given Michal
    away.
- source_word: מִיכַל בִּתּוֹ
  chosen: Michal his daughter
  alternatives:
  - Michal, his daughter
  lexicon: HALOT
  rationale: Straightforward apposition identifying Michal as Saul's daughter; no
    expansion beyond the Hebrew is needed.
- source_word: אֵשֶׁת דָּוִד
  chosen: David’s wife
  alternatives:
  - the wife of David
  lexicon: HALOT
  rationale: Construct phrase indicating Michal's marital relation to David. The possessive
    form is idiomatic modern English and preserves the sense.
- source_word: לְפַלְטִי
  chosen: to Palti
  alternatives:
  - to Palti
  - to Phalti
  lexicon: HALOT
  rationale: The name is transliterated per translation philosophy. 'Palti' follows
    the Hebrew form here; 'Palti' is a common English spelling variant, and 'Phalti'
    reflects Greek-influenced tradition.
- source_word: בֶן לַיִשׁ
  chosen: son of Laish
  alternatives:
  - the son of Laish
  lexicon: HALOT
  rationale: Standard patronymic construction; 'son of Laish' is concise and natural.
- source_word: אֲשֶׁר מִגַּלִּים
  chosen: who was from Gallim
  alternatives:
  - who was of Gallim
  - who belonged to Gallim
  lexicon: HALOT
  rationale: The relative clause identifies Palti by place of origin. 'From Gallim'
    is the clearest idiomatic English rendering of the prefixed מִן with the place
    name.
