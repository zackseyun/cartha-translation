id: 1SA.25.6
reference: 1 Samuel 25:6
source:
  edition: WLC
  text: וַ/אֲמַרְתֶּ֥ם כֹּ֖ה לֶ/חָ֑י וְ/אַתָּ֤ה שָׁלוֹם֙ וּ/בֵיתְ/ךָ֣ שָׁל֔וֹם וְ/כֹ֥ל
    אֲשֶׁר לְ/ךָ֖ שָׁלֽוֹם־׃
translation:
  text: 'And say this: ‘Long life to you! Peace to you, peace to your house, and peace
    to all that is yours.’'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'to life' is likely an idiomatic greeting or blessing, hence 'Long
      life to you.' Some translations render it more generally as 'Greetings' or 'To
      him who lives.'
    reason: alternative_reading
  - marker: b
    text: '''Peace'' translates Hebrew shalom, which can also carry the sense of well-being,
      wholeness, or prosperity.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַאֲמַרְתֶּם
  chosen: And say
  alternatives:
  - Then you shall say
  - And you shall say
  lexicon: HALOT
  rationale: The waw + perfect in direct instruction functions as an imperative-like
    continuation of David’s command. 'And say' is natural modern English while preserving
    the directive force.
- source_word: כֹּה
  chosen: this
  alternatives:
  - thus
  - like this
  lexicon: HALOT
  rationale: Introduces the quoted message. 'This' is more readable modern English
    than 'thus' while retaining the demonstrative sense.
- source_word: לֶחָי
  chosen: Long life to you
  alternatives:
  - To life
  - To the living one
  - Greetings
  lexicon: HALOT
  rationale: The phrase is difficult and idiomatic. In context it is a greeting/blessing
    addressed to Nabal. 'Long life to you' best captures the likely benedictory sense
    behind the Hebrew, rather than a wooden but obscure 'to life.' 'Greetings' is
    possible but too flat and loses the life/blessing nuance.
- source_word: וְאַתָּה שָׁלוֹם
  chosen: Peace to you
  alternatives:
  - and you, peace
  - may you have peace
  lexicon: HALOT
  rationale: The verbless clause expresses a wish/blessing. 'Peace to you' preserves
    the concise Hebrew form and the repeated blessing pattern.
- source_word: וּבֵיתְךָ שָׁלוֹם
  chosen: peace to your house
  alternatives:
  - and peace to your household
  - your house be at peace
  lexicon: HALOT
  rationale: '''House'' in Hebrew can mean household, but ''house'' is retained here
    because it is idiomatic in English and preserves the Hebrew imagery; the sense
    naturally includes the household.'
- source_word: וְכֹל אֲשֶׁר לְךָ שָׁלוֹם
  chosen: and peace to all that is yours
  alternatives:
  - and peace to all you have
  - and all that belongs to you, peace
  lexicon: HALOT
  rationale: This extends the blessing to all Nabal’s possessions and dependents.
    'All that is yours' is a natural rendering broad enough to include everything
    under his care.
- source_word: שָׁלוֹם
  chosen: peace
  alternatives:
  - well-being
  - prosperity
  lexicon: HALOT
  rationale: Shalom here denotes more than absence of conflict, including welfare
    and wholeness, but 'peace' is the standard concise rendering and fits the repeated
    blessing formula. The broader sense is worth preserving in a footnote.
