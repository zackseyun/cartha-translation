id: 1SA.25.21
reference: 1 Samuel 25:21
source:
  edition: WLC
  text: וְ/דָוִ֣ד אָמַ֗ר אַךְ֩ לַ/שֶּׁ֨קֶר שָׁמַ֜רְתִּי אֶֽת כָּל אֲשֶׁ֤ר לָ/זֶה֙
    בַּ/מִּדְבָּ֔ר וְ/לֹא נִפְקַ֥ד מִ/כָּל אֲשֶׁר ל֖/וֹ מְא֑וּמָה וַ/יָּֽשֶׁב לִ֥/י
    רָעָ֖ה תַּ֥חַת טוֹבָֽה־־־־־־׃
translation:
  text: Now David had said, “Surely I have guarded all that belongs to this man in
    the wilderness for nothing, so that not a thing of all that belonged to him was
    missing; and he has repaid me evil for good.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “in vain.” The Hebrew expression conveys that David’s protection of Nabal’s
      property had proved futile or empty.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַךְ
  chosen: Surely
  alternatives:
  - Only
  - Indeed
  lexicon: HALOT
  rationale: Introduces David's emphatic, frustrated assertion. 'Surely' captures
    the force better in idiomatic English than a more wooden 'only' here.
- source_word: לַשֶּׁקֶר
  chosen: for nothing
  alternatives:
  - in vain
  - to a lie/for falsehood
  lexicon: HALOT
  rationale: In this idiom with שׁמרתי, the sense is that David's protective effort
    proved futile or empty. 'For nothing' is natural modern English and preserves
    the complaint of wasted effort.
- source_word: שָׁמַרְתִּי
  chosen: I have guarded
  alternatives:
  - I kept
  - I watched over
  - I protected
  lexicon: HALOT
  rationale: The verb denotes keeping/guarding. 'Guarded' fits the pastoral-security
    context in the wilderness and avoids flattening the active protective sense.
- source_word: אֶת כָּל אֲשֶׁר לָזֶה
  chosen: all that belongs to this man
  alternatives:
  - all that was this man's
  - everything that belonged to him
  lexicon: HALOT
  rationale: The demonstrative 'this one' is somewhat dismissive in context. 'This
    man' preserves that tone better than simply 'him,' while 'belongs to' makes the
    possessive relation clear in English.
- source_word: בַּמִּדְבָּר
  chosen: in the wilderness
  alternatives:
  - in the desert
  - in the open country
  lexicon: HALOT
  rationale: '''Wilderness'' is the standard and contextually apt rendering for מִדְבָּר
    in Samuel, conveying uncultivated grazing territory without over-specifying aridity.'
- source_word: וְלֹא נִפְקַד
  chosen: so that not a thing ... was missing
  alternatives:
  - and nothing ... was lacking
  - and not one thing ... was lost
  lexicon: HALOT
  rationale: The Niphal of פקד here conveys being missing/lacking after oversight.
    'Was missing' is idiomatic and suits the inventory-like sense.
- source_word: מְאוּמָה
  chosen: not a thing
  alternatives:
  - anything
  - the least thing
  lexicon: HALOT
  rationale: Used with negation for totality. 'Not a thing' is emphatic and natural.
- source_word: וַיָּשֶׁב לִי
  chosen: he has repaid me
  alternatives:
  - he returned to me
  - he has paid me back
  lexicon: HALOT
  rationale: שׁוּב in this construction means to return or repay. 'Has repaid me'
    clearly conveys reciprocal recompense in English.
- source_word: רָעָה תַּחַת טוֹבָה
  chosen: evil for good
  alternatives:
  - harm for good
  - bad for good treatment
  lexicon: HALOT
  rationale: This is a compact moral contrast. 'Evil for good' preserves the ethical
    weight and the terseness of the Hebrew.
