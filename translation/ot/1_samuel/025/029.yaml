theological_decisions:
- issue: Metaphorical contrast between David’s preservation and his enemies’ destruction
  chosen_reading: Preserve the concrete imagery of being bound in a bundle versus being slung away, without over-interpreting it as a developed doctrine of the afterlife.
  alternative_readings:
  - Interpret 'bundle of the living' as an explicit statement about eternal life
  - Flatten both images into general protection and defeat
  rationale: The verse uses concrete metaphor to express divine preservation of David and violent removal of his enemies. The translation keeps the imagery and does not import later theological concepts not explicit in the Hebrew.
  doctrine_reference: Translation philosophy items 1 and 3
- issue: Rendering of אָדָם
  chosen_reading: man
  alternative_readings:
  - person
  - someone
  rationale: The Hebrew is grammatically singular masculine and refers to a concrete male adversary in context (Saul). Per doctrine, gender-accurate rendering is preferred over neutralization.
  doctrine_reference: Translation philosophy item 4
