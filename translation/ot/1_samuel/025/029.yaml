id: 1SA.25.29
reference: 1 Samuel 25:29
source:
  edition: WLC
  text: וַ/יָּ֤קָם אָדָם֙ לִ/רְדָפְ/ךָ֔ וּ/לְ/בַקֵּ֖שׁ אֶת נַפְשֶׁ֑/ךָ וְֽ/הָיְתָה֩ נֶ֨פֶשׁ אֲדֹנִ֜/י צְרוּרָ֣ה בִּ/צְר֣וֹר הַ/חַיִּ֗ים אֵ֚ת יְהוָ֣ה אֱלֹהֶ֔י/ךָ וְ/אֵ֨ת נֶ֤פֶשׁ אֹיְבֶ֨י/ךָ֙ יְקַלְּעֶ֔/נָּה בְּ/ת֖וֹךְ כַּ֥ף הַ/קָּֽלַע־׀׃
translation:
  text: Though a man has risen to pursue you and to seek your life, yet the life of my lord shall be bound in the bundle of the living with Yahweh your God, and the lives of your enemies he shall sling out from the hollow of the sling.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'shall be tied up in the bundle of life.' The Hebrew image is of something securely wrapped or bound for safekeeping.
    reason: lexical_alternative
  - marker: b
    text: Or 'he will hurl away.' The verb specifically evokes the action of a sling, forming a deliberate contrast with 'bound in the bundle of the living.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּקָם אָדָם
  chosen: Though a man has risen
  alternatives:
  - If a man rises
  - Even though a man has arisen
  lexicon: HALOT
  rationale: The waw + qatal here introduces a concessive circumstance in Abigail’s speech rather than simple sequential narrative. אָדָם is singular 'man,' referring concretely to an individual pursuer, not humankind.
- source_word: לִרְדָפְךָ
  chosen: to pursue you
  alternatives:
  - to chase you
  lexicon: HALOT
  rationale: רדף commonly means 'pursue' in hostile contexts; 'pursue' fits the threat against David’s life.
- source_word: וּלְבַקֵּשׁ אֶת נַפְשֶׁךָ
  chosen: and to seek your life
  alternatives:
  - and to seek your soul
  - and to seek your life away
  lexicon: HALOT
  rationale: נֶפֶשׁ in this context denotes life/self in the sense of one's life being targeted. 'Seek your life' is idiomatic English and preserves the lethal intent.
- source_word: נֶפֶשׁ אֲדֹנִי
  chosen: the life of my lord
  alternatives:
  - the soul of my lord
  - my lord's life
  lexicon: HALOT
  rationale: Abigail addresses David respectfully as 'my lord.' נֶפֶשׁ again refers to life/person, and 'the life of my lord' preserves the parallel with the enemies’ life.
- source_word: צְרוּרָה בִּצְרוֹר הַחַיִּים
  chosen: shall be bound in the bundle of the living
  alternatives:
  - shall be tied up in the bundle of life
  - shall be kept in the pouch of the living
  lexicon: HALOT
  rationale: This is a vivid metaphor of secure preservation. Retaining 'bound' and 'bundle' keeps the concrete imagery behind the idiom while remaining intelligible. 'Of the living' reflects the plural adjective הַחַיִּים.
- source_word: אֵת יְהוָה אֱלֹהֶיךָ
  chosen: with the LORD your God
  alternatives:
  - in the care of the LORD your God
  - by the LORD your God
  lexicon: HALOT
  rationale: The preposition אֵת here expresses association/companionship rather than direct object marking. 'With the LORD your God' is the most direct rendering and preserves the metaphor's theological force of safekeeping in God's presence.
- source_word: וְאֵת נֶפֶשׁ אֹיְבֶיךָ
  chosen: and the life of your enemies
  alternatives:
  - but the lives of your enemies
  - and the souls of your enemies
  lexicon: HALOT
  rationale: Singular נֶפֶשׁ used collectively with plural 'your enemies' is well represented by English singular collective 'the life of your enemies,' maintaining the contrast with David's life.
- source_word: יְקַלְּעֶנָּה
  chosen: he shall sling out
  alternatives:
  - he will hurl away
  - he will cast out
  lexicon: HALOT
  rationale: From קלע, 'to sling.' The verb intentionally echoes sling imagery and should be preserved rather than generalized to 'throw away.' The subject is implicitly God from the prior clause.
- source_word: בְּתוֹךְ כַּף הַקָּלַע
  chosen: from the hollow of the sling
  alternatives:
  - from the pocket of the sling
  - into the midst of the sling's palm
  lexicon: HALOT
  rationale: כַּף literally means palm/hollow. In sling imagery it refers to the pouch or hollow that holds the stone. 'Hollow of the sling' is vivid and reasonably literal.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives: []
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
