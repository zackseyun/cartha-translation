id: 1SA.25.25
reference: 1 Samuel 25:25
source:
  edition: WLC
  text: אַל נָ֣א יָשִׂ֣ים אֲדֹנִ֣/י אֶת לִבּ֡/וֹ אֶל אִישׁ֩ הַ/בְּלִיַּ֨עַל הַ/זֶּ֜ה
    עַל נָבָ֗ל כִּ֤י כִ/שְׁמ/וֹ֙ כֶּן ה֔וּא נָבָ֣ל שְׁמ֔/וֹ וּ/נְבָלָ֖ה עִמּ֑/וֹ וַֽ/אֲנִי֙
    אֲמָ֣תְ/ךָ֔ לֹ֥א רָאִ֛יתִי אֶת נַעֲרֵ֥י אֲדֹנִ֖/י אֲשֶׁ֥ר שָׁלָֽחְתָּ־׀־־־־־׃
translation:
  text: 'Please, my lord, do not set your heart on this worthless man, on Nabal, for
    as his name is, so is he: Nabal is his name, and folly is with him. But I, your
    female servant, did not see the young men of my lord whom you sent.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The name 'Nabal' sounds like the Hebrew word for 'foolish' or 'folly,' and
      Abigail's statement is a deliberate wordplay.
    reason: lexical_alternative
lexical_decisions:
- source_word: יָשִׂים אֶת־לִבּוֹ אֶל
  chosen: set your heart on
  alternatives:
  - pay attention to
  - take to heart
  - concern yourself with
  lexicon: HALOT
  rationale: The idiom literally involves 'placing the heart toward' someone. 'Set
    your heart on' preserves the Hebrew imagery while communicating the sense of giving
    serious regard or concern.
- source_word: אִישׁ הַבְּלִיַּעַל
  chosen: worthless man
  alternatives:
  - wicked man
  - scoundrel
  - base fellow
  lexicon: HALOT
  rationale: בְּלִיַּעַל in this context is a moral characterization meaning worthlessness
    or baseness, not a proper name. 'Worthless man' is a transparent rendering that
    preserves the insult without over-paraphrasing.
- source_word: נָבָל
  chosen: Nabal
  alternatives:
  - Fool (as a gloss in note)
  lexicon: HALOT
  rationale: As a personal name it should be transliterated per project philosophy.
    Because the verse makes a wordplay on the name and the noun/adjective idea of
    folly, the semantic force is preserved in the following clause rather than replacing
    the name in the main text.
- source_word: כִּי כִשְׁמוֹ כֶּן הוּא
  chosen: for as his name is, so is he
  alternatives:
  - for he is as his name
  - for his character matches his name
  lexicon: HALOT
  rationale: This keeps the proverbial structure and preserves the explicit link between
    name and character in the Hebrew.
- source_word: וּנְבָלָה עִמּוֹ
  chosen: and folly is with him
  alternatives:
  - and foolishness is with him
  - and disgrace is with him
  - and he is full of folly
  lexicon: HALOT
  rationale: נְבָלָה can denote folly or disgraceful behavior. Here, in the immediate
    wordplay with Nabal, 'folly' best preserves the semantic connection and the rhetorical
    force.
- source_word: אֲמָתְךָ
  chosen: your female servant
  alternatives:
  - your maidservant
  - your servant
  lexicon: HALOT
  rationale: The Hebrew specifically denotes a female servant/slave. 'Your female
    servant' is gender-accurate and readable modern English, preserving the humility
    formula without archaic diction.
- source_word: נַעֲרֵי
  chosen: the young men
  alternatives:
  - the servants
  - the messengers
  lexicon: HALOT
  rationale: נַעַר often refers to young men or attendants. In this narrative they
    are David's emissaries, but 'young men' stays closer to the lexical form while
    fitting the context.
- source_word: אֲדֹנִי
  chosen: my lord
  alternatives:
  - my master
  lexicon: HALOT
  rationale: Here Abigail addresses David respectfully. 'My lord' reflects the social-political
    honorific better than 'my master' in this context.
