id: 1SA.25.14
reference: 1 Samuel 25:14
source:
  edition: WLC
  text: וְ/לַ/אֲבִיגַ֨יִל֙ אֵ֣שֶׁת נָבָ֔ל הִגִּ֧יד נַֽעַר אֶחָ֛ד מֵ/הַ/נְּעָרִ֖ים
    לֵ/אמֹ֑ר הִנֵּ֣ה שָׁלַח֩ דָּוִ֨ד מַלְאָכִ֧ים מֵֽ/הַ/מִּדְבָּ֛ר לְ/בָרֵ֥ךְ אֶת
    אֲדֹנֵ֖י/נוּ וַ/יָּ֥עַט בָּ/הֶֽם־׀־׃
translation:
  text: But one of the young men told Abigail, Nabal’s wife, saying, “Look, David
    sent messengers from the wilderness to greet our master, and he screamed at them.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to bless our master.' The Hebrew verb often means 'bless,' but here
      likely refers to offering a courteous greeting or blessing.
    reason: lexical_alternative
  - marker: b
    text: Or 'he railed at them' / 'he flew at them.' The Hebrew verb is vivid and
      can suggest an aggressive outburst.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְלַאֲבִיגַיִל
  chosen: But ... Abigail
  alternatives:
  - And ... Abigail
  - Now ... Abigail
  lexicon: HALOT
  rationale: The prefixed conjunction marks continuation in narrative. 'But' best
    reflects the adversative turn from the previous verse, where Nabal rejected David's
    men, to the report made to Abigail.
- source_word: אֵשֶׁת נָבָל
  chosen: Nabal’s wife
  alternatives:
  - the wife of Nabal
  lexicon: HALOT
  rationale: Construct chain identifying Abigail by relation to Nabal. 'Nabal’s wife'
    is natural modern English while preserving the possessive sense.
- source_word: הִגִּיד
  chosen: told
  alternatives:
  - reported to
  - informed
  lexicon: HALOT
  rationale: The Hiphil of נגד commonly means to tell or report. 'Told' is concise
    and idiomatic in this direct-speech introduction.
- source_word: נַעַר אֶחָד מֵהַנְּעָרִים
  chosen: one of the young men
  alternatives:
  - one servant from among the servants
  - a young man, one of the servants
  lexicon: HALOT
  rationale: The phrase identifies a single member of a larger group of נערים. 'Young
    men' preserves the lexical sense; in this household context they are also servants,
    but the Hebrew term itself is broader, so the less interpretive rendering is preferred.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - and said
  - to say
  lexicon: HALOT
  rationale: Standard speech introducer; 'saying' preserves the formal transition
    into quoted speech.
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: A deictic particle drawing attention to the report. 'Look' is readable
    modern English without archaic tone.
- source_word: מַלְאָכִים
  chosen: messengers
  alternatives:
  - envoys
  - angels
  lexicon: HALOT
  rationale: In this human diplomatic context, 'messengers' is the clear sense; 'angels'
    would be misleading.
- source_word: מֵהַמִּדְבָּר
  chosen: from the wilderness
  alternatives:
  - from the desert
  - from the pastureland
  lexicon: HALOT
  rationale: מִדְבָּר here refers to the wilderness region where David and his men
    were staying. 'Wilderness' is the standard and contextually fitting rendering.
- source_word: לְבָרֵךְ
  chosen: to greet
  alternatives:
  - to bless
  - to ask after his welfare
  lexicon: HALOT
  rationale: Although ברך often means 'bless,' in social encounter contexts it can
    denote offering a greeting or blessing. Since David sent messengers to Nabal with
    a courteous salutation (cf. context in vv. 6–8), 'to greet' best captures the
    pragmatic sense in English. The more literal 'to bless' is preserved in a footnote.
- source_word: אֶת אֲדֹנֵינוּ
  chosen: our master
  alternatives:
  - our lord
  lexicon: HALOT
  rationale: In this servant-household setting, אֲדוֹן refers to the servants' master,
    not a divine title. 'Our master' communicates the social relationship clearly.
- source_word: וַיָּעַט בָּהֶם
  chosen: and he screamed at them
  alternatives:
  - and he flew upon them
  - and he railed at them
  - and he insulted them
  lexicon: HALOT
  rationale: The verb עָט literally can denote rushing upon or swooping, but in this
    context of verbal response to David's messengers it is idiomatically used for
    a harsh outburst. 'Screamed at them' captures the forceful, abusive reaction in
    contemporary English. A more formal alternative is preserved in a footnote.
