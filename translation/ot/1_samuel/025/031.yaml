id: 1SA.25.31
reference: 1 Samuel 25:31
source:
  edition: WLC
  text: וְ/לֹ֣א תִהְיֶ֣ה זֹ֣את לְ/ךָ֡ לְ/פוּקָה֩ וּ/לְ/מִכְשׁ֨וֹל לֵ֜ב לַ/אדֹנִ֗/י
    וְ/לִ/שְׁפָּךְ דָּם֙ חִנָּ֔ם וּ/לְ/הוֹשִׁ֥יעַ אֲדֹנִ֖/י ל֑/וֹ וְ/הֵיטִ֤ב יְהוָה֙
    לַֽ/אדֹנִ֔/י וְ/זָכַרְתָּ֖ אֶת אֲמָתֶֽ/ךָ׀־־׃ס
translation:
  text: this will not be a cause of grief to you or a stumbling block of heart to
    my lord—either by shedding blood without cause or by my lord avenging himself.
    When the LORD has dealt well with my lord, then remember your servant.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a cause of offense' / 'an occasion for remorse'; the Hebrew term is
      rare and may denote something that later causes painful regret.
    reason: lexical_alternative
  - marker: b
    text: Literally 'a stumbling block of heart.'
    reason: lexical_alternative
  - marker: c
    text: Or 'by my lord saving himself'; in context the phrase refers to David taking
      vengeance into his own hands.
    reason: lexical_alternative
  - marker: d
    text: Hebrew 'your maidservant,' a humble self-designation used by Abigail.
    reason: lexical_alternative
lexical_decisions:
- source_word: לְפוּקָה
  chosen: a cause of grief
  alternatives:
  - an occasion for staggering
  - a cause of offense
  - remorse
  lexicon: HALOT
  rationale: The noun is rare and denotes something like a stumbling, shock, or painful
    cause for regret. In this context Abigail is warning David against future moral
    anguish over rash bloodshed. 'Cause of grief' communicates the likely sense in
    natural English while preserving the forward-looking moral consequence.
- source_word: מִכְשׁוֹל לֵב
  chosen: a stumbling block of heart
  alternatives:
  - heartache
  - an offense of heart
  - a troubled conscience
  lexicon: HALOT
  rationale: Literally 'stumbling block of heart.' The phrase is metaphorical, referring
    to an inward moral obstacle or troubled conscience. I kept the imagery with slight
    smoothing into English rather than collapsing it entirely into interpretation.
- source_word: לַאדֹנִי / אֲדֹנִי
  chosen: my lord
  alternatives:
  - my master
  lexicon: HALOT
  rationale: Abigail addresses David respectfully with אֲדֹנִי. 'My lord' best reflects
    the deferential social register in context without implying divinity.
- source_word: לִשְׁפָּךְ דָּם חִנָּם
  chosen: by shedding blood without cause
  alternatives:
  - by shedding blood for nothing
  - by bloodshed without justification
  lexicon: HALOT
  rationale: The infinitive phrase explains the content of the future grief/stumbling.
    חִנָּם here means gratuitously or without just cause, not merely 'for free.' 'Without
    cause' is concise and morally clear.
- source_word: לְהוֹשִׁיעַ ... לוֹ
  chosen: by my lord avenging himself
  alternatives:
  - by my lord saving himself
  - by my lord securing victory for himself
  - by my lord taking matters into his own hands
  lexicon: HALOT
  rationale: Although the verb יָשַׁע normally means 'save/deliver,' in this context
    Abigail contrasts illegitimate self-help with waiting for the LORD's vindication.
    The idiom points to David obtaining justice for himself by violent action. 'Avenging
    himself' best fits the narrative situation and the parallel with bloodshed.
- source_word: וְהֵיטִב יְהוָה
  chosen: When the LORD has dealt well
  alternatives:
  - and the LORD does good
  - when the LORD does good
  lexicon: HALOT
  rationale: The perfect with waw here is naturally rendered in English as a future-oriented
    temporal clause in Abigail's speech. 'Has dealt well' captures beneficent action
    toward David.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD.'
- source_word: אֲמָתֶךָ
  chosen: your servant
  alternatives:
  - your maidservant
  - your female servant
  lexicon: HALOT
  rationale: The term is explicitly feminine, but in direct address 'your servant'
    is idiomatic English and preserves Abigail's humility. The feminine nuance is
    worth preserving in a footnote as a lexical alternative.
