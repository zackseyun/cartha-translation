id: 1SA.25.22
reference: 1 Samuel 25:22
source:
  edition: WLC
  text: כֹּה יַעֲשֶׂ֧ה אֱלֹהִ֛ים לְ/אֹיְבֵ֥י דָוִ֖ד וְ/כֹ֣ה יֹסִ֑יף אִם אַשְׁאִ֧יר
    מִ/כָּל אֲשֶׁר ל֛/וֹ עַד הַ/בֹּ֖קֶר מַשְׁתִּ֥ין בְּ/קִֽיר־־־־־׃
translation:
  text: May God do so to David’s enemies, and more also, if by morning I leave so
    much as one male of all who belong to him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''one who urinates against a wall,'' a crude idiom meaning ''male.'''
    reason: lexical_alternative
  - marker: b
    text: Some interpreters understand 'David’s enemies' as a scribal euphemism for
      'David' (or 'me'), since the usual oath formula is self-imprecatory.
    reason: textual_variant
lexical_decisions:
- source_word: כֹּה ... וְכֹה יֹסִיף
  chosen: May God do so ... and more also
  alternatives:
  - Thus may God do ... and thus may he add
  - May God do this ... and even more
  lexicon: HALOT
  rationale: This is a standard Hebrew oath/curse formula. English idiom is best conveyed
    with 'May God do so ... and more also,' preserving the imprecatory force without
    wooden repetition.
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: Although morphologically plural, the verb is singular and the sense is
    the singular deity in an oath formula, so 'God' is the natural English rendering.
- source_word: לְאֹיְבֵי דָוִד
  chosen: to David’s enemies
  alternatives:
  - to the enemies of David
  lexicon: HALOT
  rationale: The ketiv-like reading here has 'David’s enemies' rather than the more
    expected self-imprecation 'to David.' The MT wording is retained in translation
    rather than silently emended, even though context suggests a scribal euphemism
    or alteration.
- source_word: אִם
  chosen: if
  alternatives:
  - surely if
  - indeed if
  lexicon: HALOT
  rationale: 'In oath contexts אִם introduces the protasis with an implied negative/apodosis
    force. English can preserve the structure with ''if,'' allowing the curse formula
    to carry the sense: ''May God do so ... if I leave...''.'
- source_word: אַשְׁאִיר
  chosen: I leave
  alternatives:
  - I let remain
  - I spare
  lexicon: HALOT
  rationale: The Hiphil of שׁאר means 'leave/remain.' 'Leave' is concise and idiomatic
    here; 'spare' is possible but slightly more interpretive.
- source_word: מִכָּל אֲשֶׁר לוֹ
  chosen: of all who belong to him
  alternatives:
  - of all that is his
  - of anything that belongs to him
  lexicon: HALOT
  rationale: The following phrase specifies persons, so rendering the broader expression
    in a personal way fits the immediate context while remaining faithful to the possessive
    sense.
- source_word: עַד הַבֹּקֶר
  chosen: by morning
  alternatives:
  - until the morning
  - before morning
  lexicon: HALOT
  rationale: '''By morning'' is idiomatic modern English for the temporal limit intended.'
- source_word: מַשְׁתִּין בְּקִיר
  chosen: one male
  alternatives:
  - anyone who urinates against a wall
  - every male
  lexicon: HALOT
  rationale: This Hebrew idiom refers contemptuously to males. 'One male' preserves
    the referent clearly in readable English, while the more literal expression is
    preserved in a footnote because it is a significant lexical feature.
