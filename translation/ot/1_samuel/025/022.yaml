theological_decisions:
- issue: Masoretic wording 'David’s enemies' in the oath formula
  chosen_reading: Retain the MT as 'David’s enemies' in the main text
  alternative_readings:
  - Emend implicitly to 'David' or 'to me,' treating 'David’s enemies' as a euphemistic
    scribal alteration
  rationale: The source text given is the Masoretic wording, and the translation philosophy
    prioritizes original-language primacy and transparency. Because the contextual
    difficulty is real, the alternative is preserved in a footnote rather than resolved
    silently in the main text.
  doctrine_reference: Translation philosophy §§1, 3, 5
