id: 1SA.25.43
reference: 1 Samuel 25:43
source:
  edition: WLC
  text: וְ/אֶת אֲחִינֹ֛עַם לָקַ֥ח דָּוִ֖ד מִֽ/יִּזְרְעֶ֑אל וַ/תִּהְיֶ֛יןָ גַּֽם שְׁתֵּי/הֶ֥ן
    ל֖/וֹ לְ/נָשִֽׁים־־׃ס
translation:
  text: David also took Ahinoam from Jezreel, and both of them became his wives.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Ahinoam of Jezreel' / 'Ahinoam the Jezreelite.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'and both of them became wives to him.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לָקַח
  chosen: took
  alternatives:
  - married
  lexicon: HALOT
  rationale: The verb literally means 'took.' In this marital context it refers to
    taking a woman as wife, but 'took' preserves the Hebrew wording while the following
    clause clarifies the marital sense.
- source_word: אֲחִינֹעַם
  chosen: Ahinoam
  rationale: Personal names are transliterated by standard convention.
- source_word: מִיִּזְרְעֶאל
  chosen: from Jezreel
  alternatives:
  - the Jezreelite
  lexicon: HALOT
  rationale: The prefixed preposition מִן with the place name yields 'from Jezreel.'
    English could idiomatically say 'Ahinoam of Jezreel' or 'the Jezreelite,' but
    'from Jezreel' most directly reflects the Hebrew form.
- source_word: וַתִּהְיֶיןָ גַּם שְׁתֵּיהֶן
  chosen: and both of them became
  alternatives:
  - so both of them were
  lexicon: HALOT
  rationale: The feminine plural verb with 'both of them' refers to Abigail and Ahinoam
    together. 'Became' reflects the verbal sense of היה in this construction, though
    idiomatic English could also use 'were.'
- source_word: לְנָשִׁים
  chosen: his wives
  alternatives:
  - wives to him
  lexicon: HALOT
  rationale: The phrase לּוֹ לְנָשִׁים is an idiom meaning 'as wives to him.' Rendering
    it 'his wives' is natural English and preserves the plural marital sense.
- source_word: גַּם
  chosen: also
  alternatives:
  - too
  lexicon: HALOT
  rationale: 'The particle marks addition: besides Abigail, David took Ahinoam also.'
