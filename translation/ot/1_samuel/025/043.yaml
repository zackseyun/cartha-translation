theological_decisions:
- issue: Polygynous marriage description
  chosen_reading: 'The verse is rendered descriptively: David had two wives.'
  alternative_readings:
  - A more euphemistic rendering that softens the plural marriage reference
  rationale: The Hebrew plainly states that both women became David's wives. The translation
    should neither obscure nor moralize beyond the text.
  doctrine_reference: 'Translation philosophy: Never import doctrinal claims the text
    does not make; preserve the source text''s plain sense.'
