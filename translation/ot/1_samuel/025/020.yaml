id: 1SA.25.20
reference: 1 Samuel 25:20
source:
  edition: WLC
  text: וְ/הָיָ֞ה הִ֣יא רֹכֶ֣בֶת עַֽל הַ/חֲמ֗וֹר וְ/יֹרֶ֨דֶת֙ בְּ/סֵ֣תֶר הָ/הָ֔ר וְ/הִנֵּ֤ה
    דָוִד֙ וַ/אֲנָשָׁ֔י/ו יֹרְדִ֖ים לִ/קְרָאתָ֑/הּ וַ/תִּפְגֹּ֖שׁ אֹתָֽ/ם׀־׃
translation:
  text: And as she was riding on the donkey and going down under cover of the mountain,
    behold, David and his men were coming down to meet her, and she met them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'on the hidden side of the mountain.' The Hebrew phrase refers to a concealed
      or sheltered area of the mountain.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה הִיא
  chosen: And as she was
  alternatives:
  - And it happened, she was
  - Now she was
  lexicon: HALOT
  rationale: The waw + היה introduces the scene in narrative. Rendering it as 'And
    as she was' preserves the temporal/narrative force in natural English without
    the wooden 'and it happened.'
- source_word: רֹכֶבֶת עַל הַחֲמוֹר
  chosen: riding on the donkey
  alternatives:
  - riding on the ass
  - mounted on the donkey
  lexicon: HALOT
  rationale: רכב means 'ride/mount.' חמור is the ordinary term for a donkey. 'Donkey'
    is standard modern English and avoids archaic wording.
- source_word: וְיֹרֶדֶת
  chosen: and going down
  alternatives:
  - and descending
  lexicon: HALOT
  rationale: The participle continues the ongoing action. 'Going down' is idiomatic
    modern English and fits the terrain context.
- source_word: בְּסֵתֶר הָהָר
  chosen: under cover of the mountain
  alternatives:
  - in the concealment of the mountain
  - on the hidden side of the mountain
  - by the mountain's cover
  lexicon: HALOT
  rationale: סתר denotes covering, secrecy, or concealment. In this topographical
    context it refers to the sheltered/hidden side of the hill or mountain. 'Under
    cover of the mountain' preserves the concealment nuance while remaining readable.
- source_word: וְהִנֵּה
  chosen: behold
  alternatives:
  - and look
  - suddenly
  lexicon: HALOT
  rationale: הנה marks vividness and draws attention to a new development. 'Behold'
    preserves the discourse force more transparently than omitting it, while remaining
    acceptable in elevated narrative style.
- source_word: יֹרְדִים לִקְרָאתָהּ
  chosen: were coming down to meet her
  alternatives:
  - were descending toward her
  - were going down to encounter her
  lexicon: HALOT
  rationale: ירד is 'go/come down'; לקראת indicates movement to meet someone. Because
    the motion is oriented toward Abigail from the narrator's perspective, 'coming
    down to meet her' is natural English.
- source_word: וַתִּפְגֹּשׁ אֹתָם
  chosen: and she met them
  alternatives:
  - and she encountered them
  lexicon: HALOT
  rationale: פגש means 'meet, encounter.' 'Met' is the most natural narrative rendering
    and matches the straightforward action.
