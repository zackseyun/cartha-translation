id: 1SA.25.5
reference: 1 Samuel 25:5
source:
  edition: WLC
  text: וַ/יִּשְׁלַ֥ח דָּוִ֖ד עֲשָׂרָ֣ה נְעָרִ֑ים וַ/יֹּ֨אמֶר דָּוִ֜ד לַ/נְּעָרִ֗ים
    עֲל֤וּ כַרְמֶ֨לָ/ה֙ וּ/בָאתֶ֣ם אֶל נָבָ֔ל וּ/שְׁאֶלְתֶּם ל֥/וֹ בִ/שְׁמִ֖/י לְ/שָׁלֽוֹם־־׃
translation:
  text: So David sent ten young men, and David said to the young men, “Go up to Carmel,
    and go to Nabal, and ask him in my name about his well-being.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'ask him for peace,' that is, inquire after his welfare with a greeting
      of peace.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלַח
  chosen: sent
  alternatives:
  - dispatched
  lexicon: HALOT
  rationale: Standard rendering of שלח in narrative context; 'sent' is natural modern
    English and preserves the simple verbal action.
- source_word: עֲשָׂרָה נְעָרִים
  chosen: ten young men
  alternatives:
  - ten servants
  - ten youths
  lexicon: HALOT
  rationale: נְעָרִים commonly denotes young men/servants depending on context. Here
    they are David's messengers, but the term itself primarily identifies them as
    young men; 'young men' preserves the lexical sense without over-specifying social
    status.
- source_word: עֲלוּ
  chosen: Go up
  alternatives:
  - ascend
  lexicon: HALOT
  rationale: עלה often means 'go up' in travel, whether for elevation or conventional
    directional movement. 'Go up' keeps the Hebrew idiom in readable English.
- source_word: כַרְמֶלָה
  chosen: to Carmel
  alternatives:
  - toward Carmel
  lexicon: HALOT
  rationale: The directional he on the place name indicates motion toward the location.
    English idiom is best expressed simply as 'to Carmel.'
- source_word: וּבָאתֶם אֶל נָבָל
  chosen: and go to Nabal
  alternatives:
  - and come to Nabal
  lexicon: HALOT
  rationale: בוא literally means 'come,' but in reported instructions from David to
    his messengers, English normally uses 'go to' from the speakers' perspective.
    This is a justified dynamic adjustment within optimal equivalence.
- source_word: וּשְׁאֶלְתֶּם לוֹ
  chosen: ask him
  alternatives:
  - inquire of him
  - greet him by asking
  lexicon: HALOT
  rationale: שאל with ל can mean ask/inquire of someone. Here it introduces the greeting
    formula that is completed by לְשָׁלוֹם, so 'ask him' is concise and lets the following
    phrase carry the idiomatic sense.
- source_word: בִּשְׁמִי
  chosen: in my name
  alternatives:
  - on my behalf
  lexicon: HALOT
  rationale: Literally 'in my name.' This can imply representation, but the Hebrew
    wording is straightforward and should be preserved in the main text.
- source_word: לְשָׁלוֹם
  chosen: about his well-being
  alternatives:
  - peace
  - for peace
  - how he is
  lexicon: HALOT
  rationale: In this context שָׁלוֹם refers to welfare/well-being in a greeting inquiry,
    not merely abstract peace. 'About his well-being' communicates the idiomatic force
    in natural English while retaining the sense of asking after someone's peace.
