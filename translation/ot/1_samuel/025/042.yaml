id: 1SA.25.42
reference: 1 Samuel 25:42
source:
  edition: WLC
  text: וַ/תְּמַהֵ֞ר וַ/תָּ֣קָם אֲבִיגַ֗יִל וַ/תִּרְכַּב֙ עַֽל הַ/חֲמ֔וֹר וְ/חָמֵשׁ֙
    נַעֲרֹתֶ֔י/הָ הַ/הֹלְכ֖וֹת לְ/רַגְלָ֑/הּ וַ/תֵּ֗לֶךְ אַֽחֲרֵי֙ מַלְאֲכֵ֣י דָוִ֔ד
    וַ/תְּהִי ל֖/וֹ לְ/אִשָּֽׁה־־׃
translation:
  text: Abigail quickly got up and rode on the donkey, with five of her young women
    going after her; she went after David's messengers and became his wife.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with five of her maidservants following her.' The Hebrew for 'young
      women' can also refer to female attendants or servants, and the idiom literally
      reads 'going at her feet.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתְּמַהֵר
  chosen: quickly
  alternatives:
  - hurried
  - made haste
  lexicon: HALOT
  rationale: The verb means to hasten. Rendering it adverbially with 'quickly' in
    English avoids awkward repetition with the following finite verbs while preserving
    the sense of prompt action.
- source_word: וַתָּקָם
  chosen: got up
  alternatives:
  - arose
  - stood up
  lexicon: HALOT
  rationale: Qal of קום commonly means 'arise/get up.' 'Got up' is natural modern
    English and fits the narrative sequence.
- source_word: וַתִּרְכַּב עַל הַחֲמוֹר
  chosen: rode on the donkey
  alternatives:
  - mounted the donkey
  - rode the donkey
  lexicon: HALOT
  rationale: The phrase literally indicates riding upon the donkey. 'Rode on the donkey'
    is clear and idiomatic while retaining the concrete image.
- source_word: הַחֲמוֹר
  chosen: the donkey
  alternatives:
  - a donkey
  - the ass
  lexicon: HALOT
  rationale: The article is present in Hebrew, so 'the donkey' is retained. 'Ass'
    is avoided as archaic in modern English.
- source_word: נַעֲרֹתֶיהָ
  chosen: her young women
  alternatives:
  - her maidservants
  - her servant girls
  - her young female servants
  lexicon: HALOT
  rationale: נַעֲרָה can denote a young woman or female attendant. In this context
    they accompany Abigail as attendants, but the term itself foregrounds age/sex
    more than servile status. 'Young women' preserves the lexical sense without over-specifying
    social status.
- source_word: הַהֹלְכוֹת לְרַגְלָהּ
  chosen: going after her
  alternatives:
  - walking at her feet
  - following her
  - attending her
  lexicon: HALOT
  rationale: Literally 'going at her feet,' an idiom for accompanying/following on
    foot. 'Going after her' preserves the movement and avoids an opaque literalism.
- source_word: אַחֲרֵי מַלְאֲכֵי דָוִד
  chosen: after David's messengers
  alternatives:
  - behind David's messengers
  - following David's messengers
  lexicon: HALOT
  rationale: מַלְאָךְ here refers to human envoys, not angels. 'Messengers' is the
    standard contextual rendering. 'After' preserves the directional sense of אַחֲרֵי.
- source_word: וַתְּהִי לוֹ לְאִשָּׁה
  chosen: became his wife
  alternatives:
  - was his wife
  - became a wife to him
  lexicon: HALOT
  rationale: This idiom marks entry into marriage. 'Became his wife' is idiomatic
    English and reflects the transition expressed by היה + ל + אשה.
