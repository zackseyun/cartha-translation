id: 1SA.25.3
reference: 1 Samuel 25:3
source:
  edition: WLC
  text: וְ/שֵׁ֤ם הָ/אִישׁ֙ נָבָ֔ל וְ/שֵׁ֥ם אִשְׁתּ֖/וֹ אֲבִגָ֑יִל וְ/הָ/אִשָּׁ֤ה טֽוֹבַת
    שֶׂ֨כֶל֙ וִ֣/יפַת תֹּ֔אַר וְ/הָ/אִ֥ישׁ קָשֶׁ֛ה וְ/רַ֥ע מַעֲלָלִ֖ים וְ/ה֥וּא כ/לב/ו־׃
translation:
  text: Now the man's name was Nabal, and his wife's name was Abigail. The woman was
    intelligent and beautiful in appearance, but the man was harsh and evil in his
    dealings; he was a Calebite.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew probably means 'a Calebite,' that is, a member of Caleb's clan; the
      written form is unusual, and some note the possibility of reading it differently.
    reason: textual_variant
lexical_decisions:
- source_word: נָבָל
  chosen: Nabal
  lexicon: HALOT
  rationale: Proper name; transliterated per translation philosophy for personal names.
- source_word: אֲבִגָיִל
  chosen: Abigail
  lexicon: HALOT
  rationale: Proper name; standard English transliteration.
- source_word: טוֹבַת שֶׂכֶל
  chosen: intelligent
  alternatives:
  - of good understanding
  - discerning
  lexicon: HALOT
  rationale: The phrase literally means 'good of understanding/sense.' 'Intelligent'
    gives clear modern English while preserving the commendatory sense of mental discernment.
    'Discerning' is possible, but 'intelligent' better balances readability and lexical
    force here.
- source_word: וִיפַת תֹּאַר
  chosen: beautiful in appearance
  alternatives:
  - beautiful
  - of beautiful form
  lexicon: HALOT
  rationale: The construction emphasizes physical attractiveness or form. 'Beautiful
    in appearance' preserves the concrete sense without sounding wooden.
- source_word: קָשֶׁה
  chosen: harsh
  alternatives:
  - hard
  - severe
  lexicon: HALOT
  rationale: Describes Nabal's difficult, hard disposition. 'Harsh' fits the interpersonal
    context better than the more literal but less idiomatic 'hard.'
- source_word: רַע מַעֲלָלִים
  chosen: evil in his dealings
  alternatives:
  - evil in his deeds
  - bad in his actions
  lexicon: HALOT
  rationale: מַעֲלָלִים refers to deeds, practices, or conduct. 'In his dealings'
    captures behavior toward others in this narrative context and reads naturally
    in English.
- source_word: כלבו
  chosen: a Calebite
  alternatives:
  - of the house of Caleb
  - like his heart
  lexicon: HALOT
  rationale: 'The ketiv/qere issue and consonantal form are commonly understood ethnically/genealogically
    here: ''a Calebite,'' identifying clan descent. This fits the narrative setting
    and standard interpretation better than a literal reading tied to ''heart.'' The
    alternative is worth preserving because the written form has generated discussion.'
