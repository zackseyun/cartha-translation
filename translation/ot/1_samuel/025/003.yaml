theological_decisions:
- issue: Interpretation of וְהוּא כלבו
  chosen_reading: he was a Calebite
  alternative_readings:
  - he was of the house of Caleb
  - the written form could be read differently from the traditional reading
  rationale: This is primarily a textual/lexical issue rather than a doctrinal one.
    The traditional understanding takes the phrase as a gentilicial reference to Caleb/Calebite,
    which best suits the context and ancient versions. Because the form is unusual
    and discussed, the alternative is preserved in a footnote rather than resolved
    silently.
  doctrine_reference: 'Translation philosophy #3 (preserve genuine ambiguity where
    relevant)'
