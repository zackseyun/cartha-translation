id: 1SA.25.36
reference: 1 Samuel 25:36
source:
  edition: WLC
  text: וַ/תָּבֹ֣א אֲבִיגַ֣יִל אֶל נָבָ֡ל וְ/הִנֵּה ל/וֹ֩ מִשְׁתֶּ֨ה בְּ/בֵית֜/וֹ
    כְּ/מִשְׁתֵּ֣ה הַ/מֶּ֗לֶךְ וְ/לֵ֤ב נָבָל֙ ט֣וֹב עָלָ֔י/ו וְ/ה֥וּא שִׁכֹּ֖ר עַד
    מְאֹ֑ד וְ/לֹֽא הִגִּ֣ידָה לּ֗/וֹ דָּבָ֥ר קָטֹ֛ן וְ/גָד֖וֹל עַד א֥וֹר הַ/בֹּֽקֶר׀־־־־־׃
translation:
  text: When Abigail came to Nabal, behold, he was holding a feast in his house like
    the feast of a king, and Nabal’s heart was merry within him, and he was very drunk.
    So she told him nothing at all, small or great, until the light of morning.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''small or great,'' an idiom meaning ''nothing at all.'''
    reason: lexical_alternative
  - marker: b
    text: 'Or ''until daybreak.'' Hebrew: ''until the light of morning.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתָּבֹא
  chosen: When Abigail came
  alternatives:
  - Then Abigail came
  - And Abigail came
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. Rendering with 'When' smoothly
    connects the action to what follows in English while preserving temporal sequence.
- source_word: וְהִנֵּה
  chosen: behold
  alternatives:
  - look
  - there he was
  lexicon: HALOT
  rationale: Retains the deictic, scene-setting force of the Hebrew interjection without
    paraphrasing it away.
- source_word: מִשְׁתֶּה
  chosen: a feast
  alternatives:
  - a banquet
  - a drinking feast
  lexicon: HALOT
  rationale: The noun denotes a feast/banquet, often with drinking. 'Feast' is natural
    English and fits the comparison to a king's feast; the drunkenness is stated explicitly
    later, so 'drinking feast' is unnecessary in the main text.
- source_word: בְּבֵיתוֹ
  chosen: in his house
  alternatives:
  - at his house
  - in his home
  lexicon: HALOT
  rationale: A straightforward locative rendering of the Hebrew phrase.
- source_word: כְּמִשְׁתֵּה הַמֶּלֶךְ
  chosen: like the feast of a king
  alternatives:
  - like a king's feast
  - like the banquet of a king
  lexicon: HALOT
  rationale: Preserves the simile and the indefinite sense of royal-style extravagance.
    'Like the feast of a king' is slightly more formal and mirrors the Hebrew structure.
- source_word: לֵב נָבָל טוֹב עָלָיו
  chosen: Nabal’s heart was merry within him
  alternatives:
  - Nabal was in high spirits
  - Nabal's heart was glad in him
  lexicon: HALOT
  rationale: The idiom literally speaks of the heart being good/uplifted upon him.
    'Was merry within him' preserves the internal-state imagery better than the more
    interpretive 'in high spirits,' especially in a feast context.
- source_word: שִׁכֹּר עַד מְאֹד
  chosen: he was very drunk
  alternatives:
  - he was exceedingly drunk
  - he was drunk to a great degree
  lexicon: HALOT
  rationale: Clear, idiomatic rendering of the adjective plus intensifier. 'Very drunk'
    is natural modern English and preserves the severity.
- source_word: וְלֹא הִגִּידָה לוֹ
  chosen: So she told him nothing
  alternatives:
  - and she did not tell him
  - she reported nothing to him
  lexicon: HALOT
  rationale: The clause gives the resulting action in context. 'So she told him nothing'
    reads naturally in English while preserving the negated declaration.
- source_word: דָּבָר קָטֹן וְגָדוֹל
  chosen: nothing at all, small or great
  alternatives:
  - anything, little or much
  - a thing, small or great
  lexicon: HALOT
  rationale: This Hebrew merism means nothing whatsoever. Including 'small or great'
    preserves the idiomatic pair rather than flattening it entirely.
- source_word: עַד אוֹר הַבֹּקֶר
  chosen: until the light of morning
  alternatives:
  - until morning light
  - until daybreak
  - until the morning
  lexicon: HALOT
  rationale: Literally 'until the light of the morning.' This rendering preserves
    the imagery while remaining readable. 'Daybreak' is possible but slightly more
    interpretive.
