id: 1SA.25.40
reference: 1 Samuel 25:40
source:
  edition: WLC
  text: וַ/יָּבֹ֜אוּ עַבְדֵ֥י דָוִ֛ד אֶל אֲבִיגַ֖יִל הַ/כַּרְמֶ֑לָ/ה וַ/יְדַבְּר֤וּ
    אֵלֶ֨י/הָ֙ לֵ/אמֹ֔ר דָּוִד֙ שְׁלָחָ֣/נוּ אֵלַ֔יִ/ךְ לְ/קַחְתֵּ֥/ךְ ל֖/וֹ לְ/אִשָּֽׁה־׃
translation:
  text: So David’s servants came to Abigail at Carmel and spoke to her, saying, “David
    has sent us to you to take you for himself as a wife.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to marry you'; literally, 'to take you ... as a wife.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹאוּ
  chosen: came
  alternatives:
  - went
  lexicon: HALOT
  rationale: The verb בוא commonly means 'come/go' depending on viewpoint. Since the
    narrative perspective is toward Abigail's location, 'came' is the natural English
    rendering.
- source_word: עַבְדֵי דָוִד
  chosen: David’s servants
  alternatives:
  - David’s men
  - David’s slaves
  lexicon: HALOT
  rationale: עֶבֶד can mean servant, slave, or official depending on context. Here
    these are David's emissaries acting in loyal service, without emphasis on bonded
    status, so 'servants' best fits the context and English style.
- source_word: אֶל אֲבִיגַיִל
  chosen: to Abigail
  alternatives:
  - unto Abigail
  lexicon: HALOT
  rationale: The preposition אֶל is straightforwardly directional; 'to Abigail' is
    idiomatic modern English.
- source_word: הַכַּרְמֶלָה
  chosen: at Carmel
  alternatives:
  - to Carmel
  - the Carmelite woman
  lexicon: HALOT
  rationale: The directional ending on Carmel marks movement toward Carmel, but in
    English the clause is best completed as arrival 'at Carmel.' The form modifies
    location, not Abigail's identity, so it is not rendered adjectivally.
- source_word: וַיְדַבְּרוּ אֵלֶיהָ לֵאמֹר
  chosen: spoke to her, saying
  alternatives:
  - said to her
  - addressed her, saying
  lexicon: HALOT
  rationale: This is a standard Hebrew speech-introduction formula. 'Spoke to her,
    saying' preserves the formal structure while remaining readable.
- source_word: שְׁלָחָנוּ
  chosen: has sent us
  alternatives:
  - sent us
  lexicon: HALOT
  rationale: The perfect with first person plural suffix reports completed action
    with present relevance. 'Has sent us' captures the emissary sense naturally in
    English.
- source_word: לְקַחְתֵּךְ
  chosen: to take you
  alternatives:
  - to receive you
  - to marry you
  lexicon: HALOT
  rationale: לקח in marriage contexts often means 'take' a woman as wife. Rendering
    it as 'take you' preserves the Hebrew wording, while the following phrase 'as
    a wife' clarifies the marital sense.
- source_word: לוֹ
  chosen: for himself
  alternatives:
  - for him
  lexicon: HALOT
  rationale: 'The pronoun refers back to David. ''For himself'' makes explicit the
    reflexive sense in English idiom: David is taking Abigail as his own wife.'
- source_word: לְאִשָּׁה
  chosen: as a wife
  alternatives:
  - for a wife
  - to be his wife
  lexicon: HALOT
  rationale: This is the standard Hebrew marriage expression. 'As a wife' is clear,
    idiomatic, and closely aligned with the source.
