id: 1SA.25.2
reference: 1 Samuel 25:2
source:
  edition: WLC
  text: וְ/אִ֨ישׁ בְּ/מָע֜וֹן וּ/מַעֲשֵׂ֣/הוּ בַ/כַּרְמֶ֗ל וְ/הָ/אִישׁ֙ גָּד֣וֹל מְאֹ֔ד
    וְ/ל֛/וֹ צֹ֥אן שְׁלֹֽשֶׁת אֲלָפִ֖ים וְ/אֶ֣לֶף עִזִּ֑ים וַ/יְהִ֛י בִּ/גְזֹ֥ז אֶת
    צֹאנ֖/וֹ בַּ/כַּרְמֶֽל־־׃
translation:
  text: Now there was a man in Maon whose business was in Carmel. The man was very
    wealthy, and he had three thousand sheep and a thousand goats. He was in Carmel
    shearing his sheep.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'whose work/property was in Carmel.' The Hebrew term can refer broadly
      to a person's work, affairs, or holdings.
    reason: lexical_alternative
  - marker: b
    text: Or 'the man was very great,' that is, socially or economically prominent.
    reason: lexical_alternative
lexical_decisions:
- source_word: אִישׁ
  chosen: a man
  alternatives:
  - a certain man
  lexicon: HALOT
  rationale: Common narrative introduction; 'a man' is natural English and preserves
    the indefinite sense without over-specifying.
- source_word: בְּמָעוֹן
  chosen: in Maon
  lexicon: HALOT
  rationale: Toponym transliterated per philosophy to transliterate names rather than
    translate them.
- source_word: מַעֲשֵׂהוּ
  chosen: whose business was
  alternatives:
  - whose work was
  - whose property was
  - whose holdings were
  lexicon: HALOT
  rationale: The noun can denote work, activity, or affairs/property. In this context,
    contrasting residence in Maon with economic operations in Carmel, 'business was'
    best captures the sense of his productive enterprise/estate without wooden literalism.
- source_word: בַכַּרְמֶל
  chosen: in Carmel
  lexicon: HALOT
  rationale: Toponym transliterated. Here it refers to the place Carmel, not the common
    noun 'orchard/vineyard'.
- source_word: הָאִישׁ גָּדוֹל מְאֹד
  chosen: The man was very wealthy
  alternatives:
  - the man was very great
  - the man was very prominent
  - the man was very rich
  lexicon: HALOT
  rationale: Hebrew 'great' in this context refers to social/economic status, as confirmed
    by the following livestock totals. 'Very wealthy' communicates the idiomatic sense
    in clear modern English.
- source_word: וְלוֹ צֹאן שְׁלֹשֶׁת אֲלָפִים וְאֶלֶף עִזִּים
  chosen: and he had three thousand sheep and a thousand goats
  alternatives:
  - and there belonged to him three thousand sheep and a thousand goats
  lexicon: HALOT
  rationale: Possessive ל plus livestock count is naturally rendered 'he had.' Numbers
    are translated straightforwardly.
- source_word: וַיְהִי בִּגְזֹז אֶת־צֹאנוֹ
  chosen: He was ... shearing his sheep
  alternatives:
  - and it happened, while he was shearing his sheep
  - and he came to be shearing his sheep
  lexicon: HALOT
  rationale: The wayyiqtol plus infinitive construct introduces the circumstance/event
    in progress. English smooths the Hebrew narrative formula to 'He was ... shearing
    his sheep' without losing the temporal sense.
- source_word: בַכַּרְמֶל
  chosen: in Carmel
  lexicon: HALOT
  rationale: Repeated place reference retained explicitly in English to match the
    Hebrew and set the scene for the following narrative.
