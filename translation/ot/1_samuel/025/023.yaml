id: 1SA.25.23
reference: 1 Samuel 25:23
source:
  edition: WLC
  text: וַ/תֵּ֤רֶא אֲבִיגַ֨יִל֙ אֶת דָּוִ֔ד וַ/תְּמַהֵ֕ר וַ/תֵּ֖רֶד מֵ/עַ֣ל הַ/חֲמ֑וֹר
    וַ/תִּפֹּ֞ל לְ/אַפֵּ֤י דָוִד֙ עַל פָּנֶ֔י/הָ וַ/תִּשְׁתַּ֖חוּ אָֽרֶץ־־׃
translation:
  text: When Abigail saw David, she hurried and got down from the donkey, and fell
    before David on her face and bowed to the ground.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'prostrated herself to the ground.' The Hebrew verb can denote deep bowing
      or prostration; here it describes Abigail's act of homage before David, not
      necessarily worship.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתֵּרֶא
  chosen: saw
  alternatives:
  - caught sight of
  lexicon: HALOT
  rationale: The verb ראה in this narrative context is the ordinary verb for seeing.
    'Saw' is the plain and natural English equivalent.
- source_word: וַתְּמַהֵר
  chosen: hurried
  alternatives:
  - made haste
  - quickly
  lexicon: HALOT
  rationale: מהר denotes acting quickly. 'Hurried' is idiomatic modern English and
    preserves the narrative urgency without archaic tone.
- source_word: וַתֵּרֶד מֵעַל הַחֲמוֹר
  chosen: got down from the donkey
  alternatives:
  - came down from the donkey
  - dismounted from the donkey
  lexicon: HALOT
  rationale: ירד means 'go down/come down.' In context of riding an animal, 'got down
    from' is natural English. 'Dismounted' is possible but slightly more interpretive
    and elevated in register.
- source_word: הַחֲמוֹר
  chosen: the donkey
  alternatives:
  - the ass
  lexicon: HALOT
  rationale: חמור is 'donkey.' This is the standard modern English rendering; 'ass'
    is now potentially distracting.
- source_word: וַתִּפֹּל לְאַפֵּי דָוִד
  chosen: fell before David
  alternatives:
  - fell at David's feet
  - fell before the face of David
  lexicon: HALOT
  rationale: The idiom לִפְנֵי / לְאַפֵּי with a person indicates falling before someone
    in submission. 'Before David' captures the sense without over-literal awkwardness.
    'At David's feet' is interpretive because 'feet' is not in the Hebrew.
- source_word: עַל פָּנֶיהָ
  chosen: on her face
  alternatives:
  - with her face to the ground
  - face down
  lexicon: HALOT
  rationale: The phrase is spatially concrete and should be preserved. 'On her face'
    is a standard biblical-English expression that remains understandable in modern
    English.
- source_word: וַתִּשְׁתַּחוּ אָרֶץ
  chosen: bowed to the ground
  alternatives:
  - prostrated herself to the ground
  - worshiped on the ground
  lexicon: HALOT
  rationale: שׁחה in this human-to-human setting denotes bowing/prostration in homage,
    not necessarily worship in a theological sense. 'Bowed to the ground' preserves
    the gesture clearly and avoids implying divine worship.
