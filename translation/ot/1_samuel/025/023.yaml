theological_decisions:
- issue: Rendering of שׁחה in a human encounter
  chosen_reading: bowed to the ground
  alternative_readings:
  - prostrated herself to the ground
  - worshiped
  rationale: Because the action is directed toward David, the verb should be rendered
    as an act of obeisance rather than divine worship. This preserves the social posture
    without importing theological worship language.
  doctrine_reference: Translation philosophy §1, §6
