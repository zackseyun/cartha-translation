id: 1SA.25.16
reference: 1 Samuel 25:16
source:
  edition: WLC
  text: חוֹמָה֙ הָי֣וּ עָלֵ֔י/נוּ גַּם לַ֖יְלָה גַּם יוֹמָ֑ם כָּל יְמֵ֛י הֱיוֹתֵ֥/נוּ
    עִמָּ֖/ם רֹעִ֥ים הַ/צֹּֽאן־־־׃
translation:
  text: They were a wall around us both by night and by day, all the days we were
    with them tending the flock.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'They were a wall over us,' preserving the more literal force of the
      preposition; the sense is protective presence surrounding them.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the flock' (צאן), a collective term that can include sheep and goats.
    reason: lexical_alternative
lexical_decisions:
- source_word: חוֹמָה
  chosen: a wall
  alternatives:
  - protection
  - a protective wall
  lexicon: HALOT
  rationale: Literal noun meaning 'wall.' In context it is metaphorical for protection,
    but retaining 'wall' preserves the vivid image and the source text's concreteness.
- source_word: הָיוּ
  chosen: were
  alternatives:
  - became
  lexicon: HALOT
  rationale: Qal perfect of היה here functions as a simple past/copular verb describing
    the men's ongoing role.
- source_word: עָלֵינוּ
  chosen: around us
  alternatives:
  - over us
  - upon us
  - for us
  lexicon: HALOT
  rationale: Although על commonly means 'upon/over,' with 'wall' the idiomatic sense
    is protective encirclement. 'Around us' best conveys the Hebrew sense in natural
    English.
- source_word: גַּם לַיְלָה גַּם יוֹמָם
  chosen: both by night and by day
  alternatives:
  - both night and day
  - at night as well as by day
  lexicon: HALOT
  rationale: The paired גם...גם construction emphasizes continual protection across
    the full daily cycle. 'By night and by day' is idiomatic and preserves the emphasis.
- source_word: כָּל יְמֵי
  chosen: all the days
  alternatives:
  - the whole time
  - throughout all the time
  lexicon: HALOT
  rationale: A formally close rendering that preserves the temporal expression without
    unnecessary paraphrase.
- source_word: הֱיוֹתֵנוּ עִמָּם
  chosen: we were with them
  alternatives:
  - our being with them
  - while we were with them
  lexicon: HALOT
  rationale: Infinitive construct with pronominal suffix expresses the time frame.
    Rendering as a finite clause gives clear modern English while preserving the temporal
    sense.
- source_word: רֹעִים
  chosen: tending
  alternatives:
  - shepherding
  - being shepherds of
  lexicon: HALOT
  rationale: From רעה, 'to pasture/shepherd.' 'Tending' is natural English for the
    activity here and avoids awkwardness, while still reflecting the pastoral work.
- source_word: הַצֹּאן
  chosen: the flock
  alternatives:
  - the sheep
  - the small livestock
  lexicon: HALOT
  rationale: צאן can denote sheep/goats collectively. 'The flock' captures the collective
    sense better than the narrower 'sheep.'
