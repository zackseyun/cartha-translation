id: 1SA.25.19
reference: 1 Samuel 25:19
source:
  edition: WLC
  text: וַ/תֹּ֤אמֶר לִ/נְעָרֶ֨י/הָ֙ עִבְר֣וּ לְ/פָנַ֔/י הִנְ/נִ֖י אַחֲרֵי/כֶ֣ם בָּאָ֑ה
    וּ/לְ/אִישָׁ֥/הּ נָבָ֖ל לֹ֥א הִגִּֽידָה׃
translation:
  text: She said to her young men, “Go on ahead of me. Look, I am coming behind you.”
    But she did not tell her husband Nabal.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Behold, I am coming after you.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתֹּאמֶר
  chosen: She said
  alternatives:
  - Then she said
  - And she said
  lexicon: HALOT
  rationale: Wayyiqtol of אמר introduces the next narrative action. English can omit
    an explicit connective for natural style while preserving sequence.
- source_word: לִנְעָרֶיהָ
  chosen: to her young men
  alternatives:
  - to her servants
  - to her attendants
  lexicon: HALOT
  rationale: נַעַר can mean young man, servant, or attendant depending on context.
    Here Abigail is addressing the men who carry provisions and go before her, so
    'young men' preserves the lexical sense while fitting the narrative role.
- source_word: עִבְרוּ
  chosen: Go on ahead
  alternatives:
  - Pass on
  - Cross over
  - Go ahead
  lexicon: HALOT
  rationale: עבר in the imperative here means to move on in front of someone. 'Go
    on ahead' is idiomatic English and matches the following phrase 'before me.'
- source_word: לְפָנַי
  chosen: ahead of me
  alternatives:
  - before me
  - in front of me
  lexicon: HALOT
  rationale: Literally 'before my face/before me.' In English, with a motion verb,
    'ahead of me' best conveys the spatial sense.
- source_word: הִנְנִי
  chosen: Look
  alternatives:
  - Behold
  - Here I am
  lexicon: HALOT
  rationale: הִנֵּה with first-person suffix is a deictic particle drawing attention
    to the speaker's action. 'Look' is natural modern English and preserves the discourse
    force better than the more wooden 'behold'.
- source_word: אַחֲרֵיכֶם בָּאָה
  chosen: I am coming behind you
  alternatives:
  - I am coming after you
  - I am coming behind you all
  lexicon: HALOT
  rationale: 'The participial/active sense is supplied idiomatically in English: Abigail
    states that she will follow after them. ''Behind you'' preserves the spatial nuance
    of אַחֲרֵי.'
- source_word: וּלְאִישָׁהּ
  chosen: But she did not tell her husband
  alternatives:
  - And to her husband she did not tell
  - but to her man/husband she did not declare
  lexicon: HALOT
  rationale: אִישׁ with 3fs suffix means 'her husband' in this context. The conjunction
    is rendered 'But' to reflect the contrast between what she told her servants and
    what she withheld from Nabal.
- source_word: נָבָל
  chosen: Nabal
  rationale: Proper name, transliterated according to the project's policy for personal
    names.
- source_word: לֹא הִגִּידָה
  chosen: she did not tell
  alternatives:
  - she did not inform
  - she did not declare
  lexicon: HALOT
  rationale: נגד in Hiphil means to tell, report, or declare. 'Tell' is the most natural
    fit in this domestic narrative context.
