theological_decisions:
- issue: Idiomatic expression of favor in וָאֶשָּׂא פָּנָיִךְ
  chosen_reading: accepted your person
  alternative_readings:
  - shown favor to you
  - accepted you
  rationale: This is not a major doctrinally contested term, but the idiom can be
    flattened in translation. The chosen rendering keeps the personal, face-to-face
    acceptance implied by the Hebrew while remaining intelligible in English.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented
    exception)
