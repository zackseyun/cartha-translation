id: 1SA.25.35
reference: 1 Samuel 25:35
source:
  edition: WLC
  text: וַ/יִּקַּ֤ח דָּוִד֙ מִ/יָּדָ֔/הּ אֵ֥ת אֲשֶׁר הֵבִ֖יאָה ל֑/וֹ וְ/לָ֣/הּ אָמַ֗ר
    עֲלִ֤י לְ/שָׁלוֹם֙ לְ/בֵיתֵ֔/ךְ רְאִי֙ שָׁמַ֣עְתִּי בְ/קוֹלֵ֔/ךְ וָ/אֶשָּׂ֖א פָּנָֽיִ/ךְ־׃
translation:
  text: So David took from her hand what she had brought him, and he said to her,
    “Go up in peace to your house. See, I have listened to your voice and accepted
    your person.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “shown favor to you” or “accepted you”; Hebrew literally, “lifted up
      your face.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקַּח
  chosen: took
  alternatives:
  - received
  lexicon: HALOT
  rationale: Basic sense of לקח is 'take.' 'Took' preserves the concrete verbal action;
    'received' is possible in context but slightly more interpretive.
- source_word: מִיָּדָהּ
  chosen: from her hand
  alternatives:
  - from her
  lexicon: HALOT
  rationale: The Hebrew explicitly says 'from her hand,' an idiom for direct receipt.
    Retaining 'hand' preserves the vividness of the source text.
- source_word: אֵת אֲשֶׁר הֵבִיאָה לוֹ
  chosen: what she had brought him
  alternatives:
  - that which she had brought him
  - what she brought to him
  lexicon: HALOT
  rationale: This smoothly renders the object marker plus relative clause while preserving
    the sense of Abigail's gift/provision brought to David.
- source_word: עֲלִי
  chosen: Go up
  alternatives:
  - Come up
  - Return
  lexicon: HALOT
  rationale: עלה literally means 'go up.' Since Abigail is departing from David, 'go
    up' is the most transparent rendering, even if English might more idiomatically
    say 'go.'
- source_word: לְשָׁלוֹם
  chosen: in peace
  alternatives:
  - peacefully
  - with peace
  lexicon: HALOT
  rationale: Standard idiom meaning departure under peace and safety. 'In peace' is
    natural and close to the Hebrew.
- source_word: לְבֵיתֵךְ
  chosen: to your house
  alternatives:
  - to your home
  lexicon: HALOT
  rationale: בית commonly means 'house' or 'household.' Here the physical destination
    is primary, so 'house' is retained.
- source_word: רְאִי
  chosen: See
  alternatives:
  - Look
  - Behold
  lexicon: HALOT
  rationale: An attention-getting imperative. 'See' is readable modern English without
    the archaism of 'behold.'
- source_word: שָׁמַעְתִּי בְקוֹלֵךְ
  chosen: I have listened to your voice
  alternatives:
  - I have listened to you
  - I have obeyed your voice
  - I have heeded your request
  lexicon: HALOT
  rationale: Literally 'I have heard/listened to your voice.' In context it means
    David has heeded Abigail's appeal. 'Listened to your voice' preserves the Hebrew
    expression while remaining understandable.
- source_word: וָאֶשָּׂא פָּנָיִךְ
  chosen: accepted your person
  alternatives:
  - shown favor to you
  - lifted up your face
  - accepted you
  lexicon: HALOT
  rationale: The idiom נשׂא פנים literally involves 'lifting the face' and commonly
    conveys showing favor or granting a request. 'Accepted your person' preserves
    the personal and idiomatic force more closely than the flatter 'accepted you,'
    while avoiding overinterpretation.
