id: 1SA.25.18
reference: 1 Samuel 25:18
source:
  edition: WLC
  text: וַ/תְּמַהֵ֣ר אבוגיל וַ/תִּקַּח֩ מָאתַ֨יִם לֶ֜חֶם וּ/שְׁנַ֣יִם נִבְלֵי יַ֗יִן
    וְ/חָמֵ֨שׁ צֹ֤אן עשוות וְ/חָמֵ֤שׁ סְאִים֙ קָלִ֔י וּ/מֵאָ֥ה צִמֻּקִ֖ים וּ/מָאתַ֣יִם
    דְּבֵלִ֑ים וַ/תָּ֖שֶׂם עַל הַ/חֲמֹרִֽים־־׃
translation:
  text: Then Abigail hurried and took two hundred loaves of bread, two skins of wine,
    five sheep already prepared, five seahs of roasted grain, a hundred clusters of
    raisins, and two hundred cakes of figs, and put them on the donkeys.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'five measures of roasted grain'; a seah was an ancient dry measure.
    reason: cultural_note
lexical_decisions:
- source_word: וַתְּמַהֵר
  chosen: Then Abigail hurried
  alternatives:
  - And Abigail hurried
  - Abigail quickly
  lexicon: HALOT
  rationale: The verb means to hasten. Rendering with 'hurried' is natural modern
    English and preserves the narrative urgency. 'Then' reflects the waw-consecutive
    in smooth English narrative sequence.
- source_word: וַתִּקַּח
  chosen: took
  alternatives:
  - got
  - gathered
  lexicon: HALOT
  rationale: לקח commonly means 'take.' 'Took' is the most direct rendering and fits
    the list that follows.
- source_word: מָאתַיִם לֶחֶם
  chosen: two hundred loaves of bread
  alternatives:
  - two hundred breads
  - two hundred bread loaves
  lexicon: HALOT
  rationale: Though לֶחֶם is formally 'bread,' in counted distribution contexts English
    normally requires 'loaves of bread.' This makes the quantified item intelligible
    without over-paraphrasing.
- source_word: שְׁנַיִם נִבְלֵי יַיִן
  chosen: two skins of wine
  alternatives:
  - two jars of wine
  - two bottles of wine
  lexicon: HALOT
  rationale: נֵבֶל here denotes a container for liquids, traditionally a skin-bottle
    or skin. 'Skins of wine' best reflects the ancient container and avoids anachronistic
    'bottles.'
- source_word: חָמֵשׁ צֹאן עֲשׂוּיוֹת
  chosen: five sheep already prepared
  alternatives:
  - five dressed sheep
  - five prepared sheep
  - five cooked sheep
  lexicon: HALOT
  rationale: The participle from עשה indicates the sheep had been made ready for consumption.
    'Already prepared' preserves that sense without forcing a narrower culinary stage
    than the Hebrew explicitly states.
- source_word: חָמֵשׁ סְאִים קָלִי
  chosen: five seahs of roasted grain
  alternatives:
  - five measures of roasted grain
  - five seahs of parched grain
  lexicon: HALOT
  rationale: סאה is a specific dry measure, so transliterating as 'seahs' preserves
    the source more precisely; קָלִי refers to roasted/parched grain. A footnote preserves
    the more interpretive 'measures' option for readers unfamiliar with the unit.
- source_word: מֵאָה צִמֻּקִים
  chosen: a hundred clusters of raisins
  alternatives:
  - a hundred raisin cakes
  - a hundred raisins
  lexicon: HALOT
  rationale: צִמּוּקִים refers to raisins, often in compressed clusters or bunches.
    'Clusters of raisins' best fits the plural counted item in a provisions list and
    distinguishes it from the fig cakes that follow.
- source_word: מָאתַיִם דְּבֵלִים
  chosen: two hundred cakes of figs
  alternatives:
  - two hundred fig cakes
  - two hundred pressed figs
  lexicon: HALOT
  rationale: דְּבֵלָה denotes a pressed cake of figs. 'Cakes of figs' is clear modern
    English while preserving the food form.
- source_word: וַתָּשֶׂם עַל הַחֲמֹרִים
  chosen: and put them on the donkeys
  alternatives:
  - and loaded them on the donkeys
  - and placed them on the donkeys
  lexicon: HALOT
  rationale: The verb is simply 'put/place.' 'Put them on the donkeys' stays close
    to the Hebrew while clearly implying loading the provisions onto the animals.
