id: 1SA.25.4
reference: 1 Samuel 25:4
source:
  edition: WLC
  text: וַ/יִּשְׁמַ֥ע דָּוִ֖ד בַּ/מִּדְבָּ֑ר כִּֽי גֹזֵ֥ז נָבָ֖ל אֶת צֹאנֽ/וֹ־־׃
translation:
  text: David heard in the wilderness that Nabal was shearing his sheep.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more broadly, 'his flock.' The Hebrew צֹאן can refer collectively to
      small livestock, though 'sheep' fits the shearing context best.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁמַע
  chosen: heard
  alternatives:
  - learned
  - came to hear
  lexicon: HALOT
  rationale: The waw-consecutive imperfect of שׁמע here narrates a simple past event.
    'Heard' is the most direct and natural English rendering; 'learned' is possible
    by implication but slightly more interpretive.
- source_word: בַּמִּדְבָּר
  chosen: in the wilderness
  alternatives:
  - in the desert
  - while in the wilderness
  lexicon: HALOT
  rationale: מִדְבָּר commonly denotes wilderness/open country rather than a sandy
    desert specifically. 'In the wilderness' preserves the Hebrew setting and may
    indicate David's location when he received the report.
- source_word: כִּי
  chosen: that
  alternatives:
  - for
  - because
  lexicon: HALOT
  rationale: Here כִּי introduces the content of what David heard, so the English
    content marker 'that' best fits the syntax.
- source_word: גֹזֵז
  chosen: was shearing
  alternatives:
  - was in the process of shearing
  - sheared
  lexicon: HALOT
  rationale: The participle גֹזֵז conveys ongoing or contemporaneous action. 'Was
    shearing' captures the verbal aspect more clearly than a simple past.
- source_word: נָבָל
  chosen: Nabal
  rationale: Proper personal name; per translation philosophy, names are transliterated
    rather than translated.
- source_word: אֶת צֹאנוֹ
  chosen: his sheep
  alternatives:
  - his flock
  lexicon: HALOT
  rationale: צֹאן can denote small livestock collectively, especially sheep and goats.
    In a shearing context, 'his sheep' is the most natural and specific English rendering,
    since sheep are what are shorn.
