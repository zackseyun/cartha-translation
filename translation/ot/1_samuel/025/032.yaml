id: 1SA.25.32
reference: 1 Samuel 25:32
source:
  edition: WLC
  text: וַ/יֹּ֥אמֶר דָּוִ֖ד לַ/אֲבִיגַ֑ל בָּר֤וּךְ יְהוָה֙ אֱלֹהֵ֣י יִשְׂרָאֵ֔ל אֲשֶׁ֧ר
    שְׁלָחֵ֛/ךְ הַ/יּ֥וֹם הַ/זֶּ֖ה לִ/קְרָאתִֽ/י׃
translation:
  text: David said to Abigail, “Blessed be the LORD, the God of Israel, who sent you
    this day to meet me.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''this day''; alternatively, ''today.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: said
  alternatives:
  - and said
  lexicon: HALOT
  rationale: The waw-consecutive verb introduces the next event in narrative sequence.
    English narrative style normally omits repeated 'and' before speech verbs unless
    needed for emphasis, so 'said' best reflects the sense in readable modern English.
- source_word: לַאֲבִיגַל
  chosen: to Abigail
  alternatives:
  - unto Abigail
  lexicon: HALOT
  rationale: The preposition ל marks the indirect object of speech. 'To Abigail' is
    the natural modern English rendering; the personal name is transliterated per
    project policy.
- source_word: בָּרוּךְ
  chosen: Blessed be
  alternatives:
  - Blessed is
  - May ... be blessed
  lexicon: HALOT
  rationale: This passive participial form functions as a doxological blessing formula.
    'Blessed be' preserves the elevated blessing idiom common in English Bible style
    without becoming archaic beyond comprehension.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name YHWH
    is 'the LORD,' following established reverential convention and the pattern reflected
    in the Septuagint tradition.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  chosen: the God of Israel
  alternatives:
  - God of Israel
  lexicon: HALOT
  rationale: The construct phrase identifies YHWH specifically as Israel's God. Including
    'the' yields idiomatic English and reflects the appositional identification after
    'the LORD.'
- source_word: אֲשֶׁר
  chosen: who
  alternatives:
  - that
  lexicon: HALOT
  rationale: The relative particle introduces a clause referring back to the personal
    subject, the LORD. 'Who' is the most natural English relative pronoun for a personal
    referent.
- source_word: שְׁלָחֵךְ
  chosen: sent you
  alternatives:
  - has sent you
  lexicon: HALOT
  rationale: The perfect with 2fs suffix refers to God's completed action in sending
    Abigail. In this narrative context, simple past 'sent you' is the most natural
    English rendering.
- source_word: הַיּוֹם הַזֶּה
  chosen: this day
  alternatives:
  - today
  - on this day
  lexicon: HALOT
  rationale: The phrase literally means 'this day.' 'This day' preserves the formal,
    solemn tone of David's blessing better than the more colloquial 'today,' while
    remaining clear.
- source_word: לִקְרָאתִי
  chosen: to meet me
  alternatives:
  - to encounter me
  - to come before me
  lexicon: HALOT
  rationale: 'The infinitive with preposition expresses purpose/result: Abigail was
    sent for an encounter with David. ''To meet me'' is the most idiomatic and contextually
    precise rendering in English.'
