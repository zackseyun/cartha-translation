id: 1SA.25.33
reference: 1 Samuel 25:33
source:
  edition: WLC
  text: וּ/בָר֥וּךְ טַעְמֵ֖/ךְ וּ/בְרוּכָ֣ה אָ֑תְּ אֲשֶׁ֨ר כְּלִתִ֜/נִי הַ/יּ֤וֹם
    הַ/זֶּה֙ מִ/בּ֣וֹא בְ/דָמִ֔ים וְ/הֹשֵׁ֥עַ יָדִ֖/י לִֽ/י׃
translation:
  text: And blessed be your judgment, and blessed be you, who have kept me this day
    from coming into bloodshed and from saving myself by my own hand.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your discretion' or 'your discernment.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'from coming into bloods'; the phrase can also carry the sense 'from
      bloodguilt.'
    reason: lexical_alternative
  - marker: c
    text: Or 'from avenging myself with my own hand.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבָרוּךְ
  chosen: blessed be
  alternatives:
  - blessed is
  - may ... be blessed
  lexicon: HALOT
  rationale: Passive participial blessing formula used predicatively; 'blessed be'
    preserves the exclamatory benediction idiom in natural English.
- source_word: טַעְמֵךְ
  chosen: your judgment
  alternatives:
  - your discretion
  - your discernment
  lexicon: HALOT
  rationale: טַעַם can denote judgment, discretion, or discernment. In context David
    praises Abigail's good sense in restraining him; 'judgment' is natural and weighty,
    while alternatives remain viable.
- source_word: וּבְרוּכָה אָתְּ
  chosen: and blessed be you
  alternatives:
  - and blessed are you
  lexicon: HALOT
  rationale: Direct blessing addressed to Abigail. 'Blessed be you' matches the preceding
    benediction formula and keeps the elevated tone.
- source_word: אֲשֶׁר
  chosen: who
  alternatives:
  - because
  - for
  lexicon: HALOT
  rationale: Relative particle introducing the clause describing Abigail; 'who' best
    fits the syntax.
- source_word: כְּלִתִנִי
  chosen: have kept me
  alternatives:
  - have restrained me
  - have withheld me
  lexicon: HALOT
  rationale: כלה in this stem here conveys preventing or restraining. 'Have kept me'
    is idiomatic with the following infinitive phrase; alternatives are preserved
    because 'restrained' is also strong in context.
- source_word: הַיּוֹם הַזֶּה
  chosen: this day
  alternatives:
  - today
  lexicon: HALOT
  rationale: Formal temporal expression; 'this day' preserves the Hebrew emphasis
    and narrative register better than the more colloquial 'today'.
- source_word: מִבּוֹא
  chosen: from coming into
  alternatives:
  - from entering into
  - from shedding
  lexicon: HALOT
  rationale: Literally 'from coming/entering.' Because the object is 'bloodshed,'
    the idiom points to involvement in bloodguilt or violent killing. 'Coming into'
    keeps the verbal image without over-paraphrasing to 'shedding' in the main text.
- source_word: בְדָמִים
  chosen: bloodshed
  alternatives:
  - bloodguilt
  - blood
  lexicon: HALOT
  rationale: Plural 'bloods' often denotes bloodshed or bloodguilt. Here David refers
    to taking violent vengeance. 'Bloodshed' is the clearest main-text rendering;
    'bloodguilt' is a plausible theological nuance and is preserved in a footnote.
- source_word: וְהֹשֵׁעַ יָדִי לִי
  chosen: and from saving myself by my own hand
  alternatives:
  - and from avenging myself with my own hand
  - and from giving myself victory by my own hand
  lexicon: HALOT
  rationale: The Hiphil of ישׁע means save/deliver, but in this context David means
    securing vindication or deliverance for himself through personal vengeance. 'Saving
    myself by my own hand' stays close to the Hebrew while allowing the reader to
    hear the irony; the more interpretive 'avenging myself' is preserved as an alternative.
