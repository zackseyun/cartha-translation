theological_decisions:
- issue: Potential nuance of דמים as bloodshed versus bloodguilt
  chosen_reading: bloodshed
  alternative_readings:
  - bloodguilt
  rationale: The immediate narrative focus is David's contemplated violent action
    against Nabal's household, so 'bloodshed' communicates the concrete act. Because
    the Hebrew plural can also imply incurred guilt for blood, that nuance is preserved
    in a footnote rather than resolved away.
  doctrine_reference: Preserve theological tension rather than resolve it.
