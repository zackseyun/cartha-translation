id: 1SA.25.17
reference: 1 Samuel 25:17
source:
  edition: WLC
  text: וְ/עַתָּ֗ה דְּעִ֤י וּ/רְאִי֙ מַֽה תַּעֲשִׂ֔י כִּֽי כָלְתָ֧ה הָ/רָעָ֛ה אֶל
    אֲדֹנֵ֖י/נוּ וְ/עַ֣ל כָּל בֵּית֑/וֹ וְ/הוּא֙ בֶּן בְּלִיַּ֔עַל מִ/דַּבֵּ֖ר אֵלָֽי/ו־־־־־׃
translation:
  text: Now know this and consider what you should do, for disaster has been determined
    against our master and against all his household, and he is such a worthless man
    that one cannot speak to him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'a son of worthlessness'; traditionally 'a son of Belial.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  chosen: Now
  alternatives:
  - And now
  lexicon: HALOT
  rationale: Introduces an urgent transition in the servant's speech. English 'Now'
    captures the discourse force naturally; 'And now' is possible but slightly heavier
    in English.
- source_word: דְּעִי
  chosen: know this
  alternatives:
  - know
  lexicon: HALOT
  rationale: Imperative feminine singular from ידע addressed to Abigail. 'Know this'
    makes the object implicit in context and reads naturally in English.
- source_word: וּרְאִי
  chosen: consider
  alternatives:
  - see
  - look
  lexicon: HALOT
  rationale: 'Though literally ''see,'' in this collocation with ''know'' and followed
    by ''what you should do,'' the sense is deliberative: ''consider'' or ''see to
    it.'' ''Consider'' best conveys reflective evaluation in idiomatic English.'
- source_word: מַה תַּעֲשִׂי
  chosen: what you should do
  alternatives:
  - what you will do
  - what you must do
  lexicon: HALOT
  rationale: The imperfect can denote contemplated action. 'Should do' fits the servant's
    urgent appeal for prudent action without overstating necessity as an explicit
    command.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  lexicon: HALOT
  rationale: Introduces the reason for Abigail's need to act.
- source_word: כָלְתָה הָרָעָה
  chosen: disaster has been determined
  alternatives:
  - evil is finished
  - harm is decided
  - calamity is certain
  lexicon: HALOT
  rationale: The idiom with כלה conveys that the harmful outcome is settled or effectively
    decided. 'Disaster' fits the context of impending violent judgment better than
    the morally freighted but less idiomatic 'evil.' 'Has been determined' captures
    the sense of a fixed outcome.
- source_word: אֶל אֲדֹנֵינוּ
  chosen: against our master
  alternatives:
  - upon our lord
  - toward our master
  lexicon: HALOT
  rationale: Here אֶל with רעה in context indicates hostile direction. 'Master' is
    preferable to 'lord' for Abigail's household superior in this narrative setting.
- source_word: וְעַל כָּל בֵּיתוֹ
  chosen: and against all his household
  alternatives:
  - and upon all his house
  - and against all his house
  lexicon: HALOT
  rationale: '''Household'' communicates the people and estate under Nabal''s authority
    more clearly than the more literal ''house'' in contemporary English.'
- source_word: וְהוּא בֶּן בְּלִיַּעַל
  chosen: he is such a worthless man
  alternatives:
  - he is a son of worthlessness
  - he is a scoundrel
  - he is a wicked man
  lexicon: HALOT
  rationale: The idiom 'son of Belial/worthlessness' denotes a morally base, obstinate
    person. 'Worthless man' preserves the idiomatic force without importing the later
    proper-name sense 'Belial.' 'Such a' helps connect to the following result clause.
- source_word: מִדַּבֵּר אֵלָיו
  chosen: that one cannot speak to him
  alternatives:
  - so that no one can speak to him
  - from speaking to him
  lexicon: HALOT
  rationale: 'The construction expresses result: he is the kind of man with whom speaking
    is impossible. ''One cannot speak to him'' is idiomatic and preserves the general
    subject.'
