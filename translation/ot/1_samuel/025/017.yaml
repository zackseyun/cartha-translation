theological_decisions:
- issue: בְּלִיַּעַל idiom
  chosen_reading: worthless man
  alternative_readings:
  - son of Belial
  rationale: In this context the Hebrew functions as an idiom for a base or worthless
    person, not necessarily as a proper name. Rendering the sense avoids suggesting
    a developed demonological title not required by the text.
