id: 1SA.25.38
reference: 1 Samuel 25:38
source:
  edition: WLC
  text: וַ/יְהִ֖י כַּ/עֲשֶׂ֣רֶת הַ/יָּמִ֑ים וַ/יִּגֹּ֧ף יְהוָ֛ה אֶת נָבָ֖ל וַ/יָּמֹֽת־׃
translation:
  text: And about ten days later, the LORD struck Nabal, and he died.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'after about ten days.' The Hebrew expression indicates an approximate
      period of ten days.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: And ... later
  alternatives:
  - And it happened
  - Then it came about
  lexicon: HALOT
  rationale: The waw-consecutive of היה introduces the next event in narrative sequence.
    In English, a natural narrative transition is preferable to the wooden 'and it
    happened,' while still preserving the temporal progression.
- source_word: כַּעֲשֶׂרֶת הַיָּמִים
  chosen: about ten days later
  alternatives:
  - after about ten days
  - about ten days afterward
  lexicon: HALOT
  rationale: The prefixed כ on 'ten' gives an approximate sense ('about/as'). Rendering
    the phrase idiomatically as 'about ten days later' preserves both the approximation
    and the temporal relation.
- source_word: וַיִּגֹּף
  chosen: struck
  alternatives:
  - smote
  - afflicted
  - plagued
  lexicon: HALOT
  rationale: נָגַף commonly denotes striking down or inflicting a blow, often by divine
    action. 'Struck' is clear modern English and preserves the directness of the Hebrew
    without importing a more specific mechanism than the text states.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the divine name יְהוָה is rendered 'the LORD'
    in keeping with established reverential convention and the translation's stated
    default.
- source_word: אֶת נָבָל
  chosen: Nabal
  lexicon: HALOT
  rationale: Direct-object marker אֶת is untranslated in English; the personal name
    is transliterated by standard convention.
- source_word: וַיָּמֹת
  chosen: and he died
  alternatives:
  - so that he died
  - and he was dead
  lexicon: HALOT
  rationale: The simple narrative verb מות is best rendered straightforwardly as 'and
    he died.' This preserves the sequence without overstating causation beyond what
    the Hebrew explicitly narrates.
