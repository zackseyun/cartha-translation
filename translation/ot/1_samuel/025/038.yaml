theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse explicitly attributes Nabal's death to divine action. The translation
    follows the project's default rendering for the Tetragrammaton rather than a transliteration.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Degree of causation in divine judgment
  chosen_reading: the LORD struck Nabal, and he died
  alternative_readings:
  - the LORD afflicted Nabal so that he died
  - the LORD struck Nabal dead
  rationale: 'The Hebrew presents two sequential verbs: the LORD struck Nabal, and
    he died. The chosen rendering preserves the text''s assertion of divine judgment
    without collapsing the sequence into a more interpretively loaded idiom like ''struck
    dead.'''
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological
    tension rather than resolve it'
