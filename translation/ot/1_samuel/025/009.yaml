id: 1SA.25.9
reference: 1 Samuel 25:9
source:
  edition: WLC
  text: וַ/יָּבֹ֨אוּ֙ נַעֲרֵ֣י דָוִ֔ד וַ/יְדַבְּר֧וּ אֶל נָבָ֛ל כְּ/כָל הַ/דְּבָרִ֥ים
    הָ/אֵ֖לֶּה בְּ/שֵׁ֣ם דָּוִ֑ד וַ/יָּנֽוּחוּ־־׃
translation:
  text: When David’s young men came, they spoke to Nabal all these words in David’s
    name, and then they waited.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and they rested' or 'and they paused.' The Hebrew verb can mean 'rested,'
      but in this context it likely indicates that David’s men finished speaking and
      waited for Nabal’s response.
    reason: lexical_alternative
lexical_decisions:
- source_word: נַעֲרֵי
  chosen: young men
  alternatives:
  - servants
  - men
  lexicon: HALOT
  rationale: נַעַר can denote a youth, servant, or attendant depending on context.
    Here it refers to David’s emissaries, likely adult retainers rather than children,
    so 'young men' preserves the Hebrew term without flattening it to a purely functional
    'servants.'
- source_word: וַיָּבֹאוּ
  chosen: came
  alternatives:
  - arrived
  lexicon: HALOT
  rationale: The verb בוא is the common verb 'to come/enter.' 'Came' is the most direct
    and natural rendering in sequence with the following action.
- source_word: וַיְדַבְּרוּ אֶל
  chosen: spoke to
  alternatives:
  - addressed
  - spoke with
  lexicon: HALOT
  rationale: דבר with אֶל commonly means 'speak to.' 'Spoke to' is straightforward
    and preserves the directional sense toward Nabal.
- source_word: כְּכָל הַדְּבָרִים הָאֵלֶּה
  chosen: all these words
  alternatives:
  - all these things
  - according to all these words
  lexicon: HALOT
  rationale: Formally the phrase is 'according to all these words.' In English narrative,
    'spoke ... all these words' communicates the sense naturally while retaining the
    verbal specificity of דְּבָרִים as 'words' rather than the broader 'things.'
- source_word: בְּשֵׁם דָּוִד
  chosen: in David’s name
  alternatives:
  - on behalf of David
  - in the name of David
  lexicon: HALOT
  rationale: בְּשֵׁם here indicates representation or authorization. 'In David’s name'
    is idiomatic English and preserves the formal representative force.
- source_word: וַיָּנוּחוּ
  chosen: they waited
  alternatives:
  - they rested
  - they paused
  - they were quiet
  lexicon: HALOT
  rationale: The verb נוח usually means 'rest' or 'settle down,' but in this context
    after delivering a message it likely means they stopped speaking and waited for
    a response. 'They waited' best fits the narrative flow. The more literal 'rested'
    is possible but less clear in English here.
