id: 1SA.25.1
reference: 1 Samuel 25:1
source:
  edition: WLC
  text: וַ/יָּ֣מָת שְׁמוּאֵ֔ל וַ/יִּקָּבְצ֤וּ כָל יִשְׂרָאֵל֙ וַ/יִּסְפְּדוּ ל֔/וֹ
    וַ/יִּקְבְּרֻ֥/הוּ בְּ/בֵית֖/וֹ בָּ/רָמָ֑ה וַ/יָּ֣קָם דָּוִ֔ד וַ/יֵּ֖רֶד אֶל מִדְבַּ֥ר
    פָּארָֽן־־־׃ס
translation:
  text: Now Samuel died, and all Israel gathered and mourned for him, and they buried
    him at his house in Ramah. Then David arose and went down to the wilderness of
    Paran.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'lamented for him.' The Hebrew verb refers to mourning rites for the
      dead.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּמָת
  chosen: Now Samuel died
  alternatives:
  - And Samuel died
  - Then Samuel died
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Now' gives natural English
    scene transition without obscuring the simple verbal sense 'died.'
- source_word: וַיִּקָּבְצוּ כָל יִשְׂרָאֵל
  chosen: all Israel gathered
  alternatives:
  - all Israel assembled
  - all the Israelites gathered
  lexicon: HALOT
  rationale: כָל יִשְׂרָאֵל is a collective national expression. 'All Israel' preserves
    the idiom better than expanding to 'all the Israelites.' 'Gathered' is a natural
    rendering of the Niphal here.
- source_word: וַיִּסְפְּדוּ לוֹ
  chosen: mourned for him
  alternatives:
  - lamented for him
  - wailed for him
  lexicon: HALOT
  rationale: The verb denotes formal mourning or lamentation for the dead. 'Mourned
    for him' is clear modern English and suitably broad; 'lamented' is possible but
    slightly more formal.
- source_word: וַיִּקְבְּרֻהוּ
  chosen: they buried him
  lexicon: HALOT
  rationale: Straightforward rendering of the verb with object suffix.
- source_word: בְּבֵיתוֹ
  chosen: at his house
  alternatives:
  - in his house
  - at his home
  lexicon: HALOT
  rationale: The phrase likely refers to burial on family property associated with
    his house rather than literally inside the dwelling. 'At his house' preserves
    the Hebrew wording while sounding natural in English.
- source_word: בָּרָמָה
  chosen: in Ramah
  alternatives:
  - at Ramah
  lexicon: HALOT
  rationale: Standard locative rendering with the place name transliterated, following
    the philosophy of transliterating names.
- source_word: וַיָּקָם
  chosen: Then David arose
  alternatives:
  - Then David got up
  - And David arose
  lexicon: HALOT
  rationale: The verb often marks a consequential movement in narrative. 'Arose' preserves
    the literary cadence and transition to David's departure.
- source_word: וַיֵּרֶד אֶל מִדְבַּר פָּארָן
  chosen: went down to the wilderness of Paran
  alternatives:
  - went down into the wilderness of Paran
  - went to the wilderness of Paran
  lexicon: HALOT
  rationale: ירד commonly means 'go down,' often in topographical narrative. מִדְבַּר
    is best rendered 'wilderness' rather than 'desert' here. 'Of Paran' preserves
    the construct relation.
