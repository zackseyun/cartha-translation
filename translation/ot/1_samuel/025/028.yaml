theological_decisions:
- issue: Dynastic sense of 'house' in Abigail's blessing
  chosen_reading: Rendered 'house' metaphorically as 'a lasting house' to preserve the dynastic promise without collapsing it into a technical term.
  alternative_readings:
  - an enduring dynasty
  - a sure house
  rationale: The Hebrew metaphor likely anticipates a stable lineage/royal house for David. Keeping 'house' in the main text preserves biblical intertextuality while 'lasting' clarifies the sense for modern readers.
  doctrine_reference: 'Translation philosophy: optimal equivalence; consistency of key terms, or documented exception.'
