id: 1SA.25.28
reference: 1 Samuel 25:28
source:
  edition: WLC
  text: שָׂ֥א נָ֖א לְ/פֶ֣שַׁע אֲמָתֶ֑/ךָ כִּ֣י עָשֹֽׂה יַעֲשֶׂה֩ יְהוָ֨ה לַֽ/אדֹנִ֜/י
    בַּ֣יִת נֶאֱמָ֗ן כִּי מִלְחֲמ֤וֹת יְהוָה֙ אֲדֹנִ֣/י נִלְחָ֔ם וְ/רָעָ֛ה לֹא תִמָּצֵ֥א
    בְ/ךָ֖ מִ/יָּמֶֽי/ךָ־־־׃
translation:
  text: Please forgive the transgression of your female servant, for the LORD will
    surely make my lord a lasting house, because my lord fights the LORD’s battles,
    and evil will not be found in you all your days.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a sure house' or 'an enduring dynasty.' The Hebrew 'house' here refers
      to a stable lineage, not merely a physical household.
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׂא נָא
  chosen: Please forgive
  alternatives:
  - Please pardon
  - Bear, please
  lexicon: HALOT
  rationale: The idiom 'lift/bear, please' with לְפֶשַׁע means to forgive or pardon
    an offense. 'Please forgive' gives the idiomatic sense in natural English while
    preserving the plea force of נָא.
- source_word: לְפֶשַׁע
  chosen: the transgression of
  alternatives:
  - the offense of
  - the rebellion of
  lexicon: HALOT
  rationale: פשע denotes transgression/rebellion. In this interpersonal appeal, 'transgression'
    preserves the moral seriousness without overstating political rebellion.
- source_word: אֲמָתֶךָ
  chosen: your female servant
  alternatives:
  - your maidservant
  - your servant
  lexicon: HALOT
  rationale: אמה specifically refers to a female servant. 'Female servant' is clear
    modern English and preserves the gendered self-humbling form of Abigail's speech
    better than the archaic 'maidservant' or the flattened 'servant'.
- source_word: עָשֹׂה יַעֲשֶׂה
  chosen: will surely make
  alternatives:
  - will indeed make
  - will certainly make
  lexicon: HALOT
  rationale: The infinitive absolute with finite verb intensifies the action. 'Will
    surely make' is a standard English way to reflect that emphasis.
- source_word: לַאדֹנִי
  chosen: my lord
  alternatives:
  - my master
  lexicon: HALOT
  rationale: In context Abigail addresses David respectfully. 'My lord' fits the courtly
    address and avoids the harsher social connotations of 'master' here.
- source_word: בַּיִת נֶאֱמָן
  chosen: a lasting house
  alternatives:
  - a sure house
  - a faithful house
  - an enduring dynasty
  lexicon: HALOT
  rationale: '''House'' here is dynastic, not architectural. ''Lasting house'' preserves
    the metaphor while communicating durability and covenantal stability in accessible
    English. ''Dynasty'' is interpretive; ''sure house'' is more literal but less
    natural.'
- source_word: מִלְחֲמוֹת יְהוָה
  chosen: the LORD’s battles
  alternatives:
  - the battles of the LORD
  - the LORD's wars
  lexicon: HALOT
  rationale: This construct phrase refers to battles fought on the LORD's behalf or
    under his cause. 'The LORD's battles' is natural and sufficiently formal; 'wars'
    sounds broader and harsher than the immediate context requires.
- source_word: נִלְחָם
  chosen: fights
  alternatives:
  - is fighting
  - wages war
  lexicon: HALOT
  rationale: The participial form expresses characteristic or ongoing action. English
    simple present 'fights' captures this well in a gnomic statement.
- source_word: וְרָעָה
  chosen: evil
  alternatives:
  - wrongdoing
  - harm
  lexicon: HALOT
  rationale: רעה can denote evil, trouble, or harm. Here Abigail speaks of moral fault
    in David's life and conduct, so 'evil' best preserves the ethical dimension.
- source_word: לֹא תִמָּצֵא בְךָ
  chosen: will not be found in you
  alternatives:
  - will not be found with you
  - will not be found against you
  lexicon: HALOT
  rationale: The Niphal of מצא with ב indicates something being found in or attached
    to a person. 'In you' is the most direct rendering and suits the moral sense of
    evil not being present in David.
- source_word: מִיָּמֶיךָ
  chosen: all your days
  alternatives:
  - throughout your days
  - from your days
  lexicon: HALOT
  rationale: The phrase idiomatically means throughout one's lifetime. 'All your days'
    is concise and idiomatic in English.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD' rather than a transliteration.
