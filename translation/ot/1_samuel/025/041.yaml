theological_decisions:
- issue: Rendering female servitude terms אמה and שפחה
  chosen_reading: Differentiate them as 'female servant' and 'slave woman'
  alternative_readings:
  - Render both as 'maidservant'
  - Render both as 'servant'
  rationale: The verse uses two related but distinct female-status terms in Abigail's
    self-description. Differentiating them preserves the rhetorical intensification
    of humility. Using 'slave woman' for שפחה aligns with the project's preference
    to reflect bonded status where salient, while 'female servant' for אמה keeps the
    address formula natural.
  doctrine_reference: Translation philosophy §§1, 5
