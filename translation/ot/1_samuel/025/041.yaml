id: 1SA.25.41
reference: 1 Samuel 25:41
source:
  edition: WLC
  text: וַ/תָּ֕קָם וַ/תִּשְׁתַּ֥חוּ אַפַּ֖יִם אָ֑רְצָ/ה וַ/תֹּ֗אמֶר הִנֵּ֤ה אֲמָֽתְ/ךָ֙
    לְ/שִׁפְחָ֔ה לִ/רְחֹ֕ץ רַגְלֵ֖י עַבְדֵ֥י אֲדֹנִֽ/י׃
translation:
  text: She rose and bowed with her face to the ground and said, “Look, your female
    servant is a slave woman to wash the feet of the servants of my lord.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “your maidservant is for a maidservant,” preserving the two closely related
      Hebrew terms for a female servant/slave.
    reason: lexical_alternative
  - marker: b
    text: “Bowed with her face to the ground” refers to a posture of deep obeisance;
      alternatively, “prostrated herself.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתָּקָם
  chosen: She rose
  alternatives:
  - She arose
  - Then she got up
  lexicon: HALOT
  rationale: Qal wayyiqtol of קום, straightforward narrative sequence. 'She rose'
    is natural modern English while preserving the action.
- source_word: וַתִּשְׁתַּחוּ אַפַּיִם אָרְצָה
  chosen: bowed with her face to the ground
  alternatives:
  - prostrated herself with her face to the ground
  - bowed down, face to the earth
  lexicon: HALOT
  rationale: The idiom combines השתחוה with 'face/nose' and 'to the ground/earth,'
    indicating deep obeisance. 'Bowed with her face to the ground' preserves the physical
    posture without over-paraphrase; 'prostrated herself' is possible but slightly
    more interpretive.
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - Here is
  lexicon: HALOT
  rationale: Deictic/interjection introducing Abigail's self-humbling statement. 'Look'
    is readable modern English; 'Behold' is too archaic for the stated philosophy.
- source_word: אֲמָתְךָ
  chosen: your female servant
  alternatives:
  - your maidservant
  - your servant
  lexicon: HALOT
  rationale: אָמָה denotes a female servant/slave. 'Your female servant' preserves
    both gender and deferential self-reference. 'Maidservant' is traditional but less
    current; 'servant' alone loses the marked feminine form.
- source_word: לְשִׁפְחָה
  chosen: a slave woman
  alternatives:
  - a maidservant
  - a servant girl
  - as a female servant
  lexicon: HALOT
  rationale: שִׁפְחָה is another female-servitude term. Rendering it distinctly from
    אמה avoids flattening the Hebrew variation. 'Slave woman' best reflects bonded
    status; here Abigail intensifies her humility by placing herself in the lowest
    service role.
- source_word: לִרְחֹץ
  chosen: to wash
  alternatives:
  - for washing
  lexicon: HALOT
  rationale: Infinitive of purpose after לְ. 'To wash' is the most direct English
    equivalent.
- source_word: רַגְלֵי
  chosen: the feet of
  alternatives:
  - feet
  lexicon: HALOT
  rationale: Construct phrase introducing the object of washing. Expanded in English
    for clarity.
- source_word: עַבְדֵי
  chosen: the servants of
  alternatives:
  - the slaves of
  lexicon: HALOT
  rationale: Although עבד can denote slave/servant, here it refers to the household
    attendants of David in a courtly setting. The bonded nature is not the focus,
    so 'servants' fits optimal equivalence.
- source_word: אֲדֹנִי
  chosen: my lord
  alternatives:
  - my master
  lexicon: HALOT
  rationale: In this narrative context Abigail addresses David with deferential honorific
    language. 'My lord' preserves the social register and matches common biblical
    usage; 'master' could sound harsher and less idiomatic here.
