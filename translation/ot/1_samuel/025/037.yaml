theological_decisions:
- issue: Whether to interpret Nabal's condition medically or preserve the narrative
    metaphor
  chosen_reading: 'Preserve the Hebrew imagery: ''his heart died within him, and he
    became like a stone'''
  alternative_readings:
  - He had a heart attack
  - He suffered a stroke and became paralyzed
  - His heart failed and he became numb
  rationale: The verse describes Nabal's collapse in figurative narrative language
    rather than with technical medical terminology. To avoid importing claims the
    text does not make, the translation keeps the metaphorical wording and leaves
    precise diagnosis unstated.
  doctrine_reference: 'Translation philosophy: Never import doctrinal claims the text
    does not make; preserve the source text''s plain sense.'
