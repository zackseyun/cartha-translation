id: 1SA.25.37
reference: 1 Samuel 25:37
source:
  edition: WLC
  text: וַ/יְהִ֣י בַ/בֹּ֗קֶר בְּ/צֵ֤את הַ/יַּ֨יִן֙ מִ/נָּבָ֔ל וַ/תַּגֶּד ל֣/וֹ אִשְׁתּ֔/וֹ
    אֶת הַ/דְּבָרִ֖ים הָ/אֵ֑לֶּה וַ/יָּ֤מָת לִבּ/וֹ֙ בְּ/קִרְבּ֔/וֹ וְ/ה֖וּא הָיָ֥ה
    לְ/אָֽבֶן־־׃
translation:
  text: And in the morning, when the wine had gone out of Nabal, his wife told him
    these things, and his heart died within him, and he became like a stone.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'when the wine had gone out of Nabal,' that is, when he had sobered
      up or the effects of the wine had left him.
    reason: lexical_alternative
  - marker: b
    text: Or 'his heart failed within him.' The Hebrew uses vivid imagery rather than
      a technical medical description.
    reason: lexical_alternative
lexical_decisions:
- source_word: בַבֹּקֶר
  chosen: in the morning
  alternatives:
  - in the morning time
  - when morning came
  lexicon: HALOT
  rationale: Standard temporal expression; idiomatic and close to the Hebrew.
- source_word: בְּצֵאת הַיַּיִן מִנָּבָל
  chosen: when the wine had gone out of Nabal
  alternatives:
  - when Nabal had sobered up
  - when the effects of the wine had left Nabal
  lexicon: HALOT
  rationale: The Hebrew is literally 'when the wine went out from Nabal.' I preserved
    the concrete imagery in the main text because it is intelligible in English and
    reflects the source more transparently than the interpretive paraphrase 'sobered
    up.' The sense is that his drunkenness had passed.
- source_word: וַתַּגֶּד לוֹ אִשְׁתּוֹ
  chosen: his wife told him
  alternatives:
  - his wife reported to him
  - his wife informed him
  lexicon: HALOT
  rationale: נגד in Hifil commonly means 'tell, declare, report.' 'Told him' is natural
    modern English and sufficient for the narrative context.
- source_word: אֶת הַדְּבָרִים הָאֵלֶּה
  chosen: these things
  alternatives:
  - these matters
  - these words
  lexicon: HALOT
  rationale: דברים can mean 'words' or 'matters/things.' Here Abigail is recounting
    the events of the previous night, so 'these things' best captures the broader
    sense.
- source_word: וַיָּמָת לִבּוֹ בְּקִרְבּוֹ
  chosen: his heart died within him
  alternatives:
  - his heart failed within him
  - he was stricken in his heart
  lexicon: HALOT
  rationale: The Hebrew is vivid and idiomatic. I retained the metaphor rather than
    flattening it, since the following clause explains the effect. This may describe
    shock, collapse, or a stroke-like event, but the text itself uses the heart-dying
    image.
- source_word: וְהוּא הָיָה לְאָבֶן
  chosen: he became like a stone
  alternatives:
  - he became as a stone
  - he was like a stone
  lexicon: HALOT
  rationale: Although the Hebrew says literally 'he became to/for a stone,' idiomatic
    English is 'became like a stone.' This preserves the simile and avoids overinterpreting
    it medically.
