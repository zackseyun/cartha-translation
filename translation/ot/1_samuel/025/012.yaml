id: 1SA.25.12
reference: 1 Samuel 25:12
source:
  edition: WLC
  text: וַ/יַּהַפְכ֥וּ נַעֲרֵֽי דָוִ֖ד לְ/דַרְכָּ֑/ם וַ/יָּשֻׁ֨בוּ֙ וַ/יָּבֹ֔אוּ וַ/יַּגִּ֣דוּ
    ל֔/וֹ כְּ/כֹ֖ל הַ/דְּבָרִ֥ים הָ/אֵֽלֶּה־׃
translation:
  text: So David’s young men turned back on their way, and they returned and came
    and told him all these words.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all these things.' The Hebrew word can refer either to spoken words
      or to matters/events; here 'words' is preferred because the report concerns
      Nabal’s spoken response.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּהַפְכוּ
  chosen: turned back
  alternatives:
  - turned around
  - went back
  lexicon: HALOT
  rationale: The verb from הפך in this context idiomatically conveys reversing direction
    rather than a literal 'overturning.' 'Turned back' is natural English and fits
    the travel context.
- source_word: נַעֲרֵי דָוִד
  chosen: David’s young men
  alternatives:
  - David’s servants
  - David’s men
  lexicon: HALOT
  rationale: נַעַר can denote a youth, attendant, or servant depending on context.
    Here these are David’s messengers/retainers. 'Young men' preserves the lexical
    sense without over-specifying servile status; 'men' alone would lose the nuance.
- source_word: לְדַרְכָּם
  chosen: on their way
  alternatives:
  - to their way
  - on their road
  lexicon: HALOT
  rationale: Literally 'to their way,' but in English the idiom after a reversal of
    direction is best expressed as 'on their way' or 'back on their way.' The phrase
    marks their route of return.
- source_word: וַיָּשֻׁבוּ
  chosen: they returned
  alternatives:
  - they went back
  lexicon: HALOT
  rationale: This verb explicitly states returning. Although English could compress
    the sequence, retaining it reflects the Hebrew narrative chaining.
- source_word: וַיָּבֹאוּ
  chosen: and came
  alternatives:
  - and arrived
  lexicon: HALOT
  rationale: Hebrew narrative often stacks motion verbs. 'And came' preserves the
    sequence with minimal smoothing; 'arrived' is possible but slightly more interpretive.
- source_word: וַיַּגִּדוּ לוֹ
  chosen: and told him
  alternatives:
  - and reported to him
  - and declared to him
  lexicon: HALOT
  rationale: נגד here means to report or tell. 'Told him' is straightforward modern
    English and suits the immediate narrative context.
- source_word: כְּכֹל הַדְּבָרִים הָאֵלֶּה
  chosen: all these words
  alternatives:
  - all these things
  - everything that was said
  lexicon: HALOT
  rationale: דְּבָרִים can mean 'words' or 'matters/things.' Because the content just
    reported is a spoken reply from Nabal, 'words' better preserves the verbal focus,
    though 'things' is possible.
