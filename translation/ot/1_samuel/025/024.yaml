id: 1SA.25.24
reference: 1 Samuel 25:24
source:
  edition: WLC
  text: וַ/תִּפֹּל֙ עַל רַגְלָ֔י/ו וַ/תֹּ֕אמֶר בִּ/י אֲנִ֥י אֲדֹנִ֖/י הֶֽ/עָוֺ֑ן וּֽ/תְדַבֶּר
    נָ֤א אֲמָֽתְ/ךָ֙ בְּ/אָזְנֶ֔י/ךָ וּ/שְׁמַ֕ע אֵ֖ת דִּבְרֵ֥י אֲמָתֶֽ/ךָ־־־׃
translation:
  text: She fell at his feet and said, “On me, my lord, be the guilt. Please let your
    female servant speak in your hearing, and hear the words of your female servant.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or, ''The guilt is mine, my lord.'' The Hebrew is a compact idiom of self-assumed
      blame: literally, ''On me, my lord, the guilt.'''
    reason: lexical_alternative
  - marker: b
    text: '''Your female servant'' translates a specifically feminine term of self-humbling
      address; traditional English often has ''maidservant.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתִּפֹּל עַל רַגְלָיו
  chosen: She fell at his feet
  alternatives:
  - She fell at his feet before him
  - She threw herself at his feet
  lexicon: HALOT
  rationale: The idiom literally says 'fell upon his feet,' a standard gesture of
    supplication or submission. 'Fell at his feet' is natural English and preserves
    the posture without over-paraphrasing.
- source_word: בִּי אֲנִי אֲדֹנִי הֶעָוֹן
  chosen: On me, my lord, be the guilt
  alternatives:
  - The guilt is mine, my lord
  - Upon me alone, my lord, is the iniquity
  lexicon: HALOT
  rationale: This compressed clause is an idiomatic self-assumption of blame. 'On
    me ... be the guilt' stays close to the Hebrew prepositional force of בִּי and
    preserves Abigail's formal, deferential speech. 'Guilt' is preferred over 'iniquity'
    for readable modern English in this narrative context.
- source_word: אֲדֹנִי
  chosen: my lord
  alternatives:
  - my master
  - sir
  lexicon: HALOT
  rationale: In this context Abigail addresses David with deference, not as the divine
    Lord. 'My lord' preserves the social register and matches common narrative usage
    better than the flatter 'sir' or the potentially harsher 'master.'
- source_word: וּתְדַבֶּר נָא
  chosen: Please let ... speak
  alternatives:
  - Please may ... speak
  - Please allow ... to speak
  lexicon: HALOT
  rationale: The jussive/request form with נָא expresses polite entreaty. English
    requires an explicit permissive construction; 'Please let ... speak' captures
    the request naturally.
- source_word: אֲמָתְךָ / אֲמָתֶךָ
  chosen: your female servant
  alternatives:
  - your maidservant
  - your servant
  lexicon: HALOT
  rationale: אמה specifically denotes a female servant/slave. 'Female servant' preserves
    the gendered form more transparently than 'servant' and is more natural in contemporary
    English than 'maidservant.' Repeating it both times reflects the Hebrew repetition
    and Abigail's humility.
- source_word: בְּאָזְנֶיךָ
  chosen: in your hearing
  alternatives:
  - in your ears
  - before you
  lexicon: HALOT
  rationale: Literally 'in your ears,' an idiom for speaking so that someone hears.
    'In your hearing' is a clear, moderately formal English equivalent that preserves
    the idiomatic sense without wooden literalism.
- source_word: וּשְׁמַע אֵת דִּבְרֵי
  chosen: and hear the words of
  alternatives:
  - and listen to the words of
  - and hear what ... says
  lexicon: HALOT
  rationale: The imperative שׁמע plus 'words' is straightforward. 'Hear the words
    of' keeps the formal tone and avoids unnecessary paraphrase.
