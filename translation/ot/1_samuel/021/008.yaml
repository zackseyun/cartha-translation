id: 1SA.21.8
reference: 1 Samuel 21:8
source:
  edition: WLC
  text: וְ/שָׁ֡ם אִישׁ֩ מֵ/עַבְדֵ֨י שָׁא֜וּל בַּ/יּ֣וֹם הַ/ה֗וּא נֶעְצָר֙ לִ/פְנֵ֣י יְהוָ֔ה וּ/שְׁמ֖/וֹ דֹּאֵ֣ג הָ/אֲדֹמִ֑י אַבִּ֥יר הָ/רֹעִ֖ים אֲשֶׁ֥ר לְ/שָׁאֽוּל׃
translation:
  text: Now a man of Saul’s servants was there that day, detained before Yahweh; his name was Doeg the Edomite, the chief of Saul’s shepherds.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'restrained before the LORD' or 'kept back before the LORD.' The Hebrew does not specify why Doeg was detained.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשָׁם
  chosen: Now ... was there
  alternatives:
  - And there ... was there
  - There was
  lexicon: HALOT
  rationale: Combines the conjunction and adverb idiomatically to introduce a narrative aside. 'Now' preserves the discourse shift better than a bare 'and,' while 'was there' renders שָׁם straightforwardly.
- source_word: אִישׁ
  chosen: a man
  alternatives:
  - someone
  - a certain man
  lexicon: HALOT
  rationale: The singular noun is indefinite and refers to an individual male person. 'A man' is the most direct rendering and fits the narrative introduction.
- source_word: מֵעַבְדֵי שָׁאוּל
  chosen: of Saul’s servants
  alternatives:
  - from Saul’s servants
  - among Saul’s servants
  - of Saul’s officials
  lexicon: HALOT
  rationale: The partitive מִן indicates he was one of Saul's servants. 'Servants' is preferred over 'officials' because עֶבֶד fundamentally denotes a servant in royal service; the context does not require a more technical bureaucratic term.
- source_word: בַּיּוֹם הַהוּא
  chosen: that day
  alternatives:
  - on that day
  lexicon: HALOT
  rationale: Standard temporal expression. 'That day' is natural English and preserves the temporal reference.
- source_word: נֶעְצָר לִפְנֵי יְהוָה
  chosen: detained before the LORD
  alternatives:
  - restrained before the LORD
  - kept back before the LORD
  - held before the LORD
  lexicon: HALOT
  rationale: The passive participle suggests being held back or detained, likely for cultic reasons, without specifying the exact cause. 'Detained' preserves the ambiguity better than more interpretive options. לִפְנֵי יְהוָה is rendered 'before the LORD,' following the default rendering for יְהוָה and the common cultic idiom of being in the LORD's presence.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וּשְׁמוֹ דֹּאֵג הָאֲדֹמִי
  chosen: his name was Doeg the Edomite
  alternatives:
  - and his name was Doeg the Edomite
  lexicon: HALOT
  rationale: Standard naming formula. The conjunction is absorbed into natural English syntax. The gentilic is translated 'the Edomite' rather than transliterated.
- source_word: אַבִּיר הָרֹעִים
  chosen: the chief ... shepherds
  alternatives:
  - the mighty one of the shepherds
  - the overseer of the shepherds
  - the strongest of the shepherds
  lexicon: HALOT
  rationale: אַבִּיר can denote a mighty or prominent person. In this administrative context with Saul's shepherds, it most likely indicates rank or authority rather than physical strength. 'Chief' communicates that he was the head over the shepherds.
- source_word: אֲשֶׁר לְשָׁאוּל
  chosen: of Saul’s shepherds
  alternatives:
  - who belonged to Saul
  - who were Saul’s
  lexicon: HALOT
  rationale: The relative clause modifies 'shepherds' and indicates possession or association. In English it is most natural to fold this into 'Saul’s shepherds' rather than preserve a more wooden relative clause.
