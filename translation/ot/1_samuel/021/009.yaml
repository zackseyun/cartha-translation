id: 1SA.21.9
reference: 1 Samuel 21:9
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר דָּוִד֙ לַ/אֲחִימֶ֔לֶךְ וְ/אִ֛ין יֶשׁ פֹּ֥ה תַֽחַת יָדְ/ךָ֖ חֲנִ֣ית
    אוֹ חָ֑רֶב כִּ֣י גַם חַרְבִּ֤/י וְ/גַם כֵּלַ/י֙ לֹֽא לָקַ֣חְתִּי בְ/יָדִ֔/י כִּֽי
    הָיָ֥ה דְבַר הַ/מֶּ֖לֶךְ נָחֽוּץ־־־־־־־־׃ס
translation:
  text: And David said to Ahimelech, “Is there not here under your hand a spear or
    a sword? For I did not take my sword or my weapons in my hand, because the king’s
    matter was urgent.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''under your hand,'' an idiom that can mean ''at your disposal''
      or ''in your possession.'''
    reason: lexical_alternative
  - marker: b
    text: Or 'my sword and my gear/equipment'; the Hebrew term can refer broadly to
      implements or equipment, here likely weapons.
    reason: lexical_alternative
  - marker: c
    text: Or 'the king’s business' or 'the king’s command'; Hebrew 'matter/word' is
      broader than any single English option.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: And ... said
  alternatives:
  - Then ... said
  lexicon: HALOT
  rationale: Standard narrative wayyiqtol introducing direct speech; 'And' preserves
    Hebrew narrative flow without overinterpreting sequence.
- source_word: לַאֲחִימֶלֶךְ
  chosen: to Ahimelech
  rationale: Personal name transliterated per project philosophy.
- source_word: וְאִין יֶשׁ
  chosen: Is there not
  alternatives:
  - And is there no
  - Is there no
  lexicon: HALOT
  rationale: The combination forms an idiomatic negative existential question. English
    smooths the doubled existential into natural phrasing.
- source_word: פֹּה
  chosen: here
  alternatives:
  - in this place
  lexicon: HALOT
  rationale: Simple locative adverb; 'here' is the natural equivalent.
- source_word: תַּחַת יָדְךָ
  chosen: under your hand
  alternatives:
  - at your disposal
  - in your possession
  lexicon: HALOT
  rationale: Literally 'under your hand.' Kept in the main text because it is intelligible
    in English and preserves the concrete Hebrew idiom; alternatives are possible
    but more interpretive.
- source_word: חֲנִית אוֹ חָרֶב
  chosen: a spear or a sword
  lexicon: HALOT
  rationale: Direct rendering of the two weapon terms in singular form.
- source_word: כִּי
  chosen: For
  alternatives:
  - because
  lexicon: HALOT
  rationale: Introduces David's explanation for the request; 'For' fits direct speech
    naturally.
- source_word: גַם חַרְבִּי וְגַם כֵּלַי
  chosen: my sword or my weapons
  alternatives:
  - my sword and my gear
  - my sword and my equipment
  lexicon: HALOT
  rationale: כֵּלַי is broad ('articles, vessels, gear, equipment, weapons'). In this
    military context 'weapons' best conveys the likely sense. The conjunction sequence
    with repeated גַם is rendered idiomatically in English rather than woodenly repeating
    'also ... also.'
- source_word: לֹא לָקַחְתִּי בְיָדִי
  chosen: I did not take ... in my hand
  alternatives:
  - I did not bring with me
  - I did not carry
  lexicon: HALOT
  rationale: Retains the concrete idiom 'in my hand' rather than replacing it with
    a freer paraphrase. This preserves the Hebrew expression while remaining understandable.
- source_word: דְבַר הַמֶּלֶךְ
  chosen: the king’s matter
  alternatives:
  - the king’s business
  - the king’s command
  lexicon: HALOT
  rationale: דבר can mean 'word, matter, affair, business.' 'Matter' is broad enough
    to preserve the ambiguity of David's statement without narrowing it to either
    a spoken command or a mission.
- source_word: נָחוּץ
  chosen: urgent
  alternatives:
  - pressing
  - hurried
  lexicon: HALOT
  rationale: Conveys the sense of something pressing or urgent. 'Urgent' is clear
    modern English and fits the context of haste.
