theological_decisions:
- issue: Ritual purity condition for receiving holy bread
  chosen_reading: The priest conditions access to the holy bread on the men's sexual
    abstinence, expressed without expanding beyond the Hebrew.
  alternative_readings:
  - The phrase could be paraphrased more explicitly as abstinence from sexual relations
    for ceremonial cleanness.
  rationale: The verse reflects cultic holiness categories, not a general theological
    statement about women or sexuality. The translation preserves the text's condition
    without importing broader doctrinal claims.
  doctrine_reference: Translation philosophy §§1, 3, 6
