id: 1SA.21.5
reference: 1 Samuel 21:5
source:
  edition: WLC
  text: וַ/יַּ֨עַן הַ/כֹּהֵ֤ן אֶת דָּוִד֙ וַ/יֹּ֔אמֶר אֵֽין לֶ֥חֶם חֹ֖ל אֶל תַּ֣חַת
    יָדִ֑/י כִּֽי אִם לֶ֤חֶם קֹ֨דֶשׁ֙ יֵ֔שׁ אִם נִשְׁמְר֥וּ הַ/נְּעָרִ֖ים אַ֥ךְ מֵ/אִשָּֽׁה־־־־־־׃פ
translation:
  text: The priest answered David and said, “There is no ordinary bread on hand, but
    there is holy bread—if the young men have kept themselves at least from women.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “from a woman,” that is, abstaining from sexual relations for ritual
      cleanness.
    reason: lexical_alternative
lexical_decisions:
- source_word: לֶחֶם חֹל
  chosen: ordinary bread
  alternatives:
  - common bread
  - profane bread
  lexicon: HALOT
  rationale: חֹל contrasts with קֹדֶשׁ ('holy'), so the sense is non-sacred/common
    rather than morally 'profane.' 'Ordinary bread' is natural modern English and
    preserves the cultic contrast.
- source_word: אֶל תַּחַת יָדִי
  chosen: on hand
  alternatives:
  - under my hand
  - at my disposal
  lexicon: HALOT
  rationale: The idiom literally involves 'under my hand' but here means available/in
    possession. 'On hand' gives the plain sense in readable English without wooden
    literalism.
- source_word: כִּי אִם
  chosen: but
  alternatives:
  - except that
  - rather
  lexicon: HALOT
  rationale: 'In this contrastive construction, the phrase introduces the exception/contrast:
    no ordinary bread, but holy bread is available.'
- source_word: לֶחֶם קֹדֶשׁ
  chosen: holy bread
  alternatives:
  - consecrated bread
  - sacred bread
  lexicon: HALOT
  rationale: The bread is cultically set apart. 'Holy bread' is direct and transparent;
    'consecrated bread' is possible but slightly more technical.
- source_word: אִם נִשְׁמְרוּ
  chosen: if ... have kept themselves
  alternatives:
  - if ... have abstained
  - if ... have remained pure
  lexicon: HALOT
  rationale: The Niphal of שׁמר here conveys keeping oneself from something, i.e.,
    abstaining. 'Have kept themselves' stays close to the Hebrew and prepares for
    the following phrase.
- source_word: הַנְּעָרִים
  chosen: the young men
  alternatives:
  - the servants
  - the men
  lexicon: HALOT
  rationale: נְעָרִים can mean youths, attendants, or young men. In context David's
    companions are in view; 'young men' is a natural rendering that preserves the
    lexical sense without over-specifying rank.
- source_word: אַךְ
  chosen: at least
  alternatives:
  - only
  - surely
  lexicon: HALOT
  rationale: 'Here אַךְ limits the condition: at least/only with respect to abstaining
    from women. ''At least'' best captures the pragmatic force in English.'
- source_word: מֵאִשָּׁה
  chosen: from women
  alternatives:
  - from a woman
  - from sexual relations with women
  lexicon: HALOT
  rationale: The singular after מן can be collective in sense. The context concerns
    sexual abstinence for ritual purity, so 'from women' is idiomatic and concise;
    the fuller sense can be clarified in a footnote.
