id: 1SA.21.14
reference: 1 Samuel 21:14
source:
  edition: WLC
  text: וַ/יְשַׁנּ֤/וֹ אֶת טַעְמ/וֹ֙ בְּ/עֵ֣ינֵי/הֶ֔ם וַ/יִּתְהֹלֵ֖ל בְּ/יָדָ֑/ם ו/יתו
    עַל דַּלְת֣וֹת הַ/שַּׁ֔עַר וַ/יּ֥וֹרֶד רִיר֖/וֹ אֶל זְקָנֽ/וֹ־־־׃
translation:
  text: So he changed his behavior before their eyes and acted like a madman in their
    hands; he made marks on the doors of the gate and let his saliva run down onto
    his beard.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'feigned madness' for 'acted like a madman'; the Hebrew verb describes
      behaving in a crazed way, and the wider context indicates this was deliberate.
    reason: lexical_alternative
  - marker: b
    text: The verb rendered 'made marks' is difficult and may also be understood as
      'scratched' or 'scribbled' on the gate doors.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְשַׁנּוֹ
  chosen: he changed
  alternatives:
  - he altered
  - he disguised
  lexicon: HALOT
  rationale: From שנה in the piel/causative sense, indicating a deliberate alteration.
    'Changed' is the most direct and natural English rendering here.
- source_word: טַעְמוֹ
  chosen: his behavior
  alternatives:
  - his sense
  - his sanity
  - his discretion
  lexicon: HALOT
  rationale: Though טעם often means 'taste' or figuratively 'judgment/discernment,'
    in this narrative context it refers to David's apparent demeanor or mental bearing.
    'Behavior' communicates the observable change without overcommitting to an internal
    psychological state.
- source_word: בְּעֵינֵיהֶם
  chosen: before their eyes
  alternatives:
  - in their sight
  - in their presence
  lexicon: HALOT
  rationale: A common Hebrew idiom meaning in the sight or presence of others. 'Before
    their eyes' preserves the vividness of the Hebrew.
- source_word: וַיִּתְהֹלֵל
  chosen: acted like a madman
  alternatives:
  - feigned madness
  - behaved insanely
  - raved
  lexicon: HALOT
  rationale: The hitpael of הלל here denotes mad or irrational behavior. 'Acted like
    a madman' makes explicit that the behavior is performative in context, matching
    the narrative of David pretending insanity.
- source_word: בְּיָדָם
  chosen: in their hands
  alternatives:
  - under their control
  - while in their custody
  lexicon: HALOT
  rationale: Literally 'in their hands.' The phrase may imply being in their power
    or custody, but the literal rendering is intelligible in English and preserves
    the Hebrew imagery.
- source_word: ויתו
  chosen: he made marks
  alternatives:
  - he scratched
  - he scribbled
  lexicon: HALOT
  rationale: The verb is difficult and relatively rare; in context it describes David's
    abnormal action on the gate doors. 'Made marks' is a cautious rendering broad
    enough to cover scratching or scribbling without claiming more precision than
    the lexeme securely allows.
- source_word: דַּלְתוֹת הַשַּׁעַר
  chosen: the doors of the gate
  alternatives:
  - the gate doors
  lexicon: HALOT
  rationale: A straightforward construct-like phrase referring to the door-panels
    or leaves of the city gate.
- source_word: וַיּוֹרֶד
  chosen: let ... run down
  alternatives:
  - caused ... to go down
  - drip down
  lexicon: HALOT
  rationale: From ירד, 'to go down.' With saliva as subject/object relation in English,
    'let his saliva run down' captures the sense idiomatically.
- source_word: רִירוֹ
  chosen: his saliva
  alternatives:
  - his spittle
  - his drool
  lexicon: HALOT
  rationale: '''Saliva'' is clear modern English. ''Spittle'' is traditional but less
    current; ''drool'' is more colloquial and interpretive.'
- source_word: אֶל זְקָנוֹ
  chosen: onto his beard
  alternatives:
  - down to his beard
  - upon his beard
  lexicon: HALOT
  rationale: The preposition plus context indicates movement down onto the beard.
    'Onto his beard' is natural English and fits the physical scene.
