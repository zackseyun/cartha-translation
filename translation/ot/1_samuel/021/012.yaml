id: 1SA.21.12
reference: 1 Samuel 21:12
source:
  edition: WLC
  text: וַ/יֹּ֨אמְר֜וּ עַבְדֵ֤י אָכִישׁ֙ אֵלָ֔י/ו הֲ/לוֹא זֶ֥ה דָוִ֖ד מֶ֣לֶךְ הָ/אָ֑רֶץ
    הֲ/ל֣וֹא לָ/זֶ֗ה יַעֲנ֤וּ בַ/מְּחֹלוֹת֙ לֵ/אמֹ֔ר הִכָּ֤ה שָׁאוּל֙ ב/אלפ/ו וְ/דָוִ֖ד
    ב/רבבת/ו־׃
translation:
  text: And the servants of Achish said to him, “Is this not David, the king of the
    land? Is this not the one of whom they sang in the dances, saying, ‘Saul has struck
    down his thousands, and David his ten thousands’?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “they answered one another in the dances,” that is, they sang responsively
      during the dancing.
    reason: lexical_alternative
  - marker: b
    text: “Ten thousands” may also be rendered “myriads” or “tens of thousands.”
    reason: lexical_alternative
lexical_decisions:
- source_word: עַבְדֵי
  chosen: servants
  alternatives:
  - servants of
  - officials
  lexicon: HALOT
  rationale: The construct with Achish identifies members of his household/court.
    'Servants' is the most direct rendering in context; 'officials' is possible by
    function, but the Hebrew term itself is broader and should not be narrowed without
    necessity.
- source_word: הֲלוֹא
  chosen: Is ... not
  alternatives:
  - Surely
  - Is it not
  lexicon: HALOT
  rationale: The particle introduces a rhetorical question expecting agreement. English
    'Is this not...?' preserves both the interrogative form and the expected affirmative
    answer.
- source_word: מֶלֶךְ הָאָרֶץ
  chosen: the king of the land
  alternatives:
  - king of the country
  - king of the land
  lexicon: HALOT
  rationale: Formal rendering is retained. In context the Philistine servants speak
    hyperbolically or from perception about David's prominence in Israel; 'land' closely
    matches אֶרֶץ and avoids over-interpreting the political nuance.
- source_word: לָזֶה
  chosen: the one of whom
  alternatives:
  - this one
  - for this one
  lexicon: HALOT
  rationale: With the following ענה + ב + מחלות, the sense is reference to David as
    the subject of the song. 'The one of whom' is natural English that preserves the
    referential force.
- source_word: יַעֲנוּ
  chosen: they sang
  alternatives:
  - they answered
  - they chanted
  - they responded
  lexicon: HALOT
  rationale: ענה in this idiom with musical/dance context means to sing responsively
    or chant. 'They sang' communicates the sense clearly in modern English; the responsive
    nuance is possible but not necessary in the main text.
- source_word: בַמְּחֹלוֹת
  chosen: in the dances
  alternatives:
  - with dancing
  - in the dance circles
  lexicon: HALOT
  rationale: The noun refers to dancing/dance celebrations, often with women singing
    antiphonally. 'In the dances' is a close and readable rendering of the prepositional
    phrase.
- source_word: הִכָּה
  chosen: has struck down
  alternatives:
  - has slain
  - struck
  lexicon: HALOT
  rationale: The verb נכה commonly means to strike, smite, or strike down. In this
    victory-song context it refers to killing in battle. 'Has struck down' is vivid
    and natural without sounding archaic like 'has slain.'
- source_word: באלפו
  chosen: his thousands
  alternatives:
  - by his thousands
  - in his thousands
  lexicon: HALOT
  rationale: The beth with number here expresses the tally attributed to Saul. Traditional
    and idiomatic English is 'his thousands.'
- source_word: ברבבתו
  chosen: his ten thousands
  alternatives:
  - his myriads
  - his tens of thousands
  lexicon: HALOT
  rationale: רבבה denotes ten thousand or a myriad. 'Ten thousands' preserves the
    parallelism with 'thousands' and reflects the conventional wording of the song
    in this narrative.
