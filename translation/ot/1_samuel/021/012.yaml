theological_decisions:
- issue: Whether to render David's description as an objective title or as the Philistine
    servants' perception
  chosen_reading: the king of the land
  alternative_readings:
  - the king of the country
  - the king of the land [hyperbolic/perceived rather than formal title]
  rationale: The Hebrew simply reports the servants' words without clarifying whether
    they mean David literally reigns or is popularly regarded as Israel's leading
    figure. The translation preserves the wording and leaves the narrative tension
    intact rather than resolving it interpretively.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
