id: 1SA.21.3
reference: 1 Samuel 21:3
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר דָּוִ֜ד לַ/אֲחִימֶ֣לֶךְ הַ/כֹּהֵ֗ן הַ/מֶּלֶךְ֮ צִוַּ֣/נִי דָבָר֒
    וַ/יֹּ֣אמֶר אֵלַ֗/י אִ֣ישׁ אַל יֵ֧דַע מְא֛וּמָה אֶת הַ/דָּבָ֛ר אֲשֶׁר אָנֹכִ֥י
    שֹׁלֵֽחֲ/ךָ֖ וַ/אֲשֶׁ֣ר צִוִּיתִ֑/ךָ וְ/אֶת הַ/נְּעָרִ֣ים יוֹדַ֔עְתִּי אֶל מְק֥וֹם
    פְּלֹנִ֖י אַלְמוֹנִֽי־־־־־׃
translation:
  text: David said to Ahimelech the priest, “The king has charged me with a matter
    and said to me, ‘Let no man know anything about the matter for which I am sending
    you and with which I have charged you.’ And I have directed the young men to a
    certain place.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, “to such-and-such a place,” an idiom for an unspecified
      or undisclosed location.
    reason: lexical_alternative
  - marker: b
    text: Or “Let no one know anything.” The Hebrew reads literally “Let no man know
      anything.”
    reason: lexical_alternative
lexical_decisions:
- source_word: צִוַּנִי דָבָר
  chosen: has charged me with a matter
  alternatives:
  - has commanded me something
  - has given me a commission
  lexicon: HALOT
  rationale: צוה commonly means 'command, charge.' With דָבָר, the sense is that the
    king entrusted/commanded David regarding a matter. 'Charged me with a matter'
    preserves both the verbal force and the object without over-paraphrasing.
- source_word: אִישׁ אַל יֵדַע מְאוּמָה
  chosen: Let no man know anything
  alternatives:
  - Let no one know anything
  lexicon: HALOT
  rationale: אִישׁ is literally 'man.' Per the project's gender-accurate policy, the
    masculine form is retained where it reflects the source wording. In idiomatic
    English this could be 'no one,' but 'no man' better mirrors the Hebrew while remaining
    natural enough in direct speech.
- source_word: הַדָּבָר
  chosen: the matter
  alternatives:
  - the thing
  - the business
  lexicon: HALOT
  rationale: דבר here refers to the business/mission under discussion, not merely
    a spoken word. 'Matter' is concise and idiomatic.
- source_word: אֲשֶׁר אָנֹכִי שֹׁלֵחֲךָ
  chosen: for which I am sending you
  alternatives:
  - about which I am sending you
  - on which I am sending you
  lexicon: HALOT
  rationale: The clause modifies 'the matter' and explains the mission. English requires
    some smoothing; 'for which I am sending you' captures the relation between the
    matter and Ahimelech's involvement without adding content.
- source_word: וַאֲשֶׁר צִוִּיתִךָ
  chosen: and with which I have charged you
  alternatives:
  - and which I have commanded you
  - and what I have instructed you
  lexicon: HALOT
  rationale: The repeated צוה should be reflected consistently. 'Charged' matches
    the earlier rendering and keeps the formal tone of a royal directive.
- source_word: וְאֶת־הַנְּעָרִים
  chosen: And ... the young men
  alternatives:
  - And ... the servants
  - And ... the attendants
  lexicon: HALOT
  rationale: נערים can denote youths or attendants/servants depending on context.
    Here David refers to his accompanying men; 'young men' is the most direct rendering
    and leaves the social nuance open.
- source_word: יוֹדַעְתִּי
  chosen: I have directed
  alternatives:
  - I have made known
  - I have informed
  lexicon: HALOT
  rationale: The Hiphil of ידע often means 'make known,' but in this construction
    with אֶל־מְקוֹם it likely means David had arranged/instructed the young men to
    go to a designated place. 'I have directed' conveys that practical sense better
    than the overly literal 'made known.'
- source_word: אֶל־מְקוֹם פְּלֹנִי אַלְמוֹנִי
  chosen: to a certain place
  alternatives:
  - to such-and-such a place
  - to a particular unnamed place
  lexicon: HALOT
  rationale: The paired expression is an idiom for an unspecified or undisclosed place/person.
    'A certain place' is clear modern English in the main text; the more literal idiom
    is worth preserving in a footnote.
