id: 1SA.21.13
reference: 1 Samuel 21:13
source:
  edition: WLC
  text: וַ/יָּ֧שֶׂם דָּוִ֛ד אֶת הַ/דְּבָרִ֥ים הָ/אֵ֖לֶּה בִּ/לְבָב֑/וֹ וַ/יִּרָ֣א
    מְאֹ֔ד מִ/פְּנֵ֖י אָכִ֥ישׁ מֶֽלֶךְ גַּֽת־־׃
translation:
  text: David took these words to heart, and he was very much afraid of Achish king
    of Gath.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'David put these things in his heart.' The Hebrew idiom means that he
      took the report seriously and reflected on it inwardly.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּשֶׂם
  chosen: took
  alternatives:
  - put
  - set
  lexicon: HALOT
  rationale: The idiom שׂוּם ... בִּלְבָב means more than physically 'put'; in English
    'took ... to heart' naturally conveys internalizing or seriously considering the
    words while remaining faithful to the Hebrew idiom.
- source_word: אֶת־הַדְּבָרִים הָאֵלֶּה
  chosen: these words
  alternatives:
  - these things
  - this matter
  lexicon: HALOT
  rationale: דְּבָרִים can mean 'words,' 'matters,' or 'things.' Here the immediate
    referent is the servants' spoken report in the previous verse, so 'these words'
    is the most specific and contextually grounded rendering.
- source_word: בִּלְבָבוֹ
  chosen: to heart
  alternatives:
  - in his heart
  - in his mind
  lexicon: HALOT
  rationale: לֵבָב in Hebrew often denotes the inner thought-life, not merely emotion.
    In the idiom with שׂוּם, English 'to heart' preserves both the metaphor and the
    sense of inward reflection better than a wooden 'in his heart.'
- source_word: וַיִּרָא מְאֹד
  chosen: was very much afraid
  alternatives:
  - was greatly afraid
  - feared greatly
  lexicon: HALOT
  rationale: יָרֵא with מְאֹד intensifies David's fear. 'Was very much afraid' is
    clear modern English and preserves the emotional force without sounding archaic.
- source_word: מִפְּנֵי
  chosen: of
  alternatives:
  - before
  - because of
  - from before the face of
  lexicon: HALOT
  rationale: Literally 'from/before the face of,' but in this fear construction idiomatic
    English is simply 'afraid of.' This is an optimal-equivalence adjustment rather
    than a lexical omission.
- source_word: אָכִישׁ
  chosen: Achish
  rationale: Personal name transliterated according to standard English convention,
    following the project's policy to transliterate names rather than translate them.
- source_word: מֶלֶךְ גַּת
  chosen: king of Gath
  alternatives:
  - the king of Gath
  lexicon: HALOT
  rationale: 'Construct chain rendered straightforwardly. English omits the article
    naturally before a proper-name appositional title in this context: ''Achish king
    of Gath.'''
