id: 1SA.21.16
reference: 1 Samuel 21:16
source:
  edition: WLC
  text: חֲסַ֤ר מְשֻׁגָּעִים֙ אָ֔נִי כִּי הֲבֵאתֶ֣ם אֶת זֶ֔ה לְ/הִשְׁתַּגֵּ֖עַ עָלָ֑/י
    הֲ/זֶ֖ה יָב֥וֹא אֶל בֵּיתִֽ/י־־־׃ס
translation:
  text: Do I lack madmen, that you have brought this one to act like a madman before
    me? Shall this one come into my house?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to behave insanely in my presence.' The Hebrew infinitive can be rendered
      more generally as acting madly, though the context suggests deliberate feigned
      madness.
    reason: lexical_alternative
lexical_decisions:
- source_word: חֲסַר
  chosen: lack
  alternatives:
  - be in need of
  - be without
  lexicon: HALOT
  rationale: 'Predicate adjective used idiomatically in a rhetorical question: ''Am
    I lacking...?'' English ''Do I lack...?'' preserves the sharp sarcasm of Achish''s
    speech.'
- source_word: מְשֻׁגָּעִים
  chosen: madmen
  alternatives:
  - crazy men
  - mad people
  - lunatics
  lexicon: HALOT
  rationale: Plural passive-participial form from שׁגע used substantivally for people
    regarded as insane. 'Madmen' is natural, forceful, and matches the masculine plural
    reference without softening the insult.
- source_word: כִּי
  chosen: that
  alternatives:
  - for
  - because
  lexicon: HALOT
  rationale: 'Introduces the content/result of the rhetorical complaint: ''that you
    have brought...'' rather than a strongly causal ''because'' in English.'
- source_word: הֲבֵאתֶם אֶת זֶה
  chosen: you have brought this one
  alternatives:
  - you brought this fellow
  - you have brought this man
  lexicon: HALOT
  rationale: The demonstrative 'this one' preserves the demeaning, dismissive tone
    toward David better than the more interpretive 'this fellow' while remaining idiomatic.
- source_word: לְהִשְׁתַּגֵּעַ
  chosen: to act like a madman
  alternatives:
  - to behave insanely
  - to be mad
  - to rave
  lexicon: HALOT
  rationale: 'Hitpael infinitive of שׁגע is reflexive/ingressive in sense: behaving
    as insane. ''To act like a madman'' captures the performed behavior in context,
    since David has feigned madness.'
- source_word: עָלַי
  chosen: before me
  alternatives:
  - against me
  - at me
  - in my presence
  lexicon: HALOT
  rationale: Although literally 'upon me,' in this context it denotes behavior directed
    in the king's presence. 'Before me' is idiomatic and fits the scene better than
    a hostile 'against me.'
- source_word: הֲזֶה
  chosen: this one
  alternatives:
  - this man
  - this fellow
  lexicon: HALOT
  rationale: The repeated demonstrative is rhetorically contemptuous. Repeating 'this
    one' preserves the Hebrew emphasis and disdain.
- source_word: יָבֹא אֶל־בֵּיתִי
  chosen: come into my house
  alternatives:
  - enter my house
  - come to my house
  lexicon: HALOT
  rationale: '''Come into my house'' best reflects motion into the royal household/presence,
    not merely arrival at the location.'
