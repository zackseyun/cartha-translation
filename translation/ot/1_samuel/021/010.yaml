id: 1SA.21.10
reference: 1 Samuel 21:10
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר הַ/כֹּהֵ֗ן חֶרֶב֩ גָּלְיָ֨ת הַ/פְּלִשְׁתִּ֜י אֲשֶׁר הִכִּ֣יתָ
    בְּ/עֵ֣מֶק הָאֵלָ֗ה הִנֵּה הִ֞יא לוּטָ֣ה בַ/שִּׂמְלָה֮ אַחֲרֵ֣י הָ/אֵפוֹד֒ אִם
    אֹתָ֤/הּ תִּֽקַּח לְ/ךָ֙ קָ֔ח כִּ֣י אֵ֥ין אַחֶ֛רֶת זוּלָתָ֖/הּ בָּ/זֶ֑ה וַ/יֹּ֧אמֶר
    דָּוִ֛ד אֵ֥ין כָּמ֖וֹ/הָ תְּנֶ֥/נָּה לִּֽ/י־׀־־־׃
translation:
  text: And the priest said, “The sword of Goliath the Philistine, whom you struck
    down in the Valley of Elah—look, it is wrapped in a cloak behind the ephod. If
    you will take that for yourself, take it, for there is no other here except it.”
    And David said, “There is none like it; give it to me.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'wrapped in the cloak'; the noun can also be rendered 'garment' or
      'mantle.'
    reason: lexical_alternative
lexical_decisions:
- source_word: חֶרֶב גָּלְיָת הַפְּלִשְׁתִּי
  chosen: the sword of Goliath the Philistine
  alternatives:
  - Goliath the Philistine's sword
  lexicon: HALOT
  rationale: Construct relationship is most naturally rendered with 'of.' Retains
    the appositional ethnic identifier 'the Philistine.'
- source_word: הִכִּיתָ
  chosen: you struck down
  alternatives:
  - you killed
  - you struck
  lexicon: HALOT
  rationale: The verb נכה often means 'strike' and in battle contexts can imply killing/defeat.
    'Struck down' preserves the martial force without over-specifying beyond the verb
    itself.
- source_word: בְּעֵמֶק הָאֵלָה
  chosen: in the Valley of Elah
  alternatives:
  - in the vale of Elah
  lexicon: HALOT
  rationale: Standard place-name rendering in modern English; 'Valley' is clearer
    than archaic 'vale.'
- source_word: הִנֵּה
  chosen: look
  alternatives:
  - behold
  - see
  lexicon: HALOT
  rationale: A deictic particle drawing attention to the object. 'Look' is readable
    modern English and preserves the discourse function better than archaic 'behold.'
- source_word: לוּטָה
  chosen: wrapped
  alternatives:
  - covered
  - enveloped
  lexicon: HALOT
  rationale: Passive participial sense indicates the sword is enclosed in cloth. 'Wrapped'
    is the most idiomatic English choice in this context.
- source_word: בַשִּׂמְלָה
  chosen: in a cloak
  alternatives:
  - in a garment
  - in the mantle
  lexicon: HALOT
  rationale: שׂמלה denotes an outer garment or cloak. 'Cloak' is natural English for
    an item used to wrap something.
- source_word: אַחֲרֵי הָאֵפוֹד
  chosen: behind the ephod
  alternatives:
  - after the ephod
  - at the back of the ephod
  lexicon: HALOT
  rationale: Spatial sense is intended here, indicating location relative to the ephod.
    'Behind' is the clearest idiomatic rendering.
- source_word: אִם אֹתָהּ תִּקַּח לְךָ קָח
  chosen: If you will take that for yourself, take it
  alternatives:
  - If you want to take it, take it
  - If you would take it for yourself, take it
  lexicon: HALOT
  rationale: The construction is somewhat idiomatic and permissive. Rendering the
    initial אִם-clause as a volitional condition preserves the sense of offered permission
    without awkward literalism.
- source_word: כִּי אֵין אַחֶרֶת זוּלָתָהּ בָּזֶה
  chosen: for there is no other here except it
  alternatives:
  - for there is no other besides it here
  - for there is no other one here but it
  lexicon: HALOT
  rationale: זוּלָתָהּ marks exception. 'Here' is supplied for בָּזֶה in context,
    referring to this place. The feminine pronouns refer back to 'sword.'
- source_word: אֵין כָּמוֹהָ
  chosen: There is none like it
  alternatives:
  - There is nothing like it
  - None is like it
  lexicon: HALOT
  rationale: An idiomatic expression of uniqueness or excellence. 'There is none like
    it' is natural and preserves the feminine reference to the sword.
- source_word: תְּנֶנָּה לִּי
  chosen: give it to me
  alternatives:
  - give her to me
  lexicon: HALOT
  rationale: Although the suffix is grammatically feminine because it refers to 'sword,'
    English uses neuter for inanimate objects. 'Give it to me' is therefore gender-accurate
    to English usage while preserving the referent.
