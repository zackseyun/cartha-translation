id: 1SA.21.4
reference: 1 Samuel 21:4
source:
  edition: WLC
  text: וְ/עַתָּ֗ה מַה יֵּ֧שׁ תַּֽחַת יָדְ/ךָ֛ חֲמִשָּׁה לֶ֖חֶם תְּנָ֣/ה בְ/יָדִ֑/י
    א֖וֹ הַ/נִּמְצָֽא־־־׃
translation:
  text: Now then, what do you have on hand? Give me five loaves of bread, or whatever
    is available.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'what is under your hand,' a Hebrew idiom for what is immediately
      available or in one's possession.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'give into my hand,' meaning 'give me.'
    reason: lexical_alternative
  - marker: c
    text: Or, 'or whatever can be found.'
    reason: alternative_reading
lexical_decisions:
- source_word: וְעַתָּה
  chosen: Now then
  alternatives:
  - And now
  - Now
  lexicon: HALOT
  rationale: Introduces an immediate practical request following the prior exchange.
    'Now then' captures both the temporal and discourse-transition force in natural
    English.
- source_word: מַה יֵּשׁ
  chosen: what do you have
  alternatives:
  - what is there
  - what is at hand
  lexicon: HALOT
  rationale: The idiom asks what is available or possessed. Rendering with 'do you
    have' communicates the sense clearly in English.
- source_word: תַּחַת יָדְךָ
  chosen: on hand
  alternatives:
  - under your hand
  - in your possession
  lexicon: HALOT
  rationale: This Hebrew idiom refers to what is immediately available or in one's
    possession. 'On hand' is a natural equivalent that preserves the practical sense.
- source_word: חֲמִשָּׁה לֶחֶם
  chosen: five loaves of bread
  alternatives:
  - five breads
  - five loaves
  lexicon: HALOT
  rationale: Though Hebrew uses 'bread' collectively, in English a counted request
    is best rendered 'loaves of bread.' This preserves the numeral and the concrete
    food item.
- source_word: תְּנָה
  chosen: Give me
  alternatives:
  - Please give
  - give
  lexicon: HALOT
  rationale: Imperative of נתן with the following phrase 'into my hand' expresses
    a direct request. 'Give me' is idiomatic English; the indirect object is supplied
    from the Hebrew expression.
- source_word: בְיָדִי
  chosen: me
  alternatives:
  - into my hand
  - in my hand
  lexicon: HALOT
  rationale: Literally 'into my hand/in my hand,' but in English this is naturally
    absorbed into 'give me.' The underlying sense of personal transfer is preserved
    without wooden phrasing.
- source_word: אוֹ הַנִּמְצָא
  chosen: or whatever is available
  alternatives:
  - or whatever can be found
  - or what is present
  lexicon: HALOT
  rationale: The passive participle from מצא means 'what is found/available.' In context
    David broadens the request beyond five loaves to any food presently obtainable.
    'Whatever is available' is clear and contextually precise.
