id: 1SA.21.1
reference: 1 Samuel 21:1
source:
  edition: WLC
  text: וַ/יָּ֖קָם וַ/יֵּלַ֑ךְ וִ/יהוֹנָתָ֖ן בָּ֥א הָ/עִֽיר׃
translation:
  text: Then he arose and went away, and Jonathan went into the city.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'came into the city'; rendered 'went into the city' for natural English
      motion from Jonathan's perspective.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּקָם
  chosen: Then he arose
  alternatives:
  - Then he got up
  - So he arose
  lexicon: HALOT
  rationale: Qal wayyiqtol of קום, a common narrative advance verb meaning 'arise/get
    up/stand up.' 'Arose' preserves the slightly elevated but still readable narrative
    style and the sequential force of the wayyiqtol. 'Then' reflects the narrative
    progression without overtranslating the conjunction.
- source_word: וַיֵּלַךְ
  chosen: and went away
  alternatives:
  - and went
  - and departed
  lexicon: HALOT
  rationale: Qal wayyiqtol of הלך, 'go/walk.' In this context, after the parting between
    David and Jonathan in the preceding scene, 'went away' makes the separation explicit
    in natural English while staying within the semantic range. 'Departed' is possible
    but slightly more formal.
- source_word: וִיהוֹנָתָן
  chosen: and Jonathan
  rationale: Proper name, transliterated by standard English convention in keeping
    with the translation philosophy to transliterate names rather than translate them.
- source_word: בָּא
  chosen: went into
  alternatives:
  - came into
  - entered
  lexicon: HALOT
  rationale: Qal perfect of בוא, literally 'came.' With the destination 'the city,'
    English idiom often prefers 'went into' when the motion is viewed from the subject's
    perspective rather than the narrator's deictic center. 'Entered' is also possible,
    but 'went into' is more natural and transparent.
- source_word: הָעִיר
  chosen: the city
  alternatives:
  - the town
  lexicon: HALOT
  rationale: עיר normally denotes a city/town. 'The city' is the straightforward rendering
    of the definite noun and matches common English Bible style; 'town' is possible
    but less standard here.
