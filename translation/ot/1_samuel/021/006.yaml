theological_decisions:
- issue: Ritual purity language related to abstinence and holy bread
  chosen_reading: Render the verse in terms of ritual holiness/consecration without
    importing later doctrinal categories.
  alternative_readings:
  - Interpret the statement primarily as moral purity
  - Interpret the statement as merely practical cleanliness
  rationale: The context concerns eligibility to receive consecrated bread. The Hebrew
    contrasts holy and common status, likely involving sexual abstinence and ritual
    readiness. The translation preserves that cultic framework without moralizing
    beyond the text.
  doctrine_reference: Translation philosophy §§1, 3, 6
