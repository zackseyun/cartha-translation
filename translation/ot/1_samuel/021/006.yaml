id: 1SA.21.6
reference: 1 Samuel 21:6
source:
  edition: WLC
  text: וַ/יַּעַן֩ דָּוִ֨ד אֶת הַ/כֹּהֵ֜ן וַ/יֹּ֣אמֶר ל֗/וֹ כִּ֣י אִם אִשָּׁ֤ה עֲצֻֽרָה
    לָ֨/נוּ֙ כִּ/תְמ֣וֹל שִׁלְשֹׁ֔ם בְּ/צֵאתִ֕/י וַ/יִּהְי֥וּ כְלֵֽי הַ/נְּעָרִ֖ים
    קֹ֑דֶשׁ וְ/הוּא֙ דֶּ֣רֶךְ חֹ֔ל וְ/אַ֕ף כִּ֥י הַ/יּ֖וֹם יִקְדַּ֥שׁ בַּ/כֶּֽלִי־־־־׃
translation:
  text: David answered the priest and said to him, “Indeed, women have been kept from
    us as before, when I went out. The young men’s vessels are holy, even though it
    is an ordinary journey. How much more today will it be made holy in the vessel.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “a woman has been withheld from us,” or “we have kept ourselves from
      women.” The Hebrew expression refers to sexual abstinence in preparation for
      handling holy things.
    reason: lexical_alternative
  - marker: b
    text: Literally “as yesterday, three days ago,” a Hebrew idiom referring to prior
      days; some take it more specifically as “for about three days.”
    reason: lexical_alternative
  - marker: c
    text: “Vessels” may refer to the young men’s equipment; some understand it euphemistically
      of their bodies/persons.
    reason: lexical_alternative
  - marker: d
    text: The Hebrew of the last clause is difficult. It may also be understood, “although
      the journey is ordinary, today it will be holy in respect to the vessel/gear,”
      or similarly.
    reason: alternative_reading
lexical_decisions:
- source_word: אִשָּׁה עֲצֻרָה לָנוּ
  chosen: women have been kept from us
  alternatives:
  - a woman has been withheld from us
  - we have kept ourselves from women
  lexicon: HALOT
  rationale: The phrase refers to sexual abstinence from women in a state of ritual
    readiness. Plural 'women' fits the likely collective sense in context, though
    the singular noun can function generically. Passive 'have been kept from us' preserves
    the Hebrew participial construction without over-paraphrasing.
- source_word: כִּתְמוֹל שִׁלְשֹׁם
  chosen: as before
  alternatives:
  - for about three days
  - since yesterday and the day before
  lexicon: HALOT
  rationale: The idiom literally points to prior days ('as yesterday, three days ago')
    and in context indicates an established period of abstinence before the present
    request. 'As before' gives readable English while preserving the temporal force
    without forcing an exact count that the idiom may not require.
- source_word: בְּצֵאתִי
  chosen: when I went out
  alternatives:
  - from my going out
  - when I set out
  lexicon: HALOT
  rationale: The infinitive construct with preposition marks the time of departure
    on the mission. 'When I went out' is natural English and keeps the temporal nuance.
- source_word: כְלֵי הַנְּעָרִים
  chosen: the young men’s vessels
  alternatives:
  - the young men’s gear
  - the young men’s bodies
  lexicon: HALOT
  rationale: כְּלִי literally means 'vessel, article, implement, gear.' In this difficult
    context it may refer either to equipment or, euphemistically, to the persons/bodies
    of the men. 'Vessels' stays closer to the Hebrew and preserves the ambiguity;
    alternatives are noted because many interpreters understand 'gear' or even 'bodies'
    here.
- source_word: קֹדֶשׁ
  chosen: holy
  alternatives:
  - consecrated
  - clean
  lexicon: HALOT
  rationale: The term denotes sacred or consecrated status. 'Holy' is the most direct
    rendering; 'clean' would narrow it too much to ritual purity alone.
- source_word: וְהוּא דֶּרֶךְ חֹל
  chosen: even though it is an ordinary journey
  alternatives:
  - though it is a common matter
  - and it is a profane/common journey
  lexicon: HALOT
  rationale: חֹל contrasts with holy things as common/ordinary rather than morally
    evil. Rendering דֶּרֶךְ as 'journey' fits the mission context. The clause is notoriously
    difficult; this translation preserves the contrast between ordinary circumstances
    and holy status.
- source_word: וְאַף כִּי
  chosen: How much more
  alternatives:
  - and especially since
  - even though
  lexicon: HALOT
  rationale: The phrase often intensifies an argument. 'How much more' best captures
    the inferential force here, though the syntax is compressed and debated.
- source_word: הַיּוֹם יִקְדַּשׁ
  chosen: today will it be made holy
  alternatives:
  - today it is holy
  - today it will be consecrated
  lexicon: HALOT
  rationale: The imperfect of קדשׁ can be rendered as passive/reflexive in context.
    'Will be made holy' preserves the verbal sense rather than flattening it to a
    stative adjective.
- source_word: בַּכֶּלִי
  chosen: in the vessel
  alternatives:
  - with the vessel
  - in the body
  - in the gear
  lexicon: HALOT
  rationale: The prepositional phrase is highly obscure. Retaining 'vessel' keeps
    lexical continuity with כְלֵי earlier in the verse and avoids prematurely resolving
    whether the reference is to equipment, body, or another cultic object.
