theological_decisions:
- issue: Gendered term אִישׁ in direct speech
  chosen_reading: no man is with you
  alternative_readings:
  - no one is with you
  rationale: The Hebrew explicitly uses the masculine singular noun אִישׁ. In this
    narrative context Ahimelech is asking why David lacks the men who would ordinarily
    accompany him. Retaining 'man' follows the gender-accurate policy and avoids unnecessary
    neutralization.
  doctrine_reference: DOCTRINE.md § Translation philosophy, point 4
