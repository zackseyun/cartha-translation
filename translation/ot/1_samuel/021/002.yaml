id: 1SA.21.2
reference: 1 Samuel 21:2
source:
  edition: WLC
  text: וַ/יָּבֹ֤א דָוִד֙ נֹ֔בֶ/ה אֶל אֲחִימֶ֖לֶךְ הַ/כֹּהֵ֑ן וַ/יֶּחֱרַ֨ד אֲחִימֶ֜לֶךְ
    לִ/קְרַ֣את דָּוִ֗ד וַ/יֹּ֤אמֶר ל/וֹ֙ מַדּ֤וּעַ אַתָּה֙ לְ/בַדֶּ֔/ךָ וְ/אִ֖ישׁ
    אֵ֥ין אִתָּֽ/ךְ־׃
translation:
  text: David came to Nob, to Ahimelech the priest. Ahimelech trembled when he met
    David and said to him, “Why are you alone, and no man is with you?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'and no one is with you.' The Hebrew more specifically says 'no man
      is with you.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹא
  chosen: came
  alternatives:
  - went
  - arrived
  lexicon: HALOT
  rationale: Common narrative wayyiqtol of בוא. 'Came' is natural English from the
    narrator's perspective and fits the movement to Nob without over-specifying arrival
    nuance.
- source_word: נֹבֶה
  chosen: to Nob
  alternatives:
  - Nob-ward
  - toward Nob
  lexicon: HALOT
  rationale: Directional he on the place name indicates motion toward/to Nob. In idiomatic
    English this is best rendered simply 'to Nob.'
- source_word: הַכֹּהֵן
  chosen: the priest
  alternatives:
  - priest
  lexicon: HALOT
  rationale: The article is present in Hebrew. 'The priest' identifies Ahimelech by
    office in context, not merely as one priest among others.
- source_word: וַיֶּחֱרַד
  chosen: trembled
  alternatives:
  - was afraid
  - was startled
  - shuddered
  lexicon: HALOT
  rationale: חרד conveys trembling with fear or alarm. 'Trembled' preserves the bodily
    vividness of the Hebrew better than the flatter 'was afraid.'
- source_word: לִקְרַאת
  chosen: when he met
  alternatives:
  - to meet
  - at the meeting of
  - to encounter
  lexicon: HALOT
  rationale: 'Literally ''to meet/toward meeting.'' In this clause, English idiom
    is smoother with a temporal sense: ''when he met David,'' while preserving the
    idea of Ahimelech''s reaction upon David''s arrival.'
- source_word: מַדּוּעַ
  chosen: Why
  alternatives:
  - Why is it that
  - For what reason
  lexicon: HALOT
  rationale: Standard interrogative asking reason; simple 'Why' is accurate and natural.
- source_word: לְבַדֶּךָ
  chosen: alone
  alternatives:
  - by yourself
  lexicon: HALOT
  rationale: The term means 'by yourself/alone.' 'Alone' is concise and idiomatic
    in direct speech.
- source_word: וְאִישׁ אֵין אִתָּךְ
  chosen: and no man is with you
  alternatives:
  - and no one is with you
  - and there is no man with you
  lexicon: HALOT
  rationale: Hebrew uses איש ('man') rather than a more abstract pronoun. Per the
    project's gender-accurate philosophy, 'no man' is retained rather than neutralizing
    to 'no one,' since the context concerns David's expected male attendants or companions.
