id: 1SA.21.7
reference: 1 Samuel 21:7
source:
  edition: WLC
  text: וַ/יִּתֶּן ל֥/וֹ הַ/כֹּהֵ֖ן קֹ֑דֶשׁ כִּי֩ לֹא הָ֨יָה שָׁ֜ם לֶ֗חֶם כִּֽי אִם לֶ֤חֶם הַ/פָּנִים֙ הַ/מּֽוּסָרִים֙ מִ/לִּ/פְנֵ֣י יְהוָ֔ה לָ/שׂוּם֙ לֶ֣חֶם חֹ֔ם בְּ/י֖וֹם הִלָּקְחֽ/וֹ־־־־׃
translation:
  text: So the priest gave him holy bread, for there was no bread there except the bread of the Presence, which had been removed from before Yahweh, to put hot bread there on the day it was taken away.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more traditionally, 'showbread.' Literally, 'the bread of the Presence.'
    reason: lexical_alternative
lexical_decisions:
- source_word: קֹדֶשׁ
  chosen: holy bread
  alternatives:
  - holy thing
  - consecrated bread
  lexicon: HALOT
  rationale: In context the noun 'holy thing' refers specifically to the consecrated bread just identified as the bread of the Presence. Rendering it 'holy bread' makes the referent explicit in natural English without adding content beyond the context.
- source_word: לֶחֶם הַפָּנִים
  chosen: the bread of the Presence
  alternatives:
  - showbread
  - the bread of the face/presence
  lexicon: HALOT
  rationale: This is the standard cultic expression for the bread set before YHWH. 'Bread of the Presence' preserves the Hebrew sense better than traditional 'showbread,' which is less transparent to modern readers.
- source_word: הַמּוּסָרִים
  chosen: which had been removed
  alternatives:
  - being removed
  - taken away
  lexicon: HALOT
  rationale: The passive participle describes the bread as removed from before YHWH in the regular replacement ritual. English relative clause form is the clearest way to express the attributive participle.
- source_word: מִלִּפְנֵי יְהוָה
  chosen: from before the LORD
  alternatives:
  - from the presence of the LORD
  - from before Yahweh
  lexicon: HALOT
  rationale: '''From before'' reflects the spatial-cultic idiom closely. Per doctrine, יְהוָה is rendered ''the LORD'' rather than a transliteration.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: לָשׂוּם
  chosen: to put
  alternatives:
  - to set
  - to place
  lexicon: HALOT
  rationale: A straightforward infinitive of purpose. 'Put' is idiomatic and sufficiently formal in this procedural context.
- source_word: לֶחֶם חֹם
  chosen: hot bread
  alternatives:
  - fresh bread
  - warm bread
  lexicon: HALOT
  rationale: The adjective literally means 'hot.' While the sense may imply freshly baked replacement bread, the Hebrew term itself is best preserved as 'hot,' allowing readers to infer freshness from the ritual setting.
- source_word: בְּיוֹם הִלָּקְחוֹ
  chosen: on the day it was taken away
  alternatives:
  - when it was taken away
  - on the day of its removal
  lexicon: HALOT
  rationale: This temporal phrase refers to the day the old bread was removed. The passive English rendering matches the Hebrew infinitive construct with pronominal suffix.
- source_word: כִּי לֹא הָיָה שָׁם לֶחֶם כִּי אִם
  chosen: for there was no bread there except
  alternatives:
  - because there was no bread there but only
  - since there was no bread there except for
  lexicon: HALOT
  rationale: 'This combination explains why the priest gave the consecrated bread: no other bread was available. ''For ... except'' preserves the explanatory and exceptive force cleanly.'
