id: 1SA.21.11
reference: 1 Samuel 21:11
source:
  edition: WLC
  text: וַ/יָּ֣קָם דָּוִ֔ד וַ/יִּבְרַ֥ח בַּ/יּוֹם הַ/ה֖וּא מִ/פְּנֵ֣י שָׁא֑וּל וַ/יָּבֹ֕א
    אֶל אָכִ֖ישׁ מֶ֥לֶךְ גַּֽת־־׃
translation:
  text: So David arose and fled that day from Saul, and he came to Achish king of
    Gath.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיָּקָם
  chosen: arose
  alternatives:
  - got up
  - set out
  lexicon: HALOT
  rationale: The verb קום literally means 'arise/stand up.' 'Arose' preserves the
    narrative sequence and slightly formal register of Hebrew wayyiqtol without over-paraphrasing
    into 'set out.'
- source_word: וַיִּבְרַח
  chosen: fled
  alternatives:
  - ran away
  - escaped
  lexicon: HALOT
  rationale: ברח commonly means 'flee.' 'Fled' is the most direct and idiomatic rendering
    here, preserving the urgency of David's action.
- source_word: בַּיּוֹם הַהוּא
  chosen: that day
  alternatives:
  - on that day
  lexicon: HALOT
  rationale: The phrase is a standard temporal expression. 'That day' is natural English
    and retains the temporal specificity; 'on' is not required in smooth English.
- source_word: מִפְּנֵי שָׁאוּל
  chosen: from Saul
  alternatives:
  - from before Saul
  - away from Saul
  lexicon: HALOT
  rationale: Literally 'from the face/presence of Saul.' In this context the idiomatic
    sense is flight from Saul himself. 'From Saul' is clear and faithful without wooden
    literalism.
- source_word: וַיָּבֹא אֶל
  chosen: he came to
  alternatives:
  - he went to
  - he entered to
  lexicon: HALOT
  rationale: בוא with אֶל commonly means 'come/go to.' 'He came to' follows the Hebrew
    narrative perspective and is standard English.
- source_word: אָכִישׁ
  chosen: Achish
  rationale: Personal names are transliterated by standard convention per project
    philosophy.
- source_word: מֶלֶךְ גַּת
  chosen: king of Gath
  alternatives:
  - the king of Gath
  lexicon: HALOT
  rationale: 'The construct phrase identifies Achish''s royal office. English idiom
    does not require the article here after a proper name apposition: ''Achish king
    of Gath.'''
