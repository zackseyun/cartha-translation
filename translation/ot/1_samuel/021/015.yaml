id: 1SA.21.15
reference: 1 Samuel 21:15
source:
  edition: WLC
  text: וַ/יֹּ֥אמֶר אָכִ֖ישׁ אֶל עֲבָדָ֑י/ו הִנֵּ֤ה תִרְאוּ֙ אִ֣ישׁ מִשְׁתַּגֵּ֔עַ
    לָ֛/מָּה תָּבִ֥יאוּ אֹת֖/וֹ אֵלָֽ/י־׃
translation:
  text: And Achish said to his servants, “Look, you see a man acting like a madman.
    Why have you brought him to me?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “a man who is insane” / “a madman.” The Hebrew participle can describe
      either actual madness or behavior presented as madness.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: And ... said
  alternatives:
  - Then ... said
  - So ... said
  lexicon: HALOT
  rationale: Standard waw-consecutive narrative preterite; 'And ... said' preserves
    Hebrew narrative flow without overinterpreting discourse relation.
- source_word: אָכִישׁ
  chosen: Achish
  rationale: Personal name is transliterated per translation philosophy.
- source_word: עֲבָדָיו
  chosen: his servants
  alternatives:
  - his attendants
  - his officials
  lexicon: HALOT
  rationale: In a royal court context, עבד often denotes servants/courtiers in the
    king's service. 'Servants' is the most direct and natural rendering here.
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: Deictic/interjection drawing attention. 'Look' is readable modern English
    and preserves the force better than archaic 'Behold.'
- source_word: תִרְאוּ
  chosen: you see
  alternatives:
  - you can see
  - see
  lexicon: HALOT
  rationale: Second person plural indicative addressed to the servants. Rendering
    it explicitly as 'you see' preserves the verbal form following הִנֵּה.
- source_word: אִישׁ
  chosen: a man
  alternatives:
  - someone
  lexicon: HALOT
  rationale: The Hebrew specifically says 'a man'; this should be retained rather
    than generalized.
- source_word: מִשְׁתַּגֵּעַ
  chosen: acting like a madman
  alternatives:
  - behaving insanely
  - acting crazy
  - mad
  lexicon: HALOT
  rationale: Hitpael participle of שגע conveys behaving as if insane or acting madly.
    'Acting like a madman' captures the ongoing behavioral sense better than a simple
    adjective.
- source_word: לָמָּה
  chosen: Why
  lexicon: HALOT
  rationale: Direct interrogative preserved straightforwardly.
- source_word: תָּבִיאוּ
  chosen: have you brought
  alternatives:
  - do you bring
  - did you bring
  lexicon: HALOT
  rationale: 'In English idiom, the perfect ''have you brought'' fits the present-result
    force of the question in context: David has now been brought before Achish.'
- source_word: אֹתוֹ אֵלַי
  chosen: him to me
  alternatives:
  - this man to me
  lexicon: HALOT
  rationale: Direct object plus prepositional phrase rendered naturally and precisely.
    'Him to me' matches the Hebrew without adding emphasis not present in the text.
