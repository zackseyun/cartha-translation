id: 1SA.22.13
reference: 1 Samuel 22:13
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר אל/ו שָׁא֔וּל לָ֚/מָּה קְשַׁרְתֶּ֣ם עָלַ֔/י אַתָּ֖ה וּ/בֶן יִשָׁ֑י
    בְּ/תִתְּ/ךָ֨ ל֜/וֹ לֶ֣חֶם וְ/חֶ֗רֶב וְ/שָׁא֥וֹל ל/וֹ֙ בֵּֽ/אלֹהִ֔ים לָ/ק֥וּם
    אֵלַ֛/י לְ/אֹרֵ֖ב כַּ/יּ֥וֹם הַ/זֶּֽה־׃ס
translation:
  text: Saul said to him, “Why have you and the son of Jesse conspired against me,
    by giving him bread and a sword and by inquiring of God for him, so that he has
    risen against me as an ambusher, as on this day?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “and by consulting God for him.”
    reason: lexical_alternative
  - marker: b
    text: Or “so that he might rise against me, lying in wait, as at this day.”
    reason: alternative_reading
lexical_decisions:
- source_word: קְשַׁרְתֶּם
  chosen: have conspired
  alternatives:
  - have plotted
  - have bound together
  lexicon: HALOT
  rationale: The verb קשר in this context refers to forming a conspiracy against a
    ruler, not merely tying or binding. 'Have conspired' best captures the hostile
    political sense in natural English.
- source_word: בֶן־יִשָׁי
  chosen: the son of Jesse
  alternatives:
  - David
  lexicon: HALOT
  rationale: Saul pointedly refers to David by patronymic rather than by name, which
    carries rhetorical distance and contempt. Preserving 'the son of Jesse' reflects
    the Hebrew wording and tone better than substituting 'David'.
- source_word: בְּתִתְּךָ לוֹ לֶחֶם וְחֶרֶב
  chosen: by giving him bread and a sword
  alternatives:
  - when you gave him bread and a sword
  lexicon: HALOT
  rationale: The infinitive construct with prefixed ב marks attendant circumstance
    or means. 'By giving' fits the sequence of accusations and keeps the causal force.
- source_word: וְשָׁאוֹל לוֹ בֵּאלֹהִים
  chosen: and by inquiring of God for him
  alternatives:
  - and by consulting God for him
  - and by asking God for him
  lexicon: HALOT
  rationale: שׁאל with בֵאלֹהִים in priestly/oracular context means to seek divine
    guidance. 'Inquiring of God' is idiomatic and preserves the formal religious sense.
- source_word: בֵּאלֹהִים
  chosen: of God
  alternatives:
  - of the LORD
  lexicon: HALOT
  rationale: The Hebrew here reads 'God' (אֱלֹהִים), not the divine name YHWH. The
    translation should reflect the actual lexical form rather than harmonize to expected
    covenantal language.
- source_word: לָקוּם אֵלַי
  chosen: so that he has risen against me
  alternatives:
  - so that he might rise against me
  - to rise against me
  lexicon: HALOT
  rationale: The infinitive construct expresses result/purpose from Saul's perspective.
    The perfective English 'has risen' fits the following phrase 'as on this day,'
    presenting the alleged conspiracy as now manifest.
- source_word: לְאֹרֵב
  chosen: as an ambusher
  alternatives:
  - to lie in wait
  - as one lying in wait
  lexicon: HALOT
  rationale: The participial form from ארב denotes lying in ambush. Rendering it nominally
    as 'an ambusher' preserves the predicative force after 'has risen against me,'
    though the idiom is somewhat compressed.
- source_word: כַּיּוֹם הַזֶּה
  chosen: as on this day
  alternatives:
  - as it is this day
  - as at this day
  - to this day
  lexicon: HALOT
  rationale: This idiom points to the present, visible state of affairs. 'As on this
    day' is a fairly literal rendering; more idiomatic alternatives are possible,
    but this keeps the Hebrew emphasis on the current moment.
