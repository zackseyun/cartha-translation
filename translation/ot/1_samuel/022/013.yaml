theological_decisions:
- issue: Reference to the deity in בֵּאלֹהִים
  chosen_reading: God
  alternative_readings:
  - the LORD
  rationale: The source text uses אֱלֹהִים rather than YHWH. Following original-language
    primacy, the translation preserves 'God' instead of importing the covenant name.
  doctrine_reference: Translation philosophy §1; Contested terms table for יְהוָה
    YHWH
