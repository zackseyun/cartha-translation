id: 1SA.22.21
reference: 1 Samuel 22:21
source:
  edition: WLC
  text: וַ/יַּגֵּ֥ד אֶבְיָתָ֖ר לְ/דָוִ֑ד כִּ֚י הָרַ֣ג שָׁא֔וּל אֵ֖ת כֹּהֲנֵ֥י יְהוָֽה׃
translation:
  text: Abiathar told David that Saul had killed the priests of Yahweh.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיַּגֵּד
  chosen: told
  alternatives:
  - reported
  - informed
  lexicon: HALOT
  rationale: The Hifil of נגד here means to make known or tell. 'Told' is natural modern English and fits the direct-object-plus-recipient construction without sounding overly formal.
- source_word: אֶבְיָתָר
  chosen: Abiathar
  rationale: Personal name transliterated by standard English convention, following the translation philosophy to transliterate names rather than translate them.
- source_word: לְדָוִד
  chosen: David
  rationale: 'Proper name transliterated conventionally; the prefixed ל marks the indirect object, expressed in English by word order: ''told David.'''
- source_word: כִּי
  chosen: that
  alternatives:
  - how
  lexicon: HALOT
  rationale: Introduces the content of Abiathar's report. 'That' is the most straightforward English complementizer here.
- source_word: הָרַג
  chosen: had killed
  alternatives:
  - killed
  - had struck down
  lexicon: HALOT
  rationale: 'The qatal verb reports an action prior to Abiathar''s telling, so English past perfect best represents the sequence in context: Abiathar told David that Saul had already killed the priests.'
- source_word: שָׁאוּל
  chosen: Saul
  rationale: Proper name transliterated conventionally.
- source_word: כֹּהֲנֵי יְהוָה
  chosen: the priests of the LORD
  alternatives:
  - the LORD's priests
  lexicon: HALOT
  rationale: Construct chain rendered naturally in English. 'Priests of the LORD' preserves the genitival relationship and solemn tone. For יְהוָה, the project default is 'the LORD.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
