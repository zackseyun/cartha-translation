theological_decisions:
- issue: Gendered human terms in a merism
  chosen_reading: from man to woman
  alternative_readings:
  - from men to women
  - from person to woman
  rationale: Following the translation philosophy's gender-accurate principle, the
    Hebrew singular nouns are retained as 'man' and 'woman' rather than neutralized.
    The phrase functions as a merism indicating totality, not a doctrinal statement
    about gender.
  doctrine_reference: DOCTRINE.md § Translation philosophy 4
- issue: Degree of formal retention in a massacre formula
  chosen_reading: Retain the repeated 'with the edge of the sword' and the source-order
    totality formulae
  alternative_readings:
  - Compress to 'put to the sword' once
  rationale: The verse's rhetoric emphasizes comprehensive destruction. Preserving
    the repeated sword idiom and the sequence of human and animal victims reflects
    the Hebrew's gravity without unnecessary paraphrase.
  doctrine_reference: DOCTRINE.md § Translation philosophy; optimal equivalence
