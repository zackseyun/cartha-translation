id: 1SA.22.19
reference: 1 Samuel 22:19
source:
  edition: WLC
  text: וְ/אֵ֨ת נֹ֤ב עִיר הַ/כֹּֽהֲנִים֙ הִכָּ֣ה לְ/פִי חֶ֔רֶב מֵ/אִישׁ֙ וְ/עַד אִשָּׁ֔ה
    מֵ/עוֹלֵ֖ל וְ/עַד יוֹנֵ֑ק וְ/שׁ֧וֹר וַ/חֲמ֛וֹר וָ/שֶׂ֖ה לְ/פִי חָֽרֶב־־־־־׃
translation:
  text: And Nob, the city of the priests, he struck with the edge of the sword, from
    man to woman, from child to nursing infant, and ox and donkey and sheep, with
    the edge of the sword.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'to the mouth of the sword,' an idiom meaning death by
      the sword.
    reason: lexical_alternative
lexical_decisions:
- source_word: נֹב
  chosen: Nob
  lexicon: HALOT
  rationale: Proper place name; transliterated according to standard English convention
    rather than translated.
- source_word: עִיר הַכֹּהֲנִים
  chosen: the city of the priests
  alternatives:
  - the priests' city
  lexicon: HALOT
  rationale: Construct phrase identifying Nob as belonging to or characterized by
    the priests. 'The city of the priests' is more natural and explicit in modern
    English than the more compressed possessive alternative.
- source_word: הִכָּה
  chosen: he struck
  alternatives:
  - he attacked
  - he put to death
  lexicon: HALOT
  rationale: The verb נכה is broad ('strike/smite'). 'He struck' preserves the Hebrew
    wording while allowing the following phrase 'with the edge of the sword' to specify
    the lethal action. 'Put to death' would over-interpret the verb itself, though
    the whole clause clearly describes slaughter.
- source_word: לְפִי חֶרֶב / לְפִי חָרֶב
  chosen: with the edge of the sword
  alternatives:
  - by the sword
  - to the mouth of the sword
  lexicon: HALOT
  rationale: The idiom literally means 'to/according to the mouth of the sword' and
    conventionally denotes killing by sword. 'With the edge of the sword' is a standard,
    intelligible English equivalent that preserves the concrete imagery better than
    the flatter 'by the sword.'
- source_word: מֵאִישׁ וְעַד אִשָּׁה
  chosen: from man to woman
  alternatives:
  - from men to women
  - from man to wife
  lexicon: HALOT
  rationale: The singular distributive construction expresses totality across sexes.
    'From man to woman' preserves the Hebrew pattern and the merism. 'Wife' is not
    contextually intended here.
- source_word: מֵעוֹלֵל וְעַד יוֹנֵק
  chosen: from child to nursing infant
  alternatives:
  - from little child to infant
  - from suckling to nursing child
  lexicon: HALOT
  rationale: עוֹלֵל denotes a small child; יוֹנֵק denotes one who suckles, a nursing
    infant. This rendering preserves the progression and the horror of indiscriminate
    killing. 'Child' is chosen over 'little one' for clarity and naturalness.
- source_word: וְשׁוֹר וַחֲמוֹר וָשֶׂה
  chosen: and ox and donkey and sheep
  alternatives:
  - and cattle and donkey and sheep
  - and bull and donkey and lamb
  lexicon: HALOT
  rationale: The list names representative domestic animals. 'Ox' fits שׁוֹר better
    than the broader 'cattle' in this singular listing; שֶׂה is a small livestock
    animal, often sheep/goat, but 'sheep' is the most idiomatic default in English
    absent a need to specify goats.
