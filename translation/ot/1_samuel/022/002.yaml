id: 1SA.22.2
reference: 1 Samuel 22:2
source:
  edition: WLC
  text: וַ/יִּֽתְקַבְּצ֣וּ אֵ֠לָי/ו כָּל אִ֨ישׁ מָצ֜וֹק וְ/כָל אִ֨ישׁ אֲשֶׁר ל֤/וֹ
    נֹשֶׁא֙ וְ/כָל אִ֣ישׁ מַר נֶ֔פֶשׁ וַ/יְהִ֥י עֲלֵי/הֶ֖ם לְ/שָׂ֑ר וַ/יִּהְי֣וּ עִמּ֔/וֹ
    כְּ/אַרְבַּ֥ע מֵא֖וֹת אִֽישׁ־־־־־׃
translation:
  text: And everyone in distress, everyone who had a creditor, and everyone bitter
    in soul gathered to him, and he became commander over them. About four hundred
    men were with him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more interpretively, 'everyone who was in debt.' The Hebrew literally
      says 'everyone who had a creditor/exactor.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'bitter in soul,' an idiom for deep inner bitterness or anguish.
    reason: cultural_note
lexical_decisions:
- source_word: וַיִּתְקַבְּצוּ
  chosen: gathered
  alternatives:
  - assembled
  - collected themselves
  lexicon: HALOT
  rationale: The hitpael/waw-consecutive form of קבץ here denotes people coming together
    to David. 'Gathered' is natural modern English and preserves the reflexive/corporate
    sense without overtranslating.
- source_word: אֵלָיו
  chosen: to him
  alternatives:
  - around him
  lexicon: HALOT
  rationale: 'The preposition אֶל with pronominal suffix most directly means movement
    toward David: ''to him.'' ''Around him'' is interpretive and less direct.'
- source_word: כָּל אִישׁ
  chosen: everyone
  alternatives:
  - every man
  - each man
  lexicon: HALOT
  rationale: Though אִישׁ is formally singular masculine, the phrase is distributive
    and collective. 'Everyone' communicates the sense idiomatically in English while
    preserving the repeated pattern. This is not a gender-neutral ideological shift
    but a natural rendering of the distributive construction.
- source_word: מָצוֹק
  chosen: in distress
  alternatives:
  - in straits
  - in trouble
  lexicon: HALOT
  rationale: The noun denotes distress, pressure, or straitened circumstances. 'In
    distress' is clear, idiomatic, and broad enough to include social and economic
    hardship.
- source_word: אֲשֶׁר לוֹ נֹשֶׁא
  chosen: who had a creditor
  alternatives:
  - who was in debt
  - to whom a debt was owed/pressed
  lexicon: HALOT
  rationale: The participle נֹשֶׁא from נשׁא in this context is commonly understood
    in the sense of a creditor/exactor pressing a claim. The Hebrew expression is
    somewhat elliptical; 'who had a creditor' best reflects the wording more literally
    than the smoother but more interpretive 'who was in debt.'
- source_word: מַר נֶפֶשׁ
  chosen: bitter in soul
  alternatives:
  - embittered
  - discontented
  - bitter of soul
  lexicon: HALOT
  rationale: The phrase literally describes bitterness of inner life/self. 'Bitter
    in soul' preserves the Hebrew anthropological expression better than the more
    interpretive 'discontented,' while remaining understandable.
- source_word: וַיְהִי עֲלֵיהֶם לְשָׂר
  chosen: he became commander over them
  alternatives:
  - he was captain over them
  - he became leader over them
  lexicon: HALOT
  rationale: שַׂר denotes a chief, leader, official, or commander. In this military-band
    context, 'commander' fits well. 'Captain' is traditional but narrower and somewhat
    dated in feel.
- source_word: וַיִּהְיוּ עִמּוֹ
  chosen: were with him
  alternatives:
  - stayed with him
  lexicon: HALOT
  rationale: The clause simply states their association/presence with David. 'Were
    with him' is the most direct rendering.
- source_word: כְּאַרְבַּע מֵאוֹת אִישׁ
  chosen: About four hundred men
  alternatives:
  - some four hundred men
  - approximately four hundred men
  lexicon: HALOT
  rationale: 'The prefixed כ here marks approximation: ''about/as many as four hundred.''
    ''About four hundred men'' is concise and idiomatic. ''Men'' is retained because
    אִישׁ here counts adult males in David''s band.'
