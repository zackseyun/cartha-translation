id: 1SA.22.15
reference: 1 Samuel 22:15
source:
  edition: WLC
  text: הַ/יּ֧וֹם הַחִלֹּ֛תִי ל/שאול ל֥/וֹ בֵ/אלֹהִ֖ים חָלִ֣ילָ/ה לִּ֑/י אַל יָשֵׂם֩
    הַ/מֶּ֨לֶךְ בְּ/עַבְדּ֤/וֹ דָבָר֙ בְּ/כָל בֵּ֣ית אָבִ֔/י כִּ֠י לֹֽא יָדַ֤ע עַבְדְּ/ךָ֙
    בְּ/כָל זֹ֔את דָּבָ֥ר קָטֹ֖ן א֥וֹ גָדֽוֹל־־־־־׃
translation:
  text: Was today the first time that I inquired of God for him? Far be it from me!
    Let not the king charge anything against his servant or against all my father’s
    house, for your servant knew nothing of all this, whether small or great.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'Did I begin today to inquire of God for him?' The Hebrew
      rhetorical question implies that this was not the first time Ahimelech had done
      so.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַיּוֹם
  chosen: today
  alternatives:
  - this day
  lexicon: HALOT
  rationale: Temporal adverb introducing the rhetorical question. 'Today' is natural
    modern English while preserving the immediate temporal sense.
- source_word: הַחִלֹּתִי
  chosen: was ... the first time that I
  alternatives:
  - have I begun
  - did I begin
  lexicon: HALOT
  rationale: 'From החל in the Hiphil, used idiomatically in a rhetorical question:
    ''Did I begin today...?'' In context Ahimelech denies that this was a new practice,
    so English idiom is best captured by ''Was today the first time that I...'''
- source_word: לִשְׁאוֹל לוֹ בֵאלֹהִים
  chosen: inquired of God for him
  alternatives:
  - sought God for him
  - consulted God for him
  lexicon: HALOT
  rationale: שׁאל with בֵאלֹהִים denotes seeking an oracle or divine guidance. 'Inquired
    of God' is a standard and accurate rendering; 'for him' preserves לוֹ as David
    being the beneficiary.
- source_word: חָלִילָה לִּי
  chosen: Far be it from me!
  alternatives:
  - By no means!
  - Let it be far from me!
  lexicon: HALOT
  rationale: Strong repudiation formula. 'Far be it from me' is idiomatic English
    and preserves the speaker's emphatic self-disavowal.
- source_word: אַל יָשֵׂם
  chosen: Let not ... charge
  alternatives:
  - let not ... impute
  - let not ... lay
  lexicon: HALOT
  rationale: שׂים with ב plus person and דָבָר here means to place/attribute a matter
    against someone, i.e., to charge or impute guilt. 'Charge' communicates the forensic
    sense clearly.
- source_word: בְּעַבְדּוֹ
  chosen: against his servant
  alternatives:
  - on his servant
  - to his servant
  lexicon: HALOT
  rationale: 'The preposition ב after יָשֵׂם is adversative here: placing a matter
    against someone. ''His servant'' reflects Ahimelech''s deferential self-reference
    before the king.'
- source_word: דָבָר
  chosen: anything
  alternatives:
  - a thing
  - any matter
  lexicon: HALOT
  rationale: Indefinite object in context of accusation. 'Anything' is idiomatic and
    captures the broad scope of the plea.
- source_word: בְּכָל בֵּית אָבִי
  chosen: against all my father’s house
  alternatives:
  - against my whole father’s household
  - against all my ancestral house
  lexicon: HALOT
  rationale: Refers to the entire extended family/clan. 'My father's house' is a transparent
    biblical idiom and remains understandable in English.
- source_word: לֹא יָדַע עַבְדְּךָ
  chosen: your servant knew nothing
  alternatives:
  - your servant did not know
  - your servant was unaware
  lexicon: HALOT
  rationale: Simple denial of knowledge, with deferential self-reference. 'Knew nothing'
    is concise and natural.
- source_word: בְּכָל זֹאת
  chosen: of all this
  alternatives:
  - about any of this
  - in all this
  lexicon: HALOT
  rationale: Refers to the whole affair under accusation. 'Of all this' fits naturally
    with 'knew nothing' in English.
- source_word: דָּבָר קָטֹן אוֹ גָדוֹל
  chosen: whether small or great
  alternatives:
  - anything, small or great
  - anything little or much
  lexicon: HALOT
  rationale: Merism expressing totality. 'Whether small or great' preserves the Hebrew
    rhetorical range and reads smoothly after 'knew nothing of all this'.
