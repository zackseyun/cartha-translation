id: 1SA.22.3
reference: 1 Samuel 22:3
source:
  edition: WLC
  text: וַ/יֵּ֧לֶךְ דָּוִ֛ד מִ/שָּׁ֖ם מִצְפֵּ֣ה מוֹאָ֑ב וַ/יֹּ֣אמֶר אֶל מֶ֣לֶךְ מוֹאָ֗ב
    יֵֽצֵא נָ֞א אָבִ֤/י וְ/אִמִּ/י֙ אִתְּ/כֶ֔ם עַ֚ד אֲשֶׁ֣ר אֵדַ֔ע מַה יַּֽעֲשֶׂה
    לִּ֖/י אֱלֹהִֽים׀־־־־׃
translation:
  text: Then David went from there to Mizpeh of Moab, and he said to the king of Moab,
    “Please let my father and my mother stay with you until I know what God will do
    for me.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Please let my father and my mother come out to you' or 'go out to you';
      the Hebrew verb is literally 'go out/come out,' but the sense here is that they
      remain under the king of Moab's care.
    reason: lexical_alternative
  - marker: b
    text: Or 'what God will do to me' or 'what God will do with me.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּלֶךְ
  chosen: went
  alternatives:
  - departed
  - traveled
  lexicon: HALOT
  rationale: The wayyiqtol of הלך narrates simple movement in sequence. 'Went' is
    the most natural modern English narrative equivalent.
- source_word: מִשָּׁם
  chosen: from there
  alternatives:
  - thence
  lexicon: HALOT
  rationale: A straightforward locative adverb with prefixed preposition. 'From there'
    is clear modern English; 'thence' is too archaic.
- source_word: מִצְפֵּה מוֹאָב
  chosen: Mizpeh of Moab
  alternatives:
  - Mizpah of Moab
  lexicon: HALOT
  rationale: This is a place name. Per philosophy, names are transliterated. 'Mizpeh'
    closely reflects the pointing in the provided text; 'Mizpah' is a common English
    conventional form and worth preserving as an alternative.
- source_word: מֶלֶךְ מוֹאָב
  chosen: the king of Moab
  lexicon: HALOT
  rationale: A simple construct phrase identifying the ruler addressed by David.
- source_word: יֵצֵא נָא
  chosen: Please let ... stay
  alternatives:
  - Please let ... come out
  - Please let ... go out
  lexicon: HALOT
  rationale: Literally the jussive of יצא is 'let ... go out/come out,' but in context
    David is requesting permission for his parents to go out from his company and
    remain under the king's protection. English idiom is better served by 'let ...
    stay with you,' which captures the request's practical force without wooden awkwardness.
- source_word: אָבִי וְאִמִּי
  chosen: my father and my mother
  alternatives:
  - my parents
  lexicon: HALOT
  rationale: The Hebrew explicitly names both parents. Retaining both preserves the
    source's form and emphasis better than collapsing to 'my parents.'
- source_word: אִתְּכֶם
  chosen: with you
  alternatives:
  - with you all
  lexicon: HALOT
  rationale: The Hebrew pronoun is plural, likely addressing the king and his household/court.
    Standard English can render this naturally as 'with you'; the plural nuance is
    not easily preserved in idiomatic singular/plural-neutral English.
- source_word: עַד אֲשֶׁר אֵדַע
  chosen: until I know
  alternatives:
  - until I find out
  lexicon: HALOT
  rationale: This clause marks the duration of the parents' stay. 'Until I know' is
    both literal and natural.
- source_word: מַה יַּעֲשֶׂה לִּי אֱלֹהִים
  chosen: what God will do for me
  alternatives:
  - what God will do to me
  - what God will do with me
  lexicon: HALOT
  rationale: The phrase is somewhat open-ended. With לִי, English may be 'for me,'
    'to me,' or 'with me.' In context David is awaiting God's providential direction
    and outcome, so 'for me' best conveys expected divine action on his behalf without
    overstating positivity. The alternatives are preserved because the Hebrew can
    bear them.
