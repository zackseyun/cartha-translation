theological_decisions:
- issue: Rendering אֱלֹהִים in David's speech
  chosen_reading: God
  alternative_readings:
  - Gods
  - a god
  rationale: Although אֱלֹהִים is morphologically plural, in this context with a singular
    verb it clearly refers to Israel's God. Rendering it 'God' reflects standard Hebrew
    usage and the narrative setting.
