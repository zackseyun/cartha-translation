id: 1SA.22.9
reference: 1 Samuel 22:9
source:
  edition: WLC
  text: וַ/יַּ֜עַן דֹּאֵ֣ג הָ/אֲדֹמִ֗י וְ/ה֛וּא נִצָּ֥ב עַל עַבְדֵֽי שָׁא֖וּל וַ/יֹּאמַ֑ר
    רָאִ֨יתִי֙ אֶת בֶּן יִשַׁ֔י בָּ֣א נֹ֔בֶ/ה אֶל אֲחִימֶ֖לֶךְ בֶּן אֲחִטֽוּב־־־־־־׃
translation:
  text: Then Doeg the Edomite, who was standing among Saul’s servants, answered and
    said, “I saw the son of Jesse coming to Nob, to Ahimelech son of Ahitub.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “who was stationed over Saul’s servants.” The Hebrew phrase may suggest
      either Doeg’s position among Saul’s servants or a supervisory role over them.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיַּעַן
  chosen: answered
  alternatives:
  - responded
  lexicon: HALOT
  rationale: The verb ענה in narrative dialogue commonly introduces a reply. 'Answered'
    preserves the Hebrew idiom, even though no direct question immediately precedes
    in English style.
- source_word: הָאֲדֹמִי
  chosen: the Edomite
  alternatives:
  - an Edomite
  lexicon: HALOT
  rationale: With the article, this functions as an ethnic designation attached to
    Doeg. 'The Edomite' is the standard and most natural rendering in apposition to
    the name.
- source_word: וְהוּא נִצָּב עַל עַבְדֵי שָׁאוּל
  chosen: who was standing among Saul’s servants
  alternatives:
  - and he was stationed over Saul’s servants
  - while he stood by Saul’s servants
  lexicon: HALOT
  rationale: נִצָּב means 'standing' or 'stationed.' The preposition עַל can mean
    'over' or indicate position in relation to a group. In this context, 'among Saul’s
    servants' reads naturally and avoids overstating an official rank that the phrase
    may not require, while still conveying his presence in their midst.
- source_word: עַבְדֵי שָׁאוּל
  chosen: Saul’s servants
  alternatives:
  - Saul’s officials
  - Saul’s attendants
  lexicon: HALOT
  rationale: עבדים can denote servants, attendants, or royal officials. 'Servants'
    is the most direct rendering and fits court context without overinterpreting their
    status.
- source_word: וַיֹּאמַר
  chosen: and said
  alternatives:
  - saying
  lexicon: HALOT
  rationale: Standard narrative continuation after 'answered'; retaining both verbs
    reflects the Hebrew sequence rather than collapsing it.
- source_word: רָאִיתִי
  chosen: I saw
  alternatives:
  - I have seen
  lexicon: HALOT
  rationale: The perfect here reports a past observation in narrative speech. Simple
    past is the most natural English equivalent.
- source_word: בֶּן יִשַׁי
  chosen: the son of Jesse
  alternatives:
  - David
  lexicon: HALOT
  rationale: The Hebrew deliberately uses the relational designation rather than the
    personal name. The translation preserves that wording and its rhetorical effect.
- source_word: בָּא
  chosen: coming
  alternatives:
  - come
  - arriving
  lexicon: HALOT
  rationale: As a participle after 'I saw,' this is well represented by English 'coming,'
    expressing the action observed. 'Come' would also be possible, but 'coming' better
    reflects the participial nuance.
- source_word: נֹבֶה
  chosen: to Nob
  alternatives:
  - toward Nob
  lexicon: HALOT
  rationale: The directional he on the place name indicates motion toward Nob. English
    normally expresses this simply as 'to Nob.'
- source_word: אֶל אֲחִימֶלֶךְ בֶּן אֲחִטוּב
  chosen: to Ahimelech son of Ahitub
  alternatives:
  - with Ahimelech son of Ahitub
  lexicon: HALOT
  rationale: אֶל normally means 'to.' Here it marks David's destination or the person
    approached. 'To Ahimelech son of Ahitub' is the most straightforward rendering.
