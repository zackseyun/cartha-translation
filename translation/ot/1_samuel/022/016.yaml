id: 1SA.22.16
reference: 1 Samuel 22:16
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר הַ/מֶּ֔לֶךְ מ֥וֹת תָּמ֖וּת אֲחִימֶ֑לֶךְ אַתָּ֖ה וְ/כָל בֵּ֥ית
    אָבִֽי/ךָ־׃
translation:
  text: But the king said, “You shall surely die, Ahimelech—you and all your father's
    house.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'You will certainly die' / 'You must die.' The Hebrew uses an infinitive
      absolute with a finite verb for strong emphasis.
    reason: lexical_alternative
  - marker: b
    text: '''Your father''s house'' refers to your paternal household or family line.'
    reason: cultural_note
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: said
  alternatives:
  - spoke
  lexicon: HALOT
  rationale: Standard narrative wayyiqtol of אמר is most naturally rendered 'said'
    in English historical narrative.
- source_word: הַמֶּלֶךְ
  chosen: the king
  lexicon: HALOT
  rationale: Definite noun with article; straightforwardly identifies the speaker
    as the king.
- source_word: מוֹת תָּמוּת
  chosen: You shall surely die
  alternatives:
  - You will certainly die
  - You must die
  lexicon: HALOT
  rationale: Infinitive absolute plus imperfect of מות intensifies the verbal idea.
    'You shall surely die' preserves both the solemnity and the judicial force without
    excessive paraphrase.
- source_word: אֲחִימֶלֶךְ
  chosen: Ahimelech
  rationale: Personal name is transliterated according to the project's policy to
    transliterate names rather than translate them.
- source_word: אַתָּה
  chosen: you
  lexicon: HALOT
  rationale: Explicit pronoun adds emphasis after the death sentence; retained in
    English by apposition ('Ahimelech—you...').
- source_word: וְכָל
  chosen: and all
  alternatives:
  - you and every
  lexicon: HALOT
  rationale: כָּל with conjunction naturally means 'and all,' extending the sentence
    beyond Ahimelech himself.
- source_word: בֵּית אָבִיךָ
  chosen: your father's house
  alternatives:
  - your ancestral house
  - your whole family
  lexicon: HALOT
  rationale: Literally 'house of your father,' an idiom for the paternal household
    or family line. 'Your father's house' preserves the Hebrew idiom while remaining
    understandable in modern English.
