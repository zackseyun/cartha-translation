id: 1SA.22.10
reference: 1 Samuel 22:10
source:
  edition: WLC
  text: וַ/יִּשְׁאַל ל/וֹ֙ בַּֽ/יהוָ֔ה וְ/צֵידָ֖ה נָ֣תַן ל֑/וֹ וְ/אֵ֗ת חֶ֛רֶב גָּלְיָ֥ת
    הַ/פְּלִשְׁתִּ֖י נָ֥תַן לֽ/וֹ־׃
translation:
  text: And he inquired of the LORD for him, and gave him provisions, and gave him
    the sword of Goliath the Philistine.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'he consulted the LORD for him.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁאַל לּוֹ בַּיהוָה
  chosen: he inquired of the LORD for him
  alternatives:
  - he asked counsel of the LORD for him
  - he consulted the LORD for him
  lexicon: HALOT
  rationale: שׁאל in this construction with ב + divine name commonly means to inquire/consult
    of the deity. 'Inquired of the LORD' is idiomatic and preserves the cultic sense.
    The preposition לּוֹ is best taken as 'for him' (i.e., on his behalf), not merely
    'to him.' YHWH is rendered 'the LORD' per doctrine.
- source_word: בַּיהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: The divine name יְהוָה is rendered 'the LORD' according to the stated
    default in DOCTRINE.md.
- source_word: צֵידָה
  chosen: provisions
  alternatives:
  - food
  - supplies
  - provision
  lexicon: HALOT
  rationale: צֵידָה denotes provisions for a journey or sustenance. 'Provisions' best
    fits the context and is more precise than the narrower 'food' while remaining
    natural English.
- source_word: נָתַן לוֹ
  chosen: gave him
  alternatives:
  - provided him with
  - gave to him
  lexicon: HALOT
  rationale: A straightforward rendering of נתן with indirect object suffix. Repeating
    'gave him' for both occurrences reflects the Hebrew repetition and keeps the accusation's
    cadence.
- source_word: וְאֵת חֶרֶב גָּלְיָת הַפְּלִשְׁתִּי
  chosen: and the sword of Goliath the Philistine
  alternatives:
  - and Goliath the Philistine's sword
  lexicon: HALOT
  rationale: The construct chain is most transparently rendered 'the sword of Goliath
    the Philistine.' This preserves the Hebrew order and emphasis.
