id: 1SA.22.4
reference: 1 Samuel 22:4
source:
  edition: WLC
  text: וַ/יַּנְחֵ֕/ם אֶת פְּנֵ֖י מֶ֣לֶךְ מוֹאָ֑ב וַ/יֵּשְׁב֣וּ עִמּ֔/וֹ כָּל יְמֵ֥י
    הֱיוֹת דָּוִ֖ד בַּ/מְּצוּדָֽה־־־׃ס
translation:
  text: He brought them before the king of Moab, and they stayed with him all the
    days that David was in the stronghold.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'He led them before the king of Moab.' The Hebrew verb can carry the
      sense of leading or bringing into someone's presence.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּנְחֵם
  chosen: He brought them
  alternatives:
  - He led them
  - He caused them to rest
  - He set them before
  lexicon: HALOT
  rationale: From נוח/נחה in this causative-like form with 3mp suffix, the sense in
    context is bringing or leading David's parents into the presence of the king of
    Moab. 'Brought them' is idiomatic English and fits the following phrase 'before
    the king of Moab.'
- source_word: אֶת־פְּנֵי
  chosen: before
  alternatives:
  - to the presence of
  - before the face of
  lexicon: HALOT
  rationale: The idiom אֶת־פְּנֵי with a person commonly means 'before' or 'into the
    presence of.' 'Before' is the most natural concise English rendering.
- source_word: מֶלֶךְ מוֹאָב
  chosen: the king of Moab
  lexicon: HALOT
  rationale: Straightforward construct chain; title translated, place name transliterated.
- source_word: וַיֵּשְׁבוּ עִמּוֹ
  chosen: they stayed with him
  alternatives:
  - they lived with him
  - they dwelt with him
  - they sat with him
  lexicon: HALOT
  rationale: ישב often means dwell/remain/live. In narrative English, 'stayed with
    him' best conveys ongoing residence without sounding wooden.
- source_word: כָּל יְמֵי
  chosen: all the days that
  alternatives:
  - for all the days that
  - the whole time that
  lexicon: HALOT
  rationale: Temporal expression meaning the entirety of the period specified by the
    following infinitive clause.
- source_word: הֱיוֹת דָּוִד
  chosen: David was
  alternatives:
  - David's being
  - while David was
  lexicon: HALOT
  rationale: The infinitive construct of היה with subject functions temporally here.
    English finite clause 'David was' is natural and accurate.
- source_word: בַּמְּצוּדָה
  chosen: in the stronghold
  alternatives:
  - in the fortress
  - in the refuge
  lexicon: HALOT
  rationale: מְצוּדָה in David narratives commonly refers to a fortified refuge or
    stronghold. 'Stronghold' preserves the likely technical/narrative sense better
    than the broader 'refuge.'
