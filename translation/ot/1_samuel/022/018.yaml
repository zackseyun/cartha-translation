id: 1SA.22.18
reference: 1 Samuel 22:18
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר הַ/מֶּ֨לֶךְ֙ ל/דויג סֹ֣ב אַתָּ֔ה וּ/פְגַ֖ע בַּ/כֹּהֲנִ֑ים וַ/יִּסֹּ֞ב
    דויג הָ/אֲדֹמִ֗י וַ/יִּפְגַּע הוּא֙ בַּ/כֹּ֣הֲנִ֔ים וַ/יָּ֣מֶת בַּ/יּ֣וֹם הַ/ה֗וּא
    שְׁמֹנִ֤ים וַ/חֲמִשָּׁה֙ אִ֔ישׁ נֹשֵׂ֖א אֵפ֥וֹד בָּֽד־׀׃
translation:
  text: Then the king said to Doeg, “You turn and strike down the priests.” So Doeg
    the Edomite turned, and he struck down the priests, and on that day he put to
    death eighty-five men who wore a linen ephod.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'attack the priests' / 'fall upon the priests.' The Hebrew verb can denote
      violent assault more broadly; 'strike down' was chosen to fit the execution
      context while preserving the action before the summary statement that he 'put
      to death' eighty-five men.
    reason: lexical_alternative
lexical_decisions:
- source_word: סֹב
  chosen: turn
  alternatives:
  - turn around
  - go around
  lexicon: HALOT
  rationale: Imperative of סב in this execution context means to turn toward the task
    or target. 'Turn' is concise and idiomatic in English, preserving the command's
    abruptness.
- source_word: וּפְגַע / וַיִּפְגַּע
  chosen: strike down
  alternatives:
  - attack
  - fall upon
  - kill
  lexicon: HALOT
  rationale: פגע can mean meet, encounter, attack, or strike. In this context of ordered
    execution, 'strike down' preserves the violent force without prematurely collapsing
    it into the result verb 'put to death' later in the verse.
- source_word: הַכֹּהֲנִים
  chosen: the priests
  lexicon: HALOT
  rationale: Straightforward rendering of the definite plural noun; no contextual
    reason to vary.
- source_word: הָאֲדֹמִי
  chosen: the Edomite
  lexicon: HALOT
  rationale: Gentilic title identifying Doeg's ethnicity; translated rather than paraphrased.
- source_word: וַיָּמֶת
  chosen: he put to death
  alternatives:
  - he killed
  - there died
  lexicon: HALOT
  rationale: Although מות in Hiphil can be rendered 'kill' or 'put to death,' 'he
    put to death' best reflects the causative stem and distinguishes this summary
    result from the earlier action verb 'struck down.' The subject is naturally Doeg
    from the preceding clause.
- source_word: שְׁמֹנִים וַחֲמִשָּׁה אִישׁ
  chosen: eighty-five men
  alternatives:
  - eighty-five persons
  lexicon: HALOT
  rationale: איש after a numeral is idiomatically rendered 'men' here, especially
    since the referents are priests. This is gender-accurate rather than neutral.
- source_word: נֹשֵׂא אֵפוֹד בָּד
  chosen: who wore a linen ephod
  alternatives:
  - bearing a linen ephod
  - carrying a linen ephod
  lexicon: HALOT
  rationale: נשא with clothing can denote wearing or bearing. Since ephod is a priestly
    garment, 'wore' is the most natural English expression. בָּד denotes linen, so
    'linen ephod' is the standard and contextually clear rendering.
- source_word: וַיֹּאמֶר הַמֶּלֶךְ
  chosen: Then the king said
  alternatives:
  - And the king said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then' gives natural English
    narrative flow while preserving sequence.
