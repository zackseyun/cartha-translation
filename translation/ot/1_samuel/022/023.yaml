id: 1SA.22.23
reference: 1 Samuel 22:23
source:
  edition: WLC
  text: שְׁבָ֤/ה אִתִּ/י֙ אַל תִּירָ֔א כִּ֛י אֲשֶׁר יְבַקֵּ֥שׁ אֶת נַפְשִׁ֖/י יְבַקֵּ֣שׁ
    אֶת נַפְשֶׁ֑/ךָ כִּֽי מִשְׁמֶ֥רֶת אַתָּ֖ה עִמָּדִֽ/י־־־־־׃
translation:
  text: Stay with me; do not be afraid, for whoever seeks my life seeks your life
    also, for you are under my protection.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'for he who seeks my life seeks your life.'
    reason: lexical_alternative
  - marker: b
    text: Literally, 'for a keeping/protection you are with me.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׁבָה
  chosen: Stay
  alternatives:
  - Remain
  - Dwell
  lexicon: HALOT
  rationale: Imperative of ישׁב in this context calls for remaining in David's company
    rather than literal sitting; 'Stay' is natural modern English and fits the immediate
    exhortation.
- source_word: אִתִּי
  chosen: with me
  lexicon: HALOT
  rationale: Straightforward prepositional phrase indicating proximity and association
    with David.
- source_word: אַל תִּירָא
  chosen: do not be afraid
  alternatives:
  - do not fear
  lexicon: HALOT
  rationale: Standard negative jussive/prohibitive expression. 'Do not be afraid'
    is idiomatic contemporary English; 'do not fear' is more formal but less natural.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  lexicon: HALOT
  rationale: Introduces the reason for the command not to fear; 'for' preserves the
    explanatory connection concisely.
- source_word: אֲשֶׁר יְבַקֵּשׁ אֶת נַפְשִׁי
  chosen: whoever seeks my life
  alternatives:
  - he who seeks my life
  - who seeks my life
  lexicon: HALOT
  rationale: The relative particle with the verb functions generically. 'Whoever'
    best captures the indefinite/general force in smooth English.
- source_word: נֶפֶשׁ
  chosen: life
  alternatives:
  - soul
  lexicon: HALOT
  rationale: In the idiom 'seek the nephesh' the meaning is to seek someone's life,
    i.e., to kill them. 'Soul' would sound misleadingly immaterial in English.
- source_word: יְבַקֵּשׁ אֶת נַפְשֶׁךָ
  chosen: seeks your life also
  alternatives:
  - seeks your life
  lexicon: HALOT
  rationale: The repeated verb and object are preserved. 'Also' makes explicit the
    parallel implication from the Hebrew context, though not represented by a separate
    particle; it is warranted by the comparison and improves English clarity.
- source_word: מִשְׁמֶרֶת
  chosen: under my protection
  alternatives:
  - in my safekeeping
  - a guard with me
  - kept with me
  lexicon: HALOT
  rationale: The noun denotes custody, charge, or protection. In this context David
    assures Abiathar of safety in his care. 'Under my protection' communicates the
    sense clearly in modern English better than a more wooden 'in my custody/safekeeping.'
- source_word: עִמָּדִי
  chosen: my
  alternatives:
  - with me
  lexicon: HALOT
  rationale: 'Literally ''with me,'' but in idiomatic English the phrase with מִשְׁמֶרֶת
    is best rendered possessively: ''under my protection.'' This is a documented contextual
    adjustment rather than a literal gloss.'
