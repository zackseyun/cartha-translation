id: 1SA.22.17
reference: 1 Samuel 22:17
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר הַ/מֶּ֡לֶךְ לָ/רָצִים֩ הַ/נִּצָּבִ֨ים עָלָ֜י/ו סֹ֥בּוּ וְ/הָמִ֣יתוּ כֹּהֲנֵ֣י יְהוָ֗ה כִּ֤י גַם יָדָ/ם֙ עִם דָּוִ֔ד וְ/כִ֤י יָֽדְעוּ֙ כִּֽי בֹרֵ֣חַ ה֔וּא וְ/לֹ֥א גָל֖וּ אֶת אזנ/ו וְ/לֹֽא אָב֞וּ עַבְדֵ֤י הַ/מֶּ֨לֶךְ֙ לִ/שְׁלֹ֣חַ אֶת יָדָ֔/ם לִ/פְגֹ֖עַ בְּ/כֹהֲנֵ֥י יְהוָֽה׀־־־־־־׃ס
translation:
  text: Then the king said to the runners who were standing around him, “Turn and kill the priests of Yahweh, because their hand also is with David, and because they knew that he was fleeing and did not disclose it to me.” But the king’s servants were not willing to put out their hand to strike the priests of Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''their hand also is with David,'' an idiom meaning they support or side with David.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew: ''did not uncover my ear,'' that is, ''did not inform me.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: לָרָצִים
  chosen: to the runners
  alternatives:
  - to the guards
  - to the messengers
  lexicon: HALOT
  rationale: The participial form from רוץ literally denotes 'runners.' In royal context it can refer to royal guards/couriers, but 'runners' preserves the Hebrew term while remaining intelligible. The contextual function as attendants/executioners is conveyed by the following command.
- source_word: הַנִּצָּבִים עָלָיו
  chosen: who were standing around him
  alternatives:
  - who stood by him
  - who were stationed over him
  lexicon: HALOT
  rationale: נצב with על can denote standing by or attending someone. 'Standing around him' fits the physical and courtly setting better than the more wooden 'standing over him.'
- source_word: סֹבּוּ
  chosen: Turn
  alternatives:
  - Turn around
  - Come around
  lexicon: HALOT
  rationale: Imperative of סבב here introduces the action of turning toward the priests to attack them. 'Turn' is concise and natural in English.
- source_word: וְהָמִיתוּ
  chosen: and kill
  alternatives:
  - and put to death
  - and execute
  lexicon: HALOT
  rationale: מות in the Hiphil means 'cause to die/put to death.' 'Kill' is direct and matches the brutality of Saul's command without adding the juridical nuance of 'execute,' which the text itself does not endorse.
- source_word: כֹּהֲנֵי יְהוָה
  chosen: the priests of the LORD
  alternatives:
  - the LORD’s priests
  lexicon: HALOT
  rationale: Construct phrase rendered straightforwardly. YHWH follows the doctrinal default 'the LORD.'
- source_word: כִּי גַם יָדָם עִם דָּוִד
  chosen: because their hand also is with David
  alternatives:
  - because they also side with David
  - because they too support David
  lexicon: HALOT
  rationale: The idiom 'their hand is with David' expresses support or complicity. The main text preserves the Hebrew imagery ('hand ... with') while remaining understandable in context.
- source_word: וְכִי יָדְעוּ כִּי בֹרֵחַ הוּא
  chosen: and because they knew that he was fleeing
  alternatives:
  - for they knew that he had fled
  - for they knew he was a fugitive
  lexicon: HALOT
  rationale: בורח is a participle, naturally rendered as ongoing 'was fleeing.' This avoids over-specifying completed action.
- source_word: וְלֹא גָלוּ אֶת־אָזְנוֹ
  chosen: and did not disclose it to me
  alternatives:
  - and did not uncover my ear
  - and did not inform me
  lexicon: HALOT
  rationale: The Hebrew idiom 'uncover the ear' means to reveal or inform. Since Saul is speaking, the object is first person in sense though literally 'his ear' refers to the king's ear. 'Disclose it to me' renders the idiom clearly in modern English.
- source_word: וְלֹא אָבוּ
  chosen: were not willing
  alternatives:
  - refused
  - were unwilling
  lexicon: HALOT
  rationale: אבה denotes willingness/consent. 'Were not willing' preserves the nuance of refusal without making it more abrupt than the Hebrew.
- source_word: לִשְׁלֹחַ אֶת־יָדָם
  chosen: to put out their hand
  alternatives:
  - to stretch out their hand
  - to lay hands
  lexicon: HALOT
  rationale: This idiom often introduces hostile action. 'Put out their hand' is idiomatic enough in English and preserves the Hebrew imagery, especially since the next infinitive specifies the violent act.
- source_word: לִפְגֹעַ בְּכֹהֲנֵי יְהוָה
  chosen: to strike the priests of the LORD
  alternatives:
  - to attack the priests of the LORD
  - to fall upon the priests of the LORD
  lexicon: HALOT
  rationale: פגע can mean strike, attack, or fall upon. In this context of violent assault, 'strike' is suitably direct and pairs well with the preceding idiom.
