id: 1SA.22.14
reference: 1 Samuel 22:14
source:
  edition: WLC
  text: וַ/יַּ֧עַן אֲחִימֶ֛לֶךְ אֶת הַ/מֶּ֖לֶךְ וַ/יֹּאמַ֑ר וּ/מִ֤י בְ/כָל עֲבָדֶ֨י/ךָ֙
    כְּ/דָוִ֣ד נֶאֱמָ֔ן וַ/חֲתַ֥ן הַ/מֶּ֛לֶךְ וְ/סָ֥ר אֶל מִשְׁמַעְתֶּ֖/ךָ וְ/נִכְבָּ֥ד
    בְּ/בֵיתֶֽ/ךָ־־־׃
translation:
  text: Ahimelech answered the king and said, “And who among all your servants is
    as faithful as David, and the king’s son-in-law, and one who turns to your command,
    and is honored in your house?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “one who obeys you” / “one who is at your bidding” for “one who turns
      to your command.”
    reason: lexical_alternative
  - marker: b
    text: “In your house” may refer more specifically to the king’s household or court.
    reason: cultural_note
lexical_decisions:
- source_word: וַיַּעַן
  chosen: answered
  alternatives:
  - responded
  lexicon: HALOT
  rationale: Standard narrative wayyiqtol of ענה introducing a reply; 'answered' is
    the conventional and natural English rendering.
- source_word: אֲחִימֶלֶךְ
  chosen: Ahimelech
  rationale: Personal name is transliterated per project philosophy.
- source_word: הַמֶּלֶךְ
  chosen: the king
  lexicon: HALOT
  rationale: Definite title referring to Saul; straightforward rendering.
- source_word: וּמִי בְכָל עֲבָדֶיךָ
  chosen: who among all your servants
  alternatives:
  - who in all your servants
  - who among all your officials
  lexicon: HALOT
  rationale: Idiomatic English for the Hebrew interrogative plus partitive construction.
    'Servants' preserves עֲבָדִים without over-specifying rank.
- source_word: נֶאֱמָן
  chosen: faithful
  alternatives:
  - trustworthy
  - reliable
  lexicon: HALOT
  rationale: נֶאֱמָן denotes reliability and trustworthiness. 'Faithful' best captures
    both covenantal and courtly loyalty in context.
- source_word: וַחֲתַן הַמֶּלֶךְ
  chosen: the king’s son-in-law
  alternatives:
  - a son-in-law of the king
  lexicon: HALOT
  rationale: Construct phrase identifying David's relationship to Saul. With the article
    on 'king,' English idiom is best expressed as 'the king’s son-in-law.'
- source_word: וְסָר אֶל מִשְׁמַעְתֶּךָ
  chosen: one who turns to your command
  alternatives:
  - one who obeys you
  - one who is at your bidding
  - one who turns at your hearing
  lexicon: HALOT
  rationale: The participle סָר literally suggests turning aside/turning toward, and
    מִשְׁמַעַת relates to hearing/obedience/command. Rather than flattening to simple
    'obeys,' this rendering preserves the idiomatic sense of ready responsiveness
    to the king's directive.
- source_word: וְנִכְבָּד בְּבֵיתֶךָ
  chosen: is honored in your house
  alternatives:
  - is esteemed in your household
  - is honored in your court
  lexicon: HALOT
  rationale: נכבד conveys being honored or esteemed. 'House' can mean household/court;
    'in your house' preserves the Hebrew image while remaining understandable.
