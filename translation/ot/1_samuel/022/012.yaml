theological_decisions:
- issue: Rendering of אֲדֹנִי in address to Saul
  chosen_reading: my lord
  alternative_readings:
  - my master
  - sir
  rationale: This is not the divine name or a title for God, so the contested-term
    guidance for YHWH does not apply. The phrase denotes respectful address to a king/superior.
    'My lord' preserves the social hierarchy and tone without importing theological
    claims.
  doctrine_reference: 'Translation philosophy: readable modern English; preserve source
    meaning without importing doctrinal claims'
