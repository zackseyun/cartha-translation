id: 1SA.22.20
reference: 1 Samuel 22:20
source:
  edition: WLC
  text: וַ/יִּמָּלֵ֣ט בֵּן אֶחָ֗ד לַ/אֲחִימֶ֨לֶךְ֙ בֶּן אֲחִט֔וּב וּ/שְׁמ֖/וֹ אֶבְיָתָ֑ר
    וַ/יִּבְרַ֖ח אַחֲרֵ֥י דָוִֽד־־׃
translation:
  text: But one son of Ahimelech son of Ahitub escaped, and his name was Abiathar;
    he fled after David.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'he fled to David.' The Hebrew literally says 'he fled after David,'
      which can mean going after him in order to join him.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּמָּלֵט
  chosen: escaped
  alternatives:
  - slipped away
  - survived
  lexicon: HALOT
  rationale: The Niphal of מלט here denotes successful escape from the massacre just
    narrated. 'Escaped' is the most natural and direct English rendering in context;
    'survived' is possible but less explicit about the act of getting away.
- source_word: בֵּן אֶחָד
  chosen: one son
  alternatives:
  - one young man
  - a single son
  lexicon: HALOT
  rationale: Literally 'one son.' In genealogical narrative בן normally means 'son,'
    and the following patronymic confirms family relation rather than a generic 'young
    man.' 'One son' preserves the emphasis that only a single male descendant escaped.
- source_word: לַאֲחִימֶלֶךְ בֶּן אֲחִיטוּב
  chosen: of Ahimelech son of Ahitub
  alternatives:
  - belonging to Ahimelech son of Ahitub
  lexicon: HALOT
  rationale: The prefixed ל on the proper name functions idiomatically to mark relation
    ('of/from the family of'), best rendered in English as 'of Ahimelech.' Retaining
    'son of Ahitub' preserves the Hebrew genealogical identification.
- source_word: וּשְׁמוֹ אֶבְיָתָר
  chosen: and his name was Abiathar
  alternatives:
  - whose name was Abiathar
  lexicon: HALOT
  rationale: This is a straightforward naming clause. 'And his name was Abiathar'
    closely follows the Hebrew while remaining readable modern English.
- source_word: וַיִּבְרַח
  chosen: he fled
  alternatives:
  - he ran away
  - he escaped
  lexicon: HALOT
  rationale: 'ברח means ''flee.'' Since ''escaped'' already renders וַיִּמָּלֵט, using
    ''fled'' here preserves the distinction between the two verbs: first he escaped,
    then he fled.'
- source_word: אַחֲרֵי דָוִד
  chosen: after David
  alternatives:
  - to David
  - following David
  lexicon: HALOT
  rationale: The preposition אַחֲרֵי is literally 'after/behind.' In this context
    it idiomatically indicates going after someone, likely to join him. 'After David'
    preserves the Hebrew wording more transparently than the interpretive 'to David,'
    while still making sense in English.
- source_word: אֶבְיָתָר
  chosen: Abiathar
  rationale: Personal names are transliterated by standard convention per translation
    philosophy.
- source_word: אֲחִימֶלֶךְ
  chosen: Ahimelech
  rationale: Personal name transliterated by standard convention.
- source_word: אֲחִיטוּב
  chosen: Ahitub
  rationale: Personal name transliterated by standard convention.
- source_word: וַ
  chosen: But
  alternatives:
  - And
  - Now
  lexicon: HALOT
  rationale: 'The initial waw links this verse to the preceding slaughter with a mild
    contrastive force: despite the massacre, one son escaped. ''But'' brings out that
    narrative contrast better than a flat ''And.'''
