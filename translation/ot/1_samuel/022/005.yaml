id: 1SA.22.5
reference: 1 Samuel 22:5
source:
  edition: WLC
  text: וַ/יֹּאמֶר֩ גָּ֨ד הַ/נָּבִ֜יא אֶל דָּוִ֗ד לֹ֤א תֵשֵׁב֙ בַּ/מְּצוּדָ֔ה לֵ֥ךְ
    וּ/בָֽאתָ לְּ/ךָ֖ אֶ֣רֶץ יְהוּדָ֑ה וַ/יֵּ֣לֶךְ דָּוִ֔ד וַ/יָּבֹ֖א יַ֥עַר חָֽרֶת־־׃ס
translation:
  text: Then Gad the prophet said to David, “Do not stay in the stronghold. Go and
    enter the land of Judah.” So David went and entered the forest of Hereth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “go to the land of Judah.” The Hebrew verb can be rendered either “come/enter”
      or more generally “go to,” depending on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַנָּבִיא
  chosen: the prophet
  alternatives:
  - the seer
  lexicon: HALOT
  rationale: נָבִיא is the standard term for a prophet; 'seer' would reflect a different
    Hebrew term and is not warranted here.
- source_word: לֹא תֵשֵׁב
  chosen: Do not stay
  alternatives:
  - Do not remain
  - Do not dwell
  lexicon: HALOT
  rationale: יָשַׁב can mean sit, dwell, remain, or stay depending on context. Here
    Gad is giving a practical command about David's location, so 'stay' is natural
    modern English without losing the force.
- source_word: בַּמְּצוּדָה
  chosen: in the stronghold
  alternatives:
  - in the fortress
  - in the stronghold refuge
  lexicon: HALOT
  rationale: מְצוּדָה denotes a fortified or inaccessible place of refuge. 'Stronghold'
    fits the immediate David narrative context well and is a common, accurate rendering.
- source_word: לֵךְ
  chosen: Go
  alternatives:
  - Leave
  - Depart
  lexicon: HALOT
  rationale: הלך in the imperative is straightforwardly 'go.'
- source_word: וּבָאתָ לְּךָ אֶרֶץ יְהוּדָה
  chosen: and enter the land of Judah
  alternatives:
  - and go to the land of Judah
  - and come for yourself to the land of Judah
  lexicon: HALOT
  rationale: בוא often means 'come' or 'enter,' but from the narrative perspective
    and destination focus, 'enter the land of Judah' is the clearest English. The
    לְךָ is idiomatic and does not require a separate English reflexive; it adds personal
    direction/emphasis rather than new propositional content.
- source_word: אֶרֶץ יְהוּדָה
  chosen: the land of Judah
  alternatives:
  - Judah
  - the territory of Judah
  lexicon: HALOT
  rationale: אֶרֶץ plus tribal name is more specific than simply 'Judah'; 'the land
    of Judah' preserves the territorial sense.
- source_word: יַעַר חָרֶת
  chosen: the forest of Hereth
  alternatives:
  - the woodland of Hereth
  lexicon: HALOT
  rationale: יַעַר is 'forest' or 'woodland.' 'Forest of Hereth' is the most direct
    rendering, with Hereth transliterated as a place name.
- source_word: וַיָּבֹא
  chosen: entered
  alternatives:
  - came to
  - went into
  lexicon: HALOT
  rationale: For consistency with the prior command using בוא and because the object
    is a forested region, 'entered' best conveys movement into a place.
