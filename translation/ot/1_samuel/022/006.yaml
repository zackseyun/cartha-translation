id: 1SA.22.6
reference: 1 Samuel 22:6
source:
  edition: WLC
  text: וַ/יִּשְׁמַ֣ע שָׁא֔וּל כִּ֚י נוֹדַ֣ע דָּוִ֔ד וַ/אֲנָשִׁ֖ים אֲשֶׁ֣ר אִתּ֑/וֹ
    וְ/שָׁאוּל֩ יוֹשֵׁ֨ב בַּ/גִּבְעָ֜ה תַּֽחַת הָ/אֶ֤שֶׁל בָּֽ/רָמָה֙ וַ/חֲנִית֣/וֹ
    בְ/יָד֔/וֹ וְ/כָל עֲבָדָ֖י/ו נִצָּבִ֥ים עָלָֽי/ו־־׃
translation:
  text: Saul heard that David and the men who were with him had become known. Now
    Saul was sitting at Gibeah, under the tamarisk tree on the height, with his spear
    in his hand, and all his servants were standing around him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'had been discovered' / 'had been found out.' The Hebrew verb can carry
      the sense that David's whereabouts became known.
    reason: lexical_alternative
  - marker: b
    text: Or possibly 'at Ramah' if בָּרָמָה is taken as the place name Ramah rather
      than the common noun 'the height.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּשְׁמַע
  chosen: heard
  alternatives:
  - learned
  lexicon: HALOT
  rationale: Basic sense of שׁמע here is auditory reception extended to receiving
    news. 'Heard' is the most natural English narrative rendering and preserves the
    Hebrew idiom.
- source_word: כִּי נוֹדַע דָּוִד
  chosen: that David ... had become known
  alternatives:
  - that David had been discovered
  - that David was found out
  lexicon: HALOT
  rationale: The Niphal of ידע can mean 'be known' or 'be discovered.' In this context
    Saul receives word of David's whereabouts/status becoming known. 'Had become known'
    stays close to the Hebrew while allowing the implied sense that David's location
    was no longer hidden.
- source_word: וַאֲנָשִׁים אֲשֶׁר אִתּוֹ
  chosen: and the men who were with him
  alternatives:
  - and the men with him
  lexicon: HALOT
  rationale: Straightforward rendering of the accompanying group. 'Men' is gender-accurate
    and contextually appropriate for David's band.
- source_word: יוֹשֵׁב
  chosen: was sitting
  alternatives:
  - was dwelling
  - sat
  lexicon: HALOT
  rationale: The participle gives a durative/backgrounded scene-setting sense. 'Was
    sitting' fits the narrative tableau better than the more punctiliar 'sat.'
- source_word: בַּגִּבְעָה
  chosen: at Gibeah
  alternatives:
  - in Gibeah
  lexicon: HALOT
  rationale: With a place name, English idiom can use either 'at' or 'in.' 'At Gibeah'
    suits the scene-setting and avoids over-specifying enclosure.
- source_word: תַּחַת הָאֶשֶׁל
  chosen: under the tamarisk tree
  alternatives:
  - under the eshel tree
  lexicon: HALOT
  rationale: אשל is commonly identified as tamarisk. Translating the species is preferable
    to transliteration for readability.
- source_word: בָּרָמָה
  chosen: on the height
  alternatives:
  - at Ramah
  - on the high place
  lexicon: HALOT
  rationale: Though רמה can be a place name ('Ramah'), here the prefixed article and
    syntax favor the common noun sense, 'the height/high place.' 'On the height' is
    a natural English rendering of the elevated location.
- source_word: וַחֲנִיתוֹ בְיָדוֹ
  chosen: with his spear in his hand
  alternatives:
  - and his spear was in his hand
  lexicon: HALOT
  rationale: This clause is verbless in Hebrew and describes Saul's posture. 'With
    his spear in his hand' is idiomatic English while preserving the image of royal/martial
    authority.
- source_word: וְכָל עֲבָדָיו
  chosen: and all his servants
  alternatives:
  - and all his officials
  - and all his attendants
  lexicon: HALOT
  rationale: עבדים in a royal court can denote servants/attendants/officials. 'Servants'
    is the broadest and most textually transparent choice here, without importing
    a narrower bureaucratic sense.
- source_word: נִצָּבִים עָלָיו
  chosen: were standing around him
  alternatives:
  - were stationed by him
  - stood over him
  lexicon: HALOT
  rationale: The participle plus על conveys attendants positioned in Saul's presence.
    'Standing around him' communicates the courtly scene clearly in modern English.
