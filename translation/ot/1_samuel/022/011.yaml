id: 1SA.22.11
reference: 1 Samuel 22:11
source:
  edition: WLC
  text: וַ/יִּשְׁלַ֣ח הַ/מֶּ֡לֶךְ לִ/קְרֹא֩ אֶת אֲחִימֶ֨לֶךְ בֶּן אֲחִיט֜וּב הַ/כֹּהֵ֗ן
    וְ/אֵ֨ת כָּל בֵּ֥ית אָבִ֛י/ו הַ/כֹּהֲנִ֖ים אֲשֶׁ֣ר בְּ/נֹ֑ב וַ/יָּבֹ֥אוּ כֻלָּ֖/ם
    אֶל הַ/מֶּֽלֶךְ־־־־׃ס
translation:
  text: Then the king sent to summon Ahimelech son of Ahitub the priest, and all his
    father's house, the priests who were at Nob; and they all came to the king.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'all his father's house' refers to his wider paternal household or
      clan, not merely his immediate family.
    reason: cultural_note
lexical_decisions:
- source_word: וַיִּשְׁלַח
  chosen: sent
  alternatives:
  - sent word
  - dispatched
  lexicon: HALOT
  rationale: The verb שׁלח in the wayyiqtol here introduces Saul's action of sending
    for someone. In English, 'sent to summon' naturally captures the idiom with the
    following infinitive לִקְרֹא without overtranslating.
- source_word: לִקְרֹא
  chosen: to summon
  alternatives:
  - to call
  - to send for
  lexicon: HALOT
  rationale: קרא can mean 'call,' but in this royal context with an object person,
    'summon' best conveys an official command to appear.
- source_word: אֲחִימֶלֶךְ בֶּן אֲחִיטוּב
  chosen: Ahimelech son of Ahitub
  rationale: Personal names are transliterated per project philosophy; 'son of' preserves
    the filial designation directly.
- source_word: הַכֹּהֵן
  chosen: the priest
  lexicon: HALOT
  rationale: The appositional noun identifies Ahimelech's office. 'The priest' is
    the straightforward formal rendering.
- source_word: כָּל בֵּית אָבִיו
  chosen: all his father's house
  alternatives:
  - all his ancestral house
  - all his family household
  lexicon: HALOT
  rationale: The Hebrew idiom literally refers to the paternal household/clan. 'Father's
    house' preserves the idiom while remaining understandable in English.
- source_word: הַכֹּהֲנִים אֲשֶׁר בְּנֹב
  chosen: the priests who were at Nob
  alternatives:
  - the priests who were in Nob
  lexicon: HALOT
  rationale: This phrase further identifies 'his father's house' as the priestly household
    located at Nob. 'At Nob' is idiomatic for location in English.
- source_word: וַיָּבֹאוּ כֻלָּם
  chosen: and they all came
  alternatives:
  - and all of them came
  lexicon: HALOT
  rationale: The plural verb with כֻּלָּם emphasizes the complete response of the
    summoned group. 'They all came' is natural and preserves the emphasis.
- source_word: אֶל הַמֶּלֶךְ
  chosen: to the king
  alternatives:
  - before the king
  lexicon: HALOT
  rationale: אֶל normally indicates motion toward. 'To the king' is the direct rendering;
    'before the king' would add a nuance of audience not explicit in the preposition
    alone.
