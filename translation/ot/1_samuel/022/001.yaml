id: 1SA.22.1
reference: 1 Samuel 22:1
source:
  edition: WLC
  text: וַ/יֵּ֤לֶךְ דָּוִד֙ מִ/שָּׁ֔ם וַ/יִּמָּלֵ֖ט אֶל מְעָרַ֣ת עֲדֻלָּ֑ם וַ/יִּשְׁמְע֤וּ
    אֶחָי/ו֙ וְ/כָל בֵּ֣ית אָבִ֔י/ו וַ/יֵּרְד֥וּ אֵלָ֖י/ו שָֽׁמָּ/ה־־׃
translation:
  text: So David went from there and escaped to the cave of Adullam. When his brothers
    and all his father's household heard, they went down there to him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'fled to the cave of Adullam.' The Hebrew verb can denote escape or
      flight; 'escaped' was chosen to reflect the result of successful deliverance
      from danger.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּלֶךְ
  chosen: went
  alternatives:
  - departed
  lexicon: HALOT
  rationale: Basic narrative motion verb הלך in wayyiqtol; 'went' is the most natural
    and direct English rendering in narrative sequence.
- source_word: מִשָּׁם
  chosen: from there
  alternatives:
  - from that place
  lexicon: HALOT
  rationale: Deictic adverb indicating departure from the previous location; 'from
    there' is idiomatic and sufficiently precise.
- source_word: וַיִּמָּלֵט
  chosen: escaped
  alternatives:
  - fled
  - took refuge
  lexicon: HALOT
  rationale: Nifal of מלט conveys escaping or delivering oneself. 'Escaped' best matches
    the reflexive/resultative sense here, while 'fled' would overlap too much with
    mere movement and 'took refuge' overinterprets the destination.
- source_word: מְעָרַת עֲדֻלָּם
  chosen: the cave of Adullam
  alternatives:
  - a cave at Adullam
  lexicon: HALOT
  rationale: Construct phrase with place name; the traditional and most straightforward
    rendering is 'the cave of Adullam.' The article is supplied naturally in English
    for a known location.
- source_word: וַיִּשְׁמְעוּ
  chosen: heard
  alternatives:
  - came to hear
  lexicon: HALOT
  rationale: Simple auditory/perceptive verb שמע in narrative. 'Heard' fits the syntax
    with the following descent action.
- source_word: אֶחָיו
  chosen: his brothers
  alternatives:
  - his brothers/siblings
  lexicon: HALOT
  rationale: The Hebrew is grammatically masculine plural and in this context refers
    to David's male siblings. 'Brothers' is gender-accurate and matches the source.
- source_word: כָּל בֵּית אָבִיו
  chosen: all his father's household
  alternatives:
  - all his father's house
  - all his paternal family
  lexicon: HALOT
  rationale: בַּיִת in this familial idiom denotes household/family unit, not merely
    the physical house. 'Household' communicates the social-family sense in readable
    modern English.
- source_word: וַיֵּרְדוּ
  chosen: they went down
  alternatives:
  - they came down
  - they descended
  lexicon: HALOT
  rationale: ירד literally means 'go down/descend.' 'Went down' preserves the directional
    nuance, likely topographical, without sounding overly formal.
- source_word: אֵלָיו שָׁמָּה
  chosen: there to him
  alternatives:
  - to him there
  lexicon: HALOT
  rationale: The Hebrew combines direction toward David with the locative adverb 'there.'
    English idiom prefers 'there to him' after the verb phrase in this sentence structure.
