id: 1SA.22.7
reference: 1 Samuel 22:7
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר שָׁא֗וּל לַֽ/עֲבָדָי/ו֙ הַ/נִּצָּבִ֣ים עָלָ֔י/ו שִׁמְעוּ נָ֖א
    בְּנֵ֣י יְמִינִ֑י גַּם לְ/כֻלְּ/כֶ֗ם יִתֵּ֤ן בֶּן יִשַׁי֙ שָׂד֣וֹת וּ/כְרָמִ֔ים
    לְ/כֻלְּ/כֶ֣ם יָשִׂ֔ים שָׂרֵ֥י אֲלָפִ֖ים וְ/שָׂרֵ֥י מֵאֽוֹת־־־׃
translation:
  text: Then Saul said to his servants who were standing around him, “Listen, please,
    sons of Benjamin! Will the son of Jesse also give all of you fields and vineyards?
    Will he make all of you commanders of thousands and commanders of hundreds?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Benjaminites.' The Hebrew literally reads 'sons of Benjamin,' preserving
      Saul's appeal to tribal identity.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַנִּצָּבִים עָלָיו
  chosen: who were standing around him
  alternatives:
  - who stood by him
  - who were stationed over him
  lexicon: HALOT
  rationale: The participle from נצב with עַל in this court setting most naturally
    describes attendants positioned around Saul. 'Standing around him' is idiomatic
    and fits the scene better than the more wooden 'standing over him.'
- source_word: שִׁמְעוּ נָא
  chosen: Listen, please
  alternatives:
  - Hear now
  - Please listen
  lexicon: HALOT
  rationale: שמע in direct address is well rendered 'listen.' The particle נָא adds
    entreaty or urgency; 'please' preserves this without archaic tone.
- source_word: בְּנֵי יְמִינִי
  chosen: sons of Benjamin
  alternatives:
  - Benjaminites
  - sons of my right hand
  lexicon: HALOT
  rationale: This is an ethnic/tribal designation, not a literal filial statement.
    'Sons of Benjamin' preserves the Hebrew form and Saul's rhetorical appeal to tribal
    loyalty better than the smoother 'Benjaminites.'
- source_word: גַּם לְכֻלְּכֶם
  chosen: also give all of you
  alternatives:
  - indeed give all of you
  - give even to all of you
  lexicon: HALOT
  rationale: גַּם adds the sense 'also/even,' implying comparison with benefits already
    given or expected. 'Also' captures Saul's insinuation that David cannot reward
    them as Saul can.
- source_word: בֶּן יִשַׁי
  chosen: the son of Jesse
  alternatives:
  - David
  lexicon: HALOT
  rationale: Saul pointedly avoids David's name and uses a dismissive designation.
    Retaining 'the son of Jesse' preserves the rhetoric and tension of the narrative.
- source_word: שָׂדוֹת וּכְרָמִים
  chosen: fields and vineyards
  alternatives:
  - farms and vineyards
  lexicon: HALOT
  rationale: These are concrete landed rewards. 'Fields and vineyards' is the standard
    and transparent rendering.
- source_word: יָשִׂים
  chosen: make
  alternatives:
  - appoint
  - set
  lexicon: HALOT
  rationale: In context of assigning rank, the verb means to place or appoint into
    office. 'Make' is natural English before the office titles and keeps the rhetorical
    question concise.
- source_word: שָׂרֵי אֲלָפִים וְשָׂרֵי מֵאוֹת
  chosen: commanders of thousands and commanders of hundreds
  alternatives:
  - captains of thousands and captains of hundreds
  - leaders of thousands and leaders of hundreds
  lexicon: HALOT
  rationale: These are military-administrative ranks. 'Commanders' communicates the
    function clearly in modern English without the archaic feel of 'captains.'
