id: 1SA.22.22
reference: 1 Samuel 22:22
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר דָּוִ֜ד לְ/אֶבְיָתָ֗ר יָדַ֜עְתִּי בַּ/יּ֤וֹם הַ/הוּא֙ כִּֽי שָׁם֙
    דויג הָ/אֲדֹמִ֔י כִּֽי הַגֵּ֥ד יַגִּ֖יד לְ/שָׁא֑וּל אָנֹכִ֣י סַבֹּ֔תִי בְּ/כָל
    נֶ֖פֶשׁ בֵּ֥ית אָבִֽי/ךָ־־־׃
translation:
  text: David said to Abiathar, “I knew on that day, when Doeg the Edomite was there,
    that he would surely tell Saul. I am responsible for every life in your father’s
    house.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “that Doeg the Edomite was there.” The Hebrew conjunction can be taken
      as introducing the content of what David knew rather than a temporal nuance.
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew uses an infinitive absolute with the finite verb: “telling, he would
      tell,” an emphatic form meaning “he would surely tell.”'
    reason: lexical_alternative
  - marker: c
    text: Or “I have caused the death of” or “I am the cause of” every life in your
      father’s house.
    reason: lexical_alternative
lexical_decisions:
- source_word: יָדַעְתִּי
  chosen: I knew
  alternatives:
  - I realized
  - I was aware
  lexicon: HALOT
  rationale: Straightforward perfect of ידע expressing David's prior awareness; 'I
    knew' is the most direct and natural rendering.
- source_word: בַּיּוֹם הַהוּא
  chosen: on that day
  alternatives:
  - that day
  lexicon: HALOT
  rationale: Temporal phrase rendered idiomatically in English while preserving the
    definite reference to a specific past day.
- source_word: כִּי שָׁם דויג הָאֲדֹמִי
  chosen: when Doeg the Edomite was there
  alternatives:
  - that Doeg the Edomite was there
  lexicon: HALOT
  rationale: The clause explains what David knew on that day. English 'when' makes
    the temporal-circumstantial sense smooth, though the Hebrew conjunction could
    also be represented as 'that.'
- source_word: כִּי הַגֵּד יַגִּיד לְשָׁאוּל
  chosen: that he would surely tell Saul
  alternatives:
  - that he would certainly report it to Saul
  - for he would surely tell Saul
  lexicon: HALOT
  rationale: The infinitive absolute plus finite verb of נגד intensifies the action;
    'would surely tell' preserves that emphasis without awkwardness. 'Tell' is preferred
    over 'report it' because no explicit object is present in Hebrew.
- source_word: אָנֹכִי
  chosen: I
  alternatives:
  - I myself
  lexicon: HALOT
  rationale: The independent pronoun adds emphasis. English can convey this sufficiently
    by clause position and context without requiring the heavier 'I myself' in the
    main text.
- source_word: סַבֹּתִי
  chosen: am responsible for
  alternatives:
  - have brought about
  - have caused
  - am the cause of
  lexicon: HALOT
  rationale: 'From סבב in a causative/resultative sense here: David accepts blame
    for what happened. ''Am responsible for'' communicates the idiomatic force clearly
    in modern English better than a wooden ''have caused.'''
- source_word: בְּכָל נֶפֶשׁ
  chosen: for every life
  alternatives:
  - for every person
  - for every soul
  lexicon: HALOT
  rationale: נֶפֶשׁ here refers to individual lives/persons. 'Every life' preserves
    the gravity of the loss and avoids overly spiritualized misunderstanding of 'soul.'
- source_word: בֵּית אָבִיךָ
  chosen: your father’s house
  alternatives:
  - your father's household
  - your ancestral house
  lexicon: HALOT
  rationale: Standard idiom for the family/household line. 'Your father's house' is
    both accurate and readable, while retaining the familial-household sense.
