id: 1SA.12.10
reference: 1 Samuel 12:10
source:
  edition: WLC
  text: וַ/יִּזְעֲק֤וּ אֶל יְהוָה֙ ו/יאמר חָטָ֔אנוּ כִּ֤י עָזַ֨בְנוּ֙ אֶת יְהוָ֔ה וַ/נַּעֲבֹ֥ד אֶת הַ/בְּעָלִ֖ים וְ/אֶת הָ/עַשְׁתָּר֑וֹת וְ/עַתָּ֗ה הַצִּילֵ֛/נוּ מִ/יַּ֥ד אֹיְבֵ֖י/נוּ וְ/נַעַבְדֶֽ/ךָּ־־־־׃
translation:
  text: Then they cried out to Yahweh and said, “We have sinned, for we have forsaken Yahweh and have served the Baals and the Ashtaroths. But now, deliver us from the hand of our enemies, and we will serve you.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Ashtoreths.' The Hebrew name refers to the goddess or goddesses associated with Canaanite worship.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּזְעֲקוּ
  chosen: they cried out
  alternatives:
  - they called out
  - they cried
  lexicon: HALOT
  rationale: זעק commonly denotes an urgent cry for help. 'Cried out' preserves the distress and supplicatory force better than the flatter 'called out'.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: חָטָאנוּ
  chosen: We have sinned
  alternatives:
  - We sinned
  lexicon: HALOT
  rationale: The perfect here expresses acknowledged completed guilt. 'We have sinned' is idiomatic in English confessional language and preserves the force of admission.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  - that
  lexicon: HALOT
  rationale: 'Introduces the grounds of the confession: they sinned in that they forsook the LORD and served other gods. ''Because'' is the clearest modern connector.'
- source_word: עָזַבְנוּ אֶת יְהוָה
  chosen: we have forsaken the LORD
  alternatives:
  - we have abandoned the LORD
  - we left the LORD
  lexicon: HALOT
  rationale: עזב in covenantal contexts often carries the sense of forsaking or abandoning. 'Forsaken' preserves the covenantal and moral weight.
- source_word: וַנַּעֲבֹד
  chosen: have served
  alternatives:
  - served
  - worshiped
  lexicon: HALOT
  rationale: עבד with deity objects can mean serve/worship. 'Served' is chosen to maintain lexical consistency with the later 'we will serve you' and to preserve the contrast of allegiance. Worship is implied but narrower.
- source_word: הַבְּעָלִים
  chosen: the Baals
  alternatives:
  - the Baal idols
  - the Baalim
  lexicon: HALOT
  rationale: Plural form refers to the Baal deities/images in Israel's idolatrous practice. 'The Baals' is the most transparent English rendering and avoids unnecessary transliteration.
- source_word: הָעַשְׁתָּרֹת
  chosen: the Ashtaroths
  alternatives:
  - the Ashtoreths
  - the Astartes
  lexicon: HALOT
  rationale: A transliterated plural best reflects the Hebrew proper-name form for the goddess/goddesses associated with Canaanite worship. 'Ashtaroths' closely follows the Hebrew form.
- source_word: וְעַתָּה
  chosen: But now
  alternatives:
  - And now
  - Now then
  lexicon: HALOT
  rationale: Marks a turn from confession to petition. 'But now' brings out the rhetorical shift more clearly in English.
- source_word: הַצִּילֵנוּ
  chosen: deliver us
  alternatives:
  - save us
  - rescue us
  lexicon: HALOT
  rationale: נצל in this context is deliverance from hostile power. 'Deliver us' fits the covenant-prayer register and pairs naturally with 'from the hand of'.
- source_word: מִיַּד אֹיְבֵינוּ
  chosen: from the hand of our enemies
  alternatives:
  - from our enemies' power
  - from the grasp of our enemies
  lexicon: HALOT
  rationale: '''Hand'' is a common Hebrew idiom for power/control. Retaining it preserves the imagery while remaining intelligible in English.'
- source_word: וְנַעַבְדֶךָּ
  chosen: and we will serve you
  alternatives:
  - that we may serve you
  - and let us serve you
  lexicon: HALOT
  rationale: The cohortative/imperfect here expresses intended response or vow following deliverance. 'We will serve you' is the most natural rendering of the pledge without overinterpreting purpose.
