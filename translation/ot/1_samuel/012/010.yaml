theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: Follows the project's stated default for YHWH, preserving reverential convention and broad English Bible continuity.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Whether עבד should be rendered 'serve' or 'worship' for both idols and the LORD
  chosen_reading: serve
  alternative_readings:
  - worship
  rationale: The verse contrasts covenant allegiance transferred from the LORD to false gods and back again. 'Serve' preserves the broader notion of devotion and allegiance, while allowing the repeated Hebrew verb to remain visible in English.
  doctrine_reference: DOCTRINE.md Translation philosophy §5 (Consistency of key terms, or documented exception)
