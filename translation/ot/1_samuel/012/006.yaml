id: 1SA.12.6
reference: 1 Samuel 12:6
source:
  edition: WLC
  text: וַ/יֹּ֥אמֶר שְׁמוּאֵ֖ל אֶל הָ/עָ֑ם יְהוָ֗ה אֲשֶׁ֤ר עָשָׂה֙ אֶת מֹשֶׁ֣ה וְ/אֶֽת
    אַהֲרֹ֔ן וַ/אֲשֶׁ֧ר הֶעֱלָ֛ה אֶת אֲבֹתֵי/כֶ֖ם מֵ/אֶ֥רֶץ מִצְרָֽיִם־־־־׃
translation:
  text: Then Samuel said to the people, “It is the LORD who appointed Moses and Aaron
    and who brought your fathers up from the land of Egypt.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'the LORD who made Moses and Aaron.' The Hebrew verb
      can be rendered 'made,' but here likely refers to the LORD's appointing or establishing
      them in their roles.
    reason: lexical_alternative
  - marker: b
    text: '''Your fathers'' may also be understood more broadly as ''your ancestors.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: Then Samuel said
  alternatives:
  - And Samuel said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then' gives natural modern
    English narrative flow while preserving sequence; 'said' is the plain sense of
    אמר.
- source_word: אֶל הָעָם
  chosen: to the people
  lexicon: HALOT
  rationale: Direct and standard rendering of the preposition plus definite noun.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following Jewish reverence tradition and common English Bible convention.
- source_word: אֲשֶׁר עָשָׂה אֶת מֹשֶׁה וְאֶת אַהֲרֹן
  chosen: who appointed Moses and Aaron
  alternatives:
  - who made Moses and Aaron
  - who dealt with Moses and Aaron
  lexicon: HALOT
  rationale: The literal 'made Moses and Aaron' is awkward and potentially misleading
    in English. In this context, where Samuel is recounting the LORD's historical
    acts in raising up leaders for Israel, עשה is best rendered idiomatically as 'appointed'
    or 'raised up.' 'Appointed' captures the sense of constituting them in their roles
    without over-paraphrasing.
- source_word: וַאֲשֶׁר הֶעֱלָה
  chosen: and who brought ... up
  alternatives:
  - and who led ... up
  lexicon: HALOT
  rationale: עלה in the Hiphil commonly means 'bring up.' This is the standard exodus
    idiom and should be preserved.
- source_word: אֶת אֲבֹתֵיכֶם
  chosen: your fathers
  alternatives:
  - your ancestors
  lexicon: HALOT
  rationale: The Hebrew explicitly says 'your fathers.' Per gender-accurate philosophy,
    the masculine form is retained rather than neutralized, though 'ancestors' is
    a possible contextual alternative.
- source_word: מֵאֶרֶץ מִצְרָיִם
  chosen: from the land of Egypt
  alternatives:
  - out of Egypt
  lexicon: HALOT
  rationale: This closely reflects the Hebrew wording and preserves the formal exodus
    formula.
