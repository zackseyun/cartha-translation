theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Sense of עָשָׂה with Moses and Aaron
  chosen_reading: appointed Moses and Aaron
  alternative_readings:
  - made Moses and Aaron
  rationale: Theologically, the verse emphasizes the LORD's sovereign action in establishing Israel's leaders, not creating them as persons. 'Appointed' communicates that role-establishing action more clearly in English while remaining faithful to the Hebrew idiom.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: optimal equivalence; original-language primacy over translation tradition'
