  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Nuance of divine motivation in הוֹאִיל
  chosen_reading: has been pleased
  alternative_readings:
  - has chosen
  - has consented
  rationale: The verse grounds Israel's security in God's gracious resolve tied to his name and prior commitment. 'Has been pleased' preserves that theological tone without overstating a technical doctrine of election beyond the text.
