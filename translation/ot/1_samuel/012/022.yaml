id: 1SA.12.22
reference: 1 Samuel 12:22
source:
  edition: WLC
  text: כִּ֠י לֹֽא יִטֹּ֤שׁ יְהוָה֙ אֶת עַמּ֔/וֹ בַּ/עֲב֖וּר שְׁמ֣/וֹ הַ/גָּד֑וֹל כִּ֚י הוֹאִ֣יל יְהוָ֔ה לַ/עֲשׂ֥וֹת אֶתְ/כֶ֛ם ל֖/וֹ לְ/עָֽם־־׃
translation:
  text: For Yahweh will not forsake his people, for the sake of his great name, because Yahweh has been pleased to make you his people.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'will not abandon' or 'will not cast off.'
    reason: lexical_alternative
  - marker: b
    text: Or 'because the LORD has chosen to make you a people for himself.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יִטֹּשׁ
  chosen: will not forsake
  alternatives:
  - will not abandon
  - will not cast off
  lexicon: HALOT
  rationale: נטש in this context denotes leaving or abandoning a people. 'Forsake' is natural modern biblical English and preserves covenantal weight without sounding archaic beyond comprehension.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: עַמּוֹ
  chosen: his people
  alternatives:
  - his nation
  lexicon: HALOT
  rationale: עַם commonly refers to a people in covenantal/national identity. 'His people' is the standard and contextually precise rendering.
- source_word: בַּעֲבוּר
  chosen: for the sake of
  alternatives:
  - because of
  - on account of
  lexicon: HALOT
  rationale: The phrase expresses motive or regard. 'For the sake of' best captures the idiomatic sense here, especially with 'his great name' as the ground of divine action.
- source_word: שְׁמוֹ הַגָּדוֹל
  chosen: his great name
  alternatives:
  - his glorious name
  lexicon: HALOT
  rationale: A straightforward rendering preserving the Hebrew idiom of God's 'name' as his revealed reputation and honor.
- source_word: הוֹאִיל
  chosen: has been pleased
  alternatives:
  - has chosen
  - has determined
  - has undertaken
  lexicon: HALOT
  rationale: הואל often conveys willingness or pleased resolve. 'Has been pleased' fits the perfect verb and preserves the sense of gracious divine volition better than the flatter 'has chosen'.
- source_word: לַעֲשׂוֹת אֶתְכֶם לוֹ לְעָם
  chosen: to make you his people
  alternatives:
  - to make you a people for himself
  - to appoint you as his people
  lexicon: HALOT
  rationale: This infinitive construction expresses God's act of constituting Israel as his own people. 'To make you his people' is concise, accurate, and readable; 'for himself' is implicit in לוֹ and adequately conveyed by 'his'.
