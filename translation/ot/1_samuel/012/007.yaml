theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project default is to render the covenant name as 'the LORD' rather
    than transliterating it.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Sense of צִדְקוֹת יְהוָה
  chosen_reading: righteous acts of the LORD
  alternative_readings:
  - saving acts of the LORD
  - righteous deeds of the LORD
  rationale: The phrase points to YHWH's covenant-faithful deeds in Israel's history.
    'Righteous acts' preserves the lexical connection to righteousness without collapsing
    it into a narrower soteriological term.
  doctrine_reference: DOCTRINE.md Translation philosophy §5 (consistency of key terms,
    documented exception if varied)
