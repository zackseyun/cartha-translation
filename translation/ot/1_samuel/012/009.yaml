theological_decisions:
- issue: Subject of 'he sold them'
  chosen_reading: The implied singular subject is the LORD.
  alternative_readings:
  - An impersonal reading ('they were sold')
  rationale: 'The preceding clause names ''the LORD their God,'' and the singular wayyiqtol verb naturally continues with him as subject: the LORD judicially handed Israel over. This matches the broader covenant-judgment pattern in Judges and Samuel without adding doctrinal content beyond the text.'
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve theological tension rather than resolve it beyond the text.'
- issue: Force of 'forgot the LORD'
  chosen_reading: Covenantal forgetfulness implying disloyalty, rendered literally as 'forgot.'
  alternative_readings:
  - Explicitly interpretive renderings such as 'abandoned the LORD'
  rationale: The Hebrew verb can carry covenantal overtones, but the text itself says 'forgot.' Retaining the literal wording avoids importing a stronger interpretive gloss into the main text while allowing readers to hear the covenantal significance in context.
  doctrine_reference: 'Translation philosophy: optimal equivalence; never paraphrase beyond what the source warrants.'
