id: 1SA.12.9
reference: 1 Samuel 12:9
source:
  edition: WLC
  text: וַֽ/יִּשְׁכְּח֖וּ אֶת יְהוָ֣ה אֱלֹהֵי/הֶ֑ם וַ/יִּמְכֹּ֣ר אֹתָ֡/ם בְּ/יַ֣ד סִֽיסְרָא֩ שַׂר צְבָ֨א חָצ֜וֹר וּ/בְ/יַד פְּלִשְׁתִּ֗ים וּ/בְ/יַד֙ מֶ֣לֶךְ מוֹאָ֔ב וַ/יִּֽלָּחֲמ֖וּ בָּֽ/ם־־־׃
translation:
  text: But they forgot Yahweh their God, and he sold them into the hand of Sisera, commander of the army of Hazor, and into the hand of the Philistines, and into the hand of the king of Moab; and they fought against them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'he gave them over.' The Hebrew literally says 'he sold them,' a covenant-judgment idiom for handing a people over to the power of their enemies.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁכְּחוּ
  chosen: they forgot
  alternatives:
  - they neglected
  - they abandoned
  lexicon: HALOT
  rationale: The verb שׁכח literally means 'forget.' In covenantal contexts it can imply neglect or disloyal disregard, but 'forgot' best preserves the Hebrew wording while allowing the theological force to arise from context.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֱלֹהֵיהֶם
  chosen: their God
  lexicon: HALOT
  rationale: Construct with pronominal suffix naturally yields 'their God,' preserving the covenant relationship emphasized in the clause.
- source_word: וַיִּמְכֹּר
  chosen: he sold
  alternatives:
  - he gave over
  - he delivered
  lexicon: HALOT
  rationale: מכר is literally 'sell.' In Judges/Samuel this idiom describes the LORD handing Israel over to oppressors as judgment. 'He sold' preserves the metaphor more formally than 'gave over,' while remaining intelligible.
- source_word: בְּיַד
  chosen: into the hand of
  alternatives:
  - into the power of
  - over to
  lexicon: HALOT
  rationale: The idiom 'into the hand of' is common biblical language for subjection to another's power. Retaining 'hand' preserves the source imagery and remains understandable in English.
- source_word: סִיסְרָא
  chosen: Sisera
  lexicon: HALOT
  rationale: Personal name transliterated by standard English convention.
- source_word: שַׂר צְבָא חָצוֹר
  chosen: commander of the army of Hazor
  alternatives:
  - captain of the army of Hazor
  - general of Hazor's army
  lexicon: HALOT
  rationale: שַׂר צְבָא denotes a military leader. 'Commander of the army' is clear modern English and preserves the construct relation with Hazor.
- source_word: פְּלִשְׁתִּים
  chosen: the Philistines
  lexicon: HALOT
  rationale: Standard English ethnonym.
- source_word: מֶלֶךְ מוֹאָב
  chosen: the king of Moab
  lexicon: HALOT
  rationale: Straightforward construct chain; no reason to expand beyond the Hebrew.
- source_word: וַיִּלָּחֲמוּ בָם
  chosen: they fought against them
  alternatives:
  - they made war on them
  lexicon: HALOT
  rationale: The plural verb most naturally refers back to the oppressing powers just named, with Israel as the object of attack. 'Fought against them' is idiomatic and preserves the adversative sense of לחם with ב.
