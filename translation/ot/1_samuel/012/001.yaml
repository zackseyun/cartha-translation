id: 1SA.12.1
reference: 1 Samuel 12:1
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר שְׁמוּאֵל֙ אֶל כָּל יִשְׂרָאֵ֔ל הִנֵּה֙ שָׁמַ֣עְתִּי בְ/קֹֽלְ/כֶ֔ם
    לְ/כֹ֥ל אֲשֶׁר אֲמַרְתֶּ֖ם לִ֑/י וָ/אַמְלִ֥יךְ עֲלֵי/כֶ֖ם מֶֽלֶךְ־־־׃
translation:
  text: Then Samuel said to all Israel, “Look, I have listened to your voice in all
    that you have said to me, and I have made a king reign over you.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I have obeyed your voice' / 'I have heeded your request.' The Hebrew
      idiom 'listen to the voice' can include the sense of complying with what was
      asked.
    reason: lexical_alternative
  - marker: b
    text: 'Or ''I have appointed a king over you.'' The Hebrew verb is causative:
      ''to make someone king'' or ''to cause someone to reign.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: Then ... said
  alternatives:
  - And ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then' gives natural English
    narrative flow while preserving sequence; 'and' is possible but less idiomatic
    here.
- source_word: אֶל כָּל יִשְׂרָאֵל
  chosen: to all Israel
  alternatives:
  - to all of Israel
  lexicon: HALOT
  rationale: Direct and formal rendering of the preposition plus collective noun;
    'all Israel' is standard and natural English for the national assembly.
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - See
  - Indeed
  lexicon: HALOT
  rationale: הִנֵּה is a discourse marker drawing attention. 'Look' preserves the
    deictic force in readable modern English better than the archaic 'Behold.'
- source_word: שָׁמַעְתִּי בְקֹלְכֶם
  chosen: I have listened to your voice
  alternatives:
  - I have listened to you
  - I have obeyed your voice
  lexicon: HALOT
  rationale: The idiom literally means 'listen to/heed the voice of.' 'Listened to
    your voice' keeps the Hebrew imagery and leaves room for the nuance of heeding
    without overstating it as full 'obeyed.'
- source_word: לְכֹל אֲשֶׁר אֲמַרְתֶּם לִי
  chosen: in all that you have said to me
  alternatives:
  - regarding all that you said to me
  - in everything that you said to me
  lexicon: HALOT
  rationale: This phrase specifies the scope of Samuel's listening. 'In all that you
    have said to me' is idiomatic and closely tracks the Hebrew structure.
- source_word: וָאַמְלִיךְ
  chosen: I have made ... reign
  alternatives:
  - I have made ... king
  - I have appointed
  - I have set
  lexicon: HALOT
  rationale: The Hiphil of מלך means to cause someone to reign, install as king. 'Made
    ... reign' preserves the verbal force better than the flatter 'appointed,' while
    still reading naturally with the object-complement construction.
- source_word: מֶלֶךְ
  chosen: a king
  alternatives:
  - king
  lexicon: HALOT
  rationale: 'The noun names the office conferred. English requires the article here
    in natural syntax: ''made a king reign over you'' / ''made a king over you.'''
