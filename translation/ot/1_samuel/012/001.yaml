theological_decisions:
- issue: Nuance of שָׁמַע in Samuel's response to the people's request
  chosen_reading: Render as 'listened to' rather than 'obeyed'
  alternative_readings:
  - obeyed your voice
  - heeded your request
  rationale: The Hebrew idiom can carry the sense of hearing with compliance, but
    in this context Samuel is summarizing that he has acted in accordance with what
    they asked. 'Listened to' preserves the lexical sense and avoids importing a stronger
    theological or moral endorsement than the text itself states.
  doctrine_reference: Translation philosophy §1, §3
- issue: Force of the Hiphil verb וָאַמְלִיךְ
  chosen_reading: 'Express causative enthronement: ''I have made a king reign over
    you'''
  alternative_readings:
  - I have made a king over you
  - I have appointed a king over you
  rationale: The text states Samuel's role in installing the monarchy, not merely
    announcing it. The causative nuance should be preserved without overstating Samuel
    as the ultimate source of kingship apart from God's prior involvement in the broader
    narrative.
  doctrine_reference: Translation philosophy §1, §5
