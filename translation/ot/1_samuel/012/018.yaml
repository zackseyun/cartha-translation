id: 1SA.12.18
reference: 1 Samuel 12:18
source:
  edition: WLC
  text: וַ/יִּקְרָ֤א שְׁמוּאֵל֙ אֶל יְהוָ֔ה וַ/יִּתֵּ֧ן יְהוָ֛ה קֹלֹ֥ת וּ/מָטָ֖ר בַּ/יּ֣וֹם הַ/ה֑וּא וַ/יִּירָ֨א כָל הָ/עָ֥ם מְאֹ֛ד אֶת יְהוָ֖ה וְ/אֶת שְׁמוּאֵֽל־־־־׃
translation:
  text: Then Samuel called to Yahweh, and Yahweh sent thunder and rain that day; and all the people greatly feared Yahweh and Samuel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'voices'; in this storm context the term refers to thunder.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְרָא
  chosen: called
  alternatives:
  - cried out
  - invoked
  lexicon: HALOT
  rationale: The verb קרא with אֶל יְהוָה commonly means to call out to or invoke the LORD in prayer. 'Called' is natural modern English and preserves the directness of Samuel's appeal without overinterpreting the manner.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וַיִּתֵּן
  chosen: sent
  alternatives:
  - gave
  - produced
  lexicon: HALOT
  rationale: Literally 'gave,' but in English 'the LORD sent thunder and rain' best conveys the idiom of God causing the storm. This is a context-driven optimal-equivalence rendering rather than a wooden gloss.
- source_word: קֹלֹת
  chosen: thunder
  alternatives:
  - voices
  - sounds
  - thunderclaps
  lexicon: HALOT
  rationale: Although קוֹל literally means 'voice/sound,' in storm contexts and especially paired with rain it idiomatically refers to thunder. 'Thunder' communicates the meteorological sign intended in context.
- source_word: וּמָטָר
  chosen: rain
  alternatives:
  - downpour
  lexicon: HALOT
  rationale: Straightforward rendering of מָטָר as 'rain.' 'Downpour' would add intensity not explicit in the noun itself.
- source_word: בַּיּוֹם הַהוּא
  chosen: that day
  alternatives:
  - on that day
  lexicon: HALOT
  rationale: '''That day'' is idiomatic English and preserves the temporal specificity of the Hebrew phrase.'
- source_word: וַיִּירָא
  chosen: feared
  alternatives:
  - were afraid of
  - stood in awe of
  lexicon: HALOT
  rationale: The verb ירא here denotes fear in response to the divine sign. 'Feared' preserves the compactness and theological weight of the Hebrew; 'stood in awe' may soften the element of dread too much.
- source_word: כָל הָעָם
  chosen: all the people
  alternatives:
  - the whole people
  lexicon: HALOT
  rationale: Standard rendering preserving the collective scope.
- source_word: מְאֹד
  chosen: greatly
  alternatives:
  - very much
  - exceedingly
  lexicon: HALOT
  rationale: '''Greatly'' modifies ''feared'' smoothly in modern English while retaining the intensifying force of מְאֹד.'
- source_word: אֶת יְהוָה וְאֶת שְׁמוּאֵל
  chosen: the LORD and Samuel
  alternatives:
  - the LORD, and also Samuel
  lexicon: HALOT
  rationale: The repeated object marker marks both as objects of fear/respect. The concise English coordination preserves the Hebrew structure without implying equality of status beyond the syntax of the clause.
