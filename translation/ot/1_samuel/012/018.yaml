theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Nuance of fearing both the LORD and Samuel
  chosen_reading: feared the LORD and Samuel
  alternative_readings:
  - were in awe of the LORD and Samuel
  - feared the LORD, and also respected Samuel
  rationale: The Hebrew uses the same verb with both objects. The translation preserves that tension rather than resolving it into separate categories, while context indicates reverential fear toward the LORD and fear/respect toward Samuel as his prophet.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3'
