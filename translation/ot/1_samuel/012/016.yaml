id: 1SA.12.16
reference: 1 Samuel 12:16
source:
  edition: WLC
  text: גַּם עַתָּה֙ הִתְיַצְּב֣וּ וּ/רְא֔וּ אֶת הַ/דָּבָ֥ר הַ/גָּד֖וֹל הַ/זֶּ֑ה אֲשֶׁ֣ר יְהוָ֔ה עֹשֶׂ֖ה לְ/עֵינֵי/כֶֽם־־׃
translation:
  text: Now then, stand still and see this great thing that Yahweh is doing before your eyes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''YHWH''; traditionally rendered ''the LORD.'''
    reason: alternative_reading
lexical_decisions:
- source_word: גַּם עַתָּה
  chosen: Now then
  alternatives:
  - Even now
  - And now
  lexicon: HALOT
  rationale: The combination functions as a discourse marker introducing the next solemn action or appeal. 'Now then' is natural modern English and preserves the transitional force better than a wooden 'even now.'
- source_word: הִתְיַצְּבוּ
  chosen: stand still
  alternatives:
  - take your stand
  - stand
  lexicon: HALOT
  rationale: The Hitpael imperative of יצב calls the hearers to position themselves attentively. In this context Samuel is summoning the people to remain in place and watch what God will do, so 'stand still' captures both posture and attentiveness.
- source_word: וּרְאוּ
  chosen: see
  alternatives:
  - look
  - watch
  lexicon: HALOT
  rationale: The imperative invites direct observation of the sign. 'See' is idiomatic with the following object and keeps the force of experiential witnessing.
- source_word: הַדָּבָר הַגָּדוֹל הַזֶּה
  chosen: this great thing
  alternatives:
  - this great matter
  - this great deed
  lexicon: HALOT
  rationale: דבר can mean 'word,' 'matter,' or 'thing.' Here it refers to the remarkable act/sign about to occur, and 'this great thing' is clear, natural, and broad enough to cover the event without over-specifying it.
- source_word: אֲשֶׁר יְהוָה עֹשֶׂה
  chosen: that the LORD is doing
  alternatives:
  - which the LORD is doing
  - that the LORD will do
  lexicon: HALOT
  rationale: The participle עֹשֶׂה presents the action as imminent/in progress from the speaker's perspective. English present progressive best reflects this vividness. 'Will do' is possible contextually, but 'is doing' better matches the Hebrew form.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: לְעֵינֵיכֶם
  chosen: before your eyes
  alternatives:
  - in your sight
  - before you
  lexicon: HALOT
  rationale: The idiom literally refers to what is visible to them. 'Before your eyes' is vivid, idiomatic English that preserves the public, undeniable nature of the sign.
