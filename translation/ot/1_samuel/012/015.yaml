theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: Required by the project's contested-terms policy for YHWH.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Final phrase וּבַאֲבֹתֵיכֶם
  chosen_reading: and against your fathers
  alternative_readings:
  - and against your king
  rationale: The Masoretic Text reads 'your fathers,' which is translated in the main
    text. However, many interpreters and versions prefer 'your king' in light of the
    immediate context and parallelism with the previous verse. Because the provided
    source text is the WLC/MT, the draft follows it and preserves the contextual alternative
    in a footnote.
