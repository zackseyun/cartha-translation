id: 1SA.12.15
reference: 1 Samuel 12:15
source:
  edition: WLC
  text: וְ/אִם לֹ֤א תִשְׁמְעוּ֙ בְּ/ק֣וֹל יְהוָ֔ה וּ/מְרִיתֶ֖ם אֶת פִּ֣י יְהוָ֑ה וְ/הָיְתָ֧ה
    יַד יְהוָ֛ה בָּ/כֶ֖ם וּ/בַ/אֲבֹתֵי/כֶֽם־־־׃
translation:
  text: But if you do not listen to the voice of the LORD and rebel against the command
    of the LORD, then the hand of the LORD will be against you and against your fathers.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''your fathers.'' Some ancient versions and many interpreters read
      ''your king,'' which fits the immediate context of Samuel''s warning about both
      the people and their king.'
    reason: alternative_reading
lexical_decisions:
- source_word: וְאִם
  chosen: But if
  alternatives:
  - And if
  - If
  lexicon: HALOT
  rationale: Introduces a conditional contrast with the previous verse. 'But if' captures
    both the conjunction and the adversative force in context better than a bare 'if.'
- source_word: לֹא תִשְׁמְעוּ בְּקוֹל יְהוָה
  chosen: you do not listen to the voice of the LORD
  alternatives:
  - you do not obey the LORD
  - you do not hear the voice of the LORD
  lexicon: HALOT
  rationale: שׁמע with בְּקוֹל literally means 'listen to the voice,' often with the
    sense of obedient hearing. Rendering 'listen to the voice of the LORD' preserves
    the Hebrew idiom while remaining clear; 'obey' is interpretive and 'hear' is too
    weak.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving
    reverential convention and consistency with the stated doctrine guidance.
- source_word: וּמְרִיתֶם
  chosen: and rebel
  alternatives:
  - and are rebellious
  - and disobey
  lexicon: HALOT
  rationale: From מרה, denoting rebellion or defiance, not mere failure to comply.
    'Rebel' best conveys the covenantal seriousness.
- source_word: אֶת פִּי יְהוָה
  chosen: against the command of the LORD
  alternatives:
  - against the mouth of the LORD
  - against the word of the LORD
  lexicon: HALOT
  rationale: Literally 'the mouth of the LORD,' an idiom for what the LORD has spoken
    or commanded. 'Command' fits the context of covenant obedience and avoids an overly
    literal but opaque English expression.
- source_word: וְהָיְתָה יַד יְהוָה
  chosen: then the hand of the LORD will be
  alternatives:
  - and the hand of the LORD shall be
  - then the LORD's hand will come
  lexicon: HALOT
  rationale: The idiom 'hand of the LORD' commonly denotes active power in judgment
    or intervention. Retaining 'hand' preserves the biblical metaphor; adding 'then'
    clarifies the apodosis in English.
- source_word: בָּכֶם
  chosen: against you
  alternatives:
  - upon you
  - on you
  lexicon: HALOT
  rationale: With the context of judgment, the preposition is best rendered 'against'
    rather than the more neutral 'upon' or 'on.'
- source_word: וּבַאֲבֹתֵיכֶם
  chosen: and against your fathers
  alternatives:
  - and against your ancestors
  lexicon: HALOT
  rationale: אבות literally means 'fathers.' 'Ancestors' is possible, but 'fathers'
    better preserves the Hebrew wording and the representative, covenantal sense.
    It may refer to forefathers or, text-critically, possibly to 'your king' in some
    traditions, so the alternative is preserved in a footnote.
