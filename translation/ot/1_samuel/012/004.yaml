id: 1SA.12.4
reference: 1 Samuel 12:4
source:
  edition: WLC
  text: וַ/יֹּ֣אמְר֔וּ לֹ֥א עֲשַׁקְתָּ֖/נוּ וְ/לֹ֣א רַצּוֹתָ֑/נוּ וְ/לֹֽא לָקַ֥חְתָּ
    מִ/יַּד אִ֖ישׁ מְאֽוּמָה־־׃
translation:
  text: And they said, “You have not oppressed us, and you have not crushed us, and
    you have not taken anything from any man's hand.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''from any man''s hand.'' The phrase likely refers to taking any
      payment, gift, or bribe from anyone.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמְרוּ
  chosen: And they said
  alternatives:
  - Then they said
  lexicon: HALOT
  rationale: Standard wayyiqtol narrative sequence; 'And they said' preserves the
    Hebrew flow without overinterpreting temporal nuance.
- source_word: עֲשַׁקְתָּנוּ
  chosen: you have not oppressed us
  alternatives:
  - you have not defrauded us
  - you have not exploited us
  lexicon: HALOT
  rationale: עשק commonly denotes oppression, extortion, or defrauding by misuse of
    power. 'Oppressed' is broad enough for the public-justice context and idiomatic
    in English.
- source_word: רַצּוֹתָנוּ
  chosen: you have not crushed us
  alternatives:
  - you have not mistreated us
  - you have not wronged us
  lexicon: HALOT
  rationale: The verb רצץ often carries the sense of crushing or breaking. Here it
    is metaphorical for abusive treatment. 'Crushed' preserves the force of the Hebrew
    better than a flatter term like 'wronged,' while still reading naturally.
- source_word: לָקַחְתָּ מִיַּד אִישׁ מְאוּמָה
  chosen: you have not taken anything from any man's hand
  alternatives:
  - you have not taken anything from anyone
  - you have not accepted anything from the hand of any man
  lexicon: HALOT
  rationale: לקח 'take' with 'from the hand of' is a concrete idiom for receiving
    or taking something from someone, often in contexts of bribery or unjust gain.
    'Taken anything from any man's hand' stays close to the Hebrew while remaining
    understandable.
- source_word: אִישׁ
  chosen: any man's
  alternatives:
  - anyone's
  - any person's
  lexicon: HALOT
  rationale: The Hebrew uses the singular masculine אִישׁ. Per the project's gender-accurate
    policy, 'man's' is retained in the main text as matching the source form and representative
    force.
- source_word: מְאוּמָה
  chosen: anything
  alternatives:
  - a thing
  - the slightest thing
  lexicon: HALOT
  rationale: Indefinite object meaning 'anything' or 'something at all.' 'Anything'
    is the most natural modern English rendering in this negated clause.
