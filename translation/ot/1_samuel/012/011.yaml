  chosen_reading: Retain 'Bedan' in the main text as the MT proper name without harmonizing to another judge.
  alternative_readings:
  - Barak
  - Abdon
  rationale: The Hebrew source text should govern the translation unless there is compelling reason to emend. Because the identity is disputed, the translation preserves the textual form and notes alternatives rather than silently resolving the difficulty.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation tradition; Preserve theological tension rather than resolve it.'
