id: 1SA.12.11
reference: 1 Samuel 12:11
source:
  edition: WLC
  text: וַ/יִּשְׁלַ֤ח יְהוָה֙ אֶת יְרֻבַּ֣עַל וְ/אֶת בְּדָ֔ן וְ/אֶת יִפְתָּ֖ח וְ/אֶת שְׁמוּאֵ֑ל וַ/יַּצֵּ֨ל אֶתְ/כֶ֜ם מִ/יַּ֤ד אֹֽיְבֵי/כֶם֙ מִ/סָּבִ֔יב וַ/תֵּשְׁב֖וּ בֶּֽטַח־־־־׃
translation:
  text: And Yahweh sent Jerubbaal and Bedan and Jephthah and Samuel, and he delivered you from the hand of your enemies all around, and you lived in safety.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Jerubbaal is another name for Gideon (see Judges 6:32; 7:1).
    reason: cross_reference
  - marker: b
    text: Hebrew 'Bedan.' The identity is uncertain; some interpreters understand this as Barak or, less commonly, Abdon.
    reason: alternative_reading
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving the traditional small-caps covenantal substitute in English rather than transliteration.
- source_word: וַיִּשְׁלַח
  chosen: sent
  alternatives:
  - dispatched
  lexicon: HALOT
  rationale: The verb שׁלח in this context straightforwardly means 'sent.' 'Dispatched' is possible but less natural in modern English and adds a nuance not required by the Hebrew.
- source_word: יְרֻבַּעַל
  chosen: Jerubbaal
  alternatives:
  - Gideon
  lexicon: HALOT
  rationale: The Hebrew text names Jerubbaal, the alternate name of Gideon. Because the translation philosophy prefers transliterating personal names and following the source text's wording, 'Jerubbaal' is retained in the main text; the more familiar identification can be preserved in a footnote.
- source_word: בְּדָן
  chosen: Bedan
  alternatives:
  - Barak
  - Abdon
  lexicon: HALOT
  rationale: The consonantal text reads 'Bedan,' so the main text preserves that proper name rather than emending it. Because the identity is debated in interpretation and textual tradition, alternatives are preserved in a footnote rather than resolved in translation.
- source_word: יִפְתָּח
  chosen: Jephthah
  lexicon: HALOT
  rationale: Standard English transliteration of the personal name.
- source_word: שְׁמוּאֵל
  chosen: Samuel
  lexicon: HALOT
  rationale: Standard English transliteration of the personal name.
- source_word: וַיַּצֵּל
  chosen: delivered
  alternatives:
  - rescued
  - saved
  lexicon: HALOT
  rationale: נצל commonly means to snatch away or deliver from danger. 'Delivered' fits the covenant-historical setting and is idiomatic with the following phrase 'from the hand of.'
- source_word: מִיַּד אֹיְבֵיכֶם
  chosen: from the hand of your enemies
  alternatives:
  - from your enemies' power
  - from the grasp of your enemies
  lexicon: HALOT
  rationale: The idiom 'from the hand of' is preserved because it is clear in English and reflects the Hebrew metaphor of power/control.
- source_word: מִסָּבִיב
  chosen: all around
  alternatives:
  - on every side
  - from all around
  lexicon: HALOT
  rationale: This adverbial phrase indicates surrounding enemies. 'All around' is natural modern English and preserves the spatial force.
- source_word: וַתֵּשְׁבוּ
  chosen: you lived
  alternatives:
  - you dwelt
  - you settled
  lexicon: HALOT
  rationale: While ישׁב literally means 'sit/dwell,' in this context it denotes continued settled existence in the land. 'You lived' communicates the result state naturally in English.
- source_word: בֶּטַח
  chosen: in safety
  alternatives:
  - securely
  - in security
  lexicon: HALOT
  rationale: בטח here expresses secure safety from threat. 'In safety' is idiomatic and readable; 'securely' is also possible but slightly less natural after 'lived'.
