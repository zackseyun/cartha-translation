id: 1SA.12.13
reference: 1 Samuel 12:13
source:
  edition: WLC
  text: וְ/עַתָּ֗ה הִנֵּ֥ה הַ/מֶּ֛לֶךְ אֲשֶׁ֥ר בְּחַרְתֶּ֖ם אֲשֶׁ֣ר שְׁאֶלְתֶּ֑ם וְ/הִנֵּ֨ה נָתַ֧ן יְהוָ֛ה עֲלֵי/כֶ֖ם מֶֽלֶךְ׃
translation:
  text: And now, here is the king whom you have chosen, for whom you have asked; and behold, Yahweh has set a king over you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'the LORD has given a king over you.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  chosen: And now
  alternatives:
  - Now
  lexicon: HALOT
  rationale: Temporal-discourse marker introducing Samuel's present conclusion from the preceding argument. 'And now' preserves the connective ו plus the adverb עתה more fully than simply 'Now.'
- source_word: הִנֵּה
  chosen: here is
  alternatives:
  - behold
  - look
  lexicon: HALOT
  rationale: Deictic particle drawing attention to what is present before the audience. 'Here is' is natural modern English for the first occurrence when immediately followed by 'the king.'
- source_word: הַמֶּלֶךְ
  chosen: the king
  lexicon: HALOT
  rationale: Definite noun referring to the specific king the people requested, not kingship in general.
- source_word: אֲשֶׁר בְּחַרְתֶּם
  chosen: whom you have chosen
  alternatives:
  - that you chose
  - whom you selected
  lexicon: HALOT
  rationale: בחר commonly means 'choose/select.' Perfect 2mp refers to the people's completed action. 'Whom' fits the personal referent 'king' in standard English.
- source_word: אֲשֶׁר שְׁאֶלְתֶּם
  chosen: whom you have asked for
  alternatives:
  - whom you requested
  - for whom you asked
  lexicon: HALOT
  rationale: שׁאל here means to ask/request. 'Asked for' captures the idiomatic sense of requesting a king, echoing the narrative emphasis in 1 Samuel 8 and 12.
- source_word: וְהִנֵּה
  chosen: and look
  alternatives:
  - and behold
  - and here
  lexicon: HALOT
  rationale: Second הִנֵּה again marks attention, but varying the English avoids awkward repetition while preserving the discourse force. 'Look' is readable modern English and still signals emphasis.
- source_word: נָתַן יְהוָה
  chosen: the LORD has set
  alternatives:
  - the LORD has given
  - the LORD has appointed
  lexicon: HALOT
  rationale: נתן literally means 'give,' but with עַל plus a person and 'king' it idiomatically means to place/set someone over others. 'Has set' best conveys the installed-over sense in English while remaining close to the Hebrew.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: עֲלֵיכֶם
  chosen: over you
  alternatives:
  - upon you
  lexicon: HALOT
  rationale: With נתן and 'king,' על indicates authority over the people. 'Over you' expresses rulership naturally in English.
- source_word: מֶלֶךְ
  chosen: a king
  alternatives:
  - the king
  lexicon: HALOT
  rationale: 'Anarthrous noun after נתן עַל often functions indefinitely in English: ''set a king over you.'' Although the referent is the same king, English idiom after ''set over'' prefers the indefinite article.'
