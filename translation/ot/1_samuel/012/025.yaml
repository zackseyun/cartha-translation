id: 1SA.12.25
reference: 1 Samuel 12:25
source:
  edition: WLC
  text: וְ/אִם הָרֵ֖עַ תָּרֵ֑עוּ גַּם אַתֶּ֥ם גַּֽם מַלְכְּ/כֶ֖ם תִּסָּפֽוּ־־־׃פ
translation:
  text: But if you persist in doing evil, both you and your king will be swept away.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'if you do evil' or 'if you act wickedly'; the Hebrew intensifies the
      verb with an infinitive absolute.
    reason: lexical_alternative
  - marker: b
    text: Or 'will perish' or 'will be destroyed.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִם
  chosen: But if
  alternatives:
  - and if
  - if
  lexicon: HALOT
  rationale: Introduces a conditional contrast with the preceding promise/blessing
    context; 'but if' best conveys the adversative force in English discourse, though
    the particles are literally 'and if'.
- source_word: הָרֵעַ תָּרֵעוּ
  chosen: you persist in doing evil
  alternatives:
  - you do evil
  - you surely do evil
  - if you act wickedly
  lexicon: HALOT
  rationale: The construction combines the infinitive absolute with a finite verb
    of רעע for emphasis. English 'persist in doing evil' communicates the intensified
    verbal force more naturally than a wooden repetition such as 'do evil indeed'.
- source_word: גַּם אַתֶּם גַּם מַלְכְּכֶם
  chosen: both you and your king
  alternatives:
  - you also, and also your king
  - both you, even your king
  lexicon: HALOT
  rationale: The repeated גַּם marks inclusion of both parties under the warning.
    'Both you and your king' is idiomatic and preserves the distributive emphasis.
- source_word: תִּסָּפוּ
  chosen: will be swept away
  alternatives:
  - will perish
  - will be consumed
  - will be destroyed
  lexicon: HALOT
  rationale: Niphal of ספה can denote being swept away, destroyed, or perishing under
    judgment. 'Swept away' preserves the passive nuance and the sense of being removed
    in judgment, while remaining natural English.
