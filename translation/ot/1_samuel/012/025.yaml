theological_decisions:
- issue: Nature of the announced judgment on the people and king
  chosen_reading: A corporate warning of divine judgment/removal affecting both the
    people and their king
  alternative_readings:
  - military defeat only
  - spiritual ruin only
  rationale: The verse itself gives a broad covenantal warning without specifying
    the exact form of judgment. The translation therefore uses 'will be swept away,'
    which preserves the seriousness and divine-judgment context without narrowing
    it to one mode.
