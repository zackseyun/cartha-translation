theological_decisions:
- issue: Whether Samuel's failure to intercede is framed merely as neglect of duty or explicitly as sin against God
  chosen_reading: Explicitly as sin against the LORD
  alternative_readings:
  - A failure in leadership responsibility without emphasizing offense against God
  rationale: The Hebrew directly states 'sin against the LORD' and should not be softened into mere negligence. This preserves the theological weight of intercessory responsibility before God without importing later doctrinal claims.
  doctrine_reference: Translation philosophy §§1, 3
- issue: How to render the covenant name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
