id: 1SA.12.20
reference: 1 Samuel 12:20
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר שְׁמוּאֵ֤ל אֶל הָ/עָם֙ אַל תִּירָ֔אוּ אַתֶּ֣ם עֲשִׂיתֶ֔ם אֵ֥ת כָּל הָ/רָעָ֖ה הַ/זֹּ֑את אַ֗ךְ אַל תָּס֨וּרוּ֙ מֵ/אַחֲרֵ֣י יְהוָ֔ה וַ/עֲבַדְתֶּ֥ם אֶת יְהוָ֖ה בְּ/כָל לְבַבְ/כֶֽם־־־־־־׃
translation:
  text: And Samuel said to the people, “Do not be afraid. You have done all this evil. Yet do not turn aside from following Yahweh, but serve Yahweh with all your heart.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Do not fear.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'do not turn aside from after the LORD,' an idiom meaning to stop following him.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: And ... said
  alternatives:
  - Then ... said
  - So ... said
  lexicon: HALOT
  rationale: Standard narrative wayyiqtol introducing Samuel's speech; 'And' preserves Hebrew narrative flow without overinterpreting sequence.
- source_word: הָעָם
  chosen: the people
  alternatives:
  - the nation
  lexicon: HALOT
  rationale: עם here refers to the gathered Israelites addressed by Samuel; 'the people' is the natural and contextually precise English rendering.
- source_word: אַל תִּירָאוּ
  chosen: Do not be afraid
  alternatives:
  - Do not fear
  lexicon: HALOT
  rationale: Imperative prohibition from ירא. 'Do not be afraid' is idiomatic modern English while preserving the force of the command.
- source_word: אַתֶּם עֲשִׂיתֶם
  chosen: You have done
  alternatives:
  - You did
  lexicon: HALOT
  rationale: The independent pronoun adds emphasis; English can preserve this sufficiently with explicit 'You.' Present perfect fits the present relevance of their completed action.
- source_word: כָּל הָרָעָה הַזֹּאת
  chosen: all this evil
  alternatives:
  - all this wickedness
  - all this wrong
  lexicon: HALOT
  rationale: רָעָה here denotes moral evil/wickedness in requesting a king sinfully. 'All this evil' is direct and weighty without paraphrase.
- source_word: אַךְ
  chosen: Yet
  alternatives:
  - Only
  - Nevertheless
  - But
  lexicon: HALOT
  rationale: אַךְ marks a strong qualification after acknowledging their sin. 'Yet' best captures the adversative-concessive sense in smooth English.
- source_word: אַל תָּסוּרוּ מֵאַחֲרֵי יְהוָה
  chosen: do not turn aside from following the LORD
  alternatives:
  - do not turn aside from the LORD
  - do not depart from following the LORD
  lexicon: HALOT
  rationale: סור plus מֵאַחֲרֵי literally conveys turning aside from behind/following YHWH. Including 'from following' preserves the relational-discipleship imagery present in the Hebrew.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וַעֲבַדְתֶּם אֶת יְהוָה
  chosen: but serve the LORD
  alternatives:
  - and serve the LORD
  - and you shall serve the LORD
  - worship the LORD
  lexicon: HALOT
  rationale: עבד in covenantal context commonly means serve. After the negative prohibition, English 'but serve' clearly expresses the positive contrast, though Hebrew waw could be rendered more formally as 'and.' 'Serve' is broader and more accurate than 'worship' alone.
- source_word: בְּכָל לְבַבְכֶם
  chosen: with all your heart
  alternatives:
  - with your whole heart
  lexicon: HALOT
  rationale: Standard Hebrew idiom for total inner devotion and allegiance. Singular 'heart' is idiomatic in English and preserves the covenantal sense.
