id: 1SA.12.5
reference: 1 Samuel 12:5
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר אֲלֵי/הֶ֜ם עֵ֧ד יְהוָ֣ה בָּ/כֶ֗ם וְ/עֵ֤ד מְשִׁיח/וֹ֙ הַ/יּ֣וֹם
    הַ/זֶּ֔ה כִּ֣י לֹ֧א מְצָאתֶ֛ם בְּ/יָדִ֖/י מְא֑וּמָה וַ/יֹּ֖אמֶר עֵֽד׃פ
translation:
  text: And he said to them, “The LORD is witness against you, and his anointed is
    witness this day, that you have found nothing in my hand.” And they said, “He
    is witness.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or, more literally, “The LORD is witness among/with you.” The sense in
      context is forensic: the LORD stands as witness in the case concerning them.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew “his anointed,” referring here to the king (Saul), not directly to
      the later messianic title.
    reason: cultural_note
  - marker: c
    text: The final Hebrew verb is singular (“and he said”), but in context it functions
      as a collective response, hence “they said.”
    reason: textual_variant
lexical_decisions:
- source_word: עֵד
  chosen: witness
  alternatives:
  - testimony
  - witnessing one
  lexicon: HALOT
  rationale: The noun denotes a witness in a legal or covenantal sense. 'Witness'
    fits the judicial setting of Samuel's public self-vindication better than the
    more abstract 'testimony'.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the divine name is rendered 'the LORD' rather
    than transliterated.
- source_word: בָּכֶם
  chosen: against you
  alternatives:
  - among you
  - with you
  lexicon: HALOT
  rationale: With עֵד in a forensic context, the preposition is best rendered idiomatically
    as 'against you,' i.e., as witness in the matter concerning them. 'Among you'
    is possible more literally, but weaker in the legal setting.
- source_word: מְשִׁיחוֹ
  chosen: his anointed
  alternatives:
  - his Messiah
  - his king
  lexicon: HALOT
  rationale: Here the referent is the king just installed (Saul), not an eschatological
    title. Rendering as 'his anointed' preserves the Hebrew term's meaning without
    importing later christological associations into the main text.
- source_word: הַיּוֹם הַזֶּה
  chosen: this day
  alternatives:
  - today
  lexicon: HALOT
  rationale: '''This day'' preserves the formal public-declarative tone of the Hebrew
    while remaining natural English.'
- source_word: מְצָאתֶם
  chosen: have found
  alternatives:
  - found
  - discovered
  lexicon: HALOT
  rationale: The perfect is naturally rendered in English as 'have found' in this
    testimonial setting, reflecting completed examination up to the present declaration.
- source_word: בְּיָדִי
  chosen: in my hand
  alternatives:
  - in my possession
  - from me
  lexicon: HALOT
  rationale: The idiom literally means 'in my hand' and refers to what is in one's
    possession or under one's control. Keeping the idiom is understandable in English
    and preserves the legal flavor.
- source_word: מְאוּמָה
  chosen: nothing
  alternatives:
  - anything
  - the slightest thing
  lexicon: HALOT
  rationale: In combination with negation, the word means 'anything at all'; idiomatic
    English expresses this as 'nothing.'
- source_word: וַיֹּאמֶר ... וַיֹּאמֶר
  chosen: he said ... they said
  alternatives:
  - he said ... he said
  lexicon: HALOT
  rationale: The first verb is singular and clearly refers to Samuel. The final singular
    form is textually singular in MT, but the context strongly indicates a collective
    response from the people/assembly, commonly represented in English as 'they said.'
    This is a contextual smoothing of a collective singular rather than a change in
    meaning.
