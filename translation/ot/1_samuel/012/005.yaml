theological_decisions:
- issue: Rendering מְשִׁיחוֹ in a non-messianic royal context
  chosen_reading: his anointed
  alternative_readings:
  - his Messiah
  rationale: Although the Hebrew term is the same root later associated with 'Messiah,'
    in this immediate context it refers to the present king as the LORD's anointed.
    Translating it as 'his anointed' preserves the lexical sense and avoids importing
    a christological reading not warranted by the context.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; preserve
    source-text sense over tradition'
