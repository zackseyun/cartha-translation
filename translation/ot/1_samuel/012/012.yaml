id: 1SA.12.12
reference: 1 Samuel 12:12
source:
  edition: WLC
  text: וַ/תִּרְא֗וּ כִּֽי נָחָ֞שׁ מֶ֣לֶךְ בְּנֵֽי עַמּוֹן֮ בָּ֣א עֲלֵי/כֶם֒ וַ/תֹּ֣אמְרוּ
    לִ֔/י לֹ֕א כִּי מֶ֖לֶךְ יִמְלֹ֣ךְ עָלֵ֑י/נוּ וַ/יהוָ֥ה אֱלֹהֵי/כֶ֖ם מַלְכְּ/כֶֽם־־־׃
translation:
  text: When you saw that Nahash king of the Ammonites was coming against you, you
    said to me, ‘No, but a king shall reign over us’—even though the LORD your God
    was your king.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “the LORD your God is your king.” The Hebrew clause has no explicit
      verb, so either past or present may be supplied from context.
    reason: alternative_reading
lexical_decisions:
- source_word: וַתִּרְאוּ
  chosen: When you saw
  alternatives:
  - And you saw
  lexicon: HALOT
  rationale: The waw-consecutive with ראה introduces the circumstance prompting Israel's
    response. 'When you saw' captures the temporal force naturally in English while
    preserving the direct perception sense.
- source_word: כִּי
  chosen: that
  alternatives:
  - for
  - because
  lexicon: HALOT
  rationale: 'Here כִּי introduces the content of what they saw: that Nahash was coming
    against them.'
- source_word: נָחָשׁ
  chosen: Nahash
  rationale: Personal names are transliterated by standard convention per translation
    philosophy.
- source_word: מֶלֶךְ בְּנֵי עַמּוֹן
  chosen: king of the Ammonites
  alternatives:
  - king of the sons of Ammon
  - king of the people of Ammon
  lexicon: HALOT
  rationale: Idiomatic rendering of the construct chain. 'Ammonites' is standard English
    for בְּנֵי עַמּוֹן in this ethnic-national sense.
- source_word: בָּא עֲלֵיכֶם
  chosen: was coming against you
  alternatives:
  - came against you
  - was coming upon you
  lexicon: HALOT
  rationale: בוא + עַל in military context means to come against/attack. The participle-like
    English progressive reflects the imminent hostile advance that triggered their
    demand.
- source_word: וַתֹּאמְרוּ לִי
  chosen: you said to me
  alternatives:
  - you told me
  lexicon: HALOT
  rationale: Direct speech to Samuel is straightforwardly represented.
- source_word: לֹא כִּי
  chosen: No, but
  alternatives:
  - No; rather
  - No, for
  lexicon: HALOT
  rationale: This idiom rejects a prior implication and substitutes another demand.
    'No, but' preserves the emphatic correction in natural English.
- source_word: מֶלֶךְ יִמְלֹךְ עָלֵינוּ
  chosen: a king shall reign over us
  alternatives:
  - a king will reign over us
  - let a king reign over us
  lexicon: HALOT
  rationale: The construction expresses the people's insistence on monarchy. 'Shall
    reign' preserves the forceful demand without becoming archaic in this context.
- source_word: וַיהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of YHWH is 'the LORD,' following
    Jewish reverence tradition and common English Bible convention.
- source_word: אֱלֹהֵיכֶם
  chosen: your God
  lexicon: HALOT
  rationale: Standard covenantal designation; no expansion beyond the Hebrew.
- source_word: מַלְכְּכֶם
  chosen: was your king
  alternatives:
  - is your king
  lexicon: HALOT
  rationale: Although the clause is verbless in Hebrew, English requires a copula.
    'Was' fits the past narrative frame and Samuel's rebuke about their prior condition;
    'is' is possible as a timeless theological assertion, so it is preserved in a
    footnote.
