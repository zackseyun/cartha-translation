theological_decisions:
- issue: Implicit copula in וַיהוָה אֱלֹהֵיכֶם מַלְכְּכֶם
  chosen_reading: was your king
  alternative_readings:
  - is your king
  rationale: The Hebrew nominal clause lacks an explicit tense. In context Samuel
    recounts what was true when they demanded a human king, so past tense best fits
    the narrative rebuke. However, theologically the statement can also be read as
    a continuing reality; this is preserved in a footnote rather than resolved dogmatically.
  doctrine_reference: Preserve theological tension rather than resolve it.
