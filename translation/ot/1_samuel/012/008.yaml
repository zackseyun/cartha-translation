id: 1SA.12.8
reference: 1 Samuel 12:8
source:
  edition: WLC
  text: כַּֽ/אֲשֶׁר בָּ֥א יַעֲקֹ֖ב מִצְרָ֑יִם וַ/יִּזְעֲק֤וּ אֲבֽוֹתֵי/כֶם֙ אֶל יְהוָ֔ה וַ/יִּשְׁלַ֨ח יְהוָ֜ה אֶת מֹשֶׁ֣ה וְ/אֶֽת אַהֲרֹ֗ן וַ/יּוֹצִ֤יאוּ אֶת אֲבֹֽתֵי/כֶם֙ מִ/מִּצְרַ֔יִם וַ/יֹּשִׁב֖וּ/ם בַּ/מָּק֥וֹם הַ/זֶּֽה־־־־־׃
translation:
  text: When Jacob came into Egypt, your fathers cried out to Yahweh, and Yahweh sent Moses and Aaron, and they brought your fathers out of Egypt and settled them in this place.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''your fathers''; alternatively, ''your ancestors.'''
    reason: lexical_alternative
  - marker: b
    text: Or 'settled them here' or 'caused them to dwell in this place.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כַּאֲשֶׁר
  chosen: When
  alternatives:
  - As
  - After
  lexicon: HALOT
  rationale: Introduces a temporal clause here. 'When' is the most natural English rendering in context, marking the historical circumstance Samuel is recounting.
- source_word: בָּא
  chosen: came into
  alternatives:
  - came
  - entered
  lexicon: HALOT
  rationale: The verb means 'came/entered.' 'Came into Egypt' is idiomatic English and preserves the directional sense toward Egypt.
- source_word: יַעֲקֹב
  chosen: Jacob
  rationale: Standard transliteration of the personal name.
- source_word: מִצְרַיִם
  chosen: Egypt
  rationale: Standard English place-name for the proper noun.
- source_word: וַיִּזְעֲקוּ
  chosen: cried out
  alternatives:
  - called out
  - cried
  lexicon: HALOT
  rationale: זעק commonly conveys an urgent cry for help. 'Cried out' preserves the distress and petitionary force better than the flatter 'called out.'
- source_word: אֲבוֹתֵיכֶם
  chosen: your fathers
  alternatives:
  - your ancestors
  lexicon: HALOT
  rationale: The Hebrew is literally 'your fathers.' Per translation philosophy, gender-accurate rendering is preferred where it matches the source. 'Ancestors' is possible dynamically, but 'your fathers' better preserves the wording and covenantal-historical rhetoric.
- source_word: אֶל יְהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: The preposition marks direction toward YHWH in prayer. Per doctrine guidelines, יְהוָה is rendered 'the LORD' rather than 'Yahweh' in the main text.
- source_word: וַיִּשְׁלַח יְהוָה
  chosen: and the LORD sent
  alternatives:
  - and the LORD dispatched
  lexicon: HALOT
  rationale: שׁלח here is the ordinary verb 'send.' 'Sent' is clear, natural, and preserves the divine commissioning of Moses and Aaron.
- source_word: אֶת מֹשֶׁה וְאֶת אַהֲרֹן
  chosen: Moses and Aaron
  rationale: Direct objects of 'sent'; standard transliterations of the names.
- source_word: וַיּוֹצִיאוּ
  chosen: they brought ... out
  alternatives:
  - they led ... out
  - they brought forth
  lexicon: HALOT
  rationale: The plural verb naturally refers to Moses and Aaron as the agents through whom the LORD delivered Israel. 'Brought out' is the standard and contextually apt rendering of יצא in the causative sense.
- source_word: מִמִּצְרַיִם
  chosen: from Egypt
  alternatives:
  - out of Egypt
  lexicon: HALOT
  rationale: Either is possible; 'from Egypt' reads smoothly after 'brought ... out' without redundancy, while preserving the source sense.
- source_word: וַיֹּשִׁבוּם
  chosen: settled them
  alternatives:
  - caused them to dwell
  - made them live
  lexicon: HALOT
  rationale: The causative of ישׁב means to cause to dwell or settle. 'Settled them' is natural modern English and accurately conveys establishment in the land.
- source_word: בַּמָּקוֹם הַזֶּה
  chosen: in this place
  alternatives:
  - in this land
  - here
  lexicon: HALOT
  rationale: Literally 'in this place.' While the referent is the land where Israel now lives, 'in this place' preserves the demonstrative force of Samuel's speech and the Hebrew wording more closely.
