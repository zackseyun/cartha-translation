id: 1SA.12.3
reference: 1 Samuel 12:3
source:
  edition: WLC
  text: הִנְ/נִ֣י עֲנ֣וּ בִ/י֩ נֶ֨גֶד יְהוָ֜ה וְ/נֶ֣גֶד מְשִׁיח֗/וֹ אֶת שׁוֹר֩ מִ֨י לָקַ֜חְתִּי וַ/חֲמ֧וֹר מִ֣י לָקַ֗חְתִּי וְ/אֶת מִ֤י עָשַׁ֨קְתִּי֙ אֶת מִ֣י רַצּ֔וֹתִי וּ/מִ/יַּד מִי֙ לָקַ֣חְתִּי כֹ֔פֶר וְ/אַעְלִ֥ים עֵינַ֖/י בּ֑/וֹ וְ/אָשִׁ֖יב לָ/כֶֽם־׀־־־׃
translation:
  text: 'Here I am; testify against me before Yahweh and before his anointed: whose ox have I taken, or whose donkey have I taken? Whom have I oppressed? Whom have I mistreated? From whose hand have I taken a bribe, that I should hide my eyes with it? I will restore it to you.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Whom have I wronged?' The Hebrew verb rendered 'have I crushed' is difficult and may broadly denote mistreating or abusing someone.
    reason: lexical_alternative
  - marker: b
    text: '''Bribe'' could also be rendered ''ransom'' or ''payment,'' but the context of ''hiding my eyes'' favors a corrupt payment that perverts justice.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנְנִי
  chosen: Here I am
  alternatives:
  - Behold, I am here
  - Here am I
  lexicon: HALOT
  rationale: Idiomatic self-presentation in direct speech; 'Here I am' is natural modern English while preserving the force of readiness and public availability.
- source_word: עֲנוּ בִי
  chosen: testify against me
  alternatives:
  - answer me
  - bear witness against me
  lexicon: HALOT
  rationale: In this legal-public setting with 'before the LORD and before his anointed,' the verb carries the sense of giving testimony or answering as witnesses. 'Testify against me' best captures the forensic force.
- source_word: נֶגֶד
  chosen: before
  alternatives:
  - in the presence of
  - in front of
  lexicon: HALOT
  rationale: The preposition marks public accountability in the presence of the LORD and the king; 'before' is concise and idiomatic.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name per DOCTRINE.md contested terms table.
- source_word: מְשִׁיחוֹ
  chosen: his anointed
  alternatives:
  - his Messiah
  - his consecrated one
  lexicon: HALOT
  rationale: In this historical context the referent is the king anointed by the LORD, not a direct messianic title. 'His anointed' preserves the lexical link without importing later christological specificity.
- source_word: שׁוֹר
  chosen: ox
  alternatives:
  - bull
  - cattle
  lexicon: HALOT
  rationale: Traditional and precise for the singular animal named in a property-rights context.
- source_word: חֲמוֹר
  chosen: donkey
  alternatives:
  - ass
  lexicon: HALOT
  rationale: '''Donkey'' is the clear modern English equivalent; ''ass'' is archaic/ambiguous in contemporary usage.'
- source_word: לָקַחְתִּי
  chosen: have I taken
  alternatives:
  - did I take
  - have I seized
  lexicon: HALOT
  rationale: Repeated verb in Samuel's rhetorical questions; 'have I taken' preserves the repeated accusation formula and works naturally in English.
- source_word: עָשַׁקְתִּי
  chosen: have I oppressed
  alternatives:
  - have I defrauded
  - have I extorted
  lexicon: HALOT
  rationale: The verb commonly denotes oppression or exploitation, often economic/social. 'Oppressed' is broad enough to retain the moral-legal force.
- source_word: רַצּוֹתִי
  chosen: have I crushed
  alternatives:
  - have I mistreated
  - have I wronged
  - have I defrauded
  lexicon: HALOT
  rationale: This difficult verb likely conveys harsh treatment or crushing. 'Crushed' preserves the concrete force and distinguishes it from the previous verb rather than flattening both into the same English gloss.
- source_word: כֹּפֶר
  chosen: a bribe
  alternatives:
  - ransom
  - compensation payment
  lexicon: HALOT
  rationale: Although כפר can denote ransom, in this judicial context—taking payment and then 'hiding my eyes'—it refers to a corrupt payment that blinds justice. 'Bribe' best fits the context.
- source_word: אַעְלִים עֵינַי בּוֹ
  chosen: so that I should hide my eyes because of it
  alternatives:
  - and shut my eyes to it
  - and overlook the matter because of it
  lexicon: HALOT
  rationale: The idiom means to ignore wrongdoing or refuse to see because of a payment received. The chosen rendering keeps the eye-language while making the causal relation explicit.
- source_word: וְאָשִׁיב לָכֶם
  chosen: I will restore it to you
  alternatives:
  - I will return it to you
  - I will make restitution to you
  lexicon: HALOT
  rationale: Samuel offers restitution if any charge is proven. 'Restore it to you' is clear and fits the singular implied object from the preceding accusations.
