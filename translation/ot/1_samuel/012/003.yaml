theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Rendering מְשִׁיחוֹ in a royal-historical context
  chosen_reading: his anointed
  alternative_readings:
  - his Messiah
  rationale: Although lexically related to 'Messiah,' the immediate referent is the reigning king as the LORD's anointed. Translating 'his anointed' preserves the Hebrew sense without suggesting that Samuel is directly invoking the later messianic title here.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §2: Translate titles; transliterate names'
