id: 1SA.12.14
reference: 1 Samuel 12:14
source:
  edition: WLC
  text: אִם תִּֽירְא֣וּ אֶת יְהוָ֗ה וַ/עֲבַדְתֶּ֤ם אֹת/וֹ֙ וּ/שְׁמַעְתֶּ֣ם בְּ/קֹל֔/וֹ
    וְ/לֹ֥א תַמְר֖וּ אֶת פִּ֣י יְהוָ֑ה וִ/הְיִתֶ֣ם גַּם אַתֶּ֗ם וְ/גַם הַ/מֶּ֨לֶךְ֙
    אֲשֶׁ֣ר מָלַ֣ךְ עֲלֵי/כֶ֔ם אַחַ֖ר יְהוָ֥ה אֱלֹהֵי/כֶֽם־־־־־׃
translation:
  text: If you fear the LORD and serve him and listen to his voice and do not rebel
    against the command of the LORD, then both you and the king who reigns over you
    will follow the LORD your God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'and you will be, both you and the king ... after the
      LORD your God.' The sense is that both the people and their king will continue
      in allegiance to, or follow, the LORD.
    reason: alternative_reading
  - marker: b
    text: '''Listen to his voice'' can also be understood as ''obey his voice,'' since
      the Hebrew expression often includes the idea of obedient hearing.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  chosen: If
  alternatives:
  - When
  lexicon: HALOT
  rationale: Introduces a conditional protasis. 'If' best preserves the straightforward
    conditional force in this covenantal warning/promise context.
- source_word: תִּירְאוּ
  chosen: you fear
  alternatives:
  - you revere
  lexicon: HALOT
  rationale: From ירא, denoting fear/reverence toward God. 'Fear' preserves the covenantal
    and theological weight better than the softer 'revere,' while remaining idiomatic
    in English.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine table, the default rendering of the divine name is 'the
    LORD.'
- source_word: וַעֲבַדְתֶּם אֹתוֹ
  chosen: and serve him
  alternatives:
  - and worship him
  lexicon: HALOT
  rationale: עבד in relation to God can include worshipful service, but 'serve him'
    is broader and more formally aligned with the Hebrew while still natural English.
- source_word: וּשְׁמַעְתֶּם בְּקֹלוֹ
  chosen: and listen to his voice
  alternatives:
  - and obey his voice
  - and heed his voice
  lexicon: HALOT
  rationale: שׁמע בְּקוֹל often carries the sense of obedient listening. 'Listen to
    his voice' preserves the Hebrew imagery; the obedience nuance is reinforced by
    the surrounding clauses.
- source_word: וְלֹא תַמְרוּ
  chosen: and do not rebel
  alternatives:
  - and do not be rebellious
  - and do not disobey
  lexicon: HALOT
  rationale: מרה denotes rebellion rather than mere noncompliance. 'Do not rebel'
    best captures the covenantal defiance implied.
- source_word: אֶת־פִּי יְהוָה
  chosen: against the command of the LORD
  alternatives:
  - against the mouth of the LORD
  - against the word of the LORD
  lexicon: HALOT
  rationale: Literally 'the mouth of the LORD,' an idiom for what he says/commands.
    'Command' fits the context of covenant obedience and rebellion better than the
    more wooden 'mouth' or broader 'word.'
- source_word: וִהְיִתֶם
  chosen: then ... will
  alternatives:
  - and you shall be
  lexicon: HALOT
  rationale: The clause is difficult if rendered woodenly ('and you will be'). In
    context it introduces the apodosis of the condition. Rendering with 'then ...
    will' produces clear English while preserving the sense of resultant state.
- source_word: גַּם אַתֶּם וְגַם הַמֶּלֶךְ
  chosen: both you and the king
  alternatives:
  - you as well as the king
  lexicon: HALOT
  rationale: The paired גַּם ... וְגַם construction is naturally rendered 'both ...
    and ...' in English.
- source_word: אֲשֶׁר מָלַךְ עֲלֵיכֶם
  chosen: who reigns over you
  alternatives:
  - who has reigned over you
  - who is king over you
  lexicon: HALOT
  rationale: Though morphologically perfect, the clause identifies the present king
    in office. 'Who reigns over you' communicates the ongoing role idiomatically in
    English.
- source_word: אַחַר יְהוָה אֱלֹהֵיכֶם
  chosen: will follow the LORD your God
  alternatives:
  - will be after the LORD your God
  lexicon: HALOT
  rationale: אַחַר after a person commonly expresses following allegiance. 'Will follow
    the LORD your God' is the clearest idiomatic rendering. This avoids the awkward
    literal 'be after' while preserving the covenantal idea of walking after the LORD.
