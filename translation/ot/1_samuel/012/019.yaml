theological_decisions:
- issue: Relational force of 'the LORD your God' in the people's plea to Samuel
  chosen_reading: Retain the second-person expression 'the LORD your God' without softening it to 'our God' or expanding it interpretively.
  alternative_readings:
  - the LORD our God
  - the LORD your God, whom you serve
  rationale: The wording reflects the people's appeal to Samuel as an intercessor after their sin is exposed. Preserving 'your God' maintains the text's rhetorical and spiritual tension without implying that the LORD is not truly Israel's God in covenant terms.
  doctrine_reference: Preserve theological tension rather than resolve it.
