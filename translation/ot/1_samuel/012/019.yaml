id: 1SA.12.19
reference: 1 Samuel 12:19
source:
  edition: WLC
  text: וַ/יֹּאמְר֨וּ כָל הָ/עָ֜ם אֶל שְׁמוּאֵ֗ל הִתְפַּלֵּ֧ל בְּעַד עֲבָדֶ֛י/ךָ אֶל יְהוָ֥ה אֱלֹהֶ֖י/ךָ וְ/אַל נָמ֑וּת כִּֽי יָסַ֤פְנוּ עַל כָּל חַטֹּאתֵ֨י/נוּ֙ רָעָ֔ה לִ/שְׁאֹ֥ל לָ֖/נוּ מֶֽלֶךְ־־־־־־־־׃ס
translation:
  text: 'Then all the people said to Samuel, “Pray to Yahweh your God for your servants, and do not let us die, for we have added to all our sins this evil: to ask for a king for ourselves.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'intercede ... on behalf of your servants.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הִתְפַּלֵּל
  chosen: Pray
  alternatives:
  - Intercede
  - Pray earnestly
  lexicon: HALOT
  rationale: Imperative of התפלל addressed to Samuel. 'Pray' is the most natural modern English rendering; 'intercede' is possible but slightly more interpretive. The following prepositional phrase בְּעַד makes the intercessory sense clear.
- source_word: בְּעַד עֲבָדֶיךָ
  chosen: for your servants
  alternatives:
  - on behalf of your servants
  lexicon: HALOT
  rationale: בְּעַד commonly means 'for, on behalf of.' עֲבָדֶיךָ is literally 'your servants.' Here the people speak deferentially to Samuel; 'servants' preserves the social posture without overparaphrase.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives: []
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֱלֹהֶיךָ
  chosen: your God
  lexicon: HALOT
  rationale: Straightforward construct with 2ms suffix. Retained as 'your God,' which reflects the people's appeal to Samuel as mediator without importing more than the text states.
- source_word: וְאַל נָמוּת
  chosen: so that we may not die
  alternatives:
  - and do not let us die
  - that we not die
  lexicon: HALOT
  rationale: אַל with the cohortative/imperfect here expresses the desired negative outcome. In English, after 'Pray ... for your servants,' 'so that we may not die' best captures the sense idiomatically.
- source_word: יָסַפְנוּ
  chosen: we have added
  alternatives:
  - we have increased
  - we have added further
  lexicon: HALOT
  rationale: The verb יסף with עַל conveys adding something on top of what already exists. 'We have added' preserves the cumulative force of their confession.
- source_word: עַל כָּל חַטֹּאתֵינוּ
  chosen: to all our sins
  alternatives:
  - to all our offenses
  - upon all our sins
  lexicon: HALOT
  rationale: With יסף, עַל marks addition to an existing total. 'To all our sins' is idiomatic and preserves the sense that this evil is in addition to prior sins.
- source_word: רָעָה
  chosen: this evil
  alternatives:
  - this wrong
  - this wickedness
  lexicon: HALOT
  rationale: רָעָה here denotes moral evil/wrongdoing. 'This evil' is concise and preserves the gravity of the confession; 'this wrong' is possible but weaker.
- source_word: לִשְׁאֹל לָנוּ מֶלֶךְ
  chosen: to ask for a king for ourselves
  alternatives:
  - to request a king for ourselves
  - to ask a king for ourselves
  lexicon: HALOT
  rationale: The infinitive construct with ל expresses the content of the evil they added. The indirect object לָנוּ is best brought out as 'for ourselves.' 'Ask for a king' correctly reflects the idiom.
- source_word: כָל הָעָם
  chosen: all the people
  alternatives:
  - the whole people
  lexicon: HALOT
  rationale: Standard collective expression. 'All the people' is the most natural English rendering.
- source_word: וַיֹּאמְרוּ
  chosen: Then ... said
  alternatives:
  - And ... said
  lexicon: HALOT
  rationale: Narrative waw-consecutive advances the story. 'Then' gives natural English narrative flow while preserving sequence.
