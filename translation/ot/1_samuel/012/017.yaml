id: 1SA.12.17
reference: 1 Samuel 12:17
source:
  edition: WLC
  text: הֲ/ל֤וֹא קְצִיר חִטִּים֙ הַ/יּ֔וֹם אֶקְרָא֙ אֶל יְהוָ֔ה וְ/יִתֵּ֥ן קֹל֖וֹת וּ/מָטָ֑ר וּ/דְע֣וּ וּ/רְא֗וּ כִּֽי רָעַתְ/כֶ֤ם רַבָּה֙ אֲשֶׁ֤ר עֲשִׂיתֶם֙ בְּ/עֵינֵ֣י יְהוָ֔ה לִ/שְׁא֥וֹל לָ/כֶ֖ם מֶֽלֶךְ־־־׃ס
translation:
  text: Is it not wheat harvest today? I will call to Yahweh, and he will send thunder and rain, so that you may know and see that your wickedness is great, which you have done in the sight of Yahweh by asking for yourselves a king.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'he will give thunder and rain.' The Hebrew verb is literally 'give,' but in English 'send' is the more natural rendering for weather.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'voices and rain'; in this context 'voices' refers to thunder.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲלֹא
  chosen: Is it not
  alternatives:
  - Is it not true that
  - Surely
  lexicon: HALOT
  rationale: Introduces a rhetorical question expecting agreement. 'Is it not' preserves the interrogative force more transparently than a flattened affirmative.
- source_word: קְצִיר חִטִּים
  chosen: wheat harvest
  alternatives:
  - the harvest of wheat
  lexicon: HALOT
  rationale: A natural English construct rendering of the noun chain, preserving the agricultural setting and seasonal marker.
- source_word: הַיּוֹם
  chosen: today
  alternatives:
  - this day
  lexicon: HALOT
  rationale: Modern, readable English that retains the temporal immediacy.
- source_word: אֶקְרָא אֶל יְהוָה
  chosen: I will call to the LORD
  alternatives:
  - I will cry out to the LORD
  - I will call on the LORD
  lexicon: HALOT
  rationale: קרא אל commonly means to call out/to appeal to. 'Call to' keeps the directional preposition visible while remaining idiomatic. YHWH is rendered 'the LORD' per doctrine.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Required by the doctrine's contested-terms table for the divine name.
- source_word: וְיִתֵּן
  chosen: he will send
  alternatives:
  - he will give
  lexicon: HALOT
  rationale: Although נתן is literally 'give,' with weather phenomena in English 'send' is the more natural equivalent and accurately conveys divine causation.
- source_word: קֹלוֹת
  chosen: thunder
  alternatives:
  - voices
  - thunderclaps
  lexicon: HALOT
  rationale: In weather contexts קֹלוֹת refers to thunder. 'Voices' would be overly literal and misleading here.
- source_word: וּמָטָר
  chosen: rain
  lexicon: HALOT
  rationale: Direct lexical equivalent.
- source_word: וּדְעוּ וּרְאוּ
  chosen: so that you may know and see
  alternatives:
  - and know and see
  - then know and see
  lexicon: HALOT
  rationale: The sequence expresses intended result from the sign Samuel announces. 'So that you may' makes the purpose/result relation clear in English without overparaphrase.
- source_word: רָעַתְכֶם רַבָּה
  chosen: your wickedness is great
  alternatives:
  - your evil is great
  - your wrongdoing is great
  lexicon: HALOT
  rationale: רעה here denotes moral evil/wickedness, not merely misfortune. 'Wickedness' best conveys the ethical charge; רַבָּה intensifies it as 'great.'
- source_word: אֲשֶׁר עֲשִׂיתֶם
  chosen: which you have done
  alternatives:
  - that you did
  - which you committed
  lexicon: HALOT
  rationale: Retains the relative clause structure and links their action directly to the stated wickedness.
- source_word: בְּעֵינֵי יְהוָה
  chosen: in the sight of the LORD
  alternatives:
  - in the eyes of the LORD
  - before the LORD
  lexicon: HALOT
  rationale: A standard idiomatic rendering preserving the evaluative sense of divine judgment.
- source_word: לִשְׁאֹל לָכֶם מֶלֶךְ
  chosen: by asking for yourselves a king
  alternatives:
  - in asking for yourselves a king
  - to ask for yourselves a king
  lexicon: HALOT
  rationale: The infinitive construct with ל expresses the content/occasion of their evil action. 'By asking for yourselves a king' clearly conveys the act that constituted their wrongdoing.
