id: 1SA.12.21
reference: 1 Samuel 12:21
source:
  edition: WLC
  text: וְ/לֹ֖א תָּס֑וּרוּ כִּ֣י אַחֲרֵ֣י הַ/תֹּ֗הוּ אֲשֶׁ֧ר לֹֽא יוֹעִ֛ילוּ וְ/לֹ֥א
    יַצִּ֖ילוּ כִּי תֹ֥הוּ הֵֽמָּה׀־־׃
translation:
  text: And do not turn aside after worthless things that cannot profit or deliver,
    for they are worthless.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'empty things,' 'vain things,' or 'idols.' Hebrew tohu denotes what is
      empty, futile, or insubstantial.
    reason: lexical_alternative
  - marker: b
    text: Or 'save' or 'rescue.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תָּסוּרוּ
  chosen: turn aside
  alternatives:
  - turn away
  - deviate
  lexicon: HALOT
  rationale: The verb סור commonly means to turn aside or depart. 'Turn aside' fits
    the covenantal exhortation context and preserves the metaphor of deviating from
    proper allegiance.
- source_word: אַחֲרֵי
  chosen: after
  alternatives:
  - to follow
  - behind
  lexicon: HALOT
  rationale: Literally 'after/behind.' In English, 'turn aside after' naturally conveys
    pursuing or following something while staying close to the Hebrew construction.
- source_word: הַתֹּהוּ / תֹהוּ
  chosen: worthless things / worthless
  alternatives:
  - emptiness
  - vanity
  - nothingness
  - chaos
  lexicon: HALOT
  rationale: תֹהוּ denotes emptiness, futility, or what is insubstantial. In this
    context of idols or false objects of trust, 'worthless things' communicates both
    their emptiness and practical uselessness. The predicate repetition is retained
    with 'for they are worthless.'
- source_word: אֲשֶׁר לֹא יוֹעִילוּ
  chosen: that cannot profit
  alternatives:
  - which do not benefit
  - that are of no use
  lexicon: HALOT
  rationale: The relative clause describes the worthless things as unable to bring
    benefit. 'Cannot profit' is idiomatic and preserves the sense of ineffectiveness.
- source_word: וְלֹא יַצִּילוּ
  chosen: or deliver
  alternatives:
  - or save
  - or rescue
  lexicon: HALOT
  rationale: נצל in the Hiphil often means to deliver or rescue. 'Deliver' fits the
    broader Old Testament idiom of divine deliverance and avoids overloading 'save'
    with later theological associations not explicit here.
- source_word: הֵמָּה
  chosen: they
  alternatives:
  - these things
  lexicon: HALOT
  rationale: The pronoun is masculine plural, referring back to the worthless objects.
    'They' is the natural English rendering.
