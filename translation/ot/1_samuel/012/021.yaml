theological_decisions:
- issue: Referent of 'worthless things'
  chosen_reading: A general reference to idols or empty objects of misplaced trust,
    rendered non-specifically as 'worthless things.'
  alternative_readings:
  - idols
  - vain things
  - empty things
  rationale: The immediate context concerns turning from the LORD to what cannot help
    or deliver. The Hebrew uses a broader term of emptiness/futility rather than the
    more specific word for idols, so the translation preserves that breadth while
    allowing the likely referent to remain implicit.
  doctrine_reference: 'Translation philosophy: preserve the source text''s plain sense
    without importing more specificity than warranted.'
