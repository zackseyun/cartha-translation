theological_decisions:
- issue: Nature of the affliction in עפלים
  chosen_reading: tumors
  alternative_readings:
  - hemorrhoids
  - swellings
  rationale: The Hebrew term is not specific enough to require the more anatomically
    precise 'hemorrhoids' in the main text. 'Tumors' preserves the sense of bodily
    swellings without overcommitting. Because 'hemorrhoids' is a longstanding traditional
    rendering and contextually plausible, it is preserved in a footnote.
  doctrine_reference: Translation philosophy §3, preserve theological/interpretive
    tension rather than resolve it where ambiguity remains.
- issue: Retention of the anthropomorphic idiom 'his hand'
  chosen_reading: his hand
  alternative_readings:
  - his power
  - his punishment
  rationale: The Hebrew idiom is transparent enough in English and carries theological
    force regarding divine agency. Paraphrasing it would flatten the text's imagery
    and lessen auditability.
  doctrine_reference: 'Translation philosophy §1 and §5: original-language primacy
    and consistency of key terms unless context demands variance.'
