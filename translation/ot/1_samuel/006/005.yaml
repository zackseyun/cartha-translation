id: 1SA.6.5
reference: 1 Samuel 6:5
source:
  edition: WLC
  text: וַ/עֲשִׂיתֶם֩ צַלְמֵ֨י עפלי/כם וְ/צַלְמֵ֣י עַכְבְּרֵי/כֶ֗ם הַ/מַּשְׁחִיתִם֙
    אֶת הָ/אָ֔רֶץ וּ/נְתַתֶּ֛ם לֵ/אלֹהֵ֥י יִשְׂרָאֵ֖ל כָּב֑וֹד אוּלַ֗י יָקֵ֤ל אֶת
    יָד/וֹ֙ מֵֽ/עֲלֵי/כֶ֔ם וּ/מֵ/עַ֥ל אֱלֹהֵי/כֶ֖ם וּ/מֵ/עַ֥ל אַרְצְ/כֶֽם־־׃
translation:
  text: So make images of your tumors and images of your mice that are ravaging the
    land, and give glory to the God of Israel. Perhaps he will lighten his hand from
    upon you, and from upon your gods, and from upon your land.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your hemorrhoids.' The Hebrew term refers to bodily swellings or tumors;
      the more specific traditional rendering is possible but not certain.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַעֲשִׂיתֶם
  chosen: So make
  alternatives:
  - and make
  - then make
  lexicon: HALOT
  rationale: Qal wayyiqtol 2mp of עשה gives an imperative-like instruction in sequence.
    'So make' captures the consequential force in context while remaining close to
    the Hebrew.
- source_word: צַלְמֵי
  chosen: images of
  alternatives:
  - likenesses of
  - models of
  lexicon: HALOT
  rationale: צלם commonly denotes an image or representation. 'Images' is the most
    natural and direct English rendering here for crafted replicas.
- source_word: עפליכם
  chosen: your tumors
  alternatives:
  - your swellings
  - your hemorrhoids
  lexicon: HALOT
  rationale: The term refers to the affliction suffered by the Philistines. 'Tumors'
    is medically broad and readable; 'hemorrhoids' is a traditional but more interpretive
    and debated specification, so it is preserved in a footnote rather than placed
    in the main text.
- source_word: וְצַלְמֵי עכבריכם
  chosen: and images of your mice
  alternatives:
  - and images of your rats
  lexicon: HALOT
  rationale: עכבר denotes mouse/mice or possibly rats in a broader rodent sense. 'Mice'
    is the standard rendering and fits the traditional understanding.
- source_word: המשחיתים את הארץ
  chosen: that are ravaging the land
  alternatives:
  - that are destroying the land
  - that ruin the country
  lexicon: HALOT
  rationale: The participle of שחת describes ongoing destructive activity. 'Ravaging'
    conveys active devastation in idiomatic modern English while preserving the force
    of the participle.
- source_word: ונתתם ... כבוד
  chosen: and give glory
  alternatives:
  - and render honor
  - and give honor
  lexicon: HALOT
  rationale: כבוד here means honor/glory given to Israel's God through the guilt offering.
    'Give glory' is a natural biblical expression and preserves the theological weight
    of acknowledging his power.
- source_word: לאלהי ישראל
  chosen: to the God of Israel
  lexicon: HALOT
  rationale: Straightforward construct phrase. The definite sense is clear in context.
- source_word: אולי
  chosen: Perhaps
  alternatives:
  - It may be that
  - Maybe
  lexicon: HALOT
  rationale: אולי expresses possibility or hope. 'Perhaps' is concise and suitably
    formal.
- source_word: יקל
  chosen: he will lighten
  alternatives:
  - he will ease
  - he will make light
  lexicon: HALOT
  rationale: Hiphil of קלל here means to make lighter, i.e., lessen the weight or
    severity. 'Lighten' preserves the metaphor tied to 'hand' and remains intelligible.
- source_word: את ידו
  chosen: his hand
  lexicon: HALOT
  rationale: '''Hand'' is a common Hebrew metaphor for power or afflicting force.
    It should be retained rather than paraphrased, since the idiom is understandable
    in English.'
- source_word: מעלי־כם
  chosen: from upon you
  alternatives:
  - from you
  - off you
  lexicon: HALOT
  rationale: The prepositional phrase is literally 'from upon you.' Retaining 'from
    upon' preserves the repeated Hebrew structure and the image of a heavy hand resting
    on them.
- source_word: ומעל אלהיכם
  chosen: and from upon your gods
  alternatives:
  - and from your gods
  lexicon: HALOT
  rationale: The Hebrew explicitly includes the Philistines' gods as also under the
    weight of Israel's God's hand. 'From upon your gods' preserves the repeated syntax
    and rhetorical force.
- source_word: ומעל ארצכם
  chosen: and from upon your land
  alternatives:
  - and from your land
  lexicon: HALOT
  rationale: Again the repeated preposition is retained for emphasis and structural
    fidelity.
