id: 1SA.6.14
reference: 1 Samuel 6:14
source:
  edition: WLC
  text: וְ/הָ/עֲגָלָ֡ה בָּ֠אָה אֶל שְׂדֵ֨ה יְהוֹשֻׁ֤עַ בֵּֽית הַשִּׁמְשִׁי֙ וַ/תַּעֲמֹ֣ד שָׁ֔ם וְ/שָׁ֖ם אֶ֣בֶן גְּדוֹלָ֑ה וַֽ/יְבַקְּעוּ֙ אֶת עֲצֵ֣י הָ/עֲגָלָ֔ה וְ/אֶת הַ֨/פָּר֔וֹת הֶעֱל֥וּ עֹלָ֖ה לַ/יהוָֽה־־־־׃ס
translation:
  text: The cart came into the field of Joshua the Beth-shemite and stopped there, where there was a large stone. Then they split up the wood of the cart and offered up the cows as a burnt offering to Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the field of Joshua of Beth-shemesh.' The Hebrew identifies Joshua by his connection to Beth-shemesh.
    reason: lexical_alternative
  - marker: b
    text: Or 'and stood there.' The Hebrew verb is literally 'stood,' used here of the cart coming to a stop.
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'to the LORD'; alternatively, 'to Yahweh.'
    reason: alternative_reading
lexical_decisions:
- source_word: הָעֲגָלָה
  chosen: the cart
  alternatives:
  - the wagon
  lexicon: HALOT
  rationale: עגלה here denotes the vehicle carrying the ark and guilt offering. 'Cart' is the most natural modern English rendering in this narrative context; 'wagon' is possible but slightly less idiomatic here.
- source_word: בָּאָה
  chosen: came
  alternatives:
  - arrived
  lexicon: HALOT
  rationale: The verb בוא commonly means 'come/enter.' 'Came' preserves the straightforward narrative movement without adding interpretive nuance.
- source_word: שְׂדֵה יְהוֹשֻׁעַ בֵּית הַשִּׁמְשִׁי
  chosen: the field of Joshua the Beth-shemite
  alternatives:
  - the field of Joshua of Beth-shemesh
  - the field of Joshua the man of Beth-shemesh
  lexicon: HALOT
  rationale: The construct phrase identifies Joshua by gentilicial relation to Beth-shemesh. 'Beth-shemite' is a concise transliterated gentilicial that preserves the Hebrew form and avoids over-paraphrase.
- source_word: וַתַּעֲמֹד שָׁם
  chosen: and stopped there
  alternatives:
  - and stood there
  - and came to a stop there
  lexicon: HALOT
  rationale: עמד literally means 'stand,' but for a cart in motion, idiomatic English is 'stopped.' This is a context-driven adjustment consistent with optimal equivalence.
- source_word: וְשָׁם אֶבֶן גְּדוֹלָה
  chosen: where there was a large stone
  alternatives:
  - and there was a great stone there
  - and there was a large stone there
  lexicon: HALOT
  rationale: The Hebrew notes the presence of a prominent stone at that location. 'Where there was' smooths the repeated 'there' into natural English while preserving the locative sense.
- source_word: וַיְבַקְּעוּ
  chosen: they split up
  alternatives:
  - they split
  - they chopped up
  - they broke apart
  lexicon: HALOT
  rationale: בקע conveys splitting or cleaving. 'Split up' fits the use of the cart's wood as fuel and reads naturally in English.
- source_word: עֲצֵי הָעֲגָלָה
  chosen: the wood of the cart
  alternatives:
  - the timbers of the cart
  - the cart's wood
  lexicon: HALOT
  rationale: The plural construct literally means 'the woods/pieces of wood of the cart.' 'The wood of the cart' is idiomatic and sufficiently precise.
- source_word: הַפָּרוֹת
  chosen: the cows
  alternatives:
  - the heifers
  lexicon: HALOT
  rationale: פרות is the common plural for female cattle, 'cows.' Although the animals in the broader context are milk cows, 'cows' is the plain lexical sense here; 'heifers' would be less accurate because the context indicates they had calves.
- source_word: הֶעֱלוּ עֹלָה
  chosen: offered up ... as a burnt offering
  alternatives:
  - sacrificed ... as a burnt offering
  - offered ... for a burnt offering
  lexicon: HALOT
  rationale: The Hiphil of עלה with עולה is sacrificial language meaning to offer something up as a whole burnt offering. 'Offered up ... as a burnt offering' preserves both the ritual sense and the verbal imagery.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of יְהוָה is 'the LORD,' following established reverential convention and the stated translation policy.
