id: 1SA.6.17
reference: 1 Samuel 6:17
source:
  edition: WLC
  text: וְ/אֵ֨לֶּה֙ טְחֹרֵ֣י הַ/זָּהָ֔ב אֲשֶׁ֨ר הֵשִׁ֧יבוּ פְלִשְׁתִּ֛ים אָשָׁ֖ם לַֽ/יהוָ֑ה לְ/אַשְׁדּ֨וֹד אֶחָ֜ד לְ/עַזָּ֤ה אֶחָד֙ לְ/אַשְׁקְל֣וֹן אֶחָ֔ד לְ/גַ֥ת אֶחָ֖ד לְ/עֶקְר֥וֹן אֶחָֽד׃ס
translation:
  text: 'And these are the golden tumors that the Philistines returned as a guilt offering to Yahweh: one for Ashdod, one for Gaza, one for Ashkelon, one for Gath, one for Ekron.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'golden swellings'; the Hebrew term refers to the bodily affliction represented by these votive offerings, traditionally rendered more specifically as 'hemorrhoids.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאֵלֶּה
  chosen: And these are
  alternatives:
  - Now these are
  - These are
  lexicon: HALOT
  rationale: The conjunction plus demonstrative introduces an explanatory listing. 'And these are' preserves the Hebrew linkage to the preceding context while remaining natural English.
- source_word: טְחֹרֵי הַזָּהָב
  chosen: the golden tumors
  alternatives:
  - the gold tumors
  - the golden swellings
  - the golden hemorrhoids
  lexicon: HALOT
  rationale: טְחֹרִים refers to the affliction represented by the votive objects in this narrative. 'Tumors' is the most natural and sufficiently specific modern rendering without overcommitting to the more medically specific 'hemorrhoids.' 'Golden' smoothly renders the construct phrase 'tumors of gold.'
- source_word: אֲשֶׁר הֵשִׁיבוּ
  chosen: that ... returned
  alternatives:
  - which ... gave back
  - that ... sent back
  lexicon: HALOT
  rationale: The Hiphil of שוב here means 'return' or 'send back.' 'Returned' fits the context of restitution connected with the ark and the guilt offering.
- source_word: פְלִשְׁתִּים
  chosen: the Philistines
  lexicon: HALOT
  rationale: Standard English transliteration for the people group.
- source_word: אָשָׁם
  chosen: as a guilt offering
  alternatives:
  - as a reparation offering
  - as a trespass offering
  lexicon: HALOT
  rationale: אָשָׁם denotes a guilt/reparation offering. 'Guilt offering' is the most established and understandable English rendering, and it fits the restitutional sense in context.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: Per doctrine guidelines, יְהוָה is rendered 'the LORD' rather than transliterated.
- source_word: לְאַשְׁדּוֹד אֶחָד ... לְעֶקְרוֹן אֶחָד
  chosen: one for Ashdod, one for Gaza, one for Ashkelon, one for Gath, one for Ekron
  alternatives:
  - one belonging to Ashdod ...
  - for Ashdod one ...
  lexicon: HALOT
  rationale: The repeated lamed with 'one' indicates one item corresponding to each Philistine city. English idiom is best served by repeating 'one for' before each city.
