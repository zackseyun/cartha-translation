id: 1SA.6.8
reference: 1 Samuel 6:8
source:
  edition: WLC
  text: וּ/לְקַחְתֶּ֞ם אֶת אֲר֣וֹן יְהוָ֗ה וּ/נְתַתֶּ֤ם אֹת/וֹ֙ אֶל הָ֣/עֲגָלָ֔ה וְ/אֵ֣ת
    כְּלֵ֣י הַ/זָּהָ֗ב אֲשֶׁ֨ר הֲשֵׁבֹתֶ֥ם ל/וֹ֙ אָשָׁ֔ם תָּשִׂ֥ימוּ בָ/אַרְגַּ֖ז
    מִ/צִּדּ֑/וֹ וְ/שִׁלַּחְתֶּ֥ם אֹת֖/וֹ וְ/הָלָֽךְ־־׀׃
translation:
  text: Then take the ark of the LORD and place it on the cart, and put the gold objects
    that you are returning to him as a guilt offering in a box beside it. Then send
    it off, and let it go.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the gold articles' or 'the golden objects.' The Hebrew term is broad
      and can refer to various items or vessels.
    reason: lexical_alternative
  - marker: b
    text: Or 'in a chest' or 'in a coffer beside it.'
    reason: lexical_alternative
  - marker: c
    text: 'Literally ''and it will go''; in context this functions as the final step
      of the instruction: ''send it off, and let it go.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲרוֹן יְהוָה
  chosen: the ark of the LORD
  alternatives:
  - the ark of Yahweh
  - the LORD's ark
  lexicon: HALOT
  rationale: אֲרוֹן is the sacred chest/ark; construct with the divine name indicates
    possession/association. Per doctrine, יְהוָה is rendered 'the LORD' rather than
    transliterated.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's contested-terms policy for the divine name.
- source_word: הָעֲגָלָה
  chosen: the cart
  alternatives:
  - the wagon
  lexicon: HALOT
  rationale: עגלה denotes a cart/wagon. 'Cart' fits the immediate narrative and common
    English Bible usage without sounding archaic.
- source_word: כְּלֵי הַזָּהָב
  chosen: the gold objects
  alternatives:
  - the articles of gold
  - the gold items
  - the golden vessels
  lexicon: HALOT
  rationale: כְּלִי is a broad term for object/article/vessel. Since the specific
    items are tumors and mice made of gold in context, 'objects' is accurate and natural
    without over-specifying.
- source_word: הֲשֵׁבֹתֶם לוֹ
  chosen: that you are returning to him
  alternatives:
  - that you have returned to him
  - that you are sending back to him
  lexicon: HALOT
  rationale: Hiphil of שוב here means 'return/send back.' English progressive 'are
    returning' fits the instruction context. 'To him' refers to the LORD, matching
    the Hebrew pronoun.
- source_word: אָשָׁם
  chosen: as a guilt offering
  alternatives:
  - as a compensation offering
  - as an offering for guilt
  lexicon: HALOT
  rationale: אָשָׁם is the standard sacrificial term 'guilt offering.' Though used
    by Philistines here, the Hebrew narrator employs Israelite cultic terminology,
    which should be preserved.
- source_word: בָאַרְגַּז
  chosen: in a box
  alternatives:
  - in a chest
  - in a coffer
  lexicon: HALOT
  rationale: אַרְגָּז denotes a box/chest. 'Box' is clear modern English; 'coffer'
    is too archaic.
- source_word: מִצִּדּוֹ
  chosen: beside it
  alternatives:
  - at its side
  - beside him
  lexicon: HALOT
  rationale: 'The suffix most naturally refers to the ark just mentioned: place the
    box at the ark''s side. ''Beside it'' is idiomatic and spatially clear.'
- source_word: וְשִׁלַּחְתֶּם אֹתוֹ
  chosen: Then send it off
  alternatives:
  - and send it away
  - and release it
  lexicon: HALOT
  rationale: שׁלח in this context means to send away/release. 'Send it off' is natural
    English and fits the sequence of instructions.
- source_word: וְהָלָךְ
  chosen: and let it go
  alternatives:
  - and it will go
  - that it may go
  lexicon: HALOT
  rationale: Though formally 'and it will go,' in this instructional sequence the
    sense is permissive/resultative after the command to send it away. 'Let it go'
    communicates the intended action in natural English.
