theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: Required by the project's contested-terms table and consistent with reverential
    convention.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Cultic term אָשָׁם in a Philistine context
  chosen_reading: guilt offering
  alternative_readings:
  - compensation offering
  rationale: The Hebrew narrator uses Israelite sacrificial vocabulary. Retaining
    'guilt offering' preserves the lexical and theological connection without importing
    later doctrinal claims beyond the text.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1 and #5'
