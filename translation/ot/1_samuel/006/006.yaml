id: 1SA.6.6
reference: 1 Samuel 6:6
source:
  edition: WLC
  text: וְ/לָ֤/מָּה תְכַבְּדוּ֙ אֶת לְבַבְ/כֶ֔ם כַּ/אֲשֶׁ֧ר כִּבְּד֛וּ מִצְרַ֥יִם
    וּ/פַרְעֹ֖ה אֶת לִבָּ֑/ם הֲ/לוֹא֙ כַּ/אֲשֶׁ֣ר הִתְעַלֵּ֣ל בָּ/הֶ֔ם וַֽ/יְשַׁלְּח֖וּ/ם
    וַ/יֵּלֵֽכוּ־־׃
translation:
  text: Why then do you harden your hearts, as Egypt and Pharaoh hardened their hearts?
    Was it not when he dealt harshly with them that they sent them away, and they
    went?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'make your hearts heavy' / 'made their hearts heavy.' The Hebrew idiom
      uses 'heavy' for a hardened heart.
    reason: lexical_alternative
  - marker: b
    text: The 'them' in 'he dealt harshly with them' refers to Egypt and Pharaoh;
      the 'them' in 'they sent them away' refers to Israel.
    reason: cross_reference
lexical_decisions:
- source_word: תְכַבְּדוּ
  chosen: harden
  alternatives:
  - make heavy
  - honor
  lexicon: HALOT
  rationale: The piel of כבד with 'heart' is an idiom meaning to make the heart heavy,
    i.e., to harden it. 'Harden' communicates the idiomatic sense in natural English
    better than the more literal 'make heavy.' 'Honor' is a common sense of the root
    in other contexts but does not fit here.
- source_word: לְבַבְכֶם
  chosen: your hearts
  alternatives:
  - your heart
  lexicon: HALOT
  rationale: Hebrew לֵבָב/לֵב refers to the inner will/mind/heart. English plural
    'hearts' matches the 2mp address and preserves the anthropological sense without
    over-interpreting.
- source_word: כַּאֲשֶׁר
  chosen: as
  alternatives:
  - just as
  - when
  lexicon: HALOT
  rationale: In the first comparison clause it introduces analogy, so 'as' is the
    most straightforward rendering.
- source_word: כִּבְּדוּ
  chosen: hardened
  alternatives:
  - made heavy
  lexicon: HALOT
  rationale: Same idiom as earlier in the verse; consistency favors 'hardened' for
    Egypt and Pharaoh's action toward their own hearts.
- source_word: מִצְרַיִם וּפַרְעֹה
  chosen: Egypt and Pharaoh
  alternatives:
  - the Egyptians and Pharaoh
  lexicon: HALOT
  rationale: The Hebrew uses the place-name 'Egypt' as a collective for its people/governing
    power. 'Egypt and Pharaoh' is a natural and sufficiently literal rendering.
- source_word: לִבָּם
  chosen: their hearts
  alternatives:
  - their heart
  lexicon: HALOT
  rationale: Plural possessive in English is the natural equivalent of the Hebrew
    collective expression.
- source_word: הֲלוֹא
  chosen: Was it not
  alternatives:
  - Did not
  - Surely
  lexicon: HALOT
  rationale: Introduces a rhetorical question expecting agreement. 'Was it not' fits
    the following temporal clause smoothly in English.
- source_word: כַּאֲשֶׁר
  chosen: when
  alternatives:
  - as
  - just as
  lexicon: HALOT
  rationale: In the second occurrence the clause is temporal rather than comparative,
    introducing the circumstance under which the Egyptians released Israel.
- source_word: הִתְעַלֵּל
  chosen: dealt harshly
  alternatives:
  - dealt severely
  - mocked
  - acted wantonly
  lexicon: HALOT
  rationale: The hitpael of עלל here refers to severe or harsh dealing. In the Exodus
    allusion, the subject is best understood as God dealing severely with Egypt. 'Dealt
    harshly' is idiomatic and captures the punitive force without over-specifying
    the manner.
- source_word: בָּהֶם
  chosen: with them
  alternatives:
  - against them
  - among them
  lexicon: HALOT
  rationale: With הִתְעַלֵּל, the preposition marks the object of harsh treatment.
    'With them' is idiomatic in English in the phrase 'deal harshly with.'
- source_word: וַיְשַׁלְּחוּם
  chosen: they sent them away
  alternatives:
  - they let them go
  - they released them
  lexicon: HALOT
  rationale: The verb שלח commonly means send away/release. 'Sent them away' preserves
    the concrete verbal image and matches the Exodus allusion. The subject is Egypt/Pharaoh;
    the object is Israel.
- source_word: וַיֵּלֵכוּ
  chosen: they went
  alternatives:
  - they left
  - they departed
  lexicon: HALOT
  rationale: A simple rendering of הלך. 'They went' preserves the terse Hebrew sequence
    after 'sent them away.'
