theological_decisions:
- issue: Implicit subject of הִתְעַלֵּל
  chosen_reading: The subject is understood as God, referring to his severe dealings
    with Egypt in the Exodus plagues.
  alternative_readings:
  - The subject could be understood more vaguely as 'when things went badly for them'
    or as an impersonal reference to what happened to Egypt.
  rationale: The broader context alludes to the Exodus narrative, where God struck
    Egypt until they released Israel. Hebrew leaves the subject implicit in this clause,
    but English normally requires one. Rendering the clause as 'when he dealt harshly
    with them' preserves the implicitness as much as possible while allowing the Exodus
    referent to remain clear from context.
