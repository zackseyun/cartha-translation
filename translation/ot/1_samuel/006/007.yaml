id: 1SA.6.7
reference: 1 Samuel 6:7
source:
  edition: WLC
  text: וְ/עַתָּ֗ה קְח֨וּ וַ/עֲשׂ֜וּ עֲגָלָ֤ה חֲדָשָׁה֙ אֶחָ֔ת וּ/שְׁתֵּ֤י פָרוֹת֙
    עָל֔וֹת אֲשֶׁ֛ר לֹא עָלָ֥ה עֲלֵי/הֶ֖ם עֹ֑ל וַ/אֲסַרְתֶּ֤ם אֶת הַ/פָּרוֹת֙ בָּ/עֲגָלָ֔ה
    וַ/הֲשֵׁיבֹתֶ֧ם בְּנֵי/הֶ֛ם מֵ/אַחֲרֵי/הֶ֖ם הַ/בָּֽיְתָ/ה־־׃
translation:
  text: Now then, take and make one new cart, and two milk cows on which no yoke has
    come, and hitch the cows to the cart, but bring their calves home, away from them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'two nursing cows' or 'two cows giving milk.'
    reason: lexical_alternative
  - marker: b
    text: Literally, 'on which no yoke has come,' that is, cows that have never been
      used for draft work.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  chosen: Now then
  alternatives:
  - Now
  - And now
  lexicon: HALOT
  rationale: Introduces the next step in the priests' instructions with a discourse-transition
    sense stronger than a bare 'now.' 'Now then' captures the procedural force in
    natural English.
- source_word: קְחוּ וַעֲשׂוּ
  chosen: take and make
  alternatives:
  - take and prepare
  - get and make
  lexicon: HALOT
  rationale: Both imperatives are retained distinctly rather than compressed. 'Take
    and make' reflects the Hebrew sequence without unnecessary paraphrase.
- source_word: עֲגָלָה חֲדָשָׁה אֶחָת
  chosen: one new cart
  alternatives:
  - a single new cart
  - one fresh cart
  lexicon: HALOT
  rationale: עֲגָלָה here denotes a wagon/cart. 'One new cart' preserves both the
    numeral and the adjective in idiomatic English word order.
- source_word: שְׁתֵּי פָרוֹת עָלוֹת
  chosen: two milk cows
  alternatives:
  - two nursing cows
  - two cows giving milk
  lexicon: HALOT
  rationale: עָלוֹת refers to cows that are nursing / in milk. 'Milk cows' is concise,
    natural English and implies they have calves, which fits the following clause.
- source_word: אֲשֶׁר לֹא עָלָה עֲלֵיהֶם עֹל
  chosen: on which no yoke has come
  alternatives:
  - that have never borne a yoke
  - upon which no yoke has been placed
  lexicon: HALOT
  rationale: The singular verb with plural referent is a common collective construction.
    The idiom literally says no yoke has come upon them; this is preserved closely
    while remaining intelligible. It indicates animals not previously used for labor.
- source_word: וַאֲסַרְתֶּם אֶת־הַפָּרוֹת בָּעֲגָלָה
  chosen: hitch the cows to the cart
  alternatives:
  - bind the cows to the cart
  - yoke the cows to the cart
  lexicon: HALOT
  rationale: The action is attaching draft animals to a cart. 'Hitch' is the most
    natural modern English equivalent for the practical action, better than the overly
    literal 'bind.' 'Yoke' could mislead because the previous clause emphasizes they
    have not previously worn a yoke.
- source_word: וַהֲשֵׁיבֹתֶם
  chosen: bring ... back
  alternatives:
  - return
  - send back
  lexicon: HALOT
  rationale: 'The Hiphil of שוב is causative: cause to return. In context, the calves
    are to be taken back to the house, so ''bring ... back'' expresses the causative
    sense clearly.'
- source_word: בְּנֵיהֶם
  chosen: their calves
  alternatives:
  - their young
  - their offspring
  lexicon: HALOT
  rationale: Though literally 'their sons/young ones,' for cows the natural English
    equivalent is 'calves.' This is a contextually required specification, not an
    interpretive expansion.
- source_word: מֵאַחֲרֵיהֶם
  chosen: away from them
  alternatives:
  - from behind them
  - separated from them
  lexicon: HALOT
  rationale: Literally 'from after/behind them,' but the sense is removal from following
    the cows. 'Away from them' communicates the intended separation in idiomatic English.
- source_word: הַבָּיְתָה
  chosen: home
  alternatives:
  - to the house
  - to the barn
  lexicon: HALOT
  rationale: The directional form means 'to the house.' In this livestock context,
    'home' is idiomatic and sufficiently precise without importing a specific structure
    like 'barn.'
