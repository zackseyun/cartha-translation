id: 1SA.6.1
reference: 1 Samuel 6:1
source:
  edition: WLC
  text: וַ/יְהִ֧י אֲרוֹן יְהוָ֛ה בִּ/שְׂדֵ֥ה פְלִשְׁתִּ֖ים שִׁבְעָ֥ה חֳדָשִֽׁים־׃
translation:
  text: And the ark of the LORD was in the field of the Philistines seven months.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the country/territory of the Philistines.' The Hebrew literally says
      'in the field of the Philistines.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: And ... was
  alternatives:
  - Now ... was
  - And it happened that ... was
  lexicon: HALOT
  rationale: The waw-consecutive of היה introduces the next narrative development.
    In English narrative, a simple 'And ... was' preserves the sequential force without
    the wooden formula 'and it happened.'
- source_word: אֲרוֹן יְהוָה
  chosen: the ark of the LORD
  alternatives:
  - the LORD's ark
  lexicon: HALOT
  rationale: Construct chain rendered straightforwardly. 'Ark' is the established
    and accurate term for אֲרוֹן in this cultic context, and יְהוָה follows the project
    default 'the LORD.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine table, the default rendering of the divine name is 'the
    LORD,' following Jewish reverence tradition and longstanding English convention.
- source_word: בִּשְׂדֵה פְלִשְׁתִּים
  chosen: in the field of the Philistines
  alternatives:
  - in the country of the Philistines
  - in Philistine territory
  lexicon: HALOT
  rationale: שָׂדֶה literally means 'field' and can extend to open country/territory.
    Here the singular construct with 'Philistines' likely denotes their territory
    generally, but 'field of the Philistines' stays closer to the Hebrew while remaining
    intelligible.
- source_word: שִׁבְעָה חֳדָשִׁים
  chosen: seven months
  lexicon: HALOT
  rationale: Direct numerical expression; no idiomatic adjustment is needed.
