id: 1SA.6.9
reference: 1 Samuel 6:9
source:
  edition: WLC
  text: וּ/רְאִיתֶ֗ם אִם דֶּ֨רֶךְ גְּבוּל֤/וֹ יַֽעֲלֶה֙ בֵּ֣ית שֶׁ֔מֶשׁ ה֚וּא עָ֣שָׂה
    לָ֔/נוּ אֶת הָ/רָעָ֥ה הַ/גְּדוֹלָ֖ה הַ/זֹּ֑את וְ/אִם לֹ֗א וְ/יָדַ֨עְנוּ֙ כִּ֣י
    לֹ֤א יָד/וֹ֙ נָ֣גְעָה בָּ֔/נוּ מִקְרֶ֥ה ה֖וּא הָ֥יָה לָֽ/נוּ־־־׃
translation:
  text: 'And watch: if it goes up by the way of its own territory to Beth-shemesh,
    then he is the one who has done this great harm to us; but if not, then we will
    know that it was not his hand that struck us; it happened to us by chance.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'this great disaster' or 'this great calamity.' The Hebrew word can denote
      severe harm or calamity, not necessarily moral evil.
    reason: lexical_alternative
  - marker: b
    text: Or 'it was a chance occurrence for us.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּרְאִיתֶם
  chosen: And watch
  alternatives:
  - And see
  - Then look
  lexicon: HALOT
  rationale: Imperative plural of ראה here introduces a test/observation. 'Watch'
    fits the immediate context of observing the cart's movement, while remaining close
    to the Hebrew.
- source_word: דֶּרֶךְ גְּבוּלוֹ
  chosen: by the way of its own territory
  alternatives:
  - on the road to its border
  - by the road of its territory
  lexicon: HALOT
  rationale: דֶּרֶךְ is 'way/road' and גְּבוּל is 'border/territory.' The suffix most
    naturally refers to the ark's proper region/destination. 'Its own territory' communicates
    that the route leads toward Israelite land rather than random wandering.
- source_word: יַעֲלֶה
  chosen: it goes up
  alternatives:
  - it ascends
  - it heads up
  lexicon: HALOT
  rationale: עלה commonly means 'go up.' Retained in simple English; in geographical
    movement it can denote travel toward a place of higher elevation or simply onward
    movement.
- source_word: בֵּית שֶׁמֶשׁ
  chosen: Beth-shemesh
  alternatives:
  - Beth Shemesh
  rationale: Proper place name is transliterated per project philosophy.
- source_word: הוּא עָשָׂה לָנוּ
  chosen: he is the one who has done to us
  alternatives:
  - he did to us
  - it is he who did to us
  lexicon: HALOT
  rationale: The independent pronoun הוּא is emphatic. Rendering with 'he is the one'
    preserves the emphasis that Israel's God, not chance, caused the affliction.
- source_word: הָרָעָה הַגְּדוֹלָה הַזֹּאת
  chosen: this great harm
  alternatives:
  - this great evil
  - this great disaster
  - this great calamity
  lexicon: HALOT
  rationale: רָעָה can denote evil, harm, disaster, or calamity. In this context of
    plagues/judgment, 'harm' is natural modern English and avoids implying moral evil
    on God's part while still conveying severe affliction.
- source_word: וְאִם לֹא
  chosen: but if not
  alternatives:
  - and if not
  - otherwise if not
  lexicon: HALOT
  rationale: The conjunction marks the contrasting outcome of the test; 'but if not'
    reads naturally in English.
- source_word: וְיָדַעְנוּ
  chosen: then we will know
  alternatives:
  - and we will know
  lexicon: HALOT
  rationale: The perfect with prefixed conjunction in this sequence expresses the
    resulting conclusion of the test. 'Then' makes the inference explicit in idiomatic
    English.
- source_word: יָדוֹ נָגְעָה בָּנוּ
  chosen: his hand struck us
  alternatives:
  - his hand touched us
  - his hand afflicted us
  lexicon: HALOT
  rationale: The idiom of God's 'hand' denotes active power/judgment. 'Struck us'
    better conveys punitive impact than the overly mild 'touched us.'
- source_word: מִקְרֶה
  chosen: by chance
  alternatives:
  - a chance occurrence
  - happenstance
  lexicon: HALOT
  rationale: מִקְרֶה denotes chance occurrence or accident. 'By chance' is concise
    and idiomatic in English.
- source_word: הוּא הָיָה לָנוּ
  chosen: it happened to us
  alternatives:
  - it was to us
  - it befell us
  lexicon: HALOT
  rationale: The Hebrew expression states that the event was a chance occurrence for
    them. 'It happened to us' is readable modern English and preserves the sense.
