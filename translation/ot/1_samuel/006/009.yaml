theological_decisions:
- issue: Rendering רָעָה with reference to divine action
  chosen_reading: this great harm
  alternative_readings:
  - this great evil
  - this great disaster
  - this great calamity
  rationale: The verse attributes severe affliction to God if the sign is confirmed.
    Rendering רָעָה as 'harm' preserves the reality of divine judgment without suggesting
    moral evil in God, which the context does not require. This follows source sense
    and preserves theological clarity without softening the event.
  doctrine_reference: Translation philosophy §1, §3
