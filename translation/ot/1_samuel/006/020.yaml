id: 1SA.6.20
reference: 1 Samuel 6:20
source:
  edition: WLC
  text: וַ/יֹּֽאמְרוּ֙ אַנְשֵׁ֣י בֵֽית שֶׁ֔מֶשׁ מִ֚י יוּכַ֣ל לַ/עֲמֹ֔ד לִ/פְנֵ֨י יְהוָ֧ה
    הָ/אֱלֹהִ֛ים הַ/קָּד֖וֹשׁ הַ/זֶּ֑ה וְ/אֶל מִ֖י יַעֲלֶ֥ה מֵ/עָלֵֽי/נוּ־־׃ס
translation:
  text: Then the men of Beth-shemesh said, “Who is able to stand before the LORD,
    this holy God? And to whom shall he go up from us?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “to whom shall it go up from us?”—likely referring to the ark of the
      LORD.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיֹּאמְרוּ
  chosen: Then ... said
  alternatives:
  - and ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then ... said' gives natural
    English narrative sequence while preserving the simple verbal force.
- source_word: אַנְשֵׁי בֵית שֶׁמֶשׁ
  chosen: the men of Beth-shemesh
  alternatives:
  - the people of Beth-shemesh
  lexicon: HALOT
  rationale: אַנְשֵׁי is literally 'men of.' Per gender-accurate policy, retain 'men'
    rather than neutralizing to 'people,' since the Hebrew is masculine plural and
    likely refers to the male representatives of the town.
- source_word: מִי יוּכַל
  chosen: Who is able
  alternatives:
  - Who can
  lexicon: HALOT
  rationale: Captures both the interrogative and the modal sense of ability in יכל.
    'Is able' slightly better preserves the weight of incapacity before the divine
    presence.
- source_word: לַעֲמֹד לִפְנֵי
  chosen: to stand before
  alternatives:
  - to stand in the presence of
  lexicon: HALOT
  rationale: A standard idiom for appearing or remaining before someone, especially
    in a solemn or judicial/cultic setting. 'Stand before' is both literal and idiomatic
    in English.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  lexicon: HALOT
  rationale: Per doctrine table, the default rendering of the divine name is 'the
    LORD.'
- source_word: הָאֱלֹהִים הַקָּדוֹשׁ הַזֶּה
  chosen: this holy God
  alternatives:
  - this God, the Holy One
  - this holy divine being
  lexicon: HALOT
  rationale: The phrase appositionally identifies YHWH as 'the God, the holy one,
    this one.' 'This holy God' is natural English and preserves the demonstrative
    force of הַזֶּה, which heightens the immediacy of the people's fear after the
    judgment.
- source_word: וְאֶל מִי
  chosen: And to whom
  alternatives:
  - And to whom else
  lexicon: HALOT
  rationale: A straightforward rendering of the preposition plus interrogative, introducing
    the second question.
- source_word: יַעֲלֶה
  chosen: shall he go up
  alternatives:
  - shall it go up
  - will he ascend
  lexicon: HALOT
  rationale: עלה commonly means 'go up/ascend.' Here the subject is implicit. The
    nearest contextual referent is the ark, but Hebrew often uses masculine singular
    verbs with such implied subjects. The verse's wording leaves the subject unstated,
    so 'he' formally reflects the masculine singular verb while preserving the ambiguity
    of the Hebrew expression.
- source_word: מֵעָלֵינוּ
  chosen: from us
  alternatives:
  - away from us
  - from over us
  lexicon: HALOT
  rationale: The preposition with על conveys movement away from their vicinity or
    from upon them. 'From us' is the most natural concise English rendering in this
    context.
