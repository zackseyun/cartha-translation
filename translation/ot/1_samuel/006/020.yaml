theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project default is to render YHWH as 'the LORD' in keeping with the
    doctrine guidelines and longstanding reverential convention.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Implicit subject of יַעֲלֶה in the second clause
  chosen_reading: he go up
  alternative_readings:
  - it go up (referring explicitly to the ark)
  rationale: The Hebrew verb is masculine singular with no explicit subject. In context
    the ark is likely intended, but the text itself leaves the subject implicit. The
    main text preserves that formal ambiguity rather than resolving it too strongly;
    the likely referent is preserved in a footnote.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §3: Preserve theological
    tension rather than resolve it'
