theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt explicitly sets the default rendering of יְהוָה
    as 'the LORD,' following Jewish reverence tradition and the Septuagint pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Gender rendering of אַנְשֵׁי
  chosen_reading: men of Beth-shemesh
  alternative_readings:
  - people of Beth-shemesh
  rationale: The translation philosophy specifies gender-accurate over gender-neutral
    renderings. Since the Hebrew is grammatically masculine and the context involves
    public sacrificial action, 'men' is preserved rather than neutralizing to 'people.'
  doctrine_reference: DOCTRINE.md Translation philosophy §4
