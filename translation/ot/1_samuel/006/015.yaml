id: 1SA.6.15
reference: 1 Samuel 6:15
source:
  edition: WLC
  text: וְ/הַ/לְוִיִּ֞ם הוֹרִ֣ידוּ אֶת אֲר֣וֹן יְהוָ֗ה וְ/אֶת הָ/אַרְגַּ֤ז אֲשֶׁר
    אִתּ/וֹ֙ אֲשֶׁר בּ֣/וֹ כְלֵֽי זָהָ֔ב וַ/יָּשִׂ֖מוּ אֶל הָ/אֶ֣בֶן הַ/גְּדוֹלָ֑ה
    וְ/אַנְשֵׁ֣י בֵֽית שֶׁ֗מֶשׁ הֶעֱל֨וּ עֹל֜וֹת וַֽ/יִּזְבְּח֧וּ זְבָחִ֛ים בַּ/יּ֥וֹם
    הַ/ה֖וּא לַֽ/יהוָֽה׀־־־־־־־׃
translation:
  text: And the Levites took down the ark of the LORD, and the box that was with it,
    in which were the gold objects, and set them on the great stone. And the men of
    Beth-shemesh offered burnt offerings and sacrificed sacrifices on that day to
    the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''gold vessels/articles''; the term can refer broadly to implements,
      articles, or objects made of gold.'
    reason: lexical_alternative
  - marker: b
    text: Or more smoothly, 'and offered sacrifices.' The Hebrew reads literally,
      'and sacrificed sacrifices,' using a cognate verb-object construction.
    reason: lexical_alternative
  - marker: c
    text: Hebrew YHWH, traditionally rendered 'the LORD.'
    reason: alternative_reading
lexical_decisions:
- source_word: וְהַלְוִיִּם
  chosen: the Levites
  alternatives:
  - the Levitical men
  lexicon: HALOT
  rationale: The term denotes members of the tribe/clan of Levi. 'The Levites' is
    the standard, clear English rendering and fits the narrative context.
- source_word: הוֹרִידוּ
  chosen: took down
  alternatives:
  - brought down
  - lowered
  lexicon: HALOT
  rationale: The Hiphil of ירד here refers to removing the ark and accompanying box
    from the cart. 'Took down' is idiomatic and concrete in English.
- source_word: אֲרוֹן יְהוָה
  chosen: the ark of the LORD
  alternatives:
  - the ark of Yahweh
  lexicon: HALOT
  rationale: אֲרוֹן is 'ark/chest.' In this established cultic context, 'ark' is the
    natural rendering. Per doctrine, יְהוָה is rendered 'the LORD' rather than 'Yahweh'
    in the main text.
- source_word: הָאַרְגַּז
  chosen: the box
  alternatives:
  - the chest
  - the coffer
  lexicon: HALOT
  rationale: The noun refers to the container accompanying the ark, distinct from
    the ark itself. 'Box' is the most natural modern English term; 'coffer' is possible
    but less readable.
- source_word: אֲשֶׁר אִתּוֹ
  chosen: that was with it
  alternatives:
  - which was beside it
  - that accompanied it
  lexicon: HALOT
  rationale: This relative clause identifies the accompanying container in straightforward
    narrative fashion. 'That was with it' preserves the simple Hebrew relation.
- source_word: אֲשֶׁר בּוֹ כְלֵי זָהָב
  chosen: in which were the gold objects
  alternatives:
  - in which were the articles of gold
  - containing gold items
  - in which were the golden vessels
  lexicon: HALOT
  rationale: כְלִי is a broad term for objects/articles/vessels. Because the exact
    kinds of items are not specified here, 'gold objects' is accurate and accessible
    without over-specifying.
- source_word: וַיָּשִׂמוּ אֶל הָאֶבֶן הַגְּדוֹלָה
  chosen: and set them on the great stone
  alternatives:
  - and placed them on the large stone
  - and put them beside the great stone
  lexicon: HALOT
  rationale: Although אֶל often means 'to/toward,' in this context with שׂים it naturally
    yields the sense of placing upon/at the stone. 'On the great stone' best matches
    the likely sense in context and common English idiom.
- source_word: וְאַנְשֵׁי בֵית שֶׁמֶשׁ
  chosen: And the men of Beth-shemesh
  alternatives:
  - And the people of Beth-shemesh
  lexicon: HALOT
  rationale: אַנְשֵׁי is literally 'men of.' Per gender-accurate policy, the masculine
    form is preserved unless context clearly demands a generic rendering. Here the
    narrative likely refers to the male townsmen acting in sacrificial roles.
- source_word: הֶעֱלוּ עֹלוֹת
  chosen: offered burnt offerings
  alternatives:
  - presented burnt offerings
  lexicon: HALOT
  rationale: 'This is the standard sacrificial idiom: literally ''caused burnt offerings
    to go up.'' ''Offered burnt offerings'' is the established and accurate English
    equivalent.'
- source_word: וַיִּזְבְּחוּ זְבָחִים
  chosen: and sacrificed sacrifices
  alternatives:
  - and offered sacrifices
  - and slaughtered sacrifices
  lexicon: HALOT
  rationale: The Hebrew uses a cognate verb-object construction that emphasizes sacrificial
    action. To preserve that repetition transparently, 'sacrificed sacrifices' is
    retained, though 'offered sacrifices' is smoother English.
- source_word: בַּיּוֹם הַהוּא
  chosen: on that day
  alternatives:
  - that day
  lexicon: HALOT
  rationale: A straightforward temporal phrase; 'on that day' preserves the Hebrew
    form naturally.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - for the LORD
  - to Yahweh
  lexicon: HALOT
  rationale: The preposition marks the recipient/direction of the sacrificial acts.
    'To the LORD' is the most direct rendering, and יְהוָה follows the doctrinal default
    'the LORD'.
