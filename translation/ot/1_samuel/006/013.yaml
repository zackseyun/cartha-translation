id: 1SA.6.13
reference: 1 Samuel 6:13
source:
  edition: WLC
  text: וּ/בֵ֣ית שֶׁ֔מֶשׁ קֹצְרִ֥ים קְצִיר חִטִּ֖ים בָּ/עֵ֑מֶק וַ/יִּשְׂא֣וּ אֶת עֵינֵי/הֶ֗ם
    וַ/יִּרְאוּ֙ אֶת הָ֣/אָר֔וֹן וַֽ/יִּשְׂמְח֖וּ לִ/רְאֽוֹת־־־׃
translation:
  text: Now the people of Beth-shemesh were reaping the wheat harvest in the valley,
    and they lifted up their eyes and saw the ark, and they rejoiced to see it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''they lifted up their eyes,'' a Hebrew idiom meaning they looked
      up.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבֵית שֶׁמֶשׁ
  chosen: the people of Beth-shemesh
  alternatives:
  - Beth-shemesh
  - those of Beth-shemesh
  - the men of Beth-shemesh
  lexicon: HALOT
  rationale: The place name Beth-shemesh is transliterated per project policy on names.
    Because the following participle and verbs are plural, the phrase refers metonymically
    to the inhabitants rather than the town itself. 'The people of Beth-shemesh' makes
    the English sense explicit without over-specifying gender; 'the men of Beth-shemesh'
    is possible but not required by the Hebrew here.
- source_word: קֹצְרִים
  chosen: were reaping
  alternatives:
  - were harvesting
  - reaped
  lexicon: HALOT
  rationale: The masculine plural participle gives ongoing/background action. 'Were
    reaping' preserves the durative sense better than a simple past and fits the narrative
    scene.
- source_word: קְצִיר חִטִּים
  chosen: the wheat harvest
  alternatives:
  - a harvest of wheat
  - wheat
  lexicon: HALOT
  rationale: The construct phrase denotes the specific activity/crop being harvested.
    'The wheat harvest' is idiomatic and sufficiently formal.
- source_word: בָּעֵמֶק
  chosen: in the valley
  alternatives:
  - in the plain
  - in the lowland
  lexicon: HALOT
  rationale: עֵמֶק commonly denotes a valley or broad low-lying area. 'Valley' is
    the most straightforward rendering here.
- source_word: וַיִּשְׂאוּ אֶת עֵינֵיהֶם
  chosen: they lifted up their eyes
  alternatives:
  - they looked up
  - they raised their eyes
  lexicon: HALOT
  rationale: This is a common Hebrew idiom. Retaining 'lifted up their eyes' preserves
    the vividness and rhythm of the source; the meaning is transparent in English.
- source_word: וַיִּרְאוּ
  chosen: saw
  alternatives:
  - caught sight of
  - looked and saw
  lexicon: HALOT
  rationale: Simple past 'saw' matches the narrative sequence and avoids unnecessary
    expansion.
- source_word: הָאָרוֹן
  chosen: the ark
  alternatives:
  - the chest
  lexicon: HALOT
  rationale: In this context within 1 Samuel 4–6, הָאָרוֹן clearly refers to the ark
    of God/covenant already established in the narrative. 'The ark' is the natural
    and contextually precise rendering.
- source_word: וַיִּשְׂמְחוּ לִרְאוֹת
  chosen: they rejoiced to see it
  alternatives:
  - they were glad to see it
  - they rejoiced when they saw it
  lexicon: HALOT
  rationale: The infinitive construct after שׂמח expresses the occasion/object of
    joy. 'They rejoiced to see it' is concise and natural. The object 'it' is supplied
    in English because the Hebrew leaves it implicit but clearly refers back to the
    ark.
