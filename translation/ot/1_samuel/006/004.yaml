theological_decisions:
- issue: Referent of the pronoun לוֹ in the question about the offering
  chosen_reading: Rendered 'to him,' referring to the God of Israel rather than to
    the ark as an impersonal object.
  alternative_readings:
  - Rendered 'to it,' referring to the ark
  rationale: The immediate discourse concerns how to make restitution for offense
    against Israel's God in connection with the ark. English personal reference best
    reflects the theological logic of the passage without adding claims beyond the
    text.
