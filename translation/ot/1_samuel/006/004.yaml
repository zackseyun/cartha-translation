id: 1SA.6.4
reference: 1 Samuel 6:4
source:
  edition: WLC
  text: וַ/יֹּאמְר֗וּ מָ֣ה הָ/אָשָׁם֮ אֲשֶׁ֣ר נָשִׁ֣יב ל/וֹ֒ וַ/יֹּאמְר֗וּ מִסְפַּר֙
    סַרְנֵ֣י פְלִשְׁתִּ֔ים חֲמִשָּׁה֙ עפלי זָהָ֔ב וַ/חֲמִשָּׁ֖ה עַכְבְּרֵ֣י זָהָ֑ב
    כִּֽי מַגֵּפָ֥ה אַחַ֛ת לְ/כֻלָּ֖/ם וּ/לְ/סַרְנֵי/כֶֽם־׃
translation:
  text: 'And they said, “What is the guilt offering that we should return to him?”
    They said, “According to the number of the Philistine rulers: five golden tumors
    and five golden mice, for one plague was on all of them and on your rulers.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the compensation offering' or 'the trespass offering.'
    reason: lexical_alternative
  - marker: b
    text: The Hebrew term likely refers to plague-related swellings; some render it
      more specifically as 'hemorrhoids.'
    reason: lexical_alternative
  - marker: c
    text: Or 'the Philistine lords.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הָאָשָׁם
  chosen: the guilt offering
  alternatives:
  - the compensation offering
  - the trespass offering
  lexicon: HALOT
  rationale: אָשָׁם in cultic/reparative contexts denotes a reparation or guilt offering.
    'Guilt offering' is the most transparent and established English equivalent here,
    fitting the context of returning an offering to remedy offense.
- source_word: נָשִׁיב לוֹ
  chosen: we should return to him
  alternatives:
  - we shall return to him
  - we should send back to it
  lexicon: HALOT
  rationale: The Hiphil of שוב commonly means 'cause to return/return.' 'Return to
    him' fits the immediate context of sending back a reparative gift to the God whose
    ark they captured. The pronoun is masculine singular; English 'him' is the most
    natural rendering, referring to Israel's God.
- source_word: מִסְפַּר סַרְנֵי פְלִשְׁתִּים
  chosen: According to the number of the Philistine rulers
  alternatives:
  - The number of the Philistine lords
  - In the number of the Philistine rulers
  lexicon: HALOT
  rationale: The construct phrase indicates correspondence to the number of Philistine
    rulers. 'According to the number of' makes the implied sense explicit in natural
    English. סַרְנֵי refers to Philistine political leaders; 'rulers' is clear modern
    English, while 'lords' is possible but more archaic/feudal in tone.
- source_word: סַרְנֵי
  chosen: rulers
  alternatives:
  - lords
  - princes
  lexicon: HALOT
  rationale: A Philistine title for their chief leaders. 'Rulers' communicates authority
    without importing later aristocratic connotations.
- source_word: עפלי זָהָב
  chosen: golden tumors
  alternatives:
  - golden swellings
  - golden hemorrhoids
  lexicon: HALOT
  rationale: The noun refers to bodily swellings/tumors associated with the plague
    in this narrative. 'Golden tumors' is medically general, readable, and avoids
    over-specifying the exact ailment while preserving the concrete image.
- source_word: עַכְבְּרֵי זָהָב
  chosen: golden mice
  alternatives:
  - gold mice
  lexicon: HALOT
  rationale: The noun straightforwardly means 'mice.' 'Golden mice' preserves the
    order and sense naturally in English.
- source_word: מַגֵּפָה אַחַת
  chosen: one plague
  alternatives:
  - the same plague
  - a single plague
  lexicon: HALOT
  rationale: The phrase emphasizes a single plague affecting all. 'One plague' is
    concise and close to the Hebrew wording.
- source_word: לְכֻלָּם
  chosen: on all of them
  alternatives:
  - upon all of them
  - for all of them
  lexicon: HALOT
  rationale: With מַגֵּפָה, the preposition marks the plague's effect on the people.
    'On all of them' is idiomatic English.
- source_word: וּלְסַרְנֵיכֶם
  chosen: and on your rulers
  alternatives:
  - and on your lords
  lexicon: HALOT
  rationale: The 2mp suffix reflects the priests/diviners addressing the Philistines
    collectively. Repeating 'rulers' maintains consistency with סַרְנֵי earlier in
    the verse.
