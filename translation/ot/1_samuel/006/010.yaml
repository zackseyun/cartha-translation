id: 1SA.6.10
reference: 1 Samuel 6:10
source:
  edition: WLC
  text: וַ/יַּעֲשׂ֤וּ הָ/אֲנָשִׁים֙ כֵּ֔ן וַ/יִּקְח֗וּ שְׁתֵּ֤י פָרוֹת֙ עָל֔וֹת וַ/יַּאַסְר֖וּ/ם
    בָּ/עֲגָלָ֑ה וְ/אֶת בְּנֵי/הֶ֖ם כָּל֥וּ בַ/בָּֽיִת־׃
translation:
  text: 'So the men did so: they took two milk cows and harnessed them to the cart,
    and shut up their calves in the house.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'two nursing cows.' The Hebrew describes cows that were giving milk and
      had calves.
    reason: lexical_alternative
  - marker: b
    text: Or 'confined their calves in the house.' The Hebrew literally says 'their
      sons' for the cows' young, that is, their calves.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲשׂוּ ... כֵּן
  chosen: did so
  alternatives:
  - did thus
  - did accordingly
  lexicon: HALOT
  rationale: Idiomatic Hebrew expression meaning they acted in the manner just instructed.
    'Did so' is natural modern English and preserves the concise narrative style.
- source_word: הָאֲנָשִׁים
  chosen: the men
  alternatives:
  - the people
  lexicon: HALOT
  rationale: The noun אֲנָשִׁים ordinarily means 'men' here, referring to the specific
    male actors in the narrative. This follows the gender-accurate principle rather
    than neutralizing to 'people'.
- source_word: שְׁתֵּי פָרוֹת עָלוֹת
  chosen: two milk cows
  alternatives:
  - two nursing cows
  - two cows that had calves
  lexicon: HALOT
  rationale: פָרוֹת are female cattle, and עָלוֹת here describes cows that are giving
    milk / nursing. 'Milk cows' is concise, idiomatic English that captures the point
    that these cows had dependent calves, which matters for the sign in context.
- source_word: וַיַּאַסְרוּם
  chosen: harnessed them
  alternatives:
  - bound them
  - hitched them
  lexicon: HALOT
  rationale: From אסר, 'to bind.' In context of attaching draft animals to a wagon,
    'harnessed them' best conveys the functional sense in natural English. 'Hitched
    them' is also possible, but 'harnessed' is slightly more formal and clear.
- source_word: בָּעֲגָלָה
  chosen: to the cart
  alternatives:
  - to the wagon
  lexicon: HALOT
  rationale: עגלה here is the vehicle carrying the ark and offerings. 'Cart' is the
    standard and suitably simple rendering in this context.
- source_word: וְאֶת בְּנֵיהֶם
  chosen: their calves
  alternatives:
  - their young
  - their sons
  lexicon: HALOT
  rationale: Though בנים literally means 'sons/children,' with cows as antecedent
    it refers to their offspring, hence 'calves' in idiomatic English.
- source_word: כָּלוּ בַּבָּיִת
  chosen: shut up their calves in the house
  alternatives:
  - confined their calves in the house
  - shut their calves in the stall
  lexicon: HALOT
  rationale: The verb כלה in this form/context conveys restraining or shutting in.
    'Shut up' preserves the concrete action. בַּבָּיִת is literally 'in the house';
    although it may refer to an enclosure or stall, the Hebrew says 'house,' so the
    main text keeps that wording.
