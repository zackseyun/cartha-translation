theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Handling the difficult casualty number in the Masoretic Text
  chosen_reading: Preserve the MT sequence in the main text ('seventy men, fifty thousand men') and note alternatives in footnotes
  alternative_readings:
  - seventy men out of fifty thousand men
  - fifty thousand and seventy men
  - a smaller total reflected in some ancient witnesses
  rationale: The verse contains a notorious numerical difficulty. The translation should not silently resolve the problem beyond what the Hebrew warrants. Preserving the MT in the main text while documenting alternatives best fits the project's transparency and tension-preserving philosophy.
  doctrine_reference: DOCTRINE.md Translation philosophy §3, §5
