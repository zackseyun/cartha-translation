id: 1SA.6.19
reference: 1 Samuel 6:19
source:
  edition: WLC
  text: וַ/יַּ֞ךְ בְּ/אַנְשֵׁ֣י בֵֽית שֶׁ֗מֶשׁ כִּ֤י רָאוּ֙ בַּ/אֲר֣וֹן יְהוָ֔ה וַ/יַּ֤ךְ
    בָּ/עָם֙ שִׁבְעִ֣ים אִ֔ישׁ חֲמִשִּׁ֥ים אֶ֖לֶף אִ֑ישׁ וַ/יִּֽתְאַבְּל֣וּ הָ/עָ֔ם
    כִּֽי הִכָּ֧ה יְהוָ֛ה בָּ/עָ֖ם מַכָּ֥ה גְדוֹלָֽה־־
translation:
  text: And he struck down the men of Beth-shemesh because they had looked into the
    ark of the LORD. He struck down seventy men, fifty thousand men among the people,
    and the people mourned because the LORD had struck the people with a great blow.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'because they had looked at the ark of the LORD.' The Hebrew preposition
      can be understood more generally, though 'looked into' likely reflects the offense
      in context.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew reads, 'seventy men, fifty thousand men,' a difficult wording.
      It may mean 'seventy men out of fifty thousand men,' 'fifty thousand and seventy
      men,' or reflect a textual problem; some ancient witnesses support a much smaller
      number.
    reason: textual_variant
lexical_decisions:
- source_word: וַיַּךְ
  chosen: he struck down
  alternatives:
  - he struck
  - he smote
  lexicon: HALOT
  rationale: נכה commonly means 'strike' or 'smite'; in this judgment context 'struck
    down' makes the lethal result explicit without over-paraphrasing. The subject
    is understood from context as the LORD, made explicit later in the verse.
- source_word: בְּאַנְשֵׁי בֵית שֶׁמֶשׁ
  chosen: the men of Beth-shemesh
  alternatives:
  - the men among Beth-shemesh
  - the people of Beth-shemesh
  lexicon: HALOT
  rationale: אַנְשֵׁי is literally 'men of,' and the place name is transliterated
    per house style. 'Men' is retained as gender-accurate rather than neutralized
    to 'people.'
- source_word: כִּי רָאוּ בַּאֲרוֹן יְהוָה
  chosen: because they had looked into the ark of the LORD
  alternatives:
  - because they had looked at the ark of the LORD
  - because they had looked upon the ark of the LORD
  lexicon: HALOT
  rationale: ראה with ב can in context imply looking into/at. Given the offense involved
    and the broader narrative concern with improper handling of the ark, 'looked into'
    best captures the likely sense, while preserving the directness of the Hebrew.
- source_word: אֲרוֹן יְהוָה
  chosen: the ark of the LORD
  alternatives:
  - the ark of Yahweh
  lexicon: HALOT
  rationale: Standard rendering of the construct phrase. YHWH is rendered 'the LORD'
    per doctrine guidelines.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Contested divine name; default rendering in DOCTRINE.md is 'the LORD.'
- source_word: שִׁבְעִים אִישׁ חֲמִשִּׁים אֶלֶף אִישׁ
  chosen: seventy men, fifty thousand men
  alternatives:
  - seventy men out of fifty thousand men
  - fifty thousand and seventy men
  lexicon: HALOT
  rationale: The Hebrew number sequence is difficult and has generated multiple interpretations.
    The main text preserves the Masoretic wording as transparently as possible rather
    than harmonizing it. Alternatives are preserved in footnotes due to the well-known
    textual and interpretive difficulty.
- source_word: בָּעָם
  chosen: among the people
  alternatives:
  - of the people
  - among the populace
  lexicon: HALOT
  rationale: The preposition ב with עָם here is rendered idiomatically as 'among the
    people,' clarifying that those struck were within the population.
- source_word: וַיִּתְאַבְּלוּ
  chosen: mourned
  alternatives:
  - lamented
  - grieved
  lexicon: HALOT
  rationale: The hitpael of אבל denotes mourning or lamentation, especially after
    death or disaster. 'Mourned' is the most natural modern English equivalent.
- source_word: מַכָּה גְדוֹלָה
  chosen: a great blow
  alternatives:
  - a great slaughter
  - a great plague
  lexicon: HALOT
  rationale: מַכָּה is a 'blow,' 'stroke,' or 'plague.' Here 'great blow' preserves
    the lexical connection to the repeated verb נכה ('strike') and avoids importing
    a more specific category like epidemic unless context requires it.
