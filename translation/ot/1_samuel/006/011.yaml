id: 1SA.6.11
reference: 1 Samuel 6:11
source:
  edition: WLC
  text: וַ/יָּשִׂ֛מוּ אֶת אֲר֥וֹן יְהוָ֖ה אֶל הָ/עֲגָלָ֑ה וְ/אֵ֣ת הָ/אַרְגַּ֗ז וְ/אֵת֙
    עַכְבְּרֵ֣י הַ/זָּהָ֔ב וְ/אֵ֖ת צַלְמֵ֥י טְחֹרֵי/הֶֽם־־׃
translation:
  text: Then they put the ark of the LORD on the cart, along with the box and the
    gold mice and the images of their tumors.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their swellings'; possibly 'their hemorrhoids.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּשִׂמוּ
  chosen: Then they put
  alternatives:
  - and they placed
  - so they set
  lexicon: HALOT
  rationale: Wayyiqtol of שׂים advances the narrative. 'Put' is natural modern English;
    'Then' captures the sequential force without overformal repetition of 'and.'
- source_word: אֲרוֹן יְהוָה
  chosen: the ark of the LORD
  alternatives:
  - the chest of the LORD
  lexicon: HALOT
  rationale: אֲרוֹן in this context is the established cultic object, conventionally
    and accurately rendered 'ark.' יְהוָה follows the project's default as 'the LORD.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine table, the default rendering of the divine name is 'the
    LORD.'
- source_word: אֶל הָעֲגָלָה
  chosen: on the cart
  alternatives:
  - onto the cart
  - into the cart
  lexicon: HALOT
  rationale: With a vehicle/platform, English idiom prefers 'on the cart.' 'Onto'
    is possible but less smooth in the final sentence.
- source_word: הָאַרְגַּז
  chosen: the box
  alternatives:
  - the chest
  - the coffer
  lexicon: HALOT
  rationale: The term denotes the container holding the guilt-offering objects. 'Box'
    is clear, modern, and avoids implying it is the same kind of object as the ark.
- source_word: עַכְבְּרֵי הַזָּהָב
  chosen: the gold mice
  alternatives:
  - the golden mice
  lexicon: HALOT
  rationale: Construct phrase literally means 'mice of gold.' 'Gold mice' is concise
    and natural; 'golden mice' is also possible but can sound more adjectival than
    material.
- source_word: צַלְמֵי
  chosen: the images of
  alternatives:
  - the likenesses of
  - the models of
  lexicon: HALOT
  rationale: צֶלֶם commonly denotes an image or representation. 'Images' best fits
    the crafted replicas sent with the offering.
- source_word: טְחֹרֵיהֶם
  chosen: their tumors
  alternatives:
  - their swellings
  - their hemorrhoids
  lexicon: HALOT
  rationale: The noun refers to the affliction described in this narrative. 'Tumors'
    is the broad, standard rendering and avoids overprecision where the exact medical
    referent is debated. 'Hemorrhoids' is possible in context but too specific for
    the main text.
