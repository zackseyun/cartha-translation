theological_decisions:
- issue: Referent of the pronoun in לּוֹ
  chosen_reading: The offering is returned 'to him,' that is, to the God of Israel.
  alternative_readings:
  - The offering is returned 'to it,' that is, with the ark.
  rationale: The immediate phrase 'ark of the God of Israel' and the sacrificial term
    אָשָׁם favor a personal divine referent. The Philistines are not merely accompanying
    the ark with a gift but making reparative offering to Israel's God.
- issue: Meaning of 'his hand'
  chosen_reading: A metaphor for God's afflicting power/judgment is preserved literally
    as 'his hand.'
  alternative_readings:
  - An interpretive rendering such as 'his punishment' or 'his plague'
  rationale: The Hebrew idiom is theologically significant and common in the Old Testament.
    Preserving the metaphor avoids over-interpretation while remaining intelligible
    in English.
