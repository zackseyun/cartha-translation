id: 1SA.6.3
reference: 1 Samuel 6:3
source:
  edition: WLC
  text: וַ/יֹּאמְר֗וּ אִֽם מְשַׁלְּחִ֞ים אֶת אֲר֨וֹן אֱלֹהֵ֤י יִשְׂרָאֵל֙ אַל תְּשַׁלְּח֤וּ
    אֹת/וֹ֙ רֵיקָ֔ם כִּֽי הָשֵׁ֥ב תָּשִׁ֛יבוּ ל֖/וֹ אָשָׁ֑ם אָ֤ז תֵּרָֽפְאוּ֙ וְ/נוֹדַ֣ע
    לָ/כֶ֔ם לָ֛/מָּה לֹא תָס֥וּר יָד֖/וֹ מִ/כֶּֽם־־־־־׃
translation:
  text: And they said, “If you are sending away the ark of the God of Israel, do not
    send it away empty, for you must surely return to him a guilt offering. Then you
    will be healed, and it will be made known to you why his hand has not turned away
    from you.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a reparation offering' or traditional 'a trespass offering.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'his hand,' a common idiom for God's power in judgment.
    reason: cultural_note
lexical_decisions:
- source_word: מְשַׁלְּחִים / תְּשַׁלְּחוּ
  chosen: are sending away / do not send ... away
  alternatives:
  - send
  - let go
  - dismiss
  lexicon: HALOT
  rationale: The verb שלח in this context refers to dispatching the ark back, not
    merely generic sending. 'Send away' captures the sense of releasing/returning
    it from Philistine custody and preserves the repetition in Hebrew.
- source_word: אֲרוֹן אֱלֹהֵי יִשְׂרָאֵל
  chosen: the ark of the God of Israel
  alternatives:
  - the ark of Israel's God
  lexicon: HALOT
  rationale: A straightforward genitive rendering preserves the formal designation
    and avoids importing later shorthand such as 'ark of the covenant,' which is not
    present here.
- source_word: רֵיקָם
  chosen: empty
  alternatives:
  - empty-handed
  - without anything
  lexicon: HALOT
  rationale: '''Empty'' is the natural English equivalent here and fits the idiom
    of not sending something/someone away without a compensatory gift. ''Empty-handed''
    would be more idiomatic for persons and less fitting for the ark.'
- source_word: הָשֵׁב תָּשִׁיבוּ
  chosen: you must surely return
  alternatives:
  - you shall certainly return
  - you must indeed send back
  lexicon: HALOT
  rationale: The infinitive absolute plus finite verb intensifies the command. 'Must
    surely return' conveys both obligation and emphasis in readable English.
- source_word: לּוֹ
  chosen: to him
  alternatives:
  - to it
  lexicon: HALOT
  rationale: The pronominal suffix is masculine singular and most naturally refers
    to the God of Israel rather than the ark as an object. Rendering 'to him' preserves
    the personal reference implied by the context of making reparation to Israel's
    God.
- source_word: אָשָׁם
  chosen: a guilt offering
  alternatives:
  - a reparation offering
  - a compensation offering
  - a trespass offering
  lexicon: HALOT
  rationale: אָשָׁם commonly denotes a guilt/reparation offering. 'Guilt offering'
    is the standard transparent rendering, while the reparative nuance is evident
    from context. 'Trespass offering' is traditional but archaic.
- source_word: תֵּרָפְאוּ
  chosen: you will be healed
  alternatives:
  - you will be cured
  - you will recover
  lexicon: HALOT
  rationale: The Niphal of רפא here refers to relief from the affliction inflicted
    by God. 'Be healed' preserves the passive/resultative sense and fits the plague
    context.
- source_word: וְנוֹדַע לָכֶם
  chosen: it will be made known to you
  alternatives:
  - you will know
  - it will become known to you
  lexicon: HALOT
  rationale: The passive/impersonal sense of the Niphal is better preserved by 'it
    will be made known to you' than by the more active 'you will know.'
- source_word: לָמָּה לֹא תָסוּר יָדוֹ מִכֶּם
  chosen: why his hand has not turned away from you
  alternatives:
  - why his hand does not depart from you
  - why his hand has not been removed from upon you
  lexicon: HALOT
  rationale: '''His hand'' is a Hebrew idiom for divine power in judgment. ''Has not
    turned away from you'' preserves the metaphor while remaining natural English.
    The perfective sense in context is well represented by ''has not turned away.'''
