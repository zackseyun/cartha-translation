id: 1SA.6.2
reference: 1 Samuel 6:2
source:
  edition: WLC
  text: וַ/יִּקְרְא֣וּ פְלִשְׁתִּ֗ים לַ/כֹּהֲנִ֤ים וְ/לַ/קֹּֽסְמִים֙ לֵ/אמֹ֔ר מַֽה נַּעֲשֶׂ֖ה לַ/אֲר֣וֹן יְהוָ֑ה הוֹדִעֻ֕/נוּ בַּ/מֶּ֖ה נְשַׁלְּחֶ֥/נּוּ לִ/מְקוֹמֽ/וֹ־׃
translation:
  text: So the Philistines called for the priests and the diviners, saying, “What shall we do with the ark of Yahweh? Tell us with what we should send it to its place.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''by what means we should send it''; that is, how they should send the ark back.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְרְאוּ
  chosen: called for
  alternatives:
  - called
  - summoned
  lexicon: HALOT
  rationale: The wayyiqtol of קרא here introduces summoning specialists for counsel. 'Called for' is idiomatic modern English and preserves the sense of requesting their presence.
- source_word: פְלִשְׁתִּים
  chosen: the Philistines
  alternatives:
  - Philistines
  lexicon: HALOT
  rationale: Standard transliteration of the people group; the English article fits natural style in this narrative context.
- source_word: לַכֹּהֲנִים
  chosen: the priests
  alternatives:
  - priests
  lexicon: HALOT
  rationale: Definite article is present in Hebrew. 'Priests' refers to Philistine cultic officials, not Israelite priests, but no added qualifier is required by the text.
- source_word: וְלַקֹּסְמִים
  chosen: the diviners
  alternatives:
  - soothsayers
  - fortune-tellers
  lexicon: HALOT
  rationale: קֹסְמִים denotes practitioners of divination. 'Diviners' is accurate, readable, and avoids the more archaic 'soothsayers' and the overly colloquial 'fortune-tellers'.
- source_word: מַה נַּעֲשֶׂה
  chosen: What shall we do
  alternatives:
  - What should we do
  - What are we to do
  lexicon: HALOT
  rationale: A straightforward first-person plural deliberative question. 'Shall' preserves the consultative tone without sounding archaic in this context.
- source_word: לַאֲרוֹן יְהוָה
  chosen: with the ark of the LORD
  alternatives:
  - for the ark of the LORD
  - about the ark of the LORD
  lexicon: HALOT
  rationale: The preposition ל here is best represented idiomatically in English as 'with' in the question 'What shall we do with...?' YHWH is rendered 'the LORD' per doctrine.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: הוֹדִיעֻנוּ
  chosen: Tell us
  alternatives:
  - Make known to us
  - Inform us
  lexicon: HALOT
  rationale: The Hiphil imperative of ידע means 'make known.' 'Tell us' is a natural optimal-equivalence rendering in direct speech.
- source_word: בַּמֶּה
  chosen: how
  alternatives:
  - with what
  - by what means
  lexicon: HALOT
  rationale: 'Literally ''with what,'' but in English the idiomatic sense in this context is asking the manner or means: ''how we should send it.'''
- source_word: נְשַׁלְּחֶנּוּ
  chosen: we should send it
  alternatives:
  - we shall send it
  - we may send it away
  lexicon: HALOT
  rationale: The Piel imperfect with object suffix expresses intended action under consultation. 'We should send it' fits the advisory context. 'Away' is possible from context but not required by the verb itself.
- source_word: לִמְקוֹמוֹ
  chosen: to its place
  alternatives:
  - to its own place
  - back to its place
  lexicon: HALOT
  rationale: The suffix refers to the ark. 'To its place' is literal and sufficient. 'Back' is contextually true but not explicit in the Hebrew, so it is omitted from the main text.
