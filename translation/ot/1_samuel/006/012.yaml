id: 1SA.6.12
reference: 1 Samuel 6:12
source:
  edition: WLC
  text: וַ/יִשַּׁ֨רְנָה הַ/פָּר֜וֹת בַּ/דֶּ֗רֶךְ עַל דֶּ֨רֶךְ֙ בֵּ֣ית שֶׁ֔מֶשׁ בִּ/מְסִלָּ֣ה
    אַחַ֗ת הָלְכ֤וּ הָלֹךְ֙ וְ/גָע֔וֹ וְ/לֹא סָ֖רוּ יָמִ֣ין וּ/שְׂמֹ֑אול וְ/סַרְנֵ֤י
    פְלִשְׁתִּים֙ הֹלְכִ֣ים אַחֲרֵי/הֶ֔ם עַד גְּב֖וּל בֵּ֥ית שָֽׁמֶשׁ־־־׃
translation:
  text: And the cows went straight on the road toward Beth-shemesh, along one highway;
    they went on, lowing as they went, and did not turn aside to the right or to the
    left. And the lords of the Philistines were walking behind them as far as the
    border of Beth-shemesh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'along a single road.' The Hebrew emphasizes that the cows kept to one
      fixed route.
    reason: lexical_alternative
  - marker: b
    text: '''Lowing'' refers to the vocal sound of cattle; the wording suggests they
      continued making this sound as they traveled.'
    reason: cultural_note
  - marker: c
    text: Or 'the rulers of the Philistines.' The term denotes the recognized Philistine
      city-lords.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִשַּׁרְנָה
  chosen: went straight on
  alternatives:
  - went directly
  - kept straight
  - went right ahead
  lexicon: HALOT
  rationale: The verb from ישר here describes moving in a straight/direct course.
    'Went straight on' captures both the directional sense and the narrative motion
    better than a more wooden 'made straight.'
- source_word: הַפָּרוֹת
  chosen: the cows
  alternatives:
  - the cows
  - the heifers
  lexicon: HALOT
  rationale: The immediate context concerns milk cows yoked to the cart (vv. 7, 10).
    'Cows' is the most natural and contextually precise English rendering here; 'heifers'
    would suggest younger females and is less likely in context.
- source_word: בַּדֶּרֶךְ עַל דֶּרֶךְ בֵּית שֶׁמֶשׁ
  chosen: on the road toward Beth-shemesh
  alternatives:
  - on the way, on the road to Beth-shemesh
  - along the road to Beth-shemesh
  lexicon: HALOT
  rationale: The repeated דרך intensifies the idea of a definite route/course. English
    smooths the repetition idiomatically as 'on the road toward Beth-shemesh' while
    preserving destination and movement.
- source_word: בִּמְסִלָּה אַחַת
  chosen: along one highway
  alternatives:
  - on a single road
  - by one الطريق/track
  - along one road
  lexicon: HALOT
  rationale: מְסִלָּה denotes a raised road/highway. 'One highway' preserves the emphasis
    that they stayed on a single, fixed route. 'Highway' here means roadway, not a
    modern paved expressway.
- source_word: הָלְכוּ הָלוֹךְ
  chosen: they went on
  alternatives:
  - they kept going
  - they went continually
  lexicon: HALOT
  rationale: The infinitive absolute with the finite verb intensifies or gives durative
    force. 'They went on' is natural English that conveys continued movement without
    overtranslation.
- source_word: וְגָעוֹ
  chosen: lowing as they went
  alternatives:
  - and lowing
  - mooing as they went
  lexicon: HALOT
  rationale: The verb refers to the sound cattle make. 'Lowing' is standard and dignified
    narrative English; adding 'as they went' makes the participial/adverbial sense
    clear in context.
- source_word: וְלֹא סָרוּ יָמִין וּשְׂמֹאול
  chosen: and did not turn aside to the right or to the left
  alternatives:
  - and did not turn right or left
  - without turning aside either right or left
  lexicon: HALOT
  rationale: A common Hebrew idiom for not deviating from a course. 'Turn aside' best
    reflects סור and preserves the idiomatic force.
- source_word: וְסַרְנֵי פְלִשְׁתִּים
  chosen: the lords of the Philistines
  alternatives:
  - the rulers of the Philistines
  - the Philistine lords
  lexicon: HALOT
  rationale: סַרְנֵי is the standard title for the Philistine rulers. 'Lords' is the
    conventional and suitably elevated rendering for this political title in Samuel.
- source_word: הֹלְכִים אַחֲרֵיהֶם
  chosen: were walking behind them
  alternatives:
  - went after them
  - were following behind them
  lexicon: HALOT
  rationale: The participle gives ongoing attendant action. 'Were walking behind them'
    preserves the durative sense and the physical following.
- source_word: עַד גְּבוּל בֵּית שָׁמֶשׁ
  chosen: as far as the border of Beth-shemesh
  alternatives:
  - up to the territory of Beth-shemesh
  - as far as the boundary of Beth-shemesh
  lexicon: HALOT
  rationale: גְּבוּל can mean border, boundary, or territory. 'Border' is concise
    and fits the geographic sense here, indicating the edge of Beth-shemesh's domain.
