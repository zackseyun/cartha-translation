id: 1SA.6.21
reference: 1 Samuel 6:21
source:
  edition: WLC
  text: וַֽ/יִּשְׁלְחוּ֙ מַלְאָכִ֔ים אֶל יוֹשְׁבֵ֥י קִרְיַת יְעָרִ֖ים לֵ/אמֹ֑ר הֵשִׁ֤בוּ
    פְלִשְׁתִּים֙ אֶת אֲר֣וֹן יְהוָ֔ה רְד֕וּ הַעֲל֥וּ אֹת֖/וֹ אֲלֵי/כֶֽם־־־׃
translation:
  text: So they sent messengers to the inhabitants of Kiriath-jearim, saying, “The
    Philistines have returned the ark of the LORD. Come down; bring it up to yourselves.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Go down; bring it up to you.' The Hebrew uses topographical verbs ('go/come
      down' ... 'bring up'), likely reflecting the terrain between Beth-shemesh and
      Kiriath-jearim.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלְחוּ
  chosen: So they sent
  alternatives:
  - And they sent
  lexicon: HALOT
  rationale: Wayyiqtol narrative form advances the storyline. 'So they sent' gives
    natural English narrative flow while preserving the sequential sense.
- source_word: מַלְאָכִים
  chosen: messengers
  alternatives:
  - envoys
  - angels
  lexicon: HALOT
  rationale: In this human communication context, 'messengers' is the plain sense;
    'angels' would be misleading in English.
- source_word: יוֹשְׁבֵי קִרְיַת יְעָרִים
  chosen: the inhabitants of Kiriath-jearim
  alternatives:
  - those living in Kiriath-jearim
  - the residents of Kiriath-jearim
  lexicon: HALOT
  rationale: The construct with participle literally means 'the dwellers/inhabitants
    of.' 'Inhabitants' is concise and natural. The place name is transliterated per
    project policy.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - to say
  lexicon: HALOT
  rationale: Standard rendering introducing direct speech.
- source_word: הֵשִׁבוּ
  chosen: have returned
  alternatives:
  - returned
  - brought back
  - sent back
  lexicon: HALOT
  rationale: Hiphil of שוב here means 'cause to return/bring back.' English present
    perfect fits the reported completed action with present relevance.
- source_word: פְלִשְׁתִּים
  chosen: the Philistines
  lexicon: HALOT
  rationale: Standard ethnic designation with article supplied naturally in English.
- source_word: אֲרוֹן יְהוָה
  chosen: the ark of the LORD
  alternatives:
  - the ark of Yahweh
  lexicon: HALOT
  rationale: Construct phrase rendered directly. Per doctrine, יְהוָה is rendered
    'the LORD' rather than a transliteration.
- source_word: רְדוּ
  chosen: Come down
  alternatives:
  - Go down
  - Descend
  lexicon: HALOT
  rationale: Imperative of ירד. 'Come down' fits the summons from the speakers' perspective
    and reads naturally in direct address; the topographical sense is retained.
- source_word: הַעֲלוּ אֹתוֹ אֲלֵיכֶם
  chosen: bring it up to yourselves
  alternatives:
  - take it up to you
  - bring it up to you
  lexicon: HALOT
  rationale: Hiphil of עלה means 'bring up.' The phrase reflects movement to Kiriath-jearim,
    likely uphill/topographically. 'To yourselves' preserves אֲלֵיכֶם more explicitly
    than simply 'to you,' though the sense is idiomatic invitation to receive the
    ark.
