id: 1SA.6.16
reference: 1 Samuel 6:16
source:
  edition: WLC
  text: וַ/חֲמִשָּׁ֥ה סַרְנֵֽי פְלִשְׁתִּ֖ים רָא֑וּ וַ/יָּשֻׁ֥בוּ עֶקְר֖וֹן בַּ/יּ֥וֹם
    הַ/הֽוּא־׃ס
translation:
  text: When the five rulers of the Philistines saw it, they returned to Ekron that
    same day.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or: "on that day."'
    reason: lexical_alternative
  - marker: b
    text: The Philistine title סַרְנֵי is also often rendered "lords."
    reason: lexical_alternative
lexical_decisions:
- source_word: וַ/חֲמִשָּׁה
  chosen: the five
  alternatives:
  - five
  lexicon: HALOT
  rationale: Cardinal numeral modifying the following construct chain. English idiom
    naturally uses the article here because these are the known five Philistine rulers
    already in view in the narrative.
- source_word: סַרְנֵי
  chosen: rulers
  alternatives:
  - lords
  - princes
  - chiefs
  lexicon: HALOT
  rationale: סֶרֶן is the standard title for the Philistine city rulers. 'Rulers'
    communicates political authority in clear modern English without the archaic feel
    of 'lords,' while preserving the official status.
- source_word: פְלִשְׁתִּים
  chosen: of the Philistines
  alternatives:
  - Philistine
  lexicon: HALOT
  rationale: 'Genitive plural completing the construct phrase: ''rulers of the Philistines.'''
- source_word: רָאוּ
  chosen: saw it
  alternatives:
  - saw
  lexicon: HALOT
  rationale: The Hebrew verb simply says 'saw,' but English normally supplies the
    object from context. The implied object is the event/action just narrated, especially
    the ark's arrival and the offering of the cart and cattle. Supplying 'it' avoids
    awkwardness without adding interpretive content beyond the immediate context.
- source_word: וַ/יָּשֻׁבוּ
  chosen: they returned
  alternatives:
  - they went back
  - they turned back
  lexicon: HALOT
  rationale: Wayyiqtol of שוב in narrative sequence. 'Returned' is the most natural
    concise rendering in context.
- source_word: עֶקְרוֹן
  chosen: to Ekron
  lexicon: HALOT
  rationale: Place name transliterated per translation philosophy. Although the Hebrew
    lacks an explicit preposition, verbs of motion commonly take the destination directly;
    English requires 'to.'
- source_word: בַּ/יּוֹם הַ/הוּא
  chosen: that same day
  alternatives:
  - on that day
  lexicon: HALOT
  rationale: Literally 'on that day.' In English narrative, 'that same day' better
    conveys the immediate temporal sense intended here.
