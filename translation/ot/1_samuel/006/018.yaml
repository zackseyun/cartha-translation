id: 1SA.6.18
reference: 1 Samuel 6:18
source:
  edition: WLC
  text: וְ/עַכְבְּרֵ֣י הַ/זָּהָ֗ב מִסְפַּ֞ר כָּל עָרֵ֤י פְלִשְׁתִּים֙ לַ/חֲמֵ֣שֶׁת הַ/סְּרָנִ֔ים מֵ/עִ֣יר מִבְצָ֔ר וְ/עַ֖ד כֹּ֣פֶר הַ/פְּרָזִ֑י וְ/עַ֣ד אָבֵ֣ל הַ/גְּדוֹלָ֗ה אֲשֶׁ֨ר הִנִּ֤יחוּ עָלֶ֨י/הָ֙ אֵ֚ת אֲר֣וֹן יְהוָ֔ה עַ֚ד הַ/יּ֣וֹם הַ/זֶּ֔ה בִּ/שְׂדֵ֥ה יְהוֹשֻׁ֖עַ בֵּֽית הַשִּׁמְשִֽׁי־׀־׃
translation:
  text: and the golden mice, according to the number of all the cities of the Philistines belonging to the five rulers, from fortified city to unwalled village, and as far as the great stone on which they set down the ark of Yahweh, which remains to this day in the field of Joshua the Beth-shemite.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly 'and as far as Great Abel,' taking the Hebrew as a place-name rather than 'the great stone.'
    reason: alternative_reading
lexical_decisions:
- source_word: עַכְבְּרֵי הַזָּהָב
  chosen: the golden mice
  alternatives:
  - the gold mice
  - the golden rats
  lexicon: HALOT
  rationale: עַכְבָּר ordinarily denotes 'mouse' or 'rat'; 'mice' is the conventional and sufficiently broad English rendering here for the plague-images. 'Golden' is the natural adjectival rendering of the genitive construction.
- source_word: מִסְפַּר כָּל עָרֵי פְלִשְׁתִּים
  chosen: according to the number of all the cities of the Philistines
  alternatives:
  - equal to the number of all the Philistine cities
  lexicon: HALOT
  rationale: מִסְפַּר introduces correspondence in quantity; 'according to the number of' preserves the formal sense while remaining readable.
- source_word: לַחֲמֵשֶׁת הַסְּרָנִים
  chosen: belonging to the five rulers
  alternatives:
  - for the five lords
  - of the five governors
  lexicon: HALOT
  rationale: סְרָנִים is the Philistine title for their chief rulers. 'Rulers' is clear modern English; 'lords' is traditional but can sound feudal and potentially overread. 'Belonging to' captures the relation of the cities to the five Philistine rulers.
- source_word: מֵעִיר מִבְצָר וְעַד כֹּפֶר הַפְּרָזִי
  chosen: from fortified city to unwalled village
  alternatives:
  - from fortified town to country hamlet
  - from walled city to rural village
  lexicon: HALOT
  rationale: The phrase marks the full range of settlements. מִבְצָר is a fortified place; כֹּפֶר הַפְּרָזִי denotes a rural/open village. 'Unwalled village' best preserves the contrast with fortified city.
- source_word: וְעַד אָבֵל הַגְּדוֹלָה
  chosen: and as far as the great stone
  alternatives:
  - and as far as Great Abel
  lexicon: HALOT
  rationale: Although the consonants can be read as a place-name ('Abel'), the immediate relative clause 'on which they set down the ark' strongly supports understanding the phrase as referring to a large stone, likely by a textual/orthographic development reflected in many translations. The main text adopts the contextual sense; the place-name alternative is preserved in a footnote.
- source_word: אֲשֶׁר הִנִּיחוּ עָלֶיהָ אֵת אֲרוֹן יְהוָה
  chosen: on which they set down the ark of the LORD
  alternatives:
  - upon which they placed the ark of the LORD
  lexicon: HALOT
  rationale: הִנִּיחוּ means 'set down, place, rest.' 'Set down' fits the narrative action naturally.
- source_word: עַד הַיּוֹם הַזֶּה
  chosen: which remains to this day
  alternatives:
  - to this day
  lexicon: HALOT
  rationale: This idiom indicates continuing existence at the time of writing. Because English cannot naturally attach 'to this day' directly to 'stone' without a verb, 'which remains to this day' makes the sense explicit.
- source_word: בִּשְׂדֵה יְהוֹשֻׁעַ בֵּית הַשִּׁמְשִׁי
  chosen: in the field of Joshua the Beth-shemite
  alternatives:
  - in the field of Joshua of Beth-shemesh
  lexicon: HALOT
  rationale: בֵּית הַשִּׁמְשִׁי is a gentilicial form, 'the Beth-shemite,' i.e., a man from Beth-shemesh. Transliteration of the place-derived personal designation preserves the Hebrew form.
