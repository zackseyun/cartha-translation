theological_decisions:
- issue: How to render the divine source of the troubling spirit without softening or over-interpreting the Hebrew
  chosen_reading: an evil spirit from the LORD
  alternative_readings:
  - a harmful/distressing spirit from the LORD
  - an evil spirit sent by the LORD
  rationale: The Hebrew explicitly attributes the spirit's source to the LORD. The translation preserves that theological tension rather than resolving it by paraphrase. At the same time, because רָעָה can carry the sense of harmful/distressing as well as evil, that nuance is preserved in a footnote rather than replacing the more literal main-text rendering.
  doctrine_reference: 'Translation philosophy §3 (Preserve theological tension rather than resolve it); Contested terms: יְהוָה → the LORD'
