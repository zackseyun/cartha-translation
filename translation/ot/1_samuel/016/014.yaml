id: 1SA.16.14
reference: 1 Samuel 16:14
source:
  edition: WLC
  text: וְ/ר֧וּחַ יְהוָ֛ה סָ֖רָה מֵ/עִ֣ם שָׁא֑וּל וּ/בִֽעֲתַ֥תּ/וּ רֽוּחַ רָעָ֖ה מֵ/אֵ֥ת יְהוָֽה־׃
translation:
  text: Now the Spirit of Yahweh had departed from Saul, and an evil spirit from Yahweh terrified him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a harmful spirit' or 'a distressing spirit.' The Hebrew adjective can denote what is evil, harmful, or calamitous in effect.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/ר֧וּחַ יְהוָ֛ה
  chosen: the Spirit of the LORD
  alternatives:
  - the spirit of the LORD
  - the רוח of the LORD
  lexicon: HALOT
  rationale: רוּחַ can mean spirit, wind, or breath. In this narrative context, referring to the empowering divine presence previously given to Saul, 'Spirit' is the most natural English rendering. Per doctrine, יְהוָה is rendered 'the LORD.' Capitalizing 'Spirit' reflects the referent as God's Spirit rather than an impersonal force.
- source_word: סָ֖רָה מֵ/עִ֣ם
  chosen: had departed from
  alternatives:
  - turned aside from
  - left
  - withdrawn from
  lexicon: HALOT
  rationale: The verb סוּר commonly means 'turn aside,' 'depart,' or 'remove oneself.' With מֵעִם ('from being with'), 'had departed from' communicates the loss of divine presence in idiomatic English while preserving the sense of withdrawal.
- source_word: שָׁא֑וּל
  chosen: Saul
  rationale: Standard English transliteration of the personal name.
- source_word: וּ/בִֽעֲתַ֥תּ/וּ
  chosen: terrified him
  alternatives:
  - tormented him
  - frightened him
  - alarmed him
  lexicon: HALOT
  rationale: The verb בעת denotes sudden terror or frightening. 'Terrified him' best captures the acute sense of dread in accessible modern English. 'Tormented' is possible in broader contextual interpretation, but the lexical core is fear/terror.
- source_word: רֽוּחַ רָעָ֖ה
  chosen: an evil spirit
  alternatives:
  - a harmful spirit
  - a distressing spirit
  - a bad spirit
  lexicon: HALOT
  rationale: רָעָה can denote moral evil, harm, or distress. 'Evil spirit' is the most direct and traditional rendering, and it fits the Hebrew succinctly. Because English readers may hear either moral or harmful nuance, an alternative is preserved in a footnote.
- source_word: מֵ/אֵ֥ת יְהוָֽה
  chosen: from the LORD
  alternatives:
  - from before the LORD
  - sent by the LORD
  lexicon: HALOT
  rationale: מֵאֵת indicates source/origin 'from' or 'from with.' 'From the LORD' is the plainest rendering. 'Sent by the LORD' is interpretive and goes beyond the explicit wording, so it is not used in the main text.
