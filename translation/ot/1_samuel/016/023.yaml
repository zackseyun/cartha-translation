id: 1SA.16.23
reference: 1 Samuel 16:23
source:
  edition: WLC
  text: וְ/הָיָ֗ה בִּֽ/הְי֤וֹת רֽוּחַ אֱלֹהִים֙ אֶל שָׁא֔וּל וְ/לָקַ֥ח דָּוִ֛ד אֶת
    הַ/כִּנּ֖וֹר וְ/נִגֵּ֣ן בְּ/יָד֑/וֹ וְ/רָוַ֤ח לְ/שָׁאוּל֙ וְ/ט֣וֹב ל֔/וֹ וְ/סָ֥רָה
    מֵ/עָלָ֖י/ו ר֥וּחַ הָ/רָעָֽה־־־׃פ
translation:
  text: And whenever the spirit of God came upon Saul, David would take the lyre and
    play it with his hand; then Saul found relief, and it was well with him, and the
    harmful spirit departed from him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the harp.' The Hebrew kinnor refers to an ancient stringed instrument,
      likely more like a lyre than a modern harp.
    reason: lexical_alternative
  - marker: b
    text: Or, 'the evil spirit.' The Hebrew can mean 'evil' or 'harmful'; here the
      sense may emphasize the spirit's distressing effect on Saul.
    reason: lexical_alternative
  - marker: c
    text: The first clause reads 'the spirit of God,' while the final clause reads
      'the harmful spirit.' The translation preserves the wording distinction found
      in the Hebrew rather than harmonizing the two expressions.
    reason: alternative_reading
lexical_decisions:
- source_word: וְהָיָה בִּהְיוֹת
  chosen: And whenever ... came
  alternatives:
  - And it happened when ... was
  - And when ... came to pass
  lexicon: HALOT
  rationale: The construction with היה + infinitive construct introduces a recurring
    circumstance, not merely a one-time event. 'Whenever' captures the iterative sense
    in natural English better than a wooden 'and it happened when.'
- source_word: רוּחַ אֱלֹהִים
  chosen: the spirit of God
  alternatives:
  - an evil spirit from God
  - a spirit of God
  lexicon: HALOT
  rationale: The Hebrew here is simply 'spirit of God'; the adjective 'harmful/evil'
    appears only later in the verse for the departing spirit. Rendering the phrase
    directly avoids importing wording from nearby verses into this clause.
- source_word: אֶל שָׁאוּל
  chosen: came upon Saul
  alternatives:
  - was upon Saul
  - came to Saul
  lexicon: HALOT
  rationale: With רוח plus אֶל in this narrative context, English idiom favors 'came
    upon' to express the spirit's onset affecting Saul.
- source_word: הַכִּנּוֹר
  chosen: the lyre
  alternatives:
  - the harp
  lexicon: HALOT
  rationale: כִּנּוֹר denotes an ancient stringed instrument more precisely represented
    by 'lyre' than the broader traditional 'harp.' This follows original-language
    primacy over translation tradition.
- source_word: וְנִגֵּן בְּיָדוֹ
  chosen: and play it with his hand
  alternatives:
  - and play with his hand
  - and make music by his hand
  lexicon: HALOT
  rationale: נגן means to play a stringed instrument. The object 'it' is supplied
    naturally in English from the prior mention of the lyre. 'With his hand' preserves
    the Hebrew expression without awkwardness.
- source_word: וְרָוַח לְשָׁאוּל
  chosen: then Saul found relief
  alternatives:
  - and Saul was relieved
  - and there was relief for Saul
  lexicon: HALOT
  rationale: The verb conveys relief or respite. 'Saul found relief' is idiomatic
    and preserves Saul as the experiencer.
- source_word: וְטוֹב לוֹ
  chosen: and it was well with him
  alternatives:
  - and he felt better
  - and it was good for him
  lexicon: HALOT
  rationale: The phrase indicates improved condition or well-being. 'It was well with
    him' is more textually restrained than the more interpretive 'he felt better.'
- source_word: רוּחַ הָרָעָה
  chosen: the harmful spirit
  alternatives:
  - the evil spirit
  - the bad spirit
  lexicon: HALOT
  rationale: רָעָה can denote moral evil or harmful/distressing adversity depending
    on context. Here the emphasis is on the spirit's injurious effect on Saul, so
    'harmful spirit' communicates the sense without over-specifying moral ontology.
- source_word: וְסָרָה מֵעָלָיו
  chosen: departed from him
  alternatives:
  - turned away from him
  - left him
  lexicon: HALOT
  rationale: The verb סור here denotes removal or departure. 'Departed from him' is
    clear and suitably formal for the narrative tone.
