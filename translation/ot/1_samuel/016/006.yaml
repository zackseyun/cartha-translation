id: 1SA.16.6
reference: 1 Samuel 16:6
source:
  edition: WLC
  text: וַ/יְהִ֣י בְּ/בוֹאָ֔/ם וַ/יַּ֖רְא אֶת אֱלִיאָ֑ב וַ/יֹּ֕אמֶר אַ֛ךְ נֶ֥גֶד יְהוָ֖ה מְשִׁיחֽ/וֹ־׃
translation:
  text: When they came in, he saw Eliab and said, “Surely Yahweh’s anointed is before Yahweh.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “Surely the LORD’s Messiah is before him.” The Hebrew word is the same one later used for “Messiah,” but here it refers to the one Samuel assumes the LORD has chosen and anointed.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: When
  alternatives:
  - And it happened
  - And it came to pass
  lexicon: HALOT
  rationale: The waw-consecutive on היה introduces the next event in narrative sequence. In modern English, 'When' smoothly carries the temporal setup together with the following infinitive construct, avoiding archaic formulae like 'it came to pass' while preserving the narrative function.
- source_word: בְּבוֹאָם
  chosen: they came in
  alternatives:
  - their coming
  - they entered
  lexicon: HALOT
  rationale: The preposition ב plus infinitive construct of בוא with 3mp suffix refers to Jesse and his sons arriving. 'They came in' is idiomatic and fits the scene of entering Samuel's presence.
- source_word: וַיַּרְא
  chosen: he saw
  alternatives:
  - he looked at
  lexicon: HALOT
  rationale: Simple narrative verb from ראה. 'He saw' is the most direct rendering and preserves the observational force without adding interpretive nuance.
- source_word: אֶת אֱלִיאָב
  chosen: Eliab
  lexicon: HALOT
  rationale: Direct object marker plus the proper name. The name is transliterated per translation philosophy.
- source_word: וַיֹּאמֶר
  chosen: and said
  alternatives:
  - and thought
  - and said to himself
  lexicon: HALOT
  rationale: The verb אמר normally means 'said.' Although the speech may be internal, the Hebrew does not explicitly mark it as inward speech, so 'said' is retained rather than interpretive expansions.
- source_word: אַךְ
  chosen: Surely
  alternatives:
  - Indeed
  - Certainly
  - Only
  lexicon: HALOT
  rationale: Here אַךְ conveys strong affirmation or confident assumption. 'Surely' best captures Samuel's immediate certainty on seeing Eliab.
- source_word: נֶגֶד
  chosen: before him
  alternatives:
  - before the LORD
  - in front of him
  - standing before him
  lexicon: HALOT
  rationale: נגד commonly means 'in front of, before, in the presence of.' Because the phrase lacks an explicit verb and follows 'the LORD,' the sense is that the LORD's anointed is before the LORD/him. English 'before him' preserves the Hebrew terseness while reflecting the pronominal sense carried by the suffix on 'his anointed.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: מְשִׁיחוֹ
  chosen: his anointed
  alternatives:
  - his Messiah
  lexicon: HALOT
  rationale: The noun means 'anointed one' with 3ms suffix, here referring to the one the LORD would designate as king. In this immediate royal-selection context, 'anointed' is clearer and more natural than 'Messiah,' while still preserving the lexical link.
