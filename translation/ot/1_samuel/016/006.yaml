theological_decisions:
- issue: Rendering מְשִׁיחוֹ in a pre-Davidic royal context
  chosen_reading: his anointed
  alternative_readings:
  - his Messiah
  rationale: Although משיח can underlie the later title 'Messiah,' in this narrative Samuel is identifying the person he assumes the LORD has chosen/anointed as king. Rendering it 'his anointed' preserves the immediate historical sense without importing later christological specificity, while the lexical connection to 'Messiah' is preserved in a footnote.
  doctrine_reference: Translate titles; transliterate names. Original-language primacy over translation tradition.
