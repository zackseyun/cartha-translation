id: 1SA.16.9
reference: 1 Samuel 16:9
source:
  edition: WLC
  text: וַ/יַּעֲבֵ֥ר יִשַׁ֖י שַׁמָּ֑ה וַ/יֹּ֕אמֶר גַּם בָּ/זֶ֖ה לֹא בָחַ֥ר יְהוָֽה־־׃
translation:
  text: Then Jesse made Shammah pass by, and he said, “Yahweh has not chosen this one either.”
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיַּעֲבֵר
  chosen: made ... pass by
  alternatives:
  - presented
  - caused ... to pass before
  lexicon: HALOT
  rationale: The Hiphil of עבר is causative, indicating Jesse caused Shammah to pass before Samuel. 'Made ... pass by' preserves the causative sense in natural English.
- source_word: יִשַׁי
  chosen: Jesse
  rationale: Standard English transliteration of the personal name יִשַׁי.
- source_word: שַׁמָּה
  chosen: Shammah
  alternatives:
  - Shamma
  rationale: Standard English transliteration of the personal name שַׁמָּה.
- source_word: וַיֹּאמֶר
  chosen: he said
  alternatives:
  - Samuel said
  lexicon: HALOT
  rationale: The verb itself simply says 'and he said.' In context, the speaker is Samuel, as in the surrounding verses, but English can retain the pronoun naturally without over-specifying beyond the Hebrew wording.
- source_word: גַּם
  chosen: either
  alternatives:
  - also
  - too
  lexicon: HALOT
  rationale: Here גַּם adds this son to the prior rejected candidates. In idiomatic English with a negated clause, 'either' best conveys the additive force.
- source_word: בָּזֶה
  chosen: this one
  alternatives:
  - this
  - even this one
  lexicon: HALOT
  rationale: The demonstrative refers to the son presently under consideration. 'This one' makes the referent explicit in English.
- source_word: לֹא בָחַר
  chosen: has not chosen
  alternatives:
  - did not choose
  - has not selected
  lexicon: HALOT
  rationale: בחר means 'choose/select.' 'Has not chosen' fits the immediate evaluative context and reads naturally in English narrative dialogue.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
