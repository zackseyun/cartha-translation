id: 1SA.16.8
reference: 1 Samuel 16:8
source:
  edition: WLC
  text: וַ/יִּקְרָ֤א יִשַׁי֙ אֶל אֲבִ֣ינָדָ֔ב וַ/יַּעֲבִרֵ֖/הוּ לִ/פְנֵ֣י שְׁמוּאֵ֑ל וַ/יֹּ֕אמֶר גַּם בָּ/זֶ֖ה לֹֽא בָחַ֥ר יְהוָֽה־־־׃
translation:
  text: Then Jesse called Abinadab and made him pass before Samuel. And he said, “Yahweh has not chosen this one either.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''also this one''; rendered idiomatically as ''this one either'' in English.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְרָא
  chosen: called
  alternatives:
  - summoned
  lexicon: HALOT
  rationale: The verb קרא in this context means to call or summon someone. 'Called' is natural modern English and fits the narrative flow without overstating formality.
- source_word: אֶל אֲבִינָדָב
  chosen: Abinadab
  lexicon: HALOT
  rationale: Personal names are transliterated by standard convention per translation philosophy. The preposition אֶל is absorbed idiomatically into English as 'called Abinadab' rather than the more wooden 'called to Abinadab.'
- source_word: וַיַּעֲבִרֵהוּ לִפְנֵי שְׁמוּאֵל
  chosen: made him pass before Samuel
  alternatives:
  - had him pass before Samuel
  - presented him to Samuel
  lexicon: HALOT
  rationale: 'The Hiphil of עבר with object suffix conveys causation: Jesse caused Abinadab to pass before Samuel. ''Made him pass before Samuel'' preserves that causative sense more transparently than the smoother but less explicit ''presented him.'''
- source_word: וַיֹּאמֶר
  chosen: he said
  alternatives:
  - Samuel said
  lexicon: HALOT
  rationale: The subject is implicit in Hebrew. Context from the preceding verse and the content of the statement indicate Samuel is the speaker, but English can preserve the Hebrew's simple narrative style with 'he said.'
- source_word: גַּם בָּזֶה
  chosen: this one either
  alternatives:
  - also this one
  - this one also
  lexicon: HALOT
  rationale: The phrase means 'also/likewise in this one.' In idiomatic English after a negated clause, 'this one either' best captures the additive force of גַּם with the demonstrative.
- source_word: לֹא בָחַר
  chosen: has not chosen
  alternatives:
  - did not choose
  lexicon: HALOT
  rationale: The perfect can be rendered as a present perfect in English to express the current evaluative result of the LORD's decision in this selection scene. 'Has not chosen' reads naturally in context.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
