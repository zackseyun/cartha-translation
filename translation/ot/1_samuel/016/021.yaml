id: 1SA.16.21
reference: 1 Samuel 16:21
source:
  edition: WLC
  text: וַ/יָּבֹ֤א דָוִד֙ אֶל שָׁא֔וּל וַֽ/יַּעֲמֹ֖ד לְ/פָנָ֑י/ו וַ/יֶּאֱהָבֵ֣/הֽוּ
    מְאֹ֔ד וַֽ/יְהִי ל֖/וֹ נֹשֵׂ֥א כֵלִֽים־־׃
translation:
  text: So David came to Saul and stood before him, and Saul loved him greatly, and
    he became his armor-bearer.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his weapons-bearer' or 'bearer of arms.' The Hebrew literally refers
      to one who carries military equipment.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹא
  chosen: came
  alternatives:
  - went
  - entered
  lexicon: HALOT
  rationale: The verb בוא in narrative commonly means 'come' or 'enter.' With אֶל
    שָׁאוּל ('to Saul'), 'came to Saul' is natural English and preserves the movement
    toward Saul without over-specifying entry.
- source_word: וַיַּעֲמֹד לְפָנָיו
  chosen: stood before him
  alternatives:
  - attended him
  - stood in his presence
  lexicon: HALOT
  rationale: The idiom עמד לפני often denotes standing in attendance or service before
    a superior. 'Stood before him' keeps the Hebrew image while allowing the court-service
    nuance to remain implicit.
- source_word: וַיֶּאֱהָבֵהוּ מְאֹד
  chosen: Saul loved him greatly
  alternatives:
  - he loved him very much
  lexicon: HALOT
  rationale: The subject is Saul from context. 'Loved him greatly' is a natural rendering
    of אהב + מאד and preserves the strong personal favor without sentimentalizing
    it.
- source_word: וַיְהִי לוֹ
  chosen: he became his
  alternatives:
  - he was to him
  - he came to be his
  lexicon: HALOT
  rationale: The construction marks a resulting state or appointment. 'Became his'
    reads smoothly in English and fits the transition into official service.
- source_word: נֹשֵׂא כֵלִים
  chosen: armor-bearer
  alternatives:
  - weapons-bearer
  - bearer of arms
  lexicon: HALOT
  rationale: This is a conventional military/court title for one who carries a warrior's
    equipment. 'Armor-bearer' is the standard and clearest English equivalent, more
    idiomatic than the overly literal 'bearer of weapons/gear'.
