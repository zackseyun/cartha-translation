id: 1SA.16.7
reference: 1 Samuel 16:7
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר יְהוָ֜ה אֶל שְׁמוּאֵ֗ל אַל תַּבֵּ֧ט אֶל מַרְאֵ֛/הוּ וְ/אֶל גְּבֹ֥הַּ קוֹמָת֖/וֹ כִּ֣י מְאַסְתִּ֑י/הוּ כִּ֣י לֹ֗א אֲשֶׁ֤ר יִרְאֶה֙ הָ/אָדָ֔ם כִּ֤י הָֽ/אָדָם֙ יִרְאֶ֣ה לַ/עֵינַ֔יִם וַ/יהוָ֖ה יִרְאֶ֥ה לַ/לֵּבָֽב־־־־׀׃
translation:
  text: But Yahweh said to Samuel, “Do not look at his appearance or at the height of his stature, because I have rejected him. For not as man sees does God see, for man sees what is before the eyes, but Yahweh sees the heart.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'For not what man sees'; the Hebrew is elliptical, and the sense is that the LORD's way of seeing differs from man's.
    reason: lexical_alternative
  - marker: b
    text: '''Man'' here is generic, referring to human beings in general.'
    reason: lexical_alternative
  - marker: c
    text: Or 'For the LORD does not see as man sees, for man sees'.
    reason: previous_rendering
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: תַּבֵּט
  chosen: look
  alternatives:
  - gaze
  - regard
  lexicon: HALOT
  rationale: The verb נבט here is a prohibition against fixing attention on outward features. 'Look' is natural English and fits the immediate context without over-intensifying.
- source_word: מַרְאֵהוּ
  chosen: his appearance
  alternatives:
  - his look
  - his outward appearance
  lexicon: HALOT
  rationale: מַרְאֶה commonly denotes visible appearance. 'His appearance' is idiomatic and pairs well with the following reference to stature.
- source_word: גְּבֹהַּ קוֹמָתוֹ
  chosen: the height of his stature
  alternatives:
  - his tall stature
  - the loftiness of his height
  lexicon: HALOT
  rationale: This phrase emphasizes physical tallness. 'The height of his stature' preserves the Hebrew's somewhat formal phrasing while remaining readable.
- source_word: מְאַסְתִּיהוּ
  chosen: I have rejected him
  alternatives:
  - I have refused him
  - I have despised him
  lexicon: HALOT
  rationale: מאס in this selection context means to reject or refuse as unsuitable. 'Rejected' best matches the narrative context of kingship selection.
- source_word: הָאָדָם
  chosen: man
  alternatives:
  - humankind
  - a person
  lexicon: HALOT
  rationale: Per DOCTRINE.md, אָדָם is rendered 'man / humankind' according to context. Here the singular generic contrasts human perception with the LORD's perception, so 'man' preserves the representative force of the Hebrew.
- source_word: לֹא אֲשֶׁר יִרְאֶה הָאָדָם
  chosen: the LORD does not see as man sees
  alternatives:
  - it is not as man sees
  - not according to what man sees
  lexicon: HALOT
  rationale: The Hebrew is elliptical ('for not what man sees'). English requires some expansion. Supplying 'the LORD does not see as man sees' makes the contrast explicit from context and preserves the sense without paraphrastic excess.
- source_word: לַעֵינַיִם
  chosen: what is before the eyes
  alternatives:
  - the outward appearance
  - what the eyes can see
  lexicon: HALOT
  rationale: Literally 'to/for the eyes.' Rather than flattening it to the interpretive gloss 'outward appearance,' 'what is before the eyes' preserves the Hebrew imagery while remaining clear.
- source_word: לַלֵּבָב
  chosen: the heart
  alternatives:
  - the inner person
  - the mind
  lexicon: HALOT
  rationale: לֵבָב in Hebrew denotes the inner center of thought, will, and disposition. 'The heart' is the standard and theologically resonant rendering, with the fuller Hebrew sense understood.
