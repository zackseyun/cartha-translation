theological_decisions:
- issue: Nature of the anointing
  chosen_reading: Retain 'anoint' as a formal act of consecration without specifying
    kingship in the verse itself.
  alternative_readings:
  - Interpret explicitly as anointing a king
  rationale: The immediate context implies royal anointing, but this verse itself
    does not state the office. The translation preserves the text's wording and lets
    the narrative context supply the implication.
  doctrine_reference: 'Translation philosophy: Never import doctrinal claims the text
    does not make.'
