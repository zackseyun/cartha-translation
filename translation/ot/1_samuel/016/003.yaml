id: 1SA.16.3
reference: 1 Samuel 16:3
source:
  edition: WLC
  text: וְ/קָרָ֥אתָ לְ/יִשַׁ֖י בַּ/זָּ֑בַח וְ/אָֽנֹכִ֗י אוֹדִֽיעֲ/ךָ֙ אֵ֣ת אֲשֶֽׁר
    תַּעֲשֶׂ֔ה וּ/מָשַׁחְתָּ֣ לִ֔/י אֵ֥ת אֲשֶׁר אֹמַ֖ר אֵלֶֽי/ךָ־־׃
translation:
  text: Invite Jesse to the sacrifice, and I will make known to you what you shall
    do; and you shall anoint for me the one whom I tell you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'summon Jesse for the sacrifice.'
    reason: lexical_alternative
  - marker: b
    text: Or 'I will show you what you are to do.'
    reason: lexical_alternative
  - marker: c
    text: Or 'you shall anoint for me whomever I tell you.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְקָרָאתָ
  chosen: Invite
  alternatives:
  - call
  - summon
  lexicon: HALOT
  rationale: קרא in this context means to call/invite someone to an event. 'Invite'
    fits the sacrificial setting in natural English better than the more wooden 'call,'
    while preserving the directive force.
- source_word: לְיִשַׁי
  chosen: Jesse
  rationale: Personal name transliterated by standard English convention, per translation
    philosophy.
- source_word: בַּזָּבַח
  chosen: to the sacrifice
  alternatives:
  - for the sacrifice
  - to the sacrificial feast
  lexicon: HALOT
  rationale: זבח refers to the sacrificial act/occasion. With קרא, the phrase naturally
    means inviting Jesse to participate in the sacrifice. 'To the sacrifice' is concise
    and sufficiently literal.
- source_word: וְאָנֹכִי
  chosen: and I
  alternatives:
  - and I myself
  lexicon: HALOT
  rationale: The independent pronoun adds emphasis. English can reflect this adequately
    with 'and I' without overemphasizing.
- source_word: אוֹדִיעֲךָ
  chosen: will make known to you
  alternatives:
  - will show you
  - will tell you
  lexicon: HALOT
  rationale: Hiphil of ידע means to cause to know, inform, make known. 'Make known
    to you' preserves the causative nuance more closely than simply 'tell you'.
- source_word: אֵת אֲשֶׁר תַּעֲשֶׂה
  chosen: what you shall do
  alternatives:
  - what you must do
  - that which you shall do
  lexicon: HALOT
  rationale: This clause specifies Samuel's instructed action. 'What you shall do'
    is natural and retains the future/instructional sense without adding undue force.
- source_word: וּמָשַׁחְתָּ
  chosen: and you shall anoint
  alternatives:
  - then you shall anoint
  lexicon: HALOT
  rationale: משׁח is the standard verb for anointing, especially in royal consecration
    contexts. 'Anoint' preserves the theological and narrative significance.
- source_word: לִי
  chosen: for me
  alternatives:
  - to me
  lexicon: HALOT
  rationale: The preposition here indicates that Samuel's anointing is done on God's
    behalf/for God's purpose. 'For me' best captures the sense in idiomatic English.
- source_word: אֵת אֲשֶׁר אֹמַר אֵלֶיךָ
  chosen: the one whom I tell you
  alternatives:
  - whomever I say to you
  - the one I name to you
  lexicon: HALOT
  rationale: The Hebrew leaves the object implicit until the relative clause identifies
    the person. 'The one whom I tell you' communicates that God will specify the individual.
    'Name' is possible but slightly more interpretive than the Hebrew verb 'say/tell'.
