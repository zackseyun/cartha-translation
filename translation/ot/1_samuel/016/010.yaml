id: 1SA.16.10
reference: 1 Samuel 16:10
source:
  edition: WLC
  text: וַ/יַּעֲבֵ֥ר יִשַׁ֛י שִׁבְעַ֥ת בָּנָ֖י/ו לִ/פְנֵ֣י שְׁמוּאֵ֑ל וַ/יֹּ֤אמֶר
    שְׁמוּאֵל֙ אֶל יִשַׁ֔י לֹא בָחַ֥ר יְהוָ֖ה בָּ/אֵֽלֶּה־־׃
translation:
  text: So Jesse had seven of his sons pass before Samuel, and Samuel said to Jesse,
    “The LORD has not chosen any of these.”
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיַּעֲבֵר
  chosen: had ... pass before
  alternatives:
  - made ... pass before
  - presented before
  lexicon: HALOT
  rationale: 'The Hiphil of עבר here is causative: Jesse caused his sons to pass before
    Samuel one by one. ''Had ... pass before'' is natural English that preserves the
    causative sense better than the flatter ''passed.'''
- source_word: שִׁבְעַת בָּנָיו
  chosen: seven of his sons
  alternatives:
  - his seven sons
  lexicon: HALOT
  rationale: The construct phrase straightforwardly means 'seven of his sons.' In
    English, 'seven of his sons' reads naturally in context and avoids implying a
    complete total if readers are not tracking the wider narrative.
- source_word: לִפְנֵי
  chosen: before
  alternatives:
  - in front of
  - before the presence of
  lexicon: HALOT
  rationale: Standard spatial/relational rendering. 'Before' is idiomatic and fits
    the formal setting of presentation to Samuel.
- source_word: לֹא בָחַר
  chosen: has not chosen
  alternatives:
  - did not choose
  - has not selected
  lexicon: HALOT
  rationale: בחר means 'choose/select.' 'Chosen' preserves the covenantal and evaluative
    nuance better than 'selected.' The English present perfect fits Samuel's conclusion
    about the candidates just presented, though simple past would also be possible.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD,' following established reverential convention and the pattern reflected
    in the Septuagint.
- source_word: בָּאֵלֶּה
  chosen: any of these
  alternatives:
  - these
  - among these
  lexicon: HALOT
  rationale: The preposition ב with the demonstrative can be rendered woodenly as
    'in/among these,' but in this context Samuel means that none among the presented
    sons is the chosen one. 'Any of these' makes that exclusion explicit in natural
    English without adding meaning beyond the idiom.
