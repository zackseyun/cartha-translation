id: 1SA.16.17
reference: 1 Samuel 16:17
source:
  edition: WLC
  text: וַ/יֹּ֥אמֶר שָׁא֖וּל אֶל עֲבָדָ֑י/ו רְאוּ נָ֣א לִ֗/י אִ֚ישׁ מֵיטִ֣יב לְ/נַגֵּ֔ן
    וַ/הֲבִיאוֹתֶ֖ם אֵלָֽ/י־־׃
translation:
  text: Then Saul said to his servants, “Please find for me a man who plays well,
    and bring him to me.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''a man doing well at playing''; that is, a man who plays skillfully.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: Then ... said
  alternatives:
  - And ... said
  - So ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then' gives natural English
    narrative flow while preserving sequence better than a bare 'and.'
- source_word: עֲבָדָיו
  chosen: his servants
  alternatives:
  - his attendants
  - his officials
  lexicon: HALOT
  rationale: עֶבֶד commonly means 'servant' or 'servants.' In a royal court context
    these are Saul's court servants/attendants, but 'servants' stays closer to the
    Hebrew and remains natural English.
- source_word: רְאוּ נָא
  chosen: Please find
  alternatives:
  - See now
  - Please look for
  - Please see to it
  lexicon: HALOT
  rationale: ראה in the imperative with נָא here functions idiomatically as a polite
    request to seek out or identify someone. 'Please find' captures both the imperative
    force and the politeness particle in idiomatic English.
- source_word: לִי
  chosen: for me
  alternatives:
  - to me
  lexicon: HALOT
  rationale: 'The preposition marks benefit or interest: Saul wants someone procured
    for his use. ''For me'' best reflects that sense.'
- source_word: אִישׁ
  chosen: a man
  alternatives:
  - someone
  - a person
  lexicon: HALOT
  rationale: The Hebrew is singular masculine. Per the translation philosophy's gender-accurate
    principle, 'a man' is retained rather than neutralizing to 'someone' or 'person.'
- source_word: מֵיטִיב לְנַגֵּן
  chosen: who plays well
  alternatives:
  - skillful at playing
  - good at playing
  - who is skilled in playing
  lexicon: HALOT
  rationale: Literally 'doing well at playing.' The phrase describes musical competence.
    'Who plays well' is concise, natural, and faithful to the sense without over-specifying
    the instrument in this verse.
- source_word: וַהֲבִיאוֹתֶם אֵלַי
  chosen: and bring him to me
  alternatives:
  - then bring him to me
  - and have him brought to me
  lexicon: HALOT
  rationale: The form is a plural imperative/hortatory command to Saul's servants.
    'Bring him to me' is the straightforward rendering; singular 'him' reflects the
    singular object implied by the prior 'a man.'
