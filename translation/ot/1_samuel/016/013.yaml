theological_decisions:
- issue: Rendering רוּחַ יְהוָה
  chosen_reading: the Spirit of the LORD
  alternative_readings:
  - the spirit of the LORD
  rationale: Because the phrase in this narrative context denotes God's empowering
    presence acting personally and effectively upon David, 'Spirit' is capitalized
    in English to reflect the likely referent while remaining within orthodox Christian
    usage. The Hebrew itself lacks capitalization, so the lowercase alternative is
    preserved as a lexical possibility.
  doctrine_reference: Affirmations; Preserve theological tension rather than resolve
    it
- issue: Public nature of David's anointing
  chosen_reading: in the midst of his brothers
  alternative_readings:
  - privately among his family
  rationale: The text explicitly states that the anointing occurred in the midst of
    David's brothers. The translation preserves this without importing later doctrinal
    or political implications about the extent of public recognition.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition'
