id: 1SA.16.13
reference: 1 Samuel 16:13
source:
  edition: WLC
  text: וַ/יִּקַּ֨ח שְׁמוּאֵ֜ל אֶת קֶ֣רֶן הַ/שֶּׁ֗מֶן וַ/יִּמְשַׁ֣ח אֹת/וֹ֮ בְּ/קֶ֣רֶב
    אֶחָי/ו֒ וַ/תִּצְלַ֤ח רֽוּחַ יְהוָה֙ אֶל דָּוִ֔ד מֵ/הַ/יּ֥וֹם הַ/ה֖וּא וָ/מָ֑עְלָ/ה
    וַ/יָּ֣קָם שְׁמוּאֵ֔ל וַ/יֵּ֖לֶךְ הָ/רָמָֽתָ/ה־־־׃ס
translation:
  text: Then Samuel took the horn of oil and anointed him in the midst of his brothers.
    And the Spirit of the LORD rushed upon David from that day onward. Then Samuel
    rose and went to Ramah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'came powerfully upon David.' The Hebrew verb can denote a forceful,
      empowering coming of the Spirit.
    reason: lexical_alternative
  - marker: b
    text: Or 'the spirit of the LORD rushed upon David.' English capitalization reflects
      interpretation; Hebrew manuscripts do not mark this distinction.
    reason: alternative_reading
lexical_decisions:
- source_word: קֶרֶן הַשֶּׁמֶן
  chosen: the horn of oil
  alternatives:
  - the horn of anointing oil
  - the flask of oil
  lexicon: HALOT
  rationale: קֶרֶן is literally 'horn,' likely an animal horn used as a container.
    Retaining 'horn' preserves the concrete imagery and contrasts with Saul's anointing
    vessel elsewhere. 'Of oil' is a natural rendering of the construct phrase.
- source_word: וַיִּמְשַׁח
  chosen: anointed
  alternatives:
  - smeared with oil
  - consecrated
  lexicon: HALOT
  rationale: משׁח is the standard verb for ritual anointing. 'Anointed' preserves
    both the physical act and its royal/theological significance without paraphrase.
- source_word: בְּקֶרֶב אֶחָיו
  chosen: in the midst of his brothers
  alternatives:
  - among his brothers
  - in the presence of his brothers
  lexicon: HALOT
  rationale: בקרב literally means 'in the midst of.' 'His brothers' is gender-accurate
    and contextually precise, since the referents are David's male siblings. This
    keeps the familial and public setting visible.
- source_word: וַתִּצְלַח רוּחַ יְהוָה אֶל דָּוִד
  chosen: the Spirit of the LORD rushed upon David
  alternatives:
  - came powerfully upon David
  - prospered upon David
  lexicon: HALOT
  rationale: צלח with רוּחַ יְהוָה in Samuel commonly denotes a forceful, empowering
    coming of the Spirit. 'Rushed upon' best captures the verb's vividness and narrative
    usage, while avoiding a flatter paraphrase.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the covenant name יְהוָה is rendered 'the LORD'
    in keeping with established reverential convention and the Septuagintal pattern.
- source_word: מֵהַיּוֹם הַהוּא וָמָעְלָה
  chosen: from that day onward
  alternatives:
  - from that day and beyond
  - from that day forward
  lexicon: HALOT
  rationale: The phrase marks the beginning of an ongoing state. 'From that day onward'
    is idiomatic modern English that preserves the durative force.
- source_word: וַיָּקָם
  chosen: rose
  alternatives:
  - got up
  - set out
  lexicon: HALOT
  rationale: קום in narrative sequence is commonly rendered 'rose' or 'got up.' 'Rose'
    is concise and suitably literary without being archaic.
- source_word: הָרָמָתָה
  chosen: to Ramah
  alternatives:
  - to Ramathah
  lexicon: HALOT
  rationale: The directional he indicates motion toward the place. Standard English
    transliteration is 'Ramah,' so 'went to Ramah' communicates the sense naturally.
