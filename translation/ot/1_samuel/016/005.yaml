id: 1SA.16.5
reference: 1 Samuel 16:5
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר שָׁל֗וֹם לִ/זְבֹּ֤חַ לַֽ/יהוָה֙ בָּ֔אתִי הִֽתְקַדְּשׁ֔וּ וּ/בָאתֶ֥ם
    אִתִּ֖/י בַּ/זָּ֑בַח וַ/יְקַדֵּ֤שׁ אֶת יִשַׁי֙ וְ/אֶת בָּנָ֔י/ו וַ/יִּקְרָ֥א לָ/הֶ֖ם
    לַ/זָּֽבַח׀־־׃
translation:
  text: He said, “Peace. I have come to sacrifice to the LORD. Consecrate yourselves,
    and come with me to the sacrifice.” And he consecrated Jesse and his sons and
    invited them to the sacrifice.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'All is well' / 'In peace.' The Hebrew is simply 'Peace,' an assurance
      that Samuel's coming is not hostile.
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁלוֹם
  chosen: Peace
  alternatives:
  - In peace
  - All is well
  lexicon: HALOT
  rationale: In this context Samuel is answering whether his coming is peaceable (v.
    4). The bare noun functions idiomatically as an assurance of peaceful intent.
    'Peace' is concise and natural in direct speech, while preserving the Hebrew term's
    semantic range better than the more interpretive 'All is well.'
- source_word: לִזְבֹּחַ לַיהוָה
  chosen: to sacrifice to the LORD
  alternatives:
  - to offer a sacrifice to the LORD
  - to sacrifice for the LORD
  lexicon: HALOT
  rationale: 'The infinitive זבח with ל marks purpose: Samuel came in order to perform
    sacrificial worship. ''To sacrifice to the LORD'' is idiomatic and sufficiently
    formal; ''offer a sacrifice'' is possible but slightly more expansive than the
    Hebrew wording. The divine name is rendered ''the LORD'' per doctrine for יְהוָה.'
- source_word: בָּאתִי
  chosen: I have come
  alternatives:
  - I came
  lexicon: HALOT
  rationale: The perfect here explains Samuel's present purpose. English present perfect
    fits the immediate explanatory force in dialogue better than simple past.
- source_word: הִתְקַדְּשׁוּ
  chosen: Consecrate yourselves
  alternatives:
  - Sanctify yourselves
  - Purify yourselves
  lexicon: HALOT
  rationale: The hitpael of קדשׁ here refers to ritual preparation for participation
    in sacrifice. 'Consecrate yourselves' preserves the cultic sense without archaic
    tone. 'Purify yourselves' narrows the meaning to cleansing, while the Hebrew includes
    setting apart for holy participation.
- source_word: וּבָאתֶם אִתִּי בַּזָּבַח
  chosen: and come with me to the sacrifice
  alternatives:
  - and you shall come with me to the sacrifice
  - and attend the sacrifice with me
  lexicon: HALOT
  rationale: The sequence is an invitation/instruction following ritual preparation.
    'Come with me to the sacrifice' is natural modern English and preserves the directional
    sense of בוא plus the definite sacrificial event.
- source_word: וַיְקַדֵּשׁ
  chosen: he consecrated
  alternatives:
  - he sanctified
  - he made holy
  lexicon: HALOT
  rationale: The piel of קדשׁ here indicates Samuel's act of setting Jesse and his
    sons apart ritually for the sacrificial occasion. 'Consecrated' best matches the
    cultic context.
- source_word: וַיִּקְרָא לָהֶם לַזָּבַח
  chosen: invited them to the sacrifice
  alternatives:
  - called them to the sacrifice
  - summoned them to the sacrifice
  lexicon: HALOT
  rationale: קרא + ל can mean call/invite/summon. In this context, after consecrating
    them, Samuel includes them in the sacrificial meal/rite. 'Invited' communicates
    inclusion without implying coercive summons, and reads naturally in English.
- source_word: יִשַׁי
  chosen: Jesse
  rationale: Personal name transliterated by standard English convention, following
    project policy to transliterate names.
- source_word: בָּנָיו
  chosen: his sons
  alternatives:
  - his children
  lexicon: HALOT
  rationale: The Hebrew explicitly specifies male offspring. 'His sons' is gender-accurate
    and contextually important because the narrative concerns Jesse's sons being presented
    before Samuel.
