id: 1SA.16.12
reference: 1 Samuel 16:12
source:
  edition: WLC
  text: וַ/יִּשְׁלַ֤ח וַ/יְבִיאֵ֨/הוּ֙ וְ/ה֣וּא אַדְמוֹנִ֔י עִם יְפֵ֥ה עֵינַ֖יִם וְ/ט֣וֹב
    רֹ֑אִי וַ/יֹּ֧אמֶר יְהוָ֛ה ק֥וּם מְשָׁחֵ֖/הוּ כִּֽי זֶ֥ה הֽוּא־פ־׃
translation:
  text: So he sent and brought him in. Now he was ruddy, with beautiful eyes and a
    handsome appearance. And the LORD said, “Rise, anoint him, for this is he.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “for this is the one.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלַח
  chosen: So he sent
  alternatives:
  - Then he sent
  - And he sent
  lexicon: HALOT
  rationale: Wayyiqtol advances the narrative. 'So' gives natural English narrative
    flow while preserving the sequential force.
- source_word: וַיְבִיאֵהוּ
  chosen: and brought him in
  alternatives:
  - and had him brought in
  - and brought him
  lexicon: HALOT
  rationale: The verb בוא in Hiphil means 'bring.' 'Brought him in' fits the immediate
    scene of summoning David into Samuel's presence.
- source_word: אַדְמוֹנִי
  chosen: ruddy
  alternatives:
  - reddish
  - red-haired
  lexicon: HALOT
  rationale: Traditional and lexically sound rendering for a reddish complexion or
    coloring. 'Red-haired' is too specific; the Hebrew does not require hair color.
- source_word: עִם יְפֵה עֵינַיִם
  chosen: with beautiful eyes
  alternatives:
  - with fine eyes
  - with lovely eyes
  lexicon: HALOT
  rationale: Literally 'with beautiful of eyes/beautiful eyes.' 'Beautiful eyes' is
    idiomatic and preserves the descriptive force without awkwardness.
- source_word: וְטוֹב רֹאִי
  chosen: and a handsome appearance
  alternatives:
  - and good in appearance
  - and handsome to look at
  lexicon: HALOT
  rationale: The phrase denotes pleasing appearance. 'A handsome appearance' is natural
    modern English and keeps the focus on outward appearance.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD.'
- source_word: קוּם
  chosen: Rise
  alternatives:
  - Get up
  - Arise
  lexicon: HALOT
  rationale: Imperative to Samuel. 'Rise' is concise, dignified, and natural in direct
    divine speech.
- source_word: מְשָׁחֵהוּ
  chosen: anoint him
  lexicon: HALOT
  rationale: Direct imperative from משׁח. 'Anoint him' is the standard and precise
    rendering in this royal-selection context.
- source_word: כִּי זֶה הוּא
  chosen: for this is he
  alternatives:
  - for this is the one
  - because this is he
  lexicon: HALOT
  rationale: The Hebrew is brief and emphatic. 'This is he' preserves the terseness
    and force of divine identification better than the more interpretive 'this is
    the one.'
