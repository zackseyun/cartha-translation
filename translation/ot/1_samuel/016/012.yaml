theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project doctrine specifies 'the LORD' as the default rendering, following
    Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Description of David's appearance
  chosen_reading: Retain the physical description without softening or overinterpreting
    it
  alternative_readings:
  - Interpret אַדְמוֹנִי specifically as hair color
  - Expand the description to imply moral qualities
  rationale: The verse intentionally notes David's outward appearance while the surrounding
    context distinguishes divine choice from merely human evaluation. The translation
    should preserve the physical description without importing symbolic or moral meaning
    not explicit in the Hebrew.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: Original-language primacy;
    Preserve theological tension rather than resolve it'
