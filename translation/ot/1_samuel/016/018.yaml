id: 1SA.16.18
reference: 1 Samuel 16:18
source:
  edition: WLC
  text: וַ/יַּעַן֩ אֶחָ֨ד מֵ/הַ/נְּעָרִ֜ים וַ/יֹּ֗אמֶר הִנֵּ֨ה רָאִ֜יתִי בֵּ֣ן לְ/יִשַׁי֮
    בֵּ֣ית הַלַּחְמִי֒ יֹדֵ֣עַ נַ֠גֵּן וְ/גִבּ֨וֹר חַ֜יִל וְ/אִ֧ישׁ מִלְחָמָ֛ה וּ/נְב֥וֹן
    דָּבָ֖ר וְ/אִ֣ישׁ תֹּ֑אַר וַ/יהוָ֖ה עִמּֽ/וֹ׃
translation:
  text: Then one of the young men answered and said, “Look, I have seen a son of Jesse
    the Bethlehemite who is skillful in playing, a mighty man of valor, a man of war,
    prudent in speech, and a handsome man, and the LORD is with him.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''the Bethlehemite,'' a gentilic meaning ''from Bethlehem.'''
    reason: lexical_alternative
  - marker: b
    text: Or 'skillful in playing'; the instrument is not named in this verse, though
      the context concerns playing for Saul.
    reason: lexical_alternative
  - marker: c
    text: '''Mighty man of valor'' can also mean ''valiant warrior'' or more broadly
      ''capable man.'''
    reason: lexical_alternative
  - marker: d
    text: Or 'who knows how to play, a mighty man of valor, a man of war, prudent
      in speech, a handsome man'.
    reason: previous_rendering
lexical_decisions:
- source_word: וַיַּעַן
  chosen: answered
  alternatives:
  - responded
  lexicon: HALOT
  rationale: Standard narrative wayyiqtol of ענה in dialogue contexts means 'answered/responded.'
    'Answered' preserves the Hebrew narrative idiom.
- source_word: אֶחָד מֵהַנְּעָרִים
  chosen: one of the young men
  alternatives:
  - one of the servants
  - one of the attendants
  lexicon: HALOT
  rationale: נְעָרִים can denote youths, servants, or attendants depending on context.
    In Saul's court setting, these are likely attendants, but 'young men' stays closer
    to the lexical form without over-interpreting social role.
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: הִנֵּה is a discourse particle drawing attention. 'Look' is natural modern
    English and preserves the deictic force better than archaic 'Behold.'
- source_word: רָאִיתִי
  chosen: I have seen
  alternatives:
  - I saw
  lexicon: HALOT
  rationale: The perfect can be rendered as simple past or present perfect in English.
    'I have seen' fits the speaker's present recommendation based on prior observation.
- source_word: בֵּן לְיִשַׁי
  chosen: a son of Jesse
  alternatives:
  - one of Jesse's sons
  lexicon: HALOT
  rationale: Literal filial expression preserved. 'A son of Jesse' is idiomatic enough
    in English and keeps the Hebrew phrasing.
- source_word: בֵּית הַלַּחְמִי
  chosen: the Bethlehemite
  alternatives:
  - from Bethlehem
  lexicon: HALOT
  rationale: The gentilic form is best represented by 'the Bethlehemite,' preserving
    the Hebrew descriptor attached to Jesse.
- source_word: יֹדֵעַ נַגֵּן
  chosen: who knows how to play
  alternatives:
  - skillful in playing
  - able to play music
  lexicon: HALOT
  rationale: The construction means being skilled at playing an instrument, here in
    context the lyre/harp. 'Knows how to play' is natural and sufficiently specific
    without adding an instrument not named in this verse.
- source_word: גִּבּוֹר חַיִל
  chosen: a mighty man of valor
  alternatives:
  - a valiant warrior
  - a capable man
  - a mighty man
  lexicon: HALOT
  rationale: This stock expression can denote valor, capability, or military prowess.
    Because the next phrase is 'man of war,' retaining 'valor' avoids flattening the
    idiom while preserving its commendatory force.
- source_word: אִישׁ מִלְחָמָה
  chosen: a man of war
  alternatives:
  - a warrior
  - experienced in battle
  lexicon: HALOT
  rationale: A fairly literal rendering preserves the Hebrew expression and its martial
    sense. 'Warrior' is possible, but 'man of war' keeps the parallel structure.
- source_word: נְבוֹן דָּבָר
  chosen: prudent in speech
  alternatives:
  - discerning in matters
  - eloquent
  - sensible in word
  lexicon: HALOT
  rationale: The phrase likely refers to discernment expressed in speaking or counsel.
    'Prudent in speech' captures both understanding and verbal expression better than
    the broader 'discerning in matters.'
- source_word: אִישׁ תֹּאַר
  chosen: a handsome man
  alternatives:
  - a man of good appearance
  - well-formed man
  lexicon: HALOT
  rationale: תֹּאַר refers to form or appearance. 'Handsome man' is concise, natural
    English conveying favorable appearance.
- source_word: וַיהוָה עִמּוֹ
  chosen: and the LORD is with him
  alternatives:
  - and Yahweh is with him
  lexicon: HALOT
  rationale: Per doctrine, יְהוָה is rendered 'the LORD.' The verbless clause is naturally
    rendered with present tense in English, expressing divine favor/presence.
