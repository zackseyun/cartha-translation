theological_decisions:
- issue: Rendering of the divine rejection of Saul
  chosen_reading: since I have rejected him from being king over Israel
  alternative_readings:
  - for I have rejected him from reigning over Israel
  rationale: The translation preserves the text's statement of divine rejection without expanding it into a broader theological claim about Saul's ultimate standing. The issue in context is kingship, not every possible implication of rejection.
  doctrine_reference: Preserve theological tension rather than resolve it.
