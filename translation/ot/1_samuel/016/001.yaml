id: 1SA.16.1
reference: 1 Samuel 16:1
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר יְהוָ֜ה אֶל שְׁמוּאֵ֗ל עַד מָתַי֙ אַתָּה֙ מִתְאַבֵּ֣ל אֶל שָׁא֔וּל וַ/אֲנִ֣י מְאַסְתִּ֔י/ו מִ/מְּלֹ֖ךְ עַל יִשְׂרָאֵ֑ל מַלֵּ֨א קַרְנְ/ךָ֜ שֶׁ֗מֶן וְ/לֵ֤ךְ אֶֽשְׁלָחֲ/ךָ֙ אֶל יִשַׁ֣י בֵּֽית הַלַּחְמִ֔י כִּֽי רָאִ֧יתִי בְּ/בָנָ֛י/ו לִ֖/י מֶֽלֶךְ־־־־־־־׃
translation:
  text: And Yahweh said to Samuel, “How long will you grieve over Saul, since I have rejected him from being king over Israel? Fill your horn with oil and go; I am sending you to Jesse the Bethlehemite, for I have provided for myself a king among his sons.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'for I have provided for myself a king among his sons.' The Hebrew verb is literally 'seen,' but in context it can imply selection or provision.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: מִתְאַבֵּל
  chosen: grieve
  alternatives:
  - mourn
  - keep mourning
  lexicon: HALOT
  rationale: The verb denotes mourning or grieving. 'Grieve' is natural modern English and fits the rebuke to Samuel without sounding overly funerary, while still preserving the emotional force.
- source_word: מְאַסְתִּיו
  chosen: have rejected him
  alternatives:
  - have refused him
  - have despised him
  lexicon: HALOT
  rationale: The verb מאס commonly means reject/refuse. 'Have rejected him' best fits the royal context and communicates divine disqualification without importing emotional overtones stronger than the Hebrew requires.
- source_word: מִמְּלֹךְ עַל יִשְׂרָאֵל
  chosen: from being king over Israel
  alternatives:
  - from reigning over Israel
  - from kingship over Israel
  lexicon: HALOT
  rationale: The preposition with infinitive marks exclusion from kingship. 'From being king over Israel' is idiomatic and preserves the personal office in view.
- source_word: מַלֵּא קַרְנְךָ שֶׁמֶן
  chosen: Fill your horn with oil
  alternatives:
  - Fill your flask with oil
  lexicon: HALOT
  rationale: קֶרֶן is literally 'horn.' Since anointing vessels made from animal horns are historically plausible here, the literal image should be preserved rather than generalized.
- source_word: אֶשְׁלָחֲךָ
  chosen: I am sending you
  alternatives:
  - I will send you
  lexicon: HALOT
  rationale: The imperfect here expresses imminent divine commission. 'I am sending you' gives natural English force in direct speech while retaining the sense of decisive action.
- source_word: יִשַׁי בֵּית הַלַּחְמִי
  chosen: Jesse the Bethlehemite
  alternatives:
  - Jesse of Bethlehem
  lexicon: HALOT
  rationale: The gentilic/adjectival form identifies Jesse by origin. 'The Bethlehemite' is concise, idiomatic, and preserves the Hebrew designation.
- source_word: רָאִיתִי
  chosen: I have seen for myself
  alternatives:
  - I have provided
  - I have selected
  - I have seen
  lexicon: HALOT
  rationale: ראה fundamentally means 'see.' In this context it carries the sense of divine recognition/selection, but translating it as 'provided' or 'selected' would move beyond the lexical surface. 'I have seen for myself' preserves the Hebrew imagery while making the idiomatic force clearer in English.
- source_word: בְּבָנָיו
  chosen: among his sons
  alternatives:
  - in his sons
  - from among his sons
  lexicon: HALOT
  rationale: The preposition ב here is best rendered contextually as selection within a group. 'Among his sons' is idiomatic and communicates that the chosen king is one of Jesse's sons.
- source_word: לִי
  chosen: for myself
  alternatives:
  - for me
  lexicon: HALOT
  rationale: The dative pronoun marks divine interest or possession. 'For myself' brings out the emphatic personal force in natural English.
- source_word: מֶלֶךְ
  chosen: a king
  alternatives:
  - king
  lexicon: HALOT
  rationale: 'The noun is indefinite in form here. ''A king'' reflects the Hebrew straightforwardly: the focus is on God''s identification of a king from Jesse''s sons, not yet naming David.'
