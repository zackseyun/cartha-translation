id: 1SA.16.11
reference: 1 Samuel 16:11
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר שְׁמוּאֵ֣ל אֶל יִשַׁי֮ הֲ/תַ֣מּוּ הַ/נְּעָרִים֒ וַ/יֹּ֗אמֶר ע֚וֹד
    שָׁאַ֣ר הַ/קָּטָ֔ן וְ/הִנֵּ֥ה רֹעֶ֖ה בַּ/צֹּ֑אן וַ/יֹּ֨אמֶר שְׁמוּאֵ֤ל אֶל יִשַׁי֙
    שִׁלְחָ֣/ה וְ/קָחֶ֔/נּוּ כִּ֥י לֹא נָסֹ֖ב עַד בֹּא֥/וֹ פֹֽה־־־־׃
translation:
  text: Then Samuel said to Jesse, “Are these all the young men?” And he said, “The
    youngest still remains, and look, he is shepherding the flock.” Then Samuel said
    to Jesse, “Send and bring him, for we will not sit down until he comes here.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “he is tending the sheep.” The Hebrew literally says “shepherding the
      flock.”
    reason: lexical_alternative
  - marker: b
    text: Or, “we will not sit around / take our place,” likely meaning they would
      not begin the meal or formal gathering until he arrived.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲתַמּוּ
  chosen: Are these all
  alternatives:
  - Have the young men been completed?
  - Are the young men finished?
  lexicon: HALOT
  rationale: From תמם in the sense of being complete/finished. In idiomatic English,
    Samuel is asking whether this is the full set of sons presented. 'Are these all'
    best captures the force without wooden awkwardness.
- source_word: הַנְּעָרִים
  chosen: the young men
  alternatives:
  - the boys
  - the youths
  lexicon: HALOT
  rationale: נְעָרִים can mean boys, youths, or young men depending on context. Jesse's
    sons are old enough for military service or adult responsibilities, so 'young
    men' is more accurate than 'boys'.
- source_word: עוֹד שָׁאַר
  chosen: still remains
  alternatives:
  - is still left
  - remains yet
  lexicon: HALOT
  rationale: The adverb עוֹד with שׁאר emphasizes that one son has not yet been included.
    'Still remains' is natural English and preserves the sense of one remaining unpresented.
- source_word: הַקָּטָן
  chosen: the youngest
  alternatives:
  - the little one
  - the smallest
  lexicon: HALOT
  rationale: Though literally 'the small/young one,' in family context it refers to
    the youngest son. 'The youngest' is the clearest idiomatic rendering.
- source_word: וְהִנֵּה
  chosen: and look
  alternatives:
  - and behold
  - and there he is
  lexicon: HALOT
  rationale: הִנֵּה draws attention to the following information. 'And look' preserves
    the deictic force in readable modern English better than archaic 'behold.'
- source_word: רֹעֶה בַּצֹּאן
  chosen: he is shepherding the flock
  alternatives:
  - he is tending the sheep
  - he is pasturing the flock
  lexicon: HALOT
  rationale: The participle רֹעֶה denotes ongoing action. 'Shepherding the flock'
    preserves the verbal connection to shepherding language important in Samuel, while
    remaining natural English. 'The flock' reflects צֹאן collectively.
- source_word: שִׁלְחָה וְקָחֶנּוּ
  chosen: Send and bring him
  alternatives:
  - Send for him and take him
  - Send someone and fetch him
  lexicon: HALOT
  rationale: The sequence is a direct command to have David brought. 'Send and bring
    him' is concise and faithful; English idiom could also be 'send for him,' but
    the Hebrew explicitly includes both sending and bringing.
- source_word: לֹא נָסֹב
  chosen: we will not sit down
  alternatives:
  - we will not turn around
  - we will not go around
  lexicon: HALOT
  rationale: Though the verb סבב commonly means turn around, in this context the idiom
    is widely understood as not taking one's place at table or not settling down before
    the missing son arrives. 'Sit down' best fits the narrative setting and established
    Hebrew idiom.
- source_word: עַד בֹּאוֹ פֹה
  chosen: until he comes here
  alternatives:
  - until his coming here
  - until he arrives here
  lexicon: HALOT
  rationale: A straightforward temporal clause. 'Until he comes here' is natural and
    faithful.
