id: 1SA.16.20
reference: 1 Samuel 16:20
source:
  edition: WLC
  text: וַ/יִּקַּ֨ח יִשַׁ֜י חֲמ֥וֹר לֶ֨חֶם֙ וְ/נֹ֣אד יַ֔יִן וּ/גְדִ֥י עִזִּ֖ים אֶחָ֑ד
    וַ/יִּשְׁלַ֛ח בְּ/יַד דָּוִ֥ד בְּנ֖/וֹ אֶל שָׁאֽוּל־־׃
translation:
  text: So Jesse took a donkey loaded with bread, a skin of wine, and one young goat,
    and sent them by the hand of David his son to Saul.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'a donkey, bread'—that is, a donkey carrying or loaded with bread.
    reason: lexical_alternative
  - marker: b
    text: Or 'through David his son'; Hebrew 'by the hand of David his son' is an
      idiom for agency or delivery.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקַּח
  chosen: So Jesse took
  alternatives:
  - Then Jesse took
  - And Jesse took
  lexicon: HALOT
  rationale: Wayyiqtol advances the narrative. 'So' gives natural English narrative
    flow without over-literal repetition of 'and.'
- source_word: חֲמוֹר לֶחֶם
  chosen: a donkey loaded with bread
  alternatives:
  - a donkey of bread
  - a donkey carrying bread
  lexicon: HALOT
  rationale: The Hebrew juxtaposes 'donkey' and 'bread' without an explicit participle.
    In context the donkey is the pack animal bearing the provisions, so English must
    supply the relationship. 'Loaded with' is idiomatic and faithful to the sense.
- source_word: נֹאד יַיִן
  chosen: a skin of wine
  alternatives:
  - a wineskin of wine
  - a bottle of wine
  lexicon: HALOT
  rationale: נֹאד denotes a skin container, typically a wineskin. 'A skin of wine'
    is concise, natural English that preserves the material sense better than 'bottle.'
- source_word: גְּדִי עִזִּים אֶחָד
  chosen: one young goat
  alternatives:
  - one kid of the goats
  - one goat kid
  lexicon: HALOT
  rationale: The phrase means a single young goat/kid. 'One young goat' is clear modern
    English and preserves both number and age.
- source_word: וַיִּשְׁלַח
  chosen: and sent them
  alternatives:
  - and sent
  - and dispatched
  lexicon: HALOT
  rationale: The verb's object is implied by the previously listed gifts. English
    normally supplies the pronoun; 'them' makes the sentence complete and clear.
- source_word: בְּיַד
  chosen: by the hand of
  alternatives:
  - with
  - through
  - in the care of
  lexicon: HALOT
  rationale: Literally 'by the hand of,' an idiom for agency or conveyance. Retaining
    the phrase preserves Hebrew color while remaining understandable in English.
- source_word: דָּוִד בְּנוֹ
  chosen: David his son
  alternatives:
  - his son David
  lexicon: HALOT
  rationale: Both English orders are possible. 'David his son' follows the Hebrew
    sequence more closely while remaining natural enough in narrative prose.
- source_word: אֶל שָׁאוּל
  chosen: to Saul
  alternatives:
  - unto Saul
  lexicon: HALOT
  rationale: Simple directional preposition; 'to Saul' is the natural modern rendering.
