id: 1SA.16.16
reference: 1 Samuel 16:16
source:
  edition: WLC
  text: יֹאמַר נָ֤א אֲדֹנֵ֨/נוּ֙ עֲבָדֶ֣י/ךָ לְ/פָנֶ֔י/ךָ יְבַקְשׁ֕וּ אִ֕ישׁ יֹדֵ֖עַ
    מְנַגֵּ֣ן בַּ/כִּנּ֑וֹר וְ/הָיָ֗ה בִּֽ/הְי֨וֹת עָלֶ֤י/ךָ רֽוּחַ אֱלֹהִים֙ רָעָ֔ה
    וְ/נִגֵּ֥ן בְּ/יָד֖/וֹ וְ/ט֥וֹב לָֽ/ךְ־־׃פ
translation:
  text: Please let our lord say to your servants before you that they should seek
    out a man who knows how to play the lyre; and when an evil spirit from God is
    upon you, he will play with his hand, and it will be well for you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a harmful spirit from God'; Hebrew 'an evil/harmful spirit of/from God.'
    reason: alternative_reading
lexical_decisions:
- source_word: יֹאמַר נָא
  chosen: Please let ... say
  alternatives:
  - Let ... say, please
  - May ... say
  lexicon: HALOT
  rationale: The jussive/imperfect with נָא expresses a polite request. 'Please let
    ... say' captures both the deferential tone and the volitional force in natural
    English.
- source_word: אֲדֹנֵינוּ
  chosen: our lord
  alternatives:
  - our master
  lexicon: HALOT
  rationale: In this court setting the term is a respectful title for Saul. Lowercase
    'lord' avoids confusion with the divine title while preserving the social hierarchy.
- source_word: עֲבָדֶיךָ לְפָנֶיךָ
  chosen: your servants before you
  alternatives:
  - your servants in your presence
  - your servants who stand before you
  lexicon: HALOT
  rationale: The phrase identifies the courtiers as those attending the king in his
    presence. 'Before you' keeps the Hebrew spatial idiom while remaining understandable.
- source_word: יְבַקְשׁוּ אִישׁ
  chosen: they should seek out a man
  alternatives:
  - let them seek a man
  - they may look for a man
  lexicon: HALOT
  rationale: The plural verb with singular object expresses the proposal that the
    servants find a suitable individual. 'Seek out' conveys intentional searching.
- source_word: יֹדֵעַ מְנַגֵּן
  chosen: who knows how to play
  alternatives:
  - skillful in playing
  - experienced at playing
  lexicon: HALOT
  rationale: The participial construction denotes skill or competence. 'Knows how
    to play' is idiomatic modern English and preserves the sense of learned ability.
- source_word: כִּנּוֹר
  chosen: lyre
  alternatives:
  - harp
  lexicon: HALOT
  rationale: כִּנּוֹר refers to an ancient stringed instrument more precisely rendered
    'lyre' than the broader traditional 'harp.' This follows original-language primacy
    over translation tradition.
- source_word: וְהָיָה בִּהְיוֹת
  chosen: and when
  alternatives:
  - and it shall be when
  - and it will happen that when
  lexicon: HALOT
  rationale: This common Hebrew temporal construction introduces the circumstance
    under which the action will occur. 'And when' is a clear optimal-equivalence rendering.
- source_word: רוּחַ אֱלֹהִים רָעָה
  chosen: an evil spirit from God
  alternatives:
  - a harmful spirit from God
  - an evil spirit of God
  lexicon: HALOT
  rationale: The phrase is syntactically capable of 'evil/harmful spirit of/from God.'
    In English, 'from God' best communicates source or permission without implying
    that God is morally evil. 'Evil spirit' preserves the standard lexical force of
    רָעָה here, while the alternative 'harmful' is worth preserving because the adjective
    can denote injurious effect.
- source_word: עָלֶיךָ
  chosen: is upon you
  alternatives:
  - comes upon you
  - is on you
  lexicon: HALOT
  rationale: The preposition עַל with רוח in this context describes the spirit's oppressive
    coming upon Saul. 'Is upon you' is faithful and idiomatic.
- source_word: וְנִגֵּן בְּיָדוֹ
  chosen: he will play with his hand
  alternatives:
  - he will play with his skill
  - he will play the instrument
  lexicon: HALOT
  rationale: Literally 'with his hand,' an idiom for instrumental playing. Retaining
    'with his hand' preserves the concrete Hebrew expression while remaining intelligible.
- source_word: וְטוֹב לָךְ
  chosen: it will be well for you
  alternatives:
  - you will feel better
  - it will go well with you
  lexicon: HALOT
  rationale: The Hebrew is broader than mere emotional relief. 'It will be well for
    you' preserves the resultative sense without over-paraphrasing.
