theological_decisions:
- issue: How to render רוּחַ אֱלֹהִים רָעָה in a way that preserves the text's claim
    without importing extra doctrinal explanation
  chosen_reading: an evil spirit from God
  alternative_readings:
  - a harmful spirit from God
  - an evil spirit of God
  rationale: The text explicitly attributes the spirit's source to God. Rendering
    it 'from God' preserves that attribution while avoiding the misleading English
    implication that God himself is evil. The adjective רָעָה is retained as 'evil'
    in the main text because that is the most direct lexical rendering; 'harmful'
    is preserved as an alternative because some interpreters understand the emphasis
    to be the spirit's injurious effect rather than moral character. This keeps the
    theological tension rather than resolving it away.
  doctrine_reference: Translation philosophy §3 Preserve theological tension rather
    than resolve it
