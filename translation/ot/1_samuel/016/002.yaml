id: 1SA.16.2
reference: 1 Samuel 16:2
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר שְׁמוּאֵל֙ אֵ֣יךְ אֵלֵ֔ךְ וְ/שָׁמַ֥ע שָׁא֖וּל וַ/הֲרָגָ֑/נִי וַ/יֹּ֣אמֶר יְהוָ֗ה עֶגְלַ֤ת בָּקָר֙ תִּקַּ֣ח בְּ/יָדֶ֔/ךָ וְ/אָ֣מַרְתָּ֔ לִ/זְבֹּ֥חַ לַֽ/יהוָ֖ה בָּֽאתִיס׃
translation:
  text: Samuel said, “How can I go? If Saul hears, he will kill me.” And Yahweh said, “Take a heifer with you and say, ‘I have come to sacrifice to Yahweh.’”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Take a young cow with you.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵיךְ
  chosen: How can
  alternatives:
  - How shall
  - How am I to
  lexicon: HALOT
  rationale: Interrogative adverb expressing practical possibility or manner. 'How can I go?' gives natural English while preserving Samuel's concern about feasibility, not mere route or procedure.
- source_word: אֵלֵךְ
  chosen: I go
  alternatives:
  - I go forth
  - I should go
  lexicon: HALOT
  rationale: Qal imperfect 1cs of 'go.' In English the modal nuance is supplied by context with 'How can I go?' rather than a wooden future.
- source_word: וְשָׁמַע שָׁאוּל
  chosen: If Saul hears
  alternatives:
  - and Saul hears
  - when Saul hears
  lexicon: HALOT
  rationale: Though formally waw + perfect, the clause is conditional in sense within Samuel's objection. English idiom requires 'if' to make the implied condition explicit.
- source_word: וַהֲרָגַנִי
  chosen: he will kill me
  alternatives:
  - he would kill me
  - then he will kill me
  lexicon: HALOT
  rationale: The verb expresses the expected consequence if Saul hears. Future English best captures the live threat in context.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: עֶגְלַת בָּקָר
  chosen: a heifer
  alternatives:
  - a young cow
  - a calf from the herd
  lexicon: HALOT
  rationale: The construct denotes a young female bovine suitable for sacrifice. 'Heifer' is concise and standard, though somewhat specialized; it remains the most precise common Bible-English equivalent.
- source_word: תִּקַּח בְּיָדֶךָ
  chosen: Take ... with you
  alternatives:
  - Take ... in your hand
  - carry ... in your hand
  lexicon: HALOT
  rationale: The idiom literally says 'take in your hand,' but in English 'with you' communicates the intended sense naturally without loss.
- source_word: לִזְבֹּחַ לַיהוָה
  chosen: to sacrifice to the LORD
  alternatives:
  - to offer sacrifice to the LORD
  - to slaughter a sacrifice for the LORD
  lexicon: HALOT
  rationale: Infinitive of sacrifice with dative phrase. 'To sacrifice to the LORD' is clear, concise, and faithful to the cultic action without over-specifying ritual details.
- source_word: בָּאתִי
  chosen: I have come
  alternatives:
  - I came
  - I am come
  lexicon: HALOT
  rationale: Perfect 1cs in direct speech can be rendered as present-resultative in English. 'I have come' is idiomatic for announcing one's purpose upon arrival.
