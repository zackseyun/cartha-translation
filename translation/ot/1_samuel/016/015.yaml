theological_decisions:
- issue: How to render רוּחַ אֱלֹהִים רָעָה in a way that preserves the text's claim
    without importing later doctrinal conclusions
  chosen_reading: an evil spirit from God
  alternative_readings:
  - a harmful spirit from God
  - an evil spirit of God
  rationale: The Hebrew presents the spirit as coming from God in some sense; the
    translation should not soften that relation away. At the same time, rendering
    the construct as 'from God' avoids suggesting that the spirit is identical with
    God's own Spirit. Because רָעָה may be understood as 'evil' or 'harmful/distressing,'
    the alternative is preserved in a footnote rather than resolved dogmatically.
  doctrine_reference: Preserve theological tension rather than resolve it.
