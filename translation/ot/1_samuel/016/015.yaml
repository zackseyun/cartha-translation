id: 1SA.16.15
reference: 1 Samuel 16:15
source:
  edition: WLC
  text: וַ/יֹּאמְר֥וּ עַבְדֵֽי שָׁא֖וּל אֵלָ֑י/ו הִנֵּה נָ֧א רֽוּחַ אֱלֹהִ֛ים רָעָ֖ה
    מְבַעִתֶּֽ/ךָ־־־׃
translation:
  text: And Saul’s servants said to him, “Look now, an evil spirit from God is terrifying
    you.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “a harmful/distressing spirit from God.” The Hebrew can describe the
      spirit as evil or as causing harm/distress.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמְרוּ
  chosen: And ... said
  alternatives:
  - Then ... said
  lexicon: HALOT
  rationale: Wayyiqtol advances the narrative. 'And ... said' is natural English narrative
    style while preserving sequence.
- source_word: עַבְדֵי שָׁאוּל
  chosen: Saul’s servants
  alternatives:
  - Saul’s attendants
  - the servants of Saul
  lexicon: HALOT
  rationale: עֶבֶד commonly means 'servant' or 'slave'; in a royal court context 'servants'
    is the most natural and sufficiently formal rendering without implying chattel
    status as the focus.
- source_word: אֵלָיו
  chosen: to him
  lexicon: HALOT
  rationale: Straightforward preposition plus pronominal suffix.
- source_word: הִנֵּה נָא
  chosen: Look now
  alternatives:
  - Behold now
  - See now
  - Indeed
  lexicon: HALOT
  rationale: The pair marks attention and urgency. 'Look now' preserves the discourse
    force in readable modern English better than archaic 'behold.'
- source_word: רוּחַ אֱלֹהִים
  chosen: a spirit from God
  alternatives:
  - the Spirit of God
  - a divine spirit
  lexicon: HALOT
  rationale: In this context the phrase refers not to the Holy Spirit but to a spirit
    associated with God as its source or commission. 'From God' makes the relation
    explicit in idiomatic English and avoids misleading readers toward identification
    with the Holy Spirit.
- source_word: רָעָה
  chosen: evil
  alternatives:
  - harmful
  - distressing
  - bad
  lexicon: HALOT
  rationale: רָעָה can denote moral evil or harmful/distressing character. 'Evil'
    is the traditional and lexically direct rendering; the contextual nuance 'harmful/distressing'
    is preserved in a footnote because the term is theologically sensitive here.
- source_word: מְבַעִתֶּךָ
  chosen: is terrifying you
  alternatives:
  - is tormenting you
  - is troubling you
  - is frightening you
  lexicon: HALOT
  rationale: The participle conveys ongoing action. 'Is terrifying you' captures the
    strong sense of sudden dread or terror better than the broader 'troubling.'
