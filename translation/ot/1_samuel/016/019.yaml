id: 1SA.16.19
reference: 1 Samuel 16:19
source:
  edition: WLC
  text: וַ/יִּשְׁלַ֥ח שָׁא֛וּל מַלְאָכִ֖ים אֶל יִשָׁ֑י וַ/יֹּ֕אמֶר שִׁלְחָ֥/ה אֵלַ֛/י
    אֶת דָּוִ֥ד בִּנְ/ךָ֖ אֲשֶׁ֥ר בַּ/צֹּֽאן־־׃
translation:
  text: So Saul sent messengers to Jesse and said, “Send me your son David, who is
    with the sheep.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “who is among the flock.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלַח
  chosen: sent
  alternatives:
  - dispatched
  lexicon: HALOT
  rationale: The wayyiqtol of שׁלח narrates a simple past action. 'Sent' is the natural
    English equivalent in narrative; 'dispatched' is possible but less idiomatic here.
- source_word: מַלְאָכִים
  chosen: messengers
  alternatives:
  - envoys
  lexicon: HALOT
  rationale: מַלְאָכִים commonly means 'messengers' in human contexts. 'Envoys' is
    possible, but 'messengers' is the standard, transparent rendering and avoids implying
    a more formal diplomatic mission than the text states.
- source_word: אֶל
  chosen: to
  alternatives:
  - unto
  lexicon: HALOT
  rationale: The preposition simply marks direction toward Jesse; 'to' is the clear
    modern English equivalent.
- source_word: וַיֹּאמֶר
  chosen: said
  alternatives:
  - told
  lexicon: HALOT
  rationale: The verb אמר introduces Saul's quoted speech. 'Said' preserves the direct-speech
    structure more formally than 'told'.
- source_word: שִׁלְחָה
  chosen: Send
  alternatives:
  - send along
  - send here
  lexicon: HALOT
  rationale: This is an imperative/request form of שׁלח addressed to Jesse. 'Send'
    is the straightforward rendering; the directional nuance is sufficiently conveyed
    by the following 'to me'.
- source_word: אֵלַי
  chosen: me
  alternatives:
  - to me
  lexicon: HALOT
  rationale: In idiomatic English after 'send,' the indirect object can be rendered
    simply as 'me' ('Send me...'). This preserves the sense without awkwardness.
- source_word: אֶת דָּוִד
  chosen: your son David
  alternatives:
  - David
  lexicon: HALOT
  rationale: The direct object marker אֶת is untranslated, but the object is David.
    In English, placing 'your son' before the name yields a natural rendering of the
    Hebrew apposition with בִּנְךָ.
- source_word: בִּנְךָ
  chosen: your son
  alternatives:
  - your boy
  lexicon: HALOT
  rationale: The noun בן with 2ms suffix identifies David relationally as Jesse's
    son. 'Your son' is the accurate and natural rendering.
- source_word: אֲשֶׁר בַּצֹּאן
  chosen: who is with the sheep
  alternatives:
  - who is among the flock
  - who is at the sheep
  lexicon: HALOT
  rationale: The relative clause identifies which son is meant. בַּצֹּאן literally
    means 'with/in the flock/sheep.' 'Who is with the sheep' is idiomatic and fits
    the pastoral setting without overinterpreting the exact spatial nuance.
