id: 1SA.16.22
reference: 1 Samuel 16:22
source:
  edition: WLC
  text: וַ/יִּשְׁלַ֣ח שָׁא֔וּל אֶל יִשַׁ֖י לֵ/אמֹ֑ר יַעֲמָד נָ֤א דָוִד֙ לְ/פָנַ֔/י
    כִּֽי מָ֥צָא חֵ֖ן בְּ/עֵינָֽ/י־־־׃
translation:
  text: Then Saul sent to Jesse, saying, “Please let David stand before me, for he
    has found favor in my eyes.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Please let David remain before me,' with the sense of continuing in
      Saul's service.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלַח
  chosen: Then Saul sent
  alternatives:
  - And Saul sent
  - So Saul sent
  lexicon: HALOT
  rationale: Wayyiqtol of שׁלח advances the narrative. 'Then' captures sequential
    movement in natural English; 'sent' is retained rather than paraphrasing as 'sent
    word' because the object of the message is supplied by the following infinitive
    'saying.'
- source_word: אֶל
  chosen: to
  alternatives:
  - for
  lexicon: HALOT
  rationale: Standard directional preposition with a personal object; 'to Jesse' is
    the plain sense.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - with this message
  - to say
  lexicon: HALOT
  rationale: Common quotative infinitive introducing direct speech. 'Saying' preserves
    the Hebrew structure without awkwardness.
- source_word: יַעֲמָד נָא
  chosen: Please let ... stand
  alternatives:
  - Please have ... remain
  - Let ... stay
  lexicon: HALOT
  rationale: Qal jussive of עמד with particle נָא expresses a polite request. 'Please
    let David stand before me' keeps the formal imagery of attendance in royal service;
    'remain' is possible contextually but less literal.
- source_word: לְפָנַי
  chosen: before me
  alternatives:
  - in my presence
  - attending me
  lexicon: HALOT
  rationale: Literally 'before me.' In court context it implies personal attendance/service,
    but 'before me' preserves the Hebrew idiom while remaining understandable.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - since
  lexicon: HALOT
  rationale: Introduces the reason for Saul's request. 'For' fits direct speech smoothly
    in English.
- source_word: מָצָא חֵן
  chosen: has found favor
  alternatives:
  - has found grace
  - has pleased
  lexicon: HALOT
  rationale: Established Hebrew idiom meaning to gain approval or favor. 'Favor' is
    the most natural and semantically accurate English rendering here; 'grace' would
    sound overly theological in this courtly context.
- source_word: בְּעֵינַי
  chosen: in my eyes
  alternatives:
  - in my sight
  - with me
  lexicon: HALOT
  rationale: Literal idiom retained because it is clear in contemporary English and
    preserves the Hebrew imagery of personal estimation.
- source_word: דָוִד / שָׁאוּל / יִשַׁי
  chosen: David / Saul / Jesse
  lexicon: standard transliteration conventions
  rationale: Personal names are transliterated rather than translated, in keeping
    with project philosophy.
