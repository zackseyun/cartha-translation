id: 1SA.16.4
reference: 1 Samuel 16:4
source:
  edition: WLC
  text: וַ/יַּ֣עַשׂ שְׁמוּאֵ֗ל אֵ֚ת אֲשֶׁ֣ר דִּבֶּ֣ר יְהוָ֔ה וַ/יָּבֹ֖א בֵּ֣ית לָ֑חֶם וַ/יֶּחֶרְד֞וּ זִקְנֵ֤י הָ/עִיר֙ לִ/קְרָאת֔/וֹ וַ/יֹּ֖אמֶר שָׁלֹ֥ם בּוֹאֶֽ/ךָ׃
translation:
  text: So Samuel did what Yahweh had spoken and came to Bethlehem. The elders of the city trembled at his coming and said, “Do you come in peace?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'The elders of the city trembled to meet him.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַשׂ
  chosen: did
  alternatives:
  - acted
  - carried out
  lexicon: HALOT
  rationale: Basic rendering of עשה in narrative sequence; 'did' is the most natural English equivalent here and preserves the straightforward obedience sense without overinterpreting.
- source_word: אֵת אֲשֶׁר דִּבֶּר יְהוָה
  chosen: what the LORD had spoken
  alternatives:
  - what the LORD said
  - what the LORD had commanded
  lexicon: HALOT
  rationale: The clause literally refers to what YHWH 'spoke.' 'Had spoken' fits the prior divine instruction and keeps closer to the Hebrew than 'commanded,' which would add a nuance not explicit in דִּבֶּר.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וַיָּבֹא בֵּית לָחֶם
  chosen: came to Bethlehem
  alternatives:
  - went to Bethlehem
  - arrived at Bethlehem
  lexicon: HALOT
  rationale: בוא commonly means 'come/go'; in English narrative from the reader's vantage, 'came to Bethlehem' is idiomatic and concise.
- source_word: וַיֶּחֶרְדוּ
  chosen: trembled
  alternatives:
  - were afraid
  - came trembling
  lexicon: HALOT
  rationale: חרד denotes trembling or fearful agitation. 'Trembled' preserves the vivid physical-emotional force better than the flatter 'were afraid.'
- source_word: זִקְנֵי הָעִיר
  chosen: the elders of the city
  alternatives:
  - the city elders
  lexicon: HALOT
  rationale: A clear, natural rendering of the construct phrase that preserves the recognized social role of the elders.
- source_word: לִקְרָאתוֹ
  chosen: at meeting him
  alternatives:
  - to meet him
  - at his approach
  lexicon: HALOT
  rationale: לקראת often means 'to meet/toward meeting.' Because the fear is associated with their encounter with Samuel, 'at meeting him' captures the sense smoothly in English. 'To meet him' is also possible.
- source_word: שָׁלוֹם בּוֹאֶךָ
  chosen: Do you come in peace?
  alternatives:
  - Is your coming peaceful?
  - Do you come peaceably?
  lexicon: HALOT
  rationale: An idiomatic question asking whether Samuel's arrival is peaceful. This best conveys the elders' concern in natural modern English while remaining faithful to the Hebrew expression.
