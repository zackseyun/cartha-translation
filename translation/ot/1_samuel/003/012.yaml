theological_decisions:
- issue: Scope of judgment on Eli and his house
  chosen_reading: The verse states that God will fully execute what he previously
    spoke regarding Eli's house, without narrowing 'house' to only immediate family
    or expanding it beyond the familial-priestly line.
  alternative_readings:
  - Restrict 'house' to Eli's immediate household
  - Expand 'house' to a broader institutional priesthood in the main text
  rationale: The Hebrew בֵּיתוֹ naturally includes household/family line and, in context,
    Eli's priestly house. The translation preserves this breadth with 'his house'
    rather than resolving the scope interpretively.
  doctrine_reference: Preserve theological tension rather than resolve it; consistency
    of key terms, or documented exception.
