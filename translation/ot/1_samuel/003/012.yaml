id: 1SA.3.12
reference: 1 Samuel 3:12
source:
  edition: WLC
  text: בַּ/יּ֤וֹם הַ/הוּא֙ אָקִ֣ים אֶל עֵלִ֔י אֵ֛ת כָּל אֲשֶׁ֥ר דִּבַּ֖רְתִּי אֶל
    בֵּית֑/וֹ הָחֵ֖ל וְ/כַלֵּֽה־־־׃
translation:
  text: On that day I will carry out against Eli all that I have spoken concerning
    his house, from beginning to end.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I will fulfill for Eli all that I have spoken concerning his house.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'his house' can mean his household, family line, or priestly house.
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּיּוֹם הַהוּא
  chosen: On that day
  alternatives:
  - In that day
  lexicon: HALOT
  rationale: Temporal phrase marking a specific future time. 'On that day' is idiomatic
    modern English and preserves the demonstrative force.
- source_word: אָקִים
  chosen: I will carry out
  alternatives:
  - I will establish
  - I will fulfill
  - I will raise up
  lexicon: HALOT
  rationale: Hiphil of קום here takes as object 'all that I have spoken' and in context
    means to make one's spoken word stand/come to pass. 'Carry out' communicates execution
    of announced judgment more naturally than the more wooden 'establish' or potentially
    ambiguous 'raise up.'
- source_word: אֶל עֵלִי
  chosen: against Eli
  alternatives:
  - to Eli
  - upon Eli
  lexicon: HALOT
  rationale: Although אֶל commonly means 'to,' in this judgment context with a verb
    of carrying out spoken words, English idiom is better served by 'against Eli,'
    reflecting that the announced action is directed adversely toward him.
- source_word: אֵת כָּל אֲשֶׁר דִּבַּרְתִּי
  chosen: all that I have spoken
  alternatives:
  - everything that I have said
  lexicon: HALOT
  rationale: Retains the comprehensiveness of כָּל אֲשֶׁר and the verbal sense of
    דבר. Present perfect in English fits prior divine speech with continuing relevance.
- source_word: אֶל בֵּיתוֹ
  chosen: concerning his house
  alternatives:
  - against his house
  - to his house
  - about his household
  lexicon: HALOT
  rationale: With דבר, אֶל can mark the object/topic of speech. 'Concerning his house'
    best reflects that God had spoken regarding Eli's household/family line. 'House'
    is retained rather than 'household' because in this context it naturally includes
    family line and priestly house.
- source_word: בֵּיתוֹ
  chosen: his house
  alternatives:
  - his household
  - his family line
  lexicon: HALOT
  rationale: '''House'' preserves the covenantal/familial breadth of Hebrew בַּיִת,
    which can include household and dynasty/lineage. A narrower paraphrase would lose
    that resonance.'
- source_word: הָחֵל וְכַלֵּה
  chosen: from beginning to end
  alternatives:
  - beginning and ending
  - from start to finish
  lexicon: HALOT
  rationale: This infinitive absolute plus finite/paired verbal expression is idiomatic
    for totality/completion. 'From beginning to end' is natural English that conveys
    the full execution of the announced judgment.
