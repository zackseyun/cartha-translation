id: 1SA.3.17
reference: 1 Samuel 3:17
source:
  edition: WLC
  text: וַ/יֹּ֗אמֶר מָ֤ה הַ/דָּבָר֙ אֲשֶׁ֣ר דִּבֶּ֣ר אֵלֶ֔י/ךָ אַל נָ֥א תְכַחֵ֖ד מִמֶּ֑/נִּי
    כֹּ֣ה יַעֲשֶׂה לְּ/ךָ֤ אֱלֹהִים֙ וְ/כֹ֣ה יוֹסִ֔יף אִם תְּכַחֵ֤ד מִמֶּ֨/נִּי֙ דָּבָ֔ר
    מִ/כָּל הַ/דָּבָ֖ר אֲשֶׁר דִּבֶּ֥ר אֵלֶֽי/ךָ־־־־־׃
translation:
  text: And he said, “What is the word that he spoke to you? Please do not hide it
    from me. May God do so to you, and more also, if you hide from me a word of all
    the words that he spoke to you.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more smoothly, “if you hide from me anything of all that he spoke to
      you.”
    reason: lexical_alternative
lexical_decisions:
- source_word: מָה הַדָּבָר
  chosen: What is the word
  alternatives:
  - What is the message
  - What is the matter
  lexicon: HALOT
  rationale: דָּבָר commonly means 'word, matter, message.' In this prophetic-report
    context, 'word' preserves the Hebrew idiom and the thematic link to divine speech
    in the surrounding passage better than the more interpretive 'message.'
- source_word: דִּבֶּר אֵלֶיךָ
  chosen: he spoke to you
  alternatives:
  - he said to you
  lexicon: HALOT
  rationale: 'The verb דבר is best rendered ''speak'' here, matching the direct object
    ''word'' and preserving the formal connection: ''the word that he spoke to you.'''
- source_word: אַל נָא תְכַחֵד מִמֶּנִּי
  chosen: Please do not hide it from me
  alternatives:
  - Please do not conceal it from me
  - Do not, please, keep it from me
  lexicon: HALOT
  rationale: כחד means 'hide, conceal.' 'Please' reflects נָא as a particle of entreaty,
    though the request is forceful. The pronoun 'it' is supplied naturally in English
    from the preceding 'word.'
- source_word: כֹּה יַעֲשֶׂה לְּךָ אֱלֹהִים וְכֹה יוֹסִיף
  chosen: May God do so to you, and more also
  alternatives:
  - Thus may God do to you, and thus may he add
  - May God do this to you, and even more
  lexicon: HALOT
  rationale: This is a fixed oath/curse formula. 'May God do so to you, and more also'
    is idiomatic English that preserves the imprecatory force without awkward literalism.
    'God' renders אֱלֹהִים in this non-YHWH oath formula.
- source_word: אִם
  chosen: if
  alternatives:
  - surely if
  lexicon: HALOT
  rationale: 'In oath contexts אִם can function elliptically with an implied curse.
    Rendering it as ''if'' preserves the Hebrew structure in English after the oath
    formula: ''May God... if you hide...''.'
- source_word: תְּכַחֵד מִמֶּנִּי דָּבָר
  chosen: you hide from me a word
  alternatives:
  - you conceal from me anything
  - you hide anything from me
  lexicon: HALOT
  rationale: Retaining 'a word' reflects the singular דָּבָר and keeps the lexical
    repetition with the earlier 'word.' It sounds slightly Hebraic, but appropriately
    so in this solemn oath context.
- source_word: מִכָּל הַדָּבָר
  chosen: of all the word
  alternatives:
  - of anything from the whole message
  - of any part of the word
  lexicon: HALOT
  rationale: 'The Hebrew is singular and repetitive: literally ''from all the word.''
    This preserves the source''s emphasis on withholding no part of the revelation.
    Though somewhat wooden, it is intelligible and auditable. An alternative smoother
    rendering is preserved in a footnote.'
