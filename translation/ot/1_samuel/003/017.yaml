- issue: Rendering אֱלֹהִים in an oath formula
  chosen_reading: God
  alternative_readings:
  - the gods
  rationale: In context Eli invokes Israel's God in a standard Hebrew oath formula.
    Rendering the plural form as 'God' reflects normal Hebrew usage for the God of
    Israel and avoids a misleading polytheistic sense.
