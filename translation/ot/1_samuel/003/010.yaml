theological_decisions:
- issue: Anthropomorphic description of the LORD's appearance
  chosen_reading: Retain the concrete narrative wording 'came and stood there'
  alternative_readings:
  - Render less concretely, e.g., 'appeared' or 'made himself present'
  rationale: The Hebrew text narrates the LORD's action in vivid personal terms. The translation preserves that wording rather than softening it to avoid theological discomfort, since the text itself presents the event this way and no doctrinal clarification is required in the main text.
  doctrine_reference: Translation philosophy §1, §3
- issue: Rendering of the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: This follows the project's stated default for YHWH, preserving the traditional reverential substitution rather than transliteration.
