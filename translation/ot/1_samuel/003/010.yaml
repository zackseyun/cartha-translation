id: 1SA.3.10
reference: 1 Samuel 3:10
source:
  edition: WLC
  text: וַ/יָּבֹ֤א יְהוָה֙ וַ/יִּתְיַצַּ֔ב וַ/יִּקְרָ֥א כְ/פַֽעַם בְּ/פַ֖עַם שְׁמוּאֵ֣ל שְׁמוּאֵ֑ל וַ/יֹּ֤אמֶר שְׁמוּאֵל֙ דַּבֵּ֔ר כִּ֥י שֹׁמֵ֖עַ עַבְדֶּֽ/ךָ־׀׃פ
translation:
  text: Then Yahweh came and stood there, and called as at the other times, “Samuel, Samuel!” And Samuel said, “Speak, for your servant is listening.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “as before.” The Hebrew idiom literally compares this call with the previous times.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving the traditional small-caps covenantal substitute in English rather than transliteration.
- source_word: וַיָּבֹא
  chosen: came
  alternatives:
  - arrived
  - approached
  lexicon: HALOT
  rationale: The verb בוא straightforwardly denotes coming/arrival. 'Came' is the most natural and direct narrative rendering in English.
- source_word: וַיִּתְיַצַּב
  chosen: stood there
  alternatives:
  - stood
  - took his stand
  - presented himself
  lexicon: HALOT
  rationale: The hitpael of יצב conveys taking one's position or standing in place. 'Stood there' captures both the posture and the immediacy of presence in the scene without overformal wording.
- source_word: וַיִּקְרָא
  chosen: called
  alternatives:
  - cried out
  - called out
  lexicon: HALOT
  rationale: קרא in this context is the act of vocally addressing Samuel. 'Called' is idiomatic and sufficient; stronger options like 'cried out' overstate the tone.
- source_word: כְפַעַם בְּפַעַם
  chosen: as at the other times
  alternatives:
  - as before
  - as at previous times
  - as time after time
  lexicon: HALOT
  rationale: The idiom compares this call with the earlier repeated calls in the narrative. 'As at the other times' makes the comparative force explicit in natural English.
- source_word: שְׁמוּאֵל שְׁמוּאֵל
  chosen: Samuel, Samuel
  rationale: The repeated proper name is preserved directly, reflecting the emphatic personal summons in the Hebrew.
- source_word: דַּבֵּר
  chosen: Speak
  alternatives:
  - Speak on
  - Say what you will
  lexicon: HALOT
  rationale: The imperative is simple and direct. 'Speak' best matches the Hebrew and the solemnity of Samuel's response.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - since
  lexicon: HALOT
  rationale: Here כִּי introduces the reason Samuel is ready to hear. 'For' preserves the concise explanatory connection in elevated but still readable English.
- source_word: שֹׁמֵעַ
  chosen: is listening
  alternatives:
  - hears
  - is hearing
  lexicon: HALOT
  rationale: The participle expresses ongoing attentiveness. 'Is listening' communicates active readiness better than the more static 'hears.'
- source_word: עַבְדֶּךָ
  chosen: your servant
  alternatives:
  - your slave
  lexicon: HALOT
  rationale: Although עבד can denote a slave, in this deferential address to the LORD it functions as a conventional expression of humble service and submission. 'Your servant' is the most contextually fitting English rendering.
