id: 1SA.3.21
reference: 1 Samuel 3:21
source:
  edition: WLC
  text: וַ/יֹּ֥סֶף יְהוָ֖ה לְ/הֵרָאֹ֣ה בְ/שִׁלֹ֑ה כִּֽי נִגְלָ֨ה יְהוָ֧ה אֶל שְׁמוּאֵ֛ל בְּ/שִׁל֖וֹ בִּ/דְבַ֥ר יְהוָֽה־־׃פ
translation:
  text: And Yahweh continued to appear at Shiloh, for Yahweh revealed himself to Samuel at Shiloh by the word of Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'through the word of the LORD.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּסֶף
  chosen: continued
  alternatives:
  - again
  - added
  lexicon: HALOT
  rationale: The idiom יָסַף + infinitive commonly means to continue or do again. 'Continued' gives natural English and captures ongoing repetition better than the more wooden 'added to appear.'
- source_word: לְהֵרָאֹה
  chosen: to appear
  alternatives:
  - to be seen
  - to show himself
  lexicon: HALOT
  rationale: Niphal of ראה here denotes visible manifestation. 'To appear' is the most idiomatic English for divine manifestation in context.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: בְשִׁלֹה / בְשִׁלוֹ
  chosen: at Shiloh
  alternatives:
  - in Shiloh
  lexicon: HALOT
  rationale: The preposition ב is locative here. 'At Shiloh' is more idiomatic in English for a sanctuary town setting than 'in Shiloh.'
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Here כִּי introduces the explanatory ground for the preceding statement. 'For' preserves the explanatory connection in a concise literary way.
- source_word: נִגְלָה
  chosen: revealed himself
  alternatives:
  - appeared
  - was revealed
  lexicon: HALOT
  rationale: From גלה in the Niphal, the sense is self-disclosure or manifestation. Since 'appear' was already used for לְהֵרָאֹה, 'revealed himself' preserves the semantic distinction while remaining natural.
- source_word: אֶל שְׁמוּאֵל
  chosen: to Samuel
  alternatives:
  - unto Samuel
  lexicon: HALOT
  rationale: Standard directional rendering; no special nuance requires a more archaic form.
- source_word: בִּדְבַר יְהוָה
  chosen: by the word of the LORD
  alternatives:
  - through the word of the LORD
  - in the word of the LORD
  lexicon: HALOT
  rationale: The beth preposition is instrumental here. 'By the word of the LORD' preserves the compact Hebrew phrasing and allows the phrase to denote the means by which the revelation came.
