theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH'
- issue: Nature of divine manifestation language
  chosen_reading: The verse speaks of real divine self-disclosure without specifying the exact mode beyond appearance/revelation by the word of the LORD.
  alternative_readings:
  - A purely visionary experience
  - A bodily/theophanic appearance
  rationale: The Hebrew uses both 'continued to appear' and 'revealed himself ... by the word of the LORD.' The translation preserves both strands without forcing a more specific theological claim about the mode of revelation than the text itself states.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it'
