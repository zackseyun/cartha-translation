id: 1SA.3.15
reference: 1 Samuel 3:15
source:
  edition: WLC
  text: וַ/יִּשְׁכַּ֤ב שְׁמוּאֵל֙ עַד הַ/בֹּ֔קֶר וַ/יִּפְתַּ֖ח אֶת דַּלְת֣וֹת בֵּית יְהוָ֑ה וּ/שְׁמוּאֵ֣ל יָרֵ֔א מֵ/הַגִּ֥יד אֶת הַ/מַּרְאָ֖ה אֶל עֵלִֽי־־־־־׃
translation:
  text: Samuel lay down until morning; then he opened the doors of the house of Yahweh. But Samuel was afraid to tell the vision to Eli.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the appearance'; Hebrew mar'ah can denote an appearance or a visionary revelation. Here 'vision' best fits the context of Samuel's nighttime revelation.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁכַּב
  chosen: lay down
  alternatives:
  - slept
  - lay
  lexicon: HALOT
  rationale: The verb שׁכב commonly means 'lie down.' In context, after the nighttime revelation, 'lay down until morning' is more textually precise than the interpretive 'slept until morning,' since the verse does not explicitly state that he slept.
- source_word: עַד הַבֹּקֶר
  chosen: until morning
  alternatives:
  - until the morning
  lexicon: HALOT
  rationale: Natural English rendering of the temporal phrase while preserving the definite sense of the Hebrew.
- source_word: וַיִּפְתַּח
  chosen: opened
  alternatives:
  - went and opened
  lexicon: HALOT
  rationale: Simple past best represents the waw-consecutive narrative sequence without overtranslating motion not present in the verb itself.
- source_word: דַּלְתוֹת
  chosen: the doors
  alternatives:
  - the door leaves
  - the gate doors
  lexicon: HALOT
  rationale: Plural noun naturally rendered 'doors.' This likely refers to the sanctuary complex entrance structures; 'doors' is the most straightforward English equivalent.
- source_word: בֵּית יְהוָה
  chosen: the house of the LORD
  alternatives:
  - the LORD's house
  - the temple of the LORD
  lexicon: HALOT
  rationale: בית יהוה is the standard expression 'house of YHWH.' 'Temple' would be anachronistic or overly specific in the Samuel setting. Per doctrine, יְהוָה is rendered 'the LORD'.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving reverential convention and consistency with the stated doctrine.
- source_word: יָרֵא
  chosen: was afraid
  alternatives:
  - feared
  - was fearful
  lexicon: HALOT
  rationale: Predicate adjective/verb expressing Samuel's fear. 'Was afraid' is idiomatic modern English and preserves the emotional force.
- source_word: מֵהַגִּיד
  chosen: to tell
  alternatives:
  - from telling
  - to report
  lexicon: HALOT
  rationale: The preposition מִן with the infinitive after ירא expresses fear of doing something; idiomatic English is 'afraid to tell' rather than the more wooden 'afraid from telling.'
- source_word: הַמַּרְאָה
  chosen: the vision
  alternatives:
  - the appearance
  - the revelation
  lexicon: HALOT
  rationale: Although מראה can denote 'appearance,' in this context it refers to the revelatory experience Samuel received from the LORD. 'Vision' best fits the narrative and standard prophetic usage without overstating beyond the text.
- source_word: אֶל עֵלִי
  chosen: to Eli
  alternatives:
  - to/for Eli
  lexicon: HALOT
  rationale: Standard directional/object rendering after הגיד in English is 'tell ... to Eli.'
