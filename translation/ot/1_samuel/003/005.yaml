id: 1SA.3.5
reference: 1 Samuel 3:5
source:
  edition: WLC
  text: וַ/יָּ֣רָץ אֶל עֵלִ֗י וַ/יֹּ֤אמֶר הִנְ/נִי֙ כִּֽי קָרָ֣אתָ לִּ֔/י וַ/יֹּ֥אמֶר
    לֹֽא קָרָ֖אתִי שׁ֣וּב שְׁכָ֑ב וַ/יֵּ֖לֶךְ וַ/יִּשְׁכָּֽב־־־׃ס
translation:
  text: He ran to Eli and said, “Here I am, because you called me.” But he said, “I
    did not call. Go back; lie down.” So he went and lay down.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Return; lie down.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּרָץ
  chosen: He ran
  alternatives:
  - He hurried
  - He rushed
  lexicon: HALOT
  rationale: רץ denotes running; 'He ran' is the plain, natural English equivalent
    and preserves the immediacy of Samuel's response.
- source_word: אֶל עֵלִי
  chosen: to Eli
  alternatives:
  - toward Eli
  lexicon: HALOT
  rationale: אֶל marks motion toward a person; 'to Eli' is idiomatic English.
- source_word: הִנְנִי
  chosen: Here I am
  alternatives:
  - Here am I
  lexicon: HALOT
  rationale: This is the standard self-presenting response formula. 'Here I am' is
    modern, readable English without losing the formulaic force.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  - since
  lexicon: HALOT
  rationale: 'Here כִּי introduces the reason for Samuel''s appearance: he came because
    Eli had called him. ''Because'' makes the causal sense explicit and natural in
    English.'
- source_word: קָרָאתָ לִּי
  chosen: you called me
  alternatives:
  - you summoned me
  lexicon: HALOT
  rationale: קרא with ל expresses calling to someone. 'You called me' is the most
    direct and contextually fitting rendering.
- source_word: לֹא קָרָאתִי
  chosen: I did not call
  alternatives:
  - I didn't call you
  lexicon: HALOT
  rationale: The Hebrew is concise and does not repeat the object. 'I did not call'
    preserves that brevity while remaining clear in context.
- source_word: שׁוּב
  chosen: Go back
  alternatives:
  - Return
  - Go again
  lexicon: HALOT
  rationale: Though literally 'return,' in this dialogue 'Go back' is the most natural
    English instruction, reflecting movement back to Samuel's place.
- source_word: שְׁכָב
  chosen: lie down
  alternatives:
  - go lie down
  lexicon: HALOT
  rationale: שכב means to lie down. 'Lie down' is the direct imperative in natural
    English.
- source_word: וַיֵּלֶךְ
  chosen: he went
  alternatives:
  - he went back
  lexicon: HALOT
  rationale: הלך is simply 'go/went.' Because 'Go back' has already supplied the directional
    nuance, 'he went' avoids overtranslation.
- source_word: וַיִּשְׁכָּב
  chosen: lay down
  alternatives:
  - lay back down
  - lay
  lexicon: HALOT
  rationale: The verb repeats שכב in narrative form. 'Lay down' is idiomatic and clearly
    reflects the action commanded by Eli.
- source_word: וַיֹּאמֶר ... וַיֹּאמֶר
  chosen: said ... But he said
  alternatives:
  - said ... and he said
  - said ... then he said
  lexicon: HALOT
  rationale: The repeated narrative verb introduces each speech. Adding 'But' in the
    second instance appropriately signals the corrective contrast in Eli's reply without
    altering the sense.
