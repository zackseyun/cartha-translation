id: 1SA.3.8
reference: 1 Samuel 3:8
source:
  edition: WLC
  text: וַ/יֹּ֨סֶף יְהוָ֥ה קְרֹא שְׁמוּאֵל֮ בַּ/שְּׁלִשִׁית֒ וַ/יָּ֨קָם֙ וַ/יֵּ֣לֶךְ
    אֶל עֵלִ֔י וַ/יֹּ֣אמֶר הִנְ/נִ֔י כִּ֥י קָרָ֖אתָ לִ֑/י וַ/יָּ֣בֶן עֵלִ֔י כִּ֥י
    יְהוָ֖ה קֹרֵ֥א לַ/נָּֽעַר־־׃
translation:
  text: And the LORD called Samuel again a third time. So he got up and went to Eli
    and said, “Here I am, for you called me.” Then Eli understood that the LORD was
    calling the boy.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיֹּסֶף
  chosen: called ... again
  alternatives:
  - continued
  - added
  lexicon: HALOT
  rationale: The idiom יָסַף + infinitive often means to do something again or continue
    doing it. In this narrative context, 'called ... again' is the most natural English
    rendering and captures repetition without awkward literalism such as 'added to
    call.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the covenant name is rendered 'the LORD' rather
    than transliterated.
- source_word: קְרֹא
  chosen: called
  alternatives:
  - to call
  - was calling
  lexicon: HALOT
  rationale: With וַיֹּסֶף this infinitive functions idiomatically to express repeated
    action; English finite 'called' best conveys the sense.
- source_word: בַּשְּׁלִשִׁית
  chosen: a third time
  alternatives:
  - for the third time
  - the third time
  lexicon: HALOT
  rationale: This adverbial expression marks the third occurrence. 'A third time'
    is idiomatic and clear in English.
- source_word: וַיָּקָם
  chosen: he got up
  alternatives:
  - he arose
  - he stood up
  lexicon: HALOT
  rationale: '''Got up'' is readable modern English and fits the narrative action.'
- source_word: וַיֵּלֶךְ אֶל עֵלִי
  chosen: went to Eli
  alternatives:
  - went over to Eli
  - came to Eli
  lexicon: HALOT
  rationale: A straightforward rendering of movement toward Eli; 'went to Eli' is
    natural and sufficiently formal.
- source_word: הִנְנִי
  chosen: Here I am
  alternatives:
  - Behold me
  - I am here
  lexicon: HALOT
  rationale: Standard idiomatic rendering in call-response contexts; preserves the
    readiness implied by the Hebrew without archaic diction.
- source_word: כִּי קָרָאתָ לִי
  chosen: for you called me
  alternatives:
  - because you called me
  - since you called me
  lexicon: HALOT
  rationale: Here כִּי gives the reason for Samuel's coming. 'For you called me' is
    natural in dialogue and slightly more formal than 'because.'
- source_word: וַיָּבֶן
  chosen: understood
  alternatives:
  - perceived
  - realized
  - discerned
  lexicon: HALOT
  rationale: The verb בין here denotes coming to understand the situation. 'Understood'
    is simple and accurate; 'realized' is possible but slightly more interpretive.
- source_word: קֹרֵא
  chosen: was calling
  alternatives:
  - called
  - was summoning
  lexicon: HALOT
  rationale: The participle expresses ongoing action at that moment; 'was calling'
    conveys the progressive sense better than a simple past.
- source_word: לַנָּעַר
  chosen: the boy
  alternatives:
  - the young man
  - the lad
  lexicon: HALOT
  rationale: נַעַר can range from boy to young man depending on context. In this scene
    Samuel is presented as a youth under Eli's care, so 'the boy' best fits the narrative
    and remains natural English.
