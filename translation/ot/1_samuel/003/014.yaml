id: 1SA.3.14
reference: 1 Samuel 3:14
source:
  edition: WLC
  text: וְ/לָ/כֵ֥ן נִשְׁבַּ֖עְתִּי לְ/בֵ֣ית עֵלִ֑י אִֽם יִתְכַּפֵּ֞ר עֲוֺ֧ן בֵּית
    עֵלִ֛י בְּ/זֶ֥בַח וּ/בְ/מִנְחָ֖ה עַד עוֹלָֽם־־־׃
translation:
  text: 'Therefore I have sworn to the house of Eli: the iniquity of Eli’s house shall
    never be atoned for by sacrifice or offering.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the iniquity of Eli’s house shall surely not be atoned for.' The Hebrew
      uses an oath formula with 'if' after 'I have sworn' to express strong negation.
    reason: lexical_alternative
  - marker: b
    text: '''Offering'' translates Hebrew minchah, often specifically a ''grain offering.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וְלָכֵן
  chosen: Therefore
  alternatives:
  - So
  - For this reason
  lexicon: HALOT
  rationale: Introduces the consequence of the preceding judgment announcement. 'Therefore'
    preserves the formal inferential force in natural English.
- source_word: נִשְׁבַּעְתִּי
  chosen: I have sworn
  alternatives:
  - I swore
  lexicon: HALOT
  rationale: The perfect verb expresses a completed divine oath with present force.
    'I have sworn' preserves the solemnity and ongoing binding effect better than
    the simple past.
- source_word: לְבֵית עֵלִי
  chosen: to the house of Eli
  alternatives:
  - against the house of Eli
  - concerning the house of Eli
  lexicon: HALOT
  rationale: The preposition ל here marks the object/target of the oath. In English,
    'to the house of Eli' is acceptable and keeps close to the Hebrew, while the hostile
    content of the oath is made clear by the clause that follows.
- source_word: אִם
  chosen: shall never
  alternatives:
  - surely not
  - if
  lexicon: HALOT
  rationale: 'After a verb of swearing, אִם functions idiomatically as a negative
    oath formula: ''surely not'' or ''never.'' Rendering it woodenly as ''if'' would
    obscure the sense in English.'
- source_word: יִתְכַּפֵּר
  chosen: be atoned for
  alternatives:
  - be expiated
  - be purged
  lexicon: HALOT
  rationale: The hitpael/passive-like form of כפר here refers to the removal of guilt
    through atonement. 'Be atoned for' is clear modern English and preserves sacrificial-theological
    meaning without importing later technical jargon.
- source_word: עֲוֺן
  chosen: iniquity
  alternatives:
  - guilt
  - sin
  lexicon: HALOT
  rationale: עָוֹן can denote both wrongdoing and its culpability/consequence. 'Iniquity'
    preserves the gravity of the offense and fits the judicial-sacrificial context
    better than the flatter 'sin.'
- source_word: בֵּית עֵלִי
  chosen: Eli’s house
  alternatives:
  - the house of Eli
  lexicon: HALOT
  rationale: A natural English possessive avoids awkward repetition while preserving
    the familial/household sense of the Hebrew construct phrase.
- source_word: בְּזֶבַח
  chosen: by sacrifice
  alternatives:
  - with sacrifice
  lexicon: HALOT
  rationale: The preposition marks means. 'By sacrifice' communicates that sacrificial
    means cannot effect atonement in this case.
- source_word: וּבְמִנְחָה
  chosen: or offering
  alternatives:
  - or grain offering
  - or gift offering
  lexicon: HALOT
  rationale: מִנְחָה often refers specifically to a grain offering in cultic contexts,
    but in paired expression with זֶבַח it can function more broadly for tribute/offering.
    'Offering' is readable and idiomatic; the more specific alternative is preserved
    in a footnote.
- source_word: עַד עוֹלָם
  chosen: shall never
  alternatives:
  - forever
  - for eternity
  lexicon: HALOT
  rationale: In this negative oath context, the phrase intensifies the impossibility/permanence
    of non-atonement. English expresses this most naturally as 'shall never' rather
    than the clumsier 'not ... forever.'
