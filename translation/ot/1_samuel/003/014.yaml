theological_decisions:
- issue: Nature of the judgment on Eli's house
  chosen_reading: The verse declares that no sacrificial system remedy will atone
    for the iniquity of Eli's house.
  alternative_readings:
  - The verse could be read more narrowly as excluding only certain offerings rather
    than all possible divine forgiveness.
  rationale: The explicit mention of sacrifice and offering indicates the inadequacy
    of cultic means for this offense. The translation preserves that claim without
    extending it into a broader doctrinal statement about absolute impossibility of
    God's mercy beyond what the text says.
  doctrine_reference: Preserve theological tension rather than resolve it.
