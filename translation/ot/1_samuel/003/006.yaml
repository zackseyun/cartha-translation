id: 1SA.3.6
reference: 1 Samuel 3:6
source:
  edition: WLC
  text: וַ/יֹּ֣סֶף יְהוָ֗ה קְרֹ֣א עוֹד֮ שְׁמוּאֵל֒ וַ/יָּ֤קָם שְׁמוּאֵל֙ וַ/יֵּ֣לֶךְ
    אֶל עֵלִ֔י וַ/יֹּ֣אמֶר הִנְ/נִ֔י כִּ֥י קָרָ֖אתָ לִ֑/י וַ/יֹּ֛אמֶר לֹֽא קָרָ֥אתִי
    בְנִ֖/י שׁ֥וּב שְׁכָֽב־־׃
translation:
  text: Then the LORD called Samuel again. Samuel got up and went to Eli and said,
    “Here I am, because you called me.” But he said, “I did not call, my son. Go back;
    lie down.”
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיֹּסֶף
  chosen: Then ... again
  alternatives:
  - And the LORD continued
  - And the LORD added
  lexicon: HALOT
  rationale: The idiom יָסַף + infinitive ('added to call') means to do something
    again/continue doing it. In natural English here, 'called ... again' best captures
    the sense without woodenly reproducing 'added.' 'Then' reflects the narrative
    waw in context.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines for the divine name, render YHWH as 'the LORD'
    rather than transliterating the name.
- source_word: קְרֹא
  chosen: called
  alternatives:
  - continued calling
  lexicon: HALOT
  rationale: With וַיֹּסֶף and עוֹד, the verb denotes calling again. 'Called' is the
    core lexical value, while repetition is conveyed by 'again.'
- source_word: עוֹד
  chosen: again
  alternatives:
  - once more
  - further
  lexicon: HALOT
  rationale: In this context עוֹד marks repetition. 'Again' is the most idiomatic
    concise rendering.
- source_word: וַיָּקָם
  chosen: got up
  alternatives:
  - arose
  - stood up
  lexicon: HALOT
  rationale: '''Got up'' is clear modern English for the narrative action and fits
    the translation philosophy better than the more formal ''arose.'''
- source_word: וַיֵּלֶךְ אֶל
  chosen: went to
  alternatives:
  - came to
  lexicon: HALOT
  rationale: Standard motion toward a person; 'went to Eli' is the plain sense.
- source_word: הִנֵּנִי
  chosen: Here I am
  alternatives:
  - I am here
  - Yes?
  lexicon: HALOT
  rationale: This is the conventional self-presentation formula in response to a summons.
    'Here I am' preserves the recognizable biblical idiom while remaining natural
    English.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  - since
  lexicon: HALOT
  rationale: 'Here כִּי introduces Samuel''s explanation for coming: ''because you
    called me.'' ''Because'' is the clearest modern rendering.'
- source_word: קָרָאתָ לִי
  chosen: you called me
  alternatives:
  - you summoned me
  lexicon: HALOT
  rationale: Direct and natural rendering of the perfect + indirect object.
- source_word: לֹא קָרָאתִי
  chosen: I did not call
  alternatives:
  - I didn't call
  lexicon: HALOT
  rationale: Kept slightly more formal in dialogue to match narrative tone while remaining
    readable.
- source_word: בְנִי
  chosen: my son
  alternatives:
  - son
  - child
  lexicon: HALOT
  rationale: The possessive suffix is explicit. 'My son' preserves Eli's paternal/affectionate
    address better than the more generic 'child.'
- source_word: שׁוּב
  chosen: Go back
  alternatives:
  - Return
  - Go
  lexicon: HALOT
  rationale: In context Eli tells Samuel to return to where he was. 'Go back' expresses
    the directional nuance more naturally than bare 'return' for contemporary readers.
- source_word: שְׁכָב
  chosen: lie down
  alternatives:
  - go lie down
  - sleep
  lexicon: HALOT
  rationale: The verb means to lie down, not necessarily to sleep. 'Lie down' preserves
    the literal action without overinterpreting.
