id: 1SA.3.2
reference: 1 Samuel 3:2
source:
  edition: WLC
  text: וַֽ/יְהִי֙ בַּ/יּ֣וֹם הַ/ה֔וּא וְ/עֵלִ֖י שֹׁכֵ֣ב בִּ/מְקֹמ֑/וֹ ו/עינ/ו הֵחֵ֣לּוּ
    כֵה֔וֹת לֹ֥א יוּכַ֖ל לִ/רְאֽוֹת׃
translation:
  text: Now on that day, Eli was lying down in his place, and his eyes had begun to
    grow dim; he could not see.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'his eye had begun to grow dim.' The Hebrew form may be understood collectively
      for eyesight, hence 'his eyes' in the main text.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: Now ...
  alternatives:
  - And it happened
  - And it came to pass
  lexicon: HALOT
  rationale: The waw-consecutive of היה introduces the narrative setting. 'Now' preserves
    the discourse function in natural modern English better than the traditional but
    archaic 'and it came to pass.'
- source_word: בַּיּוֹם הַהוּא
  chosen: on that day
  alternatives:
  - in that day
  - at that time
  lexicon: HALOT
  rationale: A straightforward temporal expression. 'On that day' is the most direct
    rendering of the preposition plus noun and demonstrative.
- source_word: שֹׁכֵב
  chosen: was lying down
  alternatives:
  - was lying
  - lay
  lexicon: HALOT
  rationale: The participle describes Eli's ongoing state. 'Was lying down' captures
    the durative sense and fits the nighttime setting of the surrounding narrative.
- source_word: בִּמְקֹמוֹ
  chosen: in his place
  alternatives:
  - in his own place
  - in his room
  lexicon: HALOT
  rationale: מָקוֹם literally means 'place.' 'In his place' preserves the Hebrew without
    over-specifying the location as a 'room,' which the text itself does not explicitly
    state.
- source_word: וְעֵינוֹ
  chosen: his eyes
  alternatives:
  - his eye
  lexicon: HALOT
  rationale: Although the consonantal form can appear singular with pronominal suffix,
    the idiom here refers to eyesight generally and is commonly understood collectively.
    English naturally uses the plural 'his eyes' in this context.
- source_word: הֵחֵלּוּ כֵהוֹת
  chosen: had begun to grow dim
  alternatives:
  - had begun to be dim
  - were becoming dim
  - had grown dim
  lexicon: HALOT
  rationale: The construction combines 'began' with an infinitive/adjectival verbal
    idea of dimness. 'Had begun to grow dim' reflects both inception and progressive
    weakening of sight better than the flatter 'had grown dim.'
- source_word: לֹא יוּכַל לִרְאוֹת
  chosen: he could not see
  alternatives:
  - he was unable to see
  - so that he could not see
  lexicon: HALOT
  rationale: This clause states the practical result of Eli's failing vision. 'He
    could not see' is clear, idiomatic, and sufficiently direct.
