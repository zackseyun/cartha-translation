id: 1SA.3.20
reference: 1 Samuel 3:20
source:
  edition: WLC
  text: וַ/יֵּ֨דַע֙ כָּל יִשְׂרָאֵ֔ל מִ/דָּ֖ן וְ/עַד בְּאֵ֣ר שָׁ֑בַע כִּ֚י נֶאֱמָ֣ן שְׁמוּאֵ֔ל לְ/נָבִ֖יא לַ/יהוָֽה־־׃
translation:
  text: And all Israel from Dan to Beer-sheba knew that Samuel was established as a prophet of Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'established as a prophet of the LORD.' The Hebrew term can convey being shown reliable, established, or confirmed.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּדַע
  chosen: knew
  alternatives:
  - came to know
  - recognized
  lexicon: HALOT
  rationale: The waw-consecutive verb from ידע denotes realized knowledge or recognition. 'Knew' is the most natural concise English rendering here, with the following clause expressing what became publicly recognized.
- source_word: כָּל יִשְׂרָאֵל
  chosen: all Israel
  alternatives:
  - all the Israelites
  lexicon: HALOT
  rationale: The collective national expression is best preserved as 'all Israel,' a standard and natural rendering that reflects the corporate sense of the Hebrew.
- source_word: מִדָּן וְעַד בְּאֵר שָׁבַע
  chosen: from Dan to Beer-sheba
  alternatives:
  - from Dan even to Beer-sheba
  lexicon: HALOT
  rationale: This is a conventional merism for the full extent of the land. Retaining the place names preserves the geographic idiom and avoids over-paraphrasing it as 'throughout the land' in the main text.
- source_word: כִּי
  chosen: that
  alternatives:
  - for
  - indeed
  lexicon: HALOT
  rationale: Here כִּי introduces the content of what Israel knew, so 'that' is the clearest English complementizer.
- source_word: נֶאֱמָן
  chosen: confirmed
  alternatives:
  - established
  - faithful
  - trustworthy
  lexicon: HALOT
  rationale: The Niphal participle of אמן can denote being reliable, established, or confirmed. In this context the point is not chiefly Samuel's moral faithfulness but that his prophetic status had been shown to be genuine and publicly established by the LORD's fulfillment of his word (cf. previous verse). 'Confirmed' captures that recognition well in idiomatic English.
- source_word: לְנָבִיא
  chosen: as a prophet
  alternatives:
  - to be a prophet
  - for a prophet
  lexicon: HALOT
  rationale: The lamed marks role or status. 'As a prophet' is concise, natural English that conveys recognized appointment/status.
- source_word: לַיהוָה
  chosen: of the LORD
  alternatives:
  - to the LORD
  - belonging to the LORD
  lexicon: HALOT
  rationale: 'Given the doctrinal standard for יְהוָה, the divine name is rendered ''the LORD.'' Here the lamed is best expressed relationally: Samuel is recognized as a prophet belonging to or commissioned by the LORD, and ''of the LORD'' is the most idiomatic English expression.'
