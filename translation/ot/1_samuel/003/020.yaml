theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Sense of נֶאֱמָן in Samuel's prophetic recognition
  chosen_reading: confirmed as a prophet
  alternative_readings:
  - faithful as a prophet
  - established to be a prophet
  rationale: The verse emphasizes public recognition that Samuel had truly been authenticated in prophetic office, especially in light of the immediately preceding statement that none of his words fell to the ground. 'Confirmed' preserves that theological and narrative force without importing later technical notions of ordination.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3, §6
