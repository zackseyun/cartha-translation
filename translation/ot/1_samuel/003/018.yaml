id: 1SA.3.18
reference: 1 Samuel 3:18
source:
  edition: WLC
  text: וַ/יַּגֶּד ל֤/וֹ שְׁמוּאֵל֙ אֶת כָּל הַ/דְּבָרִ֔ים וְ/לֹ֥א כִחֵ֖ד מִמֶּ֑/נּוּ
    וַ/יֹּאמַ֕ר יְהוָ֣ה ה֔וּא הַ/טּ֥וֹב בְּ/עֵינָ֖/ו יַעֲשֶֽׂה־־־׃פ
translation:
  text: So Samuel told him everything and hid nothing from him. And he said, “He is
    the LORD; let him do what is good in his eyes.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'he will do what is good in his eyes.' The Hebrew imperfect may be understood
      as either a submissive wish ('let him do') or a simple future.
    reason: alternative_reading
  - marker: b
    text: Hebrew 'in his eyes,' an idiom meaning according to his own judgment or
      what seems good to him.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּגֶּד
  chosen: told
  alternatives:
  - reported
  - declared
  lexicon: HALOT
  rationale: The verb נגד in the Hifil commonly means to tell, report, or make known.
    'Told' is natural modern English and fits the direct personal communication between
    Samuel and Eli without sounding overly formal.
- source_word: אֶת כָּל הַדְּבָרִים
  chosen: everything
  alternatives:
  - all the words
  - all the things
  lexicon: HALOT
  rationale: Literally 'all the words/things.' In idiomatic English, 'everything'
    best captures the totality of what Samuel disclosed while remaining faithful to
    the sense.
- source_word: וְלֹא כִחֵד מִמֶּנּוּ
  chosen: and hid nothing from him
  alternatives:
  - and did not conceal anything from him
  - and kept nothing back from him
  lexicon: HALOT
  rationale: כחד conveys concealing or withholding. 'Hid nothing from him' is concise,
    idiomatic, and preserves the emphatic completeness of Samuel's disclosure.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the covenant name יְהוָה is rendered 'the LORD'
    rather than transliterated.
- source_word: הוּא
  chosen: He is
  alternatives:
  - It is he who is
  - He himself is
  lexicon: HALOT
  rationale: The pronoun is emphatic, identifying the speaker's submission to YHWH's
    identity and authority. 'He is' preserves the force in natural English.
- source_word: הַטּוֹב
  chosen: what is good
  alternatives:
  - what seems good
  - the good
  lexicon: HALOT
  rationale: With יעשה and the following phrase 'in his eyes,' the sense is what is
    good/pleasing from the LORD's perspective. 'What is good' is more literal; the
    idiom's perspectival nuance is carried by 'in his eyes.'
- source_word: בְּעֵינָיו
  chosen: in his eyes
  alternatives:
  - in his sight
  - as he sees fit
  lexicon: HALOT
  rationale: The Hebrew idiom literally means 'in his eyes,' often denoting evaluation
    or what seems right to someone. Retaining the idiom here preserves the Hebrew
    flavor and theological weight of divine prerogative.
- source_word: יַעֲשֶׂה
  chosen: let him do
  alternatives:
  - may he do
  - he will do
  lexicon: HALOT
  rationale: 'Though morphologically imperfect, in this context Eli''s response is
    best taken as a jussive-like expression of resignation/submission: ''let him do.''
    This fits the discourse better than a simple future.'
