theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse explicitly names Israel's covenant God. Following the project's
    doctrine, the Tetragrammaton is rendered 'the LORD' in the main text rather than
    transliterated.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Force of Eli's final statement
  chosen_reading: 'A submissive/jussive expression: ''let him do what is good in his
    eyes'''
  alternative_readings:
  - 'A predictive statement: ''he will do what is good in his eyes'''
  rationale: The context is Eli's acceptance of the announced judgment. English 'let
    him do' best conveys resignation before God's will without overstating theological
    interpretation.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological
    tension rather than resolve it'
