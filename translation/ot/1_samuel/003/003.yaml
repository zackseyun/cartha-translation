id: 1SA.3.3
reference: 1 Samuel 3:3
source:
  edition: WLC
  text: וְ/נֵ֤ר אֱלֹהִים֙ טֶ֣רֶם יִכְבֶּ֔ה וּ/שְׁמוּאֵ֖ל שֹׁכֵ֑ב בְּ/הֵיכַ֣ל יְהוָ֔ה
    אֲשֶׁר שָׁ֖ם אֲר֥וֹן אֱלֹהִֽים־׃פ
translation:
  text: And the lamp of God had not yet gone out, and Samuel was lying down in the
    temple of the LORD, where the ark of God was.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the sanctuary of the LORD.' Hebrew heikhal can refer to a temple or
      sanctuary; here it denotes the LORD's dwelling place at Shiloh.
    reason: lexical_alternative
lexical_decisions:
- source_word: נֵר אֱלֹהִים
  chosen: the lamp of God
  alternatives:
  - God's lamp
  lexicon: HALOT
  rationale: נֵר means 'lamp' rather than a more general 'light.' The construct with
    אֱלֹהִים is retained straightforwardly as 'of God,' likely referring to the sanctuary
    lamp associated with worship. The more idiomatic possessive 'God's lamp' is possible,
    but 'the lamp of God' preserves the Hebrew form and its cultic resonance.
- source_word: טֶרֶם יִכְבֶּה
  chosen: had not yet gone out
  alternatives:
  - was not yet extinguished
  - had not yet been extinguished
  lexicon: HALOT
  rationale: טֶרֶם marks an action not yet completed, and כבה with a lamp naturally
    means 'go out' in English. 'Had not yet gone out' is idiomatic and preserves the
    temporal sense without overformal wording.
- source_word: שֹׁכֵב
  chosen: was lying down
  alternatives:
  - was sleeping
  - lay
  lexicon: HALOT
  rationale: The participle denotes Samuel's reclining/lying position. 'Was sleeping'
    is interpretive beyond the lexical value, while 'lay' can sound too punctiliar.
    'Was lying down' best reflects the participial aspect and immediate scene.
- source_word: הֵיכַל יְהוָה
  chosen: the temple of the LORD
  alternatives:
  - the sanctuary of the LORD
  - the palace of the LORD
  lexicon: HALOT
  rationale: הֵיכָל can denote a temple, palace, or sanctuary. In this cultic context,
    with the ark nearby, 'temple' is the most natural English rendering, though historically
    this is the tabernacle/shrine at Shiloh rather than Solomon's later temple. 'Sanctuary'
    is possible and perhaps more historically specific, but 'temple' is a standard
    lexical equivalent and understandable in modern English.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name יְהוָה
    is 'the LORD,' following longstanding reverential convention and the Septuagintal
    pattern.
- source_word: אֲשֶׁר שָׁם אֲרוֹן אֱלֹהִים
  chosen: where the ark of God was
  alternatives:
  - where God's ark was
  - in which the ark of God was
  lexicon: HALOT
  rationale: The relative clause identifies the location by the presence of the ark.
    'Where the ark of God was' is clear, natural English and preserves the locative
    force of שָׁם. 'Ark of God' is retained rather than smoothing to 'God's ark' for
    consistency with the Hebrew construct.
