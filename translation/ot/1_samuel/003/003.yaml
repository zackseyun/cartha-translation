theological_decisions:
- issue: Rendering of הֵיכַל יְהוָה in the pre-monarchic sanctuary context
  chosen_reading: the temple of the LORD
  alternative_readings:
  - the sanctuary of the LORD
  rationale: Although the setting is the sanctuary at Shiloh before Solomon's temple,
    הֵיכָל lexically permits 'temple' and the phrase can be translated that way without
    importing later temple theology. 'Sanctuary' remains a viable alternative and
    is preserved in a footnote because some readers may hear 'temple' anachronistically.
  doctrine_reference: Translation philosophy §§1, 6; Contested terms table for יְהוָה
