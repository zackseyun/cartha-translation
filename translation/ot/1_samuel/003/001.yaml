id: 1SA.3.1
reference: 1 Samuel 3:1
source:
  edition: WLC
  text: וְ/הַ/נַּ֧עַר שְׁמוּאֵ֛ל מְשָׁרֵ֥ת אֶת יְהוָ֖ה לִ/פְנֵ֣י עֵלִ֑י וּ/דְבַר יְהוָ֗ה הָיָ֤ה יָקָר֙ בַּ/יָּמִ֣ים הָ/הֵ֔ם אֵ֥ין חָז֖וֹן נִפְרָֽץ־־׃ס
translation:
  text: Now the boy Samuel was ministering to Yahweh before Eli, and the word of Yahweh was rare in those days; visions were not widespread.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'there was no frequent vision' or 'vision was not breaking forth.' The Hebrew expression is idiomatic and conveys that revelatory visions were uncommon, not openly prevalent.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/הַ/נַּעַר
  chosen: Now the boy
  alternatives:
  - And the boy
  - Now the young man
  lexicon: HALOT
  rationale: הַנַּעַר means 'the boy/youth.' Given Samuel's stage in the narrative, 'boy' best fits. The prefixed וְ is rendered discourse-sensitively as 'Now' rather than a bare 'And' for natural English scene-setting.
- source_word: מְשָׁרֵת
  chosen: was ministering
  alternatives:
  - was serving
  - ministered
  lexicon: HALOT
  rationale: The participle conveys ongoing action. 'Was ministering' preserves the durative sense and the cultic/religious nuance of service in the sanctuary better than the more generic 'was serving.'
- source_word: אֶת יְהוָה
  chosen: to the LORD
  alternatives:
  - the LORD
  - before the LORD
  lexicon: HALOT
  rationale: With מְשָׁרֵת, the object marker introduces the one served. In idiomatic English, 'ministering to the LORD' best conveys the sense. YHWH is rendered 'the LORD' per doctrine.
- source_word: לִפְנֵי עֵלִי
  chosen: before Eli
  alternatives:
  - under Eli
  - in the presence of Eli
  lexicon: HALOT
  rationale: לִפְנֵי literally means 'before/in the presence of.' 'Before Eli' preserves the Hebrew wording while allowing the contextual sense that Samuel served under Eli's oversight.
- source_word: וּ/דְבַר יְהוָה
  chosen: and the word of the LORD
  alternatives:
  - and the LORD's word
  lexicon: HALOT
  rationale: A standard and transparent rendering of the construct phrase, preserving the theological idiom of divine revelation.
- source_word: יָקָר
  chosen: was rare
  alternatives:
  - was precious
  - was scarce
  lexicon: HALOT
  rationale: Though the adjective can mean 'precious/valuable,' in this context of revelatory scarcity the sense is rarity rather than esteem. 'Was rare' communicates the plain contextual meaning.
- source_word: בַּיָּמִים הָהֵם
  chosen: in those days
  alternatives:
  - during those days
  lexicon: HALOT
  rationale: This is the natural English equivalent of the temporal phrase.
- source_word: אֵין חָזוֹן נִפְרָץ
  chosen: visions were not widespread
  alternatives:
  - there was no frequent vision
  - vision was not breaking forth
  - there was no open vision
  lexicon: HALOT
  rationale: אֵין negates the clause; חָזוֹן is best taken collectively here as revelatory 'vision(s)'; נִפְרָץ from פרץ carries the idea of breaking out/spreading abroad. 'Were not widespread' captures the idiom of revelation not occurring openly or commonly. 'Open vision' is traditional but opaque in modern English, so the sense is translated rather than preserved as jargon.
