id: 1SA.3.11
reference: 1 Samuel 3:11
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר יְהוָה֙ אֶל שְׁמוּאֵ֔ל הִנֵּ֧ה אָנֹכִ֛י עֹשֶׂ֥ה דָבָ֖ר בְּ/יִשְׂרָאֵ֑ל
    אֲשֶׁר֙ כָּל שֹׁ֣מְע֔/וֹ תְּצִלֶּ֖ינָה שְׁתֵּ֥י אָזְנָֽי/ו־־׃
translation:
  text: Then the LORD said to Samuel, "Look, I am about to do a thing in Israel that
    will make both ears of everyone who hears of it tingle."
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'ring'; the Hebrew idiom describes a shocking report that affects both
      ears of the hearer.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: Then ... said
  alternatives:
  - And ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then ... said' gives natural
    English narrative flow while preserving the sequential sense.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the covenant name YHWH is rendered 'the LORD' rather than
    transliterated.
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: Introduces solemn attention to the announcement. 'Look' is readable modern
    English and preserves the deictic force better than omitting it.
- source_word: אָנֹכִי
  chosen: I
  alternatives:
  - I myself
  lexicon: HALOT
  rationale: The independent pronoun adds emphasis, but in English the emphasis is
    sufficiently conveyed by the clause with 'Look, I am about to...'; 'I myself'
    would sound overstated here.
- source_word: עֹשֶׂה
  chosen: am about to do
  alternatives:
  - am doing
  - will do
  lexicon: HALOT
  rationale: The participle with הִנֵּה often conveys imminent action. 'Am about to
    do' captures the impending force more precisely than a simple present or future.
- source_word: דָבָר
  chosen: a thing
  alternatives:
  - something
  - a matter
  lexicon: HALOT
  rationale: דבר here is intentionally broad, referring to an event or act. 'A thing'
    preserves the generality and gravity without over-specifying.
- source_word: בְּיִשְׂרָאֵל
  chosen: in Israel
  alternatives:
  - against Israel
  - among Israel
  lexicon: HALOT
  rationale: The preposition ב commonly marks location/sphere here. 'In Israel' best
    fits the idiom of an event occurring within the nation.
- source_word: אֲשֶׁר כָּל שֹׁמְעוֹ
  chosen: that ... everyone who hears of it
  alternatives:
  - which all who hear it
  - that whoever hears it
  lexicon: HALOT
  rationale: The relative clause refers to the announced event. 'Hears of it' makes
    explicit the English idiom that people hear about the event, while preserving
    the sense of the Hebrew suffix.
- source_word: תְּצִלֶּינָה
  chosen: will ... tingle
  alternatives:
  - will ring
  - will quiver
  lexicon: HALOT
  rationale: The Hiphil of צלל in this idiom denotes a shocking effect on the ears.
    'Tingle' is the established and semantically fitting English equivalent for this
    expression.
- source_word: שְׁתֵּי אָזְנָיו
  chosen: both ears
  alternatives:
  - his two ears
  - the two ears
  lexicon: HALOT
  rationale: The Hebrew literally says 'his two ears,' with singular distributive
    force after 'everyone who hears.' 'Both ears' is idiomatic English and preserves
    the distributive sense.
