id: 1SA.3.19
reference: 1 Samuel 3:19
source:
  edition: WLC
  text: וַ/יִּגְדַּ֖ל שְׁמוּאֵ֑ל וַֽ/יהוָה֙ הָיָ֣ה עִמּ֔/וֹ וְ/לֹֽא הִפִּ֥יל מִ/כָּל
    דְּבָרָ֖י/ו אָֽרְצָ/ה־־׃
translation:
  text: And Samuel grew, and the LORD was with him and let none of his words fall
    to the ground.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'did not let any of his words fail.' The Hebrew idiom is literally 'did
      not let any of his words fall to the ground.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּגְדַּל
  chosen: grew
  alternatives:
  - became great
  - grew up
  lexicon: HALOT
  rationale: The verb גדל here denotes Samuel's growth/maturation. 'Grew' is natural
    English and preserves the concise narrative sense without over-interpreting as
    either merely physical growth ('grew up') or status alone ('became great').
- source_word: שְׁמוּאֵל
  chosen: Samuel
  rationale: Standard English transliteration of the personal name.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following Jewish reverence tradition and longstanding English convention reflecting
    the covenant name.
- source_word: הָיָה עִמּוֹ
  chosen: was with him
  alternatives:
  - was with Samuel
  lexicon: HALOT
  rationale: A straightforward rendering of the clause expressing the LORD's presence
    and favor. 'Was with him' preserves the Hebrew idiom and its theological weight.
- source_word: וְלֹא הִפִּיל
  chosen: and let none ... fall
  alternatives:
  - and did not let ... fall
  - and caused not ... to fall
  lexicon: HALOT
  rationale: The Hiphil of נפל with negation conveys that the LORD did not allow Samuel's
    words to fail. 'Let none ... fall' is idiomatic English and preserves the causative
    nuance.
- source_word: מִכָּל דְּבָרָיו
  chosen: none of his words
  alternatives:
  - any of his words
  - anything he said
  lexicon: HALOT
  rationale: This phrase means 'from all his words,' idiomatically 'none of his words.'
    'Words' is retained rather than paraphrasing to 'predictions' or 'messages,' since
    the text itself is broader.
- source_word: אָרְצָה
  chosen: to the ground
  alternatives:
  - to the earth
  lexicon: HALOT
  rationale: This directional form of 'earth/land' functions idiomatically in the
    expression 'fall to the ground,' conveying that none of Samuel's words proved
    empty or failed.
