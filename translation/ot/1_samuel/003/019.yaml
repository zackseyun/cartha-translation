theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse names Israel's covenant God. Per DOCTRINE.md, YHWH is rendered
    'the LORD' by default rather than transliterated forms.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Idiomatic force of 'let none of his words fall to the ground'
  chosen_reading: Retain the Hebrew idiom in readable English rather than interpretively
    paraphrasing it as fulfilled prophecy.
  alternative_readings:
  - allowed all his words to come true
  - did not let any of his words fail
  rationale: The context concerns Samuel's reliability as a prophet, but the Hebrew
    uses a vivid idiom. Preserving the idiom maintains literary texture and avoids
    importing a narrower doctrinal claim than the text states explicitly.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: preserve theological tension
    rather than resolve it; original-language primacy'
