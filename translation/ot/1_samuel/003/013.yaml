id: 1SA.3.13
reference: 1 Samuel 3:13
source:
  edition: WLC
  text: וְ/הִגַּ֣דְתִּי ל֔/וֹ כִּֽי שֹׁפֵ֥ט אֲנִ֛י אֶת בֵּית֖/וֹ עַד עוֹלָ֑ם בַּ/עֲוֺ֣ן
    אֲשֶׁר יָדַ֗ע כִּֽי מְקַֽלְלִ֤ים לָ/הֶם֙ בָּנָ֔י/ו וְ/לֹ֥א כִהָ֖ה בָּֽ/ם־־־־־׃
translation:
  text: And I have declared to him that I am judging his house forever for the iniquity
    that he knew, because his sons were cursing themselves, and he did not restrain
    them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, according to an alternative reading reflected in some ancient witnesses
      and many translations, 'because his sons were cursing God' or 'were blaspheming.'
    reason: alternative_reading
lexical_decisions:
- source_word: וְהִגַּדְתִּי
  chosen: And I have declared
  alternatives:
  - And I told
  - And I announced
  lexicon: HALOT
  rationale: Hiphil of נגד conveys making known or declaring. The perfect can be rendered
    as a present perfect in English to reflect a prior declaration with present relevance
    in the discourse.
- source_word: שֹׁפֵט אֲנִי
  chosen: I am judging
  alternatives:
  - I will judge
  - I judge
  lexicon: HALOT
  rationale: The participle with explicit pronoun can express ongoing or imminent
    action. 'I am judging' preserves the verbal aspect and the solemn immediacy better
    than a simple future, while still fitting the prophetic announcement.
- source_word: בֵּיתוֹ
  chosen: his house
  alternatives:
  - his household
  - his family line
  lexicon: HALOT
  rationale: '''House'' is the standard biblical idiom and can include both household
    and dynasty. Retaining ''house'' preserves that breadth without over-specifying.'
- source_word: עַד עוֹלָם
  chosen: forever
  alternatives:
  - for all time
  - perpetually
  lexicon: HALOT
  rationale: The phrase denotes enduring duration. 'Forever' is natural modern English
    and preserves the severity of the judgment.
- source_word: בַּעֲוֺן
  chosen: for the iniquity
  alternatives:
  - for the guilt
  - for the sin
  lexicon: HALOT
  rationale: עָוֹן often carries the sense of iniquity or guilt-bearing wrongdoing.
    'Iniquity' preserves the moral gravity and traditional nuance.
- source_word: יָדַע
  chosen: he knew
  alternatives:
  - he was aware
  - he had known
  lexicon: HALOT
  rationale: A straightforward rendering is best; the point is Eli's culpable knowledge
    of the offense.
- source_word: מְקַלְלִים לָהֶם
  chosen: were cursing themselves
  alternatives:
  - were bringing a curse on themselves
  - were cursing God
  lexicon: HALOT
  rationale: The consonantal text naturally yields 'cursing for themselves' or 'bringing
    a curse on themselves.' This avoids importing the likely scribal correction reflected
    in some traditions ('cursing God') into the main text, while preserving the MT-based
    reading.
- source_word: כִהָה בָּם
  chosen: did not restrain them
  alternatives:
  - did not rebuke them sharply
  - did not make them weak
  - did not confront them
  lexicon: HALOT
  rationale: The verb can mean to blunt, weaken, or restrain. In context Eli failed
    to check or curb his sons' behavior; 'restrain' communicates the practical force
    in clear English.
