theological_decisions:
- issue: Whether to follow the Masoretic reading about the sons' offense or adopt
    the alternative reflected in ancient versions and scribal tradition
  chosen_reading: Main text follows the MT sense 'his sons were cursing themselves'
  alternative_readings:
  - his sons were cursing God
  - his sons were blaspheming
  rationale: The Hebrew consonantal text supports a reflexive-like sense, while a
    well-known alternative reading likely arose from scribal avoidance of an irreverent
    expression and is reflected in some witnesses and many translations. To preserve
    original-language primacy and theological tension, the MT-based reading is kept
    in the main text and the alternative is preserved in a footnote.
  doctrine_reference: Translation philosophy 1 and 3
- issue: Scope of judgment on 'his house'
  chosen_reading: '''his house'' is retained without narrowing'
  alternative_readings:
  - his household
  - his family line
  rationale: The Hebrew idiom can include both immediate household and enduring family
    line. Retaining the idiom avoids over-resolving the scope of judgment.
  doctrine_reference: Translation philosophy 3 and 5
