id: 1SA.3.4
reference: 1 Samuel 3:4
source:
  edition: WLC
  text: וַ/יִּקְרָ֧א יְהוָ֛ה אֶל שְׁמוּאֵ֖ל וַ/יֹּ֥אמֶר הִנֵּֽ/נִי־׃
translation:
  text: Then Yahweh called to Samuel, and he said, “Here I am.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: YHWH; alternatively rendered ''Yahweh'' or ''Jehovah.'''
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּקְרָא
  chosen: called
  alternatives:
  - called out
  - summoned
  lexicon: HALOT
  rationale: Qal wayyiqtol of קרא in narrative sequence; 'called' is the natural English rendering and fits the context of an audible summons.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֶל
  chosen: to
  alternatives:
  - toward
  lexicon: HALOT
  rationale: The preposition marks the addressee of the call; 'to Samuel' is idiomatic English.
- source_word: שְׁמוּאֵל
  chosen: Samuel
  rationale: Personal name is transliterated by standard English convention.
- source_word: וַיֹּאמֶר
  chosen: he said
  alternatives:
  - and said
  - then he said
  lexicon: HALOT
  rationale: Standard narrative wayyiqtol of אמר. The subject is best understood from context as Samuel, since the direct speech 'Here I am' is Samuel's response to the call. English makes the implicit subject explicit.
- source_word: הִנֵּנִי
  chosen: Here I am
  alternatives:
  - Behold me
  - I am here
  lexicon: HALOT
  rationale: Idiomatic response formula indicating readiness/presence. 'Here I am' is natural modern English and preserves the biblical register better than the overly literal 'Behold me.'
