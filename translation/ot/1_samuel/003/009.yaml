id: 1SA.3.9
reference: 1 Samuel 3:9
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר עֵלִ֣י לִ/שְׁמוּאֵל֮ לֵ֣ךְ שְׁכָב֒ וְ/הָיָה֙ אִם יִקְרָ֣א אֵלֶ֔י/ךָ וְ/אָֽמַרְתָּ֙ דַּבֵּ֣ר יְהוָ֔ה כִּ֥י שֹׁמֵ֖עַ עַבְדֶּ֑/ךָ וַ/יֵּ֣לֶךְ שְׁמוּאֵ֔ל וַ/יִּשְׁכַּ֖ב בִּ/מְקוֹמֽ/וֹ־׃
translation:
  text: Then Eli said to Samuel, “Go, lie down, and if he calls to you, you shall say, ‘Speak, Yahweh, for your servant is listening.’” So Samuel went and lay down in his place.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''Speak, the LORD, for your servant is listening.'' Some translations render the divine name here as ''Yahweh'' rather than ''the LORD.'''
    reason: alternative_reading
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: Then Eli said
  alternatives:
  - And Eli said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then' gives natural English narrative flow while preserving sequence.
- source_word: לֵךְ שְׁכָב
  chosen: Go, lie down
  alternatives:
  - Go, lie down to sleep
  - Go and lie down
  lexicon: HALOT
  rationale: Two imperative verbs in sequence. 'Go, lie down' preserves the directness without adding 'to sleep,' which is implied but not explicit.
- source_word: וְהָיָה אִם
  chosen: and if
  alternatives:
  - and it shall be, if
  - and when
  lexicon: HALOT
  rationale: This construction introduces a conditional circumstance. 'And if' is idiomatic English and avoids wooden phrasing; 'when' would overstate certainty in the syntax.
- source_word: יִקְרָא אֵלֶיךָ
  chosen: he calls to you
  alternatives:
  - someone calls to you
  - he calls you
  lexicon: HALOT
  rationale: The Hebrew has an unexpressed 3ms subject. In context Eli now understands the caller to be the LORD, so 'he' is appropriate. 'Calls to you' reflects קרא + אֶל more closely than 'calls you'.
- source_word: וְאָמַרְתָּ
  chosen: you shall say
  alternatives:
  - say
  - then say
  lexicon: HALOT
  rationale: The qatal with prefixed conjunction after the conditional is naturally rendered as the consequent instruction. 'You shall say' preserves the directive force clearly in English.
- source_word: דַּבֵּר
  chosen: Speak
  alternatives:
  - Speak up
  - Speak on
  lexicon: HALOT
  rationale: Imperative addressed to the caller. Simple 'Speak' is the most direct and least interpretive rendering.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - since
  lexicon: HALOT
  rationale: Introduces the reason for the request. 'For' is concise and natural in solemn speech.
- source_word: שֹׁמֵעַ
  chosen: is listening
  alternatives:
  - hears
  - is hearing
  lexicon: HALOT
  rationale: The participle expresses ongoing attentiveness. 'Is listening' better captures active readiness than the more static 'hears.'
- source_word: עַבְדֶּךָ
  chosen: your servant
  alternatives:
  - your slave
  lexicon: HALOT
  rationale: Although עבד can denote slave/servant, here it functions as a deferential self-designation before the LORD rather than emphasizing bonded status. 'Your servant' is the most contextually fitting rendering.
- source_word: וַיֵּלֶךְ ... וַיִּשְׁכַּב
  chosen: So Samuel went and lay down
  alternatives:
  - And Samuel went and lay down
  - Then Samuel went and lay down
  lexicon: HALOT
  rationale: Sequential wayyiqtol verbs continue the narrative. 'So' smoothly marks the result of Eli's instruction.
- source_word: בִּמְקוֹמוֹ
  chosen: in his place
  alternatives:
  - in his own place
  - in his usual place
  lexicon: HALOT
  rationale: The phrase denotes Samuel's designated location. 'In his place' is sufficiently literal without adding interpretive detail such as 'usual.'
