theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Implicit subject of יִקְרָא
  chosen_reading: he calls to you
  alternative_readings:
  - someone calls to you
  rationale: The Hebrew leaves the subject implicit, but the immediate context shows Eli has discerned that the caller is the LORD. Using 'he' preserves the narrative inference without over-expanding to a proper name in the clause itself.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3
