id: 1SA.3.16
reference: 1 Samuel 3:16
source:
  edition: WLC
  text: וַ/יִּקְרָ֤א עֵלִי֙ אֶת שְׁמוּאֵ֔ל וַ/יֹּ֖אמֶר שְׁמוּאֵ֣ל בְּנִ֑/י וַ/יֹּ֖אמֶר
    הִנֵּֽ/נִי־׃
translation:
  text: Then Eli called Samuel and said, “Samuel, my son.” And he said, “Here I am.”
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיִּקְרָא
  chosen: called
  alternatives:
  - called out to
  - summoned
  lexicon: HALOT
  rationale: The verb קרא in this narrative context most naturally means 'called'
    or 'called out to.' 'Called' is concise, natural English and fits Eli addressing
    Samuel verbally.
- source_word: עֵלִי
  chosen: Eli
  rationale: Personal name is transliterated by standard English convention, in keeping
    with the translation philosophy to transliterate names.
- source_word: אֶת שְׁמוּאֵל
  chosen: Samuel
  rationale: Direct-object marker אֶת is not represented in English; the personal
    name is transliterated conventionally as 'Samuel.'
- source_word: וַיֹּאמֶר
  chosen: said
  alternatives:
  - spoke
  lexicon: HALOT
  rationale: אמר is the standard narrative speech verb. 'Said' is the most natural
    and consistent rendering in English narrative.
- source_word: שְׁמוּאֵל בְּנִי
  chosen: Samuel, my son
  alternatives:
  - Samuel, son
  - Samuel, child
  lexicon: HALOT
  rationale: בְּנִי literally means 'my son.' Here it is likely affectionate or relational
    address from Eli to the younger Samuel. 'My son' preserves the lexical sense and
    relational warmth without overinterpreting.
- source_word: הִנֵּנִי
  chosen: Here I am
  alternatives:
  - I am here
  - Yes?
  lexicon: HALOT
  rationale: הִנֵּנִי is a conventional Hebrew response indicating presence and readiness.
    'Here I am' is the established and accurate English equivalent, preserving the
    idiomatic force better than the flatter 'I am here.'
- source_word: וַ
  chosen: Then / And
  alternatives:
  - Now
  rationale: The waw-consecutive structure advances the narrative. Rendering the first
    with 'Then' improves readable English while preserving sequence; the later waw
    is retained as 'And' before Samuel's reply.
