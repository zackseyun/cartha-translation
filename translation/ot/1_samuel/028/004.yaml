id: 1SA.28.4
reference: 1 Samuel 28:4
source:
  edition: WLC
  text: וַ/יִּקָּבְצ֣וּ פְלִשְׁתִּ֔ים וַ/יָּבֹ֖אוּ וַ/יַּחֲנ֣וּ בְ/שׁוּנֵ֑ם וַ/יִּקְבֹּ֤ץ
    שָׁאוּל֙ אֶת כָּל יִשְׂרָאֵ֔ל וַֽ/יַּחֲנ֖וּ בַּ/גִּלְבֹּֽעַ־־׃
translation:
  text: The Philistines gathered and came and camped at Shunem, and Saul gathered
    all Israel, and they camped at Gilboa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'encamped' for both occurrences of 'camped.'
    reason: lexical_alternative
  - marker: b
    text: '''At Gilboa'' could also be rendered ''on Gilboa'' or ''at Mount Gilboa,''
      since the place refers to the Gilboa highlands.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקָּבְצוּ
  chosen: gathered
  alternatives:
  - assembled
  - were gathered together
  lexicon: HALOT
  rationale: From קבץ, denoting assembling or gathering. 'Gathered' is concise, natural
    English and preserves the military mustering sense without overinterpreting passive
    nuance.
- source_word: פְלִשְׁתִּים
  chosen: the Philistines
  lexicon: HALOT
  rationale: Standard transliteration for the people group; the article is supplied
    naturally in English for a known national group.
- source_word: וַיָּבֹאוּ
  chosen: came
  alternatives:
  - advanced
  - arrived
  lexicon: HALOT
  rationale: From בוא, basic motion verb. 'Came' preserves the simple narrative progression
    and avoids adding military coloring not explicit in the verb itself.
- source_word: וַיַּחֲנוּ
  chosen: camped
  alternatives:
  - encamped
  - set up camp
  lexicon: HALOT
  rationale: From חנה, used for pitching camp. 'Camped' is readable modern English;
    'encamped' is possible but slightly more archaic.
- source_word: בְשׁוּנֵם
  chosen: at Shunem
  alternatives:
  - in Shunem
  lexicon: HALOT
  rationale: With a place name in a military setting, English idiom favors 'at Shunem'
    for the location of a camp, though 'in Shunem' is possible.
- source_word: וַיִּקְבֹּץ
  chosen: gathered
  alternatives:
  - assembled
  - mustered
  lexicon: HALOT
  rationale: Same root קבץ as earlier in the verse. 'Gathered' maintains lexical consistency.
    'Mustered' would sharpen the military sense but is more interpretive than the
    Hebrew requires.
- source_word: כָּל יִשְׂרָאֵל
  chosen: all Israel
  alternatives:
  - all the men of Israel
  - all the Israelites
  lexicon: HALOT
  rationale: The Hebrew says 'all Israel,' a common collective expression for the
    nation/army. This preserves the source wording without narrowing it to males explicitly,
    since that is not stated here.
- source_word: וַיַּחֲנוּ
  chosen: they camped
  alternatives:
  - they encamped
  - they set up camp
  lexicon: HALOT
  rationale: The plural verb refers to Saul's gathered forces. English requires an
    explicit subject pronoun for clarity after the singular-subject clause about Saul.
- source_word: בַּגִּלְבֹּעַ
  chosen: at Gilboa
  alternatives:
  - on Gilboa
  - at Mount Gilboa
  lexicon: HALOT
  rationale: The Hebrew names Gilboa without 'mount.' 'At Gilboa' is a natural rendering
    that does not add topographical detail beyond the text, though the location is
    the Gilboa range.
