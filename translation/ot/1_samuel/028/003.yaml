theological_decisions:
- issue: Rendering occult-practitioner terms without importing later folklore
  chosen_reading: mediums and spiritists
  alternative_readings:
  - those with familiar spirits and wizards
  - necromancers and diviners
  rationale: The Hebrew names prohibited practitioners, but the exact taxonomy is
    not identical to later English occult categories. 'Mediums and spiritists' communicates
    the basic sense clearly while avoiding archaic or fantasy-laden terms.
  doctrine_reference: Translation philosophy §§1, 6
