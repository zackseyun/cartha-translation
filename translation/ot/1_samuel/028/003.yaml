id: 1SA.28.3
reference: 1 Samuel 28:3
source:
  edition: WLC
  text: וּ/שְׁמוּאֵ֣ל מֵ֔ת וַ/יִּסְפְּדוּ ל/וֹ֙ כָּל יִשְׂרָאֵ֔ל וַ/יִּקְבְּרֻ֥/הוּ
    בָ/רָמָ֖ה וּ/בְ/עִיר֑/וֹ וְ/שָׁא֗וּל הֵסִ֛יר הָ/אֹב֥וֹת וְ/אֶת הַ/יִּדְּעֹנִ֖ים
    מֵ/הָ/אָֽרֶץ־־־׃
translation:
  text: Now Samuel had died, and all Israel had mourned for him and buried him in
    Ramah, in his own city. And Saul had removed the mediums and the spiritists from
    the land.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'those with familiar spirits and the wizards.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מֵת
  chosen: had died
  alternatives:
  - died
  - was dead
  lexicon: HALOT
  rationale: Rendered as pluperfect ('had died') to reflect the backgrounding function
    in context, setting prior circumstances before the narrative that follows.
- source_word: וַיִּסְפְּדוּ לּוֹ
  chosen: had mourned for him
  alternatives:
  - lamented for him
  - wailed for him
  lexicon: HALOT
  rationale: ספד denotes public mourning/lamentation, often funerary. 'Mourned for
    him' is natural modern English and preserves the funeral context without overstating
    vocal expression.
- source_word: כָּל יִשְׂרָאֵל
  chosen: all Israel
  alternatives:
  - all the Israelites
  lexicon: HALOT
  rationale: Kept the collective national expression 'all Israel,' a standard biblical
    idiom, rather than expanding interpretively to 'all the Israelites.'
- source_word: וַיִּקְבְּרֻהוּ
  chosen: buried him
  alternatives:
  - had buried him
  - interred him
  lexicon: HALOT
  rationale: 'Straightforward rendering of קבר. Though the clause is also part of
    the background summary, English reads smoothly with a shared auxiliary from the
    prior clause: ''had mourned for him and buried him.'''
- source_word: בָרָמָה
  chosen: in Ramah
  lexicon: HALOT
  rationale: Proper place name transliterated by standard English convention.
- source_word: וּבְעִירוֹ
  chosen: in his own city
  alternatives:
  - in his city
  - and in his city
  lexicon: HALOT
  rationale: The pronominal suffix marks possession; 'his own city' brings out the
    sense idiomatically in English. The prefixed conjunction is absorbed into smooth
    apposition with 'Ramah' rather than woodenly repeated.
- source_word: הֵסִיר
  chosen: had removed
  alternatives:
  - removed
  - put away
  - expelled
  lexicon: HALOT
  rationale: Rendered as pluperfect to match the verse's summary of prior conditions
    before Saul's present crisis. 'Removed' is broad enough to cover official expulsion
    or suppression without specifying method.
- source_word: הָאֹבוֹת
  chosen: the mediums
  alternatives:
  - those with familiar spirits
  - necromancers
  lexicon: HALOT
  rationale: אוֹב refers to a medium associated with consulting the dead. 'Mediums'
    is clear modern English; the more traditional 'those with familiar spirits' is
    less transparent to contemporary readers.
- source_word: הַיִּדְּעֹנִים
  chosen: the spiritists
  alternatives:
  - wizards
  - diviners
  lexicon: HALOT
  rationale: יִדְּעֹנִי denotes an occult practitioner, often paired with אוֹב. 'Spiritists'
    preserves the supernatural-consultation sense and pairs naturally with 'mediums.'
    'Wizards' is traditional but misleading in modern English.
- source_word: מֵהָאָרֶץ
  chosen: from the land
  alternatives:
  - from the הארץ
  - from the country
  lexicon: HALOT
  rationale: '''The land'' is the most direct rendering and fits the national setting.
    ''Country'' is possible but less biblically textured.'
