id: 1SA.28.19
reference: 1 Samuel 28:19
source:
  edition: WLC
  text: וְ/יִתֵּ֣ן יְ֠הוָה גַּ֣ם אֶת יִשְׂרָאֵ֤ל עִמְּ/ךָ֙ בְּ/יַד פְּלִשְׁתִּ֔ים וּ/מָחָ֕ר אַתָּ֥ה וּ/בָנֶ֖י/ךָ עִמִּ֑/י גַּ֚ם אֶת מַחֲנֵ֣ה יִשְׂרָאֵ֔ל יִתֵּ֥ן יְהוָ֖ה בְּ/יַד פְּלִשְׁתִּֽים־־־־׃
translation:
  text: And Yahweh will also give Israel with you into the hand of the Philistines, and tomorrow you and your sons will be with me. Yahweh will also give the camp of Israel into the hand of the Philistines.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'with me in death' or 'with me in Sheol.' The Hebrew simply says 'with me.'
    reason: alternative_reading
  - marker: b
    text: Or, 'the camp of Israel.' The Hebrew term can mean 'camp' or, in context, 'army.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving the traditional English convention for YHWH.
- source_word: וְיִתֵּן / יִתֵּן
  chosen: will give
  alternatives:
  - will deliver
  - will hand over
  lexicon: HALOT
  rationale: נתן with בְּיַד commonly means to give into someone's power. 'Will give' preserves the Hebrew wording while remaining natural English; the hostile sense is clarified by the following phrase 'into the hand of.'
- source_word: גַּם
  chosen: also
  alternatives:
  - indeed
  - even
  lexicon: HALOT
  rationale: 'Marks addition/emphasis in both clauses. ''Also'' best reflects the cumulative force: not only Saul, but Israel and the army as well.'
- source_word: עִמְּךָ
  chosen: with you
  alternatives:
  - along with you
  lexicon: HALOT
  rationale: Straightforward rendering of the preposition with second masculine singular suffix; it indicates Israel shares Saul's fate.
- source_word: בְּיַד פְּלִשְׁתִּים
  chosen: into the hand of the Philistines
  alternatives:
  - into the power of the Philistines
  - to the Philistines
  lexicon: HALOT
  rationale: A standard Hebrew idiom for being delivered into another's control. Retaining 'hand' preserves the source imagery and remains idiomatic enough in English Bible style.
- source_word: וּמָחָר
  chosen: and tomorrow
  alternatives:
  - tomorrow
  lexicon: HALOT
  rationale: The conjunction is retained to mirror the Hebrew sequence and solemn buildup of the pronouncement.
- source_word: וּבָנֶיךָ
  chosen: and your sons
  alternatives:
  - and your children
  lexicon: HALOT
  rationale: בנים specifically denotes sons here, not children in general; this is gender-accurate and contextually appropriate.
- source_word: עִמִּי
  chosen: with me
  alternatives:
  - with me in death
  - where I am
  lexicon: HALOT
  rationale: The Hebrew is terse and does not explicitly say 'dead' or 'in Sheol.' 'With me' preserves the ambiguity of Samuel's statement while naturally implying the realm of the dead from context.
- source_word: מַחֲנֵה יִשְׂרָאֵל
  chosen: the army of Israel
  alternatives:
  - the camp of Israel
  - the host of Israel
  lexicon: HALOT
  rationale: מַחֲנֶה can mean camp or army. In this battle context, 'army' communicates the referent more clearly in modern English, while still fitting the military sense of the Hebrew.
