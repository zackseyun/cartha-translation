id: 1SA.28.24
reference: 1 Samuel 28:24
source:
  edition: WLC
  text: וְ/לָ/אִשָּׁ֤ה עֵֽגֶל מַרְבֵּק֙ בַּ/בַּ֔יִת וַ/תְּמַהֵ֖ר וַ/תִּזְבָּחֵ֑/הוּ
    וַ/תִּקַּח קֶ֣מַח וַ/תָּ֔לָשׁ וַ/תֹּפֵ֖/הוּ מַצּֽוֹת־־׃
translation:
  text: Now the woman had a fattened calf in the house, and she hurried and slaughtered
    it. Then she took flour, kneaded it, and baked unleavened bread from it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'stall-fed calf' or traditionally 'fatted calf.'
    reason: lexical_alternative
  - marker: b
    text: The verb can be used for sacrificial slaughter in some contexts, but here
      it refers to butchering the animal for a meal.
    reason: lexical_alternative
  - marker: c
    text: Or 'unleavened cakes.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עֵגֶל
  chosen: calf
  alternatives:
  - young bull
  - young cow
  lexicon: HALOT
  rationale: The noun denotes a young bovine animal. 'Calf' is the most natural and
    established English equivalent in this narrative context.
- source_word: מַרְבֵּק
  chosen: fattened
  alternatives:
  - stall-fed
  - fatted
  lexicon: HALOT
  rationale: The term refers to an animal that has been fattened, likely stall-fed.
    'Fattened' is clear modern English; 'fatted' is traditional but less natural today.
- source_word: בַּבַּיִת
  chosen: in the house
  alternatives:
  - at home
  - in the household
  lexicon: HALOT
  rationale: The phrase is locative and straightforward. 'In the house' preserves
    the concrete sense better than the more idiomatic 'at home.'
- source_word: וַתְּמַהֵר
  chosen: she hurried
  alternatives:
  - she hastened
  - she quickly
  lexicon: HALOT
  rationale: The verb conveys haste. 'She hurried' is idiomatic modern English and
    preserves the narrative urgency.
- source_word: וַתִּזְבָּחֵהוּ
  chosen: slaughtered it
  alternatives:
  - killed it
  - sacrificed it
  lexicon: HALOT
  rationale: Although the verb can be used for sacrificial slaughter, here the context
    is meal preparation, not cultic worship. 'Slaughtered it' best captures butchering
    an animal for food without importing sacrificial overtones.
- source_word: קֶמַח
  chosen: flour
  alternatives:
  - meal
  lexicon: HALOT
  rationale: The noun refers to flour used for baking. 'Flour' is the clearest contemporary
    rendering.
- source_word: וַתָּלָשׁ
  chosen: kneaded it
  alternatives:
  - worked it into dough
  lexicon: HALOT
  rationale: The verb specifically refers to kneading dough. 'Kneaded it' is precise
    and natural.
- source_word: וַתֹּפֵהוּ
  chosen: baked unleavened bread from it
  alternatives:
  - baked it into unleavened bread
  - baked unleavened cakes from it
  lexicon: HALOT
  rationale: The verb means 'bake,' with the object pronoun referring back to the
    dough/flour preparation. Rendering the result together with מַצּוֹת makes the
    English smoother while preserving the sequence.
- source_word: מַצּוֹת
  chosen: unleavened bread
  alternatives:
  - unleavened cakes
  - matzot
  lexicon: HALOT
  rationale: The plural denotes bread made without leaven. 'Unleavened bread' is the
    clearest general English rendering; 'matzot' would be a transliteration rather
    than translation.
