theological_decisions:
- issue: Rendering of occult practitioner terminology without softening or sensationalizing
    the text
  chosen_reading: Translate אֵשֶׁת בַּעֲלַת אוֹב as 'a woman who is a medium'
  alternative_readings:
  - a woman with a familiar spirit
  - a necromancer
  rationale: The verse describes Saul seeking illicit supernatural consultation. 'Medium'
    communicates this clearly in contemporary English without importing extra interpretive
    detail beyond the Hebrew. The translation preserves the text's negative occult
    context while remaining accessible.
  doctrine_reference: Translation philosophy §§1, 5, 6
