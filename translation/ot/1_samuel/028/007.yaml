id: 1SA.28.7
reference: 1 Samuel 28:7
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר שָׁא֜וּל לַ/עֲבָדָ֗י/ו בַּקְּשׁוּ לִ/י֙ אֵ֣שֶׁת בַּעֲלַת א֔וֹב
    וְ/אֵלְכָ֥ה אֵלֶ֖י/הָ וְ/אֶדְרְשָׁה בָּ֑/הּ וַ/יֹּאמְר֤וּ עֲבָדָי/ו֙ אֵלָ֔י/ו
    הִנֵּ֛ה אֵ֥שֶׁת בַּֽעֲלַת א֖וֹב בְּ/עֵ֥ין דּֽוֹר־־־־׃
translation:
  text: Then Saul said to his servants, “Find for me a woman who is a medium, so that
    I may go to her and inquire through her.” And his servants said to him, “Look,
    there is a woman who is a medium at En-dor.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''a woman, mistress/possessor of an ʾov''; traditionally ''a woman
      with a familiar spirit.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵשֶׁת בַּעֲלַת אוֹב
  chosen: a woman who is a medium
  alternatives:
  - a woman, mistress of a spirit
  - a woman with a familiar spirit
  - a necromancer
  lexicon: HALOT
  rationale: The Hebrew phrase literally combines 'woman of/possessing' with אוֹב.
    In context it refers to a female practitioner who consults the dead or spirits.
    'Medium' is clear modern English and avoids archaic 'familiar spirit' while preserving
    the occult sense. Because the phrase is repeated in the verse, the same English
    rendering is kept both times for consistency.
- source_word: אוֹב
  chosen: medium
  alternatives:
  - ghost
  - spirit of the dead
  - familiar spirit
  lexicon: HALOT
  rationale: אוֹב can denote the spirit consulted or, by extension, the practitioner
    associated with such consultation. Here, within בַּעֲלַת אוֹב, the referent is
    the practitioner. 'Medium' best captures the role in idiomatic modern English.
- source_word: בַּקְּשׁוּ לִי
  chosen: Find for me
  alternatives:
  - Seek for me
  - Look for me
  lexicon: HALOT
  rationale: בקש means seek/request. In this context Saul is commanding his servants
    to locate such a woman, so 'Find for me' is natural English that reflects the
    practical force of the imperative.
- source_word: וְאֶדְרְשָׁה בָּהּ
  chosen: and inquire through her
  alternatives:
  - and consult her
  - and seek by her
  - and inquire of her
  lexicon: HALOT
  rationale: דרש with ב can mean seek/inquire by means of someone or something. 'Inquire
    through her' preserves the mediating sense better than simply 'consult her,' fitting
    the context of necromantic inquiry.
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: הִנֵּה introduces the servants' response with deictic force. 'Look' is
    readable modern English; 'behold' would be too archaic for the stated philosophy.
- source_word: בְּעֵין דּוֹר
  chosen: at En-dor
  alternatives:
  - in En-dor
  lexicon: HALOT
  rationale: As a place name, עֵין דּוֹר is conventionally transliterated En-dor.
    The preposition ב is rendered 'at' for idiomatic English with a town/location.
- source_word: עֲבָדָיו
  chosen: his servants
  alternatives:
  - his attendants
  - his servants/slaves
  lexicon: HALOT
  rationale: In a royal court context, עבדים commonly refers to royal servants/attendants.
    'Servants' is the most natural rendering here; the bonded status is not the focus
    of the verse.
- source_word: וְאֵלְכָה אֵלֶיהָ
  chosen: so that I may go to her
  alternatives:
  - and I will go to her
  - that I may go to her
  lexicon: HALOT
  rationale: The cohortative expresses Saul's intended action following the command.
    'So that I may go to her' captures the purpose/result relation in smooth English.
