id: 1SA.28.17
reference: 1 Samuel 28:17
source:
  edition: WLC
  text: וַ/יַּ֤עַשׂ יְהוָה֙ ל֔/וֹ כַּ/אֲשֶׁ֖ר דִּבֶּ֣ר בְּ/יָדִ֑/י וַ/יִּקְרַ֨ע יְהוָ֤ה אֶת הַ/מַּמְלָכָה֙ מִ/יָּדֶ֔/ךָ וַֽ/יִּתְּנָ֖/הּ לְ/רֵעֲ/ךָ֥ לְ/דָוִֽד־׃
translation:
  text: 'And Yahweh has done for you just as he spoke by my hand: Yahweh has torn the kingdom out of your hand and given it to your neighbor, to David.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''has done for himself.'' Many translations read ''has done to you'' or ''for you,'' smoothing the sense toward Saul; the Masoretic Text here reads ''for him/for himself.'''
    reason: alternative_reading
  - marker: b
    text: Or 'just as he spoke through me.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name YHWH per DOCTRINE.md.
- source_word: וַיַּעַשׂ ... לוֹ
  chosen: has done for himself
  alternatives:
  - has done to him
  - has done as his own
  - has acted for himself
  lexicon: HALOT
  rationale: The consonantal text reads לוֹ ('for him/for himself'), not לְךָ ('for you') as in some translations influenced by versions or contextual smoothing. Rendering it transparently preserves the MT reading. Because the sense is somewhat awkward in English, 'for himself' best reflects the dative/pronominal form while keeping the clause intelligible.
- source_word: כַּאֲשֶׁר דִּבֶּר בְּיָדִי
  chosen: just as he spoke by my hand
  alternatives:
  - just as he spoke through me
  - just as he said by me
  lexicon: HALOT
  rationale: בְּיַד with a human intermediary commonly means 'by the agency of' or 'through.' 'By my hand' preserves the Hebrew idiom while remaining understandable; the prophetic mediation is explicit.
- source_word: וַיִּקְרַע
  chosen: has torn
  alternatives:
  - tore
  - has ripped away
  lexicon: HALOT
  rationale: קָרַע literally means 'tear/rend.' 'Has torn' preserves the vivid metaphor and matches the immediate context of the kingdom being removed. Present perfect fits the English representation of the Hebrew wayyiqtol here within Samuel's pronouncement of a now-effected divine action.
- source_word: הַמַּמְלָכָה
  chosen: the kingdom
  alternatives:
  - the kingship
  - the royal rule
  lexicon: HALOT
  rationale: '''Kingdom'' is the most natural rendering here for Saul''s royal dominion; ''kingship'' is possible but less idiomatic in this clause.'
- source_word: מִיָּדֶךָ
  chosen: out of your hand
  alternatives:
  - from your hand
  - from your power
  lexicon: HALOT
  rationale: The idiom denotes removal from Saul's possession/control. 'Out of your hand' preserves the Hebrew image more fully than a flattened 'from your power.'
- source_word: וַיִּתְּנָהּ
  chosen: and given it
  alternatives:
  - and has given it
  - and gave it
  lexicon: HALOT
  rationale: Refers back to the feminine noun 'kingdom.' English supplies 'it.' Coordinated with 'has torn' as part of the same completed divine action.
- source_word: לְרֵעֲךָ
  chosen: to your neighbor
  alternatives:
  - to your companion
  - to another close to you
  lexicon: HALOT
  rationale: רֵעַ commonly means 'friend, companion, neighbor.' In this context of transfer to another person, 'neighbor' is the established and sufficiently broad rendering, especially since the apposition 'to David' identifies the referent.
- source_word: לְדָוִד
  chosen: to David
  lexicon: HALOT
  rationale: Personal name transliterated per project policy.
