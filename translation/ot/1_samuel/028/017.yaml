theological_decisions:
- issue: Masoretic Text reading לוֹ in the first clause
  chosen_reading: Translate the MT directly as 'has done for himself' rather than emending to 'for you.'
  alternative_readings:
  - '''has done to you'''
  - '''has done for you'''
  rationale: The Hebrew provided is unequivocally לוֹ. Although many translations render the sense toward Saul ('to you'/'for you'), likely influenced by context or textual traditions, the project prioritizes original-language primacy and transparency. The awkwardness is retained rather than silently resolved.
  doctrine_reference: Translation philosophy §1, §3
