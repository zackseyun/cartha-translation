theological_decisions:
- issue: Rendering occult-practice terms without softening or importing later folklore
  chosen_reading: mediums and spiritists
  alternative_readings:
  - those with familiar spirits and wizards
  - necromancers and diviners
  rationale: The verse concerns prohibited practitioners expelled by Saul. The chosen
    rendering communicates the basic referents in accessible modern English without
    endorsing any particular theory of how these practices functioned. Traditional
    alternatives are preserved because they are familiar in English Bible history
    and reflect narrower lexical nuances.
  doctrine_reference: Translation philosophy §§1, 6
