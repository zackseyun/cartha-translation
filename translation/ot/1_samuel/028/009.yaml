id: 1SA.28.9
reference: 1 Samuel 28:9
source:
  edition: WLC
  text: וַ/תֹּ֨אמֶר הָֽ/אִשָּׁ֜ה אֵלָ֗י/ו הִנֵּ֨ה אַתָּ֤ה יָדַ֨עְתָּ֙ אֵ֣ת אֲשֶׁר
    עָשָׂ֣ה שָׁא֔וּל אֲשֶׁ֥ר הִכְרִ֛ית אֶת הָ/אֹב֥וֹת וְ/אֶת הַ/יִּדְּעֹנִ֖י מִן הָ/אָ֑רֶץ
    וְ/לָ/מָ֥ה אַתָּ֛ה מִתְנַקֵּ֥שׁ בְּ/נַפְשִׁ֖/י לַ/הֲמִיתֵֽ/נִי־־־־׃
translation:
  text: But the woman said to him, “Look, you yourself know what Saul has done, how
    he has cut off the mediums and the spiritists from the land. So why are you laying
    a snare for my life, to put me to death?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “those with familiar spirits and the wizards.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתֹּאמֶר
  chosen: But ... said
  alternatives:
  - And ... said
  - Then ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'But' fits the adversative
    sense in context, since the woman responds cautiously and resistively to Saul's
    request.
- source_word: הָאִשָּׁה
  chosen: the woman
  lexicon: HALOT
  rationale: Straightforward rendering of the noun with article; context identifies
    her as the woman of Endor.
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: Introduces emphatic attention. 'Look' is natural modern English and preserves
    the discourse force without archaic tone.
- source_word: אַתָּה יָדַעְתָּ
  chosen: you yourself know
  alternatives:
  - you know
  - surely you know
  lexicon: HALOT
  rationale: The explicit pronoun with the verb adds emphasis. 'You yourself know'
    reflects that emphasis better than a simple 'you know.'
- source_word: אֵת אֲשֶׁר עָשָׂה שָׁאוּל
  chosen: what Saul has done
  alternatives:
  - that which Saul did
  lexicon: HALOT
  rationale: Idiomatic English for the object clause while preserving the reference
    to Saul's prior actions.
- source_word: הִכְרִית
  chosen: has cut off
  alternatives:
  - has eliminated
  - has removed
  - has exterminated
  lexicon: HALOT
  rationale: The verb commonly means 'cut off' in the sense of removing or eradicating.
    'Cut off' preserves the Hebrew idiom and its severity.
- source_word: הָאֹבוֹת
  chosen: the mediums
  alternatives:
  - those with familiar spirits
  - necromancers
  lexicon: HALOT
  rationale: In this context אוֹב refers to practitioners who consult the dead/spirits.
    'Mediums' is the clearest modern English equivalent, while the more literal traditional
    expression is preserved as an alternative.
- source_word: הַיִּדְּעֹנִי
  chosen: the spiritists
  alternatives:
  - wizards
  - diviners
  lexicon: HALOT
  rationale: This term denotes those claiming occult knowledge or spirit consultation.
    'Spiritists' pairs naturally with 'mediums' and avoids the misleading fantasy
    connotations of 'wizards.'
- source_word: מִן הָאָרֶץ
  chosen: from the land
  alternatives:
  - from the הארץ/earth
  - out of the country
  lexicon: HALOT
  rationale: In context this refers to the land of Israel, not the whole earth. 'From
    the land' is formally close and contextually clear.
- source_word: וְלָמָה
  chosen: So why
  alternatives:
  - And why
  - Why then
  lexicon: HALOT
  rationale: Connects her inference from Saul's policy to her suspicion of the visitor's
    intent. 'So why' captures the logical progression naturally.
- source_word: מִתְנַקֵּשׁ
  chosen: are you laying a snare
  alternatives:
  - are you trapping
  - are you setting a trap
  lexicon: HALOT
  rationale: The verb carries the sense of ensnaring or setting a trap. 'Laying a
    snare' preserves the metaphor and the hostile intent.
- source_word: בְּנַפְשִׁי
  chosen: for my life
  alternatives:
  - against my life
  - at my life
  lexicon: HALOT
  rationale: Hebrew 'in/against my life' idiomatically means targeting her life. 'For
    my life' works with the snare metaphor in English ('laying a snare for my life').
- source_word: לַהֲמִיתֵנִי
  chosen: to put me to death
  alternatives:
  - to kill me
  lexicon: HALOT
  rationale: The infinitive expresses purpose/result. 'To put me to death' fits the
    legal-danger context and sounds slightly more formal than 'kill me,' matching
    her fear of execution.
