id: 1SA.28.25
reference: 1 Samuel 28:25
source:
  edition: WLC
  text: וַ/תַּגֵּ֧שׁ לִ/פְנֵֽי שָׁא֛וּל וְ/לִ/פְנֵ֥י עֲבָדָ֖י/ו וַ/יֹּאכֵ֑לוּ וַ/יָּקֻ֥מוּ
    וַ/יֵּלְכ֖וּ בַּ/לַּ֥יְלָה הַ/הֽוּא־׃פ
translation:
  text: Then she brought it before Saul and before his servants, and they ate. Then
    they rose and went away that night.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew literally, ''she brought [it] before Saul and before his servants.''
      The object is implied from the previous context: the prepared meal.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתַּגֵּשׁ
  chosen: Then she brought it before
  alternatives:
  - Then she set it before
  - Then she presented it before
  lexicon: HALOT
  rationale: The verb נגשׁ in this Hiphil/waw-consecutive context means to bring near
    or set before someone. Because the immediately preceding context specifies the
    prepared meal, English requires an object; 'it' is supplied to make the clause
    natural and explicit. 'Brought it before' balances formal fidelity with readable
    English.
- source_word: לִפְנֵי
  chosen: before
  alternatives:
  - in the presence of
  lexicon: HALOT
  rationale: The preposition literally means 'before/in front of.' Here 'before' is
    the most natural idiomatic rendering in English for placing food before diners.
- source_word: עֲבָדָיו
  chosen: his servants
  alternatives:
  - his attendants
  lexicon: HALOT
  rationale: The noun עבד commonly means servant, slave, or attendant depending on
    context. Here it refers to Saul's accompanying men in royal service. 'Servants'
    is a straightforward rendering; 'slaves' would overstate bonded status in this
    narrative setting, and 'attendants' is possible but less direct.
- source_word: וַיֹּאכֵלוּ
  chosen: and they ate
  alternatives:
  - and they ate it
  lexicon: HALOT
  rationale: The verb simply states that Saul and his servants ate. English can omit
    the object naturally because it is understood from context.
- source_word: וַיָּקֻמוּ
  chosen: Then they rose
  alternatives:
  - and they got up
  - and they arose
  lexicon: HALOT
  rationale: '''Rose'' preserves the narrative sequence and has suitable dignity in
    English without sounding archaic in this context.'
- source_word: וַיֵּלְכוּ
  chosen: and went away
  alternatives:
  - and went
  - and departed
  lexicon: HALOT
  rationale: הלך means 'go/walk.' In context, after eating and rising, the sense is
    departure from the woman's house. 'Went away' makes that implicit movement explicit
    in idiomatic English.
- source_word: בַּלַּיְלָה הַהוּא
  chosen: that night
  alternatives:
  - in that night
  - during that night
  lexicon: HALOT
  rationale: The Hebrew phrase is literally 'in that night,' but standard English
    idiom is 'that night.' This preserves the temporal emphasis without wooden phrasing.
