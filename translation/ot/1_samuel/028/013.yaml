theological_decisions:
- issue: How to render אֱלֹהִים in the medium's report
  chosen_reading: a divine being
  alternative_readings:
  - gods
  - God
  rationale: The verse reports the woman's perception, not a narrator-endorsed doctrinal
    statement. Rendering אֱלֹהִים as 'a divine being' preserves the supernatural sense
    without implying polytheism or identifying the apparition as God. This maintains
    theological restraint and preserves ambiguity present in the Hebrew form.
  doctrine_reference: Preserve theological tension rather than resolve it.
