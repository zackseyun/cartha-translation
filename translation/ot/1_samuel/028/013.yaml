id: 1SA.28.13
reference: 1 Samuel 28:13
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר לָ֥/הּ הַ/מֶּ֛לֶךְ אַל תִּֽירְאִ֖י כִּ֣י מָ֣ה רָאִ֑ית וַ/תֹּ֤אמֶר
    הָֽ/אִשָּׁה֙ אֶל שָׁא֔וּל אֱלֹהִ֥ים רָאִ֖יתִי עֹלִ֥ים מִן הָ/אָֽרֶץ־־־׃
translation:
  text: The king said to her, “Do not be afraid, for what do you see?” And the woman
    said to Saul, “I see a divine being coming up from the earth.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''what have you seen?'' The Hebrew verb is formally past/perfect,
      though the sense may be immediate in context.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew אֱלֹהִים is plural in form and could be rendered 'gods' or, in context,
      'a divine being.'
    reason: alternative_reading
lexical_decisions:
- source_word: הַמֶּלֶךְ
  chosen: the king
  alternatives:
  - King Saul
  lexicon: HALOT
  rationale: The Hebrew uses the common noun with article, not the proper name. 'The
    king' preserves the narrative style; Saul is identified in the following clause.
- source_word: אַל תִּירְאִי
  chosen: Do not be afraid
  alternatives:
  - Do not fear
  lexicon: HALOT
  rationale: A standard negative imperative with ירא. 'Do not be afraid' is idiomatic
    modern English while remaining close to the Hebrew.
- source_word: כִּי מָה רָאִית
  chosen: for what do you see?
  alternatives:
  - what have you seen?
  - indeed, what did you see?
  lexicon: HALOT
  rationale: כִּי here introduces the reason or explanation for the reassurance and
    the following question. Although רָאִית is formally perfect ('have seen/saw'),
    English present 'do you see' fits the immediate visionary context naturally. The
    past alternative is viable and worth preserving.
- source_word: הָאִשָּׁה
  chosen: the woman
  alternatives:
  - the medium
  lexicon: HALOT
  rationale: The Hebrew says simply 'the woman.' Rendering it that way avoids importing
    an interpretive label into this verse, even though the broader context identifies
    her as a medium.
- source_word: אֱלֹהִים
  chosen: a divine being
  alternatives:
  - gods
  - God
  - a spirit being
  lexicon: HALOT
  rationale: Here אֱלֹהִים is morphologically plural but used in a context where the
    woman appears to describe a supernatural apparition. 'A divine being' best captures
    the likely sense in idiomatic English without forcing either strict plurality
    ('gods') or identifying the figure as God himself. The plural-sounding alternative
    should be preserved in a footnote because the Hebrew form is notable.
- source_word: עֹלִים
  chosen: coming up
  alternatives:
  - ascending
  - rising
  lexicon: HALOT
  rationale: The participle from עלה denotes upward movement. 'Coming up' is natural
    English and matches the necromantic scene of emergence from below.
- source_word: מִן הָאָרֶץ
  chosen: from the earth
  alternatives:
  - out of the ground
  - from the land
  lexicon: HALOT
  rationale: '''From the earth'' preserves the Hebrew wording and the underworld imagery
    of emergence from below. ''Ground'' is possible but slightly narrows the image.'
