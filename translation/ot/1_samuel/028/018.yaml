id: 1SA.28.18
reference: 1 Samuel 28:18
source:
  edition: WLC
  text: כַּ/אֲשֶׁ֤ר לֹֽא שָׁמַ֨עְתָּ֙ בְּ/ק֣וֹל יְהוָ֔ה וְ/לֹֽא עָשִׂ֥יתָ חֲרוֹן אַפּ֖/וֹ
    בַּ/עֲמָלֵ֑ק עַל כֵּן֙ הַ/דָּבָ֣ר הַ/זֶּ֔ה עָשָֽׂה לְ/ךָ֥ יְהוָ֖ה הַ/יּ֥וֹם הַ/זֶּֽה־־־־־׃
translation:
  text: Because you did not obey the voice of the LORD and did not carry out his burning
    anger against Amalek, therefore the LORD has done this thing to you today.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'did not execute his fierce anger against Amalek.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כַּאֲשֶׁר
  chosen: Because
  alternatives:
  - just as
  - inasmuch as
  lexicon: HALOT
  rationale: Here the conjunction introduces the reason for Saul's judgment, so 'Because'
    best captures the causal force in natural English.
- source_word: שָׁמַעְתָּ בְּקוֹל יְהוָה
  chosen: obey the voice of the LORD
  alternatives:
  - listen to the voice of the LORD
  - heed the voice of the LORD
  lexicon: HALOT
  rationale: In this covenantal/judicial context, שׁמע with בְּקוֹל means more than
    auditory hearing; it denotes obedience. 'Obey the voice' preserves both the idiom
    and the sense. YHWH is rendered 'the LORD' per doctrine.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: The project's contested-terms policy specifies 'the LORD' as the default
    rendering for YHWH.
- source_word: עָשִׂיתָ חֲרוֹן אַפּוֹ
  chosen: carry out his burning anger
  alternatives:
  - execute his fierce anger
  - do his wrath
  - carry out his wrath
  lexicon: HALOT
  rationale: Literally 'do/make the burning of his anger.' The idiom refers to executing
    the divine wrath-command already given against Amalek. 'Carry out his burning
    anger' preserves the concrete verbal force of עשה while rendering חֲרוֹן אַף in
    understandable English.
- source_word: חֲרוֹן אַפּוֹ
  chosen: his burning anger
  alternatives:
  - his fierce anger
  - his wrath
  lexicon: HALOT
  rationale: The Hebrew idiom literally evokes the heat/burning of anger. 'Burning
    anger' keeps that imagery better than the flatter 'wrath,' while remaining readable.
- source_word: בַּעֲמָלֵק
  chosen: against Amalek
  alternatives:
  - upon Amalek
  - on Amalek
  lexicon: HALOT
  rationale: With the prior idiom of executing anger, English naturally expresses
    the target with 'against Amalek.'
- source_word: עַל כֵּן
  chosen: therefore
  alternatives:
  - for this reason
  - so
  lexicon: HALOT
  rationale: This marks the consequence flowing from Saul's disobedience; 'therefore'
    is a clear formal-causal connector.
- source_word: הַדָּבָר הַזֶּה
  chosen: this thing
  alternatives:
  - this matter
  - this event
  lexicon: HALOT
  rationale: דבר here refers broadly to the present judgment/outcome just announced.
    'This thing' is sufficiently literal and idiomatic.
- source_word: עָשָׂה לְךָ יְהוָה
  chosen: the LORD has done this thing to you
  alternatives:
  - the LORD has done this to you
  - the LORD has brought about this for you
  lexicon: HALOT
  rationale: The perfect verb is rendered with English present perfect to express
    a completed act with present relevance in the immediate prophetic context. Including
    'thing' reflects the explicit object in Hebrew.
- source_word: הַיּוֹם הַזֶּה
  chosen: today
  alternatives:
  - this day
  lexicon: HALOT
  rationale: '''Today'' is the natural modern English equivalent of ''this day'' and
    preserves the temporal emphasis without archaism.'
