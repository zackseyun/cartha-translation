id: 1SA.28.10
reference: 1 Samuel 28:10
source:
  edition: WLC
  text: וַ/יִּשָּׁ֤בַֽע לָ/הּ֙ שָׁא֔וּל בַּֽ/יהוָ֖ה לֵ/אמֹ֑ר חַי יְהוָ֕ה אִֽם יִקְּרֵ֥/ךְ עָוֺ֖ן בַּ/דָּבָ֥ר הַ/זֶּֽה־־׃
translation:
  text: So Saul swore to her by Yahweh, saying, “As Yahweh lives, no punishment will come upon you in this matter.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'no guilt will come upon you in this matter.' The Hebrew word can mean 'iniquity,' 'guilt,' or the punishment resulting from guilt.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשָּׁבַע
  chosen: swore
  alternatives:
  - took an oath
  - made an oath
  lexicon: HALOT
  rationale: The verb שׁבע in the Niphal commonly means to swear or take an oath. 'Swore' is the most natural modern English rendering and preserves the solemnity.
- source_word: לָהּ
  chosen: to her
  alternatives:
  - unto her
  lexicon: HALOT
  rationale: Simple indirect object marking; 'to her' is idiomatic modern English.
- source_word: בַּיהוָה
  chosen: by the LORD
  alternatives:
  - by Yahweh
  lexicon: HALOT
  rationale: 'The preposition indicates the basis/invocation of the oath: Saul swears by YHWH. Per doctrine, יְהוָה is rendered ''the LORD'' rather than transliterated.'
- source_word: חַי יְהוָה
  chosen: As the LORD lives
  alternatives:
  - By the life of the LORD
  - The LORD lives
  lexicon: HALOT
  rationale: This is a standard Hebrew oath formula. 'As the LORD lives' is a conventional and accurate English equivalent that preserves the idiomatic force.
- source_word: אִם
  chosen: 'no'
  alternatives:
  - surely not
  - if
  lexicon: HALOT
  rationale: In oath contexts אִם can introduce an elliptical imprecation, effectively meaning 'surely not' or functioning as a strong negation. Rendering it woodenly as 'if' would obscure the sense in English.
- source_word: יִקְּרֵךְ
  chosen: will come upon you
  alternatives:
  - will happen to you
  - will befall you
  lexicon: HALOT
  rationale: The verb קרא here has the sense of something happening to or befalling someone. 'Come upon you' is clear and preserves the personal impact.
- source_word: עָוֺן
  chosen: punishment
  alternatives:
  - guilt
  - iniquity
  - punishment for guilt
  lexicon: HALOT
  rationale: עָוֺן can denote iniquity, guilt, or the punishment/consequence of guilt. In this context Saul is assuring the woman that she will not suffer legal or penal consequences for the act, so 'punishment' best fits the immediate sense.
- source_word: בַּדָּבָר הַזֶּה
  chosen: in this matter
  alternatives:
  - for this thing
  - in this thing
  lexicon: HALOT
  rationale: An idiomatic rendering of דָּבָר in context. 'In this matter' is natural English and refers to the necromantic act under discussion.
