theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Sense of עָוֺן in Saul's oath
  chosen_reading: punishment
  alternative_readings:
  - guilt
  - iniquity
  - punishment for guilt
  rationale: Theologically and legally, Saul is not declaring the act morally innocent in the abstract; he is promising that no penal consequence will fall on the woman for this act. Rendering עָוֺן as 'punishment' preserves the contextual force without importing a broader moral judgment than the text states.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1 and #3'
