id: 1SA.28.6
reference: 1 Samuel 28:6
source:
  edition: WLC
  text: וַ/יִּשְׁאַ֤ל שָׁאוּל֙ בַּֽ/יהוָ֔ה וְ/לֹ֥א עָנָ֖/הוּ יְהוָ֑ה גַּ֧ם בַּ/חֲלֹמ֛וֹת גַּ֥ם בָּ/אוּרִ֖ים גַּ֥ם בַּ/נְּבִיאִֽם׃
translation:
  text: Saul inquired of Yahweh, but Yahweh did not answer him, either by dreams or by the Urim or by the prophets.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'through dreams ... through the Urim ... through the prophets.'
    reason: lexical_alternative
  - marker: b
    text: The Urim was a priestly means of seeking divine guidance.
    reason: cultural_note
lexical_decisions:
- source_word: וַיִּשְׁאַל
  chosen: inquired
  alternatives:
  - asked
  - consulted
  lexicon: HALOT
  rationale: The verb שׁאל with ב + divine name commonly means to seek an oracle or guidance from God, not merely to ask a question. 'Inquired' preserves the formal sense of seeking divine direction in a concise modern English way.
- source_word: בַּיהוָה / יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name יְהוָה is 'the LORD.' The preposition ב here is rendered idiomatically with 'of' in English ('inquired of the LORD') rather than woodenly 'inquired in/by the LORD.'
- source_word: וְלֹא עָנָהוּ
  chosen: did not answer him
  alternatives:
  - did not respond to him
  lexicon: HALOT
  rationale: ענה in this context refers to giving an answer to inquiry, especially an oracular response. 'Did not answer him' is the most direct and natural rendering.
- source_word: גַּם ... גַּם ... גַּם
  chosen: either ... or ... or
  alternatives:
  - also ... also ... also
  - whether ... or ... or
  lexicon: HALOT
  rationale: The repeated גַּם marks the several means by which an answer might come. In English, after a negated main clause, 'either ... or ... or' communicates the distributive force naturally.
- source_word: בַּחֲלֹמוֹת
  chosen: by dreams
  alternatives:
  - through dreams
  lexicon: HALOT
  rationale: Dreams are listed as a recognized medium of divine revelation. 'By dreams' is concise and idiomatic in a list of means.
- source_word: בָּאוּרִים
  chosen: by the Urim
  alternatives:
  - by Urim
  lexicon: HALOT
  rationale: אוּרִים refers to the sacred lot/device associated with priestly inquiry. 'The Urim' is the conventional and sufficiently transparent rendering; translating the term would be speculative. The singular English article reflects standard idiom for this cultic object/name.
- source_word: בַּנְּבִיאִם
  chosen: by the prophets
  alternatives:
  - through the prophets
  lexicon: HALOT
  rationale: נביאים are human agents of divine revelation. 'By the prophets' matches the parallel structure with dreams and the Urim while remaining natural English.
