id: 1SA.28.16
reference: 1 Samuel 28:16
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר שְׁמוּאֵ֔ל וְ/לָ֖/מָּה תִּשְׁאָלֵ֑/נִי וַ/יהוָ֛ה סָ֥ר מֵ/עָלֶ֖י/ךָ
    וַ/יְהִ֥י עָרֶֽ/ךָ׃
translation:
  text: And Samuel said, “Why then do you ask me, since the LORD has turned away from
    you and has become your enemy?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “has become your adversary.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: And ... said
  alternatives:
  - Then ... said
  lexicon: HALOT
  rationale: Standard waw-consecutive narrative advance; 'And ... said' preserves
    the Hebrew flow naturally in English.
- source_word: שְׁמוּאֵל
  chosen: Samuel
  rationale: Personal name is transliterated by standard English convention per translation
    philosophy.
- source_word: וְלָמָּה
  chosen: Why then
  alternatives:
  - And why
  - Why
  lexicon: HALOT
  rationale: The conjunction plus interrogative introduces a pointed response; 'Why
    then' captures both the connective force and the rhetorical sharpness.
- source_word: תִּשְׁאָלֵנִי
  chosen: do you ask me
  alternatives:
  - do you inquire of me
  - do you consult me
  lexicon: HALOT
  rationale: The verb שאל commonly means 'ask, inquire.' 'Ask me' is the most direct
    and readable rendering here; 'inquire of me' is possible but slightly more formal.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per DOCTRINE.md, the default rendering of the divine name is 'the LORD.'
- source_word: סָר מֵעָלֶיךָ
  chosen: has turned away from you
  alternatives:
  - has departed from you
  - has withdrawn from you
  lexicon: HALOT
  rationale: The perfect of סור with מן/מעל conveys turning aside or departing from
    someone. 'Has turned away from you' is idiomatic and preserves the relational
    sense.
- source_word: וַיְהִי עָרֶךָ
  chosen: has become your enemy
  alternatives:
  - has become your adversary
  - is against you
  lexicon: HALOT
  rationale: The noun ער commonly denotes an adversary/enemy. In context, 'has become
    your enemy' is the clearest natural English expression of the clause. 'Adversary'
    is more formal and can be preserved in a footnote.
