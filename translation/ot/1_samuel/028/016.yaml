theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Understanding Samuel's statement about the LORD's relation to Saul
  chosen_reading: has become your enemy
  alternative_readings:
  - has become your adversary
  - is against you
  rationale: The Hebrew states that the LORD has become Saul's ער, a term denoting an adversary/enemy. The translation should preserve the severity of divine opposition without softening it into mere disfavor.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1 and #3'
