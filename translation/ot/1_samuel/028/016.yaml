theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project's doctrinal and translation guidelines specify 'the LORD'
    as the default rendering of YHWH, following Jewish reverence tradition and the
    Septuagint pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Understanding Samuel's statement about the LORD's relation to Saul
  chosen_reading: has become your enemy
  alternative_readings:
  - has become your adversary
  - is against you
  rationale: The Hebrew states that the LORD has become Saul's ער, a term denoting
    an adversary/enemy. The translation should preserve the severity of divine opposition
    without softening it into mere disfavor.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1 and #3'
