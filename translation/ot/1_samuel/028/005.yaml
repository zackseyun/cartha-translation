id: 1SA.28.5
reference: 1 Samuel 28:5
source:
  edition: WLC
  text: וַ/יַּ֥רְא שָׁא֖וּל אֶת מַחֲנֵ֣ה פְלִשְׁתִּ֑ים וַ/יִּרָ֕א וַ/יֶּחֱרַ֥ד לִבּ֖/וֹ
    מְאֹֽד־׃
translation:
  text: When Saul saw the camp of the Philistines, he was afraid, and his heart trembled
    greatly.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his heart shuddered very much.' The Hebrew keeps the image of the heart
      as the seat of inner fear.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּרְא
  chosen: saw
  alternatives:
  - looked at
  - caught sight of
  lexicon: HALOT
  rationale: The common sense of ראה here is straightforward visual perception. 'Saw'
    is the most natural and sufficiently formal rendering in narrative sequence.
- source_word: מַחֲנֵה
  chosen: camp
  alternatives:
  - army
  - encampment
  lexicon: HALOT
  rationale: מַחֲנֶה denotes a camp or encampment. 'Camp' preserves the concrete military
    setting better than the more interpretive 'army,' though the military force is
    implied.
- source_word: פְלִשְׁתִּים
  chosen: the Philistines
  lexicon: HALOT
  rationale: Standard transliteration of the people-group name in English Bible usage.
- source_word: וַיִּרָא
  chosen: he was afraid
  alternatives:
  - he feared
  - he became afraid
  lexicon: HALOT
  rationale: From ירא, expressing fear. 'He was afraid' is idiomatic modern English
    and fits the narrative progression after Saul's seeing the Philistine camp.
- source_word: וַיֶּחֱרַד
  chosen: trembled
  alternatives:
  - shuddered
  - was terrified
  - quaked
  lexicon: HALOT
  rationale: חרד conveys trembling, agitation, or dread. 'Trembled' preserves the
    bodily/emotional force without overinterpreting beyond the Hebrew.
- source_word: לִבּוֹ
  chosen: his heart
  alternatives:
  - he inwardly
  - his inner being
  lexicon: HALOT
  rationale: Hebrew 'heart' often denotes the inner person, but the text explicitly
    says 'his heart.' Retaining 'heart' preserves the Hebrew imagery and avoids unnecessary
    paraphrase.
- source_word: מְאֹד
  chosen: greatly
  alternatives:
  - very much
  - exceedingly
  lexicon: HALOT
  rationale: מְאֹד intensifies the clause. 'Greatly' reads naturally with 'trembled'
    and preserves the strong degree of fear.
