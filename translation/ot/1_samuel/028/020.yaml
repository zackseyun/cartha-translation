id: 1SA.28.20
reference: 1 Samuel 28:20
source:
  edition: WLC
  text: וַ/יְמַהֵ֣ר שָׁא֗וּל וַ/יִּפֹּ֤ל מְלֹא קֽוֹמָת/וֹ֙ אַ֔רְצָ/ה וַ/יִּרָ֥א מְאֹ֖ד
    מִ/דִּבְרֵ֣י שְׁמוּאֵ֑ל גַּם כֹּ֨חַ֙ לֹא הָ֣יָה ב֔/וֹ כִּ֣י לֹ֤א אָכַל֙ לֶ֔חֶם
    כָּל הַ/יּ֖וֹם וְ/כָל הַ/לָּֽיְלָה־־־־־׃
translation:
  text: Saul immediately fell full length to the ground, and he was very afraid because
    of Samuel’s words. There was no strength left in him either, because he had eaten
    no bread all that day and all that night.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'bread' can also function more broadly for 'food'; the translation
      keeps 'bread' to reflect the source wording.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְמַהֵר
  chosen: immediately
  alternatives:
  - hurried
  - quickly
  lexicon: HALOT
  rationale: The verb literally means 'hurried' or 'acted quickly.' In context it
    introduces Saul’s sudden collapse, so 'immediately' captures the adverbial force
    naturally in English without implying purposeful haste.
- source_word: וַיִּפֹּל
  chosen: fell
  alternatives:
  - collapsed
  - threw himself down
  lexicon: HALOT
  rationale: The basic sense is 'fell.' 'Collapsed' is interpretive and possible from
    context, but the Hebrew verb itself is straightforward, so 'fell' is retained.
- source_word: מְלֹא קוֹמָתוֹ
  chosen: full length
  alternatives:
  - his full height
  - the full length of his stature
  lexicon: HALOT
  rationale: This idiom indicates the entirety of his body length in the fall. 'Full
    length' is idiomatic modern English and conveys that he fell prostrate rather
    than merely stumbling.
- source_word: אַרְצָה
  chosen: to the ground
  alternatives:
  - earthward
  - to the earth
  lexicon: HALOT
  rationale: Directional form of 'earth/land.' 'To the ground' is the most natural
    English equivalent in this narrative setting.
- source_word: וַיִּרָא מְאֹד
  chosen: he was very afraid
  alternatives:
  - he feared greatly
  - he became very afraid
  lexicon: HALOT
  rationale: The clause expresses intense fear. 'He was very afraid' is clear modern
    English and preserves the emotional state without archaic phrasing.
- source_word: מִדִּבְרֵי שְׁמוּאֵל
  chosen: because of Samuel’s words
  alternatives:
  - from Samuel’s words
  - at Samuel’s words
  lexicon: HALOT
  rationale: The preposition marks cause here. 'Because of Samuel’s words' makes the
    causal sense explicit in natural English.
- source_word: גַּם כֹּחַ לֹא הָיָה בוֹ
  chosen: There was no strength left in him either
  alternatives:
  - Also, there was no strength in him
  - He also had no strength
  lexicon: HALOT
  rationale: The clause adds a second reason for Saul’s condition. 'No strength left
    in him' communicates physical depletion implied by the context; 'either' reflects
    גַּם as an additive particle.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  - since
  lexicon: HALOT
  rationale: Introduces the reason for his lack of strength. 'Because' is the clearest
    contemporary rendering.
- source_word: לֹא אָכַל לֶחֶם
  chosen: he had eaten no bread
  alternatives:
  - he had not eaten food
  - he had eaten nothing
  lexicon: HALOT
  rationale: Hebrew 'bread' can stand for food generally, but retaining 'bread' preserves
    the source wording while remaining understandable. The fasting context is clear
    from the whole clause.
- source_word: כָּל הַיּוֹם וְכָל הַלָּיְלָה
  chosen: all that day and all that night
  alternatives:
  - the whole day and the whole night
  - all day and all night
  lexicon: HALOT
  rationale: 'The demonstrative sense is contextual: the specific day and night of
    the narrative. ''All that day and all that night'' reads naturally and preserves
    the temporal totality.'
