id: 1SA.28.2
reference: 1 Samuel 28:2
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר דָּוִד֙ אֶל אָכִ֔ישׁ לָ/כֵן֙ אַתָּ֣ה תֵדַ֔ע אֵ֥ת אֲשֶׁר יַעֲשֶׂ֖ה
    עַבְדֶּ֑/ךָ וַ/יֹּ֤אמֶר אָכִישׁ֙ אֶל דָּוִ֔ד לָ/כֵ֗ן שֹׁמֵ֧ר לְ/רֹאשִׁ֛/י אֲשִֽׂימְ/ךָ֖
    כָּל הַ/יָּמִֽים־־־־׃פ
translation:
  text: David said to Achish, “Then you yourself will know what your servant can do.”
    And Achish said to David, “Very well, I will make you my bodyguard for all your
    days.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “what your servant will do.” David’s wording is deliberately ambiguous.
    reason: lexical_alternative
  - marker: b
    text: Literally, “keeper for my head,” that is, a personal guard or bodyguard.
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  chosen: Then
  alternatives:
  - Therefore
  - So
  - Very well
  lexicon: HALOT
  rationale: In David’s reply, לָכֵן functions as a discourse marker drawing an inference
    from the previous verse. 'Then' fits natural English and preserves the forward-looking
    force without overstating logical causation.
- source_word: תֵדַע
  chosen: you yourself will know
  alternatives:
  - you will know
  - you shall know
  lexicon: HALOT
  rationale: ידע means 'know.' The explicit pronoun אַתָּה adds emphasis, so 'you
    yourself' preserves that stress in idiomatic English.
- source_word: אֵת אֲשֶׁר יַעֲשֶׂה
  chosen: what ... can do
  alternatives:
  - what ... will do
  - that which ... will do
  lexicon: HALOT
  rationale: Literally, 'what your servant will do.' In context David speaks ambiguously
    about his capability or action in battle. English idiom favors 'what your servant
    can do,' which preserves the pragmatic sense without overcommitting to a specific
    action.
- source_word: עַבְדֶּךָ
  chosen: your servant
  alternatives:
  - your slave
  lexicon: HALOT
  rationale: Although עבד can denote slave or servant, here it is a conventional self-referential
    term of deference in court speech, not a statement about bonded status. 'Your
    servant' best matches the social register.
- source_word: לָכֵן
  chosen: Very well
  alternatives:
  - Therefore
  - So
  - Then
  lexicon: HALOT
  rationale: In Achish’s response, לָכֵן introduces his conclusion or acceptance of
    David’s statement. 'Very well' captures the responsive, approving force in natural
    English.
- source_word: שֹׁמֵר
  chosen: bodyguard
  alternatives:
  - keeper
  - guard
  - guardian
  lexicon: HALOT
  rationale: שֹׁמֵר is literally 'keeper/guard.' With לְרֹאשִׁי ('for my head'), the
    phrase denotes a personal guard who protects Achish’s person. 'Bodyguard' expresses
    the idiomatic sense clearly.
- source_word: לְרֹאשִׁי
  chosen: my bodyguard
  alternatives:
  - guard for my head
  - keeper of my person
  lexicon: HALOT
  rationale: Literally 'for my head,' a Hebrew idiom referring to protection of one’s
    person or life. Rendering the whole phrase idiomatically as 'my bodyguard' communicates
    the intended role.
- source_word: אֲשִׂימְךָ
  chosen: I will make you
  alternatives:
  - I will appoint you
  - I will set you
  lexicon: HALOT
  rationale: שׂים commonly means 'set, place, appoint.' In this context of assigning
    David to a role, 'I will make you' is natural and accurate.
- source_word: כָּל הַיָּמִים
  chosen: for all your days
  alternatives:
  - continually
  - for all time
  - always
  lexicon: HALOT
  rationale: Literally 'all the days.' Because Achish is speaking directly to David,
    English can naturally express the sense as 'for all your days,' preserving the
    durative force better than the flatter 'always.'
