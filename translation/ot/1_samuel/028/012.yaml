theological_decisions:
- issue: Whether to qualify 'Samuel' in the main text as an apparition, spirit, or
    supposed Samuel
  chosen_reading: Retain the text's direct wording 'Samuel' without interpretive qualification
  alternative_readings:
  - the apparition of Samuel
  - what appeared to be Samuel
  - Samuel's spirit
  rationale: The Hebrew narrative says the woman saw Samuel. Adding qualifiers would
    import an interpretive judgment about the nature of the event that the verse itself
    does not state. Preserving the wording maintains theological tension rather than
    resolving a debated issue beyond the text.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
