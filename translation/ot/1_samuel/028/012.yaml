id: 1SA.28.12
reference: 1 Samuel 28:12
source:
  edition: WLC
  text: וַ/תֵּ֤רֶא הָֽ/אִשָּׁה֙ אֶת שְׁמוּאֵ֔ל וַ/תִּזְעַ֖ק בְּ/ק֣וֹל גָּד֑וֹל וַ/תֹּאמֶר֩
    הָ/אִשָּׁ֨ה אֶל שָׁא֧וּל לֵ/אמֹ֛ר לָ֥/מָּה רִמִּיתָ֖/נִי וְ/אַתָּ֥ה שָׁאֽוּל־־׃
translation:
  text: When the woman saw Samuel, she cried out with a loud voice, and the woman
    said to Saul, “Why have you deceived me? You are Saul!”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'what appeared to be Samuel.' The Hebrew text simply says 'Samuel,'
      without explaining the nature of the appearance.
    reason: alternative_reading
lexical_decisions:
- source_word: וַתֵּרֶא
  chosen: saw
  alternatives:
  - looked at
  - perceived
  lexicon: HALOT
  rationale: The verb ראה in the waw-consecutive narrative form is most naturally
    rendered 'saw.' 'Perceived' would over-interpret; the text presents a direct sighting.
- source_word: הָאִשָּׁה
  chosen: the woman
  alternatives:
  - the medium
  - the wife
  lexicon: HALOT
  rationale: The noun simply means 'the woman.' Although context identifies her as
    a medium, the Hebrew here uses the ordinary term, so the translation preserves
    that wording rather than importing the role title into this verse.
- source_word: אֶת שְׁמוּאֵל
  chosen: Samuel
  lexicon: HALOT
  rationale: The direct-object marker with the proper name indicates that Samuel is
    what she saw. The text states this straightforwardly, so the translation does
    likewise without interpretive qualification in the main text.
- source_word: וַתִּזְעַק
  chosen: cried out
  alternatives:
  - screamed
  - shouted
  lexicon: HALOT
  rationale: זעק denotes a strong cry. 'Cried out' is natural modern English and preserves
    the intensity without becoming overly colloquial or sensational.
- source_word: בְּקוֹל גָּדוֹל
  chosen: with a loud voice
  alternatives:
  - loudly
  - with a great cry
  lexicon: HALOT
  rationale: This phrase intensifies her reaction. 'With a loud voice' closely follows
    the Hebrew while remaining idiomatic English.
- source_word: וַתֹּאמֶר ... לֵאמֹר
  chosen: said
  alternatives:
  - spoke
  - said, saying
  lexicon: HALOT
  rationale: English normally does not reproduce both the finite verb and the infinitive
    'saying.' Rendering simply 'said' communicates the sense without wooden redundancy.
- source_word: לָמָּה
  chosen: Why
  alternatives:
  - For what reason
  lexicon: HALOT
  rationale: Standard interrogative usage; 'Why' is the natural equivalent.
- source_word: רִמִּיתָנִי
  chosen: have you deceived me
  alternatives:
  - have you tricked me
  - have you betrayed me
  lexicon: HALOT
  rationale: The piel of רמה conveys deception or trickery. 'Deceived' is the clearest
    and broadest English equivalent here. The present-perfect English form fits the
    immediate result of Saul's prior concealment now exposed.
- source_word: וְאַתָּה שָׁאוּל
  chosen: You are Saul!
  alternatives:
  - and you are Saul
  - you yourself are Saul
  lexicon: HALOT
  rationale: The pronoun is emphatic. English conveys this best by fronting 'You'
    and using an exclamation. Including 'and' would sound awkward in English and is
    not necessary to preserve the force of the Hebrew conjunction in this context.
