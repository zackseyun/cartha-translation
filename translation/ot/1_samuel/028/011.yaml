id: 1SA.28.11
reference: 1 Samuel 28:11
source:
  edition: WLC
  text: וַ/תֹּ֨אמֶר֙ הָֽ/אִשָּׁ֔ה אֶת מִ֖י אַֽעֲלֶה לָּ֑/ךְ וַ/יֹּ֕אמֶר אֶת שְׁמוּאֵ֖ל
    הַֽעֲלִי לִֽ/י־־־־׃
translation:
  text: Then the woman said, “Whom shall I bring up for you?” And he said, “Bring
    up Samuel for me.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “summon up.” The Hebrew verb literally means “bring up” or “cause to
      come up,” reflecting the idiom used in this necromantic context.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתֹּאמֶר
  chosen: Then ... said
  alternatives:
  - And ... said
  lexicon: HALOT
  rationale: Wayyiqtol of אמר advances the narrative. 'Then' gives natural English
    narrative progression while preserving the sequential force of the Hebrew.
- source_word: הָאִשָּׁה
  chosen: the woman
  alternatives:
  - the wife
  lexicon: HALOT
  rationale: In context this refers to the medium at En-dor, so 'the woman' is the
    plain and contextually appropriate rendering of אשה.
- source_word: אֶת מִי
  chosen: Whom
  alternatives:
  - Who
  lexicon: HALOT
  rationale: The direct-object marker אֶת before the interrogative marks the object
    of the verb. English idiom allows 'who,' but 'whom' more precisely reflects the
    object function.
- source_word: אַעֲלֶה
  chosen: shall I bring up
  alternatives:
  - shall I cause to come up
  - shall I summon up
  lexicon: HALOT
  rationale: Hiphil of עלה means 'cause to go up/bring up.' In this necromantic context,
    'bring up' preserves the Hebrew imagery without over-interpreting; 'summon up'
    is possible but slightly more interpretive.
- source_word: לָּךְ
  chosen: for you
  alternatives:
  - to you
  lexicon: HALOT
  rationale: 'The preposition ל here is best rendered as benefactive: the action is
    performed on Saul''s behalf.'
- source_word: וַיֹּאמֶר
  chosen: And he said
  alternatives:
  - Then he said
  lexicon: HALOT
  rationale: Standard narrative wayyiqtol of אמר. 'And he said' keeps the dialogue
    flow straightforward.
- source_word: אֶת שְׁמוּאֵל
  chosen: Samuel
  lexicon: HALOT
  rationale: The object marker אֶת is not translated; שְׁמוּאֵל is transliterated
    as the personal name 'Samuel' in keeping with the translation philosophy to transliterate
    names.
- source_word: הַעֲלִי
  chosen: Bring up
  alternatives:
  - Cause to come up
  - Summon up
  lexicon: HALOT
  rationale: Hiphil imperative feminine singular of עלה, addressed to the woman. 'Bring
    up' matches the earlier verb and preserves lexical consistency and the underlying
    imagery.
- source_word: לִי
  chosen: for me
  alternatives:
  - to me
  lexicon: HALOT
  rationale: 'As with לָּךְ earlier in the verse, ל is best taken as benefactive:
    Saul requests that Samuel be brought up on his behalf.'
