theological_decisions:
- issue: Rendering the necromantic idiom עלה in the dialogue with the medium
  chosen_reading: bring up
  alternative_readings:
  - summon up
  - cause to come up
  rationale: The Hebrew uses the ordinary verb 'bring up/cause to come up' in this
    context. Rendering it literally preserves the text's own idiom and does not force
    a theological explanation of the mechanics of the event. More interpretive options
    such as 'summon up' are possible but move beyond the plain lexical sense.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
