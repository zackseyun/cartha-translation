id: 1SA.28.21
reference: 1 Samuel 28:21
source:
  edition: WLC
  text: וַ/תָּב֤וֹא הָֽ/אִשָּׁה֙ אֶל שָׁא֔וּל וַ/תֵּ֖רֶא כִּי נִבְהַ֣ל מְאֹ֑ד וַ/תֹּ֣אמֶר
    אֵלָ֗י/ו הִנֵּ֨ה שָׁמְעָ֤ה שִׁפְחָֽתְ/ךָ֙ בְּ/קוֹלֶ֔/ךָ וָ/אָשִׂ֤ים נַפְשִׁ/י֙
    בְּ/כַפִּ֔/י וָֽ/אֶשְׁמַע֙ אֶת דְּבָרֶ֔י/ךָ אֲשֶׁ֥ר דִּבַּ֖רְתָּ אֵלָֽ/י־־־׃
translation:
  text: The woman came to Saul, and when she saw that he was greatly terrified, she
    said to him, “Look, your servant has obeyed your voice, and I have put my life
    in my hand and listened to your words that you spoke to me.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''your maidservant has listened to your voice.'' The expression
      means she heeded or obeyed Saul''s request.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew idiom: ''I have put my life in my hand,'' that is, ''I have risked
      my life'' or ''taken my life in my hand.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתָּבֹא הָאִשָּׁה
  chosen: The woman came
  alternatives:
  - Then the woman came
  - The woman went
  lexicon: HALOT
  rationale: The wayyiqtol advances the narrative. 'Came' fits the movement toward
    Saul with natural English style; 'the woman' preserves the definite noun without
    importing 'medium' from context into this verse.
- source_word: אֶל שָׁאוּל
  chosen: to Saul
  alternatives:
  - up to Saul
  lexicon: HALOT
  rationale: Simple directional phrase; 'to Saul' is the most direct rendering.
- source_word: וַתֵּרֶא כִּי נִבְהַל מְאֹד
  chosen: when she saw that he was greatly terrified
  alternatives:
  - and she saw that he was very troubled
  - and she saw that he was badly shaken
  lexicon: HALOT
  rationale: נבהל denotes being disturbed, alarmed, or terrified. In this immediate
    context after Samuel's words, 'greatly terrified' best captures the intensity
    of מְאֹד and Saul's emotional state. 'When she saw' smooths the Hebrew sequence
    into natural English while preserving sense.
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: A discourse marker drawing attention to her appeal. 'Look' is readable
    modern English and preserves the force without archaic tone.
- source_word: שָׁמְעָה שִׁפְחָתְךָ בְּקוֹלֶךָ
  chosen: your servant has obeyed your voice
  alternatives:
  - your maidservant has listened to your voice
  - your female servant has heeded your voice
  lexicon: HALOT
  rationale: שִׁפְחָה is specifically a female servant/slave. In direct address, 'your
    servant' is idiomatic English and preserves her deferential self-reference; the
    female nuance is less natural in the main text here, so an alternative is preserved.
    שׁמע בְּקוֹל commonly means to heed/obey, not merely to hear, so 'has obeyed your
    voice' best reflects the idiom.
- source_word: וָאָשִׂים נַפְשִׁי בְּכַפִּי
  chosen: I have put my life in my hand
  alternatives:
  - I have taken my life in my hand
  - I risked my life
  lexicon: HALOT
  rationale: This is a Hebrew idiom for risking one's life. The more literal 'put
    my life in my hand' preserves the imagery and remains understandable; a more idiomatic
    English alternative is worth preserving in a footnote.
- source_word: וָאֶשְׁמַע אֶת דְּבָרֶיךָ
  chosen: and listened to your words
  alternatives:
  - and obeyed your words
  - and heard your words
  lexicon: HALOT
  rationale: Here שׁמע with direct object can mean hear/listen, and in context it
    reinforces her compliance. 'Listened to your words' preserves the verbal distinction
    from the earlier idiom 'obeyed your voice' while still implying responsiveness.
- source_word: אֲשֶׁר דִּבַּרְתָּ אֵלָי
  chosen: that you spoke to me
  alternatives:
  - which you said to me
  lexicon: HALOT
  rationale: Straightforward relative clause; 'spoke to me' is natural and slightly
    more formal than 'said to me,' fitting the narrative tone.
