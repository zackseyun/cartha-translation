id: 1SA.28.14
reference: 1 Samuel 28:14
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר לָ/הּ֙ מַֽה תָּאֳר֔/וֹ וַ/תֹּ֗אמֶר אִ֤ישׁ זָקֵן֙ עֹלֶ֔ה וְ/ה֥וּא
    עֹטֶ֖ה מְעִ֑יל וַ/יֵּ֤דַע שָׁאוּל֙ כִּֽי שְׁמוּאֵ֣ל ה֔וּא וַ/יִּקֹּ֥ד אַפַּ֛יִם
    אַ֖רְצָ/ה וַ/יִּשְׁתָּֽחוּ־־׃ס
translation:
  text: He said to her, “What is his appearance?” And she said, “An old man is coming
    up, and he is wrapped in a robe.” Then Saul knew that it was Samuel, and he bowed
    with his face to the ground and prostrated himself.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'is ascending' / 'is rising up.' The Hebrew participle emphasizes upward
      movement.
    reason: lexical_alternative
  - marker: b
    text: Or 'is wearing a robe.' The Hebrew more vividly suggests being wrapped or
      cloaked in it.
    reason: lexical_alternative
  - marker: c
    text: The final verb can also be rendered 'bowed down' or, in some contexts, 'worshiped';
      here it denotes an act of deep prostration before the figure identified as Samuel.
    reason: alternative_reading
lexical_decisions:
- source_word: תָּאֳרוֹ
  chosen: his appearance
  alternatives:
  - his form
  - his shape
  lexicon: HALOT
  rationale: תֹּאַר refers to visible form or appearance. 'Appearance' is natural
    modern English and fits Saul's request for identifying description.
- source_word: אִישׁ זָקֵן
  chosen: an old man
  alternatives:
  - an elderly man
  - a man, old
  lexicon: HALOT
  rationale: The phrase straightforwardly denotes a male person advanced in age. 'Old
    man' is the most direct and idiomatic rendering.
- source_word: עֹלֶה
  chosen: is coming up
  alternatives:
  - is ascending
  - is rising up
  lexicon: HALOT
  rationale: The participle marks ongoing action. In this necromancy scene, the motion
    is upward from below; 'is coming up' preserves the spatial sense while sounding
    natural in English.
- source_word: עֹטֶה מְעִיל
  chosen: is wrapped in a robe
  alternatives:
  - is wearing a robe
  - is covered with a robe
  - is cloaked in a robe
  lexicon: HALOT
  rationale: עֹטֶה means to wrap or envelop oneself, stronger than merely 'wear.'
    מְעִיל is a robe or mantle. 'Wrapped in a robe' preserves the descriptive force
    and echoes Samuel's recognizable garment.
- source_word: וַיֵּדַע
  chosen: Saul knew
  alternatives:
  - Saul recognized
  - Saul perceived
  lexicon: HALOT
  rationale: ידע commonly means 'know,' but here it conveys recognition based on the
    description. 'Knew' keeps close to the Hebrew while remaining clear in context.
- source_word: כִּי שְׁמוּאֵל הוּא
  chosen: that it was Samuel
  alternatives:
  - that he was Samuel
  lexicon: HALOT
  rationale: English idiom prefers 'it was Samuel' after an identifying description,
    even though the Hebrew uses the pronoun 'he.'
- source_word: וַיִּקֹּד אַפַּיִם אַרְצָה
  chosen: he bowed with his face to the ground
  alternatives:
  - he bowed low to the ground
  - he bent down with his face to the earth
  lexicon: HALOT
  rationale: The idiom literally involves bowing with the face/nose toward the earth.
    'With his face to the ground' communicates the posture clearly in natural English.
- source_word: וַיִּשְׁתָּחוּ
  chosen: and prostrated himself
  alternatives:
  - and bowed down
  - and paid homage
  lexicon: HALOT
  rationale: The verb denotes prostration or bowing in reverence. 'Prostrated himself'
    distinguishes it from the preceding verb and preserves the intensity of the action
    without importing worship language beyond the text.
