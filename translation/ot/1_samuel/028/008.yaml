theological_decisions:
- issue: Rendering of necromantic terminology without endorsing its efficacy
  chosen_reading: Translate the request in straightforward narrative terms ('practice
    divination,' 'by a medium,' 'bring up') without adding interpretive qualifiers
    that either validate or debunk the practice.
  alternative_readings:
  - Use skeptical paraphrase such as 'pretend to bring up'
  - Use stronger supernatural language such as 'contact the dead spirit of'
  rationale: The narrative reports Saul's request using the conceptual world of the
    text. Optimal equivalence requires preserving that language without importing
    a doctrinal judgment about the mechanics of necromancy into the translation itself.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
