id: 1SA.28.8
reference: 1 Samuel 28:8
source:
  edition: WLC
  text: וַ/יִּתְחַפֵּ֣שׂ שָׁא֗וּל וַ/יִּלְבַּשׁ֙ בְּגָדִ֣ים אֲחֵרִ֔ים וַ/יֵּ֣לֶךְ
    ה֗וּא וּ/שְׁנֵ֤י אֲנָשִׁים֙ עִמּ֔/וֹ וַ/יָּבֹ֥אוּ אֶל הָ/אִשָּׁ֖ה לָ֑יְלָה וַ/יֹּ֗אמֶר
    קסומי נָ֥א לִ/י֙ בָּ/א֔וֹב וְ/הַ֣עֲלִי לִ֔/י אֵ֥ת אֲשֶׁר אֹמַ֖ר אֵלָֽיִ/ךְ־־־׃
translation:
  text: So Saul disguised himself and put on other clothes, and he went, he and two
    men with him. They came to the woman by night, and he said, “Please practice divination
    for me by a medium, and bring up for me the one whom I name to you.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'through a familiar spirit.' The Hebrew term refers to a medium associated
      with necromantic consultation.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתְחַפֵּשׂ
  chosen: disguised himself
  alternatives:
  - made himself unrecognizable
  - changed his appearance
  lexicon: HALOT
  rationale: 'The hitpael form conveys reflexive action: Saul altered his appearance
    to conceal his identity. ''Disguised himself'' is the most natural and precise
    modern English rendering.'
- source_word: בְּגָדִים אֲחֵרִים
  chosen: other clothes
  alternatives:
  - different garments
  - other garments
  lexicon: HALOT
  rationale: The phrase refers to changing attire as part of the disguise. 'Other
    clothes' is idiomatic modern English while preserving the plain sense.
- source_word: וַיֵּלֶךְ הוּא וּשְׁנֵי אֲנָשִׁים עִמּוֹ
  chosen: and he went, he and two men with him
  alternatives:
  - and he went with two men
  - and he and two men with him went
  lexicon: HALOT
  rationale: The Hebrew explicitly places emphasis on Saul himself ('he') along with
    the two men. The chosen rendering preserves that emphasis without becoming unnatural.
- source_word: לָיְלָה
  chosen: by night
  alternatives:
  - at night
  - in the night
  lexicon: HALOT
  rationale: '''By night'' is a concise idiomatic rendering that preserves the nocturnal
    setting and the stealth implied by the context.'
- source_word: קָסֳמִי נָא לִי
  chosen: Please practice divination for me
  alternatives:
  - Please divine for me
  - Please conjure for me
  lexicon: HALOT
  rationale: The verb קסם refers to divinatory practice. 'Practice divination' is
    clear and accurate; 'please' reflects נָא as a polite entreaty.
- source_word: בָּאוֹב
  chosen: by a medium
  alternatives:
  - through a ghost-medium
  - by means of a familiar spirit
  lexicon: HALOT
  rationale: אוֹב in this context refers to necromantic mediation associated with
    a medium. 'By a medium' is accessible modern English. The more traditional 'familiar
    spirit' is less transparent to contemporary readers and is preserved in a footnote
    as a lexical alternative.
- source_word: וְהַעֲלִי לִי
  chosen: and bring up for me
  alternatives:
  - and summon up for me
  - and cause to come up for me
  lexicon: HALOT
  rationale: The hiphil of עלה here reflects causing a deceased figure to come up
    from the realm of the dead in the narrative's idiom. 'Bring up' preserves the
    Hebrew imagery and avoids over-interpretive paraphrase.
- source_word: אֵת אֲשֶׁר אֹמַר אֵלָיִךְ
  chosen: the one whom I name to you
  alternatives:
  - whomever I tell you
  - the one I mention to you
  lexicon: HALOT
  rationale: The clause identifies the person Saul will specify. 'The one whom I name
    to you' is natural English and fits the summoning context.
