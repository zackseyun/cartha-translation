id: 1SA.28.22
reference: 1 Samuel 28:22
source:
  edition: WLC
  text: וְ/עַתָּ֗ה שְׁמַֽע נָ֤א גַם אַתָּה֙ בְּ/ק֣וֹל שִׁפְחָתֶ֔/ךָ וְ/אָשִׂ֧מָה לְ/פָנֶ֛י/ךָ
    פַּת לֶ֖חֶם וֶ/אֱכ֑וֹל וִ/יהִ֤י בְ/ךָ֙ כֹּ֔חַ כִּ֥י תֵלֵ֖ךְ בַּ/דָּֽרֶךְ־־־׃
translation:
  text: Now then, please, you also listen to the voice of your female servant, and
    let me set a piece of bread before you. Eat, so that there may be strength in
    you, because you must go on the way.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'maidservant.' The Hebrew specifically uses a feminine term for servant.
    reason: lexical_alternative
  - marker: b
    text: Literally 'listen to the voice of your female servant,' a Hebrew idiom meaning
      'heed your female servant.'
    reason: lexical_alternative
  - marker: c
    text: Or 'a morsel of bread.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  chosen: Now then
  alternatives:
  - Now
  - And now
  lexicon: HALOT
  rationale: Discourse marker introducing an urgent appeal. 'Now then' captures both
    the temporal and inferential force better than a bare 'now.'
- source_word: שְׁמַע נָא
  chosen: please ... listen
  alternatives:
  - please hear
  - listen, please
  lexicon: HALOT
  rationale: Imperative with particle נָא softens the command into a plea. 'Listen'
    is idiomatic modern English; 'please' preserves the politeness/urgency.
- source_word: גַם אַתָּה
  chosen: you also
  alternatives:
  - you too
  - even you
  lexicon: HALOT
  rationale: Adds emphasis that Saul in turn should heed her, likely after she has
    heeded him. 'You also' preserves the emphatic reciprocity without overinterpreting.
- source_word: בְּקוֹל שִׁפְחָתֶךָ
  chosen: to the voice of your female servant
  alternatives:
  - to your servant girl
  - to your maidservant
  - to your servant
  lexicon: HALOT
  rationale: Literally 'to/at the voice of your maidservant.' 'Listen to the voice
    of' is a common Hebrew idiom for heeding someone. 'Female servant' preserves the
    gendered noun שִׁפְחָה in line with the gender-accurate policy; 'maidservant'
    is possible but less natural in contemporary English.
- source_word: וְאָשִׂימָה לְפָנֶיךָ
  chosen: and let me set before you
  alternatives:
  - and I will place before you
  - and let me put before you
  lexicon: HALOT
  rationale: First-person cohortative expresses a polite volitional request/offering.
    'Let me set before you' conveys the cohortative nuance more naturally than a simple
    future.
- source_word: פַּת לֶחֶם
  chosen: a piece of bread
  alternatives:
  - a morsel of bread
  - a bit of bread
  - bread
  lexicon: HALOT
  rationale: פַּת denotes a piece or morsel. 'A piece of bread' is clear and natural;
    'morsel' is more formal/literary.
- source_word: וֶאֱכֹל
  chosen: Eat
  alternatives:
  - and eat
  lexicon: HALOT
  rationale: Imperative following the offer. English can omit the conjunction for
    smoother style while preserving the sequence of actions.
- source_word: וִיהִי בְךָ כֹּחַ
  chosen: so that there may be strength in you
  alternatives:
  - that you may have strength
  - and strength may be in you
  lexicon: HALOT
  rationale: Jussive/result clause expressing purpose or desired result. 'So that
    there may be strength in you' stays close to the Hebrew while remaining intelligible.
    It refers to physical strength for travel.
- source_word: כִּי תֵלֵךְ בַּדָּרֶךְ
  chosen: because you must go on the way
  alternatives:
  - for you are going on your way
  - because you will go on the road
  - for you have a journey ahead
  lexicon: HALOT
  rationale: כִּי gives the reason for eating. The imperfect תֵלֵךְ points to impending
    departure. 'Must go on the way' brings out the practical necessity implied by
    the context without adding content beyond the Hebrew idiom.
