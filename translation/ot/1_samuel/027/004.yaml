id: 1SA.27.4
reference: 1 Samuel 27:4
source:
  edition: WLC
  text: וַ/יֻּגַּ֣ד לְ/שָׁא֔וּל כִּֽי בָרַ֥ח דָּוִ֖ד גַּ֑ת וְ/לֹֽא יוסף ע֖וֹד לְ/בַקְשֽׁ/וֹ־־׃ס
translation:
  text: When it was reported to Saul that David had fled to Gath, he no longer continued
    to seek him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'he was told that David had fled to Gath.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew idiom: ''he did not continue any longer to seek him.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֻּגַּד
  chosen: it was reported
  alternatives:
  - he was told
  - word was brought
  lexicon: HALOT
  rationale: Passive/narrative form of נגד conveys that information was made known
    to Saul without specifying the agent. 'It was reported' preserves the impersonal
    passive naturally in English.
- source_word: לְשָׁאוּל
  chosen: to Saul
  lexicon: HALOT
  rationale: Standard dative/prepositional phrase indicating the recipient of the
    report.
- source_word: כִּי
  chosen: that
  alternatives:
  - how
  lexicon: HALOT
  rationale: Introduces the content of the report; 'that' is the most natural English
    complementizer here.
- source_word: בָרַח
  chosen: had fled
  alternatives:
  - fled
  - had escaped
  lexicon: HALOT
  rationale: The verb means 'flee/escape.' 'Had fled' fits the English narrative sequence
    after the reporting event and preserves the sense of David's flight.
- source_word: גַּת
  chosen: to Gath
  alternatives:
  - Gath
  lexicon: HALOT
  rationale: Although the Hebrew lacks an explicit preposition, Gath functions as
    the destination of flight. English idiom normally supplies 'to' with 'fled'.
- source_word: וְלֹא יֹסֶף עוֹד
  chosen: he no longer continued
  alternatives:
  - he did not continue any longer
  - he no longer added
  lexicon: HALOT
  rationale: The idiom with יסף + עוד means to continue or do again no longer. 'He
    no longer continued' captures the cessation force without woodenly reproducing
    'add'.
- source_word: לְבַקְשׁוֹ
  chosen: to seek him
  alternatives:
  - to search for him
  - to pursue him
  lexicon: HALOT
  rationale: בקש commonly means 'seek.' In this context Saul is trying to locate/capture
    David, so 'seek him' is sufficiently broad and close to the Hebrew; 'pursue him'
    is possible but slightly more interpretive.
