id: 1SA.27.3
reference: 1 Samuel 27:3
source:
  edition: WLC
  text: וַ/יֵּשֶׁב֩ דָּוִ֨ד עִם אָכִ֥ישׁ בְּ/גַ֛ת ה֥וּא וַ/אֲנָשָׁ֖י/ו אִ֣ישׁ וּ/בֵית֑/וֹ
    דָּוִד֙ וּ/שְׁתֵּ֣י נָשָׁ֔י/ו אֲחִינֹ֨עַם֙ הַ/יִּזְרְעֵאלִ֔ית וַ/אֲבִיגַ֥יִל אֵֽשֶׁת
    נָבָ֖ל הַֽ/כַּרְמְלִֽית־־׃
translation:
  text: So David stayed with Achish in Gath, he and his men, each man with his household—David
    with his two wives, Ahinoam the Jezreelitess and Abigail, the wife of Nabal the
    Carmelite.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'lived with Achish in Gath.' The Hebrew verb can denote dwelling or remaining
      for a time.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'man and his household,' a distributive expression meaning each
      man together with those of his house.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּשֶׁב
  chosen: stayed
  alternatives:
  - lived
  - dwelt
  - settled
  lexicon: HALOT
  rationale: The verb ישב commonly means to sit, dwell, remain, or stay. In this narrative
    context it denotes residence with Achish in Gath for a period, and 'stayed' gives
    natural English without overstating permanence.
- source_word: עִם
  chosen: with
  alternatives:
  - alongside
  lexicon: HALOT
  rationale: The preposition straightforwardly indicates association or accompaniment;
    'with' is the plain sense.
- source_word: בְּגַת
  chosen: in Gath
  alternatives:
  - at Gath
  lexicon: HALOT
  rationale: The beth preposition with a city name is most naturally rendered 'in
    Gath' for location.
- source_word: הוּא וַאֲנָשָׁיו
  chosen: he and his men
  alternatives:
  - he and his soldiers
  - he and his followers
  lexicon: HALOT
  rationale: אֲנָשָׁיו literally means 'his men.' In David's context these are his
    armed followers, but 'his men' preserves the Hebrew wording and remains idiomatic.
- source_word: אִישׁ וּבֵיתוֹ
  chosen: each man with his household
  alternatives:
  - every man and his household
  - each with his family
  lexicon: HALOT
  rationale: The distributive use of אִישׁ means 'each man' or 'every man.' בֵּית
    can mean house or household; here the sense is the persons belonging to each man,
    not merely the building. 'Household' best captures that.
- source_word: וּשְׁתֵּי נָשָׁיו
  chosen: with his two wives
  alternatives:
  - and his two wives
  lexicon: HALOT
  rationale: The phrase resumes and specifies David's own household. Rendering it
    with 'with' makes the appositional structure clear in English after the dash.
- source_word: הַיִּזְרְעֵאלִית
  chosen: the Jezreelitess
  alternatives:
  - the Jezreelite woman
  - from Jezreel
  lexicon: HALOT
  rationale: The gentilic feminine identifies Ahinoam by origin. 'Jezreelitess' is
    a precise though slightly formal English equivalent; it preserves the adjectival
    force better than a paraphrase.
- source_word: אֵשֶׁת נָבָל
  chosen: the wife of Nabal
  alternatives:
  - Nabal's wife
  lexicon: HALOT
  rationale: The construct phrase directly means 'wife of Nabal.' This form is retained
    for clarity and a slightly more formal narrative cadence.
- source_word: הַכַּרְמְלִית
  chosen: the Carmelite
  alternatives:
  - the Carmelitess
  - from Carmel
  lexicon: HALOT
  rationale: The gentilic refers to a woman from Carmel, not to the later religious
    order. 'The Carmelite' is the standard English rendering in this OT context and
    is unlikely to confuse in context, while preserving the gentilic label.
