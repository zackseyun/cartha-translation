id: 1SA.27.12
reference: 1 Samuel 27:12
source:
  edition: WLC
  text: וַ/יַּאֲמֵ֥ן אָכִ֖ישׁ בְּ/דָוִ֣ד לֵ/אמֹ֑ר הַבְאֵ֤שׁ הִבְאִישׁ֙ בְּ/עַמּ֣/וֹ
    בְ/יִשְׂרָאֵ֔ל וְ/הָ֥יָה לִ֖/י לְ/עֶ֥בֶד עוֹלָֽם׃פ
translation:
  text: And Achish trusted David, saying, “He has surely made himself stink among
    his people in Israel, so he will be my servant forever.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, “He has made himself utterly odious among his people
      in Israel.” The Hebrew literally says “made himself stink,” an idiom for becoming
      detestable.
    reason: lexical_alternative
  - marker: b
    text: “Servant” here may also be rendered “slave,” but the context suggests ongoing
      vassal-like service to Achish rather than emphasizing chattel status.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּאֲמֵן
  chosen: trusted
  alternatives:
  - believed
  lexicon: HALOT
  rationale: The Hifil of אמן with ב marks placing trust or confidence in someone.
    'Trusted' fits the interpersonal sense here better than the more cognitive 'believed,'
    though both are possible.
- source_word: בְּדָוִד
  chosen: David
  rationale: Personal name transliterated by standard English convention. The preposition
    with וַיַּאֲמֵן is absorbed idiomatically in English as the object of 'trusted'
    rather than rendered woodenly as 'in David.'
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - thinking
  lexicon: HALOT
  rationale: Standard quotative infinitive introducing Achish's words or internal
    reasoning. 'Saying' is the most transparent rendering; the content may reflect
    thought, but the Hebrew formula is best preserved.
- source_word: הַבְאֵשׁ הִבְאִישׁ
  chosen: has surely made himself stink
  alternatives:
  - has made himself utterly odious
  - has become abhorrent
  lexicon: HALOT
  rationale: The infinitive absolute plus finite verb intensifies the verb באש. The
    literal image is 'stink,' used idiomatically for becoming detestable. To preserve
    the Hebrew force and imagery, the main text keeps the literal metaphor with an
    English intensifier ('surely').
- source_word: בְּעַמּוֹ
  chosen: among his people
  alternatives:
  - to his people
  - with his people
  lexicon: HALOT
  rationale: With this idiom after באש, the preposition ב can indicate relation within
    a group. 'Among his people' communicates the social setting of David's supposed
    alienation more naturally than a strictly formal 'with' or 'to.'
- source_word: בְיִשְׂרָאֵל
  chosen: in Israel
  alternatives:
  - among Israel
  rationale: Retained as a geographic/national qualifier modifying 'his people.' 'In
    Israel' is natural English and preserves the Hebrew phrase.
- source_word: וְהָיָה לִי
  chosen: so he will be my
  alternatives:
  - and he will become my
  lexicon: HALOT
  rationale: The waw-consecutive here expresses Achish's inferred result. English
    'so he will be my' captures the consequential sense in context better than a mechanically
    sequential 'and he will become my.'
- source_word: לְעֶבֶד
  chosen: servant
  alternatives:
  - slave
  lexicon: HALOT
  rationale: Although עבד can denote a slave, here Achish is speaking of David's expected
    permanent political dependence and service rather than explicitly his chattel
    status. Per translation philosophy, 'slave' is used where bonded nature is especially
    salient; here 'servant' better fits the courtly-vassal nuance.
- source_word: עוֹלָם
  chosen: forever
  alternatives:
  - perpetually
  - for life
  lexicon: HALOT
  rationale: עוֹלָם often denotes an indefinite enduring future. In this speech, 'forever'
    is the most idiomatic English equivalent, expressing Achish's expectation of lasting
    allegiance.
