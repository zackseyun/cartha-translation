id: 1SA.27.8
reference: 1 Samuel 27:8
source:
  edition: WLC
  text: וַ/יַּ֤עַל דָּוִד֙ וַֽ/אֲנָשָׁ֔י/ו וַֽ/יִּפְשְׁט֛וּ אֶל הַ/גְּשׁוּרִ֥י ו/ה/גרזי
    וְ/הָ/עֲמָלֵקִ֑י כִּ֣י הֵ֜נָּה יֹשְׁב֤וֹת הָ/אָ֨רֶץ֙ אֲשֶׁ֣ר מֵֽ/עוֹלָ֔ם בּוֹאֲ/ךָ֥
    שׁ֖וּרָ/ה וְ/עַד אֶ֥רֶץ מִצְרָֽיִם־־׃
translation:
  text: Then David and his men went up and made raids against the Geshurites, the
    Girzites, and the Amalekites, for they were the inhabitants of the land from ancient
    times, as you go to Shur, even to the land of Egypt.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the Gezrites.” The Hebrew ethnonym here is textually and translationally
      uncertain in English tradition; this draft follows the consonantal form represented
      in the provided text as “Girzites.”
    reason: lexical_alternative
  - marker: b
    text: Or “as far as the land of Egypt.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַל
  chosen: went up
  alternatives:
  - went out
  - advanced
  lexicon: HALOT
  rationale: עלה in narrative commonly means 'went up.' Although the movement is from
    Ziklag into raiding territory and 'went out' could fit idiomatically, the Hebrew
    verb is distinct and should be preserved rather than flattened.
- source_word: וַיִּפְשְׁטוּ
  chosen: made raids
  alternatives:
  - raided
  - stripped/spoiled
  lexicon: HALOT
  rationale: פשט in this military context refers to making a raid or plundering expedition.
    'Made raids' captures the iterative military sense better than the more generic
    'attacked.'
- source_word: אֶל
  chosen: against
  alternatives:
  - to
  - toward
  lexicon: HALOT
  rationale: Although אֶל normally means 'to/toward,' with a hostile verb like פשט
    the English idiom is 'raid against.' This is an optimal-equivalence adjustment
    required by context.
- source_word: הַגְּשׁוּרִי
  chosen: the Geshurites
  alternatives:
  - the Geshuri
  lexicon: HALOT
  rationale: Rendered as a people group in standard English ethnonym form.
- source_word: הגרזי
  chosen: the Girzites
  alternatives:
  - the Gezrites
  - the Gerzites
  lexicon: HALOT
  rationale: The consonantal form points to an ethnonym traditionally rendered with
    z/s variation in English. 'Girzites' stays close to the Hebrew spelling represented
    here (גרזי) while preserving it as a people name.
- source_word: הָעֲמָלֵקִי
  chosen: the Amalekites
  alternatives:
  - the Amalekite people
  lexicon: HALOT
  rationale: Standard English ethnonym for the people descended from Amalek.
- source_word: כִּי הֵנָּה יֹשְׁבוֹת הָאָרֶץ
  chosen: for they were the inhabitants of the land
  alternatives:
  - for those were the ones inhabiting the land
  - for they inhabited the land
  lexicon: HALOT
  rationale: The feminine plural pronoun and participle likely agree with the understood
    'tribes/peoples' or with the ethnonyms as collective groups. English naturally
    renders the sense with 'they were the inhabitants of the land.'
- source_word: מֵעוֹלָם
  chosen: from ancient times
  alternatives:
  - from of old
  - from long ago
  - forever
  lexicon: HALOT
  rationale: עוֹלָם here refers to antiquity/long duration in the past, not metaphysical
    eternity. 'From ancient times' is clear modern English.
- source_word: בּוֹאֲךָ שׁוּרָה
  chosen: as you go to Shur
  alternatives:
  - toward Shur
  - on the way to Shur
  - where one comes to Shur
  lexicon: HALOT
  rationale: The infinitive construct with 2ms suffix is a conventional geographic
    expression meaning 'as one goes to' or 'where you come to.' 'As you go to Shur'
    preserves the idiom in readable English.
- source_word: וְעַד אֶרֶץ מִצְרַיִם
  chosen: even to the land of Egypt
  alternatives:
  - as far as the land of Egypt
  - and up to the land of Egypt
  lexicon: HALOT
  rationale: Marks the extent of the territory. 'Even to' gives a natural sense of
    range in English while preserving the boundary idea.
