id: 1SA.27.9
reference: 1 Samuel 27:9
source:
  edition: WLC
  text: וְ/הִכָּ֤ה דָוִד֙ אֶת הָ/אָ֔רֶץ וְ/לֹ֥א יְחַיֶּ֖ה אִ֣ישׁ וְ/אִשָּׁ֑ה וְ/לָקַח֩
    צֹ֨אן וּ/בָקָ֜ר וַ/חֲמֹרִ֤ים וּ/גְמַלִּים֙ וּ/בְגָדִ֔ים וַ/יָּ֖שָׁב וַ/יָּבֹ֥א
    אֶל אָכִֽישׁ־־׃
translation:
  text: David struck the land and left alive neither man nor woman, and he took sheep,
    cattle, donkeys, camels, and clothing. Then he returned and came to Achish.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'did not let man or woman live.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִכָּה
  chosen: struck
  alternatives:
  - attacked
  - smote
  lexicon: HALOT
  rationale: The Hiphil of נכה commonly denotes striking down or attacking. 'Struck'
    is concise and natural English, preserving the force without importing more detail
    than the Hebrew states.
- source_word: הָאָרֶץ
  chosen: the land
  alternatives:
  - the country
  - the region
  lexicon: HALOT
  rationale: אֶרֶץ here refers to the territory/land inhabited by the targeted groups,
    not the physical earth. 'The land' is the most direct and idiomatic rendering.
- source_word: וְלֹא יְחַיֶּה אִישׁ וְאִשָּׁה
  chosen: left alive neither man nor woman
  alternatives:
  - did not let man or woman live
  - kept alive neither man nor woman
  lexicon: HALOT
  rationale: The Hiphil of חיה means 'keep alive' or 'let live.' The idiom indicates
    that David spared no survivors. 'Left alive neither man nor woman' is idiomatic
    English and preserves the gender-accurate pair in the Hebrew.
- source_word: אִישׁ וְאִשָּׁה
  chosen: man nor woman
  alternatives:
  - anyone
  lexicon: HALOT
  rationale: The Hebrew explicitly names both sexes. Per the translation philosophy,
    gender-accurate wording is preferred over flattening to a generic term like 'anyone.'
- source_word: וְלָקַח
  chosen: he took
  alternatives:
  - he seized
  - he carried off
  lexicon: HALOT
  rationale: לקח is the standard verb 'take.' In this military-plunder context, 'took'
    is sufficiently clear without overinterpreting the manner.
- source_word: צֹאן
  chosen: sheep
  alternatives:
  - flocks
  - small livestock
  lexicon: HALOT
  rationale: Although צֹאן can denote small livestock collectively, 'sheep' works
    well here because it is distinguished from cattle and keeps the list concrete
    and readable.
- source_word: בָקָר
  chosen: cattle
  alternatives:
  - herds
  - oxen
  lexicon: HALOT
  rationale: בקר refers broadly to bovine livestock. 'Cattle' is the standard collective
    English equivalent.
- source_word: חֲמֹרִים
  chosen: donkeys
  alternatives:
  - asses
  lexicon: HALOT
  rationale: '''Donkeys'' is the clear modern English rendering; ''asses'' is archaic
    or potentially distracting.'
- source_word: גְמַלִּים
  chosen: camels
  lexicon: HALOT
  rationale: Straightforward lexical equivalent.
- source_word: בְגָדִים
  chosen: clothing
  alternatives:
  - garments
  - clothes
  lexicon: HALOT
  rationale: '''Clothing'' is natural modern English and fits a list of plundered
    goods. ''Garments'' is more formal; ''clothes'' slightly less formal.'
- source_word: וַיָּשָׁב וַיָּבֹא
  chosen: Then he returned and came
  alternatives:
  - Then he turned back and went
  - and he returned and came
  lexicon: HALOT
  rationale: 'The Hebrew uses two sequential verbs. Rendering both preserves the narrative
    movement: he returned from the raid and came to Achish. ''Then'' smooths the English
    while reflecting the waw-consecutive sequence.'
- source_word: אָכִישׁ
  chosen: Achish
  rationale: Personal names are transliterated by standard convention per project
    philosophy.
