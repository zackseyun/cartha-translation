theological_decisions:
- issue: Rendering of violent action without euphemism or embellishment
  chosen_reading: The verse is translated plainly as describing David's lethal raid
    and plundering, including that he left no man or woman alive.
  alternative_readings:
  - Softer renderings that obscure the killing
  - Expanded renderings that specify massacre beyond the Hebrew wording
  rationale: The text presents morally difficult historical action. The translation
    should neither sanitize nor sensationalize it, but preserve the narrative's stark
    wording.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    what the text states without importing doctrinal claims.'
