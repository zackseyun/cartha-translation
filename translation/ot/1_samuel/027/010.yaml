id: 1SA.27.10
reference: 1 Samuel 27:10
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר אָכִ֔ישׁ אַל פְּשַׁטְתֶּ֖ם הַ/יּ֑וֹם וַ/יֹּ֣אמֶר דָּוִ֗ד עַל נֶ֤גֶב
    יְהוּדָה֙ וְ/עַל נֶ֣גֶב הַ/יַּרְחְמְאֵלִ֔י וְ/אֶל נֶ֖גֶב הַ/קֵּינִֽי־־־־׃
translation:
  text: Then Achish said, “Where have you made a raid today?” And David said, “Against
    the Negev of Judah, against the Negev of the Jerahmeelites, and against the Negev
    of the Kenites.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew text literally reads something like ''Did you not raid today?''
      but the sense in context is interrogative: ''Where have you made a raid today?'''
    reason: textual_variant
  - marker: b
    text: Or 'the south of Judah ... the south of the Jerahmeelites ... the south
      of the Kenites.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַל פְּשַׁטְתֶּם הַיּוֹם
  chosen: Where have you made a raid today?
  alternatives:
  - Did you not make a raid today?
  - Where did you raid today?
  lexicon: HALOT
  rationale: 'The consonantal text has אַל, which ordinarily means ''not,'' but in
    this context the sense is interrogative, as reflected by ancient versions and
    the narrative flow: Achish is asking David where he raided. פּשט in this stem
    refers to making a raid or stripping/plundering. ''Made a raid'' is idiomatic
    and preserves the military sense.'
- source_word: נֶגֶב
  chosen: Negev
  alternatives:
  - south
  - southern region
  lexicon: HALOT
  rationale: נֶגֶב can denote the south/southern region or the specific arid southern
    territory known as the Negev. Here it appears repeatedly with named groups/territories,
    so 'Negev' best preserves the geographical force while remaining readable.
- source_word: עַל
  chosen: against
  alternatives:
  - upon
  - toward
  - in the area of
  lexicon: HALOT
  rationale: With David's deceptive report of raiding targets, עַל is best rendered
    'against' to convey hostile action rather than mere direction.
- source_word: יְהוּדָה
  chosen: Judah
  lexicon: HALOT
  rationale: Standard transliteration of the tribal/territorial name.
- source_word: הַיַּרְחְמְאֵלִי
  chosen: the Jerahmeelites
  alternatives:
  - the Jerahmeelite region
  - Jerahmeel
  lexicon: HALOT
  rationale: The gentilic form refers to the people/clan descended from Jerahmeel.
    'Jerahmeelites' is the most natural English rendering.
- source_word: הַקֵּינִי
  chosen: the Kenites
  alternatives:
  - the Kenite region
  - Kainites
  lexicon: HALOT
  rationale: The gentilic form denotes the Kenite people. 'Kenites' is standard and
    clear.
- source_word: וַיֹּאמֶר
  chosen: said
  alternatives:
  - asked
  - answered
  lexicon: HALOT
  rationale: The verb is the common 'said.' Although Achish is asking a question and
    David is replying, 'said' preserves the Hebrew wording without over-interpretation.
