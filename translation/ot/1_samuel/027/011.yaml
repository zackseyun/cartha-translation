id: 1SA.27.11
reference: 1 Samuel 27:11
source:
  edition: WLC
  text: וְ/אִ֨ישׁ וְ/אִשָּׁ֜ה לֹֽא יְחַיֶּ֣ה דָוִ֗ד לְ/הָבִ֥יא גַת֙ לֵ/אמֹ֔ר פֶּן
    יַגִּ֥דוּ עָלֵ֖י/נוּ לֵ/אמֹ֑ר כֹּֽה עָשָׂ֤ה דָוִד֙ וְ/כֹ֣ה מִשְׁפָּט֔/וֹ כָּל
    הַ֨/יָּמִ֔ים אֲשֶׁ֥ר יָשַׁ֖ב בִּ/שְׂדֵ֥ה פְלִשְׁתִּֽים־־־־׃
translation:
  text: David left alive neither man nor woman, to bring to Gath, saying, “Otherwise
    they might report about us, saying, ‘This is what David did, and this has been
    his practice all the days that he lived in the country of the Philistines.’”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''in the field of the Philistines,'' an idiom for Philistine territory
      or countryside.'
    reason: cultural_note
  - marker: b
    text: Or 'this was his custom' / 'this was his manner' for 'this has been his
      practice.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִישׁ וְאִשָּׁה
  chosen: neither man nor woman
  alternatives:
  - neither men nor women
  - no man or woman
  lexicon: HALOT
  rationale: The singular pair in Hebrew functions distributively, referring to any
    human survivor. 'Neither man nor woman' preserves the idiom and the totality of
    the slaughter more closely than a pluralized rendering.
- source_word: לֹא יְחַיֶּה
  chosen: left alive
  alternatives:
  - did not let live
  - kept alive no one
  lexicon: HALOT
  rationale: The Piel of חיה here means to preserve alive or spare. 'Left alive' is
    idiomatic modern English and clearly conveys that David spared no survivors.
- source_word: לְהָבִיא גַת
  chosen: to bring to Gath
  alternatives:
  - to bring to Gath alive
  - to be brought to Gath
  lexicon: HALOT
  rationale: 'The infinitive expresses purpose: David spared no one in order that
    no one might be brought to Gath. The object ''them'' is implicit in Hebrew and
    need not be supplied in English. ''Gath'' is retained as the place name in the
    MT.'
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - thinking
  - for they would say
  lexicon: HALOT
  rationale: The first לֵאמֹר introduces David's rationale in direct-speech form.
    'Saying' preserves the Hebrew discourse structure.
- source_word: פֶּן
  chosen: Otherwise
  alternatives:
  - lest
  - for fear that
  lexicon: HALOT
  rationale: פֶּן marks prevention of an undesirable outcome. 'Otherwise' is natural
    in contemporary English while preserving the causal-preventive sense.
- source_word: יַגִּדוּ עָלֵינוּ
  chosen: they might report about us
  alternatives:
  - they might tell on us
  - they might report against us
  - they might tell about us
  lexicon: HALOT
  rationale: The Hiphil of נגד means to tell or report. With עַל plus pronominal suffix,
    the sense is reporting concerning David and his men. 'Report about us' is neutral
    and fits the context of disclosure to Achish.
- source_word: כֹּה עָשָׂה דָוִד
  chosen: This is what David did
  alternatives:
  - Thus David did
  - David did so
  lexicon: HALOT
  rationale: כֹּה introduces quoted content. 'This is what David did' is clear modern
    English and preserves the demonstrative force.
- source_word: וְכֹה מִשְׁפָּטוֹ
  chosen: this has been his practice
  alternatives:
  - such was his custom
  - this was his manner
  - this was his rule
  lexicon: HALOT
  rationale: מִשְׁפָּט can mean judgment, ordinance, custom, or established practice
    depending on context. Here it refers to David's habitual way of operating during
    his stay among the Philistines, so 'practice' best fits the narrative context.
- source_word: כָּל הַיָּמִים אֲשֶׁר יָשַׁב
  chosen: all the days that he lived
  alternatives:
  - all the time that he dwelt
  - all the days that he stayed
  lexicon: HALOT
  rationale: This clause denotes the duration of David's residence. 'Lived' is smoother
    than 'dwelt' in modern English while preserving the temporal sense.
- source_word: בִּשְׂדֵה פְלִשְׁתִּים
  chosen: in the country of the Philistines
  alternatives:
  - in the field of the Philistines
  - in Philistine territory
  lexicon: HALOT
  rationale: שָׂדֶה literally means 'field,' but in this idiom it refers more broadly
    to open country or territory. 'Country of the Philistines' communicates the geographic
    sense naturally in English.
