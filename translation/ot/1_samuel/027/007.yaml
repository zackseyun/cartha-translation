id: 1SA.27.7
reference: 1 Samuel 27:7
source:
  edition: WLC
  text: וַֽ/יְהִי֙ מִסְפַּ֣ר הַ/יָּמִ֔ים אֲשֶׁר יָשַׁ֥ב דָּוִ֖ד בִּ/שְׂדֵ֣ה פְלִשְׁתִּ֑ים
    יָמִ֖ים וְ/אַרְבָּעָ֥ה חֳדָשִֽׁים־׃
translation:
  text: The number of days that David lived in the territory of the Philistines was
    a year and four months.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'days and four months'; here 'days' is an idiomatic way
      of expressing 'a year' in a duration formula.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: was
  alternatives:
  - came to be
  - happened
  lexicon: HALOT
  rationale: In this clause introducing a duration summary, simple English copula
    'was' is the most natural equivalent and preserves the Hebrew narrative formula
    without woodenness.
- source_word: מִסְפַּר הַיָּמִים
  chosen: The number of days
  alternatives:
  - the time
  - the count of the days
  lexicon: HALOT
  rationale: A fairly formal rendering preserves the Hebrew idiom before the duration
    is specified. 'Time' would be smoother but less transparent to the source wording.
- source_word: אֲשֶׁר יָשַׁב
  chosen: that ... lived
  alternatives:
  - that ... dwelled
  - that ... stayed
  - that ... sat
  lexicon: HALOT
  rationale: ישב here denotes residing/staying rather than literal sitting. 'Lived'
    fits the context of an extended residence and reads naturally in English.
- source_word: בִּשְׂדֵה פְלִשְׁתִּים
  chosen: in the territory of the Philistines
  alternatives:
  - in the field of the Philistines
  - in the country of the Philistines
  - in Philistine territory
  lexicon: HALOT
  rationale: שָׂדֶה literally means 'field,' but in this construct with a people group
    it idiomatically refers to their land/territory. 'Territory' communicates the
    geographic sense without misleadingly suggesting a single field.
- source_word: יָמִים וְאַרְבָּעָה חֳדָשִׁים
  chosen: a year and four months
  alternatives:
  - days and four months
  lexicon: HALOT
  rationale: In Hebrew, יָמִים in duration formulas can idiomatically mean 'a year'
    (compare similar usages elsewhere). Rendering it woodenly as 'days and four months'
    would obscure the sense intended by the idiom.
