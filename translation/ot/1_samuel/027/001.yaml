id: 1SA.27.1
reference: 1 Samuel 27:1
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר דָּוִד֙ אֶל לִבּ֔/וֹ עַתָּ֛ה אֶסָּפֶ֥ה יוֹם אֶחָ֖ד בְּ/יַד שָׁא֑וּל
    אֵֽין לִ֨/י ט֜וֹב כִּ֣י הִמָּלֵ֥ט אִמָּלֵ֣ט אֶל אֶ֣רֶץ פְּלִשְׁתִּ֗ים וְ/נוֹאַ֨שׁ
    מִמֶּ֤/נִּי שָׁאוּל֙ לְ/בַקְשֵׁ֤/נִי עוֹד֙ בְּ/כָל גְּב֣וּל יִשְׂרָאֵ֔ל וְ/נִמְלַטְתִּ֖י
    מִ/יָּדֽ/וֹ־־־־׀־־׃
translation:
  text: Then David said in his heart, “Now I will one day be swept away by the hand
    of Saul. There is nothing better for me than that I should surely escape to the
    land of the Philistines. Then Saul will despair of seeking me any longer within
    all the territory of Israel, and I will escape from his hand.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I will perish one day by the hand of Saul.' The Hebrew verb can be rendered
      more generally as 'perish' or more vividly as 'be swept away.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'escaping I will escape,' an infinitive absolute with finite verb
      for emphasis.
    reason: lexical_alternative
  - marker: c
    text: Or 'Then Saul will give up seeking me any longer.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶל־לִבּוֹ
  chosen: in his heart
  alternatives:
  - to himself
  - inwardly
  lexicon: HALOT
  rationale: Hebrew idiom for internal speech or self-reflection. 'In his heart' preserves
    the idiom while remaining natural in English.
- source_word: אֶסָּפֶה
  chosen: I will ... be swept away
  alternatives:
  - I will perish
  - I will be destroyed
  - I will be gathered away
  lexicon: HALOT
  rationale: From ספָה in the Niphal, conveying being swept off/away or perishing.
    'Be swept away' preserves the vividness of the passive nuance better than the
    flatter 'perish,' while fitting the threat posed by Saul.
- source_word: יוֹם אֶחָד
  chosen: one day
  alternatives:
  - someday
  lexicon: HALOT
  rationale: Idiomatic temporal expression meaning 'one day' or 'someday.' 'One day'
    is slightly more formal and closer to the Hebrew wording.
- source_word: בְּיַד שָׁאוּל
  chosen: by the hand of Saul
  alternatives:
  - at Saul's hand
  - into Saul's hand
  lexicon: HALOT
  rationale: The idiom denotes agency/power. 'By the hand of Saul' keeps the Hebrew
    image and is intelligible in English.
- source_word: אֵין לִי טוֹב כִּי
  chosen: There is nothing better for me than that
  alternatives:
  - Nothing is better for me than to
  - It is best for me to
  lexicon: HALOT
  rationale: This construction expresses comparative advantage. The chosen wording
    preserves the evaluative force without over-paraphrasing; 'It is best for me'
    is smoother but slightly more interpretive.
- source_word: הִמָּלֵט אִמָּלֵט
  chosen: I should surely escape
  alternatives:
  - I must escape
  - I will certainly escape
  - by escaping I will escape
  lexicon: HALOT
  rationale: Infinitive absolute plus finite verb intensifies the verbal idea. 'Surely
    escape' captures the emphasis; the modal framing after 'nothing better... than
    that' yields natural English.
- source_word: אֶל אֶרֶץ פְּלִשְׁתִּים
  chosen: to the land of the Philistines
  alternatives:
  - into Philistine territory
  - to Philistia
  lexicon: HALOT
  rationale: A straightforward geographical phrase. 'Land of the Philistines' is transparent
    and close to the Hebrew.
- source_word: וְנוֹאַשׁ מִמֶּנִּי שָׁאוּל
  chosen: Then Saul will despair of seeking me
  alternatives:
  - Then Saul will give up on me
  - Then Saul will abandon hope concerning me
  lexicon: HALOT
  rationale: יאשׁ in this context means to lose hope or give up. The syntax links
    Saul's despair specifically to continuing the search, which is made explicit in
    English by carrying the sense into the following infinitive phrase.
- source_word: לְבַקְשֵׁנִי עוֹד
  chosen: of seeking me any longer
  alternatives:
  - from seeking me anymore
  - to seek me again
  lexicon: HALOT
  rationale: The infinitive with עוֹד indicates continued or repeated pursuit. 'Any
    longer' best conveys cessation of ongoing searching.
- source_word: בְּכָל גְּבוּל יִשְׂרָאֵל
  chosen: within all the territory of Israel
  alternatives:
  - throughout all the border of Israel
  - anywhere in Israel
  lexicon: HALOT
  rationale: גְּבוּל can mean border, boundary, or territory. Here the sense is the
    whole territorial extent of Israel, not merely its frontier line.
- source_word: וְנִמְלַטְתִּי מִיָּדוֹ
  chosen: and I will escape from his hand
  alternatives:
  - and I will be delivered from his hand
  - and I will get away from him
  lexicon: HALOT
  rationale: The verb repeats the escape motif and the idiom 'from his hand' denotes
    Saul's power/control. 'Escape from his hand' preserves both lexical and imagistic
    continuity.
