id: 1SA.27.2
reference: 1 Samuel 27:2
source:
  edition: WLC
  text: וַ/יָּ֣קָם דָּוִ֔ד וַ/יַּעֲבֹ֣ר ה֔וּא וְ/שֵׁשׁ מֵא֥וֹת אִ֖ישׁ אֲשֶׁ֣ר עִמּ֑/וֹ
    אֶל אָכִ֥ישׁ בֶּן מָע֖וֹךְ מֶ֥לֶךְ גַּֽת־־־׃
translation:
  text: So David arose and crossed over, he and the six hundred men who were with
    him, to Achish son of Maoch, king of Gath.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיָּקָם
  chosen: arose
  alternatives:
  - got up
  - set out
  lexicon: HALOT
  rationale: Qal wayyiqtol of קום often marks the beginning of decisive action. 'Arose'
    preserves the narrative idiom without over-paraphrasing it as merely 'left' or
    'set out.'
- source_word: וַיַּעֲבֹר
  chosen: crossed over
  alternatives:
  - went over
  - passed over
  lexicon: HALOT
  rationale: עבר commonly means 'cross over/pass over.' In this context David is moving
    from Israelite territory into Philistine territory, so 'crossed over' preserves
    the directional force better than the more generic 'went.'
- source_word: הוּא
  chosen: he
  alternatives:
  - he himself
  lexicon: HALOT
  rationale: 'The independent pronoun adds emphasis or clarification: David himself,
    along with his men. English naturally expresses this with ''he'' in apposition;
    ''he himself'' would be possible but slightly heavier than the context requires.'
- source_word: וְשֵׁשׁ מֵאוֹת אִישׁ
  chosen: the six hundred men
  alternatives:
  - six hundred men
  lexicon: HALOT
  rationale: The phrase is a straightforward numeral expression. Adding 'the' reflects
    that this is a known group already associated with David in the narrative, and
    reads naturally in English.
- source_word: אֲשֶׁר עִמּוֹ
  chosen: who were with him
  alternatives:
  - that were with him
  - who accompanied him
  lexicon: HALOT
  rationale: This relative clause identifies David's company. 'Who were with him'
    is the most direct and natural rendering; 'accompanied him' is slightly more interpretive.
- source_word: אֶל
  chosen: to
  alternatives:
  - toward
  lexicon: HALOT
  rationale: The preposition marks movement toward a person/destination. 'To' is the
    standard English equivalent here.
- source_word: אָכִישׁ
  chosen: Achish
  rationale: Personal names are transliterated by standard convention per project
    philosophy.
- source_word: בֶּן מָעוֹךְ
  chosen: son of Maoch
  rationale: A standard patronymic construction. 'Son of Maoch' preserves the Hebrew
    relationship marker without paraphrase.
- source_word: מֶלֶךְ גַּת
  chosen: king of Gath
  alternatives:
  - the king of Gath
  lexicon: HALOT
  rationale: Construct chain indicating Achish's royal office. 'King of Gath' is the
    natural English rendering; the article is not required in English apposition.
