theological_decisions:
- issue: Historical perspective implied by 'to this day' and 'kings of Judah'
  chosen_reading: Retain the narrator's retrospective note without attempting to harmonize
    or explain the compositional history in the translation.
  alternative_readings:
  - Expand the wording to make explicit that this reflects a later Judean royal perspective
  rationale: The Hebrew itself simply states the retrospective fact. The translation
    should preserve the text's own historical note without importing a theory of authorship
    or redaction into the main text.
  doctrine_reference: Translation philosophy §1, §3
