id: 1SA.27.6
reference: 1 Samuel 27:6
source:
  edition: WLC
  text: וַ/יִּתֶּן ל֥/וֹ אָכִ֛ישׁ בַּ/יּ֥וֹם הַ/ה֖וּא אֶת צִֽקְלָ֑ג לָ/כֵ֞ן הָיְתָ֤ה
    צִֽקְלַג֙ לְ/מַלְכֵ֣י יְהוּדָ֔ה עַ֖ד הַ/יּ֥וֹם הַ/זֶּֽה־־׃פ
translation:
  text: So Achish gave him Ziklag that day. Therefore Ziklag has belonged to the kings
    of Judah to this day.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'on that day.'
    reason: lexical_alternative
  - marker: b
    text: Or 'has been for the kings of Judah'; the Hebrew expression indicates that
      Ziklag remained under Judean royal possession up to the narrator's present.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתֶּן
  chosen: gave
  alternatives:
  - assigned
  - granted
  lexicon: HALOT
  rationale: נתן in this narrative context most naturally means 'gave.' 'Assigned'
    or 'granted' are possible contextual nuances, but 'gave' is the plain and sufficiently
    natural rendering.
- source_word: לּוֹ
  chosen: him
  lexicon: HALOT
  rationale: Third masculine singular pronominal suffix referring to David in the
    immediate context; rendered straightforwardly as 'him.'
- source_word: אָכִישׁ
  chosen: Achish
  rationale: Personal name is transliterated per project philosophy.
- source_word: בַּיּוֹם הַהוּא
  chosen: that day
  alternatives:
  - on that day
  lexicon: HALOT
  rationale: Idiomatic temporal expression. 'That day' is natural modern English while
    preserving the temporal specificity.
- source_word: אֶת צִקְלָג
  chosen: Ziklag
  rationale: Direct-object marker אֶת is untranslated in English; the place name is
    transliterated as 'Ziklag.'
- source_word: לָכֵן
  chosen: Therefore
  alternatives:
  - For that reason
  - So
  lexicon: HALOT
  rationale: Marks the consequence flowing from Achish's gift of the town. 'Therefore'
    preserves the inferential force clearly.
- source_word: הָיְתָה
  chosen: has belonged
  alternatives:
  - became
  - has been
  lexicon: HALOT
  rationale: With the predicate phrase 'to the kings of Judah' and the following 'to
    this day,' the sense is continuative possession/status from that event up to the
    writer's present. 'Has belonged' expresses this better than the more wooden 'has
    been.'
- source_word: לְמַלְכֵי יְהוּדָה
  chosen: to the kings of Judah
  alternatives:
  - for the kings of Judah
  - belonging to the kings of Judah
  lexicon: HALOT
  rationale: The lamed marks relation/possession here. 'To the kings of Judah' is
    idiomatic with 'has belonged' and preserves the possessive sense.
- source_word: עַד הַיּוֹם הַזֶּה
  chosen: to this day
  alternatives:
  - until this day
  lexicon: HALOT
  rationale: Standard idiom indicating continuation up to the narrator's present.
    'To this day' is the conventional and natural English equivalent.
