id: 1SA.27.5
reference: 1 Samuel 27:5
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר דָּוִ֜ד אֶל אָכִ֗ישׁ אִם נָא֩ מָצָ֨אתִי חֵ֤ן בְּ/עֵינֶ֨י/ךָ֙ יִתְּנוּ
    לִ֣/י מָק֗וֹם בְּ/אַחַ֛ת עָרֵ֥י הַ/שָּׂדֶ֖ה וְ/אֵ֣שְׁבָה שָּׁ֑ם וְ/לָ֨/מָּה יֵשֵׁ֧ב
    עַבְדְּ/ךָ֛ בְּ/עִ֥יר הַ/מַּמְלָכָ֖ה עִמָּֽ/ךְ־־־׃
translation:
  text: Then David said to Achish, “If I have now found favor in your eyes, let them
    give me a place in one of the country towns, so that I may live there. For why
    should your servant live with you in the royal city?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, “in one of the cities of the field,” meaning a town in
      the countryside as opposed to the royal city.
    reason: lexical_alternative
  - marker: b
    text: Or “and I will dwell there.”
    reason: lexical_alternative
  - marker: c
    text: Hebrew literally, “the city of the kingdom.”
    reason: lexical_alternative
lexical_decisions:
- source_word: מָצָאתִי חֵן בְּעֵינֶיךָ
  chosen: I have now found favor in your eyes
  alternatives:
  - I have found grace in your sight
  - I have found favor in your sight
  lexicon: HALOT
  rationale: Standard Hebrew idiom for gaining approval or favor. 'Favor' is more
    natural modern English than 'grace' here, and 'in your eyes' preserves the Hebrew
    imagery better than smoothing fully to 'in your sight.' 'Now' reflects נָא in
    a polite request context.
- source_word: נָא
  chosen: now
  alternatives:
  - please
  lexicon: HALOT
  rationale: In this construction נָא softens the request. English can represent this
    either with 'please' or 'now.' Here 'now' fits the deferential tone of the clause
    'If I have now found favor...' without overloading the following jussive request.
- source_word: יִתְּנוּ לִי
  chosen: let them give me
  alternatives:
  - may they give me
  - let a place be given to me
  lexicon: HALOT
  rationale: 'The 3mp imperfect functions jussively/indefinitely: a polite request
    that someone under Achish''s authority assign David a place. ''Let them give me''
    preserves the active, indefinite plural sense better than a passive.'
- source_word: מָקוֹם
  chosen: a place
  alternatives:
  - a location
  - a settlement
  lexicon: HALOT
  rationale: Generic term for a place/location. 'A place' is sufficiently broad and
    idiomatic in context.
- source_word: בְּאַחַת עָרֵי הַשָּׂדֶה
  chosen: in one of the country towns
  alternatives:
  - in one of the rural towns
  - in one of the towns of the countryside
  - in one of the field towns
  lexicon: HALOT
  rationale: Literally 'in one of the cities of the field/countryside.' 'Country towns'
    communicates the contrast with the royal city in natural English while preserving
    the rural sense of הַשָּׂדֶה.
- source_word: וְאֵשְׁבָה שָּׁם
  chosen: so that I may live there
  alternatives:
  - and I will dwell there
  - that I may stay there
  lexicon: HALOT
  rationale: ישב commonly means dwell/live/reside. 'Live there' is natural modern
    English; 'so that' captures the purposive nuance in context better than a simple
    coordinate 'and.'
- source_word: לָמָּה יֵשֵׁב
  chosen: For why should ... live
  alternatives:
  - and why should ... dwell
  - why would ... sit/live
  lexicon: HALOT
  rationale: The clause gives David's rationale for the request. 'For why should'
    makes the explanatory force clear in English while preserving the rhetorical question.
- source_word: עַבְדְּךָ
  chosen: your servant
  alternatives:
  - your slave
  lexicon: HALOT
  rationale: Although עבד can denote slave/servant, here it is a deferential self-reference
    in court speech rather than emphasizing bonded status. Therefore 'your servant'
    best matches the social register.
- source_word: בְּעִיר הַמַּמְלָכָה
  chosen: in the royal city
  alternatives:
  - in the city of the kingdom
  - in the capital city
  lexicon: HALOT
  rationale: Literally 'in the city of the kingdom.' 'Royal city' is a clear, idiomatic
    rendering that conveys the seat of the king without over-specifying 'capital,'
    though that idea is implicit.
- source_word: עִמָּךְ
  chosen: with you
  alternatives:
  - beside you
  lexicon: HALOT
  rationale: Straightforward preposition plus pronominal suffix. 'With you' preserves
    the relational proximity David wishes to avoid.
