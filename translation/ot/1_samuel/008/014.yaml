id: 1SA.8.14
reference: 1 Samuel 8:14
source:
  edition: WLC
  text: וְ/אֶת שְׂ֠דֽוֹתֵי/כֶם וְ/אֶת כַּרְמֵי/כֶ֧ם וְ/זֵיתֵי/כֶ֛ם הַ/טּוֹבִ֖ים יִקָּ֑ח
    וְ/נָתַ֖ן לַ/עֲבָדָֽי/ו־־׃
translation:
  text: He will take your fields, your vineyards, and your best olive groves, and
    give them to his servants.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'olive trees' or 'olive orchards'; the Hebrew likely refers to olive
      plantings as agricultural property.
    reason: lexical_alternative
  - marker: b
    text: Or 'to his slaves'; the Hebrew word can denote either servants or slaves
      depending on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׂדֹתֵיכֶם
  chosen: your fields
  alternatives:
  - your farmland
  lexicon: HALOT
  rationale: שָׂדֶה commonly denotes a field or tract of cultivated land. 'Fields'
    is the most direct and natural rendering in this list of agricultural properties.
- source_word: כַּרְמֵיכֶם
  chosen: your vineyards
  alternatives:
  - your vine-gardens
  lexicon: HALOT
  rationale: כֶּרֶם ordinarily refers to a vineyard. 'Vineyards' is standard, precise
    English and fits the property-seizure context.
- source_word: זֵיתֵיכֶם
  chosen: your best olive groves
  alternatives:
  - your olive trees
  - your olive orchards
  lexicon: HALOT
  rationale: זַיִת can denote olive trees collectively or an olive planting. In a
    list parallel to fields and vineyards, an estate-level rendering is preferable.
    'Olive groves' best matches the sense of productive agricultural holdings rather
    than individual trees.
- source_word: הַטּוֹבִים
  chosen: best
  alternatives:
  - good
  - finest
  lexicon: HALOT
  rationale: טוֹב means good, but in this context of royal expropriation it idiomatically
    points to the choicest portions. 'Best' conveys that he will seize the most desirable
    properties.
- source_word: יִקָּח
  chosen: will take
  alternatives:
  - will seize
  lexicon: HALOT
  rationale: לָקַח is the ordinary verb 'take.' While 'seize' captures the oppressive
    context, 'take' preserves the lexical simplicity of the Hebrew and lets the surrounding
    context supply the coercive force.
- source_word: וְנָתַן
  chosen: and give
  alternatives:
  - and assign
  lexicon: HALOT
  rationale: נָתַן is the common verb 'give.' 'Assign' is possible in administrative
    contexts, but 'give' is the plain sense and keeps the cadence of the warning.
- source_word: לַעֲבָדָיו
  chosen: to his servants
  alternatives:
  - to his slaves
  lexicon: HALOT
  rationale: עֶבֶד can mean servant or slave depending on context. Here it refers
    to the king's officials/retainers who receive confiscated property. Because the
    bonded status is not the focus and 'servants' fits royal court usage in English,
    'servants' is preferred; 'slaves' remains a lexical alternative.
