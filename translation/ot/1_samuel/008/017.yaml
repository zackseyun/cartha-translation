id: 1SA.8.17
reference: 1 Samuel 8:17
source:
  edition: WLC
  text: צֹאנְ/כֶ֖ם יַעְשֹׂ֑ר וְ/אַתֶּ֖ם תִּֽהְיוּ ל֥/וֹ לַ/עֲבָדִֽים־׃
translation:
  text: He will take a tenth of your flocks, and you will become his slaves.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'servants' or 'bondservants.' The Hebrew can denote those in service,
      but here the context of royal exaction and loss of freedom favors 'slaves.'
    reason: lexical_alternative
lexical_decisions:
- source_word: צֹאנְכֶם
  chosen: your flocks
  alternatives:
  - your sheep
  - your small livestock
  lexicon: HALOT
  rationale: צֹאן denotes small livestock, especially sheep and goats collectively.
    'Your flocks' is natural English and preserves the collective sense better than
    the narrower 'your sheep.'
- source_word: יַעְשֹׂר
  chosen: will take a tenth
  alternatives:
  - will tithe
  - will exact a tenth
  lexicon: HALOT
  rationale: From עשר in the Hiphil/Qal-related usage meaning to take or give a tenth.
    In this warning about royal exactions, 'will take a tenth' makes the king's action
    explicit and idiomatic in English; 'will tithe' could sound cultic or voluntary.
- source_word: וְאַתֶּם תִּהְיוּ לוֹ
  chosen: and you will become his
  alternatives:
  - and you will be his
  - and you will belong to him as
  lexicon: HALOT
  rationale: The clause states the resulting condition of the people under the king.
    'Will become his' captures the consequential force in context, while remaining
    faithful to the simple verb 'be.'
- source_word: לַעֲבָדִים
  chosen: slaves
  alternatives:
  - servants
  - bondservants
  lexicon: HALOT
  rationale: עֲבָדִים here refers to subjection under the king in a bonded, coercive
    sense. Per translation philosophy, 'slave' is preferred where bonded status is
    salient; this warning context emphasizes loss of freedom rather than ordinary
    service.
