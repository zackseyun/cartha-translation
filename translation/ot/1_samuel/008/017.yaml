theological_decisions:
- issue: Rendering of עֲבָדִים in a context of royal subjugation
  chosen_reading: slaves
  alternative_readings:
  - servants
  - bondservants
  rationale: The verse warns Israel that the king's demands will culminate in their
    becoming subject to him in a strongly coercive way. Following the doctrine's guidance
    on servant/slave language, 'slaves' best preserves the severity of the warning
    without importing later theological categories.
