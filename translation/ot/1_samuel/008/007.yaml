id: 1SA.8.7
reference: 1 Samuel 8:7
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר יְהוָה֙ אֶל שְׁמוּאֵ֔ל שְׁמַע֙ בְּ/ק֣וֹל הָ/עָ֔ם לְ/כֹ֥ל אֲשֶׁר
    יֹאמְר֖וּ אֵלֶ֑י/ךָ כִּ֣י לֹ֤א אֹֽתְ/ךָ֙ מָאָ֔סוּ כִּֽי אֹתִ֥/י מָאֲס֖וּ מִ/מְּלֹ֥ךְ
    עֲלֵי/הֶֽם־־־׃
translation:
  text: And the LORD said to Samuel, “Listen to the voice of the people in all that
    they say to you, for they have not rejected you, but they have rejected me from
    reigning over them.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'from being king over them.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: DOCTRINE.md specifies the default rendering of YHWH as 'the LORD,' following
    Jewish reverence tradition and the LXX pattern.
- source_word: שְׁמַע
  chosen: Listen
  alternatives:
  - Hear
  - Obey
  lexicon: HALOT
  rationale: The imperative here calls Samuel to heed what the people are saying.
    'Listen' is natural modern English and fits the immediate object 'to the voice
    of the people.' 'Obey' would over-specify the result, though compliance is implied
    in context.
- source_word: בְּקוֹל הָעָם
  chosen: to the voice of the people
  alternatives:
  - to the people
  - to what the people say
  lexicon: HALOT
  rationale: The Hebrew idiom is literally 'in/to the voice of the people.' Rendering
    it as 'to the voice of the people' preserves the source imagery while remaining
    understandable in English.
- source_word: לְכֹל אֲשֶׁר יֹאמְרוּ אֵלֶיךָ
  chosen: in all that they say to you
  alternatives:
  - in everything that they say to you
  - according to all that they tell you
  lexicon: HALOT
  rationale: This phrase expands the command to heed the people's request comprehensively.
    'In all that they say to you' is a close, readable rendering.
- source_word: מָאַס
  chosen: rejected
  alternatives:
  - despised
  - spurned
  - refused
  lexicon: HALOT
  rationale: The verb denotes rejecting or refusing someone. 'Rejected' best fits
    both occurrences in this verse and clearly communicates the covenantal/political
    repudiation involved.
- source_word: כִּי לֹא אֹתְךָ מָאָסוּ כִּי אֹתִי מָאֲסוּ
  chosen: for they have not rejected you, but they have rejected me
  alternatives:
  - for it is not you whom they have rejected, but me they have rejected
  lexicon: HALOT
  rationale: The paired clauses are contrastive. English idiom is improved by making
    the contrast explicit with 'but,' which accurately conveys the sense of the Hebrew
    repetition.
- source_word: מִמְּלֹךְ עֲלֵיהֶם
  chosen: from reigning over them
  alternatives:
  - from being king over them
  - from ruling over them
  lexicon: HALOT
  rationale: 'The preposition מִן with the infinitive construct marks what they are
    rejecting God from doing: reigning over them. ''From reigning over them'' is formally
    close to the Hebrew. ''From being king over them'' is possible, but the verbal
    idea of kingship/reign is more directly represented by ''reigning.'''
