theological_decisions:
- issue: Divine kingship in Israel's request for a human king
  chosen_reading: The verse is translated to state that the people's request constitutes
    a rejection of the LORD's reign over them.
  alternative_readings:
  - The people rejected only Samuel's leadership, not the LORD directly
  rationale: The Hebrew explicitly contrasts Samuel with the LORD and identifies the
    deeper issue as rejection of God's kingship. The translation preserves that theological
    force without adding further doctrinal interpretation.
  doctrine_reference: 'Affirmations; Translation philosophy #3'
