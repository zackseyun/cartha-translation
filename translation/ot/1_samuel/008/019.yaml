id: 1SA.8.19
reference: 1 Samuel 8:19
source:
  edition: WLC
  text: וַ/יְמָאֲנ֣וּ הָ/עָ֔ם לִ/שְׁמֹ֖עַ בְּ/ק֣וֹל שְׁמוּאֵ֑ל וַ/יֹּאמְר֣וּ לֹּ֔א
    כִּ֥י אִם מֶ֖לֶךְ יִֽהְיֶ֥ה עָלֵֽי/נוּ־׃
translation:
  text: But the people refused to listen to Samuel's voice, and they said, “No, but
    there shall be a king over us.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'refused to obey Samuel.' The Hebrew idiom 'listen to the voice of' can
      carry the sense of heeding or obeying, not merely hearing.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְמָאֲנוּ
  chosen: refused
  alternatives:
  - were unwilling
  - would not
  lexicon: HALOT
  rationale: The verb מאן denotes refusal or unwillingness. 'Refused' is concise,
    natural English, and preserves the active resistance in the Hebrew wayyiqtol narrative
    form.
- source_word: הָעָם
  chosen: the people
  alternatives:
  - the populace
  lexicon: HALOT
  rationale: עם here refers collectively to the Israelites requesting a king. 'The
    people' is the standard and most natural collective rendering.
- source_word: לִשְׁמֹעַ בְּקוֹל
  chosen: to listen to ... voice
  alternatives:
  - to obey
  - to heed
  lexicon: HALOT
  rationale: The idiom שמע בקול can mean 'listen to' or more strongly 'obey.' Here
    the immediate context is rejection of Samuel's warning, so 'listen to Samuel's
    voice' preserves the Hebrew imagery and leaves the obedience nuance implicit rather
    than over-interpreting.
- source_word: שְׁמוּאֵל
  chosen: Samuel
  rationale: Personal names are transliterated by standard English convention per
    project philosophy.
- source_word: וַיֹּאמְרוּ
  chosen: and they said
  alternatives:
  - and they answered
  lexicon: HALOT
  rationale: אמר is the standard verb of speech. 'And they said' fits the narrative
    sequence straightforwardly.
- source_word: לֹא
  chosen: 'No'
  alternatives:
  - No!
  - Not so
  lexicon: HALOT
  rationale: The standalone negation functions as an emphatic rejection of Samuel's
    counsel. 'No' captures the force in idiomatic modern English.
- source_word: כִּי אִם
  chosen: but
  alternatives:
  - rather
  - instead
  lexicon: HALOT
  rationale: The combination here introduces a strong contrast after the emphatic
    'No.' 'But' is the most natural English connector in this dialogue; 'rather' or
    'instead' are possible but less smooth in the sentence as a whole.
- source_word: מֶלֶךְ יִהְיֶה עָלֵינוּ
  chosen: there shall be a king over us
  alternatives:
  - a king will be over us
  - let a king be over us
  lexicon: HALOT
  rationale: The clause expresses the people's insistence on monarchy. 'There shall
    be a king over us' preserves the future/assertive force and the relational phrase
    'over us,' which reflects royal rule rather than mere existence.
