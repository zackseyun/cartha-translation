id: 1SA.8.11
reference: 1 Samuel 8:11
source:
  edition: WLC
  text: וַ/יֹּ֕אמֶר זֶ֗ה יִֽהְיֶה֙ מִשְׁפַּ֣ט הַ/מֶּ֔לֶךְ אֲשֶׁ֥ר יִמְלֹ֖ךְ עֲלֵי/כֶ֑ם
    אֶת בְּנֵי/כֶ֣ם יִקָּ֗ח וְ/שָׂ֥ם ל/וֹ֙ בְּ/מֶרְכַּבְתּ֣/וֹ וּ/בְ/פָרָשָׁ֔י/ו וְ/רָצ֖וּ
    לִ/פְנֵ֥י מֶרְכַּבְתּֽ/וֹ־׃
translation:
  text: 'He said, “This will be the custom of the king who will reign over you: he
    will take your sons and assign them to his chariots and among his horsemen, and
    they will run before his chariots.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the legal right of the king.” The Hebrew mishpat can denote a customary
      practice, a legal claim, or a judicial norm; here it refers to the way a king
      will typically act toward the people.
    reason: lexical_alternative
  - marker: b
    text: Hebrew “your sons,” specifically male offspring, fitting the context of
      royal military service.
    reason: cultural_note
  - marker: c
    text: Or “before his chariot.” The Hebrew singular may be understood individually
      or collectively.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִשְׁפַּט
  chosen: custom
  alternatives:
  - justice
  - judgment
  - legal right
  - practice
  lexicon: HALOT
  rationale: In this context Samuel is describing the manner/practice by which a king
    will operate toward the people, not a judicial verdict. 'Custom' communicates
    an established mode of royal behavior in readable English. 'Legal right' is possible,
    but could overstate normative legitimacy; the verse warns of what the king will
    do.
- source_word: הַמֶּלֶךְ אֲשֶׁר יִמְלֹךְ עֲלֵיכֶם
  chosen: the king who will reign over you
  alternatives:
  - the king who will rule over you
  lexicon: HALOT
  rationale: '''Reign over you'' preserves the royal sense of מלך and the preposition
    עַל. ''Rule over you'' is acceptable but slightly flattens the kingship nuance.'
- source_word: אֶת־בְּנֵיכֶם יִקָּח
  chosen: he will take your sons
  alternatives:
  - he will take your children
  lexicon: HALOT
  rationale: The Hebrew specifically says 'your sons,' not a gender-neutral term.
    This follows the gender-accurate principle and fits the military conscription
    context.
- source_word: וְשָׂם לוֹ
  chosen: and assign them
  alternatives:
  - and appoint them for himself
  - and place them for himself
  lexicon: HALOT
  rationale: The verb שׂים here means to place/set in service. 'Assign them' conveys
    forced placement into royal service in idiomatic English. The reflexive sense
    of לּוֹ is absorbed by the context of service to the king.
- source_word: בְּמֶרְכַּבְתּוֹ
  chosen: to his chariots
  alternatives:
  - for his chariotry
  - in his chariot
  lexicon: HALOT
  rationale: Though singular in form, the noun can function collectively in context.
    'To his chariots' is natural English and matches the following plural-like military
    grouping. 'In his chariot' would sound too narrowly literal.
- source_word: וּבְפָרָשָׁיו
  chosen: among his horsemen
  alternatives:
  - to be his horsemen
  - with his horsemen
  - among his cavalry
  lexicon: HALOT
  rationale: פָרָשִׁים are horsemen/cavalry. 'Among his horsemen' fits the preposition
    and allows the sons to be assigned into that corps. 'Cavalry' is possible but
    slightly more technical.
- source_word: וְרָצוּ לִפְנֵי מֶרְכַּבְתּוֹ
  chosen: and they will run before his chariots
  alternatives:
  - and they will run before his chariot
  lexicon: HALOT
  rationale: This depicts royal runners preceding the king's vehicles. Rendering the
    final noun as plural keeps consistency with the earlier collective sense and avoids
    awkward singular English. The image is of public royal display and service.
