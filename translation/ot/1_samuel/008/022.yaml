theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse contains the covenant name of God. Per project doctrine, the
    default English rendering is 'the LORD' rather than a transliteration.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Gendered language in אַנְשֵׁי יִשְׂרָאֵל and אִישׁ
  chosen_reading: 'Retain masculine wording: ''the men of Israel'' and ''each man'''
  alternative_readings:
  - the Israelites
  - the people of Israel
  - each person
  rationale: The Hebrew uses explicitly masculine forms. In line with the project's
    gender-accurate policy, the translation preserves that form rather than flattening
    it into gender-neutral English, while recognizing the representative force of
    the expression in context.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #4: Gender-accurate over
    gender-neutral'
