id: 1SA.8.22
reference: 1 Samuel 8:22
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר יְהוָ֤ה אֶל שְׁמוּאֵל֙ שְׁמַ֣ע בְּ/קוֹלָ֔/ם וְ/הִמְלַכְתָּ֥ לָ/הֶ֖ם מֶ֑לֶךְ וַ/יֹּ֤אמֶר שְׁמוּאֵל֙ אֶל אַנְשֵׁ֣י יִשְׂרָאֵ֔ל לְכ֖וּ אִ֥ישׁ לְ/עִירֽ/וֹ־־׃פ
translation:
  text: And Yahweh said to Samuel, “Listen to their voice and make a king for them.” Then Samuel said to the men of Israel, “Go, each man to his city.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'heed them' / 'obey their voice.' The Hebrew idiom 'listen to their voice' can carry the sense of complying with what they ask.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the men of Israel.' The expression may refer representatively to the assembled Israelites.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: שְׁמַע בְּקוֹלָם
  chosen: Listen to their voice
  alternatives:
  - Obey their voice
  - Hear them
  lexicon: HALOT
  rationale: שׁמע with בְּקוֹל commonly means to heed or listen to someone. 'Listen to their voice' keeps the Hebrew idiom visible while remaining natural English; 'obey' would be interpretive, though context implies compliance.
- source_word: וְהִמְלַכְתָּ לָהֶם מֶלֶךְ
  chosen: appoint a king for them
  alternatives:
  - make a king for them
  - cause a king to reign over them
  lexicon: HALOT
  rationale: The Hiphil of מלך here means to install or appoint someone as king. 'Appoint' is idiomatic and accurately conveys causative royal installation without over-literal awkwardness.
- source_word: אַנְשֵׁי יִשְׂרָאֵל
  chosen: the men of Israel
  alternatives:
  - the people of Israel
  - the Israelites
  lexicon: HALOT
  rationale: אַנְשֵׁי is literally 'men of.' In keeping with the project's gender-accurate principle, the masculine form is retained rather than neutralized to 'people,' while still functioning as a representative designation for the gathered Israelites.
- source_word: לְכוּ
  chosen: Go
  alternatives:
  - Go away
  - Depart
  lexicon: HALOT
  rationale: A straightforward imperative of הלך. 'Go' is the most natural and sufficient rendering in context.
- source_word: אִישׁ לְעִירוֹ
  chosen: each man to his city
  alternatives:
  - every man to his city
  - each to his own city
  - each man to his town
  lexicon: HALOT
  rationale: אִישׁ distributively means 'each man' or 'every man.' עִיר can mean city or town; 'city' is the standard gloss and preserves the Hebrew wording. The phrase is a dismissal formula sending each person back home.
