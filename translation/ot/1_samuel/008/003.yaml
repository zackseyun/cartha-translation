theological_decisions:
- issue: Moral-legal description of Samuel's sons
  chosen_reading: Render the verse as an indictment of judicial corruption without
    softening the legal terminology.
  alternative_readings:
  - Use more general moral language such as 'were greedy' or 'acted unjustly'
  rationale: 'The Hebrew piles up legal-corruption terms: pursuit of illicit gain,
    taking bribes, and distorting judgment. The translation preserves that forensic
    specificity rather than reducing it to a vague statement of bad character.'
  doctrine_reference: Translation philosophy §§1, 5, 6
