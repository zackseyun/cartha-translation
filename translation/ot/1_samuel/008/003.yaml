id: 1SA.8.3
reference: 1 Samuel 8:3
source:
  edition: WLC
  text: וְ/לֹֽא הָלְכ֤וּ בָנָי/ו֙ ב/דרכ/ו וַ/יִּטּ֖וּ אַחֲרֵ֣י הַ/בָּ֑צַע וַ/יִּ֨קְחוּ
    שֹׁ֔חַד וַ/יַּטּ֖וּ מִשְׁפָּֽט־־׃פ
translation:
  text: But his sons did not walk in his ways; they turned aside after dishonest gain,
    took bribes, and perverted justice.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'after unjust gain' or 'after greed.' The Hebrew term denotes profit
      sought in a wrongful or exploitative way.
    reason: lexical_alternative
  - marker: b
    text: Literally 'turned aside judgment.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הָלְכוּ ... בְּדַרְכּוֹ
  chosen: did not walk in his ways
  alternatives:
  - did not follow his ways
  - did not walk in his path
  lexicon: HALOT
  rationale: הלך with בְּ + דֶּרֶךְ is a common idiom for conduct or manner of life.
    'Walk in his ways' preserves the Hebrew metaphor while remaining natural English.
- source_word: וַיִּטּוּ
  chosen: they turned aside
  alternatives:
  - they turned away
  - they deviated
  lexicon: HALOT
  rationale: נטה here conveys deviation from a right course. 'Turned aside' is idiomatic
    in biblical legal-moral contexts and prepares for the following phrase of corrupt
    pursuit.
- source_word: אַחֲרֵי הַבָּצַע
  chosen: after dishonest gain
  alternatives:
  - after unjust gain
  - after profit
  - after greed
  lexicon: HALOT
  rationale: בצע in this context denotes gain obtained by unjust or greedy means,
    especially in judicial corruption contexts. 'Dishonest gain' captures both the
    acquisitive and illicit sense better than the broader 'profit' or the more internal
    'greed'.
- source_word: וַיִּקְחוּ שֹׁחַד
  chosen: took bribes
  alternatives:
  - accepted a bribe
  lexicon: HALOT
  rationale: שֹׁחַד is specifically a bribe, especially in legal settings. The plural
    English 'bribes' fits the general description of their practice.
- source_word: וַיַּטּוּ מִשְׁפָּט
  chosen: perverted justice
  alternatives:
  - twisted justice
  - turned aside judgment
  lexicon: HALOT
  rationale: The idiom means to distort legal judgment. 'Perverted justice' is concise,
    natural modern English, and preserves the forensic force better than the more
    wooden 'turned aside judgment'.
- source_word: בָּנָיו
  chosen: his sons
  alternatives:
  - his children
  lexicon: HALOT
  rationale: The Hebrew is specifically masculine plural and refers to Samuel's male
    offspring in context. This follows the gender-accurate principle.
