id: 1SA.8.10
reference: 1 Samuel 8:10
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר שְׁמוּאֵ֔ל אֵ֖ת כָּל דִּבְרֵ֣י יְהוָ֑ה אֶל הָ/עָ֕ם הַ/שֹּׁאֲלִ֥ים מֵ/אִתּ֖/וֹ מֶֽלֶךְ־־׃ס
translation:
  text: So Samuel spoke all the words of Yahweh to the people who were asking him for a king.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'who had asked him for a king.' The Hebrew participle can describe either ongoing action or the people as those characterized by this request.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: spoke
  alternatives:
  - said
  - told
  lexicon: HALOT
  rationale: Though the verb is formally 'said,' English idiom with 'all the words' is smoother as 'spoke.' This preserves the reporting sense without unnecessary stiffness.
- source_word: אֵת כָּל דִּבְרֵי יְהוָה
  chosen: all the words of the LORD
  alternatives:
  - everything the LORD had said
  - all the LORD's words
  lexicon: HALOT
  rationale: A relatively formal rendering preserves the emphasis on the totality of the divine message. 'Words of the LORD' is a standard biblical expression and should remain visible.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֶל הָעָם
  chosen: to the people
  alternatives:
  - to the people of Israel
  - to the populace
  lexicon: HALOT
  rationale: The Hebrew simply says 'the people'; 'to' is the natural rendering of אֶל in this context.
- source_word: הַשֹּׁאֲלִים מֵאִתּוֹ מֶלֶךְ
  chosen: who were asking him for a king
  alternatives:
  - who had asked him for a king
  - who were requesting a king from him
  lexicon: HALOT
  rationale: The participle הַשֹּׁאֲלִים is best represented as an ongoing or characteristic action ('were asking'), and מֵאִתּוֹ indicates that the request was directed to Samuel. 'For a king' is idiomatic English for the object requested.
