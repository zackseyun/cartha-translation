id: 1SA.8.6
reference: 1 Samuel 8:6
source:
  edition: WLC
  text: וַ/יֵּ֤רַע הַ/דָּבָר֙ בְּ/עֵינֵ֣י שְׁמוּאֵ֔ל כַּ/אֲשֶׁ֣ר אָמְר֔וּ תְּנָ/ה לָּ֥/נוּ מֶ֖לֶךְ לְ/שָׁפְטֵ֑/נוּ וַ/יִּתְפַּלֵּ֥ל שְׁמוּאֵ֖ל אֶל יְהוָֽה־־׃פ
translation:
  text: But the matter was displeasing in Samuel’s eyes when they said, “Give us a king to judge us.” And Samuel prayed to Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “was displeasing in Samuel’s eyes.” The Hebrew says literally that the matter “was evil” in Samuel’s eyes, expressing his strong negative judgment.
    reason: lexical_alternative
  - marker: b
    text: “To judge us” can also carry the sense “to govern us” or “to rule us.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּרַע
  chosen: was evil
  alternatives:
  - was displeasing
  - seemed wrong
  - was bad
  lexicon: HALOT
  rationale: From רעע in the qal/wayyiqtol, here describing the matter as bad/evil from Samuel’s perspective. 'Was evil' preserves the Hebrew moral evaluative force more directly than the smoother idiom 'was displeasing,' while the following phrase 'in Samuel’s eyes' makes clear this is his assessment.
- source_word: הַדָּבָר
  chosen: the matter
  alternatives:
  - the thing
  - the request
  lexicon: HALOT
  rationale: דבר is broad ('word, matter, thing'). 'The matter' is natural English and preserves the general reference to what had just been proposed, without narrowing it too quickly to 'request.'
- source_word: בְּעֵינֵי שְׁמוּאֵל
  chosen: in Samuel’s eyes
  alternatives:
  - in Samuel’s sight
  - to Samuel
  lexicon: HALOT
  rationale: This Hebrew idiom marks evaluation from Samuel’s perspective. 'In Samuel’s eyes' is a transparent, fairly literal rendering that preserves the idiom’s imagery better than the more interpretive 'to Samuel.'
- source_word: כַּאֲשֶׁר אָמְרוּ
  chosen: when they said
  alternatives:
  - because they said
  - as they said
  lexicon: HALOT
  rationale: כאשׁר can mark temporal relation here. 'When they said' fits the narrative flow and avoids overstating causation, though the saying is of course the occasion for Samuel’s reaction.
- source_word: תְּנָה לָּנוּ
  chosen: Give us
  alternatives:
  - appoint for us
  - grant us
  lexicon: HALOT
  rationale: נתן in the imperative is straightforwardly 'give.' 'Give us' is the plainest rendering and matches the directness of the elders’ demand.
- source_word: מֶלֶךְ
  chosen: a king
  lexicon: HALOT
  rationale: Standard rendering of מלך in this context.
- source_word: לְשָׁפְטֵנוּ
  chosen: to judge us
  alternatives:
  - to govern us
  - to rule us
  lexicon: HALOT
  rationale: שׁפט can include governing/ruling, but 'judge' preserves the lexical link with the book’s broader theme of judges and with Samuel’s own role. The broader governmental sense is real, so alternatives are noted.
- source_word: וַיִּתְפַּלֵּל
  chosen: prayed
  alternatives:
  - interceded
  lexicon: HALOT
  rationale: The hitpael of פלל commonly means 'to pray.' 'Prayed' is the natural English equivalent; 'interceded' is possible contextually but too specific for the verb alone.
- source_word: אֶל יְהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: Per doctrine, יְהוָה is rendered 'the LORD.' The preposition אֶל is naturally 'to' in this prayer context.
