theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: Follows the project’s stated default for the Tetragrammaton, preserving reverential convention and consistency with the broader translation.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Strength of Samuel’s negative evaluation in וַיֵּרַע
  chosen_reading: was evil in Samuel’s eyes
  alternative_readings:
  - was displeasing to Samuel
  - Samuel was displeased
  rationale: 'The Hebrew uses moral-evaluative language rather than merely reporting emotion. The chosen rendering preserves that tension: the request is not only emotionally upsetting but judged as wrong by Samuel.'
  doctrine_reference: 'DOCTRINE.md Translation philosophy: preserve original-language primacy; preserve theological tension rather than resolve it'
