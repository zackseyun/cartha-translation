id: 1SA.8.16
reference: 1 Samuel 8:16
source:
  edition: WLC
  text: וְ/אֶת עַבְדֵי/כֶם֩ וְֽ/אֶת שִׁפְח֨וֹתֵי/כֶ֜ם וְ/אֶת בַּחוּרֵי/כֶ֧ם הַ/טּוֹבִ֛ים
    וְ/אֶת חֲמוֹרֵי/כֶ֖ם יִקָּ֑ח וְ/עָשָׂ֖ה לִ/מְלַאכְתּֽ/וֹ־־־־׃
translation:
  text: He will take your male slaves, your female slaves, your best young men, and
    your donkeys, and put them to his work.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'your servants ... your maidservants.' The Hebrew terms can denote servants
      more broadly, but here the coercive royal seizure context favors 'slaves.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עַבְדֵיכֶם
  chosen: your male slaves
  alternatives:
  - your servants
  - your male servants
  lexicon: HALOT
  rationale: עֶבֶד can denote servant or slave, but in this royal-conscription context
    the coercive, owned/labor-extractive sense is salient. 'Male slaves' also preserves
    the gender contrast with the following 'female slaves.'
- source_word: שִׁפְחוֹתֵיכֶם
  chosen: your female slaves
  alternatives:
  - your maidservants
  - your female servants
  lexicon: HALOT
  rationale: שִׁפְחָה refers to a female slave/servant. 'Female slaves' matches the
    likely bonded status and keeps the parallel with עַבְדֵיכֶם.
- source_word: בַּחוּרֵיכֶם הַטּוֹבִים
  chosen: your best young men
  alternatives:
  - your finest young men
  - your best men
  - your choice young men
  lexicon: HALOT
  rationale: בָּחוּר commonly denotes a young man in his prime; הַטּוֹבִים adds the
    sense of the best/finest. 'Best young men' is natural English and preserves both
    age and quality.
- source_word: חֲמוֹרֵיכֶם
  chosen: your donkeys
  alternatives:
  - your asses
  lexicon: HALOT
  rationale: The ordinary meaning is 'donkeys.' This is standard modern English and
    avoids archaic wording.
- source_word: יִקָּח
  chosen: will take
  alternatives:
  - takes
  - will seize
  lexicon: HALOT
  rationale: לקח means 'take.' In the prophetic warning sequence, English future 'will
    take' best conveys the repeated royal actions being predicted.
- source_word: וְעָשָׂה לִמְלַאכְתּוֹ
  chosen: and put them to his work
  alternatives:
  - and use them for his work
  - and make them do his work
  - and employ them in his service
  lexicon: HALOT
  rationale: Literally 'and he will make/do for his work.' The idiom means he will
    assign them to his own labor or service. 'Put them to his work' is concise, natural,
    and preserves the king's appropriation of people and animals for royal tasks.
