id: 1SA.8.2
reference: 1 Samuel 8:2
source:
  edition: WLC
  text: וַ/יְהִ֞י שֶׁם בְּנ֤/וֹ הַ/בְּכוֹר֙ יוֹאֵ֔ל וְ/שֵׁ֥ם מִשְׁנֵ֖/הוּ אֲבִיָּ֑ה
    שֹׁפְטִ֖ים בִּ/בְאֵ֥ר שָֽׁבַע־׃
translation:
  text: The name of his firstborn son was Joel, and the name of his second was Abijah;
    they were judges in Beersheba.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיְהִי
  chosen: was
  alternatives:
  - came to be
  - it happened
  lexicon: HALOT
  rationale: In this naming formula, the verb functions as a simple copular/existential
    introduction rather than a narrative 'it happened.' English 'was' best fits the
    construction 'the name ... was ...'.
- source_word: שֵׁם
  chosen: name
  lexicon: HALOT
  rationale: Standard rendering in a genealogical/naming formula; repeated for both
    sons to preserve the Hebrew structure.
- source_word: בְּנוֹ
  chosen: his ... son
  alternatives:
  - his child
  lexicon: HALOT
  rationale: The noun specifically means 'son,' not the more generic 'child.' The
    possessive refers to Samuel from the prior context.
- source_word: הַבְּכוֹר
  chosen: firstborn
  alternatives:
  - older
  - eldest
  lexicon: HALOT
  rationale: '''Firstborn'' is the precise lexical sense and preserves the familial
    ordering stated in Hebrew.'
- source_word: יוֹאֵל
  chosen: Joel
  rationale: Personal name transliterated according to the translation philosophy.
- source_word: מִשְׁנֵהוּ
  chosen: his second
  alternatives:
  - the second
  - his second son
  lexicon: HALOT
  rationale: The term denotes the second in order. 'His second' is concise and natural
    in English, with 'son' understood from the parallel first clause.
- source_word: אֲבִיָּה
  chosen: Abijah
  rationale: Personal name transliterated according to the translation philosophy.
- source_word: שֹׁפְטִים
  chosen: they were judges
  alternatives:
  - serving as judges
  - acting as judges
  lexicon: HALOT
  rationale: The masculine plural participle describes the two sons' ongoing role
    or office. 'They were judges' communicates this clearly in idiomatic English.
- source_word: בִּבְאֵר שָׁבַע
  chosen: in Beersheba
  alternatives:
  - at Beersheba
  lexicon: HALOT
  rationale: Standard English rendering of the place name with the preposition expressed
    naturally as 'in' for location.
