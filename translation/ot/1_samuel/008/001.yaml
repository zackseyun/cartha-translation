id: 1SA.8.1
reference: 1 Samuel 8:1
source:
  edition: WLC
  text: וַ/יְהִ֕י כַּ/אֲשֶׁ֥ר זָקֵ֖ן שְׁמוּאֵ֑ל וַ/יָּ֧שֶׂם אֶת בָּנָ֛י/ו שֹׁפְטִ֖ים
    לְ/יִשְׂרָאֵֽל־׃
translation:
  text: When Samuel grew old, he appointed his sons as judges over Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'made his sons judges for Israel.' The Hebrew verb is literally 'set,'
      and the preposition before 'Israel' can be understood as 'for' or 'over' depending
      on how the appointment is construed.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי כַּאֲשֶׁר
  chosen: When
  alternatives:
  - And it happened when
  - Now when
  lexicon: HALOT
  rationale: The Hebrew narrative formula introduces a temporal circumstance. In natural
    modern English, 'When' captures the function without woodenly reproducing the
    idiom 'and it happened.'
- source_word: זָקֵן
  chosen: grew old
  alternatives:
  - was old
  - became old
  lexicon: HALOT
  rationale: The verb denotes becoming old/aging rather than merely stating a static
    condition. 'Grew old' preserves the inceptive sense in readable English.
- source_word: שְׁמוּאֵל
  chosen: Samuel
  rationale: Personal names are transliterated by standard English convention.
- source_word: וַיָּשֶׂם
  chosen: appointed
  alternatives:
  - made
  - set
  lexicon: HALOT
  rationale: Although the base verb is 'set/put,' in this context of assigning an
    office, 'appointed' best conveys the institutional action in idiomatic English.
- source_word: אֶת בָּנָיו
  chosen: his sons
  alternatives:
  - his children
  lexicon: HALOT
  rationale: The Hebrew specifically refers to male offspring. 'His sons' is gender-accurate
    and matches the source.
- source_word: שֹׁפְטִים
  chosen: judges
  alternatives:
  - leaders
  - rulers
  lexicon: HALOT
  rationale: The participial/plural noun refers to those serving in the role of judges.
    'Judges' preserves the established judicial-governing sense in Samuel's context
    without overexpansion.
- source_word: לְיִשְׂרָאֵל
  chosen: over Israel
  alternatives:
  - for Israel
  - in Israel
  lexicon: HALOT
  rationale: The preposition here marks sphere/authority in context. 'Over Israel'
    best expresses that Samuel appointed them to exercise judicial authority with
    respect to Israel.
