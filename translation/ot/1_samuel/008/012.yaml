id: 1SA.8.12
reference: 1 Samuel 8:12
source:
  edition: WLC
  text: וְ/לָ/שׂ֣וּם ל֔/וֹ שָׂרֵ֥י אֲלָפִ֖ים וְ/שָׂרֵ֣י חֲמִשִּׁ֑ים וְ/לַ/חֲרֹ֤שׁ
    חֲרִישׁ/וֹ֙ וְ/לִ/קְצֹ֣ר קְצִיר֔/וֹ וְ/לַ/עֲשׂ֥וֹת כְּלֵֽי מִלְחַמְתּ֖/וֹ וּ/כְלֵ֥י
    רִכְבּֽ/וֹ־׃
translation:
  text: He will appoint for himself commanders of thousands and commanders of fifties,
    and some to plow his ground and reap his harvest, and to make his weapons of war
    and the equipment for his chariots.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'captains of thousands and captains of fifties.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew literally, 'to plow his plowing and reap his harvest,' a construction
      emphasizing labor done for the king.
    reason: lexical_alternative
  - marker: c
    text: Or 'to make his military equipment and the equipment of his chariots.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְלָשׂוּם לוֹ
  chosen: He will appoint for himself
  alternatives:
  - and to appoint for himself
  - and to set for himself
  lexicon: HALOT
  rationale: The infinitive construct with prefixed conjunction continues the description
    of what the king will do from the previous verse; in English, an explicit finite
    verb is needed for natural sense. שׂוּם with לוֹ here means appoint/set up for
    his own use or benefit.
- source_word: שָׂרֵי אֲלָפִים
  chosen: commanders of thousands
  alternatives:
  - captains of thousands
  - chiefs of thousands
  lexicon: HALOT
  rationale: שַׂר denotes an official, leader, or commander. In this military context,
    'commanders' best conveys rank without archaic tone. 'Of thousands' preserves
    the Hebrew administrative/military grouping.
- source_word: וְשָׂרֵי חֲמִשִּׁים
  chosen: and commanders of fifties
  alternatives:
  - and captains of fifties
  - and chiefs of fifty
  lexicon: HALOT
  rationale: Parallel to the previous phrase; 'commanders of fifties' keeps the military-administrative
    structure and preserves the Hebrew number grouping.
- source_word: וְלַחֲרֹשׁ חֲרִישׁוֹ
  chosen: and some to plow his ground
  alternatives:
  - and to plow his plowing
  - and to plow his fields
  lexicon: HALOT
  rationale: The cognate construction literally refers to plowing his plowing/tilled
    land. Idiomatic English requires a smoother expression. 'His ground' preserves
    the agricultural labor demanded for the king's benefit without over-specifying
    beyond the Hebrew.
- source_word: וְלִקְצֹר קְצִירוֹ
  chosen: and reap his harvest
  alternatives:
  - and to reap his crop
  lexicon: HALOT
  rationale: The cognate accusative is naturally rendered in English as 'reap his
    harvest.' This preserves the sense of forced agricultural labor for the king.
- source_word: וְלַעֲשׂוֹת כְּלֵי מִלְחַמְתּוֹ
  chosen: and to make his weapons of war
  alternatives:
  - and to make his weapons
  - and to make his military equipment
  lexicon: HALOT
  rationale: כְּלִי is a broad term for article, implement, vessel, or weapon depending
    on context. With 'war,' the sense is military gear; 'weapons of war' is clear
    and weighty, though somewhat formal. It preserves the martial emphasis.
- source_word: וּכְלֵי רִכְבּוֹ
  chosen: and the equipment for his chariots
  alternatives:
  - and his chariot equipment
  - and the gear of his chariots
  lexicon: HALOT
  rationale: רֶכֶב can denote chariotry/chariots. Here כְּלֵי likely refers to the
    implements or equipment associated with the royal chariot force. 'Equipment for
    his chariots' is idiomatic and sufficiently broad.
