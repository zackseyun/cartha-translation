id: 1SA.8.21
reference: 1 Samuel 8:21
source:
  edition: WLC
  text: וַ/יִּשְׁמַ֣ע שְׁמוּאֵ֔ל אֵ֖ת כָּל דִּבְרֵ֣י הָ/עָ֑ם וַֽ/יְדַבְּרֵ֖/ם בְּ/אָזְנֵ֥י
    יְהוָֽה־׃פ
translation:
  text: Samuel heard all the words of the people, and he spoke them in the ears of
    the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''in the ears of the LORD,'' an idiom meaning in the LORD''s hearing
      or before him.'
    reason: lexical_alternative
  - marker: b
    text: The divine name is YHWH, traditionally rendered 'the LORD'; alternatively,
      'Yahweh.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּשְׁמַע
  chosen: heard
  alternatives:
  - listened to
  lexicon: HALOT
  rationale: The verb שׁמע in the wayyiqtol narrative form here straightforwardly
    denotes Samuel's hearing what the people said. 'Heard' is the most natural English
    narrative equivalent; 'listened to' is possible but slightly more interpretive.
- source_word: כָּל דִּבְרֵי הָעָם
  chosen: all the words of the people
  alternatives:
  - everything the people said
  - all the statements of the people
  lexicon: HALOT
  rationale: דִּבְרֵי is literally 'words' and כָּל marks totality. Retaining 'all
    the words' preserves the formal texture while remaining clear. A more dynamic
    rendering like 'everything the people said' is possible but less transparent to
    the Hebrew wording.
- source_word: וַיְדַבְּרֵם
  chosen: he spoke them
  alternatives:
  - he repeated them
  - he reported them
  lexicon: HALOT
  rationale: The verb דבר with the 3mp suffix refers back to the people's words. 'He
    spoke them' is slightly formal but accurately reflects the Hebrew construction.
    'Reported them' is smoother English and captures the sense, but it adds an interpretive
    nuance not explicit in the verb itself.
- source_word: בְּאָזְנֵי
  chosen: in the ears of
  alternatives:
  - before
  - to
  lexicon: HALOT
  rationale: This idiom literally means 'in the ears of' and commonly conveys speaking
    in someone's hearing or presence. Retaining the idiom preserves the Hebrew imagery.
    Simpler renderings like 'before' or 'to' are acceptable but less transparent to
    the source.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name יְהוָה
    is 'the LORD,' following longstanding reverential convention and the stated translation
    policy.
- source_word: שְׁמוּאֵל
  chosen: Samuel
  rationale: Personal names are transliterated by standard English convention.
