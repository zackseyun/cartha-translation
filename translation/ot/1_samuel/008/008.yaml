theological_decisions:
- issue: Nature of Israel's rejection of Samuel in relation to their rejection of
    the LORD
  chosen_reading: The verse presents Israel's request as part of a continuing pattern
    of covenant unfaithfulness, without adding interpretive language beyond the text.
  alternative_readings:
  - A stronger paraphrase such as 'rebelling against you as they rebelled against
    me'
  rationale: The Hebrew states that they have forsaken the LORD and served other gods,
    and that in the same way they are acting toward Samuel. The translation preserves
    the analogy without importing additional doctrinal or psychological explanation.
  doctrine_reference: Translation philosophy §1, §3
