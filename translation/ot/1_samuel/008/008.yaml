id: 1SA.8.8
reference: 1 Samuel 8:8
source:
  edition: WLC
  text: כְּ/כָֽל הַ/מַּעֲשִׂ֣ים אֲשֶׁר עָשׂ֗וּ מִ/יּוֹם֩ הַעֲלֹתִ֨/י אֹתָ֤/ם מִ/מִּצְרַ֨יִם֙
    וְ/עַד הַ/יּ֣וֹם הַ/זֶּ֔ה וַ/יַּ֣עַזְבֻ֔/נִי וַ/יַּעַבְד֖וּ אֱלֹהִ֣ים אֲחֵרִ֑ים
    כֵּ֛ן הֵ֥מָּה עֹשִׂ֖ים גַּם לָֽ/ךְ־־־־׃
translation:
  text: Just as all the deeds that they have done from the day I brought them up out
    of Egypt to this day—forsaking me and serving other gods—so they are also doing
    to you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'until this day.'
    reason: lexical_alternative
  - marker: b
    text: '''Serving other gods'' can also be expressed ''worshiping other gods'';
      the Hebrew verb is literally ''serve.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּכָל
  chosen: Just as all
  alternatives:
  - According to all
  - Like all
  lexicon: HALOT
  rationale: Introduces comparison with the people's past behavior. 'Just as all'
    captures the comparative force of כ plus כָּל in natural English.
- source_word: הַמַּעֲשִׂים
  chosen: the deeds
  alternatives:
  - the actions
  - the things
  lexicon: HALOT
  rationale: מַעֲשִׂים refers to acts/deeds. 'Deeds' preserves moral weight better
    than the flatter 'things' or 'actions'.
- source_word: אֲשֶׁר עָשׂוּ
  chosen: that they have done
  alternatives:
  - which they did
  - that they did
  lexicon: HALOT
  rationale: English present perfect fits the sense of actions extending from the
    past into the present comparison.
- source_word: מִיּוֹם הַעֲלֹתִי אֹתָם מִמִּצְרַיִם
  chosen: from the day I brought them up out of Egypt
  alternatives:
  - since the day I brought them up from Egypt
  - from the day I led them up out of Egypt
  lexicon: HALOT
  rationale: עלה in the Hiphil commonly describes bringing Israel up from Egypt. 'Brought
    them up out of Egypt' is idiomatic and preserves the exodus formula.
- source_word: וְעַד הַיּוֹם הַזֶּה
  chosen: to this day
  alternatives:
  - until this day
  - and up to this day
  lexicon: HALOT
  rationale: Idiomatic English equivalent preserving the temporal span.
- source_word: וַיַּעַזְבֻנִי
  chosen: forsaking me
  alternatives:
  - and they forsook me
  - abandoning me
  lexicon: HALOT
  rationale: Rendered as a participial phrase within dashes to explain the content
    of the deeds. 'Forsaking' preserves covenantal disloyalty without over-paraphrase.
- source_word: וַיַּעַבְדוּ אֱלֹהִים אֲחֵרִים
  chosen: and serving other gods
  alternatives:
  - and they served other gods
  - worshiping other gods
  lexicon: HALOT
  rationale: עבד with gods means serving/worshiping. 'Serving other gods' stays closer
    to the Hebrew while still conveying religious allegiance.
- source_word: כֵּן
  chosen: so
  alternatives:
  - thus
  - in the same way
  lexicon: HALOT
  rationale: Marks the apodosis of the comparison. 'So' is concise and natural.
- source_word: הֵמָּה עֹשִׂים גַּם לָךְ
  chosen: they are also doing to you
  alternatives:
  - they are doing the same also to you
  - they are likewise doing to you
  lexicon: HALOT
  rationale: The Hebrew emphasizes that Samuel is receiving treatment analogous to
    the LORD's. 'Also' preserves גַּם; 'doing to you' is intentionally open-ended,
    matching the Hebrew ellipsis.
