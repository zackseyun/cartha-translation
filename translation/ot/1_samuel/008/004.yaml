id: 1SA.8.4
reference: 1 Samuel 8:4
source:
  edition: WLC
  text: וַ/יִּֽתְקַבְּצ֔וּ כֹּ֖ל זִקְנֵ֣י יִשְׂרָאֵ֑ל וַ/יָּבֹ֥אוּ אֶל שְׁמוּאֵ֖ל
    הָ/רָמָֽתָ/ה־׃
translation:
  text: Then all the elders of Israel gathered together and came to Samuel at Ramah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'to Ramah'; the English 'at Ramah' expresses the destination as Samuel's
      location in natural English.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתְקַבְּצוּ
  chosen: gathered together
  alternatives:
  - assembled
  - gathered
  lexicon: HALOT
  rationale: The hitpael form of קבץ conveys reflexive/collective gathering. 'Gathered
    together' preserves the sense of coming together as a group and fits the narrative
    sequence naturally in English.
- source_word: כֹּל
  chosen: all
  alternatives:
  - the whole of
  lexicon: HALOT
  rationale: '''All'' straightforwardly renders the distributive force here, modifying
    ''the elders of Israel'' as a complete representative group.'
- source_word: זִקְנֵי יִשְׂרָאֵל
  chosen: the elders of Israel
  alternatives:
  - Israel's elders
  lexicon: HALOT
  rationale: This is the standard political/social designation for Israel's senior
    leaders. 'The elders of Israel' is clear, idiomatic, and preserves the formal
    representative sense.
- source_word: וַיָּבֹאוּ אֶל
  chosen: came to
  alternatives:
  - went to
  - approached
  lexicon: HALOT
  rationale: With בוא plus אֶל, 'came to' is the most natural English rendering in
    narrative. 'Went to' is possible, but 'came to' better matches the Hebrew wayyiqtol
    storyline from the narrator's perspective.
- source_word: שְׁמוּאֵל
  chosen: Samuel
  rationale: Personal names are transliterated by standard English convention per
    project philosophy.
- source_word: הָרָמָתָה
  chosen: at Ramah
  alternatives:
  - to Ramah
  lexicon: HALOT
  rationale: 'The directional he on the place name can indicate motion toward Ramah,
    but in English the phrase naturally identifies Samuel''s location: they came to
    Samuel ''at Ramah.'' This avoids awkwardness while preserving the destination
    sense.'
