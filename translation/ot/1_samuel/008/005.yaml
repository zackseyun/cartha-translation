id: 1SA.8.5
reference: 1 Samuel 8:5
source:
  edition: WLC
  text: וַ/יֹּאמְר֣וּ אֵלָ֗י/ו הִנֵּה֙ אַתָּ֣ה זָקַ֔נְתָּ וּ/בָנֶ֕י/ךָ לֹ֥א הָלְכ֖וּ
    בִּ/דְרָכֶ֑י/ךָ עַתָּ֗ה שִֽׂימָ/ה לָּ֥/נוּ מֶ֛לֶךְ לְ/שָׁפְטֵ֖/נוּ כְּ/כָל הַ/גּוֹיִֽם־־׃
translation:
  text: They said to him, “Look, you have grown old, and your sons have not walked
    in your ways. Now appoint for us a king to judge us like all the nations.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “to govern us” or “to rule us”; the Hebrew verb 'judge' can include broader
      governing authority in this context.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: Uses a natural modern English discourse marker that still preserves the
    demonstrative force of the Hebrew, avoiding archaic 'Behold' while retaining the
    confrontational emphasis.
- source_word: זָקַנְתָּ
  chosen: you have grown old
  alternatives:
  - you are old
  - you have become old
  lexicon: HALOT
  rationale: The perfect verb marks a resulting state; 'have grown old' captures both
    the process and present condition more naturally than the flatter 'are old'.
- source_word: הָלְכוּ בִּדְרָכֶיךָ
  chosen: have not walked in your ways
  alternatives:
  - have not followed your ways
  - have not lived according to your ways
  lexicon: HALOT
  rationale: Preserves the Hebrew idiom 'walk in ... ways,' a common biblical ethical
    metaphor, while remaining clear in English.
- source_word: שִׂימָה לָּנוּ
  chosen: appoint for us
  alternatives:
  - set for us
  - give us
  lexicon: HALOT
  rationale: In context of establishing political leadership, 'appoint' best conveys
    the request to install or designate a ruler; 'set' is too wooden and 'give' too
    broad.
- source_word: מֶלֶךְ
  chosen: a king
  lexicon: HALOT
  rationale: Straightforward rendering of the common noun for monarch; indefinite
    article fits the Hebrew anarthrous form in English idiom.
- source_word: לְשָׁפְטֵנוּ
  chosen: to judge us
  alternatives:
  - to govern us
  - to rule us
  lexicon: HALOT
  rationale: The infinitive of שׁפט fundamentally means 'to judge,' and in Israel's
    political context includes governing functions. The main text keeps the more literal
    term; broader political senses are preserved as alternatives.
- source_word: כְּכָל הַגּוֹיִם
  chosen: like all the nations
  alternatives:
  - as all the nations have
  - like all the Gentiles
  lexicon: HALOT
  rationale: '''Nations'' is the standard contextual rendering of גוים here, referring
    to surrounding peoples with monarchies. ''Gentiles'' would import later Jewish/Christian
    usage not required by this context.'
