theological_decisions:
- issue: Political request for monarchy framed by comparison with surrounding peoples
  chosen_reading: like all the nations
  alternative_readings:
  - like all the Gentiles
  rationale: The verse critiques Israel's desire to conform politically to other peoples.
    'Nations' preserves the covenantal contrast without importing later NT-era ethnic
    terminology associated with 'Gentiles.'
  doctrine_reference: Translation philosophy §1, §6
