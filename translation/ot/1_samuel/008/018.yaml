id: 1SA.8.18
reference: 1 Samuel 8:18
source:
  edition: WLC
  text: וּ/זְעַקְתֶּם֙ בַּ/יּ֣וֹם הַ/ה֔וּא מִ/לִּ/פְנֵ֣י מַלְכְּ/כֶ֔ם אֲשֶׁ֥ר בְּחַרְתֶּ֖ם לָ/כֶ֑ם וְ/לֹֽא יַעֲנֶ֧ה יְהוָ֛ה אֶתְ/כֶ֖ם בַּ/יּ֥וֹם הַ/הֽוּא־׃
translation:
  text: And in that day you will cry out because of your king, whom you have chosen for yourselves, but Yahweh will not answer you in that day.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וּזְעַקְתֶּם
  chosen: you will cry out
  alternatives:
  - you will cry
  - you will cry for help
  lexicon: HALOT
  rationale: The verb זעק commonly denotes a cry of distress or appeal for help. 'Cry out' preserves the intensity without over-specifying the object of the plea.
- source_word: בַּיּוֹם הַהוּא
  chosen: in that day
  alternatives:
  - on that day
  lexicon: HALOT
  rationale: A standard temporal expression. 'In that day' is idiomatic and preserves the prophetic/solemn tone of the Hebrew repetition.
- source_word: מִלִּפְנֵי
  chosen: because of
  alternatives:
  - from before
  - on account of
  - because of the presence of
  lexicon: HALOT
  rationale: 'Literally ''from before/from the presence of,'' but in this context it expresses cause: their cry arises because of the oppressive consequences associated with their king. ''Because of'' communicates the sense naturally in English.'
- source_word: מַלְכְּכֶם
  chosen: your king
  lexicon: HALOT
  rationale: Direct and formal rendering of the possessive noun phrase.
- source_word: אֲשֶׁר בְּחַרְתֶּם לָכֶם
  chosen: whom you have chosen for yourselves
  alternatives:
  - whom you chose for yourselves
  - that you chose for yourselves
  lexicon: HALOT
  rationale: The relative clause emphasizes Israel's own responsibility in selecting the king. 'Have chosen' reflects the completed action with present consequence; 'for yourselves' preserves לָכֶם and the reflexive nuance.
- source_word: וְלֹא יַעֲנֶה
  chosen: but ... will not answer
  alternatives:
  - and ... will not answer
  lexicon: HALOT
  rationale: The conjunction can be rendered simply 'and,' but in English 'but' better conveys the adversative force created by the contrast between Israel's crying out and the LORD's refusal to respond.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֶתְכֶם
  chosen: you
  alternatives:
  - to you
  lexicon: HALOT
  rationale: With ענה in this sense, English idiom prefers 'answer you' rather than the more wooden 'answer to you.'
