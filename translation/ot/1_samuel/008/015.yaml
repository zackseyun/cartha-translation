id: 1SA.8.15
reference: 1 Samuel 8:15
source:
  edition: WLC
  text: וְ/זַרְעֵי/כֶ֥ם וְ/כַרְמֵי/כֶ֖ם יַעְשֹׂ֑ר וְ/נָתַ֥ן לְ/סָרִיסָ֖י/ו וְ/לַ/עֲבָדָֽי/ו׃
translation:
  text: He will take a tenth of your seed and your vineyards and give it to his officials
    and his servants.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to his eunuchs'; the Hebrew סָרִיסָיו can refer either to eunuchs or,
      more broadly, to royal court officials.
    reason: lexical_alternative
lexical_decisions:
- source_word: זַרְעֵיכֶם
  chosen: your seed
  alternatives:
  - your crops
  - your produce
  - your grain
  lexicon: HALOT
  rationale: זֶרַע literally means 'seed' and can extend to sown produce. Here, paired
    with 'your vineyards' and governed by 'take a tenth,' it refers to agricultural
    yield. 'Your seed' preserves the Hebrew wording while remaining understandable
    in context.
- source_word: כַרְמֵיכֶם
  chosen: your vineyards
  alternatives:
  - your vineyards' produce
  - your vines
  lexicon: HALOT
  rationale: כֶּרֶם normally denotes a vineyard. The king is taxing agricultural assets/produce;
    'your vineyards' is the most direct rendering and lets the tithe language imply
    produce taken from them.
- source_word: יַעְשֹׂר
  chosen: will take a tenth
  alternatives:
  - will tithe
  - will exact a tenth
  lexicon: HALOT
  rationale: The verb עשר in the Hiphil means to take or give a tenth. 'Will take
    a tenth' makes explicit that the king is imposing exaction, which fits the warning
    context better than the more religiously colored English verb 'tithe'.
- source_word: וְנָתַן
  chosen: and give
  alternatives:
  - and he will give
  lexicon: HALOT
  rationale: Simple sequential waw + qatal after the imperfect continues the future
    description. English smooths this naturally as 'and give' after 'He will take
    a tenth...'.
- source_word: לְסָרִיסָיו
  chosen: to his officials
  alternatives:
  - to his eunuchs
  - to his court officials
  lexicon: HALOT
  rationale: סָרִיס can mean 'eunuch' or more broadly a royal court officer/official.
    In this administrative context, 'officials' best conveys function without over-specifying
    physical status. The alternative 'eunuchs' is worth preserving in a footnote because
    the Hebrew term can carry that sense.
- source_word: וְלַעֲבָדָיו
  chosen: and his servants
  alternatives:
  - and his slaves
  lexicon: HALOT
  rationale: עֶבֶד can denote servant or slave depending on context. Here it refers
    broadly to the king's personnel. Because the bonded status is not the main emphasis
    in this verse, 'servants' is the better optimal-equivalence rendering, while 'slaves'
    remains a lexical alternative.
