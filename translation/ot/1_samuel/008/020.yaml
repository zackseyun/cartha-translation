id: 1SA.8.20
reference: 1 Samuel 8:20
source:
  edition: WLC
  text: וְ/הָיִ֥ינוּ גַם אֲנַ֖חְנוּ כְּ/כָל הַ/גּוֹיִ֑ם וּ/שְׁפָטָ֤/נוּ מַלְכֵּ֨/נוּ֙
    וְ/יָצָ֣א לְ/פָנֵ֔י/נוּ וְ/נִלְחַ֖ם אֶת מִלְחֲמֹתֵֽ/נוּ־־־׃
translation:
  text: so that we too may be like all the nations, and our king may judge us and
    go out before us and fight our battles.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and we will be like all the nations'; the Hebrew form can be rendered
      more literally as a future sequence, though here it likely expresses the people's
      purpose in asking for a king.
    reason: lexical_alternative
  - marker: b
    text: '''Judge us'' can also carry the broader sense ''govern us'' or ''rule us.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיִינוּ
  chosen: so that we too may be
  alternatives:
  - and we will be
  - that we may be
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in this context continues the people's
    purpose statement after the preceding request for a king. English idiom is best
    expressed as a purpose/result clause, 'so that ... may be,' rather than a simple
    future.
- source_word: גַם אֲנַחְנוּ
  chosen: we too
  alternatives:
  - also we
  - even we
  lexicon: HALOT
  rationale: 'The combination adds emphasis to the first person plural: Israel wants
    inclusion among the other peoples. ''We too'' is natural English and preserves
    the emphatic force.'
- source_word: כְּכָל הַגּוֹיִם
  chosen: like all the nations
  alternatives:
  - like all the Gentiles
  - like every nation
  lexicon: HALOT
  rationale: גּוֹיִם here refers to surrounding peoples/nations, not specifically
    'Gentiles' in a later technical sense. 'Like all the nations' preserves the covenantally
    charged irony of Israel wanting to resemble the other peoples.
- source_word: וּשְׁפָטָנוּ
  chosen: may judge us
  alternatives:
  - shall judge us
  - govern us
  - rule us
  lexicon: HALOT
  rationale: שׁפט can mean judge, govern, or administer justice. Here the king's role
    parallels that of prior judges while also implying governance. 'Judge us' keeps
    the lexical link to the book's leadership theme and avoids over-paraphrase; the
    broader governing sense is implicit.
- source_word: מַלְכֵּנוּ
  chosen: our king
  lexicon: HALOT
  rationale: Straightforward possessive noun; retained explicitly to show the people's
    desired political structure.
- source_word: וְיָצָא לְפָנֵינוּ
  chosen: go out before us
  alternatives:
  - lead us out
  - march out before us
  lexicon: HALOT
  rationale: The idiom literally means to go out before someone, often in military
    leadership. 'Go out before us' preserves the Hebrew image while remaining understandable;
    more interpretive options are possible but less transparent.
- source_word: וְנִלְחַם אֶת מִלְחֲמֹתֵינוּ
  chosen: fight our battles
  alternatives:
  - fight our wars
  - wage our battles
  lexicon: HALOT
  rationale: The cognate construction literally reads 'fight our battles/wars.' 'Fight
    our battles' is idiomatic English and fits the immediate military context without
    sounding overly formal.
