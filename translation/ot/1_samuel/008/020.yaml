theological_decisions:
- issue: Rendering גּוֹיִם in Israel's request for monarchy
  chosen_reading: nations
  alternative_readings:
  - Gentiles
  rationale: The verse contrasts Israel with the surrounding peoples politically and
    culturally. 'Nations' best reflects the Hebrew in context and avoids importing
    later Jewish/Christian technical usage of 'Gentiles.'
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; preserve theological tension rather than resolve it unnecessarily.'
