id: 1SA.8.13
reference: 1 Samuel 8:13
source:
  edition: WLC
  text: וְ/אֶת בְּנוֹתֵי/כֶ֖ם יִקָּ֑ח לְ/רַקָּח֥וֹת וּ/לְ/טַבָּח֖וֹת וּ/לְ/אֹפֽוֹת־׃
translation:
  text: He will take your daughters to be perfumers, cooks, and bakers.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'ointment-makers' for 'perfumers.' The Hebrew term can refer broadly
      to those who prepare aromatic mixtures, including perfumes or ointments.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאֶת
  chosen: '[direct object marker, not translated independently]'
  lexicon: HALOT
  rationale: Marks 'your daughters' as the direct object of 'he will take.' English
    does not normally represent the marker with a separate word.
- source_word: בְּנוֹתֵיכֶם
  chosen: your daughters
  alternatives:
  - your young women
  lexicon: HALOT
  rationale: The construct plural of 'daughter' with 2mp suffix most naturally means
    'your daughters.' 'Young women' is possible by implication, but the familial sense
    is primary in this warning about royal conscription.
- source_word: יִקָּח
  chosen: he will take
  alternatives:
  - he takes
  lexicon: HALOT
  rationale: Qal imperfect 3ms here has future force in Samuel's warning about what
    the king will do. 'Take' preserves the coercive sense of seizure/conscription
    better than softer options like 'appoint' or 'use.'
- source_word: לְרַקָּחוֹת
  chosen: to be perfumers
  alternatives:
  - to be ointment-makers
  - to be mixers of perfumes
  lexicon: HALOT
  rationale: The noun refers to women preparing aromatic compounds, perfumes, or ointments.
    'Perfumers' is concise, natural English and fits the likely court-service context.
- source_word: וּלְטַבָּחוֹת
  chosen: cooks
  alternatives:
  - female cooks
  lexicon: HALOT
  rationale: The feminine plural noun denotes women engaged in food preparation. 'Cooks'
    is idiomatic modern English; the feminine sense is already conveyed by the object
    'your daughters.'
- source_word: וּלְאֹפוֹת
  chosen: bakers
  alternatives:
  - female bakers
  - bread-makers
  lexicon: HALOT
  rationale: From the verb 'to bake,' used substantivally for women who bake. 'Bakers'
    is the most natural occupational rendering in English.
