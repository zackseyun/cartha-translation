theological_decisions:
- issue: Sense of Israel's response in וַיִּנָּהוּ ... אַחֲרֵי יְהוָה
  chosen_reading: A lamenting/penitential turning toward the LORD is expressed, without
    making explicit a full repentance formula not stated in this verse.
  alternative_readings:
  - Israel longed for the LORD
  - Israel mourned because of separation from the LORD
  rationale: The Hebrew supports grief directed in relation to the LORD, but the verse
    alone does not require a stronger doctrinal paraphrase such as explicit repentance
    or covenant renewal. The translation preserves the tension and notes the alternative
    nuance.
  doctrine_reference: Preserve theological tension rather than resolve it.
