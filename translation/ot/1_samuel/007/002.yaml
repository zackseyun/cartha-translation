id: 1SA.7.2
reference: 1 Samuel 7:2
source:
  edition: WLC
  text: וַ/יְהִ֗י מִ/יּ֞וֹם שֶׁ֤בֶת הָֽ/אָרוֹן֙ בְּ/קִרְיַ֣ת יְעָרִ֔ים וַ/יִּרְבּוּ֙
    הַ/יָּמִ֔ים וַ/יִּֽהְי֖וּ עֶשְׂרִ֣ים שָׁנָ֑ה וַ/יִּנָּה֛וּ כָּל בֵּ֥ית יִשְׂרָאֵ֖ל
    אַחֲרֵ֥י יְהוָֽה־׃ס
translation:
  text: From the day the ark remained at Kiriath-jearim, the days became many—they
    were twenty years—and all the house of Israel lamented after the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'many days passed.' The Hebrew is literally 'the days became many.'
    reason: lexical_alternative
  - marker: b
    text: Or 'longed for the LORD' or 'mourned toward the LORD.' The Hebrew reads
      'lamented after the LORD,' an idiom that may express grief and turning toward
      him.
    reason: alternative_reading
lexical_decisions:
- source_word: שֶׁבֶת
  chosen: remained
  alternatives:
  - dwelt
  - sat
  - stayed
  lexicon: HALOT
  rationale: The infinitive construct of ישׁב with the ark as subject denotes continued
    residence/location. 'Remained' is idiomatic in English for an object kept in a
    place, avoiding the overly literal 'sat' and the less natural 'dwelt' for the
    ark.
- source_word: הָאָרוֹן
  chosen: the ark
  alternatives:
  - the ark of God
  - the chest
  lexicon: HALOT
  rationale: The Hebrew here has simply 'the ark' without an added genitive. 'Ark'
    is the established and accurate rendering in this narrative context.
- source_word: בְּקִרְיַת יְעָרִים
  chosen: at Kiriath-jearim
  alternatives:
  - in Kiriath-jearim
  lexicon: HALOT
  rationale: The place name is transliterated per policy. 'At' fits English idiom
    for location with a town and avoids over-precision where the preposition simply
    marks location.
- source_word: וַיִּרְבּוּ הַיָּמִים
  chosen: the days became many
  alternatives:
  - many days passed
  - the days increased
  lexicon: HALOT
  rationale: This clause idiomatically marks the passage of time. 'The days became
    many' preserves the Hebrew imagery more transparently than the smoother 'many
    days passed,' while still being understandable.
- source_word: וַיִּהְיוּ עֶשְׂרִים שָׁנָה
  chosen: they were twenty years
  alternatives:
  - it was twenty years
  - for twenty years
  lexicon: HALOT
  rationale: The plural verb naturally resumes 'the days.' The clause specifies the
    duration reached. 'They were twenty years' keeps the Hebrew structure; the dash
    in the English text helps readability.
- source_word: וַיִּנָּהוּ
  chosen: lamented
  alternatives:
  - mourned
  - wailed
  - longed
  lexicon: HALOT
  rationale: The verb נהה commonly conveys lamentation or mourning. In this context
    of Israel turning in grief toward the LORD, 'lamented' best captures the audible,
    penitential sense without overinterpreting it as mere desire.
- source_word: כָּל בֵּית יִשְׂרָאֵל
  chosen: all the house of Israel
  alternatives:
  - all Israel
  - the whole house of Israel
  lexicon: HALOT
  rationale: This preserves the covenantal-national expression 'house of Israel' rather
    than flattening it to 'all Israel.'
- source_word: אַחֲרֵי יְהוָה
  chosen: after the LORD
  alternatives:
  - for the LORD
  - toward the LORD
  lexicon: HALOT
  rationale: The preposition literally means 'after.' In this idiom it can suggest
    turning toward or longing for the LORD. The main text preserves the Hebrew wording,
    while a footnote records the interpretive alternative.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD.'
