id: 1SA.7.17
reference: 1 Samuel 7:17
source:
  edition: WLC
  text: וּ/תְשֻׁבָת֤/וֹ הָ/רָמָ֨תָ/ה֙ כִּֽי שָׁ֣ם בֵּית֔/וֹ וְ/שָׁ֖ם שָׁפָ֣ט אֶת יִשְׂרָאֵ֑ל וַ/יִּֽבֶן שָׁ֥ם מִזְבֵּ֖חַ לַֽ/יהוָֽה־־־׃פ
translation:
  text: Then he would return to Ramah, for his house was there, and there he judged Israel. He built there an altar to Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'And his return was to Ramah.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּתְשֻׁבָתוֹ
  chosen: Then he would return
  alternatives:
  - And his return was
  - And his circuit ended with a return
  lexicon: HALOT
  rationale: The noun תְּשׁוּבָה with 3ms suffix literally means 'his return.' In context, following Samuel's regular judging circuit in the previous verse, idiomatic English is better served by verbalizing it as 'he would return.' 'Then' captures the narrative continuation of waw without over-literal awkwardness.
- source_word: הָרָמָתָה
  chosen: to Ramah
  alternatives:
  - Ramahward
  - to the Ramah
  lexicon: HALOT
  rationale: Directional he on the place name indicates motion toward Ramah. Standard English expresses this as 'to Ramah.' The name is transliterated, per translation philosophy.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - since
  lexicon: HALOT
  rationale: 'Introduces the reason Samuel returned to Ramah: his house was there. ''For'' is concise and natural in narrative English.'
- source_word: בֵּיתוֹ
  chosen: his house
  alternatives:
  - his home
  lexicon: HALOT
  rationale: בַּיִת can mean house or household/home. Here the locational sense is primary. 'House' preserves the concrete wording of the Hebrew while remaining natural.
- source_word: וְשָׁם
  chosen: and there
  alternatives:
  - there also
  lexicon: HALOT
  rationale: Retains the repeated adverb שָׁם, which structures the verse around Ramah as Samuel's base of activity.
- source_word: שָׁפַט אֶת־יִשְׂרָאֵל
  chosen: he judged Israel
  alternatives:
  - he governed Israel
  - he administered justice for Israel
  lexicon: HALOT
  rationale: שׁפט in Samuel commonly refers to Samuel's role as judge over Israel, broader than courtroom activity but well represented by the established and accurate phrase 'judged Israel.'
- source_word: וַיִּבֶן
  chosen: He also built
  alternatives:
  - and he built
  - then he built
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'He also built' reflects the additive force in context after mentioning his judging activity there.
- source_word: מִזְבֵּחַ
  chosen: an altar
  lexicon: HALOT
  rationale: Standard rendering for מזבח; no contextual pressure suggests a more specific gloss.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - for the LORD
  - to Yahweh
  lexicon: HALOT
  rationale: The preposition ל marks dedication to YHWH. Per doctrine guidelines, יהוה is rendered 'the LORD' rather than transliterated.
