theological_decisions:
- issue: Meaning of the water-pouring rite
  chosen_reading: Retain the action literally without interpreting its symbolism in the main text.
  alternative_readings:
  - a sign of repentance
  - a libation-like act
  - a symbol of self-emptying or lament
  rationale: The text reports the ritual act but does not explain its meaning explicitly. To preserve theological tension and avoid importing a specific interpretation, the translation leaves the action as stated and reserves interpretation for notes or commentary rather than the main text.
  doctrine_reference: Translation philosophy §3
- issue: Rendering of the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: This follows the project's stated default for the Tetragrammaton.
  doctrine_reference: 'Contested terms: יְהוָה YHWH'
