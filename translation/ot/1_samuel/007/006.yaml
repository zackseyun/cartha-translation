id: 1SA.7.6
reference: 1 Samuel 7:6
source:
  edition: WLC
  text: וַ/יִּקָּבְצ֣וּ הַ֠/מִּצְפָּתָ/ה וַ/יִּֽשְׁאֲבוּ מַ֜יִם וַֽ/יִּשְׁפְּכ֣וּ לִ/פְנֵ֣י יְהוָ֗ה וַ/יָּצ֨וּמוּ֙ בַּ/יּ֣וֹם הַ/ה֔וּא וַ/יֹּ֣אמְרוּ שָׁ֔ם חָטָ֖אנוּ לַ/יהוָ֑ה וַ/יִּשְׁפֹּ֧ט שְׁמוּאֵ֛ל אֶת בְּנֵ֥י יִשְׂרָאֵ֖ל בַּ/מִּצְפָּֽה־׀־׃
translation:
  text: So they gathered at Mizpah, drew water, and poured it out before Yahweh. They fasted on that day and said there, “We have sinned against Yahweh.” And Samuel judged the sons of Israel at Mizpah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “to Mizpah” at the first mention; the Hebrew form includes a directional ending.
    reason: lexical_alternative
  - marker: b
    text: The pouring out of water before the LORD is a ritual act of repentance or lament, though the text does not explain its symbolism explicitly.
    reason: cultural_note
  - marker: c
    text: Hebrew “the sons of Israel.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקָּבְצוּ
  chosen: they gathered
  alternatives:
  - they assembled
  - they were gathered together
  lexicon: HALOT
  rationale: 'The Niphal wayyiqtol of קבץ here is intransitive/reflexive in sense: the people came together. ''Gathered'' is natural English and preserves the event without over-specifying agency.'
- source_word: הַמִּצְפָּתָה / בַּמִּצְפָּה
  chosen: at Mizpah
  alternatives:
  - to Mizpah
  - in Mizpah
  lexicon: HALOT
  rationale: The directional ending in הַמִּצְפָּתָה literally indicates motion toward Mizpah ('to Mizpah'), while the closing phrase has בַּמִּצְפָּה ('at/in Mizpah'). Rendering the first as 'at Mizpah' smooths the English after 'gathered' while retaining the location accurately; the final clause confirms the setting.
- source_word: וַיִּשְׁאֲבוּ מַיִם
  chosen: drew water
  alternatives:
  - fetched water
  lexicon: HALOT
  rationale: שׁאב commonly means draw water. This is the most direct and idiomatic rendering.
- source_word: וַיִּשְׁפְּכוּ לִפְנֵי יְהוָה
  chosen: poured it out before the LORD
  alternatives:
  - poured it out in the presence of the LORD
  - poured it out before Yahweh
  lexicon: HALOT
  rationale: שׁפך means pour out. The object 'it' is supplied from 'water' in English. לִפְנֵי is well rendered 'before/in the presence of.' Per doctrine, יְהוָה is rendered 'the LORD.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: 'Per doctrine, the Tetragrammaton יְהוָה is rendered ''Yahweh'' — the transliteration of the divine name — rather than the traditional ''the LORD'' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.'
- source_word: וַיָּצוּמוּ
  chosen: They fasted
  alternatives:
  - they observed a fast
  lexicon: HALOT
  rationale: צום straightforwardly denotes fasting. Simple past is clear and natural.
- source_word: בַּיּוֹם הַהוּא
  chosen: on that day
  alternatives:
  - that day
  lexicon: HALOT
  rationale: A standard temporal expression; 'on that day' preserves the preposition and reads naturally.
- source_word: חָטָאנוּ לַיהוָה
  chosen: We have sinned against the LORD
  alternatives:
  - We sinned against the LORD
  - We have offended the LORD
  lexicon: HALOT
  rationale: חטא with ל can express sin against someone. In English, 'sinned against' is the clearest idiom. The perfect can be rendered 'have sinned' to reflect confession of completed guilt with present relevance.
- source_word: וַיִּשְׁפֹּט
  chosen: judged
  alternatives:
  - governed
  - administered justice for
  lexicon: HALOT
  rationale: שׁפט can mean judge, govern, or administer justice. In Samuel's role here, 'judged' preserves the biblical office language without narrowing it merely to courtroom activity.
- source_word: אֶת־בְּנֵי יִשְׂרָאֵל
  chosen: the people of Israel
  alternatives:
  - the sons of Israel
  - the Israelites
  lexicon: HALOT
  rationale: Literally 'the sons of Israel,' but here it refers to the covenant people collectively. 'The people of Israel' is natural modern English and avoids an unnecessarily wooden rendering while preserving referent.
