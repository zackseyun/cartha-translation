- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse directly invokes Israel's covenant God. Following the project's
    doctrine, the default rendering for יְהוָה is 'the LORD,' preserving reverential
    convention and alignment with longstanding biblical English while remaining source-aware.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
