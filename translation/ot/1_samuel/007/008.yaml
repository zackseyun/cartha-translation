id: 1SA.7.8
reference: 1 Samuel 7:8
source:
  edition: WLC
  text: וַ/יֹּאמְר֤וּ בְנֵֽי יִשְׂרָאֵל֙ אֶל שְׁמוּאֵ֔ל אַל תַּחֲרֵ֣שׁ מִמֶּ֔/נּוּ
    מִ/זְּעֹ֖ק אֶל יְהוָ֣ה אֱלֹהֵ֑י/נוּ וְ/יֹשִׁעֵ֖/נוּ מִ/יַּ֥ד פְּלִשְׁתִּֽים־־־־׃
translation:
  text: Then the sons of Israel said to Samuel, “Do not be silent for us from crying
    out to the LORD our God, that he may save us from the hand of the Philistines.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Do not cease crying out to the LORD our God for us.' The Hebrew literally
      says, 'Do not be silent for us from crying out.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the people of Israel
  lexicon: HALOT
  rationale: Formally the construct phrase is 'sons of Israel.' This preserves the
    Hebrew expression and its familial/covenantal nuance. 'Israelites' is smoother
    English but less transparent to the source wording.
- source_word: אַל תַּחֲרֵשׁ
  chosen: Do not be silent
  alternatives:
  - Do not cease
  - Do not keep silent
  lexicon: HALOT
  rationale: The verb חרשׁ here literally concerns being silent/quiet. 'Do not be
    silent' best preserves the image while remaining natural English. 'Do not cease'
    captures the implied sense in context but is less lexically direct.
- source_word: מִמֶּנּוּ
  chosen: for us
  alternatives:
  - from us
  - on our behalf
  lexicon: HALOT
  rationale: 'With חרשׁ plus מן and the following infinitive, the sense is not spatial
    ''from us'' but relational: do not hold back, for our sake, from crying out. ''For
    us'' is concise and idiomatic; ''on our behalf'' is a valid fuller alternative.'
- source_word: מִזְּעֹק
  chosen: from crying out
  alternatives:
  - from calling out
  - from pleading
  lexicon: HALOT
  rationale: The infinitive of זעק denotes a strong cry for help. 'Crying out' preserves
    both the verbal force and the prayer context.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  lexicon: HALOT
  rationale: Per doctrine guidelines, the divine name יְהוָה is rendered 'the LORD'
    rather than transliterated.
- source_word: אֱלֹהֵינוּ
  chosen: our God
  lexicon: HALOT
  rationale: 'Straightforward possessive rendering preserving the covenantal appeal:
    Israel asks Samuel to cry out to ''the LORD our God.'''
- source_word: וְיֹשִׁעֵנוּ
  chosen: that he may save us
  alternatives:
  - and save us
  - so that he will save us
  lexicon: HALOT
  rationale: 'The prefixed waw with the jussive/imperfect after the plea expresses
    purpose or result: Samuel should cry out so that the LORD may save them. ''That
    he may save us'' captures this well in English.'
- source_word: מִיַּד פְּלִשְׁתִּים
  chosen: from the hand of the Philistines
  alternatives:
  - from the power of the Philistines
  - from the Philistines
  lexicon: HALOT
  rationale: '''From the hand of'' is a common Hebrew idiom for deliverance from power/control.
    Retaining ''hand'' preserves the idiom and imagery; the more interpretive ''power''
    is possible but less transparent.'
