id: 1SA.7.16
reference: 1 Samuel 7:16
source:
  edition: WLC
  text: וְ/הָלַ֗ךְ מִ/דֵּ֤י שָׁנָה֙ בְּ/שָׁנָ֔ה וְ/סָבַב֙ בֵּֽית אֵ֔ל וְ/הַ/גִּלְגָּ֖ל
    וְ/הַ/מִּצְפָּ֑ה וְ/שָׁפַט֙ אֶת יִשְׂרָאֵ֔ל אֵ֥ת כָּל הַ/מְּקוֹמ֖וֹת הָ/אֵֽלֶּה־־־׃
translation:
  text: And he would go year by year and make the circuit of Bethel, Gilgal, and Mizpah,
    and he judged Israel in all these places.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "from year to year" or "every year."
    reason: lexical_alternative
  - marker: b
    text: Or "go around"; the Hebrew suggests making a regular circuit among these
      towns.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָלַךְ
  chosen: he would go
  alternatives:
  - he went
  - he used to go
  lexicon: HALOT
  rationale: The qatal with the following habitual time expression describes Samuel's
    customary practice, not merely a single past event. 'Would go' captures iterative
    past action in natural English.
- source_word: מִדֵּי שָׁנָה בְּשָׁנָה
  chosen: year by year
  alternatives:
  - from year to year
  - every year
  lexicon: HALOT
  rationale: This idiom denotes regular annual recurrence. 'Year by year' preserves
    the Hebrew rhythm and iterative sense while remaining idiomatic.
- source_word: וְסָבַב
  chosen: make the circuit of
  alternatives:
  - go around
  - travel around
  lexicon: HALOT
  rationale: סבב here refers to going around a set route among several locations.
    'Make the circuit of' conveys an established judicial itinerary more precisely
    than the flatter 'go around.'
- source_word: בֵּית אֵל
  chosen: Bethel
  alternatives:
  - Beth-el
  lexicon: HALOT
  rationale: Standard English transliteration of the place name.
- source_word: הַגִּלְגָּל
  chosen: Gilgal
  lexicon: HALOT
  rationale: Standard English transliteration of the place name.
- source_word: הַמִּצְפָּה
  chosen: Mizpah
  alternatives:
  - Mizpeh
  lexicon: HALOT
  rationale: Standard English transliteration of the place name; 'Mizpah' is the conventional
    English form.
- source_word: וְשָׁפַט
  chosen: he judged
  alternatives:
  - he administered justice to
  - he governed
  lexicon: HALOT
  rationale: שפט in Samuel includes judicial leadership. 'He judged' keeps the formal
    lexical link and allows the broader leadership sense to remain implicit from context.
- source_word: אֶת יִשְׂרָאֵל
  chosen: Israel
  lexicon: HALOT
  rationale: Refers to the people/nation of Israel as the object of Samuel's judging
    activity.
- source_word: אֵת כָּל הַמְּקוֹמוֹת הָאֵלֶּה
  chosen: in all these places
  alternatives:
  - at all these places
  - throughout all these places
  lexicon: HALOT
  rationale: Although marked with אֵת, the phrase functions adverbially with the judging
    activity, indicating the locations where Samuel exercised judgment. 'In all these
    places' is the most natural English rendering.
