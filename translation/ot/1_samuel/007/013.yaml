id: 1SA.7.13
reference: 1 Samuel 7:13
source:
  edition: WLC
  text: וַ/יִּכָּֽנְעוּ֙ הַ/פְּלִשְׁתִּ֔ים וְ/לֹא יָסְפ֣וּ ע֔וֹד לָ/ב֖וֹא בִּ/גְב֣וּל יִשְׂרָאֵ֑ל וַ/תְּהִ֤י יַד יְהוָה֙ בַּ/פְּלִשְׁתִּ֔ים כֹּ֖ל יְמֵ֥י שְׁמוּאֵֽל־־׃
translation:
  text: So the Philistines were subdued and did not again come into the territory of Israel. And the hand of Yahweh was against the Philistines all the days of Samuel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''the hand of the LORD was upon the Philistines.'' The phrase is an idiom for the LORD''s active power, here in opposition to them.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּכָּנְעוּ
  chosen: were subdued
  alternatives:
  - were humbled
  - were brought low
  - were subdued themselves
  lexicon: HALOT
  rationale: The Niphal of כנע here denotes being brought into subjection or humbled after defeat. 'Were subdued' fits the military-political context better than the more inward 'were humbled,' while preserving the passive/resultative sense.
- source_word: הַפְּלִשְׁתִּים
  chosen: the Philistines
  lexicon: HALOT
  rationale: Standard ethnic/national designation; transliterated conventionally in English.
- source_word: וְלֹא יָסְפוּ עוֹד
  chosen: did not again
  alternatives:
  - did not continue any longer
  - did not add any more
  lexicon: HALOT
  rationale: The idiom יסף + עוד expresses repetition or continuation no longer occurring. 'Did not again' is concise, idiomatic English in this context.
- source_word: לָבוֹא
  chosen: come
  alternatives:
  - enter
  lexicon: HALOT
  rationale: The infinitive 'to come' with the following prepositional phrase naturally yields 'come into.' 'Enter' is possible but slightly more interpretive.
- source_word: בִּגְבוּל יִשְׂרָאֵל
  chosen: into the territory of Israel
  alternatives:
  - within the border of Israel
  - into Israel's border/territory
  lexicon: HALOT
  rationale: גְּבוּל can mean border, boundary, or territory. Here the sense is not merely touching a border line but entering Israelite land; 'territory' best conveys the spatial-political sense in natural English.
- source_word: וַתְּהִי יַד יְהוָה
  chosen: the hand of the LORD was
  alternatives:
  - the LORD's hand was
  - the power of the LORD was
  lexicon: HALOT
  rationale: This is a common Hebrew idiom for active divine power or pressure. Retaining 'the hand of the LORD' preserves the biblical metaphor and avoids over-paraphrase.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: בַּפְּלִשְׁתִּים
  chosen: against the Philistines
  alternatives:
  - upon the Philistines
  - on the Philistines
  lexicon: HALOT
  rationale: With the idiom 'the hand of the LORD was on/upon,' the contextual force here is hostile or punitive. 'Against the Philistines' makes that force explicit in clear English without distorting the sense.
- source_word: כֹּל יְמֵי שְׁמוּאֵל
  chosen: all the days of Samuel
  alternatives:
  - throughout Samuel's life
  - as long as Samuel lived
  lexicon: HALOT
  rationale: A fairly literal rendering that preserves the Hebrew temporal expression. More dynamic alternatives are possible, but this wording remains readable and close to the source.
