theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Force of the idiom 'the hand of the LORD was on the Philistines'
  chosen_reading: against the Philistines
  alternative_readings:
  - upon the Philistines
  - on the Philistines
  rationale: The Hebrew idiom can be rendered more literally, but in this context of military suppression it clearly indicates hostile divine action. 'Against' communicates the sense while preserving the theological claim of divine opposition without expanding it beyond the text.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3, §6
