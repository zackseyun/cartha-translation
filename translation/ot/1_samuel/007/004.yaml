id: 1SA.7.4
reference: 1 Samuel 7:4
source:
  edition: WLC
  text: וַ/יָּסִ֨ירוּ֙ בְּנֵ֣י יִשְׂרָאֵ֔ל אֶת הַ/בְּעָלִ֖ים וְ/אֶת הָ/עַשְׁתָּרֹ֑ת וַ/יַּעַבְד֥וּ אֶת יְהוָ֖ה לְ/בַדּֽ/וֹ־־־׃פ
translation:
  text: So the sons of Israel removed the Baals and the Ashtaroths, and they served Yahweh alone.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'worshiped the LORD alone.' The Hebrew verb can denote both service and worship when God is the object.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּסִירוּ
  chosen: removed
  alternatives:
  - put away
  - took away
  lexicon: HALOT
  rationale: The verb סוּר in the Hiphil here means to remove or take away. 'Removed' is clear modern English and preserves the concrete action of getting rid of the idols.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the people of Israel
  lexicon: HALOT
  rationale: Literally 'sons of Israel.' In keeping with the gender-accurate principle, the formal expression is retained here rather than flattened to 'Israelites,' since it is a standard covenantal ethnonym and remains natural enough in English.
- source_word: הַבְּעָלִים
  chosen: the Baals
  alternatives:
  - the images of Baal
  - the Baal idols
  lexicon: HALOT
  rationale: The plural refers to multiple Baal manifestations or cult images. 'The Baals' preserves the Hebrew plural and avoids over-interpreting whether the reference is to local forms of the deity or to idols representing him.
- source_word: הָעַשְׁתָּרֹת
  chosen: the Ashtaroths
  alternatives:
  - the Ashtoreths
  - the Astartes
  lexicon: HALOT
  rationale: This is the conventional transliteration of the Hebrew plural form עַשְׁתָּרֹת. Retaining the name rather than translating it as 'goddesses' preserves the specific cultic reference.
- source_word: וַיַּעַבְדוּ
  chosen: served
  alternatives:
  - worshiped
  lexicon: HALOT
  rationale: עבד with God as object can mean serve or worship. 'Served' is chosen because it is the more direct lexical equivalent and preserves the covenantal sense of devoted allegiance, while English readers can still hear worship within it.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives: []
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: לְבַדּוֹ
  chosen: alone
  alternatives:
  - only
  - by himself
  lexicon: HALOT
  rationale: 'Here the adverb means exclusivity of devotion: they served the LORD alone. ''Alone'' is idiomatic and clearly conveys exclusive worship.'
