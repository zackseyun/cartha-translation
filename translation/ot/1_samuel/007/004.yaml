theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Whether עבד should be rendered 'served' or 'worshiped'
  chosen_reading: served the LORD alone
  alternative_readings:
  - worshiped the LORD alone
  rationale: The Hebrew verb can include worship, but 'served' better preserves the lexical form and the broader covenantal allegiance implied by the context of renouncing idols. The alternative is worth preserving because English readers may naturally hear cultic worship here.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
