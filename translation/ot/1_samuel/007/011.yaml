id: 1SA.7.11
reference: 1 Samuel 7:11
source:
  edition: WLC
  text: וַ/יֵּ֨צְא֜וּ אַנְשֵׁ֤י יִשְׂרָאֵל֙ מִן הַ/מִּצְפָּ֔ה וַֽ/יִּרְדְּפ֖וּ אֶת
    פְּלִשְׁתִּ֑ים וַ/יַּכּ֕וּ/ם עַד מִ/תַּ֖חַת לְ/בֵ֥ית כָּֽר־־־׃
translation:
  text: Then the men of Israel went out from Mizpah, pursued the Philistines, and
    struck them down as far as below Beth-car.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and defeated them as far as below Beth-car.' The Hebrew verb can denote
      striking in battle with the sense of defeat, not only physical blows.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'below Beth-car,' likely indicating a point lower in elevation than
      Beth-car.
    reason: cultural_note
lexical_decisions:
- source_word: וַיֵּצְאוּ
  chosen: went out
  alternatives:
  - came out
  - marched out
  lexicon: HALOT
  rationale: Qal wayyiqtol of יצא, the standard narrative verb for going out. 'Went
    out' is the most natural and sufficiently formal rendering in context.
- source_word: אַנְשֵׁי יִשְׂרָאֵל
  chosen: the men of Israel
  alternatives:
  - the Israelites
  - the men of Isra'el
  lexicon: HALOT
  rationale: Literally 'men of Israel.' Per gender-accurate philosophy, the masculine
    plural is preserved rather than flattened to 'Israelites,' since the text depicts
    fighting men going out to battle.
- source_word: מִן הַמִּצְפָּה
  chosen: from Mizpah
  alternatives:
  - from the Mizpah lookout
  lexicon: HALOT
  rationale: Proper place name with article in Hebrew; in English the standard transliterated
    toponym 'Mizpah' is preferred over a lexicalized rendering.
- source_word: וַיִּרְדְּפוּ
  chosen: pursued
  alternatives:
  - chased
  - went in pursuit of
  lexicon: HALOT
  rationale: רדף commonly means 'pursue' in military contexts. 'Pursued' is concise
    and idiomatic.
- source_word: פְּלִשְׁתִּים
  chosen: the Philistines
  lexicon: HALOT
  rationale: Standard English ethnonym for the people group.
- source_word: וַיַּכּוּם
  chosen: struck them down
  alternatives:
  - defeated them
  - struck them
  - killed them
  lexicon: HALOT
  rationale: נכה in battle contexts can denote striking/defeating, sometimes lethally.
    'Struck them down' preserves the force of the verb without overstating that every
    action was killing.
- source_word: עַד
  chosen: as far as
  alternatives:
  - until
  lexicon: HALOT
  rationale: With a place expression, עַד marks extent of pursuit; 'as far as' is
    the clearest English rendering.
- source_word: מִתַּחַת
  chosen: below
  alternatives:
  - under
  - beneath
  - to a point below
  lexicon: HALOT
  rationale: The prepositional expression indicates a location lower than Beth-car.
    'Below' is natural English for topographical relation.
- source_word: לְבֵית כָּר
  chosen: Beth-car
  alternatives:
  - Beth Car
  - house of pasture
  lexicon: HALOT
  rationale: This is a place name, so it is transliterated rather than translated,
    in keeping with the translation philosophy for names.
