id: 1SA.7.15
reference: 1 Samuel 7:15
source:
  edition: WLC
  text: וַ/יִּשְׁפֹּ֤ט שְׁמוּאֵל֙ אֶת יִשְׂרָאֵ֔ל כֹּ֖ל יְמֵ֥י חַיָּֽי/ו־׃
translation:
  text: And Samuel judged Israel all the days of his life.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'governed Israel' or 'led Israel as judge'; the Hebrew verb includes
      judicial and governing nuance.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁפֹּט
  chosen: judged
  alternatives:
  - led
  - governed
  lexicon: HALOT
  rationale: The verb שׁפט in the Qal can denote acting as judge, governing, or delivering
    in the period of the judges. Here, with Samuel as subject and Israel as object,
    'judged' preserves the canonical/judicial nuance and matches the historical role
    without over-paraphrasing to 'led' or 'governed'.
- source_word: שְׁמוּאֵל
  chosen: Samuel
  rationale: Standard English transliteration of the personal name; per translation
    philosophy, names are transliterated rather than translated.
- source_word: אֶת יִשְׂרָאֵל
  chosen: Israel
  rationale: Direct-object marker plus the proper name 'Israel.' Rendered simply as
    'Israel' in English since the object marker is not translated.
- source_word: כֹּל יְמֵי
  chosen: all the days of
  alternatives:
  - throughout
  lexicon: HALOT
  rationale: This construct phrase idiomatically means the entirety of a span of time.
    'All the days of' is a clear, fairly formal rendering that preserves the Hebrew
    expression better than the more compressed 'throughout'.
- source_word: חַיָּיו
  chosen: his life
  alternatives:
  - his lifetime
  lexicon: HALOT
  rationale: The plural construct with pronominal suffix is an idiom meaning 'his
    life' or 'his lifetime.' 'His life' is the most natural modern English rendering
    while preserving the sense of the full duration.
