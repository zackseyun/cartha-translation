theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project default for YHWH is 'the LORD,' following the stated doctrine
    and translation policy. This is not a theological reinterpretation of the verse
    but a required covenant-name rendering choice.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Whether to translate אֶבֶן הָעָזֶר as a name or as its meaning
  chosen_reading: Treat as the proper name 'Ebenezer' in the main text
  alternative_readings:
  - Stone of Help
  rationale: Because the phrase functions as the bestowed name of the memorial stone,
    transliteration best matches the policy to transliterate names. Its lexical meaning
    is important to the narrative wordplay with 'has helped us,' so the meaning is
    preserved in a footnote rather than replacing the name in the main text.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: Translate titles; transliterate
    names'
