id: 1SA.7.12
reference: 1 Samuel 7:12
source:
  edition: WLC
  text: וַ/יִּקַּ֨ח שְׁמוּאֵ֜ל אֶ֣בֶן אַחַ֗ת וַ/יָּ֤שֶׂם בֵּֽין הַ/מִּצְפָּה֙ וּ/בֵ֣ין
    הַ/שֵּׁ֔ן וַ/יִּקְרָ֥א אֶת שְׁמָ֖/הּ אֶ֣בֶן הָעָ֑זֶר וַ/יֹּאמַ֕ר עַד הֵ֖נָּה עֲזָרָ֥/נוּ
    יְהוָֽה־־־׃
translation:
  text: Then Samuel took one stone and set it between Mizpah and Shen, and he called
    its name Ebenezer, for he said, “Up to this point the LORD has helped us.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Ebenezer means “stone of help.”
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶבֶן אַחַת
  chosen: one stone
  alternatives:
  - a stone
  lexicon: HALOT
  rationale: Formally reflects the Hebrew numeral + noun construction while remaining
    natural English. 'One stone' preserves the deliberate singularity of the memorial
    object.
- source_word: וַיָּשֶׂם
  chosen: set
  alternatives:
  - placed
  - put
  lexicon: HALOT
  rationale: '''Set'' fits the context of erecting or positioning a memorial stone
    and is slightly more idiomatic than ''put'' while remaining close to the Hebrew.'
- source_word: בֵּין הַמִּצְפָּה וּבֵין הַשֵּׁן
  chosen: between Mizpah and Shen
  alternatives:
  - between the Mizpah and the Shen
  lexicon: HALOT
  rationale: Both place names are transliterated per translation policy. English idiom
    does not require repeating 'between' or preserving the Hebrew articles woodenly
    in the main text.
- source_word: וַיִּקְרָא אֶת שְׁמָהּ
  chosen: he called its name
  alternatives:
  - he named it
  - he called it
  lexicon: HALOT
  rationale: This preserves the Hebrew naming formula more transparently than the
    more idiomatic 'he named it,' while still reading naturally enough in English
    narrative.
- source_word: אֶבֶן הָעָזֶר
  chosen: Ebenezer
  alternatives:
  - Stone of Help
  lexicon: HALOT
  rationale: As a proper memorial name, transliteration is preferred in the main text,
    consistent with the policy to transliterate names. The meaning is important and
    therefore preserved in a footnote.
- source_word: עַד הֵנָּה
  chosen: Up to this point
  alternatives:
  - Thus far
  - Until now
  lexicon: HALOT
  rationale: '''Up to this point'' communicates the temporal sense clearly in modern
    English. ''Thus far'' is traditional but somewhat archaic for the stated target
    audience.'
- source_word: עֲזָרָנוּ
  chosen: has helped us
  alternatives:
  - helped us
  lexicon: HALOT
  rationale: The Hebrew perfect here naturally conveys completed action with present
    relevance in English; 'has helped us' captures the memorializing sense better
    than a simple past.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name in accordance
    with DOCTRINE.md.
