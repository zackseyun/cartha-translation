id: 1SA.7.9
reference: 1 Samuel 7:9
source:
  edition: WLC
  text: וַ/יִּקַּ֣ח שְׁמוּאֵ֗ל טְלֵ֤ה חָלָב֙ אֶחָ֔ד ו/יעלה עוֹלָ֛ה כָּלִ֖יל לַֽ/יהוָ֑ה וַ/יִּזְעַ֨ק שְׁמוּאֵ֤ל אֶל יְהוָה֙ בְּעַ֣ד יִשְׂרָאֵ֔ל וַֽ/יַּעֲנֵ֖/הוּ יְהוָֽה־׃
translation:
  text: So Samuel took one nursing lamb and offered it as a whole burnt offering to Yahweh. And Samuel cried out to Yahweh on behalf of Israel, and Yahweh answered him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'one suckling lamb.' The Hebrew expression refers to a lamb still feeding on milk.
    reason: lexical_alternative
lexical_decisions:
- source_word: טְלֵה חָלָב אֶחָד
  chosen: one nursing lamb
  alternatives:
  - one suckling lamb
  - one milk lamb
  - one young lamb
  lexicon: HALOT
  rationale: טְלֶה denotes a young sheep/lamb, and חָלָב literally relates to milk, yielding the sense of a milk-fed or nursing lamb. 'Nursing lamb' is natural modern English and preserves the animal's youth more clearly than the less idiomatic 'milk lamb.'
- source_word: וַיַּעֲלֵה
  chosen: offered it up
  alternatives:
  - caused to ascend
  - offered
  lexicon: HALOT
  rationale: The Hiphil of עלה is the standard sacrificial verb for offering up a sacrifice. 'Offered it up' preserves the sacrificial nuance better than a bare 'offered' while remaining readable.
- source_word: עוֹלָה
  chosen: burnt offering
  alternatives:
  - ascending offering
  lexicon: HALOT
  rationale: עוֹלָה is the established sacrificial term for a burnt offering. Although etymologically related to ascent, 'burnt offering' is the clearest idiomatic equivalent in English.
- source_word: כָּלִיל
  chosen: whole
  alternatives:
  - entire
  - complete
  lexicon: HALOT
  rationale: כָּלִיל modifies the burnt offering to indicate that it was offered in its entirety. 'Whole' is concise and idiomatic in the phrase 'whole burnt offering.'
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: Per doctrine, יְהוָה is rendered 'the LORD' rather than transliterated. 'To the LORD' fits the sacrificial context.
- source_word: וַיִּזְעַק
  chosen: cried out
  alternatives:
  - called out
  - cried
  lexicon: HALOT
  rationale: זעק conveys an urgent cry for help. 'Cried out' preserves the intensity of Samuel's appeal better than simply 'prayed' or 'called.'
- source_word: בְּעַד יִשְׂרָאֵל
  chosen: on behalf of Israel
  alternatives:
  - for Israel
  lexicon: HALOT
  rationale: בְּעַד here indicates intercession or representation. 'On behalf of Israel' makes Samuel's mediatorial action explicit without overinterpreting.
- source_word: וַיַּעֲנֵהוּ יְהוָה
  chosen: the LORD answered him
  alternatives:
  - the LORD answered Samuel
  - the LORD responded to him
  lexicon: HALOT
  rationale: The pronominal suffix explicitly marks Samuel as the one answered. 'Answered him' is formally close to the Hebrew while remaining clear from context.
