id: 1SA.7.14
reference: 1 Samuel 7:14
source:
  edition: WLC
  text: וַ/תָּשֹׁ֣בְנָה הֶ/עָרִ֡ים אֲשֶׁ֣ר לָֽקְחוּ פְלִשְׁתִּים֩ מֵ/אֵ֨ת יִשְׂרָאֵ֤ל
    לְ/יִשְׂרָאֵל֙ מֵ/עֶקְר֣וֹן וְ/עַד גַּ֔ת וְ/אֶ֨ת גְּבוּלָ֔/ן הִצִּ֥יל יִשְׂרָאֵ֖ל
    מִ/יַּ֣ד פְּלִשְׁתִּ֑ים וַ/יְהִ֣י שָׁל֔וֹם בֵּ֥ין יִשְׂרָאֵ֖ל וּ/בֵ֥ין הָ/אֱמֹרִֽי־׀־־׃
translation:
  text: And the cities that the Philistines had taken from Israel were restored to
    Israel, from Ekron to Gath; and Israel delivered their territory from the hand
    of the Philistines. And there was peace between Israel and the Amorites.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the Canaanites,' if 'Amorites' is understood here as a broader term
      for the peoples of the land.
    reason: alternative_reading
lexical_decisions:
- source_word: וַתָּשֹׁבְנָה
  chosen: were restored
  alternatives:
  - returned
  - came back
  lexicon: HALOT
  rationale: From שוב, with the cities as subject. An English passive best conveys
    that the cities came back into Israel's possession without awkwardly personifying
    the cities as acting on their own.
- source_word: הֶעָרִים
  chosen: the cities
  alternatives:
  - the towns
  lexicon: HALOT
  rationale: Standard rendering of ערים. 'Cities' fits the geopolitical context of
    Philistine-Israelite territorial control.
- source_word: לָקְחוּ
  chosen: had taken
  alternatives:
  - took
  - seized
  lexicon: HALOT
  rationale: 'Rendered as pluperfect in English to reflect prior action relative to
    the restoration: these were cities previously taken by the Philistines.'
- source_word: מֵאֵת יִשְׂרָאֵל ... לְיִשְׂרָאֵל
  chosen: from Israel ... to Israel
  alternatives:
  - from the Israelites ... to the Israelites
  lexicon: HALOT
  rationale: Keeps the territorial-national sense concise and mirrors the Hebrew repetition
    for emphasis.
- source_word: מֵעֶקְרוֹן וְעַד גַּת
  chosen: from Ekron to Gath
  alternatives:
  - from Ekron as far as Gath
  lexicon: HALOT
  rationale: A straightforward rendering of the geographic extent. The phrase marks
    the range of cities restored.
- source_word: וְאֶת גְּבוּלָן
  chosen: their territory
  alternatives:
  - their border
  - their territory/borderland
  lexicon: HALOT
  rationale: גבול can mean border, boundary, or territory. Here 'their territory'
    best fits the sense that Israel recovered not merely boundary lines but the surrounding
    domain belonging to those cities.
- source_word: הִצִּיל
  chosen: delivered
  alternatives:
  - rescued
  - snatched away
  lexicon: HALOT
  rationale: From נצל in the Hiphil, a common covenant-historical verb for deliverance
    from hostile power. 'Delivered' preserves that register without over-paraphrase.
- source_word: מִיַּד פְּלִשְׁתִּים
  chosen: from the hand of the Philistines
  alternatives:
  - out of the power of the Philistines
  lexicon: HALOT
  rationale: Retains the Hebrew idiom 'from the hand of' because it is natural enough
    in English Bible style and preserves the concrete sense of hostile control.
- source_word: וַיְהִי שָׁלוֹם
  chosen: there was peace
  alternatives:
  - peace prevailed
  - there came to be peace
  lexicon: HALOT
  rationale: Simple existential rendering of the clause. 'Peace' here denotes absence
    of hostilities and stable relations.
- source_word: הָאֱמֹרִי
  chosen: the Amorites
  alternatives:
  - the Canaanites
  lexicon: HALOT
  rationale: The Hebrew specifically reads 'the Amorite.' Although some take it as
    a broader label for Canaanite inhabitants, the translation preserves the specific
    ethnonym in the main text.
