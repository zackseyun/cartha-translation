theological_decisions:
- issue: Ethnonym הָאֱמֹרִי at the end of the verse
  chosen_reading: the Amorites
  alternative_readings:
  - the Canaanites
  rationale: No doctrinal issue is at stake, but this is an interpretive decision
    with historical implications. The Hebrew text names the Amorites specifically,
    so the main text preserves that wording. Because some interpreters understand
    'Amorite' here as a broader designation for the inhabitants of the land, that
    alternative is preserved in a footnote rather than adopted in the main text.
  doctrine_reference: Preserve theological/interpretive tension rather than resolve
    it; original-language primacy over translation tradition.
