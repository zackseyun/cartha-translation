id: 1SA.7.10
reference: 1 Samuel 7:10
source:
  edition: WLC
  text: וַ/יְהִ֤י שְׁמוּאֵל֙ מַעֲלֶ֣ה הָ/עוֹלָ֔ה וּ/פְלִשְׁתִּ֣ים נִגְּשׁ֔וּ לַ/מִּלְחָמָ֖ה
    בְּ/יִשְׂרָאֵ֑ל וַ/יַּרְעֵ֣ם יְהוָ֣ה בְּ/קוֹל גָּ֠דוֹל בַּ/יּ֨וֹם הַ/ה֤וּא עַל
    פְּלִשְׁתִּים֙ וַ/יְהֻמֵּ֔/ם וַ/יִּנָּגְפ֖וּ לִ/פְנֵ֥י יִשְׂרָאֵֽל׀־־׃
translation:
  text: And as Samuel was offering up the burnt offering, the Philistines drew near
    for battle against Israel. But the LORD thundered with a great sound on that day
    against the Philistines and threw them into confusion, and they were defeated
    before Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with a mighty thunder' or 'with a great noise.' The Hebrew literally
      says 'with a great sound.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מַעֲלֶה
  chosen: was offering up
  alternatives:
  - offered
  - was bringing up
  lexicon: HALOT
  rationale: The Hiphil participle of עלה here denotes the act of presenting the sacrifice
    on the altar. The participial form in narrative supports an ongoing sense, hence
    'was offering up' rather than simple past; 'bringing up' is too literal for sacrificial
    context.
- source_word: הָעֹלָה
  chosen: the burnt offering
  alternatives:
  - the whole burnt offering
  lexicon: HALOT
  rationale: עֹלָה is the standard term for a burnt offering. 'Whole burnt offering'
    is more explicit but less idiomatic in modern English; 'burnt offering' preserves
    the sacrificial category accurately.
- source_word: נִגְּשׁוּ
  chosen: drew near
  alternatives:
  - approached
  - came near
  lexicon: HALOT
  rationale: נגשׁ commonly means to approach or draw near. 'Drew near' fits the military
    movement and keeps the narrative force.
- source_word: לַמִּלְחָמָה
  chosen: for battle
  alternatives:
  - to battle
  - for the battle
  - to fight
  lexicon: HALOT
  rationale: The phrase נגשׁ למלחמה idiomatically means to approach for battle. 'For
    battle' is concise and natural English.
- source_word: בְּיִשְׂרָאֵל
  chosen: against Israel
  alternatives:
  - with Israel
  - at Israel
  lexicon: HALOT
  rationale: Although the preposition is ב, in this hostile military context English
    idiom requires 'against Israel' to convey the adversarial sense.
- source_word: וַיַּרְעֵם
  chosen: thundered
  alternatives:
  - caused thunder
  - roared
  lexicon: HALOT
  rationale: From רעם, the verb refers to thunder. 'Thundered' is the most direct
    and idiomatic rendering, especially with God as subject.
- source_word: בְּקוֹל גָּדוֹל
  chosen: with a great sound
  alternatives:
  - with a loud voice
  - with a mighty thunder
  - with a great noise
  lexicon: HALOT
  rationale: קוֹל literally means 'sound/voice.' In context of divine thunder, 'with
    a great sound' preserves the lexical breadth without over-specifying beyond the
    Hebrew. 'Loud voice' could misleadingly suggest speech.
- source_word: וַיְהֻמֵּם
  chosen: threw them into confusion
  alternatives:
  - routed them
  - confused them
  - threw them into panic
  lexicon: HALOT
  rationale: The verb המם often denotes causing panic, confusion, or disarray in battle.
    'Threw them into confusion' captures the causative force and leaves the following
    defeat clause to express the military outcome.
- source_word: וַיִּנָּגְפוּ
  chosen: they were defeated
  alternatives:
  - they were struck down
  - they were routed
  - they fell
  lexicon: HALOT
  rationale: נָגַף in the Niphal in battle contexts commonly means to be defeated
    or struck down before an enemy. 'Were defeated' best fits the broader military
    result without implying total slaughter.
- source_word: לִפְנֵי יִשְׂרָאֵל
  chosen: before Israel
  alternatives:
  - before the face of Israel
  - in the presence of Israel
  lexicon: HALOT
  rationale: This is the standard idiom for defeat at the hands of or in front of
    an opponent. 'Before Israel' is the natural English equivalent.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name יְהוָה
    is 'the LORD,' following established reverential convention and the stated project
    policy.
