id: 1SA.7.7
reference: 1 Samuel 7:7
source:
  edition: WLC
  text: וַ/יִּשְׁמְע֣וּ פְלִשְׁתִּ֗ים כִּֽי הִתְקַבְּצ֤וּ בְנֵֽי יִשְׂרָאֵל֙ הַ/מִּצְפָּ֔תָ/ה
    וַ/יַּעֲל֥וּ סַרְנֵֽי פְלִשְׁתִּ֖ים אֶל יִשְׂרָאֵ֑ל וַֽ/יִּשְׁמְעוּ֙ בְּנֵ֣י יִשְׂרָאֵ֔ל
    וַ/יִּֽרְא֖וּ מִ/פְּנֵ֥י פְלִשְׁתִּֽים־־־־׃
translation:
  text: When the Philistines heard that the sons of Israel had gathered at Mizpah,
    the rulers of the Philistines went up against Israel. When the sons of Israel
    heard of it, they were afraid because of the Philistines.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to Mizpah.' The Hebrew form includes a directional ending, though the
      context indicates the people were assembled there.
    reason: lexical_alternative
  - marker: b
    text: Or 'the lords of the Philistines.' The Hebrew term refers to the recognized
      Philistine rulers.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁמְעוּ
  chosen: heard
  alternatives:
  - learned
  - came to hear
  lexicon: HALOT
  rationale: Standard rendering of שׁמע in narrative for receiving news. 'Heard' is
    natural and preserves the repeated verb in the verse.
- source_word: פְלִשְׁתִּים
  chosen: Philistines
  lexicon: HALOT
  rationale: Standard transliteration of the people-group name.
- source_word: כִּי
  chosen: that
  alternatives:
  - when
  - because
  lexicon: HALOT
  rationale: 'Here it introduces the content of what the Philistines heard: that Israel
    had assembled.'
- source_word: הִתְקַבְּצוּ
  chosen: had gathered
  alternatives:
  - had assembled
  - had been gathered together
  lexicon: HALOT
  rationale: The hitpael of קבץ conveys assembling/gathering together. 'Had gathered'
    is idiomatic English in this reported-news construction.
- source_word: בְנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the children of Israel
  lexicon: HALOT
  rationale: Chosen to preserve the formal Hebrew expression בני ישראל in line with
    the project's gender-accurate policy. 'Israelites' is smoother but less formally
    transparent.
- source_word: הַמִּצְפָּתָה
  chosen: at Mizpah
  alternatives:
  - to Mizpah
  lexicon: HALOT
  rationale: The directional ending can be rendered 'to Mizpah,' but in context the
    assembly is located there, so 'at Mizpah' best reflects the sense in English.
- source_word: וַיַּעֲלוּ
  chosen: went up
  alternatives:
  - came up
  - marched up
  lexicon: HALOT
  rationale: עלה in military/narrative movement is often 'go up.' This preserves the
    Hebrew idiom without overinterpreting the manner of advance.
- source_word: סַרְנֵי פְלִשְׁתִּים
  chosen: the rulers of the Philistines
  alternatives:
  - the lords of the Philistines
  - the chiefs of the Philistines
  lexicon: HALOT
  rationale: סרנים refers to Philistine political/military leaders. 'Rulers' is clear
    modern English; 'lords' is traditional but potentially misleading in contemporary
    usage.
- source_word: אֶל יִשְׂרָאֵל
  chosen: against Israel
  alternatives:
  - to Israel
  - toward Israel
  lexicon: HALOT
  rationale: Although אֶל is literally 'to/toward,' in this military context English
    idiom requires 'against Israel' to convey hostile advance.
- source_word: וַיִּשְׁמְעוּ
  chosen: heard of it
  alternatives:
  - heard
  - learned of it
  lexicon: HALOT
  rationale: The object is implicit from context—the Philistine advance. 'Heard of
    it' makes the English complete while staying close to the Hebrew.
- source_word: וַיִּירְאוּ
  chosen: were afraid
  alternatives:
  - feared
  - became afraid
  lexicon: HALOT
  rationale: From ירא, expressing fear. 'Were afraid' is natural modern English in
    narrative.
- source_word: מִפְּנֵי פְלִשְׁתִּים
  chosen: because of the Philistines
  alternatives:
  - before the Philistines
  - from the presence of the Philistines
  lexicon: HALOT
  rationale: The idiom literally involves 'from before the face of,' but in this context
    it denotes fear caused by the Philistines. 'Because of' communicates the sense
    clearly.
