theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: Follows the project's stated default for YHWH, preserving reverential
    convention and broad English Bible recognizability.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Whether בַּגִּבְעָה is a common noun or place name
  chosen_reading: on the hill
  alternative_readings:
  - at Gibeah
  rationale: The Hebrew form includes the article and is most straightforwardly read
    as the common noun 'the hill.' Translating it as a place name would make an interpretive
    geographical decision beyond the plain sense.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1, original-language primacy
    over translation tradition'
