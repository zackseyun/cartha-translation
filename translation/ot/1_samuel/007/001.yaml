id: 1SA.7.1
reference: 1 Samuel 7:1
source:
  edition: WLC
  text: וַ/יָּבֹ֜אוּ אַנְשֵׁ֣י קִרְיַ֣ת יְעָרִ֗ים וַֽ/יַּעֲלוּ֙ אֶת אֲר֣וֹן יְהוָ֔ה
    וַ/יָּבִ֣אוּ אֹת֔/וֹ אֶל בֵּ֥ית אֲבִינָדָ֖ב בַּ/גִּבְעָ֑ה וְ/אֶת אֶלְעָזָ֤ר בְּנ/וֹ֙
    קִדְּשׁ֔וּ לִ/שְׁמֹ֖ר אֶת אֲר֥וֹן יְהוָֽה׀־־־־׃פ
translation:
  text: Then the men of Kiriath-jearim came and brought up the ark of the LORD, and
    they brought it into the house of Abinadab on the hill. And they consecrated Eleazar
    his son to keep the ark of the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly, “at Gibeah,” if בַּגִּבְעָה is taken as a place name rather
      than the common noun “the hill.”
    reason: alternative_reading
  - marker: b
    text: Hebrew uses the divine name YHWH; rendered here as “the LORD” according
      to the project’s standard practice.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹאוּ
  chosen: came
  alternatives:
  - arrived
  lexicon: HALOT
  rationale: 'Qal wayyiqtol of בוא, standard narrative advance: ''came.'' ''Then''
    in English reflects the wayyiqtol sequence naturally.'
- source_word: אַנְשֵׁי קִרְיַת יְעָרִים
  chosen: the men of Kiriath-jearim
  alternatives:
  - the men of Kiriath Jearim
  - the people of Kiriath-jearim
  lexicon: HALOT
  rationale: אַנְשֵׁי is specifically 'men of,' not the more general 'people.' The
    place name is transliterated per policy for personal/place names.
- source_word: וַיַּעֲלוּ
  chosen: brought up
  alternatives:
  - took up
  - carried up
  lexicon: HALOT
  rationale: עלה literally means 'go up/bring up.' Because the ark is the object and
    movement is toward a higher place or elevated site, 'brought up' preserves the
    directional nuance better than simply 'took.'
- source_word: אֲרוֹן יְהוָה
  chosen: the ark of the LORD
  alternatives:
  - the ark of Yahweh
  lexicon: HALOT
  rationale: אֲרוֹן is 'ark/chest'; in this cultic context 'ark' is the established
    and accurate rendering. יְהוָה follows doctrine default as 'the LORD.'
- source_word: וַיָּבִאוּ אֹתוֹ
  chosen: they brought it
  alternatives:
  - they brought it in
  lexicon: HALOT
  rationale: ביא with object pronoun means 'bring.' The following prepositional phrase
    supplies the destination; English need not repeat 'in' here, though the sense
    is retained by 'into' in the next phrase.
- source_word: אֶל בֵּית אֲבִינָדָב
  chosen: into the house of Abinadab
  alternatives:
  - to the house of Abinadab
  lexicon: HALOT
  rationale: אֶל can be 'to/into'; with a verb of bringing and an interior destination,
    'into' is the more natural English rendering.
- source_word: בַּגִּבְעָה
  chosen: on the hill
  alternatives:
  - at Gibeah
  - on the Gibeah
  lexicon: HALOT
  rationale: The form is the common noun גִּבְעָה with article, 'the hill,' not clearly
    the proper name Gibeah here. Rendering as a common noun avoids importing a place-name
    identification not demanded by the text.
- source_word: וְאֶת אֶלְעָזָר בְּנוֹ
  chosen: And they consecrated Eleazar his son
  alternatives:
  - and Eleazar his son they consecrated
  - and they set apart Eleazar his son
  lexicon: HALOT
  rationale: Fronted direct object is smoothed in English. בְּנוֹ most naturally refers
    to Abinadab's son in the immediate context.
- source_word: קִדְּשׁוּ
  chosen: consecrated
  alternatives:
  - sanctified
  - set apart
  lexicon: HALOT
  rationale: קדשׁ in this context denotes setting someone apart for sacred duty. 'Consecrated'
    preserves the cultic/religious force better than the more generic 'set apart,'
    while remaining readable.
- source_word: לִשְׁמֹר
  chosen: to keep
  alternatives:
  - to guard
  - to watch over
  lexicon: HALOT
  rationale: שׁמר can mean keep, guard, watch over. Here the task is custodial protection
    of the ark; 'keep' is concise and idiomatic, with the guarding sense still present.
- source_word: אֲרוֹן יְהוָה
  chosen: the ark of the LORD
  alternatives:
  - the ark of Yahweh
  lexicon: HALOT
  rationale: Repeated phrase rendered consistently within the verse.
