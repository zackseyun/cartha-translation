id: 1SA.7.5
reference: 1 Samuel 7:5
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר שְׁמוּאֵ֔ל קִבְצ֥וּ אֶת כָּל יִשְׂרָאֵ֖ל הַ/מִּצְפָּ֑תָ/ה וְ/אֶתְפַּלֵּ֥ל בַּעַדְ/כֶ֖ם אֶל יְהוָֽה־־־׃
translation:
  text: Then Samuel said, “Gather all Israel to Mizpah, and I will pray to Yahweh on your behalf.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''to Yahweh.'' The main text follows the project’s standard rendering of the divine name as ''the LORD.'''
    reason: alternative_reading
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: Then ... said
  alternatives:
  - And ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then ... said' gives natural modern English while preserving the sequential force.
- source_word: שְׁמוּאֵל
  chosen: Samuel
  rationale: Standard English transliteration of the personal name.
- source_word: קִבְצוּ
  chosen: Gather
  alternatives:
  - Assemble
  - Collect
  lexicon: HALOT
  rationale: Imperative plural from קבץ. 'Gather' is natural and direct in English and fits a summons of the people.
- source_word: כָּל יִשְׂרָאֵל
  chosen: all Israel
  alternatives:
  - the whole of Israel
  lexicon: HALOT
  rationale: Retains the collective national sense without overexpansion.
- source_word: הַמִּצְפָּתָה
  chosen: to Mizpah
  alternatives:
  - at Mizpah
  lexicon: HALOT
  rationale: The directional ending indicates motion toward the place, so 'to Mizpah' best reflects the Hebrew form.
- source_word: וְאֶתְפַּלֵּל
  chosen: and I will pray
  alternatives:
  - and let me pray
  - and I shall pray
  lexicon: HALOT
  rationale: The 1cs imperfect following the imperative expresses Samuel's intended subsequent action. 'I will pray' is the clearest idiomatic rendering.
- source_word: בַּעַדְכֶם
  chosen: on your behalf
  alternatives:
  - for you
  lexicon: HALOT
  rationale: '''On your behalf'' preserves the intercessory nuance of בעד more explicitly than the simpler ''for you.'''
- source_word: אֶל יְהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: Per doctrine, יְהוָה is rendered 'the LORD.' The preposition אֶל is naturally rendered 'to' with the verb 'pray.'
