theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project default is to render YHWH as 'the LORD,' following Jewish
    reverence tradition and longstanding English convention while distinguishing the
    covenant name typographically.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Nature of Israel's response in שָׁבִים
  chosen_reading: returning to the LORD
  alternative_readings:
  - turning back to the LORD
  rationale: The verse calls for covenant repentance and renewed allegiance. 'Returning'
    preserves that theological sense without importing later doctrinal categories
    beyond the Hebrew text.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3
- issue: Meaning of עבד in this context
  chosen_reading: serve him alone
  alternative_readings:
  - worship him alone
  rationale: The command concerns exclusive covenant loyalty expressed in worship
    and obedience. 'Serve' is broader and closer to the Hebrew, avoiding narrowing
    the command to cultic worship only.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §6
