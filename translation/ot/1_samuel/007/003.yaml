id: 1SA.7.3
reference: 1 Samuel 7:3
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר שְׁמוּאֵ֗ל אֶל כָּל בֵּ֣ית יִשְׂרָאֵל֮ לֵ/אמֹר֒ אִם בְּ/כָל לְבַבְ/כֶ֗ם
    אַתֶּ֤ם שָׁבִים֙ אֶל יְהוָ֔ה הָסִ֜ירוּ אֶת אֱלֹהֵ֧י הַ/נֵּכָ֛ר מִ/תּוֹכְ/כֶ֖ם
    וְ/הָ/עַשְׁתָּר֑וֹת וְ/הָכִ֨ינוּ לְבַבְ/כֶ֤ם אֶל יְהוָה֙ וְ/עִבְדֻ֣/הוּ לְ/בַדּ֔/וֹ
    וְ/יַצֵּ֥ל אֶתְ/כֶ֖ם מִ/יַּ֥ד פְּלִשְׁתִּֽים־־־־־־־׃
translation:
  text: Then Samuel said to all the house of Israel, “If you are returning to the
    LORD with all your heart, remove the foreign gods from among you, and the Ashtaroths,
    and direct your heart to the LORD and serve him alone, and he will deliver you
    from the hand of the Philistines.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “turning back to the LORD with all your heart.”
    reason: lexical_alternative
  - marker: b
    text: The Hebrew plural “Ashtaroths” likely refers to manifestations, images,
      or cultic forms associated with the goddess Ashtoreth/Astarte.
    reason: cultural_note
  - marker: c
    text: Or “prepare your heart for the LORD.”
    reason: lexical_alternative
  - marker: d
    text: 'Hebrew: “from the hand of the Philistines,” an idiom for deliverance from
      their power.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: Then Samuel said
  alternatives:
  - And Samuel said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then ... said' gives natural
    English narrative flow while preserving sequence.
- source_word: כָּל בֵּית יִשְׂרָאֵל
  chosen: all the house of Israel
  alternatives:
  - all Israel
  - the whole house of Israel
  lexicon: HALOT
  rationale: Retains the corporate-household idiom rather than flattening to 'all
    Israel.' This preserves the covenant-community nuance.
- source_word: אִם בְּכָל לְבַבְכֶם אַתֶּם שָׁבִים אֶל יְהוָה
  chosen: If you are returning to the LORD with all your heart
  alternatives:
  - If you return to the LORD with all your heart
  - If you are turning back to the LORD with all your heart
  lexicon: HALOT
  rationale: שׁוּב commonly means 'return/turn back.' 'Returning' reflects the participial
    form and the sense of renewed covenant loyalty. 'With all your heart' preserves
    the Hebrew idiom of wholehearted devotion.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name per DOCTRINE.md.
- source_word: הָסִירוּ
  chosen: remove
  alternatives:
  - put away
  - take away
  lexicon: HALOT
  rationale: '''Remove'' is clear modern English and fits the imperative call to eliminate
    idolatrous objects/practices.'
- source_word: אֱלֹהֵי הַנֵּכָר
  chosen: the foreign gods
  alternatives:
  - the gods of the foreigner
  - the strange gods
  lexicon: HALOT
  rationale: This phrase idiomatically refers to alien/foreign deities, not merely
    unusual ones. 'Foreign gods' is standard and accurate.
- source_word: מִתּוֹכְכֶם
  chosen: from among you
  alternatives:
  - from your midst
  - out of your midst
  lexicon: HALOT
  rationale: '''From among you'' is natural English and preserves the communal sense
    of removal from the covenant community.'
- source_word: וְהָעַשְׁתָּרֹת
  chosen: and the Ashtaroths
  alternatives:
  - and the Ashtoreths
  - and the images of Ashtoreth
  lexicon: HALOT
  rationale: The Hebrew plural form is best represented by transliteration rather
    than interpretive expansion. 'Ashtaroths' preserves the likely reference to manifestations/images
    associated with the goddess Ashtoreth/Astarte.
- source_word: וְהָכִינוּ לְבַבְכֶם אֶל יְהוָה
  chosen: and direct your heart to the LORD
  alternatives:
  - and prepare your heart for the LORD
  - and establish your heart toward the LORD
  lexicon: HALOT
  rationale: כּוּן with 'heart' can mean to set, establish, or direct firmly. 'Direct
    your heart to the LORD' communicates intentional orientation without sounding
    wooden.
- source_word: וְעִבְדֻהוּ לְבַדּוֹ
  chosen: and serve him alone
  alternatives:
  - and worship him alone
  - and serve only him
  lexicon: HALOT
  rationale: עבד in covenant contexts includes worshipful service, but 'serve him
    alone' best preserves the broad sense of exclusive allegiance and obedience.
- source_word: וְיַצֵּל אֶתְכֶם
  chosen: and he will deliver you
  alternatives:
  - that he may deliver you
  - and he shall rescue you
  lexicon: HALOT
  rationale: The Hiphil of נצל means 'deliver/rescue.' Given the imperative sequence
    and expected result, English future 'he will deliver you' communicates the promised
    outcome naturally.
- source_word: מִיַּד פְּלִשְׁתִּים
  chosen: from the hand of the Philistines
  alternatives:
  - from the power of the Philistines
  - from the Philistines
  lexicon: HALOT
  rationale: The idiom 'from the hand of' is preserved because it is transparent in
    English and retains the concrete sense of oppressive power.
