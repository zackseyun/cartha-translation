id: 1SA.29.11
reference: 1 Samuel 29:11
source:
  edition: WLC
  text: וַ/יַּשְׁכֵּ֨ם דָּוִ֜ד ה֤וּא וַֽ/אֲנָשָׁי/ו֙ לָ/לֶ֣כֶת בַּ/בֹּ֔קֶר לָ/שׁ֖וּב
    אֶל אֶ֣רֶץ פְּלִשְׁתִּ֑ים וּ/פְלִשְׁתִּ֖ים עָל֥וּ יִזְרְעֶֽאל־׃ס
translation:
  text: So David rose early, he and his men, to leave in the morning and return to
    the land of the Philistines. And the Philistines went up to Jezreel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to go in the morning and return to the land of the Philistines.' The
      Hebrew infinitives can be rendered more formally.
    reason: lexical_alternative
  - marker: b
    text: '''Went up'' reflects the Hebrew idiom for movement to a place, often with
      topographical or military nuance; alternatively, ''marched up to Jezreel.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּשְׁכֵּם
  chosen: rose early
  alternatives:
  - got up early
  - started early
  lexicon: HALOT
  rationale: The Hiphil of שׁכם commonly means to rise early or start early. 'Rose
    early' is idiomatic, concise, and preserves the temporal emphasis without over-paraphrasing.
- source_word: הוּא וַאֲנָשָׁיו
  chosen: he and his men
  alternatives:
  - he and his servants
  - he and his troops
  lexicon: HALOT
  rationale: 'The pronoun plus noun phrase is emphatic/appositional: ''he, and his
    men.'' ''Men'' is the most natural rendering of אֲנָשָׁיו here, referring to David''s
    male fighting company, not household servants.'
- source_word: לָלֶכֶת
  chosen: to leave
  alternatives:
  - to go
  - to depart
  lexicon: HALOT
  rationale: Although the infinitive is literally 'to go,' in this context it denotes
    setting out from the Philistine camp. 'To leave' communicates the motion more
    clearly in English while remaining close to the source sense.
- source_word: בַּבֹּקֶר
  chosen: in the morning
  alternatives:
  - early in the morning
  - at morning
  lexicon: HALOT
  rationale: This specifies the time of departure. Because 'rose early' already conveys
    earliness, 'in the morning' avoids redundancy while preserving the temporal phrase.
- source_word: לָשׁוּב
  chosen: and return
  alternatives:
  - to return
  - to go back
  lexicon: HALOT
  rationale: 'The infinitive expresses purpose following the departure: they left
    in order to return. English reads naturally with ''and return,'' preserving the
    sequence and intent.'
- source_word: אֶל אֶרֶץ פְּלִשְׁתִּים
  chosen: to the land of the Philistines
  alternatives:
  - to Philistine territory
  - to the country of the Philistines
  lexicon: HALOT
  rationale: A fairly formal rendering preserves the concrete noun 'land' and the
    ethnic designation. This likely refers to Philistine territory generally rather
    than a specific city.
- source_word: וּפְלִשְׁתִּים
  chosen: And the Philistines
  alternatives:
  - Now the Philistines
  lexicon: HALOT
  rationale: The conjunction marks the narrative shift from David's departure to the
    Philistine army's movement. 'And' preserves the Hebrew narrative flow.
- source_word: עָלוּ
  chosen: went up
  alternatives:
  - marched up
  - advanced to
  lexicon: HALOT
  rationale: עלה is the standard verb 'go up.' 'Went up' preserves the conventional
    topographical/military idiom without adding interpretive color such as 'marched'
    unless context requires it.
- source_word: יִזְרְעֶאל
  chosen: Jezreel
  lexicon: HALOT
  rationale: Standard English transliteration of the place name.
