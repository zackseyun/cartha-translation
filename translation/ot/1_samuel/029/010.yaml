id: 1SA.29.10
reference: 1 Samuel 29:10
source:
  edition: WLC
  text: וְ/עַתָּה֙ הַשְׁכֵּ֣ם בַּ/בֹּ֔קֶר וְ/עַבְדֵ֥י אֲדֹנֶ֖י/ךָ אֲשֶׁר בָּ֣אוּ אִתָּ֑/ךְ
    וְ/הִשְׁכַּמְתֶּ֣ם בַּ/בֹּ֔קֶר וְ/א֥וֹר לָ/כֶ֖ם וָ/לֵֽכוּ־׃
translation:
  text: Now rise early in the morning, you and your master's servants who came with
    you. When you rise early in the morning and it is light for you, go.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'when daylight comes for you, go' / 'at daybreak, go.' The Hebrew clause
      is literally 'and it is light for you.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  chosen: Now
  alternatives:
  - So now
  - And now
  lexicon: HALOT
  rationale: Discourse marker introducing the immediate instruction. 'Now' is natural
    modern English and preserves the transition without overtranslating the conjunction.
- source_word: הַשְׁכֵּם
  chosen: rise early
  alternatives:
  - start early
  - get up early
  lexicon: HALOT
  rationale: Hiphil imperative of שׁכם conveys getting up early or making an early
    start. 'Rise early' is idiomatic and suitably direct.
- source_word: בַּבֹּקֶר
  chosen: in the morning
  alternatives:
  - early in the morning
  - at morning
  lexicon: HALOT
  rationale: Temporal phrase specifying the time of departure. Rendered straightforwardly
    as 'in the morning'; the adverbial sense of earliness is already carried by הַשׁכם.
- source_word: וְעַבְדֵי אֲדֹנֶיךָ
  chosen: you and your master's servants
  alternatives:
  - and your lord's servants
  - and the servants of your master
  lexicon: HALOT
  rationale: The phrase is coordinated with the imperative addressed to David. 'Your
    master's servants' reflects אֲדֹנֶיךָ in its ordinary human sense here, not a
    divine title. 'Master' is preferable to 'lord' in this non-theological context.
- source_word: אֲשֶׁר בָּאוּ אִתָּךְ
  chosen: who came with you
  alternatives:
  - who have come with you
  - that came with you
  lexicon: HALOT
  rationale: Relative clause identifying the servants accompanying David. Simple past
    fits the narrative context.
- source_word: וְהִשְׁכַּמְתֶּם
  chosen: When you rise early
  alternatives:
  - and rise early
  - then rise early
  lexicon: HALOT
  rationale: Though formally a conjunction plus perfect/plural form, in context it
    functions as a temporal instruction continuing the command sequence. Rendering
    it as 'When you rise early' produces clear English while preserving the sequence.
- source_word: וְאוֹר לָכֶם
  chosen: and it is light for you
  alternatives:
  - and daylight comes
  - when it becomes light for you
  - at daybreak
  lexicon: HALOT
  rationale: Literally 'and it is light for you.' This clause marks the point of departure
    at first light. The chosen rendering stays close to the Hebrew while remaining
    readable.
- source_word: וָלֵכוּ
  chosen: go
  alternatives:
  - leave
  - be on your way
  lexicon: HALOT
  rationale: Simple imperative of הלך. 'Go' is the most direct equivalent; 'leave'
    is possible but slightly more interpretive.
