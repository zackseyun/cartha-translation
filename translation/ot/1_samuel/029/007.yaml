id: 1SA.29.7
reference: 1 Samuel 29:7
source:
  edition: WLC
  text: וְ/עַתָּ֥ה שׁ֖וּב וְ/לֵ֣ךְ בְּ/שָׁל֑וֹם וְ/לֹֽא תַעֲשֶׂ֣ה רָ֔ע בְּ/עֵינֵ֖י
    סַרְנֵ֥י פְלִשְׁתִּֽים־׃ס
translation:
  text: So now, go back and go in peace, and do not do what is evil in the eyes of
    the Philistine lords.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'do not do wrong in the sight of the Philistine lords.' The Hebrew expression
      can denote what is judged evil or unacceptable by them.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  chosen: So now
  alternatives:
  - Now
  - And now
  lexicon: HALOT
  rationale: Introduces the speaker's conclusion or directive. 'So now' captures both
    the connective ו and the temporal/discourse force of עתה in natural English.
- source_word: שׁוּב
  chosen: go back
  alternatives:
  - return
  - turn back
  lexicon: HALOT
  rationale: In context Achish is dismissing David from accompanying the army, so
    'go back' is the most idiomatic contextual rendering of שוב.
- source_word: וְלֵךְ
  chosen: and go
  alternatives:
  - and depart
  - and leave
  lexicon: HALOT
  rationale: A second imperative following שוב. Rendering both verbs preserves the
    Hebrew's emphatic two-step command rather than collapsing them into a single English
    verb.
- source_word: בְּשָׁלוֹם
  chosen: in peace
  alternatives:
  - peacefully
  - safely
  lexicon: HALOT
  rationale: The prepositional phrase is conventionally and naturally rendered 'in
    peace.' It can imply safe departure, but the more literal idiom is preferable
    here.
- source_word: וְלֹא תַעֲשֶׂה רָע
  chosen: and do not do what is evil
  alternatives:
  - and do no evil
  - and do not do wrong
  - and do not do harm
  lexicon: HALOT
  rationale: עשה רע is a common Hebrew expression. 'Do what is evil' preserves the
    moral coloring of רע better than the narrower 'harm,' while remaining idiomatic
    in English.
- source_word: בְּעֵינֵי
  chosen: in the eyes of
  alternatives:
  - in the sight of
  - in the judgment of
  lexicon: HALOT
  rationale: A standard Hebrew idiom for evaluation or perception. 'In the eyes of'
    preserves the idiom transparently and naturally.
- source_word: סַרְנֵי פְלִשְׁתִּים
  chosen: the Philistine lords
  alternatives:
  - the lords of the Philistines
  - the Philistine rulers
  lexicon: HALOT
  rationale: סרן refers specifically to the high rulers of the Philistine city-states.
    'Philistine lords' is concise and conventional, while preserving the political
    title better than the generic 'rulers'.
