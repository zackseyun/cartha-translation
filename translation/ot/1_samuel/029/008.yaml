theological_decisions:
- issue: Referent and rhetorical force of 'the enemies of my lord the king'
  chosen_reading: Retain the phrase as spoken, without identifying whether 'my lord
    the king' refers sincerely to Achish or is intentionally ambiguous in light of
    David's loyalty to Saul/Israel.
  alternative_readings:
  - A sincere reference to Achish as David's current lord
  - A deliberately ambiguous statement that could also be heard with another referent
  rationale: The Hebrew leaves David's intent unstated. Preserving the wording without
    interpretive expansion maintains the narrative tension rather than resolving it.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
