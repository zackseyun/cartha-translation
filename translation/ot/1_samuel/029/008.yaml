id: 1SA.29.8
reference: 1 Samuel 29:8
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר דָּוִ֜ד אֶל אָכִ֗ישׁ כִּ֣י מֶ֤ה עָשִׂ֨יתִי֙ וּ/מַה מָּצָ֣אתָ בְ/עַבְדְּ/ךָ֔
    מִ/יּוֹם֙ אֲשֶׁ֣ר הָיִ֣יתִי לְ/פָנֶ֔י/ךָ עַ֖ד הַ/יּ֣וֹם הַ/זֶּ֑ה כִּ֣י לֹ֤א אָבוֹא֙
    וְ/נִלְחַ֔מְתִּי בְּ/אֹיְבֵ֖י אֲדֹנִ֥/י הַ/מֶּֽלֶךְ־־׃
translation:
  text: David said to Achish, “But what have I done? And what have you found against
    your servant from the day I entered your service until this day, that I should
    not go and fight against the enemies of my lord the king?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from the day I came before you until this day.' The Hebrew is more literally
      'from the day I was before you.'
    reason: lexical_alternative
  - marker: b
    text: '''My lord the king'' is left as spoken. David''s wording may be straightforwardly
      addressed to Achish, or it may carry deliberate ambiguity in the narrative context.'
    reason: alternative_reading
lexical_decisions:
- source_word: כִּי מֶה עָשִׂיתִי
  chosen: But what have I done?
  alternatives:
  - For what have I done?
  - What have I done?
  lexicon: HALOT
  rationale: The particle כִּי here introduces David's protest and is best represented
    idiomatically as an adversative/discourse marker in English. 'But' captures the
    pushback to Achish's prior statement more naturally than a wooden 'for.'
- source_word: וּמַה מָּצָאתָ בְעַבְדְּךָ
  chosen: And what have you found against your servant
  alternatives:
  - And what have you found in your servant
  - What fault have you found in your servant
  lexicon: HALOT
  rationale: מצא with ב can mean 'find in' in the sense of discovering fault or grounds
    for accusation. Adding 'against' makes the implied negative sense explicit in
    natural English without over-paraphrasing.
- source_word: בְעַבְדְּךָ
  chosen: your servant
  alternatives:
  - your slave
  lexicon: HALOT
  rationale: Although עבד can denote a slave, in courtly self-reference before a king
    it commonly functions as a deferential title, so 'your servant' best matches the
    social register here.
- source_word: מִיּוֹם אֲשֶׁר הָיִיתִי לְפָנֶיךָ עַד הַיּוֹם הַזֶּה
  chosen: from the day I entered your service until this day
  alternatives:
  - from the day I was before you until this day
  - from the day I came into your presence until this day
  lexicon: HALOT
  rationale: Literally 'from the day I was before you.' In context this refers to
    the period David has been attached to Achish. 'Entered your service' conveys the
    idiomatic force in readable English while preserving the temporal scope.
- source_word: כִּי לֹא אָבוֹא וְנִלְחַמְתִּי
  chosen: that I should not go and fight
  alternatives:
  - for I cannot go and fight
  - that I may not go and fight
  lexicon: HALOT
  rationale: 'The clause gives the content of David''s complaint: why he is being
    prevented from going to battle. English idiom prefers ''that I should not go and
    fight'' to a more wooden rendering.'
- source_word: בְּאֹיְבֵי
  chosen: against the enemies of
  alternatives:
  - with the enemies of
  lexicon: HALOT
  rationale: With נלחם, the preposition ב commonly marks the opponent in battle, so
    'fight against' is the standard and clearest rendering.
- source_word: אֲדֹנִי הַמֶּלֶךְ
  chosen: my lord the king
  alternatives:
  - my master the king
  lexicon: HALOT
  rationale: אדני is a human honorific here, not a divine title. 'My lord the king'
    preserves the deferential address and political setting.
