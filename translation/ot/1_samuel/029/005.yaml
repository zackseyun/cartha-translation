id: 1SA.29.5
reference: 1 Samuel 29:5
source:
  edition: WLC
  text: הֲ/לוֹא זֶ֣ה דָוִ֔ד אֲשֶׁ֧ר יַעֲנוּ ל֛/וֹ בַּ/מְּחֹל֖וֹת לֵ/אמֹ֑ר הִכָּ֤ה
    שָׁאוּל֙ בַּֽ/אֲלָפָ֔י/ו וְ/דָוִ֖ד ב/רבבת/ו־־׃ס
translation:
  text: Is this not David, of whom they sang to one another in the dances, saying,
    ‘Saul has struck down his thousands, and David his ten thousands’?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'they answered concerning him in the dances,' an idiom
      for responsive or antiphonal singing.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'ten thousands'; the term can also be understood more generally as
      'myriads.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲלוֹא
  chosen: Is this not
  alternatives:
  - Is this not indeed
  - Surely this is
  lexicon: HALOT
  rationale: Introduces a rhetorical question expecting agreement. Rendering it as
    'Is this not' preserves both the interrogative form and the force of recognition.
- source_word: זֶה דָוִד
  chosen: this ... David
  alternatives:
  - this is David
  - this David
  lexicon: HALOT
  rationale: The demonstrative plus name identifies David emphatically. In English,
    'Is this not David' is the most natural equivalent within the rhetorical question.
- source_word: אֲשֶׁר
  chosen: of whom
  alternatives:
  - whom
  - about whom
  lexicon: HALOT
  rationale: Links David with the following relative clause. 'Of whom' fits idiomatic
    English with the verb 'sang' and preserves the relational sense.
- source_word: יַעֲנוּ לוֹ
  chosen: they sang to one another
  alternatives:
  - they answered concerning him
  - they responded to him
  - they sang of him
  lexicon: HALOT
  rationale: ענה in this idiom refers to antiphonal or responsive singing. The context
    of celebratory dances and the quoted refrain supports 'they sang to one another'
    rather than a literal 'answered him.'
- source_word: בַּמְּחֹלוֹת
  chosen: in the dances
  alternatives:
  - with dancing
  - in the dancing
  lexicon: HALOT
  rationale: מְחֹלוֹת refers to festive dances/dance circles. 'In the dances' preserves
    the concrete plural form and the setting of communal celebration.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - with the words
  - as they said
  lexicon: HALOT
  rationale: Standard quotation introducer; 'saying' is natural and sufficiently formal.
- source_word: הִכָּה
  chosen: has struck down
  alternatives:
  - struck down
  - has slain
  - killed
  lexicon: HALOT
  rationale: נכה commonly means 'strike' or 'smite,' and in military-song context
    implies lethal defeat. 'Has struck down' preserves the vividness without over-specifying
    beyond the idiom.
- source_word: בַּאֲלָפָיו
  chosen: his thousands
  alternatives:
  - by his thousands
  - thousands
  lexicon: HALOT
  rationale: The preposition with numeral here is idiomatic in the refrain, denoting
    the number of enemies defeated. 'His thousands' follows established English idiom
    and matches the parallelism.
- source_word: בְּרִבְבֹתָיו
  chosen: his ten thousands
  alternatives:
  - his myriads
  - ten thousands
  lexicon: HALOT
  rationale: רבבה denotes ten thousand or a myriad. 'Ten thousands' preserves the
    numeric contrast with Saul's 'thousands' and reflects the Hebrew plural possessive
    structure.
