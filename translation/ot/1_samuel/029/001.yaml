id: 1SA.29.1
reference: 1 Samuel 29:1
source:
  edition: WLC
  text: וַ/יִּקְבְּצ֧וּ פְלִשְׁתִּ֛ים אֶת כָּל מַחֲנֵי/הֶ֖ם אֲפֵ֑קָ/ה וְ/יִשְׂרָאֵ֣ל
    חֹנִ֔ים בַּ/עַ֖יִן אֲשֶׁ֥ר בְּ/יִזְרְעֶֽאל־־׃
translation:
  text: Now the Philistines gathered all their camps at Aphek, while Israel was encamped
    by the spring that is in Jezreel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all their forces' or 'all their armies'; the Hebrew more literally says
      'all their camps.'
    reason: lexical_alternative
  - marker: b
    text: Or 'by the fountain'; the Hebrew word can refer to a spring or fountain.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְבְּצוּ
  chosen: gathered
  alternatives:
  - assembled
  - mustered
  lexicon: HALOT
  rationale: The verb קבץ in the waw-consecutive narrative form denotes bringing together
    or assembling. 'Gathered' is a natural modern English rendering that preserves
    the basic sense without over-specifying military procedure.
- source_word: פְלִשְׁתִּים
  chosen: the Philistines
  lexicon: HALOT
  rationale: Standard transliteration of the people-group name; the definite article
    is natural in English for a known national group.
- source_word: כָּל מַחֲנֵיהֶם
  chosen: all their camps
  alternatives:
  - all their forces
  - all their armies
  lexicon: HALOT
  rationale: מַחֲנֶה commonly means 'camp' or 'encampment,' and the plural with 'all'
    suggests the totality of their military encampments/divisions. 'Camps' stays closer
    to the Hebrew than the more interpretive 'forces' or 'armies,' while still fitting
    the military context.
- source_word: אֲפֵקָה
  chosen: at Aphek
  lexicon: HALOT
  rationale: Proper place name, transliterated according to the translation philosophy.
    The directional he is idiomatically rendered with the English preposition 'at'
    rather than reproduced mechanically.
- source_word: וְיִשְׂרָאֵל
  chosen: while Israel
  alternatives:
  - and Israel
  lexicon: HALOT
  rationale: The conjunction links a contrasting or simultaneous circumstance rather
    than merely adding another event. 'While Israel' captures the scene-setting force
    in idiomatic English.
- source_word: חֹנִים
  chosen: was encamped
  alternatives:
  - were camping
  - was camped
  lexicon: HALOT
  rationale: Although formally plural, the predicate refers to the collective noun
    'Israel.' Singular English agreement is idiomatic. 'Was encamped' preserves the
    military setting and the stative sense better than the looser 'were camping.'
- source_word: בַּעַיִן
  chosen: by the spring
  alternatives:
  - by the fountain
  - at the source
  lexicon: HALOT
  rationale: עַיִן can denote a spring or fountain. 'Spring' is the clearest modern
    English choice for a water source in a geographic notice.
- source_word: אֲשֶׁר בְּיִזְרְעֶאל
  chosen: that is in Jezreel
  alternatives:
  - that belongs to Jezreel
  - in the Jezreel area
  lexicon: HALOT
  rationale: A straightforward relative clause locating the spring. 'In Jezreel' is
    the most direct rendering of the Hebrew prepositional phrase and avoids unnecessary
    expansion.
