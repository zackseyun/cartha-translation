id: 1SA.29.6
reference: 1 Samuel 29:6
source:
  edition: WLC
  text: וַ/יִּקְרָ֨א אָכִ֜ישׁ אֶל דָּוִ֗ד וַ/יֹּ֣אמֶר אֵ֠לָי/ו חַי יְהוָ֞ה כִּי יָשָׁ֣ר אַתָּ֗ה וְ/ט֣וֹב בְּ֠/עֵינַ/י צֵאתְ/ךָ֨ וּ/בֹאֲ/ךָ֤ אִתִּ/י֙ בַּֽ/מַּחֲנֶ֔ה כִּ֠י לֹֽא מָצָ֤אתִֽי בְ/ךָ֙ רָעָ֔ה מִ/יּ֛וֹם בֹּאֲ/ךָ֥ אֵלַ֖/י עַד הַ/יּ֣וֹם הַ/זֶּ֑ה וּ/בְ/עֵינֵ֥י הַ/סְּרָנִ֖ים לֹֽא ט֥וֹב אָֽתָּה־־־־־־׃
translation:
  text: Then Achish called David and said to him, “As Yahweh lives, you are upright, and your going out and your coming in with me in the camp is good in my sight; for I have not found any evil in you from the day of your coming to me to this day. But in the eyes of the lords of the Philistines, you are not good.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'your conduct with me in the camp is pleasing in my sight.' The Hebrew literally says, 'your going out and your coming in with me in the camp is good in my sight.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the lords' (סְרָנִים), the title used for the Philistine rulers.
    reason: cultural_note
  - marker: c
    text: Or, 'you are not acceptable' in the eyes of the Philistine rulers.
    reason: alternative_reading
lexical_decisions:
- source_word: חַי יְהוָה
  chosen: As the LORD lives
  alternatives:
  - By the life of the LORD
  - The LORD lives
  lexicon: HALOT
  rationale: This is a standard oath formula. 'As the LORD lives' preserves the idiomatic force in natural English while retaining the divine name according to project policy for יְהוָה as 'the LORD'.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: יָשָׁר
  chosen: upright
  alternatives:
  - honest
  - straight
  lexicon: HALOT
  rationale: The adjective denotes moral straightness or integrity. 'Upright' fits the commendatory context and preserves the ethical nuance better than the flatter 'honest'.
- source_word: טוֹב בְּעֵינַי
  chosen: good in my sight
  alternatives:
  - pleasing in my eyes
  - acceptable to me
  lexicon: HALOT
  rationale: This expression is evaluative. 'Good in my sight' keeps the Hebrew imagery of perception while remaining readable.
- source_word: צֵאתְךָ וּבֹאֲךָ
  chosen: your going out and your coming in
  alternatives:
  - your conduct
  - your movements
  lexicon: HALOT
  rationale: The pair is a Hebrew idiom for one's activity or conduct, but here the military-camp setting makes the more literal wording intelligible and preferable. It also preserves the source's rhythm.
- source_word: אִתִּי בַּמַּחֲנֶה
  chosen: with me in the camp
  alternatives:
  - in the army with me
  - with me in the encampment
  lexicon: HALOT
  rationale: מַחֲנֶה can mean camp or army. 'Camp' is the direct sense and suits the immediate setting; the military implication remains clear from context.
- source_word: לֹא מָצָאתִי בְךָ רָעָה
  chosen: I have not found any evil in you
  alternatives:
  - I have found no fault in you
  - I have not found wrongdoing in you
  lexicon: HALOT
  rationale: רָעָה here refers to evil, wrongdoing, or something blameworthy. 'Any evil in you' is slightly more formal but preserves the lexical force and echoes biblical judicial language.
- source_word: מִיּוֹם בֹּאֲךָ אֵלַי עַד הַיּוֹם הַזֶּה
  chosen: from the day of your coming to me to this day
  alternatives:
  - from the day you came to me until today
  lexicon: HALOT
  rationale: This rendering stays close to the Hebrew temporal construction while remaining natural English.
- source_word: וּבְעֵינֵי הַסְּרָנִים
  chosen: But in the eyes of the lords of the Philistines
  alternatives:
  - Yet in the sight of the Philistine rulers
  - But to the Philistine commanders
  lexicon: HALOT
  rationale: סְרָנִים is the distinctive title for Philistine rulers. Since the referent is contextually obvious in this narrative, 'the lords of the Philistines' makes the title explicit and preserves the idiom 'in the eyes of'.
- source_word: סְרָנִים
  chosen: lords of the Philistines
  alternatives:
  - Philistine rulers
  - Philistine commanders
  lexicon: HALOT
  rationale: The term denotes the leading Philistine rulers. 'Lords' preserves the title-like quality better than the more generic 'commanders,' though the military context is acknowledged.
- source_word: לֹא טוֹב אָתָּה
  chosen: you are not good
  alternatives:
  - you are not acceptable
  - you are not pleasing
  lexicon: HALOT
  rationale: The Hebrew is terse and elliptical. 'You are not good' preserves the bluntness of Achish's report, while the context makes clear that this means 'not acceptable' in their judgment.
