id: 1SA.29.9
reference: 1 Samuel 29:9
source:
  edition: WLC
  text: וַ/יַּ֣עַן אָכִישׁ֮ וַ/יֹּ֣אמֶר אֶל דָּוִד֒ יָדַ֕עְתִּי כִּ֣י ט֥וֹב אַתָּ֛ה
    בְּ/עֵינַ֖/י כְּ/מַלְאַ֣ךְ אֱלֹהִ֑ים אַ֣ךְ שָׂרֵ֤י פְלִשְׁתִּים֙ אָֽמְר֔וּ לֹֽא
    יַעֲלֶ֥ה עִמָּ֖/נוּ בַּ/מִּלְחָמָֽה־־׃
translation:
  text: Achish answered and said to David, “I know that you are good in my eyes, like
    an angel of God. Yet the commanders of the Philistines have said, ‘He must not
    go up with us into the battle.’”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'like a messenger of God.' The Hebrew מַלְאָךְ can mean either 'messenger'
      or 'angel,' though 'angel of God' is the more natural sense in this expression.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַן
  chosen: answered
  alternatives:
  - responded
  lexicon: HALOT
  rationale: Standard narrative use of ענה introducing a reply. 'Answered' preserves
    the formal dialogue structure of the Hebrew.
- source_word: וַיֹּאמֶר
  chosen: said
  alternatives:
  - spoke
  lexicon: HALOT
  rationale: Common narrative verb אמר. 'Said' is the natural English equivalent and
    keeps the Hebrew sequence 'answered and said.'
- source_word: יָדַעְתִּי
  chosen: I know
  alternatives:
  - I have known
  - I recognize
  lexicon: HALOT
  rationale: The perfect here expresses Achish's settled assessment in present discourse.
    English present 'I know' best conveys the force idiomatically.
- source_word: טוֹב אַתָּה בְּעֵינַי
  chosen: you are good in my eyes
  alternatives:
  - you are pleasing in my sight
  - you seem good to me
  lexicon: HALOT
  rationale: Retains the evaluative idiom 'in my eyes' while remaining readable. 'Good'
    is broad enough to include loyalty and favor without overinterpreting.
- source_word: כְּמַלְאַךְ אֱלֹהִים
  chosen: like an angel of God
  alternatives:
  - like a messenger of God
  lexicon: HALOT
  rationale: מַלְאָךְ can mean 'messenger' or 'angel,' but in the expression 'angel
    of God' the supernatural sense is the most natural and is well established in
    English Bible usage. The comparison expresses exceptionally high esteem.
- source_word: אַךְ
  chosen: Yet
  alternatives:
  - but
  - nevertheless
  lexicon: HALOT
  rationale: Marks a concessive contrast between Achish's personal judgment and the
    Philistine commanders' decision. 'Yet' captures that tension smoothly.
- source_word: שָׂרֵי פְלִשְׁתִּים
  chosen: the commanders of the Philistines
  alternatives:
  - the princes of the Philistines
  - the lords of the Philistines
  - the Philistine commanders
  lexicon: HALOT
  rationale: שָׂרִים are ruling military leaders here. 'Commanders' fits the wartime
    context better than the more archaic 'princes' or potentially misleading 'lords.'
- source_word: לֹא יַעֲלֶה
  chosen: He must not go up
  alternatives:
  - He shall not go up
  - He may not go up
  lexicon: HALOT
  rationale: The third-person imperfect after reported speech conveys prohibition/decision.
    'Must not' communicates the force clearly in modern English. 'Go up' is retained
    rather than flattened to 'go' because עלה is the Hebrew verb used for joining
    a campaign.
- source_word: עִמָּנוּ
  chosen: with us
  lexicon: HALOT
  rationale: Direct and unambiguous rendering of the prepositional phrase.
- source_word: בַּמִּלְחָמָה
  chosen: into the battle
  alternatives:
  - in the battle
  - to the battle
  - into battle
  lexicon: HALOT
  rationale: With 'go up,' English idiom favors movement into engagement. 'Into the
    battle' preserves the definite article and the military setting.
