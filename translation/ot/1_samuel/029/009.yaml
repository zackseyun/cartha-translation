theological_decisions:
- issue: Meaning of מַלְאַךְ אֱלֹהִים in Achish's comparison
  chosen_reading: Rendered as 'an angel of God' as a simile of exceptional favor or
    trustworthiness, without implying any ontological claim about David.
  alternative_readings:
  - a messenger of God
  rationale: The phrase is comparative and rhetorical, expressing Achish's high regard.
    Translating 'angel' preserves the likely sense of the idiom while avoiding doctrinal
    overreading.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition/source sense.
