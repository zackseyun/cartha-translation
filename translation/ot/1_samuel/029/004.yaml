id: 1SA.29.4
reference: 1 Samuel 29:4
source:
  edition: WLC
  text: וַ/יִּקְצְפ֨וּ עָלָ֜י/ו שָׂרֵ֣י פְלִשְׁתִּ֗ים וַ/יֹּ֣אמְרוּ ל/וֹ֩ שָׂרֵ֨י
    פְלִשְׁתִּ֜ים הָשֵׁ֣ב אֶת הָ/אִ֗ישׁ וְ/יָשֹׁב֙ אֶל מְקוֹמ/וֹ֙ אֲשֶׁ֣ר הִפְקַדְתּ֣/וֹ
    שָׁ֔ם וְ/לֹֽא יֵרֵ֤ד עִמָּ֨/נוּ֙ בַּ/מִּלְחָמָ֔ה וְ/לֹא יִֽהְיֶה לָּ֥/נוּ לְ/שָׂטָ֖ן
    בַּ/מִּלְחָמָ֑ה וּ/בַ/מֶּ֗ה יִתְרַצֶּ֥ה זֶה֙ אֶל אֲדֹנָ֔י/ו הֲ/ל֕וֹא בְּ/רָאשֵׁ֖י
    הָ/אֲנָשִׁ֥ים הָ/הֵֽם־־־־־־׃
translation:
  text: But the Philistine commanders were angry with him, and the Philistine commanders
    said to him, “Send the man back, so that he may return to his place where you
    assigned him, and let him not go down with us into battle, lest he become an adversary
    to us in the battle. For with what could this man reconcile himself to his lord?
    Would it not be with the heads of those men?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew שָׂטָן here means 'adversary' or 'opponent,' not the proper name
      'Satan.'
    reason: lexical_alternative
  - marker: b
    text: Or 'regain favor with his lord.' The Hebrew expression refers to making
      oneself acceptable again to one's superior.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְצְפוּ עָלָיו
  chosen: were angry with him
  alternatives:
  - were furious at him
  - were enraged against him
  lexicon: HALOT
  rationale: קצף denotes anger/wrath. 'Were angry with him' is natural modern English
    and adequately conveys the force without overstating beyond the context.
- source_word: שָׂרֵי פְלִשְׁתִּים
  chosen: the Philistine commanders
  alternatives:
  - the princes of the Philistines
  - the Philistine rulers
  lexicon: HALOT
  rationale: שָׂרִים in military-political context refers to leaders/commanders. 'Commanders'
    fits the immediate war setting better than the more archaic 'princes.'
- source_word: הָשֵׁב אֶת הָאִישׁ
  chosen: Send the man back
  alternatives:
  - Return the man
  - Take the man back
  lexicon: HALOT
  rationale: The Hiphil imperative of שוב is causative, 'cause to return.' 'Send the
    man back' is idiomatic and preserves the command force.
- source_word: וְיָשֹׁב אֶל מְקוֹמוֹ
  chosen: so that he may return to his place
  alternatives:
  - and let him return to his place
  - and he shall return to his place
  lexicon: HALOT
  rationale: The jussive/sequential sense after the imperative is well represented
    by 'so that he may return,' expressing the intended result of the command.
- source_word: אֲשֶׁר הִפְקַדְתּוֹ שָׁם
  chosen: where you assigned him
  alternatives:
  - where you appointed him
  - where you stationed him
  lexicon: HALOT
  rationale: הפקיד in Hiphil can mean appoint, assign, entrust, station. In this military
    context, Achish had placed David somewhere; 'assigned him' is broad and clear,
    while 'stationed' is possible but slightly narrower.
- source_word: וְלֹא יֵרֵד עִמָּנוּ בַּמִּלְחָמָה
  chosen: and let him not go down with us into battle
  alternatives:
  - and he must not go down with us to the battle
  - and let him not march down with us in the war
  lexicon: HALOT
  rationale: ירד 'go down' is retained because it is the Hebrew verb used for joining
    the campaign; 'into battle' is idiomatic English for בַּמִּלְחָמָה in this context.
- source_word: וְלֹא יִהְיֶה לָּנוּ לְשָׂטָן
  chosen: lest he become an adversary to us
  alternatives:
  - and let him not be an accuser against us
  - and let him not become our enemy
  lexicon: HALOT
  rationale: שָׂטָן here is a common noun meaning adversary/opponent, not a proper
    name. 'Adversary' preserves the lexical sense and avoids importing later demonological
    associations.
- source_word: יִתְרַצֶּה זֶה אֶל אֲדֹנָיו
  chosen: could this man reconcile himself to his lord
  alternatives:
  - could this man regain favor with his lord
  - could this man make himself acceptable to his master
  lexicon: HALOT
  rationale: The Hitpael of רצה here conveys winning favor or reconciling oneself.
    'Reconcile himself' keeps the reflexive nuance, though the practical sense is
    regaining favor.
- source_word: אֲדֹנָיו
  chosen: his lord
  alternatives:
  - his master
  lexicon: HALOT
  rationale: The referent is David's superior, namely Saul. 'Lord' fits the political
    relationship in this narrative better than 'master,' which can sound overly servile
    in English.
- source_word: הֲלוֹא בְּרָאשֵׁי הָאֲנָשִׁים הָהֵם
  chosen: Would it not be with the heads of those men?
  alternatives:
  - Would it not be by the heads of those men?
  - Would it not be at the cost of those men's heads?
  lexicon: HALOT
  rationale: The phrase is elliptical but clearly means David could regain Saul's
    favor by delivering Philistine heads. 'With the heads of those men' stays close
    to the Hebrew while remaining intelligible. 'Those men' refers to Philistine soldiers
    in context.
