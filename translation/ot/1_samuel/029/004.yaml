theological_decisions:
- issue: Meaning of שָׂטָן
  chosen_reading: common noun 'adversary'
  alternative_readings:
  - proper name 'Satan'
  rationale: In this historical narrative the term functions as an ordinary noun for
    an opponent, not as a title for the personal evil being. Capitalizing it would
    import a theological claim the text does not make.
  doctrine_reference: 'Translation philosophy: Never import doctrinal claims the text
    does not make; preserve source-text plain sense.'
