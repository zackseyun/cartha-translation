id: 1SA.29.3
reference: 1 Samuel 29:3
source:
  edition: WLC
  text: וַ/יֹּֽאמְרוּ֙ שָׂרֵ֣י פְלִשְׁתִּ֔ים מָ֖ה הָ/עִבְרִ֣ים הָ/אֵ֑לֶּה וַ/יֹּ֨אמֶר
    אָכִ֜ישׁ אֶל שָׂרֵ֣י פְלִשְׁתִּ֗ים הֲ/לֽוֹא זֶ֨ה דָוִ֜ד עֶ֣בֶד שָׁא֣וּל מֶֽלֶךְ
    יִשְׂרָאֵ֗ל אֲשֶׁ֨ר הָיָ֤ה אִתִּ/י֙ זֶ֤ה יָמִים֙ אוֹ זֶ֣ה שָׁנִ֔ים וְ/לֹֽא מָצָ֤אתִי
    ב/וֹ֙ מְא֔וּמָה מִ/יּ֥וֹם נָפְל֖/וֹ עַד הַ/יּ֥וֹם הַ/זֶּֽה־־׀־־־־׃פ
translation:
  text: Then the Philistine commanders said, “What are these Hebrews doing here?”
    And Achish said to the Philistine commanders, “Is this not David, the servant
    of Saul king of Israel, who has been with me these days or these years? From the
    day he defected until this very day, I have found nothing against him.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, “From the day he fell to him/me,” that is, from the
      day he came over or defected.
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׂרֵי פְלִשְׁתִּים
  chosen: the Philistine commanders
  alternatives:
  - the princes of the Philistines
  - the Philistine rulers
  - the Philistine leaders
  lexicon: HALOT
  rationale: שָׂרִים in a military context refers to high-ranking leaders/officials.
    'Commanders' fits the wartime setting better than the more archaic 'princes' and
    is more specific than 'leaders'.
- source_word: מָה הָעִבְרִים הָאֵלֶּה
  chosen: What are these Hebrews doing here?
  alternatives:
  - What are these Hebrews?
  - What about these Hebrews?
  lexicon: HALOT
  rationale: The Hebrew is elliptical ('What [are] these Hebrews?'). English normally
    supplies the implied sense. 'Doing here' captures the pragmatic force of suspicion
    in context without over-paraphrasing.
- source_word: הָעִבְרִים
  chosen: Hebrews
  alternatives:
  - Israelites
  lexicon: HALOT
  rationale: The source uses עִבְרִים, the ethnic label 'Hebrews,' not 'Israelites.'
    Retaining 'Hebrews' preserves the Philistine perspective and the wording of the
    text.
- source_word: הֲלוֹא
  chosen: Is this not
  alternatives:
  - Is this not indeed
  - Surely this is
  lexicon: HALOT
  rationale: The particle introduces a rhetorical question expecting agreement. 'Is
    this not' preserves that force in natural English.
- source_word: עֶבֶד
  chosen: the servant
  alternatives:
  - the slave
  - the official
  lexicon: HALOT
  rationale: Although עֶבֶד can denote slave or servant, here it refers to David's
    relation to Saul in a court-political setting rather than emphasizing chattel
    status. 'Servant' is the most contextually fitting rendering.
- source_word: זֶה יָמִים אוֹ זֶה שָׁנִים
  chosen: these days or these years
  alternatives:
  - for days or for years
  - for some time now, whether days or years
  lexicon: HALOT
  rationale: The repeated זֶה with 'days' and 'years' is idiomatic and somewhat emphatic.
    A fairly literal rendering preserves the expression's texture while remaining
    intelligible.
- source_word: מְאוּמָה
  chosen: nothing against him
  alternatives:
  - anything
  - any fault
  lexicon: HALOT
  rationale: Literally 'anything/nothing at all.' In context Achish means he has found
    no cause for complaint or accusation. 'Nothing against him' expresses the idiomatic
    sense clearly.
- source_word: מִיּוֹם נָפְלוֹ
  chosen: From the day he defected
  alternatives:
  - From the day he fell to me
  - From the day he came over
  - From the day he joined me
  lexicon: HALOT
  rationale: נפל with a personal suffix in military-political context can mean 'fall
    over to' or 'defect to' someone. Since David left Saul and attached himself to
    Achish, 'defected' best captures the political sense, though the idiom is preserved
    in a footnote.
- source_word: עַד הַיּוֹם הַזֶּה
  chosen: until this very day
  alternatives:
  - until this day
  - to this day
  lexicon: HALOT
  rationale: A standard Hebrew temporal expression. 'This very day' gives natural
    emphasis corresponding to the demonstrative.
- source_word: אָכִישׁ
  chosen: Achish
  rationale: Personal names are transliterated by standard convention per translation
    philosophy.
- source_word: דָוִד
  chosen: David
  rationale: Personal names are transliterated by standard convention per translation
    philosophy.
- source_word: שָׁאוּל
  chosen: Saul
  rationale: Personal names are transliterated by standard convention per translation
    philosophy.
