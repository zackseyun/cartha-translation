theological_decisions:
- issue: Rendering of prophetic title
  chosen_reading: man of God
  alternative_readings:
  - godly man
  rationale: The Hebrew idiom denotes a recognized religious figure, here effectively
    a prophet. Retaining the traditional title preserves the text's theological and
    narrative category without importing later doctrinal claims.
  doctrine_reference: 'Translation philosophy: original-language primacy; readable
    modern English.'
