theological_decisions:
- issue: Rendering of cultic site במה
  chosen_reading: the high place
  alternative_readings:
  - the shrine
  - the hilltop sanctuary
  rationale: The term denotes a recognized worship site in pre-temple Israel. 'High
    place' preserves the historical-religious category without importing later evaluative
    judgments into this verse.
  doctrine_reference: 'Translation philosophy: original-language primacy; readable
    modern English'
