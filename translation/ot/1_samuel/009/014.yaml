id: 1SA.9.14
reference: 1 Samuel 9:14
source:
  edition: WLC
  text: וַֽ/יַּעֲל֖וּ הָ/עִ֑יר הֵ֗מָּה בָּאִים֙ בְּ/ת֣וֹךְ הָ/עִ֔יר וְ/הִנֵּ֤ה שְׁמוּאֵל֙
    יֹצֵ֣א לִ/קְרָאתָ֔/ם לַ/עֲל֖וֹת הַ/בָּמָֽה׃ס
translation:
  text: So they went up to the city. As they were entering the middle of the city,
    behold, Samuel was coming out to meet them, to go up to the high place.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'inside the city.' The Hebrew literally says 'in the midst of the city.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲלוּ
  chosen: they went up
  alternatives:
  - they ascended
  - they came up
  lexicon: HALOT
  rationale: עלה commonly means 'go up/ascend.' Here it refers to movement up to the
    city, likely reflecting elevation. 'Went up' is natural English and preserves
    the directional nuance.
- source_word: הָעִיר
  chosen: the city
  alternatives:
  - the town
  lexicon: HALOT
  rationale: עיר denotes a city/town settlement. 'City' is the standard rendering
    and fits the narrative setting.
- source_word: הֵמָּה בָּאִים
  chosen: as they were entering
  alternatives:
  - they were coming
  - they came
  lexicon: HALOT
  rationale: The independent pronoun plus participle gives a progressive/imperfective
    sense in narrative. Rendering it as 'as they were entering' captures the ongoing
    action at the moment Samuel appears.
- source_word: בְּתוֹךְ הָעִיר
  chosen: the middle of the city
  alternatives:
  - inside the city
  - within the city
  lexicon: HALOT
  rationale: בתוך literally means 'in the midst/middle of.' 'The middle of the city'
    preserves the concrete spatial sense better than the flatter 'inside the city,'
    though the latter is possible.
- source_word: וְהִנֵּה
  chosen: behold
  alternatives:
  - look
  - and there was
  lexicon: HALOT
  rationale: הנה is a discourse marker drawing attention to a sudden or significant
    sight. 'Behold' preserves the vividness and narrative force without paraphrase.
- source_word: יֹצֵא
  chosen: was coming out
  alternatives:
  - was going out
  - came out
  lexicon: HALOT
  rationale: יצא means 'go out/come out.' Because Samuel is moving toward Saul and
    his servant from the narrator's deictic perspective, 'was coming out' is idiomatic
    and matches the participial aspect.
- source_word: לִקְרָאתָם
  chosen: to meet them
  alternatives:
  - to encounter them
  lexicon: HALOT
  rationale: לקראת commonly means 'to meet/toward in order to meet.' 'To meet them'
    is the natural English equivalent.
- source_word: לַעֲלוֹת
  chosen: to go up
  alternatives:
  - to ascend
  lexicon: HALOT
  rationale: Again from עלה, here an infinitive of purpose. 'To go up' preserves the
    directional sense and links with the cultic ascent.
- source_word: הַבָּמָה
  chosen: the high place
  alternatives:
  - the shrine
  - the hilltop sanctuary
  lexicon: HALOT
  rationale: במה refers to a cultic high place. 'High place' is the established and
    sufficiently transparent rendering; alternatives are more interpretive.
