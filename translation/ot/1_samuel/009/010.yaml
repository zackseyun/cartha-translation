theological_decisions:
- issue: Rendering the title אִישׁ הָאֱלֹהִים
  chosen_reading: the man of God
  alternative_readings:
  - the prophet
  rationale: The phrase is a conventional title for a prophet, but translating the
    title literally avoids importing an interpretive substitution where the Hebrew
    itself is transparent. This preserves the text's own theological diction.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; preserve source meaning without unnecessary paraphrase.'
