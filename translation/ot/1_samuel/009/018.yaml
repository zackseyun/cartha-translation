id: 1SA.9.18
reference: 1 Samuel 9:18
source:
  edition: WLC
  text: וַ/יִּגַּ֥שׁ שָׁא֛וּל אֶת שְׁמוּאֵ֖ל בְּ/ת֣וֹךְ הַ/שָּׁ֑עַר וַ/יֹּ֨אמֶר֙ הַגִּֽידָ/ה
    נָּ֣א לִ֔/י אֵי זֶ֖ה בֵּ֥ית הָ/רֹאֶֽה־־־׃
translation:
  text: Then Saul approached Samuel in the middle of the gate and said, “Please tell
    me where the seer’s house is.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, “the house of the seer.”
    reason: lexical_alternative
  - marker: b
    text: “Seer” is an older term for one later more commonly called a prophet; the
      narrative itself explains this in 1 Samuel 9:9.
    reason: cross_reference
lexical_decisions:
- source_word: וַיִּגַּשׁ
  chosen: approached
  alternatives:
  - came near
  - went up to
  lexicon: HALOT
  rationale: נגשׁ commonly denotes drawing near or approaching someone. 'Approached'
    is natural modern English and preserves the interpersonal movement toward Samuel.
- source_word: בְּתוֹךְ הַשָּׁעַר
  chosen: in the middle of the gate
  alternatives:
  - within the gate
  - inside the gate area
  lexicon: HALOT
  rationale: The phrase is literally 'in the midst of the gate.' In city-gate contexts,
    'gate' can refer to the gateway complex, not merely the door itself. 'In the middle
    of the gate' keeps the concrete Hebrew wording while remaining understandable.
- source_word: הַגִּידָה נָּא לִי
  chosen: Please tell me
  alternatives:
  - Tell me, please
  - Please inform me
  lexicon: HALOT
  rationale: The imperative of נגד with נָא expresses a polite request. 'Please tell
    me' captures both the command and the courteous particle in idiomatic English.
- source_word: אֵי זֶה
  chosen: where ... is
  alternatives:
  - which is
  - where
  lexicon: HALOT
  rationale: The interrogative phrase asks for location/identification in context.
    English idiom prefers 'where ... is' rather than a more wooden 'which is' when
    asking directions.
- source_word: בֵּית הָרֹאֶה
  chosen: the seer’s house
  alternatives:
  - the house of the seer
  lexicon: HALOT
  rationale: רֹאֶה is the older term for a prophet, here best rendered 'seer' to preserve
    the historical nuance already foregrounded in the chapter. The construct phrase
    is naturally rendered with the English possessive.
