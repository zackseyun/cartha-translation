id: 1SA.9.13
reference: 1 Samuel 9:13
source:
  edition: WLC
  text: כְּ/בֹאֲ/כֶ֣ם הָ/עִ֣יר כֵּ֣ן תִּמְצְא֣וּ/ן אֹת֡/וֹ בְּ/טֶרֶם֩ יַעֲלֶ֨ה הַ/בָּמָ֜תָ/ה
    לֶ/אֱכֹ֗ל כִּ֠י לֹֽא יֹאכַ֤ל הָ/עָם֙ עַד בֹּא֔/וֹ כִּֽי הוּא֙ יְבָרֵ֣ךְ הַ/זֶּ֔בַח
    אַחֲרֵי כֵ֖ן יֹאכְל֣וּ הַ/קְּרֻאִ֑ים וְ/עַתָּ֣ה עֲל֔וּ כִּֽי אֹת֥/וֹ כְ/הַ/יּ֖וֹם
    תִּמְצְא֥וּ/ן אֹתֽ/וֹ־־־־־׃
translation:
  text: As soon as you enter the city, you will find him, before he goes up to the
    high place to eat. For the people will not eat until he comes, because he is the
    one who blesses the sacrifice; afterward those who are invited eat. So go up now,
    for today you will find him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'at this time' for 'today' (Hebrew כְהַיּוֹם), emphasizing immediacy
      rather than the calendar day as such.
    reason: lexical_alternative
  - marker: b
    text: '''High place'' refers to an elevated worship site where sacrificial meals
      were held.'
    reason: cultural_note
  - marker: c
    text: '''Blesses the sacrifice'' likely means pronouncing the blessing associated
      with the sacrificial meal before the invited participants eat.'
    reason: cultural_note
lexical_decisions:
- source_word: כְּבֹאֲכֶם הָעִיר
  chosen: As soon as you enter the city
  alternatives:
  - When you enter the city
  - Upon your entering the city
  lexicon: HALOT
  rationale: The prefixed כ with infinitive construct of בוא plus suffix gives a temporal
    sense, naturally rendered 'when/as soon as you enter.' 'As soon as' fits the immediate-seeking
    context without overparaphrasing.
- source_word: כֵּן תִּמְצְאוּן אֹתוֹ
  chosen: you will find him
  alternatives:
  - then you will find him
  - so you will find him
  lexicon: HALOT
  rationale: כֵּן here functions adverbially to reinforce the certainty/immediacy
    of the result. English reads more naturally without an explicit 'then' in the
    first clause, since the temporal sequence is already clear.
- source_word: בְּטֶרֶם יַעֲלֶה
  chosen: before he goes up
  alternatives:
  - before he goes
  - before he ascends
  lexicon: HALOT
  rationale: בטרם marks prior time. עלה is literally 'go up/ascend'; 'goes up' preserves
    the directional nuance, especially appropriate with the following 'high place.'
- source_word: הַבָּמָתָה
  chosen: to the high place
  alternatives:
  - to the shrine
  - to the cultic high place
  lexicon: HALOT
  rationale: במה refers to a high place, often a sacrificial site. 'High place' is
    the standard and sufficiently transparent rendering here; more interpretive options
    like 'shrine' narrow the sense too much.
- source_word: לֶאֱכֹל
  chosen: to eat
  alternatives:
  - for the meal
  - to partake of the meal
  lexicon: HALOT
  rationale: The infinitive is straightforward. 'To eat' preserves the verbal simplicity
    of the Hebrew and allows the following explanation about the sacrificial meal
    to unfold naturally.
- source_word: לֹא יֹאכַל הָעָם
  chosen: the people will not eat
  alternatives:
  - the people do not eat
  - the people will not begin eating
  lexicon: HALOT
  rationale: Imperfect here is naturally future in context, explaining what will happen
    when Saul arrives. 'The people' is collective and contextually appropriate.
- source_word: עַד בֹּאוֹ
  chosen: until he comes
  alternatives:
  - until his coming
  - until he arrives
  lexicon: HALOT
  rationale: The infinitive construct with suffix after עד is best rendered with a
    finite English clause. 'Comes' is simple and idiomatic.
- source_word: יְבָרֵךְ הַזֶּבַח
  chosen: he is the one who blesses the sacrifice
  alternatives:
  - he blesses the sacrifice
  - he pronounces a blessing over the sacrifice
  lexicon: HALOT
  rationale: ברך with sacrifice likely refers to pronouncing the blessing associated
    with the sacrificial meal. The explicit pronoun הוא is slightly emphatic, so 'he
    is the one who blesses' preserves that emphasis better than a bare 'he blesses.'
- source_word: הַזֶּבַח
  chosen: the sacrifice
  alternatives:
  - the sacrificial meal
  - the offering
  lexicon: HALOT
  rationale: זבח denotes sacrifice, though in context it also implies the associated
    meal. Main text keeps the more direct lexical value 'sacrifice'; the meal aspect
    is already conveyed by the eating language.
- source_word: אַחֲרֵי כֵן יֹאכְלוּ
  chosen: afterward those who are invited eat
  alternatives:
  - after that the invited guests eat
  - only afterward do the invited eat
  lexicon: HALOT
  rationale: אַחֲרֵי כֵן marks sequence. English places 'afterward' first for readability
    while preserving the temporal order.
- source_word: הַקְּרֻאִים
  chosen: those who are invited
  alternatives:
  - the invited guests
  - those who have been invited
  lexicon: HALOT
  rationale: Passive participle from קרא, 'the invited ones.' 'Those who are invited'
    is transparent and avoids adding 'guests' unless necessary, though that sense
    is implicit.
- source_word: וְעַתָּה עֲלוּ
  chosen: So go up now
  alternatives:
  - And now, go up
  - Now go on up
  lexicon: HALOT
  rationale: עלה is retained as 'go up,' matching the movement toward the elevated
    cultic site. 'So' gives the inferential force of the conjunction in context.
- source_word: כִּי אֹתוֹ כְהַיּוֹם תִּמְצְאוּן אֹתוֹ
  chosen: for today you will find him
  alternatives:
  - for at this time you will find him
  - for you will find him today, yes him
  lexicon: HALOT
  rationale: כְהַיּוֹם is idiomatic for 'about now/today/at this time.' Given the
    narrative urgency, 'today' is the clearest natural English. The repeated אֹתוֹ
    adds emphasis, but reproducing both occurrences woodenly would sound unnatural;
    the certainty is conveyed by word order and context.
