id: 1SA.9.1
reference: 1 Samuel 9:1
source:
  edition: WLC
  text: וַֽ/יְהִי אִ֣ישׁ מ/בן ימין וּ֠/שְׁמ/וֹ קִ֣ישׁ בֶּן אֲבִיאֵ֞ל בֶּן צְר֧וֹר
    בֶּן בְּכוֹרַ֛ת בֶּן אֲפִ֖יחַ בֶּן אִ֣ישׁ יְמִינִ֑י גִּבּ֖וֹר חָֽיִל־־־־־־־׃
translation:
  text: Now there was a man from Benjamin, and his name was Kish son of Abiel, son
    of Zeror, son of Becorath, son of Aphiah, son of a Benjaminite, a mighty man of
    valor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a mighty warrior,' 'a prominent man,' or 'a wealthy influential man';
      the Hebrew expression can carry military, social, or economic overtones depending
      on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: Now there was
  alternatives:
  - And there was
  - There was
  lexicon: HALOT
  rationale: The wayyiqtol of היה introduces a new narrative unit. 'Now there was'
    is natural modern English that still signals narrative transition better than
    a bare 'There was.'
- source_word: אִישׁ
  chosen: a man
  alternatives:
  - someone
  lexicon: HALOT
  rationale: The noun straightforwardly denotes an individual male person here, not
    humanity in general. 'A man' preserves the gendered reference and the formal introduction
    of a character.
- source_word: מִבֶּן־יָמִין
  chosen: from Benjamin
  alternatives:
  - from the tribe of Benjamin
  - of Benjamin
  lexicon: HALOT
  rationale: The phrase identifies tribal provenance. 'From Benjamin' is concise and
    natural, while still conveying origin from the Benjaminite clan/tribe.
- source_word: וּשְׁמוֹ
  chosen: and his name was
  alternatives:
  - whose name was
  lexicon: HALOT
  rationale: This preserves the Hebrew coordination and standard naming formula. 'Whose
    name was' is possible in smoother English, but 'and his name was' stays closer
    to the source without sounding unnatural.
- source_word: קִישׁ
  chosen: Kish
  rationale: Personal name transliterated by standard English convention, following
    the translation philosophy to transliterate names rather than translate them.
- source_word: בֶּן ... בֶּן ...
  chosen: son of
  alternatives:
  - descendant of
  lexicon: HALOT
  rationale: The repeated genealogical formula is rendered consistently as 'son of.'
    While Hebrew בן can sometimes mean a more remote descendant, the genealogy style
    is best preserved with the conventional 'son of' in the main text.
- source_word: אֲבִיאֵל / צְרוֹר / בְּכוֹרַת / אֲפִיחַ
  chosen: Abiel / Zeror / Becorath / Aphiah
  rationale: These are personal names and are transliterated according to standard
    English biblical conventions.
- source_word: בֶּן־אִישׁ יְמִינִי
  chosen: son of a Benjaminite
  alternatives:
  - son of a man of Benjamin
  - son of a Benjamite
  lexicon: HALOT
  rationale: The phrase likely rounds off the genealogy by identifying the ancestral
    line as Benjaminite. 'Benjaminite' is the clearest idiomatic rendering of יְמִינִי.
    'Benjamite' is common in English, but 'Benjaminite' more transparently reflects
    the underlying name Benjamin.
- source_word: גִּבּוֹר חָיִל
  chosen: a mighty man of valor
  alternatives:
  - a mighty warrior
  - a man of standing
  - a wealthy influential man
  lexicon: HALOT
  rationale: The phrase can denote military prowess, social standing, or substantial
    capability/wealth depending on context. Here, introducing Saul's family line,
    the expression likely marks Kish as a prominent, capable man. 'A mighty man of
    valor' preserves the traditional breadth and avoids prematurely narrowing the
    sense to either purely military or purely economic status.
