id: 1SA.9.25
reference: 1 Samuel 9:25
source:
  edition: WLC
  text: וַ/יֵּרְד֥וּ מֵ/הַ/בָּמָ֖ה הָ/עִ֑יר וַ/יְדַבֵּ֥ר עִם שָׁא֖וּל עַל הַ/גָּֽג־־׃
translation:
  text: When they came down from the high place into the city, he spoke with Saul
    on the roof.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “And they came down from the high place into the city, and he spoke with
      Saul on the housetop.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּרְדוּ
  chosen: When they came down
  alternatives:
  - And they went down
  - And they came down
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. Rendering with 'When they
    came down' smooths the transition into the following singular verb in English
    while preserving the descent implied by ירד.
- source_word: מֵהַבָּמָה
  chosen: from the high place
  alternatives:
  - from the shrine
  - from the hill
  lexicon: HALOT
  rationale: בָּמָה commonly refers to a cultic high place. 'High place' is the standard
    and most transparent rendering here, preserving the likely sacrificial/cultic
    setting without overinterpreting.
- source_word: הָעִיר
  chosen: into the city
  alternatives:
  - to the city
  lexicon: HALOT
  rationale: With the preceding מן phrase and motion verb, English idiom is best expressed
    as movement from the high place into the city proper. This reflects the spatial
    sense naturally.
- source_word: וַיְדַבֵּר
  chosen: he spoke
  alternatives:
  - he talked
  - he spoke further
  lexicon: HALOT
  rationale: The verb is singular, shifting from the plural subject earlier. 'He spoke'
    preserves the simple verbal sense of דבר without adding content not present in
    the Hebrew.
- source_word: עִם שָׁאוּל
  chosen: with Saul
  alternatives:
  - to Saul
  lexicon: HALOT
  rationale: The preposition עִם normally means 'with,' suggesting conversation or
    speech in Saul's company rather than one-directional address.
- source_word: עַל הַגָּג
  chosen: on the roof
  alternatives:
  - on the housetop
  lexicon: HALOT
  rationale: גָּג denotes a flat roof area. 'On the roof' is clear modern English;
    'housetop' is possible but less natural for the target style.
