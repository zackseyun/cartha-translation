id: 1SA.9.5
reference: 1 Samuel 9:5
source:
  edition: WLC
  text: הֵ֗מָּה בָּ֚אוּ בְּ/אֶ֣רֶץ צ֔וּף וְ/שָׁא֥וּל אָמַ֛ר לְ/נַעֲר֥/וֹ אֲשֶׁר עִמּ֖/וֹ
    לְכָ֣/ה וְ/נָשׁ֑וּבָה פֶּן יֶחְדַּ֥ל אָבִ֛/י מִן הָ/אֲתֹנ֖וֹת וְ/דָ֥אַג לָֽ/נוּ־־־׃
translation:
  text: When they came into the land of Zuph, Saul said to his young man who was with
    him, “Come, let us return, lest my father stop caring about the donkeys and become
    anxious about us.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “stop worrying about the donkeys.” The Hebrew says “stop/cease from the
      donkeys,” an idiom meaning to cease being occupied with them.
    reason: lexical_alternative
  - marker: b
    text: Or “be concerned for us.”
    reason: lexical_alternative
lexical_decisions:
- source_word: בָּאוּ
  chosen: came
  alternatives:
  - entered
  - arrived
  lexicon: HALOT
  rationale: Qal perfect of בוא commonly means 'come' or 'enter.' 'Came into' fits
    the movement into a region in natural English.
- source_word: בְּאֶרֶץ צוּף
  chosen: into the land of Zuph
  alternatives:
  - to the land of Zuph
  - in the land of Zuph
  lexicon: HALOT
  rationale: With בוא plus ב, the sense is arrival into a place. 'Land of Zuph' preserves
    the geographic designation and transliterates the proper name per policy.
- source_word: נַעַר
  chosen: young man
  alternatives:
  - servant
  - boy
  - attendant
  lexicon: HALOT
  rationale: Though נַעַר can denote a servant or attendant, its basic sense is a
    youth/young man. Here the context is Saul's accompanying helper; 'young man' preserves
    the lexical sense without over-specifying social status.
- source_word: לְכָה וְנָשׁוּבָה
  chosen: Come, let us return
  alternatives:
  - Come, let us go back
  - Come, let us turn back
  lexicon: HALOT
  rationale: The imperative plus cohortative expresses an exhortation. 'Come, let
    us return' is idiomatic and retains the hortatory force.
- source_word: פֶּן
  chosen: lest
  alternatives:
  - otherwise
  - or else
  lexicon: HALOT
  rationale: פֶּן introduces a negative purpose/result clause. 'Lest' is concise and
    accurate in this warning context.
- source_word: יֶחְדַּל
  chosen: stop caring about
  alternatives:
  - cease worrying about
  - give up on
  - stop concerning himself with
  lexicon: HALOT
  rationale: חדל means 'cease, stop.' With מִן plus 'the donkeys,' the sense is that
    Saul's father may stop focusing on them. 'Stop caring about' communicates the
    shift of concern in clear English.
- source_word: מִן הָאֲתֹנוֹת
  chosen: about the donkeys
  alternatives:
  - from the donkeys
  - concerning the donkeys
  lexicon: HALOT
  rationale: After חדל, מִן marks separation from the object of concern. English idiom
    requires 'about/concerning the donkeys' rather than a wooden 'from the donkeys.'
- source_word: דָּאַג
  chosen: become anxious about
  alternatives:
  - be worried about
  - be concerned for
  lexicon: HALOT
  rationale: דאג denotes anxiety or concern. 'Become anxious about us' captures the
    emotional force and the progression from concern over the donkeys to concern over
    the searchers.
- source_word: לָנוּ
  chosen: about us
  alternatives:
  - for us
  - concerning us
  lexicon: HALOT
  rationale: The preposition ל with דאג can indicate the object of concern. In idiomatic
    English, 'about us' best conveys the father's worry.
