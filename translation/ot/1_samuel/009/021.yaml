id: 1SA.9.21
reference: 1 Samuel 9:21
source:
  edition: WLC
  text: וַ/יַּ֨עַן שָׁא֜וּל וַ/יֹּ֗אמֶר הֲ/ל֨וֹא בֶן יְמִינִ֤י אָ֨נֹכִי֙ מִ/קַּטַנֵּי֙
    שִׁבְטֵ֣י יִשְׂרָאֵ֔ל וּ/מִשְׁפַּחְתִּ/י֙ הַ/צְּעִרָ֔ה מִ/כָּֽל מִשְׁפְּח֖וֹת
    שִׁבְטֵ֣י בִנְיָמִ֑ן וְ/לָ֨/מָּה֙ דִּבַּ֣רְתָּ אֵלַ֔/י כַּ/דָּבָ֖ר הַ/זֶּֽה־־׃ס
translation:
  text: Saul answered and said, “Am I not a Benjaminite, from the smallest of the
    tribes of Israel? And is not my clan the least of all the clans of the tribe of
    Benjamin? So why have you spoken to me in this way?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Why have you spoken to me such a thing?'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲלוֹא
  chosen: Am I not ... ?
  alternatives:
  - Surely I am ... ?
  - Is it not that I am ... ?
  lexicon: HALOT
  rationale: Introduces a rhetorical question expecting agreement. English idiom is
    best captured by 'Am I not ... ?' rather than a more wooden 'Is it not ... ?'.
- source_word: בֶן־יְמִינִי
  chosen: a Benjaminite
  alternatives:
  - a son of Benjamin
  - from Benjamin
  lexicon: HALOT
  rationale: The gentilic sense is intended, identifying Saul as belonging to the
    tribe of Benjamin. 'Benjaminite' is natural modern English while preserving tribal
    identity.
- source_word: מִקַּטַנֵּי שִׁבְטֵי יִשְׂרָאֵל
  chosen: from the smallest of the tribes of Israel
  alternatives:
  - from the least of the tribes of Israel
  - from one of the smallest tribes of Israel
  lexicon: HALOT
  rationale: The comparative/superlative sense of קטן here expresses low status or
    insignificance. 'Smallest' preserves the direct force; 'least' is possible but
    can sound more interpretive. 'From' reflects the prefixed מִן indicating origin
    or membership.
- source_word: וּמִשְׁפַּחְתִּי
  chosen: my clan
  alternatives:
  - my family
  - my household
  lexicon: HALOT
  rationale: מִשְׁפָּחָה in this context refers to a kinship subdivision within the
    tribe, broader than a nuclear family but narrower than a tribe. 'Clan' best matches
    the social unit in English.
- source_word: הַצְּעִרָה
  chosen: the least
  alternatives:
  - the smallest
  - the most insignificant
  lexicon: HALOT
  rationale: The adjective conveys smallness in rank or significance. 'Least' fits
    well with social standing and avoids over-literal repetition of 'smallest' from
    the previous clause while preserving the humility contrast.
- source_word: מִכָּל מִשְׁפְּחוֹת שִׁבְטֵי בִנְיָמִן
  chosen: of all the clans of the tribe of Benjamin
  alternatives:
  - among all the families of the tribes of Benjamin
  - of all the clans of Benjamin
  lexicon: HALOT
  rationale: The phrase compares Saul's clan with the other kinship groups within
    Benjamin. The singular sense 'tribe of Benjamin' is the clearest contextual rendering
    in English, since 'tribes of Benjamin' would be misleading.
- source_word: וְלָמָּה
  chosen: So why
  alternatives:
  - And why
  - Why then
  lexicon: HALOT
  rationale: The conjunction links Saul's self-deprecating statements to his concluding
    question. 'So why' captures the inferential force in natural English.
- source_word: דִּבַּרְתָּ אֵלַי
  chosen: have you spoken to me
  alternatives:
  - did you speak to me
  - have you said to me
  lexicon: HALOT
  rationale: The perfect can be rendered idiomatically in English as present perfect
    in direct discourse. 'Spoken to me' fits the verb דבר with אֶל.
- source_word: כַּדָּבָר הַזֶּה
  chosen: in this way
  alternatives:
  - such a thing
  - according to this word
  - like this
  lexicon: HALOT
  rationale: The expression refers to the manner/content of Samuel's surprising words
    to Saul. 'In this way' is idiomatic and contextually clear; 'such a thing' is
    possible and preserved as an alternative.
