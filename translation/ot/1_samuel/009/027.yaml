id: 1SA.9.27
reference: 1 Samuel 9:27
source:
  edition: WLC
  text: הֵ֗מָּה יֽוֹרְדִים֙ בִּ/קְצֵ֣ה הָ/עִ֔יר וּ/שְׁמוּאֵ֞ל אָמַ֣ר אֶל שָׁא֗וּל
    אֱמֹ֥ר לַ/נַּ֛עַר וְ/יַעֲבֹ֥ר לְ/פָנֵ֖י/נוּ וַֽ/יַּעֲבֹ֑ר וְ/אַתָּה֙ עֲמֹ֣ד כַּ/יּ֔וֹם
    וְ/אַשְׁמִיעֲ/ךָ֖ אֶת דְּבַ֥ר אֱלֹהִֽים־־׃פ
translation:
  text: As they were going down to the edge of the city, Samuel said to Saul, “Tell
    the young man to go on ahead of us.” And he went on ahead. “But you, stand here
    now, and I will let you hear the word of God.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Tell the servant to go on ahead of us.' The Hebrew נַעַר can refer to
      a young man, attendant, or servant.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'stand now/as at this time'; the expression is idiomatic, meaning
      to stop and remain for the moment.
    reason: lexical_alternative
lexical_decisions:
- source_word: יֹרְדִים
  chosen: were going down
  alternatives:
  - were descending
  - went down
  lexicon: HALOT
  rationale: The participle gives ongoing action in narrative context; 'were going
    down' preserves the sense naturally in English. 'Going down' also fits movement
    from the high place/town area toward the outskirts.
- source_word: בִּקְצֵה הָעִיר
  chosen: to the edge of the city
  alternatives:
  - at the end of the city
  - to the outskirts of the city
  lexicon: HALOT
  rationale: קָצֶה denotes extremity/edge. 'Edge of the city' is a clear, modern rendering.
    'Outskirts' is possible but slightly more interpretive.
- source_word: אֱמֹר לַנַּעַר
  chosen: Tell the young man
  alternatives:
  - Say to the servant
  - Tell the servant
  lexicon: HALOT
  rationale: נַעַר can mean young man, boy, attendant, or servant depending on context.
    Here Saul's accompanying attendant is in view, but the lexical form itself is
    broader than 'servant'; 'young man' keeps the wording closer to the Hebrew while
    fitting the context.
- source_word: וְיַעֲבֹר לְפָנֵינוּ
  chosen: to go on ahead of us
  alternatives:
  - to pass before us
  - to go before us
  lexicon: HALOT
  rationale: עבר with לִפְנֵי conveys moving ahead in front of someone. 'Go on ahead
    of us' is idiomatic modern English and preserves the directional sense.
- source_word: וַיַּעֲבֹר
  chosen: he went on ahead
  alternatives:
  - he passed on
  - he went before them
  lexicon: HALOT
  rationale: The wayyiqtol narrates the attendant's compliance. 'He went on ahead'
    matches the prior command and keeps the narrative flow clear.
- source_word: עֲמֹד כַּיּוֹם
  chosen: stand here now
  alternatives:
  - stand still now
  - stand as at this time
  - stop here for now
  lexicon: HALOT
  rationale: The phrase כַּיּוֹם is idiomatic and difficult literally ('as today/at
    this time'). In context Samuel is telling Saul to pause in place for the present
    moment. 'Stand here now' conveys the intended force in natural English; 'here'
    is supplied contextually to make the command idiomatic.
- source_word: וְאַשְׁמִיעֲךָ
  chosen: I will let you hear
  alternatives:
  - I will make you hear
  - I will proclaim to you
  lexicon: HALOT
  rationale: The Hiphil of שׁמע is causative, literally 'cause you to hear.' 'Let
    you hear' is natural English that preserves the causative nuance without awkwardness.
- source_word: דְּבַר אֱלֹהִים
  chosen: the word of God
  alternatives:
  - the message of God
  - God's word
  lexicon: HALOT
  rationale: דָּבָר can mean word, matter, or message. In prophetic context, 'the
    word of God' is the most transparent and traditional rendering, preserving the
    revelatory weight of the phrase.
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: Here אֱלֹהִים refers to the God of Israel in singular sense; 'God' is
    the standard English rendering.
