theological_decisions:
- issue: Rendering of revelatory formula דְּבַר אֱלֹהִים
  chosen_reading: the word of God
  alternative_readings:
  - the message of God
  rationale: The phrase likely introduces divine revelation Samuel is about to disclose
    to Saul. 'The word of God' preserves the theological and prophetic resonance without
    over-interpreting the exact content.
  doctrine_reference: 'Translation philosophy: preserve theological weight without
    paraphrase.'
