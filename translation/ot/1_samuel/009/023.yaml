id: 1SA.9.23
reference: 1 Samuel 9:23
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר שְׁמוּאֵל֙ לַ/טַּבָּ֔ח תְּנָ/ה֙ אֶת הַ/מָּנָ֔ה אֲשֶׁ֥ר נָתַ֖תִּי
    לָ֑/ךְ אֲשֶׁר֙ אָמַ֣רְתִּי אֵלֶ֔י/ךָ שִׂ֥ים אֹתָ֖/הּ עִמָּֽ/ךְ־׃
translation:
  text: Then Samuel said to the cook, “Bring the portion that I gave you, the one
    I told you, ‘Set it aside with you.’”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Give the portion … keep it with you.” The Hebrew wording is more literally,
      “Give the portion that I gave you, which I said to you, ‘Put it with you.’”
    reason: lexical_alternative
lexical_decisions:
- source_word: טַּבָּח
  chosen: cook
  alternatives:
  - butcher
  - chef
  lexicon: HALOT
  rationale: The term denotes the one responsible for preparing meat/food for the
    sacrificial meal. In this banquet context, 'cook' is the most natural modern English
    rendering; 'butcher' is possible lexically but is less fitting for the immediate
    action of serving prepared food.
- source_word: תְּנָה
  chosen: Bring
  alternatives:
  - Give
  - Hand over
  lexicon: HALOT
  rationale: Although the verb is literally 'give,' in context Samuel is instructing
    the cook to present the reserved serving. 'Bring' captures the idiomatic force
    in natural English without exceeding the source sense.
- source_word: מָּנָה
  chosen: portion
  alternatives:
  - serving
  - allotted portion
  lexicon: HALOT
  rationale: The noun refers to an assigned share of food at a meal. 'Portion' is
    both accurate and idiomatic, preserving the sense of a designated share.
- source_word: אֲשֶׁר נָתַתִּי לָךְ
  chosen: that I gave you
  alternatives:
  - that I entrusted to you
  - that I assigned to you
  lexicon: HALOT
  rationale: 'The clause is straightforwardly retrospective: Samuel had previously
    given the portion to the cook. ''Gave'' preserves the plain verbal sense.'
- source_word: אֲשֶׁר אָמַרְתִּי אֵלֶיךָ
  chosen: the one I told you
  alternatives:
  - about which I told you
  - which I spoke to you about
  lexicon: HALOT
  rationale: This relative clause resumes and specifies the portion. The English restructuring
    avoids awkward repetition while preserving the referential force.
- source_word: שִׂים אֹתָהּ עִמָּךְ
  chosen: Set it aside with you
  alternatives:
  - Keep it with you
  - Put it by you
  lexicon: HALOT
  rationale: The Hebrew literally means to place/keep it with oneself. In context
    Samuel had instructed the cook to reserve it for later presentation, so 'set it
    aside with you' preserves both the literal imagery and the contextual implication
    of keeping it in reserve.
