id: 1SA.9.2
reference: 1 Samuel 9:2
source:
  edition: WLC
  text: וְ/ל/וֹ הָיָ֨ה בֵ֜ן וּ/שְׁמ֤/וֹ שָׁאוּל֙ בָּח֣וּר וָ/ט֔וֹב וְ/אֵ֥ין אִ֛ישׁ
    מִ/בְּנֵ֥י יִשְׂרָאֵ֖ל ט֣וֹב מִמֶּ֑/נּוּ מִ/שִּׁכְמ֣/וֹ וָ/מַ֔עְלָ/ה גָּבֹ֖הַּ
    מִ/כָּל הָ/עָֽם־־׃
translation:
  text: And he had a son whose name was Saul, a young man and handsome. There was
    not a man among the sons of Israel more handsome than he; from his shoulders upward
    he was taller than all the people.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'There was no man among the Israelites more good-looking than he.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'among the sons of Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בֵן
  chosen: son
  alternatives:
  - male child
  - descendant
  lexicon: HALOT
  rationale: 'The immediate familial sense is straightforward: Kish had a male offspring.
    ''Son'' is the natural and precise English equivalent.'
- source_word: וּשְׁמוֹ
  chosen: whose name was
  alternatives:
  - and his name was
  lexicon: HALOT
  rationale: This construct links 'son' with the identifying clause smoothly in English.
    'Whose name was' preserves the sense while reading naturally.
- source_word: שָׁאוּל
  chosen: Saul
  rationale: Personal names are transliterated by standard convention per translation
    philosophy.
- source_word: בָּחוּר
  chosen: young man
  alternatives:
  - choice young man
  - youth
  lexicon: HALOT
  rationale: In context the term denotes a young man in the prime of life, not merely
    a 'chosen one.' 'Young man' is idiomatic and fits the descriptive portrait of
    Saul.
- source_word: טוֹב / וָטוֹב
  chosen: handsome
  alternatives:
  - good-looking
  - fine
  - good
  lexicon: HALOT
  rationale: Here טוֹב describes physical attractiveness, as confirmed by the comparative
    statement that no man in Israel was טוֹב more than he and by the following note
    about height. 'Handsome' best captures the adjectival sense in natural English.
- source_word: וְאֵין אִישׁ מִבְּנֵי יִשְׂרָאֵל
  chosen: There was not a man among the sons of Israel
  alternatives:
  - No man among the Israelites
  - There was no man from the children of Israel
  lexicon: HALOT
  rationale: This preserves the existential Hebrew construction while keeping the
    gender-specific singular אִישׁ as 'man.' 'Sons of Israel' is retained rather than
    flattened to 'Israelites' in the main text to reflect the source wording.
- source_word: טוֹב מִמֶּנּוּ
  chosen: more handsome than he
  alternatives:
  - better than he
  - more impressive than he
  lexicon: HALOT
  rationale: The comparative use of טוֹב here continues the physical-description sense
    established earlier. English requires an explicit adjective such as 'handsome'
    rather than the vague 'better.'
- source_word: מִשִּׁכְמוֹ וָמַעְלָה
  chosen: from his shoulders upward
  alternatives:
  - from his shoulder and up
  - from the shoulder upward
  lexicon: HALOT
  rationale: This is a Hebrew idiom marking the portion of his body above shoulder
    level. The plural 'shoulders' is idiomatic in English for this body part.
- source_word: גָּבֹהַּ
  chosen: taller
  alternatives:
  - higher
  - tall
  lexicon: HALOT
  rationale: In comparison with all the people, the adjective refers to stature. English
    comparative 'taller' makes the implied comparison explicit.
- source_word: מִכָּל הָעָם
  chosen: than all the people
  alternatives:
  - than any of the people
  - than all the others
  lexicon: HALOT
  rationale: This preserves the collective comparison with the populace. 'People'
    is the most direct rendering of הָעָם here.
