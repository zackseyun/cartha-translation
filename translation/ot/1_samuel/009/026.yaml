id: 1SA.9.26
reference: 1 Samuel 9:26
source:
  edition: WLC
  text: וַ/יַּשְׁכִּ֗מוּ וַ/יְהִ֞י כַּ/עֲל֤וֹת הַ/שַּׁ֨חַר֙ וַ/יִּקְרָ֨א שְׁמוּאֵ֤ל
    אֶל שָׁאוּל֙ ה/גג לֵ/אמֹ֔ר ק֖וּמָ/ה וַ/אֲשַׁלְּחֶ֑/ךָּ וַ/יָּ֣קָם שָׁא֗וּל וַ/יֵּצְא֧וּ
    שְׁנֵי/הֶ֛ם ה֥וּא וּ/שְׁמוּאֵ֖ל הַ/חֽוּצָ/ה־׃
translation:
  text: They rose early, and when the dawn was breaking, Samuel called to Saul on
    the roof, saying, “Get up, and I will send you on your way.” So Saul got up, and
    the two of them, he and Samuel, went outside.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'at the rising of the dawn.'
    reason: lexical_alternative
  - marker: b
    text: Or 'I will send you away.' The Hebrew can mean to dismiss or send someone
      off.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּשְׁכִּמוּ
  chosen: They rose early
  alternatives:
  - They got up early
  - They arose early
  lexicon: HALOT
  rationale: The Hiphil of שׁכם commonly denotes starting early in the day. 'They
    rose early' is natural English and preserves the temporal emphasis without over-paraphrase.
- source_word: כַּעֲלוֹת הַשַּׁחַר
  chosen: when the dawn was breaking
  alternatives:
  - at the rising of the dawn
  - when dawn came up
  lexicon: HALOT
  rationale: Literally 'as the dawn was rising.' The chosen rendering is idiomatic
    modern English while preserving the image of dawn's arrival.
- source_word: הַגָּג
  chosen: on the roof
  alternatives:
  - on the rooftop
  lexicon: HALOT
  rationale: The definite noun refers to the flat roof area of the house where Saul
    had been lodging. 'On the roof' is straightforward and contextually clear.
- source_word: קוּמָה
  chosen: Get up
  alternatives:
  - Arise
  - Rise up
  lexicon: HALOT
  rationale: An imperative to stand/get up. 'Get up' is clear, contemporary English
    and fits direct speech naturally.
- source_word: וַאֲשַׁלְּחֶךָּ
  chosen: I will send you on your way
  alternatives:
  - I will send you away
  - I will let you go
  lexicon: HALOT
  rationale: שׁלח here means to send someone off or dismiss them. 'Send you on your
    way' captures the courteous departure sense better than the harsher 'send you
    away.'
- source_word: וַיֵּצְאוּ ... הַחוּצָה
  chosen: went outside
  alternatives:
  - went out
  - went out into the street
  lexicon: HALOT
  rationale: The verb plus directional adverb means they went out/outside. 'Went outside'
    is idiomatic and avoids over-specifying the destination.
- source_word: שְׁנֵיהֶם הוּא וּשְׁמוּאֵל
  chosen: the two of them, he and Samuel
  alternatives:
  - both of them, Saul and Samuel
  - the two of them, Saul and Samuel
  lexicon: HALOT
  rationale: 'The Hebrew apposition is somewhat emphatic: ''the two of them, he and
    Samuel.'' Retaining ''he and Samuel'' reflects the Hebrew structure, with the
    pronoun naturally referring back to Saul.'
