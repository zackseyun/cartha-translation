id: 1SA.9.4
reference: 1 Samuel 9:4
source:
  edition: WLC
  text: וַ/יַּעֲבֹ֧ר בְּ/הַר אֶפְרַ֛יִם וַ/יַּעֲבֹ֥ר בְּ/אֶֽרֶץ שָׁלִ֖שָׁה וְ/לֹ֣א
    מָצָ֑אוּ וַ/יַּעַבְר֤וּ בְ/אֶֽרֶץ שַׁעֲלִים֙ וָ/אַ֔יִן וַ/יַּעֲבֹ֥ר בְּ/אֶֽרֶץ
    יְמִינִ֖י וְ/לֹ֥א מָצָֽאוּ־־־־׃
translation:
  text: He passed through the hill country of Ephraim and passed through the land
    of Shalishah, but they did not find them. Then they passed through the land of
    Shaalim, but they were not there. He passed through the land of Benjamin, but
    they did not find them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''did not find them''; the object ''them'' refers to the lost donkeys
      from the preceding context.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew: ''and there was not'' or ''and there was nothing,'' an elliptical
      expression meaning the donkeys were not there.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲבֹר / וַיַּעַבְרוּ
  chosen: passed through
  alternatives:
  - went through
  - crossed through
  - traveled through
  lexicon: HALOT
  rationale: The verb עבר with בְ marks movement through a region. 'Passed through'
    is natural modern English and preserves the sense of traversing successive territories
    in search.
- source_word: בְּהַר אֶפְרַיִם
  chosen: the hill country of Ephraim
  alternatives:
  - the hill of Ephraim
  - the mountains of Ephraim
  lexicon: HALOT
  rationale: הַר in regional expressions often denotes hill country rather than a
    single hill. 'Hill country of Ephraim' is the standard geographic sense and best
    fits the itinerary.
- source_word: אֶרֶץ שָׁלִשָׁה
  chosen: the land of Shalishah
  alternatives:
  - the region of Shalishah
  lexicon: HALOT
  rationale: אֶרֶץ here refers to a named territory. 'Land of Shalishah' preserves
    the place-name and geographic force without overinterpreting its exact political
    status.
- source_word: וְלֹא מָצָאוּ
  chosen: but they did not find them
  alternatives:
  - and they did not find them
  - but they did not find [the donkeys]
  lexicon: HALOT
  rationale: The plural verb reflects Saul and his servant together. The object is
    implicit from context, namely the lost donkeys from the previous verse; English
    requires an object, so 'them' is supplied. 'But' captures the adversative sense
    in the search sequence.
- source_word: אֶרֶץ שַׁעֲלִים
  chosen: the land of Shaalim
  alternatives:
  - the region of Shaalim
  lexicon: HALOT
  rationale: As with Shalishah, this is best rendered as a territorial place-name.
    The transliteration follows standard convention for Hebrew names.
- source_word: וָאַיִן
  chosen: but they were not there
  alternatives:
  - and there was nothing
  - but there was nothing
  - and they were not there
  lexicon: HALOT
  rationale: The terse Hebrew literally means 'and there was not/there was nothing.'
    In context it refers elliptically to the sought animals not being present. 'They
    were not there' makes the implied sense explicit in idiomatic English.
- source_word: אֶרֶץ יְמִינִי
  chosen: the land of Benjamin
  alternatives:
  - the land of the Benjaminites
  - the land of the Benjaminite
  lexicon: HALOT
  rationale: יְמִינִי is an adjectival/gentilic form related to Benjamin. In this
    geographic context, 'the land of Benjamin' is the clearest and most idiomatic
    rendering.
