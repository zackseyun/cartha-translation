id: 1SA.9.19
reference: 1 Samuel 9:19
source:
  edition: WLC
  text: וַ/יַּ֨עַן שְׁמוּאֵ֜ל אֶת שָׁא֗וּל וַ/יֹּ֨אמֶר֙ אָנֹכִ֣י הָ/רֹאֶ֔ה עֲלֵ֤ה
    לְ/פָנַ/י֙ הַ/בָּמָ֔ה וַ/אֲכַלְתֶּ֥ם עִמִּ֖/י הַ/יּ֑וֹם וְ/שִׁלַּחְתִּ֣י/ךָ בַ/בֹּ֔קֶר
    וְ/כֹ֛ל אֲשֶׁ֥ר בִּֽ/לְבָבְ/ךָ֖ אַגִּ֥יד לָֽ/ךְ־׃
translation:
  text: Samuel answered Saul and said, “I am the seer. Go up before me to the high
    place, and you shall eat with me today. In the morning I will send you on your
    way, and I will tell you all that is in your heart.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'you shall eat' is plural, likely including Saul's servant as well
      as Saul himself.
    reason: lexical_alternative
  - marker: b
    text: Or 'the prophet.' The Hebrew uses the older term 'seer,' which 1 Samuel
      9:9 explains as an earlier designation for a prophet.
    reason: alternative_reading
lexical_decisions:
- source_word: הָרֹאֶה
  chosen: the seer
  alternatives:
  - the prophet
  lexicon: HALOT
  rationale: The noun literally denotes 'the one who sees' and in this historical
    context refers to an older term for a prophetic figure (cf. 1 Sam 9:9). 'Seer'
    preserves the source term and the narrative's period flavor better than flattening
    it to 'prophet'.
- source_word: הַבָּמָה
  chosen: the high place
  alternatives:
  - the shrine
  lexicon: HALOT
  rationale: במה commonly refers to a cultic height or worship site. 'High place'
    is the standard and sufficiently transparent rendering; 'shrine' is interpretive
    and less tied to the Hebrew imagery.
- source_word: עֲלֵה לְפָנַי
  chosen: Go up before me
  alternatives:
  - Come up ahead of me
  - Go up in front of me
  lexicon: HALOT
  rationale: The imperative plus prepositional phrase is spatially straightforward.
    'Go up before me' keeps the upward movement to the elevated site and the relative
    position without overinterpreting whether Saul is to lead or simply precede Samuel.
- source_word: וַאֲכַלְתֶּם עִמִּי הַיּוֹם
  chosen: and you shall eat with me today
  alternatives:
  - and eat with me today
  - and you will eat with me today
  lexicon: HALOT
  rationale: The form is second masculine plural, likely addressing Saul together
    with his servant, even though Saul is the primary addressee. Rendering with singular
    'you' in English would obscure the plural; however, contemporary English 'you
    shall eat' can naturally cover the invitation. The plural nuance is worth preserving
    in a footnote.
- source_word: וְשִׁלַּחְתִּיךָ
  chosen: I will send you on your way
  alternatives:
  - I will send you away
  - I will dismiss you
  lexicon: HALOT
  rationale: The verb means 'send,' and in this context refers to releasing Saul to
    depart the next morning. 'Send you on your way' communicates the idiomatic sense
    in natural English without implying rejection.
- source_word: בַבֹּקֶר
  chosen: In the morning
  alternatives:
  - tomorrow morning
  lexicon: HALOT
  rationale: The Hebrew explicitly says 'in the morning.' Since the meal is 'today,'
    English readers will infer the next morning; adding 'tomorrow' would be slightly
    more explicit than the source.
- source_word: וְכֹל אֲשֶׁר בִּלְבָבְךָ
  chosen: all that is in your heart
  alternatives:
  - everything on your mind
  - all that is in your mind
  lexicon: HALOT
  rationale: לבב often denotes the inner person, including thoughts and intentions.
    'In your heart' preserves the Hebrew anthropological expression; a more idiomatic
    alternative like 'on your mind' is possible but less textually transparent.
- source_word: אַגִּיד לָךְ
  chosen: I will tell you
  alternatives:
  - I will declare to you
  - I will make known to you
  lexicon: HALOT
  rationale: The Hiphil of נגד conveys making something known. 'Tell' is natural modern
    English and adequate in this conversational setting.
