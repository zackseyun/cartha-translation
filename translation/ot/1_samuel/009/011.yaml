id: 1SA.9.11
reference: 1 Samuel 9:11
source:
  edition: WLC
  text: הֵ֗מָּה עֹלִים֙ בְּ/מַעֲלֵ֣ה הָ/עִ֔יר וְ/הֵ֨מָּה֙ מָצְא֣וּ נְעָר֔וֹת יֹצְא֖וֹת
    לִ/שְׁאֹ֣ב מָ֑יִם וַ/יֹּאמְר֣וּ לָ/הֶ֔ן הֲ/יֵ֥שׁ בָּ/זֶ֖ה הָ/רֹאֶֽה׃
translation:
  text: As they were going up the ascent to the city, they found young women coming
    out to draw water, and they said to them, “Is the seer here?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the prophet.' The Hebrew specifically says 'the seer,' an older term
      for one later called a prophet.
    reason: lexical_alternative
lexical_decisions:
- source_word: עֹלִים
  chosen: were going up
  alternatives:
  - were ascending
  - went up
  lexicon: HALOT
  rationale: The participle with the pronoun הֵמָּה gives ongoing action in narrative
    context; 'were going up' captures the progressive sense naturally in English.
- source_word: בְּמַעֲלֵה הָעִיר
  chosen: the ascent to the city
  alternatives:
  - the uphill way to the city
  - the slope of the city
  lexicon: HALOT
  rationale: מַעֲלֶה denotes an ascent or uphill approach. 'The ascent to the city'
    preserves the concrete topographical sense without awkwardness.
- source_word: מָצְאוּ
  chosen: they found
  alternatives:
  - they met
  - they encountered
  lexicon: HALOT
  rationale: The basic sense is 'found'; in context it implies encountering people
    on the way, but the more literal rendering is still clear.
- source_word: נְעָרוֹת
  chosen: young women
  alternatives:
  - girls
  - maidens
  lexicon: HALOT
  rationale: The term refers to female youths. 'Young women' is natural modern English
    and avoids the potentially too-young sense of 'girls' and the archaic tone of
    'maidens'.
- source_word: יֹצְאוֹת לִשְׁאֹב מָיִם
  chosen: coming out to draw water
  alternatives:
  - going out to draw water
  lexicon: HALOT
  rationale: 'The participle plus infinitive expresses purpose: they were in the act
    of coming out in order to draw water. ''Coming out to draw water'' fits the encounter
    from Saul''s perspective.'
- source_word: הֲיֵשׁ בָּזֶה
  chosen: Is ... here?
  alternatives:
  - Is ... in this place?
  - Is ... around here?
  lexicon: HALOT
  rationale: The idiom asks whether someone is present in that place. 'Here' is the
    most idiomatic concise English equivalent.
- source_word: הָרֹאֶה
  chosen: the seer
  alternatives:
  - the prophet
  lexicon: HALOT
  rationale: The Hebrew specifically uses 'the seer,' an older designation for a prophet
    in this context. Retaining 'seer' preserves the narrative's historical terminology,
    especially in light of the explanation in the following verse.
