id: 1SA.9.3
reference: 1 Samuel 9:3
source:
  edition: WLC
  text: וַ/תֹּאבַ֨דְנָה֙ הָ/אֲתֹנ֔וֹת לְ/קִ֖ישׁ אֲבִ֣י שָׁא֑וּל וַ/יֹּ֨אמֶר קִ֜ישׁ
    אֶל שָׁא֣וּל בְּנ֗/וֹ קַח נָ֤א אִתְּ/ךָ֙ אֶת אַחַ֣ד מֵֽ/הַ/נְּעָרִ֔ים וְ/ק֣וּם
    לֵ֔ךְ בַּקֵּ֖שׁ אֶת הָ/אֲתֹנֹֽת־־־־׃
translation:
  text: Now the donkeys belonging to Kish, Saul’s father, were lost. So Kish said
    to Saul his son, “Please take with you one of the young men, and get up, go, look
    for the donkeys.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''she-donkeys.'' The broader English ''donkeys'' is used because
      the animals’ sex is not emphasized in this context.'
    reason: lexical_alternative
  - marker: b
    text: Or 'one of the servants' / 'one of the attendants' for 'one of the young
      men.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתֹּאבַדְנָה
  chosen: were lost
  alternatives:
  - went missing
  - strayed away
  - perished
  lexicon: HALOT
  rationale: From אבד in the Niphal-like/passive sense here, referring to animals
    no longer being found. 'Were lost' is the most natural English rendering and avoids
    implying death ('perished') or over-specifying agency.
- source_word: הָאֲתֹנוֹת
  chosen: the donkeys
  alternatives:
  - the she-donkeys
  lexicon: HALOT
  rationale: The Hebrew specifically denotes female donkeys. In English narrative,
    'donkeys' is idiomatic and sufficient unless the sex is contextually important.
    The article is preserved by 'the donkeys.'
- source_word: לְקִישׁ
  chosen: belonging to Kish
  alternatives:
  - of Kish
  - for Kish
  lexicon: HALOT
  rationale: The lamed marks possession/association in context. 'Belonging to Kish'
    makes the possessive relationship explicit in natural English.
- source_word: אֲבִי שָׁאוּל
  chosen: Saul’s father
  alternatives:
  - the father of Saul
  lexicon: HALOT
  rationale: Construct chain rendered idiomatically in English as a possessive.
- source_word: וַיֹּאמֶר
  chosen: said
  alternatives:
  - told
  lexicon: HALOT
  rationale: Standard narrative wayyiqtol of אמר. 'Said' is the default and keeps
    close to the source.
- source_word: בְּנוֹ
  chosen: his son
  lexicon: HALOT
  rationale: Straightforward filial designation; retained for clarity and to mirror
    the Hebrew apposition.
- source_word: קַח נָא אִתְּךָ
  chosen: Please take with you
  alternatives:
  - Take now with you
  - Take with you, please
  lexicon: HALOT
  rationale: קח is imperative 'take'; נָא softens the command and is well represented
    by 'please.' 'With you' preserves אִתְּךָ.
- source_word: אַחַד מֵהַנְּעָרִים
  chosen: one of the young men
  alternatives:
  - one of the servants
  - one of the attendants
  lexicon: HALOT
  rationale: נְעָרִים can denote youths, servants, or attendants depending on context.
    Here these are household retainers accompanying Saul. 'Young men' is the more
    literal choice and leaves the social role less interpretively loaded than 'servants.'
- source_word: וְקוּם לֵךְ
  chosen: get up, go
  alternatives:
  - arise, go
  - go at once
  lexicon: HALOT
  rationale: The paired imperatives convey immediate action. 'Get up, go' preserves
    the two verbs in readable modern English.
- source_word: בַּקֵּשׁ
  chosen: look for
  alternatives:
  - seek
  - search for
  lexicon: HALOT
  rationale: בקש commonly means seek/search for. 'Look for' is natural modern English
    in this practical context.
