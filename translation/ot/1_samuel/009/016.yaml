theological_decisions:
- issue: Rendering נָגִיד in relation to Saul's office
  chosen_reading: ruler
  alternative_readings:
  - leader
  - prince
  rationale: The term marks Saul as divinely appointed over Israel but does not require
    importing later doctrinal or monarchical precision beyond the Hebrew. 'Ruler'
    preserves the political authority while avoiding the potentially misleading modern
    sense of 'prince.'
  doctrine_reference: Translation philosophy §1, §5
- issue: Collective singular suffix in צַעֲקָתוֹ
  chosen_reading: their cry
  alternative_readings:
  - his cry
  rationale: The Hebrew singular suffix refers back to the collective noun 'my people.'
    Rendering it as 'their cry' communicates the intended referent in readable modern
    English while preserving the corporate lament in view.
  doctrine_reference: Translation philosophy §6
