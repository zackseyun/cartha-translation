id: 1SA.9.16
reference: 1 Samuel 9:16
source:
  edition: WLC
  text: כָּ/עֵ֣ת מָחָ֡ר אֶשְׁלַח֩ אֵלֶ֨י/ךָ אִ֜ישׁ מֵ/אֶ֣רֶץ בִּנְיָמִ֗ן וּ/מְשַׁחְתּ֤/וֹ
    לְ/נָגִיד֙ עַל עַמִּ֣/י יִשְׂרָאֵ֔ל וְ/הוֹשִׁ֥יעַ אֶת עַמִּ֖/י מִ/יַּ֣ד פְּלִשְׁתִּ֑ים
    כִּ֤י רָאִ֨יתִי֙ אֶת עַמִּ֔/י כִּ֛י בָּ֥אָה צַעֲקָת֖/וֹ אֵלָֽ/י׀־־־׃
translation:
  text: About this time tomorrow I will send to you a man from the land of Benjamin,
    and you shall anoint him as ruler over my people Israel. He will save my people
    from the hand of the Philistines, for I have seen my people, because their cry
    has come to me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew ''as nagid''; also possible: ''leader'' or traditionally ''prince.''
      The term denotes one appointed to govern, not merely a ceremonial figure.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew literally 'his cry has come to me,' with a singular suffix referring
      to the collective noun 'my people.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּעֵת מָחָר
  chosen: About this time tomorrow
  alternatives:
  - At this time tomorrow
  - Tomorrow about this time
  lexicon: HALOT
  rationale: The idiom combines כ + עֵת with מָחָר to indicate a point roughly 24
    hours later. 'About this time tomorrow' is natural English and preserves the temporal
    specificity without woodenness.
- source_word: אֶשְׁלַח אֵלֶיךָ
  chosen: I will send to you
  alternatives:
  - I will send to you
  - I will send you
  lexicon: HALOT
  rationale: The Hebrew explicitly includes the preposition אֶל, 'to/toward you.'
    'I will send to you' preserves the directional nuance more closely, though idiomatic
    English could shorten to 'send you.'
- source_word: אִישׁ
  chosen: a man
  alternatives:
  - someone
  lexicon: HALOT
  rationale: The noun is singular and masculine, referring to a specific male individual
    (Saul). 'A man' is both accurate and natural; a more generic rendering like 'someone'
    would lose the lexical specificity.
- source_word: מֵאֶרֶץ בִּנְיָמִן
  chosen: from the land of Benjamin
  alternatives:
  - from Benjamin
  - from the territory of Benjamin
  lexicon: HALOT
  rationale: אֶרֶץ here denotes land/territory. 'From the land of Benjamin' preserves
    the geographic sense and avoids flattening the phrase to a mere tribal label.
- source_word: וּמְשַׁחְתּוֹ
  chosen: and you shall anoint him
  alternatives:
  - and anoint him
  lexicon: HALOT
  rationale: The waw plus perfect in this divine instruction carries an injunctive/future
    force addressed to Samuel. 'You shall anoint him' communicates the command clearly
    in English.
- source_word: לְנָגִיד
  chosen: as ruler
  alternatives:
  - as leader
  - as prince
  lexicon: HALOT
  rationale: נָגִיד often denotes one appointed to lead, especially in royal contexts,
    but is not identical in nuance to the later full title 'king.' 'Ruler' preserves
    the governing role without over-specifying. 'Prince' is traditional but misleading
    in modern English; 'leader' is possible but slightly weaker politically.
- source_word: עַל עַמִּי יִשְׂרָאֵל
  chosen: over my people Israel
  alternatives:
  - over my people, Israel
  lexicon: HALOT
  rationale: A straightforward rendering of divine possession and national identity.
    No expansion is needed.
- source_word: וְהוֹשִׁיעַ
  chosen: He will save
  alternatives:
  - and he will deliver
  - that he may save
  lexicon: HALOT
  rationale: From יָשַׁע, denoting rescue/deliverance. 'Save' is concise and preserves
    the theological resonance of divine rescue mediated through the appointed leader.
    The form functions here as a future consequence/purpose of the appointment.
- source_word: מִיַּד פְּלִשְׁתִּים
  chosen: from the hand of the Philistines
  alternatives:
  - from the power of the Philistines
  lexicon: HALOT
  rationale: '''Hand'' is a common Hebrew idiom for power/control. Retaining ''from
    the hand of'' preserves the imagery and remains understandable in English.'
- source_word: כִּי רָאִיתִי אֶת עַמִּי
  chosen: for I have seen my people
  alternatives:
  - for I have looked upon my people
  - because I have seen my people
  lexicon: HALOT
  rationale: The clause gives the reason for God's action. 'I have seen my people'
    preserves the directness of the Hebrew and the covenantal sense of divine notice.
- source_word: כִּי בָּאָה צַעֲקָתוֹ אֵלָי
  chosen: because their cry has come to me
  alternatives:
  - for his cry has come to me
  - because its cry has come to me
  lexicon: HALOT
  rationale: Although the suffix on צַעֲקָתוֹ is singular ('his cry'), the antecedent
    is collective 'my people.' English commonly renders such collective reference
    with 'their' for clarity. This preserves the sense without forcing an awkward
    singular collective in English.
