theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Sense of יַעְצֹר in relation to Saul's kingship
  chosen_reading: shall rule over my people
  alternative_readings:
  - shall restrain my people
  - shall govern my people
  rationale: The verse identifies Saul as the man previously designated for leadership. In context, the verb points to royal control/governance rather than merely physical restraint. 'Rule over' communicates that function without importing later theological claims about kingship beyond the immediate context.
