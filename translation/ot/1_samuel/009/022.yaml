id: 1SA.9.22
reference: 1 Samuel 9:22
source:
  edition: WLC
  text: וַ/יִּקַּ֤ח שְׁמוּאֵל֙ אֶת שָׁא֣וּל וְ/אֶֽת נַעֲר֔/וֹ וַ/יְבִיאֵ֖/ם לִשְׁכָּ֑תָ/ה
    וַ/יִּתֵּ֨ן לָ/הֶ֤ם מָקוֹם֙ בְּ/רֹ֣אשׁ הַ/קְּרוּאִ֔ים וְ/הֵ֖מָּה כִּ/שְׁלֹשִׁ֥ים
    אִֽישׁ־־׃
translation:
  text: Then Samuel took Saul and his young man and brought them into the hall, and
    gave them a place at the head of those who had been invited; and they were about
    thirty men.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his servant' or 'his attendant' for 'his young man.'
    reason: lexical_alternative
  - marker: b
    text: Or 'into the chamber.' The Hebrew term can refer to a room or chamber, but
      here likely denotes a larger banquet space.
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'and they were about thirty men,' likely referring to the invited
      guests present.
    reason: lexical_alternative
lexical_decisions:
- source_word: נַעֲרוֹ
  chosen: his young man
  alternatives:
  - his servant
  - his attendant
  lexicon: HALOT
  rationale: נַעַר can denote a youth, servant, or attendant depending on context.
    Here it refers to Saul's accompanying subordinate from the narrative context.
    'Young man' preserves the lexical sense without over-specifying servile status,
    while remaining natural in English.
- source_word: לִשְׁכָּתָה
  chosen: into the hall
  alternatives:
  - into the chamber
  - into the room
  lexicon: HALOT
  rationale: לִשְׁכָּה often denotes a chamber, room, or hall associated with an official
    or cultic setting. In this banquet context, 'hall' best conveys a larger dining
    space rather than a small private room.
- source_word: מָקוֹם
  chosen: a place
  alternatives:
  - a seat
  - a position
  lexicon: HALOT
  rationale: The noun literally means 'place.' In context it refers to seating arrangement
    at a meal. 'A place' keeps the Hebrew wording while naturally implying a seat.
- source_word: בְּרֹאשׁ
  chosen: at the head
  alternatives:
  - at the chief place
  - in the foremost place
  lexicon: HALOT
  rationale: The idiom 'at the head' expresses prominence or honor. It fits the banquet
    setting and preserves the metaphor of leading position.
- source_word: הַקְּרוּאִים
  chosen: those who had been invited
  alternatives:
  - the invited guests
  - those summoned
  lexicon: HALOT
  rationale: The passive participle from קרא means those called/invited. In a feast
    context, 'those who had been invited' is clear and faithful.
- source_word: וְהֵמָּה כִּשְׁלֹשִׁים אִישׁ
  chosen: and they were about thirty men
  alternatives:
  - now they were about thirty persons
  - and there were about thirty men
  lexicon: HALOT
  rationale: The clause most naturally refers to the invited group just mentioned,
    giving their approximate number. 'They were about thirty men' follows the Hebrew
    structure closely, though English could also smooth it as 'there were about thirty
    men.' 'Men' is retained as gender-accurate to אִישׁ per translation policy.
- source_word: וַיִּקַּח
  chosen: took
  alternatives:
  - received
  - escorted
  lexicon: HALOT
  rationale: The verb לקח is the common 'take.' In narrative sequence, 'took' is idiomatic
    and sufficiently broad, with the following verb 'brought' clarifying the action.
- source_word: וַיְבִיאֵם
  chosen: brought them
  alternatives:
  - led them in
  - brought them in
  lexicon: HALOT
  rationale: The hiphil of בוא means to bring/lead in. 'Brought them' is straightforward;
    the destination phrase 'into the hall' supplies the inward movement.
