theological_decisions:
- issue: Rendering of במה in a pre-monarchic sacrificial context
  chosen_reading: the high place
  alternative_readings:
  - the shrine on the height
  - the hilltop sanctuary
  rationale: The term refers to a recognized worship site prior to the temple. Translating
    it as 'high place' preserves the cultic and historical texture without importing
    later polemical judgments into this verse.
