id: 1SA.9.24
reference: 1 Samuel 9:24
source:
  edition: WLC
  text: וַ/יָּ֣רֶם הַ֠/טַּבָּח אֶת הַ/שּׁ֨וֹק וְ/הֶ/עָלֶ֜י/הָ וַ/יָּ֣שֶׂם לִ/פְנֵ֣י
    שָׁא֗וּל וַ/יֹּ֨אמֶר֙ הִנֵּ֤ה הַ/נִּשְׁאָר֙ שִׂים לְ/פָנֶ֣י/ךָ אֱכֹ֔ל כִּ֧י לַ/מּוֹעֵ֛ד
    שָֽׁמוּר לְ/ךָ֥ לֵ/אמֹ֖ר הָ/עָ֣ם קָרָ֑אתִי וַ/יֹּ֧אכַל שָׁא֛וּל עִם שְׁמוּאֵ֖ל
    בַּ/יּ֥וֹם הַ/הֽוּא־׀־־׀־׃
translation:
  text: So the cook lifted up the leg, with what was on it, and set it before Saul.
    And he said, “Look, what has been kept is set before you. Eat, because it was
    kept for you for the appointed time, when I said, ‘I have invited the people.’”
    So Saul ate with Samuel that day.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the thigh'; Hebrew שׁוֹק refers to the leg portion of the animal.
    reason: lexical_alternative
  - marker: b
    text: Hebrew literally, 'the leg and what was on it.' The accompanying portion
      is not explicitly identified in the text.
    reason: lexical_alternative
  - marker: c
    text: Or 'what remains.' The Hebrew can mean either what was left over or what
      had been reserved; the context favors the sense of a portion specially kept
      for Saul.
    reason: alternative_reading
  - marker: d
    text: Or 'I have called the people.' In this meal setting, 'invited' brings out
      the likely sense of the Hebrew verb.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַטַּבָּח
  chosen: the cook
  alternatives:
  - the butcher
  lexicon: HALOT
  rationale: The noun denotes the one preparing and serving the meat at the sacrificial
    meal. 'Cook' fits the banquet context more naturally in modern English, while
    'butcher' is possible but less fitting for the serving action in this verse.
- source_word: הַשּׁוֹק
  chosen: the leg
  alternatives:
  - the thigh
  - the shank
  lexicon: HALOT
  rationale: The term refers to the animal's leg portion. 'Leg' is clear modern English;
    'thigh' is traditional and possible, but 'leg' better covers the cut without over-specifying.
- source_word: וְהֶעָלֶיהָ
  chosen: with what was on it
  alternatives:
  - and what was upon it
  - and the fat tail with it
  lexicon: HALOT
  rationale: The phrase literally means 'and upon it/her.' In context it most naturally
    refers to the portion accompanying the leg. Some interpreters identify it more
    specifically, but the Hebrew here does not explicitly name the item, so the translation
    preserves the broader sense.
- source_word: הַנִּשְׁאָר
  chosen: what has been kept
  alternatives:
  - what remains
  - the reserved portion
  lexicon: HALOT
  rationale: Although the participle can mean 'what remains/is left over,' the immediate
    context explains that this portion had been specially kept for Saul. Rendering
    it as 'what has been kept' brings out that contextual force without adding more
    than the text implies.
- source_word: שִׂים לְפָנֶיךָ
  chosen: is set before you
  alternatives:
  - put it before yourself
  - set it before you
  lexicon: HALOT
  rationale: The Hebrew imperative may function idiomatically here in the sense of
    placing the portion before Saul for eating. In English, a passive-like expression
    reads naturally and matches the scene. This avoids an awkward literal imperative
    while preserving the action.
- source_word: לַמּוֹעֵד
  chosen: for the appointed time
  alternatives:
  - for the appointed occasion
  - for this occasion
  - for the feast time
  lexicon: HALOT
  rationale: מוֹעֵד commonly denotes an appointed time or occasion. 'Appointed time'
    preserves the intentionality of Samuel's prior arrangement without narrowing it
    to a technical festival term.
- source_word: שָׁמוּר לְךָ
  chosen: it was kept for you
  alternatives:
  - it was reserved for you
  - it was preserved for you
  lexicon: HALOT
  rationale: The passive participle from שמר indicates that the portion had been specially
    set aside. 'Kept for you' is natural and faithful; 'reserved for you' is also
    strong but slightly more interpretive.
- source_word: לֵאמֹר הָעָם קָרָאתִי
  chosen: when I said, ‘I have invited the people’
  alternatives:
  - saying, 'I have invited the people'
  - because I said, 'I have called the people'
  lexicon: HALOT
  rationale: קרא can mean 'call' or 'invite' depending on context. Here a meal context
    favors 'invite.' The infinitive לֵאמֹר is somewhat compressed in Hebrew; 'when
    I said' makes good English sense while preserving the quoted explanation.
- source_word: עִם שְׁמוּאֵל
  chosen: with Samuel
  alternatives:
  - in Samuel's company
  lexicon: HALOT
  rationale: The preposition simply indicates shared table fellowship. 'With Samuel'
    is direct and sufficient.
