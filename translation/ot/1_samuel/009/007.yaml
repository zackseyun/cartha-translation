id: 1SA.9.7
reference: 1 Samuel 9:7
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר שָׁא֜וּל לְ/נַעֲר֗/וֹ וְ/הִנֵּ֣ה נֵלֵךְ֮ וּ/מַה נָּבִ֣יא לָ/אִישׁ֒
    כִּ֤י הַ/לֶּ֨חֶם֙ אָזַ֣ל מִ/כֵּלֵ֔י/נוּ וּ/תְשׁוּרָ֥ה אֵין לְ/הָבִ֖יא לְ/אִ֣ישׁ
    הָ/אֱלֹהִ֑ים מָ֖ה אִתָּֽ/נוּ־־׃
translation:
  text: Then Saul said to his young man, “But look, if we go, what can we bring to
    the man? For the bread is gone from our bags, and there is no gift to bring to
    the man of God. What do we have?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the bread is spent from our vessels/containers.' The Hebrew uses 'bread'
      concretely and 'vessels' for the containers holding their provisions.
    reason: lexical_alternative
  - marker: b
    text: Or 'present' for 'gift.' The Hebrew term refers to something brought to
      a respected person.
    reason: lexical_alternative
lexical_decisions:
- source_word: נַעַר
  chosen: young man
  alternatives:
  - servant
  - boy
  lexicon: HALOT
  rationale: In this narrative context Saul is speaking to his attendant, but נַעַר
    often denotes a youth or young attendant rather than a household slave. 'Young
    man' preserves the age-related nuance without overcommitting to servant-status,
    which is already clear from context.
- source_word: וְהִנֵּה
  chosen: But look
  alternatives:
  - behold
  - look
  - now
  lexicon: HALOT
  rationale: The particle draws attention and marks a practical objection. 'But look'
    captures both the deictic force and the mild adversative sense in natural English.
    'Behold' would be too archaic for the stated translation philosophy.
- source_word: נֵלֵךְ
  chosen: we go
  alternatives:
  - we should go
  - we are going
  lexicon: HALOT
  rationale: The imperfect here is used in a conditional-like clause after 'if.' 'We
    go' is idiomatic in English in this construction and keeps the sense straightforward.
- source_word: נָּבִיא
  chosen: bring
  alternatives:
  - take
  - carry
  lexicon: HALOT
  rationale: The Hiphil of בוא here means 'bring' in the sense of bringing something
    along to someone. 'Bring' best fits the following indirect object and the social
    context of presenting something to the seer/man of God.
- source_word: לָאִישׁ
  chosen: to the man
  alternatives:
  - to the person
  lexicon: HALOT
  rationale: The Hebrew is singular masculine and refers specifically to Samuel. 'The
    man' preserves the wording, while the later apposition 'man of God' clarifies
    who is meant.
- source_word: לֶחֶם
  chosen: bread
  alternatives:
  - food
  - provisions
  lexicon: HALOT
  rationale: The plain lexical sense is 'bread.' Although it may function metonymically
    for provisions, the text specifically says 'the bread,' so the main text keeps
    the concrete term.
- source_word: אָזַל
  chosen: is gone
  alternatives:
  - is spent
  - has run out
  lexicon: HALOT
  rationale: The verb denotes being exhausted or used up. 'Is gone' is natural modern
    English and preserves the idea that their supply has been depleted.
- source_word: כְּלִי
  chosen: bags
  alternatives:
  - vessels
  - containers
  - supplies
  lexicon: HALOT
  rationale: Literally the term is 'vessels/containers,' but in travel context it
    refers to what they carry their provisions in. 'Bags' communicates the concrete
    sense in readable English better than the overly formal 'vessels.'
- source_word: תְּשׁוּרָה
  chosen: gift
  alternatives:
  - present
  - offering
  lexicon: HALOT
  rationale: The noun denotes a gift or present brought to someone. 'Gift' is the
    clearest modern equivalent. 'Offering' could imply cultic overtones not required
    by the context.
- source_word: אִישׁ הָאֱלֹהִים
  chosen: the man of God
  alternatives:
  - the prophet
  - God's man
  lexicon: HALOT
  rationale: This is a recognized Hebrew title for a divinely commissioned figure.
    'The man of God' preserves the title literally and avoids collapsing it into 'prophet,'
    which, though contextually true, is not the phrase used here.
- source_word: מָה אִתָּנוּ
  chosen: What do we have?
  alternatives:
  - What is with us?
  - What is in our possession?
  lexicon: HALOT
  rationale: The idiom asks what they have available with them. 'What do we have?'
    is the most natural English rendering while preserving the practical sense of
    available resources.
