theological_decisions:
- issue: Meaning of Samuel's statement about 'the desire of Israel'
  chosen_reading: A deliberately elevated, somewhat ambiguous rhetorical statement
    pointing to Saul and his family as the object/recipient of Israel's longing or
    what is desirable in Israel, without over-specifying kingship in the translation.
  alternative_readings:
  - a direct reference to the kingship Israel desires
  - a statement that all valuable things in Israel belong to Saul's family
  rationale: The Hebrew phrase is compressed and rhetorically loaded. Since the immediate
    context points toward Saul's impending appointment yet the verse itself does not
    explicitly say 'kingship,' the translation preserves the ambiguity rather than
    importing a fuller interpretive conclusion into the main text.
  doctrine_reference: Preserve theological tension rather than resolve it.
