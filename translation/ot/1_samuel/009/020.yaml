id: 1SA.9.20
reference: 1 Samuel 9:20
source:
  edition: WLC
  text: וְ/לָ/אֲתֹנ֞וֹת הָ/אֹבְד֣וֹת לְ/ךָ֗ הַ/יּוֹם֙ שְׁלֹ֣שֶׁת הַ/יָּמִ֔ים אַל תָּ֧שֶׂם
    אֶֽת לִבְּ/ךָ֛ לָ/הֶ֖ם כִּ֣י נִמְצָ֑אוּ וּ/לְ/מִי֙ כָּל חֶמְדַּ֣ת יִשְׂרָאֵ֔ל
    הֲ/ל֣וֹא לְ/ךָ֔ וּ/לְ/כֹ֖ל בֵּ֥ית אָבִֽי/ךָ־־־׃ס
translation:
  text: And as for the donkeys that were lost to you three days ago, do not set your
    heart on them, for they have been found. And for whom is all the desire of Israel?
    Is it not for you and for all your father's house?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'And to whom belongs all that is desirable in Israel?' The Hebrew phrase
      may refer either to what Israel desires or to what is precious/desirable in
      Israel.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'your father's house,' a household/clan expression broader than the
      immediate nuclear family.
    reason: cultural_note
lexical_decisions:
- source_word: אֲתֹנוֹת
  chosen: donkeys
  alternatives:
  - female donkeys
  - she-donkeys
  lexicon: HALOT
  rationale: The noun specifically denotes female donkeys, but idiomatic modern English
    commonly uses the generic 'donkeys' unless the sex is contextually important.
    Here the narrative concern is the lost animals, not their sex, so 'donkeys' is
    natural while preserving sense.
- source_word: הָאֹבְדוֹת
  chosen: that were lost
  alternatives:
  - the lost ones
  - that had gone missing
  lexicon: HALOT
  rationale: The participle describes the donkeys as having been lost/missing. 'That
    were lost' is clear, idiomatic, and keeps the passive/resultative sense.
- source_word: הַיּוֹם שְׁלֹשֶׁת הַיָּמִים
  chosen: three days ago
  alternatives:
  - today three days
  - for three days now
  lexicon: HALOT
  rationale: This Hebrew time expression idiomatically refers to an event three days
    prior. 'Three days ago' best conveys the temporal sense in natural English.
- source_word: אַל תָּשֶׂם אֶת־לִבְּךָ לָהֶם
  chosen: do not set your heart on them
  alternatives:
  - do not concern yourself with them
  - do not set your mind on them
  lexicon: HALOT
  rationale: Literally 'do not set your heart to them.' 'Set your heart on' preserves
    the Hebrew anthropological idiom of the heart as the center of concern/attention.
    A more interpretive rendering like 'do not worry about them' is possible but less
    transparent.
- source_word: נִמְצָאוּ
  chosen: they have been found
  alternatives:
  - they were found
  - they are found
  lexicon: HALOT
  rationale: 'The Niphal perfect is naturally rendered as a passive perfect/resultative:
    the donkeys have been found.'
- source_word: וּלְמִי כָּל חֶמְדַּת יִשְׂרָאֵל
  chosen: And for whom is all the desire of Israel?
  alternatives:
  - And to whom belongs all that is desirable in Israel?
  - And for whom is all that Israel desires?
  lexicon: HALOT
  rationale: חֶמְדַּת can denote desire, delight, or desirable thing. The phrase is
    rhetorically ambiguous between 'what Israel desires' and 'what is precious in
    Israel.' 'The desire of Israel' preserves that compact ambiguity and the rhetorical
    force of Samuel's statement.
- source_word: הֲלוֹא
  chosen: Is it not
  alternatives:
  - Surely it is
  - Is it not indeed
  lexicon: HALOT
  rationale: This particle introduces a rhetorical question expecting agreement. 'Is
    it not' preserves the interrogative form.
- source_word: לְךָ וּלְכֹל בֵּית אָבִיךָ
  chosen: for you and for all your father's house
  alternatives:
  - for you and for all your ancestral house
  - for you and for all your father's family
  lexicon: HALOT
  rationale: '''Your father''s house'' is a standard Hebrew kinship/social unit and
    should be preserved rather than flattened to merely ''family,'' though the latter
    is a possible interpretive gloss.'
