id: 1SA.9.15
reference: 1 Samuel 9:15
source:
  edition: WLC
  text: וַֽ/יהוָ֔ה גָּלָ֖ה אֶת אֹ֣זֶן שְׁמוּאֵ֑ל י֣וֹם אֶחָ֔ד לִ/פְנֵ֥י בֽוֹא שָׁא֖וּל
    לֵ/אמֹֽר־־׃
translation:
  text: Now the LORD had revealed it to Samuel’s ear one day before Saul came, saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, “had uncovered Samuel’s ear,” an idiom meaning to reveal
      or disclose something to him.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיהוָה
  chosen: Now the LORD
  alternatives:
  - And the LORD
  - Now Yahweh
  lexicon: HALOT
  rationale: YHWH is rendered by the project default 'the LORD' per doctrine. The
    prefixed waw here is carried as 'Now' to mark narrative progression naturally
    in English.
- source_word: גָּלָה אֶת־אֹזֶן
  chosen: had revealed it to ... ear
  alternatives:
  - had uncovered the ear of
  - had informed
  lexicon: HALOT
  rationale: The idiom literally means 'uncovered the ear,' i.e., disclosed information.
    'Had revealed it to Samuel’s ear' preserves the Hebrew imagery more than a flat
    'had informed,' while remaining intelligible. 'It' is supplied in English because
    the idiom implies disclosed content.
- source_word: שְׁמוּאֵל
  chosen: Samuel
  rationale: Standard English transliteration of the personal name.
- source_word: יוֹם אֶחָד
  chosen: one day
  alternatives:
  - a day
  lexicon: HALOT
  rationale: Temporal expression meaning 'one day' in the sense of 'one day earlier';
    paired with the following phrase it yields 'one day before.'
- source_word: לִפְנֵי בּוֹא
  chosen: before ... came
  alternatives:
  - before the coming of
  - prior to ... coming
  lexicon: HALOT
  rationale: 'The preposition plus infinitive construct is rendered idiomatically
    in English as a finite clause: ''before Saul came.'''
- source_word: שָׁאוּל
  chosen: Saul
  rationale: Standard English transliteration of the personal name.
- source_word: לֵאמֹר
  chosen: saying,
  alternatives:
  - 'as follows:'
  lexicon: HALOT
  rationale: Standard introduction to direct speech in Hebrew narrative; 'saying'
    preserves the formal transition into the next verse.
