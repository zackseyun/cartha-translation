id: JON.3.3
reference: Jonah 3:3
source:
  edition: WLC
  text: וַ/יָּ֣קָם יוֹנָ֗ה וַ/יֵּ֛לֶךְ אֶל נִֽינְוֶ֖ה כִּ/דְבַ֣ר יְהוָ֑ה וְ/נִֽינְוֵ֗ה הָיְתָ֤ה עִיר גְּדוֹלָה֙ לֵֽ/אלֹהִ֔ים מַהֲלַ֖ךְ שְׁלֹ֥שֶׁת יָמִֽים־־׃
translation:
  text: So Jonah arose and went to Nineveh, according to the word of Yahweh. Now Nineveh was an exceedingly great city before God, a journey of three days.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'an exceedingly great city'; the Hebrew literally says 'a great city to/before God,' an idiom that may express superlative greatness.
    reason: alternative_reading
  - marker: b
    text: Or 'three days' journey.' The phrase may describe the time needed to traverse the city or to complete a visit through it.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּקָם
  chosen: arose
  alternatives:
  - got up
  - set out
  lexicon: HALOT
  rationale: The verb קום in wayyiqtol here marks Jonah's responsive action. 'Arose' preserves the narrative cadence and echoes 1:3/3:2–3 without over-paraphrasing.
- source_word: וַיֵּלֶךְ
  chosen: went
  alternatives:
  - set out
  - traveled
  lexicon: HALOT
  rationale: הלך is the ordinary verb 'go/walk.' 'Went' is the most direct rendering and keeps the sequence simple and formal.
- source_word: כִּדְבַר יְהוָה
  chosen: according to the word of the LORD
  alternatives:
  - in accordance with the word of the LORD
  - as the LORD had said
  lexicon: HALOT
  rationale: כִּדְבַר is literally 'according to the word of.' This preserves the idiom of obedience to divine command. YHWH is rendered 'the LORD' per doctrine.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: עִיר גְּדוֹלָה
  chosen: a very great city
  alternatives:
  - a great city
  - an exceedingly large city
  lexicon: HALOT
  rationale: גדולה means 'great/large.' Because the following לֵאלֹהִים intensifies the description, English 'very great' captures the combined force naturally.
- source_word: לֵאלֹהִים
  chosen: before God
  alternatives:
  - to God
  - for God
  - exceedingly
  lexicon: HALOT
  rationale: The phrase is difficult. Literally it is 'to God,' an idiom often expressing superlative force or evaluation in relation to God. 'Before God' preserves the God-reference while remaining idiomatic in English; the superlative sense is reflected by 'very great.'
- source_word: מַהֲלַךְ שְׁלֹשֶׁת יָמִים
  chosen: a journey of three days
  alternatives:
  - three days' journey
  - a three-day walk
  lexicon: HALOT
  rationale: מהלך denotes a journey, distance, or travel-span. 'A journey of three days' is clear modern English and preserves the measure without specifying whether this means diameter, circumference, or time to traverse/visit.
