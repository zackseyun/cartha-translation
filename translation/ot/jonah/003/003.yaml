theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Sense of לֵאלֹהִים in 'עיר גדולה לאלהים'
  chosen_reading: 'retain explicit God-language with idiomatic superlative force: ''a very great city before God'''
  alternative_readings:
  - '''an exceedingly great city'' with no explicit God-language'
  - '''a great city to God'''
  rationale: The Hebrew includes אלהים explicitly. Rather than flattening it into a bare adverb, the main text preserves the theological wording with readable English, while allowing readers to see the superlative alternative in a footnote.
