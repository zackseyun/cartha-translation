id: JON.2.10
reference: Jonah 2:10
source:
  edition: WLC
  text: וַ/אֲנִ֗י בְּ/ק֤וֹל תּוֹדָה֙ אֶזְבְּחָה לָּ֔/ךְ אֲשֶׁ֥ר נָדַ֖רְתִּי אֲשַׁלֵּ֑מָה יְשׁוּעָ֖תָ/ה לַ/יהוָֽה־׃ס
translation:
  text: But as for me, with the voice of thanksgiving I will sacrifice to you; what I have vowed I will pay. Salvation belongs to Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Deliverance belongs to the LORD' or 'Salvation is from the LORD.' The Hebrew יְשׁוּעָה can denote rescue/deliverance in context, while also carrying the broader sense of salvation.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַאֲנִי
  chosen: But as for me
  alternatives:
  - But I
  - Yet I
  lexicon: HALOT
  rationale: The conjunction plus independent pronoun marks contrast with the idolaters in the previous verse. 'But as for me' brings out the emphatic contrast more clearly than a bare 'But I' while remaining natural English.
- source_word: בְּקוֹל תּוֹדָה
  chosen: with the voice of thanksgiving
  alternatives:
  - with a voice of thanksgiving
  - with thanksgiving
  - with a thankful voice
  lexicon: HALOT
  rationale: קוֹל is literally 'voice/sound' and תּוֹדָה is 'thanksgiving' or 'thank-offering' depending on context. Here the phrase most naturally describes audible thanksgiving accompanying worship. Retaining 'voice' preserves the Hebrew imagery better than reducing it to simply 'with thanksgiving'.
- source_word: אֶזְבְּחָה
  chosen: I will sacrifice
  alternatives:
  - I will offer sacrifice
  lexicon: HALOT
  rationale: The verb זבח denotes sacrificial offering. 'I will sacrifice' is concise and faithful; the object is implicit in English as in Hebrew.
- source_word: לָּךְ
  chosen: to you
  alternatives:
  - for you
  lexicon: HALOT
  rationale: The preposition marks the recipient of the sacrifice in direct address to God. 'To you' is the most straightforward rendering.
- source_word: אֲשֶׁר נָדַרְתִּי
  chosen: what I have vowed
  alternatives:
  - that which I vowed
  - what I vowed
  lexicon: HALOT
  rationale: This relative clause refers to vows Jonah has made. The English present perfect 'have vowed' fits the completed action with present relevance before the following commitment to fulfill it.
- source_word: אֲשַׁלֵּמָה
  chosen: I will pay
  alternatives:
  - I will fulfill
  - I will perform
  lexicon: HALOT
  rationale: The piel of שלם in vow contexts commonly means to pay or fulfill a vow. 'I will pay' preserves the concrete covenantal language and matches common biblical idiom about vows.
- source_word: יְשׁוּעָתָה לַיהוָה
  chosen: Salvation belongs to the LORD
  alternatives:
  - Deliverance belongs to the LORD
  - Salvation is from the LORD
  lexicon: HALOT
  rationale: יְשׁוּעָה can mean salvation or deliverance. 'Salvation' preserves the broader theological force while still fitting Jonah's immediate rescue. The lamed with the divine name is well rendered as possession/source in this formula; 'belongs to the LORD' is the established and contextually strong sense. Per doctrine, YHWH is rendered 'the LORD'.
