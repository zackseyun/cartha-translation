theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering for
    YHWH, following Jewish reverence tradition and the LXX pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Rendering of שְׁאוֹל
  chosen_reading: Sheol
  alternative_readings:
  - the grave
  - hell
  - the realm of the dead
  rationale: To avoid importing later theological conclusions not demanded by the
    Hebrew, the transliteration 'Sheol' preserves the conceptual tension of the Hebrew
    term. A lexical alternative is preserved in a footnote.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §3: Preserve theological
    tension rather than resolve it'
