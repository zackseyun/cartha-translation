id: JON.2.3
reference: Jonah 2:3
source:
  edition: WLC
  text: וַ/יֹּ֗אמֶר קָ֠רָאתִי מִ/צָּ֥רָה לִ֛/י אֶל יְהוָ֖ה וַֽ/יַּעֲנֵ֑/נִי מִ/בֶּ֧טֶן
    שְׁא֛וֹל שִׁוַּ֖עְתִּי שָׁמַ֥עְתָּ קוֹלִֽ/י־׃
translation:
  text: And he said, “I called to the LORD out of my distress, and he answered me.
    From the belly of Sheol I cried for help; you heard my voice.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'From the womb of Sheol'; the Hebrew word can mean 'belly' or 'womb.'
    reason: lexical_alternative
  - marker: b
    text: Sheol is the Hebrew term for the realm of the dead; alternatively, 'the
      grave' in a more interpretive rendering.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: And he said
  alternatives:
  - Then he said
  - And he said
  lexicon: HALOT
  rationale: Standard narrative wayyiqtol introducing Jonah's prayer/song. 'And he
    said' preserves the Hebrew discourse marker without overinterpreting temporal
    sequence.
- source_word: קָרָאתִי
  chosen: I called
  alternatives:
  - I cried out
  - I called out
  lexicon: HALOT
  rationale: Qal of קרא commonly means 'call' or 'cry out.' 'I called' keeps the verbal
    link with prayer language while avoiding unnecessary expansion; the distress context
    already conveys urgency.
- source_word: מִצָּרָה לִי
  chosen: out of my distress
  alternatives:
  - from my distress
  - out of trouble for me
  - from my affliction
  lexicon: HALOT
  rationale: צָרָה denotes distress, trouble, affliction. The idiomatic English 'out
    of my distress' best captures the preposition מִן plus the 1cs pronominal sense
    expressed by לִי.
- source_word: אֶל יְהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: Per doctrine, יְהוָה is rendered 'the LORD.' 'To' reflects אֶל straightforwardly
    as the direction of Jonah's prayer.
- source_word: וַיַּעֲנֵנִי
  chosen: and he answered me
  alternatives:
  - and he answered
  - and he responded to me
  lexicon: HALOT
  rationale: ענה in this context is the standard verb for answering prayer. Including
    'me' reflects the pronominal suffix explicitly.
- source_word: מִבֶּטֶן שְׁאוֹל
  chosen: From the belly of Sheol
  alternatives:
  - From the womb of Sheol
  - From the depths of Sheol
  - From the belly of the grave
  lexicon: HALOT
  rationale: בֶּטֶן literally means 'belly' or 'womb.' Here the imagery is visceral
    and poetic; 'belly' fits Jonah's fish context and preserves the metaphor. שְׁאוֹל
    is best left as 'Sheol' rather than flattened to 'grave' or 'hell,' since the
    Hebrew term denotes the realm of the dead more broadly.
- source_word: שְׁאֹול
  chosen: Sheol
  alternatives:
  - the grave
  - the realm of the dead
  - hell
  lexicon: HALOT
  rationale: The Hebrew term is semantically broader than 'grave' and not identical
    to later notions of 'hell.' Transliteration preserves the OT concept without importing
    later doctrinal specificity.
- source_word: שִׁוַּעְתִּי
  chosen: I cried for help
  alternatives:
  - I cried out
  - I shouted for help
  lexicon: HALOT
  rationale: This verb specifically conveys a cry for aid. 'I cried for help' is more
    precise than simply 'I cried out' and suits the prayer context.
- source_word: שָׁמַעְתָּ קוֹלִי
  chosen: you heard my voice
  alternatives:
  - you heard me
  - you listened to my voice
  lexicon: HALOT
  rationale: The shift to second person is preserved, matching the Hebrew poetic address
    to God. 'He answered me' followed by 'you heard my voice' reflects the text's
    movement from narration to direct address.
