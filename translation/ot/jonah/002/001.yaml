theological_decisions:
- issue: Rendering the divine name יהוה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Specificity of the sea creature
  chosen_reading: great fish
  alternative_readings:
  - whale
  rationale: The Hebrew says 'fish,' not 'whale.' Using 'great fish' avoids importing later interpretive tradition and adheres to original-language primacy.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §1: Original-language primacy over translation tradition'
- issue: Temporal expression 'three days and three nights'
  chosen_reading: three days and three nights
  alternative_readings:
  - for part of three days
  rationale: The translation preserves the Hebrew wording without resolving later interpretive questions about inclusive reckoning. This maintains theological tension rather than harmonizing the phrase in translation.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §3: Preserve theological tension rather than resolve it'
