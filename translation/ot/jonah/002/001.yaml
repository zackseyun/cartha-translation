id: JON.2.1
reference: Jonah 2:1
source:
  edition: WLC
  text: וַ/יְמַ֤ן יְהוָה֙ דָּ֣ג גָּד֔וֹל לִ/בְלֹ֖עַ אֶת יוֹנָ֑ה וַ/יְהִ֤י יוֹנָה֙ בִּ/מְעֵ֣י הַ/דָּ֔ג שְׁלֹשָׁ֥ה יָמִ֖ים וּ/שְׁלֹשָׁ֥ה לֵילֽוֹת־׃
translation:
  text: And Yahweh appointed a great fish to swallow Jonah, and Jonah was in the belly of the fish three days and three nights.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'prepared' or 'provided' a great fish.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'in the inward parts of the fish'; rendered idiomatically as 'in the belly of the fish.'
    reason: lexical_alternative
  - marker: c
    text: The Hebrew says 'great fish,' not specifically 'whale.'
    reason: alternative_reading
  - marker: d
    text: The expression 'three days and three nights' is translated as written, without resolving questions about inclusive reckoning.
    reason: cross_reference
lexical_decisions:
- source_word: וַיְמַן
  chosen: appointed
  alternatives:
  - prepared
  - provided
  - assigned
  lexicon: HALOT
  rationale: The verb מנה here conveys sovereign ordaining or appointing rather than merely accidental provision. 'Appointed' is natural English and preserves the sense of deliberate divine commissioning better than the more traditional 'prepared.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: דָּג גָּדוֹל
  chosen: a great fish
  alternatives:
  - a large fish
  lexicon: HALOT
  rationale: דָּג is the ordinary Hebrew term for 'fish.' 'Great fish' is a direct and idiomatic rendering of the noun-adjective pair and avoids importing the more specific 'whale,' which the Hebrew does not state.
- source_word: לִבְלֹעַ
  chosen: to swallow
  alternatives:
  - to engulf
  - to gulp down
  lexicon: HALOT
  rationale: The infinitive plainly means 'to swallow' or 'to devour.' 'To swallow' is the most straightforward and contextually fitting choice.
- source_word: בִּמְעֵי הַדָּג
  chosen: in the belly of the fish
  alternatives:
  - in the inward parts of the fish
  - in the entrails of the fish
  lexicon: HALOT
  rationale: מֵעֶה refers literally to internal organs or inward parts. In idiomatic English for an animal, 'belly' best communicates the location without sounding clinical or grotesque, while still reflecting the concrete sense.
- source_word: שְׁלֹשָׁה יָמִים וּשְׁלֹשָׁה לֵילוֹת
  chosen: three days and three nights
  lexicon: HALOT
  rationale: This is a direct rendering of the Hebrew time expression and should be preserved as written rather than interpreted idiomatically in the main text.
