id: JON.2.4
reference: Jonah 2:4
source:
  edition: WLC
  text: וַ/תַּשְׁלִיכֵ֤/נִי מְצוּלָה֙ בִּ/לְבַ֣ב יַמִּ֔ים וְ/נָהָ֖ר יְסֹבְבֵ֑/נִי
    כָּל מִשְׁבָּרֶ֥י/ךָ וְ/גַלֶּ֖י/ךָ עָלַ֥/י עָבָֽרוּ־׃
translation:
  text: You cast me into the deep, into the heart of the seas, and the current surrounded
    me; all your breakers and your waves passed over me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and the river surrounded me,' with נָהָר taken in its more usual sense
      'river'; here it likely refers to the sea's current or flood in the poetic context.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתַּשְׁלִיכֵנִי
  chosen: You cast me
  alternatives:
  - You threw me
  lexicon: HALOT
  rationale: 'From שלך, ''to throw/cast.'' ''Cast'' is slightly more literary and
    fits the prayer-poem register while remaining natural English. The 2ms subject
    is retained as direct address to God: ''You.'''
- source_word: מְצוּלָה
  chosen: into the deep
  alternatives:
  - into the depths
  - into the deep waters
  lexicon: HALOT
  rationale: Refers to the depths of the sea. 'Into the deep' is idiomatic and concise,
    preserving the sense of being plunged into the watery abyss.
- source_word: בִּלְבַב יַמִּים
  chosen: into the heart of the seas
  alternatives:
  - in the heart of the seas
  - into the midst of the seas
  lexicon: HALOT
  rationale: לְבַב literally 'heart/midst'; יַמִּים is plural 'seas.' 'Heart of the
    seas' preserves the vivid Hebrew metaphor better than flattening to merely 'midst.'
    Repeating 'into' in English clarifies the relation to the prior verb.
- source_word: וְנָהָר
  chosen: and the current
  alternatives:
  - and the river
  - and the flood
  - and the stream
  lexicon: HALOT
  rationale: Though נָהָר commonly means 'river,' in this maritime context it likely
    denotes a flowing current/surge of water. 'Current' best fits the sea setting
    and parallelism with breakers and waves.
- source_word: יְסֹבְבֵנִי
  chosen: surrounded me
  alternatives:
  - encircled me
  - compassed me
  lexicon: HALOT
  rationale: From סבב, 'to surround/encircle.' 'Surrounded me' is the clearest modern
    English rendering.
- source_word: כָּל
  chosen: all
  alternatives:
  - the whole of
  lexicon: HALOT
  rationale: Straightforward quantifier modifying both following plural nouns in the
    poetic construction.
- source_word: מִשְׁבָּרֶיךָ
  chosen: your breakers
  alternatives:
  - your billows
  - your surf-breakers
  lexicon: HALOT
  rationale: Refers to breaking waves/surf. 'Breakers' is concrete, natural English
    and preserves the force of the sea imagery.
- source_word: וְגַלֶּיךָ
  chosen: and your waves
  alternatives:
  - and your swells
  lexicon: HALOT
  rationale: גלים are waves. Keeping 'your' reflects Jonah's theology that these waters
    are under God's sovereignty.
- source_word: עָלַי עָבָרוּ
  chosen: passed over me
  alternatives:
  - swept over me
  - went over me
  lexicon: HALOT
  rationale: The idiom conveys overwhelming force. 'Passed over me' is close to the
    Hebrew while remaining idiomatic; 'swept over me' is possible but slightly more
    interpretive.
