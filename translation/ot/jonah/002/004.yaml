theological_decisions:
- issue: Divine agency in Jonah's descent into the sea
  chosen_reading: Retain direct address to God throughout ('You cast me ... your breakers
    and your waves')
  alternative_readings:
  - Soften agency by making the sailors the implied subject of the casting
  rationale: The Hebrew explicitly uses second masculine singular forms and possessive
    suffixes, presenting Jonah's ordeal as ultimately under God's sovereign action,
    even though human agents were involved narratively. The translation preserves
    that theological tension rather than resolving it away.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
