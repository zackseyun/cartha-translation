id: JON.2.6
reference: Jonah 2:6
source:
  edition: WLC
  text: אֲפָפ֤וּ/נִי מַ֨יִם֙ עַד נֶ֔פֶשׁ תְּה֖וֹם יְסֹבְבֵ֑/נִי ס֖וּף חָב֥וּשׁ לְ/רֹאשִֽׁ/י־׃
translation:
  text: Waters closed in around me to my very life; the deep surrounded me; seaweed
    was wrapped around my head.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to the soul,' that is, 'to my life' or 'to my very self.'
    reason: lexical_alternative
  - marker: b
    text: '''Seaweed'' may also be rendered ''reeds'' or ''rushes''; the context of
      Jonah submerged in the sea favors ''seaweed.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲפָפוּנִי
  chosen: closed in around me
  alternatives:
  - encompassed me
  - surrounded me
  lexicon: HALOT
  rationale: The verb conveys encircling or hemming in. 'Closed in around me' preserves
    the threatening force in natural English better than the more traditional but
    slightly flatter 'compassed/encompassed me.'
- source_word: מַיִם
  chosen: waters
  alternatives:
  - water
  lexicon: HALOT
  rationale: The plural is idiomatic in Hebrew for threatening waters; 'waters' is
    standard and preserves the poetic imagery.
- source_word: עַד נֶפֶשׁ
  chosen: to my very life
  alternatives:
  - up to my neck
  - to the soul
  - to my life
  lexicon: HALOT
  rationale: נֶפֶשׁ here refers to life/self rather than an abstract immaterial 'soul.'
    The phrase expresses extremity—waters threatening life itself. 'To my very life'
    preserves that sense without over-paraphrasing. 'Up to my neck' is interpretive
    and not explicit in the Hebrew.
- source_word: תְּהוֹם
  chosen: the deep
  alternatives:
  - the abyss
  - the depths
  lexicon: HALOT
  rationale: '''The deep'' is the most natural rendering for the primeval/deep waters
    imagery and matches common biblical usage without importing later theological
    connotations of ''abyss.'''
- source_word: יְסֹבְבֵנִי
  chosen: surrounded me
  alternatives:
  - encircled me
  - closed around me
  lexicon: HALOT
  rationale: A straightforward rendering of the verb 'to surround/encircle.' Using
    'surrounded me' here provides variation from the first colon while preserving
    the parallelism.
- source_word: סוּף
  chosen: seaweed
  alternatives:
  - reeds
  - rushes
  lexicon: HALOT
  rationale: In this context beneath the sea, 'seaweed' best fits the imagery of Jonah
    in the waters. Although the noun can denote reeds/rushes in other contexts, 'seaweed'
    is the contextually strongest English choice here.
- source_word: חָבוּשׁ
  chosen: was wrapped around
  alternatives:
  - was bound around
  - was tied around
  lexicon: HALOT
  rationale: The passive participle indicates something bound or wrapped. 'Was wrapped
    around' is idiomatic and vivid in English.
- source_word: לְרֹאשִׁי
  chosen: my head
  alternatives:
  - my head's top
  lexicon: HALOT
  rationale: Simple possessive rendering; no special nuance beyond the concrete image.
