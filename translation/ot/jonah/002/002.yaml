id: JON.2.2
reference: Jonah 2:2
source:
  edition: WLC
  text: וַ/יִּתְפַּלֵּ֣ל יוֹנָ֔ה אֶל יְהוָ֖ה אֱלֹהָ֑י/ו מִ/מְּעֵ֖י הַ/דָּגָֽה־׃
translation:
  text: Then Jonah prayed to Yahweh his God from the belly of the fish.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''from the inward parts of the fish''; ''belly'' is a contextually natural rendering.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתְפַּלֵּל
  chosen: Then ... prayed
  alternatives:
  - And ... prayed
  - began to pray
  lexicon: HALOT
  rationale: The wayyiqtol form advances the narrative, commonly rendered 'and' or left as simple past. 'Then' captures the sequential force in natural English without overtranslating. The hitpael of פלל here means 'to pray.'
- source_word: יוֹנָה
  chosen: Jonah
  rationale: Personal name transliterated by standard English convention, per translation philosophy.
- source_word: אֶל
  chosen: to
  alternatives:
  - unto
  lexicon: HALOT
  rationale: Standard directional preposition with verbs of prayer; 'to' is the natural modern English equivalent.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֱלֹהָיו
  chosen: his God
  lexicon: HALOT
  rationale: 'The noun with 3ms suffix is straightforwardly possessive: ''his God.'' Retaining the possessive preserves Jonah''s covenantal relationship to the LORD.'
- source_word: מִמְּעֵי
  chosen: from the belly
  alternatives:
  - from the inward parts
  - from the entrails
  - from the womb
  lexicon: HALOT
  rationale: מֵעֶה can denote inward parts, belly, or womb depending on context. In connection with a fish swallowing Jonah, 'belly' is the clearest idiomatic English rendering and matches the concrete setting.
- source_word: הַדָּגָה
  chosen: the fish
  alternatives:
  - the great fish
  lexicon: HALOT
  rationale: The Hebrew here says simply 'the fish' with the article. 'Great' should not be imported from 1:17 into this verse. Although the noun form is grammatically feminine here, English need not mark that.
