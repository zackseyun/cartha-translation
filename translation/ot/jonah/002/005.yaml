theological_decisions:
- issue: Whether to render the exclusion as spatial 'from your sight' or more theologically
    as 'out of your presence'
  chosen_reading: from before your eyes
  alternative_readings:
  - from your sight
  - out of your presence
  rationale: The Hebrew idiom is concrete and should be preserved where possible.
    Because divine 'eyes' can imply divine presence and favor, the more interpretive
    alternative is worth preserving in a footnote, but the main text should not resolve
    the imagery into a doctrinal paraphrase.
  doctrine_reference: Translation philosophy §§1, 3, 6
