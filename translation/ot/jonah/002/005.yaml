id: JON.2.5
reference: Jonah 2:5
source:
  edition: WLC
  text: וַ/אֲנִ֣י אָמַ֔רְתִּי נִגְרַ֖שְׁתִּי מִ/נֶּ֣גֶד עֵינֶ֑י/ךָ אַ֚ךְ אוֹסִ֣יף
    לְ/הַבִּ֔יט אֶל הֵיכַ֖ל קָדְשֶֽׁ/ךָ־׃
translation:
  text: And I said, ‘I have been driven out from before your eyes; yet I will again
    look toward your holy temple.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “from your sight” or “out of your presence.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַאֲנִי
  chosen: And I
  alternatives:
  - But I
  - Then I
  lexicon: HALOT
  rationale: The conjunction plus pronoun marks continuation with emphasis on the
    speaker. 'And I' preserves the simple narrative linkage without overstating contrast.
- source_word: אָמַרְתִּי
  chosen: said
  alternatives:
  - thought
  lexicon: HALOT
  rationale: The verb normally means 'say.' In prayer-poetry it can shade toward inward
    speech, but 'said' best preserves the Hebrew wording while remaining natural in
    English.
- source_word: נִגְרַשְׁתִּי
  chosen: I have been driven out
  alternatives:
  - I am cast out
  - I have been expelled
  - I was banished
  lexicon: HALOT
  rationale: The Niphal of גרש conveys being driven away or expelled. 'Driven out'
    is vivid and idiomatic, preserving the passive sense without importing legal or
    exile-specific nuance beyond the text.
- source_word: מִנֶּגֶד עֵינֶיךָ
  chosen: from before your eyes
  alternatives:
  - from your sight
  - away from before you
  - out of your presence
  lexicon: HALOT
  rationale: Literally 'from before your eyes.' This idiom can mean exclusion from
    God's sight/presence. The chosen rendering keeps the concrete Hebrew imagery while
    remaining understandable. 'Out of your presence' is interpretive and therefore
    preserved in a footnote rather than adopted in the main text.
- source_word: אַךְ
  chosen: yet
  alternatives:
  - nevertheless
  - surely
  - indeed
  lexicon: HALOT
  rationale: Here the particle marks a strong adversative turn from despair to hope.
    'Yet' is concise and natural in modern English.
- source_word: אוֹסִיף
  chosen: I will again
  alternatives:
  - I will continue to
  - I will once more
  lexicon: HALOT
  rationale: The Hiphil of יסף with an infinitive can mean 'do again' or 'continue
    to do.' In this context of renewed hope after perceived rejection, 'again' best
    fits the sense of restored access.
- source_word: לְהַבִּיט
  chosen: look toward
  alternatives:
  - look
  - gaze toward
  lexicon: HALOT
  rationale: The infinitive means 'to look.' With אֶל, 'look toward' expresses directional
    focus, especially in prayer toward the temple.
- source_word: הֵיכַל קָדְשֶׁךָ
  chosen: your holy temple
  alternatives:
  - your holy sanctuary
  - the temple of your holiness
  lexicon: HALOT
  rationale: הֵיכָל commonly denotes palace or temple; in reference to God it is best
    rendered 'temple.' The construct with 'your holiness' is idiomatically 'your holy
    temple.'
