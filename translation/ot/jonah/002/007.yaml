id: JON.2.7
reference: Jonah 2:7
source:
  edition: WLC
  text: לְ/קִצְבֵ֤י הָרִים֙ יָרַ֔דְתִּי הָ/אָ֛רֶץ בְּרִחֶ֥י/הָ בַעֲדִ֖/י לְ/עוֹלָ֑ם וַ/תַּ֧עַל מִ/שַּׁ֛חַת חַיַּ֖/י יְהוָ֥ה אֱלֹהָֽ/י׃
translation:
  text: I went down to the roots of the mountains; the earth with its bars was around me forever, but you brought up my life from the pit, O Yahweh my God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to the extremities/bases of the mountains.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the earth—its bars closed in behind me forever.' The Hebrew imagery is of imprisonment by the earth's bars or bolts.
    reason: lexical_alternative
  - marker: c
    text: Or 'from the grave' or 'from destruction' for 'from the pit.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לְקִצְבֵי
  chosen: to the roots of
  alternatives:
  - to the extremities of
  - to the bases of
  - to the bottoms of
  lexicon: HALOT
  rationale: קֶצֶב can denote an end, extremity, or boundary. In the collocation with 'mountains,' the sense is their farthest/bottommost reaches. 'Roots' is idiomatic English for the mountain bases in a descent context and matches the imagery of going down into the deep.
- source_word: הָרִים
  chosen: the mountains
  lexicon: HALOT
  rationale: Straightforward plural noun; retained literally to preserve the poetic topography of descent.
- source_word: יָרַדְתִּי
  chosen: I went down
  alternatives:
  - I descended
  lexicon: HALOT
  rationale: Qal perfect 1cs of ירד. 'I went down' is natural modern English and preserves the movement imagery without sounding overly formal.
- source_word: הָאָרֶץ
  chosen: the earth
  alternatives:
  - the land
  lexicon: HALOT
  rationale: Although אֶרֶץ can mean 'land,' here the cosmic/death imagery with mountains, bars, and pit favors 'earth' as the enclosing underworld-like realm.
- source_word: בְּרִחֶיהָ
  chosen: with its bars
  alternatives:
  - its bars
  - its gates
  lexicon: HALOT
  rationale: בְּרִיחַ denotes a bar or bolt. 'With its bars' reflects the Hebrew construct with pronominal suffix and conveys the image of imprisonment. 'Gates' would be interpretive rather than lexical.
- source_word: בַעֲדִי
  chosen: was around me
  alternatives:
  - was behind me
  - was upon me
  - closed in on me
  lexicon: HALOT
  rationale: The preposition בעד can indicate 'around/about' or 'behind/on behalf of' depending on context. Here, with the image of the earth's bars, the sense is enclosure. 'Was around me' preserves that without over-paraphrasing.
- source_word: לְעוֹלָם
  chosen: forever
  alternatives:
  - for ever
  - perpetually
  - for eternity
  lexicon: HALOT
  rationale: עוֹלָם often denotes an indefinite or enduring duration. In Jonah's prayer it expresses the felt finality of death. 'Forever' is idiomatic and preserves the hyperbolic experiential force.
- source_word: וַתַּעַל
  chosen: you brought up
  alternatives:
  - you raised up
  - you brought out
  lexicon: HALOT
  rationale: The verb עלה in Hiphil means to cause to go up. Because the form is 2ms and the addressee is YHWH, 'you brought up' best captures divine rescue from below.
- source_word: מִשַּׁחַת
  chosen: from the pit
  alternatives:
  - from the grave
  - from destruction
  lexicon: HALOT
  rationale: שַׁחַת can mean pit, grave, or destruction. In this poetic descent-and-rescue context, 'pit' preserves the concrete imagery while allowing the death connotation to remain implicit.
- source_word: חַיַּי
  chosen: my life
  alternatives:
  - me, my life
  - my living being
  lexicon: HALOT
  rationale: Though literally 'my life,' the phrase can function nearly as 'me.' Retaining 'my life' preserves the Hebrew expression and the theological emphasis on deliverance from death.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֱלֹהָי
  chosen: my God
  lexicon: HALOT
  rationale: Straightforward possessive form; retained literally to preserve Jonah's personal address to God.
