theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Sense of לְעוֹלָם in a death-prayer context
  chosen_reading: forever
  alternative_readings:
  - for a long time
  - for the age
  rationale: The term can denote an age or indefinite duration, but in Jonah's poetic prayer it expresses the apparent finality of death from the speaker's perspective. Translating 'forever' preserves the existential force without making a doctrinal claim about literal endless duration in Sheol.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §3: preserve theological tension rather than resolve it'
