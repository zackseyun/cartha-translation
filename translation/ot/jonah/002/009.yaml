theological_decisions:
- issue: Meaning of חַסְדָּם in relation to idolaters and God
  chosen_reading: The phrase refers to the covenant loyalty/faithful devotion that
    belongs to them or is owed in covenant relationship, which they abandon by clinging
    to idols.
  alternative_readings:
  - It refers to the mercy or steadfast love available to them from God, which they
    forfeit.
  - It refers more generally to their welfare or hope.
  rationale: The Hebrew permits more than one construal because חסד can denote covenant
    loyalty, steadfast love, or mercy, and the possessive suffix can be understood
    in different relational ways. The main text preserves the covenantal dimension
    with 'covenant loyalty' while a footnote preserves the common alternative 'steadfast
    love/mercy.' This follows the translation philosophy of preserving theological
    tension rather than overstating certainty.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
