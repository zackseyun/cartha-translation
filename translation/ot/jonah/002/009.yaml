id: JON.2.9
reference: Jonah 2:9
source:
  edition: WLC
  text: מְשַׁמְּרִ֖ים הַבְלֵי שָׁ֑וְא חַסְדָּ֖/ם יַעֲזֹֽבוּ־׃
translation:
  text: Those who cling to worthless idols forsake their own covenant loyalty.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Those who keep vain idols forsake their own steadfast love,' possibly
      meaning that they forfeit the mercy available to them from God.
    reason: alternative_reading
lexical_decisions:
- source_word: מְשַׁמְּרִים
  chosen: cling to
  alternatives:
  - keep
  - observe
  - regard
  - watch over
  lexicon: HALOT
  rationale: Although the verb שמר commonly means 'keep/guard/observe,' in this idiom
    with הבלי שוא it refers to devoted attachment to idols rather than mere observation.
    'Cling to' captures the practical sense in natural English while preserving the
    idea of continued allegiance.
- source_word: הַבְלֵי שָׁוְא
  chosen: worthless idols
  alternatives:
  - vain idols
  - empty vanities
  - worthless vanities
  lexicon: HALOT
  rationale: הבל denotes emptiness/vapor/vanity, and שוא adds the sense of falsehood
    or worthlessness. In prophetic usage the phrase refers to idols as empty, deceptive
    objects of worship. 'Worthless idols' makes the referent explicit in idiomatic
    English without adding a new concept beyond the established prophetic idiom.
- source_word: חַסְדָּם
  chosen: their own covenant loyalty
  alternatives:
  - their mercy
  - their steadfast love
  - their loyalty
  - their source of mercy
  lexicon: HALOT
  rationale: חסד is semantically rich, often involving covenant faithfulness, loyal
    love, or mercy. Here the suffix is 3mp ('their'). The clause likely means idolaters
    abandon the covenant loyalty that should characterize their relationship with
    God, or the loyal love available to them from him. 'Their own covenant loyalty'
    preserves the Hebrew terseness and relational-covenantal sense, while avoiding
    a misleadingly sentimental 'mercy.' The possessive is retained with 'their own.'
- source_word: יַעֲזֹבוּ
  chosen: forsake
  alternatives:
  - abandon
  - leave
  lexicon: HALOT
  rationale: עזב commonly means 'forsake/abandon.' 'Forsake' fits the solemn prophetic
    tone and pairs well with the covenantal nuance of חסד.
