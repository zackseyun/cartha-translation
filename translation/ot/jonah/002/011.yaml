id: JON.2.11
reference: Jonah 2:11
source:
  edition: WLC
  text: וַ/יֹּ֥אמֶר יְהוָ֖ה לַ/דָּ֑ג וַ/יָּקֵ֥א אֶת יוֹנָ֖ה אֶל הַ/יַּבָּשָֽׁה־־׃פ
translation:
  text: Then the LORD spoke to the fish, and it vomited Jonah onto the dry land.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'said to the fish.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: spoke
  alternatives:
  - said
  - commanded
  lexicon: HALOT
  rationale: The verb אמר literally means 'said.' In English, 'spoke to' is natural
    with the following indirect object 'to the fish' and preserves the sense without
    overinterpreting it as a stronger 'commanded,' though the context implies divine
    authority.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the divine name יְהוָה is rendered 'the LORD'
    rather than transliterated.
- source_word: לַדָּג
  chosen: to the fish
  alternatives:
  - to the great fish
  lexicon: HALOT
  rationale: The noun דג here is simply 'fish' with the preposition and article. 'Great'
    is not present in this verse and should not be imported from earlier context.
- source_word: וַיָּקֵא
  chosen: vomited
  alternatives:
  - spit out
  - spewed out
  lexicon: HALOT
  rationale: The verb קיא denotes vomiting. 'Vomited' is the most direct and lexically
    transparent rendering; 'spit out' softens the force, while 'spewed out' is possible
    but less standard.
- source_word: אֶת יוֹנָה
  chosen: Jonah
  lexicon: HALOT
  rationale: אֶת marks Jonah as the definite direct object; this is represented in
    normal English syntax without a separate gloss.
- source_word: אֶל הַיַּבָּשָׁה
  chosen: onto the dry land
  alternatives:
  - onto dry land
  - to the dry ground
  lexicon: HALOT
  rationale: יַבָּשָׁה refers to dry land/ground, often in contrast to the sea. 'Onto
    the dry land' fits the motion implied by the verb and the preposition אֶל in context.
- source_word: וַ
  chosen: Then
  alternatives:
  - And
  lexicon: HALOT
  rationale: The prefixed waw on the initial verb advances the narrative. 'Then' communicates
    sequential movement in readable modern English better than a bare 'And,' while
    remaining faithful to the discourse function.
