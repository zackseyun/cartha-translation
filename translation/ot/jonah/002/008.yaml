id: JON.2.8
reference: Jonah 2:8
source:
  edition: WLC
  text: בְּ/הִתְעַטֵּ֤ף עָלַ/י֙ נַפְשִׁ֔/י אֶת יְהוָ֖ה זָכָ֑רְתִּי וַ/תָּב֤וֹא אֵלֶ֨י/ךָ֙
    תְּפִלָּתִ֔/י אֶל הֵיכַ֖ל קָדְשֶֽׁ/ךָ־־׃
translation:
  text: When my life was fainting away within me, I remembered the LORD, and my prayer
    came to you, to your holy temple.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'When my soul grew faint within me.' Hebrew nephesh can mean 'life,'
      'soul,' or 'self' depending on context.
    reason: lexical_alternative
  - marker: b
    text: Or 'to your holy palace/sanctuary.' The Hebrew term can denote a royal palace
      or temple; here 'temple' fits the prayer context.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּ/הִתְעַטֵּף
  chosen: was fainting away
  alternatives:
  - grew faint
  - was overwhelmed
  - was ebbing away
  lexicon: HALOT
  rationale: The Hitpael infinitive construct of עטף with prefixed ב marks a temporal
    clause, 'when ...'. In contexts of distress it can denote growing faint or languishing.
    'Was fainting away' captures the progressive weakening without over-paraphrasing.
- source_word: עָלַי
  chosen: within me
  alternatives:
  - upon me
  - over me
  lexicon: HALOT
  rationale: Although literally 'upon me,' with נפשׁ and עטף the idiom refers to the
    inner self collapsing or weakening. 'Within me' expresses the idiomatic sense
    in natural English while preserving the internal dimension.
- source_word: נַפְשִׁי
  chosen: my life
  alternatives:
  - my soul
  - my self
  lexicon: HALOT
  rationale: נפשׁ can mean soul, life, self, or person. Here in a near-death context
    from Jonah's prayer, 'my life' best conveys the concrete sense of life ebbing
    away, while avoiding importing a more technical anthropology than the verse requires.
- source_word: אֶת יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  lexicon: HALOT
  rationale: The direct-object marker with YHWH yields 'I remembered the LORD.' Per
    doctrine, יְהוָה is rendered 'the LORD' in the main text, with the divine name
    not transliterated.
- source_word: זָכָרְתִּי
  chosen: I remembered
  alternatives:
  - I called to mind
  lexicon: HALOT
  rationale: The Qal perfect straightforwardly means 'I remembered.' This preserves
    the simple verbal force and avoids interpretive expansion into prayer language,
    which is expressed in the next clause.
- source_word: וַ/תָּבֹא
  chosen: came
  alternatives:
  - entered
  - reached
  lexicon: HALOT
  rationale: The wayyiqtol of בוא means 'came.' In context of prayer directed to God,
    English idiom allows 'came to you' naturally; 'reached you' is possible but slightly
    more interpretive.
- source_word: תְּפִלָּתִי
  chosen: my prayer
  alternatives:
  - my plea
  lexicon: HALOT
  rationale: תפלה is the standard term for prayer. 'My prayer' is the most direct
    and consistent rendering.
- source_word: הֵיכַל קָדְשֶׁךָ
  chosen: your holy temple
  alternatives:
  - your holy palace
  - your holy sanctuary
  lexicon: HALOT
  rationale: היכל can denote palace or temple; with 'your holy' and in prayer to the
    God of Israel, 'temple' is the clearest contextual rendering. It may refer either
    to the earthly temple or God's heavenly dwelling, and 'temple' preserves that
    biblical resonance without forcing a narrower interpretation.
