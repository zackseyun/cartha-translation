theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering for
    YHWH, following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Anthropological nuance of נַפְשִׁי
  chosen_reading: my life
  alternative_readings:
  - my soul
  - my self
  rationale: The verse describes Jonah's life ebbing away in mortal distress, so 'my
    life' best fits the immediate context. This avoids reading later doctrinal precision
    about the soul into a Hebrew idiom while still preserving the seriousness of the
    experience.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: preserve theological tension
    rather than resolve it'
