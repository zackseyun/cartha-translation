id: JON.1.4
reference: Jonah 1:4
source:
  edition: WLC
  text: וַֽ/יהוָ֗ה הֵטִ֤יל רֽוּחַ גְּדוֹלָה֙ אֶל הַ/יָּ֔ם וַ/יְהִ֥י סַֽעַר גָּד֖וֹל
    בַּ/יָּ֑ם וְ/הָ֣/אֳנִיָּ֔ה חִשְּׁבָ֖ה לְ/הִשָּׁבֵֽר־־־׃
translation:
  text: But the LORD hurled a great wind onto the sea, and there was a great storm
    on the sea, so that the ship seemed about to be broken up.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'And the LORD hurled a great wind onto the sea.' The Hebrew waw can be
      rendered simply as 'and'; 'but' was chosen to reflect the narrative contrast
      after Jonah's flight.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'the ship thought to be broken.' This is a Hebrew personification
      meaning the ship seemed likely to break apart.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיהוָה
  chosen: But the LORD
  alternatives:
  - And the LORD
  - Now the LORD
  lexicon: HALOT
  rationale: YHWH is rendered by the doctrinal default 'the LORD.' The prefixed waw
    here advances the narrative with a mildly adversative sense in context after Jonah's
    flight, so 'But' captures the turn without overparaphrasing.
- source_word: הֵטִיל
  chosen: hurled
  alternatives:
  - cast
  - threw
  lexicon: HALOT
  rationale: The verb conveys forceful throwing/casting. 'Hurled' best reflects the
    vividness and divine agency in sending the wind, stronger than the flatter 'sent'
    and more idiomatic than 'cast' in modern English.
- source_word: רוּחַ גְּדוֹלָה
  chosen: a great wind
  alternatives:
  - a mighty wind
  - a great spirit
  lexicon: HALOT
  rationale: In maritime context with 'sea' and resulting storm, רוּחַ clearly means
    'wind,' not 'spirit.' 'Great' preserves the repeated adjective גָּדוֹל/גְּדוֹלָה
    across the verse.
- source_word: אֶל הַיָּם
  chosen: onto the sea
  alternatives:
  - upon the sea
  - into the sea
  lexicon: HALOT
  rationale: The preposition אֶל with a verb of throwing suggests motion directed
    toward/upon the sea. 'Onto the sea' is natural English and preserves the directional
    force better than the more static 'on the sea.'
- source_word: וַיְהִי סַעַר גָּדוֹל
  chosen: and there was a great storm
  alternatives:
  - and a great tempest arose
  - and there came to be a great storm
  lexicon: HALOT
  rationale: This clause reports the resulting condition. 'There was' is idiomatic
    for וַיְהִי here. סַעַר denotes a violent storm/tempest; 'storm' is clear modern
    English, while 'great' keeps the lexical repetition.
- source_word: בַּיָּם
  chosen: on the sea
  alternatives:
  - at sea
  - in the sea
  lexicon: HALOT
  rationale: The phrase locates the storm with the sea as its sphere. 'On the sea'
    is a straightforward rendering; 'at sea' is possible but less formally tied to
    the Hebrew preposition.
- source_word: וְהָאֳנִיָּה
  chosen: so that the ship
  alternatives:
  - and the ship
  - with the ship
  lexicon: HALOT
  rationale: The conjunction plus following clause expresses result in context, not
    mere coordination. 'So that the ship' brings out the consequence of the storm
    in natural English.
- source_word: חִשְּׁבָה
  chosen: seemed
  alternatives:
  - thought
  - was reckoned
  - appeared
  lexicon: HALOT
  rationale: Literally 'thought/planned/accounted,' but with an inanimate subject
    ('the ship') this is a vivid personification meaning it appeared or seemed likely.
    'Seemed' preserves the idiom in readable English without flattening the imagery.
- source_word: לְהִשָּׁבֵר
  chosen: about to be broken up
  alternatives:
  - about to break apart
  - to be broken
  - to be shattered
  lexicon: HALOT
  rationale: 'The Niphal infinitive of שבר here is passive/reflexive in sense: the
    ship was on the verge of breaking apart. ''Broken up'' is idiomatic for a vessel
    coming apart in a storm; ''about to'' makes explicit the imminent sense carried
    by the construction with חִשְּׁבָה.'
