id: JON.1.1
reference: Jonah 1:1
source:
  edition: WLC
  text: וַֽ/יְהִי֙ דְּבַר יְהוָ֔ה אֶל יוֹנָ֥ה בֶן אֲמִתַּ֖י לֵ/אמֹֽר־־־׃
translation:
  text: Now the word of the LORD came to Jonah son of Amittai, saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''And it happened, the word of the LORD came ...'' The opening
      idiom is a standard narrative introduction.'
    reason: lexical_alternative
  - marker: b
    text: Or 'Yahweh.' The divine name יְהוָה is rendered 'the LORD' in keeping with
      the project's default practice.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְהִי
  chosen: Now ... came
  alternatives:
  - And it happened
  - And the word ... came to pass
  lexicon: HALOT
  rationale: The waw-consecutive of היה is a common Hebrew narrative opener. In English,
    a wooden 'and it happened' is possible but less natural. Rendering it with 'Now'
    preserves the discourse function of introducing the narrative while allowing the
    following verb 'came' to carry the main predication.
- source_word: דְּבַר
  chosen: the word
  alternatives:
  - a word
  - message
  lexicon: HALOT
  rationale: In the construct phrase דְּבַר יְהוָה, 'the word of the LORD' is the
    standard prophetic formula and preserves the concrete lexical sense of דָּבָר.
    'Message' is possible dynamically, but 'word' better maintains intertextual and
    prophetic resonance.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following longstanding English convention and the reverential substitution pattern
    reflected in Jewish reading tradition and the Septuagint.
- source_word: אֶל
  chosen: to
  alternatives:
  - unto
  lexicon: HALOT
  rationale: The preposition marks direction toward the recipient of revelation. 'To'
    is the natural modern English equivalent.
- source_word: יוֹנָה
  chosen: Jonah
  lexicon: HALOT
  rationale: Personal names are transliterated by standard English convention.
- source_word: בֶן אֲמִתַּי
  chosen: son of Amittai
  alternatives:
  - the son of Amittai
  lexicon: HALOT
  rationale: The patronymic identifies Jonah in standard Hebrew form. 'Son of Amittai'
    is the most direct and idiomatic rendering.
- source_word: לֵאמֹר
  chosen: saying,
  alternatives:
  - 'thus:'
  - 'with these words:'
  lexicon: HALOT
  rationale: This infinitive introduces the following divine speech in the next verse.
    'Saying,' is the conventional and sufficiently natural way to preserve the linkage
    without paraphrase.
