theological_decisions:
- issue: Reference of אֱלֹהֶיךָ / הָאֱלֹהִים in pagan speech
  chosen_reading: Render Jonah's deity as 'your god' and the hoped-for responder as
    'the god' rather than 'God' or 'the LORD.'
  alternative_readings:
  - your God ... God
  - your god ... God
  rationale: The speaker is a pagan captain urging Jonah to invoke his own deity.
    The text does not present the captain as confessing Israel's covenant God by name
    here. Lowercase 'god' avoids importing a theological recognition the verse itself
    does not state, while still allowing narrative irony that Jonah's God is in fact
    the true God.
  doctrine_reference: Translation philosophy §1, §3
