id: JON.1.6
reference: Jonah 1:6
source:
  edition: WLC
  text: וַ/יִּקְרַ֤ב אֵלָי/ו֙ רַ֣ב הַ/חֹבֵ֔ל וַ/יֹּ֥אמֶר ל֖/וֹ מַה לְּ/ךָ֣ נִרְדָּ֑ם
    ק֚וּם קְרָ֣א אֶל אֱלֹהֶ֔י/ךָ אוּלַ֞י יִתְעַשֵּׁ֧ת הָ/אֱלֹהִ֛ים לָ֖/נוּ וְ/לֹ֥א
    נֹאבֵֽד־־׃
translation:
  text: So the captain came near to him and said to him, “What are you doing asleep?
    Get up, call on your god. Perhaps the god will give thought to us, so that we
    may not perish.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the chief sailor' or 'the shipmaster.'
    reason: lexical_alternative
  - marker: b
    text: 'The Hebrew rebuke is literally terse: ''What to you, asleep?'' meaning
      something like ''How can you be sleeping?'''
    reason: lexical_alternative
  - marker: c
    text: The verb may also mean 'take notice of us' or 'be concerned about us.'
    reason: lexical_alternative
lexical_decisions:
- source_word: רַב הַחֹבֵל
  chosen: the captain
  alternatives:
  - the chief sailor
  - the shipmaster
  lexicon: HALOT
  rationale: The phrase literally denotes the chief of the sailors/seamen. 'Captain'
    is the most natural modern English equivalent for the ship's commanding officer,
    balancing precision and readability.
- source_word: וַיִּקְרַב אֵלָיו
  chosen: came near to him
  alternatives:
  - approached him
  - came to him
  lexicon: HALOT
  rationale: קָרַב means to come near/approach. 'Came near to him' preserves the physical
    movement with slightly more formal texture than 'approached,' fitting narrative
    style.
- source_word: מַה לְּךָ נִרְדָּם
  chosen: What are you doing asleep?
  alternatives:
  - How can you be sleeping?
  - What is this, sleeping?
  lexicon: HALOT
  rationale: The Hebrew is an idiomatic rebuke, literally something like 'What to
    you, sleeper/asleep one?' The chosen rendering communicates the captain's sharp
    astonishment in idiomatic English without over-paraphrasing.
- source_word: קוּם
  chosen: Get up
  alternatives:
  - Arise
  - Rise
  lexicon: HALOT
  rationale: Imperative of קום. 'Get up' is clear, contemporary English and fits the
    urgent command.
- source_word: קְרָא אֶל אֱלֹהֶיךָ
  chosen: call on your god
  alternatives:
  - cry out to your god
  - call to your god
  lexicon: HALOT
  rationale: קרא אל commonly means to call out to/invoke. 'Call on' is idiomatic for
    prayer or invocation and suits the context of desperate appeal.
- source_word: אוּלַי
  chosen: Perhaps
  alternatives:
  - Maybe
  - It may be that
  lexicon: HALOT
  rationale: אוּלַי expresses possibility or hope. 'Perhaps' preserves the uncertainty
    and urgency.
- source_word: יִתְעַשֵּׁת
  chosen: will give thought to
  alternatives:
  - will take notice of
  - will be concerned about
  - will think upon
  lexicon: HALOT
  rationale: The verb עשת in this stem is rare and contextually conveys paying attention,
    taking thought, or showing concern. 'Will give thought to' preserves the deliberative
    nuance without overstating divine intervention.
- source_word: הָאֱלֹהִים
  chosen: the god
  alternatives:
  - God
  - the deity
  lexicon: HALOT
  rationale: In context the pagan captain refers generically to whichever deity Jonah
    serves, not yet to Israel's covenant name. The article supports 'the god' in the
    sense of 'your deity/the god in question,' avoiding an unwarranted identification
    with the LORD in the captain's speech.
- source_word: לָנוּ
  chosen: to us
  alternatives:
  - about us
  - for us
  lexicon: HALOT
  rationale: The preposition ל here marks the object of concern/attention. 'To us'
    works naturally with 'give thought to,' while retaining the Hebrew relation.
- source_word: וְלֹא נֹאבֵד
  chosen: so that we may not perish
  alternatives:
  - and we will not perish
  - that we may not be destroyed
  lexicon: HALOT
  rationale: The clause expresses hoped-for result. English 'so that we may not perish'
    captures the volitional/resultative sense better than a flat future.
