id: JON.1.10
reference: Jonah 1:10
source:
  edition: WLC
  text: וַ/יִּֽירְא֤וּ הָֽ/אֲנָשִׁים֙ יִרְאָ֣ה גְדוֹלָ֔ה וַ/יֹּאמְר֥וּ אֵלָ֖י/ו מַה
    זֹּ֣את עָשִׂ֑יתָ כִּֽי יָדְע֣וּ הָ/אֲנָשִׁ֗ים כִּֽי מִ/לִּ/פְנֵ֤י יְהוָה֙ ה֣וּא
    בֹרֵ֔חַ כִּ֥י הִגִּ֖יד לָ/הֶֽם־־־׃
translation:
  text: Then the men were greatly afraid, and they said to him, “What is this that
    you have done?” For the men knew that he was fleeing from the presence of the
    LORD, because he had told them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'the men feared a great fear.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּירְאוּ ... יִרְאָה גְדוֹלָה
  chosen: were greatly afraid
  alternatives:
  - feared a great fear
  - became very afraid
  lexicon: HALOT
  rationale: The Hebrew uses a cognate accusative ('feared a great fear') for emphasis.
    'Were greatly afraid' preserves the intensity in natural English without wooden
    repetition.
- source_word: הָאֲנָשִׁים
  chosen: the men
  alternatives:
  - the sailors
  - the people
  lexicon: HALOT
  rationale: The noun literally means 'the men.' Although the context identifies them
    as sailors, the Hebrew here uses the ordinary term for men, so the more direct
    rendering is preferred.
- source_word: מַה זֹּאת עָשִׂיתָ
  chosen: What is this that you have done?
  alternatives:
  - What have you done?
  - Why have you done this?
  lexicon: HALOT
  rationale: This reproduces the Hebrew demonstrative force of מַה זֹּאת more closely
    than the shorter idiom 'What have you done?' while remaining idiomatic English.
- source_word: מִלִּפְנֵי יְהוָה
  chosen: from the presence of the LORD
  alternatives:
  - from before the LORD
  - from the face of the LORD
  lexicon: HALOT
  rationale: לִפְנֵי literally relates to 'before' or 'in the presence of.' 'From
    the presence of the LORD' is clear, natural English and preserves the theological
    irony of attempting to flee God's presence.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the covenant name יְהוָה is rendered 'the LORD'
    rather than transliterated.
- source_word: בֹרֵחַ
  chosen: was fleeing
  alternatives:
  - was running away
  - fled
  lexicon: HALOT
  rationale: The participle conveys ongoing action; 'was fleeing' reflects that aspect
    better than the simple past 'fled.'
- source_word: כִּי ... כִּי
  chosen: For ... because
  alternatives:
  - because ... for
  - for ... for
  lexicon: HALOT
  rationale: The verse uses כִּי twice with different discourse functions. The first
    introduces the explanation ('For the men knew'); the second gives the reason they
    knew ('because he had told them'). Rendering them differently in English reflects
    the syntax and avoids awkward repetition.
- source_word: הִגִּיד לָהֶם
  chosen: he had told them
  alternatives:
  - he told them
  - he had declared it to them
  lexicon: HALOT
  rationale: The clause explains prior knowledge relative to the men's question, so
    the English past perfect naturally conveys that anterior action.
