id: JON.1.13
reference: Jonah 1:13
source:
  edition: WLC
  text: וַ/יַּחְתְּר֣וּ הָ/אֲנָשִׁ֗ים לְ/הָשִׁ֛יב אֶל הַ/יַּבָּשָׁ֖ה וְ/לֹ֣א יָכֹ֑לוּ
    כִּ֣י הַ/יָּ֔ם הוֹלֵ֥ךְ וְ/סֹעֵ֖ר עֲלֵי/הֶֽם־׃
translation:
  text: But the men rowed hard to return to the dry land, but they could not, because
    the sea kept growing more and more stormy against them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the men strained at the oars to get back to shore.' The Hebrew verb
      literally means 'dug,' but in this nautical context it refers to rowing with
      great effort.
    reason: lexical_alternative
  - marker: b
    text: Literally 'the dry land.'
    reason: lexical_alternative
  - marker: c
    text: The Hebrew expression means the sea was becoming increasingly stormy or
      raging more and more.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּחְתְּרוּ
  chosen: rowed hard
  alternatives:
  - dug in
  - strained at the oars
  - tried desperately
  lexicon: HALOT
  rationale: The verb חתר literally refers to digging, but in nautical context it
    idiomatically conveys rowing with strenuous effort to force the ship toward shore.
    'Rowed hard' captures the concrete maritime action and the intensity without paraphrasing
    too freely.
- source_word: הָאֲנָשִׁים
  chosen: the men
  alternatives:
  - the sailors
  - the people
  lexicon: HALOT
  rationale: The noun is simply 'the men.' Although the context identifies them as
    sailors, the Hebrew here does not use a specialized term, so 'the men' preserves
    the source wording. This also aligns with the gender-accurate principle.
- source_word: לְהָשִׁיב
  chosen: to return
  alternatives:
  - to bring back
  - to get back
  lexicon: HALOT
  rationale: The Hiphil of שוב commonly means 'to bring back/return.' Here with the
    destination phrase 'to the dry land,' the sense is to make their way back to shore.
    'To return' is concise and natural in English.
- source_word: הַיַּבָּשָׁה
  chosen: the dry land
  alternatives:
  - the land
  - the shore
  lexicon: HALOT
  rationale: יבשה is literally 'dry land.' While 'shore' is contextually natural,
    'dry land' preserves the Hebrew imagery and likely echoes the broader biblical
    contrast between sea and dry land.
- source_word: וְלֹא יָכֹלוּ
  chosen: but they could not
  alternatives:
  - yet they were unable
  - but they were not able
  lexicon: HALOT
  rationale: This straightforwardly expresses inability. 'But they could not' reads
    naturally and preserves the narrative contrast.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  - since
  lexicon: HALOT
  rationale: Here כִּי introduces the reason for their failure. 'Because' is the clearest
    modern English rendering.
- source_word: הַיָּם
  chosen: the sea
  alternatives:
  - the waters
  lexicon: HALOT
  rationale: The ordinary sense is 'the sea,' fitting the maritime setting.
- source_word: הוֹלֵךְ וְסֹעֵר
  chosen: kept growing more and more stormy
  alternatives:
  - was going and raging
  - grew increasingly tempestuous
  - kept raging
  lexicon: HALOT
  rationale: The construction הוֹלֵךְ + participle expresses progressive increase
    or continuation. With סער ('be stormy, rage'), the sense is that the sea was becoming
    increasingly violent. 'Kept growing more and more stormy' conveys the Hebrew aspect
    well in idiomatic English.
- source_word: עֲלֵיהֶם
  chosen: against them
  alternatives:
  - upon them
  - around them
  lexicon: HALOT
  rationale: In context the preposition conveys hostile force directed toward the
    men/ship. 'Against them' best communicates the adversative sense.
