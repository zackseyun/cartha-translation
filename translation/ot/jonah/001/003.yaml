id: JON.1.3
reference: Jonah 1:3
source:
  edition: WLC
  text: וַ/יָּ֤קָם יוֹנָה֙ לִ/בְרֹ֣חַ תַּרְשִׁ֔ישָׁ/ה מִ/לִּ/פְנֵ֖י יְהוָ֑ה וַ/יֵּ֨רֶד יָפ֜וֹ וַ/יִּמְצָ֥א אָנִיָּ֣ה בָּאָ֣ה תַרְשִׁ֗ישׁ וַ/יִּתֵּ֨ן שְׂכָרָ֜/הּ וַ/יֵּ֤רֶד בָּ/הּ֙ לָ/ב֤וֹא עִמָּ/הֶם֙ תַּרְשִׁ֔ישָׁ/ה מִ/לִּ/פְנֵ֖י יְהוָֽה׀׃
translation:
  text: But Jonah rose to flee to Tarshish from the presence of Yahweh. He went down to Joppa and found a ship going to Tarshish. He paid its fare and went down into it to go with them to Tarshish, away from the presence of Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'away from the LORD'; literally 'from the presence of the LORD.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew repeats 'went down' here; the repetition contributes to the narrative movement downward in this chapter.
    reason: cross_reference
  - marker: c
    text: Or 'bound for Tarshish.' The Hebrew expression is literally 'a ship coming/going to Tarshish.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּקָם
  chosen: rose
  alternatives:
  - got up
  - set out
  lexicon: HALOT
  rationale: The verb literally means 'arose/stood up.' 'Rose' preserves the narrative sequence and the Hebrew idiom without over-paraphrasing.
- source_word: לִבְרֹחַ
  chosen: to flee
  alternatives:
  - to run away
  lexicon: HALOT
  rationale: ברח commonly means 'flee' or 'run away.' 'Flee' is concise and preserves the seriousness of Jonah's attempted escape.
- source_word: תַּרְשִׁישָׁה
  chosen: to Tarshish
  rationale: Directional he on the place name indicates motion toward Tarshish; standard English is simply 'to Tarshish.'
- source_word: מִלִּפְנֵי יְהוָה
  chosen: from the presence of the LORD
  alternatives:
  - away from the LORD
  - from before the LORD
  lexicon: HALOT
  rationale: לִפְנֵי literally involves 'face/presence.' 'From the presence of the LORD' preserves the concrete Hebrew expression and the theological irony of attempting to escape God's presence. 'the LORD' follows the project default for יְהוָה.
- source_word: יָפוֹ
  chosen: Joppa
  alternatives:
  - Jaffa
  rationale: '''Joppa'' is the standard biblical English form; ''Jaffa'' is the modern place-name form.'
- source_word: אָנִיָּה
  chosen: ship
  alternatives:
  - boat
  - vessel
  lexicon: HALOT
  rationale: The term denotes a seagoing vessel. 'Ship' is the most natural and sufficiently specific English rendering in this context.
- source_word: בָּאָה תַרְשִׁישׁ
  chosen: going to Tarshish
  alternatives:
  - bound for Tarshish
  - coming to Tarshish
  lexicon: HALOT
  rationale: Although בוא often means 'come,' with destination language in travel contexts it can denote movement toward a place. 'Going to Tarshish' is the clearest idiomatic English. 'Bound for Tarshish' is possible but slightly more interpretive.
- source_word: שְׂכָרָהּ
  chosen: its fare
  alternatives:
  - her fare
  - the fare for it
  - its passage money
  lexicon: HALOT
  rationale: The noun means wages/hire/fare; with the feminine suffix referring to the ship, English idiom prefers 'its fare' rather than the overly literal 'her fare.'
- source_word: וַיֵּרֶד בָּהּ
  chosen: went down into it
  alternatives:
  - boarded it
  - went down on board
  lexicon: HALOT
  rationale: The repeated ירד ('went down') is narratively significant in Jonah 1 and should be preserved rather than flattened to 'boarded.' 'Into it' fits the preposition and English idiom.
- source_word: לָבוֹא עִמָּהֶם
  chosen: to go with them
  alternatives:
  - to come with them
  - to travel with them
  lexicon: HALOT
  rationale: English viewpoint favors 'go with them' in this context. 'Travel with them' is smoother but less direct than the infinitive construction.
- source_word: מִלִּפְנֵי יְהוָה (second occurrence)
  chosen: away from the presence of the LORD
  alternatives:
  - from the presence of the LORD
  lexicon: HALOT
  rationale: The repeated phrase is retained, but 'away from' slightly clarifies the force in English while preserving the repetition and emphasis of Jonah's intent.
