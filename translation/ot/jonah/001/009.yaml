theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Semantic force of יָרֵא in Jonah's self-description
  chosen_reading: fear
  alternative_readings:
  - revere
  - worship
  rationale: Because Jonah's confession is theologically charged and somewhat ironic in context, 'fear' best preserves the source wording and the tension between profession and conduct. Softer renderings risk resolving that tension interpretively.
  doctrine_reference: DOCTRINE.md Translation philosophy §3 Preserve theological tension rather than resolve it
