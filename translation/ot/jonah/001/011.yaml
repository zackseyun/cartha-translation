id: JON.1.11
reference: Jonah 1:11
source:
  edition: WLC
  text: וַ/יֹּאמְר֤וּ אֵלָי/ו֙ מַה נַּ֣עֲשֶׂה לָּ֔/ךְ וְ/יִשְׁתֹּ֥ק הַ/יָּ֖ם מֵֽ/עָלֵ֑י/נוּ
    כִּ֥י הַ/יָּ֖ם הוֹלֵ֥ךְ וְ/סֹעֵֽר־׃
translation:
  text: Then they said to him, “What should we do to you so that the sea may quiet
    down from upon us?” For the sea was growing more and more stormy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''from upon us,'' a vivid expression portraying the sea''s pressure
      or threat against them.'
    reason: lexical_alternative
  - marker: b
    text: Or, more literally, 'for the sea was going and storming'—that is, it was
      becoming increasingly stormy.
    reason: lexical_alternative
lexical_decisions:
- source_word: מַה נַּעֲשֶׂה לָּךְ
  chosen: What should we do to you
  alternatives:
  - What shall we do to you
  - What are we to do with you
  lexicon: HALOT
  rationale: The Hebrew asks directly what action the sailors should take regarding
    Jonah. 'Should' gives natural modern English while preserving the deliberative
    force of the imperfect. 'To you' is more literal than 'with you' and fits the
    following action in context.
- source_word: וְיִשְׁתֹּק
  chosen: so that ... may quiet down
  alternatives:
  - and the sea may be quiet
  - and the sea may calm down
  - and the sea may be still
  lexicon: HALOT
  rationale: From שתק, 'be quiet, be still.' In context of a stormy sea, 'quiet down'
    is idiomatic and accurate. Rendering with 'so that' captures the purposive sense
    after the question, even though the conjunction is simply waw.
- source_word: הַיָּם
  chosen: the sea
  alternatives:
  - the ocean
  lexicon: HALOT
  rationale: Standard rendering for יָם in this narrative context.
- source_word: מֵעָלֵינוּ
  chosen: from upon us
  alternatives:
  - from us
  - off us
  lexicon: HALOT
  rationale: The preposition עַל with מן yields the vivid sense of the sea's threat
    pressing 'upon' them. 'From upon us' preserves that imagery more closely than
    the smoother but flatter 'from us.'
- source_word: כִּי
  chosen: For
  alternatives:
  - because
  - since
  lexicon: HALOT
  rationale: Introduces the reason for their urgent question. 'For' works naturally
    at the start of the explanatory clause.
- source_word: הוֹלֵךְ וְסֹעֵר
  chosen: was growing more and more stormy
  alternatives:
  - was going and raging
  - kept growing stormier
  - was increasingly tempestuous
  lexicon: HALOT
  rationale: The construction with הולך plus participle expresses progressive increase.
    'Growing more and more stormy' communicates the ongoing intensification of the
    sea better than a wooden literalism.
