id: JON.1.16
reference: Jonah 1:16
source:
  edition: WLC
  text: וַ/יִּֽירְא֧וּ הָ/אֲנָשִׁ֛ים יִרְאָ֥ה גְדוֹלָ֖ה אֶת יְהוָ֑ה וַ/יִּֽזְבְּחוּ זֶ֨בַח֙ לַֽ/יהוָ֔ה וַֽ/יִּדְּר֖וּ נְדָרִֽים־־׃
translation:
  text: Then the men feared Yahweh with great fear, and they offered a sacrifice to Yahweh and made vows.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'were greatly afraid of the LORD,' or 'revered the LORD greatly.' The Hebrew literally says, 'the men feared a great fear of the LORD.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּירְאוּ
  chosen: feared
  alternatives:
  - were afraid of
  - revered
  lexicon: HALOT
  rationale: From ירא in the Qal, denoting fear. In this context, after the sea's calming, the verb carries both dread and reverential awe. 'Feared' preserves the lexical link with the following noun יִרְאָה and avoids over-interpreting as merely 'revered'.
- source_word: הָאֲנָשִׁים
  chosen: the men
  alternatives:
  - the sailors
  - the people
  lexicon: HALOT
  rationale: The noun means 'the men.' Although context identifies them as sailors, the Hebrew uses the ordinary term, so 'the men' is retained rather than a contextual paraphrase.
- source_word: יִרְאָה גְדוֹלָה
  chosen: with great fear
  alternatives:
  - greatly
  - with great awe
  lexicon: HALOT
  rationale: 'The cognate accusative intensifies the verb: literally ''feared a great fear.'' ''With great fear'' preserves the Hebrew emphasis in readable English better than flattening it to an adverb.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וַיִּזְבְּחוּ זֶבַח
  chosen: offered a sacrifice
  alternatives:
  - sacrificed a sacrifice
  - made a sacrifice
  lexicon: HALOT
  rationale: The verb-noun combination is idiomatic for sacrificial offering. 'Offered a sacrifice' is natural English and preserves the cultic sense without awkward literalism.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - for the LORD
  lexicon: HALOT
  rationale: The preposition ל marks the recipient/dedication of the sacrifice. 'To the LORD' is the most straightforward rendering in English.
- source_word: וַיִּדְּרוּ נְדָרִים
  chosen: made vows
  alternatives:
  - vowed vows
  - made solemn vows
  lexicon: HALOT
  rationale: The verb-noun pairing is idiomatic. 'Made vows' is standard English and preserves the sense of formal commitments made in response to divine deliverance.
