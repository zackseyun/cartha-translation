theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Nuance of fear toward the LORD
  chosen_reading: feared the LORD with great fear
  alternative_readings:
  - revered the LORD greatly
  - were greatly afraid of the LORD
  rationale: The Hebrew presents fear language strongly and does not require reducing it either to bare terror or to purely religious reverence. The chosen rendering preserves the theological tension of awe, dread, and worshipful response.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it'
