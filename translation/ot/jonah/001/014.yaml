id: JON.1.14
reference: Jonah 1:14
source:
  edition: WLC
  text: וַ/יִּקְרְא֨וּ אֶל יְהוָ֜ה וַ/יֹּאמְר֗וּ אָנָּ֤ה יְהוָה֙ אַל נָ֣א נֹאבְדָ֗ה בְּ/נֶ֨פֶשׁ֙ הָ/אִ֣ישׁ הַ/זֶּ֔ה וְ/אַל תִּתֵּ֥ן עָלֵ֖י/נוּ דָּ֣ם נָקִ֑יא כִּֽי אַתָּ֣ה יְהוָ֔ה כַּ/אֲשֶׁ֥ר חָפַ֖צְתָּ עָשִֽׂיתָ־־־־׃
translation:
  text: Then they cried out to Yahweh and said, “Please, Yahweh, do not let us perish on account of this man's life, and do not put innocent blood on us, for you, Yahweh, have done as you pleased.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'do not charge us with innocent blood' or 'do not make us guilty of innocent blood.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'because of this man's life'; the phrase may also be understood as 'for taking this man's life' or 'on account of this man.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְרְאוּ אֶל יְהוָה
  chosen: Then they cried out to the LORD
  alternatives:
  - Then they called to the LORD
  - Then they prayed to the LORD
  lexicon: HALOT
  rationale: קרא אל in this context denotes an urgent appeal directed to God. 'Cried out' preserves the distress and immediacy better than the flatter 'called,' while remaining natural English.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אָנָּה
  chosen: Please
  alternatives:
  - Ah
  - O please
  lexicon: HALOT
  rationale: This particle expresses urgent entreaty. 'Please' is idiomatic modern English and fits the prayerful plea.
- source_word: אַל נָא נֹאבְדָה
  chosen: do not let us perish
  alternatives:
  - let us not perish
  - do not make us perish
  lexicon: HALOT
  rationale: The cohortative with negative particle expresses a plea that they not come to ruin. 'Do not let us perish' communicates the petition naturally in English without over-specifying causation.
- source_word: בְּנֶפֶשׁ הָאִישׁ הַזֶּה
  chosen: because of this man's life
  alternatives:
  - for this man's life
  - on account of this man
  - for taking this man's life
  lexicon: HALOT
  rationale: נפש here most naturally refers to the man's life, not merely his person or soul. With אבד, the phrase asks that they not perish on account of Jonah's life being taken. 'Because of this man's life' preserves the lexical sense of נפש while fitting the idiom of the plea.
- source_word: הָאִישׁ הַזֶּה
  chosen: this man's
  alternatives:
  - this man’s
  - this person’s
  lexicon: HALOT
  rationale: איש is specifically masculine singular here and refers to Jonah. 'This man's' is gender-accurate and natural in context.
- source_word: וְאַל תִּתֵּן עָלֵינוּ דָּם נָקִיא
  chosen: and do not put innocent blood on us
  alternatives:
  - and do not charge us with innocent blood
  - and do not make us guilty of innocent blood
  lexicon: HALOT
  rationale: The idiom of 'putting blood on' someone conveys bloodguilt. 'Put innocent blood on us' stays close to the Hebrew while remaining intelligible; the more interpretive 'charge us with bloodguilt' is possible but less formally transparent.
- source_word: דָּם נָקִיא
  chosen: innocent blood
  alternatives:
  - the blood of an innocent man
  - bloodguilt for the innocent
  lexicon: HALOT
  rationale: This is a standard Hebrew expression for the wrongful shedding of innocent life. 'Innocent blood' is the established and accurate English equivalent.
- source_word: כִּי אַתָּה יְהוָה
  chosen: for you, LORD
  alternatives:
  - because you, LORD
  - for you, O LORD
  lexicon: HALOT
  rationale: כִּי introduces the ground of their plea. 'For you, LORD' is concise and natural, and the vocative force is retained.
- source_word: כַּאֲשֶׁר חָפַצְתָּ עָשִׂיתָ
  chosen: have done as you pleased
  alternatives:
  - have done as you desired
  - have acted according to your will
  - have done what you wanted
  lexicon: HALOT
  rationale: חפץ denotes desire or pleasure, and עשה states completed action. 'Have done as you pleased' is idiomatic, dignified, and preserves the sense of divine freedom without importing later theological terminology.
