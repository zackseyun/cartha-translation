theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Whether to make bloodguilt explicit in the main text
  chosen_reading: retain the Hebrew idiom 'do not put innocent blood on us'
  alternative_readings:
  - do not hold us guilty for innocent blood
  - do not charge us with bloodguilt
  rationale: The Hebrew idiom is sufficiently understandable in English and preserves the legal-moral texture of the text. More explicit renderings are interpretive and therefore better preserved as lexical alternatives rather than elevated into the main text.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: optimal equivalence; preserve source-text sense without unnecessary paraphrase'
