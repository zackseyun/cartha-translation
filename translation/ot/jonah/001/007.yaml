id: JON.1.7
reference: Jonah 1:7
source:
  edition: WLC
  text: וַ/יֹּאמְר֞וּ אִ֣ישׁ אֶל רֵעֵ֗/הוּ לְכוּ֙ וְ/נַפִּ֣ילָה גֽוֹרָל֔וֹת וְ/נֵ֣דְעָ֔ה
    בְּ/שֶׁ/לְּ/מִ֛י הָ/רָעָ֥ה הַ/זֹּ֖את לָ֑/נוּ וַ/יַּפִּ֨לוּ֙ גּֽוֹרָל֔וֹת וַ/יִּפֹּ֥ל
    הַ/גּוֹרָ֖ל עַל יוֹנָֽה־־׃
translation:
  text: And they said, each man to his companion, “Come, let us cast lots, so that
    we may know on whose account this evil has come upon us.” So they cast lots, and
    the lot fell on Jonah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “this calamity” or “this disaster.” The Hebrew word can mean evil, harm,
      or disaster depending on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: אִישׁ אֶל רֵעֵהוּ
  chosen: each man to his companion
  alternatives:
  - one to another
  - each to his neighbor
  lexicon: HALOT
  rationale: The distributive singular אִישׁ with אֶל רֵעֵהוּ idiomatically means
    the men speaking mutually. 'Each man to his companion' preserves the singular
    distributive force and the gendered wording of the Hebrew, in keeping with gender-accurate
    policy.
- source_word: לְכוּ
  chosen: Come
  alternatives:
  - Come now
  - Go
  lexicon: HALOT
  rationale: Though literally from 'go/walk,' לְכוּ often functions idiomatically
    as an exhortation equivalent to 'come' in English when introducing a proposed
    action. This is the most natural modern rendering without losing the imperative
    force.
- source_word: וְנַפִּילָה גוֹרָלוֹת
  chosen: let us cast lots
  alternatives:
  - let us throw lots
  lexicon: HALOT
  rationale: The cohortative expresses joint resolve. 'Cast lots' is the standard
    English idiom for the practice and accurately conveys the action.
- source_word: וְנֵדְעָה
  chosen: so that we may know
  alternatives:
  - and let us know
  - that we may find out
  lexicon: HALOT
  rationale: The conjunction plus cohortative here expresses purpose/result following
    the proposal to cast lots. 'So that we may know' makes the relation clear in natural
    English.
- source_word: בְּשֶׁלְּמִי
  chosen: on whose account
  alternatives:
  - because of whom
  - for whose sake
  lexicon: HALOT
  rationale: The expression asks to identify the person responsible for the calamity.
    'On whose account' is idiomatic and preserves the causal nuance without overstating
    moral blame beyond the text.
- source_word: הָרָעָה הַזֹּאת
  chosen: this evil
  alternatives:
  - this calamity
  - this disaster
  lexicon: HALOT
  rationale: רָעָה can denote moral evil or experiential disaster/calamity. In this
    storm context it refers to harmful trouble that has come upon them. 'Evil' preserves
    the Hebrew term more formally, while the context clarifies that it is calamity
    rather than moral evil committed by them.
- source_word: לָנוּ
  chosen: has come upon us
  alternatives:
  - is upon us
  - has happened to us
  lexicon: HALOT
  rationale: Although no explicit verb 'come' appears in Hebrew, English requires
    a verbal expression with 'this evil.' 'Has come upon us' is a natural completion
    that reflects the dative sense and the situational force of the clause.
- source_word: וַיַּפִּלוּ גוֹרָלוֹת
  chosen: So they cast lots
  alternatives:
  - Then they cast lots
  lexicon: HALOT
  rationale: The wayyiqtol advances the narrative. 'So' smoothly conveys sequence
    and consequence from their proposal.
- source_word: וַיִּפֹּל הַגּוֹרָל עַל יוֹנָה
  chosen: the lot fell on Jonah
  alternatives:
  - the lot fell to Jonah
  lexicon: HALOT
  rationale: This is the conventional and accurate English rendering of the idiom,
    preserving the narrative outcome clearly.
