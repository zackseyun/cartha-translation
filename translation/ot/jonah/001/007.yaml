theological_decisions:
- issue: Rendering of רָעָה in a providential calamity context
  chosen_reading: this evil
  alternative_readings:
  - this calamity
  - this disaster
  rationale: The Hebrew term broadly covers evil, harm, or disaster. Here the sailors
    refer to the affliction that has come upon them, not to a moral evil they are
    committing. Retaining 'evil' preserves lexical transparency, while the surrounding
    context prevents doctrinal confusion about God's moral character or culpability.
  doctrine_reference: Translation philosophy §1, §5
