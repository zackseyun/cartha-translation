id: JON.1.8
reference: Jonah 1:8
source:
  edition: WLC
  text: וַ/יֹּאמְר֣וּ אֵלָ֔י/ו הַגִּידָ/ה נָּ֣א לָ֔/נוּ בַּ/אֲשֶׁ֛ר לְ/מִי הָ/רָעָ֥ה
    הַ/זֹּ֖את לָ֑/נוּ מַה מְּלַאכְתְּ/ךָ֙ וּ/מֵ/אַ֣יִן תָּב֔וֹא מָ֣ה אַרְצֶ֔/ךָ וְ/אֵֽי
    מִ/זֶּ֥ה עַ֖ם אָֽתָּה־־־־׃
translation:
  text: Then they said to him, “Please tell us on whose account this trouble has come
    upon us. What is your occupation, and where do you come from? What is your land,
    and from what people are you?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'because of whom this calamity has come upon us.' The Hebrew רָעָה here
      refers to the threatening disaster facing the sailors, not necessarily moral
      evil.
    reason: lexical_alternative
  - marker: b
    text: '''What is your land'' may also be rendered ''What is your country?'''
    reason: lexical_alternative
lexical_decisions:
- source_word: הַגִּידָה נָּא
  chosen: Please tell us
  alternatives:
  - Tell us, please
  - Declare to us, please
  lexicon: HALOT
  rationale: הגיד in the Hiphil means to tell, declare, or make known. נָא adds politeness/urgency.
    'Please tell us' is natural modern English and preserves the requestive force
    without sounding archaic.
- source_word: בַּאֲשֶׁר לְמִי הָרָעָה הַזֹּאת לָנוּ
  chosen: on whose account this trouble has come upon us
  alternatives:
  - for whose sake this evil is upon us
  - because of whom this calamity has come to us
  lexicon: HALOT
  rationale: The phrase asks for the person responsible in connection with the disaster.
    רָעָה can mean evil, trouble, disaster, or calamity; here the context is the storm
    threatening the sailors, so 'trouble' fits idiomatic English while avoiding an
    overly moralized sense of 'evil.' 'On whose account' captures the causal force
    of לְמִי in this construction.
- source_word: מַה מְּלַאכְתְּךָ
  chosen: What is your occupation
  alternatives:
  - What is your work
  - What is your business
  lexicon: HALOT
  rationale: מְלָאכָה commonly denotes work, occupation, or business. 'Occupation'
    is concise and idiomatic in a sequence of identity questions.
- source_word: וּמֵאַיִן תָּבוֹא
  chosen: and where do you come from
  alternatives:
  - and from where do you come
  lexicon: HALOT
  rationale: מֵאַיִן asks about origin or source. The idiomatic English order 'where
    do you come from' preserves the sense naturally.
- source_word: מָה אַרְצֶךָ
  chosen: What is your land
  alternatives:
  - What is your country
  lexicon: HALOT
  rationale: אֶרֶץ can mean land, country, or earth. 'Land' is closer to the Hebrew
    and pairs well with the following question about people-group. 'Country' is possible
    but slightly more modern-national in nuance than the Hebrew requires.
- source_word: וְאֵי מִזֶּה עַם אָתָּה
  chosen: and from what people are you
  alternatives:
  - and of what people are you
  - and from which people do you come
  lexicon: HALOT
  rationale: עַם refers to a people-group or nation. The expression asks about ethnic/national
    identity. 'From what people are you' is slightly formal but transparent and preserves
    the Hebrew structure better than a freer paraphrase.
- source_word: וַיֹּאמְרוּ אֵלָיו
  chosen: Then they said to him
  alternatives:
  - And they said to him
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then' gives readable English
    narrative flow while preserving sequence.
