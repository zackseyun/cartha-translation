id: JON.1.2
reference: Jonah 1:2
source:
  edition: WLC
  text: ק֠וּם לֵ֧ךְ אֶל נִֽינְוֵ֛ה הָ/עִ֥יר הַ/גְּדוֹלָ֖ה וּ/קְרָ֣א עָלֶ֑י/הָ כִּֽי
    עָלְתָ֥ה רָעָתָ֖/ם לְ/פָנָֽ/י־־׃
translation:
  text: Arise, go to Nineveh, the great city, and cry out against it, because their
    evil has come up before me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'proclaim concerning it.' The Hebrew phrase can be rendered more generally,
      but in this context it likely carries the sense of announcing judgment against
      Nineveh.
    reason: lexical_alternative
  - marker: b
    text: Or 'their wickedness.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ק֠וּם
  chosen: Arise
  alternatives:
  - Get up
  - Set out
  lexicon: HALOT
  rationale: Imperative of קום. 'Arise' preserves the abrupt prophetic summons and
    pairs naturally with the following imperative 'go.' It is slightly more formal
    than 'get up' without becoming archaic in context.
- source_word: לֵ֧ךְ
  chosen: go
  alternatives:
  - walk
  - depart
  lexicon: HALOT
  rationale: Basic imperative of הלך. 'Go' is the plain English equivalent and best
    fits modern readable style.
- source_word: אֶל
  chosen: to
  alternatives:
  - toward
  lexicon: HALOT
  rationale: Directional preposition indicating movement toward Nineveh; 'to' is the
    most natural English rendering here.
- source_word: נִֽינְוֵ֛ה
  chosen: Nineveh
  rationale: Proper name; per translation philosophy, names are transliterated by
    standard English convention.
- source_word: הָעִיר הַגְּדוֹלָה
  chosen: the great city
  alternatives:
  - the large city
  - that great city
  lexicon: HALOT
  rationale: Appositional description of Nineveh. 'Great city' preserves both size
    and prominence, matching common biblical usage better than the flatter 'large
    city.'
- source_word: וּקְרָא
  chosen: cry out
  alternatives:
  - proclaim
  - call
  lexicon: HALOT
  rationale: Imperative of קרא. In prophetic contexts it often denotes a loud public
    announcement. 'Cry out' preserves the urgency and audible force better than the
    more neutral 'proclaim,' while avoiding over-specifying the content.
- source_word: עָלֶיהָ
  chosen: against it
  alternatives:
  - concerning it
  - to it
  lexicon: HALOT
  rationale: The preposition על with קרא in prophetic judgment contexts commonly carries
    an adversative sense. 'Against it' best reflects the denunciatory force of the
    commission.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  lexicon: HALOT
  rationale: Introduces the reason for Jonah's mission. 'Because' is clearer in contemporary
    English than 'for' while preserving the causal sense.
- source_word: עָלְתָה
  chosen: has come up
  alternatives:
  - has risen
  - has gone up
  lexicon: HALOT
  rationale: Perfect of עלה used metaphorically for something ascending into God's
    presence. 'Has come up' is idiomatic and preserves the vertical imagery.
- source_word: רָעָתָם
  chosen: their evil
  alternatives:
  - their wickedness
  - their calamity
  lexicon: HALOT
  rationale: Here רעה refers to moral evil rather than disaster, since it is the reason
    for divine accusation against Nineveh. 'Evil' is concise and direct; 'wickedness'
    is a viable alternative but slightly more interpretive in tone.
- source_word: לְפָנַי
  chosen: before me
  alternatives:
  - into my presence
  - before my face
  lexicon: HALOT
  rationale: Idiomatic expression for entering God's notice/presence. 'Before me'
    is the most natural English equivalent and retains the relational/judicial sense.
