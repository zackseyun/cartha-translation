theological_decisions:
- issue: Sense of the prophetic commission in וּקְרָא עָלֶיהָ
  chosen_reading: A proclamation of judgment against Nineveh
  alternative_readings:
  - A general proclamation to Nineveh without explicit adversative force
  rationale: The combination of קרא with על in this context, followed by the causal
    clause about Nineveh's evil coming up before God, strongly supports a denunciatory
    message rather than a neutral announcement. The translation preserves that force
    with 'cry out against it.'
  doctrine_reference: Preserve theological tension rather than resolve it; here the
    syntax sufficiently supports the adversative sense, so no ambiguity needs to be
    preserved in the main text.
