theological_decisions:
- issue: Rendering of pagan deity reference אֱלֹהָיו
  chosen_reading: his god
  alternative_readings:
  - his gods
  rationale: The singular suffix on אֱלֹהָיו and the distributive אִישׁ support 'each
    cried out to his god,' emphasizing individual pagan devotion rather than a generic
    plural. Lowercase avoids implying identity with the God of Israel.
