id: JON.1.5
reference: Jonah 1:5
source:
  edition: WLC
  text: וַ/יִּֽירְא֣וּ הַ/מַּלָּחִ֗ים וַֽ/יִּזְעֲקוּ֮ אִ֣ישׁ אֶל אֱלֹהָי/ו֒ וַ/יָּטִ֨לוּ
    אֶת הַ/כֵּלִ֜ים אֲשֶׁ֤ר בָּֽ/אֳנִיָּה֙ אֶל הַ/יָּ֔ם לְ/הָקֵ֖ל מֵֽ/עֲלֵי/הֶ֑ם וְ/יוֹנָ֗ה
    יָרַד֙ אֶל יַרְכְּתֵ֣י הַ/סְּפִינָ֔ה וַ/יִּשְׁכַּ֖ב וַ/יֵּרָדַֽם־־־־׃
translation:
  text: Then the sailors were afraid, and each cried out to his god. They threw the
    cargo that was in the ship into the sea to lighten it for themselves. But Yonah
    had gone down into the innermost parts of the vessel, and he lay down and fell
    fast asleep.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the ship's equipment' or 'the articles.' The Hebrew term is broad, but
      in context likely refers to cargo or gear thrown overboard to lighten the ship.
    reason: lexical_alternative
  - marker: b
    text: Or 'the recesses of the ship' or 'the hold of the ship.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּירְאוּ
  chosen: were afraid
  alternatives:
  - feared
  - became afraid
  lexicon: HALOT
  rationale: From ירא, denoting fear in response to danger. 'Were afraid' is natural
    modern English and preserves the narrative sense without overinterpreting as reverential
    fear.
- source_word: הַמַּלָּחִים
  chosen: the sailors
  alternatives:
  - the mariners
  - the seamen
  lexicon: HALOT
  rationale: מַלָּחִים refers specifically to seafaring crewmen. 'Sailors' is the
    clearest contemporary equivalent; 'mariners' is accurate but more archaic.
- source_word: וַיִּזְעֲקוּ אִישׁ אֶל אֱלֹהָיו
  chosen: each cried out to his god
  alternatives:
  - each called out to his god
  - each cried to his god
  lexicon: HALOT
  rationale: זעק conveys a strong cry in distress. אִישׁ distributively means 'each,'
    and אֱלֹהָיו with singular suffix indicates each sailor appealed to his own deity.
    Lowercase 'god' reflects the pagan referent rather than the God of Israel.
- source_word: וַיָּטִלוּ
  chosen: They threw
  alternatives:
  - they hurled
  - they cast
  lexicon: HALOT
  rationale: The verb denotes throwing/casting. 'Threw' is straightforward and idiomatic;
    'hurled' may overstate the force beyond what the context already supplies.
- source_word: הַכֵּלִים
  chosen: the cargo
  alternatives:
  - the vessels
  - the equipment
  - the articles
  lexicon: HALOT
  rationale: כֵּלִים is a broad term ('articles, utensils, gear, equipment'), but
    in this maritime storm context it most naturally refers to the ship's goods/load
    being jettisoned. 'Cargo' best communicates the likely sense in readable English.
- source_word: אֲשֶׁר בָּאֳנִיָּה
  chosen: that was in the ship
  alternatives:
  - that were in the ship
  - that was on the ship
  lexicon: HALOT
  rationale: The relative clause modifies the collective noun sense of 'cargo.' 'In
    the ship' follows the Hebrew preposition and suits enclosed shipboard storage.
- source_word: אֶל הַיָּם
  chosen: into the sea
  alternatives:
  - to the sea
  lexicon: HALOT
  rationale: Although אֶל is literally 'to,' English idiom with throwing requires
    'into the sea' to express the motion clearly.
- source_word: לְהָקֵל מֵעֲלֵיהֶם
  chosen: to lighten it for themselves
  alternatives:
  - to lighten the load for themselves
  - to make it lighter for them
  lexicon: HALOT
  rationale: הקל means 'to make light/lighten.' The phrase likely means reducing the
    ship's burden for the sailors' benefit. 'It' refers to the ship/load situation
    and keeps the line concise; the benefit phrase מֵעֲלֵיהֶם is represented by 'for
    themselves.'
- source_word: וְיוֹנָה
  chosen: But Yonah
  alternatives:
  - And Jonah
  - Now Jonah
  lexicon: HALOT
  rationale: The conjunction marks contrast between the frantic sailors and Yonah's
    inactivity. The project preference is to transliterate names by standard conventions;
    'Yonah' reflects the Hebrew name directly.
- source_word: יָרַד
  chosen: had gone down
  alternatives:
  - went down
  - was down
  lexicon: HALOT
  rationale: ירד means 'went down.' English past perfect helps show the circumstantial
    background relative to the sailors' actions, though the Hebrew wayyiqtol/qatal
    sequence is narrative. 'Had gone down' clarifies scene-setting without adding
    content.
- source_word: יַרְכְּתֵי
  chosen: the innermost parts
  alternatives:
  - the recesses
  - the farthest part
  - the hold
  lexicon: HALOT
  rationale: יַרְכְּתֵי denotes remote or inner recesses. 'Innermost parts' preserves
    the spatial imagery. 'Hold' is possible as an interpretive maritime equivalent,
    but the Hebrew is more literally spatial than technical.
- source_word: הַסְּפִינָה
  chosen: the vessel
  alternatives:
  - the ship
  - the boat
  lexicon: HALOT
  rationale: A second nautical term distinct from אֳנִיָּה appears here. 'Vessel'
    preserves some lexical variation in English without forcing a sharp technical
    distinction the Hebrew may not intend.
- source_word: וַיִּשְׁכַּב
  chosen: he lay down
  alternatives:
  - he lay
  lexicon: HALOT
  rationale: שׁכב means to lie down. 'Lay down' captures the deliberate action before
    sleep.
- source_word: וַיֵּרָדַם
  chosen: fell fast asleep
  alternatives:
  - fell asleep
  - was fast asleep
  - slept deeply
  lexicon: HALOT
  rationale: The verb רדם conveys deep sleep or heavy slumber. 'Fell fast asleep'
    expresses both the onset and the depth of sleep in natural English.
