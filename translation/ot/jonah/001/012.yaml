id: JON.1.12
reference: Jonah 1:12
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר אֲלֵי/הֶ֗ם שָׂא֨וּ/נִי֙ וַ/הֲטִילֻ֣/נִי אֶל הַ/יָּ֔ם וְ/יִשְׁתֹּ֥ק
    הַ/יָּ֖ם מֵֽ/עֲלֵי/כֶ֑ם כִּ֚י יוֹדֵ֣עַ אָ֔נִי כִּ֣י בְ/שֶׁ/לִּ֔/י הַ/סַּ֧עַר הַ/גָּד֛וֹל
    הַ/זֶּ֖ה עֲלֵי/כֶֽם־׃
translation:
  text: And he said to them, “Pick me up and throw me into the sea, and the sea will
    become calm from upon you, for I know that this great storm is upon you because
    of me.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'hurl me into the sea.'
    reason: lexical_alternative
  - marker: b
    text: Literally, 'the sea will be quiet from upon you.'
    reason: lexical_alternative
  - marker: c
    text: Or, 'this great storm is upon you on my account.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׂא֨וּ/נִי
  chosen: Pick me up
  alternatives:
  - Lift me up
  - Carry me
  lexicon: HALOT
  rationale: נשא in this context refers to physically lifting Jonah in order to cast
    him overboard. 'Pick me up' is natural modern English and preserves the concrete
    action better than the more formal 'take me up.'
- source_word: וַ/הֲטִילֻ֣/נִי
  chosen: throw me
  alternatives:
  - hurl me
  - cast me
  lexicon: HALOT
  rationale: The hiphil of טול means to throw/cast. 'Throw me' is clear and idiomatic;
    'hurl me' is vivid but slightly more interpretive in intensity, while 'cast me'
    is traditional but less natural for contemporary readers.
- source_word: הַ/יָּם
  chosen: the sea
  alternatives:
  - the ocean
  lexicon: HALOT
  rationale: ים normally means 'sea.' 'Ocean' would over-specify and is unnecessary.
- source_word: וְ/יִשְׁתֹּק
  chosen: will become calm
  alternatives:
  - will be quiet
  - will grow still
  - will be still
  lexicon: HALOT
  rationale: שתק literally means 'be quiet/silent,' but with the sea as subject in
    a storm context it denotes the cessation of tumult. 'Will become calm' communicates
    the intended sense in natural English while remaining close to the Hebrew.
- source_word: מֵֽ/עֲלֵי/כֶם
  chosen: from upon you
  alternatives:
  - away from you
  - off you
  lexicon: HALOT
  rationale: The prepositional phrase is literally 'from upon you.' Retaining 'from
    upon you' preserves the Hebrew imagery of the storm pressing upon them, while
    still being understandable in English.
- source_word: יוֹדֵעַ אָ֔נִי
  chosen: I know
  alternatives:
  - I myself know
  - I am aware
  lexicon: HALOT
  rationale: The participle plus pronoun gives an emphatic assertion of knowledge.
    'I know' is sufficient in English; adding 'myself' would overplay the emphasis.
- source_word: בְ/שֶׁ/לִּ֔/י
  chosen: because of me
  alternatives:
  - on my account
  - for my sake
  lexicon: HALOT
  rationale: בשלי here indicates cause or responsibility. 'Because of me' is the clearest
    contemporary rendering and accurately conveys Jonah's admission that he is the
    reason for the storm.
- source_word: הַ/סַּ֧עַר הַ/גָּד֛וֹל הַ/זֶּ֖ה
  chosen: this great storm
  alternatives:
  - this great tempest
  - this violent storm
  lexicon: HALOT
  rationale: סער denotes a storm or tempest. 'This great storm' is straightforward
    and preserves both the demonstrative and adjective without archaic diction.
- source_word: עֲלֵי/כֶֽם
  chosen: is upon you
  alternatives:
  - has come upon you
  - is against you
  lexicon: HALOT
  rationale: על retains the image of the storm being upon the sailors. 'Is upon you'
    preserves that metaphor and matches the earlier phrase 'from upon you.'
