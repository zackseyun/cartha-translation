theological_decisions:
- issue: Jonah's acknowledgment of culpability for the storm
  chosen_reading: Jonah explicitly states that the storm has come upon the sailors
    because of him.
  alternative_readings:
  - Jonah speaks only of association, not direct culpability.
  rationale: The causal expression בשלִי strongly indicates responsibility or cause.
    The translation should preserve Jonah's confession without softening it into mere
    correlation.
