id: JON.4.9
reference: Jonah 4:9
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר אֱלֹהִים֙ אֶל יוֹנָ֔ה הַ/הֵיטֵ֥ב חָרָֽה לְ/ךָ֖ עַל הַ/קִּֽיקָי֑וֹן
    וַ/יֹּ֕אמֶר הֵיטֵ֥ב חָֽרָה לִ֖/י עַד מָֽוֶת־־־־־׃
translation:
  text: Then God said to Jonah, “Is it right for you to be angry about the plant?”
    And he said, “It is right for me to be angry, even to death.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew קִיקָיוֹן (qiqayon), a plant of uncertain species; traditional translations
      include 'gourd' or 'vine,' and some identify it as a castor-oil plant.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַ/הֵיטֵב
  chosen: Is it right
  alternatives:
  - Do you do well
  - Is it good
  lexicon: HALOT
  rationale: The interrogative use of the infinitive absolute/adverbial form with
    חָרָה forms an idiom asking whether Jonah's anger is justified. 'Is it right'
    communicates the evaluative force in natural English better than a wooden 'Do
    you do well.'
- source_word: חָרָה
  chosen: to be angry / be angry
  alternatives:
  - to burn
  - to be kindled
  lexicon: HALOT
  rationale: In this idiom חרה expresses anger rather than literal burning. Rendering
    it as 'be angry' preserves the emotional sense without importing metaphor that
    would sound unnatural in English.
- source_word: לְ/ךָ
  chosen: for you
  alternatives:
  - to you
  lexicon: HALOT
  rationale: The preposition marks the person affected in the idiom 'is it right for
    you to be angry,' which is more idiomatic in English than 'to you.'
- source_word: עַל
  chosen: about
  alternatives:
  - over
  - because of
  - concerning
  lexicon: HALOT
  rationale: '''About the plant'' is clear modern English for the object/cause of
    Jonah''s anger. ''Over'' would also work, but ''about'' reads more naturally here.'
- source_word: הַ/קִּיקָיוֹן
  chosen: the plant
  alternatives:
  - the vine
  - the castor-oil plant
  - the kikayon
  lexicon: HALOT
  rationale: The precise botanical identification is uncertain. 'The plant' preserves
    the generic sense without overclaiming a species. Traditional 'gourd' or 'vine'
    is less certain; transliteration would be less readable in the main text.
- source_word: הֵיטֵב חָרָה לִי
  chosen: It is right for me to be angry
  alternatives:
  - I do well to be angry
  - I am right to be angry
  lexicon: HALOT
  rationale: Jonah's reply mirrors God's question and asserts the propriety of his
    anger. 'It is right for me to be angry' preserves the parallelism and the claim
    of justification.
- source_word: עַד מָוֶת
  chosen: even to death
  alternatives:
  - to the point of death
  - unto death
  lexicon: HALOT
  rationale: The phrase intensifies Jonah's anger to an extreme degree. 'Even to death'
    is concise, idiomatic, and preserves the severity without overinterpreting whether
    he means 'angry enough to die' or 'angry to the point of death.'
- source_word: וַ/יֹּאמֶר
  chosen: Then God said / And he said
  alternatives:
  - And God said / And Jonah said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then God said' is natural
    English at the start of the verse; the second clause keeps the pronoun 'he' because
    the antecedent is clear from context.
