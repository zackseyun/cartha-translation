theological_decisions:
- issue: Moral evaluation in God's question and Jonah's reply
  chosen_reading: Render the idiom as a question of whether Jonah's anger is right/justified.
  alternative_readings:
  - Render more formally as 'Do you do well to be angry?'
  rationale: The Hebrew idiom concerns the propriety of Jonah's anger, not merely
    the fact of it. This preserves the ethical confrontation in the narrative while
    remaining readable modern English.
  doctrine_reference: Translation philosophy §1, §6
- issue: Identification of קיקיון
  chosen_reading: Use the generic 'plant' in the main text.
  alternative_readings:
  - vine
  - gourd
  - castor-oil plant
  - kikayon
  rationale: The botanical referent is uncertain, and no doctrinal issue depends on
    specifying it. A generic rendering best reflects the source without false precision;
    alternatives are preserved in a footnote for auditability.
  doctrine_reference: Translation philosophy §1, §5
