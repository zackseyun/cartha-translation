id: JON.4.6
reference: Jonah 4:6
source:
  edition: WLC
  text: וַ/יְמַ֣ן יְהוָֽה אֱ֠לֹהִים קִיקָי֞וֹן וַ/יַּ֣עַל מֵ/עַ֣ל לְ/יוֹנָ֗ה לִֽ/הְי֥וֹת
    צֵל֙ עַל רֹאשׁ֔/וֹ לְ/הַצִּ֥יל ל֖/וֹ מֵ/רָֽעָת֑/וֹ וַ/יִּשְׂמַ֥ח יוֹנָ֛ה עַל הַ/קִּֽיקָי֖וֹן
    שִׂמְחָ֥ה גְדוֹלָֽה־׀־־׃
translation:
  text: And the LORD God appointed a qiqayon plant, and it grew up over Jonah to be
    a shade over his head, to deliver him from his discomfort. And Jonah rejoiced
    over the qiqayon plant with great joy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew qiqayon, a plant of uncertain identification; traditionally 'vine,'
      sometimes identified as a castor-oil plant.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְמַן
  chosen: appointed
  alternatives:
  - provided
  - prepared
  lexicon: HALOT
  rationale: The verb מנה in Jonah often carries the sense of sovereignly assigning
    or appointing (cf. the fish, plant, worm, east wind in this context). 'Appointed'
    preserves that deliberate divine action better than the more generic 'provided'
    or the traditional 'prepared'.
- source_word: יְהוָה אֱלֹהִים
  chosen: the LORD God
  alternatives:
  - Yahweh God
  lexicon: HALOT
  rationale: Following the doctrinal default, יְהוָה is rendered 'the LORD.' The paired
    divine names are naturally rendered 'the LORD God' in English.
- source_word: קִיקָיוֹן
  chosen: qiqayon plant
  alternatives:
  - plant
  - castor-oil plant
  - vine
  lexicon: HALOT
  rationale: The precise botanical identification is uncertain. Transliteration preserves
    the lexical particularity of the Hebrew without overstating identification. 'Plant'
    is added for readability. 'Vine' is traditional but too specific; 'castor-oil
    plant' is a scholarly proposal, not certain.
- source_word: וַיַּעַל
  chosen: it grew up
  alternatives:
  - it came up
  - it sprang up
  lexicon: HALOT
  rationale: The verb עלה literally means 'went up/came up.' In context of vegetation,
    'grew up' is idiomatic modern English while preserving the upward emergence of
    the plant.
- source_word: מֵעַל לְיוֹנָה
  chosen: over Jonah
  alternatives:
  - above Jonah
  lexicon: HALOT
  rationale: This expresses the plant's position relative to Jonah in natural English.
    'Over Jonah' fits the shading function that follows.
- source_word: לִהְיוֹת צֵל עַל רֹאשׁוֹ
  chosen: to be a shade over his head
  alternatives:
  - to become shade over his head
  - to give shade over his head
  lexicon: HALOT
  rationale: This closely follows the infinitive construction and the noun צֵל. 'Shade'
    is the plain sense and suits the immediate context.
- source_word: לְהַצִּיל לוֹ מֵרָעָתוֹ
  chosen: to deliver him from his discomfort
  alternatives:
  - to save him from his evil
  - to rescue him from his misery
  - to relieve him from his trouble
  lexicon: HALOT
  rationale: רָעָה can mean evil, trouble, misery, or distress depending on context.
    Here the plant's shade relieves Jonah's physical distress/exposure, not moral
    evil. 'Discomfort' captures the immediate situational sense without overreading.
    'Deliver' preserves the force of הציל.
- source_word: וַיִּשְׂמַח ... שִׂמְחָה גְדוֹלָה
  chosen: rejoiced ... with great joy
  alternatives:
  - was very glad
  - rejoiced greatly
  lexicon: HALOT
  rationale: The Hebrew uses a cognate accusative for emphasis. 'Rejoiced ... with
    great joy' preserves that rhetorical force more transparently than the smoother
    but less literal 'was very glad'.
