id: JON.4.2
reference: Jonah 4:2
source:
  edition: WLC
  text: וַ/יִּתְפַּלֵּ֨ל אֶל יְהוָ֜ה וַ/יֹּאמַ֗ר אָנָּ֤ה יְהוָה֙ הֲ/לוֹא זֶ֣ה דְבָרִ֗/י
    עַד הֱיוֹתִ/י֙ עַל אַדְמָתִ֔/י עַל כֵּ֥ן קִדַּ֖מְתִּי לִ/בְרֹ֣חַ תַּרְשִׁ֑ישָׁ/ה
    כִּ֣י יָדַ֗עְתִּי כִּ֤י אַתָּה֙ אֵֽל חַנּ֣וּן וְ/רַח֔וּם אֶ֤רֶךְ אַפַּ֨יִם֙ וְ/רַב
    חֶ֔סֶד וְ/נִחָ֖ם עַל הָ/רָעָֽה־־־־־־־־׃
translation:
  text: And he prayed to the LORD and said, “Please, LORD, was this not what I said
    while I was still in my own land? That is why I acted first to flee to Tarshish,
    because I knew that you are a gracious and compassionate God, slow to anger and
    abundant in steadfast love, and relenting concerning the disaster.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I hastened to flee to Tarshish' or 'I anticipated this by fleeing to
      Tarshish.' The Hebrew verb conveys acting in advance or going before.
    reason: lexical_alternative
  - marker: b
    text: Or 'merciful' for 'compassionate.' The phrase echoes Exodus 34:6.
    reason: cross_reference
  - marker: c
    text: Or 'relenting from the calamity.' The Hebrew says 'the evil/disaster,' using
      'evil' in the sense of threatened judgment, not moral evil in God.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתְפַּלֵּל
  chosen: he prayed
  alternatives:
  - he interceded
  - he appealed
  lexicon: HALOT
  rationale: Hitpael of פלל commonly means 'to pray.' Although Jonah's speech is complaint-laden,
    the verb still denotes prayer directed to God.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine default for the divine name, render YHWH as 'the LORD' rather
    than transliteration.
- source_word: אָנָּה
  chosen: Please
  alternatives:
  - Ah
  - O
  lexicon: HALOT
  rationale: Polite/interjectional particle expressing entreaty or exclamation. 'Please'
    fits natural modern English while preserving the appeal to the LORD.
- source_word: הֲלוֹא
  chosen: was this not
  alternatives:
  - is this not
  - did I not say this
  lexicon: HALOT
  rationale: Introduces a rhetorical question expecting agreement. Past-oriented English
    fits the surrounding narrative and Jonah's recollection.
- source_word: דְבָרִי
  chosen: what I said
  alternatives:
  - my word
  - my matter
  - my statement
  lexicon: HALOT
  rationale: Though literally 'my word/matter,' idiomatic English in this context
    is 'what I said,' referring to Jonah's prior warning or claim.
- source_word: עַד הֱיוֹתִי עַל אַדְמָתִי
  chosen: while I was still in my own land
  alternatives:
  - before I was in my land
  - when I was upon my land
  lexicon: HALOT
  rationale: The phrase refers to Jonah's being in his homeland before departure.
    'While I was still in my own land' is natural and preserves the temporal sense.
- source_word: עַל כֵּן
  chosen: That is why
  alternatives:
  - therefore
  - for that reason
  lexicon: HALOT
  rationale: Causal-consequential connector explaining Jonah's earlier action.
- source_word: קִדַּמְתִּי
  chosen: I acted first
  alternatives:
  - I hastened
  - I anticipated
  - I went ahead
  lexicon: HALOT
  rationale: The verb conveys going before or acting in advance. Here Jonah means
    he preemptively fled before the announced mission could unfold. 'I acted first'
    captures the anticipatory nuance better than a bare 'I fled quickly.'
- source_word: לִבְרֹחַ תַּרְשִׁישָׁה
  chosen: to flee to Tarshish
  alternatives:
  - to run away to Tarshish
  lexicon: HALOT
  rationale: Standard directional phrase with infinitive of ברח. 'Flee' preserves
    the seriousness of Jonah's attempted escape.
- source_word: אֵל
  chosen: God
  alternatives:
  - Mighty God
  - God Almighty
  lexicon: HALOT
  rationale: Generic divine title here introducing the creedal description of God's
    character. 'God' is sufficient in English.
- source_word: חַנּוּן וְרַחוּם
  chosen: gracious and compassionate
  alternatives:
  - gracious and merciful
  lexicon: HALOT
  rationale: These paired attributes echo Exod 34:6. 'Compassionate' brings out רחום
    clearly in contemporary English, while 'gracious' fits חנון.
- source_word: אֶרֶךְ אַפַּיִם
  chosen: slow to anger
  alternatives:
  - long of nostrils
  - patient
  lexicon: HALOT
  rationale: Established idiomatic equivalent for the Hebrew expression denoting patience
    and restraint of anger.
- source_word: רַב חֶסֶד
  chosen: abundant in steadfast love
  alternatives:
  - abounding in lovingkindness
  - great in covenant love
  - rich in faithful love
  lexicon: HALOT
  rationale: חסד is a weighty covenantal term. 'Steadfast love' is a well-established
    English rendering that preserves covenant loyalty better than the flatter 'kindness.'
    'Abundant in' reflects רַב idiomatically.
- source_word: וְנִחָם עַל הָרָעָה
  chosen: and relenting concerning the disaster
  alternatives:
  - and relenting from the calamity
  - and changing your mind about the evil
  - and sorry over the disaster
  lexicon: HALOT
  rationale: נחם here denotes relenting or withholding announced judgment, not repentance
    from moral fault. הָרָעָה in prophetic judgment contexts refers to disaster/calamity
    rather than moral evil. 'Concerning' avoids over-specifying the preposition while
    remaining clear.
