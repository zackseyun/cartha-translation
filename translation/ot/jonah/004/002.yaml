theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt explicitly sets 'the LORD' as the default rendering
    for YHWH, following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Anthropopathic language in וְנִחָם עַל הָרָעָה
  chosen_reading: relenting concerning the disaster
  alternative_readings:
  - changing your mind about the evil
  - repenting of the evil
  rationale: The Hebrew describes God's relenting from announced judgment, not moral
    repentance. This preserves the text's anthropopathic force without implying divine
    wrongdoing. 'Disaster' reflects the judgment sense of רָעָה in context.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological
    tension rather than resolve it'
