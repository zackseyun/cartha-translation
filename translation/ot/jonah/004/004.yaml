id: JON.4.4
reference: Jonah 4:4
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר יְהוָ֔ה הַ/הֵיטֵ֖ב חָ֥רָה לָֽ/ךְ׃
translation:
  text: And the LORD said, “Is it right for you to be angry?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, “Do you do well to be angry?”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: And ... said
  alternatives:
  - Then ... said
  - So ... said
  lexicon: HALOT
  rationale: The waw-consecutive on אמר advances the narrative. 'And ... said' is
    a natural, sufficiently formal rendering in English narrative style.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the divine name YHWH is rendered 'the LORD'
    rather than transliterated.
- source_word: הֲהֵיטֵב
  chosen: Is it right
  alternatives:
  - Do you do well
  - Is it good
  - Is it fitting
  lexicon: HALOT
  rationale: The interrogative plus Hiphil infinitive absolute of יטב functions idiomatically
    here in a rhetorical question assessing propriety. 'Is it right' communicates
    the evaluative force in clear modern English better than the more wooden 'Do you
    do well'.
- source_word: חָרָה
  chosen: to be angry
  alternatives:
  - to burn
  - to be kindled
  lexicon: HALOT
  rationale: חרה literally refers to burning/kindling, but in this idiom with ל plus
    person it means anger. English should render the idiomatic sense rather than the
    underlying metaphor in the main text.
- source_word: לָךְ
  chosen: for you
  alternatives:
  - to you
  lexicon: HALOT
  rationale: 'The preposition ל with the 2fs suffix marks the person concerned: ''for
    you.'' This yields idiomatic English in the question ''Is it right for you to
    be angry?'' The feminine singular suffix matches Jonah as grammatically addressed
    in Hebrew usage here as preserved by the text form.'
