theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: This follows the project's stated default for YHWH and aligns with longstanding
    reverential English Bible practice without making a sectarian theological claim.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Force of the question הֲהֵיטֵב חָרָה לָךְ
  chosen_reading: 'A question of moral/propriety evaluation: ''Is it right for you
    to be angry?'''
  alternative_readings:
  - '''Do you do well to be angry?'''
  - '''Is it good that you are angry?'''
  rationale: The Hebrew asks whether Jonah's anger is justified/proper, not merely
    whether anger exists. The chosen rendering preserves the rebuking evaluative force
    in natural English without overinterpreting.
