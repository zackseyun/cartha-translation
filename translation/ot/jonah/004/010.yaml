id: JON.4.10
reference: Jonah 4:10
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר יְהוָ֔ה אַתָּ֥ה חַ֨סְתָּ֙ עַל הַ/קִּ֣יקָי֔וֹן אֲשֶׁ֛ר לֹא עָמַ֥לְתָּ בּ֖/וֹ וְ/לֹ֣א גִדַּלְתּ֑/וֹ שֶׁ/בִּן לַ֥יְלָה הָיָ֖ה וּ/בִן לַ֥יְלָה אָבָֽד־־־־׃
translation:
  text: Then Yahweh said, "You had pity on the plant, for which you did not labor and which you did not make grow, which came into being in a night and perished in a night."
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''the qiqayon''; the exact plant species is uncertain. Traditional English versions often render it ''vine.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: חַסְתָּ
  chosen: had compassion
  alternatives:
  - pitied
  - were concerned about
  - spared
  lexicon: HALOT
  rationale: The verb חס conveys pity, compassion, or sparing concern. 'Had compassion' fits the rebuke context and prepares for the parallel in the next verse without sounding merely sentimental. 'Pitied' is possible and traditional, but 'had compassion' is more natural modern English.
- source_word: עַל
  chosen: 'on'
  alternatives:
  - for
  - over
  lexicon: HALOT
  rationale: With חס, the preposition marks the object of compassion. In idiomatic English this is best absorbed into 'had compassion on' rather than rendered woodenly.
- source_word: הַקִּיקָיוֹן
  chosen: the plant
  alternatives:
  - the vine
  - the castor-oil plant
  - the kikayon
  lexicon: HALOT
  rationale: The exact species denoted by קִיקָיוֹן is uncertain. 'Plant' preserves the general sense without overcommitting to a debated identification. 'Vine' reflects older tradition but is too specific; transliteration would be less clear for modern readers.
- source_word: אֲשֶׁר לֹא עָמַלְתָּ בוֹ
  chosen: for which you did not labor
  alternatives:
  - which you did not work for
  - in which you did not toil
  lexicon: HALOT
  rationale: עמל denotes labor/toil. 'For which you did not labor' is idiomatic and preserves the sense that Jonah invested no effort in producing the plant.
- source_word: וְלֹא גִדַּלְתּוֹ
  chosen: which you did not make grow
  alternatives:
  - which you did not raise
  - which you did not cultivate
  - which you did not cause to grow
  lexicon: HALOT
  rationale: The piel of גדל here means to cause to grow or bring up. 'Make grow' is clear, natural English and preserves Jonah's lack of agency in the plant's development.
- source_word: שֶׁבִּן לַיְלָה הָיָה
  chosen: which came up in a night
  alternatives:
  - which appeared in a night
  - which was the son of a night
  - which came to be overnight
  lexicon: HALOT
  rationale: The idiom 'son of a night' expresses something of very brief duration, here arising within a night. 'Came up in a night' communicates the plant's sudden appearance in context better than a literal but opaque rendering.
- source_word: וּבִן לַיְלָה אָבָד
  chosen: and perished in a night
  alternatives:
  - and was gone in a night
  - and died in a night
  - and perished overnight
  lexicon: HALOT
  rationale: אבד means perish/be destroyed/be lost. 'Perished in a night' mirrors the prior clause and preserves the terse Hebrew contrast. 'Overnight' is possible, but 'in a night' better reflects the repeated idiom.
- source_word: וַיֹּאמֶר
  chosen: Then ... said
  alternatives:
  - And ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then' is a natural English narrative connector here, preserving sequence without excessive literalism.
