id: JON.4.1
reference: Jonah 4:1
source:
  edition: WLC
  text: וַ/יֵּ֥רַע אֶל יוֹנָ֖ה רָעָ֣ה גְדוֹלָ֑ה וַ/יִּ֖חַר לֽ/וֹ־׃
translation:
  text: But this was greatly displeasing to Jonah, and he became angry.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'it was evil to Jonah, a great evil.' The Hebrew uses wordplay
      with 'evil/bad' to describe Jonah's reaction.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּרַע
  chosen: was displeasing
  alternatives:
  - was evil
  - was bad
  - was grievous
  lexicon: HALOT
  rationale: The verb from רעע literally denotes 'to be evil/bad' or 'to be displeasing'
    depending on context. With אֶל plus a person ('to Jonah'), the idiom expresses
    that something seemed very wrong or offensive to him. English 'was displeasing'
    captures the idiomatic sense without woodenly saying 'it was evil to Jonah.'
- source_word: אֶל
  chosen: to
  alternatives:
  - in the eyes of
  - before
  lexicon: HALOT
  rationale: The preposition marks relation toward Jonah. In English the idiom is
    absorbed into 'was displeasing to Jonah.'
- source_word: יוֹנָה
  chosen: Jonah
  rationale: Personal name is transliterated by standard English convention, following
    the translation philosophy to transliterate names.
- source_word: רָעָה גְדוֹלָה
  chosen: greatly displeasing
  alternatives:
  - a great evil
  - a great wrong
  - very displeasing
  lexicon: HALOT
  rationale: 'The noun רָעָה with adjective גְדוֹלָה intensifies the prior verb by
    cognate/related wording: literally ''a great evil.'' In context it describes Jonah''s
    evaluation of the event, not an objective moral judgment by the narrator. Rendering
    the phrase adverbially as ''greatly displeasing'' communicates the Hebrew emphasis
    in natural English.'
- source_word: וַיִּחַר לוֹ
  chosen: he became angry
  alternatives:
  - it burned to him
  - he was enraged
  - his anger burned
  lexicon: HALOT
  rationale: The idiom חרה + ל expresses anger, literally 'it burned to him.' 'He
    became angry' is clear modern English and preserves the sense; 'his anger burned'
    is possible but slightly more interpretive in supplying 'anger.'
- source_word: וַ
  chosen: But ... and
  alternatives:
  - And ... and
  rationale: The initial waw here is rendered 'But' to reflect the sharp contrast
    with Nineveh's repentance and God's relenting in the preceding context. The second
    waw is naturally rendered 'and' to continue the sequence.
