theological_decisions:
- issue: Whether רָעָה in this verse should be rendered as an objective moral judgment
    ('evil') or as Jonah's subjective displeasure
  chosen_reading: 'Subjective displeasure: ''this was greatly displeasing to Jonah'''
  alternative_readings:
  - '''it was a great evil to Jonah'''
  - '''it seemed very wrong to Jonah'''
  rationale: The Hebrew uses רעע/רָעָה wordplay, but in this context the narrator
    is describing Jonah's reaction to God's mercy, not endorsing Jonah's assessment
    as morally correct. Rendering with 'displeasing' preserves the sense while avoiding
    the misleading implication that the text itself calls God's action evil.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
