theological_decisions:
- issue: Referent of those who do not know their right hand from their left
  chosen_reading: Retain the expression without specifying the referent beyond the
    text itself.
  alternative_readings:
  - young children or infants
  - morally undiscerning inhabitants generally
  rationale: The Hebrew phrase is capable of being understood either as a reference
    to children lacking basic discernment or more broadly to persons lacking moral/spiritual
    discernment. The translation preserves the textual ambiguity rather than resolving
    it, in keeping with the stated philosophy of preserving theological tension where
    the source is genuinely ambiguous.
  doctrine_reference: Translation philosophy §3
- issue: Divine attitude expressed by אָחוּס
  chosen_reading: Render as compassionate concern rather than only judicial sparing.
  alternative_readings:
  - should I not spare Nineveh
  rationale: The context emphasizes God's concern in contrast with Jonah's concern
    for the plant. 'Have compassion' communicates the mercy motif clearly, while the
    alternative 'spare' is preserved in a footnote because it is a legitimate lexical
    possibility with implications for how readers hear the verse.
