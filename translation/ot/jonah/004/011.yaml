id: JON.4.11
reference: Jonah 4:11
source:
  edition: WLC
  text: וַֽ/אֲנִי֙ לֹ֣א אָח֔וּס עַל נִינְוֵ֖ה הָ/עִ֣יר הַ/גְּדוֹלָ֑ה אֲשֶׁ֣ר יֶשׁ
    בָּ֡/הּ הַרְבֵּה֩ מִֽ/שְׁתֵּים עֶשְׂרֵ֨ה רִבּ֜וֹ אָדָ֗ם אֲשֶׁ֤ר לֹֽא יָדַע֙ בֵּין
    יְמִינ֣/וֹ לִ/שְׂמֹאל֔/וֹ וּ/בְהֵמָ֖ה רַבָּֽה־־־־־׃
translation:
  text: And should I not have compassion on Nineveh, the great city, in which there
    are more than one hundred twenty thousand people who do not know their right hand
    from their left, and many animals?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'should I not spare Nineveh.'
    reason: lexical_alternative
  - marker: b
    text: The phrase 'do not know their right hand from their left' may refer specifically
      to young children or more generally to people lacking discernment.
    reason: alternative_reading
lexical_decisions:
- source_word: אָחוּס
  chosen: have compassion
  alternatives:
  - spare
  - pity
  - have pity
  lexicon: HALOT
  rationale: The verb חוּס can mean to spare, pity, or have compassion. In this context,
    where God contrasts Jonah's concern for the plant with God's concern for Nineveh,
    'have compassion' best conveys the affective and merciful sense in readable English,
    while still implying restraint from destruction.
- source_word: עַל
  chosen: 'on'
  alternatives:
  - for
  - toward
  lexicon: HALOT
  rationale: With חוּס, עַל marks the object of compassion/pity. In idiomatic English
    this is absorbed into 'have compassion on' rather than translated woodenly.
- source_word: הָעִיר הַגְּדוֹלָה
  chosen: the great city
  alternatives:
  - the large city
  - that great city
  lexicon: HALOT
  rationale: '''Great city'' preserves the Hebrew adjective גָּדוֹל and echoes Jonah''s
    repeated description of Nineveh. ''Large city'' is possible but loses the literary
    resonance.'
- source_word: יֶשׁ בָּהּ
  chosen: in which there are
  alternatives:
  - which has
  - where there are
  lexicon: HALOT
  rationale: This renders the existential construction naturally in English while
    keeping the focus on what is found within the city.
- source_word: הַרְבֵּה מִשְׁתֵּים עֶשְׂרֵה רִבּוֹ
  chosen: more than one hundred twenty thousand
  alternatives:
  - more than twelve myriads
  - more than 120,000
  lexicon: HALOT
  rationale: The Hebrew literally says 'more than twelve ten-thousands.' 'One hundred
    twenty thousand' is the clear idiomatic English equivalent; 'more than' preserves
    הַרְבֵּה in this numeric construction.
- source_word: אָדָם
  chosen: people
  alternatives:
  - human beings
  - humankind
  - man
  lexicon: HALOT
  rationale: Although אָדָם often defaults to 'man / humankind,' here it refers to
    a counted population within Nineveh. 'People' is natural, accurate, and preserves
    the human reference without implying males only.
- source_word: אֲשֶׁר לֹא יָדַע בֵּין יְמִינוֹ לִשְׂמֹאלוֹ
  chosen: who do not know their right hand from their left
  alternatives:
  - who do not know between their right and their left
  - who cannot distinguish their right hand from their left
  lexicon: HALOT
  rationale: This phrase is retained as a vivid idiom. 'Do not know their right hand
    from their left' is clear modern English and preserves the metaphorical force
    without over-interpreting whether it refers specifically to children, moral ignorance,
    or general immaturity.
- source_word: וּבְהֵמָה רַבָּה
  chosen: and many animals
  alternatives:
  - and much livestock
  - and many cattle
  lexicon: HALOT
  rationale: בְּהֵמָה can denote beasts/animals, often domestic animals or livestock.
    'Many animals' is broad enough to match the Hebrew without narrowing the reference
    too specifically to cattle, while preserving the surprising extension of God's
    concern beyond humans.
