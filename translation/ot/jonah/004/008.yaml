id: JON.4.8
reference: Jonah 4:8
source:
  edition: WLC
  text: וַ/יְהִ֣י כִּ/זְרֹ֣חַ הַ/שֶּׁ֗מֶשׁ וַ/יְמַ֨ן אֱלֹהִ֜ים ר֤וּחַ קָדִים֙ חֲרִישִׁ֔ית
    וַ/תַּ֥ךְ הַ/שֶּׁ֛מֶשׁ עַל רֹ֥אשׁ יוֹנָ֖ה וַ/יִּתְעַלָּ֑ף וַ/יִּשְׁאַ֤ל אֶת נַפְשׁ/וֹ֙
    לָ/מ֔וּת וַ/יֹּ֕אמֶר ט֥וֹב מוֹתִ֖/י מֵ/חַיָּֽ/י׀־־׃
translation:
  text: When the sun rose, God appointed a scorching east wind, and the sun beat down
    on Jonah’s head so that he grew faint. And he asked that he might die, and said,
    “My death is better than my life.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a sultry east wind' or 'a vehement east wind.' The Hebrew adjective
      is rare and difficult; 'scorching' is chosen because the context emphasizes
      oppressive heat.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'My death is better than my life.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי כִּזְרֹחַ הַשֶּׁמֶשׁ
  chosen: When the sun rose
  alternatives:
  - And it happened, as the sun rose
  - As the sun began to rise
  lexicon: HALOT
  rationale: The Hebrew narrative formula וַיְהִי plus infinitive construct with כִּ
    marks temporal sequence. 'When the sun rose' is natural modern English while preserving
    the temporal sense.
- source_word: וַיְמַן
  chosen: appointed
  alternatives:
  - prepared
  - ordained
  - provided
  lexicon: HALOT
  rationale: This verb in Jonah repeatedly describes God's sovereign commissioning
    of created means (fish, plant, worm, wind). 'Appointed' preserves intentional
    divine ordering better than the older 'prepared'.
- source_word: רוּחַ קָדִים
  chosen: east wind
  alternatives:
  - eastern wind
  lexicon: HALOT
  rationale: The phrase straightforwardly denotes a wind from the east. 'East wind'
    is the standard and most idiomatic English rendering.
- source_word: חֲרִישִׁית
  chosen: scorching
  alternatives:
  - sultry
  - vehement
  - silent
  lexicon: HALOT
  rationale: This adjective is difficult and has been variously understood. In context,
    modifying the east wind that contributes to Jonah's collapse, 'scorching' best
    fits the sense of oppressive heat. 'Silent' is lexically possible in isolation
    but contextually weak here; the traditional 'vehement' is less clear in modern
    English.
- source_word: וַתַּךְ הַשֶּׁמֶשׁ עַל רֹאשׁ יוֹנָה
  chosen: the sun beat down on Jonah’s head
  alternatives:
  - the sun struck Jonah's head
  - the sun smote Jonah on the head
  lexicon: HALOT
  rationale: נכה here conveys striking/blow imagery. 'Beat down on' captures both
    the physical impact and the idiomatic English description of intense sun exposure.
- source_word: וַיִּתְעַלָּף
  chosen: he grew faint
  alternatives:
  - he fainted
  - he became weak
  lexicon: HALOT
  rationale: The hitpael form suggests becoming overwhelmed or faint. 'He grew faint'
    preserves the process and avoids overstating a total loss of consciousness.
- source_word: וַיִּשְׁאַל אֶת נַפְשׁוֹ לָמוּת
  chosen: he asked that he might die
  alternatives:
  - he asked for his life to die
  - he requested to die
  - he asked for death for himself
  lexicon: HALOT
  rationale: The idiom literally involves asking with respect to his life/soul to
    die. The sense is a plea for death. 'He asked that he might die' is idiomatic
    and faithful without woodenly reproducing the Hebrew idiom.
- source_word: טוֹב מוֹתִי מֵחַיָּי
  chosen: My death is better than my life
  alternatives:
  - It is better for me to die than to live
  - My dying is better than my living
  lexicon: HALOT
  rationale: The Hebrew is a verbless comparative statement contrasting Jonah's death
    with his life. 'My death is better than my life' preserves the terse force and
    close lexical correspondence.
