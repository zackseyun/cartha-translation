theological_decisions:
- issue: Rendering divine agency in וַיְמַן אֱלֹהִים
  chosen_reading: God appointed
  alternative_readings:
  - God prepared
  - God provided
  rationale: The verse presents God as actively directing natural means in the narrative.
    'Appointed' reflects divine sovereignty without importing a broader doctrinal
    claim beyond the text.
  doctrine_reference: Translation philosophy §1, §5
