id: JON.4.7
reference: Jonah 4:7
source:
  edition: WLC
  text: וַ/יְמַ֤ן הָֽ/אֱלֹהִים֙ תּוֹלַ֔עַת בַּ/עֲל֥וֹת הַ/שַּׁ֖חַר לַֽ/מָּחֳרָ֑ת וַ/תַּ֥ךְ
    אֶת הַ/קִּֽיקָי֖וֹן וַ/יִּיבָֽשׁ־׃
translation:
  text: But at dawn the next day God appointed a worm, and it attacked the plant so
    that it withered.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the castor-oil plant'; the Hebrew term qiqayon refers to a specific
      plant, but its exact identification is uncertain.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְמַן
  chosen: appointed
  alternatives:
  - prepared
  - assigned
  - provided
  lexicon: HALOT
  rationale: The verb מנה here denotes God's sovereign ordaining or designating of
    the worm, matching its repeated use in Jonah for divinely appointed agents or
    circumstances. 'Appointed' is natural English and preserves intentionality better
    than the older 'prepared.'
- source_word: הָאֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: The text uses אֱלֹהִים, not the divine name YHWH. 'God' is therefore
    the direct and contextually appropriate rendering.
- source_word: תּוֹלַעַת
  chosen: a worm
  alternatives:
  - a maggot
  - a grub
  lexicon: HALOT
  rationale: The noun broadly denotes a worm-like creature. 'Worm' is the standard
    and sufficiently precise rendering here without over-specifying the species.
- source_word: בַּעֲלוֹת הַשַּׁחַר
  chosen: at dawn
  alternatives:
  - when the dawn came up
  - at the rising of the dawn
  lexicon: HALOT
  rationale: Literally 'at the coming up of the dawn.' 'At dawn' captures the temporal
    sense in clear modern English while remaining close to the Hebrew idiom.
- source_word: לַמָּחֳרָת
  chosen: the next day
  alternatives:
  - on the following day
  - on the morrow
  lexicon: HALOT
  rationale: This term marks the following day relative to the prior event. 'The next
    day' is idiomatic modern English and accurately conveys the sequence.
- source_word: וַתַּךְ
  chosen: it attacked
  alternatives:
  - it struck
  - it smote
  lexicon: HALOT
  rationale: The verb נכה literally means 'strike.' In context, with a worm damaging
    a plant, 'attacked' communicates the effect in natural English better than the
    overly literal 'struck,' while still reflecting hostile action.
- source_word: הַקִּיקָיוֹן
  chosen: the plant
  alternatives:
  - the castor-oil plant
  - the qiqayon
  lexicon: HALOT
  rationale: The exact botanical identification is uncertain. Rendering it as 'the
    plant' avoids false precision while maintaining coherence with the immediate context.
    A more specific traditional identification is worth preserving in a footnote.
- source_word: וַיִּיבָשׁ
  chosen: so that it withered
  alternatives:
  - and it withered
  - and it dried up
  lexicon: HALOT
  rationale: The verb means 'to dry up, wither.' Because English style often clarifies
    the result relation after the worm's action, 'so that it withered' makes the causal
    flow explicit without adding meaning beyond the context.
