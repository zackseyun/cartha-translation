theological_decisions:
- issue: Divine agency in Jonah's circumstances
  chosen_reading: God appointed the worm as an intentional act of providence.
  alternative_readings:
  - God merely allowed a worm to appear.
  rationale: The verb וימן presents active divine appointment, consistent with the
    repeated pattern in Jonah 4 of God appointing agents (plant, worm, wind). The
    translation should preserve this strong sense of providential action rather than
    weaken it to mere permission.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3
