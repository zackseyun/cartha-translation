id: JON.4.5
reference: Jonah 4:5
source:
  edition: WLC
  text: וַ/יֵּצֵ֤א יוֹנָה֙ מִן הָ/עִ֔יר וַ/יֵּ֖שֶׁב מִ/קֶּ֣דֶם לָ/עִ֑יר וַ/יַּעַשׂ֩
    ל֨/וֹ שָׁ֜ם סֻכָּ֗ה וַ/יֵּ֤שֶׁב תַּחְתֶּ֨י/הָ֙ בַּ/צֵּ֔ל עַ֚ד אֲשֶׁ֣ר יִרְאֶ֔ה
    מַה יִּהְיֶ֖ה בָּ/עִֽיר־־׃
translation:
  text: Then Jonah went out from the city and sat east of the city. There he made
    himself a shelter and sat under it in the shade until he would see what would
    happen in the city.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a booth' or 'a hut.' The Hebrew refers to a temporary shelter, often
      made of branches.
    reason: lexical_alternative
  - marker: b
    text: Or 'what would become of the city.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּצֵא
  chosen: went out
  alternatives:
  - went forth
  - left
  lexicon: HALOT
  rationale: The verb יצא denotes going out or departing. 'Went out' is the most direct
    and natural rendering in context.
- source_word: מִן הָעִיר
  chosen: from the city
  alternatives:
  - out of the city
  lexicon: HALOT
  rationale: The preposition מן marks separation. 'From the city' is concise and idiomatic
    after 'went out.'
- source_word: וַיֵּשֶׁב
  chosen: sat
  alternatives:
  - settled
  - stayed
  lexicon: HALOT
  rationale: ישב commonly means 'sit' or 'dwell.' Here the immediate physical action
    is in view, so 'sat' preserves the narrative sequence.
- source_word: מִקֶּדֶם לָעִיר
  chosen: east of the city
  alternatives:
  - to the east of the city
  - in front of the city
  lexicon: HALOT
  rationale: קדם with מן in a spatial expression commonly indicates the east side
    or eastward position. 'East of the city' is the clearest English rendering; 'in
    front of' is possible in some contexts but less likely here.
- source_word: וַיַּעַשׂ לוֹ
  chosen: he made himself
  alternatives:
  - he made for himself
  - he made
  lexicon: HALOT
  rationale: The dative pronoun לו indicates benefit or possession. 'Made himself'
    is idiomatic English and preserves the reflexive sense.
- source_word: סֻכָּה
  chosen: a shelter
  alternatives:
  - a booth
  - a hut
  lexicon: HALOT
  rationale: סכה refers to a temporary shelter or booth made of branches. 'Shelter'
    communicates the function in accessible modern English; 'booth' is more formal/literal
    and is preserved in a footnote.
- source_word: תַּחְתֶּיהָ
  chosen: under it
  alternatives:
  - beneath it
  lexicon: HALOT
  rationale: The feminine suffix refers back to the shelter. 'Under it' is straightforward
    and natural.
- source_word: בַּצֵּל
  chosen: in the shade
  alternatives:
  - in the shadow
  lexicon: HALOT
  rationale: צל can mean shade or shadow. In this context of protection from the sun,
    'shade' is the more natural English choice.
- source_word: עַד אֲשֶׁר יִרְאֶה
  chosen: until he would see
  alternatives:
  - until he saw
  - until he might see
  lexicon: HALOT
  rationale: The construction expresses Jonah's waiting with a view to seeing the
    outcome. 'Would see' captures the prospective sense better than a simple past.
- source_word: מַה יִּהְיֶה בָּעִיר
  chosen: what would happen in the city
  alternatives:
  - what would become of the city
  - what would be in the city
  lexicon: HALOT
  rationale: The idiom asks about the city's outcome. 'What would happen in the city'
    is clear modern English, while 'what would become of the city' is also possible
    and preserved in a footnote because it slightly shifts the focus toward the city's
    fate.
