id: JOB.5.20
reference: Job 5:20
source:
  edition: WLC
  text: בְּ֭/רָעָב פָּֽדְ/ךָ֣ מִ/מָּ֑וֶת וּ֝/בְ/מִלְחָמָ֗ה מִ֣/ידֵי חָֽרֶב׃
translation:
  text: In famine he will redeem you from death, and in war from the power of the
    sword.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'he will ransom you' or 'he will deliver you.' The Hebrew verb carries
      the sense of release or rescue.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'from the hands of the sword,' an idiom meaning 'from the power
      of the sword.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּרָעָב
  chosen: In famine
  alternatives:
  - In hunger
  - During famine
  lexicon: HALOT
  rationale: 'רָעָב denotes famine/hunger; in this context of calamities from which
    God delivers, ''famine'' best captures the concrete disaster rather than mere
    personal hunger. The prefixed ב marks the circumstance: ''in/during famine.'''
- source_word: פָּדְךָ
  chosen: he will redeem you
  alternatives:
  - he will ransom you
  - he will deliver you
  lexicon: HALOT
  rationale: פדה commonly means redeem/ransom, often with the sense of rescue by paying
    or effecting release. 'Redeem' preserves the lexical weight better than the flatter
    'deliver,' while still fitting Eliaphaz's promise of rescue.
- source_word: מִמָּוֶת
  chosen: from death
  alternatives:
  - from dying
  lexicon: HALOT
  rationale: 'The preposition מִן marks separation/source: rescue away from death.
    The noun is best kept as the concrete ''death'' rather than verbalized.'
- source_word: וּבְמִלְחָמָה
  chosen: and in war
  alternatives:
  - and in battle
  lexicon: HALOT
  rationale: מִלְחָמָה is the general term for war/battle. 'War' matches the broad
    sense and pairs well with the parallel 'in famine.'
- source_word: מִידֵי
  chosen: from the power of
  alternatives:
  - from the hand of
  - from the grasp of
  lexicon: HALOT
  rationale: The idiom 'from the hand(s) of' often means from someone's power or control.
    Since the referent is 'sword,' a literal 'hand of the sword' would be awkward
    in English; 'power of' conveys the idiomatic force while preserving the image's
    sense.
- source_word: חָרֶב
  chosen: the sword
  alternatives:
  - the blade
  lexicon: HALOT
  rationale: חָרֶב is the standard word for sword and here stands metonymically for
    violent death in war. 'The sword' is the natural and traditional English rendering.
