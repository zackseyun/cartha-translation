theological_decisions:
- issue: Rendering of פדה in a wisdom context
  chosen_reading: redeem
  alternative_readings:
  - deliver
  - ransom
  rationale: Although the verse speaks of temporal rescue rather than explicit covenantal
    redemption, 'redeem' preserves the Hebrew verb's stronger release language without
    importing later doctrinal claims. The context supports divine rescue, but not
    a fuller soteriological reading.
  doctrine_reference: Translation philosophy §1, §5
