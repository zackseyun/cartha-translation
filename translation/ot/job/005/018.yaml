theological_decisions:
- issue: Divine agency in both affliction and restoration
  chosen_reading: The verse is rendered to preserve the text's direct attribution
    of both pain and healing to God.
  alternative_readings:
  - Soften the first clause to reduce divine causation, e.g., 'allows pain'
  rationale: The Hebrew explicitly presents God as the subject of both harmful and
    restorative actions. In keeping with the translation philosophy, the wording preserves
    this theological tension rather than resolving or softening it.
  doctrine_reference: Translation philosophy §3
