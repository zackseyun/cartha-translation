id: JOB.5.18
reference: Job 5:18
source:
  edition: WLC
  text: כִּ֤י ה֣וּא יַכְאִ֣יב וְ/יֶחְבָּ֑שׁ יִ֝מְחַ֗ץ ו/יד/ו תִּרְפֶּֽינָה׃
translation:
  text: For he causes pain, but he binds up; he shatters, but his hands heal.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'he crushes, but his hand heals.' The Hebrew shifts from a singular noun
      ('his hand') to a plural verb ('heal'); the English main text smooths this as
      'his hands heal' to reflect the sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Because
  lexicon: HALOT
  rationale: Introduces the explanation for the preceding statement. 'For' fits the
    discourse flow in English and preserves the causal/explanatory force without over-specifying.
- source_word: הוּא
  chosen: he
  alternatives:
  - he himself
  lexicon: HALOT
  rationale: The independent pronoun adds emphasis, but standard English can convey
    this adequately with 'he' in context. 'He himself' would be possible but slightly
    heavier than needed.
- source_word: יַכְאִיב
  chosen: causes pain
  alternatives:
  - wounds
  - makes sore
  - afflicts
  lexicon: HALOT
  rationale: The Hiphil of כאב means to cause pain or hurt. 'Causes pain' is semantically
    direct and avoids importing the more concrete imagery of 'wounds,' which belongs
    more naturally to the next verb pair.
- source_word: וְיֶחְבָּשׁ
  chosen: but he binds up
  alternatives:
  - and he binds up
  - bandages
  lexicon: HALOT
  rationale: חבש in this context refers to binding up an injury. 'Binds up' is a natural
    English equivalent and preserves the healing imagery. The conjunction is rendered
    adversatively ('but') to reflect the clear contrast in the poetic parallelism.
- source_word: יִמְחַץ
  chosen: he shatters
  alternatives:
  - he crushes
  - he smites
  lexicon: HALOT
  rationale: מחץ denotes striking or crushing forcefully. 'Shatters' captures the
    severity and poetic intensity while pairing well with the following healing clause.
    'Crushes' is also viable, but 'shatters' better reflects the brokenness implied
    by the healing image.
- source_word: וְיָדוֹ
  chosen: but his hands
  alternatives:
  - and his hand
  - yet his hands
  lexicon: HALOT
  rationale: Although the written form is singular with suffix ('his hand'), the following
    feminine plural verb likely reflects an understood plural subject or a poetic
    plural sense. Rendering 'his hands' follows the idiomatic sense and aligns with
    the plural verb in the Masoretic text.
- source_word: תִּרְפֶּינָה
  chosen: heal
  alternatives:
  - make whole
  - restore health
  lexicon: HALOT
  rationale: רפא in the Qal commonly means to heal. 'Heal' is the most direct and
    natural rendering. The plural verbal form is reflected by the plural subject 'hands.'
