theological_decisions:
- issue: Implied subject of the participle
  chosen_reading: The subject is rendered as 'He,' referring to God from the surrounding
    context.
  alternative_readings:
  - An indefinite subject such as 'one who catches'
  rationale: Although the Hebrew participle lacks an explicit subject in this verse,
    the surrounding context (especially Job 5:9-16) describes God's actions. English
    idiom requires an explicit subject, and 'He' accurately carries forward the contextual
    subject without adding new theology.
  doctrine_reference: Translation philosophy §1, §6
- issue: Moral characterization of עָרְמָה and נִפְתָּלִים
  chosen_reading: Both are rendered with negative moral force ('craftiness,' 'the
    twisted').
  alternative_readings:
  - More neutral renderings such as 'shrewdness' and 'the complicated/perplexed'
  rationale: In this context Eliphaz contrasts God's action against those whose schemes
    are overturned. The parallelism indicates a negative ethical sense rather than
    neutral cleverness or mere complexity.
  doctrine_reference: Translation philosophy §1, §5
