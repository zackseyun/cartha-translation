id: JOB.5.13
reference: Job 5:13
source:
  edition: WLC
  text: לֹכֵ֣ד חֲכָמִ֣ים בְּ/עָרְמָ֑/ם וַ/עֲצַ֖ת נִפְתָּלִ֣ים נִמְהָֽרָה׃
translation:
  text: He catches the wise in their craftiness, and the counsel of the twisted is
    rushed headlong.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'by their shrewdness' / 'in their cunning.' The Hebrew can denote prudence
      in some contexts, but here it is used negatively.
    reason: lexical_alternative
  - marker: b
    text: Or 'the devious' or 'the crooked' for 'the twisted.'
    reason: lexical_alternative
  - marker: c
    text: Or 'is hastened' or 'is hurried away.' The sense is that their counsel is
      driven into premature, headlong failure.
    reason: lexical_alternative
lexical_decisions:
- source_word: לֹכֵד
  chosen: catches
  alternatives:
  - captures
  - seizes
  lexicon: HALOT
  rationale: Qal participle of לכד functions verbally here with God as the implied
    subject from context. 'Catches' is natural modern English and preserves the image
    of being trapped or taken.
- source_word: חֲכָמִים
  chosen: the wise
  alternatives:
  - wise men
  - the wise ones
  lexicon: HALOT
  rationale: 'Plural adjective used substantivally. ''The wise'' preserves the ironic
    force: those reputed to be wise are themselves caught.'
- source_word: בְּעָרְמָם
  chosen: in their craftiness
  alternatives:
  - by their shrewdness
  - in their cunning
  lexicon: HALOT
  rationale: עָרְמָה can denote prudence in some contexts, but here the context is
    negative and parallel to the frustrated counsel of the wicked. 'Craftiness' best
    captures the pejorative sense and aligns with common reception of this verse.
- source_word: וַעֲצַת
  chosen: and the counsel
  alternatives:
  - and the plan
  - and the advice
  lexicon: HALOT
  rationale: עֵצָה commonly means counsel, plan, or advice. 'Counsel' fits the wisdom
    context and pairs well with the following group designation.
- source_word: נִפְתָּלִים
  chosen: the twisted
  alternatives:
  - the devious
  - the crooked
  lexicon: HALOT
  rationale: Passive/adj. form from פתל conveys twistedness, tortuous or devious character.
    'The twisted' preserves the metaphor and moral sense without over-paraphrasing.
- source_word: נִמְהָרָה
  chosen: is rushed headlong
  alternatives:
  - is hastened
  - is brought to a quick end
  - is hurried away
  lexicon: HALOT
  rationale: Niphal perfect feminine singular agreeing with עֲצַת. The verb from מהר
    conveys being hurried. In context the sense is not merely speed but precipitous
    frustration or collapse. 'Is rushed headlong' preserves the passive form and the
    idea of reckless haste.
