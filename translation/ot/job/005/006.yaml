id: JOB.5.6
reference: Job 5:6
source:
  edition: WLC
  text: כִּ֤י לֹא יֵצֵ֣א מֵ/עָפָ֣ר אָ֑וֶן וּ֝/מֵ/אֲדָמָ֗ה לֹא יִצְמַ֥ח עָמָֽל׀־־׃
translation:
  text: For trouble does not come out from the dust, nor does toil sprout from the
    ground.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'For iniquity does not come out from the dust, nor does misery spring
      up from the ground.' The Hebrew terms can also carry moral or calamity-related
      senses.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Surely
  - Because
  lexicon: HALOT
  rationale: Introduces the explanation for the preceding statement. 'For' best preserves
    the argumentative connection in natural English.
- source_word: יֵצֵא
  chosen: does not come out
  alternatives:
  - goes out
  - comes forth
  lexicon: HALOT
  rationale: The verb יצא literally means 'go out/come out.' With מֵעָפָר, 'come out
    from' communicates emergence from a source in idiomatic English.
- source_word: מֵעָפָר
  chosen: from the dust
  alternatives:
  - out of dust
  - from dust
  lexicon: HALOT
  rationale: עָפָר commonly means 'dust.' The article is not explicit in Hebrew, but
    'the dust' is idiomatic in English for the substance/source being denied.
- source_word: אָוֶן
  chosen: trouble
  alternatives:
  - iniquity
  - misfortune
  - wickedness
  - sorrow
  lexicon: HALOT
  rationale: In Job, אָוֶן often carries the sense of trouble, disaster, or harmful
    affliction rather than moral evil alone. Here the parallel with עָמָל and the
    agricultural imagery favors 'trouble' as the result humans experience, not 'iniquity'
    as a moral abstraction.
- source_word: וּמֵאֲדָמָה
  chosen: nor ... from the ground
  alternatives:
  - and from the soil
  - nor from the land
  lexicon: HALOT
  rationale: אֲדָמָה is the arable ground/soil. 'Ground' fits the agricultural metaphor
    and pairs well with 'dust' without over-specifying cultivated land.
- source_word: יִצְמַח
  chosen: does ... sprout
  alternatives:
  - grow
  - spring up
  lexicon: HALOT
  rationale: צמח is a vegetation verb, and 'sprout' preserves the metaphor of something
    growing from the earth more vividly than the broader 'grow.'
- source_word: עָמָל
  chosen: toil
  alternatives:
  - trouble
  - misery
  - labor
  lexicon: HALOT
  rationale: עָמָל can denote labor, toil, or the misery associated with burdensome
    effort. In poetic parallel with אָוֶן, 'toil' preserves both the hardship sense
    and the metaphor of something that might 'sprout' from the ground.
