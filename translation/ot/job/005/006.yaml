theological_decisions:
- issue: Semantic force of אָוֶן and עָמָל in Eliphaz's statement
  chosen_reading: The verse speaks of human trouble/toil not arising automatically
    from the earth, using agricultural imagery to argue that suffering has a cause
    beyond impersonal natural emergence.
  alternative_readings:
  - The verse speaks of moral evil and wickedness not springing from the ground.
  - The verse refers broadly to calamity and misery without implying moral causation.
  rationale: The immediate context is Eliphaz's reflection on affliction and human
    suffering. Rendering the pair as 'trouble' and 'toil' preserves the poetic parallel
    and avoids importing a stronger doctrine of moral causation than the verse itself
    explicitly states, while still reflecting Eliphaz's argument that affliction is
    not random or self-generating.
  doctrine_reference: Preserve theological tension rather than resolve it.
