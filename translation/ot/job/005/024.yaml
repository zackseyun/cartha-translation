theological_decisions:
- issue: Meaning of וְלֹא תֶחֱטָא in context
  chosen_reading: 'non-moral sense: ''you will miss nothing'''
  alternative_readings:
  - '''you will not sin'''
  rationale: The verse concerns the security and intactness of one's household. The
    sequence 'inspect your dwelling' naturally leads to the result that nothing is
    found missing. Rendering it as 'you will not sin' would import a moral assertion
    less suited to the immediate context.
  doctrine_reference: Translation philosophy §1, §3, §6
