id: JOB.5.24
reference: Job 5:24
source:
  edition: WLC
  text: וְֽ֭/יָדַעְתָּ כִּי שָׁל֣וֹם אָהֳלֶ֑/ךָ וּֽ/פָקַדְתָּ֥ נָ֝וְ/ךָ וְ/לֹ֣א תֶחֱטָֽא־׃
translation:
  text: You will know that your tent is secure, and when you inspect your dwelling,
    you will miss nothing.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'and you will not sin.' The Hebrew verb can mean 'sin,' but in this
      context it likely carries the sense 'miss' or 'find missing.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיָדַעְתָּ
  chosen: You will know
  alternatives:
  - And you will know
  - Then you will know
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in this poetic promise functions
    futurally in context. 'You will know' gives natural English while preserving the
    assurance.
- source_word: כִּי
  chosen: that
  alternatives:
  - for
  - indeed
  lexicon: HALOT
  rationale: Introduces the content of what is known rather than a causal clause here,
    so 'that' best fits the syntax.
- source_word: שָׁלוֹם
  chosen: secure
  alternatives:
  - peace
  - well-being
  - safe
  lexicon: HALOT
  rationale: Shalom here describes the condition of the tent/household as being in
    a state of peace, safety, and wholeness. 'Secure' captures the contextual sense
    in idiomatic English better than the more abstract 'peace'.
- source_word: אָהֳלֶךָ
  chosen: your tent
  alternatives:
  - your home
  lexicon: HALOT
  rationale: The Hebrew literally says 'your tent.' Retaining 'tent' preserves the
    ancient setting and imagery, while the broader domestic sense is carried by context.
- source_word: וּפָקַדְתָּ
  chosen: when you inspect
  alternatives:
  - and you will visit
  - and you will attend to
  - and you will examine
  lexicon: HALOT
  rationale: פקד has a broad range including visit, attend, inspect, take account
    of. In parallel with the following clause about lacking nothing, 'inspect' or
    'take account of' fits best. 'When you inspect' makes the temporal sense natural
    in English.
- source_word: נָוְךָ
  chosen: your dwelling
  alternatives:
  - your pasture
  - your habitation
  - your abode
  lexicon: HALOT
  rationale: נוה can denote abode, habitation, or pastureland depending on context.
    Here, in parallel with 'your tent,' 'your dwelling' best conveys the domestic
    sphere.
- source_word: וְלֹא תֶחֱטָא
  chosen: you will miss nothing
  alternatives:
  - you will not sin
  - you will not be lacking
  lexicon: HALOT
  rationale: Although חטא commonly means 'sin,' in some contexts it means 'miss' or
    'miss the mark,' and by extension 'lack.' In this domestic/accounting context
    after 'inspect your dwelling,' the sense is that nothing will be missing or lacking,
    not a moral statement about sinning.
