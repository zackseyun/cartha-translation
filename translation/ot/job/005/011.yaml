id: JOB.5.11
reference: Job 5:11
source:
  edition: WLC
  text: לָ/שׂ֣וּם שְׁפָלִ֣ים לְ/מָר֑וֹם וְ֝/קֹדְרִ֗ים שָׂ֣גְבוּ יֶֽשַׁע׃
translation:
  text: to set the lowly on high, and those who mourn are lifted up to salvation.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'those who are darkened' or 'the mourners'; the Hebrew participle evokes
      grief with imagery of darkness.
    reason: lexical_alternative
  - marker: b
    text: Or 'to deliverance' or 'to safety.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לָשׂוּם
  chosen: to set
  alternatives:
  - to place
  - to appoint
  lexicon: HALOT
  rationale: Infinitive construct of שׂוּם, expressing purpose/result in connection
    with the preceding context. 'To set' is a natural, concise rendering that preserves
    the verbal force without overinterpreting.
- source_word: שְׁפָלִים
  chosen: the lowly
  alternatives:
  - the humble
  - those of low condition
  lexicon: HALOT
  rationale: The adjective denotes those who are low, humble, or brought low. 'The
    lowly' preserves both social and existential lowness without forcing a purely
    moral reading such as 'humble'.
- source_word: לְמָרוֹם
  chosen: on high
  alternatives:
  - to a high place
  - to exaltation
  lexicon: HALOT
  rationale: מָרוֹם literally refers to height or a high place. 'On high' is idiomatic
    English and preserves the imagery of elevation, fitting the contrast with 'the
    lowly'.
- source_word: וְקֹדְרִים
  chosen: those who mourn
  alternatives:
  - the mourners
  - those who are darkened
  - the grieving
  lexicon: HALOT
  rationale: From קדר in a participial form, the term can denote being dark, gloomy,
    or mourning. In this context of reversal and deliverance, 'those who mourn' best
    conveys the experiential sense while remaining faithful to the metaphor of darkened
    grief.
- source_word: שָׂגְבוּ
  chosen: are lifted up
  alternatives:
  - are exalted
  - are set securely on high
  lexicon: HALOT
  rationale: The verb conveys being high, inaccessible, or exalted. 'Are lifted up'
    matches the parallelism with 'set ... on high' and keeps the passive/resultative
    sense in readable English.
- source_word: יֶשַׁע
  chosen: to salvation
  alternatives:
  - to safety
  - to deliverance
  - in victory
  lexicon: HALOT
  rationale: יֶשַׁע commonly denotes salvation or deliverance. 'Salvation' preserves
    the lexical weight and allows the broader sense of rescue here; 'deliverance'
    is a viable contextual alternative but slightly narrows the term.
