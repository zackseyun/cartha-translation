theological_decisions:
- issue: Rendering יֶשַׁע in a wisdom context
  chosen_reading: salvation
  alternative_readings:
  - deliverance
  - safety
  rationale: The Hebrew term has a broad semantic range including rescue, safety,
    and salvation. 'Salvation' best preserves the lexical breadth and theological
    resonance without importing specifically later doctrinal content; the immediate
    context still supports concrete deliverance.
