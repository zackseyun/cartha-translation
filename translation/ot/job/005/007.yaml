id: JOB.5.7
reference: Job 5:7
source:
  edition: WLC
  text: כִּֽי אָ֭דָם לְ/עָמָ֣ל יוּלָּ֑ד וּ/בְנֵי רֶ֝֗שֶׁף יַגְבִּ֥יהוּ עֽוּף־־׃
translation:
  text: For man is born for trouble, and the sons of flame fly upward.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'sparks fly upward.' The Hebrew literally reads 'the sons of flame' (or
      possibly 'sons of Resheph'), an idiom commonly understood as sparks.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Surely
  - Because
  lexicon: HALOT
  rationale: Introduces Eliphaz's explanatory statement. 'For' fits the discourse
    connection to the preceding claim better than a stronger asseverative like 'surely.'
- source_word: אָדָם
  chosen: man
  alternatives:
  - humankind
  - a human
  lexicon: HALOT
  rationale: The noun is singular generic. Per doctrine, gender-accurate rendering
    is preferred where representative force is present. 'Man' preserves the proverbial
    singular better than the more abstract 'humankind.'
- source_word: לְעָמָל
  chosen: for trouble
  alternatives:
  - for toil
  - for misery
  lexicon: HALOT
  rationale: עָמָל can denote toil, trouble, or misery. In Job's wisdom context, the
    sense is not merely labor but the burdensome affliction characteristic of human
    life. 'Trouble' is idiomatic and broad enough to include suffering, while avoiding
    over-interpretation.
- source_word: יוּלָּד
  chosen: is born
  alternatives:
  - is begotten
  - is brought forth
  lexicon: HALOT
  rationale: 'Passive/imperfective sense in a gnomic statement is naturally rendered
    as a present general truth in English: ''is born.'''
- source_word: וּבְנֵי רֶשֶׁף
  chosen: the sons of flame
  alternatives:
  - sparks
  - sons of Resheph
  - sons of lightning
  lexicon: HALOT
  rationale: Literally 'sons of Resheph/flame.' The phrase is idiomatic and debated.
    Rendering it more literally as 'sons of flame' preserves the Hebrew imagery and
    avoids prematurely collapsing it into the interpretive gloss 'sparks.' Because
    'sparks' is a longstanding and plausible interpretation, it is preserved in a
    footnote.
- source_word: יַגְבִּיהוּ
  chosen: fly upward
  alternatives:
  - soar aloft
  - rise high
  lexicon: HALOT
  rationale: The Hiphil conveys causing to be high or rising high; with the following
    infinitive/verb 'to fly,' the combined sense is upward flight. In English, 'fly
    upward' expresses the whole clause naturally without woodenly reproducing both
    verbal elements separately.
- source_word: עוּף
  chosen: fly upward
  alternatives:
  - to fly
  - flying
  lexicon: HALOT
  rationale: Used with יַגְבִּיהוּ to complete the image of upward movement in flight.
    Incorporated into the English predicate for natural style while preserving the
    metaphor.
