theological_decisions:
- issue: Referent of the implicit subject in 'he will deliver you'
  chosen_reading: The English keeps the pronoun 'he' rather than replacing it with
    'God.'
  alternative_readings:
  - '''God will deliver you'''
  rationale: The immediate context makes the referent clear, but the Hebrew text itself
    uses a third-person singular verb without an explicit noun here. Retaining 'he'
    preserves the source-text form and avoids adding an explicit divine name not present
    in the verse.
  doctrine_reference: Translation philosophy §1, §5
- issue: Meaning of the numerical formula 'six... seven'
  chosen_reading: Rendered as a Hebrew idiom of repeated/comprehensive deliverance,
    without flattening it into paraphrase.
  alternative_readings:
  - A strictly literal numerical count of exactly six and seven troubles
  rationale: The main text preserves the numbers while using 'even in seven' to signal
    the climactic parallelism. This maintains the poetic tension and avoids over-interpretation.
  doctrine_reference: Translation philosophy §3
