id: JOB.5.19
reference: Job 5:19
source:
  edition: WLC
  text: בְּ/שֵׁ֣שׁ צָ֭רוֹת יַצִּילֶ֑/ךָּ וּ/בְ/שֶׁ֓בַע לֹא יִגַּ֖ע בְּ/ךָ֣ רָֽע׀־׃
translation:
  text: In six troubles he will deliver you; even in seven, no evil will touch you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew poetic idiom: ''in six ... and in seven'' expresses repeated or
      complete deliverance, not necessarily a literal limit of exactly seven troubles.'
    reason: cultural_note
  - marker: b
    text: Or 'no harm will touch you' or 'no calamity will reach you.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּ/שֵׁשׁ
  chosen: In six
  alternatives:
  - From six
  - Through six
  lexicon: HALOT
  rationale: The preposition ב with the numeral is best rendered idiomatically as
    'in' in this numerical saying. It introduces the circumstance or count of troubles
    rather than strict spatial sense.
- source_word: צָרוֹת
  chosen: troubles
  alternatives:
  - distresses
  - adversities
  - afflictions
  lexicon: HALOT
  rationale: צָרוֹת denotes states of distress or adversity. 'Troubles' is natural
    modern English and preserves the broad sense without over-specifying physical
    suffering.
- source_word: יַצִּילֶךָּ
  chosen: he will deliver you
  alternatives:
  - he will rescue you
  - he will save you
  lexicon: HALOT
  rationale: The Hiphil of נצל commonly means 'deliver, rescue.' 'Deliver' fits both
    danger language and the elevated poetic register of Job. The subject is singular
    masculine, referring in context to God.
- source_word: וּ/בְ/שֶׁבַע
  chosen: even in seven
  alternatives:
  - and in seven
  - in seven
  lexicon: HALOT
  rationale: This is a Hebrew numerical parallelism ('six... seven') expressing escalation/completeness
    rather than a literal limit. 'Even in seven' brings out the climactic force while
    staying close to the form.
- source_word: לֹא יִגַּע
  chosen: will not touch
  alternatives:
  - will not strike
  - will not reach
  lexicon: HALOT
  rationale: נגע in Qal often means 'touch, reach, strike.' Here 'touch' preserves
    the idiom and allows the object 'evil' to remain broad rather than only physical
    injury.
- source_word: בְּךָ
  chosen: you
  alternatives:
  - upon you
  - against you
  lexicon: HALOT
  rationale: With נגע, the preposition marks the person affected. In idiomatic English
    this is naturally absorbed into the direct object construction 'touch you.'
- source_word: רָע
  chosen: evil
  alternatives:
  - harm
  - calamity
  - disaster
  lexicon: HALOT
  rationale: רָע can denote moral evil or harmful calamity depending on context. In
    this wisdom-poetic context of deliverance from troubles, the sense is harmful
    evil/calamity. 'Evil' keeps the Hebrew's breadth, while the context guides readers
    toward experienced harm rather than abstract morality.
