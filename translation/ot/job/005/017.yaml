theological_decisions:
- issue: Rendering the generic masculine אֱנוֹשׁ
  chosen_reading: the man
  alternative_readings:
  - the person
  - the human being
  - the mortal
  rationale: The Hebrew uses a grammatically masculine singular noun in a representative
    wisdom saying. In keeping with the stated gender-accurate policy, the translation
    preserves the masculine generic rather than neutralizing it in the main text.
  doctrine_reference: DOCTRINE.md § Translation philosophy 4
- issue: Relationship between divine reproof and מוסר
  chosen_reading: reproves ... discipline
  alternative_readings:
  - corrects ... instruction
  - rebukes ... chastening
  rationale: The verse presents divine correction positively, as a mark of blessedness.
    The chosen wording preserves the theological tension of painful reproof as beneficial
    discipline without importing a stronger punitive sense than the Hebrew requires.
  doctrine_reference: DOCTRINE.md § Translation philosophy 3
