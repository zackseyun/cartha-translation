id: JOB.5.17
reference: Job 5:17
source:
  edition: WLC
  text: הִנֵּ֤ה אַשְׁרֵ֣י אֱ֭נוֹשׁ יוֹכִחֶ֣/נּֽוּ אֱל֑וֹהַּ וּ/מוּסַ֥ר שַׁ֝דַּ֗י אַל
    תִּמְאָֽס־׃
translation:
  text: Behold, blessed is the man whom God reproves; so do not despise the discipline
    of the Almighty.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'happy is the man' or 'fortunate is the man'; the Hebrew beatitude formula
      denotes an enviable state of blessedness.
    reason: lexical_alternative
  - marker: b
    text: '''The man'' renders a generic singular Hebrew term for a human being or
      mortal person.'
    reason: lexical_alternative
  - marker: c
    text: Or 'whom God corrects' or 'whom God rebukes.'
    reason: lexical_alternative
  - marker: d
    text: Or 'instruction,' 'correction,' or 'chastening' for 'discipline.'
    reason: lexical_alternative
  - marker: e
    text: Hebrew 'Shaddai,' traditionally rendered 'the Almighty.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנֵּה
  chosen: Behold
  alternatives:
  - Look
  - See
  lexicon: HALOT
  rationale: Retains the discourse-marking force of drawing attention to a significant
    statement. 'Behold' is still natural enough in elevated biblical English and preserves
    the emphatic introduction better than omitting it.
- source_word: אַשְׁרֵי
  chosen: blessed is
  alternatives:
  - happy is
  - fortunate is
  lexicon: HALOT
  rationale: This beatitude-like form conveys a state of enviable blessedness, not
    merely emotional happiness. 'Blessed is' best preserves the theological and wisdom-literature
    resonance.
- source_word: אֱנוֹשׁ
  chosen: the man
  alternatives:
  - a man
  - a human being
  - a mortal
  lexicon: HALOT
  rationale: The noun denotes a human/mortal person, here in a generic singular wisdom
    saying. Per gender-accurate policy, 'the man' preserves the representative masculine
    form and proverbial style better than a neutral recast.
- source_word: יוֹכִחֶנּוּ
  chosen: whom God reproves
  alternatives:
  - whom God corrects
  - whom God rebukes
  - whom God convicts
  lexicon: HALOT
  rationale: The Hiphil of יכח here carries the sense of corrective reproof or rebuke.
    'Reproves' fits the wisdom context and pairs well with the following 'discipline,'
    preserving the idea of divine correction rather than mere argumentation.
- source_word: אֱלוֹהַּ
  chosen: God
  alternatives:
  - God Most High
  lexicon: HALOT
  rationale: Standard rendering of the divine title in Job. No special contextual
    feature requires a more expansive gloss.
- source_word: מוּסַר
  chosen: discipline
  alternatives:
  - instruction
  - correction
  - chastening
  lexicon: HALOT
  rationale: In wisdom literature מוסר commonly denotes formative correction or discipline.
    'Discipline' communicates both corrective and pedagogical force better than the
    narrower 'rebuke' or the potentially misleading 'instruction' alone.
- source_word: שַׁדַּי
  chosen: the Almighty
  alternatives:
  - Shaddai
  lexicon: HALOT
  rationale: Following the translation philosophy to translate titles, שַׁדַּי is
    rendered 'the Almighty,' the standard meaningful English equivalent in Job.
- source_word: אַל תִּמְאָס
  chosen: do not despise
  alternatives:
  - do not reject
  - do not spurn
  lexicon: HALOT
  rationale: The verb conveys treating something as contemptible or refusing it with
    disdain. 'Do not despise' is idiomatic and preserves the moral force of the warning.
