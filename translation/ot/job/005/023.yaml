id: JOB.5.23
reference: Job 5:23
source:
  edition: WLC
  text: כִּ֤י עִם אַבְנֵ֣י הַ/שָּׂדֶ֣ה בְרִיתֶ֑/ךָ וְ/חַיַּ֥ת הַ֝/שָּׂדֶ֗ה הָשְׁלְמָה
    לָֽ/ךְ־־׃
translation:
  text: For you will have a covenant with the stones of the field, and the wild animals
    of the field will be at peace with you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the field stones.' The phrase may evoke stones as agricultural obstacles,
      but the Hebrew image is left explicit in the main text.
    reason: lexical_alternative
  - marker: b
    text: Or 'the beasts of the field.'
    reason: lexical_alternative
  - marker: c
    text: Literally 'has made peace with you' or 'is at peace with you.' The Hebrew
      expresses peaceful relations between the person and the wild animals.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Surely
  - Indeed
  - Because
  lexicon: HALOT
  rationale: Here כִּי introduces the ground or explanation for the preceding assurance,
    so 'For' best preserves the logical connection in natural English.
- source_word: עִם
  chosen: with
  alternatives:
  - among
  - beside
  lexicon: HALOT
  rationale: The preposition straightforwardly marks association in the covenant expression
    'with the stones of the field.'
- source_word: אַבְנֵי הַשָּׂדֶה
  chosen: the stones of the field
  alternatives:
  - the field stones
  - the stones in the field
  lexicon: HALOT
  rationale: A fairly literal rendering preserves the vivid poetic image. 'Stones
    of the field' may imply obstacles in cultivated land, but the Hebrew image itself
    should remain in the main text.
- source_word: בְרִיתֶךָ
  chosen: you will have a covenant
  alternatives:
  - your covenant
  - you are in covenant
  lexicon: HALOT
  rationale: Hebrew omits an explicit verb in this clause, so English supplies one.
    'You will have a covenant' is idiomatic and preserves the nominal phrase without
    over-interpreting the relationship.
- source_word: וְחַיַּת הַשָּׂדֶה
  chosen: the wild animals of the field
  alternatives:
  - the beasts of the field
  - the animals of the field
  lexicon: HALOT
  rationale: חַיָּה in this collocation commonly refers to wild animals. 'Wild animals'
    is clear modern English; 'beasts' is traditional but less natural for the target
    style.
- source_word: הָשְׁלְמָה
  chosen: will be at peace
  alternatives:
  - will be in harmony
  - will be friendly
  - has made peace
  lexicon: HALOT
  rationale: From שׁלם in the Hiphil, the sense is making peace or being in peaceful
    relation. 'Will be at peace' communicates the result naturally in English and
    fits the poetic parallel with covenant.
- source_word: לָךְ
  chosen: with you
  alternatives:
  - toward you
  - for you
  lexicon: HALOT
  rationale: Although formally 'to/for you,' English idiom with 'be at peace' takes
    'with you.' This best conveys the relational sense of the Hebrew construction.
