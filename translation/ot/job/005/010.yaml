theological_decisions:
- issue: Scope of אָרֶץ
  chosen_reading: earth
  alternative_readings:
  - land
  rationale: The verse speaks broadly of God's providential ordering of rain and water,
    not merely a specific territory. 'Earth' better reflects the general scope while
    remaining within the semantic range of אָרֶץ.
