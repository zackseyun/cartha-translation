id: JOB.5.10
reference: Job 5:10
source:
  edition: WLC
  text: הַ/נֹּתֵ֣ן מָ֭טָר עַל פְּנֵי אָ֑רֶץ וְ/שֹׁ֥לֵֽחַ מַ֝יִם עַל פְּנֵ֥י חוּצֽוֹת־־־׃
translation:
  text: who gives rain on the face of the earth and sends water on the face of the
    open country,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'over the land.' Hebrew אֶרֶץ can mean either 'earth' or 'land,' depending
      on context.
    reason: lexical_alternative
  - marker: b
    text: Or 'on the face of the streets' or 'over the countryside.' The Hebrew חוּצוֹת
      can refer to open places, streets, or broad outdoor areas; here the context
      favors open country.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַנֹּתֵן
  chosen: who gives
  alternatives:
  - the one who gives
  - giving
  lexicon: HALOT
  rationale: Qal participle with article functions substantivally, continuing the
    description of God from the previous verse. 'Who gives' fits smooth English while
    preserving the participial, relative-clause force.
- source_word: מָטָר
  chosen: rain
  alternatives:
  - shower
  - rainfall
  lexicon: HALOT
  rationale: Standard term for rain/precipitation. 'Rain' is the natural and sufficiently
    formal English equivalent.
- source_word: עַל־פְּנֵי אָרֶץ
  chosen: on the face of the earth
  alternatives:
  - upon the earth
  - over the land
  lexicon: HALOT
  rationale: Literally 'on the face/surface of the earth/land.' Retaining 'face' preserves
    Hebrew imagery and parallelism with the second colon. 'Earth' is preferred here
    over 'land' because the statement is general rather than localized.
- source_word: וְשֹׁלֵחַ
  chosen: and sends
  alternatives:
  - and dispatches
  - sending
  lexicon: HALOT
  rationale: Qal participle parallel to הַנֹּתֵן. 'And sends' preserves the verbal
    parallelism and reads naturally in English.
- source_word: מַיִם
  chosen: water
  alternatives:
  - waters
  lexicon: HALOT
  rationale: Though morphologically plural in Hebrew, מַיִם is commonly rendered as
    the English mass noun 'water.' Singular English is idiomatic here.
- source_word: עַל־פְּנֵי חוּצוֹת
  chosen: on the face of the open country
  alternatives:
  - upon the fields
  - over the countryside
  - on the face of the streets
  lexicon: HALOT
  rationale: חוּצוֹת can denote open places outside settled areas, broad open spaces,
    or streets/squares depending on context. In parallel with rain on the earth and
    in a nature context, 'open country' best fits the sense of broad outdoor expanses
    rather than urban streets. 'On the face of' is retained for parallelism with the
    first colon.
