theological_decisions:
- issue: Rendering the divine names/titles אֵל and אֱלֹהִים in parallel
  chosen_reading: Both rendered as 'God'
  alternative_readings:
  - '''God'' and ''God Almighty'''
  - '''El'' and ''God'''
  rationale: The verse uses poetic parallelism rather than making a theological distinction
    between two different divine referents. Rendering both as 'God' preserves the
    sense and avoids implying a distinction not demanded by the Hebrew.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    theological tension rather than resolve it'
