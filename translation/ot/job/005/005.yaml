id: JOB.5.5
reference: Job 5:5
source:
  edition: WLC
  text: אֲשֶׁ֤ר קְצִיר֨/וֹ רָ֘עֵ֤ב יֹאכֵ֗ל וְ/אֶֽל מִ/צִּנִּ֥ים יִקָּחֵ֑/הוּ וְ/שָׁאַ֖ף
    צַמִּ֣ים חֵילָֽ/ם׀־׃
translation:
  text: The hungry eat his harvest, and take it even from among the thorns, and the
    thirsty pant after their wealth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and a snare/trap swallows up their wealth.' The Hebrew of the final
      clause is difficult; the main text follows the common reading that parallels
      'the hungry' with 'the thirsty.'
    reason: alternative_reading
lexical_decisions:
- source_word: קְצִירוֹ
  chosen: his harvest
  alternatives:
  - his crop
  lexicon: HALOT
  rationale: קָצִיר denotes harvested produce or harvest. 'His harvest' is natural
    English and preserves the possessive suffix.
- source_word: רָעֵב
  chosen: the hungry
  alternatives:
  - a hungry man
  - the hungry one
  lexicon: HALOT
  rationale: The adjective is used substantivally. 'The hungry' gives the generic
    class sense in idiomatic English without over-specifying number.
- source_word: וְאֶל מִצִּנִּים יִקָּחֵהוּ
  chosen: and take it even from among the thorns
  alternatives:
  - and take it from the thorns
  - and snatch it away from among thornbushes
  lexicon: HALOT
  rationale: The phrase is difficult, but the sense is that the crop is seized despite
    protective thorn hedges or from thorny places. Rendering 'even from among the
    thorns' preserves the prepositional force and the vivid image without overinterpreting.
- source_word: צִנִּים
  chosen: thorns
  alternatives:
  - thornbushes
  - hooks
  lexicon: HALOT
  rationale: In this context the common sense 'thorns' best fits the agricultural
    imagery. Some take it differently, but 'thorns' is the most straightforward lexical
    value.
- source_word: וְשָׁאַף
  chosen: pant after
  alternatives:
  - gulp down
  - snatch at
  - swallow up
  lexicon: HALOT
  rationale: שָׁאַף can denote panting, gasping, or eagerly snapping at. 'Pant after'
    preserves the metaphor of greedy desire and works well with the following object.
- source_word: צַמִּים
  chosen: the thirsty
  alternatives:
  - the snare
  - the trapper
  - the thirsty ones
  lexicon: HALOT
  rationale: The consonantal text is commonly understood as 'the thirsty' and fits
    the parallelism with 'the hungry.' Some ancient and modern interpreters prefer
    a different reading related to 'snare' or 'trap'; that alternative is preserved
    in a footnote because the Hebrew is debated.
- source_word: חֵילָם
  chosen: their wealth
  alternatives:
  - their substance
  - their strength
  - their possessions
  lexicon: HALOT
  rationale: חַיִל often denotes wealth, resources, or substance in wisdom literature.
    'Their wealth' fits the context of predatory loss of goods.
