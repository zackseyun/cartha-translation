id: JOB.5.1
reference: Job 5:1
source:
  edition: WLC
  text: קְֽרָא נָ֭א הֲ/יֵ֣שׁ עוֹנֶ֑/ךָּ וְ/אֶל מִ֖י מִ/קְּדֹשִׁ֣ים תִּפְנֶֽה־־׃
translation:
  text: Call now—is there anyone who will answer you? And to which of the holy ones
    will you turn?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'saints' or 'holy beings.' The Hebrew 'holy ones' likely refers here
      to heavenly beings.
    reason: lexical_alternative
lexical_decisions:
- source_word: קְרָא
  chosen: Call
  alternatives:
  - Cry out
  - Call out
  lexicon: HALOT
  rationale: Imperative of קרא, here an exhortation/challenge from Eliphaz. 'Call'
    is concise and natural; 'cry out' is possible but slightly heightens the emotional
    tone beyond what the verb itself requires.
- source_word: נָא
  chosen: now
  alternatives:
  - please
  lexicon: HALOT
  rationale: Particle adding urgency or entreaty. In this disputational context, 'now'
    fits idiomatic English better than the more polite-sounding 'please'.
- source_word: הֲיֵשׁ
  chosen: is there
  alternatives:
  - is there really
  - does there exist
  lexicon: HALOT
  rationale: Interrogative plus existential particle introduces a rhetorical question.
    'Is there' preserves the straightforward Hebrew structure.
- source_word: עוֹנֶךָ
  chosen: who will answer you
  alternatives:
  - answering you
  - one who answers you
  lexicon: HALOT
  rationale: 'From ענה in the sense ''answer, respond.'' The form functions substantivally
    with second masculine singular suffix: ''one answering you'' / ''one who will
    answer you.'' The fuller English clause is idiomatic and preserves the rhetorical
    force.'
- source_word: וְאֶל־מִי
  chosen: And to which
  alternatives:
  - And to whom
  - And to which one
  lexicon: HALOT
  rationale: Introduces the second rhetorical question. 'Which' works well because
    the following phrase identifies a class ('the holy ones') from which one might
    choose.
- source_word: מִקְּדֹשִׁים
  chosen: of the holy ones
  alternatives:
  - of the saints
  - of the holy beings
  lexicon: HALOT
  rationale: Plural of קדושׁ used substantivally. In Job this likely refers to heavenly
    holy beings rather than human 'saints.' 'Holy ones' is the most transparent and
    least interpretively loaded rendering; alternatives are preserved in a footnote.
- source_word: תִּפְנֶה
  chosen: will you turn
  alternatives:
  - will you appeal
  - will you look
  lexicon: HALOT
  rationale: From פנה, literally 'turn' toward. In context it implies turning for
    help or appeal, but 'turn' preserves the metaphor while remaining clear.
