theological_decisions:
- issue: Identity of 'the holy ones' (מקדשים)
  chosen_reading: heavenly holy ones/angelic beings left untranslated as 'holy ones'
  alternative_readings:
  - saints
  - holy ones in general
  rationale: The context in Job favors celestial beings rather than departed human
    believers. To avoid importing later doctrinal associations tied to 'saints,' the
    main text keeps the broader 'holy ones,' with alternatives noted in a footnote.
  doctrine_reference: Translation philosophy §1, §3, §6
