id: JOB.5.26
reference: Job 5:26
source:
  edition: WLC
  text: תָּב֣וֹא בְ/כֶ֣לַח אֱלֵי קָ֑בֶר כַּ/עֲל֖וֹת גָּדִ֣ישׁ בְּ/עִתּֽ/וֹ־׃
translation:
  text: You will come to the grave in full vigor, like a sheaf gathered up in its
    season.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in ripe old age.' The Hebrew term כֶּלַח is rare and may refer to mature
      age; the main text renders the broader idea of full, proper maturity or vigor.
    reason: lexical_alternative
  - marker: b
    text: Or 'like a stack of grain brought up in its season.' The Hebrew image is
      agricultural, comparing a person's death at the proper time to harvested grain
      gathered when ready.
    reason: lexical_alternative
lexical_decisions:
- source_word: תָּב֣וֹא
  chosen: you will come
  alternatives:
  - you will go
  - you will arrive
  lexicon: HALOT
  rationale: Qal imperfect 2ms of בוא, straightforward future sense in context. 'Come'
    works idiomatically with 'to the grave' and preserves the directness of the Hebrew.
- source_word: בְ/כֶ֣לַח
  chosen: in full vigor
  alternatives:
  - in ripe old age
  - in maturity
  - in freshness
  lexicon: HALOT
  rationale: כֶּלַח is rare and debated. Traditional renderings often give 'ripe old
    age,' but the noun can denote full vitality or mature strength. In this poetic
    comparison with produce gathered in season, the sense is not merely chronological
    age but arriving at death at the proper, full stage of life. 'In full vigor' preserves
    that nuance without overcommitting to advanced age.
- source_word: אֱלֵי
  chosen: to
  alternatives:
  - unto
  lexicon: HALOT
  rationale: Simple directional preposition; 'to' is natural modern English.
- source_word: קָ֑בֶר
  chosen: the grave
  alternatives:
  - the tomb
  - the pit
  lexicon: HALOT
  rationale: קבר ordinarily denotes grave/burial place. 'The grave' is the most idiomatic
    and broadly accurate rendering here.
- source_word: כַּ/עֲל֖וֹת
  chosen: like ... gathered up
  alternatives:
  - as ... is brought up
  - as ... rises
  lexicon: HALOT
  rationale: The prefixed כ marks comparison. The infinitive construct of עלה in this
    agricultural simile likely carries the sense of being brought up/removed, i.e.,
    harvested. English requires supplying the implied harvesting action for clarity
    in the simile.
- source_word: גָּדִ֣ישׁ
  chosen: a sheaf
  alternatives:
  - a stack of grain
  - a heap of harvested grain
  lexicon: HALOT
  rationale: גדיש refers to a heap or stack of cut grain; in English poetic usage
    'sheaf' communicates the agricultural image compactly, though 'stack' is also
    possible. 'Sheaf' fits the singular comparison well.
- source_word: בְּ/עִתּֽ/וֹ
  chosen: in its season
  alternatives:
  - at its proper time
  - in its time
  lexicon: HALOT
  rationale: בעתו means at the appropriate or appointed time. 'In its season' preserves
    the agricultural resonance of the simile and the idea of fitting timing.
