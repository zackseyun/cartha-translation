id: JOB.5.21
reference: Job 5:21
source:
  edition: WLC
  text: בְּ/שׁ֣וֹט לָ֭שׁוֹן תֵּחָבֵ֑א וְֽ/לֹא תִירָ֥א מִ֝/שֹּׁ֗ד כִּ֣י יָבֽוֹא־׃
translation:
  text: You will be hidden from the lash of the tongue, and you will not fear destruction
    when it comes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'the lash of the tongue,' a metaphor for abusive or slanderous speech.
    reason: lexical_alternative
  - marker: b
    text: Or 'devastation' or 'ruin' for 'destruction.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּשׁוֹט
  chosen: from the lash
  alternatives:
  - at the whip
  - from the scourge
  lexicon: HALOT
  rationale: שׁוֹט literally denotes a whip/scourge. In construct with 'tongue' it
    forms a vivid metaphor for verbal attack. 'Lash' preserves the metaphor naturally
    in English and fits the protective sense with תֵּחָבֵא plus מן implied by context.
- source_word: לָשׁוֹן
  chosen: the tongue
  alternatives:
  - the language
  - the speech
  lexicon: HALOT
  rationale: Here לָשׁוֹן refers metonymically to speech, especially slander or verbal
    assault. 'The tongue' preserves the Hebrew image rather than flattening it to
    'speech'.
- source_word: תֵּחָבֵא
  chosen: you will be hidden
  alternatives:
  - you will be concealed
  - you will be sheltered
  lexicon: HALOT
  rationale: Niphal of חבא conveys being hidden/concealed. 'You will be hidden' is
    a close rendering and allows the metaphorical sense of being kept safe from verbal
    attack without over-interpreting as 'sheltered'.
- source_word: וְלֹא תִירָא
  chosen: and you will not fear
  alternatives:
  - and you need not fear
  lexicon: HALOT
  rationale: A straightforward rendering of the negated imperfect. 'Will not fear'
    keeps the predictive assurance of the Hebrew better than the more idiomatic but
    slightly interpretive 'need not fear'.
- source_word: מִשֹּׁד
  chosen: destruction
  alternatives:
  - devastation
  - ruin
  lexicon: HALOT
  rationale: שֹׁד commonly denotes violent destruction, devastation, or ruin. 'Destruction'
    is clear modern English and broad enough to cover the term's force here.
- source_word: כִּי יָבֹוא
  chosen: when it comes
  alternatives:
  - when it arrives
  - though it comes
  lexicon: HALOT
  rationale: 'כִּי here is best taken temporally in context: the righteous person
    will not fear destruction at the time it comes. ''When it comes'' is idiomatic
    and contextually precise. ''Though it comes'' is possible in some contexts but
    less likely here.'
