id: JOB.5.14
reference: Job 5:14
source:
  edition: WLC
  text: יוֹמָ֥ם יְפַגְּשׁוּ חֹ֑שֶׁךְ וְ֝/כַ/לַּ֗יְלָה יְֽמַשְׁשׁ֥וּ בַֽ/צָּהֳרָֽיִם־׃
translation:
  text: By day they meet darkness, and at noon they grope as in the night.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "like night" or "as at night." The Hebrew uses a comparative prefix on
      "night," expressing that they grope at noon as though it were nighttime.
    reason: lexical_alternative
lexical_decisions:
- source_word: יוֹמָם
  chosen: By day
  alternatives:
  - In the daytime
  - Daytime
  lexicon: HALOT
  rationale: Adverbial accusative meaning 'by day' or 'in the daytime.' 'By day' is
    concise and idiomatic in English, preserving the temporal contrast with 'night'
    and 'at noon.'
- source_word: יְפַגְּשׁוּ
  chosen: they meet
  alternatives:
  - they encounter
  - they come upon
  lexicon: HALOT
  rationale: From פגשׁ in the sense of encountering or meeting. 'Meet' is the most
    direct and natural rendering here, conveying an unexpected encounter with darkness.
- source_word: חֹשֶׁךְ
  chosen: darkness
  alternatives:
  - gloom
  lexicon: HALOT
  rationale: Standard rendering for חשך. 'Darkness' preserves both literal and metaphorical
    force in this wisdom context without overinterpreting it.
- source_word: וְכַלַּיְלָה
  chosen: as in the night
  alternatives:
  - like night
  - as at night
  lexicon: HALOT
  rationale: 'The prefixed כ marks comparison: they grope at noon as though it were
    night. ''As in the night'' makes the simile explicit and reads smoothly with the
    following verb.'
- source_word: יְמַשְׁשׁוּ
  chosen: they grope
  alternatives:
  - they feel their way
  - they fumble
  lexicon: HALOT
  rationale: From משׁשׁ, to feel about or grope, especially in darkness. 'Grope' is
    the established and precise English equivalent, fitting the image of blindness/confusion.
- source_word: בַצָּהֳרָיִם
  chosen: at noon
  alternatives:
  - at midday
  - in broad daylight
  lexicon: HALOT
  rationale: 'Refers specifically to noon/midday. ''At noon'' best preserves the sharp
    irony: even at the brightest time of day they act as though in darkness.'
