theological_decisions:
- issue: Metaphorical force of 'the sword of their mouth'
  chosen_reading: Retain the metaphor as destructive speech rather than flattening
    it to 'their words.'
  alternative_readings:
  - from the sword, from their mouth
  - from their slanderous words
  rationale: The Hebrew juxtaposes 'sword' and 'mouth' in a vivid poetic image. Preserving
    the metaphor maintains the text's literary force and avoids over-interpretation,
    while still being intelligible in English.
  doctrine_reference: Translation philosophy §1, §3, §6
