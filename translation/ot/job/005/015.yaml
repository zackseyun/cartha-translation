id: JOB.5.15
reference: Job 5:15
source:
  edition: WLC
  text: וַ/יֹּ֣שַׁע מֵ֭/חֶרֶב מִ/פִּי/הֶ֑ם וּ/מִ/יַּ֖ד חָזָ֣ק אֶבְיֽוֹן׃
translation:
  text: But he saves the needy from the sword of their mouth, and from the hand of
    the strong.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'he delivered the needy from the sword, from their mouth, and from the
      hand of the strong.' The Hebrew wording is compressed, and some take 'from their
      mouth' separately rather than as 'the sword of their mouth.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיֹּשַׁע
  chosen: he saves
  alternatives:
  - he delivered
  - he rescues
  lexicon: HALOT
  rationale: From ישׁע, with God as the implied subject in context. The waw-consecutive
    form can be rendered past in narrative sequence, but present 'saves' fits the
    poetic, gnomic style of Eliphaz's speech and reads naturally in English.
- source_word: מֵחֶרֶב
  chosen: from the sword
  alternatives:
  - from a sword
  lexicon: HALOT
  rationale: חֶרֶב is the common noun 'sword.' The prefixed מִן marks separation/deliverance.
    The definite sense in English is natural with the following construct-like specification
    'of their mouth.'
- source_word: מִפִּיהֶם
  chosen: of their mouth
  alternatives:
  - from their mouth
  - from the mouth of them
  lexicon: HALOT
  rationale: Literally 'from their mouth,' but with the preceding מֵחֶרֶב the Hebrew
    idiom is best represented as 'the sword of their mouth,' i.e., destructive speech
    likened to a sword. Singular 'mouth' with plural suffix is retained as a collective
    singular in English.
- source_word: וּמִיַּד
  chosen: and from the hand of
  alternatives:
  - and from the power of
  lexicon: HALOT
  rationale: יָד literally means 'hand' and often extends metaphorically to power
    or control. Here the concrete image pairs well with 'the strong,' so the literal
    rendering is preserved.
- source_word: חָזָק
  chosen: the strong
  alternatives:
  - the mighty
  - the powerful
  lexicon: HALOT
  rationale: As an adjective used substantivally, it refers to a strong or powerful
    person/group. 'The strong' is concise and preserves the contrast with 'the needy.'
- source_word: אֶבְיוֹן
  chosen: the needy
  alternatives:
  - the poor
  - the afflicted
  lexicon: HALOT
  rationale: אֶבְיוֹן commonly denotes one who is poor/needy. 'The needy' captures
    economic and social vulnerability without narrowing the term too much.
