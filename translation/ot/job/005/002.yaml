id: JOB.5.2
reference: Job 5:2
source:
  edition: WLC
  text: כִּֽי לֶֽ֭/אֱוִיל יַהֲרָג כָּ֑עַשׂ וּ֝/פֹתֶ֗ה תָּמִ֥ית קִנְאָֽה־־׃
translation:
  text: For vexation kills the fool, and jealousy puts the simple to death.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'envy' for 'jealousy.' The Hebrew term can denote either, but here it
      refers to a destructive passion.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Surely
  - Because
  lexicon: HALOT
  rationale: Introduces Eliphaz's explanatory assertion. 'For' fits the argumentative
    flow from the previous verse better than a stronger asseverative like 'surely.'
- source_word: לֶאֱוִיל
  chosen: the fool
  alternatives:
  - a fool
  - the foolish man
  lexicon: HALOT
  rationale: אֱוִיל denotes a morally and practically foolish person, not merely someone
    unintelligent. The prefixed ל marks the affected party with the following verb,
    yielding 'kills the fool.' The definite English form suits the generic class statement.
- source_word: יַהֲרָג
  chosen: kills
  alternatives:
  - slays
  - destroys
  lexicon: HALOT
  rationale: Qal imperfect of הרג here expresses a gnomic present in wisdom style.
    'Kills' is clear modern English and preserves the lethal force without archaic
    tone.
- source_word: כָּעַשׂ
  chosen: vexation
  alternatives:
  - anger
  - grief
  - resentment
  lexicon: HALOT
  rationale: כַּעַשׂ can denote provocation, irritation, or vexation. In this parallel
    with קִנְאָה, the sense is an inward agitated passion that proves destructive.
    'Vexation' captures the broader emotional disturbance better than the narrower
    'anger,' while remaining natural English.
- source_word: וּפֹתֶה
  chosen: the simple
  alternatives:
  - the naive
  - the gullible
  - the inexperienced
  lexicon: HALOT
  rationale: פֹּתֶה refers to a simple, easily persuaded person in wisdom literature.
    'The simple' is a standard concise rendering that preserves the proverbial register
    without implying intellectual disability.
- source_word: תָּמִית
  chosen: puts ... to death
  alternatives:
  - kills
  - causes ... to die
  lexicon: HALOT
  rationale: Hiphil of מות is causative. Rendering it as 'puts ... to death' preserves
    the causative nuance and provides slight variation matching the Hebrew parallelism.
- source_word: קִנְאָה
  chosen: jealousy
  alternatives:
  - envy
  - zeal
  lexicon: HALOT
  rationale: In this context of destructive emotion parallel to כָּעַשׂ, 'jealousy'
    best fits the negative sense. 'Envy' is possible and worth preserving in a footnote
    because English usage overlaps here.
