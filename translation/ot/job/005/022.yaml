theological_decisions:
- issue: Force of אַל תִּירָא in context
  chosen_reading: promissory assurance ('you will not fear')
  alternative_readings:
  - prohibition ('do not fear')
  rationale: The verse is part of a sequence of promised protections and blessings.
    Rendering the clause as assurance best reflects the discourse flow and parallelism
    with 'you will laugh,' while not importing additional theology beyond divine protection.
  doctrine_reference: Translation philosophy §3 (preserve tension where genuine ambiguity
    exists)
