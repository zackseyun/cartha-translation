id: JOB.5.22
reference: Job 5:22
source:
  edition: WLC
  text: לְ/שֹׁ֣ד וּ/לְ/כָפָ֣ן תִּשְׂחָ֑ק וּֽ/מֵ/חַיַּ֥ת הָ֝/אָ֗רֶץ אַל תִּירָֽא־׃
translation:
  text: At destruction and famine you will laugh, and you will not fear the beasts
    of the earth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'do not fear the beasts of the earth.' The Hebrew form can be read as
      a prohibition, though here it likely functions as a promise of security.
    reason: alternative_reading
lexical_decisions:
- source_word: שֹׁד
  chosen: destruction
  alternatives:
  - devastation
  - ruin
  lexicon: HALOT
  rationale: שֹׁד commonly denotes violent destruction, devastation, or ruin. 'Destruction'
    is concise, natural English and pairs well with 'famine' as calamities from which
    the addressee is protected.
- source_word: כָּפָן
  chosen: famine
  alternatives:
  - hunger
  lexicon: HALOT
  rationale: The noun refers to famine or severe hunger. 'Famine' best matches the
    disaster-category parallelism with שֹׁד and is the standard rendering in this
    context.
- source_word: תִּשְׂחָק
  chosen: you will laugh
  alternatives:
  - you will mock
  - you will smile at
  lexicon: HALOT
  rationale: From שׂחק, the verb can denote laughing, sometimes with a sense of derision
    or fearless triumph. 'You will laugh' preserves the vivid metaphor without over-interpreting
    the emotional nuance.
- source_word: מֵחַיַּת הָאָרֶץ
  chosen: the beasts of the earth
  alternatives:
  - the wild animals of the land
  - the animals of the earth
  lexicon: HALOT
  rationale: חַיָּה often refers to wild animals or beasts. 'Beasts of the earth'
    is a natural rendering of the construct phrase and preserves the elevated poetic
    register of the Hebrew.
- source_word: אַל תִּירָא
  chosen: you will not fear
  alternatives:
  - do not fear
  - you need not fear
  lexicon: HALOT
  rationale: 'Though אַל with an imperfect often expresses prohibition, in this poetic
    context following another imperfect it functions well as a promise/assurance:
    the addressee will not be afraid. This fits the surrounding blessings in Eliphaz''s
    speech.'
