id: JOB.5.4
reference: Job 5:4
source:
  edition: WLC
  text: יִרְחֲק֣וּ בָנָ֣י/ו מִ/יֶּ֑שַׁע וְ/יִֽדַּכְּא֥וּ בַ֝/שַּׁ֗עַר וְ/אֵ֣ין מַצִּֽיל׃
translation:
  text: His children are far from safety, and they are crushed in the gate, with no
    one to rescue them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '"In the gate" refers to the city gate, the customary place of legal judgment
      and public decision-making.'
    reason: cultural_note
  - marker: b
    text: Or "far from deliverance" or "far from salvation" for "from safety."
    reason: lexical_alternative
lexical_decisions:
- source_word: יִרְחֲקוּ
  chosen: are far
  alternatives:
  - are far away
  - keep far away
  - become distant
  lexicon: HALOT
  rationale: The verb רחק denotes being distant or far removed. In context it describes
    the children's condition relative to deliverance/safety, so the stative English
    'are far' is natural and sufficiently formal.
- source_word: בָנָיו
  chosen: his children
  alternatives:
  - his sons
  lexicon: HALOT
  rationale: בנים can mean 'sons' more narrowly or 'children' more broadly. Since
    the verse speaks generically of offspring under judgment rather than emphasizing
    male sex, 'children' best conveys the sense in readable modern English while preserving
    filial reference.
- source_word: מִיֶּשַׁע
  chosen: from safety
  alternatives:
  - from salvation
  - from deliverance
  - from help
  lexicon: HALOT
  rationale: יֶשַׁע commonly denotes deliverance, salvation, or safety. In this wisdom
    context the sense is practical security/rescue rather than explicitly theological
    salvation, so 'safety' fits the immediate picture. The rescue nuance is echoed
    in the final clause.
- source_word: וְיִדַּכְּאוּ
  chosen: they are crushed
  alternatives:
  - they are oppressed
  - they are broken
  - they are crushed down
  lexicon: HALOT
  rationale: The verb דכא carries the sense of being crushed or broken. 'Are crushed'
    preserves the forceful passive/resultative sense and fits the legal-social setting
    of the next phrase.
- source_word: בַשַּׁעַר
  chosen: in the gate
  alternatives:
  - at the gate
  - in the city gate
  lexicon: HALOT
  rationale: The city gate was the place of public judgment and legal proceedings.
    'In the gate' is a close rendering of the Hebrew and preserves the idiomatic judicial
    setting; the cultural significance is clarified in a footnote.
- source_word: וְאֵין מַצִּיל
  chosen: with no one to rescue them
  alternatives:
  - and there is no deliverer
  - and no one saves them
  - and there is none to rescue
  lexicon: HALOT
  rationale: נצל in the participial form denotes one who rescues or delivers. 'With
    no one to rescue them' is idiomatic English that preserves the existential force
    of אין plus participle and links naturally with the earlier 'safety'.
