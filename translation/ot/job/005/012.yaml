id: JOB.5.12
reference: Job 5:12
source:
  edition: WLC
  text: מֵ֭פֵר מַחְשְׁב֣וֹת עֲרוּמִ֑ים וְֽ/לֹא תַעֲשֶׂ֥ינָה יְ֝דֵי/הֶ֗ם תּוּשִׁיָּֽה־׃
translation:
  text: He frustrates the schemes of the crafty, so that their hands accomplish no
    success.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their hands achieve nothing effective'; the Hebrew term can also be
      rendered 'sound wisdom' in some contexts.
    reason: lexical_alternative
lexical_decisions:
- source_word: מֵפֵר
  chosen: frustrates
  alternatives:
  - breaks up
  - thwarts
  - nullifies
  lexicon: HALOT
  rationale: From פרר in the Hiphil, the sense is causing plans to be broken or made
    ineffective. 'Frustrates' is idiomatic modern English that preserves the causative
    force without sounding wooden.
- source_word: מַחְשְׁבוֹת
  chosen: schemes
  alternatives:
  - plans
  - thoughts
  - devices
  lexicon: HALOT
  rationale: While the noun can mean 'thoughts' or 'plans,' in context with 'the crafty'
    it carries a strategic, plotting sense. 'Schemes' best reflects that negative
    nuance in English.
- source_word: עֲרוּמִים
  chosen: the crafty
  alternatives:
  - the shrewd
  - the cunning
  lexicon: HALOT
  rationale: The adjective can be positive ('prudent') or negative ('crafty/cunning')
    depending on context. Here, because God is overturning their plans, the negative
    sense is most fitting.
- source_word: וְלֹא
  chosen: so that ... no
  alternatives:
  - and not
  - with the result that not
  lexicon: HALOT
  rationale: The conjunction plus negation introduces the consequence of God's action.
    Rendering it as 'so that ... no' communicates the result relation naturally in
    English.
- source_word: תַעֲשֶׂינָה
  chosen: accomplish
  alternatives:
  - do
  - bring about
  - produce
  lexicon: HALOT
  rationale: עשה is broad ('do/make'), but with 'their hands' and the abstract object
    that follows, 'accomplish' captures successful execution rather than mere action.
- source_word: יְדֵיהֶם
  chosen: their hands
  lexicon: HALOT
  rationale: A literal rendering preserves the Hebrew idiom of agency and power. English
    readers readily understand 'hands' as representing practical ability or execution.
- source_word: תּוּשִׁיָּה
  chosen: success
  alternatives:
  - sound wisdom
  - effectiveness
  - substance
  lexicon: HALOT
  rationale: This noun has a debated range, including wisdom, resourcefulness, and
    effective success. In this clause, where their hands fail to carry something through,
    'success' best fits the immediate verbal context. The lexical alternative is preserved
    in a footnote because 'sound wisdom' is a traditional possibility.
