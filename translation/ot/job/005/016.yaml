id: JOB.5.16
reference: Job 5:16
source:
  edition: WLC
  text: וַ/תְּהִ֣י לַ/דַּ֣ל תִּקְוָ֑ה וְ֝/עֹלָ֗תָ/ה קָ֣פְצָה פִּֽי/הָ׃
translation:
  text: So there is hope for the poor, and injustice shuts its mouth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'wrongdoing shuts its mouth,' or more literally, 'its mouth closes.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתְּהִי
  chosen: there is
  alternatives:
  - there was
  - so there was
  - and there came to be
  lexicon: HALOT
  rationale: From היה in the wayyiqtol, introducing the result of the preceding description.
    English present 'there is' gives the proverbial/resultative force naturally, while
    'so' carries the discourse connection.
- source_word: לַדַּל
  chosen: for the poor
  alternatives:
  - for the weak
  - for the lowly
  - for the needy
  lexicon: HALOT
  rationale: דַּל denotes one who is poor, weak, or socially powerless. 'The poor'
    is the most idiomatic and broadly accurate rendering here, preserving both economic
    and vulnerable connotations.
- source_word: תִּקְוָה
  chosen: hope
  alternatives:
  - expectation
  lexicon: HALOT
  rationale: The noun commonly means 'hope' or 'expectation.' 'Hope' best fits the
    contrast with the silencing of wrongdoing and is standard, clear English.
- source_word: וְעֹלָתָה
  chosen: injustice
  alternatives:
  - unrighteousness
  - wrongdoing
  - iniquity
  lexicon: HALOT
  rationale: From עַוְלָה, denoting injustice or wrongdoing. 'Injustice' fits the
    social setting of the verse, contrasting the poor person's hope with the defeat
    of oppressive evil. The suffix marks 'its' in the following phrase.
- source_word: קָפְצָה פִּיהָ
  chosen: shuts its mouth
  alternatives:
  - closed its mouth
  - stopped its mouth
  - was silenced
  lexicon: HALOT
  rationale: Literally 'its mouth closed/shut.' The idiom conveys being silenced or
    rendered unable to speak. 'Shuts its mouth' preserves the vivid Hebrew image while
    remaining natural English.
