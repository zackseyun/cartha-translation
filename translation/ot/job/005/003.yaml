id: JOB.5.3
reference: Job 5:3
source:
  edition: WLC
  text: אֲֽנִי רָ֭אִיתִי אֱוִ֣יל מַשְׁרִ֑ישׁ וָ/אֶקּ֖וֹב נָוֵ֣/הוּ פִתְאֹֽם־׃
translation:
  text: I have seen a fool taking root, but suddenly I cursed his dwelling.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'I declared his dwelling cursed' or 'I marked his dwelling as doomed.'
      The Hebrew verb can be understood as a direct curse or as an observational pronouncement
      of judgment.
    reason: alternative_reading
lexical_decisions:
- source_word: אֲנִי
  chosen: I
  lexicon: HALOT
  rationale: Explicit first-person pronoun retained for emphasis in English, matching
    the Hebrew subject.
- source_word: רָאִיתִי
  chosen: have seen
  alternatives:
  - saw
  lexicon: HALOT
  rationale: The perfect verb reports the speaker's observed experience. English present
    perfect fits the testimonial force ('I have seen') slightly better than simple
    past, though both are possible.
- source_word: אֱוִיל
  chosen: a fool
  alternatives:
  - a foolish man
  lexicon: HALOT
  rationale: Standard rendering for אֱוִיל in wisdom literature. 'Fool' preserves
    the moral and sapiential category, not merely low intelligence.
- source_word: מַשְׁרִישׁ
  chosen: taking root
  alternatives:
  - rooting himself
  - becoming established
  - spreading roots
  lexicon: HALOT
  rationale: Hiphil participle from שׁרשׁ conveys putting down roots / becoming established.
    'Taking root' is idiomatic and preserves the metaphor of apparent stability or
    prosperity.
- source_word: וָאֶקּוֹב
  chosen: I cursed
  alternatives:
  - I denounced
  - I marked for judgment
  lexicon: HALOT
  rationale: From נקב in the sense 'curse' (cf. usage in contexts of pronouncing a
    curse). Although some interpreters soften it to an observational declaration,
    the lexical sense supports 'curse' most directly here.
- source_word: נָוֵהוּ
  chosen: his dwelling
  alternatives:
  - his habitation
  - his pasture
  - his home
  lexicon: HALOT
  rationale: נָוֶה can denote abode, habitation, or dwelling-place. 'Dwelling' is
    natural English and broad enough to preserve the image without over-specifying.
- source_word: פִתְאֹם
  chosen: suddenly
  alternatives:
  - at once
  - in an instant
  lexicon: HALOT
  rationale: Adverb meaning 'suddenly'; placed with the cursing clause to reflect
    the Hebrew sequence and abruptness.
