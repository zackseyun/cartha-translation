theological_decisions:
- issue: Sense of the speaker's response in וָאֶקּוֹב
  chosen_reading: Eliphaz says he himself pronounced a curse on the fool's dwelling
    after seeing the fool become established.
  alternative_readings:
  - Eliphaz is speaking proleptically of recognizing the dwelling as cursed
  - Eliphaz is declaring the dwelling doomed rather than personally cursing it
  rationale: The verb's plain lexical force favors an actual cursing statement. This
    does not import magical efficacy; it reports the speaker's evaluative pronouncement
    in wisdom-poetic context. Alternative interpretive softenings are possible, so
    they are preserved in a footnote.
  doctrine_reference: Translation philosophy §1, §3
