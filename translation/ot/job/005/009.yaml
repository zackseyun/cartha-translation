id: JOB.5.9
reference: Job 5:9
source:
  edition: WLC
  text: עֹשֶׂ֣ה גְ֭דֹלוֹת וְ/אֵ֣ין חֵ֑קֶר נִ֝פְלָא֗וֹת עַד אֵ֥ין מִסְפָּֽר־׃
translation:
  text: who does great things beyond searching out, wonders beyond number,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'unsearchable'; literally, 'and there is no searching out.'
    reason: lexical_alternative
  - marker: b
    text: Or 'without number' or 'innumerable.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עֹשֶׂה
  chosen: who does
  alternatives:
  - doing
  - the one who does
  - who makes
  lexicon: HALOT
  rationale: Qal participle of עשה functions here as a relative description of God
    in context. English relative clause 'who does' is natural and preserves the participial
    force better than a bare participle.
- source_word: גְדֹלוֹת
  chosen: great things
  alternatives:
  - great deeds
  - great works
  lexicon: HALOT
  rationale: Plural adjective used substantivally. 'Great things' is the most direct
    and idiomatic rendering; 'deeds' or 'works' are possible but slightly more interpretive.
- source_word: וְאֵין חֵקֶר
  chosen: beyond searching out
  alternatives:
  - and there is no searching out
  - unsearchable
  - past finding out
  lexicon: HALOT
  rationale: The phrase literally states the absence of 'searching out/investigation.'
    Rendering it as 'beyond searching out' preserves the idiom's sense of incomprehensibility
    while remaining readable modern English. 'Unsearchable' is concise but compresses
    the Hebrew structure.
- source_word: נִפְלָאוֹת
  chosen: wonders
  alternatives:
  - marvels
  - wonderful things
  lexicon: HALOT
  rationale: The noun denotes extraordinary or wondrous acts. 'Wonders' is concise,
    natural, and fits the poetic parallel with 'great things.'
- source_word: עַד אֵין מִסְפָּר
  chosen: beyond number
  alternatives:
  - without number
  - until there is no number
  - innumerable
  lexicon: HALOT
  rationale: This idiom expresses innumerability. 'Beyond number' preserves the poetic
    cadence and parallels 'beyond searching out.' 'Without number' is also strong
    and traditional, but 'beyond number' better matches the verse's balanced structure
    in English.
