id: JOB.39.6
reference: Job 39:6
source:
  edition: WLC
  text: אֲשֶׁר שַׂ֣מְתִּי עֲרָבָ֣ה בֵית֑/וֹ וּֽ/מִשְׁכְּנוֹתָ֥י/ו מְלֵֽחָה־׃
translation:
  text: to whom I have given the desert for his house, and the salt land for his dwelling
    place,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the wilderness' or 'the steppe' for 'the desert' (עֲרָבָה).
    reason: lexical_alternative
  - marker: b
    text: Or 'the salt flat' or 'the salt waste' for 'the salt land' (מְלֵחָה).
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'his dwellings' is plural; the translation renders it as singular
      'his dwelling place' for natural English, understanding the plural as poetic/intensive.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲשֶׁר
  chosen: to whom
  alternatives:
  - which
  - for whom
  lexicon: HALOT
  rationale: Relative particle linking back to the wild donkey in the previous verse.
    In English, 'to whom' best fits the dative-like sense created by the following
    verb and keeps the personal reference clear.
- source_word: שַׂמְתִּי
  chosen: I have given
  alternatives:
  - I have set
  - I have appointed
  - I have made
  lexicon: HALOT
  rationale: The verb שׂוּם commonly means 'set, place, put,' but in this context
    with habitat terms ('desert,' 'house,' 'dwelling place') it conveys God's assigning
    or giving a home. 'I have given' is natural English and preserves the sense without
    over-paraphrasing.
- source_word: עֲרָבָה
  chosen: the desert
  alternatives:
  - the Arabah
  - the wilderness
  - the steppe
  lexicon: HALOT
  rationale: עֲרָבָה denotes arid steppe/desert terrain. 'The desert' is clear modern
    English and fits the poetic habitat imagery. 'Arabah' would be too specific/toponymic
    here, and 'steppe' is accurate but less accessible.
- source_word: בֵיתוֹ
  chosen: for his house
  alternatives:
  - as his house
  - his home
  lexicon: HALOT
  rationale: Literally 'his house.' The preposition is not explicit in Hebrew, so
    English must supply a relational phrase. 'For his house' preserves the metaphor
    of habitat as home more formally than simply 'his home.'
- source_word: וּמִשְׁכְּנוֹתָיו
  chosen: and ... for his dwelling place
  alternatives:
  - and his dwellings
  - and his habitation
  - and his dwelling places
  lexicon: HALOT
  rationale: The plural form can function as an abstract/intensive plural in poetry.
    Rendering it as singular 'dwelling place' gives idiomatic English while preserving
    the sense of habitation. The plural alternative is possible but sounds awkward
    in English here.
- source_word: מְלֵחָה
  chosen: the salt land
  alternatives:
  - the salt flat
  - the salt waste
  - the salty land
  lexicon: HALOT
  rationale: Refers to salt-affected, barren terrain. 'Salt land' is concise and natural,
    preserving the environmental image without narrowing it too specifically to a
    geological 'salt flat,' though that remains a viable alternative.
