id: JOB.39.21
reference: Job 39:21
source:
  edition: WLC
  text: יַחְפְּר֣וּ בָ֭/עֵמֶק וְ/יָשִׂ֣ישׂ בְּ/כֹ֑חַ יֵ֝צֵ֗א לִ/קְרַאת נָֽשֶׁק־׃
translation:
  text: It paws in the valley and rejoices in its strength; it goes out to meet the
    weapons.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'digs in the valley' or 'paws the ground in the valley.' The Hebrew verb
      is literally 'dig,' used here of a war horse's hoofing action.
    reason: lexical_alternative
  - marker: b
    text: Or 'to meet the battle.' The Hebrew noun can denote weaponry or arms collectively,
      and by extension the armed conflict itself.
    reason: lexical_alternative
lexical_decisions:
- source_word: יַחְפְּרוּ
  chosen: paws
  alternatives:
  - digs
  - paws the ground
  - digs in
  lexicon: HALOT
  rationale: The verb חפר literally means 'dig,' but in the horse context it describes
    the animal's pawing/scraping action with its hooves. 'Paws' gives the natural
    English image without over-paraphrasing, while preserving the concrete action.
- source_word: בָעֵמֶק
  chosen: in the valley
  alternatives:
  - in the plain
  - on the plain
  lexicon: HALOT
  rationale: עֵמֶק commonly denotes a valley or lowland. 'In the valley' is the most
    direct rendering of the Hebrew phrase.
- source_word: וְיָשִׂישׂ
  chosen: and rejoices
  alternatives:
  - and exults
  - and is glad
  lexicon: HALOT
  rationale: שׂוּשׂ conveys joy, exultation, or gladness. 'Rejoices' is idiomatic
    and strong without sounding archaic.
- source_word: בְּכֹחַ
  chosen: in its strength
  alternatives:
  - with strength
  - in strength
  - because of its strength
  lexicon: HALOT
  rationale: The preposition ב plus כֹּחַ can be rendered several ways. 'In its strength'
    preserves the Hebrew construction and conveys that the horse exults in the sphere
    or possession of its strength.
- source_word: יֵצֵא
  chosen: it goes out
  alternatives:
  - it comes out
  - it charges out
  lexicon: HALOT
  rationale: יָצָא is the standard verb 'go out/come out.' 'Goes out' is the straightforward
    rendering; 'charges out' would add interpretive force not explicit in the verb
    itself.
- source_word: לִקְרַאת
  chosen: to meet
  alternatives:
  - toward
  - to confront
  lexicon: HALOT
  rationale: לקראת means 'to meet' or 'toward the encounter with.' 'To meet' is the
    clearest and most idiomatic choice here.
- source_word: נָשֶׁק
  chosen: the weapons
  alternatives:
  - arms
  - weaponry
  - battle
  lexicon: HALOT
  rationale: נשק commonly means weaponry or arms in military contexts. 'The weapons'
    preserves the concrete martial sense better than the broader 'battle.'
