id: JOB.39.18
reference: Job 39:18
source:
  edition: WLC
  text: כָּ֭/עֵת בַּ/מָּר֣וֹם תַּמְרִ֑יא תִּֽשְׂחַ֥ק לַ֝/סּ֗וּס וּ/לְ/רֹֽכְבֽ/וֹ׃
translation:
  text: When she lifts herself up on high, she laughs at the horse and its rider.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'When she spreads her wings on high' or 'When she flaps herself aloft.'
      The Hebrew verb likely refers to rising upward, but the exact nuance is debated.
    reason: lexical_alternative
  - marker: b
    text: '''Laughs at'' can also carry the sense ''mocks'' or ''scorns.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּעֵת
  chosen: When
  alternatives:
  - At the time when
  - As soon as
  lexicon: HALOT
  rationale: The compound preposition+noun functions temporally here, introducing
    the circumstance of the ostrich's action. 'When' is idiomatic English and preserves
    the temporal force without unnecessary stiffness.
- source_word: בַּמָּרוֹם
  chosen: on high
  alternatives:
  - in the height
  - aloft
  - to a height
  lexicon: HALOT
  rationale: מָרוֹם denotes height/elevation. 'On high' fits the poetic register and
    works naturally with the following verb, conveying elevated movement without over-specifying
    whether the bird is fully airborne.
- source_word: תַּמְרִיא
  chosen: lifts herself up
  alternatives:
  - soars
  - mounts up
  - flaps herself aloft
  lexicon: HALOT
  rationale: The Hiphil of this verb can suggest making oneself rise or taking to
    height. Because the ostrich is in view and the verse is poetic, 'lifts herself
    up' preserves the image without forcing the stronger claim 'soars,' which may
    overstate the zoological picture.
- source_word: תִּשְׂחַק
  chosen: she laughs at
  alternatives:
  - she mocks
  - she scorns
  lexicon: HALOT
  rationale: The verb שׂחק commonly means 'laugh' or 'mock.' With ל marking the object,
    the sense is derisive laughter. 'Laughs at' is transparent modern English and
    preserves the vividness of the Hebrew.
- source_word: לַסּוּס
  chosen: the horse
  alternatives:
  - a horse
  lexicon: HALOT
  rationale: The prefixed article indicates a definite/generic singular. English generic
    singular is well represented by 'the horse' in this poetic comparison.
- source_word: וּלְרֹכְבוֹ
  chosen: and its rider
  alternatives:
  - and the one riding it
  - and his rider
  lexicon: HALOT
  rationale: The suffix most naturally refers back to the horse, yielding 'its rider.'
    This avoids ambiguity in English and preserves the Hebrew linkage between horse
    and mounted warrior.
