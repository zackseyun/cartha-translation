id: JOB.39.10
reference: Job 39:10
source:
  edition: WLC
  text: הֲֽ/תִקְשָׁר רֵ֭ים בְּ/תֶ֣לֶם עֲבֹת֑/וֹ אִם יְשַׂדֵּ֖ד עֲמָקִ֣ים אַחֲרֶֽי/ךָ־־׃
translation:
  text: Will you bind the wild ox in the furrow with its rope, or will it harrow the
    valleys behind you?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the aurochs' or 'the wild bull.' The Hebrew רֵים denotes a strong wild
      bovine, not the mythical 'unicorn' of older translations.
    reason: lexical_alternative
  - marker: b
    text: Or 'will it plow the valleys behind you?' The Hebrew verb likely refers
      more specifically to soil-working such as harrowing or leveling.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲתִקְשָׁר
  chosen: Will you bind
  alternatives:
  - Will you tie
  - Will you harness
  lexicon: HALOT
  rationale: The verb קשׁר means to bind or tie. 'Bind' is slightly more formal and
    fits the rhetorical question about subduing an animal for farm labor.
- source_word: רֵים
  chosen: the wild ox
  alternatives:
  - the aurochs
  - the wild bull
  lexicon: HALOT
  rationale: רֵים refers to a powerful wild bovine, traditionally 'unicorn' in older
    English but not supported by the Hebrew. 'Wild ox' is clear modern English and
    matches the animal's untamed force in context; 'aurochs' is more specific but
    less accessible.
- source_word: בְּתֶלֶם
  chosen: in the furrow
  alternatives:
  - to the furrow
  - at the furrow
  lexicon: HALOT
  rationale: תלם denotes a plowed furrow. Rendering with 'in the furrow' fits the
    image of an animal fastened for plowing.
- source_word: עֲבֹתוֹ
  chosen: its rope
  alternatives:
  - its cord
  - its harness-rope
  lexicon: HALOT
  rationale: עבות refers to a cord or rope used for binding. The 3ms suffix refers
    back to the wild ox. 'Rope' is natural English and preserves the concrete image.
- source_word: אִם
  chosen: or
  alternatives:
  - if
  lexicon: HALOT
  rationale: In this rhetorical question, אִם introduces the second alternative rather
    than a conditional clause. English 'or' best conveys the parallel question structure.
- source_word: יְשַׂדֵּד
  chosen: will it harrow
  alternatives:
  - will it plow
  - will it level
  lexicon: HALOT
  rationale: The verb שׂדד in this agricultural context refers to working or leveling
    the soil, likely by harrowing rather than the initial plowing. 'Harrow' preserves
    the farming nuance and distinguishes it from the earlier furrow imagery.
- source_word: עֲמָקִים
  chosen: the valleys
  alternatives:
  - the lowlands
  - the furrows
  lexicon: HALOT
  rationale: The noun normally means valleys or low places. While some take it as
    cultivated ground, 'valleys' is the plain lexical sense and suits the broad agricultural
    landscape image.
- source_word: אַחֲרֶיךָ
  chosen: behind you
  alternatives:
  - after you
  - following you
  lexicon: HALOT
  rationale: The phrase indicates the animal's following the farmer in directed labor.
    'Behind you' is idiomatic and vivid in English.
