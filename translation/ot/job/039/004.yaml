id: JOB.39.4
reference: Job 39:4
source:
  edition: WLC
  text: יַחְלְמ֣וּ בְ֭נֵי/הֶם יִרְבּ֣וּ בַ/בָּ֑ר יָ֝צְא֗וּ וְ/לֹא שָׁ֥בוּ לָֽ/מוֹ־׃
translation:
  text: Their young ones become strong; they grow up in the open field; they go out
    and do not return to them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the wild' or 'in the open country.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יַחְלְמוּ
  chosen: become strong
  alternatives:
  - grow healthy
  - recover strength
  - be fat/robust
  lexicon: HALOT
  rationale: The verb from חלם in this context describes the offspring thriving physically.
    'Become strong' is natural English and fits the parallel with multiplying/growing
    in the wild better than a more literal but opaque gloss. 'Grow healthy' is possible,
    but 'strong' better captures vigor.
- source_word: בְנֵיהֶם
  chosen: their young ones
  alternatives:
  - their children
  - their offspring
  - their sons
  lexicon: HALOT
  rationale: Although literally 'their sons/children,' in the animal context 'young
    ones' best conveys the referent in idiomatic English without implying specifically
    male offspring.
- source_word: יִרְבּוּ
  chosen: grow up
  alternatives:
  - become many
  - increase
  - grow
  lexicon: HALOT
  rationale: While רבה often means 'be many/increase,' in this poetic animal context
    and in parallel with physical thriving, the sense is developmental flourishing.
    'Grow up' communicates maturation in context better than a strictly numerical
    sense.
- source_word: בַּבָּר
  chosen: in the open field
  alternatives:
  - in the wild
  - in the open country
  - in the wilderness
  lexicon: HALOT
  rationale: בָּר here denotes open country/wild terrain rather than cultivated land.
    'Open field' is clear modern English and preserves the image of uncultivated open
    space. A footnote preserves 'in the wild' as a viable alternative.
- source_word: יָצְאוּ
  chosen: they go out
  alternatives:
  - they go forth
  - they leave
  lexicon: HALOT
  rationale: A straightforward rendering of יצא. 'Go out' preserves the movement away
    from the parent animals without overinterpreting.
- source_word: וְלֹא שָׁבוּ לָמוֹ
  chosen: and do not return to them
  alternatives:
  - and do not come back to them
  - and never return to them
  lexicon: HALOT
  rationale: שוב with ל marks returning to the parent animals. 'Do not return to them'
    is direct and preserves the sense without adding the stronger 'never,' which the
    Hebrew does not explicitly state.
