id: JOB.39.9
reference: Job 39:9
source:
  edition: WLC
  text: הֲ/יֹ֣אבֶה רֵּ֣ים עָבְדֶ֑/ךָ אִם יָ֝לִ֗ין עַל אֲבוּסֶֽ/ךָ־־׃
translation:
  text: Will the wild ox be willing to serve you? Will he spend the night at your
    feeding trough?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your manger.' The Hebrew term refers to a feeding place for animals.
    reason: lexical_alternative
  - marker: b
    text: Or 'wild bull' or 'auroch'; the precise animal denoted by the Hebrew term
      is uncertain.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲיֹאבֶה
  chosen: will ... be willing
  alternatives:
  - will ... consent
  - will ... be willing to
  lexicon: HALOT
  rationale: The verb אבה commonly conveys willingness or consent rather than mere
    ability. Rendering it as 'be willing' preserves the volitional nuance in this
    rhetorical question.
- source_word: רֵּים
  chosen: wild ox
  alternatives:
  - wild bull
  - oryx
  - auroch
  lexicon: HALOT
  rationale: The animal denoted by ראים is not certainly identifiable, but 'wild ox'
    is the most established and broadly understandable rendering in modern English.
    'Unicorn' reflects older tradition but not the likely zoological sense. 'Auroch'
    is possible but less accessible and more specific than the evidence warrants.
- source_word: עָבְדֶךָ
  chosen: to serve you
  alternatives:
  - be your servant
  - work for you
  lexicon: HALOT
  rationale: From עבד, the sense here is practical service or labor rendered to a
    human master. 'Serve you' is idiomatic, concise, and fits the rhetorical contrast
    between a domesticated beast and an untamable wild one.
- source_word: אִם
  chosen: Will
  alternatives:
  - or will
  - whether
  lexicon: HALOT
  rationale: In this poetic parallelism, אִם introduces the second rhetorical question.
    English idiom is smoother by repeating 'Will' rather than preserving a more wooden
    'or will' or 'whether.'
- source_word: יָלִין
  chosen: spend the night
  alternatives:
  - lodge
  - remain overnight
  lexicon: HALOT
  rationale: The verb לין refers to lodging or remaining overnight. 'Spend the night'
    is natural modern English and clearly communicates the image of an animal staying
    where domesticated animals are kept.
- source_word: עַל
  chosen: at
  alternatives:
  - by
  - over
  - upon
  lexicon: HALOT
  rationale: Although the preposition is literally 'upon/on,' with a manger or feeding
    place English idiom prefers 'at' to express location beside or at the place of
    feeding.
- source_word: אֲבוּסֶךָ
  chosen: your feeding trough
  alternatives:
  - your manger
  - your crib
  - your stall
  lexicon: HALOT
  rationale: אֲבוּס denotes a manger or feeding place for animals. 'Feeding trough'
    is clear, concrete, and avoids archaic associations of 'crib' while preserving
    the domestic-animal setting.
