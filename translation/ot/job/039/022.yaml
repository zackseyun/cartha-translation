id: JOB.39.22
reference: Job 39:22
source:
  edition: WLC
  text: יִשְׂחַ֣ק לְ֭/פַחַד וְ/לֹ֣א יֵחָ֑ת וְ/לֹֽא יָ֝שׁ֗וּב מִ/פְּנֵי חָֽרֶב־־׃
translation:
  text: He laughs at fear and is not dismayed, and he does not turn back from the
    sword.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'He mocks fear.' The Hebrew verb can carry a nuance of derision as well
      as laughter.
    reason: lexical_alternative
  - marker: b
    text: Or 'he does not retreat from the sword.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יִשְׂחַק
  chosen: laughs
  alternatives:
  - mocks
  - scorns
  lexicon: HALOT
  rationale: The Qal imperfect of שׂחק here describes the horse's fearless, almost
    contemptuous response in battle imagery. 'Laughs' is the most direct rendering
    and preserves the vivid metaphor; 'mocks' or 'scorns' are interpretive expansions
    better left as alternatives.
- source_word: לְפַחַד
  chosen: at fear
  alternatives:
  - at dread
  - at terror
  lexicon: HALOT
  rationale: פחד denotes fear, dread, or terror. 'At fear' keeps the concise Hebrew
    construction with ל and works idiomatically in English after 'laughs.' 'Dread'
    and 'terror' are possible but slightly more intensified than necessary.
- source_word: יֵחָת
  chosen: is dismayed
  alternatives:
  - is shattered
  - is terrified
  lexicon: HALOT
  rationale: The Niphal of חתת commonly conveys being broken, dismayed, or terrified.
    In this context of courage in battle, 'is dismayed' best captures the psychological
    sense without over-literalizing the metaphor of being broken.
- source_word: יָשׁוּב
  chosen: turn back
  alternatives:
  - retreat
  - return
  lexicon: HALOT
  rationale: שׁוב literally means 'turn back/return.' In military context 'retreat'
    is a natural sense, but 'turn back' preserves the Hebrew wording while still reading
    clearly.
- source_word: מִפְּנֵי
  chosen: from
  alternatives:
  - before
  - because of
  lexicon: HALOT
  rationale: The idiom מִפְּנֵי can mean 'from before,' 'before,' or 'because of.'
    Here with hostile threat it indicates withdrawal in the face of something, so
    'from' in 'turn back from' is the most natural English equivalent.
- source_word: חָרֶב
  chosen: the sword
  alternatives:
  - a sword
  lexicon: HALOT
  rationale: חרב is singular 'sword,' often a collective or representative image for
    battle weaponry. 'The sword' fits English idiom for warfare and preserves the
    generic force of the Hebrew singular.
