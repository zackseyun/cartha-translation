id: JOB.39.12
reference: Job 39:12
source:
  edition: WLC
  text: הֲ/תַאֲמִ֣ין בּ֭/וֹ כִּי ישוב זַרְעֶ֑/ךָ וְֽ/גָרְנְ/ךָ֥ יֶאֱסֹֽף־׃
translation:
  text: Will you trust him that he will bring back your seed and gather it to your
    threshing floor?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'your seed'; in context this likely refers to harvested grain or
      produce brought back from the field.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲתַאֲמִין
  chosen: Will you trust
  alternatives:
  - Will you believe
  - Can you rely on
  lexicon: HALOT
  rationale: Hiphil of אמן here asks whether Job can place confidence in the wild
    ox. 'Trust' fits the practical sense of reliance in context better than the more
    cognitive 'believe.'
- source_word: בּוֹ
  chosen: him
  alternatives:
  - it
  lexicon: HALOT
  rationale: The suffix is masculine singular referring back to the wild ox. English
    may use either 'him' or 'it' for an animal; 'him' preserves the personal force
    of the Hebrew masculine reference in this taunt-like question.
- source_word: כִּי
  chosen: that
  alternatives:
  - because
  - for
  lexicon: HALOT
  rationale: 'Here כִּי introduces the content of what is being trusted: that the
    animal will do the following actions. ''That'' is the most natural English connector.'
- source_word: יָשׁוּב
  chosen: will bring back
  alternatives:
  - will return
  - will bring home
  lexicon: HALOT
  rationale: 'שׁוּב commonly means ''return,'' but with ''your seed'' as object the
    sense is causative/resultative in English: bringing the sown produce back from
    the field. ''Bring back'' communicates the agricultural context more clearly than
    a bare ''return.'''
- source_word: זַרְעֶךָ
  chosen: your seed
  alternatives:
  - your grain
  - your produce
  lexicon: HALOT
  rationale: The Hebrew literally says 'your seed.' In this farming context it can
    refer metonymically to sown grain/produce, but retaining 'seed' preserves the
    lexical form while remaining intelligible.
- source_word: גָּרְנְךָ
  chosen: your threshing floor
  alternatives:
  - your barn
  - your granary
  lexicon: HALOT
  rationale: גֹּרֶן is specifically a threshing floor, not a storage building. The
    more precise agricultural term should be preserved.
- source_word: יֶאֱסֹף
  chosen: gather it to
  alternatives:
  - collect
  - bring together at
  lexicon: HALOT
  rationale: אָסַף means gather/collect. English requires an object; 'it' refers back
    to the produce implied by 'your seed.' Adding 'to' makes the relation to 'your
    threshing floor' idiomatic.
