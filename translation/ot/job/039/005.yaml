id: JOB.39.5
reference: Job 39:5
source:
  edition: WLC
  text: מִֽי שִׁלַּ֣ח פֶּ֣רֶא חָפְשִׁ֑י וּ/מֹסְר֥וֹת עָ֝ר֗וֹד מִ֣י פִתֵּֽחַ־׃
translation:
  text: Who has let the wild donkey go free? Who has untied the bonds of the swift
    donkey?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Who has loosed the bonds of the wild donkey?' The Hebrew עָרוֹד may
      be understood more generally as another term for a wild donkey; some render
      it 'onager.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִי
  chosen: Who
  lexicon: HALOT
  rationale: Interrogative pronoun introducing the rhetorical question from God; straightforwardly
    rendered as 'Who.'
- source_word: שִׁלַּח
  chosen: has let ... go
  alternatives:
  - has sent out
  - has released
  lexicon: HALOT
  rationale: The piel/perfect of שלח here carries the sense of releasing or sending
    away into freedom. In idiomatic English with חָפְשִׁי, 'has let ... go free' best
    captures the action.
- source_word: פֶּרֶא
  chosen: wild donkey
  alternatives:
  - wild ass
  lexicon: HALOT
  rationale: Refers specifically to the wild donkey. 'Wild donkey' is clear modern
    English; 'wild ass' is traditional but potentially distracting in contemporary
    usage.
- source_word: חָפְשִׁי
  chosen: free
  alternatives:
  - freely
  - at liberty
  lexicon: HALOT
  rationale: Adjectival complement describing the released state of the wild donkey.
    'Go free' is natural English and preserves the sense.
- source_word: וּמֹסְרוֹת
  chosen: the bonds
  alternatives:
  - the bands
  - the fetters
  lexicon: HALOT
  rationale: Plural noun for restraints or bonds. 'Bonds' is natural and sufficiently
    concrete without becoming archaic.
- source_word: עָרוֹד
  chosen: the swift donkey
  alternatives:
  - the wild donkey
  - the onager
  lexicon: HALOT
  rationale: This term denotes a wild ass/donkey, likely emphasizing a particular
    kind or characteristic. To avoid flattening it into an exact repetition of פֶּרֶא
    while keeping readable English, 'the swift donkey' reflects the probable nuance
    often associated with the term in context of untamed speed and freedom. The more
    generic 'wild donkey' remains a viable alternative.
- source_word: פִתֵּחַ
  chosen: has untied
  alternatives:
  - has loosed
  - has opened
  lexicon: HALOT
  rationale: In context with 'bonds,' the verb means to loosen or untie restraints.
    'Untied' is idiomatic and clear in modern English.
