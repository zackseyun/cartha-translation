id: JOB.39.28
reference: Job 39:28
source:
  edition: WLC
  text: סֶ֣לַע יִ֭שְׁכֹּן וְ/יִתְלֹנָ֑ן עַֽל שֶׁן סֶ֝֗לַע וּ/מְצוּדָֽה־־׃
translation:
  text: He dwells on the cliff and spends the night there, on the tooth of the crag
    and the stronghold.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and lodges there' or 'and stays overnight there.'
    reason: lexical_alternative
  - marker: b
    text: Literally, 'on the tooth of the crag,' a Hebrew image for a sharp rocky
      projection or peak.
    reason: cultural_note
  - marker: c
    text: Or 'fortress.'
    reason: lexical_alternative
lexical_decisions:
- source_word: סֶלַע
  chosen: cliff
  alternatives:
  - rock
  - crag
  lexicon: HALOT
  rationale: Here סֶלַע denotes a rocky height or cliff-face suitable for an eagle's
    nesting place. 'Cliff' communicates the habitat naturally in English, while avoiding
    repetition with the later occurrence where a different English gloss helps reflect
    the poetic parallelism.
- source_word: יִשְׁכֹּן
  chosen: dwells
  alternatives:
  - lives
  - settles
  - resides
  lexicon: HALOT
  rationale: The verb שׁכן commonly means to dwell or reside. 'Dwells' preserves the
    stative sense and fits the elevated poetic register without sounding archaic.
- source_word: וְיִתְלֹנָן
  chosen: and spends the night there
  alternatives:
  - and lodges
  - and stays overnight
  lexicon: HALOT
  rationale: From לון/לין in the Hitpolel/related reflexive form, the sense is to
    lodge or remain overnight. 'Spends the night there' makes the temporal nuance
    explicit and reads naturally in modern English. 'There' is supplied idiomatically
    from the context of the dwelling place.
- source_word: עַל
  chosen: 'on'
  alternatives:
  - upon
  lexicon: HALOT
  rationale: The preposition straightforwardly indicates location. 'On' is the natural
    modern equivalent.
- source_word: שֶׁן סֶלַע
  chosen: the tooth of the crag
  alternatives:
  - the crag's tooth
  - the jagged edge of the rock
  - the peak of the crag
  lexicon: HALOT
  rationale: The construct phrase literally means 'tooth of rock/crag,' a vivid Hebrew
    image for a sharp rocky projection. Retaining 'tooth' preserves the metaphor and
    poetic concreteness better than flattening it to 'peak' or 'ledge'.
- source_word: סֶלַע
  chosen: crag
  alternatives:
  - rock
  - cliff
  lexicon: HALOT
  rationale: The second occurrence is rendered 'crag' to preserve the poetic texture
    and avoid awkward repetition of 'cliff ... rock.' It still reflects the same semantic
    field of steep rocky formation.
- source_word: וּמְצוּדָה
  chosen: and the stronghold
  alternatives:
  - and the fortress
  - and the mountain stronghold
  lexicon: HALOT
  rationale: מְצוּדָה can denote a stronghold or fortress, often a secure inaccessible
    place. In this animal-setting context it is metaphorical for a defensible rocky
    refuge. 'Stronghold' preserves both the literal lexical value and the poetic sense
    of security.
