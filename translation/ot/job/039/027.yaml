id: JOB.39.27
reference: Job 39:27
source:
  edition: WLC
  text: אִם עַל פִּ֭י/ךָ יַגְבִּ֣יהַּ נָ֑שֶׁר וְ֝/כִ֗י יָרִ֥ים קִנּֽ/וֹ־־׃
translation:
  text: Is it at your command that the eagle flies high and lifts up its nest?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “soars” for “flies high.”
    reason: lexical_alternative
  - marker: b
    text: Hebrew literally, “upon your mouth,” an idiom meaning “at your command”
      or “according to your word.”
    reason: lexical_alternative
  - marker: c
    text: “Eagle” may also be understood more broadly as a large bird of prey, possibly
      including a vulture in some contexts.
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  chosen: Is it
  alternatives:
  - Does
  lexicon: HALOT
  rationale: Introduces an interrogative clause in context, not a simple conditional
    'if.' English idiom requires an interrogative opening.
- source_word: עַל פִּיךָ
  chosen: at your command
  alternatives:
  - by your mouth
  - according to your word
  lexicon: HALOT
  rationale: Literally 'upon your mouth,' an idiom meaning according to one's command
    or order. 'At your command' is natural English and preserves the sense of authority.
- source_word: יַגְבִּיהַּ
  chosen: flies high
  alternatives:
  - soars
  - makes itself high
  - mounts up
  lexicon: HALOT
  rationale: Hiphil of גבה conveys rising high or making high. With 'eagle' as subject,
    English naturally expresses this as flying/soaring high. 'Flies high' keeps the
    elevation idea without over-poetic expansion.
- source_word: נָשֶׁר
  chosen: eagle
  alternatives:
  - vulture
  lexicon: HALOT
  rationale: Traditional and contextually fitting rendering. While the Hebrew term
    can overlap with large birds of prey, 'eagle' is the standard gloss in this poetic
    context and aligns with the bird's lofty nesting imagery.
- source_word: וְכִי
  chosen: and
  alternatives:
  - and indeed
  - that
  lexicon: HALOT
  rationale: Here it links the second verbal clause to the first within the same rhetorical
    question. A simple 'and' best reflects the coordination in smooth English.
- source_word: יָרִים
  chosen: lifts up
  alternatives:
  - raises
  - sets high
  lexicon: HALOT
  rationale: The verb means to raise or lift. 'Lifts up' preserves the imagery of
    elevating the nest's placement.
- source_word: קִנּוֹ
  chosen: its nest
  alternatives:
  - his nest
  lexicon: HALOT
  rationale: The suffix is grammatically masculine singular referring to the eagle.
    English commonly uses 'its' for an animal in generic description.
