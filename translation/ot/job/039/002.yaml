id: JOB.39.2
reference: Job 39:2
source:
  edition: WLC
  text: תִּסְפֹּ֣ר יְרָחִ֣ים תְּמַלֶּ֑אנָה וְ֝/יָדַ֗עְתָּ עֵ֣ת לִדְתָּֽ/נָה׃
translation:
  text: Do you count the months they fulfill, and do you know the time when they give
    birth?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, 'Do you count the months until they are completed?'
      The Hebrew uses an active verb, literally 'they fulfill [the months],' referring
      to the completion of gestation.
    reason: lexical_alternative
lexical_decisions:
- source_word: תִּסְפֹּר
  chosen: Do you count
  alternatives:
  - Can you count
  - Will you count
  lexicon: HALOT
  rationale: Qal imperfect 2ms of ספר in a rhetorical question context. English present
    'Do you count' fits the divine interrogation and natural English better than a
    simple future.
- source_word: יְרָחִים
  chosen: the months
  alternatives:
  - months
  - lunar months
  lexicon: HALOT
  rationale: The noun means 'months'; adding the article in English is natural with
    the following clause about gestation. 'Lunar months' is overly explicit for the
    context.
- source_word: תְּמַלֶּאנָה
  chosen: they fulfill
  alternatives:
  - they complete
  - are completed
  - come to fullness
  lexicon: HALOT
  rationale: Piel imperfect 3fp of מלא with feminine plural subject referring to the
    animals previously mentioned. The sense is that the months reach their full term.
    'They fulfill' preserves the active Hebrew form, though the idiomatic sense is
    completion of gestation.
- source_word: וְיָדַעְתָּ
  chosen: and do you know
  alternatives:
  - or do you know
  - and have you known
  lexicon: HALOT
  rationale: 'Qal perfect 2ms with prefixed conjunction in a rhetorical sequence.
    Rendered as a present interrogative in English to match the discourse flow: ''and
    do you know''.'
- source_word: עֵת
  chosen: the time
  alternatives:
  - the season
  - the appointed time
  lexicon: HALOT
  rationale: עת commonly denotes a time or appointed time. 'The time' is the most
    natural and sufficiently precise here; 'appointed time' is possible but slightly
    interpretive.
- source_word: לִדְתָּנָה
  chosen: when they give birth
  alternatives:
  - of their bearing
  - for their giving birth
  - when they bear young
  lexicon: HALOT
  rationale: Infinitive construct of ילד with 3fp suffix, referring to the females'
    birthing. Rendering as a temporal clause is idiomatic English and captures the
    sense clearly.
