id: JOB.39.1
reference: Job 39:1
source:
  edition: WLC
  text: הֲ/יָדַ֗עְתָּ עֵ֭ת לֶ֣דֶת יַעֲלֵי סָ֑לַע חֹלֵ֖ל אַיָּל֣וֹת תִּשְׁמֹֽר־׃
translation:
  text: Do you know the time when the mountain goats give birth? Do you watch over
    the deer in labor?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the wild goats of the rock'; the Hebrew refers to mountain-dwelling
      wild goats, possibly ibexes.
    reason: lexical_alternative
  - marker: b
    text: Or 'the does' or 'the hinds.'
    reason: lexical_alternative
  - marker: c
    text: The verb can also mean 'observe' or 'keep watch over.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲיָדַעְתָּ
  chosen: Do you know
  alternatives:
  - Have you known
  - Do you know?
  lexicon: HALOT
  rationale: Interrogative הֲ with Qal perfect 2ms of ידע functions naturally as a
    rhetorical question in English. Present 'Do you know' best conveys the force in
    context.
- source_word: עֵת
  chosen: the time
  alternatives:
  - the season
  - the moment
  lexicon: HALOT
  rationale: עֵת commonly denotes a time or season. 'The time' fits the immediate
    reference to the birthing period without over-specifying.
- source_word: לֶדֶת
  chosen: when ... give birth
  alternatives:
  - for bearing
  - to give birth
  lexicon: HALOT
  rationale: 'The infinitive construct of ילד after עֵת is idiomatically rendered
    with a temporal clause in English: ''the time when ... give birth.'''
- source_word: יַעֲלֵי סָלַע
  chosen: the mountain goats
  alternatives:
  - the wild goats of the rock
  - the ibexes
  lexicon: HALOT
  rationale: Literally 'goats of the rock,' referring to wild mountain goats/ibex.
    'Mountain goats' is clear modern English and preserves the sense without unnecessary
    zoological precision.
- source_word: חֹלֵל
  chosen: in labor
  alternatives:
  - writhe
  - calve
  - bring forth
  lexicon: HALOT
  rationale: From חול in a labor/birthing sense, referring to the writhing or travail
    associated with giving birth. In this clause, 'in labor' communicates the state
    naturally in English.
- source_word: אַיָּלוֹת
  chosen: the deer
  alternatives:
  - the does
  - the hinds
  lexicon: HALOT
  rationale: The term denotes female deer. 'Deer' is readable modern English; 'does'
    is possible but slightly less natural here, while 'hinds' is archaic.
- source_word: תִּשְׁמֹר
  chosen: Do you watch over
  alternatives:
  - Do you observe
  - Do you keep watch over
  lexicon: HALOT
  rationale: שׁמר can mean keep, watch, observe. In context of God's knowledge of
    animal gestation and birth, 'watch over' captures attentive oversight better than
    mere visual observation.
