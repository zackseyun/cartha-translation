id: JOB.39.8
reference: Job 39:8
source:
  edition: WLC
  text: יְת֣וּר הָרִ֣ים מִרְעֵ֑/הוּ וְ/אַחַ֖ר כָּל יָר֣וֹק יִדְרֽוֹשׁ־׃
translation:
  text: He explores the mountains for his pasture, and he searches after every green
    thing.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'ranges over the mountains for his grazing place.'
    reason: lexical_alternative
  - marker: b
    text: '''Every green thing'' refers to fresh green vegetation or growth.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְתוּר
  chosen: explores
  alternatives:
  - searches out
  - ranges over
  - spies out
  lexicon: HALOT
  rationale: The verb תור in the Qal commonly conveys exploring, scouting, or ranging
    about. 'Explores' fits the animal's free roaming in context better than a more
    static 'seeks,' while remaining natural English.
- source_word: הָרִים
  chosen: the mountains
  alternatives:
  - mountains
  - the hills
  lexicon: HALOT
  rationale: The noun straightforwardly means 'mountains.' The article is present
    in Hebrew, so 'the mountains' is retained in English as a natural equivalent.
- source_word: מִרְעֵהוּ
  chosen: his pasture
  alternatives:
  - his grazing place
  - his fodder
  - his pastureland
  lexicon: HALOT
  rationale: מִרְעֶה denotes pasture or grazing place, with the 3ms suffix referring
    to the wild donkey's own place of feeding. 'His pasture' is concise and idiomatic,
    preserving the possessive suffix.
- source_word: וְאַחַר
  chosen: and ... after
  alternatives:
  - and for
  - and following
  lexicon: HALOT
  rationale: 'אַחַר with the following verb gives the sense of pursuit: ''after.''
    Keeping ''after'' in English preserves the directional nuance of seeking what
    follows or lies beyond.'
- source_word: כָּל
  chosen: every
  alternatives:
  - all
  - any
  lexicon: HALOT
  rationale: כָּל here distributively modifies יָרוֹק. 'Every' best captures the sense
    of searching for any and all green growth.
- source_word: יָרוֹק
  chosen: green thing
  alternatives:
  - green plant
  - green growth
  - green vegetation
  lexicon: HALOT
  rationale: The noun/adjective denotes what is green, especially fresh vegetation.
    'Green thing' is a fairly literal rendering and matches the broad, non-technical
    sense of available greenery.
- source_word: יִדְרֹשׁ
  chosen: he searches
  alternatives:
  - he seeks
  - he looks for
  - he inquires after
  lexicon: HALOT
  rationale: דרשׁ in the Qal often means seek or search for. In this animal-feeding
    context, 'searches' communicates active foraging better than the more abstract
    'inquires.'
