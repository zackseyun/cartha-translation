id: JOB.39.17
reference: Job 39:17
source:
  edition: WLC
  text: כִּֽי הִשָּׁ֣/הּ אֱל֣וֹהַּ חָכְמָ֑ה וְ/לֹא חָ֥לַק לָ֝֗/הּ בַּ/בִּינָֽה־־׃
translation:
  text: because God has deprived her of wisdom and has not given her a share in understanding.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'because God has made her forget wisdom' or 'because God has caused wisdom
      to be lacking to her.'
    reason: lexical_alternative
  - marker: b
    text: Literally, 'has not apportioned to her in understanding,' that is, has not
      given her a share in understanding.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  lexicon: HALOT
  rationale: Introduces the reason for the ostrich's behavior in the surrounding context.
    'Because' is clearer in modern English than the more formal 'for' while preserving
    the causal force.
- source_word: הִשָּׁהּ
  chosen: has deprived her of
  alternatives:
  - has made her forget
  - has caused her to lack
  lexicon: HALOT
  rationale: From נשה in the Hiphil with 3fs suffix, here conveying that God has caused
    wisdom to be absent from her. 'Has deprived her of' best captures the causative
    sense in idiomatic English without implying mere forgetfulness.
- source_word: אֱלוֹהַּ
  chosen: God
  alternatives:
  - God Almighty
  lexicon: HALOT
  rationale: Standard rendering of the singular divine title אֱלוֹהַּ in Job. No contextual
    reason here to expand beyond 'God'.
- source_word: חָכְמָה
  chosen: wisdom
  alternatives:
  - skill
  lexicon: HALOT
  rationale: The noun denotes wisdom in the broad sense of sound judgment or instinctive
    capacity. 'Wisdom' is the most direct and contextually fitting rendering.
- source_word: וְלֹא
  chosen: and has not
  alternatives:
  - nor has
  lexicon: HALOT
  rationale: Coordinates the second clause with straightforward negation. 'And has
    not' reads naturally in English and preserves the Hebrew conjunction plus negation.
- source_word: חָלַק לָהּ
  chosen: has not given her a share in
  alternatives:
  - has not apportioned to her
  - has not granted her
  lexicon: HALOT
  rationale: The verb חלק fundamentally means to divide or apportion. With the indirect
    object and following noun, the sense is that God has not allotted understanding
    to her. 'Given her a share in' preserves the distributive nuance better than a
    simple 'given'.
- source_word: בַּבִּינָה
  chosen: understanding
  alternatives:
  - discernment
  - insight
  lexicon: HALOT
  rationale: בינה commonly denotes understanding or discernment. 'Understanding' pairs
    well with 'wisdom' and preserves the semantic distinction without overcomplicating
    the line.
