theological_decisions:
- issue: Agency of God in the ostrich's lack of wisdom
  chosen_reading: The verse is rendered with God as the explicit subject who has deprived
    and not allotted wisdom/understanding.
  alternative_readings:
  - A softer paraphrase minimizing divine agency, such as 'she lacks wisdom'
  rationale: The Hebrew explicitly names אֱלוֹהַּ as subject of both verbs. The translation
    preserves the text's direct attribution without attempting to soften the theological
    tension.
  doctrine_reference: Preserve theological tension rather than resolve it.
