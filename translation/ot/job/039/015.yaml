id: JOB.39.15
reference: Job 39:15
source:
  edition: WLC
  text: וַ֭/תִּשְׁכַּח כִּי רֶ֣גֶל תְּזוּרֶ֑/הָ וְ/חַיַּ֖ת הַ/שָּׂדֶ֣ה תְּדוּשֶֽׁ/הָ־׃
translation:
  text: and she forgets that a foot may crush them, and a wild animal may trample
    them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'a foot may crush her/it ... a wild animal may trample her/it';
      the feminine singular suffix likely refers collectively to the eggs or young
      left behind.
    reason: lexical_alternative
  - marker: b
    text: Or 'the beast of the field,' a more formal rendering of the Hebrew expression
      for a wild land animal.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתִּשְׁכַּח
  chosen: and she forgets
  alternatives:
  - and she has forgotten
  - so that she forgets
  lexicon: HALOT
  rationale: Qal wayyiqtol 3fs from שׁכח, continuing the description of the ostrich
    in vivid present-like narrative. English present fits the discourse flow in this
    poetic section better than a simple past.
- source_word: כִּי
  chosen: that
  alternatives:
  - for
  - because
  lexicon: HALOT
  rationale: Here כִּי introduces the content of what is forgotten rather than a causal
    clause, so 'that' is the most natural English rendering.
- source_word: רֶגֶל
  chosen: a foot
  alternatives:
  - the foot
  - a step
  lexicon: HALOT
  rationale: 'The singular noun is indefinite in sense: any foot could do this. ''A
    foot'' preserves the concrete imagery.'
- source_word: תְּזוּרֶהָ
  chosen: may crush them
  alternatives:
  - may press them
  - may scatter them
  lexicon: HALOT
  rationale: From זוּר/זור in this context the sense is damage done by treading with
    the foot. 'Crush' best conveys the likely result for the eggs/young in context.
    The 3fs suffix refers back collectively to what she has left behind, rendered
    'them' in idiomatic English.
- source_word: וְחַיַּת הַשָּׂדֶה
  chosen: and a wild animal
  alternatives:
  - and the beast of the field
  - and a beast of the open country
  lexicon: HALOT
  rationale: The construct phrase literally means 'animal of the field.' 'Wild animal'
    is clear modern English and preserves the sense without archaic diction.
- source_word: תְּדוּשֶׁהָ
  chosen: may trample them
  alternatives:
  - may tread them down
  - may thresh them
  lexicon: HALOT
  rationale: From דושׁ, 'trample/tread.' 'Trample' is the most natural English equivalent
    here and parallels the previous clause. The suffix is again rendered collectively
    as 'them' for the eggs/young.
