id: JOB.39.14
reference: Job 39:14
source:
  edition: WLC
  text: כִּֽי תַעֲזֹ֣ב לָ/אָ֣רֶץ בֵּצֶ֑י/הָ וְֽ/עַל עָפָ֥ר תְּחַמֵּֽם־־׃
translation:
  text: For she leaves her eggs to the earth and warms them on the dust,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'abandons her eggs to the earth.' The Hebrew verb can carry a stronger
      sense than simply 'leaves,' but the following line suggests exposure on the
      ground rather than absolute desertion.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Because
  lexicon: HALOT
  rationale: Introduces the explanation for the preceding description of the ostrich.
    'For' fits the discourse flow in English while preserving the causal/explanatory
    force.
- source_word: תַעֲזֹב
  chosen: leaves
  alternatives:
  - abandons
  - forsakes
  lexicon: HALOT
  rationale: The verb עזב commonly means 'leave, forsake, abandon.' In this zoological
    context, 'leaves' is the most natural English rendering and avoids overstating
    the sense as total neglect, which the following clause qualifies.
- source_word: לָאָרֶץ
  chosen: to the earth
  alternatives:
  - on the ground
  - to the ground
  lexicon: HALOT
  rationale: The Hebrew is literally 'to the earth.' This preserves the concrete imagery;
    English readers can understand it naturally, and it pairs well with the next phrase
    'on the dust.'
- source_word: בֵּצֶיהָ
  chosen: her eggs
  lexicon: HALOT
  rationale: Straightforward rendering of the plural noun with 3fs suffix, referring
    to the female ostrich in context.
- source_word: וְעַל עָפָר
  chosen: on the dust
  alternatives:
  - upon the dust
  - in the dust
  lexicon: HALOT
  rationale: Literal rendering of the prepositional phrase. 'Dust' is preferable to
    'dirt' for biblical register and to preserve the poetic texture.
- source_word: תְּחַמֵּם
  chosen: warms them
  alternatives:
  - keeps them warm
  - incubates them
  lexicon: HALOT
  rationale: From חמם in the Piel, 'to make warm.' 'Warms them' is a direct and readable
    rendering. 'Incubates them' is interpretive and more technical than the Hebrew
    requires; the object 'them' is implied from 'her eggs' and is natural in English.
