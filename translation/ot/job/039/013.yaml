id: JOB.39.13
reference: Job 39:13
source:
  edition: WLC
  text: כְּנַף רְנָנִ֥ים נֶעֱלָ֑סָה אִם אֶ֝בְרָ֗ה חֲסִידָ֥ה וְ/נֹצָֽה־־׃
translation:
  text: The wings of the ostrich flap joyfully—are they the pinions and plumage of
    the stork?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'The wing of the ostrich beats proudly, but is it the pinion and plumage
      of the stork?' The Hebrew is difficult and has been understood in several ways.
    reason: alternative_reading
lexical_decisions:
- source_word: כְּנַף
  chosen: wings
  alternatives:
  - wing
  lexicon: HALOT
  rationale: Singular collective in Hebrew is naturally rendered as the plural 'wings'
    in English to match the paired anatomy in context.
- source_word: רְנָנִים
  chosen: of the ostrich
  alternatives:
  - of the crying ones
  - of the female ostriches
  lexicon: HALOT
  rationale: In this context within the animal speeches, the noun refers to the ostrich,
    a standard lexical sense for this form in Job 39. The zoological reference fits
    the surrounding verses about the ostrich.
- source_word: נֶעֱלָסָה
  chosen: flap joyfully
  alternatives:
  - wave proudly
  - rejoice
  - exult
  lexicon: HALOT
  rationale: The verb conveys exuberant movement or exultation. Because it modifies
    wings, 'flap joyfully' captures both the physical action and the lively nuance
    better than a purely abstract verb.
- source_word: אִם
  chosen: are they
  alternatives:
  - or
  - indeed
  - whether
  lexicon: HALOT
  rationale: Here אִם introduces a rhetorical comparison/question. Rendering it as
    'are they' makes good English sense of the elliptical Hebrew and preserves the
    interrogative force.
- source_word: אֶבְרָה
  chosen: pinions
  alternatives:
  - feathers
  - wing
  lexicon: HALOT
  rationale: The term denotes wing-feathers or pinions rather than the whole wing.
    'Pinions' preserves the more specific anatomical sense.
- source_word: חֲסִידָה
  chosen: the stork
  alternatives:
  - stork
  lexicon: HALOT
  rationale: This is the bird name 'stork,' not the adjective 'faithful/kind.' The
    zoological sense is demanded by the parallel with 'pinions and plumage.'
- source_word: וְנֹצָה
  chosen: and plumage
  alternatives:
  - and feathers
  - and down
  lexicon: HALOT
  rationale: The noun refers to feathers/plumage. 'Plumage' fits the poetic register
    and pairs well with 'pinions'.
