id: JOB.39.20
reference: Job 39:20
source:
  edition: WLC
  text: הְֽ֭/תַרְעִישֶׁ/נּוּ כָּ/אַרְבֶּ֑ה ה֖וֹד נַחְר֣/וֹ אֵימָֽה׃
translation:
  text: Can you make him leap like the locust? The majesty of his snorting is terrifying.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Can you make him thunder like the locust?' The Hebrew verb can suggest
      causing to shake, quake, or move violently; some take the image to emphasize
      sound as well as motion.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲתַרְעִישֶׁנּוּ
  chosen: Can you make him leap
  alternatives:
  - Can you make him thunder
  - Can you make him shake
  - Do you cause him to spring
  lexicon: HALOT
  rationale: Hiphil of רעשׁ can denote causing to quake, shake, or move violently.
    In this context of the war horse, paired with 'like the locust,' the sense is
    best captured as causing it to spring or leap forward rather than literal noise-making.
    The interrogative is retained with 'Can you...?' as part of the divine speech.
- source_word: כָּאַרְבֶּה
  chosen: like the locust
  alternatives:
  - like a locust
  lexicon: HALOT
  rationale: The comparison is singular/collective; English idiom naturally uses 'the
    locust' for the species. The simile evokes sudden, vigorous leaping motion.
- source_word: הוֹד
  chosen: The majesty
  alternatives:
  - The splendor
  - The glory
  lexicon: HALOT
  rationale: הוֹד commonly denotes majesty, splendor, or stately magnificence. 'Majesty'
    fits the elevated poetic register and the horse's imposing bearing.
- source_word: נַחְרוֹ
  chosen: of his snorting
  alternatives:
  - of his nostrils
  - of his neighing
  lexicon: HALOT
  rationale: From a noun related to snorting/snorting breath through the nostrils.
    'Snorting' best fits the horse imagery and the immediate poetic effect. 'Neighing'
    is less lexically precise here.
- source_word: אֵימָה
  chosen: is terrifying
  alternatives:
  - is terror
  - is dreadful
  lexicon: HALOT
  rationale: The noun means terror, dread, or fright. Rendering it predicatively as
    'is terrifying' produces natural English while preserving the force of the Hebrew
    nominal clause.
