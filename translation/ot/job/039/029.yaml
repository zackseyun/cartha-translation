id: JOB.39.29
reference: Job 39:29
source:
  edition: WLC
  text: מִ/שָּׁ֥ם חָֽפַר אֹ֑כֶל לְ֝/מֵ/רָח֗וֹק עֵינָ֥י/ו יַבִּֽיטוּ־׃
translation:
  text: From there he searches out food; his eyes look from far away.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his eyes see it from afar.' The Hebrew could be rendered more dynamically
      to emphasize spotting prey at a distance.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִשָּׁם
  chosen: From there
  alternatives:
  - From that place
  lexicon: HALOT
  rationale: Locative adverb with prefixed preposition, indicating the vantage point
    from which the eagle acts. 'From there' is natural and sufficiently literal.
- source_word: חָפַר
  chosen: searches out
  alternatives:
  - digs for
  - seeks out
  - spies out
  lexicon: HALOT
  rationale: Although the verb commonly means 'dig,' in this context with 'food' and
    the eagle's behavior it is idiomatic for seeking out prey/food. 'Searches out'
    preserves the active, investigative sense without forcing a literal 'dig' that
    would misfit the image.
- source_word: אֹכֶל
  chosen: food
  alternatives:
  - prey
  lexicon: HALOT
  rationale: The noun broadly means 'food.' In context it refers to what the bird
    eats, and could be rendered 'prey,' but 'food' stays closer to the Hebrew while
    remaining clear.
- source_word: לְמֵרָחוֹק
  chosen: from far away
  alternatives:
  - afar
  - into the distance
  - from a distance
  lexicon: HALOT
  rationale: The phrase marks great distance. Because the following verb is 'look,'
    English idiom is best with 'from far away' or 'from a distance.' The chosen rendering
    is vivid and natural.
- source_word: עֵינָיו
  chosen: his eyes
  lexicon: HALOT
  rationale: Plural noun with 3ms suffix, referring to the eagle in the singular.
    Retained explicitly for the concrete imagery.
- source_word: יַבִּיטוּ
  chosen: look
  alternatives:
  - see
  - gaze
  - watch
  lexicon: HALOT
  rationale: Hiphil of נבט conveys directed looking. 'Look' is the most straightforward
    rendering; the plural verb agrees with 'his eyes' in Hebrew.
