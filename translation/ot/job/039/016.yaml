id: JOB.39.16
reference: Job 39:16
source:
  edition: WLC
  text: הִקְשִׁ֣יחַ בָּנֶ֣י/הָ לְּ/לֹא לָ֑/הּ לְ/רִ֖יק יְגִיעָ֣/הּ בְּלִי פָֽחַד־־׃
translation:
  text: She treats her young harshly, as if they were not hers; her labor is in vain,
    without fear.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'She hardens her children against herself, as though
      not hers.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הִקְשִׁיחַ
  chosen: treats ... harshly
  alternatives:
  - hardens against
  - deals harshly with
  lexicon: HALOT
  rationale: Hiphil of קשׁח conveys making hard or acting harshly. In context of the
    ostrich's behavior toward her offspring, idiomatic English is best expressed as
    'treats ... harshly' rather than the more wooden 'hardens against.'
- source_word: בָּנֶיהָ
  chosen: her young
  alternatives:
  - her sons
  - her children
  lexicon: HALOT
  rationale: Though literally 'her sons/children,' in animal context English 'her
    young' is the natural equivalent and preserves the zoological sense.
- source_word: לְלֹא לָהּ
  chosen: as if they were not hers
  alternatives:
  - as not hers
  - to not belong to her
  lexicon: HALOT
  rationale: The phrase literally means 'as not to her / as not hers.' English requires
    expansion for clarity. 'As if they were not hers' captures the comparative force
    and maternal disowning implied by the Hebrew.
- source_word: לְרִיק
  chosen: in vain
  alternatives:
  - for nothing
  - to no purpose
  lexicon: HALOT
  rationale: Standard rendering for ריק in contexts of futile effort; concise and
    natural in English.
- source_word: יְגִיעָהּ
  chosen: her labor
  alternatives:
  - her toil
  - her effort
  lexicon: HALOT
  rationale: Refers to the exertion associated with producing or raising offspring.
    'Labor' fits the maternal context and pairs naturally with 'in vain.'
- source_word: בְּלִי פָחַד
  chosen: without fear
  alternatives:
  - without concern
  - without dread
  lexicon: HALOT
  rationale: Literally 'without fear.' In context it describes her lack of anxious
    concern over the apparent loss of her effort or offspring. The more literal wording
    is clear and preserves the terseness of the Hebrew.
