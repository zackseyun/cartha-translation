id: JOB.39.30
reference: Job 39:30
source:
  edition: WLC
  text: ו/אפרח/ו יְעַלְעוּ דָ֑ם וּ/בַ/אֲשֶׁ֥ר חֲ֝לָלִ֗ים שָׁ֣ם הֽוּא־׃פ
translation:
  text: Its young ones suck up blood, and where the slain are, there it is.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Its chicks lap up blood.' The Hebrew verb is vivid and may suggest sucking,
      gulping, or lapping.
    reason: lexical_alternative
  - marker: b
    text: Or 'where the corpses are, there it is.' The Hebrew says 'the slain,' emphasizing
      violent death.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶפְרֹחָיו
  chosen: its young ones
  alternatives:
  - its chicks
  - its fledglings
  lexicon: HALOT
  rationale: The noun refers to the offspring of the eagle/vulture in context. 'Young
    ones' is natural English and broad enough to cover nestlings/fledglings without
    over-specifying species behavior.
- source_word: יְעַלְעוּ
  chosen: suck up
  alternatives:
  - gulp down
  - swallow
  - lap up
  lexicon: HALOT
  rationale: The verb conveys eager sucking or gulping. 'Suck up' preserves the vivid,
    somewhat graphic image and fits the direct object 'blood' closely better than
    the more interpretive 'lap up'.
- source_word: דָם
  chosen: blood
  lexicon: HALOT
  rationale: Straightforward lexical sense; no contextual reason to soften or paraphrase.
- source_word: וּבַאֲשֶׁר
  chosen: and where
  alternatives:
  - and wherever
  - for where
  lexicon: HALOT
  rationale: Here the relative construction introduces a locative clause. 'And where'
    is the most direct and idiomatic rendering in English.
- source_word: חֲלָלִים
  chosen: the slain
  alternatives:
  - the pierced
  - the dead bodies
  - the corpses
  lexicon: HALOT
  rationale: The term commonly denotes those slain or fatally wounded. 'The slain'
    is concise, formal enough for poetry, and avoids over-materializing the image
    as mere corpses while retaining the violent sense.
- source_word: שָׁם הוּא
  chosen: there it is
  alternatives:
  - there he is
  - there it will be
  lexicon: HALOT
  rationale: The pronoun refers back to the bird described in the surrounding context.
    English idiom prefers 'it' for an animal in generic description. Present tense
    matches the Hebrew poetic description.
