id: JOB.39.7
reference: Job 39:7
source:
  edition: WLC
  text: יִ֭שְׂחַק לַ/הֲמ֣וֹן קִרְיָ֑ה תְּשֻׁא֥וֹת נ֝וֹגֵ֗שׂ לֹ֣א יִשְׁמָֽע׃
translation:
  text: He laughs at the tumult of the city; he does not hear the shouts of the driver.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the noise of the city.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the shouts of the taskmaster' or 'overseer.' The Hebrew term can refer
      more broadly to one who drives or exacts labor.
    reason: lexical_alternative
lexical_decisions:
- source_word: יִשְׂחַק
  chosen: he laughs
  alternatives:
  - he mocks
  - he scoffs at
  lexicon: HALOT
  rationale: Qal imperfect of שׂחק here expresses the wild donkey's dismissive reaction
    to urban noise. 'Laughs' is the most direct and idiomatic rendering; 'mocks' or
    'scoffs' are possible contextual expansions but slightly over-interpret the verb.
- source_word: לַהֲמוֹן
  chosen: at the tumult of
  alternatives:
  - at the noise of
  - at the din of
  lexicon: HALOT
  rationale: הָמוֹן commonly denotes noise, roar, or tumult. In construct with 'city,'
    it refers to the city's noisy commotion. 'Tumult' preserves both sound and bustle
    better than the flatter 'noise.'
- source_word: קִרְיָה
  chosen: the city
  alternatives:
  - a city
  - the town
  lexicon: HALOT
  rationale: קִרְיָה denotes a city or town. The definite sense in English is natural
    with the construct phrase 'the tumult of the city,' referring generically to settled
    urban life in contrast to the wild animal's freedom.
- source_word: תְּשֻׁאוֹת
  chosen: the shouts
  alternatives:
  - the cries
  - the shouting
  lexicon: HALOT
  rationale: Plural noun from a root associated with loud crying or shouting. 'Shouts'
    fits the plural concrete sense and pairs naturally with the following agent noun.
- source_word: נֹגֵשׂ
  chosen: the driver
  alternatives:
  - the taskmaster
  - the overseer
  lexicon: HALOT
  rationale: נֹגֵשׂ can denote one who drives, oppresses, or exacts labor. In this
    animal context, the sense is not a labor-exacting official in the abstract but
    one who drives beasts or imposes control. 'Driver' best fits the immediate imagery;
    'taskmaster' would import Exodus-like oppression language too strongly here.
- source_word: לֹא יִשְׁמָע
  chosen: he does not hear
  alternatives:
  - he does not listen to
  - he pays no attention to
  lexicon: HALOT
  rationale: The phrase straightforwardly means 'he does not hear.' While context
    implies disregard, the more literal 'hear' preserves the Hebrew wording without
    paraphrasing into psychological response.
