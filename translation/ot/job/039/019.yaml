id: JOB.39.19
reference: Job 39:19
source:
  edition: WLC
  text: הֲ/תִתֵּ֣ן לַ/סּ֣וּס גְּבוּרָ֑ה הֲ/תַלְבִּ֖ישׁ צַוָּאר֣/וֹ רַעְמָֽה׃
translation:
  text: Do you give the horse its strength? Do you clothe its neck with a mane?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly 'with thunder,' following an older interpretive tradition for
      רַעְמָה; here it is rendered 'mane' because the immediate image is of clothing
      the horse's neck.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲתִתֵּן
  chosen: Do you give
  alternatives:
  - Can you give
  - Will you give
  lexicon: HALOT
  rationale: Interrogative with second masculine singular imperfect of נתן introduces
    a rhetorical question addressed to Job. 'Do you give' is natural English and preserves
    the direct challenge better than a modal paraphrase.
- source_word: לַסּוּס
  chosen: the horse
  alternatives:
  - a horse
  lexicon: HALOT
  rationale: Definite article in Hebrew supports 'the horse.' In English this functions
    generically for the species, fitting the poetic description of the war horse.
- source_word: גְּבוּרָה
  chosen: strength
  alternatives:
  - might
  - power
  lexicon: HALOT
  rationale: גְּבוּרָה denotes strength, might, or valor. 'Strength' is the clearest
    modern English choice here and suits the physical vigor of the horse in context.
- source_word: הֲתַלְבִּישׁ
  chosen: Do you clothe
  alternatives:
  - Do you dress
  - Do you array
  lexicon: HALOT
  rationale: Hiphil of לבש means to clothe or dress. 'Clothe' preserves the metaphorical
    vividness of God adorning the horse's neck.
- source_word: צַוָּארוֹ
  chosen: its neck
  alternatives:
  - his neck
  lexicon: HALOT
  rationale: The suffix is masculine singular referring back to the horse. English
    idiom for an animal in generic description commonly uses 'its,' which avoids implying
    a specifically male horse where the Hebrew noun's grammatical gender does not
    require that nuance.
- source_word: רַעְמָה
  chosen: a mane
  alternatives:
  - flowing mane
  lexicon: HALOT
  rationale: The noun refers to the horse's mane. Some older translations render it
    'thunder,' but in this context the parallel with 'neck' and the imagery of adornment
    strongly favor 'mane' as the plain sense.
