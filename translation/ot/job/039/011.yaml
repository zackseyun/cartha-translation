id: JOB.39.11
reference: Job 39:11
source:
  edition: WLC
  text: הֲֽ/תִבְטַח בּ֭/וֹ כִּי רַ֣ב כֹּח֑/וֹ וְ/תַעֲזֹ֖ב אֵלָ֣י/ו יְגִיעֶֽ/ךָ־־׃
translation:
  text: Will you trust him because his strength is great, and leave your labor to
    him?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your toil'; the Hebrew term can refer either to labor itself or to what
      that labor produces.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲתִבְטַח
  chosen: Will you trust
  alternatives:
  - Will you rely on
  - Will you have confidence in
  lexicon: HALOT
  rationale: Qal imperfect 2ms of בטח in an interrogative clause. 'Trust' is the most
    natural English equivalent and fits the rhetorical question addressed to Job.
- source_word: בּוֹ
  chosen: him
  lexicon: HALOT
  rationale: Preposition ב + 3ms suffix referring to the wild ox in context. English
    idiom after 'trust' takes the object as 'him' rather than a more literal 'in him'
    here.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  - since
  lexicon: HALOT
  rationale: Introduces the ground for the proposed trust. 'Because' clearly conveys
    the causal sense in contemporary English.
- source_word: רַב כֹּחוֹ
  chosen: his strength is great
  alternatives:
  - his power is abundant
  - he is very strong
  lexicon: HALOT
  rationale: רַב functions adjectivally with כֹּחַ, expressing magnitude. 'Strength'
    fits the animal-labor context better than the more abstract 'power.'
- source_word: וְתַעֲזֹב
  chosen: and leave
  alternatives:
  - and entrust
  - and commit
  lexicon: HALOT
  rationale: Qal imperfect 2ms of עזב, literally 'leave, forsake.' In context of assigning
    work, 'leave' preserves the concrete sense while allowing the implied idea of
    entrusting work to the animal.
- source_word: אֵלָיו
  chosen: to him
  alternatives:
  - with him
  lexicon: HALOT
  rationale: Preposition אֶל with 3ms suffix, indicating direction toward or onto
    him. 'To him' is the most straightforward rendering with 'leave' in English.
- source_word: יְגִיעֶךָ
  chosen: your labor
  alternatives:
  - your toil
  - your produce
  lexicon: HALOT
  rationale: יְגִיעַ commonly denotes labor, toil, or the fruit of labor. In this
    context of agricultural work and whether the animal can be trusted with human
    work, 'your labor' best captures the object being entrusted, while 'produce' is
    possible but less direct here.
