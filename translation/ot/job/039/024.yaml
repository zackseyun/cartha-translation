id: JOB.39.24
reference: Job 39:24
source:
  edition: WLC
  text: בְּ/רַ֣עַשׁ וְ֭/רֹגֶז יְגַמֶּא אָ֑רֶץ וְ/לֹֽא יַ֝אֲמִ֗ין כִּי ק֥וֹל שׁוֹפָֽר־־־׃
translation:
  text: With fierceness and rage he devours the ground, and he cannot stand still
    when the sound of the trumpet comes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'he does not hold back at the sound of the trumpet,' reflecting an idiomatic
      sense of the verb often rendered more literally as 'believe.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'swallows the ground,' a vivid image for the horse's speed and
      eagerness in charging forward.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּרַעַשׁ
  chosen: With fierceness
  alternatives:
  - In tumult
  - With trembling
  - With quaking
  lexicon: HALOT
  rationale: רַעַשׁ can denote shaking, tumult, or violent commotion. In the horse
    context, the sense is not literal seismic movement but the violent, excited force
    with which it charges. 'With fierceness' captures the adverbial force in natural
    English while preserving the intensity.
- source_word: וְרֹגֶז
  chosen: and rage
  alternatives:
  - and agitation
  - and fury
  lexicon: HALOT
  rationale: רֹגֶז denotes agitation, trembling, or rage. In parallel with רַעַשׁ
    it intensifies the horse's excited ferocity. 'Rage' best conveys the emotional
    force in concise English.
- source_word: יְגַמֶּא
  chosen: he devours
  alternatives:
  - he swallows
  - he consumes
  lexicon: HALOT
  rationale: From גמא, literally 'to swallow down, gulp.' In this idiom with 'ground/earth,'
    the image is of rapidly covering ground as if swallowing it. 'Devours' preserves
    the vivid metaphor better than the flatter 'covers'.
- source_word: אָרֶץ
  chosen: the ground
  alternatives:
  - the earth
  - the land
  lexicon: HALOT
  rationale: In this immediate context of a war horse charging, אֶרֶץ refers to the
    terrain beneath it rather than the world or a territory. 'Ground' is the most
    contextually precise English choice.
- source_word: וְלֹא יַאֲמִין
  chosen: he cannot stand still
  alternatives:
  - he does not believe
  - he cannot remain still
  - he cannot hold back
  lexicon: HALOT
  rationale: The verb אמן in Hiphil commonly means 'believe,' but in this idiom many
    interpreters understand it as 'remain steady/stand firm' or 'hold oneself in.'
    Given the war-horse context and the following trumpet blast, the sense is that
    the horse cannot restrain itself or stay put. 'He cannot stand still' communicates
    the idiomatic meaning clearly in modern English while fitting the scene.
- source_word: כִּי
  chosen: when
  alternatives:
  - that
  - because
  lexicon: HALOT
  rationale: Here כִּי introduces the circumstance tied to the trumpet sound. In English,
    'when' best expresses the temporal force in context.
- source_word: קוֹל שׁוֹפָר
  chosen: the sound of the trumpet comes
  alternatives:
  - the sound of the horn
  - the trumpet sounds
  lexicon: HALOT
  rationale: שׁוֹפָר is a horn/trumpet used for signaling, especially in battle. 'Trumpet'
    is the most idiomatic English equivalent here. Expanding to 'the sound of the
    trumpet comes' makes explicit the implied event while preserving the Hebrew noun
    phrase's focus on sound.
