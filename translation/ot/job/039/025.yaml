id: JOB.39.25
reference: Job 39:25
source:
  edition: WLC
  text: בְּ/דֵ֤י שֹׁפָ֨ר יֹ֘אמַ֤ר הֶאָ֗ח וּֽ֭/מֵ/רָחוֹק יָרִ֣יחַ מִלְחָמָ֑ה רַ֥עַם
    שָׂ֝רִים וּ/תְרוּעָֽה׀׃
translation:
  text: At the blast of the trumpet he says, ‘Aha!’ From far away he smells the battle,
    the thunder of commanders and the war cry.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'at the sound of the trumpet'; the Hebrew idiom בְּדֵי שֹׁפָר marks the
      occasion of the trumpet's sounding.
    reason: lexical_alternative
  - marker: b
    text: '''Aha!'' is an exclamation of eager excitement, depicting the horse''s
      readiness for battle.'
    reason: cultural_note
  - marker: c
    text: Or 'the roar of commanders and the shouting'; רַעַם is literally 'thunder,'
      used metaphorically for loud battle noise, and תְּרוּעָה can denote a battle
      shout or signal blast.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּדֵי
  chosen: At the blast of
  alternatives:
  - As often as
  - whenever
  - at the sound of
  lexicon: HALOT
  rationale: In context with שׁוֹפָר, the idiom marks the occasion when the trumpet
    sounds. 'At the blast of' is natural English and preserves the temporal sense
    without over-literal awkwardness.
- source_word: שֹׁפָר
  chosen: trumpet
  alternatives:
  - ram's horn
  lexicon: HALOT
  rationale: שׁוֹפָר is the horn used for signaling. 'Trumpet' is standard, readable
    English here; 'ram's horn' is more specific but less idiomatic in this poetic
    military context.
- source_word: יֹאמַר
  chosen: he says
  alternatives:
  - he cries
  - he says to himself
  lexicon: HALOT
  rationale: The verb is the ordinary 'say.' In poetic English, 'he says' preserves
    the vivid personification of the warhorse without adding interpretive force.
- source_word: הֶאָח
  chosen: Aha!
  alternatives:
  - Ha!
  - Ah!
  lexicon: HALOT
  rationale: An exclamation of eagerness or excitement. 'Aha!' best conveys the horse's
    spirited response to battle while remaining concise.
- source_word: וּמֵרָחוֹק
  chosen: From far away
  alternatives:
  - even from a distance
  - from afar
  lexicon: HALOT
  rationale: The phrase indicates distance. 'From far away' is clear modern English
    and fits the poetic line.
- source_word: יָרִיחַ
  chosen: he smells
  alternatives:
  - he scents
  - he catches the scent of
  lexicon: HALOT
  rationale: The Hiphil of ריח here refers to perceiving by smell. 'He smells' is
    the plainest rendering and preserves the concrete imagery.
- source_word: מִלְחָמָה
  chosen: the battle
  alternatives:
  - war
  - combat
  lexicon: HALOT
  rationale: The noun denotes warfare/battle. 'The battle' fits the immediate scene
    and works well with the singular poetic depiction.
- source_word: רַעַם
  chosen: the thunder of
  alternatives:
  - the roar of
  - the tumult of
  lexicon: HALOT
  rationale: Though literally 'thunder,' in context it metaphorically describes the
    loud crashing sound associated with military leaders. 'The thunder of' preserves
    the metaphorical force.
- source_word: שָׂרִים
  chosen: commanders
  alternatives:
  - princes
  - officers
  - captains
  lexicon: HALOT
  rationale: In this military context, שָׂרִים refers to leaders of troops rather
    than royal 'princes.' 'Commanders' best matches the battlefield setting.
- source_word: וּתְרוּעָה
  chosen: and the war cry
  alternatives:
  - and the shouting
  - and the trumpet blast
  lexicon: HALOT
  rationale: תְּרוּעָה can denote a shout or blast, but here alongside 'the thunder
    of commanders' it most naturally refers to the battle shout. 'War cry' makes the
    military sense explicit without over-paraphrasing.
