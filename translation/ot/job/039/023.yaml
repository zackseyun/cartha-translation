id: JOB.39.23
reference: Job 39:23
source:
  edition: WLC
  text: עָ֭לָי/ו תִּרְנֶ֣ה אַשְׁפָּ֑ה לַ֖הַב חֲנִ֣ית וְ/כִידֽוֹן׃
translation:
  text: Over him the quiver rattles, the flashing spear and javelin.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'against him the quiver rings out.' The Hebrew preposition and verb can
      be rendered with slightly different spatial and auditory nuance.
    reason: lexical_alternative
  - marker: b
    text: Literally 'the flame/blade of the spear and javelin,' a poetic expression
      for their flashing brightness.
    reason: lexical_alternative
lexical_decisions:
- source_word: עָלָיו
  chosen: over him
  alternatives:
  - against him
  - upon him
  lexicon: HALOT
  rationale: 'The preposition עַל with 3ms suffix here locates the action in relation
    to the horse: the weapons sound over/against him. ''Over him'' is a natural English
    rendering that preserves the spatial imagery without overinterpreting hostility.'
- source_word: תִּרְנֶה
  chosen: rattles
  alternatives:
  - rings out
  - resounds
  - quivers/shakes
  lexicon: HALOT
  rationale: From רנן/related poetic usage, the verb here describes a sharp ringing
    or rattling sound. With אַשְׁפָּה ('quiver') as subject, 'rattles' best fits the
    concrete battlefield image in modern English.
- source_word: אַשְׁפָּה
  chosen: the quiver
  alternatives:
  - quiver-case
  lexicon: HALOT
  rationale: Standard meaning is a container for arrows. 'Quiver' is the normal concise
    English equivalent.
- source_word: לַהַב
  chosen: the flashing
  alternatives:
  - flame
  - blade
  - glittering
  lexicon: HALOT
  rationale: Literally 'flame/blade,' but in construct with spear it conveys the gleaming
    or flashing appearance of the weapon. Rendering adjectivally as 'the flashing'
    communicates the poetic image in idiomatic English.
- source_word: חֲנִית
  chosen: spear
  alternatives:
  - lance
  lexicon: HALOT
  rationale: Common Hebrew term for spear. 'Spear' is the broad, standard English
    equivalent.
- source_word: כִידוֹן
  chosen: javelin
  alternatives:
  - dart
  - spear
  lexicon: HALOT
  rationale: Refers to a lighter throwing weapon distinct from חֲנִית in many contexts.
    'Javelin' preserves that distinction better than repeating 'spear'.
