id: JOB.39.3
reference: Job 39:3
source:
  edition: WLC
  text: תִּ֭כְרַעְנָה יַלְדֵי/הֶ֣ן תְּפַלַּ֑חְנָה חֶבְלֵי/הֶ֥ם תְּשַׁלַּֽחְנָה׃
translation:
  text: They crouch down, they bring forth their young; they cast off their labor
    pains.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they bow down' for 'they crouch down.'
    reason: lexical_alternative
  - marker: b
    text: Or 'their birth pangs' for 'their labor pains.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תִּכְרַעְנָה
  chosen: they crouch down
  alternatives:
  - they bow down
  - they kneel down
  lexicon: HALOT
  rationale: From כרע, describing the physical lowering/crouching associated with
    giving birth in animals. 'Crouch down' is natural English and fits the birthing
    context better than the more general 'bow down.'
- source_word: יַלְדֵיהֶן
  chosen: their young
  alternatives:
  - their offspring
  - their children
  lexicon: HALOT
  rationale: From ילד in a nominal form meaning what is born. In the animal context
    of Job 39, 'their young' is the most idiomatic and contextually precise rendering.
- source_word: תְּפַלַּחְנָה
  chosen: they bring forth
  alternatives:
  - they give birth
  - they deliver
  lexicon: HALOT
  rationale: This verb occurs in a birthing context and denotes bringing forth offspring.
    'Bring forth' preserves the elevated poetic tone while remaining clear; 'give
    birth' is possible but slightly flatter stylistically.
- source_word: חֶבְלֵיהֶם
  chosen: their labor pains
  alternatives:
  - their birth pangs
  - their cords
  lexicon: HALOT
  rationale: חבל can denote birth pangs/labor pains in context. Although the noun
    can have other senses such as cords, the immediate birthing imagery requires 'labor
    pains' here.
- source_word: תְּשַׁלַּחְנָה
  chosen: they cast off
  alternatives:
  - they send away
  - they let go of
  - they are rid of
  lexicon: HALOT
  rationale: From שלח, literally 'send away/release.' In context, the females are
    releasing or being rid of their labor pains after giving birth. 'Cast off' is
    concise, vivid, and fits the poetic parallelism.
