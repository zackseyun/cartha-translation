id: JOB.39.26
reference: Job 39:26
source:
  edition: WLC
  text: הֲֽ֭/מִ/בִּינָ֣תְ/ךָ יַֽאֲבֶר נֵ֑ץ יִפְרֹ֖שׂ כנפ/ו לְ/תֵימָֽן־׃
translation:
  text: Is it by your understanding that the hawk soars, spreading its wings toward
    the south?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the falcon' for 'the hawk'; the Hebrew נֵץ can refer more generally
      to a bird of prey of this kind.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲמִבִּינָתְךָ
  chosen: Is it by your understanding
  alternatives:
  - Is it from your understanding
  - Is it through your wisdom
  lexicon: HALOT
  rationale: The interrogative הֲ with מִן + בִּינָה + 2ms suffix asks whether the
    action happens by means of Job's understanding/discernment. 'Understanding' is
    the most direct rendering of בִּינָה here; 'wisdom' is possible but less precise.
- source_word: יַאֲבֶר
  chosen: soars
  alternatives:
  - takes flight
  - mounts up
  lexicon: HALOT
  rationale: From אבר in Hiphil, used of a bird's upward movement or flight. 'Soars'
    captures the elevated, gliding motion naturally in English while remaining faithful
    to the image. 'Takes flight' is possible but slightly flatter.
- source_word: נֵץ
  chosen: the hawk
  alternatives:
  - the falcon
  lexicon: HALOT
  rationale: נֵץ commonly denotes a hawk/falcon-like bird of prey. 'Hawk' is the standard
    and broader English equivalent, avoiding overprecision where the exact species
    is uncertain.
- source_word: יִפְרֹשׂ
  chosen: spreading
  alternatives:
  - and spreads
  - stretching out
  lexicon: HALOT
  rationale: פרשׂ means to spread out. Rendering it as the participial-like 'spreading'
    in English fits the sequence with 'soars' smoothly, expressing attendant action.
- source_word: כְּנָפוֹ
  chosen: its wings
  alternatives:
  - his wings
  - its wing
  lexicon: HALOT
  rationale: Though singular in form with a collective sense, English idiom prefers
    'wings' for a bird in flight. 'Its' is appropriate for an animal in contemporary
    English.
- source_word: לְתֵימָן
  chosen: toward the south
  alternatives:
  - southward
  - to the south
  lexicon: HALOT
  rationale: תֵימָן here is directional/geographical, 'south.' 'Toward the south'
    best conveys the lamed of direction and the migratory orientation in context.
