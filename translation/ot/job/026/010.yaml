id: JOB.26.10
reference: Job 26:10
source:
  edition: WLC
  text: חֹֽק חָ֭ג עַל פְּנֵי מָ֑יִם עַד תַּכְלִ֖ית א֣וֹר עִם חֹֽשֶׁךְ־־־־־׃
translation:
  text: He inscribed a circle on the surface of the waters, at the boundary between
    light and darkness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'He set a boundary on the face of the waters, at the limit where light
      meets darkness.'
    reason: lexical_alternative
lexical_decisions:
- source_word: חֹק
  chosen: inscribed
  alternatives:
  - set a boundary
  - decreed
  - marked out
  lexicon: HALOT
  rationale: Although חֹק commonly denotes a statute, fixed limit, or boundary, in
    this construction with חָג it functions adverbially/objectively to express the
    act of marking out a fixed boundary. English 'inscribed' captures the image of
    tracing or marking a limit without flattening it into an abstract decree.
- source_word: חָג
  chosen: a circle
  alternatives:
  - a horizon
  - a vault
  - a boundary
  lexicon: HALOT
  rationale: The noun/verb root denotes a circle or circuit. Here the imagery is of
    a circular boundary drawn over the waters. 'Circle' is the most direct rendering;
    'horizon' is interpretive and better preserved as an alternative.
- source_word: עַל פְּנֵי מָיִם
  chosen: on the surface of the waters
  alternatives:
  - upon the face of the waters
  - over the waters
  lexicon: HALOT
  rationale: פְּנֵי literally means 'face/surface.' 'On the surface of the waters'
    is idiomatic modern English while preserving the concrete spatial image.
- source_word: עַד
  chosen: at
  alternatives:
  - unto
  - as far as
  - up to
  lexicon: HALOT
  rationale: Here עַד introduces the extent or limit of the circle. In English, 'at
    the boundary' communicates the sense more naturally than a wooden 'unto the boundary.'
- source_word: תַּכְלִית
  chosen: the boundary
  alternatives:
  - the limit
  - the extremity
  - the end
  lexicon: HALOT
  rationale: The term denotes an end-point or limit. 'Boundary' fits the cosmological
    imagery of a fixed dividing line between realms.
- source_word: אוֹר עִם חֹשֶׁךְ
  chosen: between light and darkness
  alternatives:
  - of light with darkness
  - where light meets darkness
  lexicon: HALOT
  rationale: Literally 'light with darkness.' In context this expresses the meeting
    or dividing line of the two. 'Between light and darkness' makes the relation explicit
    in natural English while preserving the poetic cosmological contrast.
