id: JOB.26.6
reference: Job 26:6
source:
  edition: WLC
  text: עָר֣וֹם שְׁא֣וֹל נֶגְדּ֑/וֹ וְ/אֵ֥ין כְּ֝ס֗וּת לָֽ/אֲבַדּֽוֹן׃
translation:
  text: Sheol lies naked before him, and Abaddon has no covering.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Sheol is laid bare before him.'
    reason: lexical_alternative
  - marker: b
    text: Abaddon can also be rendered 'Destruction.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עָרוֹם
  chosen: lies naked
  alternatives:
  - is naked
  - is laid bare
  - is uncovered
  lexicon: HALOT
  rationale: The adjective means 'naked, bare.' In English, predicating it of Sheol
    idiomatically works as 'lies naked' or 'is laid bare.' 'Lies naked' preserves
    the vivid poetic image without adding interpretive weight.
- source_word: שְׁאוֹל
  chosen: Sheol
  alternatives:
  - the grave
  - the realm of the dead
  lexicon: HALOT
  rationale: Retained as 'Sheol' rather than flattening to 'grave' or paraphrasing
    as 'realm of the dead,' since the Hebrew term carries a distinct conceptual range
    in wisdom literature. Transliteration preserves the source-world imagery.
- source_word: נֶגְדּוֹ
  chosen: before him
  alternatives:
  - before him openly
  - in his presence
  lexicon: HALOT
  rationale: The preposition means 'in front of, before, in the presence of' with
    3ms suffix. 'Before him' is the most direct and natural rendering; the referent
    is God in context.
- source_word: אֵין
  chosen: has no
  alternatives:
  - there is no
  - there is not
  lexicon: HALOT
  rationale: With the following noun phrase, English reads more naturally as 'has
    no covering' than the more wooden 'there is no covering for.' This is a minimal
    syntactic adjustment consistent with optimal equivalence.
- source_word: כְּסוּת
  chosen: covering
  alternatives:
  - cover
  - concealment
  lexicon: HALOT
  rationale: The noun denotes a covering or garment-like cover. 'Covering' best preserves
    the metaphor parallel to 'naked' in the first colon.
- source_word: אֲבַדּוֹן
  chosen: Abaddon
  alternatives:
  - Destruction
  - the place of destruction
  lexicon: HALOT
  rationale: Although the noun can denote 'destruction,' in poetic parallel with Sheol
    it functions as a personified or place-name-like term. 'Abaddon' preserves the
    Hebrew poetic force and intertextual resonance better than reducing it to an abstract
    noun.
