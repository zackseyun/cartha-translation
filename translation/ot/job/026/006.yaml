theological_decisions:
- issue: Referent of the 3ms suffix in נֶגְדּוֹ
  chosen_reading: The suffix refers to God ('before him').
  alternative_readings:
  - An unspecified observer in the immediate discourse
  rationale: In context Job is describing God's knowledge and power over the hidden
    realms. Rendering simply 'before him' preserves the Hebrew while allowing the
    contextual referent to remain God without overexplication.
