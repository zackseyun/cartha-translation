id: JOB.26.4
reference: Job 26:4
source:
  edition: WLC
  text: אֶת מִ֭י הִגַּ֣דְתָּ מִלִּ֑ין וְ/נִשְׁמַת מִ֝י יָצְאָ֥ה מִמֶּֽ/ךָּ־־׃
translation:
  text: To whom have you declared words, and whose breath has come out from you?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'whose spirit came from you?' The Hebrew noun can mean 'breath' or, in
      some contexts, 'spirit.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶת מִי
  chosen: to whom
  alternatives:
  - whom
  - for whom
  lexicon: HALOT
  rationale: The particle אֶת before an interrogative here marks the person addressed
    or concerned, best represented idiomatically in English as 'to whom' rather than
    a bare 'whom.' This preserves the rhetorical force of Job's question.
- source_word: הִגַּדְתָּ
  chosen: have you declared
  alternatives:
  - have you told
  - have you announced
  - have you spoken
  lexicon: HALOT
  rationale: The Hiphil of נגד commonly means 'declare, tell, make known.' 'Declared'
    fits the elevated poetic register and the direct-object construction with 'words.'
- source_word: מִלִּין
  chosen: words
  alternatives:
  - speech
  - sayings
  lexicon: HALOT
  rationale: This Aramaizing plural noun in Job denotes spoken words or utterances.
    'Words' is the most direct and natural rendering in context.
- source_word: וְנִשְׁמַת
  chosen: and ... breath
  alternatives:
  - and ... spirit
  lexicon: HALOT
  rationale: נשמה can denote breath or life-breath, and sometimes by extension spirit.
    Here, with 'has come out from you,' the image is of utterance proceeding from
    someone, so 'breath' best preserves the concrete poetic expression while allowing
    the implication of animating spirit.
- source_word: מִי
  chosen: whose
  alternatives:
  - of whom
  lexicon: HALOT
  rationale: The second interrogative is possessive in sense with נשמת, so 'whose'
    is the most natural English rendering.
- source_word: יָצְאָה מִמֶּךָּ
  chosen: has come out from you
  alternatives:
  - came forth from you
  - proceeded from you
  lexicon: HALOT
  rationale: יצא literally means 'go out, come out.' 'Has come out from you' is a
    clear English equivalent that preserves the concrete metaphor of breath or inspiration
    proceeding from Bildad.
