id: JOB.26.5
reference: Job 26:5
source:
  edition: WLC
  text: הָ/רְפָאִ֥ים יְחוֹלָ֑לוּ מִ/תַּ֥חַת מַ֝֗יִם וְ/שֹׁכְנֵי/הֶֽם׃
translation:
  text: The departed spirits tremble beneath the waters, and those who dwell in them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'The dead writhe beneath the waters.' Hebrew רְפָאִים can mean 'the dead'
      or 'the shades,' and יְחוֹלָלוּ may also be rendered 'writhe.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הָרְפָאִים
  chosen: the departed spirits
  alternatives:
  - the dead
  - the shades
  - the Rephaim
  lexicon: HALOT, BDB
  rationale: In Job 26:5 the term refers to the dead in the underworld, not the ethnic
    Rephaim. 'Departed spirits' communicates the poetic, underworld sense more clearly
    in modern English than 'shades,' while avoiding the misleading proper-name sense
    of 'Rephaim.' 'The dead' is possible but somewhat flatter than the poetic register.
- source_word: יְחוֹלָלוּ
  chosen: tremble
  alternatives:
  - writhe
  - are brought forth
  - shake
  lexicon: HALOT, BDB
  rationale: The verb from חול can denote writhing, trembling, or being in labor.
    In this context of cosmic dread before God, 'tremble' best fits the sense of fearful
    agitation. 'Writhe' is possible and vivid, but can sound overly physical; 'are
    brought forth' fits other stems/contexts less well here.
- source_word: מִתַּחַת מַיִם
  chosen: beneath the waters
  alternatives:
  - from under the waters
  - under the waters
  lexicon: HALOT, BDB
  rationale: The preposition and noun together indicate location below the waters.
    'Beneath the waters' is idiomatic English and preserves the spatial imagery of
    the Hebrew.
- source_word: וְשֹׁכְנֵיהֶם
  chosen: and those who dwell in them
  alternatives:
  - and their inhabitants
  - with their dwellers
  lexicon: HALOT, BDB
  rationale: The suffix most naturally refers back to 'waters,' yielding 'those who
    dwell in them.' This preserves the Hebrew parallelism and avoids over-interpreting
    the referent. 'Their inhabitants' is concise but less explicit in English about
    the antecedent.
