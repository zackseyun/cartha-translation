theological_decisions:
- issue: Referent of רְפָאִים
  chosen_reading: the dead/departed spirits in the underworld
  alternative_readings:
  - the Rephaim as an ancient people
  rationale: The poetic context in Job 26 describes God's sovereignty over cosmic
    and underworld realms. Here רְפָאִים is best taken in its common poetic sense
    of the dead, not as a historical ethnic group. This is a lexical-contextual decision
    rather than a doctrinally disputed one.
