id: JOB.26.11
reference: Job 26:11
source:
  edition: WLC
  text: עַמּוּדֵ֣י שָׁמַ֣יִם יְרוֹפָ֑פוּ וְ֝/יִתְמְה֗וּ מִ/גַּעֲרָתֽ/וֹ׃
translation:
  text: The pillars of heaven tremble and are astonished at his rebuke.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'shake' for 'tremble.'
    reason: lexical_alternative
  - marker: b
    text: Or 'are appalled' / 'are amazed' for 'are astonished.'
    reason: lexical_alternative
  - marker: c
    text: Literally 'from his rebuke'; the sense may also be 'because of his rebuke.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עַמּוּדֵי שָׁמַיִם
  chosen: the pillars of heaven
  alternatives:
  - the pillars of the heavens
  - the columns of heaven
  - the foundations of heaven
  lexicon: HALOT
  rationale: עַמּוּדֵי is the construct plural of עַמּוּד, literally 'pillars/columns.'
    שָׁמַיִם is best rendered 'heaven' here in idiomatic English rather than the more
    wooden 'heavens.' 'Pillars of heaven' preserves the cosmic imagery of the Hebrew
    without over-interpreting it as literal architecture or flattening it into 'foundations.'
- source_word: יְרוֹפָפוּ
  chosen: tremble
  alternatives:
  - shake
  - quiver
  - totter
  lexicon: HALOT
  rationale: From רפף, conveying shaking or quivering. 'Tremble' captures both motion
    and the awe-filled tone of the verse. 'Totter' could imply instability more than
    the context requires; 'shake' is possible but less vivid.
- source_word: וְיִתְמְהוּ
  chosen: and are astonished
  alternatives:
  - and are appalled
  - and are amazed
  - and stand aghast
  lexicon: HALOT
  rationale: From תמהּ, 'to be astounded/astonished.' The verb here expresses stunned
    reaction in parallel with trembling. 'Are astonished' is natural modern English
    and preserves the sense of awe or shock. 'Appalled' is possible but may suggest
    moral revulsion not demanded by the context.
- source_word: מִגַּעֲרָתוֹ
  chosen: at his rebuke
  alternatives:
  - from his rebuke
  - because of his rebuke
  lexicon: HALOT
  rationale: The preposition מִן can mark source or cause. In English, 'at his rebuke'
    idiomatically conveys the reaction of the pillars to God's threatening word, while
    preserving the causal force. 'From his rebuke' is more literal but less natural
    in this context.
