theological_decisions:
- issue: Cosmic imagery of 'pillars of heaven'
  chosen_reading: Retain the poetic cosmological image without demythologizing or
    literalizing it.
  alternative_readings:
  - Interpret as a metaphor for mountains
  - Interpret as literal ancient cosmology in translation
  rationale: Job's poetry uses vivid ancient cosmic imagery. The translation should
    preserve the image as given rather than explain it away or force a modern cosmological
    reading into the text.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Preserve theological tension rather than resolve it.'
