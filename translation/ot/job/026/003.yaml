id: JOB.26.3
reference: Job 26:3
source:
  edition: WLC
  text: מַה יָּ֭עַצְתָּ לְ/לֹ֣א חָכְמָ֑ה וְ֝/תוּשִׁיָּ֗ה לָ/רֹ֥ב הוֹדָֽעְתָּ־׃
translation:
  text: How you have counseled one without wisdom, and made sound wisdom known in
    abundance!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'What counsel you have given to one without wisdom, and what sound wisdom
      you have made known abundantly!' The Hebrew opening may be rendered with 'what'
      or 'how'; the main text uses the exclamatory 'how' to reflect Job's irony.
    reason: lexical_alternative
lexical_decisions:
- source_word: מַה
  chosen: How
  alternatives:
  - What
  lexicon: HALOT
  rationale: In exclamatory usage introducing sarcasm or astonishment, מַה is well
    rendered as 'How' rather than the more wooden 'What.' The verse is part of Job's
    ironic rebuke to Bildad, so English exclamatory 'How you have...' best captures
    the force.
- source_word: יָּעַצְתָּ
  chosen: you have counseled
  alternatives:
  - you have advised
  - you have given counsel
  lexicon: HALOT
  rationale: From יעץ, 'to advise/counsel.' 'Counseled' preserves the verbal and somewhat
    formal tone appropriate to wisdom discourse.
- source_word: לְלֹא חָכְמָה
  chosen: one without wisdom
  alternatives:
  - the one without wisdom
  - him who has no wisdom
  lexicon: HALOT
  rationale: 'The preposition ל plus negation and abstract noun yields the sense ''to/for
    one lacking wisdom.'' English idiom prefers an implicit personal object: ''one
    without wisdom.'' This keeps the sarcasm without over-specifying the referent.'
- source_word: חָכְמָה
  chosen: wisdom
  lexicon: HALOT
  rationale: Standard rendering in wisdom literature; no contextual reason to vary.
- source_word: וְתוּשִׁיָּה
  chosen: sound wisdom
  alternatives:
  - success
  - resourcefulness
  - practical wisdom
  lexicon: HALOT
  rationale: תושיה in wisdom contexts often denotes effective wisdom, sound judgment,
    or resourcefulness. 'Sound wisdom' is a natural English equivalent that preserves
    its wisdom-literature nuance better than the broader 'success.'
- source_word: לָרֹב
  chosen: in abundance
  alternatives:
  - abundantly
  - to a great extent
  lexicon: HALOT
  rationale: The phrase modifies the extent of what has supposedly been made known.
    'In abundance' is idiomatic and preserves the sarcastic intensification.
- source_word: הוֹדָעְתָּ
  chosen: made known
  alternatives:
  - declared
  - revealed
  - caused to know
  lexicon: HALOT
  rationale: Hiphil of ידע means 'to make known.' This is the most direct and transparent
    rendering.
