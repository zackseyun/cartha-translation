id: JOB.26.9
reference: Job 26:9
source:
  edition: WLC
  text: מְאַחֵ֥ז פְּנֵי כִסֵּ֑ה פַּרְשֵׁ֖ז עָלָ֣י/ו עֲנָנֽ/וֹ־׃
translation:
  text: He covers the face of his throne, spreading his cloud over it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'He seizes the face of the throne'—the Hebrew verb can more literally
      mean 'grasp' or 'hold,' but here likely carries the sense of covering or concealing.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the face of his throne,' an idiom for the visible surface or front
      of the throne.
    reason: lexical_alternative
lexical_decisions:
- source_word: מְאַחֵז
  chosen: covers
  alternatives:
  - seizes
  - holds fast
  - shuts in
  lexicon: HALOT
  rationale: Although the participle from אחז commonly means 'grasping/holding,' in
    this poetic context with 'the face of the throne' and the following verb 'spreading
    his cloud over it,' the sense is that of concealing or covering the visible surface.
    'Covers' best fits the parallel imagery and natural English.
- source_word: פְּנֵי
  chosen: the face of
  alternatives:
  - the surface of
  - the front of
  lexicon: HALOT
  rationale: Hebrew פָּנִים often means 'face' literally or metaphorically 'surface/front.'
    Retaining 'face of' preserves the vivid Hebrew image while remaining intelligible
    in English.
- source_word: כִסֵּה
  chosen: his throne
  alternatives:
  - the throne
  - his seat
  lexicon: HALOT
  rationale: כִּסֵּא means 'throne.' The following pronominal suffixes in the verse
    ('his cloud') naturally point to God as the implied subject, so 'his throne' is
    the most coherent English rendering.
- source_word: פַּרְשֵׁז
  chosen: spreading
  alternatives:
  - spreads
  - spreading out
  lexicon: HALOT
  rationale: The verb denotes spreading or extending. Rendering it as 'spreading'
    coordinates well with the participial opening and preserves the poetic flow of
    the Hebrew.
- source_word: עָלָיו
  chosen: over it
  alternatives:
  - upon it
  - over him
  lexicon: HALOT
  rationale: The suffix most naturally refers back to 'throne' rather than to a personal
    antecedent. English uses 'it' for the throne, and 'over it' clearly expresses
    the spatial relation.
- source_word: עֲנָנוֹ
  chosen: his cloud
  alternatives:
  - his clouds
  - a cloud of his
  lexicon: HALOT
  rationale: The singular with suffix is best rendered 'his cloud.' In context it
    evokes the divine cloud that conceals heavenly glory.
