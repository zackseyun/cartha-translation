theological_decisions:
- issue: Implied subject and possessive reference
  chosen_reading: The verse speaks of God concealing his own throne with his cloud.
  alternative_readings:
  - The verse could be rendered more impersonally as concealing 'the throne' without
    making the possessive explicit in English.
  rationale: The Hebrew poetry in context describes God's cosmic rule and hidden majesty.
    Rendering the throne and cloud as belonging to the implied divine subject best
    reflects the syntax and literary context without adding doctrinal content beyond
    the text.
  doctrine_reference: Translation philosophy §1, §3
