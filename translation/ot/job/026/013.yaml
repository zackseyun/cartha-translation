theological_decisions:
- issue: Whether רוּחַ should be rendered 'Spirit' in a way that implies a distinct
    Trinitarian reference
  chosen_reading: Rendered 'breath' in the main text
  alternative_readings:
  - Spirit
  - wind
  rationale: The verse speaks poetically of God's creative power. Rendering רוּחַ
    as 'Spirit' is possible, but the Hebrew itself does not require an explicit personal-reference
    reading here. To preserve theological tension and avoid importing a doctrinal
    claim beyond the text, the main text uses 'breath,' with alternatives preserved
    in a footnote.
  doctrine_reference: Translation philosophy §3
- issue: Whether נָחָשׁ בָּרִיחַ should be interpreted explicitly as Satan/Leviathan
    in the main text
  chosen_reading: Kept as 'the fleeing serpent'
  alternative_readings:
  - Leviathan
  - a mythic chaos-serpent
  - Satan (typological/theological interpretation)
  rationale: The Hebrew presents poetic cosmic-combat imagery but does not explicitly
    identify the serpent with Satan in this verse. The translation preserves the image
    without resolving the referent beyond what the text states.
  doctrine_reference: Translation philosophy §3
