id: JOB.26.13
reference: Job 26:13
source:
  edition: WLC
  text: בְּ֭/רוּח/וֹ שָׁמַ֣יִם שִׁפְרָ֑ה חֹֽלֲלָ֥ה יָ֝ד֗/וֹ נָחָ֥שׁ בָּרִֽיחַ׃
translation:
  text: By his breath the heavens are made fair; his hand pierced the fleeing serpent.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'By his Spirit' or 'By his wind.' The Hebrew word can mean breath, wind,
      or spirit.
    reason: lexical_alternative
  - marker: b
    text: Or 'his hand formed the fleeing serpent.' The verb may be understood differently,
      though 'pierced' best fits the combat imagery of the line.
    reason: alternative_reading
  - marker: c
    text: '''The fleeing serpent'' likely evokes a cosmic chaos-serpent; compare Isaiah
      27:1.'
    reason: cross_reference
lexical_decisions:
- source_word: בְּרוּחוֹ
  chosen: By his breath
  alternatives:
  - By his Spirit
  - By his wind
  lexicon: HALOT
  rationale: 'רוּחַ can denote breath, wind, or spirit. In this poetic creation context,
    ''breath'' preserves the vivid anthropomorphic image and parallels divine creative
    power without over-specifying as the Holy Spirit. The preposition ב marks instrumentality:
    ''by/through.'''
- source_word: שָׁמַיִם
  chosen: the heavens
  alternatives:
  - the sky
  lexicon: HALOT
  rationale: The plural 'heavens' is the standard rendering in elevated poetic and
    cosmological contexts, fitting Job's language better than the flatter 'sky.'
- source_word: שִׁפְרָה
  chosen: are made fair
  alternatives:
  - became bright
  - were beautified
  - are clear
  lexicon: HALOT
  rationale: From שׁפר, conveying beauty/fairness or brightness. The clause describes
    the heavens as beautified or made splendid by God's action. 'Are made fair' captures
    the stative-result sense in natural English while preserving the poetic register.
- source_word: חֹלֲלָה
  chosen: pierced
  alternatives:
  - formed
  - writhed through
  - brought forth
  lexicon: HALOT
  rationale: 'The verb חול in the polel/poetic usage can mean to writhe, bring forth,
    or pierce. With ''his hand'' as subject and ''the fleeing serpent'' as object,
    a hostile action is most natural: God''s hand pierced/slayed the serpent. ''Pierced''
    fits the combat imagery better than ''formed,'' which would weaken the parallelism.'
- source_word: יָדוֹ
  chosen: his hand
  lexicon: HALOT
  rationale: A straightforward rendering. In Hebrew poetry 'hand' often signifies
    active power; retaining the concrete term preserves the imagery.
- source_word: נָחָשׁ בָּרִיחַ
  chosen: the fleeing serpent
  alternatives:
  - the twisting serpent
  - the swift serpent
  lexicon: HALOT
  rationale: בָּרִיחַ can mean fleeing, gliding, or bar-like/extended. In mythic-chaos
    imagery, 'fleeing serpent' is the most widely defensible sense and aligns with
    similar expressions in Isaiah 27:1. The phrase likely evokes a cosmic sea-serpent
    subdued by God, but the translation should preserve the image rather than interpret
    it away.
