id: JOB.26.12
reference: Job 26:12
source:
  edition: WLC
  text: בְּ֭/כֹח/וֹ רָגַ֣ע הַ/יָּ֑ם ו/ב/תובנת/ו מָ֣חַץ רָֽהַב׃
translation:
  text: By his power he stilled the sea, and by his understanding he shattered Rahab.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Rahab is a poetic name for a chaos power or sea monster opposed by God;
      alternatively, the term can be rendered interpretively as 'the sea monster.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּכֹחוֹ
  chosen: By his power
  alternatives:
  - With his power
  - By his strength
  lexicon: HALOT
  rationale: 'The preposition ב plus כֹּחַ with 3ms suffix is most naturally instrumental:
    ''by/with his power.'' ''Power'' is preferred over ''strength'' here because it
    better suits the cosmic scope of the verse.'
- source_word: רָגַע
  chosen: he stilled
  alternatives:
  - he calmed
  - he stirred
  - he quieted
  lexicon: HALOT
  rationale: In context with 'the sea,' the verb is best taken as bringing to rest
    or quieting. Although the root can in some contexts suggest disturbing or agitating,
    the parallel with God's sovereign ordering of chaos and the common sense of subduing
    the sea support 'stilled' as the clearest English rendering.
- source_word: הַיָּם
  chosen: the sea
  lexicon: HALOT
  rationale: Standard rendering of יָם. In Job's poetic context it can evoke the chaotic
    sea as a cosmic force, but 'the sea' preserves both literal and mythopoetic resonance
    without overinterpreting.
- source_word: וּבִתְבוּנָתוֹ
  chosen: and by his understanding
  alternatives:
  - and by his insight
  - and by his discernment
  lexicon: HALOT
  rationale: תְּבוּנָה denotes understanding or insight. 'Understanding' is chosen
    for natural English and to preserve the wisdom theme in Job.
- source_word: מָחַץ
  chosen: he shattered
  alternatives:
  - he crushed
  - he smote
  lexicon: HALOT
  rationale: The verb conveys a forceful crushing or smashing. 'Shattered' fits the
    poetic register and the imagery of decisive defeat.
- source_word: רָהַב
  chosen: Rahab
  alternatives:
  - the sea monster
  - pride
  lexicon: HALOT
  rationale: This is best understood here as the mythopoetic name Rahab, a chaos monster/cosmic
    enemy figure, not the woman of Jericho. Per translation philosophy, names are
    transliterated rather than translated. Because English readers may not recognize
    the referent, an explanatory footnote preserves the lexical alternative.
