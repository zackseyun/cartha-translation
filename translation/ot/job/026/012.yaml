theological_decisions:
- issue: Whether רָהַב should be rendered as a proper name or interpreted generically
  chosen_reading: Proper name 'Rahab' referring to the chaos power/monster subdued
    by God
  alternative_readings:
  - '''pride'' as an abstract noun'
  - '''the sea monster'' as an interpretive translation'
  rationale: In Job's poetic and cosmological context, רָהַב functions as a mythopoetic
    opponent symbolizing chaotic power. Transliteration preserves the Hebrew imagery
    without collapsing it into a single interpretation. A footnote explains the sense
    for readers.
  doctrine_reference: 'Translation philosophy: Translate titles; transliterate names.
    Preserve theological tension rather than resolve it.'
