id: JOB.26.2
reference: Job 26:2
source:
  edition: WLC
  text: מֶה עָזַ֥רְתָּ לְ/לֹא כֹ֑חַ ה֝וֹשַׁ֗עְתָּ זְר֣וֹעַ לֹא עֹֽז־־־׃
translation:
  text: How you have helped the powerless! How you have saved the arm without strength!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'What have you helped one without strength? What have
      you saved—an arm without might?' The Hebrew is sharply ironic.
    reason: lexical_alternative
lexical_decisions:
- source_word: מֶה
  chosen: How
  alternatives:
  - What
  lexicon: HALOT
  rationale: In this exclamatory rhetorical question, מֶה functions idiomatically
    as an exclamation ('how!') rather than a simple interrogative 'what.' This better
    captures Job's irony toward Bildad.
- source_word: עָזַרְתָּ
  chosen: you have helped
  alternatives:
  - you helped
  lexicon: HALOT
  rationale: From עזר, 'help.' The perfect is rendered with English present perfect
    to convey the completed action with rhetorical force in direct address.
- source_word: לְלֹא כֹחַ
  chosen: the powerless
  alternatives:
  - him who has no strength
  - one without power
  lexicon: HALOT
  rationale: The preposition plus negation and noun literally means 'to/for no strength'
    or 'for one without strength.' 'The powerless' is a natural English rendering
    that preserves the sense without unnecessary awkwardness.
- source_word: הוֹשַׁעְתָּ
  chosen: you have saved
  alternatives:
  - you have delivered
  lexicon: HALOT
  rationale: From ישׁע, whose core sense is 'save/deliver.' 'Saved' preserves the
    lexical force and the ironic parallelism with 'helped.' 'Delivered' is possible
    but less direct here.
- source_word: זְרוֹעַ
  chosen: the arm
  alternatives:
  - an arm
  - strength
  lexicon: HALOT
  rationale: Literally 'arm,' a common Hebrew image for strength or power. Retaining
    the metaphor fits the poetry and allows the following phrase 'without strength'
    to sharpen the irony.
- source_word: לֹא עֹז
  chosen: without strength
  alternatives:
  - that has no might
  - without power
  lexicon: HALOT
  rationale: עֹז denotes strength, might. 'Without strength' gives a smooth English
    equivalent and mirrors the earlier כֹחַ while preserving the poetic parallelism.
