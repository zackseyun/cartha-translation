id: JOB.26.7
reference: Job 26:7
source:
  edition: WLC
  text: נֹטֶ֣ה צָפ֣וֹן עַל תֹּ֑הוּ תֹּ֥לֶה אֶ֝֗רֶץ עַל בְּלִי מָֽה־־־׃
translation:
  text: He stretches out the north over emptiness; he hangs the earth on nothing.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the northern sky.' The Hebrew simply says 'the north,' which may refer
      to the northern heavens in this poetic context.
    reason: lexical_alternative
  - marker: b
    text: Or 'void.' The Hebrew term can denote emptiness, wasteness, or formless
      void.
    reason: lexical_alternative
lexical_decisions:
- source_word: נֹטֶה
  chosen: stretches out
  alternatives:
  - spreads out
  - extends
  lexicon: HALOT
  rationale: Qal participle of נטה commonly denotes stretching out or extending. 'Stretches
    out' is idiomatic modern English and preserves the cosmological imagery without
    over-paraphrase.
- source_word: צָפוֹן
  chosen: the north
  alternatives:
  - the northern sky
  - Zaphon
  lexicon: HALOT
  rationale: The noun ordinarily means 'north.' In context it likely refers to the
    northern heavens/sky, but the simple 'the north' best matches the Hebrew while
    allowing the cosmological sense to remain. 'Zaphon' as a mythic mountain is possible
    in broader ancient Near Eastern background, but the verse itself does not require
    that reading.
- source_word: תֹּהוּ
  chosen: emptiness
  alternatives:
  - void
  - wasteness
  - nothingness
  lexicon: HALOT
  rationale: תֹּהוּ denotes emptiness, formlessness, or void. 'Emptiness' is clear
    modern English and avoids overly traditional phrasing while preserving the sense
    of a trackless void.
- source_word: תֹּלֶה
  chosen: hangs
  alternatives:
  - suspends
  lexicon: HALOT
  rationale: Qal participle of תלה means to hang or suspend. 'Hangs' is the most direct
    and natural rendering.
- source_word: אֶרֶץ
  chosen: the earth
  alternatives:
  - the land
  lexicon: HALOT
  rationale: In this cosmic context אֶרֶץ refers to the earth/world rather than a
    particular land.
- source_word: בְּלִי מָה
  chosen: nothing
  alternatives:
  - no thing
  - without anything
  lexicon: HALOT
  rationale: The idiom means 'without anything' or 'on nothing.' Rendering the full
    phrase as 'on nothing' in English preserves both the preposition עַל and the idiomatic
    force.
- source_word: עַל
  chosen: over / on
  alternatives:
  - upon
  lexicon: HALOT
  rationale: 'The preposition occurs twice with slightly different English idiom:
    ''over emptiness'' for the first clause and ''on nothing'' for the second. This
    is a documented contextual variation for natural English while preserving the
    spatial sense.'
