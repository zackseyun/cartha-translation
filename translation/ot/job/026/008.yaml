id: JOB.26.8
reference: Job 26:8
source:
  edition: WLC
  text: צֹרֵֽר מַ֥יִם בְּ/עָבָ֑י/ו וְ/לֹא נִבְקַ֖ע עָנָ֣ן תַּחְתָּֽ/ם־־׃
translation:
  text: He binds up the waters in his clouds, yet the cloud is not split open under
    them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in his thick clouds'; the Hebrew term can emphasize dense cloud-mass.
    reason: lexical_alternative
  - marker: b
    text: Or 'does not burst'; the Hebrew says 'is not split open.'
    reason: lexical_alternative
lexical_decisions:
- source_word: צֹרֵר
  chosen: binds up
  alternatives:
  - wraps up
  - encloses
  - binds
  lexicon: HALOT
  rationale: The participle from צרר conveys binding, wrapping, or confining. 'Binds
    up' is idiomatic English that preserves the image of restraining the waters within
    the clouds without over-paraphrasing.
- source_word: מַיִם
  chosen: the waters
  alternatives:
  - water
  lexicon: HALOT
  rationale: The Hebrew plural is naturally rendered 'waters' in elevated poetic English,
    matching the cosmic imagery of the verse.
- source_word: בְּעָבָיו
  chosen: in his clouds
  alternatives:
  - in his thick clouds
  - in his cloud-masses
  lexicon: HALOT
  rationale: עָב can denote a cloud, especially a thick cloud. The plural-like form
    with 3ms suffix is best rendered 'his clouds.' 'Thick clouds' is possible, but
    the simpler 'clouds' keeps the line readable while preserving possession.
- source_word: וְלֹא
  chosen: yet ... not
  alternatives:
  - and ... not
  - but ... not
  lexicon: HALOT
  rationale: 'The conjunction marks contrast in context: despite the waters being
    bound in the clouds, the cloud does not burst. ''Yet'' brings out the adversative
    force naturally in English.'
- source_word: נִבְקַע
  chosen: is not split open
  alternatives:
  - is not torn open
  - does not burst
  - is not broken open
  lexicon: HALOT
  rationale: בקע in the Niphal commonly means to be split or cleft. 'Is not split
    open' preserves the passive sense and the vivid physical imagery. 'Burst' is interpretive
    and slightly more dynamic.
- source_word: עָנָן
  chosen: the cloud
  alternatives:
  - a cloud
  lexicon: HALOT
  rationale: Although singular, the noun can function collectively in poetry. Rendering
    it as 'the cloud' preserves the Hebrew singular while still making sense after
    'his clouds' as a collective or generic singular.
- source_word: תַּחְתָּם
  chosen: under them
  alternatives:
  - beneath them
  - under it
  lexicon: HALOT
  rationale: The suffix is 3mp, so 'under them' is the most straightforward rendering.
    The referent is likely the waters or cloud-masses. Retaining the plural avoids
    smoothing away the Hebrew form.
