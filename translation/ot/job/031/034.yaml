id: JOB.31.34
reference: Job 31:34
source:
  edition: WLC
  text: כִּ֤י אֶֽעֱר֨וֹץ הָ֘מ֤וֹן רַבָּ֗ה וּ/בוּז מִשְׁפָּח֥וֹת יְחִתֵּ֑/נִי וָ֝/אֶדֹּ֗ם
    לֹא אֵ֥צֵא פָֽתַח׀־־׃
translation:
  text: because I feared the great multitude, and the contempt of clans terrified
    me, so that I kept silent and did not go out the door—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the scorn of families.' The Hebrew מִשְׁפָּחוֹת can denote extended
      families or larger kinship groups; 'clans' was chosen to reflect the broader
      social sense.
    reason: lexical_alternative
  - marker: b
    text: The verse is part of Job's oath of innocence. The wording is elliptical
      in Hebrew; the sense is, 'if I feared public opinion ... so that I kept silent
      and stayed indoors.'
    reason: cultural_note
lexical_decisions:
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  - if
  lexicon: HALOT
  rationale: Here כִּי introduces the content of the implied oath/conditional scenario
    in Job's self-imprecation section. 'Because' best fits the clause sequence in
    English, explaining the hypothetical motive for silence.
- source_word: אֶעֱרוֹץ
  chosen: I feared
  alternatives:
  - I dreaded
  - I was terrified of
  lexicon: HALOT
  rationale: From ערץ, denoting dread or fear. 'I feared' is natural and sufficiently
    strong; 'dreaded' is possible but less idiomatic in this line.
- source_word: הָמוֹן רַבָּה
  chosen: the great multitude
  alternatives:
  - the great crowd
  - the many people
  lexicon: HALOT
  rationale: הָמוֹן is a crowd/multitude, modified by רַבָּה 'great/many.' 'The great
    multitude' preserves both size and social pressure in a relatively formal but
    readable way.
- source_word: וּבוּז מִשְׁפָּחוֹת
  chosen: and the contempt of clans
  alternatives:
  - and the scorn of families
  - and the contempt of the families
  lexicon: HALOT
  rationale: בּוּז means contempt/scorn. מִשְׁפָּחוֹת can mean families, clans, or
    kin-groups. 'Clans' better conveys broader social groupings in an ancient setting
    than the modern domestic sense of 'families.'
- source_word: יְחִתֵּנִי
  chosen: terrified me
  alternatives:
  - dismayed me
  - shattered me
  - frightened me
  lexicon: HALOT
  rationale: From חתת in the Hiphil, causing fear, dismay, or breaking down courage.
    'Terrified me' matches the emotional force and parallels 'I feared' without being
    redundant.
- source_word: וָאֶדֹּם
  chosen: so that I kept silent
  alternatives:
  - and I was silent
  - and I fell silent
  lexicon: HALOT
  rationale: 'From דמם, to be silent/still. The prefixed waw here is best taken sequentially/resultatively
    in context: fear led to silence. ''Kept silent'' expresses sustained restraint.'
- source_word: לֹא אֵצֵא פָתַח
  chosen: and did not go out the door
  alternatives:
  - and did not go out to the doorway
  - and did not go out of the entrance
  lexicon: HALOT
  rationale: יָצָא plus פֶּתַח denotes going out at the doorway/entrance. 'The door'
    is concise, idiomatic English that preserves the image of remaining inside out
    of fear.
