id: JOB.31.21
reference: Job 31:21
source:
  edition: WLC
  text: אִם הֲנִיפ֣וֹתִי עַל יָת֣וֹם יָדִ֑/י כִּֽי אֶרְאֶ֥ה בַ֝/שַּׁ֗עַר עֶזְרָתִֽ/י־־־׃
translation:
  text: if I have raised my hand against the fatherless because I saw that I had support
    in the gate—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the orphan.' The Hebrew term refers specifically to one deprived of
      a father and therefore socially vulnerable.
    reason: lexical_alternative
  - marker: b
    text: The 'gate' refers to the city gate, where elders judged cases and public
      decisions were made.
    reason: cultural_note
  - marker: c
    text: Literally 'my help'; here it means support or backing in a legal/public
      setting.
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  chosen: if
  alternatives:
  - if indeed
  - whether
  lexicon: HALOT
  rationale: Introduces the conditional oath formula in Job 31. A simple 'if' best
    preserves the structure leading into the implied curse in the following verse.
- source_word: הֲנִיפוֹתִי
  chosen: have raised
  alternatives:
  - have brandished
  - have waved
  - have lifted
  lexicon: HALOT
  rationale: From נוּף in the Hiphil, here idiomatically of lifting or brandishing
    the hand against someone in a threatening or violent sense. 'Raised' is natural
    English and preserves the hostile gesture without over-specifying the action.
- source_word: עַל
  chosen: against
  alternatives:
  - over
  - upon
  lexicon: HALOT
  rationale: With the hostile gesture 'raised my hand,' English 'against' best conveys
    adversative force.
- source_word: יָתוֹם
  chosen: the fatherless
  alternatives:
  - the orphan
  lexicon: HALOT
  rationale: Hebrew refers to a child deprived of a father and often socially vulnerable.
    'The fatherless' is a standard, precise rendering in legal and wisdom contexts;
    'orphan' is possible but slightly broader.
- source_word: יָדִי
  chosen: my hand
  lexicon: HALOT
  rationale: Literal body-part term retained because the idiom is transparent in English
    and carries juridical/violent force.
- source_word: כִּי
  chosen: because
  alternatives:
  - when
  - since
  lexicon: HALOT
  rationale: 'Here it gives the motive for the wrongful action: Job would be exploiting
    power because he perceived backing. ''Because'' best captures the causal sense.'
- source_word: אֶרְאֶה
  chosen: I saw
  alternatives:
  - I could see
  - I perceived
  lexicon: HALOT
  rationale: Simple past in English fits the conditional protasis naturally. The verb
    denotes perception, not merely physical sight.
- source_word: בַשַּׁעַר
  chosen: in the gate
  alternatives:
  - at the gate
  lexicon: HALOT
  rationale: The city gate was the place of legal proceedings and public authority.
    'In the gate' is a conventional and sufficiently transparent rendering; the cultural
    significance is preserved in a footnote.
- source_word: עֶזְרָתִי
  chosen: I had support
  alternatives:
  - my help
  - my influence
  - my backing
  lexicon: HALOT
  rationale: Literally 'my help,' but in context it refers to support or backing available
    in the legal/public forum of the gate. 'I had support' communicates the sense
    idiomatically without losing the power-dynamics of the verse.
