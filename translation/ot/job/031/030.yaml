id: JOB.31.30
reference: Job 31:30
source:
  edition: WLC
  text: וְ/לֹא נָתַ֣תִּי לַ/חֲטֹ֣א חִכִּ֑/י לִ/שְׁאֹ֖ל בְּ/אָלָ֣ה נַפְשֽׁ/וֹ־׃
translation:
  text: I have not allowed my mouth to sin by asking for his life with a curse.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with an oath.' The Hebrew noun can mean either 'curse/imprecation' or
      'oath,' but here the context of wishing harm favors 'curse.'
    reason: lexical_alternative
lexical_decisions:
- source_word: נָתַתִּי
  chosen: have not allowed
  alternatives:
  - did not give
  - did not permit
  lexicon: HALOT
  rationale: The idiom 'not give' with an infinitive expresses permitting or allowing.
    In English, 'have not allowed' communicates the sense naturally while preserving
    the volitional nuance of refusal.
- source_word: לַחֲטֹא
  chosen: to sin
  alternatives:
  - to miss
  - to do wrong
  lexicon: HALOT
  rationale: The infinitive of חטא here retains its standard moral sense, 'to sin.'
    It describes the wrongful act Job refused to permit.
- source_word: חִכִּי
  chosen: my mouth
  alternatives:
  - my palate
  - my tongue
  lexicon: HALOT
  rationale: Literally the noun can mean 'palate,' but in poetic usage it can stand
    metonymically for speech. 'My mouth' is the clearest idiomatic English equivalent
    in this context of verbal cursing.
- source_word: לִשְׁאֹל
  chosen: by asking for
  alternatives:
  - to ask for
  - to request
  - to seek
  lexicon: HALOT
  rationale: The infinitive introduces the content of the sinful speech. 'By asking
    for' makes explicit the instrumental relation to 'sin' in smooth English.
- source_word: בְּאָלָה
  chosen: with a curse
  alternatives:
  - by a curse
  - with an oath
  - with an imprecation
  lexicon: HALOT
  rationale: אָלָה commonly denotes a curse or imprecation, though in some contexts
    it can mean an oath. Here the context is hostile speech against an enemy, so 'with
    a curse' best fits. The oath sense is preserved in a footnote because the noun
    can bear that meaning.
- source_word: נַפְשׁוֹ
  chosen: his life
  alternatives:
  - his soul
  - him
  lexicon: HALOT
  rationale: נפשׁ often means 'life' or 'person.' In this context Job denies invoking
    a curse against the man's life, not making a metaphysical statement about the
    soul. 'His life' is the most natural and contextually precise rendering.
