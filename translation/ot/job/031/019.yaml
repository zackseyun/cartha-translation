id: JOB.31.19
reference: Job 31:19
source:
  edition: WLC
  text: אִם אֶרְאֶ֣ה א֭וֹבֵד מִ/בְּלִ֣י לְב֑וּשׁ וְ/אֵ֥ין כְּ֝ס֗וּת לָ/אֶבְיֽוֹן־׃
translation:
  text: if I have seen anyone perishing for lack of clothing, and the needy without
    covering—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'without clothing' for 'for lack of clothing.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the poor' instead of 'the needy.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  chosen: if
  alternatives:
  - when
  lexicon: HALOT
  rationale: Introduces a conditional clause in Job's oath of innocence. 'If' best
    preserves the protasis structure of the surrounding passage.
- source_word: אֶרְאֶה
  chosen: I have seen
  alternatives:
  - I saw
  - I see
  lexicon: HALOT
  rationale: Qal imperfect 1cs after אִם in this oath context is naturally rendered
    with English perfect ('have seen') to fit the retrospective self-imprecation running
    through the chapter.
- source_word: אֹבֵד
  chosen: anyone perishing
  alternatives:
  - someone perishing
  - one who is perishing
  - the perishing one
  lexicon: HALOT
  rationale: The participle from אבד denotes one who is perishing/ruined. 'Anyone
    perishing' gives idiomatic English while preserving the ongoing state. 'Anyone'
    makes explicit the indefinite singular sense.
- source_word: מִבְּלִי לְבוּשׁ
  chosen: for lack of clothing
  alternatives:
  - without clothing
  - from having no garment
  lexicon: HALOT
  rationale: 'The phrase expresses deprivation: literally ''from/without lack of clothing.''
    ''For lack of clothing'' is natural English and preserves the causal sense of
    destitution.'
- source_word: וְאֵין
  chosen: and ... without
  alternatives:
  - and there was no
  - or there was no
  lexicon: HALOT
  rationale: The existential negative introduces the second parallel line. In English,
    restructuring as 'and the needy without...' is smoother while retaining the sense
    'and there is/was no.'
- source_word: כְּסוּת
  chosen: covering
  alternatives:
  - garment
  - clothing
  lexicon: HALOT
  rationale: כְּסוּת refers to a covering or garment. 'Covering' preserves the lexical
    distinction from לְבוּשׁ in the previous colon and fits the poetic parallelism.
- source_word: לָאֶבְיוֹן
  chosen: the needy
  alternatives:
  - the poor
  - the destitute
  lexicon: HALOT
  rationale: אֶבְיוֹן denotes a poor/needy person. 'The needy' is clear modern English
    and captures material deprivation without over-specifying.
