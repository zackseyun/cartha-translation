theological_decisions:
- issue: Moral metaphor of 'the way'
  chosen_reading: Retain 'the way' rather than flattening to 'right conduct' or similar
    abstraction.
  alternative_readings:
  - from the right path
  - from proper conduct
  rationale: The verse uses concrete path imagery for ethical integrity. Preserving
    the metaphor maintains biblical diction and avoids interpretive overreach.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Anthropological language of heart and eyes
  chosen_reading: Preserve 'heart' and 'eyes' literally.
  alternative_readings:
  - mind and desires
  - inner self and what I saw
  rationale: The Hebrew presents desire as the heart following the eyes. Literal retention
    preserves theological and literary texture without obscuring meaning.
  doctrine_reference: Translation philosophy §1, §3, §6
