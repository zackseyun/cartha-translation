id: JOB.31.7
reference: Job 31:7
source:
  edition: WLC
  text: אִ֥ם תִּטֶּ֣ה אַשֻּׁרִ/י֮ מִנִּ֪י הַ֫/דָּ֥רֶךְ וְ/אַחַ֣ר עֵ֭ינַ/י הָלַ֣ךְ
    לִבִּ֑/י וּ֝/בְ/כַפַּ֗/י דָּ֣בַק מֻאֽוּם׃פ
translation:
  text: if my step has turned aside from the way, and my heart has gone after my eyes,
    and any stain has clung to my hands,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my heart has followed my eyes.'
    reason: lexical_alternative
  - marker: b
    text: Or 'any spot' or 'any blemish.' The Hebrew term can denote a stain, defect,
      or blemish.
    reason: lexical_alternative
lexical_decisions:
- source_word: תִּטֶּה
  chosen: has turned aside
  alternatives:
  - turns aside
  - has swerved
  lexicon: HALOT
  rationale: From נטה, here in an oath context introduced by אִם. 'Turned aside' captures
    deviation from a proper path more naturally than a wooden 'inclined.' The perfect-like
    English works well in the conditional self-imprecation sequence.
- source_word: אַשֻּׁרִי
  chosen: my step
  alternatives:
  - my stride
  - my footstep
  lexicon: HALOT
  rationale: The noun denotes step or gait. 'My step' is idiomatic in English and
    fits the metaphor of moral conduct.
- source_word: מִנִּי הַדָּרֶךְ
  chosen: from the way
  alternatives:
  - from the path
  - away from the road
  lexicon: HALOT
  rationale: The preposition plus noun expresses departure from the proper course.
    'The way' preserves the moral-metaphorical force common in biblical usage, while
    remaining natural English.
- source_word: וְאַחַר עֵינַי הָלַךְ לִבִּי
  chosen: my heart has gone after my eyes
  alternatives:
  - my heart has followed my eyes
  - my heart has pursued what my eyes saw
  lexicon: HALOT
  rationale: 'This clause is retained with close formal correspondence because the
    Hebrew idiom is intelligible in English and preserves the moral psychology: inward
    desire following visual attraction.'
- source_word: לִבִּי
  chosen: my heart
  alternatives:
  - my mind
  - my inner self
  lexicon: HALOT
  rationale: '''Heart'' is the standard biblical anthropological term and should be
    preserved rather than psychologized, since the Hebrew includes desire and volition,
    not merely intellect.'
- source_word: עֵינַי
  chosen: my eyes
  alternatives:
  - what I saw
  lexicon: HALOT
  rationale: A literal rendering preserves the vividness of the Hebrew and the connection
    between sight and desire.
- source_word: וּבְכַפַּי דָּבַק
  chosen: has clung to my hands
  alternatives:
  - has stuck to my palms
  - has adhered to my hands
  lexicon: HALOT
  rationale: דבק means cling/stick. 'Clung to my hands' is idiomatic and preserves
    the image of guilt or defilement attaching itself to one's deeds.
- source_word: מֻאוּם
  chosen: any stain
  alternatives:
  - any spot
  - any blemish
  - anything
  lexicon: HALOT
  rationale: The term can denote blemish, defect, or spot. In this ethical context,
    'stain' best conveys moral taint attached to one's actions. A more indefinite
    'anything' would underspecify the likely sense.
