id: JOB.31.17
reference: Job 31:17
source:
  edition: WLC
  text: וְ/אֹכַ֣ל פִּתִּ֣/י לְ/בַדִּ֑/י וְ/לֹא אָכַ֖ל יָת֣וֹם מִמֶּֽ/נָּה־׃
translation:
  text: if I ate my morsel by myself, and the fatherless did not eat from it—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the orphan.' The Hebrew literally refers to one who is fatherless.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאֹכַל
  chosen: if I ate
  alternatives:
  - and I ate
  - when I ate
  lexicon: HALOT
  rationale: In Job 31 the speaker uses a series of oath-like conditional clauses
    ('if I...'). Although the conjunction is simply waw, English idiom and the larger
    syntax favor rendering it as the protasis marker 'if' rather than a bare 'and.'
    The verb is Qal 1cs, 'I ate.'
- source_word: פִּתִּי
  chosen: my morsel
  alternatives:
  - my piece of bread
  - my food
  lexicon: HALOT
  rationale: The noun can denote a piece, bit, or morsel, often especially of bread/food.
    'Morsel' preserves the concrete, modest sense better than the broader 'food,'
    and avoids over-specifying 'bread' where the Hebrew itself does not require it.
- source_word: לְבַדִּי
  chosen: by myself
  alternatives:
  - alone
  - for myself alone
  lexicon: HALOT
  rationale: The phrase means 'by myself/alone.' 'By myself' reads naturally with
    eating and conveys solitary consumption. 'For myself alone' is interpretive and
    slightly stronger than the Hebrew.
- source_word: וְלֹא
  chosen: and ... did not
  alternatives:
  - and not
  - while ... not
  lexicon: HALOT
  rationale: The conjunction plus negation coordinates the second clause within the
    same conditional statement. English requires an explicit finite verb phrase for
    smooth sense.
- source_word: אָכַל
  chosen: did not eat
  alternatives:
  - has not eaten
  lexicon: HALOT
  rationale: The Qal perfect 3ms is best rendered here as simple past within the oath
    formula. English supplies 'did not eat' to match the preceding clause.
- source_word: יָתוֹם
  chosen: the fatherless
  alternatives:
  - the orphan
  lexicon: HALOT
  rationale: The Hebrew denotes one bereft of a father. 'The fatherless' is a close,
    traditional equivalent that preserves the social-legal nuance of vulnerability
    in the Hebrew Bible. 'Orphan' is possible and more idiomatic, but slightly broadens
    beyond the lexical form.
- source_word: מִמֶּנָּה
  chosen: from it
  alternatives:
  - from it, namely my morsel
  - from her
  lexicon: HALOT
  rationale: The feminine singular pronominal suffix refers back to the feminine noun
    'morsel.' English uses the impersonal 'it.' A literal 'from her' would be misleading
    in English.
