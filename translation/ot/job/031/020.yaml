id: JOB.31.20
reference: Job 31:20
source:
  edition: WLC
  text: אִם לֹ֣א בֵרֲכ֣וּ/נִי חלצ/ו וּ/מִ/גֵּ֥ז כְּ֝בָשַׂ/י יִתְחַמָּֽם־׃
translation:
  text: if his loins have not blessed me, and if he was not warmed by the fleece of
    my sheep—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from the wool of my sheep.' The Hebrew noun can refer to fleece or shorn
      wool.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'his loins,' a bodily expression referring to the needy person's
      body being clothed and warmed.
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם לֹא
  chosen: if ... not
  alternatives:
  - surely ... not
  lexicon: HALOT
  rationale: 'In Job''s oath formula, אִם with לֹא introduces a conditional self-imprecation
    context: ''if not...'' = ''if ... have not.'' English preserves the conditional
    force rather than paraphrasing the implied oath.'
- source_word: בֵרֲכוּנִי
  chosen: have not blessed me
  alternatives:
  - did not bless me
  - have not thanked me
  lexicon: HALOT
  rationale: ברך in the Piel commonly means 'bless.' Here the poor recipient's grateful
    response is in view, but 'blessed me' preserves the Hebrew idiom and emotional/theological
    register better than flattening to 'thanked me.'
- source_word: חֲלָצָיו
  chosen: his loins
  alternatives:
  - his body
  - his sides
  - his hips
  lexicon: HALOT
  rationale: חלץ refers literally to the loins/waist area. In context it stands metonymically
    for the needy person's body clothed and warmed by Job's provision. 'Loins' is
    the most text-faithful rendering, even if somewhat marked in English.
- source_word: וּמִגֵּז
  chosen: by the fleece
  alternatives:
  - from the wool
  - from the shearing
  lexicon: HALOT
  rationale: גֵּז denotes fleece/shorn wool. 'By the fleece' fits the instrumental
    sense with the following verb of warming; 'from the wool' is possible but less
    vivid.
- source_word: כְּבָשַׂי
  chosen: my sheep
  alternatives:
  - my lambs
  lexicon: HALOT
  rationale: כֶּבֶשׂ commonly denotes a sheep/lamb, but in this possessive plural
    context referring to fleece production, 'my sheep' is the most natural English
    rendering.
- source_word: יִתְחַמָּם
  chosen: he was not warmed
  alternatives:
  - he did not keep warm
  - he was not made warm
  lexicon: HALOT
  rationale: The Hitpael of חם expresses becoming warm. Because the clause is governed
    by the preceding oath-condition and refers to the needy individual represented
    by 'his loins,' English supplies 'he was not warmed' for clarity while preserving
    the passive/resultative sense.
