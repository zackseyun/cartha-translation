id: JOB.31.37
reference: Job 31:37
source:
  edition: WLC
  text: מִסְפַּ֣ר צְ֭עָדַ/י אַגִּידֶ֑/נּוּ כְּמוֹ נָ֝גִ֗יד אֲקָרֲבֶֽ/נּוּ־׃
translation:
  text: I would declare to him the number of my steps; like a prince I would approach
    him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I would tell him an account of my steps.'
    reason: lexical_alternative
  - marker: b
    text: '''Him'' may refer to God or to Job''s accuser in the immediate context.'
    reason: alternative_reading
  - marker: c
    text: Or 'like a ruler' or 'like a noble.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִסְפַּר
  chosen: the number of
  alternatives:
  - an account of
  - the count of
  lexicon: HALOT
  rationale: The noun denotes number or count. In context with 'my steps' it naturally
    means a full accounting of them, but 'the number of' preserves the concrete Hebrew
    expression without over-paraphrasing.
- source_word: צְעָדַי
  chosen: my steps
  alternatives:
  - my strides
  - my goings
  lexicon: HALOT
  rationale: The plural of צעד refers literally to steps or strides. 'My steps' is
    idiomatic English and preserves the metaphor of one's conduct or course of life
    without forcing an interpretive expansion.
- source_word: אַגִּידֶנּוּ
  chosen: I would declare to him
  alternatives:
  - I would tell him
  - I would report it to him
  lexicon: HALOT
  rationale: Hiphil of נגד commonly means declare, tell, make known. The 3ms suffix
    is best taken as indirect object in English, referring to the accuser/God in context.
    'Declare' fits Job's formal, forensic tone better than the more casual 'tell'.
- source_word: כְּמוֹ
  chosen: like
  alternatives:
  - as
  lexicon: HALOT
  rationale: The particle marks comparison. 'Like' is straightforward modern English
    and preserves the simile.
- source_word: נָגִיד
  chosen: a prince
  alternatives:
  - a ruler
  - a noble
  lexicon: HALOT
  rationale: נָגִיד denotes a leader, ruler, or prince. 'Prince' best captures the
    dignified, high-status nuance in this poetic comparison, expressing Job's confidence
    rather than political office narrowly.
- source_word: אֲקָרֲבֶנּוּ
  chosen: I would approach him
  alternatives:
  - I would come near to him
  - I would present myself to him
  lexicon: HALOT
  rationale: Piel of קרב means bring near or approach. In this context Job speaks
    of confidently drawing near for judgment. 'Approach him' is concise and preserves
    the personal object suffix.
