theological_decisions:
- issue: Referent of the 3ms suffixes in 'declare to him' and 'approach him'
  chosen_reading: Rendered generically as 'him,' leaving the immediate referent implicit
    in the verse while matching the Hebrew suffixes.
  alternative_readings:
  - God
  - my accuser
  rationale: In the surrounding context Job speaks both of an indictment written by
    his adversary and of his readiness to answer. The Hebrew here does not explicitly
    identify the referent, so the translation preserves that openness rather than
    resolving it interpretively.
  doctrine_reference: Preserve theological tension rather than resolve it.
