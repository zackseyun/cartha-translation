theological_decisions:
- issue: Whether מִמָּעַל should be expanded theologically as 'the God above' or 'God
    in heaven above'
  chosen_reading: God above
  alternative_readings:
  - God on high
  - God in heaven above
  rationale: The Hebrew is brief and should not be over-expanded. 'God above' preserves
    the vertical contrast with celestial worship in the immediate context without
    importing extra wording.
  doctrine_reference: 'Translation philosophy: original-language primacy; never paraphrase
    beyond what the source warrants.'
