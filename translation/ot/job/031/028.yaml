id: JOB.31.28
reference: Job 31:28
source:
  edition: WLC
  text: גַּם ה֭וּא עָוֺ֣ן פְּלִילִ֑י כִּֽי כִחַ֖שְׁתִּי לָ/אֵ֣ל מִ/מָּֽעַל־־׃
translation:
  text: this too would be an iniquity for the judges, for I would have denied God
    above.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'an iniquity punishable by judges,' 'a judicial offense,' or 'an iniquity
      for judgment.'
    reason: lexical_alternative
  - marker: b
    text: Or 'for I would have been false to God on high.'
    reason: lexical_alternative
lexical_decisions:
- source_word: גַּם
  chosen: too
  alternatives:
  - also
  - even
  lexicon: HALOT
  rationale: Adds this hypothetical act to the list of offenses Job is denying; 'too'
    is natural English in context.
- source_word: הוּא
  chosen: this
  alternatives:
  - it
  - that
  lexicon: HALOT
  rationale: Refers back to the conduct just mentioned in the previous verse. 'This'
    makes the demonstrative force clear in English.
- source_word: עָוֺן
  chosen: iniquity
  alternatives:
  - guilt
  - wrongdoing
  - sin
  lexicon: HALOT
  rationale: The term can denote guilt or iniquity. 'Iniquity' preserves the moral
    and juridical weight in this legal-sounding context.
- source_word: פְּלִילִי
  chosen: for the judges
  alternatives:
  - punishable by judges
  - a judicial offense
  - for judgment
  lexicon: HALOT
  rationale: The adjective/noun is related to judicial decision or magistrates. 'For
    the judges' is a concise rendering that reflects an offense subject to legal adjudication.
    The more explicit alternatives are possible and worth preserving in a footnote.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  lexicon: HALOT
  rationale: Introduces the reason the act would count as a judicial iniquity.
- source_word: כִחַשְׁתִּי
  chosen: I would have denied
  alternatives:
  - I would have lied to
  - I would have been false to
  - I would have disowned
  lexicon: HALOT
  rationale: In context of idolatry, the verb conveys denial or unfaithfulness toward
    God, not merely speaking falsely. The conditional sense is supplied by the broader
    hypothetical sequence in Job 31.
- source_word: לָאֵל
  chosen: God
  alternatives:
  - to God
  lexicon: HALOT
  rationale: The preposition is governed idiomatically by the verb 'deny/be false
    to'; English expresses the sense naturally as 'denied God.'
- source_word: מִמָּעַל
  chosen: above
  alternatives:
  - who is above
  - in heaven above
  - on high
  lexicon: HALOT
  rationale: Literally 'from above/on high.' Here it qualifies God as the God above,
    contrasting with heavenly bodies mentioned in the context. 'Above' is concise
    and close to the Hebrew.
