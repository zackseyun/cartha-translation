id: JOB.31.14
reference: Job 31:14
source:
  edition: WLC
  text: וּ/מָ֣ה אֶֽ֭עֱשֶׂה כִּֽי יָק֣וּם אֵ֑ל וְ/כִֽי יִ֝פְקֹ֗ד מָ֣ה אֲשִׁיבֶֽ/נּוּ־־׃
translation:
  text: And what would I do when God rises up? And when he calls me to account, what
    would I answer him?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'when he visits' / 'when he examines.' The Hebrew verb can mean to visit,
      inspect, or call to account; the context here favors judicial accountability.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמָה
  chosen: And what
  alternatives:
  - What then
  - And what then
  lexicon: HALOT
  rationale: Interrogative מָה with prefixed conjunction introduces Job's rhetorical
    question. 'And what' preserves the connective force and the abrupt self-questioning
    tone.
- source_word: אֶעֱשֶׂה
  chosen: would I do
  alternatives:
  - shall I do
  - could I do
  lexicon: HALOT
  rationale: Qal imperfect 1cs of עשה in rhetorical context is best rendered with
    English modal force, 'would I do,' expressing contemplated response in a hypothetical
    future situation.
- source_word: כִּי יָקוּם
  chosen: when ... rises up
  alternatives:
  - if ... rises up
  - when ... stands up
  - when ... acts
  lexicon: HALOT
  rationale: כִּי here is temporal in context, introducing the circumstance Job imagines.
    יָקוּם from קום literally means 'rise up/stand up'; in judicial-divine context
    it suggests God arising to act in judgment. 'When God rises up' preserves the
    metaphor without over-interpreting it.
- source_word: אֵל
  chosen: God
  alternatives:
  - God Almighty
  - the Mighty One
  lexicon: HALOT
  rationale: אֵל is the common divine title 'God' here. More expansive renderings
    are possible elsewhere but are not demanded by this verse.
- source_word: וְכִי יִפְקֹד
  chosen: And when he calls me to account
  alternatives:
  - and when he visits
  - and when he examines
  - and when he takes notice
  lexicon: HALOT
  rationale: פקד has a broad semantic range including visit, attend to, inspect, punish,
    or call to account. In parallel with 'what would I answer him,' the judicial sense
    is primary. 'Calls me to account' makes the implied forensic setting clear in
    natural English.
- source_word: מָה אֲשִׁיבֶנּוּ
  chosen: what would I answer him
  alternatives:
  - what would I reply to him
  - what could I answer him
  lexicon: HALOT
  rationale: Hiphil of שוב can mean 'return' and idiomatically 'answer, give back
    a response.' With 3ms suffix, 'answer him' is the natural English equivalent and
    fits the courtroom-like parallelism.
