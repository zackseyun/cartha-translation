id: JOB.31.32
reference: Job 31:32
source:
  edition: WLC
  text: בַּ֭/חוּץ לֹא יָלִ֣ין גֵּ֑ר דְּ֝לָתַ֗/י לָ/אֹ֥רַח אֶפְתָּֽח־׃
translation:
  text: The sojourner did not spend the night outside; I opened my doors to the traveler.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'The stranger did not lodge outside; I opened my door to the wayfarer.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּחוּץ
  chosen: outside
  alternatives:
  - in the street
  lexicon: HALOT
  rationale: The phrase denotes being outside, outdoors, or in the open. 'Outside'
    is the most natural modern English rendering here; 'in the street' is possible
    in context but is less directly tied to the Hebrew noun used.
- source_word: יָלִין
  chosen: did not spend the night
  alternatives:
  - did not lodge
  - did not remain overnight
  lexicon: HALOT
  rationale: From לין, referring specifically to passing the night or lodging overnight.
    'Did not spend the night' is clear modern English and preserves the temporal sense
    better than a bare 'did not stay'.
- source_word: גֵּר
  chosen: the sojourner
  alternatives:
  - the stranger
  - the foreigner
  - the resident alien
  lexicon: HALOT
  rationale: גֵּר commonly refers to a non-native person residing among a people,
    often with social vulnerability. 'Sojourner' preserves that status better than
    'stranger,' which can imply merely an unknown person, and is less technical than
    'resident alien.'
- source_word: דְּלָתַי
  chosen: my doors
  alternatives:
  - my door
  lexicon: HALOT
  rationale: The Hebrew form is plural with first-person singular suffix. English
    can idiomatically use either singular or plural, but 'my doors' better reflects
    the Hebrew form and suits the image of hospitality.
- source_word: לָאֹרַח
  chosen: to the traveler
  alternatives:
  - to the wayfarer
  - to the guest
  - to the road
  lexicon: HALOT
  rationale: אֹרַח can denote a traveler/wayfarer in context, not merely a road or
    path. Here the object of opening one's doors is a person needing lodging, so 'traveler'
    best fits the sense in accessible modern English.
- source_word: אֶפְתָּח
  chosen: I opened
  alternatives:
  - I would open
  lexicon: HALOT
  rationale: The imperfect here functions naturally in Job's self-defense as a past
    habitual or characteristic action. Simple past in English communicates the claim
    clearly in context.
