id: JOB.31.24
reference: Job 31:24
source:
  edition: WLC
  text: אִם שַׂ֣מְתִּי זָהָ֣ב כִּסְלִ֑/י וְ֝/לַ/כֶּ֗תֶם אָמַ֥רְתִּי מִבְטַחִֽ/י־׃
translation:
  text: If I have made gold my confidence, and said to fine gold, ‘You are my security,’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my hope' for 'my confidence' (כִּסְלִי).
    reason: lexical_alternative
  - marker: b
    text: '''Fine gold'' translates כֶּתֶם, referring to refined or pure gold.'
    reason: lexical_alternative
  - marker: c
    text: Or 'You are my trust' for 'You are my security' (מִבְטַחִי).
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  chosen: If
  alternatives:
  - if indeed
  - whether
  lexicon: HALOT
  rationale: Introduces a conditional/protasis in Job's oath of innocence. Simple
    'If' best fits the English conditional structure used throughout the chapter.
- source_word: שַׂמְתִּי
  chosen: I have made
  alternatives:
  - I set
  - I placed
  lexicon: HALOT
  rationale: From שׂים, 'to put/set/place.' In idiom with an object and predicate
    complement ('gold' + 'my confidence'), 'have made' communicates the resultant
    sense naturally in English while preserving the Hebrew claim.
- source_word: זָהָב
  chosen: gold
  lexicon: HALOT
  rationale: Straightforward lexical rendering.
- source_word: כִּסְלִי
  chosen: my confidence
  alternatives:
  - my hope
  - my trust
  lexicon: HALOT
  rationale: כֶּסֶל can denote confidence, trust, or hope. 'Confidence' fits the context
    of misplaced reliance on wealth and pairs well with the following noun מִבְטַחִי
    without collapsing the two terms into identical English words.
- source_word: וְלַכֶּתֶם
  chosen: and to fine gold
  alternatives:
  - and to pure gold
  - and to bullion
  lexicon: HALOT
  rationale: כֶּתֶם refers to refined/pure gold. 'Fine gold' is idiomatic, preserves
    the distinction from the previous זָהָב, and reflects the lamed marking the indirect
    object of 'said.'
- source_word: אָמַרְתִּי
  chosen: said
  alternatives:
  - have said
  lexicon: HALOT
  rationale: Simple past works smoothly in English within the conditional sequence;
    the perfect aspect in Hebrew here is well represented by English present perfect
    across the clause, but repeating 'have' is unnecessary after the first verb.
- source_word: מִבְטַחִי
  chosen: my security
  alternatives:
  - my trust
  - my refuge
  - my confidence
  lexicon: HALOT
  rationale: מִבְטָח denotes that in which one trusts, security, or object of trust.
    'My security' preserves the sense of something relied upon for safety and avoids
    repeating 'confidence' from כִּסְלִי, thus reflecting the Hebrew's lexical variation.
