theological_decisions:
- issue: Rendering Job's denial of trust in wealth
  chosen_reading: 'Expressed as a conditional self-imprecation-style denial: ''If
    I have made gold my confidence...'''
  alternative_readings:
  - If I have put my hope in gold...
  rationale: 'The verse is ethical/theological rather than doctrinally contested:
    Job denies idolatrous reliance on wealth. The translation preserves that moral-theological
    force without importing later doctrinal categories.'
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
