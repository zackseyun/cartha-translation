id: JOB.31.8
reference: Job 31:8
source:
  edition: WLC
  text: אֶ֭זְרְעָה וְ/אַחֵ֣ר יֹאכֵ֑ל וְֽ/צֶאֱצָאַ֥/י יְשֹׁרָֽשׁוּ׃
translation:
  text: then let me sow and another eat, and let my offspring be uprooted.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my produce be uprooted' or 'my descendants be rooted out.' The Hebrew
      צֶאֱצָא can refer to what springs forth, whether offspring or produce.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶזְרְעָה
  chosen: let me sow
  alternatives:
  - may I sow
  - I would sow
  lexicon: HALOT
  rationale: 'Qal cohortative 1cs of זרע in the imprecatory context of Job 31 is best
    rendered volitionally as part of a self-malediction: ''let me sow.'' This preserves
    the oath-curse force better than a simple future.'
- source_word: וְאַחֵר
  chosen: and another
  alternatives:
  - and someone else
  lexicon: HALOT
  rationale: אַחֵר means 'another' or 'someone else.' 'Another' is concise and preserves
    the contrast between Job and the one who benefits from his labor.
- source_word: יֹאכֵל
  chosen: eat
  alternatives:
  - consume
  lexicon: HALOT
  rationale: The verb אכל literally means 'eat.' In context it refers to enjoying
    the produce of what Job has sown. 'Eat' keeps the agricultural concreteness of
    the Hebrew.
- source_word: וְצֶאֱצָאַי
  chosen: my offspring
  alternatives:
  - my descendants
  - my produce
  lexicon: HALOT
  rationale: צֶאֱצָא can denote offspring/descendants and in some contexts what comes
    forth as produce. Here, because the following verb is 'be uprooted' and the verse
    parallels personal loss with agricultural curse, 'my offspring' best preserves
    the likely human/familial sense while allowing the metaphorical resonance. The
    alternative 'produce' is possible but less natural with the pronominal suffix
    in this oath context.
- source_word: יְשֹׁרָשׁוּ
  chosen: be uprooted
  alternatives:
  - be rooted out
  - be torn out by the roots
  lexicon: HALOT
  rationale: Piel 3mp of שׁרשׁ here is causative/intensive in sense, referring to
    being rooted out/uprooted. An English passive best conveys the imprecatory result
    on 'my offspring.' 'Be uprooted' is idiomatic and preserves the root imagery.
