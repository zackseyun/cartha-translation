id: JOB.31.40
reference: Job 31:40
source:
  edition: WLC
  text: תַּ֤חַת חִטָּ֨ה יֵ֥צֵא ח֗וֹחַ וְ/תַֽחַת שְׂעֹרָ֥ה בָאְשָׁ֑ה תַּ֝֗מּוּ דִּבְרֵ֥י
    אִיּֽוֹב׀־׃פ
translation:
  text: Instead of wheat, let thorns come up, and instead of barley, stinkweed. The
    words of Job are ended.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'foul weeds' or 'noxious weeds'; the exact plant named by the Hebrew
      is uncertain.
    reason: lexical_alternative
lexical_decisions:
- source_word: תַּחַת
  chosen: instead of
  alternatives:
  - in place of
  - under
  lexicon: HALOT
  rationale: In this imprecatory agricultural context, תַּחַת marks substitution rather
    than physical location, so 'instead of' best conveys the sense.
- source_word: חִטָּה
  chosen: wheat
  lexicon: HALOT
  rationale: Standard rendering for the grain crop named in contrast with harmful
    growth.
- source_word: יֵצֵא
  chosen: let ... come up
  alternatives:
  - spring up
  - grow
  lexicon: HALOT
  rationale: Although literally 'go out/come out,' with vegetation the idiomatic sense
    is emergence from the ground; 'come up' is natural English and preserves the image.
- source_word: חוֹחַ
  chosen: thorns
  alternatives:
  - thornbush
  - briers
  lexicon: HALOT
  rationale: A generic harmful thorny plant is intended. 'Thorns' is clear, idiomatic,
    and fits the curse formula.
- source_word: שְׂעֹרָה
  chosen: barley
  lexicon: HALOT
  rationale: Standard rendering of the cereal crop.
- source_word: בָאְשָׁה
  chosen: stinkweed
  alternatives:
  - foul weeds
  - noxious weeds
  - wild grapes
  lexicon: HALOT
  rationale: The noun denotes a noxious or foul-smelling plant growth. 'Stinkweed'
    preserves the likely semantic link to bad smell/stench and the contrast with useful
    barley. Because the exact botanical identification is uncertain, an alternative
    is preserved in a footnote.
- source_word: תַּמּוּ
  chosen: are ended
  alternatives:
  - are finished
  - have come to an end
  lexicon: HALOT
  rationale: This closing colophon-like statement marks completion. 'Are ended' is
    concise and suitably formal in tone.
- source_word: דִּבְרֵי אִיּוֹב
  chosen: the words of Job
  alternatives:
  - Job's words
  - the speeches of Job
  lexicon: HALOT
  rationale: A straightforward construct rendering that preserves the formal closing
    notice.
