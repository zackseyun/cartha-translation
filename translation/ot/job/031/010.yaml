theological_decisions:
- issue: Whether to make the sexual euphemism explicit in the main text
  chosen_reading: Retain the literal imagery ('grind' / 'kneel over her') in the main
    text and preserve the sexual sense in a footnote.
  alternative_readings:
  - then let my wife grind for another, and let others sleep with her
  - then let my wife be another man's concubine, and let other men lie with her
  rationale: The Hebrew uses concrete verbs that likely function euphemistically in
    context, but the text itself does not use an explicit verb for sexual intercourse.
    Optimal equivalence favors preserving the Hebrew imagery in the main text while
    documenting the probable sexual implication in a footnote rather than resolving
    the euphemism into a paraphrase.
  doctrine_reference: Translation philosophy §§1, 3, 6
