id: JOB.31.10
reference: Job 31:10
source:
  edition: WLC
  text: תִּטְחַ֣ן לְ/אַחֵ֣ר אִשְׁתִּ֑/י וְ֝/עָלֶ֗י/הָ יִכְרְע֥וּ/ן אֲחֵרִֽין׃
translation:
  text: then let my wife grind for another man, and let other men kneel over her.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly, 'let other men lie with her'; 'kneel over her' is likely a
      sexual euphemism in this context.
    reason: lexical_alternative
lexical_decisions:
- source_word: תִּטְחַן
  chosen: grind
  alternatives:
  - work as a grinder
  - become another man's slave
  lexicon: HALOT
  rationale: The verb טחן literally means 'grind' (as grain at a mill). In this curse
    context it likely carries both the literal image of servile labor and a sexual
    humiliation by implication, but the main text preserves the concrete Hebrew image
    rather than paraphrasing it.
- source_word: לְאַחֵר
  chosen: for another man
  alternatives:
  - for another
  - for someone else
  lexicon: HALOT
  rationale: אַחֵר means 'another/other.' Adding 'man' makes explicit the personal
    sense in context, since the verse concerns Job's wife in relation to other males.
- source_word: אִשְׁתִּי
  chosen: my wife
  alternatives:
  - my woman
  lexicon: HALOT
  rationale: Standard contextual sense of אִשָּׁה with first-person suffix is 'my
    wife.'
- source_word: וְעָלֶיהָ
  chosen: over her
  alternatives:
  - upon her
  lexicon: HALOT
  rationale: The preposition עַל with pronominal suffix is spatially rendered 'over
    her.' This preserves the physical imagery without softening it.
- source_word: יִכְרְעוּן
  chosen: kneel
  alternatives:
  - bow down
  - lie with
  lexicon: HALOT
  rationale: כרע ordinarily means 'kneel, bow down.' In this context many understand
    it as a sexual euphemism because of the parallelism and curse setting. The main
    text keeps the more literal verb, while a footnote preserves the likely euphemistic
    force.
- source_word: אֲחֵרִין
  chosen: other men
  alternatives:
  - others
  lexicon: HALOT
  rationale: The masculine plural adjective/substantive refers to other males in context;
    'other men' makes the sense explicit in idiomatic English.
