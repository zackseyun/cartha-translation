theological_decisions:
- issue: Rendering אֵל in a non-name context
  chosen_reading: God
  alternative_readings:
  - the Mighty One
  - El
  rationale: The verse refers to divine judgment and majesty without requiring preservation
    of the Hebrew form as a name. 'God' is the clearest English rendering and does
    not import additional doctrinal claims.
  doctrine_reference: 'Translation philosophy: readable modern English, not archaic
    or academic'
- issue: Sense of Job's motivation
  chosen_reading: Fear of divine calamity and majesty restrained him
  alternative_readings:
  - He feared punishment only
  - He feared God's exaltation in a more abstract sense
  rationale: The verse grounds Job's conduct in dread of divine disaster and reverence
    before God's majesty. The translation preserves both elements without reducing
    the statement to mere self-protective fear or abstract theology.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather
    than resolve it'
