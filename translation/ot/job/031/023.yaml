id: JOB.31.23
reference: Job 31:23
source:
  edition: WLC
  text: כִּ֤י פַ֣חַד אֵ֭לַ/י אֵ֣יד אֵ֑ל וּ֝/מִ/שְּׂאֵת֗/וֹ לֹ֣א אוּכָֽל׃
translation:
  text: For calamity from God was a terror to me, and because of his majesty I could
    not endure.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'For the disaster of God was dread to me.' The Hebrew can be rendered
      more formally with 'of God,' though the sense is likely calamity coming from
      God.
    reason: lexical_alternative
  - marker: b
    text: Or 'because of his exaltation I could not withstand it/him.' The noun may
      emphasize exaltation or majesty, and the verb may be rendered 'be able' or 'withstand.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces the reason for Job's preceding ethical restraint. 'For' fits
    the explanatory force in context.
- source_word: פַחַד
  chosen: a terror
  alternatives:
  - fear
  - dread
  lexicon: HALOT
  rationale: The noun denotes dread/terror rather than the act of fearing. 'A terror'
    preserves the nominal force and the intensity of Job's motivation.
- source_word: אֵלַי
  chosen: to me
  alternatives:
  - for me
  lexicon: HALOT
  rationale: The preposition with 1cs suffix marks relation to Job personally. 'To
    me' is idiomatic with 'was a terror' in English.
- source_word: אֵיד
  chosen: calamity
  alternatives:
  - disaster
  - ruin
  lexicon: HALOT
  rationale: The term commonly refers to destructive disaster or calamity. 'Calamity'
    is natural English and preserves the sense of impending judgment.
- source_word: אֵל
  chosen: from God
  alternatives:
  - of God
  - from the Mighty One
  lexicon: HALOT
  rationale: The construct phrase אֵיד אֵל is most naturally understood as calamity
    coming from God, not merely calamity characterized by greatness. 'God' is clearer
    than the more literal but less idiomatic 'El' or 'Mighty One' here.
- source_word: וּמִשְּׂאֵתוֹ
  chosen: because of his majesty
  alternatives:
  - from his exaltation
  - because of his lifting up
  - before his majesty
  lexicon: HALOT
  rationale: 'The noun שְׂאֵת can denote exaltation, elevation, or majesty. With the
    prefixed מִן it expresses causal relation here: Job could not act wickedly because
    of God''s exalted majesty.'
- source_word: לֹא אוּכָל
  chosen: I could not endure
  alternatives:
  - I was not able
  - I could not withstand
  lexicon: HALOT
  rationale: יכל expresses ability. In this context, with reference to God's majesty,
    'endure' communicates inability to stand up under or persist in the face of such
    divine greatness, in idiomatic English.
