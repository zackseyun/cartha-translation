id: JOB.31.35
reference: Job 31:35
source:
  edition: WLC
  text: מִ֤י יִתֶּן לִ֨/י שֹׁ֘מֵ֤עַֽ לִ֗/י הֶן תָּ֭וִ/י שַׁדַּ֣י יַעֲנֵ֑/נִי וְ/סֵ֥פֶר
    כָּ֝תַ֗ב אִ֣ישׁ רִיבִֽ/י־׀־׃
translation:
  text: Oh, that I had someone to hear me! Here is my signature—let the Almighty answer
    me; and let my accuser write out the indictment.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my mark' or 'my sign.' The Hebrew likely refers to Job's attesting mark
      placed on his declaration.
    reason: lexical_alternative
  - marker: b
    text: Or 'and let the man of my dispute write a document.' The Hebrew is more
      literally 'and a scroll/document the man of my dispute wrote,' but in context
      it expresses Job's wish for a written charge from his accuser.
    reason: alternative_reading
lexical_decisions:
- source_word: מִי יִתֶּן
  chosen: Oh, that I had
  alternatives:
  - Who will give
  - If only I had
  lexicon: HALOT
  rationale: The idiom מִי יִתֶּן expresses a wish or longing rather than a literal
    question about giving. English idiom is best conveyed with an optative expression
    such as 'Oh, that I had' or 'If only I had.'
- source_word: שֹׁמֵעַ לִי
  chosen: someone to hear me
  alternatives:
  - one hearing me
  - someone who would listen to me
  lexicon: HALOT
  rationale: The participle with לִי conveys a person who hears/listens to Job's case.
    'Hear me' preserves the legal/auditory sense, while 'someone' is supplied naturally
    from the idiom.
- source_word: הֶן
  chosen: Here is
  alternatives:
  - Behold
  - Look
  lexicon: HALOT
  rationale: הֶן is a deictic/interjection drawing attention. 'Here is' fits the immediate
    presentation of evidence in a legal setting more naturally than the archaic 'Behold.'
- source_word: תָּוִי
  chosen: my signature
  alternatives:
  - my mark
  - my sign
  lexicon: HALOT
  rationale: תָּו likely denotes a mark or sign, here functioning as Job's attestation
    to his defense. 'My signature' communicates the forensic sense in contemporary
    English, while 'mark' is preserved as an alternative.
- source_word: שַׁדַּי
  chosen: the Almighty
  lexicon: HALOT
  rationale: Standard rendering of the divine title שַׁדַּי in Job. It preserves the
    title's force without importing a more specific doctrinal nuance.
- source_word: יַעֲנֵנִי
  chosen: answer me
  alternatives:
  - respond to me
  lexicon: HALOT
  rationale: In this legal context, ענה means to answer or respond to Job's case.
    'Answer me' is direct and idiomatic.
- source_word: וְסֵפֶר
  chosen: and let ... write out the indictment
  alternatives:
  - and the document
  - and a scroll
  lexicon: HALOT
  rationale: סֵפֶר literally means a written document/book/scroll. In context with
    כתב and legal dispute language, the sense is a written charge or indictment. The
    English rendering brings out the legal function rather than the physical object
    alone.
- source_word: כָּתַב
  chosen: write out
  alternatives:
  - write
  - has written
  lexicon: HALOT
  rationale: 'Although morphologically perfect, the clause is best taken in Job''s
    wish sequence as volitive/jussive in sense: ''let ... write.'' ''Write out'' makes
    explicit the production of a formal written charge.'
- source_word: אִישׁ רִיבִי
  chosen: my accuser
  alternatives:
  - the man of my dispute
  - my adversary
  - my opponent in court
  lexicon: HALOT
  rationale: The phrase literally means 'the man of my dispute/contention.' In context
    it refers to the one bringing charges against Job, so 'my accuser' captures the
    legal role succinctly. The more literal alternatives are preserved.
