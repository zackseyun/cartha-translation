theological_decisions:
- issue: Forensic imagery in Job's appeal
  chosen_reading: Render the verse in explicit legal language ('signature,' 'accuser,'
    'indictment')
  alternative_readings:
  - More literal but less explicit wording such as 'my mark,' 'the man of my complaint/dispute,'
    and 'a book'
  rationale: The verse is framed as a formal challenge for vindication. Making the
    legal setting explicit reflects the plain sense of the Hebrew context without
    adding doctrinal content. This preserves Job's courtroom appeal before God rather
    than flattening it into a generic plea.
  doctrine_reference: 'Translation philosophy: optimal equivalence; original-language
    primacy over translation tradition; readable modern English'
