id: JOB.31.38
reference: Job 31:38
source:
  edition: WLC
  text: אִם עָ֭לַ/י אַדְמָתִ֣/י תִזְעָ֑ק וְ֝/יַ֗חַד תְּלָמֶ֥י/הָ יִבְכָּיֽוּ/ן־׃
translation:
  text: If my land cries out against me, and together its furrows weep,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'cry' for 'weep'; the Hebrew verb is the common word for weeping/lamenting,
      used here poetically of the furrows.
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  chosen: If
  alternatives:
  - If indeed
  lexicon: HALOT
  rationale: Introduces a conditional clause in Job's oath of innocence. Simple 'If'
    best fits the English conditional structure here.
- source_word: עָלַי
  chosen: against me
  alternatives:
  - concerning me
  - because of me
  - upon me
  lexicon: HALOT
  rationale: 'With זעק (''cry out''), the preposition על commonly carries an adversative
    sense in context: the land would be testifying against Job. ''Against me'' captures
    the forensic/moral force better than the more spatial ''upon me''.'
- source_word: אַדְמָתִי
  chosen: my land
  alternatives:
  - my ground
  - my soil
  lexicon: HALOT
  rationale: אדמה refers to arable ground/land. In this agricultural context, 'my
    land' is natural modern English and matches the possessive sense without sounding
    overly technical.
- source_word: תִזְעָק
  chosen: cries out
  alternatives:
  - cries
  - calls out
  lexicon: HALOT
  rationale: זעק denotes a strong cry, often of distress or accusation. 'Cries out'
    preserves the vivid personification and moral protest of the land.
- source_word: וְיַחַד
  chosen: and together
  alternatives:
  - and alike
  - and at the same time
  lexicon: HALOT
  rationale: יחד adds the sense of joint or simultaneous action. 'And together' preserves
    the poetic coordination between the land and its furrows.
- source_word: תְּלָמֶיהָ
  chosen: its furrows
  alternatives:
  - its plowed rows
  lexicon: HALOT
  rationale: תלם denotes a furrow made by plowing. 'Furrows' is the standard concise
    English equivalent and fits the agricultural imagery.
- source_word: יִבְכָּיוּן
  chosen: weep
  alternatives:
  - cry
  - lament
  lexicon: HALOT
  rationale: From בכה, 'to weep.' The verb extends the personification of the field.
    'Weep' is more vivid and distinct from the earlier 'cries out,' preserving the
    poetic parallelism.
