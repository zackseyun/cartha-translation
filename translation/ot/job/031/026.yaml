id: JOB.31.26
reference: Job 31:26
source:
  edition: WLC
  text: אִם אֶרְאֶ֣ה א֖וֹר כִּ֣י יָהֵ֑ל וְ֝/יָרֵ֗חַ יָקָ֥ר הֹלֵֽךְ־׃
translation:
  text: if I looked at the light when it shone, or at the moon moving in splendor,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the sun,' since 'the light' here likely refers to the sun in parallel
      with 'the moon.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the moon walking in brightness / splendor.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  chosen: if
  alternatives:
  - whether
  lexicon: HALOT
  rationale: Introduces a conditional clause in Job's oath of innocence. 'If' is the
    natural English equivalent here.
- source_word: אֶרְאֶה
  chosen: I looked
  alternatives:
  - I saw
  - I have looked
  lexicon: HALOT
  rationale: Qal imperfect 1cs of ראה in this oath context is best rendered with an
    English past sense, continuing the series of hypothetical acts Job denies having
    committed.
- source_word: אוֹר
  chosen: the light
  alternatives:
  - light
  - the sun
  lexicon: HALOT
  rationale: Literally 'light.' In context it likely refers to the sun as a heavenly
    body associated with astral veneration, but the Hebrew does not explicitly say
    'sun,' so 'the light' preserves the source wording while allowing the implication
    to remain.
- source_word: כִּי
  chosen: when
  alternatives:
  - that
  - because
  lexicon: HALOT
  rationale: 'Here כִּי introduces the circumstance accompanying the seeing: ''when
    it shone.'' ''When'' fits the idiom better than the more wooden ''that''.'
- source_word: יָהֵל
  chosen: it shone
  alternatives:
  - it was bright
  - it gave light
  lexicon: HALOT
  rationale: Hiphil of הלל/נהל-related shining sense in context denotes emitting brightness.
    'It shone' is concise, natural, and faithful.
- source_word: וְיָרֵחַ
  chosen: or at the moon
  alternatives:
  - and the moon
  lexicon: HALOT
  rationale: The conjunction links a second object of sight parallel to 'the light.'
    English idiom benefits from supplying 'at' from the first clause. 'Or' reflects
    the disjunctive sense in this conditional series better than a bare 'and.'
- source_word: יָקָר
  chosen: in splendor
  alternatives:
  - precious
  - splendid
  - glorious
  lexicon: HALOT
  rationale: Though the adjective can mean 'precious' or 'valuable,' with the moon
    it describes majestic brightness or magnificence. 'In splendor' conveys the adverbial
    force in idiomatic English.
- source_word: הֹלֵךְ
  chosen: moving
  alternatives:
  - going
  - proceeding
  lexicon: HALOT
  rationale: Participle of הלך describes the moon's course across the sky. 'Moving'
    is natural modern English and preserves the ongoing sense.
