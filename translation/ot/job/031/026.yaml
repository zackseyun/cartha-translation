theological_decisions:
- issue: Possible astral-worship context
  chosen_reading: Retain the literal celestial imagery without making the worship
    implication explicit in the main text.
  alternative_readings:
  - Translate אוֹר as 'sun' to foreground the anti-idolatry context
  rationale: The broader context (vv. 27–28) makes clear Job is denying attraction
    to heavenly bodies in a way associated with worship, but v. 26 itself only names
    'light' and 'moon.' The translation preserves the text's wording and lets the
    context supply the theological implication.
  doctrine_reference: Translation philosophy §1, §3
