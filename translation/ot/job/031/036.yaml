id: JOB.31.36
reference: Job 31:36
source:
  edition: WLC
  text: אִם לֹ֣א עַל שִׁ֭כְמִ/י אֶשָּׂאֶ֑/נּוּ אֶֽעֶנְדֶ֖/נּוּ עֲטָר֣וֹת לִֽ/י־־׃
translation:
  text: Surely I would carry it on my shoulder; I would bind it on myself like a crown.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'crowns' (plural); the sense may be an intensive plural, hence 'like
      a crown.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם לֹא
  chosen: Surely
  alternatives:
  - If only
  - Indeed
  lexicon: HALOT
  rationale: In this oath context, אִם לֹא functions idiomatically as a strong asseveration
    rather than a conditional clause. 'Surely' captures the emphatic force in natural
    English.
- source_word: עַל שִׁכְמִי
  chosen: on my shoulder
  alternatives:
  - upon my shoulder
  lexicon: HALOT
  rationale: A straightforward spatial expression. Singular 'shoulder' matches the
    Hebrew singular and preserves the image of publicly bearing the document or accusation.
- source_word: אֶשָּׂאֶנּוּ
  chosen: I would carry it
  alternatives:
  - I would bear it
  - I would lift it
  lexicon: HALOT
  rationale: From נשׂא, here in the sense of bearing/carrying. 'Carry' is idiomatic
    in English and fits the image of taking up the written indictment without shame.
- source_word: אֶעֶנְדֶנּוּ
  chosen: I would bind it on myself
  alternatives:
  - I would tie it on myself
  - I would adorn myself with it
  lexicon: HALOT
  rationale: The verb ענד commonly refers to putting on or fastening an ornament.
    'Bind it on myself' preserves the physical imagery and avoids over-interpreting
    the action as merely metaphorical adornment.
- source_word: עֲטָרוֹת
  chosen: like a crown
  alternatives:
  - as crowns
  - like crowns
  - as a garland
  lexicon: HALOT
  rationale: Though morphologically plural, the plural may be intensive/abstract or
    reflect a crown-like ornament. English idiom prefers singular 'a crown' in this
    simile. The plural alternative is worth preserving in a footnote because the Hebrew
    form is plural.
- source_word: לִי
  chosen: on myself
  alternatives:
  - for me
  - to me
  lexicon: HALOT
  rationale: 'With ענד, the dative pronoun is naturally expressed in English as reflexive
    application: Job would wear it himself. ''On myself'' makes the syntax and image
    clear.'
