id: JOB.31.18
reference: Job 31:18
source:
  edition: WLC
  text: כִּ֣י מִ֭/נְּעוּרַ/י גְּדֵלַ֣/נִי כְ/אָ֑ב וּ/מִ/בֶּ֖טֶן אִמִּ֣/י אַנְחֶֽ/נָּה׃
translation:
  text: for from my youth he raised me like a father, and from my mother’s womb I
    guided her.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'he made me grow up like a father' or 'I raised him like a father.' The
      Hebrew of this line is difficult, and some understand Job to be speaking of
      his care for the fatherless rather than of being raised.
    reason: alternative_reading
  - marker: b
    text: The feminine 'her' likely refers to the widow from the previous verse.
    reason: cross_reference
lexical_decisions:
- source_word: כִּי
  chosen: for
  alternatives:
  - indeed
  - surely
  - because
  lexicon: HALOT
  rationale: Introduces the ground for Job's denial in the surrounding context. 'For'
    fits the argumentative flow better than an asseverative 'indeed'.
- source_word: מִנְּעוּרַי
  chosen: from my youth
  alternatives:
  - from my childhood
  - since my youth
  lexicon: HALOT
  rationale: The phrase denotes the period beginning in youth. 'From my youth' is
    idiomatic and preserves the temporal force of the preposition.
- source_word: גְּדֵלַנִי
  chosen: he raised me
  alternatives:
  - he made me grow
  - he reared me
  lexicon: HALOT
  rationale: Qal of גדל with 1cs suffix most naturally means 'he caused me to grow
    up / raised me.' The masculine singular subject is left implicit in English; contextually
    it refers to the orphan/fatherless person personified, or more broadly Job's lifelong
    relation to such a one. 'Raised me' is the most natural English rendering while
    preserving the metaphor.
- source_word: כְאָב
  chosen: like a father
  alternatives:
  - as a father
  lexicon: HALOT
  rationale: The prefixed כ marks comparison. 'Like a father' preserves the simile
    clearly in modern English.
- source_word: וּמִבֶּטֶן אִמִּי
  chosen: and from my mother’s womb
  alternatives:
  - and from the womb of my mother
  - even from my mother's womb
  lexicon: HALOT
  rationale: A temporal idiom indicating the earliest stage of life. The more literal
    word order is smoothed slightly for readable English.
- source_word: אַנְחֶנָּה
  chosen: I guided her
  alternatives:
  - I led her
  - I guided it
  lexicon: HALOT
  rationale: Hiphil 1cs with 3fs suffix from נחה means 'I led/guided her.' The feminine
    suffix most naturally refers to the widow in the preceding verse, continuing Job's
    claim of care for the vulnerable. 'Guided' communicates sustained care better
    than the more generic 'led'.
