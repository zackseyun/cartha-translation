theological_decisions:
- issue: Referent shift within the verse
  chosen_reading: The first colon refers to the fatherless/orphan in masculine imagery
    ('he raised me like a father'), while the second colon shifts to the widow ('I
    guided her').
  alternative_readings:
  - Both cola refer metaphorically to Job's compassion from youth onward
  - The first colon should be emended or understood differently to avoid the unusual
    'he raised me' wording
  rationale: 'The Hebrew preserves a striking shift: masculine singular verb/suffix
    in the first colon and feminine singular suffix in the second. Rather than smoothing
    away the tension, the translation keeps the grammatical signals visible. This
    yields a somewhat compressed sense in English but best respects the source text.'
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
