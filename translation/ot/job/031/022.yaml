id: JOB.31.22
reference: Job 31:22
source:
  edition: WLC
  text: כְּ֭תֵפִ/י מִ/שִּׁכְמָ֣/ה תִפּ֑וֹל וְ֝/אֶזְרֹעִ֗/י מִ/קָּנָ֥/ה תִשָּׁבֵֽר׃
translation:
  text: then let my shoulder fall from its socket, and let my arm be broken from its
    bone.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from the shoulder'; the Hebrew likely describes the shoulder being torn
      from its place, hence 'from its socket.'
    reason: lexical_alternative
  - marker: b
    text: Or 'from the joint.' The rare Hebrew term may refer to the arm's bone or
      joint structure.
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּתֵפִי
  chosen: my shoulder
  alternatives:
  - my shoulder blade
  - my upper arm
  lexicon: HALOT
  rationale: כָּתֵף commonly denotes the shoulder/side. In this bodily-curse context,
    'shoulder' is the most natural English equivalent and pairs well with the following
    'arm.'
- source_word: מִשִּׁכְמָה
  chosen: from its socket
  alternatives:
  - from the shoulder
  - from the neck
  lexicon: HALOT
  rationale: שִׁכְמָה can denote shoulder/back area, but with the verb 'fall' in an
    imprecatory bodily injury formula, the sense is separation from the place where
    the limb is joined. 'From its socket' conveys the implied anatomical force in
    idiomatic English without excessive paraphrase.
- source_word: תִפּוֹל
  chosen: fall
  alternatives:
  - drop
  - be dislocated
  lexicon: HALOT
  rationale: The verb is literally 'fall.' English idiom allows 'fall from its socket'
    to preserve the concrete imagery while implying dislocation. 'Be dislocated' is
    interpretive and therefore kept as an alternative rather than the main gloss.
- source_word: וְאֶזְרֹעִי
  chosen: and my arm
  alternatives:
  - and my forearm
  lexicon: HALOT
  rationale: זְרוֹעַ normally means 'arm.' No contextual pressure requires a narrower
    anatomical term.
- source_word: מִקָּנָה
  chosen: from its bone
  alternatives:
  - from the joint
  - from the socket
  - from the reed
  lexicon: HALOT
  rationale: The noun here is rare and contextually anatomical. Traditional and contextual
    interpretation takes it as the arm's bone/joint structure. 'From its bone' preserves
    the concrete bodily image and matches the parallel curse. 'Reed' is a lexical
    possibility in other contexts but does not fit here.
- source_word: תִשָּׁבֵר
  chosen: be broken
  alternatives:
  - be shattered
  lexicon: HALOT
  rationale: 'The Niphal of שׁבר is straightforwardly passive/reflexive: ''be broken.''
    ''Shattered'' is stronger than the Hebrew requires.'
