id: JOB.31.11
reference: Job 31:11
source:
  edition: WLC
  text: כִּי הוא זִמָּ֑ה ו/היא עָוֺ֥ן פְּלִילִֽים־׃
translation:
  text: For that is a disgraceful act, and it is an iniquity for the judges.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'an iniquity punishable by judges.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces the reason for the preceding statement in Job's oath context.
    'For' fits the explanatory force in natural English.
- source_word: הוא
  chosen: that is
  alternatives:
  - it is
  - this is
  lexicon: HALOT
  rationale: The pronoun points back to the act under discussion (adultery in context).
    'That is' makes the referent clear in English without over-paraphrasing.
- source_word: זִמָּה
  chosen: a disgraceful act
  alternatives:
  - lewdness
  - an outrageous crime
  - wickedness
  lexicon: HALOT
  rationale: The noun denotes a heinous, especially sexually immoral, act. 'A disgraceful
    act' preserves the moral revulsion while remaining readable modern English. 'Lewdness'
    is possible but narrower and somewhat dated in tone.
- source_word: וְהִיא
  chosen: and it is
  alternatives:
  - and this is
  - and she/it is
  lexicon: HALOT
  rationale: The feminine pronoun agrees with the feminine noun זִמָּה and continues
    the predication about the same act. English naturally renders this as 'and it
    is.'
- source_word: עָוֺן
  chosen: an iniquity
  alternatives:
  - a guilt
  - a crime
  - wickedness
  lexicon: HALOT
  rationale: The term can denote guilt or iniquity; here, in parallel with judicial
    language, it describes a morally culpable offense. 'Iniquity' preserves the ethical
    weight better than the flatter 'wrong.'
- source_word: פְּלִילִים
  chosen: for the judges
  alternatives:
  - punishable by judges
  - for judgment
  - of the court(s)
  lexicon: HALOT
  rationale: The plural noun refers to judicial authorities or legal adjudication.
    In context, the sense is that the act is a matter for the courts. 'For the judges'
    is a concise rendering of the Hebrew genitival/judicial idea; the more interpretive
    'punishable by judges' is preserved in a footnote.
