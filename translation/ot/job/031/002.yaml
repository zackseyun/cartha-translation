theological_decisions:
- issue: Divine titles in Hebrew poetry
  chosen_reading: Translate אֱלוֹהַּ as 'God' and שַׁדַּי as 'the Almighty'
  alternative_readings:
  - God ... Shaddai
  rationale: The verse uses two poetic divine designations in parallel. Translating
    both preserves meaning for modern readers and follows the stated philosophy to
    translate titles rather than transliterate them.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §2 (Translate titles; transliterate
    names)'
