id: JOB.31.2
reference: Job 31:2
source:
  edition: WLC
  text: וּ/מֶ֤ה חֵ֣לֶק אֱל֣וֹהַּ מִ/מָּ֑עַל וְֽ/נַחֲלַ֥ת שַׁ֝דַּ֗י מִ/מְּרֹמִֽים׀׃
translation:
  text: And what is the portion from God above, and the inheritance from the Almighty
    on high?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from above ... from the heights.' The Hebrew phrases may be taken more
      adverbially, emphasizing the heavenly source of God's allotted portion and the
      Almighty's inheritance.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמֶה
  chosen: And what is
  alternatives:
  - And what
  - What
  lexicon: HALOT
  rationale: Interrogative מָה with prefixed conjunction introduces a rhetorical question
    continuing the argument. Rendering with 'And what is' makes the English clause
    complete and preserves the connective force.
- source_word: חֵלֶק
  chosen: portion
  alternatives:
  - share
  - allotment
  lexicon: HALOT
  rationale: חֵלֶק commonly denotes a portion or share allotted to someone. 'Portion'
    fits the wisdom context and pairs naturally with the parallel 'inheritance' in
    the second colon.
- source_word: אֱלוֹהַּ
  chosen: God
  alternatives:
  - God Most High
  lexicon: HALOT
  rationale: אֱלוֹהַּ is the singular common poetic form for God in Job. 'God' is
    the straightforward equivalent; 'Most High' would import language not present
    in this noun itself.
- source_word: מִמָּעַל
  chosen: from God above
  alternatives:
  - from above
  - from on high
  lexicon: HALOT
  rationale: The adverb/prepositional expression means 'from above.' In English, attaching
    it to 'God' ('God above') preserves the poetic sense and the parallel with 'on
    high' in the next colon, while still indicating source.
- source_word: וְנַחֲלַת
  chosen: and the inheritance
  alternatives:
  - and the heritage
  - and the possession
  lexicon: HALOT
  rationale: נַחֲלָה denotes an inheritance or allotted possession. 'Inheritance'
    best preserves the legal-allotment nuance and the poetic parallel to 'portion.'
- source_word: שַׁדַּי
  chosen: the Almighty
  alternatives:
  - Shaddai
  lexicon: HALOT
  rationale: Per translation philosophy, titles are translated rather than transliterated.
    In Job, שַׁדַּי is conventionally and accurately rendered 'the Almighty.'
- source_word: מִמְּרֹמִים
  chosen: on high
  alternatives:
  - from the heights
  - from heaven's heights
  lexicon: HALOT
  rationale: The noun denotes heights/high places. In this poetic parallelism, 'on
    high' is idiomatic English and matches the elevated divine setting without over-specifying
    'heaven,' which is not explicit.
