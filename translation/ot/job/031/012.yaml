id: JOB.31.12
reference: Job 31:12
source:
  edition: WLC
  text: כִּ֤י אֵ֣שׁ הִ֭יא עַד אֲבַדּ֣וֹן תֹּאכֵ֑ל וּֽ/בְ/כָל תְּב֖וּאָתִ֣/י תְשָׁרֵֽשׁ־־׃
translation:
  text: For it is a fire that consumes to destruction, and it would uproot all my
    produce.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'unto Abaddon.' The Hebrew אֲבַדּוֹן can denote 'destruction' or, in
      some contexts, the realm/personification of destruction.
    reason: alternative_reading
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - For indeed
  - Because
  lexicon: HALOT
  rationale: Introduces the ground or explanation for the preceding warning in Job's
    oath context. 'For' preserves the explanatory force without over-specifying nuance.
- source_word: אֵשׁ
  chosen: a fire
  alternatives:
  - fire
  lexicon: HALOT
  rationale: Literal image retained. The predicate nominative construction 'it is
    a fire' is preserved to keep the metaphor vivid.
- source_word: הִיא
  chosen: it is
  alternatives:
  - she is
  lexicon: HALOT
  rationale: The feminine pronoun agrees with 'fire' in Hebrew grammar; English idiom
    uses 'it' for the abstract referent, likely the sin under discussion (adultery/lust).
- source_word: עַד אֲבַדּוֹן
  chosen: to destruction
  alternatives:
  - unto Abaddon
  - all the way to ruin
  lexicon: HALOT
  rationale: The phrase intensifies the consuming effect. 'Destruction' is the plain-sense
    rendering of אבדון here. Because אבדון can also function as the proper noun 'Abaddon,'
    that alternative is preserved in a footnote, but the context here favors the common
    noun sense rather than a personified realm.
- source_word: תֹּאכֵל
  chosen: consumes
  alternatives:
  - devours
  - eats
  lexicon: HALOT
  rationale: The verb literally means 'eat/consume.' 'Consumes' fits the fire metaphor
    naturally in modern English and preserves the destructive sense.
- source_word: וּבְכָל
  chosen: and all
  alternatives:
  - and in all
  - and with all
  lexicon: HALOT
  rationale: The prefixed preposition ב is difficult to represent woodenly in English
    here; the sense is that the fire's destructive effect extends to the whole of
    Job's yield. 'And all' gives clear English while preserving scope.
- source_word: תְּבוּאָתִי
  chosen: my produce
  alternatives:
  - my increase
  - my yield
  - my crops
  lexicon: HALOT
  rationale: Refers to produce/yield/income from the land or labor. 'Produce' is broad
    enough to include agricultural increase while remaining readable. 'Yield' is possible,
    but 'produce' better suits the image of being uprooted.
- source_word: תְשָׁרֵשׁ
  chosen: would uproot
  alternatives:
  - would root out
  - would take root in
  - would destroy from the roots
  lexicon: HALOT
  rationale: 'Piel of שׁרשׁ here is causative/intensive: to root out or uproot. ''Would
    uproot'' preserves the agricultural metaphor and the totality of destruction.
    The modal ''would'' reflects the conditional/oath context carried over from the
    preceding verses, though the Hebrew form itself is imperfect.'
