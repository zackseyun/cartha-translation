theological_decisions:
- issue: Sense of אֲבַדּוֹן
  chosen_reading: common noun 'destruction'
  alternative_readings:
  - proper noun 'Abaddon'
  rationale: In this wisdom context the phrase most naturally describes the extent
    of ruin caused by the sin under discussion rather than invoking a named underworld
    figure. The alternative is worth preserving because the Hebrew form can bear that
    association elsewhere.
