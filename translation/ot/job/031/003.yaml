id: JOB.31.3
reference: Job 31:3
source:
  edition: WLC
  text: הֲ/לֹא אֵ֥יד לְ/עַוָּ֑ל וְ֝/נֵ֗כֶר לְ/פֹ֣עֲלֵי אָֽוֶן־׃
translation:
  text: Is not disaster for the unrighteous, and calamity for the workers of iniquity?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'ruin' for 'disaster' and 'misfortune' for 'calamity.'
    reason: lexical_alternative
  - marker: b
    text: Or 'for the unjust' and 'for the doers of evil.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲלֹא
  chosen: Is not
  alternatives:
  - Is it not
  - Surely
  lexicon: HALOT
  rationale: Introduces a rhetorical question expecting an affirmative answer. 'Is
    not' preserves the interrogative force and natural English style.
- source_word: אֵיד
  chosen: disaster
  alternatives:
  - ruin
  - calamity
  lexicon: HALOT
  rationale: Refers to destructive misfortune or ruin. 'Disaster' is clear modern
    English and fits the moral-consequence context without sounding archaic.
- source_word: לְעַוָּל
  chosen: for the unrighteous
  alternatives:
  - for the unjust
  - for the wrongdoer
  lexicon: HALOT
  rationale: The noun denotes one characterized by injustice or wrongdoing. 'The unrighteous'
    preserves the moral quality and aligns with biblical ethical vocabulary.
- source_word: וְנֵכֶר
  chosen: and calamity
  alternatives:
  - and misfortune
  - and alienation
  lexicon: HALOT
  rationale: In this context the term denotes a disastrous or fateful outcome parallel
    to אֵיד. 'Calamity' preserves the poetic parallelism while distinguishing it slightly
    from 'disaster.' The sense 'foreignness/alienation' is less suitable in this parallel
    judicial context.
- source_word: לְפֹעֲלֵי
  chosen: for the workers of
  alternatives:
  - for those who do
  - for the doers of
  lexicon: HALOT
  rationale: The participial form expresses habitual practice. 'Workers of' is a natural
    rendering that preserves the idiomatic Hebrew construction and its emphasis on
    ongoing action.
- source_word: אָוֶן
  chosen: iniquity
  alternatives:
  - evil
  - trouble
  - wickedness
  lexicon: HALOT
  rationale: The term can denote wickedness, trouble, or harmful wrongdoing. Here,
    paired with 'workers of,' it points to morally culpable evil. 'Iniquity' preserves
    the ethical weight and poetic register.
