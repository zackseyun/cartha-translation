theological_decisions:
- issue: Moral terminology in wisdom literature
  chosen_reading: Render the verse as a general principle of divine moral order without
    making the mechanism of judgment more explicit than the Hebrew does.
  alternative_readings:
  - Interpret as explicit divine punishment
  - Interpret as merely natural consequences
  rationale: The Hebrew states that disaster/calamity belongs to the unrighteous and
    evildoers, but does not specify in this verse whether the outcome is directly
    divine punishment or a broader moral order. The translation preserves that tension
    rather than resolving it.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
