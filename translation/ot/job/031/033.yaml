theological_decisions:
- issue: Interpretation of אָדָם in כְאָדָם
  chosen_reading: 'common noun: ''like a man'''
  alternative_readings:
  - 'proper name: ''like Adam'''
  - 'generic plural sense: ''as men do'''
  rationale: The Hebrew permits either a generic/common-noun reading or an allusion
    to Adam. In keeping with the doctrine's guidance for אָדָם ('man / humankind'
    according to context), the main text keeps the generic sense. Because the Adam
    reading is exegetically significant and longstanding, it is preserved in a footnote
    rather than excluded.
  doctrine_reference: 'DOCTRINE.md: Contested terms table for אָדָם; Translation philosophy
    #3 and #4'
