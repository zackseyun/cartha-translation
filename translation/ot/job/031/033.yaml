id: JOB.31.33
reference: Job 31:33
source:
  edition: WLC
  text: אִם כִּסִּ֣יתִי כְ/אָדָ֣ם פְּשָׁעָ֑/י לִ/טְמ֖וֹן בְּ/חֻבִּ֣/י עֲוֺֽנִ/י־׃
translation:
  text: if I have covered my transgressions like a man, by hiding my iniquity in my
    bosom—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “like Adam.” The Hebrew אָדָם can be read either as the common noun
      “man” or the proper name “Adam.”
    reason: alternative_reading
lexical_decisions:
- source_word: אִם
  chosen: if
  alternatives:
  - surely if
  lexicon: HALOT
  rationale: Introduces a conditional clause in Job's oath structure. English 'if'
    preserves the protasis without adding interpretive force.
- source_word: כִּסִּיתִי
  chosen: I have covered
  alternatives:
  - I covered
  - I concealed
  lexicon: HALOT
  rationale: From כסה, 'to cover, conceal.' 'Have covered' fits the oath-like retrospective
    sense in English while preserving the metaphor of covering rather than flattening
    it to 'concealed' in the main text.
- source_word: כְאָדָם
  chosen: like a man
  alternatives:
  - like Adam
  - as men do
  - like humankind
  lexicon: HALOT
  rationale: אָדָם can mean 'man/humankind' or function as the proper name 'Adam.'
    Following the doctrine's default for אָדָם, the main text uses the common noun
    sense 'man' here. This also fits the comparative כְ ('like/as'). Because the proper-name
    reading has a long interpretive history, it is preserved in a footnote.
- source_word: פְּשָׁעַי
  chosen: my transgressions
  alternatives:
  - my rebellion
  - my offenses
  - my sins
  lexicon: HALOT
  rationale: פֶּשַׁע often denotes transgression or rebellion. 'Transgressions' is
    a clear, established rendering that preserves the moral-legal nuance without overinterpreting
    toward political rebellion.
- source_word: לִטְמוֹן
  chosen: by hiding
  alternatives:
  - to hide
  - in order to hide
  lexicon: HALOT
  rationale: Infinitive construct of טמן, 'to hide/conceal.' 'By hiding' expresses
    the means or manner naturally in English and links well with the preceding clause.
- source_word: בְּחֻבִּי
  chosen: in my bosom
  alternatives:
  - in my lap
  - within myself
  - in secret
  lexicon: HALOT
  rationale: חֹב/חֹבֶן-related form here is traditionally understood idiomatically
    as 'bosom' or 'lap,' denoting a concealed inner place. 'In my bosom' preserves
    the concrete Hebrew image and the metaphor of hidden inwardness.
- source_word: עֲוֺנִי
  chosen: my iniquity
  alternatives:
  - my guilt
  - my sin
  lexicon: HALOT
  rationale: עָוֹן can denote iniquity, guilt, or the guilt-bearing consequence of
    sin. 'Iniquity' preserves the moral weight and pairs well with 'transgressions'
    without collapsing the semantic distinction.
