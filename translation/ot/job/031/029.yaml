theological_decisions:
- issue: Ethical nuance of Job's denial regarding an enemy's downfall
  chosen_reading: Render the verse as a denial of rejoicing/exulting over an enemy's
    ruin without intensifying it into explicit 'gloating' in the main text.
  alternative_readings:
  - If I rejoiced at my enemy's calamity and gloated when evil found him
  rationale: The verse concerns moral integrity toward one's enemy. The Hebrew strongly
    implies wrongful delight, but the main text should not overstate beyond the lexical
    evidence. The stronger nuance is preserved as an alternative lexical possibility.
  doctrine_reference: 'Translation philosophy: Preserve theological tension rather
    than resolve it; Original-language primacy over translation tradition.'
