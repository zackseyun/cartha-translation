id: JOB.31.29
reference: Job 31:29
source:
  edition: WLC
  text: אִם אֶ֭שְׂמַח בְּ/פִ֣יד מְשַׂנְאִ֑/י וְ֝/הִתְעֹרַ֗רְתִּי כִּֽי מְצָ֥א/וֹ רָֽע־־׃
translation:
  text: If I rejoiced at the ruin of the one who hates me, and exulted when evil found
    him—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'calamity' or 'disaster' for 'ruin.'
    reason: lexical_alternative
  - marker: b
    text: Literally, 'the one who hates me'; traditionally, 'my enemy.'
    reason: lexical_alternative
  - marker: c
    text: Or 'gloated' for 'exulted,' highlighting wrongful delight at another's harm.
    reason: lexical_alternative
  - marker: d
    text: Or 'harm' or 'misfortune found him.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  chosen: If
  alternatives:
  - whether
  lexicon: HALOT
  rationale: Introduces a conditional/protestation clause in Job's oath of innocence.
    'If' is the natural English equivalent in this self-imprecatory sequence.
- source_word: אֶשְׂמַח
  chosen: I rejoiced
  alternatives:
  - I was glad
  - I took joy
  lexicon: HALOT
  rationale: From שׂמח, denoting joy/rejoicing. Past-tense English fits the conditional
    retrospective sense of Job's protest. 'Rejoiced' preserves the moral weight better
    than the flatter 'was glad.'
- source_word: בְּפִיד
  chosen: at the ruin
  alternatives:
  - at the disaster
  - at the calamity
  lexicon: HALOT
  rationale: פִיד denotes disaster, ruin, or calamity, often with a sense of destructive
    downfall. 'Ruin' is concise and idiomatic here, though 'disaster/calamity' are
    viable alternatives.
- source_word: מְשַׂנְאִי
  chosen: of the one who hates me
  alternatives:
  - of my enemy
  - of my hater
  lexicon: HALOT
  rationale: The participial form literally means 'my hater' or 'the one hating me.'
    Rendering it as 'the one who hates me' preserves the verbal force more transparently
    than the interpretive shorthand 'my enemy.'
- source_word: וְהִתְעֹרַרְתִּי
  chosen: and exulted
  alternatives:
  - and stirred myself up
  - and became excited
  - and gloated
  lexicon: HALOT
  rationale: The Hitpolel/Hitpael-like form of עור here conveys rousing oneself emotionally,
    in context parallel to rejoicing over an enemy's downfall. 'Exulted' captures
    the heightened celebratory sense without overinterpreting as malicious 'gloating,'
    though that nuance is near.
- source_word: כִּי
  chosen: when
  alternatives:
  - because
  - that
  lexicon: HALOT
  rationale: 'Here כִּי introduces the circumstance in which the exulting would occur:
    ''when evil found him.'' ''Because'' is possible, but ''when'' better fits the
    temporal sense in context.'
- source_word: מְצָאוֹ
  chosen: evil found him
  alternatives:
  - harm overtook him
  - trouble came upon him
  lexicon: HALOT
  rationale: מצא with a pronominal suffix can mean 'befall, overtake' in context.
    'Found him' is a vivid and sufficiently natural English rendering that stays close
    to the Hebrew imagery.
- source_word: רָע
  chosen: evil
  alternatives:
  - harm
  - disaster
  - misfortune
  lexicon: HALOT
  rationale: רָע here refers to adversity or harmful circumstance rather than moral
    evil committed by the subject. 'Evil' preserves the Hebrew term's breadth and
    the terseness of the line; alternatives narrow it toward 'misfortune' or 'harm.'
