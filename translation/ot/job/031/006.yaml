id: JOB.31.6
reference: Job 31:6
source:
  edition: WLC
  text: יִשְׁקְלֵ֥/נִי בְ/מֹאזְנֵי צֶ֑דֶק וְ/יֵדַ֥ע אֱ֝ל֗וֹהַּ תֻּמָּתִֽ/י־׃
translation:
  text: Let him weigh me in honest scales, and let God know my integrity.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in scales of righteousness' or 'in just balances.'
    reason: lexical_alternative
  - marker: b
    text: Or 'my blamelessness' or 'my innocence.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יִשְׁקְלֵנִי
  chosen: Let him weigh me
  alternatives:
  - May he weigh me
  - He should weigh me
  lexicon: HALOT
  rationale: 'Qal imperfect of שקל with 1cs suffix, here functioning jussively in
    context: Job invites examination. ''Let him weigh me'' preserves the volitional
    nuance and the forensic metaphor.'
- source_word: בְּמֹאזְנֵי צֶדֶק
  chosen: in honest scales
  alternatives:
  - in scales of righteousness
  - in just balances
  lexicon: HALOT
  rationale: מוֹאזְנַיִם denotes scales/balances. צֶדֶק can mean righteousness, justice,
    or honesty/fairness in judicial/commercial imagery. 'Honest scales' is idiomatic
    modern English that preserves the metaphor of fair measurement without sounding
    wooden.
- source_word: וְיֵדַע
  chosen: and let ... know
  alternatives:
  - then ... will know
  - so that ... may know
  lexicon: HALOT
  rationale: The conjunction plus imperfect can continue the jussive sense from the
    previous verb. Rendering it as 'and let ... know' preserves the parallel volitional
    force better than a simple future.
- source_word: אֱלוֹהַּ
  chosen: God
  alternatives:
  - God Almighty
  lexicon: HALOT
  rationale: אֱלוֹהַּ is the singular poetic form 'God,' common in Job. Nothing in
    this verse itself requires expansion to 'God Almighty.'
- source_word: תֻּמָּתִי
  chosen: my integrity
  alternatives:
  - my blamelessness
  - my innocence
  lexicon: HALOT
  rationale: תֻּמָּה denotes integrity, completeness, or blamelessness. 'Integrity'
    best fits Job's claim of moral uprightness without overstating sinlessness; it
    also matches the self-vindication context of Job 31.
