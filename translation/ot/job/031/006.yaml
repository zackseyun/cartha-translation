theological_decisions:
- issue: Force of Job's self-description
  chosen_reading: my integrity
  alternative_readings:
  - my innocence
  - my blamelessness
  rationale: The verse presents Job asking for fair divine evaluation, not asserting
    absolute sinlessness. 'Integrity' preserves the moral claim while avoiding a doctrinally
    loaded overstatement.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather
    than resolve it)
