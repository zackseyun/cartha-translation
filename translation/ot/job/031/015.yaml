theological_decisions:
- issue: Referent of the second person in Job's argument about social inferiors
  chosen_reading: The verse affirms that both Job and his servant/slave were made
    by the same divine Creator in the womb.
  alternative_readings:
  - The verse could be generalized to any fellow human, not only the servant/slave
    of the immediate context.
  rationale: The immediate context (Job 31:13–14) concerns Job's treatment of his
    male and female slaves/servants. Verse 15 grounds ethical equality in common creation.
    The translation keeps the singular 'him' from the Hebrew while allowing the broader
    implication to remain implicit rather than paraphrased.
  doctrine_reference: Affirmations; Translation philosophy 1, 3
- issue: Nuance of shared prenatal origin in 'one womb'
  chosen_reading: The phrase is retained literally enough to preserve the poetic claim
    of common human origin before God, without forcing a biological claim that Job
    and his servant had the same mother.
  alternative_readings:
  - '''the same womb'''
  - '''one and the same womb'''
  rationale: The Hebrew poetic expression emphasizes equal formation by God and shared
    humanity. A more explicit rendering like 'the same womb' is possible, but 'one
    womb' stays closer to the source while remaining intelligible.
  doctrine_reference: Translation philosophy 3, 6
