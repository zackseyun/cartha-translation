id: JOB.31.15
reference: Job 31:15
source:
  edition: WLC
  text: הֲֽ֝/לֹא בַ֭/בֶּטֶן עֹשֵׂ֣/נִי עָשָׂ֑/הוּ וַ֝/יְכֻנֶ֗/נּוּ בָּ/רֶ֥חֶם אֶחָֽד־׃
translation:
  text: Did not he who made me in the womb make him, and form us in one womb?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and did not one form us in the womb?' The Hebrew phrase 'one womb' may
      also be understood more idiomatically as 'the same womb,' emphasizing shared
      human origin.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲלֹא
  chosen: Did not
  alternatives:
  - Is it not
  - Did ... not
  lexicon: HALOT
  rationale: Introduces a rhetorical question expecting an affirmative answer. 'Did
    not' preserves the interrogative force naturally in English.
- source_word: בַּבֶּטֶן
  chosen: in the womb
  alternatives:
  - in the belly
  lexicon: HALOT
  rationale: בטן here refers to the womb as the place of prenatal formation, not merely
    the abdomen. 'Womb' is the clear contextual English equivalent.
- source_word: עֹשֵׂנִי
  chosen: he who made me
  alternatives:
  - my Maker
  - the one making me
  lexicon: HALOT
  rationale: 'The participle with 1cs suffix functions substantivally: ''the one who
    made me.'' This keeps the personal and verbal force better than the more interpretive
    title ''my Maker.'''
- source_word: עָשָׂהוּ
  chosen: make him
  alternatives:
  - made him
  lexicon: HALOT
  rationale: 'Refers to Job''s servant/slave in the preceding context. English infinitive
    ''make'' after ''Did not he who made me...'' yields idiomatic parallelism: ''make
    me ... make him.'''
- source_word: וַיְכֻנֶנּוּ
  chosen: form us
  alternatives:
  - establish us
  - fashion us
  lexicon: HALOT
  rationale: כון in the polel/hophal-related formation here carries the sense of shaping
    or forming in the womb. Because the suffix is best taken as first common plural
    in context, 'form us' captures Job's point that both he and the other person share
    the same divine prenatal formation.
- source_word: בָּרֶחֶם
  chosen: in one womb
  alternatives:
  - in the womb
  lexicon: HALOT
  rationale: רחם specifically denotes the womb. Combined with אֶחָד, the phrase stresses
    common origin and equal creatureliness.
- source_word: אֶחָד
  chosen: one
  alternatives:
  - the same
  - single
  lexicon: HALOT
  rationale: Rendered literally as 'one' to preserve the compact Hebrew emphasis on
    shared origin; in English this yields 'one womb,' with the sense 'the same womb'
    preserved by context.
