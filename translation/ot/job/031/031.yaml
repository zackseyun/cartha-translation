id: JOB.31.31
reference: Job 31:31
source:
  edition: WLC
  text: אִם לֹ֣א אָ֭מְרוּ מְתֵ֣י אָהֳלִ֑/י מִֽי יִתֵּ֥ן מִ֝/בְּשָׂר֗/וֹ לֹ֣א נִשְׂבָּֽע־־׃
translation:
  text: if the men of my tent have not said, ‘Who is there that has not been filled
    with his meat?’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the men of my household,' since 'tent' can stand for one's household
      or domestic circle.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'from his flesh'; here the sense is provision from Job's table, that
      is, meat/food supplied by him.
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם לֹא
  chosen: if ... not
  alternatives:
  - surely
  - indeed ... not
  lexicon: HALOT
  rationale: In Job's oath formula, אִם with לֹא introduces a conditional protestation,
    effectively 'if not' = 'surely.' Retaining 'if ... not' preserves the Hebrew oath
    structure and fits the surrounding context of self-imprecation in Job 31.
- source_word: אָמְרוּ
  chosen: have not said
  alternatives:
  - did not say
  - have not been saying
  lexicon: HALOT
  rationale: Perfect 3cp in this context is naturally rendered as a completed statement
    within Job's retrospective oath. Present perfect English reads idiomatically while
    preserving the force.
- source_word: מְתֵי אָהֳלִי
  chosen: the men of my tent
  alternatives:
  - the men of my household
  - my household members
  - the people of my tent
  lexicon: HALOT
  rationale: Literally 'men of my tent.' This likely refers to members/servants of
    Job's household, but the concrete image of 'tent' is preserved in the main text
    for transparency. A household-oriented alternative is worth preserving in a footnote.
- source_word: מִי יִתֵּן
  chosen: Who is there that
  alternatives:
  - Who can find one who
  - Who would give that
  lexicon: HALOT
  rationale: 'Here the idiom introduces an exclamatory rhetorical question: ''Who
    is there who...?'' rather than the more common optative sense ''Who will give...?''
    The chosen rendering communicates the idiomatic force in natural English.'
- source_word: מִבְּשָׂרוֹ
  chosen: with his meat
  alternatives:
  - from his flesh
  - with his food
  lexicon: HALOT
  rationale: Though בָּשָׂר literally means 'flesh,' in this context it refers to
    food provided by Job, especially meat from his table. 'Meat' preserves the lexical
    link more closely than the broader 'food,' while avoiding the misleadingly literal
    'flesh' in English.
- source_word: לֹא נִשְׂבָּע
  chosen: has not been filled
  alternatives:
  - has not been satisfied
  - has not eaten his fill
  lexicon: HALOT
  rationale: The Niphal of שׂבע means 'to be satisfied, filled.' In context of hospitality
    and provision, 'been filled' is a close rendering; the sense of eating to satisfaction
    is preserved. 'Satisfied' is possible but less concrete.
