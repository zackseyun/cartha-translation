id: JOB.31.25
reference: Job 31:25
source:
  edition: WLC
  text: אִם אֶ֭שְׂמַח כִּי רַ֣ב חֵילִ֑/י וְ/כִֽי כַ֝בִּ֗יר מָצְאָ֥ה יָדִֽ/י־־־׃
translation:
  text: if I rejoiced because my wealth was abundant, and because my hand had found
    great gain—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my hand had acquired much' / 'my hand had gained greatly.' The Hebrew
      literally says 'my hand had found great [things/gain],' an idiom for obtaining
      by one's own effort.
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  chosen: if
  alternatives:
  - whether
  lexicon: HALOT
  rationale: Introduces a conditional/protasis in Job's oath of innocence. 'If' is
    the natural English equivalent in this self-imprecatory sequence.
- source_word: אֶשְׂמַח
  chosen: I rejoiced
  alternatives:
  - I was glad
  - I exulted
  lexicon: HALOT
  rationale: From שׂמח, expressing joy/rejoicing. 'Rejoiced' preserves the moral force
    of taking delight in wealth, fitting the conditional confession structure.
- source_word: כִּי
  chosen: because
  alternatives:
  - that
  - when
  lexicon: HALOT
  rationale: Here כִּי gives the reason for the rejoicing, not merely content. 'Because'
    best reflects the causal sense in both clauses.
- source_word: רַב
  chosen: abundant
  alternatives:
  - great
  - much
  lexicon: HALOT
  rationale: Describes the extent of Job's חֵיל. 'Abundant' reads naturally with 'wealth'
    and conveys quantity rather than status alone.
- source_word: חֵילִי
  chosen: my wealth
  alternatives:
  - my substance
  - my possessions
  - my resources
  lexicon: HALOT
  rationale: חַיִל can denote wealth, resources, or substance in wisdom contexts.
    Here material prosperity is in view, so 'wealth' is the clearest modern rendering.
- source_word: וְכִי
  chosen: and because
  alternatives:
  - and that
  - and when
  lexicon: HALOT
  rationale: Coordinates a second causal clause parallel to the first. 'And because'
    preserves the Hebrew structure and rhetorical balance.
- source_word: כַבִּיר
  chosen: great
  alternatives:
  - much
  - mighty
  - abundant
  lexicon: HALOT
  rationale: An adjective of magnitude/intensity. With what Job's hand has acquired,
    'great' is idiomatic and preserves the sense of substantial amount.
- source_word: מָצְאָה יָדִי
  chosen: my hand had found
  alternatives:
  - my hand had acquired
  - my hand had gained
  - my hand had gotten
  lexicon: HALOT
  rationale: Literally 'my hand found.' The idiom refers to what one's own power or
    effort obtains. Retaining 'my hand had found' preserves the Hebrew imagery and
    the emphasis on personal agency, which is central to Job's denial.
