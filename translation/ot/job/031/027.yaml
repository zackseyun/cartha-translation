theological_decisions:
- issue: Possible reference to idolatrous astral worship gesture
  chosen_reading: Retain the concrete bodily action in the main text without making
    the idolatry explicit in added wording.
  alternative_readings:
  - and threw a kiss from my hand
  - and kissed my hand toward my mouth as an act of homage
  rationale: The broader context (vv. 26–28) makes the gesture one of worship toward
    the sun or moon, but this verse itself states the action rather than naming the
    worship act directly. Following optimal equivalence, the translation preserves
    the physical wording and explains the idiomatic/cultural sense in a footnote rather
    than importing interpretation into the main text.
  doctrine_reference: Translation philosophy §§1, 3, 6
