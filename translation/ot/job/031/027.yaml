id: JOB.31.27
reference: Job 31:27
source:
  edition: WLC
  text: וַ/יִּ֣פְתְּ בַּ/סֵּ֣תֶר לִבִּ֑/י וַ/תִּשַּׁ֖ק יָדִ֣/י לְ/פִֽ/י׃
translation:
  text: and my heart was secretly enticed, and my hand kissed my mouth—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically in context, 'and threw a kiss from my hand'—likely
      a gesture of homage associated with worship of the heavenly bodies.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּפְתְּ
  chosen: was enticed
  alternatives:
  - was deceived
  - was seduced
  - was persuaded
  lexicon: HALOT
  rationale: From פתה in the passive/intransitive sense, referring to being drawn
    in or seduced. In context of illicit astral veneration (vv. 26–28), 'enticed'
    captures inward seduction better than the more generic 'persuaded' and avoids
    overstatement beyond the text.
- source_word: בַּסֵּתֶר
  chosen: secretly
  alternatives:
  - in secret
  - in hiding
  lexicon: HALOT
  rationale: The noun סתר means secrecy/hiddenness. Rendering adverbially as 'secretly'
    is natural English and preserves the sense that the act begins inwardly and covertly.
- source_word: לִבִּי
  chosen: my heart
  lexicon: HALOT
  rationale: לֵב/לֵבָב commonly denotes the inner person, will, or affections. 'My
    heart' is the standard and sufficiently transparent rendering here.
- source_word: וַתִּשַּׁק
  chosen: kissed
  alternatives:
  - blew a kiss to
  lexicon: HALOT
  rationale: נשק is the ordinary verb 'to kiss.' The context likely refers to a gesture
    of reverence toward heavenly bodies, but the main text should preserve the concrete
    action 'kissed'; the more interpretive idiom is better preserved in a footnote.
- source_word: יָדִי
  chosen: my hand
  lexicon: HALOT
  rationale: Straightforward lexical rendering. The hand is the instrument of the
    reverential gesture.
- source_word: לְפִי
  chosen: my mouth
  alternatives:
  - to my mouth
  lexicon: HALOT
  rationale: Literally 'to my mouth.' In idiomatic English after 'kissed,' 'my mouth'
    communicates the gesture smoothly while retaining the concrete imagery. The underlying
    preposition is preserved in a footnote-worthy note about the likely ritual action.
