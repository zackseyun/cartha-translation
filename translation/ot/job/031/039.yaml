id: JOB.31.39
reference: Job 31:39
source:
  edition: WLC
  text: אִם כֹּ֭חָ/הּ אָכַ֣לְתִּי בְלִי כָ֑סֶף וְ/נֶ֖פֶשׁ בְּעָלֶ֣י/הָ הִפָּֽחְתִּי־־׃
translation:
  text: if I have eaten its produce without payment, or caused its owners to lose
    heart—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'caused the life of its owners to expire' or 'made its
      owners gasp.' The Hebrew verb is rare and the clause may express either extreme
      oppression or causing death.
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּחָהּ
  chosen: its produce
  alternatives:
  - its strength
  - its yield
  lexicon: HALOT
  rationale: כֹּחַ literally means 'strength/power,' but in agricultural contexts
    it can denote the productive power or yield of land. Here, with the feminine suffix
    referring to the land/field in the surrounding context, 'its produce' best conveys
    the idiom in natural English while preserving the sense of what the land yields.
- source_word: אָכַלְתִּי
  chosen: I have eaten
  alternatives:
  - I ate
  - I consumed
  lexicon: HALOT
  rationale: The verb is the common 'eat.' In context it refers to consuming the produce
    of the land. 'I have eaten' works well in English within Job's oath formula introduced
    by אִם, preserving the first-person perfect sense.
- source_word: בְלִי כָסֶף
  chosen: without payment
  alternatives:
  - without silver
  - without money
  lexicon: HALOT
  rationale: כֶּסֶף is literally 'silver,' often functioning metonymically for money/payment.
    'Without payment' communicates the economic sense clearly in modern English and
    fits the accusation of unjust appropriation.
- source_word: נֶפֶשׁ
  chosen: lose heart
  alternatives:
  - life
  - soul
  - breath
  lexicon: HALOT
  rationale: נֶפֶשׁ literally means 'soul/life/self,' but in this idiom with הִפָּחְתִּי
    it likely refers to causing deep distress or exhaustion to the owners. Rendering
    the clause idiomatically as 'caused its owners to lose heart' communicates the
    effect in English without woodenly saying 'caused the soul...'
- source_word: בְּעָלֶיהָ
  chosen: its owners
  alternatives:
  - its lords
  - its possessors
  - its masters
  lexicon: HALOT
  rationale: בַּעַל in the plural construct with the feminine suffix refers to those
    who own or possess the land. 'Its owners' is the most natural and contextually
    precise rendering.
- source_word: הִפָּחְתִּי
  chosen: caused ... to lose heart
  alternatives:
  - caused ... to gasp
  - caused ... to expire
  - exhausted
  lexicon: HALOT
  rationale: The Hiphil of נפח is rare and difficult. Traditional renderings include
    'caused ... to lose their life,' but the idiom may suggest making them gasp or
    languish through oppression. 'Caused its owners to lose heart' captures severe
    oppressive treatment without overstating the verb as literal killing in the main
    text; the stronger alternative is preserved in a footnote.
