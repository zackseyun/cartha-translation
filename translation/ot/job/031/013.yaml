id: JOB.31.13
reference: Job 31:13
source:
  edition: WLC
  text: אִם אֶמְאַ֗ס מִשְׁפַּ֣ט עַ֭בְדִּ/י וַ/אֲמָתִ֑/י בְּ֝/רִבָ֗/ם עִמָּדִֽ/י־׃
translation:
  text: If I have rejected the case of my male slave or my female slave when they
    brought a complaint against me,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the legal right of my servant and my maidservant.' The Hebrew משפט can
      denote justice, legal right, or a legal case.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'my slave and my female slave' may also be rendered more traditionally
      'my servant and my maidservant.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  chosen: If
  alternatives:
  - if indeed
  - whether
  lexicon: HALOT
  rationale: Introduces a conditional clause in Job's oath of innocence. Simple 'If'
    best fits the syntax and English style.
- source_word: אֶמְאַס
  chosen: I have rejected
  alternatives:
  - I despised
  - I refused
  - I spurned
  lexicon: HALOT
  rationale: The verb מָאַס commonly means 'reject, despise, refuse.' In this legal
    context, 'have rejected' best conveys denying or disregarding a claim rather than
    merely feeling contempt.
- source_word: מִשְׁפַּט
  chosen: the case
  alternatives:
  - the justice
  - the right
  - the legal claim
  - the cause
  lexicon: HALOT
  rationale: מִשְׁפָּט can mean justice, judgment, or legal right. Here, with slaves
    bringing a dispute against Job, it refers to their rightful legal case or claim.
    'The case' is natural English and preserves the juridical sense.
- source_word: עַבְדִּי
  chosen: my male slave
  alternatives:
  - my servant
  - my slave
  lexicon: HALOT
  rationale: עֶבֶד denotes a servant/slave. Following the project's guidance, 'slave'
    is preferred where bonded status is salient. Because the paired term is explicitly
    female, 'male slave' makes the gender contrast clear.
- source_word: וַאֲמָתִי
  chosen: my female slave
  alternatives:
  - my maidservant
  - my servant-girl
  - my slave woman
  lexicon: HALOT
  rationale: אָמָה refers to a female slave/maidservant. 'Female slave' matches the
    bonded sense of the Hebrew and pairs clearly with 'male slave' in contemporary
    English.
- source_word: בְּרִיבָם
  chosen: when they brought a complaint
  alternatives:
  - in their contending
  - when they disputed
  - when they brought a case
  lexicon: HALOT
  rationale: 'The noun/infinitive from רִיב carries legal-dispute language: contention,
    lawsuit, complaint. Rendering it verbally as ''when they brought a complaint''
    produces clear English while preserving the adversarial legal setting.'
- source_word: עִמָּדִי
  chosen: against me
  alternatives:
  - with me
  - before me
  lexicon: HALOT
  rationale: Literally 'with me,' but in dispute contexts the idiomatic sense is opposition
    or litigation involving Job. 'Against me' best communicates that they were pressing
    a complaint against their master.
