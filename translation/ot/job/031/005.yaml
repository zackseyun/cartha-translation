id: JOB.31.5
reference: Job 31:5
source:
  edition: WLC
  text: אִם הָלַ֥כְתִּי עִם שָׁ֑וְא וַ/תַּ֖חַשׁ עַל מִרְמָ֣ה רַגְלִֽ/י־־־׃
translation:
  text: If I have walked with falsehood, and my foot has hurried to deceit—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and my foot has hastened after deceit.' The Hebrew preposition can be
      understood as directional ('to/toward/after').
    reason: lexical_alternative
  - marker: b
    text: '''Walked'' is a Hebrew idiom for one''s conduct or way of life.'
    reason: cultural_note
lexical_decisions:
- source_word: אִם
  chosen: If
  alternatives:
  - If indeed
  - Whether
  lexicon: HALOT
  rationale: Introduces a conditional clause in Job's oath of innocence. Simple 'If'
    best reflects the Hebrew conditional opening without adding emphasis not explicit
    in the text.
- source_word: הָלַכְתִּי
  chosen: I have walked
  alternatives:
  - I walked
  - I have lived
  lexicon: HALOT
  rationale: הלך literally means 'walk,' often used idiomatically for conduct. 'Have
    walked' preserves both the Hebrew metaphor and the perfect aspect within Job's
    self-imprecatory conditional.
- source_word: עִם
  chosen: with
  alternatives:
  - in company with
  - alongside
  lexicon: HALOT
  rationale: The preposition straightforwardly means 'with.' It conveys association
    with falsehood, which is important to the moral force of the line.
- source_word: שָׁוְא
  chosen: falsehood
  alternatives:
  - vanity
  - emptiness
  - lies
  lexicon: HALOT
  rationale: שׁוא can denote emptiness, worthlessness, or falsehood. In parallel with
    'deceit' in the second colon, 'falsehood' best captures the ethical sense here
    rather than the more abstract 'vanity.'
- source_word: וַתַּחַשׁ
  chosen: has hurried
  alternatives:
  - has hastened
  - has made haste
  - has rushed
  lexicon: HALOT
  rationale: From חושׁ, 'to hurry/hasten.' The subject is the feminine singular 'my
    foot.' 'Has hurried' is idiomatic modern English and preserves the vivid personification
    of the foot moving quickly toward wrongdoing.
- source_word: עַל
  chosen: to
  alternatives:
  - upon
  - toward
  - over
  lexicon: HALOT
  rationale: Although literally 'upon/on,' with verbs of motion it can indicate direction
    toward a goal. 'To deceit' is the most natural English rendering in this context.
- source_word: מִרְמָה
  chosen: deceit
  alternatives:
  - fraud
  - treachery
  - deception
  lexicon: HALOT
  rationale: מרמה denotes deceitful or fraudulent conduct. 'Deceit' matches the moral
    register and pairs well with 'falsehood' without over-specifying commercial fraud.
- source_word: רַגְלִי
  chosen: my foot
  alternatives:
  - my feet
  lexicon: HALOT
  rationale: The Hebrew is singular. Retaining 'my foot' preserves the singular personification
    and the poetic imagery of one's course of life or action.
