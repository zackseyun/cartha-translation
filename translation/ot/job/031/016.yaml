id: JOB.31.16
reference: Job 31:16
source:
  edition: WLC
  text: אִם אֶ֭מְנַע מֵ/חֵ֣פֶץ דַּלִּ֑ים וְ/עֵינֵ֖י אַלְמָנָ֣ה אֲכַלֶּֽה־׃
translation:
  text: If I have withheld the poor from their desire, or caused the eyes of the widow
    to fail,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'withheld from the poor what they desired' or, contextually, 'withheld
      from the poor what they needed.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew idiom: ''caused the eyes of the widow to fail,'' expressing prolonged
      disappointment, longing, or hope deferred.'
    reason: cultural_note
lexical_decisions:
- source_word: אִם
  chosen: If
  alternatives:
  - if indeed
  - whether
  lexicon: HALOT
  rationale: Introduces the conditional self-imprecation sequence in Job 31. Simple
    'If' best fits the oath structure in English.
- source_word: אֶמְנַע
  chosen: I have withheld
  alternatives:
  - I withheld
  - I kept back
  - I refused
  lexicon: HALOT
  rationale: מןע in the qal means to withhold or keep back. The English perfect 'have
    withheld' fits the conditional review of past conduct in Job's oath.
- source_word: מֵחֵפֶץ
  chosen: from their desire
  alternatives:
  - from what they desired
  - from their delight
  - from their need
  lexicon: HALOT
  rationale: חֵפֶץ commonly denotes desire, pleasure, or what is desired. Here, with
    מן after 'withhold,' it refers to depriving the poor of what they wanted or needed.
    'Their desire' is concise and preserves the lexical sense without over-paraphrasing
    to 'need,' though the context implies need.
- source_word: דַּלִּים
  chosen: the poor
  alternatives:
  - the weak
  - the needy
  lexicon: HALOT
  rationale: דַּלִּים refers to the poor, weak, or lowly. 'The poor' is the most natural
    and contextually fitting rendering in this social-justice setting.
- source_word: וְעֵינֵי
  chosen: or caused the eyes of
  alternatives:
  - and the eyes of
  - or the eyes of
  lexicon: HALOT
  rationale: 'The conjunction links a second accusation in parallel. English idiom
    benefits from supplying the verbal force with the following verb: ''or caused
    the eyes of...'' to make the clause complete and natural.'
- source_word: אַלְמָנָה
  chosen: the widow
  alternatives:
  - a widow
  lexicon: HALOT
  rationale: The singular is representative/generic. 'The widow' preserves the Hebrew
    singular class noun and the social category in view.
- source_word: אֲכַלֶּה
  chosen: to fail
  alternatives:
  - to waste away
  - to languish
  - to grow dim
  lexicon: HALOT
  rationale: כלה in the piel can mean bring to an end, consume, or cause to waste
    away. With 'eyes' as subject/object of effect, the idiom conveys longing or hope
    being exhausted. 'Cause the eyes ... to fail' is a well-established and accurate
    English equivalent for this Hebrew idiom.
