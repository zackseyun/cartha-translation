theological_decisions:
- issue: Moral framing of Job's oath regarding adultery
  chosen_reading: Render the verse as an inward enticement followed by deliberate
    lurking at a neighbor's door, preserving the progression from desire to action.
  alternative_readings:
  - Render more euphemistically as romantic attraction
  - Render more explicitly as attempted adultery
  rationale: The Hebrew presents a conditional self-imprecation involving both internal
    desire ('my heart has been enticed') and external clandestine action ('I have
    lain in wait at my neighbor's door'). The translation should preserve this ethical
    seriousness without importing details not explicitly stated.
  doctrine_reference: Translation philosophy §§1, 3, 6
