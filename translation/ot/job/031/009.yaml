id: JOB.31.9
reference: Job 31:9
source:
  edition: WLC
  text: אִם נִפְתָּ֣ה לִ֭בִּ/י עַל אִשָּׁ֑ה וְ/עַל פֶּ֖תַח רֵעִ֣/י אָרָֽבְתִּי־־־׃
translation:
  text: If my heart has been enticed by a woman, and I have lain in wait at my neighbor's
    door,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'has been deceived' or 'has been seduced.' The Hebrew verb can denote
      being enticed or persuaded, here in a context of sexual temptation.
    reason: lexical_alternative
  - marker: b
    text: Or 'my friend's door.' The Hebrew word can mean 'neighbor,' 'friend,' or
      'companion.'
    reason: lexical_alternative
lexical_decisions:
- source_word: נִפְתָּה
  chosen: has been enticed
  alternatives:
  - has been deceived
  - has been seduced
  - has been persuaded
  lexicon: HALOT
  rationale: The Niphal of פתה commonly conveys being enticed, seduced, or persuaded.
    In this context of sexual temptation and moral self-imprecation, 'has been enticed'
    best captures inward moral allurement without overstating the woman's agency.
    It also fits the subject 'my heart' idiomatically in English.
- source_word: לִבִּי
  chosen: my heart
  alternatives:
  - my mind
  lexicon: HALOT
  rationale: Hebrew 'heart' is the standard anthropological term for the inner person,
    including desire and intention. 'My heart' preserves the Hebrew imagery and moral
    psychology better than the interpretive 'my mind.'
- source_word: עַל אִשָּׁה
  chosen: by a woman
  alternatives:
  - toward a woman
  - concerning a woman
  - for a woman
  lexicon: HALOT
  rationale: With פתה in this context, the phrase indicates the object or occasion
    of enticement. English 'enticed by a woman' is the most natural rendering, though
    the Hebrew preposition is literally 'upon/regarding.' This communicates sexual
    temptation clearly in context.
- source_word: פֶּתַח
  chosen: door
  alternatives:
  - entrance
  - doorway
  lexicon: HALOT
  rationale: '''Door'' is the most natural concise rendering here. ''Entrance'' or
    ''doorway'' are possible, but ''door'' better suits the idiom of lurking outside
    another man''s house.'
- source_word: רֵעִי
  chosen: my neighbor's
  alternatives:
  - my friend's
  - my companion's
  lexicon: HALOT
  rationale: רֵעַ can mean friend, companion, or neighbor. In this legal-ethical context,
    'neighbor' best reflects the broader covenantal/social sense and avoids implying
    emotional closeness.
- source_word: אָרָבְתִּי
  chosen: I have lain in wait
  alternatives:
  - I have lurked
  - I have ambushed
  - I have waited secretly
  lexicon: HALOT
  rationale: The verb ארב denotes lying in wait or lurking with hostile or illicit
    intent. 'I have lain in wait' preserves the deliberate, stealthy sense and fits
    the context of adulterous scheming better than the flatter 'waited.'
