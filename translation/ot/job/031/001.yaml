id: JOB.31.1
reference: Job 31:1
source:
  edition: WLC
  text: בְּ֭רִית כָּרַ֣תִּי לְ/עֵינָ֑/י וּ/מָ֥ה אֶ֝תְבּוֹנֵ֗ן עַל בְּתוּלָֽה־׃
translation:
  text: I have made a covenant with my eyes; so how could I gaze at a virgin?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Why then should I look at a virgin?'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּרִית
  chosen: covenant
  alternatives:
  - pledge
  - agreement
  lexicon: HALOT
  rationale: The noun commonly denotes a binding pact or solemn commitment. 'Covenant'
    preserves the formal, weighty sense better than the lighter 'pledge' or 'agreement,'
    and fits the idiom with כרת ('cut/make a covenant').
- source_word: כָּרַתִּי
  chosen: have made
  alternatives:
  - cut
  - made
  lexicon: HALOT
  rationale: In Hebrew the idiom is literally 'cut a covenant,' but idiomatic English
    is 'make a covenant.' The present perfect 'have made' reflects the completed action
    with present relevance in Job's self-defense.
- source_word: לְעֵינַי
  chosen: with my eyes
  alternatives:
  - for my eyes
  - concerning my eyes
  lexicon: HALOT
  rationale: The preposition ל with 'my eyes' is best represented idiomatically as
    'with my eyes' in English, expressing the object/partner of the self-imposed covenant.
- source_word: וּמָה
  chosen: so how could I
  alternatives:
  - and why should I
  - then how could I
  lexicon: HALOT
  rationale: The conjunction plus interrogative introduces the consequence of the
    prior vow. 'So how could I' captures the inferential force in natural English
    better than a wooden 'and what/why.'
- source_word: אֶתְבּוֹנֵן
  chosen: gaze
  alternatives:
  - look
  - consider
  - fix my eyes
  lexicon: HALOT
  rationale: The Hitpolel/Hithbonen form conveys attentive looking or contemplation,
    not a mere glance. 'Gaze' communicates deliberate, sustained looking in this moral
    context.
- source_word: עַל
  chosen: at
  alternatives:
  - upon
  - toward
  lexicon: HALOT
  rationale: With verbs of looking, עַל can be rendered naturally as 'at' in English.
- source_word: בְּתוּלָה
  chosen: a virgin
  alternatives:
  - a young woman
  - a maiden
  lexicon: HALOT
  rationale: The standard sense is 'virgin,' and in this context Job speaks specifically
    of lustful regard toward an unmarried sexually untouched woman. 'Young woman'
    is broader and less precise; 'maiden' is understandable but more archaic.
