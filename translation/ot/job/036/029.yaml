theological_decisions:
- issue: Referent of the 3ms suffix in 'his shelter'
  chosen_reading: The suffix refers to God, whose storm-cloud covering is poetically
    described as his shelter.
  alternative_readings:
  - The suffix refers more generally to the storm-cloud itself as its covering place.
  rationale: Within the immediate context Elihu is describing God's wondrous control
    of weather. Taking the suffix as referring to God best fits the discourse and
    traditional interpretation, while retaining the metaphor rather than over-explaining
    it.
