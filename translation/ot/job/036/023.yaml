theological_decisions:
- issue: Referent of the masculine suffixes and second-person verb
  chosen_reading: 'The verse speaks of God: no one appoints his way for him, and no
    one can accuse him of wrongdoing.'
  alternative_readings:
  - A more generic reading about a powerful ruler or man
  rationale: In context Elihu is extolling God's greatness and justice (Job 36:22–23).
    The masculine pronominal suffixes and second-person accusation are therefore rendered
    with lowercase pronouns in English but understood as referring to God. No capitalization
    is used, following normal modern English style while preserving the contextual
    referent.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
