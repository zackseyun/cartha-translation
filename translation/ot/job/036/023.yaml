id: JOB.36.23
reference: Job 36:23
source:
  edition: WLC
  text: מִֽי פָקַ֣ד עָלָ֣י/ו דַּרְכּ֑/וֹ וּ/מִֽי אָ֝מַ֗ר פָּעַ֥לְתָּ עַוְלָֽה־־׃
translation:
  text: Who has appointed his way for him? Or who has said, ‘You have done wrong’?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Who has charged him with his way?' The Hebrew verb can also carry the
      sense of appointing, prescribing, or charging.
    reason: lexical_alternative
  - marker: b
    text: Or, 'You have done injustice.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִי
  chosen: Who
  lexicon: HALOT
  rationale: Interrogative pronoun introducing a rhetorical question; straightforwardly
    rendered as 'Who'.
- source_word: פָקַד
  chosen: has appointed
  alternatives:
  - has charged
  - has prescribed
  - has overseen
  lexicon: HALOT
  rationale: פָקַד has a broad semantic range including appoint, assign, charge, attend
    to, or oversee. In this context with עָלָיו דַּרְכּוֹ, the sense is who has set
    or prescribed God's course for him. 'Has appointed' preserves the idea of assigning
    authority or direction without over-paraphrasing.
- source_word: עָלָיו
  chosen: for him
  alternatives:
  - over him
  - upon him
  lexicon: HALOT
  rationale: The preposition עַל with פקד can express appointment over someone or
    concerning someone. In idiomatic English, 'appointed his way for him' best conveys
    the sense of prescribing God's course. 'Over him' is possible but less natural
    in English here.
- source_word: דַּרְכּוֹ
  chosen: his way
  alternatives:
  - his path
  - his course
  lexicon: HALOT
  rationale: דֶּרֶךְ commonly means way, path, or course of action. 'His way' is concise
    and preserves both literal and metaphorical resonance.
- source_word: וּמִי
  chosen: Or who
  alternatives:
  - And who
  lexicon: HALOT
  rationale: The conjunction links a second rhetorical question. 'Or who' fits the
    adversative/disjunctive force in English better than a simple 'and who'.
- source_word: אָמַר
  chosen: has said
  alternatives:
  - can say
  - said
  lexicon: HALOT
  rationale: 'Perfect verb in a rhetorical question; English present perfect works
    naturally to express the standing challenge: who has ever said this?'
- source_word: פָּעַלְתָּ
  chosen: You have done
  alternatives:
  - You have worked
  - You have acted
  lexicon: HALOT
  rationale: The verb means do, make, or work. In accusation formula with עַוְלָה,
    'have done' is the most idiomatic English rendering.
- source_word: עַוְלָה
  chosen: wrong
  alternatives:
  - injustice
  - wickedness
  - unrighteousness
  lexicon: HALOT
  rationale: עַוְלָה denotes injustice, wrong, or unrighteousness. 'Wrong' is the
    most natural accusation in English here, while still covering moral evil or injustice.
    'Injustice' is possible but narrower; 'unrighteousness' is more formal than the
    context requires.
