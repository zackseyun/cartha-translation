id: JOB.36.13
reference: Job 36:13
source:
  edition: WLC
  text: וְֽ/חַנְפֵי לֵ֭ב יָשִׂ֣ימוּ אָ֑ף לֹ֥א יְ֝שַׁוְּע֗וּ כִּ֣י אֲסָרָֽ/ם־׃
translation:
  text: But the godless in heart store up anger; they do not cry for help when he
    binds them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for/because he binds them.' The Hebrew conjunction can be read causally
      rather than temporally.
    reason: alternative_reading
  - marker: b
    text: '''The godless in heart'' may also be rendered ''the hypocrites in heart''
      or ''the impious at heart.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: חַנְפֵי לֵב
  chosen: the godless in heart
  alternatives:
  - the hypocrites in heart
  - the impious at heart
  - the godless of heart
  lexicon: HALOT
  rationale: חנף can denote the godless, impious, or hypocritical person. In Job,
    the term often carries the sense of irreverence or godlessness more than mere
    social insincerity. לֵב marks the inner disposition, so 'in heart' preserves the
    Hebrew idiom and emphasizes inward character.
- source_word: יָשִׂימוּ אָף
  chosen: store up anger
  alternatives:
  - set anger
  - harbor anger
  - heap up wrath
  lexicon: HALOT
  rationale: The idiom 'put/set anger' is unnatural in English. 'Store up anger' captures
    the sense of accumulating or retaining anger internally, while remaining close
    to the Hebrew imagery. אָף can mean anger/wrath; here it is best taken as their
    anger rather than divine wrath, since it is the subject's action.
- source_word: לֹא יְשַׁוְּעוּ
  chosen: they do not cry for help
  alternatives:
  - they do not cry out
  - they do not call for help
  lexicon: HALOT
  rationale: שׁוע in the Piel commonly means to cry out for help. 'Cry for help' makes
    the implicit distress explicit in natural English without over-paraphrasing.
- source_word: כִּי
  chosen: when
  alternatives:
  - because
  - for
  lexicon: HALOT
  rationale: 'Although כִּי often means ''for'' or ''because,'' in this context a
    temporal sense fits the flow well: they do not cry for help at the time of affliction.
    This also coheres with the following verb of binding/restraint. The causal sense
    remains possible and is preserved in a footnote.'
- source_word: אֲסָרָם
  chosen: he binds them
  alternatives:
  - he imprisons them
  - he fetters them
  - he has bound them
  lexicon: HALOT
  rationale: אָסַר means to bind, tie, imprison, or fetter. 'He binds them' is the
    most direct and flexible rendering, matching the likely reference to God restraining
    them through affliction in the surrounding context. The subject is singular in
    Hebrew and is naturally understood as God from context.
