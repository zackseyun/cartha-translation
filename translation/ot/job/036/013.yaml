theological_decisions:
- issue: Referent of the singular subject in 'he binds them'
  chosen_reading: The subject is left as 'he,' referring contextually to God without
    replacing the pronoun with 'God.'
  alternative_readings:
  - Explicitly render 'God binds them'
  rationale: The Hebrew uses a third-person singular verb with pronominal suffix,
    and the immediate discourse concerns God's dealings with people through affliction.
    Retaining 'he' preserves the source text while allowing the contextual referent
    to remain clear.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
