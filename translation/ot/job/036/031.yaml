id: JOB.36.31
reference: Job 36:31
source:
  edition: WLC
  text: כִּי בָ֭/ם יָדִ֣ין עַמִּ֑ים יִֽתֶּן אֹ֥כֶל לְ/מַכְבִּֽיר־־׃
translation:
  text: For by them he judges peoples; he gives food in abundance.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with them' or 'through them'; the pronoun likely refers to the storm
      phenomena in the surrounding context.
    reason: lexical_alternative
  - marker: b
    text: Or 'he governs peoples'; the Hebrew verb can include the sense of ruling
      or administering justice, not only passing sentence.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces the explanation of the preceding statement. 'For' fits the
    causal/explanatory flow in English without over-specifying nuance.
- source_word: בָם
  chosen: by them
  alternatives:
  - with them
  - through them
  lexicon: HALOT
  rationale: The preposition ב with 3mp suffix most naturally refers back to the immediately
    preceding plural phenomena (the clouds/rain/lightning in context). 'By them' preserves
    the instrumental sense and leaves the antecedent implicit as in Hebrew.
- source_word: יָדִין
  chosen: he judges
  alternatives:
  - he governs
  - he vindicates
  lexicon: HALOT
  rationale: דין commonly means 'judge' and can extend to governing or administering
    justice. Here 'judges' best preserves the lexical core while allowing the broader
    sense of divine rule through weather phenomena.
- source_word: עַמִּים
  chosen: peoples
  alternatives:
  - nations
  - peoples of the earth
  lexicon: HALOT
  rationale: The plural refers broadly to human groups. 'Peoples' is a natural rendering
    that preserves the plural and avoids narrowing to geopolitical 'nations' alone.
- source_word: יִתֶּן
  chosen: he gives
  alternatives:
  - he provides
  - he grants
  lexicon: HALOT
  rationale: A straightforward rendering of נתן. 'Gives' keeps the Hebrew's simplicity
    and parallels the first clause.
- source_word: אֹכֶל
  chosen: food
  alternatives:
  - bread
  - provision
  lexicon: HALOT
  rationale: The noun denotes food in general. 'Food' is the broadest and most natural
    English equivalent here.
- source_word: לְמַכְבִּיר
  chosen: in abundance
  alternatives:
  - abundantly
  - to abundance
  - in plenty
  lexicon: HALOT
  rationale: The form from רבה/כבר idiomatically conveys abundance or plentiful measure.
    Rendering it adverbially as 'in abundance' produces clear English and reflects
    the sense that God provides plentiful food.
