id: JOB.36.1
reference: Job 36:1
source:
  edition: WLC
  text: וַ/יֹּ֥סֶף אֱלִיה֗וּא וַ/יֹּאמַֽר׃
translation:
  text: 'And Elihu continued and said:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'And Elihu added and said.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּסֶף
  chosen: continued
  alternatives:
  - added
  - went on
  lexicon: HALOT
  rationale: The verb יסף literally means 'to add,' but in this discourse-introduction
    formula the idiomatic sense is that Elihu resumed or continued speaking. 'Continued'
    is natural modern English and preserves the narrative function without woodenly
    rendering 'added.'
- source_word: אֱלִיהוּא
  chosen: Elihu
  rationale: Personal names are transliterated by standard English convention per
    translation philosophy.
- source_word: וַיֹּאמַר
  chosen: and said
  alternatives:
  - saying
  - and he said
  lexicon: HALOT
  rationale: Standard wayyiqtol narrative verb from אמר. 'And said' is the most natural
    concise English rendering here; the explicit pronoun is unnecessary because English
    does not require it and the subject is already named.
