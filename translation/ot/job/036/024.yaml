id: JOB.36.24
reference: Job 36:24
source:
  edition: WLC
  text: זְ֭כֹר כִּֽי תַשְׂגִּ֣יא פָעֳל֑/וֹ אֲשֶׁ֖ר שֹׁרְר֣וּ אֲנָשִֽׁים־׃
translation:
  text: Remember that you should exalt his work, which men have sung.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'which men have beheld' or 'which men have contemplated.' The Hebrew
      verb שֹׁרְרוּ is difficult, and some take it in the sense of seeing rather than
      singing.
    reason: lexical_alternative
lexical_decisions:
- source_word: זְכֹר
  chosen: Remember
  alternatives:
  - Call to mind
  - Keep in mind
  lexicon: HALOT
  rationale: Imperative masculine singular from זכר, a direct exhortation. 'Remember'
    is the most natural and sufficiently formal English imperative.
- source_word: כִּי
  chosen: that
  alternatives:
  - for
  - because
  lexicon: HALOT
  rationale: Here כִּי introduces the content of what is to be remembered rather than
    a causal clause. 'That' best fits the syntax in English.
- source_word: תַשְׂגִּיא
  chosen: you should exalt
  alternatives:
  - magnify
  - make great
  - extol
  lexicon: HALOT
  rationale: Hiphil of שׂגא/שׂגה in this context carries the sense of making great
    or magnifying. Because it follows an imperative of remembering, English idiom
    is smoother with 'you should exalt' rather than a second bare imperative, while
    still preserving the exhortational force.
- source_word: פָעֳלוֹ
  chosen: his work
  alternatives:
  - his deed
  - what he has done
  lexicon: HALOT
  rationale: פֹּעַל commonly denotes work, deed, or activity. 'His work' is concise
    and preserves the broad scope of God's acts without over-specifying.
- source_word: אֲשֶׁר
  chosen: which
  alternatives:
  - that
  - of which
  lexicon: HALOT
  rationale: Relative pronoun linking 'his work' with the following clause. 'Which'
    is natural in this literary register.
- source_word: שֹׁרְרוּ
  chosen: have sung
  alternatives:
  - have celebrated in song
  - have beheld
  - have contemplated
  lexicon: HALOT
  rationale: From שׁור/שׁיר in a poetic form, traditionally understood here as singing
    or celebrating. 'Have sung' preserves the likely poetic sense. Because some interpreters
    connect the form with seeing/beholding, that alternative is preserved in a footnote.
- source_word: אֲנָשִׁים
  chosen: men
  alternatives:
  - people
  - mortals
  lexicon: HALOT
  rationale: The Hebrew is the masculine plural 'men.' Per translation philosophy,
    gender-accurate rendering is preferred where the source uses a masculine human
    term with representative force.
