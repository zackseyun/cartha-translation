theological_decisions:
- issue: Referent of the 3ms suffix in 'his work'
  chosen_reading: God's work
  rationale: In context Elihu is speaking about God and urging Job to magnify God's
    deeds. The English keeps the pronoun 'his' because the Hebrew does, but the referent
    is understood as God from context.
  doctrine_reference: Translation philosophy §1, §5
- issue: Rendering masculine אֲנָשִׁים
  chosen_reading: men
  alternative_readings:
  - people
  - mortals
  rationale: The source uses a masculine plural noun. Following the gender-accurate
    principle, 'men' is retained rather than neutralizing to 'people,' while the representative
    sense remains clear in context.
  doctrine_reference: Translation philosophy §4
