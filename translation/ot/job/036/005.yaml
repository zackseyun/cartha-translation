theological_decisions:
- issue: Implicit object of 'does not despise/reject'
  chosen_reading: does not despise anyone
  alternative_readings:
  - does not despise [the mighty]
  - does not reject
  rationale: The Hebrew leaves the object unstated. In context, Elihu's point is that
    God's greatness does not entail contempt or disregard. Supplying 'anyone' makes
    the English intelligible without over-specifying a narrower object such as 'the
    mighty.'
  doctrine_reference: Translation philosophy §3, §6
- issue: Meaning of 'strength of heart'
  chosen_reading: he is mighty in strength of heart
  alternative_readings:
  - he is mighty in understanding
  - he is mighty in firmness of purpose
  rationale: The Hebrew expression is terse and somewhat ambiguous. Retaining 'heart'
    preserves the source-language metaphor and theological tension rather than collapsing
    it into a single interpretive gloss like 'understanding.'
  doctrine_reference: Translation philosophy §3, §5
