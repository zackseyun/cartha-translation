theological_decisions:
- issue: Implied divine subject of הֲסִיתְךָ
  chosen_reading: Retain the Hebrew pronoun 'he' without explicitly supplying 'God'
    in the main text.
  alternative_readings:
  - Explicitly render 'God lured you'
  - Render impersonally as 'one lured you'
  rationale: The immediate context makes the subject God, but the Hebrew uses a third-person
    masculine singular verb without an explicit noun. Preserving 'he' respects the
    source text while allowing the context to identify the referent.
  doctrine_reference: Translation philosophy §1, §3
- issue: Metaphorical imagery of distress versus spaciousness
  chosen_reading: Preserve the spatial metaphors ('mouth,' 'broad place') rather than
    flatten them into abstract explanation.
  alternative_readings:
  - Paraphrase as 'he brought you out of trouble into freedom'
  rationale: The verse's poetic force depends on the contrast between constriction
    and spaciousness. Optimal equivalence here favors preserving the imagery with
    readable English.
  doctrine_reference: Translation philosophy §1, §6
