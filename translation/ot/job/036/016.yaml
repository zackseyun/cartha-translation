id: JOB.36.16
reference: Job 36:16
source:
  edition: WLC
  text: וְ/אַ֤ף הֲסִיתְ/ךָ֨ מִ/פִּי צָ֗ר רַ֭חַב לֹא מוּצָ֣ק תַּחְתֶּ֑י/הָ וְ/נַ֥חַת
    שֻׁ֝לְחָנְ/ךָ֗ מָ֣לֵא דָֽשֶׁן׀־־׃
translation:
  text: Indeed, he lured you out of the mouth of distress into a broad place with
    no constraint beneath it, and what was set on your table was full of richness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from the jaws of affliction' or 'from the mouth of a narrow place.'
      The Hebrew combines imagery of distress with constriction, contrasting it with
      the following 'broad place.'
    reason: lexical_alternative
  - marker: b
    text: Or 'a spacious place with no restriction beneath it.'
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'full of fatness'; that is, full of rich abundance or rich food.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאַף
  chosen: Indeed
  alternatives:
  - And also
  - Moreover
  - Even now
  lexicon: HALOT
  rationale: Introduces and intensifies the statement. 'Indeed' captures the emphatic/additive
    force in natural English without overtranslating.
- source_word: הֲסִיתְךָ
  chosen: he lured you
  alternatives:
  - he enticed you
  - he moved you
  - he incited you
  lexicon: HALOT
  rationale: From סות/סית, 'to incite, entice, lure away.' In this context of being
    drawn out from distress into spaciousness, 'lured' or 'enticed' fits better than
    the more negative 'incited.' The subject is understood as God from context in
    Elihu's speech, but the English keeps the pronoun as in the Hebrew.
- source_word: מִפִּי צָר
  chosen: out of the mouth of distress
  alternatives:
  - from the mouth of trouble
  - from the jaws of affliction
  - from the mouth of a narrow place
  lexicon: HALOT
  rationale: פֶּה 'mouth' is retained metaphorically rather than paraphrased away;
    צַר can denote distress, straits, or narrowness. 'Distress' preserves both the
    affliction sense and the contrast with the following 'broad place.'
- source_word: רַחַב
  chosen: a broad place
  alternatives:
  - a spacious place
  - roominess
  - freedom
  lexicon: HALOT
  rationale: The noun/adjective conveys breadth or spaciousness. 'Broad place' preserves
    the concrete spatial metaphor common in Hebrew poetry, while remaining understandable.
- source_word: לֹא מוּצָק תַּחְתֶּיהָ
  chosen: with no constraint beneath it
  alternatives:
  - where there is no restriction under it
  - with no narrowness under it
  - unconfined beneath
  lexicon: HALOT
  rationale: מוּצָק here is difficult; in context it contrasts with constriction/straits.
    The phrase describes the broad place as unconstricted. 'With no constraint beneath
    it' preserves the imagery while making sense in English.
- source_word: וְנַחַת
  chosen: and what was set
  alternatives:
  - and the setting
  - and rest
  - and what was laid down
  lexicon: HALOT
  rationale: The noun is rare and contextually difficult. In parallel with 'your table,'
    it most plausibly refers to what is placed or set down on the table. This yields
    coherent sense without excessive paraphrase.
- source_word: שֻׁלְחָנְךָ
  chosen: your table
  lexicon: HALOT
  rationale: Straightforward lexical rendering; the image is of provision or feasting.
- source_word: מָלֵא דָשֶׁן
  chosen: was full of richness
  alternatives:
  - was full of fatness
  - was full of rich food
  - was full of abundance
  lexicon: HALOT
  rationale: דָּשֶׁן literally denotes fatness/richness and often connotes abundance
    or rich food. 'Richness' preserves the metaphor without sounding archaic; 'fatness'
    is more literal but less natural in contemporary English.
