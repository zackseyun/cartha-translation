id: JOB.36.22
reference: Job 36:22
source:
  edition: WLC
  text: הֶן אֵ֭ל יַשְׂגִּ֣יב בְּ/כֹח֑/וֹ מִ֖י כָמֹ֣/הוּ מוֹרֶֽה־׃
translation:
  text: Behold, God is exalted in his power; who is a teacher like him?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'by his power' or 'through his strength.'
    reason: lexical_alternative
  - marker: b
    text: Or 'Who is like him as a teacher?'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֶן
  chosen: Behold
  alternatives:
  - See
  - Look
  lexicon: HALOT
  rationale: Introduces the statement with an attention-getting particle. 'Behold'
    preserves the elevated poetic tone better than the more colloquial 'look' or 'see'.
- source_word: אֵל
  chosen: God
  alternatives:
  - God Mighty One
  lexicon: HALOT
  rationale: Here אֵל functions as a common divine title referring to God, not as
    a proper name. 'God' is the natural English rendering in context.
- source_word: יַשְׂגִּיב
  chosen: is exalted
  alternatives:
  - acts exaltedly
  - is on high
  - shows himself exalted
  lexicon: HALOT
  rationale: The Hiphil of שׂגב conveys being high, exalted, or acting in inaccessible
    strength. 'Is exalted' fits the poetic context and pairs naturally with the following
    phrase 'in his power.'
- source_word: בְּכֹחוֹ
  chosen: in his power
  alternatives:
  - by his power
  - through his strength
  lexicon: HALOT
  rationale: The preposition ב can be rendered instrumentally or descriptively here.
    'In his power' preserves the compact Hebrew expression and can imply the sphere
    or manner of his exaltation without over-specifying.
- source_word: מִי כָמֹהוּ
  chosen: who is ... like him?
  alternatives:
  - who is comparable to him?
  - who is like him?
  lexicon: HALOT
  rationale: A standard comparative rhetorical question. 'Who is ... like him?' is
    direct and idiomatic, preserving the force of incomparability.
- source_word: מוֹרֶה
  chosen: a teacher
  alternatives:
  - one who teaches
  - an instructor
  lexicon: HALOT
  rationale: The noun denotes one who teaches. 'Teacher' is concise, natural English
    and suits the rhetorical question about God's unmatched instruction.
