id: JOB.36.14
reference: Job 36:14
source:
  edition: WLC
  text: תָּמֹ֣ת בַּ/נֹּ֣עַר נַפְשָׁ֑/ם וְ֝/חַיָּתָ֗/ם בַּ/קְּדֵשִֽׁים׃
translation:
  text: They die in youth, and their life ends among the male cult prostitutes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'among the consecrated ones.' The Hebrew term likely refers to male cult
      prostitutes associated with pagan worship.
    reason: alternative_reading
lexical_decisions:
- source_word: תָּמֹת
  chosen: die
  alternatives:
  - perish
  - comes to an end
  lexicon: HALOT
  rationale: Qal imperfect of מות, with נַפְשָׁם as the grammatical subject in sense.
    English uses the plural 'they die' to reflect the plural pronominal suffix on
    'their soul/life' and the collective reference to the wicked under discussion.
- source_word: בַּנֹּעַר
  chosen: in youth
  alternatives:
  - while young
  - in their youth
  lexicon: HALOT
  rationale: נֹעַר denotes youth or early life. 'In youth' is concise and natural;
    the possessive 'their' is implied by context and need not be repeated in English.
- source_word: נַפְשָׁם
  chosen: they
  alternatives:
  - their soul
  - their life
  lexicon: HALOT
  rationale: נֶפֶשׁ can mean soul, life, or person. Here it functions idiomatically
    as the subject of dying. Rendering it woodenly as 'their soul dies' would sound
    unnatural and potentially misleading in English, so the sense is carried by 'they
    die'.
- source_word: וְחַיָּתָם
  chosen: their life ends
  alternatives:
  - their life
  - their living being
  - their vitality
  lexicon: HALOT
  rationale: From חיה/חַיָּה in a nominal form referring to life or lifetime. Because
    English requires a predicate to complete the clause, 'their life ends' makes explicit
    the implied verbal sense in parallel with the first colon.
- source_word: בַּקְּדֵשִׁים
  chosen: among the male cult prostitutes
  alternatives:
  - among the consecrated ones
  - among the sodomites
  - among temple prostitutes
  lexicon: HALOT
  rationale: קְדֵשִׁים in the Hebrew Bible commonly refers not to holy persons generally
    but to male persons attached to illicit cultic sexual practice. 'Male cult prostitutes'
    is the clearest modern rendering. 'Consecrated ones' would miss the negative cultic
    sense in context; 'sodomites' is traditional but imprecise and theologically loaded
    beyond the lexical evidence.
