theological_decisions:
- issue: Meaning of קְדֵשִׁים
  chosen_reading: male cult prostitutes
  alternative_readings:
  - consecrated ones
  - temple prostitutes
  rationale: The verse likely describes a shameful or defiled end, and the established
    usage of קָדֵשׁ in several passages points to male cult prostitution rather than
    generic holiness. This avoids importing later doctrinal or moral categories not
    explicit in the term while preserving the probable historical sense.
  doctrine_reference: Translation philosophy §§1, 3, 6
