id: JOB.36.6
reference: Job 36:6
source:
  edition: WLC
  text: לֹא יְחַיֶּ֥ה רָשָׁ֑ע וּ/מִשְׁפַּ֖ט עֲנִיִּ֣ים יִתֵּֽן־׃
translation:
  text: He does not keep the wicked alive, but gives justice to the afflicted.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'He does not let the wicked live.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the poor'; Hebrew 'the afflicted/poor' can denote those who are lowly,
      oppressed, or economically poor.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְחַיֶּה
  chosen: keep alive
  alternatives:
  - let live
  - preserve alive
  - give life to
  lexicon: HALOT
  rationale: The Piel of חיה here most naturally means to preserve or keep alive rather
    than simply 'make alive' in a resurrection sense. In context Elihu contrasts God's
    treatment of the wicked with his granting justice to the afflicted, so 'keep ...
    alive' best conveys ongoing preservation.
- source_word: רָשָׁע
  chosen: the wicked
  alternatives:
  - the wicked man
  - a wicked person
  lexicon: HALOT
  rationale: Although morphologically singular, the term can function generically.
    English 'the wicked' preserves the representative/generic sense without awkward
    singular phrasing.
- source_word: מִשְׁפָּט
  chosen: justice
  alternatives:
  - judgment
  - legal right
  - cause
  lexicon: HALOT
  rationale: In the phrase 'gives justice to the afflicted,' מִשְׁפָּט refers not
    merely to a judicial act but to the just outcome or right due to them. 'Justice'
    is the most natural English rendering here.
- source_word: עֲנִיִּים
  chosen: the afflicted
  alternatives:
  - the poor
  - the humble
  - the oppressed
  lexicon: HALOT
  rationale: עָנִי often includes economic poverty but regularly carries the broader
    sense of those who are afflicted, oppressed, or lowly. In this poetic context,
    'the afflicted' best captures the wider semantic range without narrowing it to
    material poverty alone.
- source_word: יִתֵּן
  chosen: gives
  alternatives:
  - grants
  - provides
  - renders
  lexicon: HALOT
  rationale: The common verb נתן is straightforwardly 'give.' 'Gives justice' is idiomatic
    English and preserves the Hebrew construction.
- source_word: וּ
  chosen: but
  alternatives:
  - and
  lexicon: HALOT
  rationale: Though the conjunction is formally 'and,' the sense here is contrastive
    between God's refusal to preserve the wicked and his granting justice to the afflicted.
    English 'but' communicates the discourse relation clearly.
