theological_decisions:
- issue: Whether יְחַיֶּה should be rendered in a way that suggests resurrection or
    life-giving in a theological sense
  chosen_reading: Rendered as 'keep alive' to express temporal preservation, not resurrection.
  alternative_readings:
  - make alive
  - give life to
  rationale: 'The immediate poetic parallel concerns God''s governance in justice:
    he does not preserve the wicked, whereas he gives justice to the afflicted. A
    resurrection-oriented rendering would import theological content not demanded
    by the verse.'
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Never import doctrinal claims the text does not make.'
