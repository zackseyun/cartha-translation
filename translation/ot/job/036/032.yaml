id: JOB.36.32
reference: Job 36:32
source:
  edition: WLC
  text: עַל כַּפַּ֥יִם כִּסָּה א֑וֹר וַ/יְצַ֖ו עָלֶ֣י/הָ בְ/מַפְגִּֽיעַ־־׃
translation:
  text: He covers his hands with lightning, and commands it to strike the mark.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'light'; in context of the surrounding storm imagery, this is likely
      'lightning.'
    reason: lexical_alternative
  - marker: b
    text: The final phrase is difficult Hebrew. Alternatives include 'against the
      one it strikes' or 'against the intercessor.'
    reason: alternative_reading
lexical_decisions:
- source_word: כַּפַּיִם
  chosen: his hands
  alternatives:
  - his palms
  lexicon: HALOT
  rationale: כַּף in the dual commonly denotes the palms or hands. In English, 'hands'
    is the more natural rendering here while still preserving the bodily imagery.
- source_word: כִּסָּה
  chosen: covers
  alternatives:
  - conceals
  - veils
  lexicon: HALOT
  rationale: The verb כסה means 'to cover, conceal.' 'Covers' fits the concrete imagery
    and avoids overinterpreting the metaphor.
- source_word: אוֹר
  chosen: lightning
  alternatives:
  - light
  lexicon: HALOT
  rationale: Although אוֹר ordinarily means 'light,' in this storm-theophany context
    the reference is best taken as lightning. This is a common contextual extension
    in poetic passages dealing with thunderstorm imagery.
- source_word: וַיְצַו
  chosen: commands
  alternatives:
  - appoints
  - orders
  lexicon: HALOT
  rationale: The verb צוה means 'to command, order.' 'Commands' preserves the personal
    agency attributed to God in the verse.
- source_word: עָלֶיהָ
  chosen: it
  alternatives:
  - against it
  - concerning it
  - upon her
  lexicon: HALOT
  rationale: The feminine pronominal suffix most naturally refers back to the feminine
    sense implied by the lightning/bolt or to the action associated with it. English
    idiom prefers 'it' here. Because the referent is difficult, the translation keeps
    it concise and notes the ambiguity.
- source_word: בְמַפְגִּיעַ
  chosen: to strike the mark
  alternatives:
  - against the intercessor
  - at the place struck
  - to attack
  lexicon: HALOT
  rationale: This form is notoriously difficult. From פגע, possibilities include 'one
    who strikes/attacks,' 'one who intercedes,' or an adverbial/instrumental sense.
    In the storm context, many understand the phrase to mean directing the lightning
    to its target. 'To strike the mark' gives a coherent sense without importing later
    theological meanings of 'intercede.'
