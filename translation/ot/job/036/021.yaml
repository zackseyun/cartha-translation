id: JOB.36.21
reference: Job 36:21
source:
  edition: WLC
  text: הִ֭שָּׁמֶר אַל תֵּ֣פֶן אֶל אָ֑וֶן כִּֽי עַל זֶ֝֗ה בָּחַ֥רְתָּ מֵ/עֹֽנִי־־־־׃
translation:
  text: Take care; do not turn to iniquity, for you have chosen this rather than affliction.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'evil,' 'wickedness,' or possibly 'trouble' for Hebrew אָוֶן.
    reason: lexical_alternative
  - marker: b
    text: Or 'instead of affliction' or 'than misery.' The sense is that he must not
      prefer wrongdoing to the suffering he is undergoing.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִשָּׁמֶר
  chosen: Take care
  alternatives:
  - Beware
  - Be careful
  - Guard yourself
  lexicon: HALOT
  rationale: Niphal imperative of שׁמר functions as a warning or admonition. 'Take
    care' is natural modern English and preserves the imperative force without sounding
    archaic.
- source_word: אַל תֵּפֶן
  chosen: do not turn
  alternatives:
  - do not incline
  - do not turn aside
  lexicon: HALOT
  rationale: פן in the Qal commonly means 'turn' or 'turn toward.' With אַל it gives
    a prohibition. 'Do not turn' is direct and idiomatic.
- source_word: אֶל אָוֶן
  chosen: to iniquity
  alternatives:
  - to evil
  - to wickedness
  - to trouble
  lexicon: HALOT
  rationale: אָוֶן can denote wickedness, evil, or trouble/mischief. In this moral
    exhortation, 'iniquity' best captures the ethical sense of turning toward wrongdoing
    rather than merely suffering or calamity.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces the ground for the warning. 'For' preserves the explanatory
    connection succinctly.
- source_word: עַל זֶה
  chosen: this
  alternatives:
  - for this
  - because of this
  - over this
  lexicon: HALOT
  rationale: The preposition plus demonstrative points to the matter just mentioned.
    In English, 'this' after 'chosen' is sufficiently clear and avoids awkwardness.
- source_word: בָּחַרְתָּ
  chosen: you have chosen
  alternatives:
  - you chose
  - you preferred
  lexicon: HALOT
  rationale: Perfect 2ms of בחר. 'You have chosen' reflects the completed action with
    present relevance in Elihu's warning.
- source_word: מֵעֹנִי
  chosen: rather than affliction
  alternatives:
  - instead of affliction
  - more than affliction
  - than misery
  lexicon: HALOT
  rationale: 'עֹנִי commonly means affliction, misery, or poverty. In Job''s context
    of suffering, ''affliction'' is the most fitting gloss. The prefixed מ expresses
    comparison/separation here: Job is being warned not to choose iniquity over the
    affliction he is enduring.'
