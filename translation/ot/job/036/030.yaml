id: JOB.36.30
reference: Job 36:30
source:
  edition: WLC
  text: הֵן פָּרַ֣שׂ עָלָ֣י/ו אוֹר֑/וֹ וְ/שָׁרְשֵׁ֖י הַ/יָּ֣ם כִּסָּֽה־׃
translation:
  text: Behold, he spreads his light over it, and he covers the roots of the sea.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'over him'; the Hebrew pronoun is masculine singular, but the referent
      is not explicit and may point to the cloud/storm context rather than a person.
    reason: alternative_reading
  - marker: b
    text: Or 'his lightning' or 'his brightness' for 'his light.'
    reason: lexical_alternative
  - marker: c
    text: Literally 'the roots of the sea'; this may mean its deepest or foundational
      parts.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֵן
  chosen: Behold
  alternatives:
  - See
  - Look
  lexicon: HALOT
  rationale: Discourse particle drawing attention to what follows. 'Behold' preserves
    the elevated poetic force better than the more colloquial 'look' or 'see'.
- source_word: פָּרַשׂ
  chosen: spreads
  alternatives:
  - spreads out
  - stretches out
  lexicon: HALOT
  rationale: The verb commonly means to spread out or extend. 'Spreads' is concise
    and natural in English while retaining the image of extension.
- source_word: עָלָיו
  chosen: over it
  alternatives:
  - over him
  - upon it
  lexicon: HALOT
  rationale: The pronominal suffix is masculine singular and could formally be 'over
    him/it.' In context, the nearest and most coherent referent is the rain cloud/storm
    mass described in the surrounding verses, so impersonal 'it' best fits the imagery.
    The alternative is preserved in a footnote because the referent is not explicit
    in the verse itself.
- source_word: אוֹרוֹ
  chosen: his light
  alternatives:
  - his lightning
  - his brightness
  lexicon: HALOT
  rationale: The noun ordinarily means 'light,' but in storm context it can denote
    lightning or luminous brightness. 'His light' keeps the Hebrew's broader term
    in the main text while allowing the storm-related nuance to remain available in
    a footnote.
- source_word: וְשָׁרְשֵׁי
  chosen: and ... the roots of
  alternatives:
  - and ... the foundations of
  - and ... the depths of
  lexicon: HALOT
  rationale: Literally 'roots of.' In poetic usage this can metaphorically denote
    the deepest or foundational parts. Retaining 'roots' preserves the vivid Hebrew
    image, though 'foundations' or 'depths' are interpretive alternatives.
- source_word: הַיָּם
  chosen: the sea
  alternatives:
  - the waters
  lexicon: HALOT
  rationale: The noun straightforwardly means 'sea.' 'Waters' would generalize beyond
    the lexical sense.
- source_word: כִּסָּה
  chosen: he covers
  alternatives:
  - he has covered
  - he conceals
  lexicon: HALOT
  rationale: The verb means 'cover.' The English present fits the poetic descriptive
    sequence. 'Conceals' is possible by implication but less direct than the concrete
    image.
