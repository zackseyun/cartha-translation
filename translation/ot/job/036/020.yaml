id: JOB.36.20
reference: Job 36:20
source:
  edition: WLC
  text: אַל תִּשְׁאַ֥ף הַ/לָּ֑יְלָה לַ/עֲל֖וֹת עַמִּ֣ים תַּחְתָּֽ/ם־׃
translation:
  text: Do not long for the night, when peoples are taken away from their place.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'Do not long for the night, for peoples to go up under
      them.' The Hebrew is difficult; 'are taken away from their place' reflects a
      common contextual understanding.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַל
  chosen: Do not
  alternatives:
  - Do not let ...
  - Never
  lexicon: HALOT
  rationale: אַל with the imperfect gives a negative prohibition. Simple imperative
    English best matches the force.
- source_word: תִּשְׁאַף
  chosen: long for
  alternatives:
  - pant for
  - yearn for
  - desire
  lexicon: HALOT
  rationale: The verb שׁאף can denote panting or eager longing. In this context, with
    'the night' as object, 'long for' communicates prohibited desire naturally in
    English without over-literal awkwardness.
- source_word: הַלָּיְלָה
  chosen: the night
  alternatives:
  - nighttime
  lexicon: HALOT
  rationale: Straightforward rendering of the definite noun; the article is naturally
    represented in English.
- source_word: לַעֲלוֹת
  chosen: when ... are taken away
  alternatives:
  - for the rising of
  - for bringing up
  - when ... go up
  lexicon: HALOT
  rationale: The infinitive construct of עלה is difficult here. In context, many interpreters
    understand it idiomatically of peoples being removed or carried off. Rendering
    it temporally with passive sense yields coherent English while reflecting the
    likely contextual meaning.
- source_word: עַמִּים
  chosen: peoples
  alternatives:
  - nations
  - people groups
  lexicon: HALOT
  rationale: The plural refers to groups or nations rather than merely individuals.
    'Peoples' preserves the plural and ethnic/corporate sense better than singular
    'people.'
- source_word: תַּחְתָּם
  chosen: from their place
  alternatives:
  - from under them
  - in their place
  - where they stand
  lexicon: HALOT
  rationale: תחת literally means 'under/beneath,' but in this idiom it likely refers
    to removal from one's place or station. 'From their place' gives the probable
    sense in idiomatic English while remaining close to the contextual force.
