id: JOB.36.15
reference: Job 36:15
source:
  edition: WLC
  text: יְחַלֵּ֣ץ עָנִ֣י בְ/עָנְי֑/וֹ וְ/יִ֖גֶל בַּ/לַּ֣חַץ אָזְנָֽ/ם׃
translation:
  text: He rescues the afflicted by their affliction, and opens their ears by oppression.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'delivers the poor in their affliction.' The Hebrew terms can emphasize
      poverty, affliction, or oppression.
    reason: lexical_alternative
  - marker: b
    text: Literally 'uncovers/open[s] their ear(s),' a Hebrew idiom for making someone
      listen or receive instruction.
    reason: cultural_note
lexical_decisions:
- source_word: יְחַלֵּץ
  chosen: rescues
  alternatives:
  - delivers
  lexicon: HALOT
  rationale: The Piel of חלץ here carries the sense of drawing out or delivering from
    danger. 'Rescues' is clear modern English and preserves the active saving sense;
    'delivers' is also possible but slightly more traditional/churchy in tone.
- source_word: עָנִי
  chosen: the afflicted
  alternatives:
  - the poor
  - the humble
  lexicon: HALOT
  rationale: Though עָנִי can denote the poor, in wisdom literature it often includes
    the sense of one who is afflicted or oppressed. Here the parallel with עָנְיוֹ
    ('his affliction') and לַחַץ ('oppression/distress') favors 'the afflicted' over
    a narrowly economic 'the poor'.
- source_word: בְעָנְיוֹ
  chosen: by their affliction
  alternatives:
  - in his affliction
  - through his misery
  lexicon: HALOT
  rationale: 'The beth preposition is instrumental or circumstantial here: God rescues
    the afflicted by means of, or in the context of, affliction itself. Because עָנִי
    is used generically, English idiom is smoother with singular-to-plural adjustment
    (''their'') while preserving the representative sense. ''By'' best captures the
    instrumental nuance.'
- source_word: וְיִגֶל
  chosen: opens
  alternatives:
  - uncovers
  - reveals
  lexicon: HALOT
  rationale: From גלה, the Qal can mean uncover or reveal. With 'ear' as object, the
    idiom means to open the ear for hearing instruction or warning. 'Opens' communicates
    the idiomatic sense in natural English better than the more literal 'uncovers'.
- source_word: בַּלַּחַץ
  chosen: by oppression
  alternatives:
  - in oppression
  - through distress
  - by distress
  lexicon: HALOT
  rationale: לַחַץ denotes pressure, oppression, or distress. The preposition again
    likely has instrumental force parallel to בְעָנְיוֹ. 'By oppression' preserves
    the starkness of the Hebrew, though the sense includes distress/pressure more
    broadly.
- source_word: אָזְנָם
  chosen: their ears
  alternatives:
  - his ear
  lexicon: HALOT
  rationale: The consonantal form with 3mp suffix is reflected in the provided morphology,
    yielding 'their ears.' This also fits the generic singular עָנִי used collectively.
    Some translations smooth to singular, but the supplied text supports the plural.
