id: JOB.36.33
reference: Job 36:33
source:
  edition: WLC
  text: יַגִּ֣יד עָלָ֣י/ו רֵע֑/וֹ מִ֝קְנֶ֗ה אַ֣ף עַל עוֹלֶֽה־׃
translation:
  text: Its thunder declares concerning him; the cattle also, concerning what is rising.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew is difficult. Literally, 'his friend' could be read instead of 'its
      thunder'; many understand the line to refer to the storm's noise.
    reason: lexical_alternative
  - marker: b
    text: Or 'the cattle also [declare] about the storm that is rising.' The final
      phrase likely refers to an approaching storm, but the Hebrew says only 'what
      is rising.'
    reason: alternative_reading
lexical_decisions:
- source_word: יַגִּיד
  chosen: declares
  alternatives:
  - tells
  - announces
  - proclaims
  lexicon: HALOT
  rationale: Hiphil of נגד commonly means 'declare, announce, make known.' 'Declares'
    preserves the elevated tone and fits the poetic context better than the more colloquial
    'tells.'
- source_word: עָלָיו
  chosen: concerning him
  alternatives:
  - about him
  - against him
  lexicon: HALOT
  rationale: The preposition על with pronominal suffix can mean 'concerning/about'
    or in some contexts 'against.' In this difficult poetic line, 'concerning him'
    best fits a neutral declarative sense without over-interpreting the referent.
- source_word: רֵעוֹ
  chosen: its thunder
  alternatives:
  - his friend
  - his noise
  - its sound
  lexicon: HALOT
  rationale: The consonantal form is difficult and has been variously understood.
    In context, Elihu has been speaking of storm phenomena, and many interpreters
    take this as referring to the storm's noise/thunder rather than 'friend.' Rendering
    it as 'its thunder' gives coherent sense in context while reflecting the likely
    meteorological reference. The more literal but less intelligible 'his friend'
    is preserved in a footnote as an alternative.
- source_word: מִקְנֶה
  chosen: the cattle
  alternatives:
  - livestock
  - possession
  lexicon: HALOT
  rationale: The noun most commonly denotes cattle/livestock. Although it can more
    broadly refer to possessions, the animal sense is preferable here, especially
    in a weather context where animals are portrayed as sensing an approaching storm.
- source_word: אַף
  chosen: also
  alternatives:
  - even
  - indeed
  lexicon: HALOT
  rationale: The particle adds emphasis or extension. 'Also' fits the line's parallel
    development naturally in English.
- source_word: עַל
  chosen: concerning
  alternatives:
  - about
  - against
  - at
  lexicon: HALOT
  rationale: As with the earlier על, a neutral 'concerning/about' best preserves the
    ambiguity of the Hebrew in this difficult verse.
- source_word: עוֹלֶה
  chosen: what is rising
  alternatives:
  - the one who rises
  - the storm rising
  - ascending vapor
  lexicon: HALOT
  rationale: The Qal participle of עלה means 'going up, rising, ascending.' Because
    the object is not explicit, 'what is rising' preserves the Hebrew's open-endedness.
    In context this likely refers to the storm-cloud or rising tempest, but the translation
    avoids specifying more than the text states.
