theological_decisions:
- issue: Referent of 'wrath' and the warning's object
  chosen_reading: Render generically as 'wrath' without specifying whether it is Job's
    anger, divine wrath, or wrath in principle.
  alternative_readings:
  - divine wrath
  - your anger
  rationale: The Hebrew does not explicitly identify the referent, and the immediate
    context allows more than one interpretive construal. To preserve theological tension
    rather than resolve it, the translation leaves the referent open.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
