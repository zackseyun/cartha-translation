id: JOB.36.18
reference: Job 36:18
source:
  edition: WLC
  text: כִּֽי חֵ֭מָה פֶּן יְסִֽיתְ/ךָ֣ בְ/סָ֑פֶק וְ/רָב כֹּ֝֗פֶר אַל יַטֶּֽ/ךָּ־־־־׃
translation:
  text: Because wrath, beware lest it entice you into scoffing, and do not let the
    greatness of a ransom turn you aside.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'lest it entice you with clapping'; the Hebrew term translated 'scoffing'
      is difficult and may refer more literally to striking the hands or clapping,
      possibly as a gesture of derision.
    reason: lexical_alternative
  - marker: b
    text: Or 'and do not let a great ransom sway you.' The Hebrew may be read with
      'great' directly qualifying 'ransom.'
    reason: alternative_reading
  - marker: c
    text: '''Ransom'' may also be understood as ''price of atonement'' or, in some
      contexts, ''bribe.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: Because
  alternatives:
  - For
  lexicon: HALOT
  rationale: Introduces the ground or warning that follows. 'Because' fits the causal
    force in context, though 'For' is also possible.
- source_word: חֵמָה
  chosen: wrath
  alternatives:
  - anger
  - rage
  lexicon: HALOT
  rationale: The noun denotes burning anger or wrath. 'Wrath' preserves the intensity
    and moral seriousness better than the flatter 'anger.' The referent is contextually
    ambiguous (either wrath in general, divine wrath, or Elihu's warning about anger),
    so a broad rendering is preferable.
- source_word: פֶּן
  chosen: beware lest
  alternatives:
  - lest
  lexicon: HALOT
  rationale: The particle marks warning against a possible outcome. Rendering with
    'beware lest' makes the admonitory force natural in English while preserving the
    warning sense.
- source_word: יְסִיתְךָ
  chosen: it entice you
  alternatives:
  - it incite you
  - it mislead you
  - it lure you
  lexicon: HALOT
  rationale: The Hiphil of סות carries the sense of inciting, enticing, or leading
    astray. 'Entice' fits the warning context and works smoothly with the following
    prepositional phrase.
- source_word: בְסָפֶק
  chosen: into scoffing
  alternatives:
  - with clapping
  - into mockery
  lexicon: HALOT
  rationale: This term is difficult and debated. In context, many understand it as
    derisive striking/scoffing rather than literal 'clapping.' 'Into scoffing' best
    captures the likely idiomatic sense in a warning about being led into a wrong
    response. The more literal alternative is preserved in a footnote.
- source_word: וְרָב
  chosen: and the greatness of
  alternatives:
  - and abundance of
  - and a great
  lexicon: HALOT
  rationale: The adjective/noun conveys largeness or abundance. Here it modifies 'ransom'
    idiomatically; 'the greatness of' expresses the sense of a large or abundant ransom.
- source_word: כֹּפֶר
  chosen: a ransom
  alternatives:
  - a bribe
  - atonement price
  lexicon: HALOT
  rationale: כֹּפֶר can denote a ransom price, compensation, or in some contexts a
    bribe. In this wisdom context, 'ransom' is the least interpretively loaded and
    aligns with the broader semantic range of a price paid to avert consequences.
    'Bribe' is possible but too specific for the main text.
- source_word: אַל יַטֶּךָּ
  chosen: do not let ... turn you aside
  alternatives:
  - do not let ... sway you
  - do not let ... mislead you
  lexicon: HALOT
  rationale: The verb נטה in Hiphil/jussive can mean to turn aside, incline, or sway.
    'Turn you aside' preserves the metaphor of deviation from a right course.
