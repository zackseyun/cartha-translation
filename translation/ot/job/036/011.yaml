id: JOB.36.11
reference: Job 36:11
source:
  edition: WLC
  text: אִֽם יִשְׁמְע֗וּ וְֽ/יַ֫עֲבֹ֥דוּ יְכַלּ֣וּ יְמֵי/הֶ֣ם בַּ/טּ֑וֹב וּ֝/שְׁנֵי/הֶ֗ם
    בַּ/נְּעִימִֽים־׃
translation:
  text: If they listen and serve, they will complete their days in prosperity and
    their years in pleasantness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'hear and obey'; the Hebrew verb for 'listen' can also carry the sense
      of obedient hearing in context.
    reason: lexical_alternative
  - marker: b
    text: Or 'spend their days in good' and 'their years in delights.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  chosen: If
  alternatives:
  - When
  lexicon: HALOT
  rationale: Introduces a conditional clause. 'If' best preserves the straightforward
    conditional sense in Elihu's statement.
- source_word: יִשְׁמְעוּ
  chosen: they listen
  alternatives:
  - they hear
  - they obey
  lexicon: HALOT
  rationale: שׁמע can mean hear/listen/obey depending on context. Here, paired with
    'serve,' it likely implies responsive hearing, but 'listen' preserves the lexical
    sense without over-interpreting as full obedience.
- source_word: וְיַעֲבֹדוּ
  chosen: and serve
  alternatives:
  - and worship
  - and labor
  lexicon: HALOT
  rationale: עבד commonly means serve. In this wisdom context about responding rightly
    to God, 'serve' is broad enough to include obedient service without narrowing
    to cultic 'worship' alone.
- source_word: יְכַלּוּ
  chosen: they will complete
  alternatives:
  - they will spend
  - they will finish
  - they will consume
  lexicon: HALOT
  rationale: כלה in the piel can mean complete/bring to an end. With 'days' and 'years,'
    the idiom refers to living out or finishing one's lifespan. 'Complete' keeps the
    verbal force while remaining natural in English.
- source_word: יְמֵיהֶם
  chosen: their days
  lexicon: HALOT
  rationale: Standard rendering of the plural construct with suffix; retained literally
    because it is idiomatic and clear in English.
- source_word: בַּטּוֹב
  chosen: in prosperity
  alternatives:
  - in good
  - in well-being
  - in happiness
  lexicon: HALOT
  rationale: טוֹב here functions substantivally after ב, describing favorable circumstances.
    'In prosperity' best captures the sense of a good, flourishing condition in context.
- source_word: וּשְׁנֵיהֶם
  chosen: and their years
  lexicon: HALOT
  rationale: Parallel to 'their days'; rendered literally to preserve the poetic balance.
- source_word: בַּנְּעִימִים
  chosen: in pleasantness
  alternatives:
  - in delights
  - in pleasant things
  - in sweetness
  lexicon: HALOT
  rationale: From נעים, denoting pleasantness/delightfulness. The plural form may
    be intensive or abstract in sense. 'In pleasantness' preserves the poetic parallel
    with 'in prosperity' without over-specifying material pleasures.
