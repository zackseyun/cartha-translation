id: JOB.36.8
reference: Job 36:8
source:
  edition: WLC
  text: וְ/אִם אֲסוּרִ֥ים בַּ/זִּקִּ֑ים יִ֝לָּכְד֗וּ/ן בְּ/חַבְלֵי עֹֽנִי־־׃
translation:
  text: And if they are bound in chains, caught in cords of affliction,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with fetters' for 'in chains.'
    reason: lexical_alternative
  - marker: b
    text: Or 'in cords of misery' or 'in cords of poverty'; the Hebrew term can denote
      affliction, misery, or poverty depending on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִם
  chosen: And if
  alternatives:
  - But if
  - If
  lexicon: HALOT
  rationale: Introduces a conditional clause. 'And if' preserves the connective force
    of וְ plus the conditional אִם in a natural English way within the flow of Elihu's
    speech.
- source_word: אֲסוּרִים
  chosen: they are bound
  alternatives:
  - they are prisoners
  - they are fettered
  lexicon: HALOT
  rationale: Passive participle from אסר, 'to bind.' 'They are bound' best preserves
    the verbal/passive sense rather than turning it into a noun ('prisoners'), while
    remaining idiomatic.
- source_word: בַּזִּקִּים
  chosen: in chains
  alternatives:
  - with fetters
  - in shackles
  lexicon: HALOT
  rationale: Refers to restraints or fetters. 'Chains' is clear modern English and
    fits the imagery of physical confinement. 'Fetters' is possible but less accessible.
- source_word: יִלָּכְדוּן
  chosen: caught
  alternatives:
  - they are captured
  - they are seized
  lexicon: HALOT
  rationale: Niphal/imperfect from לכד, conveying being taken or captured. In English,
    'caught' works smoothly in parallel with 'bound' and preserves the passive sense
    without overformal wording.
- source_word: בְּחַבְלֵי
  chosen: in cords of
  alternatives:
  - with ropes of
  - in bonds of
  lexicon: HALOT
  rationale: חבל can denote cord/rope/band. 'Cords of' preserves the concrete metaphor
    and pairs well with the restraint imagery already present in the verse.
- source_word: עֹנִי
  chosen: affliction
  alternatives:
  - misery
  - poverty
  - trouble
  lexicon: HALOT
  rationale: עֹנִי can denote affliction, misery, or poverty depending on context.
    Here, in parallel with being bound and caught under divine discipline, 'affliction'
    best captures suffering broadly without narrowing to economic poverty.
