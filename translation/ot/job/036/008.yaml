theological_decisions:
- issue: Nature of the imagery
  chosen_reading: Retain the concrete imagery of physical restraint while allowing
    it to function metaphorically for suffering or divine discipline.
  alternative_readings:
  - Interpret the language as purely literal imprisonment
  - Interpret the language as purely metaphorical adversity
  rationale: The verse's immediate wording is concrete ('bound,' 'chains,' 'cords'),
    but in context Elihu speaks of God's dealings with sufferers. The translation
    preserves the imagery without forcing either a strictly literal or strictly metaphorical
    interpretation.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
