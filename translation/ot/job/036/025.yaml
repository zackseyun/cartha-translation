id: JOB.36.25
reference: Job 36:25
source:
  edition: WLC
  text: כָּל אָדָ֥ם חָֽזוּ ב֑/וֹ אֱ֝נ֗וֹשׁ יַבִּ֥יט מֵ/רָחֽוֹק־־׃
translation:
  text: All mankind has looked on it; man gazes from afar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'All humanity has seen him'; the Hebrew pronoun is masculine singular
      and could be taken personally, but the context favors reference to God's work
      or deed.
    reason: alternative_reading
  - marker: b
    text: '''Man'' and ''mankind'' here are generic terms for human beings, reflecting
      the Hebrew אָדָם and אֱנוֹשׁ.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל אָדָם
  chosen: All mankind
  alternatives:
  - Every man
  - All humanity
  lexicon: HALOT
  rationale: כָּל with אָדָם gives a comprehensive statement about humanity. 'All
    mankind' preserves the collective force while remaining natural English. This
    follows the doctrine's guidance on אָדָם as 'man / humankind' according to context;
    here the sense is generic rather than referring to an individual male.
- source_word: חָזוּ
  chosen: has looked on
  alternatives:
  - have seen
  - has beheld
  lexicon: HALOT
  rationale: The verb חזה commonly denotes seeing, often with a contemplative or observational
    nuance. 'Has looked on' preserves that nuance better than the flatter 'have seen,'
    while using singular agreement to match the collective singular sense of 'mankind'
    in English.
- source_word: בוֹ
  chosen: it
  alternatives:
  - him
  - this
  lexicon: HALOT
  rationale: The pronominal suffix is masculine singular, but in context it most naturally
    refers to God's work/deed just mentioned rather than to a male person. English
    'it' best reflects that likely impersonal antecedent without over-interpreting.
    'Him' is grammatically possible but contextually less likely here.
- source_word: אֱנוֹשׁ
  chosen: man
  alternatives:
  - a mortal
  - humanity
  lexicon: HALOT
  rationale: אֱנוֹשׁ often emphasizes mortal man or human frailty. Here 'man' works
    idiomatically in parallel with the collective first colon. 'A mortal' is possible
    and captures nuance, but 'man' better preserves the poetic parallelism and readability.
- source_word: יַבִּיט
  chosen: gazes
  alternatives:
  - looks
  - beholds
  lexicon: HALOT
  rationale: The Hiphil of נבט means to look, regard, or gaze. 'Gazes' conveys sustained
    looking and fits the poetic tone. 'Looks' is possible but less vivid; 'beholds'
    is more archaic than desired.
- source_word: מֵרָחוֹק
  chosen: from afar
  alternatives:
  - from far away
  - from a distance
  lexicon: HALOT
  rationale: מִן + רָחוֹק denotes distance. 'From afar' is concise, poetic, and natural
    in English, fitting the verse's elevated style.
