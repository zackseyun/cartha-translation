id: JOB.36.26
reference: Job 36:26
source:
  edition: WLC
  text: הֶן אֵ֣ל שַׂ֭גִּיא וְ/לֹ֣א נֵדָ֑ע מִסְפַּ֖ר שָׁנָ֣י/ו וְ/לֹא חֵֽקֶר־־׃
translation:
  text: Behold, God is great, and we do not know him; the number of his years is unsearchable.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'and we do not know.' The object 'him' is implicit from
      the context.
    reason: lexical_alternative
  - marker: b
    text: Or, 'there is no searching out of the number of his years.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֶן
  chosen: Behold
  alternatives:
  - Indeed
  - Look
  lexicon: HALOT
  rationale: Introduces an emphatic assertion and draws attention to what follows.
    'Behold' preserves the elevated, poetic force better than a flatter 'indeed,'
    while remaining natural in wisdom poetry.
- source_word: אֵל
  chosen: God
  alternatives:
  - God Mighty One
  lexicon: HALOT
  rationale: Here אֵל functions as the common poetic designation for God, not as a
    proper name to be transliterated. 'God' is the clearest English rendering in context.
- source_word: שַׂגִּיא
  chosen: great
  alternatives:
  - exalted
  - mighty
  - vast
  lexicon: HALOT
  rationale: The adjective conveys greatness or exalted magnitude. 'Great' is idiomatic
    and broad enough to preserve both majesty and incomparability without over-specifying.
- source_word: וְלֹא נֵדָע
  chosen: and we do not know him
  alternatives:
  - and we do not know
  - and he is beyond our knowledge
  lexicon: HALOT
  rationale: The Hebrew is literally 'and we do not know.' In context, the object
    is implicit from the preceding reference to God, so English naturally supplies
    'him.' This preserves the sense that God is not comprehended by human knowledge,
    rather than merely stating an unspecified ignorance.
- source_word: מִסְפַּר
  chosen: the number
  alternatives:
  - number
  - count
  lexicon: HALOT
  rationale: 'A straightforward rendering of the construct noun. The definite article
    is supplied in English for natural syntax: ''the number of his years.'''
- source_word: שָׁנָיו
  chosen: his years
  alternatives:
  - his lifetime
  - his days
  lexicon: HALOT
  rationale: The plural noun with 3ms suffix refers to God's years, a poetic way of
    speaking of his duration or age. 'His years' preserves the metaphor and the anthropomorphic
    idiom of the Hebrew.
- source_word: וְלֹא חֵקֶר
  chosen: is unsearchable
  alternatives:
  - there is no searching out
  - is beyond searching out
  - cannot be searched out
  lexicon: HALOT
  rationale: The phrase literally means 'and there is no searching out/investigation.'
    Rendering it as 'is unsearchable' gives idiomatic English while preserving the
    idea that God's years are beyond human investigation or comprehension.
