theological_decisions:
- issue: Implicit object in וְלֹא נֵדָע
  chosen_reading: 'Supply ''him'' in English: ''we do not know him'''
  alternative_readings:
  - 'leave the clause absolute: ''we do not know'''
  - 'expand interpretively: ''he is beyond our knowledge'''
  rationale: The Hebrew leaves the object unstated, but the immediate subject is God
    and the sense in context is that God is not fully known/comprehended by humans.
    Supplying 'him' is a minimal, transparent completion required by natural English
    and avoids a vaguer statement of ignorance detached from its object.
  doctrine_reference: Translation philosophy §1, §3
- issue: Meaning of God's 'years'
  chosen_reading: Retain the anthropomorphic expression 'his years'
  alternative_readings:
  - interpret as 'his eternity'
  - interpret as 'his lifetime'
  rationale: The verse poetically speaks of God's years as innumerable/unsearchable.
    Rendering this directly preserves the theological tension and poetic imagery without
    importing a more systematic term like 'eternity' that the Hebrew does not explicitly
    use.
  doctrine_reference: Translation philosophy §3
