id: JOB.36.7
reference: Job 36:7
source:
  edition: WLC
  text: לֹֽא יִגְרַ֥ע מִ/צַּדִּ֗יק עֵ֫ינָ֥י/ו וְ/אֶת מְלָכִ֥ים לַ/כִּסֵּ֑א וַ/יֹּשִׁיבֵ֥/ם
    לָ֝/נֶ֗צַח וַ/יִּגְבָּֽהוּ־־׃
translation:
  text: He does not withdraw his eyes from the righteous; but with kings on the throne
    he seats them forever, and they are exalted.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or: ''and kings on the throne—he seats them forever.'' The Hebrew is compact,
      and some understand the clause to speak directly of kings rather than of the
      righteous being seated with kings.'
    reason: alternative_reading
  - marker: b
    text: 'Or: ''and he exalts them.'' The final verb may be understood actively with
      God as the implied subject.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יִגְרַע
  chosen: withdraw
  alternatives:
  - take away
  - remove
  - diminish
  lexicon: HALOT
  rationale: The verb גרע commonly means to diminish, reduce, or take away. With 'his
    eyes' as the object, the idiom is best rendered 'withdraw' or 'take away' his
    eyes, meaning to cease watching over. 'Withdraw' is natural English and preserves
    the metaphor.
- source_word: מִצַּדִּיק
  chosen: from the righteous
  alternatives:
  - from a righteous man
  - from the just
  lexicon: HALOT
  rationale: The singular adjective functions collectively/generically here. 'The
    righteous' captures the class sense without over-specifying an individual male
    referent.
- source_word: עֵינָיו
  chosen: his eyes
  alternatives:
  - his gaze
  - his eye
  lexicon: HALOT
  rationale: A literal rendering preserves the Hebrew anthropomorphic idiom. 'His
    gaze' is possible but less transparent to the source wording.
- source_word: וְאֶת מְלָכִים לַכִּסֵּא
  chosen: but with kings on the throne
  alternatives:
  - and kings on the throne
  - even kings on the throne
  - and he sets kings on the throne
  lexicon: HALOT
  rationale: 'The clause is elliptical. The direct-object marker אֶת before ''kings''
    likely introduces the next clause''s object, while לַכִּסֵּא gives the royal setting.
    ''But with kings on the throne'' makes good sense in context: God not only watches
    the righteous, he places them in royal honor. This avoids importing an extra finite
    verb not present in Hebrew.'
- source_word: וַיֹּשִׁיבֵם
  chosen: he seats them
  alternatives:
  - he causes them to sit
  - he enthrones them
  - he sets them
  lexicon: HALOT
  rationale: Hiphil of ישׁב means 'cause to sit' or 'seat.' 'He seats them' is a clear,
    moderately formal rendering. 'Enthrones them' is interpretive and stronger than
    the Hebrew explicitly states, though contextually related.
- source_word: לָנֶצַח
  chosen: forever
  alternatives:
  - for ever
  - perpetually
  - enduringly
  lexicon: HALOT
  rationale: The noun נצח with ל expresses enduring duration. 'Forever' is idiomatic
    modern English and fits the poetic context.
- source_word: וַיִּגְבָּהוּ
  chosen: and they are exalted
  alternatives:
  - and he exalts them
  - and they rise high
  lexicon: HALOT
  rationale: The form is morphologically ambiguous in context, but the sense is that
    the righteous are raised to high status. Rendering it as passive/resultative English,
    'they are exalted,' fits the sequence and avoids overclaiming a specific Hebrew
    voice where the clause is terse.
