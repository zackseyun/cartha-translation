theological_decisions:
- issue: Anthropomorphic language for God's attention
  chosen_reading: Retain the concrete expression 'his eyes' rather than abstracting
    to 'his care' or 'his attention.'
  alternative_readings:
  - his gaze
  - his care
  - his attention
  rationale: The verse poetically depicts God's unceasing watchfulness over the righteous.
    Preserving the anthropomorphic image reflects the Hebrew text without flattening
    it into abstraction.
  doctrine_reference: Translation philosophy §1, §6
- issue: Referent of 'them' in the royal clause
  chosen_reading: The pronoun refers to the righteous, who are seated with kings/on
    the throne and exalted.
  alternative_readings:
  - The pronoun refers to kings, whom God seats forever
  - God seats the righteous as kings
  rationale: The immediate context contrasts God's treatment of the righteous and
    the wicked, and the singular collective 'the righteous' naturally supplies the
    plural pronominal referent. The translation preserves some ambiguity in the royal
    imagery without making a stronger claim than the Hebrew requires.
  doctrine_reference: Translation philosophy §3
