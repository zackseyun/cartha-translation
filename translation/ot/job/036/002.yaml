theological_decisions:
- issue: Force of לֶאֱלוֹהַּ in Elihu's claim
  chosen_reading: Rendered broadly as 'for God'
  alternative_readings:
  - on God's behalf
  - concerning God
  rationale: The phrase can suggest either that Elihu speaks in God's defense or that
    he still has more to say concerning God. Because the Hebrew preposition is semantically
    broad and the verse itself does not require a stronger claim of direct divine
    representation, the main text preserves the ambiguity with 'for God,' while alternatives
    are noted.
  doctrine_reference: Preserve theological tension rather than resolve it.
