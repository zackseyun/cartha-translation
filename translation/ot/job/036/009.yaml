theological_decisions:
- issue: Moral nuance of יִתְגַּבָּרוּ
  chosen_reading: rendered as arrogant self-exaltation ('they have acted arrogantly')
  alternative_readings:
  - they have become strong
  - they have prevailed
  rationale: The verse is not making a theological claim about strength as such, but
    about sinful conduct exposed by God. In parallel with 'their transgressions,'
    the verb is best taken ethically as self-exaltation or arrogance. This preserves
    the rebuking force of Elihu's statement without importing later doctrinal categories.
  doctrine_reference: Translation philosophy §1, §3, §6
