id: JOB.36.9
reference: Job 36:9
source:
  edition: WLC
  text: וַ/יַּגֵּ֣ד לָ/הֶ֣ם פָּעֳלָ֑/ם וּ֝/פִשְׁעֵי/הֶ֗ם כִּ֣י יִתְגַּבָּֽרוּ׃
translation:
  text: then he declares to them their deeds and their transgressions, that they have
    acted arrogantly.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'that they have become strong'; in context the sense
      is likely self-exaltation or arrogance.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּגֵּד
  chosen: then he declares
  alternatives:
  - and he tells
  - then he reports
  - and he declares
  lexicon: HALOT
  rationale: The verb נגד in Hiphil commonly means 'tell, declare, make known.' In
    this context Elihu describes God's revelatory action toward the afflicted; 'declares'
    preserves the formal sense of making something known with some gravity. 'Then'
    reflects the narrative waw in smooth English within the conditional sequence of
    the surrounding context.
- source_word: לָהֶם
  chosen: to them
  lexicon: HALOT
  rationale: Straightforward preposition plus pronominal suffix indicating the indirect
    object of the declaration.
- source_word: פָּעֳלָם
  chosen: their deeds
  alternatives:
  - their work
  - what they have done
  lexicon: HALOT
  rationale: פֹּעַל/פָּעַל can denote work, deed, or action. Here, paired with 'their
    transgressions,' it refers to their actions in a moral sense. 'Deeds' is concise
    and idiomatic, while 'work' could sound occupational rather than ethical.
- source_word: וּפִשְׁעֵיהֶם
  chosen: and their transgressions
  alternatives:
  - and their rebellions
  - and their offenses
  lexicon: HALOT
  rationale: פשע often carries the sense of rebellion or transgression against rightful
    authority. 'Transgressions' is a clear, established English equivalent that preserves
    moral seriousness without over-paraphrasing. 'Rebellions' is possible but less
    natural in this collocation.
- source_word: כִּי
  chosen: that
  alternatives:
  - because
  - for
  lexicon: HALOT
  rationale: 'Here כִּי introduces the content of what is declared: namely, that they
    have become/arisen in pride. Rendering it as ''that'' best fits the syntax after
    ''declares to them.'' A causal ''because'' is possible but less likely in this
    immediate construction.'
- source_word: יִתְגַּבָּרוּ
  chosen: they have acted arrogantly
  alternatives:
  - they have become strong
  - they have exalted themselves
  - they have grown proud
  lexicon: HALOT
  rationale: The Hitpael of גבר here is idiomatic in context and commonly understood
    as self-exaltation or arrogant self-assertion, especially given the moral frame
    of 'transgressions.' A literal 'become strong' would miss the negative ethical
    nuance. 'Acted arrogantly' communicates the likely sense in natural English while
    staying close to the Hebrew idea of self-magnification.
