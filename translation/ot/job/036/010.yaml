theological_decisions:
- issue: Nature of מוּסָר in Elihu's speech
  chosen_reading: discipline as corrective instruction
  alternative_readings:
  - instruction in a more purely pedagogical sense
  - chastening with stronger punitive emphasis
  rationale: The immediate context presents suffering as a means by which God teaches
    and recalls people from wrongdoing. 'Discipline' preserves the tension between
    instruction and correction without importing a specific doctrinal theory of suffering.
  doctrine_reference: Translation philosophy §3, §6
