id: JOB.36.10
reference: Job 36:10
source:
  edition: WLC
  text: וַ/יִּ֣גֶל אָ֭זְנָ/ם לַ/מּוּסָ֑ר וַ֝/יֹּ֗אמֶר כִּֽי יְשֻׁב֥וּ/ן מֵ/אָֽוֶן־׃
translation:
  text: He opens their ear to discipline, and says that they should turn back from
    iniquity.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'uncovers their ear for instruction' or 'opens their ears to correction.'
    reason: lexical_alternative
  - marker: b
    text: '''Iniquity'' may also be rendered ''wickedness'' or, in some contexts,
      ''trouble.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּגֶל
  chosen: opens
  alternatives:
  - uncovers
  - reveals
  lexicon: HALOT
  rationale: From גלה in the causative sense of uncovering or opening. With 'ear'
    as object, the idiom means to open/uncover the ear for receptive hearing. 'Opens'
    is natural English while preserving the metaphor.
- source_word: אָזְנָם
  chosen: their ear
  alternatives:
  - their ears
  lexicon: HALOT
  rationale: Hebrew uses the singular noun with 3mp suffix. English can keep the singular
    collective idiomatically ('their ear') to reflect the source more closely, especially
    in the expression 'open the ear.'
- source_word: לַמּוּסָר
  chosen: to discipline
  alternatives:
  - for instruction
  - for correction
  - for chastening
  lexicon: HALOT
  rationale: מוּסָר can denote discipline, instruction, or correction. In Job 36 the
    context includes affliction as corrective training, so 'discipline' best captures
    both pedagogical and corrective force without over-paraphrase.
- source_word: וַיֹּאמֶר
  chosen: and says
  alternatives:
  - and tells them
  - and declares
  lexicon: HALOT
  rationale: Simple rendering of אמר. Present-tense English in this poetic context
    is acceptable but the conjunction keeps the sequence clear. 'Says' avoids adding
    an indirect object not explicit in the Hebrew.
- source_word: כִּי
  chosen: that
  alternatives:
  - for
  - because
  lexicon: HALOT
  rationale: Here כִּי introduces the content of what is said rather than a causal
    clause, so 'that' is the best fit.
- source_word: יְשֻׁבוּן
  chosen: they should turn back
  alternatives:
  - they return
  - they must turn back
  lexicon: HALOT
  rationale: From שוב, 'turn/return.' In this reported-speech context it expresses
    the commanded or urged response. 'Should turn back' conveys exhortation without
    overstating it as an absolute imperative in English.
- source_word: מֵאָוֶן
  chosen: from iniquity
  alternatives:
  - from trouble
  - from wickedness
  - from evil
  lexicon: HALOT
  rationale: אָוֶן can mean trouble, wickedness, or iniquity. In this moral context,
    where God calls people away from wrongdoing, 'iniquity' best preserves the ethical
    sense.
