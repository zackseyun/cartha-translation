theological_decisions:
- issue: Whether שׁמע should be rendered as mere hearing or obedient response
  chosen_reading: they do not listen
  alternative_readings:
  - they do not hear
  - they do not obey
  rationale: The verse warns of judgment for refusing God's instruction. 'Listen'
    preserves the Hebrew's semantic breadth and avoids importing a narrower doctrinal
    emphasis beyond the text.
  doctrine_reference: Translation philosophy §3
- issue: Whether כִּבְלִי דָעַת expresses cause or condition
  chosen_reading: without knowledge
  alternative_readings:
  - for lack of knowledge
  rationale: The Hebrew prepositional construction naturally supports 'without knowledge.'
    The causal nuance is plausible, so it is preserved in a footnote rather than resolved
    absolutely in the main text.
  doctrine_reference: Translation philosophy §3
