id: JOB.36.12
reference: Job 36:12
source:
  edition: WLC
  text: וְ/אִם לֹ֣א יִ֭שְׁמְעוּ בְּ/שֶׁ֣לַח יַעֲבֹ֑רוּ וְ֝/יִגְוְע֗וּ כִּ/בְלִי דָֽעַת־־׃
translation:
  text: But if they do not listen, they will pass away by the sword, and they will
    die without knowledge.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "for lack of knowledge."
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִם
  chosen: But if
  alternatives:
  - And if
  - If
  lexicon: HALOT
  rationale: Introduces a conditional contrast with the previous verse. 'But if' brings
    out the adversative force in context better than a simple 'and if.'
- source_word: לֹא יִשְׁמְעוּ
  chosen: they do not listen
  alternatives:
  - they do not hear
  - they do not obey
  lexicon: HALOT
  rationale: שׁמע can mean hear, listen, or obey. In this wisdom context of responding
    to divine instruction, 'listen' preserves both hearing and heeding without over-specifying
    'obey.'
- source_word: בְּשֶׁלַח
  chosen: by the sword
  alternatives:
  - with a weapon
  - by a missile
  - by a dart
  lexicon: HALOT
  rationale: שׁלח here is an instrument of destruction. In context and by common idiomatic
    usage, 'sword' is the most natural English rendering, though the noun can more
    broadly denote a weapon or missile.
- source_word: יַעֲבֹרוּ
  chosen: they will pass away
  alternatives:
  - they will perish
  - they will pass through
  lexicon: HALOT
  rationale: עבר literally means 'pass over/through,' but in this judgment context
    it idiomatically conveys perishing. 'Pass away' keeps some of the verbal imagery
    while fitting the parallel with 'they will die.'
- source_word: וְיִגְוְעוּ
  chosen: and they will die
  alternatives:
  - and they will expire
  - and they will perish
  lexicon: HALOT
  rationale: גוע commonly denotes dying or expiring. 'Die' is clear, natural English
    and preserves the parallelism with the preceding clause.
- source_word: כִּבְלִי דָעַת
  chosen: without knowledge
  alternatives:
  - for lack of knowledge
  - without understanding
  lexicon: HALOT
  rationale: The phrase can denote either deprivation ('for lack of knowledge') or
    manner/state ('without knowledge'). 'Without knowledge' is more formally aligned
    to the Hebrew construction while still natural in English.
