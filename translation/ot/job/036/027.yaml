id: JOB.36.27
reference: Job 36:27
source:
  edition: WLC
  text: כִּ֭י יְגָרַ֣ע נִטְפֵי מָ֑יִם יָזֹ֖קּוּ מָטָ֣ר לְ/אֵדֽ/וֹ־׃
translation:
  text: For he draws up the drops of water; they distill rain from his mist.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they pour down rain from his vapor.' The Hebrew of the second line is
      difficult, and 'mist' may also be rendered 'vapor.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Because
  lexicon: HALOT
  rationale: Introduces the explanation of God's greatness in the surrounding context.
    'For' fits the causal/explanatory force in English.
- source_word: יְגָרַע
  chosen: he draws up
  alternatives:
  - he diminishes
  - he withdraws
  lexicon: HALOT
  rationale: The verb גרע commonly means 'diminish, take away, withdraw,' but in this
    meteorological context it refers to God taking up water droplets, i.e., drawing
    them upward in the water cycle. 'Draws up' expresses the contextual sense more
    clearly than a wooden 'diminishes.'
- source_word: נִטְפֵי מָיִם
  chosen: the drops of water
  alternatives:
  - water drops
  - droplets of water
  lexicon: HALOT
  rationale: Construct phrase literally denotes drops of water. 'The drops of water'
    is natural and sufficiently formal.
- source_word: יָזֹקּוּ
  chosen: they distill
  alternatives:
  - they pour down
  - they trickle
  - they refine
  lexicon: HALOT
  rationale: The verb זקק can carry the sense of filtering/refining; in context of
    rain formation it describes the water being distilled or poured out as rain. 'They
    distill' preserves the imagery of condensation better than the more interpretive
    'pour down.'
- source_word: מָטָר
  chosen: rain
  alternatives:
  - rainfall
  - shower
  lexicon: HALOT
  rationale: Standard rendering for the noun and the most natural English equivalent.
- source_word: לְאֵדוֹ
  chosen: from his mist
  alternatives:
  - from his vapor
  - for his mist
  - according to his vapor
  lexicon: HALOT
  rationale: אֵד denotes mist/vapor. The prefixed ל is difficult here; many understand
    it in a resultative or source-related sense in the poetic line. 'From his mist'
    gives coherent English and reflects the likely meteorological idea that rain comes
    from vapor. The 3ms suffix is retained as 'his,' referring to God.
