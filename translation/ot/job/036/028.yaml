id: JOB.36.28
reference: Job 36:28
source:
  edition: WLC
  text: אֲשֶֽׁר יִזְּל֥וּ שְׁחָקִ֑ים יִ֝רְעֲפ֗וּ עֲלֵ֤י אָדָ֬ם רָֽב־׀׃
translation:
  text: which the clouds pour down; they drip abundantly on man.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'humankind' / 'people'; Hebrew 'man' (אָדָם) is a generic singular here
      for humanity.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲשֶׁר
  chosen: which
  alternatives:
  - that
  - which water
  lexicon: HALOT
  rationale: Relative particle linking this verse to the antecedent in the previous
    line; 'which' preserves the subordinate connection without adding content.
- source_word: יִזְּלוּ
  chosen: pour down
  alternatives:
  - flow
  - distill
  - stream
  lexicon: HALOT
  rationale: From נזל, denoting flowing or streaming downward. In the rain context,
    'pour down' is idiomatic modern English and captures the downward movement more
    naturally than the more literal but less natural 'flow' or the overly technical
    'distill'.
- source_word: שְׁחָקִים
  chosen: the clouds
  alternatives:
  - skies
  - cloud-masses
  lexicon: HALOT
  rationale: In poetic weather imagery this term refers to the skies/clouds. 'The
    clouds' best fits the immediate context of rain formation and precipitation.
- source_word: יִרְעֲפוּ
  chosen: they drip
  alternatives:
  - they shower
  - they pour
  - they drop
  lexicon: HALOT
  rationale: From רָעַף, to drip or shower down. 'They drip' preserves the image of
    water descending in drops and pairs well with the preceding clause without overstating
    intensity.
- source_word: עֲלֵי
  chosen: 'on'
  alternatives:
  - upon
  - over
  lexicon: HALOT
  rationale: Simple preposition of downward movement onto people below; 'on' is the
    most natural modern equivalent.
- source_word: אָדָם
  chosen: man
  alternatives:
  - humankind
  - mankind
  - people
  lexicon: HALOT
  rationale: Per doctrine, gender-accurate over gender-neutral. Here אָדָם is generic/collective
    for humanity. 'Man' preserves the representative singular of the Hebrew, while
    an inclusive alternative is worth preserving in a footnote.
- source_word: רָב
  chosen: abundantly
  alternatives:
  - in abundance
  - many
  - plentifully
  lexicon: HALOT
  rationale: Adjectival form used adverbially here to express plentiful extent. 'Abundantly'
    communicates the sense smoothly in English and modifies the dripping/showering
    action rather than suggesting many separate persons.
