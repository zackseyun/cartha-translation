- issue: Rendering of אָדָם in a generic sense
  chosen_reading: man
  alternative_readings:
  - humankind
  - people
  rationale: The Hebrew uses singular אָדָם generically for humanity. Following the
    stated gender-accurate philosophy, the main text keeps 'man' to reflect the representative
    singular, while a footnote preserves the inclusive sense for modern readers.
