id: JOB.36.17
reference: Job 36:17
source:
  edition: WLC
  text: וְ/דִין רָשָׁ֥ע מָלֵ֑אתָ דִּ֖ין וּ/מִשְׁפָּ֣ט יִתְמֹֽכוּ־׃
translation:
  text: But you are full of the judgment of the wicked; judgment and justice hold
    fast.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'And you are full of the wicked man's judgment'; the Hebrew is compressed
      and may refer either to sharing the wicked person's judgment or to being occupied
      with the kind of judgment associated with the wicked.
    reason: alternative_reading
  - marker: b
    text: Or 'judgment and justice uphold you' or 'seize you'; the Hebrew verb can
      carry the sense of supporting, sustaining, or taking hold.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְדִין
  chosen: But
  alternatives:
  - And
  - Now
  lexicon: HALOT
  rationale: The conjunction וְ is rendered adversatively in context, marking contrast
    with the preceding possibility of repentance and restoration. דִּין here is taken
    together with the following phrase rather than as a separate clause-initial noun
    to be repeated woodenly in English.
- source_word: דִּין
  chosen: judgment
  alternatives:
  - case
  - justice
  - legal decision
  lexicon: HALOT
  rationale: דִּין commonly denotes judgment, legal case, or judicial decision. Here
    it is best rendered 'judgment' to match the forensic tone and to pair naturally
    with מִשְׁפָּט in the second colon.
- source_word: רָשָׁע
  chosen: the wicked
  alternatives:
  - a wicked man
  - the guilty
  lexicon: HALOT
  rationale: The singular adjective functions substantivally. 'The wicked' preserves
    the generic force without forcing an individualizing 'man' into English.
- source_word: מָלֵאתָ
  chosen: you are full of
  alternatives:
  - you have been filled with
  - you are filled with
  lexicon: HALOT
  rationale: The perfect 2ms is addressed to Job and expresses his present state resulting
    from prior action. 'You are full of' is idiomatic English and preserves the metaphor
    of being filled.
- source_word: דִּין
  chosen: judgment
  alternatives:
  - justice
  - legal decision
  - case
  lexicon: HALOT
  rationale: The repeated noun is kept as 'judgment' for consistency and to preserve
    the rhetorical repetition in Hebrew.
- source_word: וּמִשְׁפָּט
  chosen: and justice
  alternatives:
  - and judgment
  - and legal right
  lexicon: HALOT
  rationale: מִשְׁפָּט overlaps with דִּין but often carries the sense of justice
    or judicial right/order. Rendering it 'justice' preserves the parallelism without
    collapsing both nouns into identical English.
- source_word: יִתְמֹכוּ
  chosen: hold fast
  alternatives:
  - support
  - uphold
  - take hold of
  lexicon: HALOT
  rationale: From תמך, the verb can mean support, uphold, or grasp/hold. In this terse
    poetic line, 'hold fast' captures the idea that judgment and justice firmly seize
    or maintain their hold, while remaining somewhat ambiguous as in the Hebrew.
