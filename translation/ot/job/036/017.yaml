theological_decisions:
- issue: Interpretation of the final clause יִתְמֹכוּ
  chosen_reading: 'An impersonal/abstract reading: ''judgment and justice hold fast'''
  alternative_readings:
  - '''judgment and justice will uphold you'''
  - '''they seize you'''
  rationale: The Hebrew verb is 3mp with no explicit object. The line is notoriously
    compressed and ambiguous. The chosen rendering preserves the terseness and forensic
    imagery without importing an explicit object not present in the text. It also
    avoids over-resolving whether the sense is supportive or punitive, though the
    context leans negative.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
