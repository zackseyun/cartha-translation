id: JOB.36.19
reference: Job 36:19
source:
  edition: WLC
  text: הֲ/יַעֲרֹ֣ךְ שׁ֭וּעֲ/ךָ לֹ֣א בְ/צָ֑ר וְ֝/כֹ֗ל מַאֲמַצֵּי כֹֽחַ־׃
translation:
  text: Will your cry avail when distress comes, or all the exertions of your strength?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, following another interpretation of the difficult Hebrew, 'Will your
      wealth avail, so that you are not in distress, or all the forces of your strength?'
    reason: alternative_reading
  - marker: b
    text: The Hebrew of this verse is difficult, especially in the phrases traditionally
      rendered 'your cry' and 'not in distress.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲיַעֲרֹךְ
  chosen: will ... avail
  alternatives:
  - will he esteem
  - will he set in order
  - will it be sufficient
  lexicon: HALOT
  rationale: The verb ערך literally has senses such as 'arrange, set in order,' but
    in this difficult poetic context many understand it idiomatically as 'be of use
    / avail / suffice' with the following object. 'Avail' captures the rhetorical
    question about whether the addressee's appeal can help him.
- source_word: שׁוּעֲךָ
  chosen: your cry
  alternatives:
  - your plea
  - your wealth
  lexicon: HALOT
  rationale: The consonantal form is commonly taken from שׁוע 'cry for help,' yielding
    'your cry/plea.' Some interpreters, influenced by context and ancient versions,
    take it differently as 'your riches/wealth,' but the MT vocalization supports
    'your cry.' Because the verse is notoriously difficult, the alternative is preserved
    in a footnote.
- source_word: לֹא
  chosen: when
  alternatives:
  - not
  lexicon: HALOT
  rationale: Although normally the negation 'not,' in this compressed poetic line
    many translators construe the phrase idiomatically with בצר to express the circumstance
    of distress rather than a simple negation. Rendering the whole clause as 'when
    distress comes' produces coherent English while reflecting the likely sense of
    the rhetorical question. The more literal negative construal is preserved as an
    alternative in a footnote.
- source_word: בְצָר
  chosen: when distress comes
  alternatives:
  - in distress
  - against distress
  lexicon: HALOT
  rationale: בצר denotes distress, trouble, or straits. Expanded slightly to 'when
    distress comes' for natural English and to make explicit the situational force
    of the prepositional phrase in context.
- source_word: וְכֹל
  chosen: or all
  alternatives:
  - and all
  - even all
  lexicon: HALOT
  rationale: 'The conjunction can be rendered simply ''and,'' but in this rhetorical
    question it likely introduces an additional possible resource that also fails.
    ''Or all'' fits the sense: neither the cry nor all one''s strength will help.'
- source_word: מַאֲמַצֵּי כֹחַ
  chosen: the exertions of your strength
  alternatives:
  - your mighty efforts
  - all the forces of strength
  - all your strong efforts
  lexicon: HALOT
  rationale: The phrase combines effort/strain with strength/power. 'The exertions
    of your strength' preserves both elements and the poetic force without over-paraphrasing.
    The possessive 'your' is supplied in English from the verse's direct address and
    parallelism.
