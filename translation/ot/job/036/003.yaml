id: JOB.36.3
reference: Job 36:3
source:
  edition: WLC
  text: אֶשָּׂ֣א דֵ֭עִ/י לְ/מֵ/רָח֑וֹק וּ֝/לְ/פֹעֲלִ֗/י אֶֽתֵּֽן צֶֽדֶק־׃
translation:
  text: I will bring my knowledge from afar, and to my Maker I will ascribe righteousness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I will bring my knowledge from far away.'
    reason: lexical_alternative
  - marker: b
    text: Or 'to my Maker I will ascribe justice.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶשָּׂא
  chosen: I will bring
  alternatives:
  - I will carry
  - I will lift up
  - I will fetch
  lexicon: HALOT
  rationale: The verb נשׂא literally means 'lift/carry/bear.' With 'my knowledge'
    as its object and followed by 'from afar,' the sense is idiomatically that Elihu
    will draw in or bring forward knowledge from a distant source. 'Bring' is natural
    English while preserving the metaphor better than a looser paraphrase like 'present.'
- source_word: דֵעִי
  chosen: my knowledge
  alternatives:
  - my understanding
  - my opinion
  lexicon: HALOT
  rationale: From דעת, this denotes knowledge or understanding. 'My knowledge' is
    the most direct rendering and fits Elihu's claim to speak with informed insight.
    'Opinion' is too weak and subjective.
- source_word: למרחוק
  chosen: from afar
  alternatives:
  - from far away
  - from a distance
  lexicon: HALOT
  rationale: The prepositional phrase literally means 'to/from far off' depending
    on idiom. In context with נשׂא, it expresses the source or reach of the knowledge
    being brought. 'From afar' is concise and idiomatic in English.
- source_word: ולפעלי
  chosen: to my Maker
  alternatives:
  - to my Doer
  - to him who made me
  - for my Maker
  lexicon: HALOT
  rationale: The participle פֹעֵל means 'one who does/makes.' With the 1cs suffix,
    it refers to the one who made or fashioned the speaker, i.e., God. 'My Maker'
    is idiomatic, reverent, and contextually clear. 'Doer' is too wooden in English.
- source_word: אתן
  chosen: I will ascribe
  alternatives:
  - I will give
  - I will render
  - I will attribute
  lexicon: HALOT
  rationale: נתן literally means 'give,' but with צדק as the object and God as the
    indirect object, the idiomatic sense is to attribute or ascribe righteousness/justice
    to him. 'Ascribe' best captures the relational and declarative force in natural
    English.
- source_word: צדק
  chosen: righteousness
  alternatives:
  - justice
  - what is right
  lexicon: HALOT
  rationale: צדק can denote righteousness or justice. Here Elihu is affirming the
    rightness of God's character and actions. 'Righteousness' best fits the God-directed
    predicate in English, while 'justice' remains a viable contextual alternative
    preserved in a footnote.
