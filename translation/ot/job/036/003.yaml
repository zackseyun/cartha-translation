theological_decisions:
- issue: Rendering צדק in reference to God
  chosen_reading: righteousness
  alternative_readings:
  - justice
  rationale: The Hebrew term can denote both moral rightness and justice. In this
    context Elihu is attributing rectitude to God ('my Maker'), and 'righteousness'
    better preserves that broader theological sense without excluding judicial overtones.
    Because the semantic range is significant, the alternative 'justice' is preserved
    in a footnote.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it; consistency of key terms, or documented exception.'
