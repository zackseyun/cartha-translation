theological_decisions:
- issue: Meaning of רוּחַ אֱלוֹהַּ in parallel with נִשְׁמָתִי
  chosen_reading: the breath of God
  alternative_readings:
  - the Spirit of God
  rationale: The immediate poetic context emphasizes continued life and respiration
    ('my breath ... in me,' 'in my nostrils'), so 'breath of God' best fits the Hebrew
    parallelism and avoids importing a more developed pneumatological sense not required
    by the verse. Because רוּחַ can also mean 'Spirit,' that alternative is preserved
    in a footnote rather than resolved absolutely.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
