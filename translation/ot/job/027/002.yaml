id: JOB.27.2
reference: Job 27:2
source:
  edition: WLC
  text: חַי אֵ֭ל הֵסִ֣יר מִשְׁפָּטִ֑/י וְ֝/שַׁדַּ֗י הֵמַ֥ר נַפְשִֽׁ/י־׃
translation:
  text: As God lives, who has taken away my justice, and the Almighty, who has made
    my soul bitter,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my right' or 'my legal claim' for 'my justice.' The Hebrew מִשְׁפָּט
      can denote justice, judgment, or a rightful claim.
    reason: lexical_alternative
  - marker: b
    text: Or 'has embittered my life' or simply 'has embittered me.' The Hebrew נֶפֶשׁ
      often means 'soul,' 'life,' or 'self' depending on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: חַי אֵל
  chosen: As God lives
  alternatives:
  - By the life of God
  - The living God
  lexicon: HALOT
  rationale: The idiom חַי + divine name/title functions as an oath formula, best
    rendered in natural English as 'As God lives.' 'The living God' would flatten
    the oath force into a description rather than preserve the sworn formula.
- source_word: אֵל
  chosen: God
  alternatives:
  - God Mighty One
  lexicon: HALOT
  rationale: אֵל here is the common divine title 'God' within the oath formula, not
    a proper name requiring transliteration.
- source_word: הֵסִיר
  chosen: has taken away
  alternatives:
  - has removed
  - has turned aside
  lexicon: HALOT
  rationale: The Hiphil of סור commonly means 'remove' or 'take away.' 'Has taken
    away' is idiomatic with the following object and conveys Job's complaint that
    something due to him has been withdrawn.
- source_word: מִשְׁפָּטִי
  chosen: my justice
  alternatives:
  - my right
  - my judgment
  - my legal claim
  lexicon: HALOT
  rationale: מִשְׁפָּט can denote justice, legal right, or judgment. In Job's protest
    context, the sense is that God has deprived him of just treatment or his rightful
    claim. 'My justice' preserves the semantic breadth and rhetorical force better
    than the narrower 'my legal claim,' while 'my judgment' is less clear in English.
- source_word: וְשַׁדַּי
  chosen: and the Almighty
  alternatives:
  - and Shaddai
  lexicon: HALOT
  rationale: Following the translation philosophy, divine titles are translated rather
    than transliterated. 'The Almighty' is the standard rendering of שַׁדַּי and fits
    Job's diction.
- source_word: הֵמַר
  chosen: has made ... bitter
  alternatives:
  - has embittered
  - has made ... bitterly grieved
  lexicon: HALOT
  rationale: The Hiphil of מרר means 'make bitter' or 'embitter.' Rendering it analytically
    as 'has made ... bitter' keeps the concrete metaphor and reads naturally in English.
- source_word: נַפְשִׁי
  chosen: my soul
  alternatives:
  - my life
  - me
  lexicon: HALOT
  rationale: נֶפֶשׁ can mean soul, life, self, or person. Here the expression is emotive
    and poetic; 'my soul' preserves the Hebrew anthropological texture without forcing
    a later technical dualism. Alternatives are possible, but 'my soul' best matches
    the register of Job.
