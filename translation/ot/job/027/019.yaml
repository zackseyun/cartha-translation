id: JOB.27.19
reference: Job 27:19
source:
  edition: WLC
  text: עָשִׁ֣יר יִ֭שְׁכַּב וְ/לֹ֣א יֵאָסֵ֑ף עֵינָ֖י/ו פָּקַ֣ח וְ/אֵינֶֽ/נּוּ׃
translation:
  text: He lies down rich, but he will not be gathered; he opens his eyes, and he
    is gone.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'he will not be gathered to his fathers' or more generally 'he will
      not be gathered'; the Hebrew is terse and may allude to death and burial without
      stating it explicitly.
    reason: alternative_reading
  - marker: b
    text: Literally, 'and he is not'; an idiom meaning that he is gone or no more.
    reason: lexical_alternative
lexical_decisions:
- source_word: עָשִׁיר
  chosen: rich
  alternatives:
  - a rich man
  - wealthy
  lexicon: HALOT
  rationale: Adjectival noun meaning 'rich' or 'wealthy person.' Rendering it predicatively
    in English ('lies down rich') preserves the compact Hebrew and avoids adding 'man'
    where the Hebrew does not explicitly repeat it.
- source_word: יִשְׁכַּב
  chosen: lies down
  alternatives:
  - will lie down
  - goes to bed
  lexicon: HALOT
  rationale: Basic sense of שׁכב is 'lie down.' Present-style English here gives vividness
    and matches poetic discourse, while still conveying the future/resultative force
    in context.
- source_word: וְלֹא יֵאָסֵף
  chosen: but he will not be gathered
  alternatives:
  - and he is not gathered
  - but he will not be gathered to his fathers
  - but he will not be carried away
  lexicon: HALOT
  rationale: אָסף in the Niphal commonly means 'be gathered,' including as an idiom
    for death/burial or being gathered to one's people. Here the terse phrase is best
    preserved rather than expanded interpretively. 'But' captures the adversative
    sense in context. Because the exact nuance may be either burial-related or more
    generally removal in death, the more literal 'be gathered' is preferred, with
    alternatives preserved in a footnote.
- source_word: עֵינָיו פָּקַח
  chosen: he opens his eyes
  alternatives:
  - his eyes open
  - he opened his eyes
  lexicon: HALOT
  rationale: Though literally 'his eyes he opened/open,' idiomatic English is 'he
    opens his eyes.' This preserves the sudden transition and vividness of the Hebrew.
- source_word: וְאֵינֶנּוּ
  chosen: and he is gone
  alternatives:
  - and he is no more
  - and he is not
  - and he is nowhere to be found
  lexicon: HALOT
  rationale: The expression literally means 'and he is not,' a common idiom for disappearance
    or death. 'He is gone' is natural modern English and conveys the abrupt vanishing
    implied by the Hebrew, while a more literal alternative is preserved in a footnote.
