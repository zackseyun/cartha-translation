theological_decisions:
- issue: Divine title שדי
  chosen_reading: the Almighty
  alternative_readings:
  - Shaddai
  rationale: This is a divine title rather than a personal name; the translation philosophy
    directs titles to be translated for meaning. 'The Almighty' is the standard semantic
    equivalent in context.
  doctrine_reference: Translation philosophy §2 (Translate titles; transliterate names)
