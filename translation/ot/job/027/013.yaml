id: JOB.27.13
reference: Job 27:13
source:
  edition: WLC
  text: זֶ֤ה חֵֽלֶק אָדָ֖ם רָשָׁ֥ע עִם אֵ֑ל וְֽ/נַחֲלַ֥ת עָ֝רִיצִ֗ים מִ/שַּׁדַּ֥י
    יִקָּֽחוּ׀־׀־׃
translation:
  text: 'This is the portion of a wicked man with God, and the inheritance that the
    ruthless receive from the Almighty:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with God' may be understood idiomatically as 'from God' in the sense
      of what God allots to the wicked man.
    reason: lexical_alternative
  - marker: b
    text: Or 'the violent' for 'the ruthless.'
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'take'; rendered 'receive' here because the context is an allotted
      portion or inheritance.
    reason: lexical_alternative
lexical_decisions:
- source_word: זֶה
  chosen: This is
  alternatives:
  - This
  lexicon: HALOT
  rationale: Demonstrative opening introducing the statement; English supplies 'is'
    naturally for a complete clause.
- source_word: חֵלֶק
  chosen: portion
  alternatives:
  - share
  - lot
  lexicon: HALOT
  rationale: '''Portion'' fits wisdom-context language for one''s allotted outcome
    or share, and pairs well with the following ''inheritance'' without collapsing
    the two terms.'
- source_word: אָדָם
  chosen: man
  alternatives:
  - person
  - human
  lexicon: HALOT
  rationale: Per doctrine, gender-accurate rendering is preferred. Here the singular
    generic 'man' matches the Hebrew form and wisdom-style generalization.
- source_word: רָשָׁע
  chosen: wicked
  alternatives:
  - guilty
  - evil
  lexicon: HALOT
  rationale: Standard adjectival rendering in wisdom literature for the morally wicked
    person.
- source_word: עִם אֵל
  chosen: with God
  alternatives:
  - from God
  - before God
  lexicon: HALOT
  rationale: The preposition is literally 'with.' In this idiom it can denote what
    pertains to someone in relation to God; 'with God' preserves the Hebrew wording
    while remaining intelligible.
- source_word: נַחֲלַת
  chosen: inheritance
  alternatives:
  - heritage
  - possession
  lexicon: HALOT
  rationale: Common rendering for an allotted possession or received share. It complements
    but does not duplicate 'portion.'
- source_word: עָרִיצִים
  chosen: the ruthless
  alternatives:
  - the violent
  - the tyrants
  lexicon: HALOT
  rationale: The term denotes oppressive, ruthless people. 'Ruthless' is clear modern
    English and suits the moral register of the verse.
- source_word: מִשַּׁדַּי
  chosen: from the Almighty
  alternatives:
  - from Shaddai
  lexicon: HALOT
  rationale: Following the philosophy to translate titles, שדי is rendered 'the Almighty'
    rather than transliterated.
- source_word: יִקָּחוּ
  chosen: receive
  alternatives:
  - take
  - get
  lexicon: HALOT
  rationale: Although the verb is literally 'take,' in this context of allotted portion/inheritance
    English 'receive' better conveys what comes to them as their lot from God.
