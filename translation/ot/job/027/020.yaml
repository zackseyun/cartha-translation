id: JOB.27.20
reference: Job 27:20
source:
  edition: WLC
  text: תַּשִּׂיגֵ֣/הוּ כַ֭/מַּיִם בַּלָּה֑וֹת לַ֝֗יְלָה גְּנָבַ֥תּ/וּ סוּפָֽה׃
translation:
  text: Terrors overtake him like waters; in the night a storm steals him away.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Terrors overtake him like floods.'
    reason: lexical_alternative
  - marker: b
    text: Or 'a tempest' or 'a whirlwind' steals him away.
    reason: lexical_alternative
lexical_decisions:
- source_word: תַּשִּׂיגֵהוּ
  chosen: overtake him
  alternatives:
  - seize him
  - reach him
  lexicon: HALOT
  rationale: From נשׂג in Hiphil, with calamities as subject, the sense is that they
    catch up with or overtake him. 'Overtake him' is idiomatic in English and preserves
    the image of pursuing disaster.
- source_word: כַמַּיִם
  chosen: like waters
  alternatives:
  - like water
  - as floods
  lexicon: HALOT
  rationale: The plural 'waters' reflects the Hebrew form and preserves the simile
    of overwhelming force. 'Floods' is interpretive and therefore kept as an alternative
    rather than the main rendering.
- source_word: בַּלָּהוֹת
  chosen: terrors
  alternatives:
  - horrors
  - dreadful things
  lexicon: HALOT
  rationale: בלהות commonly denotes terrors or sudden horrors. 'Terrors' is concise,
    natural, and fits the poetic context of judgment overtaking the wicked.
- source_word: לַיְלָה
  chosen: in the night
  alternatives:
  - by night
  - at night
  lexicon: HALOT
  rationale: The noun functions adverbially. 'In the night' preserves the Hebrew imagery
    and cadence while remaining natural English.
- source_word: גְּנָבַתּוּ
  chosen: steals him away
  alternatives:
  - carries him off secretly
  - snatches him away
  lexicon: HALOT
  rationale: From גנב, 'to steal.' With the storm as subject, the image is of sudden
    removal like a thief. 'Steals him away' preserves both the lexical sense and the
    poetic force.
- source_word: סוּפָה
  chosen: a storm
  alternatives:
  - a tempest
  - a whirlwind
  lexicon: HALOT
  rationale: סופה denotes a violent storm or tempest. 'Storm' is the clearest modern
    English choice; 'whirlwind' is possible but more specific than the Hebrew requires
    in this context.
