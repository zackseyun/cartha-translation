id: JOB.27.9
reference: Job 27:9
source:
  edition: WLC
  text: הַֽ֭/צַעֲקָת/וֹ יִשְׁמַ֥ע אֵ֑ל כִּֽי תָב֖וֹא עָלָ֣י/ו צָרָֽה׀־׃
translation:
  text: Will God hear his cry when distress comes upon him?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his outcry' or 'his plea.'
    reason: lexical_alternative
  - marker: b
    text: Or 'if distress comes upon him'; the Hebrew conjunction can also be read
      conditionally, though the temporal sense 'when' fits the context well.
    reason: alternative_reading
  - marker: c
    text: '''Distress'' may also be rendered ''trouble,'' ''calamity,'' or ''affliction.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: הַצַּעֲקָתוֹ
  chosen: his cry
  alternatives:
  - his outcry
  - his plea
  lexicon: HALOT
  rationale: צעקה denotes a cry or outcry, often in distress. 'His cry' is concise
    and natural in English while preserving the sense of an urgent appeal.
- source_word: יִשְׁמַע
  chosen: will hear
  alternatives:
  - does hear
  - would hear
  lexicon: HALOT
  rationale: 'The yiqtol here functions naturally as a future/interrogative in context:
    Job is asking whether God will hear such a person''s cry. ''Will hear'' fits the
    rhetorical question.'
- source_word: אֵל
  chosen: God
  alternatives:
  - God Mighty One
  lexicon: HALOT
  rationale: אֵל is the common Semitic term for God/Mighty One. In English biblical
    style, 'God' is the clearest and most idiomatic rendering here.
- source_word: כִּי
  chosen: when
  alternatives:
  - that
  - if
  - for
  lexicon: HALOT
  rationale: 'Although כִּי has a broad range, with the following verb and clause
    it is best taken temporally here: ''when distress comes upon him.'' This yields
    the most coherent sense in context.'
- source_word: תָבֹוא
  chosen: comes
  alternatives:
  - falls
  - overtakes
  lexicon: HALOT
  rationale: בוא literally means 'come.' 'Comes' preserves the verbal image and works
    idiomatically with 'distress' in English.
- source_word: עָלָיו
  chosen: upon him
  alternatives:
  - on him
  - against him
  lexicon: HALOT
  rationale: The preposition על with בוא commonly conveys something coming upon someone.
    'Upon him' is slightly more elevated but still readable and matches the Hebrew
    construction well.
- source_word: צָרָה
  chosen: distress
  alternatives:
  - trouble
  - calamity
  - affliction
  lexicon: HALOT
  rationale: צָרָה refers to trouble, distress, or adversity. 'Distress' best captures
    the inward and outward pressure implied, without overstating it as catastrophe.
