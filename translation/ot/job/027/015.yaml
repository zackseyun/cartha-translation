id: JOB.27.15
reference: Job 27:15
source:
  edition: WLC
  text: שריד/ו בַּ/מָּ֣וֶת יִקָּבֵ֑רוּ וְ֝/אַלְמְנֹתָ֗י/ו לֹ֣א תִבְכֶּֽינָה׃
translation:
  text: Those who survive him will be buried by death, and his widows will not weep.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'will be buried in death.' The Hebrew phrase is compressed and may express
      either the manner/fate of burial or burial amid death.
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׂרִידוֹ
  chosen: those who survive him
  alternatives:
  - his survivors
  - his remnant
  lexicon: HALOT
  rationale: שָׂרִיד denotes one who remains or survives. Because the singular form
    with 3ms suffix functions collectively here and the following verb is plural,
    an English plural collective expression best reflects the sense.
- source_word: בַּמָּוֶת
  chosen: by death
  alternatives:
  - in death
  - to death
  lexicon: HALOT
  rationale: The preposition ב with מָוֶת is idiomatic and can indicate circumstance
    or agency-like means. 'By death' preserves the stark Hebrew sense that death itself
    is the mode or fate attending their burial, rather than merely location.
- source_word: יִקָּבֵרוּ
  chosen: will be buried
  alternatives:
  - will be entombed
  - will be interred
  lexicon: HALOT
  rationale: 'Nifal imperfect of קבר is passive/reflexive in sense: ''be buried.''
    This is the natural English equivalent.'
- source_word: וְאַלְמְנֹתָיו
  chosen: and his widows
  alternatives:
  - and his widowed women
  - and his wives, now widows
  lexicon: HALOT
  rationale: אַלְמָנָה means widow. The plural with 3ms suffix is most naturally rendered
    'his widows,' likely referring to the women left widowed by the deaths in view.
- source_word: לֹא תִבְכֶּינָה
  chosen: will not weep
  alternatives:
  - will not mourn
  - will not cry
  lexicon: HALOT
  rationale: בכה is the common verb 'weep.' 'Weep' is more precise than the broader
    'mourn,' while still natural in English.
