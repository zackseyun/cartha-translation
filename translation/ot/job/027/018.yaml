id: JOB.27.18
reference: Job 27:18
source:
  edition: WLC
  text: בָּנָ֣ה כָ/עָ֣שׁ בֵּית֑/וֹ וּ֝/כְ/סֻכָּ֗ה עָשָׂ֥ה נֹצֵֽר׃
translation:
  text: He builds his house like a moth, like a shelter that a watchman makes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'like a booth that a guard makes.' The Hebrew terms can be rendered more
      specifically as a temporary field shelter and the one who guards it.
    reason: lexical_alternative
lexical_decisions:
- source_word: בָּנָה
  chosen: builds
  alternatives:
  - built
  lexicon: HALOT
  rationale: 'Qal perfect 3ms in poetic discourse is well rendered as a present/generic
    statement in English: the wicked man''s house-building is described characteristically,
    not merely as a one-time past event.'
- source_word: כָעָשׁ
  chosen: like a moth
  alternatives:
  - like a maggot
  lexicon: HALOT
  rationale: עָשׁ commonly denotes a moth. In context the image is of something frail
    and easily destroyed, which fits 'moth' well and matches common usage in Job and
    elsewhere. The prefixed כ marks comparison.
- source_word: בֵּיתוֹ
  chosen: his house
  alternatives:
  - his household
  lexicon: HALOT
  rationale: 'בַּיִת can mean house or household, but here the parallel with ''shelter''
    and the building verbs favors a literal structure: ''his house.'''
- source_word: וּכְסֻכָּה
  chosen: like a shelter
  alternatives:
  - like a booth
  - like a hut
  lexicon: HALOT
  rationale: סֻכָּה denotes a temporary shelter/booth. 'Shelter' is natural modern
    English and preserves the sense of a flimsy, temporary structure; 'booth' is possible
    but less immediately clear.
- source_word: עָשָׂה
  chosen: makes
  alternatives:
  - made
  - constructs
  lexicon: HALOT
  rationale: As with בָּנָה, the perfect in poetry is rendered as a present/generic
    statement. 'Makes' is idiomatic with the following object and participial subject.
- source_word: נֹצֵר
  chosen: a watchman
  alternatives:
  - a guard
  - one who watches
  lexicon: HALOT
  rationale: The participle from נצר refers to one who watches/guards. In this agricultural
    image, a field or vineyard watchman who throws up a temporary hut best fits the
    context. 'Watchman' is concise and idiomatic.
