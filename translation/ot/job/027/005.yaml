theological_decisions:
- issue: Nature of Job's claim about his moral state
  chosen_reading: Render תֻּמָּתִי as 'my integrity' rather than a stronger absolute
    claim such as 'my righteousness.'
  alternative_readings:
  - my blamelessness
  - my innocence
  rationale: The verse expresses Job's refusal to concede his friends' accusation
    and his determination to maintain his moral integrity. 'Integrity' preserves the
    text's claim without overstating sinlessness or importing later doctrinal categories.
  doctrine_reference: Preserve theological tension rather than resolve it; readable
    modern English, not archaic or academic.
