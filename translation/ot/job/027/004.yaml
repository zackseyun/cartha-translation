id: JOB.27.4
reference: Job 27:4
source:
  edition: WLC
  text: אִם תְּדַבֵּ֣רְנָה שְׂפָתַ֣/י עַוְלָ֑ה וּ֝/לְשׁוֹנִ֗/י אִם יֶהְגֶּ֥ה רְמִיָּֽה־־׃
translation:
  text: my lips will not speak injustice, nor will my tongue utter deceit.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew uses an oath-like construction with ''if'' (אִם) to express strong
      denial: literally, ''if my lips speak injustice...,'' meaning ''surely my lips
      will not speak injustice.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  chosen: will not
  alternatives:
  - if
  - surely not
  lexicon: HALOT
  rationale: 'In this oath-like context following Job''s solemn resolve, אִם functions
    elliptically as a negative asseveration (''surely not,'' ''if ever...''), not
    as a simple conditional ''if.'' English idiom is best conveyed by an explicit
    negation: ''will not.'''
- source_word: תְּדַבֵּרְנָה
  chosen: will speak
  alternatives:
  - speak
  - utter
  lexicon: HALOT
  rationale: Piel of דבר means 'speak.' The imperfect fits the future/resolute sense
    in this oath context. Although the verb is formally 3fp agreeing with the feminine
    plural 'lips,' natural English uses singular collective subject sense with 'my
    lips will speak.'
- source_word: שְׂפָתַי
  chosen: my lips
  alternatives:
  - my speech
  lexicon: HALOT
  rationale: Literal body-part imagery should be preserved; it is idiomatic for speech
    but still vivid and natural in English.
- source_word: עַוְלָה
  chosen: injustice
  alternatives:
  - wrong
  - unrighteousness
  - falsehood
  lexicon: HALOT
  rationale: The noun denotes injustice, wrong, or unrighteousness. 'Injustice' preserves
    the moral-ethical force without sounding overly abstract or archaic. 'Falsehood'
    is possible in speech context but overlaps too much with the following 'deceit.'
- source_word: וּלְשׁוֹנִי
  chosen: nor will my tongue
  alternatives:
  - and my tongue
  - or my tongue
  lexicon: HALOT
  rationale: With the preceding negative force carried over, waw is best rendered
    adversatively/additively as 'nor.' 'My tongue' preserves the parallelism with
    'my lips.'
- source_word: יֶהְגֶּה
  chosen: utter
  alternatives:
  - mutter
  - meditate
  - speak
  lexicon: HALOT
  rationale: הגה can mean mutter, utter, or meditate depending on context. Here, with
    'tongue' as subject and 'deceit' as object, 'utter' best fits spoken expression
    in elevated but readable English.
- source_word: רְמִיָּה
  chosen: deceit
  alternatives:
  - treachery
  - fraud
  - falsehood
  lexicon: HALOT
  rationale: The noun denotes deceit or treachery. 'Deceit' is the clearest and most
    idiomatic pairing with 'utter,' and it maintains distinction from 'injustice'
    in the first colon.
