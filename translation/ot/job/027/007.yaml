id: JOB.27.7
reference: Job 27:7
source:
  edition: WLC
  text: יְהִ֣י כְ֭/רָשָׁע אֹ֣יְבִ֑/י וּ/מִתְקוֹמְמִ֥/י כְ/עַוָּֽל׃
translation:
  text: May my enemy be like the wicked, and the one who rises against me like the
    unrighteous.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'May my enemy be as the wicked, and my adversary as the unjust.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהִי
  chosen: May ... be
  alternatives:
  - Let ... be
  lexicon: HALOT
  rationale: Qal jussive of היה expresses a wish or imprecation. English 'May ...
    be' naturally conveys the volitional force in contemporary style better than the
    more wooden 'Let ... be.'
- source_word: כְרָשָׁע
  chosen: like the wicked
  alternatives:
  - as the wicked
  - like a wicked man
  lexicon: HALOT
  rationale: The prefixed כ marks comparison, and רָשָׁע denotes a wicked person.
    'The wicked' is idiomatic in English for a class-character description and avoids
    an unnecessarily singularized 'a wicked man' while preserving the moral category.
- source_word: אֹיְבִי
  chosen: my enemy
  alternatives:
  - the one who hates me
  lexicon: HALOT
  rationale: From אויב, a common noun for enemy/foe with 1cs suffix. 'My enemy' is
    the most direct and natural rendering.
- source_word: וּמִתְקוֹמְמִי
  chosen: and the one who rises against me
  alternatives:
  - and my adversary
  - and he who attacks me
  - and my assailant
  lexicon: HALOT
  rationale: Hitpolel/iterative-reflexive participial form from קום with 1cs suffix
    denotes one setting himself up against the speaker. The fuller rendering preserves
    the verbal imagery of hostile opposition better than the compressed 'adversary.'
- source_word: כְעַוָּל
  chosen: like the unrighteous
  alternatives:
  - like the unjust
  - like an evildoer
  lexicon: HALOT
  rationale: עַוָּל denotes one characterized by injustice or wrong. 'The unrighteous'
    fits the moral-ethical sense and pairs well with 'the wicked'; 'unjust' is possible
    but can sound narrower in English, focused mainly on legal fairness.
