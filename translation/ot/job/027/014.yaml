id: JOB.27.14
reference: Job 27:14
source:
  edition: WLC
  text: אִם יִרְבּ֣וּ בָנָ֣י/ו לְמוֹ חָ֑רֶב וְ֝/צֶאֱצָאָ֗י/ו לֹ֣א יִשְׂבְּעוּ לָֽחֶם־־־׃
translation:
  text: If his sons multiply, it is for the sword, and his descendants will not have
    enough bread.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'will not be satisfied with bread.' The Hebrew expression is literally
      'will not be filled/satisfied [with] bread,' an idiom for lacking sufficient
      food.
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  chosen: If
  alternatives:
  - Though
  - When
  lexicon: HALOT
  rationale: Introduces a conditional clause. 'If' is the most straightforward rendering
    here and fits the protasis-apodosis structure of the verse.
- source_word: יִרְבּוּ
  chosen: multiply
  alternatives:
  - be many
  - increase
  lexicon: HALOT
  rationale: From רבה, indicating becoming numerous. 'Multiply' is idiomatic and preserves
    the sense of increase in number.
- source_word: בָנָיו
  chosen: his sons
  alternatives:
  - his children
  lexicon: HALOT
  rationale: The Hebrew explicitly uses the masculine plural 'sons,' not a gender-neutral
    term. Per the gender-accurate policy, 'sons' is retained rather than broadened
    to 'children'.
- source_word: לְמוֹ
  chosen: it is for
  alternatives:
  - for
  - destined for
  lexicon: HALOT
  rationale: 'This preposition here marks result or destiny: the multiplication of
    sons leads to or is destined for the sword. ''It is for'' makes the English syntax
    clear without over-paraphrasing.'
- source_word: חָרֶב
  chosen: the sword
  alternatives:
  - sword
  - violent death
  lexicon: HALOT
  rationale: '''Sword'' is the literal term and in context signifies death by warfare
    or violence. The definite article in English (''the sword'') reflects the idiomatic
    force of חרב as a known instrument of judgment.'
- source_word: וְצֶאֱצָאָיו
  chosen: his descendants
  alternatives:
  - his offspring
  - his posterity
  lexicon: HALOT
  rationale: The term refers to one's issue or progeny more broadly than just immediate
    sons. 'Descendants' is natural modern English and preserves the broader scope.
- source_word: לֹא יִשְׂבְּעוּ
  chosen: will not have enough
  alternatives:
  - will not be satisfied
  - will not be filled
  lexicon: HALOT
  rationale: The verb שבע literally means 'be satisfied/full,' but with 'bread' as
    object the sense is not having enough to eat. 'Will not have enough' communicates
    the famine/privation sense clearly in contemporary English.
- source_word: לָחֶם
  chosen: bread
  alternatives:
  - food
  lexicon: HALOT
  rationale: The Hebrew is literally 'bread.' While it can stand metonymically for
    food, the main text keeps the concrete image; the broader sense is implicit in
    context.
