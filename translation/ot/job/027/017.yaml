id: JOB.27.17
reference: Job 27:17
source:
  edition: WLC
  text: יָ֭כִין וְ/צַדִּ֣יק יִלְבָּ֑שׁ וְ֝/כֶ֗סֶף נָקִ֥י יַחֲלֹֽק׃
translation:
  text: He may prepare it, but the righteous man will wear it, and the innocent will
    divide the silver.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'He prepares, but the righteous will wear it.' The Hebrew imperfect can
      be rendered more simply without the concessive nuance; the context from the
      previous verse supports the sense 'He may prepare it, but...'.
    reason: lexical_alternative
  - marker: b
    text: 'The implied objects are supplied from the previous verse: clothing for
      ''will wear it'' and accumulated wealth for ''the silver.'''
    reason: cross_reference
lexical_decisions:
- source_word: יָכִין
  chosen: He may prepare it
  alternatives:
  - He prepares
  - He will prepare
  - He may heap up
  lexicon: HALOT
  rationale: 'Hiphil of כון commonly means ''prepare, make ready, establish.'' In
    context with the previous verse about piling up clothing and silver, the implied
    object is what the wicked has amassed. English supplies ''it'' for sense. ''May
    prepare'' reflects the concessive force carried by the context: even if he prepares
    it, others will enjoy it.'
- source_word: צַדִּיק
  chosen: the righteous man
  alternatives:
  - the righteous
  - a righteous man
  lexicon: HALOT
  rationale: Adjective used substantivally. 'The righteous man' preserves the singular
    masculine form and representative force, in keeping with the gender-accurate philosophy.
    'The righteous' is possible but less explicit in English.
- source_word: יִלְבָּשׁ
  chosen: will wear it
  alternatives:
  - will put it on
  - will clothe himself with it
  lexicon: HALOT
  rationale: Qal of לבש means 'put on, wear.' Because the object is implicit from
    the prior verse's clothing, 'it' is supplied in English for clarity. 'Wear' is
    idiomatic and concise.
- source_word: כֶסֶף
  chosen: the silver
  alternatives:
  - silver
  - money
  lexicon: HALOT
  rationale: כסף can denote silver or money. Here, paired with clothing in the previous
    verse and followed by 'divide,' the sense is literal wealth in silver. 'The silver'
    reflects the specific amassed goods in view.
- source_word: נָקִי
  chosen: the innocent
  alternatives:
  - the clean
  - the guiltless
  - the blameless
  lexicon: HALOT
  rationale: Adjective used substantivally. In wisdom literature it commonly denotes
    one free from guilt or wrongdoing. 'The innocent' is natural English and fits
    the moral contrast with the wicked.
- source_word: יַחֲלֹק
  chosen: will divide
  alternatives:
  - will apportion
  - will share out
  lexicon: HALOT
  rationale: Qal of חלק means 'divide, apportion.' 'Will divide' preserves the straightforward
    sense that the innocent person will distribute or take possession by division
    of the silver left by the wicked.
