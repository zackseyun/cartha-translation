id: JOB.27.23
reference: Job 27:23
source:
  edition: WLC
  text: יִשְׂפֹּ֣ק עָלֵ֣י/מוֹ כַפֵּ֑י/מוֹ וְ/יִשְׁרֹ֥ק עָ֝לָ֗י/ו מִ/מְּקֹמֽ/וֹ׃
translation:
  text: He claps his hands at him and hisses at him from his place.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'whistles at him.' The Hebrew verb can denote whistling or hissing; here
      'hisses' was chosen to reflect the hostile tone.
    reason: lexical_alternative
  - marker: b
    text: 'The Hebrew leaves the subject implicit: ''he claps ... and hisses.'' Interpreters
      variously understand this as God, other people, or an impersonal force.'
    reason: alternative_reading
lexical_decisions:
- source_word: יִשְׂפֹּק
  chosen: claps
  alternatives:
  - strikes
  - smacks
  lexicon: HALOT
  rationale: The verb שׂפק in the Qal commonly refers to striking or clapping the
    hands. In this context with כפים ('hands'), the idiom is best rendered 'claps,'
    preserving the concrete gesture without overinterpreting whether it is derision,
    triumph, or astonishment.
- source_word: עָלֵימוֹ
  chosen: at him
  alternatives:
  - against him
  - over him
  lexicon: HALOT
  rationale: The preposition על with the pronominal suffix can mean 'against,' 'upon,'
    or more idiomatically in English here 'at him' with the gesture of clapping. 'At
    him' reads naturally and fits the hostile action in context.
- source_word: כַפֵּימוֹ
  chosen: his hands
  alternatives:
  - the palms of his hands
  lexicon: HALOT
  rationale: כף means 'palm' or 'hand'; in the dual/plural construct with suffix it
    idiomatically denotes the hands. English normally says 'claps his hands,' not
    'the palms of his hands.'
- source_word: וְיִשְׁרֹק
  chosen: hisses
  alternatives:
  - whistles
  lexicon: HALOT
  rationale: שרק can denote whistling or hissing. In judgment contexts it often carries
    a derisive or ominous force. 'Hisses' better conveys the hostile tone here, while
    'whistles' is preserved as a lexical alternative.
- source_word: עָלָיו
  chosen: at him
  alternatives:
  - against him
  - over him
  lexicon: HALOT
  rationale: As with the earlier על + suffix, 'at him' best fits idiomatic English
    for a hostile audible gesture such as hissing.
- source_word: ממקומו
  chosen: from his place
  alternatives:
  - from his dwelling
  - from where he is
  lexicon: HALOT
  rationale: מקום is broadly 'place.' The suffix most naturally refers to the subject
    performing the actions. 'From his place' is sufficiently literal and leaves the
    precise nuance open.
