theological_decisions:
- issue: Identity of the subject in the verse
  chosen_reading: An indefinite singular subject ('he') is retained rather than specifying
    God, people, or the wind.
  alternative_readings:
  - God claps/hisses at the wicked
  - people clap/hiss at the wicked
  - the east wind or impersonal forces do so
  rationale: The Hebrew uses third masculine singular verbs without an explicit subject.
    The immediate context allows multiple proposals, and the verse itself does not
    unambiguously identify the actor. To preserve the text's ambiguity rather than
    resolve it interpretively, the translation keeps the singular 'he.'
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
