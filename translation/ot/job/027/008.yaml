theological_decisions:
- issue: Anthropological sense of נֶפֶשׁ
  chosen_reading: Render as 'life' rather than 'soul'
  alternative_readings:
  - his soul
  rationale: The verse speaks of God removing a person's life, not making a technical
    statement about the soul's metaphysical status. This preserves the Hebrew idiom
    without importing doctrinal precision the text itself does not foreground.
  doctrine_reference: Preserve theological tension rather than resolve it.
