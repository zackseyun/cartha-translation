id: JOB.27.8
reference: Job 27:8
source:
  edition: WLC
  text: כִּ֤י מַה תִּקְוַ֣ת חָ֭נֵף כִּ֣י יִבְצָ֑ע כִּ֤י יֵ֖שֶׁל אֱל֣וֹהַּ נַפְשֽׁ/וֹ־׃
translation:
  text: For what is the hope of the godless when he cuts off gain, when God takes
    away his life?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the hypocrite.' The Hebrew term can denote one who is irreverent, godless,
      or hypocritical.
    reason: lexical_alternative
  - marker: b
    text: The clause is difficult; alternatively, 'when he gains' or 'though he has
      gained.'
    reason: alternative_reading
  - marker: c
    text: Or 'draws out his soul/life.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תִּקְוַת
  chosen: hope
  alternatives:
  - expectation
  lexicon: HALOT
  rationale: The noun denotes what one hopes for or expects. 'Hope' is the most natural
    English rendering here and fits the rhetorical question about ultimate confidence.
- source_word: חָנֵף
  chosen: the godless
  alternatives:
  - the hypocrite
  - the profane
  lexicon: HALOT
  rationale: In Job, חָנֵף often refers broadly to the irreverent or ungodly person,
    not merely someone who is insincere in outward religion. 'The godless' best captures
    the moral-religious sense in contemporary English. 'Hypocrite' is a traditional
    rendering and worth preserving in a footnote.
- source_word: יִבְצָע
  chosen: he cuts off gain
  alternatives:
  - he gains
  - he profits
  - he is cut off
  lexicon: HALOT
  rationale: The verb בצע commonly relates to gain, often unjust gain, but in this
    syntax the clause is difficult. Given the parallel with God taking away life and
    the rhetorical force, the sense is best taken as the point when a man's gain is
    cut off or comes to an end. The Hebrew form is terse and debated, so an alternative
    should be footnoted.
- source_word: יֵשֶׁל
  chosen: takes away
  alternatives:
  - draws out
  - snatches away
  lexicon: HALOT
  rationale: From שלה/שלל in this context, the verb refers to removing or drawing
    out the life. 'Takes away' is idiomatic English and fits the object 'his life.'
    'Draws out' is more literal but less natural here.
- source_word: אֱלוֹהַּ
  chosen: God
  alternatives:
  - God Almighty
  lexicon: HALOT
  rationale: אֱלוֹהַּ is the singular common poetic term for God in Job. 'God' is
    the straightforward equivalent.
- source_word: נַפְשׁוֹ
  chosen: his life
  alternatives:
  - his soul
  - his life-breath
  lexicon: HALOT
  rationale: נֶפֶשׁ here refers to the person's life as that which God removes at
    death. 'His life' communicates the sense clearly in modern English, while 'his
    soul' could suggest a narrower anthropological claim not required by the Hebrew.
