id: JOB.27.10
reference: Job 27:10
source:
  edition: WLC
  text: אִם עַל שַׁדַּ֥י יִתְעַנָּ֑ג יִקְרָ֖א אֱל֣וֹהַּ בְּ/כָל עֵֽת־־־׃
translation:
  text: Will he delight himself in the Almighty? Will he call on God at all times?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'if he delights himself in the Almighty'; here the Hebrew
      particle introduces a rhetorical question.
    reason: lexical_alternative
  - marker: b
    text: '''Call on'' can also be rendered ''invoke'' or ''pray to.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  chosen: Will ... ?
  alternatives:
  - if
  - whether
  lexicon: HALOT
  rationale: In this context אִם introduces a rhetorical question within a series
    describing the godless person, not a conditional clause. Rendering it with English
    interrogative force best matches the discourse sense.
- source_word: עַל
  chosen: in
  alternatives:
  - upon
  - 'on'
  lexicon: HALOT
  rationale: With התענג and a personal object, עַל conveys the object in which one
    takes delight. English 'delight in' is idiomatic and preserves the sense better
    than the more literal 'upon' or 'on'.
- source_word: שַׁדַּי
  chosen: the Almighty
  alternatives:
  - Shaddai
  lexicon: HALOT
  rationale: As a divine title, this is translated rather than transliterated, in
    keeping with the project's philosophy to translate titles. 'The Almighty' is the
    standard and contextually clear rendering.
- source_word: יִתְעַנָּג
  chosen: delight himself
  alternatives:
  - take delight
  - find delight
  lexicon: HALOT
  rationale: The Hitpael of ענג expresses taking pleasure or delight in oneself with
    reference to an object. 'Delight himself' preserves the reflexive nuance and fits
    the poetic rhetorical question.
- source_word: יִקְרָא
  chosen: call on
  alternatives:
  - call to
  - invoke
  - pray to
  lexicon: HALOT
  rationale: With God as object, קרא commonly means to call upon or invoke in prayer.
    'Call on' is natural modern English and retains the religious sense without over-specifying
    liturgical prayer.
- source_word: אֱלוֹהַּ
  chosen: God
  alternatives:
  - God Most High
  - God himself
  lexicon: HALOT
  rationale: The singular divine noun here is best rendered simply 'God.' There is
    no warrant for expansion.
- source_word: בְּכָל עֵת
  chosen: at all times
  alternatives:
  - at every time
  - continually
  - always
  lexicon: HALOT
  rationale: The phrase denotes ongoing regularity. 'At all times' is a clear, fairly
    formal rendering that preserves the breadth of the Hebrew expression.
