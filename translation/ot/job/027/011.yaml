id: JOB.27.11
reference: Job 27:11
source:
  edition: WLC
  text: אוֹרֶ֣ה אֶתְ/כֶ֣ם בְּ/יַד אֵ֑ל אֲשֶׁ֥ר עִם שַׁ֝דַּ֗י לֹ֣א אֲכַחֵֽד־־׃
translation:
  text: I will teach you about the hand of God; what is with the Almighty I will not
    hide.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'concerning God's hand.' The phrase may refer to God's power, activity,
      or dealings.
    reason: lexical_alternative
  - marker: b
    text: Or 'what belongs to the Almighty,' 'the counsel of the Almighty,' or 'what
      is from the Almighty.' The Hebrew expression is concise and somewhat elliptical.
    reason: alternative_reading
lexical_decisions:
- source_word: אוֹרֶה
  chosen: I will teach
  alternatives:
  - I will instruct
  - let me teach
  lexicon: HALOT
  rationale: Hiphil imperfect 1cs of ירה in instructional sense. Future-like 'I will
    teach' fits Job's declaration to his hearers.
- source_word: אֶתְכֶם
  chosen: you
  rationale: Direct object pronoun, second person masculine plural, naturally rendered
    'you' in English.
- source_word: בְּיַד אֵל
  chosen: about the hand of God
  alternatives:
  - concerning God's hand
  - by the hand of God
  lexicon: HALOT
  rationale: The preposition ב with 'hand' here is best taken idiomatically as the
    subject matter of instruction, not instrumentality. 'The hand of God' is a common
    Hebrew expression for God's power or activity; 'about' makes the English idiomatic
    while preserving the metaphor.
- source_word: אֵל
  chosen: God
  alternatives:
  - Mighty God
  lexicon: HALOT
  rationale: El here functions as a divine title/name. 'God' is the clearest standard
    English rendering in context.
- source_word: אֲשֶׁר עִם שַׁדַּי
  chosen: what is with the Almighty
  alternatives:
  - what belongs to the Almighty
  - what is from the Almighty
  - that which is with the Almighty
  lexicon: HALOT
  rationale: 'The relative clause is somewhat elliptical. A fairly literal rendering
    preserves the Hebrew''s compactness and likely sense: the realities/counsels associated
    with the Almighty.'
- source_word: שַׁדַּי
  chosen: the Almighty
  lexicon: HALOT
  rationale: Standard rendering of the divine title שדי in Job; readable and conventional
    without loss of meaning.
- source_word: לֹא אֲכַחֵד
  chosen: I will not hide
  alternatives:
  - I will not conceal
  - I will not deny
  lexicon: HALOT
  rationale: Piel imperfect of כחד commonly means conceal or hide. 'Hide' is concise
    and natural; 'deny' is less likely in this context of declaring knowledge.
