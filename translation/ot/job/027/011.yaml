theological_decisions:
- issue: Divine agency expressed by 'the hand of God'
  chosen_reading: Retain the metaphor 'the hand of God' rather than interpret it as
    mere power or judgment.
  alternative_readings:
  - about God's power
  - about what God does
  rationale: The Hebrew idiom is theologically rich and common in Scripture. Preserving
    the metaphor maintains the text's imagery without importing a narrower doctrinal
    interpretation.
  doctrine_reference: Translation philosophy §1, §6
- issue: Relationship of the second clause to divine counsel
  chosen_reading: Render literally as 'what is with the Almighty' rather than specifying
    'counsel,' 'purpose,' or 'judgment.'
  alternative_readings:
  - the counsel of the Almighty
  - what the Almighty intends
  - the ways of the Almighty
  rationale: The Hebrew leaves the object broad and somewhat elliptical. Preserving
    that breadth avoids over-interpreting Job's claim.
  doctrine_reference: Translation philosophy §3
