id: JOB.27.1
reference: Job 27:1
source:
  edition: WLC
  text: וַ/יֹּ֣סֶף אִ֭יּוֹב שְׂאֵ֥ת מְשָׁל֗/וֹ וַ/יֹּאמַֽר׃
translation:
  text: 'And Job again took up his discourse and said:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his proverb,' 'his parable,' or 'his oracle'; the Hebrew term can denote
      a wide range of weighty or figurative sayings.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּסֶף
  chosen: again
  alternatives:
  - continued
  - added
  lexicon: HALOT
  rationale: The verb יסף literally means 'to add' or 'to continue.' In this idiom
    with an infinitive ('to lift up/take up his discourse'), English 'again' naturally
    conveys resumed speech without awkward literalism. 'Continued' is possible, but
    'again took up' better reflects the combination of verbs.
- source_word: שְׂאֵת
  chosen: took up
  alternatives:
  - lifted up
  - uttered
  - began
  lexicon: HALOT
  rationale: From נשׂא, literally 'lifting/carrying.' In the collocation שׂאת משל,
    the sense is idiomatic for taking up or uttering a formal saying/discourse. 'Took
    up' preserves the metaphor while remaining natural English.
- source_word: מְשָׁלוֹ
  chosen: his discourse
  alternatives:
  - his proverb
  - his parable
  - his oracle
  lexicon: HALOT
  rationale: מָשָׁל can mean proverb, parable, taunt, or discourse depending on context.
    In Job it often introduces an extended poetic speech rather than a brief proverb,
    so 'his discourse' best fits the literary form. Alternatives are worth preserving
    because the Hebrew term is broader and more traditional renderings often use 'parable'
    or 'proverb'.
- source_word: וַיֹּאמַר
  chosen: and said
  alternatives:
  - saying
  lexicon: HALOT
  rationale: Standard narrative wayyiqtol of אמר. 'And said' is the straightforward
    English equivalent and preserves the formal introduction to the speech.
- source_word: אִיּוֹב
  chosen: Job
  rationale: Personal name transliterated by standard English convention, in keeping
    with the translation philosophy to transliterate names.
