id: JOB.27.16
reference: Job 27:16
source:
  edition: WLC
  text: אִם יִצְבֹּ֣ר כֶּ/עָפָ֣ר כָּ֑סֶף וְ֝/כַ/חֹ֗מֶר יָכִ֥ין מַלְבּֽוּשׁ־׃
translation:
  text: Though he heaps up silver like dust and prepares clothing like clay,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'If he heaps up silver like dust and prepares garments like clay.' The
      Hebrew particle אִם can be read conditionally ('if') or concessively ('though');
      the concessive sense fits the flow of the surrounding argument.
    reason: alternative_reading
  - marker: b
    text: Or 'garments' for 'clothing.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  chosen: Though
  alternatives:
  - If
  lexicon: HALOT
  rationale: 'In this poetic context, אִם introduces a concessive clause rather than
    a simple condition. English ''Though'' better captures the sense: even if the
    wicked amasses wealth, the following context undercuts its permanence.'
- source_word: יִצְבֹּר
  chosen: he heaps up
  alternatives:
  - he gathers
  - he stores up
  lexicon: HALOT
  rationale: The verb צבר conveys piling up or accumulating. 'Heaps up' preserves
    the concrete imagery and fits the comparison with dust.
- source_word: כֶּעָפָר
  chosen: like dust
  alternatives:
  - as dust
  lexicon: HALOT
  rationale: The prefixed כ marks comparison. 'Like dust' is idiomatic and preserves
    the hyperbolic image of abundance.
- source_word: כָּסֶף
  chosen: silver
  alternatives:
  - money
  lexicon: HALOT
  rationale: The Hebrew term literally denotes silver, often functioning as money.
    Here the concrete image is preferable, and 'silver' preserves the poetic parallelism.
- source_word: וְכַחֹמֶר
  chosen: and ... like clay
  alternatives:
  - and ... like mortar
  lexicon: HALOT
  rationale: חֹמֶר commonly denotes clay or mire. 'Clay' best matches the image of
    something plentiful and common. 'Mortar' is possible in some contexts but is less
    likely here.
- source_word: יָכִין
  chosen: prepares
  alternatives:
  - makes ready
  - sets up
  lexicon: HALOT
  rationale: The Hiphil of כון here means to prepare or make ready. 'Prepares' is
    natural English and suits the object 'clothing.'
- source_word: מַלְבּוּשׁ
  chosen: clothing
  alternatives:
  - garments
  - raiment
  lexicon: HALOT
  rationale: The noun refers collectively to clothing or garments. 'Clothing' is clear
    modern English and avoids archaic diction while preserving the collective sense.
