theological_decisions:
- issue: Whether צִדְקָה here should be rendered in a stronger moral sense ('righteousness')
    or a softer experiential sense ('integrity').
  chosen_reading: righteousness
  alternative_readings:
  - integrity
  rationale: The Hebrew noun normally carries the sense of righteousness/right standing.
    In Job's protestation of innocence, 'integrity' is a plausible contextual gloss,
    but 'righteousness' better preserves the lexical force and avoids reducing Job's
    claim to mere sincerity.
  doctrine_reference: Translation philosophy §1, §5
