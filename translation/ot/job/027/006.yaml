id: JOB.27.6
reference: Job 27:6
source:
  edition: WLC
  text: בְּ/צִדְקָתִ֣/י הֶ֭חֱזַקְתִּי וְ/לֹ֣א אַרְפֶּ֑/הָ לֹֽא יֶחֱרַ֥ף לְ֝בָבִ֗/י
    מִ/יָּמָֽ/י־׃
translation:
  text: I hold fast to my righteousness and will not let it go; my heart does not
    reproach me for any of my days.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my integrity.' The Hebrew word commonly means 'righteousness,' but in
      Job it can overlap with the idea of personal integrity.
    reason: lexical_alternative
  - marker: b
    text: Or 'my heart does not taunt/revile me all my days.' The Hebrew idiom speaks
      of inward self-reproach.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּצִדְקָתִי
  chosen: to my righteousness
  alternatives:
  - my righteousness
  - my integrity
  lexicon: HALOT
  rationale: צִדְקָה commonly denotes righteousness or rightness. Here with החזקתי
    it functions as the object held fast to. 'Righteousness' preserves the moral-judicial
    sense better than the more interpretive 'integrity,' though the latter is contextually
    related in Job.
- source_word: הֶחֱזַקְתִּי
  chosen: I hold fast
  alternatives:
  - I have held fast
  - I maintain
  lexicon: HALOT
  rationale: Hiphil of חזק here conveys grasping firmly or holding fast. English present
    'I hold fast' gives the force of Job's present resolve in context, while remaining
    close to the Hebrew perfect used rhetorically.
- source_word: וְלֹא אַרְפֶּהָ
  chosen: and will not let it go
  alternatives:
  - and I will not release it
  - and I will not loosen my grip on it
  lexicon: HALOT
  rationale: רפה in Hiphil means to let drop, slacken, or release. The 3fs suffix
    refers back to צִדְקָתִי. 'Will not let it go' is idiomatic modern English that
    accurately reflects the sense.
- source_word: לֹא יֶחֱרַף לְבָבִי
  chosen: my heart does not reproach me
  alternatives:
  - my heart does not taunt me
  - my heart does not revile me
  - my conscience does not reproach me
  lexicon: HALOT
  rationale: חרף often means reproach, taunt, or scorn. With 'my heart' as subject,
    the sense is inward self-reproach or accusation. 'My heart does not reproach me'
    stays close to the Hebrew while conveying the idiom; 'conscience' would be interpretive.
- source_word: מִיָּמָי
  chosen: for any of my days
  alternatives:
  - all my days
  - throughout my days
  - from my days
  lexicon: HALOT
  rationale: The preposition מן with ימים in this idiom most naturally means 'throughout/for
    any of my days,' i.e., at no point in his life. 'For any of my days' makes the
    negated scope explicit in English.
