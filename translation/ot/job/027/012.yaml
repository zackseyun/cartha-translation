id: JOB.27.12
reference: Job 27:12
source:
  edition: WLC
  text: הֵן אַתֶּ֣ם כֻּלְּ/כֶ֣ם חֲזִיתֶ֑ם וְ/לָ/מָּה זֶּ֝֗ה הֶ֣בֶל תֶּהְבָּֽלוּ־־׃
translation:
  text: Look, all of you have seen it; why then do you become altogether vain?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'why then do you act vainly?' The Hebrew uses a noun and cognate verb
      from the root הבל ('vanity, emptiness, futility'), creating an emphatic wordplay
      that is difficult to reproduce fully in English.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֵן
  chosen: Look
  alternatives:
  - Behold
  - Indeed
  lexicon: HALOT
  rationale: Introduces emphatic attention-getting assertion. 'Look' preserves the
    force in readable modern English better than the more archaic 'Behold.'
- source_word: אַתֶּם כֻּלְּכֶם
  chosen: all of you
  alternatives:
  - you yourselves all
  - every one of you
  lexicon: HALOT
  rationale: The pronoun plus כולכם is emphatic and comprehensive. 'All of you' captures
    both the second-person plural and the emphasis.
- source_word: חֲזִיתֶם
  chosen: have seen
  alternatives:
  - saw
  - have perceived
  lexicon: HALOT
  rationale: 'From חזה, ''to see/perceive,'' often with the nuance of direct observation.
    Present perfect in English fits the discourse: they have already observed the
    relevant reality.'
- source_word: וְלָמָּה
  chosen: why then
  alternatives:
  - and why
  - so why
  lexicon: HALOT
  rationale: The conjunction plus interrogative advances an argument from what they
    have seen to the rebuke that follows. 'Why then' makes the inferential force clear.
- source_word: זֶּה
  chosen: altogether
  alternatives:
  - this
  - such
  lexicon: HALOT
  rationale: In the idiom זה הבל תהבלו, זה functions adverbially/intensively rather
    than as a simple demonstrative object. Rendering it woodenly as 'this' is awkward
    in English; 'altogether' conveys the intensifying sense in context.
- source_word: הֶבֶל
  chosen: vain
  alternatives:
  - vanity
  - emptiness
  - futility
  lexicon: HALOT
  rationale: הבל denotes emptiness, vapor, futility. Here, paired with the cognate
    verb, it describes becoming futile/empty in thought or speech. 'Vain' is concise
    and idiomatic in English.
- source_word: תֶּהְבָּלוּ
  chosen: do you become
  alternatives:
  - do you act vainly
  - do you speak emptiness
  - do you make yourselves futile
  lexicon: HALOT
  rationale: The verb from the same root as הבל is difficult; it likely means to act
    or become vain/futile. 'Become' works naturally with the predicate 'vain' and
    preserves the cognate sense without over-specifying whether the vanity is in speech,
    thought, or conduct.
