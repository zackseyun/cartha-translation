id: JOB.27.21
reference: Job 27:21
source:
  edition: WLC
  text: יִשָּׂאֵ֣/הוּ קָדִ֣ים וְ/יֵלַ֑ךְ וִֽ֝/ישָׂעֲרֵ֗/הוּ מִ/מְּקֹמֽ/וֹ׃
translation:
  text: The east wind carries him away, and he is gone; it storms him away from his
    place.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'it whirls him away from his place.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יִשָּׂאֵהוּ
  chosen: carries him away
  alternatives:
  - lifts him up
  - bears him away
  - sweeps him away
  lexicon: HALOT
  rationale: From נשׂא, 'to lift, carry, bear.' In this judgment/wind context, 'carries
    him away' is natural English and preserves the image of forcible removal without
    over-paraphrasing.
- source_word: קָדִים
  chosen: the east wind
  alternatives:
  - an east wind
  - the east
  lexicon: HALOT
  rationale: קדים commonly denotes the east wind, often a destructive wind in Hebrew
    poetry. Rendering it explicitly as 'the east wind' communicates the meteorological
    agent rather than the bare direction.
- source_word: וְיֵלַךְ
  chosen: and he is gone
  alternatives:
  - and he goes
  - and he departs
  lexicon: HALOT
  rationale: הלך literally means 'go,' but here follows the carrying away by the wind.
    'And he is gone' gives idiomatic English resultative force while staying close
    to the sense.
- source_word: וישׂערהוּ
  chosen: it storms him away
  alternatives:
  - it whirls him away
  - it sweeps him away
  - it hurls him away
  lexicon: HALOT
  rationale: From סער, associated with storming, raging, or whirling. 'It storms him
    away' preserves the verbal link to storm imagery and the violent expulsion. Because
    the English is slightly unusual, an alternative is preserved in a footnote.
- source_word: ממקומו
  chosen: from his place
  alternatives:
  - out of his place
  - from where he was
  lexicon: HALOT
  rationale: מקום is straightforwardly 'place.' 'From his place' is concise and formally
    close, fitting the poetic line.
