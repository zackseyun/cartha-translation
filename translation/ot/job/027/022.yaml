id: JOB.27.22
reference: Job 27:22
source:
  edition: WLC
  text: וְ/יַשְׁלֵ֣ךְ עָ֭לָי/ו וְ/לֹ֣א יַחְמֹ֑ל מִ֝/יָּד֗/וֹ בָּר֥וֹחַ יִבְרָֽח׃
translation:
  text: He hurls himself at him and does not spare; he surely flees from his hand.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'He casts himself upon him'; the Hebrew verb can be rendered more literally
      as 'throws/casts,' and the construction may depict a violent assault.
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew ''fleeing he flees,'' an infinitive absolute with finite verb expressing
      emphasis: ''he surely flees'' or ''he flees in haste.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיַשְׁלֵךְ
  chosen: hurls himself at
  alternatives:
  - casts at
  - throws himself against
  - casts himself upon
  lexicon: HALOT
  rationale: 'The Hiphil of שלך commonly means ''throw/cast.'' With עָלָיו (''upon/against
    him'') and in this violent judgment context, the sense is best rendered as an
    aggressive action directed at the wicked man: ''hurls himself at him.'' English
    supplies ''himself'' idiomatically to express the hostile onset of the unnamed
    subject. A more wooden ''casts at him'' is possible but less natural and less
    clear.'
- source_word: עָלָיו
  chosen: at him
  alternatives:
  - upon him
  - against him
  lexicon: HALOT
  rationale: The preposition עַל with hostile motion can mean 'upon' or 'against.'
    In idiomatic modern English after 'hurls himself,' 'at him' communicates the attack
    clearly. 'Against him' is also viable and is preserved as an alternative nuance.
- source_word: וְלֹא יַחְמֹל
  chosen: and does not spare
  alternatives:
  - and has no pity
  - and does not show compassion
  lexicon: HALOT
  rationale: חמל means 'spare, have compassion.' In a judgment scene, 'does not spare'
    is the most concise and idiomatic rendering, preserving both severity and lack
    of mercy.
- source_word: מִיָדוֹ
  chosen: from his hand
  alternatives:
  - from his power
  - from his grasp
  lexicon: HALOT
  rationale: יָד literally means 'hand,' often extended to power or control. The literal
    expression works well in English and preserves the Hebrew imagery; the idiomatic
    force of power/grasp is implicit.
- source_word: בָּרוֹחַ יִבְרָח
  chosen: he surely flees
  alternatives:
  - he flees headlong
  - he flees in haste
  - fleeing, he flees
  lexicon: HALOT
  rationale: The infinitive absolute plus imperfect of ברח intensifies the verbal
    idea. 'He surely flees' captures the emphasis in readable English. Alternatives
    such as 'flees headlong' or 'flees in haste' bring out the urgency but are more
    interpretive.
