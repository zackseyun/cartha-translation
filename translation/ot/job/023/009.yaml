id: JOB.23.9
reference: Job 23:9
source:
  edition: WLC
  text: שְׂמֹ֣אול בַּ/עֲשֹׂת֣/וֹ וְ/לֹא אָ֑חַז יַעְטֹ֥ף יָ֝מִ֗ין וְ/לֹ֣א אֶרְאֶֽה־׃
translation:
  text: On the left, when he is at work, I do not grasp him; he turns to the right,
    and I do not see him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'he covers himself on the right,' i.e., he veils or
      hides himself there.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'left' and 'right'; these can sometimes correspond to north and south,
      but the translation preserves the poetic spatial contrast.
    reason: cultural_note
lexical_decisions:
- source_word: שְׂמֹאול
  chosen: on the left
  alternatives:
  - to the north
  - on the north side
  lexicon: HALOT
  rationale: The noun literally denotes 'left' and by extension can indicate 'north.'
    In this poetic context paired with 'right,' the directional contrast is best preserved
    as 'left ... right' rather than converting to compass points.
- source_word: בַּעֲשֹׂתוֹ
  chosen: when he is at work
  alternatives:
  - in his doing
  - when he acts
  lexicon: HALOT
  rationale: The preposition ב plus infinitive construct of עשה with 3ms suffix yields
    a temporal sense, 'in/when he does.' 'When he is at work' gives natural English
    while preserving the idea of God's activity.
- source_word: אָחַז
  chosen: I do not grasp him
  alternatives:
  - I do not perceive him
  - I do not seize him
  lexicon: HALOT
  rationale: The verb basically means 'grasp, seize, take hold of.' Here it likely
    expresses inability to apprehend or lay hold of God. 'Grasp him' preserves both
    the concrete verb and the possible nuance of failing to apprehend.
- source_word: יַעְטֹף
  chosen: he turns
  alternatives:
  - he wraps himself
  - he covers himself
  - he hides himself
  lexicon: HALOT
  rationale: The verb עטף commonly means 'wrap, envelop, cover,' but in this difficult
    poetic line many understand it idiomatically of turning or veiling oneself on
    the right side so as to remain unseen. 'He turns' fits the parallel with spatial
    searching and yields coherent English, while the more literal 'covers himself'
    is preserved in a footnote.
- source_word: יָמִין
  chosen: to the right
  alternatives:
  - on the right side
  - to the south
  lexicon: HALOT
  rationale: As with שְׂמֹאול, the basic spatial contrast in the verse is left/right.
    Rendering with body-oriented directions preserves the Hebrew parallelism better
    than compass directions.
- source_word: אֶרְאֶה
  chosen: I do not see him
  alternatives:
  - I cannot see him
  - I do not perceive him
  lexicon: HALOT
  rationale: The verb ראה straightforwardly means 'see.' Supplying 'him' is required
    in English from the context of Job's inability to perceive God.
