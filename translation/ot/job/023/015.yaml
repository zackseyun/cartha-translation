theological_decisions:
- issue: Referent of the third-person masculine suffixes
  chosen_reading: Rendered as 'his'/'him,' referring to God without substituting a
    divine title in the text.
  alternative_readings:
  - Explicitly supplying 'God'
  rationale: The Hebrew uses pronominal suffixes, and the immediate context makes
    the referent clear. Retaining the pronouns preserves the discourse flow and avoids
    adding a title not present in the verse itself.
  doctrine_reference: Translation philosophy §1, §6
- issue: Intensity of Job's response to God
  chosen_reading: Used strong fear language ('terrified' ... 'afraid') without softening
    or doctrinally resolving Job's experience.
  alternative_readings:
  - Milder renderings such as 'troubled' or 'awed'
  rationale: The verse presents genuine dread before God. The translation preserves
    that tension rather than recasting it as mere reverence or devotional awe.
  doctrine_reference: Translation philosophy §3
