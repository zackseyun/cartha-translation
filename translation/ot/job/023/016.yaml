theological_decisions:
- issue: Rendering of divine titles אֵל and שַׁדַּי
  chosen_reading: God ... the Almighty
  alternative_readings:
  - God ... Shaddai
  rationale: The verse uses two divine designations in parallel. Following the translation
    philosophy, titles are translated to preserve meaning. No doctrinally contested
    term from the provided table is involved, and translating שַׁדַּי as 'the Almighty'
    preserves the force of the title in English.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names'
