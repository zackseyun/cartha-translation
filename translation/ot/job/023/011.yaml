theological_decisions:
- issue: Referent of the 3ms suffixes ('his steps,' 'his way')
  chosen_reading: God is the referent.
  alternative_readings:
  - an unspecified righteous path
  rationale: In the immediate context Job is speaking about God and his own integrity
    before him (Job 23:10-12). Rendering the suffixes straightforwardly as 'his' preserves
    the personal reference without importing additional interpretation.
