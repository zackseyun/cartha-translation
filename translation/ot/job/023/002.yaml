id: JOB.23.2
reference: Job 23:2
source:
  edition: WLC
  text: גַּם הַ֭/יּוֹם מְרִ֣י שִׂחִ֑/י יָ֝דִ֗/י כָּבְדָ֥ה עַל אַנְחָתִֽ/י־־׃
translation:
  text: Even today my complaint is rebellious; my hand is heavy because of my groaning.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my complaint is bitter.' The Hebrew term can be softened contextually
      by some interpreters, but more literally it denotes rebellion or defiance.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'my hand is heavy over my groaning.' Some understand 'hand' idiomatically
      of restrained or burdened expression; others emend to read 'his hand.'
    reason: alternative_reading
lexical_decisions:
- source_word: גַּם
  chosen: Even
  alternatives:
  - also
  - indeed
  lexicon: HALOT
  rationale: Used with הַיּוֹם to form the idiomatic temporal emphasis 'Even today,'
    highlighting that Job's condition persists up to the present.
- source_word: הַיּוֹם
  chosen: today
  alternatives:
  - this day
  lexicon: HALOT
  rationale: Temporal adverbial use; 'today' is natural modern English and preserves
    the immediacy of Job's statement.
- source_word: מְרִי
  chosen: rebellious
  alternatives:
  - bitter
  - rebellion
  lexicon: HALOT
  rationale: The noun commonly denotes rebellion or defiance. Here it predicates the
    character of Job's complaint/speech. Many English versions smooth toward 'bitter,'
    likely from context, but the Hebrew more directly conveys contentious or defiant
    complaint. Rendering it as 'rebellious' preserves the sharper lexical force.
- source_word: שִׂיחִי
  chosen: my complaint
  alternatives:
  - my meditation
  - my discourse
  - my musing
  lexicon: HALOT
  rationale: In Job this noun can denote speech, musing, or complaint. Given the lament
    context and parallel with groaning, 'my complaint' best fits the discourse situation
    without over-paraphrasing.
- source_word: יָדִי
  chosen: my hand
  alternatives:
  - his hand
  lexicon: HALOT
  rationale: The consonantal text with 1cs suffix naturally yields 'my hand.' Although
    some interpreters understand the phrase idiomatically or emend toward 'his hand,'
    the MT should be retained in the main text.
- source_word: כָּבְדָה
  chosen: is heavy
  alternatives:
  - has become heavy
  - lies heavy
  lexicon: HALOT
  rationale: The verb denotes heaviness or weight. Present English 'is heavy' communicates
    the stative sense clearly in context.
- source_word: עַל
  chosen: because of
  alternatives:
  - upon
  - over
  - against
  lexicon: HALOT
  rationale: Here עַל introduces the relation between the heaviness of the hand and
    Job's groaning. 'Because of' best captures the causal nuance in readable English,
    though the underlying preposition is broader.
- source_word: אַנְחָתִי
  chosen: my groaning
  alternatives:
  - my sighing
  lexicon: HALOT
  rationale: The noun refers to lamenting sighs/groans. 'Groaning' fits the intensity
    of Job's suffering and pairs naturally with 'complaint.'
