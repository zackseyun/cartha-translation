theological_decisions:
- issue: Whether to soften Job's self-description to avoid implying sinful defiance
  chosen_reading: Retain the stronger sense 'rebellious' in the main text
  alternative_readings:
  - bitter
  - my complaint is a rebellion
  rationale: The verse presents Job's own characterization of his complaint in stark
    terms. The translation should preserve the theological tension of righteous suffering
    voiced in language that borders on defiance, rather than resolving it by softening
    the expression.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
