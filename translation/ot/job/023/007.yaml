theological_decisions:
- issue: Referent and legal nuance of 'my judge'
  chosen_reading: Retain 'my judge' without specifying whether this is God as adjudicator
    or an adversarial judge from whom Job seeks release.
  alternative_readings:
  - my accuser
  - the one judging me
  rationale: The verse is framed in legal imagery, and Job imagines a fair hearing
    before God. The Hebrew allows a straightforward judicial expression without forcing
    a doctrinally loaded interpretation. Preserving the ambiguity best matches the
    text and the translation philosophy's commitment to preserve tension rather than
    resolve it.
  doctrine_reference: Translation philosophy §3
