id: JOB.23.6
reference: Job 23:6
source:
  edition: WLC
  text: הַ/בְּ/רָב כֹּ֭חַ יָרִ֣יב עִמָּדִ֑/י לֹ֥א אַךְ ה֝֗וּא יָשִׂ֥ם בִּֽ/י־־׃
translation:
  text: Would he contend with me in the greatness of his power? No; surely he would
    pay attention to me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'he would set his heart on me,' or possibly, 'he would put strength
      in me.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַ/בְּ/רָב כֹּחַ
  chosen: in the greatness of his power
  alternatives:
  - with great power
  - by the abundance of power
  lexicon: HALOT
  rationale: The interrogative הֲ with בְּרָב כֹּחַ introduces the question whether
    God would litigate against Job on the basis of overwhelming strength. 'In the
    greatness of his power' preserves both the noun רֹב/רַב ('abundance, greatness')
    and כֹּחַ ('power, strength') in natural English.
- source_word: יָרִיב עִמָּדִי
  chosen: would contend with me
  alternatives:
  - would dispute with me
  - would plead against me
  - would litigate with me
  lexicon: HALOT
  rationale: ריב in Job's legal setting carries forensic overtones of contending or
    conducting a case. 'Contend with me' is idiomatic and preserves the adversarial-legal
    sense without overtechnical wording.
- source_word: לֹא אַךְ
  chosen: No; surely
  alternatives:
  - No, rather
  - No; indeed
  - Not so; surely
  lexicon: HALOT
  rationale: The sequence marks a strong negation followed by emphatic affirmation.
    Rendering it as 'No; surely' captures Job's confident denial of the previous possibility
    and the emphatic turn to what God would actually do.
- source_word: יָשִׂם בִּי
  chosen: he would pay attention to me
  alternatives:
  - he would set his heart on me
  - he would give heed to me
  - he would put strength in me
  lexicon: HALOT
  rationale: שׂים + ב can mean to set one's mind/attention on someone. In context
    Job expects not crushing force but a fair hearing from God. 'Pay attention to
    me' expresses that sense clearly in modern English. The alternative 'put strength
    in me' is possible but less fitting in this legal context.
