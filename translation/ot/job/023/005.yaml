id: JOB.23.5
reference: Job 23:5
source:
  edition: WLC
  text: אֵ֭דְעָה מִלִּ֣ים יַעֲנֵ֑/נִי וְ֝/אָבִ֗ינָה מַה יֹּ֥אמַר לִֽ/י־׃
translation:
  text: I would know the words he would answer me, and understand what he would say
    to me.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: אֵדְעָה
  chosen: I would know
  alternatives:
  - I would know
  - let me know
  - I might know
  lexicon: HALOT
  rationale: Qal cohortative/volitive of ידע in context expresses Job's desired result
    if he could present his case before God. 'I would know' captures the contingent,
    wish-like force better than a simple future 'I will know.'
- source_word: מִלִּים
  chosen: the words
  alternatives:
  - words
  - the arguments
  - the things
  lexicon: HALOT
  rationale: מִלִּים is the ordinary plural 'words.' The article is absent in Hebrew,
    but English idiom naturally uses 'the words' with the following relative clause
    ('he would answer me'). 'Arguments' would over-interpret the forensic setting.
- source_word: יַעֲנֵנִי
  chosen: he would answer me
  alternatives:
  - he answers me
  - he might answer me
  - he would respond to me
  lexicon: HALOT
  rationale: ענה here means 'answer/respond.' Given the surrounding cohortatives and
    hypothetical setting, 'he would answer me' fits the sense of what Job longs to
    hear if granted an audience.
- source_word: וְאָבִינָה
  chosen: and understand
  alternatives:
  - and I would understand
  - and discern
  lexicon: HALOT
  rationale: בין in the Qal conveys understanding/discernment. 'Understand' is the
    most natural modern English equivalent and parallels 'I would know' in the first
    colon.
- source_word: מַה
  chosen: what
  alternatives:
  - how
  - that which
  lexicon: HALOT
  rationale: 'Interrogative pronoun introducing the content of God''s speech: ''what
    he would say to me.'''
- source_word: יֹאמַר לִי
  chosen: he would say to me
  alternatives:
  - he would tell me
  - he says to me
  lexicon: HALOT
  rationale: אמר is the common verb 'say.' 'Say to me' preserves the directness of
    the Hebrew without adding interpretive nuance such as 'tell.'
