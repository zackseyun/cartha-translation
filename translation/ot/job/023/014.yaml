theological_decisions:
- issue: Whether חֻקִּי should be rendered in a legalistic sense ('my decree/statute')
    or as Job's divinely assigned lot
  chosen_reading: what is appointed for me
  alternative_readings:
  - my decree
  - my statute
  - my appointed portion
  rationale: The immediate context concerns God's determination of Job's path and
    destiny, not Job's own legal ordinance. This rendering preserves divine sovereignty
    without importing a more technical legal sense than the context warrants.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; preserve theological tension rather than resolve it.'
