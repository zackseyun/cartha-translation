id: JOB.23.12
reference: Job 23:12
source:
  edition: WLC
  text: מִצְוַ֣ת שְׂ֭פָתָי/ו וְ/לֹ֣א אָמִ֑ישׁ מֵ֝/חֻקִּ֗/י צָפַ֥נְתִּי אִמְרֵי פִֽי/ו־׃
translation:
  text: I have not turned aside from the command of his lips; I have treasured the
    words of his mouth more than my allotted portion.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, following a traditional interpretation of a difficult Hebrew phrase,
      'I have treasured the words of his mouth more than my necessary food.'
    reason: alternative_reading
lexical_decisions:
- source_word: מִצְוַת
  chosen: the command
  alternatives:
  - the commandment
  - the command(s)
  lexicon: HALOT
  rationale: Singular construct with 'his lips'; 'the command' is natural English
    and preserves the singular force without sounding overly traditional.
- source_word: שְׂפָתָיו
  chosen: his lips
  alternatives:
  - his speech
  lexicon: HALOT
  rationale: A literal rendering fits the poetic parallelism with 'his mouth' later
    in the verse. The 3ms suffix indicates 'his,' referring to God in context.
- source_word: לֹא אָמִישׁ
  chosen: I have not turned aside
  alternatives:
  - I have not departed
  - I did not remove myself
  lexicon: HALOT
  rationale: The Hiphil of מוש here conveys not departing or turning away. 'Turned
    aside' is idiomatic modern English and suits moral/obediential context.
- source_word: מֵחֻקִּי
  chosen: more than my allotted portion
  alternatives:
  - from my statute
  - more than my due
  - more than my prescribed portion
  lexicon: HALOT
  rationale: The ketiv/qere-like ambiguity reflected in the morphology (1cs suffix)
    yields a difficult phrase. In context, the sense is commonly taken as Job valuing
    God's words above his own prescribed portion/allowance, likely food or due portion.
    Rendering as 'my allotted portion' best fits the comparative sense with 'I have
    treasured' and avoids the less coherent 'from my statute.'
- source_word: צָפַנְתִּי
  chosen: I have treasured
  alternatives:
  - I have hidden
  - I have stored up
  - I have kept
  lexicon: HALOT
  rationale: The verb literally means to hide/store up, but in wisdom contexts it
    often carries the sense of treasuring up inwardly. 'Treasured' communicates both
    preservation and value in clear English.
- source_word: אִמְרֵי
  chosen: the words
  alternatives:
  - the sayings
  - the utterances
  lexicon: HALOT
  rationale: A straightforward plural construct; 'words' is the most natural English
    equivalent here.
- source_word: פִיו
  chosen: his mouth
  alternatives:
  - his speech
  lexicon: HALOT
  rationale: Literal rendering preserves the poetic parallel with 'his lips' and the
    concrete imagery of divine speech.
