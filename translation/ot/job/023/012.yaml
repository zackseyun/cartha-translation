theological_decisions:
- issue: Referent of the 3ms suffixes ('his lips,' 'his mouth')
  chosen_reading: They refer to God.
  alternative_readings:
  - An unspecified speaker in a more general sense
  rationale: In Job 23 the speaker is describing his fidelity before God and to God's
    speech. The immediate context strongly supports God as the referent, and the translation
    reflects that without expanding beyond the Hebrew.
- issue: Interpretation of מֵחֻקִּי
  chosen_reading: 'comparative sense: ''more than my allotted portion'''
  alternative_readings:
  - '''from my statute/decree'''
  - '''more than my necessary food'' as reflected in some traditional translations
    via a different vocalization or interpretive tradition'
  rationale: 'The consonantal text with 1cs suffix is difficult. The chosen rendering
    stays close to the received form while making coherent sense in context: Job values
    God''s words above what is allotted to him. Because ''necessary food'' is a well-known
    traditional interpretation, it is preserved in a footnote rather than placed in
    the main text.'
