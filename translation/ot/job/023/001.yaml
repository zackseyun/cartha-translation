id: JOB.23.1
reference: Job 23:1
source:
  edition: WLC
  text: וַ/יַּ֥עַן אִיּ֗וֹב וַ/יֹּאמַֽר׃
translation:
  text: 'Then Job answered and said:'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיַּעַן
  chosen: answered
  alternatives:
  - responded
  lexicon: HALOT
  rationale: The verb ענה in this narrative formula commonly means 'answer' or 'respond.'
    'Answered' preserves the conventional dialogic sense and fits the formulaic Hebrew
    sequence without unnecessary expansion.
- source_word: אִיּוֹב
  chosen: Job
  rationale: Personal names are transliterated by standard English convention per
    translation philosophy.
- source_word: וַיֹּאמַר
  chosen: said
  alternatives:
  - spoke
  lexicon: HALOT
  rationale: אמר is the standard verb 'to say.' In the common Hebrew formula 'answered
    and said,' retaining 'said' reflects the source text closely and preserves the
    literary cadence.
- source_word: וַ...וַ...
  chosen: Then ... and ...
  alternatives:
  - And ... and ...
  rationale: The waw-consecutive sequence advances the narrative. Rendering the first
    waw as 'Then' gives natural modern English while preserving the sequential force;
    the second is retained as 'and' in the fixed speech-introduction formula.
