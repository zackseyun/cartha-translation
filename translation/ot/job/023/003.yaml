theological_decisions:
- issue: Referent of the 3ms suffixes ('him,' 'his')
  chosen_reading: God is the implied referent throughout.
  rationale: The immediate context is Job's desire to present his case before God.
    The verse itself does not name God, but the masculine singular suffixes clearly
    point back to him in context. Rendering with lowercase pronouns follows normal
    English Bible style without importing extra theological claims.
