id: JOB.23.13
reference: Job 23:13
source:
  edition: WLC
  text: וְ/ה֣וּא בְ֭/אֶחָד וּ/מִ֣י יְשִׁיבֶ֑/נּוּ וְ/נַפְשׁ֖/וֹ אִוְּתָ֣ה וַ/יָּֽעַשׂ׃
translation:
  text: But he is unchangeable, and who can turn him back? What his soul desires,
    that he does.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'But he is one'; the Hebrew likely expresses that he
      is of one mind or unchangeable in purpose.
    reason: alternative_reading
  - marker: b
    text: Or 'What he desires, he does.' The Hebrew says 'his soul,' a common way
      of speaking of a person's own will or desire.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהוּא
  chosen: But he
  alternatives:
  - And he
  - Yet he
  lexicon: HALOT
  rationale: The conjunction with independent pronoun marks contrast with the preceding
    context; 'But he' brings out the adversative force naturally in English while
    retaining the explicit pronoun.
- source_word: בְאֶחָד
  chosen: is unchangeable
  alternatives:
  - is one
  - is in one mind
  - remains the same
  lexicon: HALOT
  rationale: The phrase literally involves 'in/with one,' but in context it expresses
    God's fixed, singular will or immutability of purpose. 'Is unchangeable' communicates
    the idiomatic sense in clear modern English better than the opaque literal 'is
    in one.'
- source_word: וּמִי יְשִׁיבֶנּוּ
  chosen: and who can turn him back?
  alternatives:
  - and who can turn him?
  - and who can make him change?
  - and who can answer him back?
  lexicon: HALOT
  rationale: The Hiphil of שוב here means to turn back, reverse, or cause to change
    course. 'Turn him back' preserves the image and fits the context of God's irresistible
    purpose. 'Answer him back' is less likely here than reversal of intent.
- source_word: וְנַפְשׁוֹ
  chosen: What his soul
  alternatives:
  - What he
  - What his desire
  - His very self
  lexicon: HALOT
  rationale: 'נֶפֶשׁ literally means ''soul/self/life.'' Retaining ''soul'' preserves
    the Hebrew expression and its anthropomorphic force, while the syntax is adjusted
    to idiomatic English: ''What his soul desires.'''
- source_word: אִוְּתָה
  chosen: desires
  alternatives:
  - wills
  - longs for
  - craves
  lexicon: HALOT
  rationale: The verb denotes desire or willing. 'Desires' is natural and broad enough
    here, avoiding overstatement while preserving the volitional sense.
- source_word: וַיָּעַשׂ
  chosen: that he does
  alternatives:
  - he does it
  - he accomplishes
  lexicon: HALOT
  rationale: עשה is the common verb 'do/make.' 'That he does' mirrors the Hebrew structure
    and keeps the statement concise. 'He accomplishes' would add interpretive weight
    not explicit in the verb itself.
