theological_decisions:
- issue: Rendering the statement about God's fixed will
  chosen_reading: But he is unchangeable, and who can turn him back? What his soul
    desires, that he does.
  alternative_readings:
  - But he is one, and who can turn him? What he desires, he does.
  - But he is in one mind, and who can turn him back? What he desires, he does.
  rationale: The Hebrew can be rendered more literally as 'he is one' or idiomatically
    as expressing unchangeableness/singleness of purpose. In context, Job is emphasizing
    God's unalterable resolve and irresistible action. 'Unchangeable' makes the sense
    plain without importing later metaphysical categories beyond the verse's immediate
    claim.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather
    than resolve it
