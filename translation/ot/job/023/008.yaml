id: JOB.23.8
reference: Job 23:8
source:
  edition: WLC
  text: הֵ֤ן קֶ֣דֶם אֶהֱלֹ֣ךְ וְ/אֵינֶ֑/נּוּ וְ֝/אָח֗וֹר וְֽ/לֹא אָבִ֥ין לֽ/וֹ־׃
translation:
  text: Look, I go east, but he is not there; and west, but I do not perceive him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'forward ... backward.' The Hebrew uses directional terms that can be
      understood either spatially or as east/west.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֵן
  chosen: Look
  alternatives:
  - Behold
  - Surely
  - See
  lexicon: HALOT
  rationale: Introduces Job's statement with attention-drawing force. 'Look' preserves
    the deictic/interjective sense in readable modern English better than the more
    archaic 'Behold.'
- source_word: קֶדֶם
  chosen: east
  alternatives:
  - forward
  - before
  lexicon: HALOT
  rationale: 'In this poetic context paired with ''back/west'' (אָחוֹר), the directional/geographical
    sense is most natural: Job searches in one direction and then the opposite. ''East''
    makes the parallelism clear in English.'
- source_word: אֶהֱלֹךְ
  chosen: I go
  alternatives:
  - I walk
  - I proceed
  lexicon: HALOT
  rationale: Qal imperfect 1cs of הלך here expresses Job's searching movement. 'I
    go' is natural English and broad enough to cover the sense without over-specifying
    manner.
- source_word: וְאֵינֶנּוּ
  chosen: but he is not there
  alternatives:
  - and he is not there
  - but he is not found
  - and he is not there
  lexicon: HALOT
  rationale: The pronoun refers to God in context. English idiom benefits from supplying
    'there' after a directional search. 'But' brings out the adversative sense implied
    by the failed search, though the Hebrew conjunction is simply waw.
- source_word: אָחוֹר
  chosen: west
  alternatives:
  - backward
  - behind
  lexicon: HALOT
  rationale: As the counterpart to קדם in a directional pair, this is best rendered
    with the opposite compass direction in idiomatic English. 'West' communicates
    the poetic contrast more clearly than the more literal but less transparent 'backward.'
- source_word: לֹא אָבִין לוֹ
  chosen: I do not perceive him
  alternatives:
  - I do not understand him
  - I do not discern him
  - I cannot perceive him there
  lexicon: HALOT
  rationale: בין can mean understand/discern, but in this context of searching for
    God's presence, 'perceive' best captures failure to detect or apprehend him. The
    pronominal object is retained as 'him' rather than a more abstract 'it.'
