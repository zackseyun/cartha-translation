theological_decisions:
- issue: Referent of the third-person pronouns
  chosen_reading: The pronouns refer to God, rendered as 'he'/'him.'
  alternative_readings:
  - An implicit unspecified referent
  rationale: The surrounding context is Job's search for God, so making the masculine
    singular referent explicit in English pronouns is contextually warranted without
    importing extra theology.
