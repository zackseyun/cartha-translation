theological_decisions:
- issue: Forensic imagery in Job's speech toward God
  chosen_reading: Render the verse in legal/courtroom language without softening Job's
    boldness.
  alternative_readings:
  - Render more generally as 'state my cause' or 'speak my complaints'
  rationale: The Hebrew terms ערך + משפט + תוכחות together evoke ordered legal presentation.
    The translation preserves Job's daring desire to present a case before God, without
    importing irreverence or muting the judicial metaphor.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather
    than resolve it; original-language primacy over translation tradition.'
