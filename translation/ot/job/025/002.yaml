theological_decisions:
- issue: Nature of the opening clause
  chosen_reading: An assertion that dominion and dread are attendant attributes of
    God
  alternative_readings:
  - 'A possessive sense: dominion and dread belong to him'
  rationale: The Hebrew verbless clause allows either a locative/attendant sense ('with
    him') or a possessive paraphrase. The translation keeps the more transparent wording
    'are with him,' preserving the poetic force without making a stronger doctrinal
    claim than the text itself.
  doctrine_reference: Translation philosophy §1, §3
