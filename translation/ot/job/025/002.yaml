id: JOB.25.2
reference: Job 25:2
source:
  edition: WLC
  text: הַמְשֵׁ֣ל וָ/פַ֣חַד עִמּ֑/וֹ עֹשֶׂ֥ה שָׁ֝ל֗וֹם בִּ/מְרוֹמָֽי/ו׃
translation:
  text: Dominion and dread are with him; he makes peace in his heights.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Dominion and dread belong to him.'
    reason: alternative_reading
  - marker: b
    text: Or 'in his high places'; the phrase likely refers to the exalted heavenly
      realm.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַמְשֵׁל
  chosen: Dominion
  alternatives:
  - Rule
  - Sovereignty
  lexicon: HALOT
  rationale: The noun from משל denotes rule or dominion. 'Dominion' best captures
    the abstract quality named here and fits the parallel nominal style of the clause.
    'Sovereignty' is possible but slightly more interpretive and theological in English.
- source_word: וָפַחַד
  chosen: and dread
  alternatives:
  - and fear
  - and terror
  lexicon: HALOT
  rationale: פחד denotes fear, dread, or terror. 'Dread' preserves the sense of awe-inspiring
    fear associated with God's majesty without over-intensifying to 'terror.' The
    conjunction is retained straightforwardly as 'and'.
- source_word: עִמּוֹ
  chosen: are with him
  alternatives:
  - belong to him
  - are his
  lexicon: HALOT
  rationale: The prepositional phrase literally means 'with him.' Because the Hebrew
    clause is verbless, English supplies 'are.' 'With him' preserves the Hebrew imagery
    and avoids over-paraphrasing into possession language, though possession is implied.
- source_word: עֹשֶׂה
  chosen: he makes
  alternatives:
  - making
  - who makes
  - he establishes
  lexicon: HALOT
  rationale: The participle of עשה can function verbally in context. 'He makes' gives
    clear English and reflects the ongoing or characteristic action. 'Establishes'
    is interpretive and stronger than the base verb warrants.
- source_word: שָׁלוֹם
  chosen: peace
  alternatives:
  - wholeness
  - order
  - well-being
  lexicon: HALOT
  rationale: שׁלום has a broad semantic range including peace, well-being, and wholeness.
    'Peace' is the most natural and contextually fitting rendering here, especially
    in a cosmic setting. Broader nuances are possible but need not be imported into
    the main text.
- source_word: בִּמְרֹמָיו
  chosen: in his heights
  alternatives:
  - in his high places
  - in his heavens
  lexicon: HALOT
  rationale: מרום refers to height or exalted place. The plural with suffix is literally
    'his heights.' This preserves the elevated, poetic diction of the Hebrew. 'Heavens'
    is possible by implication but is less literal and narrows the imagery.
