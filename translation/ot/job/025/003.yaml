id: JOB.25.3
reference: Job 25:3
source:
  edition: WLC
  text: הֲ/יֵ֣שׁ מִ֭סְפָּר לִ/גְדוּדָ֑י/ו וְ/עַל מִ֝֗י לֹא יָק֥וּם אוֹרֵֽ/הוּ־־׃
translation:
  text: Is there any number to his troops? And upon whom does his light not rise?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his armies' or 'his bands.'
    reason: lexical_alternative
  - marker: b
    text: Or 'And over whom does his light not arise?'
    reason: lexical_alternative
  - marker: c
    text: '''His light'' may refer to God''s universal illumination, splendor, or
      reach; the Hebrew does not specify more narrowly.'
    reason: alternative_reading
lexical_decisions:
- source_word: הֲיֵשׁ
  chosen: Is there
  alternatives:
  - Does there exist
  lexicon: HALOT
  rationale: Idiomatic existential opening rendered as a natural English question.
- source_word: מִסְפָּר
  chosen: number
  alternatives:
  - count
  - reckoning
  lexicon: HALOT
  rationale: The noun denotes a count or number; 'number' best preserves the straightforward
    sense in context.
- source_word: לִגְדוּדָיו
  chosen: to his troops
  alternatives:
  - for his armies
  - to his bands
  lexicon: HALOT
  rationale: גְּדוּד commonly refers to a troop, band, or military company. In this
    context of God's overwhelming dominion, 'troops' is concise and natural. The preposition
    ל is represented idiomatically in English with 'to' after 'number' ('number to
    his troops').
- source_word: וְעַל־מִי
  chosen: And upon whom
  alternatives:
  - And over whom
  - And on whom
  lexicon: HALOT
  rationale: Retains the spatial metaphor with עַל while sounding natural in elevated
    English.
- source_word: לֹא יָקוּם
  chosen: does not rise
  alternatives:
  - does not arise
  - does not stand up
  lexicon: HALOT
  rationale: קוּם literally means 'rise/arise.' With 'light' as subject, 'rise' is
    the most idiomatic English collocation.
- source_word: אוֹרֵהוּ
  chosen: his light
  alternatives:
  - his light/radiance
  lexicon: HALOT
  rationale: The noun אוֹר means 'light.' The 3ms suffix is rendered directly as 'his.'
    'Light' is preferred over 'radiance' as the simpler and more literal term, while
    still allowing the metaphorical sense of God's universal illumination or reach.
