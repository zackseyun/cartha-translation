theological_decisions:
- issue: Referent of the 3ms suffixes ('his troops,' 'his light')
  chosen_reading: They refer to God, as in Bildad's description of God's dominion.
  alternative_readings:
  - A more generalized reference to a heavenly ruler
  rationale: Within Job 25, Bildad is speaking of God's dominion and awe (v. 2), so
    the most coherent antecedent is God. The translation preserves the pronoun rather
    than replacing it with 'God's' to stay close to the Hebrew while maintaining the
    sense.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
- issue: Meaning of 'his light'
  chosen_reading: A broad metaphor for God's light, extending universally.
  alternative_readings:
  - A reference specifically to sunlight
  - A reference to divine splendor or favor
  rationale: The Hebrew permits a broad image. The main text keeps the literal 'light'
    and does not over-specify whether the sense is physical, metaphorical, or both.
  doctrine_reference: Preserve theological tension rather than resolve it.
