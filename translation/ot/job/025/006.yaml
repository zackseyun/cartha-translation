id: JOB.25.6
reference: Job 25:6
source:
  edition: WLC
  text: אַ֭ף כִּֽי אֱנ֣וֹשׁ רִמָּ֑ה וּ/בֶן אָ֝דָ֗ם תּוֹלֵעָֽה־־׃פ
translation:
  text: how much less man, who is a maggot, and the son of man, who is a worm!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'mortal man' for 'man'; the Hebrew אֱנוֹשׁ often highlights human frailty.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the son of man,' a poetic expression for a human being here, not
      a messianic title.
    reason: cultural_note
lexical_decisions:
- source_word: אַף כִּי
  chosen: how much less
  alternatives:
  - indeed
  - even though
  - how much more
  lexicon: HALOT
  rationale: 'In context this idiom continues Bildad''s a fortiori argument from the
    previous verse: if even heavenly bodies are not pure before God, then all the
    more frail humanity is not. English ''how much less'' best captures the inferential
    force here.'
- source_word: אֱנוֹשׁ
  chosen: man
  alternatives:
  - mortal man
  - human being
  lexicon: HALOT
  rationale: The noun emphasizes frail humanity. 'Man' preserves the singular representative
    force and aligns with the gender-accurate policy; 'mortal man' is possible but
    would over-specify beyond the immediate poetic parallel.
- source_word: רִמָּה
  chosen: maggot
  alternatives:
  - worm
  lexicon: HALOT
  rationale: This term commonly denotes a maggot or grub associated with decay, distinct
    from the following תּוֹלֵעָה. Rendering it 'maggot' preserves the poetic intensification
    and avoids flattening both nouns into the same English word.
- source_word: בֶן אָדָם
  chosen: the son of man
  alternatives:
  - a son of man
  - human being
  lexicon: HALOT
  rationale: The Hebrew idiom literally reads 'son of man' and here functions as a
    poetic parallel to אֱנוֹשׁ, meaning a human being. The literal rendering preserves
    the source texture and the parallelism; in this context it is not a messianic
    title.
- source_word: אָדָם
  chosen: man
  alternatives:
  - humankind
  - humanity
  lexicon: HALOT
  rationale: Within the construct phrase בֶן אָדָם, the sense is human/man. The default
    policy for אָדָם allows 'man' where context supports it; here the singular poetic
    parallel favors that rendering.
- source_word: תּוֹלֵעָה
  chosen: worm
  alternatives:
  - grub
  - maggot
  lexicon: HALOT
  rationale: This noun is a broader term for worm and is suitably distinguished from
    רִמָּה. 'Worm' is the most natural English equivalent and preserves the poetic
    pairing.
