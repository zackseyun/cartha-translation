theological_decisions:
- issue: Whether 'son of man' should be read as a messianic or titular expression
  chosen_reading: non-titular poetic idiom for a human being
  alternative_readings:
  - messianic title (not applicable in this context)
  rationale: In Job 25:6 בֶן אָדָם is parallel to אֱנוֹשׁ and functions as a Hebrew
    idiom for humanity's frailty, not as a christological title. Retaining the literal
    phrase preserves the Hebrew while the translation context makes the non-titular
    sense clear.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; and preserve
    source-text meaning without importing doctrinal claims.'
