id: JOB.25.1
reference: Job 25:1
source:
  edition: WLC
  text: וַ֭/יַּעַן בִּלְדַּ֥ד הַ/שֻּׁחִ֗י וַ/יֹּאמַֽר׃
translation:
  text: 'Then Bildad the Shuhite answered and said:'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיַּעַן
  chosen: answered
  alternatives:
  - responded
  lexicon: HALOT
  rationale: The verb ענה in this narrative formula commonly means 'answer' or 'respond.'
    'Answered' preserves the conventional dialogic sense and fits the formulaic style
    of Hebrew speech introductions.
- source_word: בִּלְדַּד
  chosen: Bildad
  rationale: Personal name transliterated according to standard English convention,
    following the translation philosophy to transliterate names rather than translate
    them.
- source_word: הַשֻּׁחִי
  chosen: the Shuhite
  alternatives:
  - the Shuahite
  lexicon: HALOT
  rationale: This gentilicial title identifies Bildad by clan or regional origin,
    traditionally linked to Shuah. 'Shuhite' is the established and natural English
    form; 'Shuahite' is possible but less idiomatic.
- source_word: וַיֹּאמַר
  chosen: and said
  alternatives:
  - saying
  - and spoke
  lexicon: HALOT
  rationale: אמר in this common narrative sequence is best rendered 'said.' Keeping
    both verbs ('answered and said') reflects the Hebrew formula without unnecessary
    paraphrase.
- source_word: וַיַּעַן ... וַיֹּאמַר
  chosen: Then ... answered and said
  alternatives:
  - '... answered, saying'
  lexicon: HALOT
  rationale: The initial conjunction plus wayyiqtol sequence advances the discourse.
    'Then' smoothly conveys the narrative progression in readable modern English while
    preserving the formal speech-introduction structure.
