id: JOB.25.5
reference: Job 25:5
source:
  edition: WLC
  text: הֵ֣ן עַד יָ֭רֵחַ וְ/לֹ֣א יַאֲהִ֑יל וְ֝/כוֹכָבִ֗ים לֹא זַכּ֥וּ בְ/עֵינָֽי/ו־־׃
translation:
  text: Behold, even the moon does not shine, and the stars are not pure in his eyes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the moon is not bright' / 'does not give light.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the stars are not clean' or possibly 'not bright' in his sight.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֵן
  chosen: Behold
  alternatives:
  - Indeed
  - Look
  lexicon: HALOT
  rationale: Introduces an emphatic observation. 'Behold' preserves the elevated,
    attention-directing force appropriate to Job's poetic discourse.
- source_word: עַד
  chosen: even
  alternatives:
  - as far as
  - up to
  lexicon: HALOT
  rationale: In this idiom with a following noun, it has an intensifying sense ('even
    the moon'), not a spatial or temporal meaning.
- source_word: יָרֵחַ
  chosen: the moon
  lexicon: HALOT
  rationale: Straightforward rendering of the celestial body named in the comparison.
- source_word: לֹא יַאֲהִיל
  chosen: does not shine
  alternatives:
  - is not bright
  - does not give light
  lexicon: HALOT
  rationale: The Hiphil of אהל here refers to giving light or shining. 'Does not shine'
    is idiomatic modern English and fits the poetic contrast with the stars.
- source_word: וְכוֹכָבִים
  chosen: and the stars
  lexicon: HALOT
  rationale: Simple coordinate continuation of the celestial imagery.
- source_word: לֹא זַכּוּ
  chosen: are not pure
  alternatives:
  - are not clean
  - are not bright
  lexicon: HALOT
  rationale: Though the root can carry ideas of cleanness or brightness, in context
    of evaluation before God and with the phrase 'in his eyes,' 'pure' best conveys
    moral/qualitative insufficiency without over-paraphrasing.
- source_word: בְעֵינָיו
  chosen: in his eyes
  alternatives:
  - in his sight
  - before him
  lexicon: HALOT
  rationale: A common Hebrew idiom for evaluation from someone's perspective. 'In
    his eyes' preserves the metaphor closely while remaining natural in English.
