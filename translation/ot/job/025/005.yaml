theological_decisions:
- issue: Referent of the 3ms suffix in 'in his eyes'
  chosen_reading: his = God
  alternative_readings:
  - his = an unspecified observer in the poetic argument
  rationale: In context Bildad is speaking of God's transcendence and human impurity
    before him (vv. 2–6). The singular suffix most naturally refers to God. The translation
    keeps the lowercase pronoun for readability in running text, but the sense is
    divine evaluation.
