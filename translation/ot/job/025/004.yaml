theological_decisions:
- issue: Anthropological generic language
  chosen_reading: man ... one born of woman
  alternative_readings:
  - humanity ... anyone born of woman
  - a mortal ... one born of woman
  rationale: The Hebrew uses masculine/generic singular expressions for humanity.
    Per the doctrine's gender-accurate policy, 'man' is retained where representative/generic
    force is intended, while the second colon is rendered inclusively as the idiom
    itself allows.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Relational/judicial nuance of human standing before God
  chosen_reading: before God
  alternative_readings:
  - with God
  rationale: The preposition is literally 'with,' but the verse asks about human righteousness
    in relation to God, likely with judicial overtones. 'Before God' preserves that
    theological tension without over-specifying a doctrine of justification.
  doctrine_reference: DOCTRINE.md Translation philosophy §3
