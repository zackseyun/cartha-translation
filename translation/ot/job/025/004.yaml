id: JOB.25.4
reference: Job 25:4
source:
  edition: WLC
  text: וּ/מַה יִּצְדַּ֣ק אֱנ֣וֹשׁ עִם אֵ֑ל וּ/מַה יִּ֝זְכֶּ֗ה יְל֣וּד אִשָּֽׁה־־־׃
translation:
  text: So how can man be righteous before God? And how can one born of woman be pure?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with God.' The Hebrew is literally 'with God,' but the phrase can denote
      a person's standing before him.
    reason: lexical_alternative
  - marker: b
    text: Or 'be clean' or 'be innocent.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמַה
  chosen: So how can
  alternatives:
  - And how can
  - What/how can
  lexicon: HALOT
  rationale: The interrogative מַה with prefixed conjunction introduces a rhetorical
    question. In English, 'how can' best conveys the idiomatic force here; 'So' reflects
    the connective force in context without woodenly repeating 'and.'
- source_word: יִצְדַּק
  chosen: be righteous
  alternatives:
  - be justified
  - be in the right
  lexicon: HALOT
  rationale: From צדק in the Qal, the sense is being righteous/right in relation to
    God. 'Be righteous' preserves the adjective-like/resultative force and avoids
    importing later forensic nuance too strongly, though 'be justified' is a possible
    contextual alternative.
- source_word: אֱנוֹשׁ
  chosen: man
  alternatives:
  - a mortal
  - a human being
  lexicon: HALOT
  rationale: אֱנוֹשׁ emphasizes frail humanity. 'Man' fits the generic singular and
    follows the project's gender-accurate policy; 'mortal' is possible but less natural
    in this parallelism.
- source_word: עִם אֵל
  chosen: before God
  alternatives:
  - with God
  - in relation to God
  lexicon: HALOT
  rationale: Literally 'with God,' but in this judicial/comparative context English
    idiom is better served by 'before God,' expressing standing in God's presence
    or court.
- source_word: יִזְכֶּה
  chosen: be pure
  alternatives:
  - be clean
  - be innocent
  lexicon: HALOT
  rationale: זכה in the Qal commonly denotes being clean/pure. 'Be pure' reads naturally
    in parallel with 'be righteous' and captures moral purity without narrowing to
    legal innocence alone.
- source_word: יְלוּד אִשָּׁה
  chosen: one born of woman
  alternatives:
  - a son born of woman
  - one born from a woman
  lexicon: HALOT
  rationale: The phrase is an idiom for human mortality and creatureliness. 'One born
    of woman' is natural English and preserves the generic force without unnecessarily
    specifying 'son.'
