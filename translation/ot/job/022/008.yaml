id: JOB.22.8
reference: Job 22:8
source:
  edition: WLC
  text: וְ/אִ֣ישׁ זְ֭רוֹעַ ל֣/וֹ הָ/אָ֑רֶץ וּ/נְשׂ֥וּא פָ֝נִ֗ים יֵ֣שֶׁב בָּֽ/הּ׃
translation:
  text: But the land belonged to the strong man, and the favored man lived in it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'man of arm,' an idiom for a powerful or strong man.
    reason: lexical_alternative
  - marker: b
    text: Or 'the honored man,' 'the one shown favor,' or 'the one treated with partiality'
      for 'the favored man.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִישׁ
  chosen: But the ... man
  alternatives:
  - And the ... man
  - As for the ... man
  lexicon: HALOT
  rationale: אִישׁ means 'man.' The prefixed conjunction is rendered 'But' in context
    to reflect the adversative force within Eliphaz's accusation, contrasting the
    treatment of the weak in surrounding verses with the privileged strong person
    here.
- source_word: זְרוֹעַ
  chosen: strong
  alternatives:
  - arm
  - mighty
  - powerful
  lexicon: HALOT
  rationale: Literally 'arm,' but in this idiom אִישׁ זְרוֹעַ denotes a man of strength/power.
    Rendering it adjectivally as 'strong man' communicates the idiomatic sense in
    natural English while preserving the masculine singular.
- source_word: לוֹ הָאָרֶץ
  chosen: the land belonged to
  alternatives:
  - had the land
  - the land was his
  lexicon: HALOT
  rationale: 'The lamed pronoun with ''the land'' expresses possession or control:
    ''the land was his.'' ''Belonged to'' makes the possessive sense explicit and
    reads naturally in English.'
- source_word: וּנְשׂוּא פָנִים
  chosen: the favored man
  alternatives:
  - the honored man
  - the one shown partiality
  - the exalted man
  lexicon: HALOT
  rationale: Literally 'one lifted of face/faces,' an idiom for one who is shown favor,
    treated with partiality, or held in honor. 'Favored man' best captures the social
    privilege implied here without over-specifying whether the favor is just honor
    or unjust partiality.
- source_word: יֵשֶׁב בָּהּ
  chosen: lived in it
  alternatives:
  - dwelt in it
  - settled in it
  - inhabited it
  lexicon: HALOT
  rationale: יָשַׁב commonly means 'sit, dwell, live.' 'Lived in it' is clear modern
    English and fits the statement about occupying the land.
