id: JOB.22.13
reference: Job 22:13
source:
  edition: WLC
  text: וְֽ֭/אָמַרְתָּ מַה יָּ֣דַֽע אֵ֑ל הַ/בְעַ֖ד עֲרָפֶ֣ל יִשְׁפּֽוֹט־׃
translation:
  text: Yet you say, ‘What does God know? Can he judge through thick darkness?’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Does he judge through thick darkness?' The Hebrew imperfect may be
      read as simple present/future as well as with an implied sense of ability in
      this rhetorical question.
    reason: alternative_reading
  - marker: b
    text: '''Thick darkness'' can also be rendered ''dark cloud'' or ''gloom.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאָמַרְתָּ
  chosen: Yet you say
  alternatives:
  - And you said
  - But you say
  lexicon: HALOT
  rationale: The conjunction plus perfect 2ms is used in direct accusation/report.
    English present 'you say' fits the rhetorical force in context, while 'Yet' brings
    out the adversative sense naturally in discourse.
- source_word: מַה
  chosen: What
  alternatives:
  - How much
  - Anything
  lexicon: HALOT
  rationale: 'Interrogative pronoun introducing the content of the quoted challenge:
    ''What does God know?''.'
- source_word: יָדַע
  chosen: does ... know
  alternatives:
  - knows
  - can know
  lexicon: HALOT
  rationale: Rendered as a simple present in English within the quoted speech. The
    verb denotes knowledge/cognition, not experiential acknowledgment here.
- source_word: אֵל
  chosen: God
  alternatives:
  - El
  - Mighty God
  lexicon: HALOT
  rationale: Common noun/title for God, best rendered idiomatically as 'God' in English
    rather than transliterated 'El'.
- source_word: הַבְעַד
  chosen: through
  alternatives:
  - behind
  - through the covering of
  - from behind
  lexicon: HALOT
  rationale: The preposition with article here expresses obstruction/separation in
    relation to the following noun. In the question about judging, 'through' communicates
    the sense of judging with thick darkness intervening.
- source_word: עֲרָפֶל
  chosen: thick darkness
  alternatives:
  - gloom
  - dark cloud
  lexicon: HALOT
  rationale: The noun denotes dense cloud/dark gloom. 'Thick darkness' preserves the
    weight and imagery and fits the context of obscured divine sight.
- source_word: יִשְׁפּוֹט
  chosen: can he judge
  alternatives:
  - does he judge
  - will he judge
  lexicon: HALOT
  rationale: 'Imperfect in rhetorical question. English ''can he judge'' best captures
    the implied skepticism of the speaker: whether God is able to judge through obscuring
    darkness.'
