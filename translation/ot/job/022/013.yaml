theological_decisions:
- issue: Whether to render the second clause as ability ('can he judge') or simple
    action/future ('does/will he judge')
  chosen_reading: Can he judge through thick darkness?
  alternative_readings:
  - Does he judge through thick darkness?
  - Will he judge through thick darkness?
  rationale: In context Eliphaz is reporting the impious sentiment that God is too
    obscured/exalted to perceive and govern human affairs. The rhetorical question
    implies doubt about divine capacity or effective oversight, which English expresses
    naturally with 'can he judge.' This preserves the theological force without overstating
    it.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather
    than resolve it)
