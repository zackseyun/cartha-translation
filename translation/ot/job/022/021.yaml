theological_decisions:
- issue: Referent of the pronoun 'him'
  chosen_reading: The pronoun refers to God, as in Eliphaz's exhortation to Job to
    be reconciled to God.
  alternative_readings:
  - A more generic referent is grammatically possible in isolation
  rationale: Within the discourse of Job 22, Eliphaz is clearly urging Job regarding
    his relationship to God. The translation keeps the pronoun rather than replacing
    it with 'God' because that is what the Hebrew text says, while the lexical rationale
    notes the contextual referent.
- issue: Scope of the promised 'good'
  chosen_reading: A broad promise of good/well-being rather than an explicitly material
    prosperity formula.
  alternative_readings:
  - Material prosperity
  - Covenantal blessing in a narrower sense
  rationale: The Hebrew טובה is semantically broad. Rendering it as 'good' preserves
    the text's scope and avoids importing a prosperity-theology reading stronger than
    the wording itself warrants.
  doctrine_reference: Preserve theological tension rather than resolve it
