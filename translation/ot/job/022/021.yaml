id: JOB.22.21
reference: Job 22:21
source:
  edition: WLC
  text: הַסְכֶּן נָ֣א עִמּ֑/וֹ וּ/שְׁלם בָּ֝/הֶ֗ם תְּֽבוֹאַתְ/ךָ֥ טוֹבָֽה־׃
translation:
  text: Come to terms with him, please, and be at peace; by this good will come to
    you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Acquaint yourself with him.' The Hebrew verb can suggest becoming familiar
      with, coming to terms with, or entering right relations with someone.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'in/by them'; likely meaning 'thereby' or 'by these things,' referring
      to the preceding call to come to terms with him and be at peace.
    reason: lexical_alternative
  - marker: c
    text: Or 'prosperity' or 'well-being will come to you.' The Hebrew says simply
      'good.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַסְכֶּן
  chosen: Come to terms with
  alternatives:
  - Acquaint yourself with
  - Submit to
  - Agree with
  lexicon: HALOT
  rationale: The imperative from סכן in this context calls for entering into a right
    or reconciled relationship, not merely gaining information. 'Come to terms with'
    captures the relational and exhortational force better than the traditional 'acquaint
    yourself,' while avoiding overinterpretation such as explicit 'submit.'
- source_word: נָא
  chosen: please
  alternatives:
  - now
  - I pray
  lexicon: HALOT
  rationale: The particle softens the imperative as an earnest appeal. 'Please' is
    natural modern English and preserves the hortatory tone.
- source_word: עִמּוֹ
  chosen: with him
  lexicon: HALOT
  rationale: Straightforward prepositional phrase referring to God in context; 'him'
    preserves the Hebrew pronominal reference without importing the divine name where
    it is not present in the verse.
- source_word: וּשְׁלָם
  chosen: and be at peace
  alternatives:
  - and be reconciled
  - and prosper
  lexicon: HALOT
  rationale: From שלם, the sense here is entering a state of peace/wholeness. 'Be
    at peace' is idiomatic and fits the parallel exhortation. 'Be reconciled' is possible
    but more interpretive; 'prosper' is too consequential rather than relational for
    this clause.
- source_word: בָּהֶם
  chosen: by this
  alternatives:
  - thereby
  - through them
  - in them
  lexicon: HALOT
  rationale: The plural form is difficult, but in context it most naturally points
    instrumentally to the preceding actions or conditions ('by these things/thereby').
    'By this' gives clear English sense while reflecting the instrumental force without
    awkward literalism.
- source_word: תְּבוֹאַתְךָ
  chosen: will come to you
  alternatives:
  - your income will come
  - your produce will come
  - there will come to you
  lexicon: HALOT
  rationale: From בוא 'to come,' with טובה as subject. The clause means that good
    will come upon or to the addressee. Rendering it verbally avoids forcing a nominal
    reading such as 'your produce,' which would confuse this form and context.
- source_word: טוֹבָה
  chosen: good
  alternatives:
  - prosperity
  - well-being
  lexicon: HALOT
  rationale: טובה broadly denotes good, benefit, or well-being. 'Good' preserves the
    breadth of the Hebrew and avoids narrowing the promise to material prosperity
    alone, though that may be included in context.
