id: JOB.22.26
reference: Job 22:26
source:
  edition: WLC
  text: כִּי אָ֭ז עַל שַׁדַּ֣י תִּתְעַנָּ֑ג וְ/תִשָּׂ֖א אֶל אֱל֣וֹהַּ פָּנֶֽי/ךָ־־־׃
translation:
  text: For then you will delight yourself in the Almighty, and lift up your face
    to God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'take delight in the Almighty.'
    reason: lexical_alternative
  - marker: b
    text: '''Lift up your face to God'' is an idiom that can suggest confident approach,
      restored favor, or bold prayer.'
    reason: cultural_note
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Surely
  - Indeed
  lexicon: HALOT
  rationale: Introduces the result or consequence of the preceding exhortation; 'for'
    fits the causal/resultative flow in English.
- source_word: אָז
  chosen: then
  alternatives:
  - at that time
  lexicon: HALOT
  rationale: Temporal adverb marking the consequence that follows if the prior conditions
    are met.
- source_word: עַל
  chosen: in
  alternatives:
  - upon
  - over
  - because of
  lexicon: HALOT
  rationale: With התענג, the preposition conveys the object in which one takes delight.
    English idiom prefers 'delight in' rather than a more literal 'delight upon'.
- source_word: שַׁדַּי
  chosen: the Almighty
  alternatives:
  - Shaddai
  lexicon: HALOT
  rationale: Standard translation of the divine title שדי in context; translating
    the title preserves meaning per project philosophy. 'Shaddai' is possible as a
    transliteration but less transparent in English.
- source_word: תִּתְעַנָּג
  chosen: you will delight yourself
  alternatives:
  - you will take delight
  - you will find delight
  lexicon: HALOT
  rationale: Hitpael of ענג is reflexive/intensive, expressing personal delight or
    enjoyment. 'Delight yourself' preserves the reflexive nuance and the elevated
    tone of the verse.
- source_word: וְתִשָּׂא
  chosen: and lift up
  alternatives:
  - and raise
  - and turn upward
  lexicon: HALOT
  rationale: From נשׂא, literally 'lift/carry.' In this idiom with 'face,' 'lift up'
    is the most natural and preserves the metaphor of confident approach.
- source_word: אֶל
  chosen: to
  alternatives:
  - toward
  lexicon: HALOT
  rationale: Marks direction toward God; 'to' is the most natural English equivalent
    here.
- source_word: אֱלוֹהַּ
  chosen: God
  alternatives:
  - God Most High
  - God himself
  lexicon: HALOT
  rationale: Generic singular divine term; 'God' is the straightforward rendering.
    No need to import a more specific title than the Hebrew provides.
- source_word: פָּנֶיךָ
  chosen: your face
  alternatives:
  - your countenance
  - your face in prayer
  lexicon: HALOT
  rationale: Literal 'your face' should be retained because the idiom 'lift up your
    face' is intelligible in English and preserves the imagery of confidence, acceptance,
    or bold appeal before God.
