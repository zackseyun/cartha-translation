theological_decisions:
- issue: Idiomatic sense of 'lift up your face to God'
  chosen_reading: Retain the concrete idiom of confident approach to God rather than
    paraphrasing it as prayer or hope.
  alternative_readings:
  - look to God
  - pray to God with confidence
  - hold your head high before God
  rationale: The Hebrew idiom can imply confidence, restored favor, or boldness before
    God. Preserving 'lift up your face' maintains the theological and poetic tension
    without narrowing it to a single interpretive outcome.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
