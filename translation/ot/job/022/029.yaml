theological_decisions:
- issue: Subject of יוֹשִׁעַ
  chosen_reading: The subject is God ('he saves'), left implicit rather than expanded
    to 'God saves.'
  alternative_readings:
  - An indefinite subject such as 'one saves'
  - 'Making the addressee the subject: ''you save'''
  rationale: The Hebrew verb is 3ms, and in context the implied subject is God, who
    delivers the humble. Leaving the pronoun as 'he' preserves the Hebrew's terseness
    without importing an explicit noun absent from the text.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
- issue: Sense of גֵּוָה in this difficult clause
  chosen_reading: 'Render as a declaration of uplift: ''Lift them up!'''
  alternative_readings:
  - '''There is lifting up'''
  - '''Exaltation'''
  - '''Pride'' in a negative sense'
  rationale: Although גֵּוָה can elsewhere denote exaltation or loftiness, here the
    immediate contrast with being brought low favors a positive reversal rather than
    negative pride. The English rendering makes the elliptical Hebrew intelligible
    while preserving the reversal motif.
  doctrine_reference: Optimal equivalence; original-language primacy over translation
    tradition.
