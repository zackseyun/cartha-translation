id: JOB.22.29
reference: Job 22:29
source:
  edition: WLC
  text: כִּֽי הִ֭שְׁפִּילוּ וַ/תֹּ֣אמֶר גֵּוָ֑ה וְ/שַׁ֖ח עֵינַ֣יִם יוֹשִֽׁעַ־׃
translation:
  text: For when they are brought low, you say, ‘Lift them up!’ and he saves the one
    with downcast eyes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'For when they are cast down, you say, “There is lifting up!”' The Hebrew
      clause is elliptical and may be rendered more literally this way.
    reason: alternative_reading
  - marker: b
    text: Literally, 'the downcast of eyes'; that is, the humble or dejected person.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For when
  alternatives:
  - For
  - When
  - Indeed
  lexicon: HALOT
  rationale: Introduces the ground or circumstance for the preceding promise. In this
    context it works naturally as a causal-temporal connector, 'For when,' rather
    than a bare 'for' or 'indeed.'
- source_word: הִשְׁפִּילוּ
  chosen: they are brought low
  alternatives:
  - they are humbled
  - they are cast down
  - they humble themselves
  lexicon: HALOT
  rationale: From שׁפל, conveying being made low or humbled. The 3cp form is best
    represented as a plural situation ('they are brought low' / 'they are cast down').
    I avoided the reflexive 'they humble themselves' because the form and context
    more naturally point to a state of abasement rather than voluntary self-humbling.
- source_word: וַתֹּאמֶר
  chosen: you say
  alternatives:
  - then you will say
  - and you say
  lexicon: HALOT
  rationale: Addressed to the singular addressee in Eliphaz's speech. English present
    'you say' fits the proverbial/future-result sense in context better than a rigid
    past narrative rendering.
- source_word: גֵּוָה
  chosen: Lift them up!
  alternatives:
  - Up!
  - Exaltation!
  - There is lifting up!
  lexicon: HALOT
  rationale: The noun is difficult and elliptical. In context it expresses the opposite
    of being brought low—uplift/exaltation. Rendering it as an exclamatory imperative-like
    statement in English captures the sense of declaring uplift for the humbled. The
    plural object 'them' is supplied from the preceding plural verb for coherent English.
- source_word: וְשַׁח עֵינַיִם
  chosen: the one with downcast eyes
  alternatives:
  - the lowly
  - him who has lowered eyes
  - the humble
  lexicon: HALOT
  rationale: Literally 'low/downcast of eyes,' an idiom for humility or dejection.
    'The one with downcast eyes' preserves the imagery while remaining readable. 'The
    humble' is interpretive and is preserved as an alternative.
- source_word: יוֹשִׁעַ
  chosen: he saves
  alternatives:
  - he delivers
  - he will save
  - he will deliver
  lexicon: HALOT
  rationale: From ישׁע, meaning save/deliver. 'Saves' keeps the lexical force and
    allows the subject to remain the implied God of the context. English present also
    suits the gnomic/promissory style.
