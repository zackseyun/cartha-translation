id: JOB.22.25
reference: Job 22:25
source:
  edition: WLC
  text: וְ/הָיָ֣ה שַׁדַּ֣י בְּצָרֶ֑י/ךָ וְ/כֶ֖סֶף תּוֹעָפ֣וֹת לָֽ/ךְ׃
translation:
  text: then the Almighty will be your gold, and choice silver for you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'then the Almighty will be your treasure, and silver in abundance for
      you.' The Hebrew terms for 'gold' and the qualifier on 'silver' are difficult
      and may emphasize wealth supplied by God rather than God himself as the treasure.
    reason: alternative_reading
lexical_decisions:
- source_word: וְהָיָה
  chosen: then ... will be
  alternatives:
  - and ... will be
  lexicon: HALOT
  rationale: 'The waw + qatal here is taken in context as consequential/future within
    Eliphaz''s exhortation: if Job returns to God, then this result follows. English
    ''then ... will be'' captures the conditional consequence more naturally than
    a simple coordinate ''and ... will be.'''
- source_word: שַׁדַּי
  chosen: the Almighty
  alternatives:
  - Shaddai
  lexicon: HALOT
  rationale: Standard translation of the divine title in Job. Translating rather than
    transliterating preserves meaning and matches common English usage for this title.
- source_word: בְּצָרֶיךָ
  chosen: your gold
  alternatives:
  - your ore
  - your treasure
  - your defense/fortress
  lexicon: HALOT
  rationale: The noun בצר can denote precious metal in inaccessible/ore form, and
    in this poetic parallel with 'silver' it most naturally refers to wealth, especially
    gold. 'Your gold' gives the sense cleanly in English. Alternatives such as 'ore'
    are more literal but less idiomatic; 'defense/fortress' is possible from a related
    sense but fits the parallelism less well here.
- source_word: וְכֶסֶף
  chosen: and ... silver
  alternatives:
  - and silver
  lexicon: HALOT
  rationale: Kept as the second coordinated object in the poetic parallel. English
    supplies the implied predicate from the first colon.
- source_word: תּוֹעָפוֹת
  chosen: choice
  alternatives:
  - abundant
  - finest
  - heights of
  lexicon: HALOT
  rationale: This rare term is difficult; in context with 'silver' it likely describes
    superior or abundant silver. 'Choice silver' is idiomatic English that preserves
    the sense of high-quality precious metal without overcommitting to a more speculative
    nuance.
- source_word: לָךְ
  chosen: for you
  alternatives:
  - to you
  - yours
  lexicon: HALOT
  rationale: Rendered explicitly to preserve the personal benefit/dative nuance. 'For
    you' reads naturally in English and fits the promise structure.
