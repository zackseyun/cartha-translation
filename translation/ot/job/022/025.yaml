theological_decisions:
- issue: Interpretation of the promise in Eliphaz's speech
  chosen_reading: The verse is rendered as saying that the Almighty himself will be
    Job's true wealth.
  alternative_readings:
  - The verse may mean the Almighty will provide material wealth, i.e., gold and silver,
    for Job.
  rationale: 'The Hebrew poetic structure allows either identification of God as the
    true treasure or a promise of wealth from God. Given the syntax and the direct
    parallel between ''the Almighty'' and precious metals, the main text preserves
    the stronger metaphor: God himself as treasure. The material-provision nuance
    is preserved as an interpretive alternative in a footnote rather than resolved
    dogmatically.'
  doctrine_reference: Preserve theological tension rather than resolve it.
