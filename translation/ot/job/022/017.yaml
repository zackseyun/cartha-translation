id: JOB.22.17
reference: Job 22:17
source:
  edition: WLC
  text: הָ/אֹמְרִ֣ים לָ֭/אֵל ס֣וּר מִמֶּ֑/נּוּ וּ/מַה יִּפְעַ֖ל שַׁדַּ֣י לָֽ/מוֹ־׃
translation:
  text: who said to God, ‘Depart from us,’ and, ‘What can the Almighty do to them?’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'What can the Almighty do for them?' The preposition may be rendered
      'to' or 'for' in English, depending on how the rhetorical force is understood.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָאֹמְרִים
  chosen: who said
  alternatives:
  - those who said
  - who were saying
  lexicon: HALOT
  rationale: The participle functions substantivally, referring back to the wicked
    described in context. English idiom is smoother with the relative clause 'who
    said' rather than a more wooden 'the ones saying.'
- source_word: לָאֵל
  chosen: to God
  alternatives:
  - to El
  lexicon: HALOT
  rationale: אֵל here is the common Semitic word/title for God, not a proper name
    requiring transliteration. 'To God' is the natural English rendering.
- source_word: סוּר
  chosen: Depart
  alternatives:
  - Turn aside
  - Go away
  lexicon: HALOT
  rationale: The imperative expresses dismissal or rejection directed toward God.
    'Depart' preserves the force and gravity better than the more casual 'go away.'
- source_word: מִמֶּנּוּ
  chosen: from us
  alternatives:
  - from him
  lexicon: HALOT
  rationale: 'Despite the consonantal form that can be read ambiguously in isolation,
    the context and standard vocalization support first common plural: the wicked
    say to God, ''Depart from us.'' This matches the parallel in Job 21:14.'
- source_word: וּמַה
  chosen: and, ‘What can...?’
  alternatives:
  - and what...?
  lexicon: HALOT
  rationale: Introduces the second part of their speech as a rhetorical question.
    Rendering with quotation punctuation clarifies the continued direct discourse.
- source_word: יִפְעַל
  chosen: can do
  alternatives:
  - will do
  - does
  lexicon: HALOT
  rationale: 'The imperfect in this rhetorical question conveys practical ability
    or effect: ''What can ... do?'' This best captures the scoffing sense.'
- source_word: שַׁדַּי
  chosen: the Almighty
  alternatives:
  - Shaddai
  lexicon: HALOT
  rationale: Per translation philosophy, titles are translated. 'The Almighty' is
    the standard and contextually appropriate rendering of the divine title שדי.
- source_word: לָמוֹ
  chosen: to them
  alternatives:
  - for them
  - to us
  lexicon: HALOT
  rationale: The 3mp pronominal form most naturally yields 'to them'/'for them.' In
    context, the speakers refer to themselves in the third person as the class of
    wicked, or the narrator summarizes their sentiment. Retaining 'to them' follows
    the Hebrew form rather than harmonizing it to the preceding first person.
