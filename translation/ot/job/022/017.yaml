theological_decisions:
- issue: Rendering of the divine title שַׁדַּי
  chosen_reading: the Almighty
  alternative_readings:
  - Shaddai
  rationale: The translation philosophy directs that titles be translated rather than
    transliterated. 'The Almighty' preserves the meaning of the title in readable
    English.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §2'
