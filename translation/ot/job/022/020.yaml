id: JOB.22.20
reference: Job 22:20
source:
  edition: WLC
  text: אִם לֹ֣א נִכְחַ֣ד קִימָ֑/נוּ וְ֝/יִתְרָ֗/ם אָ֣כְלָה אֵֽשׁ־׃
translation:
  text: Surely our adversaries have been cut off, and fire has consumed what was left
    of them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew קִימָנוּ is difficult. It may be understood as 'our adversaries/opponents,'
      as in the main text, or possibly 'our substance/possessions' in some interpretations.
    reason: alternative_reading
  - marker: b
    text: Or 'their remnant.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם לֹא
  chosen: Surely
  alternatives:
  - If not
  - Indeed not
  lexicon: HALOT
  rationale: In this idiom, אִם לֹא functions as an asseverative particle rather than
    introducing a real conditional. In context Eliphaz is making a forceful assertion,
    so 'Surely' best captures the emphatic sense in natural English.
- source_word: נִכְחַד
  chosen: have been cut off
  alternatives:
  - have been destroyed
  - have perished
  lexicon: HALOT
  rationale: The Niphal of כחד conveys being effaced, destroyed, or cut off. 'Have
    been cut off' preserves the passive/resultative force and fits the context of
    the wicked being removed.
- source_word: קִימָנוּ
  chosen: our adversaries
  alternatives:
  - our substance
  - our risen ones
  - our opponents
  lexicon: HALOT
  rationale: The consonantal form is difficult and has been understood in more than
    one way. In context, parallel with the following clause about their remnant being
    consumed by fire, the sense 'our adversaries/opponents' fits the argument best
    and reflects a common contextual construal of the form as referring to those who
    rose against us.
- source_word: וְיִתְרָם
  chosen: what was left of them
  alternatives:
  - their remnant
  - their abundance
  lexicon: HALOT
  rationale: יתר commonly denotes what remains or is left over. The pronominal suffix
    points to the destroyed group. 'What was left of them' is idiomatic English while
    preserving the remnant idea.
- source_word: אָכְלָה אֵשׁ
  chosen: fire has consumed
  alternatives:
  - fire devoured
  - a fire consumed
  lexicon: HALOT
  rationale: The verb אכל with אֵשׁ as subject is a standard idiom for destructive
    consumption. 'Fire has consumed' is clear, natural, and retains the vivid imagery.
