theological_decisions:
- issue: Speaker perspective and implied subject
  chosen_reading: 'The verse is translated as Eliphaz''s report of the wicked person''s
    claim about God: clouds hide him, he does not see, and he walks on the vault of
    heaven.'
  alternative_readings:
  - A more neutral statement about God's transcendence rather than a quoted accusation
  rationale: 'Within the immediate context (Job 22:13-14), Eliphaz is voicing what
    he alleges the wicked say: ''What does God know?...'' This verse continues that
    accusation. The English keeps the third-person pronoun ''he'' without inserting
    ''God,'' preserving the discourse flow while allowing the antecedent to be inferred
    from context.'
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
