id: JOB.22.14
reference: Job 22:14
source:
  edition: WLC
  text: עָבִ֣ים סֵֽתֶר ל֭/וֹ וְ/לֹ֣א יִרְאֶ֑ה וְ/ח֥וּג שָׁ֝מַ֗יִם יִתְהַלָּֽךְ־׃
translation:
  text: Clouds are a covering for him, so that he does not see; and he walks on the
    vault of heaven.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Thick clouds are a covering for him, and he does not see; he walks on
      the circle of the heavens.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עָבִים
  chosen: Clouds
  alternatives:
  - Thick clouds
  lexicon: HALOT
  rationale: The plural noun refers to clouds, often dense rain clouds. 'Clouds' is
    the most natural English rendering here; 'thick clouds' is possible but the following
    phrase already conveys obscuring cover.
- source_word: סֵתֶר
  chosen: a covering
  alternatives:
  - a hiding place
  - concealment
  - a veil
  lexicon: HALOT
  rationale: The noun denotes covering or concealment. In this context, where clouds
    obstruct sight, 'a covering' best captures the concrete image and the function
    of hiding.
- source_word: לוֹ
  chosen: for him
  alternatives:
  - to him
  - around him
  lexicon: HALOT
  rationale: 'The preposition with pronominal suffix is rendered ''for him'' in an
    idiomatic English construction: ''Clouds are a covering for him.'' This expresses
    that the clouds serve as a screen in relation to God, as Eliphaz reports the wicked
    view.'
- source_word: וְלֹא יִרְאֶה
  chosen: so that he does not see
  alternatives:
  - and he does not see
  - thus he cannot see
  lexicon: HALOT
  rationale: The clause can be read coordinately ('and he does not see') or with result
    ('so that he does not see'). English reads more naturally with an explicit result
    nuance because the preceding 'covering' explains the alleged consequence.
- source_word: חוּג
  chosen: vault
  alternatives:
  - circle
  - dome
  - horizon
  lexicon: HALOT
  rationale: The noun denotes a circle or vault-like expanse. In collocation with
    'heaven,' 'vault' best conveys the ancient cosmological image of the sky's arch
    without overcommitting to a technical cosmology.
- source_word: שָׁמַיִם
  chosen: heaven
  alternatives:
  - the heavens
  - the sky
  lexicon: HALOT
  rationale: The singular English 'heaven' works idiomatically in the phrase 'vault
    of heaven.' 'The heavens' is possible, but the singular better suits modern readable
    English while preserving the elevated register.
- source_word: יִתְהַלָּךְ
  chosen: he walks
  alternatives:
  - he moves about
  - he paces
  lexicon: HALOT
  rationale: The Hitpael of הלך conveys walking about or moving to and fro. 'He walks'
    is concise and preserves the imagery of God traversing the heights, as represented
    in the speech.
