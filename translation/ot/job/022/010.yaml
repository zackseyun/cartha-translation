id: JOB.22.10
reference: Job 22:10
source:
  edition: WLC
  text: עַל כֵּ֭ן סְבִיבוֹתֶ֣י/ךָ פַחִ֑ים וִֽ֝/יבַהֶלְ/ךָ פַּ֣חַד פִּתְאֹֽם־׃
translation:
  text: Therefore snares are all around you, and sudden terror overwhelms you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'traps are around you, and fear suddenly terrifies you.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עַל כֵּן
  chosen: Therefore
  alternatives:
  - For this reason
  - So
  lexicon: HALOT
  rationale: The phrase marks a conclusion or consequence from the preceding accusation.
    'Therefore' preserves the inferential force in natural English.
- source_word: סְבִיבוֹתֶיךָ
  chosen: are all around you
  alternatives:
  - surround you
  - around you
  lexicon: HALOT
  rationale: From סָבִיב/סְבִיבוֹת, indicating what is around or surrounding someone.
    Rendering with the supplied copula in English gives a natural sense with the following
    noun 'snares.'
- source_word: פַחִים
  chosen: snares
  alternatives:
  - traps
  - nets
  lexicon: HALOT
  rationale: פח commonly denotes a trap or snare. 'Snares' fits the poetic and metaphorical
    context of danger closing in; 'traps' is possible but slightly less literary.
- source_word: וִיבַהֶלְךָ
  chosen: overwhelms you
  alternatives:
  - terrifies you
  - alarms you
  - throws you into panic
  lexicon: HALOT
  rationale: From בהל, to disturb, terrify, or throw into panic. 'Overwhelms you'
    captures the effect in context while allowing the following noun 'terror' to carry
    the emotional content.
- source_word: פַּחַד
  chosen: terror
  alternatives:
  - fear
  - dread
  lexicon: HALOT
  rationale: The noun denotes fear or terror. 'Terror' better matches the intensity
    of the warning and works idiomatically with 'sudden.'
- source_word: פִּתְאֹם
  chosen: sudden
  alternatives:
  - suddenly
  - all at once
  lexicon: HALOT
  rationale: The adverb means 'suddenly.' In English, attributive placement as 'sudden
    terror' is smoother than 'terror suddenly overwhelms you' and preserves the abruptness
    of the Hebrew expression.
