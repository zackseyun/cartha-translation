id: JOB.22.3
reference: Job 22:3
source:
  edition: WLC
  text: הַ/חֵ֣פֶץ לְ֭/שַׁדַּי כִּ֣י תִצְדָּ֑ק וְ/אִם בֶּ֝֗צַע כִּֽי תַתֵּ֥ם דְּרָכֶֽי/ךָ־־׃
translation:
  text: Is it any pleasure to the Almighty that you are righteous, or any gain that
    you make your ways blameless?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'delight' for 'pleasure.'
    reason: lexical_alternative
  - marker: b
    text: Or 'profit' for 'gain.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַחֵפֶץ
  chosen: Is it any pleasure
  alternatives:
  - Is it delight
  - Is it desire
  lexicon: HALOT
  rationale: The noun חֵפֶץ denotes pleasure, delight, or desire. In this interrogative
    construction, 'Is it any pleasure' gives natural English while preserving the
    sense of benefit or delight to God.
- source_word: לְשַׁדַּי
  chosen: to the Almighty
  alternatives:
  - for the Almighty
  lexicon: HALOT
  rationale: שַׁדַּי is conventionally rendered 'the Almighty' in Job and fits the
    divine title here. The preposition לְ can be represented idiomatically as 'to'
    in English with 'pleasure,' though 'for' is also possible.
- source_word: כִּי תִצְדָּק
  chosen: that you are righteous
  alternatives:
  - that you are in the right
  - that you justify yourself
  lexicon: HALOT
  rationale: The verb צדק in Qal here most naturally means 'be righteous' or 'be in
    the right,' not reflexive self-justification. 'Are righteous' is the clearest
    and most standard rendering in this context.
- source_word: וְאִם
  chosen: or
  alternatives:
  - and if
  lexicon: HALOT
  rationale: In this parallel rhetorical question, וְאִם functions idiomatically to
    introduce the second alternative, best rendered 'or' rather than a wooden 'and
    if.'
- source_word: בֶּצַע
  chosen: gain
  alternatives:
  - profit
  - advantage
  lexicon: HALOT
  rationale: בֶּצַע denotes gain or profit. 'Gain' is concise, natural, and preserves
    the economic metaphor of benefit to God.
- source_word: כִּי תַתֵּם
  chosen: that you make
  alternatives:
  - that you complete
  - that you prove
  lexicon: HALOT
  rationale: From תמם in Hiphil, the sense is to make complete or blameless. With
    'your ways' as object, 'make' is the most natural English support verb.
- source_word: דְּרָכֶיךָ
  chosen: your ways
  alternatives:
  - your conduct
  - your paths
  lexicon: HALOT
  rationale: דֶּרֶךְ in plural often refers metaphorically to one's manner of life
    or conduct. 'Your ways' preserves the Hebrew metaphor and remains readable.
- source_word: תַתֵּם דְּרָכֶיךָ
  chosen: you make your ways blameless
  alternatives:
  - you make your conduct complete
  - your ways are blameless
  lexicon: HALOT
  rationale: The phrase expresses moral completeness or integrity. 'Blameless' captures
    the ethical nuance of תמם better than merely 'complete.' Retaining 'make your
    ways' reflects the causative Hiphil while remaining idiomatic enough in English.
