id: JOB.22.28
reference: Job 22:28
source:
  edition: WLC
  text: וְֽ/תִגְזַר א֭וֹמֶר וְ/יָ֣קָם לָ֑/ךְ וְ/עַל דְּ֝רָכֶ֗י/ךָ נָ֣גַֽהּ אֽוֹר־־׃
translation:
  text: You will decide a matter, and it will be established for you, and light will
    shine on your ways.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'You will decree a word, and it will stand for you.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תִגְזַר
  chosen: you will decide
  alternatives:
  - you will decree
  - you will determine
  lexicon: HALOT
  rationale: The verb גזר literally involves cutting/dividing and in extended usage
    can mean decide, determine, or decree. In this context with אֹמֶר and the following
    result clause, the sense is making a firm decision or pronouncement. 'Decide'
    is natural modern English; 'decree' is possible but can sound overly formal or
    imply royal authority more strongly than the context requires.
- source_word: אֹמֶר
  chosen: a matter
  alternatives:
  - a word
  - a saying
  - something spoken
  lexicon: HALOT
  rationale: Although אֹמֶר often means speech/word/saying, in this idiom after גזר
    it likely refers to the thing spoken or resolved. 'A matter' communicates the
    practical sense in English. Because the Hebrew can also be heard more literally
    as 'a word,' that alternative is preserved in a footnote.
- source_word: יָקָם
  chosen: it will be established
  alternatives:
  - it will stand
  - it will come to pass
  lexicon: HALOT
  rationale: קום in the qal can mean arise/stand, and in context of a spoken decision
    it conveys being confirmed or made effective. 'Be established' captures the resultative
    sense well in English without overinterpreting as guaranteed fulfillment beyond
    the Hebrew idiom.
- source_word: לָךְ
  chosen: for you
  alternatives:
  - for your benefit
  - for you
  lexicon: HALOT
  rationale: The preposition ל marks relation or advantage. 'For you' is the most
    straightforward rendering and fits the promise structure of Eliphaz's speech.
- source_word: דְּרָכֶיךָ
  chosen: your ways
  alternatives:
  - your paths
  - your course
  lexicon: HALOT
  rationale: דרך commonly means way/path and often metaphorically one's conduct or
    course of life. 'Your ways' preserves the metaphor and allows the following image
    of light to remain vivid.
- source_word: נָגַהּ אֹור
  chosen: light will shine
  alternatives:
  - light will gleam
  - light will brighten
  lexicon: HALOT
  rationale: The verb נגה means shine/gleam, and with אוֹר as subject the phrase is
    a straightforward image of illumination. 'Light will shine' is clear, idiomatic,
    and preserves the poetic imagery.
