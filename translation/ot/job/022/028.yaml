theological_decisions:
- issue: Nature of the promise in Eliphaz's speech
  chosen_reading: Render as a straightforward statement of expected outcome without
    intensifying it into an unconditional theological guarantee.
  alternative_readings:
  - Render more strongly as an absolute promise of prosperity
  - Render more weakly as mere possibility
  rationale: Job 22 records Eliphaz's counsel and theology, not necessarily the book's
    final endorsed doctrine. The translation should reflect the plain sense of his
    confident assertion while avoiding added doctrinal force not explicit in the Hebrew.
  doctrine_reference: Preserve theological tension rather than resolve it.
