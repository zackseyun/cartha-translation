theological_decisions:
- issue: Sense of תּוֹרָה in a wisdom speech
  chosen_reading: instruction
  alternative_readings:
  - law
  - teaching
  rationale: Rendering torah as 'instruction' avoids suggesting specifically Mosaic
    or covenantal law where the context is Eliphaz's appeal to receive divine teaching.
    This preserves the text's wisdom setting without diminishing the authority of
    the speech.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; consistency of key terms, or documented exception.'
