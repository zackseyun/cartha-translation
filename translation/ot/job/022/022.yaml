id: JOB.22.22
reference: Job 22:22
source:
  edition: WLC
  text: קַח נָ֣א מִ/פִּ֣י/ו תּוֹרָ֑ה וְ/שִׂ֥ים אֲ֝מָרָ֗י/ו בִּ/לְבָבֶֽ/ךָ־׃
translation:
  text: Please, receive instruction from his mouth, and lay up his words in your heart.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'law' or 'teaching' for 'instruction' (Hebrew torah).
    reason: lexical_alternative
lexical_decisions:
- source_word: קַח
  chosen: receive
  alternatives:
  - take
  - accept
  lexicon: HALOT
  rationale: The imperative of לקח literally means 'take,' but in the idiom 'take
    instruction from his mouth' English 'receive' better conveys accepting teaching
    while remaining close to the source.
- source_word: נָא
  chosen: Please
  alternatives:
  - now
  - I pray
  lexicon: HALOT
  rationale: The particle adds entreaty or urgency rather than temporal sense here.
    'Please' captures the exhortational tone in natural modern English.
- source_word: מִפִּיו
  chosen: from his mouth
  alternatives:
  - from him
  lexicon: HALOT
  rationale: The Hebrew explicitly says 'from his mouth,' a vivid idiom for direct
    speech or instruction. It should be preserved rather than flattened to 'from him.'
- source_word: תּוֹרָה
  chosen: instruction
  alternatives:
  - law
  - teaching
  lexicon: HALOT
  rationale: In Job, torah is not specifically Mosaic law but authoritative teaching
    or instruction. 'Instruction' best fits the wisdom context and avoids importing
    covenant-law specificity not demanded by the text.
- source_word: וְשִׂים
  chosen: lay up
  alternatives:
  - put
  - set
  - store
  lexicon: HALOT
  rationale: The imperative 'put/set' with 'in your heart' idiomatically means to
    store up or treasure internally. 'Lay up' preserves the metaphor and reads naturally
    in English.
- source_word: אֲמָרָיו
  chosen: his words
  alternatives:
  - his sayings
  - his utterances
  lexicon: HALOT
  rationale: A straightforward rendering of the plural noun from אמר. 'Words' is natural
    and sufficiently weighty in context.
- source_word: בִּלְבָבֶךָ
  chosen: in your heart
  alternatives:
  - within your heart
  - in your inner being
  lexicon: HALOT
  rationale: The Hebrew idiom of the heart as the inner seat of thought and will should
    be retained. 'In your heart' is both literal and idiomatic in English.
