id: JOB.22.30
reference: Job 22:30
source:
  edition: WLC
  text: יְֽמַלֵּ֥ט אִֽי נָקִ֑י וְ֝/נִמְלַ֗ט בְּ/בֹ֣ר כַּפֶּֽי/ךָ־׃פ
translation:
  text: He delivers even one who is not innocent, and he will be delivered through
    the cleanness of your hands.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'He delivers the innocent one'; the Hebrew of the first line is difficult,
      and some take the phrase differently.
    reason: alternative_reading
  - marker: b
    text: Literally, 'through the cleanness of your hands,' an idiom for innocence
      or moral purity.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְמַלֵּט
  chosen: delivers
  alternatives:
  - rescues
  - causes to escape
  lexicon: HALOT
  rationale: The Piel of מלט commonly conveys causing someone to escape or delivering/rescuing.
    'Delivers' is concise, natural English and fits the parallel with the following
    Niphal.
- source_word: אִי
  chosen: even one who is not
  alternatives:
  - island/coastland
  - not
  lexicon: HALOT
  rationale: In this difficult verse, אִי is best taken idiomatically in the traditional
    sense as a negative particle-like usage yielding 'not,' as reflected by the context
    and ancient/major translation tradition. The sense is that deliverance extends
    even to a person lacking innocence. The nominal sense 'island/coastland' does
    not fit the syntax here.
- source_word: נָקִי
  chosen: innocent
  alternatives:
  - clean
  - guiltless
  lexicon: HALOT
  rationale: נָקִי often denotes innocence or freedom from guilt. 'Innocent' best
    captures the moral/judicial nuance in context.
- source_word: וְנִמְלַט
  chosen: and he will be delivered
  alternatives:
  - and he will escape
  - and he will be rescued
  lexicon: HALOT
  rationale: The Niphal of מלט is naturally passive/reflexive, 'be delivered' or 'escape.'
    'Will be delivered' preserves the parallelism with the first colon and reads smoothly
    in English.
- source_word: בְּבֹר
  chosen: through the cleanness
  alternatives:
  - by the purity
  - through the purity
  lexicon: HALOT
  rationale: The consonantal text points to בֹּר, commonly understood here in the
    sense of purity/cleanness, especially in the idiom with hands. Rendering the preposition
    instrumentally as 'through' communicates means without over-literal awkwardness.
- source_word: כַּפֶּיךָ
  chosen: of your hands
  alternatives:
  - of your palms
  - of your hand
  lexicon: HALOT
  rationale: The dual/plural form refers idiomatically to 'hands.' In Hebrew, clean
    hands symbolize innocence or moral integrity; the phrase is preserved in understandable
    English.
