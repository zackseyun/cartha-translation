theological_decisions:
- issue: Interpretive sense of the verse's first colon
  chosen_reading: Eliphaz claims that God can deliver even a person who is not innocent.
  alternative_readings:
  - He delivers the innocent one
  - He delivers an island/land that is innocent
  rationale: The syntax is notoriously difficult, but the reading 'even one who is
    not innocent' best explains the traditional understanding of אִי here and coheres
    with the second colon's statement that such a person is delivered through the
    purity of Job's hands. This preserves the text's tension without importing a stronger
    doctrine of intercession than the verse itself states.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather
    than resolve it)
