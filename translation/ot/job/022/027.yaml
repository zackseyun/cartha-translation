theological_decisions:
- issue: Whether to render the final clause in a more cultic-literal way ('pay your
    vows') or idiomatically ('fulfill your vows')
  chosen_reading: you will fulfill your vows
  alternative_readings:
  - you will pay your vows
  rationale: The Hebrew idiom concerns carrying out what was vowed to God. 'Fulfill'
    preserves the sense for modern readers without diminishing the religious obligation.
    This is a lexical-idiomatic decision rather than a doctrinally disputed one.
  doctrine_reference: 'Translation philosophy: optimal equivalence; readable modern
    English, not archaic or academic.'
