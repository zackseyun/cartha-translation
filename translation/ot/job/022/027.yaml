id: JOB.22.27
reference: Job 22:27
source:
  edition: WLC
  text: תַּעְתִּ֣יר אֵ֭לָי/ו וְ/יִשְׁמָעֶ֑/ךָּ וּ/נְדָרֶ֥י/ךָ תְשַׁלֵּֽם׃
translation:
  text: You will pray to him, and he will hear you, and you will fulfill your vows.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'you will pay your vows.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תַּעְתִּיר
  chosen: you will pray
  alternatives:
  - you will entreat
  - you will make supplication
  lexicon: HALOT
  rationale: The Hiphil of עתר can mean to entreat or pray earnestly. In this context
    with אֵלָיו ('to him') and parallel to God's hearing, 'pray' is the most natural
    modern English rendering while preserving the petitionary sense.
- source_word: אֵלָיו
  chosen: to him
  alternatives:
  - to God
  - to him
  lexicon: HALOT
  rationale: The preposition אֶל with 3ms suffix is literally 'to him.' Since the
    antecedent is God from the immediate context, 'to him' preserves the Hebrew wording
    without unnecessarily repeating 'God.'
- source_word: וְיִשְׁמָעֶךָּ
  chosen: and he will hear you
  alternatives:
  - and he will listen to you
  - and he will answer you
  lexicon: HALOT
  rationale: שׁמע commonly means 'hear' or 'listen.' 'Hear you' is the most direct
    rendering and in prayer contexts naturally implies favorable attention without
    overtranslating to 'answer.'
- source_word: וּנְדָרֶיךָ
  chosen: and your vows
  alternatives:
  - and your vow-offerings
  - and the vows you made
  lexicon: HALOT
  rationale: נֶדֶר denotes a vow, especially one made to God. The plural construct
    with suffix is straightforwardly 'your vows.' 'Vow-offerings' would import a more
    specific cultic nuance not explicit in the noun itself.
- source_word: תְשַׁלֵּם
  chosen: you will fulfill
  alternatives:
  - you will pay
  - you will perform
  lexicon: HALOT
  rationale: The Piel of שלם with vows idiomatically means to pay or fulfill vows.
    'Fulfill' communicates the idiomatic sense clearly in modern English, whereas
    'pay' is more literal but can sound overly monetary in English.
