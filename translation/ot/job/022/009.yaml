id: JOB.22.9
reference: Job 22:9
source:
  edition: WLC
  text: אַ֭לְמָנוֹת שִׁלַּ֣חְתָּ רֵיקָ֑ם וּ/זְרֹע֖וֹת יְתֹמִ֣ים יְדֻכָּֽא׃
translation:
  text: You sent widows away empty, and the arms of orphans were crushed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'empty-handed.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the arms of orphans'; 'arms' may also imply their strength or power.
    reason: lexical_alternative
  - marker: c
    text: Or 'the fatherless.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַלְמָנוֹת
  chosen: widows
  lexicon: HALOT
  rationale: Standard plural noun meaning women bereaved of husbands. 'Widows' preserves
    the social-legal vulnerability emphasized in wisdom literature.
- source_word: שִׁלַּחְתָּ
  chosen: sent away
  alternatives:
  - dismissed
  - sent off
  lexicon: HALOT
  rationale: The Piel of שלח commonly means to send away or dismiss. 'Sent away' fits
    the accusatory context and idiomatic English.
- source_word: רֵיקָם
  chosen: empty
  alternatives:
  - empty-handed
  - with nothing
  lexicon: HALOT
  rationale: Adverb meaning emptily/empty-handed. 'Empty' after 'sent away' is concise
    and natural; the sense 'empty-handed' is preserved semantically.
- source_word: זְרֹעוֹת
  chosen: arms
  alternatives:
  - strength
  - power
  lexicon: HALOT
  rationale: Literal 'arms' is the primary sense, but in Hebrew it can metaphorically
    denote strength or power. Here the collocation with being crushed allows either
    literal or figurative force; 'arms' preserves the concrete Hebrew image while
    allowing the metaphorical implication.
- source_word: יְתֹמִים
  chosen: orphans
  alternatives:
  - fatherless children
  - the fatherless
  lexicon: HALOT
  rationale: Refers to children deprived of a father and thus socially vulnerable.
    'Orphans' is clear modern English, though 'fatherless' is a possible more literal
    social category.
- source_word: יְדֻכָּא
  chosen: were crushed
  alternatives:
  - was crushed
  - were broken
  lexicon: HALOT
  rationale: 'Passive sense from דכא, ''to crush, break.'' Although the verb form
    is morphologically singular, the plural subject ''arms'' can be treated collectively
    or reflect poetic agreement; English idiom prefers plural agreement: ''were crushed.'''
