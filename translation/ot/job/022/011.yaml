id: JOB.22.11
reference: Job 22:11
source:
  edition: WLC
  text: אוֹ חֹ֥שֶׁךְ לֹֽא תִרְאֶ֑ה וְֽ/שִׁפְעַת מַ֥יִם תְּכַסֶּֽ/ךָּ־־־׃
translation:
  text: or darkness, so that you cannot see, and an abundance of waters covers you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a flood of waters covers you.' The Hebrew expression can suggest overflowing
      waters, but the main text keeps the broader sense 'an abundance of waters.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אוֹ
  chosen: or
  alternatives:
  - or else
  lexicon: HALOT
  rationale: 'אוֹ most naturally introduces the next calamity in Eliphaz''s description:
    ''or darkness...'' English ''or'' preserves the terse connective force without
    overexpansion.'
- source_word: חֹשֶׁךְ
  chosen: darkness
  alternatives:
  - gloom
  - obscurity
  lexicon: HALOT
  rationale: The noun denotes darkness in a literal or figurative sense. 'Darkness'
    is the most direct and idiomatic rendering and fits the imagery of inability to
    see.
- source_word: לֹא תִרְאֶה
  chosen: so that you cannot see
  alternatives:
  - you do not see
  - you cannot see it
  lexicon: HALOT
  rationale: The Hebrew is literally 'you do not see.' In context, after the verbless
    'or darkness,' English requires a slight smoothing. 'So that you cannot see' captures
    the resultant force of the darkness more naturally than a bare 'you do not see.'
- source_word: וְשִׁפְעַת
  chosen: and an abundance of
  alternatives:
  - and a flood of
  - and a torrent of
  - and plenty of
  lexicon: HALOT
  rationale: שִׁפְעָה denotes abundance, overflow, or plenty. Because it modifies
    'waters,' 'an abundance of waters' preserves the lexical sense without prematurely
    narrowing it to a specific hydrological image such as 'flood,' though that is
    contextually possible.
- source_word: מַיִם
  chosen: waters
  alternatives:
  - water
  lexicon: HALOT
  rationale: The plural form is standard in Hebrew. 'Waters' preserves the imagery
    and matches the collective force better than singular 'water' in this poetic context.
- source_word: תְּכַסֶּךָּ
  chosen: covers you
  alternatives:
  - overwhelms you
  - conceals you
  lexicon: HALOT
  rationale: The Piel of כסה means 'cover.' 'Covers you' is the most transparent rendering.
    'Overwhelms you' is an interpretive extension suggested by context, but the main
    text should retain the more literal image.
