id: JOB.22.4
reference: Job 22:4
source:
  edition: WLC
  text: הֲֽ֭/מִ/יִּרְאָ֣תְ/ךָ יֹכִיחֶ֑/ךָ יָב֥וֹא עִ֝מְּ/ךָ֗ בַּ/מִּשְׁפָּֽט׃
translation:
  text: Is it because of your fear of him that he reproves you and enters into judgment
    with you?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'because you fear him'; Hebrew literally, 'from/because of your fear.'
    reason: lexical_alternative
  - marker: b
    text: Or 'he rebukes you' or 'he corrects you.'
    reason: lexical_alternative
  - marker: c
    text: Literally, 'comes with you into judgment.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲמִיִּרְאָתְךָ
  chosen: because of your fear of him
  alternatives:
  - for your reverence
  - because you fear him
  - because of your piety
  lexicon: HALOT
  rationale: 'The phrase is interrogative and causal: ''is it from/because of your
    fear...?'' The noun יִרְאָה commonly means ''fear'' or ''reverence.'' Because
    the 2ms suffix alone in English (''your fear'') can sound incomplete, ''of him''
    is supplied as the natural object in context, referring to God. This reflects
    the sense rather than leaving an awkwardly elliptical English phrase.'
- source_word: יֹכִיחֶךָ
  chosen: he reproves you
  alternatives:
  - he rebukes you
  - he corrects you
  - he argues with you
  lexicon: HALOT
  rationale: Hiphil of יכח can mean reprove, rebuke, or enter a case against. Here,
    paired with the following judicial clause, 'reproves' preserves both moral and
    forensic force without over-specifying.
- source_word: יָבֹא עִמְּךָ בַּמִּשְׁפָּט
  chosen: enters into judgment with you
  alternatives:
  - comes with you into judgment
  - enters into court with you
  - brings you to judgment
  lexicon: HALOT
  rationale: The idiom literally reads 'comes with you into the judgment.' 'Enters
    into judgment with you' is idiomatic English that preserves the legal setting
    and the adversarial nuance of עִם plus משפט.
- source_word: מִּשְׁפָּט
  chosen: judgment
  alternatives:
  - justice
  - court
  - legal case
  lexicon: HALOT
  rationale: In this context the term denotes a judicial proceeding or judgment. 'Judgment'
    is the broadest natural English rendering and fits the forensic parallelism of
    the verse.
