theological_decisions:
- issue: Referent implied by the suffix in 'your fear'
  chosen_reading: The fear is directed toward God, rendered explicitly as 'your fear
    of him.'
  alternative_readings:
  - 'Leave the object implicit: ''because of your fear'''
  rationale: The context is Eliphaz speaking about God's dealings with Job. English
    normally requires the implied object to be made explicit for clarity. This does
    not add a new theological claim but clarifies the Hebrew ellipsis.
  doctrine_reference: Translation philosophy §1, §6
- issue: Force of Eliphaz's question
  chosen_reading: A rhetorical question expecting 'no'
  alternative_readings:
  - A more neutral question without rhetorical force
  rationale: 'The Hebrew interrogative and context indicate irony: Eliphaz denies
    that God is judging Job because of Job''s piety. The English wording preserves
    the rhetorical question without paraphrastic expansion.'
  doctrine_reference: Translation philosophy §3
