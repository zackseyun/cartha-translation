theological_decisions:
- issue: Referent of the pronouns in context
  chosen_reading: The righteous and innocent are reacting to the downfall of the wicked
    described in the surrounding verses.
  alternative_readings:
  - A more general statement about the righteous rejoicing when they witness divine
    judgment
  rationale: The immediate context in Job 22 speaks of the destruction of the wicked,
    so the pronouns are best understood against that backdrop. This is contextual
    rather than doctrinal, and the translation keeps the pronoun 'them' without importing
    extra explanation into the main text.
