id: JOB.22.19
reference: Job 22:19
source:
  edition: WLC
  text: יִרְא֣וּ צַדִּיקִ֣ים וְ/יִשְׂמָ֑חוּ וְ֝/נָקִ֗י יִלְעַג לָֽ/מוֹ־׃
translation:
  text: The righteous see it and rejoice, and the innocent mock them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'laugh at them' or 'scoff at them.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יִרְאוּ
  chosen: see
  alternatives:
  - look on
  - observe
  lexicon: HALOT
  rationale: Qal imperfect 3mp of ראה, here with the sense of perceiving or witnessing
    what has happened. 'See' is the most natural and direct English rendering.
- source_word: צַדִּיקִים
  chosen: the righteous
  alternatives:
  - righteous people
  - the just
  lexicon: HALOT
  rationale: Plural adjective used substantivally. 'The righteous' is concise, idiomatic,
    and preserves the moral category emphasized in the Hebrew.
- source_word: וְיִשְׂמָחוּ
  chosen: and rejoice
  alternatives:
  - and are glad
  - and celebrate
  lexicon: HALOT
  rationale: Qal imperfect 3mp of שׂמח. 'Rejoice' best captures the positive response
    without overtranslating the intensity.
- source_word: וְנָקִי
  chosen: and the innocent
  alternatives:
  - and the blameless
  - and the guiltless
  lexicon: HALOT
  rationale: Singular adjective used substantivally. Although singular in form, it
    can function generically. 'The innocent' is a natural English equivalent and fits
    the parallel moral category with 'the righteous.'
- source_word: יִלְעַג
  chosen: mock
  alternatives:
  - laugh at
  - deride
  - scoff at
  lexicon: HALOT
  rationale: Qal imperfect 3ms of לעג, denoting scornful mockery. 'Mock' is concise
    and idiomatic; 'laugh at' is possible but slightly weaker in tone.
- source_word: לָמוֹ
  chosen: them
  alternatives:
  - at them
  lexicon: HALOT
  rationale: Pronominal form referring to the wicked previously described in context.
    English idiom with 'mock' can take a direct object ('mock them'), though the sense
    'at them' is implicit.
