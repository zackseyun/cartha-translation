id: JOB.22.18
reference: Job 22:18
source:
  edition: WLC
  text: וְ/ה֤וּא מִלֵּ֣א בָתֵּי/הֶ֣ם ט֑וֹב וַ/עֲצַ֥ת רְ֝שָׁעִ֗ים רָ֣חֲקָה מֶֽ/נִּי׃
translation:
  text: Yet he filled their houses with good things— but the counsel of the wicked
    is far from me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, less literally, 'with prosperity.' The Hebrew says 'with good,' likely
      meaning good things or benefits.
    reason: lexical_alternative
  - marker: b
    text: 'Or ''let the counsel of the wicked be far from me.'' The Hebrew more directly
      reads as a statement: ''the counsel of the wicked is far from me.'''
    reason: alternative_reading
lexical_decisions:
- source_word: וְהוּא
  chosen: Yet he
  alternatives:
  - And he
  - But he
  lexicon: HALOT
  rationale: The conjunction plus pronoun marks contrast with the wicked's attitude
    in the surrounding context. 'Yet he' brings out the adversative force naturally
    in English while retaining the explicit subject 'he' (God).
- source_word: מִלֵּא
  chosen: filled
  alternatives:
  - has filled
  - fills
  lexicon: HALOT
  rationale: The verb means 'to fill.' A simple past fits the poetic retrospective
    context better than an English perfect here.
- source_word: בָתֵּיהֶם
  chosen: their houses
  alternatives:
  - their households
  - their homes
  lexicon: HALOT
  rationale: Literally 'their houses.' In context it refers to the sphere of their
    prosperity; 'houses' preserves the concrete Hebrew image.
- source_word: טוֹב
  chosen: with good things
  alternatives:
  - with good
  - with prosperity
  lexicon: HALOT
  rationale: The adjective/noun 'good' functions substantivally after 'filled.' English
    idiom prefers 'with good things.' 'Prosperity' is possible contextually but is
    more interpretive than the Hebrew wording.
- source_word: וַעֲצַת
  chosen: but the counsel
  alternatives:
  - and the counsel
  - yet the plan
  lexicon: HALOT
  rationale: The conjunction is rendered adversatively because the second colon distances
    the speaker from the wicked's viewpoint. 'Counsel' is the standard rendering for
    עֵצָה and fits both advice and purpose.
- source_word: רְשָׁעִים
  chosen: of the wicked
  alternatives:
  - of wicked people
  - of the guilty
  lexicon: HALOT
  rationale: '''The wicked'' is the conventional and accurate rendering for the plural
    adjective used substantivally.'
- source_word: רָחֲקָה מֶנִּי
  chosen: is far from me
  alternatives:
  - be far from me
  - was far from me
  lexicon: HALOT
  rationale: The clause is best taken as the speaker's declaration of dissociation
    from the wicked's counsel. English present tense communicates the idiomatic force
    well. An optative-like 'be far from me' is possible, but the Hebrew form is qatal,
    not an imperative or jussive.
