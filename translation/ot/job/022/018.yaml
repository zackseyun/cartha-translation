theological_decisions:
- issue: Speaker stance in the final colon
  chosen_reading: The line is rendered as Job's/Eliphaz's declaration, 'the counsel
    of the wicked is far from me,' not as a prayer or wish.
  alternative_readings:
  - '''let the counsel of the wicked be far from me'''
  rationale: The Hebrew uses a qatal form ('has been/is far') rather than an imperative
    or jussive. The translation preserves the statement of dissociation without importing
    a more devotional or hortatory nuance.
  doctrine_reference: Preserve theological tension rather than resolve it; follow
    the source text's plain sense.
