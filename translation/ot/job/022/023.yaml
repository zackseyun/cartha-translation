theological_decisions:
- issue: Whether to render the restoration metaphor literally or interpretively
  chosen_reading: you will be restored
  alternative_readings:
  - you will be built up
  - you will be rebuilt
  rationale: The Hebrew metaphor of being 'built' refers to reestablishment or restoration.
    'Restored' communicates the sense clearly in modern English without denying the
    underlying metaphor; the literal alternative is preserved in a footnote for auditability.
  doctrine_reference: Translation philosophy §6; §5 documented exception
- issue: Whether שוב should be rendered as 'return' or 'repent'
  chosen_reading: return
  alternative_readings:
  - repent
  - turn back
  rationale: The Hebrew verb fundamentally means 'turn/return.' Rendering it as 'return'
    preserves the lexical base and theological openness, avoiding importing a narrower
    doctrinal nuance unless the context requires it.
  doctrine_reference: Translation philosophy §1; §3
