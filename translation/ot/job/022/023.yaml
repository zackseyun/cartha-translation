id: JOB.22.23
reference: Job 22:23
source:
  edition: WLC
  text: אִם תָּשׁ֣וּב עַד שַׁ֭דַּי תִּבָּנֶ֑ה תַּרְחִ֥יק עַ֝וְלָ֗ה מֵ/אָהֳלֶֽ/ךָ־־׃
translation:
  text: If you return to the Almighty, you will be restored; if you put unrighteousness
    far from your tent,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'you will be built up' or 'you will be rebuilt.' The Hebrew verb is literally
      'be built,' used metaphorically for restoration or reestablishment.
    reason: lexical_alternative
  - marker: b
    text: Or 'wrongdoing' or 'injustice.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  chosen: If
  alternatives:
  - surely if
  lexicon: HALOT
  rationale: Introduces a conditional clause. A simple 'if' best fits the syntax and
    keeps the protasis clear.
- source_word: תָּשׁוּב
  chosen: you return
  alternatives:
  - you repent
  - you turn back
  lexicon: HALOT
  rationale: From שוב, 'return/turn back.' 'Return' preserves the concrete covenantal
    sense without over-interpreting it as explicit repentance, though repentance is
    implied in context.
- source_word: עַד
  chosen: to
  alternatives:
  - unto
  - toward
  lexicon: HALOT
  rationale: With שוב and שדי, the preposition marks movement or orientation toward
    God. 'To' is idiomatic in modern English.
- source_word: שַׁדַּי
  chosen: the Almighty
  alternatives:
  - Shaddai
  lexicon: HALOT
  rationale: This divine title is best translated rather than transliterated, in keeping
    with the project's philosophy to translate titles. 'The Almighty' is the standard
    and contextually fitting rendering.
- source_word: תִּבָּנֶה
  chosen: you will be restored
  alternatives:
  - you will be built up
  - you will be rebuilt
  lexicon: HALOT
  rationale: Niphal of בנה is literally 'be built/rebuilt.' In this context of personal
    renewal and prosperity, 'be restored' communicates the metaphor naturally in English
    while preserving the passive sense. The more literal 'built up' is viable and
    preserved in a footnote.
- source_word: תַּרְחִיק
  chosen: you put far
  alternatives:
  - you remove far
  - you keep far away
  lexicon: HALOT
  rationale: Hiphil of רחק means to cause to be far, hence 'put far' or 'remove far.'
    'Put far' is concise and preserves the causative force.
- source_word: עַוְלָה
  chosen: unrighteousness
  alternatives:
  - injustice
  - wrongdoing
  - iniquity
  lexicon: HALOT
  rationale: The noun denotes injustice, wrong, or unrighteousness. 'Unrighteousness'
    fits the moral-religious context of Eliphaz's exhortation, while 'wrongdoing'
    and 'injustice' remain possible contextual alternatives.
- source_word: מֵאָהֳלֶךָ
  chosen: from your tent
  alternatives:
  - from your dwelling
  lexicon: HALOT
  rationale: Literally 'from your tent.' Although it can metonymically refer to one's
    household or dwelling, retaining 'tent' preserves the imagery and cultural setting
    of the text.
