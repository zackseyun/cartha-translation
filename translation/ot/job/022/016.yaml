id: JOB.22.16
reference: Job 22:16
source:
  edition: WLC
  text: אֲשֶֽׁר קֻמְּט֥וּ וְ/לֹא עֵ֑ת נָ֝הָ֗ר יוּצַ֥ק יְסוֹדָֽ/ם־־׃
translation:
  text: who were snatched away before their time, whose foundation was washed away
    by a river.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'were cut down before their time.' The Hebrew verb is difficult and may
      suggest being seized, shriveled up, or suddenly removed.
    reason: lexical_alternative
  - marker: b
    text: Or 'their foundation was poured out by a river'—that is, overwhelmed or
      swept away. The Hebrew imagery is compressed.
    reason: lexical_alternative
  - marker: c
    text: The verse may allude specifically to the generation destroyed by the flood,
      or more generally to the sudden downfall of the wicked.
    reason: cross_reference
lexical_decisions:
- source_word: אֲשֶׁר
  chosen: who
  alternatives:
  - who/which
  - those who
  lexicon: HALOT
  rationale: Relative particle introducing the description of the wicked mentioned
    in context; 'who' is the most natural English connector for persons.
- source_word: קֻמְּטוּ
  chosen: were snatched away
  alternatives:
  - were cut down
  - were shriveled up
  - were seized
  lexicon: HALOT
  rationale: The passive form conveys a sudden removal or being taken away. In this
    context of premature destruction, 'were snatched away' best captures the force
    without overcommitting to a physical-image gloss like 'shriveled up.'
- source_word: וְלֹא עֵת
  chosen: before their time
  alternatives:
  - and not at the proper time
  - not in due time
  - when it was not time
  lexicon: HALOT
  rationale: Idiomatic Hebrew for an untimely end. 'Before their time' is clear modern
    English and preserves the sense of premature judgment.
- source_word: נָהָר
  chosen: a river
  alternatives:
  - a stream
  - the river
  - a flood
  lexicon: HALOT
  rationale: The noun ordinarily means 'river.' Because the imagery is of foundations
    being swept away, 'a river' preserves the concrete metaphor; 'flood' is interpretive
    and therefore kept as an alternative only.
- source_word: יוּצַק
  chosen: was washed away
  alternatives:
  - was poured out
  - was cast down
  - was flooded over
  lexicon: HALOT
  rationale: The verb literally relates to pouring out, but with 'foundation' as object
    and 'river' as subject, the sense is that the foundation was overwhelmed/swept
    away. 'Was washed away' communicates the image in natural English while staying
    close to the metaphor.
- source_word: יְסוֹדָם
  chosen: their foundation
  alternatives:
  - their base
  - their foundations
  lexicon: HALOT
  rationale: Singular collective noun with 3mp suffix. 'Their foundation' is the most
    idiomatic rendering and fits the metaphor of collapse under judgment.
