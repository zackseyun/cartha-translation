theological_decisions:
- issue: Nature of the judgment imagery
  chosen_reading: Render the verse as describing the premature destruction of the
    wicked by overwhelming waters, without specifying whether the language is literal
    history or metaphorical judgment.
  alternative_readings:
  - A literal allusion to the flood generation
  - A general metaphor for sudden divine overthrow
  rationale: The immediate context recalls earlier wicked people and uses water-destruction
    imagery. The Hebrew does not require the translator to decide between a specific
    historical allusion and a broader metaphor, so the English preserves the image
    without narrowing it.
  doctrine_reference: Preserve theological tension rather than resolve it.
