id: JOB.22.7
reference: Job 22:7
source:
  edition: WLC
  text: לֹא מַ֭יִם עָיֵ֣ף תַּשְׁקֶ֑ה וּ֝/מֵ/רָעֵ֗ב תִּֽמְנַֽע לָֽחֶם־־׃
translation:
  text: You gave no water to the weary to drink, and from the hungry you withheld
    bread.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'bread' may also function more broadly as 'food,' but the main text
      keeps the concrete term used in the source.
    reason: lexical_alternative
lexical_decisions:
- source_word: לֹא
  chosen: no / not
  alternatives:
  - did not
  lexicon: HALOT
  rationale: 'Simple negation governing both accusations in the verse. In English,
    the negation is expressed idiomatically in each clause: ''gave no water'' and
    ''withheld bread.'''
- source_word: מַיִם
  chosen: water
  lexicon: HALOT
  rationale: Common noun meaning 'water.' Singular mass noun is natural in English.
- source_word: עָיֵף
  chosen: the weary
  alternatives:
  - the faint
  - the exhausted
  lexicon: HALOT
  rationale: Adjective meaning weary/exhausted. Rendered substantivally as 'the weary'
    to match Hebrew usage and keep the accusation general rather than referring to
    one specific person.
- source_word: תַּשְׁקֶה
  chosen: you gave ... to drink
  alternatives:
  - you caused to drink
  - you gave drink to
  lexicon: HALOT
  rationale: Hiphil of שׁקה means to give drink / cause to drink. 'You gave no water
    ... to drink' is idiomatic modern English and preserves the causative sense without
    awkwardness.
- source_word: וּמֵרָעֵב
  chosen: and from the hungry
  alternatives:
  - and from a hungry man
  - and from the famished
  lexicon: HALOT
  rationale: Preposition מִן with רָעֵב yields 'from the hungry [person].' The singular
    adjective is used generically. 'The hungry' best captures the representative force
    in natural English.
- source_word: תִּמְנַע
  chosen: you withheld
  alternatives:
  - you kept back
  - you refused
  lexicon: HALOT
  rationale: Qal of מנע means withhold, keep back, restrain. 'Withheld' fits the legal-moral
    accusation of denying needed provision.
- source_word: לָחֶם
  chosen: bread
  alternatives:
  - food
  lexicon: HALOT
  rationale: Literally 'bread.' Although it can stand metonymically for food, 'bread'
    should be retained in the main text because the Hebrew term is explicit and the
    image is clear in context.
