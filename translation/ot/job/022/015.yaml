id: JOB.22.15
reference: Job 22:15
source:
  edition: WLC
  text: הַ/אֹ֣רַח עוֹלָ֣ם תִּשְׁמֹ֑ר אֲשֶׁ֖ר דָּרְכ֣וּ מְתֵי אָֽוֶן־׃
translation:
  text: Will you keep to the ancient path that men of wickedness have trodden?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the path of old' or 'the age-old path.' The Hebrew expression refers
      to a path long followed in the past, not necessarily to something eternal.
    reason: lexical_alternative
  - marker: b
    text: Or 'evil men' or 'men of iniquity.' The Hebrew phrase is literally 'men
      of wickedness.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הָאֹרַח
  chosen: the path
  alternatives:
  - the way
  - the road
  lexicon: HALOT
  rationale: אֹרַח commonly denotes a path or way, often metaphorically for a course
    of life. 'Path' is natural English and preserves the metaphor.
- source_word: עוֹלָם
  chosen: ancient
  alternatives:
  - of old
  - everlasting
  - age-old
  lexicon: HALOT
  rationale: Here עוֹלָם modifies 'path' idiomatically as a path from long ago, not
    an eternal path in a theological sense. 'Ancient' best fits the context of former
    wicked people.
- source_word: תִּשְׁמֹר
  chosen: will you keep to
  alternatives:
  - will you keep
  - will you observe
  - will you guard
  lexicon: HALOT
  rationale: שׁמר literally means keep/guard/observe. With 'path' as object, the sense
    is to keep to or follow a course. 'Will you keep to' communicates the idiom in
    readable English.
- source_word: אֲשֶׁר
  chosen: that
  alternatives:
  - which
  - wherein
  lexicon: HALOT
  rationale: Simple relative pronoun introducing the clause describing the path.
- source_word: דָּרְכוּ
  chosen: have trodden
  alternatives:
  - walked
  - trampled
  lexicon: HALOT
  rationale: From דרך 'to tread, march, walk.' 'Have trodden' preserves the concrete
    path imagery better than the flatter 'walked.'
- source_word: מְתֵי אָוֶן
  chosen: men of wickedness
  alternatives:
  - evil men
  - men of iniquity
  - mortals of trouble
  lexicon: HALOT
  rationale: מתי is the construct plural 'men/persons of.' אָוֶן can denote wickedness,
    iniquity, trouble, or deceit. In this context, referring to the ungodly whose
    way is condemned, 'wickedness' best captures the moral force.
