id: JOB.22.1
reference: Job 22:1
source:
  edition: WLC
  text: וַ֭/יַּעַן אֱלִיפַ֥ז הַֽ/תֵּמָנִ֗י וַ/יֹּאמַֽר׃
translation:
  text: 'Then Eliphaz the Temanite answered and said:'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיַּעַן
  chosen: answered
  alternatives:
  - responded
  lexicon: HALOT
  rationale: The verb ענה in this narrative wayyiqtol form commonly introduces a speech
    with the sense 'answered' or 'responded.' 'Answered' preserves the conventional
    dialogical force and fits the immediate discourse setting.
- source_word: אֱלִיפַז
  chosen: Eliphaz
  rationale: Personal name transliterated according to standard English convention,
    following the translation philosophy to transliterate names rather than translate
    them.
- source_word: הַתֵּמָנִי
  chosen: the Temanite
  alternatives:
  - the man from Teman
  lexicon: HALOT
  rationale: The gentilic adjective from Teman is most naturally rendered 'the Temanite'
    in concise literary English. This preserves the ethnic/geographic designation
    without unnecessary expansion.
- source_word: וַיֹּאמַר
  chosen: said
  alternatives:
  - spoke
  lexicon: HALOT
  rationale: אמר is the standard verb of speech. 'Said' is the most direct and idiomatic
    rendering here, especially in the common Hebrew narrative formula 'answered and
    said.'
- source_word: וַ
  chosen: Then
  alternatives:
  - And
  rationale: The initial waw on the first verb marks narrative progression. 'Then'
    communicates sequential development in natural modern English better than a mechanically
    repeated 'And,' while remaining faithful to the discourse flow.
