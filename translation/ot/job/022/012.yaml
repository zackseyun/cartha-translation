id: JOB.22.12
reference: Job 22:12
source:
  edition: WLC
  text: הֲֽ/לֹא אֱ֭לוֹהַּ גֹּ֣בַהּ שָׁמָ֑יִם וּ/רְאֵ֤ה רֹ֖אשׁ כּוֹכָבִ֣ים כִּי רָֽמּוּ־־׃
translation:
  text: Is not God in the height of heaven? And see the highest stars, how lofty they
    are.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the heights of heaven.' The Hebrew phrase is literally 'the height
      of heaven.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'the head/top of the stars'; the sense is 'the highest stars.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲלֹא
  chosen: Is not
  alternatives:
  - Isn't
  - Surely
  lexicon: HALOT
  rationale: Introduces a rhetorical question expecting agreement. 'Is not' preserves
    the formal interrogative force better than the more colloquial 'Isn't' and avoids
    importing the emphatic nuance of 'Surely' into the main text.
- source_word: אֱלוֹהַּ
  chosen: God
  alternatives:
  - God Almighty
  - God above
  lexicon: HALOT
  rationale: Standard singular term for God. 'God' is the plain lexical equivalent;
    the alternatives add interpretive or contextual nuance not explicit in the word
    itself.
- source_word: גֹּבַהּ שָׁמַיִם
  chosen: in the height of heaven
  alternatives:
  - as high as heaven
  - in the heights of heaven
  - the height of the heavens
  lexicon: HALOT
  rationale: The construct phrase literally denotes the height/elevation of heaven.
    'In the height of heaven' preserves the spatial imagery while remaining readable.
    'As high as heaven' shifts toward comparison rather than location; 'heights of
    heaven' is possible but less directly tied to the singular construct here.
- source_word: וּרְאֵה
  chosen: And see
  alternatives:
  - And look
  - Look
  lexicon: HALOT
  rationale: Imperative of ראה. 'And see' keeps the conjunction and imperative force.
    'Look' is possible, but 'see' better matches the lexical root and the observational
    appeal in context.
- source_word: רֹאשׁ כּוֹכָבִים
  chosen: the highest stars
  alternatives:
  - the top of the stars
  - the stars' summit
  - the stars
  lexicon: HALOT
  rationale: רֹאשׁ literally means 'head/top,' here idiomatically referring to the
    uppermost height of the stars. English requires smoothing; 'the highest stars'
    conveys the sense naturally without wooden literalism. A more literal 'top of
    the stars' is awkward in English.
- source_word: כִּי
  chosen: how
  alternatives:
  - that
  - for
  lexicon: HALOT
  rationale: 'Here כִּי introduces an exclamatory observation about the stars'' elevation:
    ''how lofty they are.'' ''That'' is possible but less idiomatic in English; ''for''
    would misrepresent the clause as causal.'
- source_word: רָמּוּ
  chosen: they are lofty
  alternatives:
  - they are high
  - they are exalted
  lexicon: HALOT
  rationale: From רום, 'to be high/exalted.' 'Lofty' fits the elevated poetic register
    and matches the astronomical imagery. 'Exalted' could suggest honor rather than
    physical height, so it is less suitable here.
