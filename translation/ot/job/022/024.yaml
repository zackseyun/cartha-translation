theological_decisions:
- issue: Interpretive force of the verse within Eliphaz's exhortation
  chosen_reading: The verse is rendered as a call to cast aside reliance on material
    wealth, not as an instruction to store treasure safely.
  alternative_readings:
  - A command to place gold in secure natural storage places
  rationale: In the immediate context (vv. 24–25), the point is that if Job renounces
    earthly treasure, the Almighty will become his true treasure. Rendering the imagery
    as discarding gold into dust and rocky wadis best fits the literary and theological
    flow.
  doctrine_reference: Translation philosophy §3, preserve tension rather than resolve
    it; optimal equivalence based on context
