id: JOB.22.24
reference: Job 22:24
source:
  edition: WLC
  text: וְ/שִׁית עַל עָפָ֥ר בָּ֑צֶר וּ/בְ/צ֖וּר נְחָלִ֣ים אוֹפִֽיר־־׃
translation:
  text: and lay your gold in the dust, and the gold of Ophir among the stones of the
    wadis,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and place gold ore on the dust.' The Hebrew term can denote precious
      metal or ore, not only refined gold.
    reason: lexical_alternative
  - marker: b
    text: '''Wadis'' refers to seasonal streambeds or torrent-valleys; alternatively,
      ''streams'' or ''torrent-beds.'''
    reason: cultural_note
  - marker: c
    text: Hebrew 'Ophir,' a place famed for fine gold; thus 'the gold of Ophir.'
    reason: cross_reference
lexical_decisions:
- source_word: וְשִׁית
  chosen: and lay
  alternatives:
  - and put
  - and place
  - then place
  lexicon: HALOT
  rationale: The verb שׁית commonly means 'put, set, place.' In this poetic exhortation,
    'lay' is idiomatic and fits the sense of disposing or setting something down.
    The prefixed conjunction is carried as 'and' in sequence with the surrounding
    imperatives.
- source_word: עַל
  chosen: in
  alternatives:
  - 'on'
  - upon
  lexicon: HALOT
  rationale: Although עַל normally means 'on/upon,' with 'dust' in English the idiom
    'lay ... in the dust' better conveys casting something down to the ground in a
    poetic context. This is a modest contextual adjustment under optimal equivalence.
- source_word: עָפָר
  chosen: the dust
  alternatives:
  - dust
  - the dirt
  lexicon: HALOT
  rationale: עָפָר denotes dust/loose earth. 'The dust' preserves the concrete poetic
    image and works naturally with the preposition.
- source_word: בָּצֶר
  chosen: your gold
  alternatives:
  - ore
  - precious metal
  - gold bullion
  lexicon: HALOT
  rationale: בצר can denote precious metal, especially gold ore or bullion, in this
    context parallel to Ophir. Because the verse contrasts earthly treasure with God
    as true treasure in the immediate context, 'gold' is the clearest rendering. The
    possessive 'your' is supplied from the 2ms verbal context in English for naturalness
    and to reflect the addressed person's treasure.
- source_word: וּבְצוּר
  chosen: among the stones
  alternatives:
  - in the rock
  - on the crag
  - against the rock
  lexicon: HALOT
  rationale: צוּר is 'rock.' In the construct phrase with 'wadis/streams,' the sense
    is rocky places associated with torrent-beds. English idiom is better served by
    'among the stones' than the more wooden 'in the rock of.' This also matches the
    image of throwing treasure away among common rocks.
- source_word: נְחָלִים
  chosen: of the wadis
  alternatives:
  - of the valleys
  - of the streams
  - of the torrent-beds
  lexicon: HALOT
  rationale: נחל often refers to a wadi or seasonal torrent-bed rather than a perennial
    river. 'Wadis' preserves the specific Near Eastern topographical sense; an explanatory
    alternative is worth preserving in a footnote for readers unfamiliar with the
    term.
- source_word: אוֹפִיר
  chosen: the gold of Ophir
  alternatives:
  - Ophir
  - Ophir gold
  lexicon: HALOT
  rationale: 'Ophir is a place-name associated with exceptionally fine gold. Since
    the Hebrew simply has ''Ophir'' in parallel with בצר, English benefits from making
    the implied sense explicit: ''the gold of Ophir.'' This preserves the poetic parallel
    and the referent.'
