id: JOB.22.6
reference: Job 22:6
source:
  edition: WLC
  text: כִּֽי תַחְבֹּ֣ל אַחֶ֣י/ךָ חִנָּ֑ם וּ/בִגְדֵ֖י עֲרוּמִּ֣ים תַּפְשִֽׁיט־׃
translation:
  text: For you took pledges from your brothers for no reason, and stripped the clothing
    from the naked.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'you seized collateral from your brothers without cause.'
    reason: lexical_alternative
  - marker: b
    text: '''Your brothers'' may refer more broadly to fellow members of the community,
      not only biological siblings.'
    reason: cultural_note
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Surely
  - Because
  lexicon: HALOT
  rationale: Introduces Eliphaz's accusation with an explanatory/causal force. 'For'
    fits the discourse flow in English and preserves the connection to the preceding
    charge.
- source_word: תַחְבֹּל
  chosen: you took pledges
  alternatives:
  - you seized collateral
  - you took a pledge
  lexicon: HALOT
  rationale: From חבל in the sense of taking a pledge/collateral for a debt. The plural-like
    English expression 'took pledges' naturally conveys repeated or characteristic
    action in accusation. 'Seized collateral' is possible but sounds more interpretive
    and less idiomatic.
- source_word: אַחֶיךָ
  chosen: your brothers
  alternatives:
  - your kin
  - your fellow men
  lexicon: HALOT
  rationale: Literally 'your brothers.' In wisdom literature this can denote fellow
    members of one's community, but the Hebrew is explicitly masculine plural with
    covenantal/social force. Per translation philosophy, the gendered form is retained
    rather than neutralized.
- source_word: חִנָּם
  chosen: for no reason
  alternatives:
  - without cause
  - for nothing
  lexicon: HALOT
  rationale: Conveys unjustified action rather than merely lack of payment. 'For no
    reason' is clear modern English and captures the moral accusation.
- source_word: וּבִגְדֵי
  chosen: and the clothing
  alternatives:
  - and garments
  - and clothes
  lexicon: HALOT
  rationale: בגד is 'garment/clothing.' 'Clothing' is natural collective English here
    and fits the plural construct with the following adjective.
- source_word: עֲרוּמִּים
  chosen: the naked
  alternatives:
  - the poorly clothed
  - the destitute
  lexicon: HALOT
  rationale: The adjective means 'naked' or inadequately clothed. In this context
    of stripping garments, 'the naked' preserves the stark irony and the severity
    of the accusation.
- source_word: תַּפְשִׁיט
  chosen: stripped
  alternatives:
  - you stripped off
  - you despoiled
  lexicon: HALOT
  rationale: Hiphil of פשט here means to strip off clothing. 'Stripped' is concise,
    direct, and idiomatic in English.
