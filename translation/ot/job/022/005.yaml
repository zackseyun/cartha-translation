theological_decisions:
- issue: Moral accusation versus suffering language in רָעָתְךָ
  chosen_reading: moral evil/wickedness
  alternative_readings:
  - calamity/misfortune
  rationale: Although רעה can denote either evil or calamity, the immediate parallel
    with 'your iniquities' makes the moral sense clearly primary here. This avoids
    importing the idea that Eliphaz is merely describing Job's troubles rather than
    accusing him of wrongdoing.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; preserve the text''s plain sense'
