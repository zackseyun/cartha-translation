id: JOB.22.5
reference: Job 22:5
source:
  edition: WLC
  text: הֲ/לֹ֣א רָעָֽתְ/ךָ֣ רַבָּ֑ה וְ/אֵֽין קֵ֝֗ץ לַ/עֲוֺנֹתֶֽי/ךָ־׃
translation:
  text: Is not your evil abundant, and there is no end to your iniquities?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your wickedness.' The Hebrew term can also mean 'calamity' in some contexts,
      but here the parallel with 'your iniquities' points to moral evil.
    reason: lexical_alternative
  - marker: b
    text: Or 'there is no limit to your iniquities.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲלֹא
  chosen: Is not
  alternatives:
  - Surely
  - Is it not
  lexicon: HALOT
  rationale: Introduces a rhetorical question expecting an affirmative answer. 'Is
    not' preserves the interrogative force and accusation better than a flat asseveration
    like 'surely'.
- source_word: רָעָתְךָ
  chosen: your evil
  alternatives:
  - your wickedness
  - your calamity
  lexicon: HALOT
  rationale: In this context Eliphaz is accusing Job morally, not describing misfortune.
    'Evil' preserves the broad moral sense of רעה, while 'wickedness' is possible
    but slightly more interpretive. 'Calamity' is rejected because the parallel with
    'iniquities' shows moral guilt is intended.
- source_word: רַבָּה
  chosen: abundant
  alternatives:
  - great
  - many
  lexicon: HALOT
  rationale: The adjective denotes largeness or abundance. 'Abundant' works naturally
    with the singular collective sense of 'evil' in English and preserves the idea
    of magnitude.
- source_word: וְאֵין
  chosen: and there is no
  alternatives:
  - and there is not
  - with no
  lexicon: HALOT
  rationale: This idiom introduces the following noun phrase naturally in English.
    'And there is no' is clear and close to the Hebrew structure.
- source_word: קֵץ
  chosen: end
  alternatives:
  - limit
  - boundary
  lexicon: HALOT
  rationale: The noun commonly means 'end' or 'limit.' 'End' is the most idiomatic
    in the expression 'no end to,' while still accurately reflecting the Hebrew.
- source_word: לַעֲוֺנֹתֶיךָ
  chosen: to your iniquities
  alternatives:
  - to your sins
  - to your guilt
  lexicon: HALOT
  rationale: עון often carries the sense of iniquity or guilt, not merely generic
    sin. 'Iniquities' preserves the stronger moral weight and matches the accusatory
    tone. The preposition ל is best represented in the English idiom 'no end to.'
