id: JOB.22.2
reference: Job 22:2
source:
  edition: WLC
  text: הַ/לְ/אֵ֥ל יִסְכָּן גָּ֑בֶר כִּֽי יִסְכֹּ֖ן עָלֵ֣י/מוֹ מַשְׂכִּֽיל־־׃
translation:
  text: Can a man be of use to God? Surely the one who is wise is of use to himself.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Can a man profit God? For the one with insight profits himself.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַלְאֵל
  chosen: Can ... to God?
  alternatives:
  - Is it to God that ...?
  - Can ... be profitable to God?
  lexicon: HALOT
  rationale: 'The interrogative הֲ with לְאֵל introduces a rhetorical question directed
    toward God as the indirect object: whether a human can be beneficial ''to God.''
    Rendering as ''Can ... to God?'' captures the rhetorical force in natural English.'
- source_word: יִסְכָּן
  chosen: be of use
  alternatives:
  - be profitable
  - benefit
  lexicon: HALOT
  rationale: The verb סכן in this context carries the sense of being useful or profitable.
    'Be of use' is idiomatic modern English and avoids overly commercial wording while
    preserving the point.
- source_word: גָּבֶר
  chosen: a man
  alternatives:
  - a human
  - a strong man
  lexicon: HALOT
  rationale: גבר is grammatically masculine singular and here functions generically
    for a human person. Per the translation philosophy, a gender-accurate rendering
    is preferred; 'a man' preserves the Hebrew form and representative force.
- source_word: כִּי
  chosen: Surely
  alternatives:
  - for
  - that
  - indeed
  lexicon: HALOT
  rationale: Here כִּי introduces the explanatory or emphatic second colon. 'Surely'
    fits the rhetorical flow in English better than a wooden 'for' while preserving
    the argumentative force.
- source_word: יִסְכֹּן
  chosen: is of use
  alternatives:
  - profits
  - benefits
  lexicon: HALOT
  rationale: The second occurrence of סכן is kept semantically parallel with the first
    for consistency. Present tense works naturally in English proverbial speech.
- source_word: עָלֵימוֹ
  chosen: to himself
  alternatives:
  - for himself
  - upon himself
  lexicon: HALOT
  rationale: The preposition על with pronominal suffix here idiomatically points to
    advantage accruing to the person himself. 'To himself' reads naturally with 'is
    of use.'
- source_word: מַשְׂכִּיל
  chosen: the one who is wise
  alternatives:
  - the insightful one
  - the prudent one
  - the one with understanding
  lexicon: HALOT
  rationale: As a participial form from שכל, the word denotes one who has insight
    or acts wisely. 'The one who is wise' is clear, natural, and preserves the substantival
    participle.
