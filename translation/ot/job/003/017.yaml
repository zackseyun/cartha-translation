id: JOB.3.17
reference: Job 3:17
source:
  edition: WLC
  text: שָׁ֣ם רְ֭שָׁעִים חָ֣דְלוּ רֹ֑גֶז וְ/שָׁ֥ם יָ֝נ֗וּחוּ יְגִ֣יעֵי כֹֽחַ׃
translation:
  text: There the wicked cease from turmoil, and there those weary in strength find
    rest.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'agitation,' 'rage,' or 'unrest' for 'turmoil.'
    reason: lexical_alternative
  - marker: b
    text: Literally, 'the weary of strength,' that is, those exhausted of strength.
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁם
  chosen: There
  alternatives:
  - In that place
  lexicon: HALOT
  rationale: Locative adverb referring to the realm under discussion in Job's lament,
    here best rendered simply as 'There' for natural English and to preserve the poetic
    parallelism.
- source_word: רְשָׁעִים
  chosen: the wicked
  alternatives:
  - wicked people
  - the guilty
  lexicon: HALOT
  rationale: Standard adjectival substantive meaning morally wicked persons. 'The
    wicked' is concise, idiomatic, and preserves the moral category without overexpansion.
- source_word: חָדְלוּ
  chosen: cease
  alternatives:
  - stop
  - come to an end
  lexicon: HALOT
  rationale: Qal perfect plural of חדל, 'to cease, stop.' Present-tense English fits
    the gnomic description in context better than a simple past.
- source_word: רֹגֶז
  chosen: turmoil
  alternatives:
  - agitation
  - rage
  - troubling
  lexicon: HALOT
  rationale: The noun can denote agitation, unrest, or raging disturbance. 'Turmoil'
    best captures the state of restless disturbance in this poetic context without
    narrowing it to emotional anger alone.
- source_word: וְשָׁם
  chosen: and there
  alternatives:
  - there also
  lexicon: HALOT
  rationale: The conjunction plus repeated locative adverb marks the second half of
    the poetic parallelism. 'And there' preserves the structure and emphasis.
- source_word: יָנוּחוּ
  chosen: find rest
  alternatives:
  - rest
  - are at rest
  lexicon: HALOT
  rationale: From נוח, 'to rest, settle down.' 'Find rest' is slightly more idiomatic
    in English while preserving the sense of entering repose in the place described.
- source_word: יְגִיעֵי כֹחַ
  chosen: those weary in strength
  alternatives:
  - those exhausted of strength
  - the weary
  - those worn out in strength
  lexicon: HALOT
  rationale: Literally 'the weary of strength,' an idiom for those exhausted in their
    strength or worn out from toil. 'Those weary in strength' keeps the lexical link
    to כוח ('strength') more transparently than the smoother but less literal 'the
    weary.'
