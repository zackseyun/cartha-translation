id: JOB.3.9
reference: Job 3:9
source:
  edition: WLC
  text: יֶחְשְׁכוּ֮ כּוֹכְבֵ֪י נִ֫שְׁפּ֥/וֹ יְקַו לְ/א֥וֹר וָ/אַ֑יִן וְ/אַל יִ֝רְאֶ֗ה
    בְּ/עַפְעַפֵּי שָֽׁחַר־־־׃
translation:
  text: May the stars of its twilight be dark; may it wait for light, but there be
    none, and may it not see the eyelids of dawn.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the stars of its dusk.' The Hebrew noun can denote twilight, especially
      evening twilight.
    reason: lexical_alternative
  - marker: b
    text: Literally 'the eyelids of dawn,' a Hebrew poetic image for the first appearance
      of morning light.
    reason: cultural_note
lexical_decisions:
- source_word: יֶחְשְׁכוּ
  chosen: be dark
  alternatives:
  - grow dark
  - be darkened
  lexicon: HALOT
  rationale: 'Qal imperfect/jussive-like in this curse context expresses a wish: ''may
    they be dark.'' ''Be dark'' is concise and natural in English while preserving
    the imprecatory force.'
- source_word: כּוֹכְבֵי
  chosen: the stars of
  alternatives:
  - the stars
  lexicon: HALOT
  rationale: Construct with the following noun requires 'stars of …' rather than an
    absolute 'stars'.
- source_word: נִשְׁפּוֹ
  chosen: its twilight
  alternatives:
  - its dusk
  - its gloom
  lexicon: HALOT
  rationale: The noun refers to twilight, especially evening twilight. 'Its twilight'
    fits the personified 'night/day' context of Job 3 and preserves the suffix. 'Dusk'
    is possible, but 'twilight' better matches the poetic register and allows the
    phrase 'stars of its twilight' to remain intelligible.
- source_word: יְקַו
  chosen: may it wait
  alternatives:
  - may it hope
  - let it look eagerly
  lexicon: HALOT
  rationale: The verb קוה can mean 'wait' or 'hope.' In parallel with 'for light,
    but there be none,' 'wait' best conveys expectant longing without over-psychologizing
    the personified subject.
- source_word: לְאוֹר
  chosen: for light
  alternatives:
  - for daylight
  - for the light
  lexicon: HALOT
  rationale: '''Light'' is the basic sense and preserves the poetic contrast with
    darkness. ''Daylight'' would be interpretive.'
- source_word: וָאַיִן
  chosen: but there be none
  alternatives:
  - and there is none
  - but there is none
  lexicon: HALOT
  rationale: The phrase expresses frustrated expectation. 'But there be none' matches
    the jussive wish context and reads naturally in elevated English.
- source_word: וְאַל יִרְאֶה
  chosen: and may it not see
  alternatives:
  - and let it not see
  lexicon: HALOT
  rationale: 'אַל with imperfect gives a negative jussive: ''may it not see.'' This
    preserves the curse/wish force.'
- source_word: בְּעַפְעַפֵּי
  chosen: the eyelids of
  alternatives:
  - the glimmerings of
  - the first rays of
  lexicon: HALOT
  rationale: Literally 'eyelids of.' The metaphor is vivid and well established in
    Hebrew poetry for the first opening of dawn. The literal image is preserved in
    the main text rather than flattened.
- source_word: שָׁחַר
  chosen: dawn
  alternatives:
  - daybreak
  - morning light
  lexicon: HALOT
  rationale: Standard poetic term for dawn. 'Dawn' is concise and preserves the imagery.
