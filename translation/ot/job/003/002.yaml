id: JOB.3.2
reference: Job 3:2
source:
  edition: WLC
  text: וַ/יַּ֥עַן אִיּ֗וֹב וַ/יֹּאמַֽר׃
translation:
  text: 'And Job answered and said:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'responded and said.' The Hebrew uses a common speech-introduction formula.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַן
  chosen: answered
  alternatives:
  - responded
  lexicon: HALOT
  rationale: The verb ענה in the wayyiqtol commonly introduces speech with the sense
    'answer' or 'respond.' Although no explicit prior question is present, 'answered'
    is a conventional and source-near English rendering for this Hebrew discourse
    formula.
- source_word: אִיּוֹב
  chosen: Job
  rationale: Personal name transliterated by standard English convention, in keeping
    with the translation philosophy to transliterate names rather than translate them.
- source_word: וַיֹּאמַר
  chosen: said
  alternatives:
  - spoke
  lexicon: HALOT
  rationale: אמר is the standard verb of speaking, and 'said' best preserves the simple
    narrative force. In combination with ויען, the pair forms a common Hebrew speech-introduction
    formula, naturally rendered 'answered and said.'
