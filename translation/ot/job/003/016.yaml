id: JOB.3.16
reference: Job 3:16
source:
  edition: WLC
  text: א֤וֹ כְ/נֵ֣פֶל טָ֭מוּן לֹ֣א אֶהְיֶ֑ה כְּ֝/עֹלְלִ֗ים לֹא רָ֥אוּ אֽוֹר־׃
translation:
  text: Or like a hidden miscarriage, I would not exist, like infants who never saw
    light.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'like a stillborn child.' The Hebrew noun can refer to a miscarriage
      or stillbirth; both convey the idea of one who never comes to live in the world.
    reason: lexical_alternative
  - marker: b
    text: Literally 'did not see light,' a Hebrew expression for not entering or experiencing
      earthly life.
    reason: cultural_note
lexical_decisions:
- source_word: א֤וֹ
  chosen: Or
  alternatives:
  - Or else
  lexicon: HALOT
  rationale: Introduces another alternative in Job's sequence of wished-for nonexistence
    scenarios; simple 'Or' is natural and sufficient.
- source_word: כְ/נֵ֣פֶל
  chosen: like a miscarriage
  alternatives:
  - like a stillborn child
  - like an untimely birth
  lexicon: HALOT
  rationale: נפל in this nominal form refers to an aborted fetus/miscarriage or stillbirth.
    'Miscarriage' is direct, modern, and fits the imagery of a life that never comes
    to full existence.
- source_word: טָ֭מוּן
  chosen: hidden
  alternatives:
  - buried
  - concealed
  lexicon: HALOT
  rationale: Passive participle from טמן, 'to hide/conceal.' 'Hidden' preserves the
    metaphor without overinterpreting it as specifically burial, though burial is
    an associated image.
- source_word: לֹ֣א אֶהְיֶ֑ה
  chosen: I would not exist
  alternatives:
  - I would not be
  - I would not have been
  lexicon: HALOT
  rationale: The idiom expresses nonexistence in Job's wish. 'I would not exist' communicates
    the sense clearly in modern English better than the more wooden 'I would not be.'
- source_word: כְּ֝/עֹלְלִ֗ים
  chosen: like infants
  alternatives:
  - like little children
  - like babies
  lexicon: HALOT
  rationale: עוללים denotes very young children/infants. 'Infants' best matches the
    context of those who died before experiencing life.
- source_word: לֹא רָ֥אוּ אֽוֹר
  chosen: who never saw light
  alternatives:
  - who did not see the light
  - who never saw daylight
  lexicon: HALOT
  rationale: '''See light'' is a Hebrew idiom for entering or experiencing life. ''Never
    saw light'' preserves the metaphor while remaining intelligible in English.'
