id: JOB.3.26
reference: Job 3:26
source:
  edition: WLC
  text: לֹ֤א שָׁלַ֨וְתִּי וְ/לֹ֖א שָׁקַ֥טְתִּי וְֽ/לֹא נָ֗חְתִּי וַ/יָּ֥בֹא רֹֽגֶז׀־׃פ
translation:
  text: I was not at ease, and I was not quiet; I was not at rest, and turmoil came.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I was not at peace ... I was not calm ... I did not rest.' The Hebrew
      uses three near-parallel verbs to intensify Job's lack of relief.
    reason: lexical_alternative
  - marker: b
    text: Or 'trouble came' or 'agitation came.' The noun can denote disturbance,
      unrest, or turmoil.
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁלַוְתִּי
  chosen: I was at ease
  alternatives:
  - I was at peace
  - I was secure
  - I was tranquil
  lexicon: HALOT
  rationale: From שׁלה/שׁלו, conveying ease, tranquility, or undisturbed security.
    'At ease' is natural English and preserves the experiential sense without overstating
    external safety.
- source_word: שָׁקַטְתִּי
  chosen: I was quiet
  alternatives:
  - I was undisturbed
  - I was calm
  - I was still
  lexicon: HALOT
  rationale: שׁקט denotes quietness or freedom from disturbance. 'Quiet' keeps the
    parallelism distinct from the surrounding terms while remaining idiomatic.
- source_word: נָחְתִּי
  chosen: I was at rest
  alternatives:
  - I rested
  - I settled down
  - I had rest
  lexicon: HALOT
  rationale: From נוח, to rest or settle. 'I was at rest' fits the stative sequence
    of the three perfect verbs and preserves the climactic parallelism.
- source_word: רֹגֶז
  chosen: turmoil
  alternatives:
  - trouble
  - agitation
  - distress
  - wrath
  lexicon: HALOT
  rationale: רֹגֶז can denote agitation, trembling, turmoil, or disturbance. In Job's
    lament, 'turmoil' best captures the onset of inner and outer upheaval without
    narrowing it to anger or generic trouble.
- source_word: וַיָּבֹא
  chosen: came
  alternatives:
  - has come
  - befell me
  lexicon: HALOT
  rationale: The waw-consecutive verb marks the resulting arrival of רֹגֶז. 'Came'
    is the plain sense; adding 'upon me' or 'befell me' would be interpretive since
    no explicit object marker is present.
- source_word: לֹא ... וְלֹא ... וְלֹא
  chosen: I was not ... and I was not ...; I was not ...
  alternatives:
  - Neither ... nor ... nor ...
  - I had no ... and no ... and no ...
  lexicon: Hebrew syntax
  rationale: The repeated negations create emphatic, rhythmic denial. Repeating 'I
    was not' in English preserves the Hebrew cadence and Job's intensifying lament
    better than compressing the clauses.
