id: JOB.3.23
reference: Job 3:23
source:
  edition: WLC
  text: לְ֭/גֶבֶר אֲשֶׁר דַּרְכּ֣/וֹ נִסְתָּ֑רָה וַ/יָּ֖סֶךְ אֱל֣וֹהַּ בַּעֲדֽ/וֹ־׃
translation:
  text: to a man whose way is hidden, whom God has hedged in?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'whose path is concealed.'
    reason: lexical_alternative
  - marker: b
    text: Or 'whom God has fenced in' or 'shut in.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לְגֶבֶר
  chosen: to a man
  alternatives:
  - for a man
  - to the man
  lexicon: HALOT
  rationale: The preposition ל introduces the indirect object/complement of the preceding
    rhetorical question from v. 20 ('Why is light given... to a man...?'). גבר commonly
    denotes a man, often with emphasis on a strong or individual male person. In keeping
    with the gender-accurate policy and the singular masculine form, 'man' is preferred
    over a neutralized 'person.'
- source_word: אֲשֶׁר
  chosen: whose
  alternatives:
  - for whom
  - that
  lexicon: HALOT
  rationale: The relative particle links 'man' with the following clause about his
    way. English idiom is smoother with the possessive-relative 'whose' before 'way,'
    while preserving the Hebrew sense.
- source_word: דַּרְכּוֹ
  chosen: his way
  alternatives:
  - his path
  - his course
  lexicon: HALOT
  rationale: דֶּרֶךְ can mean literal road or figurative course of life. In Job's
    lament the figurative sense of life's course/direction is prominent, but 'way'
    preserves the Hebrew metaphor without over-interpreting.
- source_word: נִסְתָּרָה
  chosen: is hidden
  alternatives:
  - has been hidden
  - is concealed
  lexicon: HALOT
  rationale: 'The Niphal conveys a passive/state sense. ''Is hidden'' is natural English
    and preserves the ambiguity: either the man''s way is obscured to him or hidden
    away generally. Present tense fits English rendering of the stative condition
    in context.'
- source_word: וַיָּסֶךְ
  chosen: has hedged in
  alternatives:
  - has fenced in
  - has shut in
  - has enclosed
  lexicon: HALOT
  rationale: The verb conveys blocking off or enclosing. 'Hedged in' is a well-established
    English equivalent in Job and captures the image of being hemmed in by God. The
    perfect-like English 'has hedged in' suits the completed divine action with continuing
    effect.
- source_word: אֱלוֹהַּ
  chosen: God
  alternatives:
  - God Almighty
  lexicon: HALOT
  rationale: אֱלוֹהַּ is the singular common poetic term for God in Job. It should
    be translated, not transliterated. 'God' is the straightforward equivalent; 'God
    Almighty' would import שַׁדַּי, which is not present here.
- source_word: בַּעֲדוֹ
  chosen: whom God has hedged in
  alternatives:
  - around him
  - about him
  - on his behalf
  lexicon: HALOT
  rationale: The preposition בעד with this verb most naturally expresses enclosure
    around someone. In idiomatic English, fronting the object into a relative clause
    ('whom God has hedged in') communicates the sense clearly. 'On his behalf' is
    possible for בעד elsewhere but does not fit this context.
