theological_decisions:
- issue: Agency of the affliction/enclosure
  chosen_reading: God is presented as the one who has enclosed the man.
  alternative_readings:
  - An impersonal passive sense minimizing divine agency
  rationale: The explicit subject אֱלוֹהַּ requires preserving divine agency in Job's
    lament. The translation should not soften Job's complaint by obscuring that God
    is said to have hedged the man in.
  doctrine_reference: Translation philosophy §1, §3
