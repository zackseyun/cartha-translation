id: JOB.3.1
reference: Job 3:1
source:
  edition: WLC
  text: אַחֲרֵי כֵ֗ן פָּתַ֤ח אִיּוֹב֙ אֶת פִּ֔י/הוּ וַ/יְקַלֵּ֖ל אֶת יוֹמֽ/וֹ־־־׃פ
translation:
  text: After this, Job opened his mouth and cursed his day.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the day of his birth.' The Hebrew reads literally 'his day.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַחֲרֵי כֵן
  chosen: After this
  alternatives:
  - Afterward
  - After that
  lexicon: HALOT
  rationale: The phrase is a common temporal transition meaning 'after this/that.'
    'After this' is natural modern English and preserves the narrative sequence without
    unnecessary archaism.
- source_word: פָּתַח ... אֶת פִּיהוּ
  chosen: opened his mouth
  alternatives:
  - began to speak
  lexicon: HALOT
  rationale: This is a Hebrew idiom introducing speech. Retaining 'opened his mouth'
    preserves the source expression and its solemn rhetorical force better than flattening
    it to 'began to speak.'
- source_word: אִיּוֹב
  chosen: Job
  rationale: Standard English transliteration of the personal name.
- source_word: וַיְקַלֵּל
  chosen: cursed
  alternatives:
  - reviled
  - denounced
  lexicon: HALOT
  rationale: The verb קלל in the Piel here means 'to curse.' 'Cursed' is the plain
    and established sense and should not be softened, since the verse introduces Job's
    lament in stark terms.
- source_word: אֶת יוֹמוֹ
  chosen: his day
  alternatives:
  - the day of his birth
  - his birthday
  lexicon: HALOT
  rationale: Literally 'his day.' In context this refers to the day of his birth,
    which the following verses make explicit, but the Hebrew here itself is concise.
    'His day' preserves the source wording while allowing the context to clarify the
    meaning.
