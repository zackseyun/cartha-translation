theological_decisions:
- issue: Whether to make explicit that 'his day' means the day of Job's birth
  chosen_reading: Keep the concise expression 'his day' in the main text
  alternative_readings:
  - the day of his birth
  - his birthday
  rationale: The Hebrew text does not explicitly say 'birth' in this verse, though
    the context soon clarifies it. Following optimal equivalence and preserving the
    text's own progression, the translation keeps the literal expression rather than
    importing explanatory detail into the main text.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Preserve theological tension rather than resolve it'
