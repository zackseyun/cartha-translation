id: JOB.3.4
reference: Job 3:4
source:
  edition: WLC
  text: הַ/יּ֥וֹם הַ/ה֗וּא יְֽהִ֫י חֹ֥שֶׁךְ אַֽל יִדְרְשֵׁ֣/הוּ אֱל֣וֹהַּ מִ/מָּ֑עַל
    וְ/אַל תּוֹפַ֖ע עָלָ֣י/ו נְהָרָֽה־־׃
translation:
  text: May that day be darkness; may God above not seek it, and may no light shine
    upon it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'may God from above not seek it'; the Hebrew verb can carry the sense
      of seeking, attending to, or caring for.
    reason: lexical_alternative
  - marker: b
    text: Or 'brightness' or 'radiance' for 'light.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהִי
  chosen: May ... be
  alternatives:
  - let ... be
  lexicon: HALOT
  rationale: The jussive expresses a wish or imprecation. 'May ... be' is natural
    modern English and preserves the optative force better than the more archaic 'let
    ... be' in this lament context.
- source_word: חֹשֶׁךְ
  chosen: darkness
  alternatives:
  - dark
  lexicon: HALOT
  rationale: The noun denotes darkness as a state or condition. 'Darkness' is more
    formally aligned with the Hebrew noun than the adjectival 'dark.'
- source_word: יִדְרְשֵׁהוּ
  chosen: seek it
  alternatives:
  - care for it
  - inquire after it
  lexicon: HALOT
  rationale: דרש commonly means 'seek' or 'inquire after.' In context Job wishes that
    God would take no notice of that day from above. 'Seek it' preserves the Hebrew
    imagery while allowing the contextual sense of regard or attention.
- source_word: אֱלוֹהַּ
  chosen: God
  alternatives:
  - God Almighty
  lexicon: HALOT
  rationale: אֱלוֹהַּ is the singular poetic form 'God,' common in Job. Nothing in
    the immediate context warrants expanding it to 'God Almighty.'
- source_word: מִמָּעַל
  chosen: above
  alternatives:
  - from above
  lexicon: HALOT
  rationale: The phrase modifies God's vantage point. English idiom is smoother with
    'God above' while retaining the spatial sense. 'From above' is possible but less
    natural here.
- source_word: תּוֹפַע
  chosen: shine
  alternatives:
  - flash forth
  - give light
  lexicon: HALOT
  rationale: The verb יפע in the Hiphil conveys shining forth or causing to appear
    brightly. 'Shine' is concise and idiomatic in parallel with the following noun
    for light.
- source_word: נְהָרָה
  chosen: light
  alternatives:
  - brightness
  - radiance
  - daylight
  lexicon: HALOT
  rationale: The noun denotes brightness or light. 'Light' best fits the poetic parallelism
    and is the most natural English equivalent; 'radiance' would sound overly elevated,
    and 'daylight' is more specific than the Hebrew requires.
- source_word: הַיּוֹם הַהוּא
  chosen: that day
  alternatives:
  - that very day
  lexicon: HALOT
  rationale: The demonstrative phrase points back to the day of Job's birth. 'That
    day' is the standard and sufficient rendering.
- source_word: עָלָיו
  chosen: upon it
  alternatives:
  - on it
  - over it
  lexicon: HALOT
  rationale: Refers back to 'that day' as masculine singular. 'Upon it' preserves
    the elevated poetic register without becoming archaic.
