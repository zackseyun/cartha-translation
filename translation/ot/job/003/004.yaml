theological_decisions:
- issue: Reference to God in a curse-like wish
  chosen_reading: Retain the direct reference 'God above' without softening or paraphrasing.
  alternative_readings:
  - heaven above
  - God in heaven
  rationale: The Hebrew explicitly names God (אֱלוֹהַּ). The translation should preserve
    Job's bold lament language rather than dilute it into an impersonal circumlocution.
  doctrine_reference: Translation philosophy §1, §3
