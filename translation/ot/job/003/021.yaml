id: JOB.3.21
reference: Job 3:21
source:
  edition: WLC
  text: הַֽ/מְחַכִּ֣ים לַ/מָּ֣וֶת וְ/אֵינֶ֑/נּוּ וַֽ֝/יַּחְפְּרֻ֗/הוּ מִ/מַּטְמוֹנִֽים׃
translation:
  text: who wait for death, but it does not come, and dig for it more than for hidden
    treasures,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and it is not there'; the Hebrew is literally 'and it is not,' meaning
      that death does not appear or arrive.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַמְחַכִּים
  chosen: who wait for
  alternatives:
  - who long for
  - who eagerly await
  lexicon: HALOT
  rationale: The participle from חכה denotes waiting, often with expectancy. 'Wait
    for' is the most direct rendering; 'long for' is possible from context, but the
    base lexical sense is waiting rather than desire alone.
- source_word: לַמָּוֶת
  chosen: for death
  lexicon: HALOT
  rationale: Straightforward preposition + noun construction. 'Death' is the object
    of waiting.
- source_word: וְאֵינֶנּוּ
  chosen: but it does not come
  alternatives:
  - and it is not there
  - and there is none
  lexicon: HALOT
  rationale: Literally 'and it is not,' with 3ms suffix referring to death. In English,
    the idiomatic sense in context is that death is absent or does not arrive. 'Does
    not come' best conveys the implied sense without wooden awkwardness.
- source_word: וַיַּחְפְּרֻהוּ
  chosen: and dig for it
  alternatives:
  - and search for it
  - and excavate it
  lexicon: HALOT
  rationale: The verb חפר literally means 'dig.' Here it is metaphorical for seeking
    death as one digs for buried valuables. Retaining 'dig for it' preserves the vivid
    imagery.
- source_word: מִמַּטְמוֹנִים
  chosen: more than for hidden treasures
  alternatives:
  - than for treasures
  - than for buried treasure
  lexicon: HALOT
  rationale: מַטְמוֹן refers to hidden or stored treasure. Because the comparison
    follows a digging metaphor, 'hidden treasures' preserves both the lexical sense
    and the imagery. 'More than for' reflects the comparative force of מִן in context.
