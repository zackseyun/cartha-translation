id: JOB.3.22
reference: Job 3:22
source:
  edition: WLC
  text: הַ/שְּׂמֵחִ֥ים אֱלֵי גִ֑יל יָ֝שִׂ֗ישׂוּ כִּ֣י יִמְצְאוּ קָֽבֶר־־׃
translation:
  text: who rejoice exceedingly, who exult when they find the grave—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'who rejoice to exultation'; the Hebrew phrase is an idiomatic intensifier.
    reason: lexical_alternative
  - marker: b
    text: Or 'because they find the grave.' The Hebrew conjunction can be read causally
      as well as temporally here.
    reason: alternative_reading
  - marker: c
    text: Or 'a grave.' Hebrew קָבֶר may be indefinite, but English idiom often uses
      'the grave' generically for death.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַשְּׂמֵחִים
  chosen: who rejoice
  alternatives:
  - the ones rejoicing
  - who are glad
  lexicon: HALOT
  rationale: 'The article with participle functions substantivally, continuing the
    description from the previous verse: ''those/who rejoice.'' ''Rejoice'' is a natural
    English verbal rendering that preserves the participial sense without awkwardness.'
- source_word: אֱלֵי גִיל
  chosen: exceedingly
  alternatives:
  - to exultation
  - for joy
  - unto rejoicing
  lexicon: HALOT
  rationale: The phrase is idiomatic and intensifying. Literally 'to/unto joy' or
    'toward exultation,' but in context it modifies the degree of rejoicing. 'Exceedingly'
    captures the intensification in readable English while avoiding a wooden rendering.
- source_word: יָשִׂישׂוּ
  chosen: who exult
  alternatives:
  - they rejoice
  - who are glad
  lexicon: HALOT
  rationale: This verb overlaps semantically with the previous participle but adds
    heightened jubilation. Rendering it as 'exult' preserves the poetic intensification
    rather than flattening both verbs into the same English gloss.
- source_word: כִּי
  chosen: when
  alternatives:
  - because
  - that
  lexicon: HALOT
  rationale: 'Here כִּי introduces the circumstance that occasions their exultation:
    their finding the grave. ''When'' fits the poetic logic better than a strictly
    causal ''because,'' though the causal nuance remains implicit.'
- source_word: יִמְצְאוּ
  chosen: they find
  alternatives:
  - they discover
  - they come upon
  lexicon: HALOT
  rationale: A straightforward rendering of מצא in context. 'Find' is idiomatic and
    preserves the stark simplicity of the Hebrew.
- source_word: קָבֶר
  chosen: the grave
  alternatives:
  - a grave
  - the tomb
  lexicon: HALOT
  rationale: In context Job speaks of death and burial as the longed-for end of suffering.
    'The grave' works idiomatically in English as a general destination of death.
    'A grave' is possible, but the generic English idiom favors 'the grave.'
