id: JOB.3.11
reference: Job 3:11
source:
  edition: WLC
  text: לָ֤/מָּה לֹּ֣א מֵ/רֶ֣חֶם אָמ֑וּת מִ/בֶּ֖טֶן יָצָ֣אתִי וְ/אֶגְוָֽע׃
translation:
  text: Why did I not die from the womb? Why did I come out from the belly and expire?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from the womb ... from the belly'; the Hebrew uses two related but distinct
      maternal-body terms in parallel.
    reason: lexical_alternative
  - marker: b
    text: Or 'and die' or 'and breathe my last'; the verb here is distinct from the
      earlier 'die' and may emphasize expiring.
    reason: lexical_alternative
lexical_decisions:
- source_word: לָמָּה
  chosen: Why
  alternatives:
  - For what reason
  lexicon: HALOT
  rationale: Standard interrogative of reason; 'Why' is the natural modern English
    equivalent and preserves Job's lamenting question.
- source_word: לֹא
  chosen: not
  lexicon: HALOT
  rationale: Simple negation attached to the first verbal clause.
- source_word: מֵרֶחֶם
  chosen: from the womb
  alternatives:
  - at birth
  - from the uterus
  lexicon: HALOT
  rationale: רֶחֶם literally denotes the womb. 'From the womb' preserves the concrete
    maternal imagery better than the more interpretive 'at birth.'
- source_word: אָמוּת
  chosen: did I die
  alternatives:
  - might I die
  - was I to die
  lexicon: HALOT
  rationale: Qal imperfect 1cs in this lament is best rendered idiomatically in English
    as a past counterfactual-style question, 'did I die,' matching the discourse context
    of regret over birth.
- source_word: מִבֶּטֶן
  chosen: from the belly
  alternatives:
  - from the womb
  lexicon: HALOT
  rationale: בֶּטֶן can denote belly/womb. Here it is parallel to רֶחֶם. I retained
    a distinct English gloss, 'belly,' to reflect the lexical variation in Hebrew
    while keeping the birth imagery clear.
- source_word: יָצָאתִי
  chosen: did I come out
  alternatives:
  - did I emerge
  - was I born
  lexicon: HALOT
  rationale: Literally 'I came out/went out.' 'Did I come out' preserves the concrete
    imagery of emergence from the womb better than the more abstract 'was I born.'
- source_word: וְאֶגְוָע
  chosen: and expire
  alternatives:
  - and die
  - and breathe my last
  lexicon: HALOT
  rationale: גוע often carries the nuance of expiring/breathing one's last. 'Expire'
    preserves a slight distinction from מות ('die') in the first clause while remaining
    readable.
