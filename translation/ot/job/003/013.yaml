id: JOB.3.13
reference: Job 3:13
source:
  edition: WLC
  text: כִּֽי עַ֭תָּה שָׁכַ֣בְתִּי וְ/אֶשְׁק֑וֹט יָ֝שַׁ֗נְתִּי אָ֤ז יָנ֬וּחַֽ לִֽ/י־׀׃
translation:
  text: For now I would have lain down and been quiet; I would have slept—then I would
    have been at rest.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'and been quiet'; alternatively 'and been still' or 'and been at
      peace.'
    reason: lexical_alternative
  - marker: b
    text: Or 'then there would have been rest for me.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Surely
  - Indeed
  lexicon: HALOT
  rationale: Introduces the reason or explanation for Job's wish in the preceding
    context. 'For' best preserves the causal/explanatory force in natural English.
- source_word: עַתָּה
  chosen: now
  alternatives:
  - by now
  - at this time
  lexicon: HALOT
  rationale: Temporal adverb indicating the present hypothetical result had he died
    at birth. 'Now' is concise and idiomatic; the counterfactual sense is supplied
    by the verbal sequence.
- source_word: שָׁכַבְתִּי
  chosen: I would have lain down
  alternatives:
  - I would have lain
  - I had lain down
  lexicon: HALOT
  rationale: Qal perfect 1cs of שכב ('lie down'). In context it expresses a past counterfactual
    result. 'Lain down' preserves the bodily imagery of death/rest better than a flatter
    'lain'.
- source_word: וְאֶשְׁקֹט
  chosen: and been quiet
  alternatives:
  - and been at peace
  - and been still
  lexicon: HALOT
  rationale: From שקט, denoting quietness, undisturbed calm. 'Been quiet' keeps the
    lexical sense close to the Hebrew and fits the parallelism with sleep and rest.
    'Been at peace' would interpret more than translate.
- source_word: יָשַׁנְתִּי
  chosen: I would have slept
  alternatives:
  - I had slept
  lexicon: HALOT
  rationale: Qal perfect 1cs of ישׁן. Sleep is a common metaphor here for death, but
    the Hebrew uses the ordinary verb; the translation preserves the metaphor without
    over-explaining it.
- source_word: אָז
  chosen: then
  alternatives:
  - at that time
  lexicon: HALOT
  rationale: 'Marks the consequent stage in the poetic sequence: lying down, sleeping,
    then resting. ''Then'' is the most natural equivalent.'
- source_word: יָנוּחַ לִי
  chosen: I would have been at rest
  alternatives:
  - there would have been rest for me
  - I would have rested
  lexicon: HALOT
  rationale: נוּחַ with לִי is literally 'it would rest for me' or 'there would be
    rest for me.' English idiom favors 'I would have been at rest,' which preserves
    the state of repose while reading naturally. This also differentiates it slightly
    from the prior 'been quiet'.
