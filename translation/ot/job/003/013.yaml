theological_decisions:
- issue: Death imagery expressed through sleep and rest
  chosen_reading: Retain the literal language of lying down, sleeping, and being at
    rest without making an explicit doctrinal claim about the state of the dead.
  alternative_readings:
  - Interpret 'sleep' directly as 'be dead'
  - Expand to 'rest in death'
  rationale: The verse poetically describes the desired repose of death, but it does
    so through ordinary verbs for lying down, sleeping, and resting. Preserving the
    imagery maintains the text's poetic and theological tension without importing
    a fuller doctrine of the intermediate state.
  doctrine_reference: Preserve theological tension rather than resolve it.
