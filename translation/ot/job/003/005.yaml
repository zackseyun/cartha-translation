id: JOB.3.5
reference: Job 3:5
source:
  edition: WLC
  text: יִגְאָלֻ֡/הוּ חֹ֣שֶׁךְ וְ֭/צַלְמָוֶת תִּשְׁכָּן עָלָ֣י/ו עֲנָנָ֑ה יְ֝בַעֲתֻ֗/הוּ
    כִּֽמְרִ֥ירֵי יֽוֹם־׃
translation:
  text: May darkness and deep shadow reclaim it; may a cloud settle over it; may the
    blacknesses of the day terrify it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'death-shadow' or 'deep darkness' for צַלְמָוֶת.
    reason: lexical_alternative
  - marker: b
    text: The phrase 'the blacknesses of the day' is difficult; it may also mean 'the
      day's blackness,' 'eclipses of the day,' or less likely 'the bitternesses of
      the day.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יִגְאָלֻהוּ
  chosen: reclaim it
  alternatives:
  - redeem it
  - claim it back
  lexicon: HALOT
  rationale: From גאל, whose core sense is to act as kinsman-redeemer or reclaim/recover
    what belongs to one. In this curse context, 'redeem' would mislead in English
    with positive theological overtones, so 'reclaim it' preserves the sense of taking
    back into darkness.
- source_word: חֹשֶׁךְ
  chosen: darkness
  lexicon: HALOT
  rationale: Standard rendering for literal and figurative darkness; here part of
    Job's wish that the day of his birth be undone.
- source_word: צַלְמָוֶת
  chosen: deep shadow
  alternatives:
  - death-shadow
  - deep darkness
  lexicon: HALOT
  rationale: The term can be understood traditionally as 'shadow of death' or more
    broadly as 'deep darkness.' To avoid over-reading explicit death language while
    preserving the grave, oppressive imagery, 'deep shadow' is used in the main text,
    with alternatives preserved in a footnote.
- source_word: תִּשְׁכָּן עָלָיו
  chosen: settle over it
  alternatives:
  - dwell upon it
  - rest upon it
  lexicon: HALOT
  rationale: שׁכן means to dwell, settle, reside. With עַל, the idiomatic sense is
    that the cloud comes to rest over the day. 'Settle over it' is natural modern
    English and keeps the image.
- source_word: עֲנָנָה
  chosen: a cloud
  alternatives:
  - cloud-mass
  lexicon: HALOT
  rationale: Concrete meteorological image; singular collective sense works well in
    English as 'a cloud.'
- source_word: יְבַעֲתֻהוּ
  chosen: terrify it
  alternatives:
  - frighten it
  - make it afraid
  lexicon: HALOT
  rationale: בעת in the Piel conveys causing terror or sudden dread. 'Terrify' best
    matches the intensity of Job's imprecation.
- source_word: כִּמְרִירֵי יוֹם
  chosen: the blacknesses of the day
  alternatives:
  - day's blackness
  - eclipses of the day
  - bitternesses of the day
  lexicon: HALOT
  rationale: A difficult phrase. The noun likely denotes darkenings/blacknesses rather
    than emotional bitterness in this context, fitting the surrounding imagery of
    darkness, cloud, and terror. The plural is retained as 'blacknesses' to reflect
    the Hebrew form and preserve the poetic strangeness. Alternative understandings
    are preserved in a footnote.
