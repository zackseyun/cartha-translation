id: JOB.3.18
reference: Job 3:18
source:
  edition: WLC
  text: יַ֭חַד אֲסִירִ֣ים שַׁאֲנָ֑נוּ לֹ֥א שָׁ֝מְע֗וּ ק֣וֹל נֹגֵֽשׂ׃
translation:
  text: There the prisoners are at ease together; they do not hear the voice of the
    taskmaster.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "the oppressor" or "the exactor" for "the taskmaster."
    reason: lexical_alternative
lexical_decisions:
- source_word: יַחַד
  chosen: together
  alternatives:
  - altogether
  - in unity
  lexicon: HALOT
  rationale: Adverb modifying the prisoners' state; 'together' is the most natural
    English rendering and preserves the sense that they share this condition collectively.
- source_word: אֲסִירִים
  chosen: the prisoners
  alternatives:
  - captives
  - those bound
  lexicon: HALOT
  rationale: Refers to people under confinement. 'Prisoners' is the clearest modern
    English equivalent in context, fitting Job's depiction of death/Sheol as a place
    where earthly oppression ceases.
- source_word: שַׁאֲנָנוּ
  chosen: are at ease
  alternatives:
  - are at rest
  - are secure
  - are undisturbed
  lexicon: HALOT
  rationale: Conveys quietness, ease, and freedom from disturbance. 'Are at ease'
    preserves the experiential sense without overstating it as full 'rest,' which
    could overlap too strongly with other Hebrew terms.
- source_word: לֹא שָׁמְעוּ
  chosen: they do not hear
  alternatives:
  - they did not hear
  - they no longer hear
  lexicon: HALOT
  rationale: 'A qatal form in poetry can express a present stative/resultative sense
    in context. Since the verse describes the condition of the dead in parallel lines,
    present English best conveys the ongoing state: they are in a place where they
    do not hear.'
- source_word: קוֹל
  chosen: the voice
  alternatives:
  - the sound
  - the cry
  lexicon: HALOT
  rationale: '''Voice'' is the standard rendering and suits the following participle,
    indicating the audible command or demand of an oppressor.'
- source_word: נֹגֵשׂ
  chosen: the taskmaster
  alternatives:
  - the oppressor
  - the slave driver
  - the exactor
  lexicon: HALOT
  rationale: The term denotes one who drives or exacts labor or payment. 'Taskmaster'
    fits the context of prisoners and oppression, and is idiomatic English without
    narrowing the image exclusively to slavery. 'Oppressor' is broader but less concrete;
    'slave driver' is vivid but too specific for the Hebrew here.
