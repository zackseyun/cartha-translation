id: JOB.3.10
reference: Job 3:10
source:
  edition: WLC
  text: כִּ֤י לֹ֣א סָ֭גַר דַּלְתֵ֣י בִטְנִ֑/י וַ/יַּסְתֵּ֥ר עָ֝מָ֗ל מֵ/עֵינָֽ/י׃
translation:
  text: because it did not shut the doors of my womb, nor hide trouble from my eyes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my belly.' In context, 'womb' best fits the reference to Job's birth.
    reason: lexical_alternative
  - marker: b
    text: Or 'misery,' 'toil,' or 'sorrow' for 'trouble.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  lexicon: HALOT
  rationale: Introduces the reason for Job's curse on the night/day in the surrounding
    context. 'Because' is natural modern English and preserves the causal force.
- source_word: סָגַר
  chosen: shut
  alternatives:
  - close
  lexicon: HALOT
  rationale: The verb means to shut or close. 'Shut' fits idiomatic English with 'doors'
    and preserves the concrete image.
- source_word: דַּלְתֵי
  chosen: doors
  alternatives:
  - gates
  lexicon: HALOT
  rationale: The noun refers to doors/panels. 'Doors' is the straightforward rendering
    and matches the birth/womb metaphor.
- source_word: בִטְנִי
  chosen: my womb
  alternatives:
  - my belly
  lexicon: HALOT
  rationale: Although the noun can denote belly or womb, in this birth context Job
    is speaking of the place of gestation; 'womb' best conveys the intended sense
    in English.
- source_word: וַיַּסְתֵּר
  chosen: nor hide
  alternatives:
  - and hide
  - and conceal
  lexicon: HALOT
  rationale: 'With the preceding negation, English idiom naturally carries the negative
    over: ''did not shut... nor hide...''. ''Hide'' is simpler and preserves the sense
    of concealment.'
- source_word: עָמָל
  chosen: trouble
  alternatives:
  - misery
  - toil
  - sorrow
  lexicon: HALOT
  rationale: The term can denote trouble, misery, or painful toil. In Job's lament,
    it points broadly to the suffering he has experienced. 'Trouble' is concise and
    sufficiently broad, while 'misery' remains a plausible contextual alternative.
- source_word: מֵעֵינָי
  chosen: from my eyes
  alternatives:
  - from before my eyes
  - from my sight
  lexicon: HALOT
  rationale: A fairly literal rendering preserves the Hebrew idiom. It conveys that
    the suffering was not kept from Job's seeing/experiencing it.
