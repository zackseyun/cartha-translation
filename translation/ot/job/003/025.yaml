id: JOB.3.25
reference: Job 3:25
source:
  edition: WLC
  text: כִּ֤י פַ֣חַד פָּ֭חַדְתִּי וַ/יֶּאֱתָיֵ֑/נִי וַ/אֲשֶׁ֥ר יָ֝גֹ֗רְתִּי יָ֣בֹא
    לִֽ/י׃
translation:
  text: For the dread I dreaded has come upon me, and what I feared has come to me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the thing I feared has come upon me.' The Hebrew uses a noun plus a
      cognate verb ('dread I dreaded') for emphasis.
    reason: lexical_alternative
  - marker: b
    text: The first clause's verb likely means 'has come upon/overtaken me,' while
      the second more literally says 'has come to me,' preserving a slight variation
      in the Hebrew parallelism.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Surely
  - Because
  lexicon: HALOT
  rationale: Here כִּי introduces Job's explanation of the preceding complaint, so
    'For' best captures the causal/explanatory force in natural English.
- source_word: פַחַד / פָּחַדְתִּי
  chosen: the dread I dreaded
  alternatives:
  - what I feared, I feared
  - the thing I feared
  - terror I feared
  lexicon: HALOT
  rationale: The noun + cognate verb construction intensifies the statement. Rendering
    both terms preserves the Hebrew emphasis better than collapsing them into a single
    English verb. 'Dread' communicates intense fear without sounding overly wooden.
- source_word: וַיֶּאֱתָיֵנִי
  chosen: has come upon me
  alternatives:
  - has overtaken me
  - has come to me
  - has happened to me
  lexicon: HALOT
  rationale: The verb from אתה in this context conveys something coming upon or befalling
    someone. 'Has come upon me' fits the calamity context and distinguishes this clause
    from the later יָבוֹא לִי, which is more naturally 'come to me.'
- source_word: וַאֲשֶׁר
  chosen: and what
  alternatives:
  - and that which
  - and what it was that
  lexicon: HALOT
  rationale: Introduces the second parallel clause with a relative sense. 'And what'
    is idiomatic and preserves the parallelism.
- source_word: יָגֹרְתִּי
  chosen: I feared
  alternatives:
  - I dreaded
  - I was afraid of
  lexicon: HALOT
  rationale: גור in this stem denotes fearing or dreading. 'I feared' is straightforward
    and keeps the parallel with the first colon while allowing the first colon's intensified
    cognate construction to stand out.
- source_word: יָבֹא לִי
  chosen: has come to me
  alternatives:
  - has befallen me
  - has come upon me
  lexicon: HALOT
  rationale: Though the Hebrew form is imperfect, English present perfect suits the
    context of realized calamity. 'Has come to me' preserves the simple motion idiom
    and maintains a distinction from the previous clause's stronger 'come upon me.'
