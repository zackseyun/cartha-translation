id: JOB.3.12
reference: Job 3:12
source:
  edition: WLC
  text: מַ֭דּוּעַ קִדְּמ֣וּ/נִי בִרְכָּ֑יִם וּ/מַה שָּׁ֝דַ֗יִם כִּ֣י אִינָֽק־׃
translation:
  text: Why did knees receive me, and why breasts, that I should nurse?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'that I might suck' or 'that I might suckle.' The Hebrew verb refers
      to an infant drawing milk.
    reason: lexical_alternative
  - marker: b
    text: '''Knees'' likely refers to the newborn being received onto the knees or
      lap at birth.'
    reason: cultural_note
lexical_decisions:
- source_word: מַדּוּעַ
  chosen: Why
  alternatives:
  - Why was it that
  - For what reason
  lexicon: HALOT
  rationale: Interrogative adverb introducing Job's lament. Simple 'Why' best matches
    the direct force in natural English.
- source_word: קִדְּמוּנִי
  chosen: did ... receive me
  alternatives:
  - met me
  - came before me
  - welcomed me
  lexicon: HALOT
  rationale: From קדם in the sense of coming to meet or receiving. In context with
    'knees,' the idiom refers to being received at birth or on the lap. 'Receive me'
    communicates the idiomatic sense more clearly than the overly literal 'met me.'
- source_word: בִרְכָּיִם
  chosen: knees
  alternatives:
  - a lap
  lexicon: HALOT
  rationale: Literal plural 'knees' should be retained. The image likely evokes the
    newborn being placed on the knees, but the concrete term is preserved in the main
    text.
- source_word: וּמַה
  chosen: and why
  alternatives:
  - and what
  lexicon: HALOT
  rationale: Though literally 'and what,' in this interrogative parallelism it functions
    idiomatically as 'and why,' matching the first colon and standard English usage.
- source_word: שָׁדַיִם
  chosen: breasts
  alternatives:
  - a mother's breasts
  lexicon: HALOT
  rationale: Literal anatomical term is appropriate and clear in context. Adding 'mother's'
    would interpret beyond the Hebrew, though the referent is obvious.
- source_word: כִּי
  chosen: that
  alternatives:
  - for
  - so that
  lexicon: HALOT
  rationale: 'Here כִּי introduces the result/purpose clause tied to the second question.
    ''That'' yields natural English: ''why breasts, that I should nurse?''.'
- source_word: אִינָק
  chosen: I should nurse
  alternatives:
  - I might suck
  - I might suckle
  lexicon: HALOT
  rationale: The verb denotes an infant's sucking/nursing. 'Nurse' is readable modern
    English and avoids the awkwardness of 'suck' while preserving the maternal-feeding
    sense. Because 'nurse' can be misunderstood as active feeding by the mother, the
    subject 'I' and a footnote preserve the more literal alternative.
