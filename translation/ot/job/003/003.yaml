id: JOB.3.3
reference: Job 3:3
source:
  edition: WLC
  text: יֹ֣אבַד י֭וֹם אִוָּ֣לֶד בּ֑/וֹ וְ/הַ/לַּ֥יְלָה אָ֝מַ֗ר הֹ֣רָה גָֽבֶר׃
translation:
  text: May the day perish on which I was born, and the night that said, ‘A man has
    been conceived.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and the night that said, “A male child is conceived.”'
    reason: lexical_alternative
lexical_decisions:
- source_word: יֹאבַד
  chosen: May ... perish
  alternatives:
  - let ... perish
  - perish
  lexicon: HALOT
  rationale: The jussive/imprecatory force is best conveyed in English with 'May ...
    perish,' expressing Job's curse-wish rather than a simple future 'will perish.'
- source_word: יוֹם
  chosen: the day
  alternatives:
  - day
  lexicon: HALOT
  rationale: 'Definite in sense in context: the specific day of Job''s birth is in
    view.'
- source_word: אִוָּלֶד בּוֹ
  chosen: on which I was born
  alternatives:
  - in which I was born
  - when I was born
  lexicon: HALOT
  rationale: The Niphal of ילד is passive/reflexive in sense, 'I was born.' English
    idiom prefers 'on which' with 'day' rather than the more literal 'in which.'
- source_word: וְהַלַּיְלָה
  chosen: and the night
  alternatives:
  - even the night
  lexicon: HALOT
  rationale: Coordinates the second object of Job's curse, parallel to 'the day.'
- source_word: אָמַר
  chosen: that said
  alternatives:
  - which said
  - saying
  lexicon: HALOT
  rationale: The night is personified as making an announcement; 'that said' preserves
    the personification naturally in English.
- source_word: הֹרָה
  chosen: has been conceived
  alternatives:
  - has conceived
  - was brought forth
  lexicon: HALOT
  rationale: 'Here the passive/impersonal sense fits the birth-announcement context:
    conception has occurred. ''Has been conceived'' avoids making the night itself
    the conceiving subject and matches the parallelism with Job''s origin.'
- source_word: גָבֶר
  chosen: a man
  alternatives:
  - a male child
  - a boy
  lexicon: HALOT
  rationale: Gender-accurate rendering is required by the translation philosophy.
    גבר denotes a male person/man; in this birth context it can imply male child,
    but 'a man' preserves the Hebrew term more directly while remaining idiomatic
    in an announcement formula.
