id: JOB.3.14
reference: Job 3:14
source:
  edition: WLC
  text: עִם מְ֭לָכִים וְ/יֹ֣עֲצֵי אָ֑רֶץ הַ/בֹּנִ֖ים חֳרָב֣וֹת לָֽ/מוֹ־׃
translation:
  text: with kings and counselors of the earth, who built ruins for themselves,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'who rebuilt desolate places for themselves.' The Hebrew can be understood
      either as building monumental ruins/tombs or as rebuilding devastated places.
    reason: alternative_reading
  - marker: b
    text: '''Earth'' may also be understood as ''land'' or ''realm'' in this context.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עִם
  chosen: with
  alternatives:
  - among
  lexicon: HALOT
  rationale: The preposition straightforwardly means 'with' here, continuing Job's
    wish that he had lain in death in the company of the great dead.
- source_word: מְלָכִים
  chosen: kings
  alternatives:
  - royal ones
  lexicon: HALOT
  rationale: The common noun for rulers is best rendered 'kings' in ordinary English.
- source_word: יֹעֲצֵי אָרֶץ
  chosen: counselors of the earth
  alternatives:
  - advisers of the land
  - counselors of the land
  lexicon: HALOT
  rationale: The construct phrase denotes high-ranking advisers associated with the
    realm. 'Counselors of the earth' preserves the Hebrew wording and the elevated
    tone; 'earth' here carries the sense of the land/realm but need not be reduced
    in the main text.
- source_word: הַבֹּנִים
  chosen: who built
  alternatives:
  - those who built
  - who rebuilt
  lexicon: HALOT
  rationale: The participle functions attributively, describing the kings and counselors.
    Rendering it as a relative clause is natural English. 'Built' is preferable to
    'rebuilt' because the Hebrew verb itself does not explicitly mark repetition,
    even if context may suggest restoration.
- source_word: חֳרָבוֹת
  chosen: ruins
  alternatives:
  - desolate places
  - waste places
  lexicon: HALOT
  rationale: The noun commonly denotes ruins or devastated places. 'Ruins' is concise
    and idiomatic, while preserving the stark image. The phrase likely refers either
    to monumental tombs in desolate places or to rebuilding devastated sites; the
    lexical sense 'ruins' should remain visible in translation.
- source_word: לָמוֹ
  chosen: for themselves
  alternatives:
  - for them
  - for themselves alone
  lexicon: HALOT
  rationale: 'The pronominal form here is best taken reflexively in context: they
    built these ruins for themselves, likely as self-regarding monuments or tombs.
    This is the most natural English rendering in this poetic line.'
