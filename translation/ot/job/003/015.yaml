id: JOB.3.15
reference: Job 3:15
source:
  edition: WLC
  text: א֣וֹ עִם שָׂ֭רִים זָהָ֣ב לָ/הֶ֑ם הַֽ/מְמַלְאִ֖ים בָּתֵּי/הֶ֣ם כָּֽסֶף־׃
translation:
  text: or with princes who had gold, who filled their houses with silver—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'nobles' or 'rulers' for 'princes' (שָׂרִים).
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'their houses'; 'palaces' is a possible contextual interpretation
      but is more specific than the source text.
    reason: lexical_alternative
lexical_decisions:
- source_word: א֣וֹ
  chosen: or
  alternatives:
  - or else
  lexicon: HALOT
  rationale: Continues Job's series of unrealized alternatives in vv. 13–16; simple
    coordinating 'or' best preserves the poetic sequence.
- source_word: עִם
  chosen: with
  alternatives:
  - among
  lexicon: HALOT
  rationale: The preposition marks association/company with the dead rulers and nobles
    imagined in Sheol; 'with' is the most direct rendering.
- source_word: שָׂרִים
  chosen: princes
  alternatives:
  - officials
  - rulers
  - nobles
  lexicon: HALOT
  rationale: The term denotes high-ranking leaders. 'Princes' fits the elevated poetic
    register and pairs naturally with the wealth imagery that follows. 'Rulers' is
    possible but less specific in tone.
- source_word: זָהָב לָהֶם
  chosen: who had gold
  alternatives:
  - for whom there was gold
  - with gold belonging to them
  lexicon: HALOT
  rationale: The phrase is idiomatic, describing possession of wealth. English 'who
    had gold' communicates the sense naturally without over-literal awkwardness.
- source_word: הַמְמַלְאִים
  chosen: who filled
  alternatives:
  - those filling
  - who were filling
  lexicon: HALOT
  rationale: The participle functions substantivally/appositionally, further describing
    the princes. A relative clause in past sense fits the context of deceased great
    men Job imagines being with.
- source_word: בָּתֵּיהֶם
  chosen: their houses
  alternatives:
  - their palaces
  lexicon: HALOT
  rationale: The base noun is 'houses.' Given the elite referent, 'palaces' is interpretive
    and stronger than the Hebrew warrants, so 'houses' is retained.
- source_word: כָּסֶף
  chosen: silver
  alternatives:
  - money
  lexicon: HALOT
  rationale: In this poetic wealth context, the literal precious metal is preferable.
    'Money' would flatten the imagery and import a more abstract economic sense.
