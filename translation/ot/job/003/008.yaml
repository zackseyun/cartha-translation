theological_decisions:
- issue: Referent and imagery of Leviathan
  chosen_reading: Retain 'Leviathan' as the poetic/mythic creature invoked in Job's
    curse language without resolving whether the text intends a literal animal, mythic
    chaos monster, or symbolic figure.
  alternative_readings:
  - crocodile
  - sea monster
  - symbol of chaos
  rationale: The verse uses ancient poetic imagery. Translating the name directly
    preserves the text's tension and avoids importing a narrowed interpretation not
    demanded by the Hebrew.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather
    than resolve it); §2 (transliterate names)
