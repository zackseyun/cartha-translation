id: JOB.3.8
reference: Job 3:8
source:
  edition: WLC
  text: יִקְּבֻ֥/הוּ אֹרְרֵי י֑וֹם הָ֝/עֲתִידִ֗ים עֹרֵ֥ר לִוְיָתָֽן־׃
translation:
  text: Let those who curse days curse it, those ready to rouse Leviathan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'those ready to stir up Leviathan.' The image may evoke a mythic chaos
      creature rather than a merely ordinary animal.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'those who curse day'; the sense may be generic ('days') or collective/professional,
      referring to those thought able to pronounce curses on ominous times.
    reason: lexical_alternative
lexical_decisions:
- source_word: יִקְּבֻהוּ
  chosen: Let ... curse it
  alternatives:
  - Let ... denounce it
  - Let ... pierce it
  lexicon: HALOT
  rationale: From נקב in the Piel/denominative sense used idiomatically for cursing.
    In context with 'those who curse days,' the sense is imprecatory speech against
    the night/day in view, not literal piercing. The jussive nuance is carried by
    'Let ...' and the 3ms suffix refers back to the night/day under lament.
- source_word: אֹרְרֵי
  chosen: those who curse
  alternatives:
  - the cursers of
  lexicon: HALOT
  rationale: Active participle of ארר, denoting people characterized by cursing. 'Those
    who curse' is natural modern English and preserves the participial force.
- source_word: יוֹם
  chosen: days
  alternatives:
  - the day
  - day
  lexicon: HALOT
  rationale: Although singular in form, the expression 'cursers of day' is commonly
    understood generically/class-wise. 'Days' makes the idiom intelligible in English
    without over-specifying a single calendrical day. The plural also fits the class
    of professional cursers who curse ominous days.
- source_word: הָעֲתִידִים
  chosen: those ready to
  alternatives:
  - those prepared to
  - those destined to
  lexicon: HALOT
  rationale: Adjectival/participial form from עתד conveying readiness or preparedness.
    'Ready to' best fits the immediate construction with the infinitive/verb 'to rouse'.
- source_word: עֹרֵר
  chosen: rouse
  alternatives:
  - stir up
  - awaken
  lexicon: HALOT
  rationale: The verb עור means to arouse/stir up. 'Rouse' is vivid and concise, fitting
    the poetic image of summoning a cosmic monster.
- source_word: לִוְיָתָן
  chosen: Leviathan
  alternatives:
  - the sea monster
  lexicon: HALOT
  rationale: A proper/mythic name is best transliterated per project philosophy. Transliteration
    preserves the poetic and cultural force better than flattening it to a generic
    creature term.
