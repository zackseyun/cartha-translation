id: JOB.3.20
reference: Job 3:20
source:
  edition: WLC
  text: לָ֤/מָּה יִתֵּ֣ן לְ/עָמֵ֣ל א֑וֹר וְ֝/חַיִּ֗ים לְ/מָ֣רֵי נָֽפֶשׁ׃
translation:
  text: Why is light given to the troubled, and life to the bitter in soul?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Why does he give light to the miserable, and life to those bitter of
      soul?' The Hebrew leaves the giver unstated, though God is likely implied in
      context.
    reason: alternative_reading
  - marker: b
    text: '''Light'' is a poetic image for continued existence; the Hebrew keeps the
      metaphor rather than stating ''life'' directly in the first clause.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לָמָּה
  chosen: Why
  alternatives:
  - Why is it that
  - For what reason
  lexicon: HALOT
  rationale: Interrogative adverb introducing Job's lament question. Simple 'Why'
    best preserves the force and poetic directness.
- source_word: יִתֵּן
  chosen: is given
  alternatives:
  - does he give
  - gives
  lexicon: HALOT
  rationale: The Hebrew is 3ms 'he gives,' but no explicit subject is stated. English
    passive avoids importing 'God' into the line while preserving the sense of bestowed
    existence; this fits the lament context and keeps the implied agent unstated.
- source_word: לְעָמֵל
  chosen: to the troubled
  alternatives:
  - to the miserable
  - to the weary
  - to the afflicted
  lexicon: HALOT
  rationale: עָמֵל can denote one in misery, trouble, or toil. In Job's lament context,
    the emphasis is not ordinary labor but painful misery. 'Troubled' is natural modern
    English and broad enough to include suffering without over-specifying.
- source_word: אוֹר
  chosen: light
  lexicon: HALOT
  rationale: Retained literally. In context it stands metonymically for continued
    existence or the experience of life, but 'light' is the Hebrew image and should
    be preserved.
- source_word: וְחַיִּים
  chosen: and life
  alternatives:
  - and living
  lexicon: HALOT
  rationale: Though morphologically plural, חַיִּים commonly functions idiomatically
    as 'life.' Singular English is the natural equivalent.
- source_word: לְמָרֵי נָפֶשׁ
  chosen: to the bitter in soul
  alternatives:
  - to those bitter of soul
  - to the embittered
  - to the bitter in spirit
  lexicon: HALOT
  rationale: The construct phrase literally means 'to the bitter ones of soul.' 'Bitter
    in soul' preserves the Hebrew idiom and emotional depth better than flattening
    it to merely 'embittered.' 'Soul' is retained rather than 'spirit' because נֶפֶשׁ
    here refers to the inner self/person in distress.
