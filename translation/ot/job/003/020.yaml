theological_decisions:
- issue: Implicit subject of יִתֵּן
  chosen_reading: Leave the giver implicit by using English passive ('is given').
  alternative_readings:
  - 'Use active with implied divine subject: ''Why does he give...'''
  - 'Use explicit divine subject: ''Why does God give...'''
  rationale: The verse likely implies God as giver, but the Hebrew does not name him
    here. Preserving the implicitness maintains the rhetorical and theological tension
    of Job's complaint without making the accusation more explicit than the text does.
  doctrine_reference: 'Translation philosophy #3: Preserve theological tension rather
    than resolve it.'
