id: JOB.3.7
reference: Job 3:7
source:
  edition: WLC
  text: הִנֵּ֤ה הַ/לַּ֣יְלָה הַ֭/הוּא יְהִ֣י גַלְמ֑וּד אַל תָּבֹ֖א רְנָנָ֣ה בֽ/וֹ־׃
translation:
  text: Look, may that night be barren; let no joyful cry enter it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'let no singing come into it' or 'let no shout of joy enter it.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - Indeed
  - See
  lexicon: HALOT
  rationale: Introduces emphatic attention to the curse wish. 'Look' preserves the
    deictic force in readable modern English better than archaic 'Behold.'
- source_word: הַלַּיְלָה הַהוּא
  chosen: that night
  alternatives:
  - the night, that one
  - that very night
  lexicon: HALOT
  rationale: The article + demonstrative points to the specific night of Job's birth
    already under denunciation. 'That night' is natural English and preserves the
    specificity.
- source_word: יְהִי
  chosen: may ... be
  alternatives:
  - let ... be
  - shall ... be
  lexicon: HALOT
  rationale: Jussive verb expressing a wish/curse. 'May ... be' communicates the optative
    force clearly in English.
- source_word: גַלְמוּד
  chosen: barren
  alternatives:
  - desolate
  - sterile
  - bare
  lexicon: HALOT
  rationale: The adjective denotes barrenness/childlessness/emptiness. In context
    of a night personified as producing or hosting celebration, 'barren' best captures
    the curse that it yield nothing. 'Desolate' is possible but less tied to the imagery
    of fruitlessness.
- source_word: אַל
  chosen: let no
  alternatives:
  - may not
  - do not let
  lexicon: HALOT
  rationale: Negative particle with jussive/imperfect continues the imprecatory wish.
    'Let no' fits idiomatic English parallelism.
- source_word: תָּבֹא
  chosen: enter
  alternatives:
  - come
  - arrive
  lexicon: HALOT
  rationale: The verb literally means 'come/enter.' With בּוֹ ('into it'), 'enter'
    makes the spatial sense explicit in English.
- source_word: רְנָנָה
  chosen: joyful cry
  alternatives:
  - shout of joy
  - singing
  - rejoicing
  lexicon: HALOT
  rationale: The noun can denote ringing cry, especially joyful shouting or singing.
    'Joyful cry' preserves the vocal, celebratory sense without over-specifying music.
    Because 'singing' is a common alternative in context, it is preserved in a footnote.
- source_word: בּוֹ
  chosen: it
  alternatives:
  - in it
  - into it
  lexicon: HALOT
  rationale: Refers back to the night. In English, 'enter it' naturally incorporates
    the prepositional sense.
