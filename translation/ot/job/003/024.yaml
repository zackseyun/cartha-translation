id: JOB.3.24
reference: Job 3:24
source:
  edition: WLC
  text: כִּֽי לִ/פְנֵ֣י לַ֭חְמִ/י אַנְחָתִ֣/י תָבֹ֑א וַֽ/יִּתְּכ֥וּ כַ֝/מַּ֗יִם שַׁאֲגֹתָֽ/י־׃
translation:
  text: For my sighing comes before my bread, and my groanings pour out like water.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my food'; Hebrew 'my bread' can stand more broadly for what one eats.
    reason: lexical_alternative
  - marker: b
    text: Or 'my roarings'; the Hebrew term can evoke a loud, animal-like cry, intensifying
      Job's anguish.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Surely
  - Because
  lexicon: HALOT
  rationale: Here כִּי introduces an explanation of Job's condition in the surrounding
    lament. 'For' best preserves the explanatory force in natural English.
- source_word: לִפְנֵי
  chosen: before
  alternatives:
  - in front of
  - ahead of
  - instead of
  lexicon: HALOT
  rationale: The preposition with פָּנִים commonly means 'before' in temporal or spatial
    relation. In this context it most naturally expresses that sighing precedes eating.
- source_word: לַחְמִי
  chosen: my bread
  alternatives:
  - my food
  lexicon: HALOT
  rationale: לֶחֶם literally means 'bread,' though it can stand more broadly for food.
    The literal 'my bread' is intelligible in English and preserves the concrete imagery;
    the broader sense is worth preserving in a footnote.
- source_word: אַנְחָתִי
  chosen: my sighing
  alternatives:
  - my groaning
  - my sigh
  lexicon: HALOT
  rationale: אַנְחָה denotes sighing or groaning arising from distress. 'My sighing'
    fits the singular collective sense and pairs well with the following plural term
    for vocalized anguish.
- source_word: תָבֹא
  chosen: comes
  alternatives:
  - arrives
  - enters
  lexicon: HALOT
  rationale: The verb בוא is common for 'come.' Present tense in English suits the
    poetic lament and reflects the ongoing condition.
- source_word: וַיִּתְּכוּ
  chosen: pour out
  alternatives:
  - are poured out
  - flow out
  - are shed
  lexicon: HALOT
  rationale: From נתך, the sense is to pour out or gush forth. With 'like water,'
    'pour out' best captures the vivid image of unrestrained outflow. Although the
    Hebrew form is wayyiqtol, English present is appropriate in poetic complaint.
- source_word: כמים
  chosen: like water
  alternatives:
  - as water
  lexicon: HALOT
  rationale: The simile is straightforward and should be retained literally.
- source_word: שַׁאֲגֹתַי
  chosen: my groanings
  alternatives:
  - my roarings
  - my cries
  lexicon: HALOT
  rationale: From שׁאג, the noun can denote roaring or loud cries. In Job's lament,
    'groanings' communicates intense suffering in idiomatic English, while 'roarings'
    is more literal and should be preserved in a footnote because it highlights the
    animal-like intensity of the image.
