id: JOB.29.2
reference: Job 29:2
source:
  edition: WLC
  text: מִֽי יִתְּנֵ֥/נִי כְ/יַרְחֵי קֶ֑דֶם כִּ֝/ימֵ֗י אֱל֣וֹהַּ יִשְׁמְרֵֽ/נִי־־׃
translation:
  text: Oh, that I were as in months gone by, as in the days when God watched over
    me,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Oh, that someone would grant me to be as in former months.' The Hebrew
      idiom literally begins, 'Who will give me...?' and expresses a wish.
    reason: lexical_alternative
  - marker: b
    text: Or 'kept me' or 'guarded me.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִי
  chosen: Oh, that
  alternatives:
  - Who will
  - Who might give
  lexicon: HALOT
  rationale: In the idiom מִי יִתְּנֵנִי, the interrogative 'who' functions idiomatically
    to express a wish or lament ('Oh, that...'). Rendering the idiom rather than the
    bare interrogative best reflects the Hebrew sense in natural English.
- source_word: יִתְּנֵנִי
  chosen: I were
  alternatives:
  - would give me
  - might grant me
  lexicon: HALOT
  rationale: 'From נתן (''give'') with 1cs suffix, but in the idiom מִי יִתְּנֵנִי
    it conveys a wish: ''Oh, that I were / if only I could be.'' English must recast
    the clause idiomatically rather than woodenly preserve ''give me.'''
- source_word: כְיַרְחֵי
  chosen: as in months
  alternatives:
  - like the months
  - as the months
  lexicon: HALOT
  rationale: The prefixed כ marks comparison ('as/like'), and יֶרַח means 'month.'
    'As in months' fits the retrospective longing of the verse in idiomatic English.
- source_word: קֶדֶם
  chosen: gone by
  alternatives:
  - former times
  - old
  - ancient days
  lexicon: HALOT
  rationale: קֶדֶם here refers to former time, not the geographical 'east.' 'Gone
    by' is natural modern English and preserves the temporal sense of looking back.
- source_word: כִּימֵי
  chosen: as in the days
  alternatives:
  - like the days of
  - as the days
  lexicon: HALOT
  rationale: Parallel to the previous temporal phrase, introducing a second comparison.
    'As in the days' keeps the poetic parallelism while reading smoothly.
- source_word: אֱלוֹהַּ
  chosen: God
  alternatives:
  - God Almighty
  lexicon: HALOT
  rationale: אֱלוֹהַּ is the singular poetic form for 'God' common in Job. There is
    no warrant here to expand it to 'God Almighty,' since שדי is not present.
- source_word: יִשְׁמְרֵנִי
  chosen: watched over me
  alternatives:
  - kept me
  - guarded me
  - preserved me
  lexicon: HALOT
  rationale: שׁמר commonly means keep, guard, watch over. In this context of Job recalling
    divine care, 'watched over me' communicates protective oversight in clear modern
    English.
