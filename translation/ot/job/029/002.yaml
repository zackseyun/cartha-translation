theological_decisions:
- issue: Divine action in Job's recollection
  chosen_reading: God watched over me
  alternative_readings:
  - God kept me
  - God guarded me
  rationale: The verse recalls God's past protective care without specifying a doctrinal
    mechanism beyond providential oversight. 'Watched over me' preserves that sense
    without importing stronger theological claims than the Hebrew states.
  doctrine_reference: Translation philosophy §1, §3
