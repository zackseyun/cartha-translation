id: JOB.29.18
reference: Job 29:18
source:
  edition: WLC
  text: וָ֭/אֹמַר עִם קִנִּ֣/י אֶגְוָ֑ע וְ֝/כַ/ח֗וֹל אַרְבֶּ֥ה יָמִֽים־׃
translation:
  text: Then I said, ‘I will die in my nest, and I will multiply my days like the
    sand.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly, 'and I will multiply my days like the phoenix.' The Hebrew
      word translated 'sand' has been understood by some as a bird name here, but
      'sand' is the more likely sense in context and fits the common biblical image
      of great number.
    reason: alternative_reading
lexical_decisions:
- source_word: וָאֹמַר
  chosen: Then I said
  alternatives:
  - And I said
  lexicon: HALOT
  rationale: The waw-consecutive advances Job's recollection; 'Then I said' reads
    naturally in English while preserving the narrative sequence.
- source_word: עִם
  chosen: in
  alternatives:
  - with
  lexicon: HALOT
  rationale: 'With ''nest'' the preposition is idiomatically rendered ''in'' in English:
    ''die in my nest.'' A more literal ''with my nest'' is awkward and obscures the
    sense of dying securely at home.'
- source_word: קִנִּי
  chosen: my nest
  alternatives:
  - my home
  lexicon: HALOT
  rationale: The noun literally means 'nest.' Retaining the image preserves the poetic
    metaphor of domestic security and settled prosperity better than flattening it
    to 'home.'
- source_word: אֶגְוָע
  chosen: I will die
  alternatives:
  - I will expire
  - I will breathe my last
  lexicon: HALOT
  rationale: The verb denotes dying/perishing. 'I will die' is the clearest and most
    natural English equivalent.
- source_word: וְכַחוֹל
  chosen: like the sand
  alternatives:
  - like the חול
  - like the phoenix
  lexicon: HALOT
  rationale: The most common Hebrew sense of חול is 'sand,' yielding the familiar
    idiom of innumerability. Some interpreters take the word as 'phoenix,' but that
    is uncertain and not the default sense in Hebrew; the alternative is preserved
    in a footnote.
- source_word: אַרְבֶּה
  chosen: I will multiply
  alternatives:
  - I will increase
  - I will make many
  lexicon: HALOT
  rationale: Hiphil of רבה means to make many/increase. 'I will multiply' preserves
    the verbal force and fits the object 'my days.'
- source_word: יָמִים
  chosen: my days
  alternatives:
  - days
  - my lifespan
  lexicon: HALOT
  rationale: 'Although ''my'' is not repeated in Hebrew, English idiom naturally supplies
    it from the first-person verb: Job expected his own days to be many. ''My days''
    is a standard biblical expression for lifespan.'
