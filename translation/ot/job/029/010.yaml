id: JOB.29.10
reference: Job 29:10
source:
  edition: WLC
  text: קוֹל נְגִידִ֥ים נֶחְבָּ֑אוּ וּ֝/לְשׁוֹנָ֗/ם לְ/חִכָּ֥/ם דָּבֵֽקָה־׃
translation:
  text: The voice of nobles was hushed, and their tongue stuck to the roof of their
    mouth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'The voice of princes fell silent.'
    reason: lexical_alternative
  - marker: b
    text: Literally, 'their tongue clung to their palate,' an idiom for being unable
      or unwilling to speak.
    reason: lexical_alternative
lexical_decisions:
- source_word: קוֹל
  chosen: voice
  alternatives:
  - sound
  lexicon: HALOT
  rationale: '''Voice'' fits the idiom with human speakers better than the more general
    ''sound.'' In context it refers to the speaking of prominent men falling silent.'
- source_word: נְגִידִים
  chosen: nobles
  alternatives:
  - princes
  - leaders
  - rulers
  lexicon: HALOT
  rationale: The term can denote leaders or princes, but here in poetic parallelism
    with public silence it refers broadly to high-ranking men. 'Nobles' preserves
    social prominence without implying formal monarchy too narrowly.
- source_word: נֶחְבָּאוּ
  chosen: was hushed
  alternatives:
  - hid itself
  - was hidden
  - fell silent
  lexicon: HALOT
  rationale: Although the verb's basic sense is 'hide,' with 'voice' as subject the
    idiomatic sense is that the voice disappeared from hearing, i.e., became silent.
    'Was hushed' captures the poetic effect in natural English while staying close
    to the image.
- source_word: וּלְשׁוֹנָם
  chosen: and their tongue
  alternatives:
  - and their tongues
  lexicon: HALOT
  rationale: Hebrew uses a singular collective with plural suffix. English can naturally
    render this as singular collective 'their tongue,' preserving the poetic idiom.
- source_word: לְחִכָּם
  chosen: to the roof of their mouth
  alternatives:
  - to their palate
  lexicon: HALOT
  rationale: The noun denotes the palate or roof of the mouth. The fuller English
    phrase is clearer and idiomatic, especially in the expression of speechlessness.
- source_word: דָּבֵקָה
  chosen: stuck
  alternatives:
  - clung
  - cleaved
  lexicon: HALOT
  rationale: The verb means 'cling/stick.' 'Stuck' is the most natural modern English
    in the idiom 'tongue stuck to the roof of the mouth,' conveying enforced silence.
