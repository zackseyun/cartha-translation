id: JOB.29.4
reference: Job 29:4
source:
  edition: WLC
  text: כַּ/אֲשֶׁ֣ר הָ֭יִיתִי בִּ/ימֵ֣י חָרְפִּ֑/י בְּ/ס֥וֹד אֱ֝ל֗וֹהַּ עֲלֵ֣י אָהֳלִֽ/י׃
translation:
  text: as I was in the days of my prime, when God's intimate counsel was over my
    tent,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the days of my autumn,' that is, the season of full maturity or flourishing.
    reason: lexical_alternative
  - marker: b
    text: Or 'when the secret counsel of God was over my tent.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כַּאֲשֶׁר
  chosen: as
  alternatives:
  - when
  - just as
  lexicon: HALOT
  rationale: Introduces a comparison/remembrance clause tied to Job's longing for
    former days. 'As' preserves the comparative force while remaining natural in English.
- source_word: הָיִיתִי
  chosen: I was
  alternatives:
  - I had been
  lexicon: HALOT
  rationale: Qal perfect 1cs of היה, rendered simply as past tense in English. The
    context is retrospective, but simple past is sufficient and idiomatic.
- source_word: בִּימֵי
  chosen: in the days of
  alternatives:
  - during the days of
  lexicon: HALOT
  rationale: A straightforward temporal construct; 'in the days of' preserves the
    Hebrew idiom without awkwardness.
- source_word: חָרְפִּי
  chosen: my prime
  alternatives:
  - my autumn
  - my youth
  - my ripeness
  lexicon: HALOT
  rationale: The noun can denote autumn/harvest-time and by extension the season of
    vigor or maturity. In context Job is recalling his former flourishing condition,
    so 'my prime' best conveys the metaphor's sense in clear modern English. The more
    literal seasonal image is preserved in a footnote.
- source_word: בְּסוֹד
  chosen: intimate counsel
  alternatives:
  - secret counsel
  - friendship
  - confiding fellowship
  lexicon: HALOT
  rationale: סוֹד can denote confidential counsel, intimate circle, or close fellowship.
    Here, with God as subject, it expresses privileged nearness and confidential favor.
    'Intimate counsel' preserves both the relational and deliberative nuance.
- source_word: אֱלוֹהַּ
  chosen: God's
  alternatives:
  - of God
  lexicon: HALOT
  rationale: Construct relationship with סוד is naturally rendered in English as a
    possessive. 'God' is the standard rendering of אֱלוֹהַּ here.
- source_word: עֲלֵי
  chosen: was over
  alternatives:
  - rested upon
  - was upon
  lexicon: HALOT
  rationale: The preposition על in this context indicates presence hovering over or
    extending over Job's tent. 'Was over' is idiomatic and preserves the imagery of
    divine favor covering his household.
- source_word: אָהֳלִי
  chosen: my tent
  alternatives:
  - my dwelling
  - my household
  lexicon: HALOT
  rationale: Tent is the concrete Hebrew image and should be retained. By implication
    it can include household, but the literal image is primary.
