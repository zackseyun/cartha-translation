theological_decisions:
- issue: Meaning of Job's former relationship to God in בְּסוֹד אֱלוֹהַּ
  chosen_reading: God's intimate counsel/fellowship was over Job's tent, expressing
    divine favor and nearness without overstating mystical revelation.
  alternative_readings:
  - God's secret was upon my tent
  - God's friendship was over my tent
  rationale: The Hebrew supports confidential nearness and favor. The translation
    avoids narrowing it either to mere 'friendship' or to technical revelation language
    alone, preserving the text's relational richness.
  doctrine_reference: Translation philosophy §3, preserve theological tension rather
    than resolve it
