id: JOB.29.16
reference: Job 29:16
source:
  edition: WLC
  text: אָ֣ב אָ֭נֹכִֽי לָֽ/אֶבְיוֹנִ֑ים וְ/רִ֖ב לֹא יָדַ֣עְתִּי אֶחְקְרֵֽ/הוּ־׃
translation:
  text: I was a father to the poor, and I investigated the case of one I did not know.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'I searched out the dispute of one I did not know.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אָב
  chosen: father
  alternatives:
  - protector
  - patron
  lexicon: HALOT
  rationale: The noun literally means 'father.' In this context it is metaphorical,
    expressing protective care and advocacy toward the needy. 'Father' preserves the
    image and moral force better than a more interpretive gloss.
- source_word: אָנֹכִי
  chosen: I was
  alternatives:
  - I am
  lexicon: HALOT
  rationale: 'The independent pronoun adds emphasis: ''I myself.'' English normally
    does not retain the pronoun separately here, since the clause is verbless in Hebrew
    and the past-time frame of Job 29 favors ''I was.'''
- source_word: לָאֶבְיוֹנִים
  chosen: to the poor
  alternatives:
  - to the needy
  - for the poor
  lexicon: HALOT
  rationale: אֶבְיוֹן denotes the poor or needy. 'The poor' is idiomatic and concise
    in English, while still conveying socioeconomic vulnerability. The preposition
    ל is naturally rendered 'to' here with the predicate 'father to.'
- source_word: וְרִיב
  chosen: and ... the case
  alternatives:
  - and ... the dispute
  - and ... the legal claim
  - and ... the cause
  lexicon: HALOT
  rationale: רִיב can denote a dispute, lawsuit, or legal case. In context of advocacy
    and inquiry, 'case' best captures the judicial/social sense in natural English.
- source_word: לֹא יָדַעְתִּי
  chosen: I did not know
  alternatives:
  - I had not known
  - was unknown to me
  lexicon: HALOT
  rationale: The verb ידע here means personal acquaintance or prior knowledge. 'I
    did not know' is the most direct rendering and fits the sense that Job examined
    matters even for strangers.
- source_word: אֶחְקְרֵהוּ
  chosen: I investigated
  alternatives:
  - I searched out
  - I examined
  - I inquired into
  lexicon: HALOT
  rationale: חקר means to search out, investigate, or examine thoroughly. 'I investigated'
    communicates deliberate inquiry in clear modern English. The 3ms suffix is represented
    by 'the case of one,' making explicit the object implied by the Hebrew pronoun.
