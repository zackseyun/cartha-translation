id: JOB.29.23
reference: Job 29:23
source:
  edition: WLC
  text: וְ/יִֽחֲל֣וּ כַ/מָּטָ֣ר לִ֑/י וּ֝/פִי/הֶ֗ם פָּעֲר֥וּ לְ/מַלְקֽוֹשׁ׃
translation:
  text: They waited for me as for the rain, and they opened their mouths wide for
    the spring rain.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for the latter rain' or 'for the late rain.' The Hebrew מַלְקוֹשׁ refers
      to the late seasonal rain.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיִחֲלוּ
  chosen: they waited
  alternatives:
  - they hoped
  - they longed
  - they expected
  lexicon: HALOT
  rationale: From יחל in the sense of waiting with expectation or hope. 'Waited' fits
    the comparison to rain and the social context of people anticipating Job's counsel,
    while avoiding an overly emotional rendering like 'longed' in the main text.
- source_word: כַמָּטָר
  chosen: as for the rain
  alternatives:
  - like rain
  - as for rain
  lexicon: HALOT
  rationale: The comparative כ plus מָטָר expresses the manner of their waiting. 'As
    for the rain' preserves the idiomatic sense of eagerly awaiting needed rainfall,
    with a slightly more natural English rhythm in context.
- source_word: לִי
  chosen: for me
  alternatives:
  - for my word
  - for my counsel
  lexicon: HALOT
  rationale: The pronoun is explicit and should be retained directly. Although the
    sense is that they awaited Job's speech or counsel, the Hebrew says simply 'for
    me,' and the broader context supplies the implication.
- source_word: וּפִיהֶם
  chosen: and their mouths
  alternatives:
  - and their mouth
  lexicon: HALOT
  rationale: Plural noun with 3mp suffix, straightforwardly 'and their mouths.' English
    keeps the plural to match the Hebrew.
- source_word: פָּעֲרוּ
  chosen: they opened wide
  alternatives:
  - they gaped
  - they opened
  lexicon: HALOT
  rationale: פער conveys opening wide, often with the mouth. 'Opened wide' is vivid
    but still natural English; 'gaped' is possible but can sound awkward or carry
    unintended connotations.
- source_word: לְמַלְקוֹשׁ
  chosen: for the spring rain
  alternatives:
  - for the latter rain
  - for the late rain
  lexicon: HALOT
  rationale: מַלְקוֹשׁ denotes the late-season rain, often in spring in the land's
    agricultural cycle. 'Spring rain' communicates the referent clearly for modern
    readers; the more traditional 'latter rain' is preserved as an alternative because
    it is a familiar biblical expression.
