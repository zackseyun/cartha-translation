id: JOB.29.20
reference: Job 29:20
source:
  edition: WLC
  text: כְּ֭בוֹדִ/י חָדָ֣שׁ עִמָּדִ֑/י וְ֝/קַשְׁתִּ֗/י בְּ/יָדִ֥/י תַחֲלִֽיף׃
translation:
  text: My glory was ever fresh with me, and my bow was renewed in my hand.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'My glory was new with me.' The Hebrew adjective can be rendered 'new,'
      though in context it likely means continually fresh or unfaded.
    reason: lexical_alternative
  - marker: b
    text: The 'bow' is likely a figure for strength or vigor, though the Hebrew keeps
      the concrete image.
    reason: cultural_note
lexical_decisions:
- source_word: כְּבוֹדִי
  chosen: my glory
  alternatives:
  - my honor
  - my dignity
  lexicon: HALOT
  rationale: כָּבוֹד commonly denotes glory, honor, or weightiness. 'My glory' preserves
    the Hebrew image and allows the term to carry both reputation and splendor without
    narrowing it to mere social esteem.
- source_word: חָדָשׁ
  chosen: fresh
  alternatives:
  - new
  - renewed
  lexicon: HALOT
  rationale: As a predicate adjective, חָדָשׁ describes Job's glory as continually
    vigorous or unfaded. 'Fresh' communicates ongoing vitality more naturally in English
    here than the more wooden 'new.'
- source_word: עִמָּדִי
  chosen: with me
  alternatives:
  - beside me
  - remaining with me
  lexicon: HALOT
  rationale: The prepositional phrase literally means 'with me.' In context it expresses
    that Job's glory remained present with him, not departing.
- source_word: קַשְׁתִּי
  chosen: my bow
  lexicon: HALOT
  rationale: The noun is literally 'my bow.' In wisdom and poetic contexts the bow
    often symbolizes strength or martial vigor; the concrete image should be retained
    in the main text.
- source_word: בְּיָדִי
  chosen: in my hand
  alternatives:
  - by my hand
  lexicon: HALOT
  rationale: The phrase is straightforwardly locative/instrumental. 'In my hand' preserves
    the Hebrew wording and the image of strength ready for use.
- source_word: תַחֲלִיף
  chosen: was renewed
  alternatives:
  - was replaced
  - grew strong again
  - changed
  lexicon: HALOT
  rationale: From חלף in the Hiphil, the sense here is renewal or freshening rather
    than simple replacement. Because the subject 'my bow' is feminine singular, the
    verb agrees with it. 'Was renewed' best fits the poetic parallel with 'my glory
    was fresh.'
