id: JOB.29.24
reference: Job 29:24
source:
  edition: WLC
  text: אֶשְׂחַ֣ק אֲ֭לֵ/הֶם לֹ֣א יַאֲמִ֑ינוּ וְ/א֥וֹר פָּ֝נַ֗/י לֹ֣א יַפִּילֽוּ/ן׃
translation:
  text: I smiled at them—they could hardly believe it; and they did not cast down
    the light of my face.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'I laughed at them, and they did not believe it'; the Hebrew may express
      astonishment at Job's condescension or favor.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the light of my face,' an idiom for a bright or favorable expression.
    reason: cultural_note
lexical_decisions:
- source_word: אֶשְׂחַק
  chosen: I smiled
  alternatives:
  - I laughed
  - I jested
  lexicon: HALOT
  rationale: The verb שׂחק can denote laughing or smiling. In this context of Job's
    favorable, dignifying response to others, 'I smiled' best fits the social nuance
    without suggesting mockery or loud laughter. It also pairs naturally with the
    following expression about the 'light of my face.'
- source_word: אֲלֵהֶם
  chosen: at them
  alternatives:
  - to them
  - with them
  lexicon: HALOT
  rationale: The preposition אֶל with this verb is most naturally rendered directionally.
    'At them' works idiomatically in English with 'smiled' and preserves the interpersonal
    orientation.
- source_word: לֹא יַאֲמִינוּ
  chosen: they could hardly believe it
  alternatives:
  - they did not believe
  - they would not believe
  lexicon: HALOT
  rationale: The Hebrew literally says 'they did not believe.' In context, the sense
    is not disbelief in a proposition but astonishment at Job's favorable attention.
    'Could hardly believe it' captures the idiomatic force in readable English while
    staying close to the sense.
- source_word: וְאוֹר פָּנַי
  chosen: the light of my face
  alternatives:
  - the light of my countenance
  - the brightness of my face
  - my cheerful face
  lexicon: HALOT
  rationale: The phrase is a Hebrew idiom for a bright, favorable, or cheerful facial
    expression. 'The light of my face' preserves the imagery of the source while remaining
    understandable in English.
- source_word: לֹא יַפִּילוּן
  chosen: they did not cast down
  alternatives:
  - they did not bring down
  - they did not darken
  - they did not reject
  lexicon: HALOT
  rationale: From נפל in Hiphil, the form literally means 'they did not cause to fall/cast
    down.' With 'the light of my face' as object, the sense is that they did not cause
    Job's cheerful expression to fall or fade. 'Cast down' preserves the metaphor
    better than a more interpretive rendering.
