id: JOB.29.19
reference: Job 29:19
source:
  edition: WLC
  text: שָׁרְשִׁ֣/י פָת֣וּחַ אֱלֵי מָ֑יִם וְ֝/טַ֗ל יָלִ֥ין בִּ/קְצִירִֽ/י־׃
translation:
  text: My roots were spread out to the waters, and dew stayed overnight on my branches.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in my harvest.' The Hebrew word here is unusual in context; 'branches'
      is chosen because it fits the plant imagery of roots and dew more naturally.
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁרְשִׁי
  chosen: My roots
  alternatives:
  - My root
  lexicon: HALOT
  rationale: Though morphologically singular with 1cs suffix ('my root'), English
    idiom commonly uses the plural 'roots' for a plant's root system. This preserves
    the image naturally without materially changing the sense.
- source_word: פָתוּחַ
  chosen: were spread out
  alternatives:
  - was open
  - was opened
  lexicon: HALOT
  rationale: The passive participle conveys an opened or extended state. With 'roots'
    as the English subject, 'were spread out' expresses the agricultural image more
    idiomatically than the wooden 'were open.'
- source_word: אֱלֵי מָיִם
  chosen: to the waters
  alternatives:
  - toward water
  - by the waters
  lexicon: HALOT
  rationale: אֱלֵי marks direction or relation ('to/toward'), and מָיִם is plural
    in form but often collective. 'To the waters' preserves the Hebrew imagery and
    poetic fullness better than flattening to singular 'water.'
- source_word: וְטַל
  chosen: and dew
  lexicon: HALOT
  rationale: Straightforward rendering of the noun טַל.
- source_word: יָלִין
  chosen: stayed overnight
  alternatives:
  - lodged
  - spent the night
  - rested
  lexicon: HALOT
  rationale: The verb לון means to lodge or remain overnight. 'Stayed overnight' is
    clear modern English and preserves the temporal nuance.
- source_word: בִּקְצִירִי
  chosen: on my branches
  alternatives:
  - in my harvest
  - on my bough
  - in my foliage
  lexicon: HALOT
  rationale: Although קָצִיר commonly means 'harvest,' in this poetic context that
    sense is awkward with dew. Many interpreters understand a related sense referring
    to cut growth, branches, or foliage. 'On my branches' best fits the botanical
    parallel with 'roots' and the image of dew resting on a tree or luxuriant plant.
    The more literal but less likely 'in my harvest' is preserved in a footnote as
    a lexical alternative.
