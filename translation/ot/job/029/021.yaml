id: JOB.29.21
reference: Job 29:21
source:
  edition: WLC
  text: לִֽ/י שָׁמְע֥וּ וְ/יִחֵ֑לּוּ וְ֝/יִדְּמ֗וּ לְמ֣וֹ עֲצָתִֽ/י־׃
translation:
  text: They listened to me and waited, and they kept silent for my counsel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'They listened to me and waited in expectation.' The verb can also carry
      the nuance of hoping or expecting.
    reason: lexical_alternative
  - marker: b
    text: Or 'they were silent at my counsel.' The final phrase may express silence
      in response to Job's counsel.
    reason: lexical_alternative
lexical_decisions:
- source_word: לִי
  chosen: to me
  alternatives:
  - for me
  lexicon: HALOT
  rationale: The preposition with 1cs suffix marks Job as the one to whom the hearing
    is directed. In English, 'listened to me' is the natural equivalent with שׁמע
    in this construction.
- source_word: שָׁמְעוּ
  chosen: listened
  alternatives:
  - heard
  lexicon: HALOT
  rationale: Although the verb can mean 'hear,' in context of receiving Job's speech
    and counsel it carries the sense of attentive listening rather than mere auditory
    perception.
- source_word: וְיִחֵלּוּ
  chosen: waited
  alternatives:
  - hoped
  - tarried
  - expected
  lexicon: HALOT
  rationale: From יחל, the sense here is waiting expectantly for Job's words or judgment.
    'Waited' fits the parallelism with listening and silence better than the more
    abstract 'hoped.'
- source_word: וְיִדְּמוּ
  chosen: kept silent
  alternatives:
  - were silent
  - became still
  lexicon: HALOT
  rationale: The verb דמם in this context denotes silence or stillness. 'Kept silent'
    conveys an ongoing restrained silence while Job gave counsel.
- source_word: לְמוֹ
  chosen: for
  alternatives:
  - at
  - before
  - for them
  lexicon: HALOT
  rationale: Here לְמוֹ functions as a poetic preposition equivalent to ל, introducing
    the relation of their silence to Job's counsel. 'For my counsel' best captures
    that they fell silent in deference to it.
- source_word: עֲצָתִי
  chosen: my counsel
  alternatives:
  - my advice
  - my plan
  lexicon: HALOT
  rationale: In this wisdom setting, עֵצָה refers to counsel/advice offered by a respected
    speaker. 'Counsel' preserves the elevated register and judicial-wisdom nuance
    better than 'advice.'
