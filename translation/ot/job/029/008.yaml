id: JOB.29.8
reference: Job 29:8
source:
  edition: WLC
  text: רָא֣וּ/נִי נְעָרִ֣ים וְ/נֶחְבָּ֑אוּ וִֽ֝/ישִׁישִׁים קָ֣מוּ עָמָֽדוּ׃
translation:
  text: The young men saw me and withdrew, and the aged rose and stood.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'hid themselves'; the Hebrew verb can mean to conceal oneself, here likely
      expressing deferential withdrawal in Job's presence.
    reason: lexical_alternative
lexical_decisions:
- source_word: רָאוּנִי
  chosen: saw me
  alternatives:
  - looked at me
  - caught sight of me
  lexicon: HALOT
  rationale: From ראה, the straightforward sense is visual perception, 'saw me.' No
    contextual pressure requires a more interpretive rendering.
- source_word: נְעָרִים
  chosen: young men
  alternatives:
  - youths
  - young people
  lexicon: HALOT
  rationale: The masculine plural refers to young males. In keeping with gender-accurate
    translation philosophy, 'young men' is preferred over the more generic 'young
    people'.
- source_word: וְנֶחְבָּאוּ
  chosen: withdrew
  alternatives:
  - hid themselves
  - drew back
  lexicon: HALOT
  rationale: The Niphal of חבא commonly means 'hide oneself,' but in this social-honor
    context the sense is that they shrank back or made themselves scarce in deference.
    'Withdrew' communicates the idiomatic force in natural English while staying close
    to the source sense.
- source_word: וִישִׁישִׁים
  chosen: the aged
  alternatives:
  - old men
  - elders
  lexicon: HALOT
  rationale: ישישים denotes aged persons, especially old men. 'The aged' is dignified
    and fits the poetic register. 'Elders' could imply office rather than age, so
    it is avoided.
- source_word: קָמוּ
  chosen: rose
  alternatives:
  - stood up
  - got up
  lexicon: HALOT
  rationale: קום here marks the initial act of rising in respect. 'Rose' preserves
    the concise poetic movement.
- source_word: עָמָדוּ
  chosen: stood
  alternatives:
  - remained standing
  - took their stand
  lexicon: HALOT
  rationale: 'עמד follows קום to complete the picture: they not only rose but stood
    in Job''s presence. Rendering both verbs preserves the Hebrew emphasis rather
    than collapsing them into one English action.'
