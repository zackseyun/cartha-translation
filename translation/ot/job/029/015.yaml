id: JOB.29.15
reference: Job 29:15
source:
  edition: WLC
  text: עֵינַ֣יִם הָ֭יִיתִי לַֽ/עִוֵּ֑ר וְ/רַגְלַ֖יִם לַ/פִּסֵּ֣חַ אָֽנִי׃
translation:
  text: I was eyes to the blind, and feet to the lame—I myself.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more dynamically, 'I was like eyes for the blind and like feet for the
      lame.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עֵינַיִם
  chosen: eyes
  alternatives:
  - the eyes
  lexicon: HALOT
  rationale: Plural noun used predicatively in an idiomatic expression of providing
    guidance or practical help. Kept as the concrete image 'eyes' rather than paraphrasing
    to 'sight' or 'guide' in order to preserve the metaphor.
- source_word: הָיִיתִי
  chosen: I was
  alternatives:
  - I became
  lexicon: HALOT
  rationale: Qal perfect 1cs of היה here expresses Job's past state or role. 'I was'
    is the most natural English rendering in context and preserves the retrospective
    force.
- source_word: לַעִוֵּר
  chosen: to the blind
  alternatives:
  - for the blind
  - to a blind man
  lexicon: HALOT
  rationale: The preposition ל marks relation/benefit. 'To the blind' is idiomatic
    in English with the predicate metaphor 'I was eyes to the blind,' preserving the
    singular adjective's collective sense without over-specifying an individual.
- source_word: וְרַגְלַיִם
  chosen: and feet
  alternatives:
  - and the feet
  lexicon: HALOT
  rationale: Parallel to 'eyes'; retained literally to preserve the poetic metaphor
    of supplying mobility or support.
- source_word: לַפִּסֵּחַ
  chosen: to the lame
  alternatives:
  - for the lame
  - to the crippled
  lexicon: HALOT
  rationale: The adjective denotes one who is lame. 'The lame' is clear, natural,
    and less pejorative in contemporary English than 'the crippled,' while preserving
    the concrete condition.
- source_word: אָֽנִי
  chosen: I myself
  alternatives:
  - I
  - I was
  lexicon: HALOT
  rationale: The independent pronoun is emphatic after the verbal clause. Rendering
    it as 'I myself' preserves the emphasis rather than leaving it untranslated as
    redundant in English.
