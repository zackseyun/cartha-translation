id: JOB.29.5
reference: Job 29:5
source:
  edition: WLC
  text: בְּ/ע֣וֹד שַׁ֭דַּי עִמָּדִ֑/י סְבִ֖יבוֹתַ֣/י נְעָרָֽ/י׃
translation:
  text: when the Almighty was still with me, and my young men were around me,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my servants were around me.' The Hebrew נְעָרַי can denote 'my young
      men,' 'my attendants,' or 'my servants,' depending on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּעוֹד
  chosen: when ... was still
  alternatives:
  - while
  - as long as
  - yet/still
  lexicon: HALOT
  rationale: The preposition ב plus עוֹד expresses continued duration in past time
    here, introducing a temporal clause in Job's recollection. 'When ... was still'
    captures both the temporal sense and the nuance of a former state that has now
    ended.
- source_word: שַׁדַּי
  chosen: the Almighty
  alternatives:
  - Shaddai
  lexicon: HALOT
  rationale: שַׁדַּי is a divine title commonly rendered 'the Almighty' in Job. Translating
    the title rather than transliterating aligns with the project's philosophy to
    translate titles and preserves intelligibility in English.
- source_word: עִמָּדִי
  chosen: with me
  alternatives:
  - beside me
  - at my side
  lexicon: HALOT
  rationale: The preposition עם with 1cs suffix denotes presence or companionship.
    'With me' is the most natural and direct English rendering in this context.
- source_word: סְבִיבוֹתַי
  chosen: around me
  alternatives:
  - surrounding me
  - all around me
  lexicon: HALOT
  rationale: From סָבִיב, the plural construct with suffix conveys those or that which
    is around the speaker. Here it functions adverbially/predicatively with the following
    noun phrase, so 'around me' is concise and idiomatic.
- source_word: נְעָרַי
  chosen: my young men
  alternatives:
  - my servants
  - my attendants
  - my youths
  lexicon: HALOT
  rationale: נַעַר can mean youth, young man, servant, or attendant depending on context.
    In Job's household setting, the referent is likely younger male members of his
    household or retinue. 'My young men' preserves the lexical sense without over-specifying
    servile status, while 'servants' remains a viable contextual alternative.
