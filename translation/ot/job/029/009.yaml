id: JOB.29.9
reference: Job 29:9
source:
  edition: WLC
  text: שָׂ֭רִים עָצְר֣וּ בְ/מִלִּ֑ים וְ֝/כַ֗ף יָשִׂ֥ימוּ לְ/פִי/הֶֽם׃
translation:
  text: Princes held back their words, and put their hand over their mouth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'nobles held back speech.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׂרִים
  chosen: Princes
  alternatives:
  - officials
  - nobles
  - leaders
  lexicon: HALOT
  rationale: שָׂרִים denotes high-ranking persons or rulers. 'Princes' preserves the
    elevated social status and fits the parallel with public deference in Job 29.
    'Officials' or 'leaders' are possible but less vivid.
- source_word: עָצְרוּ
  chosen: held back
  alternatives:
  - restrained
  - stopped
  - withheld
  lexicon: HALOT
  rationale: From עצר, here in the sense of restraining or holding back speech. 'Held
    back' is idiomatic in English and matches the object 'their words' better than
    the more wooden 'restrained.'
- source_word: בְמִלִּים
  chosen: their words
  alternatives:
  - from speaking
  - with words
  - speech
  lexicon: HALOT
  rationale: Literally 'in/with words,' but in context after עצר the phrase means
    they held back their speech. Rendering as 'their words' makes the implied possessive
    explicit in natural English while preserving the concrete sense. The preposition
    is absorbed idiomatically.
- source_word: וְכַף
  chosen: their hand
  alternatives:
  - the palm
  - the hand
  lexicon: HALOT
  rationale: כַּף literally refers to the palm/hand. In the idiom of silencing oneself,
    English normally says 'put their hand over their mouth.' The possessive is supplied
    from the plural verb and following suffix for natural English.
- source_word: יָשִׂימוּ
  chosen: put
  alternatives:
  - placed
  - set
  lexicon: HALOT
  rationale: A common verb meaning 'put, set, place.' 'Put' is the most natural English
    choice in this bodily gesture idiom.
- source_word: לְפִיהֶם
  chosen: over their mouth
  alternatives:
  - on their mouth
  - to their mouth
  - upon their mouth
  lexicon: HALOT
  rationale: Literally 'to/on their mouth.' In English the gesture is best expressed
    as 'over their mouth,' conveying the act of covering the mouth in silence. Singular
    'mouth' follows the Hebrew idiom with plural possessive.
