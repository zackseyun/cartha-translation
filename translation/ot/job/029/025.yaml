id: JOB.29.25
reference: Job 29:25
source:
  edition: WLC
  text: אֶֽבֲחַ֣ר דַּרְכָּ/ם֮ וְ/אֵשֵׁ֪ב רֹ֥אשׁ וְ֭/אֶשְׁכּוֹן כְּ/מֶ֣לֶךְ בַּ/גְּד֑וּד
    כַּ/אֲשֶׁ֖ר אֲבֵלִ֣ים יְנַחֵֽם׃
translation:
  text: I chose their way and sat as chief; I dwelt like a king among the troops,
    like one who comforts mourners.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I chose their course and sat at the head.' The Hebrew can be understood
      as Job selecting or approving the way others should take, then occupying the
      place of leadership.
    reason: lexical_alternative
  - marker: b
    text: Or 'like a king in the troop/band.' The Hebrew גְּדוּד may refer to a troop,
      band, or company.
    reason: lexical_alternative
  - marker: c
    text: The final comparison is difficult. The Hebrew may mean 'like one who comforts
      mourners,' emphasizing Job's consoling role even while holding a place of honor.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶבֲחַר
  chosen: I chose
  alternatives:
  - I would choose
  - I selected
  lexicon: HALOT
  rationale: Qal imperfect 1cs of בחר. In this retrospective context within Job 29,
    the imperfect functions as past habitual/action in sequence, so simple past English
    is natural. 'Chose' preserves the active sense of selecting or deciding.
- source_word: דַּרְכָּם
  chosen: their way
  alternatives:
  - their path
  - their course
  lexicon: HALOT
  rationale: דֶּרֶךְ commonly means way/path/course. With 3mp suffix, 'their way'
    is the most direct rendering. It likely refers to the course to be taken, i.e.,
    Job gave direction or approved a course of action.
- source_word: וְאֵשֵׁב רֹאשׁ
  chosen: and sat as chief
  alternatives:
  - and sat at the head
  - and took my seat as leader
  lexicon: HALOT
  rationale: ישב + רֹאשׁ is idiomatic for occupying the leading position. 'Sat as
    chief' preserves both the concrete image of sitting and the social sense of leadership
    without over-paraphrasing.
- source_word: וְאֶשְׁכּוֹן
  chosen: I dwelt
  alternatives:
  - I lived
  - I remained
  lexicon: HALOT
  rationale: שכן means dwell, settle, reside. 'Dwelt' fits the elevated poetic register
    and parallels the following simile.
- source_word: כְּמֶלֶךְ
  chosen: like a king
  alternatives:
  - as a king
  lexicon: HALOT
  rationale: The prefixed כ marks comparison. 'Like a king' keeps the simile explicit.
- source_word: בַּגְּדוּד
  chosen: among the troops
  alternatives:
  - in the troop
  - among the band
  lexicon: HALOT
  rationale: גְּדוּד can denote a troop, band, or raiding company. In context of leadership
    and prominence, 'among the troops' communicates a king in the midst of his company/forces
    more idiomatically than the singular 'in the troop.'
- source_word: כַּאֲשֶׁר
  chosen: like one who
  alternatives:
  - as when
  - just as
  lexicon: HALOT
  rationale: Here כַאֲשֶׁר introduces a comparison. Because the following verb is
    singular, English is smoothed to 'like one who' to make the simile intelligible.
- source_word: אֲבֵלִים
  chosen: mourners
  alternatives:
  - those who mourn
  - the grieving
  lexicon: HALOT
  rationale: Plural participial/adjectival form from אבל, referring to people in mourning.
    'Mourners' is concise and natural.
- source_word: יְנַחֵם
  chosen: comforts
  alternatives:
  - consoles
  lexicon: HALOT
  rationale: Piel of נחם here means comfort/console. The singular verb creates a comparison
    to a comforter of mourners. 'Comforts' is standard, clear English.
