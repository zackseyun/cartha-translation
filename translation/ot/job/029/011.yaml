id: JOB.29.11
reference: Job 29:11
source:
  edition: WLC
  text: כִּ֤י אֹ֣זֶן שָׁ֭מְעָה וַֽ/תְּאַשְּׁרֵ֑/נִי וְ/עַ֥יִן רָ֝אֲתָ֗ה וַ/תְּעִידֵֽ/נִי׃
translation:
  text: For when an ear heard, it called me blessed, and when an eye saw, it testified
    for me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'bore witness to me.' The Hebrew verb can mean to testify or bear witness;
      in context it is favorable testimony about Job.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Because
  - Indeed
  lexicon: HALOT
  rationale: Introduces the explanation for Job's prior claim about his former honor.
    'For' fits the discourse flow in English better than a more causal 'because' here.
- source_word: אֹזֶן
  chosen: an ear
  alternatives:
  - the ear
  lexicon: HALOT
  rationale: Singular collective/body-part imagery is preserved. The indefinite 'an
    ear' reflects the Hebrew singular used generically for anyone who heard of Job.
- source_word: שָׁמְעָה
  chosen: heard
  alternatives:
  - listened
  lexicon: HALOT
  rationale: The verb simply denotes hearing; 'heard' is the most direct rendering
    and preserves the parallel with 'saw' in the next colon.
- source_word: וַתְּאַשְּׁרֵנִי
  chosen: called me blessed
  alternatives:
  - pronounced me blessed
  - counted me happy
  lexicon: HALOT
  rationale: From אשר in the Piel/Hiphil-like sense of declaring someone blessed or
    happy. 'Called me blessed' is idiomatic, preserves the evaluative sense, and avoids
    the weaker modern sense of 'happy'.
- source_word: וְעַיִן
  chosen: and when an eye
  alternatives:
  - and an eye
  - and the eye
  lexicon: HALOT
  rationale: The conjunction links a second generic witness. Repeating 'when' in English
    clarifies the parallel temporal/conditional sense implied by the Hebrew sequence.
- source_word: רָאֲתָה
  chosen: saw
  alternatives:
  - looked upon
  lexicon: HALOT
  rationale: Simple visual perception is intended; 'saw' best matches the concise
    Hebrew and the parallelism.
- source_word: וַתְּעִידֵנִי
  chosen: it testified for me
  alternatives:
  - it bore witness to me
  - it gave testimony for me
  lexicon: HALOT
  rationale: From עוד/עיד, to bear witness or testify. In context the sense is favorable
    attestation to Job's character, so 'testified for me' communicates the positive
    witness more naturally than the more ambiguous 'testified to me'.
