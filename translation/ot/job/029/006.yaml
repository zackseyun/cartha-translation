id: JOB.29.6
reference: Job 29:6
source:
  edition: WLC
  text: בִּ/רְחֹ֣ץ הֲלִיכַ֣/י בְּ/חֵמָ֑ה וְ/צ֥וּר יָצ֥וּק עִ֝מָּדִ֗/י פַּלְגֵי שָֽׁמֶן־׃
translation:
  text: when my steps were washed in curds, and the rock poured out for me streams
    of oil.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''butter'': the Hebrew חֵמָה can denote curds, cream, or butter-like
      dairy.'
    reason: lexical_alternative
  - marker: b
    text: Or 'beside me' / 'with me' for 'for me'; the Hebrew expression is literally
      spatial.
    reason: lexical_alternative
lexical_decisions:
- source_word: בִּרְחֹץ
  chosen: when ... were washed
  alternatives:
  - in washing
  - as ... were washed
  lexicon: HALOT
  rationale: The infinitive construct with prefixed ב can mark a temporal circumstance,
    naturally rendered 'when.' The verb רחץ means 'wash/bathe.' In context it introduces
    Job's recollection of former abundance.
- source_word: הֲלִיכַי
  chosen: my steps
  alternatives:
  - my walking
  - my way of life
  lexicon: HALOT
  rationale: From הליך/הלך, the noun can denote walking or course. 'My steps' is idiomatic
    English and fits the concrete imagery of abundance better than the more abstract
    'my walking.'
- source_word: בְּחֵמָה
  chosen: in curds
  alternatives:
  - with butter
  - in butter
  - with cream
  lexicon: HALOT
  rationale: חֵמָה commonly denotes curds, thick milk, or butter-like dairy. 'Curds'
    best reflects the likely ancient product without importing modern butter imagery
    too strongly. Because 'butter' is traditional and plausible, it is preserved in
    a footnote.
- source_word: וְצוּר
  chosen: and the rock
  alternatives:
  - and a rock
  - and rocky ground
  lexicon: HALOT
  rationale: צוּר is the common noun 'rock/crag.' The definite sense in English is
    natural here, referring generically to rocky terrain as a source of unexpected
    abundance.
- source_word: יָצוּק
  chosen: poured out
  alternatives:
  - poured
  - flowed
  lexicon: HALOT
  rationale: The verb יצק means 'pour out, cast.' 'Poured out' preserves the vivid
    image of lavish provision better than the less specific 'flowed.'
- source_word: עִמָּדִי
  chosen: for me
  alternatives:
  - beside me
  - with me
  lexicon: HALOT
  rationale: The preposition with 1cs suffix literally means 'with me' or 'beside
    me,' but in this poetic context after 'poured out' it likely conveys benefit or
    proximity. 'For me' communicates that the abundance was at Job's disposal, while
    a more literal alternative is preserved in a footnote.
- source_word: פַּלְגֵי
  chosen: streams of
  alternatives:
  - channels of
  - brooks of
  - rivulets of
  lexicon: HALOT
  rationale: פּלגי denotes divisions or channels of flowing water; in poetic usage
    'streams' is natural, vivid English.
- source_word: שָׁמֶן
  chosen: oil
  alternatives:
  - olive oil
  lexicon: HALOT
  rationale: שמן ordinarily means oil, often olive oil in Israelite context. 'Oil'
    is sufficiently precise in English and preserves the poetic compactness.
