id: JOB.29.12
reference: Job 29:12
source:
  edition: WLC
  text: כִּֽי אֲ֭מַלֵּט עָנִ֣י מְשַׁוֵּ֑עַ וְ֝/יָת֗וֹם וְֽ/לֹא עֹזֵ֥ר לֽ/וֹ־־׃
translation:
  text: For I delivered the poor who cried for help, and the fatherless who had no
    helper.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "the orphan." The Hebrew more specifically denotes one without a father,
      a socially vulnerable person.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces the reason for the honor described in the surrounding context;
    'for' fits the explanatory force in English.
- source_word: אֲמַלֵּט
  chosen: I delivered
  alternatives:
  - I rescued
  - I caused to escape
  lexicon: HALOT
  rationale: Piel of מלט conveys active rescue/deliverance. 'Delivered' is natural
    and suitably weighty in context, while preserving the sense of intervention.
- source_word: עָנִי
  chosen: the poor
  alternatives:
  - the afflicted
  - the needy
  lexicon: HALOT
  rationale: עָנִי commonly denotes a poor or afflicted person. Here the social-justice
    context favors 'the poor' as the clearest and most idiomatic rendering.
- source_word: מְשַׁוֵּעַ
  chosen: who cried for help
  alternatives:
  - crying out
  - calling for help
  lexicon: HALOT
  rationale: The participle describes the poor person as actively crying out. Relative-clause
    rendering is smoother in English while preserving the durative verbal idea.
- source_word: יָתוֹם
  chosen: the fatherless
  alternatives:
  - the orphan
  lexicon: HALOT
  rationale: יָתוֹם refers to one deprived of a father. 'Fatherless' preserves the
    Hebrew social category more literally; 'orphan' is a viable alternative but can
    imply both parents are dead.
- source_word: וְלֹא עֹזֵר לוֹ
  chosen: who had no helper
  alternatives:
  - and there was no one to help him
  - with no helper for him
  lexicon: HALOT
  rationale: This clause qualifies 'the fatherless.' 'Who had no helper' is concise,
    idiomatic, and preserves the sense that he lacked anyone to assist him.
