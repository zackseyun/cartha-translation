id: JOB.29.3
reference: Job 29:3
source:
  edition: WLC
  text: בְּ/הִלּ֣/וֹ נֵ֭ר/וֹ עֲלֵ֣י רֹאשִׁ֑/י לְ֝/אוֹר/וֹ אֵ֣לֶךְ חֹֽשֶׁךְ׃
translation:
  text: when his lamp shone above my head, and by his light I walked through darkness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'by its light I walked in darkness.' The Hebrew suffix in 'by his/its
      light' may be taken as referring either to God in context or more immediately
      to the lamp.
    reason: alternative_reading
lexical_decisions:
- source_word: בְּהִלּוֹ
  chosen: when his lamp shone
  alternatives:
  - when he caused to shine
  - in his shining
  lexicon: HALOT
  rationale: 'The preposition ב plus infinitive construct of הלל/הלל II here functions
    temporally, introducing the recollected circumstance: ''when ... shone.'' The
    3ms suffix points to God as the implied possessor/agent in context. English idiom
    is clearer if the shining is expressed with the following noun נרו (''his lamp'')
    rather than woodenly ''in his shining.'''
- source_word: נֵרוֹ
  chosen: his lamp
  alternatives:
  - his light
  lexicon: HALOT
  rationale: נֵר is literally 'lamp' rather than the abstract 'light.' Retaining 'lamp'
    preserves the concrete image, while the following phrase supplies 'light' from
    אוֹר.
- source_word: עֲלֵי רֹאשִׁי
  chosen: above my head
  alternatives:
  - over my head
  - upon my head
  lexicon: HALOT
  rationale: עֲלֵי with 'my head' is spatial. 'Above my head' is natural modern English
    and preserves the imagery of a lamp shining overhead.
- source_word: לְאוֹרוֹ
  chosen: by his light
  alternatives:
  - in his light
  - by its light
  lexicon: HALOT
  rationale: 'The preposition ל here is best taken in the sense of accompaniment/instrumentality:
    ''by his light.'' The suffix most naturally refers back to God in the larger discourse,
    though it is closely linked with the lamp image; ''his light'' preserves the personal
    reference.'
- source_word: אֵלֶךְ
  chosen: I walked
  alternatives:
  - I would walk
  - I went
  lexicon: HALOT
  rationale: Though formally imperfect, in this nostalgic context it describes customary
    past action. English simple past reads naturally; 'would walk' is possible but
    less direct.
- source_word: חֹשֶׁךְ
  chosen: through darkness
  alternatives:
  - in darkness
  - through the darkness
  lexicon: HALOT
  rationale: The sense is movement under divine guidance despite darkness. English
    often expresses this idiomatically as 'walked through darkness,' which preserves
    the metaphor without over-literal awkwardness.
