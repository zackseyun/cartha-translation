id: JOB.29.13
reference: Job 29:13
source:
  edition: WLC
  text: בִּרְכַּ֣ת אֹ֭בֵד עָלַ֣/י תָּבֹ֑א וְ/לֵ֖ב אַלְמָנָ֣ה אַרְנִֽן׃
translation:
  text: The blessing of the perishing man came upon me, and I made the widow’s heart
    sing for joy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the blessing of the one who was perishing came upon me.' The Hebrew
      participle אֹבֵד can denote someone perishing, ruined, or near death.
    reason: lexical_alternative
  - marker: b
    text: Or 'I caused the widow’s heart to rejoice' or 'to shout for joy.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בִּרְכַּת
  chosen: the blessing of
  alternatives:
  - the blessing from
  lexicon: HALOT
  rationale: Construct form of בְּרָכָה, introducing a genitive relationship with
    the following participle. 'The blessing of' is the most natural English rendering
    of the construct chain.
- source_word: אֹבֵד
  chosen: the perishing man
  alternatives:
  - the one perishing
  - the dying man
  - the ruined man
  lexicon: HALOT
  rationale: Qal participle of אבד, describing one who is perishing/ruined. 'Perishing
    man' preserves the active participial sense and the singular masculine form without
    overinterpreting whether the danger is death, poverty, or destruction.
- source_word: עָלַי
  chosen: upon me
  alternatives:
  - on me
  - to me
  lexicon: HALOT
  rationale: The preposition עַל with first person singular suffix is idiomatically
    'upon me' here, matching the motion verb תבוא and preserving the image of blessing
    coming onto Job.
- source_word: תָּבֹא
  chosen: came
  alternatives:
  - would come
  - comes
  lexicon: HALOT
  rationale: Though formally imperfect 3fs, in this poetic retrospective context within
    Job 29 it functions as past habitual/past narrative. English simple past reads
    naturally in context.
- source_word: לֵב
  chosen: heart
  alternatives:
  - inner being
  - mind
  lexicon: HALOT
  rationale: לֵב commonly denotes the inner person, but 'heart' is the standard and
    sufficiently transparent English equivalent here, especially in parallel with
    emotional rejoicing.
- source_word: אַלְמָנָה
  chosen: widow’s
  alternatives:
  - of the widow
  lexicon: HALOT
  rationale: Straightforward rendering of the noun in construct relation with 'heart.'
    The possessive form is natural English.
- source_word: אַרְנִן
  chosen: I made ... sing for joy
  alternatives:
  - I caused ... to rejoice
  - I made ... shout for joy
  lexicon: HALOT
  rationale: 'Hiphil 1cs of רנן is causative: Job caused the widow''s heart to cry
    out or sing joyfully. ''Made ... sing for joy'' is idiomatic and preserves the
    causative force and positive emotional sense.'
