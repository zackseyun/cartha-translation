id: JOB.29.17
reference: Job 29:17
source:
  edition: WLC
  text: וָֽ֭/אֲשַׁבְּרָ/ה מְתַלְּע֣וֹת עַוָּ֑ל וּ֝/מִ/שִּׁנָּ֗י/ו אַשְׁלִ֥יךְ טָֽרֶף׃
translation:
  text: I broke the fangs of the unrighteous, and from his teeth I threw the prey.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'jawbones' for 'fangs'; the Hebrew term can refer more broadly to the
      jaw-teeth, but here the predatory imagery favors 'fangs.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the wicked' or 'the wrongdoer.' The Hebrew emphasizes unjust or wrongful
      conduct.
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֲשַׁבְּרָה
  chosen: I broke
  alternatives:
  - I shattered
  - I broke apart
  lexicon: HALOT
  rationale: From שׁבר, a common verb for breaking. 'I broke' is direct and idiomatic,
    preserving Job's forceful self-description without over-intensifying beyond the
    Hebrew.
- source_word: מְתַלְּעוֹת
  chosen: fangs
  alternatives:
  - jawbones
  - molars
  lexicon: HALOT
  rationale: The noun refers to jaw-teeth or fangs. In parallel with 'from his teeth'
    and the predatory image of seized prey, 'fangs' best conveys the violent, animal-like
    metaphor.
- source_word: עַוָּל
  chosen: the unrighteous
  alternatives:
  - the wicked
  - the wrongdoer
  lexicon: HALOT
  rationale: The term denotes one acting unjustly or wrongfully. 'The unrighteous'
    preserves the moral-judicial sense more precisely than the broader 'wicked,' while
    still reading naturally in English.
- source_word: וּמִשִּׁנָּיו
  chosen: from his teeth
  alternatives:
  - out of his teeth
  - from between his teeth
  lexicon: HALOT
  rationale: The singular possessive likely refers back to the unrighteous person
    as a predator. 'From his teeth' is the most literal and clear rendering.
- source_word: אַשְׁלִיךְ
  chosen: I threw
  alternatives:
  - I cast
  - I snatched away and threw
  lexicon: HALOT
  rationale: Hiphil of שלך commonly means 'throw' or 'cast.' 'I threw' keeps the vividness
    of forcibly removing what had been seized.
- source_word: טָרֶף
  chosen: the prey
  alternatives:
  - what he had torn
  - the victim
  lexicon: HALOT
  rationale: טָרֶף is prey, especially in a predator image. 'The prey' preserves the
    metaphor of the unrighteous as a beast devouring victims.
