id: JOB.29.7
reference: Job 29:7
source:
  edition: WLC
  text: בְּ/צֵ֣אתִ/י שַׁ֣עַר עֲלֵי קָ֑רֶת בָּ֝/רְח֗וֹב אָכִ֥ין מוֹשָׁבִֽ/י־׃
translation:
  text: When I went out to the gate by the city, when I prepared my seat in the square,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the city gate'; the Hebrew says literally 'the gate' and then adds a
      phrase relating it to 'the city.'
    reason: lexical_alternative
  - marker: b
    text: Or 'in the street' or 'in the open place'; the term refers to a broad public
      area, not necessarily a narrow roadway.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּצֵאתִי
  chosen: When I went out
  alternatives:
  - As I went out
  - At my going out
  lexicon: HALOT
  rationale: The preposition ב plus infinitive construct of יצא with 1cs suffix is
    temporal here, introducing the circumstance of Job's former public honor. 'When
    I went out' is natural modern English and preserves the temporal force without
    over-literal awkwardness.
- source_word: שַׁעַר
  chosen: the gate
  alternatives:
  - the city gate
  lexicon: HALOT
  rationale: '''Gate'' in ancient Near Eastern context commonly denotes the civic/judicial
    gathering place. The following phrase ''by the city'' specifies location, so the
    main text keeps the more direct ''the gate'' while allowing the fuller contextual
    gloss as an alternative.'
- source_word: עֲלֵי קָרֶת
  chosen: by the city
  alternatives:
  - toward the city
  - up to the city
  - at the city
  lexicon: HALOT
  rationale: The phrase is somewhat idiomatic. With שער it most likely locates the
    gate in relation to the city rather than meaning Job went into the city generally.
    'By the city' gives clear English while preserving the local sense. 'City gate'
    could also be inferred, but the Hebrew keeps 'gate' and 'city' distinct.
- source_word: בָּרְחוֹב
  chosen: in the square
  alternatives:
  - in the street
  - in the open place
  lexicon: HALOT
  rationale: רחוב refers not merely to a roadway but to a broad public place or plaza.
    'Square' best conveys the civic/public setting in contemporary English.
- source_word: אָכִין
  chosen: I prepared
  alternatives:
  - I set up
  - I established
  lexicon: HALOT
  rationale: The Hiphil of כון can mean prepare, set, establish. Here with 'my seat'
    in a public place, 'prepared' fits the action of taking one's place for judgment
    or honor without overstating permanence.
- source_word: מוֹשָׁבִי
  chosen: my seat
  alternatives:
  - my place to sit
  - my dwelling-place
  lexicon: HALOT
  rationale: In this context of the gate and square, מושב refers to a seat or place
    of sitting, likely Job's honored place in public assembly, not a residence. 'My
    seat' is concise and contextually precise.
