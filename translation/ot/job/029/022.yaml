id: JOB.29.22
reference: Job 29:22
source:
  edition: WLC
  text: אַחֲרֵ֣י דְ֭בָרִ/י לֹ֣א יִשְׁנ֑וּ וְ֝/עָלֵ֗י/מוֹ תִּטֹּ֥ף מִלָּתִֽ/י׃
translation:
  text: After my words they did not speak again, and my speech dripped upon them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they did not answer again'; the Hebrew verb can suggest not repeating
      or not responding after Job had spoken.
    reason: lexical_alternative
  - marker: b
    text: Literally 'my word dripped upon them,' a poetic image for speech falling
      gently yet authoritatively on listeners.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַחֲרֵי
  chosen: After
  alternatives:
  - Following
  lexicon: HALOT
  rationale: Temporal preposition introducing what happened once Job had spoken; 'After'
    is the most natural English equivalent.
- source_word: דְבָרִי
  chosen: my words
  alternatives:
  - my speech
  - what I said
  lexicon: HALOT
  rationale: Plural of דָּבָר with first-person suffix. 'My words' preserves the concrete
    plural expression better than the more abstract 'my speech' in this clause.
- source_word: לֹא יִשְׁנוּ
  chosen: they did not speak again
  alternatives:
  - they did not repeat
  - they did not answer again
  - they did not change
  lexicon: HALOT
  rationale: From שנה in a context of response to speech. Here the sense is that after
    Job spoke, others did not continue or repeat speaking. 'They did not speak again'
    fits the discourse context better than a literal but less clear 'they did not
    repeat.'
- source_word: וַעֲלֵימוֹ
  chosen: upon them
  alternatives:
  - on them
  - over them
  lexicon: HALOT
  rationale: Preposition עַל with 3mp suffix. 'Upon them' works idiomatically with
    the following dripping metaphor and preserves the image.
- source_word: תִּטֹּף
  chosen: dripped
  alternatives:
  - dropped
  - distilled
  - fell gently
  lexicon: HALOT
  rationale: The verb נטף literally denotes dripping or dropping, often of speech
    in poetic metaphor. 'Dripped' preserves the vivid image without overinterpreting
    it.
- source_word: מִלָּתִי
  chosen: my speech
  alternatives:
  - my word
  - my utterance
  lexicon: HALOT
  rationale: Though singular, מִלָּה in poetic usage can denote one's spoken discourse.
    Rendering it 'my speech' avoids awkward English singular 'my word' while distinguishing
    it from the earlier 'my words.'
