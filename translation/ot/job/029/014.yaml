id: JOB.29.14
reference: Job 29:14
source:
  edition: WLC
  text: צֶ֣דֶק לָ֭בַשְׁתִּי וַ/יִּלְבָּשֵׁ֑/נִי כִּֽ/מְעִ֥יל וְ֝/צָנִ֗יף מִשְׁפָּטִֽ/י׃
translation:
  text: I put on righteousness, and it clothed me; my justice was like a robe and
    a turban.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I put on justice, and it clothed me.' The Hebrew צֶדֶק can be rendered
      'righteousness' or 'justice.'
    reason: lexical_alternative
  - marker: b
    text: A 'turban' here is a wrapped head covering, part of the verse's imagery
      of honor and public dignity.
    reason: cultural_note
lexical_decisions:
- source_word: צֶדֶק
  chosen: righteousness
  alternatives:
  - justice
  lexicon: HALOT
  rationale: צֶדֶק can denote righteousness or justice. Here, paired with מִשְׁפָּטִי
    and framed in clothing imagery, 'righteousness' preserves the moral quality while
    allowing the second colon to express judicial conduct with 'justice.' This also
    avoids flattening both nouns into the same English term.
- source_word: לָבַשְׁתִּי
  chosen: I put on
  alternatives:
  - I clothed myself with
  - I wore
  lexicon: HALOT
  rationale: The verb לבש in the Qal commonly means 'put on' or 'wear' clothing. 'I
    put on' is idiomatic and preserves the active metaphor of Job appropriating righteousness
    like a garment.
- source_word: וַיִּלְבָּשֵׁנִי
  chosen: and it clothed me
  alternatives:
  - and it covered me
  - and it put itself on me
  lexicon: HALOT
  rationale: 'The verb repeats לבש with righteousness as the subject and Job as object,
    creating a reciprocal image: Job put on righteousness, and righteousness clothed
    him. ''It clothed me'' preserves the poetic reversal better than a flatter ''it
    covered me.'''
- source_word: כִּמְעִיל
  chosen: like a robe
  alternatives:
  - like a mantle
  lexicon: HALOT
  rationale: מְעִיל denotes an outer garment or robe. 'Robe' is clear modern English
    and fits the dignity of the image.
- source_word: וְצָנִיף
  chosen: and a turban
  alternatives:
  - and a headwrap
  - and a headdress
  lexicon: HALOT
  rationale: צָנִיף refers to a wrapped head covering, often rendered 'turban.' 'Turban'
    is the most direct lexical equivalent, though modern readers may need a cultural
    note to avoid anachronistic associations.
- source_word: מִשְׁפָּטִי
  chosen: my justice
  alternatives:
  - my judgment
  - my just cause
  - my justice-making
  lexicon: HALOT
  rationale: מִשְׁפָּט can mean judgment, justice, legal decision, or ordinance. In
    this context of Job's public righteousness and social conduct, 'my justice' best
    conveys his just practice or administration of justice, complementing 'righteousness'
    in the first colon.
