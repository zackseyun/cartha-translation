id: JOB.17.16
reference: Job 17:16
source:
  edition: WLC
  text: בַּדֵּ֣י שְׁאֹ֣ל תֵּרַ֑דְנָה אִם יַ֖חַד עַל עָפָ֣ר נָֽחַת־־׃ס
translation:
  text: Will they go down to the bars of Sheol? Shall we descend together into the
    dust?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the parts of Sheol' or 'the bolts/bars of Sheol.' The Hebrew image likely
      evokes the imprisoning gates of the realm of the dead.
    reason: lexical_alternative
  - marker: b
    text: Or 'Shall we together rest in the dust?' The final Hebrew noun can be understood
      as 'descent' or, by some interpreters, as 'rest.'
    reason: alternative_reading
lexical_decisions:
- source_word: בַּדֵּי
  chosen: bars of
  alternatives:
  - parts of
  - members of
  - bolts of
  lexicon: HALOT
  rationale: In context with שְׁאוֹל ('Sheol'), the noun is best taken in the sense
    of 'bars/bolts,' a poetic image for the gates or imprisoning confines of the underworld.
    This fits Job's imagery of descent to death better than more literal but less
    contextual options like 'parts of.'
- source_word: שְׁאֹל
  chosen: Sheol
  alternatives:
  - the grave
  - the realm of the dead
  lexicon: HALOT
  rationale: Retained as 'Sheol' rather than flattened to 'grave' in order to preserve
    the Hebrew concept of the underworld/realm of the dead. This is a significant
    lexical-theological term and transliteration best preserves its semantic range.
- source_word: תֵּרַדְנָה
  chosen: will they go down
  alternatives:
  - they will descend
  - will they descend
  lexicon: HALOT
  rationale: The verb ירד means 'go down/descend.' Because the surrounding lines are
    framed by Job's rhetorical questioning about hope, an interrogative rendering
    in English fits the discourse well. The 3rd person feminine plural likely refers
    back to Job's 'hopes' or related feminine plural antecedents from the context.
- source_word: אִם
  chosen: shall
  alternatives:
  - if
  - whether
  lexicon: HALOT
  rationale: Although often 'if,' here אִם functions idiomatically in a rhetorical
    question or conditional-like clause introducing the second half of the verse.
    Rendering it as 'shall' produces natural English while preserving the interrogative
    force of the line.
- source_word: יַחַד
  chosen: together
  alternatives:
  - at once
  - altogether
  lexicon: HALOT
  rationale: The adverb most naturally means 'together' here, expressing shared descent/rest
    in death.
- source_word: עַל עָפָר
  chosen: into the dust
  alternatives:
  - upon the dust
  - on the dust
  lexicon: HALOT
  rationale: Although עַל is literally 'upon/on,' English idiom with the verb and
    context of death favors 'into the dust' to convey movement toward the grave. This
    is a modest dynamic adjustment in service of naturalness and sense.
- source_word: נָחַת
  chosen: descend
  alternatives:
  - go down
  - rest
  lexicon: HALOT
  rationale: The noun can denote 'descent' or 'going down,' though some take it in
    the sense of 'rest.' Given the parallel with תֵּרַדְנָה ('go down'), rendering
    the clause with a verbal idea of descent preserves the poetic parallelism. The
    alternative 'rest' is worth preserving in a footnote because many understand the
    line as speaking of resting together in the dust.
