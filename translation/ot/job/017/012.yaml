id: JOB.17.12
reference: Job 17:12
source:
  edition: WLC
  text: לַ֭יְלָה לְ/י֣וֹם יָשִׂ֑ימוּ א֝֗וֹר קָר֥וֹב מִ/פְּנֵי חֹֽשֶׁךְ־׃
translation:
  text: They make night into day; they say, ‘Light is near,’ in the face of darkness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'Light is near from the face of darkness.' The Hebrew
      phrase may also be understood as 'light is near because of darkness' or 'light
      is near before darkness.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לַיְלָה
  chosen: night
  alternatives:
  - the night
  lexicon: HALOT
  rationale: Basic noun meaning 'night.' Rendered without article in natural English
    while preserving the contrast with 'day.'
- source_word: לְיוֹם
  chosen: into day
  alternatives:
  - for day
  - as day
  lexicon: HALOT
  rationale: 'The prefixed ל with ''day'' after שׂים in this idiom expresses transformation/result:
    ''make X into Y.'' ''Into day'' best captures the sense in English.'
- source_word: יָשִׂימוּ
  chosen: they make
  alternatives:
  - they set
  - they turn
  lexicon: HALOT
  rationale: From שׂים, 'to put/set/place,' but in this construction with two nouns
    it idiomatically means 'make/turn.' 'They make' is concise and natural.
- source_word: אוֹר
  chosen: Light
  alternatives:
  - light
  lexicon: HALOT
  rationale: The noun means 'light.' Capitalization here is only sentence-initial
    within direct discourse, not theological. Retained as the content of what 'they
    say' to reflect the verse's compressed syntax.
- source_word: קָרוֹב
  chosen: is near
  alternatives:
  - is close
  - near at hand
  lexicon: HALOT
  rationale: Predicate adjective meaning 'near/close.' Supplied 'is' is required in
    English. 'Near' preserves the terse Hebrew expression.
- source_word: מִפְּנֵי
  chosen: in the face of
  alternatives:
  - because of
  - before
  lexicon: HALOT
  rationale: Literally 'from the face/presence of.' In this context it likely conveys
    proximity or confrontation with darkness rather than causation. 'In the face of'
    preserves the vividness and avoids overinterpreting the relation.
- source_word: חֹשֶׁךְ
  chosen: darkness
  alternatives:
  - the darkness
  - gloom
  lexicon: HALOT
  rationale: Standard rendering of the noun. 'Darkness' fits the antithesis with 'light'
    and the bleak tone of Job.
