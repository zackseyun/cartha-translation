id: JOB.17.1
reference: Job 17:1
source:
  edition: WLC
  text: רוּחִ֣/י חֻ֭בָּלָה יָמַ֥/י נִזְעָ֗כוּ קְבָרִ֥ים לִֽ/י׃
translation:
  text: My spirit is broken; my days are extinguished; graves await me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'My breath is broken.' The Hebrew רוּחַ can mean 'spirit' or 'breath.'
    reason: lexical_alternative
  - marker: b
    text: Or 'my days are snuffed out.' The verb likely carries the image of something
      being quenched or extinguished.
    reason: lexical_alternative
lexical_decisions:
- source_word: רוּחִי
  chosen: my spirit
  alternatives:
  - my breath
  lexicon: HALOT
  rationale: רוּחַ can denote spirit, wind, or breath. In Job's lament context, 'my
    spirit' best captures his inner life being crushed, while still allowing the physical
    sense to echo. 'My breath' is a viable alternative and is preserved in a footnote
    because the verse may also evoke failing life-breath.
- source_word: חֻבָּלָה
  chosen: is broken
  alternatives:
  - is ruined
  - is corrupted
  - is destroyed
  lexicon: HALOT
  rationale: The passive form conveys damage or ruin done to Job's רוּחַ. 'Is broken'
    is idiomatic in English and fits the lament tone without overinterpreting the
    exact mode of destruction.
- source_word: יָמַי
  chosen: my days
  lexicon: HALOT
  rationale: A straightforward possessive plural referring to the remainder of Job's
    lifespan.
- source_word: נִזְעָכוּ
  chosen: are extinguished
  alternatives:
  - are snuffed out
  - have been cut off
  lexicon: HALOT
  rationale: The verb conveys being quenched or extinguished. 'Are extinguished' preserves
    the metaphor of life or hope going out, likely with the image of a lamp being
    snuffed. 'Are snuffed out' is vivid but slightly more colloquial.
- source_word: קְבָרִים
  chosen: graves
  alternatives:
  - the grave
  - tombs
  lexicon: HALOT
  rationale: The plural is retained as 'graves' rather than flattened to the collective
    singular. The plural may intensify the sense that burial places are all that remain
    before him.
- source_word: לִי
  chosen: await me
  alternatives:
  - are for me
  - belong to me
  - are mine
  lexicon: HALOT
  rationale: The preposition literally means 'for me' or 'to me,' but in English the
    idiomatic sense in context is that graves are what lie ahead for Job. 'Await me'
    expresses the existential force without adding foreign content.
