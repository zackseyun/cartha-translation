id: JOB.17.6
reference: Job 17:6
source:
  edition: WLC
  text: וְֽ֭/הִצִּגַ/נִי לִ/מְשֹׁ֣ל עַמִּ֑ים וְ/תֹ֖פֶת לְ/פָנִ֣ים אֶֽהְיֶֽה׃
translation:
  text: He has made me a byword among the peoples, and I have become one before whom
    people spit.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'He has made me a proverb among the peoples.' The Hebrew term likely
      refers to a proverbial object of scorn.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'and I have become a spitting before faces,' that is, an object
      of open contempt.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִצִּגַנִי
  chosen: He has made me
  alternatives:
  - He has set me
  - He has exhibited me
  lexicon: HALOT
  rationale: 'From נצב/יצג in the Hiphil with 1cs suffix, the sense is causative:
    God has caused Job to be placed or made into something publicly visible. ''Has
    made me'' is idiomatic English and fits the predicate that follows.'
- source_word: לִמְשֹׁל
  chosen: a byword
  alternatives:
  - a proverb
  - a taunt-song
  - an object lesson
  lexicon: HALOT
  rationale: Though the form is unusual, in context and by comparison with Job 30:9
    and common renderings, it denotes becoming a proverbial object of scorn. 'Byword'
    preserves the public, proverbial-shame sense better than the more neutral 'proverb'.
- source_word: עַמִּים
  chosen: among the peoples
  alternatives:
  - for the peoples
  - among peoples
  - for people groups
  lexicon: HALOT
  rationale: Plural 'peoples' is retained to reflect עמים rather than flattening to
    singular 'people.' The preposition with the preceding infinitive/predicate is
    represented idiomatically as 'among the peoples' in English.
- source_word: וְתֹפֶת
  chosen: one before whom people spit
  alternatives:
  - a spitting
  - an object of spitting
  - a disgrace
  lexicon: HALOT
  rationale: The noun likely refers to spitting or an object of spitting, parallel
    to public disgrace. Because English 'I am a spitting before faces' is opaque,
    the sense is brought out as 'one before whom people spit,' preserving the humiliation
    imagery.
- source_word: לְפָנִים
  chosen: before whom
  alternatives:
  - in their face
  - before their faces
  - to the face
  lexicon: HALOT
  rationale: Literally 'before faces.' In this idiom the phrase indicates open, public
    contempt directed at Job. 'Before whom' yields natural English while preserving
    the idea of face-to-face humiliation.
- source_word: אֶהְיֶה
  chosen: I have become
  alternatives:
  - I am
  - I will be
  lexicon: HALOT
  rationale: Although formally imperfect, in poetic context it can express present
    resultant state. 'I have become' captures the present condition resulting from
    prior action and matches the parallel with 'He has made me.'
