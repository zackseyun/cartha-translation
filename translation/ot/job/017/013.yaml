id: JOB.17.13
reference: Job 17:13
source:
  edition: WLC
  text: אִם אֲ֭קַוֶּה שְׁא֣וֹל בֵּיתִ֑/י בַּ֝/חֹ֗שֶׁךְ רִפַּ֥דְתִּי יְצוּעָֽ/י־׃
translation:
  text: If I hope for Sheol as my house, if I spread my bed in the darkness,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the grave' or 'the realm of the dead.' The Hebrew 'Sheol' refers to
      the place of the dead and is broader than a burial site alone.
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  chosen: If
  alternatives:
  - Surely if
  - When
  lexicon: HALOT
  rationale: Introduces a conditional or hypothetical clause. In this context Job
    is considering the prospect of death/the grave; 'If' preserves the Hebrew conditional
    force without over-interpreting it as temporal.
- source_word: אֲקַוֶּה
  chosen: I hope for
  alternatives:
  - I wait for
  - I look for
  lexicon: HALOT
  rationale: From קוה in the Piel, expressing expectant waiting/hope. 'Hope for' fits
    the context of anticipating Sheol as his dwelling, while retaining the emotional
    nuance better than the flatter 'wait for'.
- source_word: שְׁאוֹל
  chosen: Sheol
  alternatives:
  - the grave
  - the realm of the dead
  lexicon: HALOT
  rationale: Rendered by transliteration to preserve the Hebrew concept rather than
    collapsing it into a single English equivalent. In Job, Sheol carries more than
    the idea of a burial place, so 'the grave' is too narrow. An explanatory alternative
    is preserved in a footnote.
- source_word: בֵּיתִי
  chosen: as my house
  alternatives:
  - my house
  - for my house
  lexicon: HALOT
  rationale: 'The verbless relation between ''Sheol'' and ''my house'' is naturally
    expressed in English with ''as'': Job hopes for Sheol as the place that will be
    his dwelling. This is smoother than a bare apposition while staying close to the
    Hebrew sense.'
- source_word: בַּחֹשֶׁךְ
  chosen: in the darkness
  alternatives:
  - in darkness
  lexicon: HALOT
  rationale: The prefixed preposition with article is best represented as 'in the
    darkness.' The phrase evokes the gloom associated with Sheol/death, and the article
    can be reflected idiomatically in English.
- source_word: רִפַּדְתִּי
  chosen: I spread
  alternatives:
  - I make ready
  - I lay out
  lexicon: HALOT
  rationale: The verb refers to spreading or arranging a couch/bed. 'I spread' is
    concise and idiomatic with 'bed' as object, preserving the concrete imagery of
    preparing a resting place.
- source_word: יְצוּעָי
  chosen: my bed
  alternatives:
  - my couch
  - my resting place
  lexicon: HALOT
  rationale: Refers to a place of lying down. 'My bed' is the most natural modern
    English rendering and fits the death-as-rest imagery in context.
