theological_decisions:
- issue: Whether to render שְׁאוֹל interpretively
  chosen_reading: Sheol
  alternative_readings:
  - the grave
  - the realm of the dead
  rationale: The verse concerns Job's expectation of death and descent to Sheol. Transliteration
    preserves the conceptual range and avoids importing a more developed doctrinal
    notion or reducing it to mere burial. Because English readers may benefit from
    clarification, an alternative is preserved in a footnote.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Preserve theological tension rather than resolve it.'
