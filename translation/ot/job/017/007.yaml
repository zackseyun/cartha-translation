id: JOB.17.7
reference: Job 17:7
source:
  edition: WLC
  text: וַ/תֵּ֣כַהּ מִ/כַּ֣עַשׂ עֵינִ֑/י וִֽ/יצֻרַ֖/י כַּ/צֵּ֣ל כֻּלָּֽ/ם׃
translation:
  text: My eye has grown dim from grief, and all my limbs are like a shadow.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from anger,' 'from vexation,' or 'from sorrow.' The Hebrew term can
      denote emotional agitation in several senses; here it is rendered 'grief' because
      the context is lament and suffering.
    reason: lexical_alternative
  - marker: b
    text: Or 'my form,' 'my members,' or 'my frame.' The Hebrew likely refers to Job's
      bodily features or members as a whole.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתֵּכַהּ
  chosen: has grown dim
  alternatives:
  - is dim
  - has become weak
  - fails
  lexicon: HALOT
  rationale: The verb from כהה denotes becoming dim, faint, or weak. 'Has grown dim'
    captures the resultant state in natural English while preserving the image of
    failing eyesight rather than paraphrasing more broadly.
- source_word: מִכַּעַשׂ
  chosen: from grief
  alternatives:
  - from vexation
  - from sorrow
  - from anger
  lexicon: HALOT
  rationale: כַּעַשׂ can denote vexation, provocation, grief, or anger depending on
    context. In Job's lament, the cause of his dimmed eye is his suffering and emotional
    anguish, so 'grief' best fits the context. Because 'anger' is a possible lexical
    alternative, it is preserved in a footnote.
- source_word: עֵינִי
  chosen: My eye
  alternatives:
  - my eyes
  lexicon: HALOT
  rationale: The Hebrew is singular with 1cs suffix. English can use singular idiomatically
    for eyesight in poetic lament, so 'My eye' preserves the source form and poetic
    tone.
- source_word: וִיצֻרַי
  chosen: my limbs
  alternatives:
  - my form
  - my members
  - my frame
  lexicon: HALOT
  rationale: The noun from יצר here is traditionally understood as bodily features
    or members. 'My limbs' gives a clear, concrete English rendering suited to the
    parallel with the eye and the simile of wasting away. Because the exact nuance
    is somewhat debated, alternatives are preserved in a footnote.
- source_word: כַּצֵּל
  chosen: like a shadow
  alternatives:
  - as a shadow
  lexicon: HALOT
  rationale: The simile expresses insubstantiality, frailty, or wasting. 'Like a shadow'
    is the most natural modern English equivalent and preserves the poetic image.
- source_word: כֻּלָּם
  chosen: all
  alternatives:
  - all of them
  lexicon: HALOT
  rationale: Refers collectively to Job's bodily members. 'All' is concise and idiomatic
    in English while retaining the distributive force.
