id: JOB.17.9
reference: Job 17:9
source:
  edition: WLC
  text: וְ/יֹאחֵ֣ז צַדִּ֣יק דַּרְכּ֑/וֹ וּֽ/טֳהָר יָ֝דַ֗יִם יֹסִ֥יף אֹֽמֶץ־׃
translation:
  text: Yet the righteous holds fast to his way, and the one with clean hands grows
    stronger.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and the clean-handed one adds strength'; the Hebrew literally says 'adds
      strength,' which may also be understood as 'grows in strength' or, more narrowly,
      'gains courage.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיֹאחֵז
  chosen: Yet ... holds fast
  alternatives:
  - and ... holds fast
  - but ... holds fast
  - and ... grasps/keeps hold
  lexicon: HALOT
  rationale: The conjunction with the imperfect verb can be rendered simply 'and,'
    but in context it carries a mildly adversative or continuative force after Job's
    bleak description, so 'Yet' brings out the sense without overinterpreting. The
    verb אחז means to seize, grasp, or hold fast; here idiomatically it conveys perseverance.
- source_word: צַדִּיק
  chosen: the righteous
  alternatives:
  - a righteous man
  - the righteous man
  lexicon: HALOT
  rationale: The singular adjective functions substantivally. 'The righteous' preserves
    the representative singular and avoids adding 'man' where the Hebrew focuses on
    the righteous person as a type.
- source_word: דַּרְכּוֹ
  chosen: his way
  alternatives:
  - his path
  - his course
  lexicon: HALOT
  rationale: דֶּרֶךְ commonly means way, path, or course of life. 'His way' is the
    most natural and sufficiently broad, preserving both literal and metaphorical
    resonance.
- source_word: וּטֳהָר יָדַיִם
  chosen: the one with clean hands
  alternatives:
  - he who is clean of hands
  - the clean-handed one
  - one pure of hands
  lexicon: HALOT
  rationale: This phrase is an idiom for innocence or moral purity. 'The one with
    clean hands' is idiomatic modern English and preserves the concrete imagery of
    the Hebrew.
- source_word: יֹסִיף
  chosen: grows
  alternatives:
  - adds
  - increases
  - continues to gain
  lexicon: HALOT
  rationale: The Hiphil of יסף literally means 'add/increase.' In English, with אֹמֶץ
    as object, 'grows' or 'grows in' best communicates the resulting increase in strength.
    This is a modestly dynamic choice for readability.
- source_word: אֹמֶץ
  chosen: stronger
  alternatives:
  - strength
  - courage
  - firmness
  lexicon: HALOT
  rationale: אֹמֶץ can denote strength, courage, or steadfast vigor. In this context
    of perseverance, 'stronger' captures the comparative sense produced by יֹסִיף
    אֹמֶץ ('adds strength'). 'Courage' is possible but narrower than the likely broader
    idea of increasing resolve/strength.
