id: JOB.17.3
reference: Job 17:3
source:
  edition: WLC
  text: שִֽׂימָ/ה נָּ֭א עָרְבֵ֣/נִי עִמָּ֑/ךְ מִֽי ה֝֗וּא לְ/יָדִ֥/י יִתָּקֵֽעַ־׃
translation:
  text: Lay down, please, a pledge for me with yourself; who else is there who would
    strike hands with me?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'be surety for me with yourself.' The Hebrew uses legal language for
      providing security or guarantee.
    reason: lexical_alternative
  - marker: b
    text: Literally 'who is he who would strike my hand?'—an idiom for entering a
      pledge or surety agreement.
    reason: cultural_note
lexical_decisions:
- source_word: שִׂימָה
  chosen: Lay down
  alternatives:
  - Set
  - Put
  lexicon: HALOT
  rationale: Imperative of שׂים, here in the sense of placing or establishing something.
    'Lay down' fits the legal/pledge context more naturally in English than the more
    generic 'set' or 'put.'
- source_word: נָּא
  chosen: please
  alternatives:
  - now
  lexicon: HALOT
  rationale: Polite particle softening the imperative; 'please' best captures the
    entreating force in contemporary English.
- source_word: עָרְבֵנִי
  chosen: a pledge for me
  alternatives:
  - be surety for me
  - give security for me
  lexicon: HALOT
  rationale: From ערב in the sense of giving surety/pledge. The object suffix indicates
    Job asks for security on his behalf. 'A pledge for me' preserves the legal imagery
    while remaining readable; the more traditional 'be surety for me' is preserved
    as an alternative.
- source_word: עִמָּךְ
  chosen: with yourself
  alternatives:
  - with you
  lexicon: HALOT
  rationale: The phrase indicates that God is both the one asked and the one with
    whom the pledge is lodged. 'With yourself' brings out the reflexive sense implied
    by the context more clearly than simple 'with you.'
- source_word: מִי הוּא
  chosen: who else is there
  alternatives:
  - who is he
  - who is there
  lexicon: HALOT
  rationale: Idiomatic rhetorical question introducing the impossibility of any other
    guarantor. 'Else' is supplied to make the contrast explicit in English.
- source_word: לְיָדִי
  chosen: with me
  alternatives:
  - to my hand
  - for my hand
  lexicon: HALOT
  rationale: In this idiom the hand represents entering into an agreement or giving
    a pledge. English normally expresses this as acting 'with me' rather than the
    literal 'to my hand.'
- source_word: יִתָּקֵעַ
  chosen: would strike hands
  alternatives:
  - would give a pledge
  - would clasp hands
  lexicon: HALOT
  rationale: From תקע in the idiom of striking/clasping hands to seal a pledge or
    surety agreement. 'Would strike hands' preserves the concrete legal gesture and
    can be clarified by footnote.
