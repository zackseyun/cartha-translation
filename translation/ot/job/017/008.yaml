theological_decisions:
- issue: Rendering חָנֵף
  chosen_reading: the godless
  alternative_readings:
  - the hypocrite
  rationale: 'The verse contrasts moral categories: upright/innocent versus impious.
    ''The godless'' preserves the ethical-religious contrast without importing a narrower
    psychological category. This is a lexical-contextual decision, not a doctrinally
    loaded one.'
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; preserve source text''s plain sense.'
