id: JOB.17.8
reference: Job 17:8
source:
  edition: WLC
  text: יָשֹׁ֣מּוּ יְשָׁרִ֣ים עַל זֹ֑את וְ֝/נָקִ֗י עַל חָנֵ֥ף יִתְעֹרָֽר־־׃
translation:
  text: The upright are appalled at this, and the innocent stirs himself up against
    the godless.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the hypocrite.' The Hebrew חָנֵף can denote an impious or irreverent
      person and in some contexts is traditionally rendered 'hypocrite.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יָשֹׁמּוּ
  chosen: are appalled
  alternatives:
  - are astonished
  - are desolate
  lexicon: HALOT
  rationale: From שׁמם in the qal, here expressing stunned horror or astonishment.
    'Are appalled' fits the emotional force in context better than the more wooden
    'are astonished,' while 'are desolate' is less natural here.
- source_word: יְשָׁרִים
  chosen: the upright
  alternatives:
  - upright people
  - the straight/upright ones
  lexicon: HALOT
  rationale: Plural adjective used substantivally. 'The upright' is idiomatic and
    preserves the moral category without unnecessary expansion.
- source_word: עַל זֹאת
  chosen: at this
  alternatives:
  - because of this
  - over this
  lexicon: HALOT
  rationale: The preposition עַל with demonstrative זֹאת here marks the occasion or
    cause of the reaction. 'At this' is concise and natural in English for an emotional
    response.
- source_word: נָקִי
  chosen: the innocent
  alternatives:
  - the clean
  - the guiltless
  lexicon: HALOT
  rationale: Refers to one free from guilt. 'The innocent' is the clearest modern
    English rendering in this moral context.
- source_word: חָנֵף
  chosen: the godless
  alternatives:
  - the hypocrite
  - the profane
  lexicon: HALOT
  rationale: Though often rendered 'hypocrite' in older translations, the Hebrew term
    broadly denotes the irreverent or impious person. 'The godless' better reflects
    the wider semantic range and avoids narrowing the sense to mere insincerity.
- source_word: יִתְעֹרָר
  chosen: stirs himself up
  alternatives:
  - rouses himself
  - is aroused
  lexicon: HALOT
  rationale: Hitpolel/reflexive nuance of עור suggests rousing oneself to action.
    'Stirs himself up' preserves the reflexive force and the sense of moral activation
    against the godless.
- source_word: עַל חָנֵף
  chosen: against the godless
  alternatives:
  - over the godless
  - concerning the godless
  lexicon: HALOT
  rationale: 'With a verb of arousal, עַל is best taken adversatively here: the innocent
    is stirred up in opposition to the godless.'
