id: JOB.17.4
reference: Job 17:4
source:
  edition: WLC
  text: כִּֽי לִ֭בָּ/ם צָפַ֣נְתָּ מִּ/שָּׂ֑כֶל עַל כֵּ֝֗ן לֹ֣א תְרֹמֵֽם־־׃
translation:
  text: For you have hidden their heart from understanding; therefore you will not
    exalt them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their mind' or 'their inner self'; Hebrew 'heart' often refers to the
      seat of thought and discernment, not only emotion.
    reason: lexical_alternative
  - marker: b
    text: Or 'you will not lift them up' or 'you will not let them triumph.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Because
  lexicon: HALOT
  rationale: Introduces the ground or explanation for the following statement. 'For'
    fits the poetic argument flow in English.
- source_word: לִבָּם
  chosen: their heart
  alternatives:
  - their mind
  - their inner self
  lexicon: HALOT
  rationale: Hebrew 'heart' commonly denotes the inner faculty of thought and will,
    not merely emotion. Singular with plural suffix is naturally rendered 'their heart'
    in close correspondence to the Hebrew.
- source_word: צָפַנְתָּ
  chosen: you have hidden
  alternatives:
  - you concealed
  - you kept back
  lexicon: HALOT
  rationale: The verb צפן means to hide, conceal, or store up. 'You have hidden' preserves
    the direct divine action and the completed verbal sense.
- source_word: מִשָּׂכֶל
  chosen: from understanding
  alternatives:
  - from insight
  - from good sense
  - from prudence
  lexicon: HALOT
  rationale: 'The prefixed מִן marks separation: their heart has been hidden away
    from understanding. ''Understanding'' is the most natural English rendering in
    context, referring to discernment or insight.'
- source_word: עַל כֵּן
  chosen: therefore
  alternatives:
  - for that reason
  - so then
  lexicon: HALOT
  rationale: Standard inferential phrase linking the first clause to the consequence
    in the second.
- source_word: לֹא תְרֹמֵם
  chosen: you will not exalt them
  alternatives:
  - you will not lift them up
  - you will not let them triumph
  lexicon: HALOT
  rationale: From רום, 'to raise/exalt.' In context, the sense is that God will not
    elevate or grant victory to those lacking understanding. 'Exalt them' keeps the
    verbal imagery while remaining idiomatic.
