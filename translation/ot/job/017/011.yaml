id: JOB.17.11
reference: Job 17:11
source:
  edition: WLC
  text: יָמַ֣/י עָ֭בְרוּ זִמֹּתַ֣/י נִתְּק֑וּ מ֖וֹרָשֵׁ֣י לְבָבִֽ/י׃
translation:
  text: My days have passed by; my plans are torn apart, the desires of my heart.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the possessions of my heart,' 'the cherished things of my heart,' or
      'the inheritances of my heart.' The Hebrew expression is rare and difficult.
    reason: lexical_alternative
lexical_decisions:
- source_word: יָמַי
  chosen: my days
  alternatives:
  - the days of my life
  lexicon: HALOT
  rationale: Literal construct + 1cs suffix. 'My days' is the natural English equivalent
    and preserves the idiom of one's lifetime/time passing.
- source_word: עָבְרוּ
  chosen: have passed by
  alternatives:
  - have passed
  - are gone
  lexicon: HALOT
  rationale: Qal perfect 3cp from עבר, with plural subject 'days.' 'Have passed by'
    preserves the completed action and the sense of time slipping away.
- source_word: זִמֹּתַי
  chosen: my plans
  alternatives:
  - my purposes
  - my schemes
  - my thoughts
  lexicon: HALOT
  rationale: זִמָּה can denote purpose, plan, or intention; in context Job laments
    the collapse of what he had hoped or intended. 'Plans' is idiomatic and avoids
    the negative moral sense that 'schemes' often carries in English.
- source_word: נִתְּקוּ
  chosen: are torn apart
  alternatives:
  - are broken off
  - are severed
  - have been cut off
  lexicon: HALOT
  rationale: Nifal perfect 3cp from נתק conveys being pulled apart, torn away, or
    severed. 'Are torn apart' communicates the force vividly in contemporary English
    while fitting the poetic lament.
- source_word: מוֹרָשֵׁי
  chosen: the desires of
  alternatives:
  - the possessions of
  - the inheritances of
  - the cherished things of
  lexicon: HALOT
  rationale: This noun is difficult in context. Although related forms can denote
    possession or inheritance, in this poetic line with 'heart' it most plausibly
    refers to what the heart possesses or holds onto—its cherished desires. This yields
    coherent parallelism with 'my plans' while respecting the underlying image.
- source_word: לְבָבִי
  chosen: my heart
  alternatives:
  - my inner being
  lexicon: HALOT
  rationale: Standard rendering of לבב with 1cs suffix. 'Heart' preserves the Hebrew
    anthropological center of thought and desire.
