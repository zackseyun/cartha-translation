id: JOB.17.15
reference: Job 17:15
source:
  edition: WLC
  text: וְ֭/אַיֵּה אֵפ֣וֹ תִקְוָתִ֑/י וְ֝/תִקְוָתִ֗/י מִ֣י יְשׁוּרֶֽ/נָּה׃
translation:
  text: And where, then, is my hope? And my hope—who can see it?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'who will behold it?' The Hebrew verb can be rendered 'see' or 'behold,'
      and the imperfect may be taken as either simple future or modal ('can').
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאַיֵּה
  chosen: And where
  alternatives:
  - Where
  - So where
  lexicon: HALOT
  rationale: אַיֵּה is an interrogative of place, 'where?'; the prefixed conjunction
    naturally continues Job's lament, so 'And where' preserves the discourse flow.
- source_word: אֵפוֹ
  chosen: then
  alternatives:
  - indeed
  - now
  lexicon: HALOT
  rationale: אֵפוֹ adds emphasis or inferential force to the question. 'Then' gives
    natural English emphasis without sounding archaic.
- source_word: תִקְוָתִי
  chosen: my hope
  alternatives:
  - my expectation
  lexicon: HALOT
  rationale: תִּקְוָה commonly denotes hope or expectation. 'Hope' is the most natural
    and contextually fitting rendering in Job's lament.
- source_word: וְתִקְוָתִי
  chosen: And my hope
  alternatives:
  - Even my hope
  - As for my hope
  lexicon: HALOT
  rationale: The repetition is retained rather than smoothed out, since the Hebrew
    repeats the noun for emphasis and poetic force.
- source_word: מִי
  chosen: who
  alternatives:
  - what person
  lexicon: HALOT
  rationale: Standard interrogative pronoun introducing the second question.
- source_word: יְשׁוּרֶנָּה
  chosen: can see it
  alternatives:
  - will behold it
  - can behold it
  - will see it
  lexicon: HALOT
  rationale: 'From שׁוּר, ''to look at, behold, see.'' The imperfect here is rendered
    with modal force in context: Job asks who is able to perceive any such hope. The
    3fs suffix refers back to תִקְוָה, hence ''it.'''
