id: JOB.17.2
reference: Job 17:2
source:
  edition: WLC
  text: אִם לֹ֣א הֲ֭תֻלִים עִמָּדִ֑/י וּ֝/בְ/הַמְּרוֹתָ֗/ם תָּלַ֥ן עֵינִֽ/י־׃
translation:
  text: Surely mockers are with me, and my eye lodges on their provocation.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'deceivers are with me'; the Hebrew term can carry the sense of deceptive
      or derisive people.
    reason: lexical_alternative
  - marker: b
    text: Or 'my eye remains on their rebellion' or 'their bitterness'; the Hebrew
      expression is difficult and may denote provoking, rebellious, or bitter conduct.
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם לֹא
  chosen: Surely
  alternatives:
  - Indeed
  - Truly
  - If not
  lexicon: HALOT
  rationale: In this idiom, אִם לֹא functions asseveratively rather than conditionally,
    introducing a strong affirmation. 'Surely' captures the emphatic force in natural
    English better than a literal 'if not.'
- source_word: הֲתֻלִים
  chosen: mockers
  alternatives:
  - deceivers
  - mocking men
  - boasters
  lexicon: HALOT
  rationale: The noun refers to those who deride or mock. In Job's context of hostile
    speech from companions, 'mockers' best fits the immediate sense. 'Deceivers' is
    possible lexically but is less contextually apt here.
- source_word: עִמָּדִי
  chosen: are with me
  alternatives:
  - are beside me
  - are around me
  lexicon: HALOT
  rationale: The preposition with first person suffix indicates presence in Job's
    company or immediate surroundings. 'Are with me' is the most straightforward English
    rendering.
- source_word: וּבְהַמְּרוֹתָם
  chosen: on their provocation
  alternatives:
  - on their rebellion
  - on their bitterness
  - amid their contentiousness
  lexicon: HALOT
  rationale: From מרה, the form denotes provoking, rebellious, or bitter conduct.
    In context of antagonistic speech, 'provocation' best captures the object of Job's
    fixed attention without over-specifying theological rebellion.
- source_word: תָּלַן
  chosen: lodges
  alternatives:
  - dwells
  - remains
  - spends the night
  lexicon: HALOT
  rationale: The verb לון literally means to lodge or spend the night. Applied to
    Job's eye, it is metaphorical for lingering or remaining fixed. 'Lodges' preserves
    the vivid Hebrew image better than the flatter 'remains.'
- source_word: עֵינִי
  chosen: my eye
  alternatives:
  - my eyes
  lexicon: HALOT
  rationale: The Hebrew is singular with first person suffix. English can preserve
    the singular idiomatically here.
