id: JOB.17.10
reference: Job 17:10
source:
  edition: WLC
  text: וְֽ/אוּלָ֗ם כֻּלָּ֣/ם תָּ֭שֻׁבוּ וּ/בֹ֣אוּ נָ֑א וְ/לֹֽא אֶמְצָ֖א בָ/כֶ֣ם חָכָֽם־׃
translation:
  text: But all of you, come back now, and come on; I will not find a wise man among
    you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'return now and come'; the Hebrew is a forceful summons, likely challenging
      Job's friends to try their arguments again.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאוּלָם
  chosen: But
  alternatives:
  - Yet
  - Nevertheless
  - However
  lexicon: HALOT
  rationale: Marks a strong adversative transition. 'But' is natural modern English
    and preserves the contrast without sounding overly formal.
- source_word: כֻּלָּם
  chosen: all of you
  alternatives:
  - all of them
  - every one of you
  lexicon: HALOT
  rationale: With the 2mp verbal forms that follow, the sense is directly addressing
    Job's interlocutors, so 'all of you' is preferable to the less direct 'all of
    them.'
- source_word: תָּשֻׁבוּ
  chosen: come back
  alternatives:
  - return
  - turn back
  lexicon: HALOT
  rationale: 'From שוב, here likely an imperative-like/jussive address in context:
    Job challenges them to try again in argument. ''Come back'' is idiomatic and fits
    the invitation/challenge sense better than the more wooden ''return.'''
- source_word: וּבֹאוּ נָא
  chosen: and come on
  alternatives:
  - and come now
  - please come
  - and come, please
  lexicon: HALOT
  rationale: בוא plus נָא functions as an urgent appeal or summons. 'Come on' captures
    the rhetorical challenge in contemporary English; 'please come' would sound too
    polite for the context.
- source_word: וְלֹא אֶמְצָא
  chosen: I will not find
  alternatives:
  - I do not find
  - I cannot find
  lexicon: HALOT
  rationale: 'The imperfect naturally conveys future/resultative force here after
    the summons: even if they come again, Job will not find wisdom among them. ''Cannot
    find'' would add inability more strongly than the Hebrew requires.'
- source_word: בָכֶם
  chosen: among you
  alternatives:
  - in you
  - with you
  lexicon: HALOT
  rationale: In this context the preposition indicates location within the group of
    addressees; 'among you' is the most idiomatic English rendering.
- source_word: חָכָם
  chosen: a wise man
  alternatives:
  - one wise person
  - a wise one
  lexicon: HALOT
  rationale: The singular adjective functions substantivally. Because the Hebrew is
    grammatically masculine and refers to Job's male interlocutors, 'a wise man' is
    gender-accurate and fits the discourse situation better than an inclusive recasting.
