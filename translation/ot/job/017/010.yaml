theological_decisions:
- issue: Gendered rendering of חָכָם
  chosen_reading: a wise man
  alternative_readings:
  - a wise person
  - anyone wise
  rationale: The source is grammatically masculine singular used substantivally, and
    the immediate referents are Job's male companions. Per translation philosophy,
    gender-accurate rendering is preferred over gender-neutral smoothing.
