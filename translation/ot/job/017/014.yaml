id: JOB.17.14
reference: Job 17:14
source:
  edition: WLC
  text: לַ/שַּׁ֣חַת קָ֭רָאתִי אָ֣בִ/י אָ֑תָּה אִמִּ֥/י וַ֝/אֲחֹתִ֗/י לָֽ/רִמָּֽה׃
translation:
  text: I call to the pit, ‘You are my father,’ and to the worm, ‘My mother and my
    sister.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to corruption' or 'to the grave' for 'to the pit.' The Hebrew term can
      refer to a pit, grave, or destruction/decay.
    reason: lexical_alternative
  - marker: b
    text: Or 'to the maggot' or 'to worms.' The Hebrew word denotes the wormlike agents
      of bodily decay.
    reason: lexical_alternative
lexical_decisions:
- source_word: לַשַּׁחַת
  chosen: to the pit
  alternatives:
  - to corruption
  - to the grave
  lexicon: HALOT
  rationale: שַׁחַת can denote a pit, grave, or destruction/corruption. In this poetic
    context, Job personifies the realm of decay and death. 'Pit' preserves the concrete
    image while allowing its funerary sense. Alternatives are viable and worth preserving.
- source_word: קָרָאתִי
  chosen: I call
  alternatives:
  - I have called
  - I say to
  lexicon: HALOT
  rationale: Qal perfect 1cs of קרא can be rendered as a present-like perfect in English
    in vivid poetic speech. 'I call' fits the immediacy of Job's lament and works
    naturally with the direct quotations that follow.
- source_word: אָבִי
  chosen: my father
  lexicon: HALOT
  rationale: Straightforward possessive noun. The familial term is central to the
    verse's shocking personification of death and decay.
- source_word: אָתָּה
  chosen: you are
  alternatives:
  - you
  lexicon: HALOT
  rationale: 'The independent pronoun functions predicatively after the quoted address.
    English idiom requires the copula: ''You are my father.'''
- source_word: אִמִּי
  chosen: my mother
  lexicon: HALOT
  rationale: Direct, literal rendering of the kinship term in parallel with 'my father'
    and 'my sister.'
- source_word: וַאֲחֹתִי
  chosen: and my sister
  lexicon: HALOT
  rationale: The conjunction and noun are rendered directly. Keeping all three kinship
    terms preserves the verse's stark poetic effect.
- source_word: לָרִמָּה
  chosen: to the worm
  alternatives:
  - to maggot
  - to worms
  lexicon: HALOT
  rationale: רִמָּה commonly refers to worm/maggot associated with decay. Singular
    'the worm' matches the Hebrew form and keeps the personified addressee parallel
    to 'the pit.' 'Maggot' is possible but harsher and less idiomatic in this poetic
    line.
