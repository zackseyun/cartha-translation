id: JOB.38.6
reference: Job 38:6
source:
  edition: WLC
  text: עַל מָ֭ה אֲדָנֶ֣י/הָ הָטְבָּ֑עוּ א֥וֹ מִֽי יָ֝רָ֗ה אֶ֣בֶן פִּנָּתָֽ/הּ־־׃
translation:
  text: On what were its bases sunk, or who laid its cornerstone,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'its foundations' or 'its sockets' for 'its bases.' The Hebrew term refers
      to structural supports or foundation-bases.
    reason: lexical_alternative
  - marker: b
    text: Literally 'who cast/threw the stone of its corner,' an idiom for laying
      a cornerstone.
    reason: lexical_alternative
lexical_decisions:
- source_word: עַל מָה
  chosen: On what
  alternatives:
  - Upon what
  - On what thing
  lexicon: HALOT
  rationale: 'The preposition עַל with the interrogative מָה introduces a question
    of foundation/support: ''on what?'' ''Upon what'' is possible but slightly more
    formal; ''On what'' is natural modern English and preserves the image.'
- source_word: אֲדָנֶיהָ
  chosen: its bases
  alternatives:
  - its foundations
  - its sockets
  lexicon: HALOT
  rationale: אֶדֶן can denote a base, pedestal, or foundation-socket. In this architectural
    metaphor for the earth, 'bases' best matches the plural concrete image while avoiding
    overgeneralizing to abstract 'foundations.' 'Sockets' is possible but sounds overly
    technical here.
- source_word: הָטְבָּעוּ
  chosen: were sunk
  alternatives:
  - were set
  - were fastened
  - were embedded
  lexicon: HALOT
  rationale: The Hophal form of טָבַע conveys being made to sink or be embedded. 'Were
    sunk' preserves the passive sense and the imagery of foundations driven or embedded
    into place. 'Were set' is smoother but loses the vividness of the Hebrew verb.
- source_word: אוֹ
  chosen: or
  alternatives:
  - or else
  lexicon: HALOT
  rationale: Simple disjunctive conjunction linking the two rhetorical questions.
- source_word: מִי
  chosen: who
  lexicon: HALOT
  rationale: Straightforward interrogative pronoun introducing the second question.
- source_word: יָרָה
  chosen: laid
  alternatives:
  - cast
  - threw
  - shot
  lexicon: HALOT
  rationale: The verb יָרָה literally can mean 'throw/cast/shoot,' but in construction
    imagery with 'cornerstone' it idiomatically refers to placing or laying. 'Laid'
    communicates the intended architectural action in clear English.
- source_word: אֶבֶן פִּנָּתָהּ
  chosen: its cornerstone
  alternatives:
  - the stone of its corner
  - its corner stone
  lexicon: HALOT
  rationale: The construct phrase literally means 'the stone of its corner.' Standard
    English architectural idiom is 'cornerstone,' which preserves the metaphor and
    reads naturally. The 3fs suffix is rendered as 'its,' referring to the earth in
    context.
