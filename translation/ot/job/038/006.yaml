theological_decisions:
- issue: Architectural metaphor for the earth's creation
  chosen_reading: Retain the metaphor of bases and cornerstone without flattening
    it into abstract cosmological explanation.
  alternative_readings:
  - Render more dynamically as 'What supports the earth?'
  rationale: The verse is part of God's poetic interrogation of Job. Preserving the
    building imagery respects the Hebrew poetry and avoids importing a modern scientific
    or overly interpretive paraphrase.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve the source
    text''s plain sense without paraphrase beyond what it warrants.'
