theological_decisions:
- issue: Creation terminology in divine speech
  chosen_reading: Render יסד with 'founded' rather than a more interpretive paraphrase.
  alternative_readings:
  - laid the foundation of
  rationale: The verse presents God as the one who established the earth in creation.
    'Founded' preserves the architectural creation metaphor without overexpanding
    it. No doctrinal tension is resolved beyond the explicit claim of divine creatorship
    in the text.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    theological tension rather than resolve it'
