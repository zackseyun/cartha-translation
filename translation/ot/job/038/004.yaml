id: JOB.38.4
reference: Job 38:4
source:
  edition: WLC
  text: אֵיפֹ֣ה הָ֭יִיתָ בְּ/יָסְדִ/י אָ֑רֶץ הַ֝גֵּ֗ד אִם יָדַ֥עְתָּ בִינָֽה־־׃
translation:
  text: Where were you when I founded the earth? Tell me, if you know understanding.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'when I laid the foundation of the earth.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵיפֹה
  chosen: Where
  alternatives:
  - Where then
  - Where now
  lexicon: HALOT
  rationale: Interrogative adverb asking location. Simple 'Where' best fits natural
    English and preserves the force of God's challenge.
- source_word: הָיִיתָ
  chosen: were you
  alternatives:
  - have you been
  lexicon: HALOT
  rationale: Qal perfect 2ms of היה in a past-time question. 'Were you' is the straightforward
    idiomatic English equivalent.
- source_word: בְּיָסְדִי
  chosen: when I founded
  alternatives:
  - at my founding
  - when I laid the foundation of
  lexicon: HALOT
  rationale: 'The preposition ב with infinitive construct plus 1cs suffix expresses
    temporal sense: ''when I founded/laid the foundation of.'' ''Founded'' is concise
    and natural, while still reflecting יסד. The fuller idiom ''laid the foundation
    of'' is possible but less direct here.'
- source_word: אָרֶץ
  chosen: the earth
  alternatives:
  - the land
  lexicon: HALOT
  rationale: In this cosmic-creation context, 'earth' is clearly intended rather than
    a localized 'land'.
- source_word: הַגֵּד
  chosen: Tell me
  alternatives:
  - Declare
  - Tell
  lexicon: HALOT
  rationale: Imperative of נגד, a command to state or declare. 'Tell me' is idiomatic
    in English and captures the confrontational tone; 'me' is supplied naturally from
    context though not separately expressed in Hebrew.
- source_word: אִם
  chosen: if
  alternatives:
  - since
  - whether
  lexicon: HALOT
  rationale: 'Here אִם introduces a conditional challenge: ''if you know...'' This
    is the most natural and contextually fitting rendering.'
- source_word: יָדַעְתָּ
  chosen: you know
  alternatives:
  - you knew
  - you have known
  lexicon: HALOT
  rationale: 'Though formally perfect, in this rhetorical conditional it functions
    well as present in English: ''if you know.'' This preserves the live challenge
    of the speech.'
- source_word: בִינָה
  chosen: understanding
  alternatives:
  - insight
  - discernment
  lexicon: HALOT
  rationale: בינה denotes understanding or discernment. 'Understanding' is the most
    standard and transparent rendering in wisdom literature.
