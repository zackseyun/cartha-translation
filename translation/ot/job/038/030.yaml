id: JOB.38.30
reference: Job 38:30
source:
  edition: WLC
  text: כָּ֭/אֶבֶן מַ֣יִם יִתְחַבָּ֑אוּ וּ/פְנֵ֥י תְ֝ה֗וֹם יִתְלַכָּֽדוּ׃
translation:
  text: The waters become hard like stone, and the surface of the deep is frozen.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more literally, 'The waters hide themselves like stone.' The Hebrew verb
      is unusual here and likely conveys the waters withdrawing into a hardened, frozen
      state.
    reason: lexical_alternative
  - marker: b
    text: Or 'the surface of the deep is locked together' or 'congeals.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּאֶבֶן
  chosen: like stone
  alternatives:
  - as stone
  - into stone
  lexicon: HALOT
  rationale: The prefixed כ marks comparison, so the phrase is best rendered simile-wise
    as 'like stone' rather than a stronger transformational 'into stone.' 'Stone'
    is more natural than 'rock' here and matches the image of hardening/freezing.
- source_word: מַיִם
  chosen: the waters
  alternatives:
  - water
  lexicon: HALOT
  rationale: Though formally plural, מַיִם commonly functions as a mass noun. 'The
    waters' preserves the Hebrew plural form and suits the poetic, cosmic setting
    of Job 38.
- source_word: יִתְחַבָּאוּ
  chosen: become hard
  alternatives:
  - hide themselves
  - congeal
  - are hidden
  lexicon: HALOT
  rationale: The root normally means 'hide oneself,' but in this poetic context with
    'like stone' and the parallel clause about the deep freezing, the sense is that
    the waters withdraw into hardness or congeal. 'Become hard' communicates the resulting
    state in clear English while respecting the imagery. A more literal alternative
    is preserved in a footnote because the Hebrew verb is unusual here.
- source_word: וּפְנֵי
  chosen: and the surface of
  alternatives:
  - and the face of
  lexicon: HALOT
  rationale: Hebrew 'face(s) of' often idiomatically means 'surface of' when used
    of waters or the deep. 'Surface' gives the natural English sense without losing
    the concrete imagery.
- source_word: תְהוֹם
  chosen: the deep
  alternatives:
  - the abyss
  - the primeval deep
  lexicon: HALOT
  rationale: '''The deep'' is the standard, contextually fitting rendering for תהום
    in cosmic and watery contexts. ''Abyss'' is possible but sounds more interpretive
    and less natural here.'
- source_word: יִתְלַכָּדוּ
  chosen: is frozen
  alternatives:
  - is seized
  - is locked together
  - congeals
  lexicon: HALOT
  rationale: From a root meaning 'be captured/seized/held fast,' the verb here describes
    the surface of the deep being bound up by cold. 'Is frozen' expresses the poetic
    image clearly in idiomatic English; 'locked together' is more literal but less
    natural in context.
