id: JOB.38.29
reference: Job 38:29
source:
  edition: WLC
  text: מִ/בֶּ֣טֶן מִ֭י יָצָ֣א הַ/קָּ֑רַח וּ/כְפֹ֥ר שָׁ֝מַיִם מִ֣י יְלָדֽ/וֹ׃
translation:
  text: From whose womb did the ice come forth, and who gave birth to the frost of
    heaven?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "the hoarfrost of heaven."
    reason: lexical_alternative
lexical_decisions:
- source_word: מִבֶּטֶן
  chosen: From whose womb
  alternatives:
  - Out of whose womb
  - From what womb
  lexicon: HALOT
  rationale: בֶּטֶן literally denotes 'belly, womb.' In this poetic context, 'womb'
    preserves the birth imagery that governs both cola. Rendering the prefixed preposition
    with 'from' gives natural English while retaining the source metaphor.
- source_word: מִי
  chosen: whose / who
  alternatives:
  - what one
  - from whom
  lexicon: HALOT
  rationale: The interrogative asks for a personal source. In the first colon, English
    idiom requires 'whose' with 'womb'; in the second, simple 'who' is the natural
    equivalent.
- source_word: יָצָא
  chosen: did ... come forth
  alternatives:
  - came out
  - issued forth
  lexicon: HALOT
  rationale: The verb means 'go out, come out.' 'Come forth' fits the elevated poetic
    register and coheres with the childbirth metaphor without becoming archaic in
    this context.
- source_word: הַקָּרַח
  chosen: the ice
  alternatives:
  - ice
  lexicon: HALOT
  rationale: קֶרַח denotes 'ice.' English normally omits the article in generic reference,
    but 'the ice' is acceptable and reflects the Hebrew definite form in this poetic
    question.
- source_word: וּכְפֹר שָׁמַיִם
  chosen: and ... the frost of heaven
  alternatives:
  - and the hoarfrost of heaven
  - and the frost of the skies
  lexicon: HALOT
  rationale: כְּפוֹר refers to frost, often specifically hoarfrost. 'Frost' is more
    accessible modern English; 'of heaven' preserves the genitive and the cosmic imagery
    of the verse better than flattening to 'sky-frost.'
- source_word: שָׁמַיִם
  chosen: heaven
  alternatives:
  - the heavens
  - the sky
  lexicon: HALOT
  rationale: In Hebrew poetry שָׁמַיִם can mean 'heavens' or 'sky.' Here singular
    'heaven' works idiomatically in the phrase 'frost of heaven' and preserves the
    elevated tone. 'Sky' would be more prosaic.
- source_word: יְלָדוֹ
  chosen: gave birth to
  alternatives:
  - begot
  - bore
  lexicon: HALOT
  rationale: ילד in the Qal commonly means 'bear, give birth to.' 'Gave birth to'
    makes the maternal metaphor explicit and clear in modern English. The 3ms suffix
    is represented by 'to the frost,' the direct object in English.
