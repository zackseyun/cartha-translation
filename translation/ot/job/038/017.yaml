id: JOB.38.17
reference: Job 38:17
source:
  edition: WLC
  text: הֲ/נִגְל֣וּ לְ֭/ךָ שַׁעֲרֵי מָ֑וֶת וְ/שַׁעֲרֵ֖י צַלְמָ֣וֶת תִּרְאֶֽה־׃
translation:
  text: Have the gates of death been revealed to you, or have you seen the gates of
    deep darkness?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the shadow of death.' The Hebrew צַלְמָוֶת is traditionally rendered
      this way, but it can also denote deep darkness or gloom more generally.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲ/נִגְלוּ
  chosen: Have ... been revealed
  alternatives:
  - Have ... been uncovered
  - Have ... been disclosed
  - Were ... revealed
  lexicon: HALOT
  rationale: 'The interrogative הֲ with Niphal perfect 3cp of גלה forms a rhetorical
    question: ''have they been revealed?'' The passive sense ''been revealed'' is
    natural English and preserves the Hebrew verbal voice better than a more active
    paraphrase.'
- source_word: לְךָ
  chosen: to you
  rationale: 'The preposition with 2ms suffix marks the addressee directly: the gates
    being revealed ''to you.'''
- source_word: שַׁעֲרֵי מָוֶת
  chosen: the gates of death
  alternatives:
  - death's gates
  lexicon: HALOT
  rationale: Construct chain rendered straightforwardly. 'Gates of death' preserves
    the concrete imagery of the realm of death rather than abstracting it.
- source_word: וְשַׁעֲרֵי
  chosen: or have you seen the gates of
  alternatives:
  - and the gates of
  rationale: Although ו normally means 'and,' in English the second clause in this
    paired rhetorical question reads more naturally as 'or have you seen...' to convey
    the parallel alternatives being posed. This is an optimal-equivalence adjustment
    for idiomatic English while preserving the interrogative force.
- source_word: צַלְמָוֶת
  chosen: deep darkness
  alternatives:
  - the shadow of death
  - gloom
  lexicon: HALOT
  rationale: צַלְמָוֶת often denotes profound darkness or gloom, not necessarily death
    itself in every context. 'Deep darkness' reflects current lexical consensus better
    than the traditional but potentially over-specific 'shadow of death,' while retaining
    the grave, underworld-like imagery in context.
- source_word: תִּרְאֶה
  chosen: have you seen
  alternatives:
  - do you see
  - have you looked upon
  lexicon: HALOT
  rationale: Qal imperfect 2ms in this poetic interrogative context is well rendered
    as an English perfect question, parallel to 'Have ... been revealed to you?' and
    fitting the sequence of divine rhetorical questions.
