theological_decisions:
- issue: Rendering of אָדָם in a generic-humanity context
  chosen_reading: human
  alternative_readings:
  - man
  - humankind
  rationale: The doctrine file lists אָדָם with default 'man / humankind (context).'
    Here the term is generic rather than referring to a male individual. 'Human' preserves
    the generic sense while maintaining the poetic distinction from the preceding
    אִישׁ.
