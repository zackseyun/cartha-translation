id: JOB.38.26
reference: Job 38:26
source:
  edition: WLC
  text: לְ֭/הַמְטִיר עַל אֶ֣רֶץ לֹא אִ֑ישׁ מִ֝דְבָּ֗ר לֹא אָדָ֥ם בּֽ/וֹ־־־׃
translation:
  text: to make it rain on a land where no man is, on a wilderness in which there
    is no human,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or, ''where there is no man ... in which there is no man.'' The Hebrew
      uses two related but distinct terms: אִישׁ (''man'') and אָדָם (''human, humankind'').'
    reason: lexical_alternative
lexical_decisions:
- source_word: לְהַמְטִיר
  chosen: to make it rain
  alternatives:
  - to cause rain to fall
  - to rain
  lexicon: HALOT
  rationale: 'Hiphil infinitive construct of מטר expresses causation: ''to cause rain.''
    English idiom favors ''make it rain'' or ''cause rain to fall.'' ''Make it rain''
    is concise and natural while preserving the causative sense better than the simpler
    ''to rain.'''
- source_word: עַל
  chosen: 'on'
  alternatives:
  - upon
  - over
  lexicon: HALOT
  rationale: The preposition marks the surface/location receiving the rain. 'On' is
    the most natural modern equivalent here.
- source_word: אֶרֶץ
  chosen: a land
  alternatives:
  - the earth
  - a country
  lexicon: HALOT
  rationale: In context the term refers to a tract of land receiving rain, not the
    whole globe. The anarthrous Hebrew is well represented by 'a land.'
- source_word: לֹא אִישׁ
  chosen: where no man is
  alternatives:
  - where there is no man
  - with no one
  lexicon: HALOT
  rationale: 'אִישׁ is singular ''man'' and, per the project''s gender-accurate policy,
    should not be flattened to a gender-neutral term when the Hebrew uses masculine
    representative language. The clause is rendered idiomatically with existential
    force: ''where no man is.'''
- source_word: מִדְבָּר
  chosen: a wilderness
  alternatives:
  - desert
  - wasteland
  lexicon: HALOT
  rationale: מִדְבָּר commonly denotes uncultivated steppe/wilderness rather than
    specifically sandy desert. 'Wilderness' best preserves the broader sense in Job's
    poetry.
- source_word: לֹא אָדָם בּוֹ
  chosen: in which there is no human
  alternatives:
  - where no man is in it
  - in which there is no person
  lexicon: HALOT
  rationale: אָדָם can denote humanity generically. To preserve the poetic parallelism
    with אִישׁ while still reflecting the broader human sense, 'human' is chosen here.
    The attached pronoun בּוֹ is naturally rendered by 'in which.'
