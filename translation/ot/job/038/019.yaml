id: JOB.38.19
reference: Job 38:19
source:
  edition: WLC
  text: אֵי זֶ֣ה הַ֭/דֶּרֶךְ יִשְׁכָּן א֑וֹר וְ֝/חֹ֗שֶׁךְ אֵי זֶ֥ה מְקֹמֽ/וֹ־־־׃
translation:
  text: Where is the way to the dwelling of light, and where is the place of darkness,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'Which is the way where light dwells, and darkness—where
      is its place?'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵי זֶה
  chosen: Where is
  alternatives:
  - Which is
  - Where
  lexicon: HALOT
  rationale: The interrogative phrase asks for location/direction. In English, 'Where
    is' best captures the idiomatic force here, especially since the verse asks about
    the location of light's dwelling and darkness's place.
- source_word: הַדֶּרֶךְ
  chosen: the way
  alternatives:
  - the road
  - the path
  lexicon: HALOT
  rationale: דֶּרֶךְ commonly means 'way, road, path.' 'Way' preserves the slightly
    broader sense, fitting both literal route and conceptual access.
- source_word: יִשְׁכָּן
  chosen: to the dwelling of
  alternatives:
  - where light dwells
  - abides
  - resides
  lexicon: HALOT
  rationale: 'The verb שׁכן means ''to dwell, settle, reside.'' Rendering the clause
    as ''to the dwelling of light'' smooths the Hebrew into natural English while
    preserving the image of light as having a habitation. This also keeps הַדֶּרֶךְ
    linked to a destination: ''the way to the dwelling of light.'''
- source_word: אוֹר
  chosen: light
  lexicon: HALOT
  rationale: Standard rendering; the context contrasts cosmic light with darkness.
- source_word: וְחֹשֶׁךְ
  chosen: and ... darkness
  lexicon: HALOT
  rationale: Simple conjunction plus noun; the verse balances light and darkness in
    parallel clauses.
- source_word: מְקוֹמוֹ
  chosen: the place of darkness
  alternatives:
  - its place
  - its dwelling place
  lexicon: HALOT
  rationale: מָקוֹם means 'place.' The 3ms suffix refers back to darkness. 'The place
    of darkness' is more natural in English than 'its place' while preserving the
    possessive sense.
