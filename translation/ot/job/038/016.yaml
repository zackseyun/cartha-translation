id: JOB.38.16
reference: Job 38:16
source:
  edition: WLC
  text: הֲ֭/בָאתָ עַד נִבְכֵי יָ֑ם וּ/בְ/חֵ֥קֶר תְּ֝ה֗וֹם הִתְהַלָּֽכְתָּ־־׃
translation:
  text: Have you come to the springs of the sea, or walked in the depths of the deep?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'sources' of the sea.
    reason: lexical_alternative
  - marker: b
    text: Or 'walked in the farthest reaches of the deep' or 'walked in the recesses
      of the deep.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲבָאתָ
  chosen: Have you come
  alternatives:
  - Have you entered
  - Have you gone
  lexicon: HALOT
  rationale: Qal perfect 2ms of בוא in an interrogative setting. 'Have you come' is
    natural English and preserves the direct challenge addressed to Job. 'Entered'
    is possible in context but is less directly tied to the basic motion verb.
- source_word: עַד
  chosen: to
  alternatives:
  - as far as
  - unto
  lexicon: HALOT
  rationale: The preposition marks movement reaching a destination. In idiomatic English
    with 'come,' 'to' best conveys the sense, while 'as far as' is more wooden.
- source_word: נִבְכֵי
  chosen: springs
  alternatives:
  - sources
  - fountains
  - recesses
  lexicon: HALOT
  rationale: The noun refers to the sources or springing places of waters. In this
    context of the sea's hidden origins, 'springs' is vivid and well established.
    'Sources' is possible but less concrete; 'recesses' fits some contextual readings
    but is less likely than a hydrological sense here.
- source_word: יָם
  chosen: the sea
  alternatives:
  - the Sea
  lexicon: HALOT
  rationale: Common noun for the sea, not a proper name in this context. The definite
    sense is supplied naturally in English.
- source_word: וּבְחֵקֶר
  chosen: or walked in the depths
  alternatives:
  - and in the search
  - and in the recesses
  - and in the farthest reaches
  lexicon: HALOT
  rationale: חֵקֶר can denote searching out, investigation, or what is searched out
    to the limit; in context with תהום and the following verb of movement, it points
    to the inaccessible depths or farthest reaches. Rendering the phrase adverbially
    as 'in the depths' communicates the sense in natural English. The conjunction
    is rendered 'or' because the verse presents parallel interrogatives with a second
    challenge rather than simple additive narration.
- source_word: תְּהוֹם
  chosen: the deep
  alternatives:
  - the deep waters
  - the abyss
  lexicon: HALOT
  rationale: תְּהוֹם denotes the primeval deep or oceanic depths. 'The deep' is the
    most direct and traditional rendering, preserving both poetic force and possible
    cosmological resonance. 'Abyss' is possible but can over-specify.
- source_word: הִתְהַלָּכְתָּ
  chosen: walked
  alternatives:
  - roamed
  - gone about
  lexicon: HALOT
  rationale: Hitpael of הלך conveys walking about or moving to and fro. 'Walked' preserves
    the metaphor and the rhetorical force of traversing inaccessible places; 'roamed'
    is interpretive and slightly freer.
