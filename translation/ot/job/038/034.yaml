id: JOB.38.34
reference: Job 38:34
source:
  edition: WLC
  text: הֲ/תָרִ֣ים לָ/עָ֣ב קוֹלֶ֑/ךָ וְֽ/שִׁפְעַת מַ֥יִם תְּכַסֶּֽ/ךָּ־׃
translation:
  text: Can you raise your voice to the clouds, so that an abundance of water covers
    you?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to the cloud' or 'to the thick cloud.' The Hebrew noun can be singular
      and may emphasize a dense rain cloud.
    reason: lexical_alternative
  - marker: b
    text: Or 'and a flood of waters covers you.' The Hebrew expression can suggest
      overflowing abundance.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲתָרִים
  chosen: Can you raise
  alternatives:
  - Do you lift up
  - Can you exalt
  lexicon: HALOT
  rationale: Hiphil of רוּם in an interrogative context asks about the ability to
    lift or raise. 'Can you raise' fits the divine challenge style in Job 38 and is
    natural English.
- source_word: לָעָב
  chosen: to the clouds
  alternatives:
  - to the cloud
  - to the thick cloud
  lexicon: HALOT
  rationale: עָב can denote a cloud mass, often a thick cloud. English idiom prefers
    the collective plural 'the clouds' here, matching the sense of addressing the
    sky's rain-bearing clouds.
- source_word: קוֹלֶךָ
  chosen: your voice
  alternatives:
  - your sound
  lexicon: HALOT
  rationale: קוֹל commonly means 'voice' in contexts of speaking or calling. Here
    it refers to the human voice directed upward.
- source_word: וְשִׁפְעַת מַיִם
  chosen: so that an abundance of water
  alternatives:
  - and a flood of waters
  - and plenty of water
  - and a torrent of water
  lexicon: HALOT
  rationale: שִׁפְעָה denotes abundance, plenty, or overflow. Combined with 'water,'
    it points to a great quantity of rainwater. 'An abundance of water' preserves
    the quantity emphasis without overcommitting to a destructive 'flood' sense.
- source_word: תְּכַסֶּךָּ
  chosen: covers you
  alternatives:
  - envelops you
  - covers over you
  lexicon: HALOT
  rationale: Piel of כסה means 'cover.' With the 2ms suffix, the image is of waters
    covering the addressed person. 'Covers you' is direct and idiomatic.
