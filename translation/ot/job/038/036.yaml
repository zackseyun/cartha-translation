theological_decisions:
- issue: Interpretation of two difficult anthropological terms in a divine-speech
    wisdom context
  chosen_reading: The verse speaks of God giving inner human faculties wisdom and
    understanding.
  alternative_readings:
  - The verse may refer to God giving instinctive knowledge to creatures such as the
    rooster or ibis.
  rationale: This is primarily a lexical-contextual decision rather than a doctrinal
    one. The immediate poetic parallelism ('inward parts' // 'mind') strongly supports
    reading both terms as inner faculties. Because the alternative animal reading
    is longstanding and plausible, it is preserved in a footnote rather than excluded.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather
    than resolve it
