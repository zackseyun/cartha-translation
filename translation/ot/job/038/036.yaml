id: JOB.38.36
reference: Job 38:36
source:
  edition: WLC
  text: מִי שָׁ֭ת בַּ/טֻּח֣וֹת חָכְמָ֑ה א֤וֹ מִֽי נָתַ֖ן לַ/שֶּׂ֣כְוִי בִינָֽה־־׃
translation:
  text: Who has put wisdom in the inward parts, or who has given understanding to
    the mind?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly, 'Who has put wisdom in the hidden parts, or who has given understanding
      to the rooster?' Some take the second term to refer to a bird (traditionally
      'rooster,' sometimes 'ibis') rather than the mind.
    reason: alternative_reading
lexical_decisions:
- source_word: מִי
  chosen: Who
  lexicon: HALOT
  rationale: Interrogative pronoun introducing God's rhetorical question.
- source_word: שָׁת
  chosen: has put
  alternatives:
  - has set
  - has placed
  lexicon: HALOT
  rationale: Common verb 'put/set/place'; 'has put' is natural modern English and
    fits the rhetorical parallel with 'has given'.
- source_word: בַּטֻּחוֹת
  chosen: in the inward parts
  alternatives:
  - in the kidneys
  - in the hidden parts
  lexicon: HALOT
  rationale: The noun is difficult and likely refers metaphorically to inner parts
    or hidden inward being. 'In the inward parts' preserves the bodily-metaphorical
    sense without over-literalizing to 'kidneys' in a way that would mislead modern
    readers.
- source_word: חָכְמָה
  chosen: wisdom
  lexicon: HALOT
  rationale: Standard rendering for the noun; fits the verse's contrastive parallelism
    with 'understanding'.
- source_word: אוֹ
  chosen: or
  lexicon: HALOT
  rationale: Simple coordinating disjunction linking the parallel clauses.
- source_word: נָתַן
  chosen: has given
  alternatives:
  - has granted
  lexicon: HALOT
  rationale: Standard rendering of נתן in this context; pairs well with 'has put'
    in the first colon.
- source_word: לַשֶּׂכְוִי
  chosen: to the mind
  alternatives:
  - to the rooster
  - to the ibis
  lexicon: HALOT
  rationale: This noun is famously disputed. In context, the parallel with 'inward
    parts' and the objects 'wisdom/understanding' favors an internal faculty such
    as 'mind' or 'understanding faculty' rather than a bird. To preserve the ambiguity,
    major alternatives are retained in a footnote.
- source_word: בִינָה
  chosen: understanding
  alternatives:
  - discernment
  lexicon: HALOT
  rationale: Standard rendering; complements 'wisdom' while preserving the semantic
    distinction of insight/discernment.
