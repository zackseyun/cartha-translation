id: JOB.38.31
reference: Job 38:31
source:
  edition: WLC
  text: הַֽ֭/תְקַשֵּׁר מַעֲדַנּ֣וֹת כִּימָ֑ה אֽוֹ מֹשְׁכ֖וֹת כְּסִ֣יל תְּפַתֵּֽחַ־׃
translation:
  text: Can you bind the chains of the Pleiades, or loosen the cords of Orion?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'bands' for both binding terms; the Hebrew uses two related images of
      celestial restraints or connections.
    reason: lexical_alternative
  - marker: b
    text: Traditional English versions sometimes render מַעֲדַנּוֹת as 'sweet influences,'
      but the Hebrew more likely refers to bonds, bands, or chains.
    reason: lexical_alternative
  - marker: c
    text: כְּסִיל is likely the constellation Orion here; elsewhere the word can mean
      'fool.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲתְקַשֵּׁר
  chosen: Can you bind
  alternatives:
  - Can you tie
  - Can you fasten
  lexicon: HALOT
  rationale: The interrogative with the Piel imperfect 2ms of קשר introduces a rhetorical
    question about human inability. 'Bind' is idiomatic and fits the cosmic-control
    context better than the more pedestrian 'tie' or 'fasten'.
- source_word: מַעֲדַנּוֹת
  chosen: the chains
  alternatives:
  - the bands
  - the cluster
  - the sweet influences
  lexicon: HALOT
  rationale: This rare plural noun has been understood as bonds/bands or possibly
    a cluster-like joining. In context with 'bind' and in parallel with 'cords,' a
    term for binding connections is most natural. 'Chains' communicates linked restraints
    clearly in modern English. The traditional 'sweet influences' reflects an older
    interpretive tradition rather than the plain lexical sense and is not followed.
- source_word: כִּימָה
  chosen: the Pleiades
  lexicon: HALOT
  rationale: This astronomical proper name is conventionally identified as the star
    cluster Pleiades. As a name, it is translated by its standard English astronomical
    equivalent.
- source_word: מֹשְׁכוֹת
  chosen: the cords
  alternatives:
  - the bands
  - the reins
  lexicon: HALOT
  rationale: The noun denotes something drawn out or used for drawing, hence cords/bands.
    In parallel with 'bind' and the celestial imagery, 'cords' is natural, concrete,
    and readable.
- source_word: כְּסִיל
  chosen: Orion
  alternatives:
  - the Fool
  lexicon: HALOT
  rationale: In astronomical contexts כְּסִיל is conventionally understood as the
    constellation Orion. Although the common noun can mean 'fool,' the parallel with
    כִּימָה and the broader context of constellations strongly support the proper-name
    sense here.
- source_word: תְּפַתֵּחַ
  chosen: loosen
  alternatives:
  - untie
  - open
  - release
  lexicon: HALOT
  rationale: The Piel imperfect 2ms of פתח literally means 'open,' but with an object
    like cords/bands the idiomatic sense is to loosen or untie. 'Loosen' preserves
    the physical imagery and balances 'bind' in the first colon.
