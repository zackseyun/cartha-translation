id: JOB.38.39
reference: Job 38:39
source:
  edition: WLC
  text: הֲ/תָצ֣וּד לְ/לָבִ֣יא טָ֑רֶף וְ/חַיַּ֖ת כְּפִירִ֣ים תְּמַלֵּֽא׃
translation:
  text: Do you hunt prey for the lioness, and satisfy the appetite of the young lions,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'fill the hunger of the young lions.' The Hebrew literally uses language
      of 'filling' their life/appetite.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲ/תָצוּד
  chosen: Do you hunt
  alternatives:
  - Will you hunt
  - Do you catch
  lexicon: HALOT
  rationale: Interrogative הֲ with Qal imperfect 2ms of צוד introduces a rhetorical
    question addressed to Job. 'Hunt' best fits the predatory context and natural
    English.
- source_word: לְ/לָבִיא
  chosen: for the lioness
  alternatives:
  - for the lion
  - for a lioness
  lexicon: HALOT
  rationale: לָבִיא commonly denotes a lion/lioness; in this context, paired with
    'young lions' and maternal provisioning, 'lioness' is the most contextually fitting
    rendering. The preposition לְ is rendered 'for'.
- source_word: טָרֶף
  chosen: prey
  alternatives:
  - food
  - game
  lexicon: HALOT
  rationale: טָרֶף refers specifically to torn prey or prey as food for carnivores.
    'Prey' preserves the predatory nuance better than the broader 'food'.
- source_word: וְ/חַיַּת
  chosen: the appetite
  alternatives:
  - the life
  - the desire
  - the hunger
  lexicon: HALOT
  rationale: Though חַיָּה/חַיַּת can literally relate to 'life' or 'living thing,'
    in the idiom with מלא here it refers to the living appetite or hunger to be filled.
    'Appetite' gives the idiomatic sense in clear English.
- source_word: כְּפִירִים
  chosen: of the young lions
  alternatives:
  - of the lion cubs
  - of the young lions
  lexicon: HALOT
  rationale: כְּפִירִים denotes young lions. 'Young lions' is the standard and natural
    rendering in English.
- source_word: תְּמַלֵּא
  chosen: satisfy
  alternatives:
  - fill
  - fulfill
  lexicon: HALOT
  rationale: Piel imperfect 2ms of מלא means 'fill,' but with 'appetite' in English
    the idiomatic equivalent is 'satisfy.' This preserves sense while remaining close
    to the Hebrew.
