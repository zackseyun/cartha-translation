theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Specificity of סְעָרָה in a theophanic context
  chosen_reading: storm
  alternative_readings:
  - whirlwind
  - tempest
  rationale: The Hebrew term can denote a violent storm broadly, and the verse itself does not require the narrower English 'whirlwind.' To preserve theological and literary tension without over-specifying, the main text uses 'storm' and a footnote preserves 'whirlwind' as a traditional and plausible alternative.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §3: Preserve theological tension rather than resolve it'
