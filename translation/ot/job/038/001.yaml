theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt explicitly sets 'the LORD' as the default rendering
    for YHWH. This preserves covenantal significance without introducing a denominationally
    loaded pronunciation choice.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Specificity of סְעָרָה in a theophanic context
  chosen_reading: storm
  alternative_readings:
  - whirlwind
  - tempest
  rationale: The Hebrew term can denote a violent storm broadly, and the verse itself
    does not require the narrower English 'whirlwind.' To preserve theological and
    literary tension without over-specifying, the main text uses 'storm' and a footnote
    preserves 'whirlwind' as a traditional and plausible alternative.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §3: Preserve theological
    tension rather than resolve it'
