id: JOB.38.1
reference: Job 38:1
source:
  edition: WLC
  text: וַ/יַּֽעַן יְהוָ֣ה אֶת אִ֭יּוֹב מנ ה/סערה וַ/יֹּאמַֽר־־׃
translation:
  text: 'Then the LORD answered Job out of the storm and said:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "out of the whirlwind."
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַן
  chosen: answered
  alternatives:
  - responded
  lexicon: HALOT
  rationale: The verb ענה in this narrative wayyiqtol form commonly means 'answer'
    or 'respond.' 'Answered' preserves the formal linkage to Job's preceding speeches
    and is standard, natural English here.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name YHWH is 'the LORD,'
    following established reverential convention and the Septuagintal pattern.
- source_word: אֶת אִיּוֹב
  chosen: Job
  lexicon: HALOT
  rationale: The direct-object marker אֶת is not translated in English; 'Job' is the
    object of 'answered.' The name is transliterated rather than translated, per translation
    philosophy.
- source_word: מִן־הַסְּעָרָה
  chosen: out of the storm
  alternatives:
  - from the whirlwind
  - from the tempest
  lexicon: HALOT
  rationale: סְעָרָה denotes a storm, tempest, or whirlwind. 'Storm' is the broadest
    and most accessible rendering in modern English while still fitting the theophanic
    context. Because 'whirlwind' is a well-known traditional alternative and may capture
    the imagery more specifically, it is preserved in a footnote.
- source_word: וַיֹּאמַר
  chosen: and said
  alternatives:
  - and he said
  lexicon: HALOT
  rationale: A straightforward rendering of the wayyiqtol of אמר. English normally
    omits the repeated subject because 'the LORD' is already explicit; 'and said'
    is idiomatic and preserves the narrative sequence.
