id: JOB.38.7
reference: Job 38:7
source:
  edition: WLC
  text: בְּ/רָן יַ֭חַד כּ֣וֹכְבֵי בֹ֑קֶר וַ֝/יָּרִ֗יעוּ כָּל בְּנֵ֥י אֱלֹהִֽים־־׃
translation:
  text: when the morning stars sang together, and all the sons of God shouted for
    joy?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''the heavenly beings'' or ''the angels.'' Hebrew: ''the sons of God.'''
    reason: alternative_reading
lexical_decisions:
- source_word: בְּ/רָן
  chosen: when ... sang
  alternatives:
  - as ... sang
  - at the singing of
  lexicon: HALOT
  rationale: The prefixed ב on the infinitive construct of רנן introduces a temporal
    clause here in context with the preceding question, best rendered 'when ... sang.'
    The verb רנן conveys jubilant singing or ringing cry; 'sang' fits the parallel
    with the following shout of joy.
- source_word: יַחַד
  chosen: together
  alternatives:
  - as one
  - in unison
  lexicon: HALOT
  rationale: יַחַד denotes simultaneity or unity. 'Together' is the most natural modern
    English rendering and preserves the collective force.
- source_word: כּוֹכְבֵי בֹקֶר
  chosen: the morning stars
  alternatives:
  - the stars of morning
  - the dawn stars
  lexicon: HALOT
  rationale: The construct phrase literally means 'stars of morning.' 'Morning stars'
    is idiomatic English and preserves the poetic imagery.
- source_word: וַ/יָּרִיעוּ
  chosen: shouted for joy
  alternatives:
  - raised a shout
  - gave a joyful shout
  - cheered
  lexicon: HALOT
  rationale: רוע/ריע in the Hiphil can denote raising a shout, often jubilant. Because
    the context is celebratory and parallel to singing, 'shouted for joy' makes the
    positive sense explicit without over-paraphrasing.
- source_word: כָּל
  chosen: all
  alternatives:
  - the whole company of
  lexicon: HALOT
  rationale: כָּל straightforwardly means 'all,' emphasizing the totality of the group.
- source_word: בְּנֵי אֱלֹהִים
  chosen: the sons of God
  alternatives:
  - the heavenly beings
  - the divine beings
  - the angels
  lexicon: HALOT
  rationale: The Hebrew phrase is literally 'sons of God.' In Job it refers to heavenly
    beings, but the translation philosophy favors preserving the source expression
    where it is clear and theologically significant, rather than resolving it interpretively
    to 'angels' in the main text.
