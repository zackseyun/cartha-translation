theological_decisions:
- issue: Identity of בְּנֵי אֱלֹהִים
  chosen_reading: Render literally as 'the sons of God' in the main text
  alternative_readings:
  - the heavenly beings
  - the angels
  - the divine beings
  rationale: In Job, the phrase likely denotes members of the heavenly court, but
    translating it as 'angels' would interpret rather than translate. Preserving 'sons
    of God' maintains the Hebrew wording and leaves the theological identification
    transparent to the reader.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
