id: JOB.38.32
reference: Job 38:32
source:
  edition: WLC
  text: הֲ/תֹצִ֣יא מַזָּר֣וֹת בְּ/עִתּ֑/וֹ וְ֝/עַ֗יִשׁ עַל בָּנֶ֥י/הָ תַנְחֵֽ/ם־׃
translation:
  text: Can you bring out the Mazzaroth in its season, or guide Ayish along with her
    children?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Mazzaroth is a rare Hebrew astronomical term, possibly referring to the
      constellations or the zodiac.
    reason: lexical_alternative
  - marker: b
    text: Ayish is a Hebrew star-name or constellation-name, traditionally rendered
      'Arcturus' in some English versions; many understand it as 'the Bear.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲ/תֹצִיא
  chosen: Can you bring out
  alternatives:
  - Can you lead forth
  - Can you bring forth
  lexicon: HALOT
  rationale: Hiphil of יצא here is causative, used in a rhetorical question about
    causing celestial bodies/constellations to appear. 'Bring out' is natural English
    and preserves the causative sense without over-specifying motion.
- source_word: מַזָּרוֹת
  chosen: the Mazzaroth
  alternatives:
  - the constellations
  - the zodiac
  lexicon: HALOT
  rationale: The term is rare and uncertain; likely refers to a set of constellations
    or zodiacal signs. Because the exact referent is debated, transliterating as 'Mazzaroth'
    in the main text preserves the lexical opacity of the Hebrew while avoiding a
    false precision. Alternatives are preserved in a footnote.
- source_word: בְּ/עִתּוֹ
  chosen: in its season
  alternatives:
  - at its time
  lexicon: HALOT
  rationale: The phrase denotes the proper appointed time/season for appearance. 'In
    its season' is idiomatic and fits the astronomical context.
- source_word: וְעַיִשׁ
  chosen: Ayish
  alternatives:
  - the Bear
  - Arcturus
  lexicon: HALOT
  rationale: This astronomical term is also uncertain. Traditional English versions
    often use 'Arcturus,' but that reflects translation tradition more than certainty.
    'Ayish' preserves the Hebrew name; likely it denotes a constellation, possibly
    the Bear. Alternatives are footnoted.
- source_word: עַל בָּנֶיהָ
  chosen: along with her children
  alternatives:
  - with her sons
  - with its satellites
  lexicon: HALOT
  rationale: The Hebrew literally says 'upon/with her children.' In astronomical context
    this likely refers to attendant stars. 'Along with her children' preserves the
    familial metaphor and the feminine suffix, while remaining readable.
- source_word: תַנְחֵם
  chosen: guide
  alternatives:
  - lead
  - conduct
  lexicon: HALOT
  rationale: Hiphil of נחה means to lead or guide. 'Guide' fits the image of directing
    a constellation across the sky and reads naturally in English.
