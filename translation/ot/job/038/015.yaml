id: JOB.38.15
reference: Job 38:15
source:
  edition: WLC
  text: וְ/יִמָּנַ֣ע מֵ/רְשָׁ אוֹרָ֑/ם וּ/זְר֥וֹעַ רָ֝מָ֗ה תִּשָּׁבֵֽר׃
translation:
  text: Their light is withheld from the wicked, and the uplifted arm is broken.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "the raised arm will be broken." The Hebrew imperfect may be understood
      as future as well as vivid present.
    reason: lexical_alternative
  - marker: b
    text: '"Arm" here likely symbolizes strength or power, especially violent power.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיִמָּנַע
  chosen: is withheld
  alternatives:
  - is restrained
  - is kept back
  lexicon: HALOT
  rationale: Niphal imperfect of מנע conveys being withheld or prevented. Passive
    English best reflects the Hebrew form and fits the context of light being denied.
- source_word: מֵרְשָׁעִים
  chosen: from the wicked
  alternatives:
  - from wicked ones
  - from evil men
  lexicon: HALOT
  rationale: 'The preposition מִן with רְשָׁעִים indicates separation: the light is
    withheld from wicked people. ''The wicked'' is idiomatic and preserves the moral
    category without over-specifying gender.'
- source_word: אוֹרָם
  chosen: their light
  alternatives:
  - light for them
  - their daylight
  lexicon: HALOT
  rationale: Constructed as 'their light,' most naturally referring to the light belonging
    to or enjoyed by the wicked. This fits the immediate imagery of dawn exposing
    and frustrating evildoers.
- source_word: וּזְרוֹעַ
  chosen: and the arm
  alternatives:
  - and the strength
  - and the forearm
  lexicon: HALOT
  rationale: זְרוֹעַ literally means 'arm' and often metaphorically denotes strength
    or power. The literal image should be retained in the main text, allowing the
    metaphorical force to remain implicit.
- source_word: רָמָה
  chosen: uplifted
  alternatives:
  - raised
  - exalted
  - outstretched
  lexicon: HALOT
  rationale: Qal passive participial/adjectival sense from רום describes the arm as
    raised up. 'Uplifted' is natural English and preserves the image of arrogant or
    violent power poised for action.
- source_word: תִּשָּׁבֵר
  chosen: is broken
  alternatives:
  - will be broken
  - is shattered
  lexicon: HALOT
  rationale: 'Niphal imperfect of שבר can be rendered as a present gnomic passive
    in poetic discourse: ''is broken.'' This matches the surrounding depiction of
    what dawn does to the wicked. Future ''will be broken'' is possible, but present
    better suits the vivid poetic description.'
