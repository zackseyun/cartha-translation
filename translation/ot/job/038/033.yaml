id: JOB.38.33
reference: Job 38:33
source:
  edition: WLC
  text: הֲ֭/יָדַעְתָּ חֻקּ֣וֹת שָׁמָ֑יִם אִם תָּשִׂ֖ים מִשְׁטָר֣/וֹ בָ/אָֽרֶץ־׃
translation:
  text: Do you know the ordinances of the heavens? Can you establish their rule on
    the earth?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'its dominion' or 'its authority' for 'their rule'; the Hebrew suffix
      is singular ('its'), likely referring to the heavens collectively.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲיָדַעְתָּ
  chosen: Do you know
  alternatives:
  - Have you known
  lexicon: HALOT
  rationale: Interrogative הֲ with Qal perfect 2ms of ידע functions naturally as a
    present-state question in English. 'Do you know' is idiomatic and preserves the
    force of divine questioning better than the wooden 'Have you known.'
- source_word: חֻקּוֹת
  chosen: ordinances
  alternatives:
  - statutes
  - decrees
  - fixed laws
  lexicon: HALOT
  rationale: The noun from חק denotes prescribed limits or fixed ordinances. In this
    cosmic context, 'ordinances' best conveys established governing order without
    sounding overly legalistic or reducing the sense to merely human legislation.
- source_word: שָׁמָיִם
  chosen: the heavens
  alternatives:
  - heaven
  - the sky
  lexicon: HALOT
  rationale: The plural Hebrew commonly refers to the heavens/sky. 'The heavens' preserves
    the plural form and elevated cosmic register appropriate to the context.
- source_word: אִם
  chosen: Can you
  alternatives:
  - if you
  - whether you can
  lexicon: HALOT
  rationale: Here אִם introduces the second interrogative clause in parallel with
    the first. Rendering it idiomatically as 'Can you' communicates the rhetorical
    challenge in English better than a literal 'if'.
- source_word: תָּשִׂים
  chosen: establish
  alternatives:
  - set
  - place
  - appoint
  lexicon: HALOT
  rationale: 'Although the basic sense of שׂים is ''put/set,'' in context with cosmic
    governance and מִשְׁטָרוֹ the sense is causative/establishing: setting something
    in force on earth. ''Establish'' captures this idiomatically.'
- source_word: מִשְׁטָרוֹ
  chosen: their rule
  alternatives:
  - its dominion
  - its authority
  - its order
  lexicon: HALOT
  rationale: מִשְׁטָר denotes rule, dominion, or governing authority. The 3ms suffix
    is formally singular, likely referring collectively back to 'the heavens' as a
    unit; English 'their rule' reads more naturally with the plural antecedent while
    preserving the idea of heavenly governance. 'Order' is possible but weaker than
    the governance nuance.
- source_word: בָאָרֶץ
  chosen: on the earth
  alternatives:
  - in the earth
  - upon the earth
  lexicon: HALOT
  rationale: The preposition ב with ארץ in this context is best rendered 'on the earth,'
    referring to the earthly realm under heavenly order. This is standard, natural
    English.
