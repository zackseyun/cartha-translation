id: JOB.38.25
reference: Job 38:25
source:
  edition: WLC
  text: מִֽי פִלַּ֣ג לַ/שֶּׁ֣טֶף תְּעָלָ֑ה וְ֝/דֶ֗רֶךְ לַ/חֲזִ֥יז קֹלֽוֹת־׃
translation:
  text: Who has cut a channel for the flood, or a path for the thunderbolt,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Who has cut a channel for the downpour, or a path for the lightning
      of thunder?' Literally, 'for the flood ... for the חֲזִיז of voices/sounds.'
    reason: lexical_alternative
lexical_decisions:
- source_word: פִלַּג
  chosen: has cut
  alternatives:
  - has divided
  - has split
  - has channeled
  lexicon: HALOT
  rationale: The verb denotes dividing or cleaving so as to make a course. In context
    with תְּעָלָה ('channel'), 'has cut' is idiomatic English that preserves the image
    of carving out a watercourse better than the more abstract 'has divided.'
- source_word: שֶּׁטֶף
  chosen: the flood
  alternatives:
  - the downpour
  - the torrent
  - the rainstorm
  lexicon: HALOT
  rationale: The noun can denote a flooding rush of water or overwhelming downpour.
    Here, paired with 'channel,' it most naturally refers to floodwaters/torrent rain.
    'The flood' is concise and natural, though the sense overlaps with 'downpour.'
- source_word: תְּעָלָה
  chosen: a channel
  alternatives:
  - a canal
  - a trench
  - a watercourse
  lexicon: HALOT
  rationale: The noun refers to a conduit or channel for water. 'Channel' is the most
    natural modern English equivalent and fits the poetic imagery without sounding
    overly technical.
- source_word: דֶרֶךְ
  chosen: a path
  alternatives:
  - a way
  - a road
  lexicon: HALOT
  rationale: In poetic parallelism with 'channel,' the noun denotes a course or route.
    'Path' fits the imagery of a divinely appointed track through the sky.
- source_word: חֲזִיז
  chosen: the thunderbolt
  alternatives:
  - the lightning
  - the storm-blast
  lexicon: HALOT
  rationale: This rare noun is commonly understood as lightning or thunderbolt. Because
    it is modified by 'voices/sounds' (קֹלוֹת), many English versions render the phrase
    as 'thunderbolt.' This preserves the vivid meteorological image and avoids flattening
    the expression.
- source_word: קֹלֽוֹת
  chosen: thunderbolt
  alternatives:
  - thunders
  - thunder
  - sounds
  - voices
  lexicon: HALOT
  rationale: Literally the word means 'voices/sounds,' often used for thunder in weather
    contexts. In construct with חֲזִיז, the phrase likely means 'thunderbolt' or 'lightning
    of thunder.' Rather than render woodenly as 'lightning of voices,' the main text
    gives the idiomatic sense. The more literal component is preserved in a footnote.
