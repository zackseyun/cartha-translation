id: JOB.38.41
reference: Job 38:41
source:
  edition: WLC
  text: מִ֤י יָכִ֥ין לָ/עֹרֵ֗ב צֵ֫יד֥/וֹ כִּֽי ילד/ו אֶל אֵ֣ל יְשַׁוֵּ֑עוּ יִ֝תְע֗וּ
    לִ/בְלִי אֹֽכֶל־־־׃
translation:
  text: Who prepares its prey for the raven when its young cry out to God and wander
    about for lack of food?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'provides food for the raven.' The Hebrew verb means 'makes ready' or
      'provides,' and 'prey' may be rendered more generally as 'food.'
    reason: lexical_alternative
  - marker: b
    text: Or 'because its young cry out to God.' The conjunction can be read causally
      ('because/for') rather than temporally ('when').
    reason: lexical_alternative
  - marker: c
    text: Or 'go astray' or 'roam.' The Hebrew verb can denote wandering or straying
      in search of food.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִי
  chosen: Who
  lexicon: HALOT
  rationale: Interrogative pronoun introducing a rhetorical question in God's speech.
- source_word: יָכִין
  chosen: prepares
  alternatives:
  - provides
  - makes ready
  lexicon: HALOT
  rationale: Hiphil of כון here conveys making something ready or providing it. 'Prepares'
    preserves the concrete sense while reading naturally in English.
- source_word: לָעֹרֵב
  chosen: for the raven
  alternatives:
  - for a raven
  lexicon: HALOT
  rationale: The preposition marks the beneficiary. The singular with article is best
    rendered generically as 'the raven,' a species-representative singular in context.
- source_word: צֵידוֹ
  chosen: its prey
  alternatives:
  - its food
  - his prey
  lexicon: HALOT
  rationale: ציד commonly denotes game/prey or food obtained by hunting. 'Its prey'
    keeps the vivid animal imagery better than the flatter 'food.' The suffix refers
    to the raven.
- source_word: כִּי
  chosen: when
  alternatives:
  - for
  - because
  lexicon: HALOT
  rationale: Here כִּי introduces the circumstance under which the raven's need is
    seen. 'When' fits the temporal-situational force better than a strictly causal
    'because' in English.
- source_word: יַלְדָו
  chosen: its young
  alternatives:
  - its offspring
  - his young ones
  lexicon: HALOT
  rationale: The noun with suffix refers to the raven's young. 'Its young' is idiomatic
    and concise.
- source_word: אֶל אֵל
  chosen: to God
  alternatives:
  - to El
  lexicon: HALOT
  rationale: אֵל here is the common Semitic word for God, not a proper name requiring
    transliteration in this context. 'To God' is the natural English rendering.
- source_word: יְשַׁוֵּעוּ
  chosen: cry out
  alternatives:
  - call for help
  - cry for help
  lexicon: HALOT
  rationale: Piel of שוע denotes crying out for help. 'Cry out' is direct and preserves
    the pathos without over-specifying.
- source_word: יִתְעוּ
  chosen: wander about
  alternatives:
  - roam
  - stagger
  - go astray
  lexicon: HALOT
  rationale: Qal of תעה often means wander or stray. In this animal context, 'wander
    about' conveys restless searching due to hunger.
- source_word: לִבְלִי אֹכֶל
  chosen: for lack of food
  alternatives:
  - without food
  - with no food
  lexicon: HALOT
  rationale: The phrase expresses deprivation. 'For lack of food' captures both the
    absence and the causal nuance behind the wandering.
