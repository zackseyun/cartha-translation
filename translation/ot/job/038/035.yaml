id: JOB.38.35
reference: Job 38:35
source:
  edition: WLC
  text: הַֽ/תְשַׁלַּ֣ח בְּרָקִ֣ים וְ/יֵלֵ֑כוּ וְ/יֹאמְר֖וּ לְ/ךָ֣ הִנֵּֽ/נוּ׃
translation:
  text: Can you send out lightnings so that they go and say to you, ‘Here we are’
    ?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'lightning bolts.' The Hebrew is plural, portraying the flashes as if
      they were obedient messengers.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲתְשַׁלַּח
  chosen: Can you send out
  alternatives:
  - Do you send forth
  - Will you send out
  lexicon: HALOT
  rationale: The interrogative הֲ with the Hiphil imperfect 2ms of שׁלח forms a rhetorical
    question addressed to Job. 'Can you send out' captures both the interrogative
    force and the implied ability/challenge in context better than a simple present
    'Do you send forth,' while remaining close to the Hebrew.
- source_word: בְּרָקִים
  chosen: lightnings
  alternatives:
  - lightning bolts
  - flashes of lightning
  lexicon: HALOT
  rationale: Plural noun meaning lightning flashes/bolts. 'Lightnings' preserves the
    Hebrew plural and the poetic personification that follows. Although less common
    in contemporary English, it is still understandable and fits the elevated style
    of the divine speech.
- source_word: וְיֵלֵכוּ
  chosen: so that they go
  alternatives:
  - and they go
  - that they may go
  lexicon: HALOT
  rationale: The waw + imperfect continues the result/purpose sequence after 'send
    out.' 'So that they go' expresses the functional sense in English without over-paraphrasing.
    A more literal 'and they go' is possible, but English idiom prefers an explicit
    result nuance here.
- source_word: וְיֹאמְרוּ
  chosen: and say
  alternatives:
  - and they say
  - that they may say
  lexicon: HALOT
  rationale: The verb continues the personified depiction of lightning as obedient
    messengers. 'And say' is natural English following 'so that they go' and preserves
    the vivid poetic sequence.
- source_word: לְךָ
  chosen: to you
  alternatives:
  - to you personally
  lexicon: HALOT
  rationale: Simple dative pronoun addressed to the singular addressee, Job. No expansion
    is warranted beyond standard English dative rendering.
- source_word: הִנֵּנוּ
  chosen: Here we are
  alternatives:
  - Here we are!
  - Behold us
  lexicon: HALOT
  rationale: Idiomatic response of readiness/presence. 'Here we are' is natural modern
    English and preserves the sense of immediate availability and obedience. 'Behold
    us' would be overly archaic.
