id: JOB.38.18
reference: Job 38:18
source:
  edition: WLC
  text: הִ֭תְבֹּנַנְתָּ עַד רַחֲבֵי אָ֑רֶץ הַ֝גֵּ֗ד אִם יָדַ֥עְתָּ כֻלָּֽ/הּ־־־׃
translation:
  text: Have you comprehended the expanse of the earth? Tell me, if you know it all.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the breadth of the earth.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הִתְבֹּנַנְתָּ
  chosen: have you comprehended
  alternatives:
  - have you considered
  - have you understood
  - have you perceived
  lexicon: HALOT
  rationale: The hitpolel form of בין conveys attentive consideration leading to understanding.
    'Comprehended' fits the rhetorical challenge and pairs naturally with the following
    object, the earth's expanse, while remaining more forceful than merely 'considered'.
- source_word: עַד
  chosen: the expanse of
  alternatives:
  - to
  - as far as
  - unto
  lexicon: HALOT
  rationale: With רחבי ארץ, עַד marks extent or reach. In idiomatic English, 'the
    expanse of' best captures the sense of surveying the full breadth rather than
    a simple directional 'to'.
- source_word: רַחֲבֵי אָרֶץ
  chosen: the expanse of the earth
  alternatives:
  - the breadth of the earth
  - the wide spaces of the earth
  lexicon: HALOT
  rationale: The construct phrase literally denotes the broad places or breadths of
    the earth. 'Expanse' is natural modern English that preserves the idea of vast
    spatial extent.
- source_word: הַגֵּד
  chosen: Tell me
  alternatives:
  - declare
  - report
  - make known
  lexicon: HALOT
  rationale: In this divine interrogation, the imperative is direct and confrontational.
    'Tell me' is idiomatic and preserves the force without sounding archaic.
- source_word: אִם
  chosen: if
  alternatives:
  - whether
  lexicon: HALOT
  rationale: 'Here אִם introduces a conditional challenge: ''if you know.'' ''If''
    is the most straightforward rendering in English.'
- source_word: יָדַעְתָּ
  chosen: you know
  alternatives:
  - you have known
  - you understand
  lexicon: HALOT
  rationale: The perfect in this rhetorical question is well represented by present
    English 'you know,' especially following the imperative 'Tell me.'
- source_word: כֻלָּהּ
  chosen: it all
  alternatives:
  - all of it
  - its entirety
  lexicon: HALOT
  rationale: The pronoun refers back to the earth's expanse/breadth as a whole. 'It
    all' is concise, natural, and preserves the totalizing force of the Hebrew.
