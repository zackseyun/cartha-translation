id: JOB.38.28
reference: Job 38:28
source:
  edition: WLC
  text: הֲ/יֵשׁ לַ/מָּטָ֥ר אָ֑ב א֥וֹ מִי ה֝וֹלִ֗יד אֶגְלֵי טָֽל־־־׃
translation:
  text: Does the rain have a father, or who has fathered the drops of dew?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'who has begotten the drops of dew?'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲיֵשׁ
  chosen: Does ... have
  alternatives:
  - Is there ... for
  lexicon: HALOT
  rationale: The interrogative particle with יֵשׁ forms a yes/no question. In idiomatic
    English, 'Does ... have' best conveys existential possession here rather than
    a wooden 'Is there for the rain.'
- source_word: לַמָּטָר
  chosen: the rain
  alternatives:
  - rain
  lexicon: HALOT
  rationale: מָטָר means 'rain.' The prefixed ל marks relation/possession in the clause
    ('for the rain' = 'does the rain have'). English expresses this naturally as 'the
    rain.'
- source_word: אָב
  chosen: father
  alternatives:
  - parent
  - source
  lexicon: HALOT
  rationale: אָב literally means 'father.' The verse uses begetting imagery, so retaining
    the paternal term preserves the metaphor and poetic parallelism.
- source_word: אוֹ
  chosen: or
  alternatives:
  - or else
  lexicon: HALOT
  rationale: Simple disjunctive conjunction linking the two parallel questions.
- source_word: מִי
  chosen: who
  alternatives:
  - who is it that
  lexicon: HALOT
  rationale: Direct interrogative pronoun; 'who' is the natural concise rendering.
- source_word: הוֹלִיד
  chosen: has fathered
  alternatives:
  - begot
  - has begotten
  - gave birth to
  lexicon: HALOT
  rationale: Hiphil of ילד means 'beget, father.' Because the subject sought is masculine
    in parallel with 'father,' 'has fathered' preserves the paternal nuance better
    than the more ambiguous 'gave birth to.' 'Begot' is accurate but archaic for the
    stated translation philosophy.
- source_word: אֶגְלֵי
  chosen: the drops
  alternatives:
  - the droplets
  - the little drops
  lexicon: HALOT
  rationale: The noun denotes drops, here in construct with 'dew.' 'Drops' is clear
    modern English and preserves the concrete image without overtranslating the diminutive
    nuance.
- source_word: טָל
  chosen: dew
  lexicon: HALOT
  rationale: Standard rendering of טָל; no contextual reason to vary.
