id: JOB.38.14
reference: Job 38:14
source:
  edition: WLC
  text: תִּ֭תְהַפֵּךְ כְּ/חֹ֣מֶר חוֹתָ֑ם וְ֝/יִֽתְיַצְּב֗וּ כְּמ֣וֹ לְבֽוּשׁ׃
translation:
  text: It is changed like clay under a seal, and they stand out like a garment.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'It turns like clay under a seal.' The Hebrew verb can be rendered more
      literally as 'turns itself' or 'is turned.'
    reason: lexical_alternative
  - marker: b
    text: The plural 'they stand out' likely refers to the features of the earth becoming
      distinct in the light of dawn.
    reason: cultural_note
lexical_decisions:
- source_word: תִּתְהַפֵּךְ
  chosen: is changed
  alternatives:
  - is turned
  - changes itself
  - is transformed
  lexicon: HALOT
  rationale: The Hitpael of הפך here describes the earth's surface at daybreak taking
    on altered form or appearance. 'Is changed' is natural English and preserves the
    passive/reflexive sense without overinterpreting the mechanism.
- source_word: כְּחֹמֶר
  chosen: like clay
  alternatives:
  - as clay
  lexicon: HALOT
  rationale: חֹמֶר is ordinary clay. The simile compares the earth's appearance to
    clay receiving an impression.
- source_word: חוֹתָם
  chosen: under a seal
  alternatives:
  - for a seal
  - of a seal
  - beneath a seal
  lexicon: HALOT
  rationale: The phrase כְחֹמֶר חוֹתָם is elliptical. 'Under a seal' makes explicit
    the image of clay being impressed by a seal, which best communicates the Hebrew
    comparison in idiomatic English.
- source_word: ויתיצבו
  chosen: they stand out
  alternatives:
  - they take their stand
  - they present themselves
  - they stand forth
  lexicon: HALOT
  rationale: The plural verb likely refers to features of the earth revealed by daylight.
    'Stand out' captures emergence into visible definition better than the more wooden
    'take their stand.'
- source_word: כמו לבוש
  chosen: like a garment
  alternatives:
  - as clothing
  - like clothing
  lexicon: HALOT
  rationale: לְבוּשׁ denotes clothing/garment. 'Like a garment' preserves the singular
    image and the poetic comparison, likely evoking folds or contours becoming visible.
