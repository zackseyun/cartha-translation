theological_decisions:
- issue: Anthropomorphic depiction of God's rule over the sea
  chosen_reading: Retain the concrete imagery of God setting a boundary with bars
    and doors.
  alternative_readings:
  - Flatten the imagery into an abstract statement about divine sovereignty over nature.
  rationale: The verse presents God's sovereignty through vivid architectural imagery.
    Preserving that imagery respects the poetic force of the Hebrew and does not over-systematize
    the theology.
  doctrine_reference: Translation philosophy §3, §6
