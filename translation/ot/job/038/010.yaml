id: JOB.38.10
reference: Job 38:10
source:
  edition: WLC
  text: וָ/אֶשְׁבֹּ֣ר עָלָ֣י/ו חֻקִּ֑/י וָֽ֝/אָשִׂ֗ים בְּרִ֣יחַ וּ/דְלָתָֽיִם׃
translation:
  text: when I prescribed my boundary for it and set bars and doors,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'when I fixed my decree for it'; the Hebrew likely refers to establishing
      the sea's limit rather than literally 'breaking' something.
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֶשְׁבֹּר
  chosen: prescribed
  alternatives:
  - broke
  - fixed
  - decreed
  - set
  lexicon: HALOT
  rationale: Although the root שׁבר commonly means 'break,' in this context that sense
    is difficult. In Job 38:10 the verb is widely understood in light of context and
    ancient versions as referring to establishing or prescribing a limit for the sea.
    Rendering it as 'prescribed' captures the idiomatic sense in context without forcing
    the literal 'broke.'
- source_word: עָלָיו
  chosen: for it
  alternatives:
  - upon it
  - against it
  lexicon: HALOT
  rationale: The preposition על with 3ms suffix refers back to the sea in the preceding
    context. English idiom prefers 'for it' with 'prescribed my boundary' rather than
    the more wooden 'upon it.'
- source_word: חֻקִּי
  chosen: my boundary
  alternatives:
  - my decree
  - my statute
  - my limit
  lexicon: HALOT
  rationale: חֹק can mean statute, decree, fixed portion, or prescribed limit. In
    the immediate context of restraining the sea, 'boundary' best conveys the concrete
    sense of a divinely fixed limit, while still reflecting the idea of an imposed
    decree.
- source_word: וָאָשִׂים
  chosen: set
  alternatives:
  - placed
  - put
  lexicon: HALOT
  rationale: A straightforward rendering of שׂים in this construction. 'Set' is natural
    English and fits the parallel action of imposing limits on the sea.
- source_word: בְּרִיחַ
  chosen: bars
  alternatives:
  - bar
  - bolt
  lexicon: HALOT
  rationale: בְּרִיחַ denotes a bar or bolt used to secure an entrance. The plural
    in English is idiomatic here because it is paired with 'doors' and refers to the
    restraining apparatus collectively.
- source_word: וּדְלָתָיִם
  chosen: doors
  alternatives:
  - double doors
  - gates
  lexicon: HALOT
  rationale: The dual form literally suggests a pair of doors or double doors, but
    'doors' is the most natural English rendering and preserves the image of the sea
    being shut in behind doors.
