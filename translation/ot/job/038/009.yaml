id: JOB.38.9
reference: Job 38:9
source:
  edition: WLC
  text: בְּ/שׂוּמִ֣/י עָנָ֣ן לְבֻשׁ֑/וֹ וַ֝/עֲרָפֶ֗ל חֲתֻלָּתֽ/וֹ׃
translation:
  text: when I made a cloud its garment, and thick darkness its swaddling band,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'its swaddling cloth.' The Hebrew evokes the imagery of wrapping a newborn,
      continuing the birth metaphor for the sea in the surrounding context.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּשׂוּמִי
  chosen: when I made
  alternatives:
  - when I set
  - in my placing
  lexicon: HALOT
  rationale: 'The preposition ב with the infinitive construct of שׂוּם plus 1cs suffix
    is temporal here: ''when I placed/made.'' ''When I made'' is idiomatic English
    and fits the poetic sequence in which God recounts actions at the sea''s origin.'
- source_word: עָנָן
  chosen: a cloud
  alternatives:
  - cloud
  lexicon: HALOT
  rationale: Standard rendering of עָנָן. The indefinite article is natural in English
    poetry here.
- source_word: לְבֻשׁוֹ
  chosen: its garment
  alternatives:
  - its clothing
  - its covering
  lexicon: HALOT
  rationale: לְבוּשׁ denotes clothing/garment. 'Garment' preserves the clothing metaphor
    with slightly elevated but still readable diction. The 3ms suffix refers to the
    sea in context.
- source_word: וַעֲרָפֶל
  chosen: and thick darkness
  alternatives:
  - and gloom
  - and dark cloud
  lexicon: HALOT
  rationale: עֲרָפֶל often denotes dense darkness or gloom, especially atmospheric
    darkness. 'Thick darkness' best captures the density and poetic force in parallel
    with 'cloud.'
- source_word: חֲתֻלָּתוֹ
  chosen: its swaddling band
  alternatives:
  - its swaddling cloth
  - its wrapping
  lexicon: HALOT
  rationale: From a noun related to wrapping or swaddling. 'Swaddling band' preserves
    the birth/newborn imagery applied metaphorically to the sea in this context, matching
    the surrounding verses better than the more generic 'wrapping.'
