theological_decisions:
- issue: Meaning of עֵצָה in divine speech
  chosen_reading: counsel
  alternative_readings:
  - plan
  - purpose
  rationale: In context, God rebukes speech that obscures true wisdom and possibly
    divine intention. 'Counsel' preserves the semantic breadth, allowing both wise
    deliberation and purpose to remain in view without forcing a narrower theological
    interpretation.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather
    than resolve it.
