theological_decisions:
- issue: Gendered expression in divine challenge
  chosen_reading: like a man
  alternative_readings:
  - like a warrior
  - like a strong man
  rationale: The Hebrew uses the masculine singular גבר. Following the translation
    philosophy's gender-accurate principle, the masculine form is retained rather
    than neutralized. The phrase is idiomatic for resolute readiness, not a doctrinal
    statement about male superiority.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
