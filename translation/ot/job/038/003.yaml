id: JOB.38.3
reference: Job 38:3
source:
  edition: WLC
  text: אֱזָר נָ֣א כְ/גֶ֣בֶר חֲלָצֶ֑י/ךָ וְ֝/אֶשְׁאָלְ/ךָ֗ וְ/הוֹדִיעֵֽ/נִי־׃
translation:
  text: Now gird up your loins like a man; I will question you, and you shall make
    it known to me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'brace yourself like a warrior.' The Hebrew literally says 'gird up your
      loins like a man,' an idiom for preparing oneself resolutely.
    reason: lexical_alternative
  - marker: b
    text: Or 'and make it known to me.' Traditional English often has 'and answer
      me,' but the Hebrew more literally means 'cause me to know.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֱזָר
  chosen: gird up
  alternatives:
  - brace yourself
  - belt up
  lexicon: HALOT
  rationale: Imperative from אזר in the reflexive/active sense of fastening on strength
    or a belt. 'Gird up' preserves the concrete idiom and the force of preparation
    better than a fully dynamic rendering.
- source_word: נָא
  chosen: Now
  alternatives:
  - please
  - indeed
  lexicon: HALOT
  rationale: Here נָא functions as a particle adding urgency or immediacy rather than
    politeness. 'Now' fits the divine challenge better than 'please' in English.
- source_word: כְגֶבֶר
  chosen: like a man
  alternatives:
  - like a warrior
  - like a strong man
  lexicon: HALOT
  rationale: גבר commonly denotes a man with connotations of strength. Per the gender-accurate
    policy, 'man' is retained rather than neutralized, while the simile's force is
    preserved.
- source_word: חֲלָצֶיךָ
  chosen: your loins
  alternatives:
  - your waist
  - your hips
  lexicon: HALOT
  rationale: The noun refers literally to the loins/waist. 'Your loins' preserves
    the Hebrew idiom 'gird up your loins,' a well-established expression for readiness.
- source_word: וְאֶשְׁאָלְךָ
  chosen: I will question you
  alternatives:
  - I will ask you
  lexicon: HALOT
  rationale: שׁאל means 'ask,' but in this courtroom-like challenge context 'question'
    better conveys sustained interrogation without overtranslating.
- source_word: וְהוֹדִיעֵנִי
  chosen: you shall make it known to me
  alternatives:
  - you shall answer me
  - declare to me
  - inform me
  lexicon: HALOT
  rationale: Hiphil of ידע means 'cause to know, make known.' 'Make it known to me'
    is more lexically precise than the traditional but interpretive 'answer me,' while
    still natural in English.
