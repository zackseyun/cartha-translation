id: JOB.38.11
reference: Job 38:11
source:
  edition: WLC
  text: וָ/אֹמַ֗ר עַד פֹּ֣ה תָ֭בוֹא וְ/לֹ֣א תֹסִ֑יף וּ/פֹ֥א יָ֝שִׁ֗ית בִּ/גְא֥וֹן
    גַּלֶּֽי/ךָ־־׃
translation:
  text: and I said, ‘You may come this far, and no farther; here your proud waves
    shall be set.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Here shall your proud waves stop/be halted.' The Hebrew verb literally
      means 'be set/placed,' and the line expresses the point at which the sea's swelling
      waves are checked.
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֹמַר
  chosen: and I said
  alternatives:
  - when I said
  lexicon: HALOT
  rationale: Qal wayyiqtol 1cs of אמר, continuing the divine speech narrative. Simple
    past 'and I said' best reflects the sequential force.
- source_word: עַד פֹּה
  chosen: this far
  alternatives:
  - up to here
  - thus far
  lexicon: HALOT
  rationale: The preposition plus deictic adverb marks a boundary limit. 'This far'
    is idiomatic modern English and preserves the spatial sense.
- source_word: תָבוֹא
  chosen: you may come
  alternatives:
  - you shall come
  - you will come
  lexicon: HALOT
  rationale: Second masculine singular, addressing the sea personified. In context
    of imposed boundary, English 'may come' conveys permitted extent better than a
    merely predictive future.
- source_word: וְלֹא תֹסִיף
  chosen: and no farther
  alternatives:
  - and you shall not continue
  - and you shall add no more
  lexicon: HALOT
  rationale: Hiphil of יסף literally 'add, continue.' In boundary-setting context,
    idiomatic English 'and no farther' captures the prohibition succinctly and naturally.
- source_word: וּפֹא
  chosen: here
  alternatives:
  - and here
  lexicon: HALOT
  rationale: Deictic adverb repeated for emphasis at the stopping point. 'Here' preserves
    the locative force.
- source_word: יָשִׁית
  chosen: shall be set
  alternatives:
  - shall be placed
  - he shall set
  - shall stop
  lexicon: HALOT
  rationale: Qal imperfect 3ms of שׂית/שׁית, 'set, place.' The subject is best taken
    impersonally or with the wave-pride as what is set/placed here, yielding the sense
    of being fixed or halted at this point. Passive English avoids an awkward unspecified
    subject while preserving the boundary idea.
- source_word: בִּגְאוֹן
  chosen: proud
  alternatives:
  - pride
  - majesty
  - surging pride
  lexicon: HALOT
  rationale: גאון can denote exaltation, pride, or majesty. With sea waves in a context
    of restraining their force, 'proud' captures the arrogant, swelling sense traditionally
    associated with the sea's tumult.
- source_word: גַּלֶּיךָ
  chosen: your waves
  alternatives:
  - your breakers
  - your billows
  lexicon: HALOT
  rationale: Plural construct with 2ms suffix, referring to the sea's waves. 'Waves'
    is the clearest and broadest modern rendering.
