theological_decisions:
- issue: Personification of the sea under divine command
  chosen_reading: Retain second-person address to the sea and boundary-setting language
    without mythologizing beyond the text.
  alternative_readings:
  - Depersonalize the sea entirely as an impersonal natural force
  rationale: The verse is part of YHWH's speech describing his sovereign ordering
    of creation. The Hebrew directly addresses the sea as 'you,' a poetic personification
    that should be preserved because it heightens divine authority without implying
    an independent deity or cosmic rival.
  doctrine_reference: 'Translation philosophy #1 and #3'
