id: JOB.38.8
reference: Job 38:8
source:
  edition: WLC
  text: וַ/יָּ֣סֶךְ בִּ/דְלָתַ֣יִם יָ֑ם בְּ֝/גִיח֗/וֹ מֵ/רֶ֥חֶם יֵצֵֽא׃
translation:
  text: Or who shut in the sea with doors when it burst out from the womb, when it
    came out,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'gushed forth' for 'burst out'; the Hebrew verb evokes forceful emergence.
    reason: lexical_alternative
  - marker: b
    text: The verse personifies the sea as a child emerging from a womb, continuing
      the poem's creation imagery.
    reason: cultural_note
lexical_decisions:
- source_word: וַיָּסֶךְ
  chosen: shut in
  alternatives:
  - hedged in
  - enclosed
  - shut up
  lexicon: HALOT
  rationale: The verb here conveys restraining or enclosing the sea. 'Shut in' is
    idiomatic modern English and fits the image of confinement by doors better than
    the more archaic 'shut up' or the less concrete 'hedged in'.
- source_word: בִּדְלָתַיִם
  chosen: with doors
  alternatives:
  - with double doors
  - with gates
  lexicon: HALOT
  rationale: The noun is the dual form of 'door,' naturally rendered 'doors.' 'With
    doors' preserves the instrumental sense of ב and the architectural metaphor. 'Gates'
    is possible but less exact.
- source_word: יָם
  chosen: the sea
  alternatives:
  - sea
  lexicon: HALOT
  rationale: The definite article is not explicit in Hebrew here, but English idiom
    in this cosmic context strongly favors 'the sea' as a known created entity.
- source_word: בְּגִיחוֹ
  chosen: when it burst out
  alternatives:
  - when it gushed forth
  - in its bursting out
  lexicon: HALOT
  rationale: The infinitive/verb from גיח evokes forceful emergence. 'Burst out' captures
    the vivid, energetic motion of the sea's emergence in accessible English.
- source_word: מֵרֶחֶם
  chosen: from the womb
  alternatives:
  - from a womb
  lexicon: HALOT
  rationale: 'The image is metaphorical and cosmic: the sea is portrayed as being
    born. ''From the womb'' preserves the vivid birth imagery and works idiomatically
    in English.'
- source_word: יֵצֵא
  chosen: when it came out
  alternatives:
  - as it came out
  - it came forth
  lexicon: HALOT
  rationale: The finite verb restates and completes the birth image. Rendering it
    explicitly avoids collapsing it into the previous phrase and preserves the Hebrew's
    poetic parallelism, even at the cost of some repetition in English.
