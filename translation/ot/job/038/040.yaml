id: JOB.38.40
reference: Job 38:40
source:
  edition: WLC
  text: כִּי יָשֹׁ֥חוּ בַ/מְּעוֹנ֑וֹת יֵשְׁב֖וּ בַ/סֻּכָּ֣ה לְמוֹ אָֽרֶב־־׃
translation:
  text: when they crouch in their dens and lie in wait in the thicket?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the covert' or 'in the shelter' for 'in the thicket.' The Hebrew
      סֻכָּה here refers to a place of cover suitable for ambush, not a constructed
      booth in the festival sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: when
  alternatives:
  - for
  - that
  lexicon: HALOT
  rationale: In this context within the divine speech's sequence of rhetorical questions,
    כִּי introduces the circumstance under which the prey is sought, best rendered
    temporally as 'when' rather than more wooden 'for'.
- source_word: יָשֹׁחוּ
  chosen: they crouch
  alternatives:
  - they bow down
  - they sink down
  - they lie low
  lexicon: HALOT
  rationale: From שׁוח/שׁחה, the sense here is lowering oneself in a hunting posture.
    'Crouch' fits the animal context better than the more literal but less idiomatic
    'bow down' or 'sink down'.
- source_word: בַמְּעוֹנוֹת
  chosen: in their dens
  alternatives:
  - in the lairs
  - in the habitations
  lexicon: HALOT
  rationale: מְעוֹנוֹת refers to dwelling places or lairs. Given the surrounding lion-hunting
    imagery in Job 38:39–40, 'dens' is natural modern English. The plural is retained.
    The possessive 'their' is supplied idiomatically in English from the animal context.
- source_word: יֵשְׁבוּ
  chosen: lie in wait
  alternatives:
  - sit
  - remain
  - dwell
  lexicon: HALOT
  rationale: Although ישׁב literally means 'sit' or 'dwell,' in collocation with לְמוֹ
    אָרֶב it denotes taking up position in ambush. Rendering the phrase idiomatically
    communicates the hunting action rather than a static posture.
- source_word: בַסֻּכָּה
  chosen: in the thicket
  alternatives:
  - in the covert
  - in the shelter
  - in the booth
  lexicon: HALOT
  rationale: Here סֻכָּה is not a constructed festival booth but a sheltering cover,
    likely brush or covert suitable for ambush. 'Thicket' best conveys the natural
    hiding place in this zoological context.
- source_word: לְמוֹ אָרֶב
  chosen: lie in wait
  alternatives:
  - for ambush
  - for lurking
  - for prey in ambush
  lexicon: HALOT
  rationale: 'The prepositional phrase expresses purpose: positioning themselves for
    ambush. In English, folding this together with יֵשְׁבוּ as ''lie in wait'' yields
    a clear and faithful idiom.'
