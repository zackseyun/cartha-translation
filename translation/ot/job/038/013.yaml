id: JOB.38.13
reference: Job 38:13
source:
  edition: WLC
  text: לֶ֭/אֱחֹז בְּ/כַנְפ֣וֹת הָ/אָ֑רֶץ וְ/יִנָּעֲר֖וּ רְשָׁ מִמֶּֽ/נָּה׃
translation:
  text: that it might take hold of the edges of the earth, and the wicked be shaken
    out of it,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or ‘corners of the earth.’ The Hebrew literally says ‘wings/extremities
      of the earth,’ a poetic image for its outer edges.
    reason: lexical_alternative
  - marker: b
    text: The image is of the dawn taking hold of the earth and shaking the wicked
      from it as one might shake dust from a garment.
    reason: cultural_note
lexical_decisions:
- source_word: לֶאֱחֹז
  chosen: that it might take hold of
  alternatives:
  - to seize
  - to grasp
  lexicon: HALOT
  rationale: The infinitive construct with prefixed ל expresses purpose/result in
    continuation from the previous verse (‘that it might…’). אֱחֹז from אחז means
    to grasp or seize. ‘Take hold of’ is idiomatic modern English that preserves the
    concrete image without overstating violence.
- source_word: בְּכַנְפוֹת
  chosen: of the edges
  alternatives:
  - of the corners
  - of the extremities
  lexicon: HALOT
  rationale: 'כָּנָף literally means ‘wing,’ but in spatial idiom with הארץ it refers
    to the extremities or corners of the earth. ‘Edges’ communicates the poetic image
    naturally in English while avoiding a misleadingly geometric ‘corners’ as the
    only sense. The preposition ב marks the object grasped: ‘take hold of the edges.’'
- source_word: הָאָרֶץ
  chosen: the earth
  alternatives:
  - the land
  lexicon: HALOT
  rationale: In this cosmic context within YHWH’s speech about creation and dawn,
    הארץ is best rendered ‘the earth,’ not merely ‘the land.’
- source_word: וְיִנָּעֲרוּ
  chosen: and ... be shaken out
  alternatives:
  - and ... be shaken off
  - and ... be shaken loose
  lexicon: HALOT
  rationale: נער in the Niphal here conveys being shaken out/off, continuing the image
    of the earth as a garment or object being shaken. ‘Be shaken out’ best matches
    the following מן + suffix (‘from it’).
- source_word: רְשָׁעִים
  chosen: the wicked
  alternatives:
  - wicked people
  - evildoers
  lexicon: HALOT
  rationale: The adjective/substantive denotes wicked persons. ‘The wicked’ is concise,
    standard, and preserves the moral category without unnecessary expansion.
- source_word: מִמֶּנָּה
  chosen: out of it
  alternatives:
  - from it
  - off it
  lexicon: HALOT
  rationale: The feminine singular suffix refers back to הארץ. Because the governing
    verb is ‘be shaken out,’ ‘out of it’ is the most natural English completion and
    preserves the imagery of removal from the earth’s surface.
