id: JOB.38.22
reference: Job 38:22
source:
  edition: WLC
  text: הֲ֭/בָאתָ אֶל אֹצְר֣וֹת שָׁ֑לֶג וְ/אֹצְר֖וֹת בָּרָ֣ד תִּרְאֶֽה־׃
translation:
  text: Have you entered the storehouses of the snow, or have you seen the storehouses
    of the hail,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'treasuries of the snow ... treasuries of the hail.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲבָאתָ
  chosen: Have you entered
  alternatives:
  - Have you come
  - Have you gone
  lexicon: HALOT
  rationale: The interrogative הֲ with בוא in the perfect 2ms introduces a rhetorical
    question. In context, 'entered' best fits movement into a place ('to the storehouses')
    and reads naturally in English while preserving the concrete imagery.
- source_word: אֶל
  chosen: the
  alternatives:
  - to
  - into
  lexicon: HALOT
  rationale: The preposition itself is not separately represented because English
    idiom with 'enter' normally takes a direct object ('enter the storehouses') rather
    than 'enter into/to the storehouses.' Its directional force is absorbed into 'entered.'
- source_word: אֹצְרוֹת
  chosen: storehouses
  alternatives:
  - treasuries
  - store rooms
  lexicon: HALOT
  rationale: אֹצָר commonly denotes a treasury, storehouse, or repository. 'Storehouses'
    preserves the metaphor of God’s reserved supplies of weather phenomena in accessible
    modern English. 'Treasuries' is traditional but can sound overly monetary in modern
    usage.
- source_word: שָׁלֶג
  chosen: snow
  lexicon: HALOT
  rationale: Standard rendering for the meteorological term.
- source_word: וְאֹצְרוֹת
  chosen: or have you seen the storehouses of
  alternatives:
  - and the storehouses of
  lexicon: HALOT
  rationale: The conjunction links the second clause in a paired rhetorical question.
    Rendering with 'or have you seen' reflects natural English coordination of the
    two interrogatives and preserves the parallelism.
- source_word: בָּרָד
  chosen: hail
  lexicon: HALOT
  rationale: Standard rendering for the precipitation term.
- source_word: תִּרְאֶה
  chosen: have you seen
  alternatives:
  - do you see
  lexicon: HALOT
  rationale: Though morphologically imperfect, in this poetic interrogative sequence
    it functions naturally as a second rhetorical question parallel to the preceding
    perfect. 'Have you seen' gives idiomatic English and matches the discourse flow.
