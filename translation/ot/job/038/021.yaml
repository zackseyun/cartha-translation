id: JOB.38.21
reference: Job 38:21
source:
  edition: WLC
  text: יָ֭דַעְתָּ כִּי אָ֣ז תִּוָּלֵ֑ד וּ/מִסְפַּ֖ר יָמֶ֣י/ךָ רַבִּֽים־׃
translation:
  text: You know, for then you were born, and the number of your days is great!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'and your days are many.' The Hebrew literally says, 'and the number
      of your days [is] many/great.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יָדַעְתָּ
  chosen: You know
  alternatives:
  - You knew
  - Surely you know
  lexicon: HALOT
  rationale: Qal perfect 2ms of ידע. In this sarcastic divine speech, English present
    'You know' best conveys the rhetorical force, though a past sense is formally
    possible.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - surely
  lexicon: HALOT
  rationale: Introduces the ironic explanation for the preceding rhetorical question.
    'For' fits the discourse flow better than a more causal 'because' in English.
- source_word: אָז
  chosen: then
  alternatives:
  - at that time
  lexicon: HALOT
  rationale: Temporal adverb pointing to the time of creation events just mentioned;
    'then' is concise and natural.
- source_word: תִּוָּלֵד
  chosen: you were born
  alternatives:
  - you would be born
  - you were brought forth
  lexicon: HALOT
  rationale: 'Niphal imperfect 2ms of ילד. In context it is used rhetorically/ironically
    with past reference: Job would have had to be alive then. ''You were born'' communicates
    the sense clearly in idiomatic English.'
- source_word: וּמִסְפַּר
  chosen: and the number
  alternatives:
  - and the count
  lexicon: HALOT
  rationale: Construct noun with prefixed conjunction; straightforwardly rendered.
- source_word: יָמֶיךָ
  chosen: of your days
  alternatives:
  - your days
  lexicon: HALOT
  rationale: Construct chain with suffix; 'the number of your days' preserves the
    Hebrew syntax naturally.
- source_word: רַבִּים
  chosen: is great
  alternatives:
  - are many
  - is numerous
  lexicon: HALOT
  rationale: Predicate adjective describing the number of Job's days. English can
    render the sense either as 'are many' or 'is great'; 'is great' matches the singular
    head noun 'number' while preserving the irony.
