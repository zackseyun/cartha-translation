id: JOB.38.38
reference: Job 38:38
source:
  edition: WLC
  text: בְּ/צֶ֣קֶת עָ֭פָר לַ/מּוּצָ֑ק וּ/רְגָבִ֥ים יְדֻבָּֽקוּ׃
translation:
  text: when the dust hardens into a mass, and the clods stick together?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'when the dust is poured into hardness' / 'when the dust becomes hard
      as cast metal.' The Hebrew uses imagery from pouring/casting to describe the
      ground becoming compacted.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּצֶקֶת
  chosen: when ... hardens
  alternatives:
  - in the hardening of
  - when ... is poured/cast
  lexicon: HALOT
  rationale: The form introduces a temporal clause in context ('when'). The underlying
    verb can relate to pouring/casting or becoming firm; with 'dust' and the following
    'into a mass,' the sense is of hardening/compacting rather than literal pouring.
- source_word: עָפָר
  chosen: the dust
  alternatives:
  - dust
  - loose soil
  lexicon: HALOT
  rationale: עָפָר commonly means dust/loose earth. 'The dust' fits the generic substance
    in this weather imagery.
- source_word: לַמּוּצָק
  chosen: into a mass
  alternatives:
  - into hardness
  - into a molten mass
  - as cast metal
  lexicon: HALOT
  rationale: The noun/adjective from יצק can denote something poured/cast, hence a
    solidified mass. In this context of earth compacting, 'into a mass' communicates
    the result naturally without importing metal imagery too strongly.
- source_word: וּרְגָבִים
  chosen: and the clods
  alternatives:
  - and clumps of earth
  - and lumps
  lexicon: HALOT
  rationale: רְגָבִים refers to clods or lumps of earth. 'Clods' is concise and idiomatic
    in English for soil imagery.
- source_word: יְדֻבָּקוּ
  chosen: stick together
  alternatives:
  - cling together
  - are joined
  lexicon: HALOT
  rationale: The passive/intensive sense here is that the earth clods adhere to one
    another. 'Stick together' is clear modern English and preserves the physical image.
