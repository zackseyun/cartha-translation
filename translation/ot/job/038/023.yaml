theological_decisions:
- issue: Divine use of natural forces in judgment imagery
  chosen_reading: Retain the straightforward sense that God has reserved these phenomena
    for times of human conflict and distress.
  alternative_readings:
  - Treat the language as purely metaphorical for providence without military reference
  rationale: The verse itself explicitly names 'a day of battle and war.' The translation
    preserves the imagery without softening or over-systematizing its theological
    implications.
  doctrine_reference: Translation philosophy §1, §3
