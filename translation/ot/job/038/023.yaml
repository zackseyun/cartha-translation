id: JOB.38.23
reference: Job 38:23
source:
  edition: WLC
  text: אֲשֶׁר חָשַׂ֥כְתִּי לְ/עֶת צָ֑ר לְ/י֥וֹם קְ֝רָ֗ב וּ/מִלְחָמָֽה־־׃
translation:
  text: which I have reserved for a time of distress, for a day of battle and war,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'which I have withheld' or 'which I have stored up.'
    reason: lexical_alternative
  - marker: b
    text: '''Distress'' may also be rendered ''trouble'' or ''adversity.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲשֶׁר
  chosen: which
  alternatives:
  - that
  lexicon: HALOT
  rationale: Introduces a relative clause referring back to the storehouses of snow/hail
    in the preceding verse. 'Which' is natural English for this non-personal antecedent.
- source_word: חָשַׂכְתִּי
  chosen: I have reserved
  alternatives:
  - I have withheld
  - I have stored up
  lexicon: HALOT
  rationale: The verb חשׂך in this stem can mean withhold, keep back, or reserve.
    In context of God speaking of stored meteorological forces, 'I have reserved'
    best captures purposeful keeping for later use without implying mere refusal.
    Present perfect fits the Hebrew perfect in this relative clause.
- source_word: לְעֶת
  chosen: for a time of
  alternatives:
  - for the time of
  - for a season of
  lexicon: HALOT
  rationale: The preposition ל marks purpose or destination here, and עֵת denotes
    a time/occasion. 'For a time of' is idiomatic and preserves the temporal sense.
- source_word: צָר
  chosen: distress
  alternatives:
  - trouble
  - adversity
  - anguish
  lexicon: HALOT
  rationale: צָר here denotes a time of trouble or distress. 'Distress' is concise,
    natural, and suitably weighty in context.
- source_word: לְיוֹם
  chosen: for a day of
  alternatives:
  - for the day of
  lexicon: HALOT
  rationale: Parallel to לְעֶת; rendered consistently as a purposive/temporal phrase.
- source_word: קְרָב
  chosen: battle
  alternatives:
  - combat
  lexicon: HALOT
  rationale: A standard military term. 'Battle' is the clearest and most idiomatic
    English equivalent.
- source_word: וּמִלְחָמָה
  chosen: and war
  alternatives:
  - and warfare
  lexicon: HALOT
  rationale: Maintains the Hebrew pairing of near-synonyms rather than collapsing
    them. 'War' is more direct and readable than 'warfare' here.
