id: JOB.38.37
reference: Job 38:37
source:
  edition: WLC
  text: מִֽי יְסַפֵּ֣ר שְׁחָקִ֣ים בְּ/חָכְמָ֑ה וְ/נִבְלֵ֥י שָׁ֝מַ֗יִם מִ֣י יַשְׁכִּֽיב־׃
translation:
  text: Who can count the clouds with wisdom, or tip over the water jars of the heavens?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the bottles of heaven.' The Hebrew image is of containers in the sky
      holding rain.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִי
  chosen: Who
  lexicon: HALOT
  rationale: Interrogative pronoun introducing a rhetorical question about divine
    ability; 'who' is the natural English equivalent.
- source_word: יְסַפֵּר
  chosen: can count
  alternatives:
  - can recount
  - can number
  lexicon: HALOT
  rationale: From ספר in the piel, here best understood as 'count/number' in context
    of clouds. Adding 'can' brings out the rhetorical force of the imperfect in English.
- source_word: שְׁחָקִים
  chosen: the clouds
  alternatives:
  - the skies
  - the dust-clouds
  lexicon: HALOT
  rationale: In poetic usage שחקים commonly refers to clouds/sky-clouds. 'Clouds'
    fits the immediate meteorological context of the surrounding verses.
- source_word: בְּחָכְמָה
  chosen: with wisdom
  alternatives:
  - wisely
  - by wisdom
  lexicon: HALOT
  rationale: The preposition ב plus חכמה is rendered instrumentally or adverbially.
    'With wisdom' preserves the Hebrew form while remaining natural English.
- source_word: וְנִבְלֵי שָׁמַיִם
  chosen: the water jars of the heavens
  alternatives:
  - the bottles of heaven
  - the jars of the sky
  lexicon: HALOT
  rationale: נבל literally denotes a skin-bottle, jar, or container. In this poetic
    weather context it metaphorically describes heavenly reservoirs holding rain.
    'Water jars' makes the image intelligible in modern English while preserving the
    container metaphor; 'of the heavens' keeps the genitive force.
- source_word: יַשְׁכִּיב
  chosen: tip over
  alternatives:
  - pour out
  - lay down
  - cause to lie down
  lexicon: HALOT
  rationale: The hiphil of שכב literally means 'cause to lie down,' but with containers
    in context it likely means to tilt or tip them so their contents pour out. 'Tip
    over' preserves the concrete image better than the more interpretive 'pour out'.
