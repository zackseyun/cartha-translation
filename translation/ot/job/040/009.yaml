theological_decisions:
- issue: Reference of אֵל in divine comparison
  chosen_reading: God
  alternative_readings:
  - a god
  rationale: In the immediate context, the speaker is the God of Israel challenging
    Job with uniquely divine attributes. Rendering אֵל as 'God' preserves the monotheistic
    force of the passage without importing extra doctrinal claims.
  doctrine_reference: Original-language primacy over translation tradition; preserve
    the source text's plain sense
