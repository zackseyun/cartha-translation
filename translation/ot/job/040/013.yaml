id: JOB.40.13
reference: Job 40:13
source:
  edition: WLC
  text: טָמְנֵ֣/ם בֶּ/עָפָ֣ר יָ֑חַד פְּ֝נֵי/הֶ֗ם חֲבֹ֣שׁ בַּ/טָּמֽוּן׃
translation:
  text: Hide them together in the dust; bind their faces in the hidden place.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Bury them together in the dust.' The Hebrew verb can mean 'hide' or,
      in this context, suggest burial.
    reason: lexical_alternative
  - marker: b
    text: Or 'bind their faces in secret' / 'in concealment.' The final phrase is
      difficult; the Hebrew likely refers to a hidden place and echoes the opening
      verb 'hide.'
    reason: alternative_reading
lexical_decisions:
- source_word: טָמְנֵם
  chosen: Hide them
  alternatives:
  - Bury them
  - Conceal them
  lexicon: HALOT
  rationale: From טמן, 'to hide/conceal'; in context of dust and death imagery, 'hide'
    preserves the verb's basic sense without overcommitting to the more interpretive
    'bury.' The 3mp suffix is represented by 'them.'
- source_word: בֶּעָפָר
  chosen: in the dust
  alternatives:
  - in the dirt
  - in the earth
  lexicon: HALOT
  rationale: עָפָר commonly denotes dust/loose earth. 'Dust' fits the poetic and mortality-laden
    context better than the flatter 'dirt.'
- source_word: יָחַד
  chosen: together
  alternatives:
  - all together
  lexicon: HALOT
  rationale: Adverbial sense indicating collective action; 'together' is natural and
    sufficiently precise.
- source_word: פְּנֵיהֶם
  chosen: their faces
  alternatives:
  - their face
  - their persons
  lexicon: HALOT
  rationale: Literally 'their faces.' Though 'face' can metonymically refer to persons
    or outward appearance, the concrete plural is retained for transparency.
- source_word: חֲבֹשׁ
  chosen: bind
  alternatives:
  - shut up
  - imprison
  - wrap
  lexicon: HALOT
  rationale: From חבשׁ, 'to bind.' In this judicial/death context it may imply restraint
    or confinement; 'bind' preserves the lexical core and leaves the imagery intact.
- source_word: בַּטָּמוּן
  chosen: in the hidden place
  alternatives:
  - in the secret place
  - in concealment
  - in darkness
  lexicon: HALOT
  rationale: Likely a substantivized/passive form from טמן, 'that which is hidden'
    or 'the hidden place.' 'In the hidden place' preserves the Hebrew imagery and
    wordplay with the opening verb טָמְנֵם. 'In darkness' is too interpretive.
