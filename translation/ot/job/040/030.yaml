id: JOB.40.30
reference: Job 40:30
source:
  edition: WLC
  text: יִכְר֣וּ עָ֭לָי/ו חַבָּרִ֑ים יֶ֝חֱצ֗וּ/הוּ בֵּ֣ין כְּֽנַעֲנִֽים׃
translation:
  text: Will traders bargain over him? Will they divide him among the merchants?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Will companions feast on him?' The Hebrew of the first clause is difficult,
      and some take חַבָּרִים in a non-commercial sense.
    reason: alternative_reading
  - marker: b
    text: Hebrew 'Canaanites'; in context this likely means 'merchants.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יִכְרוּ
  chosen: bargain
  alternatives:
  - dig
  - trade
  - make a bargain
  lexicon: HALOT
  rationale: The verb כרה commonly means 'dig,' but in this context with human agents
    and commercial language it is widely understood idiomatically as making a bargain
    or striking a deal over the creature. 'Bargain' fits the marketplace setting and
    avoids an implausible literal sense.
- source_word: עָלָיו
  chosen: over him
  alternatives:
  - for him
  - concerning him
  lexicon: HALOT
  rationale: The preposition על with this idiom is best rendered 'over' in English,
    expressing negotiation concerning possession or sale of the animal.
- source_word: חַבָּרִים
  chosen: traders
  alternatives:
  - companions
  - associates
  - fishermen
  lexicon: HALOT
  rationale: Although the noun can denote associates or companions, the parallel with
    'divide him among the merchants' favors a commercial sense here. 'Traders' captures
    the likely market-oriented meaning in context.
- source_word: יֶחֱצוּהוּ
  chosen: divide him
  alternatives:
  - apportion him
  - cut him up
  lexicon: HALOT
  rationale: The verb חצה means divide or apportion. In context it likely refers to
    distributing the creature as merchandise rather than explicitly butchering it,
    so 'divide him' preserves the broader sense.
- source_word: בֵּין
  chosen: among
  alternatives:
  - between
  lexicon: HALOT
  rationale: With a plural object in English, 'among' is the natural rendering.
- source_word: כְּנַעֲנִים
  chosen: merchants
  alternatives:
  - Canaanites
  - traders
  lexicon: HALOT
  rationale: In several Hebrew contexts 'Canaanites' functions metonymically for merchants
    or traders. Here the commercial parallelism strongly supports 'merchants' in the
    main text rather than the ethnic term.
