id: JOB.40.32
reference: Job 40:32
source:
  edition: WLC
  text: שִׂים עָלָ֥י/ו כַּפֶּ֑/ךָ זְכֹ֥ר מִ֝לְחָמָ֗ה אַל תּוֹסַֽף־־׃
translation:
  text: Lay your hand on him; remember the battle—you will not do it again.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew literally, ''do not add''; the sense is idiomatic: ''do not do it
      again'' or ''you will not repeat it.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׂים
  chosen: Lay
  alternatives:
  - Put
  - Set
  lexicon: HALOT
  rationale: Imperative of שׂים, here idiomatically introducing the act of placing
    the hand on Leviathan. 'Lay' is natural English with 'hand on him' and preserves
    the force of the command.
- source_word: עָלָיו
  chosen: on him
  alternatives:
  - upon him
  - against him
  lexicon: HALOT
  rationale: Preposition עַל with 3ms suffix most straightforwardly means 'on/upon
    him.' 'On him' is idiomatic and fits the physical image of attempting to seize
    or strike Leviathan.
- source_word: כפך
  chosen: your hand
  alternatives:
  - your palm
  lexicon: HALOT
  rationale: כַּף literally denotes the palm/hand. In English the idiom 'lay your
    hand on him' is more natural than 'lay your palm on him' and conveys the intended
    action.
- source_word: זְכֹר
  chosen: remember
  alternatives:
  - consider
  - keep in mind
  lexicon: HALOT
  rationale: Imperative of זכר. 'Remember' preserves the directness of the warning
    and matches the Hebrew well.
- source_word: מִלְחָמָה
  chosen: the battle
  alternatives:
  - the struggle
  - the fight
  - war
  lexicon: HALOT
  rationale: מִלְחָמָה denotes battle/warfare. In this context of confronting Leviathan,
    'the battle' communicates the impending combat vividly and idiomatically.
- source_word: אַל תּוֹסַף
  chosen: you will not do it again
  alternatives:
  - do not continue
  - you will not repeat it
  - never again
  lexicon: HALOT
  rationale: 'Though formally jussive/negative (''do not add''), the idiom after the
    warning functions as a prediction/result: once he remembers the battle, he will
    not repeat the attempt. ''You will not do it again'' captures the sense in clear
    modern English. The omitted object is supplied from context: attempting to lay
    a hand on Leviathan.'
