id: JOB.40.28
reference: Job 40:28
source:
  edition: WLC
  text: הֲ/יִכְרֹ֣ת בְּרִ֣ית עִמָּ֑/ךְ תִּ֝קָּחֶ֗/נּוּ לְ/עֶ֣בֶד עוֹלָֽם׃
translation:
  text: Will he make a covenant with you, that you would take him as a slave forever?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'cut a covenant with you,' a standard idiom meaning 'make
      a covenant.'
    reason: lexical_alternative
  - marker: b
    text: Or 'servant forever.' The Hebrew עֶבֶד can mean either 'servant' or 'slave';
      'slave' is preferred here because the context emphasizes permanent bonded status.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲ/יִכְרֹת
  chosen: Will he make
  alternatives:
  - Will he cut
  - Would he make
  lexicon: HALOT
  rationale: The verb כרת with בְּרִית is the standard idiom 'make/cut a covenant.'
    In English, 'make a covenant' is the clearest natural rendering, while preserving
    the covenantal sense. The interrogative הֲ marks the clause as a question, reflected
    by 'Will he…?'.
- source_word: בְּרִית
  chosen: a covenant
  alternatives:
  - an agreement
  - a treaty
  lexicon: HALOT
  rationale: בְּרִית regularly denotes a covenant, not merely a casual agreement.
    'Covenant' preserves the formal relational and legal force of the Hebrew.
- source_word: עִמָּךְ
  chosen: with you
  alternatives:
  - with thee
  lexicon: HALOT
  rationale: Straightforward prepositional phrase; modern English favors 'with you.'
    Although the morphology table labels a 2fs suffix, the surrounding discourse addresses
    Job in the second masculine singular, and the sense in English is unaffected here.
- source_word: תִּקָּחֶנּוּ
  chosen: that you would take him
  alternatives:
  - so that you may take him
  - and you would take him
  lexicon: HALOT
  rationale: 'The verb לקח means ''take.'' Here it follows the first question and
    is best rendered as a result/purpose nuance in English: ''that you would take
    him.'' The object suffix is third masculine singular, ''him.'''
- source_word: לְעֶבֶד
  chosen: as a slave
  alternatives:
  - as a servant
  - for a slave
  lexicon: HALOT
  rationale: עֶבֶד can mean servant or slave depending on context. Here the context
    is permanent possession ('forever'), making the bonded status salient; therefore
    'slave' best reflects the force, in line with the translation philosophy's handling
    of bonded service terms.
- source_word: עוֹלָם
  chosen: forever
  alternatives:
  - permanently
  - for life
  - for all time
  lexicon: HALOT
  rationale: עוֹלָם here expresses enduring duration. 'Forever' is the most natural
    idiomatic English in this rhetorical question, though the sense is effectively
    permanent servitude.
