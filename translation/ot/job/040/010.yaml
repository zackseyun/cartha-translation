id: JOB.40.10
reference: Job 40:10
source:
  edition: WLC
  text: עֲדֵ֥ה נָ֣א גָֽא֣וֹן וָ/גֹ֑בַהּ וְ/ה֖וֹד וְ/הָדָ֣ר תִּלְבָּֽשׁ׃
translation:
  text: Adorn yourself, please, with majesty and loftiness, and clothe yourself with
    splendor and honor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Deck yourself now with pride and dignity; clothe yourself with glory
      and majesty.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עֲדֵה
  chosen: Adorn yourself
  alternatives:
  - Deck yourself
  - Array yourself
  lexicon: HALOT
  rationale: Imperative 2ms from עדה in the reflexive sense of putting on adornment.
    'Adorn yourself' is natural modern English and fits the parallel with 'clothe
    yourself' later in the verse.
- source_word: נָא
  chosen: please
  alternatives:
  - now
  lexicon: HALOT
  rationale: Particle of entreaty or emphasis. 'Please' best captures the exhortative
    force in contemporary English without sounding archaic; 'now' is possible but
    less precise here.
- source_word: גָּאוֹן
  chosen: majesty
  alternatives:
  - exaltation
  - pride
  lexicon: HALOT
  rationale: In this context of divine grandeur and regal attributes, the noun denotes
    majesty or exaltedness rather than sinful pride. 'Majesty' fits the semantic field
    and English collocation.
- source_word: גֹּבַהּ
  chosen: loftiness
  alternatives:
  - height
  - haughtiness
  lexicon: HALOT
  rationale: Literally 'height,' but in parallel with גָּאוֹן it conveys elevated
    grandeur. 'Loftiness' preserves the metaphorical sense without forcing a negative
    nuance like 'haughtiness.'
- source_word: הוֹד
  chosen: splendor
  alternatives:
  - glory
  - majesty
  lexicon: HALOT
  rationale: A term for visible magnificence or stately splendor. 'Splendor' distinguishes
    it from גָּאוֹן while preserving the poetic accumulation of regal terms.
- source_word: הָדָר
  chosen: honor
  alternatives:
  - majesty
  - beauty
  lexicon: HALOT
  rationale: Often denotes honor, adornment, or stately dignity. 'Honor' gives a distinct
    but related nuance alongside 'splendor'; 'majesty' would duplicate earlier wording
    too closely.
- source_word: תִּלְבָּשׁ
  chosen: clothe yourself
  alternatives:
  - put on
  - wear
  lexicon: HALOT
  rationale: Imperfect/jussive-like form continuing the imperative sense. 'Clothe
    yourself' preserves the clothing metaphor explicitly and pairs well with 'adorn
    yourself' in the first colon.
