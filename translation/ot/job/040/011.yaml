  from: Pour out the outbursts
  to: Scatter the outbursts
  rationale: The phrase 'Pour out the outbursts' combines metaphors awkwardly. One typically 'pours out' a liquid (like wrath), whereas an 'outburst' is an event. The Hebrew verb used here, הָפֵץ (from פוץ), means 'to scatter,' which pairs more naturally with 'outbursts' and is more faithful to the source text's imagery. The current rendering is slightly clunky and less precise than the Hebrew.
