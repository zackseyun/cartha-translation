id: JOB.40.11
reference: Job 40:11
source:
  edition: WLC
  text: הָ֭פֵץ עֶבְר֣וֹת אַפֶּ֑/ךָ וּ/רְאֵ֥ה כָל גֵּ֝אֶ֗ה וְ/הַשְׁפִּילֵֽ/הוּ־׃
translation:
  text: Scatter the outbursts of your anger, and look on everyone who is proud and bring him low.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Scatter the overflowings of your wrath.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'everyone proud'; the singular object in 'bring him low' treats each proud person individually.
    reason: lexical_alternative
  - marker: c
    text: Or 'Pour out the outbursts'.
    reason: previous_rendering
lexical_decisions:
- source_word: הָפֵץ
  chosen: Pour out
  alternatives:
  - Scatter
  - Disperse
  - Cast abroad
  lexicon: HALOT
  rationale: Imperative of פוץ/פצץ in this context calls for releasing or sending forth forcefully. 'Pour out' fits the idiom with wrath/anger in English and matches the image of letting anger burst forth.
- source_word: עֶבְרוֹת
  chosen: outbursts
  alternatives:
  - overflowings
  - fury
  - wraths
  lexicon: HALOT
  rationale: Plural of עֶבְרָה denotes overflowing rage or furious outbursts. 'Outbursts' preserves the plural intensity better than the flatter singular 'wrath'.
- source_word: אַפֶּךָ
  chosen: your anger
  alternatives:
  - your nose
  - your wrath
  lexicon: HALOT
  rationale: Though literally 'your nose,' אַף is a standard Hebrew idiom for anger. 'Your anger' communicates the sense naturally in English without obscuring the idiom's meaning.
- source_word: וּרְאֵה
  chosen: and look on
  alternatives:
  - and see
  - and behold
  lexicon: HALOT
  rationale: The imperative invites active observation directed toward an object. 'Look on' slightly better prepares for the following act of humbling than the more neutral 'see.'
- source_word: כָל
  chosen: everyone
  alternatives:
  - every
  - all
  lexicon: HALOT
  rationale: 'With the following singular adjective used substantivally, the sense is distributive: each proud person. ''Everyone'' expresses that naturally in English.'
- source_word: גֵּאֶה
  chosen: who is proud
  alternatives:
  - the proud
  - arrogant
  - lofty
  lexicon: HALOT
  rationale: The adjective denotes one who is exalted or proud. Rendering it as a relative clause gives smooth English after 'everyone' while preserving the personal reference.
- source_word: וְהַשְׁפִּילֵהוּ
  chosen: and bring him low
  alternatives:
  - and humble him
  - and abase him
  lexicon: HALOT
  rationale: Hiphil imperative of שׁפל means to make low, humble, abase. 'Bring him low' is vivid, idiomatic, and matches the poetic parallelism with pride.
