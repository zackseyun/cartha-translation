id: JOB.40.20
reference: Job 40:20
source:
  edition: WLC
  text: כִּֽי ב֭וּל הָרִ֣ים יִשְׂאוּ ל֑/וֹ וְֽ/כָל חַיַּ֥ת הַ֝/שָּׂדֶ֗ה יְשַֽׂחֲקוּ
    שָֽׁם־־־־׃
translation:
  text: For the mountains bear food for him, and all the wild animals of the field
    play there.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the mountains yield produce for him.'
    reason: lexical_alternative
  - marker: b
    text: 'Traditional: ''all the beasts of the field play there.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Surely
  - Indeed
  - Because
  lexicon: HALOT
  rationale: Here כִּי introduces an explanation of the preceding description of behemoth's
    provision and habitat, so 'For' best captures the explanatory force in natural
    English.
- source_word: בּוּל
  chosen: food
  alternatives:
  - produce
  - crop
  - fodder
  lexicon: HALOT
  rationale: בּוּל denotes produce/yield. In context, describing what the mountains
    provide for the animal, 'food' is the clearest optimal-equivalence rendering.
    'Produce' is possible but sounds less natural in English; 'fodder' is more interpretive.
- source_word: הָרִים
  chosen: the mountains
  alternatives:
  - mountains
  - the hills
  lexicon: HALOT
  rationale: The definite noun refers to the mountainous region as the source of provision.
    'Mountains' is the straightforward rendering of הָרִים.
- source_word: יִשְׂאוּ לוֹ
  chosen: bear food for him
  alternatives:
  - bring forth for him
  - carry for him
  - yield for him
  lexicon: HALOT
  rationale: נשא with בּוּל here idiomatically conveys producing or bearing sustenance
    for the behemoth. 'Bear food for him' preserves the imagery while remaining intelligible.
    'Yield for him' is also viable but slightly less vivid.
- source_word: וְכָל
  chosen: and all
  alternatives:
  - and every
  lexicon: HALOT
  rationale: A simple connective plus distributive/collective quantifier; 'and all'
    fits the collective sense with the following singular collective noun.
- source_word: חַיַּת הַשָּׂדֶה
  chosen: the wild animals of the field
  alternatives:
  - the beasts of the field
  - the animals of the countryside
  lexicon: HALOT
  rationale: This construct commonly means wild land animals. 'Wild animals of the
    field' is clear modern English. 'Beasts of the field' is traditional but slightly
    archaic.
- source_word: יְשַׂחֲקוּ
  chosen: play
  alternatives:
  - frolic
  - sport themselves
  lexicon: HALOT
  rationale: The verb שׂחק in the Piel here conveys playful activity. 'Play' is the
    most natural modern equivalent; 'frolic' is possible but more stylized.
- source_word: שָׁם
  chosen: there
  alternatives:
  - in that place
  lexicon: HALOT
  rationale: A straightforward locative adverb referring to the mountains/that habitat.
    'There' is sufficient and natural.
