id: JOB.40.23
reference: Job 40:23
source:
  edition: WLC
  text: הֵ֤ן יַעֲשֹׁ֣ק נָ֭הָר לֹ֣א יַחְפּ֑וֹז יִבְטַ֓ח כִּֽי יָגִ֖יחַ יַרְדֵּ֣ן אֶל
    פִּֽי/הוּ׀־־׃
translation:
  text: Look, if a river rages, he is not alarmed; he is confident even if the Jordan
    surges against his mouth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'into his mouth.' The Hebrew is more literally 'to/into his mouth,' but
      the phrase likely depicts floodwater pressing up against him rather than emphasizing
      drinking.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֵן
  chosen: Look
  alternatives:
  - Behold
  - Indeed
  - See
  lexicon: HALOT
  rationale: Introduces vivid attention to the description. 'Look' gives natural modern
    English while preserving the deictic force better than a flat 'indeed.'
- source_word: יַעֲשֹׁק
  chosen: rages
  alternatives:
  - oppresses
  - swells violently
  - rushes
  lexicon: HALOT
  rationale: In context of a river, the verb is used figuratively for violent surging
    or pressing hard. 'Rages' captures the forceful, threatening movement without
    importing a moral sense like 'oppresses.'
- source_word: נָהָר
  chosen: a river
  alternatives:
  - the river
  - stream
  lexicon: HALOT
  rationale: 'Anarthrous singular is best rendered generically here: any river in
    flood. ''River'' is the natural lexical equivalent.'
- source_word: לֹא יַחְפּוֹז
  chosen: he is not alarmed
  alternatives:
  - he does not hurry
  - he is not in panic
  - he is not disturbed
  lexicon: HALOT
  rationale: The verb can denote being in haste or panic. In this poetic context describing
    Behemoth's fearlessness, 'not alarmed' conveys the idiomatic sense rather than
    literal speed.
- source_word: יִבְטַח
  chosen: he is confident
  alternatives:
  - he trusts
  - he feels secure
  lexicon: HALOT
  rationale: The verb expresses security or confidence. 'He is confident' fits the
    immediate context of calm under threat better than the more relational English
    'trusts.'
- source_word: כִּי
  chosen: even if
  alternatives:
  - though
  - when
  - for
  lexicon: HALOT
  rationale: 'Here כִּי introduces a concessive clause in context: his confidence
    remains even in the event described. ''Even if'' makes that concessive force explicit
    in idiomatic English.'
- source_word: יָגִיחַ
  chosen: surges
  alternatives:
  - bursts forth
  - rushes
  - beats
  lexicon: HALOT
  rationale: The verb denotes forceful gushing or bursting forth. 'Surges' is vivid
    and natural for floodwaters.
- source_word: יַרְדֵּן
  chosen: the Jordan
  alternatives:
  - Jordan
  lexicon: HALOT
  rationale: Proper name of the river; translated with the English article as customary
    for river names.
- source_word: אֶל פִּיהוּ
  chosen: against his mouth
  alternatives:
  - into his mouth
  - up to his mouth
  - to his jaws
  lexicon: HALOT
  rationale: Literally 'to/into his mouth.' In English, with flood imagery and an
    animal drinking or facing the torrent, 'against his mouth' best conveys the image
    without implying ingestion as the main point. The more literal 'into his mouth'
    is preserved in a footnote.
