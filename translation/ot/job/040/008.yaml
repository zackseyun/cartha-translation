theological_decisions:
- issue: Forensic versus moral rendering of the verse
  chosen_reading: 'The verse is rendered in judicial language: ''annul my justice
    ... condemn me ... be justified.'''
  alternative_readings:
  - A more generalized moral rendering such as 'discredit my righteousness ... make
    me wrong so that you can be right'
  rationale: The Hebrew vocabulary is strongly forensic (מִשְׁפָּט, רשע, צדק). Preserving
    courtroom language best reflects the source text and maintains the theological
    tension of Job's challenge to divine justice without softening it into mere personal
    disagreement.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Rendering מִשְׁפָּטִי as 'my justice'
  chosen_reading: my justice
  alternative_readings:
  - my judgment
  rationale: The context concerns God's just governance and Job's implied accusation
    against it. 'My justice' foregrounds the moral-judicial dimension. Because 'my
    judgment' is also plausible and traditional, it is preserved in a footnote rather
    than excluded.
  doctrine_reference: Translation philosophy §§1, 3, 5
