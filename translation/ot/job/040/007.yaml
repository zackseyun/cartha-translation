id: JOB.40.7
reference: Job 40:7
source:
  edition: WLC
  text: אֱזָר נָ֣א כְ/גֶ֣בֶר חֲלָצֶ֑י/ךָ אֶ֝שְׁאָלְ/ךָ֗ וְ/הוֹדִיעֵֽ/נִי־׃
translation:
  text: Now gird up your loins like a man; I will question you, and you shall make
    it known to me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'brace yourself like a warrior.' The Hebrew says literally, 'gird up
      your loins like a man.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֱזָר
  chosen: gird up
  alternatives:
  - brace yourself
  - belt up
  lexicon: HALOT
  rationale: Imperative of אזר, literally to gird or bind on. 'Gird up' preserves
    the concrete idiom and the force of preparation better than a purely dynamic 'brace
    yourself.'
- source_word: נָא
  chosen: Now
  alternatives:
  - please
  - I pray
  lexicon: HALOT
  rationale: Particle adding urgency or entreaty. In this divine challenge context,
    'now' conveys immediacy more naturally in modern English than 'please,' which
    can sound overly polite or weak.
- source_word: כְגֶבֶר
  chosen: like a man
  alternatives:
  - like a warrior
  - like a strong man
  lexicon: HALOT
  rationale: גבר denotes a man, often with connotations of strength. 'Like a man'
    keeps the gendered and idiomatic force of the Hebrew while allowing the context
    to supply the nuance of firmness.
- source_word: חֲלָצֶיךָ
  chosen: your loins
  alternatives:
  - your waist
  - your hips
  lexicon: HALOT
  rationale: The noun refers to the loins/waist region. In the idiom 'gird up your
    loins,' retaining 'loins' preserves the established bodily metaphor and avoids
    flattening the expression.
- source_word: אֶשְׁאָלְךָ
  chosen: I will question you
  alternatives:
  - I will ask you
  - I will inquire of you
  lexicon: HALOT
  rationale: שאל commonly means ask, but here in the courtroom-like challenge setting
    'question' better conveys the probing force of God's speech.
- source_word: וְהוֹדִיעֵנִי
  chosen: and you shall make it known to me
  alternatives:
  - and declare to me
  - and answer me
  lexicon: HALOT
  rationale: Hiphil of ידע means cause to know, inform, make known. 'Make it known
    to me' is a clear, fairly formal rendering that preserves the causative sense
    better than the more interpretive 'answer me.'
