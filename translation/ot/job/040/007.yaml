theological_decisions:
- issue: Gendered language in גבר
  chosen_reading: like a man
  alternative_readings:
  - like a warrior
  - like a strong man
  rationale: Following the translation philosophy's gender-accurate principle, the
    masculine singular noun is retained as 'man' rather than neutralized. The context
    is a challenge to Job using a masculine singular form, and the text does not warrant
    replacing it with a gender-neutral expression.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
