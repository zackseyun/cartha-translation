theological_decisions:
- issue: Anthropomorphic idiom of power
  chosen_reading: your right hand can save you
  alternative_readings:
  - your own strength can save you
  rationale: The Hebrew uses the concrete idiom 'right hand' for power. Following
    optimal equivalence, the main text preserves the metaphor rather than resolving
    it into interpretation.
  doctrine_reference: Translation philosophy §1, §5
