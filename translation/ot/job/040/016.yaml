id: JOB.40.16
reference: Job 40:16
source:
  edition: WLC
  text: הִנֵּה נָ֣א כֹח֣/וֹ בְ/מָתְנָ֑י/ו וְ֝/אֹנ֗/וֹ בִּ/שְׁרִירֵ֥י בִטְנֽ/וֹ־׃
translation:
  text: Look now, his strength is in his loins, and his power in the muscles of his
    belly.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his vigor' for 'his power'; the Hebrew parallelism uses two closely
      related terms for bodily strength.
    reason: lexical_alternative
  - marker: b
    text: Or 'sinews of his belly' for 'muscles of his belly.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנֵּה נָא
  chosen: Look now
  alternatives:
  - Behold now
  - See now
  lexicon: HALOT
  rationale: הִנֵּה is a deictic particle drawing attention ('look,' 'behold'), and
    נָא adds an urging or vividness ('now,' 'please'). 'Look now' preserves the immediacy
    in readable modern English without archaic tone.
- source_word: כֹחוֹ
  chosen: his strength
  alternatives:
  - his power
  lexicon: HALOT
  rationale: כֹחַ commonly denotes strength or vigor. 'Strength' fits the physical
    description of the creature's body in context better than the more abstract 'power,'
    which is reserved for the parallel term אֹנוֹ for stylistic variation.
- source_word: בְמָתְנָיו
  chosen: in his loins
  alternatives:
  - in his hips
  - in his waist
  lexicon: HALOT
  rationale: מָתְנַיִם refers to the loins/hips region. 'Loins' is the most direct
    and traditional anatomical equivalent and suits the poetic register; 'hips' is
    possible but slightly narrows the sense.
- source_word: וְאֹנוֹ
  chosen: and his power
  alternatives:
  - and his vigor
  - and his strength
  lexicon: HALOT
  rationale: אוֹן denotes strength, vigor, or generative power. In parallel with כֹחַ,
    'power' gives natural English variation while preserving the semantic overlap
    of Hebrew poetic parallelism.
- source_word: בִּשְׁרִירֵי
  chosen: in the muscles of
  alternatives:
  - in the sinews of
  - in the firm parts of
  lexicon: HALOT
  rationale: שְׁרִירִים refers to muscles, sinews, or firm fleshy parts. 'Muscles'
    is the clearest modern anatomical rendering; 'sinews' is possible but less natural
    for contemporary readers.
- source_word: בִטְנוֹ
  chosen: his belly
  alternatives:
  - his abdomen
  - his body
  lexicon: HALOT
  rationale: בֶּטֶן commonly means belly, womb, or abdomen depending on context. Here
    the physical-anatomical sense is intended, and 'belly' is the most straightforward
    idiomatic choice.
