id: JOB.40.19
reference: Job 40:19
source:
  edition: WLC
  text: ה֭וּא רֵאשִׁ֣ית דַּרְכֵי אֵ֑ל הָ֝/עֹשׂ/וֹ יַגֵּ֥שׁ חַרְבּֽ/וֹ־׃
translation:
  text: He is the first of the works of God; let the one who made him bring near his
    sword.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'He is the chief of God's ways.'
    reason: lexical_alternative
  - marker: b
    text: The Hebrew of the final clause is difficult. It may mean 'only his Maker
      can approach him with the sword' or 'his Maker furnished him with his sword.'
    reason: alternative_reading
lexical_decisions:
- source_word: רֵאשִׁית
  chosen: the first
  alternatives:
  - the beginning
  - the chief
  lexicon: HALOT
  rationale: In context of Behemoth's status among God's creatures, רֵאשִׁית most
    naturally denotes primacy or first rank rather than temporal beginning alone.
    'The first' preserves the compact Hebrew expression and allows either prominence
    or precedence.
- source_word: דַּרְכֵי אֵל
  chosen: of the works of God
  alternatives:
  - of the ways of God
  - of God's ways
  lexicon: HALOT
  rationale: דֶּרֶךְ can mean 'way' literally or figuratively, including manner/activity.
    Here with רֵאשִׁית and in a creation context, 'works' communicates God's creative
    acts more clearly in English than the more opaque 'ways,' while remaining within
    the semantic range.
- source_word: אֵל
  chosen: God
  alternatives:
  - Mighty God
  - the Mighty One
  lexicon: HALOT
  rationale: אֵל here is the common divine title, best rendered simply 'God' in idiomatic
    English.
- source_word: הָעֹשׂוֹ
  chosen: the one who made him
  alternatives:
  - his Maker
  - the one who fashioned him
  lexicon: HALOT
  rationale: The participial form with article and pronominal suffix is literally
    'the one making/made him.' 'The one who made him' is clear modern English and
    preserves the relative force.
- source_word: יַגֵּשׁ
  chosen: bring near
  alternatives:
  - approach with
  - present
  - draw near with
  lexicon: HALOT
  rationale: The Hiphil of נגשׁ commonly means 'bring near' or 'present.' Retaining
    'bring near' reflects the verbal form more directly, even though the clause remains
    difficult.
- source_word: חַרְבּוֹ
  chosen: his sword
  alternatives:
  - its sword
  - a sword for him
  lexicon: HALOT
  rationale: 'The suffix is third masculine singular, most naturally ''his sword.''
    The referent is debated: it may refer to the maker''s sword or, less likely, to
    the creature''s own weapon-like power. The literal rendering preserves the ambiguity
    as much as English allows.'
