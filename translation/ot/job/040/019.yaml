theological_decisions:
- issue: Interpretation of the difficult final colon
  chosen_reading: let the one who made him bring near his sword
  alternative_readings:
  - only his Maker can approach him with the sword
  - his Maker furnished him with his sword
  rationale: The Hebrew is syntactically compressed and has been interpreted in several
    ways. A relatively literal rendering best preserves the ambiguity without importing
    a stronger interpretive claim than the text warrants. This follows the translation
    philosophy of preserving tension where the source is genuinely ambiguous.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
