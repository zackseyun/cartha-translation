id: JOB.40.18
reference: Job 40:18
source:
  edition: WLC
  text: עֲ֭צָמָי/ו אֲפִיקֵ֣י נְחוּשָׁ֑ה גְּ֝רָמָ֗י/ו כִּ/מְטִ֥יל בַּרְזֶֽל׃
translation:
  text: His bones are tubes of bronze; his limbs are like bars of iron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'channels of bronze' for אֲפִיקֵי נְחוּשָׁה; the Hebrew image may emphasize
      conduits/shafts rather than specifically 'tubes.'
    reason: lexical_alternative
  - marker: b
    text: Or 'his bones are like castings/bars of iron' for גְּרָמָיו כִּמְטִיל בַּרְזֶל;
      גְּרָמָיו may also be rendered 'his bones,' preserving the tighter parallel
      with the first line.
    reason: lexical_alternative
lexical_decisions:
- source_word: עֲצָמָיו
  chosen: his bones
  alternatives:
  - his frame
  lexicon: HALOT
  rationale: The noun עֶצֶם commonly means 'bone(s).' 'His bones' is the plain anatomical
    sense and fits the parallelism with גְּרָמָיו.
- source_word: אֲפִיקֵי
  chosen: tubes of
  alternatives:
  - channels of
  - pipes of
  - bars of
  lexicon: HALOT
  rationale: אֲפִיקִים can denote channels, conduits, or strong structural forms.
    In this anatomical simile modifying 'bones,' 'tubes of' best captures the image
    of large, solid cylindrical strength without flattening it to a generic 'strong
    as.'
- source_word: נְחוּשָׁה
  chosen: bronze
  alternatives:
  - copper
  lexicon: HALOT
  rationale: נְחוּשָׁה often refers to bronze/copper. In biblical poetic comparisons
    of strength, 'bronze' is the more idiomatic and likely alloy sense in English.
- source_word: גְּרָמָיו
  chosen: his limbs
  alternatives:
  - his bones
  - his frame
  lexicon: HALOT
  rationale: Though גֶּרֶם can refer to bone, rendering it again as 'bones' would
    obscure the poetic variation. 'His limbs' preserves the bodily-strength imagery
    while distinguishing the second colon from the first.
- source_word: כִּמְטִיל
  chosen: like bars of
  alternatives:
  - like rods of
  - like castings of
  lexicon: HALOT
  rationale: The comparison is to something cast or formed from metal; in context
    of bodily strength, 'bars of' communicates rigid, weighty solidity in natural
    English better than the more technical 'castings of.'
- source_word: בַּרְזֶל
  chosen: iron
  lexicon: HALOT
  rationale: Standard rendering of בַּרְזֶל; the metal imagery pairs naturally with
    'bronze' in the previous colon.
