id: JOB.40.17
reference: Job 40:17
source:
  edition: WLC
  text: יַחְפֹּ֣ץ זְנָב֣/וֹ כְמוֹ אָ֑רֶז גִּידֵ֖י פחד/ו יְשֹׂרָֽגוּ־׃
translation:
  text: He makes his tail stiff like a cedar; the sinews of his thighs are knit together.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the sinews of his loins' or, more specifically, 'the muscles/sinews
      of his genitals'; the Hebrew term is uncertain and debated.
    reason: lexical_alternative
lexical_decisions:
- source_word: יַחְפֹּץ
  chosen: makes ... stiff
  alternatives:
  - bends
  - moves with pleasure
  - extends
  lexicon: HALOT
  rationale: The verb חפץ commonly means 'delight in' in many contexts, but here with
    'tail' and comparison to a cedar it is used in a physical sense. Traditional renderings
    vary ('moveth,' 'stiffens'). 'Makes ... stiff' best fits the imagery of a large,
    firm tail likened to a cedar and avoids the misleading sense of emotional delight.
- source_word: זְנָבוֹ
  chosen: his tail
  lexicon: HALOT
  rationale: Straightforward noun with 3ms suffix; rendered literally.
- source_word: כְמוֹ אָרֶז
  chosen: like a cedar
  alternatives:
  - like the cedar
  lexicon: HALOT
  rationale: The comparison is direct and indefinite in English style. 'Cedar' preserves
    the image of strength and size.
- source_word: גִּידֵי
  chosen: the sinews of
  alternatives:
  - the tendons of
  - the cords of
  lexicon: HALOT
  rationale: גיד refers to sinew/tendon. 'Sinews' is idiomatic and suitably vivid
    in elevated poetic description.
- source_word: פַחֲדוֹ
  chosen: his thighs
  alternatives:
  - his loins
  - his testicles
  lexicon: HALOT
  rationale: The noun is difficult and has been variously understood. In context of
    bodily description, many modern translations take it as the upper legs/thigh region.
    'Thighs' is the clearest non-vulgar rendering in English and fits the parallel
    with 'sinews.' The more anatomical alternative is preserved in a footnote because
    the Hebrew term is debated.
- source_word: יְשֹׂרָגוּ
  chosen: are knit together
  alternatives:
  - are intertwined
  - are twisted together
  - are interwoven
  lexicon: HALOT
  rationale: The verb conveys intertwining or interweaving. 'Are knit together' is
    natural English for tightly bound sinews and preserves the poetic force.
