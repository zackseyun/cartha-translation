id: JOB.40.31
reference: Job 40:31
source:
  edition: WLC
  text: הַֽ/תְמַלֵּ֣א בְ/שֻׂכּ֣וֹת עוֹר֑/וֹ וּ/בְ/צִלְצַ֖ל דָּגִ֣ים רֹאשֽׁ/וֹ׃
translation:
  text: Can you fill his hide with harpoons, or his head with fishing spears?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with barbed irons' for 'with harpoons'; the Hebrew term is rare and
      may refer more generally to sharp or barbed hunting implements.
    reason: lexical_alternative
  - marker: b
    text: Or 'with fishing hooks'; the Hebrew expression may denote a fish-catching
      implement more generally, though 'fishing spears' best fits the parallel image
      here.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲתְמַלֵּא
  chosen: Can you fill
  alternatives:
  - Will you fill
  - Can you stuff
  lexicon: HALOT
  rationale: Interrogative + Piel imperfect 2ms of מלא introduces a rhetorical question.
    'Can you fill' captures both the interrogative force and the implied challenge
    better than a simple future.
- source_word: בְשֻׂכּוֹת
  chosen: with harpoons
  alternatives:
  - with barbed irons
  - with hooks
  lexicon: HALOT
  rationale: The noun is rare and refers to pointed/barbed implements used in hunting
    or fishing. In context with Leviathan and the parallel fishing term in the next
    colon, 'harpoons' best conveys the sense of multiple piercing weapons rather than
    generic 'hooks'.
- source_word: עוֹרוֹ
  chosen: his hide
  alternatives:
  - his skin
  lexicon: HALOT
  rationale: '''Hide'' is a natural English rendering for the skin of a large animal
    and fits the vivid, concrete imagery better than the more clinical ''skin''.'
- source_word: וּבְצִלְצַל דָּגִים
  chosen: with fishing spears
  alternatives:
  - with fish-spears
  - with fishing hooks
  - with fish-gigs
  lexicon: HALOT
  rationale: The construct phrase literally denotes an implement associated with fish.
    'Fishing spears' fits the parallel with 'harpoons' and the image of striking Leviathan's
    head. 'Hooks' is possible but weaker in this context of forceful assault.
- source_word: רֹאשׁוֹ
  chosen: his head
  lexicon: HALOT
  rationale: Straightforward anatomical term; retained literally to preserve the parallelism
    with 'his hide'.
