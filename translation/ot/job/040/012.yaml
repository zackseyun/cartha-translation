id: JOB.40.12
reference: Job 40:12
source:
  edition: WLC
  text: רְאֵ֣ה כָל גֵּ֭אֶה הַכְנִיעֵ֑/הוּ וַ/הֲדֹ֖ךְ רְשָׁעִ֣ים תַּחְתָּֽ/ם־׃
translation:
  text: Look on everyone who is proud, and humble him; and crush the wicked where
    they stand.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "in their place."
    reason: lexical_alternative
lexical_decisions:
- source_word: רְאֵה
  chosen: Look on
  alternatives:
  - Look at
  - See
  lexicon: HALOT
  rationale: Imperative of ראה addressed to Job. 'Look on' preserves the force of
    directing attention toward the proud as objects of judgment, slightly more elevated
    and contextually fitting than simple 'see.'
- source_word: כָל גֵּאֶה
  chosen: everyone who is proud
  alternatives:
  - every proud one
  - all who are exalted
  lexicon: HALOT
  rationale: כָל with the adjective used substantivally denotes the whole class of
    proud persons. 'Everyone who is proud' is natural modern English while preserving
    the distributive sense.
- source_word: הַכְנִיעֵהוּ
  chosen: humble him
  alternatives:
  - bring him low
  - subdue him
  lexicon: HALOT
  rationale: Hiphil imperative of כנע with 3ms suffix means to cause the proud person
    to be brought low. 'Humble him' matches the pride/humiliation contrast and is
    idiomatic in English.
- source_word: וַהֲדֹךְ
  chosen: and crush
  alternatives:
  - and tread down
  - and beat down
  lexicon: HALOT
  rationale: Imperative from הדך/דכך in a judgment context conveys forceful overthrow.
    'Crush' best captures the violent, decisive sense without over-paraphrase.
- source_word: רְשָׁעִים
  chosen: the wicked
  alternatives:
  - wicked people
  - evildoers
  lexicon: HALOT
  rationale: Standard rendering for רשעים as a moral category. The definite sense
    in English is supplied naturally for the class designation.
- source_word: תַּחְתָּם
  chosen: where they stand
  alternatives:
  - in their place
  - under them
  lexicon: HALOT
  rationale: The preposition תחת with pronominal suffix here idiomatically means 'in
    their place' or 'where they are.' 'Where they stand' makes the sense clear in
    contemporary English and fits the scene of immediate judgment.
