theological_decisions:
- issue: Nature of the command to Job
  chosen_reading: Render as a divine challenge describing acts of judgment without
    implying Job actually possesses God's authority.
  alternative_readings:
  - A purely hypothetical command emphasizing Job's inability
  - A literal grant of authority to execute judgment
  rationale: In context, God is challenging Job by naming actions proper to divine
    rule. The translation should preserve the imperative force while not importing
    a doctrinal claim that Job is truly commissioned to perform divine judgment.
  doctrine_reference: Preserve theological tension rather than resolve it.
