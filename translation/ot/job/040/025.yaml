id: JOB.40.25
reference: Job 40:25
source:
  edition: WLC
  text: תִּמְשֹׁ֣ךְ לִוְיָתָ֣ן בְּ/חַכָּ֑ה וּ֝/בְ/חֶ֗בֶל תַּשְׁקִ֥יעַ לְשֹׁנֽ/וֹ׃
translation:
  text: Can you draw out Leviathan with a fishhook, or press down his tongue with
    a rope?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'pull in Leviathan with a hook.'
    reason: lexical_alternative
  - marker: b
    text: Or 'sink his tongue with a cord' or 'hold down his tongue with a rope.'
      The Hebrew imagery is difficult and may refer to subduing the creature by the
      mouth.
    reason: lexical_alternative
lexical_decisions:
- source_word: תִּמְשֹׁךְ
  chosen: draw out
  alternatives:
  - pull in
  - drag out
  lexicon: HALOT
  rationale: The Qal imperfect 2ms of משׁך in this fishing context naturally means
    drawing or pulling out. 'Draw out' is idiomatic in English and fits the rhetorical
    question about capturing Leviathan.
- source_word: לִוְיָתָן
  chosen: Leviathan
  alternatives:
  - the Leviathan
  lexicon: HALOT
  rationale: This is a proper name/designation and should be transliterated per project
    philosophy for names. No article is present, and English convention uses 'Leviathan'
    without 'the' here.
- source_word: בְּחַכָּה
  chosen: with a fishhook
  alternatives:
  - with a hook
  lexicon: HALOT
  rationale: חכה denotes a hook used for fishing. 'Fishhook' makes the image explicit
    in natural English and matches the context of catching a sea creature.
- source_word: וּבְחֶבֶל
  chosen: with a rope
  alternatives:
  - with a cord
  - with a line
  lexicon: HALOT
  rationale: חבל commonly means rope or cord. 'Rope' is the clearest modern English
    choice; 'line' could suggest fishing line specifically, but the Hebrew term is
    broader and heavier.
- source_word: תַּשְׁקִיעַ
  chosen: press down
  alternatives:
  - sink
  - lower
  - hold down
  lexicon: HALOT
  rationale: The Hiphil of שׁקע literally involves causing to sink or go down. In
    context with 'his tongue' and a rope, the sense is forcing it down or pressing
    it down, likely by passing a rope through or over the mouth. 'Press down' preserves
    the concrete imagery without over-interpreting the exact technique.
- source_word: לְשֹׁנוֹ
  chosen: his tongue
  alternatives:
  - his mouth
  lexicon: HALOT
  rationale: The Hebrew explicitly says 'his tongue,' not merely 'mouth.' The more
    literal rendering should be preserved unless English becomes unintelligible, which
    it does not here.
