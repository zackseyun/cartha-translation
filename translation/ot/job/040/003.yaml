theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse directly names Israel's covenant God. Following the project's
    doctrinal and translation policy, the tetragrammaton is rendered 'the LORD' rather
    than transliterated in the main text, while preserving transliteration alternatives
    in a footnote for auditability.
