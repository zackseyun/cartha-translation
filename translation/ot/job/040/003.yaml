id: JOB.40.3
reference: Job 40:3
source:
  edition: WLC
  text: וַ/יַּ֖עַן אִיּ֥וֹב אֶת יְהוָ֗ה וַ/יֹּאמַֽר־׃
translation:
  text: 'Then Job answered the LORD and said:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''YHWH''; alternatively, ''Yahweh'' or ''Jehovah.'''
    reason: alternative_reading
lexical_decisions:
- source_word: וַיַּעַן
  chosen: answered
  alternatives:
  - responded
  lexicon: HALOT
  rationale: From ענה in the Qal wayyiqtol, introducing Job's reply. 'Answered' is
    the standard and suitably formal narrative rendering; 'responded' is possible
    but less idiomatic here.
- source_word: אִיּוֹב
  chosen: Job
  rationale: Proper name transliterated by standard English convention, in keeping
    with the philosophy of transliterating names.
- source_word: אֶת
  chosen: '[not separately translated]'
  rationale: Direct-object marker with no independent English equivalent; its function
    is represented by English word order.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per DOCTRINE.md contested terms table, YHWH is rendered 'the LORD' in
    the main text, following Jewish reverence tradition and the longstanding English
    convention reflecting the LXX pattern. Alternatives are preserved in a footnote.
- source_word: וַיֹּאמַר
  chosen: and said
  alternatives:
  - saying
  lexicon: HALOT
  rationale: From אמר in the Qal wayyiqtol. In Hebrew narrative, 'answered ... and
    said' is a conventional speech-introduction formula. Retaining both verbs preserves
    the source structure better than collapsing them into a single English verb.
