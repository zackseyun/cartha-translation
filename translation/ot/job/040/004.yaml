theological_decisions:
- issue: Whether Job's self-description should be rendered with a morally charged
    term
  chosen_reading: I am insignificant
  alternative_readings:
  - I am vile
  - I am of little account
  rationale: The Hebrew term more naturally conveys smallness, slightness, or being
    of little account in this context of humbled response before God. Rendering it
    as 'vile' risks importing a stronger confession of moral corruption than the verse
    itself explicitly states. The translation preserves Job's humility without overstating
    the theological claim.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
