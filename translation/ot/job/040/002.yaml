theological_decisions:
- issue: Whether the verse depicts a human correcting God or God correcting a human
  chosen_reading: The rhetorical question addresses the human disputant as presuming
    to correct the Almighty.
  alternative_readings:
  - The one contending with the Almighty should accept correction
  rationale: 'The syntax and parallelism favor reading יִסּוֹר with the human disputant
    as subject: ''Will one who contends with the Almighty correct him?'' The second
    colon then reinforces this by calling the one arguing with God to answer. This
    preserves the force of God''s rebuke to Job without softening it.'
  doctrine_reference: Translation philosophy §1, §3
