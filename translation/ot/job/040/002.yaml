id: JOB.40.2
reference: Job 40:2
source:
  edition: WLC
  text: הֲ֭/רֹב עִם שַׁדַּ֣י יִסּ֑וֹר מוֹכִ֖יחַ אֱל֣וֹהַּ יַעֲנֶֽ/נָּה־׃פ
translation:
  text: Will one who contends with the Almighty correct him? Let the one who argues
    with God answer it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Will the faultfinder with the Almighty instruct/reprove him?' The Hebrew
      combines legal-disputational and corrective language.
    reason: lexical_alternative
  - marker: b
    text: Or 'let him answer this' or 'let him answer him.' The Hebrew suffix may
      point to the matter raised rather than directly to God.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲרֹב
  chosen: Will one who contends
  alternatives:
  - Will the contender
  - Shall one who strives
  - Will the faultfinder
  lexicon: HALOT
  rationale: Taken from the root ריב, 'to contend/dispute.' In context it functions
    rhetorically of a person entering a case against God. Rendering as a verbal idea
    ('one who contends') is more natural in English than a bare nominal while preserving
    the forensic/disputational sense.
- source_word: עִם
  chosen: with
  alternatives:
  - against
  lexicon: HALOT
  rationale: The preposition literally means 'with,' but in a dispute context it can
    imply opposition. The English clause 'contends with the Almighty' preserves the
    Hebrew wording while allowing the adversarial nuance to be heard.
- source_word: שַׁדַּי
  chosen: the Almighty
  alternatives:
  - Shaddai
  lexicon: HALOT
  rationale: Standard translation of the divine title שדי in Job. Per translation
    philosophy, titles are translated rather than transliterated where meaning is
    reasonably established.
- source_word: יִסּוֹר
  chosen: correct him
  alternatives:
  - instruct him
  - reprove him
  - discipline him
  lexicon: HALOT
  rationale: From יסר, which can mean discipline, chasten, instruct, or correct. In
    parallel with 'the one who argues with God,' the sense is not God disciplining
    someone, but a human presuming to correct/reprove the Almighty. 'Correct him'
    best fits the rhetorical force and the participle מוֹכִיחַ.
- source_word: מוֹכִיחַ
  chosen: one who argues
  alternatives:
  - one who reproves
  - one who reasons
  - one who proves his case
  lexicon: HALOT
  rationale: From יכח, often used for arguing, reproving, or litigating a case. Because
    the verse pairs disputation with answering God, 'one who argues' captures the
    legal-disputational setting in accessible English. The more specific nuance 'reproves'
    is preserved in a footnote.
- source_word: אֱלוֹהַּ
  chosen: God
  alternatives:
  - God Most High
  - God himself
  lexicon: HALOT
  rationale: The common singular poetic form for God in Job is best rendered simply
    'God.' No added emphasis is warranted by the Hebrew alone.
- source_word: יַעֲנֶנָּה
  chosen: answer it
  alternatives:
  - answer him
  - answer this
  lexicon: HALOT
  rationale: From ענה, 'answer.' The suffix is feminine singular, most naturally referring
    to the matter/charge/argument just raised rather than directly to God. 'Answer
    it' preserves that likely object while remaining idiomatic in English. Because
    the referent is somewhat compressed in Hebrew, alternatives are worth preserving
    in a footnote.
