id: JOB.40.29
reference: Job 40:29
source:
  edition: WLC
  text: הַֽ/תְשַׂחֶק בּ֭/וֹ כַּ/צִּפּ֑וֹר וְ֝/תִקְשְׁרֶ֗/נּוּ לְ/נַעֲרוֹתֶֽי/ךָ־׃
translation:
  text: Will you play with him like a bird, or tie him up for your girls?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with it' instead of 'with him'; the Hebrew uses a masculine singular
      pronoun referring to Leviathan.
    reason: lexical_alternative
  - marker: b
    text: Or 'for your maidens' or 'for your young women.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲתְשַׂחֶק
  chosen: Will you play
  alternatives:
  - Will you toy
  - Will you sport yourself
  lexicon: HALOT
  rationale: The verb שׂחק in the Qal can denote playing, sporting, or making sport.
    In this rhetorical question, 'play' is the most natural modern English rendering
    and fits the comparison to a bird kept as a pet or toy.
- source_word: בּוֹ
  chosen: with him
  alternatives:
  - with it
  lexicon: HALOT
  rationale: The pronominal suffix is masculine singular, referring back to Leviathan.
    English can render the animal as 'it,' but 'him' preserves the masculine singular
    reference used in the Hebrew discourse.
- source_word: כַּצִּפּוֹר
  chosen: like a bird
  alternatives:
  - as with a bird
  lexicon: HALOT
  rationale: צִפּוֹר is the common word for a small bird. 'Like a bird' is idiomatic
    and preserves the simile of treating Leviathan as a tame pet.
- source_word: וְתִקְשְׁרֶנּוּ
  chosen: or tie him up
  alternatives:
  - or bind him
  - or fasten him
  lexicon: HALOT
  rationale: קשר means to tie or bind. 'Tie him up' is clear, vivid modern English
    and suits the image of restraining an animal for domestic use.
- source_word: לְנַעֲרוֹתֶיךָ
  chosen: for your girls
  alternatives:
  - for your maidens
  - for your young women
  lexicon: HALOT
  rationale: נַעֲרוֹת is the feminine plural of 'young girl/maiden.' 'Girls' is the
    most natural contemporary equivalent and preserves the feminine reference. 'Maidens'
    is more traditional but archaic; 'young women' is possible but sounds too mature
    for the domestic image.
