id: JOB.40.5
reference: Job 40:5
source:
  edition: WLC
  text: אַחַ֣ת דִּ֭בַּרְתִּי וְ/לֹ֣א אֶֽעֱנֶ֑ה וּ֝/שְׁתַּ֗יִם וְ/לֹ֣א אוֹסִֽיף׃פ
translation:
  text: I have spoken once, and I will not answer; twice, and I will add nothing more.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'I spoke once, but I will not answer; twice, but I will proceed no further.'
      The Hebrew idiom 'add' can mean to continue or repeat an action.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַחַת
  chosen: once
  alternatives:
  - one thing
  - once
  lexicon: HALOT
  rationale: The feminine numeral 'one' is used adverbially here with the verb 'I
    have spoken,' yielding the idiomatic sense 'once' rather than a wooden 'one thing.'
    This best reflects the Hebrew in natural English.
- source_word: דִּבַּרְתִּי
  chosen: I have spoken
  alternatives:
  - I spoke
  lexicon: HALOT
  rationale: The perfect first-person singular refers to Job's prior speech. 'I have
    spoken' captures the completed action with present relevance in context, as Job
    responds to the LORD.
- source_word: וְלֹא אֶעֱנֶה
  chosen: and I will not answer
  alternatives:
  - but I will not answer
  - and I will answer no more
  lexicon: HALOT
  rationale: ענה in the Qal commonly means 'answer, reply.' The conjunction is rendered
    simply as 'and,' preserving the Hebrew coordination without over-interpreting
    contrast. Future English expresses Job's resolve not to continue replying.
- source_word: וּשְׁתַּיִם
  chosen: twice
  alternatives:
  - two times
  - a second time
  lexicon: HALOT
  rationale: The numeral 'two' is likewise adverbial and idiomatically means 'twice'
    in parallel with 'once.'
- source_word: וְלֹא אוֹסִיף
  chosen: and I will add nothing more
  alternatives:
  - and I will proceed no further
  - and I will not continue
  - and I will not add
  lexicon: HALOT
  rationale: יסף in the Hiphil means 'add, continue, do again.' In this context Job
    means he will not continue speaking. 'Add nothing more' preserves the Hebrew metaphor
    of adding words while remaining clear in English.
