id: JOB.40.21
reference: Job 40:21
source:
  edition: WLC
  text: תַּֽחַת צֶאֱלִ֥ים יִשְׁכָּ֑ב בְּ/סֵ֖תֶר קָנֶ֣ה וּ/בִצָּֽה־׃
translation:
  text: Under the lotus trees he lies down, in the shelter of the reeds and the marsh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'under the shady trees.' The exact species denoted by the Hebrew term
      is uncertain; 'lotus trees' reflects a common contextual identification.
    reason: lexical_alternative
lexical_decisions:
- source_word: תַּחַת
  chosen: Under
  alternatives:
  - Beneath
  lexicon: HALOT
  rationale: Spatial preposition indicating location beneath or under something. 'Under'
    is the most natural modern English rendering here.
- source_word: צֶאֱלִים
  chosen: the lotus trees
  alternatives:
  - the shady trees
  - the lotuses
  lexicon: HALOT
  rationale: The noun is traditionally understood as a kind of shade-giving tree or
    lotus tree in this context. In Job 40:21-22, the setting is riverine vegetation
    associated with behemoth, so 'lotus trees' best fits the probable referent and
    common contextual understanding. Because the exact species is uncertain, an alternative
    is preserved in a footnote.
- source_word: יִשְׁכָּב
  chosen: he lies down
  alternatives:
  - he lies
  lexicon: HALOT
  rationale: Qal imperfect 3ms of שׁכב, describing customary or vivid present action
    in context. 'He lies down' conveys the animal's reclining posture more clearly
    than the flatter 'he lies.'
- source_word: בְּסֵתֶר
  chosen: in the shelter
  alternatives:
  - in the hiding place
  - in the cover
  lexicon: HALOT
  rationale: סֵתֶר denotes concealment, cover, or shelter. 'In the shelter' is idiomatic
    and fits the image of protective vegetation.
- source_word: קָנֶה
  chosen: the reeds
  alternatives:
  - the reed
  lexicon: HALOT
  rationale: Though formally singular, Hebrew often uses singular collectives. In
    English, 'the reeds' better represents the vegetation mass in this habitat and
    reads naturally with the following marsh imagery.
- source_word: וּבִצָּה
  chosen: and the marsh
  alternatives:
  - and the swamp
  - and the mire
  lexicon: HALOT
  rationale: בִּצָּה refers to marshy or swampy ground. 'Marsh' is vivid, natural
    English and suits the riverbank setting without over-specifying mud depth.
