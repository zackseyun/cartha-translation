id: JOB.40.26
reference: Job 40:26
source:
  edition: WLC
  text: הֲ/תָשִׂ֣ים אַגְמ֣וֹן בְּ/אַפּ֑/וֹ וּ֝/בְ/ח֗וֹחַ תִּקּ֥וֹב לֶֽחֱי/וֹ׃
translation:
  text: Can you put a rope through his nose, or pierce his jaw with a hook?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a reed in his nose'; the Hebrew אַגְמוֹן literally refers to a reed
      or rush, but here likely means a cord made from rushes.
    reason: lexical_alternative
  - marker: b
    text: Or 'his cheek' for 'his jaw.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲתָשִׂים
  chosen: Can you put
  alternatives:
  - Will you put
  - Can you place
  lexicon: HALOT
  rationale: The interrogative הֲ with שׂים introduces a rhetorical question. 'Can
    you put' captures both the future/imperfect force and the challenge addressed
    to Job in natural English.
- source_word: אַגְמוֹן
  chosen: a rope
  alternatives:
  - a reed
  - a rush-cord
  lexicon: HALOT
  rationale: אַגְמוֹן literally denotes a reed/rush, but in this context of controlling
    Leviathan by the nose it most plausibly refers to a cord or rope made from rushes.
    'Rope' communicates the functional sense in idiomatic English better than the
    overly literal 'reed.'
- source_word: בְּאַפּוֹ
  chosen: through his nose
  alternatives:
  - in his nose
  - through his nostril
  lexicon: HALOT
  rationale: אַף commonly means 'nose/nostril.' With the preceding instrument/object
    phrase, English idiom prefers 'through his nose' for the image of threading a
    controlling rope.
- source_word: וּבְחוֹחַ
  chosen: with a hook
  alternatives:
  - with a thorn
  - with a ring
  lexicon: HALOT
  rationale: חוֹחַ can denote a thorn or hook. In parallel with subduing an animal
    by the nose/jaw, 'hook' best fits the concrete image of capture and restraint.
- source_word: תִּקּוֹב
  chosen: pierce
  alternatives:
  - bore through
  - perforate
  lexicon: HALOT
  rationale: The verb conveys boring or piercing. 'Pierce' is concise, vivid, and
    natural in English.
- source_word: לֶחֱיוֹ
  chosen: his jaw
  alternatives:
  - his cheek
  - his jawbone
  lexicon: HALOT
  rationale: לְחִי can mean jaw or cheek. In the context of inserting a hook for restraint,
    'jaw' is the more precise and forceful rendering.
