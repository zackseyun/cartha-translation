theological_decisions:
- issue: Identification of בְהֵמוֹת
  chosen_reading: Treat as a named/designated creature and transliterate as 'Behemoth'
    rather than identifying it in the main text with a specific animal.
  alternative_readings:
  - Render generically as 'the beast'
  - Interpret specifically as 'hippopotamus' or another known animal
  rationale: The verse presents a remarkable creature in elevated poetic discourse.
    The Hebrew form and literary context support preserving the term without forcing
    a zoological conclusion. This avoids importing interpretive certainty the text
    itself does not explicitly provide.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Preserve theological tension rather than resolve it.'
