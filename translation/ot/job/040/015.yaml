id: JOB.40.15
reference: Job 40:15
source:
  edition: WLC
  text: הִנֵּה נָ֣א בְ֭הֵמוֹת אֲשֶׁר עָשִׂ֣יתִי עִמָּ֑/ךְ חָ֝צִ֗יר כַּ/בָּקָ֥ר יֹאכֵֽל־־׃
translation:
  text: Look now at Behemoth, which I made along with you; he eats grass like an ox.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the beast'; many interpreters understand 'Behemoth' as the name/designation
      of a specific great creature, while others identify it with the hippopotamus
      or another large animal.
    reason: alternative_reading
lexical_decisions:
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: Deictic particle drawing attention. 'Look' is natural modern English
    and preserves the imperative force better than the more archaic 'Behold.'
- source_word: נָא
  chosen: now
  alternatives:
  - please
  lexicon: HALOT
  rationale: Particle adding immediacy or entreaty. In this divine speech, 'now' fits
    the discourse flow better than overly polite 'please.'
- source_word: בְהֵמוֹת
  chosen: Behemoth
  alternatives:
  - the beast
  - beast
  lexicon: HALOT
  rationale: Although related to the common noun for 'beast/cattle,' in Job 40 it
    functions as the designation of a specific creature. Transliteration preserves
    the literary force and avoids prematurely resolving the creature's zoological
    identification.
- source_word: אֲשֶׁר עָשִׂיתִי
  chosen: which I made
  alternatives:
  - that I made
  - which I formed
  lexicon: HALOT
  rationale: Relative clause with עשה in the simple sense 'make.' 'Which I made' is
    straightforward and idiomatic.
- source_word: עִמָּךְ
  chosen: along with you
  alternatives:
  - with you
  - beside you
  lexicon: HALOT
  rationale: The preposition עם here most naturally indicates accompaniment or contemporaneity
    in creation, not necessarily physical proximity. 'Along with you' communicates
    that God made Behemoth as he made the human addressee.
- source_word: חָצִיר
  chosen: grass
  alternatives:
  - herbage
  - green plants
  lexicon: HALOT
  rationale: The noun denotes grass or herbage. 'Grass' is the clearest and most natural
    English equivalent in this simile.
- source_word: כַּבָּקָר
  chosen: like an ox
  alternatives:
  - like cattle
  - like a bull
  lexicon: HALOT
  rationale: The singular collective/comparative sense is well represented by 'ox'
    in English. 'Like cattle' is less vivid, and 'bull' is too specific.
- source_word: יֹאכֵל
  chosen: he eats
  alternatives:
  - it eats
  - he feeds on
  lexicon: HALOT
  rationale: Masculine singular verb referring back to Behemoth. 'He eats' preserves
    the personalizing masculine reference used in the Hebrew description of the creature.
