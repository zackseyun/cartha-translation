id: JOB.40.22
reference: Job 40:22
source:
  edition: WLC
  text: יְסֻכֻּ֣/הוּ צֶאֱלִ֣ים צִֽלֲל֑/וֹ יְ֝סֻבּ֗וּ/הוּ עַרְבֵי נָֽחַל־׃
translation:
  text: The lotus trees cover him with their shade; the willows of the brook surround
    him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'shade trees' for צֶאֱלִים; the precise botanical identification is uncertain,
      though 'lotus trees' is the traditional rendering.
    reason: lexical_alternative
  - marker: b
    text: Or 'the poplars of the wadi' for עַרְבֵי נָחַל.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְסֻכֻּהוּ
  chosen: cover him
  alternatives:
  - shelter him
  - screen him
  lexicon: HALOT
  rationale: From סכך in the Piel/Qal-like passive-active sense of covering or sheltering.
    'Cover him' is the most direct and natural English rendering here, while still
    allowing the image of protective shade.
- source_word: צֶאֱלִים
  chosen: lotus trees
  alternatives:
  - lotus plants
  - shade trees
  lexicon: HALOT
  rationale: In Job this term is traditionally rendered 'lotus trees' and refers to
    a water-side tree or plant associated with marshy habitat. 'Lotus trees' preserves
    the conventional botanical identification without over-paraphrasing.
- source_word: צִללוֹ
  chosen: with their shade
  alternatives:
  - their shadow
  lexicon: HALOT
  rationale: The noun צֵל means shade/shadow. 'With their shade' fits idiomatic English
    after 'cover him' and preserves the cooling, protective sense of the Hebrew.
- source_word: יְסֻבּוּהוּ
  chosen: surround him
  alternatives:
  - encircle him
  lexicon: HALOT
  rationale: From סבב, 'to surround, encircle.' 'Surround him' is straightforward
    and natural in English.
- source_word: עַרְבֵי נָחַל
  chosen: the willows of the brook
  alternatives:
  - poplars of the wadi
  - willows by the stream
  lexicon: HALOT
  rationale: עֲרָבָה/עַרְבֵי commonly denotes willows or poplar-like riverbank trees;
    נחל is a wadi, torrent-bed, or brook. 'Willows of the brook' is a clear, traditional
    rendering that suits the poetic habitat imagery.
