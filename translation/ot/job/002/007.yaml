theological_decisions:
- issue: Rendering הַשָּׂטָן in Job's prologue
  chosen_reading: the Adversary
  alternative_readings:
  - Satan
  - the Satan
  rationale: The Hebrew includes the article, which strongly suggests a title or function
    in this context. Rendering it as 'the Adversary' avoids importing later assumptions
    about the term as a fixed proper name while still identifying the same hostile
    figure. The traditional rendering is preserved in a footnote for transparency.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; preserve theological tension rather than resolve it.'
- issue: Rendering יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering for
    the divine name, following Jewish reverence tradition and the LXX pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
