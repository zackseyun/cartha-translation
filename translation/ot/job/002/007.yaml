id: JOB.2.7
reference: Job 2:7
source:
  edition: WLC
  text: וַ/יֵּצֵא֙ הַ/שָּׂטָ֔ן מֵ/אֵ֖ת פְּנֵ֣י יְהוָ֑ה וַ/יַּ֤ךְ אֶת אִיּוֹב֙ בִּ/שְׁחִ֣ין
    רָ֔ע מִ/כַּ֥ף רַגְל֖/וֹ עד קָדְקֳדֽ/וֹ־׃
translation:
  text: So the Adversary went out from the presence of the LORD and struck Job with
    severe sores from the sole of his foot to the crown of his head.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''the Satan''; traditionally rendered ''Satan.'' The term here
      includes the article and may function as a title, ''the Adversary.'''
    reason: alternative_reading
  - marker: b
    text: Or 'with painful boils' or 'with grievous boils.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַשָּׂטָן
  chosen: the Adversary
  alternatives:
  - the Satan
  - Satan
  lexicon: HALOT
  rationale: In Job's prologue the term functions with the article and reads as a
    title/role rather than yet clearly as a fixed personal name. 'The Adversary' preserves
    the Hebrew sense while remaining readable. The more traditional 'Satan' is preserved
    as an alternative.
- source_word: מֵאֵת פְּנֵי יְהוָה
  chosen: from the presence of the LORD
  alternatives:
  - from before the LORD
  lexicon: HALOT
  rationale: פָּנִים in this construction idiomatically means presence. יְהוָה is
    rendered 'the LORD' per doctrine guidance for the divine name.
- source_word: וַיַּךְ
  chosen: struck
  alternatives:
  - smote
  - afflicted
  lexicon: HALOT
  rationale: נכה commonly means strike/smite. 'Struck' is the most natural modern
    English choice and keeps the directness of the verb without archaic tone.
- source_word: בִּשְׁחִין רָע
  chosen: with severe sores
  alternatives:
  - with painful boils
  - with grievous boils
  lexicon: HALOT
  rationale: שְׁחִין denotes an inflamed skin disease, often rendered 'boils.' Because
    English 'boils' can sound overly specific or clinical, 'sores' better captures
    the broader affliction, while רָע intensifies it as severe/grievous rather than
    morally evil.
- source_word: מִכַּף רַגְלוֹ
  chosen: from the sole of his foot
  alternatives:
  - from the bottom of his foot
  lexicon: HALOT
  rationale: כַּף with foot refers to the sole. This is the idiomatic and precise
    English rendering.
- source_word: עַד קָדְקֳדוֹ
  chosen: to the crown of his head
  alternatives:
  - to his scalp
  - to the top of his head
  lexicon: HALOT
  rationale: קָדְקֹד refers to the crown/top of the head. 'Crown of his head' is a
    standard, clear English equivalent and preserves the full-body extent of the affliction.
