id: JOB.2.12
reference: Job 2:12
source:
  edition: WLC
  text: וַ/יִּשְׂא֨וּ אֶת עֵינֵי/הֶ֤ם מֵ/רָחוֹק֙ וְ/לֹ֣א הִכִּירֻ֔/הוּ וַ/יִּשְׂא֥וּ
    קוֹלָ֖/ם וַ/יִּבְכּ֑וּ וַֽ/יִּקְרְעוּ֙ אִ֣ישׁ מְעִל֔/וֹ וַ/יִּזְרְק֥וּ עָפָ֛ר
    עַל רָאשֵׁי/הֶ֖ם הַ/שָּׁמָֽיְמָ/ה־־׃
translation:
  text: And when they lifted up their eyes from a distance, they did not recognize
    him. Then they raised their voices and wept, and each man tore his robe and threw
    dust over their heads toward the heavens.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from afar.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'toward the heavens,' that is, upward in a gesture of mourning.
    reason: cultural_note
lexical_decisions:
- source_word: וַיִּשְׂאוּ אֶת עֵינֵיהֶם
  chosen: they lifted up their eyes
  alternatives:
  - they looked up
  lexicon: HALOT
  rationale: Retains the Hebrew idiom with natural English wording. 'Lifted up their
    eyes' is a common biblical expression and fits optimal equivalence better than
    flattening to simply 'looked.'
- source_word: מֵרָחוֹק
  chosen: from a distance
  alternatives:
  - from afar
  - at a distance
  lexicon: HALOT
  rationale: Conveys spatial separation in clear modern English. 'From afar' is possible
    but slightly more literary/archaic.
- source_word: הִכִּירֻהוּ
  chosen: they did not recognize him
  alternatives:
  - they did not know him
  lexicon: HALOT
  rationale: The verb here refers to recognizing Job's appearance. 'Recognize' is
    the most contextually precise English choice.
- source_word: וַיִּשְׂאוּ קוֹלָם
  chosen: they raised their voices
  alternatives:
  - they lifted up their voice
  lexicon: HALOT
  rationale: Plural 'voices' matches the plural subject and sounds natural in English
    while preserving the Hebrew idiom of vocal lament.
- source_word: וַיִּבְכּוּ
  chosen: wept
  alternatives:
  - cried
  lexicon: HALOT
  rationale: '''Wept'' better conveys mourning and lament than the broader ''cried.'''
- source_word: וַיִּקְרְעוּ אִישׁ מְעִלוֹ
  chosen: each man tore his robe
  alternatives:
  - each tore his garment
  - each man tore his mantle
  lexicon: HALOT
  rationale: אִישׁ distributively means 'each man.' מְעִיל is a robe or outer garment;
    'robe' is clear and suitably specific without sounding archaic like 'mantle.'
- source_word: וַיִּזְרְקוּ עָפָר עַל רָאשֵׁיהֶם
  chosen: threw dust over their heads
  alternatives:
  - cast dust upon their heads
  - threw dust on their heads
  lexicon: HALOT
  rationale: This preserves the mourning gesture in idiomatic English. 'Over their
    heads' fits the action of tossing dust upward so that it falls on them.
- source_word: הַשָּׁמָיְמָה
  chosen: toward the heavens
  alternatives:
  - toward heaven
  - heavenward
  - into the sky
  lexicon: HALOT
  rationale: The directional ending indicates motion upward. 'Toward the heavens'
    preserves the upward direction and the plural form of שָׁמַיִם more closely than
    'into the sky,' while avoiding over-interpretation.
