id: JOB.2.5
reference: Job 2:5
source:
  edition: WLC
  text: אוּלָם֙ שְֽׁלַֽח נָ֣א יָֽדְ/ךָ֔ וְ/גַ֥ע אֶל עַצְמ֖/וֹ וְ/אֶל בְּשָׂר֑/וֹ אִם
    לֹ֥א אֶל פָּנֶ֖י/ךָ יְבָרֲכֶֽ/ךָּ־־־־־׃
translation:
  text: But stretch out your hand, please, and touch his bone and his flesh, and he
    will surely curse you to your face.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally 'bless you'; here the verb is understood as a euphemistic
      expression meaning 'curse you.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אוּלָם
  chosen: But
  alternatives:
  - However
  - Yet
  lexicon: HALOT
  rationale: Adversative particle introducing Satan's counterproposal; 'But' is natural
    and sufficiently strong in English.
- source_word: שְׁלַח נָא
  chosen: stretch out ... please
  alternatives:
  - send ... please
  - reach out ... please
  lexicon: HALOT
  rationale: The idiom 'send your hand' in context means to extend or stretch out
    the hand in action against someone. Retaining 'please' reflects נָא as a particle
    of entreaty, even in Satan's speech.
- source_word: יָדְךָ
  chosen: your hand
  lexicon: HALOT
  rationale: Literal body-part term, also part of the idiom for direct action or striking.
- source_word: וְגַע
  chosen: and touch
  alternatives:
  - and strike
  - and afflict
  lexicon: HALOT
  rationale: The verb נגע literally means 'touch,' but in contexts of harmful contact
    can imply striking or afflicting. Here 'touch' preserves the Hebrew wording while
    allowing the harmful sense to be inferred from the objects 'bone and flesh' and
    the context of testing.
- source_word: אֶל עַצְמוֹ וְאֶל בְּשָׂרוֹ
  chosen: his bone and his flesh
  alternatives:
  - his bones and his flesh
  - his body
  lexicon: HALOT
  rationale: The Hebrew uses singular 'bone' and 'flesh' collectively. 'Bone and flesh'
    preserves the concrete bodily expression better than the flattened 'body.'
- source_word: אִם לֹא
  chosen: he will surely
  alternatives:
  - surely
  - if not
  lexicon: HALOT
  rationale: In oath-like or emphatic contexts, אִם לֹא functions idiomatically as
    a strong assertion rather than a conditional. Here it introduces Satan's confident
    claim about Job's response.
- source_word: אֶל פָּנֶיךָ
  chosen: to your face
  alternatives:
  - in your presence
  - before you
  lexicon: HALOT
  rationale: Idiomatic expression meaning direct, open confrontation. 'To your face'
    is the most natural English equivalent.
- source_word: יְבָרֲכֶךָּ
  chosen: curse you
  alternatives:
  - bless you
  lexicon: HALOT
  rationale: Though the verb ברך normally means 'bless,' in Job 1:11; 2:5 it is widely
    understood as a euphemistic substitute for 'curse,' likely out of reverence. The
    plain sense in context is hostile renunciation of God, so the main text should
    reflect that meaning while preserving the literal form in a footnote.
