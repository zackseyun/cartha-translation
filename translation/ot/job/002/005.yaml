theological_decisions:
- issue: Euphemistic use of ברך in Job's testing scenes
  chosen_reading: Render as 'curse' in the main text
  alternative_readings:
  - Render literally as 'bless' with contextual explanation
  rationale: The immediate context is Satan's challenge that Job will renounce God
    under suffering. Translating 'bless' in the main text would obscure the sense
    and mislead modern readers. Because the Hebrew form is literally 'bless,' that
    alternative is preserved in a footnote for auditability and transparency.
  doctrine_reference: Translation philosophy §§1, 3, 5
