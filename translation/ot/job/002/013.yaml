id: JOB.2.13
reference: Job 2:13
source:
  edition: WLC
  text: וַ/יֵּשְׁב֤וּ אִתּ/וֹ֙ לָ/אָ֔רֶץ שִׁבְעַ֥ת יָמִ֖ים וְ/שִׁבְעַ֣ת לֵיל֑וֹת וְ/אֵין
    דֹּבֵ֤ר אֵלָי/ו֙ דָּבָ֔ר כִּ֣י רָא֔וּ כִּֽי גָדַ֥ל הַ/כְּאֵ֖ב מְאֹֽד־־׃
translation:
  text: And they sat with him on the ground seven days and seven nights, and no one
    spoke a word to him, because they saw that his pain was very great.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'that his suffering was very great' or 'that his grief was very great.'
      The Hebrew term can cover pain broadly, including physical suffering and emotional
      anguish.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּשְׁבוּ
  chosen: they sat
  alternatives:
  - they remained seated
  - they stayed
  lexicon: HALOT
  rationale: From ישׁב, the basic sense is 'sit/dwell/remain.' In this mourning context,
    'sat' preserves the concrete action and the solemnity of the scene better than
    a more interpretive 'stayed'.
- source_word: אִתּוֹ
  chosen: with him
  lexicon: HALOT
  rationale: 'Straightforward comitative sense: Job''s companions are physically present
    with him.'
- source_word: לָאָרֶץ
  chosen: on the ground
  alternatives:
  - to the ground
  - on the earth
  lexicon: HALOT
  rationale: Although ארץ can mean 'earth/land,' in this context of mourning posture
    it refers to the ground. 'On the ground' is idiomatic English and fits the scene.
- source_word: שִׁבְעַת יָמִים וְשִׁבְעַת לֵילוֹת
  chosen: seven days and seven nights
  lexicon: HALOT
  rationale: A fixed temporal expression indicating a full period of mourning. The
    literal rendering is natural in English and should be preserved.
- source_word: וְאֵין דֹּבֵר אֵלָיו דָּבָר
  chosen: and no one spoke a word to him
  alternatives:
  - and none was speaking to him a word
  - and no one said anything to him
  lexicon: HALOT
  rationale: The Hebrew construction emphasizes complete silence. 'Spoke a word' preserves
    the idiom's force more closely than the smoother but slightly less formal 'said
    anything.'
- source_word: כִּי רָאוּ
  chosen: because they saw
  alternatives:
  - for they saw
  - since they saw
  lexicon: HALOT
  rationale: כִּי here gives the reason for their silence. 'Because' is clear modern
    English.
- source_word: כִּי גָדַל הַכְּאֵב
  chosen: that his pain was very great
  alternatives:
  - that the pain was very great
  - that his suffering was very great
  - that his grief was very great
  lexicon: HALOT
  rationale: כאב denotes pain, hurt, or suffering. Given Job's physical affliction
    in the immediate context, 'pain' is the most direct choice. Supplying 'his' makes
    the English natural and reflects the contextual referent without altering the
    sense.
- source_word: מְאֹד
  chosen: very
  alternatives:
  - exceedingly
  lexicon: HALOT
  rationale: Standard intensifier. 'Very' is natural modern English; 'exceedingly'
    would sound archaic here.
