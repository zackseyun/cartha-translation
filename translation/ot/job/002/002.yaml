id: JOB.2.2
reference: Job 2:2
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר יְהוָה֙ אֶל הַ/שָּׂטָ֔ן אֵ֥י מִ/זֶּ֖ה תָּבֹ֑א וַ/יַּ֨עַן הַ/שָּׂטָ֤ן
    אֶת יְהוָה֙ וַ/יֹּאמַ֔ר מִ/שֻּׁ֣ט בָּ/אָ֔רֶץ וּ/מֵ/הִתְהַלֵּ֖ךְ בָּֽ/הּ־־׃
translation:
  text: And the LORD said to the Accuser, “From where have you come?” And the Accuser
    answered the LORD and said, “From roaming about on the earth and from walking
    around on it.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''the satan''; here likely a title meaning ''the accuser'' or ''the
      adversary,'' not necessarily a proper name.'
    reason: alternative_reading
lexical_decisions:
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: DOCTRINE.md specifies the default rendering of the divine name YHWH as
    'the LORD.' This also matches established English convention while preserving
    reverential force.
- source_word: הַשָּׂטָן
  chosen: the Accuser
  alternatives:
  - the Satan
  - the adversary
  lexicon: HALOT
  rationale: In Job 1–2 the Hebrew includes the article, indicating a title/role rather
    than a personal name. 'The Accuser' communicates the functional sense in clear
    English better than the more opaque 'the Satan,' while preserving the courtroom/adversarial
    nuance.
- source_word: אֵי מִזֶּה תָּבֹא
  chosen: From where have you come?
  alternatives:
  - Where have you come from?
  - From where do you come?
  lexicon: HALOT
  rationale: This idiom asks the source or point of origin. 'From where have you come?'
    is natural modern English and preserves the directional force of מִן.
- source_word: וַיַּעַן ... וַיֹּאמַר
  chosen: answered ... and said
  alternatives:
  - replied ... and said
  - answered
  lexicon: HALOT
  rationale: The Hebrew uses both verbs in sequence. Retaining both reflects the narrative
    style without sounding overly wooden.
- source_word: מִשֻּׁט
  chosen: from roaming about
  alternatives:
  - from going to and fro
  - from roving
  lexicon: HALOT
  rationale: The infinitive construct from שׁוּט conveys movement about or to and
    fro. 'Roaming about' is readable modern English and captures restless movement
    without archaic phrasing.
- source_word: בָּאָרֶץ
  chosen: on the earth
  alternatives:
  - in the earth
  - on the land
  lexicon: HALOT
  rationale: In this context אֶרֶץ most naturally refers to the inhabited world/earth
    rather than a specific land. 'On the earth' fits the movement imagery.
- source_word: וּמֵהִתְהַלֵּךְ בָּהּ
  chosen: and from walking around on it
  alternatives:
  - and from going back and forth in it
  - and from patrolling it
  lexicon: HALOT
  rationale: The hitpael of הלך here suggests moving about repeatedly. 'Walking around
    on it' preserves the iterative sense in accessible English. 'Patrolling' is possible
    but imports a more specific nuance than the verb itself requires.
