theological_decisions:
- issue: Whether הַשָּׂטָן should be rendered as a proper name ('Satan') or a title/role
  chosen_reading: Rendered as 'the Accuser'
  alternative_readings:
  - the Satan
  - Satan
  - the adversary
  rationale: Because the Hebrew has the definite article and functions as a role designation
    in the heavenly court scene, the translation preserves the titular sense rather
    than treating it as an undeveloped proper name. This avoids importing later assumptions
    beyond what the Hebrew explicitly marks, while remaining compatible with historic
    Christian interpretation.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; preserve theological tension rather than resolve it.'
