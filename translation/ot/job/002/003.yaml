id: JOB.2.3
reference: Job 2:3
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר יְהוָ֜ה אֶל הַ/שָּׂטָ֗ן הֲ/שַׂ֣מְתָּ לִבְּ/ךָ֮ אֶל עַבְדִּ֣/י אִיּוֹב֒ כִּי֩ אֵ֨ין כָּמֹ֜/הוּ בָּ/אָ֗רֶץ אִ֣ישׁ תָּ֧ם וְ/יָשָׁ֛ר יְרֵ֥א אֱלֹהִ֖ים וְ/סָ֣ר מֵ/רָ֑ע וְ/עֹדֶ֨/נּוּ֙ מַחֲזִ֣יק בְּ/תֻמָּת֔/וֹ וַ/תְּסִיתֵ֥/נִי ב֖/וֹ לְ/בַלְּע֥/וֹ חִנָּֽם־־׃
translation:
  text: Then Yahweh said to the Accuser, “Have you set your heart on my servant Job? For there is no one like him on the earth, a blameless and upright man, one who fears God and turns away from evil. He still holds fast his integrity, though you incited me against him to destroy him for nothing.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Have you considered my servant Job?” Literally, “Have you set your heart on my servant Job?”
    reason: lexical_alternative
  - marker: b
    text: Hebrew הַשָּׂטָן, “the Accuser”; traditionally “Satan.”
    reason: alternative_reading
  - marker: c
    text: Or “to destroy him” or “to ruin him”; Hebrew literally “to swallow him up.”
    reason: lexical_alternative
  - marker: d
    text: “For nothing” may also mean “without cause,” and likely echoes Job 1:9, where the Accuser asks whether Job fears God “for nothing.”
    reason: cross_reference
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: 'Per doctrine, the Tetragrammaton יְהוָה is rendered ''Yahweh'' — the transliteration of the divine name — rather than the traditional ''the LORD'' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.'
- source_word: הַשָּׂטָן
  chosen: the Accuser
  alternatives:
  - the Satan
  - the adversary
  lexicon: HALOT
  rationale: With the article, the Hebrew functions as a title/role rather than a personal name. 'The Accuser' communicates the judicial/oppositional sense clearly in modern English better than a bare transliteration.
- source_word: הֲשַׂמְתָּ לִבְּךָ אֶל
  chosen: have you set your heart on
  alternatives:
  - have you set your mind on
  - have you considered
  lexicon: HALOT
  rationale: Literally 'set your heart to/upon.' English idiom 'set your heart on' preserves the Hebrew anthropological language better than the traditional but more interpretive 'considered.'
- source_word: עַבְדִּי
  chosen: my servant
  alternatives:
  - my slave
  lexicon: HALOT
  rationale: Although עבד can denote slave/servant, here the bonded-status nuance is not foregrounded; the relational designation of Job as belonging to and serving God is best conveyed by 'servant.'
- source_word: אֵין כָּמֹהוּ בָּאָרֶץ
  chosen: there is no one like him on the earth
  alternatives:
  - there is none like him in the land
  lexicon: HALOT
  rationale: '''On the earth'' fits the cosmic scope of the scene better than ''in the land,'' though ארץ can bear either sense contextually.'
- source_word: אִישׁ תָּם וְיָשָׁר
  chosen: a blameless and upright man
  alternatives:
  - a complete and upright man
  - an innocent and upright man
  lexicon: HALOT
  rationale: תָּם in Job denotes integrity/wholeness rather than sinless perfection; 'blameless' is the standard natural equivalent. 'Upright' straightforwardly renders יָשָׁר.
- source_word: יְרֵא אֱלֹהִים
  chosen: one who fears God
  alternatives:
  - God-fearing
  lexicon: HALOT
  rationale: Preserves the verbal force and the theological weight of reverent fear rather than reducing it to a mere adjective.
- source_word: וְסָר מֵרָע
  chosen: turns away from evil
  alternatives:
  - shuns evil
  - departs from evil
  lexicon: HALOT
  rationale: A present-like English participial sense fits the characterization. 'Turns away from evil' is transparent and less idiomatic than 'shuns,' preserving the motion away implied by סור.
- source_word: וְעֹדֶנּוּ מַחֲזִיק בְּתֻמָּתוֹ
  chosen: He still holds fast his integrity
  alternatives:
  - he still holds fast to his integrity
  - he still persists in his blamelessness
  lexicon: HALOT
  rationale: תֻמָּה is cognate with תָּם and denotes integrity/wholeness. 'Holds fast' captures the strength of מחזיק. The direct-object-like English phrasing is concise, though the prepositional alternative is also possible.
- source_word: וַתְּסִיתֵנִי בוֹ
  chosen: though you incited me against him
  alternatives:
  - and you incited me against him
  - you urged me against him
  lexicon: HALOT
  rationale: 'The clause is logically concessive in context: despite Satan''s incitement, Job remains steadfast. ''Incited'' reflects the causative nuance of סות.'
- source_word: לְבַלְּעוֹ
  chosen: to swallow him up
  alternatives:
  - to destroy him
  - to ruin him
  lexicon: HALOT
  rationale: בלע literally means 'swallow,' often metaphorically for engulfing/destruction. 'Swallow him up' preserves the vivid metaphor better than flattening it to 'destroy.'
- source_word: חִנָּם
  chosen: for nothing
  alternatives:
  - without cause
  - for no reason
  lexicon: HALOT
  rationale: The adverb can mean gratuitously/without cause. 'For nothing' preserves the verbal echo with the Accuser's earlier claim that Job does not fear God 'for nothing' (1:9), an important literary linkage.
