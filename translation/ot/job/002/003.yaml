theological_decisions:
- issue: Rendering of divine involvement in Job's suffering
  chosen_reading: Retain the direct wording 'you incited me against him' without softening divine agency.
  alternative_readings:
  - you prompted me to allow harm against him
  - you moved me concerning him
  rationale: The Hebrew directly attributes the action to the LORD in response to the Accuser's provocation. To dilute this would import a theological resolution the text itself does not make. The translation preserves the tension between divine sovereignty and the moral problem raised by the narrative.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
- issue: Identity of הַשָּׂטָן
  chosen_reading: Translate as the role-title 'the Accuser' rather than the proper name 'Satan.'
  alternative_readings:
  - Satan
  rationale: The article in Hebrew points to a title/function in this scene. This avoids over-resolving later theological identification while still allowing readers to recognize the adversarial figure.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
