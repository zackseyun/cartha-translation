id: JOB.2.11
reference: Job 2:11
source:
  edition: WLC
  text: וַֽ/יִּשְׁמְע֞וּ שְׁלֹ֣שֶׁת רֵעֵ֣י אִיּ֗וֹב אֵ֣ת כָּל הָ/רָעָ֣ה הַ/זֹּאת֮ הַ/בָּ֣אָה עָלָי/ו֒ וַ/יָּבֹ֨אוּ֙ אִ֣ישׁ מִ/מְּקֹמ֔/וֹ אֱלִיפַ֤ז הַ/תֵּימָנִי֙ וּ/בִלְדַּ֣ד הַ/שּׁוּחִ֔י וְ/צוֹפַ֖ר הַ/נַּֽעֲמָתִ֑י וַ/יִּוָּעֲד֣וּ יַחְדָּ֔ו לָ/ב֥וֹא לָ/נֽוּד ל֖/וֹ וּֽ/לְ/נַחֲמֽ/וֹ׀־־׃
translation:
  text: 'Now when Job’s three friends heard about all this trouble that had come upon him, they came each from his own place: Eliphaz the Temanite, Bildad the Shuhite, and Zophar the Naamathite. They agreed together to go to sympathize with him and to comfort him.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all this calamity' or 'all this adversity.' The Hebrew רָעָה here refers to disaster or misfortune that came upon Job, not moral evil committed by him.
    reason: lexical_alternative
  - marker: b
    text: Or 'they met together' or 'they made an appointment together.' The Hebrew verb suggests deliberate coordination.
    reason: lexical_alternative
  - marker: c
    text: Or 'to mourn with him.' The Hebrew verb לָנוּד can denote showing sympathy or condolence, often with mourning over suffering or death.
    reason: lexical_alternative
  - marker: d
    text: Or 'to come'.
    reason: previous_rendering
lexical_decisions:
- source_word: וַיִּשְׁמְעוּ
  chosen: Now when ... heard
  alternatives:
  - and ... heard
  - then ... heard
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Now when ... heard' gives natural English narrative flow while preserving the temporal sense of the clause.
- source_word: שְׁלֹשֶׁת רֵעֵי אִיּוֹב
  chosen: Job’s three friends
  alternatives:
  - the three friends of Job
  lexicon: HALOT
  rationale: Construct chain rendered idiomatically in English. 'Friends' is the plain sense of רֵעַ here.
- source_word: כָּל הָרָעָה הַזֹּאת
  chosen: all this trouble
  alternatives:
  - all this evil
  - all this calamity
  - all this adversity
  lexicon: HALOT
  rationale: רָעָה can denote moral evil or disaster/misfortune depending on context. Here it refers to the suffering that befell Job, not moral evil in him, so 'trouble' is a readable contextual rendering. 'Calamity' is possible but slightly more formal.
- source_word: הַבָּאָה עָלָיו
  chosen: that had come upon him
  alternatives:
  - that came upon him
  - that had happened to him
  lexicon: HALOT
  rationale: This participial phrase modifies 'trouble' and describes what befell Job. 'Had come upon him' preserves the metaphor of arrival and fits English narrative style.
- source_word: וַיָּבֹאוּ אִישׁ מִמְּקֹמוֹ
  chosen: they came each from his own place
  alternatives:
  - they came, each from his place
  - each came from his own place
  lexicon: HALOT
  rationale: אִישׁ distributively means 'each.' The phrase indicates that each friend traveled from his own locality.
- source_word: הַתֵּימָנִי / הַשּׁוּחִי / הַנַּעֲמָתִי
  chosen: the Temanite ... the Shuhite ... the Naamathite
  lexicon: HALOT
  rationale: These gentilics are best transliterated as standard English ethnics attached to the personal names, in keeping with the philosophy of transliterating names while translating titles.
- source_word: וַיִּוָּעֲדוּ יַחְדָּו
  chosen: They agreed together
  alternatives:
  - they met together
  - they appointed together
  - they made an appointment together
  lexicon: HALOT
  rationale: The Niphal of יעד here conveys arranging or agreeing by appointment. 'Agreed together' captures the intentional coordination without awkwardness. 'Met together' would understate the prior planning implied by the verb.
- source_word: לָבוֹא
  chosen: to come
  lexicon: HALOT
  rationale: Infinitive of purpose following their agreement; retained directly in English.
- source_word: לָנוּד לוֹ
  chosen: to sympathize with him
  alternatives:
  - to mourn with him
  - to show him sympathy
  - to console him
  lexicon: HALOT
  rationale: נוּד in this context refers to showing sympathy or expressing condolence through gestures or lament. 'Sympathize with him' distinguishes it from the following נָחַם, avoiding flattening the two verbs into the same English idea.
- source_word: וּלְנַחֲמוֹ
  chosen: and to comfort him
  alternatives:
  - and to console him
  lexicon: HALOT
  rationale: נחם in this stem commonly means to comfort or console. 'Comfort' is the most natural modern English rendering and pairs well with the preceding verb.
