  source_review: state/reviews/gemini/random_sample/ot/job/002/011.job-18878.json
  category: awkward_english
  tier: 1
  from: to come
  to: to go
  rationale: The verb 'to come' is a direct translation of the Hebrew infinitive לָבוֹא. However, the verb 'came' was already used just before this for וַיָּבֹאוּ ('they came each from his own place'). Using 'come' twice in this sequence can be slightly confusing for the English reader, suggesting a repeated action. Changing the infinitive to 'to go' would better reflect the narrative progression from the friends' perspective (they met up in order to *go* to Job) and avoid the awkward repetition, improving the overall flow.
