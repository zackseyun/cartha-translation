id: JOB.2.9
reference: Job 2:9
source:
  edition: WLC
  text: וַ/תֹּ֤אמֶר ל/וֹ֙ אִשְׁתּ֔/וֹ עֹדְ/ךָ֖ מַחֲזִ֣יק בְּ/תֻמָּתֶ֑/ךָ בָּרֵ֥ךְ
    אֱלֹהִ֖ים וָ/מֻֽת׃
translation:
  text: Then his wife said to him, “Are you still holding fast to your integrity?
    Bless God and die.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'Bless God and die'; many understand 'bless' here as a reverential
      euphemism meaning 'curse.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתֹּאמֶר
  chosen: Then ... said
  alternatives:
  - And ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then' gives natural English
    narrative flow while preserving sequence.
- source_word: אִשְׁתּוֹ
  chosen: his wife
  lexicon: HALOT
  rationale: Straightforward possessive nominal construction.
- source_word: עֹדְךָ
  chosen: Are you still
  alternatives:
  - Do you still
  - Still you are
  lexicon: HALOT
  rationale: The adverb with 2ms suffix conveys continuance directed at Job; in idiomatic
    English this is best represented in the interrogative clause as 'Are you still
    ...?'.
- source_word: מַחֲזִיק
  chosen: holding fast
  alternatives:
  - holding on to
  - maintaining
  lexicon: HALOT
  rationale: The participle of חזק here denotes continuing to cling to or maintain
    something firmly. 'Holding fast' preserves the force and fits the rebuking tone.
- source_word: בְּתֻמָּתֶךָ
  chosen: to your integrity
  alternatives:
  - in your integrity
  - to your blamelessness
  lexicon: HALOT
  rationale: תֻּמָּה denotes integrity, innocence, or blamelessness. 'Integrity' is
    the most natural English rendering here and matches Job's moral steadfastness
    without overstating sinlessness. The preposition ב with חזק is idiomatically rendered
    'hold fast to' in English.
- source_word: בָּרֵךְ
  chosen: Bless
  alternatives:
  - Curse
  lexicon: HALOT
  rationale: The Hebrew verb is literally 'bless.' In Job it is widely recognized
    as a euphemistic usage for the opposite in contexts involving speaking against
    God. Following original-language primacy, the main text keeps the lexical form
    'Bless,' while the idiomatic/opposite sense is preserved in a footnote for auditability.
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: Generic divine title, not the covenant name YHWH; therefore 'God' is
    the appropriate rendering.
- source_word: וָמֻת
  chosen: and die
  alternatives:
  - then die
  lexicon: HALOT
  rationale: Simple imperative sequence after the first imperative. 'And die' preserves
    the coordination and stark brevity of the Hebrew.
