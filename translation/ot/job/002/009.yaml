theological_decisions:
- issue: Euphemistic use of 'bless' in relation to God
  chosen_reading: Retain the literal Hebrew 'Bless God and die' in the main text,
    with the likely idiomatic sense 'Curse God and die' preserved in a footnote.
  alternative_readings:
  - Curse God and die
  rationale: The Hebrew text uses ברך ('bless') in a context many interpreters understand
    as a reverential euphemism for cursing God. Because the source form is explicit
    and the doctrine emphasizes original-language primacy and preserving tension rather
    than resolving ambiguity, the literal rendering is kept in the text and the idiomatic
    sense is documented in a footnote.
  doctrine_reference: Translation philosophy §§1, 3
