id: JOB.2.10
reference: Job 2:10
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר אֵלֶ֗י/הָ כְּ/דַבֵּ֞ר אַחַ֤ת הַ/נְּבָלוֹת֙ תְּדַבֵּ֔רִי גַּ֣ם
    אֶת הַ/טּ֗וֹב נְקַבֵּל֙ מֵ/אֵ֣ת הָ/אֱלֹהִ֔ים וְ/אֶת הָ/רָ֖ע לֹ֣א נְקַבֵּ֑ל בְּ/כָל
    זֹ֛את לֹא חָטָ֥א אִיּ֖וֹב בִּ/שְׂפָתָֽי/ו־־־־׃פ
translation:
  text: But he said to her, “You speak as one of the foolish women speaks. Shall we
    receive the good from God, and shall we not receive the bad?” In all this Job
    did not sin with his lips.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “adversity”; traditionally, “evil.” The Hebrew רָע here refers to harmful
      or unfavorable circumstances in contrast to “the good.”
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּדַבֵּר אַחַת הַנְּבָלוֹת תְּדַבֵּרִי
  chosen: You speak as one of the foolish women speaks
  alternatives:
  - You speak as one of the disgraceful women speaks
  - You speak as one of the senseless women speaks
  lexicon: HALOT
  rationale: נְבָלוֹת (from נבל) denotes folly in a moral/religious sense, not merely
    low intelligence. 'Foolish' is idiomatic English and preserves the ethical force
    better than a wooden 'senseless.' 'Women' is supplied from the feminine plural
    adjective and context.
- source_word: גַּם אֶת־הַטּוֹב נְקַבֵּל מֵאֵת הָאֱלֹהִים
  chosen: Shall we receive the good from God
  alternatives:
  - Should we receive the good from God
  - We receive the good from God
  lexicon: HALOT
  rationale: The imperfect נְקַבֵּל in this rhetorical context is best rendered as
    an English rhetorical question, paired with the following clause. 'The good' preserves
    the article and broad category of favorable things/blessing.
- source_word: וְאֶת־הָרָע לֹא נְקַבֵּל
  chosen: and shall we not receive the bad
  alternatives:
  - and shall we not receive adversity
  - and shall we not receive evil
  lexicon: HALOT
  rationale: רָע can denote moral evil or experiential calamity/adversity depending
    on context. Here, in contrast with 'the good' and in the setting of suffering
    received from God, it refers to harmful or adverse circumstances rather than moral
    evil committed by God. 'The bad' keeps the antithetical parallel with 'the good'
    in natural English without importing a stronger metaphysical claim. Alternatives
    are preserved because 'adversity' is interpretively precise and 'evil' is traditional.
- source_word: בְּכָל־זֹאת
  chosen: In all this
  alternatives:
  - In all this matter
  - Despite all this
  lexicon: HALOT
  rationale: A standard idiomatic rendering introducing the narrator's evaluative
    summary.
- source_word: לֹא חָטָא אִיּוֹב בִּשְׂפָתָיו
  chosen: Job did not sin with his lips
  alternatives:
  - Job did not sin by what he said
  - Job did not sin with his speech
  lexicon: HALOT
  rationale: The Hebrew specifies the instrument/sphere 'with his lips.' Retaining
    the bodily expression preserves the text's wording and leaves open the narrative
    nuance that the statement concerns his speech specifically.
