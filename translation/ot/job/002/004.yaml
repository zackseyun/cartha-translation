theological_decisions:
- issue: Rendering הַשָּׂטָן in Job's prologue
  chosen_reading: the Adversary
  alternative_readings:
  - Satan
  - the accuser
  rationale: The Hebrew includes the article and presents the figure in a role-based, court-like function. Rendering it as a title preserves the literary and theological nuance without denying later canonical identification. The verse itself does not require importing later proper-name usage.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language primacy over translation tradition.
