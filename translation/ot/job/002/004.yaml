id: JOB.2.4
reference: Job 2:4
source:
  edition: WLC
  text: וַ/יַּ֧עַן הַ/שָּׂטָ֛ן אֶת יְהוָ֖ה וַ/יֹּאמַ֑ר ע֣וֹר בְּעַד ע֗וֹר וְ/כֹל֙ אֲשֶׁ֣ר לָ/אִ֔ישׁ יִתֵּ֖ן בְּעַ֥ד נַפְשֽׁ/וֹ־־׃
translation:
  text: Then the Adversary answered Yahweh and said, “Skin for skin! Indeed, all that a man has he will give for his life.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Satan”; Hebrew has the title-like form “the satan/adversary.”
    reason: alternative_reading
  - marker: b
    text: “Skin for skin” is a proverb, likely meaning that a person will surrender one thing to protect his own life.
    reason: cultural_note
  - marker: c
    text: Or “for his soul/self.” Here “life” best fits the context.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַשָּׂטָן
  chosen: the Adversary
  alternatives:
  - the Satan
  - the accuser
  lexicon: HALOT
  rationale: With the article, the term functions as a title/designation rather than a personal name. 'The Adversary' preserves the role sense in context better than treating it as the later proper name 'Satan,' while remaining readable modern English.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving the conventional small-caps covenantal substitute in English.
- source_word: עוֹר בְּעַד עוֹר
  chosen: Skin for skin
  alternatives:
  - Hide for hide
  - Skin in exchange for skin
  lexicon: HALOT
  rationale: The Hebrew is a terse proverb-like expression. 'Skin for skin' is the most natural and established literal rendering, preserving the idiomatic force without over-interpreting it. More explanatory renderings risk paraphrase.
- source_word: בְּעַד
  chosen: for
  alternatives:
  - in exchange for
  - on behalf of
  lexicon: HALOT
  rationale: In both occurrences the preposition conveys exchange/substitution. 'For' is concise and idiomatic in English, especially in the proverb 'Skin for skin,' while the second clause also naturally reads 'give for his life.'
- source_word: אִישׁ
  chosen: a man
  alternatives:
  - a person
  - someone
  lexicon: HALOT
  rationale: The noun is singular masculine and here expresses a generic human subject. Per the project's gender-accurate philosophy, 'a man' best matches the source form and proverbial style; more neutral alternatives are possible but less form-sensitive.
- source_word: נֶפֶשׁ
  chosen: life
  alternatives:
  - soul
  - self
  lexicon: HALOT
  rationale: In this context נֶפֶשׁ refers to one's life or life-preservation rather than the immaterial soul. 'Life' best fits the sense of surrendering possessions to save oneself.
- source_word: וְכֹל אֲשֶׁר לָאִישׁ
  chosen: all that a man has
  alternatives:
  - everything that belongs to a man
  - all that belongs to a man
  lexicon: HALOT
  rationale: This rendering makes the possessive sense explicit and idiomatic in English while staying close to the Hebrew structure.
- source_word: יִתֵּן
  chosen: he will give
  alternatives:
  - he would give
  - he gives
  lexicon: HALOT
  rationale: 'The imperfect here expresses a general future/modal sense in the proverb: what a man will do to preserve his life. ''Will give'' is the most natural English equivalent.'
