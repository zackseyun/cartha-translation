id: JOB.2.8
reference: Job 2:8
source:
  edition: WLC
  text: וַ/יִּֽקַּֽח ל֣/וֹ חֶ֔רֶשׂ לְ/הִתְגָּרֵ֖ד בּ֑/וֹ וְ/ה֖וּא יֹשֵׁ֥ב בְּ/תוֹךְ
    הָ/אֵֽפֶר־־׃
translation:
  text: And he took a potsherd to scrape himself with while he was sitting among the
    ashes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a shard of pottery.'
    reason: lexical_alternative
  - marker: b
    text: Or 'to scratch himself.' The Hebrew verb can denote scratching, but 'scrape'
      better matches the use of a potsherd.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקַּח
  chosen: And he took
  alternatives:
  - Then he took
  - So he took
  lexicon: HALOT
  rationale: Wayyiqtol of לקח advances the narrative. 'And he took' preserves the
    simple sequential force without overinterpreting discourse nuance.
- source_word: לוֹ
  chosen: he took
  alternatives:
  - for himself
  lexicon: HALOT
  rationale: The dative pronoun can be represented idiomatically in English without
    an explicit 'for himself.' English 'he took' naturally carries the sense here;
    making it explicit would sound wooden.
- source_word: חֶרֶשׂ
  chosen: a potsherd
  alternatives:
  - a shard of pottery
  - a piece of broken pottery
  lexicon: HALOT
  rationale: חֶרֶשׂ commonly denotes an earthenware fragment or potsherd. 'Potsherd'
    is precise and standard, while still understandable in context.
- source_word: לְהִתְגָּרֵד
  chosen: to scrape himself
  alternatives:
  - to scratch himself
  lexicon: HALOT
  rationale: The hitpael infinitive expresses Job's action upon himself. 'Scrape himself'
    fits the likely use of a potsherd better than the softer 'scratch himself,' conveying
    the harshness of his condition.
- source_word: בּוֹ
  chosen: with
  alternatives:
  - with it
  - by means of it
  lexicon: HALOT
  rationale: The preposition plus pronoun refers to the potsherd as the instrument.
    English can express this naturally as 'with'; the object is clear from context.
- source_word: וְהוּא יֹשֵׁב
  chosen: while he was sitting
  alternatives:
  - and he was sitting
  - as he sat
  lexicon: HALOT
  rationale: The clause gives Job's concurrent posture/location during the scraping.
    'While he was sitting' communicates the circumstantial sense smoothly in English.
- source_word: בְּתוֹךְ הָאֵפֶר
  chosen: among the ashes
  alternatives:
  - in the midst of the ashes
  - in the ashes
  lexicon: HALOT
  rationale: בְּתוֹךְ literally means 'in the midst of.' 'Among the ashes' is natural
    English that preserves the image of Job seated within an ash heap or ash-covered
    place.
