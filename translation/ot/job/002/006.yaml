theological_decisions:
- issue: Whether הַשָּׂטָן should be treated as a proper name ('Satan') or a title/role ('the Accuser')
  chosen_reading: the Accuser
  alternative_readings:
  - Satan
  - the adversary
  rationale: The presence of the definite article in Hebrew strongly supports reading the term here as a title or office rather than a fixed personal name. Rendering it as 'the Accuser' preserves the literary and legal nuance of the prologue without importing more later name-like usage than the text itself requires.
- issue: Whether נַפְשׁוֹ should be rendered 'his soul' or 'his life'
  chosen_reading: his life
  alternative_readings:
  - his soul
  rationale: 'The immediate context concerns the limit placed on affliction: Job may be harmed physically but not killed. Rendering נֶפֶשׁ as ''life'' preserves that concrete sense and avoids suggesting a body/soul contrast not demanded by the Hebrew.'
