id: JOB.2.6
reference: Job 2:6
source:
  edition: WLC
  text: וַ/יֹּ֧אמֶר יְהוָ֛ה אֶל הַ/שָּׂטָ֖ן הִנּ֣/וֹ בְ/יָדֶ֑/ךָ אַ֖ךְ אֶת נַפְשׁ֥/וֹ שְׁמֹֽר־־׃
translation:
  text: And Yahweh said to the Accuser, “Behold, he is in your hand; only preserve his life.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Satan'; Hebrew 'the satan,' with the article, likely functioning here as a title meaning 'the accuser' or 'the adversary.'
    reason: alternative_reading
  - marker: b
    text: Literally 'he is in your hand,' an idiom meaning he is in your power.
    reason: lexical_alternative
  - marker: c
    text: Or 'preserve his soul'; Hebrew nephesh often means 'life' in contexts of mortal danger.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: הַשָּׂטָן
  chosen: the Accuser
  alternatives:
  - the Satan
  - the adversary
  lexicon: HALOT
  rationale: With the article, the Hebrew functions as a title/role designation rather than a personal name. 'The Accuser' captures the judicial/oppositional sense in context better than leaving it transliterated.
- source_word: הִנּוֹ
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: This deictic/interjection introduces what follows emphatically. 'Look' is natural modern English and preserves the force without archaic tone.
- source_word: בְיָדֶךָ
  chosen: in your hand
  alternatives:
  - in your power
  - under your authority
  lexicon: HALOT
  rationale: The idiom literally reads 'in your hand.' Retaining 'hand' preserves the Hebrew imagery while remaining intelligible in English as a statement of power or control.
- source_word: אַךְ
  chosen: only
  alternatives:
  - however
  - nevertheless
  - except
  lexicon: HALOT
  rationale: Here the particle marks a strong limitation on the permission granted. 'Only' is the most concise and natural rendering in English.
- source_word: נַפְשׁוֹ
  chosen: his life
  alternatives:
  - his soul
  - his person
  lexicon: HALOT
  rationale: In this context נֶפֶשׁ refers to Job's life, not an abstract immaterial soul. 'His life' best fits the prohibition against taking his life.
- source_word: שְׁמֹר
  chosen: spare
  alternatives:
  - keep
  - preserve
  - guard
  lexicon: HALOT
  rationale: Although the verb literally means 'keep/guard,' in this context the sense is to refrain from destroying his life and thus preserve it. 'Spare' communicates the idiomatic force clearly in English.
