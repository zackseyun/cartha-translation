id: JOB.2.1
reference: Job 2:1
source:
  edition: WLC
  text: וַ/יְהִ֣י הַ/יּ֔וֹם וַ/יָּבֹ֨אוּ֙ בְּנֵ֣י הָֽ/אֱלֹהִ֔ים לְ/הִתְיַצֵּ֖ב עַל יְהוָ֑ה וַ/יָּב֤וֹא גַֽם הַ/שָּׂטָן֙ בְּ/תֹכָ֔/ם לְ/הִתְיַצֵּ֖ב עַל יְהוָֽה־־־׃
translation:
  text: Again there was a day when the sons of God came to present themselves before Yahweh, and the Adversary also came among them to present himself before Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''the sons of God.'' This may refer to heavenly beings or members of the divine council.'
    reason: lexical_alternative
  - marker: b
    text: 'Or ''Satan''; Hebrew has the article: ''the satan,'' likely functioning here as a title meaning ''the adversary'' or ''the accuser.'''
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְהִי הַיּוֹם
  chosen: Again there was a day
  alternatives:
  - Now there was a day
  - And there was a day
  - One day
  lexicon: HALOT
  rationale: The clause repeats the scene from 1:6, so 'Again' brings out the narrative recurrence signaled by the formula without over-paraphrasing. 'There was a day' preserves the Hebrew idiom more closely than a freer 'One day.'
- source_word: בְּנֵי הָאֱלֹהִים
  chosen: the sons of God
  alternatives:
  - the heavenly beings
  - the divine beings
  lexicon: HALOT
  rationale: A formally transparent rendering is preferable here. The Hebrew is literally 'sons of God,' and this preserves the text's idiom and theological tension rather than resolving it into an interpretation such as 'heavenly beings.'
- source_word: לְהִתְיַצֵּב עַל יְהוָה
  chosen: to present themselves before the LORD
  alternatives:
  - to stand before the LORD
  - to take their stand before the LORD
  lexicon: HALOT
  rationale: The hitpael of יצב in this setting conveys appearing or presenting oneself in attendance before a superior. 'Present themselves before' is idiomatic English that preserves the formal courtly sense better than a wooden 'stand before.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: הַשָּׂטָן
  chosen: the Adversary
  alternatives:
  - the Satan
  - Satan
  - the accuser
  lexicon: HALOT
  rationale: The Hebrew includes the article, indicating a title or role rather than functioning simply as a proper name. 'The Adversary' communicates the lexical sense of שׂטן while preserving the titular force better than bare 'Satan.' 'The accuser' is possible in context but narrower than the base meaning.
- source_word: בְּתוֹכָם
  chosen: among them
  alternatives:
  - in their midst
  lexicon: HALOT
  rationale: '''Among them'' is the natural modern English equivalent and preserves the sense of inclusion within the assembled group.'
- source_word: לְהִתְיַצֵּב עַל יְהוָה
  chosen: to present himself before the LORD
  alternatives:
  - to stand before the LORD
  - to take his stand before the LORD
  lexicon: HALOT
  rationale: The same verb phrase recurs for the Adversary; rendering it consistently preserves the narrative parallelism.
