theological_decisions:
- issue: Whether הַשָּׂטָן should be rendered as a proper name or a title
  chosen_reading: the Adversary
  alternative_readings:
  - Satan
  - the Satan
  - the accuser
  rationale: Because the Hebrew uses the definite article, the expression most naturally functions as a title/role designation in this context. Rendering it 'the Adversary' preserves that grammatical signal and avoids importing a later, fully fixed proper-name usage more strongly than the text itself requires.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language primacy over translation tradition.
