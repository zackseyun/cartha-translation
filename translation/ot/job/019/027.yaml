theological_decisions:
- issue: Nature of Job's expected vision
  chosen_reading: Render the verse as Job's personal future seeing of the one mentioned
    in the previous verse, without specifying whether the vision is bodily resurrection,
    vindication before death, or a purely spiritual encounter.
  alternative_readings:
  - bodily resurrection hope
  - vindication in this life
  - vision of God after death
  rationale: The Hebrew strongly emphasizes that Job himself will see, but the verse
    alone does not settle the broader doctrinal question. The translation preserves
    the text's tension rather than resolving a debated theological interpretation.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
