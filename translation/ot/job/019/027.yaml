id: JOB.19.27
reference: Job 19:27
source:
  edition: WLC
  text: אֲשֶׁ֤ר אֲנִ֨י אֶֽחֱזֶה לִּ֗/י וְ/עֵינַ֣/י רָא֣וּ וְ/לֹא זָ֑ר כָּל֖וּ כִלְיֹתַ֣/י
    בְּ/חֵקִֽ/י׀־־׃
translation:
  text: whom I myself will see for myself, and my eyes will behold, and not another.
    My kidneys fail within my bosom.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'and not a stranger.' The sense may be 'I myself will
      see him, not someone else.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'my kidneys,' a figure for the inner self or deepest emotions.
    reason: cultural_note
lexical_decisions:
- source_word: אֲשֶׁר
  chosen: whom
  alternatives:
  - which
  - that
  lexicon: HALOT
  rationale: Relative pronoun referring back to the redeemer/God of the previous verse;
    'whom' fits the personal antecedent and the direct-object sense with אֶחֱזֶה.
- source_word: אֲנִי
  chosen: I myself
  alternatives:
  - I
  lexicon: HALOT
  rationale: The explicit independent pronoun adds emphasis beyond the verbal person
    marking; 'I myself' preserves that stress.
- source_word: אֶחֱזֶה
  chosen: will see
  alternatives:
  - will behold
  - will gaze upon
  lexicon: HALOT
  rationale: חזָה commonly denotes seeing/beholding, often with a heightened or visionary
    nuance. 'Will see' is clear modern English; the stronger nuance is supported by
    the following parallel verb 'behold'.
- source_word: לִּי
  chosen: for myself
  alternatives:
  - for me
  - on my side
  lexicon: HALOT
  rationale: The dative is difficult and emphatic. 'For myself' preserves the personal
    benefit/appropriation sense without over-interpreting it as forensic ('on my side').
- source_word: וְעֵינַי
  chosen: and my eyes
  lexicon: HALOT
  rationale: Literal rendering preserves the poetic parallelism with the first-person
    subject.
- source_word: רָאוּ
  chosen: will behold
  alternatives:
  - have seen
  - saw
  - will see
  lexicon: HALOT
  rationale: Although morphologically a qatal form, in this poetic context it functions
    in parallel with the preceding imperfect and is naturally rendered futurally in
    English. 'Will behold' avoids awkward repetition with the prior 'will see' while
    preserving the visual emphasis.
- source_word: וְלֹא זָר
  chosen: and not another
  alternatives:
  - and not a stranger
  - and no stranger
  lexicon: HALOT
  rationale: זָר can mean 'stranger/foreigner' or more generally 'another.' In context
    the contrast is that Job himself, not someone else, will see. 'Not another' communicates
    that most directly, while the more literal 'not a stranger' is preserved in a
    footnote.
- source_word: כָּלוּ
  chosen: fail
  alternatives:
  - are consumed
  - pine away
  - come to an end
  lexicon: HALOT
  rationale: כלה here expresses wasting away or being spent. 'Fail' is idiomatic in
    English for inward collapse or longing and fits the poetic close.
- source_word: כִלְיֹתַי
  chosen: my kidneys
  alternatives:
  - my inward parts
  - my heart
  lexicon: HALOT
  rationale: Literally 'kidneys,' a Hebrew idiom for the inner self/seat of deep emotion.
    Following source-language primacy, the literal term is retained in the main text,
    with an explanatory footnote preserving the idiomatic sense.
- source_word: בְּחֵקִי
  chosen: within my bosom
  alternatives:
  - in my bosom
  - within me
  lexicon: HALOT
  rationale: חֵיק is 'bosom/lap.' 'Within my bosom' preserves the concrete Hebrew
    image while reading naturally in English.
