id: JOB.19.14
reference: Job 19:14
source:
  edition: WLC
  text: חָדְל֥וּ קְרוֹבָ֑/י וּֽ/מְיֻדָּעַ֥/י שְׁכֵחֽוּ/נִי׃
translation:
  text: My relatives have failed me, and my acquaintances have forgotten me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'My kinsmen have ceased, and those known to me have forgotten me.'
    reason: lexical_alternative
lexical_decisions:
- source_word: חָדְלוּ
  chosen: have failed me
  alternatives:
  - have ceased
  - are gone
  - have left off
  lexicon: HALOT
  rationale: The verb חדל fundamentally means 'cease' or 'come to an end.' In context
    with 'my relatives' as subject, idiomatic English 'have failed me' captures relational
    withdrawal more naturally than the overly literal 'have ceased.' This preserves
    the sense that they have stopped being present/supportive.
- source_word: קְרֹבַי
  chosen: my relatives
  alternatives:
  - my near ones
  - my kinsmen
  - my close ones
  lexicon: HALOT
  rationale: From קרוב, 'near one,' often used for kin or close relations. 'My relatives'
    is the clearest modern English rendering in this context, better than the more
    archaic 'kinsmen' and more specific than merely 'close ones.'
- source_word: וּמְיֻדָּעַי
  chosen: my acquaintances
  alternatives:
  - my friends
  - those known to me
  - my familiar friends
  lexicon: HALOT
  rationale: From ידע in the passive/nominal sense, referring to those known to someone,
    i.e., acquaintances or familiar associates. 'My acquaintances' preserves the lexical
    sense without overstating intimacy as 'friends' might.
- source_word: שְׁכֵחוּנִי
  chosen: have forgotten me
  alternatives:
  - ignore me
  - have neglected me
  lexicon: HALOT
  rationale: The verb שכח means 'forget.' The direct rendering 'have forgotten me'
    is both accurate and rhetorically strong in Job's lament. Alternatives like 'ignore
    me' interpret the effect rather than translate the lexical meaning.
