id: JOB.19.18
reference: Job 19:18
source:
  edition: WLC
  text: גַּם עֲ֭וִילִים מָ֣אֲסוּ בִ֑/י אָ֝ק֗וּמָה וַ/יְדַבְּרוּ בִֽ/י־־׃
translation:
  text: Even little children despise me; when I rise, they speak against me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'fools,' 'the insolent,' or 'young boys.' The Hebrew term עֲוִילִים usually
      denotes foolish or morally senseless people, but in this context many understand
      it to refer to immature or low-status youths who mock Job.
    reason: lexical_alternative
lexical_decisions:
- source_word: גַּם
  chosen: Even
  alternatives:
  - also
  - indeed
  lexicon: HALOT
  rationale: Adds emphasis and continuation from the surrounding lament; 'even' best
    conveys the force in context.
- source_word: עֲוִילִים
  chosen: little children
  alternatives:
  - fools
  - the insolent
  - young boys
  lexicon: HALOT
  rationale: In this context the term is commonly understood not as moral 'fools'
    in the wisdom sense but as immature or contemptible youths/children who join in
    mocking Job. 'Little children' communicates the social humiliation that even the
    least regard him with contempt. The lexical range is difficult, so alternatives
    are preserved in a footnote.
- source_word: מָאֲסוּ בִי
  chosen: despise me
  alternatives:
  - reject me
  - spurn me
  lexicon: HALOT
  rationale: The verb מאס expresses contemptuous rejection. 'Despise me' fits the
    emotional tone and idiomatic English.
- source_word: אָקוּמָה
  chosen: when I rise
  alternatives:
  - if I arise
  - when I stand up
  lexicon: HALOT
  rationale: 'The cohortative/form here functions naturally in context as a temporal
    clause: whenever Job rises, the mockery follows. ''When I rise'' is concise and
    idiomatic.'
- source_word: וַיְדַבְּרוּ בִי
  chosen: they speak against me
  alternatives:
  - they talk about me
  - they mock me
  - they speak of me
  lexicon: HALOT
  rationale: The preposition ב with דבר here carries a hostile sense in context. 'Speak
    against me' preserves the verbal action without over-paraphrasing to 'mock,' though
    mockery is implied.
