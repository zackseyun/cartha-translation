id: JOB.19.2
reference: Job 19:2
source:
  edition: WLC
  text: עַד אָ֭נָה תּוֹגְי֣וּ/ן נַפְשִׁ֑/י וּֽ/תְדַכְּאוּ/נַ֥נִי בְ/מִלִּֽים־׃
translation:
  text: How long will you torment me and crush me with words?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'How long will you grieve my soul and crush me with words?'
    reason: lexical_alternative
lexical_decisions:
- source_word: עַד אָ֭נָה
  chosen: How long
  alternatives:
  - Until when
  lexicon: HALOT
  rationale: Idiomatic temporal lament formula in Hebrew. 'How long' is the natural
    English equivalent and preserves the rhetorical force better than the more wooden
    'Until when.'
- source_word: תּוֹגְיוּן
  chosen: will you torment
  alternatives:
  - will you grieve
  - will you afflict
  - will you vex
  lexicon: HALOT
  rationale: From יגה/יגה in the Hiphil, with the object 'my soul/me.' In context
    Job is protesting the emotional and inward distress caused by his friends. 'Torment'
    captures sustained inner anguish better than the weaker 'grieve' or the less idiomatic
    'afflict my soul.'
- source_word: נַפְשִׁי
  chosen: me
  alternatives:
  - my soul
  - my life
  - myself
  lexicon: HALOT
  rationale: נֶפֶשׁ can denote the inner self, life, or person. In contemporary English,
    'torment my soul' is understandable but can sound overly dualistic or archaic.
    Since the Hebrew here refers to Job himself in his inner being, 'me' best conveys
    the sense in readable modern English while preserving the personal force.
- source_word: וּתְדַכְּאוּנַנִי
  chosen: and crush me
  alternatives:
  - and break me
  - and oppress me
  lexicon: HALOT
  rationale: From דכא, conveying crushing or breaking down. 'Crush me' is vivid, direct,
    and fits the parallelism with verbal abuse. It preserves the metaphorical violence
    of the Hebrew.
- source_word: בְמִלִּים
  chosen: with words
  alternatives:
  - by words
  - in speech
  lexicon: HALOT
  rationale: Instrumental beth is naturally rendered 'with.' The phrase indicates
    the means by which they are crushing him—through their speech.
