id: JOB.19.7
reference: Job 19:7
source:
  edition: WLC
  text: הֵ֤ן אֶצְעַ֣ק חָ֭מָס וְ/לֹ֣א אֵעָנֶ֑ה אֲ֝שַׁוַּ֗ע וְ/אֵ֣ין מִשְׁפָּֽט׃
translation:
  text: Look, I cry out, “Violence!” but I am not answered; I call for help, but there
    is no justice.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Wrong!” or “Outrage!” The Hebrew term can denote violence, wrongdoing,
      or an outraged legal complaint.
    reason: lexical_alternative
  - marker: b
    text: Or “I cry for help.” The verb refers to an urgent plea for aid.
    reason: lexical_alternative
  - marker: c
    text: Or “there is no judgment” or “there is no legal redress.” The Hebrew term
      carries a legal sense of justice or proper adjudication.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֵן
  chosen: Look
  alternatives:
  - Behold
  - Indeed
  - See
  lexicon: HALOT
  rationale: Introduces an emphatic attention-getting statement. 'Look' is natural
    modern English and preserves the deictic force better than the more archaic 'Behold.'
- source_word: אֶצְעַק
  chosen: I cry out
  alternatives:
  - I cry
  - I shout
  lexicon: HALOT
  rationale: From צעק, denoting a loud cry, often in distress. 'Cry out' captures
    both volume and urgency.
- source_word: חָמָס
  chosen: Violence
  alternatives:
  - Wrong
  - Outrage
  lexicon: HALOT
  rationale: The noun commonly denotes violence, wrongdoing, or outrage. In this legal-complaint
    context, Job is crying out as one reporting violent wrong done to him. 'Violence'
    is the most direct and established rendering.
- source_word: אֵעָנֶה
  chosen: I am not answered
  alternatives:
  - I am not heard
  - I receive no answer
  lexicon: HALOT
  rationale: Niphal of ענה here is best taken as passive/reflexive, 'be answered.'
    'I am not answered' preserves the verbal correspondence to Job's cry more closely
    than the interpretive 'I am not heard.'
- source_word: אֲשַׁוַּע
  chosen: I call for help
  alternatives:
  - I cry for help
  - I plead
  lexicon: HALOT
  rationale: This verb denotes a cry for aid. 'Call for help' gives clear modern English
    while distinguishing it slightly from the previous 'cry out' and avoiding unnecessary
    repetition.
- source_word: מִשְׁפָּט
  chosen: justice
  alternatives:
  - judgment
  - legal redress
  lexicon: HALOT
  rationale: In context Job laments the absence of a just hearing or legal vindication.
    'Justice' communicates the legal and moral sense naturally in English; 'judgment'
    could sound merely condemnatory, while 'legal redress' is too narrow and technical.
