theological_decisions:
- issue: Nature of Job's complaint against God
  chosen_reading: Render the verse as a lament over unanswered appeal and absent justice
    without softening the force of Job's accusation.
  alternative_readings:
  - Render more indirectly to avoid implying that God withholds justice
  rationale: The Hebrew plainly presents Job as crying out over violence, receiving
    no answer, and finding no justice. The translation should preserve this theological
    tension rather than resolve it or mute Job's protest.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
