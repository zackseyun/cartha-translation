id: JOB.19.21
reference: Job 19:21
source:
  edition: WLC
  text: חָנֻּ֬/נִי חָנֻּ֣/נִי אַתֶּ֣ם רֵעָ֑/י כִּ֥י יַד אֱ֝ל֗וֹהַּ נָ֣גְעָה בִּֽ/י־׃
translation:
  text: Have pity on me, have pity on me, you my friends, for the hand of God has
    struck me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Be gracious to me' or 'Show me mercy.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the hand of God has touched me'; the idiom here conveys harmful
      impact, hence 'has struck me.'
    reason: lexical_alternative
lexical_decisions:
- source_word: חָנֻּנִי
  chosen: Have pity on me
  alternatives:
  - Be gracious to me
  - Show me mercy
  lexicon: HALOT
  rationale: Imperative plural from חנן addressed to Job's friends. In this context
    Job is pleading for compassionate treatment, so 'Have pity on me' communicates
    the interpersonal appeal more naturally than the more formal 'be gracious to me,'
    while still preserving the force of the repeated imperative.
- source_word: חָנֻּנִי (repeated)
  chosen: have pity on me
  alternatives:
  - be gracious to me
  - show me mercy
  lexicon: HALOT
  rationale: The repetition is retained in English to preserve the emotional urgency
    and poetic intensification of Job's plea.
- source_word: רֵעַי
  chosen: you my friends
  alternatives:
  - my companions
  - my associates
  lexicon: HALOT
  rationale: רֵעַ commonly denotes a friend or companion. 'You my friends' preserves
    the direct address after the repeated plea and reflects Job's appeal to those
    who should be sympathetic.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - since
  lexicon: HALOT
  rationale: Introduces the reason for the plea. 'For' fits the elevated but readable
    tone of the verse and links the clauses smoothly.
- source_word: יַד אֱלוֹהַּ
  chosen: the hand of God
  alternatives:
  - God's hand
  lexicon: HALOT
  rationale: A common Hebrew idiom for divine action or power. The construct phrase
    is rendered transparently as 'the hand of God' to preserve the metaphor rather
    than flattening it.
- source_word: אֱלוֹהַּ
  chosen: God
  alternatives:
  - God Almighty
  lexicon: HALOT
  rationale: אֱלוֹהַּ is the singular poetic form for God in Job. 'God' is the straightforward
    equivalent; nothing in the immediate context warrants expansion to 'God Almighty.'
- source_word: נָגְעָה בִּי
  chosen: has struck me
  alternatives:
  - has touched me
  - has afflicted me
  lexicon: HALOT
  rationale: נגע with ב can mean touch, strike, or afflict. In Job's suffering context,
    'has struck me' best conveys harmful impact while remaining vivid and faithful
    to the metaphor. 'Touched me' is too weak in contemporary English; 'afflicted
    me' is possible but less concrete.
