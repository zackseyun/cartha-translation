theological_decisions:
- issue: Agency of Job's suffering
  chosen_reading: for the hand of God has struck me
  alternative_readings:
  - for the hand of God has touched me
  - for God's hand has afflicted me
  rationale: The Hebrew explicitly attributes Job's suffering to divine agency in
    idiomatic form. The translation preserves that tension without softening or systematizing
    it, in keeping with the text's own rhetoric and the doctrine guideline to preserve
    theological tension rather than resolve it.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
