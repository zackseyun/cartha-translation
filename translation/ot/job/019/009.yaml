id: JOB.19.9
reference: Job 19:9
source:
  edition: WLC
  text: כְּ֭בוֹדִ/י מֵ/עָלַ֣/י הִפְשִׁ֑יט וַ֝/יָּ֗סַר עֲטֶ֣רֶת רֹאשִֽׁ/י׃
translation:
  text: He has stripped my honor from me and removed the crown from my head.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my glory' or 'my dignity.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּבוֹדִי
  chosen: my honor
  alternatives:
  - my glory
  - my dignity
  lexicon: HALOT
  rationale: כָּבוֹד commonly denotes honor, glory, or weightiness/status. In Job's
    lament about social humiliation and loss of standing, 'honor' best conveys the
    concrete sense of lost status in natural English, while 'glory' would sound elevated
    and potentially misleadingly theological.
- source_word: מֵעָלַי
  chosen: from me
  alternatives:
  - from upon me
  - off me
  lexicon: HALOT
  rationale: Literally 'from upon me,' but idiomatic English after 'stripped' is 'from
    me.' This preserves the sense of removal without awkwardness.
- source_word: הִפְשִׁיט
  chosen: has stripped
  alternatives:
  - stripped off
  - despoiled
  lexicon: HALOT
  rationale: The verb means to strip off/remove clothing or what covers. 'Has stripped'
    preserves the vivid metaphor of being divested of honor. Present perfect English
    fits the lament context describing Job's present condition resulting from past
    action.
- source_word: וַיָּסַר
  chosen: removed
  alternatives:
  - took away
  - turned aside
  lexicon: HALOT
  rationale: The verb סור in hiphil commonly means remove/take away. 'Removed' pairs
    well with the parallel image and keeps the poetic balance with 'has stripped.'
- source_word: עֲטֶרֶת
  chosen: the crown
  alternatives:
  - the diadem
  - the wreath
  lexicon: HALOT
  rationale: The noun denotes a crown or wreath as a symbol of honor and status. 'Crown'
    is the clearest and most natural English equivalent and preserves the metaphor
    of lost dignity.
- source_word: רֹאשִׁי
  chosen: my head
  lexicon: HALOT
  rationale: Straightforward possessive construction; retained literally because the
    image of a crown on the head is central to the verse's metaphor.
