id: JOB.19.28
reference: Job 19:28
source:
  edition: WLC
  text: כִּ֣י תֹ֭אמְרוּ מַה נִּרְדָּף ל֑/וֹ וְ/שֹׁ֥רֶשׁ דָּ֝בָ֗ר נִמְצָא בִֽ/י־־־׃
translation:
  text: If you say, ‘How shall we pursue him, since the root of the matter is found
    in me?’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew is difficult. The final clause may also be understood along the lines
      of 'the root of the matter is found in him,' depending on how the consonantal
      text and ancient versions are weighed; some interpreters also take 'pursue'
      in the stronger sense 'persecute.'
    reason: alternative_reading
lexical_decisions:
- source_word: כִּי
  chosen: If
  alternatives:
  - For
  - Indeed
  - When
  lexicon: HALOT
  rationale: Here כִּי introduces the content of a hypothetical statement by Job's
    opponents ('if you say'), not a simple causal 'for.' This best fits the immediate
    syntax with the following imperfect תֹאמְרוּ.
- source_word: תֹאמְרוּ
  chosen: you say
  alternatives:
  - you will say
  - you should say
  lexicon: HALOT
  rationale: Qal imperfect 2mp can be rendered as a present/future in English. In
    this conditional setting, 'if you say' is idiomatic and natural.
- source_word: מַה
  chosen: How
  alternatives:
  - What
  lexicon: HALOT
  rationale: In the idiom מַה + verb, the sense is interrogative adverbial ('how?
    in what way?') rather than a bare substantive 'what.'
- source_word: נִּרְדָּף
  chosen: shall we pursue
  alternatives:
  - do we pursue
  - shall we persecute
  lexicon: HALOT
  rationale: From רדף, 'pursue, chase, persecute.' In context of hostile action against
    Job, 'pursue' preserves the literal verbal image while allowing the persecutory
    nuance to be felt. The 1cp form is retained as 'we.'
- source_word: לוֹ
  chosen: him
  alternatives:
  - against him
  - for him
  lexicon: HALOT
  rationale: The preposition ל with רדף can mark the object pursued; idiomatic English
    requires a direct object, hence 'pursue him.' 'Against him' is possible but less
    direct.
- source_word: וְשֹׁרֶשׁ
  chosen: since the root
  alternatives:
  - and the root
  - for the root
  lexicon: HALOT
  rationale: 'The conjunction links the second clause as the stated ground for the
    proposed pursuit. ''Since'' brings out the explanatory force in English. שֹׁרֶשׁ
    is metaphorical: ''root,'' that is, underlying basis or source.'
- source_word: דָּבָר
  chosen: the matter
  alternatives:
  - the thing
  - the case
  - the word
  lexicon: HALOT
  rationale: דָּבָר here refers broadly to the issue/case at hand, not specifically
    a spoken 'word.' 'Matter' is the most natural English equivalent in this idiom
    ('root of the matter').
- source_word: נִמְצָא
  chosen: is found
  alternatives:
  - has been found
  - is discovered
  lexicon: HALOT
  rationale: Niphal conveys a passive/resultative sense. 'Is found' is straightforward
    and preserves the metaphor without overinterpreting.
- source_word: בִי
  chosen: in me
  alternatives:
  - with me
  - within me
  lexicon: HALOT
  rationale: The preposition ב is most directly 'in me.' This yields the difficult
    but traditional sense that the basis of the matter is located in Job himself.
    Because the phrase is textually and interpretively difficult, alternatives are
    preserved in a footnote.
