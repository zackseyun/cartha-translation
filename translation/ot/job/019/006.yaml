id: JOB.19.6
reference: Job 19:6
source:
  edition: WLC
  text: דְּֽעוּ אֵ֭פוֹ כִּי אֱל֣וֹהַּ עִוְּתָ֑/נִי וּ֝/מְצוּד֗/וֹ עָלַ֥/י הִקִּֽיף־־׃
translation:
  text: Know then that God has wronged me and has surrounded me with his net.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'has treated me unjustly' or 'has perverted justice against me.' The
      Hebrew verb can carry the sense of bending or distorting what is right.
    reason: lexical_alternative
  - marker: b
    text: Or 'his trap' or 'his hunting net.'
    reason: lexical_alternative
lexical_decisions:
- source_word: דְּעוּ
  chosen: Know
  alternatives:
  - Understand
  - Recognize
  lexicon: HALOT
  rationale: Imperative plural of ידע, calling the hearers to acknowledge a fact.
    'Know' is direct and idiomatic in English.
- source_word: אֵפוֹ
  chosen: then
  alternatives:
  - now
  - therefore
  lexicon: HALOT
  rationale: Discourse particle adding emphasis/inference. 'Then' fits the argumentative
    flow without overtranslating.
- source_word: אֱלוֹהַּ
  chosen: God
  alternatives:
  - God Almighty
  lexicon: HALOT
  rationale: Standard singular divine title. The form here is simply 'God,' not a
    more specific title such as Shaddai.
- source_word: עִוְּתַנִי
  chosen: has wronged me
  alternatives:
  - has twisted me
  - has perverted justice against me
  - has treated me unjustly
  lexicon: HALOT
  rationale: From עות, whose sense includes bending, distorting, or wronging. In context
    Job alleges unjust treatment by God; 'has wronged me' communicates the moral-judicial
    force in natural English better than the more literal but opaque 'has twisted
    me.'
- source_word: מְצוּדוֹ
  chosen: his net
  alternatives:
  - his hunting net
  - his trap
  lexicon: HALOT
  rationale: The noun denotes a net/trap used in hunting. 'Net' is concise and preserves
    the metaphor; 'trap' is possible but less directly tied to the imagery.
- source_word: הִקִּיף עָלַי
  chosen: has surrounded me with
  alternatives:
  - has encircled me with
  - has closed in on me with
  lexicon: HALOT
  rationale: The verb means to surround or encircle. Rendering with 'with' brings
    out the construction with the following instrument/image ('his net') in idiomatic
    English.
