theological_decisions:
- issue: Job's accusation against God
  chosen_reading: Retain Job's direct claim that God 'has wronged me' without softening
    it.
  alternative_readings:
  - God has afflicted me
  - God has turned against me
  rationale: The Hebrew verb carries a strong sense of distortion or injustice. The
    translation should preserve the force of Job's lament rather than mute the theological
    tension. This reflects the text's own rhetoric without endorsing Job's assessment
    as doctrinally normative.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
