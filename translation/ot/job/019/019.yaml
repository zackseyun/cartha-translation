id: JOB.19.19
reference: Job 19:19
source:
  edition: WLC
  text: תִּֽ֭עֲבוּ/נִי כָּל מְתֵ֣י סוֹדִ֑/י וְ/זֶֽה אָ֝הַ֗בְתִּי נֶהְפְּכוּ בִֽ/י־־־׃
translation:
  text: All my intimate friends abhor me, and those whom I loved have turned against
    me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''the men of my counsel/secret.'' The phrase refers to Job''s confidential
      circle or trusted companions.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תִּעֲבוּנִי
  chosen: abhor me
  alternatives:
  - detest me
  - loathe me
  lexicon: HALOT
  rationale: The verb תעב conveys strong revulsion or abhorrence, stronger than simple
    dislike. 'Abhor me' preserves the intensity and fits Job's lament register.
- source_word: כָּל
  chosen: all
  alternatives:
  - every
  lexicon: HALOT
  rationale: The quantifier is comprehensive; 'all' is the most natural English rendering
    in this clause.
- source_word: מְתֵי סוֹדִי
  chosen: my intimate friends
  alternatives:
  - the men of my council
  - my confidants
  - my close companions
  lexicon: HALOT
  rationale: מתי is literally 'men/people of,' and סוד denotes confidential counsel,
    intimate circle, or close fellowship. 'My intimate friends' best communicates
    the relational sense in idiomatic modern English while preserving the idea of
    trusted insiders.
- source_word: וְזֶה
  chosen: and those
  alternatives:
  - and this one
  - even these
  lexicon: HALOT
  rationale: Though singular in form, זֶה here functions collectively with the following
    plural verb and in parallel with the preceding plural group. 'And those' gives
    natural English sense without forcing an awkward literal singular.
- source_word: אָהַבְתִּי
  chosen: I loved
  alternatives:
  - I have loved
  lexicon: HALOT
  rationale: The qatal form naturally refers to Job's prior affection for these people.
    Simple past reads most naturally in English narrative lament.
- source_word: נֶהְפְּכוּ
  chosen: have turned
  alternatives:
  - have turned themselves
  - have been turned
  - have changed
  lexicon: HALOT
  rationale: The verb הפך in the Niphal here expresses reversal or turning. 'Have
    turned' captures the shift in allegiance or disposition.
- source_word: בִי
  chosen: against me
  alternatives:
  - on me
  - toward me
  lexicon: HALOT
  rationale: With the context of hostility, the preposition is best rendered idiomatically
    as 'against me,' making explicit the adversative sense in English.
