id: JOB.19.10
reference: Job 19:10
source:
  edition: WLC
  text: יִתְּצֵ֣/נִי סָ֭בִיב וָ/אֵלַ֑ךְ וַ/יַּסַּ֥ע כָּ֝/עֵ֗ץ תִּקְוָתִֽ/י׃
translation:
  text: He tears me down on every side, and I am gone; he has uprooted my hope like
    a tree.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or, ''and I go / and I perish.'' The Hebrew literally reads ''and I go,''
      likely expressing the result of being torn down: Job is undone or gone.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יִתְּצֵנִי
  chosen: tears me down
  alternatives:
  - breaks me down
  - demolishes me
  - pulls me down
  lexicon: HALOT
  rationale: From נתץ, a verb of tearing down or demolishing. In context of Job's
    ruin, 'tears me down' preserves the destructive force while sounding natural in
    English. The object suffix 'me' is explicit.
- source_word: סָבִיב
  chosen: on every side
  alternatives:
  - all around
  - round about
  lexicon: HALOT
  rationale: Adverbial noun meaning 'around, on every side.' 'On every side' idiomatically
    conveys comprehensive assault.
- source_word: וָאֵלַךְ
  chosen: and I am gone
  alternatives:
  - and I go
  - and I perish
  - and I pass away
  lexicon: HALOT
  rationale: Though formally 'and I go,' in this context after being torn down it
    functions idiomatically for disappearance or ruin. 'I am gone' captures the resultant
    sense in clear modern English without over-paraphrasing.
- source_word: וַיַּסַּע
  chosen: he has uprooted
  alternatives:
  - he pulls up
  - he removes
  - he tears away
  lexicon: HALOT
  rationale: From נסע in the sense of pulling up or removing, especially tent pegs
    or something fixed. With 'my hope' and the simile 'like a tree,' 'has uprooted'
    best matches the image of something torn from its place.
- source_word: כָּעֵץ
  chosen: like a tree
  alternatives:
  - as a tree
  lexicon: HALOT
  rationale: Straightforward comparative phrase. 'Like a tree' is natural English
    and preserves the simile.
- source_word: תִּקְוָתִי
  chosen: my hope
  alternatives:
  - my expectation
  lexicon: HALOT
  rationale: תקוה commonly denotes hope or expectation. 'Hope' is the most natural
    and contextually fitting rendering in Job's lament.
