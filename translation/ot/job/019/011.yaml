id: JOB.19.11
reference: Job 19:11
source:
  edition: WLC
  text: וַ/יַּ֣חַר עָלַ֣/י אַפּ֑/וֹ וַ/יַּחְשְׁבֵ֖/נִי ל֣/וֹ כְ/צָרָֽי/ו׃
translation:
  text: His anger burns against me, and he counts me as his enemies.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'His anger was kindled against me, and he considers me as his adversaries.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּחַר
  chosen: burns
  alternatives:
  - was kindled
  - grew hot
  lexicon: HALOT
  rationale: The verb חרה with אַף is an idiom for anger kindling or burning. 'Burns'
    preserves the metaphor in natural modern English better than the more wooden 'was
    kindled.' Present tense is acceptable in English poetic rendering, though the
    Hebrew wayyiqtol is past narrative form.
- source_word: עָלַי
  chosen: against me
  alternatives:
  - at me
  - upon me
  lexicon: HALOT
  rationale: With anger, עַל commonly conveys hostility directed toward someone. 'Against
    me' best captures the adversative force in idiomatic English.
- source_word: אַפּוֹ
  chosen: his anger
  alternatives:
  - his nose
  - his wrath
  lexicon: HALOT
  rationale: אַף literally means 'nose' and by extension 'anger.' In this idiom the
    figurative sense is primary. 'Anger' is clearer and less archaic than 'wrath,'
    while still preserving the emotional force.
- source_word: וַיַּחְשְׁבֵנִי
  chosen: he counts me
  alternatives:
  - he considers me
  - he reckons me
  lexicon: HALOT
  rationale: חשב here means to regard or account someone as something. 'Counts me'
    is concise, natural, and close to the Hebrew sense.
- source_word: לוֹ
  chosen: as his
  alternatives:
  - to him as
  - for himself as
  lexicon: HALOT
  rationale: 'The dative pronoun marks relation or perspective: Job is counted, from
    God''s standpoint, as belonging among his adversaries. English expresses this
    most naturally with the possessive ''his'' in ''as his enemies.'''
- source_word: כְצָרָיו
  chosen: enemies
  alternatives:
  - adversaries
  - foes
  lexicon: HALOT
  rationale: צָר commonly denotes an enemy or adversary. The plural with 3ms suffix
    is literally 'his enemies/adversaries.' 'Enemies' is the clearest modern rendering.
    The plural is retained rather than smoothed to singular.
