theological_decisions:
- issue: Referent of the third-person subject and suffixes
  chosen_reading: The subject remains God, continuing Job's complaint that God is
    acting against him.
  alternative_readings:
  - An unspecified hostile agent
  rationale: In context (Job 19:6-12), Job repeatedly attributes these actions to
    God. The verse should preserve that stark theological tension rather than soften
    it.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
