id: JOB.19.3
reference: Job 19:3
source:
  edition: WLC
  text: זֶ֤ה עֶ֣שֶׂר פְּ֭עָמִים תַּכְלִימ֑וּ/נִי לֹֽא תֵ֝בֹ֗שׁוּ תַּהְכְּרוּ לִֽ/י־־׃
translation:
  text: These ten times you have humiliated me; you are not ashamed to mistreat me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to wrong me,' 'to deal harshly with me,' or more literally 'to treat
      me as a stranger.' The Hebrew verb is difficult and may carry the sense of acting
      toward Job as though he were alien or unrecognized.
    reason: lexical_alternative
lexical_decisions:
- source_word: זֶה
  chosen: These
  alternatives:
  - This
  lexicon: HALOT
  rationale: With the following plural expression 'ten times,' the demonstrative is
    best rendered idiomatically in English as 'These,' introducing the repeated instances
    Job is counting.
- source_word: עֶשֶׂר פְּעָמִים
  chosen: ten times
  alternatives:
  - repeatedly
  - again and again
  lexicon: HALOT
  rationale: The Hebrew is a standard numerical idiom meaning 'ten times,' often functioning
    as a rounded number for repeated action. The more literal rendering preserves
    the force and rhetoric of Job's complaint.
- source_word: תַּכְלִימוּנִי
  chosen: you have humiliated me
  alternatives:
  - you disgrace me
  - you shame me
  - you insult me
  lexicon: HALOT
  rationale: The Hiphil of כלם commonly conveys causing shame or humiliation. 'Humiliated'
    captures the causative force and the personal degradation Job describes.
- source_word: לֹא תֵבֹשׁוּ
  chosen: you are not ashamed
  alternatives:
  - you do not blush
  - you feel no shame
  lexicon: HALOT
  rationale: בוש denotes experiencing shame. 'You are not ashamed' is natural modern
    English and preserves the moral accusation.
- source_word: תַּהְכְּרוּ לִי
  chosen: to mistreat me
  alternatives:
  - to wrong me
  - to deal harshly with me
  - to act strangely toward me
  lexicon: HALOT
  rationale: The Hiphil of נכר here is difficult and context-sensitive. In context,
    parallel to humiliating and lacking shame, it refers to treating Job in an alienating,
    hostile, or abusive way. 'Mistreat me' communicates the sense clearly without
    over-specifying the exact nuance.
