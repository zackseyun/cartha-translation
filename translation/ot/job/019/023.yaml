id: JOB.19.23
reference: Job 19:23
source:
  edition: WLC
  text: מִֽי יִתֵּ֣ן אֵ֭פוֹ וְ/יִכָּתְב֣וּ/ן מִלָּ֑/י מִֽי יִתֵּ֖ן בַּ/סֵּ֣פֶר וְ/יֻחָֽקוּ־־׃
translation:
  text: Oh, that now my words were written down! Oh, that they were inscribed in a
    book!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'written in a scroll'; Hebrew סֵפֶר can refer to a book, scroll, or written
      document.
    reason: cultural_note
  - marker: b
    text: Or 'engraved'; the verb suggests inscribing in a durable way, not merely
      casual writing.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִי יִתֵּן
  chosen: Oh, that
  alternatives:
  - Who will give?
  - If only
  lexicon: HALOT
  rationale: This idiom expresses a wish or longing rather than a literal question
    about a giver. English exclamatory 'Oh, that' best captures the optative force
    in natural modern English.
- source_word: אֵפוֹ
  chosen: now
  alternatives:
  - then
  - indeed
  lexicon: HALOT
  rationale: The particle adds emotional immediacy/intensity to the wish. 'Now' preserves
    the urgency without overtranslating.
- source_word: וְיִכָּתְבוּן
  chosen: were written down
  alternatives:
  - might be written
  - were written
  lexicon: HALOT
  rationale: Passive sense from כתב in this form; English past subjunctive-style 'were
    written down' fits the wish construction and the context of recording words.
- source_word: מִלָּי
  chosen: my words
  alternatives:
  - my speech
  - my sayings
  lexicon: HALOT
  rationale: '''Words'' is the most direct and natural rendering of the plural with
    first-person suffix here, matching Job''s desire that his utterances be recorded.'
- source_word: בַּסֵּפֶר
  chosen: in a book
  alternatives:
  - in the scroll
  - in a document
  lexicon: HALOT
  rationale: סֵפֶר denotes a written document/book/scroll. 'Book' is idiomatic modern
    English and sufficiently broad; the ancient medium can be noted in a footnote.
- source_word: וְיֻחָקוּ
  chosen: were inscribed
  alternatives:
  - were engraved
  - were recorded
  lexicon: HALOT
  rationale: חקק commonly carries the sense of inscribing/engraving. 'Inscribed' fits
    both the literary parallelism and the idea of durable written preservation, while
    remaining natural in English.
