theological_decisions:
- issue: Whether Job 19:26 explicitly teaches bodily resurrection by the phrase וּמִבְּשָׂרִי
  chosen_reading: Render the phrase conservatively as 'from my flesh' and allow the
    verse's tension to remain.
  alternative_readings:
  - in my flesh
  - without my flesh
  rationale: The Hebrew preposition and syntax are disputed. Translating 'in my flesh'
    would more directly support a bodily-resurrection reading; 'without my flesh'
    would point toward a disembodied vision. In keeping with the translation philosophy,
    the main text preserves the ambiguity rather than resolving it beyond what the
    Hebrew plainly warrants.
  doctrine_reference: DOCTRINE.md Translation philosophy §3 (Preserve theological
    tension rather than resolve it)
