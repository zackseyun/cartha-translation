id: JOB.19.26
reference: Job 19:26
source:
  edition: WLC
  text: וְ/אַחַ֣ר ע֭וֹרִֽ/י נִקְּפוּ זֹ֑את וּ֝/מִ/בְּשָׂרִ֗/י אֶֽחֱזֶ֥ה אֱלֽוֹהַּ־׃
translation:
  text: And after my skin has been destroyed, yet from my flesh I will see God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'in my flesh I will see God'; alternatively, 'without my flesh I will
      see God.' The Hebrew phrase is difficult and has been understood in more than
      one way.
    reason: alternative_reading
  - marker: b
    text: The clause 'after my skin has been destroyed' is textually and lexically
      difficult; more literal renderings include 'after they have struck off my skin,
      this.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אַחַר
  chosen: And after
  alternatives:
  - After
  - Even after
  lexicon: HALOT
  rationale: Temporal/sequential preposition with conjunction. 'And after' preserves
    the Hebrew linkage to the previous line while remaining natural in English.
- source_word: עוֹרִי
  chosen: my skin
  alternatives:
  - my hide
  lexicon: HALOT
  rationale: עוֹר ordinarily means 'skin, hide.' 'My skin' is the natural human-context
    rendering and preserves the bodily imagery of Job's suffering.
- source_word: נִקְּפוּ זֹאת
  chosen: has been destroyed
  alternatives:
  - has been struck off
  - has been peeled away
  - they have destroyed this
  lexicon: HALOT
  rationale: The verb נקף here is difficult and contextually refers to the ruin of
    Job's body/skin. An English passive, 'has been destroyed,' best captures the sense
    without forcing an overly literal but obscure rendering. The demonstrative זֹאת
    is taken adverbially/objectively with the clause, contributing to the sense of
    the skin's destruction rather than requiring a separate English 'this.'
- source_word: וּמִבְּשָׂרִי
  chosen: yet from my flesh
  alternatives:
  - and from my flesh
  - without my flesh
  - in my flesh
  lexicon: HALOT
  rationale: The preposition מִן most naturally means 'from/out of.' Because the clause
    is famously ambiguous, the main text keeps the concrete sense 'from my flesh'
    rather than importing a stronger doctrinal interpretation such as 'in my flesh'
    or the privative 'without my flesh.' 'Yet' reflects the adversative force in context.
- source_word: אֶחֱזֶה
  chosen: I will see
  alternatives:
  - I will behold
  - I will gaze upon
  lexicon: HALOT
  rationale: חזה commonly denotes seeing/beholding, often with heightened force. 'I
    will see' is clear modern English; the more elevated nuance can be noted by alternatives.
- source_word: אֱלוֹהַּ
  chosen: God
  alternatives:
  - God Almighty
  lexicon: HALOT
  rationale: אֱלוֹהַּ is the singular common noun/title for God in Job. 'God' is the
    direct and contextually appropriate rendering.
