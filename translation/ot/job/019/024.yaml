id: JOB.19.24
reference: Job 19:24
source:
  edition: WLC
  text: בְּ/עֵט בַּרְזֶ֥ל וְ/עֹפָ֑רֶת לָ֝/עַ֗ד בַּ/צּ֥וּר יֵחָצְבֽוּ/ן־׃
translation:
  text: with an iron stylus and lead, may they be engraved in the rock forever!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'may they be hewn into the rock forever.' The Hebrew verb ordinarily
      means 'to hew' or 'cut out'; here it refers to words being permanently inscribed.
    reason: lexical_alternative
  - marker: b
    text: Lead may refer to the metal used alongside the iron tool, possibly to fill
      the incised letters for visibility, though the text does not explicitly state
      this.
    reason: cultural_note
lexical_decisions:
- source_word: בְּעֵט
  chosen: with a stylus
  alternatives:
  - with a pen
  - with a graving tool
  lexicon: HALOT
  rationale: עֵט denotes a writing or engraving instrument. In this context, paired
    with iron and rock, an engraving tool is in view rather than an ink pen. 'Stylus'
    preserves the writing-image while fitting inscriptional usage.
- source_word: בַּרְזֶל
  chosen: iron
  lexicon: HALOT
  rationale: Straightforward material term; 'iron' specifies the stylus's substance.
- source_word: וְעֹפָרֶת
  chosen: and lead
  lexicon: HALOT
  rationale: עֹפָרֶת is the metal lead. In inscription contexts it may refer to lead
    used with engraving, possibly to fill incised letters, but the text itself simply
    names the material, so 'and lead' is retained.
- source_word: לָעַד
  chosen: forever
  alternatives:
  - for ever
  - perpetually
  lexicon: HALOT
  rationale: The term expresses enduring permanence. 'Forever' is idiomatic modern
    English and matches the wish for a lasting inscription.
- source_word: בַּצּוּר
  chosen: in the rock
  alternatives:
  - on the rock
  - in stone
  lexicon: HALOT
  rationale: צוּר commonly means rock/crag. With the passive/reflexive engraving verb,
    English idiom favors 'engraved in the rock,' conveying inscription cut into stone.
    'Rock' is more specific to the Hebrew than the broader 'stone.'
- source_word: יֵחָצְבוּן
  chosen: may they be engraved
  alternatives:
  - let them be hewn
  - may they be inscribed
  lexicon: HALOT
  rationale: From חצב, 'to hew/cut.' In context of words being recorded permanently
    in rock, the sense is that the words are cut/engraved. The imperfect here is jussive-like
    in the wish sequence begun in the previous verse, so 'may they be engraved' best
    captures both sense and mood.
