theological_decisions:
- issue: Referent of the 3ms suffix in 'his troops'
  chosen_reading: The suffix refers to God as the one Job depicts as attacking him.
  alternative_readings:
  - An unspecified enemy commander in the metaphor
  rationale: In the immediate context Job is describing God's hostile action toward
    him using siege imagery. The translation keeps the pronoun 'his' rather than making
    the referent explicit, preserving the Hebrew while allowing context to identify
    it.
