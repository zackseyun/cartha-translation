id: JOB.19.12
reference: Job 19:12
source:
  edition: WLC
  text: יַ֤חַד יָ֘בֹ֤אוּ גְדוּדָ֗י/ו וַ/יָּסֹ֣לּוּ עָלַ֣/י דַּרְכָּ֑/ם וַ/יַּחֲנ֖וּ
    סָבִ֣יב לְ/אָהֳלִֽ/י׀׃
translation:
  text: Together his troops come; they build up their road against me, and they camp
    all around my tent.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they cast up their way against me'; the Hebrew verb can evoke building
      up a road or siege ramp.
    reason: lexical_alternative
lexical_decisions:
- source_word: יַחַד
  chosen: Together
  alternatives:
  - Altogether
  - As one
  lexicon: HALOT
  rationale: Adverb indicating united or simultaneous action. 'Together' is natural
    modern English and preserves the sense of coordinated assault.
- source_word: יָבֹאוּ
  chosen: come
  alternatives:
  - arrive
  - advance
  lexicon: HALOT
  rationale: Basic sense of בוא is 'come.' In context it describes the hostile approach
    of the troops; English present is used for vivid poetic narration.
- source_word: גְדוּדָיו
  chosen: his troops
  alternatives:
  - his raiding bands
  - his army divisions
  lexicon: HALOT
  rationale: גְּדוּד commonly denotes a troop, band, or raiding party. With the 3ms
    suffix, the referent is God's forces in Job's metaphor. 'Troops' is concise and
    militarily clear without over-specifying scale.
- source_word: וַיָּסֹלּוּ
  chosen: they build up
  alternatives:
  - they cast up
  - they heap up
  lexicon: HALOT
  rationale: From סלל, often used of raising or building up a road/highway or siege
    ramp. 'Build up' communicates the image accessibly; the object 'their road' makes
    clear this is route-construction for attack.
- source_word: עָלַי
  chosen: against me
  alternatives:
  - upon me
  - over me
  lexicon: HALOT
  rationale: Although literally 'upon me,' in this hostile military context English
    'against me' best conveys adversative force.
- source_word: דַּרְכָּם
  chosen: their road
  alternatives:
  - their way
  - their path
  lexicon: HALOT
  rationale: דֶּרֶךְ can mean road, way, or path. Because the preceding verb suggests
    constructing or raising a route, 'road' preserves the military-engineering image
    better than the more abstract 'way.'
- source_word: וַיַּחֲנוּ
  chosen: they camp
  alternatives:
  - they encamp
  - they pitch camp
  lexicon: HALOT
  rationale: From חנה, to camp or encamp. 'They camp' is readable modern English while
    retaining the military setting.
- source_word: סָבִיב
  chosen: all around
  alternatives:
  - around
  - on every side of
  lexicon: HALOT
  rationale: The term denotes surrounding on every side. 'All around' brings out the
    encircling force naturally.
- source_word: לְאָהֳלִי
  chosen: my tent
  alternatives:
  - my dwelling
  - my tabernacle
  lexicon: HALOT
  rationale: אֹהֶל literally means tent. In Job's poetic setting it can stand for
    his household or dwelling, but 'tent' preserves the concrete image and traditional
    resonance.
