id: JOB.19.8
reference: Job 19:8
source:
  edition: WLC
  text: אָרְחִ֣/י גָ֭דַר וְ/לֹ֣א אֶעֱב֑וֹר וְ/עַ֥ל נְ֝תִיבוֹתַ֗/י חֹ֣שֶׁךְ יָשִֽׂים׃
translation:
  text: He has walled up my way so that I cannot pass, and he has set darkness upon
    my paths.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The subject is implicit in Hebrew; in context Job is speaking of God, though
      the verse itself says only 'he.'
    reason: alternative_reading
lexical_decisions:
- source_word: אָרְחִי
  chosen: my way
  alternatives:
  - my path
  - my road
  lexicon: HALOT
  rationale: The noun denotes a road, path, or course. 'My way' is idiomatic in English
    and can carry both literal and figurative force, fitting Job's lament about blocked
    movement and frustrated course of life.
- source_word: גָדַר
  chosen: has walled up
  alternatives:
  - has fenced in
  - has blocked
  lexicon: HALOT
  rationale: The verb means to wall up, fence, or hedge in. 'Has walled up' preserves
    the concrete image of obstruction more vividly than the more interpretive 'blocked.'
    The perfect is rendered with present relevance in English ('has walled up').
- source_word: וְלֹא אֶעֱבוֹר
  chosen: so that I cannot pass
  alternatives:
  - and I cannot pass
  - and I do not pass through
  lexicon: HALOT
  rationale: The clause expresses the result of the obstruction. 'So that I cannot
    pass' makes the relationship clear in natural English while staying close to the
    Hebrew sense. 'Pass' reflects עבר straightforwardly.
- source_word: נְתִיבוֹתַי
  chosen: my paths
  alternatives:
  - my tracks
  - my pathways
  lexicon: HALOT
  rationale: A plural noun for paths or tracks. 'My paths' preserves the plural and
    echoes the imagery of life's routes without sounding overly wooden.
- source_word: חֹשֶׁךְ
  chosen: darkness
  alternatives:
  - gloom
  lexicon: HALOT
  rationale: The noun commonly means darkness. 'Darkness' is the most direct rendering
    and suits both literal and metaphorical senses in Job's poetry.
- source_word: יָשִׂים
  chosen: has set
  alternatives:
  - has placed
  - puts
  lexicon: HALOT
  rationale: The verb means to put, set, or place. 'Has set' is concise and natural,
    matching the completed-action perspective used in the verse.
- source_word: וְעַל נְתִיבוֹתַי חֹשֶׁךְ יָשִׂים
  chosen: and he has set darkness upon my paths
  alternatives:
  - and he has put darkness on my paths
  - and he darkens my paths
  lexicon: HALOT
  rationale: Retaining 'upon my paths' preserves the Hebrew preposition and the poetic
    image of darkness laid over Job's course. A compressed rendering like 'he darkens
    my paths' is possible but loses the concrete verbal picture.
