theological_decisions:
- issue: Referent of the third-person subject
  chosen_reading: he
  alternative_readings:
  - God/the LORD
  rationale: The Hebrew uses an unstated third-person masculine singular subject.
    In context Job is speaking about God's actions against him, but the verse itself
    does not name God explicitly. Rendering the pronoun as 'he' preserves the literary
    flow and avoids importing an explicit divine name not present in the text.
  doctrine_reference: Translation philosophy §1, §3
