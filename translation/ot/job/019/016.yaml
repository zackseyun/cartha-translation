id: JOB.19.16
reference: Job 19:16
source:
  edition: WLC
  text: לְ/עַבְדִּ֣/י קָ֭רָאתִי וְ/לֹ֣א יַעֲנֶ֑ה בְּמוֹ פִ֝֗/י אֶתְחַנֶּן לֽ/וֹ־־׃
translation:
  text: I call to my servant, but he does not answer; I must plead with him with my
    own mouth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to my slave.' The Hebrew עֶבֶד can denote either a servant or a slave
      depending on context.
    reason: lexical_alternative
  - marker: b
    text: Or 'I called to my servant, but he did not answer; I entreated him with
      my own mouth.' The Hebrew verbal forms can be rendered more strictly as pasts.
    reason: lexical_alternative
lexical_decisions:
- source_word: לְעַבְדִּי
  chosen: to my servant
  alternatives:
  - to my slave
  lexicon: HALOT
  rationale: עֶבֶד commonly means servant/slave. Here Job speaks of a household subordinate.
    Because the bonded status is not the theological focus but the social indignity
    is, 'servant' is the smoother main-text rendering, while 'slave' remains a viable
    alternative.
- source_word: קָרָאתִי
  chosen: I call
  alternatives:
  - I called
  - I cry out
  lexicon: HALOT
  rationale: קרא in the perfect can be rendered as a present in English poetic discourse
    to convey vivid ongoing complaint. 'I call' fits the lament context naturally;
    'I called' is possible but sounds more narrowly past.
- source_word: וְלֹא יַעֲנֶה
  chosen: but he does not answer
  alternatives:
  - and he does not answer
  - but he will not answer
  lexicon: HALOT
  rationale: ענה means 'answer/respond.' The conjunction is rendered adversatively
    as 'but' because the sense is contrastive. The imperfect here expresses the servant's
    non-response in the present situation, not necessarily future refusal.
- source_word: בְּמוֹ פִי
  chosen: with my own mouth
  alternatives:
  - with my mouth
  - personally
  lexicon: HALOT
  rationale: 'The phrase intensifies the personal humiliation: Job must entreat directly,
    from his own mouth. ''With my own mouth'' preserves the emphasis better than the
    flatter ''with my mouth,'' while avoiding over-paraphrase.'
- source_word: אֶתְחַנֶּן לוֹ
  chosen: I must plead with him
  alternatives:
  - I beg him for favor
  - I implore him
  - I entreat him
  lexicon: HALOT
  rationale: חנן in the hitpael conveys seeking favor or pleading for mercy. In context
    Job is reduced to begging his own servant. 'I must plead with him' captures both
    the entreaty and the humiliating necessity implied by the line.
