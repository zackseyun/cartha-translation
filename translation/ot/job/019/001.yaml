id: JOB.19.1
reference: Job 19:1
source:
  edition: WLC
  text: וַ/יַּ֥עַן אִיּ֗וֹב וַ/יֹּאמַֽר׃
translation:
  text: 'Then Job answered and said:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'And Job answered and said.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַן
  chosen: answered
  alternatives:
  - responded
  lexicon: HALOT
  rationale: The verb ענה in this narrative formula commonly means 'answer/respond.'
    'Answered' preserves the conventional dialogic sense and fits the Hebrew idiom
    introducing a speech.
- source_word: אִיּוֹב
  chosen: Job
  rationale: Personal names are transliterated by standard English convention per
    project philosophy.
- source_word: וַיֹּאמַר
  chosen: said
  alternatives:
  - spoke
  lexicon: HALOT
  rationale: אמר is the standard verb 'say.' In the formula 'answered and said,' retaining
    'said' reflects the Hebrew structure without unnecessary paraphrase.
- source_word: וַ
  chosen: Then
  alternatives:
  - And
  rationale: The prefixed waw on the opening verb marks narrative sequence. 'Then'
    gives natural modern English while preserving the discourse progression better
    than a mechanically repeated 'And'.
