id: JOB.19.13
reference: Job 19:13
source:
  edition: WLC
  text: אַ֭חַ/י מֵ/עָלַ֣/י הִרְחִ֑יק וְ֝/יֹדְעַ֗/י אַךְ זָ֥רוּ מִמֶּֽ/נִּי־׃
translation:
  text: He has driven my brothers far from me, and those who know me are wholly estranged
    from me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'He has removed my brothers from me.'
    reason: lexical_alternative
  - marker: b
    text: Or 'those who know me have become strangers to me.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַחַי
  chosen: my brothers
  alternatives:
  - my kin
  - my brothers and sisters
  lexicon: HALOT
  rationale: The noun is the masculine plural construct with 1cs suffix, literally
    'my brothers.' In Job's lament it can extend to close kin, but 'brothers' best
    preserves the lexical form and the social force. A more inclusive paraphrase like
    'siblings' would go beyond the Hebrew; 'kin' is possible but less direct.
- source_word: מֵעָלַי
  chosen: far from me
  alternatives:
  - away from me
  - from upon me
  lexicon: HALOT
  rationale: The preposition מן with עַל plus 1cs suffix is idiomatic here in combination
    with הרחיק, expressing removal away from Job's presence or sphere. 'Far from me'
    gives natural English while preserving the sense of distance.
- source_word: הִרְחִיק
  chosen: has driven ... far
  alternatives:
  - has removed
  - has put at a distance
  lexicon: HALOT
  rationale: Hiphil perfect 3ms of רחק means 'cause to be far, remove, distance.'
    The implied subject is God from the surrounding context. 'Has driven ... far'
    captures the causative force and the emotional sharpness of Job's complaint better
    than the flatter 'removed.'
- source_word: וְיֹדְעַי
  chosen: those who know me
  alternatives:
  - my acquaintances
  - my familiar friends
  lexicon: HALOT
  rationale: 'From ידע, Qal participial/plural construct with 1cs suffix: literally
    ''my knowers,'' meaning those acquainted with Job. ''Those who know me'' is transparent
    and natural; ''acquaintances'' is possible but slightly narrower and less vivid.'
- source_word: אַךְ
  chosen: wholly
  alternatives:
  - surely
  - indeed
  - completely
  lexicon: HALOT
  rationale: אַךְ can mark emphasis ('surely, indeed') or limitation/intensification.
    Here it strengthens the following predicate, indicating the completeness of the
    estrangement. 'Wholly' conveys that force in idiomatic English.
- source_word: זָרוּ
  chosen: are wholly estranged
  alternatives:
  - have become strangers
  - are alienated
  lexicon: HALOT
  rationale: Qal perfect 3cp of זוּר/זרר in this context means to become strange/estranged,
    to act as strangers. 'Are wholly estranged' fits the stative-result sense in English
    and pairs well with the emphatic אַךְ. 'Have become strangers' is a viable, more
    literal alternative.
- source_word: מִמֶּנִּי
  chosen: from me
  alternatives:
  - to me
  lexicon: HALOT
  rationale: 'The preposition מן with 1cs suffix marks separation: they are estranged
    ''from me,'' not merely strange ''to me.'' This preserves the relational rupture
    expressed in the Hebrew.'
