theological_decisions:
- issue: Implied subject of הִרְחִיק
  chosen_reading: The English keeps the implicit third-person singular subject as
    'He,' reflecting the Hebrew and the immediate context in which Job attributes
    his affliction to God.
  alternative_readings:
  - God has driven my brothers far from me
  rationale: The Hebrew verb has an unstated 3ms subject. Because the surrounding
    passage makes clear that Job is speaking of God's action, 'He' preserves the source-text
    economy without over-specifying in the verse itself. Explicitly naming 'God' would
    be interpretively correct in context but less formally aligned with the Hebrew
    wording.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
