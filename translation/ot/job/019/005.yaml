id: JOB.19.5
reference: Job 19:5
source:
  edition: WLC
  text: אִם אָ֭מְנָם עָלַ֣/י תַּגְדִּ֑ילוּ וְ/תוֹכִ֥יחוּ עָ֝לַ֗/י חֶרְפָּתִּֽ/י־׃
translation:
  text: If indeed you would magnify yourselves against me and prove my disgrace against
    me,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'make yourselves great over me.' The Hebrew verb can express exalting
      oneself at another's expense.
    reason: lexical_alternative
  - marker: b
    text: Or 'argue my reproach against me' or 'use my disgrace as proof against me.'
      The Hebrew verb has a forensic sense of proving or establishing a case.
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  chosen: If
  alternatives:
  - Surely if
  - Indeed if
  lexicon: HALOT
  rationale: 'Introduces a conditional clause. In context it sets up Job''s accusation
    hypothetically: ''if indeed you...'' rather than a simple assertion.'
- source_word: אָמְנָם
  chosen: indeed
  alternatives:
  - truly
  - really
  - in fact
  lexicon: HALOT
  rationale: Adds emphatic force to the condition. 'Indeed' preserves the adverbial
    emphasis without sounding archaic.
- source_word: עָלַי
  chosen: against me
  alternatives:
  - over me
  - upon me
  lexicon: HALOT
  rationale: With the following verbs, the preposition conveys hostile opposition
    rather than mere spatial relation. 'Against me' fits both clauses idiomatically
    in English.
- source_word: תַּגְדִּילוּ
  chosen: would magnify yourselves
  alternatives:
  - make yourselves great
  - exalt yourselves
  - boast yourselves
  lexicon: HALOT
  rationale: Hiphil of גדל here has the sense of making oneself great over someone,
    i.e., exalting oneself at another's expense. 'Magnify yourselves' preserves the
    verbal imagery and the adversarial nuance.
- source_word: וְתוֹכִיחוּ
  chosen: prove
  alternatives:
  - argue
  - reprove
  - demonstrate
  - convict
  lexicon: HALOT
  rationale: The Hiphil of יכח can mean to prove, argue, or establish a case. Here
    Job accuses his friends of using his shame as evidence against him; 'prove' best
    captures forensic force in natural English.
- source_word: חֶרְפָּתִי
  chosen: my disgrace
  alternatives:
  - my reproach
  - my shame
  - my humiliation
  lexicon: HALOT
  rationale: The noun denotes reproach, disgrace, or shame. 'My disgrace' communicates
    both the social dishonor and the object being wielded against Job. 'Reproach'
    is possible but less natural for modern readers.
