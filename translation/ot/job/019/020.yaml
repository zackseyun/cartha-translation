id: JOB.19.20
reference: Job 19:20
source:
  edition: WLC
  text: בְּ/עוֹרִ֣/י וּ֭/בִ/בְשָׂרִ/י דָּבְקָ֣ה עַצְמִ֑/י וָ֝/אֶתְמַלְּטָ֗/ה בְּ/ע֣וֹר
    שִׁנָּֽ/י׃
translation:
  text: My bone clings to my skin and to my flesh, and I have escaped with the skin
    of my teeth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'by the skin of my teeth.' The Hebrew idiom expresses an extremely narrow
      escape.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'my bone' (singular), likely used collectively for Job's skeletal
      frame; some translations render 'my bones.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּעוֹרִי
  chosen: to my skin
  alternatives:
  - with my skin
  - in my skin
  lexicon: HALOT
  rationale: עוֹר means 'skin/hide.' With דבקה ('clings'), English idiom prefers 'clings
    to my skin' rather than a more wooden 'in/with my skin.'
- source_word: וּבִבְשָׂרִי
  chosen: and to my flesh
  alternatives:
  - and to my body
  lexicon: HALOT
  rationale: בשר commonly means 'flesh' in literal bodily contexts. Here it parallels
    'skin' and describes Job's emaciated physical condition, so the literal 'flesh'
    is best.
- source_word: דָּבְקָה עַצְמִי
  chosen: My bone clings
  alternatives:
  - my bones cling
  - my bone sticks fast
  lexicon: HALOT
  rationale: The Hebrew has singular עַצְמִי ('my bone'), likely a collective singular
    referring to the skeletal frame. English can preserve this with 'My bone clings,'
    though 'bones' is a possible smoothing. דבק conveys sticking/clinging closely.
- source_word: וָאֶתְמַלְּטָה
  chosen: and I have escaped
  alternatives:
  - and I escape
  - and I am delivered
  - and I have barely escaped
  lexicon: HALOT
  rationale: The verb from מלט denotes escaping/deliverance. In context Job speaks
    of surviving in an extreme, reduced state; English present perfect 'have escaped'
    communicates resultant survival. 'Barely' is interpretive and therefore left out
    of the main text.
- source_word: בְּעוֹר שִׁנָּי
  chosen: with the skin of my teeth
  alternatives:
  - by the skin of my teeth
  lexicon: HALOT
  rationale: This is the well-known idiom reflected directly by the Hebrew. 'With'
    matches the preposition ב closely, while 'by' is a natural English alternative.
    The phrase conveys an extremely narrow escape, even though teeth literally have
    no skin.
