id: JOB.19.29
reference: Job 19:29
source:
  edition: WLC
  text: גּ֤וּרוּ לָ/כֶ֨ם מִ/פְּנֵי חֶ֗רֶב כִּֽי חֵ֭מָה עֲוֺנ֣וֹת חָ֑רֶב לְמַ֖עַן תֵּדְע֣וּ/ן
    ש/דין׀־־׃ס
translation:
  text: Be afraid of the sword yourselves, for wrath brings the punishments of the
    sword, so that you may know that there is judgment.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'that the Almighty exists'; the final Hebrew expression is difficult
      and has also been understood as 'that there are judgments' or 'that there is
      a judge.'
    reason: alternative_reading
lexical_decisions:
- source_word: גּוּרוּ
  chosen: Be afraid
  alternatives:
  - Dread
  - Fear
  lexicon: HALOT
  rationale: Imperative plural from גור in the Qal, here best taken as an exhortation
    to fear or dread. 'Be afraid' is natural modern English and preserves the warning
    force.
- source_word: לָכֶם
  chosen: yourselves
  alternatives:
  - for yourselves
  lexicon: HALOT
  rationale: The dative pronoun adds emphasis to the imperative. 'Yourselves' brings
    out the reflexive/emphatic sense in idiomatic English.
- source_word: מִפְּנֵי חֶרֶב
  chosen: of the sword
  alternatives:
  - because of the sword
  - before the sword
  lexicon: HALOT
  rationale: The preposition with 'face/presence' idiomatically means 'from/because
    of/before' in the sense of fearing on account of the sword. 'Of the sword' after
    'be afraid' is concise and idiomatic.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces the reason for the warning, so 'for' fits the explanatory
    connection.
- source_word: חֵמָה
  chosen: wrath
  alternatives:
  - rage
  - fury
  lexicon: HALOT
  rationale: Denotes burning anger or wrath. 'Wrath' preserves the moral and judicial
    tone of the context better than the more emotional 'rage'.
- source_word: עֲוֺנוֹת
  chosen: punishments
  alternatives:
  - iniquities
  - punishments for iniquities
  lexicon: HALOT
  rationale: Although the noun often means 'iniquities,' in context with 'sword' and
    judgment it likely carries the sense of consequences or punishments due to guilt.
    Rendering it as 'punishments' yields coherent sense in the clause.
- source_word: חָרֶב
  chosen: of the sword
  alternatives:
  - by the sword
  lexicon: HALOT
  rationale: Linked with the previous terms to express punishments associated with
    the sword. 'Of the sword' keeps the Hebrew terseness while remaining intelligible.
- source_word: לְמַעַן
  chosen: so that
  alternatives:
  - in order that
  lexicon: HALOT
  rationale: Standard purposive conjunction.
- source_word: תֵּדְעוּן
  chosen: you may know
  alternatives:
  - you will know
  lexicon: HALOT
  rationale: 'Imperfect plural after לְמַעַן is naturally purposive: ''so that you
    may know.'''
- source_word: שדין
  chosen: that there is judgment
  alternatives:
  - the Almighty
  - judgments
  - a judge
  lexicon: HALOT
  rationale: 'The consonantal form is difficult and has been understood in more than
    one way. In context, the sense ''judgment'' fits the warning: Job''s friends should
    know that divine judgment exists. This also aligns with many modern translations
    that construe the clause around judgment rather than a divine title.'
