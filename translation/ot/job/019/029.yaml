theological_decisions:
- issue: Interpretation of the difficult final expression שדין
  chosen_reading: that there is judgment
  alternative_readings:
  - that the Almighty exists
  - that there are judgments
  - that there is a judge
  rationale: The Hebrew form is textually and lexically difficult. In context, Job
    warns his friends that their hostility exposes them to retributive justice; therefore
    a rendering centered on 'judgment' best preserves the immediate sense without
    over-specifying a textual emendation. Because the alternatives are longstanding
    and significant, they are preserved in a footnote.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
