id: JOB.19.15
reference: Job 19:15
source:
  edition: WLC
  text: גָּ֘רֵ֤י בֵיתִ֣/י וְ֭/אַמְהֹתַ/י לְ/זָ֣ר תַּחְשְׁבֻ֑/נִי נָ֝כְרִ֗י הָיִ֥יתִי
    בְ/עֵינֵי/הֶֽם׃
translation:
  text: The guests in my house and my female servants count me as a stranger; I have
    become a foreigner in their eyes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'The sojourners of my house' or 'The lodgers in my house.' The Hebrew
      term can refer to temporary residents or dependents living within a household.
    reason: lexical_alternative
  - marker: b
    text: '''Female servants'' may also be rendered ''maidservants.'' The Hebrew term
      refers to women in a servile household role.'
    reason: lexical_alternative
  - marker: c
    text: The second clause uses 'foreigner' where the first uses 'stranger,' preserving
      the Hebrew's near-parallel but slightly varied vocabulary.
    reason: lexical_alternative
lexical_decisions:
- source_word: גָּרֵי
  chosen: guests
  alternatives:
  - sojourners
  - resident aliens
  - lodgers
  lexicon: HALOT
  rationale: From גור/גֵּר, referring to those residing temporarily or dependently
    in one's household. In Job's domestic setting, 'guests' gives natural English
    while preserving the idea that even non-family dependents in his house now treat
    him as alien. 'Sojourners' is more formal but less idiomatic here.
- source_word: בֵיתִי
  chosen: in my house
  alternatives:
  - of my house
  - in my household
  lexicon: HALOT
  rationale: Construct phrase with גָּרֵי, literally 'sojourners of my house.' Rendered
    idiomatically as 'the guests in my house' to express household association in
    natural English.
- source_word: אַמְהֹתַי
  chosen: my female servants
  alternatives:
  - my maidservants
  - my slave girls
  lexicon: HALOT
  rationale: אָמָה denotes a female servant/slave. 'Female servants' is clear modern
    English and avoids archaic 'maidservants.' 'Slave girls' is possible but may over-specify
    age and social nuance not explicit in the form.
- source_word: לְזָר
  chosen: as a stranger
  alternatives:
  - for a stranger
  - as an outsider
  lexicon: HALOT
  rationale: זָר means stranger/outsider, one not belonging. With חשב, the sense is
    'regard/count as.' 'As a stranger' best matches the predicative force.
- source_word: תַּחְשְׁבֻנִי
  chosen: count me
  alternatives:
  - regard me
  - consider me
  lexicon: HALOT
  rationale: חשב commonly means think, account, reckon. 'Count me' is concise and
    idiomatic with the following predicate 'as a stranger.'
- source_word: נָכְרִי
  chosen: a foreigner
  alternatives:
  - an alien
  - a stranger
  lexicon: HALOT
  rationale: נָכְרִי often denotes a foreigner or one recognized as outside the group.
    Rendering it 'a foreigner' preserves the intensification from זָר in the previous
    clause without flattening the parallelism into exact repetition.
- source_word: הָיִיתִי
  chosen: I have become
  alternatives:
  - I was
  - I became
  lexicon: HALOT
  rationale: The perfect here expresses Job's resultant state in context. 'I have
    become' captures the present relevance of his social estrangement.
- source_word: בְעֵינֵיהֶם
  chosen: in their eyes
  alternatives:
  - to them
  - in their sight
  lexicon: HALOT
  rationale: Hebrew idiom for perception or evaluation. 'In their eyes' preserves
    the metaphor and is standard English.
