theological_decisions:
- issue: Referent of אֵל in the comparison כְמוֹ אֵל
  chosen_reading: God
  alternative_readings:
  - a god
  - the mighty one
  rationale: The verse is a lament addressed to Job's companions, accusing them of
    treating him with a severity comparable to divine assault. Rendering אֵל as 'God'
    best captures the force of the comparison in context without introducing polytheistic
    ambiguity.
