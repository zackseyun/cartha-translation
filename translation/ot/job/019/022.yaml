id: JOB.19.22
reference: Job 19:22
source:
  edition: WLC
  text: לָ֭/מָּה תִּרְדְּפֻ֣/נִי כְמוֹ אֵ֑ל וּ֝/מִ/בְּשָׂרִ֗/י לֹ֣א תִשְׂבָּֽעוּ־׃
translation:
  text: Why do you pursue me like God, and are not satisfied with my flesh?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Why do you pursue me like a god?' The Hebrew אֵל can also mean 'god'
      or, less likely here, 'mighty one.'
    reason: alternative_reading
  - marker: b
    text: Literally 'from my flesh.' The expression likely means being satisfied by
      consuming or preying upon Job's very flesh, a vivid image for relentless hostility.
    reason: lexical_alternative
lexical_decisions:
- source_word: לָמָּה
  chosen: Why
  lexicon: HALOT
  rationale: Interrogative adverb introducing Job's protest question; straightforwardly
    rendered 'Why.'
- source_word: תִּרְדְּפֻנִי
  chosen: do you pursue me
  alternatives:
  - do you persecute me
  - do you chase me
  lexicon: HALOT
  rationale: From רדף, 'to pursue, chase, persecute.' In context of hostile treatment
    by Job's companions, 'pursue' preserves the metaphorical hostility without over-specifying
    legal or religious persecution.
- source_word: כְמוֹ
  chosen: like
  alternatives:
  - as
  lexicon: HALOT
  rationale: Simple comparative particle; 'like' is natural modern English.
- source_word: אֵל
  chosen: God
  alternatives:
  - a god
  - the mighty one
  lexicon: HALOT
  rationale: Although אֵל can denote 'god' or 'mighty one,' in this context Job compares
    his friends' relentless pursuit to divine pursuit or judgment. Capitalized 'God'
    best reflects the likely referent in English.
- source_word: וּמִבְּשָׂרִי
  chosen: with my flesh
  alternatives:
  - from my flesh
  - by my flesh
  - with my body
  lexicon: HALOT
  rationale: The preposition מִן after the conjunction can be taken idiomatically
    with שבע ('be satisfied') to express what one feeds on or has enough from. English
    idiom works best as 'with my flesh,' preserving the vivid bodily image. 'Body'
    is possible but weakens the concrete Hebrew 'flesh.'
- source_word: לֹא תִשְׂבָּעוּ
  chosen: are not satisfied
  alternatives:
  - do you not have enough
  - are you not sated
  lexicon: HALOT
  rationale: From שבע, 'to be satisfied, sated.' Present English 'are not satisfied'
    fits the rhetorical question and keeps the metaphor of insatiable hostility.
