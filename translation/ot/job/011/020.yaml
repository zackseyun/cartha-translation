id: JOB.11.20
reference: Job 11:20
source:
  edition: WLC
  text: וְ/עֵינֵ֥י רְשָׁעִ֗ים תִּ֫כְלֶ֥ינָה וּ֭/מָנוֹס אָבַ֣ד מִנְ/הֶ֑ם וְ֝/תִקְוָתָ֗/ם
    מַֽפַּח נָֽפֶשׁ־׃פ
translation:
  text: But the eyes of the wicked will fail, and escape will perish from them, and
    their hope will be a last breath.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their hope is the breathing out of life,' that is, an expiring breath.
      The Hebrew phrase is difficult; 'a last breath' captures the likely sense while
      preserving the death imagery.
    reason: lexical_alternative
lexical_decisions:
- source_word: עֵינֵי
  chosen: the eyes of
  alternatives:
  - eyes
  lexicon: HALOT
  rationale: Literal rendering of the construct plural 'eyes of.' In context it functions
    idiomatically with the following verb to express failing expectation or exhausted
    looking, but retaining 'eyes' preserves the Hebrew imagery.
- source_word: רְשָׁעִים
  chosen: the wicked
  alternatives:
  - wicked people
  - the guilty
  lexicon: HALOT
  rationale: Standard rendering for the plural adjective/substantive referring to
    morally evil persons. 'The wicked' is concise and idiomatic in English.
- source_word: תִּכְלֶינָה
  chosen: will fail
  alternatives:
  - will waste away
  - will come to an end
  - will be exhausted
  lexicon: HALOT
  rationale: From כלה, here with 'eyes' as subject. 'Will fail' best captures the
    idiom of eyes growing dim/exhausted in expectation without over-paraphrasing.
- source_word: מָנוֹס
  chosen: escape
  alternatives:
  - refuge
  - flight
  lexicon: HALOT
  rationale: The noun denotes a place or means of fleeing. 'Escape' fits the parallel
    with perishing hope and reads naturally in English; 'refuge' would suggest a place
    of safety more than the act/possibility of getting away.
- source_word: אָבַד
  chosen: will perish
  alternatives:
  - has perished
  - will vanish
  - is lost
  lexicon: HALOT
  rationale: Although morphologically a qatal form, in this poetic context it participates
    in the future-oriented description alongside the surrounding imperfects. 'Will
    perish' preserves the force and parallelism in English.
- source_word: מִנְהֶם
  chosen: from them
  alternatives:
  - for them
  lexicon: HALOT
  rationale: The preposition מן is best rendered 'from,' indicating that any possibility
    of escape is removed from the wicked.
- source_word: תִקְוָתָם
  chosen: their hope
  alternatives:
  - their expectation
  lexicon: HALOT
  rationale: '''Hope'' is the most natural and common rendering, while still allowing
    the sense of expectation in context.'
- source_word: מַפַּח נָפֶשׁ
  chosen: a last breath
  alternatives:
  - the breathing out of life
  - an expiring breath
  - despair
  lexicon: HALOT
  rationale: This difficult phrase is literally related to 'breathing out' or 'snorting/breathing
    of the soul/life.' In context it denotes dying breath rather than positive expectation.
    'A last breath' is concise, vivid, and faithful to the image. 'Despair' is interpretive
    and less transparent to the Hebrew imagery.
