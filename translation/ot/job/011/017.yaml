id: JOB.11.17
reference: Job 11:17
source:
  edition: WLC
  text: וּֽ֭/מִ/צָּהֳרַיִם יָק֣וּם חָ֑לֶד תָּ֝עֻ֗פָ/ה כַּ/בֹּ֥קֶר תִּהְיֶֽה׃
translation:
  text: And your lifetime will rise brighter than noon; though there is darkness,
    it will become like the morning.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'And your life will be brighter than noon; darkness will be like the
      morning.' The Hebrew includes several compressed poetic expressions, especially
      in the second line.
    reason: alternative_reading
  - marker: b
    text: The Hebrew word translated 'lifetime' can also mean 'life' or, more broadly,
      one's earthly existence.
    reason: lexical_alternative
  - marker: c
    text: The rare Hebrew term rendered 'darkness' is uncertain; alternatives include
      'gloom' or 'obscurity.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמִצָּהֳרַיִם
  chosen: brighter than noon
  alternatives:
  - from noon
  - than midday
  - like noon
  lexicon: HALOT
  rationale: The preposition מִן with צָהֳרַיִם can mark comparison ('than noon/midday')
    rather than simple source ('from noon'). In context, Zophar is describing the
    brightness of Job's future condition, so comparative force is most natural in
    English. 'Noon' is more idiomatic than 'midday' here.
- source_word: יָקוּם
  chosen: will rise
  alternatives:
  - will arise
  - will stand up
  lexicon: HALOT
  rationale: קום commonly means 'rise/arise.' Here it metaphorically describes Job's
    condition or life becoming prominent/bright. 'Will rise' preserves the image without
    over-literal awkwardness.
- source_word: חָלֶד
  chosen: your lifetime
  alternatives:
  - your life
  - your age
  - your world
  lexicon: HALOT
  rationale: חָלֶד can denote lifetime, duration of life, or worldly life. In this
    context it refers to the course of Job's life becoming brighter. 'Your lifetime'
    captures the temporal sense more precisely than the broader 'your life,' while
    remaining natural English.
- source_word: תָּעֻפָה
  chosen: though there is darkness
  alternatives:
  - darkness
  - gloom
  - obscurity
  lexicon: HALOT
  rationale: 'This rare term is difficult and has been understood as ''darkness/gloom''
    in contrast with the following ''morning.'' The clause is concessive in sense:
    even if darkness remains, it will turn to morning-like brightness. Rendering the
    implied concessive relation in English best communicates the Hebrew poetic contrast.'
- source_word: כַּבֹּקֶר
  chosen: like the morning
  alternatives:
  - as the morning
  - like dawn
  lexicon: HALOT
  rationale: בֹּקֶר is 'morning.' 'Like the morning' preserves the simile introduced
    by כ and matches the imagery of darkness giving way to light.
- source_word: תִּהְיֶה
  chosen: it will become
  alternatives:
  - it will be
  lexicon: HALOT
  rationale: היה is often simply 'be,' but in this poetic context English 'become'
    better expresses the transformation from darkness to morning-like brightness that
    the verse depicts.
