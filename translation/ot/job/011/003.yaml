id: JOB.11.3
reference: Job 11:3
source:
  edition: WLC
  text: בַּ֭דֶּי/ךָ מְתִ֣ים יַחֲרִ֑ישׁו וַ֝/תִּלְעַ֗ג וְ/אֵ֣ין מַכְלִֽם׃
translation:
  text: Will your empty talk make men keep silent, and when you mock, will no one
    shame you?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your boasts' or 'your babblings' for 'your empty talk.' The Hebrew term
      can denote empty, idle, boastful, or false speech.
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּדֶּיךָ
  chosen: your empty talk
  alternatives:
  - your boasts
  - your babblings
  - your idle talk
  - your lies
  lexicon: HALOT
  rationale: The noun בד means empty or idle speech, often with the sense of boastful
    or false talk. In context Zophar rebukes Job's many words, so 'empty talk' captures
    both the dismissive tone and the semantic range without overcommitting to 'lies.'
- source_word: מְתִים
  chosen: men
  alternatives:
  - mortals
  - people
  lexicon: HALOT
  rationale: The plural noun literally denotes men/persons. Here it refers generally
    to other people who might be silenced by Job's speech. 'Men' is gender-accurate
    to the Hebrew form and idiomatic in English; 'people' is possible but less formally
    aligned.
- source_word: יַחֲרִישׁו
  chosen: make ... keep silent
  alternatives:
  - silence
  - make ... be quiet
  lexicon: HALOT
  rationale: Hiphil of חרש means to cause silence or keep silent. Rendering with 'make
    men keep silent' preserves the causative nuance and fits the rhetorical question.
- source_word: וַתִּלְעַג
  chosen: when you mock
  alternatives:
  - and you mock
  - when you deride
  - when you scoff
  lexicon: HALOT
  rationale: The verb לעג means to mock or deride. Although formally waw + imperfect,
    in this poetic rhetorical sequence 'when you mock' gives natural English and links
    the second clause conditionally to the first.
- source_word: מַכְלִם
  chosen: shame you
  alternatives:
  - humiliate you
  - put you to shame
  - rebuke you
  lexicon: HALOT
  rationale: Hiphil participle of כלם denotes causing shame or disgrace. 'Shame you'
    is concise and preserves the interpersonal force better than the more interpretive
    'rebuke you.'
