theological_decisions:
- issue: Referent of the pronoun in אֵלָיו
  chosen_reading: The pronoun refers to God, rendered 'to him' rather than explicitly
    'to God.'
  alternative_readings:
  - Leave the referent entirely implicit
  - Render explicitly 'to God' for clarity
  rationale: The immediate context is an exhortation about repentance and appeal before
    God. Rendering 'to him' preserves the Hebrew pronoun and avoids adding an explicit
    noun not present in the text, while still allowing the contextual referent to
    be understood.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    what the source text says without importing more specificity than warranted.'
