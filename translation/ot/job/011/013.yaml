id: JOB.11.13
reference: Job 11:13
source:
  edition: WLC
  text: אִם אַ֭תָּ֗ה הֲכִינ֣וֹתָ לִבֶּ֑/ךָ וּ/פָרַשְׂתָּ֖ אֵלָ֣י/ו כַּפֶּֽ/ךָ־׃
translation:
  text: If you prepare your heart and stretch out your hands to him,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'spread out your hand to him.' The Hebrew uses a singular noun for 'palm/hand,'
      but the expression commonly refers to the prayer gesture of outstretched hands.
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  chosen: If
  alternatives:
  - Surely if
  - When
  lexicon: HALOT
  rationale: Introduces a conditional clause. 'If' is the most straightforward rendering
    in context, preserving Zophar's conditional appeal.
- source_word: אַתָּה
  chosen: you
  lexicon: HALOT
  rationale: Second masculine singular pronoun addressed directly to Job. English
    does not require an explicit pronoun for sense, but it is naturally retained for
    emphasis and clarity.
- source_word: הֲכִינוֹתָ
  chosen: prepare
  alternatives:
  - set in order
  - direct
  - establish
  lexicon: HALOT
  rationale: From כון in the Hiphil, conveying making something firm, ready, or properly
    directed. 'Prepare' fits the idiom with 'heart' in clear modern English without
    over-interpreting the inward action.
- source_word: לִבֶּךָ
  chosen: your heart
  alternatives:
  - your mind
  lexicon: HALOT
  rationale: לֵב/לֵבָב commonly denotes the inner person, including thought and will.
    'Heart' preserves the Hebrew anthropological term and avoids flattening it to
    mere intellect.
- source_word: וּפָרַשְׂתָּ
  chosen: and stretch out
  alternatives:
  - and spread out
  - and extend
  lexicon: HALOT
  rationale: From פרשׂ, used of spreading or extending. In prayer/posture contexts,
    'stretch out' is idiomatic English and matches the likely gesture implied here.
- source_word: אֵלָיו
  chosen: to him
  alternatives:
  - toward him
  lexicon: HALOT
  rationale: The preposition marks direction toward a masculine singular referent,
    here God in context. 'To him' is natural English and preserves the directional
    sense.
- source_word: כַּפֶּךָ
  chosen: your hands
  alternatives:
  - your palm
  - your hand
  lexicon: HALOT
  rationale: 'Though singular in form with a collective sense (''your palm/hand''),
    English idiom in the gesture of prayer normally uses the plural: ''stretch out
    your hands.'' This best conveys the Hebrew expression in natural English.'
