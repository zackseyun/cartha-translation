theological_decisions:
- issue: Referent of the second-person singular in 'in your eyes'
  chosen_reading: Addressed to God
  alternative_readings:
  - Addressed more generally to the interlocutor
  rationale: Within Zophar's speech, he is summarizing Job as claiming purity before
    God. The singular suffix naturally fits direct address to God in the reported
    claim, and the English preserves that without over-explication.
