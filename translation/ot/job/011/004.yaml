id: JOB.11.4
reference: Job 11:4
source:
  edition: WLC
  text: וַ֭/תֹּאמֶר זַ֣ךְ לִקְחִ֑/י וּ֝/בַ֗ר הָיִ֥יתִי בְ/עֵינֶֽי/ךָ׃
translation:
  text: For you say, ‘My teaching is pure, and I am clean in your eyes.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my instruction' or 'my discourse.' The Hebrew noun can refer to what
      one has received or set forth as teaching.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתֹּאמֶר
  chosen: you say
  alternatives:
  - you said
  lexicon: HALOT
  rationale: Qal wayyiqtol 2ms of אמר addressed to Job by Zophar. In this poetic disputation,
    English present 'you say' best conveys the accusation as a current claim, though
    a simple past is grammatically possible.
- source_word: זַךְ
  chosen: pure
  alternatives:
  - clean
  - innocent
  - clear
  lexicon: HALOT
  rationale: Adjective meaning pure/clean. 'Pure' fits the predicative claim about
    Job's לִקְחִי and avoids redundancy with the later בַר, which is rendered 'clean.'
- source_word: לִקְחִי
  chosen: my teaching
  alternatives:
  - my instruction
  - my discourse
  - my speech
  lexicon: HALOT
  rationale: From לקח, which can denote learning, teaching, or instruction rather
    than merely a spoken utterance. In context Zophar summarizes Job's claims about
    the soundness of what he has set forth; 'my teaching' captures the content of
    his expressed position. 'My speech' is possible but less tied to the noun's usual
    semantic range.
- source_word: וּבַר
  chosen: clean
  alternatives:
  - pure
  - innocent
  - spotless
  lexicon: HALOT
  rationale: Adjective meaning clean/pure. Rendered 'clean' here to preserve a distinction
    from זך ('pure') while keeping the semantic overlap evident.
- source_word: הָיִיתִי
  chosen: I am
  alternatives:
  - I have been
  - I was
  lexicon: HALOT
  rationale: 'Though formally perfect 1cs of היה, in this reported self-claim it functions
    naturally as a present state in English: Job is being accused of claiming present
    cleanness before God.'
- source_word: בְעֵינֶיךָ
  chosen: in your eyes
  alternatives:
  - before you
  - in your sight
  lexicon: HALOT
  rationale: Idiomatic Hebrew expression for evaluation before another, here singular
    masculine 'your' addressed ultimately to God in Zophar's characterization of Job's
    claim. 'In your eyes' preserves the Hebrew image and remains natural English.
