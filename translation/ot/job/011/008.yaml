id: JOB.11.8
reference: Job 11:8
source:
  edition: WLC
  text: גָּבְהֵ֣י שָׁ֭מַיִם מַה תִּפְעָ֑ל עֲמֻקָּ֥ה מִ֝/שְּׁא֗וֹל מַה תֵּדָֽע־־׃
translation:
  text: It is higher than the heavens—what can you do? Deeper than Sheol—what can
    you know?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''deeper than the grave'' or ''deeper than the realm of the dead.''
      Hebrew: Sheol.'
    reason: lexical_alternative
lexical_decisions:
- source_word: גָּבְהֵי שָׁמַיִם
  chosen: higher than the heavens
  alternatives:
  - the heights of heaven
  - as high as heaven
  lexicon: HALOT
  rationale: The construct phrase literally denotes 'heights of heavens/sky.' In context,
    Zophar is describing the exalted height of God's wisdom/understanding (from v.
    7), so an English comparative expression is most natural and readable. 'Higher
    than the heavens' preserves the poetic sense without over-literal awkwardness.
- source_word: מַה
  chosen: what
  alternatives:
  - how
  lexicon: HALOT
  rationale: Interrogative pronoun introducing a rhetorical question. 'What' best
    matches the direct force of the Hebrew in both cola.
- source_word: תִּפְעָל
  chosen: can you do
  alternatives:
  - will you do
  - could you accomplish
  lexicon: HALOT
  rationale: Qal imperfect 2ms of פעל, 'do, make, accomplish.' In this rhetorical
    context the imperfect expresses ability or capacity rather than simple future,
    so 'can you do' communicates the intended challenge.
- source_word: עֲמֻקָּה
  chosen: deeper
  alternatives:
  - deep
  - profound
  lexicon: HALOT
  rationale: Adjective 'deep' in feminine singular, agreeing with the implied subject
    carried over from the previous verse. English comparative 'deeper' balances the
    first colon's comparative sense and fits the poetic parallelism.
- source_word: מִשְּׁאוֹל
  chosen: than Sheol
  alternatives:
  - than the grave
  - than the realm of the dead
  lexicon: HALOT
  rationale: The preposition מִן marks comparison, 'than/from.' 'Sheol' is retained
    rather than replaced with 'grave' because the Hebrew denotes the underworld/the
    realm of the dead more broadly, and transliteration preserves the source-world
    concept without importing a narrower English idea.
- source_word: תֵּדָע
  chosen: can you know
  alternatives:
  - will you know
  - can you comprehend
  lexicon: HALOT
  rationale: Qal imperfect 2ms of ידע, 'know.' In parallel with 'can you do,' the
    rhetorical force is one of human incapacity before divine depth, so 'can you know'
    is the clearest rendering.
