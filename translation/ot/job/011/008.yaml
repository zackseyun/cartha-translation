theological_decisions:
- issue: Rendering of שְׁאוֹל
  chosen_reading: Sheol
  alternative_readings:
  - the grave
  - the realm of the dead
  rationale: The verse uses Sheol in a poetic comparison of depth. Transliteration
    avoids collapsing the term into merely physical burial ('grave') while also avoiding
    over-interpretation. Because the concept may be unfamiliar, an explanatory footnote
    preserves the semantic range.
  doctrine_reference: Translation philosophy §1, §6
