id: JOB.11.16
reference: Job 11:16
source:
  edition: WLC
  text: כִּי אַ֭תָּה עָמָ֣ל תִּשְׁכָּ֑ח כְּ/מַ֖יִם עָבְר֣וּ תִזְכֹּֽר־׃
translation:
  text: For you will forget your misery; you will remember it as waters that have
    passed by.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'you will remember it only as water that has flowed past.' The Hebrew
      image compares former misery to waters already gone by.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Surely
  - Indeed
  lexicon: HALOT
  rationale: Introduces the reason/result flowing from the previous promise. 'For'
    fits the explanatory force in context better than a more emphatic 'surely'.
- source_word: אַתָּה
  chosen: you
  lexicon: HALOT
  rationale: Second masculine singular pronoun, explicitly retained for emphasis in
    English by including 'you' rather than leaving it implicit.
- source_word: עָמָל
  chosen: misery
  alternatives:
  - trouble
  - toil
  - affliction
  lexicon: HALOT
  rationale: The noun can denote trouble, hardship, or misery. In this context of
    suffering to be left behind, 'misery' best captures the experiential sense without
    narrowing it to labor alone.
- source_word: תִּשְׁכָּח
  chosen: will forget
  alternatives:
  - shall forget
  lexicon: HALOT
  rationale: Qal imperfect 2ms with future sense in context; straightforwardly rendered
    as future.
- source_word: כְ/מַיִם
  chosen: as waters
  alternatives:
  - like water
  - like waters
  lexicon: HALOT
  rationale: The prefixed כ marks comparison. Retaining plural 'waters' reflects the
    Hebrew form and preserves the poetic image.
- source_word: עָבְרוּ
  chosen: have passed by
  alternatives:
  - passed away
  - flowed past
  lexicon: HALOT
  rationale: Perfect 3cp from עבר, describing waters already gone past. 'Have passed
    by' preserves the completed action and the imagery of something no longer present.
- source_word: תִזְכֹּר
  chosen: will remember it
  alternatives:
  - will remember
  - will recall it
  lexicon: HALOT
  rationale: 'Qal imperfect 2ms. Although the direct object is not explicit in Hebrew,
    English idiom benefits from supplying ''it,'' referring back to the misery. This
    keeps the comparison coherent: the misery will be remembered only as something
    gone by.'
