id: JOB.11.12
reference: Job 11:12
source:
  edition: WLC
  text: וְ/אִ֣ישׁ נָ֭בוּב יִלָּבֵ֑ב וְ/עַ֥יִר פֶּ֝֗רֶא אָדָ֥ם יִוָּלֵֽד׃
translation:
  text: But an empty-headed man gains understanding when a wild donkey’s colt is born
    a man.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'a hollow man gets heart.' The Hebrew idiom means to
      gain sense or understanding.
    reason: lexical_alternative
  - marker: b
    text: 'The line is likely ironic: the fool becomes wise only when a wild donkey’s
      colt is born human.'
    reason: alternative_reading
lexical_decisions:
- source_word: אִישׁ
  chosen: man
  alternatives:
  - person
  lexicon: HALOT
  rationale: Common noun for an individual male human; here used in a generic/proverbial
    statement, but per doctrine the masculine form is retained as 'man' rather than
    neutralized.
- source_word: נָבוּב
  chosen: empty-headed
  alternatives:
  - hollow
  - senseless
  - empty
  lexicon: HALOT
  rationale: The adjective/participle conveys hollowness or emptiness metaphorically
    of a foolish person. 'Empty-headed' captures the figurative force in natural modern
    English better than the more wooden 'hollow.'
- source_word: יִלָּבֵב
  chosen: gains understanding
  alternatives:
  - gets a heart
  - becomes wise
  - becomes intelligent
  lexicon: HALOT
  rationale: From לבב in the Niphal, literally 'gets heart,' an idiom for acquiring
    sense or understanding. The idiomatic meaning is clearer in English as 'gains
    understanding,' while preserving the proverb's point.
- source_word: וְ
  chosen: But
  alternatives:
  - And
  - Yet
  lexicon: HALOT
  rationale: The conjunction introduces an ironic/proverbial contrast. 'But' better
    reflects the adversative sense in context than a simple 'and.'
- source_word: עַיִר פֶּרֶא
  chosen: a wild donkey’s colt
  alternatives:
  - a wild ass’s colt
  - the foal of a wild donkey
  lexicon: HALOT
  rationale: The construct phrase denotes the young of a wild donkey. 'Wild donkey'
    is clearer and more contemporary than 'wild ass,' while 'colt' naturally renders
    the young animal.
- source_word: אָדָם
  chosen: man
  alternatives:
  - human
  - humankind
  lexicon: HALOT
  rationale: Here אָדָם is singular and part of the comparison 'is born a man.' Per
    doctrine, the masculine/generic form is preserved where it matches the source.
- source_word: יִוָּלֵד
  chosen: is born
  alternatives:
  - would be born
  - comes to be born
  lexicon: HALOT
  rationale: Niphal imperfect of ילד, straightforwardly 'is born.' In this proverbial
    comparison, present English works well to express the impossible condition.
