theological_decisions:
- issue: Interpretive force of the proverb/sarcasm
  chosen_reading: 'The verse is rendered as an ironic statement of impossibility:
    an empty-headed man gains understanding only when a wild donkey''s colt is born
    a man.'
  alternative_readings:
  - A wish or prediction that a senseless man may become wise
  - 'A less explicitly ironic statement: ''an empty man will get heart, and a wild
    donkey''s colt is born a man'''
  rationale: 'The Hebrew is terse and notoriously difficult, but the parallelism strongly
    suggests an absurd comparison: the fool becoming wise is as likely as a wild donkey
    being born human. The translation makes that logic explicit enough for readable
    English without adding content beyond the proverb''s force.'
  doctrine_reference: 'Translation philosophy #1, #3, #6'
