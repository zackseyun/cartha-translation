id: JOB.11.9
reference: Job 11:9
source:
  edition: WLC
  text: אֲרֻכָּ֣ה מֵ/אֶ֣רֶץ מִדָּ֑/הּ וּ֝/רְחָבָ֗ה מִנִּי יָֽם־׃
translation:
  text: Its measure is longer than the earth and broader than the sea.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'its extent is longer than the earth and wider than the sea.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲרֻכָּה
  chosen: longer
  alternatives:
  - long
  - lengthier
  lexicon: HALOT
  rationale: 'Adjectival feminine singular agreeing with מִדָּהּ (''its measure'').
    In context of comparison with מִן (''than''), an English comparative is most natural:
    ''longer than.'''
- source_word: מֵאֶרֶץ
  chosen: than the earth
  alternatives:
  - than land
  - from the earth
  lexicon: HALOT
  rationale: The prefixed מִן here marks comparison, not separation. אֶרֶץ can mean
    'land' or 'earth'; in parallel with 'sea' and in a cosmic comparison, 'earth'
    best fits.
- source_word: מִדָּהּ
  chosen: its measure
  alternatives:
  - its extent
  - its dimension
  lexicon: HALOT
  rationale: מִדָּה denotes measure, size, or extent. 'Its measure' preserves the
    concrete noun and matches the feminine predicates in the verse. The 3fs suffix
    refers back to the subject from the previous verse, namely wisdom/understanding
    as described by Zophar.
- source_word: וּרְחָבָה
  chosen: and broader
  alternatives:
  - and wide
  - and wider
  lexicon: HALOT
  rationale: Feminine singular adjective parallel to אֲרֻכָּה. Because the second
    colon also uses comparative מִן, English comparative 'broader' is the clearest
    rendering.
- source_word: מִנִּי יָם
  chosen: than the sea
  alternatives:
  - than the ocean
  - than the west/sea
  lexicon: HALOT
  rationale: מִנִּי is a poetic form of מִן, here comparative. יָם ordinarily means
    'sea'; 'the sea' preserves the imagery and parallelism. 'Ocean' is possible dynamically
    but less textually direct.
