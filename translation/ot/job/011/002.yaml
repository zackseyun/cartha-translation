id: JOB.11.2
reference: Job 11:2
source:
  edition: WLC
  text: הֲ/רֹ֣ב דְּ֭בָרִים לֹ֣א יֵעָנֶ֑ה וְ/אִם אִ֖ישׁ שְׂפָתַ֣יִם יִצְדָּֽק־׃
translation:
  text: Should a multitude of words go unanswered, and should a man of lips be proved
    right?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Should a man of lips be justified?' The Hebrew idiom 'man of lips'
      refers to a person characterized by speech, likely excessive or empty speech.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲרֹב דְּבָרִים
  chosen: a multitude of words
  alternatives:
  - many words
  - an abundance of words
  lexicon: HALOT
  rationale: רֹב with דְּבָרִים denotes abundance or multitude. 'A multitude of words'
    preserves the rhetorical force of excessive speech more naturally than a wooden
    'many words.'
- source_word: לֹא יֵעָנֶה
  chosen: go unanswered
  alternatives:
  - not be answered
  - receive no answer
  lexicon: HALOT
  rationale: The Niphal of ענה here is best taken as passive/reflexive, 'be answered.'
    In English, 'go unanswered' is idiomatic and preserves the rhetorical question
    introduced by הֲ.
- source_word: וְאִם
  chosen: and should
  alternatives:
  - and if
  - or if
  lexicon: HALOT
  rationale: In this poetic rhetorical question, וְאִם introduces a parallel interrogative
    clause. 'And should' brings out the rhetorical force better than a flat conditional
    'and if,' while preserving the conjunction.
- source_word: אִישׁ
  chosen: a man
  alternatives:
  - a person
  - someone
  lexicon: HALOT
  rationale: The Hebrew is grammatically masculine singular and refers to a representative
    individual. Per translation philosophy, a gender-accurate rendering is preferred
    over a gender-neutral one here.
- source_word: שְׂפָתַיִם
  chosen: of lips
  alternatives:
  - talkative
  - glib-tongued
  - of speech
  lexicon: HALOT
  rationale: Literally 'lips' functions idiomatically for speech. 'A man of lips'
    is somewhat unusual in English but preserves the Hebrew image and the pejorative
    sense of one characterized by mere talk. More interpretive options like 'talkative
    man' were avoided in the main text as too paraphrastic.
- source_word: יִצְדָּק
  chosen: be proved right
  alternatives:
  - be justified
  - be righteous
  - be in the right
  lexicon: HALOT
  rationale: 'From צדק in the Qal, the sense here is forensic or evaluative: being
    shown to be in the right. ''Be proved right'' communicates this clearly in modern
    English without importing later theological freight that ''be justified'' might
    suggest in English.'
