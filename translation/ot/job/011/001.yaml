id: JOB.11.1
reference: Job 11:1
source:
  edition: WLC
  text: וַ֭/יַּעַן צֹפַ֥ר הַֽ/נַּעֲמָתִ֗י וַ/יֹּאמַֽר׃
translation:
  text: 'Then Zophar the Naamathite answered and said:'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיַּעַן
  chosen: answered
  alternatives:
  - responded
  lexicon: HALOT
  rationale: The verb ענה in this narrative formula commonly means 'answer' or 'respond.'
    'Answered' preserves the conventional dialogic sense and fits the formulaic speech
    introduction in Job.
- source_word: צֹפַר
  chosen: Zophar
  rationale: Personal names are transliterated by standard English convention per
    project philosophy.
- source_word: הַנַּעֲמָתִי
  chosen: the Naamathite
  alternatives:
  - from Naamah
  lexicon: HALOT
  rationale: The gentilic adjective identifies Zophar by place of origin or association.
    'The Naamathite' is the most natural and established English rendering of the
    Hebrew gentilic.
- source_word: וַיֹּאמַר
  chosen: and said
  alternatives:
  - saying
  lexicon: HALOT
  rationale: אמר in this standard narrative sequence is best rendered 'and said.'
    Retaining both verbs ('answered and said') reflects the Hebrew style without becoming
    unnatural in English.
