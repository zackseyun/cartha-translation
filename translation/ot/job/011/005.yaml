theological_decisions:
- issue: Anthropomorphic language for God ('open his lips')
  chosen_reading: Retained the anthropomorphic expression directly
  alternative_readings:
  - Paraphrase as 'speak to you'
  rationale: The Hebrew uses embodied language for divine speech. Preserving it respects
    the source text and does not imply corporeality in a doctrinally problematic way;
    it is standard biblical anthropomorphic diction.
  doctrine_reference: Translation philosophy §1, §6
- issue: Force of עִמָּךְ in context
  chosen_reading: Rendered as confrontational 'against you'
  alternative_readings:
  - with you
  - to you
  rationale: Zophar's wish is not for neutral dialogue but for God to answer Job's
    claims. The contextual force is adversative, so 'against you' best communicates
    the sense while remaining tied to the Hebrew context.
  doctrine_reference: Translation philosophy §1, §5
