id: JOB.11.15
reference: Job 11:15
source:
  edition: WLC
  text: כִּי אָ֤ז תִּשָּׂ֣א פָנֶ֣י/ךָ מִ/מּ֑וּם וְ/הָיִ֥יתָ מֻ֝צָ֗ק וְ/לֹ֣א תִירָֽא־׀׃
translation:
  text: For then you will lift up your face without blemish; you will stand firm and
    will not fear.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'you will hold your head high without shame.' The Hebrew literally says
      'lift up your face without blemish,' preserving the imagery of restored confidence
      and freedom from disgrace.
    reason: lexical_alternative
  - marker: b
    text: Or 'you will be secure' or 'firmly established.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Surely
  - Indeed
  lexicon: HALOT
  rationale: Introduces the consequence of the preceding condition in Zophar's speech.
    'For' fits the explanatory/resultative force in context.
- source_word: אָז
  chosen: then
  alternatives:
  - at that time
  lexicon: HALOT
  rationale: Temporal adverb marking the resulting future state if Job responds rightly;
    'then' is natural and concise.
- source_word: תִּשָּׂא פָנֶיךָ
  chosen: you will lift up your face
  alternatives:
  - you will raise your face
  - you will hold your head high
  lexicon: HALOT
  rationale: The Hebrew idiom literally means to lift up one's face, conveying confidence
    or freedom from shame. The main text preserves the idiom in readable English;
    a more interpretive alternative is preserved in a footnote.
- source_word: מִמּוּם
  chosen: without blemish
  alternatives:
  - without spot
  - free from defect
  - without shame
  lexicon: HALOT
  rationale: מוּם commonly denotes a physical defect or blemish. Here, after 'lift
    up your face,' it metaphorically expresses being free from moral stain or disfigurement.
    'Without blemish' preserves the lexical image better than the more interpretive
    'without shame.'
- source_word: וְהָיִיתָ
  chosen: you will
  alternatives:
  - and you will become
  lexicon: HALOT
  rationale: With the following predicate, the verb marks resultant state. English
    smooths this as part of the clause rather than a separate 'become' unless emphasis
    requires it.
- source_word: מֻצָק
  chosen: stand firm
  alternatives:
  - be steadfast
  - be secure
  - be firmly established
  lexicon: HALOT
  rationale: The passive participial form from יצק in this context conveys firmness,
    solidity, or being established. 'Stand firm' gives clear modern English while
    reflecting the image of stability.
- source_word: וְלֹא תִירָא
  chosen: and will not fear
  alternatives:
  - and will not be afraid
  lexicon: HALOT
  rationale: Straightforward future negation of ירא. 'Will not fear' is slightly more
    formal and compact, fitting the poetic line.
