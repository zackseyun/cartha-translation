id: JOB.11.11
reference: Job 11:11
source:
  edition: WLC
  text: כִּי ה֭וּא יָדַ֣ע מְתֵי שָׁ֑וְא וַ/יַּרְא אָ֝֗וֶן וְ/לֹ֣א יִתְבּוֹנָֽן־־־׃
translation:
  text: For he knows men of falsehood; when he sees wickedness, does he not take notice?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or, ''and he does not consider/notice.'' The Hebrew final clause can be
      read as a plain negation, but the context strongly favors a rhetorical question:
      ''does he not take notice?'''
    reason: alternative_reading
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Because
  lexicon: HALOT
  rationale: Introduces the ground for Zophar's statement. 'For' fits the argumentative
    flow in context better than the more emphatic 'indeed' or the more narrowly causal
    'because.'
- source_word: הוּא
  chosen: he
  lexicon: HALOT
  rationale: Refers to God in context. English requires the pronoun for natural style,
    and lowercase is appropriate since English capitalization of divine pronouns is
    stylistic rather than demanded by the Hebrew.
- source_word: יָדַע
  chosen: knows
  alternatives:
  - has known
  - recognizes
  lexicon: HALOT
  rationale: Qal perfect here expresses God's settled knowledge. Present-tense 'knows'
    communicates the gnomic/general truth better than a simple past.
- source_word: מְתֵי שָׁוְא
  chosen: men of falsehood
  alternatives:
  - worthless men
  - deceitful men
  - men of vanity
  lexicon: HALOT
  rationale: מתי is 'men/people of,' and שוא carries senses such as falsehood, emptiness,
    worthlessness. 'Men of falsehood' preserves the construct expression and the moral
    sense without over-paraphrasing. 'Worthless men' is possible but slightly more
    interpretive.
- source_word: וַיַּרְא
  chosen: when he sees
  alternatives:
  - and he sees
  - for he sees
  lexicon: HALOT
  rationale: 'The waw-consecutive with a following rhetorical question works naturally
    in English as a temporal clause: ''when he sees.'' This avoids a wooden sequence
    while preserving the sense.'
- source_word: אָוֶן
  chosen: wickedness
  alternatives:
  - trouble
  - iniquity
  - evil
  lexicon: HALOT
  rationale: אָוֶן often denotes iniquity or wickedness, sometimes with the nuance
    of trouble produced by evil. 'Wickedness' best fits the moral context here.
- source_word: וְלֹא יִתְבּוֹנָן
  chosen: does he not take notice?
  alternatives:
  - does he not consider?
  - will he not understand?
  - and he does not perceive
  lexicon: HALOT
  rationale: 'The form is best taken as a rhetorical question in context: if God sees
    wickedness, surely he notices it. ''Take notice'' is idiomatic modern English
    for התבונן (''consider, pay attention, observe carefully''). It also resolves
    the otherwise awkward statement ''and he does not consider,'' which would conflict
    with the verse''s point.'
