theological_decisions:
- issue: Referent of the masculine singular verbs and suffixes
  chosen_reading: The subject is God, and the final suffix is rendered personally
    as 'him.'
  alternative_readings:
  - The final suffix could be taken more abstractly as 'it,' i.e., who can reverse
    what he does?
  rationale: The broader context speaks of God's sovereign knowledge and action. Rendering
    the pronouns personally as 'he/him' follows the immediate discourse and preserves
    the rhetorical force. The more abstract sense is possible in English interpretation,
    so it is preserved in a footnote rather than moved into the main text.
  doctrine_reference: Preserve theological tension rather than resolve it
