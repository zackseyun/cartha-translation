id: JOB.11.10
reference: Job 11:10
source:
  edition: WLC
  text: אִם יַחֲלֹ֥ף וְ/יַסְגִּ֑יר וְ֝/יַקְהִ֗יל וּ/מִ֣י יְשִׁיבֶֽ/נּוּ־׃
translation:
  text: If he passes by and shuts someone in, and calls an assembly, then who can
    turn him back?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'and who can reverse it?' The Hebrew may be understood either as turning
      back the acting subject ('him') or reversing the action more generally.
    reason: alternative_reading
  - marker: b
    text: '''Calls an assembly'' may also be rendered ''gathers'' or ''convenes,''
      possibly with a judicial nuance.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  chosen: If
  alternatives:
  - When
  lexicon: HALOT
  rationale: Introduces a conditional or hypothetical statement. 'If' best preserves
    the Hebrew particle's force here in Zophar's rhetorical assertion about God's
    irresistible action.
- source_word: יַחֲלֹף
  chosen: he passes by
  alternatives:
  - he passes through
  - he sweeps by
  lexicon: HALOT
  rationale: From חלף, with the sense of passing by or through. 'Passes by' is idiomatic
    and preserves the image of God's movement/action without overinterpreting it as
    destructive.
- source_word: וְיַסְגִּיר
  chosen: and shuts someone in
  alternatives:
  - and imprisons
  - and hands over
  lexicon: HALOT
  rationale: From סגר in Hiphil, commonly 'shut up, hand over, imprison.' In this
    context, paired with irresistible divine action, 'shuts someone in' preserves
    the concrete imagery and leaves the object implicit as in Hebrew, while making
    natural English sense.
- source_word: וְיַקְהִיל
  chosen: and calls an assembly
  alternatives:
  - and gathers
  - and convenes
  lexicon: HALOT
  rationale: From קהל in Hiphil, 'assemble, gather, convene.' 'Calls an assembly'
    best reflects the causative stem and fits the judicial/public sense often associated
    with gathering people.
- source_word: וּמִי
  chosen: then who
  alternatives:
  - and who
  lexicon: HALOT
  rationale: The conjunction plus interrogative introduces the rhetorical consequence.
    'Then who' brings out the logical force in smooth English.
- source_word: יְשִׁיבֶנּוּ
  chosen: can turn him back
  alternatives:
  - can restore him
  - can make him return
  - can reverse it
  lexicon: HALOT
  rationale: From שוב in Hiphil, 'cause to return, turn back.' With a 3ms suffix,
    the most natural sense here is to turn back the acting subject, i.e., to hinder
    or reverse him. 'Can turn him back' captures the rhetorical point of divine irresistibility.
