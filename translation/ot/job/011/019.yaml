id: JOB.11.19
reference: Job 11:19
source:
  edition: WLC
  text: וְֽ֭/רָבַצְתָּ וְ/אֵ֣ין מַחֲרִ֑יד וְ/חִלּ֖וּ פָנֶ֣י/ךָ רַבִּֽים׃
translation:
  text: You will lie down, and none will make you afraid; many will seek your favor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'many will entreat your face,' an idiom meaning to seek
      your favor.
    reason: lexical_alternative
lexical_decisions:
- source_word: רָבַצְתָּ
  chosen: you will lie down
  alternatives:
  - you will rest
  - you will recline
  lexicon: HALOT
  rationale: The verb רָבַץ commonly denotes lying down or reclining, often with the
    nuance of secure rest. 'Lie down' is the most direct and natural English rendering
    here, preserving the imagery without over-interpreting it as mere sleep.
- source_word: מַחֲרִיד
  chosen: make you afraid
  alternatives:
  - terrify you
  - disturb you
  lexicon: HALOT
  rationale: From חרד in the causative sense, the participle means one who causes
    trembling or fear. 'Make you afraid' fits the idiom with אֵין ('there is none')
    and communicates the result clearly in modern English.
- source_word: חִלּוּ פָנֶיךָ
  chosen: will seek your favor
  alternatives:
  - will entreat your face
  - will appease you
  - will court your favor
  lexicon: HALOT
  rationale: The idiom חלה פני commonly means to seek someone's favor or entreat them.
    Rendering it woodenly as 'entreat your face' would obscure the sense in English.
    'Seek your favor' is a standard idiomatic equivalent that preserves the relational
    meaning.
- source_word: רַבִּים
  chosen: many
  alternatives:
  - multitudes
  lexicon: HALOT
  rationale: The adjective/substantive here refers to a large number of people. 'Many'
    is the most straightforward rendering and fits the poetic line naturally.
- source_word: וְאֵין
  chosen: and none will
  alternatives:
  - and there will be no one who will
  lexicon: HALOT
  rationale: The conjunction plus existential negative introduces the second colon
    smoothly. 'And none will' is concise and idiomatic while preserving the Hebrew
    structure.
