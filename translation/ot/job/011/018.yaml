id: JOB.11.18
reference: Job 11:18
source:
  edition: WLC
  text: וּֽ֭/בָטַחְתָּ כִּי יֵ֣שׁ תִּקְוָ֑ה וְ֝/חָפַרְתָּ֗ לָ/בֶ֥טַח תִּשְׁכָּֽב־׃
translation:
  text: And you will be secure, because there is hope; you will search around, and
    lie down in safety.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'you will dig around'; the Hebrew verb is literally associated with digging,
      but here may refer to searching out or preparing a place before lying down.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבָטַחְתָּ
  chosen: you will be secure
  alternatives:
  - you will trust
  - you will be confident
  lexicon: HALOT
  rationale: From בטח. In context the clause gives the resulting state of confidence/security
    due to the existence of hope. English 'be secure' better captures the stative/resultative
    sense here than the more subjective 'trust.'
- source_word: כִּי יֵשׁ תִּקְוָה
  chosen: because there is hope
  alternatives:
  - for there is hope
  - because there is expectation
  lexicon: HALOT
  rationale: תִּקְוָה commonly means 'hope' or 'expectation.' 'Because there is hope'
    is natural English and preserves the causal force of כִּי.
- source_word: וְחָפַרְתָּ
  chosen: you will search around
  alternatives:
  - you will dig around
  - you will look about
  lexicon: HALOT
  rationale: The verb חפר literally means 'dig,' but in this context many understand
    it idiomatically of examining or preparing one's surroundings before resting.
    'Search around' preserves the concrete action without forcing a highly specific
    interpretive expansion.
- source_word: לָבֶטַח
  chosen: in safety
  alternatives:
  - securely
  - with confidence
  lexicon: HALOT
  rationale: בטח as a noun/adverbial expression denotes security or safety. 'In safety'
    fits idiomatic English with 'lie down' and preserves the sense of secure rest.
- source_word: תִּשְׁכָּב
  chosen: you will lie down
  alternatives:
  - you will rest
  lexicon: HALOT
  rationale: שׁכב literally means 'lie down.' 'Rest' is interpretive; 'lie down' keeps
    the concrete image while naturally implying repose in context.
