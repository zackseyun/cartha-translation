id: JOB.11.14
reference: Job 11:14
source:
  edition: WLC
  text: אִם אָ֣וֶן בְּ֭/יָדְ/ךָ הַרְחִיקֵ֑/הוּ וְ/אַל תַּשְׁכֵּ֖ן בְּ/אֹהָלֶ֣י/ךָ
    עַוְלָֽה־־׃
translation:
  text: If iniquity is in your hand, put it far away, and do not let injustice dwell
    in your tents.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'If wickedness is in your hand, remove it.'
    reason: lexical_alternative
  - marker: b
    text: '''In your tents'' refers to one''s domestic sphere or household life.'
    reason: cultural_note
lexical_decisions:
- source_word: אִם
  chosen: If
  alternatives:
  - If indeed
  - If there is
  lexicon: HALOT
  rationale: Introduces a conditional clause. Here simple 'If' best fits the Hebrew
    syntax and natural English.
- source_word: אָוֶן
  chosen: iniquity
  alternatives:
  - trouble
  - wickedness
  - evil
  lexicon: HALOT
  rationale: אָוֶן can denote wickedness, trouble, or harmful wrongdoing. In this
    moral exhortation, paired with עַוְלָה, the ethical sense is primary, so 'iniquity'
    preserves the moral weight without over-paraphrasing.
- source_word: בְּיָדְךָ
  chosen: in your hand
  alternatives:
  - at your hand
  - under your control
  lexicon: HALOT
  rationale: The idiom is retained fairly literally. 'In your hand' is natural enough
    in English and preserves the Hebrew image of something possessed or practiced.
- source_word: הַרְחִיקֵהוּ
  chosen: put it far away
  alternatives:
  - remove it
  - drive it far away
  lexicon: HALOT
  rationale: The Hiphil imperative calls for active removal. 'Put it far away' reflects
    both causative force and the adverbial sense of distancing.
- source_word: וְאַל
  chosen: and do not
  alternatives:
  - and let not
  lexicon: HALOT
  rationale: Standard rendering of the conjunction plus negative particle introducing
    a prohibition.
- source_word: תַּשְׁכֵּן
  chosen: let ... dwell
  alternatives:
  - allow ... to remain
  - cause ... to dwell
  lexicon: HALOT
  rationale: 'From שכן, ''to dwell, settle.'' With the negative and following prepositional
    phrase, the sense is prohibitive: do not permit it to reside.'
- source_word: בְּאֹהָלֶיךָ
  chosen: in your tents
  alternatives:
  - in your tent
  - in your dwellings
  - in your household
  lexicon: HALOT
  rationale: The plural form is explicit in the Hebrew. 'Tents' preserves the concrete
    ancient setting better than the more interpretive 'household,' while still communicating
    domestic space.
- source_word: עַוְלָה
  chosen: injustice
  alternatives:
  - wrongdoing
  - unrighteousness
  - wickedness
  lexicon: HALOT
  rationale: עַוְלָה denotes injustice or wrong. 'Injustice' distinguishes it from
    the earlier אָוֶן while preserving the ethical emphasis. The line likely uses
    near-synonymous moral terms for poetic parallelism rather than sharply different
    categories.
