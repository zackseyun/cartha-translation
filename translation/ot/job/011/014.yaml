theological_decisions:
- issue: Moral terminology in poetic parallelism
  chosen_reading: Render both אָוֶן and עַוְלָה with distinct but related English
    ethical terms ('iniquity' / 'injustice')
  alternative_readings:
  - Use the same English term for both words
  - Render both more generally as 'evil'
  rationale: The verse is an exhortation to remove moral evil. Using two related but
    non-identical English terms preserves the Hebrew poetic parallelism and avoids
    flattening the diction, while not importing a technical theological distinction
    the text itself does not require.
  doctrine_reference: 'Translation philosophy #5: Consistency of key terms, or documented
    exception.'
