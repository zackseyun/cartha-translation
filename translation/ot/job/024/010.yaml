id: JOB.24.10
reference: Job 24:10
source:
  edition: WLC
  text: עָר֣וֹם הִ֭לְּכוּ בְּלִ֣י לְב֑וּשׁ וּ֝/רְעֵבִ֗ים נָ֣שְׂאוּ עֹֽמֶר׃
translation:
  text: They go about naked, without clothing; hungry, they carry sheaves.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a sheaf.' The Hebrew noun is singular, but it may be used collectively
      here.
    reason: lexical_alternative
lexical_decisions:
- source_word: עָרוֹם
  chosen: naked
  alternatives:
  - bare
  - without clothing
  lexicon: HALOT
  rationale: The adjective denotes being unclothed or scantily clothed. 'Naked' is
    the most direct and idiomatic rendering here, matching the social deprivation
    described in context.
- source_word: הִלְּכוּ
  chosen: they go about
  alternatives:
  - they walk
  - they wander
  lexicon: HALOT
  rationale: הלך commonly means 'go' or 'walk.' 'Go about' fits the imperfective sense
    in English and the broader depiction of ongoing condition rather than a single
    act.
- source_word: בְּלִי
  chosen: without
  alternatives:
  - lacking
  - with no
  lexicon: HALOT
  rationale: The preposition straightforwardly marks absence. 'Without' is the clearest
    natural equivalent.
- source_word: לְבוּשׁ
  chosen: clothing
  alternatives:
  - garment
  - covering
  lexicon: HALOT
  rationale: The noun refers to clothing or a garment. 'Clothing' works well with
    'without' and avoids an overly singular sense that 'garment' might suggest.
- source_word: רְעֵבִים
  chosen: hungry
  alternatives:
  - starving
  - famished
  lexicon: HALOT
  rationale: The adjective means hungry. 'Hungry' preserves the lexical sense without
    intensifying beyond the Hebrew.
- source_word: נָשְׂאוּ
  chosen: they carry
  alternatives:
  - they bear
  - they lift
  lexicon: HALOT
  rationale: נשא often means 'carry' or 'bear.' 'Carry' is natural in English for
    laborers transporting harvested produce.
- source_word: עֹמֶר
  chosen: sheaves
  alternatives:
  - a sheaf
  - bundles of grain
  lexicon: HALOT
  rationale: Although עֹמֶר is morphologically singular, it can function collectively
    in context. English plural 'sheaves' best conveys the likely sense of harvested
    grain loads being carried by multiple hungry laborers. The singular alternative
    is preserved in a footnote because some translations keep 'a sheaf' more formally.
