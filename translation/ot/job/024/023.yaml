theological_decisions:
- issue: Referent of the singular subject and object shifts in the verse
  chosen_reading: Render the first half collectively ('them ... they') while retaining
    the final singular possessor ('his eyes')
  alternative_readings:
  - 'Render all singular: ''He gives him security, and he is supported; his eyes are
    on his ways'''
  - Render the final clause as God's eyes on the wicked man's ways
  rationale: The Hebrew mixes singular and plural forms. The plural 'their ways' strongly
    invites a collective reading for the wicked as a class, while 'his eyes' most
    plausibly refers to God watching them. This preserves the poetic tension rather
    than flattening the syntax into a fully singular line.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it'
