id: JOB.24.23
reference: Job 24:23
source:
  edition: WLC
  text: יִתֶּן ל֣/וֹ לָ֭/בֶטַח וְ/יִשָּׁעֵ֑ן וְ֝/עֵינֵ֗י/הוּ עַל דַּרְכֵי/הֶֽם־־׃
translation:
  text: He gives them security, and they are supported; his eyes are on their ways.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew has singular 'to him' and 'he is supported'; the translation renders
      these collectively as 'them' and 'they' because the verse ends with 'their ways.'
    reason: alternative_reading
  - marker: b
    text: 'Or, more formally: ''He gives him security, and he is supported; his eyes
      are on their ways.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: יִתֶּן
  chosen: gives
  alternatives:
  - grants
  - gives over
  lexicon: HALOT
  rationale: Qal imperfect 3ms of נתן, here with an object suffix and abstract noun
    לבטח, naturally means 'give/grant' in the sense of providing something. Present
    English fits the poetic/general statement.
- source_word: לוֹ
  chosen: them
  alternatives:
  - him
  lexicon: HALOT
  rationale: Although morphologically singular ('to him'), the final phrase דַּרְכֵיהֶם
    ('their ways') strongly suggests a collective or distributive sense in context.
    Rendering 'them' produces coherent English and reflects the likely sense of the
    wicked as a class rather than a single individual. The singular alternative is
    preserved in a footnote because the Hebrew form itself is singular.
- source_word: לָבֶטַח
  chosen: security
  alternatives:
  - safety
  - confidence
  lexicon: HALOT
  rationale: בטח as a noun denotes security/safety. 'Security' is idiomatic with 'gives'
    and preserves the sense of being made secure without overinterpreting as inward
    'confidence'.
- source_word: וְיִשָּׁעֵן
  chosen: they are supported
  alternatives:
  - he is supported
  - they rest secure
  - they lean
  lexicon: HALOT
  rationale: Nifal imperfect of שׁען can mean 'be supported' or 'lean/rely.' In this
    context, following 'gives them security,' the passive/resultative sense 'are supported'
    best conveys the state granted. The subject is rendered plurally for coherence
    with the collective sense signaled by 'their ways.'
- source_word: וְעֵינֵיהוּ
  chosen: his eyes
  alternatives:
  - his eye
  lexicon: HALOT
  rationale: The plural construct 'eyes of him' is idiomatically 'his eyes.' The singular
    suffix points to a singular watcher, most naturally God in context, though the
    verse does not name him explicitly.
- source_word: עַל
  chosen: 'on'
  alternatives:
  - upon
  - over
  lexicon: HALOT
  rationale: The preposition here marks attentive regard directed toward their conduct.
    'On' is the most natural modern English equivalent in the idiom 'his eyes are
    on...'.
- source_word: דַּרְכֵיהֶם
  chosen: their ways
  alternatives:
  - their paths
  - their conduct
  lexicon: HALOT
  rationale: דרך often means way/path literally or figuratively conduct. 'Ways' preserves
    the Hebrew metaphor while allowing the ethical sense to remain audible.
