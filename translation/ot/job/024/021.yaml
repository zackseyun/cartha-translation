id: JOB.24.21
reference: Job 24:21
source:
  edition: WLC
  text: רֹעֶ֣ה עֲ֭קָרָה לֹ֣א תֵלֵ֑ד וְ֝/אַלְמָנָ֗ה לֹ֣א יְיֵטִֽיב׃
translation:
  text: He preys on the barren woman who does not bear, and he does no good to the
    widow.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'feeds on the barren woman'; the Hebrew verb is literally 'pastures/feeds,'
      but in context it likely has a predatory sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: רֹעֶה
  chosen: preys on
  alternatives:
  - feeds on
  - shepherds
  - consumes
  lexicon: HALOT
  rationale: 'Although the participle is from רעה, whose common sense is ''to pasture/shepherd/feed,''
    in this hostile context it carries a predatory sense: the wicked man exploits
    or devours the vulnerable. ''Preys on'' communicates the negative force in idiomatic
    English better than the misleadingly positive ''shepherds.'' ''Feeds on'' is possible
    but less natural in English here.'
- source_word: עֲקָרָה
  chosen: barren woman
  alternatives:
  - barren
  - infertile woman
  lexicon: HALOT
  rationale: The noun/adjective refers to a woman who is barren/infertile. 'Barren
    woman' is explicit and natural in English, preserving the feminine singular reference.
- source_word: לֹא תֵלֵד
  chosen: who does not bear
  alternatives:
  - who cannot bear children
  - childless
  lexicon: HALOT
  rationale: Literally 'does not give birth/bear.' 'Who does not bear' stays close
    to the Hebrew while remaining readable. 'Cannot bear children' adds an explicit
    modal nuance not stated; 'childless' is interpretive shorthand.
- source_word: אַלְמָנָה
  chosen: widow
  lexicon: HALOT
  rationale: Standard rendering for the vulnerable social category named in the Hebrew.
- source_word: לֹא יְיֵטִיב
  chosen: does no good to
  alternatives:
  - does not treat well
  - shows no kindness to
  - does not benefit
  lexicon: HALOT
  rationale: The Hiphil of יטב means 'do good, treat well, benefit.' 'Does no good
    to' is a clear, fairly literal rendering that preserves the moral force without
    over-paraphrasing.
