theological_decisions:
- issue: Meaning of 'his days' in relation to God
  chosen_reading: Retain the literal phrase 'his days' without specifying 'days of
    judgment.'
  alternative_readings:
  - his day of judgment
  - the times when he acts
  - his appointed judgments
  rationale: The Hebrew is poetically compressed and can point to the days when God
    intervenes or judges. To preserve theological tension and avoid importing a more
    specific doctrine than the text states, the main text keeps the literal wording,
    while alternatives are preserved in a footnote.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
