id: JOB.24.1
reference: Job 24:1
source:
  edition: WLC
  text: מַדּ֗וּעַ מִ֭/שַּׁדַּי לֹא נִצְפְּנ֣וּ עִתִּ֑ים ו/ידע/ו לֹא חָ֥זוּ יָמָֽי/ו־־׃
translation:
  text: Why are times not kept hidden by the Almighty, and why do those who know him
    not see his days?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'appointed times'; the line may mean, 'Why are appointed times not reserved
      by the Almighty?'
    reason: lexical_alternative
  - marker: b
    text: '''His days'' likely refers to the days when God acts in judgment or intervention.'
    reason: alternative_reading
lexical_decisions:
- source_word: מַדּוּעַ
  chosen: Why
  alternatives:
  - Why is it that
  - For what reason
  lexicon: HALOT
  rationale: Interrogative adverb introducing Job's complaint. Simple 'Why' is natural
    English and preserves the force of the question.
- source_word: מִשַּׁדַּי
  chosen: by the Almighty
  alternatives:
  - from the Almighty
  - with the Almighty
  lexicon: HALOT
  rationale: With the passive verb נִצְפְּנוּ, the prefixed מ can be understood in
    relation to the agent/source. 'By the Almighty' best conveys the sense that the
    hiding of appointed times would be under God's control. 'The Almighty' is the
    standard rendering of שַׁדַּי in Job.
- source_word: נִצְפְּנוּ
  chosen: are kept hidden
  alternatives:
  - are hidden
  - have been stored up
  - are reserved
  lexicon: HALOT
  rationale: From צפן, 'hide, store up, treasure.' In this context the sense is not
    mere physical concealment but reserved/hidden determination of times. 'Are kept
    hidden' preserves the passive and the ongoing state.
- source_word: עִתִּים
  chosen: times
  alternatives:
  - appointed times
  - seasons
  lexicon: HALOT
  rationale: עִתִּים commonly denotes times or appointed times. 'Times' is concise
    and leaves the phrase slightly open, matching the Hebrew's terseness; the nuance
    of appointed occasions is implicit in context.
- source_word: וְיֹדְעָיו
  chosen: those who know him
  alternatives:
  - his knowers
  - those who know the Almighty
  lexicon: HALOT
  rationale: The Qal participle with 3ms suffix refers to people who know God. 'Those
    who know him' is idiomatic English and preserves the relational sense.
- source_word: חָזוּ
  chosen: see
  alternatives:
  - behold
  - perceive
  lexicon: HALOT
  rationale: חזָה often means 'see' or 'behold,' sometimes with visionary nuance.
    Here plain 'see' fits the complaint about not perceiving God's days of judgment/action.
- source_word: יָמָיו
  chosen: his days
  alternatives:
  - his day
  - the days belonging to him
  - his appointed days
  lexicon: HALOT
  rationale: The plural with suffix is best rendered literally as 'his days.' In context
    this likely refers to God's days of judgment or intervention. Retaining the literal
    phrase preserves the poetic ambiguity rather than over-interpreting it.
