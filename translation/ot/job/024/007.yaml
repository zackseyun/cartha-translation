id: JOB.24.7
reference: Job 24:7
source:
  edition: WLC
  text: עָר֣וֹם יָ֭לִינוּ מִ/בְּלִ֣י לְב֑וּשׁ וְ/אֵ֥ין כְּ֝ס֗וּת בַּ/קָּרָֽה׃
translation:
  text: They spend the night naked, without clothing, and have no covering against
    the cold.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'They lodge naked, without a garment, and have no covering in the cold.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עָרוֹם
  chosen: naked
  alternatives:
  - bare
  - without clothing
  lexicon: HALOT
  rationale: The adjective denotes being unclothed or scantily clothed. 'Naked' is
    the most direct and vivid English equivalent and fits the social misery described
    in context.
- source_word: יָלִינוּ
  chosen: spend the night
  alternatives:
  - lodge
  - lie all night
  lexicon: HALOT
  rationale: From לין, the sense is to pass the night or lodge. 'Spend the night'
    is idiomatic modern English while preserving the temporal force.
- source_word: מִבְּלִי
  chosen: without
  alternatives:
  - lacking
  - with no
  lexicon: HALOT
  rationale: The preposition-noun combination expresses absence or deprivation. 'Without'
    is concise and natural in English.
- source_word: לְבוּשׁ
  chosen: clothing
  alternatives:
  - garment
  - raiment
  lexicon: HALOT
  rationale: The noun refers generally to clothing or a garment. 'Clothing' best matches
    the generic sense in readable modern English.
- source_word: כְּסוּת
  chosen: covering
  alternatives:
  - garment
  - blanket
  lexicon: HALOT
  rationale: The term denotes a covering, often a garment used as protection. 'Covering'
    preserves the broader sense without over-specifying the object.
- source_word: בַּקָּרָה
  chosen: against the cold
  alternatives:
  - in the cold
  - from the cold
  lexicon: HALOT
  rationale: The noun denotes cold. Rendering with 'against the cold' brings out the
    protective function implied by 'covering,' though 'in the cold' is also possible
    more literally.
