id: JOB.24.8
reference: Job 24:8
source:
  edition: WLC
  text: מִ/זֶּ֣רֶם הָרִ֣ים יִרְטָ֑בוּ וּֽ/מִ/בְּלִ֥י מַ֝חְסֶ֗ה חִבְּקוּ צֽוּר־׃
translation:
  text: They are drenched by the mountain rains; lacking shelter, they embrace the
    rock.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'They are wet from the mountain torrent' or 'from the storm-rain of the
      mountains.'
    reason: lexical_alternative
  - marker: b
    text: Literally, 'they embrace the rock,' that is, they cling to it for shelter.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִ/זֶּרֶם
  chosen: by the ... rains
  alternatives:
  - from the torrent
  - by the downpour
  - by the storm-rain
  lexicon: HALOT
  rationale: זֶרֶם denotes a heavy flow or downpour, often storm-rain/torrent. In
    context with mountains and exposure, 'rains' communicates the meteorological sense
    naturally in English while preserving the force of being soaked by severe weather.
- source_word: הָרִים
  chosen: mountain
  alternatives:
  - hills
  - mountains
  lexicon: HALOT
  rationale: Plural in Hebrew, but in English 'the mountain rains' is an idiomatic
    collective expression. The sense is rain coming from/in the mountains, not a single
    hill-country shower.
- source_word: יִרְטָבוּ
  chosen: they are drenched
  alternatives:
  - they are wet
  - they are soaked
  lexicon: HALOT
  rationale: The verb means to be wet/soaked. 'Are drenched' better conveys the severity
    implied by exposure to mountain storm-rain.
- source_word: וּֽ/מִ/בְּלִי
  chosen: lacking
  alternatives:
  - without
  - for want of
  lexicon: HALOT
  rationale: The construction means 'and without / for lack of.' 'Lacking' gives smooth
    modern English while preserving the deprivation.
- source_word: מַחְסֶה
  chosen: shelter
  alternatives:
  - refuge
  - cover
  lexicon: HALOT
  rationale: The noun refers to a place of refuge or shelter. 'Shelter' fits the immediate
    physical context of exposure to rain better than the more abstract 'refuge.'
- source_word: חִבְּקוּ
  chosen: they embrace
  alternatives:
  - they cling to
  - they hug
  lexicon: HALOT
  rationale: The verb literally means 'embrace.' In context it describes pressing
    close to the rock for protection. The literal rendering is vivid and understandable
    in English.
- source_word: צֽוּר
  chosen: the rock
  alternatives:
  - a rock
  - the crag
  lexicon: HALOT
  rationale: צוּר commonly means rock/crag. 'The rock' preserves the concrete image
    and may function generically for rocky shelter. 'Crag' is possible but less common
    in contemporary English.
