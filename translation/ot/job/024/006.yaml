id: JOB.24.6
reference: Job 24:6
source:
  edition: WLC
  text: בַּ֭/שָּׂדֶה בְּלִיל֣/וֹ יקצירו וְ/כֶ֖רֶם רָשָׁ֣ע יְלַקֵּֽשׁוּ׃
translation:
  text: In the field they harvest fodder, and they glean in the vineyard of the wicked.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'provender' or 'mixed fodder'; the Hebrew refers to animal feed rather
      than ordinary grain.
    reason: lexical_alternative
  - marker: b
    text: Or 'they glean the vineyard of the wicked.' The Hebrew does not explicitly
      repeat the preposition 'in.'
    reason: lexical_alternative
  - marker: c
    text: '''The wicked'' may refer generically to a wicked owner; alternatively,
      ''a wicked man.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּשָּׂדֶה
  chosen: In the field
  alternatives:
  - In a field
  - Out in the field
  lexicon: HALOT
  rationale: The preposition ב plus שָׂדֶה is locative. English idiom favors 'in the
    field.' The definite article in Hebrew can be rendered naturally without overemphasis
    in English.
- source_word: בְּלִילוֹ
  chosen: fodder
  alternatives:
  - provender
  - mixed fodder
  - his fodder
  lexicon: HALOT
  rationale: בְּלִיל denotes mixed animal feed or fodder, not ordinary grain for human
    consumption. The 3ms suffix is best taken collectively/possessively with the field's
    produce rather than pressed into English as 'his fodder,' which would sound awkward
    and introduce an unclear antecedent.
- source_word: יקצירו
  chosen: they harvest
  alternatives:
  - they reap
  lexicon: HALOT
  rationale: From קצר 'to reap/harvest.' 'Harvest' is slightly more natural in contemporary
    English while preserving the agricultural sense.
- source_word: וְכֶרֶם
  chosen: and ... the vineyard
  alternatives:
  - and the vineyard
  - and in the vineyard
  lexicon: HALOT
  rationale: The conjunction links a second clause. English supplies 'in' idiomatically
    with 'glean' even though no preposition is explicit in Hebrew, because the verb
    naturally takes the location as its object in context.
- source_word: רָשָׁע
  chosen: the wicked
  alternatives:
  - a wicked man
  - the wicked man
  lexicon: HALOT
  rationale: The singular adjective functions substantivally. 'The wicked' preserves
    the generic/class sense and avoids over-specifying an individual male owner, though
    the context may imply a wicked landowner.
- source_word: יְלַקֵּשׁוּ
  chosen: they glean
  alternatives:
  - they gather late produce
  - they pick over
  lexicon: HALOT
  rationale: Piel of לקשׁ refers to gathering gleanings or late-picked produce. 'Glean'
    is the most concise and contextually fitting rendering, especially in parallel
    with harvesting.
