id: JOB.24.11
reference: Job 24:11
source:
  edition: WLC
  text: בֵּין שׁוּרֹתָ֥/ם יַצְהִ֑ירוּ יְקָבִ֥ים דָּ֝רְכ֗וּ וַ/יִּצְמָֽאוּ־׃
translation:
  text: Between their terraces they press out oil; they tread winepresses, yet they
    go thirsty.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their walls' or 'their rows'; the Hebrew term likely refers to the enclosed
      or terraced agricultural areas where the labor occurs.
    reason: lexical_alternative
  - marker: b
    text: The verb rendered 'press out oil' is traditionally difficult; literally
      it is related to 'oil' or 'brightness,' and in context likely refers to extracting
      olive oil.
    reason: lexical_alternative
lexical_decisions:
- source_word: בֵּין
  chosen: Between
  alternatives:
  - Among
  lexicon: HALOT
  rationale: Spatial preposition introducing the setting of the laborers' work. 'Between'
    is the most direct rendering.
- source_word: שׁוּרוֹתָם
  chosen: their terraces
  alternatives:
  - their walls
  - their rows
  lexicon: HALOT
  rationale: The noun can denote rows or walls; in this agricultural context, with
    oil production and winepresses, it likely refers to terraced rows/walled enclosures
    of vineyards or olive groves. 'Terraces' best conveys the likely setting in natural
    English while preserving the concrete image.
- source_word: יַצְהִירוּ
  chosen: they press out oil
  alternatives:
  - they make oil shine
  - they produce oil
  lexicon: HALOT
  rationale: Hiphil of צהר here is commonly understood in context as producing or
    pressing oil, not merely 'shining.' The surrounding imagery is agricultural exploitation,
    so 'press out oil' makes the action explicit and idiomatic.
- source_word: יְקָבִים
  chosen: winepresses
  alternatives:
  - vats
  lexicon: HALOT
  rationale: Standard term for winepresses or wine vats. 'Winepresses' is the clearer
    and more specific English choice.
- source_word: דָּרְכוּ
  chosen: they tread
  alternatives:
  - they trample
  lexicon: HALOT
  rationale: Common verb for treading grapes in a winepress. 'Tread' is the established
    and precise rendering.
- source_word: וַיִּצְמָאוּ
  chosen: yet they go thirsty
  alternatives:
  - and they thirst
  - but they are thirsty
  lexicon: HALOT
  rationale: The waw-consecutive advances the scene to its bitter result. 'Yet they
    go thirsty' captures the irony that those producing oil and wine are themselves
    deprived.
