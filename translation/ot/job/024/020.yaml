theological_decisions:
- issue: Whether עַוְלָה should be rendered abstractly ('unrighteousness/wickedness')
    or concretely ('the unjust/wicked man').
  chosen_reading: 'abstract: ''unrighteousness is broken like a tree'''
  alternative_readings:
  - 'concrete: ''the wicked man is broken like a tree'''
  rationale: The Hebrew form is an abstract noun, and the translation philosophy prefers
    original-language primacy over smoothing to traditional interpretation. Because
    the abstract may function metonymically for the evildoer, the concrete alternative
    is preserved in a footnote rather than adopted silently.
  doctrine_reference: Translation philosophy §1, §3, §5
