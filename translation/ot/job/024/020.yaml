id: JOB.24.20
reference: Job 24:20
source:
  edition: WLC
  text: יִשְׁכָּ֘חֵ֤/הוּ רֶ֨חֶם מְתָ֘ק֤/וֹ רִמָּ֗ה ע֥וֹד לֹֽא יִזָּכֵ֑ר וַ/תִּשָּׁבֵ֖ר
    כָּ/עֵ֣ץ עַוְלָֽה׀־׃
translation:
  text: The womb forgets him; the worm feeds sweetly on him. He is remembered no more,
    and unrighteousness is broken like a tree.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the worm finds him sweet.'
    reason: lexical_alternative
  - marker: b
    text: Or, 'the wicked man is broken like a tree.' The Hebrew has the abstract
      noun 'unrighteousness/wickedness,' which may stand for the evildoer.
    reason: alternative_reading
lexical_decisions:
- source_word: יִשְׁכָּחֵהוּ
  chosen: forgets him
  alternatives:
  - will forget him
  lexicon: HALOT
  rationale: Qal imperfect of שׁכח with 3ms suffix. English present gives a vivid
    gnomic sense in context, describing the fate of the wicked rather than a single
    future event.
- source_word: רֶחֶם
  chosen: the womb
  alternatives:
  - a womb
  - his mother’s womb
  lexicon: HALOT
  rationale: Literal rendering of רֶחֶם. In context it personifies the womb/mother
    as forgetting the wicked man after death. 'The womb' preserves the stark imagery
    better than an interpretive expansion.
- source_word: מְתָקוֹ
  chosen: feeds sweetly on him
  alternatives:
  - finds him sweet
  - is sweet to him
  lexicon: HALOT
  rationale: From מתק 'to be sweet.' With רִמָּה as subject, the sense is that the
    worm finds him sweet as food. 'Feeds sweetly on him' makes the idiom intelligible
    in English while preserving the gruesome metaphor.
- source_word: רִמָּה
  chosen: the worm
  alternatives:
  - worms
  - maggot
  lexicon: HALOT
  rationale: Singular noun in Hebrew; English singular works collectively here. 'Worm'
    is the most direct lexical equivalent and avoids over-specifying the species.
- source_word: עוֹד לֹא יִזָּכֵר
  chosen: He is remembered no more
  alternatives:
  - He will no longer be remembered
  - He is not remembered again
  lexicon: HALOT
  rationale: 'Niphal imperfect of זכר with עוֹד לֹא expresses cessation: no further
    remembrance. The passive English rendering matches the Hebrew voice and the lament
    style.'
- source_word: וַתִּשָּׁבֵר
  chosen: is broken
  alternatives:
  - will be broken
  - is shattered
  lexicon: HALOT
  rationale: Passive sense from שׁבר. Although formally wayyiqtol, in poetic discourse
    it functions well as part of the description of the wicked person's end. 'Is broken'
    keeps the line compact and parallel.
- source_word: כָּעֵץ
  chosen: like a tree
  alternatives:
  - like wood
  - like a piece of wood
  lexicon: HALOT
  rationale: The prefixed כ marks comparison. 'Tree' is the normal sense of עֵץ here
    and preserves the simile's force.
- source_word: עַוְלָה
  chosen: unrighteousness
  alternatives:
  - wickedness
  - injustice
  - the unjust man
  lexicon: HALOT
  rationale: The noun commonly means injustice/wrongdoing/wickedness. Here it likely
    stands abstractly for the wicked person's evil or, by abstraction for concrete,
    the evildoer. 'Unrighteousness' preserves the abstract Hebrew form in the main
    text, while an alternative is worth noting because some construe it concretely.
