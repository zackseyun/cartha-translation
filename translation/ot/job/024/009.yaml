id: JOB.24.9
reference: Job 24:9
source:
  edition: WLC
  text: יִ֭גְזְלוּ מִ/שֹּׁ֣ד יָת֑וֹם וְֽ/עַל עָנִ֥י יַחְבֹּֽלוּ־׃
translation:
  text: They snatch the orphan from the breast, and they take a pledge from the poor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'They rob the orphan from the mother's breast.' The Hebrew expression
      is difficult; the sense is that the wicked violently take even a nursing orphaned
      child.
    reason: lexical_alternative
lexical_decisions:
- source_word: יִגְזְלוּ
  chosen: They snatch
  alternatives:
  - They rob
  - They seize
  - They steal
  lexicon: HALOT
  rationale: The verb גזל denotes violent or unjust taking. 'Snatch' captures the
    forceful, predatory sense in context better than the more general 'steal' or 'rob.'
- source_word: מִשֹּׁד
  chosen: from the breast
  alternatives:
  - from the plunder
  - from devastation
  - from the mother's breast
  lexicon: HALOT
  rationale: Here שֹׁד is best taken in the sense reflected in traditional interpretation
    as 'breast'/'bosom,' yielding the idiom of taking an orphaned infant away from
    nursing. This fits the social-cruelty context of the verse better than reading
    it as 'plunder' or 'devastation.' Because the Hebrew form is difficult, the more
    explicit 'mother's breast' is possible but slightly interpretive; 'the breast'
    keeps closer to the source while remaining intelligible.
- source_word: יָתוֹם
  chosen: the orphan
  alternatives:
  - the fatherless child
  lexicon: HALOT
  rationale: יָתוֹם commonly denotes an orphan/fatherless child. 'Orphan' is concise,
    natural English and preserves the vulnerable social category in view.
- source_word: וְעַל
  chosen: and ... from
  alternatives:
  - and upon
  - and against
  lexicon: HALOT
  rationale: Although עַל normally means 'upon/on/against,' with חבל in this legal-economic
    context it introduces the person from whom a pledge is exacted. English idiom
    is better represented by 'from the poor' than a wooden 'upon the poor.'
- source_word: עָנִי
  chosen: the poor
  alternatives:
  - the afflicted
  - the needy
  lexicon: HALOT
  rationale: עָנִי can mean poor, afflicted, or humble depending on context. In parallel
    with exploitation through pledging, the socioeconomic sense 'the poor' is most
    fitting.
- source_word: יַחְבֹּלוּ
  chosen: they take a pledge
  alternatives:
  - they seize a pledge
  - they take as collateral
  lexicon: HALOT
  rationale: חבל in this stem commonly refers to taking a pledge/collateral for debt.
    'Take a pledge' is a clear legal-economic rendering in readable English; 'as collateral'
    is accurate but more explanatory than necessary.
