id: JOB.24.18
reference: Job 24:18
source:
  edition: WLC
  text: קַֽל ה֤וּא עַל פְּנֵי מַ֗יִם תְּקֻלַּ֣ל חֶלְקָתָ֣/ם בָּ/אָ֑רֶץ לֹֽא יִ֝פְנֶה
    דֶּ֣רֶךְ כְּרָמִֽים־׀־־־׃
translation:
  text: He is swift on the surface of the waters; their portion in the land is cursed;
    he does not turn toward the way of the vineyards.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'He is light upon the face of the waters'; the Hebrew is difficult, and
      some take the opening as describing transience rather than speed.
    reason: lexical_alternative
  - marker: b
    text: Hebrew is difficult; some read 'his portion in the land is cursed' instead
      of 'their portion in the land is cursed.'
    reason: textual_variant
  - marker: c
    text: Or 'he does not turn to the road of the vineyards,' possibly meaning he
      no longer returns to cultivated land or prosperous places.
    reason: lexical_alternative
lexical_decisions:
- source_word: קַֽל
  chosen: swift
  alternatives:
  - light
  - fleet
  lexicon: HALOT
  rationale: The adjective literally means 'light,' but in context with movement on
    water it idiomatically conveys speed or fleetingness. 'Swift' preserves the likely
    sense without over-paraphrasing.
- source_word: עַל פְּנֵי מַיִם
  chosen: on the surface of the waters
  alternatives:
  - upon the face of the waters
  - on the waters
  lexicon: HALOT
  rationale: A fairly literal rendering of the Hebrew idiom. 'Surface' communicates
    the sense of פני in natural English while retaining the image.
- source_word: תְּקֻלַּ֣ל
  chosen: is cursed
  alternatives:
  - shall be cursed
  - is lightly esteemed
  lexicon: HALOT
  rationale: From קלל in the Pual, the passive sense 'be cursed' best fits the syntax
    with 'their portion.' Some interpreters connect the root with 'be slight/light,'
    but the passive curse sense is the more straightforward reading here.
- source_word: חֶלְקָתָם
  chosen: their portion
  alternatives:
  - his portion
  - their inheritance
  - their tract
  lexicon: HALOT
  rationale: The ketiv/qere tradition and consonantal form allow some uncertainty
    between singular and plural reference in this difficult verse. 'Their portion'
    follows the supplied morphology and matches the plural suffix in the presented
    text.
- source_word: בָּאָרֶץ
  chosen: in the land
  alternatives:
  - on the earth
  - in the earth
  lexicon: HALOT
  rationale: '''Land'' is preferable here because it naturally pairs with ''portion''
    as landed possession, though ''earth'' is lexically possible.'
- source_word: לֹא יִפְנֶה
  chosen: he does not turn toward
  alternatives:
  - he does not go back to
  - one does not turn toward
  - he does not face
  lexicon: HALOT
  rationale: פנה commonly means 'turn' or 'turn toward.' This keeps the verbal image
    and avoids importing a more interpretive sense like 'return' unless context demands
    it.
- source_word: דֶּרֶךְ כְּרָמִים
  chosen: the way of the vineyards
  alternatives:
  - the road to the vineyards
  - the path of the vineyards
  lexicon: HALOT
  rationale: A close rendering of the construct phrase. It likely refers to the route
    leading to vineyard country or cultivated prosperity; the literal wording preserves
    the image and ambiguity.
