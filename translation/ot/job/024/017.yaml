id: JOB.24.17
reference: Job 24:17
source:
  edition: WLC
  text: כִּ֤י יַחְדָּ֨ו בֹּ֣קֶר לָ֣/מוֹ צַלְמָ֑וֶת כִּֽי יַ֝כִּ֗יר בַּלְה֥וֹת צַלְמָֽוֶת׀־׃
translation:
  text: For deep darkness is morning to them all, for they are familiar with the terrors
    of deep darkness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'For morning is to them all like deep darkness'; the Hebrew order is
      compact and allows a slightly more literal rendering.
    reason: alternative_reading
  - marker: b
    text: Hebrew צַלְמָוֶת (tsalmaveth) can also be rendered 'shadow of death.' Here
      it likely means 'deep darkness' or 'gloom' rather than death itself.
    reason: lexical_alternative
  - marker: c
    text: The verb is singular in Hebrew ('he knows/recognizes'), but it likely has
      a generic sense referring to the wicked as a class; hence the plural in English.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - because
  lexicon: HALOT
  rationale: Introduces an explanatory clause continuing the description of the wicked;
    'for' fits the causal/explanatory force in context.
- source_word: יַחְדָּו
  chosen: all
  alternatives:
  - together
  - altogether
  lexicon: HALOT
  rationale: The adverb literally means 'together,' but in English 'morning is deep
    darkness to them together' is awkward. Rendering its distributive sense as 'to
    them all' preserves the collective force idiomatically.
- source_word: בֹּקֶר
  chosen: morning
  alternatives:
  - dawn
  lexicon: HALOT
  rationale: Standard sense is 'morning'; this preserves the stark contrast with 'deep
    darkness.'
- source_word: לָמוֹ
  chosen: to them
  alternatives:
  - for them
  lexicon: HALOT
  rationale: Pronominal phrase indicating relation; 'to them' works naturally with
    the verbless clause in English.
- source_word: צַלְמָוֶת
  chosen: deep darkness
  alternatives:
  - shadow of death
  - gloom
  lexicon: HALOT
  rationale: In Job this term often denotes profound darkness or gloom rather than
    explicitly 'death.' 'Deep darkness' reflects current scholarly consensus and avoids
    importing death-language where the context emphasizes darkness and terror.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces the second explanatory clause, parallel to the first.
- source_word: יַכִּיר
  chosen: they are familiar with
  alternatives:
  - he recognizes
  - one knows
  - they know
  lexicon: HALOT
  rationale: The Hebrew form is 3ms ('he recognizes/knows'), but in context it functions
    generically with reference to the class of evildoers just described. English plural
    smooths the sense. 'Are familiar with' captures experiential acquaintance, not
    mere cognition.
- source_word: בַּלְהוֹת
  chosen: the terrors of
  alternatives:
  - terrors
  - dreadful things of
  lexicon: HALOT
  rationale: Plural noun denoting terrors or sudden horrors; with the following genitive-like
    construction, 'the terrors of deep darkness' is the most natural English expression.
- source_word: צַלְמָוֶת
  chosen: deep darkness
  alternatives:
  - shadow of death
  - gloom
  lexicon: HALOT
  rationale: Repeated for emphasis; translated consistently in both occurrences within
    the verse.
