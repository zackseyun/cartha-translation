theological_decisions:
- issue: Ambiguous subject in the final clause
  chosen_reading: 'The clause is rendered impersonally/resultatively: ''no one is
    sure of life.'''
  alternative_readings:
  - '''he does not trust in life'''
  - '''he has no assurance of life'''
  rationale: The verse is syntactically compressed and the final singular verb can
    be read with the wicked man as subject. However, the broader context emphasizes
    the terror and insecurity caused by the oppressor. Rendering the clause impersonally
    best communicates that effect in English while preserving the text's ambiguity
    in a footnote.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it'
