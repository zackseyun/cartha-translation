id: JOB.24.22
reference: Job 24:22
source:
  edition: WLC
  text: וּ/מָשַׁ֣ךְ אַבִּירִ֣ים בְּ/כֹח֑/וֹ יָ֝ק֗וּם וְֽ/לֹא יַאֲמִ֥ין בַּֽ/חַיִּֽין־׃
translation:
  text: Yet he drags away the mighty by his power; he rises up, and no one is sure
    of life.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'he rises up, and he does not trust in life,' or 'he rises up, and he
      has no assurance of life.' The Hebrew subject in the final clause is ambiguous.
    reason: alternative_reading
lexical_decisions:
- source_word: וּמָשַׁךְ
  chosen: drags away
  alternatives:
  - draws away
  - prolongs
  lexicon: HALOT, BDB
  rationale: 'The verb משׁך commonly means ''draw, pull, drag.'' In context, with
    ''the mighty'' as object and followed by ''by his power,'' a forceful sense fits
    best: the wicked man carries off or drags away powerful people. Some interpreters
    take it in the sense ''prolongs/preserves,'' but that requires a more idiomatic
    extension less natural here.'
- source_word: אַבִּירִים
  chosen: the mighty
  alternatives:
  - the strong
  - bulls/strong ones
  lexicon: HALOT, BDB
  rationale: אַבִּירִים denotes strong or powerful ones. 'The mighty' is idiomatic
    English and preserves the social-power nuance better than the more physical 'the
    strong.'
- source_word: בְּכֹחוֹ
  chosen: by his power
  alternatives:
  - with his strength
  lexicon: HALOT, BDB
  rationale: כֹּחַ refers to strength or power. 'By his power' fits the instrumental
    beth and reads naturally in English.
- source_word: יָקוּם
  chosen: he rises up
  alternatives:
  - he stands up
  - he sets himself up
  lexicon: HALOT, BDB
  rationale: 'קום in the qal commonly means ''arise, stand up.'' ''He rises up'' preserves
    the verbal imagery and leaves the precise nuance open: renewed action, assertion,
    or continued standing.'
- source_word: וְלֹא יַאֲמִין בַּחַיִּין
  chosen: and no one is sure of life
  alternatives:
  - and he does not trust in life
  - and he has no assurance of life
  lexicon: HALOT, BDB
  rationale: 'The Hebrew is difficult. Formally, the subject of יַאֲמִין could remain
    singular (''he does not trust in life''), but in context many understand an impersonal/resultative
    sense: when such a man rises, life is insecure. ''No one is sure of life'' captures
    the likely sense in readable English while reflecting the instability conveyed
    by the clause.'
