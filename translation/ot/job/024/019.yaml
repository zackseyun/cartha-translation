id: JOB.24.19
reference: Job 24:19
source:
  edition: WLC
  text: צִיָּ֤ה גַם חֹ֗ם יִגְזְל֥וּ מֵֽימֵי שֶׁ֗לֶג שְׁא֣וֹל חָטָֽאוּ־־׃
translation:
  text: Drought and heat also snatch away the waters of snow; so Sheol takes those
    who have sinned.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'meltwater from snow.' The Hebrew is literally 'waters of snow.'
    reason: lexical_alternative
  - marker: b
    text: '''Sheol'' is the Hebrew term for the realm of the dead; alternatively,
      ''the grave.'''
    reason: alternative_reading
lexical_decisions:
- source_word: צִיָּה
  chosen: drought
  alternatives:
  - dryness
  - parched land
  lexicon: HALOT
  rationale: The noun denotes aridity/dryness. In parallel with חֹם ('heat') and as
    the subject of יגזלו, 'drought' gives clear idiomatic English while preserving
    the image of desiccating conditions.
- source_word: גַם
  chosen: also
  alternatives:
  - even
  lexicon: HALOT
  rationale: Adds the second element in the pair ('drought and heat also'), marking
    continuation of the comparison.
- source_word: חֹם
  chosen: heat
  alternatives:
  - hot weather
  lexicon: HALOT
  rationale: Straightforward rendering of the noun in parallel with ציה.
- source_word: יִגְזְלוּ
  chosen: snatch away
  alternatives:
  - steal
  - take away
  - rob
  lexicon: HALOT
  rationale: The verb גזל commonly conveys seizing/robbing. 'Snatch away' preserves
    the vivid, forceful image without sounding awkward with inanimate subjects ('drought
    and heat').
- source_word: מֵימֵי שֶׁלֶג
  chosen: the waters of snow
  alternatives:
  - snow waters
  - meltwater from snow
  lexicon: HALOT
  rationale: A fairly literal rendering preserves the poetic image. English readers
    can understand it as waters derived from snow; a more interpretive 'meltwater'
    is possible but less formally transparent.
- source_word: שְׁאוֹל
  chosen: Sheol
  alternatives:
  - the grave
  - the realm of the dead
  lexicon: HALOT
  rationale: The Hebrew term refers to the underworld/realm of the dead. Transliteration
    preserves the Hebrew concept without prematurely collapsing it into only 'grave'
    or a later doctrinal category such as 'hell.'
- source_word: חָטָאוּ
  chosen: those who have sinned
  alternatives:
  - sinners
  - they have sinned
  lexicon: HALOT
  rationale: The verb is perfect plural, literally 'they sinned' or 'have sinned.'
    In English, after 'Sheol' as subject, an explicit object is needed; 'those who
    have sinned' makes the implied object clear and preserves the verbal force better
    than the nominal shorthand 'sinners'.
