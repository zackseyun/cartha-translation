theological_decisions:
- issue: Meaning of שְׁאוֹל
  chosen_reading: Sheol is retained as a transliteration referring to the realm of
    the dead.
  alternative_readings:
  - the grave
  - the underworld
  - death
  rationale: The verse uses Sheol in a poetic comparison, and transliteration best
    preserves the Hebrew concept without importing a more specific theological notion
    such as final punishment. This aligns with original-language primacy and preserving
    ambiguity where the source does not specify more.
  doctrine_reference: Translation philosophy §1, §3
