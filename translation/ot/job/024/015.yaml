id: JOB.24.15
reference: Job 24:15
source:
  edition: WLC
  text: וְ/עֵ֤ין נֹאֵ֨ף שָׁ֤מְרָֽה נֶ֣שֶׁף לֵ֭/אמֹר לֹא תְשׁוּרֵ֣/נִי עָ֑יִן וְ/סֵ֖תֶר
    פָּנִ֣ים יָשִֽׂים׀־׃
translation:
  text: The eye of the adulterer waits for twilight, saying, ‘No eye will see me’;
    and he puts a covering over his face.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'dusk' for 'twilight.' The Hebrew noun can refer to the dim light at
      day's end, fitting the context of secret sin.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'and a concealment of face he puts.' The Hebrew expression means
      that he covers or disguises his face to avoid recognition.
    reason: lexical_alternative
lexical_decisions:
- source_word: עֵין
  chosen: eye
  alternatives:
  - look
  - sight
  lexicon: HALOT
  rationale: Literal 'eye' is idiomatic and fits both occurrences in the verse, preserving
    the concrete imagery of secretive watching and being seen.
- source_word: נֹאֵף
  chosen: adulterer
  alternatives:
  - one who commits adultery
  lexicon: HALOT
  rationale: The participle denotes a man engaged in adultery. 'Adulterer' is concise,
    natural English, and matches the masculine singular sense.
- source_word: שָׁמְרָה
  chosen: waits for
  alternatives:
  - keeps watch for
  - watches for
  lexicon: HALOT
  rationale: Though the verb basically means 'keep/watch/guard,' in context it means
    waiting expectantly for the onset of darkness. 'Waits for' is the clearest idiomatic
    rendering.
- source_word: נֶשֶׁף
  chosen: twilight
  alternatives:
  - dusk
  - evening gloom
  lexicon: HALOT
  rationale: The noun can denote twilight, often evening twilight in contexts of secret
    wrongdoing. 'Twilight' preserves the ambiguity of fading light without over-specifying.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - thinking
  - saying to himself
  lexicon: HALOT
  rationale: The infinitive introduces the adulterer's internal or spoken thought.
    'Saying' is the standard and sufficiently flexible rendering.
- source_word: תְשׁוּרֵנִי
  chosen: will see me
  alternatives:
  - will behold me
  - will look upon me
  lexicon: HALOT
  rationale: From שׁוּר, 'to look at, behold.' 'Will see me' is natural English and
    matches the surveillance motif of the verse.
- source_word: וְסֵתֶר פָּנִים
  chosen: a covering over his face
  alternatives:
  - a veil for his face
  - concealment of his face
  - a hidden face
  lexicon: HALOT
  rationale: The phrase is somewhat compressed. It conveys concealment of the face/identity.
    'A covering over his face' makes the sense explicit in readable English without
    over-paraphrasing.
- source_word: יָשִׂים
  chosen: he puts
  alternatives:
  - he sets
  - he places
  lexicon: HALOT
  rationale: Simple active verb meaning 'put/place/set.' 'He puts' is the most natural
    collocation with 'a covering over his face.'
