id: JOB.24.12
reference: Job 24:12
source:
  edition: WLC
  text: מֵ֘/עִ֤יר מְתִ֨ים יִנְאָ֗קוּ וְ/נֶֽפֶשׁ חֲלָלִ֥ים תְּשַׁוֵּ֑עַ וֶ֝/אֱל֗וֹהַּ
    לֹא יָשִׂ֥ים תִּפְלָֽה׀־־׃
translation:
  text: From the city the dying groan, and the soul of the slain cries out for help,
    yet God does not charge it as wrong.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'In the city men groan'; the Hebrew מְתִים is difficult here, and some
      take it in the sense of 'men' rather than 'the dying.'
    reason: lexical_alternative
  - marker: b
    text: Or 'yet God does not regard it as folly' or 'yet God does not lay blame.'
      The Hebrew idiom is difficult.
    reason: alternative_reading
lexical_decisions:
- source_word: מֵעִיר
  chosen: From the city
  alternatives:
  - In the city
  - Out of the city
  lexicon: HALOT
  rationale: The preposition מִן with עִיר most naturally means 'from the city,' marking
    the place from which the groaning arises. English 'from the city' preserves the
    Hebrew image without overinterpreting whether the sense is source or location.
- source_word: מְתִים
  chosen: the dying
  alternatives:
  - men
  - the dead
  - mortals
  lexicon: HALOT
  rationale: Although the form can be associated with 'men' in some contexts, here
    the parallel with 'the soul of the slain' favors a sense connected with death
    and mortal suffering. 'The dying' best fits the lament context and avoids the
    awkwardness of 'the dead groan.'
- source_word: יִנְאָקוּ
  chosen: groan
  alternatives:
  - moan
  - lament
  lexicon: HALOT
  rationale: The verb denotes audible suffering or groaning. 'Groan' is natural modern
    English and preserves the visceral force of the Hebrew.
- source_word: וְנֶפֶשׁ
  chosen: and the soul
  alternatives:
  - and the life
  - and the person
  lexicon: HALOT
  rationale: נֶפֶשׁ can mean 'soul,' 'life,' or 'self/person.' Here 'the soul of the
    slain' is a conventional and intelligible rendering that preserves the Hebrew
    wording and emotional weight. The broader sense 'life' is possible but less idiomatic
    in this construction.
- source_word: חֲלָלִים
  chosen: the slain
  alternatives:
  - the wounded
  - the pierced
  lexicon: HALOT
  rationale: The noun commonly refers to those fatally struck down. 'The slain' fits
    the context of violent injustice in Job 24.
- source_word: תְּשַׁוֵּעַ
  chosen: cries out for help
  alternatives:
  - cries out
  - shouts
  - pleads
  lexicon: HALOT
  rationale: The Piel form conveys a desperate cry for aid. 'Cries out for help' makes
    the implied appeal explicit in idiomatic English.
- source_word: וֶאֱלוֹהַּ
  chosen: yet God
  alternatives:
  - but God
  - and God
  lexicon: HALOT
  rationale: The conjunction here is adversative in sense given the contrast between
    human suffering and divine non-response. 'Yet God' captures that tension well.
- source_word: לֹא יָשִׂים תִּפְלָה
  chosen: does not charge it as wrong
  alternatives:
  - does not regard it as folly
  - does not lay blame
  - does not pay attention to the outrage
  lexicon: HALOT
  rationale: The idiom is difficult. שׂים with תִּפְלָה likely means to set or count
    something as impropriety, absurdity, or wrong. In context, Job's complaint is
    that God does not treat this state of affairs as culpable or intolerable. 'Does
    not charge it as wrong' communicates that sense in clear English while preserving
    the judicial nuance.
