theological_decisions:
- issue: Divine non-response in the face of injustice
  chosen_reading: yet God does not charge it as wrong
  alternative_readings:
  - yet God does not regard the cry as folly
  - yet God does not pay attention to the prayer/cry
  rationale: The verse expresses Job's complaint about apparent divine inaction, not
    a doctrinal denial of God's justice. The chosen rendering preserves the tension
    of the Hebrew without softening it or importing a theological resolution not present
    in the text.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
