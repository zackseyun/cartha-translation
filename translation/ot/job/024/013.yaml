id: JOB.24.13
reference: Job 24:13
source:
  edition: WLC
  text: הֵ֤מָּה הָיוּ֮ בְּֽ/מֹרְדֵ֫י א֥וֹר לֹֽא הִכִּ֥ירוּ דְרָכָ֑י/ו וְ/לֹ֥א יָ֝שְׁב֗וּ
    בִּ/נְתִיבֹתָֽי/ו׀־־׃
translation:
  text: These are among those who rebel against the light; they do not recognize its
    ways, and they do not stay in its paths.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'They were among the rebels against the light.' The Hebrew verb can be
      read as past ('were'), but in this poetic context it likely describes an ongoing
      class of people.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'his ways ... his paths'; the suffixes most naturally refer to 'light,'
      hence 'its ways ... its paths' in English.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֵמָּה
  chosen: These
  alternatives:
  - They
  lexicon: HALOT
  rationale: Independent pronoun used for emphasis. 'These' preserves the demonstrative-like
    force in context, pointing out a class of people just described; 'they' is possible
    but less pointed.
- source_word: הָיוּ
  chosen: are
  alternatives:
  - were
  lexicon: HALOT
  rationale: Although formally qatal ('were'), Hebrew often uses היה with class-membership
    in a gnomic or present-descriptive sense in poetry. In context Job is characterizing
    a type of wicked person, so present 'are' reads naturally in English while preserving
    the ongoing description.
- source_word: בְּמֹרְדֵי
  chosen: among those who rebel
  alternatives:
  - among the rebels
  - with the rebels
  lexicon: HALOT
  rationale: 'The preposition ב plus participial noun is best taken as class inclusion:
    ''among those who rebel.'' Rendering the participle verbally keeps the active
    sense of מרד clear.'
- source_word: אוֹר
  chosen: the light
  alternatives:
  - light
  lexicon: HALOT
  rationale: Definite-sounding English fits the generic but conceptually definite
    Hebrew expression in context. Here 'light' likely carries both literal and moral/social
    overtones, so a straightforward rendering is preferred without over-interpreting.
- source_word: לֹא הִכִּירוּ
  chosen: do not recognize
  alternatives:
  - have not known
  - do not know
  - do not acknowledge
  lexicon: HALOT
  rationale: הכיר can mean recognize, know, or acknowledge. 'Recognize' fits the object
    'its ways' well and preserves the sense of failing to perceive or admit them.
    Present tense matches the gnomic description.
- source_word: דְרָכָיו
  chosen: its ways
  alternatives:
  - his ways
  - their ways
  lexicon: HALOT
  rationale: The 3ms suffix most naturally refers back to אוֹר, a grammatically masculine
    singular noun, yielding 'its ways' in idiomatic English. 'His ways' would personify
    'light' more strongly than the Hebrew requires.
- source_word: וְלֹא יָשְׁבוּ
  chosen: and they do not stay
  alternatives:
  - and they do not dwell
  - and they do not sit
  - nor do they remain
  lexicon: HALOT
  rationale: ישב commonly means sit, dwell, remain. With 'in its paths,' the sense
    is abiding or remaining in them, not literal sitting. 'Stay' is natural modern
    English and preserves the metaphor.
- source_word: בִּנְתִיבֹתָיו
  chosen: in its paths
  alternatives:
  - in its tracks
  - on its paths
  - in its ways
  lexicon: HALOT
  rationale: נתיבה denotes a path or track. 'Paths' keeps the poetic parallel with
    'ways' while preserving the distinct lexical item. The suffix is again best referred
    to 'light,' hence 'its.'
