id: JOB.24.24
reference: Job 24:24
source:
  edition: WLC
  text: ר֤וֹמּוּ מְּעַ֨ט וְֽ/אֵינֶ֗/נּוּ וְֽ/הֻמְּכ֗וּ כַּ/כֹּ֥ל יִקָּפְצ֑וּ/ן וּ/כְ/רֹ֖אשׁ
    שִׁבֹּ֣לֶת יִמָּֽלוּ׀׃
translation:
  text: They are exalted a little while, and then they are gone; they are brought
    low; like all others they are gathered up, and like the head of a stalk of grain
    they are cut off.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'they are no more.' The Hebrew idiom can be rendered more literally
      this way.
    reason: lexical_alternative
  - marker: b
    text: Or, 'they are taken away' for 'are gathered up.' The Hebrew verb here is
      rare and its nuance is debated.
    reason: lexical_alternative
  - marker: c
    text: Literally, 'like the head of an ear of grain.'
    reason: cultural_note
lexical_decisions:
- source_word: רֹמּוּ
  chosen: are exalted
  alternatives:
  - rise high
  - are lifted up
  lexicon: HALOT
  rationale: From רום in the passive/resultative sense, describing being raised to
    a high position or status. 'Are exalted' fits the context of the wicked attaining
    prominence.
- source_word: מְּעַט
  chosen: a little while
  alternatives:
  - a little
  - briefly
  lexicon: HALOT
  rationale: 'Though literally ''a little,'' in context with the following disappearance
    it functions temporally: their exaltation is brief.'
- source_word: וְאֵינֶנּוּ
  chosen: and then they are gone
  alternatives:
  - and they are no more
  - and he is not
  lexicon: HALOT
  rationale: The idiom expresses disappearance or cessation of existence/presence.
    Although the suffix is morphologically singular in form, the clause functions
    distributively with the plural surrounding verbs; English plural is natural and
    contextually coherent.
- source_word: וְהֻמְּכוּ
  chosen: they are brought low
  alternatives:
  - they are humbled
  - they sink down
  lexicon: HALOT
  rationale: From מוך/מך in the passive, indicating being reduced, abased, or brought
    down from former height. 'Brought low' preserves the reversal imagery after exaltation.
- source_word: כַּכֹּל
  chosen: like all others
  alternatives:
  - like all
  - like everyone
  lexicon: HALOT
  rationale: Comparative כ plus כל indicates they share the common fate of all people.
    'Others' is supplied for idiomatic English and to make the comparison explicit.
- source_word: יִקָּפְצוּן
  chosen: are gathered up
  alternatives:
  - are taken away
  - are swept together
  lexicon: HALOT
  rationale: The Niphal of קפץ is difficult and context-sensitive. Here it likely
    conveys being collected/removed together in death or judgment. 'Gathered up' preserves
    the image without over-interpreting the mechanism.
- source_word: וּכְרֹאשׁ שִׁבֹּלֶת
  chosen: like the head of a stalk of grain
  alternatives:
  - like the top of an ear of grain
  - like the head of grain
  lexicon: HALOT
  rationale: שבלת denotes an ear/head of grain; ראש marks its top/head. The phrase
    evokes harvest imagery. 'Stalk of grain' clarifies the agricultural picture for
    modern readers while retaining the metaphor.
- source_word: יִמָּלוּ
  chosen: are cut off
  alternatives:
  - are cut down
  - wither
  lexicon: HALOT
  rationale: From מול/מלל in harvest imagery, likely referring to cutting off the
    grain head. 'Are cut off' matches both the agricultural metaphor and the broader
    theme of sudden end.
