id: JOB.24.3
reference: Job 24:3
source:
  edition: WLC
  text: חֲמ֣וֹר יְתוֹמִ֣ים יִנְהָ֑גוּ יַ֝חְבְּל֗וּ שׁ֣וֹר אַלְמָנָֽה׃
translation:
  text: They drive away the orphan's donkey; they take the widow's ox as a pledge.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'They lead off the donkeys of orphans.' The Hebrew uses a plural for
      'orphans,' which may be read distributively or collectively.
    reason: lexical_alternative
  - marker: b
    text: Or 'they seize the widow's ox in pledge' or 'as collateral.' The verb refers
      specifically to taking property as security for a debt.
    reason: lexical_alternative
lexical_decisions:
- source_word: חֲמוֹר
  chosen: donkey
  alternatives:
  - male donkey
  - ass
  lexicon: HALOT
  rationale: Standard rendering for the domestic pack animal; 'donkey' is clear modern
    English, while 'ass' is archaic in contemporary usage.
- source_word: יְתוֹמִים
  chosen: the orphan's
  alternatives:
  - orphans'
  - the fatherless's
  lexicon: HALOT
  rationale: The plural Hebrew can function collectively. English idiom prefers the
    singular collective 'the orphan's' here, matching the representative social category
    rather than emphasizing number. 'Fatherless' is traditional but less natural in
    modern English.
- source_word: יִנְהָגוּ
  chosen: drive away
  alternatives:
  - drive
  - lead away
  lexicon: HALOT
  rationale: From נהג, to drive/lead. In this context of oppression and seizure of
    property, 'drive away' brings out the wrongful taking implied by the surrounding
    accusations without adding more than the context warrants.
- source_word: יַחְבְּלוּ
  chosen: take ... as a pledge
  alternatives:
  - seize as collateral
  - take in pledge
  - distrain
  lexicon: HALOT
  rationale: From חבל in the sense of taking a pledge. The legal-economic nuance is
    important in Job 24's catalog of injustices, so the translation preserves the
    specific practice rather than flattening it to merely 'take' or 'steal'.
- source_word: שׁוֹר
  chosen: ox
  alternatives:
  - bull
  - cattle
  lexicon: HALOT
  rationale: '''Ox'' is the standard singular rendering in legal and agrarian contexts
    and fits the likely work animal in view.'
- source_word: אַלְמָנָה
  chosen: the widow's
  alternatives:
  - widow
  lexicon: HALOT
  rationale: 'The construct relationship is best represented possessively in English:
    the ox belonging to the widow.'
