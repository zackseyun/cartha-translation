id: JOB.24.2
reference: Job 24:2
source:
  edition: WLC
  text: גְּבֻל֥וֹת יַשִּׂ֑יגוּ עֵ֥דֶר גָּ֝זְל֗וּ וַ/יִּרְעֽוּ׃
translation:
  text: They move boundary markers; they seize a flock and pasture it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'remove boundary markers.' The Hebrew verb can denote shifting or removing
      property markers to encroach on another's land.
    reason: lexical_alternative
  - marker: b
    text: Or 'they steal a flock and shepherd it.'
    reason: lexical_alternative
lexical_decisions:
- source_word: גְּבֻל֥וֹת
  chosen: boundary markers
  alternatives:
  - boundaries
  - landmarks
  lexicon: HALOT
  rationale: The plural noun refers here to property boundaries, likely the physical
    markers demarcating land. 'Boundary markers' makes the concrete legal-social sense
    clear in modern English better than the more abstract 'boundaries.'
- source_word: יַשִּׂ֑יגוּ
  chosen: move
  alternatives:
  - remove
  - shift back
  lexicon: HALOT
  rationale: In context of property lines, the verb means to move or encroach upon
    boundary markers. 'Move' is concise and idiomatic; 'remove' is possible but too
    absolute, while 'shift back' is interpretive.
- source_word: עֵ֥דֶר
  chosen: a flock
  alternatives:
  - the flock
  - a herd
  lexicon: HALOT
  rationale: The singular collective noun commonly means 'flock.' The anarthrous form
    is well represented by English indefinite 'a flock.' 'Herd' is broader and less
    natural for this term.
- source_word: גָּ֝זְל֗וּ
  chosen: they seize
  alternatives:
  - they steal
  - they rob
  lexicon: HALOT
  rationale: The verb denotes taking by force or theft. 'Seize' preserves the violent,
    unlawful taking without narrowing to covert theft; 'steal' is possible and common
    in translations.
- source_word: וַ/יִּרְעֽוּ
  chosen: and pasture it
  alternatives:
  - and feed it
  - and shepherd it
  lexicon: HALOT
  rationale: From רעה, the sense is to pasture/graze a flock. 'Pasture it' fits the
    object 'flock' and conveys the irony that after stealing it, they openly tend
    it as their own. 'Shepherd it' is possible but slightly more interpretive toward
    role than action.
