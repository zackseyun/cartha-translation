id: JOB.24.5
reference: Job 24:5
source:
  edition: WLC
  text: הֵ֤ן פְּרָאִ֨ים בַּֽ/מִּדְבָּ֗ר יָצְא֣וּ בְּ֭/פָעֳלָ/ם מְשַׁחֲרֵ֣י לַ/טָּ֑רֶף
    עֲרָבָ֥ה ל֥/וֹ לֶ֝֗חֶם לַ/נְּעָרִֽים׀׃
translation:
  text: Look, like wild donkeys in the wilderness they go out to their labor, seeking
    food early; the desert provides him bread for the children.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the steppe provides food for his young ones.' The Hebrew has singular
      'for him' and a final noun that could be rendered 'young ones,' 'children,'
      or 'boys,' depending on how concretely one takes the image.
    reason: lexical_alternative
  - marker: b
    text: '''Seeking food early'' renders a participle that can also be understood
      as ''rising early for prey/provision.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: הֵן
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: Introduces the scene with attention-getting force. 'Look' is natural
    modern English while preserving the deictic emphasis.
- source_word: פְּרָאִים
  chosen: wild donkeys
  alternatives:
  - wild asses
  lexicon: HALOT
  rationale: Refers to untamed donkeys of the wilderness. 'Wild donkeys' is accurate
    and contemporary; 'wild asses' is archaic in modern English.
- source_word: בַּמִּדְבָּר
  chosen: in the wilderness
  alternatives:
  - in the desert
  lexicon: HALOT
  rationale: The phrase locates the wild donkeys in an uncultivated wasteland. 'Wilderness'
    preserves the broader sense better than the narrower 'desert' here.
- source_word: יָצְאוּ
  chosen: they go out
  alternatives:
  - they go forth
  - they come out
  lexicon: HALOT
  rationale: Simple motion verb; present-like English fits the vivid poetic description.
- source_word: בְּפָעֳלָם
  chosen: to their labor
  alternatives:
  - for their work
  - at their task
  lexicon: HALOT
  rationale: Conveys purposeful activity in earning sustenance. 'Labor' suits the
    hardship context of the oppressed described in the chapter.
- source_word: מְשַׁחֲרֵי
  chosen: seeking ... early
  alternatives:
  - rising early for
  - diligently seeking
  lexicon: HALOT
  rationale: The participle carries the sense of seeking from early morning. Rendering
    with 'seeking ... early' preserves both pursuit and temporal nuance.
- source_word: לַטָּרֶף
  chosen: food
  alternatives:
  - prey
  - provision
  lexicon: HALOT
  rationale: Though often 'prey,' in this human-poverty context it refers more broadly
    to sustenance obtained for survival, not animal hunting specifically.
- source_word: עֲרָבָה
  chosen: the desert
  alternatives:
  - the steppe
  - the Arabah
  - the wilderness plain
  lexicon: HALOT
  rationale: Denotes arid wasteland/steppe. 'The desert' is the clearest natural English
    rendering, though the term can refer specifically to steppe country.
- source_word: לוֹ
  chosen: him
  alternatives:
  - them
  - for him
  lexicon: HALOT
  rationale: The consonantal text is singular ('for him'). It likely functions distributively
    or as a representative singular within the poetic line. I preserved the singular
    in the main text rather than smoothing to plural.
- source_word: לֶחֶם
  chosen: bread
  alternatives:
  - food
  lexicon: HALOT
  rationale: Literal 'bread' is retained, as it commonly stands for basic sustenance
    and preserves the concreteness of the Hebrew image.
- source_word: לַנְּעָרִים
  chosen: for the children
  alternatives:
  - for the young ones
  - for his boys
  - for the youths
  lexicon: HALOT
  rationale: In context this most naturally refers to dependents/children needing
    food. 'Children' communicates the sense clearly in modern English without implying
    only males.
