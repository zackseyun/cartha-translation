id: JOB.24.14
reference: Job 24:14
source:
  edition: WLC
  text: לָ/א֡וֹר יָ֘ק֤וּם רוֹצֵ֗חַ יִֽקְטָל עָנִ֥י וְ/אֶבְי֑וֹן וּ֝/בַ/לַּ֗יְלָה יְהִ֣י
    כַ/גַּנָּֽב־׃
translation:
  text: At dawn the murderer rises; he kills the poor and needy, and in the night
    he is like a thief.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'At the light' / 'With the light'; the Hebrew literally refers to the
      coming of light, likely daybreak.
    reason: lexical_alternative
  - marker: b
    text: Or 'he murders the poor and needy'; the Hebrew uses a different verb here
      from 'murderer,' so the main text preserves that distinction with 'kills.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לָאוֹר
  chosen: At dawn
  alternatives:
  - At the light
  - With the light
  - By daylight
  lexicon: HALOT
  rationale: Literally 'to/for the light,' an idiom for the coming of light, i.e.,
    daybreak. 'At dawn' gives the temporal sense naturally in English without over-literal
    awkwardness.
- source_word: יָקוּם
  chosen: rises
  alternatives:
  - gets up
  - stands up
  lexicon: HALOT
  rationale: Qal imperfect of קום here denotes getting up/beginning action. 'Rises'
    is concise and idiomatic in narrative-poetic English.
- source_word: רוֹצֵחַ
  chosen: the murderer
  alternatives:
  - a murderer
  - the slayer
  lexicon: HALOT
  rationale: The participle functions substantivally for the type of person in view.
    'The murderer' works generically in English and matches the poetic portrayal of
    the wicked actor.
- source_word: יִקְטָל
  chosen: he kills
  alternatives:
  - he murders
  - he slays
  lexicon: HALOT
  rationale: Although English could repeat 'murder' language, the Hebrew verb here
    is the common 'kill/slay' rather than a second use of רצח. 'He kills' preserves
    the lexical distinction between the noun 'murderer' and the verb.
- source_word: עָנִי וְאֶבְיוֹן
  chosen: the poor and needy
  alternatives:
  - the afflicted and needy
  - the poor and destitute
  lexicon: HALOT
  rationale: This common pair denotes socially vulnerable people. 'Poor and needy'
    is both accurate and idiomatic, preserving the two-term emphasis.
- source_word: וּבַלַּיְלָה
  chosen: and in the night
  alternatives:
  - and by night
  - and at night
  lexicon: HALOT
  rationale: The prefixed conjunction plus preposition marks a second temporal setting.
    'In the night' preserves the poetic contrast with dawn while remaining natural
    English.
- source_word: יְהִי
  chosen: he is
  alternatives:
  - he becomes
  - he acts
  lexicon: HALOT
  rationale: 'Here היה with כ expresses manner or role: he is/acts like a thief. ''He
    is'' is the most direct rendering; the simile supplies the behavioral nuance.'
- source_word: כגנב
  chosen: like a thief
  alternatives:
  - as a thief
  lexicon: HALOT
  rationale: Simple comparative כ. 'Like a thief' is standard modern English.
