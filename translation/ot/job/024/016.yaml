theological_decisions:
- issue: Potential moral-symbolic force of 'light'
  chosen_reading: Retain the literal phrase 'the light' without explicating symbolism
    in the main text.
  alternative_readings:
  - Render interpretively as 'daylight'
  - Render interpretively as 'what is right'
  rationale: In context the verse contrasts nocturnal crime with daytime concealment,
    so the literal sense is primary. Yet 'light' may also carry moral resonance in
    wisdom literature. The translation preserves that tension rather than resolving
    it.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
