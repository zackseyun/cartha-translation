id: JOB.24.16
reference: Job 24:16
source:
  edition: WLC
  text: חָתַ֥ר בַּ/חֹ֗שֶׁךְ בָּ֫תִּ֥ים יוֹמָ֥ם חִתְּמוּ לָ֗/מוֹ לֹא יָ֥דְעוּ אֽוֹר־־׃
translation:
  text: In the dark he breaks into houses; by day they shut themselves in; they do
    not know the light.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'he digs through houses in the dark'; the Hebrew verb can more literally
      mean 'digs through,' likely referring to breaking through walls.
    reason: lexical_alternative
  - marker: b
    text: Or 'they seal themselves up by day.' The Hebrew may emphasize shutting themselves
      in or concealing themselves during daylight hours.
    reason: lexical_alternative
  - marker: c
    text: '''The light'' may refer literally to daylight, while also carrying a possible
      moral undertone in the context of the wicked avoiding what is exposed.'
    reason: lexical_alternative
lexical_decisions:
- source_word: חָתַר
  chosen: breaks into
  alternatives:
  - digs through
  - burrows into
  lexicon: HALOT
  rationale: The verb literally denotes digging or breaking through, especially through
    a wall in burglary contexts. In English, 'breaks into' best conveys the idiomatic
    sense here while preserving the criminal action implied by the Hebrew.
- source_word: בַּחֹשֶׁךְ
  chosen: in the dark
  alternatives:
  - in darkness
  lexicon: HALOT
  rationale: The prepositional phrase marks the time or setting of the action. 'In
    the dark' is natural modern English and retains the literal imagery of concealment.
- source_word: בָּתִּים
  chosen: houses
  alternatives:
  - homes
  lexicon: HALOT
  rationale: The plural noun straightforwardly refers to dwellings. 'Houses' is the
    more literal and contextually fitting term in a burglary scene.
- source_word: יוֹמָם
  chosen: by day
  alternatives:
  - in the daytime
  - during the day
  lexicon: HALOT
  rationale: The adverb contrasts with the prior nocturnal setting. 'By day' is concise
    and preserves the poetic contrast.
- source_word: חִתְּמוּ לָמוֹ
  chosen: they shut themselves in
  alternatives:
  - they seal themselves up
  - they mark for themselves
  - they shut up for themselves
  lexicon: HALOT
  rationale: 'The verb means ''seal, close up.'' With לָמוֹ, the sense is reflexive
    or for their own purposes: they conceal themselves indoors during daylight. The
    shift from singular to plural likely generalizes from the individual wrongdoer
    to the class of such people; English preserves this with ''they.'''
- source_word: לֹא יָדְעוּ אוֹר
  chosen: they do not know the light
  alternatives:
  - they are unacquainted with the light
  - they want nothing to do with the light
  lexicon: HALOT
  rationale: The idiom is retained rather than paraphrased. 'Know' here carries the
    sense of familiarity or affinity, and 'the light' preserves both the literal day/night
    contrast and the moral undertone without over-interpreting.
