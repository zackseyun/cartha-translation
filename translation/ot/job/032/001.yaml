id: JOB.32.1
reference: Job 32:1
source:
  edition: WLC
  text: וַֽ/יִּשְׁבְּת֡וּ שְׁלֹ֤שֶׁת הָ/אֲנָשִׁ֣ים הָ֭/אֵלֶּה מֵ/עֲנ֣וֹת אֶת אִיּ֑וֹב
    כִּ֤י ה֖וּא צַדִּ֣יק בְּ/עֵינָֽי/ו־׃פ
translation:
  text: So these three men stopped answering Job, because he was righteous in his
    own eyes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, according to another textual tradition, 'because he was righteous in
      their eyes.'
    reason: textual_variant
lexical_decisions:
- source_word: וַיִּשְׁבְּתוּ
  chosen: stopped
  alternatives:
  - ceased
  - desisted
  lexicon: HALOT
  rationale: From שבת in the sense of ceasing/resting. In context it governs the infinitive
    'from answering,' so 'stopped' is natural modern English while preserving the
    idea of cessation.
- source_word: שְׁלֹשֶׁת הָאֲנָשִׁים הָאֵלֶּה
  chosen: these three men
  alternatives:
  - these three persons
  lexicon: HALOT
  rationale: Straightforward rendering of the demonstrative phrase. 'Men' matches
    the masculine plural and the likely referents (Job's three friends), in keeping
    with gender-accurate translation.
- source_word: מֵעֲנוֹת
  chosen: answering
  alternatives:
  - responding to
  lexicon: HALOT
  rationale: Infinitive construct of ענה in the sense 'answer, reply.' 'Answering'
    fits the ongoing disputation context and works idiomatically after 'stopped.'
- source_word: אֶת אִיּוֹב
  chosen: Job
  rationale: Direct object marker plus proper name; English does not represent the
    object marker, and the name is transliterated per project policy.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  lexicon: HALOT
  rationale: Introduces the reason they stopped. 'Because' is clearer in contemporary
    English than the more formal 'for.'
- source_word: צַדִּיק
  chosen: righteous
  alternatives:
  - in the right
  - just
  lexicon: HALOT
  rationale: צַדִּיק commonly denotes being righteous/just. 'Righteous' preserves
    the moral-judicial force and aligns with established biblical usage without being
    archaic here.
- source_word: בְּעֵינָיו
  chosen: in his own eyes
  alternatives:
  - in his eyes
  - in their eyes
  lexicon: HALOT
  rationale: The ketiv/qere issue affects whether the suffix is singular or plural
    in some traditions, but the MT form here is singular. 'In his own eyes' is the
    most idiomatic English and captures the reflexive nuance. This also fits the immediate
    Hebrew morphology supplied (3ms suffix).
