theological_decisions:
- issue: Whether Job is described as actually righteous or as righteous only in his
    own estimation
  chosen_reading: Render the phrase as 'he was righteous in his own eyes,' preserving
    the narrator's wording without endorsing Job's self-assessment as objectively
    correct.
  alternative_readings:
  - he was righteous in their eyes
  rationale: The Hebrew as supplied points to a singular suffix ('his eyes'), yielding
    the common sense that the three men stopped because Job regarded himself as righteous.
    This preserves the narrative tension and does not import a theological judgment
    beyond the text. An alternative textual tradition reflected in some versions reads
    'in their eyes,' which is worth preserving in a footnote.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather
    than resolve it)
