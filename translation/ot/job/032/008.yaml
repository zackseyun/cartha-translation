theological_decisions:
- issue: Anthropological language and number shift
  chosen_reading: 'The verse speaks generally of humanity: there is a spirit in man,
    and God''s breath gives people understanding.'
  alternative_readings:
  - 'The verse speaks of an individual person: there is a spirit in a man, and the
    breath of the Almighty gives him understanding.'
  rationale: The Hebrew moves from singular generic אֱנוֹשׁ ('man') to a plural pronominal
    suffix on תְּבִינֵם ('gives them understanding'). The translation preserves this
    by keeping singular generic 'man' and plural 'them,' reflecting the source rather
    than harmonizing the numbers.
  doctrine_reference: Translation philosophy §4 (gender-accurate over gender-neutral);
    §3 (preserve tension rather than resolve it)
