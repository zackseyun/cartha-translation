id: JOB.32.3
reference: Job 32:3
source:
  edition: WLC
  text: וּ/בִ/שְׁלֹ֣שֶׁת רֵעָי/ו֮ חָרָ֪ה אַ֫פּ֥/וֹ עַ֤ל אֲשֶׁ֣ר לֹא מָצְא֣וּ מַעֲנֶ֑ה
    וַ֝/יַּרְשִׁ֗יעוּ אֶת אִיּֽוֹב־־׃
translation:
  text: And his anger burned against his three friends because they had found no answer,
    yet they had condemned Job.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they had declared Job guilty' or 'they had treated Job as wicked.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבִשְׁלֹשֶׁת רֵעָיו
  chosen: against his three friends
  alternatives:
  - with his three friends
  - at his three friends
  lexicon: HALOT
  rationale: The preposition ב with חרה אפ often marks the object of anger idiomatically;
    in English, 'against' best conveys hostile direction. 'His three friends' preserves
    the construct phrase straightforwardly.
- source_word: חָרָה אַפּוֹ
  chosen: his anger burned
  alternatives:
  - his nose burned
  - he became angry
  - his wrath burned
  lexicon: HALOT
  rationale: This is a common Hebrew idiom for anger. 'His anger burned' preserves
    the metaphor while using natural English. 'His nose burned' would be overly literal
    and obscure.
- source_word: עַל אֲשֶׁר
  chosen: because
  alternatives:
  - for that
  - because of the fact that
  lexicon: HALOT
  rationale: The combination introduces the reason for Elihu's anger. 'Because' is
    the most natural concise rendering in English.
- source_word: לֹא מָצְאוּ מַעֲנֶה
  chosen: they had found no answer
  alternatives:
  - they did not find an answer
  - they had found no reply
  lexicon: HALOT
  rationale: מענה can mean 'answer' or 'reply.' 'Answer' fits the disputation context
    well. The past perfect in English helps show the reason already established for
    his anger.
- source_word: וַיַּרְשִׁיעוּ
  chosen: they had condemned
  alternatives:
  - they declared guilty
  - they treated as wicked
  - they proved guilty
  lexicon: HALOT
  rationale: The verb from רשע in the Hiphil commonly means to declare someone guilty
    or condemn. 'Condemned' is idiomatic and captures the forensic sense in context.
- source_word: אֶת אִיּוֹב
  chosen: Job
  rationale: Direct object marker plus proper name; standard transliteration of the
    personal name is retained.
- source_word: וַ
  chosen: yet
  alternatives:
  - and
  - while
  lexicon: HALOT
  rationale: 'Although waw can be simply conjunctive, here English ''yet'' brings
    out the adversative force implied by the logic: they lacked an answer, and nevertheless
    condemned Job. This is an optimal-equivalence choice to reflect discourse sense
    rather than bare coordination.'
