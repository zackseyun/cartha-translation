theological_decisions:
- issue: Sense of the friends' action toward Job
  chosen_reading: forensic condemnation ('they had condemned Job')
  alternative_readings:
  - moral characterization ('they had treated Job as wicked')
  rationale: The Hiphil of רשע naturally carries a declarative/forensic sense in dispute
    contexts. Rendering it as 'condemned' avoids importing a stronger theological
    claim while preserving the accusation implied by the text.
  doctrine_reference: Translation philosophy §1, §3, §5
