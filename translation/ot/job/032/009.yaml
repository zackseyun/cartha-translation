id: JOB.32.9
reference: Job 32:9
source:
  edition: WLC
  text: לֹֽא רַבִּ֥ים יֶחְכָּ֑מוּ וּ֝/זְקֵנִ֗ים יָבִ֥ינוּ מִשְׁפָּֽט־׃
translation:
  text: It is not the many who are wise, nor the old who understand justice.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “judgment” or “what is right.” The Hebrew mishpat can refer to legal
      judgment, justice, or right order.
    reason: lexical_alternative
lexical_decisions:
- source_word: לֹא
  chosen: It is not
  alternatives:
  - not
  lexicon: HALOT
  rationale: The particle negates the following clause. Rendering with the English
    cleft-like structure 'It is not...' produces natural English while preserving
    the emphatic negation of the Hebrew sentence.
- source_word: רַבִּים
  chosen: the many
  alternatives:
  - many
  - the great
  lexicon: HALOT
  rationale: The adjective/substantive literally means 'many' and here functions substantivally.
    'The many' best preserves the Hebrew sense of a class of numerous people, contrasting
    with 'the old' in the second colon. 'The great' is possible in some contexts for
    רב, but plurality and context here favor numerical/social breadth rather than
    status.
- source_word: יֶחְכָּמוּ
  chosen: are wise
  alternatives:
  - become wise
  - show wisdom
  lexicon: HALOT
  rationale: From חכם in the Qal, the verb can denote being or becoming wise. In this
    gnomic context, 'are wise' communicates the general truth naturally in English
    without overstating process.
- source_word: וּזְקֵנִים
  chosen: nor the old
  alternatives:
  - and elders
  - and old men
  - and the aged
  lexicon: HALOT
  rationale: זְקֵנִים can mean 'old men,' 'elders,' or 'aged ones.' In context Elihu
    is contrasting age with true understanding, so an age-based rendering is preferable
    to the office-like 'elders.' 'The old' is concise and preserves the representative
    force without importing male-specific limitation beyond what the context requires.
- source_word: יָבִינוּ
  chosen: understand
  alternatives:
  - discern
  - have insight into
  lexicon: HALOT
  rationale: בין commonly means to understand or discern. 'Understand' is the most
    straightforward English equivalent and pairs well with the object that follows.
- source_word: מִשְׁפָּט
  chosen: justice
  alternatives:
  - judgment
  - what is right
  lexicon: HALOT
  rationale: מִשְׁפָּט can denote judgment, justice, legal decision, or what is right.
    Here the sense is not merely procedural adjudication but moral-judicial discernment.
    'Justice' communicates that broader sense in clear modern English; 'judgment'
    is preserved as an alternative because it is also lexically possible.
