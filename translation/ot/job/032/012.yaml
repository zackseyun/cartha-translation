id: JOB.32.12
reference: Job 32:12
source:
  edition: WLC
  text: וְ/עָֽדֵי/כֶ֗ם אֶתְבּ֫וֹנָ֥ן וְ/הִנֵּ֤ה אֵ֣ין לְ/אִיּ֣וֹב מוֹכִ֑יחַ עוֹנֶ֖ה
    אֲמָרָ֣י/ו מִ/כֶּֽם׃
translation:
  text: I gave you my full attention, and behold, there was no one among you to refute
    Job, to answer his words.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I listened to you carefully.' The Hebrew verb conveys attentive consideration
      or close observation.
    reason: lexical_alternative
  - marker: b
    text: Or 'there was no one among you to reprove/correct Job.' The Hebrew term
      can denote rebutting in argument or reproving.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעָדֵיכֶם
  chosen: I gave you my full attention
  alternatives:
  - I listened to you
  - I paid attention to you
  - up to you I considered
  lexicon: HALOT
  rationale: The preposition עַד with pronominal suffix plus the following verb of
    consideration yields the sense of directing attention toward them. In idiomatic
    English, 'I gave you my full attention' captures Elihu's careful listening without
    woodenly reproducing the preposition.
- source_word: אֶתְבּוֹנָן
  chosen: I gave ... attention
  alternatives:
  - I considered
  - I observed attentively
  lexicon: HALOT
  rationale: Hitpolel of בין conveys attentive consideration or close observation.
    Because the object is the speakers ('you'), an English expression of careful listening/attention
    fits the discourse context better than a bare 'I considered'.
- source_word: וְהִנֵּה
  chosen: and behold
  alternatives:
  - and see
  - and look
  lexicon: HALOT
  rationale: Retained as a discourse marker signaling Elihu's evaluative conclusion.
    'Behold' is still understandable in modern English and preserves the rhetorical
    force.
- source_word: אֵין לְאִיּוֹב מוֹכִיחַ
  chosen: there was no one ... to refute Job
  alternatives:
  - there was no one to reprove Job
  - there was no one to correct Job
  - Job had no reprover
  lexicon: HALOT
  rationale: מוֹכִיחַ from יכח can mean one who reproves, argues, or proves wrong.
    In this disputation setting, 'refute' best conveys forensic argument rather than
    mere moral rebuke.
- source_word: עוֹנֶה אֲמָרָיו
  chosen: to answer his words
  alternatives:
  - answering his statements
  - replying to what he said
  lexicon: HALOT
  rationale: ענה with 'words' naturally means responding to what Job said. 'Answer
    his words' is slightly formal but clear and close to the Hebrew construction.
- source_word: מִכֶּם
  chosen: among you
  alternatives:
  - from you
  - out of you
  lexicon: HALOT
  rationale: 'The preposition marks source from the group of Job''s friends. ''Among
    you'' is idiomatic English in this negative existential construction: no one among
    you.'
