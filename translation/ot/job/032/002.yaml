theological_decisions:
- issue: Interpretation of Job's offense in the clause עַל צַדְּקוֹ נַפְשׁוֹ מֵאֱלֹהִים
  chosen_reading: because he justified himself rather than God
  alternative_readings:
  - because he justified himself before God
  - because he considered himself more righteous than God
  rationale: The Hebrew construction is difficult, but in context Elihu is angry that
    Job's self-vindication has come at God's expense. 'Rather than God' preserves
    the comparative contrast without overstating that Job explicitly claimed moral
    superiority in abstract terms. The stronger interpretive paraphrase 'more righteous
    than God' is preserved as an alternative rather than placed in the main text.
  doctrine_reference: Preserve theological tension rather than resolve it.
