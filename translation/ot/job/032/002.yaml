id: JOB.32.2
reference: Job 32:2
source:
  edition: WLC
  text: וַ/יִּ֤חַר אַ֨ף אֱלִיה֣וּא בֶן בַּרַכְאֵ֣ל הַ/בּוּזִי֮ מִ/מִּשְׁפַּ֪חַ֫ת רָ֥ם
    בְּ֭/אִיּוֹב חָרָ֣ה אַפּ֑/וֹ עַֽל צַדְּק֥/וֹ נַ֝פְשׁ֗/וֹ מֵ/אֱלֹהִֽים׀־־׃
translation:
  text: Then Elihu son of Barakel the Buzite, from the family of Ram, burned with
    anger against Job; his anger burned because he justified himself rather than God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “because he considered himself more righteous than God.”
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּחַר אַף
  chosen: burned with anger
  alternatives:
  - his anger burned
  - became angry
  - was kindled
  lexicon: HALOT
  rationale: The idiom literally involves the nose/anger 'burning' and denotes kindled
    anger. 'Burned with anger' preserves the Hebrew imagery while remaining natural
    English.
- source_word: אֱלִיהוּא
  chosen: Elihu
  rationale: Personal name transliterated by standard English convention per translation
    philosophy.
- source_word: בֶן בַּרַכְאֵל
  chosen: son of Barakel
  rationale: Genealogical expression rendered straightforwardly and formally.
- source_word: הַבּוּזִי
  chosen: the Buzite
  alternatives:
  - a Buzite
  lexicon: HALOT
  rationale: Gentilic with article is naturally rendered as an ethnic/clan designation,
    'the Buzite.'
- source_word: מִמִּשְׁפַּחַת רָם
  chosen: from the family of Ram
  alternatives:
  - from the clan of Ram
  - of the family of Ram
  lexicon: HALOT
  rationale: מִשְׁפָּחָה denotes family/clan grouping. 'Family' is clear modern English;
    'from' reflects the prefixed preposition.
- source_word: בְּאִיּוֹב
  chosen: against Job
  alternatives:
  - at Job
  - with Job
  lexicon: HALOT
  rationale: With verbs of anger, ב can indicate the object toward whom anger is directed.
    'Against Job' is idiomatic and clear.
- source_word: חָרָה אַפּוֹ
  chosen: his anger burned
  alternatives:
  - he burned with anger
  - he became angry
  lexicon: HALOT
  rationale: The second occurrence repeats the anger idiom for emphasis. Retaining
    'his anger burned' reflects the Hebrew repetition while fitting English style.
- source_word: עַל
  chosen: because
  alternatives:
  - over
  - on account of
  lexicon: HALOT
  rationale: Here עַל introduces the reason for Elihu's anger, so causal English is
    preferable to a more wooden 'over.'
- source_word: צַדְּקוֹ
  chosen: he justified
  alternatives:
  - he declared righteous
  - he proved right
  lexicon: HALOT
  rationale: The piel/causative sense is not merely 'was righteous' but 'declared/made
    righteous.' In context Job is treating himself as in the right, so 'justified'
    best captures the forensic nuance.
- source_word: נַפְשׁוֹ
  chosen: himself
  alternatives:
  - his soul
  - his life
  lexicon: HALOT
  rationale: נֶפֶשׁ here functions reflexively in idiom, not as a separate anthropological
    term. 'Himself' is the natural English equivalent.
- source_word: מֵאֱלֹהִים
  chosen: rather than God
  alternatives:
  - more than God
  - before God
  lexicon: HALOT
  rationale: The comparative force after the verb indicates Job regarded himself as
    more in the right than God. 'Rather than God' communicates the contrast clearly
    in idiomatic English.
