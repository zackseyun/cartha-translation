id: JOB.32.14
reference: Job 32:14
source:
  edition: WLC
  text: וְ/לֹא עָרַ֣ךְ אֵלַ֣/י מִלִּ֑ין וּ֝/בְ/אִמְרֵי/כֶ֗ם לֹ֣א אֲשִׁיבֶֽ/נּוּ־׃
translation:
  text: He has not directed words against me, and I will not answer him with your
    sayings.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'He has not arranged words against me'; the Hebrew verb can mean to set
      in order or marshal words, hence to direct an argument.
    reason: lexical_alternative
  - marker: b
    text: Or 'I will not answer him with your arguments.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עָרַךְ
  chosen: has directed
  alternatives:
  - has arranged
  - has set in order
  - has marshaled
  lexicon: HALOT
  rationale: In context with מִלִּין ('words') and אֵלַי ('against/to me'), the verb
    conveys setting forth or directing an argument toward someone. 'Has directed'
    is idiomatic in English and preserves the adversarial/disputational sense better
    than the more wooden 'has arranged.'
- source_word: אֵלַי
  chosen: against me
  alternatives:
  - to me
  - before me
  lexicon: HALOT
  rationale: Although the preposition can mean 'to' or 'toward,' in this debate context
    Elihu's point is that Job has not addressed or arrayed arguments against him personally.
    'Against me' best captures the forensic tone.
- source_word: מִלִּין
  chosen: words
  alternatives:
  - arguments
  - speeches
  lexicon: HALOT
  rationale: The Aramaizing plural refers to spoken words or discourse. 'Words' is
    the most direct rendering; the argumentative nuance is already carried by 'has
    directed.'
- source_word: אִמְרֵיכֶם
  chosen: your sayings
  alternatives:
  - your words
  - your arguments
  lexicon: HALOT
  rationale: The construct with prefixed בְּ indicates the means or content by which
    Elihu would answer. 'Your sayings' distinguishes this term from the previous 'words'
    while remaining natural English.
- source_word: אֲשִׁיבֶנּוּ
  chosen: I will not answer him
  alternatives:
  - I will not reply to him
  - I will not answer him back
  lexicon: HALOT
  rationale: 'The Hiphil of שוב commonly means ''answer, reply.'' The 3ms suffix indicates
    Job as the object: Elihu will not answer him in the same manner as the friends.
    ''Answer him'' is clear and idiomatic.'
- source_word: וּבְאִמְרֵיכֶם לֹא אֲשִׁיבֶנּוּ
  chosen: and I will not answer him with your sayings
  alternatives:
  - nor will I answer him with your arguments
  - and with your words I will not answer him
  lexicon: HALOT
  rationale: 'The conjunction links Elihu''s second claim to the first: since Job
    has not addressed Elihu directly, Elihu will nevertheless answer, but not by recycling
    the friends'' rhetoric. Rendering בְּ instrumentally as ''with'' preserves the
    Hebrew structure and sense.'
