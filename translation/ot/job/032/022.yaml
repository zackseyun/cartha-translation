theological_decisions:
- issue: Nature of the threatened divine action
  chosen_reading: Render the consequence generally as divine removal/judgment ('my
    Maker would soon carry me away')
  alternative_readings:
  - my Maker would soon kill me
  - my Maker would quickly take me up
  rationale: The Hebrew verb נשא is broader than 'kill' and does not explicitly state
    death, though judgment unto death may be implied. The translation preserves the
    warning's force without importing a more specific doctrinal claim than the text
    makes.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Preserve theological tension rather than resolve it.'
