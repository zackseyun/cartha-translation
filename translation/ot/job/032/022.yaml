id: JOB.32.22
reference: Job 32:22
source:
  edition: WLC
  text: כִּ֤י לֹ֣א יָדַ֣עְתִּי אֲכַנֶּ֑ה כִּ֝/מְעַ֗ט יִשָּׂאֵ֥/נִי עֹשֵֽׂ/נִי׃
translation:
  text: For I do not know how to flatter; otherwise my Maker would soon carry me away.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'give flattering titles.' The Hebrew verb can refer to addressing someone
      with honorifics in a flattering or partial way.
    reason: lexical_alternative
  - marker: b
    text: Or 'my Maker would soon take me away.' The Hebrew does not explicitly say
      'kill me,' though removal in judgment may be implied.
    reason: alternative_reading
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - because
  lexicon: HALOT
  rationale: Introduces the reason for Elihu's refusal to show partiality in the preceding
    context. 'For' fits the explanatory force naturally in English.
- source_word: לֹא יָדַעְתִּי
  chosen: I do not know
  alternatives:
  - I have not learned
  - I do not know how
  lexicon: HALOT
  rationale: The idiom with following infinitive-like verbal form expresses lack of
    ability or practiced skill. Present English 'I do not know' communicates the sense
    better than a strictly past 'I did not know' in context.
- source_word: אֲכַנֶּה
  chosen: to flatter
  alternatives:
  - to give flattering titles
  - to address with honorifics
  lexicon: HALOT
  rationale: From כנה in the Piel, here in context of showing partiality and currying
    favor. 'Flatter' is concise modern English and captures the negative social sense.
    The traditional fuller rendering 'give flattering titles' is possible but more
    interpretive than the Hebrew requires.
- source_word: כִּמְעַט
  chosen: soon
  alternatives:
  - in a little while
  - almost
  - quickly
  lexicon: HALOT
  rationale: In this warning context, the phrase conveys imminent consequence rather
    than mere approximation. 'Soon' gives the temporal sense idiomatically.
- source_word: יִשָּׂאֵנִי
  chosen: would carry me away
  alternatives:
  - would take me away
  - would remove me
  - would lift me up
  lexicon: HALOT
  rationale: נשא can mean lift, carry, take away. In context of divine judgment for
    flattery, 'carry me away' idiomatically conveys removal in judgment without over-specifying
    death, though that may be implied.
- source_word: עֹשֵׂנִי
  chosen: my Maker
  alternatives:
  - the one who made me
  - my Creator
  lexicon: HALOT
  rationale: A participial form meaning 'the one making/made me.' 'My Maker' is natural,
    concise, and preserves the personal creator-creature relation emphasized in Elihu's
    speech.
