id: JOB.32.15
reference: Job 32:15
source:
  edition: WLC
  text: חַ֭תּוּ לֹא עָ֣נוּ ע֑וֹד הֶעְתִּ֖יקוּ מֵ/הֶ֣ם מִלִּֽים־׃
translation:
  text: They are dismayed; they answer no more; words have departed from them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'They are shattered' / 'They are confounded'; the Hebrew verb can denote
      being broken or dismayed.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'words have moved away from them,' an idiom meaning they have
      nothing left to say.
    reason: lexical_alternative
lexical_decisions:
- source_word: חַתּוּ
  chosen: They are dismayed
  alternatives:
  - They are shattered
  - They are terrified
  - They are confounded
  lexicon: HALOT
  rationale: From חתת, conveying being broken, dismayed, or shattered. In context
    Elihu describes Job's friends as stunned into silence; 'dismayed' captures the
    emotional and rhetorical collapse in natural English without over-literal harshness.
- source_word: עָנוּ
  chosen: they answer
  alternatives:
  - they respond
  lexicon: HALOT
  rationale: ענה in this context means to answer or reply in speech. 'Answer' fits
    the disputation setting of Job.
- source_word: עוֹד
  chosen: no more
  alternatives:
  - again
  - any longer
  lexicon: HALOT
  rationale: 'With the negation לֹא, עוֹד expresses continuation now ceased: ''no
    more'' is idiomatic and concise.'
- source_word: הֶעְתִּיקוּ
  chosen: have departed
  alternatives:
  - have moved away
  - have withdrawn
  - have passed away
  lexicon: HALOT
  rationale: Hiphil of עתק can mean to move away, remove, or transfer. With מֵהֶם
    and object 'words,' the sense is that words have left them. Rendering the verb
    with 'have departed' preserves the vivid personification of speech leaving them.
- source_word: מֵהֶם
  chosen: from them
  lexicon: HALOT
  rationale: 'The preposition marks separation: the words have departed from Job''s
    friends.'
- source_word: מִלִּים
  chosen: words
  alternatives:
  - arguments
  - things to say
  lexicon: HALOT
  rationale: The basic sense is 'words.' Although the contextual meaning is that they
    have nothing left to say, retaining 'words' preserves the Hebrew imagery and avoids
    unnecessary paraphrase.
