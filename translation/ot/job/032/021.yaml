id: JOB.32.21
reference: Job 32:21
source:
  edition: WLC
  text: אַל נָ֭א אֶשָּׂ֣א פְנֵי אִ֑ישׁ וְ/אֶל אָ֝דָ֗ם לֹ֣א אֲכַנֶּֽה־־־׃
translation:
  text: Please, let me not show partiality to a man, nor flatter any person.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'lift up the face of a man,' a Hebrew idiom meaning to show favoritism
      or partiality.
    reason: lexical_alternative
  - marker: b
    text: Or, 'nor give flattering titles to any person.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַל נָא
  chosen: Please, let me not
  alternatives:
  - Do not, please, let me
  - May I not
  lexicon: HALOT
  rationale: אַל with the particle נָא forms a polite or earnest negative request/wish.
    Rendering it as 'Please, let me not' preserves both the prohibition/wish force
    and the courteous urgency in Elihu's speech.
- source_word: אֶשָּׂא פְנֵי אִישׁ
  chosen: show partiality to a man
  alternatives:
  - lift up the face of a man
  - be partial to a man
  - accept the person of a man
  lexicon: HALOT
  rationale: The idiom 'lift the face' commonly means to show favor or partiality.
    'Show partiality' communicates the idiomatic sense in clear modern English. 'A
    man' preserves the singular masculine/generic אישׁ in line with the gender-accurate
    policy.
- source_word: אִישׁ
  chosen: a man
  alternatives:
  - anyone
  - a person
  lexicon: HALOT
  rationale: אִישׁ is singular masculine 'man.' Although generic in force, the translation
    philosophy prefers gender-accurate rendering where the source uses masculine forms.
    The generic sense is still clear from context.
- source_word: וְאֶל אָדָם
  chosen: nor ... any person
  alternatives:
  - and to a man
  - nor to humankind
  - nor to a human
  lexicon: HALOT
  rationale: Here אָדָם refers to a human being in parallel with אִישׁ. To avoid awkward
    repetition in English while preserving the human referent, 'any person' is used
    in the second colon. This is a documented contextual variation from the default
    'man / humankind' for readability.
- source_word: לֹא אֲכַנֶּה
  chosen: flatter
  alternatives:
  - give a flattering title to
  - use honorifics for
  - address with titles
  lexicon: HALOT
  rationale: From כנה in the Piel, the sense here is to address someone with flattering
    or honorific speech. 'Flatter' best captures the ethical point in natural English.
    The more traditional 'give flattering titles' is possible, but the Hebrew verb
    itself can be represented more directly and idiomatically by 'flatter'.
