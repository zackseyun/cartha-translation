id: JOB.32.13
reference: Job 32:13
source:
  edition: WLC
  text: פֶּן תֹּ֣֭אמְרוּ מָצָ֣אנוּ חָכְמָ֑ה אֵ֖ל יִדְּפֶ֣/נּוּ לֹא אִֽישׁ־־׃
translation:
  text: Lest you say, ‘We have found wisdom; God can drive him away, not man.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “God will answer him, not man,” or “God can subdue him, not man.” The
      Hebrew verb commonly means “drive away” or “chase off,” but the idiom here may
      refer more broadly to defeating or refuting Job.
    reason: lexical_alternative
lexical_decisions:
- source_word: פֶּן
  chosen: Lest
  alternatives:
  - so that not
  - otherwise
  lexicon: HALOT
  rationale: Introduces a warning against a possible claim. 'Lest' is concise and
    fits the cautionary force better than a more wooden 'so that not.'
- source_word: תֹּאמְרוּ
  chosen: you say
  alternatives:
  - you may say
  - you should say
  lexicon: HALOT
  rationale: Second person masculine plural imperfect in direct discourse context;
    simple present English after 'lest' naturally conveys the prospective sense.
- source_word: מָצָאנוּ
  chosen: we have found
  alternatives:
  - we found
  lexicon: HALOT
  rationale: The perfect is well represented by English present perfect here, expressing
    a claimed result already attained.
- source_word: חָכְמָה
  chosen: wisdom
  lexicon: HALOT
  rationale: Standard rendering; no contextual reason to narrow or paraphrase.
- source_word: אֵל
  chosen: God
  alternatives:
  - God alone
  lexicon: HALOT
  rationale: The noun refers to God, not merely 'mighty one,' in this contrastive
    clause. 'God' is the plain sense in context.
- source_word: יִדְּפֶנּוּ
  chosen: can drive him away
  alternatives:
  - will drive him away
  - can answer him
  - can subdue him
  lexicon: HALOT
  rationale: From נדף, commonly 'drive away' or 'chase off.' In context Elihu warns
    against claiming that only God, not a human, can refute or rout Job. 'Can drive
    him away' preserves the concrete verbal image while remaining intelligible. Because
    the line is idiomatic and contextually debated, interpretive alternatives are
    preserved in a footnote.
- source_word: לֹא אִישׁ
  chosen: not man
  alternatives:
  - not a man
  - not a human
  lexicon: HALOT
  rationale: The Hebrew contrasts God with a human being in a generic sense. Following
    the project's gender-accurate policy, 'man' is retained as the representative
    singular matching the source form and contrast.
