theological_decisions:
- issue: Generic singular אִישׁ in contrast with God
  chosen_reading: man
  alternative_readings:
  - a human
  rationale: The verse contrasts God with a human agent, not specifically a male individual.
    Per translation philosophy, gender-accurate rendering preserves the representative
    singular 'man' where that matches the source's intent.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Interpretation of אֵל יִדְּפֶנּוּ לֹא אִישׁ
  chosen_reading: God can drive him away, not man
  alternative_readings:
  - God will answer him, not man
  - God can subdue him, not man
  rationale: The Hebrew verb naturally suggests driving/chasing away, but in context
    the sense may extend to defeating or answering Job. The main text keeps the lexical
    image closest to the Hebrew while preserving contextual alternatives in a footnote,
    in line with preserving tension where ambiguity remains.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
