id: JOB.32.5
reference: Job 32:5
source:
  edition: WLC
  text: וַ/יַּ֤רְא אֱלִיה֗וּא כִּ֘י אֵ֤ין מַעֲנֶ֗ה בְּ֭/פִי שְׁלֹ֥שֶׁת הָ/אֲנָשִׁ֗ים
    וַ/יִּ֥חַר אַפּֽ/וֹ׃פ
translation:
  text: When Elihu saw that there was no answer in the mouth of the three men, his
    anger burned.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''there was no answer in the mouth of the three men,'' an idiom
      meaning they had no reply to give.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּרְא
  chosen: When ... saw
  alternatives:
  - and ... saw
  - then ... saw
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. Rendering with 'When' smoothly
    conveys the temporal sense in English while preserving the sequence leading into
    Elihu's reaction.
- source_word: אֱלִיהוּא
  chosen: Elihu
  rationale: Personal name is transliterated according to the translation philosophy.
- source_word: כִּי
  chosen: that
  alternatives:
  - for
  - because
  lexicon: HALOT
  rationale: 'Here כִּי introduces the content of what Elihu saw, not primarily a
    causal clause. ''That'' best fits the syntax: he saw that there was no answer.'
- source_word: אֵין
  chosen: there was no
  alternatives:
  - there is no
  - there was not
  lexicon: HALOT
  rationale: Existential negation is naturally rendered 'there was no' in this past
    narrative context.
- source_word: מַעֲנֶה
  chosen: answer
  alternatives:
  - response
  - reply
  lexicon: HALOT
  rationale: '''Answer'' is the most straightforward rendering in the Job dialogue
    context, where the issue is whether the three men can respond to Job.'
- source_word: בְּפִי
  chosen: in the mouth of
  alternatives:
  - on the lips of
  - from
  lexicon: HALOT
  rationale: The Hebrew idiom is retained in a readable form. 'In the mouth of' preserves
    the concrete imagery and avoids over-paraphrasing to merely 'from,' though the
    latter is an interpretive possibility.
- source_word: שְׁלֹשֶׁת הָאֲנָשִׁים
  chosen: the three men
  alternatives:
  - these three men
  lexicon: HALOT
  rationale: A direct rendering of the counted noun phrase; 'men' matches the source
    and context.
- source_word: וַיִּחַר אַפּוֹ
  chosen: his anger burned
  alternatives:
  - his nose burned
  - he became angry
  - his wrath burned
  lexicon: HALOT
  rationale: The Hebrew idiom literally refers to the burning of the nose/anger. 'His
    anger burned' preserves the metaphorical force in natural English better than
    the flat 'he became angry,' while avoiding an opaque literalism.
