id: JOB.32.19
reference: Job 32:19
source:
  edition: WLC
  text: הִנֵּֽה בִטְנִ֗/י כְּ/יַ֥יִן לֹא יִפָּתֵ֑חַ כְּ/אֹב֥וֹת חֲ֝דָשִׁ֗ים יִבָּקֵֽעַ־־׃
translation:
  text: Look, my belly is like wine that has no vent; like new wineskins it is about
    to burst.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my inward parts are like wine that is not opened'; the Hebrew literally
      says 'my belly is like wine not opened.'
    reason: lexical_alternative
  - marker: b
    text: '''Wineskins'' translates a Hebrew term for skin containers used to hold
      liquids, especially wine.'
    reason: cultural_note
lexical_decisions:
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: Discourse particle drawing attention to Elihu's vivid comparison. 'Look'
    is natural modern English while preserving the deictic force.
- source_word: בִטְנִי
  chosen: my belly
  alternatives:
  - my inward parts
  - my stomach
  lexicon: HALOT
  rationale: בטן literally denotes the belly/womb and can refer to the inner self
    or inward pressure. Here the image is physical and metaphorical at once; 'my belly'
    preserves the concrete Hebrew imagery better than the more interpretive 'my heart'
    or 'my spirit'.
- source_word: כְּיַיִן
  chosen: like wine
  alternatives:
  - like fermenting wine
  lexicon: HALOT
  rationale: Simple comparison marker plus 'wine.' The context suggests wine under
    pressure, but the Hebrew does not explicitly add 'fermenting,' so the main text
    stays closer to the source.
- source_word: לֹא יִפָּתֵחַ
  chosen: that has no vent
  alternatives:
  - that is not opened
  - that cannot be opened
  lexicon: HALOT
  rationale: The Niphal of פתח literally means 'is not opened,' but in this simile
    the sense is wine not opened/released, i.e., lacking an outlet. 'Has no vent'
    communicates the idiomatic force in readable English without over-paraphrasing.
- source_word: כְּאֹבוֹת
  chosen: like new wineskins
  alternatives:
  - like skins
  - like bottles
  lexicon: HALOT
  rationale: אֹבוֹת here refers to skin-containers for wine, not spirits/ghosts. Because
    the object is culturally specific and paired with wine, 'wineskins' is the clearest
    contextual rendering.
- source_word: חֲדָשִׁים
  chosen: new
  alternatives:
  - fresh
  lexicon: HALOT
  rationale: Straightforward adjective modifying 'wineskins.' Retained directly.
- source_word: יִבָּקֵעַ
  chosen: it is about to burst
  alternatives:
  - it bursts
  - it will split open
  lexicon: HALOT
  rationale: בקע means to split or burst open. English singular 'it' refers collectively
    to the image of his belly likened to a pressurized wineskin. 'Is about to burst'
    captures the imminent pressure conveyed by the simile in idiomatic English.
