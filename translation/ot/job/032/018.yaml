id: JOB.32.18
reference: Job 32:18
source:
  edition: WLC
  text: כִּ֭י מָלֵ֣תִי מִלִּ֑ים הֱ֝צִיקַ֗תְ/נִי ר֣וּחַ בִּטְנִֽ/י׃
translation:
  text: For I am full of words; the spirit within me constrains me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'the spirit of my belly' or 'the spirit in my inward parts.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Because
  lexicon: HALOT
  rationale: Introduces Elihu's explanation for why he must speak. 'For' preserves
    the causal/explanatory force in natural English.
- source_word: מָלֵתִי
  chosen: I am full
  alternatives:
  - I am filled
  - I have become full
  lexicon: HALOT
  rationale: From מלא, expressing a present state resulting from being filled. English
    present 'I am full' best captures the idiomatic sense in context.
- source_word: מִלִּים
  chosen: of words
  alternatives:
  - with words
  - with matters to say
  lexicon: HALOT
  rationale: Literal plural 'words' fits the context of pent-up speech. 'Of words'
    works idiomatically with 'full' in English.
- source_word: הֱצִיקַתְנִי
  chosen: constrains me
  alternatives:
  - presses me
  - distresses me
  - compels me
  lexicon: HALOT
  rationale: The verb from צוק conveys pressure, constraint, or distress. In this
    context of inward pressure to speak, 'constrains me' best balances literal pressure
    with the functional sense of compulsion.
- source_word: רוּחַ
  chosen: the spirit
  alternatives:
  - breath
  - wind
  lexicon: HALOT
  rationale: Here רוּחַ refers to an inner animating impulse rather than literal wind
    or breath. 'Spirit' best fits the anthropological sense in parallel with 'within
    me'.
- source_word: בִּטְנִי
  chosen: within me
  alternatives:
  - in my belly
  - in my inward parts
  lexicon: HALOT
  rationale: Literally 'my belly,' a Hebrew idiom for the inner self or inward parts.
    'Within me' communicates the sense clearly in modern English without flattening
    the imagery too far; the more literal alternative is preserved in a footnote.
