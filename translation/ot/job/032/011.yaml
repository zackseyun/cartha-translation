id: JOB.32.11
reference: Job 32:11
source:
  edition: WLC
  text: הֵ֤ן הוֹחַ֨לְתִּי לְֽ/דִבְרֵי/כֶ֗ם אָ֭זִין עַד תְּב֥וּנֹֽתֵי/כֶ֑ם עַֽד תַּחְקְר֥וּ/ן
    מִלִּֽין־־׃
translation:
  text: Look, I waited for your words; I listened for your insights, until you searched
    out words.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I hoped for your words.' The Hebrew verb can carry the sense of waiting
      with expectation.
    reason: lexical_alternative
  - marker: b
    text: Or 'your understanding' or 'your reasonings.'
    reason: lexical_alternative
  - marker: c
    text: Or 'until you examined/searched for an answer in words.' The final phrase
      is compact and somewhat idiomatic in Hebrew poetry.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֵן
  chosen: Look
  alternatives:
  - Behold
  - Indeed
  - See
  lexicon: HALOT
  rationale: Discourse particle drawing attention. 'Look' is natural modern English
    and preserves the deictic force better than archaic 'Behold.'
- source_word: הוֹחַלְתִּי
  chosen: I waited
  alternatives:
  - I hoped
  - I waited expectantly
  lexicon: HALOT
  rationale: From יחל, which can denote waiting or hoping. In this context Elihu describes
    patient restraint while others spoke, so 'I waited' best fits the discourse flow.
    The expectant nuance is secondary and not required in the main text.
- source_word: לְדִבְרֵיכֶם
  chosen: for your words
  alternatives:
  - to your words
  - for what you had to say
  lexicon: HALOT
  rationale: The preposition with 'words' is somewhat idiomatic here. English 'waited
    for your words' captures the sense that he held back until hearing them. 'To your
    words' would be too wooden.
- source_word: אָזִין
  chosen: I listened
  alternatives:
  - I gave ear
  - I paid attention
  lexicon: HALOT
  rationale: Hiphil of אזן means to listen attentively. 'I listened' is clear modern
    English; the attentiveness is supported by context without needing a more idiomatic
    expansion.
- source_word: עַד
  chosen: until
  alternatives:
  - as far as
  - up to the point that
  lexicon: HALOT
  rationale: Temporal marker here, introducing the extent of his listening and waiting.
- source_word: תְּבוּנוֹתֵיכֶם
  chosen: your insights
  alternatives:
  - your understanding
  - your reasonings
  - your discernments
  lexicon: HALOT
  rationale: תבונות can denote understanding or expressions of discernment. In context
    Elihu is listening not merely to isolated words but to the substance of their
    reasoning, so 'insights' is concise and natural.
- source_word: תַּחְקְרוּן
  chosen: you searched out
  alternatives:
  - you examined
  - you investigated
  - you sought out
  lexicon: HALOT
  rationale: From חקר, to search out or investigate thoroughly. The form describes
    the friends' attempt to probe for an answer. 'Searched out' preserves the investigative
    nuance.
- source_word: מִלִּין
  chosen: words
  alternatives:
  - arguments
  - sayings
  - matter
  lexicon: HALOT
  rationale: Aramaizing/Hebrew poetic plural for 'words.' Here it likely refers to
    the words or formulations they were seeking in argument. 'Words' keeps the lexical
    correspondence and avoids over-interpreting as 'arguments,' though that nuance
    is present.
