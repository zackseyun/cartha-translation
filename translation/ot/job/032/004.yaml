id: JOB.32.4
reference: Job 32:4
source:
  edition: WLC
  text: וֶֽ/אֱלִיה֗וּ חִכָּ֣ה אֶת אִ֭יּוֹב בִּ/דְבָרִ֑ים כִּ֤י זְֽקֵנִים הֵ֖מָּה מִמֶּ֣/נּוּ
    לְ/יָמִֽים־־׃
translation:
  text: Now Elihu had waited to speak to Job, because they were older than he in days.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'Elihu waited Job in words'; the sense is that he waited to speak
      to Job.
    reason: lexical_alternative
  - marker: b
    text: Or 'because they were older than him in age.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וֶאֱלִיהוּ
  chosen: Now Elihu
  alternatives:
  - And Elihu
  lexicon: HALOT
  rationale: The conjunction waw can be rendered simply as 'and,' but here 'now' gives
    natural English narrative progression while preserving the discourse shift to
    Elihu. The personal name is transliterated per translation philosophy.
- source_word: חִכָּה
  chosen: had waited
  alternatives:
  - waited
  - held back
  lexicon: HALOT
  rationale: The verb means 'to wait' or 'tarry.' English past perfect ('had waited')
    fits the narrative background sense before the next action in context. 'Held back'
    is possible interpretively, but 'waited' stays closer to the lexical core.
- source_word: אֶת אִיּוֹב
  chosen: to speak to Job
  alternatives:
  - for Job
  - with Job
  lexicon: HALOT
  rationale: The direct-object marker with Job after 'waited' is awkward if rendered
    woodenly. In context, with the following phrase 'in words,' the sense is that
    Elihu waited with respect to speaking to Job. Supplying 'to speak' is warranted
    by the idiom and immediate context, not an unwarranted paraphrase.
- source_word: בִּדְבָרִים
  chosen: to speak
  alternatives:
  - with words
  - in speaking
  - for words
  lexicon: HALOT
  rationale: 'Literally ''in words.'' In English this is best expressed verbally:
    Elihu waited ''to speak.'' This captures the idiomatic force of the prepositional
    phrase in context.'
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  - since
  lexicon: HALOT
  rationale: Causal sense is straightforward here, explaining why Elihu waited.
- source_word: זְקֵנִים הֵמָּה
  chosen: they were older
  alternatives:
  - they were elders
  - they were old
  lexicon: HALOT
  rationale: The adjective denotes being older in age here, not holding the office/status
    of 'elders.' 'Older' best fits the comparative construction with מִמֶּנּוּ and
    the following 'in days.'
- source_word: מִמֶּנּוּ
  chosen: than he
  alternatives:
  - than him
  lexicon: HALOT
  rationale: 'Comparative מן marks comparison: they were older than Elihu. ''Than
    he'' is slightly more formal but natural in this literary register.'
- source_word: לְיָמִים
  chosen: in days
  alternatives:
  - in age
  - by days
  lexicon: HALOT
  rationale: Literally 'for/by days,' an idiom referring to age. Retaining 'in days'
    preserves the Hebrew flavor while remaining intelligible in English. 'In age'
    is smoother but less transparent to the source wording.
