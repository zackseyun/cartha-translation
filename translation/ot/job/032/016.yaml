id: JOB.32.16
reference: Job 32:16
source:
  edition: WLC
  text: וְ֭/הוֹחַלְתִּי כִּי לֹ֣א יְדַבֵּ֑רוּ כִּ֥י עָ֝מְד֗וּ לֹא עָ֥נוּ עֽוֹד־־׃
translation:
  text: And I waited, because they did not speak, because they stood still and answered
    no more.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'And I hoped,' since the verb can carry the sense of waiting with expectation;
      here the context favors 'waited.'
    reason: lexical_alternative
  - marker: b
    text: Literally, 'they stood'; the phrase likely means they had stopped and remained
      silent.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהוֹחַלְתִּי
  chosen: And I waited
  alternatives:
  - And I hoped
  - So I waited
  lexicon: HALOT
  rationale: From יחל in the Hiphil/perfect 1cs, here in context of Elihu delaying
    his own speech while the older men fall silent. 'Waited' fits the discourse situation
    better than 'hoped,' though the root can carry expectation/hope in other contexts.
    The prefixed conjunction is rendered simply as 'And' to continue the narrative.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  - when
  lexicon: HALOT
  rationale: 'The first כִּי introduces the reason for Elihu''s waiting: they did
    not speak. ''Because'' makes the causal relation clear in natural English.'
- source_word: לֹא יְדַבֵּרוּ
  chosen: they did not speak
  alternatives:
  - they would not speak
  - they were not speaking
  lexicon: HALOT
  rationale: The imperfect here is best rendered in context as past narrative sense
    after the perfect 'I waited.' 'Did not speak' is concise and idiomatic.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  - since
  lexicon: HALOT
  rationale: The second כִּי gives a further explanatory clause parallel to the first.
    Rendering it again as 'because' preserves the repeated causal structure.
- source_word: עָמְדוּ
  chosen: they stood still
  alternatives:
  - they stood
  - they stopped
  lexicon: HALOT
  rationale: Literally 'they stood,' but in this context of speech ceasing it conveys
    that they had come to a halt. 'Stood still' preserves the image while making the
    idiomatic force clearer than bare 'stood.'
- source_word: לֹא עָנוּ עוֹד
  chosen: answered no more
  alternatives:
  - did not answer again
  - answered no longer
  lexicon: HALOT
  rationale: ענה with עוד indicates cessation of reply. 'Answered no more' is natural
    English and preserves the sense that their responses had ended.
