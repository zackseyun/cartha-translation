id: JOB.41.5
reference: Job 41:5
source:
  edition: WLC
  text: מִֽי גִ֭לָּה פְּנֵ֣י לְבוּשׁ֑/וֹ בְּ/כֶ֥פֶל רִ֝סְנ֗/וֹ מִ֣י יָבֽוֹא־׃
translation:
  text: Who has stripped off the front of his garment? Who can come within his double
    bridle?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Who can come into the fold of his bridle?' The Hebrew expression is
      difficult; it may refer metaphorically to Leviathan's mouth, jaws, or a doubled
      row of teeth.
    reason: lexical_alternative
lexical_decisions:
- source_word: גִלָּה
  chosen: stripped off
  alternatives:
  - uncovered
  - laid bare
  - removed
  lexicon: HALOT
  rationale: The verb גלה commonly means to uncover or expose. In this context of
    penetrating Leviathan's exterior, 'stripped off' conveys forceful removal of an
    outer covering more naturally in English than the more abstract 'uncovered.'
- source_word: פְּנֵי לְבוּשׁוֹ
  chosen: the front of his garment
  alternatives:
  - the face of his clothing
  - the surface of his covering
  - his outer coat
  lexicon: HALOT
  rationale: פְּנֵי literally means 'face/surface of,' and לְבוּשׁ is 'garment/clothing.'
    The idiom points to the outer visible part of Leviathan's covering. 'The front
    of his garment' preserves the concrete metaphor without over-interpreting it as
    skin or scales.
- source_word: בְּכֶפֶל
  chosen: within his double
  alternatives:
  - into the fold of
  - within the double of
  - into the doubled part of
  lexicon: HALOT
  rationale: כפל denotes doubleness or a fold. Here it modifies רסן and likely refers
    to a doubled restraint or doubled jaws/rows associated with the mouth area. 'Within
    his double' is kept somewhat literal to preserve the image's difficulty.
- source_word: רִסְנוֹ
  chosen: bridle
  alternatives:
  - muzzle
  - bit
  - jaw-restraint
  lexicon: HALOT
  rationale: רסן ordinarily means 'bridle' or 'muzzle.' In this poetic description,
    'bridle' is the most direct lexical equivalent, though the image is metaphorical
    when applied to Leviathan. It likely refers to the area of the mouth/jaws as though
    it were a bridle.
- source_word: מִי יָבוֹא
  chosen: Who can come
  alternatives:
  - Who will enter
  - Who would go in
  - Who may approach
  lexicon: HALOT
  rationale: The interrogative plus imperfect expresses challenge or impossibility.
    English idiom is best captured by 'Who can come,' implying ability rather than
    mere future action.
