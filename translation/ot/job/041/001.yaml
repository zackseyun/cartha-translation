id: JOB.41.1
reference: Job 41:1
source:
  edition: WLC
  text: הֵן תֹּחַלְתּ֥/וֹ נִכְזָ֑בָה הֲ/גַ֖ם אֶל מַרְאָ֣י/ו יֻטָֽל־־׃
translation:
  text: Behold, his hope proves false; is one not cast down even at the sight of him?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'his expectation is disappointed' or 'his confidence fails.' The Hebrew
      verb can emphasize that the hope turns out to be deceptive or disappointed.
    reason: lexical_alternative
  - marker: b
    text: Or, 'is one not laid low at the mere sight of him?'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֵן
  chosen: Behold
  alternatives:
  - Indeed
  - Look
  lexicon: HALOT
  rationale: Introduces an emphatic assertion. 'Behold' preserves the elevated, attention-directing
    force better than a flatter 'indeed,' while remaining natural in poetic discourse.
- source_word: תֹּחַלְתּוֹ
  chosen: his hope
  alternatives:
  - his expectation
  - his confidence
  lexicon: HALOT
  rationale: The noun denotes hope or expectation. 'Hope' is the most direct and idiomatic
    rendering in English, while still allowing the nuance of expectation.
- source_word: נִכְזָבָה
  chosen: proves false
  alternatives:
  - is disappointed
  - is shown to be false
  - fails
  lexicon: HALOT
  rationale: 'From כזב, conveying deception, falseness, or disappointment. ''Proves
    false'' captures the passive/resultative sense: the hope turns out to be deceptive
    or unfounded. It is stronger and more textually grounded than the more interpretive
    ''is disappointed.'''
- source_word: הֲגַם
  chosen: is one not
  alternatives:
  - even
  - indeed even
  - also
  lexicon: HALOT
  rationale: The interrogative plus additive particle introduces a rhetorical question
    with intensification. 'Is one not' brings out the rhetorical force in idiomatic
    English; the intensifying sense of 'even' is reflected in the following phrase.
- source_word: אֶל
  chosen: at
  alternatives:
  - before
  - toward
  - to
  lexicon: HALOT
  rationale: Although the preposition commonly means 'to/toward,' with verbs of reaction
    and the noun 'sight/appearance' it is naturally rendered in English as 'at' or
    'before.' 'At the sight of' is the most idiomatic expression here.
- source_word: מַרְאָיו
  chosen: the sight of him
  alternatives:
  - his appearance
  - the mere sight of him
  - his look
  lexicon: HALOT
  rationale: The noun refers to appearance or sight. 'The sight of him' fits the construction
    with אֶל and communicates the reaction provoked by merely seeing Leviathan. 'Mere
    sight' is possible but slightly more interpretive, so it is preserved as an alternative.
- source_word: יֻטָל
  chosen: is cast down
  alternatives:
  - is laid low
  - is overwhelmed
  - is thrown down
  lexicon: HALOT
  rationale: The Hophal of טול/נטל here conveys being thrown down, laid low, or overwhelmed.
    'Is cast down' preserves both the passive form and the idiomatic sense of collapse
    in fear, without over-specifying the manner.
