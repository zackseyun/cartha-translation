id: JOB.41.26
reference: Job 41:26
source:
  edition: WLC
  text: אֵֽת כָּל גָּבֹ֥הַּ יִרְאֶ֑ה ה֝֗וּא מֶ֣לֶךְ עַל כָּל בְּנֵי שָֽׁחַץ־־־־־׃ס
translation:
  text: He looks on everything that is high; he is king over all the sons of pride.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all the proud ones'; literally, 'all the sons of pride.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵת
  chosen: 'on'
  alternatives:
  - at
  - '[direct object marker left untranslated]'
  lexicon: HALOT
  rationale: Here אֵת introduces the object of יִרְאֶה. In English the verb 'look
    on' naturally conveys the transitive sense with an object, preserving the Hebrew
    construction without awkwardness.
- source_word: כָּל
  chosen: everything
  alternatives:
  - all
  - every
  lexicon: HALOT
  rationale: 'With the following singular adjective גָּבֹהַּ, the sense is comprehensive:
    ''everything that is high.'' This is idiomatic English and preserves the totalizing
    force.'
- source_word: גָּבֹהַּ
  chosen: that is high
  alternatives:
  - lofty
  - proud
  - exalted
  lexicon: HALOT
  rationale: The adjective literally denotes height. In context it can shade into
    loftiness or haughtiness, but 'high' preserves the concrete image while allowing
    the implied metaphor of exalted beings.
- source_word: יִרְאֶה
  chosen: looks on
  alternatives:
  - sees
  - beholds
  - looks at
  lexicon: HALOT
  rationale: The verb ראה means 'see.' 'Looks on' fits the poetic context and the
    object marker construction, suggesting fearless regard rather than mere visual
    perception.
- source_word: הוּא
  chosen: he
  alternatives:
  - he himself
  lexicon: HALOT
  rationale: The independent pronoun adds emphasis, but standard English can carry
    this adequately with simple 'he' in the parallel clause.
- source_word: מֶלֶךְ
  chosen: king
  alternatives:
  - ruler
  lexicon: HALOT
  rationale: The noun straightforwardly means 'king.' Retaining 'king' preserves the
    regal metaphor and the force of supremacy.
- source_word: עַל
  chosen: over
  alternatives:
  - upon
  - above
  lexicon: HALOT
  rationale: '''Over'' is the natural English preposition for rule or dominion in
    this context.'
- source_word: בְּנֵי
  chosen: sons of
  alternatives:
  - children of
  - those characterized by
  lexicon: HALOT
  rationale: The Hebrew construct literally reads 'sons of.' Per the translation philosophy,
    gender-accurate rendering is preferred where it matches the source. Here it is
    also an idiomatic class designation, so the literal form is retained.
- source_word: שָׁחַץ
  chosen: pride
  alternatives:
  - arrogance
  - haughtiness
  - majesty
  lexicon: HALOT
  rationale: In this context the noun denotes pride or haughtiness. 'Pride' is concise
    and traditional, fitting the portrayal of Leviathan as supreme over all arrogant
    creatures.
