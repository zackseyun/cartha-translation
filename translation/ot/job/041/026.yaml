theological_decisions:
- issue: Interpretation of 'all the sons of pride'
  chosen_reading: A poetic designation for all proud or haughty creatures/beings,
    with Leviathan portrayed as supreme over them.
  alternative_readings:
  - A reference specifically to fierce beasts
  - A mythopoetic reference to cosmic powers characterized by pride
  rationale: The Hebrew phrase is metaphorical and does not require narrowing to one
    class. The translation preserves the poetic ambiguity rather than resolving it
    into zoological or mythological specificity.
  doctrine_reference: Preserve theological tension rather than resolve it.
