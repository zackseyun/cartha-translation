theological_decisions:
- issue: Meaning of אֵלִים in a poetic description of Leviathan
  chosen_reading: human or creaturely 'mighty ones,' rendered 'the mighty'
  alternative_readings:
  - '''gods'''
  - '''heroes'''
  rationale: The verse emphasizes Leviathan's terrifying power over even the strongest.
    Rendering אֵלִים as 'the mighty' preserves the poetic force without introducing
    an unnecessary claim about divine beings fearing Leviathan. The context does not
    require a mythological-theological reading.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
