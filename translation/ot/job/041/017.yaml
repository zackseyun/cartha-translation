id: JOB.41.17
reference: Job 41:17
source:
  edition: WLC
  text: מִ֭/שֵּׂת/וֹ יָג֣וּרוּ אֵלִ֑ים מִ֝/שְּׁבָרִ֗ים יִתְחַטָּֽאוּ׃
translation:
  text: At his rising the mighty are afraid; at the crashing they are beside themselves.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the mighty ones'; the Hebrew can also be read 'gods' or 'heroes.'
    reason: alternative_reading
  - marker: b
    text: The final clause is difficult. It may also mean 'they are bewildered' or,
      more literally from the verb form, 'they purify themselves.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִשֵּׂתוֹ
  chosen: at his rising
  alternatives:
  - from his rising
  - when he rises
  - at his exaltation
  lexicon: HALOT
  rationale: 'The noun from שׂאת commonly denotes ''rising,'' ''lifting up,'' or ''exaltation.''
    In context of Leviathan''s terrifying movement, a temporal sense fits best: when
    he rises up. ''At his rising'' preserves the vivid image and stays close to the
    Hebrew preposition מִן used idiomatically in a causal/temporal sense.'
- source_word: יָגוּרוּ
  chosen: are afraid
  alternatives:
  - fear
  - dread
  lexicon: HALOT
  rationale: From גור in the Qal, here expressing fear or dread. 'Are afraid' is natural
    modern English and adequately conveys the imperfect verbal sense in poetic description.
- source_word: אֵלִים
  chosen: the mighty
  alternatives:
  - mighty ones
  - gods
  - heroes
  lexicon: HALOT
  rationale: Although אֵלִים can mean 'gods,' in this poetic context it more plausibly
    refers to mighty beings or powerful ones who tremble before Leviathan. 'The mighty'
    is idiomatic English and avoids implying a theological statement about deities
    unless the context clearly requires it.
- source_word: מִשְּׁבָרִים
  chosen: at the crashing
  alternatives:
  - because of the crash
  - from the breaking
  - from the breakers
  lexicon: HALOT
  rationale: From שׁבר, literally 'breakings' or 'crashings.' In context it likely
    refers to the violent crashing or thrashing associated with Leviathan's movement.
    'At the crashing' captures the concrete auditory/violent sense without over-specifying
    the object broken.
- source_word: יִתְחַטָּאוּ
  chosen: they are beside themselves
  alternatives:
  - they lose themselves
  - they are bewildered
  - they purify themselves
  lexicon: HALOT
  rationale: The Hitpael of חטא is difficult here. While elsewhere it can mean 'purify
    oneself,' in this poetic context many understand a derived sense such as 'miss
    one's way,' 'be confounded,' or 'be beside oneself' in terror. 'They are beside
    themselves' best fits the parallelism with fear and the immediate context of panic.
