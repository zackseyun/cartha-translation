id: JOB.41.16
reference: Job 41:16
source:
  edition: WLC
  text: לִ֭בּ/וֹ יָצ֣וּק כְּמוֹ אָ֑בֶן וְ֝/יָצ֗וּק כְּ/פֶ֣לַח תַּחְתִּֽית־׃
translation:
  text: His heart is hard like a stone, hard like the lower millstone.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "firm like the lower millstone"; the Hebrew verb literally relates to
      something cast or poured, hence rigid or solid.
    reason: lexical_alternative
lexical_decisions:
- source_word: לִבּוֹ
  chosen: his heart
  alternatives:
  - his mind
  - his inner being
  lexicon: HALOT
  rationale: לֵב/לֵבָב commonly denotes the heart as the inner center of thought,
    will, and disposition. In this poetic description of Leviathan, 'heart' is the
    most natural and established English rendering and fits the imagery of internal
    hardness.
- source_word: יָצוּק
  chosen: is hard
  alternatives:
  - is cast
  - is firm
  - is solid
  lexicon: HALOT
  rationale: From יצק, literally 'poured/cast,' but in this adjectival/passive usage
    within simile it conveys something cast and therefore rigid, firm, or hard. 'Is
    hard' best communicates the sense in idiomatic modern English without obscuring
    the comparison to stone.
- source_word: כְּמוֹ אָבֶן
  chosen: like a stone
  alternatives:
  - as stone
  lexicon: HALOT
  rationale: A straightforward simile. 'Like a stone' is clear, natural English and
    preserves the concrete comparison.
- source_word: וְיָצוּק
  chosen: hard
  alternatives:
  - and firm
  - and solid
  - and cast
  lexicon: HALOT
  rationale: The repeated predicate intensifies the description. Rendering it again
    as 'hard' preserves the poetic parallelism more naturally than a wooden repetition
    of 'cast.'
- source_word: כְּפֶלַח תַּחְתִּית
  chosen: like the lower millstone
  alternatives:
  - like a lower millstone
  - like the bottom millstone
  - like a lower millstone fragment
  lexicon: HALOT
  rationale: פֶלַח can denote a slice or piece, but in this collocation with תַּחְתִּית
    the sense is best taken as the lower part/stone of a mill. 'Lower millstone' is
    the clearest idiomatic rendering and matches the image of exceptional hardness.
