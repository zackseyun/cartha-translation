id: JOB.41.4
reference: Job 41:4
source:
  edition: WLC
  text: לא אַחֲרִ֥ישׁ בַּדָּ֑י/ו וּ/דְבַר גְּ֝בוּר֗וֹת וְ/חִ֣ין עֶרְכּֽ/וֹ־־׃
translation:
  text: I will not keep silent about his limbs, or the account of his mighty strength
    and the grace of his proportions.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I will not be silent about his parts, or about the matter of his powers
      and the beauty of his arrangement.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַחֲרִישׁ
  chosen: I will not keep silent
  alternatives:
  - I will not be silent
  - I will not pass over in silence
  lexicon: HALOT
  rationale: From חרשׁ in Hiphil, here expressing refraining from speech. 'Keep silent'
    is idiomatic modern English and preserves the first-person resolve of the speaker.
- source_word: בַּדָּיו
  chosen: his limbs
  alternatives:
  - his parts
  - his members
  - his frame
  lexicon: HALOT
  rationale: בַּד can denote parts or members of the body. In the Leviathan description,
    'limbs' fits the anatomical context better than the more wooden 'parts' while
    remaining concrete.
- source_word: דְבַר
  chosen: the account of
  alternatives:
  - the matter of
  - the word about
  - the description of
  lexicon: HALOT
  rationale: Construct with following nouns introduces what the speaker will speak
    concerning. 'The account of' is natural English and captures the descriptive force
    in context.
- source_word: גְּבוּרוֹת
  chosen: his mighty strength
  alternatives:
  - his mighty deeds
  - his powers
  - his strength
  lexicon: HALOT
  rationale: Though גבורות can mean mighty acts or displays of power, in this poetic
    description of Leviathan's physical form and force, 'mighty strength' best fits
    the immediate context.
- source_word: חִין
  chosen: the grace
  alternatives:
  - the beauty
  - the charm
  - the comeliness
  lexicon: HALOT
  rationale: חֵן commonly denotes grace, charm, or favor. Here it refers to the pleasing
    impressiveness of Leviathan's form. 'Grace' preserves the lexical core, though
    in English it carries aesthetic force here.
- source_word: עֶרְכּוֹ
  chosen: his proportions
  alternatives:
  - his arrangement
  - his form
  - his frame
  lexicon: HALOT
  rationale: From ערך, arrangement or ordering. In context of bodily description,
    'proportions' communicates the ordered form of the creature more idiomatically
    than the abstract 'arrangement'.
