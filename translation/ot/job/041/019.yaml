id: JOB.41.19
reference: Job 41:19
source:
  edition: WLC
  text: יַחְשֹׁ֣ב לְ/תֶ֣בֶן בַּרְזֶ֑ל לְ/עֵ֖ץ רִקָּב֣וֹן נְחוּשָֽׁה׃
translation:
  text: He regards iron as straw, and bronze as rotten wood.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'copper' for 'bronze' (נְחוּשָׁה).
    reason: lexical_alternative
lexical_decisions:
- source_word: יַחְשֹׁב
  chosen: regards
  alternatives:
  - considers
  - counts
  - thinks of
  lexicon: HALOT
  rationale: The verb חשׁב here expresses evaluation or reckoning. 'Regards' gives
    natural English while preserving the sense that Leviathan treats these materials
    as insignificant.
- source_word: לְתֶבֶן
  chosen: as straw
  alternatives:
  - as stubble
  lexicon: HALOT
  rationale: תבן commonly denotes straw/fodder. With ל marking comparison, 'as straw'
    is the most straightforward modern rendering.
- source_word: בַּרְזֶל
  chosen: iron
  lexicon: HALOT
  rationale: Standard rendering for the metal; no contextual reason to vary.
- source_word: לְעֵץ רִקָּבוֹן
  chosen: as rotten wood
  alternatives:
  - as decayed wood
  - as rotted timber
  lexicon: HALOT
  rationale: The phrase is literally 'as wood of rottenness/decay.' 'Rotten wood'
    is idiomatic English and preserves the image of weakness and worthlessness.
- source_word: נְחוּשָׁה
  chosen: bronze
  alternatives:
  - copper
  lexicon: HALOT
  rationale: נחושה can denote copper or bronze depending on context. In biblical weapon/material
    contexts, 'bronze' is the conventional and likely sense, contrasting with iron
    as another strong metal that Leviathan treats as negligible.
