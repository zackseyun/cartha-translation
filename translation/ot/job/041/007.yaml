id: JOB.41.7
reference: Job 41:7
source:
  edition: WLC
  text: גַּ֭אֲוָה אֲפִיקֵ֣י מָֽגִנִּ֑ים סָ֝ג֗וּר חוֹתָ֥ם צָֽר׃
translation:
  text: Its proud rows of shields are shut up, sealed tightly.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Its rows of scales are shut up, sealed tightly.' The Hebrew literally
      says 'rows of shields,' using a martial metaphor for Leviathan's scales.
    reason: lexical_alternative
lexical_decisions:
- source_word: גַּאֲוָה
  chosen: proud
  alternatives:
  - majesty
  - pride
  lexicon: HALOT
  rationale: The noun commonly denotes pride, exaltation, or majesty. In this compressed
    poetic line it functions appositionally/adverbially with the following phrase,
    describing the impressive character of Leviathan's scale-rows. 'Proud' gives natural
    English and preserves the sense of imposing loftiness without overabstracting
    to 'pride' as an inner moral quality.
- source_word: אֲפִיקֵי
  chosen: rows of
  alternatives:
  - channels of
  - courses of
  - strong parts of
  lexicon: HALOT
  rationale: Although the noun can denote channels, beds, or strong/firm structures,
    in context with 'shields' and the surrounding description of Leviathan's scales,
    it refers to arranged structural lines. 'Rows of' best captures the image in idiomatic
    English.
- source_word: מָגִנִּים
  chosen: shields
  alternatives:
  - scales
  lexicon: HALOT
  rationale: The literal word is 'shields.' Because the verse poetically compares
    Leviathan's scales to shields, the main text preserves the metaphor rather than
    flattening it to 'scales.' The contextual alternative is preserved in a footnote
    for clarity.
- source_word: סָגוּר
  chosen: shut up
  alternatives:
  - closed
  - locked
  lexicon: HALOT
  rationale: The passive participial/adjectival form conveys being closed fast. 'Shut
    up' is vivid and natural in English, matching the image of tightly joined armor.
- source_word: חוֹתָם
  chosen: sealed
  alternatives:
  - like a seal
  - seal
  lexicon: HALOT
  rationale: With the following adjective, the phrase conveys the idea of being sealed
    shut. Rendering verbally as 'sealed' produces clear English while preserving the
    metaphorical force.
- source_word: צָר
  chosen: tightly
  alternatives:
  - tight
  - close
  lexicon: HALOT
  rationale: 'The adjective means narrow, tight, or close. In English it most naturally
    modifies ''sealed'' adverbially: ''sealed tightly.'' This preserves the sense
    of close compression between the scales.'
