id: JOB.41.23
reference: Job 41:23
source:
  edition: WLC
  text: יַרְתִּ֣יחַ כַּ/סִּ֣יר מְצוּלָ֑ה יָ֝֗ם יָשִׂ֥ים כַּ/מֶּרְקָחָֽה׃
translation:
  text: He makes the deep boil like a pot; he makes the sea like a pot of ointment.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'like a perfumer’s mixture' or 'like ointment.' The Hebrew term refers
      to a compounded mixture, often associated with ointment or perfume.
    reason: lexical_alternative
lexical_decisions:
- source_word: יַרְתִּיחַ
  chosen: makes ... boil
  alternatives:
  - causes to boil
  - makes seethe
  lexicon: HALOT
  rationale: Hiphil of רתח conveys causing something to boil or seethe. 'Makes ...
    boil' is natural modern English and preserves the causative force.
- source_word: כַּסִּיר
  chosen: like a pot
  alternatives:
  - like a cooking pot
  - like a cauldron
  lexicon: HALOT
  rationale: סִיר denotes a pot or cooking vessel. 'Pot' is the most straightforward
    rendering; 'cauldron' is possible but sounds more archaic or specialized.
- source_word: מְצוּלָה
  chosen: the deep
  alternatives:
  - the depths
  - the deep waters
  lexicon: HALOT
  rationale: מְצוּלָה refers to the depths, especially of the sea. 'The deep' is idiomatic
    English and fits the poetic parallel with 'the sea' in the next colon.
- source_word: יָם
  chosen: the sea
  alternatives:
  - the waters
  lexicon: HALOT
  rationale: יָם normally means 'sea.' Retaining 'sea' preserves the concrete imagery
    and the parallelism with 'the deep.'
- source_word: יָשִׂים
  chosen: he makes
  alternatives:
  - he sets
  - he turns
  lexicon: HALOT
  rationale: Although שׂים literally often means 'put/set,' in this comparative construction
    it carries the sense 'make/render.' Using 'he makes' yields clear English and
    matches the poetic effect.
- source_word: כַּמֶּרְקָחָה
  chosen: like a pot of ointment
  alternatives:
  - like ointment
  - like a boiling ointment mixture
  - like a perfumer's mixture
  lexicon: HALOT
  rationale: מֶרְקָחָה denotes a mixed compound, often of ointment or perfume. Because
    the image is of churning liquid, 'like a pot of ointment' preserves both the comparison
    marker and the sense of a stirred compound. The exact nuance may suggest a perfumer's
    mixture, so that alternative is preserved in a footnote.
