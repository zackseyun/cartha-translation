id: JOB.41.13
reference: Job 41:13
source:
  edition: WLC
  text: נַ֭פְשׁ/וֹ גֶּחָלִ֣ים תְּלַהֵ֑ט וְ֝/לַ֗הַב מִ/פִּ֥י/ו יֵצֵֽא׃
translation:
  text: His breath kindles coals, and a flame comes out from his mouth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'His soul' or 'His throat kindles coals.' The Hebrew noun נֶפֶשׁ can
      mean 'soul,' 'life,' 'throat,' or, by extension in context, 'breath.'
    reason: lexical_alternative
lexical_decisions:
- source_word: נַפְשׁוֹ
  chosen: his breath
  alternatives:
  - his soul
  - his throat
  - his life
  lexicon: HALOT
  rationale: Though נֶפֶשׁ often means 'soul' or 'life,' in poetic and physiological
    contexts it can denote the throat or breath. Here, with the parallel line 'from
    his mouth' and the imagery of fiery exhalation, 'his breath' best conveys the
    plain sense in idiomatic English.
- source_word: גֶּחָלִים
  chosen: coals
  alternatives:
  - charcoal
  - burning coals
  lexicon: HALOT
  rationale: The noun denotes coals/embers. 'Coals' is concise and natural; the verb
    already supplies the idea of ignition, so 'burning coals' would be somewhat redundant.
- source_word: תְּלַהֵט
  chosen: kindles
  alternatives:
  - sets ablaze
  - inflames
  - burns
  lexicon: HALOT
  rationale: The Piel form of להט conveys causing to blaze or burn. 'Kindles' preserves
    the causative force while remaining readable modern English.
- source_word: וְלַהַב
  chosen: and a flame
  alternatives:
  - and flame
  - and a blaze
  lexicon: HALOT
  rationale: לַהַב is a singular noun meaning 'flame' or 'blaze.' Rendering with the
    English article gives natural syntax and preserves the singular image.
- source_word: מִפִּיו
  chosen: from his mouth
  alternatives:
  - out of his mouth
  lexicon: HALOT
  rationale: A straightforward rendering of the preposition plus noun with suffix.
    'From his mouth' is natural and matches the poetic parallelism.
- source_word: יֵצֵא
  chosen: comes out
  alternatives:
  - goes out
  - issues forth
  lexicon: HALOT
  rationale: The verb means 'go out/come out.' In English, with 'from his mouth,'
    'comes out' is the most idiomatic expression. 'Issues forth' is more formal but
    less natural for the target style.
