id: JOB.41.21
reference: Job 41:21
source:
  edition: WLC
  text: כְּ֭/קַשׁ נֶחְשְׁב֣וּ תוֹתָ֑ח וְ֝/יִשְׂחַ֗ק לְ/רַ֣עַשׁ כִּידֽוֹן׃
translation:
  text: A club is regarded as straw, and he laughs at the rattling of the javelin.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'A dart/missile is regarded as straw'; the Hebrew term תוֹתָח is rare,
      and its precise sense is uncertain.
    reason: lexical_alternative
  - marker: b
    text: Or 'like stubble.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּקַשׁ
  chosen: as straw
  alternatives:
  - like stubble
  lexicon: HALOT
  rationale: קַשׁ denotes straw/stubble. 'Straw' is the more natural modern English
    choice here, preserving the simile of something light and harmless.
- source_word: נֶחְשְׁבוּ
  chosen: is regarded
  alternatives:
  - is counted
  - is considered
  lexicon: HALOT
  rationale: Passive of חשׁב, 'to reckon/consider.' Singular English is used because
    the following noun is treated collectively/syntactically as the subject in translation.
- source_word: תוֹתָח
  chosen: club
  alternatives:
  - dart
  - missile
  - slingstone
  lexicon: HALOT
  rationale: The noun is rare and its exact referent is uncertain, but in this martial
    context it denotes a weapon/projectile. 'Club' fits the parallel with כידון as
    another weapon and yields clear modern English, while avoiding overprecision where
    the Hebrew is uncertain.
- source_word: וְיִשְׂחַק
  chosen: and he laughs
  alternatives:
  - and it laughs
  - and he mocks
  lexicon: HALOT
  rationale: The verb means 'laugh.' The subject is the Leviathan described throughout
    the context, naturally rendered 'he' in English for this poetic personification.
- source_word: לְרַעַשׁ
  chosen: at the rattling
  alternatives:
  - at the rushing
  - at the crashing
  - at the shaking
  lexicon: HALOT
  rationale: רַעַשׁ denotes noise, shaking, or rattling. In context of weaponry, 'rattling'
    captures the audible threatening motion of the weapon without overstating the
    sense.
- source_word: כִּידוֹן
  chosen: the javelin
  alternatives:
  - the spear
  - the lance
  lexicon: HALOT
  rationale: כידון commonly denotes a javelin or spear-like throwing weapon. 'Javelin'
    best distinguishes it from other spear terms and suits the martial imagery.
