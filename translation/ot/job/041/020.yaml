id: JOB.41.20
reference: Job 41:20
source:
  edition: WLC
  text: לֹֽא יַבְרִיחֶ֥/נּוּ בֶן קָ֑שֶׁת לְ֝/קַ֗שׁ נֶהְפְּכוּ ל֥/וֹ אַבְנֵי קָֽלַע־־־־׃
translation:
  text: The son of the bow cannot make him flee; slingstones become like stubble to
    him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''the son of the bow,'' that is, an archer or bowman.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יַבְרִיחֶנּוּ
  chosen: cannot make him flee
  alternatives:
  - cannot drive him away
  - cannot put him to flight
  lexicon: HALOT
  rationale: Hiphil of ברח with 3ms object means to cause someone to flee or drive
    him off. In context of weapons failing against Leviathan, 'make him flee' is a
    natural English rendering that preserves the causative force without overinterpreting.
- source_word: בֶן קָשֶׁת
  chosen: the son of the bow
  alternatives:
  - the archer
  - a bowman
  lexicon: HALOT
  rationale: Literally 'son of the bow,' a Hebrew idiom for one characterized by or
    associated with the bow, i.e., an archer. Because optimal equivalence allows idiom
    to be clarified, the main line keeps the literal flavor while remaining intelligible;
    the idiomatic sense is preserved in a footnote.
- source_word: לְקַשׁ
  chosen: like stubble
  alternatives:
  - as stubble
  - like chaff
  lexicon: HALOT
  rationale: קשׁ commonly denotes stubble or straw-like dry plant matter. 'Stubble'
    best matches the image of something light and insignificant under impact; 'chaff'
    is possible but less exact lexically.
- source_word: נֶהְפְּכוּ לוֹ
  chosen: become ... to him
  alternatives:
  - are turned ... for him
  - are regarded ... by him
  lexicon: HALOT
  rationale: 'Niphal of הפך here conveys a change of state: slingstones are turned
    into or become something negligible in relation to him. ''Become ... to him''
    is idiomatic English and preserves the comparative force.'
- source_word: אַבְנֵי קָלַע
  chosen: slingstones
  alternatives:
  - stones of a sling
  - sling-stones
  lexicon: HALOT
  rationale: The construct phrase refers to stones used in a sling. 'Slingstones'
    is concise, natural English and accurately reflects the weapon imagery.
