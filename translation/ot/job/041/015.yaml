id: JOB.41.15
reference: Job 41:15
source:
  edition: WLC
  text: מַפְּלֵ֣י בְשָׂר֣/וֹ דָבֵ֑קוּ יָצ֥וּק עָ֝לָ֗י/ו בַּל יִמּֽוֹט־׃
translation:
  text: The folds of his flesh cling together, cast firm upon him, not to be moved.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'firmly set on him' for 'cast firm upon him'; the Hebrew uses imagery
      of something poured/cast so as to become fixed.
    reason: lexical_alternative
lexical_decisions:
- source_word: מַפְּלֵי
  chosen: folds
  alternatives:
  - flakes
  - parts
  - layers
  lexicon: HALOT
  rationale: The noun refers to hanging or folded parts, here of the creature's body.
    'Folds' best fits the bodily imagery in context and avoids the awkwardness of
    'flakes' while preserving the concrete sense.
- source_word: בְשָׂרוֹ
  chosen: his flesh
  alternatives:
  - his body
  - his hide
  lexicon: HALOT
  rationale: The base sense of בשר is 'flesh.' Although the context concerns the creature's
    exterior strength, 'flesh' preserves the Hebrew wording more closely than the
    interpretive 'hide' or the broader 'body.'
- source_word: דָבֵקוּ
  chosen: cling together
  alternatives:
  - stick fast
  - are joined
  lexicon: HALOT
  rationale: From דבק, expressing close adhesion. 'Cling together' is natural modern
    English and conveys the plural subject's tight attachment.
- source_word: יָצוּק
  chosen: cast firm
  alternatives:
  - poured out
  - molten
  - firmly set
  lexicon: HALOT
  rationale: The passive/adjectival sense here is of something firmly fixed, as if
    cast in metal. 'Cast firm' preserves the metaphorical force and the compactness
    of the Hebrew better than a fully flattened rendering.
- source_word: עָלָיו
  chosen: upon him
  alternatives:
  - on him
  lexicon: HALOT
  rationale: A straightforward rendering of the preposition with pronominal suffix;
    'upon' suits the elevated poetic register.
- source_word: בַּל
  chosen: not
  alternatives:
  - never
  lexicon: HALOT
  rationale: Poetic negative particle. 'Not' is sufficient and avoids overstating
    the force as an absolute temporal 'never.'
- source_word: יִמּוֹט
  chosen: to be moved
  alternatives:
  - to be shaken
  - to slip
  lexicon: HALOT
  rationale: מוט in the Niphal commonly means 'be moved, totter, be shaken.' 'To be
    moved' works idiomatically after the negative and preserves the image of immovability.
