id: JOB.41.2
reference: Job 41:2
source:
  edition: WLC
  text: לֹֽא אַ֭כְזָר כִּ֣י יְעוּרֶ֑/נּוּ וּ/מִ֥י ה֝֗וּא לְ/פָנַ֥/י יִתְיַצָּֽב־׃
translation:
  text: No one is so fierce that he dares to stir him up. Then who is he who can stand
    before me?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'No one is so cruel that he would rouse him.' The Hebrew verb means 'awaken'
      or 'rouse,' here in the sense of provoking Leviathan.
    reason: lexical_alternative
lexical_decisions:
- source_word: לֹא
  chosen: No one is
  alternatives:
  - not
  lexicon: HALOT
  rationale: The negative particle combines with the following predicate to form an
    idiomatic clause in English. Rendering with 'No one is' brings out the implied
    subject naturally rather than leaving a bare 'not fierce.'
- source_word: אַכְזָר
  chosen: so fierce
  alternatives:
  - cruel
  - merciless
  lexicon: HALOT
  rationale: The adjective denotes harshness or ferocity. In context of Leviathan,
    'fierce' fits the immediate sense of terrifying boldness better than the more
    moralized 'cruel' or 'merciless.' 'So fierce' also prepares for the result clause
    that follows.
- source_word: כִּי
  chosen: that
  alternatives:
  - for
  - because
  lexicon: HALOT
  rationale: 'Here כִּי introduces the consequence/content of the preceding description:
    no one is so fierce ''that'' he would do the following. ''Because'' is possible
    in isolation, but the clause reads more naturally in English as a result construction.'
- source_word: יְעוּרֶנּוּ
  chosen: he dares to stir him up
  alternatives:
  - he awakens him
  - he rouses him
  lexicon: HALOT
  rationale: 'The verb from עור means to rouse or awaken. In this context of provoking
    Leviathan, ''stir him up'' captures the idiomatic sense of arousing him to action.
    ''Dares to'' is supplied in English to reflect the force of the rhetorical statement:
    the issue is not mere physical waking but bold provocation.'
- source_word: וּמִי
  chosen: Then who
  alternatives:
  - And who
  - Who then
  lexicon: HALOT
  rationale: The conjunction plus interrogative advances the argument from Leviathan
    to God. 'Then who' makes the inferential force clear in contemporary English.
- source_word: הוּא
  chosen: is he
  alternatives:
  - is it
  lexicon: HALOT
  rationale: The pronoun is retained for emphasis in the rhetorical question. 'Who
    is he' preserves the Hebrew emphasis better than a flatter 'who can.'
- source_word: לְפָנַי
  chosen: before me
  alternatives:
  - in my presence
  - against me
  lexicon: HALOT
  rationale: Literally 'before my face/presence.' 'Before me' is the most natural
    concise rendering and preserves the spatial-metaphorical force of standing in
    God's presence or opposition.
- source_word: יִתְיַצָּב
  chosen: can stand
  alternatives:
  - would stand
  - take his stand
  - present himself
  lexicon: HALOT
  rationale: The hitpael of יצב means to station oneself or take one's stand. In this
    rhetorical context, 'can stand' communicates ability to withstand or present oneself
    before God. This also fits the implied challenge of the verse.
