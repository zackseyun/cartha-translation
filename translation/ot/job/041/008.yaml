id: JOB.41.8
reference: Job 41:8
source:
  edition: WLC
  text: אֶחָ֣ד בְּ/אֶחָ֣ד יִגַּ֑שׁוּ וְ֝/ר֗וּחַ לֹא יָב֥וֹא בֵֽינֵי/הֶֽם־׃
translation:
  text: They press close, one to another, and no air can come between them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and no wind comes between them.' The Hebrew רוּחַ can mean 'air,' 'wind,'
      or 'breath'; here the physical sense is intended.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶחָד ... בְּאֶחָד
  chosen: one to another
  alternatives:
  - one with another
  - each to the other
  lexicon: HALOT
  rationale: 'The distributive repetition of אֶחָד with בְּ expresses mutual adjacency:
    each one against/with the next. ''One to another'' is idiomatic English that preserves
    the pairwise sense without over-literal awkwardness.'
- source_word: יִגַּשׁוּ
  chosen: press close
  alternatives:
  - draw near
  - come close together
  - join tightly
  lexicon: HALOT
  rationale: From נגשׁ, here describing the tightly packed scales of Leviathan. 'Press
    close' captures not merely approach but close-packed contact in context.
- source_word: וְרוּחַ
  chosen: air
  alternatives:
  - wind
  - breath
  - spirit
  lexicon: HALOT
  rationale: In this physical description, רוּחַ refers to moving air rather than
    'spirit.' 'Air' best fits the sense of even the smallest gap being absent between
    the scales.
- source_word: לֹא יָבֹא
  chosen: can come
  alternatives:
  - does not come
  - cannot enter
  lexicon: HALOT
  rationale: The imperfect with negation states what does not happen in practice because
    of the tightness described. 'Can come' brings out the effective impossibility
    in natural English.
- source_word: בֵינֵיהֶם
  chosen: between them
  alternatives:
  - among them
  lexicon: HALOT
  rationale: The preposition בין with 3mp suffix straightforwardly means spatial separation
    'between them,' referring to the adjacent scales.
