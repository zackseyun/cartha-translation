id: JOB.41.11
reference: Job 41:11
source:
  edition: WLC
  text: מִ֭/פִּי/ו לַפִּידִ֣ים יַהֲלֹ֑כוּ כִּיד֥וֹדֵי אֵ֝֗שׁ יִתְמַלָּֽטוּ׃
translation:
  text: From his mouth torches go out; sparks of fire leap forth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'firebrands' / 'burning darts of fire' for the rare expression translated
      'sparks of fire.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִפִּיו
  chosen: From his mouth
  alternatives:
  - Out of his mouth
  - From its mouth
  lexicon: HALOT
  rationale: The preposition מִן with פֶּה plus 3ms suffix is most naturally rendered
    'from his mouth.' Masculine singular matches the poetic personification of Leviathan
    in context; 'its' is possible in English for an animal, but 'his' better reflects
    the Hebrew grammatical gender and the vivid personal portrayal.
- source_word: לַפִּידִים
  chosen: torches
  alternatives:
  - flames
  - firebrands
  lexicon: HALOT
  rationale: לַפִּידִים commonly denotes torches or flaming brands. 'Torches' preserves
    the concrete image and pairs well with the following fire imagery. 'Flames' is
    possible but less specific; 'firebrands' is more wooden in modern English.
- source_word: יַהֲלֹכוּ
  chosen: go out
  alternatives:
  - go forth
  - move out
  lexicon: HALOT
  rationale: 'הלך literally means ''go/walk,'' but with ''from his mouth'' and a fiery
    subject the idiomatic sense is emergence: ''go out'' or ''go forth.'' ''Go out''
    is natural modern English while preserving the directional force.'
- source_word: כִּידֹדֵי אֵשׁ
  chosen: sparks of fire
  alternatives:
  - firebrands
  - burning darts
  - flaming javelins
  lexicon: HALOT
  rationale: The noun כִּידוֹדֵי is rare and debated, but in this poetic parallelism
    it denotes fiery projectiles or sparks. 'Sparks of fire' best fits the immediate
    imagery and the following verb 'leap forth.' More martial renderings such as 'burning
    darts' are possible but sound overly specific for the context.
- source_word: יִתְמַלָּטוּ
  chosen: leap forth
  alternatives:
  - escape
  - burst out
  - dart out
  lexicon: HALOT
  rationale: The basic sense of מלט is 'escape/deliver oneself,' but here in vivid
    poetry with fiery emissions it describes sudden issuing forth. 'Leap forth' captures
    the energetic image in idiomatic English better than the overly literal 'escape.'
