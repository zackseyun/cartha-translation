id: JOB.41.9
reference: Job 41:9
source:
  edition: WLC
  text: אִישׁ בְּ/אָחִ֥י/הוּ יְדֻבָּ֑קוּ יִ֝תְלַכְּד֗וּ וְ/לֹ֣א יִתְפָּרָֽדוּ־׃
translation:
  text: Each one sticks to its fellow; they are clasped together and cannot be separated.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'Each one with its brother they cling'; 'brother' is a more formal
      alternative to 'fellow' in this poetic description of Leviathan's scales.
    reason: lexical_alternative
lexical_decisions:
- source_word: אִישׁ
  chosen: Each one
  alternatives:
  - A man
  - One
  lexicon: HALOT
  rationale: 'Although אִישׁ often means ''man,'' here it functions distributively
    in a description of Leviathan''s scales: ''each one'' fits the singular-with-singular
    construction and avoids implying male persons are in view. This preserves the
    Hebrew''s individual-item emphasis.'
- source_word: בְּאָחִיהוּ
  chosen: to its fellow
  alternatives:
  - with its brother
  - to another
  lexicon: HALOT
  rationale: Literally 'with/to his brother.' In this non-human poetic context, 'its
    fellow' communicates the close pairing of adjacent scales more naturally in English
    while preserving the relational metaphor. 'Brother' is a viable formal alternative
    and is preserved in a footnote.
- source_word: יְדֻבָּקוּ
  chosen: sticks
  alternatives:
  - cling
  - are joined
  - cleave
  lexicon: HALOT
  rationale: From דבק, expressing close adhesion. 'Sticks' gives vivid, natural English
    for the image of tightly adhering scales; singular English agrees with the distributive
    subject sense ('each one ... sticks').
- source_word: יִתְלַכְּדוּ
  chosen: are clasped together
  alternatives:
  - are locked together
  - hold fast together
  - are caught together
  lexicon: HALOT
  rationale: The verb conveys being caught, seized, or tightly fastened together.
    'Are clasped together' fits the poetic parallelism with the previous verb and
    conveys tight interlocking without overtechnical wording.
- source_word: וְלֹא יִתְפָּרָדוּ
  chosen: and cannot be separated
  alternatives:
  - and do not separate
  - and are not parted
  - and they do not come apart
  lexicon: HALOT
  rationale: 'The imperfect with negation states the result of their tight joining.
    ''Cannot be separated'' expresses the practical force in idiomatic English: the
    scales are inseparable.'
