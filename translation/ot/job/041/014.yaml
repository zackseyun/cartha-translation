id: JOB.41.14
reference: Job 41:14
source:
  edition: WLC
  text: בְּֽ֭/צַוָּאר/וֹ יָלִ֣ין עֹ֑ז וּ֝/לְ/פָנָ֗י/ו תָּד֥וּץ דְּאָבָֽה׃
translation:
  text: In his neck strength lodges, and before him dismay leaps.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'terror leaps before him.' The Hebrew noun דְּאָבָה is rare, and the
      sense may range from dismay or dejection to terror in this poetic context.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּצַוָּארוֹ
  chosen: In his neck
  alternatives:
  - On his neck
  - At his neck
  lexicon: HALOT
  rationale: The preposition ב plus צַוָּאר with 3ms suffix is most naturally locative.
    'In his neck' is slightly idiomatic in English poetry and preserves the Hebrew
    image of strength residing there.
- source_word: יָלִין
  chosen: lodges
  alternatives:
  - dwells
  - abides
  - spends the night
  lexicon: HALOT
  rationale: From לין, literally 'to lodge/spend the night.' Here it is metaphorical
    of a settled, abiding presence. 'Lodges' preserves the vivid personification better
    than the flatter 'is' or 'dwells.'
- source_word: עֹז
  chosen: strength
  alternatives:
  - might
  - power
  lexicon: HALOT
  rationale: A common noun for strength or might. 'Strength' is the most natural and
    direct English equivalent here.
- source_word: וּלְפָנָיו
  chosen: before him
  alternatives:
  - before his face
  - in front of him
  lexicon: HALOT
  rationale: The idiom with פָּנִים commonly means 'before/in front of.' 'Before him'
    is concise and idiomatic while retaining the personal reference.
- source_word: תָּדוּץ
  chosen: leaps
  alternatives:
  - dances
  - springs
  - rejoices
  lexicon: HALOT
  rationale: From דוץ, a rare verb conveying springing or leaping. In this context
    of vivid poetic personification, 'leaps' fits the imagery of terror rushing ahead
    of Leviathan. 'Dances' is possible lexically but sounds too positive in English
    for this context.
- source_word: דְּאָבָה
  chosen: dismay
  alternatives:
  - terror
  - dejection
  - despair
  lexicon: HALOT
  rationale: A rare noun. In context it denotes a negative emotional force going before
    him. 'Dismay' captures fearful collapse without over-specifying. 'Terror' is possible
    and reflected in some translations, but the Hebrew noun can suggest more general
    dread or discouragement.
