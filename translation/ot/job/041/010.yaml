id: JOB.41.10
reference: Job 41:10
source:
  edition: WLC
  text: עֲֽ֭טִישֹׁתָי/ו תָּ֣הֶל א֑וֹר וְ֝/עֵינָ֗י/ו כְּ/עַפְעַפֵּי שָֽׁחַר־׃
translation:
  text: His sneezings flash forth light, and his eyes are like the eyelids of dawn.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'His sneezes shine with light.' The Hebrew verb is causative ('cause
      light to shine'), and the phrase is highly poetic.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'like the eyelids of dawn,' a Hebrew poetic image for the first
      opening light of day.
    reason: cultural_note
lexical_decisions:
- source_word: עֲטִישֹׁתָיו
  chosen: his sneezings
  alternatives:
  - his snortings
  - his sneezes
  lexicon: HALOT
  rationale: The noun from עטש refers to sneezing. In this poetic description of Leviathan,
    the plural construct with 3ms suffix is best rendered concretely as 'his sneezings.'
    'Snortings' is possible in broader poetic imagery but is less directly tied to
    the Hebrew lemma.
- source_word: תָּהֶל
  chosen: flash forth
  alternatives:
  - shine
  - give off light
  lexicon: HALOT
  rationale: Hiphil of הלל here conveys causing light to shine. 'Flash forth' fits
    the vivid poetic imagery and the immediate object 'light,' while remaining close
    to the causative sense.
- source_word: אוֹר
  chosen: light
  alternatives:
  - brightness
  lexicon: HALOT
  rationale: The common noun plainly means 'light.' 'Brightness' is possible stylistically,
    but 'light' is the more direct and transparent rendering.
- source_word: וְעֵינָיו
  chosen: and his eyes
  lexicon: HALOT
  rationale: Straightforward conjunction plus noun with 3ms suffix.
- source_word: כְּעַפְעַפֵּי
  chosen: like the eyelids of
  alternatives:
  - like the glimmerings of
  - like the first rays of
  lexicon: HALOT
  rationale: עפעפים literally denotes eyelids. In poetic usage with dawn it evokes
    the opening or blinking edge of daybreak. The literal image should be preserved
    in the main text rather than replaced with an interpretive paraphrase.
- source_word: שָׁחַר
  chosen: dawn
  alternatives:
  - daybreak
  - morning light
  lexicon: HALOT
  rationale: The noun refers to dawn/daybreak. 'Dawn' is concise and idiomatic in
    English, preserving the poetic force of the simile.
