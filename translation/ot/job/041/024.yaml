id: JOB.41.24
reference: Job 41:24
source:
  edition: WLC
  text: אַ֭חֲרָי/ו יָאִ֣יר נָתִ֑יב יַחְשֹׁ֖ב תְּה֣וֹם לְ/שֵׂיבָֽה׃
translation:
  text: Behind him a path shines; one would think the deep to be gray-haired.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'After him a path shines.' The Hebrew may be read temporally ('after
      him') or spatially ('behind him'); the context of a wake in the water favors
      'behind him.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'the deep to gray hair/hoariness,' an image of the sea appearing
      white with foam, as though gray-haired.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַחֲרָיו
  chosen: Behind him
  alternatives:
  - After him
  lexicon: HALOT
  rationale: 'The preposition with pronominal suffix can denote spatial or temporal
    succession. In this poetic description of Leviathan moving through the sea, the
    spatial sense fits best: the wake left behind him.'
- source_word: יָאִיר
  chosen: shines
  alternatives:
  - gives light
  - gleams
  - is bright
  lexicon: HALOT
  rationale: Hiphil of אור commonly means 'give light' or 'shine.' In context it describes
    the visible brightness of the wake, so 'shines' is natural modern English.
- source_word: נָתִיב
  chosen: a path
  alternatives:
  - a trail
  - a track
  lexicon: HALOT
  rationale: The noun denotes a path or track. Here it refers metaphorically to the
    bright wake cut through the water by Leviathan's movement.
- source_word: יַחְשֹׁב
  chosen: one would think
  alternatives:
  - he considers
  - it is thought
  - he reckons
  lexicon: HALOT
  rationale: Although formally 3ms, Hebrew often uses such forms impersonally in general
    statements. English idiom is best captured by 'one would think,' expressing the
    observer's impression.
- source_word: תְּהוֹם
  chosen: the deep
  alternatives:
  - the deep sea
  - the abyss
  lexicon: HALOT
  rationale: The term refers to the deep waters. 'The deep' preserves the poetic force
    and avoids over-specifying beyond the Hebrew.
- source_word: לְשֵׂיבָה
  chosen: to be gray-haired
  alternatives:
  - like gray hair
  - for hoariness
  - white-haired
  lexicon: HALOT
  rationale: 'The noun means gray hair, old age, or hoariness. In context the image
    is visual: the foaming wake makes the deep appear white or gray-haired. ''To be
    gray-haired'' preserves the simile-like effect with readable English.'
