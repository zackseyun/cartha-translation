id: JOB.41.3
reference: Job 41:3
source:
  edition: WLC
  text: מִ֣י הִ֭קְדִּימַ/נִי וַ/אֲשַׁלֵּ֑ם תַּ֖חַת כָּל הַ/שָּׁמַ֣יִם לִ/י הֽוּא־־׃
translation:
  text: Who has first given to me, that I should repay him? Whatever is under all
    the heavens is mine.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'Who has preceded me, that I should repay him?' The Hebrew
      verb can mean 'come before' or 'anticipate,' but here likely carries the sense
      of giving first so as to place another under obligation.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִי
  chosen: Who
  alternatives:
  - Who is it that
  - Who ever
  lexicon: HALOT
  rationale: Interrogative pronoun introducing a rhetorical question; simple 'Who'
    best preserves the force without adding emphasis not explicit in the Hebrew.
- source_word: הִקְדִּימַנִי
  chosen: has first given to me
  alternatives:
  - has preceded me
  - has anticipated me
  - has done me a favor first
  lexicon: HALOT
  rationale: From קדם in the Hiphil with 1cs suffix, here idiomatically meaning to
    come before someone with a benefit or gift. In context with 'and I should repay,'
    the sense is not mere temporal precedence but prior giving that would place God
    under obligation. 'Has first given to me' captures the idiom and the argument.
- source_word: וַאֲשַׁלֵּם
  chosen: that I should repay him
  alternatives:
  - and I will repay
  - so that I repay
  lexicon: HALOT
  rationale: 'Though formally a prefixed verb with waw, in this rhetorical context
    it expresses the consequence/result of the prior action: ''that I should repay.''
    English supplies ''him'' from the implied object demanded by idiom. This avoids
    an overly wooden future that could sound like a promise rather than a rhetorical
    denial of indebtedness.'
- source_word: תַּחַת כָּל הַשָּׁמַיִם
  chosen: under all the heavens
  alternatives:
  - under the whole heaven
  - under all heaven
  lexicon: HALOT
  rationale: Literally 'under all the heavens.' The plural 'heavens' reflects the
    Hebrew form and is natural enough in English in elevated discourse. It denotes
    everything in the created order beneath the sky/heavens.
- source_word: לִי הוּא
  chosen: is mine
  alternatives:
  - belongs to me
  - it is mine
  lexicon: HALOT
  rationale: 'The Hebrew places the dative pronoun first for emphasis: ''to me it
    is.'' ''Is mine'' is concise, idiomatic English that preserves the possessive
    claim. ''Whatever'' is supplied in English to connect the clause smoothly to the
    preceding phrase and reflect the implied totality of all that is under heaven.'
