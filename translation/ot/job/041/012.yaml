id: JOB.41.12
reference: Job 41:12
source:
  edition: WLC
  text: מִ֭/נְּחִירָי/ו יֵצֵ֣א עָשָׁ֑ן כְּ/ד֖וּד נָפ֣וּחַ וְ/אַגְמֹֽן׃
translation:
  text: Smoke goes out from his nostrils, like a heated pot and reeds.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'like a cauldron.' The Hebrew דּוּד can denote a cooking pot or larger
      kettle-like vessel.
    reason: lexical_alternative
  - marker: b
    text: The phrase 'and reeds' likely refers to reeds or rushes used as fuel, contributing
      to the image of thick smoke from a strongly heated fire.
    reason: cultural_note
lexical_decisions:
- source_word: מִנְּחִירָיו
  chosen: from his nostrils
  alternatives:
  - from his snorting
  - from his nose
  lexicon: HALOT
  rationale: נְחִירַיִם denotes nostrils/nose; with the prefixed preposition and 3ms
    suffix, the phrase is most naturally 'from his nostrils.' 'Nostrils' preserves
    the vivid bodily imagery better than the broader 'nose.'
- source_word: יֵצֵא
  chosen: goes out
  alternatives:
  - comes out
  - issues forth
  lexicon: HALOT
  rationale: The imperfect of יצא here describes characteristic action in poetic description.
    'Goes out' is a natural, fairly formal English equivalent that preserves the verbal
    image without over-paraphrase.
- source_word: עָשָׁן
  chosen: smoke
  lexicon: HALOT
  rationale: Standard rendering of עָשָׁן; no contextual reason to vary.
- source_word: כְּדוּד
  chosen: like a pot
  alternatives:
  - like a cauldron
  - like a kettle
  lexicon: HALOT
  rationale: דּוּד refers to a cooking pot/cauldron. 'Pot' is the most accessible
    modern English choice; the larger vessel nuance is not crucial enough here to
    require 'cauldron' in the main text.
- source_word: נָפוּחַ
  chosen: heated
  alternatives:
  - blown upon
  - kindled
  - fanned
  lexicon: HALOT
  rationale: The passive participial form conveys something blown up/fanned into heat.
    In context with smoke and fire imagery, 'heated' communicates the result in idiomatic
    English while staying close to the sense.
- source_word: וְאַגְמֹן
  chosen: and reeds
  alternatives:
  - and rushes
  - and marsh-reeds
  lexicon: HALOT
  rationale: אַגְמוֹן commonly denotes reed/rush vegetation. In this simile it likely
    refers to reeds used as fuel or producing smoke. 'Reeds' is concise and transparent;
    the fuel nuance can be preserved in a footnote.
