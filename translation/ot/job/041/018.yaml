id: JOB.41.18
reference: Job 41:18
source:
  edition: WLC
  text: מַשִּׂיגֵ֣/הוּ חֶ֭רֶב בְּלִ֣י תָק֑וּם חֲנִ֖ית מַסָּ֣ע וְ/שִׁרְיָֽה׃
translation:
  text: The sword that reaches him cannot stand; nor can spear, dart, or javelin.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'The sword that overtakes him does not prevail.' The Hebrew expression
      literally says the sword 'does not stand.'
    reason: lexical_alternative
  - marker: b
    text: The Hebrew terms rendered 'dart' and 'javelin' are rare and uncertain; alternatives
      include 'missile' or 'shaft' for the former, and 'coat of mail' or 'armor' for
      the latter.
    reason: lexical_alternative
lexical_decisions:
- source_word: מַשִּׂיגֵהוּ
  chosen: that reaches him
  alternatives:
  - that overtakes him
  - that attains him
  - reaching him
  lexicon: HALOT
  rationale: From נשׂג/השיג, 'to reach, overtake, attain.' In context modifying 'sword,'
    the sense is a sword that succeeds in coming against him. 'That reaches him' is
    idiomatic and preserves the verbal force without overinterpreting as striking
    or wounding.
- source_word: חֶרֶב
  chosen: the sword
  alternatives:
  - a sword
  lexicon: HALOT
  rationale: Common noun for sword. The article is not explicit, but English idiom
    in poetic description often uses 'the sword' generically for the weapon class.
- source_word: בְּלִי תָקוּם
  chosen: cannot stand
  alternatives:
  - does not prevail
  - cannot rise
  - is of no effect
  lexicon: HALOT
  rationale: בלי + קום yields the sense that the weapon does not stand up/hold up
    against him, i.e., it cannot remain effective. 'Cannot stand' keeps the concrete
    Hebrew image while naturally conveying failure.
- source_word: חֲנִית
  chosen: spear
  alternatives:
  - lance
  lexicon: HALOT
  rationale: Standard rendering for a thrusting weapon. 'Spear' is the most accessible
    modern equivalent.
- source_word: מַסָּע
  chosen: dart
  alternatives:
  - missile
  - shaft
  - club
  lexicon: HALOT
  rationale: The noun is difficult and contextually denotes a weapon used against
    Leviathan. Many take it as a missile/shaft; 'dart' fits the sequence of weapons
    and preserves the likely sense of a hurled or projected weapon. Because the term
    is uncertain, alternatives are preserved in a footnote.
- source_word: וְשִׁרְיָה
  chosen: javelin
  alternatives:
  - coat of mail
  - armor
  lexicon: HALOT
  rationale: In this context, alongside sword, spear, and another weapon, a weapon
    sense is preferable over 'armor.' Many understand a pointed weapon such as javelin.
    The alternative traditional sense 'coat of mail/armor' is lexically possible and
    worth preserving in a footnote due to the term's rarity and uncertainty.
