id: JOB.41.6
reference: Job 41:6
source:
  edition: WLC
  text: דַּלְתֵ֣י פָ֭נָי/ו מִ֣י פִתֵּ֑חַ סְבִיב֖וֹת שִׁנָּ֣י/ו אֵימָֽה׃
translation:
  text: Who has opened the doors of his face? Around his teeth is terror.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Who can open the doors of his mouth?' The Hebrew reads literally, 'the
      doors of his face,' a poetic expression for the mouth or jaws.
    reason: lexical_alternative
  - marker: b
    text: Or 'Around his teeth is dread.'
    reason: lexical_alternative
lexical_decisions:
- source_word: דַּלְתֵי
  chosen: doors
  alternatives:
  - gates
  - jaws
  lexicon: HALOT
  rationale: Literal plural construct of 'door/leaf of a door.' In this vivid poetic
    description, 'doors' preserves the metaphor of the creature's mouth opening parts.
    'Jaws' is interpretive and therefore kept as an alternative rather than adopted
    in the main text.
- source_word: פָנָיו
  chosen: his face
  alternatives:
  - his mouth
  - his front
  lexicon: HALOT
  rationale: The noun normally means 'face' or 'surface/front.' In context it refers
    to the front of the creature, specifically the facial/mouth area. 'His face' best
    preserves the Hebrew image while allowing the following metaphor of 'doors' to
    imply the mouth.
- source_word: מִי
  chosen: Who
  lexicon: HALOT
  rationale: Standard interrogative pronoun introducing a rhetorical question.
- source_word: פִתֵּחַ
  chosen: has opened
  alternatives:
  - can open
  - opened wide
  lexicon: HALOT
  rationale: 'Verb from פתח, ''to open.'' The form functions in a rhetorical perfect:
    ''Who has opened...?'' English present perfect captures the force naturally. ''Can
    open'' is a contextual inference about ability, but the Hebrew states the action
    more directly.'
- source_word: סְבִיבוֹת
  chosen: around
  alternatives:
  - surrounding
  - all around
  lexicon: HALOT
  rationale: The noun/prepositional expression denotes what is around or surrounding.
    'Around' gives idiomatic English in the clause 'Around his teeth is terror.'
- source_word: שִׁנָּיו
  chosen: his teeth
  alternatives:
  - his fangs
  lexicon: HALOT
  rationale: Basic meaning is 'teeth.' 'Fangs' would heighten the image but goes beyond
    the lexical value.
- source_word: אֵימָה
  chosen: terror
  alternatives:
  - dread
  - fearsome terror
  lexicon: HALOT
  rationale: The noun denotes terror/dread. 'Terror' is concise and strong, fitting
    the climactic nominal clause.
