id: JOB.41.22
reference: Job 41:22
source:
  edition: WLC
  text: תַּ֭חְתָּי/ו חַדּ֣וּדֵי חָ֑רֶשׂ יִרְפַּ֖ד חָר֣וּץ עֲלֵי טִֽיט־׃
translation:
  text: Under him are sharp shards of pottery; he spreads a threshing sledge over
    the mud.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'potsherds' for 'shards of pottery.'
    reason: lexical_alternative
  - marker: b
    text: Or 'he makes the mud like a threshing sledge,' taking the line as a comparison
      rather than a direct object construction.
    reason: alternative_reading
lexical_decisions:
- source_word: תַּחְתָּיו
  chosen: Under him
  alternatives:
  - Beneath him
  - Underneath him
  lexicon: HALOT
  rationale: The preposition with 3ms suffix refers to what is beneath Leviathan.
    'Under him' is natural modern English and preserves the spatial sense.
- source_word: חַדּוּדֵי
  chosen: sharp
  alternatives:
  - pointed things
  - sharp points
  lexicon: HALOT
  rationale: Construct plural from a root meaning sharpness/point. In English the
    adjectival force is best carried by 'sharp' modifying the following noun.
- source_word: חָרֶשׂ
  chosen: shards of pottery
  alternatives:
  - potsherds
  - earthenware fragments
  lexicon: HALOT
  rationale: The noun denotes pottery/earthenware, often in broken pieces in context.
    'Shards of pottery' is more readable than the traditional 'potsherds' while preserving
    the image of jagged ceramic fragments.
- source_word: יִרְפַּד
  chosen: he spreads
  alternatives:
  - he makes a bed
  - he lays out
  lexicon: HALOT
  rationale: The verb means to spread out or make a bed/layer. Here it describes Leviathan's
    action on the mud; 'he spreads' is concise and fits the simile-like image.
- source_word: חָרוּץ
  chosen: a threshing sledge
  alternatives:
  - a sharp threshing instrument
  - a harrow
  lexicon: HALOT
  rationale: In this context the noun likely refers to a sharp agricultural threshing
    implement. 'Threshing sledge' is a clear, concrete rendering in modern English.
    'Harrow' is possible but less precise and may suggest a different implement to
    modern readers.
- source_word: עֲלֵי
  chosen: over
  alternatives:
  - upon
  - 'on'
  lexicon: HALOT
  rationale: The preposition marks position over/on the mud. 'Over' works idiomatically
    with 'spreads' in English.
- source_word: טִיט
  chosen: the mud
  alternatives:
  - mud
  - mire
  lexicon: HALOT
  rationale: The noun denotes mud/clay/mire. 'The mud' gives a vivid physical image
    and reads naturally in context.
