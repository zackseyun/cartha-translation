id: JOB.20.20
reference: Job 20:20
source:
  edition: WLC
  text: כִּ֤י לֹא יָדַ֣ע שָׁלֵ֣ו בְּ/בִטְנ֑/וֹ בַּ֝/חֲמוּד֗/וֹ לֹ֣א יְמַלֵּֽט׀־׃
translation:
  text: For he knew no quiet in his belly; with his desirable things he will not escape.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'For he knew no ease in his stomach; by what he delights in he will not
      save himself.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Because
  lexicon: HALOT
  rationale: Introduces the reason or explanation for the preceding judgment; 'For'
    fits the discourse flow in English.
- source_word: לֹא יָדַע
  chosen: he knew no
  alternatives:
  - he did not know
  - he has not known
  lexicon: HALOT
  rationale: Qal perfect 3ms of ידע with negation expresses a settled fact about the
    wicked man; 'knew no' is concise and idiomatic with the following noun.
- source_word: שָׁלֵו
  chosen: quiet
  alternatives:
  - ease
  - tranquility
  - contentment
  lexicon: HALOT
  rationale: The adjective/noun idea denotes ease or tranquility. 'Quiet' preserves
    the sense of inner rest while fitting the poetic line. 'Contentment' is possible
    but slightly more interpretive.
- source_word: בְּבִטְנוֹ
  chosen: in his belly
  alternatives:
  - in his stomach
  - within him
  lexicon: HALOT
  rationale: בטן literally means 'belly/womb/inner parts.' Here the imagery is visceral
    and tied to appetite in context, so the concrete 'belly' is preferable to the
    more interpretive 'within him.'
- source_word: בַּחֲמוּדוֹ
  chosen: with his desirable things
  alternatives:
  - with his treasures
  - with what he delights in
  - with his precious things
  lexicon: HALOT
  rationale: From חמד, referring to that which is desired or precious. The phrase
    likely points to the objects of his desire/wealth. 'Desirable things' stays close
    to the Hebrew while allowing the broader semantic range; 'treasures' is plausible
    but narrows the sense.
- source_word: לֹא יְמַלֵּט
  chosen: he will not escape
  alternatives:
  - he will not save himself
  - he will not get away
  lexicon: HALOT
  rationale: Piel of מלט commonly means to escape or deliver. In this context the
    sense is that he will not escape by means of his prized possessions. 'He will
    not escape' is natural and sufficiently broad.
