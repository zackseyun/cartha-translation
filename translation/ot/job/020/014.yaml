id: JOB.20.14
reference: Job 20:14
source:
  edition: WLC
  text: לַ֭חְמ/וֹ בְּ/מֵעָ֣י/ו נֶהְפָּ֑ךְ מְרוֹרַ֖ת פְּתָנִ֣ים בְּ/קִרְבּֽ/וֹ׃
translation:
  text: his food in his belly is turned; it is the venom of cobras within him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his bread in his inward parts is turned; it is the gall of asps within
      him.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לַחְמוֹ
  chosen: his food
  alternatives:
  - his bread
  lexicon: HALOT
  rationale: Though the noun often literally means 'bread,' in context it stands more
    broadly for what he has eaten. 'Food' communicates the sense naturally in English
    while preserving the concrete imagery of what is consumed.
- source_word: בְּמֵעָיו
  chosen: in his belly
  alternatives:
  - in his inward parts
  - in his bowels
  lexicon: HALOT
  rationale: The term refers to the internal organs/entrails. 'In his belly' is idiomatic
    modern English and fits the digestive imagery of the verse better than the more
    archaic 'bowels' or the vaguer 'inward parts'.
- source_word: נֶהְפָּךְ
  chosen: is turned
  alternatives:
  - is changed
  - is transformed
  - is overturned
  lexicon: HALOT
  rationale: The Niphal of הפך here conveys a change of state within him. 'Is turned'
    is concise and preserves the metaphor of food becoming something else.
- source_word: מְרוֹרַת
  chosen: the venom of
  alternatives:
  - the gall of
  - the bitterness of
  lexicon: HALOT
  rationale: Although the noun is related to 'bitterness/gall,' in this collocation
    with snakes it denotes poisonous bile/venom. 'Venom' best communicates the intended
    image to modern readers. 'Gall' is a traditional rendering and is preserved as
    an alternative.
- source_word: פְּתָנִים
  chosen: cobras
  alternatives:
  - asps
  - vipers
  lexicon: HALOT
  rationale: The Hebrew denotes a venomous snake, traditionally rendered 'asp.' 'Cobras'
    is a common modern equivalent for פתן and is more intelligible than 'asps' for
    contemporary readers, while retaining the specific serpent imagery.
- source_word: בְּקִרְבּוֹ
  chosen: within him
  alternatives:
  - in his midst
  - inside him
  lexicon: HALOT
  rationale: The phrase refers to what is inside the wicked man. 'Within him' is natural
    English and preserves the internalized, bodily force of the image.
