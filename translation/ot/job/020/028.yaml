theological_decisions:
- issue: Referent of 'his anger'
  chosen_reading: kept as 'his anger' without explicitly supplying 'God's' in the
    main text
  alternative_readings:
  - God's anger
  - the wicked man's anger
  rationale: The immediate context strongly suggests divine judgment, so many readers
    will understand the pronoun as referring to God. However, the Hebrew text itself
    leaves the referent implicit. To preserve the text's terseness and avoid importing
    an explicit subject not stated, the translation retains 'his anger' and explains
    the likely referent in a footnote.
  doctrine_reference: Preserve theological tension rather than resolve it.
