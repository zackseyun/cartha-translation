id: JOB.20.28
reference: Job 20:28
source:
  edition: WLC
  text: יִ֭גֶל יְב֣וּל בֵּית֑/וֹ נִ֝גָּר֗וֹת בְּ/י֣וֹם אַפּֽ/וֹ׃
translation:
  text: The produce of his house will be carried away, swept off in the day of his
    anger.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'will go into exile'; the verb can denote going away or being removed,
      here of the wealth or produce of the wicked man's house.
    reason: lexical_alternative
  - marker: b
    text: Likely referring to God's anger, though the Hebrew leaves the referent implicit.
    reason: alternative_reading
lexical_decisions:
- source_word: יִגֶל
  chosen: will be carried away
  alternatives:
  - will go into exile
  - will depart
  - will be removed
  lexicon: HALOT
  rationale: From גלה in the Qal imperfect 3ms. Though often used of going into exile
    or being uncovered, here with יְבוּל as subject it denotes removal/departure of
    property. 'Will be carried away' captures the passive-like result in idiomatic
    English without overstating a specific agent.
- source_word: יְבוּל
  chosen: produce
  alternatives:
  - increase
  - yield
  - harvest
  lexicon: HALOT
  rationale: Refers to produce/yield, especially what a house or land brings forth.
    'Produce' is natural modern English and fits the context of possessions being
    lost.
- source_word: בֵּיתוֹ
  chosen: of his house
  alternatives:
  - of his household
  - from his house
  lexicon: HALOT
  rationale: Literally 'his house.' In wisdom literature this can include household
    and estate. 'Of his house' preserves the Hebrew image while allowing the broader
    sense of all that belongs to his household.
- source_word: נִגָּרוֹת
  chosen: swept off
  alternatives:
  - poured out
  - washed away
  - driven away
  lexicon: HALOT
  rationale: Niphal participle feminine plural from נגר, conveying something flowing/pouring
    away. Used predicatively after the first clause, it pictures the house's produce
    as being swept away like runoff. 'Swept off' communicates the destructive motion
    in clear English.
- source_word: בְּיוֹם
  chosen: in the day of
  alternatives:
  - on the day of
  - when
  lexicon: HALOT
  rationale: Temporal phrase kept fairly literal. 'In the day of' preserves the Hebrew
    idiom and solemn tone.
- source_word: אַפּוֹ
  chosen: his anger
  alternatives:
  - his wrath
  - His anger
  lexicon: HALOT
  rationale: אַפּ often means anger/wrath. The suffix is third masculine singular.
    In context this most naturally refers to God’s anger, but the Hebrew does not
    explicitly name God here. Lowercase 'his anger' preserves the ambiguity while
    fitting the discourse about divine judgment.
