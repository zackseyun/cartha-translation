id: JOB.20.24
reference: Job 20:24
source:
  edition: WLC
  text: יִ֭בְרַח מִ/נֵּ֣שֶׁק בַּרְזֶ֑ל תַּ֝חְלְפֵ֗/הוּ קֶ֣שֶׁת נְחוּשָֽׁה׃
translation:
  text: He will flee from an iron weapon; a bronze bow will pierce him through.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'an iron weapon.' The Hebrew נשק can denote weaponry more broadly.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'a bow of bronze will pass through him.' The Hebrew verb may
      be rendered more formally as 'pass through him'; 'pierce him through' expresses
      the likely sense in context.
    reason: lexical_alternative
lexical_decisions:
- source_word: יִבְרַח
  chosen: he will flee
  alternatives:
  - he flees
  - he will run away
  lexicon: HALOT
  rationale: 'Qal imperfect 3ms of ברח denotes fleeing/escaping. In this poetic judgment
    context, the imperfect is best rendered with future sense: ''he will flee.'''
- source_word: מִנֵּשֶׁק
  chosen: from a weapon
  alternatives:
  - from arms
  - from a missile
  lexicon: HALOT
  rationale: נשק here refers broadly to weaponry rather than specifically armor. Singular
    'weapon' fits the construct with 'iron' and the immediate image of attempted escape
    from one deadly instrument.
- source_word: בַּרְזֶל
  chosen: iron
  lexicon: HALOT
  rationale: Standard rendering of the metal term; together with נשק it yields 'iron
    weapon.'
- source_word: תַּחְלְפֵהוּ
  chosen: will pierce him through
  alternatives:
  - will pass through him
  - will strike him
  - will replace him
  lexicon: HALOT
  rationale: From חלף, whose basic sense is 'pass on/through, pass by, change.' In
    this martial context with the bow as subject and the man as object, the sense
    is that the projectile from the bow passes through him. 'Pierce him through' makes
    the implied result explicit in natural English without over-paraphrasing. 'Replace
    him' is not contextually viable here.
- source_word: קֶשֶׁת
  chosen: bow
  lexicon: HALOT
  rationale: Standard rendering of the weapon term.
- source_word: נְחוּשָׁה
  chosen: bronze
  alternatives:
  - copper
  - brass
  lexicon: HALOT
  rationale: נחושה refers to bronze/copper alloy in biblical usage. 'Bronze' is the
    most idiomatic and historically appropriate English rendering in weapon imagery.
