id: JOB.20.16
reference: Job 20:16
source:
  edition: WLC
  text: רֹאשׁ פְּתָנִ֥ים יִינָ֑ק תַּֽ֝הַרְגֵ֗/הוּ לְשׁ֣וֹן אֶפְעֶֽה־׃
translation:
  text: He sucks the venom of cobras; the tongue of a viper kills him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'poison of cobras'; Hebrew 'head/poison of cobras,' with 'head' used
      idiomatically for venom in this context.
    reason: lexical_alternative
  - marker: b
    text: Traditionally, 'asps' instead of 'cobras.'
    reason: lexical_alternative
lexical_decisions:
- source_word: רֹאשׁ
  chosen: venom
  alternatives:
  - poison
  - gall
  - head
  lexicon: HALOT
  rationale: Although רֹאשׁ literally often means 'head,' in poetic and venom imagery
    it commonly denotes 'poison/venom.' Here, with 'of cobras' and the parallel line
    about a viper's tongue killing, the sense is clearly toxic venom rather than anatomical
    'head.' 'Venom' is more precise in English than the broader 'poison.'
- source_word: פְּתָנִים
  chosen: cobras
  alternatives:
  - asps
  - adders
  lexicon: HALOT
  rationale: פֶּתֶן refers to a venomous snake, traditionally rendered 'asp.' 'Cobra'
    is a clearer modern equivalent and fits the venom imagery well. 'Asp' is traditional
    but less transparent to contemporary readers; 'adder' is less specific.
- source_word: יִינָק
  chosen: sucks
  alternatives:
  - drinks in
  - nurses
  lexicon: HALOT
  rationale: The verb ינק literally means 'to suck/suckle.' In this context of ingesting
    snake venom, 'sucks' preserves the vividness and directness of the Hebrew better
    than the more interpretive 'drinks in.'
- source_word: תַּהַרְגֵהוּ
  chosen: kills him
  alternatives:
  - will kill him
  - slays him
  lexicon: HALOT
  rationale: The form expresses the action of the feminine singular subject ('tongue')
    upon 'him.' English present tense works naturally in poetic wisdom style to express
    certain consequence. 'Kills him' is idiomatic and direct; 'will kill him' is possible
    but slightly more interpretive regarding temporal force.
- source_word: לְשׁוֹן
  chosen: tongue
  alternatives:
  - fang
  - bite
  lexicon: HALOT
  rationale: The Hebrew literally says 'tongue.' While the image may imply the snake's
    lethal bite, the text itself uses 'tongue,' and the translation preserves that
    concrete poetic imagery rather than replacing it with an inferred mechanism like
    'fang.'
- source_word: אֶפְעֶה
  chosen: viper
  alternatives:
  - adder
  - asp
  lexicon: HALOT
  rationale: אֶפְעֶה denotes a venomous snake, commonly rendered 'viper.' This is
    a clear modern English equivalent and pairs well with 'cobras' in the first colon
    without forcing species-level precision beyond the Hebrew.
