id: JOB.20.11
reference: Job 20:11
source:
  edition: WLC
  text: עַ֭צְמוֹתָי/ו מָלְא֣וּ עלומ/ו וְ֝/עִמּ֗/וֹ עַל עָפָ֥ר תִּשְׁכָּֽב־׃
translation:
  text: His bones were full of his youthful vigor, but it will lie down with him in
    the dust.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'His bones were full of his youth'; the Hebrew term can denote youth
      itself or the strength associated with youth.
    reason: lexical_alternative
lexical_decisions:
- source_word: עַצְמוֹתָיו
  chosen: his bones
  alternatives:
  - his frame
  lexicon: HALOT
  rationale: The noun עֶצֶם commonly means 'bone'; the plural with 3ms suffix is straightforwardly
    'his bones.' 'Frame' is possible idiomatically, but 'bones' preserves the concrete
    Hebrew image.
- source_word: מָלְאוּ
  chosen: were full of
  alternatives:
  - were filled with
  - are full of
  lexicon: HALOT
  rationale: Qal perfect 3cp from מלא with plural subject 'bones' is best rendered
    'were full of.' The past fits the poetic description of the wicked man's former
    vitality.
- source_word: עֲלוּמָיו
  chosen: his youthful vigor
  alternatives:
  - his youth
  - his youthful strength
  lexicon: HALOT
  rationale: From עֲלוּמִים, referring to youth/youthful prime. In context the sense
    is not merely chronological age but the strength associated with youth, so 'youthful
    vigor' brings out the implied force.
- source_word: וְעִמּוֹ
  chosen: with him
  alternatives:
  - beside him
  lexicon: HALOT
  rationale: The preposition עִם with suffix normally means 'with him.' In this burial/death
    context it indicates accompaniment into the grave.
- source_word: עַל־עָפָר
  chosen: in the dust
  alternatives:
  - upon the dust
  - on the dust
  lexicon: HALOT
  rationale: Although עַל is formally 'upon/on,' English idiom in death-and-burial
    imagery prefers 'in the dust.' This reflects the sense naturally without obscuring
    the grave/dust motif.
- source_word: תִּשְׁכָּב
  chosen: it will lie down
  alternatives:
  - it lies down
  - she will lie down
  lexicon: HALOT
  rationale: 'Qal imperfect 3fs from שׁכב, with a feminine singular subject implied.
    The most likely antecedent is the abstract idea of youthful vigor/youthfulness,
    treated as a feminine or collective notion in poetic usage. English uses ''it''
    for the implicit subject. The imperfect is rendered futurally in the poetic context:
    what filled him in youth will end in the dust with him.'
