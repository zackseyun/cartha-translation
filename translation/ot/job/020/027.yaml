id: JOB.20.27
reference: Job 20:27
source:
  edition: WLC
  text: יְגַלּ֣וּ שָׁמַ֣יִם עֲוֺנ֑/וֹ וְ֝/אֶ֗רֶץ מִתְקוֹמָ֘מָ֥ה לֽ/וֹ׃
translation:
  text: The heavens will reveal his iniquity, and the earth will rise up against him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his guilt'; the Hebrew word can denote either moral wrongdoing or the
      guilt attached to it.
    reason: lexical_alternative
  - marker: b
    text: Or 'the land,' though 'the earth' better matches the parallel with 'the
      heavens' in this poetic context.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְגַלּוּ
  chosen: will reveal
  alternatives:
  - will uncover
  - will disclose
  lexicon: HALOT
  rationale: Piel imperfect 3mp of גלה here has the sense of making something known
    or exposed. 'Reveal' is natural modern English and preserves the forensic exposure
    implied by the context.
- source_word: שָׁמַיִם
  chosen: the heavens
  alternatives:
  - heaven
  - the sky
  lexicon: HALOT
  rationale: The plural Hebrew noun commonly functions as a singular collective, but
    'the heavens' best preserves the elevated poetic register of Job and the personified
    cosmic witness.
- source_word: עֲוֺנוֹ
  chosen: his iniquity
  alternatives:
  - his guilt
  - his wrongdoing
  - his sin
  lexicon: HALOT
  rationale: עָוֹן can denote iniquity, guilt, or punishment for guilt depending on
    context. Here the sense is the wicked man's moral perversity being exposed, so
    'iniquity' best fits the accusation/judgment setting while retaining the term's
    moral weight.
- source_word: וְאֶרֶץ
  chosen: and the earth
  alternatives:
  - and the land
  lexicon: HALOT
  rationale: אֶרֶץ can mean 'earth' or 'land.' In parallel with 'the heavens' and
    in this cosmic-personification context, 'the earth' is the more fitting rendering.
- source_word: מִתְקוֹמָמָה
  chosen: will rise up
  alternatives:
  - rises up
  - sets itself against
  - stands up
  lexicon: HALOT
  rationale: Hitpolel/Hithpael-related form from קום conveys rising up in opposition.
    'Will rise up' keeps the vivid personification, while the adversative force is
    completed by the following preposition.
- source_word: לוֹ
  chosen: against him
  alternatives:
  - to him
  - for him
  lexicon: HALOT
  rationale: Although ל normally means 'to/for,' with verbs of hostile rising it carries
    adversative force. 'Against him' expresses the idiomatic sense in English and
    matches the judicial hostility of the verse.
