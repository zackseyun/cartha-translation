id: JOB.20.19
reference: Job 20:19
source:
  edition: WLC
  text: כִּֽי רִ֭צַּץ עָזַ֣ב דַּלִּ֑ים בַּ֥יִת גָּ֝זַ֗ל וְ/לֹ֣א יִבֶנֵֽ/הוּ־׃
translation:
  text: For he has crushed and abandoned the poor; he has seized a house and will
    not build it up.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Because he crushed and forsook the poor; he stole a house and will not
      rebuild it.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Because
  lexicon: HALOT
  rationale: Introduces the reason for the judgment described in context. 'For' fits
    the explanatory force in English while remaining close to the Hebrew conjunction.
- source_word: רִצַּץ
  chosen: has crushed
  alternatives:
  - has oppressed
  - has broken
  lexicon: HALOT
  rationale: The verb רצץ commonly conveys crushing or breaking. 'Has crushed' preserves
    the violent, concrete force better than the more interpretive 'has oppressed.'
- source_word: עָזַב
  chosen: abandoned
  alternatives:
  - forsaken
  - left
  lexicon: HALOT
  rationale: '''Abandoned'' communicates culpable desertion of the poor in natural
    modern English. ''Forsaken'' is possible but more archaic in tone.'
- source_word: דַּלִּים
  chosen: the poor
  alternatives:
  - the weak
  - the needy
  lexicon: HALOT
  rationale: דל often denotes those who are poor, weak, or socially vulnerable. 'The
    poor' is the most straightforward and idiomatic rendering here.
- source_word: בַּיִת
  chosen: a house
  alternatives:
  - a household
  lexicon: HALOT
  rationale: The immediate collocation with 'seized' and 'will not build it up' points
    most naturally to a physical house/property, though 'household' is a possible
    broader sense.
- source_word: גָּזַל
  chosen: has seized
  alternatives:
  - has robbed
  - has stolen
  lexicon: HALOT
  rationale: גזל denotes taking by force or robbery. 'Has seized' fits the direct
    object 'a house' well and avoids implying only covert theft.
- source_word: וְלֹא יִבֶנֵהוּ
  chosen: and will not build it up
  alternatives:
  - and he will not rebuild it
  - and he will not establish it
  lexicon: HALOT
  rationale: 'The verb בנה means build/rebuild. With the pronominal suffix referring
    back to ''house,'' ''build it up'' preserves the Hebrew imagery and allows the
    line''s irony to stand: he takes a house but does not get to establish it.'
