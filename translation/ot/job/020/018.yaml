id: JOB.20.18
reference: Job 20:18
source:
  edition: WLC
  text: מֵשִׁ֣יב יָ֭גָע וְ/לֹ֣א יִבְלָ֑ע כְּ/חֵ֥יל תְּ֝מוּרָת֗/וֹ וְ/לֹ֣א יַעֲלֹֽס׃
translation:
  text: He gives back what he labored for and does not swallow it down; according
    to the wealth of his exchange, he does not rejoice.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'He restores his toil and does not consume it; as for the wealth gained
      by exchange, he does not exult.' The Hebrew of the second line is compact and
      admits several closely related renderings.
    reason: alternative_reading
lexical_decisions:
- source_word: מֵשִׁיב
  chosen: gives back
  alternatives:
  - restores
  - returns
  lexicon: HALOT
  rationale: Hiphil participle of שוב conveys causing something to return. 'Gives
    back' is idiomatic and fits the sense that the wicked must relinquish what he
    gained.
- source_word: יָגָע
  chosen: what he labored for
  alternatives:
  - toil
  - the fruit of his labor
  lexicon: HALOT
  rationale: The noun denotes toil/labor or what is gained by toil. In context with
    'gives back,' the object sense 'what he labored for' best captures the economic
    result of his effort.
- source_word: וְלֹא יִבְלָע
  chosen: and does not swallow it down
  alternatives:
  - and does not consume it
  - and does not enjoy it
  lexicon: HALOT
  rationale: בלע literally means 'swallow.' Retaining the concrete image preserves
    the vivid metaphor of not being able to consume or keep the gain. 'It' is supplied
    from context, referring back to the returned gain.
- source_word: כְּחֵיל
  chosen: according to the wealth
  alternatives:
  - as his wealth
  - in proportion to his wealth
  - like wealth
  lexicon: HALOT
  rationale: חֵיל here most naturally refers to wealth/substance rather than military
    force. The prefixed כ is difficult; 'according to' reflects a comparative/proportional
    sense in context.
- source_word: תְּמוּרָתוֹ
  chosen: of his exchange
  alternatives:
  - of his compensation
  - of his gain by trade
  - of what he acquired in exchange
  lexicon: HALOT
  rationale: תְּמוּרָה denotes exchange, recompense, or what is received in exchange.
    'Exchange' keeps the lexical core while allowing the line to refer to acquired
    wealth or compensation.
- source_word: וְלֹא יַעֲלֹס
  chosen: he does not rejoice
  alternatives:
  - he does not exult
  - he does not revel
  lexicon: HALOT
  rationale: עלס denotes exulting or rejoicing. 'Rejoice' is clear modern English;
    the negation underscores that he cannot delight in the wealth he acquired.
