id: JOB.20.25
reference: Job 20:25
source:
  edition: WLC
  text: שָׁלַף֮ וַ/יֵּצֵ֪א מִ/גֵּ֫וָ֥ה וּ֭/בָרָק מִֽ/מְּרֹרָת֥/וֹ יַהֲלֹ֗ךְ עָלָ֥י/ו
    אֵמִֽים׃
translation:
  text: He pulls it out, and it comes from his body; the flashing point comes from
    his gall; terrors come upon him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the gleaming blade comes from his gallbladder'; the Hebrew uses vivid
      bodily imagery and may refer to the flashing weapon point as it emerges.
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁלַף
  chosen: He pulls it out
  alternatives:
  - He draws it out
  - It is drawn out
  lexicon: HALOT
  rationale: The verb means to draw out or pull out, often of a weapon. Although the
    object is implicit, the context of a weapon lodged in the wicked man's body supports
    supplying 'it' in English for clarity.
- source_word: וַיֵּצֵא
  chosen: and it comes
  alternatives:
  - and it goes out
  - and it comes out
  lexicon: HALOT
  rationale: The verb is 'go/come out.' English idiom with the preceding verb favors
    'comes'/'comes out.' I chose 'comes' because the following phrase already specifies
    emergence from the body.
- source_word: מִגֵּוָה
  chosen: from his body
  alternatives:
  - from his back
  - from his torso
  lexicon: HALOT
  rationale: גֵּוָה refers to the body or torso. 'Body' is the clearest modern English
    rendering here and avoids over-specifying anatomy.
- source_word: וּבָרָק
  chosen: the flashing point
  alternatives:
  - and a flash
  - and lightning
  - the gleaming blade
  lexicon: HALOT
  rationale: בָּרָק literally denotes lightning or flashing brightness. In this context,
    parallel to a weapon being pulled from the body, it likely refers metonymically
    to the gleaming, flashing point or blade. 'The flashing point' preserves the vivid
    image while fitting the weapon context.
- source_word: מִמְּרֹרָתוֹ
  chosen: from his gall
  alternatives:
  - from his bitterness
  - from his gallbladder
  lexicon: HALOT
  rationale: The noun can denote gall/bile and by extension bitterness. In this bodily
    injury context, the anatomical sense is primary. 'Gall' is concise and preserves
    the visceral force without requiring the more clinical 'gallbladder.'
- source_word: יַהֲלֹךְ עָלָיו
  chosen: come upon him
  alternatives:
  - goes upon him
  - moves against him
  - falls on him
  lexicon: HALOT
  rationale: הלך with על can express something coming over or upon someone. 'Come
    upon him' is idiomatic English and suits the onset of dread.
- source_word: אֵמִים
  chosen: terrors
  alternatives:
  - dread
  - horrors
  lexicon: HALOT
  rationale: The plural noun denotes terrors or dreadful things. 'Terrors' best preserves
    the plural intensity and conventional sense.
