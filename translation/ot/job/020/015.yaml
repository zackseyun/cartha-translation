id: JOB.20.15
reference: Job 20:15
source:
  edition: WLC
  text: חַ֣יִל בָּ֭לַע וַ/יְקִאֶ֑/נּוּ מִ֝/בִּטְנ֗/וֹ יוֹרִשֶׁ֥/נּוּ אֵֽל׃
translation:
  text: He swallowed wealth, but he will vomit it up; God will drive it out of his
    belly.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'riches' for 'wealth' (חַיִל).
    reason: lexical_alternative
  - marker: b
    text: The Hebrew literally says 'belly,' preserving the image of swallowed gain
      being forcibly expelled.
    reason: lexical_alternative
lexical_decisions:
- source_word: חַיִל
  chosen: wealth
  alternatives:
  - riches
  - substance
  - possessions
  lexicon: HALOT
  rationale: In wisdom literature חַיִל can denote material wealth or resources, not
    merely 'strength' or 'army.' In this context of the wicked man's ill-gotten gain,
    'wealth' best fits the semantic field and reads naturally in modern English.
- source_word: בָּלַע
  chosen: swallowed
  alternatives:
  - devoured
  - gulped down
  lexicon: HALOT
  rationale: The verb literally means 'swallow' or 'devour.' 'Swallowed' preserves
    the concrete ingestion metaphor that is carried forward by the next verb 'vomit,'
    making the imagery coherent.
- source_word: וַיְקִאֶנּוּ
  chosen: but he will vomit it up
  alternatives:
  - and he vomited it up
  - and he will spit it out
  lexicon: HALOT
  rationale: 'The verb means ''vomit.'' Given the poetic sequence and English style,
    ''but he will vomit it up'' captures the adversative sense implied by the reversal:
    what he swallowed he cannot keep. The object suffix is represented by ''it.'''
- source_word: מִבִּטְנוֹ
  chosen: out of his belly
  alternatives:
  - from his stomach
  - from his inward parts
  lexicon: HALOT
  rationale: בֶּטֶן is literally 'belly' or 'womb.' Here it refers to the stomach/belly
    as the place where the swallowed wealth resides. 'Belly' preserves the vivid bodily
    imagery better than the more clinical 'stomach.'
- source_word: יוֹרִשֶׁנּוּ
  chosen: will drive it out
  alternatives:
  - will dispossess him of it
  - will make him disgorge it
  - will cast it out
  lexicon: HALOT
  rationale: The Hiphil of ירשׁ commonly means 'cause to possess/dispossess.' In this
    context, with the object being the swallowed wealth and parallel to 'vomit it
    up,' the sense is that God causes it to be expelled from him. 'Will drive it out'
    expresses that causative expulsion clearly in idiomatic English.
- source_word: אֵל
  chosen: God
  alternatives:
  - Mighty God
  - God Almighty
  lexicon: HALOT
  rationale: אֵל is the common singular term for God here, not the divine name YHWH.
    'God' is the straightforward and contextually appropriate rendering.
