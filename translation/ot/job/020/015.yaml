theological_decisions:
- issue: Agency of judgment in the expulsion of the wicked man's wealth
  chosen_reading: God is explicitly the subject who causes the wealth to be expelled.
  alternative_readings:
  - An impersonal consequence causes the loss
  - The subject is left vague as fate or circumstance
  rationale: The Hebrew explicitly names אֵל as subject of יוֹרִשֶׁנּוּ. The translation
    should preserve divine agency rather than soften it into mere consequence.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Preserve theological tension rather than resolve it'
