id: JOB.20.22
reference: Job 20:22
source:
  edition: WLC
  text: בִּ/מְלֹ֣אות שִׂ֭פְק/וֹ יֵ֣צֶר ל֑/וֹ כָּל יַ֖ד עָמֵ֣ל תְּבוֹאֶֽ/נּוּ־׃
translation:
  text: In the fullness of his abundance, distress will come upon him; every hand
    of the afflicted will come against him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'In the fullness of his sufficiency, he will be in distress.' The Hebrew
      is compact, and both the noun for prosperity ('sufficiency/abundance') and the
      verb for distress ('be in straits') admit slightly different English renderings.
    reason: lexical_alternative
  - marker: b
    text: '''Every hand of the afflicted'' may also be rendered ''every hand of the
      toiler'' or ''every hand of those in misery.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: בִּמְלֹאות
  chosen: In the fullness of
  alternatives:
  - When ... is full
  - At the height of
  lexicon: HALOT
  rationale: 'The preposition ב plus infinitive/nominal form from מלא conveys a temporal-circumstantial
    sense: ''in/when there is fullness.'' ''In the fullness of'' preserves the Hebrew
    imagery and timing without over-paraphrasing.'
- source_word: שִׂפְקוֹ
  chosen: his abundance
  alternatives:
  - his sufficiency
  - his plenty
  - his prosperity
  lexicon: HALOT
  rationale: The noun from ספק here denotes sufficiency or plenty. In context of the
    wicked man's prosperity, 'abundance' is idiomatic modern English and fits the
    parallel with impending calamity. 'Sufficiency' is more literal but less natural.
- source_word: יֵצֶר לוֹ
  chosen: distress will come upon him
  alternatives:
  - he will be in straits
  - it will be narrow for him
  - he will be distressed
  lexicon: HALOT
  rationale: From צרר/יצר in this form, the sense is constriction or distress befalling
    someone. Rendering the idiom as 'distress will come upon him' communicates the
    Hebrew idea clearly while preserving the future event directed toward him.
- source_word: כָּל
  chosen: every
  alternatives:
  - all
  lexicon: HALOT
  rationale: '''Every'' works naturally with the singular collective expression ''hand''
    and conveys distributive force.'
- source_word: יַד
  chosen: hand
  alternatives:
  - power
  - force
  lexicon: HALOT
  rationale: Hebrew 'hand' often metonymically denotes power or agency. Retaining
    'hand' preserves the vivid idiom, while the following phrase 'come against him'
    makes the hostile agency clear.
- source_word: עָמֵל
  chosen: the afflicted
  alternatives:
  - the laborer
  - the toiler
  - the miserable
  - the troublemaker
  lexicon: HALOT
  rationale: Although עמל can denote labor/toil, in wisdom literature it often carries
    the sense of one suffering misery or hardship. Here, in context of hostile hands
    coming upon the wicked, 'the afflicted' best captures those oppressed or embittered
    by hardship. This avoids the less likely sense 'wrongdoer' and is more contextually
    coherent than simply 'laborer'.
- source_word: תְּבוֹאֶנּוּ
  chosen: will come against him
  alternatives:
  - will come upon him
  - will overtake him
  lexicon: HALOT
  rationale: The verb בוא with pronominal object means 'come upon/to him.' Given the
    hostile context, 'against him' makes explicit the adversative force implied by
    'every hand' without departing far from the Hebrew.
