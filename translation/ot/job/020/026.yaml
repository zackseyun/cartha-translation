id: JOB.20.26
reference: Job 20:26
source:
  edition: WLC
  text: כָּל חֹשֶׁךְ֮ טָמ֪וּן לִ/צְפּ֫וּנָ֥י/ו תְּ֭אָכְלֵ/הוּ אֵ֣שׁ לֹֽא נֻפָּ֑ח יֵ֖רַע
    שָׂרִ֣יד בְּ/אָהֳלֽ/וֹ־־׃
translation:
  text: All darkness is hidden up for his treasures; a fire not blown will consume
    him; it will feed on what remains in his tent.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'All darkness is stored up for him'; the Hebrew phrase involving 'his
      hidden things/treasures' is difficult and may refer either to calamity reserved
      for him or to what is hidden among his stores.
    reason: alternative_reading
  - marker: b
    text: '''A fire not blown'' may mean a fire not kindled or fanned by human breath,
      implying a divinely sent or otherwise inextinguishable fire.'
    reason: lexical_alternative
  - marker: c
    text: Or 'it will harm the survivor in his tent' / 'it will consume the remnant
      in his tent.'
    reason: alternative_reading
lexical_decisions:
- source_word: כָּל
  chosen: All
  alternatives:
  - Every
  lexicon: HALOT
  rationale: Quantifier governing חֹשֶׁךְ; 'all' is the most natural English rendering
    here.
- source_word: חֹשֶׁךְ
  chosen: darkness
  alternatives:
  - gloom
  lexicon: HALOT
  rationale: Retains the concrete/metaphorical force of the Hebrew; in context it
    likely denotes calamity/judgment, but 'darkness' preserves the imagery.
- source_word: טָמוּן
  chosen: is hidden up
  alternatives:
  - is stored up
  - is concealed
  lexicon: HALOT
  rationale: Passive participial sense of something concealed or reserved. 'Hidden
    up' preserves both concealment and reservation for future judgment.
- source_word: לִצְפּוּנָיו
  chosen: for his treasures
  alternatives:
  - for his hidden things
  - for his secret stores
  - in reserve for him
  lexicon: HALOT
  rationale: From צפן in a nominalized/plural form with 3ms suffix. The phrase is
    difficult; it can denote hidden stores or treasures. 'For his treasures' reflects
    the likely sense of what is laid up/reserved for him, while preserving the wordplay
    with hiddenness.
- source_word: תְּאָכְלֵהוּ
  chosen: will consume him
  alternatives:
  - will devour him
  - will eat him up
  lexicon: HALOT
  rationale: Subject is אֵשׁ, feminine singular. 'Consume' is idiomatic in English
    for destructive fire while preserving the verb's force.
- source_word: אֵשׁ
  chosen: a fire
  alternatives:
  - fire
  lexicon: HALOT
  rationale: Indefinite in Hebrew context; 'a fire' works naturally in English and
    introduces the agent of destruction.
- source_word: לֹא נֻפָּח
  chosen: not blown
  alternatives:
  - unfanned
  - not kindled by human breath
  lexicon: HALOT
  rationale: The passive participle from נפח refers to blowing/fanning a fire. 'Not
    blown' is concise and preserves the image of a fire needing no human kindling,
    often implying divine or uncanny judgment.
- source_word: יֵרַע
  chosen: it will feed on
  alternatives:
  - it will harm
  - it will consume
  - it will afflict
  lexicon: HALOT
  rationale: Though the root often means 'be evil/do harm,' in this context with fire
    and the object שָׂרִיד, the sense is destructive action upon what remains. 'Feed
    on' captures the fire imagery and parallelism with 'consume.'
- source_word: שָׂרִיד
  chosen: what remains
  alternatives:
  - the survivor
  - the remnant
  lexicon: HALOT
  rationale: Can denote a survivor or remnant. Because the phrase is located 'in his
    tent,' an impersonal rendering fits the likely reference to whatever is left of
    his household/property, while avoiding over-specification.
- source_word: בְּאָהֳלוֹ
  chosen: in his tent
  alternatives:
  - in his dwelling
  lexicon: HALOT
  rationale: '''Tent'' is the literal and vivid image in Job, often representing one''s
    household or dwelling. The literal rendering preserves the poetic setting.'
