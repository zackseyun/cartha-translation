id: JOB.20.1
reference: Job 20:1
source:
  edition: WLC
  text: וַ֭/יַּעַן צֹפַ֥ר הַ/נַּֽעֲמָתִ֗י וַ/יֹּאמַֽר׃
translation:
  text: 'Then Zophar the Naamathite answered and said:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "And Zophar the Naamathite answered and said."
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַן
  chosen: answered
  alternatives:
  - responded
  lexicon: HALOT
  rationale: The verb ענה in this narrative formula commonly means 'answer' or 'respond.'
    'Answered' preserves the conventional dialog formula and fits the immediate context
    of Zophar replying to the preceding speech.
- source_word: צֹפַר
  chosen: Zophar
  rationale: Personal names are transliterated by standard convention per project
    philosophy.
- source_word: הַנַּעֲמָתִי
  chosen: the Naamathite
  alternatives:
  - the Naamahite
  lexicon: HALOT
  rationale: The gentilic with article identifies Zophar by place origin or clan association.
    'Naamathite' is the standard English transliteration of the gentilic and reads
    naturally as an epithet.
- source_word: וַיֹּאמַר
  chosen: said
  alternatives:
  - spoke
  lexicon: HALOT
  rationale: אמר is the standard verb 'say.' In the common Hebrew doublet 'answered
    and said,' retaining 'said' reflects the source text without unnecessary paraphrase.
- source_word: וַ
  chosen: Then
  alternatives:
  - And
  rationale: The prefixed waw on the opening verb advances the narrative. 'Then' gives
    natural modern English while preserving sequential force better than a mechanically
    repeated 'And'.
