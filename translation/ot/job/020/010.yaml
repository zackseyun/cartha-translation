id: JOB.20.10
reference: Job 20:10
source:
  edition: WLC
  text: בָּ֭נָי/ו יְרַצּ֣וּ דַלִּ֑ים וְ֝/יָדָ֗י/ו תָּשֵׁ֥בְנָה אוֹנֽ/וֹ׃
translation:
  text: His sons will seek the favor of the poor, and his own hands will give back
    his wealth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'His sons will appease the poor'; the Hebrew verb can carry the sense
      of seeking favor or placating those who were wronged.
    reason: lexical_alternative
  - marker: b
    text: Or 'his hands will restore his substance' or 'his vigor'; the Hebrew noun
      can refer to wealth, possessions, or strength, though 'wealth' best fits the
      context here.
    reason: lexical_alternative
lexical_decisions:
- source_word: בָּנָיו
  chosen: his sons
  alternatives:
  - his children
  lexicon: HALOT
  rationale: The Hebrew noun is grammatically masculine plural with a 3ms suffix.
    Per the translation philosophy, gender-accurate rendering is preferred; 'sons'
    matches the source more closely than the gender-neutral 'children'.
- source_word: יְרַצּוּ
  chosen: will seek the favor of
  alternatives:
  - will appease
  - will entreat
  - will make amends to
  lexicon: HALOT
  rationale: Piel of רצה here most naturally carries the sense of seeking acceptance
    or favor. In context, the idea is that the wicked man's sons must placate the
    poor whom he has wronged. 'Seek the favor of' captures this idiom better than
    a wooden 'please' while preserving the relational sense.
- source_word: דַלִּים
  chosen: the poor
  alternatives:
  - the weak
  - the needy
  lexicon: HALOT
  rationale: דלים commonly denotes the poor or socially weak. 'The poor' is the most
    direct and idiomatic rendering in this context.
- source_word: יָדָיו
  chosen: his own hands
  alternatives:
  - his hands
  lexicon: HALOT
  rationale: The plural 'hands' is literal. Adding 'own' brings out the emphatic force
    of the subject in English and clarifies that the repayment comes from him personally,
    not merely through his sons.
- source_word: תָּשֵׁבְנָה
  chosen: will give back
  alternatives:
  - will restore
  - will return
  lexicon: HALOT
  rationale: Hiphil of שוב means to cause to return, hence 'give back' or 'restore.'
    'Give back' is natural modern English and fits the restitution context.
- source_word: אוֹנוֹ
  chosen: his wealth
  alternatives:
  - his substance
  - his ill-gotten gain
  - his vigor
  lexicon: HALOT
  rationale: אוֹן can denote wealth, substance, or strength. In this context of restitution
    to the poor, 'wealth' best fits the likely material sense. Because the term can
    also carry the nuance of possessions or resources, alternatives are preserved
    in a footnote.
