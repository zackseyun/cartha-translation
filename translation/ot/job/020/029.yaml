theological_decisions:
- issue: Rendering of אָדָם in a generic singular construction
  chosen_reading: a wicked man
  alternative_readings:
  - a wicked person
  rationale: The Hebrew is grammatically masculine singular with representative force.
    Following the doctrine's gender-accurate principle, the translation keeps 'man'
    rather than neutralizing it, while understanding it generically.
  doctrine_reference: DOCTRINE.md § Translation philosophy 4
- issue: Interpretation of אִמְרוֹ
  chosen_reading: decreed for him
  alternative_readings:
  - his word
  - his speech
  rationale: A strictly formal rendering ('his word') is possible but obscure in English
    and less coherent in the parallelism. The context is the wicked man's allotted
    destiny from God, so a declarative/judicial sense is preferred. Because the lexical
    ambiguity is significant, the more literal alternative is preserved in a footnote.
  doctrine_reference: DOCTRINE.md § Translation philosophy 3, 6
