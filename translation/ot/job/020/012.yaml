id: JOB.20.12
reference: Job 20:12
source:
  edition: WLC
  text: אִם תַּמְתִּ֣יק בְּ/פִ֣י/ו רָעָ֑ה יַ֝כְחִידֶ֗/נָּה תַּ֣חַת לְשׁוֹנֽ/וֹ־׃
translation:
  text: Though evil is sweet in his mouth, he hides it under his tongue,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “If evil is sweet in his mouth.” The Hebrew particle can be read conditionally
      ('if') or concessively ('though'); the context favors a concessive sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  chosen: Though
  alternatives:
  - If
  lexicon: HALOT
  rationale: Here אִם introduces a concessive clause rather than a simple condition
    in context (continuing Zophar's description of the wicked man's delight in evil).
    'Though' communicates the sense naturally in English while remaining close to
    the Hebrew.
- source_word: תַּמְתִּיק
  chosen: is sweet
  alternatives:
  - he makes sweet
  - tastes sweet
  lexicon: HALOT
  rationale: The Hiphil of מתק can mean 'make sweet' or, idiomatically with an abstract
    subject, 'be sweet/pleasant.' Because רָעָה is the grammatical subject ('evil')
    and English prefers a stative expression here, 'is sweet' best captures the sense
    without over-literal awkwardness.
- source_word: בְּפִיו
  chosen: in his mouth
  alternatives:
  - in his palate
  - in his taste
  lexicon: HALOT
  rationale: פֶּה literally means 'mouth.' Although it can overlap with taste/speech
    imagery, 'in his mouth' preserves the concrete metaphor that is developed by the
    parallel phrase 'under his tongue.'
- source_word: רָעָה
  chosen: evil
  alternatives:
  - wickedness
  - harm
  lexicon: HALOT
  rationale: In this wisdom context the noun refers to moral evil/wickedness as something
    savored by the wicked person. 'Evil' is the broadest and most natural rendering.
- source_word: יַכְחִידֶנָּה
  chosen: he hides it
  alternatives:
  - he conceals it
  - he keeps it hidden
  lexicon: HALOT
  rationale: The verb כחד in Hiphil carries the sense of concealment or hiding. The
    3fs suffix refers back to רָעָה ('evil'), rendered with English 'it.' 'He hides
    it' is concise and idiomatic.
- source_word: תַּחַת
  chosen: under
  alternatives:
  - beneath
  lexicon: HALOT
  rationale: The preposition is spatial here within the mouth/tongue metaphor. 'Under'
    is the plain equivalent.
- source_word: לְשׁוֹנוֹ
  chosen: his tongue
  lexicon: HALOT
  rationale: Literal rendering preserves the vivid image of secretly savoring or retaining
    evil.
