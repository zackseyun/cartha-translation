id: JOB.20.21
reference: Job 20:21
source:
  edition: WLC
  text: אֵין שָׂרִ֥יד לְ/אָכְל֑/וֹ עַל כֵּ֝֗ן לֹא יָחִ֥יל טוּבֽ/וֹ־־־׃
translation:
  text: Nothing escaped his devouring; therefore his prosperity will not endure.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'There was no survivor for his eating,' that is, nothing
      remained from what he consumed.
    reason: lexical_alternative
  - marker: b
    text: The verb rendered 'will endure' is difficult; alternatives include 'will
      last' or, less likely here, 'will prosper.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵין
  chosen: Nothing
  alternatives:
  - There is no
  lexicon: HALOT
  rationale: Existential negation introducing the clause. In English, 'Nothing' gives
    a natural rendering when paired with the following noun and infinitive construction.
- source_word: שָׂרִיד
  chosen: escaped
  alternatives:
  - survivor
  - remnant
  - one left
  lexicon: HALOT
  rationale: Literally 'survivor/remnant.' In context with לְאָכְלוֹ ('for his eating/devouring'),
    the sense is that nothing remained or escaped from what he consumed. Rendering
    verbally as 'escaped' communicates the idiomatic force in natural English while
    preserving the image of total consumption.
- source_word: לְאָכְלוֹ
  chosen: his devouring
  alternatives:
  - for his eating
  - for him to eat
  - from his food
  lexicon: HALOT
  rationale: From אכל, 'to eat.' The prefixed ל plus infinitive construct with suffix
    likely means 'for his eating' or 'to his devouring,' describing the wicked man's
    consuming greed. 'His devouring' best fits the hostile, excessive sense in context.
- source_word: עַל כֵּן
  chosen: therefore
  alternatives:
  - for this reason
  - so
  lexicon: HALOT
  rationale: Standard inferential expression marking consequence from the previous
    clause.
- source_word: לֹא
  chosen: not
  lexicon: HALOT
  rationale: Simple negation of the following verb.
- source_word: יָחִיל
  chosen: will endure
  alternatives:
  - will last
  - will prosper
  - will writhe
  lexicon: HALOT
  rationale: The verb is difficult and has been understood in context as 'endure/last/prosper.'
    Given the object 'his prosperity,' the sense is that his good fortune will not
    continue. 'Will endure' preserves the temporal idea without overinterpreting.
    An alternative tradition connects the verb with trembling/writhing, but that fits
    this context less well.
- source_word: טוּבוֹ
  chosen: his prosperity
  alternatives:
  - his good things
  - his wealth
  - his well-being
  lexicon: HALOT
  rationale: Though literally 'his good(ness)/good thing,' in this judgment context
    it refers to the wicked man's goods or prosperity. 'His prosperity' is idiomatic
    and fits the consequence stated.
