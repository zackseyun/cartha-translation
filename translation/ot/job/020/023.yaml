theological_decisions:
- issue: Implied subject of the verbs of judgment
  chosen_reading: The subject is God, expressed with masculine singular pronouns ('he
    will send ... and rain').
  alternative_readings:
  - An impersonal subject could be inferred from context
  - The verse could be rendered more passively to avoid specifying the subject
  rationale: The immediate context in Job 20 describes divine retribution, and the
    possessive in 'his anger' most naturally refers to God. Making the subject explicit
    in English avoids obscurity without importing a foreign theological claim.
  doctrine_reference: Translation philosophy §1, §3
