id: JOB.20.23
reference: Job 20:23
source:
  edition: WLC
  text: יְהִ֤י לְ/מַלֵּ֬א בִטְנ֗/וֹ יְֽשַׁלַּח בּ֭/וֹ חֲר֣וֹן אַפּ֑/וֹ וְ/יַמְטֵ֥ר
    עָ֝לֵ֗י/מוֹ בִּ/לְחוּמֽ/וֹ׀־׃
translation:
  text: When he is about to fill his belly, he will send against him the burning of
    his anger, and rain it upon him while he is eating.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and rain it upon him as his food.' The final phrase is difficult; the
      Hebrew may connect the raining judgment more directly with his food rather than
      with the time of eating.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהִי
  chosen: When he is about to
  alternatives:
  - May it be
  - It will be
  - Let it be
  lexicon: HALOT
  rationale: 'The jussive/imperfect of היה here introduces a temporal circumstance
    rather than a simple wish in English. Rendering it with ''When he is about to''
    captures the idiomatic force in context: the judgment falls at the moment the
    wicked is ready to satisfy himself.'
- source_word: לְמַלֵּא
  chosen: to fill
  alternatives:
  - for filling
  - to satisfy
  lexicon: HALOT
  rationale: The infinitive construct of מלא means 'to fill.' 'To satisfy' is interpretive;
    'to fill' preserves the concrete imagery of appetite and abundance.
- source_word: בִטְנוֹ
  chosen: his belly
  alternatives:
  - his stomach
  - his appetite
  lexicon: HALOT
  rationale: בטן literally denotes the belly/womb/interior. In this context of eating
    and greed, 'belly' preserves the vivid bodily image better than the more clinical
    'stomach' or the abstract 'appetite.'
- source_word: יְשַׁלַּח
  chosen: he will send
  alternatives:
  - he sends
  - he will unleash
  lexicon: HALOT
  rationale: The subject is best understood as God from context, continuing the description
    of divine judgment. 'Send' is the direct lexical sense of שלח; 'unleash' is possible
    but more interpretive.
- source_word: בּוֹ
  chosen: against him
  alternatives:
  - into him
  - on him
  lexicon: HALOT
  rationale: The preposition ב can mark hostile direction in context. Since the object
    is divine wrath directed at the wicked, 'against him' communicates the force naturally
    in English.
- source_word: חֲרוֹן אַפּוֹ
  chosen: the burning of his anger
  alternatives:
  - his burning anger
  - the fierceness of his anger
  - the heat of his anger
  lexicon: HALOT
  rationale: The construct phrase literally refers to the burning/heat of his anger.
    'The burning of his anger' preserves the metaphor and the formal structure, while
    remaining readable.
- source_word: וְיַמְטֵר
  chosen: and rain
  alternatives:
  - and make rain
  - and shower
  lexicon: HALOT
  rationale: The Hiphil of מטר means 'cause to rain' or 'rain down.' 'Rain' in English
    can take a direct object idiomatically ('rain it upon him') and preserves the
    storm-of-judgment imagery.
- source_word: עָלֵימוֹ
  chosen: upon him
  alternatives:
  - upon them
  - on him
  lexicon: HALOT
  rationale: Though the form can look plural in poetry, in context it refers to the
    singular wicked man described throughout the verse sequence. 'Upon him' maintains
    coherence with the singular pronouns.
- source_word: בִּלְחוּמוֹ
  chosen: while he is eating
  alternatives:
  - as his food
  - into his flesh
  - with his bread
  lexicon: HALOT
  rationale: The noun לחום is difficult and has been variously understood. In context
    and by common interpretation, it relates to eating/food. 'While he is eating'
    best fits the temporal sense of judgment striking in the act of consumption, though
    an alternative involving 'as his food' is worth preserving in a footnote.
