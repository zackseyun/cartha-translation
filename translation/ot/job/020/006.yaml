id: JOB.20.6
reference: Job 20:6
source:
  edition: WLC
  text: אִם יַעֲלֶ֣ה לַ/שָּׁמַ֣יִם שִׂיא֑/וֹ וְ֝/רֹאשׁ֗/וֹ לָ/עָ֥ב יַגִּֽיעַ־׃
translation:
  text: Though his height rises to the heavens, and his head reaches to the clouds,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'If his height rises to the heavens.' The Hebrew אִם can be read as a
      simple conditional ('if') or, in context, concessively ('though').
    reason: lexical_alternative
  - marker: b
    text: '''His height'' may also be understood as ''his exaltation'' or ''his loftiness,''
      extending the image from physical height to status or pride.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  chosen: Though
  alternatives:
  - If
  lexicon: HALOT
  rationale: In this poetic context introducing a concessive scenario, אִם is best
    rendered concessively as 'Though' rather than a simple conditional 'If,' which
    better fits the sense of Zophar's statement about the wicked man's exaltation.
- source_word: יַעֲלֶה
  chosen: rises
  alternatives:
  - goes up
  - ascends
  lexicon: HALOT
  rationale: The Qal imperfect of עלה denotes upward movement. 'Rises' is idiomatic
    modern English and fits the poetic parallelism without sounding overly literal.
- source_word: לַשָּׁמַיִם
  chosen: to the heavens
  alternatives:
  - to heaven
  - to the skies
  lexicon: HALOT
  rationale: The plural שָׁמַיִם is naturally rendered 'the heavens' in elevated poetic
    diction. This preserves the Hebrew form and the grandeur of the image.
- source_word: שִׂיאוֹ
  chosen: his height
  alternatives:
  - his exaltation
  - his loftiness
  - his peak
  lexicon: HALOT
  rationale: The noun refers to elevation or exalted height. 'His height' best matches
    the vertical imagery of the verse and avoids over-interpreting it as purely social
    or moral exaltation, though that connotation may be present.
- source_word: וְרֹאשׁוֹ
  chosen: and his head
  alternatives:
  - and his top
  - and his summit
  lexicon: HALOT
  rationale: '''Head'' is the straightforward lexical sense and works naturally in
    the metaphor of towering stature.'
- source_word: לָעָב
  chosen: to the clouds
  alternatives:
  - to the cloud-mass
  - to the thick clouds
  lexicon: HALOT
  rationale: עָב denotes cloud or thick cloud. The plural 'the clouds' is more natural
    in English poetic style and matches the parallel with 'the heavens.'
- source_word: יַגִּיעַ
  chosen: reaches
  alternatives:
  - attains
  - touches
  lexicon: HALOT
  rationale: The Hiphil of נגע here conveys reaching as far as something. 'Reaches'
    is clear, idiomatic, and preserves the spatial metaphor.
