id: JOB.20.9
reference: Job 20:9
source:
  edition: WLC
  text: עַ֣יִן שְׁ֭זָפַתּ/וּ וְ/לֹ֣א תוֹסִ֑יף וְ/לֹא ע֝֗וֹד תְּשׁוּרֶ֥/נּוּ מְקוֹמֽ/וֹ־׃
translation:
  text: The eye that saw him will not see him again, and his place will no longer
    behold him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'The eye that gazed on him will not do so again.' The Hebrew uses the
      singular 'eye' poetically and personifies 'his place' in the second line.
    reason: lexical_alternative
lexical_decisions:
- source_word: עַיִן
  chosen: The eye
  alternatives:
  - An eye
  - The eye of one who saw
  lexicon: HALOT
  rationale: Literally 'eye'; singular collective usage is natural in Hebrew poetry.
    'The eye' preserves the vivid personification better than smoothing to 'no one.'
- source_word: שְׁזָפַתּוּ
  chosen: that saw him
  alternatives:
  - that gazed on him
  - that looked at him
  lexicon: HALOT
  rationale: The verb denotes seeing or gazing upon. 'Saw him' is the most natural
    English rendering here and fits the parallel with the following clause about no
    longer seeing him.
- source_word: וְלֹא תוֹסִיף
  chosen: will not see him again
  alternatives:
  - will not continue
  - will not add to see
  lexicon: HALOT
  rationale: The idiom with יסף plus negation means 'will not again' or 'will no longer.'
    In English, the object 'him' is naturally carried over from the previous clause
    to make the sense explicit.
- source_word: וְלֹא עוֹד
  chosen: will no longer
  alternatives:
  - and not again
  - and no more
  lexicon: HALOT
  rationale: This adverbial phrase reinforces cessation. 'No longer' is idiomatic
    modern English and matches the poetic parallelism.
- source_word: תְּשׁוּרֶנּוּ
  chosen: behold him
  alternatives:
  - see him
  - look upon him
  lexicon: HALOT
  rationale: From שׁור, 'to look at, behold.' 'Behold him' preserves a slightly elevated
    poetic tone and avoids flattening both cola into identical English verbs.
- source_word: מְקוֹמוֹ
  chosen: his place
  alternatives:
  - his dwelling place
  - the place where he was
  lexicon: HALOT
  rationale: Literally 'his place.' In context it is personified as no longer seeing
    him, expressing his complete disappearance from his former setting.
