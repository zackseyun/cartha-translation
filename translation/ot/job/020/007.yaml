id: JOB.20.7
reference: Job 20:7
source:
  edition: WLC
  text: כְּֽ֭/גֶלֲל/וֹ לָ/נֶ֣צַח יֹאבֵ֑ד רֹ֝אָ֗י/ו יֹאמְר֥וּ אַיּֽ/וֹ׃
translation:
  text: Like his own dung, he will perish forever; those who saw him will say, ‘Where
    is he?’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Like his own refuse' or 'Like his own excrement, he will perish forever.'
      The Hebrew uses a deliberately humiliating image.
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּגֶלֲלוֹ
  chosen: Like his own dung
  alternatives:
  - Like his own refuse
  - Like his own excrement
  lexicon: HALOT
  rationale: The noun גֶּלֶל can denote dung/excrement. 'Dung' is the most direct
    and idiomatic English rendering here, preserving the verse's deliberately degrading
    comparison. The suffix makes it 'his dung' or 'his own dung'; 'his own' brings
    out the possessive force naturally in English.
- source_word: לָנֶצַח
  chosen: forever
  alternatives:
  - for eternity
  - permanently
  lexicon: HALOT
  rationale: נֶצַח commonly conveys enduring duration. In this poetic judgment context,
    'forever' is the most natural English equivalent and preserves the force of total,
    lasting disappearance.
- source_word: יֹאבֵד
  chosen: he will perish
  alternatives:
  - he will vanish
  - he will be destroyed
  lexicon: HALOT
  rationale: From אבד, 'perish' fits both the lexical sense and the poetic register.
    'Vanish' is possible in context, but 'perish' better preserves the verb's stronger
    sense of ruin/destruction.
- source_word: רֹאָיו
  chosen: those who saw him
  alternatives:
  - his observers
  - those who have seen him
  - his onlookers
  lexicon: HALOT
  rationale: The participial form with suffix literally means 'his seers/those seeing
    him.' In idiomatic English, 'those who saw him' best conveys the reference to
    people familiar with him from before his downfall.
- source_word: יֹאמְרוּ
  chosen: will say
  alternatives:
  - will ask
  - will declare
  lexicon: HALOT
  rationale: The verb אמר straightforwardly means 'say.' Because the following אַיּוֹ
    is a question, English naturally understands this as speech in the form of a question
    without needing to change the verb itself.
- source_word: אַיּוֹ
  chosen: Where is he?
  alternatives:
  - Where is he now?
  - Where has he gone?
  lexicon: HALOT
  rationale: 'אַיֵּה/אַי is an interrogative of location, here with pronominal suffix:
    ''where is he?'' Adding ''now'' would be interpretive; the simple form best matches
    the Hebrew.'
