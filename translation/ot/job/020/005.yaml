id: JOB.20.5
reference: Job 20:5
source:
  edition: WLC
  text: כִּ֤י רִנְנַ֣ת רְ֭שָׁעִים מִ/קָּר֑וֹב וְ/שִׂמְחַ֖ת חָנֵ֣ף עֲדֵי רָֽגַע־׃
translation:
  text: For the rejoicing of the wicked is brief, and the joy of the godless lasts
    only a moment.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the joy of the hypocrite lasts only a moment.' The Hebrew חָנֵף can
      mean 'hypocrite,' but here 'godless' better reflects the broader sense of an
      irreligious person in Job.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Surely
  - That
  lexicon: HALOT
  rationale: Introduces the ground or explanation for the preceding statement. 'For'
    best preserves the causal/explanatory force in natural English.
- source_word: רִנְנַת
  chosen: rejoicing
  alternatives:
  - shout of joy
  - ringing cry
  - jubilation
  lexicon: HALOT
  rationale: The noun denotes a cry or expression of joy. 'Rejoicing' captures the
    sense idiomatically in English without over-literalizing the vocal nuance.
- source_word: רְשָׁעִים
  chosen: the wicked
  alternatives:
  - wicked people
  - evildoers
  lexicon: HALOT
  rationale: A standard rendering for the plural adjective/noun referring to morally
    guilty persons. 'The wicked' is concise and natural in wisdom literature.
- source_word: מִקָּרוֹב
  chosen: is brief
  alternatives:
  - is near at hand
  - is short-lived
  - is from nearby
  lexicon: HALOT
  rationale: In context the phrase is idiomatic, expressing brevity or nearness of
    end rather than spatial proximity. 'Is brief' communicates the temporal sense
    clearly in English.
- source_word: וְשִׂמְחַת
  chosen: and the joy of
  alternatives:
  - and the gladness of
  lexicon: HALOT
  rationale: A straightforward rendering of the construct phrase, paired with the
    previous colon for poetic parallelism.
- source_word: חָנֵף
  chosen: the godless
  alternatives:
  - the hypocrite
  - the profane
  - the impious
  lexicon: HALOT
  rationale: Though often rendered 'hypocrite' in older translations, in Job the term
    commonly carries the broader sense of irreligious or godless person rather than
    merely one who pretends piety. 'The godless' best fits the semantic range and
    parallelism with 'the wicked.'
- source_word: עֲדֵי
  chosen: lasts only
  alternatives:
  - is until
  - endures but
  lexicon: HALOT
  rationale: The preposition marks extent up to a limit. In idiomatic English with
    the implied predicate, 'lasts only' makes the temporal limitation explicit.
- source_word: רָגַע
  chosen: a moment
  alternatives:
  - an instant
  - a brief moment
  lexicon: HALOT
  rationale: The noun denotes a very short span of time. 'A moment' is the most natural
    equivalent and preserves the poetic brevity.
