id: JOB.20.8
reference: Job 20:8
source:
  edition: WLC
  text: כַּ/חֲל֣וֹם יָ֭עוּף וְ/לֹ֣א יִמְצָא֑וּ/הוּ וְ֝/יֻדַּ֗ד כְּ/חֶזְי֥וֹן לָֽיְלָה׃
translation:
  text: Like a dream he flies away and is not found; he is chased away like a vision
    of the night.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and they do not find him.' The Hebrew uses an indefinite plural verb
      with object suffix.
    reason: lexical_alternative
  - marker: b
    text: Or 'like a night vision.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כַּחֲלוֹם
  chosen: Like a dream
  alternatives:
  - As a dream
  lexicon: HALOT
  rationale: The prefixed כ marks comparison, and חֲלוֹם means 'dream.' 'Like a dream'
    is natural modern English and preserves the simile.
- source_word: יָעוּף
  chosen: he flies away
  alternatives:
  - he vanishes
  - he flits away
  lexicon: HALOT
  rationale: From עוּף, literally 'to fly.' In context it describes swift disappearance,
    but retaining 'flies away' preserves the vivid imagery rather than flattening
    it to mere 'vanishes.'
- source_word: וְלֹא יִמְצָאֻהוּ
  chosen: and is not found
  alternatives:
  - and they do not find him
  - and no one finds him
  lexicon: HALOT
  rationale: The Hebrew is active plural with object suffix ('they do not find him'),
    but English commonly uses the passive here to convey the same sense idiomatically.
    This keeps the focus on the wicked person's disappearance rather than on unspecified
    searchers.
- source_word: וְיֻדַּד
  chosen: he is chased away
  alternatives:
  - he is driven away
  - he is banished
  lexicon: HALOT
  rationale: The Hophal form conveys being driven off or chased away. 'Chased away'
    fits the image of something fleeting and hunted from sight, matching the poetic
    parallelism.
- source_word: כְּחֶזְיוֹן לָיְלָה
  chosen: like a vision of the night
  alternatives:
  - like a night vision
  - like a vision in the night
  lexicon: HALOT
  rationale: חֶזְיוֹן is 'vision,' and לָיְלָה here functions genitively. 'Vision
    of the night' is a clear, elevated but still readable rendering that preserves
    the poetic tone and close correspondence to the Hebrew.
