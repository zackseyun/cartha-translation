id: JOB.20.4
reference: Job 20:4
source:
  edition: WLC
  text: הֲ/זֹ֣את יָ֭דַעְתָּ מִנִּי עַ֑ד מִנִּ֤י שִׂ֖ים אָדָ֣ם עֲלֵי אָֽרֶץ־־׃
translation:
  text: Have you known this from of old, since man was placed on the earth?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “since humankind was placed on the earth.”
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲ/זֹאת
  chosen: this
  alternatives:
  - this thing
  - such a thing
  lexicon: HALOT
  rationale: Demonstrative introducing the content of the rhetorical question. English
    'this' is natural and sufficiently definite without adding interpretive weight.
- source_word: יָדַעְתָּ
  chosen: have you known
  alternatives:
  - do you know
  - have you understood
  lexicon: HALOT
  rationale: 'Qal perfect 2ms in an interrogative context can be rendered as present
    perfect in English to express enduring knowledge: ''Have you known...?'' This
    preserves the rhetorical force better than a simple present.'
- source_word: מִנִּי עַד
  chosen: from of old
  alternatives:
  - from ancient time
  - from then onward
  lexicon: HALOT
  rationale: The idiom with מן + עַד here points to remote antiquity. 'From of old'
    is concise, idiomatic English matching the temporal sense.
- source_word: מִנִּי שִׂים
  chosen: since ... was placed
  alternatives:
  - from the time ... was set
  - since ... was appointed
  lexicon: HALOT
  rationale: This second temporal phrase marks the starting point 'from the placing
    of.' Rendering with 'since ... was placed' gives clear English syntax while preserving
    the temporal force.
- source_word: שִׂים
  chosen: was placed
  alternatives:
  - was set
  - was established
  lexicon: HALOT
  rationale: The infinitive construct of שׂים with אדם as its object refers to man's
    being set/placed upon the earth. 'Placed' is natural in English and fits the locative
    phrase that follows.
- source_word: אָדָם
  chosen: man
  alternatives:
  - humankind
  - humanity
  lexicon: HALOT
  rationale: Per doctrine, gender-accurate over gender-neutral. Here אדם is generic
    but singular and representative, referring to mankind in its primal placement
    on earth. 'Man' preserves the Hebrew form and traditional anthropological force;
    an inclusive alternative is worth preserving in a footnote.
- source_word: עֲלֵי אָרֶץ
  chosen: on the earth
  alternatives:
  - upon the earth
  - on earth
  lexicon: HALOT
  rationale: Straightforward locative expression. 'On the earth' preserves the article-like
    definiteness of the Hebrew noun in context and reads naturally.
