theological_decisions:
- issue: Rendering of אדם in a generic anthropological statement
  chosen_reading: man
  alternative_readings:
  - humankind
  - humanity
  rationale: The Hebrew uses singular אדם generically. Following the stated doctrine
    of gender-accurate over gender-neutral, 'man' best matches the source form and
    representative sense, while an inclusive alternative is preserved in a footnote
    for readers who may otherwise hear the English too narrowly.
