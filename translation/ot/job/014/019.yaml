theological_decisions:
- issue: Direct address to God in the final clause
  chosen_reading: so you destroy the hope of man
  alternative_readings:
  - and the hope of man you destroy
  rationale: The 2ms verb clearly addresses God. The added 'so' brings out the implied
    comparison from the preceding natural images without importing extra theology.
  doctrine_reference: Preserve theological tension rather than resolve it; optimal
    equivalence.
- issue: Rendering אֱנוֹשׁ
  chosen_reading: man
  alternative_readings:
  - humanity
  - mankind
  - a mortal
  rationale: The Hebrew is singular and representative, stressing human frailty. 'Man'
    best preserves both number and tone under the gender-accurate policy.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4 (Gender-accurate over
    gender-neutral).
