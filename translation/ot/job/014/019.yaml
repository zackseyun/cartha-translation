id: JOB.14.19
reference: Job 14:19
source:
  edition: WLC
  text: אֲבָנִ֤ים שָׁ֥חֲקוּ מַ֗יִם תִּשְׁטֹֽף סְפִיחֶ֥י/הָ עֲפַר אָ֑רֶץ וְ/תִקְוַ֖ת
    אֱנ֣וֹשׁ הֶאֱבַֽדְתָּ׀־־׃
translation:
  text: Water wears away stones; its torrents wash away the soil of the earth; so
    you destroy the hope of man.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Hebrew term rendered 'its torrents' is rare and uncertain; it may also
      mean 'its outpourings,' 'its washings,' or possibly something like 'what springs
      up from it.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲבָנִים
  chosen: stones
  alternatives:
  - rocks
  lexicon: HALOT
  rationale: Common plural noun for stones; 'stones' fits the poetic image and pairs
    naturally with erosive action by water.
- source_word: שָׁחֲקוּ
  chosen: wears away
  alternatives:
  - erode
  - grind down
  lexicon: HALOT
  rationale: The verb denotes wearing down or abrasion. Although morphologically plural
    with 'waters/stones' creating a compressed poetic construction, English idiom
    is best expressed as singular 'water wears away' to convey the general truth of
    erosion.
- source_word: מַיִם
  chosen: water
  alternatives:
  - waters
  lexicon: HALOT
  rationale: Hebrew often uses the plural form for 'water.' Singular 'water' is more
    natural in English in a generic statement about erosion.
- source_word: תִּשְׁטֹף
  chosen: wash away
  alternatives:
  - sweep away
  - overflow
  lexicon: HALOT
  rationale: The verb means to wash away or inundate. 'Wash away' best matches the
    erosion imagery in context.
- source_word: סְפִיחֶיהָ
  chosen: its torrents
  alternatives:
  - its outpourings
  - its washings
  - what grows of it
  lexicon: HALOT
  rationale: This rare form is difficult. In context with שטף and earth/soil imagery,
    it most plausibly refers to what pours off or from the water/earth in runoff,
    hence 'its torrents.' This yields coherent parallelism with erosive force. Because
    the term is lexically uncertain, alternatives are preserved in a footnote.
- source_word: עֲפַר אָרֶץ
  chosen: the soil of the earth
  alternatives:
  - the dust of the earth
  - earth's dust
  lexicon: HALOT
  rationale: Literally 'dust of earth/land.' In this erosion context, 'soil' communicates
    the loose surface material being washed away while remaining close to the Hebrew
    image.
- source_word: וְתִקְוַת אֱנוֹשׁ
  chosen: the hope of man
  alternatives:
  - the hope of a human being
  - the hope of mankind
  lexicon: HALOT
  rationale: אֱנוֹשׁ emphasizes frail mortal man. Per gender-accurate policy, 'man'
    is retained as the representative singular matching the Hebrew, not as an exclusion
    of women.
- source_word: הֶאֱבַדְתָּ
  chosen: you destroy
  alternatives:
  - you cause to perish
  - you wipe out
  lexicon: HALOT
  rationale: Hiphil of אבד means to cause to perish/destroy. 'You destroy' is direct,
    natural, and preserves Job's address to God.
