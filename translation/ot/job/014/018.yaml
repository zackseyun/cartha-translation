id: JOB.14.18
reference: Job 14:18
source:
  edition: WLC
  text: וְ֭/אוּלָם הַר נוֹפֵ֣ל יִבּ֑וֹל וְ֝/צ֗וּר יֶעְתַּ֥ק מִ/מְּקֹמֽ/וֹ־׃
translation:
  text: But even a mountain falling crumbles away, and a rock is moved from its place.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'withers away,' preserving the verb's more common sense of fading or
      withering; here it is used metaphorically of a mountain.
    reason: lexical_alternative
  - marker: b
    text: Or 'is displaced' / 'is removed from its place.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאוּלָם
  chosen: But even
  alternatives:
  - But
  - Yet
  - Nevertheless
  lexicon: HALOT
  rationale: Introduces a strong adversative or emphatic transition. 'But even' captures
    both the contrast with the preceding thought and the emphatic force leading into
    the image of apparently permanent things perishing.
- source_word: הַר
  chosen: a mountain
  alternatives:
  - mountain
  lexicon: HALOT
  rationale: Straightforward noun meaning 'mountain.' Indefinite English fits the
    poetic, proverbial sense better than 'the mountain.'
- source_word: נוֹפֵל
  chosen: falling
  alternatives:
  - that falls
  - when it falls
  lexicon: HALOT
  rationale: Qal participle from נפל, functioning attributively or circumstantially.
    'Falling' preserves the vivid ongoing image in compact English poetry.
- source_word: יִבּוֹל
  chosen: crumbles away
  alternatives:
  - withers
  - decays
  - wears away
  - falls to ruin
  lexicon: HALOT
  rationale: The verb commonly denotes withering/fading, especially of vegetation,
    but here it is applied metaphorically to a mountain. 'Crumbles away' conveys deterioration
    appropriate to a mountain in English while preserving the sense of wasting/perishing
    rather than a single collapse.
- source_word: וְצוּר
  chosen: and a rock
  alternatives:
  - and a cliff
  - and a crag
  lexicon: HALOT
  rationale: צוּר can denote rock, cliff, or crag. 'Rock' is the most natural broad
    rendering here and pairs well with 'mountain' in the parallel line.
- source_word: יֶעְתַּק
  chosen: is moved
  alternatives:
  - is displaced
  - is removed
  - shifts
  lexicon: HALOT
  rationale: The verb means to move away, be removed, or be displaced. Passive English
    'is moved' best reflects the intransitive/passive-like sense in context and keeps
    the poetic parallel with the mountain image.
- source_word: מִמְּקֹמוֹ
  chosen: from its place
  alternatives:
  - from its location
  lexicon: HALOT
  rationale: Literal rendering of the prepositional phrase. 'Its place' is idiomatic
    and preserves the image of something fixed being dislodged.
