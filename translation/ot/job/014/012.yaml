id: JOB.14.12
reference: Job 14:12
source:
  edition: WLC
  text: וְ/אִ֥ישׁ שָׁכַ֗ב וְֽ/לֹא יָ֫ק֥וּם עַד בִּלְתִּ֣י שָׁ֭מַיִם לֹ֣א יָקִ֑יצוּ
    וְ/לֹֽא יֵ֝עֹ֗רוּ מִ/שְּׁנָתָֽ/ם־־־׃
translation:
  text: So a man lies down and does not rise; until the heavens are no more, they
    will not awake or be roused from their sleep.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'until the heavens cease to be.' The Hebrew expression is idiomatic and
      marks an effectively unreachable endpoint.
    reason: lexical_alternative
  - marker: b
    text: 'The verse uses sleep imagery for death: ''they will not awake or be roused
      from their sleep.'''
    reason: cultural_note
lexical_decisions:
- source_word: וְאִישׁ
  chosen: So a man
  alternatives:
  - And a man
  - But a man
  lexicon: HALOT
  rationale: אִישׁ is singular masculine 'man.' Per gender-accurate policy, 'man'
    is retained rather than neutralizing to 'person,' since the verse speaks representatively
    of human mortality through the singular male form. The prefixed וְ is rendered
    contextually as 'So' to connect with the preceding comparison and advance the
    argument.
- source_word: שָׁכַב
  chosen: lies down
  alternatives:
  - has lain down
  - lies
  lexicon: HALOT
  rationale: שׁכב commonly means 'lie down,' and in this context functions as a euphemistic
    description of death. 'Lies down' preserves the metaphor without over-interpreting
    it as 'dies' in the main text.
- source_word: וְלֹא יָקוּם
  chosen: and does not rise
  alternatives:
  - and will not rise
  - and does not get up
  lexicon: HALOT
  rationale: קום here refers to rising after death. 'Does not rise' keeps the Hebrew
    idiom and the present-general force of the poetic statement. 'Rise' is preferable
    to 'get up' for dignity and possible resonance with resurrection language, without
    making that doctrine explicit here.
- source_word: עַד בִּלְתִּי שָׁמַיִם
  chosen: until the heavens are no more
  alternatives:
  - until there are no heavens
  - until the heavens cease
  lexicon: HALOT
  rationale: The construction means literally 'until not the heavens,' idiomatically
    'until the heavens are no more' or 'cease to be.' This is the most natural English
    rendering while preserving the cosmic, hyperbolic time horizon of the Hebrew.
- source_word: לֹא יָקִיצוּ
  chosen: they will not awake
  alternatives:
  - he will not awake
  - they do not awake
  lexicon: HALOT
  rationale: יקיץ means 'awake.' The verb is plural, shifting from the representative
    singular 'man' to a plural sense referring to the dead generally; English 'they'
    reflects the Hebrew verbal number. 'Awake' preserves the sleep/death metaphor.
- source_word: וְלֹא יֵעֹרוּ
  chosen: or be roused
  alternatives:
  - or be awakened
  - or stir themselves
  lexicon: HALOT
  rationale: The Niphal of עור conveys being aroused or awakened. 'Be roused' provides
    a natural English parallel to 'awake' while preserving the passive/inchoative
    sense and poetic intensification.
- source_word: מִשְּׁנָתָם
  chosen: from their sleep
  alternatives:
  - from their slumber
  lexicon: HALOT
  rationale: The noun means 'sleep,' here continuing the metaphor for death. 'Sleep'
    is the plainest and most transparent rendering; 'their' matches the plural verbs
    immediately preceding.
