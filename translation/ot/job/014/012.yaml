theological_decisions:
- issue: Whether to make the death metaphor explicit as annihilation or as resurrection
    denial
  chosen_reading: Retain the sleep/rising imagery without doctrinal expansion
  alternative_readings:
  - Translate more explicitly as 'dies and will not live again'
  - Translate with an implied resurrection reference
  rationale: The verse poetically describes human death from Job's perspective using
    lying down, not rising, and not awaking from sleep. The translation preserves
    that tension and imagery rather than resolving it into a systematic statement
    about final resurrection or annihilation. This aligns with the doctrine guideline
    to preserve theological tension where the source is poetic and contextually ambiguous.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
- issue: Gender rendering of אִישׁ
  chosen_reading: Render as 'man'
  alternative_readings:
  - person
  - human being
  rationale: The Hebrew uses the grammatically masculine singular noun אִישׁ in a
    representative sense. Per the stated policy, the translation keeps the gender-accurate
    form 'man' rather than flattening to a neutral term.
  doctrine_reference: 'Translation philosophy §4: Gender-accurate over gender-neutral.'
