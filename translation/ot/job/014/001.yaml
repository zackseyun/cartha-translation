- issue: Rendering of generic אָדָם
  chosen_reading: Man
  alternative_readings:
  - humankind
  - a human being
  rationale: The verse states a general truth about the human condition in a generic
    singular form. Following the doctrine's gender-accurate principle, the translation
    preserves the representative singular rather than neutralizing it to an abstract
    collective.
