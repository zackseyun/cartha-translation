id: JOB.14.1
reference: Job 14:1
source:
  edition: WLC
  text: אָ֭דָם יְל֣וּד אִשָּׁ֑ה קְצַ֥ר יָ֝מִ֗ים וּֽ/שְׂבַֽע רֹֽגֶז־׃
translation:
  text: Man, born of woman, is short of days and full of turmoil.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “humankind”; Hebrew “man” is a generic singular referring to the human
      condition.
    reason: lexical_alternative
  - marker: b
    text: Or “full of trouble” or “full of unrest.”
    reason: lexical_alternative
lexical_decisions:
- source_word: אָדָם
  chosen: Man
  alternatives:
  - humankind
  - a human being
  lexicon: HALOT
  rationale: The noun can denote humanity generically or an individual human/man.
    Here it introduces a representative statement about the human condition. Per doctrine,
    gender-accurate rendering is preferred; 'Man' preserves the generic singular force
    better than the more abstract 'humankind.'
- source_word: יְלוּד אִשָּׁה
  chosen: born of woman
  alternatives:
  - woman-born
  - born by a woman
  lexicon: HALOT
  rationale: The passive participial construction literally describes one begotten/born
    of woman. 'Born of woman' is idiomatic, natural English and preserves the concrete
    mortality-emphasizing expression.
- source_word: קְצַר יָמִים
  chosen: short of days
  alternatives:
  - few of days
  - short-lived
  - having few days
  lexicon: HALOT
  rationale: The Hebrew is literally 'short of days'/'few of days,' an idiom for brevity
    of life. 'Short of days' keeps the Hebrew imagery while remaining intelligible;
    'short-lived' is smoother but less formally transparent.
- source_word: וּשְׂבַע רֹגֶז
  chosen: and full of turmoil
  alternatives:
  - and full of trouble
  - and sated with unrest
  - and full of agitation
  lexicon: HALOT
  rationale: שְׂבַע means 'full/sated,' and רֹגֶז can denote agitation, turmoil, or
    trouble. 'Full of turmoil' captures both the inward disturbance and outward affliction
    implied in Job's lament better than the flatter 'trouble.'
- source_word: רֹגֶז
  chosen: turmoil
  alternatives:
  - trouble
  - agitation
  - unrest
  lexicon: HALOT
  rationale: In Job's context of human frailty and distress, the term points to disturbed,
    troubled existence. 'Turmoil' is broad enough to include both emotional agitation
    and circumstantial distress.
