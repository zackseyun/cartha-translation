id: JOB.14.10
reference: Job 14:10
source:
  edition: WLC
  text: וְ/גֶ֣בֶר יָ֭מוּת וַֽ/יֶּחֱלָ֑שׁ וַ/יִּגְוַ֖ע אָדָ֣ם וְ/אַיּֽ/וֹ׃
translation:
  text: But a man dies and is laid low; a human being breathes his last, and where
    is he?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'grows weak' / 'becomes weak' for 'is laid low.'
    reason: lexical_alternative
  - marker: b
    text: Or 'expires' for 'breathes his last.'
    reason: lexical_alternative
  - marker: c
    text: Hebrew uses both גבר ('man') and אדם ('human being/man') in parallel, emphasizing
      the mortality of humanity.
    reason: cultural_note
lexical_decisions:
- source_word: גֶּבֶר
  chosen: a man
  alternatives:
  - a strong man
  - a warrior
  - a person
  lexicon: HALOT
  rationale: גבר commonly denotes a man, often with nuance of strength or vigor. In
    this poetic context, 'a man' preserves the masculine singular and the contrast
    with mortality without overreading 'warrior' or 'strong man'.
- source_word: יָמוּת
  chosen: dies
  alternatives:
  - will die
  - is dead
  lexicon: HALOT
  rationale: The imperfect here expresses the general reality in poetic discourse
    rather than a specific future event. Present English 'dies' best conveys the gnomic
    force.
- source_word: וַיֶּחֱלָשׁ
  chosen: is laid low
  alternatives:
  - grows weak
  - becomes weak
  - wastes away
  lexicon: HALOT
  rationale: From חלש, the sense is becoming weak or powerless. 'Is laid low' captures
    the resultant collapse in context after death language, while remaining idiomatic
    English. It also avoids implying merely temporary illness.
- source_word: וַיִּגְוַע
  chosen: breathes his last
  alternatives:
  - expires
  - perishes
  - dies
  lexicon: HALOT
  rationale: גוע often denotes expiring or breathing out one's life. 'Breathes his
    last' preserves the vividness and avoids flattening it into a mere repetition
    of 'dies,' while still communicating death clearly.
- source_word: אָדָם
  chosen: a human being
  alternatives:
  - man
  - humankind
  - a person
  lexicon: HALOT
  rationale: Per doctrine, אָדָם may be rendered 'man' or 'humankind' by context.
    Here it is singular and parallel to גבר. 'A human being' preserves the generic-human
    sense while distinguishing it from the previous גבר and avoiding an awkward repeated
    'man' in English.
- source_word: וְאַיּוֹ
  chosen: and where is he?
  alternatives:
  - and where is he then?
  - and he is nowhere
  - but where is he?
  lexicon: HALOT
  rationale: The interrogative asks after the vanished person following death. 'And
    where is he?' is the most direct rendering. The conjunction is retained as 'and,'
    though English could also use 'but' for contrast.
