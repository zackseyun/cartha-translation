id: JOB.14.5
reference: Job 14:5
source:
  edition: WLC
  text: אִ֥ם חֲרוּצִ֨ים יָמָ֗י/ו מִֽסְפַּר חֳדָשָׁ֥י/ו אִתָּ֑/ךְ חק/ו עָ֝שִׂ֗יתָ וְ/לֹ֣א
    יַעֲבֽוֹר׀־׃
translation:
  text: Since his days are determined, the number of his months is with you; you have
    set his limit, and he cannot pass it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''If his days are determined.'' The Hebrew particle can introduce a
      condition, but in context it likely gives the basis for Job''s appeal: ''Since
      his days are determined.'''
    reason: lexical_alternative
  - marker: b
    text: Or 'his boundary' or 'his decree' for 'his limit.' The Hebrew term can denote
      a fixed prescribed bound.
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  chosen: Since
  alternatives:
  - If
  - surely
  lexicon: HALOT
  rationale: In context this introduces the ground or condition underlying Job's appeal,
    not a mere hypothetical. 'Since' communicates the causal/assumptive force more
    naturally in English while remaining close to the Hebrew.
- source_word: חֲרוּצִים
  chosen: determined
  alternatives:
  - decreed
  - cut off
  - decided
  lexicon: HALOT
  rationale: The passive participle conveys that the days are fixed or decided. 'Determined'
    is clear modern English and fits the context of divinely fixed human lifespan.
- source_word: יָמָיו
  chosen: his days
  lexicon: HALOT
  rationale: A straightforward rendering of the plural construct with 3ms suffix,
    referring to a man's lifespan in days.
- source_word: מִסְפַּר חֳדָשָׁיו
  chosen: the number of his months
  alternatives:
  - his months are numbered
  - the count of his months
  lexicon: HALOT
  rationale: The construct phrase is rendered transparently. 'The number of his months'
    preserves the nominal expression better than converting it into a verbal paraphrase.
- source_word: אִתָּךְ
  chosen: is with you
  alternatives:
  - belongs to you
  - is known to you
  lexicon: HALOT
  rationale: The prepositional phrase literally means 'with you.' In context it implies
    that the count of a person's months resides with God, that is, under his knowledge
    and control. The more literal 'is with you' preserves that nuance without over-interpreting.
- source_word: חֻקּוֹ
  chosen: his limit
  alternatives:
  - his boundary
  - his decree
  - his appointed bound
  lexicon: HALOT
  rationale: Here the noun denotes a fixed boundary or prescribed limit on human life.
    'Limit' is idiomatic and suits the following verb 'pass' well in English.
- source_word: עָשִׂיתָ
  chosen: you have set
  alternatives:
  - you made
  - you established
  - you appointed
  lexicon: HALOT
  rationale: Although the verb is broadly 'make/do,' in this collocation with a limit
    or statute the sense is that God has established or set it. 'You have set' is
    natural and contextually precise.
- source_word: וְלֹא יַעֲבוֹר
  chosen: and he cannot pass it
  alternatives:
  - and he does not pass
  - and he cannot go beyond it
  - and he will not transgress it
  lexicon: HALOT
  rationale: The singular verb refers back to the man, not the limit. In context the
    sense is inability to go beyond the divinely fixed boundary of life. 'Cannot pass
    it' expresses the force clearly in English.
