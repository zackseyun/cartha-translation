theological_decisions:
- issue: Referent of purity/impurity language
  chosen_reading: General statement of human inability to produce purity from impurity,
    in context applied to humanity's impure condition.
  alternative_readings:
  - A statement specifically about birth from impure parents
  - A broader proverb about moral and ritual impurity
  rationale: The verse itself is terse and proverbial. The translation avoids over-specifying
    whether the impurity is ritual, moral, hereditary, or existential, preserving
    the tension and allowing the immediate context in Job 14 to inform interpretation.
  doctrine_reference: Preserve theological tension rather than resolve it.
