id: JOB.14.4
reference: Job 14:4
source:
  edition: WLC
  text: מִֽי יִתֵּ֣ן טָ֭הוֹר מִ/טָּמֵ֗א לֹ֣א אֶחָֽד־׃
translation:
  text: Who can bring a clean thing out of an unclean? No one.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Who can bring what is clean from what is unclean? Not one.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִי
  chosen: Who
  alternatives:
  - Who is it that
  - Who can
  lexicon: HALOT
  rationale: Interrogative pronoun introducing a rhetorical question. English 'Who'
    preserves the directness of the Hebrew; the modal force is supplied by context
    and the following verb.
- source_word: יִתֵּן
  chosen: can bring
  alternatives:
  - gives
  - can produce
  - can bring forth
  lexicon: HALOT
  rationale: נתן literally means 'give,' but in this idiom with the rhetorical question
    and result phrase ('a clean thing from an unclean') it carries the sense of producing
    or bringing forth. 'Can bring' captures both the idiomatic sense and the implied
    impossibility.
- source_word: טָהוֹר
  chosen: a clean thing
  alternatives:
  - what is clean
  - clean
  lexicon: HALOT
  rationale: Adjective used substantivally. 'A clean thing' makes the substantival
    force explicit in natural English and preserves the purity/impurity contrast.
- source_word: מִטָּמֵא
  chosen: out of an unclean
  alternatives:
  - from an unclean thing
  - from what is unclean
  lexicon: HALOT
  rationale: Preposition מִן plus adjective טָמֵא, likely substantival. 'Out of an
    unclean' is concise and idiomatic, though the sense is 'from an unclean thing/person/state.'
    The contrast with 'clean thing' is maintained.
- source_word: לֹא אֶחָד
  chosen: No one
  alternatives:
  - Not one
  - There is not one
  lexicon: HALOT
  rationale: Hebrew idiom expressing absolute negation in answer to the rhetorical
    question. 'No one' is the most natural modern English equivalent; 'Not one' is
    slightly more formal and is preserved as an alternative.
