id: JOB.14.8
reference: Job 14:8
source:
  edition: WLC
  text: אִם יַזְקִ֣ין בָּ/אָ֣רֶץ שָׁרְשׁ֑/וֹ וּ֝/בֶ/עָפָ֗ר יָמ֥וּת גִּזְעֽ/וֹ־׃
translation:
  text: Though its root grows old in the earth, and its stump dies in the dust,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “If its root grows old in the earth.” The Hebrew particle can be read
      conditionally, but here it likely has a concessive sense in the flow of the
      tree analogy.
    reason: alternative_reading
  - marker: b
    text: Or “stock” for “stump.”
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  chosen: Though
  alternatives:
  - If
  lexicon: HALOT
  rationale: 'In this poetic context, אִם introduces a concessive clause continuing
    the tree metaphor from the previous verse rather than a simple conditional. ''Though''
    better captures the sense: even if the tree is in a seemingly hopeless condition,
    renewal remains possible in the next verse.'
- source_word: יַזְקִין
  chosen: grows old
  alternatives:
  - becomes old
  - ages
  lexicon: HALOT
  rationale: The Hiphil of זקן here expresses becoming old/aged. 'Grows old' is idiomatic
    modern English and preserves the processive sense.
- source_word: בָּאָרֶץ
  chosen: in the earth
  alternatives:
  - in the ground
  - in the land
  lexicon: HALOT
  rationale: אָרֶץ can mean earth, land, or ground. Here the image is botanical and
    paired with 'dust,' so 'earth' preserves the poetic register while remaining natural.
    'Ground' is possible but slightly flatter stylistically.
- source_word: שָׁרְשׁוֹ
  chosen: its root
  alternatives:
  - its roots
  lexicon: HALOT
  rationale: The singular with 3ms suffix is best rendered 'its root,' referring collectively
    to the tree's root system in poetic singular.
- source_word: וּבֶעָפָר
  chosen: and in the dust
  alternatives:
  - and in the soil
  - and in the dirt
  lexicon: HALOT
  rationale: עָפָר commonly means dust/loose earth. 'Dust' preserves the poetic and
    mortality-laden resonance common in Hebrew usage, fitting Job's imagery.
- source_word: יָמוּת
  chosen: dies
  alternatives:
  - is dead
  - withers away
  lexicon: HALOT
  rationale: מות is the ordinary verb 'to die.' 'Dies' is the most direct and textually
    faithful rendering; 'withers away' would import imagery not present in the verb
    itself.
- source_word: גִּזְעוֹ
  chosen: its stump
  alternatives:
  - its stock
  - its trunk
  lexicon: HALOT
  rationale: גֵּזַע refers to the stump or stock of a felled tree. 'Stump' best fits
    the context established in the previous verse and the image of apparent death
    yet possible regrowth.
