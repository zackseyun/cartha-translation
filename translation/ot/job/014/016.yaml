id: JOB.14.16
reference: Job 14:16
source:
  edition: WLC
  text: כִּֽי עַ֭תָּה צְעָדַ֣/י תִּסְפּ֑וֹר לֹֽא תִ֝שְׁמ֗וֹר עַל חַטָּאתִֽ/י־־־׃
translation:
  text: For now you count my steps; you do not keep watch over my sin.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'you number my steps.'
    reason: lexical_alternative
  - marker: b
    text: Or 'you do not watch over my sin' or 'you do not watch for my sin.'
    reason: alternative_reading
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - For now
  - Indeed
  - Surely
  lexicon: HALOT
  rationale: Introduces the clause with explanatory force in context. 'For' preserves
    the connective sense better than a more emphatic English particle.
- source_word: עַתָּה
  chosen: now
  alternatives:
  - at present
  - as it is now
  lexicon: HALOT
  rationale: Temporal adverb marking the present situation in contrast with Job's
    hoped-for alternative. 'Now' is concise and natural.
- source_word: צְעָדַי
  chosen: my steps
  alternatives:
  - my footsteps
  - my goings
  lexicon: HALOT
  rationale: The noun refers to steps or paces. 'My steps' is the most direct and
    idiomatic rendering in English and fits the image of God counting each movement.
- source_word: תִּסְפּוֹר
  chosen: you count
  alternatives:
  - you number
  lexicon: HALOT
  rationale: The verb ספר in the Qal commonly means 'count' or 'number.' 'Count' is
    more natural modern English while preserving the concrete image.
- source_word: לֹא
  chosen: do not
  alternatives:
  - not
  lexicon: HALOT
  rationale: Standard negation rendered with English auxiliary support for natural
    syntax.
- source_word: תִשְׁמוֹר עַל
  chosen: keep watch over
  alternatives:
  - watch over
  - guard against
  - observe
  lexicon: HALOT
  rationale: שׁמר with עַל can mean to watch over, keep guard over, or keep in view.
    In this context Job speaks of God attentively monitoring sin. 'Keep watch over'
    preserves the surveillance nuance and matches the parallel with counting steps.
- source_word: חַטָּאתִי
  chosen: my sin
  alternatives:
  - my offense
  - my wrongdoing
  lexicon: HALOT
  rationale: The noun can denote sin or sin-offering depending on context; here only
    'sin' fits. Singular is retained, likely as a collective or abstract singular,
    and should not be flattened without necessity.
