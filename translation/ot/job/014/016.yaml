theological_decisions:
- issue: Sense of the negated clause לֹא תִשְׁמוֹר עַל חַטָּאתִי in context
  chosen_reading: 'Render the clause straightforwardly as a present complaint: ''you
    do not keep watch over my sin.'''
  alternative_readings:
  - '''you would not keep watch over my sin'' (taking it as part of a hypothetical
    wish or contrast)'
  - '''you do not watch for my sin'''
  rationale: The Hebrew form is a simple imperfect with negation, and in isolation
    most naturally yields a present statement. Although the broader context raises
    interpretive tension with nearby verses that speak of God sealing up transgression,
    this verse itself is best translated according to its plain syntax rather than
    harmonized. The English preserves that tension rather than resolving it.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
