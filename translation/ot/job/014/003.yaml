id: JOB.14.3
reference: Job 14:3
source:
  edition: WLC
  text: אַף עַל זֶ֭ה פָּקַ֣חְתָּ עֵינֶ֑/ךָ וְ/אֹ֘תִ֤/י תָבִ֖יא בְ/מִשְׁפָּ֣ט עִמָּֽ/ךְ־־׃
translation:
  text: Yet on such a one you open your eyes, and you bring me into judgment with
    you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'before you'; the Hebrew literally says 'with you,' which may suggest
      appearing in judgment before God or entering into a legal case with him.
    reason: alternative_reading
lexical_decisions:
- source_word: אַף
  chosen: Yet
  alternatives:
  - Even
  - Indeed
  - Nevertheless
  lexicon: HALOT
  rationale: Here אַף functions as an emphatic/adversative particle linking back to
    the frailty of man in the preceding context. 'Yet' captures the force of surprise
    or protest better than a simple 'even' in natural English.
- source_word: עַל זֶה
  chosen: on such a one
  alternatives:
  - on this
  - upon this
  - on such a thing
  lexicon: HALOT
  rationale: Literally 'on this.' In context, Job refers back to the frail human just
    described (vv. 1–2), so 'on such a one' brings out the personal reference without
    over-paraphrasing.
- source_word: פָּקַחְתָּ עֵינֶךָ
  chosen: you open your eyes
  alternatives:
  - you have opened your eyes
  - you fix your eyes
  - you keep watch
  lexicon: HALOT
  rationale: The idiom literally means 'open your eyes' and in context conveys directing
    attention or scrutiny toward someone. The simple present in English fits the poetic
    complaint. More interpretive options like 'keep watch' are possible but less transparent
    to the Hebrew wording.
- source_word: וְאֹתִי
  chosen: and you bring me
  alternatives:
  - and me you bring
  - and me
  lexicon: HALOT
  rationale: The conjunction plus marked object pronoun gives emphasis to Job himself
    as the one brought into court. Standard English smooths this as 'and you bring
    me' while preserving the personal focus.
- source_word: תָבִיא
  chosen: you bring
  alternatives:
  - you cause to come
  - you summon
  lexicon: HALOT
  rationale: Hiphil of בוא can mean 'bring' or 'cause to come.' In judicial context
    'summon' is interpretive; 'bring' preserves the lexical core while fitting the
    courtroom imagery.
- source_word: בְמִשְׁפָּט
  chosen: into judgment
  alternatives:
  - into court
  - to judgment
  - for judgment
  lexicon: HALOT
  rationale: מִשְׁפָּט here denotes judicial proceedings or judgment. 'Into judgment'
    is idiomatic English that preserves the legal sense without narrowing it to a
    modern courtroom setting.
- source_word: עִמָּךְ
  chosen: with you
  alternatives:
  - before you
  - against you
  lexicon: HALOT
  rationale: The preposition עם normally means 'with.' In this judicial setting it
    may imply appearing in litigation with God, and some English versions render interpretively
    as 'before you.' The more literal 'with you' preserves the Hebrew and the starkness
    of Job's complaint.
