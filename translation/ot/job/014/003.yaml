theological_decisions:
- issue: Judicial relation expressed by עִמָּךְ in Job's address to God
  chosen_reading: with you
  alternative_readings:
  - before you
  - against you
  rationale: The verse depicts Job being brought into legal judgment in relation to
    God. The Hebrew preposition is most straightforwardly 'with,' and the translation
    preserves that tension rather than resolving whether the sense is merely appearance
    before God or adversarial litigation against him.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
