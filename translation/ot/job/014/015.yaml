id: JOB.14.15
reference: Job 14:15
source:
  edition: WLC
  text: תִּ֭קְרָא וְ/אָנֹכִ֣י אֶֽעֱנֶ֑/ךָּ לְֽ/מַעֲשֵׂ֖ה יָדֶ֣י/ךָ תִכְסֹֽף׃
translation:
  text: You would call, and I would answer you; you would long for the work of your
    hands.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'you would yearn for the work of your hands.'
    reason: lexical_alternative
  - marker: b
    text: The phrase 'the work of your hands' refers to the human being as God's creature,
      the one he has made.
    reason: cultural_note
lexical_decisions:
- source_word: תִּקְרָא
  chosen: you would call
  alternatives:
  - you will call
  - you call
  lexicon: HALOT
  rationale: Qal imperfect 2ms of קרא. In this poetic context, following the preceding
    wish/conditional sense in Job 14, the imperfect is best rendered with modal nuance
    ('would call') rather than simple future, expressing Job's hoped-for scenario.
- source_word: וְאָנֹכִי
  chosen: and I
  alternatives:
  - then I
  rationale: The conjunction plus emphatic first-person pronoun marks the responsive
    counterpart to God's action. English smooths this as 'and I,' though the final
    line omits 'and' for readability while preserving the contrastive sequence.
- source_word: אֶעֱנֶךָּ
  chosen: would answer you
  alternatives:
  - will answer you
  - would respond to you
  lexicon: HALOT
  rationale: Qal imperfect 1cs with 2ms suffix from ענה ('answer, respond'). 'Answer
    you' is the most direct rendering; 'would' matches the modal force of the preceding
    imperfect in context.
- source_word: לְמַעֲשֵׂה
  chosen: for the work
  alternatives:
  - for the deed
  - for what is made
  lexicon: HALOT
  rationale: מַעֲשֶׂה commonly denotes work, deed, or product. Here, with 'your hands,'
    it refers to what God's hands have made, so 'the work' is natural and preserves
    the creation imagery.
- source_word: יָדֶיךָ
  chosen: of your hands
  alternatives:
  - your handiwork
  lexicon: HALOT
  rationale: Literally 'your hands.' The phrase 'the work of your hands' is a transparent
    English equivalent that preserves the anthropomorphic and creatorly imagery better
    than collapsing it immediately to 'handiwork' in the main text.
- source_word: תִכְסֹף
  chosen: you would long for
  alternatives:
  - you would yearn for
  - you would desire
  lexicon: HALOT
  rationale: Qal imperfect 2ms of כסף, 'to long for, yearn, desire.' 'Long for' is
    idiomatic, accessible, and conveys strong affectionate desire without overstating
    it. The modal 'would' again reflects the hoped-for scenario.
