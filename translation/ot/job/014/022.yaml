theological_decisions:
- issue: Anthropological sense of נֶפֶשׁ in parallel with flesh
  chosen_reading: Rendered as 'soul' to preserve the poetic body/inner-self contrast.
  alternative_readings:
  - life
  - self
  - inner being
  rationale: The verse poetically juxtaposes bodily pain and inward grief. Translating
    נֶפֶשׁ as 'soul' preserves the tension and imagery without making a dogmatic claim
    about human constitution beyond what the text states.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather
    than resolve it.
