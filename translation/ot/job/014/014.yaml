theological_decisions:
- issue: Whether Job 14:14 should be translated to imply a clear doctrine of resurrection
    or left as a more open question about postmortem renewal.
  chosen_reading: The main text preserves the rhetorical question ('will he live again?')
    and renders חֲלִיפָתִי as 'my renewal' without making the verse a dogmatic assertion
    of resurrection.
  alternative_readings:
  - Translate more minimally as 'my change' to avoid any possible resurrection nuance
  - Translate more explicitly as 'my resurrection' or 'new life'
  rationale: The verse expresses hope and tension rather than a settled doctrinal
    declaration. The translation should preserve that tension, in line with the stated
    philosophy, while still allowing the context to suggest renewed life after death.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
