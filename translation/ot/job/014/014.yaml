id: JOB.14.14
reference: Job 14:14
source:
  edition: WLC
  text: אִם יָמ֥וּת גֶּ֗בֶר הֲ/יִ֫חְיֶ֥ה כָּל יְמֵ֣י צְבָאִ֣/י אֲיַחֵ֑ל עַד בּ֝֗וֹא
    חֲלִיפָתִֽ/י־־־׃
translation:
  text: If a man dies, will he live again? All the days of my hard service I would
    wait, until my renewal comes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my change.' The Hebrew term can mean 'change,' 'relief,' or 'renewal.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  chosen: If
  alternatives:
  - When
  lexicon: HALOT
  rationale: 'Introduces a conditional question: ''If a man dies...'' rather than
    a temporal ''when,'' preserving the rhetorical force of Job''s inquiry.'
- source_word: יָמוּת
  chosen: dies
  alternatives:
  - should die
  lexicon: HALOT
  rationale: Simple imperfect in context is best rendered as a general condition,
    'dies,' in idiomatic English.
- source_word: גֶּבֶר
  chosen: a man
  alternatives:
  - a strong man
  - a human
  lexicon: HALOT
  rationale: Hebrew gever commonly denotes a man, often with emphasis on mortal manhood/strength.
    'A man' is natural English and preserves the gendered singular form in keeping
    with the translation philosophy's gender-accurate principle.
- source_word: הֲיִחְיֶה
  chosen: will he live again?
  alternatives:
  - will he live?
  - can he live again?
  lexicon: HALOT
  rationale: The interrogative plus verb asks whether life follows death. 'Again'
    is not explicit in the verb itself but is strongly implied by the context of death
    followed by life, and it is standard, clear English for the sense here.
- source_word: כָּל יְמֵי
  chosen: All the days of
  alternatives:
  - Throughout all the days of
  lexicon: HALOT
  rationale: A straightforward rendering of the distributive temporal phrase.
- source_word: צְבָאִי
  chosen: my hard service
  alternatives:
  - my warfare
  - my appointed time
  - my service
  lexicon: HALOT
  rationale: The noun צבא can denote military service, service, or a fixed term. In
    Job's lament context it metaphorically refers to the burdensome term of human
    existence. 'My hard service' communicates the hardship without importing a strictly
    military image, while preserving the sense of an assigned, difficult term.
- source_word: אֲיַחֵל
  chosen: I would wait
  alternatives:
  - I would hope
  - I would endure in hope
  lexicon: HALOT
  rationale: The piel of יחל can mean wait/hope. Here, with 'until my renewal comes,'
    the sense of patient waiting is foregrounded, though hope is also present. 'I
    would wait' best fits the syntax and flow.
- source_word: עַד בּוֹא
  chosen: until ... comes
  alternatives:
  - until the coming of
  lexicon: HALOT
  rationale: Infinitive construct with עד is naturally rendered as a temporal clause
    in English.
- source_word: חֲלִיפָתִי
  chosen: my renewal
  alternatives:
  - my relief
  - my change
  - my replacement
  lexicon: HALOT
  rationale: The noun can denote change, replacement, or renewal. In this context
    Job imagines waiting through his hard service until a decisive change arrives.
    'My renewal' fits the possible hope of restored life in the verse while remaining
    broad enough not to overdefine the nature of the change. Because 'change' is a
    major traditional alternative, it is preserved in a footnote.
