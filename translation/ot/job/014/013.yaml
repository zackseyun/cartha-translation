id: JOB.14.13
reference: Job 14:13
source:
  edition: WLC
  text: מִ֤י יִתֵּ֨ן בִּ/שְׁא֬וֹל תַּצְפִּנֵ֗/נִי תַּ֭סְתִּירֵ/נִי עַד שׁ֣וּב אַפֶּ֑/ךָ
    תָּ֤שִׁ֥ית לִ֖/י חֹ֣ק וְ/תִזְכְּרֵֽ/נִי׀־׃
translation:
  text: Oh, that you would hide me in Sheol, that you would conceal me until your
    anger turns back, that you would set a limit for me and remember me!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the grave' or 'in the realm of the dead.' Hebrew 'Sheol.'
    reason: lexical_alternative
  - marker: b
    text: Or 'set an appointed time for me.' The Hebrew noun can denote something
      fixed, prescribed, or bounded.
    reason: alternative_reading
lexical_decisions:
- source_word: מִי יִתֵּן
  chosen: Oh, that you would
  alternatives:
  - Who will give...?
  - If only you would
  lexicon: HALOT
  rationale: This idiom expresses a wish or longing rather than a literal question
    about giving. 'Oh, that you would' captures the optative force in natural English
    while preserving the emotional intensity.
- source_word: בִּשְׁאוֹל
  chosen: in Sheol
  alternatives:
  - in the grave
  - in the underworld
  - in the realm of the dead
  lexicon: HALOT
  rationale: Sheol is best transliterated here because it denotes the Hebrew concept
    of the realm of the dead, not merely a burial place. Rendering it as 'grave' would
    narrow the sense; 'underworld' or 'realm of the dead' are interpretive expansions.
- source_word: תַּצְפִּנֵנִי
  chosen: hide me
  alternatives:
  - store me away
  - treasure me up
  lexicon: HALOT
  rationale: The verb conveys hiding or storing away. 'Hide me' fits the parallelism
    with the next verb and keeps the plea straightforward and idiomatic.
- source_word: תַּסְתִּירֵנִי
  chosen: conceal me
  alternatives:
  - hide me
  lexicon: HALOT
  rationale: Using 'conceal me' for the second verb preserves the poetic parallelism
    without flattening both verbs into identical English. The semantic overlap is
    intentional in Hebrew, but slight variation in English reflects the paired intensification.
- source_word: עַד שׁוּב אַפֶּךָ
  chosen: until your anger turns back
  alternatives:
  - until your anger returns
  - until your wrath turns away
  - until your anger passes
  lexicon: HALOT
  rationale: The phrase literally involves the 'turning/back-turning' of God's anger.
    'Turns back' preserves the verbal imagery better than the more interpretive 'passes,'
    while remaining readable.
- source_word: אַפֶּךָ
  chosen: your anger
  alternatives:
  - your wrath
  - your nose
  lexicon: HALOT
  rationale: Though literally 'your nose,' the idiom means anger. 'Anger' is the clearest
    modern English equivalent; 'wrath' is possible but somewhat weightier and less
    neutral.
- source_word: תָּשִׁית לִי חֹק
  chosen: you would set a limit for me
  alternatives:
  - you would appoint a time for me
  - you would set a statute for me
  - you would fix a boundary for me
  lexicon: HALOT
  rationale: חֹק can denote something prescribed or fixed. In this context Job asks
    for a determined point after concealment when God will remember him. 'Set a limit
    for me' conveys a fixed appointed bound or term without over-specifying whether
    it is a time or decree.
- source_word: חֹק
  chosen: limit
  alternatives:
  - appointed time
  - decree
  - statute
  - boundary
  lexicon: HALOT
  rationale: Here the noun likely refers to something fixed or prescribed for Job,
    probably a set term. 'Limit' preserves the notion of a fixed boundary/term and
    fits the context of waiting until divine anger subsides.
- source_word: וְתִזְכְּרֵנִי
  chosen: and remember me
  alternatives:
  - and call me to mind
  - and think of me
  lexicon: HALOT
  rationale: '''Remember me'' is the natural and theologically resonant rendering,
    preserving the covenantal and relational force of divine remembrance without paraphrase.'
