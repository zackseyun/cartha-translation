theological_decisions:
- issue: Rendering שְׁאוֹל
  chosen_reading: Sheol
  alternative_readings:
  - the grave
  - the realm of the dead
  rationale: The verse expresses Job's wish to be hidden in the place of the dead
    until divine anger subsides. Transliteration avoids importing a later, more developed
    doctrine of hell and avoids reducing the term to mere burial. This preserves the
    Hebrew conceptual world without doctrinal overreach.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; preserve theological tension rather than resolve it.'
