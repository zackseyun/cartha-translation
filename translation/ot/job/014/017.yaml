id: JOB.14.17
reference: Job 14:17
source:
  edition: WLC
  text: חָתֻ֣ם בִּ/צְר֣וֹר פִּשְׁעִ֑/י וַ֝/תִּטְפֹּ֗ל עַל עֲוֺנִֽ/י־׃
translation:
  text: My transgression is sealed up in a bag, and you cover over my iniquity.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'you plaster over,' 'you sew up,' or 'you fasten over' my iniquity. The
      Hebrew verb here is difficult, and the exact image is debated.
    reason: lexical_alternative
lexical_decisions:
- source_word: חָתֻם
  chosen: sealed up
  alternatives:
  - sealed
  - bound up
  lexicon: HALOT
  rationale: Passive participle from חתם conveys something closed and secured with
    a seal. 'Sealed up' preserves the passive/resultative sense and fits the image
    of sins being stored away.
- source_word: בִּצְרוֹר
  chosen: in a bag
  alternatives:
  - in a bundle
  - in a pouch
  lexicon: HALOT
  rationale: צְרוֹר denotes a wrapped bundle, pouch, or bag. 'Bag' is natural modern
    English and preserves the concrete image of something tied up and kept.
- source_word: פִּשְׁעִי
  chosen: my transgression
  alternatives:
  - my rebellion
  - my offense
  lexicon: HALOT
  rationale: פֶּשַׁע often carries the sense of transgression or rebellion. 'Transgression'
    is the most established and suitably weighty rendering here, while avoiding over-interpretation
    toward overt revolt in this poetic context.
- source_word: וַתִּטְפֹּל
  chosen: you cover over
  alternatives:
  - you plaster over
  - you sew up
  - you fasten over
  lexicon: HALOT
  rationale: The verb טפל is difficult here and has been understood as attaching,
    plastering, or covering over. In context with the preceding image of sealing sins
    away, 'you cover over' best communicates the likely sense that God adds a covering
    over Job's iniquity, while remaining readable and not overly technical. The more
    literal possibilities are preserved in a footnote because the exact nuance is
    debated.
- source_word: עַל
  chosen: over
  alternatives:
  - upon
  - to
  lexicon: HALOT
  rationale: With טפל, עַל naturally suggests something applied or laid over something
    else. 'Over' fits the imagery in idiomatic English.
- source_word: עֲוֺנִי
  chosen: my iniquity
  alternatives:
  - my guilt
  - my wrongdoing
  lexicon: HALOT
  rationale: עָוֹן can denote iniquity, guilt, or the consequences of guilt. 'Iniquity'
    preserves the moral weight and keeps distinction from פֶּשַׁע in the first colon;
    'guilt' is possible but narrows the term.
