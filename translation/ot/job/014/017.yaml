theological_decisions:
- issue: Interpretive force of the verse's imagery
  chosen_reading: The verse is rendered as Job describing God as storing up and covering
    over his sins for accounting against him, not as forgiving them.
  alternative_readings:
  - The imagery could be taken as concealment/removal of sin, suggesting forgiveness.
  rationale: 'Within Job''s lament context, the surrounding complaint is that God
    carefully keeps track of Job''s wrongdoing (cf. the previous verse), so the imagery
    is best read negatively: sins are secured and dealt with, not graciously pardoned.
    The translation avoids importing a doctrine of forgiveness that the immediate
    context does not support.'
  doctrine_reference: Translation philosophy §1, §3
