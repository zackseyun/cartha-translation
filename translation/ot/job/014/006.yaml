id: JOB.14.6
reference: Job 14:6
source:
  edition: WLC
  text: שְׁעֵ֣ה מֵ/עָלָ֣י/ו וְ/יֶחְדָּ֑ל עַד יִ֝רְצֶ֗ה כְּ/שָׂכִ֥יר יוֹמֽ/וֹ־׃
translation:
  text: Look away from him, so that he may rest, until he fulfills his day like a
    hired worker.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Look away from him, and let him cease, until he enjoys his day like
      a hired worker.' The Hebrew allows renderings that emphasize either cessation/respite
      or satisfaction at completing the allotted day.
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׁעֵה
  chosen: Look away
  alternatives:
  - Turn your gaze away
  - Look away for a while
  - Leave off
  lexicon: HALOT
  rationale: Imperative 2ms from שעה in the sense of turning one's gaze or attention
    away. In context Job addresses God, asking him to withdraw his scrutinizing attention.
    'Look away' is idiomatic and concise.
- source_word: מֵעָלָיו
  chosen: from him
  alternatives:
  - away from him
  - off him
  lexicon: HALOT
  rationale: Preposition מן + על with 3ms suffix, expressing removal of attention
    or pressure from the man under discussion. 'From him' fits naturally with 'Look
    away.'
- source_word: וְיֶחְדָּל
  chosen: so that he may rest
  alternatives:
  - and he may cease
  - and he may have respite
  - and let him stop
  lexicon: HALOT
  rationale: From חדל, basically 'cease' or 'stop.' In this context the sense is not
    that the man himself stops existing, but that he is allowed a cessation from affliction
    or divine scrutiny. 'Rest' brings out the contextual force while remaining within
    optimal equivalence.
- source_word: עַד
  chosen: until
  alternatives:
  - so that until
  lexicon: HALOT
  rationale: Standard temporal marker introducing the limit of the respite requested.
- source_word: יִרְצֶה
  chosen: he fulfills
  alternatives:
  - he enjoys
  - he is satisfied with
  - he completes
  lexicon: HALOT
  rationale: From רצה, which can mean be pleased with, accept, or enjoy. In the idiom
    with a hired worker and his day, the sense is best taken as reaching or enjoying
    the completion of the allotted workday. 'Fulfills' preserves the notion of bringing
    the day to its due completion without overinterpreting emotional satisfaction.
- source_word: כְּשָׂכִיר
  chosen: like a hired worker
  alternatives:
  - like a hired laborer
  - like a hired man
  lexicon: HALOT
  rationale: שָׂכִיר denotes a wage-earning hired laborer. 'Hired worker' is clear
    modern English and preserves the socioeconomic image.
- source_word: יוֹמוֹ
  chosen: his day
  alternatives:
  - his day of labor
  - his workday
  lexicon: HALOT
  rationale: Literally 'his day.' Because the hired-worker simile already supplies
    the labor context, the simple phrase is retained in the main text.
