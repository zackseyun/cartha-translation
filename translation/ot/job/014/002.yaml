id: JOB.14.2
reference: Job 14:2
source:
  edition: WLC
  text: כְּ/צִ֣יץ יָ֭צָא וַ/יִּמָּ֑ל וַ/יִּבְרַ֥ח כַּ֝/צֵּ֗ל וְ/לֹ֣א יַעֲמֽוֹד׃
translation:
  text: Like a flower he comes out and withers; he flees like a shadow and does not
    remain.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and is cut down'; the Hebrew verb can be understood as either withering/fading
      or being cut off, especially in the flower imagery.
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּצִיץ
  chosen: Like a flower
  alternatives:
  - Like a blossom
  - Like a bloom
  lexicon: HALOT
  rationale: צִיץ denotes a flower/blossom. 'Flower' is the most natural modern English
    rendering and fits the poetic comparison of human frailty.
- source_word: יָצָא
  chosen: he comes out
  alternatives:
  - he comes forth
  - he emerges
  lexicon: HALOT
  rationale: The verb literally means 'go out/come out.' In context of birth and brief
    appearance in life, 'comes out' preserves the concrete imagery without over-paraphrasing.
- source_word: וַיִּמָּל
  chosen: and withers
  alternatives:
  - and is cut down
  - and fades
  lexicon: HALOT
  rationale: The verb from מול in this poetic context is commonly understood as withering/fading
    or being cut off. Given the immediate simile of a flower, 'withers' best preserves
    the natural image in readable English. The alternative 'is cut down' is worth
    preserving because some understand the verb as being cut off rather than simply
    fading.
- source_word: וַיִּבְרַח
  chosen: he flees
  alternatives:
  - he passes away swiftly
  - he runs away
  lexicon: HALOT
  rationale: ברח normally means 'flee.' Retaining 'flees' preserves the vivid verbal
    force of transience rather than flattening it into a mere statement of passing.
- source_word: כַּצֵּל
  chosen: like a shadow
  lexicon: HALOT
  rationale: A straightforward simile for insubstantiality and brevity; 'shadow' is
    the natural equivalent.
- source_word: וְלֹא יַעֲמוֹד
  chosen: and does not remain
  alternatives:
  - and does not stand
  - and does not endure
  lexicon: HALOT
  rationale: עמד literally means 'stand,' but in this context it conveys continuance
    or lasting. 'Does not remain' communicates the sense clearly in modern English
    while preserving the poetic point of impermanence.
