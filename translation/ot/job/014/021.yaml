id: JOB.14.21
reference: Job 14:21
source:
  edition: WLC
  text: יִכְבְּד֣וּ בָ֭נָי/ו וְ/לֹ֣א יֵדָ֑ע וְ֝/יִצְעֲר֗וּ וְֽ/לֹא יָבִ֥ין לָֽ/מוֹ־׃
translation:
  text: His sons come to honor, and he does not know it; they are brought low, and
    he does not perceive it about them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'His sons are honored, and he does not know; they are brought low, and
      he does not discern it concerning them.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יִכְבְּדוּ
  chosen: come to honor
  alternatives:
  - are honored
  - become honored
  - gain honor
  lexicon: HALOT
  rationale: From כבד in the Qal, here with plural subject ('his sons'), the sense
    is becoming weighty/honored. 'Come to honor' is idiomatic English that preserves
    the ingressive/resultative nuance without over-paraphrasing.
- source_word: בָנָיו
  chosen: his sons
  alternatives:
  - his children
  lexicon: HALOT
  rationale: The Hebrew is specifically masculine plural with 3ms suffix, so 'his
    sons' is gender-accurate and follows the stated philosophy rather than neutralizing
    to 'children'.
- source_word: וְלֹא יֵדָע
  chosen: and he does not know it
  alternatives:
  - but he does not know
  - and he does not know
  lexicon: HALOT
  rationale: ידע means 'know.' English supplies 'it' naturally to refer to the preceding
    circumstance. The conjunction is rendered simply as 'and,' matching Hebrew coordination.
- source_word: וְיִצְעֲרוּ
  chosen: they are brought low
  alternatives:
  - they become insignificant
  - they are diminished
  - they are humbled
  lexicon: HALOT
  rationale: From צער, the sense in context is reduction/lowliness/distress in contrast
    with honor in the previous clause. 'Are brought low' captures the reversal and
    reads naturally in English.
- source_word: וְלֹא יָבִין
  chosen: and he does not perceive it
  alternatives:
  - and he does not understand
  - and he does not discern
  lexicon: HALOT
  rationale: בין often carries the sense of understanding/discerning. 'Perceive' fits
    the context of a dead man being unaware of his sons' condition.
- source_word: לָמוֹ
  chosen: about them
  alternatives:
  - concerning them
  - for them
  lexicon: HALOT
  rationale: The pronominal form refers back to the sons. In English, 'perceive it
    about them' makes the relation explicit and avoids an awkwardly literal 'to them/for
    them.'
