id: JOB.14.11
reference: Job 14:11
source:
  edition: WLC
  text: אָֽזְלוּ מַ֭יִם מִנִּי יָ֑ם וְ֝/נָהָ֗ר יֶחֱרַ֥ב וְ/יָבֵֽשׁ־־׃
translation:
  text: As waters disappear from the sea, and a river dries up and withers,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'As waters vanish from the sea, and a river becomes dry and dries out.'
      The Hebrew uses two related verbs for the river, intensifying the picture of
      complete drying.
    reason: lexical_alternative
lexical_decisions:
- source_word: אָזְלוּ
  chosen: disappear
  alternatives:
  - are gone
  - vanish
  - fail
  lexicon: HALOT
  rationale: The verb denotes coming to an end or disappearing. 'Disappear' is natural
    modern English and fits the simile of waters diminishing from a body of water.
    'Are gone' is possible but less vivid; 'vanish' may sound too instantaneous.
- source_word: מַיִם
  chosen: waters
  alternatives:
  - water
  lexicon: HALOT
  rationale: The plural form is idiomatic in Hebrew and is well represented by English
    'waters,' especially in poetic context.
- source_word: מִנִּי
  chosen: from
  alternatives:
  - out of
  - away from
  lexicon: HALOT
  rationale: The preposition marks source or separation. 'From' is the most straightforward
    rendering in English.
- source_word: יָם
  chosen: sea
  alternatives:
  - lake
  lexicon: HALOT
  rationale: The normal sense is 'sea.' In context it may refer more broadly to a
    large body of water, and some English versions use 'lake' to fit the imagery,
    but 'sea' is the plain lexical value and should be retained.
- source_word: נָהָר
  chosen: river
  alternatives:
  - stream
  lexicon: HALOT
  rationale: The noun ordinarily means 'river.' 'Stream' is possible in some contexts
    but is less direct here.
- source_word: יֶחֱרַב
  chosen: dries up
  alternatives:
  - is parched
  - is dried up
  lexicon: HALOT
  rationale: The verb conveys becoming dry or desolate. 'Dries up' is idiomatic for
    a river and pairs well with the following verb.
- source_word: וְיָבֵשׁ
  chosen: withers
  alternatives:
  - becomes dry
  - dries out
  lexicon: HALOT
  rationale: The second verb intensifies the image. Since 'dries up' already renders
    the previous verb, 'withers' preserves the poetic progression without flattening
    both verbs into identical English. The underlying sense remains loss of moisture/dryness.
