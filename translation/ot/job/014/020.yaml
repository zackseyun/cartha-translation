id: JOB.14.20
reference: Job 14:20
source:
  edition: WLC
  text: תִּתְקְפֵ֣/הוּ לָ֭/נֶצַח וַֽ/יַּהֲלֹ֑ךְ מְשַׁנֶּ֥ה פָ֝נָ֗י/ו וַֽ/תְּשַׁלְּחֵֽ/הוּ׃
translation:
  text: You overpower him forever, and he passes away; you alter his face and send
    him away.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and he goes/departs'; the Hebrew verb is literally 'goes,' but here
      likely refers to passing from life or from the human scene.
    reason: lexical_alternative
  - marker: b
    text: Or 'his appearance.' The Hebrew 'face' can refer more broadly to outward
      appearance or countenance.
    reason: lexical_alternative
lexical_decisions:
- source_word: תִּתְקְפֵהוּ
  chosen: you overpower him
  alternatives:
  - you prevail against him
  - you overpower him completely
  lexicon: HALOT
  rationale: From תקף in the Hiphil/imperfect 2ms + 3ms suffix, addressing God directly.
    The sense is becoming strong against someone, prevailing over, or overpowering.
    'You overpower him' is concise, natural English and preserves the force of divine
    dominance better than a weaker 'are strong against him.'
- source_word: לָנֶצַח
  chosen: forever
  alternatives:
  - continually
  - permanently
  - for ever
  lexicon: HALOT
  rationale: נֶצַח commonly denotes enduring duration or perpetuity. Here it intensifies
    the finality of God's prevailing over mortal man. 'Forever' is idiomatic modern
    English and fits the lament's emphasis on irreversible defeat.
- source_word: וַיַּהֲלֹךְ
  chosen: and he passes away
  alternatives:
  - and he goes
  - and he departs
  - and he is gone
  lexicon: HALOT
  rationale: הלך literally means 'go/walk,' but in this context of mortality and divine
    finality it functions idiomatically for departure from life or the human scene.
    'Passes away' communicates the contextual sense without excessive paraphrase;
    the more literal 'goes' is preserved as an alternative.
- source_word: מְשַׁנֶּה
  chosen: you alter
  alternatives:
  - you change
  - disfiguring
  lexicon: HALOT
  rationale: 'From שנה ''to change/alter.'' Although morphologically a participle,
    in context it works predicatively with the second-person address to God: ''you
    alter.'' ''Alter'' preserves the active sense and fits the poetic description
    of changed appearance at death or affliction.'
- source_word: פָנָיו
  chosen: his face
  alternatives:
  - his appearance
  - his countenance
  lexicon: HALOT
  rationale: פנים is literally 'face,' often extended to outward appearance. The Hebrew
    image is concrete, so 'his face' is retained in the main text; the broader sense
    'appearance' is worth preserving in a footnote because the line may refer to the
    visible change brought by suffering or death.
- source_word: וַתְּשַׁלְּחֵהוּ
  chosen: and send him away
  alternatives:
  - and dismiss him
  - and drive him away
  lexicon: HALOT
  rationale: שלח in Piel can mean send away, dismiss, or let go. 'Send him away' is
    the broadest and most transparent rendering, preserving the image of God removing
    man from life without over-specifying whether the nuance is dismissal or expulsion.
