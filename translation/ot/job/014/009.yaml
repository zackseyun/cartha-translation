id: JOB.14.9
reference: Job 14:9
source:
  edition: WLC
  text: מֵ/רֵ֣יחַ מַ֣יִם יַפְרִ֑חַ וְ/עָשָׂ֖ה קָצִ֣יר כְּמוֹ נָֽטַע־׃
translation:
  text: at the scent of water it will bud and produce growth like a planted tree.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and put forth shoots like a plant.' The Hebrew for 'produce growth'
      is concise and may be rendered more specifically as 'bear shoots' or, less likely
      in context, 'produce a harvest.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מֵ/רֵיחַ
  chosen: at the scent of
  alternatives:
  - from the scent of
  - at the smell of
  lexicon: HALOT
  rationale: רֵיחַ literally denotes 'smell, scent.' With prefixed מִן it expresses
    response to the mere scent/proximity of water. 'At the scent of' is idiomatic
    English and preserves the poetic force that even minimal contact with water revives
    the tree.
- source_word: מַיִם
  chosen: water
  alternatives:
  - waters
  lexicon: HALOT
  rationale: Though morphologically plural, מַיִם commonly functions as a mass noun.
    Singular 'water' is natural English.
- source_word: יַפְרִחַ
  chosen: it will bud
  alternatives:
  - it will sprout
  - it will blossom
  lexicon: HALOT
  rationale: Hiphil of פרח can denote budding, sprouting, or blossoming. 'Bud' fits
    the image of renewed life in a cut tree and avoids overstating the stage of growth.
- source_word: וְ/עָשָׂה
  chosen: and produce
  alternatives:
  - and make
  - and bear
  lexicon: HALOT
  rationale: עשה is broad ('do, make'). In this botanical context, 'produce' best
    conveys the emergence of new growth in readable English.
- source_word: קָצִיר
  chosen: growth
  alternatives:
  - shoots
  - harvest
  - branch
  lexicon: HALOT
  rationale: קָצִיר usually means 'harvest,' but in this context many understand it
    as what is produced by the plant, i.e., fresh growth/shoots. 'Growth' captures
    the sense without forcing a more specific botanical term than the Hebrew warrants.
- source_word: כְּמוֹ
  chosen: like
  alternatives:
  - as
  lexicon: HALOT
  rationale: Standard comparative particle; 'like' is the most natural English equivalent
    here.
- source_word: נָטַע
  chosen: a planted tree
  alternatives:
  - a plant
  - that which is planted
  lexicon: HALOT
  rationale: The noun refers to something planted. Because the broader context is
    a tree cut down yet reviving, 'a planted tree' makes the implied referent explicit
    in English while remaining faithful to the imagery.
