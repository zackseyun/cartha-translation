theological_decisions:
- issue: Referent of the third-person singular pronouns
  chosen_reading: God is addressed indirectly as 'him/his' rather than directly as
    'you/your.'
  alternative_readings:
  - 'Direct address: ''Remove your rod from me, and do not let your terror frighten
    me.'''
  rationale: The Hebrew forms are third person singular with third-person suffixes,
    matching Job’s speech about God in this section. The translation preserves that
    grammar rather than smoothing it into direct address.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
