id: JOB.9.34
reference: Job 9:34
source:
  edition: WLC
  text: יָסֵ֣ר מֵ/עָלַ֣/י שִׁבְט֑/וֹ וְ֝/אֵמָת֗/וֹ אַֽל תְּבַעֲתַֽ/נִּי־׃
translation:
  text: Let him remove his rod from upon me, and let not his terror frighten me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Let him turn aside his rod from me, and let not his dread terrify me.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יָסֵר
  chosen: let him remove
  alternatives:
  - may he remove
  - let him turn aside
  lexicon: HALOT
  rationale: Hiphil of סור here functions jussively in context, expressing Job’s wish/request.
    'Let him remove' preserves the volitional force in natural English.
- source_word: מֵעָלַי
  chosen: from upon me
  alternatives:
  - from me
  - off me
  lexicon: HALOT
  rationale: Literally 'from upon me.' Retaining 'from upon me' reflects the Hebrew
    image of something resting heavily on Job, while remaining intelligible.
- source_word: שִׁבְטוֹ
  chosen: his rod
  alternatives:
  - his staff
  - his scepter
  lexicon: HALOT
  rationale: שֵׁבֶט commonly denotes a rod/staff/scepter. In this suffering context,
    'rod' best conveys an instrument of striking or discipline rather than royal rule.
- source_word: וְאֵמָתוֹ
  chosen: and his terror
  alternatives:
  - and his dread
  - and his fearfulness
  lexicon: HALOT
  rationale: אֵימָה denotes terror or dread. 'His terror' most naturally expresses
    the overwhelming fear inspired by God’s presence or pressure in context.
- source_word: אַל
  chosen: let not
  alternatives:
  - do not let
  - may not
  lexicon: HALOT
  rationale: Negative particle used with the following verb in a jussive-like prohibition/wish.
    'Let not' fits the elevated poetic register without becoming archaic beyond readability.
- source_word: תְּבַעֲתַנִּי
  chosen: frighten me
  alternatives:
  - terrify me
  - dismay me
  lexicon: HALOT
  rationale: From בעת, 'to terrify, startle, frighten.' 'Frighten me' gives clear
    modern English; 'terrify me' is possible, but using 'terror' immediately before
    would create awkward repetition.
