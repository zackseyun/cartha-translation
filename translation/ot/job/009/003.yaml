id: JOB.9.3
reference: Job 9:3
source:
  edition: WLC
  text: אִם יַ֭חְפֹּץ לָ/רִ֣יב עִמּ֑/וֹ לֹֽא יַ֝עֲנֶ֗/נּוּ אַחַ֥ת מִנִּי אָֽלֶף־־־׃
translation:
  text: If one wished to contend with him, he could not answer him one time out of
    a thousand.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'If he wished to dispute with him' or 'If he desired to litigate with
      him.' The Hebrew verb for 'contend' can carry legal-dispute nuance.
    reason: lexical_alternative
  - marker: b
    text: Literally 'he would not/could not answer him one from a thousand'; the sense
      is that he could not answer even once in a thousand times.
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  chosen: If
  alternatives:
  - Though
  - When
  lexicon: HALOT
  rationale: Introduces a conditional clause. 'If' is the most straightforward rendering
    in context.
- source_word: יַחְפֹּץ
  chosen: wished
  alternatives:
  - desired
  - took pleasure
  - were willing
  lexicon: HALOT
  rationale: חפץ denotes desire or willingness. 'Wished' fits the hypothetical condition
    naturally in English without overstating emotional delight.
- source_word: לָרִיב
  chosen: to contend
  alternatives:
  - to dispute
  - to litigate
  - to argue a case
  lexicon: HALOT
  rationale: ריב can carry legal-dispute overtones. 'Contend' preserves both adversarial
    and potentially forensic nuance without becoming too technical.
- source_word: עִמּוֹ
  chosen: with him
  alternatives:
  - against him
  lexicon: HALOT
  rationale: The preposition is literally 'with him,' but in a dispute context it
    can imply opposition. Main text keeps the formal sense 'with him'; the adversarial
    nuance is carried by 'contend'.
- source_word: לֹא יַעֲנֶנּוּ
  chosen: he could not answer him
  alternatives:
  - he would not answer him
  - he could not respond to him
  - he could not answer him back
  lexicon: HALOT
  rationale: ענה here means 'answer/respond.' In context of disputing with God, the
    sense is inability rather than mere refusal, so 'could not answer him' best captures
    Job's point.
- source_word: אַחַת
  chosen: one time
  alternatives:
  - once
  - one thing
  lexicon: HALOT
  rationale: Here 'one' functions adverbially with the following phrase 'out of a
    thousand.' 'One time' makes the idiomatic force explicit in modern English.
- source_word: מִנִּי אָלֶף
  chosen: out of a thousand
  alternatives:
  - from a thousand
  - among a thousand
  lexicon: HALOT
  rationale: An idiom expressing extreme disproportion. 'Out of a thousand' is natural
    English and preserves the hyperbolic comparison.
