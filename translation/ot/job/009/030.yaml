id: JOB.9.30
reference: Job 9:30
source:
  edition: WLC
  text: אִם הִתְרָחַ֥צְתִּי במו שָׁ֑לֶג וַ֝/הֲזִכּ֗וֹתִי בְּ/בֹ֣ר כַּפָּֽ/י־־׃
translation:
  text: If I washed myself with snow and cleansed my hands with lye,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with soap'; the Hebrew term refers more precisely to an alkaline cleansing
      agent such as lye.
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  chosen: If
  alternatives:
  - Though
  - Even if
  lexicon: HALOT
  rationale: Introduces a hypothetical condition in Job's argument. 'If' is the most
    straightforward English conditional marker here.
- source_word: הִתְרָחַצְתִּי
  chosen: I washed myself
  alternatives:
  - I bathed myself
  - I cleansed myself
  lexicon: HALOT
  rationale: Hitpael of רחץ is reflexive, indicating self-washing. 'Washed myself'
    is natural modern English and preserves the reflexive sense.
- source_word: במו שָׁלֶג
  chosen: with snow
  alternatives:
  - in snow
  - with snow-water
  lexicon: HALOT
  rationale: The phrase denotes washing by means of snow, likely emphasizing the purest
    available cleansing agent. 'With snow' is concise and idiomatic; 'snow-water'
    is interpretive and not explicit in the Hebrew.
- source_word: וַהֲזִכּוֹתִי
  chosen: and cleansed
  alternatives:
  - and made clean
  - and purified
  lexicon: HALOT
  rationale: From זכה in the Hiphil, meaning to make clean/pure. 'Cleansed' fits the
    parallelism with washing and keeps the ritual/moral resonance without overinterpreting.
- source_word: בְּבֹר
  chosen: with lye
  alternatives:
  - with soap
  - with alkali
  lexicon: HALOT
  rationale: בֹּר refers to an alkaline cleansing substance, not modern soap in the
    ordinary sense. 'Lye' best captures the ancient cleaning agent in readable English;
    'soap' is traditional but less precise.
- source_word: כַּפָּי
  chosen: my hands
  alternatives:
  - my palms
  lexicon: HALOT
  rationale: Though literally 'my palms,' English idiom prefers 'my hands' in a cleansing
    context. This preserves the sense naturally.
