id: JOB.9.31
reference: Job 9:31
source:
  edition: WLC
  text: אָ֭ז בַּ/שַּׁ֣חַת תִּטְבְּלֵ֑/נִי וְ֝/תִֽעֲב֗וּ/נִי שַׂלְמוֹתָֽ/י׃
translation:
  text: then you would plunge me into the pit, and my own clothes would abhor me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'into the ditch.' The Hebrew שַׁחַת can mean 'pit,' 'ditch,' or, in some
      contexts, 'destruction.'
    reason: lexical_alternative
  - marker: b
    text: Or 'my garments would loathe me.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אָז
  chosen: then
  alternatives:
  - so then
  - at that time
  lexicon: HALOT
  rationale: 'Temporal/sequential adverb continuing Job''s argument from the previous
    verse: even if he were to wash himself, then this would follow.'
- source_word: בַּשַּׁחַת
  chosen: into the pit
  alternatives:
  - in the pit
  - into the ditch
  lexicon: HALOT
  rationale: שַׁחַת can denote a pit, ditch, or destruction. Here the concrete image
    of being plunged into filth or a pit fits the washing imagery and the preposition
    ב with motion verb can be rendered idiomatically as 'into.' 'Pit' preserves the
    vivid metaphor without over-specifying 'destruction.'
- source_word: תִּטְבְּלֵנִי
  chosen: you would plunge me
  alternatives:
  - you would dip me
  - you would immerse me
  lexicon: HALOT
  rationale: From טבל, 'dip/immerse.' In context, after Job's hypothetical self-cleansing,
    the sense is that God would thrust him back into uncleanness. 'Plunge' is idiomatic
    and forceful while remaining faithful to the image.
- source_word: וְתִעֲבוּנִי
  chosen: would abhor me
  alternatives:
  - would detest me
  - would loathe me
  lexicon: HALOT
  rationale: From תעב, 'to abhor, detest.' The plural verb with singular subject following
    is naturally taken with the plural noun 'my clothes.' 'Abhor me' preserves the
    strong revulsion language.
- source_word: שַׂלְמוֹתַי
  chosen: my own clothes
  alternatives:
  - my garments
  - my clothing
  lexicon: HALOT
  rationale: Refers to outer garments/clothes. 'My own clothes' brings out the irony
    that even what belongs most closely to Job would recoil from him.
