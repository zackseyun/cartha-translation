theological_decisions:
- issue: Cosmic imagery of divine sovereignty over creation
  chosen_reading: Retain the poetic depiction of God alone stretching out the heavens
    and treading on the sea without reducing it to a mere metaphor or importing later
    doctrinal claims.
  alternative_readings:
  - Interpret 'treads on the heights of the sea' more dynamically as 'walks on the
    waves'
  rationale: The verse presents God's unique sovereignty in elevated poetic language.
    The translation preserves that imagery while avoiding unnecessary doctrinal expansion.
    A more interpretive rendering is worth preserving in a footnote because it captures
    the likely sense of the idiom.
  doctrine_reference: Translation philosophy §§1, 3, 6
