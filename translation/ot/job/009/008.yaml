id: JOB.9.8
reference: Job 9:8
source:
  edition: WLC
  text: נֹטֶ֣ה שָׁמַ֣יִם לְ/בַדּ֑/וֹ וְ֝/דוֹרֵ֗ךְ עַל בָּ֥מֳתֵי יָֽם־׃
translation:
  text: who alone stretches out the heavens and treads on the heights of the sea.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'walks on the waves of the sea.'
    reason: lexical_alternative
lexical_decisions:
- source_word: נֹטֶה
  chosen: stretches out
  alternatives:
  - spreads out
  - extends
  lexicon: HALOT
  rationale: The Qal participle of נטה commonly denotes stretching out or spreading
    out. 'Stretches out' is natural modern English and preserves the ongoing/descriptive
    force in context.
- source_word: שָׁמַיִם
  chosen: the heavens
  alternatives:
  - the sky
  - heaven
  lexicon: HALOT
  rationale: In poetic cosmological context, שָׁמַיִם refers to the heavens rather
    than merely the visible sky. The plural-form English 'the heavens' best matches
    the Hebrew usage.
- source_word: לְבַדּוֹ
  chosen: alone
  alternatives:
  - by himself
  lexicon: HALOT
  rationale: The phrase emphasizes God's solitary, unaided action. 'Alone' is concise
    and idiomatic, preserving the exclusivity.
- source_word: וְדוֹרֵךְ
  chosen: and treads
  alternatives:
  - and walks
  - and tramples
  lexicon: HALOT
  rationale: דרך in the Qal can mean tread or march upon. 'Treads' preserves the vivid
    physical metaphor without overinterpreting it as destructive ('tramples').
- source_word: עַל
  chosen: 'on'
  alternatives:
  - upon
  lexicon: HALOT
  rationale: Standard prepositional sense; 'on' is clear modern English.
- source_word: בָּמֳתֵי
  chosen: the heights
  alternatives:
  - the high places
  - the waves
  - the back
  lexicon: HALOT
  rationale: במה normally means height/high place. In the construct phrase 'heights
    of the sea,' the image is of elevated sea-surfaces, i.e., waves. The main text
    keeps the metaphor more formally as 'heights' rather than collapsing it into interpretation.
- source_word: יָם
  chosen: the sea
  alternatives:
  - the seas
  lexicon: HALOT
  rationale: Singular 'sea' matches the Hebrew and suits the cosmic-poetic imagery.
