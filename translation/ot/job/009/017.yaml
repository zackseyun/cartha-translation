theological_decisions:
- issue: Whether חִנָּם implies Job's innocence before God in an absolute moral sense
    or expresses Job's perception of undeserved suffering
  chosen_reading: Render the adverb straightforwardly as 'without cause' without softening
    or resolving the theological tension.
  alternative_readings:
  - for no reason
  - without my deserving it
  rationale: The verse voices Job's complaint and should retain its force. The translation
    should not dilute Job's protest, nor should it import a doctrinal resolution about
    divine justice that the verse itself does not state. This preserves the tension
    central to the book.
  doctrine_reference: Preserve theological tension rather than resolve it.
