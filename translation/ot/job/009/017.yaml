id: JOB.9.17
reference: Job 9:17
source:
  edition: WLC
  text: אֲשֶׁר בִּ/שְׂעָרָ֥ה יְשׁוּפֵ֑/נִי וְ/הִרְבָּ֖ה פְצָעַ֣/י חִנָּֽם־׃
translation:
  text: who crushes me in a storm and multiplies my wounds without cause.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with a storm' or 'in the tempest.' The Hebrew preposition can express
      manner or instrument.
    reason: lexical_alternative
  - marker: b
    text: The verb may also be rendered 'bruise' or, less likely here, 'snap at.'
    reason: lexical_alternative
  - marker: c
    text: Or 'for no reason' or 'gratuitously.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲשֶׁר
  chosen: who
  alternatives:
  - he who
  - the one who
  lexicon: HALOT
  rationale: Relative pronoun introducing the description of God from the previous
    context. 'Who' is the most natural English connector here.
- source_word: בִּשְׂעָרָה
  chosen: in a storm
  alternatives:
  - with a storm
  - in the tempest
  - with a tempest
  lexicon: HALOT
  rationale: שְׂעָרָה denotes storm, tempest, whirlwind. The preposition ב can be
    rendered instrumentally ('with') or locatively/manner ('in'). 'In a storm' preserves
    the vivid imagery and reads naturally in English without over-specifying instrumentality.
- source_word: יְשׁוּפֵנִי
  chosen: crushes me
  alternatives:
  - bruises me
  - snaps at me
  - strikes me
  lexicon: HALOT
  rationale: The verb שׁוּף is rare and context-sensitive. In Job 9:17, with God as
    subject and Job as object, the sense is forceful injury rather than mere contact.
    'Crushes me' best fits the parallel with multiplied wounds and conveys severe
    affliction. 'Bruises me' is possible but weaker; 'snaps at me' reflects another
    contextual possibility elsewhere but is less fitting here.
- source_word: וְהִרְבָּה
  chosen: and multiplies
  alternatives:
  - and increases
  - and makes many
  lexicon: HALOT
  rationale: Hiphil of רבה means to make many/increase. 'Multiplies' is concise, vivid,
    and fits the object 'my wounds' well.
- source_word: פְצָעַי
  chosen: my wounds
  alternatives:
  - my injuries
  - my blows
  lexicon: HALOT
  rationale: פצע refers to wound or injury. 'Wounds' is the most direct and idiomatic
    rendering in this poetic context.
- source_word: חִנָּם
  chosen: without cause
  alternatives:
  - for no reason
  - gratuitously
  - in vain
  lexicon: HALOT
  rationale: חִנָּם commonly means gratuitously, without cause, for nothing. 'Without
    cause' preserves the forensic and moral force of Job's complaint better than the
    more colloquial 'for no reason.'
