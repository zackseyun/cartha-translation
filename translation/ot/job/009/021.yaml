id: JOB.9.21
reference: Job 9:21
source:
  edition: WLC
  text: תָּֽם אָ֭נִי לֹֽא אֵדַ֥ע נַפְשִׁ֗/י אֶמְאַ֥ס חַיָּֽ/י־־׃
translation:
  text: I am blameless; I do not know myself; I despise my life.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I do not know my soul/self,' preserving the broader sense of Hebrew
      nephesh.
    reason: lexical_alternative
lexical_decisions:
- source_word: תָּם
  chosen: blameless
  alternatives:
  - integrity
  - innocent
  lexicon: HALOT
  rationale: תָּם denotes completeness/integrity and in Job often carries the sense
    of being blameless or upright rather than sinless perfection. 'Blameless' is idiomatic
    English and fits Job's self-description in context without overstating absolute
    moral perfection.
- source_word: אָ֭נִי
  chosen: I
  rationale: Straightforward first-person singular pronoun, retained explicitly for
    emphasis as in the Hebrew clause.
- source_word: לֹא אֵדַע
  chosen: I do not know
  alternatives:
  - I do not acknowledge
  - I care not for
  lexicon: HALOT
  rationale: יָדַע normally means 'know.' In this context with נַפְשִׁי it likely
    expresses estrangement from or disregard for himself. The basic gloss 'know' preserves
    the Hebrew's starkness and ambiguity better than an interpretive paraphrase.
- source_word: נַפְשִׁי
  chosen: myself
  alternatives:
  - my soul
  - my life
  lexicon: HALOT
  rationale: נֶפֶשׁ can mean soul, self, or life. Here 'I do not know my nephesh'
    is unnatural in English if rendered woodenly. 'Myself' best conveys the reflexive
    sense in context while preserving the existential force. Alternatives are viable
    and worth preserving in a footnote because the Hebrew term is broader than the
    English gloss.
- source_word: אֶמְאַס
  chosen: I despise
  alternatives:
  - I reject
  - I loathe
  lexicon: HALOT
  rationale: מָאַס means reject/despise. 'Despise' fits the emotional force and pairs
    naturally with 'my life' in English. 'Loathe' is possible but slightly stronger
    and more interpretive.
- source_word: חַיָּי
  chosen: my life
  alternatives:
  - my living
  - my days
  lexicon: HALOT
  rationale: From חַיִּים, here with first-person suffix, referring to Job's life/living
    existence. 'My life' is the most natural and contextually clear rendering.
