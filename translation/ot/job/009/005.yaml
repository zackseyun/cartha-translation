id: JOB.9.5
reference: Job 9:5
source:
  edition: WLC
  text: הַ/מַּעְתִּ֣יק הָ֭רִים וְ/לֹ֣א יָדָ֑עוּ אֲשֶׁ֖ר הֲפָכָ֣/ם בְּ/אַפּֽ/וֹ׃
translation:
  text: He removes mountains, and they do not know it, when he overturns them in his
    anger.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'He moves mountains.' The Hebrew verb can denote causing something to
      shift from its place.
    reason: lexical_alternative
  - marker: b
    text: The line poetically personifies the mountains as not knowing when God overturns
      them.
    reason: cultural_note
  - marker: c
    text: Or 'in his wrath.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַמַּעְתִּיק
  chosen: removes
  alternatives:
  - moves
  - transplants
  lexicon: HALOT
  rationale: The Hiphil participle of עתק here denotes causing something to be moved
    from its place. 'Removes' is natural English and fits the context of cosmic power;
    'moves' is possible but slightly weaker, and 'transplants' is too concrete for
    mountains in this poetic context.
- source_word: הָרִים
  chosen: mountains
  lexicon: HALOT
  rationale: Standard rendering of הָרִים. The plural is retained.
- source_word: וְלֹא יָדָעוּ
  chosen: and they do not know it
  alternatives:
  - without their knowing
  - and they do not know
  lexicon: HALOT
  rationale: The verb ידע with plural subject most naturally yields 'they do not know.'
    Because English can find the object implicit awkward here, 'it' is supplied to
    clarify the sense that the mountains are unaware of their removal. This preserves
    the Hebrew's personifying poetry without over-paraphrasing.
- source_word: אֲשֶׁר
  chosen: when
  alternatives:
  - that
  - who
  lexicon: HALOT
  rationale: 'In context אֲשֶׁר introduces the circumstance in which the mountains
    do not know: namely, when he overturns them. ''When'' communicates the temporal/circumstantial
    force more idiomatically than a wooden ''that''.'
- source_word: הֲפָכָם
  chosen: he overturns them
  alternatives:
  - he overturns
  - he upends them
  lexicon: HALOT
  rationale: From הפך, 'turn, overturn.' 'Overturns them' best captures the violent
    reversal in context and makes explicit the pronominal suffix '-ם' ('them').
- source_word: בְּאַפּוֹ
  chosen: in his anger
  alternatives:
  - in his wrath
  - by his anger
  lexicon: HALOT
  rationale: אַף literally refers to nose/anger and idiomatically means anger or wrath.
    'In his anger' is clear modern English and preserves the instrumental/circumstantial
    sense. 'Wrath' is possible but somewhat more elevated.
