id: JOB.9.11
reference: Job 9:11
source:
  edition: WLC
  text: הֵ֤ן יַעֲבֹ֣ר עָ֭לַ/י וְ/לֹ֣א אֶרְאֶ֑ה וְ֝/יַחֲלֹ֗ף וְֽ/לֹא אָבִ֥ין לֽ/וֹ־׃
translation:
  text: Look, he passes by me, and I do not see him; he moves on, and I do not perceive
    him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Behold' for 'Look.'
    reason: lexical_alternative
  - marker: b
    text: Or 'passes over me' / 'goes by me' for 'passes by me.'
    reason: lexical_alternative
  - marker: c
    text: Or 'I do not understand him'; the Hebrew can denote discernment or understanding.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֵן
  chosen: Look
  alternatives:
  - Behold
  - Indeed
  lexicon: HALOT
  rationale: Introduces an emphatic observation. 'Look' preserves the vivid deictic
    force in readable modern English better than the more archaic 'Behold,' while
    retaining Job's immediacy.
- source_word: יַעֲבֹר
  chosen: passes by
  alternatives:
  - passes over
  - goes by
  lexicon: HALOT
  rationale: From עבר, here describing movement past Job. 'Passes by' is idiomatic
    and fits the following prepositional phrase עָלַי in context without implying
    physical trampling or spatial 'over' too strongly.
- source_word: עָלַי
  chosen: by me
  alternatives:
  - over me
  - past me
  - upon me
  lexicon: HALOT
  rationale: Although על often means 'upon/over,' with עבר it can express movement
    in relation to a person. 'By me' best captures the sense that God passes near
    enough to be present yet remains imperceptible.
- source_word: אֶרְאֶה
  chosen: I do not see him
  alternatives:
  - I cannot see him
  - I do not behold him
  lexicon: HALOT
  rationale: Simple negated first-person imperfect of ראה. 'I do not see him' is the
    most direct rendering. 'Cannot' would add inability more explicitly than the Hebrew
    states.
- source_word: יַחֲלֹף
  chosen: moves on
  alternatives:
  - passes on
  - sweeps past
  - glides by
  lexicon: HALOT
  rationale: From חלף, conveying passing on or away. 'Moves on' distinguishes it slightly
    from the first verb while preserving the parallelism and sense of continued motion.
- source_word: אָבִין לוֹ
  chosen: I do not perceive him
  alternatives:
  - I do not understand him
  - I do not notice him
  - I am not aware of him
  lexicon: HALOT
  rationale: בין commonly means 'understand/discern.' In this context of imperceptible
    divine passing, 'perceive him' best expresses experiential discernment rather
    than intellectual comprehension alone. The pronominal לוֹ is taken as referring
    to him ('of him/him') in idiomatic English.
