theological_decisions:
- issue: Reference of the third-person subject and suffixes
  chosen_reading: The subject and pronouns refer to God.
  alternative_readings:
  - An indefinite 'one' passes by
  rationale: In the immediate context Job is describing God's unsearchable activity
    (Job 9:10–12). Rendering with explicit English pronouns ('he...him') preserves
    the personal reference without adding a divine title not present in the verse
    itself.
