theological_decisions:
- issue: Cosmological imagery of the earth's pillars
  chosen_reading: Retain the poetic image literally as 'its pillars'
  alternative_readings:
  - Interpret as 'its foundations' to reflect modern cosmology
  rationale: The verse uses ancient poetic cosmological language. The translation
    should preserve the imagery of the Hebrew text rather than modernize or demythologize
    it. This is a literary-cosmological image, not a doctrinal assertion requiring
    harmonization.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Preserve theological tension rather than resolve it.'
