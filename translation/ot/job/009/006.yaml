id: JOB.9.6
reference: Job 9:6
source:
  edition: WLC
  text: הַ/מַּרְגִּ֣יז אֶ֭רֶץ מִ/מְּקוֹמָ֑/הּ וְ֝/עַמּוּדֶ֗י/הָ יִתְפַלָּצֽוּ/ן׃
translation:
  text: who shakes the earth from its place, and its pillars tremble.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'quake' or 'shudder' for 'tremble.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַמַּרְגִּיז
  chosen: who shakes
  alternatives:
  - who makes quake
  - who agitates
  - who causes to tremble
  lexicon: HALOT
  rationale: Hiphil participle of רגז, functioning here in Job's description of God
    by a relative-like participial clause. 'Who shakes' is natural English and preserves
    the causative force without overcomplicating the line.
- source_word: אֶרֶץ
  chosen: the earth
  alternatives:
  - the land
  lexicon: HALOT
  rationale: In this cosmic context, with the earth removed from its place and its
    pillars reacting, 'earth' fits better than the more local 'land'.
- source_word: מִמְּקוֹמָהּ
  chosen: from its place
  alternatives:
  - out of its place
  lexicon: HALOT
  rationale: A straightforward rendering of the preposition plus noun with 3fs suffix.
    'From its place' is idiomatic and preserves the image of cosmic displacement.
- source_word: וְעַמּוּדֶיהָ
  chosen: and its pillars
  alternatives:
  - and its columns
  - and its foundations
  lexicon: HALOT
  rationale: עמוד normally denotes a pillar or column. 'Pillars' preserves the poetic
    cosmological imagery rather than flattening it into an interpretive term like
    'foundations'.
- source_word: יִתְפַלָּצוּן
  chosen: tremble
  alternatives:
  - quake
  - shudder
  - are terrified
  lexicon: HALOT
  rationale: The verb conveys violent shaking or trembling. 'Tremble' fits the poetic
    parallel with 'shakes' and avoids over-psychologizing the image, though 'shudder'
    is also possible.
