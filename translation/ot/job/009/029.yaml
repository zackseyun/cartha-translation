theological_decisions:
- issue: Forensic versus moral sense of רשע
  chosen_reading: 'forensic: ''will be condemned'''
  alternative_readings:
  - 'moral/descriptive: ''I will be wicked'''
  rationale: The surrounding context concerns Job's inability to prove himself righteous
    before God and the inevitability of being treated as guilty despite efforts at
    cleansing (vv. 28–31). A judicial rendering preserves the argument without importing
    extra doctrinal claims.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
