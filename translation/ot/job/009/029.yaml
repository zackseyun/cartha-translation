id: JOB.9.29
reference: Job 9:29
source:
  edition: WLC
  text: אָנֹכִ֥י אֶרְשָׁ֑ע לָ/מָּה זֶּ֝֗ה הֶ֣בֶל אִיגָֽע־׃
translation:
  text: I will be condemned; why then should I labor in vain?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'I will be wicked'; the Hebrew verb can carry either a moral sense ('be
      wicked') or a forensic sense ('be declared guilty/condemned').
    reason: alternative_reading
lexical_decisions:
- source_word: אָנֹכִי
  chosen: I
  lexicon: HALOT
  rationale: Independent first-person pronoun used for emphasis; English retains the
    explicit subject with 'I'.
- source_word: אֶרְשָׁע
  chosen: will be condemned
  alternatives:
  - will be wicked
  - will be found guilty
  - am condemned
  lexicon: HALOT
  rationale: From רשע in the Qal, which can mean 'be wicked' or in forensic contexts
    'be declared guilty/condemned.' In Job's argument about inability to establish
    innocence before God, the forensic sense best fits the context. Future nuance
    is retained with 'will be condemned.'
- source_word: לָמָה
  chosen: why then
  alternatives:
  - why
  - for what reason then
  lexicon: HALOT
  rationale: Interrogative 'why'; 'then' brings out the inferential force in context
    without overtranslating.
- source_word: זֶּה
  chosen: then
  alternatives:
  - this
  - in this
  lexicon: HALOT
  rationale: 'Literally ''this,'' but in the idiom לָמָה זֶּה it functions adverbially:
    ''why then?'' or ''why, in that case?'' Rendering the idiom naturally in English
    best reflects the sense.'
- source_word: הֶבֶל
  chosen: in vain
  alternatives:
  - for nothing
  - vainly
  - emptily
  lexicon: HALOT
  rationale: הבל often denotes emptiness, futility, or vanity. Here it modifies Job's
    effort as futile, so 'in vain' is the most idiomatic English equivalent.
- source_word: אִיגָע
  chosen: should I labor
  alternatives:
  - do I toil
  - should I weary myself
  - do I struggle
  lexicon: HALOT
  rationale: From יגע, 'to toil, labor, grow weary.' In this rhetorical question,
    'should I labor' communicates both effort and futility in smooth English.
