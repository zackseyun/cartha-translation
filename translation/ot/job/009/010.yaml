id: JOB.9.10
reference: Job 9:10
source:
  edition: WLC
  text: עֹשֶׂ֣ה גְ֭דֹלוֹת עַד אֵ֣ין חֵ֑קֶר וְ/נִפְלָא֗וֹת עַד אֵ֥ין מִסְפָּֽר־־׃
translation:
  text: who does great things beyond searching out, and wonders beyond number.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'past finding out.' The Hebrew idiom means that his great acts cannot
      be fully investigated or comprehended.
    reason: lexical_alternative
  - marker: b
    text: Or 'without number.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עֹשֶׂה
  chosen: who does
  alternatives:
  - doing
  - maker of
  lexicon: HALOT
  rationale: Qal participle of עשה functions here in a relative/descriptive sense
    referring back to God in the previous context. English 'who does' preserves the
    participial force naturally in context better than a bare participle 'doing.'
- source_word: גְדֹלוֹת
  chosen: great things
  alternatives:
  - great deeds
  - great works
  lexicon: HALOT
  rationale: 'The feminine plural adjective is substantivized: ''great things.'' This
    is broad enough to include mighty acts without over-specifying ''deeds'' or ''works.'''
- source_word: עַד אֵין חֵקֶר
  chosen: beyond searching out
  alternatives:
  - past finding out
  - without investigation
  - so that there is no searching out
  lexicon: HALOT
  rationale: The idiom expresses that God's acts are beyond human investigation or
    comprehension. 'Beyond searching out' is clear modern English and retains the
    sense of unsearchability without archaic phrasing like 'past finding out.'
- source_word: וְנִפְלָאוֹת
  chosen: and wonders
  alternatives:
  - and marvelous things
  - and wondrous deeds
  lexicon: HALOT
  rationale: נפלאות commonly denotes wondrous or extraordinary acts. 'Wonders' is
    concise, idiomatic, and preserves the sense of awe-inspiring acts.
- source_word: עַד אֵין מִסְפָּר
  chosen: beyond number
  alternatives:
  - without number
  - so that there is no number
  lexicon: HALOT
  rationale: The phrase means innumerable. 'Beyond number' is a natural English equivalent
    that mirrors the parallel structure with 'beyond searching out.'
