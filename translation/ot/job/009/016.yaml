id: JOB.9.16
reference: Job 9:16
source:
  edition: WLC
  text: אִם קָרָ֥אתִי וַֽ/יַּעֲנֵ֑/נִי לֹֽא אַ֝אֲמִ֗ין כִּֽי יַאֲזִ֥ין קוֹלִֽ/י־־־׃
translation:
  text: If I called and he answered me, I would not believe that he was listening
    to my voice.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'If I cried out and he answered me, I would not believe that he had given
      ear to my voice.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  chosen: If
  alternatives:
  - Though
  - When
  lexicon: HALOT
  rationale: Introduces a conditional or hypothetical scenario. 'If' best fits Job's
    concessive-hypothetical statement here without overinterpreting it as temporal
    ('when').
- source_word: קָרָאתִי
  chosen: I called
  alternatives:
  - I cried out
  - I summoned
  lexicon: HALOT
  rationale: קרא commonly means 'call' or 'cry out.' In this prayer/legal-appeal context,
    'called' is broad and natural; 'cried out' is possible but slightly more emotive
    than the Hebrew requires.
- source_word: וַיַּעֲנֵנִי
  chosen: and he answered me
  alternatives:
  - and he responded to me
  lexicon: HALOT
  rationale: ענה in this stem commonly means 'answer, respond.' 'Answered me' is the
    most idiomatic and direct rendering.
- source_word: לֹא אַאֲמִין
  chosen: I would not believe
  alternatives:
  - I do not believe
  - I could not believe
  lexicon: HALOT
  rationale: 'The imperfect in this conditional setting is best rendered with English
    modal force: ''would not believe.'' This preserves the hypothetical sense created
    by אִם plus the preceding verbal sequence.'
- source_word: כִּי
  chosen: that
  alternatives:
  - because
  - for
  lexicon: HALOT
  rationale: 'Here כִּי introduces the content of what Job would not believe, not
    a causal clause. ''That'' best reflects the syntax: he would not believe that
    God was listening.'
- source_word: יַאֲזִין
  chosen: was listening
  alternatives:
  - would listen
  - gave ear
  - heard
  lexicon: HALOT
  rationale: אזן means 'give ear, listen attentively.' 'Was listening' fits the subordinate
    clause after 'would not believe that' and preserves the nuance of attentive hearing
    better than the flatter 'heard.'
- source_word: קוֹלִי
  chosen: my voice
  alternatives:
  - my sound
  - what I said
  - my plea
  lexicon: HALOT
  rationale: קוֹל is literally 'voice/sound.' 'My voice' is the most direct rendering;
    'my plea' would interpret the sense rather than translate the lexical form.
