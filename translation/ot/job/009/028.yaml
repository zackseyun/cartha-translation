id: JOB.9.28
reference: Job 9:28
source:
  edition: WLC
  text: יָגֹ֥רְתִּי כָל עַצְּבֹתָ֑/י יָ֝דַ֗עְתִּי כִּי לֹ֥א תְנַקֵּֽ/נִי־־׃
translation:
  text: I am afraid of all my pains; I know that you will not acquit me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'I dread all my sorrows' or 'I am afraid of all my troubles.'
    reason: lexical_alternative
  - marker: b
    text: Or, 'you will not hold me innocent' or 'you will not leave me unpunished.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יָגֹרְתִּי
  chosen: I am afraid
  alternatives:
  - I dread
  - I fear
  lexicon: HALOT
  rationale: Qal perfect 1cs of גור expresses fear/dread. Present English ('I am afraid')
    conveys the stative force naturally in context, though 'I dread' is also possible.
- source_word: כָל
  chosen: all
  lexicon: HALOT
  rationale: Straightforward quantifier; retained formally.
- source_word: עַצְּבֹתַי
  chosen: my pains
  alternatives:
  - my sorrows
  - my troubles
  lexicon: HALOT
  rationale: From עצבה/עצבות, denoting pains, sorrows, or troubles. In Job's suffering
    context, 'pains' best preserves the experiential force without over-specifying
    emotional sorrow alone.
- source_word: יָדַעְתִּי
  chosen: I know
  alternatives:
  - I have known
  lexicon: HALOT
  rationale: 'Qal perfect 1cs of ידע functions as present stative in English here:
    ''I know.'''
- source_word: כִּי
  chosen: that
  alternatives:
  - for
  - because
  lexicon: HALOT
  rationale: Introduces the content of what Job knows; 'that' is the most natural
    English complementizer here.
- source_word: לֹא
  chosen: not
  lexicon: HALOT
  rationale: Standard negation.
- source_word: תְנַקֵּנִי
  chosen: you will not acquit me
  alternatives:
  - you will not hold me innocent
  - you will not leave me unpunished
  lexicon: HALOT
  rationale: Piel of נקה commonly means to declare innocent, acquit, or leave unpunished.
    'Acquit me' fits the forensic nuance in Job's dispute with God. The alternatives
    are viable and worth preserving.
