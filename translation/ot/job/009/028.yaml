theological_decisions:
- issue: Forensic nuance of נקה in Job's address to God
  chosen_reading: you will not acquit me
  alternative_readings:
  - you will not hold me innocent
  - you will not leave me unpunished
  rationale: The verse reflects Job's conviction that God will not declare him clear
    in judgment. A forensic rendering preserves the legal tension of the context without
    importing later doctrinal categories.
  doctrine_reference: Preserve theological tension rather than resolve it; consistency
    of key terms, or documented exception.
