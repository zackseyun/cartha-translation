theological_decisions:
- issue: Referent of the 3ms pronouns
  chosen_reading: 'Render the pronouns personally as referring to God: ''he... him.'''
  alternative_readings:
  - 'Render more abstractly as referring to what God seizes: ''it'''
  rationale: 'In the immediate context Job is describing God''s irresistible action
    and unanswerable sovereignty. The clause ''who can turn him back?'' fits the flow
    better than ''turn it back,'' since the following line also addresses God directly:
    ''Who can say to him...?'''
  doctrine_reference: Translation philosophy §1, §3
