id: JOB.9.12
reference: Job 9:12
source:
  edition: WLC
  text: הֵ֣ן יַ֭חְתֹּף מִ֣י יְשִׁיבֶ֑/נּוּ מִֽי יֹאמַ֥ר אֵ֝לָ֗י/ו מַֽה תַּעֲשֶֽׂה־־׃
translation:
  text: Look, if he snatches away, who can turn him back? Who can say to him, ‘What
    are you doing?’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'if he seizes' or 'if he carries off.' The Hebrew verb suggests sudden,
      forceful taking.
    reason: lexical_alternative
  - marker: b
    text: Or, 'who can bring him back?' The Hebrew literally means 'cause him to return.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֵן
  chosen: Look
  alternatives:
  - Behold
  - Indeed
  lexicon: HALOT
  rationale: Introduces an emphatic assertion or vivid attention-getter. 'Look' preserves
    the force in natural modern English better than the more archaic 'Behold.'
- source_word: יַחְתֹּף
  chosen: snatches away
  alternatives:
  - snatches
  - seizes
  - carries off
  lexicon: HALOT
  rationale: The verb חטף conveys sudden seizing or snatching. 'Snatches away' captures
    both the abruptness and the implied removal in context, where God's irresistible
    action is in view.
- source_word: יְשִׁיבֶנּוּ
  chosen: turn him back
  alternatives:
  - bring him back
  - restore it
  - cause him to return
  lexicon: HALOT
  rationale: From שוב in the Hiphil, the sense is to cause to return or turn back.
    With a personal suffix referring to God in context, 'turn him back' idiomatically
    expresses the impossibility of reversing his action.
- source_word: מִי
  chosen: who can
  alternatives:
  - who
  lexicon: HALOT
  rationale: The interrogative in this rhetorical context implies inability, not mere
    identity. 'Who can' makes the force explicit in idiomatic English without overtranslating.
- source_word: יֹאמַר אֵלָיו
  chosen: say to him
  alternatives:
  - say to him in protest
  - speak to him
  lexicon: HALOT
  rationale: A straightforward rendering of the verbal clause; no added interpretive
    language is needed beyond the direct address.
- source_word: מַה תַּעֲשֶׂה
  chosen: What are you doing?
  alternatives:
  - What do you do?
  - What have you done?
  - What are you making?
  lexicon: HALOT
  rationale: The imperfect here works naturally as a present progressive in English
    within a challenge or protest formula. 'What are you doing?' best reflects the
    idiomatic force of questioning God's action.
