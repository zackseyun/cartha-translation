id: JOB.9.27
reference: Job 9:27
source:
  edition: WLC
  text: אִם אָ֭מְרִ/י אֶשְׁכְּחָ֣ה שִׂיחִ֑/י אֶעֶזְבָ֖ה פָנַ֣/י וְ/אַבְלִֽיגָה־׃
translation:
  text: If I say, ‘I will forget my complaint; I will put aside my face and brighten
    up,’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my musing' / 'my meditation'; the Hebrew term can denote inward speech,
      reflection, or complaint, but in this lament context 'complaint' best fits.
    reason: lexical_alternative
  - marker: b
    text: Literally 'I will leave my face and brighten up,' an idiom for setting aside
      a downcast expression and trying to appear cheerful.
    reason: cultural_note
lexical_decisions:
- source_word: אִם
  chosen: If
  alternatives:
  - When
  lexicon: HALOT
  rationale: Introduces a conditional statement. 'If' best fits the hypothetical sense
    in Job's self-address here.
- source_word: אָמְרִי
  chosen: I say
  alternatives:
  - I were to say
  - I said
  lexicon: HALOT
  rationale: Qal perfect 1cs after אִם can express a hypothetical protasis in context.
    English present 'I say' works idiomatically with the following cohortative-like
    verbs, though the overall sense is hypothetical.
- source_word: אֶשְׁכְּחָה
  chosen: I will forget
  alternatives:
  - let me forget
  - I would forget
  lexicon: HALOT
  rationale: First person form expresses Job's proposed resolve. 'I will forget' preserves
    the directness of his stated intention.
- source_word: שִׂיחִי
  chosen: my complaint
  alternatives:
  - my meditation
  - my musing
  - my concern
  lexicon: HALOT
  rationale: In Job, שִׂיחַ/שִׂיח often denotes troubled inward speech or complaint
    rather than neutral meditation. 'My complaint' best matches the lament context.
- source_word: אֶעֶזְבָה
  chosen: I will put aside
  alternatives:
  - I will leave
  - I will abandon
  lexicon: HALOT
  rationale: The verb עזב literally means 'leave, forsake,' but with the following
    idiom it refers to setting aside one's troubled expression or demeanor. 'Put aside'
    communicates the idiomatic force in natural English.
- source_word: פָנַי
  chosen: my face
  alternatives:
  - my countenance
  - my expression
  lexicon: HALOT
  rationale: Literally 'my face.' Retained in the main text because the Hebrew idiom
    is still intelligible in English when paired with a clarifying verb.
- source_word: וְאַבְלִיגָה
  chosen: and brighten up
  alternatives:
  - and cheer up
  - and relax
  - and become cheerful
  lexicon: HALOT
  rationale: From בלג, likely conveying a lessening of grief or a brightening of demeanor.
    'Brighten up' preserves the emotional and facial dimension of the idiom better
    than the flatter 'relax.'
