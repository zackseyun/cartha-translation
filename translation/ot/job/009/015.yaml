theological_decisions:
- issue: Forensic language in Job's hypothetical self-defense before God
  chosen_reading: Render the verse in legal-relational terms ('in the right,' 'my
    judge') without implying Job denies God's justice or asserts sinless perfection.
  alternative_readings:
  - Use more moral language such as 'righteous'
  - Use more adversarial language such as 'accuser'
  rationale: The verse is framed as a courtroom-like scenario. The translation preserves
    Job's claim hypothetically and situationally rather than making a broader doctrinal
    statement about his absolute righteousness. 'Judge' reflects the legal metaphor
    while avoiding importing a stronger prosecutorial nuance not required by the Hebrew.
  doctrine_reference: Translation philosophy §§1, 3, 6
