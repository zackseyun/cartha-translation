id: JOB.9.26
reference: Job 9:26
source:
  edition: WLC
  text: חָ֭לְפוּ עִם אֳנִיּ֣וֹת אֵבֶ֑ה כְּ֝/נֶ֗שֶׁר יָט֥וּשׂ עֲלֵי אֹֽכֶל־־׃
translation:
  text: They pass by like reed boats, like an eagle swooping on prey.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'papyrus boats' or 'boats of reed.'
    reason: lexical_alternative
  - marker: b
    text: Or 'like a vulture swooping on food/prey.' The Hebrew נֶשֶׁר may refer more
      broadly to a large carrion bird or raptor.
    reason: lexical_alternative
lexical_decisions:
- source_word: חָלְפוּ
  chosen: pass by
  alternatives:
  - have passed by
  - sweep past
  lexicon: HALOT
  rationale: Qal perfect 3cp of חלף, here in Job's comparison of the swift passing
    of his days. English present 'pass by' fits the poetic vividness in context, though
    a perfect/past sense is also possible.
- source_word: עִם
  chosen: like
  alternatives:
  - with
  - along with
  lexicon: HALOT
  rationale: 'Though the preposition commonly means ''with,'' in comparative poetic
    usage with the following noun phrase it functions idiomatically to introduce comparison:
    ''like reed boats.'' This yields natural English while preserving the simile.'
- source_word: אֳנִיּוֹת
  chosen: boats
  alternatives:
  - ships
  lexicon: HALOT
  rationale: Plural of 'ship/boat.' 'Boats' fits the likely small, swift craft envisioned
    in the simile better than the broader 'ships'.
- source_word: אֵבֶה
  chosen: reed
  alternatives:
  - papyrus
  - rush
  lexicon: HALOT
  rationale: The noun is traditionally understood of papyrus/reed, yielding the well-known
    expression 'boats of reed/papyrus.' 'Reed' is concise and natural in English;
    'papyrus' is a viable more specific alternative preserved in a footnote.
- source_word: כְּנֶשֶׁר
  chosen: like an eagle
  alternatives:
  - like a vulture
  lexicon: HALOT
  rationale: נשר can denote a large bird of prey, often rendered 'eagle,' though some
    contexts may overlap with vulture. In this poetic simile of speed and attack,
    'eagle' is the conventional and plausible rendering; the lexical alternative is
    preserved in a footnote.
- source_word: יָטוּשׂ
  chosen: swooping
  alternatives:
  - darting
  - pouncing
  - rushing
  lexicon: HALOT
  rationale: The verb denotes rushing swiftly upon or darting at. 'Swooping' captures
    the aerial predator imagery naturally in English and fits the singular subject
    'eagle.'
- source_word: עֲלֵי
  chosen: 'on'
  alternatives:
  - upon
  - against
  lexicon: HALOT
  rationale: Standard preposition meaning 'on/upon'; with a predator and food/prey,
    'on' is idiomatic English.
- source_word: אֹכֶל
  chosen: prey
  alternatives:
  - food
  lexicon: HALOT
  rationale: Literally 'food,' but in the predator simile the idiomatic sense is the
    object hunted for food, hence 'prey.' This is an optimal-equivalence choice that
    preserves the image rather than flattening it to 'food.'
