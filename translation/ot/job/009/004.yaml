id: JOB.9.4
reference: Job 9:4
source:
  edition: WLC
  text: חֲכַ֣ם לֵ֭בָב וְ/אַמִּ֣יץ כֹּ֑חַ מִֽי הִקְשָׁ֥ה אֵ֝לָ֗י/ו וַ/יִּשְׁלָֽם־׃
translation:
  text: He is wise in heart and mighty in strength; who has hardened himself against
    him and come through safely?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and prospered,' 'and remained unharmed.' The Hebrew verb can denote
      coming through whole or in peace.
    reason: lexical_alternative
lexical_decisions:
- source_word: חֲכַם לֵבָב
  chosen: wise in heart
  alternatives:
  - wise of heart
  - wise in mind
  lexicon: HALOT
  rationale: The Hebrew pairs an adjective with 'heart' as the seat of intellect and
    will. 'Wise in heart' preserves the Hebrew imagery better than flattening to merely
    'wise' or 'wise in mind.'
- source_word: וְאַמִּיץ כֹּחַ
  chosen: and mighty in strength
  alternatives:
  - and strong in power
  - and mighty in power
  lexicon: HALOT
  rationale: אַמִּיץ conveys strength/might; כֹּחַ is strength/power. 'Mighty in strength'
    is slightly taut but reflects the emphatic Hebrew collocation and suits poetic
    style.
- source_word: מִי
  chosen: who
  alternatives:
  - who is it that
  lexicon: HALOT
  rationale: Introduces a rhetorical question. Simple 'who' is natural and sufficiently
    formal.
- source_word: הִקְשָׁה
  chosen: has hardened himself
  alternatives:
  - has been stubborn
  - has made himself hard
  - has resisted stubbornly
  lexicon: HALOT
  rationale: From קשׁה in the Hiphil, here with אֵלָיו, the sense is to make oneself
    hard or stubborn against someone. 'Has hardened himself' preserves the reflexive
    force and the moral obstinacy implied.
- source_word: אֵלָיו
  chosen: against him
  alternatives:
  - to him
  lexicon: HALOT
  rationale: With הקשה in this idiom, the preposition marks hostile opposition rather
    than simple direction. 'Against him' best captures the sense in English.
- source_word: וַיִּשְׁלָם
  chosen: and come through safely
  alternatives:
  - and prospered
  - and remained unharmed
  - and had peace
  lexicon: HALOT
  rationale: From שלם, the sense in this rhetorical context is to come off whole,
    unharmed, or successfully. 'Come through safely' communicates the idiomatic result
    in clear modern English while preserving the idea of emerging intact.
