theological_decisions:
- issue: Implicit subject of the verse
  chosen_reading: He is understood to refer to God from the surrounding context.
  rationale: The Hebrew lacks an explicit subject in the opening predicates, but the
    context of Job's speech clearly refers to God. Supplying 'He is' in English is
    necessary for grammatical completeness without adding new theological content.
