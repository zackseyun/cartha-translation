theological_decisions:
- issue: Identity of רָהַב
  chosen_reading: Rahab retained as a transliterated poetic/proper name
  alternative_readings:
  - Egypt
  - the proud one/pride
  - a chaos monster or sea power
  rationale: The Hebrew term can function as a poetic proper name for a chaotic sea
    power and elsewhere as a poetic designation for Egypt. Transliteration avoids
    over-resolving the imagery and preserves the text's poetic ambiguity.
  doctrine_reference: Preserve theological tension rather than resolve it.
