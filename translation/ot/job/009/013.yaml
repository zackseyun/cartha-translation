id: JOB.9.13
reference: Job 9:13
source:
  edition: WLC
  text: אֱ֭לוֹהַּ לֹא יָשִׁ֣יב אַפּ֑/וֹ תחת/ו שָׁ֝חֲח֗וּ עֹ֣זְרֵי רָֽהַב־׃
translation:
  text: God does not turn back his anger; beneath him the helpers of Rahab crouch.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Rahab is a poetic name that may refer to a chaos monster, the proud sea
      power, or figuratively to Egypt.
    reason: alternative_reading
lexical_decisions:
- source_word: אֱלוֹהַּ
  chosen: God
  alternatives:
  - God Almighty
  - God
  lexicon: HALOT
  rationale: אֱלוֹהַּ is the singular common term for God here, not the divine name
    YHWH. 'God' is the natural English equivalent.
- source_word: לֹא
  chosen: does not
  alternatives:
  - not
  lexicon: HALOT
  rationale: Standard negation; rendered with English auxiliary for natural syntax.
- source_word: יָשִׁיב
  chosen: turn back
  alternatives:
  - withdraw
  - relent from
  - turn away
  lexicon: HALOT
  rationale: Hiphil of שוב commonly means 'cause to return/turn back.' In context
    with אַף ('anger'), the sense is that God does not turn back or withdraw his anger.
    'Turn back' preserves the verbal imagery better than the more interpretive 'relent.'
- source_word: אַפּוֹ
  chosen: his anger
  alternatives:
  - his nose
  - his wrath
  lexicon: HALOT
  rationale: אַף literally means 'nose,' but idiomatically denotes anger/wrath. 'His
    anger' communicates the Hebrew idiom clearly in modern English.
- source_word: תחתו
  chosen: beneath him
  alternatives:
  - under him
  - before him
  lexicon: HALOT
  rationale: The preposition תחת with pronominal suffix most naturally means 'under/beneath
    him.' In context it conveys subjugation before God's power. 'Beneath him' is both
    literal and idiomatic.
- source_word: שָׁחֲחוּ
  chosen: crouch
  alternatives:
  - bow down
  - are brought low
  - stoop
  lexicon: HALOT
  rationale: The verb denotes being bowed down or crouching low. 'Crouch' preserves
    the vivid physical image and fits the context of forced submission.
- source_word: עֹזְרֵי
  chosen: the helpers of
  alternatives:
  - helpers
  - allies of
  lexicon: HALOT
  rationale: Construct plural from עזר, 'helpers.' 'The helpers of' preserves the
    construct relationship with Rahab.
- source_word: רָהַב
  chosen: Rahab
  alternatives:
  - pride
  - the sea monster
  - Egypt
  lexicon: HALOT
  rationale: Here רהב is best retained as the proper/mythic name 'Rahab,' a poetic
    figure for the proud cosmic sea power and, in some contexts, Egypt. Because the
    referent is debated, transliteration in the main text preserves the ambiguity
    better than choosing one interpretation.
