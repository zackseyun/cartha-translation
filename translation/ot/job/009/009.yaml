id: JOB.9.9
reference: Job 9:9
source:
  edition: WLC
  text: עֹֽשֶׂה עָ֭שׁ כְּסִ֥יל וְ/כִימָ֗ה וְ/חַדְרֵ֥י תֵמָֽן־׃
translation:
  text: who made the Bear, Orion, and the Pleiades, and the chambers of the south.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly, 'who makes the Bear, Orion, and the Pleiades, and the chambers
      of the south.' The Hebrew participle can describe ongoing action as well as
      a completed act.
    reason: lexical_alternative
  - marker: b
    text: '''The Bear'' renders the Hebrew name of a constellation. Older English
      versions often have ''Arcturus.'''
    reason: alternative_reading
  - marker: c
    text: The phrase 'the chambers of the south' likely refers poetically to the hidden
      regions or constellations of the southern sky.
    reason: cultural_note
lexical_decisions:
- source_word: עֹשֶׂה
  chosen: who made
  alternatives:
  - who makes
  - maker of
  lexicon: HALOT
  rationale: Qal participle of עשה functions here in a relative/descriptive sense
    continuing the description of God from the previous verse. English past tense
    'made' fits the catalog of God's creative acts in context, though a present participial
    sense ('who makes') is grammatically possible.
- source_word: עָשׁ
  chosen: the Bear
  alternatives:
  - Ash
  - the Great Bear
  - Arcturus
  lexicon: HALOT
  rationale: The term names a constellation. 'The Bear' is a clear modern English
    rendering of the likely referent. 'Arcturus' reflects older translation tradition
    but is less transparent and may be too specific; transliteration 'Ash' would obscure
    meaning for most readers.
- source_word: כְּסִיל
  chosen: Orion
  alternatives:
  - Kesil
  lexicon: HALOT
  rationale: In astronomical contexts this noun is widely understood as the constellation
    Orion. Using the standard English constellation name communicates the referent
    directly.
- source_word: כִימָה
  chosen: the Pleiades
  alternatives:
  - Kimah
  lexicon: HALOT
  rationale: This is conventionally identified as the star cluster Pleiades. The English
    astronomical name is the clearest rendering.
- source_word: חַדְרֵי תֵמָן
  chosen: the chambers of the south
  alternatives:
  - the inner rooms of the south
  - the constellations of the south
  - the chambers of Teman
  lexicon: HALOT
  rationale: Literally 'the chambers/inner rooms of the south.' In context with named
    constellations, the phrase likely refers to the hidden regions or star-chambers
    of the southern sky. The more literal 'chambers of the south' preserves the poetic
    imagery without over-interpreting. 'Teman' here is best taken in its directional
    sense 'south,' not as the place name.
