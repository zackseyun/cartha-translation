id: JOB.9.23
reference: Job 9:23
source:
  edition: WLC
  text: אִם שׁ֭וֹט יָמִ֣ית פִּתְאֹ֑ם לְ/מַסַּ֖ת נְקִיִּ֣ם יִלְעָֽג־׃
translation:
  text: If a scourge kills suddenly, he mocks the despair of the innocent.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'he laughs at the trial of the innocent' or 'he mocks the melting away
      of the innocent.' The Hebrew noun can denote testing or collapse/despair.
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  chosen: If
  alternatives:
  - When
  lexicon: HALOT
  rationale: Introduces a conditional or hypothetical clause. 'If' preserves the Hebrew
    particle's straightforward force better than the more interpretive 'when'.
- source_word: שׁוֹט
  chosen: a scourge
  alternatives:
  - a whip
  - a lash
  - a plague
  lexicon: HALOT
  rationale: The noun denotes a whip/scourge and can extend metaphorically to a sweeping
    affliction. 'Scourge' preserves both the concrete image and the broader sense
    of destructive calamity in context.
- source_word: יָמִית
  chosen: kills
  alternatives:
  - slays
  - puts to death
  lexicon: HALOT
  rationale: Hiphil of מות means 'cause to die/kill.' 'Kills' is clear modern English
    and fits the sudden destructive action described.
- source_word: פִּתְאֹם
  chosen: suddenly
  alternatives:
  - all at once
  - in an instant
  lexicon: HALOT
  rationale: Standard adverbial sense; 'suddenly' is the most natural concise rendering.
- source_word: לְמַסַּת
  chosen: the despair
  alternatives:
  - the trial
  - the testing
  - the melting away
  lexicon: HALOT
  rationale: The noun from מסס carries the idea of melting, collapse, or faintness.
    In this context, with 'the innocent,' it points to their collapse/despair under
    affliction. 'Despair' communicates the experiential sense in readable English
    while remaining tied to the underlying image of dissolution.
- source_word: נְקִיִּם
  chosen: the innocent
  alternatives:
  - the blameless
  - the guiltless
  - the clean
  lexicon: HALOT
  rationale: Refers to those free from guilt. 'The innocent' is idiomatic and fits
    Job's argument about undeserved suffering.
- source_word: יִלְעָג
  chosen: he mocks
  alternatives:
  - he laughs at
  - he derides
  lexicon: HALOT
  rationale: The verb means to mock or deride. 'Mocks' preserves the sharpness of
    the accusation without sounding archaic.
