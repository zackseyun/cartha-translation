id: JOB.9.7
reference: Job 9:7
source:
  edition: WLC
  text: הָ/אֹמֵ֣ר לַ֭/חֶרֶס וְ/לֹ֣א יִזְרָ֑ח וּ/בְעַ֖ד כּוֹכָבִ֣ים יַחְתֹּֽם׃
translation:
  text: who says to the sun, ‘Do not rise,’ and seals up the stars.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'and it does not rise'; the Hebrew may express either
      the command spoken to the sun or the result of God's word.
    reason: lexical_alternative
  - marker: b
    text: Hebrew חֶרֶס here likely means 'sun' in poetic usage; elsewhere the word
      can refer to earthenware or clay.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָאֹמֵר
  chosen: who says
  alternatives:
  - the one who says
  - he who says
  lexicon: HALOT
  rationale: 'The participle continues the description of God from the preceding context,
    functioning relatively: ''who says.'' This is natural English and preserves the
    ongoing descriptive force.'
- source_word: לַחֶרֶס
  chosen: to the sun
  alternatives:
  - to the sun-disc
  - to the clay
  lexicon: HALOT
  rationale: In this poetic context with 'rise' and 'stars,' חֶרֶס refers to the sun,
    not 'clay/potsherd.' 'Sun' is the plain contextual sense; 'sun-disc' is possible
    but less natural in English.
- source_word: וְלֹא יִזְרָח
  chosen: ‘Do not rise,’
  alternatives:
  - and it does not rise
  - that it should not rise
  lexicon: HALOT
  rationale: 'After ''says to the sun,'' the imperfect is best heard as the content/effect
    of the command: ''Do not rise.'' This preserves the vivid personification. A resultative
    sense (''and it does not rise'') is possible but less direct in English.'
- source_word: וּבְעַד
  chosen: and
  alternatives:
  - and over
  - and around
  - and concerning
  lexicon: HALOT
  rationale: With חתם ('seal up'), the preposition contributes to the idiom of shutting
    off or covering over. In idiomatic English, 'and seals up the stars' communicates
    the sense without awkwardly reproducing the preposition.
- source_word: כּוֹכָבִים
  chosen: the stars
  lexicon: HALOT
  rationale: Straightforward plural noun meaning 'stars.' The article is not explicit
    in Hebrew, but English idiom naturally uses 'the stars' in this cosmic statement.
- source_word: יַחְתֹּם
  chosen: seals up
  alternatives:
  - seals
  - shuts up
  - covers
  lexicon: HALOT
  rationale: חתם means 'seal.' 'Seals up' best conveys the image of closing off the
    stars from appearing, matching the cosmic control emphasized in context.
