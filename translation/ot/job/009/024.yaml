id: JOB.9.24
reference: Job 9:24
source:
  edition: WLC
  text: אֶ֤רֶץ נִתְּנָ֬ה בְֽ/יַד רָשָׁ֗ע פְּנֵֽי שֹׁפְטֶ֥י/הָ יְכַסֶּ֑ה אִם לֹ֖א אֵפ֣וֹא
    מִי הֽוּא׀־־־־׃
translation:
  text: The earth is given into the hand of the wicked; he covers the faces of its
    judges. If not, then who is it?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'The land is given into the hand of a wicked man.' Hebrew אֶרֶץ can mean
      'earth' or 'land,' and רָשָׁע may be read as a singular 'wicked man' or more
      generally 'the wicked.'
    reason: lexical_alternative
  - marker: b
    text: The subject of 'he covers' is left implicit in Hebrew. It may refer to God,
      to the wicked ruler, or function as an unspecified subject.
    reason: alternative_reading
lexical_decisions:
- source_word: אֶרֶץ
  chosen: The earth
  alternatives:
  - The land
  lexicon: HALOT
  rationale: אֶרֶץ can mean either 'earth' or 'land.' In this poetic context, Job
    speaks broadly about the world order and injustice, so 'the earth' best fits the
    scope. 'The land' is possible and worth preserving as an alternative.
- source_word: נִתְּנָה
  chosen: is given
  alternatives:
  - has been given
  - was given
  lexicon: HALOT
  rationale: The Niphal perfect of נתן is naturally rendered as a passive, 'is given'
    or 'has been given.' Present passive works well in English poetry and conveys
    the ongoing state resulting from the action.
- source_word: בְיַד
  chosen: into the hand of
  alternatives:
  - into the power of
  - to the hand of
  lexicon: HALOT
  rationale: The idiom 'into the hand of' is a standard Hebrew expression for being
    delivered into someone's power. Retaining 'hand' preserves the metaphor while
    remaining understandable.
- source_word: רָשָׁע
  chosen: the wicked
  alternatives:
  - a wicked man
  - the wicked man
  lexicon: HALOT
  rationale: The singular adjective can function collectively or generically. 'The
    wicked' preserves the Hebrew's terseness and allows either a representative wicked
    ruler or wickedness embodied in a ruler without over-specifying.
- source_word: פְּנֵי שֹׁפְטֶיהָ
  chosen: the faces of its judges
  alternatives:
  - the faces of her judges
  - its rulers
  lexicon: HALOT
  rationale: פָּנִים is literally 'face/faces,' and שֹׁפְטִים are 'judges.' The suffix
    on שֹׁפְטֶיהָ refers back to earth/land. 'Its judges' is idiomatic in English;
    'her judges' is possible but less natural. Keeping 'faces' preserves the concrete
    Hebrew image.
- source_word: יְכַסֶּה
  chosen: he covers
  alternatives:
  - one covers
  - it is covered
  - he blinds
  lexicon: HALOT
  rationale: The Piel imperfect 3ms most straightforwardly means 'he covers.' The
    subject is unstated; Hebrew leaves it ambiguous. Rendering it actively as 'he
    covers' best reflects the grammar, while not specifying the subject beyond the
    masculine singular implied by the verb. 'Blinds' is interpretive and too strong
    for the lexical sense.
- source_word: אִם לֹא אֵפוֹא מִי הוּא
  chosen: If not, then who is it?
  alternatives:
  - If it is not he, then who is it?
  - If not, who then is it?
  lexicon: HALOT
  rationale: This clause is a rhetorical challenge. אֵפוֹא adds the sense 'then' or
    'indeed.' 'If not, then who is it?' is concise and natural, preserving the force
    without adding an explicit antecedent not present in the Hebrew.
