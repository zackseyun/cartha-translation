theological_decisions:
- issue: Identity of the implied subject of 'he covers' and the rhetorical 'who is
    it?'
  chosen_reading: The translation preserves the Hebrew ambiguity rather than identifying
    the subject explicitly as God, the wicked ruler, or an impersonal force.
  alternative_readings:
  - God covers the faces of its judges
  - the wicked covers the faces of its judges
  - the judges' faces are covered
  rationale: In context, Job's rhetoric may imply God as the ultimate actor behind
    the world's disorder, but the Hebrew clause itself leaves the subject of יְכַסֶּה
    implicit. In keeping with the translation philosophy, the draft preserves the
    tension rather than resolving it interpretively.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
