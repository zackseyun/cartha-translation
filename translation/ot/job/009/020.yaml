theological_decisions:
- issue: Subject of וַיַּעְקְשֵׁנִי
  chosen_reading: The subject is carried over from 'my mouth' ('it would prove me
    crooked').
  alternative_readings:
  - God is the implied subject ('he would make/prove me crooked')
  rationale: 'The parallelism strongly favors the same subject across both cola: ''my
    mouth would condemn me ... [it] would prove me crooked.'' This avoids importing
    a more explicit accusation against God than the Hebrew requires, while preserving
    Job''s lament that any self-defense collapses under scrutiny.'
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
