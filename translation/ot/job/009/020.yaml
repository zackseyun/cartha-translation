id: JOB.9.20
reference: Job 9:20
source:
  edition: WLC
  text: אִם אֶ֭צְדָּק פִּ֣/י יַרְשִׁיעֵ֑/נִי תָּֽם אָ֝֗נִי וַֽ/יַּעְקְשֵֽׁ/נִי־־׃
translation:
  text: If I am in the right, my own mouth would condemn me; though I am blameless,
    it would prove me crooked.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Though I am blameless, he would prove me crooked,' taking God as the
      implied subject in the second clause.
    reason: alternative_reading
lexical_decisions:
- source_word: אִם
  chosen: If
  alternatives:
  - Though
  lexicon: HALOT
  rationale: Introduces a conditional or concessive clause. Here the first colon is
    naturally conditional ('If I am in the right'). The concessive nuance is reflected
    more in the verse as a whole than in this particle alone.
- source_word: אֶצְדָּק
  chosen: I am in the right
  alternatives:
  - I am righteous
  - I justify myself
  lexicon: HALOT
  rationale: Qal of צדק here is best taken as stative/intransitive, 'be in the right'
    or 'be righteous,' not causative 'justify myself.' 'Am in the right' fits the
    forensic context and idiomatic English better than the more potentially misleading
    'am righteous.'
- source_word: פִּי
  chosen: my own mouth
  alternatives:
  - my mouth
  lexicon: HALOT
  rationale: Literally 'my mouth.' Adding 'own' brings out the emphatic irony that
    Job's very speech would turn against him, without exceeding the sense.
- source_word: יַרְשִׁיעֵנִי
  chosen: would condemn me
  alternatives:
  - would declare me guilty
  - would make me wicked
  lexicon: HALOT
  rationale: Hiphil of רשע in forensic contexts means 'declare guilty/condemn.' 'Condemn
    me' is concise and idiomatic. 'Make me wicked' would overread causation where
    judicial declaration is more likely.
- source_word: תָּם
  chosen: blameless
  alternatives:
  - complete
  - upright
  - innocent
  lexicon: HALOT
  rationale: תם in Job commonly denotes integrity or blamelessness rather than sinless
    perfection. 'Blameless' preserves that moral nuance and aligns with Job's characterization
    elsewhere.
- source_word: וַיַּעְקְשֵׁנִי
  chosen: it would prove me crooked
  alternatives:
  - it would make me crooked
  - it would show me perverse
  - he would make me crooked
  lexicon: HALOT
  rationale: From עקשׁ, 'be crooked/perverse.' With the preceding subject 'my mouth'
    carried over, the sense is that Job's speech would show or portray him as crooked.
    'Prove me crooked' captures the forensic/resultative force in natural English.
    Retaining 'it' reflects the likely subject continuity from 'my mouth.'
