id: JOB.9.18
reference: Job 9:18
source:
  edition: WLC
  text: לֹֽא יִ֭תְּנֵ/נִי הָשֵׁ֣ב רוּחִ֑/י כִּ֥י יַ֝שְׂבִּעַ֗/נִי מַמְּרֹרִֽים־׃
translation:
  text: He does not let me catch my breath, for he fills me with bitterness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'He does not allow me to recover my breath'; literally, 'He does not
      give me to restore my breath/spirit.'
    reason: lexical_alternative
  - marker: b
    text: Or 'fills me with bitter things.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יִתְּנֵנִי
  chosen: does not let me
  alternatives:
  - does not allow me
  - does not give me
  lexicon: HALOT
  rationale: From נתן, literally 'give,' but with the following infinitive it idiomatically
    means 'allow/permit.' English 'does not let me' best captures the sense without
    woodenly preserving 'give.'
- source_word: הָשֵׁב רוּחִי
  chosen: catch my breath
  alternatives:
  - recover my breath
  - bring back my spirit
  - restore my wind/breath
  lexicon: HALOT
  rationale: The idiom combines שוב in the causative infinitive ('to bring back/restore')
    with רוּחַ ('breath/spirit/wind'). In context of Job's complaint about relentless
    affliction, the sense is not spiritual restoration but being allowed a moment
    to breathe or recover. 'Catch my breath' is a natural English idiom that preserves
    the force.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - but
  lexicon: HALOT
  rationale: Here כִּי introduces the reason for the preceding statement. 'For' fits
    the poetic register and causal sense.
- source_word: יַשְׂבִּיעַנִי
  chosen: fills me
  alternatives:
  - satiates me
  - satisfies me
  - gluts me
  lexicon: HALOT
  rationale: From שבע in the Hiphil, 'to satisfy/fill.' In this negative context,
    'fills me' communicates being made full of something oppressive. 'Satiates' is
    too formal and can sound positive in English.
- source_word: מַמְּרֹרִים
  chosen: with bitterness
  alternatives:
  - with bitter things
  - with bitternesses
  - with bitter troubles
  lexicon: HALOT
  rationale: The plural noun from the bitterness root can denote bitter things or
    bitter experiences. English idiom prefers the abstract 'bitterness' here, conveying
    the cumulative experience of affliction without awkward literalism.
