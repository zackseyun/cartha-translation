id: JOB.9.25
reference: Job 9:25
source:
  edition: WLC
  text: וְ/יָמַ֣/י קַ֭לּוּ מִנִּי רָ֑ץ בָּֽ֝רְח֗וּ לֹא רָא֥וּ טוֹבָֽה־־׃
translation:
  text: Now my days are swifter than a runner; they flee away; they do not see good.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'prosperity' or 'well-being' for 'good.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יָמַי
  chosen: my days
  alternatives:
  - the days of my life
  lexicon: HALOT
  rationale: Literal possessive plural of יוֹם in a temporal/life-span sense. 'My
    days' is natural English and preserves the Hebrew idiom for one's lifetime.
- source_word: קַלוּ
  chosen: are swifter
  alternatives:
  - are light/quick
  - have become swift
  lexicon: HALOT
  rationale: From קלל in the sense of being light/quick. In context of comparison
    with a runner, the idiomatic sense is speed, so 'are swifter' best conveys the
    comparative force in English.
- source_word: מִנִּי רָץ
  chosen: than a runner
  alternatives:
  - than one who runs
  - than a courier
  lexicon: HALOT
  rationale: 'The preposition marks comparison: ''more than/from a runner.'' רָץ is
    a singular active participle/noun, naturally ''runner.'' ''Courier'' is possible
    in some contexts but is too specific here without contextual warrant.'
- source_word: בָּרְחוּ
  chosen: they flee away
  alternatives:
  - they have fled
  - they fly away
  lexicon: HALOT
  rationale: Basic sense is fleeing/escaping. 'Flee away' preserves the vivid motion
    and matches the plural subject 'my days.' 'Fly away' would be more interpretive.
- source_word: לֹא רָאוּ
  chosen: they do not see
  alternatives:
  - they have not seen
  - they never see
  lexicon: HALOT
  rationale: 'Simple negated perfect describing Job''s experience of his days: they
    pass without seeing. Present English ''do not see'' communicates the gnomic/resultative
    sense naturally in context.'
- source_word: טוֹבָה
  chosen: good
  alternatives:
  - prosperity
  - happiness
  - well-being
  lexicon: HALOT
  rationale: טוֹבָה can denote good in a broad sense, including prosperity or well-being.
    Here the unqualified 'good' preserves the Hebrew's breadth and avoids over-specifying
    the kind of benefit Job says his days never experience.
