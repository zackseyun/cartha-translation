id: JOB.9.22
reference: Job 9:22
source:
  edition: WLC
  text: אַחַ֗ת הִ֥יא עַל כֵּ֥ן אָמַ֑רְתִּי תָּ֥ם וְ֝/רָשָׁ֗ע ה֣וּא מְכַלֶּֽה־׃
translation:
  text: It is all one; therefore I say, ‘He destroys both the blameless and the wicked.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'I have said.' The Hebrew perfect may be rendered as a present or a
      past/perfect statement in context.
    reason: lexical_alternative
  - marker: b
    text: Or, 'it destroys both the blameless and the wicked,' taking the subject
      more impersonally.
    reason: alternative_reading
lexical_decisions:
- source_word: אַחַת הִיא
  chosen: It is all one
  alternatives:
  - It is one thing
  - It is the same
  lexicon: HALOT
  rationale: The idiom expresses sameness/indifference of outcome rather than the
    numeral 'one' in a strictly countable sense. 'It is all one' is concise modern
    English that preserves Job's bleak claim that the distinction makes no practical
    difference.
- source_word: עַל כֵּן
  chosen: therefore
  alternatives:
  - so
  - for this reason
  lexicon: HALOT
  rationale: Marks the inferential conclusion from the preceding claim. 'Therefore'
    preserves the logical connection clearly.
- source_word: אָמַרְתִּי
  chosen: I say
  alternatives:
  - I have said
  - I said
  lexicon: HALOT
  rationale: Although formally perfect, in context it introduces Job's stated conclusion
    and can be rendered as a present performative in English. 'I say' fits the discourse
    flow naturally; the alternative 'I have said' is possible and worth preserving.
- source_word: תָּם
  chosen: the blameless
  alternatives:
  - the innocent
  - the upright
  - the perfect
  lexicon: HALOT
  rationale: In Job, תָּם denotes integrity/completeness of character, not sinless
    perfection. 'Blameless' is the established and contextually accurate rendering.
- source_word: רָשָׁע
  chosen: the wicked
  alternatives:
  - the guilty
  - the evil person
  lexicon: HALOT
  rationale: Standard rendering for the morally culpable person; pairs naturally with
    'the blameless' in wisdom literature.
- source_word: הוּא מְכַלֶּה
  chosen: He destroys
  alternatives:
  - he brings to an end
  - he consumes
  - it destroys
  lexicon: HALOT
  rationale: The masculine singular pronoun plus participle most naturally takes God
    as the implicit subject in context. 'Destroys' captures the force of כלה here.
    Because the pronoun could be taken more impersonally ('it destroys'), that alternative
    is preserved in a footnote.
