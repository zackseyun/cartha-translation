theological_decisions:
- issue: Implicit subject of 'he destroys'
  chosen_reading: The subject is rendered personally as 'He,' referring to God in
    Job's speech.
  alternative_readings:
  - An impersonal sense such as 'it destroys' or 'one destroys'
  rationale: Within Job 9, Job is speaking about God's governance and overwhelming
    power; thus the unstated subject is best understood as God. The translation preserves
    Job's stark theological complaint without softening it. Because Hebrew can leave
    the subject somewhat implicit, the impersonal alternative is noted in a footnote
    rather than adopted in the main text.
  doctrine_reference: Preserve theological tension rather than resolve it
