theological_decisions:
- issue: Forensic imagery between Job and God
  chosen_reading: 'Render the verse as a legal impossibility: God is not a human peer
    with whom Job can litigate in court.'
  alternative_readings:
  - Render more abstractly as 'that we should come together for judgment'
  rationale: The Hebrew uses legal language, especially מִשְׁפָּט, but the verse does
    not make a doctrinal claim beyond Job's inability to contend with God as an equal.
    'In court' preserves the legal metaphor without over-theologizing it.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Gendered language in אִישׁ
  chosen_reading: Use 'man' in the main text.
  alternative_readings:
  - human
  - person
  rationale: The source is grammatically masculine singular and the contrast is between
    God and a human male speaker. This aligns with the project's gender-accurate policy
    rather than flattening to a neutral term in the main text.
  doctrine_reference: Translation philosophy §4
