theological_decisions:
- issue: Legal imagery in Job's challenge regarding God
  chosen_reading: Render the verse with courtroom language ('justice,' 'summon him')
    without softening Job's claim.
  alternative_readings:
  - Render more generally as 'if it is a matter of judgment, who will set me a time?'
  rationale: The surrounding context in Job 9 emphasizes the impossibility of litigating
    a case against God. The translation should preserve that tension rather than dilute
    it into a vague statement about judgment. This is an interpretive decision driven
    by context, not by doctrinal harmonization.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
