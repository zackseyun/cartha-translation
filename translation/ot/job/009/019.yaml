id: JOB.9.19
reference: Job 9:19
source:
  edition: WLC
  text: אִם לְ/כֹ֣חַ אַמִּ֣יץ הִנֵּ֑ה וְ/אִם לְ֝/מִשְׁפָּ֗ט מִ֣י יוֹעִידֵֽ/נִי־־׃
translation:
  text: If it is a matter of strength, behold, he is mighty; and if of justice, who
    can summon him?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'if it is a matter of judgment, who can appoint me a hearing?' The Hebrew
      verb is difficult, and some take the object as 'me' rather than 'him.'
    reason: alternative_reading
  - marker: b
    text: '''Justice'' may also be rendered ''judgment'' or ''legal case.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  chosen: If
  alternatives:
  - If it is a matter of
  - As for
  lexicon: HALOT
  rationale: Introduces the first conditional or hypothetical case. In English, simple
    'If' is natural, while the fuller sense is carried by the following phrase.
- source_word: לְכֹחַ
  chosen: it is a matter of strength
  alternatives:
  - for strength
  - as to strength
  - in strength
  lexicon: HALOT
  rationale: 'The preposition ל with כֹּחַ here frames the category under discussion:
    ''with respect to strength'' or ''if it concerns strength.'' Expanded slightly
    for idiomatic English while preserving the forensic, comparative structure of
    the verse.'
- source_word: אַמִּיץ
  chosen: mighty
  alternatives:
  - strong
  - powerful
  lexicon: HALOT
  rationale: Describes overwhelming strength. 'Mighty' fits the elevated tone and
    avoids redundancy with the preceding noun 'strength' while still reflecting the
    adjective's force.
- source_word: הִנֵּה
  chosen: behold
  alternatives:
  - look
  - indeed
  - see
  lexicon: HALOT
  rationale: Retained as an attention-drawing particle. 'Behold' preserves the rhetorical
    punch and solemnity of Job's statement better than flatter modern options.
- source_word: וְאִם
  chosen: and if
  alternatives:
  - or if
  - but if
  lexicon: HALOT
  rationale: Coordinates the second conditional branch with the first. 'And if' best
    reflects the Hebrew conjunction without overinterpreting the relationship.
- source_word: לְמִשְׁפָּט
  chosen: of justice
  alternatives:
  - for judgment
  - as to legal judgment
  - for a case at law
  lexicon: HALOT
  rationale: In context Job is speaking in quasi-legal terms about bringing a case
    before God. 'Justice' is concise and natural, while the legal nuance is preserved
    by the following verb 'summon.' Alternative renderings are viable and worth preserving.
- source_word: מִי
  chosen: who
  alternatives:
  - who is there that
  lexicon: HALOT
  rationale: Straightforward interrogative introducing the rhetorical question.
- source_word: יוֹעִידֵנִי
  chosen: can summon him
  alternatives:
  - can appoint him for trial
  - can cite him
  - can summon me
  lexicon: HALOT
  rationale: The Hiphil of יעד in legal context can mean to appoint or summon to a
    meeting/court appearance. Given the flow of thought in Job 9 about no one being
    able to bring God into court, 'summon him' best captures the sense. The consonantal
    form could be read with first-person object ('summon me'), but context strongly
    favors the sense of summoning God to court, likely reflecting an idiomatic or
    textually difficult construction; the alternative is preserved in a footnote.
