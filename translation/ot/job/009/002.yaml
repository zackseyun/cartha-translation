theological_decisions:
- issue: Forensic nuance of human righteousness in relation to God
  chosen_reading: Render the question as 'how can a man be righteous before God?'
  alternative_readings:
  - how can a man be justified with God?
  - how can a mortal be in the right before God?
  rationale: The verse raises the classic question of whether a human can stand as
    righteous in relation to God. The Hebrew verb permits juridical nuance, but the
    text itself does not specify a later doctrinal mechanism of justification. 'Be
    righteous before God' preserves the theological tension without importing a more
    developed doctrinal formulation.
  doctrine_reference: Preserve theological tension rather than resolve it.
