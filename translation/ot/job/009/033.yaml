theological_decisions:
- issue: Whether to render מוֹכִיחַ with a christologically suggestive term such as
    'mediator'
  chosen_reading: arbiter
  alternative_readings:
  - mediator
  - umpire
  rationale: Although Christian readers may hear anticipatory resonance with a mediator,
    the immediate Hebrew context is Job's complaint about the lack of a legal adjudicator
    between himself and God. 'Arbiter' preserves the forensic sense without importing
    a fuller theological claim the verse itself does not explicitly make. The alternative
    'mediator' is preserved in a footnote because it is a viable lexical option and
    has interpretive significance.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
