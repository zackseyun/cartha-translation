id: JOB.9.33
reference: Job 9:33
source:
  edition: WLC
  text: לֹ֣א יֵשׁ בֵּינֵ֣י/נוּ מוֹכִ֑יחַ יָשֵׁ֖ת יָד֣/וֹ עַל שְׁנֵֽי/נוּ־־׃
translation:
  text: There is no arbiter between us, who might lay his hand on us both.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'mediator.' The Hebrew term can denote one who decides or intervenes
      between two parties in dispute.
    reason: lexical_alternative
lexical_decisions:
- source_word: לֹא יֵשׁ
  chosen: There is no
  alternatives:
  - There is not
  - There exists no
  lexicon: HALOT
  rationale: The existential construction is best rendered idiomatically in English
    as 'There is no,' preserving the straightforward negation of existence.
- source_word: בֵּינֵינוּ
  chosen: between us
  alternatives:
  - among us
  - betwixt us
  lexicon: HALOT
  rationale: The preposition with 1cp suffix denotes relation between two parties
    in dispute. 'Between us' is the natural English equivalent in this context.
- source_word: מוֹכִיחַ
  chosen: arbiter
  alternatives:
  - mediator
  - umpire
  - one who decides
  - one who reproves
  lexicon: HALOT
  rationale: From יכח in this context of legal dispute, the sense is not merely 'reprover'
    but a third party who adjudicates between two sides. 'Arbiter' captures the judicial/intermediary
    role without importing later theological categories too strongly. 'Mediator' is
    possible, but 'arbiter' better fits the forensic setting of Job 9.
- source_word: יָשֵׁת
  chosen: might lay
  alternatives:
  - would place
  - could set
  lexicon: HALOT
  rationale: The jussive/imperfect form expresses potential or desired action in relation
    to the absent arbiter. 'Might lay' communicates this hypothetical nuance in smooth
    English.
- source_word: יָדוֹ
  chosen: his hand
  alternatives:
  - his authority
  - his power
  lexicon: HALOT
  rationale: The Hebrew is literally 'his hand.' In context it likely symbolizes imposed
    authority or control over both parties, but the concrete image should be preserved
    in the main text rather than interpreted away.
- source_word: עַל שְׁנֵינוּ
  chosen: on us both
  alternatives:
  - upon both of us
  - on the two of us
  lexicon: HALOT
  rationale: This phrase indicates equal relation to both disputants. 'On us both'
    is concise, natural, and preserves the image of the hand resting on both parties.
