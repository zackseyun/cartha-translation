id: JOB.7.20
reference: Job 7:20
source:
  edition: WLC
  text: חָטָ֡אתִי מָ֤ה אֶפְעַ֨ל לָ/ךְ֮ נֹצֵ֪ר הָ/אָ֫דָ֥ם לָ֤/מָה שַׂמְתַּ֣/נִי לְ/מִפְגָּ֣ע
    לָ֑/ךְ וָ/אֶהְיֶ֖ה עָלַ֣/י לְ/מַשָּֽׂא׀׃
translation:
  text: If I have sinned, what can I do to you, watcher of man? Why have you made
    me your target, so that I have become a burden to myself?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'watcher of humankind.' The Hebrew has singular 'man' used generically
      for humanity.
    reason: lexical_alternative
  - marker: b
    text: Or 'Why have you made me a target for you?'
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'a burden to myself'; some ancient versions reflect 'a burden to
      you.'
    reason: alternative_reading
lexical_decisions:
- source_word: חָטָאתִי
  chosen: If I have sinned
  alternatives:
  - I have sinned
  lexicon: HALOT
  rationale: Formally a perfect 1cs, 'I have sinned.' In context Job is speaking rhetorically
    and concessively, so English idiom is better served by making the concession explicit
    with 'If I have sinned,' which preserves the argumentative force without overstating
    a flat confession.
- source_word: מָה אֶפְעַל לָךְ
  chosen: what can I do to you
  alternatives:
  - what shall I do to you
  - what have I done to you
  lexicon: HALOT
  rationale: The verb is imperfect 1cs of עשה/פעל in the sense 'do, make.' The phrase
    asks what action Job could take affecting God. 'Can' captures the rhetorical sense
    of incapacity better than a simple future 'shall.' 'What have I done' would require
    a different verbal sense than the form here.
- source_word: נֹצֵר הָאָדָם
  chosen: watcher of man
  alternatives:
  - guardian of man
  - observer of humankind
  - watcher of humanity
  lexicon: HALOT
  rationale: נֹצֵר can denote one who watches, keeps, or guards. In this complaint
    context, 'watcher' preserves the ambiguity between protective guarding and scrutinizing
    surveillance. הָאָדָם is singular generic; per doctrine, gender-accurate rendering
    allows 'man' for representative humanity. An inclusive alternative is preserved
    in a footnote.
- source_word: הָאָדָם
  chosen: man
  alternatives:
  - humankind
  - humanity
  lexicon: HALOT
  rationale: The noun is generic singular אדם. Following the stated policy, a gender-accurate
    representative singular is retained in the main text as 'man,' with an inclusive
    alternative noted.
- source_word: לָמָה שַׂמְתַּנִי לְמִפְגָּע לָךְ
  chosen: Why have you made me your target
  alternatives:
  - Why have you made me a target for you
  - Why have you set me against you
  - Why have you made me an object of attack to you
  lexicon: HALOT
  rationale: מִפְגָּע denotes something struck, encountered violently, or a target/object
    of attack. 'Your target' is concise, natural English and fits Job's complaint
    that God has fixed attention on him. The dative לָךְ is absorbed idiomatically
    into the possessive 'your.'
- source_word: וָאֶהְיֶה עָלַי לְמַשָּׂא
  chosen: so that I have become a burden to myself
  alternatives:
  - and I have become a burden to myself
  - so that I am a burden to myself
  - and I am a burden to you
  lexicon: HALOT
  rationale: The consonantal text with עָלַי most naturally yields 'to/for myself'
    or 'upon myself,' hence 'a burden to myself.' This is the harder reading and is
    well attested in the MT. Some ancient versions and interpreters reflect 'to you,'
    but that is not the Masoretic reading and is better preserved in a footnote as
    an alternative.
