- issue: Rendering of אדם in a generic singular expression
  chosen_reading: man
  alternative_readings:
  - humankind
  - humanity
  rationale: The Hebrew is grammatically singular and representative. In keeping with
    the translation policy's gender-accurate principle, the main text retains 'man'
    while preserving an inclusive alternative in a footnote for readers who may otherwise
    hear the English as male-exclusive.
