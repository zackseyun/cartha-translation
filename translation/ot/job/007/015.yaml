id: JOB.7.15
reference: Job 7:15
source:
  edition: WLC
  text: וַ/תִּבְחַ֣ר מַחֲנָ֣ק נַפְשִׁ֑/י מָ֝֗וֶת מֵֽ/עַצְמוֹתָֽ/י׃
translation:
  text: so that my soul chooses strangling, death rather than my bones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my soul would choose choking' or 'my life would choose suffocation.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'death from my bones'; the sense is that he prefers death rather
      than continuing in his afflicted bodily existence.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתִּבְחַר
  chosen: chooses
  alternatives:
  - would choose
  - chose
  lexicon: HALOT
  rationale: 'From בחר, ''choose.'' In context following Job''s preceding wish-language,
    the waw-consecutive can be rendered in an English present-like sense within the
    poetic flow: ''so that my soul chooses.'' ''Would choose'' is possible as a contextual
    smoothing, but the Hebrew form itself straightforwardly states the action.'
- source_word: מַחֲנָק
  chosen: strangling
  alternatives:
  - choking
  - suffocation
  lexicon: HALOT
  rationale: The noun denotes strangling/choking. 'Strangling' preserves the concrete
    and severe imagery better than the more generalized 'suffocation.'
- source_word: נַפְשִׁי
  chosen: my soul
  alternatives:
  - I
  - my life
  - myself
  lexicon: HALOT
  rationale: נֶפֶשׁ can mean soul, self, life, or person depending on context. Here
    'my soul' preserves the Hebrew expression and the intensity of Job's inner being
    as subject. Alternatives are possible, but this is not misleading in context.
- source_word: מָוֶת
  chosen: death
  lexicon: HALOT
  rationale: Standard rendering of מָוֶת.
- source_word: מֵעַצְמוֹתָי
  chosen: rather than my bones
  alternatives:
  - rather than these bones of mine
  - rather than my body
  lexicon: HALOT
  rationale: 'Literally ''from my bones.'' In this poetic context the comparative
    sense after ''death'' is commonly understood: Job prefers death over his bones,
    that is, over continued existence in his skeletal, afflicted body. ''Bones'' should
    be retained rather than flattened to ''body,'' though the idiomatic force is noted.'
