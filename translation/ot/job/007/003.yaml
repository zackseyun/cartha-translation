id: JOB.7.3
reference: Job 7:3
source:
  edition: WLC
  text: כֵּ֤ן הָנְחַ֣לְתִּי לִ֭/י יַרְחֵי שָׁ֑וְא וְ/לֵיל֥וֹת עָ֝מָ֗ל מִנּוּ לִֽ/י־־׃
translation:
  text: So I have been allotted months of emptiness, and nights of misery have been
    assigned to me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'months of futility' or 'months of vanity' for 'months of emptiness.'
    reason: lexical_alternative
  - marker: b
    text: Or 'nights of toil,' 'nights of trouble,' or 'nights of affliction' for
      'nights of misery.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כֵּן
  chosen: So
  alternatives:
  - Thus
  - Likewise
  lexicon: HALOT
  rationale: Introduces the comparison/conclusion from the preceding verse. 'So' is
    natural English and preserves the inferential force without sounding stiff.
- source_word: הָנְחַ֣לְתִּי
  chosen: I have been allotted
  alternatives:
  - I have inherited
  - I have been made to possess
  - I have been assigned
  lexicon: HALOT
  rationale: 'The verb נחל in the Hoph''al is passive/causative: Job is the recipient,
    not the active possessor. ''I have been allotted'' captures the sense of something
    apportioned to him, fitting the context of suffering as an assigned lot.'
- source_word: לִי
  chosen: to me
  alternatives:
  - for me
  lexicon: HALOT
  rationale: Dative pronoun marking Job as the recipient of the allotted portion.
    In English this is naturally absorbed into the passive construction 'have been
    allotted ... to me,' though not repeated explicitly in the first clause because
    English style permits it.
- source_word: יַרְחֵי
  chosen: months of
  alternatives:
  - moons of
  lexicon: HALOT
  rationale: The construct plural from 'month' refers to a span of time. 'Months of'
    is the idiomatic English equivalent.
- source_word: שָׁוְא
  chosen: emptiness
  alternatives:
  - vanity
  - worthlessness
  - futility
  lexicon: HALOT
  rationale: שָׁוְא often denotes emptiness, vanity, or what is futile/false. Here
    it describes the character of Job's prolonged suffering. 'Emptiness' is clear
    modern English and conveys the hollow, futile quality of the months.
- source_word: וְלֵילוֹת
  chosen: and nights of
  alternatives:
  - and nights
  lexicon: HALOT
  rationale: Coordinates the second time expression with the first. Keeping 'nights
    of' preserves the construct relationship with the following noun.
- source_word: עָמָל
  chosen: misery
  alternatives:
  - toil
  - trouble
  - affliction
  lexicon: HALOT
  rationale: עָמָל can mean toil, trouble, or misery. In Job's lament, the emphasis
    is not productive labor but painful distress, especially in sleepless nights.
    'Misery' best fits the experiential sense.
- source_word: מִנּוּ
  chosen: have been assigned
  alternatives:
  - have been appointed
  - have been counted out
  - have been apportioned
  lexicon: HALOT
  rationale: Passive plural verb with 'nights' as subject. The sense is that these
    nights have been allotted/appointed to Job. 'Assigned' is idiomatic and parallels
    the first clause while avoiding awkward repetition of 'allotted'.
- source_word: לִי
  chosen: to me
  alternatives:
  - for me
  lexicon: HALOT
  rationale: Marks Job as the one to whom the nights are assigned. Here it is expressed
    explicitly in English because the second clause reads naturally with it.
