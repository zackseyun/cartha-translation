id: JOB.7.12
reference: Job 7:12
source:
  edition: WLC
  text: הֲֽ/יָם אָ֭נִי אִם תַּנִּ֑ין כִּֽי תָשִׂ֖ים עָלַ֣/י מִשְׁמָֽר־־־׃
translation:
  text: Am I the sea, or a sea monster, that you set a guard over me?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'dragon' or 'serpent' for 'sea monster' (Hebrew tannin), a term for a
      great threatening creature, often in sea/chaos imagery.
    reason: lexical_alternative
  - marker: b
    text: Or 'set a watch over me.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲיָם
  chosen: Am I the sea
  alternatives:
  - Am I Sea
  - Am I the ocean
  lexicon: HALOT
  rationale: The interrogative הֲ with יָם introduces a rhetorical question. 'The
    sea' is the most direct and idiomatic rendering; 'ocean' is possible in modern
    English but less tied to the Hebrew imagery of the chaotic sea.
- source_word: אֲנִי
  chosen: I
  rationale: First person singular pronoun, expressed for emphasis in the rhetorical
    question. In English it is naturally incorporated as 'Am I...'.
- source_word: אִם
  chosen: or
  alternatives:
  - if
  - or if
  lexicon: HALOT
  rationale: 'Here אִם functions disjunctively in a paired rhetorical question: ''Am
    I the sea, or a sea monster...?'' Rendering it as ''or'' best reflects the syntax
    and sense.'
- source_word: תַּנִּין
  chosen: sea monster
  alternatives:
  - dragon
  - serpent
  - monster
  lexicon: HALOT
  rationale: תַּנִּין can denote a great sea creature, dragon, or serpent depending
    on context. In parallel with 'the sea' and in Job's poetic imagery of threatening
    chaos, 'sea monster' is the clearest modern English choice without over-specifying
    mythological identity.
- source_word: כִּי
  chosen: that
  alternatives:
  - for
  - because
  lexicon: HALOT
  rationale: 'Here כִּי introduces the result/content clause explaining the rhetorical
    comparison: ''that you set a guard over me.'' ''Because'' is possible, but ''that''
    reads more naturally in English after the rhetorical question.'
- source_word: תָשִׂים
  chosen: you set
  alternatives:
  - you place
  - you station
  lexicon: HALOT
  rationale: Qal imperfect of שׂים, 'to put/place/set.' 'Set' is concise and idiomatic
    with 'guard over me.'
- source_word: עָלַי
  chosen: over me
  alternatives:
  - against me
  - upon me
  lexicon: HALOT
  rationale: The preposition עַל with מִשְׁמָר in this context conveys supervision
    or watchfulness directed over Job. 'Over me' best fits the idiom 'set a guard
    over me.'
- source_word: מִשְׁמָר
  chosen: a guard
  alternatives:
  - a watch
  - watch
  - guard
  lexicon: HALOT
  rationale: מִשְׁמָר denotes guard, watch, or custody. 'A guard' works well in English
    with the verb 'set' and preserves the sense of imposed surveillance or restraint.
    'Watch' is possible and worth preserving as a lexical alternative.
