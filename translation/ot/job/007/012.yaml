theological_decisions:
- issue: Imagery of תַּנִּין in poetic chaos language
  chosen_reading: Rendered as 'sea monster' without mythologizing beyond the text
  alternative_readings:
  - dragon
  - serpent
  rationale: The verse uses stock ancient Near Eastern/poetic imagery of the sea and
    dangerous sea creature to express Job's complaint that God treats him like a cosmic
    threat needing restraint. The translation should preserve the imagery without
    importing a more developed mythological system not explicit in the verse.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Preserve theological tension rather than resolve it.'
