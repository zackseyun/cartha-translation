id: JOB.7.1
reference: Job 7:1
source:
  edition: WLC
  text: הֲ/לֹא צָבָ֣א לֶ/אֱנ֣וֹשׁ על אָ֑רֶץ וְ/כִ/ימֵ֖י שָׂכִ֣יר יָמָֽי/ו־־׃
translation:
  text: Is not man consigned to hard service on earth, and are not his days like those
    of a hired worker?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "Does not man have warfare on earth?" The Hebrew צָבָא can denote military
      service or warfare, but here likely refers more broadly to a burdensome term
      of service or toil, as the parallel with "a hired worker" suggests.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲלֹא
  chosen: Is not ... ?
  alternatives:
  - Surely ...
  - Is it not ... ?
  lexicon: HALOT
  rationale: Introduces a rhetorical question expecting an affirmative answer. English
    'Is not ... ?' preserves the interrogative force naturally.
- source_word: צָבָא
  chosen: consigned to hard service
  alternatives:
  - warfare
  - service
  - toil
  - appointed time
  lexicon: HALOT
  rationale: The noun can denote military service/warfare or a period of compulsory
    service. In Job 7:1 the parallel with 'days of a hired worker' points to burdensome,
    imposed labor rather than literal soldiering. 'Consigned to hard service' preserves
    the sense of an onerous term of service without flattening it to mere 'work.'
- source_word: אֱנוֹשׁ
  chosen: man
  alternatives:
  - a human being
  - mortal man
  lexicon: HALOT
  rationale: The term emphasizes frail humanity/mortality. 'Man' fits the generic
    representative sense and follows the project's gender-accurate policy; the broader
    human reference is clear from context.
- source_word: עַל־אָרֶץ
  chosen: on earth
  alternatives:
  - upon the earth
  - on the land
  lexicon: HALOT
  rationale: Standard locative expression. 'On earth' is idiomatic and preserves the
    broad human setting rather than a specific parcel of land.
- source_word: וְכִימֵי
  chosen: and are not his days like those of
  alternatives:
  - and like the days of
  - and as the days of
  lexicon: HALOT
  rationale: The comparative כ plus 'days of' sets up the second half of the rhetorical
    question. English expands slightly for natural syntax while preserving the comparison.
- source_word: שָׂכִיר
  chosen: a hired worker
  alternatives:
  - a hireling
  - a hired laborer
  lexicon: HALOT
  rationale: Refers to a wage-earning laborer hired for service. 'Hired worker' is
    clear modern English; 'hireling' is traditional but can sound archaic or pejorative
    beyond the Hebrew.
- source_word: יָמָיו
  chosen: his days
  alternatives:
  - his lifetime
  - his days of life
  lexicon: HALOT
  rationale: A straightforward rendering that preserves the temporal metaphor of life's
    days.
