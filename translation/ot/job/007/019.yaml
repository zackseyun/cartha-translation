id: JOB.7.19
reference: Job 7:19
source:
  edition: WLC
  text: כַּ֭/מָּה לֹא תִשְׁעֶ֣ה מִמֶּ֑/נִּי לֹֽא תַ֝רְפֵּ֗/נִי עַד בִּלְעִ֥/י רֻקִּֽ/י־־־׃
translation:
  text: How long will you not look away from me, nor leave me alone until I swallow
    my spit?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'turn your gaze from me' / 'let me alone until I swallow my saliva'—an
      idiom meaning 'for even the briefest moment.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כַּמָּה
  chosen: How long
  alternatives:
  - How much
  - Why
  lexicon: HALOT
  rationale: In lament contexts כַּמָּה commonly introduces a temporal complaint,
    best rendered idiomatically as 'How long' rather than the more literal but less
    fitting 'How much.'
- source_word: תִשְׁעֶה מִמֶּנִּי
  chosen: will you not look away from me
  alternatives:
  - will you not turn your gaze from me
  - will you not look aside from me
  lexicon: HALOT
  rationale: The verb שׁעה here conveys directing or turning one's gaze. In context
    Job asks God to cease fixed scrutiny, so 'look away from me' captures the sense
    naturally in English.
- source_word: תַרְפֵּנִי
  chosen: leave me alone
  alternatives:
  - let me alone
  - relax your hold on me
  - leave off from me
  lexicon: HALOT
  rationale: From רפה in Hiphil, the sense is to let go or desist. 'Leave me alone'
    is idiomatic modern English and fits the parallel with 'look away from me.'
- source_word: עַד
  chosen: until
  alternatives:
  - before
  lexicon: HALOT
  rationale: The preposition marks the limit of the requested respite.
- source_word: בִּלְעִי רֻקִּי
  chosen: I swallow my spit
  alternatives:
  - I swallow my saliva
  - I swallow my spittle
  lexicon: HALOT
  rationale: The Hebrew is a vivid idiom for the briefest possible moment. 'Spit'
    is more natural contemporary English than 'spittle,' while preserving the earthy
    force of Job's speech.
