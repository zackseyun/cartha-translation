id: JOB.7.5
reference: Job 7:5
source:
  edition: WLC
  text: לָ֘בַ֤שׁ בְּשָׂרִ֣/י רִ֭מָּה ו/גיש עָפָ֑ר עוֹרִ֥/י רָ֝גַ֗ע וַ/יִּמָּאֵֽס׃
translation:
  text: My flesh is clothed with worms and clods of dust; my skin hardens, then breaks
    out again.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my skin closes up, then festers again.' The Hebrew of the final two
      verbs is difficult, and the line likely describes skin that briefly heals over
      and then breaks open again.
    reason: alternative_reading
lexical_decisions:
- source_word: לָבַשׁ
  chosen: is clothed with
  alternatives:
  - has put on
  - is covered with
  lexicon: HALOT
  rationale: The verb literally means 'to clothe/put on.' With 'my flesh' as subject
    and 'worms and clods of dust' as what covers it, English idiom is best preserved
    by the passive-like expression 'is clothed with,' which retains the vivid metaphor
    without awkwardness.
- source_word: בְּשָׂרִי
  chosen: my flesh
  alternatives:
  - my body
  lexicon: HALOT
  rationale: '''Flesh'' is the direct lexical equivalent and preserves the physical,
    bodily emphasis of Job''s affliction better than the more generalized ''body.'''
- source_word: רִמָּה
  chosen: worms
  alternatives:
  - maggots
  lexicon: HALOT
  rationale: The noun denotes worms/grubs associated with decay. 'Worms' is the broader
    and more traditional rendering; 'maggots' is possible but narrower and more interpretive.
- source_word: גיש עפר
  chosen: clods of dust
  alternatives:
  - crusts of dirt
  - lumps of dust
  lexicon: HALOT
  rationale: The second noun is 'dust.' The first, a rare form, is commonly understood
    as a mass/clod/crust. 'Clods of dust' gives a natural English rendering that conveys
    caked earth or scabs like dirt on the skin while staying close to the Hebrew imagery.
- source_word: עוֹרִי
  chosen: my skin
  alternatives:
  - my hide
  lexicon: HALOT
  rationale: The ordinary sense is 'skin.' 'Hide' would be too animal-like in English
    for this context.
- source_word: רָגַע
  chosen: hardens
  alternatives:
  - heals over
  - closes up
  - settles
  lexicon: HALOT
  rationale: In context of diseased skin followed by renewed eruption, the verb likely
    describes the skin drawing together or hardening over for a moment. 'Hardens'
    fits the sequence and remains concrete.
- source_word: וַיִּמָּאֵס
  chosen: breaks out again
  alternatives:
  - festers again
  - is loathsome
  - dissolves
  lexicon: HALOT
  rationale: The verb can carry the sense of rejecting/despising, but in this bodily
    context many understand it of the skin breaking open or becoming foul again. 'Breaks
    out again' captures the cyclical medical imagery and pairs naturally with the
    preceding verb.
