theological_decisions:
- issue: Anthropological terms רוּחַ and נֶפֶשׁ in Hebrew poetry
  chosen_reading: Render distinctly as 'spirit' and 'soul' without collapsing them
    into a single English term
  alternative_readings:
  - '''mind'' and ''heart'''
  - '''inner being'' for both'
  rationale: The verse uses two different Hebrew terms in poetic parallelism. Preserving
    both as 'spirit' and 'soul' maintains the texture and intensity of Job's self-expression
    without forcing a technical doctrine of human composition.
  doctrine_reference: Preserve theological tension rather than resolve it.
