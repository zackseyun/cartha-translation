id: JOB.7.11
reference: Job 7:11
source:
  edition: WLC
  text: גַּם אֲנִי֮ לֹ֤א אֶחֱשָׂ֫ךְ פִּ֥/י אֲֽ֭דַבְּרָה בְּ/צַ֣ר רוּחִ֑/י אָ֝שִׂ֗יחָה
    בְּ/מַ֣ר נַפְשִֽׁ/י־׃
translation:
  text: Therefore I also will not restrain my mouth; I will speak in the distress
    of my spirit; I will complain in the bitterness of my soul.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I will not hold back my mouth.' The Hebrew idiom literally speaks of
      not withholding or restraining the mouth.
    reason: lexical_alternative
  - marker: b
    text: Or 'in the anguish of my spirit.'
    reason: lexical_alternative
  - marker: c
    text: Or 'I will lament' or 'I will speak.' The Hebrew verb can carry a range
      of reflective or complaining speech depending on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: גַּם
  chosen: also
  alternatives:
  - therefore
  - even
  lexicon: HALOT
  rationale: גַּם commonly means 'also/even.' In context it links Job's response to
    the preceding thought ('so/therefore I also'), but the core lexical value is additive.
    'Also' preserves that value without over-interpreting the discourse relation.
- source_word: לֹא אֶחֱשָׂךְ פִּי
  chosen: I will not restrain my mouth
  alternatives:
  - I will not hold back my mouth
  - I will not spare my mouth
  - I will not keep silent
  lexicon: HALOT
  rationale: חָשַׂךְ means 'withhold, spare, restrain.' With 'my mouth' as object,
    the idiom means not holding back speech. 'Restrain my mouth' is natural English
    and preserves the metaphor better than the more interpretive 'keep silent.'
- source_word: אֲדַבְּרָה
  chosen: I will speak
  alternatives:
  - let me speak
  - I speak
  lexicon: HALOT
  rationale: The 1cs imperfect here expresses Job's resolve/intention. 'I will speak'
    fits the sequence of volitional statements and keeps the straightforward sense
    of דבר.
- source_word: בְּצַר רוּחִי
  chosen: in the distress of my spirit
  alternatives:
  - in the anguish of my spirit
  - out of the distress of my spirit
  lexicon: HALOT
  rationale: צַר denotes narrowness, distress, anguish. 'Distress' is a clear modern
    rendering. רוּחַ here refers to Job's inner spirit/breathing life, not the Holy
    Spirit; 'my spirit' is the most direct rendering.
- source_word: אָשִׂיחָה
  chosen: I will complain
  alternatives:
  - I will muse
  - I will speak
  - I will lament
  lexicon: HALOT
  rationale: שִׂיחַ can mean meditate, muse, speak, or complain/lament depending on
    context. In parallel with Job's suffering and the phrase 'in the bitterness of
    my soul,' 'complain' best captures the lamenting force here.
- source_word: בְּמַר נַפְשִׁי
  chosen: in the bitterness of my soul
  alternatives:
  - in the bitterness of my life
  - out of the bitterness of my soul
  lexicon: HALOT
  rationale: מַר means 'bitter/bitterness.' נֶפֶשׁ often denotes the self, life, or
    soul. In poetic lament, 'my soul' preserves the anthropological texture of the
    Hebrew and matches the emotional depth of the phrase.
