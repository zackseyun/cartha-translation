id: JOB.7.18
reference: Job 7:18
source:
  edition: WLC
  text: וַ/תִּפְקְדֶ֥/נּוּ לִ/בְקָרִ֑ים לִ֝/רְגָעִ֗ים תִּבְחָנֶֽ/נּוּ׃
translation:
  text: that you attend to him every morning, and test him every moment?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'visit him every morning.' The Hebrew verb can mean 'visit,' 'attend
      to,' or 'take note of.'
    reason: lexical_alternative
  - marker: b
    text: Or 'examine him every moment.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתִּפְקְדֶנּוּ
  chosen: you attend to him
  alternatives:
  - you visit him
  - you pay attention to him
  - you appoint him
  lexicon: HALOT
  rationale: The verb פקד has a broad semantic range including visit, attend to, take
    note of, or appoint. In this context, parallel to 'test him' and following the
    rhetorical question of v. 17, the sense is God's active attention toward man.
    'Attend to' captures sustained notice without implying a benevolent visit only.
- source_word: לִבְקָרִים
  chosen: every morning
  alternatives:
  - in the mornings
  - morning by morning
  lexicon: HALOT
  rationale: בקרים is a plural of recurring time, and with ל expresses repeated occurrence.
    'Every morning' is idiomatic modern English and preserves the iterative force.
- source_word: לִרְגָעִים
  chosen: every moment
  alternatives:
  - moment by moment
  - at every instant
  lexicon: HALOT
  rationale: רגעים denotes brief moments or instants. 'Every moment' is natural English
    and preserves the sense of continual repetition.
- source_word: תִּבְחָנֶנּוּ
  chosen: test him
  alternatives:
  - examine him
  - try him
  - probe him
  lexicon: HALOT
  rationale: בחן commonly means test or examine, often with the nuance of proving
    by scrutiny. 'Test' fits the context of relentless divine scrutiny and pairs well
    with the previous verb.
- source_word: נּוּ / him
  chosen: him
  alternatives:
  - man
  - a human being
  lexicon: HALOT
  rationale: The pronominal suffix is masculine singular, referring back to אנוש/אדם
    in the previous verse. 'Him' preserves the gender-accurate singular reference
    in line with the source text.
