theological_decisions:
- issue: Tone of divine oversight
  chosen_reading: Render God's action as close, continual scrutiny without softening
    it into purely benevolent care.
  alternative_readings:
  - Render as benevolent visitation or care
  rationale: In Job's complaint, the language is rhetorically negative or burdensome
    rather than comforting. The translation should preserve that tension and not import
    a devotional tone absent from the immediate context.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather
    than resolve it.
