id: JOB.7.14
reference: Job 7:14
source:
  edition: WLC
  text: וְ/חִתַּתַּ֥/נִי בַ/חֲלֹמ֑וֹת וּֽ/מֵ/חֶזְיֹנ֥וֹת תְּבַעֲתַֽ/נִּי׃
translation:
  text: then you terrify me with dreams and frighten me with visions.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and you terrify me with dreams, and from visions you frighten me.' The
      Hebrew prepositions can be rendered more formally as 'in/by' and 'from.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ
  chosen: then
  alternatives:
  - and
  lexicon: HALOT
  rationale: The conjunction links this clause to the preceding complaint and is best
    rendered contextually as 'then' in English to reflect sequence/result rather than
    a bare additive 'and.'
- source_word: חִתַּתַּנִי
  chosen: you terrify me
  alternatives:
  - you shatter me
  - you dismay me
  - you frighten me
  lexicon: HALOT
  rationale: From חתת in the Piel with 1cs suffix, addressing God as second masculine
    singular. In context of nocturnal distress, 'terrify' best captures intense emotional
    disturbance without over-literalizing as physical 'shatter.'
- source_word: בַּחֲלֹמוֹת
  chosen: with dreams
  alternatives:
  - in dreams
  - by dreams
  lexicon: HALOT
  rationale: 'The preposition ב here is instrumental or associative in context: the
    means by which Job is terrified. ''With dreams'' is idiomatic English and preserves
    the sense well.'
- source_word: וּמֵחֶזְיֹנוֹת
  chosen: with visions
  alternatives:
  - and from visions
  - and by visions
  lexicon: HALOT
  rationale: The preposition מן can indicate source or means. In parallel with 'with
    dreams,' rendering as 'with visions' gives natural English while preserving the
    poetic parallelism. The conjunction is absorbed into the parallel structure.
- source_word: תְּבַעֲתַנִּי
  chosen: frighten me
  alternatives:
  - terrify me
  - alarm me
  lexicon: HALOT
  rationale: From בעת in the Piel with 1cs suffix, denoting sudden dread or terror.
    'Frighten me' provides a natural English parallel to the previous verb while avoiding
    unnecessary repetition of 'terrify' in both cola.
