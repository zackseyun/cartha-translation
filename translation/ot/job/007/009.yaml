theological_decisions:
- issue: Rendering שְׁאוֹל
  chosen_reading: Sheol
  alternative_readings:
  - the grave
  - the realm of the dead
  rationale: The Hebrew term can denote the underworld/grave realm of the dead. Translating
    it directly as 'Sheol' preserves the conceptual world of the text and avoids resolving
    debates about whether the emphasis is burial, the underworld, or death generally.
    In context, Job speaks phenomenologically about death's finality from a human
    vantage point, not making a full doctrinal statement about resurrection.
  doctrine_reference: Translation philosophy §1, §3
