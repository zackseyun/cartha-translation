id: JOB.7.9
reference: Job 7:9
source:
  edition: WLC
  text: כָּלָ֣ה עָ֭נָן וַ/יֵּלַ֑ךְ כֵּ֥ן יוֹרֵ֥ד שְׁ֝א֗וֹל לֹ֣א יַעֲלֶֽה׃
translation:
  text: As a cloud fades away and vanishes, so the one who goes down to Sheol does
    not come up.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the grave' or 'the realm of the dead' for 'Sheol.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּלָה
  chosen: fades away
  alternatives:
  - is consumed
  - comes to an end
  lexicon: HALOT
  rationale: The verb denotes coming to an end or being finished. With 'cloud' as
    subject, 'fades away' gives natural English while preserving the image of disappearance
    rather than destruction alone.
- source_word: עָנָן
  chosen: cloud
  lexicon: HALOT
  rationale: Straightforward nominal sense; the simile depends on the ordinary image
    of a cloud dissipating.
- source_word: וַיֵּלַךְ
  chosen: and vanishes
  alternatives:
  - and goes away
  - and passes on
  lexicon: HALOT
  rationale: Literally 'and goes,' but in parallel with 'cloud' and כָּלָה the idiomatic
    force is disappearance. 'Vanishes' communicates the result in clear modern English
    without over-paraphrasing.
- source_word: כֵּן
  chosen: so
  alternatives:
  - thus
  - in the same way
  lexicon: HALOT
  rationale: Introduces the comparison from the cloud image to the human condition;
    'so' is concise and natural.
- source_word: יוֹרֵד
  chosen: the one who goes down
  alternatives:
  - he who descends
  - the one descending
  lexicon: HALOT
  rationale: The participle functions substantivally, referring generically to a person.
    'The one who goes down' preserves the ongoing/generic force better than a simple
    finite verb.
- source_word: שְׁאוֹל
  chosen: Sheol
  alternatives:
  - the grave
  - the realm of the dead
  lexicon: HALOT
  rationale: Following original-language primacy, the Hebrew term is preserved rather
    than collapsed into 'grave' or a fully interpreted phrase. This avoids importing
    a narrower or more developed doctrinal concept than the text itself states.
- source_word: לֹא יַעֲלֶה
  chosen: does not come up
  alternatives:
  - will not come up
  - does not ascend
  lexicon: HALOT
  rationale: The imperfect here expresses the general truth of the simile. 'Does not
    come up' is idiomatic English and keeps the vertical imagery corresponding to
    'goes down.'
