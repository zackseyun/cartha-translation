id: JOB.7.21
reference: Job 7:21
source:
  edition: WLC
  text: וּ/מֶ֤ה לֹא תִשָּׂ֣א פִשְׁעִ/י֮ וְ/תַעֲבִ֪יר אֶת עֲוֺ֫נִ֥/י כִּֽי עַ֭תָּה
    לֶ/עָפָ֣ר אֶשְׁכָּ֑ב וְ/שִׁ֖חֲרְתַּ֣/נִי וְ/אֵינֶֽ/נִּי׀־־־׃פ
translation:
  text: Why do you not pardon my transgression and take away my iniquity? For now
    I will lie down in the dust; you will seek me diligently, but I will be gone.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'forgive my transgression and pass over my iniquity.' The Hebrew verbs
      are literally 'lift/carry' and 'cause to pass over,' idioms for pardon and removal
      of guilt.
    reason: lexical_alternative
  - marker: b
    text: Or 'you will seek me early.' The Hebrew verb can carry an early-morning
      nuance, but here likely means earnest or diligent seeking.
    reason: lexical_alternative
lexical_decisions:
- source_word: תִשָּׂא
  chosen: pardon
  alternatives:
  - lift away
  - forgive
  lexicon: HALOT
  rationale: The verb נשׂא literally means 'lift/carry.' With sin as its object, it
    idiomatically conveys bearing away or forgiving guilt. 'Pardon' gives clear modern
    English while preserving the judicial-relational sense. 'Forgive' is possible,
    but using 'pardon' here helps distinguish it from the following verb.
- source_word: פִשְׁעִי
  chosen: my transgression
  alternatives:
  - my rebellion
  - my offense
  lexicon: HALOT
  rationale: פשע commonly denotes transgression or rebellion, often a willful breach.
    'Transgression' is the most standard and suitably weighty rendering in this penitential
    context.
- source_word: וְתַעֲבִיר
  chosen: take away
  alternatives:
  - pass over
  - remove
  lexicon: HALOT
  rationale: The Hiphil of עבר can mean cause to pass away, remove, or pass over.
    With עון as object, the sense is removal of guilt. 'Take away' is idiomatic and
    readable; 'pass over' is possible but less natural here and may suggest overlooking
    rather than removing.
- source_word: עֲוֺנִי
  chosen: my iniquity
  alternatives:
  - my guilt
  - my wrongdoing
  lexicon: HALOT
  rationale: עון can denote iniquity, guilt, or punishment for iniquity. Here Job
    pairs it with פשע, and the focus is on his moral burden before God. 'Iniquity'
    preserves the moral-theological weight; 'guilt' is a viable nuance but narrower.
- source_word: כִּי עַתָּה
  chosen: For now
  alternatives:
  - For soon
  - Because now
  lexicon: HALOT
  rationale: The phrase introduces the reason grounded in Job's imminent death. 'For
    now' best reflects the temporal force without overinterpreting.
- source_word: לֶעָפָר אֶשְׁכָּב
  chosen: I will lie down in the dust
  alternatives:
  - I will lie down in the earth
  - I will lie in the dust
  lexicon: HALOT
  rationale: עפר 'dust' evokes mortality and burial imagery. 'Lie down in the dust'
    preserves the poetic image and likely allusion to death.
- source_word: וְשִׁחֲרְתַּנִי
  chosen: you will seek me diligently
  alternatives:
  - you will seek me early
  - you will search for me
  lexicon: HALOT
  rationale: The verb שׁחר in the Piel often means seek earnestly/diligently, historically
    with an early-morning nuance. In English, 'seek me diligently' communicates the
    idiomatic force better than the overly literal 'seek me early.'
- source_word: וְאֵינֶנִּי
  chosen: but I will be gone
  alternatives:
  - and I am not
  - but I will not be
  lexicon: HALOT
  rationale: The Hebrew is literally 'and I am not,' an idiom for disappearance/death.
    'But I will be gone' expresses the sense naturally in English and fits the future-oriented
    context created by the surrounding verbs.
