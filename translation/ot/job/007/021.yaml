theological_decisions:
- issue: Rendering paired sin terms distinctly
  chosen_reading: Use 'transgression' for פשע and 'iniquity' for עון
  alternative_readings:
  - Use 'sin' for both
  - Use 'offense' and 'guilt'
  rationale: The Hebrew uses two related but distinct terms for wrongdoing. Preserving
    the distinction reflects the poetic parallelism and avoids flattening the text's
    moral vocabulary.
  doctrine_reference: Translation philosophy §5 (Consistency of key terms, or documented
    exception)
- issue: Death imagery in לֶעָפָר אֶשְׁכָּב
  chosen_reading: Retain the concrete image 'lie down in the dust' rather than interpretive
    'die'
  alternative_readings:
  - For now I will die
  rationale: The verse uses poetic burial/mortality imagery. Preserving the image
    maintains the text's literary force and theological tension without paraphrasing
    beyond the source.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve source-text
    plain sense'
