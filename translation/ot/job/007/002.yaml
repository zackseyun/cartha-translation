id: JOB.7.2
reference: Job 7:2
source:
  edition: WLC
  text: כְּ/עֶ֥בֶד יִשְׁאַף צֵ֑ל וּ֝/כְ/שָׂכִ֗יר יְקַוֶּ֥ה פָעֳלֽ/וֹ־׃
translation:
  text: Like a slave who longs for shade, and like a hired worker who waits for his
    wages,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'servant' for 'slave' (עֶבֶד); the Hebrew term can cover both, but 'slave'
      better preserves the bonded status in this context.
    reason: lexical_alternative
  - marker: b
    text: Or 'shadow' for 'shade.' The sense here is relief from the heat.
    reason: lexical_alternative
  - marker: c
    text: Or 'his pay' or 'his reward' for 'his wages.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּ/עֶבֶד
  chosen: like a slave
  alternatives:
  - like a servant
  lexicon: HALOT
  rationale: עֶבֶד commonly denotes a servant/slave. Following the project's guidance,
    'slave' is preferred where the bonded status is more salient than a generic service
    role. In this simile, the social vulnerability and hard labor of the figure are
    foregrounded, so 'slave' best preserves the force.
- source_word: יִשְׁאַף
  chosen: longs for
  alternatives:
  - pants for
  - yearns for
  lexicon: HALOT
  rationale: The verb שׁאף conveys strong desire, even panting or gasping. 'Longs
    for' communicates intense yearning in natural modern English without sounding
    overly physical or awkward here.
- source_word: צֵל
  chosen: shade
  alternatives:
  - shadow
  lexicon: HALOT
  rationale: In context of exhausting labor, צֵל refers to relief from heat, so 'shade'
    is more idiomatic and contextually precise than the more ambiguous 'shadow'.
- source_word: וּכְ/שָׂכִיר
  chosen: and like a hired worker
  alternatives:
  - and like a hired man
  - and like a laborer
  lexicon: HALOT
  rationale: שָׂכִיר is a wage-earning laborer hired for work. 'Hired worker' is gender-accurate
    to the representative sense while preserving the economic nuance better than the
    broader 'laborer.'
- source_word: יְקַוֶּה
  chosen: waits for
  alternatives:
  - hopes for
  - looks eagerly for
  lexicon: HALOT
  rationale: קוה can mean wait, hope, or look eagerly. Here the object is payment
    due after labor, so 'waits for' best captures expectant waiting with straightforward
    English.
- source_word: פָעֳלוֹ
  chosen: his wages
  alternatives:
  - his pay
  - his reward
  - his work
  lexicon: HALOT
  rationale: Though פעל can denote work or deed, in this collocation with a hired
    worker it most naturally refers to the product/compensation of labor, hence 'wages.'
    This fits the parallelism with the laborer awaiting the end-of-day payment.
