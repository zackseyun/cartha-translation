id: JOB.7.16
reference: Job 7:16
source:
  edition: WLC
  text: מָ֭אַסְתִּי לֹא לְ/עֹלָ֣ם אֶֽחְיֶ֑ה חֲדַ֥ל מִ֝מֶּ֗/נִּי כִּי הֶ֥בֶל יָמָֽ/י־־׃
translation:
  text: I despise it; I will not live forever. Leave me alone, for my days are a breath.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'I loathe it' or 'I reject it'; the Hebrew leaves the object unstated.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'breath' can also carry the sense of 'vapor,' emphasizing how brief
      and insubstantial life is.
    reason: lexical_alternative
lexical_decisions:
- source_word: מָאַסְתִּי
  chosen: I despise it
  alternatives:
  - I reject it
  - I loathe it
  - I am disgusted
  lexicon: HALOT
  rationale: The verb מאס commonly means 'reject, despise, spurn.' In this context
    of Job's lament, an object is left unstated in Hebrew; English supplies 'it' to
    make the clause intelligible. 'Despise' preserves the strong aversion without
    over-paraphrasing.
- source_word: לֹא לְעֹלָם אֶחְיֶה
  chosen: I will not live forever
  alternatives:
  - I would not live forever
  - I shall not live always
  lexicon: HALOT
  rationale: The phrase literally combines negation + 'for eternity/forever' + 'I
    will live.' 'I will not live forever' is natural English and fits Job's acknowledgment
    of mortality. It avoids making the line sound like a wish when the Hebrew imperfect
    can state a plain future/reality.
- source_word: חֲדַל
  chosen: Leave me alone
  alternatives:
  - Cease
  - Stop
  - Desist
  lexicon: HALOT
  rationale: The imperative from חדל means 'cease, stop, leave off.' With the following
    prepositional phrase 'from me,' idiomatic English is 'Leave me alone,' expressing
    Job's plea that God stop pressing him.
- source_word: מִמֶּנִּי
  chosen: me
  alternatives:
  - from me
  lexicon: HALOT
  rationale: The preposition מן is absorbed idiomatically into 'Leave me alone.' A
    more literal 'cease from me' is awkward in modern English.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - since
  lexicon: HALOT
  rationale: Here כִּי introduces the reason for Job's plea. 'For' is concise and
    suitably literary without being archaic in this context.
- source_word: הֶבֶל
  chosen: a breath
  alternatives:
  - vanity
  - vapor
  - mere breath
  lexicon: HALOT
  rationale: הבל denotes breath, vapor, transience, emptiness. In Job's mortality
    context, 'a breath' foregrounds brevity and frailty more concretely than the traditional
    but potentially misleading 'vanity.'
- source_word: יָמָי
  chosen: my days
  lexicon: HALOT
  rationale: 'Straightforward possessive plural: Job refers to the fleeting nature
    of his lifespan.'
