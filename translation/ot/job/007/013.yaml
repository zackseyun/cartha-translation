id: JOB.7.13
reference: Job 7:13
source:
  edition: WLC
  text: כִּֽי אָ֭מַרְתִּי תְּנַחֲמֵ֣/נִי עַרְשִׂ֑/י יִשָּׂ֥א בְ֝/שִׂיחִ֗/י מִשְׁכָּבִֽ/י־׃
translation:
  text: When I say, ‘My bed will comfort me; my couch will bear my complaint,’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'For I said' or 'If I said.' The Hebrew כִּי can be read in more than
      one way here; 'When I say' best fits the immediate context and the movement
      into the next verse.
    reason: lexical_alternative
  - marker: b
    text: Or 'my musing' or 'my meditation' for 'my complaint.' The Hebrew שִׂיחַ
      can refer to reflective musing or lamenting speech; in Job's context of suffering,
      'complaint' is likely.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: When
  alternatives:
  - For
  - If
  lexicon: HALOT
  rationale: Here כִּי introduces the content/time circumstance of Job's thought rather
    than a strong causal 'for.' 'When I say' fits the flow into the following verse,
    where even hoped-for rest is denied.
- source_word: אָמַרְתִּי
  chosen: I say
  alternatives:
  - I said
  lexicon: HALOT
  rationale: Although formally perfect ('I said'), English present 'I say' can naturally
    express repeated or immediate inner speech in context. This also pairs smoothly
    with Job's ongoing lament. The quotation marks preserve the direct-speech force.
- source_word: תְּנַחֲמֵנִי
  chosen: will comfort me
  alternatives:
  - will console me
  - will ease me
  lexicon: HALOT
  rationale: From נחם in the Piel, the sense is to comfort/console. 'Comfort me' is
    the most natural and direct English equivalent here for the hoped-for relief from
    suffering.
- source_word: עַרְשִׂי
  chosen: my bed
  alternatives:
  - my couch
  lexicon: HALOT
  rationale: עֶרֶשׂ commonly denotes a bed or couch. 'Bed' is chosen here to distinguish
    it from the following מִשְׁכָּבִי, rendered 'couch,' preserving the poetic parallelism
    with slight variation.
- source_word: יִשָּׂא
  chosen: will bear
  alternatives:
  - will carry
  - will lift
  - will endure
  lexicon: HALOT
  rationale: נשא literally means 'to lift/carry/bear.' In this context of emotional
    burden, 'bear' works idiomatically in English and preserves the metaphor of carrying
    Job's troubled speech.
- source_word: בְשִׂיחִי
  chosen: my complaint
  alternatives:
  - my meditation
  - my musing
  - my troubled talk
  lexicon: HALOT
  rationale: שִׂיחַ can denote musing, meditation, or complaint/lament depending on
    context. In Job's suffering speech, 'complaint' best captures the lamenting sense
    rather than neutral reflection.
- source_word: מִשְׁכָּבִי
  chosen: my couch
  alternatives:
  - my bed
  - my resting place
  lexicon: HALOT
  rationale: מִשְׁכָּב can mean bed, couch, or place of lying down. 'Couch' is chosen
    to avoid repeating 'bed' and to preserve the poetic parallelism with a second
    near-synonym.
