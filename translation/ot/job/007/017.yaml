theological_decisions:
- issue: Representative singular/gender rendering of אֱנוֹשׁ
  chosen_reading: man
  alternative_readings:
  - human being
  - humankind
  rationale: The Hebrew uses a grammatically masculine singular noun with representative
    force. Per doctrine, gender-accurate rendering is preferred over flattening to
    a neutral plural. 'Man' preserves the literary echo with Psalm 8:4 and the singular
    rhetorical form.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Anthropomorphic language for divine regard
  chosen_reading: set your heart on him
  alternative_readings:
  - give him attention
  - fix your mind on him
  rationale: The Hebrew idiom literally speaks of God's 'heart.' Retaining 'heart'
    preserves the text's anthropomorphic and poetic force rather than resolving it
    into abstraction.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 6
