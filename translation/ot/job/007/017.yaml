id: JOB.7.17
reference: Job 7:17
source:
  edition: WLC
  text: מָֽה אֱ֭נוֹשׁ כִּ֣י תְגַדְּלֶ֑/נּוּ וְ/כִי תָשִׁ֖ית אֵלָ֣י/ו לִבֶּֽ/ךָ־־׃
translation:
  text: What is man, that you make so much of him, and that you set your heart on
    him?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'magnify him' or 'make him great.'
    reason: lexical_alternative
  - marker: b
    text: '''Man'' translates Hebrew אֱנוֹשׁ, a singular term for mortal humanity;
      compare Psalm 8:4.'
    reason: cross_reference
lexical_decisions:
- source_word: מָה
  chosen: What
  alternatives:
  - What is it that
  - How is it that
  lexicon: HALOT
  rationale: Interrogative opening introducing a rhetorical question. 'What' is the
    most natural and direct English equivalent here.
- source_word: אֱנוֹשׁ
  chosen: man
  alternatives:
  - a human being
  - mortal man
  - humankind
  lexicon: HALOT
  rationale: אֱנוֹשׁ commonly emphasizes frail humanity or mortal man. 'Man' preserves
    the singular representative force and matches the gender-accurate policy; the
    verse speaks of humanity in the singular through a masculine representative noun.
- source_word: כִּי
  chosen: that
  alternatives:
  - that you should
  - for
  lexicon: HALOT
  rationale: 'Here כִּי introduces the content/result clause after the rhetorical
    question: ''that you make so much of him.'' English ''that'' best captures the
    syntax without over-paraphrasing.'
- source_word: תְגַדְּלֶנּוּ
  chosen: you make so much of him
  alternatives:
  - you magnify him
  - you make him great
  - you exalt him
  lexicon: HALOT
  rationale: From גדל in the Piel, 'make great/magnify.' In this context Job echoes
    Psalm 8:4 but with a more troubled tone. 'Make so much of him' communicates the
    idiomatic sense of giving great regard or significance, in readable modern English,
    while preserving the force of divine attention.
- source_word: וְכִי
  chosen: and that
  alternatives:
  - and why
  - and that you should
  lexicon: HALOT
  rationale: Coordinates the second clause with the first in the same rhetorical structure.
    'And that' preserves the parallelism cleanly.
- source_word: תָשִׁית
  chosen: you set
  alternatives:
  - you place
  - you fix
  lexicon: HALOT
  rationale: Basic sense of שׂים is 'put/place/set.' 'Set' is idiomatic in the expression
    'set your heart on.'
- source_word: אֵלָיו
  chosen: on him
  alternatives:
  - toward him
  - upon him
  lexicon: HALOT
  rationale: With שׂים + לֵב, the preposition marks direction/object of attention.
    'On him' is the most idiomatic English complement in this collocation.
- source_word: לִבֶּךָ
  chosen: your heart
  alternatives:
  - your mind
  - your attention
  lexicon: HALOT
  rationale: Hebrew 'heart' includes thought and attention as well as affection. The
    literal 'heart' should be retained here because the idiom is intelligible in English
    and preserves the anthropomorphic force.
