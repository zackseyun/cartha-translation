theological_decisions:
- issue: Addressee of 'your eyes'
  chosen_reading: Addressed to God
  alternative_readings:
  - addressed generically to an observer
  rationale: In the immediate context Job speaks directly to God (cf. surrounding
    verses), so 'your eyes' is best understood as God's searching gaze. The translation
    preserves the direct address without expanding it to 'your eyes, O God,' since
    the Hebrew does not state the name here.
