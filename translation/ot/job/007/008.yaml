id: JOB.7.8
reference: Job 7:8
source:
  edition: WLC
  text: לֹֽא תְ֭שׁוּרֵ/נִי עֵ֣ין רֹ֑אִי עֵינֶ֖י/ךָ בִּ֣/י וְ/אֵינֶֽ/נִּי־׃
translation:
  text: The eye of the one who sees me will no longer behold me; your eyes will be
    on me, but I will be gone.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'The eye that sees me will not see me.'
    reason: lexical_alternative
  - marker: b
    text: Literally, 'your eyes [are] on me, and I am not'—an idiom meaning that when
      looked for, he is gone.
    reason: lexical_alternative
lexical_decisions:
- source_word: תְשׁוּרֵנִי
  chosen: will ... behold me
  alternatives:
  - will look at me
  - will see me
  lexicon: HALOT
  rationale: 'From שׁוּר, ''to look, behold, gaze at.'' ''Behold'' preserves the visual
    focus and slightly elevated tone of Job''s lament better than the flatter ''see.''
    The imperfect with negation is rendered futurally in context: ''will no longer
    behold me.'''
- source_word: עֵין רֹאִי
  chosen: the eye of the one who sees me
  alternatives:
  - the eye that sees me
  - the seeing eye
  lexicon: HALOT
  rationale: Construct chain literally 'eye of my seer/one seeing me.' The phrase
    is idiomatic for any observer who looks on Job. 'The eye of the one who sees me'
    is transparent and preserves the Hebrew imagery without over-paraphrase.
- source_word: לֹא
  chosen: no longer
  alternatives:
  - not
  - will not
  lexicon: HALOT
  rationale: The simple negation is contextually rendered 'no longer' because the
    verse speaks of Job's impending disappearance from sight, not a timeless denial.
    This brings out the temporal force implied by the lament.
- source_word: עֵינֶיךָ
  chosen: your eyes
  alternatives:
  - your eye
  - your gaze
  lexicon: HALOT
  rationale: The Hebrew is plural. Retaining 'your eyes' preserves the concrete anthropomorphic
    expression addressed to God, common in Hebrew poetry.
- source_word: בִּי
  chosen: on me
  alternatives:
  - upon me
  - at me
  lexicon: HALOT
  rationale: With 'your eyes,' English idiom prefers 'be on me' to express directed
    attention. 'At me' is possible but less natural here.
- source_word: וְאֵינֶנִּי
  chosen: but I will be gone
  alternatives:
  - and I am not
  - but I am no more
  - and I will not be
  lexicon: HALOT
  rationale: Literally 'and I am not,' an idiom for disappearance or death. 'I will
    be gone' communicates the sense in natural English while fitting the future-oriented
    context created by the surrounding verbs.
