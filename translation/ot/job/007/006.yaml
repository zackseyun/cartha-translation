id: JOB.7.6
reference: Job 7:6
source:
  edition: WLC
  text: יָמַ֣/י קַ֭לּוּ מִנִּי אָ֑רֶג וַ֝/יִּכְל֗וּ בְּ/אֶ֣פֶס תִּקְוָֽה־׃
translation:
  text: My days pass more swiftly than a weaver’s shuttle; they come to an end without
    hope.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'My days are swifter than a weaver’s shuttle.'
    reason: lexical_alternative
  - marker: b
    text: The Hebrew word for the weaving instrument may be understood more generally
      as 'weaver’s tool' or 'loom,' but 'shuttle' best fits the image of rapid motion.
    reason: lexical_alternative
lexical_decisions:
- source_word: יָמַי
  chosen: My days
  alternatives:
  - My lifetime
  - My time
  lexicon: HALOT
  rationale: The plural construct with 1cs suffix literally means 'my days.' In context
    Job speaks of the brevity of his life as experienced day by day, so the concrete
    expression is retained rather than abstracting to 'my life.'
- source_word: קַלּוּ
  chosen: pass more swiftly
  alternatives:
  - are swifter
  - are light/quick
  lexicon: HALOT
  rationale: From קלל in the sense of being swift/light. English idiom works better
    with a verbal expression ('pass more swiftly') than the stative 'are swifter,'
    while preserving the comparative force.
- source_word: מִנִּי אָרֶג
  chosen: than a weaver’s shuttle
  alternatives:
  - than a weaver
  - than the weaver's loom
  lexicon: HALOT
  rationale: The noun אֹרֶג refers to weaving apparatus; in this verse the comparison
    is traditionally and contextually understood as the rapidly moving weaver's shuttle
    rather than the person or the whole loom. 'Shuttle' best captures the image of
    speed in natural English.
- source_word: וַיִּכְלוּ
  chosen: they come to an end
  alternatives:
  - they are finished
  - they vanish away
  lexicon: HALOT
  rationale: From כלה, 'be finished, come to an end.' The phrase refers to Job's days
    reaching their end. 'Come to an end' is clear modern English and preserves the
    temporal sense.
- source_word: בְּאֶפֶס תִּקְוָה
  chosen: without hope
  alternatives:
  - in hopelessness
  - with no hope
  lexicon: HALOT
  rationale: אפס conveys nonexistence/lack, and תקוה means hope. 'Without hope' is
    the most natural concise rendering in English and accurately reflects the Hebrew
    prepositional phrase.
