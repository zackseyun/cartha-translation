id: JOB.7.4
reference: Job 7:4
source:
  edition: WLC
  text: אִם שָׁכַ֗בְתִּי וְ/אָמַ֗רְתִּי מָתַ֣י אָ֭קוּם וּ/מִדַּד עָ֑רֶב וְ/שָׂבַ֖עְתִּי
    נְדֻדִ֣ים עֲדֵי נָֽשֶׁף־־־׃
translation:
  text: When I lie down, I say, ‘When will I arise?’ But the evening drags on, and
    I am full of tossing until dawn.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''If I lie down.'' The Hebrew particle can be read conditionally, but
      here it likely introduces a repeated circumstance: ''When I lie down.'''
    reason: lexical_alternative
  - marker: b
    text: Literally, 'and the evening is measured.' The sense is that the evening
      seems to stretch out slowly.
    reason: lexical_alternative
  - marker: c
    text: Hebrew נָשֶׁף can mean 'twilight' and may refer specifically here to morning
      twilight, that is, dawn.
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  chosen: When
  alternatives:
  - If
  lexicon: HALOT
  rationale: Although אִם often means 'if,' in contexts like this it can introduce
    a recurring circumstance or temporal condition. 'When I lie down' fits Job's description
    of repeated nightly misery better than a hypothetical 'If I lie down.'
- source_word: שָׁכַבְתִּי
  chosen: I lie down
  alternatives:
  - I have lain down
  - I lay down
  lexicon: HALOT
  rationale: The qatal here is used in a habitual or iterative sense within Job's
    lament. Present English 'I lie down' best conveys the repeated experience rather
    than a single completed past action.
- source_word: וְאָמַרְתִּי
  chosen: I say
  alternatives:
  - and I said
  - then I say
  lexicon: HALOT
  rationale: Rendered as present habitual alongside the previous verb to reflect Job's
    repeated nightly complaint.
- source_word: מָתַי אָקוּם
  chosen: When will I arise?
  alternatives:
  - When shall I get up?
  - When will I rise?
  lexicon: HALOT
  rationale: אָקוּם from קום means 'arise, get up.' 'Arise' preserves the elevated
    but still natural tone of lament; the phrase expresses impatience for the night
    to end.
- source_word: וּמִדַּד עָרֶב
  chosen: But the evening drags on
  alternatives:
  - and the evening is measured out
  - and the evening stretches on
  - and the night drags on
  lexicon: HALOT
  rationale: The verb from מדד literally relates to measuring, but in context it idiomatically
    conveys the slow extension of the evening/night. 'Drags on' communicates the experiential
    force in natural English. 'Evening' is retained from עָרֶב rather than generalized
    to 'night,' though the sense overlaps.
- source_word: וְשָׂבַעְתִּי
  chosen: I am full of
  alternatives:
  - I am sated with
  - I have had my fill of
  lexicon: HALOT
  rationale: The verb שבע means 'to be full, satisfied, sated.' In this negative context,
    'I am full of' is idiomatic English for being overwhelmed by something unpleasant.
- source_word: נְדֻדִים
  chosen: tossing
  alternatives:
  - restlessness
  - wanderings
  - sleepless tossing
  lexicon: HALOT
  rationale: The noun denotes restless movements or tossings, especially in the night.
    'Tossing' captures the bodily unrest of insomnia in concise English.
- source_word: עֲדֵי נָשֶׁף
  chosen: until dawn
  alternatives:
  - until twilight
  - until the morning twilight
  lexicon: HALOT
  rationale: נָשֶׁף can denote twilight, either evening or morning, depending on context.
    Since Job is describing the night continuing until he can rise, the endpoint is
    best understood as morning twilight, hence 'dawn.'
