id: JOB.7.7
reference: Job 7:7
source:
  edition: WLC
  text: זְ֭כֹר כִּי ר֣וּחַ חַיָּ֑/י לֹא תָשׁ֥וּב עֵ֝ינִ֗/י לִ/רְא֥וֹת טֽוֹב־־׃
translation:
  text: Remember that my life is a breath; my eye will not return to see good.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my life is wind.' The Hebrew רוּחַ can mean 'breath,' 'wind,' or 'spirit';
      here it expresses the fleeting nature of life.
    reason: lexical_alternative
  - marker: b
    text: Or 'my eye will not again see good,' that is, experience well-being or prosperity.
    reason: lexical_alternative
lexical_decisions:
- source_word: זְכֹר
  chosen: Remember
  alternatives:
  - Remember, please
  - Call to mind
  lexicon: HALOT
  rationale: Qal imperative 2ms of זכר, addressed to God in context. 'Remember' is
    the natural direct imperative in English and preserves the plea-like force without
    adding words not in the Hebrew.
- source_word: כִּי
  chosen: that
  alternatives:
  - for
  - because
  lexicon: HALOT
  rationale: Introduces the content of what is to be remembered. 'That' fits the clause
    well in English; 'for/because' would shift the nuance toward explicit causation.
- source_word: רוּחַ
  chosen: breath
  alternatives:
  - wind
  - spirit
  lexicon: HALOT
  rationale: In this lament context, רוּחַ conveys transience and insubstantiality
    of life. 'Breath' best captures the metaphor of fleetingness in idiomatic English
    better than 'wind,' while 'spirit' would suggest an anthropological meaning not
    primary here.
- source_word: חַיָּי
  chosen: my life
  alternatives:
  - my living
  - my lifetime
  lexicon: HALOT
  rationale: 'Construct form with 1cs suffix: literally ''the life/living of me.''
    ''My life'' is the clear and natural English equivalent.'
- source_word: לֹא תָשׁוּב
  chosen: will not return
  alternatives:
  - will not come back
  - will not turn back
  lexicon: HALOT
  rationale: Qal imperfect 3fs with negation, agreeing with 'my eye.' 'Will not return'
    preserves the verbal imagery and solemnity; 'come back' is possible but slightly
    more colloquial.
- source_word: עֵינִי
  chosen: my eye
  alternatives:
  - my eyes
  lexicon: HALOT
  rationale: The Hebrew is singular with 1cs suffix. Retaining singular 'my eye' reflects
    the source text and the poetic idiom, rather than smoothing to the English plural.
- source_word: לִרְאוֹת
  chosen: to see
  alternatives:
  - to look on
  - to experience
  lexicon: HALOT
  rationale: Infinitive construct of ראה. 'To see' is the basic sense and works both
    literally and idiomatically here.
- source_word: טוֹב
  chosen: good
  alternatives:
  - prosperity
  - happiness
  lexicon: HALOT
  rationale: טוֹב can denote general good, well-being, or prosperity. 'Good' preserves
    the breadth of the Hebrew and avoids over-specifying the kind of benefit Job says
    he will no longer see.
