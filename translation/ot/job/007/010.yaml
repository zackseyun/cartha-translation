id: JOB.7.10
reference: Job 7:10
source:
  edition: WLC
  text: לֹא יָשׁ֣וּב ע֣וֹד לְ/בֵית֑/וֹ וְ/לֹא יַכִּירֶ֖/נּוּ ע֣וֹד מְקֹמֽ/וֹ־־׃
translation:
  text: He does not return again to his house, and his place knows him no more.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his place recognizes him no more.' The Hebrew verb can carry the sense
      of recognition or acknowledgment.
    reason: lexical_alternative
lexical_decisions:
- source_word: יָשׁוּב
  chosen: return
  alternatives:
  - go back
  - come back
  lexicon: HALOT
  rationale: The verb שוב commonly means 'return/turn back.' 'Return' is the most
    natural English rendering here and fits the context of a dead person not coming
    back to ordinary life.
- source_word: עוֹד (first occurrence)
  chosen: again
  alternatives:
  - any longer
  - any more
  lexicon: HALOT
  rationale: 'In this clause עוֹד intensifies the negation temporally. ''Again'' reads
    smoothly with ''return'' in English: ''does not return again.'''
- source_word: לְבֵיתוֹ
  chosen: to his house
  alternatives:
  - to his home
  lexicon: HALOT
  rationale: בַּיִת is literally 'house,' and here likely refers concretely to the
    man's household dwelling. 'House' preserves the Hebrew image better than the more
    interpretive 'home.'
- source_word: יַכִּירֶנּוּ
  chosen: knows him
  alternatives:
  - recognizes him
  - acknowledges him
  lexicon: HALOT
  rationale: The Hiphil of נכר can mean 'recognize' or 'acknowledge.' With מְקוֹמוֹ
    as subject, English idiom favors the personified expression 'his place knows him
    no more,' echoing the Hebrew poetic personification while remaining intelligible.
- source_word: עוֹד (second occurrence)
  chosen: no more
  alternatives:
  - again
  - any longer
  lexicon: HALOT
  rationale: Here עוֹד with the negative is best rendered as 'no more,' producing
    a natural English cadence in the second cola and matching the sense of permanent
    absence.
- source_word: מְקֹמוֹ
  chosen: his place
  alternatives:
  - his dwelling place
  - the place where he was
  lexicon: HALOT
  rationale: מָקוֹם means 'place.' In this poetic context it refers to the location
    associated with the person, likely his accustomed dwelling or place in life. 'His
    place' is both faithful and concise, preserving the personification.
