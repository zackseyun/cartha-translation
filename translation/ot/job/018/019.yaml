id: JOB.18.19
reference: Job 18:19
source:
  edition: WLC
  text: לֹ֘א נִ֤ין ל֣/וֹ וְ/לֹא נֶ֣כֶד בְּ/עַמּ֑/וֹ וְ/אֵ֥ין שָׂ֝רִ֗יד בִּ/מְגוּרָֽי/ו־׃
translation:
  text: He has neither offspring nor posterity among his people, and no survivor in
    the places where he sojourned.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'grandchild' for 'posterity'; the pair 'offspring and posterity' renders
      a Hebrew expression for the complete cutting off of descendants.
    reason: lexical_alternative
  - marker: b
    text: Or 'in his dwellings' or 'in his settlements'; the Hebrew can refer either
      to places of residence or places of sojourning.
    reason: lexical_alternative
lexical_decisions:
- source_word: נִין
  chosen: offspring
  alternatives:
  - son
  - descendant
  lexicon: HALOT
  rationale: נִין denotes progeny or issue. 'Offspring' is natural modern English
    and pairs well with the following term while avoiding an overly narrow biological
    sense such as only 'son'.
- source_word: נֶכֶד
  chosen: posterity
  alternatives:
  - grandchild
  - descendant
  lexicon: HALOT
  rationale: In this collocation with נִין, the sense is a further line of descendants.
    'Posterity' preserves the idiomatic force of total extinction better than the
    more specific 'grandchild,' though that is a possible lexical value.
- source_word: בְּעַמּוֹ
  chosen: among his people
  alternatives:
  - in his people
  - among his kin
  lexicon: HALOT
  rationale: עַם commonly means 'people.' With בְּ, the phrase indicates the sphere
    or community in which he belongs. 'Among his people' is idiomatic English and
    preserves the communal setting.
- source_word: שָׂרִיד
  chosen: survivor
  alternatives:
  - remnant
  - one left
  lexicon: HALOT
  rationale: שָׂרִיד refers to one who remains or survives after devastation. 'Survivor'
    is clear modern English; 'remnant' is possible but can sound collective or theologically
    loaded in ways not required here.
- source_word: בִּמְגוּרָיו
  chosen: in the places where he sojourned
  alternatives:
  - in his dwellings
  - in his settlements
  - where he lived as an alien
  lexicon: HALOT
  rationale: מָגוּר can denote place of sojourning or dwelling. Given the plural with
    suffix, the phrase points to the locations of his residence/sojourning. 'The places
    where he sojourned' preserves the underlying sense better than the flatter 'dwellings,'
    while remaining readable.
