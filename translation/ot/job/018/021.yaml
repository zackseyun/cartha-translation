theological_decisions:
- issue: Meaning of 'does not know God'
  chosen_reading: relational/moral knowledge of God rather than mere intellectual
    ignorance
  alternative_readings:
  - simple lack of awareness of God
  rationale: Within wisdom literature and Job’s moral framework, 'knowing God' commonly
    implies acknowledgment of and right relation to him. The translation keeps the
    literal 'know God' and does not paraphrase it into a doctrinal formula, preserving
    the text’s theological weight without over-interpretation.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather
    than resolve it
