id: JOB.18.21
reference: Job 18:21
source:
  edition: WLC
  text: אַךְ אֵ֭לֶּה מִשְׁכְּנ֣וֹת עַוָּ֑ל וְ֝/זֶ֗ה מְק֣וֹם לֹא יָדַֽע אֵֽל־־־׃ס
translation:
  text: Surely these are the dwellings of the unjust, and this is the place of one
    who does not know God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the wicked' for 'the unjust.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the place of him who does not know God.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַךְ
  chosen: Surely
  alternatives:
  - Indeed
  - Only
  lexicon: HALOT
  rationale: Here the particle functions as an emphatic or asseverative marker concluding
    Bildad’s speech, not as a restrictive 'only.' 'Surely' best conveys the force
    in natural English.
- source_word: אֵלֶּה
  chosen: these
  lexicon: HALOT
  rationale: Straightforward demonstrative plural referring back to the fate just
    described.
- source_word: מִשְׁכְּנוֹת
  chosen: dwellings
  alternatives:
  - habitations
  - tents
  lexicon: HALOT
  rationale: The noun can denote dwelling places broadly. 'Dwellings' is clear modern
    English and avoids over-specifying 'tents,' though that is possible in some contexts.
- source_word: עַוָּל
  chosen: the unjust
  alternatives:
  - the wicked
  - the wrongdoer
  lexicon: HALOT
  rationale: The term denotes one characterized by injustice or wrongdoing. 'The unjust'
    preserves the moral-legal nuance more precisely than the broader 'wicked,' while
    remaining readable.
- source_word: וְזֶה
  chosen: and this is
  alternatives:
  - and this
  - such is
  lexicon: HALOT
  rationale: The conjunction plus demonstrative introduces a parallel summarizing
    clause. Supplying 'is' is required in English.
- source_word: מְקוֹם
  chosen: the place
  alternatives:
  - the home
  - the dwelling place
  lexicon: HALOT
  rationale: '''Place'' is the most direct rendering and preserves the parallel with
    ''dwellings'' without unnecessary expansion.'
- source_word: לֹא יָדַע אֵל
  chosen: one who does not know God
  alternatives:
  - him who does not know God
  - the one who has not known God
  lexicon: HALOT
  rationale: The Hebrew uses a verbal clause modifying the implied person associated
    with the place. Rendering it as 'one who does not know God' makes the sense explicit
    in idiomatic English. 'Know' here carries relational and covenantal force, not
    mere awareness.
- source_word: אֵל
  chosen: God
  alternatives:
  - God Almighty
  - god
  lexicon: HALOT
  rationale: In Job, אֵל commonly refers to the true God. 'God' is the natural English
    rendering here; there is no contextual reason to expand it to a title like 'God
    Almighty.'
