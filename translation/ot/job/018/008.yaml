id: JOB.18.8
reference: Job 18:8
source:
  edition: WLC
  text: כִּֽי שֻׁלַּ֣ח בְּ/רֶ֣שֶׁת בְּ/רַגְלָ֑י/ו וְ/עַל שְׂ֝בָכָ֗ה יִתְהַלָּֽךְ־־׃
translation:
  text: For he is sent into a net by his own feet, and he walks onto a mesh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'he is cast into a net by his feet.' The Hebrew passive verb can suggest
      being thrown or driven into the trap, and 'by his feet' may also be rendered
      'with his feet.'
    reason: lexical_alternative
  - marker: b
    text: Or 'he walks on a lattice/snare.' The Hebrew שְׂבָכָה refers to a woven
      network and may denote a mesh-like trap.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Surely
  - Because
  lexicon: HALOT
  rationale: Introduces the explanation of the wicked man's downfall in the surrounding
    context. 'For' fits the discourse connection naturally in English.
- source_word: שֻׁלַּח
  chosen: is sent
  alternatives:
  - is cast
  - is let go
  - is thrown
  lexicon: HALOT
  rationale: Pual of שלח conveys being sent or driven forth. 'Is sent' preserves the
    passive verbal form without over-specifying violence; the context of entrapment
    supplies the negative force.
- source_word: בְּרֶשֶׁת
  chosen: into a net
  alternatives:
  - in a net
  - by a net
  lexicon: HALOT
  rationale: 'With the passive verb, the preposition is best rendered directionally
    in English: he is sent into the net. ''Net'' is the standard sense of רֶשֶׁת in
    trap imagery.'
- source_word: בְּרַגְלָיו
  chosen: by his own feet
  alternatives:
  - with his feet
  - by his feet
  lexicon: HALOT
  rationale: Literally 'by/with his feet.' The phrase indicates the means by which
    he comes into the trap, likely through his own movement. 'By his own feet' brings
    out the self-implicating nuance without adding too much.
- source_word: וְעַל
  chosen: and ... onto
  alternatives:
  - and on
  - and over
  lexicon: HALOT
  rationale: The conjunction plus preposition introduces the second image in parallel.
    'Onto' gives the natural directional sense with the following verb of movement.
- source_word: שְׂבָכָה
  chosen: a mesh
  alternatives:
  - a lattice
  - a trap
  - a snare
  lexicon: HALOT
  rationale: The noun denotes a woven network or lattice-like trap. 'Mesh' preserves
    the imagery and distinguishes it from the previous 'net,' while remaining readable
    modern English.
- source_word: יִתְהַלָּךְ
  chosen: he walks
  alternatives:
  - he goes about
  - he walks himself
  - he steps
  lexicon: HALOT
  rationale: Hitpael of הלך here expresses movement, likely iterative or reflexive
    in nuance. 'He walks' is simple and idiomatic; in context it implies that he proceeds
    right onto the trap.
