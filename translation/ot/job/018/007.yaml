id: JOB.18.7
reference: Job 18:7
source:
  edition: WLC
  text: יֵֽ֭צְרוּ צַעֲדֵ֣י אוֹנ֑/וֹ וְֽ/תַשְׁלִיכֵ֥/הוּ עֲצָתֽ/וֹ׃
translation:
  text: His vigorous steps are constrained, and his own counsel casts him down.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'His strong steps are narrowed'; אוֹן may denote 'strength' or 'vigor,'
      and the verb may be rendered 'are narrowed' or 'are restricted.'
    reason: lexical_alternative
  - marker: b
    text: Or 'his own plan throws him down.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יֵצְרוּ
  chosen: are constrained
  alternatives:
  - are narrowed
  - are restricted
  - are hemmed in
  lexicon: HALOT
  rationale: From צרר/צר in the Qal imperfect plural, with plural subject 'steps.'
    The sense is that his movement is tightened or restricted. 'Are constrained' is
    natural English and preserves the image of formerly free movement now being limited.
- source_word: צַעֲדֵי
  chosen: steps
  alternatives:
  - strides
  - paces
  lexicon: HALOT
  rationale: Construct plural of צעד, referring to steps or strides. 'Steps' is the
    most straightforward English equivalent and fits the poetic image.
- source_word: אוֹנוֹ
  chosen: his vigorous
  alternatives:
  - his strength
  - his wealth
  - his trouble
  lexicon: HALOT
  rationale: אוֹן can denote strength, vigor, or wealth depending on context. Here
    it modifies 'steps' in a poetic description of the wicked man's formerly forceful
    movement, so 'vigorous' best captures the adjectival force in English. 'Wealth'
    is less fitting with 'steps,' and 'trouble' is contextually unlikely here.
- source_word: וְתַשְׁלִיכֵהוּ
  chosen: casts him down
  alternatives:
  - throws him down
  - casts him away
  - hurls him
  lexicon: HALOT
  rationale: 'Hiphil of שלך with 3fs subject and 3ms object: ''and it causes him to
    be thrown/cast.'' Because the feminine singular subject is the following ''his
    counsel,'' English idiom is best expressed as ''his own counsel casts him down.''
    ''Down'' makes explicit the hostile result implied by the context of ruin.'
- source_word: עֲצָתוֹ
  chosen: his own counsel
  alternatives:
  - his plan
  - his advice
  - his scheme
  lexicon: HALOT
  rationale: עֵצָה commonly means counsel, plan, or advice. In this wisdom context
    it refers to the wicked man's own devising that turns against him. 'His own counsel'
    preserves both the reflexive irony and the broader semantic range of inward planning.
