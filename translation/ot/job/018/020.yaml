id: JOB.18.20
reference: Job 18:20
source:
  edition: WLC
  text: עַל י֭וֹמ/וֹ נָשַׁ֣מּוּ אַחֲרֹנִ֑ים וְ֝/קַדְמֹנִ֗ים אָ֣חֲזוּ שָֽׂעַר־׃
translation:
  text: Those who come after are appalled at his day, and those who went before are
    seized with horror.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'his day,' likely meaning the day of his calamity or judgment.
    reason: lexical_alternative
  - marker: b
    text: Or 'later ones ... former ones'; some understand the pair geographically
      as 'those in the west ... those in the east.'
    reason: alternative_reading
  - marker: c
    text: Literally 'seize shuddering,' an idiom for being gripped with horror.
    reason: lexical_alternative
lexical_decisions:
- source_word: עַל
  chosen: at
  alternatives:
  - over
  - because of
  - concerning
  lexicon: HALOT
  rationale: 'With יוֹמוֹ and the following reaction verbs, the preposition introduces
    the occasion or object that provokes astonishment: ''at his day'' rather than
    a more spatial ''over his day.'' English smooths this as the cause of the reaction.'
- source_word: יוֹמוֹ
  chosen: his day
  alternatives:
  - his fate
  - his time
  - his downfall
  lexicon: HALOT
  rationale: Literally 'his day.' In Joban context this idiom points to the day of
    calamity/judgment that befalls the wicked. The main text preserves the concrete
    Hebrew sense through 'his day,' while the surrounding clause makes the ominous
    meaning clear.
- source_word: נָשַׁמּוּ
  chosen: are appalled
  alternatives:
  - are astonished
  - are desolated
  - are aghast
  lexicon: HALOT
  rationale: The verb conveys stunned desolation or appalled astonishment. 'Are appalled'
    fits the emotional force in context better than the weaker 'are astonished' and
    is idiomatic in English.
- source_word: אַחֲרֹנִים
  chosen: those who come after
  alternatives:
  - later generations
  - those after him
  - the westerners
  lexicon: HALOT
  rationale: The adjective literally means 'later ones' or 'those after.' Some interpreters
    take the pair with קדמונים geographically ('west/east'), but the temporal sense
    is more straightforward here and matches the common contrast with 'those before.'
- source_word: וְקַדְמֹנִים
  chosen: those who went before
  alternatives:
  - former generations
  - those before him
  - the easterners
  lexicon: HALOT
  rationale: The term can denote what is former or eastern. In parallel with אַחֲרֹנִים,
    the temporal contrast 'those who went before' is the most natural reading in context.
- source_word: אָחֲזוּ
  chosen: are seized with
  alternatives:
  - grasp
  - take hold of
  - are overtaken by
  lexicon: HALOT
  rationale: The verb literally means 'seize, grasp.' With שׂער as the object, the
    idiom expresses being gripped by a strong emotion. English renders the idiom naturally
    as 'are seized with.'
- source_word: שָׂעַר
  chosen: horror
  alternatives:
  - shuddering
  - terror
  - hair-standing dread
  lexicon: HALOT
  rationale: This noun denotes a shudder or horror, likely related to the bodily reaction
    of hair bristling. 'Horror' communicates the emotional effect clearly in modern
    English; the more literal imagery is preserved in a footnote.
