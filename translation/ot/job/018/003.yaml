id: JOB.18.3
reference: Job 18:3
source:
  edition: WLC
  text: מַ֭דּוּעַ נֶחְשַׁ֣בְנוּ כַ/בְּהֵמָ֑ה נִ֝טְמִ֗ינוּ בְּ/עֵינֵי/כֶֽם׃
translation:
  text: Why are we regarded as cattle, and considered unclean in your eyes?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'like beasts' / 'as animals.' The Hebrew בְּהֵמָה is a broad term for
      animal or beast, here used contemptuously.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew of 'considered unclean' is difficult. Some understand it differently,
      but the sense here is that Bildad protests being viewed as defiled or impure.
    reason: alternative_reading
lexical_decisions:
- source_word: מַדּוּעַ
  chosen: Why
  alternatives:
  - Why is it that
  - For what reason
  lexicon: HALOT
  rationale: Interrogative adverb introducing Bildad's rhetorical question; simple
    'Why' is natural and sufficient.
- source_word: נֶחְשַׁבְנוּ
  chosen: are we regarded
  alternatives:
  - are we counted
  - are we considered
  - are we thought of
  lexicon: HALOT
  rationale: From חשׁב in the passive/reflexive sense, expressing how 'we' are reckoned
    or viewed. 'Regarded' fits idiomatic English and preserves the evaluative sense.
- source_word: כַבְּהֵמָה
  chosen: as cattle
  alternatives:
  - like beasts
  - as animals
  - like livestock
  lexicon: HALOT
  rationale: בְּהֵמָה can denote beast/animal, often domestic livestock. In this insult
    context, 'cattle' preserves the singular collective force and the demeaning comparison
    without sounding overly archaic. 'Beasts' is possible but can imply wild animals
    more than the Hebrew requires.
- source_word: נִטְמִינוּ
  chosen: considered unclean
  alternatives:
  - are we unclean
  - are we deemed defiled
  - are we treated as impure
  lexicon: HALOT
  rationale: The form is difficult, but in context it is commonly understood from
    a root conveying impurity/defilement rather than stupidity or hiddenness. 'Considered
    unclean' matches the passive parallelism with נֶחְשַׁבְנוּ and fits the following
    phrase 'in your eyes.'
- source_word: בְּעֵינֵיכֶם
  chosen: in your eyes
  alternatives:
  - in your sight
  - to you
  lexicon: HALOT
  rationale: A standard Hebrew idiom for evaluation or perception. 'In your eyes'
    is transparent and preserves the metaphor.
