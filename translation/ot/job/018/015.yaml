id: JOB.18.15
reference: Job 18:15
source:
  edition: WLC
  text: תִּשְׁכּ֣וֹן בְּ֭/אָהֳל/וֹ מִ/בְּלִי ל֑/וֹ יְזֹרֶ֖ה עַל נָוֵ֣/הוּ גָפְרִֽית־־׃
translation:
  text: Sulfur is scattered over his dwelling; it dwells in his tent, no longer his.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'In his tent dwells what is no longer his'; the Hebrew syntax is difficult
      and may imply that an alien presence occupies his tent after his downfall.
    reason: alternative_reading
  - marker: b
    text: 'Traditional English: ''brimstone'' for ''sulfur.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: תִּשְׁכּוֹן
  chosen: it dwells
  alternatives:
  - she dwells
  - there dwells
  - nothing of his dwells
  lexicon: HALOT
  rationale: From שכן, 'to dwell, settle.' The 3fs form is syntactically difficult
    because no explicit feminine subject precedes it. In context, גָפְרִית ('sulfur,'
    feminine) at the end of the verse can function as the subject by delayed placement,
    yielding 'it/sulfur dwells.' English places the subject earlier for clarity while
    preserving the image.
- source_word: בְּאָהֳלוֹ
  chosen: in his tent
  alternatives:
  - in his tent-home
  - in his dwelling
  lexicon: HALOT
  rationale: אֹהֶל is literally 'tent.' Retaining 'tent' preserves the concrete imagery
    common in Job, though the broader sense of household/dwelling is possible.
- source_word: מִבְּלִי לוֹ
  chosen: no longer his
  alternatives:
  - belonging to none of his
  - without anything of his
  - because it is not his
  lexicon: HALOT
  rationale: The phrase is elliptical. מִבְּלִי conveys absence/lack, with לוֹ indicating
    relation to him. In context the sense is that what occupies the tent is alien
    to him, or that he is gone from it. 'No longer his' captures the loss/dispossession
    without over-specifying the ellipsis.
- source_word: יְזֹרֶה
  chosen: is scattered
  alternatives:
  - he scatters
  - one scatters
  - is strewn
  lexicon: HALOT
  rationale: From זרה in the Piel, 'to scatter, strew.' Although morphologically 3ms
    active, Hebrew often uses such forms impersonally. English passive best conveys
    the scene without forcing an explicit unnamed agent.
- source_word: עַל נָוֵהוּ
  chosen: over his dwelling
  alternatives:
  - upon his pasture
  - over his habitation
  - upon his home
  lexicon: HALOT
  rationale: נָוֶה can denote abode, habitation, or pastureland depending on context.
    Here, in parallel with 'his tent,' 'dwelling' best fits the ruined-home imagery.
- source_word: גָפְרִית
  chosen: sulfur
  alternatives:
  - brimstone
  lexicon: HALOT
  rationale: גָפְרִית denotes sulfur/brimstone. 'Sulfur' is the clearer modern English
    term; 'brimstone' is traditional but archaic. The destructive connotation remains
    clear in context.
