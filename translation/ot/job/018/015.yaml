theological_decisions:
- issue: Interpretation of the verse's difficult syntax and imagery
  chosen_reading: The verse depicts sulfur as the agent/sign of judgment occupying
    the wicked man's tent and being strewn over his dwelling after his dispossession.
  alternative_readings:
  - An unnamed subject dwells in his tent, namely one who is not his
  - Nothing belonging to him remains in his tent, and sulfur is scattered over his
    pasture
  rationale: The Hebrew is compressed and ambiguous, especially the feminine verb
    תִּשְׁכּוֹן and the phrase מִבְּלִי לוֹ. The chosen rendering preserves the judgment
    imagery and the parallelism of tent/dwelling while avoiding speculative expansion
    beyond the text.
