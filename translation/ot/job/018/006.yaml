id: JOB.18.6
reference: Job 18:6
source:
  edition: WLC
  text: א֭וֹר חָשַׁ֣ךְ בְּ/אָהֳל֑/וֹ וְ֝/נֵר֗/וֹ עָלָ֥י/ו יִדְעָֽךְ׃
translation:
  text: The light in his tent grows dark, and his lamp above him is extinguished.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'over him.' The Hebrew preposition can denote position upon or above;
      the phrase likely pictures the lamp's light over the wicked man.
    reason: lexical_alternative
lexical_decisions:
- source_word: אוֹר
  chosen: light
  alternatives:
  - brightness
  lexicon: HALOT
  rationale: The common concrete sense 'light' fits the poetic image of illumination
    in a dwelling. 'Brightness' is possible but less natural in English here.
- source_word: חָשַׁךְ
  chosen: grows dark
  alternatives:
  - is dark
  - is extinguished
  lexicon: HALOT
  rationale: The verb denotes becoming dark. 'Grows dark' captures the inchoative/resultative
    sense better than a static 'is dark.' 'Is extinguished' is reserved for the second
    colon's lamp imagery.
- source_word: בְּאָהֳלוֹ
  chosen: in his tent
  alternatives:
  - in his dwelling
  - in his house
  lexicon: HALOT
  rationale: אָהֶל literally means 'tent' and is a common poetic image for one's household
    or dwelling. 'Tent' preserves the Hebrew imagery while remaining understandable.
- source_word: וְנֵרוֹ
  chosen: and his lamp
  alternatives:
  - and his light
  lexicon: HALOT
  rationale: נֵר specifically denotes a lamp/lamp-light rather than generic light.
    'Lamp' preserves the concrete parallelism with the first colon.
- source_word: עָלָיו
  chosen: above him
  alternatives:
  - over him
  - upon him
  lexicon: HALOT
  rationale: The preposition עַל commonly means 'on/upon/over.' In this poetic domestic
    image, 'above him' is the most natural English expression for a lamp positioned
    overhead, while preserving the spatial sense.
- source_word: יִדְעָךְ
  chosen: is extinguished
  alternatives:
  - goes out
  - is snuffed out
  lexicon: HALOT
  rationale: The verb means to be extinguished or die out, especially of a lamp or
    fire. 'Is extinguished' is clear, dignified, and fits the poetic parallelism.
    'Goes out' is possible but slightly less weighty.
