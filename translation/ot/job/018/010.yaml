id: JOB.18.10
reference: Job 18:10
source:
  edition: WLC
  text: טָמ֣וּן בָּ/אָ֣רֶץ חַבְל֑/וֹ וּ֝/מַלְכֻּדְתּ֗/וֹ עֲלֵ֣י נָתִֽיב׃
translation:
  text: His rope is hidden in the ground, and his trap on the path.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his cord is hidden in the ground, and his snare on the path.'
    reason: lexical_alternative
lexical_decisions:
- source_word: טָמוּן
  chosen: is hidden
  alternatives:
  - lies hidden
  - is concealed
  lexicon: HALOT
  rationale: Passive participial form from טמן, describing something concealed or
    buried. 'Is hidden' is natural modern English and preserves the stative/passive
    sense.
- source_word: בָּאָרֶץ
  chosen: in the ground
  alternatives:
  - in the earth
  - in the land
  lexicon: HALOT
  rationale: Although אֶרֶץ often means 'earth' or 'land,' in this trap-setting context
    'ground' best conveys the physical surface in which a snare would be concealed.
- source_word: חַבְלוֹ
  chosen: his rope
  alternatives:
  - his cord
  - his snare-line
  lexicon: HALOT
  rationale: חבל can denote a cord or rope. Here it likely refers to the cord associated
    with a trap. 'Rope' is clear and concrete; 'cord' is possible but slightly less
    natural in contemporary English.
- source_word: וּמַלְכֻּדְתּוֹ
  chosen: and his trap
  alternatives:
  - and his snare
  - and his net
  lexicon: HALOT
  rationale: מַלְכֹּדֶת denotes a trap or snare. 'Trap' is the broadest and most accessible
    rendering; 'snare' is a strong alternative and is preserved in a footnote because
    it fits the poetic imagery well.
- source_word: עֲלֵי נָתִיב
  chosen: on the path
  alternatives:
  - upon the path
  - by the path
  - on the trail
  lexicon: HALOT
  rationale: The preposition plus נָתִיב indicates location with respect to a pathway.
    'On the path' is idiomatic and preserves the image of a trap set where one walks.
