id: JOB.18.18
reference: Job 18:18
source:
  edition: WLC
  text: יֶ֭הְדְּפֻ/הוּ מֵ/א֣וֹר אֶל חֹ֑שֶׁךְ וּֽ/מִ/תֵּבֵ֥ל יְנִדֻּֽ/הוּ־׃
translation:
  text: They drive him from light into darkness, and banish him from the world.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'They chase him from light into darkness.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew tevel can mean 'the world' or more specifically 'the inhabited world.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יֶהְדְּפֻהוּ
  chosen: They drive him
  alternatives:
  - They chase him
  - He is driven
  lexicon: HALOT
  rationale: 'From הדף in the Qal imperfect 3mp with 3ms suffix, the sense is active
    plural: ''they drive/push him away.'' ''Drive'' fits the force of expulsion in
    context better than the more general ''chase,'' while preserving the unspecified
    plural subject.'
- source_word: מֵאוֹר
  chosen: from light
  alternatives:
  - from the light
  lexicon: HALOT
  rationale: אוֹר means 'light.' The prefixed preposition מ marks separation. Anarthrous
    Hebrew here is naturally rendered without the English article for a more idiomatic
    and poetic line.
- source_word: אֶל חֹשֶׁךְ
  chosen: into darkness
  alternatives:
  - to darkness
  lexicon: HALOT
  rationale: The movement from one realm to another is prominent; 'into darkness'
    expresses the directional force smoothly in English and matches the poetic contrast
    with 'from light.'
- source_word: וּמִתֵּבֵל
  chosen: from the world
  alternatives:
  - from the inhabited world
  - from the land
  lexicon: HALOT
  rationale: תֵּבֵל commonly denotes the world, especially the inhabited world. 'World'
    is the most natural concise English rendering here; 'inhabited world' is more
    explicit but less readable in this poetic context.
- source_word: יְנִדֻּהוּ
  chosen: banish him
  alternatives:
  - expel him
  - drive him away
  lexicon: HALOT
  rationale: From נדח/נדה in the Hiphil imperfect 3mp with 3ms suffix, the sense is
    causing removal or exclusion. 'Banish' captures the judicial-social force of being
    cast out, and avoids flattening the parallelism by repeating 'drive' exactly.
