id: JOB.18.12
reference: Job 18:12
source:
  edition: WLC
  text: יְהִי רָעֵ֥ב אֹנ֑/וֹ וְ֝/אֵ֗יד נָכ֥וֹן לְ/צַלְעֽ/וֹ־׃
translation:
  text: His strength is famished, and calamity is ready at his side.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'ready for his stumbling.' The Hebrew word may be understood as 'side'
      or, by extension in some interpretations, 'stumbling/limping.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהִי
  chosen: is
  alternatives:
  - becomes
  - may it be
  lexicon: HALOT
  rationale: 'Qal imperfect of היה here functions descriptively in poetic discourse
    rather than as a volitive in English. Rendering as present tense gives natural
    English while preserving the verbless-like poetic force: ''is famished.'''
- source_word: רָעֵב
  chosen: famished
  alternatives:
  - hungry
  - starving
  lexicon: HALOT
  rationale: The adjective denotes hunger. 'Famished' conveys severe deprivation fitting
    Bildad's vivid poetic description better than the milder 'hungry,' without overreaching
    beyond the Hebrew.
- source_word: אֹנוֹ
  chosen: his strength
  alternatives:
  - his vigor
  - his wealth
  - his substance
  lexicon: HALOT
  rationale: אוֹן can denote strength, vigor, or resources. In this judgment context,
    paired with impending disaster, 'strength' best fits the image of a person's power
    wasting away. 'Wealth/substance' is possible but less coherent with the following
    bodily image.
- source_word: וְאֵיד
  chosen: and calamity
  alternatives:
  - and disaster
  - and ruin
  lexicon: HALOT
  rationale: אֵיד refers to disaster or calamity. 'Calamity' preserves the elevated
    poetic register and the sense of destructive misfortune.
- source_word: נָכוֹן
  chosen: is ready
  alternatives:
  - is prepared
  - stands ready
  - is established
  lexicon: HALOT
  rationale: The participial/adjectival form conveys something fixed or prepared.
    'Is ready' is idiomatic and suits the image of disaster poised to strike.
- source_word: לצלעו
  chosen: at his side
  alternatives:
  - for his stumbling
  - at his rib
  - for his limp
  lexicon: HALOT
  rationale: צלע can denote side/rib, and in some contexts limping or stumbling is
    proposed. Here 'at his side' best matches the concrete poetic picture of calamity
    waiting close beside him. The alternative 'for his stumbling' is worth preserving
    because some interpreters take the noun in that sense.
