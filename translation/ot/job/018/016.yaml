id: JOB.18.16
reference: Job 18:16
source:
  edition: WLC
  text: מִ֭/תַּחַת שָֽׁרָשָׁ֣י/ו יִבָ֑שׁוּ וּ֝/מִ/מַּ֗עַל יִמַּ֥ל קְצִירֽ/וֹ׃
translation:
  text: His roots dry up beneath, and above, his branch is cut off.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his shoot is cut off.' The Hebrew noun can evoke what is cut or reaped;
      in this context it refers to the plant's upper growth.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִתַּחַת
  chosen: beneath
  alternatives:
  - from beneath
  - underneath
  lexicon: HALOT
  rationale: Spatial preposition meaning 'from under/beneath.' In English, 'beneath'
    fits the poetic parallel with 'above' and naturally modifies the drying of the
    roots.
- source_word: שָׁרָשָׁיו
  chosen: his roots
  alternatives:
  - his root
  lexicon: HALOT
  rationale: Plural form with 3ms suffix; 'his roots' preserves the image of a plant/tree
    and matches the plural verb.
- source_word: יִבָשׁוּ
  chosen: dry up
  alternatives:
  - wither
  - be dried up
  lexicon: HALOT
  rationale: Qal imperfect plural of יבשׁ, 'to be dry, dry up.' 'Dry up' is vivid,
    idiomatic, and preserves the arboreal metaphor without overinterpreting.
- source_word: וּמִמַּעַל
  chosen: and above
  alternatives:
  - and from above
  - while above
  lexicon: HALOT
  rationale: Coordinates the second colon with the first and marks the upper counterpart
    to 'beneath.' 'And above' is concise and poetic in English.
- source_word: יִמַּל
  chosen: is cut off
  alternatives:
  - is cut down
  - withers
  - is lopped off
  lexicon: HALOT
  rationale: From מלל/נמל in a sense of cutting off or lopping, especially vegetation.
    'Is cut off' best fits the parallel with roots drying below and avoids importing
    a more specific image than the Hebrew requires.
- source_word: קְצִירוֹ
  chosen: his branch
  alternatives:
  - his harvest
  - his shoot
  - his produce
  lexicon: HALOT
  rationale: Though קציר commonly means 'harvest,' in this poetic arboreal context
    and in parallel with 'roots,' it likely denotes what is cut from the plant—its
    upper growth, i.e., branch/shoot. 'His branch' gives the clearest English sense
    of the metaphor. The lexical alternative 'his shoot' is worth preserving in a
    footnote.
