theological_decisions:
- issue: Identity of 'the king of terrors'
  chosen_reading: Retain the poetic expression without identifying it explicitly;
    likely a personification of death or the realm of terror.
  alternative_readings:
  - death personified
  - the grave/Sheol
  - a demonic ruler of terrors
  rationale: The Hebrew phrase is metaphorical and does not explicitly define the
    referent. To preserve theological and poetic ambiguity, the translation keeps
    the title as written rather than importing a specific doctrinal identification.
  doctrine_reference: Preserve theological tension rather than resolve it.
