id: JOB.18.14
reference: Job 18:14
source:
  edition: WLC
  text: יִנָּתֵ֣ק מֵ֭/אָהֳל/וֹ מִבְטַח֑/וֹ וְ֝/תַצְעִדֵ֗/הוּ לְ/מֶ֣לֶךְ בַּלָּהֽוֹת׃
translation:
  text: He is torn from the security of his tent, and it marches him off to the king
    of terrors.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'He is torn from his tent, his security'; the Hebrew may mean either
      that he is removed from the secure place of his tent or that the tent itself
      was his security.
    reason: lexical_alternative
  - marker: b
    text: '''The king of terrors'' is a poetic expression, often understood as death
      personified.'
    reason: alternative_reading
lexical_decisions:
- source_word: יִנָּתֵק
  chosen: is torn
  alternatives:
  - is uprooted
  - is pulled away
  - is torn away
  lexicon: HALOT
  rationale: Niphal of נתק conveys being pulled loose, torn away, or uprooted. 'Is
    torn' preserves the violent passive sense in concise English; the following phrase
    supplies the source/location ('from the security of his tent').
- source_word: מֵאָהֳלוֹ
  chosen: from ... his tent
  alternatives:
  - from his tent
  - from his dwelling
  lexicon: HALOT
  rationale: אֹהֶל literally means 'tent.' In Job it can metaphorically denote one's
    dwelling or household, but 'tent' preserves the concrete imagery of the Hebrew
    while remaining intelligible.
- source_word: מִבְטַחוֹ
  chosen: the security
  alternatives:
  - his confidence
  - his trust
  - his place of security
  lexicon: HALOT
  rationale: 'מִבְטָח denotes security, trust, or confidence. In this construction
    after ''from his tent,'' the sense is appositional or adverbial: he is torn away
    from what he regarded as secure. ''The security of his tent'' communicates the
    object/source of safety more naturally than ''his trust.'''
- source_word: וְתַצְעִדֵהוּ
  chosen: and it marches him off
  alternatives:
  - and it leads him
  - and one drives him
  - and she causes him to step
  lexicon: HALOT
  rationale: Hiphil of צעד is causative, 'cause to step/go,' hence 'lead' or 'march.'
    The 3fs form likely has an impersonal or abstract feminine subject, possibly the
    preceding calamity/security-loss or a poetic personification. 'It marches him
    off' preserves the forceful movement without over-specifying the subject.
- source_word: לְמֶלֶךְ
  chosen: to the king
  alternatives:
  - before the king
  - toward the king
  lexicon: HALOT
  rationale: 'ל marks direction: ''to'' or ''toward.'' ''To the king'' is the most
    straightforward rendering.'
- source_word: בַּלָּהוֹת
  chosen: of terrors
  alternatives:
  - of horrors
  - of dreadful things
  - of terrors/dismays
  lexicon: HALOT
  rationale: Plural noun denoting terrors, horrors, or sudden dreadful things. The
    traditional and contextually apt phrase 'king of terrors' captures the superlative
    force and poetic vividness.
