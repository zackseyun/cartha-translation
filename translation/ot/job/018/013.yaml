theological_decisions:
- issue: Interpretation of בְּכוֹר מָוֶת
  chosen_reading: Retain the poetic expression 'the firstborn of death' in the main
    text as a personified agent of destruction.
  alternative_readings:
  - a deadly disease
  - the most terrible death
  - death's chief agent
  rationale: The phrase is metaphorical and debated, but the Hebrew itself does not
    force a specific demythologized interpretation. Preserving the image aligns with
    optimal equivalence and avoids importing a narrower explanation than the text
    warrants.
  doctrine_reference: Translation philosophy §1, §3
