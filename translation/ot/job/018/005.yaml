id: JOB.18.5
reference: Job 18:5
source:
  edition: WLC
  text: גַּ֤ם א֣וֹר רְשָׁעִ֣ים יִדְעָ֑ךְ וְ/לֹֽא יִ֝גַּ֗הּ שְׁבִ֣יב אִשּֽׁ/וֹ־׃
translation:
  text: Indeed, the light of the wicked is put out, and the flame of his fire does
    not shine.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the spark of his fire does not shine.' The Hebrew שְׁבִיב can mean 'spark'
      as well as 'flame.'
    reason: lexical_alternative
lexical_decisions:
- source_word: גַּם
  chosen: Indeed
  alternatives:
  - Also
  - Surely
  - Even
  lexicon: HALOT
  rationale: Here גַּם functions as an emphatic particle introducing Bildad's assertion,
    not merely additive 'also.' 'Indeed' conveys the force naturally in English.
- source_word: אוֹר
  chosen: light
  lexicon: HALOT
  rationale: The basic sense is literal 'light,' used metaphorically here for prosperity
    or life-condition. 'Light' should be retained in translation to preserve the image
    rather than interpret it away.
- source_word: רְשָׁעִים
  chosen: the wicked
  alternatives:
  - wicked people
  - the wicked ones
  lexicon: HALOT
  rationale: The plural adjective/noun denotes wicked persons generically. 'The wicked'
    is idiomatic English and preserves the class sense.
- source_word: יִדְעָךְ
  chosen: is put out
  alternatives:
  - grows dim
  - is extinguished
  - goes out
  lexicon: HALOT
  rationale: The verb דָּעַךְ refers to a light dying down or being extinguished.
    Passive English 'is put out' fits the image well and is idiomatic; it need not
    imply an explicit agent.
- source_word: וְלֹא
  chosen: and ... does not
  alternatives:
  - and not
  - nor
  lexicon: HALOT
  rationale: The conjunction plus negation links the second clause straightforwardly.
    English requires expansion to 'and ... does not' for natural syntax.
- source_word: יִגַּהּ
  chosen: shine
  alternatives:
  - give light
  - gleam
  - flash
  lexicon: HALOT
  rationale: The verb נגהּ in this context refers to emitting light. 'Shine' is the
    most natural English equivalent and preserves the poetic imagery.
- source_word: שְׁבִיב
  chosen: flame
  alternatives:
  - spark
  - glow
  lexicon: HALOT
  rationale: שְׁבִיב can denote a spark or flame. In parallel with 'light' and with
    the following 'of his fire,' 'flame' better fits the poetic image in English than
    the more diminutive 'spark.'
- source_word: אִשּׁוֹ
  chosen: his fire
  alternatives:
  - his lamp
  - his hearth-fire
  lexicon: HALOT
  rationale: The noun is 'fire' with a 3ms suffix. Although the phrase is metaphorical,
    the source image should be preserved. Rendering it as 'lamp' would import a different
    image not present in the Hebrew.
