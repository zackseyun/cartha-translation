id: JOB.18.2
reference: Job 18:2
source:
  edition: WLC
  text: עַד אָ֤נָה תְּשִׂימ֣וּ/ן קִנְצֵ֣י לְ/מִלִּ֑ין תָּ֝בִ֗ינוּ וְ/אַחַ֥ר נְדַבֵּֽר־׀׃
translation:
  text: How long will you keep setting traps with words? Understand, and afterward
    we will speak.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'How long will you set limits to words?' The Hebrew phrase is difficult,
      and some take it as a complaint about endless talk rather than verbal entrapment.
    reason: lexical_alternative
  - marker: b
    text: Or 'then let us speak.' The final verb may be heard as an invitation as
      well as a simple future.
    reason: lexical_alternative
lexical_decisions:
- source_word: עַד אָ֤נָה
  chosen: How long
  alternatives:
  - Until when
  lexicon: HALOT
  rationale: Idiomatic temporal interrogative meaning 'how long?' rather than a wooden
    'until when.' This best reflects natural English while preserving the force of
    Bildad's complaint.
- source_word: תְּשִׂימוּן
  chosen: will you keep setting
  alternatives:
  - will you set
  - will you put
  lexicon: HALOT
  rationale: From שׂים, 'to set/put.' In context with קִנְצֵי לְמִלִּין, the sense
    is not merely placing but continuing to set or lay something in relation to speech.
    'Keep setting' captures the iterative/reproachful force in context.
- source_word: קִנְצֵי
  chosen: traps
  alternatives:
  - ends
  - limits
  - snares
  lexicon: HALOT
  rationale: Although the noun can denote 'ends/extremities,' in this context the
    collocation with speech is difficult if taken literally. Many understand it idiomatically
    as laying snares with words or hunting for words. 'Traps' conveys the hostile
    rhetorical sense in intelligible English. 'Snares' is possible but slightly less
    natural.
- source_word: לְמִלִּין
  chosen: with words
  alternatives:
  - for words
  - to words
  - in speech
  lexicon: HALOT
  rationale: The preposition ל with 'words' is rendered contextually. Given the chosen
    sense of קִנְצֵי as 'traps,' English 'with words' best expresses the instrumental
    or associative force in the accusation.
- source_word: תָּבִינוּ
  chosen: Understand
  alternatives:
  - Consider carefully
  - Discern
  lexicon: HALOT
  rationale: 'Imperative-like force in context: Bildad urges his hearers to gain understanding
    before further speech. ''Understand'' is direct and preserves the cognitive emphasis
    of בין.'
- source_word: וְאַחַר
  chosen: and afterward
  alternatives:
  - and then
  - after that
  lexicon: HALOT
  rationale: 'Marks sequence: first understanding, then speaking. ''Afterward'' is
    slightly more formal and suits the discourse.'
- source_word: נְדַבֵּר
  chosen: we will speak
  alternatives:
  - let us speak
  - we shall speak
  lexicon: HALOT
  rationale: First common plural imperfect of דבר. The form can be read as either
    simple future or cohortative-like invitation depending on context. 'We will speak'
    fits the sequence after 'Understand' and preserves the straightforward verbal
    form without overinterpreting it as an exhortation.
