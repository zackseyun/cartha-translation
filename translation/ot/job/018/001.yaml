id: JOB.18.1
reference: Job 18:1
source:
  edition: WLC
  text: וַ֭/יַּעַן בִּלְדַּ֥ד הַ/שֻּׁחִ֗י וַ/יֹּאמַֽר׃
translation:
  text: 'Then Bildad the Shuhite answered and said:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'And Bildad the Shuhite answered and said.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַן
  chosen: answered
  alternatives:
  - responded
  lexicon: HALOT
  rationale: The verb ענה in this narrative formula commonly means 'answer/respond.'
    'Answered' preserves the conventional dialogic sense and fits the immediate context
    of Bildad replying to Job.
- source_word: בִּלְדַּד
  chosen: Bildad
  rationale: Personal name transliterated according to standard English convention,
    following the translation philosophy to transliterate names rather than translate
    them.
- source_word: הַשֻּׁחִי
  chosen: the Shuhite
  alternatives:
  - the Shuahite
  lexicon: HALOT
  rationale: A gentilicial/title identifying Bildad by clan or regional origin, traditionally
    rendered 'the Shuhite.' This is the established English form and naturally communicates
    an ethnic/geographic designation.
- source_word: וַיֹּאמַר
  chosen: and said
  alternatives:
  - saying
  lexicon: HALOT
  rationale: The common narrative verb אמר is best rendered 'said' here. Keeping both
    'answered' and 'said' reflects the Hebrew's two-verb speech-introduction formula
    rather than collapsing it into a single English verb.
- source_word: וַ
  chosen: Then
  alternatives:
  - And
  lexicon: HALOT
  rationale: The prefixed waw on the opening verb marks narrative progression. 'Then'
    gives readable modern English while preserving the sequential force better than
    a bare 'And' in this context.
