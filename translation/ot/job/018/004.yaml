theological_decisions:
- issue: Referent and rhetorical force of the verse
  chosen_reading: Bildad addresses Job directly with a rebuke about expecting the
    moral order of the world to change for him.
  alternative_readings:
  - 'Retain third person throughout: ''He who tears himself in his anger; shall the
    earth be abandoned for him...?'''
  rationale: 'Although the opening participial phrase is formally third person with
    a 3ms suffix, the immediately following לְמַעַנְךָ is second person singular.
    English can preserve the discourse force best by rendering the whole as a direct
    address: ''You who tear yourself apart...'' This reflects the rhetorical rebuke
    without importing additional theology.'
  doctrine_reference: Translation philosophy §1, §3, §6
