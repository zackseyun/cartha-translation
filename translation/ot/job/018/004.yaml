id: JOB.18.4
reference: Job 18:4
source:
  edition: WLC
  text: טֹֽרֵ֥ף נַפְשׁ֗/וֹ בְּ/אַ֫פּ֥/וֹ הַ֭/לְמַעַנְ/ךָ תֵּעָ֣זַב אָ֑רֶץ וְ/יֶעְתַּק
    צ֝֗וּר מִ/מְּקֹמֽ/וֹ־׃
translation:
  text: You who tear yourself apart in your anger—shall the earth be abandoned for
    your sake, or a rock be moved from its place?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'He who tears his soul in his anger.' The Hebrew opens
      with a third-person participial expression before shifting to direct second-person
      address.
    reason: lexical_alternative
lexical_decisions:
- source_word: טֹרֵף
  chosen: tear yourself apart
  alternatives:
  - tears his soul
  - prey upon yourself
  - tear your life apart
  lexicon: HALOT
  rationale: Qal participle of טרף literally denotes tearing/rending, often of a beast
    tearing prey. With נַפְשׁוֹ as object, the idiom expresses self-destructive rage.
    English 'tear yourself apart' captures the reflexive force and vividness better
    than a wooden 'tears his soul.'
- source_word: נַפְשׁוֹ
  chosen: yourself
  alternatives:
  - his soul
  - his life
  - himself
  lexicon: HALOT
  rationale: נֶפֶשׁ can mean soul, life, self. In this idiom, English 'yourself' is
    the most natural equivalent, avoiding an overly psychologized 'soul' while preserving
    the reflexive sense.
- source_word: בְּאַפּוֹ
  chosen: in your anger
  alternatives:
  - in his anger
  - with his nostril/wrath
  - through his anger
  lexicon: HALOT
  rationale: אַף literally 'nose' commonly means anger/wrath. Because Bildad is directly
    addressing Job, the English shifts to second person for coherence with לְמַעַנְךָ
    and the rhetorical question.
- source_word: הֲלְמַעַנְךָ
  chosen: for your sake
  alternatives:
  - because of you
  - for your benefit
  lexicon: HALOT
  rationale: The interrogative plus לְמַעַן asks whether cosmic order should change
    on Job's account. 'For your sake' is idiomatic and preserves the rhetorical thrust.
- source_word: תֵּעָזַב אָרֶץ
  chosen: shall the earth be abandoned
  alternatives:
  - will the land be forsaken
  - shall the earth be left behind
  lexicon: HALOT
  rationale: אָרֶץ can be earth or land; here the scope is proverbial/cosmic, so 'earth'
    fits better than 'land.' Niphal of עזב is passive/reflexive, 'be abandoned' or
    'be forsaken.'
- source_word: וְיֶעְתַּק
  chosen: be moved
  alternatives:
  - be removed
  - be displaced
  - be uprooted
  lexicon: HALOT
  rationale: From עתק in the sense of moving/removing from one place. Passive English
    'be moved' fits the parallel with 'be abandoned' and the rhetorical question.
- source_word: צוּר
  chosen: a rock
  alternatives:
  - the rock
  - a crag
  lexicon: HALOT
  rationale: צוּר commonly means rock/crag. The indefinite 'a rock' works proverbially
    in English and avoids suggesting a specific theological title for God, which is
    not intended here.
- source_word: מִמְּקֹמוֹ
  chosen: from its place
  alternatives:
  - from his place
  - out of its place
  lexicon: HALOT
  rationale: Refers back to צוּר, treated as an inanimate object in English; 'its
    place' is therefore the natural rendering.
