id: JOB.18.17
reference: Job 18:17
source:
  edition: WLC
  text: זִֽכְר/וֹ אָ֭בַד מִנִּי אָ֑רֶץ וְ/לֹא שֵׁ֥ם ל֝֗/וֹ עַל פְּנֵי חֽוּץ־־־־־׃
translation:
  text: His memory perishes from the earth, and he has no name on the face of the
    street.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'His remembrance vanishes from the land, and he has no name in the public
      square.'
    reason: lexical_alternative
lexical_decisions:
- source_word: זִכְרוֹ
  chosen: his memory
  alternatives:
  - his remembrance
  - the memory of him
  lexicon: HALOT
  rationale: The noun from זכר denotes remembrance or memory. 'His memory' is natural
    modern English and preserves the sense that what remains of him in human recollection
    disappears.
- source_word: אָבַד
  chosen: perishes
  alternatives:
  - is lost
  - vanishes
  lexicon: HALOT
  rationale: The verb אבד commonly means perish, be destroyed, or vanish. 'Perishes'
    keeps the stark, formal force of Bildad's judgment while fitting the singular
    subject 'memory'.
- source_word: מִנִּי אָרֶץ
  chosen: from the earth
  alternatives:
  - from the land
  lexicon: HALOT
  rationale: אֶרֶץ can mean 'land' or 'earth.' In this poetic context of total erasure,
    'from the earth' better conveys universal disappearance rather than removal from
    one territory.
- source_word: וְלֹא שֵׁם לוֹ
  chosen: and he has no name
  alternatives:
  - and there is no name for him
  - and no name belongs to him
  lexicon: HALOT
  rationale: שֵׁם here refers to name in the sense of reputation, identity, or remembered
    standing. Rendering with an English possessive construction ('he has no name')
    is idiomatic while preserving the Hebrew sense of lacking any surviving name.
- source_word: עַל־פְּנֵי
  chosen: on the face of
  alternatives:
  - upon
  - across
  lexicon: HALOT
  rationale: The Hebrew idiom literally means 'on the face of.' Retaining it here
    preserves the poetic texture and spatial imagery without becoming unintelligible
    in English.
- source_word: חוּץ
  chosen: the street
  alternatives:
  - the outside
  - the open place
  - the marketplace
  lexicon: HALOT
  rationale: חוּץ often denotes the outside area, especially the street or public
    square. 'The street' best captures the public sphere where a person's name would
    be known. The singular works generically in English.
