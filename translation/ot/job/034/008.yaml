theological_decisions:
- issue: Gendered expression in אַנְשֵׁי רֶשַׁע
  chosen_reading: men of evil
  alternative_readings:
  - people of evil
  - the wicked
  rationale: The Hebrew uses an explicitly masculine plural construct ('men of ...').
    Per the translation philosophy, gender-accurate rendering is preferred over neutralization
    unless context clearly demands otherwise. Here the masculine form is retained
    in English.
