id: JOB.34.8
reference: Job 34:8
source:
  edition: WLC
  text: וְ/אָרַ֣ח לְ֭/חֶבְרָה עִם פֹּ֣עֲלֵי אָ֑וֶן וְ֝/לָ/לֶ֗כֶת עִם אַנְשֵׁי רֶֽשַׁע־־־׃
translation:
  text: and keeps company with workers of wickedness, and walks with men of evil.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'associates with workers of wickedness.' The Hebrew verb can carry the
      sense of traveling in company with or joining oneself to others.
    reason: lexical_alternative
  - marker: b
    text: Or 'wicked men.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אָרַח
  chosen: and keeps company
  alternatives:
  - and travels
  - and goes in company
  - and associates
  lexicon: HALOT
  rationale: The verb from ארח in this context is idiomatic with לְחֶבְרָה, expressing
    association or companionship rather than literal travel. 'Keeps company' captures
    the social/moral alignment Elihu is describing and fits the parallel with 'walks
    with.'
- source_word: לְ/חֶבְרָה
  chosen: company
  alternatives:
  - companionship
  - association
  lexicon: HALOT
  rationale: The noun denotes companionship or fellowship. In English, 'keeps company'
    is a natural idiom that preserves the sense of associating oneself with others.
- source_word: עִם
  chosen: with
  lexicon: HALOT
  rationale: Standard preposition of association; 'with' is the direct and natural
    rendering in both clauses.
- source_word: פֹּעֲלֵי אָוֶן
  chosen: workers of wickedness
  alternatives:
  - doers of iniquity
  - workers of trouble
  - evildoers
  lexicon: HALOT
  rationale: פֹּעֲלֵי is literally 'workers/doers of,' and אָוֶן commonly denotes
    wickedness, iniquity, or trouble. 'Workers of wickedness' preserves the Hebrew
    construction and moral force without over-paraphrasing.
- source_word: וְ/לָ/לֶכֶת
  chosen: and walks
  alternatives:
  - and goes
  - and proceeds
  lexicon: HALOT
  rationale: הלך often functions literally or metaphorically for one's course of life
    and associations. 'Walks' preserves the Hebrew imagery and moral nuance, especially
    in wisdom literature.
- source_word: אַנְשֵׁי רֶשַׁע
  chosen: men of evil
  alternatives:
  - wicked men
  - men of wickedness
  - evil men
  lexicon: HALOT
  rationale: אַנְשֵׁי is literally 'men of,' and רֶשַׁע denotes wickedness/evil. 'Men
    of evil' keeps the construct force and follows the gender-accurate policy, since
    the Hebrew is explicitly masculine plural.
