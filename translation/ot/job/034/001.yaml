id: JOB.34.1
reference: Job 34:1
source:
  edition: WLC
  text: וַ/יַּ֥עַן אֱלִיה֗וּא וַ/יֹּאמַֽר׃
translation:
  text: 'Then Elihu answered and said:'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיַּעַן
  chosen: answered
  alternatives:
  - responded
  lexicon: HALOT
  rationale: The verb ענה in the wayyiqtol narrative form commonly introduces a spoken
    response. 'Answered' preserves the conventional discourse function and fits the
    immediate transition into Elihu's speech. 'Responded' is possible but slightly
    less idiomatic in this formulaic construction.
- source_word: אֱלִיהוּא
  chosen: Elihu
  rationale: Personal names are transliterated by standard English convention per
    translation philosophy. 'Elihu' is the established and recognizable English form
    of the Hebrew name אֱלִיהוּא.
- source_word: וַיֹּאמַר
  chosen: said
  alternatives:
  - spoke
  lexicon: HALOT
  rationale: אמר is the standard verb of speech. In the common Hebrew narrative pairing
    'answered and said,' rendering the second verb as 'said' preserves the formal
    structure without unnecessary expansion. 'Spoke' is possible but less natural
    in this collocation.
- source_word: וַ
  chosen: Then
  alternatives:
  - And
  lexicon: HALOT
  rationale: The prefixed waw on the initial wayyiqtol advances the narrative. 'Then'
    communicates sequential development in readable modern English, while still reflecting
    the Hebrew narrative progression. 'And' would be more formally literal but less
    natural in English at this point.
