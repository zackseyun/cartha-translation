id: JOB.34.3
reference: Job 34:3
source:
  edition: WLC
  text: כִּי אֹ֭זֶן מִלִּ֣ין תִּבְחָ֑ן וְ֝/חֵ֗ךְ יִטְעַ֥ם לֶ/אֱכֹֽל־׃
translation:
  text: For the ear tests words, as the palate tastes food.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the palate tastes what is eaten.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Surely
  - Because
  lexicon: HALOT
  rationale: Introduces the explanation for the preceding exhortation. 'For' best
    preserves the causal/explanatory force in natural English.
- source_word: אֹזֶן
  chosen: the ear
  alternatives:
  - an ear
  lexicon: HALOT
  rationale: Singular noun used generically/proverbially. 'The ear' works idiomatically
    in English for a general truth.
- source_word: מִלִּין
  chosen: words
  alternatives:
  - sayings
  - speech
  lexicon: HALOT
  rationale: Aramaizing/Hebrew plural meaning spoken words. 'Words' is the most direct
    and natural rendering in this comparison.
- source_word: תִּבְחָן
  chosen: tests
  alternatives:
  - examines
  - proves
  - discerns
  lexicon: HALOT
  rationale: From בחן, to test/examine. 'Tests' preserves the evaluative sense and
    matches the analogy with tasting.
- source_word: חֵךְ
  chosen: the palate
  alternatives:
  - the mouth
  - the taste
  lexicon: HALOT
  rationale: Refers specifically to the palate/taste organ rather than the whole mouth.
    'Palate' keeps the sensory parallel with the ear.
- source_word: יִטְעַם
  chosen: tastes
  alternatives:
  - samples
  - perceives the taste of
  lexicon: HALOT
  rationale: From טעם, to taste. 'Tastes' is the straightforward lexical equivalent
    and preserves the proverb's imagery.
- source_word: לֶאֱכֹל
  chosen: food
  alternatives:
  - what is eaten
  - that which is for eating
  lexicon: HALOT
  rationale: 'Infinitive construct with prefixed ל functions substantivally here:
    ''for eating'' = food. Rendering as ''food'' gives clear modern English without
    losing sense.'
