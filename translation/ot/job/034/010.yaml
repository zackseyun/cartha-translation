theological_decisions:
- issue: Rendering of the divine title שַׁדַּי
  chosen_reading: the Almighty
  alternative_readings:
  - Shaddai
  rationale: Because this is a title rather than a personal name, it is translated
    to preserve meaning for English readers. This also matches common usage in Job,
    where the title emphasizes God's supreme power.
  doctrine_reference: DOCTRINE.md Translation philosophy §2 (Translate titles; transliterate
    names)
- issue: Gendered expression אַנֲשֵׁי לֵבָב
  chosen_reading: men of understanding
  alternative_readings:
  - people of understanding
  - those with understanding
  rationale: The Hebrew expression is grammatically masculine plural. Per the project's
    gender-accurate policy, the masculine form is retained rather than neutralized,
    while the idiomatic sense of לֵבָב is expressed as understanding.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over
    gender-neutral)
