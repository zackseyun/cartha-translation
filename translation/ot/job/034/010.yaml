id: JOB.34.10
reference: Job 34:10
source:
  edition: WLC
  text: לָ/כֵ֤ן אַ֥נֲשֵׁ֥י לֵבָ֗ב שִׁמְע֫וּ לִ֥/י חָלִ֖לָ/ה לָ/אֵ֥ל מֵ/רֶ֗שַׁע וְ/שַׁדַּ֥י
    מֵ/עָֽוֶל׀׃
translation:
  text: 'Therefore, men of understanding, listen to me: far be it from God to do wickedness,
    and from the Almighty to do wrong.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'men of heart,' an idiom for men with understanding or discernment.
    reason: lexical_alternative
  - marker: b
    text: Or 'far be it for God from wickedness, and for the Almighty from injustice.'
      The Hebrew expresses that such evil is unthinkable in relation to God.
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  chosen: Therefore
  alternatives:
  - So
  - For this reason
  lexicon: HALOT
  rationale: Discourse marker drawing an inference from the preceding argument; 'Therefore'
    preserves the logical connection in natural English.
- source_word: אַנֲשֵׁי לֵבָב
  chosen: men of understanding
  alternatives:
  - men of heart
  - men of sense
  - wise men
  lexicon: HALOT
  rationale: Literally 'men of heart.' In Hebrew, 'heart' commonly denotes understanding
    and discernment, not merely emotion. 'Men of understanding' preserves the masculine
    form and conveys the idiomatic sense.
- source_word: שִׁמְעוּ לִי
  chosen: listen to me
  alternatives:
  - hear me
  lexicon: HALOT
  rationale: Imperative plus preposition naturally means attentive listening directed
    toward the speaker. 'Listen to me' is idiomatic modern English while retaining
    the force of the appeal.
- source_word: חָלִילָה
  chosen: far be it
  alternatives:
  - profane thing!
  - certainly not
  - be it far
  lexicon: HALOT
  rationale: An idiomatic expression of strong repudiation. 'Far be it' is the standard
    concise English equivalent and fits the solemn tone.
- source_word: לָאֵל
  chosen: from God
  alternatives:
  - for God
  - to God
  lexicon: HALOT
  rationale: With חָלִילָה, the lamed marks the party from whom such an action is
    unthinkable. 'From God' communicates that wickedness is utterly excluded in relation
    to God.
- source_word: מֵרֶשַׁע
  chosen: to do wickedness
  alternatives:
  - from wickedness
  - to act wickedly
  lexicon: HALOT
  rationale: 'The preposition with the noun expresses separation from or exclusion
    of wickedness; in English the sense is best completed verbally: ''to do wickedness.''
    This makes explicit the implied verbal idea without adding content beyond the
    Hebrew idiom.'
- source_word: וְשַׁדַּי
  chosen: and from the Almighty
  alternatives:
  - and from Shaddai
  lexicon: HALOT
  rationale: שַׁדַּי is a divine title, not a personal name here, so it is translated
    rather than transliterated in keeping with the project's philosophy.
- source_word: מֵעָוֶל
  chosen: to do wrong
  alternatives:
  - from injustice
  - to commit injustice
  - from unrighteousness
  lexicon: HALOT
  rationale: עָוֶל denotes wrong, injustice, or unrighteousness. 'To do wrong' is
    clear modern English and parallels 'to do wickedness' in the prior clause.
