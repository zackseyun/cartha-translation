id: JOB.34.30
reference: Job 34:30
source:
  edition: WLC
  text: מִ֭/מְּלֹךְ אָדָ֥ם חָנֵ֗ף מִ/מֹּ֥קְשֵׁי עָֽם׃
translation:
  text: so that a godless man should not reign, from ensnaring the people.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'lest a godless man reign, lest there be snares for the people'; the
      Hebrew is compressed and allows several closely related renderings built on
      'reign' and 'snare.'
    reason: alternative_reading
lexical_decisions:
- source_word: מִמְּלֹךְ
  chosen: so that ... should not reign
  alternatives:
  - from reigning
  - lest ... reign
  lexicon: HALOT
  rationale: 'The prefixed מִן with the infinitive construct of מלך can express prevention
    or result in context, especially following the previous verse''s statement of
    divine action. English idiom is best captured as a purpose/result clause: ''so
    that ... should not reign'' or ''lest ... reign,'' rather than the more wooden
    ''from reigning.'''
- source_word: אָדָם
  chosen: man
  alternatives:
  - humankind
  - person
  lexicon: HALOT
  rationale: Here אָדָם refers to an individual human ruler, not humanity in general.
    Per doctrine, gender-accurate rendering is preferred where the source intends
    it; 'man' fits the singular representative sense.
- source_word: חָנֵף
  chosen: godless
  alternatives:
  - profane
  - hypocritical
  - impious
  lexicon: HALOT
  rationale: חָנֵף in wisdom literature commonly denotes one who is irreverent or
    ungodly rather than merely insincere. 'Godless' communicates the moral-religious
    force more clearly than 'hypocrite' in modern English.
- source_word: מִמֹּקְשֵׁי
  chosen: from ensnaring
  alternatives:
  - because of the snares of
  - from the snares of
  - lest there be snares for
  lexicon: HALOT
  rationale: The noun מוֹקֵשׁ means 'snare/trap.' In this compressed poetic line,
    the preposition מִן likely marks prevention with the sense of keeping the people
    from being trapped. Rendering it verbally as 'from ensnaring' produces natural
    English while preserving the causal-preventive force.
- source_word: עָם
  chosen: the people
  alternatives:
  - a people
  - the populace
  lexicon: HALOT
  rationale: With the context of public rule and oppression, עָם is best rendered
    generically as 'the people,' referring to the community under a ruler.
