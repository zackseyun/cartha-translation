theological_decisions:
- issue: Interpretation of the verse's compressed syntax
  chosen_reading: God acts so that a godless man does not reign, thereby preventing
    the ensnaring of the people.
  alternative_readings:
  - God acts because of the snares of the people.
  - God acts to remove a godless ruler from reigning over a people ensnared.
  rationale: 'The Hebrew is elliptical and depends on the preceding context (v. 29).
    The most coherent reading takes this line as the purpose/result of God''s judicial
    action: he prevents a godless ruler from reigning so that the people are not trapped.
    This preserves the moral logic of Elihu''s argument without over-paraphrasing.'
  doctrine_reference: Translation philosophy §§1, 3, 6
