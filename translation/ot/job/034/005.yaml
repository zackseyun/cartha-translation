theological_decisions:
- issue: Forensic nuance of Job's self-claim
  chosen_reading: Render צָדַקְתִּי as 'I am in the right' rather than the broader
    'I am righteous.'
  alternative_readings:
  - I am righteous
  - I am just
  rationale: This keeps Elihu's summary tied to Job's claim in the dispute before
    God rather than implying a blanket assertion of sinless moral perfection. It preserves
    the legal/disputational tension of the verse without importing a stronger doctrinal
    claim.
  doctrine_reference: Translation philosophy §3, §6
- issue: Rendering of מִשְׁפָּטִי
  chosen_reading: Use 'my justice' in the main text.
  alternative_readings:
  - my right
  - the justice due me
  - my case
  rationale: The Hebrew term carries legal and moral dimensions. 'My justice' preserves
    that breadth, while a footnote can preserve the more idiomatic alternative 'my
    right.' This follows the instruction to preserve genuine lexical tension rather
    than flatten it.
  doctrine_reference: Translation philosophy §3, §5
