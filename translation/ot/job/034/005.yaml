id: JOB.34.5
reference: Job 34:5
source:
  edition: WLC
  text: כִּֽי אָ֭מַר אִיּ֣וֹב צָדַ֑קְתִּי וְ֝/אֵ֗ל הֵסִ֥יר מִשְׁפָּטִֽ/י־׃
translation:
  text: For Job has said, ‘I am in the right, and God has taken away my justice.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “my right” or “the justice due me.”
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Because
  - Indeed
  lexicon: HALOT
  rationale: Introduces Elihu's explanation of what Job has said; 'For' fits the argumentative
    flow better than the more causal 'Because' or emphatic 'Indeed'.
- source_word: אָמַר
  chosen: has said
  alternatives:
  - said
  - says
  lexicon: HALOT
  rationale: The qatal reports a prior statement relevant to the present argument.
    English present perfect captures that discourse function naturally.
- source_word: אִיּוֹב
  chosen: Job
  rationale: Standard English transliteration of the personal name.
- source_word: צָדַקְתִּי
  chosen: I am in the right
  alternatives:
  - I am righteous
  - I am just
  - I have been justified
  lexicon: HALOT
  rationale: From צדק, here expressing Job's claim to being right/just in his case.
    'I am in the right' is idiomatic modern English and fits the forensic context
    without overstating moral perfection. 'I am righteous' is possible but can sound
    broader and more absolute than the immediate dispute warrants.
- source_word: וְאֵל
  chosen: and God
  alternatives:
  - and God Almighty
  - but God
  lexicon: HALOT
  rationale: אֵל here is the common word for God, not a distinct title requiring expansion.
    The conjunction is straightforwardly additive; 'but' would import contrast not
    explicit in the Hebrew.
- source_word: הֵסִיר
  chosen: has taken away
  alternatives:
  - has removed
  - has turned aside
  lexicon: HALOT
  rationale: The hiphil of סור means to remove or take away. 'Has taken away' is clear
    and natural in English for the claim that God has deprived Job of something due
    him.
- source_word: מִשְׁפָּטִי
  chosen: my justice
  alternatives:
  - my right
  - my judgment
  - the justice due me
  - my case
  lexicon: HALOT
  rationale: מִשְׁפָּט can denote justice, legal right, or judicial decision. Here
    Job is represented as claiming that God has removed the justice/right due to him.
    'My justice' preserves the noun's weight and ambiguity better than narrowing it
    to 'my case,' while still sounding natural enough in context.
