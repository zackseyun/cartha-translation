id: JOB.34.23
reference: Job 34:23
source:
  edition: WLC
  text: כִּ֤י לֹ֣א עַל אִ֭ישׁ יָשִׂ֣ים ע֑וֹד לַ/הֲלֹ֥ךְ אֶל אֵ֝֗ל בַּ/מִּשְׁפָּֽט־־׃
translation:
  text: For he does not set a time for a man to go before God in judgment.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'For he does not set any further time for a man to go before God in
      judgment.' The Hebrew is difficult and compressed; the sense is that God needs
      no additional hearing or delay before judging.
    reason: alternative_reading
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Because
  lexicon: HALOT
  rationale: Introduces the ground or explanation for the preceding statement. 'For'
    fits the argumentative flow in Elihu's speech.
- source_word: לֹא
  chosen: does not
  alternatives:
  - not
  lexicon: HALOT
  rationale: Standard negation, expressed idiomatically with the English auxiliary.
- source_word: עַל אִישׁ
  chosen: for a man
  alternatives:
  - upon a man
  - against a man
  lexicon: HALOT
  rationale: With שׂים the preposition עַל can mark something laid upon someone. In
    this context the sense is that God does not impose or appoint something further
    for a man. 'For a man' is the most natural English expression here while preserving
    the masculine singular generic sense.
- source_word: אִישׁ
  chosen: a man
  alternatives:
  - a person
  - someone
  lexicon: HALOT
  rationale: Rendered gender-accurately per translation philosophy. The singular masculine
    is generic, but the source uses 'man,' not an explicitly gender-neutral term.
- source_word: יָשִׂים
  chosen: set
  alternatives:
  - appoint
  - lay upon
  lexicon: HALOT
  rationale: The verb שׂים is broad ('put, set, place'). Here it likely means to set
    or appoint something for someone. 'Set' keeps the Hebrew's simplicity and allows
    the object 'a time' to be supplied idiomatically from context.
- source_word: עוֹד
  chosen: a time
  alternatives:
  - again
  - more
  - further
  lexicon: HALOT
  rationale: Literally 'again/further/still.' In this difficult clause, many understand
    the sense to be that God does not need to set a further time or additional occasion
    for judicial review. English requires an object with 'set,' so 'a time' is supplied
    as the implied object, with 'further' reflected conceptually rather than woodenly.
- source_word: לַהֲלֹךְ
  chosen: to go
  alternatives:
  - to come
  - to proceed
  lexicon: HALOT
  rationale: Infinitive of הלך, 'to go/walk.' In judicial context, 'to go before'
    is a natural idiomatic rendering.
- source_word: אֶל אֵל
  chosen: before God
  alternatives:
  - to God
  lexicon: HALOT
  rationale: Literally 'to God,' but in English legal/judicial idiom 'go before God'
    better conveys appearance in court. 'God' is the sense of אֵל here, not the divine
    name.
- source_word: בַּמִּשְׁפָּט
  chosen: in judgment
  alternatives:
  - for judgment
  - at law
  - in the lawsuit
  lexicon: HALOT
  rationale: מִשְׁפָּט can denote judgment, justice, or legal proceeding. Here the
    judicial setting is clear; 'in judgment' is concise and natural, while preserving
    the courtroom sense.
