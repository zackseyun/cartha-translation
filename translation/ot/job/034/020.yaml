theological_decisions:
- issue: Agency implied by 'not by hand'
  chosen_reading: The phrase is left literal in the main text, implying that the removal
    of the mighty occurs apart from ordinary human agency, likely by divine action.
  alternative_readings:
  - without human hand
  - not by a human hand
  rationale: The verse stresses God's sovereign ability to bring down peoples and
    the mighty suddenly and without reliance on human means. Preserving the idiom
    avoids over-interpreting while still allowing the theological implication to stand.
  doctrine_reference: Translation philosophy §3, preserve theological tension rather
    than resolve it.
