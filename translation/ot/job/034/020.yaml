id: JOB.34.20
reference: Job 34:20
source:
  edition: WLC
  text: רֶ֤גַע יָמֻתוּ֮ וַ/חֲצ֪וֹת לָ֥יְלָה יְגֹעֲשׁ֣וּ עָ֣ם וְ/יַעֲבֹ֑רוּ וְ/יָסִ֥ירוּ
    אַ֝בִּ֗יר לֹ֣א בְ/יָֽד׀׃
translation:
  text: In a moment they die; at midnight a people are shaken, and they pass away;
    the mighty are removed, not by hand.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'without human hand'; the Hebrew literally says 'not by hand,' likely
      indicating removal apart from human agency.
    reason: lexical_alternative
lexical_decisions:
- source_word: רֶגַע
  chosen: in a moment
  alternatives:
  - instantly
  - suddenly
  lexicon: HALOT
  rationale: The noun denotes a brief moment or instant. 'In a moment' preserves the
    temporal force idiomatically in English without overstating manner.
- source_word: יָמֻתוּ
  chosen: they die
  alternatives:
  - they perish
  lexicon: HALOT
  rationale: Common verb for dying. 'Die' is the most direct rendering and fits the
    verse's emphasis on sudden mortality.
- source_word: וַחֲצוֹת לָיְלָה
  chosen: at midnight
  alternatives:
  - and at midnight
  - in the middle of the night
  lexicon: HALOT
  rationale: The construct phrase literally means 'and [at] half of night.' English
    idiom is best captured by 'at midnight.' The prefixed conjunction is absorbed
    smoothly into the sentence flow.
- source_word: יְגֹעֲשׁוּ
  chosen: are shaken
  alternatives:
  - are in turmoil
  - quake
  - are stirred up
  lexicon: HALOT
  rationale: From געשׁ, conveying shaking, quaking, or tumult. A passive-like English
    rendering fits the context of a people suddenly thrown into upheaval by divine
    judgment.
- source_word: עָם
  chosen: a people
  alternatives:
  - people
  - the people
  lexicon: HALOT
  rationale: The singular collective noun is best represented as 'a people,' preserving
    the Hebrew's collective-singular sense rather than flattening it to a bare plural.
- source_word: וְיַעֲבֹרוּ
  chosen: they pass away
  alternatives:
  - they pass on
  - they vanish
  - they are gone
  lexicon: HALOT
  rationale: From עבר, literally 'pass over/by,' but in this context of mortality
    and removal it idiomatically means to pass away. This keeps the progression from
    upheaval to disappearance/death.
- source_word: וְיָסִירוּ
  chosen: are removed
  alternatives:
  - remove
  - take away
  lexicon: HALOT
  rationale: The Hiphil of סור can mean 'remove' or 'take away.' An impersonal passive
    in English matches the Hebrew's unspecified agent and the following phrase 'not
    by hand.'
- source_word: אַבִּיר
  chosen: the mighty
  alternatives:
  - the strong man
  - the powerful one
  - the noble
  lexicon: HALOT
  rationale: The adjective/substantive denotes one who is strong or mighty. 'The mighty'
    is idiomatic and can function collectively or representatively in English.
- source_word: לֹא בְיָד
  chosen: not by hand
  alternatives:
  - without human hand
  - not by a hand
  lexicon: HALOT
  rationale: Literally 'not by hand.' The phrase likely means without human agency.
    The more literal wording is retained in the main text because it is clear enough
    and preserves the Hebrew idiom; the interpretive expansion is preserved in a footnote.
