id: JOB.34.37
reference: Job 34:37
source:
  edition: WLC
  text: כִּ֥י יֹ֘סִ֤יף עַֽל חַטָּאת֣/וֹ פֶ֭שַׁע בֵּינֵ֣י/נוּ יִסְפּ֑וֹק וְ/יֶ֖רֶב
    אֲמָרָ֣י/ו לָ/אֵֽל־׃ס
translation:
  text: For he adds rebellion to his sin; among us he claps his hands, and he multiplies
    his words against God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'he strikes his hands together'; the gesture likely conveys scorn, defiance,
      or mockery.
    reason: lexical_alternative
  - marker: b
    text: 'Or ''to God.'' The Hebrew preposition can be read more neutrally as direction
      (''to''), but the context favors an adversative sense: ''against God.'''
    reason: alternative_reading
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Because
  lexicon: HALOT
  rationale: Introduces Elihu's reason for the preceding judgment. 'For' fits the
    explanatory force in context better than the more emphatic 'indeed' or strictly
    causal 'because.'
- source_word: יֹסִיף
  chosen: he adds
  alternatives:
  - he increases
  - he continues to add
  lexicon: HALOT
  rationale: Hiphil of יסף commonly means 'add/increase.' 'He adds' is concise and
    preserves the verbal image of piling one offense onto another.
- source_word: עַל חַטָּאתוֹ
  chosen: to his sin
  alternatives:
  - upon his sin
  - over his sin
  lexicon: HALOT
  rationale: The preposition על with יסף idiomatically conveys addition to an existing
    state. 'To his sin' is natural English and preserves the sense.
- source_word: פֶשַׁע
  chosen: rebellion
  alternatives:
  - transgression
  - offense
  lexicon: HALOT
  rationale: פשע often denotes revolt or rebellious transgression, not merely a generic
    wrong. 'Rebellion' best captures the intensified, defiant nuance in Elihu's accusation.
- source_word: בֵּינֵינוּ
  chosen: among us
  alternatives:
  - in our midst
  - before us
  lexicon: HALOT
  rationale: Literally 'between us,' but idiomatically 'among us/in our midst.' 'Among
    us' is clear modern English and suits the social setting of Elihu speaking before
    others.
- source_word: יִסְפּוֹק
  chosen: he claps his hands
  alternatives:
  - he mocks with a hand gesture
  - he strikes his hands together
  lexicon: HALOT
  rationale: The verb ספק in this context is traditionally understood as a gesture
    of derision or defiance, often rendered 'clap the hands.' The concrete rendering
    is retained in the main text, with the interpretive nuance preserved in a footnote.
- source_word: וְיֶרֶב
  chosen: and he multiplies
  alternatives:
  - and he makes many
  - and he increases
  lexicon: HALOT
  rationale: Hiphil of רבה means to make many/increase. 'Multiplies' preserves the
    vivid sense of piling up speech.
- source_word: אֲמָרָיו
  chosen: his words
  alternatives:
  - his speeches
  - his sayings
  lexicon: HALOT
  rationale: A broad plural for spoken utterances. 'His words' is the most direct
    and least interpretively loaded rendering.
- source_word: לָאֵל
  chosen: against God
  alternatives:
  - to God
  - before God
  lexicon: HALOT
  rationale: 'Although the preposition is ל, in this accusatory context with multiplying
    words it likely carries an adversative sense: speech directed against God. This
    best fits Elihu''s charge of defiance rather than mere address.'
