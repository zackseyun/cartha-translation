theological_decisions:
- issue: Whether Elihu's accusation should be softened as merely speaking 'to God'
    rather than defiantly 'against God.'
  chosen_reading: against God
  alternative_readings:
  - to God
  - before God
  rationale: 'The verse intensifies Job''s fault: he adds rebellion to sin, performs
    a contemptuous gesture among the observers, and piles up words in opposition to
    God. Rendering לָאֵל as ''against God'' preserves that rhetorical escalation without
    importing extra doctrine.'
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
