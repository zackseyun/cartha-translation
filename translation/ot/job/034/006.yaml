id: JOB.34.6
reference: Job 34:6
source:
  edition: WLC
  text: עַל מִשְׁפָּטִ֥/י אֲכַזֵּ֑ב אָנ֖וּשׁ חִצִּ֣/י בְלִי פָֽשַׁע־־׃
translation:
  text: Should I lie concerning my right? My wound is incurable, though there is no
    transgression.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Against my right I am counted a liar,' taking the first clause as a
      statement rather than a rhetorical question.
    reason: alternative_reading
  - marker: b
    text: Literally, 'my arrow is incurable'; 'arrow' is likely a metaphor for the
      wound or affliction inflicted on him.
    reason: lexical_alternative
lexical_decisions:
- source_word: עַל
  chosen: concerning
  alternatives:
  - about
  - against
  - despite
  lexicon: HALOT
  rationale: 'With אכזב (''I lie''/''I am counted a liar'') and משפטי (''my right/case''),
    על is best taken in the sense ''concerning/about'' rather than a more spatial
    or adversative sense. This yields a coherent rhetorical question: ''Should I lie
    concerning my right?''.'
- source_word: מִשְׁפָּטִי
  chosen: my right
  alternatives:
  - my judgment
  - my case
  - my justice
  lexicon: HALOT
  rationale: מִשפט can denote legal judgment, justice, or one's legal right/case.
    In Job's self-defense context, 'my right' is concise modern English that preserves
    the juridical sense without sounding overly technical. 'My case' is possible and
    preserved as an alternative nuance.
- source_word: אֲכַזֵּב
  chosen: Should I lie
  alternatives:
  - I am counted a liar
  - I lie
  - shall I be false
  lexicon: HALOT
  rationale: The Piel of כזב can mean 'to lie' or, in context, 'to prove false/be
    shown a liar.' Because the clause is commonly understood as a rhetorical question
    in Elihu's quotation of Job's stance, 'Should I lie' captures the force well in
    English. The passive-like sense 'I am counted a liar' is a viable alternative
    and is preserved in a footnote.
- source_word: אָנ֖וּשׁ
  chosen: is incurable
  alternatives:
  - is desperate
  - is grievous
  - is mortal
  lexicon: HALOT
  rationale: From אנשׁ, the adjective conveys something incurable or desperately sick.
    Applied to חצי ('my wound/arrow'), 'is incurable' best communicates the severity
    idiomatically in English.
- source_word: חִצִּי
  chosen: my wound
  alternatives:
  - my arrow
  - my wound from the arrow
  lexicon: HALOT
  rationale: Literally 'my arrow,' but in context it functions metaphorically for
    the wound or affliction inflicted on Job. Rendering it as 'my wound' communicates
    the intended sense in readable English while preserving the image in a footnote.
- source_word: בְלִי
  chosen: though there is no
  alternatives:
  - without
  - apart from there being
  - with no
  lexicon: HALOT
  rationale: 'בלי introduces absence: ''without/no.'' In idiomatic English linked
    to the prior clause, ''though there is no'' clearly expresses the concessive force
    implied by the context.'
- source_word: פָשַׁע
  chosen: transgression
  alternatives:
  - rebellion
  - offense
  - wrongdoing
  lexicon: HALOT
  rationale: פשע often denotes transgression or rebellion, especially moral breach
    against God. 'Transgression' preserves the moral-legal weight better than the
    more generic 'wrongdoing'.
