theological_decisions:
- issue: Interpretation of Elihu's quotation of Job's claim
  chosen_reading: 'Render the verse as a rhetorical question followed by a protest
    of undeserved suffering: ''Should I lie concerning my right? My wound is incurable,
    though there is no transgression.'''
  alternative_readings:
  - 'Render the first clause indicatively: ''Against my right I am counted a liar'''
  - 'Render חצי literally: ''my arrow is incurable'''
  rationale: The Hebrew is compressed and difficult. The chosen rendering preserves
    the legal and lament dimensions without over-interpreting. It reflects Job's complaint
    that to deny his innocence would be false, while his affliction remains severe
    despite no transgression. Alternatives are preserved in footnotes because the
    syntax and imagery admit more than one plausible construal.
  doctrine_reference: Translation philosophy §3, preserve theological tension rather
    than resolve it
