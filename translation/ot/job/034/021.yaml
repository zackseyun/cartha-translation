theological_decisions:
- issue: Generic masculine אִישׁ
  chosen_reading: a man
  alternative_readings:
  - a person
  - someone
  rationale: The Hebrew is grammatically masculine singular with representative force.
    Following the stated gender-accurate policy, the translation keeps 'a man' rather
    than flattening to a gender-neutral term, while understanding the sense as generally
    applicable to human beings.
