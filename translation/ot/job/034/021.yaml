id: JOB.34.21
reference: Job 34:21
source:
  edition: WLC
  text: כִּי עֵ֭ינָי/ו עַל דַּרְכֵי אִ֑ישׁ וְֽ/כָל צְעָדָ֥י/ו יִרְאֶֽה־־־־׃
translation:
  text: For his eyes are on the ways of a man, and he sees all his steps.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a person's ways.' The Hebrew reads 'the ways of a man,' using a masculine
      singular form with generic force.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Because
  - Indeed
  lexicon: HALOT
  rationale: Introduces the ground or explanation for the preceding statement; 'For'
    preserves the explanatory force in natural English.
- source_word: עֵינָיו
  chosen: his eyes
  alternatives:
  - his eye
  lexicon: HALOT
  rationale: Plural noun with 3ms suffix; rendered literally as 'his eyes.' In context
    the referent is God from the surrounding discourse, but the verse itself uses
    the pronoun.
- source_word: עַל
  chosen: are on
  alternatives:
  - upon
  - against
  - over
  lexicon: HALOT
  rationale: With 'eyes' and an object of observation, English idiom prefers 'are
    on' to express attentive watching while preserving the underlying preposition's
    sense.
- source_word: דַּרְכֵי אִישׁ
  chosen: the ways of a man
  alternatives:
  - a man's ways
  - the paths of a man
  - the ways of a person
  lexicon: HALOT
  rationale: דֶּרֶךְ commonly means 'way, path,' often metaphorically for conduct.
    'Ways' fits the moral/life-course sense here. אִישׁ is singular masculine and
    generic; per gender-accurate policy, 'a man' is retained rather than neutralizing
    to 'person.'
- source_word: וְכָל
  chosen: and all
  alternatives:
  - and every
  lexicon: HALOT
  rationale: Simple conjunctive plus totalizing noun; 'and all' is the most direct
    rendering.
- source_word: צְעָדָיו
  chosen: his steps
  alternatives:
  - his strides
  - his goings
  lexicon: HALOT
  rationale: Concrete image of steps, often metaphorical for actions or course of
    life. 'Steps' is both literal and idiomatic in English.
- source_word: יִרְאֶה
  chosen: he sees
  alternatives:
  - he observes
  - he watches
  - he looks upon
  lexicon: HALOT
  rationale: Qal imperfect 3ms of ראה. Present-tense English communicates the general,
    ongoing truth of divine observation more naturally than a future here.
