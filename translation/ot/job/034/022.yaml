id: JOB.34.22
reference: Job 34:22
source:
  edition: WLC
  text: אֵֽין חֹ֭שֶׁךְ וְ/אֵ֣ין צַלְמָ֑וֶת לְ/הִסָּ֥תֶר שָׁ֝֗ם פֹּ֣עֲלֵי אָֽוֶן־׃
translation:
  text: There is no darkness, and no deep shadow, where workers of wickedness may
    hide themselves.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'shadow of death'; the Hebrew term can also denote very deep darkness
      or gloom in poetic contexts.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵין
  chosen: There is no
  alternatives:
  - there is not
  - none is
  lexicon: HALOT
  rationale: Existential negation introducing the clause; idiomatic English uses 'There
    is no' rather than a more wooden 'not is there.'
- source_word: חֹשֶׁךְ
  chosen: darkness
  alternatives:
  - gloom
  lexicon: HALOT
  rationale: The common sense is literal or figurative 'darkness.' Here it pairs with
    צַלְמָוֶת to express concealment; 'darkness' is the natural primary rendering.
- source_word: צַלְמָוֶת
  chosen: deep shadow
  alternatives:
  - shadow of death
  - gloom
  - deep darkness
  lexicon: HALOT
  rationale: In wisdom poetry this term often denotes profound darkness or deep shadow,
    not necessarily death itself. 'Deep shadow' preserves the poetic intensification
    without importing death where the context is concealment rather than mortality.
- source_word: לְהִסָּתֶר
  chosen: may hide themselves
  alternatives:
  - to hide themselves
  - to conceal themselves
  lexicon: HALOT
  rationale: 'Infinitive construct with ל expresses purpose/result after the negated
    nouns: there is no darkness or deep shadow ''for hiding.'' English idiom is best
    conveyed with a finite clause, ''where ... may hide themselves.'' Reflexive sense
    is appropriate.'
- source_word: שָׁם
  chosen: where
  alternatives:
  - there
  lexicon: HALOT
  rationale: 'Although literally ''there,'' in English the adverb naturally becomes
    relative after the preceding phrase: ''where workers of wickedness may hide themselves.''
    This preserves the sense more smoothly than ''there ... hide themselves.'''
- source_word: פֹּעֲלֵי אָוֶן
  chosen: workers of wickedness
  alternatives:
  - workers of iniquity
  - evildoers
  - doers of trouble
  lexicon: HALOT
  rationale: The construct phrase is literally 'workers/doers of אָוֶן.' 'Workers
    of wickedness' preserves the verbal imagery and moral force. 'Evildoers' is possible
    but less formally transparent to the Hebrew structure.
- source_word: אָוֶן
  chosen: wickedness
  alternatives:
  - iniquity
  - evil
  - trouble
  lexicon: HALOT
  rationale: The noun can denote wickedness, trouble, or iniquity depending on context.
    Here moral evil is in view, since the phrase describes those trying to hide from
    divine scrutiny; 'wickedness' communicates that clearly.
