theological_decisions:
- issue: Meaning of צַלְמָוֶת in poetic context
  chosen_reading: deep shadow
  alternative_readings:
  - shadow of death
  - deep darkness
  rationale: The verse concerns the impossibility of concealment from God, not death
    itself. Following optimal equivalence, the main text uses a rendering centered
    on profound darkness rather than a traditional but potentially misleading 'shadow
    of death.' The traditional alternative is preserved in a footnote for auditability.
  doctrine_reference: Translation philosophy §1, §3
