id: JOB.34.29
reference: Job 34:29
source:
  edition: WLC
  text: וְ/ה֤וּא יַשְׁקִ֨ט וּ/מִ֥י יַרְשִׁ֗עַ וְ/יַסְתֵּ֣ר פָּ֭נִים וּ/מִ֣י יְשׁוּרֶ֑/נּוּ
    וְ/עַל גּ֖וֹי וְ/עַל אָדָ֣ם יָֽחַד׀־־׃
translation:
  text: If he gives quietness, who can condemn? If he hides his face, who can behold
    him? This is so for a nation and for a man alike.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'who can declare him guilty?' The Hebrew verb can carry a forensic sense
      of pronouncing someone wicked or guilty.
    reason: lexical_alternative
  - marker: b
    text: Or 'who can see him?' The verb means 'look at' or 'behold.'
    reason: lexical_alternative
  - marker: c
    text: Literally 'and upon a nation and upon a man together'; the sense is that
      this applies equally to both a nation and an individual man.
    reason: lexical_alternative
lexical_decisions:
- source_word: יַשְׁקִט
  chosen: gives quietness
  alternatives:
  - is quiet
  - causes peace
  - gives rest
  lexicon: HALOT
  rationale: 'Hiphil of שקט is causative: not merely ''is quiet'' but ''causes quiet/calm.''
    ''Gives quietness'' preserves the causative force while remaining natural English.
    ''Peace'' is possible contextually, but the Hebrew term is broader than formal
    shalom-language.'
- source_word: יַרְשִׁעַ
  chosen: condemn
  alternatives:
  - declare guilty
  - trouble
  - act wickedly against
  lexicon: HALOT
  rationale: Hiphil of רשע commonly means 'declare wicked/guilty' or 'condemn.' In
    this judicial context about God's unassailable action, 'condemn' is the most idiomatic
    concise rendering. 'Trouble' reflects some translation traditions but is less
    directly tied to the verb's forensic sense.
- source_word: יַסְתֵּר פָּנִים
  chosen: hides his face
  alternatives:
  - conceals his face
  - turns away his face
  lexicon: HALOT
  rationale: The idiom literally means 'hide the face' and often conveys divine withdrawal
    or refusal to be seen/favorable. The literal rendering is clear in English and
    preserves the theological resonance of divine hiddenness.
- source_word: יְשׁוּרֶנּוּ
  chosen: behold him
  alternatives:
  - see him
  - look upon him
  - observe him
  lexicon: HALOT
  rationale: From שור, 'look at, behold.' 'Behold him' fits the elevated tone and
    pairs well with 'hides his face.' The suffix is singular masculine, referring
    back to God ('him'), not 'it' or 'them'.
- source_word: גּוֹי
  chosen: nation
  alternatives:
  - people
  - gentile nation
  lexicon: HALOT
  rationale: Here גוי is a collective political/social entity, best rendered 'nation.'
    'People' is possible but less precise; 'gentile nation' would import a contrast
    absent in context.
- source_word: אָדָם
  chosen: man
  alternatives:
  - humankind
  - person
  - human being
  lexicon: HALOT
  rationale: The phrase contrasts the corporate ('nation') with the individual ('man').
    Per doctrine, gender-accurate rendering is preferred where the source uses masculine
    אדם with representative force. 'Man' preserves the singular individual sense better
    than the more abstract 'humankind.'
- source_word: יָחַד
  chosen: alike
  alternatives:
  - together
  - equally
  - both
  lexicon: HALOT
  rationale: Here יחד functions adverbially to indicate equal applicability to both
    nation and individual. 'Alike' communicates that sense naturally in English better
    than the more spatial 'together'.
- source_word: וְעַל גּוֹי וְעַל אָדָם יָחַד
  chosen: for a nation and for a man alike
  alternatives:
  - against a nation and against a man alike
  - over a nation and over a man alike
  lexicon: HALOT
  rationale: The preposition על is flexible. In this summarizing clause, the sense
    is that the preceding principle applies in both cases. Rendering it as 'for' in
    English communicates scope/application rather than spatial relation, which would
    sound awkward here.
