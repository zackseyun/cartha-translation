theological_decisions:
- issue: Divine hiddenness idiom
  chosen_reading: Retain the anthropomorphic expression 'hides his face' literally.
  alternative_readings:
  - turns away from them
  - withdraws his favor
  rationale: The Hebrew idiom is theologically significant and should be preserved
    rather than interpreted away. More explanatory renderings narrow the sense to
    disfavor alone, whereas the text leaves the effect broader.
  doctrine_reference: Translation philosophy §3, preserve theological tension rather
    than resolve it.
- issue: Scope of the final clause
  chosen_reading: 'Apply the statement equally to collective and individual human
    subjects: ''for a nation and for a man alike.'''
  alternative_readings:
  - 'Read the clause more adversatively: ''whether against a nation or against a man
    alike'''
  rationale: The verse closes by broadening the principle to both corporate and individual
    spheres. This avoids over-specifying punitive force in the preposition and fits
    the rhetorical flow.
