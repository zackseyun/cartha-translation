id: JOB.34.25
reference: Job 34:25
source:
  edition: WLC
  text: לָ/כֵ֗ן יַ֭כִּיר מַעְבָּֽדֵי/הֶ֑ם וְ/הָ֥פַךְ לַ֝֗יְלָה וְ/יִדַּכָּֽאוּ׃
translation:
  text: Therefore he recognizes their deeds; he overturns them in the night, and they
    are crushed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'he overthrows them by night.' The Hebrew does not state the object explicitly
      in 'he overturns,' but the context points to the wicked rulers under judgment.
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  chosen: Therefore
  alternatives:
  - So
  - For this reason
  lexicon: HALOT
  rationale: Marks logical consequence from the preceding argument; 'therefore' best
    preserves the inferential force in natural English.
- source_word: יַכִּיר
  chosen: he recognizes
  alternatives:
  - he knows
  - he takes note of
  - he examines
  lexicon: HALOT
  rationale: Hiphil of נכר here conveys recognizing or taking cognizance of. 'Recognizes'
    preserves the sense that God discerns and identifies their actions.
- source_word: מַעְבָּדֵיהֶם
  chosen: their deeds
  alternatives:
  - their works
  - their actions
  lexicon: HALOT
  rationale: From מַעֲבָד/מַעֲבָדִים, referring to what they do. 'Deeds' is concise,
    idiomatic, and morally weighty in context.
- source_word: וְהָפַךְ
  chosen: he overturns them
  alternatives:
  - he overthrows them
  - he turns them upside down
  lexicon: HALOT
  rationale: The verb הפך commonly means overturn/overthrow. The object is not explicit
    in Hebrew, so 'them' is supplied from context, referring to the wicked rulers/judges
    under discussion. 'Overturns' keeps the vivid judicial-reversal sense.
- source_word: לַיְלָה
  chosen: in the night
  alternatives:
  - by night
  - at night
  lexicon: HALOT
  rationale: Temporal accusative/adverbial use. 'In the night' is a natural rendering
    that preserves the nocturnal setting of sudden judgment.
- source_word: וְיִדַּכָּאוּ
  chosen: and they are crushed
  alternatives:
  - and they are broken
  - and they are crushed down
  lexicon: HALOT
  rationale: From דכא, to crush or break. Passive sense fits the form and context
    of divine judgment falling on them. 'Crushed' is strong and idiomatic.
