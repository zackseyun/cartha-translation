theological_decisions:
- issue: Implicit subject and object in the judgment scene
  chosen_reading: The subject throughout is God, and the implied object of 'he overturns'
    is the wicked persons under discussion.
  alternative_readings:
  - '''he overturns the night'' as a more literal but contextually awkward construal'
  - an impersonal reading of the verbs
  rationale: The surrounding context (Job 34:24–26) speaks of God knowing and judging
    mighty wicked men. Supplying 'them' in English makes explicit what Hebrew leaves
    implicit and yields the most coherent sense in context.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve the source''s
    plain sense without paraphrasing beyond what context warrants.'
