id: JOB.34.11
reference: Job 34:11
source:
  edition: WLC
  text: כִּ֤י פֹ֣עַל אָ֭דָם יְשַׁלֶּם ל֑/וֹ וּֽ/כְ/אֹ֥רַח אִ֝֗ישׁ יַמְצִאֶֽ/נּוּ־׃
translation:
  text: For he repays a man according to his deed, and he makes him find according
    to a man's way.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'he causes it to come upon him' or 'he brings upon him,' reflecting
      the causative sense of the Hebrew verb.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Because
  lexicon: HALOT
  rationale: Introduces the ground for Elihu's assertion in the surrounding context.
    'For' best preserves the explanatory force in natural English.
- source_word: פֹעַל
  chosen: deed
  alternatives:
  - work
  - action
  lexicon: HALOT
  rationale: The noun refers to what a person does. 'Deed' fits the moral-retributive
    context better than the more neutral 'work' while remaining concise.
- source_word: אָדָם
  chosen: a man
  alternatives:
  - humankind
  - a person
  lexicon: HALOT
  rationale: The singular pairs naturally with the following singular אִישׁ and functions
    representatively. Per the gender-accurate policy, 'a man' preserves the Hebrew
    form and generic force better than a pluralized or neutralized rendering.
- source_word: יְשַׁלֶּם לוֹ
  chosen: he repays a man
  alternatives:
  - he pays him back
  - he recompenses him
  lexicon: HALOT
  rationale: Piel of שלם here carries the sense of requiting or repaying according
    to conduct. 'Repays' is idiomatic and preserves the judicial/retributive nuance
    without sounding archaic.
- source_word: וּכְאֹרַח
  chosen: according to ... way
  alternatives:
  - according to ... path
  - in keeping with ... conduct
  lexicon: HALOT
  rationale: אֹרַח literally denotes a way or path and often metaphorically one's
    manner of life. 'Way' preserves the metaphor and is standard biblical English.
- source_word: אִישׁ
  chosen: a man's
  alternatives:
  - a person's
  - each man's
  lexicon: HALOT
  rationale: Like אָדָם, this singular masculine noun is representative/generic. Rendering
    it as 'a man's' preserves the parallelism and gender-accurate policy.
- source_word: יַמְצִאֶנּוּ
  chosen: he makes him find
  alternatives:
  - he causes it to come upon him
  - he lets him encounter
  - he brings upon him
  lexicon: HALOT
  rationale: The Hiphil of מצא can mean 'cause to find/experience.' In this context
    it expresses causing a person to meet the consequences corresponding to his way.
    'Makes him find' stays close to the Hebrew while remaining intelligible; the more
    interpretive alternatives are preserved in a footnote.
