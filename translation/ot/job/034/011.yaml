theological_decisions:
- issue: Divine retribution according to human conduct
  chosen_reading: The verse states that God repays each human in accordance with his
    deeds and way, without importing a broader doctrinal claim that all suffering
    in Job is a direct one-to-one punishment.
  alternative_readings:
  - A universal statement that every instance of suffering is exact retribution for
    personal sin
  rationale: The immediate wording is a general principle of divine justice. In Job's
    larger argument, the translation should preserve that principle without overstating
    it into a simplistic resolution of the book's tension.
  doctrine_reference: Preserve theological tension rather than resolve it.
