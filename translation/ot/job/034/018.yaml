id: JOB.34.18
reference: Job 34:18
source:
  edition: WLC
  text: הַ/אֲמֹ֣ר לְ/מֶ֣לֶךְ בְּלִיָּ֑עַל רָ֝שָׁ֗ע אֶל נְדִיבִֽים־׃
translation:
  text: who says to a king, ‘Worthless one!’ and to nobles, ‘Wicked men!’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'scoundrel' for בְּלִיָּעַל; the Hebrew here uses a term of worthlessness,
      not necessarily the later proper name 'Belial.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'wicked' is singular in form, but it is addressed to the plural 'nobles'
      and is rendered as a plural insult in English for clarity.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַאֲמֹר
  chosen: who says
  alternatives:
  - to say
  - saying
  lexicon: HALOT
  rationale: 'The infinitive construct with prefixed article functions substantivally
    here, referring back to the kind of person under discussion in context: ''the
    one who says'' or ''who says.'' This yields natural English while preserving the
    Hebrew syntax.'
- source_word: לְמֶלֶךְ
  chosen: to a king
  alternatives:
  - to the king
  lexicon: HALOT
  rationale: The preposition ל marks the indirect object of speech. The anarthrous
    noun is best rendered generically as 'a king' rather than 'the king.'
- source_word: בְּלִיָּעַל
  chosen: Worthless one
  alternatives:
  - worthless fellow
  - scoundrel
  - Belial
  lexicon: HALOT
  rationale: In this context the noun is a term of abuse meaning worthlessness or
    baseness, not a proper name. 'Worthless one' preserves the force without importing
    later personified 'Belial' usage. The singular matches the address to the singular
    'king.'
- source_word: רָשָׁע
  chosen: Wicked men
  alternatives:
  - wicked one
  - wicked people
  - guilty ones
  lexicon: HALOT
  rationale: Though morphologically singular in form, it functions distributively/predicatively
    with the plural 'nobles' in the parallel line. English idiom is clearer with the
    plural 'Wicked men!' to match the plural addressees.
- source_word: אֶל
  chosen: to
  alternatives:
  - toward
  lexicon: HALOT
  rationale: Here אֶל introduces the addressee of speech in parallel with לְמֶלֶךְ.
    'To' is the natural English equivalent.
- source_word: נְדִיבִים
  chosen: nobles
  alternatives:
  - princes
  - noblemen
  lexicon: HALOT
  rationale: The term denotes socially elevated, generous, or noble persons. 'Nobles'
    fits the parallel with 'king' and keeps the social-political sense in readable
    modern English.
