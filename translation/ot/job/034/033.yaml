id: JOB.34.33
reference: Job 34:33
source:
  edition: WLC
  text: הַֽ/מֵ/עִמְּ/ךָ֬ יְשַׁלְמֶ֨/נָּה כִּֽי מָאַ֗סְתָּ כִּי אַתָּ֣ה תִבְחַ֣ר וְ/לֹא
    אָ֑נִי וּֽ/מַה יָדַ֥עְתָּ דַבֵּֽר־־־־׃
translation:
  text: Should he repay it according to your judgment, because you have rejected it?
    For you must choose, and not I; so declare what you know.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Should he repay according to you?' The Hebrew opening is idiomatic
      and difficult; the sense is that God's recompense is not determined by Job's
      preference.
    reason: lexical_alternative
  - marker: b
    text: '''Rejected it'' may refer to God''s judgment, God''s way of governing,
      or the proposed recompense.'
    reason: alternative_reading
lexical_decisions:
- source_word: הֲמֵעִמְּךָ
  chosen: according to your judgment
  alternatives:
  - from you
  - at your side
  - according to you
  lexicon: HALOT
  rationale: The idiom is difficult literally ('from with you'). In context Elihu
    asks whether God's recompense should be determined by Job's preference. Rendering
    idiomatically as 'according to your judgment' captures the sense without over-paraphrasing.
- source_word: יְשַׁלְּמֶנָּה
  chosen: should he repay it
  alternatives:
  - should he recompense it
  - will he repay
  - should he make restitution for it
  lexicon: HALOT
  rationale: From שלם in the Piel, 'to repay/recompense.' The 3fs suffix likely refers
    to the matter/recompense under discussion. 'Repay it' is concise and preserves
    the verbal idea of recompense.
- source_word: כִּי מָאַסְתָּ
  chosen: because you have rejected it
  alternatives:
  - because you have refused
  - since you have despised it
  lexicon: HALOT
  rationale: מאס commonly means 'reject, refuse, despise.' Here 'rejected it' best
    fits the argument that Job has refused God's way or verdict. The object is implicit
    in English but represented by 'it' from context.
- source_word: כִּי אַתָּה תִבְחַר וְלֹא אָנִי
  chosen: For you must choose, and not I
  alternatives:
  - For you are the one who chooses, not I
  - Because you should choose and not I
  lexicon: HALOT
  rationale: 'בחר means ''choose.'' The clause contrasts Job''s role with Elihu''s:
    Job must state his own position rather than Elihu deciding for him. ''Must choose''
    brings out the rhetorical force in natural English.'
- source_word: וּמַה יָדַעְתָּ דַבֵּר
  chosen: so declare what you know
  alternatives:
  - and what you know, speak
  - therefore speak what you know
  lexicon: HALOT
  rationale: A direct imperative follows a relative/interrogative phrase. English
    smooths the sequence as 'declare what you know,' preserving the challenge for
    Job to articulate his understanding.
