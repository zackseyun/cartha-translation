id: JOB.34.35
reference: Job 34:35
source:
  edition: WLC
  text: אִ֭יּוֹב לֹא בְ/דַ֣עַת יְדַבֵּ֑ר וּ֝/דְבָרָ֗י/ו לֹ֣א בְ/הַשְׂכֵּֽיל־׃
translation:
  text: Job speaks without knowledge, and his words are without understanding.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Job does not speak with knowledge, and his words are not with understanding.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְדַעַת
  chosen: without knowledge
  alternatives:
  - not with knowledge
  - without understanding
  lexicon: HALOT
  rationale: 'The preposition ב with the abstract noun דעת expresses manner: Job''s
    speaking is characterized by a lack of knowledge. ''Without knowledge'' is idiomatic
    English and preserves the force better than the more wooden ''not with knowledge.'''
- source_word: יְדַבֵּר
  chosen: speaks
  alternatives:
  - is speaking
  - will speak
  lexicon: HALOT
  rationale: The imperfect here functions as a general present in Elihu's evaluative
    statement about Job, not primarily future. 'Speaks' gives natural English while
    preserving the verbal sense.
- source_word: דְבָרָיו
  chosen: his words
  alternatives:
  - his speeches
  - what he says
  lexicon: HALOT
  rationale: The plural noun דברים commonly means 'words' or 'statements.' 'His words'
    is the most direct and natural rendering here.
- source_word: בְהַשְׂכֵּיל
  chosen: without understanding
  alternatives:
  - without insight
  - not intelligently
  - without wisdom
  lexicon: HALOT
  rationale: The infinitive/verb from שכל conveys acting with insight, prudence, or
    understanding. In parallel with 'without knowledge,' 'without understanding' best
    preserves the poetic balance and sense. 'Not intelligently' is possible but sounds
    too modern and evaluative rather than lexical.
- source_word: לֹא
  chosen: without
  alternatives:
  - not
  lexicon: HALOT
  rationale: Although לֹא is literally 'not,' in English the repeated construction
    with ב plus an abstract noun/infinitive is more naturally rendered 'without ...'
    This preserves the Hebrew negated manner construction idiomatically.
