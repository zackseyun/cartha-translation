id: JOB.34.12
reference: Job 34:12
source:
  edition: WLC
  text: אַף אָמְנָ֗ם אֵ֥ל לֹֽא יַרְשִׁ֑יעַ וְ֝/שַׁדַּ֗י לֹֽא יְעַוֵּ֥ת מִשְׁפָּֽט־־־׃
translation:
  text: Indeed, God does not act wickedly, and the Almighty does not pervert justice.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'God does not condemn unjustly' or 'God does not declare guilty.' The
      Hebrew verb can carry a judicial sense in some contexts.
    reason: alternative_reading
lexical_decisions:
- source_word: אַף אָמְנָם
  chosen: Indeed
  alternatives:
  - Surely
  - Truly
  - Yes, certainly
  lexicon: HALOT
  rationale: The combination intensifies and affirms the statement. 'Indeed' captures
    the emphatic, asseverative force in natural modern English without sounding archaic.
- source_word: אֵל
  chosen: God
  alternatives:
  - God Mighty One
  - Mighty God
  lexicon: HALOT
  rationale: Here אֵל functions as a divine title/name for Israel's God. 'God' is
    the most natural English rendering in context; 'Mighty One' would be possible
    lexically but is less idiomatic here and unnecessary alongside the parallel title
    'the Almighty'.
- source_word: יַרְשִׁיעַ
  chosen: does not act wickedly
  alternatives:
  - does not do wickedness
  - does not condemn as wicked
  - does not act unjustly
  lexicon: HALOT
  rationale: The Hiphil of רשע can mean 'declare guilty/condemn' in judicial contexts,
    but here the parallel with 'does not pervert justice' and the broader argument
    about God's moral rectitude favor the sense of acting wickedly or doing wrong.
    'Does not act wickedly' preserves the verbal force while reading naturally.
- source_word: שַׁדַּי
  chosen: the Almighty
  alternatives:
  - Shaddai
  - the All-sufficient One
  lexicon: HALOT
  rationale: Following the translation philosophy, divine titles are translated rather
    than transliterated. 'The Almighty' is the standard and contextually fitting rendering
    for שַׁדַּי in Job.
- source_word: יְעַוֵּת
  chosen: does not pervert
  alternatives:
  - does not distort
  - does not twist
  lexicon: HALOT
  rationale: The verb conveys bending, twisting, or distorting. 'Pervert' is the established
    and precise English collocation with 'justice' and preserves the juridical tone.
- source_word: מִשְׁפָּט
  chosen: justice
  alternatives:
  - judgment
  - what is just
  lexicon: HALOT
  rationale: In this context מִשְׁפָּט refers to just judgment or justice as a standard.
    'Justice' is clearer and more idiomatic in English than 'judgment' in this parallel
    statement.
