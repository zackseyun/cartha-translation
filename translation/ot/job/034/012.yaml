theological_decisions:
- issue: Sense of יַרְשִׁיעַ in relation to God's character
  chosen_reading: God does not act wickedly
  alternative_readings:
  - God does not condemn unjustly
  - God does not declare guilty
  rationale: The verse asserts God's moral and judicial integrity. Although the Hiphil
    can carry a forensic sense ('declare guilty/condemn'), the immediate parallelism
    with 'does not pervert justice' supports a broader denial of wicked action or
    wrongdoing by God. This preserves the text's theological claim without narrowing
    it to courtroom procedure alone.
  doctrine_reference: Translation philosophy §3, preserve theological tension rather
    than resolve it
