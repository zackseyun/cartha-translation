id: JOB.34.17
reference: Job 34:17
source:
  edition: WLC
  text: הַ/אַ֬ף שׂוֹנֵ֣א מִשְׁפָּ֣ט יַחֲב֑וֹשׁ וְ/אִם צַדִּ֖יק כַּבִּ֣יר תַּרְשִֽׁיעַ־׃
translation:
  text: Can one who hates justice govern? And will you condemn the righteous Mighty
    One?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'rule,' 'restrain,' or more literally 'bind.' The Hebrew verb likely
      carries the sense of exercising rule or restraint in this context.
    reason: lexical_alternative
  - marker: b
    text: Or 'the just mighty one' or 'the righteous great one.' The phrase is most
      naturally understood here as referring to God.
    reason: alternative_reading
lexical_decisions:
- source_word: הַ/אַף
  chosen: Can
  alternatives:
  - Indeed, can
  - Shall even
  lexicon: HALOT
  rationale: The interrogative particle with אַף introduces a rhetorical question
    with emphatic force. English 'Can' captures the interrogative naturally; the added
    force of 'even/indeed' is possible but not required in the main text.
- source_word: שׂוֹנֵא
  chosen: one who hates
  alternatives:
  - the one hating
  - an enemy of
  lexicon: HALOT
  rationale: The participle functions substantivally, referring to a person characterized
    by hatred. 'One who hates' is idiomatic and preserves the ongoing character sense.
- source_word: מִשְׁפָּט
  chosen: justice
  alternatives:
  - judgment
  - justice/order
  lexicon: HALOT
  rationale: In this context Elihu speaks of right governance and moral order, so
    'justice' best conveys the sense of proper judicial order rather than a single
    act of judgment.
- source_word: יַחֲבֹשׁ
  chosen: govern
  alternatives:
  - rule
  - bind
  - restrain
  lexicon: HALOT
  rationale: The verb's basic sense is 'bind,' but in context it is widely understood
    idiomatically of exercising rule or restraint. 'Govern' fits the political/judicial
    context and the rhetorical question about one fit to rule.
- source_word: וְאִם
  chosen: And will
  alternatives:
  - Or will
  - And if
  lexicon: HALOT
  rationale: Here the conjunction introduces the second rhetorical question in parallel
    with the first. 'And will' gives smooth English while preserving the linkage;
    'Or will' is also possible but less direct.
- source_word: צַדִּיק
  chosen: righteous
  alternatives:
  - just
  lexicon: HALOT
  rationale: The adjective describes moral rectitude. 'Righteous' preserves the ethical
    and theological weight better than the somewhat narrower 'just' in English.
- source_word: כַּבִּיר
  chosen: Mighty One
  alternatives:
  - mighty one
  - great one
  lexicon: HALOT
  rationale: Used here as a substantive adjective for God in context. Capitalization
    signals the divine referent in English without adding content not present in the
    Hebrew.
- source_word: תַּרְשִׁיעַ
  chosen: will you condemn
  alternatives:
  - would you declare guilty
  - will you pronounce wicked
  lexicon: HALOT
  rationale: The Hiphil of רשע means to declare guilty or condemn. 'Condemn' is concise,
    idiomatic, and fits the courtroom setting established by 'justice'.
