theological_decisions:
- issue: Referent of 'the righteous Mighty One'
  chosen_reading: A reference to God, rendered with capitalization as 'Mighty One'
  alternative_readings:
  - a generic righteous mighty ruler
  rationale: In Elihu's argument the rhetorical force depends on the absurdity of
    condemning God, the supremely righteous ruler. Capitalization in English helps
    signal the likely referent while remaining a translation-level convention rather
    than an added title.
