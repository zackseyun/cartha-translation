id: JOB.34.31
reference: Job 34:31
source:
  edition: WLC
  text: כִּֽי אֶל אֵ֭ל הֶ/אָמַ֥ר נָשָׂ֗אתִי לֹ֣א אֶחְבֹּֽל־־׃
translation:
  text: For has anyone said to God, ‘I have borne punishment; I will not offend again’?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'I have borne; I will not act corruptly.' The Hebrew
      leaves the object of 'borne' unstated, which may imply punishment, chastisement,
      or guilt borne.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Surely
  lexicon: HALOT
  rationale: Introduces the reason or explanation for the preceding argument. 'For'
    best preserves the connective force in context.
- source_word: אֶל אֵל
  chosen: to God
  alternatives:
  - to God Almighty
  - to God as mighty one
  lexicon: HALOT
  rationale: The preposition אֶל with אֵל naturally yields 'to God.' Since אֵל here
    functions as the common noun/title for God rather than a proper name, 'God' is
    the clearest English rendering.
- source_word: הֶאָמַר
  chosen: has anyone said
  alternatives:
  - has he said
  - would one say
  lexicon: HALOT
  rationale: 'Although morphologically 3ms perfect (''he said''), in context this
    clause is commonly understood rhetorically: ''For has anyone said...?'' English
    idiom benefits from making the implied indefinite subject explicit as ''anyone.''
    This captures the generic force without over-literal awkwardness.'
- source_word: נָשָׂאתִי
  chosen: I have borne punishment
  alternatives:
  - I have borne
  - I have endured
  - I have lifted up
  lexicon: HALOT
  rationale: The verb נשׂא basically means 'to bear/carry/lift.' In this context of
    confession before God, the object is left implicit; many understand it as bearing
    chastisement or punishment. 'I have borne punishment' makes the sense intelligible
    in English while reflecting the likely ellipsis. The more literal 'I have borne'
    is possible but too obscure in contemporary English.
- source_word: לֹא
  chosen: not
  lexicon: HALOT
  rationale: Standard negation.
- source_word: אֶחְבֹּל
  chosen: I will not offend again
  alternatives:
  - I will not act corruptly
  - I will not do wrong
  - I will not destroy
  lexicon: HALOT
  rationale: 'From חבל, whose sense in this context is commonly taken ethically: to
    act wrongly, corruptly, or harmfully. ''I will not offend again'' communicates
    a vow to cease wrongdoing in natural English. ''Act corruptly'' is more formal;
    ''do wrong'' is broader but less vivid.'
