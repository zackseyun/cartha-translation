id: JOB.34.13
reference: Job 34:13
source:
  edition: WLC
  text: מִֽי פָקַ֣ד עָלָ֣י/ו אָ֑רְצָ/ה וּ/מִ֥י שָׂ֝֗ם תֵּבֵ֥ל כֻּלָּֽ/הּ־׃
translation:
  text: Who appointed the earth over him, and who set the whole world in place?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Who charged him with the earth, and who laid on him the whole world?'
      The Hebrew verb פקד can carry the sense of appointing, charging, or entrusting
      responsibility.
    reason: lexical_alternative
lexical_decisions:
- source_word: פָקַד
  chosen: appointed
  alternatives:
  - charged
  - entrusted
  - visited
  - oversaw
  lexicon: HALOT
  rationale: In this context פקד with עַל conveys assigning responsibility or authority
    over something/someone. 'Appointed' best captures the rhetorical question about
    whether anyone placed the earth under God's administration. 'Charged' or 'entrusted'
    are possible but less natural in English here.
- source_word: עָלָיו
  chosen: over him
  alternatives:
  - upon him
  - concerning him
  lexicon: HALOT
  rationale: The preposition עַל with pronominal suffix most naturally means 'over
    him' in this governance context. The suffix refers to God in Elihu's argument.
    'Upon him' is more literal but less idiomatic; 'concerning him' does not fit the
    sense.
- source_word: אָרְצָה
  chosen: the earth
  alternatives:
  - the land
  lexicon: HALOT
  rationale: אֶרֶץ can mean 'land' or 'earth.' Here, paired with תבל ('world'), the
    cosmic scope favors 'the earth' rather than a local 'land.' The directional/paragogic
    ending does not materially alter the English rendering in this clause.
- source_word: שָׂם
  chosen: set
  alternatives:
  - placed
  - established
  lexicon: HALOT
  rationale: שׂים commonly means 'put, place, set.' 'Set' is concise and fits the
    parallelism with the first colon. 'Established' is interpretive and slightly stronger
    than the base verb.
- source_word: תֵּבֵל
  chosen: the world
  alternatives:
  - the inhabited world
  lexicon: HALOT
  rationale: תבל commonly denotes the world in its inhabited, ordered sense. 'The
    world' is the most natural English equivalent; 'the inhabited world' is more explicit
    but heavier than the context requires.
- source_word: כֻּלָּהּ
  chosen: the whole
  alternatives:
  - all of it
  - its entirety
  lexicon: HALOT
  rationale: The suffix refers back to תבל, intensifying totality. Rendering it with
    'the whole world' preserves the emphasis in idiomatic English.
