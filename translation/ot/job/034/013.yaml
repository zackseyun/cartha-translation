theological_decisions:
- issue: Referent of the pronoun in עָלָיו
  chosen_reading: The pronoun refers to God, yielding 'over him.'
  alternative_readings:
  - The text may be construed more abstractly, e.g. 'over it' in some interpretive
    traditions.
  rationale: Within Elihu's argument (Job 34:10–15), the point is that no higher authority
    appointed God over the earth; therefore he is not accountable to a superior and
    cannot be accused of injustice on that basis. The masculine singular suffix naturally
    refers to God in context.
  doctrine_reference: Preserve theological tension rather than resolve it where ambiguity
    is genuine; here the immediate context sufficiently favors reference to God.
