id: JOB.34.26
reference: Job 34:26
source:
  edition: WLC
  text: תַּֽחַת רְשָׁעִ֥ים סְפָקָ֗/ם בִּ/מְק֥וֹם רֹאִֽים־׃
translation:
  text: He strikes them down in the place of the wicked, in a place where people can
    see.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'He strikes them before onlookers' / 'He strikes them in the sight of
      onlookers.' The Hebrew participle literally means 'those seeing.'
    reason: lexical_alternative
  - marker: b
    text: The opening phrase may also be understood more literally as 'under the wicked'
      or idiomatically as 'as wicked people.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תַּחַת
  chosen: in the place of
  alternatives:
  - under
  - instead of
  - as one would the place of
  lexicon: HALOT
  rationale: תחת commonly means 'under' or 'instead of/in place of.' In this poetic
    judicial context, joined with רְשָׁעִים, it most naturally expresses treatment
    corresponding to or in the place of the wicked. Rendering 'in the place of' preserves
    the idiom without over-paraphrasing.
- source_word: רְשָׁעִים
  chosen: the wicked
  alternatives:
  - wicked men
  - evildoers
  lexicon: HALOT
  rationale: The plural adjective/substantive denotes wicked persons. 'The wicked'
    is the most natural English collective rendering and avoids adding 'men' where
    the Hebrew itself is simply plural.
- source_word: סְפָקָם
  chosen: He strikes them down
  alternatives:
  - he claps at them
  - he smites them
  - he slaps them
  lexicon: HALOT
  rationale: From ספק, the sense here is a forceful striking action in judgment. English
    'strikes them down' conveys decisive punitive action in context better than the
    more wooden 'claps/slaps them,' which can sound ambiguous or too weak in modern
    English.
- source_word: בִּמְקוֹם
  chosen: in a place
  alternatives:
  - in the place
  - at the place
  lexicon: HALOT
  rationale: 'The preposition with מקום introduces the location of the judgment. Because
    the phrase is followed by רֹאִים (''those seeing/onlookers''), an indefinite sense
    fits well: a place exposed to view.'
- source_word: רֹאִים
  chosen: where people can see
  alternatives:
  - before onlookers
  - in the sight of onlookers
  - where there are watchers
  lexicon: HALOT
  rationale: The participle literally means 'seeing ones' or 'onlookers.' 'Where people
    can see' is idiomatic modern English that preserves the public nature of the judgment.
    The more formal 'before onlookers' is possible but less natural.
