id: JOB.34.34
reference: Job 34:34
source:
  edition: WLC
  text: אַנְשֵׁ֣י לֵ֭בָב יֹ֣אמְרוּ לִ֑/י וְ/גֶ֥בֶר חָ֝כָ֗ם שֹׁמֵ֥עַֽ לִֽ/י׃
translation:
  text: 'Men of understanding will say to me, and a wise man who hears me:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'men of heart,' an idiom for people of understanding or
      discernment.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַנְשֵׁי לֵבָב
  chosen: men of understanding
  alternatives:
  - men of heart
  - men of sense
  - men of discernment
  lexicon: HALOT
  rationale: Literally 'men of heart.' In Hebrew, 'heart' commonly denotes the inner
    faculty of thought and discernment, not merely emotion. 'Men of understanding'
    communicates the idiomatic sense in natural English while preserving the masculine/generic
    form reflected in the source.
- source_word: יֹאמְרוּ לִי
  chosen: will say to me
  alternatives:
  - say to me
  - will tell me
  lexicon: HALOT
  rationale: The yiqtol form naturally allows a future-like sense in context. 'Will
    say to me' fits Elihu's expectation of what discerning hearers would conclude.
- source_word: וְגֶבֶר חָכָם
  chosen: and a wise man
  alternatives:
  - even a wise man
  - and a mighty man, wise
  lexicon: HALOT
  rationale: גבר often means 'man' with nuance of strength or adult male, but here
    the parallelism with 'men of understanding' favors the simple sense 'man.' The
    adjective חכם is straightforwardly 'wise.'
- source_word: שֹׁמֵעַ לִי
  chosen: who hears me
  alternatives:
  - listening to me
  - hearing me
  lexicon: HALOT
  rationale: The participle functions attributively, describing the wise man as one
    who hears/listens to Elihu. 'Who hears me' is a clear, close rendering; 'listens
    to me' is possible but slightly more interpretive.
