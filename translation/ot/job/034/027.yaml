id: JOB.34.27
reference: Job 34:27
source:
  edition: WLC
  text: אֲשֶׁ֣ר עַל כֵּ֭ן סָ֣רוּ מֵֽ/אַחֲרָ֑י/ו וְ/כָל דְּ֝רָכָ֗י/ו לֹ֣א הִשְׂכִּֽילוּ־־׃
translation:
  text: because they turned aside from following him, and they gave no thought to
    any of his ways.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'from after him,' a Hebrew idiom meaning 'from following him.'
    reason: lexical_alternative
  - marker: b
    text: Or 'they did not consider all his ways.'
    reason: alternative_reading
lexical_decisions:
- source_word: אֲשֶׁר עַל כֵּן
  chosen: because
  alternatives:
  - so that
  - for this reason that
  lexicon: HALOT
  rationale: 'The relative particle with עַל כֵּן functions idiomatically to introduce
    the reason for the preceding judgment: ''because'' or ''for this reason.'' ''Because''
    is the most natural modern English rendering and preserves the causal force.'
- source_word: סָרוּ
  chosen: they turned aside
  alternatives:
  - they turned away
  - they departed
  lexicon: HALOT
  rationale: From סור, meaning to turn aside/away or depart. 'Turned aside' preserves
    the moral and relational nuance in context better than the more spatial 'departed.'
- source_word: מֵאַחֲרָיו
  chosen: from following him
  alternatives:
  - from after him
  - away from him
  lexicon: HALOT
  rationale: Literally 'from after him,' an idiom for ceasing to follow someone. 'From
    following him' communicates the Hebrew idiom clearly in contemporary English while
    retaining the relational sense.
- source_word: וְכָל דְּרָכָיו
  chosen: any of his ways
  alternatives:
  - all his ways
  - any of his paths
  lexicon: HALOT
  rationale: The Hebrew is literally 'and all his ways,' but with the following negation
    the sense in English is idiomatically 'they gave no thought to any of his ways.'
    'Ways' is preferable to 'paths' here because it commonly denotes God's manner
    of acting or moral requirements.
- source_word: לֹא הִשְׂכִּילוּ
  chosen: they gave no thought to
  alternatives:
  - they did not understand
  - they did not consider
  - they did not act wisely regarding
  lexicon: HALOT
  rationale: Hiphil of שׂכל can mean to have insight, understand, consider, or act
    wisely. In this context with 'his ways,' the sense is not mere intellectual failure
    but refusal to attend to or consider them. 'Gave no thought to' captures that
    volitional neglect in readable English.
