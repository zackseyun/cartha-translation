theological_decisions:
- issue: Referent of the 3ms suffixes in 'from following him' and 'his ways'
  chosen_reading: God is the referent
  alternative_readings:
  - an earthly ruler or judge as the immediate antecedent
  rationale: Within Elihu's speech, the broader context speaks of God's seeing, judging,
    and requiting human conduct. Rendering the pronouns as 'him' and 'his' without
    capitalization preserves the Hebrew while the translation assumes God as the referent
    by context, not by doctrinal import.
  doctrine_reference: Preserve theological tension rather than resolve it
