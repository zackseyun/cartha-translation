theological_decisions:
- issue: Referent of the 3ms suffix in 'his hands'
  chosen_reading: 'God is the implied referent: all people are the work of his hands.'
  alternative_readings:
  - A more generic 'the work of hands' without making the divine referent explicit
    in interpretation
  rationale: In context Elihu is describing God's impartial justice. The singular
    masculine suffix naturally refers to God, and making that explicit in English
    by retaining 'his hands' preserves the theological point without over-interpreting.
  doctrine_reference: Preserve theological tension rather than resolve it; here the
    context sufficiently identifies the referent.
