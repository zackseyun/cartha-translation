id: JOB.34.19
reference: Job 34:19
source:
  edition: WLC
  text: אֲשֶׁ֤ר לֹֽא נָשָׂ֨א פְּנֵ֥י שָׂרִ֗ים וְ/לֹ֣א נִכַּר שׁ֭וֹעַ לִ/פְנֵי דָ֑ל
    כִּֽי מַעֲשֵׂ֖ה יָדָ֣י/ו כֻּלָּֽ/ם־׀־־־׃
translation:
  text: who shows no partiality to princes and does not regard the rich above the
    poor, for all of them are the work of his hands.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'does not recognize the rich before the poor,' that is, does not give
      preferential treatment to the rich.
    reason: lexical_alternative
lexical_decisions:
- source_word: נָשָׂא פְּנֵי
  chosen: shows no partiality
  alternatives:
  - does not lift up the face of
  - does not show favor to
  lexicon: HALOT
  rationale: The idiom 'lift up the face' commonly means to show favor or partiality.
    In English, 'shows no partiality' best conveys the idiomatic sense clearly and
    naturally.
- source_word: שָׂרִים
  chosen: princes
  alternatives:
  - nobles
  - officials
  - rulers
  lexicon: HALOT
  rationale: The term denotes high-ranking leaders or nobles. 'Princes' preserves
    the elevated social rank and matches common biblical usage, though 'nobles' is
    also possible.
- source_word: נִכַּר
  chosen: regard
  alternatives:
  - recognize
  - take notice of
  - show special regard for
  lexicon: HALOT
  rationale: In context the verb carries the sense of acknowledging or favoring someone.
    'Regard' fits the parallel with impartiality and avoids implying mere visual recognition.
- source_word: שׁוֹעַ
  chosen: the rich
  alternatives:
  - the wealthy
  - the prominent
  lexicon: HALOT
  rationale: The noun refers to a wealthy or influential person. 'The rich' is concise
    and idiomatic in contrast with 'the poor'.
- source_word: לִפְנֵי
  chosen: above
  alternatives:
  - before
  - over against
  - in preference to
  lexicon: HALOT
  rationale: In the expression 'the rich before the poor,' the sense is preferential
    treatment. 'Above' communicates comparative preference in natural English.
- source_word: דָל
  chosen: the poor
  alternatives:
  - the weak
  - the lowly
  lexicon: HALOT
  rationale: The adjective often denotes one who is poor, weak, or socially low. Here
    the socioeconomic contrast with 'the rich' makes 'the poor' the best rendering.
- source_word: מַעֲשֵׂה יָדָיו
  chosen: the work of his hands
  alternatives:
  - his handiwork
  - what his hands made
  lexicon: HALOT
  rationale: This is a common Hebrew expression for something made by someone. 'The
    work of his hands' preserves the concrete imagery while remaining readable.
- source_word: כֻּלָּם
  chosen: all of them
  alternatives:
  - they all
  - all
  lexicon: HALOT
  rationale: 'The pronoun emphasizes universality: princes, rich, and poor alike.
    ''All of them'' makes that emphasis explicit in English.'
