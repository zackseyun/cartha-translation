id: JOB.34.2
reference: Job 34:2
source:
  edition: WLC
  text: שִׁמְע֣וּ חֲכָמִ֣ים מִלָּ֑/י וְ֝/יֹדְעִ֗ים הַאֲזִ֥ינוּ לִֽ/י׃
translation:
  text: Hear my words, you wise men, and listen to me, you who know.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'give ear to me' for 'listen to me'; the Hebrew verb is more literally
      ear-related.
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׁמְעוּ
  chosen: Hear
  alternatives:
  - Listen
  - Hearken
  lexicon: HALOT
  rationale: Qal imperative plural of שׁמע, a common verb for hearing/listening. 'Hear'
    preserves the direct imperative force and pairs well with the following synonymous
    imperative.
- source_word: חֲכָמִים
  chosen: wise men
  alternatives:
  - wise ones
  - sages
  lexicon: HALOT
  rationale: Plural adjective/substantive meaning 'wise' used vocatively. 'Wise men'
    is gender-accurate and natural in English, matching the masculine plural form
    and the likely address to male interlocutors in context.
- source_word: מִלָּי
  chosen: my words
  alternatives:
  - my speech
  - what I say
  lexicon: HALOT
  rationale: From מִלָּה/מִלִּין in Job/Aramaizing style, meaning 'word, utterance.'
    The plural with 1cs suffix is best rendered 'my words,' preserving the concrete
    lexical sense.
- source_word: וְיֹדְעִים
  chosen: you who know
  alternatives:
  - knowing ones
  - those who understand
  lexicon: HALOT
  rationale: Qal participle plural used substantivally and vocatively. 'You who know'
    is idiomatic English and preserves the participial sense better than a bare noun.
- source_word: הַאֲזִינוּ
  chosen: listen to me
  alternatives:
  - give ear to me
  - pay attention to me
  lexicon: HALOT
  rationale: Hiphil imperative plural of אזן, literally 'give ear.' 'Listen to me'
    is a clear modern-English equivalent, while still preserving the parallelism with
    'Hear my words.'
- source_word: לִי
  chosen: to me
  alternatives:
  - unto me
  lexicon: HALOT
  rationale: Preposition plus 1cs suffix. Included explicitly in English because the
    verb governs the indirect object naturally as 'listen to me.'
