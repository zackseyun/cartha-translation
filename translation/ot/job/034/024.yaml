id: JOB.34.24
reference: Job 34:24
source:
  edition: WLC
  text: יָרֹ֣עַ כַּבִּירִ֣ים לֹא חֵ֑קֶר וַ/יַּעֲמֵ֖ד אֲחֵרִ֣ים תַּחְתָּֽ/ם־׃
translation:
  text: He shatters the mighty beyond investigation, and sets others in their place.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'without inquiry' / 'without searching.' The Hebrew phrase literally
      reads 'not investigation/searching,' expressing that no prolonged examination
      is needed before he overthrows the mighty.
    reason: lexical_alternative
lexical_decisions:
- source_word: יָרֹעַ
  chosen: shatters
  alternatives:
  - breaks
  - crushes
  lexicon: HALOT
  rationale: From רעע in the Hiphil/imperfect, here with God as the implied subject
    in context. The verb conveys forceful breaking or ruining, stronger than a mild
    'harms.' 'Shatters' captures decisive overthrow in judgment.
- source_word: כַּבִּירִים
  chosen: the mighty
  alternatives:
  - the powerful
  - great men
  lexicon: HALOT
  rationale: Refers to powerful persons, likely rulers or elites in context. 'The
    mighty' is concise and idiomatic, preserving the social-political force without
    over-specifying office.
- source_word: לֹא חֵקֶר
  chosen: beyond investigation
  alternatives:
  - without inquiry
  - without searching
  - past finding out
  lexicon: HALOT
  rationale: The phrase literally combines negation with 'searching/investigation.'
    In context it means God does not need prolonged inquiry before acting against
    the mighty. 'Beyond investigation' preserves the sense that no human-style examination
    is required, while remaining natural English.
- source_word: וַיַּעֲמֵד
  chosen: sets
  alternatives:
  - appoints
  - causes to stand
  - raises up
  lexicon: HALOT
  rationale: 'From עמד in the Hiphil/waw-consecutive: to cause to stand, establish,
    appoint. ''Sets'' works smoothly with the following phrase ''in their place''
    and conveys replacement.'
- source_word: אֲחֵרִים
  chosen: others
  alternatives:
  - other men
  - others in their stead
  lexicon: HALOT
  rationale: An indefinite plural referring to replacement persons. 'Others' is sufficient
    because the replacement idea is completed by the following prepositional phrase.
- source_word: תַּחְתָּם
  chosen: in their place
  alternatives:
  - under them
  - instead of them
  - beneath them
  lexicon: HALOT
  rationale: 'Though literally ''under them,'' the idiom in replacement contexts means
    ''in their place'' or ''instead of them.'' This best fits the parallelism: God
    removes the mighty and installs others as replacements.'
