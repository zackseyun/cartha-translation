id: JOB.34.32
reference: Job 34:32
source:
  edition: WLC
  text: בִּלְעֲדֵ֣י אֶ֭חֱזֶה אַתָּ֣ה הֹרֵ֑/נִי אִֽם עָ֥וֶל פָּ֝עַ֗לְתִּי לֹ֣א אֹסִֽיף־׃
translation:
  text: What I do not see, you teach me; if I have done wrong, I will not do it again.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'What I do not see, show me/teach me.' The Hebrew is
      elliptical and may also be rendered 'Apart from what I see, you teach me.'
    reason: lexical_alternative
  - marker: b
    text: Or, more literally, 'I will add no more,' that is, 'I will not continue'
      or 'I will not do it again.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בִּלְעֲדֵי
  chosen: what ... not
  alternatives:
  - apart from
  - besides
  - without
  lexicon: HALOT
  rationale: 'In this idiom with אֶחֱזֶה, the sense is elliptical: ''what I do not
    see/know.'' A more literal ''apart from'' would be awkward in English and obscure
    the clause''s meaning.'
- source_word: אֶחֱזֶה
  chosen: I see
  alternatives:
  - I perceive
  - I know
  lexicon: HALOT
  rationale: The verb חזה literally denotes seeing or perceiving. 'See' preserves
    the imagery while allowing the implied sense of moral or factual perception in
    context.
- source_word: אַתָּה הֹרֵנִי
  chosen: you teach me
  alternatives:
  - you show me
  - you instruct me
  lexicon: HALOT
  rationale: ירה in the Hiphil commonly means 'teach/instruct.' 'Teach me' is natural
    English and fits the penitential request for divine correction.
- source_word: אִם
  chosen: if
  alternatives:
  - whether
  lexicon: HALOT
  rationale: 'Introduces a conditional clause: ''if I have done wrong.'' ''Whether''
    is possible in some analyses, but the conditional reading is more straightforward
    here.'
- source_word: עָוֶל
  chosen: wrong
  alternatives:
  - injustice
  - iniquity
  - evil
  lexicon: HALOT
  rationale: עָוֶל denotes wrongdoing or injustice. 'Wrong' is concise, idiomatic,
    and broad enough for the speaker's confession without over-specifying the offense.
- source_word: פָּעַלְתִּי
  chosen: I have done
  alternatives:
  - I committed
  - I worked
  lexicon: HALOT
  rationale: פעל is a general verb for doing or acting. 'I have done' fits the perfect
    aspect and pairs naturally with 'wrong.'
- source_word: לֹא אֹסִיף
  chosen: I will not do it again
  alternatives:
  - I will add no more
  - I will not continue
  - I will not repeat it
  lexicon: HALOT
  rationale: יסף in the Hiphil with negation idiomatically means 'do no more' or 'not
    continue/repeat.' English requires an implied object; 'do it again' makes the
    sense explicit and readable.
