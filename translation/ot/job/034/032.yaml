theological_decisions:
- issue: Speaker's wording as a model of repentance and teachability before God
  chosen_reading: Render the verse as a plea/request for instruction and a resolve
    to cease wrongdoing, without importing stronger doctrinal language such as confession
    of total guilt or formal repentance terminology.
  alternative_readings:
  - Render more woodenly as 'Apart from what I see, you show me; if I have worked
    iniquity, I will add no more'
  rationale: The Hebrew expresses humility and willingness to be taught, plus a commitment
    not to persist in wrongdoing. The translation preserves that moral-theological
    posture without overstating it.
  doctrine_reference: Translation philosophy §1, §3, §6
