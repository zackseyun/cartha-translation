theological_decisions:
- issue: Interpretation of the clause בִּרְצֹתוֹ עִם אֱלֹהִים
  chosen_reading: the verse states that a man gains nothing by delighting himself
    with God / taking pleasure in God
  alternative_readings:
  - a man gains nothing when God delights in him
  - a man gains nothing by seeking God's favor
  rationale: The suffix on בִּרְצֹתוֹ is most straightforwardly read with the man
    as subject in this summary accusation by Elihu. This yields the common sense that
    Job is being accused of saying piety brings no profit. Because the Hebrew construction
    is compact and has been understood in more than one way, alternatives are preserved
    in a footnote rather than resolved dogmatically.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
