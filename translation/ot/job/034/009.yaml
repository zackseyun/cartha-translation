id: JOB.34.9
reference: Job 34:9
source:
  edition: WLC
  text: כִּֽי אָ֭מַר לֹ֣א יִסְכָּן גָּ֑בֶר בִּ֝/רְצֹת֗/וֹ עִם אֱלֹהִֽים־־־׃
translation:
  text: For he has said, ‘A man gains nothing by delighting himself with God.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “A man profits nothing when God delights in him,” or “A man gains nothing
      by seeking God’s favor.” The Hebrew phrase is compact and allows more than one
      construal.
    reason: alternative_reading
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Because
  lexicon: HALOT
  rationale: Introduces the reason for Elihu's accusation in the preceding context.
    'For' fits the argumentative flow in English.
- source_word: אָמַר
  chosen: he has said
  alternatives:
  - he said
  lexicon: HALOT
  rationale: Perfect verb referring to Job's stated position as summarized by Elihu.
    Present perfect in English captures a prior statement with present relevance in
    the argument.
- source_word: לֹא
  chosen: nothing
  alternatives:
  - not
  lexicon: HALOT
  rationale: 'Combined with the following verb to produce idiomatic English: ''gains
    nothing'' rather than the less natural ''does not profit.'''
- source_word: יִסְכָּן
  chosen: gains
  alternatives:
  - profits
  - benefits
  lexicon: HALOT
  rationale: The verb means to be of use, profit, or benefit. 'Gains' is natural modern
    English and preserves the idea of advantage or profit.
- source_word: גָּבֶר
  chosen: A man
  alternatives:
  - a person
  - a human
  lexicon: HALOT
  rationale: Masculine singular noun used generically. Per gender-accurate policy,
    'man' is retained because the Hebrew is grammatically masculine with representative
    force.
- source_word: בִּרְצֹתוֹ
  chosen: by delighting himself
  alternatives:
  - when he is pleased
  - by taking pleasure
  - in his favor
  lexicon: HALOT
  rationale: From רצָה in the infinitive construct with pronominal suffix, expressing
    taking pleasure or delight. In context with עִם אֱלֹהִים, it most naturally means
    a man's delighting himself in relation to God, not God's favor toward the man.
- source_word: עִם אֱלֹהִים
  chosen: with God
  alternatives:
  - in relation to God
  - before God
  lexicon: HALOT
  rationale: עִם normally means 'with.' Here it marks the relational sphere of the
    delight/pleasure. 'With God' is concise and preserves the Hebrew preposition.
