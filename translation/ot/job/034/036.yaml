theological_decisions:
- issue: Interpretation of Elihu's wish regarding Job's testing
  chosen_reading: A plea that Job be thoroughly tested because his replies place him
    in association with wicked men.
  alternative_readings:
  - A statement that Job is being tested forever
  - A comparison that Job answers like wicked men
  rationale: This is not a major doctrinal crux, but the verse is syntactically difficult.
    The translation preserves the accusatory force of Elihu's speech without importing
    a stronger theological claim than the Hebrew warrants. The association/comparison
    ambiguity in בְּאַנְשֵׁי אָוֶן is preserved by a footnote.
  doctrine_reference: Translation philosophy §§1, 3, 5
