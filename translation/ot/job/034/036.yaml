id: JOB.34.36
reference: Job 34:36
source:
  edition: WLC
  text: אָבִ֗י יִבָּחֵ֣ן אִיּ֣וֹב עַד נֶ֑צַח עַל תְּ֝שֻׁבֹ֗ת בְּ/אַנְשֵׁי אָֽוֶן־־־׃
translation:
  text: My father, let Job be tested to the limit, because of his answers among wicked
    men.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "O my father"; the Hebrew reads literally "my father," likely as a vocative,
      though some understand it differently.
    reason: lexical_alternative
  - marker: b
    text: Literally "unto perpetuity/forever"; here likely meaning intensive or exhaustive
      testing rather than endless duration.
    reason: lexical_alternative
  - marker: c
    text: Or "with wicked men" or "like wicked men"; the Hebrew preposition can suggest
      association or comparison.
    reason: alternative_reading
lexical_decisions:
- source_word: אָבִי
  chosen: My father
  alternatives:
  - O my father
  - Would that my father
  lexicon: HALOT
  rationale: Vocative use is most natural here. The form literally means 'my father.'
    In context it is likely an address, though some take it as an interjection or
    emend it; the direct vocative is retained in the main text as the plainest reading
    of the consonantal text.
- source_word: יִבָּחֵן
  chosen: let ... be tested
  alternatives:
  - may ... be examined
  - will ... be tested
  lexicon: HALOT
  rationale: The Niphal imperfect of בחן carries the sense 'be tested/examined.' Given
    the surrounding wish-like force of the clause, an English jussive 'let ... be
    tested' best represents the sense.
- source_word: עַד נֶצַח
  chosen: to the limit
  alternatives:
  - forever
  - without end
  - completely
  lexicon: HALOT
  rationale: Literally 'unto perpetuity/forever,' but in this judicial-testing context
    the idiom likely expresses extremity or thoroughness rather than endless duration.
    'To the limit' communicates sustained, full testing in idiomatic English while
    avoiding an implausibly temporal 'forever'.
- source_word: עַל
  chosen: because of
  alternatives:
  - for
  - on account of
  - concerning
  lexicon: HALOT
  rationale: 'Here עַל introduces the ground or reason for the wish: Job should be
    tested because of something, namely his responses.'
- source_word: תְּשֻׁבוֹת
  chosen: answers
  alternatives:
  - replies
  - responses
  lexicon: HALOT
  rationale: The noun denotes answers or replies. 'Answers' is concise and fits the
    disputational setting.
- source_word: בְּאַנְשֵׁי אָוֶן
  chosen: among wicked men
  alternatives:
  - with men of iniquity
  - like wicked men
  lexicon: HALOT
  rationale: The beth preposition here is difficult. It may indicate association ('with/among')
    or comparison ('like'). 'Among wicked men' preserves the sense of Job's answers
    aligning him in the company of evildoers without overinterpreting the syntax.
    'Wicked men' renders אנשי און naturally.
