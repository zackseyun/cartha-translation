id: JOB.34.28
reference: Job 34:28
source:
  edition: WLC
  text: לְ/הָבִ֣יא עָ֭לָי/ו צַֽעֲקַת דָּ֑ל וְ/צַעֲקַ֖ת עֲנִיִּ֣ים יִשְׁמָֽע־׃
translation:
  text: so as to bring before him the cry of the poor, and he hears the cry of the
    afflicted.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'upon him' or 'against him'; the Hebrew preposition can be understood
      in more than one way here.
    reason: lexical_alternative
  - marker: b
    text: Or 'the poor ... the oppressed.' The two Hebrew terms overlap but are not
      identical.
    reason: lexical_alternative
lexical_decisions:
- source_word: לְהָבִיא
  chosen: so as to bring
  alternatives:
  - to bring
  - bringing
  lexicon: HALOT
  rationale: The prefixed ל with Hiphil infinitive construct of בוא expresses purpose/result
    in relation to the preceding context. 'So as to bring' makes the infinitival force
    clear in natural English without over-paraphrasing.
- source_word: עָלָיו
  chosen: before him
  alternatives:
  - upon him
  - against him
  - to him
  lexicon: HALOT
  rationale: With בוא and על, the sense is that the cry is brought to someone's attention.
    'Before him' is idiomatic English for presenting a matter to a judge/ruler. 'Against
    him' is possible, but here the object is the cry reaching God rather than an accusation
    being formally lodged against the wicked man in this clause.
- source_word: צַעֲקַת
  chosen: the cry
  alternatives:
  - the outcry
  - the plea
  lexicon: HALOT
  rationale: צעקה denotes a cry/outcry, often of distress. 'Cry' is direct and readable;
    'outcry' is possible but slightly more interpretive.
- source_word: דָּל
  chosen: the poor
  alternatives:
  - the weak
  - the lowly
  lexicon: HALOT
  rationale: דַּל commonly refers to one who is poor, weak, or socially powerless.
    'The poor' is the most standard and contextually fitting rendering here, while
    retaining the social vulnerability implied.
- source_word: וְצַעֲקַת
  chosen: and the cry
  alternatives:
  - and the outcry
  lexicon: HALOT
  rationale: The repeated noun is preserved for rhetorical parallelism rather than
    varied away in English.
- source_word: עֲנִיִּים
  chosen: the afflicted
  alternatives:
  - the poor
  - the needy
  - the oppressed
  lexicon: HALOT
  rationale: עֲנִיִּים can denote the poor, afflicted, or oppressed. Since דָּל has
    already been rendered 'the poor,' 'the afflicted' preserves the parallelism while
    avoiding flattening two distinct though overlapping Hebrew terms into the same
    English gloss.
- source_word: יִשְׁמָע
  chosen: he hears
  alternatives:
  - he will hear
  - he listens to
  lexicon: HALOT
  rationale: 'The imperfect can be rendered present in poetic/wisdom context to express
    characteristic action: God hears such cries. ''He hears'' is concise and natural.
    Future ''will hear'' is possible but less fitting in this immediate poetic description.'
