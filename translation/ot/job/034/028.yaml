theological_decisions:
- issue: Referent of the pronoun in עָלָיו and subject of יִשְׁמָע
  chosen_reading: The cry is brought before God, and God hears the cry of the afflicted.
  alternative_readings:
  - The cry is brought against the wicked man, while God hears the afflicted
  - The cry comes upon him (the oppressor), and he hears it
  rationale: In the immediate context Elihu is describing the wicked person's oppression
    and God's judicial awareness. The final verb 'he hears' most naturally refers
    to God as the implied subject in context, and 'before him' fits the idiom of a
    cry reaching God's attention. This avoids attributing compassionate hearing to
    the oppressor, which is contextually unlikely.
