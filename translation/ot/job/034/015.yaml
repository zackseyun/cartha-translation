theological_decisions:
- issue: Rendering of אָדָם in a generic-human sense
  chosen_reading: man
  alternative_readings:
  - humankind
  - humanity
  rationale: The Hebrew singular collective is best preserved by 'man' here, consistent
    with the doctrine's gender-accurate rather than gender-neutral policy. Because
    modern English readers may hear 'man' narrowly, the inclusive sense is preserved
    in a footnote.
