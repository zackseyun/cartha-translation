id: JOB.34.15
reference: Job 34:15
source:
  edition: WLC
  text: יִגְוַ֣ע כָּל בָּשָׂ֣ר יָ֑חַד וְ֝/אָדָ֗ם עַל עָפָ֥ר יָשֽׁוּב־־׃
translation:
  text: all flesh would perish together, and man would return to the dust.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'humankind would return to the dust.' The Hebrew אָדָם is singular but
      can represent humanity collectively.
    reason: lexical_alternative
lexical_decisions:
- source_word: יִגְוַע
  chosen: would perish
  alternatives:
  - would expire
  - would die
  lexicon: HALOT
  rationale: The verb גוע commonly denotes expiring or perishing, often with the sense
    of dying. 'Would perish' fits the conditional force from the preceding context
    (v. 14) and reads naturally in English while preserving the gravity of universal
    mortality.
- source_word: כָּל בָּשָׂר
  chosen: all flesh
  alternatives:
  - all humanity
  - every living creature
  lexicon: HALOT
  rationale: Literally 'all flesh.' In this context it refers broadly to mortal living
    beings, especially humanity, but 'all flesh' preserves the Hebrew idiom and its
    rhetorical force better than a narrowed paraphrase.
- source_word: יָחַד
  chosen: together
  alternatives:
  - altogether
  - as one
  lexicon: HALOT
  rationale: The adverb emphasizes simultaneity or collective scope. 'Together' is
    the most natural concise rendering.
- source_word: אָדָם
  chosen: man
  alternatives:
  - humankind
  - humanity
  lexicon: HALOT
  rationale: Per the project's gender-accurate policy, אָדָם may be rendered 'man'
    or 'humankind' by context. Here it stands in parallel with 'all flesh' and points
    to humanity generically. 'Man' preserves the singular collective force and echoes
    Gen 3:19-style diction; the inclusive alternative is preserved in a footnote.
- source_word: עַל עָפָר
  chosen: to the dust
  alternatives:
  - upon dust
  - to dust
  lexicon: HALOT
  rationale: Although the preposition is literally 'upon/on,' idiomatic English with
    שוב in this mortality formula is 'return to the dust.' The definite sense 'the
    dust' reflects the concrete image of earthly dust and echoes biblical creation/fall
    language.
- source_word: יָשׁוּב
  chosen: would return
  alternatives:
  - would turn back
  - would go back
  lexicon: HALOT
  rationale: שוב commonly means 'return.' 'Would return' matches the conditional sense
    carried over from the previous verse and fits the mortality motif.
