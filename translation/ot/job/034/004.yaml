id: JOB.34.4
reference: Job 34:4
source:
  edition: WLC
  text: מִשְׁפָּ֥ט נִבְחֲרָה לָּ֑/נוּ נֵדְעָ֖ה בֵינֵ֣י/נוּ מַה טּֽוֹב־־׃
translation:
  text: Let us choose for ourselves what is just; let us know among ourselves what
    is good.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Let us choose justice for ourselves; let us discern among ourselves
      what is good.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִשְׁפָּט
  chosen: what is just
  alternatives:
  - justice
  - judgment
  - what is right
  lexicon: HALOT
  rationale: מִשְׁפָּט can denote justice, judgment, or a legal decision. In this
    exhortational context with נבחרה ('let us choose'), an abstract object of discernment
    is in view rather than a courtroom verdict. 'What is just' gives natural English
    while preserving the ethical/judicial sense.
- source_word: נִבְחֲרָה
  chosen: let us choose
  alternatives:
  - let us select
  lexicon: HALOT
  rationale: Qal imperfect 1cp used cohortatively/exhortationally. 'Let us choose'
    best reflects the volitional force in idiomatic English.
- source_word: לָּנוּ
  chosen: for ourselves
  alternatives:
  - for us
  - to us
  lexicon: HALOT
  rationale: The preposition ל with 1cp pronoun marks advantage/reference. 'For ourselves'
    brings out the deliberative, mutual self-involving sense of the appeal.
- source_word: נֵדְעָה
  chosen: let us know
  alternatives:
  - let us discern
  - let us learn
  lexicon: HALOT
  rationale: The verb ידע commonly means 'know,' but in context of evaluating טוב
    it carries a discernment nuance. 'Let us know' keeps closer formal correspondence
    while remaining intelligible.
- source_word: בֵינֵינוּ
  chosen: among ourselves
  alternatives:
  - between us
  - among us
  lexicon: HALOT
  rationale: The idiom indicates mutual deliberation within the group. 'Among ourselves'
    is more natural in English than the more literal 'between us' for collective discussion.
- source_word: מַה טּוֹב
  chosen: what is good
  alternatives:
  - what is best
  - what is right
  lexicon: HALOT
  rationale: טוֹב broadly denotes good, beneficial, or pleasing. 'What is good' preserves
    the lexical breadth and echoes the ethical evaluation parallel to מִשְׁפָּט.
