id: JOB.34.14
reference: Job 34:14
source:
  edition: WLC
  text: אִם יָשִׂ֣ים אֵלָ֣י/ו לִבּ֑/וֹ רוּח֥/וֹ וְ֝/נִשְׁמָת֗/וֹ אֵלָ֥י/ו יֶאֱסֹֽף־׃
translation:
  text: If he should set his heart on himself, and gather to himself his spirit and
    his breath,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'If he should set his heart to this, and gather to himself his spirit
      and his breath.' The Hebrew expression 'set his heart' may mean to direct his
      attention or purpose.
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  chosen: If
  alternatives:
  - If indeed
  - Should
  lexicon: HALOT
  rationale: Introduces a conditional clause. English 'If' preserves the straightforward
    protasis without adding emphasis not required by the Hebrew.
- source_word: יָשִׂים
  chosen: should set
  alternatives:
  - sets
  - were to set
  - put
  lexicon: HALOT
  rationale: From שׂים, 'to put/set.' With אִם and the context of a hypothetical condition,
    'should set' gives natural English while preserving the contingent sense.
- source_word: אֵלָיו
  chosen: on himself
  alternatives:
  - to himself
  - toward himself
  lexicon: HALOT
  rationale: The preposition אֶל with the reflexive suffix can be rendered literally
    'to himself,' but in the idiom with 'set his heart' English 'on himself' best
    conveys self-directed attention or intention.
- source_word: לִבּוֹ
  chosen: his heart
  alternatives:
  - his mind
  lexicon: HALOT
  rationale: Hebrew 'heart' commonly denotes inner intention, will, or attention.
    'Heart' should be retained in the main text to preserve the Hebrew anthropological
    expression.
- source_word: רוּחוֹ
  chosen: his spirit
  alternatives:
  - his wind
  - his breath
  lexicon: HALOT
  rationale: רוּחַ can mean spirit, wind, or breath. Here, paired with נִשְׁמָה and
    referring to the life-principle God could withdraw, 'spirit' preserves the distinction
    between the two terms while fitting the context.
- source_word: וְנִשְׁמָתוֹ
  chosen: and his breath
  alternatives:
  - and his life-breath
  - and his soul
  lexicon: HALOT
  rationale: נְשָׁמָה often denotes breath or life-breath. Rendering it 'breath' alongside
    רוּחַ as 'spirit' preserves the Hebrew parallelism without collapsing the terms
    into one English gloss.
- source_word: יֶאֱסֹף
  chosen: gather
  alternatives:
  - collect
  - withdraw
  - take back
  lexicon: HALOT
  rationale: אָסַף literally means 'gather/collect.' In context it implies withdrawing
    life from creatures, but 'gather' keeps the lexical image of the Hebrew; the implication
    is completed by the following verse.
