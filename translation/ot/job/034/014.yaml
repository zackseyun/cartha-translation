theological_decisions:
- issue: Referent of the pronouns
  chosen_reading: All third-person masculine singular pronouns refer to God.
  alternative_readings:
  - The first אֵלָיו could be taken less reflexively in English, but context still
    points to God as both subject and object.
  rationale: In Elihu's argument, the point is God's sovereign right over the life
    he gives. The verse describes a hypothetical act of God turning his attention
    to himself and reclaiming the life-principle he has imparted. The translation
    uses 'himself' to make the reflexive sense clear in English.
  doctrine_reference: Preserve theological tension rather than resolve it; here the
    context sufficiently identifies the referent, so explicit reflexive English is
    warranted.
