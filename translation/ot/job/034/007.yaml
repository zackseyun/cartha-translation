id: JOB.34.7
reference: Job 34:7
source:
  edition: WLC
  text: מִי גֶ֥בֶר כְּ/אִיּ֑וֹב יִֽשְׁתֶּה לַּ֥עַג כַּ/מָּֽיִם־־׃
translation:
  text: What man is like Job, who drinks mockery like water?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Who is a man like Job, who drinks scorn like water?'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִי
  chosen: What
  alternatives:
  - Who
  lexicon: HALOT
  rationale: Introduces a rhetorical question. English can use either 'Who' or 'What
    man'; 'What man' better reflects the idiomatic force of astonishment before גבר.
- source_word: גֶבֶר
  chosen: man
  alternatives:
  - strong man
  - warrior
  lexicon: HALOT
  rationale: גבר commonly denotes a man, often with nuance of strength or vigor. Here
    the basic 'man' fits the rhetorical comparison without overtranslating a nuance
    not explicit in context. This also follows the gender-accurate principle, since
    the Hebrew is singular masculine and refers specifically to Job.
- source_word: כְּאִיּוֹב
  chosen: like Job
  alternatives:
  - as Job
  lexicon: HALOT
  rationale: The prefixed כ marks comparison. 'Like Job' is the most natural modern
    English rendering while preserving the simile.
- source_word: יִשְׁתֶּה
  chosen: drinks
  alternatives:
  - would drink
  - can drink
  lexicon: HALOT
  rationale: Imperfect verb in a rhetorical characterization; present-tense English
    best conveys habitual or characteristic action in context.
- source_word: לַּעַג
  chosen: mockery
  alternatives:
  - scorn
  - derision
  lexicon: HALOT
  rationale: The noun denotes derision or mocking speech. 'Mockery' is clear modern
    English and fits the metaphor of imbibing contemptuous speech. 'Scorn' is possible
    but can sound more abstract than the verbal ridicule implied here.
- source_word: כַּמָּיִם
  chosen: like water
  alternatives:
  - as water
  lexicon: HALOT
  rationale: Standard comparative expression. 'Like water' is idiomatic modern English
    and preserves the vivid metaphor of something consumed freely and abundantly.
