id: JOB.12.21
reference: Job 12:21
source:
  edition: WLC
  text: שׁוֹפֵ֣ךְ בּ֭וּז עַל נְדִיבִ֑ים וּ/מְזִ֖יחַ אֲפִיקִ֣ים רִפָּֽה־׃
translation:
  text: He pours contempt on nobles, and loosens the belt of the strong.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the mighty' or 'powerful ones' for 'the strong.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'loosens the belt'; the image suggests removing strength, readiness,
      or authority.
    reason: cultural_note
lexical_decisions:
- source_word: שׁוֹפֵךְ
  chosen: pours
  alternatives:
  - casts
  - spills
  lexicon: HALOT
  rationale: The participle of שׁפך commonly means 'pour out.' In English, 'pours'
    preserves the vivid metaphor and works naturally with 'contempt' as the object.
- source_word: בּוּז
  chosen: contempt
  alternatives:
  - scorn
  - disgrace
  lexicon: HALOT
  rationale: בּוּז denotes contempt or scorn. 'Contempt' fits the idiom 'pour contempt
    on' in English and preserves the force of public humiliation.
- source_word: נְדִיבִים
  chosen: nobles
  alternatives:
  - princes
  - generous ones
  lexicon: HALOT
  rationale: Though the noun can denote the noble or princely class and is etymologically
    related to willingness/generosity, in this context of social reversal it refers
    to high-status leaders. 'Nobles' is broad, natural English and avoids over-specifying
    monarchy with 'princes.'
- source_word: מְזִיחַ
  chosen: belt
  alternatives:
  - girdle
  - waistband
  lexicon: HALOT
  rationale: The noun is traditionally understood as a belt or girding band. Since
    the phrase concerns disabling strength or preparedness, 'belt' is the clearest
    modern English rendering.
- source_word: אֲפִיקִים
  chosen: the strong
  alternatives:
  - the mighty
  - powerful ones
  lexicon: HALOT
  rationale: Although the noun can have a broader semantic range, here it refers metaphorically
    to powerful people. 'The strong' is concise and fits the parallel with 'nobles.'
- source_word: רִפָּה
  chosen: loosens
  alternatives:
  - slackens
  - makes loose
  lexicon: HALOT
  rationale: From רפה, 'to loosen' or 'let go slack.' 'Loosens' gives the image of
    removing strength or readiness by loosening the belt.
