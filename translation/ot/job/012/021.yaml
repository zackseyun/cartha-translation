theological_decisions:
- issue: Metaphorical image of divine humiliation and disempowerment
  chosen_reading: Render the second colon as 'loosens the belt of the strong' rather
    than interpretively expanding it to 'disarms the mighty' in the main text.
  alternative_readings:
  - disarms the mighty
  - deprives the strong of strength
  rationale: The verse uses concrete imagery to describe God's reversal of human status
    and power. Preserving the metaphor maintains the poetic force and avoids importing
    a narrower military interpretation into the main text.
  doctrine_reference: Translation philosophy §1, §3, §6
