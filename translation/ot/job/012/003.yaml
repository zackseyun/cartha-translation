id: JOB.12.3
reference: Job 12:3
source:
  edition: WLC
  text: גַּם לִ֤/י לֵבָ֨ב כְּֽמוֹ/כֶ֗ם לֹא נֹפֵ֣ל אָנֹכִ֣י מִ/כֶּ֑ם וְ/אֶת מִי אֵ֥ין
    כְּמוֹ אֵֽלֶּה־׀־־־־׃
translation:
  text: I too have a mind like you; I am not inferior to you. And who does not know
    such things as these?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'I too have a heart like you.' Here 'heart' refers to
      the faculty of understanding or thought.
    reason: lexical_alternative
lexical_decisions:
- source_word: גַּם
  chosen: too
  alternatives:
  - also
  - indeed
  lexicon: HALOT
  rationale: 'Marks addition/emphasis: Job asserts that he also possesses the same
    faculty as his friends. ''Too'' is natural in English in this self-comparative
    context.'
- source_word: לִי לֵבָב
  chosen: I have a mind
  alternatives:
  - I have a heart
  - I too have understanding
  lexicon: HALOT
  rationale: לֵבָב literally means 'heart,' but in Hebrew anthropology it commonly
    denotes the inner faculty of thought and understanding. In this context of intellectual
    parity with his friends, 'mind' best conveys the sense in readable modern English
    without wooden literalism.
- source_word: כְּמוֹכֶם
  chosen: like you
  alternatives:
  - as you do
  - like yours
  lexicon: HALOT
  rationale: Expresses comparison with Job's interlocutors. 'Like you' is concise
    and idiomatic.
- source_word: לֹא נֹפֵל אָנֹכִי מִכֶּם
  chosen: I am not inferior to you
  alternatives:
  - I do not fall below you
  - I am not less than you
  lexicon: HALOT
  rationale: The idiom with נפל plus מן conveys not being beneath or inferior to someone.
    'I am not inferior to you' communicates the comparative force clearly in modern
    English.
- source_word: וְאֶת מִי אֵין כְּמוֹ אֵלֶּה
  chosen: And who does not know such things as these?
  alternatives:
  - And with whom are there not things like these?
  - And who is there that does not have the like of these?
  lexicon: HALOT
  rationale: This clause is idiomatic and somewhat elliptical. In context Job is dismissing
    his friends' sayings as commonplace, not profound. Rendering the sense as 'who
    does not know such things as these?' captures the rhetorical force better than
    a more opaque literal reproduction.
