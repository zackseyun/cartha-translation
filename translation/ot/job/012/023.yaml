id: JOB.12.23
reference: Job 12:23
source:
  edition: WLC
  text: מַשְׂגִּ֣יא לַ֭/גּוֹיִם וַֽ/יְאַבְּדֵ֑/ם שֹׁטֵ֥חַ לַ֝/גּוֹיִ֗ם וַ/יַּנְחֵֽ/ם׃
translation:
  text: He makes nations great, and he destroys them; he spreads out nations, and
    he leads them away.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'He enlarges nations, and he guides them.' The Hebrew verbs can be understood
      as expansion followed by guidance; the main text reflects the likely reversal
      parallelism in context.
    reason: alternative_reading
lexical_decisions:
- source_word: מַשְׂגִּיא
  chosen: makes great
  alternatives:
  - magnifies
  - increases
  - makes prosper
  lexicon: HALOT
  rationale: The Hiphil participle of שׂגא conveys causing to become great or increasing.
    'Makes great' is natural English and preserves the causative sense without over-specifying
    prosperity.
- source_word: לַגּוֹיִם
  chosen: nations
  alternatives:
  - peoples
  - Gentile nations
  lexicon: HALOT
  rationale: גּוֹיִם here refers broadly to political peoples or nations, not specifically
    non-Israelites in contrast to Israel. 'Nations' is the standard contextual rendering.
- source_word: וַיְאַבְּדֵם
  chosen: he destroys them
  alternatives:
  - he causes them to perish
  - he wipes them out
  lexicon: HALOT
  rationale: From אבד in the Hiphil/Qal causative sense of causing to perish or destroying.
    'Destroys them' is concise and fits the parallelism with making nations great.
- source_word: שֹׁטֵחַ
  chosen: spreads out
  alternatives:
  - enlarges
  - extends
  - scatters
  lexicon: HALOT
  rationale: The participle from שטח literally suggests spreading out or extending.
    In context of nations, it likely refers to territorial expansion or broadening
    influence. 'Spreads out' preserves the image while remaining intelligible.
- source_word: וַיַּנְחֵם
  chosen: he leads them away
  alternatives:
  - he guides them
  - he leads them
  - he carries them off
  lexicon: HALOT
  rationale: From נחה, commonly 'lead' or 'guide.' In this context, paired with the
    reversal of national expansion, the sense is not benevolent guidance but God's
    directing nations onward or away. 'Leads them away' captures the movement and
    the likely ironic reversal in the parallelism.
