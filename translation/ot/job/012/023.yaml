theological_decisions:
- issue: Interpretation of the second colon's national movement
  chosen_reading: The verse describes God's sovereign expansion of nations followed
    by his directing/removing them, not necessarily benevolent guidance.
  alternative_readings:
  - He enlarges nations and then guides them
  - He scatters nations and then leads them
  rationale: The verse emphasizes divine sovereignty over the rise and fall of nations.
    The verb נחה can be positive ('guide'), but in this poetic parallel with destruction
    and expansion/reversal, 'leads them away' better preserves the tension and avoids
    importing a favorable nuance the text does not require.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
