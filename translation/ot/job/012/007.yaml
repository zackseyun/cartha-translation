id: JOB.12.7
reference: Job 12:7
source:
  edition: WLC
  text: וְֽ/אוּלָ֗ם שְׁאַל נָ֣א בְהֵמ֣וֹת וְ/תֹרֶ֑/ךָּ וְ/ע֥וֹף הַ֝/שָּׁמַ֗יִם וְ/יַגֶּד
    לָֽ/ךְ־־׃
translation:
  text: But ask the animals, please, and they will teach you, and the birds of the
    heavens, and they will tell you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the birds of the sky.' The Hebrew literally says 'the birds of the heavens.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאוּלָם
  chosen: But
  alternatives:
  - Yet
  - However
  lexicon: HALOT
  rationale: Marks a contrastive turn in Job's speech. 'But' is the most natural concise
    English adversative here.
- source_word: שְׁאַל נָא
  chosen: ask ... please
  alternatives:
  - ask now
  - just ask
  lexicon: HALOT
  rationale: The imperative שְׁאַל means 'ask,' and נָא adds entreaty or urgency rather
    than strict temporal 'now.' Rendering it as 'please' preserves the particle's
    pragmatic force in readable modern English.
- source_word: בְהֵמוֹת
  chosen: the animals
  alternatives:
  - the beasts
  - the cattle
  lexicon: HALOT
  rationale: Here the term refers broadly to land animals, not specifically livestock.
    'Animals' is clear modern English and fits the parallel with birds.
- source_word: וְתֹרֶךָּ
  chosen: and they will teach you
  alternatives:
  - and it will teach you
  - and instruct you
  lexicon: HALOT
  rationale: 'From ירה in the Hiphil, ''teach/instruct.'' Although the verb form is
    morphologically feminine singular agreeing with a collective noun, idiomatic English
    treats ''animals'' as plural: ''they will teach you.'' ''Teach'' is slightly more
    direct and natural than ''instruct'' here.'
- source_word: וְעוֹף הַשָּׁמַיִם
  chosen: and the birds of the heavens
  alternatives:
  - and the birds of the sky
  - and the birds of heaven
  lexicon: HALOT
  rationale: עוֹף denotes flying creatures/birds; in this context 'birds' is the natural
    English choice. 'Of the heavens' closely reflects the Hebrew genitive הַשָּׁמַיִם
    while remaining understandable; it also preserves the elevated poetic register.
- source_word: וְיַגֶּד לָךְ
  chosen: and they will tell you
  alternatives:
  - and it will tell you
  - and declare to you
  lexicon: HALOT
  rationale: נגד in the Hiphil means 'tell, declare, make known.' Because the subject
    is a collective expressed in English as plural ('birds'), 'they will tell you'
    is the most idiomatic rendering. 'Declare' is possible but sounds stiffer than
    the context requires.
