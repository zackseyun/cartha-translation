id: JOB.12.1
reference: Job 12:1
source:
  edition: WLC
  text: וַ/יַּ֥עַן אִיּ֗וֹב וַ/יֹּאמַֽר׃
translation:
  text: 'Then Job answered and said:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "And Job answered and said."
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַן
  chosen: answered
  alternatives:
  - responded
  lexicon: HALOT
  rationale: From ענה in the narrative wayyiqtol, commonly introducing a spoken reply.
    'Answered' preserves the conventional dialog formula and fits the immediate context
    of Job replying to the previous speech.
- source_word: אִיּוֹב
  chosen: Job
  rationale: Personal name transliterated by standard English convention, in keeping
    with the translation philosophy to transliterate names rather than translate them.
- source_word: וַיֹּאמַר
  chosen: and said
  alternatives:
  - and spoke
  lexicon: HALOT
  rationale: From אמר in the wayyiqtol, the standard verb of speaking. 'And said'
    preserves the Hebrew narrative formula without unnecessary paraphrase.
- source_word: וַ
  chosen: Then
  alternatives:
  - And
  rationale: The prefixed waw on the opening verb marks narrative sequence. 'Then'
    gives natural modern English while still reflecting the progression of the discourse;
    a simple 'And' is possible but less idiomatic in English at the start of a reply
    formula.
