id: JOB.12.2
reference: Job 12:2
source:
  edition: WLC
  text: אָ֭מְנָם כִּ֣י אַתֶּם עָ֑ם וְ֝/עִמָּ/כֶ֗ם תָּמ֥וּת חָכְמָֽה־׃
translation:
  text: No doubt you are the people, and wisdom will die with you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Surely you are the people, and with you wisdom will perish.' The line
      is commonly understood as irony directed at Job's friends.
    reason: lexical_alternative
lexical_decisions:
- source_word: אָמְנָם
  chosen: No doubt
  alternatives:
  - Surely
  - Indeed
  - Truly
  lexicon: HALOT
  rationale: Introduces Job's ironic concession. 'No doubt' captures the adverbial
    force in natural English while preserving the sarcasm of the line.
- source_word: כִּי
  chosen: —
  alternatives:
  - that
  - indeed
  - surely
  lexicon: HALOT
  rationale: Here כִּי functions idiomatically with אָמְנָם to intensify the assertion
    rather than requiring a separate English word. Its force is absorbed into 'No
    doubt' for readable modern English.
- source_word: אַתֶּם
  chosen: you
  lexicon: HALOT
  rationale: Second person masculine plural pronoun, directly addressing Job's friends.
- source_word: עָם
  chosen: the people
  alternatives:
  - people
  - the nation
  lexicon: HALOT
  rationale: 'With the pronoun, the phrase is idiomatic and sarcastic: ''you are the
    people,'' meaning ''you think you alone are the true people / the whole of humanity
    worth counting.'' The definite form in English best reflects the idiom.'
- source_word: וְעִמָּכֶם
  chosen: with you
  alternatives:
  - along with you
  lexicon: HALOT
  rationale: Straightforward prepositional phrase indicating accompaniment; paired
    with the following verb to express that wisdom would perish when they do.
- source_word: תָּמוּת
  chosen: will die
  alternatives:
  - will perish
  - will come to an end
  lexicon: HALOT
  rationale: Qal imperfect 3fs from מות, agreeing with the feminine noun 'wisdom.'
    'Will die' is the most direct and vivid rendering and preserves Job's biting irony.
- source_word: חָכְמָה
  chosen: wisdom
  lexicon: HALOT
  rationale: Standard rendering for חָכְמָה. In context it refers to wisdom as a quality
    or possession that Job's friends implicitly claim to monopolize.
