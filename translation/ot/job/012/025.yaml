theological_decisions:
- issue: Implicit subject of וַיַּתְעֵם
  chosen_reading: he makes them stagger
  alternative_readings:
  - they stagger
  rationale: The verb form is 3ms with 3mp object suffix, so the Hebrew points to
    an implicit singular subject ('he'), which in the larger context is God. Retaining
    'he' preserves the grammar and the theological point that God is the one who overturns
    rulers' wisdom.
  doctrine_reference: Translation philosophy §1, §3, §5
