id: JOB.12.25
reference: Job 12:25
source:
  edition: WLC
  text: יְמַֽשְׁשׁוּ חֹ֥שֶׁךְ וְ/לֹא א֑וֹר וַ֝/יַּתְעֵ֗/ם כַּ/שִּׁכּֽוֹר־־׃
translation:
  text: They grope in darkness, without light; he makes them stagger like a drunkard.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'he causes them to wander.' The Hebrew verb can denote wandering or going
      astray; here the context and the comparison to a drunkard support 'makes them
      stagger.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְמַשְׁשׁוּ
  chosen: they grope
  alternatives:
  - they feel about
  - they grope around
  lexicon: HALOT
  rationale: The Piel imperfect of משש conveys feeling about by touch, especially
    when vision is absent. 'Grope' is idiomatic English in this context and preserves
    the image of disoriented searching.
- source_word: חֹשֶׁךְ
  chosen: darkness
  alternatives:
  - gloom
  lexicon: HALOT
  rationale: Standard rendering for חושׁךְ. 'Darkness' fits both literal and metaphorical
    senses here without overinterpreting.
- source_word: וְלֹא אוֹר
  chosen: without light
  alternatives:
  - and not light
  - but no light
  lexicon: HALOT
  rationale: Literally 'and not light,' but English idiom favors 'without light.'
    This preserves the stark contrast while reading naturally.
- source_word: וַיַּתְעֵם
  chosen: he makes them stagger
  alternatives:
  - he causes them to wander
  - he leads them astray
  lexicon: HALOT
  rationale: From תעה, 'to wander/err.' In this parallel with groping in darkness
    and the simile of a drunkard, the causative sense is best brought out as disoriented
    staggering rather than merely intellectual error.
- source_word: -ם (suffix in וַיַּתְעֵם)
  chosen: them
  lexicon: HALOT
  rationale: The 3mp pronominal suffix refers back to the plural objects in context,
    so the English object is explicitly rendered as 'them.'
- source_word: כַּשִּׁכּוֹר
  chosen: like a drunkard
  alternatives:
  - like a drunken man
  - like a drunk
  lexicon: HALOT
  rationale: The singular adjective/noun denotes a drunken person. 'Drunkard' preserves
    the comparison in dignified modern English and avoids colloquial flattening.
