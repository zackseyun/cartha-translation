id: JOB.12.8
reference: Job 12:8
source:
  edition: WLC
  text: א֤וֹ שִׂ֣יחַ לָ/אָ֣רֶץ וְ/תֹרֶ֑/ךָּ וִֽ/יסַפְּר֥וּ לְ֝/ךָ֗ דְּגֵ֣י הַ/יָּֽם׃
translation:
  text: Or speak to the earth, and it will teach you; and the fish of the sea will
    tell you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to the land'; Hebrew אֶרֶץ can mean either 'earth' or 'land.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew literally, 'and she will teach you,' with 'earth' grammatically feminine.
    reason: lexical_alternative
lexical_decisions:
- source_word: א֤וֹ
  chosen: Or
  alternatives:
  - Or else
  - Or indeed
  lexicon: HALOT
  rationale: Disjunctive particle continuing the sequence of appeals in the context
    ('ask... or speak...'). 'Or' is the most natural and sufficiently formal English
    connector.
- source_word: שִׂ֣יחַ
  chosen: speak
  alternatives:
  - meditate
  - complain
  - consider
  lexicon: HALOT
  rationale: In this imperative context with לָאָרֶץ ('to the earth'), the verb means
    to speak/address rather than meditate internally. 'Speak' fits the parallel with
    asking beasts and birds in the surrounding verses.
- source_word: לָ/אָ֣רֶץ
  chosen: to the earth
  alternatives:
  - to the land
  lexicon: HALOT
  rationale: אֶרֶץ can mean 'earth' or 'land.' Here the cosmic scope of the surrounding
    examples (beasts, birds, fish of the sea) favors 'earth' rather than a specific
    land.
- source_word: וְ/תֹרֶ֑/ךָּ
  chosen: and it will teach you
  alternatives:
  - and she will teach you
  - and it will instruct you
  lexicon: HALOT
  rationale: The verb ירה in Hiphil commonly means 'teach/instruct.' English uses
    'it' for 'earth' naturally, though the Hebrew verb is feminine singular agreeing
    with אֶרֶץ. 'Teach' is more idiomatic here than 'instruct' and preserves the personification.
- source_word: וִֽ/יסַפְּר֥וּ לְ֝/ךָ֗
  chosen: and ... will tell you
  alternatives:
  - and ... will recount to you
  - and ... will declare to you
  lexicon: HALOT
  rationale: ספר in the Piel often means recount, tell, declare. In this poetic context,
    'tell you' is clear modern English and matches the didactic parallelism.
- source_word: דְּגֵ֣י הַ/יָּֽם
  chosen: the fish of the sea
  alternatives:
  - the sea's fish
  - the fish of the ocean
  lexicon: HALOT
  rationale: Construct phrase rendered straightforwardly. 'Fish of the sea' preserves
    the Hebrew imagery and cadence better than more idiomatic but less formal alternatives.
