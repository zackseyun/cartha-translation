theological_decisions:
- issue: Anthropological terms נֶפֶשׁ and רוּחַ
  chosen_reading: Rendered as 'life' and 'breath' rather than 'soul' and 'spirit.'
  alternative_readings:
  - '''soul'' and ''spirit'''
  rationale: The verse emphasizes God's sovereign hold over the life principle of
    animals and humans. Rendering these terms more concretely avoids importing a sharper
    body-soul dualism than the Hebrew here requires and preserves the poetic parallelism.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Preserve theological tension rather than resolve it.'
- issue: Generic human reference in אִישׁ
  chosen_reading: Rendered collectively as 'mankind.'
  alternative_readings:
  - '''man'''
  - '''men'''
  - '''every human being'''
  rationale: The Hebrew is grammatically masculine but generic/collective in force.
    'Mankind' preserves the representative human sense in line with the gender-accurate
    policy while remaining readable.
  doctrine_reference: 'Translation philosophy: Gender-accurate over gender-neutral.'
