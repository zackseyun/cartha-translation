id: JOB.12.10
reference: Job 12:10
source:
  edition: WLC
  text: אֲשֶׁ֣ר בְּ֭/יָד/וֹ נֶ֣פֶשׁ כָּל חָ֑י וְ֝/ר֗וּחַ כָּל בְּשַׂר אִֽישׁ־־־׃
translation:
  text: In whose hand is the life of every living thing, and the breath of all mankind.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the soul of every living thing, and the spirit of all human flesh.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲשֶׁר
  chosen: In whose
  alternatives:
  - whose
  - with whom is
  lexicon: HALOT
  rationale: Relative particle introducing a clause about God; rendered idiomatically
    with the following prepositional phrase as 'In whose' to produce natural English
    while preserving the relational sense.
- source_word: בְּיָדוֹ
  chosen: in whose hand
  alternatives:
  - in his hand
  - by whose hand
  lexicon: HALOT
  rationale: Literal prepositional phrase 'in his hand,' a Hebrew idiom for power
    or control. 'In whose hand' preserves the metaphor and links smoothly to the relative
    particle.
- source_word: נֶפֶשׁ
  chosen: life
  alternatives:
  - soul
  - life-breath
  - self
  lexicon: HALOT
  rationale: Here נֶפֶשׁ refers to the animating life of creatures rather than the
    immaterial 'soul' in a narrower theological sense. 'Life' best fits the parallel
    with 'breath' and avoids importing later anthropological distinctions.
- source_word: כָּל חָי
  chosen: every living thing
  alternatives:
  - every living creature
  - all that lives
  lexicon: HALOT
  rationale: The phrase is comprehensive and non-human in scope at this point. 'Every
    living thing' is natural English and preserves the universal sense.
- source_word: וְרוּחַ
  chosen: and the breath
  alternatives:
  - and the spirit
  - and the wind
  lexicon: HALOT
  rationale: In this parallelism with נֶפֶשׁ and in relation to 'all flesh of man,'
    רוּחַ most naturally denotes breath/life-breath rather than 'Spirit' or 'wind.'
    'Breath' keeps the concrete anthropological sense.
- source_word: כָּל בְּשַׂר אִישׁ
  chosen: of all mankind
  alternatives:
  - of every human being
  - of all human flesh
  - of all men
  lexicon: HALOT
  rationale: בְּשַׂר אִישׁ literally combines 'flesh' and 'man' to denote humanity
    in its mortal creatureliness. 'All mankind' communicates the collective human
    reference clearly in modern English. The more literal 'all flesh of man' is possible
    but awkward; 'all men' is less clear in contemporary English as a generic.
