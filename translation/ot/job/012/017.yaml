id: JOB.12.17
reference: Job 12:17
source:
  edition: WLC
  text: מוֹלִ֣יךְ יוֹעֲצִ֣ים שׁוֹלָ֑ל וְֽ/שֹׁפְטִ֥ים יְהוֹלֵֽל׃
translation:
  text: He leads counselors away stripped, and he makes judges foolish.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'plundered' or 'despoiled'; the Hebrew may emphasize that counselors
      are led away in humiliation and dispossession.
    reason: lexical_alternative
lexical_decisions:
- source_word: מוֹלִיךְ
  chosen: leads away
  alternatives:
  - causes to go
  - drives away
  lexicon: HALOT
  rationale: Hiphil participle of הלך with causative sense, here functioning verbally
    in poetic description of God's ongoing action. 'Leads away' is idiomatic English
    and preserves the causative movement.
- source_word: יוֹעֲצִים
  chosen: counselors
  alternatives:
  - advisers
  lexicon: HALOT
  rationale: Plural participle/noun from יעץ, referring to those who give counsel.
    'Counselors' is natural modern English and fits the wisdom/political context.
- source_word: שׁוֹלָל
  chosen: stripped
  alternatives:
  - plundered
  - barefoot
  - as spoil
  lexicon: HALOT
  rationale: Adjectival form from שלל in a context of humiliation and dispossession.
    'Stripped' best conveys being despoiled and led off in defeat without over-specifying
    the exact manner. 'Barefoot' is a possible contextual nuance in some translations,
    but the broader sense of being despoiled is more lexically secure here.
- source_word: שֹׁפְטִים
  chosen: judges
  alternatives:
  - rulers
  lexicon: HALOT
  rationale: From שפט, ordinarily 'judges,' whether judicial or governing figures.
    'Judges' is the most direct rendering and preserves the parallel with 'counselors'
    as societal leaders.
- source_word: יְהוֹלֵל
  chosen: makes foolish
  alternatives:
  - makes mad
  - makes act foolishly
  lexicon: HALOT
  rationale: Piel imperfect of הלל (II), meaning to make foolish or irrational. 'Makes
    foolish' communicates the causative sense clearly in English and matches the parallel
    humiliation of leaders.
