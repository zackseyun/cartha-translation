id: JOB.12.4
reference: Job 12:4
source:
  edition: WLC
  text: שְׂחֹ֤ק לְ/רֵעֵ֨/הוּ אֶֽהְיֶ֗ה קֹרֵ֣א לֶ֭/אֱלוֹהַּ וַֽ/יַּעֲנֵ֑/הוּ שְׂ֝ח֗וֹק
    צַדִּ֥יק תָּמִֽים׀׃
translation:
  text: I am a laughingstock to my friend—one who called to God and he answered him—a
    laughingstock, a righteous and blameless man.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to his friend'; the Hebrew suffix may be read that way, though the context
      favors 'my friend' as Job speaks of his own companions.
    reason: alternative_reading
  - marker: b
    text: Or 'and he answered me'; the Hebrew form is third person object ('him'),
      but the referent is Job himself.
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׂחֹק
  chosen: a laughingstock
  alternatives:
  - mockery
  - an object of laughter
  - a joke
  lexicon: HALOT
  rationale: The noun denotes derision or laughter directed at someone. 'A laughingstock'
    captures the predicative force in idiomatic modern English better than the more
    abstract 'mockery.'
- source_word: לְרֵעֵהוּ
  chosen: to my friend
  alternatives:
  - to his friend
  - to a friend
  - for his neighbor
  lexicon: HALOT
  rationale: The consonantal text with suffix can be understood as 'to his friend,'
    but in context Job speaks in the first person about how he is regarded by his
    companions; 'to my friend' gives the most coherent sense in English. The alternative
    is preserved in a footnote because the suffix reference is interpretively significant.
- source_word: אֶהְיֶה
  chosen: I am
  alternatives:
  - I have become
  - I will be
  lexicon: HALOT
  rationale: Although formally imperfect, the verb here expresses Job's present state
    in context. English present tense communicates the lament naturally.
- source_word: קֹרֵא לֶאֱלוֹהַּ
  chosen: one who called to God
  alternatives:
  - calling to God
  - who calls on God
  lexicon: HALOT
  rationale: 'The participle with following wayyiqtol is best rendered relatively:
    ''one who called to God and he answered him.'' This preserves the sequence of
    appeal and divine response.'
- source_word: וַיַּעֲנֵהוּ
  chosen: and he answered him
  alternatives:
  - and he answered me
  lexicon: HALOT
  rationale: The most straightforward reading is that God answered the caller. English
    keeps the third-person object as in the Hebrew form, though the referent is Job
    himself. An alternative more explicit to the discourse is preserved in a footnote.
- source_word: צַדִּיק
  chosen: righteous
  alternatives:
  - just
  lexicon: HALOT
  rationale: '''Righteous'' is the standard rendering and fits wisdom-context moral
    integrity language.'
- source_word: תָּמִים
  chosen: blameless
  alternatives:
  - upright
  - whole
  - integrity-complete
  lexicon: HALOT
  rationale: In Job, תמים commonly describes moral integrity. 'Blameless' is idiomatic
    and echoes the book's characterization of Job without implying sinless perfection.
