theological_decisions:
- issue: Whether Job's self-description should imply sinless perfection
  chosen_reading: '''blameless'' as integrity language, not absolute perfection'
  alternative_readings:
  - '''perfect'' in older English'
  rationale: The Hebrew תמים in wisdom literature denotes wholeness/integrity. Rendering
    it 'blameless' preserves the moral claim without overstating it into absolute
    sinlessness.
  doctrine_reference: Translation philosophy §6; preserve the text's gravity without
    archaic wording
