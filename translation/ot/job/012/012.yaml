id: JOB.12.12
reference: Job 12:12
source:
  edition: WLC
  text: בִּֽ/ישִׁישִׁ֥ים חָכְמָ֑ה וְ/אֹ֖רֶךְ יָמִ֣ים תְּבוּנָֽה׃
translation:
  text: With the aged is wisdom, and with length of days, understanding.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Among the aged is wisdom.' The Hebrew preposition can express association
      or location.
    reason: lexical_alternative
  - marker: b
    text: Literally 'length of days'; that is, long life or many days.
    reason: lexical_alternative
lexical_decisions:
- source_word: בִּישִׁישִׁים
  chosen: With the aged
  alternatives:
  - Among the aged
  - In old men
  - With old age
  lexicon: HALOT
  rationale: 'The preposition ב plus יְשִׁישִׁים indicates association/location: wisdom
    is found ''with'' or ''among'' the aged. ''With the aged'' is concise, idiomatic,
    and preserves the proverbial parallelism. ''The aged'' avoids over-specifying
    male referents where the Hebrew plural can denote elderly persons generally.'
- source_word: חָכְמָה
  chosen: wisdom
  lexicon: HALOT
  rationale: Standard rendering for חָכְמָה in wisdom literature; it fits the proverbial
    claim about insight associated with age.
- source_word: וְאֹרֶךְ יָמִים
  chosen: and with length of days
  alternatives:
  - and with long life
  - and with many days
  lexicon: HALOT
  rationale: The construct phrase literally means 'length of days.' Retaining this
    more formal expression preserves the Hebrew idiom and poetic balance, while remaining
    understandable in English. 'Long life' is possible but slightly flattens the imagery.
- source_word: תְּבוּנָה
  chosen: understanding
  alternatives:
  - discernment
  - insight
  lexicon: HALOT
  rationale: תְּבוּנָה commonly denotes understanding or discernment. 'Understanding'
    pairs naturally with 'wisdom' and preserves the semantic distinction without sounding
    technical.
