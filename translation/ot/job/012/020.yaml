id: JOB.12.20
reference: Job 12:20
source:
  edition: WLC
  text: מֵסִ֣יר שָׂ֭פָה לְ/נֶאֱמָנִ֑ים וְ/טַ֖עַם זְקֵנִ֣ים יִקָּֽח׃
translation:
  text: He removes speech from the trusted, and takes away discernment from the elders.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'He removes the lip from the faithful'—that is, he deprives them of speech
      or eloquence.
    reason: lexical_alternative
  - marker: b
    text: Or 'judgment' or 'understanding' for 'discernment.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מֵסִיר
  chosen: removes
  alternatives:
  - turns aside
  - takes away
  lexicon: HALOT
  rationale: Hiphil participle of סור/סיר here has a causative sense of removing or
    taking away. 'Removes' is concise and fits the parallel with 'takes away' in the
    second colon without becoming overly repetitive.
- source_word: שָׂפָה
  chosen: speech
  alternatives:
  - lip
  - language
  - eloquence
  lexicon: HALOT
  rationale: Literally 'lip,' but in this context it functions metonymically for speech
    or the ability to speak wisely/persuasively. 'Speech' communicates the idiomatic
    sense in natural English while preserving the loss of verbal capacity.
- source_word: לְנֶאֱמָנִים
  chosen: from the trusted
  alternatives:
  - from the faithful
  - from those who are reliable
  - from trusted men
  lexicon: HALOT
  rationale: נֶאֱמָנִים can denote those who are faithful, reliable, or trusted. In
    this wisdom context, the point is that even dependable, respected people can be
    stripped of speech. 'The trusted' best captures the passive-social nuance in idiomatic
    English.
- source_word: טַעַם
  chosen: discernment
  alternatives:
  - judgment
  - sense
  - understanding
  lexicon: HALOT
  rationale: טַעַם often refers to taste literally, but figuratively to judgment,
    discretion, or discernment. 'Discernment' fits the wisdom setting and pairs well
    with elders as those expected to possess seasoned judgment.
- source_word: זְקֵנִים
  chosen: the elders
  alternatives:
  - old men
  - the aged
  lexicon: HALOT
  rationale: The term can mean old men or elders. In wisdom literature it often carries
    the sense of socially recognized older, experienced persons. 'The elders' preserves
    both age and status better than the more merely biological 'old men.'
- source_word: יִקָּח
  chosen: takes away
  alternatives:
  - takes
  - seizes
  - removes
  lexicon: HALOT
  rationale: לקח commonly means 'take'; in this parallel context the privative sense
    'takes away' is required in English to make explicit what Hebrew leaves implicit
    through context.
