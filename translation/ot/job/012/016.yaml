theological_decisions:
- issue: Divine relation to both the erring and the one causing error
  chosen_reading: Both are said to belong to God or be under his dominion, without
    specifying moral causation.
  alternative_readings:
  - God possesses knowledge of both
  - God controls both in providence
  - God is the source of both error and deception
  rationale: The verse states that both the one who goes astray and the one who leads
    astray are 'to him'/'his.' The translation preserves the text's strong claim of
    divine sovereignty while avoiding an interpretive expansion that would make God
    the direct moral author of deception, which the Hebrew does not explicitly say.
    'Belong to him' keeps the theological tension intact, in line with the translation
    philosophy.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
