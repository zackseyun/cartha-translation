id: JOB.12.16
reference: Job 12:16
source:
  edition: WLC
  text: עִ֭מּ/וֹ עֹ֣ז וְ/תֽוּשִׁיָּ֑ה ל֝֗/וֹ שֹׁגֵ֥ג וּ/מַשְׁגֶּֽה׃
translation:
  text: With him are strength and sound wisdom; the one who goes astray and the one
    who leads astray belong to him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''the deceived and the deceiver.'' The Hebrew participles can be rendered
      more compactly this way, but the main text preserves the verbal contrast: one
      goes astray, the other leads astray.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עִמּוֹ
  chosen: With him
  alternatives:
  - Beside him
  - In his possession
  lexicon: HALOT
  rationale: 'The preposition with pronominal suffix most naturally expresses possession
    or association here: strength and wisdom are with God, i.e., belong to him and
    are at his disposal. ''With him'' preserves the Hebrew idiom and fits the parallelism.'
- source_word: עֹז
  chosen: strength
  alternatives:
  - might
  lexicon: HALOT
  rationale: עֹז commonly denotes strength or might. 'Strength' is the more natural
    modern English choice here and pairs well with the following noun.
- source_word: תּוּשִׁיָּה
  chosen: sound wisdom
  alternatives:
  - wisdom
  - success
  - resourcefulness
  lexicon: HALOT
  rationale: In wisdom literature תּוּשִׁיָּה often carries the sense of effective
    wisdom, sound judgment, or practical insight. 'Sound wisdom' preserves that fuller
    nuance better than the flatter 'wisdom' and avoids the potentially misleading
    'success' in this context.
- source_word: לוֹ
  chosen: belong to him
  alternatives:
  - are his
  - are for him
  lexicon: HALOT
  rationale: The prefixed ל with pronominal suffix here marks possession/association
    in the second colon. Rendering it explicitly as 'belong to him' makes the Hebrew
    sense clear in English and mirrors the first colon's idea that these realities
    are under God's domain.
- source_word: שֹׁגֵג
  chosen: the one who goes astray
  alternatives:
  - the deceived one
  - the erring one
  lexicon: HALOT
  rationale: As a Qal participle from שׁגה, the term denotes one who errs, wanders,
    or goes astray. 'The one who goes astray' preserves the active/intransitive sense
    of the form better than 'the deceived one,' though the latter is a plausible contextual
    interpretation.
- source_word: מַשְׁגֶּה
  chosen: the one who leads astray
  alternatives:
  - the deceiver
  - the one who causes to err
  lexicon: HALOT
  rationale: As a Hiphil participle from the same root family, this term denotes one
    who causes another to err. 'The one who leads astray' keeps the verbal parallel
    with שֹׁגֵג and avoids importing more than the Hebrew states.
