id: JOB.12.14
reference: Job 12:14
source:
  edition: WLC
  text: הֵ֣ן יַ֭הֲרוֹס וְ/לֹ֣א יִבָּנֶ֑ה יִסְגֹּ֥ר עַל אִ֝֗ישׁ וְ/לֹ֣א יִפָּתֵֽחַ־׃
translation:
  text: Look, if he tears down, it cannot be rebuilt; if he shuts a man in, it cannot
    be opened.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Indeed' or 'Behold' for the opening particle.
    reason: lexical_alternative
  - marker: b
    text: Or 'if he shuts a man up' or 'confines a man.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֵן
  chosen: Look
  alternatives:
  - Behold
  - Indeed
  lexicon: HALOT
  rationale: Introduces an emphatic assertion or attention-getter. 'Look' preserves
    the force in readable modern English better than the more archaic 'Behold,' while
    retaining the demonstrative emphasis.
- source_word: יַהֲרוֹס
  chosen: tears down
  alternatives:
  - breaks down
  - demolishes
  - overthrows
  lexicon: HALOT
  rationale: The verb הרס commonly denotes pulling down or demolishing structures.
    'Tears down' is natural English and fits the following passive 'be rebuilt,' preserving
    the building imagery.
- source_word: וְלֹא יִבָּנֶה
  chosen: it cannot be rebuilt
  alternatives:
  - and it will not be rebuilt
  - and it is not rebuilt
  lexicon: HALOT
  rationale: The Niphal of בנה is passive/reflexive, 'be built/rebuilt.' In this context
    of divine action and resultant impossibility, English 'cannot be rebuilt' best
    conveys the force of irreversible outcome, more idiomatically than a bare future
    passive.
- source_word: יִסְגֹּר
  chosen: shuts ... in
  alternatives:
  - imprisons
  - confines
  - shuts up
  lexicon: HALOT
  rationale: סגר means 'shut, close, hand over, confine.' With עַל אִישׁ, the sense
    is of shutting someone in or confining him. 'Shuts ... in' preserves the concrete
    imagery without overinterpreting as formal imprisonment.
- source_word: עַל אִישׁ
  chosen: a man in
  alternatives:
  - upon a man
  - against a man
  - a person in
  lexicon: HALOT
  rationale: 'The preposition with סגר here yields the idiom of shutting someone in/against
    him. ''A man'' follows the gender-accurate policy for אִישׁ, which is singular
    masculine here; ''person'' would flatten the source''s form. English word order
    is adjusted for idiomatic expression: ''shuts a man in.'''
- source_word: וְלֹא יִפָּתֵחַ
  chosen: it cannot be opened
  alternatives:
  - and it will not be opened
  - and it cannot be released
  lexicon: HALOT
  rationale: The Niphal of פתח is passive, 'be opened.' The subject is implicit from
    the shutting image; English supplies 'it' naturally. 'Cannot be opened' matches
    the parallel with 'cannot be rebuilt' and conveys the sense of irreversible closure.
