theological_decisions:
- issue: Divine subject reference
  chosen_reading: he
  alternative_readings:
  - God
  - the LORD
  rationale: The Hebrew uses third-person singular verbs without an explicit divine
    name in this verse. Rendering the subject as 'he' preserves the discourse flow
    from the surrounding context, where Job is speaking of God, without importing
    a title not present in the verse itself.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; preserve what the source text explicitly states.'
