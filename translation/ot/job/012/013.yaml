theological_decisions:
- issue: Referent of the pronominal suffixes
  chosen_reading: The pronouns refer to God, continuing Job's description of divine
    wisdom and power.
  alternative_readings:
  - A more generic 'him' without explicit identification in the translation
  rationale: The immediate context speaks of God's sovereign wisdom and power. English
    retains 'him' rather than substituting 'God' to stay close to the Hebrew while
    allowing the context to identify the referent.
