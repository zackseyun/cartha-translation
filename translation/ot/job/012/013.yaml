id: JOB.12.13
reference: Job 12:13
source:
  edition: WLC
  text: עִ֭מּ/וֹ חָכְמָ֣ה וּ/גְבוּרָ֑ה ל֝֗/וֹ עֵצָ֥ה וּ/תְבוּנָֽה׃
translation:
  text: With him are wisdom and might; to him belong counsel and understanding.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'In him are wisdom and might; his are counsel and understanding.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עִמּוֹ
  chosen: With him
  alternatives:
  - In him
  - Beside him
  lexicon: HALOT
  rationale: The preposition עִם with pronominal suffix most naturally means 'with
    him,' expressing possession or association. In this poetic context it introduces
    qualities residing with God. 'In him' is possible in English but is less direct
    to the Hebrew preposition.
- source_word: חָכְמָה
  chosen: wisdom
  lexicon: HALOT
  rationale: Standard rendering for חָכְמָה, denoting wisdom in the sense of skillful
    insight or true understanding. No contextual pressure suggests a narrower gloss.
- source_word: וּגְבוּרָה
  chosen: and might
  alternatives:
  - and strength
  - and power
  lexicon: HALOT
  rationale: גְבוּרָה denotes strength, might, or power. 'Might' fits the elevated
    poetic parallelism and pairs well with 'wisdom' without sounding overly abstract.
- source_word: לוֹ
  chosen: to him belong
  alternatives:
  - his is
  - to him are
  lexicon: HALOT
  rationale: The preposition ל with suffix here marks possession in a verbless clause.
    'To him belong' makes the possessive force explicit and reads naturally in English
    while preserving the Hebrew sense.
- source_word: עֵצָה
  chosen: counsel
  alternatives:
  - plan
  - advice
  lexicon: HALOT
  rationale: עֵצָה often means counsel in the sense of deliberative wisdom or planning.
    'Counsel' best matches the elevated register and the pairing with 'understanding.'
- source_word: וּתְבוּנָה
  chosen: and understanding
  alternatives:
  - and insight
  - and discernment
  lexicon: HALOT
  rationale: תְבוּנָה denotes understanding, discernment, or insight. 'Understanding'
    preserves the common lexical pairing with wisdom/counsel language and suits the
    poetic balance of the verse.
