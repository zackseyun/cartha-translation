id: JOB.12.18
reference: Job 12:18
source:
  edition: WLC
  text: מוּסַ֣ר מְלָכִ֣ים פִּתֵּ֑חַ וַ/יֶּאְסֹ֥ר אֵ֝ז֗וֹר בְּ/מָתְנֵי/הֶֽם׃
translation:
  text: He loosens the bonds of kings and binds a belt around their waists.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'discipline of kings'; the Hebrew noun can mean 'discipline' or 'bond/fetter,'
      but 'bonds' best fits the parallel with 'binds a belt.'
    reason: lexical_alternative
  - marker: b
    text: 'The image may suggest humiliation or subjugation: God strips kings of power
      and binds them like common men or captives.'
    reason: cultural_note
lexical_decisions:
- source_word: מוּסַר
  chosen: bonds
  alternatives:
  - discipline
  - fetters
  - bond
  lexicon: HALOT
  rationale: 'The noun can denote discipline/chastening or a bond/fetter. In this
    context with kings and the following verb ''loosens,'' the concrete sense ''bonds/fetters''
    best fits the parallelism: God removes restraints from kings, then binds them
    with a belt. ''Bonds'' is natural English and preserves the image without over-specifying
    shackles.'
- source_word: פִּתֵּחַ
  chosen: loosens
  alternatives:
  - opens
  - releases
  lexicon: HALOT
  rationale: The verb literally means 'open' or 'loose.' With מוּסַר it idiomatically
    conveys loosening or releasing bonds. 'Loosens' preserves the physical metaphor
    better than the more interpretive 'releases.'
- source_word: מְלָכִים
  chosen: kings
  alternatives:
  - rulers
  lexicon: HALOT
  rationale: The ordinary sense is 'kings.' 'Rulers' would generalize beyond the Hebrew
    and is unnecessary here.
- source_word: וַיֶּאְסֹר
  chosen: binds
  alternatives:
  - girds
  - ties
  lexicon: HALOT
  rationale: The verb means 'bind' or 'tie.' 'Binds' matches the concrete imagery
    and balances 'loosens' in the first colon.
- source_word: אֵזוֹר
  chosen: belt
  alternatives:
  - waistcloth
  - girding belt
  - loincloth
  lexicon: HALOT
  rationale: The noun denotes a belt or girdle worn around the waist. 'Belt' is the
    clearest modern equivalent. Because the image may imply either preparing for servile
    labor or binding in humiliation, a more neutral term is preferable in the main
    text.
- source_word: בְּמָתְנֵיהֶם
  chosen: around their waists
  alternatives:
  - on their loins
  - at their hips
  lexicon: HALOT
  rationale: The phrase refers to the waist/loins. 'Around their waists' is readable
    modern English and accurately conveys the location without archaic diction.
