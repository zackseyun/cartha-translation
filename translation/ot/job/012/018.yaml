theological_decisions:
- issue: Interpretation of the verse's reversal imagery
  chosen_reading: 'The verse depicts God''s sovereignty in reversing the status of
    kings: he removes their restraints or authority and then binds them in a humbling
    way.'
  alternative_readings:
  - He frees kings from bonds and then girds them with strength for action.
  - He loosens the authority by which kings bind others and then binds the kings themselves.
  rationale: The Hebrew imagery is terse and metaphorical. The paired verbs 'loosens'
    and 'binds' strongly suggest reversal under divine sovereignty. The translation
    keeps the imagery literal rather than resolving the metaphor into a single interpretive
    paraphrase.
  doctrine_reference: Preserve theological tension rather than resolve it.
