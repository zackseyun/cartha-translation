id: JOB.12.6
reference: Job 12:6
source:
  edition: WLC
  text: יִשְׁלָ֤יוּ אֹֽהָלִ֨ים לְ/שֹׁ֥דְדִ֗ים וּֽ֭/בַטֻּחוֹת לְ/מַרְגִּ֣יזֵי אֵ֑ל
    לַ/אֲשֶׁ֤ר הֵבִ֖יא אֱל֣וֹהַּ בְּ/יָדֽ/וֹ׀׃
translation:
  text: The tents of destroyers are at ease, and those who provoke God are secure—those
    whose god brings into their hand.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'those whom God brings into his hand,' or 'to whom God brings into their
      hand.' The Hebrew of the final clause is difficult and may refer either to the
      true God's providence or, ironically, to the wicked person's own power as his
      'god.'
    reason: alternative_reading
lexical_decisions:
- source_word: יִשְׁלָיוּ
  chosen: are at ease
  alternatives:
  - prosper
  - are undisturbed
  - live securely
  lexicon: HALOT
  rationale: From שלה, conveying quiet ease or tranquility rather than merely material
    prosperity. 'Are at ease' preserves the ironic moral contrast in context.
- source_word: אֹהָלִים
  chosen: tents
  alternatives:
  - dwellings
  - homes
  lexicon: HALOT
  rationale: Literal 'tents' is retained; in wisdom poetry it can stand metonymically
    for households or habitations, but the concrete image is still natural in English.
- source_word: לְשֹׁדְדִים
  chosen: of destroyers
  alternatives:
  - for plunderers
  - of robbers
  - of marauders
  lexicon: HALOT
  rationale: The lamed here is taken as marking possession/reference with 'tents of
    destroyers.' The participial noun denotes violent despoilers; 'destroyers' is
    broad enough to include plundering violence without narrowing to theft alone.
- source_word: וּבַטֻּחוֹת
  chosen: are secure
  alternatives:
  - are safe
  - are confident
  - are carefree
  lexicon: HALOT
  rationale: Predicate adjective/noun from בטח, parallel to 'are at ease.' 'Are secure'
    fits the poetic parallelism and avoids overreading subjective confidence alone.
- source_word: לְמַרְגִּיזֵי אֵל
  chosen: those who provoke God
  alternatives:
  - those who anger God
  - those who make God tremble
  lexicon: HALOT
  rationale: The Hiphil participle of רגז here is best understood causatively as provoking
    or enraging God. 'Provoke God' is idiomatic and preserves the offense against
    God.
- source_word: אֵל
  chosen: God
  alternatives:
  - Mighty One
  lexicon: HALOT
  rationale: In context this is the common divine title, best rendered simply 'God'
    in readable English.
- source_word: לַאֲשֶׁר
  chosen: those whose
  alternatives:
  - to whom
  - for whom
  - he whose
  lexicon: HALOT
  rationale: 'The phrase is syntactically difficult. Here it is taken as introducing
    a relative clause further describing the secure wicked: ''those whose god brings
    into their hand.'' This yields coherent sense in context.'
- source_word: הֵבִיא אֱלוֹהַּ בְּיָדוֹ
  chosen: whose god brings into their hand
  alternatives:
  - whom God brings into his hand
  - to whom God brings abundance
  - who have their god in their hand
  lexicon: HALOT
  rationale: This clause is notoriously difficult. The chosen rendering takes אֱלוֹהַּ
    as the subject ('god') and בְּיָדוֹ idiomatically as 'into their hand,' expressing
    possession/power. In context Job is describing the impious as secure, even those
    who treat power as their god. Because the Hebrew permits other construals, alternatives
    are preserved in a footnote.
