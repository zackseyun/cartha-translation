theological_decisions:
- issue: Referent of אֱלוֹהַּ in the final clause
  chosen_reading: lowercase 'god' referring to the wicked person's object of trust/power
  alternative_readings:
  - '''God'' as the true God: ''those whom God brings into his hand'''
  - '''God'' as giver: ''to whom God brings [something] into his hand'''
  rationale: The immediate context emphasizes the prosperity and security of the wicked,
    and the final clause likely intensifies their impiety rather than affirming divine
    favor straightforwardly. Rendering 'god' lowercase captures the likely ironic
    sense that their own power functions as their god. Because the syntax is ambiguous
    and interpreters differ, alternatives are preserved in a footnote rather than
    suppressed.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
