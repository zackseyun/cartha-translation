id: JOB.12.9
reference: Job 12:9
source:
  edition: WLC
  text: מִ֭י לֹא יָדַ֣ע בְּ/כָל אֵ֑לֶּה כִּ֥י יַד יְ֝הוָה עָ֣שְׂתָה זֹּֽאת־־־׃
translation:
  text: Who among all these does not know that the hand of the LORD has done this?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''YHWH''; traditionally rendered ''the LORD.'''
    reason: alternative_reading
lexical_decisions:
- source_word: מִי
  chosen: Who
  alternatives:
  - Who among
  lexicon: HALOT
  rationale: Interrogative pronoun introducing a rhetorical question. English 'Who'
    preserves the direct force of the Hebrew.
- source_word: לֹא
  chosen: does not
  alternatives:
  - has not
  lexicon: HALOT
  rationale: Negation paired with the perfect verb in a rhetorical question is best
    rendered in idiomatic present English as 'does not' rather than a stiffer past-perfect
    sense.
- source_word: יָדַע
  chosen: know
  alternatives:
  - has known
  - understand
  lexicon: HALOT
  rationale: The verb ידע commonly means 'know.' In this rhetorical context, simple
    present 'know' communicates general recognition rather than a completed past event.
- source_word: בְּ/כָל אֵלֶּה
  chosen: among all these
  alternatives:
  - by all these
  - from all these
  - in all these
  lexicon: HALOT
  rationale: 'The preposition ב with ''all these'' here is idiomatic in a partitive/distributive
    sense: ''among all these'' or ''of all these.'' Given the preceding context about
    beasts, birds, earth, and fish, ''among all these'' is natural English and fits
    the rhetorical question.'
- source_word: כִּי
  chosen: that
  alternatives:
  - for
  - because
  lexicon: HALOT
  rationale: Here כִּי introduces the content of what is known, so 'that' is preferable
    to causal renderings like 'for' or 'because.'
- source_word: יַד
  chosen: the hand
  alternatives:
  - the power
  lexicon: HALOT
  rationale: Hebrew 'hand' is retained literally because the anthropomorphic idiom
    is clear and common in English biblical style, while also conveying agency and
    power.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name יְהוָה
    is 'the LORD.'
- source_word: עָשְׂתָה
  chosen: has done
  alternatives:
  - made
  - has made
  - did
  lexicon: HALOT
  rationale: The verb עשה is broad ('do, make'). In this context of divine agency
    behind what is observed, 'has done' best matches the demonstrative 'this' and
    the rhetorical assertion. The English present perfect reflects the Hebrew perfect
    naturally.
- source_word: זֹּאת
  chosen: this
  alternatives:
  - these things
  lexicon: HALOT
  rationale: Singular demonstrative feminine, referring collectively to the matter
    under discussion. 'This' is the most direct rendering; 'these things' would over-interpret
    the singular form.
