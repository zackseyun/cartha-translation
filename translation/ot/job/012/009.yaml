- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse names Israel's covenant God explicitly. Following the project's
    doctrine for contested terms, the tetragrammaton is rendered 'the LORD' in the
    main text, while alternatives may be preserved in a footnote.
