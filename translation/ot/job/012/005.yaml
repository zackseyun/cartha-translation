id: JOB.12.5
reference: Job 12:5
source:
  edition: WLC
  text: לַ/פִּ֣יד בּ֭וּז לְ/עַשְׁתּ֣וּת שַׁאֲנָ֑ן נָ֝כ֗וֹן לְ/מ֣וֹעֲדֵי רָֽגֶל׃
translation:
  text: A torch is despised in the thought of one who is at ease; it is ready for
    those whose foot slips.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'A lamp is contemptible in the opinion of the one at ease; it is prepared
      for slipping feet.' The Hebrew of this verse is difficult, especially the rare
      word rendered 'thought.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לַפִּיד
  chosen: torch
  alternatives:
  - lamp
  - burning torch
  lexicon: HALOT
  rationale: The noun denotes a torch or flaming brand. 'Torch' best fits the concrete
    image and common English usage here.
- source_word: בּוּז
  chosen: is despised
  alternatives:
  - contempt
  - despising
  lexicon: HALOT
  rationale: The noun means contempt or scorn. Rendering it verbally in English ('is
    despised') produces a natural clause while preserving the sense that the torch/object
    is treated with contempt.
- source_word: לְעַשְׁתּוּת
  chosen: in the thought of
  alternatives:
  - according to the opinion of
  - for the thinking of
  lexicon: HALOT
  rationale: This rare noun refers to thought, intention, or consideration. 'In the
    thought of' preserves the mental perspective being described, though the term
    is difficult and somewhat uncertain.
- source_word: שַׁאֲנָן
  chosen: one who is at ease
  alternatives:
  - the complacent one
  - the secure one
  lexicon: HALOT
  rationale: The adjective describes someone carefree, secure, or at ease. 'One who
    is at ease' is idiomatic and captures the complacent security in context.
- source_word: נָכוֹן
  chosen: it is ready
  alternatives:
  - prepared
  - appointed
  - fixed
  lexicon: HALOT
  rationale: The participial/adjectival form conveys something established or ready/prepared.
    'It is ready' fits the predicative use and the proverb-like statement.
- source_word: לְמוֹעֲדֵי רָגֶל
  chosen: for those whose foot slips
  alternatives:
  - for the slipping of the foot
  - for those destined to stumble
  lexicon: HALOT
  rationale: The phrase is idiomatic, built on the idea of the foot slipping or tottering.
    Rendering it personally ('for those whose foot slips') communicates the sense
    clearly in English while preserving the metaphor of instability.
