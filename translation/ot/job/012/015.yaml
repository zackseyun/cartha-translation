theological_decisions:
- issue: Scope of ארץ in a wisdom-poetic statement about divine sovereignty
  chosen_reading: the earth
  alternative_readings:
  - the land
  rationale: 'The verse presents God''s power in cosmic terms: withholding waters
    causes drying; releasing them causes widespread upheaval. Rendering ארץ as ''the
    earth'' preserves that universal scope without importing a specific flood narrative.'
