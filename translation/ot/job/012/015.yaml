id: JOB.12.15
reference: Job 12:15
source:
  edition: WLC
  text: הֵ֤ן יַעְצֹ֣ר בַּ/מַּ֣יִם וְ/יִבָ֑שׁוּ וִֽ֝/ישַׁלְּחֵ֗/ם וְ/יַ֖הַפְכוּ אָֽרֶץ׃
translation:
  text: Look, if he holds back the waters, they dry up; if he sends them out, they
    overturn the earth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the land.' Hebrew אֶרֶץ can mean either 'earth' or 'land' depending
      on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֵן
  chosen: Look
  alternatives:
  - Behold
  - Indeed
  - See
  lexicon: HALOT
  rationale: Introduces an emphatic demonstration or vivid assertion. 'Look' preserves
    the force in readable modern English better than the more archaic 'Behold,' while
    still signaling attention.
- source_word: יַעְצֹר
  chosen: holds back
  alternatives:
  - restrains
  - shuts up
  - withholds
  lexicon: HALOT
  rationale: From עצר, here with מים as object via ב, conveying restraining or stopping
    the waters. 'Holds back' is idiomatic and clear in English, preserving divine
    control over water.
- source_word: בַּמַּיִם
  chosen: the waters
  alternatives:
  - water
  lexicon: HALOT
  rationale: The Hebrew uses the plural form מים, commonly rendered 'waters.' Keeping
    the plural matches Hebrew idiom and suits the cosmic scope of the verse.
- source_word: וְיִבָשׁוּ
  chosen: they dry up
  alternatives:
  - they become dry
  - they dry out
  lexicon: HALOT
  rationale: The verb יבש in the plural naturally refers to the result of the waters
    being restrained. 'They dry up' is concise and idiomatic, likely referring to
    lands/places affected by withheld waters, though the Hebrew leaves the subject
    implicit.
- source_word: וִישַׁלְּחֵם
  chosen: if he sends them out
  alternatives:
  - if he lets them loose
  - if he releases them
  - and he sends them
  lexicon: HALOT
  rationale: The prefixed conjunction plus imperfect can continue the conditional-like
    parallelism established by the first colon. 'Sends them out' captures the causative
    release of the waters. The pronominal suffix most naturally refers back to 'the
    waters.'
- source_word: וְיַהַפְכוּ
  chosen: they overturn
  alternatives:
  - they overturn completely
  - they transform
  - they upturn
  lexicon: HALOT
  rationale: From הפך, here describing destructive upheaval caused by released waters.
    'Overturn' preserves the vivid force without overinterpreting as only 'flood'
    or only 'transform.'
- source_word: אָרֶץ
  chosen: the earth
  alternatives:
  - the land
  lexicon: HALOT
  rationale: ארץ can mean 'land' or 'earth.' In this wisdom-poetic context describing
    God's cosmic power over waters, 'the earth' best fits the broad scope, though
    'land' remains possible.
