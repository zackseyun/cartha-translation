theological_decisions:
- issue: Subject implied by the verbal forms
  chosen_reading: The verse speaks of God's sovereign action over rulers' understanding
    and direction.
  rationale: In context (Job 12), the subject is God, though not repeated explicitly
    in every clause. The translation preserves divine agency without adding doctrinal
    interpretation beyond the text's plain sense.
  doctrine_reference: Translation philosophy §1, §3
