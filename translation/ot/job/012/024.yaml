id: JOB.12.24
reference: Job 12:24
source:
  edition: WLC
  text: מֵסִ֗יר לֵ֭ב רָאשֵׁ֣י עַם הָ/אָ֑רֶץ וַ֝/יַּתְעֵ֗/ם בְּ/תֹ֣הוּ לֹא דָֽרֶךְ־־׃
translation:
  text: He removes understanding from the heads of the people of the land, and makes
    them wander in a trackless waste.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the leaders of the people of the earth.' Hebrew 'heads of the people
      of the land/earth.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'heart'; here it refers to understanding or judgment.
    reason: lexical_alternative
  - marker: c
    text: Literally 'in a waste, no road'—that is, in a pathless wasteland.
    reason: lexical_alternative
lexical_decisions:
- source_word: מֵסִיר
  chosen: removes
  alternatives:
  - takes away
  - deprives of
  lexicon: HALOT
  rationale: 'Hiphil participle of סור/סיר in causative sense: ''remove, take away.''
    ''Removes'' is concise and natural, preserving the ongoing/general statement about
    God''s action.'
- source_word: לֵב
  chosen: understanding
  alternatives:
  - heart
  - mind
  lexicon: HALOT
  rationale: Although literally 'heart,' in Hebrew anthropology לֵב often denotes
    the inner faculty of thought, judgment, or sense. In this context of rulers being
    deprived of sound judgment, 'understanding' best conveys the functional sense
    without misleading modern readers into an emotional reading.
- source_word: רָאשֵׁי עַם הָאָרֶץ
  chosen: the heads of the people of the land
  alternatives:
  - the chiefs of the people of the earth
  - the leaders of the people of the land
  lexicon: HALOT
  rationale: רָאשֵׁי is literally 'heads of,' an idiom for leaders/chiefs. I retained
    'heads' to stay closer to the Hebrew while still intelligible in English. הָאָרֶץ
    can mean 'land' or 'earth'; here 'people of the land' fits the political/social
    sense of national rulers better than the more universal 'earth.'
- source_word: ויתעם
  chosen: makes them wander
  alternatives:
  - leads them astray
  - causes them to stagger
  lexicon: HALOT
  rationale: 'From תעה, ''to wander, go astray.'' The Hiphil/waw-consecutive form
    is causative: God causes them to wander. ''Makes them wander'' preserves both
    the causative force and the imagery.'
- source_word: בְּתֹהוּ
  chosen: in a waste
  alternatives:
  - in emptiness
  - in chaos
  - in a wasteland
  lexicon: HALOT
  rationale: תֹהוּ denotes emptiness, desolation, formless waste. In this context
    of disoriented rulers, 'waste' evokes a desolate, pathless place without overloading
    the term with cosmological nuance.
- source_word: לֹא דָרֶךְ
  chosen: trackless
  alternatives:
  - where there is no way
  - without a road
  - pathless
  lexicon: HALOT
  rationale: Literally 'not a way/road.' In English, an attributive rendering such
    as 'trackless' naturally compresses the Hebrew phrase while preserving the image
    of a place with no road or path. This is paired with 'waste' to form a vivid,
    readable expression.
