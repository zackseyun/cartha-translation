id: JOB.12.22
reference: Job 12:22
source:
  edition: WLC
  text: מְגַלֶּ֣ה עֲ֭מֻקוֹת מִנִּי חֹ֑שֶׁךְ וַ/יֹּצֵ֖א לָ/א֣וֹר צַלְמָֽוֶת־׃
translation:
  text: He reveals the deep things out of darkness, and brings the shadow of death
    out to light.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'deep darkness' or 'deathly darkness' for 'the shadow of death' (Hebrew
      צַלְמָוֶת).
    reason: lexical_alternative
lexical_decisions:
- source_word: מְגַלֶּה
  chosen: reveals
  alternatives:
  - uncovers
  - discloses
  lexicon: HALOT
  rationale: The participle from גלה denotes uncovering or making known. 'Reveals'
    is natural English and preserves both the literal sense of uncovering and the
    broader sense of making hidden things known.
- source_word: עֲמֻקוֹת
  chosen: the deep things
  alternatives:
  - deep places
  - depths
  - profound things
  lexicon: HALOT
  rationale: The feminine plural adjective used substantivally refers to deep or hidden
    things. 'The deep things' preserves the plural and allows both spatial and metaphorical
    force, fitting the wisdom context.
- source_word: מִנִּי חֹשֶׁךְ
  chosen: out of darkness
  alternatives:
  - from darkness
  - from deep darkness
  lexicon: HALOT
  rationale: The preposition with 'darkness' indicates source or emergence. 'Out of
    darkness' is idiomatic in English and matches the imagery of hidden things being
    brought forth.
- source_word: וַיֹּצֵא
  chosen: brings ... out
  alternatives:
  - brings forth
  - leads out
  - causes to come out
  lexicon: HALOT
  rationale: 'The Hiphil of יצא is causative: he causes something to come out. In
    English, ''brings ... out'' best captures the causative force in a readable way.'
- source_word: לָאוֹר
  chosen: to light
  alternatives:
  - into the light
  - to the light
  lexicon: HALOT
  rationale: The phrase marks movement toward light. 'To light' is concise and idiomatic
    after 'brings ... out,' though the sense is effectively 'into the light.'
- source_word: צַלְמָוֶת
  chosen: the shadow of death
  alternatives:
  - deep darkness
  - deathly darkness
  lexicon: HALOT
  rationale: This term can denote either 'shadow of death' or, in some contexts, very
    deep darkness. Because the traditional rendering remains lexically defensible
    and preserves the poetic intensity, it is retained in the main text, while the
    lexical alternative is preserved in a footnote for auditability.
