theological_decisions:
- issue: Rendering of צַלְמָוֶת
  chosen_reading: the shadow of death
  alternative_readings:
  - deep darkness
  - deathly darkness
  rationale: This is primarily a lexical-poetic decision rather than a doctrinal one.
    The compound/traditional reading is well established and suits the verse's imagery
    of God exposing what is most hidden. Since some modern scholarship understands
    the term as an idiom for extreme darkness rather than a direct reference to death,
    the alternative is preserved in a footnote rather than resolved silently.
  doctrine_reference: Preserve theological tension rather than resolve it; document
    significant ambiguity.
