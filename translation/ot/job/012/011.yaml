id: JOB.12.11
reference: Job 12:11
source:
  edition: WLC
  text: הֲ/לֹא אֹ֭זֶן מִלִּ֣ין תִּבְחָ֑ן וְ֝/חֵ֗ךְ אֹ֣כֶל יִטְעַם לֽ/וֹ־־׃
translation:
  text: Does not the ear test words, as the palate tastes food for itself?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Does not the ear examine speech, as the palate tastes food?'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲלֹא
  chosen: Does not
  alternatives:
  - Surely
  - Is it not
  lexicon: HALOT
  rationale: Introduces a rhetorical question expecting agreement. 'Does not' preserves
    the interrogative force in natural English.
- source_word: אֹזֶן
  chosen: ear
  lexicon: HALOT
  rationale: Literal body-part term; here metaphorically the faculty of hearing/discernment,
    but 'ear' preserves the Hebrew image.
- source_word: מִלִּין
  chosen: words
  alternatives:
  - speech
  - sayings
  lexicon: HALOT
  rationale: Plural of 'word/matter.' 'Words' is the most direct rendering and fits
    the comparison with tasting.
- source_word: תִּבְחָן
  chosen: test
  alternatives:
  - examine
  - discern
  - prove
  lexicon: HALOT
  rationale: The verb denotes examining or testing. 'Test' is concise and matches
    the parallel with tasting food.
- source_word: חֵךְ
  chosen: palate
  alternatives:
  - mouth
  - taste
  lexicon: HALOT
  rationale: More specifically the palate than the whole mouth. 'Palate' preserves
    the sensory parallel with the ear.
- source_word: אֹכֶל
  chosen: food
  alternatives:
  - what is eaten
  lexicon: HALOT
  rationale: Concrete noun for food; straightforward in English.
- source_word: יִטְעַם
  chosen: tastes
  alternatives:
  - tests by tasting
  - samples
  lexicon: HALOT
  rationale: The verb means to taste. Present-tense English fits the proverbial comparison.
- source_word: לוֹ
  chosen: for itself
  alternatives:
  - for him
  - to itself
  lexicon: HALOT
  rationale: The pronominal suffix is idiomatic here, indicating the palate's own
    act of tasting/discerning. 'For itself' brings out the reflexive-like sense in
    the comparison, though English could omit it. It is retained because it is present
    in the Hebrew.
