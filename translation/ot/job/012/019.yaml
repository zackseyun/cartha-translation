id: JOB.12.19
reference: Job 12:19
source:
  edition: WLC
  text: מוֹלִ֣יךְ כֹּהֲנִ֣ים שׁוֹלָ֑ל וְ/אֵֽתָנִ֣ים יְסַלֵּֽף׃
translation:
  text: He leads priests away stripped, and he overturns the mighty.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'He leads priests away despoiled' or 'as plundered men.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the enduring ones,' that is, those thought to be firmly established.
    reason: lexical_alternative
lexical_decisions:
- source_word: מוֹלִיךְ
  chosen: leads away
  alternatives:
  - makes go
  - drives away
  - leads
  lexicon: HALOT
  rationale: Hiphil participle of הלך with God as the implied subject in context;
    conveys causing someone to go, here in the sense of leading off or away. 'Leads
    away' is idiomatic in English and fits the judgment context.
- source_word: כֹּהֲנִים
  chosen: priests
  alternatives:
  - priestly officials
  lexicon: HALOT
  rationale: Standard rendering of כהנים. In Job's wisdom context it refers to socially
    and religiously prominent figures; 'priests' is the plain lexical sense.
- source_word: שׁוֹלָל
  chosen: stripped
  alternatives:
  - as plunder
  - spoiled
  - despoiled
  - barefoot
  lexicon: HALOT
  rationale: Adjectival/participial form from שלל in a context of humiliation and
    dispossession. 'Stripped' communicates being deprived of possessions and honor.
    'Despoiled' is possible but less natural; 'barefoot' is too interpretive here.
- source_word: אֵתָנִים
  chosen: the mighty
  alternatives:
  - the enduring
  - the strong
  - the established ones
  lexicon: HALOT
  rationale: From איתן, denoting strength, permanence, or firmness. In parallel with
    priests and within a list of powerful social groups brought low, 'the mighty'
    best captures the sense in natural English.
- source_word: יְסַלֵּף
  chosen: overturns
  alternatives:
  - twists
  - subverts
  - ruins
  lexicon: HALOT
  rationale: Piel of סלף often carries the sense of twisting or perverting. In this
    context of God bringing down established powers, 'overturns' expresses the result
    in idiomatic English while preserving the force of destabilizing what seemed firm.
