theological_decisions:
- issue: Rendering הַשָּׂטָן in Job's prologue
  chosen_reading: the Accuser
  alternative_readings:
  - the Satan
  - Satan
  - the adversary
  rationale: The Hebrew includes the article and in this context presents a role/title within the heavenly court rather than necessarily a fully fixed proper name. Rendering it as 'the Accuser' preserves the semantic force and avoids importing later assumptions more strongly than the text itself states.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language primacy over translation tradition.
