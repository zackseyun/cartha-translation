id: JOB.1.12
reference: Job 1:12
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר יְהוָ֜ה אֶל הַ/שָּׂטָ֗ן הִנֵּ֤ה כָל אֲשֶׁר ל/וֹ֙ בְּ/יָדֶ֔/ךָ רַ֣ק אֵלָ֔י/ו אַל תִּשְׁלַ֖ח יָדֶ֑/ךָ וַ/יֵּצֵא֙ הַ/שָּׂטָ֔ן מֵ/עִ֖ם פְּנֵ֥י יְהוָֽה־־־־׃
translation:
  text: And Yahweh said to the Accuser, “Look, all that he has is in your hand; only against him do not stretch out your hand.” Then the Accuser went out from the presence of Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the Satan” or “the adversary.” The Hebrew has the article, suggesting a title or role.
    reason: alternative_reading
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: הַשָּׂטָן
  chosen: the Accuser
  alternatives:
  - the Satan
  - the adversary
  lexicon: HALOT
  rationale: With the article, the Hebrew functions as a title/designation rather than a personal name. 'The Accuser' captures the forensic/oppositional sense in context better than leaving it transliterated. 'The adversary' is possible, but the Job prologue emphasizes accusatory challenge.
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: This discourse marker draws attention emphatically. 'Look' preserves the force in readable modern English better than the archaic 'Behold.'
- source_word: כָל אֲשֶׁר לוֹ
  chosen: all that he has
  alternatives:
  - everything that belongs to him
  - all that is his
  lexicon: HALOT
  rationale: This is a natural English rendering of the totalizing phrase, preserving the scope of Job's possessions without unnecessary stiffness.
- source_word: בְּיָדֶךָ
  chosen: is in your hand
  alternatives:
  - is in your power
  - is under your control
  lexicon: HALOT
  rationale: The idiom literally uses 'hand' for power or control. Retaining 'hand' preserves the Hebrew imagery, especially since the next clause repeats 'hand' in a deliberate wordplay/contrast.
- source_word: רַק
  chosen: only
  alternatives:
  - except that
  - nevertheless
  lexicon: HALOT
  rationale: '''Only'' clearly marks the single limitation placed on the Accuser''s authority.'
- source_word: אֵלָיו
  chosen: against him
  alternatives:
  - upon him
  - to him
  lexicon: HALOT
  rationale: In this prohibition, the preposition with 'stretch out your hand' idiomatically means hostile action directed at Job. 'Against him' makes that force explicit in English.
- source_word: אַל תִּשְׁלַח יָדֶךָ
  chosen: do not stretch out your hand
  alternatives:
  - do not lay a hand on him
  - do not send forth your hand
  lexicon: HALOT
  rationale: This preserves the Hebrew idiom and maintains the repeated 'hand' imagery from the previous clause. 'Lay a hand on him' is idiomatic English but would obscure the lexical repetition because 'him' is not explicit in the Hebrew phrase itself.
- source_word: וַיֵּצֵא
  chosen: went out
  alternatives:
  - departed
  - left
  lexicon: HALOT
  rationale: A straightforward narrative rendering of the wayyiqtol verb of motion.
- source_word: מֵעִם פְּנֵי יְהוָה
  chosen: from the presence of the LORD
  alternatives:
  - from before the LORD
  - from before the face of the LORD
  lexicon: HALOT
  rationale: This idiom denotes departure from before someone in their presence. 'From the presence of the LORD' is natural modern English while preserving the scene of the heavenly court.
