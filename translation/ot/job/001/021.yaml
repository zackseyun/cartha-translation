id: JOB.1.21
reference: Job 1:21
source:
  edition: WLC
  text: וַ/יֹּאמֶר֩ עָרֹ֨ם יצתי מִ/בֶּ֣טֶן אִמִּ֗/י וְ/עָרֹם֙ אָשׁ֣וּב שָׁ֔מָ/ה יְהוָ֣ה נָתַ֔ן וַ/יהוָ֖ה לָקָ֑ח יְהִ֛י שֵׁ֥ם יְהוָ֖ה מְבֹרָֽךְ׃
translation:
  text: And he said, “Naked I came out from my mother’s womb, and naked I will return there. Yahweh gave, and Yahweh has taken away. May the name of Yahweh be blessed.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and naked I will return'; the Hebrew says 'there,' leaving the destination implicit. It may allude figuratively to the womb, or more broadly to the earth/grave and the state of having nothing.
    reason: alternative_reading
  - marker: b
    text: 'Hebrew: ''YHWH'' (the divine name), traditionally rendered ''the LORD.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: עָרֹם
  chosen: naked
  alternatives:
  - bare
  - with nothing
  lexicon: HALOT
  rationale: The adjective denotes being unclothed or stripped. 'Naked' is the natural and traditional English equivalent and fits both literal birth imagery and the broader sense of possessing nothing.
- source_word: יצתי
  chosen: I came out
  alternatives:
  - I came forth
  - I went out
  lexicon: HALOT
  rationale: From יצא, here referring to birth from the womb. 'I came out' is idiomatic modern English and preserves the concrete imagery.
- source_word: מִבֶּטֶן אִמִּי
  chosen: from my mother’s womb
  alternatives:
  - out of my mother’s womb
  lexicon: HALOT
  rationale: A direct and transparent rendering of the Hebrew phrase; 'womb' preserves the bodily concreteness of the source.
- source_word: וְעָרֹם אָשׁוּב שָׁמָה
  chosen: and naked I will return there
  alternatives:
  - and naked I will return
  - and I will return there naked
  lexicon: HALOT
  rationale: Retains the Hebrew word order emphasis on 'naked' while keeping readable English. 'There' translates שָׁמָה and preserves the source's somewhat stark expression, likely referring back to the state/place of origin rather than specifying 'to the earth' explicitly.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: נָתַן
  chosen: gave
  alternatives:
  - has given
  lexicon: HALOT
  rationale: Simple past fits the Hebrew perfect in this poetic-proverbial statement and pairs naturally with the following clause.
- source_word: לָקָח
  chosen: has taken away
  alternatives:
  - took
  - has taken
  lexicon: HALOT
  rationale: Although the Hebrew verb is simply 'took,' English idiom commonly says 'take away' in contexts of loss. The perfect sense 'has taken away' communicates completed action with present consequence and matches the lament context.
- source_word: יְהִי
  chosen: May ... be
  alternatives:
  - Let ... be
  lexicon: HALOT
  rationale: The jussive expresses a wish or benediction. 'May the name of the LORD be blessed' is natural English for this volitional form.
- source_word: שֵׁם יְהוָה
  chosen: the name of the LORD
  alternatives:
  - the LORD’s name
  lexicon: HALOT
  rationale: This preserves the Hebrew construct phrase and its reverential force.
- source_word: מְבֹרָךְ
  chosen: blessed
  alternatives:
  - praised
  lexicon: HALOT
  rationale: The passive participial/adjectival form is best rendered 'blessed.' 'Praised' is interpretive and shifts the semantic field from blessing to praise.
