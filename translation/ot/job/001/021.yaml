theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Meaning of 'return there' (שָׁמָה)
  chosen_reading: retain the literal 'there' without specifying 'to the earth'
  alternative_readings:
  - return to the earth
  - return to the grave
  - return to my mother’s womb (figurative)
  rationale: The Hebrew says 'there' and leaves the referent implicit. Preserving that ambiguity avoids over-resolving whether Job means the womb metaphorically, the earth, or simply the state of nakedness at death. This follows the doctrine's principle of preserving theological and interpretive tension where the source is ambiguous.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it'
