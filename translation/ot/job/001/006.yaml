theological_decisions:
- issue: Whether הַשָּׂטָן should be rendered as a proper name or a title
  chosen_reading: the Adversary
  alternative_readings:
  - Satan
  - the accuser
  rationale: Because the Hebrew has the definite article (הַשָּׂטָן), the term is best taken here as a title or role designation rather than simply a proper name. Rendering it 'the Adversary' preserves the lexical meaning and avoids importing a later, more fixed naming convention into the text, while the traditional 'Satan' is preserved in a footnote.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language primacy over translation tradition.
- issue: Whether בְּנֵי הָאֱלֹהִים should be interpreted or translated formally
  chosen_reading: the sons of God
  alternative_readings:
  - the heavenly beings
  - the divine beings
  rationale: The phrase likely refers to heavenly court beings, but the Hebrew expression itself is retained rather than interpreted in the main text. This preserves the source-language imagery and ambiguity.
  doctrine_reference: Original-language primacy over translation tradition; preserve theological tension rather than resolve it.
