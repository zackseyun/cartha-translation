id: JOB.1.6
reference: Job 1:6
source:
  edition: WLC
  text: וַ/יְהִ֣י הַ/יּ֔וֹם וַ/יָּבֹ֨אוּ֙ בְּנֵ֣י הָ/אֱלֹהִ֔ים לְ/הִתְיַצֵּ֖ב עַל יְהוָ֑ה וַ/יָּב֥וֹא גַֽם הַ/שָּׂטָ֖ן בְּ/תוֹכָֽ/ם־־׃
translation:
  text: Now there was a day when the sons of God came to present themselves before Yahweh, and the Adversary also came among them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, traditionally, “Satan.” The Hebrew has “the satan/adversary,” with the article, which may function here as a title rather than a personal name.
    reason: alternative_reading
  - marker: b
    text: “Sons of God” may refer to heavenly beings in the divine council.
    reason: cultural_note
lexical_decisions:
- source_word: וַיְהִי הַיּוֹם
  chosen: Now there was a day
  alternatives:
  - And it happened on the day
  - One day
  lexicon: HALOT
  rationale: The Hebrew narrative formula introduces a scene. 'Now there was a day' preserves the formal narrative shift without sounding wooden. 'One day' is possible but slightly more idiomatic than the source warrants.
- source_word: בְּנֵי הָאֱלֹהִים
  chosen: the sons of God
  alternatives:
  - the heavenly beings
  - the divine beings
  lexicon: HALOT
  rationale: A formally close rendering best preserves the Hebrew expression and its theological ambiguity. 'Heavenly beings' interprets the phrase; 'sons of God' keeps the source wording and allows readers to see the idiom.
- source_word: לְהִתְיַצֵּב
  chosen: to present themselves
  alternatives:
  - to stand
  - to take their stand
  lexicon: HALOT
  rationale: In this context the hitpael conveys appearing or presenting oneself in attendance before a superior. 'Present themselves' captures the idiomatic force better than the more wooden 'stand'.
- source_word: עַל יְהוָה
  chosen: before the LORD
  alternatives:
  - before Yahweh
  - before the LORD
  lexicon: HALOT
  rationale: With verbs of standing/presenting oneself, עַל can carry the sense of appearing before someone. The divine name is rendered 'the LORD' per doctrine for יְהוָה.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: This follows the project's stated default for the divine name, preserving the traditional reverential substitution pattern.
- source_word: הַשָּׂטָן
  chosen: the Adversary
  alternatives:
  - Satan
  - the accuser
  lexicon: HALOT
  rationale: The Hebrew includes the article and in Job functions as a title/designation rather than yet clearly a proper name. 'The Adversary' preserves the lexical sense of the noun while reflecting the article. 'Satan' is preserved in a footnote because of translation tradition and later canonical usage.
- source_word: בְּתוֹכָם
  chosen: among them
  alternatives:
  - in their midst
  lexicon: HALOT
  rationale: A natural modern rendering of the prepositional phrase that preserves the sense of inclusion within the group.
