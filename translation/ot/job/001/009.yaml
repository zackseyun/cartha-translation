- issue: Rendering הַשָּׂטָן with the article
  chosen_reading: the Accuser
  alternative_readings:
  - the Satan
  - Satan
  - the adversary
  rationale: The Hebrew article indicates a title or office in this scene. Rendering it as 'the Accuser' preserves the role-based sense without importing later assumptions that it functions here strictly as a proper name. This keeps the text's theological tension and narrative setting intact.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Rendering divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
