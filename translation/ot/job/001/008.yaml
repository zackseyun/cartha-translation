theological_decisions:
- issue: Whether הַשָּׂטָן should be rendered as a personal name ('Satan') or as a title/role
  chosen_reading: Rendered as 'the Accuser'
  alternative_readings:
  - Satan
  - the Satan
  - the adversary
  rationale: The presence of the article in Hebrew strongly suggests a title in this context. Rendering it as 'the Accuser' preserves the role-based sense without prematurely importing later name-like usage. This also fits the narrative setting of the heavenly court.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation tradition; preserve what the source text plainly indicates.'
- issue: Whether תָּם implies sinless perfection
  chosen_reading: Rendered as 'blameless' in the sense of integrity, not absolute perfection
  alternative_readings:
  - perfect
  - complete
  rationale: The wisdom context and the pairing with 'upright' indicate moral integrity and wholeness rather than metaphysical or absolute sinlessness. The translation avoids overstating Job's condition beyond what the Hebrew warrants.
  doctrine_reference: 'Translation philosophy: never import doctrinal claims the text does not make.'
