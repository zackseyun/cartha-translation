id: JOB.1.8
reference: Job 1:8
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר יְהוָה֙ אֶל הַ/שָּׂטָ֔ן הֲ/שַׂ֥מְתָּ לִבְּ/ךָ֖ עַל עַבְדִּ֣/י אִיּ֑וֹב כִּ֣י אֵ֤ין כָּמֹ֨/הוּ֙ בָּ/אָ֔רֶץ אִ֣ישׁ תָּ֧ם וְ/יָשָׁ֛ר יְרֵ֥א אֱלֹהִ֖ים וְ/סָ֥ר מֵ/רָֽע־־׃
translation:
  text: 'And Yahweh said to the Accuser, “Have you set your heart on my servant Job? For there is none like him on the earth: a blameless and upright man, one who fears God and turns away from evil.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more traditionally, 'Have you considered my servant Job?' The Hebrew is literally, 'Have you set your heart on my servant Job?'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the Accuser' (or 'the Satan'); the term here carries the sense of a title or role rather than clearly functioning as a personal name.
    reason: alternative_reading
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: הַשָּׂטָן
  chosen: the Accuser
  alternatives:
  - the Satan
  - the adversary
  lexicon: HALOT
  rationale: With the article, the Hebrew functions as a title/role designation rather than a personal name. 'The Accuser' communicates the forensic/oppositional sense clearly in modern English. 'The Satan' is more formally transparent but less idiomatic; 'the adversary' is possible but weaker in the judicial nuance.
- source_word: הֲשַׂמְתָּ לִבְּךָ עַל
  chosen: Have you set your heart on
  alternatives:
  - Have you set your mind on
  - Have you considered
  lexicon: HALOT
  rationale: Literally 'have you set your heart on.' This idiom means to direct one's attention deliberately. 'Considered' is traditional and contextually valid, but 'set your heart on' preserves the Hebrew imagery and rhetorical force better while remaining understandable.
- source_word: עַבְדִּי
  chosen: my servant
  alternatives:
  - my slave
  lexicon: HALOT
  rationale: Although עבד can denote slave or servant, here the emphasis is Job's status as one belonging to and serving God, not bonded servitude as a social institution. 'My servant' is the most natural and contextually fitting rendering.
- source_word: כִּי אֵין כָּמֹהוּ בָּאָרֶץ
  chosen: For there is none like him on the earth
  alternatives:
  - for there is no one like him in the land
  - for there is none like him in the earth
  lexicon: HALOT
  rationale: This clause expresses Job's unmatched character. 'On the earth' is idiomatic English for בָּאָרֶץ here and fits the universal scope better than 'in the land,' which could sound geographically restricted.
- source_word: אִישׁ
  chosen: man
  alternatives:
  - person
  lexicon: HALOT
  rationale: The Hebrew is grammatically masculine singular and refers specifically to Job as a male individual. Per the gender-accurate policy, 'man' is appropriate.
- source_word: תָּם
  chosen: blameless
  alternatives:
  - integral
  - whole
  - complete
  lexicon: HALOT
  rationale: In wisdom literature this term describes moral integrity, not sinless perfection. 'Blameless' is the standard concise English equivalent and pairs naturally with 'upright.'
- source_word: יָשָׁר
  chosen: upright
  alternatives:
  - straight
  - just
  lexicon: HALOT
  rationale: The term denotes moral straightness or rectitude. 'Upright' is the most idiomatic and established rendering in this collocation.
- source_word: יְרֵא אֱלֹהִים
  chosen: one who fears God
  alternatives:
  - God-fearing
  - who reveres God
  lexicon: HALOT
  rationale: This participial phrase describes ongoing piety and reverence. 'Fears God' preserves the biblical idiom and theological weight better than flattening it to mere respect.
- source_word: וְסָר מֵרָע
  chosen: and turns away from evil
  alternatives:
  - and shuns evil
  - and departs from evil
  lexicon: HALOT
  rationale: The participle conveys habitual avoidance or rejection of evil. 'Turns away from evil' is clear, faithful, and slightly more transparent than the traditional 'shuns evil.'
