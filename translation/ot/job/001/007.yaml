id: JOB.1.7
reference: Job 1:7
source:
  edition: WLC
  text: וַ/יֹּ֧אמֶר יְהוָ֛ה אֶל הַ/שָּׂטָ֖ן מֵ/אַ֣יִן תָּבֹ֑א וַ/יַּ֨עַן הַ/שָּׂטָ֤ן אֶת יְהוָה֙ וַ/יֹּאמַ֔ר מִ/שּׁ֣וּט בָּ/אָ֔רֶץ וּ/מֵֽ/הִתְהַלֵּ֖ךְ בָּֽ/הּ־־׃
translation:
  text: Then Yahweh said to the Adversary, “Where have you come from?” And the Adversary answered Yahweh and said, “From roaming on the earth and from walking about on it.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''the Satan.'' The term here has the definite article and functions as a title, ''the Adversary.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: הַשָּׂטָן
  chosen: the Adversary
  alternatives:
  - the Satan
  - the accuser
  lexicon: HALOT
  rationale: With the article, the Hebrew functions as a title/designation rather than a personal name. 'The Adversary' communicates the role sense clearly in modern English while preserving the definite article. 'The Satan' is more formally transparent but less natural; 'the accuser' is possible but narrower than the broader adversarial sense.
- source_word: מֵאַיִן תָּבֹא
  chosen: Where have you come from?
  alternatives:
  - From where do you come?
  - Where are you coming from?
  lexicon: HALOT
  rationale: The idiom asks the source or point of origin. English present perfect ('have you come') is the most natural rendering in dialogue for a completed arrival with present relevance.
- source_word: וַיַּעַן
  chosen: answered
  alternatives:
  - replied
  lexicon: HALOT
  rationale: Standard narrative/dialogue verb; 'answered' preserves the formal correspondence and biblical dialogue rhythm.
- source_word: מִשּׁוּט
  chosen: from roaming through
  alternatives:
  - from going to and fro in
  - from ranging over
  lexicon: HALOT
  rationale: The infinitive conveys movement about or to and fro. 'Roaming through' is idiomatic modern English and captures restless movement without archaic phrasing.
- source_word: בָּאָרֶץ
  chosen: the earth
  alternatives:
  - the land
  lexicon: HALOT
  rationale: In Job's cosmic setting, 'earth' better fits the scope than 'land,' which can sound regionally limited.
- source_word: וּמֵהִתְהַלֵּךְ בָּהּ
  chosen: and from walking about in it
  alternatives:
  - and from going back and forth in it
  - and from patrolling it
  lexicon: HALOT
  rationale: The hitpael of הלך here suggests moving about repeatedly. 'Walking about in it' preserves the iterative sense in readable English. 'Patrolling' is interpretive and too militarized; 'going back and forth' is possible but less smooth alongside 'roaming through'.
