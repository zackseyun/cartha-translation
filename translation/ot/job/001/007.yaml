theological_decisions:
- issue: Whether הַשָּׂטָן should be treated as a personal name or a title/role
  chosen_reading: 'title/role: ''the Adversary'''
  alternative_readings:
  - 'personal name: ''Satan'''
  - 'more formal transliteration: ''the Satan'''
  rationale: The presence of the definite article in Hebrew strongly favors a titular or role-based designation in this context. Rendering it as 'the Adversary' avoids importing a later name-like usage into the text while remaining intelligible in English.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation tradition; preserve the source text''s plain sense.'
