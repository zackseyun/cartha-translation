id: JOB.15.31
reference: Job 15:31
source:
  edition: WLC
  text: אַל יַאֲמֵ֣ן ב/שו נִתְעָ֑ה כִּי שָׁ֝֗וְא תִּהְיֶ֥ה תְמוּרָתֽ/וֹ־־׃
translation:
  text: Let him not trust in emptiness, deceiving himself, for emptiness will be his
    recompense.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Let him not trust in vanity, being deluded'; the Hebrew can also be
      understood as 'being led astray' rather than explicitly 'deceiving himself.'
    reason: lexical_alternative
  - marker: b
    text: '''Emptiness'' translates שָׁוְא, which can also mean ''vanity,'' ''falsehood,''
      or ''worthlessness.'' The repetition of the same Hebrew word is preserved in
      the verse.'
    reason: lexical_alternative
  - marker: c
    text: Or 'for vanity will be what he gets in return.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַל
  chosen: Let ... not
  alternatives:
  - Do not
  lexicon: HALOT
  rationale: Negative particle used with the imperfect/jussive nuance; in context
    it introduces a prohibition or warning, best carried by 'Let him not' in English.
- source_word: יַאֲמֵן
  chosen: trust
  alternatives:
  - believe
  - put confidence in
  lexicon: HALOT
  rationale: From אמן in the Hiphil, here meaning to place trust or confidence in
    something rather than merely to believe a proposition.
- source_word: בְּשָׁוְא
  chosen: in emptiness
  alternatives:
  - in vanity
  - in falsehood
  - in what is worthless
  lexicon: HALOT
  rationale: שָׁוְא commonly denotes emptiness, vanity, or worthlessness, and can
    also shade toward falsehood. 'Emptiness' preserves the image and pairs well with
    the repeated שָׁוְא later in the verse.
- source_word: נִתְעָה
  chosen: deceiving himself
  alternatives:
  - being led astray
  - going astray
  - being deluded
  lexicon: HALOT
  rationale: Niphal of תעה can mean to wander or be led astray. In this construction
    after 'trust in emptiness,' it functions appositionally/descriptively of the subject
    as self-deluded. 'Deceiving himself' makes the sense clear in modern English while
    preserving the warning.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: 'Introduces the reason for the warning: the outcome of trusting emptiness.'
- source_word: שָׁוְא
  chosen: emptiness
  alternatives:
  - vanity
  - worthlessness
  - falsehood
  lexicon: HALOT
  rationale: Repeated for rhetorical effect; keeping the same English gloss preserves
    the Hebrew repetition and the poetic force.
- source_word: תִּהְיֶה
  chosen: will be
  alternatives:
  - shall become
  lexicon: HALOT
  rationale: Simple future/copular sense in context.
- source_word: תְּמוּרָתוֹ
  chosen: his recompense
  alternatives:
  - his exchange
  - his return
  - what he gets in return
  lexicon: HALOT
  rationale: תְּמוּרָה can denote exchange, substitute, or what is received in return.
    In this poetic context, 'recompense' communicates the result or return he receives
    from trusting emptiness.
