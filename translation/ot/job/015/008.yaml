theological_decisions:
- issue: Meaning of divine סוֹד in Joban rhetoric
  chosen_reading: Rendered as 'the council of God' to suggest participation in God's
    deliberative assembly.
  alternative_readings:
  - the secret of God
  - the counsel of God
  rationale: The verse mocks the idea that Job has privileged access to God's inner
    deliberations. 'Council' preserves the likely imagery of a heavenly deliberative
    setting better than the more abstract 'secret,' while a footnote preserves that
    lexical alternative.
  doctrine_reference: Translation philosophy §3, §6
