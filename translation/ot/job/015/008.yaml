id: JOB.15.8
reference: Job 15:8
source:
  edition: WLC
  text: הַ/בְ/ס֣וֹד אֱל֣וֹהַ תִּשְׁמָ֑ע וְ/תִגְרַ֖ע אֵלֶ֣י/ךָ חָכְמָֽה׃
translation:
  text: Have you listened in the council of God, and limited wisdom to yourself?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the secret/counsel of God.' The Hebrew סוֹד can denote a confidential
      council, intimate circle, or secret deliberation.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַ/בְ/סוֹד
  chosen: in the council
  alternatives:
  - in the secret counsel
  - in the intimate circle
  - in the deliberation
  lexicon: HALOT
  rationale: סוֹד commonly denotes a confidential council, intimate circle, or secret
    deliberation, especially in divine/heavenly contexts. 'Council' best captures
    the setting of privileged deliberation without implying merely hidden information.
    The prefixed interrogative and preposition are reflected by 'Have you ... in the
    council'.
- source_word: אֱלוֹהַ
  chosen: God
  alternatives:
  - God Almighty
  lexicon: HALOT
  rationale: אֱלוֹהַ is the singular form 'God' used frequently in Job. 'God' is the
    natural English equivalent here.
- source_word: תִּשְׁמָע
  chosen: have you listened
  alternatives:
  - have you heard
  - do you hear
  lexicon: HALOT
  rationale: שׁמע can mean hear or listen. In context of participation in divine counsel,
    'listened' better conveys attentive hearing rather than mere auditory perception.
    The imperfect in an interrogative rhetorical question is naturally rendered in
    English as present perfect.
- source_word: וְ/תִגְרַע
  chosen: and limited
  alternatives:
  - and withheld
  - and reduced
  - and reserved
  lexicon: HALOT
  rationale: גרע fundamentally means diminish, reduce, or withhold. In this context
    with אֵלֶיךָ חָכְמָה, Eliphaz accuses Job of restricting wisdom to himself. 'Limited'
    expresses the idiomatic sense clearly in modern English while preserving the idea
    of reduction/restriction.
- source_word: אֵלֶיךָ
  chosen: to yourself
  alternatives:
  - for yourself
  - unto you
  lexicon: HALOT
  rationale: The preposition with 2ms suffix indicates direction or relation toward
    the addressee. In idiomatic English with the verb 'limited,' 'to yourself' best
    conveys exclusive appropriation.
- source_word: חָכְמָה
  chosen: wisdom
  lexicon: HALOT
  rationale: Standard rendering of חָכְמָה. Here it refers to insight or wisdom in
    general, not a technical theological term.
