id: JOB.15.2
reference: Job 15:2
source:
  edition: WLC
  text: הֶֽ/חָכָ֗ם יַעֲנֶ֥ה דַֽעַת ר֑וּחַ וִֽ/ימַלֵּ֖א קָדִ֣ים בִּטְנֽ/וֹ־׃
translation:
  text: Should a wise man answer with windy knowledge, and fill his belly with the
    east wind?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'knowledge of wind,' that is, empty or insubstantial knowledge.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֶחָכָם
  chosen: a wise man
  alternatives:
  - the wise man
  - a wise person
  lexicon: HALOT
  rationale: Interrogative הֲ with חָכָם introduces a rhetorical question. The singular
    masculine is retained as 'wise man' in keeping with the gender-accurate policy;
    the sense is generic rather than referring to a specific individual.
- source_word: יַעֲנֶה
  chosen: should ... answer
  alternatives:
  - would ... answer
  - does ... answer
  lexicon: HALOT
  rationale: Imperfect in a rhetorical question can express what is fitting or expected,
    so 'should ... answer' captures the rebuking force better than a simple present.
- source_word: דַעַת רוּחַ
  chosen: windy knowledge
  alternatives:
  - knowledge of wind
  - wind-like knowledge
  - empty knowledge
  lexicon: HALOT
  rationale: The construct phrase is literally 'knowledge of wind/spirit.' In this
    context of Eliphaz's accusation, רוּחַ is best taken as 'wind,' denoting emptiness
    or insubstantiality. 'Windy knowledge' preserves the metaphor and reads naturally
    in English.
- source_word: וִימַלֵּא
  chosen: and fill
  alternatives:
  - and would fill
  - and stuff
  lexicon: HALOT
  rationale: Consecutive imperfect continues the rhetorical question. 'Fill' is the
    straightforward lexical equivalent and preserves the image.
- source_word: קָדִים
  chosen: the east wind
  alternatives:
  - east wind
  - scorching east wind
  lexicon: HALOT
  rationale: קָדִים commonly denotes the east wind, often associated with harshness
    and destruction. Including 'the' makes the idiom natural in English while preserving
    the concrete image.
- source_word: בִּטְנוֹ
  chosen: his belly
  alternatives:
  - his stomach
  - his inward parts
  lexicon: HALOT
  rationale: בֶּטֶן is literally 'belly' or 'womb.' Here 'belly' best preserves the
    vivid bodily metaphor of being filled with destructive wind.
