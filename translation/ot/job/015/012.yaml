id: JOB.15.12
reference: Job 15:12
source:
  edition: WLC
  text: מַה יִּקָּחֲ/ךָ֥ לִבֶּ֑/ךָ וּֽ/מַה יִּרְזְמ֥וּ/ן עֵינֶֽי/ךָ־־׃
translation:
  text: Why does your heart carry you away, and why do your eyes flash?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'wink,' 'signal,' or possibly 'roll' your eyes; the Hebrew verb is rare
      and its precise nuance is uncertain.
    reason: lexical_alternative
lexical_decisions:
- source_word: מַה
  chosen: Why
  alternatives:
  - What
  lexicon: HALOT
  rationale: Although the interrogative particle is literally 'what,' in this idiom
    it introduces a rhetorical question about cause or motive. 'Why' best captures
    the sense in natural English without over-paraphrasing.
- source_word: יִקָּחֲךָ
  chosen: does ... carry you away
  alternatives:
  - takes you
  - seizes you
  lexicon: HALOT
  rationale: From לקח ('take'). With 'your heart' as subject and second-person object
    suffix, the idiom suggests the heart carrying or sweeping a person along. 'Carry
    you away' conveys the figurative force better than the overly literal 'take you'.
- source_word: לִבֶּךָ
  chosen: your heart
  lexicon: HALOT
  rationale: Hebrew 'heart' commonly denotes the inner person, including thought and
    emotion. The literal rendering should be preserved here because the metaphor is
    transparent in English.
- source_word: וּמַה
  chosen: and why
  alternatives:
  - and what
  lexicon: HALOT
  rationale: As with the first מַה, the conjunction plus interrogative functions idiomatically
    as a rhetorical 'and why' in context.
- source_word: יִרְזְמוּן
  chosen: do ... flash
  alternatives:
  - wink
  - signal
  - roll
  lexicon: HALOT
  rationale: The verb is rare and contextually difficult. Traditional renderings include
    'wink,' but in context Eliphaz is rebuking Job's agitated, defiant expression.
    'Flash' fits the hostile or heated look conveyed by the eyes, while preserving
    the vivid bodily imagery. Because the sense is uncertain, alternatives are preserved
    in a footnote.
- source_word: עֵינֶיךָ
  chosen: your eyes
  lexicon: HALOT
  rationale: Literal rendering is natural and preserves the embodied imagery of the
    Hebrew accusation.
