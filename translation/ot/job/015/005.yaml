theological_decisions:
- issue: Moral nuance of עָוֹן in accusation
  chosen_reading: Rendered as 'iniquity' rather than 'guilt' or 'sin.'
  alternative_readings:
  - your guilt teaches your mouth
  - your sin teaches your mouth
  rationale: The verse charges Job's moral perversity as the source of his speech.
    'Iniquity' preserves the stronger ethical nuance and avoids narrowing the term
    to either legal liability ('guilt') or a more general term ('sin').
  doctrine_reference: 'Translation philosophy §5: consistency of key terms, or documented
    exception.'
