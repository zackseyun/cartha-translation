id: JOB.15.5
reference: Job 15:5
source:
  edition: WLC
  text: כִּ֤י יְאַלֵּ֣ף עֲוֺנְ/ךָ֣ פִ֑י/ךָ וְ֝/תִבְחַ֗ר לְשׁ֣וֹן עֲרוּמִֽים׃
translation:
  text: For your iniquity teaches your mouth, and you choose the tongue of the crafty.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your guilt teaches your mouth'; Hebrew עָוֹן can denote iniquity, guilt,
      or guilt-bearing depending on context.
    reason: lexical_alternative
  - marker: b
    text: Or 'the tongue of the cunning' or 'the language of the shrewd.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Surely
  - Because
  lexicon: HALOT
  rationale: Introduces Eliphaz's explanation or ground for the accusation in the
    preceding context. 'For' fits the argumentative flow better than a stronger asseverative
    like 'indeed'.
- source_word: יְאַלֵּף
  chosen: teaches
  alternatives:
  - trains
  - instructs
  lexicon: HALOT
  rationale: From אלף in the Piel, here meaning to teach/train. 'Teaches' is natural
    English and preserves the personification of iniquity as instructing Job's speech.
- source_word: עֲוֺנְךָ
  chosen: your iniquity
  alternatives:
  - your guilt
  - your wickedness
  - your sin
  lexicon: HALOT
  rationale: עָוֹן can denote iniquity, guilt, or punishment for guilt depending on
    context. Here it is the moral fault that shapes speech, so 'iniquity' best preserves
    the ethical force without reducing it merely to subjective guilt.
- source_word: פִיךָ
  chosen: your mouth
  alternatives:
  - your speech
  lexicon: HALOT
  rationale: Literal 'your mouth' is idiomatic in English and preserves the Hebrew
    imagery of speech issuing from the mouth.
- source_word: וְתִבְחַר
  chosen: and you choose
  alternatives:
  - and you prefer
  - and you select
  lexicon: HALOT
  rationale: Qal of בחר means 'choose/select.' The direct second-person accusation
    is retained. 'Choose' is the most straightforward rendering.
- source_word: לְשׁוֹן
  chosen: the tongue
  alternatives:
  - the language
  - speech
  lexicon: HALOT
  rationale: Literal 'tongue' works idiomatically here and parallels 'mouth' in the
    first colon, preserving the poetic imagery of speech organs.
- source_word: עֲרוּמִים
  chosen: the crafty
  alternatives:
  - the shrewd
  - the cunning
  lexicon: HALOT
  rationale: עָרוּם can be positive ('prudent/shrewd') or negative ('crafty/cunning')
    depending on context. In Eliphaz's accusation, the negative sense is clearly intended,
    so 'crafty' best conveys manipulative speech.
