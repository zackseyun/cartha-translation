id: JOB.15.19
reference: Job 15:19
source:
  edition: WLC
  text: לָ/הֶ֣ם לְ֭/בַדָּ/ם נִתְּנָ֣ה הָ/אָ֑רֶץ וְ/לֹא עָ֖בַר זָ֣ר בְּ/תוֹכָֽ/ם־׃
translation:
  text: To them alone the land was given, and no stranger passed among them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the earth' instead of 'the land.' The Hebrew אֶרֶץ can bear either sense;
      'land' is preferred here because the verse speaks of a territory uniquely given
      to a people and untouched by outsiders.
    reason: lexical_alternative
  - marker: b
    text: Or 'no foreigner passed through their midst.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לָהֶם
  chosen: to them
  alternatives:
  - for them
  lexicon: HALOT
  rationale: 'The prefixed ל marks indirect object/beneficiary. With the following
    לְבַדָּם, ''to them'' is the most natural English construction: ''to them alone
    the land was given.'''
- source_word: לְבַדָּם
  chosen: alone
  alternatives:
  - by themselves
  - exclusively
  lexicon: HALOT
  rationale: 'The expression intensifies exclusivity: ''to them alone.'' ''Alone''
    is concise and idiomatic, preserving the sense that the land belonged uniquely
    to them.'
- source_word: נִתְּנָה
  chosen: was given
  alternatives:
  - was granted
  lexicon: HALOT
  rationale: Nifal of נתן is passive here. 'Was given' is the straightforward rendering
    and preserves the passive voice of the Hebrew.
- source_word: הָאָרֶץ
  chosen: the land
  alternatives:
  - the earth
  lexicon: HALOT
  rationale: Although אֶרֶץ can mean 'earth' or 'land,' the context of possession
    by a people and exclusion of outsiders favors 'land' rather than the broader 'earth.'
- source_word: וְלֹא
  chosen: and no
  alternatives:
  - and not
  lexicon: HALOT
  rationale: With the following singular noun and verb, English idiom is best served
    by 'and no stranger...' rather than a more wooden 'and not a stranger...'.
- source_word: עָבַר
  chosen: passed
  alternatives:
  - passed through
  - crossed
  lexicon: HALOT
  rationale: עבר commonly means 'pass' or 'pass through.' Because בְּתוֹכָם already
    supplies the locative idea ('among them/in their midst'), 'passed' avoids redundancy
    while retaining the movement sense.
- source_word: זָר
  chosen: stranger
  alternatives:
  - foreigner
  - outsider
  lexicon: HALOT
  rationale: זָר denotes one who is foreign or alien to the group. 'Stranger' fits
    the poetic register and preserves the social sense without over-specifying ethnicity
    or nationality.
- source_word: בְּתוֹכָם
  chosen: among them
  alternatives:
  - in their midst
  - through them
  lexicon: HALOT
  rationale: The phrase means 'in the midst of them.' 'Among them' is natural modern
    English and communicates the communal/internal setting clearly.
