theological_decisions:
- issue: Rendering divine titles in parallelism
  chosen_reading: Translate אֵל as 'God' and שַׁדַּי as 'the Almighty'
  alternative_readings:
  - '''God'' / ''Shaddai'''
  - '''Mighty God'' / ''the Almighty'''
  rationale: The verse uses two divine designations in poetic parallel. Translating
    both titles preserves meaning and avoids unnecessary transliteration. Using distinct
    English renderings also reflects the Hebrew parallelism without collapsing the
    titles into one repeated gloss.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names.'
