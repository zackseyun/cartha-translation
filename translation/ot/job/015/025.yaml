id: JOB.15.25
reference: Job 15:25
source:
  edition: WLC
  text: כִּֽי נָטָ֣ה אֶל אֵ֣ל יָד֑/וֹ וְ/אֶל שַׁ֝דַּ֗י יִתְגַּבָּֽר־־־׃
translation:
  text: because he has stretched out his hand against God, and shows himself mighty
    against the Almighty.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for he has stretched out his hand toward God, and strengthens himself
      against the Almighty.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  lexicon: HALOT
  rationale: Introduces the reason for the wicked man's judgment in the surrounding
    context. 'Because' makes the causal force clear in modern English; 'for' is possible
    but less natural here.
- source_word: נָטָה
  chosen: has stretched out
  alternatives:
  - has extended
  - has turned
  - has reached out
  lexicon: HALOT
  rationale: The verb literally means 'stretch out/extend.' With 'hand' as object,
    it idiomatically conveys hostile action. 'Has stretched out' preserves the concrete
    Hebrew image while remaining clear.
- source_word: אֶל
  chosen: against
  alternatives:
  - toward
  - to
  lexicon: HALOT
  rationale: Although the preposition normally means 'to/toward,' in this hostile
    context ('stretch out his hand toward God') English idiom requires 'against' to
    convey opposition rather than mere direction.
- source_word: אֵל
  chosen: God
  alternatives:
  - Mighty God
  - God Almighty
  lexicon: HALOT
  rationale: Here אֵל functions as the common divine title 'God.' Since שַׁדַּי appears
    in the next colon, rendering אֵל simply as 'God' avoids unnecessary duplication
    and preserves the parallelism.
- source_word: יָדוֹ
  chosen: his hand
  lexicon: HALOT
  rationale: A straightforward rendering. The singular is retained, preserving the
    Hebrew idiom of hostile action by 'stretching out the hand.'
- source_word: שַׁדַּי
  chosen: the Almighty
  alternatives:
  - Shaddai
  lexicon: HALOT
  rationale: Following the translation philosophy to translate titles, not transliterate
    them. 'The Almighty' is the standard and contextually fitting rendering of the
    divine title שַׁדַּי.
- source_word: יִתְגַּבָּר
  chosen: shows himself mighty
  alternatives:
  - acts defiantly
  - strengthens himself
  - prevails
  - behaves arrogantly
  lexicon: HALOT
  rationale: The hitpael of גבר conveys making oneself strong or acting powerfully.
    In context of rebellion against God, 'shows himself mighty' preserves the reflexive
    nuance and the irony of self-asserted strength against the Almighty. More interpretive
    options like 'acts defiantly' capture the sense but move further from the lexical
    form.
