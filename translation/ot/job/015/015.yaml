id: JOB.15.15
reference: Job 15:15
source:
  edition: WLC
  text: הֵ֣ן ב/קדש/ו לֹ֣א יַאֲמִ֑ין וְ֝/שָׁמַ֗יִם לֹא זַכּ֥וּ בְ/עֵינָֽי/ו־׃
translation:
  text: Look, he puts no trust even in his holy ones, and the heavens are not pure
    in his eyes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his saints.' The Hebrew says 'his holy ones,' likely referring here
      to heavenly beings.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֵן
  chosen: Look
  alternatives:
  - Behold
  - Indeed
  - See
  lexicon: HALOT
  rationale: Introduces emphatic attention to the statement. 'Look' is natural modern
    English and preserves the discourse force without archaic tone.
- source_word: בְּקְדֹשָׁיו
  chosen: in his holy ones
  alternatives:
  - in his saints
  - in his holy ones/holy beings
  lexicon: HALOT
  rationale: The phrase literally means 'in his holy ones.' In Job, this likely refers
    to heavenly holy beings rather than human saints. 'Holy ones' preserves the lexical
    sense and avoids importing later ecclesiastical connotations of 'saints.'
- source_word: לֹא יַאֲמִין
  chosen: he puts no trust
  alternatives:
  - he does not trust
  - he has no faith in
  lexicon: HALOT
  rationale: The Hiphil of אמן here means to place trust or confidence in. 'Puts no
    trust' is idiomatic and preserves the relational sense better than the potentially
    misleading 'has no faith in.'
- source_word: וְשָׁמַיִם
  chosen: and the heavens
  alternatives:
  - and heaven
  - even the heavens
  lexicon: HALOT
  rationale: The Hebrew is plural. 'The heavens' is the most direct rendering and
    fits the poetic parallelism with 'his holy ones.'
- source_word: לֹא זַכּוּ
  chosen: are not pure
  alternatives:
  - are not clean
  - are not innocent
  lexicon: HALOT
  rationale: זכה in this context denotes purity/cleanness rather than innocence in
    a judicial sense. 'Pure' fits the cosmic and moral-poetic imagery better than
    'innocent.'
- source_word: בְּעֵינָיו
  chosen: in his eyes
  alternatives:
  - in his sight
  - before him
  lexicon: HALOT
  rationale: Literally 'in his eyes.' This idiom communicates divine evaluation. 'In
    his eyes' preserves the Hebrew image while remaining clear in English.
