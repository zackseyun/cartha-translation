theological_decisions:
- issue: Referent of 'his holy ones'
  chosen_reading: heavenly holy beings/angels rather than human believers
  alternative_readings:
  - human saints
  - a deliberately broad reference to all holy beings
  rationale: Within Job's poetic context, the parallel with 'the heavens' strongly
    suggests celestial beings. The translation keeps the broader lexical form 'holy
    ones' in the main text so as not to over-specify beyond the Hebrew, while the
    rationale notes the likely referent.
  doctrine_reference: Translation philosophy §3, preserve theological tension rather
    than resolve it
