id: JOB.15.21
reference: Job 15:21
source:
  edition: WLC
  text: קוֹל פְּחָדִ֥ים בְּ/אָזְנָ֑י/ו בַּ֝/שָּׁל֗וֹם שׁוֹדֵ֥ד יְבוֹאֶֽ/נּוּ־׃
translation:
  text: A sound of terrors is in his ears; in prosperity the destroyer comes upon
    him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in peace' or 'in safety'; Hebrew שָׁלוֹם can denote peace, well-being,
      or prosperity.
    reason: lexical_alternative
lexical_decisions:
- source_word: קוֹל
  chosen: A sound
  alternatives:
  - The sound
  - A voice
  lexicon: HALOT
  rationale: קוֹל commonly denotes 'sound' or 'voice.' Here the construct with פְּחָדִים
    points to an auditory phenomenon rather than articulated speech, so 'sound' is
    preferred. The indefinite English article reflects the lack of a Hebrew article.
- source_word: פְּחָדִים
  chosen: terrors
  alternatives:
  - fears
  - dreadful things
  lexicon: HALOT
  rationale: The plural conveys multiple terrors or terrifying alarms, not merely
    an internal emotion of fear. 'Terrors' preserves the force and vividness of the
    plural better than 'fears'.
- source_word: בְּאָזְנָיו
  chosen: is in his ears
  alternatives:
  - is in his hearing
  - rings in his ears
  lexicon: HALOT
  rationale: Literally 'in his ears.' 'Is in his ears' keeps the concrete Hebrew image
    while remaining natural English. More idiomatic expansions like 'rings in his
    ears' add nuance not explicit in the text.
- source_word: בַּשָּׁלוֹם
  chosen: in prosperity
  alternatives:
  - in peace
  - when all is well
  - in safety
  lexicon: HALOT
  rationale: שָׁלוֹם can mean peace, well-being, or prosperity. In this context of
    sudden calamity overtaking the wicked at a time of apparent security, 'in prosperity'
    best captures the sense of well-being and ease. The alternative 'in peace' is
    worth preserving because it is also lexically possible.
- source_word: שׁוֹדֵד
  chosen: the destroyer
  alternatives:
  - the plunderer
  - the marauder
  - the ravager
  lexicon: HALOT
  rationale: The participle denotes one who devastates or plunders. 'Destroyer' communicates
    the threatening figure in accessible modern English and fits the broader context
    of ruin. 'Plunderer' is possible but narrower.
- source_word: יְבוֹאֶנּוּ
  chosen: comes upon him
  alternatives:
  - comes against him
  - comes to him
  - will come upon him
  lexicon: HALOT
  rationale: The verb is 'comes' with a 3ms object suffix, literally 'comes him.'
    In English this is best expressed as 'comes upon him' or 'comes against him.'
    'Comes upon him' conveys hostile arrival without overinterpreting. Present tense
    is retained to match the Hebrew poetic style, though a future nuance is possible
    in context.
