id: JOB.15.34
reference: Job 15:34
source:
  edition: WLC
  text: כִּֽי עֲדַ֣ת חָנֵ֣ף גַּלְמ֑וּד וְ֝/אֵ֗שׁ אָכְלָ֥ה אָֽהֳלֵי שֹֽׁחַד־־׃
translation:
  text: For the company of the godless is barren, and fire consumes the tents of bribery.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the assembly of the hypocrite is barren.' The Hebrew חָנֵף can mean
      'hypocrite,' but in Job it often carries the broader sense 'godless' or 'impious.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'the tents of bribery' or 'the tents of a bribe.' The phrase refers
      to dwellings marked by corrupt gain.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Surely
  - Because
  lexicon: HALOT
  rationale: Introduces the ground or explanation for the preceding statement. 'For'
    fits the discourse connection in English without overinterpreting the nuance.
- source_word: עֲדַת
  chosen: the company of
  alternatives:
  - the congregation of
  - the assembly of
  lexicon: HALOT
  rationale: The noun denotes a gathered group or community. 'Company' is natural
    modern English and avoids overly ecclesial overtones that 'congregation' might
    suggest in this wisdom context.
- source_word: חָנֵף
  chosen: the godless
  alternatives:
  - the hypocrite
  - the profane
  - the impious
  lexicon: HALOT
  rationale: In Job, חנף commonly carries the sense of irreverent or godless rather
    than merely socially insincere. 'Godless' best captures the moral-religious force
    in accessible English. The singular in Hebrew functions collectively after עֲדַת,
    so an English collective expression is appropriate.
- source_word: גַּלְמוּד
  chosen: barren
  alternatives:
  - sterile
  - desolate
  - unfruitful
  lexicon: HALOT
  rationale: The adjective conveys being bare, unproductive, or deprived of offspring/fruitfulness.
    'Barren' preserves the image succinctly and fits the wisdom-theme of the wicked's
    lack of lasting fruit.
- source_word: וְאֵשׁ
  chosen: and fire
  alternatives:
  - and a fire
  lexicon: HALOT
  rationale: The conjunction simply coordinates the second clause. English idiom does
    not require the indefinite article here.
- source_word: אָכְלָה
  chosen: consumes
  alternatives:
  - has consumed
  - devours
  - will consume
  lexicon: HALOT
  rationale: The qatal can express a gnomic or vivid present in wisdom literature.
    'Consumes' communicates the general truth force in context better than a simple
    past.
- source_word: אָהֳלֵי
  chosen: the tents of
  alternatives:
  - the dwellings of
  - the homes of
  lexicon: HALOT
  rationale: Literally 'tents of.' Retaining 'tents' preserves the concrete imagery
    and traditional Near Eastern setting, while remaining understandable in English.
- source_word: שֹׁחַד
  chosen: bribery
  alternatives:
  - bribe
  - those who take bribes
  lexicon: HALOT
  rationale: The noun means 'bribe' or 'bribery.' In construct with 'tents,' the phrase
    is somewhat elliptical; 'tents of bribery' is wooden, so 'tents of bribery' retained
    conceptually but smoothed as 'tents of bribery' in the full clause. 'Bribery'
    captures the practice characterizing those dwellings without adding agents not
    explicit in the Hebrew.
