id: JOB.15.18
reference: Job 15:18
source:
  edition: WLC
  text: אֲשֶׁר חֲכָמִ֥ים יַגִּ֑ידוּ וְ/לֹ֥א כִֽ֝חֲד֗וּ מֵ/אֲבוֹתָֽ/ם־׃
translation:
  text: what wise men declare, and have not hidden from their fathers—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'what their fathers did not hide,' or 'and have hidden nothing received
      from their fathers.' The Hebrew allows more than one construal of the relation
      between 'hidden' and 'their fathers.'
    reason: alternative_reading
lexical_decisions:
- source_word: אֲשֶׁר
  chosen: what
  alternatives:
  - which
  - that which
  lexicon: HALOT
  rationale: Introduces the content being described from the previous verse. 'What'
    is idiomatic English for the relative clause here and preserves the sense of 'that
    which' without stiffness.
- source_word: חֲכָמִים
  chosen: wise men
  alternatives:
  - the wise
  - wise ones
  lexicon: HALOT
  rationale: Masculine plural noun. 'Wise men' is gender-accurate and natural in context,
    referring to ancestral sages rather than an abstract class. 'The wise' is possible
    but less concrete.
- source_word: יַגִּידוּ
  chosen: declare
  alternatives:
  - tell
  - make known
  lexicon: HALOT
  rationale: Hiphil of נגד conveys making something known or declaring it. 'Declare'
    fits the elevated tone of Job and the transmission of received wisdom.
- source_word: וְלֹא
  chosen: and have not
  alternatives:
  - and did not
  lexicon: HALOT
  rationale: Coordinates the second verbal idea with negation. English present perfect
    works well in this gnomic, proverbial context tied to what the wise transmit.
- source_word: כִחֲדוּ
  chosen: hidden
  alternatives:
  - concealed
  - denied
  lexicon: HALOT
  rationale: The verb commonly means to hide or conceal. 'Hidden' best matches the
    likely sense of not withholding inherited wisdom. 'Denied' is less suitable in
    this context.
- source_word: מֵאֲבוֹתָם
  chosen: from their fathers
  alternatives:
  - from their ancestors
  lexicon: HALOT
  rationale: 'The preposition מִן with ''their fathers'' most naturally means source/origin:
    they did not hide it from what came from their fathers, i.e., they transmitted
    ancestral teaching openly. ''From their fathers'' preserves the Hebrew wording;
    ''from their ancestors'' is interpretive and smoother but less formal.'
