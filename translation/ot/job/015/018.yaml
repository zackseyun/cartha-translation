theological_decisions:
- issue: Interpretation of מֵאֲבוֹתָם in relation to כִחֲדוּ
  chosen_reading: from their fathers
  alternative_readings:
  - what their fathers did not hide
  - and did not conceal it from their fathers
  - and have hidden nothing received from their fathers
  rationale: The Hebrew is syntactically compact and allows some ambiguity about whether
    the fathers are the source of the tradition or the persons from whom something
    was concealed. The main text preserves the Hebrew's wording most directly rather
    than resolving the ambiguity beyond the text. This is not a doctrinally charged
    issue, but preserving the tension aligns with the translation philosophy.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it'
