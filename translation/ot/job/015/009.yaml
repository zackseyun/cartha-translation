id: JOB.15.9
reference: Job 15:9
source:
  edition: WLC
  text: מַה יָּ֭דַעְתָּ וְ/לֹ֣א נֵדָ֑ע תָּ֝בִ֗ין וְֽ/לֹא עִמָּ֥/נוּ הֽוּא־־׃
translation:
  text: What do you know that we do not know? What do you understand that is not with
    us?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'that we do not have.' The Hebrew literally says, 'and it is not with
      us.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מַה
  chosen: What
  alternatives:
  - What is it that
  lexicon: HALOT
  rationale: Interrogative pronoun introducing the rhetorical question. Simple 'What'
    best matches the concise Hebrew and natural English style.
- source_word: יָּדַעְתָּ
  chosen: do you know
  alternatives:
  - have you known
  - did you know
  lexicon: HALOT
  rationale: Qal perfect 2ms of ידע in a rhetorical present sense. English present
    'do you know' communicates the force better than a wooden past/perfect.
- source_word: וְלֹא נֵדָע
  chosen: that we do not know
  alternatives:
  - and we do not know
  - which we do not know
  lexicon: HALOT
  rationale: 'The conjunction plus negation and 1cp verb functions idiomatically after
    the interrogative: ''what do you know that we do not know?'' Using ''that'' yields
    natural English while preserving the contrast.'
- source_word: תָּבִין
  chosen: do you understand
  alternatives:
  - do you discern
  - do you perceive
  lexicon: HALOT
  rationale: בין commonly denotes understanding or discernment. 'Understand' is the
    clearest modern English equivalent in this parallel line.
- source_word: וְלֹא עִמָּנוּ הוּא
  chosen: that is not with us
  alternatives:
  - that we do not have
  - that is not among us
  - and it is not with us
  lexicon: HALOT
  rationale: The phrase literally reads 'and not with us is it/he.' In context, the
    implied referent is the understanding just mentioned, so 'that is not with us'
    preserves the metaphor of possession/presence without over-paraphrasing. 'That
    we do not have' is possible but less formally tied to the Hebrew preposition עִם
    ('with').
