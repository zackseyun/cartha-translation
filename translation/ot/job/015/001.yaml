id: JOB.15.1
reference: Job 15:1
source:
  edition: WLC
  text: וַ֭/יַּעַן אֱלִיפַ֥ז הַֽ/תֵּימָנִ֗י וַ/יֹּאמַֽר׃
translation:
  text: 'Then Eliphaz the Temanite answered and said:'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיַּעַן
  chosen: answered
  alternatives:
  - responded
  lexicon: HALOT
  rationale: From ענה in the narrative formula 'answered and said.' Although no direct
    question immediately precedes in the verse itself, English convention preserves
    the idiom naturally as 'answered,' signaling a reply in the dialogue.
- source_word: אֱלִיפַז
  chosen: Eliphaz
  rationale: Personal name transliterated according to standard English convention,
    following the translation philosophy to transliterate names rather than translate
    them.
- source_word: הַתֵּימָנִי
  chosen: the Temanite
  alternatives:
  - the man from Teman
  lexicon: HALOT
  rationale: Gentilic adjective from Teman, identifying Eliphaz by regional origin.
    'The Temanite' is concise, idiomatic, and preserves the appositional title-like
    force of the Hebrew.
- source_word: וַיֹּאמַר
  chosen: and said
  alternatives:
  - saying
  lexicon: HALOT
  rationale: Standard rendering of אמר in Hebrew narrative. In combination with 'answered,'
    the formula 'answered and said' is best preserved rather than reduced, since both
    verbs are present in the source text.
- source_word: וַ
  chosen: Then
  alternatives:
  - And
  rationale: The prefixed waw on the opening verb marks narrative progression. 'Then'
    communicates the discourse sequence more naturally in modern English than repeated
    'And,' while remaining faithful to the flow.
