id: JOB.15.3
reference: Job 15:3
source:
  edition: WLC
  text: הוֹכֵ֣חַ בְּ֭/דָבָר לֹ֣א יִסְכּ֑וֹן וּ֝/מִלִּ֗ים לֹא יוֹעִ֥יל בָּֽ/ם־׃
translation:
  text: Should he argue with useless words, or with speech that does no good?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Should he reason with unprofitable talk, and with words by which he
      can do no good?'
    reason: lexical_alternative
lexical_decisions:
- source_word: הוֹכֵחַ
  chosen: argue
  alternatives:
  - reason
  - reprove
  - contend
  lexicon: HALOT
  rationale: The Hiphil participle of יכח can mean to argue, reason, or reprove depending
    on context. In Job's disputation setting, Eliphaz is criticizing Job's manner
    of speaking, so 'argue' best captures verbal contention without importing a formal
    legal nuance too strongly. The interrogative force is supplied from context with
    the following clauses.
- source_word: בְּדָבָר
  chosen: with ... words
  alternatives:
  - with a word
  - with a matter
  - with speech
  lexicon: HALOT
  rationale: דָבָר has a broad range including 'word,' 'matter,' or 'thing.' Here,
    paired with 'מִלִּים' in the next colon, it refers to speech. Rendering it as
    'words' preserves the parallelism in natural English.
- source_word: לֹא יִסְכּוֹן
  chosen: useless
  alternatives:
  - unprofitable
  - not beneficial
  - without value
  lexicon: HALOT
  rationale: The verb סכן here conveys being of use or benefit. Rather than a wooden
    'words that are not profitable,' 'useless words' gives the same sense in readable
    modern English and matches the accusation of futility.
- source_word: וּמִלִּים
  chosen: or with speech
  alternatives:
  - and words
  - or words
  lexicon: HALOT
  rationale: מִלִּים means 'words,' but varying the English to 'speech' avoids awkward
    repetition while preserving the synonymous parallelism. The conjunction is rendered
    'or' because the line presents parallel alternatives in a rhetorical question.
- source_word: לֹא יוֹעִיל בָּם
  chosen: that does no good
  alternatives:
  - by which he cannot profit
  - that is of no benefit
  - that does not help
  lexicon: HALOT
  rationale: יועיל means 'to profit, benefit, help.' The prepositional suffix בם most
    naturally refers back to the words/speech. 'That does no good' is idiomatic English
    that preserves the sense of ineffectiveness.
