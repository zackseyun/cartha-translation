id: JOB.15.13
reference: Job 15:13
source:
  edition: WLC
  text: כִּֽי תָשִׁ֣יב אֶל אֵ֣ל רוּחֶ֑/ךָ וְ/הֹצֵ֖אתָ מִ/פִּ֣י/ךָ מִלִּֽין־־׃
translation:
  text: that you turn your spirit against God and bring words out of your mouth?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'toward God.' The Hebrew literally reads 'to/toward God'; 'against God'
      is chosen in the main text because the context is accusatory and implies opposition.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: that
  alternatives:
  - for
  - because
  lexicon: HALOT
  rationale: Here כִּי introduces the content or grounds of Eliphaz's accusation in
    the preceding question, functioning well in English as 'that' after the implied
    sense 'why.' 'For/because' is possible but less natural in the immediate syntax.
- source_word: תָשִׁיב
  chosen: you turn
  alternatives:
  - you return
  - you direct
  - you bring back
  lexicon: HALOT
  rationale: The Hiphil of שוב commonly means 'turn back/turn/direct.' In this context
    with אֶל אֵל and רוּחֶךָ, the sense is not physical return but directing one's
    inner disposition toward God. 'Turn' is concise and idiomatic.
- source_word: אֶל אֵל
  chosen: against God
  alternatives:
  - to God
  - toward God
  lexicon: HALOT
  rationale: Although אֶל normally means 'to/toward,' in this accusatory context Eliphaz
    charges Job with setting his spirit in opposition to God. Rendering it woodenly
    as 'to God' is possible but unclear in English. 'Against God' brings out the hostile
    force implied by the context while remaining within the semantic range of directed
    orientation.
- source_word: רוּחֶךָ
  chosen: your spirit
  alternatives:
  - your wind
  - your breath
  - your temper
  lexicon: HALOT
  rationale: רוּחַ can denote wind, breath, spirit, or disposition. Here it refers
    to Job's inner spirit/disposition rather than literal breath. 'Spirit' preserves
    the anthropological depth better than the more interpretive 'temper.'
- source_word: וְהֹצֵאתָ
  chosen: and bring
  alternatives:
  - and let out
  - and utter
  - and bring forth
  lexicon: HALOT
  rationale: The verb יצא in Hiphil means 'bring out/cause to go out.' With 'words'
    and 'from your mouth,' 'bring' preserves the concrete imagery. English present
    'bring' fits the discourse better than a strict past form.
- source_word: מִפִּיךָ
  chosen: out of your mouth
  alternatives:
  - from your mouth
  lexicon: HALOT
  rationale: The preposition מִן marks source. 'Out of your mouth' is slightly more
    vivid and matches the imagery of words being brought forth.
- source_word: מִלִּין
  chosen: words
  alternatives:
  - sayings
  - speech
  lexicon: HALOT
  rationale: The Aramaizing plural means 'words' or 'utterances.' 'Words' is the most
    direct and natural rendering in context.
