id: JOB.15.22
reference: Job 15:22
source:
  edition: WLC
  text: לֹא יַאֲמִ֣ין שׁ֭וּב מִנִּי חֹ֑שֶׁךְ ו/צפו ה֣וּא אֱלֵי חָֽרֶב־־־׃
translation:
  text: He does not expect to return from darkness, and he is marked out for the sword.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'he is watched for by the sword,' 'he is destined for the sword,' or
      'he is expected by the sword.' The Hebrew verb is difficult, and the line likely
      conveys impending violent judgment.
    reason: lexical_alternative
lexical_decisions:
- source_word: לֹא
  chosen: does not
  alternatives:
  - not
  lexicon: HALOT
  rationale: Standard negation governing the following verb; rendered idiomatically
    with English auxiliary negation.
- source_word: יַאֲמִין
  chosen: expect
  alternatives:
  - believe
  - trust
  lexicon: HALOT
  rationale: Hiphil of אמן here expresses confidence/expectation rather than religious
    belief; in context of future outcome, 'expect' best conveys the sense.
- source_word: שׁוּב
  chosen: to return
  alternatives:
  - to come back
  - to turn back
  lexicon: HALOT
  rationale: 'Infinitive construct after יַאֲמִין gives the content of expectation:
    returning/backcoming.'
- source_word: מִנִּי חֹשֶׁךְ
  chosen: from darkness
  alternatives:
  - out of darkness
  lexicon: HALOT
  rationale: Preposition מן with 'darkness' indicates emergence from a state of gloom/disaster;
    'from darkness' is natural and sufficiently literal.
- source_word: וְצָפוּ
  chosen: is marked out
  alternatives:
  - is watched for
  - is destined
  - is expected
  lexicon: HALOT
  rationale: The passive participial/verbal form from צפה is difficult, but in context
    it conveys that the wicked man is under looming appointment toward judgment. 'Is
    marked out' preserves the passive sense without overinterpreting.
- source_word: הוּא
  chosen: he
  alternatives:
  - he himself
  lexicon: HALOT
  rationale: Independent pronoun retained as explicit subject in English; emphasis
    is mild and does not require 'himself' in the main text.
- source_word: אֱלֵי
  chosen: for
  alternatives:
  - toward
  - unto
  lexicon: HALOT
  rationale: Directional preposition with 'sword'; in idiomatic English after a passive
    predicate, 'for the sword' communicates destined direction more naturally than
    'toward the sword.'
- source_word: חָרֶב
  chosen: the sword
  alternatives:
  - a sword
  lexicon: HALOT
  rationale: The sword functions as a figure for violent death/judgment; the definite
    form in English is conventional and fits the Hebrew usage.
