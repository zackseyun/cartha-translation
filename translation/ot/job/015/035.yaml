id: JOB.15.35
reference: Job 15:35
source:
  edition: WLC
  text: הָרֹ֣ה עָ֭מָל וְ/יָ֣לֹד אָ֑וֶן וּ֝/בִטְנָ֗/ם תָּכִ֥ין מִרְמָֽה׃ס
translation:
  text: They conceive trouble and give birth to wickedness; their womb prepares deceit.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'They are pregnant with trouble and bear iniquity.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הָרֹה
  chosen: conceive
  alternatives:
  - are pregnant with
  - become pregnant with
  lexicon: HALOT
  rationale: Qal participle of הרה, used metaphorically here with labor/birth imagery.
    'Conceive' is idiomatic in English and preserves the figurative sequence with
    'give birth.'
- source_word: עָמָל
  chosen: trouble
  alternatives:
  - mischief
  - toil
  - misery
  lexicon: HALOT
  rationale: In wisdom literature עָמָל often denotes trouble, mischief, or harmful
    labor rather than neutral work. 'Trouble' fits the moral-poetic context and pairs
    well with the following terms of evil.
- source_word: וְיָלֹד
  chosen: give birth to
  alternatives:
  - bear
  - bring forth
  lexicon: HALOT
  rationale: Qal verb ילד in the birth metaphor. 'Give birth to' is natural modern
    English and keeps the metaphor explicit.
- source_word: אָוֶן
  chosen: wickedness
  alternatives:
  - iniquity
  - trouble
  - evil
  lexicon: HALOT
  rationale: אָוֶן can denote iniquity, evil, or trouble. Here, in parallel with deceit
    and within Eliphaz's moral indictment, 'wickedness' best captures the ethical
    force.
- source_word: וּבִטְנָם
  chosen: their womb
  alternatives:
  - their belly
  - their inward part
  lexicon: HALOT
  rationale: בטן literally means belly/womb. Because the verse sustains conception/birth
    imagery, 'womb' is the most coherent rendering, even though the noun is grammatically
    singular with a 3mp suffix and functions collectively.
- source_word: תָּכִין
  chosen: prepares
  alternatives:
  - produces
  - makes ready
  - establishes
  lexicon: HALOT
  rationale: Hiphil of כון commonly means prepare, make ready, establish. In this
    gestational metaphor, 'prepares' best conveys the inward formation of what will
    emerge.
- source_word: מִרְמָה
  chosen: deceit
  alternatives:
  - treachery
  - fraud
  - deception
  lexicon: HALOT
  rationale: מִרְמָה denotes deceit or treachery. 'Deceit' is concise, natural, and
    preserves the moral sense without over-specifying.
