theological_decisions:
- issue: Number/gender of the implied subject
  chosen_reading: They conceive ... their womb ...
  alternative_readings:
  - He conceives ... his womb ...
  - One conceives ... his womb ...
  rationale: The participle is singular in form, but the 3mp suffix on 'their womb'
    and the broader context of describing the wicked as a class support an English
    plural generic rendering. This avoids awkward singular-to-plural mismatch while
    preserving the representative force.
  doctrine_reference: 'DOCTRINE.md: Gender-accurate over gender-neutral; preserve
    source intent in representative/generic expressions'
