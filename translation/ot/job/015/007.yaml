id: JOB.15.7
reference: Job 15:7
source:
  edition: WLC
  text: הֲ/רִאישׁ֣וֹן אָ֭דָם תִּוָּלֵ֑ד וְ/לִ/פְנֵ֖י גְבָע֣וֹת חוֹלָֽלְתָּ׃
translation:
  text: Were you born as the first man, and were you brought forth before the hills?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "Were you born as Adam, the first man?" The Hebrew says "the first man"
      and may allude to Adam without explicitly using the name as a proper name.
    reason: alternative_reading
lexical_decisions:
- source_word: הֲ/רִאישׁוֹן
  chosen: as the first
  alternatives:
  - first
  - the first one
  lexicon: HALOT
  rationale: Interrogative הֲ introduces a rhetorical question. רִאשׁוֹן denotes priority
    in time/order. Rendering with 'as the first' fits the predicative sense with אָדָם
    and natural English syntax.
- source_word: אָדָם
  chosen: man
  alternatives:
  - humankind
  - Adam
  lexicon: HALOT
  rationale: Here the singular noun in Eliphaz's rhetorical question most naturally
    means 'man' in a representative sense ('the first man'), not the proper name Adam.
    This follows the doctrine guideline for אָדָם as 'man / humankind' according to
    context. 'Humankind' is less natural with the singular predicate, while 'Adam'
    would over-specify beyond what the immediate wording requires.
- source_word: תִּוָּלֵד
  chosen: were you born
  alternatives:
  - were you begotten
  lexicon: HALOT
  rationale: Niphal of ילד commonly means 'be born.' The passive/reflexive nuance
    is well represented by idiomatic English 'were you born.'
- source_word: וְ/לִ/פְנֵי
  chosen: and ... before
  alternatives:
  - and prior to
  lexicon: HALOT
  rationale: 'The conjunction plus preposition expresses a second coordinated question:
    ''and before.'' English supplies the repeated auxiliary for clarity.'
- source_word: גְבָעוֹת
  chosen: the hills
  alternatives:
  - the hills/mountains
  - the heights
  lexicon: HALOT
  rationale: גבעות refers to hills; in wisdom poetry it can evoke primordial topography.
    'Hills' is the most direct lexical equivalent and preserves the poetic image.
- source_word: חוֹלָלְתָּ
  chosen: were you brought forth
  alternatives:
  - were you formed
  - were you born
  - were you made to writhe forth
  lexicon: HALOT
  rationale: From חול/חיל in the polel/pual-style birth imagery, the verb can denote
    being brought forth or born, often with labor imagery. 'Were you brought forth'
    preserves the birth metaphor while avoiding awkwardness and distinguishing it
    from the earlier ילד.
