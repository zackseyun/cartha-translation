theological_decisions:
- issue: Whether אָדָם should be read as the proper name Adam or as generic 'man'
  chosen_reading: generic 'man' in the phrase 'the first man'
  alternative_readings:
  - Adam
  rationale: The verse is a rhetorical challenge about primordial wisdom and antiquity.
    While 'the first man' may allude conceptually to Adam, the Hebrew does not require
    the proper name. Rendering it generically preserves the source wording without
    importing a more specific identification than the text states.
  doctrine_reference: 'DOCTRINE.md: ''Original-language primacy over translation tradition''
    and contested/default guidance for אָדָם'
