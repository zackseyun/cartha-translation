id: JOB.15.33
reference: Job 15:33
source:
  edition: WLC
  text: יַחְמֹ֣ס כַּ/גֶּ֣פֶן בִּסְר֑/וֹ וְ/יַשְׁלֵ֥ךְ כַּ֝/זַּ֗יִת נִצָּתֽ/וֹ׃
translation:
  text: He will shake off his unripe grapes like a vine, and cast off his blossom
    like an olive tree.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'He strips off his unripe grapes like a vine.' The Hebrew verb often
      has a stronger sense of violence or stripping, but here the agricultural image
      suggests premature loss of fruit.
    reason: lexical_alternative
  - marker: b
    text: Or 'his flower' or 'his bloom.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יַחְמֹס
  chosen: he will shake off
  alternatives:
  - he will strip off
  - he will do violence to
  - he will plunder
  lexicon: HALOT
  rationale: In this agricultural simile, the verb describes the loss of fruit from
    a vine. Although the root often carries the sense of violence or wrong, here the
    contextual object 'his unripe grapes' favors a concrete result such as 'shake
    off' or 'strip off' rather than a more abstract 'do violence to.' 'Shake off'
    is idiomatic in English for fruit prematurely falling or being knocked off.
- source_word: כַּגֶּפֶן
  chosen: like a vine
  lexicon: HALOT
  rationale: Standard rendering of גפן in a simile introduced by כ. Singular 'a vine'
    is natural English and preserves the comparison.
- source_word: בִּסְרוֹ
  chosen: his unripe grapes
  alternatives:
  - his sour grapes
  - his young fruit
  lexicon: HALOT
  rationale: בֹּסֶר refers to immature grapes, not yet ripe. 'Unripe grapes' is the
    clearest modern English equivalent. The 3ms suffix is retained as 'his,' matching
    the personified wicked man in context.
- source_word: וְיַשְׁלֵךְ
  chosen: and cast off
  alternatives:
  - and throw down
  - and shed
  lexicon: HALOT
  rationale: The Hiphil of שלך commonly means 'throw' or 'cast.' With the object 'his
    blossom' in a tree simile, 'cast off' is idiomatic and preserves the active image
    of losing blossoms.
- source_word: כַּזַּיִת
  chosen: like an olive tree
  alternatives:
  - like an olive
  lexicon: HALOT
  rationale: Though זית can denote olive/olive tree, English requires 'olive tree'
    here because the comparison concerns dropping blossom.
- source_word: נִצָּתוֹ
  chosen: his blossom
  alternatives:
  - his flower
  - his bloom
  lexicon: HALOT
  rationale: The noun denotes the blossom or flower of a plant. 'Blossom' fits the
    olive-tree imagery and the idea of premature loss before fruiting.
