theological_decisions:
- issue: Anthropological scope of אֱנוֹשׁ and יְלוּד אִשָּׁה
  chosen_reading: Representative singular 'man' and 'one born of a woman' referring
    to humanity generally
  alternative_readings:
  - Gender-neutral 'human being' / 'anyone born of a woman'
  rationale: The Hebrew uses grammatically masculine singular forms with generic force.
    Per doctrine, gender-accurate rendering is preferred over flattening to gender-neutral
    language, while the idiom still clearly refers to humankind as a whole.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Moral versus forensic nuance in יִצְדַּק
  chosen_reading: 'Moral/state language: ''be righteous'''
  alternative_readings:
  - 'Forensic language: ''be justified'''
  - 'Evaluative language: ''be in the right'''
  rationale: In this poetic wisdom context, Eliphaz is stressing human inability to
    attain purity and righteousness before God, not articulating a technical doctrine
    of justification. 'Be righteous' preserves the broader Hebrew sense without importing
    later doctrinal categories.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3
