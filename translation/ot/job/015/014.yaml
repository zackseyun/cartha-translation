id: JOB.15.14
reference: Job 15:14
source:
  edition: WLC
  text: מָֽה אֱנ֥וֹשׁ כִּֽי יִזְכֶּ֑ה וְ/כִֽי יִ֝צְדַּ֗ק יְל֣וּד אִשָּֽׁה־־־׃
translation:
  text: What is man, that he should be pure, or one born of a woman, that he should
    be righteous?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'What is a human being...?' The Hebrew singular 'man' is generic, referring
      to humanity.
    reason: lexical_alternative
  - marker: b
    text: Or 'clean' for 'pure.' The Hebrew can denote cleanness or purity in a moral
      sense.
    reason: lexical_alternative
  - marker: c
    text: Or 'in the right' or 'justified' for 'righteous.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מָה
  chosen: What is
  alternatives:
  - What
  lexicon: HALOT
  rationale: Introduces a rhetorical question of worth or status. In English, 'What
    is man' naturally conveys the Hebrew interrogative construction.
- source_word: אֱנוֹשׁ
  chosen: man
  alternatives:
  - a human being
  - mortal man
  lexicon: HALOT
  rationale: '''Enosh'' emphasizes frail humanity or mortal man. ''Man'' preserves
    the singular representative force and matches the gender-accurate policy for generic
    masculine usage; the broader human sense is carried by the rhetorical context.'
- source_word: כִּי
  chosen: that
  alternatives:
  - that he might
  - that he should
  lexicon: HALOT
  rationale: 'Here כִּי after the interrogative introduces the result/purpose-like
    clause in a rhetorical question: ''that he should...?'' English ''that'' is idiomatic
    and concise.'
- source_word: יִזְכֶּה
  chosen: should be pure
  alternatives:
  - should be clean
  - could be pure
  - might be innocent
  lexicon: HALOT
  rationale: From זכה in the Qal, meaning to be clean/pure or free from impurity/guilt.
    'Be pure' fits the moral and ritual-overlapping sense in Job's wisdom context
    better than the more physical-sounding 'clean.'
- source_word: וְכִי
  chosen: or
  alternatives:
  - and
  - and that
  lexicon: HALOT
  rationale: In this parallel rhetorical structure, the conjunction introduces a second
    equivalent clause. English 'or' best reflects the paired alternatives in idiomatic
    poetic translation.
- source_word: יִצְדַּק
  chosen: should be righteous
  alternatives:
  - should be just
  - could be in the right
  - should be justified
  lexicon: HALOT
  rationale: From צדק in the Qal, here describing being righteous/in the right. 'Be
    righteous' preserves the adjectival/state sense and aligns with the moral argument
    of the verse better than the more forensic 'be justified.'
- source_word: יְלוּד אִשָּׁה
  chosen: one born of a woman
  alternatives:
  - a son of woman
  - one born by a woman
  lexicon: HALOT
  rationale: A Hebrew idiom for a human being in mortal weakness. 'One born of a woman'
    is natural English, preserves the singular representative force, and echoes the
    idiom used elsewhere in Job.
