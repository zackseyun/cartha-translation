id: JOB.15.6
reference: Job 15:6
source:
  edition: WLC
  text: יַרְשִֽׁיעֲ/ךָ֣ פִ֣י/ךָ וְ/לֹא אָ֑נִי וּ֝/שְׂפָתֶ֗י/ךָ יַעֲנוּ בָֽ/ךְ־־׃
translation:
  text: Your own mouth condemns you, and not I; your own lips testify against you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your own lips answer against you.' The Hebrew verb can more literally
      mean 'answer,' but here likely carries the sense of giving testimony.
    reason: lexical_alternative
lexical_decisions:
- source_word: יַרְשִׁיעֲךָ
  chosen: condemns you
  alternatives:
  - declares you guilty
  - proves you wicked
  lexicon: HALOT
  rationale: Hiphil of רשע commonly means to declare guilty or condemn. 'Condemns
    you' is idiomatic English and fits Eliphaz's accusation that Job's speech incriminates
    him. 'Proves you wicked' is possible but slightly more interpretive.
- source_word: פִיךָ
  chosen: your own mouth
  alternatives:
  - your mouth
  lexicon: HALOT
  rationale: 'Literally ''your mouth.'' Adding ''own'' brings out the reflexive force
    in context: Job is condemned by his own speech, not by Eliphaz.'
- source_word: וְלֹא אָנִי
  chosen: and not I
  alternatives:
  - not I
  - and it is not I
  lexicon: HALOT
  rationale: A direct contrast with the preceding clause. 'And not I' preserves the
    Hebrew emphasis and the adversative sense without overexpansion.
- source_word: וּשְׂפָתֶיךָ
  chosen: your own lips
  alternatives:
  - your lips
  lexicon: HALOT
  rationale: Literally 'your lips.' 'Own' is supplied for natural parallel emphasis
    with 'your own mouth' and to stress self-incrimination.
- source_word: יַעֲנוּ
  chosen: testify
  alternatives:
  - answer
  - bear witness
  - respond
  lexicon: HALOT
  rationale: 'ענה in this context carries a forensic sense: the lips answer as witnesses
    against Job. ''Testify'' communicates that legal/incriminating nuance better than
    the more generic ''answer'' or ''respond.'''
- source_word: בָךְ
  chosen: against you
  alternatives:
  - concerning you
  - in you
  lexicon: HALOT
  rationale: 'With the forensic nuance of יענו, the preposition is best rendered adversatively
    as ''against you'': Job''s own words witness against him.'
