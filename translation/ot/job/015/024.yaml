id: JOB.15.24
reference: Job 15:24
source:
  edition: WLC
  text: יְֽ֭בַעֲתֻ/הוּ צַ֣ר וּ/מְצוּקָ֑ה תִּ֝תְקְפֵ֗/הוּ כְּ/מֶ֤לֶךְ עָתִ֬יד לַ/כִּידֽוֹר׀׃
translation:
  text: Distress and anguish terrify him; they overpower him like a king ready for
    battle.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'like a king prepared for the assault/attack.' The Hebrew word translated
      'battle' is rare and may refer more specifically to an armed attack.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְבַעֲתֻהוּ
  chosen: terrify him
  alternatives:
  - frighten him
  - terrorize him
  lexicon: HALOT
  rationale: The Piel form of בעת conveys causing terror or sudden dread. 'Terrify
    him' is natural English and preserves the strong causative force better than the
    weaker 'frighten him.'
- source_word: צַר
  chosen: distress
  alternatives:
  - trouble
  - adversity
  - straits
  lexicon: HALOT
  rationale: In parallel with מְצוּקָה, the noun denotes constriction, trouble, or
    distress. 'Distress' fits the emotional-pressure context and pairs well with 'anguish'
    without becoming overly literal or archaic.
- source_word: מְצוּקָה
  chosen: anguish
  alternatives:
  - distress
  - trouble
  - constraint
  lexicon: HALOT
  rationale: The term often denotes severe pressure, straits, or anguish. Since צַר
    already covers 'distress,' rendering this as 'anguish' preserves the poetic parallelism
    while avoiding an awkward repetition in English.
- source_word: תִּתְקְפֵהוּ
  chosen: they overpower him
  alternatives:
  - it overpowers him
  - they prevail against him
  - they seize him
  lexicon: HALOT
  rationale: Though the verb is formally feminine singular, the preceding pair of
    nouns functions as a compound subject in poetic parallelism. English plural 'they
    overpower him' best reflects the twofold subject 'distress and anguish.' 'Overpower'
    captures the force of תקף, to prevail over or seize strongly.
- source_word: כְּמֶלֶךְ
  chosen: like a king
  alternatives:
  - as a king
  lexicon: HALOT
  rationale: The comparative כ is straightforward. 'Like a king' is idiomatic and
    preserves the simile.
- source_word: עָתִיד
  chosen: ready
  alternatives:
  - prepared
  - destined
  - poised
  lexicon: HALOT
  rationale: In context עָתִיד conveys being prepared or ready. 'Ready' is concise
    and natural in English.
- source_word: לַכִּידוֹר
  chosen: for battle
  alternatives:
  - for the assault
  - for the attack
  - for the javelin
  lexicon: HALOT
  rationale: The noun כידור is rare and contextually difficult. In this simile it
    most plausibly refers to martial engagement or assault. 'For battle' gives the
    likely sense in clear English. Because of the lexical uncertainty and possible
    more specific military nuance, an alternative is preserved in a footnote.
