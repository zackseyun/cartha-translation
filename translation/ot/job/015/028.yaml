id: JOB.15.28
reference: Job 15:28
source:
  edition: WLC
  text: וַ/יִּשְׁכּ֤וֹן עָ֘רִ֤ים נִכְחָד֗וֹת בָּ֭תִּים לֹא יֵ֣שְׁבוּ לָ֑/מוֹ אֲשֶׁ֖ר
    הִתְעַתְּד֣וּ לְ/גַלִּֽים׀־׃
translation:
  text: He has lived in ruined cities, in houses where no one dwells, which were destined
    to become heaps.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'He dwelt in destroyed cities, in houses where they do not live, which
      were appointed for heaps.' The Hebrew of this verse is compact and allows several
      closely related renderings, especially in the middle clause.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּשְׁכּוֹן
  chosen: He has lived
  alternatives:
  - And he dwelt
  - He settled
  lexicon: HALOT
  rationale: From שכן, 'to dwell/live/settle.' In context describing the wicked man's
    condition, English present perfect captures the resultant state in a vivid way
    while remaining close to the Hebrew narrative form. 'Dwelt' is more formal but
    less natural in modern English.
- source_word: עָרִים נִכְחָדוֹת
  chosen: ruined cities
  alternatives:
  - desolate cities
  - destroyed cities
  - forgotten cities
  lexicon: HALOT
  rationale: נכחדות is a passive participle from כחד, conveying places that have been
    wiped out, ruined, or desolated. 'Ruined cities' is idiomatic and fits the parallel
    with abandoned houses and rubble-heaps.
- source_word: בָּתִּים לֹא יֵשְׁבוּ לָמוֹ
  chosen: in houses where no one dwells
  alternatives:
  - houses uninhabited by them
  - houses in which they do not live
  - houses where none dwell for them
  lexicon: HALOT
  rationale: The Hebrew is compressed and somewhat difficult. The clause most naturally
    describes houses that are uninhabited/abandoned. Rendering with an indefinite
    subject, 'where no one dwells,' communicates the sense clearly in English without
    forcing the pronominal suffix into awkward wording.
- source_word: אֲשֶׁר הִתְעַתְּדוּ
  chosen: which were destined
  alternatives:
  - which were appointed
  - which were prepared
  - which were made ready
  lexicon: HALOT
  rationale: The Hitpael of עתד can mean 'to be prepared/appointed/destined.' Here
    it describes the houses/cities as marked out for a future condition. 'Destined'
    best captures the forward-looking force in natural English.
- source_word: לְגַלִּים
  chosen: to become heaps
  alternatives:
  - for ruins
  - for rubble-heaps
  - into mounds
  lexicon: HALOT
  rationale: גַּלִּים refers to heaps, especially heaps of stones or ruins. 'Become
    heaps' makes explicit the result implied by the preposition and reads naturally
    in English.
