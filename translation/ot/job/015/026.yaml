id: JOB.15.26
reference: Job 15:26
source:
  edition: WLC
  text: יָר֣וּץ אֵלָ֣י/ו בְּ/צַוָּ֑אר בַּ֝/עֲבִ֗י גַּבֵּ֥י מָֽגִנָּֽי/ו׃
translation:
  text: He rushes at him with his neck, with the thick bosses of his shields.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'He charges against him with outstretched neck, with the thick bosses
      of his shields.' The Hebrew image is vivid and somewhat compressed.
    reason: lexical_alternative
lexical_decisions:
- source_word: יָרוּץ
  chosen: rushes
  alternatives:
  - runs
  - charges
  lexicon: HALOT
  rationale: The verb רוץ means 'to run'; in this hostile context, 'rushes' conveys
    aggressive forward movement better than the more neutral 'runs,' while avoiding
    over-interpretive military coloring stronger than the Hebrew requires.
- source_word: אֵלָיו
  chosen: at him
  alternatives:
  - against him
  - to him
  lexicon: HALOT
  rationale: With רוץ in a hostile context, אֶל naturally carries adversative force.
    'At him' is idiomatic English and preserves the sense of attack; 'against him'
    is possible but slightly more interpretive.
- source_word: בְּצַוָּאר
  chosen: with his neck
  alternatives:
  - with neck outstretched
  - with stiff neck
  lexicon: HALOT
  rationale: The phrase is literally 'with neck.' It likely depicts headlong, defiant
    assault, but the Hebrew does not explicitly state 'outstretched' or 'stiff,' so
    the main text keeps the concrete image and leaves fuller interpretation implicit.
- source_word: בַּעֲבִי
  chosen: with the thick
  alternatives:
  - in the thickness of
  - with the massive
  lexicon: HALOT
  rationale: עֳבִי denotes thickness or massiveness. 'With the thick' works idiomatically
    when followed by 'bosses,' preserving the construct-like relation in context.
    'Massive' is possible but more dynamic.
- source_word: גַּבֵּי
  chosen: bosses
  alternatives:
  - backs
  - convex surfaces
  - protuberances
  lexicon: HALOT
  rationale: In connection with shields, גַּבִּים/גַּבֵּי is commonly understood as
    the raised bosses or bulging parts. 'Bosses' is the standard precise term for
    shield projections, though less common in modern English; alternatives are less
    exact.
- source_word: מָגִנָּיו
  chosen: his shields
  alternatives:
  - his shield
  lexicon: HALOT
  rationale: The form is plural with 3ms suffix, so 'his shields' is the straightforward
    rendering. Some may smooth the image toward a singular collective, but the Hebrew
    points to plural.
