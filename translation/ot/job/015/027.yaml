id: JOB.15.27
reference: Job 15:27
source:
  edition: WLC
  text: כִּֽי כִסָּ֣ה פָנָ֣י/ו בְּ/חֶלְבּ֑/וֹ וַ/יַּ֖עַשׂ פִּימָ֣ה עֲלֵי כָֽסֶל־־׃
translation:
  text: because he has covered his face with his fat, and has put fatness on his loins.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for he covered his face with fat, and made folds of fat on his flanks.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  lexicon: HALOT
  rationale: Introduces the reason or explanatory basis for the preceding description.
    'Because' is natural English and preserves the causal force.
- source_word: כִסָּה
  chosen: has covered
  alternatives:
  - covered
  lexicon: HALOT
  rationale: The verb means 'cover, conceal.' English present perfect fits the discourse
    well in describing the settled condition of the wicked man.
- source_word: פָנָיו
  chosen: his face
  alternatives:
  - his face/presence
  lexicon: HALOT
  rationale: The concrete sense 'face' is most natural here in parallel with bodily
    imagery. A broader sense such as 'presence' is not likely in this context.
- source_word: בְּחֶלְבּוֹ
  chosen: with his fat
  alternatives:
  - with his fatness
  lexicon: HALOT
  rationale: חֵלֶב commonly denotes fat. Here it depicts gross prosperity or self-indulgence
    in vivid bodily terms. 'With his fat' keeps the concrete metaphor rather than
    abstracting it too quickly.
- source_word: וַיַּעַשׂ
  chosen: has put
  alternatives:
  - made
  - formed
  lexicon: HALOT
  rationale: Although the verb is broadly 'make/do,' in this collocation an idiomatic
    English rendering is needed. 'Has put' conveys the sense of adding or laying on
    bodily bulk.
- source_word: פִּימָה
  chosen: fatness
  alternatives:
  - thickness
  - folds of fat
  lexicon: HALOT
  rationale: This noun is rare and likely refers to thickness or a fatty covering.
    'Fatness' is concise and fits the imagery of corpulence and indulgence.
- source_word: עֲלֵי
  chosen: 'on'
  alternatives:
  - upon
  - over
  lexicon: HALOT
  rationale: Simple spatial preposition; 'on' is the most natural modern English equivalent.
- source_word: כָסֶל
  chosen: his loins
  alternatives:
  - his flanks
  - his hips
  lexicon: HALOT
  rationale: כֶּסֶל can denote the loins/flanks, the bodily area associated with fat
    deposits in poetic description. 'Loins' preserves the traditional anatomical sense
    without over-specifying.
