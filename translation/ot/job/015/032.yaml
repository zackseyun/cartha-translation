id: JOB.15.32
reference: Job 15:32
source:
  edition: WLC
  text: בְּֽ/לֹא י֭וֹמ/וֹ תִּמָּלֵ֑א וְ֝/כִפָּת֗/וֹ לֹ֣א רַעֲנָֽנָה־׃
translation:
  text: It will be paid in full before his time, and his branch will not stay green.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'It will be fulfilled before his time.' The Hebrew verb literally means
      'will be filled/full,' and the exact nuance in context is debated.
    reason: lexical_alternative
  - marker: b
    text: Or 'his palm branch' or 'his top shoot.' The Hebrew term refers to a branch-like
      part of a tree or plant.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּלֹא יוֹמוֹ
  chosen: before his time
  alternatives:
  - not in his day
  - before his day
  lexicon: HALOT
  rationale: The preposition ב with לֹא plus יוֹם in construct with the pronominal
    suffix yields the sense 'not in his day/time,' idiomatically 'before his time.'
    This fits the context of premature judgment better than a more wooden 'not in
    his day.'
- source_word: תִּמָּלֵא
  chosen: will be paid in full
  alternatives:
  - will be fulfilled
  - will be completed
  - will be cut off
  lexicon: HALOT
  rationale: Niphal of מלא literally means 'be full/filled.' In this context, with
    the preceding temporal phrase and the surrounding imagery of the wicked's premature
    downfall, the sense is that his due is 'fully paid' before its proper time. This
    avoids the awkwardly vague 'it will be fulfilled' while staying close to the underlying
    idea of fullness. 'Will be cut off' is interpretive and not the lexical sense
    of מלא itself.
- source_word: כִפָּתוֹ
  chosen: his branch
  alternatives:
  - his palm branch
  - his crown
  - his top shoot
  lexicon: HALOT
  rationale: The noun likely denotes a branch, bough, or top shoot, fitting the vegetal
    imagery continued by 'stay green.' 'Palm branch' is too specific in English here,
    and 'crown' would shift the image away from plant life.
- source_word: לֹא רַעֲנָנָה
  chosen: will not stay green
  alternatives:
  - will not be luxuriant
  - will not be fresh
  - will not flourish
  lexicon: HALOT
  rationale: רענן conveys freshness, greenness, or luxuriance, especially of vegetation.
    'Will not stay green' preserves the plant metaphor naturally in English. 'Will
    not flourish' is possible but more abstract; 'green' keeps the imagery concrete.
