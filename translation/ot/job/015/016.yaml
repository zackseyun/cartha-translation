id: JOB.15.16
reference: Job 15:16
source:
  edition: WLC
  text: אַ֭ף כִּֽי נִתְעָ֥ב וְֽ/נֶאֱלָ֑ח אִישׁ שֹׁתֶ֖ה כַ/מַּ֣יִם עַוְלָֽה־־׃
translation:
  text: how much less a man who is detestable and corrupt, who drinks injustice like
    water!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'filthy' for 'corrupt' (Hebrew נֶאֱלָח), a rare term for being polluted
      or foul.
    reason: lexical_alternative
  - marker: b
    text: Or 'iniquity' or 'wrongdoing' for 'injustice.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַף כִּי
  chosen: how much less
  alternatives:
  - indeed that
  - how much more
  lexicon: HALOT
  rationale: 'In context this idiom advances an a fortiori argument from the previous
    verse: if even holy beings/heavens are not pure before God, then much less man.
    Rendering the pair idiomatically as ''how much less'' best captures the logic
    rather than a wooden ''indeed that''.'
- source_word: נִתְעָב
  chosen: detestable
  alternatives:
  - abominable
  - abhorrent
  lexicon: HALOT
  rationale: The Niphal participle describes one who is loathsome or abominable. 'Detestable'
    is strong, natural English and preserves the moral revulsion of the Hebrew.
- source_word: נֶאֱלָח
  chosen: corrupt
  alternatives:
  - filthy
  - foul
  - tainted
  lexicon: HALOT
  rationale: This rare form conveys being polluted, foul, or morally tainted. 'Corrupt'
    communicates moral defilement clearly in modern English, while 'filthy' is possible
    but can sound more merely physical.
- source_word: אִישׁ
  chosen: a man
  alternatives:
  - a person
  - man
  lexicon: HALOT
  rationale: The Hebrew is singular masculine 'man.' Per the gender-accurate policy,
    'a man' preserves the source form and fits the representative sense here.
- source_word: שֹׁתֶה
  chosen: who drinks
  alternatives:
  - drinking
  lexicon: HALOT
  rationale: The participle is rendered with a relative clause for smooth English
    while preserving the ongoing/habitual sense.
- source_word: כַמַּיִם
  chosen: like water
  alternatives:
  - as water
  lexicon: HALOT
  rationale: A straightforward simile indicating ease, frequency, and naturalness.
- source_word: עַוְלָה
  chosen: injustice
  alternatives:
  - wrongdoing
  - iniquity
  - unrighteousness
  lexicon: HALOT
  rationale: The noun denotes injustice, wrong, or unrighteousness. 'Injustice' preserves
    the ethical force without archaic tone; 'iniquity' is traditional but less accessible.
    The image is of man consuming moral evil as readily as water.
