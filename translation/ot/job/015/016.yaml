theological_decisions:
- issue: Representative masculine language
  chosen_reading: a man
  alternative_readings:
  - a person
  - humanity
  rationale: The Hebrew uses singular masculine אִישׁ in a representative statement
    about mankind. Following the translation philosophy's gender-accurate principle,
    the main text keeps 'a man' rather than neutralizing it.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Moral term עַוְלָה
  chosen_reading: injustice
  alternative_readings:
  - iniquity
  - wrongdoing
  - unrighteousness
  rationale: No doctrinally contested term table entry governs this word, but the
    rendering should preserve moral gravity without importing later theological jargon.
    'Injustice' communicates the ethical perversity plainly.
  doctrine_reference: DOCTRINE.md §Translation philosophy 6
