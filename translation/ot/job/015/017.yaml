id: JOB.15.17
reference: Job 15:17
source:
  edition: WLC
  text: אֲחַוְ/ךָ֥ שְֽׁמַֽע לִ֑/י וְ/זֶֽה חָ֝זִ֗יתִי וַ/אֲסַפֵּֽרָה־־׃
translation:
  text: I will tell you; listen to me. What I have seen, I will recount—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I will show you; hear me; and this I have seen, and I will declare it.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲחַוְךָ
  chosen: I will tell you
  alternatives:
  - I will show you
  - I will declare to you
  lexicon: HALOT
  rationale: The Piel of חוה here introduces Eliphaz's forthcoming speech. In context,
    'tell you' is natural modern English and fits the speech-act sense better than
    the more literal but potentially misleading 'show you,' since no visual demonstration
    is in view.
- source_word: שְׁמַע לִי
  chosen: listen to me
  alternatives:
  - hear me
  lexicon: HALOT
  rationale: Imperative + preposition expresses attentive hearing directed toward
    the speaker. 'Listen to me' is idiomatic and preserves the force of appeal more
    clearly for modern readers than 'hear me.'
- source_word: וְזֶה
  chosen: What
  alternatives:
  - and this
  - this
  lexicon: HALOT
  rationale: 'Though formally ''and this,'' the phrase introduces the content of what
    follows: ''what I have seen.'' Rendering it as ''What'' produces natural English
    while preserving the demonstrative''s function as a discourse introducer.'
- source_word: חָזִיתִי
  chosen: I have seen
  alternatives:
  - I saw
  - I have perceived
  lexicon: HALOT
  rationale: The perfect refers to Eliphaz's claimed personal observation. 'I have
    seen' preserves the experiential force and supports the present relevance of that
    observation in his argument.
- source_word: וַאֲסַפֵּרָה
  chosen: I will recount
  alternatives:
  - I will declare
  - I will tell
  lexicon: HALOT
  rationale: The cohortative form conveys the speaker's intention to narrate or set
    forth what he has observed. 'Recount' fits the sense of relating observed experience
    and avoids flattening the nuance into a generic 'tell.'
