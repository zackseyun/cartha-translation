theological_decisions:
- issue: Referent of 'his mouth' in the final clause
  chosen_reading: the wicked man's mouth
  alternative_readings:
  - God's mouth
  rationale: The immediate grammatical antecedent is the singular wicked person described
    throughout the context, so the draft keeps the nearest referent. However, because
    'breath of his mouth' elsewhere can describe divine judgment, the alternative
    is worth preserving in a footnote rather than being silently excluded.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
