id: JOB.15.30
reference: Job 15:30
source:
  edition: WLC
  text: לֹֽא יָס֨וּר מִנִּי חֹ֗שֶׁךְ יֹֽ֭נַקְתּ/וֹ תְּיַבֵּ֣שׁ שַׁלְהָ֑בֶת וְ֝/יָס֗וּר
    בְּ/ר֣וּחַ פִּֽי/ו־׀־׃
translation:
  text: He will not depart from darkness; a flame will dry up his shoots, and by the
    breath of his mouth he will pass away.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'by the breath of His mouth he will pass away,' if the final phrase
      is taken as referring to God rather than to the wicked man.
    reason: alternative_reading
  - marker: b
    text: '''His shoots'' renders a plant image: the wicked is pictured like a tree
      whose fresh growth is scorched and dried up.'
    reason: cultural_note
lexical_decisions:
- source_word: יָסוּר ... מִנִּי חֹשֶׁךְ
  chosen: He will not depart from darkness
  alternatives:
  - He will not turn aside from darkness
  - He will not escape darkness
  lexicon: HALOT
  rationale: סור commonly means 'turn aside, depart, remove oneself.' With מן plus
    'darkness,' the sense is that the wicked person cannot get away from darkness/calamity.
    'Depart from darkness' is formally close while still natural English; 'escape
    darkness' is interpretive and therefore kept as an alternative.
- source_word: יֹנַקְתּוֹ
  chosen: his shoots
  alternatives:
  - his suckers
  - his tender branch
  - his sapling
  lexicon: HALOT
  rationale: From ינק in the nominal form meaning a shoot/sprout/sucker of a plant.
    In this arboreal judgment image, 'his shoots' is clear modern English and preserves
    the metaphor. 'Suckers' is more literal botanically but awkward in English Bible
    style.
- source_word: תְּיַבֵּשׁ שַׁלְהָבֶת
  chosen: a flame will dry up
  alternatives:
  - a flame will wither
  - a blazing flame will dry up
  lexicon: HALOT
  rationale: יבש in the Piel means 'dry up, wither.' שלהבת denotes flame/blaze. 'A
    flame will dry up' preserves the image of scorching destruction against the plant
    metaphor.
- source_word: וְיָסוּר
  chosen: he will pass away
  alternatives:
  - he will depart
  - it will be swept away
  lexicon: HALOT
  rationale: The second סור likely shifts from inability to escape to actual removal/perishing.
    Because the subject is masculine singular and the verse concerns the wicked person,
    'he will pass away' communicates the result in idiomatic English. A more wooden
    'he will depart' is possible but less clear in context.
- source_word: בְּרוּחַ פִּיו
  chosen: by the breath of his mouth
  alternatives:
  - by the wind of his mouth
  - by the blast of his mouth
  lexicon: HALOT
  rationale: רוּחַ can mean breath, wind, or spirit. With 'of his mouth,' the concrete
    sense 'breath' is primary. The phrase may evoke destructive utterance or divine
    blast; 'breath of his mouth' preserves the ambiguity better than 'wind.'
- source_word: פִּיו
  chosen: his mouth
  alternatives:
  - His mouth
  lexicon: HALOT
  rationale: The 3ms suffix most naturally refers back to the wicked man in the immediate
    syntax. Some interpreters take it as God's mouth, but the Hebrew does not explicitly
    mark a subject change; the main text preserves the nearer grammatical referent,
    with the alternative noted theologically.
