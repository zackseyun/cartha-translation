id: JOB.15.10
reference: Job 15:10
source:
  edition: WLC
  text: גַּם שָׂ֣ב גַּם יָשִׁ֣ישׁ בָּ֑/נוּ כַּבִּ֖יר מֵ/אָבִ֣י/ךָ יָמִֽים־־׃
translation:
  text: Both the gray-haired and the aged are among us, older in days than your father.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'great/mighty from your father in days'; the sense in context
      is 'older than your father.'
    reason: lexical_alternative
lexical_decisions:
- source_word: גַּם
  chosen: both
  alternatives:
  - also
  - even
  lexicon: HALOT
  rationale: The repeated גַּם ... גַּם sets up a paired emphasis ('both ... and').
    'Both' in English captures the distributive force more naturally than repeating
    'also'.
- source_word: שָׂב
  chosen: the gray-haired
  alternatives:
  - the old man
  - the aged
  lexicon: HALOT
  rationale: The adjective denotes one advanced in age, often with the nuance of gray
    hair/hoary age. 'The gray-haired' preserves the concrete age-marking imagery better
    than the flatter 'old man,' while still reading naturally in English.
- source_word: יָשִׁישׁ
  chosen: the aged
  alternatives:
  - the very old
  - the elder
  lexicon: HALOT
  rationale: This term overlaps with שָׂב but can intensify the idea of advanced age.
    Rendering it as 'the aged' preserves the parallelism without collapsing both terms
    into the same English gloss.
- source_word: בָּנוּ
  chosen: are among us
  alternatives:
  - are with us
  - are in us/our company
  lexicon: HALOT
  rationale: 'With the preposition ב plus 1cp suffix, the sense here is locative/social:
    these elders are in Eliphaz''s circle or tradition. ''Are among us'' is idiomatic
    and fits the argument from communal wisdom.'
- source_word: כַּבִּיר
  chosen: older
  alternatives:
  - greater
  - mightier
  - more numerous
  - more weighty
  lexicon: HALOT
  rationale: Though כַּבִּיר often means 'great' or 'mighty,' in this comparative
    construction with מִן and followed by 'days' it refers to surpassing in age. 'Older'
    makes explicit the comparative sense demanded by the context.
- source_word: מֵאָבִיךָ יָמִים
  chosen: than your father in days
  alternatives:
  - than your father in age
  - older than your father
  lexicon: HALOT
  rationale: The Hebrew literally compares with 'your father' and specifies the sphere
    by 'days.' The main text smooths this to 'older in days than your father' for
    readable English while retaining the idiom's sense.
