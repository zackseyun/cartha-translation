id: JOB.15.20
reference: Job 15:20
source:
  edition: WLC
  text: כָּל יְמֵ֣י רָ֭שָׁע ה֣וּא מִתְחוֹלֵ֑ל וּ/מִסְפַּ֥ר שָׁ֝נִ֗ים נִצְפְּנ֥וּ לֶ/עָרִֽיץ־׃
translation:
  text: All the days of the wicked man he writhes in torment, and a number of years
    are stored up for the ruthless.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'is in anguish'; the Hebrew verb can convey writhing, trembling, or travail-like
      anguish.
    reason: lexical_alternative
  - marker: b
    text: Or 'are hidden away' or 'are reserved' for the ruthless.
    reason: lexical_alternative
  - marker: c
    text: '''The wicked man'' is grammatically masculine singular in Hebrew and represents
      the wicked person as a type.'
    reason: cultural_note
lexical_decisions:
- source_word: כָּל יְמֵי
  chosen: All the days of
  alternatives:
  - All his days
  - Throughout all the days of
  lexicon: HALOT
  rationale: כָּל with the construct יְמֵי gives a totalizing temporal expression.
    'All the days of' preserves the Hebrew structure clearly in English.
- source_word: רָשָׁע
  chosen: the wicked man
  alternatives:
  - the wicked
  - a wicked man
  lexicon: HALOT
  rationale: The singular adjective functions substantivally for an individual type.
    'The wicked man' preserves the masculine singular and representative force, in
    keeping with the gender-accurate policy. 'The wicked' is possible but less explicit
    about the singular individual in view.
- source_word: הוּא
  chosen: he
  alternatives:
  - — (unexpressed in English)
  lexicon: HALOT
  rationale: The independent pronoun is resumptive/emphatic with the participle. English
    naturally includes 'he' to reflect the subject without overemphasizing it.
- source_word: מִתְחוֹלֵל
  chosen: writhes in torment
  alternatives:
  - is in anguish
  - travails
  - trembles
  - writhes
  lexicon: HALOT
  rationale: The Hitpolel/iterative-reflexive form from חול conveys twisting, writhing,
    or being in anguish. 'Writhes in torment' captures both the bodily/psychological
    intensity and the ongoing participial aspect better than the flatter 'is in anguish.'
- source_word: וּמִסְפַּר שָׁנִים
  chosen: and a number of years
  alternatives:
  - and the number of years
  - and years in number
  lexicon: HALOT
  rationale: 'The phrase is indefinite in sense: a fixed but unspecified span of years.
    ''A number of years'' is idiomatic and preserves that nuance.'
- source_word: נִצְפְּנוּ
  chosen: are stored up
  alternatives:
  - are hidden away
  - are reserved
  - are laid up
  lexicon: HALOT
  rationale: The Niphal of צפן can mean 'be hidden' or 'be stored/reserved.' In context,
    the sense is that a limited span has been set aside for the ruthless. 'Are stored
    up' preserves the metaphor while remaining natural English.
- source_word: לֶעָרִיץ
  chosen: for the ruthless
  alternatives:
  - for the tyrant
  - for the violent man
  lexicon: HALOT
  rationale: עָרִיץ denotes a ruthless, violent, or tyrannical person. 'The ruthless'
    is broad enough to fit the wisdom context and avoids over-specifying political
    tyranny, while still conveying oppressive severity.
