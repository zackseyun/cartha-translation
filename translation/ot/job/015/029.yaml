id: JOB.15.29
reference: Job 15:29
source:
  edition: WLC
  text: לֹֽא יֶ֭עְשַׁר וְ/לֹא יָק֣וּם חֵיל֑/וֹ וְ/לֹֽא יִטֶּ֖ה לָ/אָ֣רֶץ מִנְלָֽ/ם־־־׃
translation:
  text: He will not become rich, and his wealth will not endure, and their produce
    will not bend down to the earth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his possessions,' 'his gain,' or 'his abundance' for the final term;
      the Hebrew word is rare and uncertain.
    reason: lexical_alternative
  - marker: b
    text: The final clause may evoke the image of branches or produce not drooping
      to the ground under abundance; some understand it more generally as his possessions
      not spreading over the land.
    reason: alternative_reading
lexical_decisions:
- source_word: יֶעְשַׁר
  chosen: will not become rich
  alternatives:
  - will not be rich
  - will not grow rich
  lexicon: HALOT
  rationale: From עשר in the Qal, the sense is to become rich or gain wealth. 'Become
    rich' best captures the verbal force rather than a static state.
- source_word: יָקוּם
  chosen: will not endure
  alternatives:
  - will not stand
  - will not remain
  lexicon: HALOT
  rationale: Although literally 'will not stand/arise,' with חֵילוֹ ('his wealth/substance')
    the idiomatic sense is that his wealth will not last or be established. 'Endure'
    gives the natural English sense while preserving the idea of instability.
- source_word: חֵילוֹ
  chosen: his wealth
  alternatives:
  - his substance
  - his possessions
  - his resources
  lexicon: HALOT
  rationale: חַיִל can denote strength, wealth, or resources. In this context of prosperity
    and its collapse, 'wealth' is the clearest contextual rendering.
- source_word: יִטֶּה
  chosen: will not bend down
  alternatives:
  - will not stretch out
  - will not spread
  - will not incline
  lexicon: HALOT
  rationale: The verb נטה commonly means stretch out, extend, incline, or bend. Here,
    with לָאָרֶץ and a noun likely referring to produce/yield, the image is of abundance
    drooping toward the ground under its weight. 'Bend down' preserves that concrete
    imagery.
- source_word: מִנְלָם
  chosen: their produce
  alternatives:
  - their possessions
  - their gain
  - their abundance
  lexicon: HALOT
  rationale: This rare form is difficult and has been understood in several ways.
    In context, many take it as referring to what the wicked possess or produce. 'Their
    produce' fits the agricultural image created by 'bend down to the earth' and yields
    coherent sense in English, while preserving the uncertainty in a footnote.
