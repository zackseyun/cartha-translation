id: JOB.15.23
reference: Job 15:23
source:
  edition: WLC
  text: נֹ֘דֵ֤ד ה֣וּא לַ/לֶּ֣חֶם אַיֵּ֑ה יָדַ֓ע כִּֽי נָכ֖וֹן בְּ/יָד֣/וֹ יֽוֹם חֹֽשֶׁךְ׀־־׃
translation:
  text: He wanders about for bread, saying, ‘Where is it?’ He knows that a day of
    darkness is ready at hand for him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'He wanders about for food, saying, “Where is it?”' Hebrew 'bread' can
      stand for food more generally.
    reason: lexical_alternative
  - marker: b
    text: Literally 'in his hand'; the expression likely means that the day of darkness
      is close at hand for him.
    reason: lexical_alternative
lexical_decisions:
- source_word: נֹדֵד
  chosen: wanders about
  alternatives:
  - wanders
  - roams
  - is a fugitive
  lexicon: HALOT
  rationale: Qal participle of נדד denotes restless wandering or roaming. 'Wanders
    about' captures the ongoing, unsettled action in idiomatic English without overinterpreting
    it as exile.
- source_word: לַלֶּחֶם
  chosen: for bread
  alternatives:
  - for food
  - for a loaf
  lexicon: HALOT
  rationale: לֶחֶם literally means 'bread,' but can metonymically mean food. Main
    text keeps 'bread' for concreteness and fidelity; the broader sense is natural
    in context and can be inferred.
- source_word: אַיֵּה
  chosen: Where is it?
  alternatives:
  - Where is bread?
  - Where?
  lexicon: HALOT
  rationale: The interrogative means 'where?' Since English normally requires an object
    here, 'it' is supplied, referring back to bread/food. This makes the line readable
    while preserving the sense of desperate searching.
- source_word: יָדַע
  chosen: He knows
  alternatives:
  - He realizes
  - He is sure
  lexicon: HALOT
  rationale: Simple perfect of ידע, expressing settled awareness. 'He knows' is the
    most direct rendering.
- source_word: נָכוֹן
  chosen: is ready
  alternatives:
  - is prepared
  - is fixed
  - is established
  lexicon: HALOT
  rationale: The passive/adjectival form conveys something prepared or made ready.
    'Is ready' fits the impending sense of judgment/disaster in context.
- source_word: בידו
  chosen: at hand for him
  alternatives:
  - in his hand
  - for him
  - beside him
  lexicon: HALOT
  rationale: Literally 'in his hand,' but in this idiom the sense is that the day
    of darkness is close upon him or within his grasp/lot. 'At hand for him' communicates
    imminence without the awkward literalism of 'in his hand.'
- source_word: יום חשך
  chosen: a day of darkness
  alternatives:
  - the day of darkness
  - a dark day
  lexicon: HALOT
  rationale: Construct phrase meaning a day characterized by darkness, here likely
    calamity or doom. 'A day of darkness' preserves the Hebrew imagery and avoids
    flattening it into mere metaphor.
