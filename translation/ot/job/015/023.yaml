theological_decisions:
- issue: Metaphorical force of 'day of darkness'
  chosen_reading: Rendered as 'a day of darkness' without explicating it as divine
    judgment in the main text.
  alternative_readings:
  - a day of calamity
  - the day of doom
  - a day of judgment
  rationale: The context in Eliphaz's speech points toward impending disaster for
    the wicked, but the Hebrew phrase itself is imagistic rather than doctrinally
    explicit. Preserving the metaphor maintains the text's tension and avoids importing
    a more specific theological claim than the wording states.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
