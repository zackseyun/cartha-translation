theological_decisions:
- issue: Religious sense of יִרְאָה
  chosen_reading: the fear of God
  alternative_readings:
  - fear
  - reverence
  rationale: The verse is an accusation about Job's effect on piety, not generic fear.
    Rendering the phrase as 'the fear of God' preserves the established biblical concept
    and the parallel with 'before God' in the second colon, while avoiding reduction
    to mere emotion.
  doctrine_reference: Translation philosophy §§1, 5
- issue: Sense of שִׂיחָה in relation to God
  chosen_reading: meditation
  alternative_readings:
  - prayer
  - devotion
  - complaint
  rationale: The Hebrew term is semantically broad. In this poetic context, paired
    with 'before God,' it most naturally refers to devotional reflection or prayerful
    musing. 'Meditation' preserves the ambiguity better than the narrower 'prayer,'
    while still conveying religious practice.
  doctrine_reference: Translation philosophy §3
