id: JOB.10.18
reference: Job 10:18
source:
  edition: WLC
  text: וְ/לָ֣/מָּה מֵ֭/רֶחֶם הֹצֵאתָ֑/נִי אֶ֝גְוַ֗ע וְ/עַ֣יִן לֹא תִרְאֵֽ/נִי־׃
translation:
  text: Why, then, did you bring me out from the womb? I should have died, and no
    eye would have seen me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'I would have died, and no eye would see me.' The Hebrew imperfects
      can be rendered more formally, but the context favors a counterfactual sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְלָמָה
  chosen: Why, then,
  alternatives:
  - And why
  - Why
  lexicon: HALOT
  rationale: Interrogative 'why' with prefixed conjunction. 'Then' brings out the
    discourse connection from the preceding complaint without overtranslating.
- source_word: מֵרֶחֶם
  chosen: from the womb
  alternatives:
  - out of the womb
  lexicon: HALOT
  rationale: Straightforward spatial source expression; 'womb' preserves the concrete
    birth imagery.
- source_word: הֹצֵאתָנִי
  chosen: did you bring me out
  alternatives:
  - did you bring me forth
  - did you cause me to come out
  lexicon: HALOT
  rationale: Hiphil of יצא with 1cs suffix refers to causing birth/emergence. 'Bring
    me out' is natural English and keeps the direct address to God.
- source_word: אֶגְוַע
  chosen: I should have died
  alternatives:
  - I would have died
  - might I have died
  - expired
  lexicon: HALOT
  rationale: Qal imperfect of גוע here expresses Job's wished-for unreal outcome in
    context. 'I should have died' captures the lamenting counterfactual sense in idiomatic
    English.
- source_word: וְעַיִן
  chosen: and no eye
  alternatives:
  - so that no eye
  - and not an eye
  lexicon: HALOT
  rationale: '''Eye'' stands metonymically for any observer. Adding ''no'' in English
    reflects the following negation naturally.'
- source_word: לֹא תִרְאֵנִי
  chosen: would have seen me
  alternatives:
  - should see me
  - would see me
  lexicon: HALOT
  rationale: With the preceding clause, the imperfect conveys the unreal result of
    the wished-for death before birth. 'Would have seen me' makes the counterfactual
    sequence explicit in English.
