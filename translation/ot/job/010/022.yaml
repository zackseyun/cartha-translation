id: JOB.10.22
reference: Job 10:22
source:
  edition: WLC
  text: אֶ֤רֶץ עֵיפָ֨תָ/ה כְּמ֥וֹ אֹ֗פֶל צַ֭לְמָוֶת וְ/לֹ֥א סְדָרִ֗ים וַ/תֹּ֥פַע כְּמוֹ
    אֹֽפֶל׀־׃פ
translation:
  text: a land of gloom, like deep darkness, of the shadow of death and without order,
    where it shines like deep darkness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'of deep shadow' for 'the shadow of death' (צַלְמָוֶת); the Hebrew term
      can denote either death-shadow specifically or very deep darkness more generally.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶרֶץ
  chosen: land
  alternatives:
  - earth
  - country
  lexicon: HALOT
  rationale: In context Job is describing the realm of the dead as a place or region;
    'land' is the most natural English equivalent and fits the imagery better than
    the broader 'earth'.
- source_word: עֵיפָתָה
  chosen: of gloom
  alternatives:
  - of darkness
  - of weariness
  - of obscurity
  lexicon: HALOT
  rationale: The noun/adjectival form denotes darkness/gloominess. 'Of gloom' preserves
    the genitival descriptive force with readable English. 'Weariness' is less suitable
    in this immediate context dominated by darkness imagery.
- source_word: כְּמוֹ אֹפֶל
  chosen: like deep darkness
  alternatives:
  - like darkness
  - like thick darkness
  lexicon: HALOT
  rationale: אֹפֶל denotes dense or deep darkness, not merely ordinary darkness. 'Deep
    darkness' is idiomatic and preserves the intensified image.
- source_word: צַלְמָוֶת
  chosen: the shadow of death
  alternatives:
  - deep shadow
  - deathly darkness
  lexicon: HALOT
  rationale: The traditional rendering 'shadow of death' remains plausible and preserves
    the grave/death association in Job. Because the term can also denote very deep
    darkness, that alternative is preserved in a footnote rather than flattened in
    the main text.
- source_word: וְלֹא סְדָרִים
  chosen: and without order
  alternatives:
  - and with no order
  - and without arrangement
  lexicon: HALOT
  rationale: סְדָרִים refers to order or arrangement. 'Without order' is concise,
    natural English and captures the sense of chaos.
- source_word: וַתֹּפַע
  chosen: where it shines
  alternatives:
  - and it shines
  - and it appears bright
  - and it gleams
  lexicon: HALOT
  rationale: From יפע, 'to shine/appear bright.' The feminine singular fits the land.
    Rendering it as 'where it shines' smooths the clause in English while preserving
    the paradoxical image that even its shining is darkness.
- source_word: כְּמוֹ אֹפֶל
  chosen: like deep darkness
  alternatives:
  - as darkness
  - as thick darkness
  lexicon: HALOT
  rationale: Repeating 'like deep darkness' preserves the Hebrew repetition and the
    verse's climactic paradox.
