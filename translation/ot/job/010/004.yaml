id: JOB.10.4
reference: Job 10:4
source:
  edition: WLC
  text: הַ/עֵינֵ֣י בָשָׂ֣ר לָ֑/ךְ אִם כִּ/רְא֖וֹת אֱנ֣וֹשׁ תִּרְאֶֽה־׃
translation:
  text: Do you have eyes of flesh, or do you see as man sees?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'as a human sees.' Hebrew אֱנוֹשׁ is a generic singular term for a human
      being, often with an overtone of mortality or frailty.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַ/עֵינֵי
  chosen: Do you have eyes
  alternatives:
  - Are your eyes
  - Do you possess eyes
  lexicon: HALOT
  rationale: עֵינַיִם means 'eyes.' The interrogative force is carried by the prefixed
    הֲ, and English idiom naturally supplies 'do you have/are your ...' rather than
    a verbless literalism. 'Do you have eyes' preserves the rhetorical question clearly.
- source_word: בָשָׂר
  chosen: of flesh
  alternatives:
  - fleshly
  - human
  lexicon: HALOT
  rationale: בָשָׂר literally means 'flesh.' Here it qualifies 'eyes' to contrast
    God's perception with embodied human perception. 'Of flesh' is more transparent
    and formally closer than the interpretive 'human,' while still natural in English.
- source_word: לָךְ
  chosen: you have
  alternatives:
  - to you
  - are yours
  lexicon: HALOT
  rationale: The preposition plus pronominal suffix literally means 'to you,' but
    in this verbless clause English requires an existential/possessive expression.
    'Do you have' best conveys the Hebrew sense idiomatically.
- source_word: אִם
  chosen: or
  alternatives:
  - if
  - whether
  lexicon: HALOT
  rationale: In this rhetorical question, אִם introduces the second alternative rather
    than a conditional protasis. Rendering it as 'or' communicates the disjunctive
    force in idiomatic English.
- source_word: כִּ/רְאֹות
  chosen: as ... sees
  alternatives:
  - according to the seeing of
  - like the sight of
  lexicon: HALOT
  rationale: 'The prefixed כ plus infinitive construct of ראה expresses comparison:
    ''as/like seeing.'' In English this is best unpacked as ''as ... sees'' rather
    than a wooden nominal phrase.'
- source_word: אֱנוֹשׁ
  chosen: man
  alternatives:
  - a human
  - mortal man
  lexicon: HALOT
  rationale: אֱנוֹשׁ often emphasizes mortal human frailty. 'Man' fits the generic
    singular and aligns with the project's gender-accurate policy. The broader human
    sense is preserved by the generic use, while avoiding over-interpretation with
    'mortal' in the main text.
- source_word: תִּרְאֶה
  chosen: do you see
  alternatives:
  - do you look
  - do you perceive
  lexicon: HALOT
  rationale: ראה here refers to seeing/perceiving. 'Do you see' keeps the lexical
    repetition with 'eyes' and the comparison to human seeing, preserving the rhetorical
    force.
