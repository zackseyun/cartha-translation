theological_decisions:
- issue: Anthropomorphic language about God's perception
  chosen_reading: Retain the rhetorical anthropomorphic contrast without softening
    it
  alternative_readings:
  - Interpretively paraphrase as 'Do you judge by outward appearance like humans?'
  rationale: The verse contrasts God's perception with human, flesh-bound seeing.
    The Hebrew speaks concretely of 'eyes of flesh' and 'seeing as man sees.' Preserving
    the anthropomorphic imagery maintains the text's force without importing a doctrinal
    explanation beyond the verse itself.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Generic singular אֱנוֹשׁ
  chosen_reading: man
  alternative_readings:
  - humanity
  - a human being
  - mortals
  rationale: The source uses a grammatically masculine singular noun with representative
    force. Per the gender-accurate policy, 'man' is retained in the main text rather
    than neutralizing to 'humanity.'
  doctrine_reference: Translation philosophy §4
