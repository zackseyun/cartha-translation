id: JOB.10.6
reference: Job 10:6
source:
  edition: WLC
  text: כִּֽי תְבַקֵּ֥שׁ לַ/עֲוֺנִ֑/י וּ֭/לְ/חַטָּאתִ֥/י תִדְרֽוֹשׁ־׃
translation:
  text: that you seek out my iniquity and search for my sin?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for you seek out my guilt and search for my sin.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: that
  alternatives:
  - for
  - because
  lexicon: HALOT
  rationale: In context this continues Job's rhetorical question from the previous
    verse, introducing the content/purpose clause rather than a straightforward causal
    'for.' 'That' best fits the English flow with v. 5 while preserving the subordinate
    force.
- source_word: תְבַקֵּשׁ
  chosen: you seek out
  alternatives:
  - you seek
  - you look for
  lexicon: HALOT
  rationale: בקש in the piel commonly means to seek, seek out, or look for. 'Seek
    out' captures the active, investigative nuance in this accusation toward God.
- source_word: לַעֲוֺנִי
  chosen: my iniquity
  alternatives:
  - my guilt
  - my wrongdoing
  lexicon: HALOT
  rationale: עָוֹן can denote iniquity, guilt, or punishment for guilt depending on
    context. Here Job speaks of God searching for moral fault, so 'iniquity' preserves
    the ethical sense without collapsing it into consequence. The prefixed ל is governed
    idiomatically by בקש, yielding 'seek out my iniquity.'
- source_word: וּלְחַטָּאתִי
  chosen: my sin
  alternatives:
  - my offense
  - my sinful act
  lexicon: HALOT
  rationale: חַטָּאת here is best rendered 'sin' in parallel with עָוֹן. The pair
    intensifies the idea of moral fault. A more technical distinction between the
    two Hebrew terms is possible, but in English 'my iniquity ... my sin' preserves
    both terms without overinterpreting.
- source_word: תִדְרֹשׁ
  chosen: search for
  alternatives:
  - inquire after
  - investigate
  - require
  lexicon: HALOT
  rationale: דרש often means to seek, inquire, or investigate. In this parallel line
    with בקש, 'search for' gives a natural English equivalent that preserves the sense
    of probing investigation.
