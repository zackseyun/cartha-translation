theological_decisions:
- issue: Rendering the paired terms עָוֹן and חַטָּאת
  chosen_reading: Translate as 'iniquity' and 'sin' without implying Job's actual
    guilt.
  alternative_readings:
  - '''guilt'' and ''sin'''
  - '''wrongdoing'' and ''offense'''
  rationale: The verse voices Job's complaint that God appears to be scrutinizing
    him for fault. The translation should preserve the accusation/perception in Job's
    speech without importing a theological judgment that Job is in fact guilty. Using
    the conventional moral terms keeps the rhetoric intact and leaves the book's tension
    unresolved, in keeping with the translation philosophy.
  doctrine_reference: Preserve theological tension rather than resolve it.
