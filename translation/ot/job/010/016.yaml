theological_decisions:
- issue: Rendering פלא in a context of divine hostility
  chosen_reading: you show yourself wondrous against me
  alternative_readings:
  - you act wonderfully against me
  - you show your power against me
  rationale: The verse attributes extraordinary, awe-inspiring action to God in a
    context of affliction. The translation preserves the tension of divine wonder
    joined to Job's suffering rather than resolving it into either purely positive
    'wonderful deeds' or a paraphrastic 'you attack me powerfully.'
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
