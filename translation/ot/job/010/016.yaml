id: JOB.10.16
reference: Job 10:16
source:
  edition: WLC
  text: וְ֭/יִגְאֶה כַּ/שַּׁ֣חַל תְּצוּדֵ֑/נִי וְ֝/תָשֹׁ֗ב תִּתְפַּלָּא בִֽ/י־׃
translation:
  text: If I lift myself up, you hunt me like a lion, and again you show yourself
    wondrous against me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew is difficult and elliptical; the opening may also be understood,
      'And if it rises' or 'If I am exalted.'
    reason: lexical_alternative
  - marker: b
    text: Or 'you act wonderfully against me.' The Hebrew can denote extraordinary
      or marvelous action, here in a hostile context.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיִגְאֶה
  chosen: If I lift myself up
  alternatives:
  - And it rises
  - And I am exalted
  - If it rises high
  lexicon: HALOT
  rationale: The verb from גאה commonly denotes rising, being exalted, or lifting
    oneself up. In context, many understand an implicit first-person sense from the
    surrounding discourse ('if my head rises' / 'if I lift myself up'). Because the
    Hebrew form itself is 3ms and somewhat elliptical, the English supplies a natural
    conditional sense that fits Job's complaint and the immediate sequence of divine
    pursuit.
- source_word: כַּשַּׁחַל
  chosen: like a lion
  alternatives:
  - like a fierce lion
  - like a lioness
  lexicon: HALOT
  rationale: שַׁחַל denotes a lion, often with emphasis on strength or fierceness.
    'Like a lion' is clear, natural, and sufficiently preserves the simile without
    over-specifying.
- source_word: תְּצוּדֵנִי
  chosen: you hunt me
  alternatives:
  - you stalk me
  - you catch me
  lexicon: HALOT
  rationale: From צוד, the sense is to hunt or pursue as prey. 'You hunt me' best
    matches the lion simile and preserves the predatory imagery.
- source_word: וְתָשֹׁב
  chosen: and again
  alternatives:
  - and you return
  - and once more
  lexicon: HALOT
  rationale: שׁוב literally means 'return,' but idiomatically here it introduces repeated
    action. 'And again' communicates the iterative force in natural English.
- source_word: תִּתְפַּלָּא
  chosen: you show yourself wondrous
  alternatives:
  - you act wonderfully
  - you display your power marvelously
  - you show yourself marvelous
  lexicon: HALOT
  rationale: The hitpael of פלא can mean to show oneself wonderful/marvelous or to
    do extraordinary things. In this context of hostile divine action, the sense is
    not positive benevolence but striking, extraordinary action against Job. 'You
    show yourself wondrous' preserves the reflexive nuance without flattening it into
    mere 'attack.'
- source_word: בִי
  chosen: against me
  alternatives:
  - in me
  - with me
  - toward me
  lexicon: HALOT
  rationale: The preposition ב can be rendered variously, but in this adversarial
    context 'against me' best conveys the force of God's extraordinary action directed
    at Job.
