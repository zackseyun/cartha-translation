id: JOB.10.1
reference: Job 10:1
source:
  edition: WLC
  text: נָֽקְטָ֥ה נַפְשִׁ֗/י בְּ/חַ֫יָּ֥/י אֶֽעֶזְבָ֣ה עָלַ֣/י שִׂיחִ֑/י אֲ֝דַבְּרָה֗
    בְּ/מַ֣ר נַפְשִֽׁ/י׃
translation:
  text: My soul loathes my life; I will give free course to my complaint; I will speak
    in the bitterness of my soul.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'My soul is weary of my life.' The Hebrew verb can express deep weariness
      as well as loathing.
    reason: lexical_alternative
  - marker: b
    text: Or 'I will let loose my complaint.' The Hebrew idiom means Job will no longer
      restrain his lament.
    reason: lexical_alternative
lexical_decisions:
- source_word: נָקְטָה
  chosen: loathes
  alternatives:
  - is weary of
  - abhors
  - is disgusted with
  lexicon: HALOT
  rationale: The verb conveys revulsion or weariness to the point of loathing. 'Loathes'
    best captures the strong emotional force in concise modern English. 'Is weary
    of' is possible but weaker; 'abhors' is somewhat stiffer in English.
- source_word: נַפְשִׁי
  chosen: My soul
  alternatives:
  - I
  - myself
  lexicon: HALOT
  rationale: נֶפֶשׁ here refers to Job's inner self/life-breathing person. 'My soul'
    preserves the Hebrew idiom and emotional depth better than flattening it to 'I,'
    especially since the verse repeats the term for rhetorical effect.
- source_word: בְּחַיָּי
  chosen: my life
  alternatives:
  - my living
  - while I live
  lexicon: HALOT
  rationale: With the preposition, the phrase is idiomatic and refers to Job's life
    as the object of his disgust. 'My life' is the most natural English rendering
    in context.
- source_word: אֶעֶזְבָה
  chosen: I will give free course to
  alternatives:
  - I will leave
  - I will let loose
  - I will abandon restraint over
  lexicon: HALOT
  rationale: Although the root often means 'leave' or 'forsake,' in this idiom it
    means to let something go unchecked or unrestrained. 'Give free course to' communicates
    that Job will no longer hold back his complaint.
- source_word: עָלַי
  chosen: to
  alternatives:
  - upon
  - over
  - against myself with
  lexicon: HALOT
  rationale: In the idiom with עזב and שיח, the preposition marks the object released
    from restraint. English idiom is smoother with 'to my complaint' rather than a
    more literal but awkward 'upon my complaint.'
- source_word: שִׂיחִי
  chosen: my complaint
  alternatives:
  - my lament
  - my meditation
  - my musing
  lexicon: HALOT
  rationale: In Job's lament context, שִׂיחַ denotes troubled speech or complaint
    rather than neutral meditation. 'My complaint' fits the discourse setting and
    parallels the following resolve to speak.
- source_word: אֲדַבְּרָה
  chosen: I will speak
  alternatives:
  - let me speak
  lexicon: HALOT
  rationale: The cohortative expresses resolve. In English, 'I will speak' naturally
    conveys Job's determined intention.
- source_word: בְּמַר
  chosen: in the bitterness of
  alternatives:
  - out of the bitterness of
  - in bitter
  lexicon: HALOT
  rationale: The preposition plus noun expresses the manner or emotional sphere of
    Job's speech. 'In the bitterness of' is idiomatic and preserves the metaphor.
- source_word: נַפְשִׁי
  chosen: my soul
  alternatives:
  - my heart
  - myself
  lexicon: HALOT
  rationale: Repeated to preserve the Hebrew's emotional intensity and lexical cohesion.
    'My soul' also keeps the parallel with the opening clause.
