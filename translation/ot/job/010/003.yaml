theological_decisions:
- issue: Anthropomorphic accusation toward God
  chosen_reading: Retain Job's direct rhetorical challenge without softening the verbs
    or reframing them as mere appearance.
  alternative_readings:
  - Is it good for you to seem to oppress...
  - Does it please you to wrong...
  rationale: The Hebrew presents Job's lament in stark, accusatory language. Preserving
    that tension respects the text's rhetoric and avoids importing a doctrinal safeguard
    that the verse itself does not state.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
