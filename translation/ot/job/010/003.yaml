id: JOB.10.3
reference: Job 10:3
source:
  edition: WLC
  text: הֲ/ט֤וֹב לְ/ךָ֨ כִּֽי תַעֲשֹׁ֗ק כִּֽי תִ֭מְאַס יְגִ֣יעַ כַּפֶּ֑י/ךָ וְ/עַל
    עֲצַ֖ת רְשָׁעִ֣ים הוֹפָֽעְתָּ׀־־־׃
translation:
  text: Is it good for you that you oppress, that you despise the work of your hands,
    and shine upon the counsel of the wicked?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'show favor to the counsel of the wicked.' The Hebrew verb literally
      means 'shine forth/upon,' here likely expressing favorable regard.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲטוֹב
  chosen: Is it good
  alternatives:
  - Does it please you
  - Is it right
  lexicon: HALOT
  rationale: Interrogative הֲ with טוֹב forms a rhetorical question about what is
    good/fitting. 'Is it good' preserves the directness of Job's challenge better
    than a more interpretive 'Does it please you.'
- source_word: לְךָ
  chosen: for you
  alternatives:
  - to you
  lexicon: HALOT
  rationale: The preposition ל marks relation or advantage. 'For you' fits the idiom
    in English and preserves the sense of personal benefit or suitability addressed
    to God.
- source_word: תַעֲשֹׁק
  chosen: you oppress
  alternatives:
  - you wrong
  - you exploit
  lexicon: HALOT
  rationale: The verb עָשַׁק commonly denotes oppression or extortion. 'Oppress' is
    the strongest natural English equivalent and matches Job's accusation without
    softening it.
- source_word: תִמְאַס
  chosen: you despise
  alternatives:
  - you reject
  - you spurn
  lexicon: HALOT
  rationale: מָאַס conveys rejection with disdain. 'Despise' captures both repudiation
    and contempt, fitting the lament context.
- source_word: יְגִיעַ כַּפֶּיךָ
  chosen: the work of your hands
  alternatives:
  - the labor of your hands
  - what your hands have made
  lexicon: HALOT
  rationale: יְגִיעַ literally refers to labor/toil or its product. In context, with
    'your hands' referring to God's creative action toward Job, 'the work of your
    hands' is the most idiomatic and theologically transparent English rendering.
- source_word: עֲצַת רְשָׁעִים
  chosen: the counsel of the wicked
  alternatives:
  - the plan of the wicked
  - the advice of the wicked
  lexicon: HALOT
  rationale: עֵצָה can mean counsel, plan, or purpose. 'Counsel' preserves the broad
    semantic range and echoes common biblical diction without becoming archaic.
- source_word: הוֹפָעְתָּ
  chosen: shine upon
  alternatives:
  - show favor to
  - appear over
  lexicon: HALOT
  rationale: The hiphil of יָפַע fundamentally denotes shining forth or causing to
    appear in splendor. Here it idiomatically suggests favorable manifestation toward
    the wicked. 'Shine upon' keeps the metaphor in the main text, while the more interpretive
    'show favor to' is preserved in a footnote.
