id: JOB.10.15
reference: Job 10:15
source:
  edition: WLC
  text: אִם רָשַׁ֡עְתִּי אַלְלַ֬י לִ֗/י וְ֭/צָדַקְתִּי לֹא אֶשָּׂ֣א רֹאשִׁ֑/י שְׂבַ֥ע
    קָ֝ל֗וֹן וּ/רְאֵ֥ה עָנְיִֽ/י־־׃
translation:
  text: If I am wicked, woe to me! Even if I am righteous, I cannot lift up my head,
    filled with disgrace and looking on my affliction.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and see my affliction' / 'and behold my affliction.' The Hebrew here
      is syntactically difficult, and some take it as a direct appeal to God rather
      than part of Job's self-description.
    reason: alternative_reading
lexical_decisions:
- source_word: אִם רָשַׁעְתִּי
  chosen: If I am wicked
  alternatives:
  - If I have acted wickedly
  - If I am guilty
  lexicon: HALOT
  rationale: The perfect verb רָשַׁעְתִּי can denote having acted wickedly, but in
    English a present-state rendering fits the conditional lament context and parallels
    the following וְצָדַקְתִּי. 'Wicked' preserves the moral sense better than the
    more forensic 'guilty.'
- source_word: אַלְלַי לִי
  chosen: woe to me
  alternatives:
  - alas for me
  - woe is me
  lexicon: HALOT
  rationale: An idiomatic cry of lament. 'Woe to me' is natural modern English and
    preserves the exclamatory force without archaic phrasing.
- source_word: וְצָדַקְתִּי
  chosen: Even if I am righteous
  alternatives:
  - And if I am righteous
  - Even if I am in the right
  - Even if I am just
  lexicon: HALOT
  rationale: The conjunction here marks contrast with the previous clause; 'even if'
    brings out the concessive force in context. 'Righteous' best preserves the moral-judicial
    nuance of צדק.
- source_word: לֹא אֶשָּׂא רֹאשִׁי
  chosen: I cannot lift up my head
  alternatives:
  - I will not lift up my head
  - I do not lift up my head
  lexicon: HALOT
  rationale: 'The idiom means to raise one''s head in confidence or dignity. ''Cannot''
    captures the practical force in context: Job is unable to hold his head high,
    even if righteous.'
- source_word: שְׂבַע קָלוֹן
  chosen: filled with disgrace
  alternatives:
  - full of shame
  - sated with dishonor
  lexicon: HALOT
  rationale: שְׂבַע functions adjectivally, 'full of/sated with.' 'Disgrace' renders
    קָלוֹן in a way that preserves public shame and humiliation. 'Filled with disgrace'
    is idiomatic and clear.
- source_word: וּרְאֵה עָנְיִי
  chosen: and looking on my affliction
  alternatives:
  - and seeing my affliction
  - and behold my affliction
  - and see my misery
  lexicon: HALOT
  rationale: 'The form is difficult because the pointed imperative-like form may reflect
    an elliptical or vivid expression. In context after ''filled with disgrace,''
    it is best taken as continuing Job''s condition: he is occupied with, or confronted
    by, his affliction. ''Looking on my affliction'' preserves the verbal sense without
    forcing a direct imperative to God.'
