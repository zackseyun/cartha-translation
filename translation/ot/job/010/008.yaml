id: JOB.10.8
reference: Job 10:8
source:
  edition: WLC
  text: יָדֶ֣י/ךָ עִ֭צְּבוּ/נִי וַֽ/יַּעֲשׂ֑וּ/נִי יַ֥חַד סָ֝בִ֗יב וַֽ/תְּבַלְּעֵֽ/נִי׃
translation:
  text: Your hands shaped me and made me, together all around—yet you swallow me up.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'formed me' or 'fashioned me.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'together all around,' expressing that God formed Job completely,
      on every side.
    reason: cultural_note
  - marker: c
    text: Or 'but you destroy me'; the Hebrew literally says 'swallow me up,' a vivid
      metaphor for destruction.
    reason: lexical_alternative
lexical_decisions:
- source_word: יָדֶיךָ
  chosen: Your hands
  alternatives:
  - your hand
  lexicon: HALOT
  rationale: Plural noun with 2ms suffix; the plural is retained literally. In context
    it expresses God's personal creative agency.
- source_word: עִצְּבוּנִי
  chosen: shaped me
  alternatives:
  - formed me
  - fashioned me
  lexicon: HALOT
  rationale: From עצב in the Piel, here in a creative/manufacturing sense. 'Shaped
    me' conveys deliberate formation and fits the parallel with 'made me.' 'Formed
    me' is possible, but 'shaped' better preserves the artisan nuance without becoming
    wooden.
- source_word: וַיַּעֲשׂוּנִי
  chosen: and made me
  alternatives:
  - and fashioned me
  - and did/made me
  lexicon: HALOT
  rationale: עשה is the common verb 'make/do.' In parallel with the previous verb,
    'made me' is the most natural English rendering and preserves the cumulative description
    of creation.
- source_word: יַחַד
  chosen: together
  alternatives:
  - altogether
  - as one
  lexicon: HALOT
  rationale: Adverb meaning 'together' or 'altogether.' Here it likely intensifies
    the completeness/unity of God's forming work, so 'together' is kept in close connection
    with the following phrase.
- source_word: סָבִיב
  chosen: all around
  alternatives:
  - round about
  - on every side
  lexicon: HALOT
  rationale: Literally 'around, all around.' Combined with יחד it depicts comprehensive
    formation of the whole person. 'All around' is idiomatic modern English and preserves
    the spatial/comprehensive sense.
- source_word: וַתְּבַלְּעֵנִי
  chosen: yet you swallow me up
  alternatives:
  - but you swallow me up
  - yet you destroy me
  lexicon: HALOT
  rationale: בלע literally means 'swallow up,' often metaphorically for destruction.
    The vivid metaphor should be preserved in the main text rather than flattened
    to 'destroy.' 'Yet' brings out the adversative force in context, though the conjunction
    itself is simply waw.
