theological_decisions:
- issue: Anthropomorphic creation language for God
  chosen_reading: Retain the concrete expression 'Your hands' and the paired creation
    verbs without softening them.
  alternative_readings:
  - You created me
  - You formed my body
  rationale: The verse is a lament that appeals to God's intimate, personal craftsmanship
    in creating Job. Reducing the imagery to a generic 'created' would lose the rhetorical
    force and embodied metaphor of the Hebrew.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    the source''s plain sense and theological tension.'
- issue: Tension between God's creative care and destructive action
  chosen_reading: Preserve the sharp contrast with 'yet you swallow me up.'
  alternative_readings:
  - and now you destroy me
  - only to destroy me
  rationale: Job's complaint intentionally juxtaposes divine formation and apparent
    destruction. The translation should preserve that tension rather than interpretively
    resolve it into a smoother paraphrase.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather
    than resolve it.'
