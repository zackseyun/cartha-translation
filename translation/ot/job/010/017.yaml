id: JOB.10.17
reference: Job 10:17
source:
  edition: WLC
  text: תְּחַדֵּ֬שׁ עֵדֶ֨י/ךָ נֶגְדִּ֗/י וְ/תֶ֣רֶב כַּֽ֭עַשְׂ/ךָ עִמָּדִ֑/י חֲלִיפ֖וֹת
    וְ/צָבָ֣א עִמִּֽ/י׀׃
translation:
  text: You renew your witnesses against me, and you increase your anger with me;
    relays and an army are with me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your evidences' instead of 'your witnesses'; the Hebrew can be read
      as forensic testimony or as evidentiary proofs brought against Job.
    reason: lexical_alternative
  - marker: b
    text: Or 'changes and warfare are with me.' The Hebrew likely pictures successive
      waves of assault in military imagery.
    reason: lexical_alternative
lexical_decisions:
- source_word: תְּחַדֵּשׁ
  chosen: you renew
  alternatives:
  - you make new
  - you bring afresh
  lexicon: HALOT
  rationale: Piel of חדש commonly conveys renewing or making fresh/new again. In context
    Job complains that God keeps bringing fresh charges or evidence against him, so
    'you renew' preserves the iterative force without over-paraphrase.
- source_word: עֵדֶיךָ
  chosen: your witnesses
  alternatives:
  - your testimony
  - your evidences
  lexicon: HALOT
  rationale: Plural of עֵד normally means 'witnesses' or 'testimonies/evidences.'
    Because the possessive plus 'against me' evokes legal accusation, 'witnesses'
    best preserves the forensic imagery, while the possibility of impersonal 'evidences'
    is preserved in a footnote.
- source_word: נֶגְדִּי
  chosen: against me
  alternatives:
  - before me
  - in front of me
  lexicon: HALOT
  rationale: Though literally 'in front of me,' in adversarial/legal context it naturally
    means 'against me.' This fits Job's complaint of prosecution.
- source_word: וְתֶרֶב
  chosen: and you increase
  alternatives:
  - and you multiply
  - and you make great
  lexicon: HALOT
  rationale: From רבה, Hiphil/jussive-like form here conveys causing to become many/great.
    'Increase' is idiomatic with the following noun and keeps the direct address to
    God.
- source_word: כַּעַשְׂךָ
  chosen: your anger
  alternatives:
  - your vexation
  - your indignation
  - your provocation
  lexicon: HALOT
  rationale: כעס can denote anger, vexation, or provocation. With second-person suffix
    and divine address, 'your anger' is the clearest and most natural English rendering.
- source_word: עִמָּדִי
  chosen: with me
  alternatives:
  - toward me
  - against me
  lexicon: HALOT
  rationale: The preposition is literally 'with me.' In English, 'your anger with
    me' is somewhat marked but understandable and preserves the Hebrew wording better
    than smoothing to 'against me' a second time.
- source_word: חֲלִיפוֹת
  chosen: relays
  alternatives:
  - changes
  - successive attacks
  - replacements
  lexicon: HALOT
  rationale: The noun can denote changes, alternations, or successive relays. In this
    military context with צבא following, 'relays' captures the sense of one wave after
    another coming against Job. Because 'changes' is a traditional and plausible rendering,
    it is preserved in a footnote.
- source_word: וְצָבָא
  chosen: and an army
  alternatives:
  - and warfare
  - and a host
  lexicon: HALOT
  rationale: צבא can mean army/host or warfare/service. Here, paired with חֲלִיפוֹת
    and followed by 'with me,' the military image is strongest. 'An army' communicates
    that image clearly, while 'warfare' remains possible and is noted in a footnote.
- source_word: עִמִּי
  chosen: are with me
  alternatives:
  - are against me
  - are upon me
  lexicon: HALOT
  rationale: Literally 'with me.' Given the hostile context, English readers may infer
    adversative force, but retaining 'with me' preserves the Hebrew idiom and the
    compressed poetic expression.
