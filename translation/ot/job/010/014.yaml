id: JOB.10.14
reference: Job 10:14
source:
  edition: WLC
  text: אִם חָטָ֥אתִי וּ/שְׁמַרְתָּ֑/נִי וּ֝/מֵ/עֲוֺנִ֗/י לֹ֣א תְנַקֵּֽ/נִי־׃
translation:
  text: If I sin, you watch me, and you will not acquit me of my iniquity.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'If I have sinned ... you do not hold me innocent of my guilt.'
    reason: lexical_alternative
  - marker: b
    text: '''Watch me'' here carries the sense of close scrutiny, not protective guarding.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  chosen: If
  alternatives:
  - When
  lexicon: HALOT
  rationale: Introduces a conditional protasis. Although Hebrew אִם can sometimes
    approach 'when,' here 'if' best preserves Job's conditional complaint without
    over-resolving whether he speaks hypothetically or generally.
- source_word: חָטָאתִי
  chosen: I sin
  alternatives:
  - I have sinned
  - I sinned
  lexicon: HALOT
  rationale: Qal perfect 1cs of חטא. In English, the present 'I sin' works naturally
    in a vivid conditional sequence and fits the parallel complaint about God's ongoing
    surveillance and refusal to clear him. Perfective alternatives are possible, but
    the sense here is gnomic/conditional rather than a single past act.
- source_word: וּשְׁמַרְתָּנִי
  chosen: you watch me
  alternatives:
  - you guard me
  - you keep watch over me
  - you observe me
  lexicon: HALOT
  rationale: שׁמר commonly means keep, guard, watch. In this context of divine scrutiny
    for wrongdoing, 'watch me' best conveys hostile or judicial observation rather
    than protective guarding.
- source_word: וּמֵעֲוֺנִי
  chosen: of my iniquity
  alternatives:
  - from my guilt
  - for my iniquity
  lexicon: HALOT
  rationale: עָוֹן can denote iniquity, guilt, or punishment for iniquity. With נקה
    in legal contexts, the phrase means not being cleared from guilt/iniquity. 'Of
    my iniquity' is a fairly formal but transparent rendering that preserves the moral
    dimension without collapsing it entirely into either act or consequence.
- source_word: לֹא תְנַקֵּנִי
  chosen: you will not acquit me
  alternatives:
  - you do not hold me innocent
  - you will not cleanse me
  - you will not leave me unpunished
  lexicon: HALOT
  rationale: Piel of נקה often means declare innocent, acquit, leave unpunished. In
    this judicial complaint, 'acquit me' best captures the forensic sense. 'Cleanse'
    would suggest ritual purification, which is less fitting here.
