id: JOB.10.13
reference: Job 10:13
source:
  edition: WLC
  text: וְ֭/אֵלֶּה צָפַ֣נְתָּ בִ/לְבָבֶ֑/ךָ יָ֝דַ֗עְתִּי כִּי זֹ֥את עִמָּֽ/ךְ־׃
translation:
  text: Yet these things you hid in your heart; I knew that this was with you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'And these things you stored up in your heart.' The Hebrew verb can mean
      'hide,' 'store up,' or 'keep in reserve.'
    reason: lexical_alternative
  - marker: b
    text: The phrase 'this was with you' may mean 'this was in your mind' or 'this
      was part of your hidden purpose.'
    reason: alternative_reading
lexical_decisions:
- source_word: וְאֵלֶּה
  chosen: Yet these things
  alternatives:
  - And these things
  - These things
  lexicon: HALOT
  rationale: The conjunction וְ can be rendered simply 'and,' but in context Job is
    turning from God's beneficent acts in the previous verse to a deeper hidden intention,
    so 'yet' brings out the adversative force naturally without over-paraphrasing.
    אֵלֶּה is demonstrative plural, hence 'these things.'
- source_word: צָפַנְתָּ
  chosen: you hid
  alternatives:
  - you stored up
  - you treasured
  - you kept hidden
  lexicon: HALOT
  rationale: The verb צפן commonly means to hide, store up, or keep in reserve. In
    this context of concealed divine intention, 'you hid' best captures the sense
    of something kept secret in God's inner purpose.
- source_word: בִלְבָבֶךָ
  chosen: in your heart
  alternatives:
  - in your mind
  - within yourself
  lexicon: HALOT
  rationale: לֵבָב in Hebrew often denotes the inner self, mind, will, or heart. 'In
    your heart' preserves the Hebrew anthropological expression and its metaphorical
    force, rather than flattening it to 'mind.'
- source_word: יָדַעְתִּי
  chosen: I knew
  alternatives:
  - I have known
  - I realized
  lexicon: HALOT
  rationale: The qatal 1cs is straightforwardly rendered 'I knew.' English simple
    past fits the discourse well and avoids importing a more interpretive nuance like
    'realized.'
- source_word: כִּי
  chosen: that
  alternatives:
  - for
  - indeed
  lexicon: HALOT
  rationale: Here כִּי introduces the content of what Job knew, so 'that' is the most
    natural English complementizer.
- source_word: זֹאת
  chosen: this
  alternatives:
  - these things
  - this plan
  - this
  lexicon: HALOT
  rationale: The feminine singular demonstrative likely points back collectively to
    the hidden purpose just mentioned. 'This' is sufficiently literal and allows the
    referent to remain somewhat compressed, as in the Hebrew.
- source_word: עִמָּךְ
  chosen: was with you
  alternatives:
  - was in your possession
  - was in your mind
  - was with you
  lexicon: HALOT
  rationale: עִם plus pronominal suffix literally means 'with you.' Rendering it as
    'was with you' preserves the idiom while communicating that this hidden intention
    belonged to or resided with God.
