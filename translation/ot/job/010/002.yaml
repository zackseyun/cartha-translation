id: JOB.10.2
reference: Job 10:2
source:
  edition: WLC
  text: אֹמַ֣ר אֶל אֱ֭לוֹהַּ אַל תַּרְשִׁיעֵ֑/נִי הֽ֝וֹדִיעֵ֗/נִי עַ֣ל מַה תְּרִיבֵֽ/נִי־־־׃
translation:
  text: I will say to God, ‘Do not condemn me; let me know why you contend with me.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “declare me guilty”; the Hebrew verb carries a judicial sense.
    reason: lexical_alternative
  - marker: b
    text: Or “why you bring a case against me” or “why you dispute with me.”
    reason: lexical_alternative
lexical_decisions:
- source_word: אֹמַר
  chosen: I will say
  alternatives:
  - I say
  - let me say
  lexicon: HALOT
  rationale: Qal imperfect 1cs of אמר can be future or modal in context. In Job's
    speech it naturally introduces his intended address to God, so 'I will say' preserves
    the forward-looking force without overinterpreting.
- source_word: אֶל אֱלוֹהַּ
  chosen: to God
  alternatives:
  - to Eloah
  lexicon: HALOT
  rationale: אֱלוֹהַּ is the singular common noun/title for God in Job. English idiom
    favors 'to God' rather than transliterating the title.
- source_word: אַל
  chosen: Do not
  alternatives:
  - do not please
  - never
  lexicon: HALOT
  rationale: Negative particle used with a jussive/imperfect for prohibition. 'Do
    not' is the natural English equivalent.
- source_word: תַּרְשִׁיעֵנִי
  chosen: condemn me
  alternatives:
  - declare me guilty
  - treat me as wicked
  lexicon: HALOT
  rationale: Hiphil of רשע commonly means to declare guilty/condemn. 'Condemn me'
    is concise and idiomatic, while preserving the judicial sense. 'Treat me as wicked'
    is possible but more interpretive.
- source_word: הוֹדִיעֵנִי
  chosen: let me know
  alternatives:
  - make known to me
  - tell me
  lexicon: HALOT
  rationale: Hiphil imperative of ידע means to cause to know, inform. 'Let me know'
    is natural modern English and retains the causative sense without stiffness.
- source_word: עַל מַה
  chosen: why
  alternatives:
  - for what reason
  - about what
  lexicon: HALOT
  rationale: Literally 'upon what/for what,' but in this interrogative construction
    it asks reason or grounds. 'Why' is the clearest idiomatic rendering.
- source_word: תְּרִיבֵנִי
  chosen: you contend with me
  alternatives:
  - you dispute with me
  - you bring a case against me
  - you strive against me
  lexicon: HALOT
  rationale: Qal of ריב can denote contending, disputing, or conducting a legal case.
    'Contend with me' preserves both interpersonal and forensic overtones without
    narrowing the sense too much.
