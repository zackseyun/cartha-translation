theological_decisions:
- issue: Judicial nuance of Job's plea to God
  chosen_reading: Render תַּרְשִׁיעֵנִי as 'condemn me' and תְּרִיבֵנִי as 'contend
    with me'
  alternative_readings:
  - '''declare me guilty'' ... ''bring a case against me'''
  - '''treat me as wicked'' ... ''strive against me'''
  rationale: The verse uses legal-conflict language but does not require a fully technical
    courtroom paraphrase. The chosen rendering preserves the tension of Job addressing
    God in judicial terms without importing a more systematized doctrine of divine
    judgment than the Hebrew states.
  doctrine_reference: Preserve theological tension rather than resolve it.
