id: JOB.10.11
reference: Job 10:11
source:
  edition: WLC
  text: ע֣וֹר וּ֭/בָשָׂר תַּלְבִּישֵׁ֑/נִי וּֽ/בַ/עֲצָמ֥וֹת וְ֝/גִידִ֗ים תְּסֹכְכֵֽ/נִי׃
translation:
  text: You clothed me with skin and flesh, and knit me together with bones and sinews.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and covered me with bones and sinews.' The Hebrew verb can also carry
      the sense of covering or enclosing.
    reason: lexical_alternative
lexical_decisions:
- source_word: עוֹר
  chosen: skin
  alternatives:
  - hide
  lexicon: HALOT
  rationale: The noun denotes skin in the human-body context. 'Hide' is possible in
    animal contexts but is unnatural here, where Job speaks of his own formation.
- source_word: בָשָׂר
  chosen: flesh
  alternatives:
  - body
  - meat
  lexicon: HALOT
  rationale: '''Flesh'' is the most direct and idiomatic rendering for bodily tissue
    and preserves the concrete parallel with ''skin.'' ''Body'' is too broad; ''meat''
    is misleading in modern English.'
- source_word: תַּלְבִּישֵׁנִי
  chosen: you clothed me
  alternatives:
  - you dressed me
  lexicon: HALOT
  rationale: Hiphil of לבש means to clothe/dress. 'Clothed' preserves the metaphor
    of God putting skin and flesh upon Job's frame and fits established English idiom
    without sounding archaic.
- source_word: בַּעֲצָמוֹת
  chosen: with bones
  alternatives:
  - in bones
  - by bones
  lexicon: HALOT
  rationale: The preposition ב here is instrumental or associative in parallel with
    the following phrase. 'With bones' gives the natural English sense of bodily composition.
- source_word: גִידִים
  chosen: sinews
  alternatives:
  - tendons
  - ligaments
  lexicon: HALOT
  rationale: The term refers to connective bodily tissues. 'Sinews' is a standard
    biblical-English rendering and remains understandable in modern English, while
    preserving the poetic register better than the more clinical 'tendons' or 'ligaments'.
- source_word: תְּסֹכְכֵנִי
  chosen: you knit me together
  alternatives:
  - you fenced me in
  - you wove me together
  - you covered me
  lexicon: HALOT
  rationale: From סכך, the verb can mean cover, hedge, or weave together depending
    on context. In this body-formation context, 'knit me together' best conveys the
    idea of God forming and enclosing the body with bones and sinews, matching the
    poetic imagery and the parallel with 'clothed me.'
