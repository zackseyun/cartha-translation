id: JOB.10.19
reference: Job 10:19
source:
  edition: WLC
  text: כַּ/אֲשֶׁ֣ר לֹא הָיִ֣יתִי אֶהְיֶ֑ה מִ֝/בֶּ֗טֶן לַ/קֶּ֥בֶר אוּבָֽל־׃
translation:
  text: I would have been as though I had not been; from the womb I would have been
    carried to the grave.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'I should have been as though I had not existed.'
    reason: lexical_alternative
  - marker: b
    text: Literally, 'from the womb to the grave I would have been carried/brought.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כַּאֲשֶׁר
  chosen: as though
  alternatives:
  - as if
  - just as
  lexicon: HALOT
  rationale: Here the particle introduces a comparison to an unreal state, not a simple
    temporal 'when.' 'As though' best captures the counterfactual sense in smooth
    English.
- source_word: לֹא הָיִיתִי אֶהְיֶה
  chosen: I would have been ... I had not been
  alternatives:
  - I should have been as though I had not existed
  - I would be as if I had not been
  lexicon: HALOT
  rationale: The sequence of היה forms expresses an unreal or wished-for condition
    in context. English past counterfactual wording ('would have been ... had not
    been') communicates the sense more naturally than a wooden future 'I will be.'
- source_word: מִבֶּטֶן
  chosen: from the womb
  alternatives:
  - from birth
  - out of the womb
  lexicon: HALOT
  rationale: Literal 'from the womb' preserves the imagery and matches Job's reflection
    on birth and nonexistence.
- source_word: לַקֶּבֶר
  chosen: to the grave
  alternatives:
  - to the tomb
  - to the burial place
  - to Sheol
  lexicon: HALOT
  rationale: קבר denotes the grave/burial place rather than Sheol as the underworld.
    'Grave' is the most natural and accurate English rendering here.
- source_word: אוּבָל
  chosen: I would have been carried
  alternatives:
  - I would have been brought
  - I would have been led
  lexicon: HALOT
  rationale: 'The Hophal of יבל is passive/causative: ''be brought/carried.'' In the
    birth-to-burial image, ''carried'' is vivid and idiomatic, suggesting being taken
    directly from womb to grave.'
