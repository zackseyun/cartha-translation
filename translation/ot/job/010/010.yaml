id: JOB.10.10
reference: Job 10:10
source:
  edition: WLC
  text: הֲ/לֹ֣א כֶ֭/חָלָב תַּתִּיכֵ֑/נִי וְ֝/כַ/גְּבִנָּ֗ה תַּקְפִּיאֵֽ/נִי׃
translation:
  text: Did you not pour me out like milk and curdle me like cheese?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'congeal me like curds.' The Hebrew noun can be rendered more specifically
      as 'cheese' or more generally as a curdled dairy product.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲלֹא
  chosen: Did you not
  alternatives:
  - Have you not
  - Did you not indeed
  lexicon: HALOT
  rationale: Introduces a rhetorical question expecting an affirmative answer. 'Did
    you not' is natural modern English and preserves the interrogative force.
- source_word: כֶּחָלָב
  chosen: like milk
  alternatives:
  - as milk
  lexicon: HALOT
  rationale: The prefixed כ marks comparison. 'Like milk' is the most idiomatic English
    rendering and preserves the simile.
- source_word: תַּתִּיכֵנִי
  chosen: pour me out
  alternatives:
  - cast me out
  - melt me
  lexicon: HALOT
  rationale: From נתך in the Hiphil, the image is of pouring out a liquid. In this
    embryological metaphor, 'pour me out' best matches the milk imagery and the parallel
    with curdling.
- source_word: וְכַגְּבִנָּה
  chosen: like cheese
  alternatives:
  - like curds
  lexicon: HALOT
  rationale: The conjunction plus comparative preposition introduces the second simile.
    'Cheese' is the plain lexical sense of גְּבִנָה and fits the milk-to-cheese formation
    metaphor.
- source_word: תַּקְפִּיאַנִי
  chosen: curdle me
  alternatives:
  - congeal me
  - make me coagulate
  lexicon: HALOT
  rationale: From קפא in the Hiphil, the sense is causing to thicken or congeal. 'Curdle
    me' is the most natural English equivalent in a dairy metaphor and preserves the
    vividness of the Hebrew.
