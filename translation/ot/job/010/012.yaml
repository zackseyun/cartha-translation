id: JOB.10.12
reference: Job 10:12
source:
  edition: WLC
  text: חַיִּ֣ים וָ֭/חֶסֶד עָשִׂ֣יתָ עִמָּדִ֑/י וּ֝/פְקֻדָּתְ/ךָ֗ שָֽׁמְרָ֥ה רוּחִֽ/י׃
translation:
  text: You have granted me life and steadfast love, and your care has preserved my
    spirit.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your visitation' or 'your oversight' has preserved my spirit.
    reason: lexical_alternative
  - marker: b
    text: Or 'my breath.'
    reason: lexical_alternative
lexical_decisions:
- source_word: חַיִּים
  chosen: life
  alternatives:
  - lives
  - living
  lexicon: HALOT
  rationale: Though morphologically plural, the noun commonly functions as an abstract/plural-of-fullness
    meaning 'life.' Singular English is the natural equivalent here in parallel with
    God's beneficence toward Job.
- source_word: וָחֶסֶד
  chosen: steadfast love
  alternatives:
  - kindness
  - mercy
  - covenant loyalty
  lexicon: HALOT
  rationale: חֶסֶד carries rich covenantal and loyal-love overtones. 'Steadfast love'
    preserves this theological weight better than the thinner 'kindness' or the narrower
    'mercy,' while remaining idiomatic modern English.
- source_word: עָשִׂיתָ עִמָּדִי
  chosen: you have granted me
  alternatives:
  - you made with me
  - you dealt with me in giving
  - you showed me
  lexicon: HALOT
  rationale: Literally 'you did with me,' but in context the idiom expresses God's
    bestowal of benefits ('life and steadfast love'). 'Granted me' captures the benefactive
    sense in clear English without over-paraphrasing.
- source_word: וּפְקֻדָּתְךָ
  chosen: your care
  alternatives:
  - your oversight
  - your visitation
  - your providence
  - your charge
  lexicon: HALOT
  rationale: פְקֻדָּה can denote oversight, visitation, or attentive care. In this
    context of God's sustaining attention to Job's life, 'your care' best conveys
    the positive, preserving sense. Because 'visitation' is a viable more formal alternative,
    it is preserved in a footnote.
- source_word: שָׁמְרָה
  chosen: has preserved
  alternatives:
  - has kept
  - has guarded
  - watched over
  lexicon: HALOT
  rationale: The verb means keep/guard/preserve. 'Has preserved' fits the context
    of sustaining life and spirit, making the result of divine care explicit while
    staying close to the Hebrew sense.
- source_word: רוּחִי
  chosen: my spirit
  alternatives:
  - my breath
  - my life-breath
  lexicon: HALOT
  rationale: רוּחַ can mean spirit, breath, or wind. Here, in parallel with life and
    divine preservation, 'my spirit' best reflects the inner life/self that God has
    sustained, while 'breath' remains a plausible lexical alternative worth noting.
