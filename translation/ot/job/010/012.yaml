theological_decisions:
- issue: Nuance of חֶסֶד in relation to God
  chosen_reading: steadfast love
  alternative_readings:
  - kindness
  - mercy
  - covenant loyalty
  rationale: The verse speaks of God's benevolent action toward Job without requiring
    a narrower doctrinal reading. 'Steadfast love' preserves the covenantal and loyal
    dimension of חֶסֶד while remaining accessible, in line with optimal equivalence
    and the instruction to preserve theological weight without importing extra claims.
  doctrine_reference: DOCTRINE.md Translation philosophy §§1, 6
- issue: Sense of פְקֻדָּה
  chosen_reading: positive divine care/oversight
  alternative_readings:
  - visitation
  - oversight
  - providence
  rationale: The noun can be semantically broad, but the immediate clause 'has preserved
    my spirit' favors a benevolent sense of attentive oversight rather than punitive
    visitation. The alternative is preserved in a footnote to maintain transparency
    where ambiguity remains.
  doctrine_reference: DOCTRINE.md Translation philosophy §3
