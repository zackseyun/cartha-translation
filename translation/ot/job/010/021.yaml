theological_decisions:
- issue: Rendering of צַלְמָוֶת in poetic death-context
  chosen_reading: deep shadow
  alternative_readings:
  - shadow of death
  - deep darkness
  rationale: The Hebrew term is lexically debated between a more literal/traditional
    'shadow of death' and an idiomatic sense of profound darkness. Following original-language
    primacy and preserving ambiguity where appropriate, the main text uses 'deep shadow'
    as a natural English rendering that fits the poetic parallelism, while preserving
    the traditional alternative in a footnote.
  doctrine_reference: Translation philosophy §§1, 3
