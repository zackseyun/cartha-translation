id: JOB.10.21
reference: Job 10:21
source:
  edition: WLC
  text: בְּ/טֶ֣רֶם אֵ֭לֵךְ וְ/לֹ֣א אָשׁ֑וּב אֶל אֶ֖רֶץ חֹ֣שֶׁךְ וְ/צַלְמָֽוֶת־׃
translation:
  text: before I go—and do not return—to the land of darkness and deep shadow,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, traditionally, 'the land of darkness and the shadow of death.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּטֶרֶם
  chosen: before
  alternatives:
  - before I go
  - before
  lexicon: HALOT
  rationale: Temporal particle meaning 'before' or 'before that.' In English it naturally
    introduces the clause 'before I go.'
- source_word: אֵלֵךְ
  chosen: I go
  alternatives:
  - I depart
  - I leave
  lexicon: HALOT
  rationale: הלך in Qal 1cs is the common verb 'go/walk.' Here 'I go' preserves the
    simple motion toward death/Sheol without overinterpreting as 'die,' though the
    context implies departure to the realm of the dead.
- source_word: וְלֹא אָשׁוּב
  chosen: and do not return
  alternatives:
  - and not return
  - never to return
  lexicon: HALOT
  rationale: שׁוב means 'return.' The conjunction plus negation is rendered straightforwardly.
    'Do not return' keeps the Hebrew sequence and avoids adding the interpretive intensifier
    'never,' though that sense is contextually present.
- source_word: אֶל
  chosen: to
  alternatives:
  - into
  lexicon: HALOT
  rationale: Standard preposition of direction. 'To' is idiomatic with 'go ... to
    the land.'
- source_word: אֶרֶץ
  chosen: the land
  alternatives:
  - a land
  - the earth
  lexicon: HALOT
  rationale: In this context אֶרֶץ denotes a realm or land, not the earth generally.
    The definite sense is supplied in English by the construct-like specification
    'of darkness and deep shadow.'
- source_word: חֹשֶׁךְ
  chosen: darkness
  alternatives:
  - gloom
  lexicon: HALOT
  rationale: Basic sense is 'darkness.' This is the most direct and natural rendering.
- source_word: צַלְמָוֶת
  chosen: deep shadow
  alternatives:
  - shadow of death
  - deep darkness
  lexicon: HALOT
  rationale: The term can denote very deep darkness or gloom; while traditionally
    rendered 'shadow of death,' many contexts support the sense 'deep shadow/deep
    darkness.' Here 'deep shadow' preserves the poetic parallel with 'darkness' without
    forcing an explicit death component already implied by context.
