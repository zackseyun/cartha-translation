id: JOB.10.7
reference: Job 10:7
source:
  edition: WLC
  text: עַֽל דַּ֭עְתְּ/ךָ כִּי לֹ֣א אֶרְשָׁ֑ע וְ/אֵ֖ין מִ/יָּדְ/ךָ֣ מַצִּֽיל־־׃
translation:
  text: Although you know that I am not wicked, there is no one who can deliver from
    your hand.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'You know that I am not guilty.' The Hebrew says 'not wicked,' which
      emphasizes Job's denial of being a wicked man rather than a claim of absolute
      sinlessness.
    reason: lexical_alternative
  - marker: b
    text: '''From your hand'' is a Hebrew expression for being under someone''s power
      or control.'
    reason: cultural_note
lexical_decisions:
- source_word: עַל דַּעְתְּךָ
  chosen: Although you know
  alternatives:
  - By your knowledge
  - Upon your knowing
  - You know that
  lexicon: HALOT
  rationale: The idiom עַל + דעת with pronominal suffix functions adverbially here,
    introducing what God knows as the basis for Job's complaint. 'Although you know'
    captures the concessive force in context better than a more wooden 'upon your
    knowledge,' while still preserving the direct appeal to God's knowledge.
- source_word: כִּי
  chosen: that
  alternatives:
  - for that
  - indeed that
  lexicon: HALOT
  rationale: 'Here כִּי introduces the content of what God knows: ''that I am not
    wicked.'' The concessive nuance is already carried by the preceding idiomatic
    rendering, so a simple content marker is best in English.'
- source_word: לֹא אֶרְשָׁע
  chosen: I am not wicked
  alternatives:
  - I will not be wicked
  - I am not guilty
  - I have not acted wickedly
  lexicon: HALOT
  rationale: The Qal imperfect of רשע can be rendered statively in context. Given
    Job's protestation of innocence, 'I am not wicked' best reflects the sense without
    overcommitting to future or habitual aspect. 'Guilty' is possible contextually
    but narrows the moral term too much.
- source_word: וְאֵין
  chosen: there is no one
  alternatives:
  - and there is none
  - and no one exists
  lexicon: HALOT
  rationale: Existential אֵין is naturally rendered 'there is no one' in English.
    This keeps the clause idiomatic while preserving the absolute negation.
- source_word: מִיָּדְךָ
  chosen: from your hand
  alternatives:
  - out of your hand
  - from your power
  lexicon: HALOT
  rationale: '''Hand'' is a common Hebrew metaphor for power or control. The literal
    rendering ''from your hand'' preserves the imagery and is clear in English; ''from
    your power'' would interpret rather than translate.'
- source_word: מַצִּיל
  chosen: who can deliver
  alternatives:
  - delivering one
  - rescuer
  - who rescues
  lexicon: HALOT
  rationale: The Hiphil participle of נצל denotes one who delivers or rescues. In
    English, 'who can deliver' fits the existential construction smoothly and conveys
    the implied impossibility of escape from God's hand.
