theological_decisions:
- issue: Job's claim of innocence before God
  chosen_reading: Render Job's statement as a protest of non-wickedness without implying
    absolute sinlessness.
  alternative_readings:
  - Render as 'I am innocent'
  - Render as 'I am not guilty'
  rationale: The Hebrew uses רשע ('wicked'), not a stronger claim to total moral perfection.
    'I am not wicked' preserves Job's complaint that God's treatment is disproportionate
    and does not import a doctrinal claim that Job is entirely sinless.
  doctrine_reference: Preserve theological tension rather than resolve it.
