id: JOB.10.5
reference: Job 10:5
source:
  edition: WLC
  text: הֲ/כִ/ימֵ֣י אֱנ֣וֹשׁ יָמֶ֑י/ךָ אִם שְׁ֝נוֹתֶ֗י/ךָ כִּ֣/ימֵי גָֽבֶר־׃
translation:
  text: Are your days like the days of man, or your years like the days of a strong
    man?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'mortal' for 'man' (אֱנוֹשׁ), emphasizing human frailty.
    reason: lexical_alternative
  - marker: b
    text: Hebrew גָבֶר may also be rendered 'man' or 'mighty man'; 'strong man' is
      used here to preserve the distinction from אֱנוֹשׁ in the previous line.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲכִימֵי
  chosen: Are ... like the days of
  alternatives:
  - Are ... as the days of
  - Are ... like human days
  lexicon: HALOT
  rationale: The interrogative הֲ with comparative כ and construct ימי introduces
    a rhetorical question of comparison. English idiom is best captured with 'Are
    ... like the days of' rather than a more wooden 'Are as the days of.'
- source_word: אֱנוֹשׁ
  chosen: man
  alternatives:
  - mortal
  - human
  lexicon: HALOT
  rationale: אֱנוֹשׁ often emphasizes frail or mortal man, but here the contrast is
    between God's lifespan and that of a human being. 'Man' preserves the gender-accurate
    singular form and matches the representative sense; 'mortal' is possible but slightly
    interpretive.
- source_word: יָמֶיךָ
  chosen: your days
  lexicon: HALOT
  rationale: A straightforward rendering of the plural construct with 2ms suffix,
    referring to God's days in Job's rhetorical question.
- source_word: אִם
  chosen: or
  alternatives:
  - if
  lexicon: HALOT
  rationale: In this poetic parallelism אִם introduces the second member as an alternative
    comparison, not a conditional clause. 'Or' best reflects the sense in English.
- source_word: שְׁנוֹתֶיךָ
  chosen: your years
  lexicon: HALOT
  rationale: Direct rendering of the plural noun with 2ms suffix, paired poetically
    with 'your days.'
- source_word: כִּימֵי
  chosen: like the days of
  alternatives:
  - as the days of
  lexicon: HALOT
  rationale: Repeats the comparative construction from the first colon and should
    be rendered consistently.
- source_word: גָבֶר
  chosen: a strong man
  alternatives:
  - man
  - warrior
  - mighty man
  lexicon: HALOT
  rationale: גבר can denote a man with connotations of strength or vigor. Rendering
    it as 'a strong man' preserves the lexical distinction from אֱנוֹשׁ in the first
    colon without over-specifying as 'warrior.'
