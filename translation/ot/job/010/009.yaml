id: JOB.10.9
reference: Job 10:9
source:
  edition: WLC
  text: זְכָר נָ֭א כִּי כַ/חֹ֣מֶר עֲשִׂיתָ֑/נִי וְֽ/אֶל עָפָ֥ר תְּשִׁיבֵֽ/נִי־־־׃
translation:
  text: Remember, please, that you made me like clay, and will you return me to dust?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'as clay'; the Hebrew expression is comparative, not explicitly 'from
      clay,' though the creation imagery is clearly evoked.
    reason: lexical_alternative
  - marker: b
    text: Or 'and you will return me to dust.' The Hebrew form itself can be read
      as either a statement or, in context, a rhetorical question.
    reason: alternative_reading
lexical_decisions:
- source_word: זְכָר
  chosen: Remember
  alternatives:
  - Remember it
  - Call to mind
  lexicon: HALOT
  rationale: Imperative 2ms from זכר, addressed directly to God. 'Remember' is the
    natural English imperative and preserves the prayer-like appeal.
- source_word: נָא
  chosen: please
  alternatives:
  - now
  - I pray
  lexicon: HALOT
  rationale: Politeness/entreaty particle softening the imperative. 'Please' is clear
    modern English; 'now' would be misleading temporally, and 'I pray' is archaic.
- source_word: כִּי
  chosen: that
  alternatives:
  - for
  - because
  lexicon: HALOT
  rationale: Here it introduces the content of what Job asks God to remember. 'That'
    best fits the clause in English.
- source_word: כַחֹמֶר
  chosen: like clay
  alternatives:
  - as clay
  - from clay
  lexicon: HALOT
  rationale: 'The prefixed כ marks comparison: ''like/as clay.'' While the image evokes
    formation from earth, the Hebrew here is comparative rather than explicitly separative
    (''from''). ''Like clay'' is natural modern English and preserves the simile.'
- source_word: עֲשִׂיתָנִי
  chosen: you made me
  alternatives:
  - you fashioned me
  - you formed me
  lexicon: HALOT
  rationale: עשה is broad ('make/do'). In this context of bodily formation, 'made'
    is accurate and idiomatic; more specific options like 'fashioned' interpret the
    imagery slightly more strongly than the verb itself requires.
- source_word: וְאֶל
  chosen: and ... to
  alternatives:
  - and toward
  - but to
  lexicon: HALOT
  rationale: Conjunction plus preposition introducing the second clause, with destination
    'to dust.' Rendering the conjunction simply as 'and' preserves the Hebrew coordination;
    the interrogative force comes from context rather than a separate particle.
- source_word: עָפָר
  chosen: dust
  alternatives:
  - soil
  - dry earth
  lexicon: HALOT
  rationale: Standard rendering for עפר, especially in mortality/creation contexts.
    It also echoes Genesis creation language naturally in English.
- source_word: תְּשִׁיבֵנִי
  chosen: will you return me
  alternatives:
  - you will return me
  - will you turn me back
  lexicon: HALOT
  rationale: 'Hiphil of שוב means ''cause to return/bring back.'' In this lament context,
    English is best as a rhetorical question: ''will you return me...?'' This reflects
    the sense of protest and aligns with the verse''s appeal.'
