theological_decisions:
- issue: Reference of אֵל
  chosen_reading: The speaker says that God is the one who hands him over to the ungodly.
  alternative_readings:
  - A generic 'mighty one' hands him over
  rationale: In Job, אֵל commonly refers to God, and the theological force of Job's
    complaint is that God himself has delivered him into hostile power. This is a
    contextual, not doctrinally imported, reading.
