id: JOB.16.11
reference: Job 16:11
source:
  edition: WLC
  text: יַסְגִּירֵ֣/נִי אֵ֭ל אֶ֣ל עֲוִ֑יל וְ/עַל יְדֵ֖י רְשָׁעִ֣ים יִרְטֵֽ/נִי־׃
translation:
  text: God hands me over to the ungodly and casts me into the hands of the wicked.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'delivers me up to the godless.'
    reason: lexical_alternative
  - marker: b
    text: The final verb is difficult; it likely means 'casts me' or 'hurls me' into
      the power of the wicked.
    reason: lexical_alternative
lexical_decisions:
- source_word: יַסְגִּירֵנִי
  chosen: hands me over
  alternatives:
  - delivers me up
  - gives me over
  lexicon: HALOT
  rationale: Hiphil of סגר in this context conveys handing someone over into another's
    power. 'Hands me over' is natural modern English and preserves the hostile judicial
    sense better than a weaker 'gives me over'.
- source_word: אֵל
  chosen: God
  alternatives:
  - God Mighty One
  lexicon: HALOT
  rationale: Here אֵל functions as a divine title/name referring to God, not merely
    an adjective such as 'mighty one.' 'God' is the clearest idiomatic rendering in
    context.
- source_word: אֶל
  chosen: to
  alternatives:
  - into the power of
  lexicon: HALOT
  rationale: The preposition marks movement toward or transfer to another party. In
    English this sense is absorbed idiomatically into 'hands me over to'.
- source_word: עֲוִיל
  chosen: the ungodly
  alternatives:
  - the godless
  - the wicked fool
  - the unjust
  lexicon: HALOT
  rationale: The noun denotes a morally perverse or impious person, not merely someone
    intellectually foolish. 'The ungodly' preserves the ethical-religious force better
    than simple 'fool.'
- source_word: וְעַל יְדֵי
  chosen: into the hands of
  alternatives:
  - by the hands of
  - over to
  lexicon: HALOT
  rationale: The idiom עַל יְדֵי with 'hands' expresses agency or being placed in
    someone's power. 'Into the hands of' is a natural English idiom that makes the
    metaphor explicit and matches the verse's parallelism.
- source_word: רְשָׁעִים
  chosen: the wicked
  alternatives:
  - evil men
  - the guilty
  lexicon: HALOT
  rationale: A standard rendering for רשעים, denoting those characterized by wickedness.
    'The wicked' is concise, idiomatic, and preserves the moral category.
- source_word: יִרְטֵנִי
  chosen: casts me
  alternatives:
  - hurls me
  - throws me down
  - delivers me
  lexicon: HALOT
  rationale: The verb is difficult and traditionally understood as throwing or casting
    violently. 'Casts me' keeps the force without overcommitting to a more specific
    image such as 'throws me down.' The hostile action suits the parallel with 'hands
    me over.'
