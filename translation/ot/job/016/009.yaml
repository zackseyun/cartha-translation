id: JOB.16.9
reference: Job 16:9
source:
  edition: WLC
  text: אַפּ֤/וֹ טָרַ֨ף וַֽ/יִּשְׂטְמֵ֗/נִי חָרַ֣ק עָלַ֣/י בְּ/שִׁנָּ֑י/ו צָרִ֓/י
    יִלְט֖וֹשׁ עֵינָ֣י/ו לִֽ/י׀׀׃
translation:
  text: His anger has torn me and hated me; he gnashes his teeth at me; my adversary
    sharpens his eyes against me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my enemy whets his eyes at me.' The Hebrew image is literally 'sharpens
      his eyes,' a metaphor for hostile, intent staring.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַפּוֹ
  chosen: His anger
  alternatives:
  - His nose
  - His wrath
  lexicon: HALOT
  rationale: אַף literally denotes 'nose' and by extension anger/wrath. In this poetic
    context the idiom clearly refers to hostile anger, not the body part. 'Anger'
    is more natural modern English than 'wrath' here while preserving the emotional
    force.
- source_word: טָרַף
  chosen: has torn
  alternatives:
  - tore
  - has torn apart
  - mauled
  lexicon: HALOT
  rationale: The verb commonly denotes tearing prey like a wild beast. 'Has torn'
    preserves the vivid predatory imagery and works well with the following perfects
    as a present-result description in lament poetry.
- source_word: וַיִּשְׂטְמֵנִי
  chosen: and hated me
  alternatives:
  - and attacked me
  - and was hostile to me
  - and bore hatred toward me
  lexicon: HALOT
  rationale: The lemma שׂטם conveys enmity/hatred. 'Hated me' is the most direct rendering.
    More interpretive options like 'attacked me' import action beyond the lexical
    sense.
- source_word: חָרַק
  chosen: he gnashes
  alternatives:
  - he gnashed
  - he grinds
  lexicon: HALOT
  rationale: The verb means to gnash or grind, especially of teeth in anger. Present
    English 'he gnashes' fits the vivid poetic portrayal.
- source_word: בְּשִׁנָּיו
  chosen: his teeth
  alternatives:
  - with his teeth
  lexicon: HALOT
  rationale: With חָרַק the idiomatic English expression is 'gnash one's teeth.' Rendering
    the preposition explicitly as 'with' is possible but less idiomatic; the sense
    is retained in English.
- source_word: צָרִי
  chosen: my adversary
  alternatives:
  - my enemy
  - my foe
  - my oppressor
  lexicon: HALOT
  rationale: The noun denotes one who is hostile or in opposition. 'My adversary'
    preserves the personal hostility without over-specifying military or legal nuance.
    It also leaves open whether Job speaks of God in adversarial terms or of an enemy
    figure.
- source_word: יִלְטוֹשׁ
  chosen: sharpens
  alternatives:
  - whets
  - hones
  - fixes keenly
  lexicon: HALOT
  rationale: The verb literally means to sharpen/whet. Applied to eyes, it is metaphorical
    and vivid. 'Sharpens' preserves the unusual Hebrew image better than smoothing
    it to 'glares' or 'stares fiercely.'
- source_word: עֵינָיו לִי
  chosen: his eyes against me
  alternatives:
  - his eyes at me
  - his gaze against me
  - his eyes on me
  lexicon: HALOT
  rationale: The construction conveys hostile focus directed toward Job. 'Against
    me' brings out the adversarial force of לִי in context better than the more neutral
    'at me' or 'on me'.
