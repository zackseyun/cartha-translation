theological_decisions:
- issue: Referent of the hostile subject(s) in Job's lament
  chosen_reading: Retain the masculine singular references without identifying the
    referent beyond the text.
  alternative_readings:
  - God as the immediate referent
  - a human enemy/adversary
  - a blended poetic portrayal of God acting as an enemy
  rationale: The verse is part of Job's lament and uses singular masculine forms,
    but the text itself does not explicitly restate the referent in each clause. The
    translation preserves the ambiguity and does not resolve the theological tension
    by specifying 'God' or reducing the language to merely human opposition.
  doctrine_reference: Preserve theological tension rather than resolve it.
