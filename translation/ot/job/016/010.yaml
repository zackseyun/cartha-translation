id: JOB.16.10
reference: Job 16:10
source:
  edition: WLC
  text: פָּעֲר֬וּ עָלַ֨/י בְּ/פִי/הֶ֗ם בְּ֭/חֶרְפָּה הִכּ֣וּ לְחָיָ֑/י יַ֝֗חַד עָלַ֥/י
    יִתְמַלָּאֽוּ/ן׀׃
translation:
  text: They have opened their mouths wide against me; with reproach they have struck
    my cheek; together they mass themselves against me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they gather themselves against me' or 'they are filled against me.'
      The final verb is idiomatic and difficult; the sense is of hostile forces assembling
      in concert.
    reason: lexical_alternative
lexical_decisions:
- source_word: פָּעֲרוּ
  chosen: have opened ... wide
  alternatives:
  - have gaped
  - have opened
  lexicon: HALOT
  rationale: The verb פער in this idiom conveys opening the mouth wide, often with
    hostile or mocking force. 'Opened their mouths wide' preserves the vivid image
    more naturally than the archaic 'gaped.'
- source_word: עָלַי
  chosen: against me
  alternatives:
  - at me
  - over me
  lexicon: HALOT
  rationale: With a hostile verb and object of attack, על is best rendered 'against'
    to express adversarial force.
- source_word: בפיהם
  chosen: their mouths
  alternatives:
  - their mouth
  lexicon: HALOT
  rationale: 'The Hebrew literally says ''with their mouth,'' but English idiom prefers
    the plural with a plural subject: ''their mouths.'''
- source_word: בְּחֶרְפָּה
  chosen: with reproach
  alternatives:
  - in scorn
  - with contempt
  - mockingly
  lexicon: HALOT
  rationale: חרפה denotes reproach, insult, or disgrace. 'With reproach' stays close
    to the noun form while conveying verbal abuse.
- source_word: הִכּוּ
  chosen: have struck
  alternatives:
  - have smitten
  - have hit
  lexicon: HALOT
  rationale: נכה is a common verb for striking. 'Have struck' is clear modern English
    and fits the poetic parallelism.
- source_word: לְחָיִי
  chosen: my cheek
  alternatives:
  - my jaw
  - my face
  lexicon: HALOT
  rationale: לחי refers specifically to the cheek or jaw. 'Cheek' best matches the
    common image of humiliating assault and is the most natural English rendering
    here.
- source_word: יַחַד
  chosen: together
  alternatives:
  - altogether
  - as one
  lexicon: HALOT
  rationale: יחד marks collective action. 'Together' is concise and idiomatic.
- source_word: יִתְמַלָּאוּן
  chosen: they mass themselves
  alternatives:
  - they gather themselves
  - they fill themselves
  - they are emboldened
  lexicon: HALOT
  rationale: The hitpael/imperfect of מלא here is idiomatic and difficult. In context
    of hostile action, it likely means they gather or muster themselves in full force
    against Job. 'Mass themselves' captures the collective hostile buildup without
    over-paraphrasing.
