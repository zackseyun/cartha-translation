id: JOB.16.3
reference: Job 16:3
source:
  edition: WLC
  text: הֲ/קֵ֥ץ לְ/דִבְרֵי ר֑וּחַ א֥וֹ מַה יַּ֝מְרִֽיצְ/ךָ֗ כִּ֣י תַעֲנֶֽה־־׃
translation:
  text: Is there no end to windy words? Or what provokes you, that you answer this
    way?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'what emboldens you, that you answer?'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲקֵץ
  chosen: Is there no end
  alternatives:
  - Is there an end
  - Will there be an end
  lexicon: HALOT
  rationale: קֵץ means 'end, limit.' With the interrogative הֲ in context, Job asks
    a rhetorical question expressing exasperation. English idiom naturally brings
    out the force as 'Is there no end...?' rather than a bare 'Is there an end...?'.
- source_word: לְדִבְרֵי רוּחַ
  chosen: to windy words
  alternatives:
  - to words of wind
  - to vain words
  - to empty talk
  lexicon: HALOT
  rationale: דִּבְרֵי רוּחַ is literally 'words of wind/spirit.' In context it is
    an idiom for empty, insubstantial speech. 'Windy words' preserves the metaphor
    and remains natural English better than the more wooden 'words of wind.'
- source_word: אוֹ
  chosen: Or
  alternatives:
  - Or else
  lexicon: HALOT
  rationale: Simple disjunctive conjunction introducing the second rhetorical question.
- source_word: מַה
  chosen: what
  alternatives:
  - why
  - what is it that
  lexicon: HALOT
  rationale: Interrogative pronoun introducing the cause or motive behind the friend's
    response. 'What' is the most direct rendering.
- source_word: יַמְרִיצְךָ
  chosen: provokes you
  alternatives:
  - emboldens you
  - urges you on
  - irritates you
  lexicon: HALOT
  rationale: The Hiphil of מרץ here conveys the idea of stirring, inciting, or driving
    someone to respond. 'Provokes you' fits the adversarial tone and the following
    clause well. 'Emboldens you' is possible and reflected in a footnote because some
    understand the verb as giving boldness or impetus.
- source_word: כִּי
  chosen: that
  alternatives:
  - that you should
  - for
  - because
  lexicon: HALOT
  rationale: 'Here כִּי introduces the content/result of the provocation: ''what provokes
    you, that you answer...?'' English can render this smoothly with ''that.'' A causal
    ''because'' is possible but less natural in this construction.'
- source_word: תַעֲנֶה
  chosen: you answer this way
  alternatives:
  - you answer
  - you respond
  lexicon: HALOT
  rationale: ענה in Qal commonly means 'answer, respond.' Adding 'this way' is a light
    contextual expansion to make the English idiomatic and to reflect the reproachful
    force of Job's question without adding content beyond the discourse situation.
