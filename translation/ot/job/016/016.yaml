id: JOB.16.16
reference: Job 16:16
source:
  edition: WLC
  text: פָּנַ֣/י חמרמרה מִנִּי בֶ֑כִי וְ/עַ֖ל עַפְעַפַּ֣/י צַלְמָֽוֶת־׃
translation:
  text: My face is red from weeping, and on my eyelids is deep darkness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the shadow of death.' The Hebrew term can denote either deathly shadow
      or very deep darkness; here the context favors intense gloom on the eyelids
      rather than a direct reference to death.
    reason: lexical_alternative
lexical_decisions:
- source_word: פָּנַי
  chosen: my face
  alternatives:
  - my cheeks
  - my countenance
  lexicon: HALOT
  rationale: The plural form with 1cs suffix commonly functions idiomatically as a
    singular collective in English. 'My face' is the most natural and contextually
    fitting rendering.
- source_word: חמרמרה
  chosen: is red
  alternatives:
  - is inflamed
  - is darkened
  - is swollen
  lexicon: HALOT
  rationale: This rare verb conveys a changed, agitated appearance of the face from
    intense emotion or physical distress. In context with weeping, 'is red' best captures
    the visible effect in clear modern English without overinterpreting the exact
    physiology.
- source_word: מִנִּי
  chosen: from
  alternatives:
  - because of
  - with
  lexicon: HALOT
  rationale: 'The preposition marks cause or source here: the facial condition results
    from weeping. ''From'' is concise and idiomatic in English.'
- source_word: בכי
  chosen: weeping
  alternatives:
  - crying
  - tears
  lexicon: HALOT
  rationale: The noun denotes weeping/crying. 'Weeping' preserves the elevated poetic
    tone better than 'crying,' while avoiding the narrower image of only 'tears.'
- source_word: וְעַל
  chosen: and on
  alternatives:
  - and over
  - and upon
  lexicon: HALOT
  rationale: The conjunction plus preposition introduces the second poetic line straightforwardly.
    'And on' is natural and sufficiently literal.
- source_word: עפעפי
  chosen: my eyelids
  alternatives:
  - my eyes
  - the rims of my eyes
  lexicon: HALOT
  rationale: The Hebrew specifically refers to eyelids, not merely eyes. The more
    precise term should be retained.
- source_word: צלמות
  chosen: deep darkness
  alternatives:
  - shadow of death
  - gloom
  lexicon: HALOT
  rationale: In poetic Hebrew this term can denote profound darkness or gloom, not
    necessarily death itself. 'Deep darkness' follows source sense more closely in
    this context of appearance and suffering, while preserving the intensity of the
    image. The traditional 'shadow of death' is worth preserving in a footnote because
    of its familiarity and possible resonance.
