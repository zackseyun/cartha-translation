id: JOB.16.13
reference: Job 16:13
source:
  edition: WLC
  text: יָ֘סֹ֤בּוּ עָלַ֨/י רַבָּ֗י/ו יְפַלַּ֣ח כִּ֭לְיוֹתַ/י וְ/לֹ֣א יַחְמ֑וֹל יִשְׁפֹּ֥ךְ
    לָ֝/אָ֗רֶץ מְרֵרָֽתִ/י׀׃
translation:
  text: His archers surround me; he splits open my kidneys and does not spare; he
    pours out my gall on the ground.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his great ones' or 'his chiefs.' The Hebrew form is difficult; 'his
      archers' fits the attack imagery of the verse and the wider context.
    reason: alternative_reading
  - marker: b
    text: Hebrew 'my kidneys,' a literal expression for a person's inner organs and,
      by extension in Hebrew idiom, the innermost self.
    reason: cultural_note
  - marker: c
    text: Or 'my bile'; some take the term figuratively as 'my bitterness,' but the
      bodily sense suits the verse's violent imagery.
    reason: lexical_alternative
lexical_decisions:
- source_word: יָסֹבּוּ
  chosen: surround
  alternatives:
  - encircle
  - come around
  lexicon: HALOT
  rationale: Qal imperfect plural of סבב in context of hostile attack; 'surround'
    is natural modern English and preserves the military image.
- source_word: רַבָּיו
  chosen: his archers
  alternatives:
  - his great ones
  - his chiefs
  lexicon: HALOT
  rationale: Though the consonantal form can be related to 'great ones/chiefs,' in
    this context the traditional and contextually coherent sense is 'archers/shooters,'
    matching the surrounding imagery of bodily piercing and attack. The following
    singular verbs can still refer collectively to God as the acting subject through
    his attacking forces.
- source_word: יְפַלַּח
  chosen: splits open
  alternatives:
  - cleaves
  - pierces
  lexicon: HALOT
  rationale: Piel of פלח here conveys violent rending of the body. 'Splits open' communicates
    the severity clearly in contemporary English.
- source_word: כִּלְיוֹתַי
  chosen: my kidneys
  alternatives:
  - my inward parts
  - my reins
  lexicon: HALOT
  rationale: The Hebrew term literally denotes kidneys. Following source-language
    primacy, the concrete body part is retained rather than replaced with an interpretive
    idiom.
- source_word: לֹא יַחְמוֹל
  chosen: does not spare
  alternatives:
  - has no pity
  - does not show compassion
  lexicon: HALOT
  rationale: A standard rendering of חמל in judgment/violence contexts; concise and
    idiomatic.
- source_word: יִשְׁפֹּךְ
  chosen: he pours out
  alternatives:
  - spills
  - empties out
  lexicon: HALOT
  rationale: Qal of שפך commonly means 'pour out'; this preserves the vivid physical
    metaphor.
- source_word: מְרֵרָתִי
  chosen: my gall
  alternatives:
  - my bile
  - my bitterness
  lexicon: HALOT
  rationale: The noun can denote gall/bile literally, though it is related to bitterness.
    In this verse's anatomical violence imagery, the bodily sense 'gall' best fits
    the context.
