theological_decisions:
- issue: Anthropological imagery in poetic suffering language
  chosen_reading: Retain the concrete bodily terms ('kidneys,' 'gall') in the main
    text.
  alternative_readings:
  - Use interpretive abstractions such as 'inward parts' and 'bitterness'
  rationale: The verse depicts Job's suffering through visceral anatomical imagery.
    Preserving the literal terms maintains the force of the Hebrew poetry and avoids
    importing a softened interpretation.
  doctrine_reference: Translation philosophy §1, §6
