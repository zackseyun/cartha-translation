id: JOB.16.8
reference: Job 16:8
source:
  edition: WLC
  text: וַֽ֭/תִּקְמְטֵ/נִי לְ/עֵ֣ד הָיָ֑ה וַ/יָּ֥קָם בִּ֥/י כַ֝חֲשִׁ֗/י בְּ/פָנַ֥/י
    יַעֲנֶֽה׃
translation:
  text: You have shriveled me up—it has become a witness; my gauntness rises up against
    me and answers to my face.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my leanness' / 'my wasting.' The Hebrew term may denote physical emaciation;
      some take it instead as 'my falsehood' or 'the lie against me,' but the bodily
      sense fits the context better.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתִּקְמְטֵנִי
  chosen: You have shriveled me up
  alternatives:
  - You have seized me
  - You have bound me up
  - You have made me wrinkled
  lexicon: HALOT
  rationale: The verb קמט in this rare form is difficult, but in context it points
    to Job's physical wasting or shriveling. 'You have shriveled me up' captures the
    bodily affliction more naturally than a hyper-literal 'wrinkled me.' The 2ms subject
    is retained as direct address to God.
- source_word: לְעֵד הָיָה
  chosen: it has become a witness
  alternatives:
  - it is a witness
  - it serves as a witness
  lexicon: HALOT
  rationale: 'The phrase is terse. The masculine singular verb הָיָה likely refers
    to the preceding condition/result: Job''s shriveled state has become testimony
    against him. ''Has become a witness'' preserves the evidentiary metaphor.'
- source_word: וַיָּקָם
  chosen: rises up
  alternatives:
  - has risen up
  - stands up
  lexicon: HALOT
  rationale: קום here carries the sense of standing up as a witness or accuser in
    a legal setting. Present English 'rises up' fits the vivid poetic sequence.
- source_word: בִּי
  chosen: against me
  alternatives:
  - in me
  - on me
  lexicon: HALOT
  rationale: Although literally 'in me,' the preposition with hostile forensic imagery
    is best rendered idiomatically as 'against me,' since the witness is adverse.
- source_word: כחשי
  chosen: my gauntness
  alternatives:
  - my leanness
  - my wasting
  - my falsehood
  lexicon: HALOT
  rationale: כחש can denote leanness/emaciation, which suits the context of bodily
    deterioration. While the noun can elsewhere relate to denial or falsehood, here
    the parallel with physical shriveling strongly favors a bodily sense. 'Gauntness'
    is vivid, readable modern English.
- source_word: בפני
  chosen: to my face
  alternatives:
  - before me
  - in my presence
  lexicon: HALOT
  rationale: Literally 'in/at my face.' 'To my face' conveys the confrontational force
    of the accusation more idiomatically than 'before me.'
- source_word: יענה
  chosen: answers
  alternatives:
  - testifies
  - responds
  lexicon: HALOT
  rationale: ענה in this context can mean answer/respond, likely in a legal or accusatory
    sense. 'Answers' preserves the verbal image while allowing the forensic nuance
    to be inferred from context.
