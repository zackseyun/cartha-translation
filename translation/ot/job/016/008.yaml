theological_decisions:
- issue: Referent of the second masculine singular subject
  chosen_reading: 'Direct address to God: ''You have shriveled me up'''
  alternative_readings:
  - Impersonal or circumstantial reading without explicit divine address
  rationale: In the surrounding context Job addresses God directly about hostile treatment.
    Retaining the second-person address preserves the lament's theological force without
    softening the accusation.
  doctrine_reference: Preserve theological tension rather than resolve it
