id: JOB.16.7
reference: Job 16:7
source:
  edition: WLC
  text: אַךְ עַתָּ֥ה הֶלְאָ֑/נִי הֲ֝שִׁמּ֗וֹתָ כָּל עֲדָתִֽ/י־־׃
translation:
  text: Surely now he has worn me out; you have devastated all my company.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'he has exhausted me' / 'he has made me weary.'
    reason: lexical_alternative
  - marker: b
    text: Or 'all my assembly' or 'all my congregation.' The Hebrew can refer to Job's
      gathered circle or household-like company.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַךְ
  chosen: Surely
  alternatives:
  - But
  - Only
  - Indeed
  lexicon: HALOT
  rationale: אַךְ commonly marks emphasis or limitation. Here it introduces Job's
    forceful turn to present suffering; 'Surely' preserves the emphatic discourse
    force better than a restrictive 'only.'
- source_word: עַתָּה
  chosen: now
  alternatives:
  - at this time
  lexicon: HALOT
  rationale: Temporal adverb indicating Job's present condition. 'Now' is natural
    modern English and keeps the immediacy of the lament.
- source_word: הֶלְאָנִי
  chosen: he has worn me out
  alternatives:
  - he has exhausted me
  - he has made me weary
  lexicon: HALOT
  rationale: 'From לאה, ''to be weary/to weary.'' The 3ms form with 1cs suffix is
    best rendered as a completed action affecting Job: ''he has worn me out.'' The
    subject is grammatically third masculine singular and left implicit in Hebrew;
    English supplies ''he'' rather than resolving it to God explicitly.'
- source_word: הֲשִׁמּוֹתָ
  chosen: you have devastated
  alternatives:
  - you have desolated
  - you have laid waste
  lexicon: HALOT
  rationale: From שמם in a causative sense, 'to devastate, make desolate.' 'Devastated'
    is idiomatic and strong without sounding archaic. The verb is 2ms, so the shift
    from third person to second person is preserved rather than harmonized away.
- source_word: כָּל
  chosen: all
  alternatives:
  - the whole of
  lexicon: HALOT
  rationale: Retained straightforwardly as the totalizing modifier of the following
    noun phrase.
- source_word: עֲדָתִי
  chosen: my company
  alternatives:
  - my congregation
  - my assembly
  - my household
  lexicon: HALOT
  rationale: עֵדָה often means 'assembly/congregation,' but in Job's lament context
    it likely refers to Job's circle or gathered company rather than a formal worshiping
    congregation. 'My company' is natural English and fits the social-relational sense.
    Because 'assembly' and related renderings remain plausible, they are preserved
    in a footnote.
