theological_decisions:
- issue: Shift in grammatical person between the two verbs
  chosen_reading: 'Preserve the Hebrew shift: ''he has worn me out; you have devastated...'''
  alternative_readings:
  - 'Harmonize both verbs to God as second person: ''you have worn me out; you have
    devastated...'''
  - Harmonize both to third person
  rationale: The Masoretic text presents a real shift from 3ms to 2ms. In keeping
    with optimal equivalence and the doctrine's instruction to preserve tension rather
    than resolve ambiguity, the translation retains the shift instead of smoothing
    it for stylistic ease. This leaves open whether Job is moving rhetorically from
    speaking about God to addressing him directly.
  doctrine_reference: Translation philosophy §3, §5
