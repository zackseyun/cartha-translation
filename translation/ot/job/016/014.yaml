id: JOB.16.14
reference: Job 16:14
source:
  edition: WLC
  text: יִפְרְצֵ֣/נִי פֶ֭רֶץ עַל פְּנֵי פָ֑רֶץ יָרֻ֖ץ עָלַ֣/י כְּ/גִבּֽוֹר־־׃
translation:
  text: He breaks through me with breach upon breach; he rushes at me like a warrior.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'breach upon breach,' preserving the Hebrew repetition more literally.
    reason: lexical_alternative
  - marker: b
    text: '''Warrior'' could also be rendered ''mighty man'' or ''champion.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: יִפְרְצֵנִי
  chosen: he breaks through me
  alternatives:
  - he breaches me
  - he bursts upon me
  - he breaks me open
  lexicon: HALOT
  rationale: From פרץ in the Qal with 1cs suffix, conveying forceful breaking/bursting
    against Job. 'Breaks through me' preserves the violent imagery and reads naturally
    in English without over-paraphrase.
- source_word: פֶרֶץ
  chosen: breach
  alternatives:
  - break
  - burst
  - breaking
  lexicon: HALOT
  rationale: The noun denotes a breach or breaking. Rendering both occurrences as
    'breach' preserves the repetition and concrete imagery.
- source_word: עַל־פְּנֵי פָרֶץ
  chosen: with breach upon breach
  alternatives:
  - breach upon breach
  - one breach after another
  - on top of breach
  lexicon: HALOT
  rationale: The idiom literally means 'upon the face of breach,' expressing succession
    or piling up. 'With breach upon breach' keeps the Hebrew image while remaining
    idiomatic English.
- source_word: יָרוּץ
  chosen: he rushes
  alternatives:
  - he runs
  - he charges
  lexicon: HALOT
  rationale: From רוץ, here describing rapid hostile advance. 'Rushes' fits the poetic
    context and avoids the overly specific military nuance of 'charges' while retaining
    aggression.
- source_word: עָלַי
  chosen: at me
  alternatives:
  - upon me
  - against me
  lexicon: HALOT
  rationale: With a verb of hostile movement, English idiom prefers 'at me.' 'Upon
    me' is more literal but less natural; 'against me' is possible but weaker in immediacy.
- source_word: כגבור
  chosen: like a warrior
  alternatives:
  - like a mighty man
  - like a champion
  - like a strong man
  lexicon: HALOT
  rationale: גבור commonly denotes a warrior or mighty man. 'Warrior' best matches
    the martial imagery of rushing attack in this context and is clear modern English.
