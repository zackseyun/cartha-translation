id: JOB.16.20
reference: Job 16:20
source:
  edition: WLC
  text: מְלִיצַ֥/י רֵעָ֑/י אֶל אֱ֝ל֗וֹהַ דָּלְפָ֥ה עֵינִֽ/י־׃
translation:
  text: My friends are my mockers; my eye pours out tears to God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'My friends are my intercessors/mediators'; the Hebrew term מְלִיצַי
      has been understood by some in a more positive sense, but in this context the
      adversarial sense 'mockers' fits Job's complaint better.
    reason: lexical_alternative
lexical_decisions:
- source_word: מְלִיצַי
  chosen: my mockers
  alternatives:
  - my interpreters
  - my mediators
  - my scoffers
  lexicon: HALOT
  rationale: The noun from לוץ/ליץ can denote one who mocks or scorns; in Job's lament
    context, where his companions have turned against him, 'my mockers' best fits
    the immediate sense. Because the form has been understood by some as related to
    mediation/intercession, that alternative is preserved in a footnote.
- source_word: רֵעָי
  chosen: my friends
  alternatives:
  - my companions
  lexicon: HALOT
  rationale: The noun רֵעַ commonly means friend/companion. 'My friends' is the most
    natural English rendering and preserves the irony that those who should be allies
    are instead mocking him.
- source_word: אֶל אֱלוֹהַ
  chosen: to God
  alternatives:
  - toward God
  - to Eloah
  lexicon: HALOT
  rationale: אֶל marks direction toward, and אֱלוֹהַ is the common singular term for
    God in Job. 'To God' is idiomatic English and preserves the directional sense
    of Job's tears being directed Godward.
- source_word: דָּלְפָה
  chosen: pours out tears
  alternatives:
  - drips
  - trickles
  - weeps
  lexicon: HALOT
  rationale: The verb literally denotes dripping or trickling. With 'my eye' as subject,
    idiomatic English requires an expression like 'pours out tears' to convey sustained
    weeping while preserving the image of liquid flowing.
- source_word: עֵינִי
  chosen: my eye
  alternatives:
  - my eyes
  lexicon: HALOT
  rationale: The Hebrew is singular. English can retain the singular for vivid poetic
    effect, matching the source text closely.
