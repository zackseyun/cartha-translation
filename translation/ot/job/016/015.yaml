id: JOB.16.15
reference: Job 16:15
source:
  edition: WLC
  text: שַׂ֣ק תָּ֭פַרְתִּי עֲלֵ֣י גִלְדִּ֑/י וְ/עֹלַ֖לְתִּי בֶ/עָפָ֣ר קַרְנִֽ/י׃
translation:
  text: I have sewn sackcloth over my skin, and thrust my horn into the dust.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and cast down / defiled my horn in the dust.' The Hebrew verb here is
      difficult, and the exact nuance is uncertain.
    reason: lexical_alternative
  - marker: b
    text: '''Horn'' is a Hebrew metaphor for strength, honor, or exaltation.'
    reason: cultural_note
lexical_decisions:
- source_word: שַׂק
  chosen: sackcloth
  alternatives:
  - sack
  lexicon: HALOT
  rationale: Refers to the coarse mourning garment/material. 'Sackcloth' is the established
    and accurate English term in lament contexts, more precise than bare 'sack'.
- source_word: תָּפַרְתִּי
  chosen: I have sewn
  alternatives:
  - I sewed
  - I stitched
  lexicon: HALOT
  rationale: Qal perfect 1cs of תפר, 'to sew/stitch.' Present perfect in English fits
    the lament's present state resulting from a completed act.
- source_word: עֲלֵי
  chosen: over
  alternatives:
  - upon
  - 'on'
  lexicon: HALOT
  rationale: The preposition על here marks placement over the body. 'Over' is natural
    modern English and preserves the image.
- source_word: גִלְדִּי
  chosen: my skin
  alternatives:
  - my hide
  - my body
  lexicon: HALOT
  rationale: גֶּלֶד denotes skin/hide. 'My skin' is the most natural and contextually
    fitting rendering in Job's bodily lament; 'hide' is too zoological in English,
    and 'body' is too broad.
- source_word: וְעֹלַלְתִּי
  chosen: and thrust
  alternatives:
  - and defiled
  - and cast down
  - and plunged
  lexicon: HALOT
  rationale: The verb is difficult and has been understood in context as bringing
    low or thrusting down. Given the following phrase 'into the dust' and the mourning
    imagery, 'thrust' best preserves the concrete metaphor without overinterpreting.
    The lexical uncertainty is preserved in a footnote.
- source_word: בֶעָפָר
  chosen: into the dust
  alternatives:
  - in the dust
  - with dust
  lexicon: HALOT
  rationale: Though the preposition is beth, English idiom with a motion/result sense
    works well as 'into the dust' after 'thrust.' This captures humiliation imagery
    more clearly than the static 'in the dust.'
- source_word: קַרְנִי
  chosen: my horn
  alternatives:
  - my strength
  - my dignity
  lexicon: HALOT
  rationale: '''Horn'' is the literal Hebrew image and commonly symbolizes strength,
    honor, or exaltation. The metaphor should be preserved in the main text rather
    than interpreted away.'
