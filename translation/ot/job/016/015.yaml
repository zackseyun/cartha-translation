theological_decisions:
- issue: Metaphorical 'horn' imagery
  chosen_reading: Preserve the metaphor as 'my horn' in the main text
  alternative_readings:
  - my strength
  - my dignity
  rationale: The verse expresses humiliation through a concrete Hebrew metaphor. Preserving
    'horn' maintains the poetic force and theological-literary texture, while interpretive
    alternatives are better suited for a footnote than the main text.
  doctrine_reference: Translation philosophy §3, §5
- issue: Uncertain nuance of וְעֹלַלְתִּי
  chosen_reading: Render with a concrete lowering action ('thrust')
  alternative_readings:
  - defiled
  - cast down
  - plunged
  rationale: The verb's nuance is debated. A concrete action paired with 'dust' best
    fits the lament context while preserving ambiguity through a footnote rather than
    forcing a highly interpretive gloss.
  doctrine_reference: Translation philosophy §3
