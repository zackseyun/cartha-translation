id: JOB.16.6
reference: Job 16:6
source:
  edition: WLC
  text: אִֽם אֲ֭דַבְּרָה לֹא יֵחָשֵׂ֣ךְ כְּאֵבִ֑/י וְ֝/אַחְדְּלָ֗ה מַה מִ/נִּ֥י יַהֲלֹֽךְ־־־׃
translation:
  text: If I speak, my pain is not held back; and if I refrain, what goes away from
    me?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'what departs from me?' The Hebrew is terse and may imply 'what of my
      pain leaves me?'
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  chosen: If
  alternatives:
  - Though
  - When
  lexicon: HALOT
  rationale: Introduces the first conditional clause. Here it functions naturally
    as 'if,' paired with the following clause introduced by waw + verb.
- source_word: אֲדַבְּרָה
  chosen: I speak
  alternatives:
  - I would speak
  - I should speak
  lexicon: HALOT
  rationale: 1cs cohortative/form used in a conditional setting; idiomatic English
    prefers simple present 'I speak' after 'if' rather than a more wooden modal rendering.
- source_word: יֵחָשֵׂךְ
  chosen: is not held back
  alternatives:
  - is not restrained
  - does not lessen
  - is not spared
  lexicon: HALOT
  rationale: Niphal of חשׂך conveys being withheld or restrained. In context with
    'my pain,' the sense is that speaking does not restrain or reduce the pain. 'Held
    back' preserves the verbal image without overinterpreting.
- source_word: כְּאֵבִי
  chosen: my pain
  alternatives:
  - my grief
  - my suffering
  lexicon: HALOT
  rationale: The noun denotes pain, whether physical or emotional. 'Pain' is broad
    enough to preserve Job's anguish without narrowing it.
- source_word: וְאַחְדְּלָה
  chosen: and if I refrain
  alternatives:
  - and if I stop
  - and if I am silent
  - and if I hold back
  lexicon: HALOT
  rationale: From חדל, 'cease, desist, refrain.' In parallel with speaking, the sense
    is refraining from speech. 'If I refrain' keeps the parallelism and avoids adding
    'speaking' explicitly.
- source_word: מַה מִנִּי יַהֲלֹךְ
  chosen: what goes away from me?
  alternatives:
  - what departs from me?
  - what leaves me?
  - how much of it leaves me?
  lexicon: HALOT
  rationale: הלך with מן can mean 'go away from, depart from.' The clause is elliptical;
    the implied referent is Job's pain or anguish. 'What goes away from me?' preserves
    the terseness and rhetorical force without supplying too much.
