id: JOB.16.1
reference: Job 16:1
source:
  edition: WLC
  text: וַ/יַּ֥עַן אִיּ֗וֹב וַ/יֹּאמַֽר׃
translation:
  text: 'Then Job answered and said:'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיַּעַן
  chosen: answered
  alternatives:
  - responded
  lexicon: HALOT
  rationale: From ענה in the narrative wayyiqtol form, introducing Job's reply in
    dialogue. 'Answered' is the standard and suitably formal English rendering; 'responded'
    is possible but less idiomatic in this formulaic speech introduction.
- source_word: אִיּוֹב
  chosen: Job
  rationale: Proper personal name, transliterated by standard English convention in
    keeping with the translation philosophy to transliterate names.
- source_word: וַיֹּאמַר
  chosen: and said
  alternatives:
  - saying
  lexicon: HALOT
  rationale: From אמר in wayyiqtol, part of the common Hebrew narrative formula 'answered
    and said.' Rendering both verbs preserves the source structure rather than collapsing
    them into a single English verb.
