id: JOB.16.2
reference: Job 16:2
source:
  edition: WLC
  text: שָׁמַ֣עְתִּי כְ/אֵ֣לֶּה רַבּ֑וֹת מְנַחֲמֵ֖י עָמָ֣ל כֻּלְּ/כֶֽם׃
translation:
  text: I have heard many such things; all of you are miserable comforters.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'comforters of misery' or 'troublesome comforters.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁמַעְתִּי
  chosen: I have heard
  alternatives:
  - I heard
  lexicon: HALOT
  rationale: Qal perfect 1cs of שׁמע. In English, present perfect fits Job's sense
    of accumulated prior hearing that bears on the present complaint, though simple
    past is also possible.
- source_word: כְאֵלֶּה
  chosen: such things
  alternatives:
  - like these
  - things like these
  lexicon: HALOT
  rationale: Comparative כ plus demonstrative 'these' idiomatically means 'such things'
    or 'things like these.' 'Such things' is natural modern English and preserves
    the dismissive force.
- source_word: רַבּוֹת
  chosen: many
  alternatives:
  - much
  - numerous things
  lexicon: HALOT
  rationale: Adjective/adverbial use of רב in the feminine plural agreeing with the
    implied 'things.' 'Many' is the most idiomatic rendering with the understood plural
    object.
- source_word: מְנַחֲמֵי
  chosen: comforters
  alternatives:
  - consolers
  lexicon: HALOT
  rationale: 'Participle from נחם used substantivally: ''comforters.'' This keeps
    the irony, since Job''s friends claim to console him.'
- source_word: עָמָל
  chosen: miserable
  alternatives:
  - troublesome
  - of misery
  - wearisome
  lexicon: HALOT
  rationale: עמל commonly denotes trouble, misery, toil, or suffering. In the construct
    phrase מְנַחֲמֵי עָמָל, the sense is not that they comfort misery well, but that
    they are comforters characterized by misery/trouble—i.e., they bring miserable
    comfort. 'Miserable comforters' is concise, idiomatic, and contextually apt.
- source_word: כֻּלְּכֶם
  chosen: all of you
  alternatives:
  - you all
  - every one of you
  lexicon: HALOT
  rationale: Explicitly plural and collective; 'all of you' preserves Job's direct
    address to the whole group in clear modern English.
