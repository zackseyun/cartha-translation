id: JOB.16.18
reference: Job 16:18
source:
  edition: WLC
  text: אֶ֭רֶץ אַל תְּכַסִּ֣י דָמִ֑/י וְֽ/אַל יְהִ֥י מָ֝ק֗וֹם לְ/זַעֲקָתִֽ/י־־׃
translation:
  text: O earth, do not cover my blood, and let there be no place for my cry.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my bloodshed.' The Hebrew is literally 'my blood,' but in context it
      can imply blood unjustly shed.
    reason: lexical_alternative
  - marker: b
    text: Or 'my outcry.' The term can denote a cry of distress that also functions
      as an appeal for justice.
    reason: lexical_alternative
  - marker: c
    text: The imagery recalls blood crying out from the ground for justice; compare
      Genesis 4:10.
    reason: cross_reference
lexical_decisions:
- source_word: אֶרֶץ
  chosen: O earth
  alternatives:
  - earth
  - land
  lexicon: HALOT
  rationale: Direct address is signaled by context and the following 2fs verb. 'Earth'
    fits the broad cosmic appeal better than the narrower 'land.' The vocative 'O'
    preserves the poetic force in natural English.
- source_word: אַל
  chosen: do not
  alternatives:
  - may ... not
  - let ... not
  lexicon: HALOT
  rationale: With the imperfect/jussive-like verbal form, אַל expresses prohibition
    or urgent negative wish. 'Do not' is clear and idiomatic in direct address.
- source_word: תְּכַסִּי
  chosen: cover
  alternatives:
  - conceal
  - hide
  lexicon: HALOT
  rationale: The verb כסה commonly means 'cover.' In context Job asks that his blood
    not be hidden from notice or from calling for justice. 'Cover' preserves the concrete
    imagery while allowing the forensic implication to remain implicit.
- source_word: דָמִי
  chosen: my blood
  alternatives:
  - my bloodshed
  lexicon: HALOT
  rationale: The singular with first-person suffix is literally 'my blood.' In context
    it evokes innocent blood crying out, but the text itself says 'blood,' so the
    more interpretive 'bloodshed' is not preferred in the main text.
- source_word: וְאַל
  chosen: and let there be no
  alternatives:
  - and do not let there be
  - and may there not be
  lexicon: HALOT
  rationale: The conjunction links a second negative wish. English idiom is smoother
    with 'and let there be no' before the existential verb.
- source_word: יְהִי
  chosen: let there be
  alternatives:
  - may there be
  - be
  lexicon: HALOT
  rationale: From היה in a jussive sense, expressing a wish or command. 'Let there
    be' is the most natural rendering of the existential construction.
- source_word: מָקוֹם
  chosen: place
  alternatives:
  - resting place
  - room
  lexicon: HALOT
  rationale: מקום is straightforwardly 'place.' In this context it means any place
    where Job's cry might come to rest or be silenced; 'place' keeps the image open
    and faithful.
- source_word: לזעקתי
  chosen: for my cry
  alternatives:
  - for my outcry
  - for my appeal
  lexicon: HALOT
  rationale: זעקה denotes a cry of distress, often with an appeal for help or justice.
    'Cry' is concise and natural; 'outcry' is a viable alternative that slightly heightens
    the judicial nuance.
