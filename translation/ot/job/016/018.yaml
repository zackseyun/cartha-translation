theological_decisions:
- issue: Allusion to innocent blood crying out for justice
  chosen_reading: Retain the concrete imagery 'my blood' and 'my cry' without making
    the allusion explicit in the main text.
  alternative_readings:
  - Use 'my bloodshed' to foreground the forensic sense
  - Use 'my outcry' to foreground judicial appeal
  rationale: The verse likely echoes the biblical motif of blood crying from the ground
    (cf. Gen 4:10), but the Hebrew here preserves poetic ambiguity between literal
    blood and the cry for vindication. Following the translation philosophy, the main
    text preserves the tension rather than resolving it into an explicit interpretive
    paraphrase.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather
    than resolve it.
