id: JOB.16.12
reference: Job 16:12
source:
  edition: WLC
  text: שָׁ֘לֵ֤ו הָיִ֨יתִי וַֽ/יְפַרְפְּרֵ֗/נִי וְ/אָחַ֣ז בְּ֭/עָרְפִּ/י וַֽ/יְפַצְפְּצֵ֑/נִי
    וַ/יְקִימֵ֥/נִי ל֝֗/וֹ לְ/מַטָּרָֽה׀׃
translation:
  text: I was at ease, but he shattered me; he seized me by my neck and smashed me
    to pieces; he set me up for himself as a target.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The verb rendered 'shattered me' is rare and may also be understood as 'shook
      me violently' or 'tore me apart.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁלֵו
  chosen: at ease
  alternatives:
  - secure
  - tranquil
  - undisturbed
  lexicon: HALOT
  rationale: The adjective denotes a state of quiet ease or security. 'At ease' is
    idiomatic modern English and fits Job's contrast between former calm and sudden
    violence.
- source_word: וַיְפַרְפְּרֵנִי
  chosen: he shattered me
  alternatives:
  - he shook me violently
  - he tore me apart
  - he made me tremble
  lexicon: HALOT
  rationale: The rare verb is difficult, but in context it describes a violent disruption
    of Job's former ease. 'He shattered me' captures the force and prepares coherently
    for the following acts of assault. Because the root is uncertain/rare, alternatives
    are preserved in a footnote.
- source_word: וְאָחַז
  chosen: he seized
  alternatives:
  - he grasped
  - he took hold of
  lexicon: HALOT
  rationale: The verb commonly means to grasp or seize. 'Seized' best conveys hostile
    force in this context.
- source_word: בְּעָרְפִּי
  chosen: by my neck
  alternatives:
  - by my nape
  - by the back of my neck
  lexicon: HALOT
  rationale: עֹרֶף refers to the neck/nape. 'By my neck' is natural English while
    preserving the image of being grabbed at the back of the neck.
- source_word: וַיְפַצְפְּצֵנִי
  chosen: smashed me to pieces
  alternatives:
  - crushed me
  - broke me apart
  - dashed me in pieces
  lexicon: HALOT
  rationale: This rare intensive verb conveys violent breaking or smashing. 'Smashed
    me to pieces' reflects the emphatic, destructive sense and avoids flattening the
    imagery.
- source_word: וַיְקִימֵנִי
  chosen: he set me up
  alternatives:
  - he made me stand
  - he raised me up
  - he stationed me
  lexicon: HALOT
  rationale: 'The Hiphil of קום here is causative: he caused Job to stand or be positioned.
    ''Set me up'' fits the following target metaphor in idiomatic English.'
- source_word: לוֹ
  chosen: for himself
  alternatives:
  - for him
  - for his own purpose
  lexicon: HALOT
  rationale: The pronominal suffix marks relation to the subject; 'for himself' makes
    explicit that Job is being positioned for the assailant's own use.
- source_word: לְמַטָּרָה
  chosen: as a target
  alternatives:
  - for a target
  - as a mark
  lexicon: HALOT
  rationale: The noun denotes a target or mark for attack. 'As a target' is clear,
    concise, and preserves the martial metaphor.
