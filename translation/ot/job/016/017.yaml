id: JOB.16.17
reference: Job 16:17
source:
  edition: WLC
  text: עַ֭ל לֹא חָמָ֣ס בְּ/כַפָּ֑/י וּֽ/תְפִלָּתִ֥/י זַכָּֽה־׃
translation:
  text: though there is no violence in my hands, and my prayer is pure.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for there is no violence in my hands.' The Hebrew preposition can be
      taken in more than one way; the main text adopts a concessive sense from the
      context.
    reason: lexical_alternative
  - marker: b
    text: Or 'clean' for 'pure.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עַל
  chosen: though
  alternatives:
  - because of
  - for
  - upon
  - despite
  lexicon: HALOT
  rationale: 'In context this preposition introduces a concessive sense tied to Job''s
    protest of innocence in the surrounding verses: despite his suffering, there is
    no wrongdoing in him. English ''though'' captures the idiomatic force better than
    a wooden ''upon'' or ''because of.'''
- source_word: לֹא
  chosen: 'no'
  alternatives:
  - not
  lexicon: HALOT
  rationale: Used with the nominal clause 'violence in my hands'; English 'there is
    no' is the most natural rendering of the Hebrew negation here.
- source_word: חָמָס
  chosen: violence
  alternatives:
  - wrongdoing
  - injustice
  lexicon: HALOT
  rationale: The noun commonly denotes violence, wrong, or injustice. 'Violence' is
    the most direct and established gloss, while still allowing moral force beyond
    merely physical assault.
- source_word: בְּכַפַּי
  chosen: in my hands
  alternatives:
  - on my hands
  - by my hand
  lexicon: HALOT
  rationale: The idiom points to culpability or deeds done by one's own agency. 'In
    my hands' stays close to the Hebrew and preserves the concrete imagery.
- source_word: וּתְפִלָּתִי
  chosen: and my prayer
  alternatives:
  - and my plea
  lexicon: HALOT
  rationale: תְּפִלָּה is the standard word for prayer. 'Prayer' is preferable to
    'plea' because Job is speaking not only of complaint but of the moral character
    of his address to God.
- source_word: זַכָּה
  chosen: pure
  alternatives:
  - clean
  - innocent
  lexicon: HALOT
  rationale: The adjective denotes cleanness or purity. 'Pure' fits naturally with
    'prayer' in English and preserves the moral and cultic resonance without overstating
    sinlessness.
