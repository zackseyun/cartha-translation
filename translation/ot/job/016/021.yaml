id: JOB.16.21
reference: Job 16:21
source:
  edition: WLC
  text: וְ/יוֹכַ֣ח לְ/גֶ֣בֶר עִם אֱל֑וֹהַּ וּֽ/בֶן אָדָ֥ם לְ/רֵעֵֽ/הוּ־־׃
translation:
  text: that he would arbitrate for a man with God, as a son of man does for his neighbor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'that he would plead for a man with God'; the Hebrew verb can carry a
      legal sense of deciding, arbitrating, or arguing a case.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'son of man,' here an idiom for a human being, not necessarily a
      messianic title.
    reason: lexical_alternative
  - marker: c
    text: Or 'for his friend.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיוֹכַח
  chosen: would arbitrate
  alternatives:
  - might plead
  - would decide
  - would argue the case
  lexicon: HALOT
  rationale: The Hiphil of יכח can mean to decide, prove, reprove, or arbitrate/argue
    a case. In this context Job longs for someone to act juridically between a human
    and God. 'Arbitrate' captures the legal-mediation sense without overcommitting
    to simple rebuke or abstract proof.
- source_word: לְגֶבֶר
  chosen: for a man
  alternatives:
  - for a strong man
  - for a person
  lexicon: HALOT
  rationale: גבר commonly denotes a man, often with nuance of a male person or strong
    man. Here it functions generically for a human litigant. 'For a man' preserves
    the masculine/generic force in line with the gender-accurate policy.
- source_word: עִם אֱלוֹהַּ
  chosen: with God
  alternatives:
  - against God
  - before God
  lexicon: HALOT
  rationale: עִם most basically means 'with,' though in legal contexts it can imply
    engagement in dispute. 'With God' is the most textually direct and leaves the
    juridical nuance to the verb 'arbitrate.'
- source_word: וּבֶן אָדָם
  chosen: as a son of man
  alternatives:
  - and a son of man
  - and as a human being
  lexicon: HALOT
  rationale: 'בן אדם is literally ''son of man,'' an idiom for a human being. Here
    the syntax is compressed and comparative in sense, likely elliptical: ''as a son
    of man [does/pleads]...'' Retaining ''son of man'' preserves the Hebrew expression
    and avoids flattening the parallelism with גבר.'
- source_word: לְרֵעֵהוּ
  chosen: for his neighbor
  alternatives:
  - for his friend
  - with his companion
  lexicon: HALOT
  rationale: רֵעַ can mean neighbor, friend, or companion. In a legal/interpersonal
    comparison, 'neighbor' is broad and natural, while still allowing relational closeness.
    The prefixed ל is taken as marking the party on whose behalf the action is done,
    parallel to לְגֶבֶר.
