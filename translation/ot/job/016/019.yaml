theological_decisions:
- issue: Identity of Job's heavenly witness
  chosen_reading: Render the figure functionally ('my witness ... my advocate') without
    specifying whether Job means God himself, an angelic mediator, or a poetic legal
    witness.
  alternative_readings:
  - God as Job's vindicating witness
  - a heavenly mediator/angelic advocate
  - poetic personification of Job's testimony
  rationale: The Hebrew names a witness in heaven but does not explicitly identify
    the figure. To preserve theological tension rather than resolve it, the translation
    keeps the legal imagery and leaves the referent open.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
