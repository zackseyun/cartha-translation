id: JOB.16.19
reference: Job 16:19
source:
  edition: WLC
  text: גַּם עַ֭תָּה הִנֵּה בַ/שָּׁמַ֣יִם עֵדִ֑/י וְ֝/שָׂהֲדִ֗/י בַּ/מְּרוֹמִֽים־־׃
translation:
  text: Even now, look—my witness is in heaven, and my advocate is in the heights.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my witness is in heaven, and my witness is in the heights.' The second
      term is a near-synonym for 'witness' and may be rendered more literally to preserve
      the parallelism.
    reason: lexical_alternative
  - marker: b
    text: Or 'on high' for 'in the heights.'
    reason: lexical_alternative
lexical_decisions:
- source_word: גַּם
  chosen: Even
  alternatives:
  - also
  - indeed
  lexicon: HALOT
  rationale: With עַתָּה it forms the idiomatic temporal emphasis גַּם עַתָּה, best
    rendered 'Even now' rather than a separate additive 'also now.'
- source_word: עַתָּה
  chosen: now
  alternatives:
  - at this time
  lexicon: HALOT
  rationale: Temporal adverb marking Job's present situation; combined with גַּם for
    emphatic immediacy.
- source_word: הִנֵּה
  chosen: look—
  alternatives:
  - behold
  - see
  lexicon: HALOT
  rationale: Deictic particle drawing attention to the assertion. 'Look' preserves
    the force in readable modern English; dash reflects the abrupt emphasis.
- source_word: בַשָּׁמַיִם
  chosen: in heaven
  alternatives:
  - in the heavens
  - in the sky
  lexicon: HALOT
  rationale: Here the plural שָׁמַיִם refers to the heavenly realm, not the physical
    sky. Singular 'heaven' is idiomatic in English for this sense.
- source_word: עֵדִי
  chosen: my witness
  alternatives:
  - the one who testifies for me
  lexicon: HALOT
  rationale: עֵד denotes a witness/testifier. 'My witness' is the most direct rendering
    and preserves the legal imagery of Job's appeal.
- source_word: וְשָׂהֲדִי
  chosen: my advocate
  alternatives:
  - my testimony
  - my witness
  - the one who bears witness for me
  lexicon: HALOT
  rationale: The Aramaizing noun שָׂהַד/שָׂהֵד is cognate with 'witness,' but in this
    parallel legal context an English synonym avoids awkward repetition and brings
    out the personal-forensic sense of one who testifies on Job's behalf. Because
    'my witness' is also possible, that alternative is preserved in a footnote.
- source_word: בַּמְּרוֹמִים
  chosen: in the heights
  alternatives:
  - on high
  - in the high places
  lexicon: HALOT
  rationale: מְרוֹמִים denotes exalted heights, here parallel to 'heaven.' 'In the
    heights' preserves the elevated spatial imagery more literally than the idiomatic
    'on high,' while remaining natural English.
