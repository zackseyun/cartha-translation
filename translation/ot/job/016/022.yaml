id: JOB.16.22
reference: Job 16:22
source:
  edition: WLC
  text: כִּֽי שְׁנ֣וֹת מִסְפָּ֣ר יֶאֱתָ֑יוּ וְ/אֹ֖רַח לֹא אָשׁ֣וּב אֶהֱלֹֽךְ־־׃
translation:
  text: For a few years will come, and I will go on the path from which I will not
    return.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'years of number,' that is, years few in number or limited.
    reason: lexical_alternative
  - marker: b
    text: Or 'the way from which I will not return.' The expression refers to the
      irreversible journey to death.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - For when
  lexicon: HALOT
  rationale: Introduces the reason or ground for Job's preceding statement. 'For'
    best preserves the causal connection in natural English.
- source_word: שְׁנוֹת מִסְפָּר
  chosen: a few years
  alternatives:
  - numbered years
  - years of number
  lexicon: HALOT
  rationale: The construct phrase literally means 'years of number,' an idiom for
    years that are few or limited in count. 'A few years' communicates the sense idiomatically
    in modern English while preserving the emphasis on brevity.
- source_word: יֶאֱתָיוּ
  chosen: will come
  alternatives:
  - will arrive
  - are coming
  lexicon: HALOT
  rationale: From אתה/אתי in the sense 'to come/arrive.' With 'years' as subject,
    the sense is that the remaining years will come upon him. 'Will come' is the most
    straightforward rendering.
- source_word: וְאֹרַח
  chosen: and ... the path
  alternatives:
  - and ... the way
  - even the path
  lexicon: HALOT
  rationale: אֹרַח denotes a path or way. Here it is metaphorical for the course toward
    death. 'Path' preserves the concrete metaphor better than the more abstract 'way.'
    The conjunction is carried into the clause structure rather than translated woodenly.
- source_word: לֹא אָשׁוּב
  chosen: from which I will not return
  alternatives:
  - I will not return
  - never to return
  lexicon: HALOT
  rationale: The negated verb means 'I will not return.' In English, attaching it
    to 'path' with 'from which' makes the syntax natural while preserving the Hebrew
    sense of an irreversible journey.
- source_word: אֶהֱלֹךְ
  chosen: I will go
  alternatives:
  - I go
  - I must go
  lexicon: HALOT
  rationale: Simple Qal imperfect of הלך, 'to go/walk.' In context it expresses Job's
    impending movement toward death. 'I will go' is sufficiently formal and clear.
