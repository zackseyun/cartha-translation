id: JOB.30.27
reference: Job 30:27
source:
  edition: WLC
  text: מֵעַ֖/י רֻתְּח֥וּ וְ/לֹא דָ֗מּוּ קִדְּמֻ֥/נִי יְמֵי עֹֽנִי־־׃
translation:
  text: My inward parts boil and do not rest; days of affliction confront me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'My insides seethe and are not still; days of misery come upon me.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מֵעַי
  chosen: my inward parts
  alternatives:
  - my bowels
  - my insides
  - my heart
  lexicon: HALOT
  rationale: מֵעֶה literally refers to the inner organs/entrails and in poetic usage
    denotes the inward self or deep emotions. 'My inward parts' preserves the visceral
    imagery better than the archaic 'bowels' while avoiding the over-interpretive
    'heart'.
- source_word: רֻתְּחוּ
  chosen: boil
  alternatives:
  - are inflamed
  - seethe
  lexicon: HALOT
  rationale: From רתח, conveying boiling or seething. 'Boil' is vivid, concise, and
    preserves the bodily metaphor of internal turmoil.
- source_word: וְלֹא דָמּוּ
  chosen: and do not rest
  alternatives:
  - and are not still
  - and do not cease
  - and are not silent
  lexicon: HALOT
  rationale: דמם can mean be still, be silent, or cease. In this context of internal
    organs/personified inward turmoil, 'do not rest' best communicates ongoing agitation
    in natural English while remaining close to the semantic range.
- source_word: קִדְּמֻנִי
  chosen: confront me
  alternatives:
  - come upon me
  - meet me
  - precede me
  lexicon: HALOT
  rationale: From קדם in the sense of coming before or meeting. Here 'days of affliction'
    are personified as arriving to meet Job. 'Confront me' captures the hostile experiential
    force in context better than the more neutral 'meet me,' while 'precede me' is
    less suitable in English here.
- source_word: יְמֵי עֹנִי
  chosen: days of affliction
  alternatives:
  - days of misery
  - days of suffering
  - days of poverty
  lexicon: HALOT
  rationale: עֹנִי can denote affliction, misery, or poverty depending on context.
    In Job's lament, the broader sense of suffering/affliction fits best, not merely
    economic poverty.
