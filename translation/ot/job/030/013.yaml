id: JOB.30.13
reference: Job 30:13
source:
  edition: WLC
  text: נָתְס֗וּ נְֽתִיבָ֫תִ֥/י לְ/הַוָּתִ֥/י יֹעִ֑ילוּ לֹ֖א עֹזֵ֣ר לָֽ/מוֹ׃
translation:
  text: They tear up my path for my ruin; they advance it—there is no helper for them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they profit from it' / 'they help it forward'; the Hebrew verb can denote
      being useful or advancing something, here likely Job's ruin.
    reason: lexical_alternative
  - marker: b
    text: Or 'with no one helping them.' The final clause is terse and may mean either
      that they act without assistance or that they have no helper.
    reason: lexical_alternative
lexical_decisions:
- source_word: נָתְסוּ
  chosen: tear up
  alternatives:
  - break down
  - demolish
  - destroy
  lexicon: HALOT
  rationale: The verb denotes pulling down or tearing apart. 'Tear up' fits the image
    of ruining a road/path and preserves the violent concreteness better than the
    more abstract 'destroy.'
- source_word: נְתִיבָתִי
  chosen: my path
  alternatives:
  - my way
  - my track
  - my road
  lexicon: HALOT
  rationale: נְתִיבָה commonly refers to a path or track. 'My path' is natural English
    and preserves the metaphor of life's course or route without overinterpreting
    it.
- source_word: לְהַוָּתִי
  chosen: for my ruin
  alternatives:
  - for my calamity
  - to my destruction
  - for my disaster
  lexicon: HALOT
  rationale: הַוָּה carries the sense of ruin, disaster, or destruction. 'For my ruin'
    is concise and idiomatic, matching the hostile intent expressed by the preposition
    לְ.
- source_word: יֹעִילוּ
  chosen: they advance it
  alternatives:
  - they profit
  - they help forward
  - they make progress
  lexicon: HALOT
  rationale: The Hiphil of יעל often means 'to be of use/benefit' or 'to help forward.'
    In this hostile context, the sense is that they further or promote Job's ruin.
    'They advance it' makes explicit the implied object from the prior phrase while
    remaining close to the Hebrew sense of aiding progress.
- source_word: לֹא עֹזֵר לָמוֹ
  chosen: there is no helper for them
  alternatives:
  - with no one helping them
  - none helps them
  - they have no helper
  lexicon: HALOT
  rationale: The clause is terse and somewhat elliptical. The most straightforward
    reading is that no helper is needed or present for them. 'There is no helper for
    them' preserves the Hebrew nominal clause structure and ambiguity better than
    a more interpretive expansion.
