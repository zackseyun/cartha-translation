id: JOB.30.31
reference: Job 30:31
source:
  edition: WLC
  text: וַ/יְהִ֣י לְ֭/אֵבֶל כִּנֹּרִ֑/י וְ֝/עֻגָבִ֗/י לְ/ק֣וֹל בֹּכִֽים׃
translation:
  text: So my lyre has become mourning, and my pipe the sound of those who weep.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my harp has become mourning.' The Hebrew כִּנּוֹר can denote a lyre
      or harp-like stringed instrument.
    reason: lexical_alternative
  - marker: b
    text: Or 'my flute.' The Hebrew עוּגָב refers generally to a wind instrument,
      and its exact form is uncertain.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: has become
  alternatives:
  - became
  - was turned into
  lexicon: HALOT
  rationale: The waw-consecutive with היה marks a resultant state in past narration.
    'Has become' conveys the present consequence of Job's reversal in context, while
    remaining natural English.
- source_word: לְאֵבֶל
  chosen: mourning
  alternatives:
  - grief
  - lamentation
  lexicon: HALOT
  rationale: אֵבֶל denotes mourning, especially the state or expression of grief.
    'Mourning' fits the poetic contrast with musical instruments now associated with
    sorrow.
- source_word: כִּנֹּרִי
  chosen: my lyre
  alternatives:
  - my harp
  lexicon: HALOT
  rationale: כִּנּוֹר is a stringed instrument often rendered 'lyre' or 'harp.' 'Lyre'
    is more specific and avoids importing the image of a modern concert harp.
- source_word: וְעֻגָבִי
  chosen: my pipe
  alternatives:
  - my flute
  lexicon: HALOT
  rationale: עוּגָב refers to a wind instrument. 'Pipe' is a broad, conventional rendering
    that preserves the ancient instrument's general sense without over-specifying
    its exact form.
- source_word: לְקוֹל
  chosen: the sound of
  alternatives:
  - to the sound of
  - for the voice of
  lexicon: HALOT
  rationale: 'קוֹל commonly means ''sound'' or ''voice.'' Here with the preposition
    לְ it expresses transformation into accompaniment or association: the instrument
    is now for/into the sound of weeping. ''The sound of'' is idiomatic and clear.'
- source_word: בֹּכִים
  chosen: those who weep
  alternatives:
  - weepers
  - those who are crying
  lexicon: HALOT
  rationale: The participle denotes people engaged in weeping. 'Those who weep' is
    natural English and preserves the personal reference better than the less common
    'weepers.'
