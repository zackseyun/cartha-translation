id: JOB.30.9
reference: Job 30:9
source:
  edition: WLC
  text: וְ֭/עַתָּה נְגִינָתָ֣/ם הָיִ֑יתִי וָ/אֱהִ֖י לָ/הֶ֣ם לְ/מִלָּֽה׃
translation:
  text: And now I have become their song, and I am a byword to them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their mocking song'—the Hebrew 'their song' likely carries a derisive
      sense in context.
    reason: lexical_alternative
  - marker: b
    text: Or 'a proverb' or 'an object of talk'; the Hebrew suggests a saying or word
      used about someone, here in contempt.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  chosen: And now
  alternatives:
  - But now
  - Now
  lexicon: HALOT
  rationale: Temporal-disjunctive transition marking Job's present humiliation in
    contrast to prior status. 'And now' preserves the narrative flow and contrast
    without overinterpreting the conjunction.
- source_word: נְגִינָתָם
  chosen: their song
  alternatives:
  - their mocking song
  - their taunt-song
  - their music
  lexicon: HALOT
  rationale: From נְגִינָה, a song/music piece, often with instrumental association.
    In context of derision, it refers to Job as the subject of their song. 'Their
    song' is sufficiently literal; the mocking nuance is supplied by context and can
    be preserved in a footnote as an alternative.
- source_word: הָיִיתִי
  chosen: I have become
  alternatives:
  - I was
  - I became
  lexicon: HALOT
  rationale: 'Though formally a perfect of היה, English present-result sense fits
    the discourse: Job''s present condition is the result of what has happened. ''I
    have become'' communicates current state arising from prior change better than
    simple past.'
- source_word: וָאֱהִי
  chosen: and I am
  alternatives:
  - and I have become
  - and I was
  lexicon: HALOT
  rationale: The waw + imperfect continues the description of Job's present degraded
    status. Rendering as present English is natural in context and parallels the first
    clause without awkward repetition.
- source_word: לָהֶם
  chosen: to them
  alternatives:
  - for them
  lexicon: HALOT
  rationale: Dative relation indicating Job's status in their regard. 'To them' is
    idiomatic with 'a byword' in English.
- source_word: לְמִלָּה
  chosen: a byword
  alternatives:
  - a proverb
  - a word of scorn
  - an object of talk
  lexicon: HALOT
  rationale: מִלָּה here denotes a saying or word spoken about someone; in context
    it carries the sense of a proverbial object of contempt. 'Byword' is the established
    and semantically precise English equivalent, preserving the disgrace nuance without
    paraphrase.
