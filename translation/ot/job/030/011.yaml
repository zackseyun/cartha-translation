id: JOB.30.11
reference: Job 30:11
source:
  edition: WLC
  text: כִּֽי יתר/ו פִ֭תַּח וַ/יְעַנֵּ֑/נִי וְ֝/רֶ֗סֶן מִ/פָּנַ֥/י שִׁלֵּֽחוּ־׃
translation:
  text: Because he has loosened his cord and afflicted me, they have cast off restraint
    before me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Because he has loosened his bowstring and afflicted me.' The Hebrew
      term may refer more specifically to a bowstring than a general cord.
    reason: lexical_alternative
  - marker: b
    text: Literally 'they have sent away the bridle before me,' that is, 'they have
      cast off restraint in my presence.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: Because
  alternatives:
  - For
  lexicon: HALOT
  rationale: Introduces the reason for the mockery and hostility described in context.
    'Because' gives clear causal force in modern English.
- source_word: יִתְרוֹ
  chosen: his cord
  alternatives:
  - his bowstring
  - his string
  lexicon: HALOT
  rationale: The ketiv/qere issue and lexical range allow either a general 'cord/string'
    or specifically 'bowstring.' In context, the image is of God loosening what had
    held Job secure or strong. 'Cord' preserves the metaphor without over-specifying;
    'bowstring' is preserved in a footnote as a viable alternative.
- source_word: פִּתַּח
  chosen: has loosened
  alternatives:
  - has opened
  - has untied
  lexicon: HALOT
  rationale: With 'cord' as object, the verb naturally means 'loosened' or 'untied,'
    not merely 'opened.' This best fits the metaphor of released restraint or strength.
- source_word: וַיְעַנֵּנִי
  chosen: and afflicted me
  alternatives:
  - and humbled me
  - and answered me
  lexicon: HALOT
  rationale: From ענה II ('afflict, humble'), not ענה I ('answer'). The context is
    suffering and humiliation, so 'afflicted me' is the clearest rendering.
- source_word: וְרֶסֶן
  chosen: restraint
  alternatives:
  - bridle
  - rein
  lexicon: HALOT
  rationale: Literally the noun denotes a bridle/rein. In this clause the idiom points
    to throwing off restraint in Job's presence. Rendering the sense as 'restraint'
    communicates the metaphor naturally in English while preserving the underlying
    image in a footnote.
- source_word: מִפָּנַי
  chosen: before me
  alternatives:
  - in my presence
  - from before me
  lexicon: HALOT
  rationale: The preposition with 'face/presence' here is best taken as 'before me'
    or 'in my presence,' indicating shameless behavior directed toward Job.
- source_word: שִׁלֵּחוּ
  chosen: they have cast off
  alternatives:
  - they have let loose
  - they have sent away
  lexicon: HALOT
  rationale: With 'bridle/restraint' as object, the idiom means to let go or cast
    off. 'Cast off restraint' is idiomatic English and fits the hostile social reversal
    in context.
