theological_decisions:
- issue: Potential theological overreading of יְשֻׁעָתִי
  chosen_reading: my salvation
  alternative_readings:
  - my deliverance
  - my welfare
  rationale: The Hebrew noun can refer broadly to rescue or well-being, not necessarily
    soteriological salvation in a later doctrinal sense. The main text keeps the lexical
    form 'salvation,' while alternatives are preserved so the translation does not
    import a fuller doctrinal claim than the context warrants.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather
    than resolve it; original-language primacy over translation tradition.'
