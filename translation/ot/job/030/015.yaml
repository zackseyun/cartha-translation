id: JOB.30.15
reference: Job 30:15
source:
  edition: WLC
  text: הָהְפַּ֥ךְ עָלַ֗/י בַּלָּ֫ה֥וֹת תִּרְדֹּ֣ף כָּ֭/רוּחַ נְדִבָתִ֑/י וּ֝/כְ/עָ֗ב
    עָבְרָ֥ה יְשֻׁעָתִֽ/י׃
translation:
  text: Terrors are turned upon me; they pursue my dignity like the wind, and my salvation
    passes away like a cloud.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my nobility,' 'my prosperity,' or 'my honor.' The Hebrew term refers
      to an exalted or honorable condition.
    reason: lexical_alternative
  - marker: b
    text: Or 'my deliverance' or 'my welfare.' The Hebrew can denote rescue or well-being
      as well as salvation.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָהְפַּךְ
  chosen: are turned
  alternatives:
  - is turned
  - have turned
  - is overturned
  lexicon: HALOT
  rationale: 'From הפך in the Hophal, conveying a passive/resultative sense: something
    has been turned or reversed upon Job. English plural agreement is supplied because
    the following subject ''terrors'' is plural in sense.'
- source_word: בַּלָּהוֹת
  chosen: terrors
  alternatives:
  - horrors
  - dreadful things
  lexicon: HALOT
  rationale: The noun denotes terrors or sudden horrors. 'Terrors' is concise, idiomatic,
    and preserves the emotional force without overinterpreting the source.
- source_word: תִּרְדֹּף
  chosen: they pursue
  alternatives:
  - it pursues
  - chases
  lexicon: HALOT
  rationale: רדף commonly means 'pursue, chase.' Although the verb form is feminine
    singular, the preceding plural noun can function collectively; English renders
    the sense naturally with plural 'they pursue' referring back to 'terrors.'
- source_word: כָּרוּחַ
  chosen: like the wind
  alternatives:
  - as the wind
  - like a breath
  lexicon: HALOT
  rationale: רוּחַ here is best taken in its common sense 'wind' in a simile of swift
    disappearance or instability. 'Like the wind' fits the poetic parallel with the
    cloud image in the next colon.
- source_word: נְדִבָתִי
  chosen: my dignity
  alternatives:
  - my nobility
  - my prosperity
  - my honor
  lexicon: HALOT
  rationale: From נדיבה/נדיב, the term can denote nobility, princely status, or exalted
    condition. In Job's lament over lost status, 'my dignity' best captures the loss
    of honorable standing without sounding archaic. Because the term is semantically
    difficult, alternatives are preserved in a footnote.
- source_word: וּכְעָב
  chosen: like a cloud
  alternatives:
  - like a thick cloud
  lexicon: HALOT
  rationale: עָב commonly denotes a cloud, sometimes a thick cloud. In this poetic
    comparison, 'cloud' is sufficient and idiomatic in English.
- source_word: עָבְרָה
  chosen: passes away
  alternatives:
  - has passed away
  - vanished
  lexicon: HALOT
  rationale: עבר in this context expresses passing away or disappearing. Present tense
    in English gives the vivid poetic force and matches the parallel present 'pursue.'
- source_word: יְשֻׁעָתִי
  chosen: my salvation
  alternatives:
  - my deliverance
  - my welfare
  lexicon: HALOT
  rationale: ישועה often means salvation or deliverance. In Job's immediate context
    of personal rescue and well-being, either could fit; 'my salvation' preserves
    the lexical link while remaining understandable. The less theologically loaded
    contextual alternative 'my deliverance' is preserved in a footnote.
