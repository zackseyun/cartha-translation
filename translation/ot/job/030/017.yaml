id: JOB.30.17
reference: Job 30:17
source:
  edition: WLC
  text: לַ֗יְלָה עֲ֭צָמַ/י נִקַּ֣ר מֵ/עָלָ֑/י וְ֝/עֹרְקַ֗/י לֹ֣א יִשְׁכָּבֽוּ/ן׃
translation:
  text: At night my bones are pierced within me, and my gnawing pains do not lie down.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my bones are bored through from upon me'; the Hebrew wording is difficult,
      and some translations render the verb more generally as 'gnaws.'
    reason: lexical_alternative
  - marker: b
    text: Or 'my sinews' or 'my veins'; the Hebrew term is rare and may refer literally
      to bodily cords/channels rather than, by extension, to pains.
    reason: lexical_alternative
lexical_decisions:
- source_word: לַיְלָה
  chosen: At night
  alternatives:
  - By night
  - In the night
  lexicon: HALOT
  rationale: Temporal accusative/adverbial use of 'night'; 'At night' is natural modern
    English and preserves the temporal force.
- source_word: עֲצָמַי
  chosen: my bones
  alternatives:
  - my frame
  lexicon: HALOT
  rationale: Literal 'my bones' best preserves the concrete bodily imagery of suffering
    in Job.
- source_word: נִקַּר
  chosen: are pierced
  alternatives:
  - is pierced
  - are bored through
  - gnaws
  lexicon: HALOT
  rationale: From נקר, 'to bore/pierce.' With the plural subject 'my bones,' English
    idiom uses plural agreement. This keeps the violent physical image. Some take
    the verb more generally as 'gnaws at,' but the core sense of piercing/bored through
    is preferable in the main text.
- source_word: מֵעָלָי
  chosen: within me
  alternatives:
  - from upon me
  - away from me
  - on me
  lexicon: HALOT
  rationale: The prepositional phrase is difficult literally ('from upon me'). In
    context of bodily pain, an idiomatic rendering is needed. 'Within me' communicates
    internal bodily affliction more clearly than a wooden literalism, while staying
    close to the sense.
- source_word: וְעֹרְקַי
  chosen: my gnawing pains
  alternatives:
  - my sinews
  - my veins
  - my arteries
  lexicon: HALOT
  rationale: The noun is rare and debated. While it can denote bodily channels such
    as veins/sinews, the parallel with unceasing torment supports a metonymic sense
    referring to the pains that course through him. 'My gnawing pains' yields coherent
    English and fits the complaint context.
- source_word: לֹא יִשְׁכָּבוּן
  chosen: do not lie down
  alternatives:
  - do not rest
  - do not cease
  lexicon: HALOT
  rationale: 'Literally ''do not lie down.'' Retaining the sleep/rest metaphor preserves
    the poetry: the pains never settle into rest. ''Do not rest'' is possible but
    less vivid.'
