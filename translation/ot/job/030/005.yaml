id: JOB.30.5
reference: Job 30:5
source:
  edition: WLC
  text: מִן גֵּ֥ו יְגֹרָ֑שׁוּ יָרִ֥יעוּ עָ֝לֵ֗י/מוֹ כַּ/גַּנָּֽב־׃
translation:
  text: They are driven out from the ravine; people shout after them as after a thief.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'They shout against them like a thief,' with the subject of 'shout' left
      unspecified in Hebrew.
    reason: lexical_alternative
  - marker: b
    text: '''Ravine'' may also be rendered ''valley'' or ''gorge.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: מִן
  chosen: from
  lexicon: HALOT
  rationale: Standard preposition marking source or separation; here it introduces
    the place from which they are expelled.
- source_word: גֵּו
  chosen: ravine
  alternatives:
  - valley
  - midst
  lexicon: HALOT
  rationale: The noun denotes a hollow, gorge, or ravine. 'Ravine' best fits the social-geographic
    picture in Job 30 of outcasts dwelling in desolate wadis and clefts. 'Midst' is
    less likely in this context.
- source_word: יְגֹרָשׁוּ
  chosen: are driven out
  alternatives:
  - are expelled
  - are chased away
  lexicon: HALOT
  rationale: Piel imperfect/passive sense from גרש conveys forcible expulsion. English
    passive preserves the Hebrew focus on what is done to them.
- source_word: יָרִיעוּ
  chosen: people shout
  alternatives:
  - they shout
  - a cry is raised
  lexicon: HALOT
  rationale: From רוע/ריע in Hiphil, 'raise a shout.' Because the following phrase
    'after them' suggests hostile public outcry directed toward the outcasts, supplying
    the understood subject as indefinite 'people' makes the English natural while
    preserving the sense.
- source_word: עָלֵימוֹ
  chosen: after them
  alternatives:
  - against them
  - at them
  - over them
  lexicon: HALOT
  rationale: The preposition על with verbs of shouting can indicate hostile direction
    toward someone. In idiomatic English with pursuit/exclusion imagery, 'after them'
    fits well, especially before the comparison 'as after a thief.' 'Against them'
    is possible but less idiomatic here.
- source_word: כַּגַּנָּב
  chosen: as after a thief
  alternatives:
  - like a thief
  - as against a thief
  lexicon: HALOT
  rationale: The comparative כ plus noun means 'like/as [one does] to a thief.' Because
    the verse compares the public shouting directed toward them with the alarm raised
    in response to a thief, the fuller English expression 'as after a thief' makes
    the implied action explicit without over-paraphrasing.
