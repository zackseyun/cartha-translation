id: JOB.30.18
reference: Job 30:18
source:
  edition: WLC
  text: בְּ/רָב כֹּ֭חַ יִתְחַפֵּ֣שׂ לְבוּשִׁ֑/י כְּ/פִ֖י כֻתָּנְתִּ֣/י יַֽאַזְרֵֽ/נִי־׃
translation:
  text: By great force my garment is disfigured; like the collar of my tunic it binds
    me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my garment is changed,' 'my garment is disfigured,' or possibly 'he
      seizes my garment.' The Hebrew verb is difficult, and the line is commonly understood
      as describing Job's affliction as distorting or constricting him like clothing.
    reason: lexical_alternative
  - marker: b
    text: Literally 'like the mouth/opening of my tunic.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּ/רָב כֹּחַ
  chosen: By great force
  alternatives:
  - With great force
  - Through great force
  lexicon: HALOT
  rationale: The preposition ב plus רָב and כֹּחַ is best taken instrumentally/adverbially,
    expressing the intensity or means by which the following action happens. 'By great
    force' is concise and natural in English.
- source_word: יִתְחַפֵּשׂ
  chosen: is disfigured
  alternatives:
  - is changed
  - is disguised
  - is seized/handled roughly
  lexicon: HALOT
  rationale: The verb חפשׂ in the hitpael here is difficult and contextually debated.
    In Job's lament about bodily affliction and clothing imagery, the sense is that
    his garment is altered beyond recognition or distorted. 'Is disfigured' captures
    the likely effect in context better than the more wooden 'is changed' or the less
    fitting 'is disguised.'
- source_word: לְבוּשִׁי
  chosen: my garment
  alternatives:
  - my clothing
  - my robe
  lexicon: HALOT
  rationale: לְבוּשׁ denotes clothing/garment generally. 'My garment' preserves the
    singular and fits the poetic parallel with 'my tunic.'
- source_word: כְּפִי
  chosen: like the collar of
  alternatives:
  - like the opening of
  - like the mouth of
  lexicon: HALOT
  rationale: Though literally 'like the mouth/opening of,' in clothing context the
    idiomatic sense is the opening or collar of a garment. 'Collar of' gives clear
    modern English while preserving the image.
- source_word: כֻתָּנְתִּי
  chosen: my tunic
  alternatives:
  - my coat
  - my shirt
  lexicon: HALOT
  rationale: כֻּתֹּנֶת refers to a tunic-like garment. 'Tunic' is the most standard
    and contextually appropriate rendering.
- source_word: יַאַזְרֵנִי
  chosen: it binds me
  alternatives:
  - it girds me
  - it encircles me
  lexicon: HALOT
  rationale: From אזר, 'to gird/bind.' In context of constricting clothing imagery,
    'it binds me' communicates the forceful, restrictive sense more naturally than
    the archaic 'girds me,' while preserving the metaphor.
