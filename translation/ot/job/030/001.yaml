id: JOB.30.1
reference: Job 30:1
source:
  edition: WLC
  text: וְ/עַתָּ֤ה שָֽׂחֲק֣וּ עָלַ/י֮ צְעִירִ֥ים מִמֶּ֗/נִּי לְ/יָ֫מִ֥ים אֲשֶׁר מָאַ֥סְתִּי
    אֲבוֹתָ֑/ם לָ֝/שִׁ֗ית עִם כַּלְבֵ֥י צֹאנִֽ/י׀־־׃
translation:
  text: But now younger men than I laugh at me, whose fathers I refused to set with
    the dogs of my flock.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with my sheepdogs.' The Hebrew reads more literally, 'with the dogs
      of my flock.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  chosen: But now
  alternatives:
  - And now
  - Now
  lexicon: HALOT
  rationale: Introduces a sharp contrast with Job's former honor in the preceding
    context. 'But now' best captures the adversative force in readable English.
- source_word: שָׂחֲקוּ עָלַי
  chosen: laugh at me
  alternatives:
  - mock me
  - deride me
  lexicon: HALOT
  rationale: The verb means 'laugh' or 'mock'; with עַל it conveys scorn directed
    toward Job. 'Laugh at me' preserves the concrete image while naturally implying
    contempt in context.
- source_word: צְעִירִים מִמֶּנִּי
  chosen: younger men than I
  alternatives:
  - those younger than I am
  - men younger than me
  - the younger than I
  lexicon: HALOT
  rationale: צְעִירִים denotes younger persons; in this social setting 'younger men'
    fits the discourse about fathers and social rank. 'Than I' keeps the comparison
    concise and literary without becoming archaic.
- source_word: לְיָמִים
  chosen: than I
  alternatives:
  - in days than I
  - younger in days than I
  lexicon: HALOT
  rationale: Literally 'for days/in days,' an idiom for age. English expresses the
    sense idiomatically as comparative age rather than preserving the Hebrew noun
    'days' awkwardly in the main text.
- source_word: אֲשֶׁר מָאַסְתִּי
  chosen: whose ... I refused
  alternatives:
  - whose ... I disdained
  - whose ... I rejected
  lexicon: HALOT
  rationale: מָאַס conveys rejection or disdain. 'Refused' fits the infinitive complement
    that follows ('to set') and avoids overstating emotional contempt beyond the syntax.
- source_word: אֲבוֹתָם
  chosen: fathers
  alternatives:
  - ancestors
  lexicon: HALOT
  rationale: The ordinary sense is 'fathers.' Here it refers to the fathers of the
    younger men now mocking Job.
- source_word: לָשִׁית
  chosen: to set
  alternatives:
  - to place
  - to put
  lexicon: HALOT
  rationale: The infinitive of שׂים means 'to put/place/set.' 'Set' works idiomatically
    with 'with the dogs of my flock' and preserves the concrete action.
- source_word: עִם כַּלְבֵי צֹאנִי
  chosen: with the dogs of my flock
  alternatives:
  - among the dogs of my flock
  - with my sheepdogs
  lexicon: HALOT
  rationale: Literally 'with the dogs of my flock.' This likely refers to sheepdogs/watchdogs,
    but the Hebrew wording is broader; the main text preserves the literal expression,
    while the social insult is left implicit.
