id: JOB.30.28
reference: Job 30:28
source:
  edition: WLC
  text: קֹדֵ֣ר הִ֭לַּכְתִּי בְּ/לֹ֣א חַמָּ֑ה קַ֖מְתִּי בַ/קָּהָ֣ל אֲשַׁוֵּֽעַ׃
translation:
  text: I go about darkened, but not by the sun; I stand up in the assembly and cry
    for help.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'mourning' / 'blackened' for 'darkened'; the Hebrew participle can evoke
      both grief and a darkened appearance.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'not by the sun.' The sense is that his darkened condition is
      not caused by sun exposure.
    reason: lexical_alternative
lexical_decisions:
- source_word: קֹדֵר
  chosen: darkened
  alternatives:
  - mourning
  - blackened
  lexicon: HALOT
  rationale: The participle from קדר can denote being dark, blackened, or in mourning.
    Here it describes Job's condition as he walks about. 'Darkened' preserves the
    metaphorical and possibly physical sense without over-specifying either emotional
    mourning or literal blackness; alternatives are worth preserving because the Hebrew
    can evoke both.
- source_word: הִלַּכְתִּי
  chosen: I go about
  alternatives:
  - I walked
  - I went about
  lexicon: HALOT
  rationale: הלך in this context describes Job's ongoing manner of life or movement.
    English present 'I go about' captures the vivid lament style better than a simple
    past while remaining faithful to the Hebrew perfect used in poetic discourse.
- source_word: בְּלֹא חַמָּה
  chosen: but not by the sun
  alternatives:
  - without sunlight
  - not because of the sun
  lexicon: HALOT
  rationale: חַמָּה means 'sun' or 'sun's heat.' In context Job says his darkened
    condition is not caused by sun exposure. 'But not by the sun' is concise and preserves
    the causal contrast implied by the phrase better than the more interpretive 'without
    sunlight.'
- source_word: קַמְתִּי
  chosen: I stand up
  alternatives:
  - I arose
  - I rise
  lexicon: HALOT
  rationale: קום here introduces Job's public action before the community. 'I stand
    up' is natural modern English and fits the parallel with crying out in the assembly.
- source_word: בַקָּהָל
  chosen: in the assembly
  alternatives:
  - in the congregation
  - in the gathering
  lexicon: HALOT
  rationale: קהל denotes an assembled group. 'Assembly' is a clear, broadly accurate
    rendering that avoids importing later ecclesial overtones that 'congregation'
    may suggest.
- source_word: אֲשַׁוֵּעַ
  chosen: cry for help
  alternatives:
  - cry out
  - cry aloud
  lexicon: HALOT
  rationale: שוע in the Piel commonly conveys a cry for help or desperate appeal.
    'Cry for help' makes the object of the cry explicit and best reflects the lament
    context.
