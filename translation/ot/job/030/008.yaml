id: JOB.30.8
reference: Job 30:8
source:
  edition: WLC
  text: בְּֽנֵי נָ֭בָל גַּם בְּנֵ֣י בְלִי שֵׁ֑ם נִ֝כְּא֗וּ מִן הָ/אָֽרֶץ־־־־׃
translation:
  text: Sons of fools, indeed sons without a name, were driven out from the land.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they were scourged/beaten out from the land.' The Hebrew verb is rare, and the exact nuance may be either violent striking or expulsion; the context favors the sense of being driven out.
    reason: lexical_alternative
  - marker: b
    text: '''Sons without a name'' is a Hebrew idiom for people of no standing or honor.'
    reason: cultural_note
  - marker: c
    text: Or 'they were driven out'.
    reason: previous_rendering
lexical_decisions:
- source_word: בְּנֵי
  chosen: sons of
  alternatives:
  - children of
  - offspring of
  lexicon: HALOT
  rationale: Construct plural of בֵּן. 'Sons of' preserves the Hebrew idiom and the gendered form of the source, in keeping with the gender-accurate policy. It also carries the sense of belonging to a class or lineage.
- source_word: נָבָל
  chosen: fools
  alternatives:
  - senseless men
  - base men
  - worthless men
  lexicon: HALOT
  rationale: נָבָל denotes a morally and socially contemptible fool, not merely someone unintelligent. 'Fools' is the most natural concise English rendering and preserves the ethical force.
- source_word: גַּם
  chosen: indeed
  alternatives:
  - also
  - even
  lexicon: HALOT
  rationale: Here גַּם intensifies/appends the second appositional phrase. 'Indeed' captures the emphatic force more idiomatically in English than a flat 'also.'
- source_word: בְּנֵי בְלִי־שֵׁם
  chosen: sons without a name
  alternatives:
  - nameless sons
  - sons of no name
  - sons of ignobility
  lexicon: HALOT
  rationale: Literally 'sons of without-name.' The phrase conveys social disgrace and lack of standing. 'Sons without a name' keeps the Hebrew structure and allows the idiom's force to remain visible; 'nameless sons' is smoother but less transparent.
- source_word: נִכְּאוּ
  chosen: were driven out
  alternatives:
  - were scourged out
  - were beaten out
  - were cast out
  lexicon: HALOT
  rationale: The Niphal form here conveys being struck down or expelled. In context with מִן הָאָרֶץ, the sense is exclusion/expulsion from the land. 'Were driven out' communicates the result clearly in modern English while staying close to the likely contextual meaning.
- source_word: מִן הָאָרֶץ
  chosen: from the land
  alternatives:
  - from the earth
  - out of the land
  lexicon: HALOT
  rationale: אֶרֶץ can mean 'land' or 'earth.' In this social setting, referring to expulsion from the inhabited land/community is more natural than the cosmic 'earth.' 'From the land' is concise and contextually fitting.
