id: JOB.30.30
reference: Job 30:30
source:
  edition: WLC
  text: ע֭וֹרִ/י שָׁחַ֣ר מֵ/עָלָ֑/י וְ/עַצְמִ/י חָ֝֗רָה מִנִּי חֹֽרֶב־־׃
translation:
  text: My skin turns black and falls from me, and my bones burn with heat.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'My skin turns black from upon me'; the Hebrew expression may describe
      skin blackening and peeling away or hanging darkened on the body.
    reason: lexical_alternative
  - marker: b
    text: Or 'my bones burn from fever.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עוֹרִי
  chosen: my skin
  alternatives:
  - my hide
  lexicon: HALOT
  rationale: עוֹר commonly denotes skin/hide. In human context, 'my skin' is the natural
    modern English rendering.
- source_word: שָׁחַר
  chosen: turns black
  alternatives:
  - is blackened
  - grows dark
  lexicon: HALOT
  rationale: The verb from שׁחר here describes becoming dark/black. 'Turns black'
    captures the stative-result sense in readable English.
- source_word: מֵעָלָי
  chosen: and falls from me
  alternatives:
  - from upon me
  - off me
  lexicon: HALOT
  rationale: Literally 'from upon me.' In context of diseased skin, English idiom
    requires an implied motion/result. 'Falls from me' expresses the likely sense
    without excessive paraphrase.
- source_word: וְעַצְמִי
  chosen: and my bones
  alternatives:
  - and my bone
  lexicon: HALOT
  rationale: Though morphologically singular with 1cs suffix, עֶצֶם can function collectively.
    'My bones' is idiomatic English and fits the bodily parallelism.
- source_word: חָרָה
  chosen: burn
  alternatives:
  - are inflamed
  - grow hot
  lexicon: HALOT
  rationale: חרה conveys burning or kindling. 'Burn' preserves the vivid bodily imagery
    and pairs naturally with 'heat.'
- source_word: מִנִּי
  chosen: with
  alternatives:
  - from
  - because of
  lexicon: HALOT
  rationale: 'The preposition literally means ''from,'' but in this collocation it
    indicates cause or accompanying condition. ''With'' yields natural English: ''burn
    with heat.'''
- source_word: חֹרֶב
  chosen: heat
  alternatives:
  - fever
  - drought-like burning
  lexicon: HALOT
  rationale: חֹרֶב often denotes heat/dryness. In bodily context, 'heat' is the broadest
    and safest rendering; 'fever' is possible but more interpretive.
