id: JOB.30.4
reference: Job 30:4
source:
  edition: WLC
  text: הַ/קֹּטְפִ֣ים מַלּ֣וּחַ עֲלֵי שִׂ֑יחַ וְ/שֹׁ֖רֶשׁ רְתָמִ֣ים לַ/חְמָֽ/ם־׃
translation:
  text: who pluck saltwort from among the bushes, and the root of broom shrubs is
    their food.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'mallow'; the Hebrew plant name is uncertain, though it likely refers
      to a salt-tolerant wild plant.
    reason: lexical_alternative
  - marker: b
    text: Or 'their bread,' with 'bread' used in the broader sense of 'food' or 'sustenance.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַקֹּטְפִים
  chosen: who pluck
  alternatives:
  - who gather
  - who pick
  lexicon: HALOT
  rationale: The participle from קטף denotes plucking or picking off, especially vegetation.
    'Pluck' preserves the concrete, somewhat desperate action better than the broader
    'gather.' The relative sense 'who pluck' fits the continuation of the description
    from the previous verse.
- source_word: מַלּוּחַ
  chosen: saltwort
  alternatives:
  - mallow
  - salt herb
  lexicon: HALOT
  rationale: The plant name is uncertain, but likely refers to a salt-tolerant desert
    plant rather than the familiar English 'mallow.' 'Saltwort' best reflects the
    probable referent and avoids misleading readers with a domesticated garden plant
    image.
- source_word: עֲלֵי שִׂיחַ
  chosen: from among the bushes
  alternatives:
  - by the bushes
  - upon shrubs
  lexicon: HALOT
  rationale: The preposition על in this idiom likely indicates location in relation
    to scrub growth. 'From among the bushes' gives natural English while preserving
    the picture of foraging in scrubland. A more literal 'upon shrubs' would be awkward
    and less clear in English.
- source_word: וְשֹׁרֶשׁ רְתָמִים
  chosen: and the root of broom shrubs
  alternatives:
  - and broom-root
  - and the roots of broom bushes
  lexicon: HALOT
  rationale: 'רתמים refers to broom shrubs, a desert plant. The singular construct
    ''root of'' followed by the plural plant term is naturally rendered as a collective
    expression in English: ''the root of broom shrubs.'' This preserves the Hebrew
    sense without forcing an unnatural singular/plural correspondence.'
- source_word: לַחְמָם
  chosen: is their food
  alternatives:
  - is their bread
  - serves as their food
  lexicon: HALOT
  rationale: Though לחם is literally 'bread,' it often extends to food in general.
    Here the sense is not baked bread but sustenance. 'Is their food' communicates
    the idiomatic meaning clearly in modern English while retaining the stark note
    of survival.
