id: JOB.30.14
reference: Job 30:14
source:
  edition: WLC
  text: כְּ/פֶ֣רֶץ רָחָ֣ב יֶאֱתָ֑יוּ תַּ֥חַת שֹׁ֝אָ֗ה הִתְגַּלְגָּֽלוּ׃
translation:
  text: Like a wide breach they come; amid the ruin they roll on.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'As through a wide breach they come; under the crash they roll themselves
      on.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּ/פֶרֶץ
  chosen: Like a ... breach
  alternatives:
  - As through a breach
  - Like a breaking-in
  lexicon: HALOT
  rationale: 'פֶרֶץ commonly denotes a breach, gap, or break in a wall. The prefixed
    כְ marks comparison, so the image is simile: the attackers come like a breach
    opening up. English ''breach'' preserves the military/destructive imagery better
    than a looser paraphrase.'
- source_word: רָחָב
  chosen: wide
  alternatives:
  - broad
  - gaping
  lexicon: HALOT
  rationale: The adjective modifies פֶרֶץ and intensifies the image of an extensive
    opening. 'Wide' is natural modern English and keeps the concrete force.
- source_word: יֶאֱתָיוּ
  chosen: they come
  alternatives:
  - they advance
  - they arrive
  lexicon: HALOT
  rationale: From אתה/אתה II in this context, the verb conveys coming/advancing. 'They
    come' is straightforward and fits the vivid present-like poetic movement. 'Advance'
    is possible but slightly more interpretive.
- source_word: תַּחַת
  chosen: amid
  alternatives:
  - under
  - beneath
  - in place of
  lexicon: HALOT
  rationale: 'Though תַּחַת often means ''under/beneath,'' in poetic usage with a
    calamity noun it can indicate the setting or circumstances. ''Amid'' best conveys
    the sense in idiomatic English here: their movement occurs in the context of devastation.'
- source_word: שֹׁאָה
  chosen: the ruin
  alternatives:
  - crash
  - devastation
  - desolation
  lexicon: HALOT
  rationale: שֹׁאָה denotes ruin, devastation, or crash/desolation. 'Ruin' is concise
    and vivid, matching the breached-wall imagery. 'Desolation' is possible but more
    static; 'crash' is too narrow in English.
- source_word: הִתְגַּלְגָּלוּ
  chosen: they roll on
  alternatives:
  - they roll themselves
  - they tumble in
  - they come rolling
  lexicon: HALOT
  rationale: The hitpael of גלל evokes rolling or tumbling movement. 'They roll on'
    preserves the reflexive/dynamic sense without awkward English. It suggests the
    unstoppable surge of the hostile crowd in the wake of collapse.
