theological_decisions:
- issue: Anthropomorphic description of God's action
  chosen_reading: Retain the direct second-person accusation and the concrete image
    'your hand' without softening.
  alternative_readings:
  - Paraphrase to reduce anthropomorphism, e.g., 'your power is against me'
  rationale: Job's lament intentionally speaks to God in stark, relational, and anthropomorphic
    terms. The translation should preserve the theological tension of the complaint
    rather than mute it.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather
    than resolve it.
