id: JOB.30.21
reference: Job 30:21
source:
  edition: WLC
  text: תֵּהָפֵ֣ךְ לְ/אַכְזָ֣ר לִ֑/י בְּ/עֹ֖צֶם יָדְ/ךָ֣ תִשְׂטְמֵֽ/נִי׃
translation:
  text: You have turned cruel to me; with the might of your hand you persecute me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'You have become merciless to me.'
    reason: lexical_alternative
  - marker: b
    text: Or 'you oppose me' or 'you attack me.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תֵּהָפֵךְ
  chosen: have turned
  alternatives:
  - become
  - turn yourself
  lexicon: HALOT
  rationale: 'The Niphal of הפך here is best rendered as an intransitive/passive-like
    change of state directed toward Job''s experience: ''you have turned'' or ''become.''
    English ''have turned'' is idiomatic with the following predicate and preserves
    the sense of change without over-specifying reflexivity.'
- source_word: לְאַכְזָר
  chosen: cruel
  alternatives:
  - cruel one
  - merciless
  - ruthless
  lexicon: HALOT
  rationale: אַכְזָר denotes cruelty or mercilessness. The predicate adjective 'cruel'
    fits the construction 'turned cruel to me' in natural English. 'Merciless' is
    possible but slightly more interpretive; 'cruel' is more direct and conventional.
- source_word: לִי
  chosen: to me
  alternatives:
  - toward me
  - against me
  lexicon: HALOT
  rationale: The preposition marks relation or direction. 'To me' preserves the Hebrew
    closely in the first colon. The adversative force is conveyed by the whole clause,
    so a stronger gloss like 'against me' is unnecessary here.
- source_word: בְּעֹצֶם
  chosen: with the might of
  alternatives:
  - in the strength of
  - with the force of
  lexicon: HALOT
  rationale: עֹצֶם conveys strength, might, or force. 'With the might of' is natural
    in English and preserves the instrumental sense of בְּ.
- source_word: יָדְךָ
  chosen: your hand
  alternatives:
  - your power
  lexicon: HALOT
  rationale: '''Hand'' should be retained rather than interpreted as ''power,'' since
    the Hebrew idiom is transparent in English and preserves the vivid anthropomorphic
    imagery of divine action.'
- source_word: תִשְׂטְמֵנִי
  chosen: you persecute me
  alternatives:
  - you oppose me
  - you attack me
  - you hate me
  lexicon: HALOT
  rationale: From שׂטם, the verb can denote hostility, enmity, or persecution. In
    this context of active divine assault in Job's complaint, 'you persecute me' best
    captures sustained hostile action. 'Hate me' is too internal; 'oppose me' is weaker
    than the context suggests.
