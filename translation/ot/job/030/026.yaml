id: JOB.30.26
reference: Job 30:26
source:
  edition: WLC
  text: כִּ֤י ט֣וֹב קִ֭וִּיתִי וַ/יָּ֣בֹא רָ֑ע וַֽ/אֲיַחֲלָ֥ה לְ֝/א֗וֹר וַ/יָּ֥בֹא
    אֹֽפֶל׃
translation:
  text: For I hoped for good, but evil came; I waited for light, but darkness came.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'calamity'/'disaster' for 'evil'; the Hebrew רָע here likely refers to
      adversity rather than moral evil.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Surely
  - Indeed
  - When
  lexicon: HALOT
  rationale: Introduces the reason or explanation for Job's lament in context. 'For'
    best preserves the causal/explanatory force here.
- source_word: טוֹב
  chosen: good
  alternatives:
  - prosperity
  - well-being
  lexicon: HALOT
  rationale: 'The adjective functions substantivally: Job expected what was beneficial
    or favorable. ''Good'' is broad and natural, preserving the contrast with ''evil''
    without over-specifying material prosperity.'
- source_word: קִוִּיתִי
  chosen: I hoped
  alternatives:
  - I waited for
  - I looked for
  lexicon: HALOT
  rationale: The verb conveys hopeful expectation. 'I hoped' fits the emotional nuance
    and pairs well with 'good.'
- source_word: וַיָּבֹא
  chosen: came
  alternatives:
  - arrived
  - befell me
  lexicon: HALOT
  rationale: A simple rendering preserves the repeated verb and the stark reversal.
    'Came' is idiomatic with both 'evil' and 'darkness' in English.
- source_word: רָע
  chosen: evil
  alternatives:
  - harm
  - calamity
  - disaster
  lexicon: HALOT
  rationale: In Job this term often denotes adversity/calamity rather than moral evil,
    but 'evil' is the most direct lexical equivalent and preserves the sharp antithesis
    with 'good.' The contextual sense of misfortune is clear from the lament setting.
- source_word: אֲיַחֲלָה
  chosen: I waited
  alternatives:
  - I hoped
  - I longed
  lexicon: HALOT
  rationale: This verb overlaps semantically with hopeful waiting. Rendering it as
    'I waited' avoids awkward repetition of 'hoped' while preserving the expectation
    nuance.
- source_word: לְאוֹר
  chosen: for light
  alternatives:
  - for brightness
  - for relief
  lexicon: HALOT
  rationale: The preposition marks the object of expectation. 'Light' should be retained
    rather than interpreted, since it naturally carries both literal and metaphorical
    overtones in context.
- source_word: אֹפֶל
  chosen: darkness
  alternatives:
  - gloom
  - deep darkness
  lexicon: HALOT
  rationale: A strong term for darkness/gloom. 'Darkness' preserves the direct contrast
    with 'light' and remains readable modern English.
