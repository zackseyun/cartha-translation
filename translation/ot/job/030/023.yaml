id: JOB.30.23
reference: Job 30:23
source:
  edition: WLC
  text: כִּֽי יָ֭דַעְתִּי מָ֣וֶת תְּשִׁיבֵ֑/נִי וּ/בֵ֖ית מוֹעֵ֣ד לְ/כָל חָֽי־־׃
translation:
  text: For I know that you will bring me back to death, and to the house appointed
    for every living one.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'you will return me to death.' The verb carries the sense of causing
      someone to return.
    reason: lexical_alternative
  - marker: b
    text: Or 'the house appointed for all the living'; possibly a poetic reference
      to the grave or Sheol as the destination common to every person.
    reason: alternative_reading
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Surely
  - Because
  lexicon: HALOT
  rationale: Introduces Job's explanation or grounds for the preceding complaint.
    'For' best preserves the connective force in context without overstating emphasis.
- source_word: יָדַעְתִּי
  chosen: I know
  alternatives:
  - I have known
  - I knew
  lexicon: HALOT
  rationale: Qal perfect 1cs expresses Job's settled knowledge or certainty. Present
    English 'I know' conveys the stative force naturally.
- source_word: מָוֶת
  chosen: death
  alternatives:
  - the realm of death
  lexicon: HALOT
  rationale: The noun plainly denotes death. The verse speaks of being brought back
    to death, likely as the state/destiny of dying rather than explicitly Sheol, so
    the simpler 'death' is preferred.
- source_word: תְּשִׁיבֵנִי
  chosen: you will bring me back
  alternatives:
  - you will return me
  - you will restore me
  - you will bring me
  lexicon: HALOT
  rationale: Hiphil of שוב commonly means 'cause to return.' With 'death' as destination,
    'bring me back' preserves the causative nuance and the sense of being returned
    to the common human end. 'Bring me' is smoother but loses the verbal nuance of
    return.
- source_word: וּבֵית
  chosen: and to the house
  alternatives:
  - and the house
  - even to the house
  lexicon: HALOT
  rationale: The conjunction plus construct noun continues the destination idea from
    the previous clause; English supplies 'to' for natural sense.
- source_word: מוֹעֵד
  chosen: appointed
  alternatives:
  - appointed time
  - meeting
  - assembly
  - destined
  lexicon: HALOT
  rationale: מוֹעֵד often denotes an appointed time/place. In construct with 'house,'
    the sense is a place appointed or destined for all the living. 'Appointed' is
    concise and preserves the underlying notion without forcing 'meeting' or 'assembly,'
    which sound too concrete here.
- source_word: לְכָל חָי
  chosen: for every living one
  alternatives:
  - for all the living
  - for every living person
  lexicon: HALOT
  rationale: Literally 'for every living [one].' The singular collective is preserved
    with 'every living one,' which keeps the universal force while remaining close
    to the Hebrew. 'For all the living' is idiomatic but less formally aligned.
