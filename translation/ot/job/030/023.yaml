theological_decisions:
- issue: Interpretation of death imagery
  chosen_reading: The verse refers to death as the universal human destination, described
    metaphorically as an appointed house.
  alternative_readings:
  - The verse refers more specifically to Sheol/the grave as the house of assembly
    for the dead.
  rationale: The Hebrew uses 'death' and 'house appointed for every living one' without
    naming Sheol. The translation preserves the imagery without importing a more developed
    doctrine of the afterlife than the text states.
  doctrine_reference: Translation philosophy §1, §3
