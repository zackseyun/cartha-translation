id: JOB.30.12
reference: Job 30:12
source:
  edition: WLC
  text: עַל יָמִין֮ פִּרְחַ֪ח יָ֫ק֥וּמוּ רַגְלַ֥/י שִׁלֵּ֑חוּ וַ/יָּסֹ֥לּוּ עָ֝לַ֗/י
    אָרְח֥וֹת אֵידָֽ/ם־׃
translation:
  text: On my right, a brood rises up; they send my feet away, and they build up against
    me their paths of disaster.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a rabble rises up'; the Hebrew פִּרְחַח is a rare term for a contemptible
      or unruly group.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'they send my feet away.' The sense may be that they drive his
      feet off course or trip him up.
    reason: lexical_alternative
  - marker: c
    text: Or 'they cast up against me their paths of calamity/ruin.' The Hebrew keeps
      the road-building metaphor in a hostile sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: עַל יָמִין
  chosen: On my right
  alternatives:
  - At my right hand
  - Against my right side
  lexicon: HALOT
  rationale: The phrase is spatial and idiomatic for hostile positioning at one's
    right side. 'On my right' is concise and natural while preserving the Hebrew image.
- source_word: פִּרְחַח
  chosen: a brood
  alternatives:
  - rabble
  - young men
  - riffraff
  lexicon: HALOT
  rationale: The noun denotes a contemptible or unruly set of people. 'A brood' preserves
    the collective singular sense and the speaker's disdain without becoming overly
    colloquial. 'Rabble' is possible, but 'brood' better fits the singular form used
    collectively.
- source_word: יָקוּמוּ
  chosen: rises up
  alternatives:
  - rise up
  - stand up
  lexicon: HALOT
  rationale: The verb קום here conveys hostile arising or taking a stand. Singular
    English agrees naturally with the collective noun 'brood.'
- source_word: רַגְלַי שִׁלֵּחוּ
  chosen: they send my feet away
  alternatives:
  - they trip up my feet
  - they drive my feet away
  - they let loose my feet
  lexicon: HALOT
  rationale: The Hebrew is difficult. Literally, 'my feet they send away/release.'
    The chosen rendering stays close to the wording and preserves the image of forcing
    Job's footing away or out from under him. More interpretive renderings like 'trip
    up my feet' capture likely sense but go beyond the explicit lexemes.
- source_word: וַיָּסֹלּוּ
  chosen: they build up
  alternatives:
  - they cast up
  - they heap up
  lexicon: HALOT
  rationale: From סלל, often used of building up or casting up a road/highway. Here
    it introduces the road/path imagery that follows, so 'build up' keeps the metaphor
    intelligible in modern English.
- source_word: עָלַי
  chosen: against me
  alternatives:
  - upon me
  - over me
  lexicon: HALOT
  rationale: In this hostile context, 'against me' best conveys adversative force
    rather than mere spatial relation.
- source_word: אָרְחוֹת אֵידָם
  chosen: their paths of disaster
  alternatives:
  - their ways of destruction
  - their paths of calamity
  - their roads of ruin
  lexicon: HALOT
  rationale: אֹרַח/אָרְחוֹת means paths/ways, and אֵיד commonly denotes disaster,
    calamity, or ruin. The suffix on אֵידָם is best taken as 'their,' so the phrase
    refers to paths that belong to or lead to their destructive assault. 'Disaster'
    is clear modern English and preserves the severity without overinterpreting.
