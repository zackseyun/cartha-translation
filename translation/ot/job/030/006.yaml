id: JOB.30.6
reference: Job 30:6
source:
  edition: WLC
  text: בַּ/עֲר֣וּץ נְחָלִ֣ים לִ/שְׁכֹּ֑ן חֹרֵ֖י עָפָ֣ר וְ/כֵפִֽים׃
translation:
  text: In the gullies of the wadis they dwell, in holes of the dust and among the
    rocks.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'In the ravines of the streambeds they dwell'; Hebrew נְחָלִים can denote
      wadis, torrent-beds, or valleys depending on context.
    reason: lexical_alternative
  - marker: b
    text: Or 'in holes of the earth and in the crags.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּעֲרוּץ
  chosen: in the gullies
  alternatives:
  - in the ravines
  - in the torrent-beds
  - in the valleys
  lexicon: HALOT
  rationale: עָרוּץ denotes a cut, channel, or ravine, often shaped by rushing water.
    'Gullies' gives a natural modern English image of eroded channels without over-paraphrasing.
- source_word: נְחָלִים
  chosen: of the wadis
  alternatives:
  - of the valleys
  - of the streambeds
  - of the torrents
  lexicon: HALOT
  rationale: נחל commonly refers to a wadi/seasonal watercourse rather than a perennial
    river. 'Wadis' preserves the Near Eastern geographical sense more precisely than
    'valleys' or 'streams.'
- source_word: לִשְׁכֹּן
  chosen: they dwell
  alternatives:
  - to dwell
  - they live
  lexicon: HALOT
  rationale: The infinitive construct functions here idiomatically after the locative
    phrase to express habitation. English requires a finite verbal sense in context;
    'they dwell' is natural and suitably formal.
- source_word: חֹרֵי
  chosen: holes of
  alternatives:
  - caves of
  - hollows of
  lexicon: HALOT
  rationale: From חור, 'hole' or 'cavity.' 'Holes' best matches the stark, degraded
    living conditions described; 'caves' could sound too substantial or shelter-like.
- source_word: עָפָר
  chosen: the dust
  alternatives:
  - the dirt
  - the earth
  - the soil
  lexicon: HALOT
  rationale: עָפָר often means loose earth or dust. 'Dust' fits Job's imagery of abasement
    and desolation better than the more neutral 'soil' or 'earth.'
- source_word: וְכֵפִים
  chosen: and among the rocks
  alternatives:
  - and the crags
  - and the cliffs
  - and among the stones
  lexicon: HALOT
  rationale: כֵפִים refers to rocks/crags. Rendering with 'among the rocks' makes
    the implied locative sense explicit in idiomatic English and parallels the preceding
    habitation imagery.
