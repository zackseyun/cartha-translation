id: JOB.30.22
reference: Job 30:22
source:
  edition: WLC
  text: תִּשָּׂאֵ֣/נִי אֶל ר֭וּחַ תַּרְכִּיבֵ֑/נִי וּ֝/תְמֹגְגֵ֗/נִי תשוה־׃
translation:
  text: You lift me up to the wind; you make me ride on it, and you dissolve me in
    the storm.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'You lift me up on the wind; you make me ride it.'
    reason: lexical_alternative
  - marker: b
    text: The final Hebrew word is difficult. It may refer to storm, crashing tumult,
      or ruin; some translations render the line, 'you toss me about in the storm'
      or 'you dissolve me into ruin.'
    reason: alternative_reading
lexical_decisions:
- source_word: תִּשָּׂאֵנִי
  chosen: You lift me up
  alternatives:
  - You carry me away
  - You raise me
  lexicon: HALOT
  rationale: From נשׂא, 'to lift, carry, bear.' In context of violent displacement,
    'lift me up' preserves the concrete image while remaining natural English. The
    direct address to God is retained with 'You.'
- source_word: אֶל רוּחַ
  chosen: to the wind
  alternatives:
  - into the wind
  - to the spirit
  lexicon: HALOT
  rationale: רוּחַ can mean 'wind,' 'breath,' or 'spirit.' Here the surrounding imagery
    is meteorological and destructive, so 'wind' best fits the context. 'To the wind'
    follows the preposition closely; English readers will understand this as being
    borne up by the wind.
- source_word: תַּרְכִּיבֵנִי
  chosen: you make me ride on it
  alternatives:
  - you cause me to ride
  - you set me riding
  lexicon: HALOT
  rationale: Hiphil of רכב means 'cause to ride' or 'make ride.' Because English normally
    requires an object with 'ride' in this context, 'on it' is supplied to refer back
    to the wind. This makes explicit what is implicit in Hebrew without changing the
    image.
- source_word: וּתְמֹגְגֵנִי
  chosen: you dissolve me
  alternatives:
  - you melt me
  - you make me totter
  lexicon: HALOT
  rationale: From מוג, commonly 'melt, dissolve, make faint.' 'Dissolve me' best conveys
    Job's sense of being undone or disintegrated under divine assault. 'Melt me' is
    possible but sounds less idiomatic in modern English here.
- source_word: תשוה
  chosen: in the storm
  alternatives:
  - in the crash
  - in the tempest
  - you bring me to ruin
  lexicon: HALOT
  rationale: The final form is difficult and has been variously understood. A common
    contextual reading connects it with a storm/noise/destructive tumult, fitting
    the verse's wind-riding imagery. Rendering the phrase adverbially as 'in the storm'
    yields coherent English and preserves the poetic sense without over-specifying
    a highly uncertain form.
