id: JOB.30.7
reference: Job 30:7
source:
  edition: WLC
  text: בֵּין שִׂיחִ֥ים יִנְהָ֑קוּ תַּ֖חַת חָר֣וּל יְסֻפָּֽחוּ־׃
translation:
  text: Among the bushes they bray; under the nettles they huddle together.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they are gathered together' / 'they cower together.' The Hebrew verb
      suggests being clustered or pressed together; the exact nuance is uncertain
      in context.
    reason: lexical_alternative
  - marker: b
    text: Or 'under the thornbush' / 'under the bramble.' The precise plant named
      by the Hebrew term is uncertain.
    reason: lexical_alternative
lexical_decisions:
- source_word: בֵּין
  chosen: among
  alternatives:
  - between
  lexicon: HALOT
  rationale: The preposition can mean 'between' or more broadly 'among/in the midst
    of.' With a plural noun ('bushes'), idiomatic English prefers 'among.'
- source_word: שִׂיחִים
  chosen: bushes
  alternatives:
  - shrubs
  - thickets
  lexicon: HALOT
  rationale: The noun denotes low scrub or bushes. 'Bushes' is clear modern English
    and fits the wilderness setting without over-specifying density implied by 'thickets.'
- source_word: יִנְהָקוּ
  chosen: they bray
  alternatives:
  - they groan
  - they cry out
  lexicon: HALOT
  rationale: From נהק, commonly used of the braying of donkeys. In this context Job
    depicts degraded outcasts with animal-like behavior, so 'bray' preserves the harsh,
    dehumanizing imagery better than the more generic 'groan' or 'cry out.'
- source_word: תַּחַת
  chosen: under
  alternatives:
  - beneath
  lexicon: HALOT
  rationale: A straightforward spatial preposition; 'under' is the most natural English
    equivalent.
- source_word: חָרוּל
  chosen: nettles
  alternatives:
  - thornbush
  - bramble
  lexicon: HALOT
  rationale: The plant term refers to a prickly or noxious weed. 'Nettles' is a common
    established rendering that communicates an unpleasant, wild growth without false
    precision about species.
- source_word: יְסֻפָּחוּ
  chosen: they huddle together
  alternatives:
  - they are gathered together
  - they are joined together
  - they cower together
  lexicon: HALOT
  rationale: The passive/intensive form suggests being brought together or clustering.
    In context of destitute people sheltering under scrub, 'huddle together' captures
    both the physical clustering and the miserable scene more idiomatically than the
    wooden 'are gathered together.'
