id: JOB.30.2
reference: Job 30:2
source:
  edition: WLC
  text: גַּם כֹּ֣חַ יְ֭דֵי/הֶם לָ֣/מָּה לִּ֑/י עָ֝לֵ֗י/מוֹ אָ֣בַד כָּֽלַח־׃
translation:
  text: Even the strength of their hands—what is it to me? Their vigor has perished.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their prime has perished,' taking the rare Hebrew noun as referring
      to mature age or full strength.
    reason: lexical_alternative
lexical_decisions:
- source_word: גַּם
  chosen: Even
  alternatives:
  - also
  - indeed
  lexicon: HALOT
  rationale: Introduces an additional dismissive point in Job's argument; 'Even' captures
    the emphatic additive force in natural English.
- source_word: כֹּחַ
  chosen: strength
  alternatives:
  - power
  - might
  lexicon: HALOT
  rationale: Refers to physical capacity or usefulness; 'strength' fits the context
    of bodily ability better than the broader 'power'.
- source_word: יְדֵיהֶם
  chosen: their hands
  alternatives:
  - their hand
  lexicon: HALOT
  rationale: Literal plural retained. In Hebrew 'hands' commonly stands for practical
    labor capacity; preserving the concrete image suits optimal equivalence.
- source_word: לָמָה לִּי
  chosen: what is it to me?
  alternatives:
  - why should I care?
  - of what use is it to me?
  lexicon: HALOT
  rationale: Idiomatic expression of dismissal or lack of benefit. 'What is it to
    me?' preserves the rhetorical flavor while remaining readable.
- source_word: עָלֵימוֹ
  chosen: their
  alternatives:
  - upon them
  - for them
  lexicon: HALOT
  rationale: Here the preposition with pronominal suffix is best taken in relation
    to the following noun phrase, yielding the sense 'their vigor' rather than a wooden
    'upon them vigor perished.' This reflects the clause's idiomatic syntax.
- source_word: אָבַד
  chosen: has perished
  alternatives:
  - is gone
  - has vanished
  lexicon: HALOT
  rationale: Conveys complete loss or disappearance. 'Has perished' preserves the
    stronger sense of ruin rather than mere absence.
- source_word: כָּלַח
  chosen: vigor
  alternatives:
  - maturity
  - prime
  - full strength
  lexicon: HALOT
  rationale: The noun is rare and contextually difficult. In this verse it most plausibly
    denotes mature strength or vigor, fitting Job's point that even their physical
    usefulness is gone. 'Vigor' is concise and natural English.
