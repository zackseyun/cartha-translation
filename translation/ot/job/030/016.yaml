id: JOB.30.16
reference: Job 30:16
source:
  edition: WLC
  text: וְ/עַתָּ֗ה עָ֭לַ/י תִּשְׁתַּפֵּ֣ךְ נַפְשִׁ֑/י יֹ֭אחֲז֣וּ/נִי יְמֵי עֹֽנִי־׃
translation:
  text: And now my soul is poured out within me; days of affliction seize me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my soul is poured out upon me.' The Hebrew preposition is literally
      'upon/on me,' but the expression likely describes inward collapse.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  chosen: And now
  alternatives:
  - But now
  - Now
  lexicon: HALOT
  rationale: Temporal discourse marker introducing Job’s present condition in contrast
    to what precedes. 'And now' preserves the connective force without overinterpreting
    it as adversative, though 'But now' is also possible from context.
- source_word: עָלַי
  chosen: within me
  alternatives:
  - upon me
  - over me
  - on me
  lexicon: HALOT
  rationale: Although the preposition literally means 'upon/on me,' with the reflexive
    sense of נפשי and the verb 'is poured out,' idiomatic English is better served
    by 'within me,' conveying inner collapse rather than a spatial image that sounds
    unnatural in English. The more formal 'upon me' is preserved as an alternative.
- source_word: תִּשְׁתַּפֵּךְ
  chosen: is poured out
  alternatives:
  - pours itself out
  - melts away
  lexicon: HALOT
  rationale: The Hitpael/imperfect of שפך here depicts the self being emptied or poured
    out. 'Is poured out' gives natural English while retaining the metaphor of depletion.
    'Melts away' is interpretive and less directly tied to the lexical image.
- source_word: נַפְשִׁי
  chosen: my soul
  alternatives:
  - my life
  - my self
  lexicon: HALOT
  rationale: נפש often denotes the inner self or life. 'My soul' preserves the poetic
    and anthropological depth of the Hebrew in Job. 'My life' is possible, but here
    the context of inward anguish favors 'my soul'.
- source_word: יֹאחֲזוּנִי
  chosen: seize me
  alternatives:
  - take hold of me
  - grip me
  lexicon: HALOT
  rationale: From אחז, 'to grasp, seize, take hold.' 'Seize me' is vivid and concise,
    fitting the poetic force. 'Take hold of me' is more formal but less forceful in
    English.
- source_word: יְמֵי
  chosen: days of
  alternatives:
  - the days of
  lexicon: HALOT
  rationale: Construct form requiring completion by the following noun. English omits
    the article naturally here.
- source_word: עֹנִי
  chosen: affliction
  alternatives:
  - misery
  - poverty
  - suffering
  lexicon: HALOT
  rationale: עֹנִי can denote affliction, misery, or poverty depending on context.
    In Job 30 the emphasis is on suffering and humiliation broadly, so 'affliction'
    best captures the term without narrowing it to economic poverty.
