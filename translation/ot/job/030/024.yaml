id: JOB.30.24
reference: Job 30:24
source:
  edition: WLC
  text: אַ֣ךְ לֹא בְ֭/עִי יִשְׁלַח יָ֑ד אִם בְּ֝/פִיד֗/וֹ לָהֶ֥ן שֽׁוּעַ־־־׃
translation:
  text: Surely one does not stretch out a hand against a ruin, if in his calamity
    there is a cry for help from them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Surely one does not stretch out a hand to a ruin-heap; if in his disaster
      there is a cry for help.' The Hebrew of this verse is difficult, especially
      the phrases rendered 'against a ruin' and 'from them.'
    reason: alternative_reading
lexical_decisions:
- source_word: אַךְ
  chosen: Surely
  alternatives:
  - Yet
  - Only
  - However
  lexicon: HALOT
  rationale: Used as an asseverative particle introducing Job's claim, best conveyed
    by 'Surely' rather than a restrictive 'only' or adversative 'however'.
- source_word: בְּעִי
  chosen: against a ruin
  alternatives:
  - on a heap of ruins
  - against a heap
  - in a ruin
  lexicon: HALOT
  rationale: The noun is difficult and rare in this form, commonly understood as ruin/ruin-heap.
    With בְּ and the following idiom 'stretch out a hand,' the sense is hostile or
    futile action directed toward what is already ruined. 'Against a ruin' keeps the
    Hebrew compactness while reflecting the likely sense.
- source_word: יִשְׁלַח יָד
  chosen: stretch out a hand
  alternatives:
  - put forth a hand
  - strike with the hand
  - attack
  lexicon: HALOT
  rationale: This is a common Hebrew idiom. A relatively formal rendering preserves
    the imagery while allowing readers to infer hostile action from context.
- source_word: אִם
  chosen: if
  alternatives:
  - surely
  - indeed
  - when
  lexicon: HALOT
  rationale: Taken here in a conditional or concessive sense linking the second colon
    to the first. The verse is notoriously difficult, but 'if' best preserves the
    Hebrew particle without over-resolving the syntax.
- source_word: בְּפִידוֹ
  chosen: in his calamity
  alternatives:
  - at his disaster
  - in his destruction
  - when he falls
  lexicon: HALOT
  rationale: פיד denotes disaster/calamity. 'In his calamity' preserves the preposition
    and the personal suffix while remaining natural English.
- source_word: לָהֶן
  chosen: from them
  alternatives:
  - for them
  - to them
  - therein
  lexicon: HALOT
  rationale: The form is difficult in context. Rendering it 'from them' gives a plausible
    relational sense with 'cry for help' while acknowledging the obscurity of the
    clause. Because the syntax is uncertain, an alternative is preserved in a footnote.
- source_word: שׁוּעַ
  chosen: a cry for help
  alternatives:
  - cry
  - outcry for help
  lexicon: HALOT
  rationale: The noun denotes a cry for help, often in distress. 'A cry for help'
    makes the nuance explicit in readable English.
