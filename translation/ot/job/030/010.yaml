id: JOB.30.10
reference: Job 30:10
source:
  edition: WLC
  text: תִּֽ֭עֲבוּ/נִי רָ֣חֲקוּ מֶ֑/נִּי וּ֝/מִ/פָּנַ֗/י לֹא חָ֥שְׂכוּ רֹֽק־׃
translation:
  text: They abhor me; they keep far from me, and they do not hold back spitting in
    my face.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'they do not hold back spit from my face.' The Hebrew expression
      conveys an open act of contempt directed at Job personally.
    reason: lexical_alternative
lexical_decisions:
- source_word: תִּעֲבוּנִי
  chosen: they abhor me
  alternatives:
  - they detest me
  - they loathe me
  lexicon: HALOT
  rationale: From תעב, expressing strong revulsion or abhorrence. 'Abhor' preserves
    the intensity and moral/social disgust without sounding overly colloquial.
- source_word: רָחֲקוּ מֶנִּי
  chosen: they keep far from me
  alternatives:
  - they stand far from me
  - they distance themselves from me
  lexicon: HALOT
  rationale: The verb רחק means to be/become far or keep distant. 'Keep far from me'
    captures both spatial and social distancing in idiomatic English.
- source_word: וּמִפָּנַי
  chosen: in my face
  alternatives:
  - before me
  - from before me
  - in front of me
  lexicon: HALOT
  rationale: Literally 'from my face/presence.' In this collocation with spitting,
    English idiom is best represented by 'in my face,' conveying direct personal insult
    rather than mere location.
- source_word: לֹא חָשְׂכוּ
  chosen: they do not hold back
  alternatives:
  - they do not spare
  - they do not refrain from
  lexicon: HALOT
  rationale: חשׂך commonly means withhold, spare, or hold back. Here it governs the
    act of spitting; 'do not hold back' is natural English and preserves the sense
    of shameless lack of restraint.
- source_word: רֹק
  chosen: spitting
  alternatives:
  - spit
  - saliva
  lexicon: HALOT
  rationale: The noun denotes spittle/spit. Rendering it as the verbal noun 'spitting'
    fits the English construction after 'hold back' and communicates the contemptuous
    action clearly.
