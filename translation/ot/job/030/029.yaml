id: JOB.30.29
reference: Job 30:29
source:
  edition: WLC
  text: אָ֭ח הָיִ֣יתִי לְ/תַנִּ֑ים וְ֝/רֵ֗עַ לִ/בְנ֥וֹת יַעֲנָֽה׃
translation:
  text: I have become a brother to jackals, and a companion to ostriches.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''to the daughters of the ostrich,'' a Hebrew expression meaning
      ostriches.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אָח
  chosen: brother
  alternatives:
  - kinsman
  lexicon: HALOT
  rationale: The noun literally means 'brother.' In this poetic context it expresses
    close association or kinship-like identification with desolate creatures. 'Brother'
    preserves the metaphor more directly than a looser rendering like 'friend' or
    'companion.'
- source_word: הָיִיתִי
  chosen: have become
  alternatives:
  - was
  - became
  lexicon: HALOT
  rationale: Qal perfect 1cs of היה. In English, 'have become' naturally conveys a
    present state resulting from prior change, fitting Job's lament. 'Became' is possible
    but slightly less idiomatic in this context.
- source_word: לְתַנִּים
  chosen: to jackals
  alternatives:
  - to dragons
  - to desert creatures
  lexicon: HALOT
  rationale: תַנִּים in poetic contexts commonly refers to jackals, especially in
    scenes of desolation. Older English 'dragons' reflects outdated tradition rather
    than the likely zoological sense. The prefixed ל marks relation ('to/for'), idiomatically
    rendered with 'brother to.'
- source_word: וְרֵעַ
  chosen: and a companion
  alternatives:
  - and a friend
  - and an associate
  lexicon: HALOT
  rationale: רֵעַ denotes a companion, friend, or associate. 'Companion' fits the
    parallelism with 'brother' while avoiding over-interpretation of emotional intimacy.
- source_word: לִבְנוֹת יַעֲנָה
  chosen: to ostriches
  alternatives:
  - to the daughters of the ostrich
  lexicon: HALOT
  rationale: The Hebrew literally says 'to daughters of the ostrich,' an idiom for
    ostriches. Rendering simply 'ostriches' communicates the referent in natural English,
    while the literal form is worth preserving in a footnote because it is a notable
    Hebrew expression.
