id: JOB.30.3
reference: Job 30:3
source:
  edition: WLC
  text: בְּ/חֶ֥סֶר וּ/בְ/כָפָ֗ן גַּ֫לְמ֥וּד הַֽ/עֹרְקִ֥ים צִיָּ֑ה אֶ֝֗מֶשׁ שׁוֹאָ֥ה
    וּ/מְשֹׁאָֽה׃
translation:
  text: Through want and hunger they are gaunt, gnawing the dry ground in the night
    of desolation and waste.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'In want and hunger, they are withered; they scrape at the dry land by
      night, in desolation and waste.' Several words in this verse are rare and difficult,
      especially 'gaunt' and 'gnawing.'
    reason: lexical_alternative
  - marker: b
    text: '''אֶמֶשׁ'' often means ''yesterday'' or ''last night''; here it is taken
      more broadly as ''in the night'' to fit the poetic context.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּחֶסֶר
  chosen: Through want
  alternatives:
  - In want
  - From lack
  lexicon: HALOT
  rationale: חֶסֶר denotes lack, want, or deficiency. With בְּ, the phrase expresses
    the condition or circumstance in which these people exist. 'Through want' is idiomatic
    and pairs well with the following term.
- source_word: וּבְכָפָן
  chosen: and hunger
  alternatives:
  - and famine
  - and starvation
  lexicon: HALOT
  rationale: כָּפָן commonly denotes hunger or famine. Here it describes personal
    deprivation rather than a national famine, so 'hunger' is the most natural English
    rendering.
- source_word: גַּלְמוּד
  chosen: gaunt
  alternatives:
  - barren
  - withered
  - emaciated
  - solitary
  lexicon: HALOT
  rationale: The adjective is rare and contextually describes the physical condition
    of the outcasts. 'Gaunt' captures the sense of being dried up or emaciated from
    deprivation better than the more literal but less idiomatic 'withered' or the
    contextually weaker 'solitary'.
- source_word: הָעֹרְקִים
  chosen: gnawing
  alternatives:
  - plucking
  - scraping for
  - fleeing to
  lexicon: HALOT
  rationale: The participle from ערק is difficult and rare in this context. Given
    the parallel in v.4 about foraging in wastelands, many understand it as desperately
    scraping or gnawing at the barren ground for sustenance. 'Gnawing' conveys the
    harsh, animal-like desperation and fits the object 'dry ground.'
- source_word: צִיָּה
  chosen: the dry ground
  alternatives:
  - dry land
  - parched land
  - wilderness
  lexicon: HALOT
  rationale: צִיָּה denotes dryness, parched land, or arid region. 'The dry ground'
    preserves the concrete image and works naturally as the object of the participle.
- source_word: אֶמֶשׁ
  chosen: in the night
  alternatives:
  - yesterday
  - last night
  lexicon: HALOT
  rationale: Though אֶמֶשׁ can mean 'yesterday,' in poetic usage it can denote night
    or nighttime. Here 'in the night' best fits the sequence with 'desolation and
    waste' and the image of furtive scavenging.
- source_word: שׁוֹאָה
  chosen: desolation
  alternatives:
  - ruin
  - devastation
  lexicon: HALOT
  rationale: שׁוֹאָה denotes devastation or desolation. 'Desolation' preserves the
    bleak poetic tone.
- source_word: וּמְשֹׁאָה
  chosen: and waste
  alternatives:
  - and ruin
  - and devastation
  lexicon: HALOT
  rationale: The paired noun intensifies the scene of utter barrenness. 'Waste' gives
    a concise English equivalent while preserving the parallelism with 'desolation'.
