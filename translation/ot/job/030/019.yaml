id: JOB.30.19
reference: Job 30:19
source:
  edition: WLC
  text: הֹרָ֥/נִי לַ/חֹ֑מֶר וָ֝/אֶתְמַשֵּׁ֗ל כֶּ/עָפָ֥ר וָ/אֵֽפֶר׃
translation:
  text: He has thrown me into the mud, and I have become like dust and ashes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'into the mire' or 'into the clay.' The Hebrew חֹמֶר can denote clay,
      mud, or mire; here the context favors a humiliating image of being cast into
      filth.
    reason: lexical_alternative
  - marker: b
    text: Or 'I am made like dust and ashes' / 'I am likened to dust and ashes.'
    reason: alternative_reading
lexical_decisions:
- source_word: הֹרָנִי
  chosen: He has thrown me
  alternatives:
  - He has cast me
  - He has plunged me
  - He has brought me down
  lexicon: HALOT
  rationale: 'From the verb ירה/ירה in the Hiphil with 1cs suffix, here conveying
    forceful causation: ''he has thrown/cast me.'' ''Thrown'' is vivid and natural
    in English, fitting the image of being hurled into filth. The 3ms subject is left
    as ''He,'' reflecting the Hebrew''s implicit subject in context (God).'
- source_word: לַחֹמֶר
  chosen: into the mud
  alternatives:
  - into the mire
  - into the clay
  lexicon: HALOT
  rationale: חֹמֶר can denote clay or mire/mud. In this lament context, the sense
    is not neutral pottery clay but degrading filth or mire. 'Mud' is more readable
    modern English than 'mire,' while preserving the earthy humiliation imagery.
- source_word: וָאֶתְמַשֵּׁל
  chosen: I have become
  alternatives:
  - I am made like
  - I am likened to
  - I resemble
  lexicon: HALOT
  rationale: From משל in a reflexive/passive-like stem, the sense is 'I am made like
    / I become like.' 'I have become' gives idiomatic English and captures the resultant
    state after being cast down. The comparative force is completed by the following
    כ.
- source_word: כֶּעָפָר
  chosen: like dust
  alternatives:
  - as dust
  lexicon: HALOT
  rationale: עָפָר is 'dust,' a common biblical image of mortality, humiliation, and
    dissolution. 'Like dust' preserves the simile introduced by כ.
- source_word: וָאֵפֶר
  chosen: and ashes
  alternatives:
  - and ash
  lexicon: HALOT
  rationale: אֵפֶר is typically rendered 'ashes' in English idiom, especially in the
    collocation 'dust and ashes.' Retaining the familiar pair preserves the Hebrew
    imagery and intertextual resonance (cf. Gen 18:27).
