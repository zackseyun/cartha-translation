theological_decisions:
- issue: Implicit subject of the 3ms verb
  chosen_reading: Render the subject as 'He,' referring to God in context
  alternative_readings:
  - Use an impersonal English rendering such as 'One has thrown me'
  - 'Leave the subject entirely implicit: ''Thrown into the mud, I have become...'''
  rationale: In Job's speech, the implicit masculine singular subject refers contextually
    to God. Making it explicit as 'He' is faithful to the Hebrew verbal form without
    over-specifying beyond the discourse context. This is a contextual, not doctrinal,
    decision.
