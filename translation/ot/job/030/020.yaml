theological_decisions:
- issue: Whether to make God's non-response more interpretive than the Hebrew states
  chosen_reading: Retain the complaint as unanswered prayer and divine observation
    without adding accusation beyond the text
  alternative_readings:
  - I cry to you for help, but you do not save
  - I stand, and you ignore me
  rationale: The verse expresses Job's lament that God does not answer and merely
    looks on. The Hebrew does not explicitly say 'save' or 'ignore,' so the translation
    preserves the tension and emotional force without importing a stronger doctrinal
    or interpretive claim.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
