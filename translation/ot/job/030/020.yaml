id: JOB.30.20
reference: Job 30:20
source:
  edition: WLC
  text: אֲשַׁוַּ֣ע אֵ֭לֶי/ךָ וְ/לֹ֣א תַעֲנֵ֑/נִי עָ֝מַ֗דְתִּי וַ/תִּתְבֹּ֥נֶן בִּֽ/י׃
translation:
  text: I cry out to you, but you do not answer me; I stand, and you only look at
    me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I stood, and you looked closely at me.' The Hebrew may be read with
      a past-time sense and with the nuance of attentive looking or considering.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲשַׁוַּע
  chosen: I cry out
  alternatives:
  - I call for help
  - I plead
  lexicon: HALOT
  rationale: The Piel of שׁוע conveys a strong cry for help or desperate appeal. 'I
    cry out' preserves the intensity without over-specifying the content of the plea.
- source_word: אֵלֶיךָ
  chosen: to you
  alternatives:
  - toward you
  lexicon: HALOT
  rationale: The preposition אֶל with second masculine singular suffix is naturally
    rendered 'to you' in English prayer language.
- source_word: תַעֲנֵנִי
  chosen: you do not answer me
  alternatives:
  - you do not respond to me
  lexicon: HALOT
  rationale: ענה in the Qal commonly means 'answer, respond.' 'Answer me' is the most
    direct and idiomatic rendering in context.
- source_word: עָמַדְתִּי
  chosen: I stand
  alternatives:
  - I stood
  lexicon: HALOT
  rationale: Although morphologically perfect, the clause works well in English as
    a vivid present coordinated with the preceding present, reflecting Job's ongoing
    complaint. This is an optimal-equivalence choice for natural English poetic force.
- source_word: וַתִּתְבֹּנֶן
  chosen: you only look at
  alternatives:
  - you look at
  - you gaze at
  - you consider
  lexicon: HALOT
  rationale: התבונן can mean to look attentively or consider. In this lament context,
    the force is that God observes without intervening. 'You only look at' brings
    out the implied contrast with answering, while staying within the semantic range.
- source_word: בִּי
  chosen: at me
  alternatives:
  - on me
  - me
  lexicon: HALOT
  rationale: With התבונן, the preposition is best represented in English as 'at me.'
