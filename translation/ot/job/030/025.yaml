id: JOB.30.25
reference: Job 30:25
source:
  edition: WLC
  text: אִם לֹ֣א בָ֭כִיתִי לִ/קְשֵׁה י֑וֹם עָֽגְמָ֥ה נַ֝פְשִׁ֗/י לָ/אֶבְיֽוֹן־־׃
translation:
  text: Did I not weep for the one whose day was hard? Was not my soul grieved for
    the poor?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for one in a day of hardship' / 'for him who was in trouble.' The Hebrew
      literally speaks of 'the hard/severe of day.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם לֹא
  chosen: Did ... not
  alternatives:
  - Surely
  - Have I not
  lexicon: HALOT
  rationale: In this context אִם לֹא introduces a rhetorical question/assertion rather
    than a simple conditional. English idiom is best captured by 'Did I not ... ?'
    preserving Job's self-defense.
- source_word: בָכִיתִי
  chosen: weep
  alternatives:
  - cry
  - lament
  lexicon: HALOT
  rationale: The verb denotes weeping/crying. 'Weep' preserves the emotional and literary
    weight better than the flatter 'cry'.
- source_word: לִקְשֵׁה יוֹם
  chosen: for the one whose day was hard
  alternatives:
  - for him who was in trouble
  - for the hard of day
  - for one in a day of hardship
  lexicon: HALOT
  rationale: קְשֵׁה ('hard, severe') with יוֹם ('day') is an idiom for a time/day
    of hardship. The prefixed ל marks the person affected. This rendering keeps the
    Hebrew imagery of a 'hard day' while making the sense natural in English.
- source_word: עָגְמָה
  chosen: was grieved
  alternatives:
  - was bitter
  - was sorrowful
  - was troubled
  lexicon: HALOT
  rationale: The verb conveys being pained, grieved, or saddened. 'Was grieved' fits
    the parallel with weeping and avoids overreading into bitterness alone.
- source_word: נַפְשִׁי
  chosen: my soul
  alternatives:
  - I
  - my inner being
  - my life
  lexicon: HALOT
  rationale: נֶפֶשׁ here refers to Job's inner self/person. 'My soul' preserves the
    Hebrew anthropological expression and the poetic register; it should not be narrowed
    to an immaterial component only.
- source_word: לָאֶבְיוֹן
  chosen: for the poor
  alternatives:
  - for the needy
  - for the destitute
  lexicon: HALOT
  rationale: אֶבְיוֹן denotes a poor/needy person. 'The poor' is concise, idiomatic,
    and fits the generic singular used representatively.
