theological_decisions:
- issue: Anthropological sense of נַפְשִׁי
  chosen_reading: Rendered as 'my soul' as a poetic expression for Job's inner self,
    without implying a technical doctrine of the soul.
  alternative_readings:
  - I was grieved
  - my inner being was grieved
  rationale: The verse is poetic and uses standard Hebrew self-reference. Retaining
    'my soul' preserves the source texture while avoiding doctrinal overdefinition.
  doctrine_reference: Translation philosophy §1, §3, §6
