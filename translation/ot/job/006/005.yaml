id: JOB.6.5
reference: Job 6:5
source:
  edition: WLC
  text: הֲ/יִֽנְהַק פֶּ֥רֶא עֲלֵי דֶ֑שֶׁא אִ֥ם יִגְעֶה שּׁ֝֗וֹר עַל בְּלִילֽ/וֹ־־־־׃
translation:
  text: Does a wild donkey bray over grass, or does an ox low over its fodder?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'wild ass.' The Hebrew refers specifically to a wild donkey.
    reason: lexical_alternative
  - marker: b
    text: '''Fodder'' translates a Hebrew term for mixed animal feed or mash.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲ/יִנְהַק
  chosen: Does ... bray
  alternatives:
  - Does ... neigh
  - Does ... cry out
  lexicon: HALOT
  rationale: The verb נהק refers to the vocal sound of a donkey or similar animal.
    'Bray' is the most idiomatic and precise English equivalent for a donkey's cry.
    'Neigh' is more associated with horses and is less accurate here.
- source_word: פֶּרֶא
  chosen: wild donkey
  alternatives:
  - wild ass
  lexicon: HALOT
  rationale: פֶּרֶא denotes the wild donkey/onager. 'Wild donkey' is clear modern
    English; 'wild ass' is traditional but potentially distracting in contemporary
    usage.
- source_word: עֲלֵי דֶשֶׁא
  chosen: over grass
  alternatives:
  - beside grass
  - upon grass
  - while it has grass
  lexicon: HALOT
  rationale: The preposition plus noun literally means 'upon/over grass,' but in this
    rhetorical context it conveys the circumstance of having pasture available. 'Over
    grass' preserves the Hebrew image with natural English.
- source_word: אִם
  chosen: or
  alternatives:
  - if
  lexicon: HALOT
  rationale: In paired rhetorical questions, אִם can introduce the second alternative
    with the sense 'or/whether.' 'Or' is the natural English rendering in this construction.
- source_word: יִגְעֶה
  chosen: does ... low
  alternatives:
  - does ... moo
  - does ... bellow
  lexicon: HALOT
  rationale: The verb געה denotes the lowing sound of cattle. 'Low' is the standard
    literary equivalent and fits the parallelism better than the more colloquial 'moo'
    or the stronger 'bellow.'
- source_word: שׁוֹר
  chosen: ox
  alternatives:
  - bull
  - cattle
  lexicon: HALOT
  rationale: שׁוֹר commonly denotes an ox or bovine animal. 'Ox' fits the singular
    rhetorical parallel and traditional wisdom-style diction better than 'cattle';
    'bull' is too specific.
- source_word: עַל בְּלִילוֹ
  chosen: over its fodder
  alternatives:
  - over its feed
  - over its mixed fodder
  - over its provender
  lexicon: HALOT
  rationale: בְּלִיל refers to mixed fodder or feed for animals. 'Fodder' is clear
    and suitably elevated without being archaic. The suffix is rendered 'its.'
