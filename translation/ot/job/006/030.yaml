id: JOB.6.30
reference: Job 6:30
source:
  edition: WLC
  text: הֲ/יֵשׁ בִּ/לְשׁוֹנִ֥/י עַוְלָ֑ה אִם חִ֝כִּ֗/י לֹא יָבִ֥ין הַוּֽוֹת־־־׃
translation:
  text: Is there injustice on my tongue? Does my palate not discern calamities?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'perverse things' or 'ruinous things' for 'calamities.' The Hebrew term
      can refer either to destructive evils/calamities or to morally twisted things.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲיֵשׁ
  chosen: Is there
  alternatives:
  - Is there any
  - Does there exist
  lexicon: HALOT
  rationale: Introduces a rhetorical yes/no question. 'Is there' is the most natural
    concise English equivalent.
- source_word: בִּלְשׁוֹנִי
  chosen: on my tongue
  alternatives:
  - in my tongue
  - on my lips
  lexicon: HALOT
  rationale: Literal 'in/on my tongue' refers to speech. 'On my tongue' preserves
    the bodily metaphor better than the more interpretive 'on my lips.'
- source_word: עַוְלָה
  chosen: injustice
  alternatives:
  - wrong
  - unrighteousness
  - perversity
  lexicon: HALOT
  rationale: The noun denotes wrongness or injustice. 'Injustice' preserves the moral
    dimension without sounding overly archaic; 'wrong' is possible but less weighty.
- source_word: אִם
  chosen: Does
  alternatives:
  - Or
  - Surely
  lexicon: HALOT
  rationale: Here אִם introduces the second rhetorical question in parallel with the
    first. Rendering it as an English auxiliary beginning the question communicates
    the function better than a wooden 'if.'
- source_word: חִכִּי
  chosen: my palate
  alternatives:
  - my mouth
  - my taste
  lexicon: HALOT
  rationale: חֵךְ literally means 'palate.' In context it is the organ of taste/discernment.
    'My palate' preserves the concrete imagery that underlies the metaphor.
- source_word: לֹא יָבִין
  chosen: not discern
  alternatives:
  - not understand
  - not perceive
  - not test
  lexicon: HALOT
  rationale: בין can mean understand or discern. With 'palate' and the tasting metaphor
    in context, 'discern' best captures evaluative perception.
- source_word: הַוּוֹת
  chosen: calamities
  alternatives:
  - disasters
  - perverse things
  - ruinous things
  lexicon: HALOT
  rationale: 'The plural can denote destructive evils, calamities, or ruinous things.
    In Job''s context of suffering and evaluative speech, ''calamities'' fits the
    semantic field and keeps the line coherent: his palate can discern what is bitter/ruinous.
    Because the term can also be understood morally (''perverse things''), that alternative
    is preserved in a footnote.'
