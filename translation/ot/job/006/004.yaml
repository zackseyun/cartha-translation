theological_decisions:
- issue: Rendering of divine titles שַׁדַּי and אֱלוֹהַּ in parallel clauses
  chosen_reading: Translate שַׁדַּי as 'the Almighty' and אֱלוֹהַּ as 'God'
  alternative_readings:
  - Render שַׁדַּי as 'Shaddai'
  - Render both with the same English title for tighter repetition
  rationale: The verse uses two distinct divine designations. Translating both preserves
    their meaning while allowing the poetic parallelism to stand without flattening
    them into one repeated English term. This follows the project's principle to translate
    titles rather than transliterate them.
  doctrine_reference: Translation philosophy §2
- issue: Interpretation of חֲמָתָם in context
  chosen_reading: Read as the poison/venom of the arrows, not divine wrath abstractly
  alternative_readings:
  - their wrath
  - his wrath
  rationale: The immediate imagery is of arrows whose toxic effect Job's spirit drinks.
    Reading the noun concretely as poison best fits the metaphor and avoids importing
    a more abstract theological statement than the Hebrew requires.
  doctrine_reference: Translation philosophy §1, §3
