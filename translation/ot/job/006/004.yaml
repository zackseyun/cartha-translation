id: JOB.6.4
reference: Job 6:4
source:
  edition: WLC
  text: כִּ֤י חִצֵּ֪י שַׁדַּ֡י עִמָּדִ֗/י אֲשֶׁ֣ר חֲ֭מָתָ/ם שֹׁתָ֣ה רוּחִ֑/י בִּעוּתֵ֖י
    אֱל֣וֹהַּ יַֽעַרְכֽוּ/נִי׃
translation:
  text: For the arrows of the Almighty are in me; my spirit drinks their poison; the
    terrors of God array themselves against me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'are with me.' The Hebrew preposition can be read more literally that
      way, but the context of arrows and poison suggests the sense 'are in me.'
    reason: lexical_alternative
  - marker: b
    text: Or 'their venom'; some take the noun more abstractly as 'their wrath.'
    reason: lexical_alternative
  - marker: c
    text: Literally 'set themselves in order against me,' a military image.
    reason: cultural_note
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Because
  lexicon: HALOT
  rationale: Introduces Job's explanation for the legitimacy of his complaint in the
    preceding context. 'For' preserves the causal/explanatory force without over-specifying
    whether it is strictly causal or asseverative.
- source_word: חִצֵּי
  chosen: the arrows of
  alternatives:
  - arrows
  lexicon: HALOT
  rationale: Construct plural of 'arrows'; rendered literally to preserve the martial
    metaphor.
- source_word: שַׁדַּי
  chosen: the Almighty
  alternatives:
  - Shaddai
  lexicon: HALOT
  rationale: As a divine title, it is translated rather than transliterated, in keeping
    with the project's philosophy. 'The Almighty' is the standard contextual sense
    for שַׁדַּי in Job.
- source_word: עִמָּדִי
  chosen: are in me
  alternatives:
  - are with me
  - are against me
  lexicon: HALOT
  rationale: The preposition with 1cs suffix literally means 'with me/by me,' but
    in this context of arrows and internal suffering, 'in me' best captures the implied
    result that the arrows have struck and remain lodged. This also coheres with the
    following clause about poison being drunk by Job's spirit.
- source_word: אֲשֶׁר
  chosen: ;
  alternatives:
  - which
  - whose
  lexicon: HALOT
  rationale: The relative particle links the arrows to their poison. In idiomatic
    English, the relation is better carried by restructuring the sentence rather than
    a wooden 'which/whose'; the possessive relation is expressed in 'their poison.'
- source_word: חֲמָתָם
  chosen: their poison
  alternatives:
  - their venom
  - their wrath
  lexicon: HALOT
  rationale: In the context of arrows, the noun denotes poison/venom rather than abstract
    wrath. 'Poison' is more broadly accessible modern English than 'venom' while preserving
    the image of toxic arrows.
- source_word: שֹׁתָה
  chosen: drinks
  alternatives:
  - drains
  - imbibes
  lexicon: HALOT
  rationale: Qal participial/verbal sense rendered with a vivid present tense in English
    to match the ongoing experience.
- source_word: רוּחִי
  chosen: my spirit
  alternatives:
  - my breath
  - my wind
  lexicon: HALOT
  rationale: Here רוּחַ refers to Job's inner life rather than literal breath or wind.
    'My spirit' best conveys the personal, inward dimension of the suffering.
- source_word: בִּעוּתֵי
  chosen: the terrors of
  alternatives:
  - the horrors of
  - the sudden terrors of
  lexicon: HALOT
  rationale: Plural noun denoting terrors/panic-inducing assaults. 'Terrors' is natural
    and preserves the intensity.
- source_word: אֱלוֹהַּ
  chosen: God
  alternatives:
  - God Almighty
  - God Most High
  lexicon: HALOT
  rationale: Standard rendering of the singular divine term in Job. Since שַׁדַּי
    has already been rendered 'the Almighty' earlier in the verse, 'God' avoids unnecessary
    repetition while preserving the parallelism.
- source_word: יַעַרְכוּנִי
  chosen: array themselves against me
  alternatives:
  - set themselves in order against me
  - marshal themselves against me
  lexicon: HALOT
  rationale: The verb conveys arranging in battle order. 'Array themselves against
    me' preserves the military metaphor in readable modern English.
