id: JOB.6.10
reference: Job 6:10
source:
  edition: WLC
  text: וּ֥/תְהִי ע֨וֹד נֶ֘חָ֤מָתִ֗/י וַ/אֲסַלְּדָ֣ה בְ֭/חִילָה לֹ֣א יַחְמ֑וֹל כִּי
    לֹ֥א כִ֝חַ֗דְתִּי אִמְרֵ֥י קָדֽוֹשׁ׀־׃
translation:
  text: This would still be my comfort, and I would exult in unrelenting pain, for
    I have not denied the words of the Holy One.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'and I would exult in pain that he does not spare.' The
      Hebrew of this clause is difficult and compressed.
    reason: alternative_reading
lexical_decisions:
- source_word: נֶחָמָתִי
  chosen: my comfort
  alternatives:
  - my consolation
  lexicon: HALOT
  rationale: The noun from נחם denotes comfort or consolation. 'Comfort' is more natural
    modern English while preserving the emotional sense of solace Job says would remain
    to him.
- source_word: וַאֲסַלְּדָה
  chosen: and I would exult
  alternatives:
  - and I would rejoice
  - and I would leap for joy
  lexicon: HALOT
  rationale: The verb סלד is rare and difficult. In context it expresses a strong
    emotional response that Job would still have. 'Exult' captures an intense, almost
    defiant joy better than the flatter 'rejoice,' while avoiding an overly literal
    but uncertain image such as 'leap.'
- source_word: בְחִילָה
  chosen: in unrelenting pain
  alternatives:
  - in anguish
  - in writhing pain
  - in travail
  lexicon: HALOT
  rationale: חִילָה can denote writhing, anguish, or severe pain. Because the following
    clause likely means 'he does not spare,' the sense is pain that continues without
    relief. 'Unrelenting pain' communicates both the intensity and ongoing nature
    in idiomatic English.
- source_word: לֹא יַחְמֹל
  chosen: unrelenting
  alternatives:
  - he does not spare
  - without pity
  - unsparingly
  lexicon: HALOT
  rationale: The verb חמל means to spare or have compassion. The Hebrew clause is
    terse and syntactically difficult after בְחִילָה. In English, folding it into
    'unrelenting pain' yields a clear sentence while preserving the idea of pain not
    being spared or eased. The more formally explicit alternative is preserved in
    a footnote.
- source_word: כִחַדְתִּי
  chosen: I have not denied
  alternatives:
  - I have not concealed
  - I have not hidden
  lexicon: HALOT
  rationale: כחד in the piel can mean deny, conceal, or suppress. With 'the words
    of the Holy One,' 'denied' best fits Job's claim that he has not repudiated God's
    words, whereas 'concealed' is less natural in this context.
- source_word: אִמְרֵי
  chosen: the words of
  alternatives:
  - the sayings of
  lexicon: HALOT
  rationale: אִמְרֵי is the construct plural of אמרה, referring to spoken words or
    sayings. 'Words of' is the broadest and most natural rendering here.
- source_word: קָדוֹשׁ
  chosen: the Holy One
  alternatives:
  - the holy one
  lexicon: HALOT
  rationale: Here the adjective functions substantivally as a divine title. Capitalizing
    'Holy One' reflects that Job is referring to God.
