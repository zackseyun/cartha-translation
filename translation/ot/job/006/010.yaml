theological_decisions:
- issue: Divine title קָדוֹשׁ
  chosen_reading: the Holy One
  alternative_readings:
  - the holy one
  rationale: The context indicates a reference to God rather than a generic holy person.
    Rendering it as a divine title preserves the theological force without importing
    additional doctrinal content.
  doctrine_reference: Affirmations; Translation philosophy §6
- issue: Interpretation of the difficult middle clause בְחִילָה לֹא יַחְמֹל
  chosen_reading: in unrelenting pain
  alternative_readings:
  - in pain that he does not spare
  - while he does not spare
  rationale: The Hebrew is compressed and somewhat ambiguous. The chosen rendering
    preserves the sense of severe pain continuing without relief while producing readable
    English. An explicit alternative is preserved in a footnote to maintain transparency.
  doctrine_reference: Translation philosophy §3
