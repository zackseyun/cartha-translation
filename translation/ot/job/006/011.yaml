id: JOB.6.11
reference: Job 6:11
source:
  edition: WLC
  text: מַה כֹּחִ֥/י כִֽי אֲיַחֵ֑ל וּ/מַה קִּ֝צִּ֗/י כִּֽי אַאֲרִ֥יךְ נַפְשִֽׁ/י־־־־׃
translation:
  text: What strength do I have, that I should keep hoping? And what is my end, that
    I should prolong my life?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'that I should be patient.' The Hebrew literally says, 'that I should
      lengthen my soul,' an idiom that can denote prolonging one's life or continuing
      in endurance.
    reason: lexical_alternative
lexical_decisions:
- source_word: מַה
  chosen: What
  alternatives:
  - How much
  lexicon: HALOT
  rationale: Interrogative introducing a rhetorical question. 'What' is the most natural
    English equivalent here.
- source_word: כֹּחִי
  chosen: strength
  alternatives:
  - power
  - might
  lexicon: HALOT
  rationale: כֹּחַ denotes strength or capacity. 'Strength' fits Job's complaint about
    depleted endurance better than the more abstract 'power'.
- source_word: כִּי אֲיַחֵל
  chosen: that I should keep hoping
  alternatives:
  - that I should hope
  - that I should wait
  lexicon: HALOT
  rationale: יחל in the Piel commonly conveys waiting or hoping. In context Job questions
    why he should continue in expectation, so 'keep hoping' brings out the ongoing
    force implied by the rhetorical complaint without overparaphrasing.
- source_word: וּמַה
  chosen: And what
  alternatives:
  - What then
  lexicon: HALOT
  rationale: The conjunction links the second rhetorical question closely to the first;
    'And what' preserves the parallelism.
- source_word: קִצִּי
  chosen: my end
  alternatives:
  - my limit
  - my outcome
  lexicon: HALOT
  rationale: קֵץ refers to an end or limit. 'My end' best preserves the terseness
    and existential force of Job's question.
- source_word: כִּי אַאֲרִיךְ נַפְשִׁי
  chosen: that I should prolong my life
  alternatives:
  - that I should lengthen my soul
  - that I should be patient
  - that I should prolong myself
  lexicon: HALOT
  rationale: The idiom האריך נפש can be rendered literally as 'lengthen the soul,'
    but in context it refers to continuing on or enduring in life. 'Prolong my life'
    communicates the idiomatic sense in clear modern English. 'Be patient' is a traditional
    interpretive rendering, but the Hebrew imagery is more about extending one's life/endurance
    than naming the virtue directly.
