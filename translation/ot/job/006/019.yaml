id: JOB.6.19
reference: Job 6:19
source:
  edition: WLC
  text: הִ֭בִּיטוּ אָרְח֣וֹת תֵּמָ֑א הֲלִיכֹ֥ת שְׁ֝בָ֗א קִוּוּ לָֽ/מוֹ־׃
translation:
  text: The caravans of Tema looked; the travelers of Sheba hoped for them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'waited for them.' The Hebrew verb can express either hoping or waiting
      in expectation.
    reason: lexical_alternative
  - marker: b
    text: The pronoun 'them' refers to the seasonal streams described in the preceding
      lines.
    reason: cross_reference
  - marker: c
    text: '''Caravans'' renders a Hebrew word that can literally mean ''paths'' or
      ''ways,'' here used for the traveling parties associated with those routes.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הִבִּיטוּ
  chosen: looked
  alternatives:
  - looked intently
  - turned their gaze
  - searched
  lexicon: HALOT
  rationale: The verb from נבט means to look or gaze. In context of travelers seeking
    watercourses, 'looked' is concise and natural, while the object of expectation
    is supplied by the following context. More vivid options like 'looked intently'
    are possible but unnecessarily expansive.
- source_word: אָרְחוֹת
  chosen: caravans
  alternatives:
  - paths
  - companies of travelers
  lexicon: HALOT
  rationale: Though the noun can denote 'paths/ways,' in Job 6:18–19 the context is
    merchant travel and parallelism with 'travelers of Sheba.' Thus 'caravans' best
    captures the metonymic sense of traveling companies rather than literal roads.
- source_word: תֵּמָא
  chosen: Tema
  rationale: Proper place name, transliterated according to the translation philosophy.
- source_word: הֲלִיכֹת
  chosen: travelers
  alternatives:
  - caravans
  - companies
  - processions
  lexicon: HALOT
  rationale: Literally related to 'goings/journeys,' but here it refers to those making
    the journey. 'Travelers' gives clear English and preserves the parallel with the
    first colon without awkward literalism.
- source_word: שְׁבָא
  chosen: Sheba
  rationale: Proper place name, transliterated.
- source_word: קִוּוּ
  chosen: hoped
  alternatives:
  - waited
  - looked with hope
  - expected
  lexicon: HALOT
  rationale: The verb קוה can mean wait for or hope in. In this context of desert
    caravans expecting water, 'hoped' conveys expectation tinged with need and disappointment,
    fitting the poetic context better than the flatter 'waited'.
- source_word: לָמוֹ
  chosen: for them
  alternatives:
  - for those waters
  - for them
  lexicon: HALOT
  rationale: The pronominal suffix likely refers back to the wadis/streams described
    in the preceding verses. English requires an explicit object for smoothness; 'for
    them' preserves the pronoun while allowing the antecedent to be recovered from
    context.
