id: JOB.6.12
reference: Job 6:12
source:
  edition: WLC
  text: אִם כֹּ֣חַ אֲבָנִ֣ים כֹּחִ֑/י אִֽם בְּשָׂרִ֥/י נָחֽוּשׁ־־׃
translation:
  text: Is my strength the strength of stones, or is my flesh bronze?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Is my body bronze?' The Hebrew literally says 'my flesh,' preserving
      the contrast between human frailty and metal-like hardness.
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  chosen: Is
  alternatives:
  - whether
  - if
  lexicon: HALOT
  rationale: Here אִם introduces a rhetorical question rather than a conditional clause.
    Rendering it as 'Is' in English communicates the interrogative force naturally.
- source_word: כֹּחַ
  chosen: strength
  alternatives:
  - power
  - might
  lexicon: HALOT
  rationale: כֹּחַ denotes strength or power. 'Strength' fits the personal, bodily
    context of Job's complaint better than the more abstract 'power.'
- source_word: אֲבָנִים
  chosen: stones
  alternatives:
  - rocks
  lexicon: HALOT
  rationale: The plural noun literally means 'stones.' 'Stones' preserves the concrete
    image and matches the Hebrew closely.
- source_word: כֹּחִי
  chosen: my strength
  alternatives:
  - my power
  - my might
  lexicon: HALOT
  rationale: Repeating 'strength' reflects the Hebrew repetition of כֹּחַ and preserves
    the rhetorical parallelism.
- source_word: בְּשָׂרִי
  chosen: my flesh
  alternatives:
  - my body
  lexicon: HALOT
  rationale: בָּשָׂר literally means 'flesh.' In this poetic context it refers to
    Job's physical frailty. 'My flesh' preserves the vivid bodily contrast with bronze
    better than the smoother 'my body.'
- source_word: נָחוּשׁ
  chosen: bronze
  alternatives:
  - copper
  lexicon: HALOT
  rationale: נָחוּשׁ commonly refers to bronze/copper. 'Bronze' is the standard literary
    and biblical rendering in contexts of hardness and durability, fitting the comparison
    with stones.
