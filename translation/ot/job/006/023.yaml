theological_decisions:
- issue: Rendering פדה in a non-cultic, non-soteriological context
  chosen_reading: Redeem me
  alternative_readings:
  - Ransom me
  - Deliver me
  rationale: Although English 'redeem' can carry theological overtones, the Hebrew
    verb itself regularly includes release from danger or bondage and should not be
    flattened into the same English verb used for מלט. Retaining 'redeem' preserves
    lexical texture without importing doctrinal claims beyond the text.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented
    exception)
