id: JOB.6.23
reference: Job 6:23
source:
  edition: WLC
  text: וּ/מַלְּט֥וּ/נִי מִ/יַּד צָ֑ר וּ/מִ/יַּ֖ד עָרִיצִ֣ים תִּפְדּֽוּ/נִי־׃
translation:
  text: or, ‘Deliver me from the hand of the adversary,’ and ‘Redeem me from the hand
    of the ruthless’?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or: “Rescue me from the hand of the adversary.”'
    reason: lexical_alternative
  - marker: b
    text: 'Or: “Ransom me from the hand of the ruthless.”'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמַלְּטוּנִי
  chosen: Deliver me
  alternatives:
  - Rescue me
  - Save me
  lexicon: HALOT
  rationale: Hiphil imperative 2mp + 1cs suffix from מלט, calling for an act of causing
    escape/deliverance. 'Deliver me' is natural English and fits the parallel with
    the following verb. The prefixed conjunction is absorbed into the quoted sequence
    introduced by the preceding verse's rhetorical setup, hence 'or' in the full line
    rather than a separate 'and' here.
- source_word: מִיַּד
  chosen: from the hand of
  alternatives:
  - from the power of
  lexicon: HALOT
  rationale: The idiom 'from the hand of' is common Hebrew for deliverance from someone's
    power or control. It is preserved here because it remains intelligible in English
    and retains the concrete force of the Hebrew.
- source_word: צָר
  chosen: the adversary
  alternatives:
  - the enemy
  - the oppressor
  - the foe
  lexicon: HALOT
  rationale: צָר denotes one who is hostile, an adversary or enemy. 'Adversary' preserves
    the singular and the broad hostility sense without over-specifying military conflict.
- source_word: עָרִיצִים
  chosen: the ruthless
  alternatives:
  - the violent
  - the tyrants
  lexicon: HALOT
  rationale: Plural noun for ruthless, violent, or oppressive people. 'The ruthless'
    is concise, idiomatic, and preserves the moral force of the term better than the
    more politically specific 'tyrants'.
- source_word: תִּפְדּוּנִי
  chosen: Redeem me
  alternatives:
  - Ransom me
  - Deliver me
  lexicon: HALOT
  rationale: Qal imperfect 2mp + 1cs suffix from פדה, often meaning redeem/ransom
    by paying a price or effecting release. 'Redeem me' preserves the lexical distinction
    from מלט in the first colon and keeps the stronger release language. In this context
    it is not necessarily theological redemption, but concrete rescue.
