id: JOB.6.16
reference: Job 6:16
source:
  edition: WLC
  text: הַ/קֹּדְרִ֥ים מִנִּי קָ֑רַח עָ֝לֵ֗י/מוֹ יִתְעַלֶּם שָֽׁלֶג־־׃
translation:
  text: which are dark from ice, and on them the snow hides itself.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'which are turbid because of ice'; the Hebrew participle primarily means
      'dark' or 'darkened,' but in context may suggest water made murky by winter
      conditions.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַקֹּדְרִים
  chosen: which are dark
  alternatives:
  - which are turbid
  - which are blackened
  - which grow dark
  lexicon: HALOT
  rationale: The participle from קדר describes becoming dark or gloomy. In context
    of wadis/clouded waters, 'dark' captures the visual sense naturally in English.
    'Turbid' is possible contextually but is more interpretive than the base lexical
    sense.
- source_word: מִנִּי
  chosen: from
  alternatives:
  - because of
  - by reason of
  lexicon: HALOT
  rationale: 'The preposition marks source or cause. Here it most naturally indicates
    the cause of the darkening: the streams are dark from ice.'
- source_word: קָרַח
  chosen: ice
  alternatives:
  - frost
  lexicon: HALOT
  rationale: קָרַח denotes ice/frost. In this poetic description of winter-fed wadis,
    'ice' fits the imagery best and pairs well with the following mention of snow.
- source_word: עָלֵימוֹ
  chosen: on them
  alternatives:
  - upon them
  - over them
  lexicon: HALOT
  rationale: The preposition with 3mp suffix is spatial. 'On them' is the most straightforward
    English rendering, referring to the streams/wadis just described.
- source_word: יִתְעַלֶּם
  chosen: hides itself
  alternatives:
  - conceals itself
  - is hidden
  lexicon: HALOT
  rationale: From עלם in the hitpael, the verb conveys hiding or concealing oneself.
    'Hides itself' preserves the reflexive nuance better than a passive rendering.
- source_word: שָׁלֶג
  chosen: the snow
  alternatives:
  - snow
  lexicon: HALOT
  rationale: Although anarthrous in Hebrew, English idiom naturally uses 'the snow'
    in this poetic line. It refers generically to snow covering the streams.
