theological_decisions:
- issue: Syntactical relation of the final clause
  chosen_reading: The verse states that a despairing person is owed kindness from
    his friend, even if he forsakes the fear of the Almighty.
  alternative_readings:
  - A friend who withholds kindness forsakes the fear of the Almighty.
  - Kindness belongs to the despairing from his friend, and the fear of the Almighty
    he abandons.
  rationale: The Hebrew is notably compressed and has been understood in more than
    one way. The chosen reading best fits the immediate context of Job rebuking his
    friends for failing in loyal support to a suffering man. It also explains the
    fronted לַמָּס and the nominal חָסֶד as expressing what is due to the sufferer.
    Because the alternative reading is substantial and longstanding, it is preserved
    in a footnote rather than silently excluded.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it'
