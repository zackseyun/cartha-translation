id: JOB.6.14
reference: Job 6:14
source:
  edition: WLC
  text: לַ/מָּ֣ס מֵרֵעֵ֣/הוּ חָ֑סֶד וְ/יִרְאַ֖ת שַׁדַּ֣י יַעֲזֽוֹב׃
translation:
  text: Kindness from his friend is due to the one who is despairing, even if he forsakes
    the fear of the Almighty.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'A friend who withholds kindness from one who is despairing forsakes
      the fear of the Almighty.' The Hebrew syntax is compressed and may be understood
      this way.
    reason: alternative_reading
  - marker: b
    text: '''Kindness'' translates חֶסֶד, which can also carry the sense of loyal
      love, mercy, or covenantal faithfulness.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לַמָּס
  chosen: to the one who is despairing
  alternatives:
  - to the one who melts
  - to the fainting one
  - to the despairing one
  lexicon: HALOT
  rationale: The noun מָס derives from a root meaning 'melt/dissolve' and in context
    refers metaphorically to one collapsing inwardly in suffering. 'The one who is
    despairing' communicates the idiom naturally in English while preserving the image
    of emotional collapse better than a wooden 'melting one.'
- source_word: מֵרֵעֵהוּ
  chosen: from his friend
  alternatives:
  - by his friend
  - from a friend
  lexicon: HALOT
  rationale: 'The preposition מִן with רֵעַ marks source: kindness is expected from
    the sufferer''s companion. ''From his friend'' preserves the relational force
    and the 3ms suffix.'
- source_word: חָסֶד
  chosen: kindness
  alternatives:
  - steadfast love
  - loyalty
  - mercy
  lexicon: HALOT
  rationale: In this human-to-human context, חֶסֶד denotes loyal kindness or covenant-like
    fidelity expressed in compassion. 'Kindness' is the clearest main-text rendering
    in modern English; the fuller nuance of loyal love is preserved in alternatives.
- source_word: וְיִרְאַת שַׁדַּי
  chosen: the fear of the Almighty
  alternatives:
  - reverence for the Almighty
  lexicon: HALOT
  rationale: יִרְאָה here is the standard term for fear/reverence toward God. 'The
    fear of the Almighty' preserves the biblical idiom and theological weight better
    than reducing it to mere respect.
- source_word: יַעֲזֹב
  chosen: he forsakes
  alternatives:
  - he abandons
  - he lets go of
  lexicon: HALOT
  rationale: 'The verb עזב means ''leave, forsake, abandon.'' The clause is best taken
    concessively in context: kindness is due even if the sufferer has forsaken the
    fear of God, or appears to have done so. ''Forsakes'' is concise and preserves
    the moral-religious force.'
- source_word: שַׁדַּי
  chosen: the Almighty
  alternatives: []
  lexicon: HALOT
  rationale: Standard rendering of the divine title שַׁדַּי in Job. It is a title,
    so it is translated rather than transliterated, in keeping with project philosophy.
