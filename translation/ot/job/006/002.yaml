id: JOB.6.2
reference: Job 6:2
source:
  edition: WLC
  text: ל֗וּ שָׁק֣וֹל יִשָּׁקֵ֣ל כַּעְשִׂ֑/י ו/הית/י בְּֽ/מֹאזְנַ֥יִם יִשְׂאוּ יָֽחַד־׃
translation:
  text: Oh, that my vexation were fully weighed, and my calamity lifted together in
    the balances.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my grief' for 'my vexation.' The Hebrew term can denote inner anguish,
      vexation, or provocation/anger.
    reason: lexical_alternative
  - marker: b
    text: Or 'on the scales' instead of 'in the balances.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לוּ
  chosen: Oh, that
  alternatives:
  - If only
  - Would that
  lexicon: HALOT
  rationale: Introduces a wish or lamentative optative. 'Oh, that' preserves the emotional
    force of Job's longing in natural English.
- source_word: שָׁקוֹל יִשָּׁקֵל
  chosen: were fully weighed
  alternatives:
  - might surely be weighed
  - were carefully weighed
  lexicon: HALOT
  rationale: The infinitive absolute plus finite verb intensifies the verbal idea.
    'Were fully weighed' captures both the passive sense and the emphatic force without
    awkward literalism.
- source_word: כַּעְשִׂי
  chosen: my vexation
  alternatives:
  - my grief
  - my provocation
  - my anger
  lexicon: HALOT
  rationale: The noun can denote vexation, grief, or provocation/anger. In Job's lament
    context, 'vexation' best covers his inner anguish without narrowing it merely
    to sorrow or portraying it simply as sinful anger.
- source_word: וְהַוָּתִי
  chosen: my calamity
  alternatives:
  - my ruin
  - my disaster
  - my misery
  lexicon: HALOT
  rationale: The term denotes disaster or ruin. 'Calamity' fits the context of suffering
    and pairs well with 'vexation,' preserving the objective dimension of Job's affliction.
- source_word: בְּמֹאזְנַיִם
  chosen: in the balances
  alternatives:
  - on the scales
  - in a balance
  lexicon: HALOT
  rationale: A dual form referring to weighing instruments. 'In the balances' is idiomatic
    and slightly more literary, fitting the poetic register; 'on the scales' is a
    viable alternative.
- source_word: יִשְׂאוּ
  chosen: lifted
  alternatives:
  - borne
  - raised
  - placed
  lexicon: HALOT
  rationale: Literally 'they lift/carry.' With an indefinite plural and the context
    of weighing, English naturally renders the sense as 'lifted' into or onto the
    balances rather than preserving the unspecified subject.
- source_word: יָחַד
  chosen: together
  alternatives:
  - at once
  - altogether
  lexicon: HALOT
  rationale: Marks the joint weighing of both Job's vexation and calamity. 'Together'
    is the clearest and most natural adverb here.
