theological_decisions:
- issue: Meaning of Job's claim about צדק
  chosen_reading: Job asserts his continuing righteousness/integrity in the matter
    under dispute, not sinless perfection.
  alternative_readings:
  - Job claims his just cause remains in the case
  - Job says righteousness is still at stake here
  rationale: The verse concerns Job's friends' evaluation of him. Rendering צדק as
    'righteousness' preserves the lexical link while the context indicates forensic/moral
    integrity in this controversy rather than an absolute claim of perfection.
  doctrine_reference: Translation philosophy §3, §5
