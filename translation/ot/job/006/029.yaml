id: JOB.6.29
reference: Job 6:29
source:
  edition: WLC
  text: שֻֽׁבוּ נָ֭א אַל תְּהִ֣י עַוְלָ֑ה ו/שבי ע֝וֹד צִדְקִ/י בָֽ/הּ־־־׃
translation:
  text: Turn back, please; let there be no injustice. Turn back again; my righteousness
    is still in it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Return once more; my right is still in the matter.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שֻֽׁבוּ
  chosen: Turn back
  alternatives:
  - Return
  - Relent
  lexicon: HALOT
  rationale: Imperative plural of שוב. In context Job is urging his friends to reconsider/reverse
    their judgment. 'Turn back' preserves the metaphor of reversal better than the
    more abstract 'reconsider,' while remaining natural English.
- source_word: נָא
  chosen: please
  alternatives:
  - now
  - I pray
  lexicon: HALOT
  rationale: Polite particle softening the imperative. 'Please' is the most natural
    modern English equivalent; 'now' would mislead temporally, and 'I pray' is archaic.
- source_word: אַל תְּהִי עַוְלָה
  chosen: let there be no injustice
  alternatives:
  - do not be unjust
  - let there be no wrong
  lexicon: HALOT
  rationale: The Hebrew is literally 'let not injustice be.' Rendering it as an impersonal
    clause preserves the abstract noun עַוְלָה and avoids over-specifying the subject.
    It can imply 'do not judge unjustly,' but the text itself states the matter more
    generally.
- source_word: עַוְלָה
  chosen: injustice
  alternatives:
  - wrong
  - unrighteousness
  - iniquity
  lexicon: HALOT
  rationale: In this dispute context, 'injustice' best conveys wrongful judgment or
    unfairness. 'Iniquity' sounds overly moralized in English here, and 'wrong' is
    too broad.
- source_word: וְשֻׁבוּ
  chosen: Turn back again
  alternatives:
  - Yes, turn back
  - Return once more
  lexicon: HALOT
  rationale: The conjunction plus repeated imperative intensifies the appeal. 'Turn
    back again' captures both repetition and urgency in idiomatic English.
- source_word: עוֹד
  chosen: still
  alternatives:
  - again
  - yet
  lexicon: HALOT
  rationale: With the following clause, עוד most naturally means 'still/yet,' indicating
    that Job's righteousness remains intact. Since 'again' is already conveyed by
    the repeated imperative, 'still' avoids confusion.
- source_word: צִדְקִי
  chosen: my righteousness
  alternatives:
  - my right
  - my justice
  - my vindication
  lexicon: HALOT
  rationale: From צדק, referring here to Job's integrity/right standing in the matter.
    'My righteousness' is the most direct rendering and preserves the moral-judicial
    nuance. 'My vindication' is interpretive, focusing on outcome rather than quality.
- source_word: בָהּ
  chosen: in it
  alternatives:
  - in this
  - in the matter
  lexicon: HALOT
  rationale: The feminine pronominal suffix has an implicit antecedent, likely the
    case/matter under discussion. 'In it' is formally closest; because English readers
    may find the antecedent opaque, an alternative explanatory gloss is preserved
    in a footnote.
