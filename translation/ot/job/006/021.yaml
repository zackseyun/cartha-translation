id: JOB.6.21
reference: Job 6:21
source:
  edition: WLC
  text: כִּֽי עַ֭תָּה הֱיִ֣יתֶם לא תִּֽרְא֥וּ חֲ֝תַ֗ת וַ/תִּירָֽאוּ־׃
translation:
  text: For now you have become nothing; you see terror, and you are afraid.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally reads something like 'you have become not.' Many understand
      the sense as 'you have become nothing' or 'you have become like it,' that is,
      like the unreliable streams in the preceding verses.
    reason: textual_variant
  - marker: b
    text: Or 'you see calamity and are afraid.' The noun can denote terror, dismay,
      or a shattering disaster.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Surely
  - Because
  lexicon: HALOT
  rationale: Introduces Job's explanation/conclusion from the prior comparison with
    seasonal wadis. 'For' fits the discourse connection in English without overstating
    causation.
- source_word: עַתָּה
  chosen: now
  alternatives:
  - as it is now
  - at this time
  lexicon: HALOT
  rationale: Temporal adverb marking the present situation in contrast with prior
    expectation.
- source_word: הֱיִיתֶם
  chosen: you have become
  alternatives:
  - you are
  - you have been
  lexicon: HALOT
  rationale: From היה, here best taken as a change-of-state verb rather than a simple
    copula. Job says his friends have become like the unreliable streams just described.
- source_word: לא
  chosen: nothing
  alternatives:
  - not
  - no help
  - to him
  lexicon: HALOT
  rationale: The ketiv has לא ('not'), but the sense in context strongly supports
    the common understanding 'to him/nothing' reflected by the qere-like interpretive
    tradition. In English, 'have become nothing' conveys that they have proved useless.
    This avoids an unidiomatic literal 'you have become not.'
- source_word: תִּרְאוּ
  chosen: you see
  alternatives:
  - you look at
  - you perceive
  lexicon: HALOT
  rationale: Basic sense of ראה. In context it refers to seeing Job's calamity/terror
    and reacting to it.
- source_word: חֲתַת
  chosen: terror
  alternatives:
  - dismay
  - ruin
  - calamity
  lexicon: HALOT
  rationale: The noun denotes terror, dread, or a shattering calamity. 'Terror' works
    well with the following 'you are afraid,' preserving the emotional force while
    allowing the object seen to be Job's shattered condition.
- source_word: וַתִּירָאוּ
  chosen: and you are afraid
  alternatives:
  - and you fear
  - and you became afraid
  lexicon: HALOT
  rationale: From ירא, expressing the friends' fearful reaction. Rendered as present
    in English for naturalness in the immediate description of their response.
