id: JOB.6.17
reference: Job 6:17
source:
  edition: WLC
  text: בְּ֭/עֵת יְזֹרְב֣וּ נִצְמָ֑תוּ בְּ֝/חֻמּ֗/וֹ נִדְעֲכ֥וּ מִ/מְּקוֹמָֽ/ם׃
translation:
  text: When they are warmed, they vanish; when it is hot, they dry up from their
    place.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they are extinguished' for both verbs of disappearance/drying; the Hebrew
      imagery blends vanishing and being quenched.
    reason: lexical_alternative
  - marker: b
    text: Literally 'in its heat'; this may also be rendered 'in the heat.'
    reason: lexical_alternative
  - marker: c
    text: '''From their place'' may refer more specifically to a streambed or channel
      in context.'
    reason: cultural_note
lexical_decisions:
- source_word: בְּעֵת
  chosen: When
  alternatives:
  - At the time when
  - In the season when
  lexicon: HALOT
  rationale: Temporal preposition plus noun introduces a time clause. 'When' is the
    most natural modern English equivalent and preserves the clause relationship without
    unnecessary stiffness.
- source_word: יְזֹרְבוּ
  chosen: they are warmed
  alternatives:
  - they become warm
  - they are heated
  lexicon: HALOT
  rationale: The rare verb denotes becoming warm or heated. Because the subject is
    the wadis/streams of the surrounding context, 'they are warmed' captures the passive-like
    sense in idiomatic English without overinterpreting the mechanism.
- source_word: נִצְמָתוּ
  chosen: they vanish
  alternatives:
  - they are extinguished
  - they disappear
  - they come to an end
  lexicon: HALOT
  rationale: The Niphal form conveys being ended, destroyed, or disappearing. In the
    imagery of seasonal streams, 'they vanish' best fits the context of waters drying
    away while remaining vivid and readable.
- source_word: בְּחֻמּוֹ
  chosen: when it is hot
  alternatives:
  - in its heat
  - by his heat
  - in the heat
  lexicon: HALOT
  rationale: The phrase literally means 'in its/his heat.' Given the environmental
    imagery, the suffix is best taken impersonally or as referring to the heat-condition
    rather than a personal antecedent. 'When it is hot' conveys the sense naturally
    in English and matches the parallel temporal clause.
- source_word: נִדְעֲכוּ
  chosen: they dry up
  alternatives:
  - they are quenched
  - they are extinguished
  - they are dried out
  lexicon: HALOT
  rationale: The verb can mean be extinguished or quenched, but in context of watercourses
    under heat, 'they dry up' brings out the concrete force of the metaphor more clearly
    than the more fire-oriented 'are extinguished.'
- source_word: מִמְּקוֹמָם
  chosen: from their place
  alternatives:
  - from their channel
  - from where they are
  - out of their place
  lexicon: HALOT
  rationale: The noun means place/location. 'From their place' is formally close and
    understandable. 'Channel' would interpret the image more specifically than the
    Hebrew states, so it is better preserved as a footnotable alternative rather than
    placed in the main text.
