id: JOB.6.28
reference: Job 6:28
source:
  edition: WLC
  text: וְ֭/עַתָּה הוֹאִ֣ילוּ פְנוּ בִ֑/י וְ/עַל פְּ֝נֵי/כֶ֗ם אִם אֲכַזֵּֽב־־־׃
translation:
  text: But now, please turn to me, and before your faces, would I lie?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'look at me' for 'turn to me.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'before your faces'; that is, 'in your presence' or 'to your face.'
    reason: lexical_alternative
  - marker: c
    text: Or 'would I deceive?' The Hebrew verb can mean 'to lie' or 'to speak falsely.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  chosen: But now
  alternatives:
  - And now
  - Now then
  lexicon: HALOT
  rationale: Introduces an immediate appeal in contrast with the preceding argument.
    'But now' captures the adversative force of waw in context and the temporal sense
    of עַתָּה.
- source_word: הוֹאִילוּ
  chosen: please
  alternatives:
  - be willing
  - be pleased
  lexicon: HALOT
  rationale: Imperative of willingness/persuasion used idiomatically as a polite entreaty.
    Rendering it as 'please' in English best reflects natural force when followed
    by another imperative.
- source_word: פְנוּ בִי
  chosen: turn to me
  alternatives:
  - look at me
  - face me
  lexicon: HALOT
  rationale: פנה with ב can mean turn toward or direct attention to someone. 'Turn
    to me' preserves the verbal image while remaining idiomatic. 'Look at me' is possible
    but slightly more interpretive.
- source_word: וְעַל פְּנֵיכֶם
  chosen: before your faces
  alternatives:
  - to your face
  - in your presence
  lexicon: HALOT
  rationale: Literally 'upon/before your faces.' The phrase emphasizes directness
    and openness. 'Before your faces' keeps the concrete Hebrew imagery, though 'in
    your presence' is a smoother idiomatic alternative.
- source_word: אִם אֲכַזֵּב
  chosen: would I lie?
  alternatives:
  - if I lie
  - would I deceive?
  - am I lying?
  lexicon: HALOT
  rationale: In this context אִם introduces a rhetorical question/challenge rather
    than a simple conditional. כזב in the Piel can denote lying or speaking falsely/deceitfully.
    'Would I lie?' fits Job's appeal to inspect him directly and judge whether he
    is speaking falsely.
