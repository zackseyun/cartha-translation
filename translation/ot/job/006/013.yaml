id: JOB.6.13
reference: Job 6:13
source:
  edition: WLC
  text: הַ/אִ֬ם אֵ֣ין עֶזְרָתִ֣/י בִ֑/י וְ֝/תֻשִׁיָּ֗ה נִדְּחָ֥ה מִמֶּֽ/נִּי׃
translation:
  text: Is my help not within me, and has sound wisdom been driven from me?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'resourcefulness' for 'sound wisdom'; the Hebrew תושיה can denote practical
      wisdom, competence, or effective counsel.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַאִם
  chosen: Is ... ?
  alternatives:
  - Surely ... not?
  - Is it not ... ?
  lexicon: HALOT
  rationale: Introduces a rhetorical question. Rendering with English interrogative
    word order preserves the force without adding emphasis beyond the Hebrew.
- source_word: אֵין
  chosen: not
  alternatives:
  - there is no
  - is there no
  lexicon: HALOT
  rationale: 'With the interrogative particle and following nominal clause, the sense
    is rhetorical negation: ''Is ... not ... ?'' English ''not'' fits the clause naturally.'
- source_word: עֶזְרָתִי
  chosen: my help
  alternatives:
  - my strength
  - my assistance
  lexicon: HALOT
  rationale: From עזרה, denoting help/assistance. 'My help' is the most direct rendering
    and fits Job's complaint about lacking inner resources.
- source_word: בִי
  chosen: within me
  alternatives:
  - in me
  - with me
  lexicon: HALOT
  rationale: The preposition ב with first person suffix can mean 'in me' or 'within
    me.' 'Within me' communicates the likely sense of internal resource more idiomatically
    in English.
- source_word: וְתֻשִׁיָּה
  chosen: sound wisdom
  alternatives:
  - resourcefulness
  - success
  - effective wisdom
  lexicon: HALOT
  rationale: תושיה in wisdom literature often denotes sound wisdom, practical insight,
    or resourcefulness. 'Sound wisdom' preserves the wisdom-context resonance better
    than the more abstract 'resourcefulness,' while still fitting Job's lament about
    the loss of inner capacity.
- source_word: נִדָּחָה
  chosen: has been driven
  alternatives:
  - has been banished
  - has been thrust away
  - has been removed
  lexicon: HALOT
  rationale: The Niphal of נדח conveys being driven away or banished. 'Has been driven'
    is vivid and natural, preserving the passive sense.
- source_word: מִמֶּנִּי
  chosen: from me
  alternatives:
  - away from me
  lexicon: HALOT
  rationale: Standard rendering of מן with first person suffix. 'From me' is sufficient
    in English since the verb already carries the motion-away sense.
