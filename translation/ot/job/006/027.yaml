id: JOB.6.27
reference: Job 6:27
source:
  edition: WLC
  text: אַף עַל יָת֥וֹם תַּפִּ֑ילוּ וְ֝/תִכְר֗וּ עַל רֵֽיעֲ/כֶֽם־־־׃
translation:
  text: You would even cast lots over the fatherless, and bargain over your friend.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'You would even cast the lot for the fatherless.' The Hebrew idiom literally
      says 'make fall upon the fatherless.'
    reason: lexical_alternative
  - marker: b
    text: Or 'and dig a pit for your friend.' The Hebrew verb is difficult here; many
      understand it instead as bargaining over or exploiting a friend.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַף
  chosen: even
  alternatives:
  - indeed
  - surely
  - also
  lexicon: HALOT
  rationale: Here אַף intensifies the accusation rather than simply adding another
    item. 'Even' captures the sense of shocking escalation in Job's charge against
    his friends.
- source_word: יָתוֹם
  chosen: the fatherless
  alternatives:
  - the orphan
  lexicon: HALOT
  rationale: יָתוֹם denotes an orphaned or fatherless person. 'The fatherless' preserves
    the Hebrew social category and its vulnerability, while remaining natural English.
- source_word: תַּפִּילוּ
  chosen: cast lots over
  alternatives:
  - throw down upon
  - make fall upon
  - bring down upon
  lexicon: HALOT
  rationale: The Hiphil of נפל with עַל in this idiom is commonly understood as causing
    a lot to fall upon someone, hence 'cast lots over.' This best fits the context
    of ruthless exploitation of the vulnerable.
- source_word: תִכְרוּ
  chosen: bargain over
  alternatives:
  - dig a pit for
  - trade over
  - ensnare
  lexicon: HALOT
  rationale: כרה in this context is difficult. In parallel with exploiting the fatherless,
    it likely carries the sense of bargaining or haggling over a person, treating
    a friend as an object of gain. This yields coherent parallelism and matches many
    contextual readings. The alternative 'dig a pit for' is possible elsewhere for
    the root, but fits this line less well with עַל plus 'your friend'.
- source_word: רֵיעֲכֶם
  chosen: your friend
  alternatives:
  - your companion
  - your neighbor
  lexicon: HALOT
  rationale: רֵעַ can mean friend, companion, or neighbor. 'Your friend' fits Job's
    direct rebuke of his companions and sharpens the betrayal implied in the verse.
- source_word: עַל ... עַל
  chosen: over ... over
  alternatives:
  - against ... against
  - for ... for
  lexicon: HALOT
  rationale: Using 'over' in both cola preserves the repeated preposition and supports
    the imagery of treating vulnerable persons and even a friend as objects to be
    disposed of or negotiated over.
