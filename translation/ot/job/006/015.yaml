id: JOB.6.15
reference: Job 6:15
source:
  edition: WLC
  text: אַ֭חַ/י בָּגְד֣וּ כְמוֹ נָ֑חַל כַּ/אֲפִ֖יק נְחָלִ֣ים יַעֲבֹֽרוּ־׃
translation:
  text: My brothers have dealt treacherously like a wadi, like the channels of wadis
    that pass away,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'like a brook ... like the channels of streams.' The Hebrew נחל can denote
      a stream, torrent valley, or seasonal watercourse; 'wadi' is used here to preserve
      the arid-land imagery of the passage.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַחַי
  chosen: my brothers
  alternatives:
  - my kin
  - my friends
  lexicon: HALOT
  rationale: The noun literally means 'my brothers.' In Job's lament it may extend
    beyond biological siblings to close companions, but the Hebrew term itself is
    familial. Per gender-accurate policy, 'brothers' is retained rather than neutralizing
    to 'siblings' or interpreting as 'friends' in the main text.
- source_word: בָּגְדוּ
  chosen: have dealt treacherously
  alternatives:
  - have acted deceitfully
  - have been faithless
  - have betrayed
  lexicon: HALOT
  rationale: The verb בגד commonly conveys acting treacherously or faithlessly, often
    in covenantal or relational contexts. 'Have dealt treacherously' preserves the
    moral force without over-specifying a single act of betrayal.
- source_word: כְמוֹ
  chosen: like
  alternatives:
  - as
  lexicon: HALOT
  rationale: Standard comparative particle; 'like' is natural modern English.
- source_word: נָחַל
  chosen: a wadi
  alternatives:
  - a brook
  - a streambed
  - a torrent
  lexicon: HALOT
  rationale: In this context the image is of an intermittent watercourse in arid land,
    not a perennial stream. 'Wadi' best captures the Near Eastern setting and prepares
    for the seasonal imagery developed in the following verses. A more traditional
    'brook' is less precise.
- source_word: כַאֲפִיק
  chosen: like the channels of
  alternatives:
  - like the beds of
  - like the ravines of
  lexicon: HALOT
  rationale: אפיק refers to a channel, bed, or course through which water runs. 'Channels
    of' fits the hydrological metaphor and reads smoothly with the following plural
    noun.
- source_word: נְחָלִים
  chosen: wadis
  alternatives:
  - streams
  - brooks
  - torrents
  lexicon: HALOT
  rationale: Plural of נחל. For consistency within the verse and to preserve the desert-watercourse
    imagery, the same semantic field is maintained with 'wadis.'
- source_word: יַעֲבֹרוּ
  chosen: pass away
  alternatives:
  - overflow
  - pass on
  - vanish
  lexicon: HALOT
  rationale: 'The basic sense is ''pass over/by.'' In context of seasonal streams,
    the point is their transience: they run on and disappear. ''Pass away'' captures
    that ephemeral force in idiomatic English, while the following verses further
    explain the drying up.'
