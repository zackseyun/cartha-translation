theological_decisions:
- issue: Anthropomorphic language for God's action
  chosen_reading: Retain the concrete expression 'his hand' rather than abstracting
    it to 'his power' or 'his judgment.'
  alternative_readings:
  - his power
  - his judgment
  rationale: The Hebrew uses embodied imagery to express divine agency. Preserving
    the anthropomorphism maintains the emotional force of Job's plea and does not
    imply a crude corporeality; it reflects standard biblical idiom.
  doctrine_reference: Translation philosophy §1, §3
