id: JOB.6.7
reference: Job 6:7
source:
  edition: WLC
  text: מֵאֲנָ֣ה לִ/נְגּ֣וֹעַ נַפְשִׁ֑/י הֵ֝֗מָּה כִּ/דְוֵ֥י לַחְמִֽ/י׃
translation:
  text: My soul refuses to touch them; they are like the sickness of my food.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'My appetite refuses to touch them.' Hebrew nephesh can mean 'soul,'
      'self,' or, in some contexts, 'appetite.'
    reason: lexical_alternative
  - marker: b
    text: Or, 'they are like loathsome food to me,' or 'they are like the sickness
      of my bread/food.' The Hebrew expression is compressed and difficult.
    reason: alternative_reading
lexical_decisions:
- source_word: מֵאֲנָה
  chosen: refuses
  alternatives:
  - has refused
  - is unwilling
  lexicon: HALOT
  rationale: From מאן, 'to refuse/be unwilling.' English present 'refuses' fits the
    poetic, gnomic complaint in context better than a simple past, while preserving
    the volitional sense.
- source_word: לִנְגּוֹעַ
  chosen: to touch
  alternatives:
  - to lay hold of
  - to come into contact with
  lexicon: HALOT
  rationale: נגע commonly means 'touch.' Here it expresses aversion to contact with
    what has just been described, so 'to touch' is the most direct and natural rendering.
- source_word: נַפְשִׁי
  chosen: my soul
  alternatives:
  - I
  - my appetite
  - my throat
  lexicon: HALOT
  rationale: נפש can denote the self, life, throat, or appetite. In Job's poetic speech
    it is best preserved as 'my soul' to retain the anthropological depth of the Hebrew,
    while still allowing the sense of personal revulsion. The more interpretive 'my
    appetite' is possible but too narrowing for the main text.
- source_word: הֵמָּה
  chosen: they
  alternatives:
  - these things
  lexicon: HALOT
  rationale: The pronoun refers back to the repulsive things in the previous verse.
    'They' is the natural English equivalent and preserves the anaphoric reference.
- source_word: כִּדְוֵי
  chosen: like the sickness of
  alternatives:
  - like sickness
  - like a diseased thing
  - like loathsome disease
  lexicon: HALOT
  rationale: From דוה, denoting sickness/illness. The construct relationship with
    'my food' is difficult and metaphorical. 'Like the sickness of' preserves the
    Hebrew image without over-resolving whether the sense is 'sickening food,' 'diseased
    food,' or 'the sickness caused by food.'
- source_word: לַחְמִי
  chosen: my food
  alternatives:
  - my bread
  lexicon: HALOT
  rationale: לחם literally means 'bread,' but often broadly 'food.' In English, 'my
    food' better conveys the general sense in this metaphorical context and avoids
    an overly narrow literalism.
