id: JOB.6.20
reference: Job 6:20
source:
  edition: WLC
  text: בֹּ֥שׁוּ כִּֽי בָטָ֑ח בָּ֥אוּ עָ֝דֶ֗י/הָ וַ/יֶּחְפָּֽרוּ־׃
translation:
  text: They are ashamed because they trusted; they came there and were disappointed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'were put to shame ... and were confounded.' The Hebrew uses two related
      shame/disgrace verbs, and the second may also be rendered 'were humiliated'
      or 'blushed with shame.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'they came to it,' referring back to the seasonal stream or wadi
      in the preceding context.
    reason: cross_reference
lexical_decisions:
- source_word: בֹּשׁוּ
  chosen: are ashamed
  alternatives:
  - were put to shame
  - are disappointed
  lexicon: HALOT
  rationale: Qal perfect 3cp of בוש commonly denotes shame or being put to shame.
    'Are ashamed' preserves the emotional/resultative sense without overinterpreting.
    'Disappointed' is possible in context, but the following ויחפרו better carries
    the disappointment/disgrace nuance, so keeping 'ashamed' here preserves the lexical
    distinction.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  - indeed
  lexicon: HALOT
  rationale: 'Here כִּי most naturally introduces the reason for their shame: they
    are ashamed because they had trusted. ''Because'' gives the clearest causal sense
    in English.'
- source_word: בָטָח
  chosen: they trusted
  alternatives:
  - he trusted
  - they were confident
  lexicon: HALOT
  rationale: Although the form is morphologically 3ms, the sense in context is effectively
    collective/generic with the plural verbs before and after, referring to the caravan
    travelers/companies of the previous verse. English smooths this as 'they trusted'
    to match the plural subject carried through the line. 'Were confident' is possible,
    but 'trusted' better reflects בטח.
- source_word: בָּאוּ
  chosen: they came
  alternatives:
  - they arrived
  lexicon: HALOT
  rationale: Simple rendering of בוא in the Qal perfect 3cp. 'They came' is the most
    direct English equivalent.
- source_word: עָדֶיהָ
  chosen: there
  alternatives:
  - to it
  - to her
  lexicon: HALOT
  rationale: The preposition עד with 3fs suffix refers back to the wadi/brook imagery
    in the preceding context, a feminine antecedent in Hebrew. English idiom prefers
    'there' or 'to it' rather than the overly literal 'to her.' 'There' reads naturally
    while preserving the destination sense.
- source_word: וַיֶּחְפָּרוּ
  chosen: were disappointed
  alternatives:
  - were confounded
  - were humiliated
  - blushed with shame
  lexicon: HALOT
  rationale: From חפר in this stem/context, the sense is being abashed, confounded,
    or disappointed. Given the imagery of travelers arriving at expected water and
    finding none, 'were disappointed' communicates the experiential force clearly
    in modern English, while still overlapping with shame/disgrace.
