id: JOB.6.24
reference: Job 6:24
source:
  edition: WLC
  text: ה֭וֹרוּ/נִי וַ/אֲנִ֣י אַחֲרִ֑ישׁ וּ/מַה שָּׁ֝גִ֗יתִי הָבִ֥ינוּ לִֽ/י־׃
translation:
  text: Teach me, and I will be silent; make me understand how I have gone astray.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'make me understand in what I have erred.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הוֹרוּנִי
  chosen: Teach me
  alternatives:
  - Instruct me
  - Show me
  lexicon: HALOT
  rationale: From ירה in the Hiphil, commonly 'teach/instruct.' 'Teach me' is natural
    modern English and fits Job's appeal for correction from his friends.
- source_word: וַאֲנִי
  chosen: and I
  alternatives:
  - then I
  rationale: 'Simple conjunction plus pronoun, retained explicitly for emphasis: ''and
    I will be silent.'''
- source_word: אַחֲרִישׁ
  chosen: will be silent
  alternatives:
  - will keep quiet
  - will be quiet
  lexicon: HALOT
  rationale: From חרשׁ in Hiphil/idiomatic usage meaning to be silent or keep quiet.
    'Will be silent' preserves the solemn tone better than the more colloquial 'keep
    quiet.'
- source_word: וּמַה
  chosen: how
  alternatives:
  - what
  - in what way
  lexicon: HALOT
  rationale: Although literally 'and what,' the idiom with the following verb asks
    for specification of Job's error. English 'how I have gone astray' communicates
    the sense more naturally than 'what I have erred.'
- source_word: שָׁגִיתִי
  chosen: I have gone astray
  alternatives:
  - I have erred
  - I was mistaken
  - I have wandered
  lexicon: HALOT
  rationale: From שׁגה, to err/go astray. 'Gone astray' preserves the metaphorical
    force of deviating from the right path, while still fitting the context of alleged
    error.
- source_word: הָבִינוּ לִי
  chosen: make me understand
  alternatives:
  - cause me to understand
  - explain to me
  lexicon: HALOT
  rationale: Hiphil imperative of בין with לִי expresses causing understanding in
    Job. 'Make me understand' is clear, direct, and faithful to the causative sense.
