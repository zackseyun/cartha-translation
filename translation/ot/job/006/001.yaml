id: JOB.6.1
reference: Job 6:1
source:
  edition: WLC
  text: וַ/יַּ֥עַן אִיּ֗וֹב וַ/יֹּאמַֽר׃
translation:
  text: 'Then Job answered and said:'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיַּעַן
  chosen: answered
  alternatives:
  - responded
  lexicon: HALOT
  rationale: From ענה in the narrative wayyiqtol form, introducing Job's reply to
    the preceding speech. 'Answered' is the standard and sufficiently natural English
    rendering in this discourse setting; 'responded' is possible but slightly less
    direct.
- source_word: אִיּוֹב
  chosen: Job
  rationale: Personal name transliterated by standard English convention, in keeping
    with the translation philosophy to transliterate names rather than translate them.
- source_word: וַיֹּאמַר
  chosen: and said
  alternatives:
  - saying
  - and spoke
  lexicon: HALOT
  rationale: From אמר in wayyiqtol. The collocation 'answered and said' reflects a
    common Hebrew narrative formula. Retaining both verbs preserves the source-text
    style rather than collapsing them into a single English verb.
- source_word: וַ
  chosen: Then
  alternatives:
  - And
  rationale: The prefixed waw on the initial wayyiqtol advances the narrative sequence.
    'Then' communicates progression in readable modern English, while still reflecting
    the Hebrew discourse movement; 'And' would be more formally literal but less idiomatic
    in English at this point.
