theological_decisions:
- issue: Degree of Job's self-claim in Elihu's quotation
  chosen_reading: Render the statement straightforwardly as a claim of moral purity
    without softening or intensifying it.
  alternative_readings:
  - Paraphrase to weaken the claim ('I consider myself pure')
  - Intensify to absolute sinlessness language beyond the Hebrew wording
  rationale: The Hebrew presents Elihu's report of Job's words as direct, emphatic
    predicates ('I am pure... I am clean...'). The translation preserves that tension
    without importing a doctrinal judgment about whether Job's claim is correct.
  doctrine_reference: Preserve theological tension rather than resolve it.
