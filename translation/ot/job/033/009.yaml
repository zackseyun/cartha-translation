id: JOB.33.9
reference: Job 33:9
source:
  edition: WLC
  text: זַ֥ךְ אֲנִ֗י בְּֽלִ֫י פָ֥שַׁע חַ֥ף אָנֹכִ֑י וְ/לֹ֖א עָוֺ֣ן לִֽ/י׃
translation:
  text: ‘I am pure, without transgression; I am clean, and there is no iniquity in
    me.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'innocent' for 'clean' (חַף); the Hebrew term can denote freedom from
      guilt as well as cleanness.
    reason: lexical_alternative
  - marker: b
    text: Or 'there is no guilt in me'; 'iniquity' (עָוֺן) can also carry the sense
      of guilt or wrongdoing.
    reason: lexical_alternative
lexical_decisions:
- source_word: זַךְ
  chosen: pure
  alternatives:
  - clean
  - innocent
  lexicon: HALOT
  rationale: Adjectival predicate describing moral purity or cleanness. 'Pure' fits
    the ethical context and avoids redundancy with חַף later in the verse, which is
    better rendered with a different English term.
- source_word: בְּלִי פָשַׁע
  chosen: without transgression
  alternatives:
  - without rebellion
  - free from offense
  lexicon: HALOT
  rationale: בְּלִי marks absence ('without'), and פשע commonly denotes transgression/rebellion.
    'Without transgression' is natural English and preserves the moral-legal sense
    without overinterpreting as specifically covenantal rebellion.
- source_word: חַף
  chosen: clean
  alternatives:
  - innocent
  - blameless
  lexicon: HALOT
  rationale: This adjective can denote being clean or free from guilt. 'Clean' preserves
    the imagery and pairs well with the prior 'pure' while still carrying moral force.
    'Innocent' is possible but slightly more interpretive/juridical.
- source_word: עָוֺן
  chosen: iniquity
  alternatives:
  - guilt
  - wrongdoing
  - sin
  lexicon: HALOT
  rationale: עָוֺן can denote iniquity, guilt, or the consequences of guilt. Here,
    in Elihu's quotation of Job's claim, 'iniquity' preserves the traditional moral
    weight and matches the absolute negation 'there is no iniquity in me.'
- source_word: לִי
  chosen: in me
  alternatives:
  - to me
  - for me
  - on me
  lexicon: HALOT
  rationale: Although literally 'to me,' English idiom in a predicate of moral condition
    is best expressed as 'in me' ('there is no iniquity in me'), conveying internal
    possession/attribution rather than advantage.
