id: JOB.33.19
reference: Job 33:19
source:
  edition: WLC
  text: וְ/הוּכַ֣ח בְּ֭/מַכְאוֹב עַל מִשְׁכָּב֑/וֹ ו/ריב עֲצָמָ֣י/ו אֵתָֽן־׃
translation:
  text: He is also reproved with pain on his bed, and with continual strife in his
    bones,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with strong strife in his bones.' The Hebrew adjective can mean 'enduring/continual'
      or 'strong/mighty.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהוּכַח
  chosen: He is also reproved
  alternatives:
  - He is disciplined
  - He is corrected
  - He is chastened
  lexicon: HALOT
  rationale: Hophal of יכח conveys being reproved, corrected, or disciplined. In Elihu’s
    speech the sense is that God addresses a person through suffering; 'reproved'
    preserves the judicial-corrective nuance without overreading it as punitive. The
    prefixed conjunction is represented by 'also' to connect with the previous means
    by which God speaks.
- source_word: בְּמַכְאוֹב
  chosen: with pain
  alternatives:
  - by pain
  - through pain
  - with suffering
  lexicon: HALOT
  rationale: מַכְאוֹב denotes pain or suffering. 'With pain' fits the instrumental
    sense of ב and reads naturally in English while preserving the concrete bodily
    affliction.
- source_word: עַל מִשְׁכָּבוֹ
  chosen: on his bed
  alternatives:
  - upon his bed
  - while on his bed
  lexicon: HALOT
  rationale: The phrase locates the suffering in the condition of being bedridden.
    'On his bed' is the most direct and idiomatic rendering.
- source_word: וְרִיב
  chosen: and with continual strife
  alternatives:
  - and strife
  - and contention
  - and conflict
  lexicon: HALOT
  rationale: רִיב commonly means strife, contention, or dispute. Here, paired with
    'his bones,' it is metaphorical for internal bodily conflict or persistent agony.
    'Continual strife' reflects the likely sense of ongoing internal contention and
    anticipates the following adjective.
- source_word: עֲצָמָיו
  chosen: his bones
  alternatives:
  - his frame
  lexicon: HALOT
  rationale: The literal 'his bones' should be retained; in Hebrew this often represents
    the deep inner physical structure and intense bodily suffering.
- source_word: אֵתָן
  chosen: continual
  alternatives:
  - enduring
  - constant
  - mighty
  lexicon: HALOT
  rationale: אֵיתָן can denote enduring, lasting, or strong. In this context, modifying
    the strife associated with his bones, 'continual' best captures the sense of persistent,
    unrelenting affliction. Some take it with the nuance 'strong' or 'mighty,' which
    is preserved in a footnote.
