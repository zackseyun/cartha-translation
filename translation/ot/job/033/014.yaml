id: JOB.33.14
reference: Job 33:14
source:
  edition: WLC
  text: כִּֽי בְ/אַחַ֥ת יְדַבֶּר אֵ֑ל וּ֝/בִ/שְׁתַּ֗יִם לֹ֣א יְשׁוּרֶֽ/נָּה־־׃
translation:
  text: For God speaks in one way, and in two, though one does not perceive it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'For God speaks once, and twice, yet one does not notice it.' The Hebrew
      numbers may be taken adverbially ('once... twice') or idiomatically ('in one
      way... and in two').
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Surely
  lexicon: HALOT
  rationale: Introduces Elihu's explanation of how God communicates; 'for' best preserves
    the causal/explanatory force in context.
- source_word: בְאַחַת
  chosen: in one way
  alternatives:
  - once
  - in one thing
  lexicon: HALOT
  rationale: The preposition with the feminine numeral is idiomatic here, paired with
    'in two,' to express manner or repeated modes rather than a strict count of occasions.
    'In one way' fits the parallelism and prepares for the next phrase.
- source_word: יְדַבֶּר
  chosen: speaks
  alternatives:
  - does speak
  - may speak
  lexicon: HALOT
  rationale: Piel imperfect of דבר here expresses general/habitual action. Present
    tense 'speaks' communicates the gnomic sense in natural English.
- source_word: אֵל
  chosen: God
  alternatives:
  - God Almighty
  - Mighty God
  lexicon: HALOT
  rationale: El is the common divine title here; 'God' is the straightforward contextual
    rendering without importing additional nuance.
- source_word: וּבִשְׁתַּיִם
  chosen: and in two
  alternatives:
  - yes, in two ways
  - twice
  lexicon: HALOT
  rationale: Maintains the Hebrew numeric parallel with 'in one.' Although idiomatically
    it can imply repeated or multiple ways, preserving 'and in two' keeps the poetic
    structure and leaves the idiom interpretable from context.
- source_word: לֹא
  chosen: though ... not
  alternatives:
  - but ... not
  - yet ... not
  lexicon: HALOT
  rationale: 'The negative is retained, but English reads more naturally by making
    the clause concessive in relation to God''s speaking: God speaks, though the human
    recipient does not perceive it.'
- source_word: יְשׁוּרֶנָּה
  chosen: one does not perceive it
  alternatives:
  - he does not regard it
  - he does not notice it
  - one does not behold it
  lexicon: HALOT
  rationale: From שׁור, 'to look at, behold, perceive.' The 3ms verb with 3fs suffix
    likely refers to a human subject in general and to God's communication as the
    object. 'Perceive it' best captures the sense of failing to recognize God's speech,
    which fits the following examples in dreams and suffering.
