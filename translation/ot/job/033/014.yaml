theological_decisions:
- issue: Implicit human subject in the final clause
  chosen_reading: generic human subject rendered as 'one'
  alternative_readings:
  - '''he does not perceive it'''
  - '''man does not perceive it'''
  rationale: The Hebrew has an unexpressed 3ms subject. Rendering it as generic 'one'
    preserves the indefinite force without over-specifying gender, while still matching
    the source's generic singular sense.
  doctrine_reference: Translation philosophy §4 (gender-accurate over gender-neutral)
