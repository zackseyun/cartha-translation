theological_decisions:
- issue: Referent of the third-person pronouns
  chosen_reading: Both pronouns refer to God, yielding 'Why do you contend against
    him... he does not answer...'
  alternative_readings:
  - The final suffix in 'his words' could be understood more loosely in relation to
    Job's complaints rather than God's words/matters
  rationale: In context Elihu rebukes Job for contending with God and complaining
    that God does not answer. Retaining the third-person references to God fits the
    discourse and the Hebrew suffixes most straightforwardly.
  doctrine_reference: Preserve theological tension rather than resolve it
