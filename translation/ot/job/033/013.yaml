id: JOB.33.13
reference: Job 33:13
source:
  edition: WLC
  text: מַ֭דּוּעַ אֵלָ֣י/ו רִיב֑וֹתָ כִּ֥י כָל דְּ֝בָרָ֗י/ו לֹ֣א יַעֲנֶֽה־־׃
translation:
  text: Why do you contend against him, because he does not answer for all his words?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with him.' The Hebrew construction can mean 'contend with' or 'contend
      against.'
    reason: lexical_alternative
  - marker: b
    text: '''His words'' may also be understood as ''his matters'' or ''his dealings.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: מַדּוּעַ
  chosen: Why
  alternatives:
  - For what reason
  - Why is it that
  lexicon: HALOT
  rationale: Interrogative adverb introducing Elihu's challenge; simple 'Why' is natural
    and sufficiently formal.
- source_word: אֵלָיו
  chosen: against him
  alternatives:
  - with him
  - to him
  lexicon: HALOT
  rationale: The preposition אֶל with ריב can mean contend with/against someone. In
    English, 'contend against him' best conveys adversarial dispute in this context.
- source_word: רִיבוֹתָ
  chosen: you contend
  alternatives:
  - you dispute
  - you complain
  - you strive
  lexicon: HALOT
  rationale: From ריב, 'to contend/dispute.' 'Contend' preserves the forensic and
    confrontational sense without over-paraphrasing.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  - that
  lexicon: HALOT
  rationale: Introduces the reason for the contention. 'Because' is the clearest causal
    rendering in context.
- source_word: כָל
  chosen: for all
  alternatives:
  - all
  - any of
  lexicon: HALOT
  rationale: With the following plural noun and negated verb, the sense is that God
    does not answer with respect to all his words/matters. 'For all' preserves the
    scope without forcing an idiomatic expansion.
- source_word: דְּבָרָיו
  chosen: his words
  alternatives:
  - his matters
  - his affairs
  - his sayings
  lexicon: HALOT
  rationale: דבר can mean 'word,' 'matter,' or 'affair.' Here the immediate sense
    may be broader than spoken words, but 'his words' keeps the Hebrew form and the
    ambiguity, allowing readers to hear either speech or dealings.
- source_word: לֹא יַעֲנֶה
  chosen: he does not answer
  alternatives:
  - he does not respond
  - he will not answer
  lexicon: HALOT
  rationale: ענה in Qal commonly means 'answer/respond.' The imperfect here is well
    rendered as present gnomic in Elihu's general statement about God.
