id: JOB.33.21
reference: Job 33:21
source:
  edition: WLC
  text: יִ֣כֶל בְּשָׂר֣/וֹ מֵ/רֹ֑אִי ו/שפי עַ֝צְמוֹתָ֗י/ו לֹ֣א רֻאּֽוּ׃
translation:
  text: His flesh wastes away from sight, and his bones, once unseen, stick out.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'His flesh is consumed away from sight, and his bones that were not seen
      are laid bare.' The Hebrew of this line is compact and somewhat difficult, especially
      the verb rendered 'stick out.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יִכֶל
  chosen: wastes away
  alternatives:
  - is consumed
  - comes to an end
  lexicon: HALOT
  rationale: From כלה in the Qal imperfect, describing physical wasting/consumption.
    'Wastes away' fits the bodily deterioration context more naturally than the more
    wooden 'is consumed.'
- source_word: בְּשָׂרוֹ
  chosen: his flesh
  alternatives:
  - his body
  lexicon: HALOT
  rationale: Literal 'his flesh' is appropriate here for the person's physical body
    and preserves the concrete imagery.
- source_word: מֵרֹאִי
  chosen: from sight
  alternatives:
  - so as not to be seen
  - from being seen
  lexicon: HALOT
  rationale: מן + רֹאִי conveys disappearance from visibility. 'From sight' is concise
    English that captures the sense that the flesh has wasted away from view.
- source_word: וְשֻׁפִי
  chosen: stick out
  alternatives:
  - are laid bare
  - protrude
  lexicon: HALOT
  rationale: The form is difficult, but in context it describes the bones becoming
    prominent/visible as the flesh wastes away. 'Stick out' is idiomatic modern English
    and matches the image.
- source_word: עַצְמוֹתָיו
  chosen: his bones
  lexicon: HALOT
  rationale: Straightforward rendering of the plural noun with 3ms suffix.
- source_word: לֹא רֻאּוּ
  chosen: once unseen
  alternatives:
  - that were not seen
  - which could not be seen
  lexicon: HALOT
  rationale: 'Passive of ראה with negation: the bones had not been visible before.
    Rendering as ''once unseen'' makes the temporal contrast natural in English while
    preserving the sense.'
