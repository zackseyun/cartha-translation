id: JOB.33.8
reference: Job 33:8
source:
  edition: WLC
  text: אַ֭ךְ אָמַ֣רְתָּ בְ/אָזְנָ֑/י וְ/ק֖וֹל מִלִּ֣ין אֶשְׁמָֽע׃
translation:
  text: 'Surely you have spoken in my hearing, and I have heard the sound of your
    words:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'in my ears, and the sound of words I hear.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַךְ
  chosen: Surely
  alternatives:
  - Indeed
  - Only
  - But
  lexicon: HALOT
  rationale: Here אַךְ functions as an asseverative particle introducing Elihu's citation
    of what Job has said, not as a restrictive 'only.' 'Surely' conveys the emphatic
    force naturally in English.
- source_word: אָמַרְתָּ
  chosen: you have spoken
  alternatives:
  - you said
  lexicon: HALOT
  rationale: The qatal 2ms reports prior speech. 'You have spoken' fits the immediate
    context of Elihu recalling Job's words and pairs well with the following first-person
    hearing clause.
- source_word: בְאָזְנִי
  chosen: in my hearing
  alternatives:
  - in my ears
  - to my ears
  lexicon: HALOT
  rationale: Literally 'in my ears,' but the idiom in English is better rendered 'in
    my hearing,' preserving the auditory image without awkwardness.
- source_word: וְקוֹל
  chosen: and ... the sound
  alternatives:
  - and the voice
  - and the noise
  lexicon: HALOT
  rationale: קוֹל can mean 'voice' or 'sound.' Since it is followed by 'words,' 'the
    sound of your words' avoids the less natural 'voice of words' while preserving
    the sensory emphasis.
- source_word: מִלִּין
  chosen: your words
  alternatives:
  - words
  - sayings
  lexicon: HALOT
  rationale: The Aramaizing plural form means 'words.' The possessive 'your' is supplied
    in English from context, since Elihu is recounting Job's speech and English style
    normally makes the relation explicit.
- source_word: אֶשְׁמָע
  chosen: I have heard
  alternatives:
  - I hear
  - I heard
  lexicon: HALOT
  rationale: Although formally imperfect, in context it functions as a past report
    alongside 'you have spoken.' Rendering it as present ('I hear') would sound unnatural
    in English here; 'I have heard' captures the completed perception tied to the
    prior speech.
