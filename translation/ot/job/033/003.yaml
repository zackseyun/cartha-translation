id: JOB.33.3
reference: Job 33:3
source:
  edition: WLC
  text: יֹֽשֶׁר לִבִּ֥/י אֲמָרָ֑/י וְ/דַ֥עַת שְׂ֝פָתַ֗/י בָּר֥וּר מִלֵּֽלוּ־׃
translation:
  text: My words come from the uprightness of my heart, and my lips speak knowledge
    clearly.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my lips utter pure knowledge' or 'my lips speak plainly what they know.'
      The Hebrew term rendered 'clearly' can also carry the sense of purity or plainness.
    reason: lexical_alternative
lexical_decisions:
- source_word: יֹשֶׁר
  chosen: uprightness
  alternatives:
  - straightness
  - integrity
  lexicon: HALOT
  rationale: The noun denotes straightness/uprightness in a moral sense. 'Uprightness'
    fits Elihu's claim about the sincerity and rectitude of his inner disposition
    better than the more abstract 'straightness.' 'Integrity' is possible but slightly
    more interpretive.
- source_word: לִבִּי
  chosen: my heart
  alternatives:
  - my mind
  - my inner self
  lexicon: HALOT
  rationale: Hebrew לֵב/לֵבָב commonly refers to the inner person, including thought
    and will. 'Heart' is the standard and sufficiently transparent English rendering,
    preserving the Hebrew anthropological idiom.
- source_word: אֲמָרַי
  chosen: my words
  alternatives:
  - my sayings
  - what I say
  lexicon: HALOT
  rationale: The plural noun refers to Elihu's utterances. 'My words' is natural English
    and keeps the concrete sense without unnecessary paraphrase.
- source_word: וְדַעַת
  chosen: knowledge
  alternatives:
  - understanding
  - what is known
  lexicon: HALOT
  rationale: The noun here names the content or quality of what his lips express.
    'Knowledge' is the most direct equivalent and matches the claim that his speech
    is informed and true.
- source_word: שְׂפָתַי
  chosen: my lips
  alternatives:
  - my mouth
  - I
  lexicon: HALOT
  rationale: The Hebrew uses 'lips' metonymically for speech. Retaining 'my lips'
    preserves the poetic parallelism with 'my heart' and avoids flattening the imagery.
- source_word: בָּרוּר
  chosen: clearly
  alternatives:
  - purely
  - plainly
  lexicon: HALOT
  rationale: The adjective/adverbial use conveys clarity or purity. In this context
    modifying speech, 'clearly' best fits idiomatic English and the immediate sense
    of intelligible, unambiguous expression. 'Purely' is possible but less natural
    here and could suggest moral purity rather than verbal clarity.
- source_word: מִלֵּלוּ
  chosen: speak
  alternatives:
  - utter
  - declare
  lexicon: HALOT
  rationale: The verb means to speak/utter. Because the subject is 'my lips' and the
    line is poetic, 'speak' is the most natural English choice. The perfect form is
    rendered as a present in English to reflect the immediate discourse setting and
    gnomic self-description.
