id: JOB.33.31
reference: Job 33:31
source:
  edition: WLC
  text: הַקְשֵׁ֖ב אִיּ֥וֹב שְֽׁמַֽע לִ֑/י הַ֝חֲרֵ֗שׁ וְ/אָנֹכִ֥י אֲדַבֵּֽר־׃
translation:
  text: Pay attention, Job; listen to me. Be silent, and I will speak.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'hear me' for 'listen to me.'
    reason: lexical_alternative
  - marker: b
    text: Or 'Keep silent.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַקְשֵׁב
  chosen: Pay attention
  alternatives:
  - Give ear
  - Listen carefully
  lexicon: HALOT
  rationale: Hiphil imperative of קשׁב calls for attentive listening, slightly stronger
    than a simple 'hear.' 'Pay attention' is natural modern English and preserves
    the imperative force.
- source_word: אִיּוֹב
  chosen: Job
  rationale: Personal name transliterated by standard English convention, in keeping
    with the translation philosophy to transliterate names.
- source_word: שְׁמַע לִי
  chosen: listen to me
  alternatives:
  - hear me
  lexicon: HALOT
  rationale: שׁמע with ל marks directed listening. 'Listen to me' is idiomatic modern
    English; 'hear me' is possible but can sound more archaic or courtroom-like in
    English.
- source_word: הַחֲרֵשׁ
  chosen: Be silent
  alternatives:
  - Keep silent
  - Be quiet
  lexicon: HALOT
  rationale: Imperative from חרשׁ in the sense of being silent. 'Be silent' best matches
    the direct command and the rhetorical setting of Elihu asking Job not to interrupt.
- source_word: וְאָנֹכִי
  chosen: and I
  alternatives:
  - while I
  - then I
  lexicon: HALOT
  rationale: Simple conjunction plus emphatic first-person pronoun. In English, the
    emphasis is adequately conveyed by explicit subject 'I' after the imperative.
- source_word: אֲדַבֵּר
  chosen: will speak
  alternatives:
  - shall speak
  lexicon: HALOT
  rationale: Piel imperfect of דבר here expresses Elihu's intended action following
    Job's silence. 'Will speak' is clear modern English and fits the sequence of commands.
