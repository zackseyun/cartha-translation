id: JOB.33.27
reference: Job 33:27
source:
  edition: WLC
  text: יָשֹׁ֤ר עַל אֲנָשִׁ֗ים וַ/יֹּ֗אמֶר חָ֭טָאתִי וְ/יָשָׁ֥ר הֶעֱוֵ֗יתִי וְ/לֹא
    שָׁ֥וָה לִֽ/י׀־־׃
translation:
  text: He sings before men and says, ‘I have sinned and twisted what was right, and
    it was not repaid to me.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'He looks upon men and says'; the opening verb is rare and difficult,
      and some take it in a sense other than 'sings.'
    reason: lexical_alternative
  - marker: b
    text: Or, 'and it did not profit me.' The Hebrew can also express that the wrongdoing
      brought no benefit.
    reason: alternative_reading
lexical_decisions:
- source_word: יָשֹׁר
  chosen: sings
  alternatives:
  - looks
  - regards
  - declares plainly
  lexicon: HALOT
  rationale: The verb ישר in this rare form is difficult. In context with public confession
    ('before men') and direct speech following, many understand it as a denominative/poetic
    sense 'sing' or 'chant.' This yields coherent sense in Elihu's description of
    the restored man publicly confessing. Alternatives such as 'looks upon' reflect
    a different vocalization/semantic connection but fit the immediate syntax less
    well here.
- source_word: עַל אֲנָשִׁים
  chosen: before men
  alternatives:
  - to men
  - over men
  - concerning men
  lexicon: HALOT
  rationale: 'The preposition עַל with persons here is best rendered idiomatically
    as public address in the presence of people: ''before men.'' This fits the scene
    of open confession.'
- source_word: וַיֹּאמֶר
  chosen: and says
  alternatives:
  - and said
  lexicon: HALOT
  rationale: English present is used for vivid poetic narration after the initial
    clause, while preserving the sequential force of the waw-consecutive.
- source_word: חָטָאתִי
  chosen: I have sinned
  alternatives:
  - I sinned
  lexicon: HALOT
  rationale: The perfect expresses completed personal wrongdoing; English present
    perfect communicates confession naturally in modern English.
- source_word: וְיָשָׁר
  chosen: what was right
  alternatives:
  - uprightness
  - straightness
  - the right
  lexicon: HALOT
  rationale: The adjective/noun functions substantivally here. 'What was right' is
    natural English and preserves the moral sense of ישר.
- source_word: הֶעֱוֵיתִי
  chosen: twisted
  alternatives:
  - perverted
  - made crooked
  - distorted
  lexicon: HALOT
  rationale: The Hiphil of עוה conveys making crooked/perverting. 'Twisted' is vivid,
    readable modern English and pairs well with 'what was right'.
- source_word: וְלֹא שָׁוָה לִי
  chosen: and it was not repaid to me
  alternatives:
  - and it did not profit me
  - and I was not requited accordingly
  - and it was not equal to me
  lexicon: HALOT
  rationale: שוה can denote being equal, suitable, or worth it; in this penitential
    context the clause is commonly understood as God not paying back the sinner as
    his sin deserved. 'It was not repaid to me' captures the sense of withheld retribution
    in connection with the surrounding verses about deliverance from the pit.
