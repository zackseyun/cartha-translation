theological_decisions:
- issue: Rendering of צַדְּקֶךָ from צדק
  chosen_reading: to justify you
  alternative_readings:
  - to vindicate you
  - to declare you right
  rationale: The verse is not making a doctrinal statement about forensic justification
    before God in a Pauline sense, but expressing Elihu’s stated desire to find Job
    in the right if Job can answer. 'Justify' preserves the lexical link to צדק while
    remaining idiomatic; alternatives are preserved because English readers may hear
    stronger theological overtones than the immediate context requires.
  doctrine_reference: Translation philosophy §3, §5; contested terms table notes righteousness/justice
    tension for δικαιοσύνη analogously, encouraging preservation of alternatives where
    weighty.
