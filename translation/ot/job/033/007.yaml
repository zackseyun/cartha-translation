id: JOB.33.7
reference: Job 33:7
source:
  edition: WLC
  text: הִנֵּ֣ה אֵ֭מָתִ/י לֹ֣א תְבַעֲתֶ֑/ךָּ וְ֝/אַכְפִּ֗/י עָלֶ֥י/ךָ לֹא יִכְבָּֽד־׃
translation:
  text: Look, my terror will not frighten you, and my pressure on you will not be
    heavy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my hand on you will not be heavy.' The Hebrew noun אַכְפִּי is difficult;
      a more literal rendering preserves the traditional image of a hand laid upon
      someone, while the main text brings out the likely sense of pressure or weight.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: Deictic particle introducing assurance emphatically. 'Look' is natural
    modern English while preserving the attention-getting force better than archaic
    'Behold.'
- source_word: אֵמָתִי
  chosen: my terror
  alternatives:
  - my dread
  - my fearfulness
  lexicon: HALOT
  rationale: From אֵימָה/אֵמָת, denoting terror or dread. In context Elihu assures
    Job that his intimidating presence will not overwhelm him. 'My terror' preserves
    the objective sense—terror associated with me—without softening it to mere 'fear.'
- source_word: תְבַעֲתֶךָ
  chosen: will not frighten you
  alternatives:
  - will not terrify you
  - will not make you afraid
  lexicon: HALOT
  rationale: Piel imperfect of בעת, to terrify or startle greatly. 'Frighten you'
    is readable modern English and fits the reassurance context; 'terrify' is possible
    but slightly stronger and less idiomatic here.
- source_word: אַכְפִּי
  chosen: my pressure
  alternatives:
  - my hand
  - my weight
  - my burden
  lexicon: HALOT
  rationale: The noun is difficult and traditionally rendered 'my hand' by association
    with כפ/כף, but in this context with יכבד ('be heavy') and עליך ('upon you'),
    the sense is of pressure or weight imposed on Job. 'My pressure' best captures
    the idiom's force in context while avoiding an overly literal rendering that obscures
    meaning.
- source_word: עָלֶיךָ
  chosen: on you
  alternatives:
  - upon you
  - against you
  lexicon: HALOT
  rationale: Standard preposition על with second masculine singular suffix. 'On you'
    is the most natural modern equivalent in this collocation.
- source_word: יִכְבָּד
  chosen: will not be heavy
  alternatives:
  - will not weigh heavily
  - will not press hard
  lexicon: HALOT
  rationale: Qal imperfect of כבד, 'to be heavy.' The predicate complements the previous
    noun phrase and conveys that Elihu's pressure will not weigh Job down. 'Will not
    be heavy' stays close to the Hebrew while remaining intelligible.
