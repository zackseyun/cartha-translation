id: JOB.33.4
reference: Job 33:4
source:
  edition: WLC
  text: רֽוּחַ אֵ֥ל עָשָׂ֑תְ/נִי וְ/נִשְׁמַ֖ת שַׁדַּ֣י תְּחַיֵּֽ/נִי־׃
translation:
  text: The Spirit of God has made me, and the breath of the Almighty gives me life.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the breath of God has made me.' Hebrew רוּחַ can also mean 'breath'
      or 'wind.'
    reason: lexical_alternative
lexical_decisions:
- source_word: רוּחַ
  chosen: Spirit
  alternatives:
  - spirit
  - wind
  - breath
  lexicon: HALOT
  rationale: In construct with אֵל ('God') and parallel to 'the breath of the Almighty,'
    the term denotes God's life-giving Spirit rather than mere wind. Capitalized in
    English to reflect the divine referent, while preserving the poetic parallelism
    between Spirit and breath.
- source_word: אֵל
  chosen: God
  alternatives:
  - Mighty God
  - god
  lexicon: HALOT
  rationale: Here אֵל functions as a divine title/name in parallel with שַׁדַּי. 'God'
    is the most natural English rendering in this poetic context.
- source_word: עָשָׂתְנִי
  chosen: has made me
  alternatives:
  - made me
  - fashioned me
  lexicon: HALOT
  rationale: The verb עשה commonly means 'make/do.' 'Has made me' gives idiomatic
    English while preserving the completed action with present relevance. 'Fashioned
    me' is possible but slightly more interpretive than the base verb warrants.
- source_word: נִשְׁמַת
  chosen: breath
  alternatives:
  - breathing
  - blast
  lexicon: HALOT
  rationale: נשמה commonly denotes breath as the animating life-breath. In parallel
    with 'Spirit of God,' 'breath' preserves the anthropological and creation resonance
    without overinterpreting.
- source_word: שַׁדַּי
  chosen: the Almighty
  alternatives:
  - Shaddai
  lexicon: HALOT
  rationale: Per translation philosophy, titles are translated rather than transliterated.
    'The Almighty' is the standard and contextually fitting rendering of שַׁדַּי in
    Job.
- source_word: תְּחַיֵּנִי
  chosen: gives me life
  alternatives:
  - keeps me alive
  - makes me live
  - revives me
  lexicon: HALOT
  rationale: The piel of חיה here expresses causing to live. 'Gives me life' is clear
    modern English and fits the creation/life-giving parallelism better than the narrower
    'keeps me alive' or the contextually weaker 'revives me'.
