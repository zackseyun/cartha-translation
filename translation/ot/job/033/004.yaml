theological_decisions:
- issue: Whether to render רוּחַ אֵל as an impersonal 'breath/wind of God' or personal
    'Spirit of God'
  chosen_reading: The Spirit of God
  alternative_readings:
  - the breath of God
  - the wind of God
  rationale: The immediate parallel with 'the breath of the Almighty gives me life'
    evokes creation theology and divine life-giving agency. Rendering the first colon
    as 'Spirit of God' preserves the distinction and parallelism between רוח and נשמה
    while fitting historic Christian reading without importing claims beyond the text.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather
    than resolve it)
