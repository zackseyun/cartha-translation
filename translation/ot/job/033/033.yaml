id: JOB.33.33
reference: Job 33:33
source:
  edition: WLC
  text: אִם אַ֭יִן אַתָּ֥ה שְֽׁמַֽע לִ֑/י הַ֝חֲרֵ֗שׁ וַ/אֲאַלֶּפְ/ךָ֥ חָכְמָֽה־־׃ס
translation:
  text: If not, then listen to me; be silent, and I will teach you wisdom.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'hear me' for 'listen to me.'
    reason: lexical_alternative
  - marker: b
    text: Or 'keep silent.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם אַיִן
  chosen: If not
  alternatives:
  - If there is not
  - Otherwise
  lexicon: HALOT
  rationale: 'The combination introduces the contrary condition to the previous invitation:
    if Job does not have something to say in reply, Elihu tells him to listen. ''If
    not'' is concise and natural in English while preserving the conditional force.'
- source_word: שְׁמַע לִי
  chosen: listen to me
  alternatives:
  - hear me
  lexicon: HALOT
  rationale: שׁמע with ל marks attentive listening directed toward a speaker. 'Listen
    to me' fits modern English better than 'hear me' while retaining the imperative
    sense.
- source_word: הַחֲרֵשׁ
  chosen: be silent
  alternatives:
  - keep silent
  - be quiet
  lexicon: HALOT
  rationale: The imperative from חרש here calls for silence. 'Be silent' is direct
    and dignified, matching Elihu's command.
- source_word: וַאֲאַלֶּפְךָ
  chosen: and I will teach you
  alternatives:
  - and let me teach you
  - and I will instruct you
  lexicon: HALOT
  rationale: 'From אלף in the piel, the sense is to teach or instruct. The prefixed
    waw with imperfect is well rendered here as a simple future following the imperatives:
    ''and I will teach you.'''
- source_word: חָכְמָה
  chosen: wisdom
  alternatives:
  - wise instruction
  lexicon: HALOT
  rationale: חכמה is the standard Hebrew term for wisdom. No contextual pressure requires
    expansion; the simple gloss preserves the thematic vocabulary of wisdom literature.
