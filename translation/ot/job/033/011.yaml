id: JOB.33.11
reference: Job 33:11
source:
  edition: WLC
  text: יָשֵׂ֣ם בַּ/סַּ֣ד רַגְלָ֑/י יִ֝שְׁמֹ֗ר כָּל אָרְחֹתָֽ/י־׃
translation:
  text: He puts my feet in the stocks; he watches all my paths.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'He guards all my paths.' The Hebrew verb can mean either watch over
      or guard; here the context favors hostile scrutiny rather than protection.
    reason: lexical_alternative
lexical_decisions:
- source_word: יָשֵׂם
  chosen: puts
  alternatives:
  - sets
  - places
  lexicon: HALOT
  rationale: Common verb שׂים meaning 'put/set/place.' 'Puts' is natural modern English
    and fits the concrete image.
- source_word: בַּסַּד
  chosen: in the stocks
  alternatives:
  - in the block
  - in fetters
  lexicon: HALOT
  rationale: סַד denotes a restraining device for the feet, traditionally 'stocks.'
    This best captures the concrete punitive confinement image in accessible English.
- source_word: רַגְלַי
  chosen: my feet
  alternatives:
  - my foot
  lexicon: HALOT
  rationale: Dual/plural form with 1cs suffix refers naturally to both feet; English
    idiom is 'my feet.'
- source_word: יִשְׁמֹר
  chosen: he watches
  alternatives:
  - he guards
  - he keeps watch over
  - he observes
  lexicon: HALOT
  rationale: שׁמר can mean guard/watch/keep. In parallel with God's scrutiny of Job's
    conduct, 'watches' best conveys close observation without implying protection.
- source_word: כָּל
  chosen: all
  alternatives:
  - every
  lexicon: HALOT
  rationale: Straightforward quantifier; 'all' works smoothly with the plural noun
    'paths.'
- source_word: אָרְחֹתַי
  chosen: my paths
  alternatives:
  - my ways
  - my tracks
  - my courses
  lexicon: HALOT
  rationale: אֹרַח commonly means path/way, often metaphorically for one's course
    of life. 'Paths' preserves the metaphor and matches the concrete imagery of the
    verse.
