id: JOB.33.15
reference: Job 33:15
source:
  edition: WLC
  text: בַּ/חֲל֤וֹם חֶזְי֬וֹן לַ֗יְלָה בִּ/נְפֹ֣ל תַּ֭רְדֵּמָה עַל אֲנָשִׁ֑ים בִּ֝/תְנוּמ֗וֹת
    עֲלֵ֣י מִשְׁכָּֽב׀־׃
translation:
  text: In a dream, a vision of the night, when deep sleep falls on men, in slumbers
    on the bed,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'on people'; the Hebrew says 'men' as a generic reference to human beings.
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּחֲלוֹם
  chosen: In a dream
  alternatives:
  - In the dream
  - Through a dream
  lexicon: HALOT
  rationale: The preposition ב plus חֲלוֹם is best rendered locatively/instrumentally
    here as the setting in which God speaks. 'In a dream' is idiomatic and fits the
    poetic parallelism.
- source_word: חֶזְיוֹן לַיְלָה
  chosen: a vision of the night
  alternatives:
  - a night vision
  - a vision by night
  lexicon: HALOT
  rationale: The construct phrase literally means 'vision of night.' 'A vision of
    the night' preserves the Hebrew imagery and parallelism with 'dream' while remaining
    natural English.
- source_word: בִּנְפֹל
  chosen: when ... falls
  alternatives:
  - in the falling of
  - as ... falls
  lexicon: HALOT
  rationale: The infinitive construct with prefixed ב introduces a temporal clause.
    'When ... falls' is the clearest natural rendering in English.
- source_word: תַּרְדֵּמָה
  chosen: deep sleep
  alternatives:
  - trance
  - heavy sleep
  lexicon: HALOT
  rationale: תַּרְדֵּמָה denotes a deep, often divinely associated sleep. 'Deep sleep'
    is the standard accessible rendering without overinterpreting it as an ecstatic
    trance.
- source_word: עַל אֲנָשִׁים
  chosen: on men
  alternatives:
  - upon men
  - on people
  lexicon: HALOT
  rationale: The phrase literally means 'upon men.' Because אֲנָשִׁים is grammatically
    masculine with generic force, 'men' best matches the source under the gender-accurate
    policy. 'Falls on men' is idiomatic English.
- source_word: בִּתְנוּמוֹת
  chosen: in slumbers
  alternatives:
  - in sleep
  - during slumberings
  lexicon: HALOT
  rationale: The plural noun conveys repeated or layered states of drowsing/slumber
    in poetic style. 'In slumbers' preserves the plural nuance better than the flatter
    singular 'in sleep.'
- source_word: עֲלֵי מִשְׁכָּב
  chosen: on the bed
  alternatives:
  - upon the bed
  - on their beds
  lexicon: HALOT
  rationale: Literally 'upon bed.' English idiom prefers 'on the bed.' The singular
    is retained because the Hebrew singular functions collectively/poetically; adding
    'their' would interpret beyond the text.
