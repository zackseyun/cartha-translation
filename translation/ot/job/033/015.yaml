theological_decisions:
- issue: Gender-accurate rendering of אֲנָשִׁים
  chosen_reading: men
  alternative_readings:
  - people
  - humankind
  rationale: The Hebrew is grammatically masculine plural and used generically here.
    Per doctrine, gender-accurate rendering is preferred over gender-neutral unless
    context demands otherwise. A footnote preserves the inclusive sense for modern
    readers.
