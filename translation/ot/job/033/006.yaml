id: JOB.33.6
reference: Job 33:6
source:
  edition: WLC
  text: הֵן אֲנִ֣י כְ/פִ֣י/ךָ לָ/אֵ֑ל מֵ֝/חֹ֗מֶר קֹרַ֥צְתִּי גַם אָֽנִי־־׃
translation:
  text: Look, I am like your mouthpiece before God; I too was pinched off from clay.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'I am like your mouth to God.' This may mean 'your mouthpiece/spokesman
      before God,' 'according to your wish before God,' or possibly 'your equal before
      God.'
    reason: alternative_reading
  - marker: b
    text: Or 'I too was formed from clay.' The Hebrew verb evokes being pinched off
      or shaped from clay.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֵן
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: Discourse particle drawing attention emphatically. 'Look' is natural
    modern English while preserving the deictic force better than the more archaic
    'Behold.'
- source_word: כְפִיךָ לָאֵל
  chosen: like your mouthpiece before God
  alternatives:
  - according to your wish before God
  - as your spokesman to God
  - as your equal before God
  lexicon: HALOT
  rationale: The difficult phrase is literally 'like your mouth to God/for God.' In
    context Elihu is answering Job's desire for an arbiter who is human like himself
    (cf. surrounding verses), so the idiom is best taken as 'your mouthpiece/spokesman
    before God'—one who can speak on Job's behalf. 'Before God' fits ל with אֵל in
    this context better than 'to God' in idiomatic English. Alternatives are preserved
    because the Hebrew is compressed and debated.
- source_word: מֵחֹמֶר
  chosen: from clay
  alternatives:
  - from the clay
  - from dust/clay
  lexicon: HALOT
  rationale: חֹמֶר denotes clay, mortar, or clay material. 'Clay' best fits the creation-from-earth
    imagery and the immediate claim of shared human origin.
- source_word: קֹרַצְתִּי
  chosen: was pinched off
  alternatives:
  - was formed
  - was fashioned
  - was cut out
  lexicon: HALOT
  rationale: The verb קרץ can denote pinching off or shaping from material. 'Was pinched
    off' preserves the concrete tactile imagery of being formed from clay more vividly
    than the smoother 'was formed,' while remaining intelligible in English.
- source_word: גַם אֲנִי
  chosen: I too
  alternatives:
  - also I
  - I also
  lexicon: HALOT
  rationale: Emphatic addition underscoring Elihu's solidarity with Job as likewise
    human.
