id: JOB.33.17
reference: Job 33:17
source:
  edition: WLC
  text: לְ֭/הָסִיר אָדָ֣ם מַעֲשֶׂ֑ה וְ/גֵוָ֖ה מִ/גֶּ֣בֶר יְכַסֶּֽה׃
translation:
  text: to turn a man from his deed, and to cover pride from a strong man,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'to remove a man's deed, and he covers pride from a
      man.' The Hebrew is compressed, and the line may be understood either as turning
      a man away from his action or as removing the deed itself from him.
    reason: alternative_reading
lexical_decisions:
- source_word: לְהָסִיר
  chosen: to turn ... from
  alternatives:
  - to remove
  - to turn away
  lexicon: HALOT
  rationale: 'The Hiphil infinitive construct of סור here expresses causation: causing
    someone to depart from something. In context with אָדָם and מַעֲשֶׂה, ''to turn
    a man from'' communicates the idiomatic sense more naturally than the more wooden
    ''to remove a man from.'''
- source_word: אָדָם
  chosen: a man
  alternatives:
  - humankind
  - a person
  lexicon: HALOT
  rationale: Per doctrine, אָדָם is rendered according to context. Here it is singular
    and paired with גֶּבֶר ('strong man/man'), so the masculine singular 'a man' best
    reflects the Hebrew parallelism rather than a collective 'humankind.'
- source_word: מַעֲשֶׂה
  chosen: his deed
  alternatives:
  - his work
  - his action
  lexicon: HALOT
  rationale: 'The noun can mean deed, work, or action. In this context of divine warning
    restraining wrongdoing, ''deed'' fits the moral sense well and reads naturally
    in English. The possessive sense is implicit in the Hebrew construction: turning
    a man from his own deed.'
- source_word: וְגֵוָה
  chosen: pride
  alternatives:
  - arrogance
  - haughtiness
  lexicon: HALOT
  rationale: The noun denotes exaltation in the negative sense here. 'Pride' is the
    most idiomatic and concise English rendering, while preserving the moral force
    of the term.
- source_word: מִגֶּבֶר
  chosen: from a strong man
  alternatives:
  - from a man
  - from a warrior
  lexicon: HALOT
  rationale: גֶּבֶר often emphasizes man in his strength or vigor. Rendering it 'strong
    man' preserves the lexical distinction from אָדָם in the first colon. A simpler
    'man' would flatten the Hebrew parallelism.
- source_word: יְכַסֶּה
  chosen: to cover
  alternatives:
  - to conceal
  - to hide
  lexicon: HALOT
  rationale: Though morphologically an imperfect, it functions here in parallel with
    the preceding infinitive and expresses purpose/result in Elihu's statement. 'To
    cover' preserves the concrete Hebrew metaphor and allows the sense of suppressing
    or hiding pride. 'Conceal' is possible but more interpretive.
