id: JOB.33.30
reference: Job 33:30
source:
  edition: WLC
  text: לְ/הָשִׁ֣יב נַ֭פְשׁ/וֹ מִנִּי שָׁ֑חַת לֵ֝/א֗וֹר בְּ/א֣וֹר הַֽ/חַיִּים־׃
translation:
  text: to bring back his soul from the pit, that he may be enlightened with the light
    of life.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his life' for 'his soul'; Hebrew nephesh can mean soul, life, or self.
    reason: lexical_alternative
  - marker: b
    text: Or 'from the grave' or 'from destruction' for 'from the pit.'
    reason: lexical_alternative
  - marker: c
    text: Or 'to see the light' or 'to be brought to the light.' The Hebrew is compact
      and poetic.
    reason: lexical_alternative
lexical_decisions:
- source_word: לְהָשִׁיב
  chosen: to bring back
  alternatives:
  - to restore
  - to turn back
  lexicon: HALOT
  rationale: Hiphil infinitive construct of שוב, expressing causative return/restoration.
    'Bring back' preserves the concrete causative sense better than the more abstract
    'restore,' while remaining natural in English.
- source_word: נַפְשׁוֹ
  chosen: his soul
  alternatives:
  - his life
  - himself
  lexicon: HALOT
  rationale: נפש can denote soul, life, or person/self. In this poetic context alongside
    deliverance from the pit and light of life, 'soul' preserves the anthropological
    depth of the Hebrew without excluding the sense of life. The alternative 'his
    life' is viable and worth preserving in a footnote.
- source_word: מִנִּי שָׁחַת
  chosen: from the pit
  alternatives:
  - from the grave
  - from destruction
  lexicon: HALOT
  rationale: שחת in wisdom/poetic contexts can denote pit, grave, or destruction.
    'The pit' is the most literal and imagery-preserving rendering, fitting the parallel
    with 'light of life.' Alternatives are possible interpretive glosses.
- source_word: לֵאוֹר
  chosen: that he may be enlightened
  alternatives:
  - to be brought to the light
  - to see the light
  lexicon: HALOT
  rationale: The construction is difficult and elliptical. Rendering it verbally as
    purpose/result after the first infinitive captures the sense of movement into
    illumination. 'Be enlightened' reflects the אור root while preserving the poetic
    transition from rescue to illumination.
- source_word: בְּאוֹר הַחַיִּים
  chosen: with the light of life
  alternatives:
  - by the light of life
  - in the light of life
  lexicon: HALOT
  rationale: The phrase is poetic and instrumental/associative. 'With the light of
    life' is idiomatic enough while preserving the Hebrew imagery and avoiding over-interpretation.
    'Light of life' is retained formally because it is a compact poetic expression.
