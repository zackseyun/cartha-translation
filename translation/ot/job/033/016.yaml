id: JOB.33.16
reference: Job 33:16
source:
  edition: WLC
  text: אָ֣ז יִ֭גְלֶה אֹ֣זֶן אֲנָשִׁ֑ים וּ/בְ/מֹ֖סָרָ֣/ם יַחְתֹּֽם׃
translation:
  text: then he opens the ears of men and seals their instruction.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and seals their warning,' or 'and seals their discipline.' The Hebrew
      מוּסָר can mean instruction, correction, discipline, or warning.
    reason: lexical_alternative
lexical_decisions:
- source_word: אָז
  chosen: then
  alternatives:
  - at that time
  lexicon: HALOT
  rationale: Temporal adverb marking sequence from the preceding description of divine
    speech in dreams/visions; 'then' is natural modern English and preserves the narrative
    flow.
- source_word: יִגְלֶה
  chosen: opens
  alternatives:
  - uncovers
  - reveals
  lexicon: HALOT
  rationale: From גלה in the sense of uncovering/revealing. With 'ear' as object,
    the idiom means to open or uncover the ear for hearing/reception. 'Opens' communicates
    the idiom clearly in English without over-literal awkwardness.
- source_word: אֹזֶן
  chosen: ears
  alternatives:
  - ear
  lexicon: HALOT
  rationale: Hebrew singular in a collective/idiomatic construction ('open the ear
    of'). English plural 'ears' sounds more natural with 'men' and preserves the sense
    of enabling hearing.
- source_word: אֲנָשִׁים
  chosen: men
  alternatives:
  - people
  - humankind
  lexicon: HALOT
  rationale: Gender-accurate rendering per project philosophy. Here אֲנָשִׁים is the
    ordinary plural for human beings/men; 'men' preserves the source form and representative
    force better than a neutral paraphrase.
- source_word: וּבְמֹסָרָם
  chosen: their instruction
  alternatives:
  - their warning
  - their discipline
  - with their correction
  lexicon: HALOT
  rationale: מוּסָר can denote discipline, correction, or instruction. In this context
    of God communicating to restrain humans (vv. 14–18), the sense is the content
    impressed upon them as admonitory instruction. 'Their instruction' takes the 3mp
    suffix naturally and fits the following verb 'seals.' Alternative nuances are
    plausible and worth preserving.
- source_word: יַחְתֹּם
  chosen: seals
  alternatives:
  - seals up
  - imprints
  - affixes
  lexicon: HALOT
  rationale: חתם means to seal, often with the sense of fixing or authenticating.
    Here it likely means God impresses or confirms the instruction upon them. 'Seals'
    is concise and preserves the metaphor.
