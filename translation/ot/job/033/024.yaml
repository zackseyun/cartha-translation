theological_decisions:
- issue: Meaning of כֹּפֶר in Elihu's speech
  chosen_reading: ransom
  alternative_readings:
  - atonement
  - propitiatory payment
  - covering
  rationale: The verse speaks of a basis on which the person is spared from descending
    to the pit. Rendering כֹּפֶר as 'ransom' preserves the concrete sense of a price
    securing release without forcing later doctrinal categories into the text. Because
    the term can carry broader atonement associations in Hebrew usage, that alternative
    is preserved in a footnote rather than elevated to the main text.
  doctrine_reference: Preserve theological tension rather than resolve it; readable
    modern English, not archaic or academic.
