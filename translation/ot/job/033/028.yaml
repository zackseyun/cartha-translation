id: JOB.33.28
reference: Job 33:28
source:
  edition: WLC
  text: פָּדָ֣ה נפש/י מֵ/עֲבֹ֣ר בַּ/שָּׁ֑חַת ו/חית/י בָּ/א֥וֹר תִּרְאֶֽה׃
translation:
  text: He has redeemed my soul from passing into the pit, and my life will look upon
    the light.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'has ransomed my life from going down into the pit.'
    reason: lexical_alternative
  - marker: b
    text: '''The pit'' is a common Hebrew image for death or the grave.'
    reason: cultural_note
lexical_decisions:
- source_word: פָּדָה
  chosen: has redeemed
  alternatives:
  - has ransomed
  - has delivered
  lexicon: HALOT
  rationale: The verb denotes redeeming/ransoming from danger or bondage. 'Has redeemed'
    preserves the concrete rescue sense and fits the perfect form as a completed act
    with present relevance. 'Ransomed' is possible but may suggest an explicit payment
    not stated here.
- source_word: נַפְשִׁי
  chosen: my soul
  alternatives:
  - my life
  - me
  lexicon: HALOT
  rationale: נֶפֶשׁ can mean soul, life, or self depending on context. Here, because
    the second colon uses חַיָּתִי ('my life'), rendering this first term as 'my soul'
    preserves the poetic distinction between the two cola while still conveying the
    person's life/self.
- source_word: מֵעֲבֹר
  chosen: from passing into
  alternatives:
  - from going over into
  - from entering
  lexicon: HALOT
  rationale: The preposition plus infinitive construct of עבר expresses being kept
    from crossing over/entering. 'From passing into' is idiomatic English that retains
    the movement imagery better than the flatter 'from entering'.
- source_word: בַּשַּׁחַת
  chosen: the pit
  alternatives:
  - the grave
  - the destruction
  - the dungeon
  lexicon: HALOT
  rationale: שַׁחַת commonly refers to a pit and by extension the realm of death or
    destruction. 'The pit' preserves the metaphor and allows the deathly sense to
    remain implicit, as in Hebrew poetry.
- source_word: וְחַיָּתִי
  chosen: and my life
  alternatives:
  - and my living being
  - and I
  lexicon: HALOT
  rationale: The noun refers to life/living existence. 'And my life' keeps the poetic
    parallelism with 'my soul' and matches the feminine verb that follows.
- source_word: בָּאוֹר
  chosen: the light
  alternatives:
  - light
  lexicon: HALOT
  rationale: With the article, the phrase is best rendered 'the light.' In context
    it likely signifies the light of life in contrast to the pit/death.
- source_word: תִּרְאֶה
  chosen: will look upon
  alternatives:
  - will see
  - sees
  lexicon: HALOT
  rationale: The imperfect can be rendered futurally in this poetic context. 'Will
    look upon' is slightly fuller than 'will see' and suits the idiom of experiencing
    or beholding the light after deliverance.
