theological_decisions:
- issue: Subject reference of the opening perfect verb
  chosen_reading: He has redeemed my soul
  alternative_readings:
  - He redeemed my soul
  - He has redeemed me
  rationale: The 3ms verb has no explicit subject in the Hebrew line. In context,
    Elihu is speaking of God’s rescuing work, so supplying 'He' is necessary in English
    and best understood as referring to God. The translation avoids adding 'God' directly
    since the Hebrew leaves the subject implicit in this verse.
