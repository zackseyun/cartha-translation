id: JOB.33.18
reference: Job 33:18
source:
  edition: WLC
  text: יַחְשֹׂ֣ךְ נַ֭פְשׁ/וֹ מִנִּי שָׁ֑חַת וְ֝/חַיָּת֗/וֹ מֵ/עֲבֹ֥ר בַּ/שָּֽׁלַח־׃
translation:
  text: He spares his soul from the pit, and his life from perishing by the weapon.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from the grave' or 'from destruction' for 'from the pit.'
    reason: lexical_alternative
  - marker: b
    text: The Hebrew term may refer more specifically to 'a dart,' 'missile,' or possibly 'the sword'; the line speaks of being kept from a violent death.
    reason: lexical_alternative
  - marker: c
    text: Or 'from crossing into the weapon'.
    reason: previous_rendering
lexical_decisions:
- source_word: יַחְשֹׂךְ
  chosen: spares
  alternatives:
  - holds back
  - keeps back
  - withholds
  lexicon: HALOT
  rationale: The verb חשׂך in Hiphil commonly means to withhold, spare, or keep back. In this context of divine rescue from death, 'spares' gives the idiomatic sense in natural English while preserving the causative nuance of preventing someone from entering danger.
- source_word: נַפְשׁוֹ
  chosen: his soul
  alternatives:
  - his life
  - him
  lexicon: HALOT
  rationale: נפש can denote soul, life, or the person. Here the parallel with 'his life' in the second colon suggests a poetic pairing rather than strict distinction. 'His soul' preserves the Hebrew wording and the anthropological breadth of the term, while the parallel line clarifies the life-preserving sense.
- source_word: מִנִּי שָׁחַת
  chosen: from the pit
  alternatives:
  - from the grave
  - from destruction
  lexicon: HALOT
  rationale: שׁחת can mean pit, grave, or destruction. In Job's poetic context it often evokes the pit as the realm of death. 'From the pit' is concrete and traditional, while still allowing the metaphorical sense of impending death.
- source_word: וְחַיָּתוֹ
  chosen: his life
  alternatives:
  - his living being
  - his vitality
  lexicon: HALOT
  rationale: Though the form derives from חיה, in context it refers to the person's life. 'His life' is the most natural English equivalent and matches the parallelism with נפשו.
- source_word: מֵעֲבֹר
  chosen: from crossing into
  alternatives:
  - from passing into
  - from going through
  lexicon: HALOT
  rationale: The infinitive construct of עבר means to pass over or cross. Because the preposition מן governs it, the sense is prevention from entering or passing into a deadly state. 'From crossing into' preserves the motion imagery.
- source_word: בַּשָּׁלַח
  chosen: the weapon
  alternatives:
  - the dart
  - the missile
  - the sword
  lexicon: HALOT
  rationale: שׁלח here most likely denotes a weapon or missile rather than the verbal idea of sending. 'Weapon' is broad and cautious, avoiding overprecision where the noun's exact referent is debated. The imagery is of violent death.
