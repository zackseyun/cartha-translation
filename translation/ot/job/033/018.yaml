  from: from crossing into the weapon
  to: from perishing by the weapon
  rationale: The current rendering is an overly literal translation of the Hebrew phrase 'עָבַר בַּשֶּׁלַח'. While 'עבר' means 'to cross' and 'ב' can mean 'into,' the combination here is an idiom for 'to perish by.' The English 'crossing into the weapon' is awkward and unnatural, obscuring the clear meaning of dying a violent death. 'Perishing by the weapon' is a standard and accurate rendering of this idiom, capturing the instrumental sense of the preposition 'ב'.
