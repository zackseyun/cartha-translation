theological_decisions:
- issue: Representative masculine language in גָּבֶר
  chosen_reading: a man
  alternative_readings:
  - a person
  - a human being
  rationale: The Hebrew uses a masculine singular noun in a generic/representative
    sense. Following the stated gender-accurate policy, the main text keeps 'a man'
    rather than neutralizing it. Because modern readers may hear this as exclusive,
    an inclusive clarification is preserved in a footnote.
