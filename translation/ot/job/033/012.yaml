id: JOB.33.12
reference: Job 33:12
source:
  edition: WLC
  text: הֶן זֹ֣את לֹא צָדַ֣קְתָּ אֶעֱנֶ֑/ךָּ כִּֽי יִרְבֶּ֥ה אֱ֝ל֗וֹהַ מֵ/אֱנֽוֹשׁ־־־׃
translation:
  text: 'Look, in this you are not right; I will answer you: God is greater than man.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'than a mortal.' The Hebrew אֱנוֹשׁ often highlights human frailty.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֶן
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: Discourse particle introducing emphatic attention. 'Look' is natural
    modern English while preserving the force of calling attention.
- source_word: זֹאת
  chosen: in this
  alternatives:
  - this
  - in this matter
  lexicon: HALOT
  rationale: With the following clause, the demonstrative points to the matter under
    discussion rather than standing alone. 'In this' captures the idiomatic sense
    in English.
- source_word: לֹא צָדַקְתָּ
  chosen: you are not right
  alternatives:
  - you are not righteous
  - you have not been just
  - you are not in the right
  lexicon: HALOT
  rationale: The verb צדק here concerns being in the right in argument, not moral
    righteousness in a broad theological sense. 'You are not right' is clear and contextually
    appropriate.
- source_word: אֶעֱנֶךָּ
  chosen: I will answer you
  alternatives:
  - I answer you
  - I will respond to you
  lexicon: HALOT
  rationale: Imperfect 1cs with 2ms suffix naturally expresses Elihu's forthcoming
    reply. 'I will answer you' fits the discourse flow.
- source_word: כִּי
  chosen: ':'
  alternatives:
  - for
  - because
  lexicon: HALOT
  rationale: The conjunction introduces the ground for Elihu's answer. In English,
    a colon can naturally represent explanatory force without overloading the sentence
    with conjunctions; the causal sense is retained in the following clause.
- source_word: יִרְבֶּה
  chosen: is greater
  alternatives:
  - is too great
  - is many times greater
  - is greater in number/abundance
  lexicon: HALOT
  rationale: From רבה, here used comparatively with מן. The sense is superiority or
    greatness relative to man, not numerical multiplication. 'Is greater' is the most
    idiomatic comparative rendering.
- source_word: אֱלוֹהַ
  chosen: God
  alternatives:
  - God Almighty
  - God
  lexicon: HALOT
  rationale: The singular divine title refers to God generically here. 'God' is the
    straightforward equivalent.
- source_word: מֵאֱנוֹשׁ
  chosen: than man
  alternatives:
  - than a man
  - than mankind
  - than a mortal
  lexicon: HALOT
  rationale: אֱנוֹשׁ emphasizes frail human being/mortal man. 'Than man' preserves
    the singular generic contrast and aligns with the project's gender-accurate policy;
    'mortal' is possible but less direct here.
