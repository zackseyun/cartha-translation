theological_decisions:
- issue: Rendering of human term אֱנוֹשׁ
  chosen_reading: man
  alternative_readings:
  - mankind
  - a mortal
  - humanity
  rationale: The Hebrew is singular generic, contrasting God with frail human beings.
    Per the translation philosophy, gender-accurate rendering is preferred over flattening
    to gender-neutral language unless context requires it. Here 'man' best preserves
    the source form and rhetorical contrast.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
