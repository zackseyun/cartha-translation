id: JOB.33.25
reference: Job 33:25
source:
  edition: WLC
  text: רֻֽטֲפַ֣שׁ בְּשָׂר֣/וֹ מִ/נֹּ֑עַר יָ֝שׁ֗וּב לִ/ימֵ֥י עֲלוּמָֽי/ו׃
translation:
  text: his flesh becomes fresher than in youth; he returns to the days of his youthful
    vigor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his flesh is made fresh like a boy's' or 'his flesh becomes fresher
      than a youth's.' The Hebrew verb is rare, and the comparison with youth can
      be construed in slightly different ways.
    reason: lexical_alternative
  - marker: b
    text: Or 'he returns to the days of his youth.' The Hebrew noun can denote youth
      itself or the vigor associated with it.
    reason: lexical_alternative
lexical_decisions:
- source_word: רֻטֲפַשׁ
  chosen: becomes fresher
  alternatives:
  - is made fresh
  - grows youthful
  - is restored
  lexicon: HALOT
  rationale: The rare verb conveys becoming fresh or luxuriant again. 'Becomes fresher'
    preserves the concrete bodily sense and fits the restoration context better than
    a more interpretive 'is restored.'
- source_word: בְּשָׂרוֹ
  chosen: his flesh
  alternatives:
  - his body
  lexicon: HALOT
  rationale: '''Flesh'' is the direct lexical equivalent and keeps the physical, embodied
    emphasis of the Hebrew. ''Body'' is possible but slightly less literal.'
- source_word: מִנֹּעַר
  chosen: than in youth
  alternatives:
  - from youth
  - more than a youth's
  lexicon: HALOT
  rationale: With comparative force after the verb, the phrase most naturally means
    his flesh becomes fresher than it was in youth. This fits the sense of renewed
    vitality.
- source_word: יָשׁוּב
  chosen: he returns
  alternatives:
  - it returns
  - he is restored
  lexicon: HALOT
  rationale: The masculine singular verb most naturally refers back to the person
    rather than to 'flesh' alone, so 'he returns' best captures the subject continuity
    in the surrounding context.
- source_word: לִימֵי
  chosen: to the days of
  alternatives:
  - to the time of
  lexicon: HALOT
  rationale: A straightforward rendering of the construct phrase that preserves the
    idiom without unnecessary paraphrase.
- source_word: עֲלוּמָיו
  chosen: his youthful vigor
  alternatives:
  - his youth
  - his young manhood
  lexicon: HALOT
  rationale: The noun refers not merely to chronological youth but to the state or
    vigor of young adulthood. 'Youthful vigor' communicates the sense naturally in
    modern English.
