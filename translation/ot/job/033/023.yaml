theological_decisions:
- issue: Identity and function of the מַלְאָךְ מֵלִיץ
  chosen_reading: Rendered generically as 'an angel, a mediator' without identifying
    the figure more specifically.
  alternative_readings:
  - a human messenger/interpreter
  - a heavenly intercessor with stronger theological overtones
  rationale: The verse presents an intermediary figure but does not explicitly identify
    him beyond the Hebrew terms used. The translation preserves the text's ambiguity
    and does not import a more developed angelology or christological reading.
  doctrine_reference: Preserve theological tension rather than resolve it.
