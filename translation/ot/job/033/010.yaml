theological_decisions:
- issue: Speaker perspective on God’s treatment of Job
  chosen_reading: 'Render Elihu''s report of Job''s complaint without endorsing its
    theology: ''he finds grounds for hostility against me; he counts me as his enemy.'''
  alternative_readings:
  - '''he finds occasions against me'''
  - '''he invents charges against me'''
  rationale: The verse reports Job's perceived complaint about God. The translation
    should preserve the accusation's force without sharpening it into a doctrinal
    claim that God unjustly fabricates charges. Therefore a restrained rendering of
    מצא is preferred over 'invents.'
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
