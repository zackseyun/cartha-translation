id: JOB.33.10
reference: Job 33:10
source:
  edition: WLC
  text: הֵ֣ן תְּ֭נוּאוֹת עָלַ֣/י יִמְצָ֑א יַחְשְׁבֵ֖/נִי לְ/אוֹיֵ֣ב לֽ/וֹ׃
translation:
  text: Look, he finds grounds for hostility against me; he counts me as his enemy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'he finds hostilities against me,' 'he finds occasions against me,' or
      possibly 'he finds complaints against me.' The Hebrew noun is rare and context-dependent.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֵן
  chosen: Look
  alternatives:
  - Behold
  - Indeed
  lexicon: HALOT
  rationale: Introduces an emphatic assertion or attention-getter. 'Look' gives natural
    modern English while preserving the force better than the more archaic 'Behold.'
- source_word: תְּנוּאוֹת
  chosen: grounds for hostility
  alternatives:
  - hostilities
  - occasions for opposition
  - alienations
  - complaints
  lexicon: HALOT
  rationale: The noun is rare and contextually denotes hostile pretexts or occasions
    of enmity that God is said to 'find' against Job. 'Grounds for hostility' captures
    both the idea of discovered reasons and the adversarial sense. A more literal
    'hostilities' is possible but less clear in English with the verb 'find.'
- source_word: עָלַי
  chosen: against me
  alternatives:
  - concerning me
  - upon me
  lexicon: HALOT
  rationale: With a verb of finding hostile grounds, על is best rendered adversatively
    as 'against me.'
- source_word: יִמְצָא
  chosen: he finds
  alternatives:
  - he discovers
  - he invents
  lexicon: HALOT
  rationale: The basic sense is 'find.' In context it can imply identifying or seizing
    upon grounds of complaint. 'Finds' preserves the lexical core without overinterpreting
    as 'invents.'
- source_word: יַחְשְׁבֵנִי
  chosen: he counts me
  alternatives:
  - he considers me
  - he regards me
  lexicon: HALOT
  rationale: חשב commonly means to think, account, or reckon. 'Counts me' is concise
    and idiomatic here, preserving the evaluative sense.
- source_word: לְאוֹיֵב לוֹ
  chosen: as his enemy
  alternatives:
  - for an enemy to him
  - as an enemy to him
  lexicon: HALOT
  rationale: The construction expresses the role or status in which Job is regarded.
    'As his enemy' is the most natural English rendering of the Hebrew dative construction.
