id: JOB.33.20
reference: Job 33:20
source:
  edition: WLC
  text: וְ/זִֽהֲמַ֣תּ/וּ חַיָּת֣/וֹ לָ֑חֶם וְ֝/נַפְשׁ֗/וֹ מַאֲכַ֥ל תַּאֲוָֽה׃
translation:
  text: so that his life loathes bread, and his soul desirable food.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'choice food' for 'desirable food'; the Hebrew expression denotes food
      that is desired or appealing.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'his soul'; this can also mean 'his life,' 'his appetite,' or 'he
      himself' depending on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְזִהֲמַתּוּ
  chosen: loathes
  alternatives:
  - is made to loathe
  - abhors
  - rejects
  lexicon: HALOT
  rationale: The verb from זהם conveys revulsion or disgust. In context with food,
    'loathes' captures the sense naturally in English. The prefixed conjunction is
    carried forward by 'so that' from the preceding context rather than repeated mechanically
    as 'and.'
- source_word: חַיָּתוֹ
  chosen: his life
  alternatives:
  - his appetite
  - his living being
  lexicon: HALOT
  rationale: Though the noun is related to 'life/living thing,' in parallel with 'his
    soul' it functions idiomatically for the person's life or vitality rather than
    an animal. 'His life' preserves the Hebrew parallelism without over-interpreting
    it as merely 'appetite.'
- source_word: לָחֶם
  chosen: bread
  alternatives:
  - food
  lexicon: HALOT
  rationale: The basic sense is 'bread.' Since the next colon broadens to desirable
    food, retaining 'bread' here preserves the concrete imagery and poetic parallelism.
- source_word: נַפְשׁוֹ
  chosen: his soul
  alternatives:
  - his life
  - he himself
  - his appetite
  lexicon: HALOT
  rationale: נפשׁ often denotes the self, life, or inner being. Here 'his soul' preserves
    the poetic anthropological language and the parallel with 'his life.' A more flattened
    rendering like 'he' or 'his appetite' would lose the Hebrew texture.
- source_word: מַאֲכַל
  chosen: food
  alternatives:
  - meal
  - something to eat
  lexicon: HALOT
  rationale: A general term for food or what is eaten. 'Food' is the most natural
    and sufficiently broad English equivalent.
- source_word: תַּאֲוָה
  chosen: desirable
  alternatives:
  - choice
  - pleasant
  - craved
  lexicon: HALOT
  rationale: The noun denotes desire or that which is desired. In construct with 'food,'
    'desirable food' communicates food that is normally appealing. 'Choice food' is
    also possible, but 'desirable' stays closer to the lexical idea of desire.
