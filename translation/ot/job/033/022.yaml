id: JOB.33.22
reference: Job 33:22
source:
  edition: WLC
  text: וַ/תִּקְרַ֣ב לַ/שַּׁ֣חַת נַפְשׁ֑/וֹ וְ֝/חַיָּת֗/וֹ לַֽ/מְמִתִֽים׃
translation:
  text: His soul draws near to the pit, and his life to those who bring death.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to the grave' or 'to destruction' for 'the pit.'
    reason: lexical_alternative
  - marker: b
    text: Or 'to the dead' or 'to death-dealers'; the Hebrew expression is difficult
      and may refer either to agents of death or to the realm/powers of death.
    reason: alternative_reading
lexical_decisions:
- source_word: וַתִּקְרַב
  chosen: draws near
  alternatives:
  - came near
  - approaches
  lexicon: HALOT
  rationale: From קרב, 'to come near/approach.' Although the wayyiqtol form can be
    rendered with past narrative force, in this poetic context within Elihu's description
    of what happens to a suffering man, an English present gives natural sense in
    sequence with the surrounding verses.
- source_word: לַשַּׁחַת
  chosen: to the pit
  alternatives:
  - to the grave
  - to destruction
  lexicon: HALOT
  rationale: שַׁחַת can denote a pit, grave, or destruction. 'Pit' preserves the concrete
    metaphor and matches common wisdom/poetic usage, while allowing the deathly sense
    to remain implicit.
- source_word: נַפְשׁוֹ
  chosen: his soul
  alternatives:
  - his life
  - his self
  lexicon: HALOT
  rationale: נֶפֶשׁ has a broad semantic range including soul, life, self, person.
    Here 'his soul' works well in parallel with 'his life' in the next colon and preserves
    the poetic distinction without forcing a technical anthropology.
- source_word: וְחַיָּתוֹ
  chosen: and his life
  alternatives:
  - and his living being
  - and his vitality
  lexicon: HALOT
  rationale: From חַיָּה/חַיּוּת in the sense of life or living existence. 'His life'
    is the most natural English rendering in parallel with נַפְשׁוֹ and fits the context
    of approaching death.
- source_word: לַמְמִתִים
  chosen: to those who bring death
  alternatives:
  - to the killers
  - to the executioners
  - to the dead
  lexicon: HALOT
  rationale: The form is best taken from מות in a causative/active sense, literally
    'those causing death.' 'Those who bring death' preserves the participial force
    and avoids over-specifying human executioners. Some take it as a reference to
    the dead or death-dealing powers; that alternative is preserved in a footnote.
