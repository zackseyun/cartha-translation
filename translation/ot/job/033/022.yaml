theological_decisions:
- issue: Anthropological nuance of נַפְשׁוֹ and וְחַיָּתוֹ in parallel
  chosen_reading: Render the pair as 'his soul' and 'his life' without implying a
    strict body-soul dualism.
  alternative_readings:
  - Render both more flatly as 'his life' and 'his being'
  - Interpret 'soul' as a technical immaterial component
  rationale: The verse is poetic and uses near-synonymous parallelism. The translation
    preserves the lexical distinction while avoiding doctrinal over-definition about
    human constitution.
  doctrine_reference: Preserve theological tension rather than resolve it.
