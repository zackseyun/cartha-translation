id: JOB.33.26
reference: Job 33:26
source:
  edition: WLC
  text: יֶעְתַּ֤ר אֶל אֱל֨וֹהַּ וַ/יִּרְצֵ֗/הוּ וַ/יַּ֣רְא פָּ֭נָי/ו בִּ/תְרוּעָ֑ה
    וַ/יָּ֥שֶׁב לֶ֝/אֱנ֗וֹשׁ צִדְקָתֽ/וֹ־׀׃
translation:
  text: He prays to God, and he accepts him; he sees his face with a shout of joy,
    and he restores to man his righteousness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'he entreats God.' The Hebrew verb can emphasize earnest pleading in
      prayer.
    reason: lexical_alternative
  - marker: b
    text: That is, he sees God's face; the Hebrew simply says 'his face.'
    reason: alternative_reading
  - marker: c
    text: Or 'his vindication' or 'his right standing.' The Hebrew 'righteousness'
      may refer to restored standing before God.
    reason: lexical_alternative
lexical_decisions:
- source_word: יֶעְתַּר
  chosen: prays
  alternatives:
  - entreats
  - pleads
  lexicon: HALOT
  rationale: The verb עתר in this stem commonly conveys earnest prayer or entreaty
    directed to God. 'Prays' is natural modern English and fits the context of restored
    fellowship, while 'entreats' or 'pleads' are possible but more marked.
- source_word: אֱלוֹהַּ
  chosen: God
  alternatives:
  - God Almighty
  lexicon: HALOT
  rationale: אֱלוֹהַּ is the singular common poetic term for God in Job. 'God' is
    the straightforward equivalent; adding 'Almighty' would import wording not present
    in this verse.
- source_word: וַיִּרְצֵהוּ
  chosen: and he accepts him
  alternatives:
  - and he is favorable to him
  - and he delights in him
  lexicon: HALOT
  rationale: From רצה, the sense here is that God receives the petitioner favorably.
    The subject is best taken as God, continuing the God-directed sequence. 'Accepts
    him' is concise and idiomatic.
- source_word: וַיַּרְא פָּנָיו
  chosen: he sees his face
  alternatives:
  - he looks upon his face
  - he sees God's face
  lexicon: HALOT
  rationale: The most natural reading is that the restored man sees God's face, with
    the pronominal suffix referring back to God. This expresses renewed access and
    favor. 'Sees his face' preserves the Hebrew compactness; the referent is clarified
    by context.
- source_word: בִּתְרוּעָה
  chosen: with a shout of joy
  alternatives:
  - with rejoicing
  - with a joyful shout
  lexicon: HALOT
  rationale: תְּרוּעָה denotes a ringing cry or shout, often in celebratory or triumphant
    settings. 'With a shout of joy' captures both the vocal and joyful force better
    than the flatter 'with rejoicing.'
- source_word: וַיָּשֶׁב
  chosen: and he restores
  alternatives:
  - and he returns
  - and he repays
  lexicon: HALOT
  rationale: 'The hiphil of שוב here is causative: ''restore/return.'' In context,
    God restores something to the human being rather than merely ''returns.'''
- source_word: לֶאֱנוֹשׁ
  chosen: to man
  alternatives:
  - to a man
  - to a human being
  lexicon: HALOT
  rationale: אֱנוֹשׁ often emphasizes mortal humanity. 'Man' is gender-accurate and
    idiomatic here, matching the doctrine's guidance; 'human being' is possible but
    less literary in this poetic context.
- source_word: צִדְקָתוֹ
  chosen: his righteousness
  alternatives:
  - his right standing
  - his justice
  - his vindication
  lexicon: HALOT
  rationale: The noun צדקה most directly means 'righteousness.' In this context it
    likely refers to restored right standing or vindication before God, but 'righteousness'
    best preserves the lexical link and theological breadth without over-interpreting.
