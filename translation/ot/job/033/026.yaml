theological_decisions:
- issue: Referent of the pronouns in the sequence 'and he accepts him; he sees his
    face'
  chosen_reading: God accepts the praying man, and the man then sees God's face.
  alternative_readings:
  - The man accepts God favorably, though this is contextually unlikely.
  - God sees the man's face, though the sequence and idiom favor the opposite.
  rationale: The surrounding context describes a human turning to God and receiving
    divine favor and restoration. The idiom of seeing God's face naturally expresses
    restored fellowship. This reading preserves the relational movement without importing
    more than the Hebrew implies.
  doctrine_reference: Preserve theological tension rather than resolve it; render
    one in main text and preserve alternatives where ambiguity is genuine.
- issue: Sense of 'his righteousness'
  chosen_reading: Restored righteousness/right standing belonging to the man.
  alternative_readings:
  - God restores the man's vindication before others.
  - God returns to the man God's own righteousness in a more imputed sense.
  rationale: The Hebrew suffix most naturally refers to the man, and the context is
    restoration after repentance. 'His righteousness' preserves the text's wording
    without forcing a later doctrinal framework such as imputed righteousness, while
    still allowing the broader notion of restored right standing.
  doctrine_reference: Do not import doctrinal claims the text does not make.
