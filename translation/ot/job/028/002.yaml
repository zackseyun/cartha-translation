id: JOB.28.2
reference: Job 28:2
source:
  edition: WLC
  text: בַּ֭רְזֶל מֵ/עָפָ֣ר יֻקָּ֑ח וְ֝/אֶ֗בֶן יָצ֥וּק נְחוּשָֽׁה׃
translation:
  text: Iron is taken from the dust, and copper is smelted from stone.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'bronze is smelted from stone.' The Hebrew term can refer to copper or
      bronze; 'copper' is preferred here because the context is mining and extraction
      from ore.
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּרְזֶל
  chosen: iron
  lexicon: HALOT
  rationale: Standard meaning of the noun in Biblical Hebrew is the metal iron.
- source_word: מֵעָפָר
  chosen: from the dust
  alternatives:
  - from the earth
  - from the soil
  lexicon: HALOT
  rationale: עָפָר commonly denotes dust, loose earth, or soil. 'Dust' preserves the
    concrete Hebrew image and fits the poetic style, while still conveying extraction
    from the ground.
- source_word: יֻקָּח
  chosen: is taken
  alternatives:
  - is mined
  - is extracted
  lexicon: HALOT
  rationale: Passive of לקח, literally 'is taken.' 'Is taken' is closer to the Hebrew
    than the more interpretive 'is mined,' while still making sense in context.
- source_word: וְאֶבֶן
  chosen: and ... from stone
  alternatives:
  - and stone
  - and rock
  lexicon: HALOT
  rationale: 'אֶבֶן means ''stone.'' In English the clause reads more naturally by
    carrying the prepositional sense into the second half: the metal is obtained from
    stone/ore-bearing rock. ''Stone'' is retained as the closest lexical equivalent.'
- source_word: יָצוּק
  chosen: is smelted
  alternatives:
  - is poured out
  - is cast
  - is melted out
  lexicon: HALOT
  rationale: The verb יצק can mean pour, cast, or smelt depending on context. Here,
    with נְחוּשָׁה and mining imagery, the sense is producing metal from ore by smelting
    rather than merely pouring.
- source_word: נְחוּשָׁה
  chosen: copper
  alternatives:
  - bronze
  lexicon: HALOT
  rationale: נְחוּשָׁה/נְחֹשֶׁת can denote copper or bronze. In a mining/extraction
    context, 'copper' is more precise because the verse speaks of obtaining metal
    from stone, i.e., ore, rather than an alloy already manufactured. The alternative
    'bronze' is worth preserving in a footnote because English tradition often uses
    it.
