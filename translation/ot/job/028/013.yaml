id: JOB.28.13
reference: Job 28:13
source:
  edition: WLC
  text: לֹא יָדַ֣ע אֱנ֣וֹשׁ עֶרְכָּ֑/הּ וְ/לֹ֥א תִ֝מָּצֵ֗א בְּ/אֶ֣רֶץ הַֽ/חַיִּֽים־׃
translation:
  text: Man does not know its worth, and it is not found in the land of the living.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'its value' or 'its price.' The Hebrew term refers to valuation or worth.
    reason: lexical_alternative
  - marker: b
    text: '''Man'' translates a singular Hebrew term for mortal human beings used
      representatively.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֱנוֹשׁ
  chosen: Man
  alternatives:
  - mortal man
  - humanity
  - a person
  lexicon: HALOT
  rationale: אֱנוֹשׁ commonly denotes man in his frailty/mortality. Following the
    gender-accurate guideline, 'Man' preserves the singular representative force better
    than a pluralized or fully neutral rendering. 'Humanity' is possible but less
    natural with the singular verb.
- source_word: יָדַע
  chosen: does not know
  alternatives:
  - has not known
  - cannot know
  lexicon: HALOT
  rationale: 'The qatal here states a general truth in context, best rendered in English
    present tense: ''does not know.'' ''Cannot know'' would overstate inability beyond
    the lexical sense.'
- source_word: עֶרְכָּהּ
  chosen: its worth
  alternatives:
  - its value
  - its measure
  - its price
  lexicon: HALOT
  rationale: The noun from ערך can denote valuation, worth, or price. In the wisdom
    context about wisdom's inestimable value, 'its worth' is idiomatic and broad,
    avoiding the overly commercial feel of 'price' while preserving the sense of valuation.
- source_word: תִּמָּצֵא
  chosen: it is not found
  alternatives:
  - it cannot be found
  - it is not to be found
  lexicon: HALOT
  rationale: 'The Niphal imperfect is naturally rendered as passive: ''it is not found.''
    ''Cannot be found'' would add a modal nuance not explicit in the Hebrew.'
- source_word: בְּאֶרֶץ הַחַיִּים
  chosen: in the land of the living
  alternatives:
  - in the earth of the living
  - among the living
  lexicon: HALOT
  rationale: This is a standard Hebrew idiom for the realm of earthly human life.
    'Land of the living' preserves the idiom and poetic register better than more
    interpretive alternatives.
