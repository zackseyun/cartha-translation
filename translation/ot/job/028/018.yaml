id: JOB.28.18
reference: Job 28:18
source:
  edition: WLC
  text: רָאמ֣וֹת וְ֭/גָבִישׁ לֹ֣א יִזָּכֵ֑ר וּ/מֶ֥שֶׁךְ חָ֝כְמָ֗ה מִ/פְּנִינִֽים׃
translation:
  text: Coral and crystal are not worth mentioning, and the price of wisdom is above
    pearls.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Hebrew term translated 'coral' is rare and uncertain; alternatives include
      'mother-of-pearl' or, less likely here, a form related to 'heights.'
    reason: lexical_alternative
  - marker: b
    text: Or 'will not be mentioned.' The Hebrew idiom likely means these treasures
      are insignificant by comparison with wisdom.
    reason: lexical_alternative
  - marker: c
    text: The Hebrew word may also be rendered 'rubies,' since the exact precious
      stone or jewel is uncertain.
    reason: lexical_alternative
lexical_decisions:
- source_word: רָאמוֹת
  chosen: coral
  alternatives:
  - heights
  - ramoth
  - mother-of-pearl
  lexicon: HALOT
  rationale: In this poetic catalog of precious materials, the term is traditionally
    understood as a luxury substance rather than a topographical noun. 'Coral' fits
    the parallelism with crystal and pearls and matches the sense required by the
    valuation context. Because the word is rare and uncertain, alternatives are preserved
    in a footnote.
- source_word: גָבִישׁ
  chosen: crystal
  alternatives:
  - ice
  - quartz
  lexicon: HALOT
  rationale: The noun denotes a transparent precious substance. 'Crystal' is the most
    natural English rendering in a list of valuables, while 'ice' is less likely in
    this context of costly items.
- source_word: לֹא יִזָּכֵר
  chosen: are not worth mentioning
  alternatives:
  - will not be mentioned
  - cannot be mentioned
  lexicon: HALOT
  rationale: Literally, 'will not be remembered/mentioned.' In context the idiom expresses
    insignificance by comparison with wisdom, not mere silence. 'Are not worth mentioning'
    captures the comparative force in idiomatic modern English without excessive paraphrase.
- source_word: מֶשֶׁךְ
  chosen: price
  alternatives:
  - acquisition
  - drawing out
  - possession
  lexicon: HALOT
  rationale: In this context of valuation, the noun refers to what is obtained or
    paid in exchange. 'Price' best fits the economic imagery and the comparison with
    precious stones.
- source_word: חָכְמָה
  chosen: wisdom
  lexicon: HALOT
  rationale: Standard rendering for the central theme of the chapter; no contextual
    reason to vary.
- source_word: מִפְּנִינִים
  chosen: above pearls
  alternatives:
  - beyond rubies
  - more than corals
  lexicon: HALOT
  rationale: The noun denotes precious jewels, often rendered 'pearls' or 'rubies.'
    'Pearls' is chosen as a clear modern equivalent for a costly gem-like object,
    while preserving the traditional alternative 'rubies' in a footnote because the
    exact species is uncertain and translation tradition varies.
