theological_decisions:
- issue: Rendering of צַלְמָוֶת
  chosen_reading: deep darkness
  alternative_readings:
  - shadow of death
  - death-shadow
  rationale: This is primarily a lexical-contextual decision rather than a doctrinal
    one. In Job 28:3 the mining imagery points to subterranean darkness rather than
    death itself. To preserve interpretive transparency, the traditional rendering
    is retained in a footnote.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather
    than resolve it)
