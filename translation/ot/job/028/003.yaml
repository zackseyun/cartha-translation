id: JOB.28.3
reference: Job 28:3
source:
  edition: WLC
  text: קֵ֤ץ שָׂ֤ם לַ/חֹ֗שֶׁךְ וּֽ/לְ/כָל תַּ֭כְלִית ה֣וּא חוֹקֵ֑ר אֶ֖בֶן אֹ֣פֶל וְ/צַלְמָֽוֶת׀־׃
translation:
  text: He sets an end to darkness, and he searches out to every limit the stones
    of gloom and deep darkness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more traditionally, 'the stone of gloom and the shadow of death.'
    reason: lexical_alternative
lexical_decisions:
- source_word: קֵץ
  chosen: an end
  alternatives:
  - a limit
  - an extremity
  lexicon: HALOT
  rationale: The noun denotes an end or limit. 'An end' works naturally with שָׂם
    ('sets/puts') and preserves the concrete sense of establishing a boundary.
- source_word: שָׂם
  chosen: sets
  alternatives:
  - puts
  - appoints
  lexicon: HALOT
  rationale: A common verb meaning 'set/put/place.' 'Sets' is idiomatic in English
    with 'an end' and keeps the vividness of the Hebrew.
- source_word: לַחֹשֶׁךְ
  chosen: to darkness
  alternatives:
  - for darkness
  lexicon: HALOT
  rationale: The preposition ל with 'darkness' is best represented here as the indirect
    object of 'sets an end,' i.e., he sets an end to darkness.
- source_word: וּלְכָל תַּכְלִית
  chosen: to every limit
  alternatives:
  - to every extremity
  - for every perfection
  - every farthest boundary
  lexicon: HALOT
  rationale: תַּכְלִית here refers to an extremity or furthest limit, not moral 'perfection.'
    The phrase intensifies the miner's exhaustive search. 'To every limit' is concise
    and natural.
- source_word: הוּא חוֹקֵר
  chosen: he searches out
  alternatives:
  - he explores
  - he investigates
  lexicon: HALOT
  rationale: חקר conveys searching out thoroughly or exploring. 'Searches out' preserves
    the active, investigative force and suits the mining context.
- source_word: אֶבֶן
  chosen: the stones of
  alternatives:
  - the rock of
  - stone of
  lexicon: HALOT
  rationale: Although singular in form, אֶבֶן can function collectively in context.
    Rendering it as 'the stones of' communicates the mining sense more idiomatically
    in English than 'stone of gloom.'
- source_word: אֹפֶל
  chosen: gloom
  alternatives:
  - thick darkness
  - darkness
  lexicon: HALOT
  rationale: אֹפֶל denotes deep gloom or thick darkness. 'Gloom' differentiates it
    from חֹשֶׁךְ earlier in the verse while remaining readable.
- source_word: וְצַלְמָוֶת
  chosen: deep darkness
  alternatives:
  - shadow of death
  - deathly darkness
  lexicon: HALOT
  rationale: In Job, צַלְמָוֶת often denotes very deep darkness; while traditionally
    rendered 'shadow of death,' many contexts support 'deep darkness.' The main text
    uses the contextual sense, with the traditional alternative preserved in a footnote.
