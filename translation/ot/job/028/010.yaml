id: JOB.28.10
reference: Job 28:10
source:
  edition: WLC
  text: בַּ֭/צּוּרוֹת יְאֹרִ֣ים בִּקֵּ֑עַ וְ/כָל יְ֝קָ֗ר רָאֲתָ֥ה עֵינֽ/וֹ־׃
translation:
  text: He cuts channels through the rocks, and his eye sees every precious thing.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'streams' or 'canals'; the Hebrew term can denote watercourses, but here
      likely refers to channels cut in rock in the mining imagery of the context.
    reason: lexical_alternative
  - marker: b
    text: Or 'every valuable thing' or 'every precious ore.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּצּוּרוֹת
  chosen: through the rocks
  alternatives:
  - in the rocks
  - among the rocks
  - through flinty rock
  lexicon: HALOT
  rationale: צוּר denotes rock/crag, often hard rock. The prefixed ב here is best
    taken locatively/instrumentally with the verb, yielding the sense of cutting into
    or through rocky formations. 'Through the rocks' is natural English and fits the
    mining context of the chapter.
- source_word: יְאֹרִים
  chosen: channels
  alternatives:
  - streams
  - canals
  - shafts
  lexicon: HALOT
  rationale: יְאֹר commonly refers to a watercourse, canal, or stream. In this mining
    context, the sense is man-made or cut channels/passages rather than natural rivers.
    'Channels' preserves the imagery without overcommitting to 'shafts,' which is
    more interpretive.
- source_word: בִּקֵּעַ
  chosen: cuts
  alternatives:
  - splits
  - breaks open
  - cleaves
  lexicon: HALOT
  rationale: בקע means to split, cleave, or break open. 'Cuts' fits the practical
    mining action in idiomatic English while retaining the force of opening a passage
    through rock.
- source_word: יְקָר
  chosen: precious thing
  alternatives:
  - precious ore
  - valuable thing
  - treasure
  lexicon: HALOT
  rationale: יְקָר denotes what is precious, costly, or valuable. Because the noun
    is not explicitly limited to metal or gems, 'precious thing' keeps the broader
    sense while fitting the context of hidden valuables in the earth.
- source_word: רָאֲתָה עֵינוֹ
  chosen: his eye sees
  alternatives:
  - his eye has seen
  - his eye spots
  - he sees
  lexicon: HALOT
  rationale: The Hebrew literally says 'his eye has seen.' English present tense works
    well in this descriptive poetic context. Retaining 'his eye' preserves the vivid
    anthropomorphic singular image rather than flattening it to simply 'he sees'.
