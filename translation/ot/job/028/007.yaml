id: JOB.28.7
reference: Job 28:7
source:
  edition: WLC
  text: נָ֭תִיב לֹֽא יְדָ֣ע/וֹ עָ֑יִט וְ/לֹ֥א שְׁ֝זָפַ֗תּ/וּ עֵ֣ין אַיָּֽה־׃
translation:
  text: A path no bird of prey knows, and the eye of the falcon has not seen it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'kite.' The Hebrew names a bird of prey, but the exact species is uncertain.
    reason: lexical_alternative
lexical_decisions:
- source_word: נָתִיב
  chosen: path
  alternatives:
  - trail
  - way
  lexicon: HALOT
  rationale: נָתִיב denotes a path or track. 'Path' is natural English and fits the
    poetic image of a hidden route in the earth.
- source_word: לֹא יְדָעוֹ
  chosen: no bird of prey knows
  alternatives:
  - the bird of prey does not know it
  lexicon: HALOT
  rationale: 'The verb ידע with 3ms suffix means ''know it.'' English idiom is improved
    by fronting the negative phrase: ''no bird of prey knows.'''
- source_word: עָיִט
  chosen: bird of prey
  alternatives:
  - raptor
  - hawk
  lexicon: HALOT
  rationale: עָיִט is a general term for a bird of prey rather than a specific species.
    'Bird of prey' preserves the generic sense better than a narrower species label.
- source_word: וְלֹא שְׁזָפַתּוּ
  chosen: has not seen it
  alternatives:
  - has not caught sight of it
  - has not gazed on it
  lexicon: HALOT
  rationale: שׁזף refers to seeing, looking upon, or catching sight of. 'Has not seen
    it' is the clearest modern rendering and matches the parallelism with 'knows.'
- source_word: עֵין
  chosen: the eye of
  alternatives:
  - the sight of
  lexicon: HALOT
  rationale: The construct phrase is literally 'eye of.' Retaining 'eye of' preserves
    the Hebrew poetic imagery.
- source_word: אַיָּה
  chosen: falcon
  alternatives:
  - kite
  lexicon: HALOT
  rationale: אַיָּה refers to a bird of prey, often identified as a kite or falcon.
    'Falcon' is a familiar modern English term that communicates the predatory bird
    image well, while the alternative is preserved in a footnote because the exact
    species is uncertain.
