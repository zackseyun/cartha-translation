id: JOB.28.22
reference: Job 28:22
source:
  edition: WLC
  text: אֲבַדּ֣וֹן וָ֭/מָוֶת אָ֣מְר֑וּ בְּ֝/אָזְנֵ֗י/נוּ שָׁמַ֥עְנוּ שִׁמְעָֽ/הּ׃
translation:
  text: Abaddon and Death say, ‘With our ears we have heard a report of it.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Destruction and death said, “We have heard a rumor of it.”'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲבַדּוֹן
  chosen: Abaddon
  alternatives:
  - Destruction
  lexicon: HALOT
  rationale: Rendered as the proper name/title 'Abaddon' rather than the abstract
    'Destruction' because in parallel with 'Death' it is personified as a speaking
    realm/power. Transliteration preserves the poetic force and avoids flattening
    the figure into a mere abstraction.
- source_word: וָמָוֶת
  chosen: and Death
  alternatives:
  - and death
  lexicon: HALOT
  rationale: Capitalized 'Death' because the verse personifies it alongside Abaddon
    as a speaker. The conjunction is simply additive.
- source_word: אָמְרוּ
  chosen: say
  alternatives:
  - said
  lexicon: HALOT
  rationale: Although morphologically perfect, Hebrew poetry often uses the perfect
    for vivid present or gnomic statement. Present tense fits the immediate poetic
    context in which various domains are queried about wisdom's whereabouts.
- source_word: בְּאָזְנֵינוּ
  chosen: With our ears
  alternatives:
  - In our ears
  - By our ears
  lexicon: HALOT
  rationale: A natural but still fairly literal rendering of the preposition plus
    noun. It preserves the idiom of direct hearing rather than reducing it to simply
    'we heard.'
- source_word: שָׁמַעְנוּ
  chosen: we have heard
  alternatives:
  - we heard
  lexicon: HALOT
  rationale: English present perfect conveys a past hearing with present relevance,
    matching the poetic sense that they possess only secondhand knowledge.
- source_word: שִׁמְעָהּ
  chosen: a report of it
  alternatives:
  - its report
  - the rumor of it
  - a mention of it
  lexicon: HALOT
  rationale: The noun denotes a report, rumor, or tidings. 'A report of it' is idiomatic
    English and preserves the idea that Abaddon and Death know only by hearsay, not
    by direct possession or sight. The feminine suffix refers back to wisdom in the
    context.
