theological_decisions:
- issue: Personification of Abaddon and Death
  chosen_reading: Treat both as personified speakers in the main text
  alternative_readings:
  - Read 'Abaddon' as abstract 'destruction' and 'death' non-personally
  rationale: The verse presents them as speaking and hearing, and the capitalization
    in English helps signal the poetic personification without making a stronger ontological
    claim than the text itself.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
