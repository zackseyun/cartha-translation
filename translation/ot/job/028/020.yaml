id: JOB.28.20
reference: Job 28:20
source:
  edition: WLC
  text: וְֽ֭/הַ/חָכְמָה מֵ/אַ֣יִן תָּב֑וֹא וְ/אֵ֥י זֶ֝֗ה מְק֣וֹם בִּינָֽה׃
translation:
  text: But wisdom—from where does it come? And where is the place of understanding?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'From where does wisdom come, and where is the place
      of understanding?'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהַחָכְמָה
  chosen: But wisdom
  alternatives:
  - And wisdom
  - Now wisdom
  lexicon: HALOT
  rationale: חָכְמָה is best rendered 'wisdom.' The prefixed conjunction can be a
    simple 'and,' but in context it marks a rhetorical turn resuming the poem's central
    question, so 'But' better captures the contrastive force in natural English without
    over-paraphrasing.
- source_word: מֵאַיִן
  chosen: from where
  alternatives:
  - whence
  - from where?
  - where from
  lexicon: HALOT
  rationale: The interrogative with prefixed מ expresses source or origin, literally
    'from where.' This preserves the Hebrew emphasis on provenance better than a flattened
    'where.' 'Whence' is formally elegant but too archaic for the stated translation
    philosophy.
- source_word: תָּבוֹא
  chosen: does it come
  alternatives:
  - will it come
  - comes
  lexicon: HALOT
  rationale: Qal imperfect 3fs of בוא with חָכְמָה as subject can express a gnomic
    or rhetorical present in context. English present 'does it come' fits the poetic
    question naturally. A future 'will it come' is possible formally, but the surrounding
    discourse asks about the source/location of wisdom in general, not merely a future
    event.
- source_word: וְאֵי זֶה
  chosen: And where is
  alternatives:
  - And what is
  - And where, then, is
  lexicon: HALOT
  rationale: אֵי/אֵי־זֶה is an interrogative expression of place, 'where?' or 'where
    then?' In this collocation before מְקוֹם, the sense is locative, not qualitative.
    Rendering simply 'where is' gives clear modern English while preserving the question.
- source_word: מְקוֹם
  chosen: the place
  alternatives:
  - place
  - location
  lexicon: HALOT
  rationale: 'מקום means ''place.'' Including the article in English (''the place'')
    reflects the construct-like sense with the following noun in poetic style: ''the
    place of understanding.'' ''Location'' is too technical for the register.'
- source_word: בִּינָה
  chosen: understanding
  alternatives:
  - insight
  - discernment
  lexicon: HALOT
  rationale: בינה commonly denotes understanding or discernment. 'Understanding' pairs
    well with 'wisdom' and matches the traditional semantic distinction in wisdom
    literature without unnecessary interpretive narrowing.
