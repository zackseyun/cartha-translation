id: JOB.28.24
reference: Job 28:24
source:
  edition: WLC
  text: כִּי ה֭וּא לִ/קְצוֹת הָ/אָ֣רֶץ יַבִּ֑יט תַּ֖חַת כָּל הַ/שָּׁמַ֣יִם יִרְאֶֽה־־־׃
translation:
  text: For he looks to the ends of the earth; he sees under all the heavens.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to the farthest reaches of the earth.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'under all the heavens,' with 'heavens' in the plural.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Here כִּי introduces the reason for the preceding claim about God's knowledge
    of wisdom, so 'For' best captures the explanatory force in natural English.
- source_word: הוּא
  chosen: he
  alternatives:
  - He
  lexicon: HALOT
  rationale: The pronoun refers back to God in context. Lowercase 'he' follows normal
    modern English style while preserving the personal subject.
- source_word: לִקְצוֹת הָאָרֶץ
  chosen: to the ends of the earth
  alternatives:
  - to the extremities of the earth
  - to the farthest reaches of the earth
  lexicon: HALOT
  rationale: The phrase denotes the remotest limits of the earth. 'Ends of the earth'
    is both idiomatic and sufficiently formal.
- source_word: יַבִּיט
  chosen: looks
  alternatives:
  - looks intently
  - gazes
  - beholds
  lexicon: HALOT
  rationale: The Hiphil of נבט conveys directed looking. 'Looks' is clear modern English;
    the context already supplies the comprehensiveness, so a more intensified gloss
    is unnecessary.
- source_word: תַּחַת כָּל הַשָּׁמַיִם
  chosen: under all the heavens
  alternatives:
  - beneath all the heavens
  - under the whole heaven
  lexicon: HALOT
  rationale: תחת means 'under/beneath,' and the Hebrew uses the plural 'heavens.'
    'Under all the heavens' preserves both the spatial imagery and the distributive
    force of כָּל.
- source_word: יִרְאֶה
  chosen: he sees
  alternatives:
  - he perceives
  - he observes
  lexicon: HALOT
  rationale: ראה is the common verb 'to see.' 'He sees' keeps the parallelism with
    'looks' while preserving the straightforward lexical sense.
