theological_decisions:
- issue: Reference of the pronoun הוּא
  chosen_reading: The subject is God, continuing the description of his exhaustive
    knowledge.
  rationale: In the immediate context of Job 28, the one who knows wisdom's place
    and surveys all creation is God. This is contextual identification, not a doctrinal
    expansion beyond the text.
  doctrine_reference: Preserve theological tension rather than resolve it; here the
    context is not genuinely ambiguous.
