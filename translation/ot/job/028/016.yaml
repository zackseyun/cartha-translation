id: JOB.28.16
reference: Job 28:16
source:
  edition: WLC
  text: לֹֽא תְ֭סֻלֶּה בְּ/כֶ֣תֶם אוֹפִ֑יר בְּ/שֹׁ֖הַם יָקָ֣ר וְ/סַפִּֽיר־׃
translation:
  text: It cannot be valued in the gold of Ophir, in precious onyx or sapphire.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'beryl' for 'onyx'; the precise identification of the Hebrew gemstone
      term is uncertain.
    reason: lexical_alternative
  - marker: b
    text: Or possibly 'lapis lazuli' for 'sapphire,' reflecting ancient rather than
      modern mineral classification.
    reason: lexical_alternative
lexical_decisions:
- source_word: תְסֻלֶּה
  chosen: be valued
  alternatives:
  - be weighed
  - be appraised
  - be compared
  lexicon: HALOT, BDB
  rationale: From סלל in the Pual, in this context of precious materials and worth,
    the sense is that wisdom cannot be assessed or priced by such wealth. 'Be valued'
    is idiomatic English that preserves the economic/comparative force better than
    a wooden 'be weighed,' while 'be compared' is possible but less precise in a list
    of valuables.
- source_word: בְּכֶתֶם אוֹפִיר
  chosen: in the gold of Ophir
  alternatives:
  - with the gold of Ophir
  - by the gold of Ophir
  - in fine gold of Ophir
  lexicon: HALOT, BDB
  rationale: כֶּתֶם denotes refined or fine gold; Ophir specifies the famed source.
    Rendering the preposition as 'in' follows the Hebrew closely and works idiomatically
    with 'valued' in English ('valued in'). 'Gold of Ophir' communicates both material
    and provenance without overloading the line.
- source_word: שֹׁהַם
  chosen: onyx
  alternatives:
  - beryl
  lexicon: HALOT, BDB
  rationale: The precise identification of שֹׁהַם is uncertain, but 'onyx' is the
    traditional and most widely recognized rendering in English Bibles. Because the
    mineral identification is debated, the alternative is preserved in a footnote.
- source_word: יָקָר
  chosen: precious
  alternatives:
  - costly
  - valuable
  lexicon: HALOT, BDB
  rationale: The adjective modifies שֹׁהַם and emphasizes exceptional value. 'Precious'
    is natural in English gemstone language and fits the poetic register.
- source_word: סַפִּיר
  chosen: sapphire
  alternatives:
  - lapis lazuli
  lexicon: HALOT, BDB
  rationale: The traditional rendering is 'sapphire,' though the ancient stone may
    have referred to lapis lazuli rather than the modern sapphire. The familiar English
    term is retained in the main text, with the historical-mineral alternative preserved
    in a footnote.
