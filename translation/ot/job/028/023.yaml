id: JOB.28.23
reference: Job 28:23
source:
  edition: WLC
  text: אֱ֭לֹהִים הֵבִ֣ין דַּרְכָּ֑/הּ וְ֝/ה֗וּא יָדַ֥ע אֶת מְקוֹמָֽ/הּ־׃
translation:
  text: God understands its way, and he knows its place.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'her way ... her place,' reflecting the feminine grammatical form of
      'wisdom' in Hebrew.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֱלֹהִים
  chosen: God
  alternatives:
  - Gods
  - god
  lexicon: HALOT
  rationale: Although morphologically plural in form, with singular verbs here it
    clearly refers to the one God. 'God' is the natural English rendering in this
    context.
- source_word: הֵבִין
  chosen: understands
  alternatives:
  - discerned
  - understood
  lexicon: HALOT
  rationale: The Hiphil of בין conveys understanding/discernment. Present tense in
    English fits the gnomic, timeless statement of divine knowledge in the poem better
    than a simple past.
- source_word: דַּרְכָּהּ
  chosen: its way
  alternatives:
  - her way
  - the way to it
  - its path
  lexicon: HALOT
  rationale: The suffix refers back to wisdom in the surrounding context, grammatically
    feminine in Hebrew. English idiom prefers 'its' for an abstract noun. 'Way' preserves
    the Hebrew metaphor without over-interpreting it as specifically 'the way to it,'
    though that sense is contextually possible.
- source_word: וְהוּא
  chosen: and he
  alternatives:
  - and He
  - while he
  lexicon: HALOT
  rationale: 'The conjunction plus independent pronoun adds emphasis: ''and he.''
    Lowercase ''he'' follows normal English Bible style outside contexts requiring
    reverential capitalization.'
- source_word: יָדַע
  chosen: knows
  alternatives:
  - knew
  - has known
  lexicon: HALOT
  rationale: The verb denotes knowledge. Present tense best reflects the general,
    enduring truth being stated about God.
- source_word: אֶת מְקוֹמָהּ
  chosen: its place
  alternatives:
  - her place
  - its location
  lexicon: HALOT
  rationale: מקום means place/location. 'Its place' is concise and natural, again
    using 'its' for the abstract referent wisdom.
