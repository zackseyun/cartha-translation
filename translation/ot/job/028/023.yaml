theological_decisions:
- issue: Referent of the feminine suffixes in 'its way' and 'its place'
  chosen_reading: The suffixes refer to wisdom, personified in the surrounding context
    but rendered with English impersonal pronouns for natural style.
  alternative_readings:
  - 'Render with feminine pronouns: ''her way ... her place'''
  rationale: Job 28 personifies wisdom as feminine, matching Hebrew grammatical gender.
    However, in contemporary English, abstract nouns are normally referred to as 'it.'
    This preserves meaning without importing a stronger personalizing effect than
    the Hebrew grammar alone requires.
  doctrine_reference: Translation philosophy §6 (readable modern English) and §5 (documented
    exception/consistency)
