theological_decisions:
- issue: Referent of the feminine suffixes
  chosen_reading: All feminine suffixes refer to 'wisdom' from the immediate context.
  alternative_readings:
  - The suffixes could be taken more abstractly as referring to wisdom's measure or
    ordering.
  rationale: The preceding context personifies wisdom and treats it as the object
    of God's seeing, declaring, establishing, and searching. Rendering with 'it' in
    English preserves the Hebrew feminine referent without awkward personification
    not explicit in English.
  doctrine_reference: Translation philosophy §3, preserve theological tension rather
    than resolve it
