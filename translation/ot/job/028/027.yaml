id: JOB.28.27
reference: Job 28:27
source:
  edition: WLC
  text: אָ֣ז רָ֭אָ/הּ וַֽ/יְסַפְּרָ֑/הּ הֱ֝כִינָ֗/הּ וְ/גַם חֲקָרָֽ/הּ־׃
translation:
  text: Then he saw it and declared it; he established it, and also searched it out.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'counted it,' 'recounted it,' or 'set it forth.' The Hebrew verb can
      carry senses of numbering or declaring.
    reason: lexical_alternative
lexical_decisions:
- source_word: אָז
  chosen: Then
  alternatives:
  - At that time
  lexicon: HALOT
  rationale: Temporal adverb marking sequence in the poetic description of God's relation
    to wisdom; 'Then' is natural English and preserves the narrative-poetic flow.
- source_word: רָאָהּ
  chosen: he saw it
  alternatives:
  - he perceived it
  - he looked upon it
  lexicon: HALOT
  rationale: From ראה with 3fs suffix referring back to wisdom. 'Saw' preserves the
    concrete verb while allowing the poetic sense of full perception.
- source_word: וַיְסַפְּרָהּ
  chosen: declared it
  alternatives:
  - recounted it
  - numbered it
  - told it
  lexicon: HALOT
  rationale: ספר can mean count, recount, or declare. In this context of God's ordering
    and assessment of wisdom, 'declared it' best fits the sequence and idiomatic English,
    likely conveying making it known or setting it forth rather than merely counting
    it.
- source_word: הֱכִינָהּ
  chosen: he established it
  alternatives:
  - he set it in place
  - he prepared it
  lexicon: HALOT
  rationale: כון in the Hiphil commonly means establish, make firm, set in place.
    'Established' fits the portrayal of wisdom as fixed and ordered by God.
- source_word: וְגַם
  chosen: and also
  alternatives:
  - and even
  - also
  lexicon: HALOT
  rationale: Adds a final intensifying element to the sequence. 'And also' preserves
    the cumulative force in readable English.
- source_word: חֲקָרָהּ
  chosen: searched it out
  alternatives:
  - examined it
  - investigated it
  lexicon: HALOT
  rationale: חקר conveys searching out or probing thoroughly. 'Searched it out' preserves
    the investigative nuance and works well in poetic English.
