id: JOB.28.21
reference: Job 28:21
source:
  edition: WLC
  text: וְֽ֭/נֶעֶלְמָה מֵ/עֵינֵ֣י כָל חָ֑י וּ/מֵ/ע֖וֹף הַ/שָּׁמַ֣יִם נִסְתָּֽרָה־׃
translation:
  text: It is hidden from the eyes of every living thing, and concealed from the birds
    of the heavens.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from the birds of the sky.' The Hebrew literally says 'the birds of
      the heavens.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנֶעֶלְמָה
  chosen: It is hidden
  alternatives:
  - and it is hidden
  - has been hidden
  lexicon: HALOT
  rationale: Niphal perfect 3fs of עלם, functioning predicatively with the feminine
    subject carried over from the context (wisdom, v. 20). English supplies 'it' naturally.
    'Hidden' best captures the passive/resultative sense without overtranslating aspect.
- source_word: מֵעֵינֵי
  chosen: from the eyes of
  alternatives:
  - from the sight of
  - from before the eyes of
  lexicon: HALOT
  rationale: Literal idiom with מן + עיניים. 'From the eyes of' preserves the Hebrew
    imagery and is clear in English.
- source_word: כָל חָי
  chosen: every living thing
  alternatives:
  - all living beings
  - every living creature
  lexicon: HALOT
  rationale: The phrase is broad and nonhuman-specific in context, referring to all
    living creatures generally. 'Every living thing' is natural English and preserves
    the universal scope.
- source_word: וּמֵעוֹף הַשָּׁמַיִם
  chosen: and from the birds of the heavens
  alternatives:
  - and from the birds of the sky
  - and from the fowl of heaven
  lexicon: HALOT
  rationale: עוֹף denotes flying creatures/birds; in English 'birds' is the most idiomatic
    here. 'Of the heavens' closely reflects the Hebrew genitive and matches the elevated
    poetic register of Job, though 'sky' is a viable alternative.
- source_word: נִסְתָּרָה
  chosen: concealed
  alternatives:
  - hidden
  - kept secret
  lexicon: HALOT
  rationale: Niphal perfect 3fs of סתר. Rendering it as 'concealed' avoids awkward
    repetition with the earlier 'hidden' while preserving the semantic parallelism
    of the Hebrew poetry.
