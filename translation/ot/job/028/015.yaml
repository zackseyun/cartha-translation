id: JOB.28.15
reference: Job 28:15
source:
  edition: WLC
  text: לֹא יֻתַּ֣ן סְג֣וֹר תַּחְתֶּ֑י/הָ וְ/לֹ֥א יִ֝שָּׁקֵ֗ל כֶּ֣סֶף מְחִירָֽ/הּ־׃
translation:
  text: It cannot be given in exchange for fine gold, nor can silver be weighed as
    its price.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'pure gold' for 'fine gold.'
    reason: lexical_alternative
  - marker: b
    text: That is, silver cannot be weighed out to pay its price; the verse speaks
      of wisdom's inestimable value in the surrounding context.
    reason: cultural_note
lexical_decisions:
- source_word: יֻתַּן
  chosen: can be given
  alternatives:
  - is given
  - may be given
  lexicon: HALOT
  rationale: Passive of נתן here expresses what may be offered or paid; English modal
    'can be given' fits the impossibility stated by לֹא in this valuation context.
- source_word: סְגוֹר
  chosen: fine gold
  alternatives:
  - gold
  - pure gold
  lexicon: HALOT
  rationale: In wisdom/poetic valuation contexts סְגוֹר denotes refined or choice
    gold rather than gold in general. 'Fine gold' is idiomatic and preserves the sense
    of high-value refined gold.
- source_word: תַּחְתֶּיהָ
  chosen: in exchange for it
  alternatives:
  - for it
  - instead of it
  - under it
  lexicon: HALOT
  rationale: תחת with pronominal suffix commonly conveys substitution or exchange
    value here, not spatial 'under.' Since the antecedent is wisdom from the preceding
    context, 'in exchange for it' best captures the commercial comparison.
- source_word: יִשָּׁקֵל
  chosen: can be weighed
  alternatives:
  - is weighed
  - may be weighed
  lexicon: HALOT
  rationale: Passive of שקל refers to weighing out payment, especially silver as money.
    'Can be weighed' parallels the first colon's impossibility and reflects ancient
    payment by weight.
- source_word: כֶּסֶף
  chosen: silver
  alternatives:
  - money
  - silver money
  lexicon: HALOT
  rationale: The literal term is 'silver'; in context it functions as money, but retaining
    'silver' preserves the concrete ancient economic imagery.
- source_word: מְחִירָהּ
  chosen: its price
  alternatives:
  - its cost
  - its purchase price
  lexicon: HALOT
  rationale: מְחִיר denotes price or purchase value. 'Its price' is concise, natural
    English and matches the commercial metaphor.
