  category: mistranslation
  tier: 2
  from: It cannot be given in exchange for fine gold
  to: Fine gold cannot be given in exchange for it
  rationale: The current translation inverts the subject of the first clause. The
    Hebrew text is 'לֹא יֻתַּן סְגוֹר תַּחְתֶּיהָ' (lo yuttan segor tachteha), where
    'סְגוֹר' (fine gold) is the subject of the passive verb 'יֻתַּן' (cannot be given).
    The phrase 'תַּחְתֶּיהָ' (in exchange for it) is a prepositional phrase. The correct
    rendering is 'Fine gold cannot be given in exchange for it,' not 'It (wisdom)
    cannot be given in exchange for fine gold.' The draft incorrectly makes wisdom
    the subject being given, whereas the source text states that gold is what cannot
    be given for wisdom.
