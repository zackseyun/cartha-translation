id: JOB.28.5
reference: Job 28:5
source:
  edition: WLC
  text: אֶ֗רֶץ מִמֶּ֥/נָּה יֵֽצֵא לָ֑חֶם וְ֝/תַחְתֶּ֗י/הָ נֶהְפַּ֥ךְ כְּמוֹ אֵֽשׁ־־׃
translation:
  text: As for the earth, from it bread comes out, but underneath it is turned up
    as by fire.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and beneath it is overturned like fire.' The Hebrew comparison may describe
      either the manner ('as by fire') or simply likeness ('like fire').
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶרֶץ
  chosen: the earth
  alternatives:
  - the land
  lexicon: HALOT
  rationale: Rendered 'the earth' because the verse contrasts the surface that yields
    food with the subterranean region that is mined, fitting the broader sense of
    the ground/earth rather than a specific territory.
- source_word: מִמֶּנָּה
  chosen: from it
  alternatives:
  - out of it
  - from her
  lexicon: HALOT
  rationale: The feminine singular pronominal suffix refers back to 'earth.' English
    idiom prefers the neuter 'it' for inanimate referents.
- source_word: יֵצֵא
  chosen: comes out
  alternatives:
  - comes forth
  - is brought forth
  - springs out
  lexicon: HALOT
  rationale: The verb literally means 'goes out/comes out.' 'Comes out' preserves
    the concrete imagery while remaining natural English.
- source_word: לָחֶם
  chosen: bread
  alternatives:
  - food
  lexicon: HALOT
  rationale: Kept the concrete 'bread' rather than broadening to 'food,' since the
    Hebrew term is specific and the image is conventional for produce from the earth.
- source_word: וְתַחְתֶּיהָ
  chosen: but underneath it
  alternatives:
  - and beneath it
  - and under it
  lexicon: HALOT
  rationale: Rendered with an adversative nuance in English ('but') to reflect the
    contrast between the earth's fruitful surface and its disturbed underside. 'Underneath
    it' is a natural rendering of the prepositional phrase.
- source_word: נֶהְפַּךְ
  chosen: is turned up
  alternatives:
  - is overturned
  - is turned over
  - is upheaved
  lexicon: HALOT
  rationale: The Niphal of הפך conveys being turned/overturned. 'Is turned up' fits
    the mining context in Job 28, where the earth below is excavated and upheaved.
- source_word: כְּמוֹ אֵשׁ
  chosen: as by fire
  alternatives:
  - like fire
  - as fire
  lexicon: HALOT
  rationale: The comparison likely describes the earth's underside as transformed
    in a manner resembling the effects of fire. 'As by fire' communicates simile while
    sounding idiomatic in English.
