id: JOB.28.17
reference: Job 28:17
source:
  edition: WLC
  text: לֹא יַעַרְכֶ֣/נָּה זָ֭הָב וּ/זְכוֹכִ֑ית וּ/תְמ֖וּרָתָ֣/הּ כְּלִי פָֽז־־׃
translation:
  text: Gold and glass cannot equal it, nor can its exchange be an article of fine
    gold.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'crystal' for 'glass.' The Hebrew term זְכוֹכִית may be understood as
      a transparent luxury material; 'glass' is preferred here as the more likely
      lexical sense.
    reason: lexical_alternative
  - marker: b
    text: Or 'nor can a vessel of fine gold be given in exchange for it.' The Hebrew
      phrase כְּלִי פָז can be rendered more specifically as 'vessel of fine gold.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יַעַרְכֶנָּה
  chosen: cannot equal it
  alternatives:
  - cannot compare with it
  - cannot be valued against it
  - cannot match it
  lexicon: HALOT
  rationale: From ערך in the sense of setting in order/estimating/comparing. In this
    wisdom context about the incomparable worth of wisdom, 'equal it' captures the
    idea that gold and glass do not measure up to wisdom. The 3fs suffix refers back
    to wisdom in the surrounding context.
- source_word: זָהָב
  chosen: gold
  lexicon: HALOT
  rationale: Standard rendering for the precious metal; straightforward in context.
- source_word: זְכוֹכִית
  chosen: glass
  alternatives:
  - crystal
  lexicon: HALOT
  rationale: The term most naturally denotes glass, a luxury material in the ancient
    world. 'Crystal' is a traditional alternative, but 'glass' better reflects the
    likely lexical sense and avoids importing a more specific material not required
    by the Hebrew.
- source_word: תְמוּרָתָהּ
  chosen: its exchange
  alternatives:
  - its price
  - what is given in exchange for it
  - its equivalent
  lexicon: HALOT
  rationale: 'תְּמוּרָה denotes exchange/substitution. ''Its exchange'' preserves
    the concrete commercial metaphor: nothing can be traded for wisdom as an equivalent.'
- source_word: כְּלִי פָז
  chosen: an article of fine gold
  alternatives:
  - a vessel of fine gold
  - an object of pure gold
  lexicon: HALOT
  rationale: כְּלִי is a broad term for vessel, article, implement, or object. 'Article'
    is slightly broader and more natural in English here, while preserving the sense
    of a crafted item. פָּז denotes refined/fine gold, not merely generic gold.
