id: JOB.28.6
reference: Job 28:6
source:
  edition: WLC
  text: מְקוֹם סַפִּ֥יר אֲבָנֶ֑י/הָ וְ/עַפְרֹ֖ת זָהָ֣ב לֽ/וֹ־׃
translation:
  text: Its stones are the place of sapphire, and it has dust of gold.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly 'lapis lazuli' for 'sapphire'; the exact ancient gemstone denoted
      by the Hebrew term is uncertain.
    reason: lexical_alternative
lexical_decisions:
- source_word: מְקוֹם
  chosen: the place of
  alternatives:
  - a place of
  - the source of
  lexicon: HALOT
  rationale: מקום commonly means 'place' or 'location.' In this poetic mining context,
    it introduces what the earth/rock contains. Rendering it with the article in English
    ('the place of') gives a natural sense with the following construct chain while
    preserving the concrete imagery.
- source_word: סַפִּיר
  chosen: sapphire
  alternatives:
  - lapis lazuli
  lexicon: HALOT
  rationale: ספיר is traditionally rendered 'sapphire,' though the ancient referent
    may have overlapped with lapis lazuli. 'Sapphire' remains the standard accessible
    English rendering; the more specific mineral identification is uncertain and worth
    preserving as an alternative.
- source_word: אֲבָנֶיהָ
  chosen: its stones
  alternatives:
  - her stones
  - its rocks
  lexicon: HALOT
  rationale: The noun is 'stones' with a 3fs suffix, referring back to the earth/land/mining
    realm personified in the surrounding context. English idiom prefers 'its stones'
    rather than 'her stones' here, since the antecedent is not a female person in
    English.
- source_word: וְעַפְרֹת
  chosen: and ... dust
  alternatives:
  - and ... soil
  - and ... ore-dust
  lexicon: HALOT
  rationale: עפרות is a plural form related to 'dust/loose earth.' In context it describes
    particulate earth associated with gold. 'Dust' is concise and poetic, matching
    the Hebrew image better than the more interpretive 'ore.'
- source_word: זָהָב
  chosen: gold
  lexicon: HALOT
  rationale: Standard rendering of the noun for the precious metal.
- source_word: לוֹ
  chosen: it has
  alternatives:
  - belongs to it
  - is to it
  - in it
  lexicon: HALOT
  rationale: The preposition with pronominal suffix literally means 'to it/him,' but
    in this verbless poetic clause English requires an idiomatic predicate. 'It has
    dust of gold' best conveys possession/content in natural English while staying
    close to the Hebrew sense.
