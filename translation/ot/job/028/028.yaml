id: JOB.28.28
reference: Job 28:28
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר לָֽ/אָדָ֗ם הֵ֤ן יִרְאַ֣ת אֲ֭דֹנָ/י הִ֣יא חָכְמָ֑ה וְ/ס֖וּר מֵ/רָ֣ע
    בִּינָֽה׀׃ס
translation:
  text: And he said to man, ‘Behold, the fear of the Lord—that is wisdom, and to turn
    away from evil is understanding.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or ‘to humankind.’ The Hebrew אָדָם is singular ‘man’ used representatively
      for humanity.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: And he said
  alternatives:
  - Then he said
  lexicon: HALOT
  rationale: Wayyiqtol of אמר introduces the concluding divine declaration. 'And he
    said' preserves the narrative linkage without overinterpreting temporal sequence.
- source_word: לָאָדָם
  chosen: to man
  alternatives:
  - to humankind
  - to humanity
  lexicon: HALOT
  rationale: אָדָם here is generic humanity rather than a named individual. Per doctrine,
    gender-accurate language is preferred where the source uses representative masculine;
    'man' preserves the Hebrew form and traditional anthropological force. An inclusive
    alternative is worth preserving in a footnote.
- source_word: הֵן
  chosen: Behold
  alternatives:
  - See
  - Indeed
  lexicon: HALOT
  rationale: הֵן is a deictic/interjective particle drawing attention to the statement.
    'Behold' best preserves the marked solemnity of the Hebrew in wisdom discourse,
    though 'indeed' is possible.
- source_word: יִרְאַת אֲדֹנָי
  chosen: the fear of the Lord
  alternatives:
  - fear of the Lord
  lexicon: HALOT
  rationale: Construct phrase denoting reverent fear directed toward the Lord. 'Fear'
    should be retained rather than softened to 'reverence' because the Hebrew term
    carries the full weight of awe-filled fear in wisdom theology. אֲדֹנָי is rendered
    'the Lord' in keeping with the doctrine's default for divine title rendering.
- source_word: אֲדֹנָי
  chosen: the Lord
  alternatives:
  - Lord
  lexicon: HALOT
  rationale: The form in the consonantal text is אֲדֹנָי, a divine title. The doctrine's
    contested-terms table gives 'Lord' as the default rendering for this title family;
    with the English article in the phrase, 'the Lord' is idiomatic.
- source_word: הִיא
  chosen: that is
  alternatives:
  - is
  - it is
  lexicon: HALOT
  rationale: 'The independent pronoun adds emphasis/equation: ''that is wisdom.''
    Rendering it explicitly avoids flattening the Hebrew''s identificational force.'
- source_word: חָכְמָה
  chosen: wisdom
  lexicon: HALOT
  rationale: Standard wisdom-term in Job 28; no contextual reason to vary the gloss.
- source_word: וְסוּר
  chosen: and to turn away
  alternatives:
  - and departing
  - and to depart
  lexicon: HALOT
  rationale: Infinitive construct functioning as the second subject/complement in
    parallel with 'the fear of the Lord.' 'To turn away' is idiomatic and captures
    deliberate moral avoidance.
- source_word: מֵרָע
  chosen: from evil
  alternatives:
  - from harm
  - from what is evil
  lexicon: HALOT
  rationale: In wisdom context רָע denotes moral evil rather than merely calamity
    or harm. 'From evil' preserves the ethical sense required by the parallelism.
- source_word: בִּינָה
  chosen: understanding
  alternatives:
  - discernment
  lexicon: HALOT
  rationale: Standard rendering for בינה in wisdom literature. 'Understanding' matches
    the semantic field and pairs naturally with 'wisdom' in English.
