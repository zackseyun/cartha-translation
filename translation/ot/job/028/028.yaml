theological_decisions:
- issue: Rendering generic אָדָם
  chosen_reading: man
  alternative_readings:
  - humankind
  - humanity
  rationale: The Hebrew is grammatically singular masculine with representative force.
    Per doctrine, gender-accurate language is preferred over flattening to gender-neutral
    unless context demands otherwise. Because the referent is humanity in general,
    an inclusive alternative is preserved in a footnote for clarity.
  doctrine_reference: DOCTRINE.md Translation philosophy §4; Contested terms table
    for אָדָם
