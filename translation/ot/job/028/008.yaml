id: JOB.28.8
reference: Job 28:8
source:
  edition: WLC
  text: לֹֽא הִדְרִיכֻ֥/הוּ בְנֵי שָׁ֑חַץ לֹֽא עָדָ֖ה עָלָ֣י/ו שָֽׁחַל־־־׃
translation:
  text: The proud beasts have not trodden it; the lion has not passed over it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'the sons of pride.' The phrase likely refers to proud wild beasts,
      especially predators.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִדְרִיכֻהוּ
  chosen: have not trodden it
  alternatives:
  - have not guided it
  - have not walked it
  - have not set foot on it
  lexicon: HALOT
  rationale: From דרך in the Hiphil, the sense here is not 'guide' in a causative
    abstract sense but movement along a path. In context (a hidden path no creature
    knows), English 'have not trodden it' captures the idiom of traversing a way.
- source_word: בְנֵי שָׁחַץ
  chosen: the proud beasts
  alternatives:
  - the sons of pride
  - the proud ones
  - the proud beasts of prey
  lexicon: HALOT
  rationale: The construct phrase is literally 'sons of pride,' an idiomatic expression.
    In this poetic context, paired with שׁחל ('lion'), it most naturally refers to
    proud wild predators rather than abstract proud people. 'The proud beasts' preserves
    the imagery while remaining readable English.
- source_word: עָדָה עָלָיו
  chosen: has not passed over it
  alternatives:
  - has not gone over it
  - has not traversed it
  lexicon: HALOT
  rationale: The verb with על conveys moving over or across. 'Passed over it' is natural
    English and fits the parallel with 'trodden it' without implying a theological
    motif.
- source_word: שָׁחַל
  chosen: the lion
  alternatives:
  - the fierce lion
  - the lioness
  lexicon: HALOT
  rationale: שׁחל is a poetic term for a lion, often emphasizing strength or ferocity.
    'The lion' is the clearest natural rendering; the nuance of fierceness is already
    supplied by the poetic context.
