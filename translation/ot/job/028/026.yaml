id: JOB.28.26
reference: Job 28:26
source:
  edition: WLC
  text: בַּ/עֲשֹׂת֣/וֹ לַ/מָּטָ֣ר חֹ֑ק וְ֝/דֶ֗רֶךְ לַ/חֲזִ֥יז קֹלֽוֹת׃
translation:
  text: when he made a decree for the rain, and a path for the thunderbolt of the
    storms,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a path for the lightning of the thunders.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּעֲשׂוֹתוֹ
  chosen: when he made
  alternatives:
  - in his making
  - as he made
  lexicon: HALOT
  rationale: 'The preposition ב with the infinitive construct of עשה plus pronominal
    suffix is temporal here, introducing the circumstance of God''s ordering creation:
    ''when he made.'' This reads naturally in English while preserving the temporal
    force.'
- source_word: לַמָּטָר
  chosen: for the rain
  alternatives:
  - for rain
  lexicon: HALOT
  rationale: מָטָר denotes rain, here with the article. 'For the rain' preserves the
    Hebrew form and the sense that God assigned rain its appointed regulation.
- source_word: חֹק
  chosen: a decree
  alternatives:
  - a statute
  - a fixed limit
  - an ordinance
  lexicon: HALOT
  rationale: חֹק commonly refers to something prescribed or fixed. In this cosmological
    context it is a divinely established rule or boundary for rain. 'Decree' communicates
    an imposed, ordered regulation better than the more legal-sounding 'statute' or
    the narrower 'limit.'
- source_word: וְדֶרֶךְ
  chosen: and a path
  alternatives:
  - and a way
  lexicon: HALOT
  rationale: דֶּרֶךְ literally means 'way, path.' 'Path' fits the imagery of a course
    appointed through the sky and pairs well with the natural-force imagery of the
    verse.
- source_word: לַחֲזִיז
  chosen: for the thunderbolt
  alternatives:
  - for the lightning
  - for the flash
  lexicon: HALOT
  rationale: חֲזִיז in poetic contexts refers to a lightning flash or thunderbolt.
    'Thunderbolt' best conveys a forceful meteorological phenomenon moving along a
    divinely appointed path, matching the parallel with rain.
- source_word: קֹלוֹת
  chosen: of the storms
  alternatives:
  - of sounds
  - of thunders
  - of voices
  lexicon: HALOT
  rationale: קוֹל often means 'sound' or 'voice,' and in weather contexts can denote
    thunder. Because the plural here modifies חֲזִיז in a storm context, a natural
    English rendering is 'storms,' capturing the broader thunderous weather phenomenon.
    The more literal 'thunders' is possible and worth preserving in a footnote.
