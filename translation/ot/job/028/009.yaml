id: JOB.28.9
reference: Job 28:9
source:
  edition: WLC
  text: בַּֽ֭/חַלָּמִישׁ שָׁלַ֣ח יָד֑/וֹ הָפַ֖ךְ מִ/שֹּׁ֣רֶשׁ הָרִֽים׃
translation:
  text: He puts his hand to the flint; he overturns mountains from their roots.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'against the flint' / 'on the flinty rock.' The Hebrew may describe laying
      the hand upon hard rock in mining work.
    reason: lexical_alternative
  - marker: b
    text: Literally 'from the root of mountains'; the English plural 'their roots'
      reflects the collective sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּחַלָּמִישׁ
  chosen: to the flint
  alternatives:
  - against the flint
  - into the flint
  - on the flinty rock
  lexicon: HALOT
  rationale: חַלָּמִישׁ denotes hard rock or flint. The preposition ב here is idiomatic
    with שׁלח יד, expressing directed action toward the object worked on. 'To the
    flint' is concise and natural in English while preserving the image of mining
    into hard rock.
- source_word: שָׁלַח יָדוֹ
  chosen: He puts his hand
  alternatives:
  - He stretches out his hand
  - He lays his hand
  - He sends his hand
  lexicon: HALOT
  rationale: The idiom שׁלח יד commonly means to put forth or lay one's hand to something.
    In this mining context, 'puts his hand' communicates active human intervention
    without wooden literalism.
- source_word: הָפַךְ
  chosen: he overturns
  alternatives:
  - he upturns
  - he turns over
  - he overturns completely
  lexicon: HALOT
  rationale: הפך means to turn, overturn, or upend. In context of mining and excavation,
    'overturns' best conveys drastic disruption of the mountains.
- source_word: מִשֹּׁרֶשׁ
  chosen: from their roots
  alternatives:
  - from the root
  - at the roots
  - from the base
  lexicon: HALOT
  rationale: Though שֹׁרֶשׁ is singular in form after מן, it functions collectively
    with הָרִים. English idiom prefers the plural possessive 'their roots' to express
    mountains being overturned from the very base.
- source_word: הָרִים
  chosen: mountains
  alternatives:
  - the mountains
  - hills
  lexicon: HALOT
  rationale: הָרִים straightforwardly means 'mountains.' The article is not always
    reproduced in English when the sense is generic; here anarthrous English reads
    more naturally in poetic discourse.
