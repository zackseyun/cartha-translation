id: JOB.28.1
reference: Job 28:1
source:
  edition: WLC
  text: כִּ֤י יֵ֣שׁ לַ/כֶּ֣סֶף מוֹצָ֑א וּ֝/מָק֗וֹם לַ/זָּהָ֥ב יָזֹֽקּוּ׃
translation:
  text: Surely there is a mine for silver, and a place for gold that they refine.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'there is a source for silver.' The Hebrew מוֹצָא can mean 'source' or
      'place of origin'; 'mine' is chosen here because the surrounding context concerns
      mining and metal extraction.
    reason: lexical_alternative
  - marker: b
    text: Or 'a place for gold where they smelt it.' The verb can denote refining
      or smelting precious metal.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: Surely
  alternatives:
  - For
  - Indeed
  lexicon: HALOT
  rationale: In this poetic context opening a reflection, כִּי functions well as an
    asseverative or emphatic particle rather than a simple causal 'for.' 'Surely'
    captures the introductory force in natural English.
- source_word: יֵשׁ
  chosen: there is
  alternatives:
  - there exists
  lexicon: HALOT
  rationale: Existential particle; 'there is' is the standard natural English equivalent.
- source_word: לַכֶּסֶף
  chosen: for silver
  alternatives:
  - of silver
  lexicon: HALOT
  rationale: The preposition ל marks relation here with מוֹצָא, yielding the sense
    'for silver'—that is, silver has its source or mine. 'For silver' preserves the
    Hebrew structure more closely than recasting as an attributive genitive.
- source_word: מוֹצָא
  chosen: a mine
  alternatives:
  - a source
  - an outlet
  - a place of origin
  lexicon: HALOT
  rationale: מוֹצָא literally denotes a place of going out, source, or origin. In
    the mining context of Job 28, 'mine' best conveys the concrete sense intended,
    even though it is somewhat interpretive. The broader alternatives are preserved
    because the noun itself is not a technical mining term in isolation.
- source_word: וּמָקוֹם
  chosen: and a place
  alternatives:
  - and a location
  lexicon: HALOT
  rationale: Simple coordinate noun; 'place' is the natural and sufficiently broad
    rendering.
- source_word: לַזָּהָב
  chosen: for gold
  alternatives:
  - of gold
  lexicon: HALOT
  rationale: 'As with ''for silver,'' the preposition marks relation: a place designated
    for gold.'
- source_word: יָזֹקּוּ
  chosen: they refine
  alternatives:
  - they smelt
  - they melt
  - it is refined
  lexicon: HALOT
  rationale: The verb זקק in the Qal commonly carries the sense of refining or smelting
    metals. The 3mp form is naturally rendered with an indefinite subject in English,
    'they refine.' 'Smelt' is possible and more technical, but 'refine' is more broadly
    accessible while fitting the context.
