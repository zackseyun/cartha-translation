theological_decisions:
- issue: Subject continuity from the preceding verse
  chosen_reading: The implied subject is God ('he') continuing from v. 24.
  rationale: The infinitive clause depends on the description of God's wisdom and
    action in the surrounding context. Supplying 'he' in English is necessary for
    readability and reflects the Hebrew syntax in context, not an added theological
    claim.
