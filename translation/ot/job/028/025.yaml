id: JOB.28.25
reference: Job 28:25
source:
  edition: WLC
  text: לַ/עֲשׂ֣וֹת לָ/ר֣וּחַ מִשְׁקָ֑ל וּ֝/מַ֗יִם תִּכֵּ֥ן בְּ/מִדָּֽה׃
translation:
  text: when he gave the wind its weight and measured the waters by measure,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to make the wind a weight' or 'in making a weight for the wind.' The
      Hebrew infinitive can be rendered more formally, but the main text expresses
      the temporal sense in context.
    reason: lexical_alternative
  - marker: b
    text: '''Wind'' could also be translated ''spirit'' or ''breath'' in other contexts;
      here the parallel with ''waters'' favors the natural-world sense.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לַעֲשׂוֹת
  chosen: when he gave
  alternatives:
  - to make
  - in making
  lexicon: HALOT
  rationale: The infinitive construct of עשה with prefixed ל follows v. 24 and continues
    the temporal sequence of God's ordering activity. In English, 'when he gave' best
    captures the sense in context rather than a bare infinitive 'to make.' 'Gave'
    fits the collocation with מִשְׁקָל ('weight') more naturally than 'made.'
- source_word: לָרוּחַ
  chosen: the wind
  alternatives:
  - the spirit
  - the breath
  lexicon: HALOT
  rationale: רוּחַ can mean wind, spirit, or breath, but in this creation-order context
    paired with 'waters' the meteorological sense 'wind' is plainly intended.
- source_word: מִשְׁקָל
  chosen: its weight
  alternatives:
  - a weight
  - measure
  - balance
  lexicon: HALOT
  rationale: מִשְׁקָל denotes weight or weighing. With לָרוּחַ, the idiomatic sense
    is that God assigned the wind its proper weight. 'Its weight' makes the English
    natural while preserving the idea of measured ordering.
- source_word: וּמַיִם
  chosen: the waters
  alternatives:
  - water
  lexicon: HALOT
  rationale: Though morphologically plural, מַיִם often functions as a mass noun.
    'The waters' preserves the Hebrew plural form and fits the poetic parallelism.
- source_word: תִּכֵּן
  chosen: measured
  alternatives:
  - apportioned
  - regulated
  - determined
  lexicon: HALOT
  rationale: The verb תכן carries the sense of measuring, weighing, or determining
    precisely. 'Measured' matches the parallel with מִשְׁקָל and keeps the imagery
    of ordered quantification.
- source_word: בְּמִדָּה
  chosen: by measure
  alternatives:
  - with a measure
  - in measure
  - according to measure
  lexicon: HALOT
  rationale: בְּמִדָּה expresses measured proportion or standard. 'By measure' is
    concise, idiomatic enough in poetic English, and preserves the formal sense of
    quantified ordering.
