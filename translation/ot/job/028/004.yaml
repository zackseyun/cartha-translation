id: JOB.28.4
reference: Job 28:4
source:
  edition: WLC
  text: פָּ֤רַץ נַ֨חַל מֵֽ/עִם גָּ֗ר הַֽ/נִּשְׁכָּחִ֥ים מִנִּי רָ֑גֶל דַּ֖לּוּ מֵ/אֱנ֣וֹשׁ
    נָֽעוּ׀־־׃
translation:
  text: He breaks open a shaft away from where people dwell; forgotten by the foot,
    they hang far from men, they sway.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'He breaks open a channel/torrent-bed away from where a sojourner is.'
      The Hebrew is difficult, especially the words נחל and גר; many understand the
      line in light of the chapter's mining imagery and so render נחל as 'shaft.'
    reason: alternative_reading
  - marker: b
    text: Literally 'forgotten from/by foot.' The sense is that this place or these
      workers are beyond the notice or reach of those walking above.
    reason: lexical_alternative
  - marker: c
    text: Or 'they are lowered' or 'they dangle.' The Hebrew verb can suggest being
      suspended or let down, likely by ropes in a mine.
    reason: lexical_alternative
lexical_decisions:
- source_word: פָּרַץ
  chosen: breaks open
  alternatives:
  - bursts open
  - breaks through
  lexicon: HALOT
  rationale: The verb commonly means to break through or burst forth. In this mining
    context, it describes forcefully opening or cutting into the earth, best rendered
    with an active expression like 'breaks open'.
- source_word: נַחַל
  chosen: shaft
  alternatives:
  - wadi
  - torrent
  - channel
  lexicon: HALOT
  rationale: Although נחל often means 'wadi' or 'torrent valley,' in Job 28's mining
    context many interpreters understand it metaphorically or contextually as a mine-cut,
    channel, or shaft. 'Shaft' best fits the immediate imagery of subterranean excavation
    and the following clauses about being far from human foot traffic.
- source_word: מֵעִם
  chosen: away from
  alternatives:
  - from beside
  - from near
  lexicon: HALOT
  rationale: The preposition indicates separation from proximity. 'Away from' communicates
    the sense naturally in English.
- source_word: גָּר
  chosen: where people dwell
  alternatives:
  - the sojourner
  - the inhabitant
  - dwelling
  lexicon: HALOT
  rationale: 'The participial/noun form from גור can denote a sojourner or one dwelling
    temporarily. In this difficult line, the sense is locative and human: the mine
    shaft is opened away from inhabited places. Rendering the underlying idea rather
    than a wooden ''from with a sojourner'' produces intelligible English while staying
    within the likely sense.'
- source_word: הנשכחים
  chosen: forgotten
  alternatives:
  - those forgotten
  - neglected
  lexicon: HALOT
  rationale: Passive participle from שכח, 'to forget.' It describes the miners or
    the place as beyond ordinary human notice.
- source_word: מני רגל
  chosen: by the foot
  alternatives:
  - from the foot
  - by passersby
  - by human foot
  lexicon: HALOT
  rationale: Literally 'from/by foot.' In context it refers to being beyond the reach
    or notice of those walking above. 'Forgotten by the foot' preserves the vivid
    Hebrew compression while remaining understandable.
- source_word: דלו
  chosen: they hang
  alternatives:
  - they are suspended
  - they are let down
  lexicon: HALOT
  rationale: The verb can convey hanging down, being lowered, or dangling. In the
    mining scene, workers suspended by ropes is the most plausible image. 'They hang'
    is concise and vivid.
- source_word: מאנוש
  chosen: far from men
  alternatives:
  - away from mankind
  - from humanity
  lexicon: HALOT
  rationale: אֱנוֹשׁ denotes mortal man/human being. 'Men' is gender-accurate and
    idiomatic here, referring generically to human society from which the miners are
    removed.
- source_word: נעו
  chosen: they sway
  alternatives:
  - they move to and fro
  - they totter
  lexicon: HALOT
  rationale: The verb means to shake, stagger, or move back and forth. In context
    of suspended miners, 'they sway' fits naturally.
