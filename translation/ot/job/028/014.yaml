id: JOB.28.14
reference: Job 28:14
source:
  edition: WLC
  text: תְּה֣וֹם אָ֭מַר לֹ֣א בִ/י הִ֑יא וְ/יָ֥ם אָ֝מַ֗ר אֵ֣ין עִמָּדִֽ/י־׃
translation:
  text: The deep says, ‘It is not in me,’ and the sea says, ‘It is not with me.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''she is not in me.'' The feminine pronoun refers to wisdom, personified
      as feminine in the surrounding context.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תְּהוֹם
  chosen: the deep
  alternatives:
  - the abyss
  - the deep waters
  - the depths
  lexicon: HALOT
  rationale: תְּהוֹם denotes the primeval deep or great watery depth. 'The deep' is
    idiomatic, concise, and fits the poetic parallel with 'the sea' without over-specifying
    mythic or cosmological nuance.
- source_word: אָמַר
  chosen: says
  alternatives:
  - said
  lexicon: HALOT
  rationale: Although the Hebrew form is qatal, in poetic discourse it commonly functions
    as a present-like vivid statement in English. 'Says' preserves the personified
    immediacy of the parallel lines.
- source_word: לֹא בִי הִיא
  chosen: It is not in me
  alternatives:
  - She is not in me
  - It is not here with me
  lexicon: HALOT
  rationale: The feminine pronoun הִיא refers back to wisdom in the broader context
    (28:12, 20). English normally uses 'it' for an abstract noun here. 'In me' is
    the most direct rendering of בִי.
- source_word: יָם
  chosen: the sea
  alternatives:
  - the ocean
  lexicon: HALOT
  rationale: יָם is the ordinary term for 'sea.' 'Sea' preserves the Hebrew imagery
    and the parallelism with 'the deep' better than the more modern 'ocean.'
- source_word: אֵין עִמָּדִי
  chosen: It is not with me
  alternatives:
  - It is not beside me
  - I do not have it
  lexicon: HALOT
  rationale: The phrase literally means absence in one's company or possession. 'It
    is not with me' keeps the spatial-personal imagery and matches the first colon's
    style better than a more interpretive 'I do not have it.'
