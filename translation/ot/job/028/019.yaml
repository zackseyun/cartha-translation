id: JOB.28.19
reference: Job 28:19
source:
  edition: WLC
  text: לֹֽא יַ֭עַרְכֶ/נָּה פִּטְדַת כּ֑וּשׁ בְּ/כֶ֥תֶם טָ֝ה֗וֹר לֹ֣א תְסֻלֶּֽה־־׃פ
translation:
  text: The topaz of Cush cannot equal it; it cannot be valued in pure gold.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the chrysolite of Cush' or 'the peridot of Cush'; the exact identification
      of פִּטְדָה is uncertain.
    reason: lexical_alternative
lexical_decisions:
- source_word: יַעַרְכֶנָּה
  chosen: cannot equal it
  alternatives:
  - cannot compare with it
  - cannot match it
  lexicon: HALOT
  rationale: From ערך in the sense of being comparable in value or rank. In this wisdom-poem
    context about wisdom's incomparable worth, 'equal it' is concise and idiomatic
    while preserving the comparative sense. The 3fs suffix refers back to wisdom in
    the surrounding context, hence 'it'.
- source_word: פִּטְדַת כּוּשׁ
  chosen: the topaz of Cush
  alternatives:
  - the chrysolite of Cush
  - the peridot of Cush
  lexicon: HALOT
  rationale: פִּטְדָה denotes a precious stone, but exact mineral identification is
    uncertain. 'Topaz' is the traditional and widely recognized rendering; alternatives
    are possible and worth preserving in a footnote because ancient gemstone terminology
    is not fully precise. כּוּשׁ is transliterated conventionally as 'Cush,' not translated,
    in keeping with the policy to transliterate names.
- source_word: בְּכֶתֶם טָהוֹר
  chosen: in pure gold
  alternatives:
  - with pure gold
  - for pure gold
  lexicon: HALOT
  rationale: כֶּתֶם refers to fine or refined gold, and טָהוֹר adds the sense 'pure.'
    The preposition ב here is best taken instrumentally or with reference to valuation,
    yielding natural English 'in pure gold' in the idiom of pricing or valuation.
- source_word: תְסֻלֶּה
  chosen: it cannot be valued
  alternatives:
  - it cannot be weighed out
  - it cannot be appraised
  lexicon: HALOT
  rationale: From סלל/related valuation language in this context, the verb conveys
    assessment or pricing rather than literal physical weighing alone. 'Valued' fits
    the parallelism with the previous colon and the chapter's theme that wisdom cannot
    be purchased.
