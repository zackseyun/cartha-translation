id: JOB.28.12
reference: Job 28:12
source:
  edition: WLC
  text: וְֽ֭/הַ/חָכְמָה מֵ/אַ֣יִן תִּמָּצֵ֑א וְ/אֵ֥י זֶ֝ה מְק֣וֹם בִּינָֽה׃
translation:
  text: But where can wisdom be found, and where is the place of understanding?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'from where will wisdom be found?'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהַחָכְמָה
  chosen: But wisdom
  alternatives:
  - And wisdom
  - Now wisdom
  lexicon: HALOT
  rationale: הַחָכְמָה means 'the wisdom' or 'wisdom.' In English, the abstract noun
    is naturally rendered without the article. The prefixed וְ here is rendered 'But'
    to mark the rhetorical turn from mining earthly treasures in the preceding context
    to the question of wisdom's source; 'And' is possible but weaker in English discourse.
- source_word: מֵאַיִן
  chosen: where
  alternatives:
  - from where
  - whence
  lexicon: HALOT
  rationale: The phrase literally means 'from where,' asking about origin or source.
    In idiomatic modern English with the passive verb that follows, 'where' communicates
    the sense clearly; 'whence' is too archaic, and 'from where' is more wooden.
- source_word: תִּמָּצֵא
  chosen: can be found
  alternatives:
  - is found
  - will be found
  lexicon: HALOT
  rationale: Niphal imperfect of מצא, 'to be found.' In this poetic interrogative
    context, English 'can be found' best conveys the modal/rhetorical force of the
    question rather than a simple future prediction. 'Is found' is too flat; 'will
    be found' sounds overly future-oriented.
- source_word: וְאֵי
  chosen: and where
  alternatives:
  - and in what place
  - and where then
  lexicon: HALOT
  rationale: אֵי is an interrogative adverb, 'where?' The conjunction is retained
    as 'and,' linking the parallel cola.
- source_word: זֶה
  chosen: is
  alternatives:
  - this is
  - that is
  lexicon: HALOT
  rationale: זֶה literally means 'this,' but in the idiom אֵי זֶה מְקוֹם it functions
    with the following noun to ask 'where is the place...?' English omits a wooden
    'this' and supplies the natural copular sense.
- source_word: מְקוֹם
  chosen: the place
  alternatives:
  - place
  - location
  lexicon: HALOT
  rationale: מְקוֹם means 'place.' The article is supplied in English because the
    construct-like sense with the following abstract noun is most natural as 'the
    place of understanding.' 'Location' is too technical.
- source_word: בִּינָה
  chosen: understanding
  alternatives:
  - discernment
  - insight
  lexicon: HALOT
  rationale: בִּינָה denotes understanding or discernment. 'Understanding' best matches
    the common wisdom vocabulary and preserves the parallelism with 'wisdom.'
