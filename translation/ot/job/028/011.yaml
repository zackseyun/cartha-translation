id: JOB.28.11
reference: Job 28:11
source:
  edition: WLC
  text: מִ֭/בְּכִי נְהָר֣וֹת חִבֵּ֑שׁ וְ֝/תַעֲלֻמָ֗הּ יֹ֣צִא אֽוֹר׃פ
translation:
  text: He dams up the sources of the rivers, and brings what is hidden out to the
    light.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'He binds up the seepage of the rivers'; the Hebrew term rendered 'sources'
      is rare and may evoke 'weeping' or trickling water.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִבְּכִי
  chosen: the sources of
  alternatives:
  - from weeping
  - the seepage of
  - the trickling of
  lexicon: HALOT
  rationale: The noun is rare and difficult. In context of mining and water control
    in Job 28, it most plausibly refers to seepage, springs, or water-sources rather
    than literal 'weeping.' Rendering it as 'the sources of' gives clear English sense
    while reflecting the idea of places where river-water issues or seeps out. The
    more literal imagery of 'weeping' is preserved in a footnote as a lexical alternative.
- source_word: נְהָרוֹת
  chosen: the rivers
  alternatives:
  - streams
  lexicon: HALOT
  rationale: Standard plural of 'river.' 'Rivers' fits normal usage and the larger
    imagery of subterranean watercourses.
- source_word: חִבֵּשׁ
  chosen: dams up
  alternatives:
  - binds
  - stops up
  - restrains
  lexicon: HALOT
  rationale: The verb commonly carries the sense of binding or restraining. In this
    context of preventing water flow in mining operations, 'dams up' communicates
    the practical effect in idiomatic English without excessive paraphrase.
- source_word: תַּעֲלֻמָהּ
  chosen: what is hidden
  alternatives:
  - the hidden thing
  - concealed treasure
  - hidden ore
  lexicon: HALOT
  rationale: The noun denotes something hidden or concealed. The suffix is best taken
    idiomatically in context rather than requiring an explicit English possessive.
    'What is hidden' preserves the broad sense and allows the line to refer either
    to hidden resources or hidden things generally.
- source_word: יֹצִא
  chosen: brings out
  alternatives:
  - brings forth
  - causes to come out
  lexicon: HALOT
  rationale: Hiphil of יצא means to cause to come out. 'Brings out' is natural modern
    English and semantically precise.
- source_word: אוֹר
  chosen: to the light
  alternatives:
  - into the light
  - light
  lexicon: HALOT
  rationale: The idiom 'bring out to the light' is natural in English and preserves
    the contrast between hiddenness and exposure.
