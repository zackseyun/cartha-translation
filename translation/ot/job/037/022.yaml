id: JOB.37.22
reference: Job 37:22
source:
  edition: WLC
  text: מִ֭/צָּפוֹן זָהָ֣ב יֶֽאֱתֶ֑ה עַל אֱ֝ל֗וֹהַּ נ֣וֹרָא הֽוֹד־׃
translation:
  text: From the north comes golden splendor; around God is awesome majesty.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'gold comes'; the Hebrew likely uses 'gold' figuratively for golden brightness
      or splendor.
    reason: lexical_alternative
  - marker: b
    text: Or 'upon God is fearsome splendor/majesty.'
    reason: alternative_reading
lexical_decisions:
- source_word: מִצָּפוֹן
  chosen: From the north
  alternatives:
  - Out of the north
  - From Zaphon
  lexicon: HALOT
  rationale: The preposition מִן plus צָפוֹן most naturally denotes direction/source,
    'from the north.' Although צָפוֹן can in some contexts evoke the mythic mountain
    Zaphon, here the weather-theophany context in Elihu's speech favors the ordinary
    directional sense.
- source_word: זָהָב
  chosen: golden splendor
  alternatives:
  - gold
  - brightness
  - fair weather
  lexicon: HALOT
  rationale: Literally 'gold.' In context, a strictly material sense is awkward; the
    term likely describes a golden radiance or brightness associated with the sky.
    'Golden splendor' preserves the imagery while making sense in English. 'Fair weather'
    reflects an interpretive tradition but is more paraphrastic and less directly
    tied to the Hebrew noun.
- source_word: יֶאֱתֶה
  chosen: comes
  alternatives:
  - comes forth
  - arrives
  - shines forth
  lexicon: HALOT
  rationale: The verb denotes coming/approaching. 'Comes' is the most natural concise
    rendering in English. 'Shines forth' would over-specify the action from the context
    rather than the verb itself.
- source_word: עַל
  chosen: around
  alternatives:
  - upon
  - over
  lexicon: HALOT
  rationale: While עַל commonly means 'upon/over,' in this poetic clause 'around God
    is awesome majesty' gives idiomatic English and fits the sense of majesty enveloping
    God. A more wooden 'upon God' is awkward and potentially misleading in English.
- source_word: אֱלוֹהַּ
  chosen: God
  alternatives:
  - God Almighty
  - God himself
  lexicon: HALOT
  rationale: אֱלוֹהַּ is the singular common noun for God, frequent in Job. 'God'
    is the direct and sufficient rendering; the Hebrew here does not add 'Almighty'
    or an emphatic pronoun.
- source_word: נוֹרָא
  chosen: awesome
  alternatives:
  - fearsome
  - terrible
  - dreadful
  lexicon: HALOT
  rationale: The participial/adjectival form from ירא conveys that which inspires
    fear/awe. 'Awesome' in this elevated context communicates reverential dread without
    implying moral evil. 'Terrible' in modern English can mislead.
- source_word: הוֹד
  chosen: majesty
  alternatives:
  - splendor
  - glory
  - honor
  lexicon: HALOT
  rationale: הוֹד often denotes majesty or splendor, especially in divine descriptions.
    'Majesty' fits the predication about God well and avoids repeating 'splendor'
    used earlier for זָהָב.
