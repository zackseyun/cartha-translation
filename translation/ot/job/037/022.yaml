theological_decisions:
- issue: Interpretation of the imagery in the first colon
  chosen_reading: A poetic description of golden radiance coming from the north
  alternative_readings:
  - A reference to fair weather coming out of the north
  - A mythic allusion to Mount Zaphon/the divine north
  rationale: The immediate context is meteorological and theophanic, so the translation
    keeps the image concrete and poetic without importing a stronger mythological
    claim than the Hebrew requires. The wording 'golden splendor' preserves the ambiguity
    better than a flattened 'fair weather.'
  doctrine_reference: Translation philosophy §§1, 3, 6
