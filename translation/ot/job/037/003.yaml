id: JOB.37.3
reference: Job 37:3
source:
  edition: WLC
  text: תַּֽחַת כָּל הַ/שָּׁמַ֥יִם יִשְׁרֵ֑/הוּ וְ֝/אוֹר֗/וֹ עַל כַּנְפ֥וֹת הָ/אָֽרֶץ־־־׃
translation:
  text: Under all the heavens he sends it out, and his lightning to the ends of the
    earth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and his light upon the ends/corners of the earth.' The Hebrew uses 'his
      light,' which in context likely refers to lightning.
    reason: lexical_alternative
  - marker: b
    text: Literally 'upon the wings of the earth,' a Hebrew idiom for the earth's
      extremities.
    reason: cultural_note
lexical_decisions:
- source_word: תַּחַת
  chosen: under
  alternatives:
  - beneath
  lexicon: HALOT
  rationale: The preposition literally means 'under/beneath.' In this poetic context,
    'under all the heavens' is a natural English rendering that preserves the spatial
    imagery without paraphrase.
- source_word: כָּל הַשָּׁמַיִם
  chosen: all the heavens
  alternatives:
  - the whole sky
  - all the sky
  lexicon: HALOT
  rationale: The Hebrew is literally 'all the heavens.' Retaining the plural 'heavens'
    reflects the source wording and poetic register better than flattening to singular
    'sky.'
- source_word: יִשְׁרֵהוּ
  chosen: he sends it out
  alternatives:
  - he directs it
  - he lets it loose
  - he spreads it
  lexicon: HALOT
  rationale: From the verb שׁרה/related poetic usage, the sense in context is of sending
    forth or directing the thunder/lightning across the sky. 'He sends it out' is
    idiomatic English and leaves the object somewhat implicit, matching the Hebrew
    suffix while fitting the storm context.
- source_word: וְאוֹרוֹ
  chosen: and his lightning
  alternatives:
  - and his light
  lexicon: HALOT
  rationale: Although אוֹר normally means 'light,' in the immediate context of storm-theophany
    and parallelism with the previous clause, it most naturally refers to the flash
    of lightning. 'His lightning' communicates the intended referent in clear modern
    English. The more literal 'his light' is preserved as an alternative.
- source_word: עַל
  chosen: to
  alternatives:
  - upon
  - over
  lexicon: HALOT
  rationale: The preposition is literally 'upon/over,' but with the motion implied
    by the verb and the idiom of extent, English 'to' better conveys the reach of
    the lightning in this line. This is an optimal-equivalence adjustment for readability.
- source_word: כַּנְפוֹת הָאָרֶץ
  chosen: the ends of the earth
  alternatives:
  - the corners of the earth
  - the wings of the earth
  - the edges of the earth
  lexicon: HALOT
  rationale: Literally 'the wings of the earth,' an idiom for extremities or farthest
    reaches. 'The ends of the earth' is the clearest natural English equivalent. 'Corners
    of the earth' is possible, but 'ends' better avoids over-literalizing the image
    while preserving the sense.
