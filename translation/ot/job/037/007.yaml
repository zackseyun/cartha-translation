id: JOB.37.7
reference: Job 37:7
source:
  edition: WLC
  text: בְּ/יַד כָּל אָדָ֥ם יַחְתּ֑וֹם לָ֝/דַ֗עַת כָּל אַנְשֵׁ֥י מַעֲשֵֽׂ/הוּ־־־׃
translation:
  text: He seals the hand of every man, so that all people may know his work.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'He seals up the hand of every man.' The Hebrew expression likely means
      that God halts ordinary human labor.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'every man' / 'all men'; the wording is generic for humanity.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּיָד
  chosen: the hand
  alternatives:
  - in the hand
  - upon the hand
  lexicon: HALOT
  rationale: The preposition ב with יָד is best represented idiomatically as the direct
    object phrase 'the hand' with the verb 'seals.' More literal options like 'in
    the hand' are possible, but English idiom favors 'seals the hand' for this difficult
    expression.
- source_word: כָּל אָדָם
  chosen: every man
  alternatives:
  - every person
  - all humankind
  lexicon: HALOT
  rationale: אָדָם here is singular generic. Per the project's gender-accurate policy
    and the contested-terms guidance, 'man' is acceptable where representative/generic
    force is intended. In the running English sentence, this is balanced by the following
    plural phrase 'all people' for readability.
- source_word: יַחְתּוֹם
  chosen: he seals
  alternatives:
  - he seals up
  - he puts a seal on
  lexicon: HALOT
  rationale: The Qal of חתם means 'seal' or 'affix a seal.' 'He seals' is concise
    and preserves the metaphor. 'Seals up' may over-specify closure, while 'puts a
    seal on' is more paraphrastic.
- source_word: לָדַעַת
  chosen: so that ... may know
  alternatives:
  - to know
  - for knowing
  lexicon: HALOT
  rationale: The infinitive construct with ל here expresses purpose/result. Rendering
    it as 'so that ... may know' conveys the clause's natural force in English.
- source_word: כָּל אַנְשֵׁי
  chosen: all people
  alternatives:
  - all men
  - all mortals
  lexicon: HALOT
  rationale: Though אַנְשֵׁי is formally masculine plural ('men of'), the phrase is
    inclusive in sense. 'All people' communicates the collective reference in natural
    English without distorting the meaning.
- source_word: מַעֲשֵׂהוּ
  chosen: his work
  alternatives:
  - his deed
  - what he has done
  lexicon: HALOT
  rationale: The singular with 3ms suffix naturally yields 'his work.' In context
    the referent is God and likely denotes his activity generally rather than one
    isolated deed. 'What he has done' is smoother but less formally tied to the noun.
