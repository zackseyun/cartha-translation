theological_decisions:
- issue: Referent of the pronoun in עֻזּוֹ
  chosen_reading: The pronoun refers to God, yielding 'his might.'
  alternative_readings:
  - The pronoun refers to the rain/snow, yielding 'its force'.
  rationale: In the immediate context God is the one speaking to the weather and governing
    it. Reading the suffix as referring to God best fits the flow of Elihu's description
    of divine sovereignty over creation. This is not a doctrinally contested term,
    but it is an interpretive decision affecting the line's meaning.
