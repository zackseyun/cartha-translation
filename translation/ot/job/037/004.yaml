id: JOB.37.4
reference: Job 37:4
source:
  edition: WLC
  text: אַחֲרָ֤י/ו יִשְׁאַג ק֗וֹל יַ֭רְעֵם בְּ/ק֣וֹל גְּאוֹנ֑/וֹ וְ/לֹ֥א יְ֝עַקְּבֵ֗/ם
    כִּֽי יִשָּׁמַ֥ע קוֹלֽ/וֹ׀־־׃
translation:
  text: After it, a voice roars; he thunders with his majestic voice, and he does
    not hold them back when his voice is heard.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Afterward, a voice roars.' The Hebrew may be taken adverbially, but
      the context likely points back to the lightning in the previous verse.
    reason: lexical_alternative
  - marker: b
    text: Or 'and he does not delay them,' with 'them' likely referring to the thunderbolts
      or storm effects released with the thunder.
    reason: lexical_alternative
  - marker: c
    text: Or 'for/because his voice is heard.' The Hebrew conjunction can be read
      causally as well as temporally.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַחֲרָיו
  chosen: After it
  alternatives:
  - After him
  - Afterward
  lexicon: HALOT
  rationale: 'The preposition with 3ms suffix most naturally refers back to the lightning
    in the preceding verse: after it, the thunderous voice follows. ''Afterward''
    is possible idiomatically, but ''After it'' preserves the anaphoric link more
    clearly.'
- source_word: יִשְׁאַג קוֹל
  chosen: a voice roars
  alternatives:
  - his voice roars
  - a sound roars
  lexicon: HALOT
  rationale: שׁאג commonly denotes the roaring of a lion and is used metaphorically
    for thunder. With קוֹל as subject, 'a voice roars' keeps the vivid personified
    imagery. 'His voice roars' would import the suffix from later words too early.
- source_word: יַרְעֵם
  chosen: he thunders
  alternatives:
  - he causes thunder
  - he roars thunderously
  lexicon: HALOT
  rationale: The Hiphil of רעם here refers to God producing thunder. 'He thunders'
    is idiomatic modern English and preserves the divine agency without awkward causative
    phrasing.
- source_word: בְּקוֹל גְּאוֹנוֹ
  chosen: with his majestic voice
  alternatives:
  - with the voice of his majesty
  - with his exalted voice
  lexicon: HALOT
  rationale: גָּאוֹן can denote majesty, exaltation, or grandeur. 'With his majestic
    voice' is natural English while retaining the sense of divine grandeur. A more
    formal rendering is preserved as an alternative.
- source_word: וְלֹא יְעַקְּבֵם
  chosen: and he does not hold them back
  alternatives:
  - and he does not delay them
  - and he does not restrain them
  lexicon: HALOT
  rationale: עקב in the Piel can mean hold back, hinder, or delay. The 3mp suffix
    likely refers to the thunderbolts/lightnings or storm effects just mentioned in
    context. 'Hold them back' best captures the sense of unhindered release while
    leaving the antecedent implicit as in Hebrew.
- source_word: כִּי יִשָּׁמַע קוֹלוֹ
  chosen: when his voice is heard
  alternatives:
  - because his voice is heard
  - for his voice is heard
  lexicon: HALOT
  rationale: 'כִּי can be causal (''because/for'') or temporal in context. Here a
    temporal nuance fits the storm sequence: once his voice is heard, he does not
    hold them back. ''When'' communicates this naturally in English.'
