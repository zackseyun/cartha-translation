theological_decisions:
- issue: Referent of the roaring/thundering subject
  chosen_reading: The subject is God, whose voice is manifested in thunder.
  alternative_readings:
  - The subject could be an impersonal storm/voice rather than explicitly God.
  rationale: In the immediate context Elihu is describing God's activity in the storm,
    and the possessive 'his majestic voice' strongly supports a personal divine referent.
    The translation keeps the masculine singular pronoun without over-explicating
    'God' in the text.
