id: JOB.37.5
reference: Job 37:5
source:
  edition: WLC
  text: יַרְעֵ֤ם אֵ֣ל בְּ֭/קוֹל/וֹ נִפְלָא֑וֹת עֹשֶׂ֥ה גְ֝דֹל֗וֹת וְ/לֹ֣א נֵדָֽע׃
translation:
  text: God thunders wondrously with his voice; he does great things that we do not
    know.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''God thunders wonders with his voice''; the Hebrew ''wondrous things''
      may be taken more literally, but here it likely functions adverbially: ''wondrously.'''
    reason: lexical_alternative
  - marker: b
    text: Or 'great things beyond our knowledge' or 'great things we cannot comprehend.'
    reason: alternative_reading
lexical_decisions:
- source_word: יַרְעֵם
  chosen: thunders
  alternatives:
  - thunders forth
  - roars
  - causes thunder
  lexicon: HALOT
  rationale: Hiphil of רעם commonly denotes producing thunder or thundering. In context
    of God's voice and storm imagery, the intransitive English 'thunders' is the most
    natural optimal-equivalence rendering.
- source_word: אֵל
  chosen: God
  alternatives:
  - Mighty God
  - God Almighty
  lexicon: HALOT
  rationale: The common divine title אֵל here refers to God generically, not requiring
    an expanded title. 'God' is clear and idiomatic.
- source_word: בְּקוֹלוֹ
  chosen: with his voice
  alternatives:
  - by his voice
  - in his voice
  lexicon: HALOT
  rationale: The preposition ב with קול can be rendered instrumentally. 'With his
    voice' is natural English and preserves the sense that God's voice is the means
    or accompaniment of the thunder.
- source_word: נִפְלָאוֹת
  chosen: wondrously
  alternatives:
  - wonderfully
  - marvelously
  - wonders
  lexicon: HALOT
  rationale: 'Although formally a plural form (''wonders/wondrous things''), in this
    clause it functions adverbially with the verb ''thunders'': God thunders in a
    wondrous way. This avoids an awkward English construction like ''thunders wonders''
    while preserving the sense of marvel.'
- source_word: עֹשֶׂה
  chosen: does
  alternatives:
  - works
  - performs
  - makes
  lexicon: HALOT
  rationale: עשה is broad and commonly rendered 'do/make.' Here 'does' fits the following
    adjective and keeps the statement general.
- source_word: גְּדֹלוֹת
  chosen: great things
  alternatives:
  - great deeds
  - great works
  lexicon: HALOT
  rationale: 'The feminine plural adjective is used substantivally with עשה understood:
    ''does great things.'' ''Great things'' is idiomatic and broad enough for the
    context.'
- source_word: וְלֹא נֵדָע
  chosen: that we do not know
  alternatives:
  - and we do not know
  - beyond our knowledge
  - which we cannot comprehend
  lexicon: HALOT
  rationale: 'The Hebrew is literally ''and not we know.'' In English, attaching it
    as a relative clause to ''great things'' best conveys the sense: these are things
    unknown to us. ''Cannot comprehend'' is interpretive and stronger than the text''s
    explicit wording.'
