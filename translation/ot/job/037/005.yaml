theological_decisions:
- issue: Scope of human ignorance in the final clause
  chosen_reading: The verse states that God's great works are unknown to us, without
    expanding this into a stronger claim about total incomprehensibility.
  alternative_readings:
  - God does great things beyond our understanding
  - God does great things we cannot comprehend
  rationale: The Hebrew verb ידע means 'know.' While the context supports human limitation
    before divine power, the translation should not intensify the claim beyond the
    lexical value of the verb. This preserves theological tension without overinterpretation.
  doctrine_reference: Translation philosophy §3
