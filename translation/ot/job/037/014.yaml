theological_decisions:
- issue: Rendering of the divine title אֵל
  chosen_reading: God
  alternative_readings:
  - Mighty God
  rationale: The verse refers generally to the divine wonders and does not require
    a more interpretively loaded rendering. 'God' preserves the plain sense without
    importing additional emphasis not explicit in the Hebrew.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; readable modern English'
