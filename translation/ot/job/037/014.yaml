id: JOB.37.14
reference: Job 37:14
source:
  edition: WLC
  text: הַאֲזִ֣ינָ/ה זֹּ֣את אִיּ֑וֹב עֲ֝מֹ֗ד וְ/הִתְבּוֹנֵ֤ן נִפְלְא֬וֹת אֵֽל׀׃
translation:
  text: Listen to this, Job; stand still and consider the wonders of God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Give ear to this, Job.'
    reason: lexical_alternative
  - marker: b
    text: Or 'stand' or 'take your stand.'
    reason: lexical_alternative
  - marker: c
    text: Or 'the wondrous deeds of God.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַאֲזִינָה
  chosen: Listen
  alternatives:
  - Give ear
  - Hear this
  lexicon: HALOT
  rationale: Imperative of אזן calling for attentive listening. 'Listen' is clear
    modern English and preserves the force without archaism.
- source_word: זֹּאת
  chosen: to this
  alternatives:
  - this
  - these things
  lexicon: HALOT
  rationale: The feminine singular demonstrative most naturally points to what Elihu
    is about to say or has just said. In English, 'listen to this' is idiomatic and
    fits the imperative construction.
- source_word: אִיּוֹב
  chosen: Job
  rationale: Personal name transliterated by standard English convention, in keeping
    with the translation philosophy.
- source_word: עֲמֹד
  chosen: stand still
  alternatives:
  - stand
  - take your stand
  lexicon: HALOT
  rationale: The imperative of עמד means 'stand.' In context, paired with the next
    imperative, it carries the sense of stopping and taking a fixed posture for reflection;
    'stand still' brings out that nuance naturally in English.
- source_word: וְהִתְבּוֹנֵן
  chosen: and consider
  alternatives:
  - and reflect on
  - and understand
  lexicon: HALOT
  rationale: Hitpolel imperative of בין conveys attentive consideration or reflection.
    'Consider' is concise, natural, and suitably weighty.
- source_word: נִפְלְאוֹת
  chosen: the wonders
  alternatives:
  - the marvelous works
  - the wondrous deeds
  lexicon: HALOT
  rationale: Plural noun from פלא referring to extraordinary, wonderful acts. 'Wonders'
    is the most direct and idiomatic rendering here.
- source_word: אֵל
  chosen: God
  alternatives:
  - Mighty God
  - God Almighty
  lexicon: HALOT
  rationale: אֵל is the common Semitic term for God. Here it functions as a divine
    title/name reference, and 'God' is the standard English rendering. 'Mighty God'
    would over-translate the term in this context.
