id: JOB.37.1
reference: Job 37:1
source:
  edition: WLC
  text: אַף לְ֭/זֹאת יֶחֱרַ֣ד לִבִּ֑/י וְ֝/יִתַּ֗ר מִ/מְּקוֹמֽ/וֹ־׃
translation:
  text: At this also my heart trembles and leaps from its place.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'quakes' for 'trembles'; the Hebrew verb can denote shaking from fear,
      awe, or agitation.
    reason: lexical_alternative
  - marker: b
    text: Or 'jumps out of its place'; the Hebrew expression vividly portrays the
      heart as suddenly displaced.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַף
  chosen: At this also
  alternatives:
  - Indeed
  - Even now
  - Yes, at this
  lexicon: HALOT
  rationale: Here אַף functions adverbially/intensively, linking with לְזֹאת to mean
    'also/indeed at this.' Rendering it with 'also' preserves the connective force
    without overtranslating.
- source_word: לְזֹאת
  chosen: At this
  alternatives:
  - Because of this
  - For this
  - At this too
  lexicon: HALOT
  rationale: The preposition ל with זאת in this context points to the immediately
    preceding phenomenon and is naturally rendered 'at this' or 'because of this.'
    'At this' fits the emotional reaction described in the verse and reads well in
    English.
- source_word: יֶחֱרַד
  chosen: trembles
  alternatives:
  - quakes
  - shudders
  - is terrified
  lexicon: HALOT
  rationale: חרד denotes trembling or quaking from fear, awe, or agitation. 'Trembles'
    is broad enough to preserve the emotional intensity without specifying terror
    more strongly than the Hebrew requires.
- source_word: לִבִּי
  chosen: my heart
  lexicon: HALOT
  rationale: '''Heart'' is the standard rendering and in Hebrew anthropology denotes
    the inner person, including emotion and resolve. No paraphrase such as ''I'' or
    ''my mind'' is warranted.'
- source_word: וְיִתַּר
  chosen: leaps
  alternatives:
  - jumps
  - is stirred
  - moves violently
  lexicon: HALOT
  rationale: The verb יתר here is difficult, but in context it describes sudden movement
    of the heart from its place. 'Leaps' captures the vivid physical metaphor better
    than a flatter rendering like 'is moved.'
- source_word: מִמְּקוֹמוֹ
  chosen: from its place
  alternatives:
  - out of its place
  - from its position
  lexicon: HALOT
  rationale: The suffix refers back to 'my heart' and the idiom depicts the heart
    as jolted from its normal place. 'From its place' is idiomatic and sufficiently
    literal.
