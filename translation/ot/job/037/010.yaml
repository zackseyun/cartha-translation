id: JOB.37.10
reference: Job 37:10
source:
  edition: WLC
  text: מִ/נִּשְׁמַת אֵ֥ל יִתֶּן קָ֑רַח וְ/רֹ֖חַב מַ֣יִם בְּ/מוּצָֽק־־׃
translation:
  text: From the breath of God ice is given, and the broad expanse of waters is frozen
    solid.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'By the breath of God ice is given.' The Hebrew preposition can express
      either source ('from') or means ('by').
    reason: lexical_alternative
  - marker: b
    text: Or 'the breadth of the waters is congealed' or 'becomes hard.' The Hebrew
      expression is poetic and may refer to the wide surface of the waters becoming
      solid.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִנִּשְׁמַת
  chosen: From the breath of
  alternatives:
  - By the breath of
  - From the blast of
  lexicon: HALOT
  rationale: 'נִשְׁמָה commonly denotes breath or breathing. With the prefixed מִן,
    the sense is source or means: ''from/by the breath of.'' ''Breath'' preserves
    the concrete imagery better than a more interpretive rendering.'
- source_word: אֵל
  chosen: God
  alternatives:
  - God Almighty
  - Mighty God
  lexicon: HALOT
  rationale: אֵל here is the common divine title 'God.' Nothing in the immediate context
    requires expansion to 'God Almighty'; the simple title best matches the Hebrew.
- source_word: יִתֶּן
  chosen: is given
  alternatives:
  - gives
  - produces
  lexicon: HALOT
  rationale: The verb נתן is literally 'gives.' An English passive ('is given') yields
    a natural line while preserving the Hebrew idea that ice comes forth by divine
    agency. 'Produces' is possible but more interpretive.
- source_word: קָרַח
  chosen: ice
  alternatives:
  - frost
  lexicon: HALOT
  rationale: קָרַח denotes ice rather than the lighter phenomenon of frost. 'Ice'
    fits the parallel with waters becoming solid.
- source_word: וְרֹחַב
  chosen: the broad expanse of
  alternatives:
  - the breadth of
  - the wide surface of
  lexicon: HALOT
  rationale: רֹחַב means breadth, width, or broad expanse. In context with waters,
    it likely refers to the wide spread or surface area of the waters rather than
    an abstract measurement. 'Broad expanse' communicates this naturally.
- source_word: מַיִם
  chosen: waters
  alternatives:
  - water
  lexicon: HALOT
  rationale: The Hebrew plural is retained as 'waters,' which is idiomatic in elevated
    English and suits the poetic register.
- source_word: בְּמוּצָק
  chosen: is frozen solid
  alternatives:
  - becomes hard
  - is cast firm
  - is congealed
  lexicon: HALOT
  rationale: מוּצָק conveys something poured into a mold, hence cast, hardened, or
    made firm. In this meteorological context, the sense is that the waters become
    solid/frozen. 'Frozen solid' expresses the contextual force in clear modern English.
