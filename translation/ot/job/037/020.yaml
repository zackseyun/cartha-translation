theological_decisions:
- issue: Referential pronoun for God
  chosen_reading: Render לוֹ as 'to him' rather than capitalized 'to Him'
  alternative_readings:
  - to Him
  rationale: The Hebrew does not mark reverential capitalization. English capitalization
    of divine pronouns is a stylistic convention, not a lexical feature, so the translation
    avoids importing it while preserving the divine referent from context.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition'
- issue: Gender rendering of אִישׁ
  chosen_reading: Render אִישׁ as 'a man' in the main text
  alternative_readings:
  - someone
  - anyone
  rationale: The Hebrew singular masculine noun is retained as 'man' under the gender-accurate
    policy. Because English readers may understand it generically here, an inclusive
    alternative is worth preserving in a footnote rather than replacing the source-shaped
    wording.
  doctrine_reference: 'Translation philosophy: gender-accurate over gender-neutral'
- issue: Handling the verse's difficult syntax
  chosen_reading: Preserve the rhetorical and conditional ambiguity rather than smoothing
    it into a more interpretive paraphrase
  alternative_readings:
  - Should it be told him that I speak? Or should a man say that he is swallowed up?
  - Will it be told him that I would speak, or has anyone said that he would be destroyed?
  rationale: Job 37:20 is syntactically compressed and notoriously difficult. The
    translation keeps the main line of the Hebrew clauses without forcing a speculative
    reconstruction. Alternative construals are preserved in footnotes.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather
    than resolve it'
