id: JOB.37.20
reference: Job 37:20
source:
  edition: WLC
  text: הַֽ/יְסֻפַּר ל֭/וֹ כִּ֣י אֲדַבֵּ֑ר אִֽם אָ֥מַר אִ֝֗ישׁ כִּ֣י יְבֻלָּֽע־־׃
translation:
  text: Should it be told to him that I would speak? If a man says so, he would be
    swallowed up.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'to Him,' referring to God.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'a man'; alternatively, 'someone' or 'anyone' in a generic sense.
    reason: lexical_alternative
  - marker: c
    text: The Hebrew of this verse is difficult. Another possible rendering is, 'Should
      it be told him that I speak? Or should a man say that he would be swallowed
      up?'
    reason: alternative_reading
lexical_decisions:
- source_word: הֲיְסֻפַּר
  chosen: Should it be told
  alternatives:
  - Will it be recounted
  - Should one report
  lexicon: HALOT
  rationale: Passive of ספר with interrogative הֲ is best rendered as an impersonal
    passive question, expressing whether such a report should be made.
- source_word: לוֹ
  chosen: to him
  alternatives:
  - to Him
  lexicon: HALOT
  rationale: Refers to God in context, but lowercase is used in the translation text
    for ordinary pronoun style in English; the referent remains God from the surrounding
    discourse.
- source_word: כִּי
  chosen: that
  alternatives:
  - for
  - because
  lexicon: HALOT
  rationale: Here it introduces the content of what would be told, so 'that' fits
    better than causal renderings.
- source_word: אֲדַבֵּר
  chosen: I would speak
  alternatives:
  - I speak
  - I should speak
  lexicon: HALOT
  rationale: Imperfect in this rhetorical question has modal force in English; 'would
    speak' captures contemplated action rather than simple present.
- source_word: אִם
  chosen: If
  alternatives:
  - Or if
  - whether
  lexicon: HALOT
  rationale: Introduces the next conditional or hypothetical clause. The syntax is
    difficult, but 'if' preserves the Hebrew form without over-resolving it.
- source_word: אָמַר אִישׁ
  chosen: a man says so
  alternatives:
  - a man says
  - someone says
  lexicon: HALOT
  rationale: The clause is terse. 'A man' preserves the singular איש per gender-accurate
    policy; 'says so' supplies the minimal English object implied by context.
- source_word: כִּי יְבֻלָּע
  chosen: he would be swallowed up
  alternatives:
  - he would be consumed
  - he would be engulfed
  lexicon: HALOT
  rationale: Passive of בלע commonly conveys being swallowed up or consumed. 'Swallowed
    up' is vivid and close to the Hebrew image, while also fitting the warning tone
    of the verse.
