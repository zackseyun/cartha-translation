id: JOB.37.9
reference: Job 37:9
source:
  edition: WLC
  text: מִן הַ֭/חֶדֶר תָּב֣וֹא סוּפָ֑ה וּֽ/מִ/מְּזָרִ֥ים קָרָֽה־׃
translation:
  text: From its chamber comes the storm, and from the scattering winds, cold.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'From the south comes the storm'; the Hebrew literally says 'from the
      chamber,' which may be a poetic reference to a southern quarter or hidden storehouse.
    reason: alternative_reading
  - marker: b
    text: Or 'from the north comes cold' or 'from the dispersing winds, cold'; the
      Hebrew term is rare and its precise sense is uncertain.
    reason: alternative_reading
lexical_decisions:
- source_word: מִן הַחֶדֶר
  chosen: From its chamber
  alternatives:
  - From the chamber
  - From the inner chamber
  - From the south
  lexicon: HALOT
  rationale: חֶדֶר literally means 'room, chamber, inner room.' In this poetic meteorological
    context it likely refers metaphorically to the storm's hidden storehouse or quarter
    of origin. 'Its chamber' makes good English and reflects the idiomatic sense without
    over-interpreting as a compass direction. 'South' is a traditional interpretive
    rendering based on weather patterns, but the Hebrew noun itself does not explicitly
    mean 'south' here, so that alternative is preserved in a footnote rather than
    adopted in the main text.
- source_word: תָּבוֹא
  chosen: comes
  alternatives:
  - arrives
  - goes forth
  lexicon: HALOT
  rationale: The verb בוא commonly means 'come, enter, arrive.' With סוּפָה as subject,
    'comes' is the most natural English rendering and preserves the vivid immediacy
    of the Hebrew poetic line.
- source_word: סוּפָה
  chosen: the storm
  alternatives:
  - whirlwind
  - tempest
  lexicon: HALOT
  rationale: סוּפָה denotes a violent storm, tempest, or whirlwind. 'Storm' is broad,
    natural English and fits the parallel with 'cold' in the second colon. 'Whirlwind'
    is possible but narrower than the context requires.
- source_word: וּמִמְּזָרִים
  chosen: from the scattering winds
  alternatives:
  - from the north
  - from the dispersing winds
  - from the constellations
  lexicon: HALOT
  rationale: מְזָרִים is rare and debated. It is often connected with scattering/dispersing,
    yielding a sense like 'scattering winds.' Some translations render it 'north'
    by contextual inference, but that is not the plain lexical value of the form.
    Because the term is genuinely uncertain, a more lexically transparent rendering
    is used in the main text, with the directional alternative preserved in a footnote.
- source_word: קָרָה
  chosen: cold
  alternatives:
  - cold weather
  - frost
  lexicon: HALOT
  rationale: קָרָה denotes cold, frost, or freezing weather. 'Cold' is concise and
    idiomatic in parallel with 'storm'; 'frost' is possible but more specific than
    the Hebrew requires in this line.
