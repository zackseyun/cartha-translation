theological_decisions:
- issue: Referent of 'one perfect in knowledge'
  chosen_reading: A reference to God
  alternative_readings:
  - A generic wise person
  - an indirect self-reference by Elihu
  rationale: Within Elihu's speech about divine control of weather and creation, the
    phrase most naturally refers to God as the one whose knowledge is perfect. The
    translation leaves the referent implicit in the wording rather than inserting
    'God,' preserving the Hebrew expression while allowing the context to identify
    the referent.
  doctrine_reference: Preserve theological tension rather than resolve it; do not
    import claims beyond the text.
