id: JOB.37.8
reference: Job 37:8
source:
  edition: WLC
  text: וַ/תָּבֹ֣א חַיָּ֣ה בְמוֹ אָ֑רֶב וּ/בִ/מְע֖וֹנֹתֶ֣י/הָ תִשְׁכֹּֽן־׃
translation:
  text: Then the wild animal enters its lair, and remains in its dens.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the beast enters its covert, and stays in its dwelling places.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתָּבֹא
  chosen: Then ... enters
  alternatives:
  - and ... came
  - so ... goes in
  lexicon: HALOT
  rationale: Qal wayyiqtol of בוא commonly advances the poetic sequence. In English,
    'Then ... enters' preserves the narrative progression and gives a vivid present-like
    sense suitable to the surrounding description of natural phenomena.
- source_word: חַיָּה
  chosen: the wild animal
  alternatives:
  - the beast
  - the animal
  - wild beast
  lexicon: HALOT
  rationale: חיה can denote an animal generally or a wild animal/beast. In this weather
    context, the sense is generic rather than a specific species. 'Wild animal' is
    natural modern English and preserves the likely nuance of untamed creatures seeking
    shelter.
- source_word: בְמוֹ אָרֶב
  chosen: its lair
  alternatives:
  - into hiding
  - its covert
  - its den
  lexicon: HALOT
  rationale: The preposition with אָרֶב points to a place of lying in wait, a lurking
    place or lair. 'Lair' captures both the concrete shelter and the association with
    an animal's hidden retreat better than the more abstract 'hiding'.
- source_word: וּבִמְעוֹנֹתֶיהָ
  chosen: and ... in its dens
  alternatives:
  - and in its dwelling places
  - and in its habitations
  - and in its shelters
  lexicon: HALOT
  rationale: מְעוֹנוֹת refers to dwelling places, here of animals. The plural is worth
    preserving. 'Dens' is idiomatic for animal habitation and fits the parallel with
    'lair.' The 3fs suffix agrees with חיה as a grammatically feminine collective/generic
    noun, best rendered in English with 'its'.
- source_word: תִשְׁכֹּן
  chosen: remains
  alternatives:
  - dwells
  - settles down
  - stays
  lexicon: HALOT
  rationale: שכן means to dwell or reside. In context, after entering shelter because
    of the storm, 'remains' conveys continued staying there in clear modern English.
    'Dwells' is possible but sounds more static and formal than the immediate context
    suggests.
