id: JOB.37.23
reference: Job 37:23
source:
  edition: WLC
  text: שַׁדַּ֣י לֹֽא מְ֭צָאנֻ/הוּ שַׂגִּיא כֹ֑חַ וּ/מִשְׁפָּ֥ט וְ/רֹב צְ֝דָקָ֗ה לֹ֣א
    יְעַנֶּֽה־־־׃
translation:
  text: The Almighty—we cannot find him out—great in power; and justice and abundant
    righteousness he does not oppress.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'we cannot comprehend him' or 'we cannot attain to him.'
    reason: lexical_alternative
  - marker: b
    text: Or 'judgment' for 'justice.'
    reason: lexical_alternative
  - marker: c
    text: The final clause may also be understood as 'he does not afflict'; some have
      taken the verb as 'he does not answer,' but that fits the context less well.
    reason: alternative_reading
lexical_decisions:
- source_word: שַׁדַּי
  chosen: The Almighty
  alternatives:
  - Shaddai
  lexicon: HALOT
  rationale: Rendered as the title 'The Almighty,' the standard semantic value of
    שַׁדַּי in Job. Translating the title preserves meaning for English readers better
    than transliteration.
- source_word: לֹא מְצָאנֻהוּ
  chosen: we cannot find him out
  alternatives:
  - we do not find him
  - we cannot attain to him
  - we cannot comprehend him
  lexicon: HALOT
  rationale: The verb מצא with object suffix literally means 'find him,' but in this
    context of divine transcendence it carries the sense of being unable to discover,
    attain, or fully comprehend him. 'Find him out' preserves the idiomatic force
    without over-paraphrasing.
- source_word: שַׂגִּיא כֹחַ
  chosen: great in power
  alternatives:
  - exalted in power
  - abundant in strength
  - mighty in power
  lexicon: HALOT
  rationale: שַׂגִּיא denotes greatness or loftiness, and with כֹחַ expresses overwhelming
    power. 'Great in power' is natural English and close to the Hebrew structure.
- source_word: וּמִשְׁפָּט
  chosen: and justice
  alternatives:
  - and judgment
  lexicon: HALOT
  rationale: מִשְׁפָּט can mean 'judgment' or 'justice.' Here, paired with righteousness
    as a divine attribute, 'justice' better conveys the ethical quality rather than
    a specific judicial act.
- source_word: וְרֹב צְדָקָה
  chosen: and abundant righteousness
  alternatives:
  - and great righteousness
  - and fullness of righteousness
  lexicon: HALOT
  rationale: רֹב marks abundance or greatness; צְדָקָה here denotes righteousness
    in the sense of moral rectitude. 'Abundant righteousness' preserves both the noun
    and its intensification.
- source_word: לֹא יְעַנֶּה
  chosen: he does not oppress
  alternatives:
  - he does not afflict
  - he does not answer
  lexicon: HALOT
  rationale: ענה in the Piel commonly means 'afflict, oppress, humble.' In this context,
    after naming God's justice and righteousness, the sense is that he does not act
    oppressively or unjustly. 'Answer' is lexically possible for other stems/usages
    but does not fit the syntax or context here.
