id: JOB.37.15
reference: Job 37:15
source:
  edition: WLC
  text: הֲ֭/תֵדַע בְּ/שׂוּם אֱל֣וֹהַּ עֲלֵי/הֶ֑ם וְ֝/הוֹפִ֗יעַ א֣וֹר עֲנָנֽ/וֹ־׃
translation:
  text: Do you know how God lays these upon them, and makes the light of his cloud
    shine?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'when God sets them in place' or 'how God appoints them.' The Hebrew
      expression is compact and leaves the object and referent implicit from the surrounding
      context.
    reason: alternative_reading
  - marker: b
    text: Or 'causes the brightness of his cloud to flash.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲתֵדַע
  chosen: Do you know
  alternatives:
  - Do you understand
  - Are you aware
  lexicon: HALOT
  rationale: ידע in the Qal imperfect 2ms introduces a rhetorical question to Job.
    'Do you know' is the most direct and natural rendering in English.
- source_word: בְּשׂוּם
  chosen: how ... lays
  alternatives:
  - when ... sets
  - in placing
  lexicon: HALOT
  rationale: The preposition ב with the infinitive construct of שום can mark circumstance
    ('when/in the placing of'), but in English after 'Do you know' the idiomatic sense
    is 'how ... lays/sets.' 'Lays' fits the implied object of meteorological phenomena
    better than the more wooden 'sets.'
- source_word: אֱלוֹהַּ
  chosen: God
  alternatives:
  - God Almighty
  lexicon: HALOT
  rationale: אֱלוֹהַּ is the common singular poetic form for 'God' in Job. No contextual
    warrant exists here to expand it beyond the lexical sense.
- source_word: עֲלֵיהֶם
  chosen: upon them
  alternatives:
  - over them
  - on them
  lexicon: HALOT
  rationale: The preposition על with 3mp suffix most naturally means 'upon/on them.'
    The referent is implicit from context, likely the clouds or weather phenomena
    mentioned in the surrounding verses; the translation preserves that ambiguity
    rather than specifying it.
- source_word: וְהוֹפִיעַ
  chosen: and makes ... shine
  alternatives:
  - and causes ... to flash
  - and brings forth
  lexicon: HALOT
  rationale: The Hiphil of יפע conveys causing brightness to appear or shine forth.
    'Makes ... shine' is clear modern English and suits the direct object 'light.'
- source_word: אוֹר
  chosen: the light
  alternatives:
  - light
  - brightness
  lexicon: HALOT
  rationale: אוֹר denotes light/brightness. With the following construct relation
    to 'his cloud,' 'the light' is a natural English rendering.
- source_word: עֲנָנוֹ
  chosen: his cloud
  alternatives:
  - his clouds
  - his storm cloud
  lexicon: HALOT
  rationale: The singular noun with 3ms suffix is best rendered literally as 'his
    cloud.' English can use the singular collectively or concretely here. 'Storm cloud'
    is interpretive and 'clouds' would abandon the singular form.
