theological_decisions:
- issue: Implicit object/referent of 'them' and what God 'lays' upon them
  chosen_reading: Preserve the Hebrew's ambiguity with 'lays these upon them' rather
    than specifying lightning, charge, or clouds.
  alternative_readings:
  - lays his command upon them
  - sets the clouds over them
  - appoints these things over them
  rationale: The Hebrew omits an explicit object after שום, and the pronoun 'them'
    depends on the surrounding context. To avoid importing a more specific meteorological
    interpretation than the verse itself states, the translation keeps the wording
    somewhat open while remaining readable.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
