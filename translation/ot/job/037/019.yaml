theological_decisions:
- issue: Sense of 'darkness' in the final clause
  chosen_reading: Retain the broad term 'darkness' without specifying whether it is
    intellectual confusion, human frailty, or literal obscurity.
  alternative_readings:
  - because of ignorance
  - because it is dark
  rationale: The verse's poetry supports a compact image that may include human inability
    to order speech before God. Expanding it would resolve ambiguity the Hebrew preserves.
