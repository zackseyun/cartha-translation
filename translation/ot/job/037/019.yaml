id: JOB.37.19
reference: Job 37:19
source:
  edition: WLC
  text: ה֭וֹדִיעֵ/נוּ מַה נֹּ֣אמַר ל֑/וֹ לֹ֥א נַ֝עֲרֹ֗ךְ מִ/פְּנֵי חֹֽשֶׁךְ־־־׃
translation:
  text: Teach us what we should say to him; we cannot present our case because of
    darkness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'we cannot lay out our words' or 'we cannot set our case in order.'
    reason: lexical_alternative
  - marker: b
    text: '''Darkness'' may refer figuratively to human ignorance or inability, though
      a more literal sense is also possible.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הוֹדִיעֵנוּ
  chosen: Teach us
  alternatives:
  - Make known to us
  - Inform us
  lexicon: HALOT
  rationale: Hiphil imperative of ידע means 'make known' or 'cause to know.' In this
    context Elihu asks for instruction, so 'Teach us' gives natural English while
    preserving the causative sense.
- source_word: מַה נֹּאמַר לוֹ
  chosen: what we should say to him
  alternatives:
  - what we may say to him
  - what we shall say to him
  lexicon: HALOT
  rationale: 'The clause is a direct object of the imperative: ''make known to us
    what we are to say to him.'' ''Should say'' expresses deliberative force idiomatically
    in English.'
- source_word: לֹא נַעֲרֹךְ
  chosen: we cannot present our case
  alternatives:
  - we cannot arrange
  - we cannot set in order
  - we cannot lay out our words
  lexicon: HALOT
  rationale: ערך commonly means 'arrange, set in order.' In judicial or rhetorical
    context it can refer to arranging words or a case before someone. 'Present our
    case' captures the likely idiomatic force in context rather than a wooden 'arrange.'
- source_word: מִפְּנֵי חֹשֶׁךְ
  chosen: because of darkness
  alternatives:
  - due to darkness
  - before darkness
  lexicon: HALOT
  rationale: מִפְּנֵי often means 'because of' or 'on account of.' 'Darkness' may
    be literal or figurative, but the Hebrew leaves it compressed; the translation
    preserves that ambiguity.
