id: JOB.37.18
reference: Job 37:18
source:
  edition: WLC
  text: תַּרְקִ֣יעַ עִ֭מּ/וֹ לִ/שְׁחָקִ֑ים חֲ֝זָקִ֗ים כִּ/רְאִ֥י מוּצָֽק׃
translation:
  text: Can you, with him, spread out the skies, hard as a cast metal mirror?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'beat out the skies' or 'stretch out the skies.' The Hebrew verb can
      evoke hammering metal thin as well as spreading something out.
    reason: lexical_alternative
  - marker: b
    text: Or 'the heavens' or 'the clouds.' The Hebrew שׁחקים is a poetic term that
      can refer to the skies/heavens and, in some contexts, clouds.
    reason: lexical_alternative
  - marker: c
    text: Literally, 'like a cast mirror.' The image is of the sky as solid and gleaming
      like metalwork.
    reason: cultural_note
lexical_decisions:
- source_word: תַּרְקִיעַ
  chosen: spread out
  alternatives:
  - beat out
  - hammer out
  - stretch out
  lexicon: HALOT
  rationale: Hiphil of רקע commonly denotes spreading or beating out something thin,
    especially metal. In this poetic context of the heavens compared to metal, 'spread
    out' gives clear English while preserving the imagery of fashioned expanse; 'beat
    out' is a viable more formal alternative but less natural in the question.
- source_word: עִמּוֹ
  chosen: with him
  alternatives:
  - with God
  lexicon: HALOT
  rationale: The pronominal form is simply 'with him.' The referent in context is
    God, but the Hebrew uses the pronoun, so the translation preserves that wording
    rather than making the referent explicit in the main text.
- source_word: לִשְׁחָקִים
  chosen: the skies
  alternatives:
  - the clouds
  - the heavens
  - the sky
  lexicon: HALOT
  rationale: שׁחקים can denote skies/heavens and sometimes clouds. Here the comparison
    to a metal mirror suggests the visible sky-vault rather than localized clouds,
    so 'the skies' best captures the plural poetic sense in natural English.
- source_word: חֲזָקִים
  chosen: hard
  alternatives:
  - strong
  - firm
  lexicon: HALOT
  rationale: The adjective describes the solidity of the skies in the simile. 'Hard'
    fits the comparison to cast metal more idiomatically than 'strong' or 'firm' in
    English.
- source_word: כִּרְאִי
  chosen: as a ... mirror
  alternatives:
  - like a mirror
  - like a looking-glass
  lexicon: HALOT
  rationale: ראי denotes a mirror. The prefixed כ expresses comparison, rendered smoothly
    in English as 'as a ... mirror' within the phrase 'hard as a cast metal mirror.'
- source_word: מוּצָק
  chosen: cast metal
  alternatives:
  - molten metal
  - cast bronze
  lexicon: HALOT
  rationale: The passive participial form denotes something poured/cast, especially
    metal. 'Cast metal' preserves the metallurgical image without over-specifying
    bronze, which the Hebrew does not explicitly state.
