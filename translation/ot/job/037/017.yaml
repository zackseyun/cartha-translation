id: JOB.37.17
reference: Job 37:17
source:
  edition: WLC
  text: אֲשֶׁר בְּגָדֶ֥י/ךָ חַמִּ֑ים בְּ/הַשְׁקִ֥ט אֶ֝֗רֶץ מִ/דָּרֽוֹם־׃
translation:
  text: you whose garments are hot when the earth is still because of the south wind?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from the south.' The Hebrew literally says 'from the south,' which may
      refer more generally to the southern quarter; 'south wind' makes the meteorological
      sense explicit.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲשֶׁר
  chosen: you whose
  alternatives:
  - who
  - when
  lexicon: HALOT
  rationale: 'In context this relative particle introduces Elihu''s address to Job
    and is best carried into idiomatic English as a relative clause modifying the
    implied second-person subject: ''you whose ...''. A more wooden ''who'' is possible;
    some construe it more temporally with the following clause, but the direct address
    favors the relative sense.'
- source_word: בְּגָדֶיךָ
  chosen: your garments
  alternatives:
  - your clothes
  lexicon: HALOT
  rationale: בגד commonly means garment/clothing. 'Garments' preserves the elevated
    poetic register without becoming archaic.
- source_word: חַמִּים
  chosen: are hot
  alternatives:
  - are warm
  - grow hot
  lexicon: HALOT
  rationale: The adjective means hot/warm. 'Are hot' is the most direct predicative
    rendering and fits the meteorological context of oppressive heat.
- source_word: בְּהַשְׁקִט
  chosen: when ... is still
  alternatives:
  - when ... is quiet
  - at the calming of
  lexicon: HALOT
  rationale: 'From שקט, ''be quiet, undisturbed, at rest.'' With prefixed ב it is
    temporal: ''when ... is still/quiet.'' ''Still'' reads naturally in English for
    weather and atmosphere.'
- source_word: אֶרֶץ
  chosen: the earth
  alternatives:
  - the land
  lexicon: HALOT
  rationale: Both 'earth' and 'land' are possible. In this weather description, the
    broader sense 'earth' works well and matches common English idiom for atmospheric
    conditions affecting the whole region.
- source_word: מִדָּרוֹם
  chosen: because of the south wind
  alternatives:
  - from the south
  - because of the south
  lexicon: HALOT
  rationale: דָּרוֹם denotes the south/southern quarter, and in meteorological contexts
    can imply the hot south wind. Rendering it 'because of the south wind' makes explicit
    the causal force of מן and the weather sense that explains why garments are hot
    and the air is still.
