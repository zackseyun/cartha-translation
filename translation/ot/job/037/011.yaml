id: JOB.37.11
reference: Job 37:11
source:
  edition: WLC
  text: אַף בְּ֭/רִי יַטְרִ֣יחַ עָ֑ב יָ֝פִ֗יץ עֲנַ֣ן אוֹרֽ/וֹ־׃
translation:
  text: Indeed, he loads the thick cloud with moisture; he scatters his lightning
    cloud.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'he loads the thick cloud with rain/water'; the Hebrew term translated
      'moisture' is uncertain.
    reason: lexical_alternative
  - marker: b
    text: Or 'he scatters the cloud of his light'; 'his lightning cloud' interprets
      'light' in the storm context as lightning.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַף
  chosen: Indeed
  alternatives:
  - Also
  - Surely
  - Even
  lexicon: HALOT
  rationale: Here אַף functions as an asseverative/adverbial particle introducing
    an additional point in Elihu’s description of God’s control of weather. 'Indeed'
    captures the emphatic force naturally in English.
- source_word: בְּרִי
  chosen: with moisture
  alternatives:
  - with rain
  - with water
  - brightness
  lexicon: HALOT
  rationale: 'The noun is difficult and has been variously connected with moisture/rain
    or brightness/clearness. In context with cloud imagery and the verb ''loads/burdens,''
    ''moisture'' best fits the meteorological sense: God fills the cloud with water.
    Because the term is debated, alternatives are preserved in a footnote.'
- source_word: יַטְרִיחַ
  chosen: loads
  alternatives:
  - burdens
  - wearies
  - fills
  lexicon: HALOT
  rationale: Hiphil of טרח can convey causing to bear a load or burden. With 'cloud'
    as object and 'moisture' as complement, 'loads' is vivid and idiomatic English,
    preserving the image of a cloud laden with water.
- source_word: עָב
  chosen: the thick cloud
  alternatives:
  - the cloud mass
  - the dark cloud
  lexicon: HALOT
  rationale: עָב commonly denotes a thick or dense cloud. 'The thick cloud' preserves
    the concrete meteorological image.
- source_word: יָפִיץ
  chosen: he scatters
  alternatives:
  - he disperses
  - he spreads
  lexicon: HALOT
  rationale: The Hiphil of פוץ conveys scattering or dispersing. 'He scatters' is
    straightforward and fits the parallel weather imagery.
- source_word: עֲנַן
  chosen: cloud
  alternatives:
  - storm cloud
  lexicon: HALOT
  rationale: Standard term for cloud. Because the following genitive-like construction
    with 'his light' is unusual, the base noun is kept simple in translation.
- source_word: אוֹרוֹ
  chosen: his lightning
  alternatives:
  - his light
  - his bright cloud
  lexicon: HALOT
  rationale: אוֹר normally means 'light,' but in this storm context 'his lightning
    cloud' communicates the likely sense of a cloud associated with divine flashing
    light. Since 'light' is the more literal rendering and some construe the phrase
    differently, the alternative is preserved in a footnote.
