theological_decisions:
- issue: Sense of God's non-regard toward the wise of heart
  chosen_reading: The line states that God does not regard those characterized as
    wise of heart, likely in the sense of self-sufficient human wisdom before divine
    majesty.
  alternative_readings:
  - He does not look upon any who are wise of heart
  - He is not seen by any who are wise of heart
  rationale: The verb is singular with an implicit subject most naturally referring
    to God from context. While the Hebrew verb 'see' could in theory be construed
    differently, the immediate syntax and common translation history support 'he does
    not regard.' This preserves the warning against human pretension without overstating
    a doctrinal claim.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather
    than resolve it
