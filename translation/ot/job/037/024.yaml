id: JOB.37.24
reference: Job 37:24
source:
  edition: WLC
  text: לָ֭/כֵן יְרֵא֣וּ/הוּ אֲנָשִׁ֑ים לֹֽא יִ֝רְאֶ֗ה כָּל חַכְמֵי לֵֽב־־־׃פ
translation:
  text: Therefore men fear him; he does not regard any who are wise of heart.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'he does not see all the wise of heart'; the Hebrew
      verb can mean 'see' or 'regard,' and the phrase may emphasize God's disregard
      for human wisdom before him.
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  chosen: Therefore
  alternatives:
  - So
  - For this reason
  lexicon: HALOT
  rationale: Marks an inferential conclusion from the preceding description of God's
    greatness; 'Therefore' preserves the logical force in natural English.
- source_word: יְרֵאוּהוּ
  chosen: fear him
  alternatives:
  - revere him
  - stand in awe of him
  lexicon: HALOT
  rationale: From ירא, which can denote fear, reverence, or awe. 'Fear him' is the
    most direct rendering and preserves the theological weight of human response to
    divine majesty; softer alternatives are possible but less textually direct.
- source_word: אֲנָשִׁים
  chosen: men
  alternatives:
  - people
  - human beings
  lexicon: HALOT
  rationale: The Hebrew is the common plural for human persons, here generic. Following
    the gender-accurate policy, 'men' preserves the source form while still functioning
    representatively for humanity in context.
- source_word: לֹא יִרְאֶה
  chosen: he does not regard
  alternatives:
  - he does not look upon
  - he does not pay attention to
  - he does not see
  lexicon: HALOT
  rationale: ראה literally means 'see,' but in this context idiomatically conveys
    regard or favorable notice. 'Does not regard' best captures the relational/judicial
    sense in idiomatic English without overinterpreting.
- source_word: כָּל
  chosen: any
  alternatives:
  - all
  - everyone among
  lexicon: HALOT
  rationale: 'With the negative and following plural expression, English idiom is
    better served by ''any'' rather than the more wooden ''all.'' This preserves the
    distributive force: not one of them is regarded.'
- source_word: חַכְמֵי לֵב
  chosen: wise of heart
  alternatives:
  - wise in heart
  - the wise-hearted
  - those wise in their own hearts
  lexicon: HALOT
  rationale: A Hebrew idiom for those possessing inner wisdom or understanding. 'Wise
    of heart' is slightly formal but transparent and preserves the metaphor. The rendering
    avoids importing the interpretive nuance 'in their own hearts,' which is not explicit
    in the Hebrew.
