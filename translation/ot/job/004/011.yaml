id: JOB.4.11
reference: Job 4:11
source:
  edition: WLC
  text: לַ֭יִשׁ אֹבֵ֣ד מִ/בְּלִי טָ֑רֶף וּ/בְנֵ֥י לָ֝בִ֗יא יִתְפָּרָֽדוּ־׃
translation:
  text: The lion perishes for lack of prey, and the cubs of the lioness are scattered.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the young of the lion' or 'the sons of the fierce lion.' The Hebrew
      terms for lion vary in nuance, and לָבִיא may be understood as 'lion' or 'lioness.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לַיִשׁ
  chosen: the lion
  alternatives:
  - the strong lion
  - the old lion
  lexicon: HALOT
  rationale: לַיִשׁ denotes a lion, often a strong or mature lion. In English, 'lion'
    is the clearest natural rendering; nuances such as 'strong' or 'old' are possible
    but would over-specify beyond what the immediate context requires.
- source_word: אֹבֵד
  chosen: perishes
  alternatives:
  - is lost
  - dies
  lexicon: HALOT
  rationale: The participle from אבד conveys perishing or coming to ruin. 'Perishes'
    preserves the vivid, proverbial tone better than the flatter 'dies' and fits the
    poetic parallelism.
- source_word: מִבְּלִי
  chosen: for lack of
  alternatives:
  - without
  - because there is no
  lexicon: HALOT
  rationale: The prepositional expression indicates deprivation or absence. 'For lack
    of' is idiomatic English and clearly expresses causation by want.
- source_word: טָרֶף
  chosen: prey
  alternatives:
  - food
  - tearable prey
  lexicon: HALOT
  rationale: טָרֶף refers specifically to prey torn by a predator, not merely generic
    food. 'Prey' best matches the predatory imagery of the lion metaphor.
- source_word: בְנֵי
  chosen: the cubs of
  alternatives:
  - the sons of
  - the young of
  lexicon: HALOT
  rationale: Although literally 'sons of,' in animal imagery English naturally uses
    'cubs of' or 'young of.' 'Cubs of' preserves the familial sense while sounding
    idiomatic.
- source_word: לָבִיא
  chosen: the lioness
  alternatives:
  - the lion
  - the fierce lion
  lexicon: HALOT
  rationale: לָבִיא can denote a lion/lioness, but in this collocation with 'sons/cubs
    of' the sense 'lioness' is strong and yields a natural image of offspring belonging
    to the mother. This also preserves the distinction from לַיִשׁ in the first colon
    rather than flattening both to the same English term.
- source_word: יִתְפָּרָדוּ
  chosen: are scattered
  alternatives:
  - are dispersed
  - separate themselves
  lexicon: HALOT
  rationale: The verb means to separate or disperse. 'Are scattered' fits the passive-like
    result in English poetry and conveys the breakdown of the pride/family unit under
    deprivation.
