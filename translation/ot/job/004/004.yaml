id: JOB.4.4
reference: Job 4:4
source:
  edition: WLC
  text: כּ֭וֹשֵׁל יְקִימ֣וּ/ן מִלֶּ֑י/ךָ וּ/בִרְכַּ֖יִם כֹּרְע֣וֹת תְּאַמֵּֽץ׃
translation:
  text: Your words have raised up the one who stumbles, and you have strengthened
    knees that were giving way.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'upheld' / 'caused to stand' for 'have raised up.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'knees bowing down'; the sense is knees buckling or giving way
      from weakness.
    reason: lexical_alternative
lexical_decisions:
- source_word: כּוֹשֵׁל
  chosen: the one who stumbles
  alternatives:
  - the stumbling one
  - the faltering one
  - the weak
  lexicon: HALOT
  rationale: The participle from כשל denotes one who is stumbling, faltering, or tottering.
    'The one who stumbles' preserves the concrete verbal imagery while remaining natural
    English. It avoids over-abstracting to merely 'the weak.'
- source_word: יְקִימוּן
  chosen: have raised up
  alternatives:
  - upheld
  - caused to stand
  - made stand
  lexicon: HALOT
  rationale: 'Hiphil of קום here is causative: to make stand, raise up, or uphold.
    ''Have raised up'' fits the poetic parallel with strengthening weak knees and
    reflects completed past action in Eliphaz''s description of Job''s prior conduct.'
- source_word: מִלֶּיךָ
  chosen: your words
  alternatives:
  - your speech
  - your sayings
  lexicon: HALOT
  rationale: Plural of מִלָּה means words/speech. 'Your words' is the most direct
    and idiomatic rendering in this context.
- source_word: בִרְכַּיִם
  chosen: knees
  lexicon: HALOT
  rationale: Literal body-part term; retained literally because the poetic image is
    transparent in English and commonly associated with weakness or collapse.
- source_word: כֹּרְעוֹת
  chosen: that were giving way
  alternatives:
  - that were bowing down
  - that were buckling
  - that were bent
  lexicon: HALOT
  rationale: From כרע, 'to bend, kneel, sink down.' With 'knees' the sense is knees
    buckling under weakness. 'Giving way' communicates the idiom naturally in English
    while preserving the image of collapse.
- source_word: תְּאַמֵּץ
  chosen: you have strengthened
  alternatives:
  - you made strong
  - you encouraged
  lexicon: HALOT
  rationale: Piel of אמץ means to strengthen or make firm. 'You have strengthened'
    matches the physical metaphor of weak knees and keeps the parallelism with 'raised
    up.'
