id: JOB.4.20
reference: Job 4:20
source:
  edition: WLC
  text: מִ/בֹּ֣קֶר לָ/עֶ֣רֶב יֻכַּ֑תּוּ מִ/בְּלִ֥י מֵ֝שִׂ֗ים לָ/נֶ֥צַח יֹאבֵֽדוּ׃
translation:
  text: From morning to evening they are crushed; without anyone taking notice, they
    perish forever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'without anyone paying attention' / 'with no one laying it to heart.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִבֹּקֶר לָעֶרֶב
  chosen: From morning to evening
  alternatives:
  - Between morning and evening
  - From morning till evening
  lexicon: HALOT
  rationale: The paired temporal expressions mark the span of a single day, emphasizing
    human frailty and brevity. 'From morning to evening' is idiomatic and preserves
    the Hebrew imagery.
- source_word: יֻכַּתּוּ
  chosen: they are crushed
  alternatives:
  - they are beaten down
  - they are shattered
  - they are broken in pieces
  lexicon: HALOT
  rationale: The Hophal form conveys being struck down or crushed. 'Are crushed' is
    natural English and retains the passive sense without over-specifying the mechanism.
- source_word: מִבְּלִי מֵשִׂים
  chosen: without anyone taking notice
  alternatives:
  - without anyone paying attention
  - with no one laying it to heart
  - without being noticed
  lexicon: HALOT
  rationale: The idiom literally involves 'without setting/placing,' likely elliptical
    for setting the heart or mind on it. The sense is that no one pays heed to their
    destruction. 'Without anyone taking notice' communicates the idiomatic force clearly
    in modern English.
- source_word: לָנֶצַח
  chosen: forever
  alternatives:
  - for ever
  - perpetually
  lexicon: HALOT
  rationale: The term commonly denotes enduring continuance. Here it intensifies the
    finality of perishing. 'Forever' is the clearest contemporary rendering.
- source_word: יֹאבֵדוּ
  chosen: they perish
  alternatives:
  - they vanish
  - they are destroyed
  - they come to ruin
  lexicon: HALOT
  rationale: The Qal of אבד often means to perish or be lost. 'They perish' preserves
    the broad sense of destruction without importing a narrower theological nuance.
