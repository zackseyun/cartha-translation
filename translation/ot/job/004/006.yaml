theological_decisions:
- issue: Implicit object of 'fear'
  chosen_reading: Rendered as 'fear of God' in the main text
  alternative_readings:
  - your fear
  - your reverence
  rationale: In wisdom literature, 'fear' without an explicit object commonly refers
    to fear of God. Making the object explicit aids modern readers and reflects the
    likely sense, while remaining close to the idiom. This is not a sectarian theological
    expansion but a contextual clarification.
  doctrine_reference: Translation philosophy §1, §6
- issue: Syntactic relation of the two nominal clauses
  chosen_reading: 'Two parallel predicates: ''your fear of God [is] your confidence''
    and ''the integrity of your ways [is] your hope'''
  alternative_readings:
  - '''Is not your fear of God your confidence, your hope, and the integrity of your
    ways?'''
  rationale: The Hebrew presents four nouns in balanced sequence, naturally read as
    two parallel clauses. This preserves the poetic structure and avoids collapsing
    the final phrase into a third item in a list.
  doctrine_reference: Translation philosophy §1, §5
