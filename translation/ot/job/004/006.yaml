id: JOB.4.6
reference: Job 4:6
source:
  edition: WLC
  text: הֲ/לֹ֣א יִ֭רְאָתְ/ךָ כִּסְלָתֶ֑/ךָ תִּ֝קְוָתְ/ךָ֗ וְ/תֹ֣ם דְּרָכֶֽי/ךָ׃
translation:
  text: Is not your fear of God your confidence, and the integrity of your ways your
    hope?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or simply, 'your fear'; the Hebrew does not state the object explicitly,
      though in wisdom literature it commonly refers to fear of God.
    reason: lexical_alternative
  - marker: b
    text: Or 'your trust' for 'your confidence.'
    reason: lexical_alternative
  - marker: c
    text: Or 'the blamelessness of your ways.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲלֹא
  chosen: Is not
  alternatives:
  - Isn't
  - Surely
  lexicon: HALOT
  rationale: Introduces a rhetorical question expecting agreement. 'Is not' preserves
    the formal force and elevated tone better than the more colloquial 'Isn't,' while
    avoiding over-interpreting it as an assertive 'Surely.'
- source_word: יִרְאָתְךָ
  chosen: your fear of God
  alternatives:
  - your fear
  - your piety
  - your reverence
  lexicon: HALOT
  rationale: The noun from ירא commonly denotes fear/reverence, and in wisdom literature
    often implies fear directed toward God even when the object is unstated. 'Fear
    of God' makes explicit the likely referent for English clarity without substantially
    adding content; 'piety' is interpretive and broader, while bare 'fear' could sound
    merely psychological.
- source_word: כִּסְלָתֶךָ
  chosen: your confidence
  alternatives:
  - your folly
  - your trust
  - your security
  lexicon: HALOT
  rationale: Though the root כסל can denote 'folly' in some forms, this noun in context
    is widely understood as 'confidence' or 'trust.' The verse pairs inner disposition
    and moral conduct with grounds for hope; 'confidence' fits that parallelism. 'Folly'
    would make poor sense in this context.
- source_word: תִּקְוָתְךָ
  chosen: your hope
  alternatives:
  - your expectation
  lexicon: HALOT
  rationale: Standard rendering for תקוה in wisdom contexts. 'Hope' is idiomatic and
    preserves both expectation and trust.
- source_word: וְתֹם
  chosen: and the integrity
  alternatives:
  - and the blamelessness
  - and the innocence
  lexicon: HALOT
  rationale: תם denotes completeness, integrity, or blamelessness. 'Integrity' best
    suits the ethical sense here and reads naturally in English. 'Blamelessness' is
    possible but slightly more absolute than the context requires.
- source_word: דְּרָכֶיךָ
  chosen: of your ways
  alternatives:
  - of your conduct
  - of your paths
  lexicon: HALOT
  rationale: '''Ways'' preserves the Hebrew metaphor and common wisdom-language usage.
    ''Conduct'' is interpretive but possible; ''paths'' is more literal yet less idiomatic
    in this construction.'
