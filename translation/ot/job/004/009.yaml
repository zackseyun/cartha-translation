id: JOB.4.9
reference: Job 4:9
source:
  edition: WLC
  text: מִ/נִּשְׁמַ֣ת אֱל֣וֹהַ יֹאבֵ֑דוּ וּ/מֵ/ר֖וּחַ אַפּ֣/וֹ יִכְלֽוּ׃
translation:
  text: By the breath of God they perish, and by the blast of his anger they come
    to an end.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from the breath of God they perish.' The Hebrew preposition can be understood
      as source or instrument; here it is rendered instrumentally in English.
    reason: lexical_alternative
  - marker: b
    text: '''Blast'' translates Hebrew ruach, which can also mean ''wind,'' ''breath,''
      or ''spirit.'' In this context the sense is a destructive outflow associated
      with his anger.'
    reason: lexical_alternative
  - marker: c
    text: Or 'they are consumed.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִנִּשְׁמַת
  chosen: by the breath of
  alternatives:
  - from the breath of
  - by the breath from
  lexicon: HALOT
  rationale: נשמה commonly denotes breath, breathing, or breath as life-force. With
    the prefixed מִן in this poetic context, English 'by the breath of' best conveys
    instrumentality/cause in natural modern English while preserving the imagery.
- source_word: אֱלוֹהַ
  chosen: God
  alternatives:
  - God Almighty
  - God [Eloah]
  lexicon: HALOT
  rationale: אֱלוֹהַ is the singular poetic form 'God,' frequent in Job. 'God' is
    the plain lexical equivalent; expanding to 'God Almighty' would import wording
    not present here.
- source_word: יֹאבֵדוּ
  chosen: they perish
  alternatives:
  - they are destroyed
  - they vanish
  lexicon: HALOT
  rationale: From אבד, the basic sense is to perish/be destroyed. 'They perish' preserves
    the intransitive verbal force and fits the poetic parallelism without over-specifying
    the mode of destruction.
- source_word: וּמֵרוּחַ
  chosen: and by the blast of
  alternatives:
  - and by the wind of
  - and by the spirit of
  - and from the breath of
  lexicon: HALOT
  rationale: רוּחַ has a broad semantic range including wind, breath, and spirit.
    In parallel with 'breath' in the first colon and modified by 'his anger,' the
    sense is a forceful exhalation or blast. 'Blast' captures the intensified poetic
    image better than repeating 'breath,' while avoiding the misleading theological
    sense 'spirit.'
- source_word: אַפּוֹ
  chosen: his anger
  alternatives:
  - his nostrils
  - his wrath
  lexicon: HALOT
  rationale: אַף literally means nose/nostril, and by extension anger/wrath. In this
    collocation, the idiomatic sense is divine anger. 'His anger' communicates the
    meaning clearly; the concrete imagery of nostrils is preserved indirectly through
    'blast.'
- source_word: יִכְלוּ
  chosen: they come to an end
  alternatives:
  - they are consumed
  - they are finished
  lexicon: HALOT
  rationale: כלה in Qal can mean be finished, come to an end, or be consumed. 'Come
    to an end' preserves the resultative sense and avoids making the image overly
    material, while still matching the parallel with 'perish.'
