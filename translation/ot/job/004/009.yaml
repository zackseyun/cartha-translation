theological_decisions:
- issue: Rendering anthropomorphic language for divine anger
  chosen_reading: Translate אַפּוֹ idiomatically as 'his anger' while retaining the
    breath/blast imagery in the parallel line.
  alternative_readings:
  - his nostrils
  - his wrath
  rationale: The Hebrew uses anthropomorphic language, but the idiom's semantic force
    is anger. Rendering it woodenly as 'his nostrils' would obscure the sense in English;
    rendering it as 'his wrath' is possible but less directly tied to the underlying
    idiom. The chosen wording preserves both intelligibility and poetic force without
    importing extra doctrinal claims.
  doctrine_reference: Preserve theological tension rather than resolve it; readable
    modern English, not archaic or academic.
