id: JOB.4.18
reference: Job 4:18
source:
  edition: WLC
  text: הֵ֣ן בַּ֭/עֲבָדָי/ו לֹ֣א יַאֲמִ֑ין וּ֝/בְ/מַלְאָכָ֗י/ו יָשִׂ֥ים תָּהֳלָֽה׃
translation:
  text: Look, he puts no trust in his servants, and he charges his messengers with
    error.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his angels.' The Hebrew word can refer to either human or heavenly messengers;
      here the context likely points to heavenly beings.
    reason: alternative_reading
  - marker: b
    text: Or 'folly,' 'fault,' or 'imperfection' for 'error.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֵן
  chosen: Look
  alternatives:
  - Behold
  - Indeed
  - See
  lexicon: HALOT
  rationale: Introduces an emphatic assertion or attention-getting statement. 'Look'
    preserves the force in readable modern English better than the more archaic 'Behold.'
- source_word: בַּעֲבָדָיו
  chosen: in his servants
  alternatives:
  - among his servants
  - with his servants
  lexicon: HALOT
  rationale: The preposition ב with אמן in the Hiphil commonly marks the object of
    trust or belief, so 'puts no trust in his servants' is the most natural English
    expression. 'Servants' fits עבדים here better than 'slaves,' since the point is
    not their bonded social status but their subordinate role in God's household.
- source_word: לֹא יַאֲמִין
  chosen: he puts no trust
  alternatives:
  - he does not trust
  - he does not believe
  lexicon: HALOT
  rationale: Hiphil of אמן here conveys trust/confidence rather than intellectual
    belief. 'Puts no trust' is idiomatic and preserves the relational nuance.
- source_word: וּבְמַלְאָכָיו
  chosen: his messengers
  alternatives:
  - his angels
  lexicon: HALOT
  rationale: מלאך can mean either 'messenger' or 'angel.' In this poetic context,
    especially paired with 'his servants,' the referent is very likely heavenly beings,
    i.e., angels; however, 'messengers' preserves the lexical sense of the Hebrew
    while remaining broad enough to include angelic messengers. The more specific
    alternative is preserved in a footnote.
- source_word: יָשִׂים
  chosen: he charges
  alternatives:
  - he puts
  - he places
  - he finds
  lexicon: HALOT
  rationale: The idiom שׂים + abstract noun here means to ascribe or attribute something
    to someone. 'Charges' communicates that God imputes or lays something to their
    account.
- source_word: תָּהֳלָה
  chosen: error
  alternatives:
  - folly
  - fault
  - imperfection
  lexicon: HALOT
  rationale: The noun is rare and denotes error, folly, or defect. 'Error' is concise
    and natural in English, while allowing the sense that even heavenly beings are
    not beyond fault in comparison with God.
