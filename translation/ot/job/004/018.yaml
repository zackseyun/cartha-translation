theological_decisions:
- issue: Whether מַלְאָכָיו should be rendered specifically as 'angels' or more lexically
    as 'messengers'
  chosen_reading: messengers
  alternative_readings:
  - angels
  rationale: The Hebrew lexeme fundamentally means 'messengers,' though in many contexts
    it refers to angels. Because the verse is poetic and paired with 'his servants,'
    the broader rendering preserves the lexical form without foreclosing the likely
    heavenly reference. The more explicit theological interpretation 'angels' is preserved
    in a footnote.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
