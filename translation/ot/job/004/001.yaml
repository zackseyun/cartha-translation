id: JOB.4.1
reference: Job 4:1
source:
  edition: WLC
  text: וַ֭/יַּעַן אֱלִיפַ֥ז הַֽ/תֵּימָנִ֗י וַ/יֹּאמַֽר׃
translation:
  text: 'Then Eliphaz the Temanite answered and said:'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיַּעַן
  chosen: answered
  alternatives:
  - responded
  lexicon: HALOT
  rationale: The verb ענה in this narrative formula commonly means 'answer/respond.'
    'Answered' preserves the conventional dialog formula and fits the immediate context
    of a reply to Job's speech.
- source_word: אֱלִיפַז
  chosen: Eliphaz
  rationale: Personal names are transliterated by standard English convention per
    translation philosophy.
- source_word: הַתֵּימָנִי
  chosen: the Temanite
  alternatives:
  - the man from Teman
  lexicon: HALOT
  rationale: The gentilic adjective denotes someone from Teman. 'The Temanite' is
    the natural English rendering and preserves the concise appositional identification.
- source_word: וַיֹּאמַר
  chosen: and said
  alternatives:
  - saying
  lexicon: HALOT
  rationale: This is the standard Hebrew narrative speech-introduction formula. Rendering
    it as 'and said' preserves the formal structure without unnecessary paraphrase.
- source_word: וַ
  chosen: Then
  alternatives:
  - And
  rationale: The initial waw-consecutive advances the narrative. 'Then' gives natural
    modern English flow while still reflecting sequence; the second waw is retained
    as 'and' in the speech formula.
