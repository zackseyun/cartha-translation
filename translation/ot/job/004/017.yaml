id: JOB.4.17
reference: Job 4:17
source:
  edition: WLC
  text: הַֽ֭/אֱנוֹשׁ מֵ/אֱל֣וֹהַ יִצְדָּ֑ק אִ֥ם מֵ֝/עֹשֵׂ֗/הוּ יִטְהַר גָּֽבֶר־׃
translation:
  text: Can mortal man be in the right before God? Can a man be pure before his Maker?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'Can mortal man be more just than God? Can a man be more
      pure than his Maker?'
    reason: alternative_reading
lexical_decisions:
- source_word: הַאֱנוֹשׁ
  chosen: mortal man
  alternatives:
  - man
  - a human being
  lexicon: HALOT
  rationale: אֱנוֹשׁ often emphasizes human frailty or mortality rather than humanity
    in the abstract. 'Mortal man' preserves both the singular masculine form and the
    nuance of weakness in contrast to God.
- source_word: מֵאֱלוֹהַ
  chosen: before God
  alternatives:
  - more than God
  - from God
  lexicon: HALOT
  rationale: With צדק in this construction, the preposition מן is idiomatically comparative
    or relational. In English, 'be in the right before God' communicates the sense
    naturally and avoids the misleadingly wooden 'more just than God' in this context.
- source_word: יִצְדָּק
  chosen: be in the right
  alternatives:
  - be righteous
  - be just
  lexicon: HALOT
  rationale: The verb צדק here asks whether a human can stand as right/just in relation
    to God. 'Be in the right' is idiomatic modern English that preserves the forensic-relational
    sense without sounding overly abstract.
- source_word: אִם
  chosen: Can
  alternatives:
  - or if
  - whether
  lexicon: HALOT
  rationale: In this poetic parallelism, אִם introduces the second interrogative line.
    Rendering it with a repeated 'Can' makes the parallel rhetorical question explicit
    in natural English.
- source_word: מֵעֹשֵׂהוּ
  chosen: before his Maker
  alternatives:
  - more than his Maker
  - from the one who made him
  lexicon: HALOT
  rationale: The participial form with suffix means 'his maker.' As in the first colon,
    מן is best represented idiomatically as relational/comparative in context. 'Before
    his Maker' preserves the reverent contrast between creature and creator.
- source_word: יִטְהַר
  chosen: be pure
  alternatives:
  - be clean
  - be pure/clean
  lexicon: HALOT
  rationale: טהר denotes purity/cleanness. 'Be pure' fits the moral-spiritual force
    of the parallel with צדק, while remaining readable.
- source_word: גָּבֶר
  chosen: a man
  alternatives:
  - a strong man
  - a warrior
  - a human
  lexicon: HALOT
  rationale: גָּבֶר is another masculine singular term for a man, often with emphasis
    on manhood or strength. Here it functions in poetic parallel with אֱנוֹשׁ. 'A
    man' preserves the gender-accurate singular form without overloading the line
    with an English term like 'strong man' that would distract from the parallelism.
