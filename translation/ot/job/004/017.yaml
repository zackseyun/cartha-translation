theological_decisions:
- issue: Human standing in relation to God
  chosen_reading: The verse is rendered as a rhetorical question about whether any
    mortal can be right or pure before God, without importing a later doctrinal formulation.
  alternative_readings:
  - A human being cannot be more just than God
  - A man cannot be purer than his Maker
  rationale: The Hebrew construction with מן can be taken comparatively ('more just
    than God') or relationally ('in the right before God'). In context, the verse
    contrasts human frailty with divine purity. The chosen rendering communicates
    that contrast clearly in English while preserving the rhetorical force and avoiding
    a potentially awkward comparative phrasing. The comparative alternative is preserved
    in a footnote.
  doctrine_reference: Translation philosophy §§1, 3, 4
