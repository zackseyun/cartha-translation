id: JOB.4.12
reference: Job 4:12
source:
  edition: WLC
  text: וְ֭/אֵלַ/י דָּבָ֣ר יְגֻנָּ֑ב וַ/תִּקַּ֥ח אָ֝זְנִ֗/י שֵׁ֣מֶץ מֶֽנְ/הֽוּ׃
translation:
  text: Now a word was secretly brought to me, and my ear caught a whisper of it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my ear received a hint of it' or 'caught a faint sound from it.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאֵלַי
  chosen: Now ... to me
  alternatives:
  - And to me
  - But to me
  lexicon: HALOT
  rationale: The conjunction with preposition literally means 'and/to me' or 'but/to
    me.' In English, beginning with 'Now' gives natural discourse flow while preserving
    the transition into Eliphaz's account of a revelatory experience. 'To me' is retained
    explicitly.
- source_word: דָּבָר
  chosen: a word
  alternatives:
  - a message
  - a matter
  lexicon: HALOT
  rationale: דבר has a broad semantic range, but here in the context of a reported
    revelation, 'word' best preserves the concise, somewhat mysterious force of the
    Hebrew without over-interpreting it as a full 'message.'
- source_word: יְגֻנָּב
  chosen: was secretly brought
  alternatives:
  - was stolen
  - was stealthily conveyed
  - came furtively
  lexicon: HALOT
  rationale: From גנב ('steal'), the passive form is used metaphorically for something
    coming in stealthily or secretly. 'Was secretly brought' communicates the idiomatic
    sense in readable English better than the overly literal 'was stolen,' which could
    mislead readers into a concrete theft image.
- source_word: וַתִּקַּח
  chosen: caught
  alternatives:
  - received
  - took
  lexicon: HALOT
  rationale: Literally 'and took,' with 'my ear' as subject. In idiomatic English,
    'my ear caught' naturally expresses auditory reception while preserving the concrete
    imagery of the Hebrew.
- source_word: אָזְנִי
  chosen: my ear
  alternatives:
  - my hearing
  lexicon: HALOT
  rationale: The singular 'my ear' should be preserved, matching the Hebrew's vivid
    bodily imagery.
- source_word: שֵׁמֶץ
  chosen: a whisper
  alternatives:
  - a faint sound
  - a hint
  - a small portion
  lexicon: HALOT
  rationale: The noun denotes a slight bit, trace, or faint sound. In this auditory
    context, 'a whisper' best fits the immediate sense and the atmosphere of hushed
    revelation. Because the term can also mean merely 'a small amount' or 'a hint,'
    that alternative is worth preserving in a footnote.
- source_word: מֶנְהוּ
  chosen: of it
  alternatives:
  - from it
  - thereof
  lexicon: HALOT
  rationale: The preposition plus pronoun is literally 'from it/him.' Since the antecedent
    is the masculine noun 'word,' English idiom favors 'of it' after 'caught a whisper.'
