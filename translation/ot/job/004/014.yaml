id: JOB.4.14
reference: Job 4:14
source:
  edition: WLC
  text: פַּ֣חַד קְ֭רָאַ/נִי וּ/רְעָדָ֑ה וְ/רֹ֖ב עַצְמוֹתַ֣/י הִפְחִֽיד׃
translation:
  text: Fear came upon me, and trembling, and it made the multitude of my bones shudder.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'it terrified many of my bones' / 'it made my bones tremble.' The Hebrew
      literally says 'the multitude of my bones,' a vivid poetic expression for an
      intense bodily reaction.
    reason: lexical_alternative
lexical_decisions:
- source_word: פַּחַד
  chosen: Fear
  alternatives:
  - dread
  - terror
  lexicon: HALOT
  rationale: The noun denotes fear/dread. 'Fear' is the broadest and most natural
    English rendering here, preserving the experiential sense without overstating
    it to 'terror'.
- source_word: קְרָאַנִי
  chosen: came upon me
  alternatives:
  - met me
  - befell me
  - called to me
  lexicon: HALOT
  rationale: From קרא in the sense 'meet, encounter, befall.' In context of an overwhelming
    experience, 'came upon me' best conveys sudden onset. 'Called to me' would reflect
    a different sense of the verb and does not fit the parallelism.
- source_word: וּרְעָדָה
  chosen: and trembling
  alternatives:
  - and a trembling
  - and quaking
  lexicon: HALOT
  rationale: The noun names the physical reaction accompanying fear. 'Trembling' is
    idiomatic in English and matches the poetic coordination with 'fear'.
- source_word: וְרֹב
  chosen: the multitude of
  alternatives:
  - many of
  - most of
  - the abundance of
  lexicon: HALOT
  rationale: רֹב literally denotes abundance or multitude. With 'my bones' it intensifies
    the bodily effect. 'The multitude of' preserves the Hebrew image more closely
    than smoothing to 'all my bones,' which would over-interpret.
- source_word: עַצְמוֹתַי
  chosen: my bones
  alternatives:
  - my whole frame
  lexicon: HALOT
  rationale: The concrete bodily term should be retained in poetry. 'My whole frame'
    captures the sense but loses the vivid Hebrew imagery.
- source_word: הִפְחִיד
  chosen: it made ... shudder
  alternatives:
  - it terrified
  - it made ... tremble
  - it filled ... with dread
  lexicon: HALOT
  rationale: 'The Hiphil of פחד is causative: it caused fright. Because the object
    is ''the multitude of my bones,'' ''made ... shudder'' expresses the bodily result
    in natural English while preserving the causative force.'
