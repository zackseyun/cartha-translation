id: JOB.4.8
reference: Job 4:8
source:
  edition: WLC
  text: כַּ/אֲשֶׁ֣ר רָ֭אִיתִי חֹ֣רְשֵׁי אָ֑וֶן וְ/זֹרְעֵ֖י עָמָ֣ל יִקְצְרֻֽ/הוּ׃
translation:
  text: As I have seen, those who plow iniquity and sow trouble reap it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'wickedness' for 'iniquity'; the Hebrew term can denote moral evil and,
      in some contexts, the trouble that comes from it.
    reason: lexical_alternative
  - marker: b
    text: Or 'misery' or 'harm' for 'trouble.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כַּאֲשֶׁר
  chosen: As
  alternatives:
  - Just as
  - According as
  lexicon: HALOT
  rationale: Introduces Eliphaz's observation in a comparative/experiential way. 'As
    I have seen' is idiomatic modern English and preserves the force of appeal to
    experience.
- source_word: רָאִיתִי
  chosen: I have seen
  alternatives:
  - I saw
  - I have observed
  lexicon: HALOT
  rationale: Perfect first person singular expressing the speaker's experiential observation.
    Present perfect in English fits the gnomic force better than simple past in this
    context.
- source_word: חֹרְשֵׁי
  chosen: those who plow
  alternatives:
  - plowers of
  - those who plough
  lexicon: HALOT
  rationale: Participle used substantivally. 'Those who plow' is natural English and
    preserves the agricultural metaphor.
- source_word: אָוֶן
  chosen: iniquity
  alternatives:
  - trouble
  - wickedness
  - evil
  lexicon: HALOT
  rationale: אָוֶן can denote wickedness or trouble, but here paired with עָמָל in
    a sowing/reaping proverb, it points to morally charged wrongdoing. 'Iniquity'
    preserves that ethical sense more clearly than the broader 'trouble.'
- source_word: וְזֹרְעֵי
  chosen: and sow
  alternatives:
  - and those who sow
  - and sowers of
  lexicon: HALOT
  rationale: Coordinate participle continuing the agricultural metaphor. Rendering
    without repeating 'those who' keeps the line readable while preserving the parallelism.
- source_word: עָמָל
  chosen: trouble
  alternatives:
  - misery
  - toil
  - harm
  lexicon: HALOT
  rationale: עָמָל often denotes trouble, misery, or harmful trouble. 'Trouble' works
    well in English parallelism with 'iniquity' and anticipates the consequence they
    reap.
- source_word: יִקְצְרֻהוּ
  chosen: reap it
  alternatives:
  - reap the same
  - harvest it
  lexicon: HALOT
  rationale: Verb plus 3ms suffix refers back collectively to the evil/trouble sown.
    English idiom naturally renders the singular resumptive object as 'it.' 'Reap
    it' preserves the sowing/reaping metaphor and the principle of corresponding consequence.
