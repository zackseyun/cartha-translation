theological_decisions:
- issue: Moral causality in Eliphaz's speech
  chosen_reading: Render the proverb straightforwardly as Eliphaz's observed principle
    without endorsing it as the book's final theological verdict.
  alternative_readings:
  - Strengthen it into an absolute doctrinal statement of retribution
  - Soften it to a mere general tendency
  rationale: In context this is part of Eliphaz's argument to Job. The translation
    should preserve the force of his claim while not importing interpretive qualifiers
    not present in the Hebrew.
  doctrine_reference: Preserve theological tension rather than resolve it.
