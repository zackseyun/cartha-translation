id: JOB.4.15
reference: Job 4:15
source:
  edition: WLC
  text: וְ֭/רוּחַ עַל פָּנַ֣/י יַחֲלֹ֑ף תְּ֝סַמֵּ֗ר שַֽׂעֲרַ֥ת בְּשָׂרִֽ/י־׃
translation:
  text: Then a spirit passed before my face; the hair of my flesh bristled.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a wind' or 'a breath' passed before my face. The Hebrew word רוּחַ can
      mean 'spirit,' 'wind,' or 'breath'; the context here favors 'spirit.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְרוּחַ
  chosen: a spirit
  alternatives:
  - a wind
  - a breath
  lexicon: HALOT
  rationale: רוּחַ can denote wind, breath, or spirit. In this visionary context,
    with an uncanny passing presence that provokes fear, 'spirit' best fits the immediate
    sense. The indefinite article reflects the lack of definiteness in Hebrew.
- source_word: עַל פָּנַי
  chosen: before my face
  alternatives:
  - over my face
  - past me
  lexicon: HALOT
  rationale: Literally 'upon my face,' but with יחלף ('pass by/pass on') the idiom
    indicates movement in front of the speaker. 'Before my face' preserves the concrete
    imagery more closely than the smoother 'past me'.
- source_word: יַחֲלֹף
  chosen: passed
  alternatives:
  - passed by
  - glided past
  lexicon: HALOT
  rationale: The verb חלף commonly means to pass on/by. English 'passed' with the
    following phrase 'before my face' communicates the event naturally without over-paraphrasing.
- source_word: תְּסַמֵּר
  chosen: bristled
  alternatives:
  - stood up
  - was made to stand on end
  lexicon: HALOT
  rationale: The verb means to make stiff or erect. With 'hair' as subject, 'bristled'
    is concise, vivid, and idiomatic in modern English.
- source_word: שַׂעֲרַת בְּשָׂרִי
  chosen: the hair of my flesh
  alternatives:
  - the hair of my body
  - my body hair
  - the hair on my body
  lexicon: HALOT
  rationale: The construct phrase is literally 'the hair of my flesh.' This rendering
    preserves the Hebrew imagery and solemn tone better than the more colloquial 'my
    body hair,' while still being understandable.
