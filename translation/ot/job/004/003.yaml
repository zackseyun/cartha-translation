id: JOB.4.3
reference: Job 4:3
source:
  edition: WLC
  text: הִ֭נֵּה יִסַּ֣רְתָּ רַבִּ֑ים וְ/יָדַ֖יִם רָפ֣וֹת תְּחַזֵּֽק׃
translation:
  text: Behold, you have instructed many, and you have strengthened weak hands.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'have disciplined' or 'have corrected'; the Hebrew verb can include the
      sense of instruction through correction.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנֵּה
  chosen: Behold
  alternatives:
  - Look
  - See
  lexicon: HALOT
  rationale: Discourse marker drawing attention to what follows. 'Behold' preserves
    the emphatic, somewhat elevated force in poetic speech better than the flatter
    'look' or 'see.'
- source_word: יִסַּרְתָּ
  chosen: have instructed
  alternatives:
  - have disciplined
  - have corrected
  - have admonished
  lexicon: HALOT
  rationale: From יסר, which can denote chastening, disciplining, or instructing through
    correction. In this context Eliphaz is commending Job's prior role in guiding
    others, so 'have instructed' best fits the positive, wisdom-oriented sense without
    overemphasizing punishment.
- source_word: רַבִּים
  chosen: many
  alternatives:
  - multitudes
  lexicon: HALOT
  rationale: Simple quantitative adjective/pronoun meaning 'many.' 'Many' is the most
    natural modern English rendering.
- source_word: יָדַיִם רָפוֹת
  chosen: weak hands
  alternatives:
  - feeble hands
  - slack hands
  lexicon: HALOT
  rationale: Idiomatic expression for diminished strength or discouragement. 'Weak
    hands' is clear modern English and preserves the bodily metaphor; 'feeble' is
    possible but slightly more archaic.
- source_word: תְּחַזֵּק
  chosen: you have strengthened
  alternatives:
  - you strengthen
  - you made strong
  lexicon: HALOT
  rationale: Piel of חזק, 'to strengthen/make strong.' Given the parallel with the
    preceding perfect and the retrospective sense of Eliphaz's statement, English
    present perfect ('have strengthened') best conveys the completed past action with
    present relevance.
