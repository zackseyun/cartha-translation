id: JOB.4.13
reference: Job 4:13
source:
  edition: WLC
  text: בִּ֭/שְׂעִפִּים מֵ/חֶזְיֹנ֣וֹת לָ֑יְלָה בִּ/נְפֹ֥ל תַּ֝רְדֵּמָ֗ה עַל אֲנָשִֽׁים־׃
translation:
  text: Amid troubling thoughts from visions of the night, when deep sleep falls on
    men,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Amid anxious thoughts from night visions.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'men'; here used generically for human beings.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּשְׂעִפִּים
  chosen: Amid troubling thoughts
  alternatives:
  - In disquieting thoughts
  - Among anxious thoughts
  - In thoughts
  lexicon: HALOT
  rationale: שְׂעִפִּים denotes divided, disquieting, or troubling thoughts/reflections.
    'Amid troubling thoughts' captures the mental disturbance implied by the noun
    in this context of nocturnal dread, while remaining natural English.
- source_word: מֵחֶזְיֹנוֹת לָיְלָה
  chosen: from visions of the night
  alternatives:
  - from night visions
  - because of visions of the night
  lexicon: HALOT
  rationale: חֶזְיוֹנוֹת are visions; with לָיְלָה the phrase naturally means 'visions
    of the night' or 'night visions.' The preposition מִן here is rendered 'from,'
    expressing source or occasion.
- source_word: בִּנְפֹל
  chosen: when ... falls
  alternatives:
  - at the falling of
  - as ... falls
  lexicon: HALOT
  rationale: The infinitive construct with בְּ introduces a temporal clause. Rendering
    it as 'when ... falls' gives clear English while preserving the temporal sense.
- source_word: תַּרְדֵּמָה
  chosen: deep sleep
  alternatives:
  - a deep sleep
  - slumber
  lexicon: HALOT
  rationale: תַּרְדֵּמָה refers to a heavy or deep sleep, not merely ordinary sleep.
    'Deep sleep' is the most transparent and idiomatic rendering.
- source_word: עַל אֲנָשִׁים
  chosen: on men
  alternatives:
  - upon people
  - on human beings
  lexicon: HALOT
  rationale: אֲנָשִׁים is the plural of אִישׁ and here refers generically to human
    beings. Per the gender-accurate policy, 'men' is retained in the main text as
    a representative generic, since the Hebrew is grammatically masculine; a more
    inclusive alternative is worth preserving in a footnote.
