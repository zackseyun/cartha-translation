id: JOB.4.10
reference: Job 4:10
source:
  edition: WLC
  text: שַׁאֲגַ֣ת אַ֭רְיֵה וְ/ק֣וֹל שָׁ֑חַל וְ/שִׁנֵּ֖י כְפִירִ֣ים נִתָּֽעוּ׃
translation:
  text: The lion’s roar, and the voice of the fierce lion, and the teeth of the young
    lions are broken.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'are torn out' or 'are pulled out.' The Hebrew verb conveys violent removal
      or breaking.
    reason: lexical_alternative
lexical_decisions:
- source_word: שַׁאֲגַת
  chosen: roar
  alternatives:
  - roaring
  lexicon: HALOT
  rationale: Construct noun from שׁאג, denoting the roaring cry of a lion. 'Roar'
    is the most natural English nominal rendering in this poetic line.
- source_word: אַרְיֵה
  chosen: lion
  lexicon: HALOT
  rationale: Standard Hebrew term for lion. No contextual reason to vary the basic
    gloss.
- source_word: קוֹל
  chosen: voice
  alternatives:
  - sound
  lexicon: HALOT
  rationale: קוֹל commonly means 'voice' or 'sound.' Here, in parallel with 'roar,'
    'voice' preserves the poetic personification and parallel structure better than
    flattening both cola to the same English term.
- source_word: שָׁחַל
  chosen: fierce lion
  alternatives:
  - lion
  - black lion
  lexicon: HALOT
  rationale: A poetic term for a lion, often suggesting strength or ferocity. 'Fierce
    lion' differentiates it from אַרְיֵה while preserving the poetic intensification.
    'Black lion' is too specific and uncertain for the main text.
- source_word: שִׁנֵּי
  chosen: the teeth of
  lexicon: HALOT
  rationale: Construct plural of 'teeth'; rendered straightforwardly in construct
    with the following noun.
- source_word: כְפִירִים
  chosen: young lions
  alternatives:
  - lion cubs
  lexicon: HALOT
  rationale: כפיר denotes a young, vigorous lion rather than a helpless cub. 'Young
    lions' fits the poetic register and the image of predatory strength.
- source_word: נִתָּעוּ
  chosen: are broken
  alternatives:
  - are torn out
  - are pulled out
  lexicon: HALOT
  rationale: Niphal perfect plural from נתע/נתץ-related semantic field as used here
    in context of teeth. The sense is that the teeth are forcibly removed or shattered.
    'Are broken' is idiomatic English and fits the poetic image of power being destroyed;
    more literal alternatives are preserved in a footnote.
