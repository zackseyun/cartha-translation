id: JOB.4.19
reference: Job 4:19
source:
  edition: WLC
  text: אַ֤ף שֹׁכְנֵ֬י בָֽתֵּי חֹ֗מֶר אֲשֶׁר בֶּ/עָפָ֥ר יְסוֹדָ֑/ם יְ֝דַכְּא֗וּ/ם
    לִ/פְנֵי עָֽשׁ׀־־־׃
translation:
  text: how much more those who dwell in houses of clay, whose foundation is in the
    dust, who are crushed before the moth!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'even those who dwell in houses of clay'; the Hebrew particle can be
      rendered more literally as 'even/indeed,' but here it likely carries an intensifying
      sense in the argument from greater to lesser.
    reason: lexical_alternative
  - marker: b
    text: Or 'they are crushed sooner than a moth' / 'more easily than a moth.' The
      phrase 'before the moth' is idiomatic and may express how quickly or easily
      humans are destroyed.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַף
  chosen: how much more
  alternatives:
  - even
  - indeed
  - also
  lexicon: HALOT
  rationale: 'In context following v.18, אַף intensifies the comparison: if God does
    not trust even his servants/angels, then all the more this is true of frail humans.
    ''How much more'' brings out the inferential force better than a flat ''even''.'
- source_word: שֹׁכְנֵי
  chosen: those who dwell
  alternatives:
  - inhabitants of
  - those who live in
  lexicon: HALOT
  rationale: The participle denotes ongoing habitation. 'Those who dwell' is natural
    English and preserves the participial sense.
- source_word: בָתֵּי חֹמֶר
  chosen: houses of clay
  alternatives:
  - houses of mud
  - clay houses
  lexicon: HALOT
  rationale: A genitive construction meaning dwellings made of clay/earth, metaphorically
    referring to the frailty of the human body. 'Houses of clay' is the established
    and most transparent rendering.
- source_word: אֲשֶׁר
  chosen: whose
  alternatives:
  - which
  - for whom
  lexicon: HALOT
  rationale: Used here to introduce a relative clause describing the dwellers. 'Whose'
    makes smooth English by linking the foundation to the implied human referent rather
    than awkwardly to the houses alone, while preserving the metaphor.
- source_word: בֶּעָפָר
  chosen: in the dust
  alternatives:
  - in dust
  - in the earth
  lexicon: HALOT
  rationale: עָפָר commonly means dust/loose earth and evokes mortality (cf. humanity
    from dust). 'In the dust' preserves both the literal image and the anthropological
    resonance.
- source_word: יְסוֹדָם
  chosen: whose foundation
  alternatives:
  - their foundation
  - whose base
  lexicon: HALOT
  rationale: The noun means foundation/base with a 3mp suffix. 'Whose foundation'
    fits the relative clause and keeps the singular collective sense.
- source_word: יְדַכְּאוּם
  chosen: who are crushed
  alternatives:
  - they crush them
  - they are broken
  - they are crushed to pieces
  lexicon: HALOT
  rationale: The verb דכא in the Piel can mean crush. Given the poetic context and
    unspecified agent, an English passive best conveys the sense that these frail
    humans are easily crushed. This avoids supplying an explicit subject absent from
    the Hebrew.
- source_word: לִפְנֵי
  chosen: before
  alternatives:
  - in the presence of
  - sooner than
  lexicon: HALOT
  rationale: The preposition literally means 'before.' In this idiom with moth, it
    likely conveys comparative ease or rapidity ('before a moth'), and the literal
    rendering preserves the poetic ambiguity.
- source_word: עָשׁ
  chosen: the moth
  alternatives:
  - a moth
  - moth
  lexicon: HALOT
  rationale: עָשׁ denotes moth. The article is not explicit in Hebrew, but English
    idiom often uses 'the moth' generically in proverbial comparison. This also echoes
    traditional renderings while remaining natural.
