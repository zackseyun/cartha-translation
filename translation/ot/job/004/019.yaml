theological_decisions:
- issue: Metaphorical reference of 'houses of clay'
  chosen_reading: A metaphor for mortal human frailty, likely referring to human bodies
    and earthly existence.
  alternative_readings:
  - Literal mud-brick houses as part of a broader image of human vulnerability
  rationale: The immediate context contrasts heavenly beings with humans and emphasizes
    mortality. The translation preserves the metaphor without over-explaining it in
    the main text.
