id: JOB.4.21
reference: Job 4:21
source:
  edition: WLC
  text: הֲ/לֹא נִסַּ֣ע יִתְרָ֣/ם בָּ֑/ם יָ֝מ֗וּתוּ וְ/לֹ֣א בְ/חָכְמָֽה־׃
translation:
  text: Is not their tent-cord pulled up within them? They die, and not in wisdom.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their cord is torn away from them'; traditionally, 'their excellency
      is removed in them.' The Hebrew likely evokes tent imagery, with a life-cord
      or tent-cord being pulled up.
    reason: lexical_alternative
  - marker: b
    text: Or 'without wisdom' or 'before gaining wisdom.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲלֹא
  chosen: Is not
  alternatives:
  - Surely
  - Is it not
  lexicon: HALOT
  rationale: Introduces a rhetorical question expecting agreement. 'Is not' preserves
    the interrogative force more transparently than the more interpretive 'surely'.
- source_word: נִסַּע
  chosen: pulled up
  alternatives:
  - torn away
  - removed
  - plucked up
  lexicon: HALOT
  rationale: From נסע in the passive/reflexive sense of being pulled up or removed,
    often used of tent pegs or encampments. 'Pulled up' fits the tent imagery and
    avoids overcommitting to violent nuance like 'torn away'.
- source_word: יִתְרָם
  chosen: their tent-cord
  alternatives:
  - their cord
  - their abundance
  - their excellency
  lexicon: HALOT
  rationale: יתר can denote a cord, especially a tent-cord, and this fits the surrounding
    imagery of fragile human life in a tent-like dwelling (cf. previous verse). Traditional
    renderings like 'their excellency' likely reflect a different semantic choice,
    but the concrete image is better supported here.
- source_word: בם
  chosen: within them
  alternatives:
  - from them
  - in them
  lexicon: HALOT
  rationale: 'The preposition ב with pronominal suffix is rendered ''within them''
    to preserve the internal, embodied sense: the life-cord is removed from within
    them. This is somewhat idiomatic in English while staying close to the Hebrew.'
- source_word: ימותו
  chosen: They die
  alternatives:
  - they perish
  lexicon: HALOT
  rationale: מות is the ordinary verb 'to die.' 'They die' is direct and avoids adding
    interpretive weight.
- source_word: ולא בחכמה
  chosen: and not in wisdom
  alternatives:
  - without wisdom
  - but not wisely
  lexicon: HALOT
  rationale: The phrase is terse and somewhat idiomatic. 'And not in wisdom' preserves
    the Hebrew structure and leaves open whether the sense is 'without attaining wisdom'
    or 'not wisely.'
