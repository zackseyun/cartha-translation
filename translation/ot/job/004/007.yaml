theological_decisions:
- issue: Eliphaz's rhetorical assertion about the fate of the innocent and upright
  chosen_reading: Render the statement straightforwardly as Eliphaz's claim without
    softening or endorsing it beyond the narrative context.
  alternative_readings:
  - A more interpretive rendering that signals the statement is disputable within
    the book's larger argument
  rationale: The verse presents Eliphaz's theology in direct rhetorical form. The
    translation should preserve his claim as stated, while not importing the book's
    later critique into the wording itself.
  doctrine_reference: Preserve theological tension rather than resolve it.
