id: JOB.4.7
reference: Job 4:7
source:
  edition: WLC
  text: זְכָר נָ֗א מִ֤י ה֣וּא נָקִ֣י אָבָ֑ד וְ֝/אֵיפֹ֗ה יְשָׁרִ֥ים נִכְחָֽדוּ־׃
translation:
  text: 'Please remember: who that was innocent ever perished? Or where were the upright
    cut off?'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'blameless' for 'innocent.'
    reason: lexical_alternative
  - marker: b
    text: Or 'destroyed' / 'wiped out' for 'cut off.'
    reason: lexical_alternative
lexical_decisions:
- source_word: זְכָר
  chosen: Please remember
  alternatives:
  - Remember
  - Consider
  lexicon: HALOT
  rationale: Imperative of זכר, calling for recollection or reflection. 'Please remember'
    captures the imperative softened by the following particle נָא in natural English.
- source_word: נָא
  chosen: Please
  alternatives:
  - now
  - I pray you
  lexicon: HALOT
  rationale: Polite/emphatic particle softening the imperative. In modern English,
    'please' best conveys its discourse force without archaism.
- source_word: מִי הוּא
  chosen: who that was
  alternatives:
  - who was it that
  - who ever
  lexicon: HALOT
  rationale: 'Interrogative plus pronoun adds emphasis: ''who was it that...?'' The
    rendering ''who that was'' preserves the rhetorical force while reading smoothly
    with the following adjective.'
- source_word: נָקִי
  chosen: innocent
  alternatives:
  - blameless
  - clean
  - guiltless
  lexicon: HALOT
  rationale: נָקִי commonly denotes innocence or freedom from guilt. 'Innocent' is
    the clearest modern English equivalent here, fitting Eliphaz's moral claim.
- source_word: אָבָד
  chosen: perished
  alternatives:
  - was destroyed
  - vanished
  lexicon: HALOT
  rationale: Qal perfect of אבד, indicating ruin or perishing. 'Perished' is idiomatic
    in this rhetorical question and preserves the gravity of the verb.
- source_word: וְאֵיפֹה
  chosen: Or where
  alternatives:
  - and where
  - where then
  lexicon: HALOT
  rationale: The conjunction plus interrogative introduces a parallel rhetorical question.
    'Or where' best reflects the disjunctive parallelism in English.
- source_word: יְשָׁרִים
  chosen: the upright
  alternatives:
  - upright people
  - the straight
  lexicon: HALOT
  rationale: Plural adjective used substantivally for morally upright persons. 'The
    upright' is concise and idiomatic.
- source_word: נִכְחָדוּ
  chosen: cut off
  alternatives:
  - wiped out
  - destroyed
  - effaced
  lexicon: HALOT
  rationale: Niphal perfect of כחד can mean to be hidden, effaced, or exterminated.
    In this context of fate/judgment parallel to 'perished,' 'cut off' best conveys
    removal or destruction in natural biblical English while preserving the passive/resultative
    sense.
