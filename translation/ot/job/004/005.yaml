id: JOB.4.5
reference: Job 4:5
source:
  edition: WLC
  text: כִּ֤י עַתָּ֨ה תָּב֣וֹא אֵלֶ֣י/ךָ וַ/תֵּ֑לֶא תִּגַּ֥ע עָ֝דֶ֗י/ךָ וַ/תִּבָּהֵֽל׀׃
translation:
  text: But now it comes to you, and you are weary; it touches you, and you are dismayed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'For now it comes to you.' The Hebrew conjunction כִּי can be rendered
      in several ways; here the main text uses an adversative sense to reflect the
      contrast in context.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew verb is feminine singular ('it comes' / 'it touches'), likely
      referring implicitly to calamity or trouble.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: But
  alternatives:
  - For
  - Indeed
  - Surely
  lexicon: HALOT
  rationale: 'In context Eliphaz is drawing a contrast with Job''s former counsel
    to others and his present reaction. Although כִּי often means ''for,'' here an
    adversative sense fits the discourse flow best in English: ''But now…''.'
- source_word: עַתָּה
  chosen: now
  alternatives:
  - at this time
  lexicon: HALOT
  rationale: Temporal adverb marking the present situation in contrast to Job's past
    behavior.
- source_word: תָּבֹוא
  chosen: it comes
  alternatives:
  - she comes
  - this comes
  lexicon: HALOT
  rationale: The verb is 3fs, likely with an implicit feminine subject referring generally
    to calamity/trouble/testing from the preceding context. English idiom naturally
    uses the impersonal 'it comes' rather than forcing a feminine pronoun.
- source_word: אֵלֶיךָ
  chosen: to you
  lexicon: HALOT
  rationale: Straightforward prepositional phrase indicating that the trouble has
    now reached Job personally.
- source_word: וַתֵּלֶא
  chosen: you are weary
  alternatives:
  - you are impatient
  - you are exhausted
  - you faint
  lexicon: HALOT
  rationale: From לאה, 'to be weary, exhausted.' The sense is that Job loses strength
    or endurance when suffering reaches him. 'You are weary' is natural English and
    preserves the core meaning without overinterpreting it as moral impatience.
- source_word: תִּגַּע
  chosen: it touches
  alternatives:
  - it strikes
  - it reaches
  lexicon: HALOT
  rationale: From נגע, 'touch, reach, strike.' 'Touches' keeps the metaphorical force
    and echoes the progression from coming to Job to making contact with him personally.
- source_word: עָדֶיךָ
  chosen: you
  alternatives:
  - unto you
  - as far as you
  lexicon: HALOT
  rationale: The preposition עד with suffix literally means 'up to you' or 'to you.'
    In idiomatic English after 'touches,' simple 'you' conveys the sense best.
- source_word: וַתִּבָּהֵל
  chosen: you are dismayed
  alternatives:
  - you are disturbed
  - you are terrified
  - you are confounded
  lexicon: HALOT
  rationale: From בהל, conveying alarm, dismay, or agitation. 'Dismayed' fits the
    emotional force without overstating it as sheer terror.
