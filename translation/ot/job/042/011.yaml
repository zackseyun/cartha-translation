id: JOB.42.11
reference: Job 42:11
source:
  edition: WLC
  text: וַ/יָּבֹ֣אוּ אֵ֠לָי/ו כָּל אֶחָ֨י/ו וְ/כָל אחיתי/ו וְ/כָל יֹדְעָ֣י/ו לְ/פָנִ֗ים וַ/יֹּאכְל֨וּ עִמּ֣/וֹ לֶחֶם֮ בְּ/בֵית/וֹ֒ וַ/יָּנֻ֤דוּ ל/וֹ֙ וַ/יְנַחֲמ֣וּ אֹת֔/וֹ עַ֚ל כָּל הָ֣/רָעָ֔ה אֲשֶׁר הֵבִ֥יא יְהוָ֖ה עָלָ֑י/ו וַ/יִּתְּנוּ ל֗/וֹ אִ֚ישׁ קְשִׂיטָ֣ה אֶחָ֔ת וְ/אִ֕ישׁ נֶ֥זֶם זָהָ֖ב אֶחָֽד־־־־־־׃ס
translation:
  text: Then all his brothers, all his sisters, and all who had known him before came to him, and they ate bread with him in his house. They showed him sympathy and comforted him for all the calamity that Yahweh had brought upon him. And each one gave him one qesitah and one gold ring.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all his former acquaintances.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'ate bread,' a common expression for sharing a meal.
    reason: cultural_note
  - marker: c
    text: The Hebrew term qesitah refers to an ancient unit or piece of value; its exact equivalent is uncertain.
    reason: cultural_note
  - marker: d
    text: Or 'one gold nose-ring'; the Hebrew word can refer to a ring worn in the nose or ear.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹאוּ
  chosen: came
  alternatives:
  - came in
  - arrived
  lexicon: HALOT
  rationale: Basic narrative wayyiqtol of בוא, straightforwardly rendered 'came' in English narrative style.
- source_word: אֵלָיו
  chosen: to him
  alternatives:
  - unto him
  lexicon: HALOT
  rationale: Simple prepositional phrase indicating movement toward Job.
- source_word: כָּל אֶחָיו וְכָל אֲחִיתָיו
  chosen: all his brothers, all his sisters
  alternatives:
  - all his brothers and sisters
  lexicon: HALOT
  rationale: Rendered explicitly and separately to mirror the Hebrew repetition of כָּל and to preserve the gendered pair in the source.
- source_word: וְכָל יֹדְעָיו לְפָנִים
  chosen: and all who had known him before
  alternatives:
  - and all his former acquaintances
  - and all who knew him formerly
  lexicon: HALOT
  rationale: יֹדְעָיו denotes those who knew him; לְפָנִים marks former time ('before, formerly'). The chosen rendering is natural English while preserving temporal contrast.
- source_word: וַיֹּאכְלוּ עִמּוֹ לֶחֶם
  chosen: they ate bread with him
  alternatives:
  - they ate with him
  - they shared a meal with him
  lexicon: HALOT
  rationale: Hebrew idiom literally says 'ate bread'; retained as 'ate bread' to preserve the concrete meal/fellowship imagery without over-paraphrasing.
- source_word: בְּבֵיתוֹ
  chosen: in his house
  alternatives:
  - at his house
  - in his home
  lexicon: HALOT
  rationale: בית is literally 'house'; 'in his house' is clear and suitably formal for the narrative.
- source_word: וַיָּנֻדוּ לוֹ
  chosen: They showed him sympathy
  alternatives:
  - they sympathized with him
  - they shook their heads for him
  lexicon: HALOT
  rationale: נוד in this context refers to gestures or expressions of sympathy/commiseration, not derision. 'Showed him sympathy' communicates the social action clearly in modern English.
- source_word: וַיְנַחֲמוּ אֹתוֹ
  chosen: comforted him
  alternatives:
  - consoled him
  lexicon: HALOT
  rationale: Standard rendering of נחם in contexts of consoling a sufferer.
- source_word: עַל כָּל הָרָעָה
  chosen: for all the calamity
  alternatives:
  - over all the evil
  - for all the trouble
  - for all the disaster
  lexicon: HALOT
  rationale: רָעָה here refers to experienced disaster/misfortune rather than moral evil. 'Calamity' best fits the context and avoids implying moral evil in God.
- source_word: אֲשֶׁר הֵבִיא יְהוָה עָלָיו
  chosen: that the LORD had brought upon him
  alternatives:
  - that the LORD had caused to come upon him
  - that the LORD had brought on him
  lexicon: HALOT
  rationale: הביא על is a standard causative expression, and יְהוָה is rendered per doctrine as 'the LORD'.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Required by doctrine's contested-terms table for the divine name.
- source_word: וַיִּתְּנוּ לוֹ אִישׁ קְשִׂיטָה אֶחָת
  chosen: And each one gave him one qesitah
  alternatives:
  - And each gave him one piece of money
  - And each gave him one kesitah
  lexicon: HALOT
  rationale: קְשִׂיטָה is an ancient unit/object of value with uncertain precise equivalence. Transliteration ('qesitah') preserves the lexical specificity better than flattening it to 'piece of money'.
- source_word: נֶזֶם זָהָב אֶחָד
  chosen: one gold ring
  alternatives:
  - one ring of gold
  - one gold nose-ring
  lexicon: HALOT
  rationale: נֶזֶם can denote a ring, often for nose or ear. Since the specific wearing place is not stated here, 'gold ring' is the least over-specific rendering; the more specific possibility is preserved in a footnote.
