theological_decisions:
- issue: Rendering of divine agency in Job's suffering
  chosen_reading: that the LORD had brought upon him
  alternative_readings:
  - that the LORD had allowed to come upon him
  rationale: The Hebrew explicitly attributes the calamity to the LORD's bringing it upon Job. The translation preserves the text's theological tension rather than softening divine agency.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it); Contested terms table for יְהוָה → 'the LORD'.
