id: JOB.42.15
reference: Job 42:15
source:
  edition: WLC
  text: וְ/לֹ֨א נִמְצָ֜א נָשִׁ֥ים יָפ֛וֹת כִּ/בְנ֥וֹת אִיּ֖וֹב בְּ/כָל הָ/אָ֑רֶץ וַ/יִּתֵּ֨ן
    לָ/הֶ֧ם אֲבִי/הֶ֛ם נַחֲלָ֖ה בְּ/ת֥וֹךְ אֲחֵי/הֶֽם־׃ס
translation:
  text: And nowhere in all the land were women found as beautiful as Job’s daughters,
    and their father gave them an inheritance among their brothers.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “in all the earth.”
    reason: lexical_alternative
lexical_decisions:
- source_word: נִמְצָא
  chosen: were found
  alternatives:
  - was found
  - could be found
  lexicon: HALOT
  rationale: 'Passive of מצא conveys existence/discovery: ''were found'' is a natural
    English passive matching the Hebrew sense. Because the subject is plural (''women''),
    English plural agreement is used even though the Hebrew verb form is singular
    in this construction.'
- source_word: נָשִׁים יָפוֹת
  chosen: women ... as beautiful
  alternatives:
  - women ... so beautiful
  - women ... beautiful
  lexicon: HALOT
  rationale: נָשִׁים means 'women,' not specifically 'wives.' יָפוֹת means 'beautiful/fair.'
    The comparative construction with כ ('as/like') is best rendered 'as beautiful
    as.'
- source_word: כִּבְנוֹת אִיּוֹב
  chosen: as Job’s daughters
  alternatives:
  - like Job’s daughters
  lexicon: HALOT
  rationale: The prefixed כ marks comparison. 'As Job’s daughters' is idiomatic in
    English within the comparative phrase 'as beautiful as Job’s daughters.'
- source_word: בְּכָל הָאָרֶץ
  chosen: in all the land
  alternatives:
  - in all the earth
  - throughout the whole land
  lexicon: HALOT
  rationale: הָאָרֶץ can mean 'land' or 'earth.' In Job's narrative setting, 'land'
    better fits the idiom and avoids overstating the scope as the entire globe, while
    still preserving the superlative force.
- source_word: וַיִּתֵּן לָהֶם
  chosen: gave them
  alternatives:
  - gave to them
  lexicon: HALOT
  rationale: Straightforward rendering of נתן with indirect object suffix. 'Gave them'
    is natural modern English.
- source_word: נַחֲלָה
  chosen: an inheritance
  alternatives:
  - inheritance property
  - a share of the inheritance
  lexicon: HALOT
  rationale: נַחֲלָה denotes an inheritance or hereditary possession. 'An inheritance'
    is the clearest concise rendering here.
- source_word: בְּתוֹךְ אֲחֵיהֶם
  chosen: among their brothers
  alternatives:
  - in the midst of their brothers
  - along with their brothers
  lexicon: HALOT
  rationale: בְּתוֹךְ means 'in the midst of/among.' אֲחֵיהֶם is specifically 'their
    brothers,' not the gender-neutral 'siblings.' This preserves the Hebrew's gender-specific
    wording and the notable social detail that the daughters received inheritance
    with male heirs.
