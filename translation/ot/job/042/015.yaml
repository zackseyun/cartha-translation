theological_decisions:
- issue: Gender-specific kinship term
  chosen_reading: among their brothers
  alternative_readings:
  - among their siblings
  rationale: The Hebrew explicitly uses the masculine plural 'brothers.' Per the translation
    philosophy's gender-accurate principle, the masculine kinship term is retained
    rather than neutralized.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Scope of הָאָרֶץ
  chosen_reading: in all the land
  alternative_readings:
  - in all the earth
  rationale: The term can denote either 'land' or 'earth.' Here 'land' better suits
    the narrative idiom and avoids implying a modern global survey, while still expressing
    exceptional beauty.
  doctrine_reference: DOCTRINE.md Translation philosophy §1
