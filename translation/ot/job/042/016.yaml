id: JOB.42.16
reference: Job 42:16
source:
  edition: WLC
  text: וַ/יְחִ֤י אִיּוֹב֙ אַֽחֲרֵי זֹ֔את מֵאָ֥ה וְ/אַרְבָּעִ֖ים שָׁנָ֑ה ו/ירא אֶת
    בָּנָי/ו֙ וְ/אֶת בְּנֵ֣י בָנָ֔י/ו אַרְבָּעָ֖ה דֹּרֽוֹת־־־׃
translation:
  text: After this, Job lived one hundred and forty years, and saw his sons and his
    sons’ sons, four generations.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, “lived to see his sons and his grandsons.” The Hebrew
      reads more literally, “saw his sons and his sons’ sons.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְחִי
  chosen: lived
  alternatives:
  - went on living
  - survived
  lexicon: HALOT
  rationale: The wayyiqtol of חיה here narrates continued life after the restoration
    events. 'Lived' is the most natural and direct English rendering in context.
- source_word: אַחֲרֵי זֹאת
  chosen: After this
  alternatives:
  - After these things
  - Afterward
  lexicon: HALOT
  rationale: This idiom marks subsequent time relative to the preceding events. 'After
    this' is concise, natural, and faithful.
- source_word: מֵאָה וְאַרְבָּעִים שָׁנָה
  chosen: one hundred and forty years
  alternatives:
  - a hundred and forty years
  lexicon: HALOT
  rationale: This is the straightforward numerical expression. 'One hundred and forty
    years' preserves the formal count while remaining readable.
- source_word: וַיַּרְא
  chosen: saw
  alternatives:
  - lived to see
  lexicon: HALOT
  rationale: The verb ראה literally means 'saw.' In English, 'lived to see' would
    make the implied sense explicit, but the Hebrew itself simply says 'saw,' so the
    main text keeps the more direct rendering.
- source_word: בָּנָיו
  chosen: his sons
  alternatives:
  - his children
  lexicon: HALOT
  rationale: The Hebrew specifically uses the masculine plural 'sons,' not a generic
    term for children. Per the gender-accurate principle, the masculine form is retained.
- source_word: בְּנֵי בָנָיו
  chosen: his sons’ sons
  alternatives:
  - his grandsons
  - his descendants
  lexicon: HALOT
  rationale: Literally the phrase is 'sons of his sons.' 'His sons’ sons' preserves
    the Hebrew structure and male-specific reference more closely than 'grandsons,'
    though the latter is idiomatic English.
- source_word: אַרְבָּעָה דֹּרוֹת
  chosen: four generations
  alternatives:
  - to the fourth generation
  lexicon: HALOT
  rationale: The phrase denotes the extent of Job's line that he saw. 'Four generations'
    is the clearest idiomatic rendering in English.
