theological_decisions:
- issue: Rendering the statement of divine omnipotence and purpose
  chosen_reading: I know that you can do all things, and no purpose of yours can be
    thwarted.
  alternative_readings:
  - I know that you can do all things, and no plan of yours can be hindered.
  - I know that you can do all things, and no thought from you is withheld.
  rationale: The Hebrew affirms God's unlimited ability and the irresistibility of
    his intention without requiring speculative theological expansion. 'Purpose' and
    'can be thwarted' communicate the text's plain sense in clear modern English while
    preserving its theological weight.
  doctrine_reference: Translation philosophy §§1, 3, 6
