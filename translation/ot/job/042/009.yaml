id: JOB.42.9
reference: Job 42:9
source:
  edition: WLC
  text: וַ/יֵּלְכוּ֩ אֱלִיפַ֨ז הַ/תֵּֽימָנִ֜י וּ/בִלְדַּ֣ד הַ/שּׁוּחִ֗י צֹפַר֙ הַ/נַּ֣עֲמָתִ֔י
    וַֽ/יַּעֲשׂ֔וּ כַּ/אֲשֶׁ֛ר דִּבֶּ֥ר אֲלֵי/הֶ֖ם יְהוָ֑ה וַ/יִּשָּׂ֥א יְהוָ֖ה אֶת
    פְּנֵ֥י אִיּֽוֹב־׃
translation:
  text: So Eliphaz the Temanite, Bildad the Shuhite, and Zophar the Naamathite went
    and did as the LORD had spoken to them, and the LORD accepted Job.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''the LORD lifted up the face of Job,'' an idiom meaning that he
      showed favor to or accepted him.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּלְכוּ
  chosen: went
  alternatives:
  - went away
  - departed
  lexicon: HALOT
  rationale: Wayyiqtol of הלך narrates the next action simply; 'went' is the most
    natural and sufficiently formal rendering in sequence with what follows.
- source_word: הַתֵּימָנִי / הַשּׁוּחִי / הַנַּעֲמָתִי
  chosen: the Temanite / the Shuhite / the Naamathite
  lexicon: HALOT
  rationale: These are gentilics identifying each man by place or clan. Standard transliterated
    adjectival forms preserve the proper-name character while remaining readable.
- source_word: וַיַּעֲשׂוּ
  chosen: did
  alternatives:
  - acted
  - carried out
  lexicon: HALOT
  rationale: עשה here is broad and idiomatic with כַּאֲשֶׁר, 'did as.' 'Did' best
    matches the Hebrew construction without over-specifying the action.
- source_word: כַּאֲשֶׁר דִּבֶּר אֲלֵיהֶם
  chosen: as ... had spoken to them
  alternatives:
  - according to what ... said to them
  - just as ... spoke to them
  lexicon: HALOT
  rationale: The clause refers back to the LORD's prior command. English past perfect
    'had spoken' clarifies anterior action relative to their going and doing.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following established reverential convention and preserving distinction from a
    mere proper-name transliteration.
- source_word: וַיִּשָּׂא ... אֶת־פְּנֵי
  chosen: accepted
  alternatives:
  - showed favor to
  - lifted up the face of
  lexicon: HALOT
  rationale: The idiom נשׂא פנים means to show favor or accept someone. In this context,
    where Job's intercession is received by God on behalf of the friends, 'accepted
    Job' gives the idiomatic sense in clear modern English. The more literal image
    is preserved in a footnote.
- source_word: אֶת־פְּנֵי אִיּוֹב
  chosen: Job
  alternatives:
  - the face of Job
  lexicon: HALOT
  rationale: English does not normally retain 'face' in this idiom. Rendering the
    object simply as 'Job' communicates that the LORD accepted him favorably.
