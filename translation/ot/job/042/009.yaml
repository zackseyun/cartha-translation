theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse contains the covenant name twice. Following the project's stated
    default, it is rendered 'the LORD' rather than transliterated forms.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Idiomatic expression of divine favor toward Job
  chosen_reading: the LORD accepted Job
  alternative_readings:
  - the LORD showed favor to Job
  - the LORD lifted up Job's face
  rationale: The Hebrew idiom indicates favorable reception, especially in the context
    of intercession. 'Accepted Job' preserves the theological point that God received
    Job and, through him, the friends' approach, without importing extra doctrinal
    claims.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3, §6
