theological_decisions:
- issue: Whether אֵלַי should be rendered literally as 'to me' or contextually as
    'about me'
  chosen_reading: about me
  alternative_readings:
  - to me
  - concerning me
  rationale: The verse evaluates the content of Eliphaz and his friends' speech in
    the dialogues, not merely the act of addressing God. Rendering 'about me' preserves
    the contextual sense without denying the literal preposition. This also avoids
    implying that the problem was only in prayer directed to God rather than in their
    theological claims about him.
  doctrine_reference: Translation philosophy §1, §3
- issue: Force of נְכוֹנָה in God's evaluation of the speeches
  chosen_reading: rightly
  alternative_readings:
  - what is right
  - truthfully
  - correctly
  rationale: The Hebrew allows a range including rightness, correctness, and propriety.
    'Rightly' preserves the theological tension by not narrowing the judgment to mere
    factual accuracy or to moral sincerity alone.
  doctrine_reference: Translation philosophy §3
