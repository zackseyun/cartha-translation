id: JOB.42.7
reference: Job 42:7
source:
  edition: WLC
  text: וַ/יְהִ֗י אַחַ֨ר דִּבֶּ֧ר יְהוָ֛ה אֶת הַ/דְּבָרִ֥ים הָ/אֵ֖לֶּה אֶל אִיּ֑וֹב
    וַ/יֹּ֨אמֶר יְהוָ֜ה אֶל אֱלִיפַ֣ז הַ/תֵּֽימָנִ֗י חָרָ֨ה אַפִּ֤/י בְ/ךָ֙ וּ/בִ/שְׁנֵ֣י
    רֵעֶ֔י/ךָ כִּ֠י לֹ֣א דִבַּרְתֶּ֥ם אֵלַ֛/י נְכוֹנָ֖ה כְּ/עַבְדִּ֥/י אִיּֽוֹב־־־׃
translation:
  text: And it happened, after the LORD had spoken these words to Job, that the LORD
    said to Eliphaz the Temanite, “My anger burns against you and against your two
    friends, because you have not spoken rightly about me, as my servant Job has.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'you have not spoken to me what is right, as my servant Job has.' The
      Hebrew preposition is literally 'to me,' but in context it likely means 'about
      me' or 'concerning me.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving
    the reverential substitution traditional in English Bibles and matching the DOCTRINE.md
    contested-terms guidance.
- source_word: וַיְהִי אַחַר
  chosen: And it happened, after
  alternatives:
  - After
  - Now after
  lexicon: HALOT
  rationale: Retains the narrative transition introduced by waw-consecutive plus אַחַר
    without over-literal stiffness. 'And it happened, after' reflects the Hebrew sequence
    while remaining readable.
- source_word: דִּבֶּר ... אֶת־הַדְּבָרִים הָאֵלֶּה
  chosen: had spoken these words
  alternatives:
  - had spoken these things
  - spoke these words
  lexicon: HALOT
  rationale: '''These words'' is a natural rendering of the accusative phrase and
    preserves the concreteness of דְּבָרִים. The pluperfect ''had spoken'' fits the
    temporal sense after ''after'' in English.'
- source_word: אֶל אִיּוֹב
  chosen: to Job
  alternatives:
  - with Job
  lexicon: HALOT
  rationale: אֶל with דבר commonly marks the addressee; 'to Job' is the straightforward
    rendering.
- source_word: אֱלִיפַז הַתֵּימָנִי
  chosen: Eliphaz the Temanite
  alternatives:
  - Eliphaz from Teman
  lexicon: HALOT
  rationale: Standard transliteration of the personal name and gentilic/title. 'The
    Temanite' is the conventional and concise rendering of the adjectival form.
- source_word: חָרָה אַפִּי
  chosen: My anger burns
  alternatives:
  - My anger is kindled
  - I am angry
  lexicon: HALOT
  rationale: The Hebrew idiom literally speaks of the nose/anger burning. 'My anger
    burns' preserves the vivid metaphor more closely than the flattened 'I am angry'
    while remaining idiomatic modern English.
- source_word: בְךָ וּבִשְׁנֵי רֵעֶיךָ
  chosen: against you and against your two friends
  alternatives:
  - with you and with your two friends
  - against you and your two friends
  lexicon: HALOT
  rationale: The preposition with חרה אפי conveys anger directed against someone.
    Repeating 'against' in English makes the relation explicit and natural.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  lexicon: HALOT
  rationale: Introduces the reason for divine anger. 'Because' is clearer in contemporary
    English than 'for' while preserving the causal force.
- source_word: לֹא דִבַּרְתֶּם
  chosen: you have not spoken
  alternatives:
  - you did not speak
  lexicon: HALOT
  rationale: English present perfect works well for the evaluative force of the completed
    action in context.
- source_word: אֵלַי
  chosen: about me
  alternatives:
  - to me
  - concerning me
  lexicon: HALOT
  rationale: Although the preposition is literally 'to me,' the context concerns the
    content of the friends' speech regarding God. 'About me' best captures the sense
    in idiomatic English and aligns with the contrast to Job's speech.
- source_word: נְכוֹנָה
  chosen: rightly
  alternatives:
  - what is right
  - correctly
  - truthfully
  lexicon: HALOT
  rationale: The term denotes what is right, proper, or established. 'Rightly' gives
    a concise adverbial rendering matching the Hebrew predicate and avoids over-specifying
    whether the issue is factual precision alone or moral/theological rectitude.
- source_word: כְּעַבְדִּי אִיּוֹב
  chosen: as my servant Job has
  alternatives:
  - like my servant Job
  - as my servant Job did
  lexicon: HALOT
  rationale: Retains the comparison with Job and preserves 'my servant' as a significant
    divine designation. Supplying 'has' completes the English comparison naturally
    from the prior verb.
