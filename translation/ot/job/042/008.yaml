theological_decisions:
- issue: Meaning of God's acceptance formula in relation to Job's mediation
  chosen_reading: God accepts Job as intercessor, and Job's prayer is the means by
    which judgment on the friends is withheld.
  alternative_readings:
  - God merely shows personal favor to Job without emphasizing mediation
  rationale: The sequence of commands, sacrifice, Job's prayer, and 'I will accept
    him' indicates an intercessory role for Job. The translation preserves this without
    importing later priestly or atonement categories beyond the text.
  doctrine_reference: Translation philosophy §3
- issue: Force of נְבָלָה in divine action
  chosen_reading: The phrase is rendered as God not dealing with them according to
    their folly rather than implying God himself would act disgracefully.
  alternative_readings:
  - God would 'do a disgraceful thing' to them
  rationale: Because נְבָלָה often describes morally outrageous folly, a wooden rendering
    could misleadingly suggest moral impropriety in God. The chosen wording reflects
    the judicial sense in context and avoids attributing evil to God while staying
    close to the Hebrew idiom.
  doctrine_reference: Affirmations; Translation philosophy §1
