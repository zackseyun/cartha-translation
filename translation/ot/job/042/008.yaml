id: JOB.42.8
reference: Job 42:8
source:
  edition: WLC
  text: וְ/עַתָּ֡ה קְחֽוּ לָ/כֶ֣ם שִׁבְעָֽה פָרִים֩ וְ/שִׁבְעָ֨ה אֵילִ֜ים וּ/לְכ֣וּ
    אֶל עַבְדִּ֣/י אִיּ֗וֹב וְ/הַעֲלִיתֶ֤ם עוֹלָה֙ בַּֽעַדְ/כֶ֔ם וְ/אִיּ֣וֹב עַבְדִּ֔/י
    יִתְפַּלֵּ֖ל עֲלֵי/כֶ֑ם כִּ֧י אִם פָּנָ֣י/ו אֶשָּׂ֗א לְ/בִלְתִּ֞י עֲשׂ֤וֹת עִמָּ/כֶם֙
    נְבָלָ֔ה כִּ֠י לֹ֣א דִבַּרְתֶּ֥ם אֵלַ֛/י נְכוֹנָ֖ה כְּ/עַבְדִּ֥/י אִיּֽוֹב־־׀־־׃
translation:
  text: Now take for yourselves seven bulls and seven rams, and go to my servant Job,
    and offer up a burnt offering for yourselves. And my servant Job will pray for
    you, for I will accept him, so that I may not deal with you according to your
    folly. For you have not spoken rightly about me, as my servant Job has.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'for only his face I will lift up,' a Hebrew idiom meaning 'I
      will accept him' or 'show favor to him.'
    reason: lexical_alternative
  - marker: b
    text: Or 'so that I may not do with you a disgraceful thing.' The Hebrew noun
      can denote folly or outrageous disgrace.
    reason: lexical_alternative
  - marker: c
    text: Or 'you have not spoken rightly to me.' The Hebrew may be understood as
      'to me' or, by sense in context, 'about me.'
    reason: alternative_reading
lexical_decisions:
- source_word: קְחוּ לָכֶם
  chosen: take for yourselves
  alternatives:
  - take
  - get for yourselves
  lexicon: HALOT
  rationale: The imperative plus reflexive/dative pronoun indicates acquiring these
    animals for their own use in the prescribed rite. 'Take for yourselves' preserves
    both the command and the beneficiary nuance.
- source_word: שִׁבְעָה פָרִים וְשִׁבְעָה אֵילִים
  chosen: seven bulls and seven rams
  alternatives:
  - seven young bulls and seven rams
  lexicon: HALOT
  rationale: פָרִים are male cattle/bulls; אֵילִים are rams. 'Young' is possible in
    some contexts for פַּר, but not required here, so 'bulls' is the cleaner rendering.
- source_word: עַבְדִּי אִיּוֹב
  chosen: my servant Job
  alternatives:
  - my slave Job
  lexicon: HALOT
  rationale: Although עֶבֶד can denote slave/servant, here it functions as an honorific
    for one in loyal service to God rather than emphasizing bonded status. 'Servant'
    best fits the idiom and established theological sense in this context.
- source_word: וְהַעֲלִיתֶם עוֹלָה
  chosen: offer up a burnt offering
  alternatives:
  - bring up a burnt offering
  - sacrifice a burnt offering
  lexicon: HALOT
  rationale: The Hiphil of עלה with עוֹלָה is the standard sacrificial idiom for presenting
    a whole burnt offering. 'Offer up' preserves the cultic sense without awkward
    literalism.
- source_word: בַּעַדְכֶם
  chosen: for yourselves
  alternatives:
  - on your behalf
  - for your sake
  lexicon: HALOT
  rationale: The preposition marks substitutionary/benefactive reference in sacrificial
    context. 'For yourselves' is natural English and matches the ritual purpose.
- source_word: יִתְפַּלֵּל עֲלֵיכֶם
  chosen: will pray for you
  alternatives:
  - will intercede for you
  - will pray on your behalf
  lexicon: HALOT
  rationale: The Hitpael of פלל here denotes prayer/intercession. 'Pray for you' is
    the most direct and readable rendering; the intercessory force is clear from context.
- source_word: כִּי אִם פָּנָיו אֶשָּׂא
  chosen: for I will accept him
  alternatives:
  - for only his face will I lift up
  - for I will show favor to him
  lexicon: HALOT
  rationale: The idiom 'lift up the face' means to show favor or accept. In context,
    God accepts Job's person and mediation. 'I will accept him' is idiomatic and concise;
    'show favor to him' is a close alternative.
- source_word: לְבִלְתִּי עֲשׂוֹת עִמָּכֶם נְבָלָה
  chosen: so that I may not deal with you according to your folly
  alternatives:
  - so that I may not do to you a disgraceful thing
  - so that I may not deal with you in a disgraceful way
  lexicon: HALOT
  rationale: נְבָלָה can denote senselessness, folly, or outrageous/disgraceful conduct.
    Here the sense is that God would otherwise treat them in line with their culpable
    folly. Rendering with 'according to your folly' makes the judicial logic explicit
    in natural English while preserving the moral force.
- source_word: לֹא דִבַּרְתֶּם אֵלַי נְכוֹנָה
  chosen: you have not spoken rightly about me
  alternatives:
  - you have not spoken what is right to me
  - you have not spoken correctly concerning me
  lexicon: HALOT
  rationale: The phrase can be construed as speaking rightly 'to me' or 'about me.'
    Given the broader context of the friends' misrepresentation of God, 'about me'
    best captures the sense in idiomatic English.
- source_word: כְּעַבְדִּי אִיּוֹב
  chosen: as my servant Job has
  alternatives:
  - like my servant Job
  - as my servant Job did
  lexicon: HALOT
  rationale: The comparison contrasts the friends' speech with Job's. Supplying 'has'
    completes the English clause naturally while preserving the Hebrew ellipsis.
