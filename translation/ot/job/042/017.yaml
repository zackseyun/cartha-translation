id: JOB.42.17
reference: Job 42:17
source:
  edition: WLC
  text: וַ/יָּ֣מָת אִיּ֔וֹב זָקֵ֖ן וּ/שְׂבַ֥ע יָמִֽים׃
translation:
  text: And Job died, old and full of days.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'satisfied with days' / 'having had his fill of days,' a Hebrew idiom
      for a full lifespan.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּמָת
  chosen: And he died
  alternatives:
  - So he died
  - Then he died
  lexicon: HALOT
  rationale: Wayyiqtol of מוּת/מות narrates the next event in sequence. English idiom
    is best served by 'And ... died' here, with the explicit subject supplied by the
    following proper name.
- source_word: אִיּוֹב
  chosen: Job
  rationale: Proper name transliterated by standard English convention, in keeping
    with the translation philosophy to transliterate names.
- source_word: זָקֵן
  chosen: old
  alternatives:
  - aged
  - an old man
  lexicon: HALOT
  rationale: Adjective meaning 'old, aged.' 'Old' is the most natural concise English
    predicate complement here and preserves the straightforward Hebrew description
    without adding nuance.
- source_word: וּשְׂבַע יָמִים
  chosen: full of days
  alternatives:
  - satisfied with days
  - having had his fill of days
  lexicon: HALOT
  rationale: This idiom occurs in death notices and denotes a full, complete lifespan.
    'Full of days' preserves the Hebrew imagery and traditional idiom while remaining
    understandable in modern English. More interpretive renderings like 'having lived
    a full life' are possible but less textually transparent.
