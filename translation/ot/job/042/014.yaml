id: JOB.42.14
reference: Job 42:14
source:
  edition: WLC
  text: וַ/יִּקְרָ֤א שֵׁם הָֽ/אַחַת֙ יְמִימָ֔ה וְ/שֵׁ֥ם הַ/שֵּׁנִ֖ית קְצִיעָ֑ה וְ/שֵׁ֥ם
    הַ/שְּׁלִישִׁ֖ית קֶ֥רֶן הַפּֽוּךְ־׃
translation:
  text: He named the first Jemimah, the second Keziah, and the third Keren-happuch.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Keren-happuch likely means 'horn of antimony' or 'horn of eye paint,' referring
      to a cosmetic container or cosmetic pigment.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְרָא
  chosen: He named
  alternatives:
  - he called
  lexicon: HALOT
  rationale: The verb קרא with שֵׁם commonly means to give or call a name. 'He named'
    is idiomatic modern English and captures the naming action more naturally than
    the more literal 'he called.' The subject remains singular masculine from the
    context, referring to Job.
- source_word: שֵׁם
  chosen: named
  alternatives:
  - name
  lexicon: HALOT
  rationale: Although the Hebrew uses the noun 'name' in the construction 'called
    the name of,' English normally expresses this as the verb 'named.' This is an
    optimal-equivalence adjustment rather than a paraphrase.
- source_word: הָאַחַת
  chosen: the first
  alternatives:
  - the one
  lexicon: HALOT
  rationale: In this enumerative context, 'the first' is the natural English equivalent
    for 'the one' when listing daughters by order.
- source_word: יְמִימָה
  chosen: Jemimah
  rationale: This is a personal name, so per translation philosophy it is transliterated
    rather than translated. Traditional English form 'Jemimah' is standard and recognizable.
- source_word: הַשֵּׁנִית
  chosen: the second
  lexicon: HALOT
  rationale: Straightforward ordinal rendering in the naming sequence.
- source_word: קְצִיעָה
  chosen: Keziah
  alternatives:
  - Qetsiah
  rationale: This is a personal name and is therefore transliterated. 'Keziah' follows
    established English convention. A more strictly phonetic transliteration such
    as 'Qetsiah' is possible but less natural for English readers.
- source_word: הַשְּׁלִישִׁית
  chosen: the third
  lexicon: HALOT
  rationale: Straightforward ordinal rendering in the naming sequence.
- source_word: קֶרֶן הַפּוּךְ
  chosen: Keren-happuch
  alternatives:
  - Kerenhapuch
  - Horn of antimony
  - Horn of eye paint
  lexicon: HALOT
  rationale: This is a personal name composed of meaningful elements, but the translation
    philosophy directs that personal names be transliterated rather than translated.
    The hyphenated form preserves the compound nature of the Hebrew name while remaining
    readable. Because the name has a transparent lexical sense related to a cosmetic
    container or cosmetic pigment, that sense is worth preserving in a footnote.
