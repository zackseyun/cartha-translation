id: JOB.42.5
reference: Job 42:5
source:
  edition: WLC
  text: לְ/שֵֽׁמַע אֹ֥זֶן שְׁמַעְתִּ֑י/ךָ וְ֝/עַתָּ֗ה עֵינִ֥/י רָאָֽתְ/ךָ־׃
translation:
  text: I had heard of you by the hearing of the ear, but now my eye has seen you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'by hearsay'; the Hebrew literally says 'by the hearing of the ear.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לְשֵׁמַע אֹזֶן
  chosen: by the hearing of the ear
  alternatives:
  - by hearsay
  - with the hearing of the ear
  - by what the ear hears
  lexicon: HALOT
  rationale: The Hebrew is an idiomatic expression built from 'hearing' plus 'ear.'
    A more dynamic rendering like 'by hearsay' captures the sense, but the more literal
    'by the hearing of the ear' preserves Job's contrast between mediated report and
    direct encounter while remaining intelligible in English.
- source_word: שְׁמַעְתִּיךָ
  chosen: I had heard of you
  alternatives:
  - I heard you
  - I had heard you
  lexicon: HALOT
  rationale: 'Although the verb with 2ms suffix is literally ''I heard you,'' in English
    ''heard of you'' best conveys the sense in this context: prior knowledge about
    God by report rather than auditory perception of God''s voice. The pluperfect-like
    English ''had heard'' fits the contrast with ''now'' and the present result of
    the encounter.'
- source_word: וְעַתָּה
  chosen: but now
  alternatives:
  - and now
  - now
  lexicon: HALOT
  rationale: The conjunction marks a strong contrast between former indirect knowledge
    and present direct perception. 'But now' brings out that adversative force more
    naturally than a simple 'and now'.
- source_word: עֵינִי
  chosen: my eye
  alternatives:
  - my eyes
  lexicon: HALOT
  rationale: The Hebrew is singular with first-person suffix. Retaining the singular
    preserves the poetic diction and the individual immediacy of Job's confession.
- source_word: רָאָתְךָ
  chosen: has seen you
  alternatives:
  - sees you
  - saw you
  lexicon: HALOT
  rationale: The perfect verb expresses the completed reality of Job's new encounter.
    English present perfect ('has seen') captures the completed action with present
    significance better than a simple past in this context.
