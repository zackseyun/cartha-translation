theological_decisions:
- issue: Nature of Job's 'seeing' God
  chosen_reading: Render straightforwardly as 'has seen you' without qualifying it
    as merely metaphorical or as a full beatific vision.
  alternative_readings:
  - has perceived you
  - has encountered you directly
  rationale: The Hebrew verb for seeing should be translated plainly. The text contrasts
    indirect hearing with direct seeing; adding interpretive qualifiers would resolve
    ambiguity the verse itself leaves open. This preserves theological tension without
    importing a specific doctrine of divine visibility.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
