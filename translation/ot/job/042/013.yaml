id: JOB.42.13
reference: Job 42:13
source:
  edition: WLC
  text: וַֽ/יְהִי ל֛/וֹ שִׁבְעָ֥נָה בָנִ֖ים וְ/שָׁל֥וֹשׁ בָּנֽוֹת־׃
translation:
  text: He also had seven sons and three daughters.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיְהִי
  chosen: He also had
  alternatives:
  - And he had
  - And there were to him
  lexicon: HALOT
  rationale: The idiom ויהי + ל + pronominal suffix expresses possession/existence
    ('there was to him' = 'he had'). Rendering it as 'He had' is natural English;
    'also' reflects the narrative continuation from the preceding restoration statements.
- source_word: לוֹ
  chosen: He also had
  alternatives:
  - to him
  lexicon: HALOT
  rationale: The preposition with suffix is absorbed into the English possessive construction
    'he had,' which best conveys the Hebrew idiom in readable modern English.
- source_word: שִׁבְעָנָה
  chosen: seven
  lexicon: HALOT
  rationale: Cardinal number straightforwardly rendered as 'seven.'
- source_word: בָנִים
  chosen: sons
  alternatives:
  - children
  lexicon: HALOT
  rationale: The Hebrew specifically denotes male children, so 'sons' preserves the
    gendered reference rather than neutralizing it to 'children,' in keeping with
    the gender-accurate policy.
- source_word: וְשָׁלֹשׁ
  chosen: and three
  lexicon: HALOT
  rationale: Simple conjunction plus cardinal number, naturally rendered 'and three.'
- source_word: בָּנוֹת
  chosen: daughters
  alternatives:
  - girls
  lexicon: HALOT
  rationale: The Hebrew specifically denotes female children; 'daughters' is the standard
    and appropriately formal rendering in context.
