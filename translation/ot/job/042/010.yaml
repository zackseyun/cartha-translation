theological_decisions:
- issue: Relation between Job's prayer and the LORD's restoration
  chosen_reading: Temporal linkage expressed as 'when he prayed' without making a
    stronger causal claim than the Hebrew requires.
  alternative_readings:
  - 'causal: ''because he prayed'''
  - 'more formal temporal: ''in his praying'''
  rationale: The Hebrew construction ב + infinitive construct can indicate time or
    circumstance. The verse clearly links Job's intercession with the restoration,
    but the translation should preserve that connection without importing a mechanistic
    theology of reward.
  doctrine_reference: Preserve theological tension rather than resolve it.
