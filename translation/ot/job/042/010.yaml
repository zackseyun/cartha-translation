id: JOB.42.10
reference: Job 42:10
source:
  edition: WLC
  text: וַֽ/יהוָ֗ה שָׁ֚ב אֶת שבית אִיּ֔וֹב בְּ/הִֽתְפַּֽלְל֖/וֹ בְּעַ֣ד רֵעֵ֑/הוּ
    וַ֧/יֹּסֶף יְהוָ֛ה אֶת כָּל אֲשֶׁ֥ר לְ/אִיּ֖וֹב לְ/מִשְׁנֶֽה־־־׃
translation:
  text: And the LORD restored Job’s fortunes when he prayed for his friends, and the
    LORD added to Job all that had been his, double.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'turned Job’s captivity' / 'turned Job’s fortunes.' The Hebrew idiom
      refers to restoring a person’s condition, not necessarily release from literal
      captivity.
    reason: lexical_alternative
  - marker: b
    text: Or 'on behalf of his friends.'
    reason: lexical_alternative
  - marker: c
    text: Or 'gave Job twice as much as he had before.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  rationale: Follows the project's default rendering for the divine name, preserving
    the traditional English convention signaled in DOCTRINE.md.
- source_word: שָׁב אֶת שבית
  chosen: restored ... fortunes
  alternatives:
  - restored the captivity of
  - turned the fortunes of
  - restored the situation of
  lexicon: HALOT
  rationale: The idiom שׁוּב + שְׁבוּת/שְׁבִית commonly means to restore someone's
    fortunes or reverse their condition, not necessarily literal captivity in this
    context. 'Restored Job’s fortunes' is idiomatic modern English and fits Job's
    situation.
- source_word: בְּהִתְפַּלְלוֹ
  chosen: when he prayed
  alternatives:
  - in his praying
  - as he prayed
  - while he prayed
  lexicon: HALOT
  rationale: The prefixed ב plus infinitive construct can mark temporal circumstance.
    'When he prayed' is natural English and preserves the temporal linkage without
    overstating causation.
- source_word: בְּעַד רֵעֵהוּ
  chosen: for his friends
  alternatives:
  - on behalf of his friends
  - for his companions
  lexicon: HALOT
  rationale: בְּעַד conveys intercessory 'for/on behalf of,' and רֵעַ here refers
    collectively to Job's companions. 'Friends' is the most natural rendering in context.
- source_word: וַיֹּסֶף
  chosen: added
  alternatives:
  - increased
  - gave
  lexicon: HALOT
  rationale: The verb יסף means to add or increase. 'Added' preserves the lexical
    sense and works well with the following object phrase.
- source_word: אֶת כָּל אֲשֶׁר לְאִיּוֹב
  chosen: to Job all that had been his
  alternatives:
  - all that belonged to Job
  - everything Job had
  lexicon: HALOT
  rationale: The phrase denotes the totality of what belonged to Job. 'All that had
    been his' keeps the retrospective sense in context after his losses, while remaining
    idiomatic.
- source_word: לְמִשְׁנֶה
  chosen: double
  alternatives:
  - twofold
  - twice as much
  lexicon: HALOT
  rationale: לְמִשְׁנֶה indicates duplication or doubling. 'Double' is concise and
    natural; the English sentence structure conveys that the restoration was doubled.
