id: ZEC.10.7
reference: Zechariah 10:7
source:
  edition: WLC
  text: וְ/הָי֤וּ כְ/גִבּוֹר֙ אֶפְרַ֔יִם וְ/שָׂמַ֥ח לִבָּ֖/ם כְּמוֹ יָ֑יִן וּ/בְנֵי/הֶם֙
    יִרְא֣וּ וְ/שָׂמֵ֔חוּ יָגֵ֥ל לִבָּ֖/ם בַּ/יהוָֽה־׃
translation:
  text: Ephraim will be like a mighty warrior, and their heart will rejoice as with
    wine; their children will see it and rejoice; their heart will exult in the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their sons will see and rejoice.' The Hebrew uses 'sons,' which can
      function generically for children/descendants in context.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'their heart,' with a singular noun used collectively.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיוּ
  chosen: will be
  alternatives:
  - shall be
  - and they will become
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in prophetic discourse functions
    futurally; 'will be' gives natural English and fits the restoration promise context.
- source_word: כְגִבּוֹר
  chosen: like a mighty warrior
  alternatives:
  - like a hero
  - like a mighty man
  lexicon: HALOT
  rationale: גִּבּוֹר commonly denotes a strong warrior or champion. 'Mighty warrior'
    preserves the martial sense better than the more generic 'hero'.
- source_word: אֶפְרַיִם
  chosen: Ephraim
  rationale: Proper name is transliterated per translation philosophy. Here it stands
    collectively for the northern people/tribe, but the name itself is retained.
- source_word: וְשָׂמַח לִבָּם
  chosen: their heart will rejoice
  alternatives:
  - their hearts will rejoice
  - their heart will be glad
  lexicon: HALOT
  rationale: Hebrew uses singular 'heart' with a plural suffix as a collective singular.
    'Their heart' preserves the Hebrew idiom more closely, while still being understandable
    in English.
- source_word: כְּמוֹ יַיִן
  chosen: as with wine
  alternatives:
  - as from wine
  - like wine
  lexicon: HALOT
  rationale: The comparison is to the gladness associated with wine, not identity
    with wine itself. 'As with wine' communicates simile and implied festive joy without
    overinterpreting intoxication.
- source_word: וּבְנֵיהֶם
  chosen: their children
  alternatives:
  - their sons
  lexicon: HALOT
  rationale: Though בנים can be rendered 'sons,' in this collective familial context
    'children' best conveys the likely representative sense without denying the masculine
    form's generic force.
- source_word: יִרְאוּ
  chosen: will see it
  alternatives:
  - will see
  - will look
  lexicon: HALOT
  rationale: The verb's object is implicit in Hebrew. English idiom benefits from
    supplying 'it,' referring to the restored joy/condition of Ephraim, to avoid abruptness.
- source_word: וְשָׂמֵחוּ
  chosen: and rejoice
  alternatives:
  - and be glad
  lexicon: HALOT
  rationale: Keeps lexical continuity with the earlier שמח while varying English syntax
    naturally after 'will see it.'
- source_word: יָגֵל לִבָּם
  chosen: their heart will exult
  alternatives:
  - their heart will rejoice
  - their heart will be glad
  lexicon: HALOT
  rationale: גיל denotes exuberant joy; 'exult' differentiates it from שמח and preserves
    the heightened emotional force.
- source_word: בַּיהוָה
  chosen: in the LORD
  alternatives:
  - in Yahweh
  lexicon: HALOT
  rationale: Per doctrine, יהוה is rendered 'the LORD.' The preposition ב marks sphere/ground
    of rejoicing, naturally rendered 'in the LORD'.
