theological_decisions:
- issue: Whether the final figure/group is portrayed positively or negatively in כָל
    נוֹגֵשׂ
  chosen_reading: 'positive/neutral leadership sense: ''every ruler'''
  alternative_readings:
  - 'negative sense: ''every oppressor'''
  - 'administrative sense: ''every taskmaster'''
  rationale: 'The verse stacks images of strength and governance emerging from Judah:
    cornerstone, tent peg, battle bow, then a final governing figure/group. Rendering
    נֹגֵשׂ as ''oppressor'' would introduce a discordant negative element not clearly
    signaled by the immediate context. Because the Hebrew term can bear a harsher
    sense elsewhere, the alternative is preserved in a footnote rather than erased.'
  doctrine_reference: Preserve theological tension rather than resolve it; document
    ambiguity and preserve alternatives in footnotes.
