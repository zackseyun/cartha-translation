id: ZEC.10.4
reference: Zechariah 10:4
source:
  edition: WLC
  text: מִמֶּ֤/נּוּ פִנָּה֙ מִמֶּ֣/נּוּ יָתֵ֔ד מִמֶּ֖/נּוּ קֶ֣שֶׁת מִלְחָמָ֑ה מִמֶּ֛/נּוּ
    יֵצֵ֥א כָל נוֹגֵ֖שׂ יַחְדָּֽו־׃
translation:
  text: From him will come the cornerstone, from him the tent peg, from him the battle
    bow; from him every ruler will go out together.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'every oppressor' or 'every taskmaster.' The Hebrew term can denote one
      who drives or exacts labor/tribute, but here it may refer more broadly to a
      ruler emerging from Judah.
    reason: alternative_reading
  - marker: b
    text: '''Cornerstone,'' ''tent peg,'' and ''battle bow'' are metaphorical images
      of stability, support, and military strength arising from Judah.'
    reason: cultural_note
lexical_decisions:
- source_word: מִמֶּנּוּ
  chosen: from him
  alternatives:
  - from it
  - from them
  lexicon: HALOT
  rationale: The repeated preposition + pronominal suffix is singular masculine in
    form. In context the antecedent is best taken collectively/personally as Judah/Judah's
    restored people in the preceding context, but English preserves the singular form
    with 'him' rather than smoothing to 'them.'
- source_word: פִנָּה
  chosen: cornerstone
  alternatives:
  - corner
  - chief cornerstone
  lexicon: HALOT
  rationale: The noun can denote a corner or cornerstone. In this list of leadership/strength
    images, 'cornerstone' best conveys a foundational, stabilizing figure or source,
    matching common prophetic metaphor without overexpanding to 'chief cornerstone'
    in the main text.
- source_word: יָתֵד
  chosen: tent peg
  alternatives:
  - peg
  - stake
  - nail
  lexicon: HALOT
  rationale: The word denotes a peg, often a tent peg. 'Tent peg' is concrete and
    idiomatic in English, preserving the image of firmness/support better than the
    vaguer 'peg' and avoiding the potentially misleading architectural 'nail'.
- source_word: קֶשֶׁת מִלְחָמָה
  chosen: the battle bow
  alternatives:
  - the bow of war
  - war bow
  lexicon: HALOT
  rationale: Construct phrase meaning a bow used for war. 'Battle bow' is concise,
    natural English and preserves the martial sense.
- source_word: יֵצֵא
  chosen: will go out
  alternatives:
  - will come forth
  - will proceed
  lexicon: HALOT
  rationale: The basic sense of יצא is 'go out/come out.' 'Will go out' keeps the
    verbal imagery straightforward and avoids interpretive elevation.
- source_word: כָל נוֹגֵשׂ
  chosen: every ruler
  alternatives:
  - every oppressor
  - every taskmaster
  - every commander
  lexicon: HALOT
  rationale: נֹגֵשׂ often means one who drives, exacts, or oppresses; however, in
    this positive restoration context and in parallel with the preceding leadership/military
    images, it likely refers to one who exercises rule or authority. 'Every ruler'
    fits the context better than the negatively loaded 'oppressor,' while remaining
    broad enough not to overdefine the office.
- source_word: יַחְדָּו
  chosen: together
  alternatives:
  - altogether
  - as one
  lexicon: HALOT
  rationale: The adverb indicates collectivity. 'Together' is the most natural modern
    English rendering and leaves the exact nuance open.
