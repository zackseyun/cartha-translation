theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrinal guideline specifies 'the LORD' for YHWH, following Jewish
    reverence tradition and common biblical English convention.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Whether to interpret עַתּוּדִים directly as metaphorical leaders
  chosen_reading: Retain the literal image 'male goats' in the main text and preserve
    the metaphorical sense in a footnote.
  alternative_readings:
  - leaders
  - rulers
  rationale: The Hebrew term literally denotes male goats but can metaphorically refer
    to leading men. Preserving the image maintains the verse's animal-pastoral metaphor
    and avoids over-resolving the figure in the main text.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3'
