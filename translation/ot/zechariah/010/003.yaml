id: ZEC.10.3
reference: Zechariah 10:3
source:
  edition: WLC
  text: עַל הָֽ/רֹעִים֙ חָרָ֣ה אַפִּ֔/י וְ/עַל הָ/עַתּוּדִ֖ים אֶפְק֑וֹד כִּֽי פָקַד֩
    יְהוָ֨ה צְבָא֤וֹת אֶת עֶדְר/וֹ֙ אֶת בֵּ֣ית יְהוּדָ֔ה וְ/שָׂ֣ם אוֹתָ֔/ם כְּ/ס֥וּס
    הוֹד֖/וֹ בַּ/מִּלְחָמָֽה־־־־־׃
translation:
  text: My anger burns against the shepherds, and I will punish the male goats; for
    the LORD of Armies has attended to his flock, the house of Judah, and will make
    them like his majestic war horse in battle.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the leaders'; the Hebrew 'male goats' can be used metaphorically for
      prominent rulers or leading men.
    reason: lexical_alternative
  - marker: b
    text: 'Traditional rendering: ''the LORD of Hosts.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: הָרֹעִים
  chosen: the shepherds
  alternatives:
  - the leaders
  - the pastors
  lexicon: HALOT
  rationale: Literal 'shepherds' is retained because the prophetic metaphor of leaders
    as shepherds is transparent in English and preserves the indictment imagery.
- source_word: חָרָה אַפִּי
  chosen: My anger burns
  alternatives:
  - my anger is kindled
  - my nose burns
  lexicon: HALOT
  rationale: This idiom expresses burning anger. 'My anger burns' is natural modern
    English while preserving the intensity of the Hebrew idiom.
- source_word: הָעַתּוּדִים
  chosen: the male goats
  alternatives:
  - the he-goats
  - the leaders
  lexicon: HALOT
  rationale: The noun literally denotes male goats, often metaphorically for prominent
    leaders. The main text keeps the animal image to match the shepherd metaphor and
    preserve the prophetic texture; the metaphorical sense is worth preserving in
    a footnote.
- source_word: אֶפְקֹד
  chosen: I will punish
  alternatives:
  - I will visit
  - I will attend to
  - I will call to account
  lexicon: HALOT
  rationale: In this hostile context, פקד carries the sense of punitive visitation.
    'Punish' makes the negative force explicit in idiomatic English.
- source_word: פָקַד
  chosen: has attended to
  alternatives:
  - has visited
  - has cared for
  - has taken note of
  lexicon: HALOT
  rationale: The second occurrence of פקד is positive, referring to the LORD's intervention
    on behalf of his people. 'Has attended to' preserves the verbal link with the
    earlier clause while fitting the favorable context.
- source_word: יְהוָה צְבָאוֹת
  chosen: the LORD of Armies
  alternatives:
  - the LORD of Hosts
  lexicon: HALOT
  rationale: Per doctrine, יְהוָה is rendered 'the LORD.' 'Armies' translates צבאות
    transparently for modern readers while preserving the martial force of the title.
- source_word: עֶדְרוֹ
  chosen: his flock
  alternatives:
  - his herd
  lexicon: HALOT
  rationale: Given the shepherding imagery, 'flock' is the natural English equivalent.
- source_word: בֵּית יְהוּדָה
  chosen: the house of Judah
  alternatives:
  - Judah
  lexicon: HALOT
  rationale: The construct phrase is preserved formally; 'house of Judah' is standard
    and clear.
- source_word: וְשָׂם אוֹתָם
  chosen: and will make them
  alternatives:
  - and has made them
  - and will set them
  lexicon: HALOT
  rationale: The waw + qatal here is best rendered as a future consequence following
    the prior clause in prophetic discourse. 'Will make them' fits the comparison
    that follows.
- source_word: כְּסוּס הוֹדוֹ
  chosen: like his majestic war horse
  alternatives:
  - like his splendid horse
  - like the horse of his majesty
  lexicon: HALOT
  rationale: הוֹד conveys majesty/splendor. 'Majestic war horse' communicates both
    grandeur and martial purpose in the immediate context.
- source_word: בַּמִּלְחָמָה
  chosen: in battle
  alternatives:
  - in war
  lexicon: HALOT
  rationale: '''In battle'' is idiomatic and suits the singular collective sense of
    warfare here.'
