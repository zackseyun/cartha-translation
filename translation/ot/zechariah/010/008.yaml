id: ZEC.10.8
reference: Zechariah 10:8
source:
  edition: WLC
  text: אֶשְׁרְקָ֥ה לָ/הֶ֛ם וַ/אֲקַבְּצֵ֖/ם כִּ֣י פְדִיתִ֑י/ם וְ/רָב֖וּ כְּמ֥וֹ רָבֽוּ׃
translation:
  text: I will whistle for them and gather them, for I have redeemed them, and they
    will be as many as they once were.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I will signal for them'; the Hebrew verb can denote whistling or hissing
      as a summons.
    reason: lexical_alternative
  - marker: b
    text: Or 'they will multiply as they multiplied before.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶשְׁרְקָה
  chosen: I will whistle
  alternatives:
  - I will whistle for
  - I will signal
  - I will hiss
  lexicon: HALOT
  rationale: The verb שׁרק commonly denotes whistling or hissing as a signal. 'Whistle'
    is the most natural modern English equivalent and avoids the misleading negative
    connotations of 'hiss' in contemporary usage. The following לָהֶם supplies the
    sense 'for/to them.'
- source_word: לָהֶם
  chosen: for them
  alternatives:
  - to them
  lexicon: HALOT
  rationale: The preposition ל with pronominal suffix here marks the indirect object
    of the signaling action. 'For them' works idiomatically with 'whistle' in English.
- source_word: וַאֲקַבְּצֵם
  chosen: and gather them
  alternatives:
  - and I will gather them
  - and collect them
  lexicon: HALOT
  rationale: קבץ means to gather or assemble, often with restoration-from-dispersion
    overtones in prophetic contexts. 'Gather them' preserves that covenant-restoration
    sense without overexpanding.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: 'Here כִּי introduces the reason for the gathering: YHWH has redeemed
    them. ''For'' is concise and fits prophetic English style.'
- source_word: פְדִיתִים
  chosen: I have redeemed them
  alternatives:
  - I have ransomed them
  lexicon: HALOT
  rationale: פדה carries the sense of redeeming or ransoming from bondage or distress.
    'Redeemed' best preserves the theological and covenantal resonance in English
    Bible usage.
- source_word: וְרָבוּ
  chosen: and they will be as many
  alternatives:
  - and they will multiply
  - and they will become many
  lexicon: HALOT
  rationale: Although morphologically a qatal form, in this prophetic sequence it
    functions with future force. The sense is increase in number. Rendering it with
    explicit comparison to the following phrase yields smooth English while preserving
    the idea of numerical restoration.
- source_word: כְּמוֹ רָבוּ
  chosen: as they once were
  alternatives:
  - as they were before
  - as they had multiplied
  lexicon: HALOT
  rationale: The comparison points to their former populous condition. 'As they once
    were' communicates restoration to prior numbers in idiomatic English. A more literal
    'as they multiplied' is possible but less clear in English.
