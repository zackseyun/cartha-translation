theological_decisions:
- issue: Restoration language after redemption
  chosen_reading: The verse is rendered as national restoration and regathering grounded
    in God's prior redemption, without specifying a narrower doctrinal mechanism beyond
    the text.
  alternative_readings:
  - A more narrowly eschatological reading that imports later prophetic details
  - A purely metaphorical spiritual gathering
  rationale: The Hebrew speaks of whistling, gathering, redeeming, and renewed numbers.
    The translation preserves these covenant-restoration themes without importing
    a specific theological system not explicit in the verse.
  doctrine_reference: Preserve theological tension rather than resolve it.
