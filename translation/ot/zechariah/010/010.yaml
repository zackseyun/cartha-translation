theological_decisions:
- issue: Implied object in וְלֹא יִמָּצֵא לָהֶם
  chosen_reading: The clause means that the restored people will become so numerous
    that no room/space will be found for them.
  alternative_readings:
  - The clause could be rendered more literally as 'and it will not be found for them,'
    leaving the object entirely implicit.
  rationale: The Hebrew omits the noun 'room/place,' but the context of bringing the
    people into Gilead and Lebanon strongly implies insufficiency of space due to
    abundance. Supplying 'room' in English is necessary for intelligibility and does
    not add a foreign theological claim.
  doctrine_reference: Translation philosophy §1, §6
