id: ZEC.10.10
reference: Zechariah 10:10
source:
  edition: WLC
  text: וַ/הֲשִֽׁיבוֹתִי/ם֙ מֵ/אֶ֣רֶץ מִצְרַ֔יִם וּ/מֵֽ/אַשּׁ֖וּר אֲקַבְּצֵ֑/ם וְ/אֶל
    אֶ֨רֶץ גִּלְעָ֤ד וּ/לְבָנוֹן֙ אֲבִיאֵ֔/ם וְ/לֹ֥א יִמָּצֵ֖א לָ/הֶֽם־׃
translation:
  text: I will bring them back from the land of Egypt, and gather them from Assyria;
    I will bring them into the land of Gilead and Lebanon, until no room is found
    for them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more literally, 'and no place will be found for them.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַהֲשִׁיבוֹתִים
  chosen: I will bring them back
  alternatives:
  - I will restore them
  - I will return them
  lexicon: HALOT
  rationale: 'From שוב in the Hiphil, the sense is causative: causing them to return.
    ''Bring them back'' is idiomatic modern English and fits the exile-return context
    better than the less natural ''return them.'' ''Restore them'' is possible but
    broader and less spatially explicit than the immediate context of Egypt/Assyria.'
- source_word: מֵאֶרֶץ מִצְרַיִם
  chosen: from the land of Egypt
  alternatives:
  - out of the land of Egypt
  - from Egypt
  lexicon: HALOT
  rationale: Retains אֶרֶץ explicitly as 'land,' preserving the geographic and exodus-echoing
    force. 'From Egypt' is smoother but omits a meaningful lexical element.
- source_word: וּמֵאַשּׁוּר
  chosen: and from Assyria
  alternatives:
  - and out of Assyria
  lexicon: HALOT
  rationale: Straightforward geographic source phrase parallel to 'from the land of
    Egypt.' 'Assyria' is a proper name and is transliterated/standardly rendered as
    a place name.
- source_word: אֲקַבְּצֵם
  chosen: gather them
  alternatives:
  - assemble them
  - collect them
  lexicon: HALOT
  rationale: קבץ commonly denotes gathering dispersed people, especially in restoration
    contexts. 'Gather' is the most natural and theologically resonant English equivalent.
- source_word: וְאֶל אֶרֶץ גִּלְעָד וּלְבָנוֹן
  chosen: into the land of Gilead and Lebanon
  alternatives:
  - to the land of Gilead and Lebanon
  - into Gilead and Lebanon
  lexicon: HALOT
  rationale: The preposition אֶל plus 'land' suggests movement into a territory. Keeping
    'land' preserves the singular אֶרֶץ governing both regional names. 'Into' better
    matches the motion verb 'bring' than simple 'to.'
- source_word: אֲבִיאֵם
  chosen: I will bring them
  alternatives:
  - I will lead them
  lexicon: HALOT
  rationale: ביא in Hiphil commonly means 'bring.' 'Lead' is possible in some contexts,
    but 'bring' is the direct lexical match and preserves the divine action of relocation.
- source_word: וְלֹא יִמָּצֵא לָהֶם
  chosen: until no room is found for them
  alternatives:
  - and there will not be found room for them
  - and there will not be enough space for them
  lexicon: HALOT
  rationale: The Hebrew is literally 'and it will not be found for them,' with the
    implied object being space/place. English requires the implication to be made
    explicit. 'Until no room is found for them' captures the resultative sense in
    idiomatic English while preserving the passive nuance. The conjunction is rendered
    contextually as result/intensification rather than simple coordination.
