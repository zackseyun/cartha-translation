id: ZEC.10.1
reference: Zechariah 10:1
source:
  edition: WLC
  text: שַׁאֲל֨וּ מֵ/יְהוָ֤ה מָטָר֙ בְּ/עֵ֣ת מַלְק֔וֹשׁ יְהוָ֖ה עֹשֶׂ֣ה חֲזִיזִ֑ים וּ/מְטַר גֶּ֨שֶׁם֙ יִתֵּ֣ן לָ/הֶ֔ם לְ/אִ֖ישׁ עֵ֥שֶׂב בַּ/שָּׂדֶֽה־׃
translation:
  text: Ask Yahweh for rain in the time of the latter rain; Yahweh makes storm clouds, and he will give them showers of rain, to each one vegetation in the field.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the season of the latter rain' or 'late rain.'
    reason: lexical_alternative
  - marker: b
    text: Or 'makes lightning flashes.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שַׁאֲלוּ
  chosen: Ask
  alternatives:
  - Ask for
  - Request
  lexicon: HALOT
  rationale: Imperative plural from שׁאל, addressed to the people. English imperative 'Ask' is direct and natural; the object 'for rain' follows immediately, so 'Ask' alone is sufficient.
- source_word: מֵיְהוָה
  chosen: the LORD
  alternatives:
  - from the LORD
  lexicon: HALOT
  rationale: The preposition מִן marks source, so the full sense is 'from the LORD.' In idiomatic English with 'ask,' 'Ask the LORD for rain' expresses the same relation more naturally than 'Ask from the LORD.' The divine name follows the doctrine default rendering 'the LORD' for יְהוָה.
- source_word: מָטָר
  chosen: rain
  alternatives:
  - rainfall
  lexicon: HALOT
  rationale: Standard rendering for precipitation generally; 'rain' is clear and idiomatic.
- source_word: בְּעֵת מַלְקוֹשׁ
  chosen: in the time of the spring rain
  alternatives:
  - at the time of the latter rain
  - in the season of the late rain
  lexicon: HALOT
  rationale: מַלְקוֹשׁ refers to the late-season rain in the agricultural cycle. 'Spring rain' communicates the seasonal sense clearly to modern readers, while a footnote preserves the more traditional 'latter rain/late rain' wording.
- source_word: עֹשֶׂה חֲזִיזִים
  chosen: makes storm clouds
  alternatives:
  - makes lightning flashes
  - makes thunderclouds
  lexicon: HALOT
  rationale: חֲזִיזִים can denote flashes/lightning or storm phenomena. In this context of sending rain, 'storm clouds' best captures the meteorological sense in natural English and coheres with the following gift of rain, while the lexical alternative 'lightning flashes' is preserved in a footnote.
- source_word: וּמְטַר גֶּשֶׁם
  chosen: showers of rain
  alternatives:
  - rain shower
  - abundant rain
  - downpour
  lexicon: HALOT
  rationale: The collocation intensifies the idea of rain. 'Showers of rain' preserves the concrete image without overinterpreting as necessarily torrential or merely generic.
- source_word: יִתֵּן לָהֶם
  chosen: he will give them
  alternatives:
  - he gives them
  lexicon: HALOT
  rationale: 'Imperfect here is rendered as future in the promise sequence: the LORD makes storm clouds and will give rain. The pronoun refers to the people addressed.'
- source_word: לְאִישׁ
  chosen: to each man
  alternatives:
  - to everyone
  - to each one
  lexicon: HALOT
  rationale: The Hebrew is singular אִישׁ, literally 'man,' used distributively. Per translation philosophy, the masculine representative form is retained rather than neutralized, while the distributive force is made explicit with 'each.'
- source_word: עֵשֶׂב
  chosen: vegetation
  alternatives:
  - grass
  - green plants
  - herbage
  lexicon: HALOT
  rationale: עֵשֶׂב can mean grass/herbage/vegetation. 'Vegetation' is broad enough to fit agricultural produce in context without narrowing to lawn-like 'grass.'
- source_word: בַּשָּׂדֶה
  chosen: in the field
  alternatives:
  - in the countryside
  - in his field
  lexicon: HALOT
  rationale: Definite singular 'the field' works as a collective/agricultural setting in English. Adding 'his' would over-specify possession not explicit in the Hebrew.
