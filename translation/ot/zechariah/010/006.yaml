id: ZEC.10.6
reference: Zechariah 10:6
source:
  edition: WLC
  text: וְ/גִבַּרְתִּ֣י אֶת בֵּ֣ית יְהוּדָ֗ה וְ/אֶת בֵּ֤ית יוֹסֵף֙ אוֹשִׁ֔יעַ וְ/הֽוֹשְׁבוֹתִי/ם֙
    כִּ֣י רִֽחַמְתִּ֔י/ם וְ/הָי֖וּ כַּ/אֲשֶׁ֣ר לֹֽא זְנַחְתִּ֑י/ם כִּ֗י אֲנִ֛י יְהוָ֥ה
    אֱלֹהֵי/הֶ֖ם וְ/אֶעֱנֵֽ/ם׀־־־׃
translation:
  text: I will strengthen the house of Judah, and I will save the house of Joseph.
    I will restore them, because I have had compassion on them, and they will be as
    though I had not rejected them; for I am the LORD their God, and I will answer
    them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I will bring them back.' The Hebrew verb can carry the sense of returning
      or restoring.
    reason: lexical_alternative
  - marker: b
    text: '''The house of Joseph'' refers corporately to Joseph''s descendants, often
      especially the northern tribes.'
    reason: cultural_note
lexical_decisions:
- source_word: וְגִבַּרְתִּי
  chosen: I will strengthen
  alternatives:
  - I will make strong
  - I will make mighty
  lexicon: HALOT
  rationale: From גבר in the Piel, expressing causing strength or making strong. 'Strengthen'
    is natural modern English and preserves the causative force without overstating
    military imagery.
- source_word: בֵּית יְהוּדָה
  chosen: the house of Judah
  alternatives:
  - Judah
  lexicon: HALOT
  rationale: Retains the covenantal/tribal corporate expression 'house of' rather
    than flattening it to the tribal name alone.
- source_word: בֵּית יוֹסֵף
  chosen: the house of Joseph
  alternatives:
  - Joseph
  - Ephraim
  lexicon: HALOT
  rationale: Keeps the literal corporate designation. Although in prophetic context
    it can stand for the northern tribes, the Hebrew says 'house of Joseph,' so that
    is preserved in the main text.
- source_word: אוֹשִׁיעַ
  chosen: I will save
  alternatives:
  - I will deliver
  lexicon: HALOT
  rationale: From ישׁע in Hiphil. 'Save' is the most direct and theologically resonant
    rendering; 'deliver' is possible but narrower.
- source_word: וְהוֹשְׁבוֹתִים
  chosen: I will restore them
  alternatives:
  - I will bring them back
  - I will cause them to dwell
  lexicon: HALOT
  rationale: The form from שוב in Hiphil with object suffix can mean bring back/restore.
    In this restoration context, 'restore them' captures the broader sense well in
    English. The more spatial nuance 'bring them back' is preserved in a footnote.
- source_word: כִּי רִחַמְתִּים
  chosen: because I have had compassion on them
  alternatives:
  - because I have mercy on them
  - for I have pitied them
  lexicon: HALOT
  rationale: רחם denotes compassion/mercy. 'Have had compassion' fits the perfect
    aspect as grounding the promised action in God's prior merciful disposition.
- source_word: וְהָיוּ כַּאֲשֶׁר לֹא זְנַחְתִּים
  chosen: they will be as though I had not rejected them
  alternatives:
  - they will be as if I had not cast them off
  - they will be as though I had not forsaken them
  lexicon: HALOT
  rationale: זנח means reject/cast off. 'Rejected' is clear modern English and avoids
    importing stronger abandonment language than necessary, while preserving the counterfactual
    comparison.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine table, the default rendering of the divine name is 'the
    LORD.'
- source_word: וְאֶעֱנֵם
  chosen: and I will answer them
  alternatives:
  - and I will respond to them
  - and I will hear them
  lexicon: HALOT
  rationale: ענה in Qal commonly means answer/respond. 'Answer them' best matches
    the lexical sense. 'Hear them' reflects an interpretive implication but is less
    direct.
