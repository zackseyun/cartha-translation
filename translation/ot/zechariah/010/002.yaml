id: ZEC.10.2
reference: Zechariah 10:2
source:
  edition: WLC
  text: כִּ֧י הַ/תְּרָפִ֣ים דִּבְּרוּ אָ֗וֶן וְ/הַ/קּֽוֹסְמִים֙ חָ֣זוּ שֶׁ֔קֶר וַֽ/חֲלֹמוֹת֙
    הַ/שָּׁ֣וא יְדַבֵּ֔רוּ הֶ֖בֶל יְנַֽחֵמ֑וּ/ן עַל כֵּן֙ נָסְע֣וּ כְמוֹ צֹ֔אן יַעֲנ֖וּ
    כִּֽי אֵ֥ין רֹעֶֽה־־־־׃פ
translation:
  text: For the household idols speak wickedness, and the diviners see lies; they
    speak empty dreams and give worthless comfort. Therefore they wander like sheep;
    they are afflicted because there is no shepherd.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the teraphim,” a Hebrew term for household cult objects or idols.
    reason: lexical_alternative
  - marker: b
    text: Or “they are oppressed” for “they are afflicted.”
    reason: lexical_alternative
lexical_decisions:
- source_word: הַתְּרָפִים
  chosen: the household idols
  alternatives:
  - the teraphim
  - the idols
  lexicon: HALOT
  rationale: תְּרָפִים refers to cultic household gods/idols rather than generic idols
    in the abstract. 'Household idols' communicates the likely referent in accessible
    English; 'teraphim' is more formal but less transparent.
- source_word: דִּבְּרוּ אָוֶן
  chosen: speak wickedness
  alternatives:
  - speak iniquity
  - utter deceit
  - speak trouble
  lexicon: HALOT
  rationale: אָוֶן can denote wickedness, trouble, or falsehood. Here, in parallel
    with lies and empty dreams, it points to morally empty and deceptive speech. 'Speak
    wickedness' preserves both the ethical and verbal force without over-specifying.
- source_word: הַקֹּסְמִים
  chosen: the diviners
  alternatives:
  - the soothsayers
  - the fortune-tellers
  lexicon: HALOT
  rationale: The term denotes practitioners of divination. 'Diviners' is the most
    standard and semantically precise rendering in biblical context.
- source_word: חָזוּ שֶׁקֶר
  chosen: see lies
  alternatives:
  - see falsehood
  - envision deceit
  lexicon: HALOT
  rationale: The idiom uses visionary language for false revelation. 'See lies' is
    slightly literal but natural enough in context and preserves the prophetic/divinatory
    register.
- source_word: חֲלֹמוֹת הַשָּׁוְא
  chosen: empty dreams
  alternatives:
  - vain dreams
  - false dreams
  lexicon: HALOT
  rationale: The phrase refers to dreams characterized by emptiness or worthlessness.
    'Empty dreams' is readable modern English and fits the parallelism with lies and
    worthless comfort.
- source_word: יְדַבֵּרוּ
  chosen: they speak
  alternatives:
  - they tell
  - they utter
  lexicon: HALOT
  rationale: A straightforward rendering of the imperfect verb, maintaining the sequence
    of accusations against false religious mediators.
- source_word: הֶבֶל יְנַחֵמוּן
  chosen: give worthless comfort
  alternatives:
  - comfort in vain
  - give empty comfort
  - comfort with vapor
  lexicon: HALOT
  rationale: הֶבֶל denotes vanity, emptiness, or worthlessness. In idiomatic English,
    'give worthless comfort' best conveys that their consolations are futile and insubstantial.
- source_word: עַל־כֵּן
  chosen: Therefore
  alternatives:
  - For this reason
  - So
  lexicon: HALOT
  rationale: This marks the consequence of the preceding false guidance. 'Therefore'
    preserves the formal causal connection.
- source_word: נָסְעוּ כְמוֹ צֹאן
  chosen: they wander like sheep
  alternatives:
  - they journey like sheep
  - they set out like sheep
  - they have broken camp like sheep
  lexicon: HALOT
  rationale: The verb can denote pulling up stakes or setting out, but in this context
    of sheep without a shepherd it conveys being driven about or wandering. 'Wander
    like sheep' communicates the image naturally in English.
- source_word: יַעֲנוּ
  chosen: they are afflicted
  alternatives:
  - they are oppressed
  - they suffer
  - they are humbled
  lexicon: HALOT
  rationale: From ענה in the sense of being afflicted/oppressed. Given the pastoral
    metaphor and social consequence, 'they are afflicted' is broad and faithful without
    narrowing to a specific kind of suffering.
- source_word: אֵין רֹעֶה
  chosen: there is no shepherd
  alternatives:
  - they have no shepherd
  lexicon: HALOT
  rationale: The existential clause is best rendered directly. 'There is no shepherd'
    preserves the Hebrew structure and the broader leadership metaphor.
