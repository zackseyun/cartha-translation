theological_decisions:
- issue: Nature of the condemned religious objects and practices
  chosen_reading: The verse condemns illegitimate sources of guidance—household idols,
    diviners, and deceptive dreams—without importing later doctrinal categories.
  alternative_readings:
  - Treating teraphim as neutral ancestral objects
  - Over-reading the verse as only political leadership critique
  rationale: The immediate context targets false revelation and failed guidance. The
    translation keeps the concrete cultic and divinatory terms visible while allowing
    the shepherd image to carry the leadership implication.
  doctrine_reference: Translation philosophy §§1, 3, 6
