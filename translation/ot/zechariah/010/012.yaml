theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Interpretive force of 'walk in his name'
  chosen_reading: retain the metaphor 'walk' rather than explicating it as 'live' or 'conduct themselves'
  alternative_readings:
  - live in his name
  - conduct themselves in his name
  rationale: The Hebrew idiom is metaphorical and theologically rich, potentially encompassing conduct, allegiance, and ongoing life under YHWH's authority. Preserving 'walk' maintains that tension rather than narrowing the sense.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §3: Preserve theological tension rather than resolve it'
