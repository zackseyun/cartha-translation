id: ZEC.10.12
reference: Zechariah 10:12
source:
  edition: WLC
  text: וְ/גִבַּרְתִּי/ם֙ בַּֽ/יהוָ֔ה וּ/בִ/שְׁמ֖/וֹ יִתְהַלָּ֑כוּ נְאֻ֖ם יְהוָֽה׃ס
translation:
  text: I will strengthen them in Yahweh, and in his name they will walk,” declares Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I will make them mighty in the LORD.'
    reason: lexical_alternative
  - marker: b
    text: '''In his name'' may also imply ''by his authority'' or ''under his revealed character.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וְגִבַּרְתִּים
  chosen: I will strengthen them
  alternatives:
  - I will make them mighty
  - I will make them strong
  lexicon: HALOT
  rationale: 'From גבר in the Piel/Hiphil-like causative-intensifying sense with 1cs + 3mp suffix: YHWH causes them to be strong. ''Strengthen'' is natural modern English and preserves the causative force better than the more wooden ''make mighty.'''
- source_word: בַּיהוָה
  chosen: in the LORD
  alternatives:
  - by the LORD
  - through the LORD
  lexicon: HALOT
  rationale: 'The preposition ב here most naturally expresses sphere or basis: their strengthening is grounded in or located in YHWH. Per doctrine, יְהוָה is rendered ''the LORD'' rather than ''Yahweh'' in the main text.'
- source_word: וּבִשְׁמוֹ
  chosen: and in his name
  alternatives:
  - and by his name
  - and in his authority
  lexicon: HALOT
  rationale: שֵׁם often carries the sense of name with connotations of reputation, authority, or revealed character. The literal 'in his name' preserves the Hebrew idiom while allowing those connotations to remain implicit.
- source_word: יִתְהַלָּכוּ
  chosen: they will walk
  alternatives:
  - they will live
  - they will conduct themselves
  - they will go about
  lexicon: HALOT
  rationale: Hitpael of הלך can denote walking about or conducting oneself. 'Walk' preserves the biblical metaphor and is idiomatic in English, while avoiding over-interpretation toward merely ethical behavior.
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - utterance of the LORD
  lexicon: HALOT
  rationale: Standard prophetic formula. 'Declares the LORD' is clear, contemporary, and preserves the force of divine pronouncement better for modern readers than the more technical 'oracle of.'
