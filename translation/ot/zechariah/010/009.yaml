theological_decisions:
- issue: Meaning of the sowing metaphor in restoration context
  chosen_reading: The verse speaks of purposeful dispersion that leads to remembrance
    and eventual return.
  alternative_readings:
  - The verse refers primarily to scattering in judgment
  - The verse refers to planting for increase among the nations
  rationale: The immediate context is restoration, so the metaphor should retain both
    dispersion and fruitful intent. The translation 'sow' preserves this tension rather
    than collapsing it into mere judgmental scattering or exclusively positive planting.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather
    than resolve it)
