id: ZEC.10.9
reference: Zechariah 10:9
source:
  edition: WLC
  text: וְ/אֶזְרָעֵ/ם֙ בָּֽ/עַמִּ֔ים וּ/בַ/מֶּרְחַקִּ֖ים יִזְכְּר֑וּ/נִי וְ/חָי֥וּ
    אֶת בְּנֵי/הֶ֖ם וָ/שָֽׁבוּ־׃
translation:
  text: I will sow them among the peoples, and in distant places they will remember
    me; they and their children will live, and they will return.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'scatter them among the nations.' The Hebrew verb literally means 'sow,'
      which can imply both dispersal and purposeful planting for future increase.
    reason: lexical_alternative
  - marker: b
    text: Literally 'and they will live with their children,' or 'they and their children
      will live.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאֶזְרָעֵם
  chosen: I will sow them
  alternatives:
  - I will scatter them
  - I will plant them
  lexicon: HALOT
  rationale: From זרע in the Hiphil/Qal agricultural sense of sowing seed. In this
    context the metaphor likely includes dispersal among nations, but 'sow' preserves
    the deliberate, fruitful nuance better than the flatter 'scatter.'
- source_word: בָּעַמִּים
  chosen: among the peoples
  alternatives:
  - among the nations
  - among the peoples
  lexicon: HALOT
  rationale: עַמִּים is plural 'peoples' or 'nations.' 'Peoples' is slightly more
    literal and avoids overloading 'nations' with modern state connotations, while
    still conveying ethnic groups among whom Israel is dispersed.
- source_word: וּבַמֶּרְחַקִּים
  chosen: in distant places
  alternatives:
  - in far countries
  - far away
  - in remote regions
  lexicon: HALOT
  rationale: מֶרְחָק denotes distance or far-off places. 'In distant places' is natural
    modern English and preserves the locative sense.
- source_word: יִזְכְּרוּנִי
  chosen: they will remember me
  alternatives:
  - they will call me to mind
  - they will remember me there
  lexicon: HALOT
  rationale: זכר with 1cs suffix straightforwardly means 'remember me.' No added adverb
    such as 'there' is explicit in the Hebrew, so it is not supplied in the main text.
- source_word: וְחָיוּ
  chosen: they ... will live
  alternatives:
  - they will survive
  - they will revive
  lexicon: HALOT
  rationale: 'חיה in the perfect with vav here is future in sequence: ''they will
    live.'' This can imply continued life or renewed life, but ''live'' best preserves
    the breadth of the Hebrew.'
- source_word: אֶת־בְּנֵיהֶם
  chosen: they and their children
  alternatives:
  - with their children
  - their children
  lexicon: HALOT
  rationale: The particle אֶת here is best taken in the comitative sense, not as an
    untranslatable object marker. Thus the sense is that both the returnees and their
    children will live. Rendering 'they and their children' makes the relationship
    explicit in idiomatic English.
- source_word: וָשָׁבוּ
  chosen: they will return
  alternatives:
  - they will come back
  - they will turn back
  lexicon: HALOT
  rationale: שוב commonly means return/come back. In this restoration context, 'return'
    preserves both physical and covenantal resonance without overinterpreting it as
    repentance alone.
