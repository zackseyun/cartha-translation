id: ZEC.10.5
reference: Zechariah 10:5
source:
  edition: WLC
  text: וְ/הָי֨וּ כְ/גִבֹּרִ֜ים בּוֹסִ֨ים בְּ/טִ֤יט חוּצוֹת֙ בַּ/מִּלְחָמָ֔ה וְ/נִ֨לְחֲמ֔וּ כִּ֥י יְהוָ֖ה עִמָּ֑/ם וְ/הֹבִ֖ישׁוּ רֹכְבֵ֥י סוּסִֽים׃
translation:
  text: They will be like mighty men, trampling the mire of the streets in battle; they will fight, because Yahweh is with them, and they will put horsemen to shame.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'like warriors.' The Hebrew literally uses a masculine term, 'mighty men,' for valiant fighters.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיוּ
  chosen: They will be
  alternatives:
  - And they will be
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in prophetic discourse functions futurally. English omits the initial 'and' for smoother style while preserving sequence.
- source_word: כְגִבֹּרִים
  chosen: like mighty men
  alternatives:
  - like warriors
  - like heroes
  lexicon: HALOT
  rationale: גִּבּוֹר commonly denotes a strong warrior or mighty man. 'Mighty men' preserves the masculine martial image and aligns with the gender-accurate policy; 'warriors' is possible but less literal.
- source_word: בּוֹסִים
  chosen: trampling
  alternatives:
  - treading down
  - stamping on
  lexicon: HALOT
  rationale: The participle from בוס conveys trampling underfoot. 'Trampling' is vivid, natural English and fits the battle imagery.
- source_word: בְּטִיט חוּצוֹת
  chosen: the mud of the streets
  alternatives:
  - street mire
  - mud in the streets
  lexicon: HALOT
  rationale: The phrase denotes muddy street-filth or mire. 'The mud of the streets' is idiomatic and preserves the concrete image of enemies being treated as mire underfoot.
- source_word: בַּמִּלְחָמָה
  chosen: in battle
  alternatives:
  - in war
  lexicon: HALOT
  rationale: '''In battle'' fits the immediate military scene more naturally in English than the broader ''in war.'''
- source_word: וְנִלְחֲמוּ
  chosen: they will fight
  alternatives:
  - and they will wage war
  lexicon: HALOT
  rationale: Niphal of לחם in this context means to engage in battle. 'They will fight' is the clearest natural rendering.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  lexicon: HALOT
  rationale: Introduces the reason for their success in battle. 'Because' makes the causal force explicit in modern English.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: עִמָּם
  chosen: is with them
  alternatives:
  - with them
  lexicon: HALOT
  rationale: Supplying 'is' is required in English and expresses the covenantal presence that grounds the victory.
- source_word: וְהֹבִישׁוּ
  chosen: they will put ... to shame
  alternatives:
  - they will shame
  - they will confound
  - they will disgrace
  lexicon: HALOT
  rationale: Hiphil of בוש/יבש here conveys causing shame or humiliation to the enemy. 'Put ... to shame' is idiomatic and preserves the causative sense.
- source_word: רֹכְבֵי סוּסִים
  chosen: horsemen
  alternatives:
  - riders of horses
  - those who ride horses
  lexicon: HALOT
  rationale: A compact English equivalent for mounted troops. It preserves the military contrast between Judah's fighters and enemy cavalry.
