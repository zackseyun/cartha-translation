theological_decisions:
- issue: Subject continuity and implied agent
  chosen_reading: The verse continues the preceding context with God as the implied
    subject of the verbs.
  alternative_readings:
  - A collective subject such as the restored people for some verbs
  rationale: The singular verbal sequence and the surrounding promises of divine deliverance
    favor YHWH as the acting subject. This preserves the exodus-like portrayal of
    God subduing sea and imperial powers.
