id: ZEC.10.11
reference: Zechariah 10:11
source:
  edition: WLC
  text: וְ/עָבַ֨ר בַּ/יָּ֜ם צָרָ֗ה וְ/הִכָּ֤ה בַ/יָּם֙ גַּלִּ֔ים וְ/הֹבִ֕ישׁוּ כֹּ֖ל
    מְצוּל֣וֹת יְאֹ֑ר וְ/הוּרַד֙ גְּא֣וֹן אַשּׁ֔וּר וְ/שֵׁ֥בֶט מִצְרַ֖יִם יָסֽוּר׃
translation:
  text: He will pass through the sea of distress and strike the waves of the sea,
    and all the depths of the Nile will dry up. The pride of Assyria will be brought
    down, and the scepter of Egypt will depart.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'through a sea of distress' or 'through the troubled sea.' The Hebrew
      phrase is compact and may evoke exodus imagery rather than identify a literal
      body of water only.
    reason: lexical_alternative
  - marker: b
    text: Hebrew יְאֹר can mean 'river,' but in an Egyptian setting it commonly refers
      to the Nile.
    reason: lexical_alternative
  - marker: c
    text: Or 'the rod of Egypt.' 'Scepter' brings out the likely sense of ruling power.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעָבַר
  chosen: He will pass through
  alternatives:
  - and he passed through
  - and he will cross over
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in prophetic discourse is naturally
    rendered with future force in context, continuing the divine action promised in
    the surrounding verses. 'Pass through' preserves the movement imagery without
    overinterpreting.
- source_word: בַּיָּם צָרָה
  chosen: through the sea of distress
  alternatives:
  - through a sea of distress
  - through the sea, distress
  - through the troubled sea
  lexicon: HALOT
  rationale: The construct-like sequence is best taken as 'sea of distress/trouble,'
    echoing exodus-style deliverance imagery while preserving the noun צָרָה as 'distress'
    rather than smoothing it into an adjective. The definite article on 'sea' is retained.
- source_word: וְהִכָּה בַיָּם גַּלִּים
  chosen: and strike the waves of the sea
  alternatives:
  - and strike the sea's waves
  - and strike waves in the sea
  lexicon: HALOT
  rationale: נכה is rendered 'strike' in its ordinary sense. The phrase order is adjusted
    slightly for natural English while keeping the image of YHWH smiting the sea's
    waves.
- source_word: וְהֹבִישׁוּ
  chosen: will dry up
  alternatives:
  - will be dried up
  - will be put to shame
  lexicon: HALOT
  rationale: With waters as subject/object context, the verb from יבש carries the
    sense of drying up, not shame. English uses an intransitive/resultative rendering
    for naturalness, though the Hebrew form is causative.
- source_word: כֹּל מְצוּלוֹת יְאֹר
  chosen: all the depths of the Nile
  alternatives:
  - all the depths of the River
  - all the channels of the Nile
  - all the deep places of the Nile
  lexicon: HALOT
  rationale: מְצוּלוֹת denotes depths/deep places. יְאֹר in prophetic Hebrew commonly
    refers to the Nile or Nile-system, especially in Egyptian context. 'Nile' makes
    the referent explicit and fits the parallel with Egypt later in the verse.
- source_word: וְהוּרַד גְּאוֹן אַשּׁוּר
  chosen: The pride of Assyria will be brought down
  alternatives:
  - the majesty of Assyria will be brought low
  - the arrogance of Assyria will be humbled
  lexicon: HALOT
  rationale: גְּאוֹן can denote pride, exaltation, or majesty; here in judgment context
    'pride' best captures the negative sense. Hophal of ירד is passive/causative-passive,
    hence 'will be brought down.'
- source_word: וְשֵׁבֶט מִצְרַיִם יָסוּר
  chosen: and the scepter of Egypt will depart
  alternatives:
  - and the rod of Egypt will depart
  - and Egypt's scepter will pass away
  lexicon: HALOT
  rationale: שֵׁבֶט can mean rod, staff, tribe, or scepter. In parallel with Assyria's
    pride and in a political judgment context, 'scepter' best conveys ruling power.
    יָסוּר is rendered 'will depart' to express removal of dominion.
