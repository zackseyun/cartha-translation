theological_decisions:
- issue: Social-political contrast within the people of God
  chosen_reading: The verse emphasizes that the LORD gives priority to Judah's vulnerable/outlying
    communities so that neither the Davidic house nor Jerusalem's inhabitants are
    exalted over Judah.
  alternative_readings:
  - The verse merely states chronological order without social leveling emphasis.
  rationale: 'The contrast between ''tents of Judah'' and both ''the house of David''
    and ''the inhabitant of Jerusalem,'' together with the purpose clause, indicates
    more than sequence alone: it prevents disproportionate exaltation of royal and
    urban centers over Judah at large. The translation preserves this tension without
    overinterpreting it.'
