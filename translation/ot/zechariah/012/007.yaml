id: ZEC.12.7
reference: Zechariah 12:7
source:
  edition: WLC
  text: וְ/הוֹשִׁ֧יעַ יְהוָ֛ה אֶת אָהֳלֵ֥י יְהוּדָ֖ה בָּ/רִֽאשֹׁנָ֑ה לְמַ֨עַן לֹֽא
    תִגְדַּ֜ל תִּפְאֶ֣רֶת בֵּית דָּוִ֗יד וְ/תִפְאֶ֛רֶת יֹשֵׁ֥ב יְרוּשָׁלִַ֖ם עַל יְהוּדָֽה־־־־׃
translation:
  text: And the LORD will save the tents of Judah first, so that the glory of the
    house of David and the glory of the inhabitant of Jerusalem may not be magnified
    over Judah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the dwellings of Judah.' The Hebrew literally says 'the tents of Judah,'
      likely contrasting Judah's outlying settlements with Jerusalem and the Davidic
      house.
    reason: lexical_alternative
  - marker: b
    text: Or 'may not be exalted above Judah.'
    reason: alternative_reading
lexical_decisions:
- source_word: וְ/הוֹשִׁיעַ
  chosen: will save
  alternatives:
  - will deliver
  lexicon: HALOT
  rationale: Hiphil of ישׁע commonly means to save/deliver. 'Will save' is the most
    natural modern English rendering and preserves the theological weight of divine
    rescue.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following Jewish reverence tradition and common English Bible convention.
- source_word: אָהֳלֵי יְהוּדָה
  chosen: the tents of Judah
  alternatives:
  - the dwellings of Judah
  lexicon: HALOT
  rationale: The literal image is 'tents,' likely referring to the outlying settlements
    or common people of Judah in contrast with Jerusalem and the Davidic house. Retaining
    'tents' preserves the metaphor and social contrast.
- source_word: בָּ/רִאשֹׁנָה
  chosen: first
  alternatives:
  - at first
  - in the first place
  lexicon: HALOT
  rationale: The adverb indicates priority in sequence. 'First' is concise and idiomatic.
- source_word: לְמַעַן
  chosen: so that
  alternatives:
  - in order that
  lexicon: HALOT
  rationale: This introduces purpose. 'So that' is readable modern English while preserving
    the purposive force.
- source_word: תִגְדַּל
  chosen: may not be magnified
  alternatives:
  - may not become great
  - may not be exalted
  lexicon: HALOT
  rationale: The verb גדל means become great/magnified. Because the subject is 'glory,'
    'be magnified' best matches the collocation and preserves the comparative sense
    with עַל.
- source_word: תִּפְאֶרֶת
  chosen: glory
  alternatives:
  - splendor
  - boast
  lexicon: HALOT
  rationale: תפארת can denote glory, splendor, or honor. 'Glory' fits the parallelism
    and avoids reducing the term to mere human boasting, while still allowing the
    sense of exalted status.
- source_word: בֵּית דָּוִיד
  chosen: the house of David
  lexicon: HALOT
  rationale: Standard rendering for the Davidic dynasty/royal house; the phrase is
    both literal and dynastic.
- source_word: יֹשֵׁב יְרוּשָׁלִַם
  chosen: the inhabitant of Jerusalem
  alternatives:
  - the residents of Jerusalem
  - the one dwelling in Jerusalem
  lexicon: HALOT
  rationale: The singular participle is collective. Rendering it as singular preserves
    the Hebrew form while still functioning generically in English.
- source_word: עַל יְהוּדָה
  chosen: over Judah
  alternatives:
  - against Judah
  - above Judah
  lexicon: HALOT
  rationale: עַל here marks superiority or elevation in relation to Judah. 'Over Judah'
    best conveys the idea that Jerusalem's and David's glory should not be elevated
    above Judah's.
