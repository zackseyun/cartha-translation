theological_decisions:
- issue: Divine speaker and agency in judgment
  chosen_reading: 'First-person divine speech is preserved directly: ''I will seek
    to destroy.'''
  rationale: The Hebrew first-person singular verb clearly presents God as the speaker
    and actor in judgment against the nations attacking Jerusalem. The translation
    preserves this without softening the agency or converting it into an impersonal
    event.
  doctrine_reference: Translation philosophy §1, §3
- issue: Prophetic/eschatological formula
  chosen_reading: Rendered as 'on that day' without expanding its referent.
  alternative_readings:
  - on that day (eschatological)
  rationale: The phrase carries prophetic significance, but the text itself does not
    define the timetable or system of fulfillment. The translation preserves the formula
    and avoids importing a specific eschatological framework.
  doctrine_reference: Affirmations; Translation philosophy §3
