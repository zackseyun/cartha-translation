id: ZEC.12.9
reference: Zechariah 12:9
source:
  edition: WLC
  text: וְ/הָיָ֖ה בַּ/יּ֣וֹם הַ/ה֑וּא אֲבַקֵּ֗שׁ לְ/הַשְׁמִיד֙ אֶת כָּל הַ/גּוֹיִ֔ם
    הַ/בָּאִ֖ים עַל יְרוּשָׁלִָֽם־־־׃
translation:
  text: And on that day I will seek to destroy all the nations that come against Jerusalem.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I will set myself to destroy.' The Hebrew verb can emphasize determined
      intent, not merely searching.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  chosen: And ... it will happen / And ... it will be
  alternatives:
  - And it shall come to pass
  - And it will be
  lexicon: HALOT
  rationale: The clause introduces a future event formula common in prophetic discourse.
    In idiomatic English, the sense is best carried by attaching it to the temporal
    phrase, 'And on that day,' rather than preserving a wooden 'it will happen' formula.
    This keeps the prophetic framing without archaic diction.
- source_word: בַּיּוֹם הַהוּא
  chosen: on that day
  alternatives:
  - in that day
  lexicon: HALOT
  rationale: Standard temporal prophetic expression. 'On that day' is natural modern
    English and preserves the eschatological/prophetic force better than the more
    archaic 'in that day.'
- source_word: אֲבַקֵּשׁ
  chosen: I will seek
  alternatives:
  - I will set myself
  - I will endeavor
  lexicon: HALOT
  rationale: The piel of בקש commonly means 'seek' or 'seek to.' Here it expresses
    intentional resolve rather than mere desire. 'I will seek' preserves the lexical
    core while allowing the infinitive that follows to specify the aim.
- source_word: לְהַשְׁמִיד
  chosen: to destroy
  alternatives:
  - to annihilate
  - to wipe out
  lexicon: HALOT
  rationale: The hiphil infinitive of שׁמד denotes causing destruction/extermination.
    'To destroy' is the most natural and sufficiently strong rendering in English
    without over-specifying the degree beyond the Hebrew.
- source_word: כָּל
  chosen: all
  alternatives:
  - every
  lexicon: HALOT
  rationale: '''All'' fits the collective object ''the nations'' and preserves the
    comprehensive scope.'
- source_word: הַגּוֹיִם
  chosen: the nations
  alternatives:
  - the peoples
  - the Gentile nations
  lexicon: HALOT
  rationale: גוי/גוים in this context refers to foreign national groups arrayed against
    Jerusalem. 'The nations' is the standard and contextually appropriate rendering;
    'Gentiles' would import a later Jewish/Christian contrast not explicit here.
- source_word: הַבָּאִים
  chosen: that come
  alternatives:
  - that are coming
  - coming
  lexicon: HALOT
  rationale: The participle functions attributively, describing the nations by their
    action against Jerusalem. 'That come' is concise, natural, and works well in English
    relative-clause form.
- source_word: עַל יְרוּשָׁלִָם
  chosen: against Jerusalem
  alternatives:
  - upon Jerusalem
  - to Jerusalem
  lexicon: HALOT
  rationale: With hostile motion verbs, עַל commonly carries adversative force. 'Against
    Jerusalem' makes the military hostility explicit from the preposition and context;
    'upon' is less natural in contemporary English.
