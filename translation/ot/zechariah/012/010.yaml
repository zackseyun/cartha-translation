theological_decisions:
- issue: Pronoun shift between 'me' and 'him' in the mourning clause
  chosen_reading: 'Retain the MT tension: ''they will look to me, the one whom they
    pierced, and they will mourn for him'''
  alternative_readings:
  - Harmonize to 'look on me ... mourn for me'
  - Emend the text to remove the shift
  rationale: The Hebrew text presents a striking shift from first person ('to me')
    to third person ('for him'). In keeping with the doctrine's instruction to preserve
    theological tension rather than resolve it, the translation keeps the shift in
    the main text rather than smoothing it away. This also respects the Masoretic
    wording without importing a harmonization.
  doctrine_reference: Translation philosophy §3
- issue: Whether רוּחַ refers specifically to the Holy Spirit
  chosen_reading: Render 'a spirit of grace and pleas for mercy' without capitalization
  alternative_readings:
  - '''the Spirit of grace and supplication'''
  rationale: The phrase may imply divine spiritual enablement, but the Hebrew wording
    itself does not require an explicit identification with the Holy Spirit. Lowercase
    'spirit' preserves the lexical ambiguity and avoids over-interpretation while
    remaining compatible with orthodox theology.
  doctrine_reference: Translation philosophy §3
- issue: Christological use of the verse in later Christian interpretation
  chosen_reading: Translate the Hebrew directly without importing explicit messianic
    identification into the wording
  alternative_readings:
  - Render in a way that foregrounds a specific christological interpretation
  rationale: Historic Christian orthodoxy sees this verse as fulfilled in Messiah,
    but the translation should not add interpretive material beyond the Hebrew text.
    The wording remains fully compatible with that reading while staying text-governed.
  doctrine_reference: Affirmations + Translation philosophy §1
