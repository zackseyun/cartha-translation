id: ZEC.12.10
reference: Zechariah 12:10
source:
  edition: WLC
  text: וְ/שָׁפַכְתִּי֩ עַל בֵּ֨ית דָּוִ֜יד וְ/עַ֣ל יוֹשֵׁ֣ב יְרוּשָׁלִַ֗ם ר֤וּחַ
    חֵן֙ וְ/תַ֣חֲנוּנִ֔ים וְ/הִבִּ֥יטוּ אֵלַ֖/י אֵ֣ת אֲשֶׁר דָּקָ֑רוּ וְ/סָפְד֣וּ
    עָלָ֗י/ו כְּ/מִסְפֵּד֙ עַל הַ/יָּחִ֔יד וְ/הָמֵ֥ר עָלָ֖י/ו כְּ/הָמֵ֥ר עַֽל הַ/בְּכֽוֹר־׀־־־׃
translation:
  text: And I will pour out on the house of David and on the inhabitants of Jerusalem
    a spirit of grace and pleas for mercy, and they will look to me, the one whom
    they pierced, and they will mourn for him as one mourns for an only son, and weep
    bitterly for him as one weeps bitterly for a firstborn.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they will look on me.'
    reason: lexical_alternative
  - marker: b
    text: The Hebrew shifts from 'me' to 'him' in this clause; the translation preserves
      that tension rather than smoothing it out.
    reason: alternative_reading
  - marker: c
    text: Or 'a spirit of grace and supplication.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁפַכְתִּי
  chosen: I will pour out
  alternatives:
  - I will pour
  lexicon: HALOT
  rationale: The verb commonly means 'pour out' in contexts of lavish bestowal, especially
    with רוח; 'pour out' is idiomatic and preserves the metaphor of divine effusion.
- source_word: ר֤וּחַ חֵן֙ וְתַחֲנוּנִים
  chosen: a spirit of grace and pleas for mercy
  alternatives:
  - a spirit of grace and supplication
  - the Spirit of grace and supplication
  lexicon: HALOT
  rationale: The construct phrase most naturally denotes a disposition or spirit characterized
    by grace and supplication. 'Pleas for mercy' renders תַחֲנוּנִים in accessible
    modern English while preserving the sense of earnest entreaty. Capitalizing 'Spirit'
    would over-specify the referent beyond the Hebrew.
- source_word: יוֹשֵׁב יְרוּשָׁלִַם
  chosen: the inhabitants of Jerusalem
  alternatives:
  - those who dwell in Jerusalem
  - the one dwelling in Jerusalem
  lexicon: HALOT
  rationale: Though morphologically singular participle, the expression is a collective
    singular regularly rendered as a plural collective in English.
- source_word: וְהִבִּיטוּ אֵלַי
  chosen: they will look to me
  alternatives:
  - they will look on me
  - they will gaze at me
  lexicon: HALOT
  rationale: The preposition אֶל with נבט often conveys directed attention toward
    someone. 'Look to me' preserves the relational orientation, while 'look on me'
    is a viable traditional alternative preserved in a footnote because of its prominence
    and possible fit in context.
- source_word: אֵת אֲשֶׁר דָּקָרוּ
  chosen: the one whom they pierced
  alternatives:
  - him whom they pierced
  - the one they stabbed through
  lexicon: HALOT
  rationale: This rendering takes אֵת as marking the object of the relative clause
    and makes explicit the personal referent in natural English. 'Pierced' is the
    standard and contextually appropriate gloss for דקר.
- source_word: וְסָפְדוּ
  chosen: they will mourn
  alternatives:
  - they will lament
  - they will wail
  lexicon: HALOT
  rationale: The verb denotes formal mourning or lamentation, often for the dead.
    'Mourn' is natural and sufficiently weighty.
- source_word: עָלָיו
  chosen: for him
  alternatives:
  - over him
  lexicon: HALOT
  rationale: With mourning verbs, English idiom prefers 'for him,' though 'over him'
    is also possible and closer to the preposition.
- source_word: הַיָּחִיד
  chosen: an only son
  alternatives:
  - an only child
  - the only one
  lexicon: HALOT
  rationale: In mourning context, the term denotes an only child; 'only son' fits
    the comparison naturally in English and aligns with the masculine imagery of the
    Hebrew context.
- source_word: וְהָמֵר
  chosen: weep bitterly
  alternatives:
  - be bitterly grieved
  - wail bitterly
  lexicon: HALOT
  rationale: The verb conveys bitter grief. 'Weep bitterly' is idiomatic and matches
    the parallel mourning imagery.
- source_word: הַבְּכוֹר
  chosen: a firstborn
  alternatives:
  - the firstborn son
  lexicon: HALOT
  rationale: The noun denotes the firstborn, here in a comparison. 'A firstborn' reads
    naturally in English while preserving the cultural weight of the loss.
