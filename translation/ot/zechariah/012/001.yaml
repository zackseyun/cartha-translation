id: ZEC.12.1
reference: Zechariah 12:1
source:
  edition: WLC
  text: מַשָּׂ֥א דְבַר יְהוָ֖ה עַל יִשְׂרָאֵ֑ל נְאֻם יְהוָ֗ה נֹטֶ֤ה שָׁמַ֨יִם֙ וְ/יֹסֵ֣ד אָ֔רֶץ וְ/יֹצֵ֥ר רֽוּחַ אָדָ֖ם בְּ/קִרְבּֽ/וֹ־־־־׃פ
translation:
  text: 'An oracle, the word of Yahweh concerning Israel: the declaration of Yahweh, who stretches out the heavens, lays the foundation of the earth, and forms the spirit of man within him.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''An oracle: the word of the LORD against Israel.'' The preposition can mean ''concerning'' or, in some contexts, ''against.'''
    reason: alternative_reading
  - marker: b
    text: Hebrew 'the spirit of man'; or 'the human spirit.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מַשָּׂא
  chosen: oracle
  alternatives:
  - burden
  - pronouncement
  lexicon: HALOT
  rationale: In prophetic superscriptions מַשָּׂא commonly introduces a weighty prophetic utterance. 'Oracle' is idiomatic modern English and avoids the misleadingly concrete sense of 'burden' while preserving solemnity.
- source_word: דְבַר יְהוָה
  chosen: the word of the LORD
  alternatives:
  - the message of the LORD
  lexicon: HALOT
  rationale: A standard prophetic formula. 'Word' preserves the formal linkage with prophetic revelation better than the more interpretive 'message'.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: 'Per doctrine, the Tetragrammaton יְהוָה is rendered ''Yahweh'' — the transliteration of the divine name — rather than the traditional ''the LORD'' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.'
- source_word: עַל
  chosen: concerning
  alternatives:
  - against
  - about
  lexicon: HALOT
  rationale: Here עַל introduces the subject matter of the oracle. Since the following context includes both judgment and salvation for Israel, 'concerning' is broader and less prematurely interpretive than 'against'.
- source_word: נְאֻם יְהוָה
  chosen: the declaration of the LORD
  alternatives:
  - declares the LORD
  - utterance of the LORD
  lexicon: HALOT
  rationale: The noun formula is retained rather than converted into a finite verb, preserving the elevated prophetic style. 'Declaration' is clear modern English.
- source_word: נֹטֶה שָׁמַיִם
  chosen: who stretches out the heavens
  alternatives:
  - stretching out the heavens
  - who spread out the heavens
  lexicon: HALOT
  rationale: The participle functions attributively of the LORD. 'Stretches out' is a natural rendering of the participle and preserves the ongoing, majestic portrayal of God as creator.
- source_word: וְיֹסֵד אָרֶץ
  chosen: lays the foundation of the earth
  alternatives:
  - founds the earth
  - establishes the earth
  lexicon: HALOT
  rationale: יָסַד often carries the sense of founding or laying a foundation. 'Lays the foundation of the earth' is vivid and fits the creation imagery.
- source_word: וְיֹצֵר רוּחַ אָדָם
  chosen: and forms the spirit of man
  alternatives:
  - and forms the human spirit
  - and fashions the spirit of man
  lexicon: HALOT
  rationale: יֹצֵר evokes shaping/forming language. רוּחַ here most naturally refers to the inner spirit of a human being. 'Man' follows the doctrine's gender-accurate guidance for אָדָם in a representative sense, while a more inclusive alternative is preserved.
- source_word: אָדָם
  chosen: man
  alternatives:
  - humankind
  - human being
  lexicon: HALOT
  rationale: The singular generic אָדָם is best represented by 'man' under the project's gender-accurate policy, especially in a creation-context formula. Because modern readers may hear this narrowly, an inclusive lexical alternative is preserved in a footnote.
- source_word: בְּקִרְבּוֹ
  chosen: within him
  alternatives:
  - within him/it
  - inside him
  lexicon: HALOT
  rationale: The 3ms suffix most naturally refers back to אָדָם, yielding 'within him.' This preserves the singular generic construction of the Hebrew. 'Within him' is more idiomatic and dignified than 'inside him'.
