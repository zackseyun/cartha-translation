id: ZEC.12.4
reference: Zechariah 12:4
source:
  edition: WLC
  text: בַּ/יּ֨וֹם הַ/ה֜וּא נְאֻם יְהוָ֗ה אַכֶּ֤ה כָל סוּס֙ בַּ/תִּמָּה֔וֹן וְ/רֹכְב֖/וֹ בַּ/שִּׁגָּע֑וֹן וְ/עַל בֵּ֤ית יְהוּדָה֙ אֶפְקַ֣ח אֶת עֵינַ֔/י וְ/כֹל֙ ס֣וּס הָֽ/עַמִּ֔ים אַכֶּ֖ה בַּֽ/עִוָּרֽוֹן־־־־׃
translation:
  text: On that day, declares Yahweh, I will strike every horse with panic, and its rider with madness. But over the house of Judah I will keep my eyes open, and I will strike every horse of the peoples with blindness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I will open my eyes upon the house of Judah'; the Hebrew idiom conveys attentive regard, likely with protective favor in this context.
    reason: lexical_alternative
  - marker: b
    text: Or 'every horse of the nations.'
    reason: lexical_alternative
lexical_decisions:
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - utterance of the LORD
  lexicon: HALOT
  rationale: Standard prophetic formula. 'Declares the LORD' is idiomatic modern English while preserving the force of divine speech. YHWH is rendered 'the LORD' per doctrine.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Required by the doctrine's contested terms table for the divine name.
- source_word: אַכֶּה
  chosen: I will strike
  alternatives:
  - I will smite
  - I will strike down
  lexicon: HALOT
  rationale: The Hiphil of נכה commonly means 'strike.' 'Smite' is archaic; 'strike down' would over-specify lethality not explicit in the verse.
- source_word: כָל סוּס
  chosen: every horse
  alternatives:
  - all horses
  - each horse
  lexicon: HALOT
  rationale: Singular collective after כָל is naturally rendered distributively in English as 'every horse.'
- source_word: בַּתִּמָּהוֹן
  chosen: with panic
  alternatives:
  - with bewilderment
  - with astonishment
  - with confusion
  lexicon: HALOT
  rationale: The noun denotes dismay/confounded panic. 'Panic' fits the military judgment context and reads naturally in English.
- source_word: וְרֹכְבוֹ
  chosen: and its rider
  alternatives:
  - and its horseman
  - and the one riding it
  lexicon: HALOT
  rationale: The 3ms suffix refers back to the horse. 'Its rider' is concise and clear.
- source_word: בַּשִּׁגָּעוֹן
  chosen: with madness
  alternatives:
  - with frenzy
  - with insanity
  lexicon: HALOT
  rationale: The noun regularly denotes madness or derangement. 'Madness' preserves the severity without sounding clinical.
- source_word: וְעַל בֵּית יְהוּדָה אֶפְקַח אֶת עֵינַי
  chosen: But over the house of Judah I will keep my eyes open
  alternatives:
  - And on the house of Judah I will open my eyes
  - I will watch over the house of Judah
  lexicon: HALOT
  rationale: Literally 'I will open my eyes upon/over the house of Judah.' In context this is an idiom of attentive regard/protection in contrast to judgment on the nations. 'Keep my eyes open' preserves the imagery better than the more interpretive 'watch over,' while 'But' brings out the adversative contrast implied by context.
- source_word: בֵּית יְהוּדָה
  chosen: the house of Judah
  alternatives:
  - Judah
  - the household of Judah
  lexicon: HALOT
  rationale: Formal covenantal expression retained rather than flattening to simply 'Judah.'
- source_word: כֹל סוּס הָעַמִּים
  chosen: every horse of the peoples
  alternatives:
  - every horse of the nations
  - all the horses of the peoples
  lexicon: HALOT
  rationale: עַמִּים here refers to foreign peoples/nations. 'Peoples' is a close rendering and preserves the plural collective nuance; 'nations' is possible but slightly more interpretive.
- source_word: בַּעִוָּרוֹן
  chosen: with blindness
  alternatives:
  - with blinding
  - with sightlessness
  lexicon: HALOT
  rationale: Direct rendering of the judgment term, parallel to 'panic' and 'madness.'
