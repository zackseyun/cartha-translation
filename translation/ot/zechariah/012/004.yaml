- issue: Divine regard toward Judah expressed by 'I will open my eyes'
  chosen_reading: Rendered as attentive, favorable watchfulness without over-expanding into a full doctrinal claim of protection
  alternative_readings:
  - strictly literal 'I will open my eyes upon the house of Judah'
  - more interpretive 'I will watch over the house of Judah'
  rationale: The idiom contrasts with the striking of enemy horses and implies divine attention toward Judah. The translation preserves that theological contrast while avoiding paraphrase beyond the text.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Rendering of YHWH
  chosen_reading: the LORD
  alternative_readings:
