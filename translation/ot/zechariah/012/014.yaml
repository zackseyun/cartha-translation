id: ZEC.12.14
reference: Zechariah 12:14
source:
  edition: WLC
  text: כֹּ֗ל הַ/מִּשְׁפָּחוֹת֙ הַ/נִּשְׁאָר֔וֹת מִשְׁפָּחֹ֥ת מִשְׁפָּחֹ֖ת לְ/בָ֑ד
    וּ/נְשֵׁי/הֶ֖ם לְ/בָֽד׃ס
translation:
  text: all the families that remain, each family by itself, and their wives by themselves.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'family by family ... and their women apart.' The Hebrew uses a distributive
      repetition ('families, families') and repeats 'apart/by itself' for emphasis.
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּל
  chosen: all
  alternatives:
  - every
  lexicon: HALOT
  rationale: Quantifies the whole set of the remaining families. 'All' fits the collective
    sense naturally in English.
- source_word: הַמִּשְׁפָּחוֹת
  chosen: the families
  alternatives:
  - the clans
  lexicon: HALOT
  rationale: מִשְׁפָּחָה commonly denotes family or clan. 'Families' is the more natural
    and sufficiently broad English rendering here, especially with the repeated distributive
    phrase following.
- source_word: הַנִּשְׁאָרוֹת
  chosen: that remain
  alternatives:
  - that are left
  - that survive
  lexicon: HALOT
  rationale: From שׁאר, indicating those left over or remaining. 'That remain' is
    concise and idiomatic, without over-specifying whether the emphasis is survival
    or mere remainder.
- source_word: מִשְׁפָּחֹת מִשְׁפָּחֹת
  chosen: each family
  alternatives:
  - family by family
  - clan by clan
  lexicon: HALOT
  rationale: The repetition is distributive. English usually expresses this more naturally
    as 'each family,' while the following 'by itself' preserves the separative force.
- source_word: לְבָד
  chosen: by itself
  alternatives:
  - apart
  - alone
  lexicon: HALOT
  rationale: Conveys separation or isolation. 'By itself' works well with 'each family'
    and preserves the repeated emphasis on distinct mourning groups.
- source_word: וּנְשֵׁיהֶם
  chosen: and their wives
  alternatives:
  - and their women
  lexicon: HALOT
  rationale: The noun אִשָּׁה in this plural construct with 3mp suffix most naturally
    means 'their wives' in this household/family context. This is gender-accurate
    and preserves the male/female distinction explicit in the Hebrew.
- source_word: לְבָד
  chosen: by themselves
  alternatives:
  - apart
  - alone
  lexicon: HALOT
  rationale: Repeated to mirror the Hebrew's second separative phrase, now agreeing
    with the plural subject 'wives.'
