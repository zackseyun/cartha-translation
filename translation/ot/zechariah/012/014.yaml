theological_decisions:
- issue: Gendered separation in mourning
  chosen_reading: Retain the explicit distinction 'their wives by themselves' in the
    main text.
  alternative_readings:
  - Render more generically as 'the women by themselves'
  rationale: The Hebrew explicitly distinguishes the wives/women from the family groups
    and marks their separate participation. Per the translation philosophy, gender-accurate
    rendering is preferred over neutralization where the source makes the distinction.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
