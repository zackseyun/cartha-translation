theological_decisions:
- issue: Scope of הָאָרֶץ in prophetic context
  chosen_reading: the land
  alternative_readings:
  - the earth
  rationale: The immediate context enumerates particular Israelite/Judahite family
    lines, so the mourning is portrayed as occurring throughout the covenant land
    rather than across the entire world. This is a contextual, not doctrinal, decision.
  doctrine_reference: Translation philosophy §1 (Original-language primacy over translation
    tradition)
