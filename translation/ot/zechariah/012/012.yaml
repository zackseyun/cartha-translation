id: ZEC.12.12
reference: Zechariah 12:12
source:
  edition: WLC
  text: וְ/סָפְדָ֣ה הָ/אָ֔רֶץ מִשְׁפָּח֥וֹת מִשְׁפָּח֖וֹת לְ/בָ֑ד מִשְׁפַּ֨חַת בֵּית
    דָּוִ֤יד לְ/בָד֙ וּ/נְשֵׁי/הֶ֣ם לְ/בָ֔ד מִשְׁפַּ֤חַת בֵּית נָתָן֙ לְ/בָ֔ד וּ/נְשֵׁי/הֶ֖ם
    לְ/בָֽד־־׃
translation:
  text: 'And the land will mourn, each family by itself: the family of the house of
    David by itself, and their wives by themselves; the family of the house of Nathan
    by itself, and their wives by themselves.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'family by family'; the Hebrew repeats 'families, families' to express
      a distributive sense.
    reason: lexical_alternative
  - marker: b
    text: Or 'the earth' for 'the land.'
    reason: alternative_reading
lexical_decisions:
- source_word: וְסָפְדָה
  chosen: And ... will mourn
  alternatives:
  - And ... will wail
  - And ... will lament
  lexicon: HALOT
  rationale: The verb ספד denotes mourning or lamentation, often in a funerary or
    communal sense. 'Mourn' is natural modern English and fits the broader context
    of national lament in this passage without over-specifying the manner of grief.
- source_word: הָאָרֶץ
  chosen: the land
  alternatives:
  - the earth
  lexicon: HALOT
  rationale: אֶרֶץ can mean 'land' or 'earth.' In this context, with the clans/families
    of Judah and Jerusalem specified in the surrounding verses, 'the land' better
    conveys the people of the land in covenantal/national scope rather than the whole
    globe.
- source_word: מִשְׁפָּחוֹת מִשְׁפָּחוֹת
  chosen: each family
  alternatives:
  - family by family
  - the families, families
  lexicon: HALOT
  rationale: The repetition is distributive, indicating the mourning occurs clan by
    clan. 'Each family' captures the distributive force in idiomatic English; the
    following 'by itself' preserves the separative emphasis.
- source_word: לְבָד
  chosen: by itself / by themselves
  alternatives:
  - alone
  - separately
  lexicon: HALOT
  rationale: לבד emphasizes separation. 'By itself/by themselves' preserves the repeated
    stress on distinct, separate mourning while reading smoothly in English. Number
    is adjusted to English agreement with 'family' versus 'wives.'
- source_word: מִשְׁפַּחַת בֵּית דָּוִיד
  chosen: the family of the house of David
  alternatives:
  - the clan of the house of David
  - the family of David's house
  lexicon: HALOT
  rationale: This construct chain identifies a specific dynastic family group. 'The
    family of the house of David' is slightly formal but transparent and preserves
    the Hebrew structure and dynastic nuance.
- source_word: וּנְשֵׁיהֶם
  chosen: and their wives
  alternatives:
  - and their women
  lexicon: HALOT
  rationale: Though אִשָּׁה can mean 'woman' or 'wife,' the possessive 'their' in
    this social/familial setting strongly favors 'wives.' This also matches the verse's
    distinction between male family groups and their female counterparts mourning
    separately.
- source_word: מִשְׁפַּחַת בֵּית נָתָן
  chosen: the family of the house of Nathan
  alternatives:
  - the clan of the house of Nathan
  lexicon: HALOT
  rationale: As with 'house of David,' this is best rendered as a named family line.
    'Nathan' is transliterated as a personal name in keeping with the translation
    philosophy.
