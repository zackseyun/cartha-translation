theological_decisions:
- issue: Identification of 'Hadad-rimmon'
  chosen_reading: Render as a place/name in the comparison without specifying the
    historical event in the main text.
  alternative_readings:
  - A reference to mourning for King Josiah at Megiddo
  - A reference to a deity or cultic lament associated with Hadad-Rimmon
  rationale: The Hebrew text names Hadad-rimmon but does not explain it. Because the
    identification is debated, the translation preserves the proper name rather than
    importing a specific interpretation into the main text. A footnote preserves the
    major interpretive alternatives.
  doctrine_reference: Preserve theological tension rather than resolve it.
