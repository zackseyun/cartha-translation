id: ZEC.12.11
reference: Zechariah 12:11
source:
  edition: WLC
  text: בַּ/יּ֣וֹם הַ/ה֗וּא יִגְדַּ֤ל הַ/מִּסְפֵּד֙ בִּ/יר֣וּשָׁלִַ֔ם כְּ/מִסְפַּ֥ד
    הֲדַדְ רִמּ֖וֹן בְּ/בִקְעַ֥ת מְגִדּֽוֹן־׃
translation:
  text: On that day the mourning in Jerusalem will become great, like the mourning
    of Hadad-rimmon in the plain of Megiddo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hadad-rimmon may refer to a place near Megiddo, possibly associated with
      the mourning for Josiah (cf. 2 Chr 35:22–25), or to another well-known lament
      tradition.
    reason: alternative_reading
lexical_decisions:
- source_word: בַּיּוֹם הַהוּא
  chosen: On that day
  alternatives:
  - In that day
  lexicon: HALOT
  rationale: Standard temporal prophetic formula. 'On that day' is idiomatic modern
    English and preserves the eschatological/deictic force without archaism.
- source_word: יִגְדַּל
  chosen: will become great
  alternatives:
  - will be great
  - will increase
  lexicon: HALOT
  rationale: The verb גדל means 'be/become great, grow.' Here with the subject 'mourning,'
    the sense is increase in magnitude. 'Will become great' preserves the verbal development
    more clearly than the flatter 'will be great.'
- source_word: הַמִּסְפֵּד
  chosen: the mourning
  alternatives:
  - the lamentation
  - the wailing
  lexicon: HALOT
  rationale: מִסְפֵּד denotes mourning/lamentation, often with public mourning over
    death. 'Mourning' is natural English and broad enough to include the communal
    lament implied here.
- source_word: בִּירוּשָׁלִַם
  chosen: in Jerusalem
  lexicon: HALOT
  rationale: Straightforward locative rendering of the place name.
- source_word: כְּמִסְפַּד
  chosen: like the mourning of
  alternatives:
  - like the lamentation of
  - as the mourning for
  lexicon: HALOT
  rationale: The comparative כ introduces the standard of comparison. The construct
    form naturally yields 'the mourning of.' 'For' is possible interpretively if the
    phrase refers to mourning over a person/event, but the Hebrew form itself is best
    represented by 'of.'
- source_word: הֲדַד רִמּוֹן
  chosen: Hadad-rimmon
  alternatives:
  - Hadadrimmon
  lexicon: HALOT
  rationale: Treated as a proper name and transliterated per project policy. The hyphenated
    form helps English readers recognize the compound name while preserving the Hebrew
    components.
- source_word: בְּבִקְעַת מְגִדּוֹן
  chosen: in the plain of Megiddo
  alternatives:
  - in the valley of Megiddo
  lexicon: HALOT
  rationale: בִּקְעָה commonly denotes a broad valley/plain. 'Plain' better matches
    the topographical sense than the narrower 'valley,' though the latter is a familiar
    alternative.
