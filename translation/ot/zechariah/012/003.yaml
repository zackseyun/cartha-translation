id: ZEC.12.3
reference: Zechariah 12:3
source:
  edition: WLC
  text: וְ/הָיָ֣ה בַ/יּוֹם הַ֠/הוּא אָשִׂ֨ים אֶת יְרוּשָׁלִַ֜ם אֶ֤בֶן מַֽעֲמָסָה֙
    לְ/כָל הָ֣/עַמִּ֔ים כָּל עֹמְסֶ֖י/הָ שָׂר֣וֹט יִשָּׂרֵ֑טוּ וְ/נֶאֶסְפ֣וּ עָלֶ֔י/הָ
    כֹּ֖ל גּוֹיֵ֥י הָ/אָֽרֶץ־־־־׃
translation:
  text: And on that day I will make Jerusalem a heavy stone for all the peoples. All
    who lift it will surely injure themselves, and all the nations of the earth will
    gather against her.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a burdensome stone for all the peoples.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'will surely be cut/gashed,' an intensified Hebrew expression
      for severe self-injury.
    reason: lexical_alternative
  - marker: c
    text: Or 'all the nations of the land,' if 'land' is taken in a more local sense.
    reason: alternative_reading
lexical_decisions:
- source_word: וְהָיָה בַיּוֹם הַהוּא
  chosen: And on that day
  alternatives:
  - And it will happen on that day
  - And in that day
  lexicon: HALOT
  rationale: The Hebrew idiom introduces a prophetic event sequence. 'And on that
    day' is natural modern English while preserving the temporal marker and discourse
    linkage.
- source_word: אָשִׂים
  chosen: I will make
  alternatives:
  - I will set
  - I will place
  lexicon: HALOT
  rationale: שׂים commonly means 'set/place/make.' With Jerusalem as object complement
    by 'stone of burden,' 'make' best conveys the resulting state in idiomatic English.
- source_word: אֶת יְרוּשָׁלִַם
  chosen: Jerusalem
  lexicon: HALOT
  rationale: Proper name transliterated per translation philosophy.
- source_word: אֶבֶן מַעֲמָסָה
  chosen: a heavy stone
  alternatives:
  - a burdensome stone
  - a stone for lifting
  - a stone of burden
  lexicon: HALOT
  rationale: The phrase denotes a stone used for loading/lifting, emphasizing weight
    and danger to those who try to move it. 'Heavy stone' is clear modern English;
    the more formal 'burdensome stone' is preserved as an alternative.
- source_word: לְכָל הָעַמִּים
  chosen: for all the peoples
  alternatives:
  - for all the nations
  lexicon: HALOT
  rationale: עַמִּים is 'peoples' rather than גּוֹיִם here. Rendering it distinctly
    as 'peoples' preserves the lexical difference from the later 'nations,' though
    both refer broadly to foreign groups.
- source_word: כָּל עֹמְסֶיהָ
  chosen: All who lift it
  alternatives:
  - All who burden themselves with it
  - All who load themselves with it
  lexicon: HALOT
  rationale: The participle from עמס refers to loading or lifting a burden. In context
    of a heavy stone, 'lift it' best captures the concrete image and resulting self-harm.
- source_word: שָׂרוֹט יִשָּׂרֵטוּ
  chosen: will surely injure themselves
  alternatives:
  - will be badly cut
  - will surely lacerate themselves
  lexicon: HALOT
  rationale: The infinitive absolute plus finite verb intensifies the action. The
    root שׂרט can denote gashing/cutting oneself. Because the image is of harm from
    attempting to lift the stone, 'will surely injure themselves' communicates the
    force in readable English, while more literal 'be badly cut' is preserved as an
    alternative.
- source_word: וְנֶאֶסְפוּ עָלֶיהָ
  chosen: will gather against her
  alternatives:
  - will assemble against her
  - will gather over her
  lexicon: HALOT
  rationale: אָסף with עַל in military-prophetic context indicates hostile assembly
    against Jerusalem. 'Against her' makes the adversative force explicit in idiomatic
    English.
- source_word: כֹּל גּוֹיֵי הָאָרֶץ
  chosen: all the nations of the earth
  alternatives:
  - all the nations of the land
  lexicon: HALOT
  rationale: גּוֹיֵי הָאָרֶץ most naturally means the nations of the earth/world in
    this eschatological context, not merely local 'land.' 'Earth' preserves the broad
    scope.
