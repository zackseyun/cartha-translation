theological_decisions:
- issue: Scope of the hostile coalition against Jerusalem
  chosen_reading: all the nations of the earth will gather against her
  alternative_readings:
  - all the nations of the land will gather against her
  rationale: The phrase can in some contexts mean 'land,' but in Zechariah's prophetic
    and international setting the broader 'earth' better fits the envisioned worldwide
    gathering. This is a contextual lexical decision, not a doctrinal harmonization.
  doctrine_reference: Translation philosophy §1, §3
