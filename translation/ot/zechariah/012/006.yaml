id: ZEC.12.6
reference: Zechariah 12:6
source:
  edition: WLC
  text: בַּ/יּ֣וֹם הַ/ה֡וּא אָשִׂים֩ אֶת אַלֻּפֵ֨י יְהוּדָ֜ה כְּֽ/כִיּ֧וֹר אֵ֣שׁ בְּ/עֵצִ֗ים
    וּ/כְ/לַפִּ֥יד אֵשׁ֙ בְּ/עָמִ֔יר וְ/אָ֨כְל֜וּ עַל יָמִ֧ין וְ/עַל שְׂמֹ֛אול אֶת
    כָּל הָ/עַמִּ֖ים סָבִ֑יב וְ/יָשְׁבָ֨ה יְרוּשָׁלִַ֥ם ע֛וֹד תַּחְתֶּ֖י/הָ בִּ/ירוּשָׁלִָֽם־־־־־׃פ
translation:
  text: On that day I will make the clans of Judah like a firepot among wood, and
    like a flaming torch among sheaves; and they will consume all the surrounding
    peoples, on the right and on the left. And Jerusalem will again dwell in her own
    place, in Jerusalem.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the leaders of Judah' or 'the chiefs of Judah.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew literally 'under herself,' an idiom meaning 'in her own place.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַלֻּפֵי יְהוּדָה
  chosen: the clans of Judah
  alternatives:
  - the leaders of Judah
  - the chiefs of Judah
  lexicon: HALOT
  rationale: אַלּוּף can denote clan leader or clan unit depending on context. Here
    the plural construct with Judah in a military-collective image suits 'clans' as
    representative social units rather than only individual commanders, while preserving
    the corporate sense of Judah's fighting groups.
- source_word: כְּכִיּוֹר אֵשׁ בְּעֵצִים
  chosen: like a firepot among wood
  alternatives:
  - like a basin of fire among wood
  - like a brazier among wood
  lexicon: HALOT
  rationale: כִּיּוֹר ordinarily refers to a basin/pot. In this simile, because it
    is explicitly qualified by 'fire' and set among wood, 'firepot' best conveys a
    vessel containing burning coals that ignites surrounding fuel. This is more idiomatic
    in English than 'basin of fire' while staying close to the image.
- source_word: וּכְלַפִּיד אֵשׁ בְּעָמִיר
  chosen: and like a flaming torch among sheaves
  alternatives:
  - and like a torch of fire among stubble
  - and like a firebrand among grain stacks
  lexicon: HALOT
  rationale: לַפִּיד אֵשׁ is naturally 'torch/flaming torch.' עָמִיר can refer to
    a heap or sheaf of grain/stalks. 'Sheaves' gives a vivid agricultural image and
    pairs well with the torch simile.
- source_word: וְאָכְלוּ
  chosen: they will consume
  alternatives:
  - they will devour
  - they will eat up
  lexicon: HALOT
  rationale: The verb 'eat' is used metaphorically for destructive conquest. 'Consume'
    preserves the fire imagery and avoids overly literal or colloquial English.
- source_word: עַל יָמִין וְעַל שְׂמֹאול
  chosen: on the right and on the left
  alternatives:
  - to the right and to the left
  - on every side
  lexicon: HALOT
  rationale: A fairly literal rendering preserves the directional imagery of total
    surrounding defeat. 'On every side' is interpretive and therefore left as an alternative
    rather than the main text.
- source_word: כָּל הָעַמִּים סָבִיב
  chosen: all the surrounding peoples
  alternatives:
  - all the peoples around them
  - all the surrounding nations
  lexicon: HALOT
  rationale: עַמִּים is broader than 'nations' and often means peoples/groups. סָבִיב
    modifies them as encircling Judah/Jerusalem. 'Surrounding peoples' is both natural
    and close to the Hebrew.
- source_word: וְיָשְׁבָה יְרוּשָׁלַם
  chosen: And Jerusalem will again dwell
  alternatives:
  - And Jerusalem will again remain
  - And Jerusalem will again be inhabited
  lexicon: HALOT
  rationale: The verb ישׁב commonly means dwell/live/sit. With Jerusalem as subject,
    'will again dwell' personifies the city in a common prophetic way and keeps the
    active verbal force better than the passive 'be inhabited.'
- source_word: עוֹד תַּחְתֶּיהָ
  chosen: in her own place
  alternatives:
  - under herself
  - where she is
  lexicon: HALOT
  rationale: The idiom literally means 'under herself,' expressing remaining or settling
    in one's own place. 'In her own place' communicates the idiomatic sense in clear
    English without wooden obscurity.
- source_word: בִּירוּשָׁלָם
  chosen: in Jerusalem
  alternatives:
  - at Jerusalem
  lexicon: HALOT
  rationale: 'The final phrase is retained literally, likely for emphasis: Jerusalem
    will dwell in her own place, namely in Jerusalem. Keeping the repetition preserves
    the Hebrew''s rhetorical force.'
