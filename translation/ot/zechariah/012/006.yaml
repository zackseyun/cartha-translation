theological_decisions:
- issue: Corporate identity of אַלֻּפֵי יְהוּדָה
  chosen_reading: corporate 'clans of Judah' rather than only individual military
    leaders
  alternative_readings:
  - leaders of Judah
  - chiefs of Judah
  rationale: The verse depicts Judah's collective strength in battle and parallels
    the city's corporate restoration. Rendering the term corporately avoids narrowing
    the promise to elites alone while remaining lexically defensible.
