id: ZEC.12.2
reference: Zechariah 12:2
source:
  edition: WLC
  text: הִנֵּ֣ה אָ֠נֹכִי שָׂ֣ם אֶת יְרוּשָׁלִַ֧ם סַף רַ֛עַל לְ/כָל הָ/עַמִּ֖ים סָבִ֑יב
    וְ/גַ֧ם עַל יְהוּדָ֛ה יִֽהְיֶ֥ה בַ/מָּצ֖וֹר עַל יְרוּשָׁלִָֽם־־־־־׃
translation:
  text: Behold, I am about to make Jerusalem a cup of staggering to all the surrounding
    peoples; and it will also be against Judah in the siege against Jerusalem.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a cup of reeling.' The Hebrew expression may also be understood more
      literally as 'a basin/threshold of reeling,' but the sense of a vessel causing
      intoxicated staggering best fits the context.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew of the second clause is difficult. It may also mean 'Judah also
      will be besieged along with Jerusalem' or 'this will also come upon Judah in
      the siege against Jerusalem.'
    reason: alternative_reading
lexical_decisions:
- source_word: הִנֵּה
  chosen: Behold
  alternatives:
  - Look
  - See
  lexicon: HALOT
  rationale: Introduces a solemn prophetic announcement. 'Behold' preserves the elevated,
    attention-directing force better than flatter modern options.
- source_word: אָ֠נֹכִי
  chosen: I
  alternatives:
  - I myself
  lexicon: HALOT
  rationale: The independent pronoun adds emphasis, but English normally conveys this
    adequately with the explicit subject 'I' in a divine declaration; overtranslating
    as 'I myself' would sound heavier than necessary here.
- source_word: שָׂם
  chosen: am about to make
  alternatives:
  - am making
  - will make
  - set
  lexicon: HALOT
  rationale: The participle with הִנֵּה often has imminent/future force in prophetic
    discourse. 'Am about to make' captures the vivid immediacy better than a simple
    present, while remaining natural English.
- source_word: אֶת יְרוּשָׁלִַם
  chosen: Jerusalem
  lexicon: HALOT
  rationale: Direct object marker is not translated; the city name is transliterated
    per project policy on names.
- source_word: סַף רַעַל
  chosen: a cup of staggering
  alternatives:
  - a threshold of reeling
  - a bowl of reeling
  - a cup of reeling
  lexicon: HALOT
  rationale: Though סַף can denote 'threshold' or a vessel such as a basin/cup, the
    collocation here is widely understood metaphorically as a drinking vessel causing
    intoxicated instability. 'Cup of staggering' is idiomatic English and fits the
    judgment imagery. 'Threshold' is possible lexically but much less likely in context.
- source_word: לְכָל הָעַמִּים סָבִיב
  chosen: to all the surrounding peoples
  alternatives:
  - for all the surrounding peoples
  - to all the peoples around
  lexicon: HALOT
  rationale: ל marks relation/direction; 'to' works naturally with the metaphor of
    Jerusalem becoming a cup presented to the nations. 'Peoples' rather than 'nations'
    reflects עַמִּים while preserving the plural collective sense.
- source_word: וְגַם
  chosen: and it will also
  alternatives:
  - and also
  - moreover
  lexicon: HALOT
  rationale: Marks addition and transition to the difficult second clause. Including
    'it will' anticipates the following verb and yields coherent English.
- source_word: עַל יְהוּדָה
  chosen: against Judah
  alternatives:
  - upon Judah
  - concerning Judah
  lexicon: HALOT
  rationale: עַל in this military-judgment context is best rendered 'against,' indicating
    hostile involvement or effect.
- source_word: יִהְיֶה
  chosen: it will be
  alternatives:
  - it shall be
  - there will be
  lexicon: HALOT
  rationale: Simple future existential/copular sense; 'it' refers back to the judgment
    scenario centered on Jerusalem as the staggering cup.
- source_word: בַמָּצוֹר
  chosen: in the siege
  alternatives:
  - during the siege
  - under siege
  lexicon: HALOT
  rationale: מָצוֹר denotes siege/siegeworks. 'In the siege' is a close rendering
    that preserves the military setting without overinterpreting.
- source_word: עַל יְרוּשָׁלִָם
  chosen: against Jerusalem
  alternatives:
  - concerning Jerusalem
  - over Jerusalem
  lexicon: HALOT
  rationale: 'In context of מָצוֹר, עַל naturally means hostile action directed against
    the city: ''against Jerusalem.'''
