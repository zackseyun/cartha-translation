theological_decisions:
- issue: Interpretation of the difficult clause וְגַם עַל־יְהוּדָה יִהְיֶה בַמָּצוֹר
    עַל־יְרוּשָׁלִָם
  chosen_reading: Judah too will be involved adversely in the siege against Jerusalem.
  alternative_readings:
  - Judah also will be besieged along with Jerusalem.
  - The cup will come upon Judah when Jerusalem is besieged.
  rationale: The Hebrew is syntactically compressed and debated. The chosen rendering
    keeps the preposition עַל as 'against' in both occurrences and preserves the tension
    that Judah is somehow implicated in the siege against Jerusalem, without resolving
    exactly how. This avoids smoothing the text into a less difficult reading while
    remaining intelligible English.
  doctrine_reference: Preserve theological tension rather than resolve it.
