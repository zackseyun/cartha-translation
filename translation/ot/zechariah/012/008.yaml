theological_decisions:
- issue: Meaning of אֱלֹהִים in the comparison for the house of David
  chosen_reading: singular 'God'
  alternative_readings:
  - '''gods'''
  - '''divine beings'''
  rationale: The immediate parallel 'like the angel of the LORD before them' suggests
    an exalted, singular comparison rather than a generic plural. Rendering 'God'
    preserves the force of the Hebrew without flattening the startling imagery. Because
    the phrase is rhetorically bold and potentially ambiguous, alternatives are preserved
    in a footnote.
  doctrine_reference: Preserve theological tension rather than resolve it; document
    ambiguity per verse.
