id: ZEC.12.8
reference: Zechariah 12:8
source:
  edition: WLC
  text: בַּ/יּ֣וֹם הַ/ה֗וּא יָגֵ֤ן יְהוָה֙ בְּעַד֙ יוֹשֵׁ֣ב יְרוּשָׁלִַ֔ם וְ/הָיָ֞ה
    הַ/נִּכְשָׁ֥ל בָּ/הֶ֛ם בַּ/יּ֥וֹם הַ/ה֖וּא כְּ/דָוִ֑יד וּ/בֵ֤ית דָּוִיד֙ כֵּֽ/אלֹהִ֔ים
    כְּ/מַלְאַ֥ךְ יְהוָ֖ה לִ/פְנֵי/הֶֽם׃
translation:
  text: On that day the LORD will shield the inhabitants of Jerusalem, and the one
    who stumbles among them on that day will be like David, and the house of David
    like God, like the angel of the LORD before them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'like divine beings' or 'like gods' for 'like God.' The Hebrew אֱלֹהִים
      can bear these senses in some contexts, though here the singular comparison
      is likely.
    reason: alternative_reading
lexical_decisions:
- source_word: יָגֵן
  chosen: will shield
  alternatives:
  - will defend
  - will protect
  lexicon: HALOT
  rationale: The verb denotes protective covering or defense. 'Will shield' is vivid,
    natural English and preserves the image of protective defense better than the
    flatter 'protect.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving
    Jewish reverence tradition and established English Bible convention.
- source_word: בְּעַד
  chosen: for
  alternatives:
  - on behalf of
  - around
  - in defense of
  lexicon: HALOT
  rationale: In context with יָגֵן, the preposition marks protection on behalf of
    someone. This sense is idiomatically carried in English by 'shield ...' without
    needing a more cumbersome expansion.
- source_word: יוֹשֵׁב יְרוּשָׁלִַם
  chosen: the inhabitants of Jerusalem
  alternatives:
  - the one dwelling in Jerusalem
  - those who dwell in Jerusalem
  lexicon: HALOT
  rationale: The singular participle functions collectively. 'The inhabitants of Jerusalem'
    is idiomatic English that preserves the collective sense.
- source_word: הַנִּכְשָׁל
  chosen: the one who stumbles
  alternatives:
  - the feeble one
  - the weak one
  - the one who is stumbling
  lexicon: HALOT
  rationale: The Niphal participle from כשל refers to one who stumbles or is weak/faltering.
    'The one who stumbles' preserves the concrete metaphor while allowing the implied
    weakness to remain.
- source_word: בָּהֶם
  chosen: among them
  alternatives:
  - in them
  lexicon: HALOT
  rationale: 'Here the preposition with pronoun is best taken socially or corporately:
    the stumbling one among the people of Jerusalem.'
- source_word: כְּדָוִיד
  chosen: like David
  alternatives:
  - as David
  lexicon: HALOT
  rationale: The comparison points to David as the model of strength and royal prowess.
    'Like David' is the most natural comparative rendering.
- source_word: בֵּית דָּוִיד
  chosen: the house of David
  alternatives:
  - David's house
  - the dynasty of David
  lexicon: HALOT
  rationale: '''House of David'' preserves the dynastic and familial resonance of
    the Hebrew and matches established biblical usage.'
- source_word: כֵּאלֹהִים
  chosen: like God
  alternatives:
  - like gods
  - like divine beings
  lexicon: HALOT
  rationale: Although אֱלֹהִים can in some contexts mean 'gods' or 'divine beings,'
    here the singular comparison followed by 'like the angel of the LORD' favors a
    singular, exalted comparison. 'Like God' best reflects the likely sense in context.
- source_word: כְּמַלְאַךְ יְהוָה
  chosen: like the angel of the LORD
  alternatives:
  - like the messenger of the LORD
  lexicon: HALOT
  rationale: מַלְאָךְ can mean 'messenger' or 'angel,' but in this recurring biblical
    expression the supernatural sense is primary. The traditional rendering also preserves
    intertextual resonance.
- source_word: לִפְנֵיהֶם
  chosen: before them
  alternatives:
  - going before them
  - in front of them
  lexicon: HALOT
  rationale: The phrase likely evokes leadership or advance presence. 'Before them'
    is formally close and leaves the precise nuance appropriately open.
