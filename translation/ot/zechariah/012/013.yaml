id: ZEC.12.13
reference: Zechariah 12:13
source:
  edition: WLC
  text: מִשְׁפַּ֤חַת בֵּית לֵוִי֙ לְ/בָ֔ד וּ/נְשֵׁי/הֶ֖ם לְ/בָ֑ד מִשְׁפַּ֤חַת הַ/שִּׁמְעִי֙
    לְ/בָ֔ד וּ/נְשֵׁי/הֶ֖ם לְ/בָֽד־׃
translation:
  text: the family of the house of Levi by itself, and their wives by themselves;
    the family of the Shimeites by itself, and their wives by themselves.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the family of Shimei.' The Hebrew likely refers to the Shimeite clan.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִשְׁפַּחַת
  chosen: the family of
  alternatives:
  - clan of
  - household of
  lexicon: HALOT
  rationale: Construct form introducing each named group. 'Family of' is natural English
    and broad enough to cover an extended kin-group without overcommitting to 'clan,'
    though that is a viable alternative.
- source_word: בֵּית לֵוִי
  chosen: the house of Levi
  alternatives:
  - Levi
  - the Levite house
  lexicon: HALOT
  rationale: בֵּית in construct with a personal name commonly denotes a house/lineage.
    Rendering it explicitly as 'the house of Levi' preserves the genealogical sense
    rather than reducing it simply to the tribe name.
- source_word: לְבָד
  chosen: by itself / by themselves
  alternatives:
  - apart
  - alone
  - separately
  lexicon: HALOT
  rationale: The repeated adverb emphasizes separation in mourning. 'By itself/by
    themselves' preserves the repetitive cadence of the Hebrew while remaining idiomatic.
    'Apart' is possible, but the chosen wording better mirrors the refrain-like structure.
- source_word: וּנְשֵׁיהֶם
  chosen: and their wives
  alternatives:
  - and their women
  lexicon: HALOT
  rationale: נָשִׁים can mean 'women' or 'wives'; with the 3mp suffix in this familial
    setting, 'their wives' is the most contextually precise rendering and highlights
    the gendered separation described in the verse.
- source_word: הַשִּׁמְעִי
  chosen: the Shimeites
  alternatives:
  - the family of Shimei
  - the Simeites
  lexicon: HALOT
  rationale: The form is a gentilic/group designation with the article, referring
    to the clan descended from or associated with Shimei. 'The Shimeites' is concise
    and natural in English, while preserving the proper-name basis.
