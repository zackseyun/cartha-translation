theological_decisions:
- issue: Gendered separation in mourning
  chosen_reading: Retain the explicit distinction between the male family groups and
    'their wives' rather than neutralizing it.
  alternative_readings:
  - the family ... and their women separately
  - each family separately, men and women separately
  rationale: The Hebrew explicitly distinguishes the family units from their wives,
    underscoring separate mourning by gender. Per the translation philosophy's gender-accurate
    principle, this should not be flattened into a generic statement.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
