id: ZEC.13.7
reference: Zechariah 13:7
source:
  edition: WLC
  text: חֶ֗רֶב עוּרִ֤י עַל רֹעִ/י֙ וְ/עַל גֶּ֣בֶר עֲמִיתִ֔/י נְאֻ֖ם יְהוָ֣ה צְבָא֑וֹת הַ֤ךְ אֶת הָֽ/רֹעֶה֙ וּ/תְפוּצֶ֣יןָ הַ/צֹּ֔אן וַ/הֲשִׁבֹתִ֥י יָדִ֖/י עַל הַ/צֹּעֲרִֽים־־־־׃
translation:
  text: Awake, O sword, against my shepherd, against the man who is my companion, declares Yahweh of Armies. Strike the shepherd, and the sheep will be scattered; and I will turn my hand against the little ones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'against the man who is my associate,' or possibly 'against the man who is my equal.' The Hebrew term denotes one closely associated with another.
    reason: lexical_alternative
  - marker: b
    text: Or 'the LORD of Hosts.'
    reason: lexical_alternative
  - marker: c
    text: Or 'I will turn my hand upon/toward the little ones.' The idiom may imply action against them, or more generally renewed dealing with them.
    reason: alternative_reading
lexical_decisions:
- source_word: חֶרֶב
  chosen: sword
  lexicon: HALOT
  rationale: Concrete singular noun; direct address to the sword is preserved as vivid prophetic personification.
- source_word: עוּרִי
  chosen: Awake
  alternatives:
  - Rouse yourself
  - Wake up
  lexicon: HALOT
  rationale: Imperative feminine singular matching חֶרֶב; 'Awake' is idiomatic and preserves the summons to action without over-paraphrase.
- source_word: רֹעִי
  chosen: my shepherd
  lexicon: HALOT
  rationale: Qal participle with 1cs suffix used substantivally; rendered straightforwardly as 'my shepherd.' Retains the possessive relation expressed in the Hebrew.
- source_word: גֶּבֶר
  chosen: the man
  alternatives:
  - the strong man
  - the warrior
  lexicon: HALOT
  rationale: Although גבר can carry connotations of strength, here the plain personal sense fits best in apposition to 'my shepherd.' 'The man' preserves the lexical form without importing extra nuance.
- source_word: עֲמִיתִי
  chosen: who is my companion
  alternatives:
  - my associate
  - my fellow
  - who is close to me
  lexicon: HALOT
  rationale: עָמִית denotes an associate, companion, or one standing in relation with another. The relative clause makes the sense natural in English and preserves the closeness implied by the term.
- source_word: נְאֻם יְהוָה צְבָאוֹת
  chosen: declares the LORD of Armies
  alternatives:
  - oracle of the LORD of Hosts
  - declares the LORD of Hosts
  lexicon: HALOT
  rationale: נְאֻם is a prophetic declaration formula best rendered 'declares.' Per doctrine, יְהוָה is rendered 'the LORD.' צְבָאוֹת is translated as 'Armies' rather than transliterated 'Hosts' for readability and semantic transparency.
- source_word: הַךְ
  chosen: Strike
  alternatives:
  - Smite
  - Attack
  lexicon: HALOT
  rationale: Imperative from נכה. 'Strike' is forceful, natural modern English and avoids archaic 'smite' while preserving the command.
- source_word: וּתְפוּצֶיןָ
  chosen: will be scattered
  alternatives:
  - shall be scattered
  - may be scattered
  lexicon: HALOT
  rationale: The verb expresses the resulting dispersal of the flock after the shepherd is struck. English future passive best captures the sense in context.
- source_word: הַצֹּאן
  chosen: the sheep
  alternatives:
  - the flock
  lexicon: HALOT
  rationale: Literally 'the flock/sheep.' 'The sheep' preserves the animal imagery already implied by 'shepherd' and is the more direct lexical match.
- source_word: וַהֲשִׁבֹתִי יָדִי עַל
  chosen: I will turn my hand against
  alternatives:
  - I will bring back my hand upon
  - I will turn my hand upon
  lexicon: HALOT
  rationale: This idiom can denote turning one's hand toward someone either for action against or in relation to them. In this judgment context, 'against' is the most likely sense, though the idiom is somewhat ambiguous and worth preserving in a footnote.
- source_word: הַצֹּעֲרִים
  chosen: the little ones
  alternatives:
  - the small ones
  - the insignificant ones
  - the young ones
  lexicon: HALOT
  rationale: From צעיר, denoting smallness or youth. 'Little ones' is broad enough to preserve the ambiguity between age and status and fits the flock imagery.
