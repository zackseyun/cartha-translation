theological_decisions:
- issue: Sense of עֲמִיתִי in relation to the shepherd
  chosen_reading: Rendered as 'who is my companion' to express closeness without importing later doctrinal formulation into the translation itself.
  alternative_readings:
  - my associate
  - my equal
  rationale: The verse has major theological significance in Christian interpretation, but the translation should not force a stronger metaphysical claim than the Hebrew term itself unambiguously carries. 'Companion' preserves the relational closeness while allowing readers to see the text's weight. A stronger rendering such as 'my equal' is preserved in a footnote as a lexical alternative.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Sense of 'I will turn my hand against the little ones'
  chosen_reading: Treated as adverse action in context.
  alternative_readings:
  - I will turn my hand toward the little ones, possibly for care, refinement, or further dealing
  rationale: Within the immediate context of striking and scattering, an adverse or disciplinary sense is most natural. However, the idiom can be interpreted more neutrally or even beneficially in some contexts, so the alternative is preserved in a footnote rather than erased.
  doctrine_reference: Preserve theological tension rather than resolve it.
