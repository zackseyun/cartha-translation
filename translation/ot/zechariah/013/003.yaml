theological_decisions:
- issue: Severity of parental action toward a false prophet
  chosen_reading: Retain the text's stark statement that his own parents will execute judgment on him for speaking lies in the name of the LORD.
  alternative_readings:
  - Soften to social rejection or disowning
  - Render the action less directly as wounding rather than killing
  rationale: The Hebrew explicitly states both the death sentence ('You shall not live') and the violent act ('they will pierce him through'). The translation should preserve the prophetic text's severity rather than mitigate it.
  doctrine_reference: Translation philosophy §1, §3
- issue: Rendering of the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
