id: ZEC.13.3
reference: Zechariah 13:3
source:
  edition: WLC
  text: וְ/הָיָ֗ה כִּֽי יִנָּבֵ֣א אִישׁ֮ עוֹד֒ וְ/אָמְר֣וּ אֵ֠לָי/ו אָבִ֨י/ו וְ/אִמּ֤/וֹ יֹֽלְדָי/ו֙ לֹ֣א תִֽחְיֶ֔ה כִּ֛י שֶׁ֥קֶר דִּבַּ֖רְתָּ בְּ/שֵׁ֣ם יְהוָ֑ה וּ/דְקָרֻ֜/הוּ אָבִ֧י/הוּ וְ/אִמּ֛/וֹ יֹלְדָ֖י/ו בְּ/הִנָּבְאֽ/וֹ־׃
translation:
  text: And it will happen that if a man still prophesies, his father and his mother who bore him will say to him, ‘You shall not live, because you have spoken lies in the name of Yahweh’; and his father and his mother who bore him will pierce him through when he prophesies.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'when a man again prophesies.' The Hebrew עוֹד can indicate continued or renewed action.
    reason: lexical_alternative
  - marker: b
    text: Or 'will stab him' or 'will thrust him through.' The Hebrew verb denotes piercing with a weapon.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  chosen: And it will happen
  alternatives:
  - And it shall come to pass
  - And it will be
  lexicon: HALOT
  rationale: Introduces a future circumstance with narrative force. 'And it will happen' preserves the idiomatic Hebrew without archaic English.
- source_word: כִּי
  chosen: that if
  alternatives:
  - when
  - that when
  lexicon: HALOT
  rationale: Here כִּי introduces the circumstance that follows; combined with the imperfect verb it is best represented as a conditional/contingent 'if' rather than a simple causal 'because'.
- source_word: יִנָּבֵא
  chosen: prophesies
  alternatives:
  - acts as a prophet
  - speaks prophetically
  lexicon: HALOT
  rationale: Standard rendering of נבא in the Niphal. The context is specifically false prophetic activity, but the falsity is made explicit later rather than imported into the verb itself.
- source_word: אִישׁ
  chosen: a man
  alternatives:
  - someone
  - a person
  lexicon: HALOT
  rationale: Gender-accurate rendering per translation philosophy. The Hebrew is singular masculine and generic/representative; 'a man' preserves the form and sense.
- source_word: עוֹד
  chosen: still
  alternatives:
  - again
  - any longer
  lexicon: HALOT
  rationale: 'Marks continuation despite the purging context of the passage: if anyone still continues to prophesy.'
- source_word: יֹלְדָיו
  chosen: who bore him
  alternatives:
  - his begetters
  - his parents
  lexicon: HALOT
  rationale: The participial form literally identifies the parents as those who gave him birth. 'Who bore him' is natural English and preserves the concrete familial relation better than simply 'parents'.
- source_word: לֹא תִחְיֶה
  chosen: You shall not live
  alternatives:
  - You must not live
  - You will not live
  lexicon: HALOT
  rationale: A judicial/declarative statement of sentence. 'You shall not live' preserves the gravity and legal tone.
- source_word: שֶׁקֶר דִּבַּרְתָּ
  chosen: you have spoken lies
  alternatives:
  - you have spoken falsely
  - you have spoken a lie
  lexicon: HALOT
  rationale: Plural 'lies' is idiomatic English for false speech and fits the accusation of false prophecy.
- source_word: בְּשֵׁם יְהוָה
  chosen: in the name of the LORD
  alternatives:
  - in the name of Yahweh
  lexicon: HALOT
  rationale: Follows the project's default rendering of יְהוָה as 'the LORD.' 'In the name of' preserves the covenantal/representative force.
- source_word: וּדְקָרֻהוּ
  chosen: will pierce him through
  alternatives:
  - will stab him
  - will thrust him through
  lexicon: HALOT
  rationale: דקר denotes piercing with a weapon. 'Pierce him through' is vivid, natural, and preserves the severity of the act.
- source_word: בְּהִנָּבְאוֹ
  chosen: when he prophesies
  alternatives:
  - as he prophesies
  - in his prophesying
  lexicon: HALOT
  rationale: 'Temporal sense of the infinitive construct with preposition: the action occurs in connection with his prophesying. ''When he prophesies'' is the clearest English rendering.'
