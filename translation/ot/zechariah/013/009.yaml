id: ZEC.13.9
reference: Zechariah 13:9
source:
  edition: WLC
  text: וְ/הֵבֵאתִ֤י אֶת הַ/שְּׁלִשִׁית֙ בָּ/אֵ֔שׁ וּ/צְרַפְתִּי/ם֙ כִּ/צְרֹ֣ף אֶת הַ/כֶּ֔סֶף וּ/בְחַנְתִּ֖י/ם כִּ/בְחֹ֣ן אֶת הַ/זָּהָ֑ב ה֣וּא יִקְרָ֣א בִ/שְׁמִ֗/י וַֽ/אֲנִי֙ אֶעֱנֶ֣ה אֹת֔/וֹ אָמַ֨רְתִּי֙ עַמִּ֣/י ה֔וּא וְ/ה֥וּא יֹאמַ֖ר יְהוָ֥ה אֱלֹהָֽ/י־־־׀׃ס
translation:
  text: And I will bring the third part through the fire, and I will refine them as silver is refined, and test them as gold is tested. He will call on my name, and I will answer him. I will say, ‘He is my people,’ and he will say, ‘Yahweh is my God.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more smoothly in English, 'They are my people,' since the singular pronouns here represent the remnant collectively.
    reason: alternative_reading
lexical_decisions:
- source_word: הַשְּׁלִשִׁית
  chosen: the third part
  alternatives:
  - the third
  - the third portion
  lexicon: HALOT
  rationale: The feminine ordinal with article refers back to the surviving third from the previous verse. 'The third part' makes the partitive sense explicit in natural English while staying close to the Hebrew.
- source_word: בָּאֵשׁ
  chosen: through the fire
  alternatives:
  - into the fire
  - in the fire
  lexicon: HALOT
  rationale: With הֵבֵאתִי, the phrase conveys bringing the remnant into and through a refining ordeal. 'Through the fire' best captures the metaphorical process rather than mere location.
- source_word: וּצְרַפְתִּים
  chosen: I will refine them
  alternatives:
  - I will smelt them
  - I will purge them
  lexicon: HALOT
  rationale: צרף is the standard verb for refining metals. 'Refine' is the clearest modern English equivalent and fits the explicit silver comparison.
- source_word: כִּצְרֹף אֶת־הַכֶּסֶף
  chosen: as silver is refined
  alternatives:
  - as one refines silver
  - like the refining of silver
  lexicon: HALOT
  rationale: The infinitive construct after כ expresses comparison. The passive English idiom reads naturally while preserving the metallurgical image.
- source_word: וּבְחַנְתִּים
  chosen: and test them
  alternatives:
  - and examine them
  - and prove them
  lexicon: HALOT
  rationale: בחן denotes testing/proving, especially of genuineness. 'Test' is accessible and pairs well with the gold metaphor.
- source_word: כִּבְחֹן אֶת־הַזָּהָב
  chosen: as gold is tested
  alternatives:
  - as one tests gold
  - like the testing of gold
  lexicon: HALOT
  rationale: Parallel to the previous clause; 'tested' preserves the metaphor of assaying precious metal.
- source_word: הוּא יִקְרָא בִשְׁמִי
  chosen: He will call on my name
  alternatives:
  - He will call in my name
  - He will invoke my name
  lexicon: HALOT
  rationale: קרא בשם commonly means to call upon or invoke someone's name in prayer or worship. 'Call on my name' is idiomatic and theologically transparent.
- source_word: וַאֲנִי אֶעֱנֶה אֹתוֹ
  chosen: and I will answer him
  alternatives:
  - and I will answer it
  - and I will respond to him
  lexicon: HALOT
  rationale: The singular pronouns follow the collective remnant as a representative singular. 'Him' matches the Hebrew grammar; the representative force is retained rather than neutralized.
- source_word: עַמִּי הוּא
  chosen: He is my people
  alternatives:
  - It is my people
  - They are my people
  lexicon: HALOT
  rationale: Hebrew uses a singular pronoun with the collective noun 'my people.' A very literal rendering preserves the grammar and the reciprocal covenant formula in this verse, though English may find it slightly marked.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - the Lord
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֱלֹהָי
  chosen: my God
  lexicon: HALOT
  rationale: Straightforward possessive form in the covenant response formula; 'my God' preserves the personal confession.
