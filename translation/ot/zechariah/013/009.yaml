theological_decisions:
- issue: Covenant-formula pronouns in the final two clauses
  chosen_reading: 'Retain the Hebrew representative singular: ''He is my people'' ... ''The LORD is my God.'''
  alternative_readings:
  - '''They are my people'' ... ''The LORD is our God'''
  - '''This is my people'' ... ''The LORD is my God'''
  rationale: The verse shifts from plural ('them') to singular ('he/him'), a common way of speaking of a collective remnant as a representative individual. Preserving that tension is preferable to smoothing it out, in keeping with the translation philosophy of not resolving textual features that carry interpretive weight.
  doctrine_reference: Translation philosophy §3; §4
- issue: Rendering of the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'Contested terms: יְהוָה YHWH'
