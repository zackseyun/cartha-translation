theological_decisions:
- issue: Scope of הָאָרֶץ
  chosen_reading: the land
  alternative_readings:
  - the earth
  rationale: The verse likely speaks of judgment within the covenant land in the immediate prophetic context. Rendering 'land' avoids universalizing the statement beyond what the Hebrew plainly requires.
  doctrine_reference: Translation philosophy §1, Original-language primacy over translation tradition
- issue: Rendering the quantitative idiom פִּי שְׁנַיִם
  chosen_reading: two-thirds ... one-third
  alternative_readings:
  - two parts ... the third
  - a double portion ... the third
  rationale: The Hebrew idiom is not naturally transparent in English. The explicit fractional rendering best communicates the sense while preserving the contrast intended by the text.
  doctrine_reference: 'Translation philosophy: optimal equivalence'
