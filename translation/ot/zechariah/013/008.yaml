id: ZEC.13.8
reference: Zechariah 13:8
source:
  edition: WLC
  text: וְ/הָיָ֤ה בְ/כָל הָ/אָ֨רֶץ֙ נְאֻם יְהוָ֔ה פִּֽי שְׁנַ֣יִם בָּ֔/הּ יִכָּרְת֖וּ יִגְוָ֑עוּ וְ/הַ/שְּׁלִשִׁ֖ית יִוָּ֥תֶר בָּֽ/הּ־־־׃
translation:
  text: And it will happen in all the land, declares Yahweh, that two-thirds in it will be cut off and perish, but one-third will be left in it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the whole earth.' The Hebrew אֶרֶץ can mean 'land' or 'earth'; here 'land' best fits the immediate context.
    reason: alternative_reading
  - marker: b
    text: Literally 'a mouth of two'—an idiom here meaning 'two portions,' contrasted with 'the third'; hence 'two-thirds.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  chosen: And it will happen
  alternatives:
  - And it shall come to pass
  - And it will be
  lexicon: HALOT
  rationale: Introduces a future event formula. 'It will happen' preserves the prophetic announcement without archaic English.
- source_word: בְּכָל הָאָרֶץ
  chosen: in all the land
  alternatives:
  - in the whole land
  - in all the earth
  lexicon: HALOT
  rationale: אָרֶץ can mean 'land' or 'earth.' In Zechariah's immediate context, the reference is most naturally to the land under discussion, not the entire globe. 'All the land' preserves the scope while avoiding overextension.
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: Standard prophetic formula. 'Declares the LORD' is idiomatic modern English and preserves the solemnity. Per doctrine, יְהוָה is rendered 'the LORD'.
- source_word: פִּי שְׁנַיִם
  chosen: two-thirds
  alternatives:
  - two parts
  - a double portion
  lexicon: HALOT
  rationale: The idiom literally means 'mouth of two,' used quantitatively for two portions out of three in contrast with 'the third.' 'Two-thirds' makes the sense explicit in English.
- source_word: יִכָּרְתוּ
  chosen: will be cut off
  alternatives:
  - will be destroyed
  - will be cut down
  lexicon: HALOT
  rationale: Niphal of כרת commonly means 'be cut off.' This preserves the covenantal/judicial resonance without overinterpreting the exact mode of removal.
- source_word: יִגְוָעוּ
  chosen: and die
  alternatives:
  - and perish
  - and expire
  lexicon: HALOT
  rationale: גוע denotes dying/perishing. 'Die' is the clearest natural English equivalent and keeps the sequence with 'be cut off' distinct rather than collapsing the verbs into one idea.
- source_word: וְהַשְּׁלִשִׁית
  chosen: but one-third
  alternatives:
  - and the third part
  - and the third
  lexicon: HALOT
  rationale: In contrast to 'two-thirds,' rendering as 'one-third' communicates the proportional sense clearly in contemporary English. 'But' brings out the adversative contrast implied by the clause structure.
- source_word: יִוָּתֶר
  chosen: will be left
  alternatives:
  - will remain
  - will be spared
  lexicon: HALOT
  rationale: Niphal of יתר means 'be left over, remain.' 'Will be left' matches the passive form and avoids importing the stronger interpretive nuance 'spared,' though that is contextually related.
