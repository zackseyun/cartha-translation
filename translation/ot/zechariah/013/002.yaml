id: ZEC.13.2
reference: Zechariah 13:2
source:
  edition: WLC
  text: וְ/הָיָה֩ בַ/יּ֨וֹם הַ/ה֜וּא נְאֻ֣ם יְהוָ֣ה צְבָא֗וֹת אַכְרִ֞ית אֶת שְׁמ֤וֹת הָֽ/עֲצַבִּים֙ מִן הָ/אָ֔רֶץ וְ/לֹ֥א יִזָּכְר֖וּ ע֑וֹד וְ/גַ֧ם אֶת הַ/נְּבִיאִ֛ים וְ/אֶת ר֥וּחַ הַ/טֻּמְאָ֖ה אַעֲבִ֥יר מִן הָ/אָֽרֶץ׀־־־־־׃
translation:
  text: And it shall happen in that day, declares Yahweh of hosts, that I will cut off the names of the idols from the land, and they shall be remembered no more. And I will also remove from the land the prophets and the unclean spirit.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the spirit of uncleanness.'
    reason: lexical_alternative
  - marker: b
    text: '''The prophets'' here refers contextually to illegitimate prophets associated with idolatry and uncleanness.'
    reason: cultural_note
lexical_decisions:
- source_word: וְהָיָה
  chosen: And it shall happen
  alternatives:
  - And it will be
  - And it shall come to pass
  lexicon: HALOT
  rationale: Introduces a future event formula. 'It shall happen' preserves the prophetic idiom in readable modern English without the archaic feel of 'come to pass.'
- source_word: בַיּוֹם הַהוּא
  chosen: in that day
  alternatives:
  - on that day
  lexicon: HALOT
  rationale: Standard prophetic temporal formula. 'In that day' is idiomatic and preserves the eschatological-prophetic resonance.
- source_word: נְאֻם יְהוָה צְבָאוֹת
  chosen: declares the LORD of hosts
  alternatives:
  - oracle of the LORD of hosts
  - says the LORD of hosts
  lexicon: HALOT
  rationale: '''Declares'' is a natural rendering of נְאֻם in prophetic speech. YHWH is rendered ''the LORD'' per doctrine; צְבָאוֹת is translated ''of hosts'' rather than transliterated.'
- source_word: אַכְרִית
  chosen: I will cut off
  alternatives:
  - I will wipe out
  - I will destroy
  lexicon: HALOT
  rationale: Hiphil of כרת here conveys decisive removal/extermination. 'Cut off' preserves the force and common covenantal-prophetic diction better than the more interpretive 'wipe out.'
- source_word: שְׁמוֹת הָעֲצַבִּים
  chosen: the names of the idols
  alternatives:
  - the names of the images
  - the names of the fetishes
  lexicon: HALOT
  rationale: עֲצַבִּים refers to idols. Including 'names' reflects the Hebrew explicitly and suggests eradication of both cult and memory, not merely physical objects.
- source_word: מִן הָאָרֶץ
  chosen: from the land
  alternatives:
  - from the earth
  lexicon: HALOT
  rationale: In Zechariah, הָאָרֶץ can mean 'land' in a concrete territorial sense. Here the context of purging idolatry and false prophecy from the covenant community favors 'land.'
- source_word: וְלֹא יִזָּכְרוּ עוֹד
  chosen: and they shall be remembered no more
  alternatives:
  - and they shall no longer be remembered
  - and no one will remember them anymore
  lexicon: HALOT
  rationale: The Niphal is naturally passive/reflexive in sense. 'They shall be remembered no more' preserves the Hebrew's impersonal passive and the solemn cadence.
- source_word: וְגַם
  chosen: And also
  alternatives:
  - Also
  - Moreover
  lexicon: HALOT
  rationale: Marks an additional act of purgation. 'And also' keeps the additive force while linking smoothly with the prior clause.
- source_word: הַנְּבִיאִים
  chosen: the prophets
  alternatives:
  - the false prophets
  lexicon: HALOT
  rationale: The Hebrew says 'the prophets' without the adjective 'false.' In context these are illegitimate prophets, but the translation should not add what is not explicit; the context supplies the negative sense.
- source_word: רוּחַ הַטֻּמְאָה
  chosen: the unclean spirit
  alternatives:
  - the spirit of uncleanness
  - the impure spirit
  lexicon: HALOT
  rationale: Construct phrase meaning a spirit characterized by impurity/uncleanness. 'The unclean spirit' is idiomatic English and preserves the personal/spiritual sense better than the more abstract 'spirit of uncleanness.'
- source_word: אַעֲבִיר
  chosen: I will remove
  alternatives:
  - I will cause to pass away
  - I will drive away
  lexicon: HALOT
  rationale: Hiphil of עבר here means to cause to pass away/remove. 'Remove' is clear, natural, and fits the parallel with cutting off idols.
