theological_decisions:
- issue: Whether to specify that 'the prophets' are false prophets
  chosen_reading: Retain the text's wording as 'the prophets' and let the context indicate they are illegitimate prophets associated with uncleanness.
  alternative_readings:
  - the false prophets
  rationale: The immediate context concerns the removal of idolatry and an unclean spirit, so the referent is clearly deceptive prophecy. However, adding 'false' in the main text imports an adjective not present in the Hebrew. Optimal equivalence here preserves the source wording while allowing context to do the interpretive work.
  doctrine_reference: 'Translation philosophy: Never paraphrase beyond what the source text warrants; preserve theological tension rather than resolve it.'
- issue: Whether רוּחַ הַטֻּמְאָה is an impersonal force or a personal spiritual reality
  chosen_reading: Render as 'the unclean spirit.'
  alternative_readings:
  - the spirit of uncleanness
  rationale: The Hebrew can be read as a spirit characterized by impurity. Given the prophetic context and the idiomatic English availability of 'unclean spirit,' this rendering preserves the likely personal/spiritual force without overexplaining.
  doctrine_reference: 'Translation philosophy: optimal equivalence; do not import doctrinal claims the text does not make.'
