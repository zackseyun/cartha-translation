id: ZEC.7.8
reference: Zechariah 7:8
source:
  edition: WLC
  text: וַֽ/יְהִי֙ דְּבַר יְהוָ֔ה אֶל זְכַרְיָ֖ה לֵ/אמֹֽר־־׃
translation:
  text: And the word of Yahweh came to Zechariah, saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''YHWH''; traditionally rendered ''the LORD.'''
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְהִי
  chosen: came
  alternatives:
  - was
  - happened
  - came to pass
  lexicon: HALOT
  rationale: In the prophetic formula ויהי דבר־יהוה אל..., English idiom is best represented by 'the word of the LORD came...' rather than the more wooden 'and it was.' This preserves the standard sense of the clause without archaic phrasing.
- source_word: דְּבַר
  chosen: the word
  alternatives:
  - message
  - matter
  lexicon: HALOT
  rationale: דבר in the construct phrase דבר יהוה is the standard prophetic expression 'the word of the LORD.' 'Message' is possible but less formally tied to the recurring formula.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֶל
  chosen: to
  alternatives:
  - unto
  lexicon: HALOT
  rationale: The preposition simply marks direction toward the recipient of revelation; 'to' is the natural modern English equivalent.
- source_word: זְכַרְיָה
  chosen: Zechariah
  lexicon: HALOT
  rationale: Personal names are transliterated by standard English convention.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - 'thus:'
  - 'as follows:'
  lexicon: HALOT
  rationale: לֵאמֹר regularly introduces direct speech. 'Saying' preserves the formal transition and leaves the sentence open naturally into the following verse.
