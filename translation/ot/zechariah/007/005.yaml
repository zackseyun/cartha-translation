theological_decisions:
- issue: Nature of the rhetorical question about fasting
  chosen_reading: The verse challenges the sincerity and God-directedness of the people's
    ritual fasting rather than denying that the fast occurred.
  alternative_readings:
  - The verse could be taken as a total rejection of the fasts as invalid.
  rationale: The emphatic construction asks whether the fasting was truly done for
    God. The translation preserves the rhetorical force without importing a broader
    doctrinal judgment beyond the verse itself.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
