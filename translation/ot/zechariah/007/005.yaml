id: ZEC.7.5
reference: Zechariah 7:5
source:
  edition: WLC
  text: אֱמֹר֙ אֶל כָּל עַ֣ם הָ/אָ֔רֶץ וְ/אֶל הַ/כֹּהֲנִ֖ים לֵ/אמֹ֑ר כִּֽי צַמְתֶּ֨ם
    וְ/סָפ֜וֹד בַּ/חֲמִישִׁ֣י וּ/בַ/שְּׁבִיעִ֗י וְ/זֶה֙ שִׁבְעִ֣ים שָׁנָ֔ה הֲ/צ֥וֹם
    צַמְתֻּ֖/נִי אָֽנִי־־־־׃
translation:
  text: 'Speak to all the people of the land and to the priests, saying: When you
    fasted and mourned in the fifth month and in the seventh, for these seventy years,
    was it really for me that you fasted?'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'was it for me—really for me—that you fasted?' The Hebrew uses an emphatic
      construction and ends with an independent 'I/me' for added stress.
    reason: lexical_alternative
lexical_decisions:
- source_word: עַם הָאָרֶץ
  chosen: the people of the land
  alternatives:
  - all the people of the land
  - the people of the הארץ / land
  - the common people of the land
  lexicon: HALOT
  rationale: The phrase literally means 'people of the land.' In this context it refers
    broadly to the inhabitants of the land, not merely a social class. The English
    text keeps 'people of the land' to preserve the Hebrew expression while remaining
    natural.
- source_word: הַכֹּהֲנִים
  chosen: the priests
  lexicon: HALOT
  rationale: Standard rendering of כֹּהֵן. No contextual reason to vary.
- source_word: צַמְתֶּם
  chosen: you fasted
  lexicon: HALOT
  rationale: Direct rendering of the Qal perfect 2mp of צום, referring to the people's
    fasting practice.
- source_word: וְסָפוֹד
  chosen: and mourned
  alternatives:
  - and lamented
  - and wailed
  lexicon: HALOT
  rationale: The verb ספד denotes lamenting or mourning, often with ritual grief.
    'Mourned' is idiomatic and fits the paired fasting context without overstating
    the form of lament.
- source_word: בַּחֲמִישִׁי וּבַשְּׁבִיעִי
  chosen: in the fifth month and in the seventh
  alternatives:
  - in the fifth and in the seventh month
  lexicon: HALOT
  rationale: The Hebrew uses ordinal numbers with the preposition 'in/on.' Supplying
    'month' after the first and leaving it implied after the second is possible, but
    repeating the structure in English clarifies the calendrical reference. 'Month'
    is supplied in the translation for natural sense.
- source_word: וְזֶה שִׁבְעִים שָׁנָה
  chosen: for these seventy years
  alternatives:
  - and this for seventy years
  - for seventy years now
  lexicon: HALOT
  rationale: This idiom points to the duration up to the present situation. 'For these
    seventy years' captures the demonstrative force of וְזֶה and is idiomatic in English.
- source_word: הֲצוֹם צַמְתֻּנִי
  chosen: was it really for me that you fasted
  alternatives:
  - did you actually fast for me
  - was it for me you fasted
  lexicon: HALOT
  rationale: The infinitive absolute plus finite verb intensifies the verbal idea.
    Rather than a wooden 'fasting, did you fast to me,' the translation conveys the
    emphatic rhetorical force with 'was it really for me that you fasted.' The dative
    suffix on צַמְתֻּנִי is represented by 'for me.'
- source_word: אָֽנִי
  chosen: for me
  alternatives:
  - me, even me
  lexicon: HALOT
  rationale: The independent pronoun at the end adds emphasis. English can reflect
    this by stressing 'for me' in the rhetorical question; adding 'really' helps convey
    the emphatic challenge without awkward repetition.
- source_word: אֱמֹר ... לֵאמֹר
  chosen: Speak ... saying
  alternatives:
  - Say ... saying
  - Speak ... and say
  lexicon: HALOT
  rationale: The repetition of אמר is a common Hebrew speech-introduction formula.
    'Speak ... saying' preserves the formal structure while remaining acceptable English
    in prophetic discourse.
