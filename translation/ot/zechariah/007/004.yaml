- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse contains the covenant name in the prophetic title יְהוָה צְבָאוֹת.
    Following the project's stated default for contested terms, it is rendered 'the
    LORD' rather than transliterated forms.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
