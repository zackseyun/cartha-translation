id: ZEC.7.4
reference: Zechariah 7:4
source:
  edition: WLC
  text: וַ/יְהִ֛י דְּבַר יְהוָ֥ה צְבָא֖וֹת אֵלַ֥/י לֵ/אמֹֽר־׃
translation:
  text: Then the word of the LORD of hosts came to me, saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''YHWH of hosts''; alternatively, ''Yahweh of hosts.'''
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְהִי
  chosen: Then ... came
  alternatives:
  - And it happened
  - And it came to pass
  lexicon: HALOT
  rationale: The wayyiqtol of היה here functions as standard narrative/sequential
    introduction. In English, 'Then ... came' preserves the sequence and idiomatic
    sense without the archaic 'it came to pass.'
- source_word: דְּבַר
  chosen: the word
  alternatives:
  - a word
  - message
  lexicon: HALOT
  rationale: In prophetic formulae, דְּבַר regularly denotes a divine communication.
    'The word' preserves the established prophetic idiom more closely than the more
    interpretive 'message.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the divine name יְהוָה is rendered 'the LORD'
    to reflect Jewish reverence tradition and the longstanding convention also reflected
    in the Septuagintal pattern.
- source_word: צְבָאוֹת
  chosen: of hosts
  alternatives:
  - of armies
  lexicon: HALOT
  rationale: In the title יְהוָה צְבָאוֹת, 'of hosts' is the conventional and sufficiently
    transparent rendering, preserving the breadth of heavenly/earthly armies better
    than the narrower 'of armies.'
- source_word: אֵלַי
  chosen: to me
  alternatives:
  - unto me
  lexicon: HALOT
  rationale: Simple prepositional phrase indicating the recipient of the prophetic
    word; 'to me' is clear modern English.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - 'thus:'
  - 'with these words:'
  lexicon: HALOT
  rationale: The infinitive construct introduces direct speech in standard Hebrew
    fashion. 'Saying' is the most natural and formally transparent English equivalent,
    especially since the content follows in the next verse.
