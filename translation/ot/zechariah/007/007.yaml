id: ZEC.7.7
reference: Zechariah 7:7
source:
  edition: WLC
  text: הֲ/ל֣וֹא אֶת הַ/דְּבָרִ֗ים אֲשֶׁ֨ר קָרָ֤א יְהוָה֙ בְּ/יַד֙ הַ/נְּבִיאִ֣ים הָ/רִֽאשֹׁנִ֔ים בִּ/הְי֤וֹת יְרוּשָׁלִַ֨ם֙ יֹשֶׁ֣בֶת וּ/שְׁלֵוָ֔ה וְ/עָרֶ֖י/הָ סְבִיבֹתֶ֑י/הָ וְ/הַ/נֶּ֥גֶב וְ/הַ/שְּׁפֵלָ֖ה יֹשֵֽׁב־׃פ
translation:
  text: Are these not the words that Yahweh proclaimed by the former prophets, when Jerusalem was inhabited and at ease, with her surrounding cities, and the Negev and the Shephelah were inhabited?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'through the former prophets.' The Hebrew idiom is literally 'by the hand of the former prophets.'
    reason: lexical_alternative
  - marker: b
    text: Or 'secure' for 'at ease.' The Hebrew term can include the sense of quiet security or undisturbed prosperity.
    reason: lexical_alternative
  - marker: c
    text: '''The Shephelah'' refers to the western lowland/foothill region of Judah.'
    reason: cultural_note
lexical_decisions:
- source_word: הֲלֹא
  chosen: Are ... not
  alternatives:
  - Is it not
  - Were ... not
  lexicon: HALOT
  rationale: Introduces a rhetorical question expecting an affirmative answer. English idiom is best captured with 'Are these not ...' in light of the verbless opening construction with the object fronted.
- source_word: אֶת הַדְּבָרִים
  chosen: these ... words
  alternatives:
  - the words
  - these things
  lexicon: HALOT
  rationale: The direct-object marker with 'the words' points to a definite, previously known message; 'these ... words' makes the deictic force natural in English within the rhetorical question.
- source_word: קָרָא
  chosen: proclaimed
  alternatives:
  - called out
  - announced
  - cried out
  lexicon: HALOT
  rationale: For YHWH speaking through prophets, 'proclaimed' conveys public authoritative utterance better than the more wooden 'called' or overly vivid 'cried out'.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving reverential convention and consistency with the doctrine guidelines.
- source_word: בְּיַד הַנְּבִיאִים הָרִאשֹׁנִים
  chosen: by the former prophets
  alternatives:
  - through the former prophets
  - by the earlier prophets
  lexicon: HALOT
  rationale: The idiom 'by the hand of' means agency/instrumentality. 'By the former prophets' is concise and natural; the instrumental sense is preserved. 'Former' here means earlier prophets, not necessarily the biblical division 'Former Prophets'.
- source_word: בִּהְיוֹת
  chosen: when
  alternatives:
  - while
  - in the time of
  lexicon: HALOT
  rationale: The infinitive construct of היה with prefixed ב marks temporal circumstance. 'When' gives clear English temporal sense.
- source_word: יְרוּשָׁלִַם יֹשֶׁבֶת
  chosen: Jerusalem was inhabited
  alternatives:
  - Jerusalem sat inhabited
  - Jerusalem dwelt
  lexicon: HALOT
  rationale: The participle of ישׁב applied to a city denotes being inhabited/settled. 'Was inhabited' is idiomatic and fits the city's condition.
- source_word: וּשְׁלֵוָה
  chosen: and at ease
  alternatives:
  - and secure
  - and prosperous
  - and tranquil
  lexicon: HALOT
  rationale: The adjective conveys quiet ease, security, and undisturbed prosperity. 'At ease' preserves the complacent-restful nuance without overcommitting to economic prosperity alone.
- source_word: וְעָרֶיהָ סְבִיבֹתֶיהָ
  chosen: with her surrounding cities
  alternatives:
  - and her cities around her
  - and the cities around her
  lexicon: HALOT
  rationale: This phrase refers to the towns around Jerusalem. 'With her surrounding cities' reads naturally in English while preserving the possessive relation.
- source_word: וְהַנֶּגֶב
  chosen: the Negev
  alternatives:
  - the Southland
  - the south
  lexicon: HALOT
  rationale: Here the term likely functions as the geographic region south of Judah rather than a mere compass direction. 'Negev' preserves the place-name value.
- source_word: וְהַשְּׁפֵלָה
  chosen: the Shephelah
  alternatives:
  - the lowland
  - the foothills
  lexicon: HALOT
  rationale: This is a recognized geographic region of Judah's western lowlands. 'Shephelah' preserves the regional designation more precisely than the generic 'lowland.'
- source_word: יֹשֵׁב
  chosen: inhabited
  alternatives:
  - settled
  - occupied
  lexicon: HALOT
  rationale: The singular participle functions collectively for the regions named. 'Inhabited' matches the earlier use with Jerusalem and keeps the focus on settled population rather than military occupation.
