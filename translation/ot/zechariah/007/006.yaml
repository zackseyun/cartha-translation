id: ZEC.7.6
reference: Zechariah 7:6
source:
  edition: WLC
  text: וְ/כִ֥י תֹאכְל֖וּ וְ/כִ֣י תִשְׁתּ֑וּ הֲ/ל֤וֹא אַתֶּם֙ הָ/אֹ֣כְלִ֔ים וְ/אַתֶּ֖ם
    הַ/שֹּׁתִֽים׃
translation:
  text: And when you eat and when you drink, is it not you who are eating, and you
    who are drinking?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'And if you eat and if you drink.' The Hebrew conjunction can be rendered
      temporally ('when') or conditionally ('if'); here 'when' best fits the flow
      of the argument.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכִי
  chosen: And when
  alternatives:
  - And if
  - For when
  lexicon: HALOT
  rationale: The conjunction כִּי here introduces a temporal circumstance parallel
    to the previous verse's fasting language, not a strong causal clause. Rendering
    וְכִי as 'And when' preserves the rhetorical sequence and reads naturally in English.
- source_word: תֹאכְלוּ
  chosen: you eat
  alternatives:
  - you are eating
  - you do eat
  lexicon: HALOT
  rationale: Qal imperfect 2mp of אכל in a general/habitual sense. Simple present
    in English best fits the rhetorical question about their practice.
- source_word: וְכִי
  chosen: and when
  alternatives:
  - and if
  - and when indeed
  lexicon: HALOT
  rationale: Repeated temporal conjunction matching the first clause; consistency
    preserves the Hebrew parallelism.
- source_word: תִשְׁתּוּ
  chosen: you drink
  alternatives:
  - you are drinking
  - you do drink
  lexicon: HALOT
  rationale: Qal imperfect 2mp of שתה, again expressing general practice. Simple present
    is the most natural equivalent.
- source_word: הֲלוֹא
  chosen: is it not
  alternatives:
  - surely
  - isn't it
  lexicon: HALOT
  rationale: Introduces a rhetorical question expecting agreement. 'Is it not' preserves
    the formal force better than the more colloquial 'isn't it'.
- source_word: אַתֶּם
  chosen: you
  alternatives:
  - you yourselves
  lexicon: HALOT
  rationale: Independent pronoun adds emphasis. English can preserve this emphasis
    by explicit repetition in the clause rather than by an awkward reflexive form.
- source_word: הָאֹכְלִים
  chosen: who are eating
  alternatives:
  - the ones eating
  - who eat
  lexicon: HALOT
  rationale: 'Article + participle functions substantivally: ''the ones who are eating.''
    In English, ''who are eating'' after the pronoun preserves the emphatic construction
    and rhetorical force.'
- source_word: וְאַתֶּם
  chosen: and you
  alternatives:
  - and you yourselves
  lexicon: HALOT
  rationale: The conjunction plus independent pronoun marks the second emphatic member
    of the parallelism. 'And you' keeps the structure clear.
- source_word: הַשֹּׁתִים
  chosen: who are drinking
  alternatives:
  - the ones drinking
  - who drink
  lexicon: HALOT
  rationale: Article + participle parallel to הָאֹכְלִים. 'Who are drinking' preserves
    the substantival participle and the verse's balanced rhetoric.
