theological_decisions:
- issue: Rhetorical force of the verse in context
  chosen_reading: The verse exposes the self-directed nature of the people's eating
    and drinking, paralleling the previous verse's critique of self-directed fasting.
  alternative_readings:
  - A more neutral observation about ordinary eating and drinking
  rationale: The emphatic pronouns and participles ('you ... you') indicate that the
    point is not merely that they ate and drank, but that these acts were centered
    on themselves rather than on the LORD. This is contextual rather than doctrinal,
    so the translation preserves the rhetoric without over-interpreting it.
  doctrine_reference: Translation philosophy §1, §3
