id: ZEC.7.13
reference: Zechariah 7:13
source:
  edition: WLC
  text: וַ/יְהִ֥י כַ/אֲשֶׁר קָרָ֖א וְ/לֹ֣א שָׁמֵ֑עוּ כֵּ֤ן יִקְרְאוּ֙ וְ/לֹ֣א אֶשְׁמָ֔ע
    אָמַ֖ר יְהוָ֥ה צְבָאֽוֹת־׃
translation:
  text: And just as he called and they would not listen, so they will call and I will
    not listen, says the LORD of Armies.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, traditionally, 'the LORD of hosts.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי כַאֲשֶׁר
  chosen: And just as
  alternatives:
  - And it happened that when
  - And as
  lexicon: HALOT
  rationale: The Hebrew sequence introduces the comparison/result construction. A
    more literal 'and it happened that when' is possible, but in English it is stylistically
    heavy and adds no meaning here. 'And just as' preserves the comparative force
    leading into כֵּן.
- source_word: קָרָא
  chosen: he called
  alternatives:
  - he proclaimed
  - he cried out
  lexicon: HALOT
  rationale: The verb קרא commonly means 'call' or 'cry out.' In this context it refers
    to YHWH's prior summons/warning to the people. 'Called' is broad and natural,
    preserving the verbal parallel with יִקְרְאוּ later in the verse.
- source_word: וְלֹא שָׁמֵעוּ
  chosen: they would not listen
  alternatives:
  - they did not hear
  - they would not hear
  lexicon: HALOT
  rationale: שׁמע can mean hear/listen/obey depending on context. Here the issue is
    refusal to heed God's call, so 'listen' best captures volitional nonresponse.
    'Would not listen' brings out the stubbornness implied by the context better than
    a bare 'did not hear.'
- source_word: כֵּן
  chosen: so
  alternatives:
  - thus
  - in the same way
  lexicon: HALOT
  rationale: 'כֵּן marks the corresponding result in the comparison: as they refused,
    so God will refuse. ''So'' is concise and idiomatic.'
- source_word: יִקְרְאוּ
  chosen: they will call
  alternatives:
  - they will cry out
  - they will call out
  lexicon: HALOT
  rationale: Using 'call' maintains the deliberate lexical parallel with earlier קָרָא.
    'Cry out' is possible, but the symmetry of call/listen is central to the verse's
    rhetoric.
- source_word: וְלֹא אֶשְׁמָע
  chosen: and I will not listen
  alternatives:
  - and I will not hear
  - but I will not listen
  lexicon: HALOT
  rationale: Again שׁמע is better rendered 'listen' than merely 'hear' because the
    point is responsive attention, not auditory capacity. This preserves the reciprocal
    justice of the statement.
- source_word: אָמַר
  chosen: says
  alternatives:
  - said
  - declares
  lexicon: HALOT
  rationale: Prophetic speech formulas in English are commonly rendered with the present
    'says' to mark the utterance as an authoritative declaration. 'Declares' is also
    possible, but 'says' is simpler and sufficiently weighty here.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following Jewish reverence tradition and longstanding English convention.
- source_word: צְבָאוֹת
  chosen: of Armies
  alternatives:
  - of hosts
  - of heavenly armies
  lexicon: HALOT
  rationale: The title denotes YHWH as commander of armies/hosts. 'Of Armies' translates
    the meaning into clear modern English, whereas 'of hosts' is traditional but opaque
    for many readers.
