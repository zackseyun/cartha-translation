id: ZEC.7.10
reference: Zechariah 7:10
source:
  edition: WLC
  text: וְ/אַלְמָנָ֧ה וְ/יָת֛וֹם גֵּ֥ר וְ/עָנִ֖י אַֽל תַּעֲשֹׁ֑קוּ וְ/רָעַת֙ אִ֣ישׁ
    אָחִ֔י/ו אַֽל תַּחְשְׁב֖וּ בִּ/לְבַבְ/כֶֽם־־׃
translation:
  text: Do not oppress the widow, the fatherless, the sojourner, or the poor, and
    do not devise evil in your hearts against one another.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, "each man the evil of his brother" or "a man against his brother."
    reason: lexical_alternative
  - marker: b
    text: '"Fatherless" may also be rendered "orphan."'
    reason: lexical_alternative
  - marker: c
    text: '"Sojourner" refers to a resident foreigner living among Israel.'
    reason: cultural_note
lexical_decisions:
- source_word: אַלְמָנָה
  chosen: widow
  lexicon: HALOT
  rationale: Standard and precise rendering for a bereaved woman; part of a common
    vulnerable-persons list in the Hebrew Bible.
- source_word: יָתוֹם
  chosen: fatherless
  alternatives:
  - orphan
  lexicon: HALOT
  rationale: '"Fatherless" preserves the Hebrew term''s more literal social-legal
    sense in covenantal justice contexts, though "orphan" is a natural English alternative.'
- source_word: גֵּר
  chosen: sojourner
  alternatives:
  - resident foreigner
  - foreigner
  lexicon: HALOT
  rationale: '"Sojourner" best captures the protected non-native resident status of
    גֵּר without reducing it to a mere outsider or modern immigration category.'
- source_word: עָנִי
  chosen: poor
  alternatives:
  - afflicted
  - needy
  lexicon: HALOT
  rationale: In this social-justice list, the economic and vulnerable sense is primary;
    "poor" is the clearest modern equivalent.
- source_word: תַּעֲשֹׁקוּ
  chosen: oppress
  alternatives:
  - defraud
  - exploit
  lexicon: HALOT
  rationale: The verb denotes wrongful oppression or exploitation, especially of the
    vulnerable. "Oppress" is broad enough to include economic and legal abuse.
- source_word: רָעַת
  chosen: evil
  alternatives:
  - harm
  lexicon: HALOT
  rationale: The construct phrase refers to evil intended toward another. "Evil" preserves
    the moral force better than the narrower "harm."
- source_word: תַּחְשְׁבוּ
  chosen: devise
  alternatives:
  - plan
  - think
  lexicon: HALOT
  rationale: In context with "evil" and "in your hearts," the sense is not mere cognition
    but intentional plotting; "devise" conveys deliberateness.
- source_word: אִישׁ אָחִיו
  chosen: one another
  alternatives:
  - each man against his brother
  - a man against his brother
  lexicon: HALOT
  rationale: The Hebrew is literally masculine singular distributive, but here it
    functions reciprocally within the community. "One another" communicates the sense
    in natural English while avoiding an unnecessarily wooden phrasing; the more literal
    form is preserved in a footnote per gender-accurate policy.
- source_word: בִּלְבַבְכֶם
  chosen: in your hearts
  alternatives:
  - in your heart
  lexicon: HALOT
  rationale: Plural addressees govern the plural suffix; "hearts" is idiomatic and
    preserves the inner-intent emphasis of the Hebrew.
