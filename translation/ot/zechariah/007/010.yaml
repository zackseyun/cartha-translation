theological_decisions:
- issue: Gendered distributive expression אִישׁ אָחִיו
  chosen_reading: one another
  alternative_readings:
  - each man against his brother
  - a man against his brother
  rationale: The source uses a grammatically masculine distributive idiom, but the
    intent is reciprocal communal ethics rather than restriction to males. Rendering
    it as "one another" preserves the sense in readable English, while a footnote
    retains the more literal masculine form in keeping with the translation philosophy's
    gender-accurate principle.
  doctrine_reference: DOCTRINE.md § Translation philosophy 4
