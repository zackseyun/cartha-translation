theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project's contested-terms guidance specifies 'the LORD' as the default
    rendering for YHWH, with alternatives preserved only as needed in documentation
    rather than replacing the main text.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Subject identification for בֵּית אֵל
  chosen_reading: Bethel as the sender
  alternative_readings:
  - the house of God sent
  - Beth-el (as a personal or clan designation)
  rationale: The Hebrew most plausibly identifies Bethel, the place/community, as
    the subject of the verb. Rendering it as a toponym avoids importing a theological
    nuance ('house of God') that is not required in this context.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: original-language primacy
    over translation tradition; translate titles, transliterate names'
