id: ZEC.7.2
reference: Zechariah 7:2
source:
  edition: WLC
  text: וַ/יִּשְׁלַח֙ בֵּֽית אֵ֔ל שַׂר אֶ֕צֶר וְ/רֶ֥גֶם מֶ֖לֶךְ וַֽ/אֲנָשָׁ֑י/ו לְ/חַלּ֖וֹת
    אֶת פְּנֵ֥י יְהוָֽה־־־׃
translation:
  text: Now Bethel sent Sharezer and Regem-melech and his men to entreat the favor
    of the LORD,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to seek the favor of the LORD.' The Hebrew idiom literally involves
      'softening/entreating the face' of the LORD.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'Bethel.' Some understand this as 'the house of God,' but here it
      is most likely the place name.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּשְׁלַח
  chosen: sent
  alternatives:
  - had sent
  lexicon: HALOT
  rationale: The waw-consecutive with שׁלח is best rendered as a simple past narrative
    verb, 'sent.' English does not require preserving the Hebrew verbal sequence more
    mechanically.
- source_word: בֵּית אֵל
  chosen: Bethel
  alternatives:
  - the house of God
  - Beth-el
  lexicon: HALOT
  rationale: Here the form functions most naturally as the place name Bethel, not
    the common-noun phrase 'house of God.' This fits the syntax of a sender in the
    singular verb construction and standard English transliteration practice for personal/place
    names.
- source_word: שַׂר אֶצֶר
  chosen: Sharezer
  alternatives:
  - Sar-ezer
  lexicon: HALOT
  rationale: This is a proper personal name and should be transliterated rather than
    translated. 'Sharezer' is a standard English form.
- source_word: וְרֶגֶם מֶלֶךְ
  chosen: and Regem-melech
  alternatives:
  - and Regem-melech
  lexicon: HALOT
  rationale: Also a proper personal name. The hyphenated transliteration preserves
    the compound form and distinguishes it from a title phrase such as 'official of
    the king.'
- source_word: וַאֲנָשָׁיו
  chosen: and his men
  alternatives:
  - and its men
  - and the men with him
  lexicon: HALOT
  rationale: The suffix is 3ms, naturally referring to the immediately preceding named
    individual or representative leader. 'His men' is the most straightforward rendering.
    'Its men' would require taking the antecedent as Bethel, which is possible but
    less natural in the immediate sequence of personal names.
- source_word: לְחַלּוֹת אֶת־פְּנֵי
  chosen: to entreat the favor of
  alternatives:
  - to seek the favor of
  - to appease
  - to implore before
  lexicon: HALOT
  rationale: The idiom חלה את־פני means to seek or entreat favor from someone. 'Entreat
    the favor of' preserves both the supplicatory force and the idiomatic sense without
    sounding wooden.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the covenant name יְהוָה is rendered 'the LORD'
    in the main text, following established reverential convention while preserving
    recognizability.
