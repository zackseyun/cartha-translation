id: ZEC.7.14
reference: Zechariah 7:14
source:
  edition: WLC
  text: וְ/אֵ֣סָעֲרֵ֗/ם עַ֤ל כָּל הַ/גּוֹיִם֙ אֲשֶׁ֣ר לֹֽא יְדָע֔וּ/ם וְ/הָ/אָ֨רֶץ֙
    נָשַׁ֣מָּה אַֽחֲרֵי/הֶ֔ם מֵֽ/עֹבֵ֖ר וּ/מִ/שָּׁ֑ב וַ/יָּשִׂ֥ימוּ אֶֽרֶץ חֶמְדָּ֖ה
    לְ/שַׁמָּֽה־־־׃פ
translation:
  text: And I scattered them with a storm wind among all the nations that they had
    not known, and the land was left desolate behind them, with no one passing through
    or returning; thus they made the pleasant land a desolation.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I whirled them away among all the nations.' The Hebrew verb carries
      storm imagery, not merely ordinary scattering.
    reason: lexical_alternative
  - marker: b
    text: Or 'the desirable land' or 'the delightful land.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאֵסָעֲרֵם
  chosen: I scattered them with a storm wind
  alternatives:
  - I stormed against them
  - I whirled them away
  - I scattered them
  lexicon: HALOT
  rationale: From סער in the piel, the verb evokes storm-driven scattering rather
    than simple dispersal. 'Scattered them with a storm wind' preserves both the causative
    force and the vivid meteorological imagery better than a flat 'scattered them.'
- source_word: עַל כָּל הַגּוֹיִם
  chosen: among all the nations
  alternatives:
  - against all the nations
  - over all the nations
  lexicon: HALOT
  rationale: 'Although עַל often means ''upon/over,'' with a verb of dispersal the
    sense is distributive location: they were driven among the nations. This is the
    most natural English equivalent in context.'
- source_word: אֲשֶׁר לֹא יְדָעוּם
  chosen: that they had not known
  alternatives:
  - whom they did not know
  - which they had not known
  lexicon: HALOT
  rationale: The clause modifies 'the nations' and indicates unfamiliar foreign peoples.
    'That they had not known' is idiomatic and preserves the pluperfect-like sense
    in context.
- source_word: וְהָאָרֶץ נָשַׁמָּה
  chosen: and the land was left desolate
  alternatives:
  - and the land was desolated
  - and the land became desolate
  lexicon: HALOT
  rationale: נשׁם denotes becoming desolate or laid waste. 'Was left desolate' fits
    the aftermath described and reads naturally in English while preserving the passive/resultative
    sense.
- source_word: אַחֲרֵיהֶם
  chosen: behind them
  alternatives:
  - after them
  lexicon: HALOT
  rationale: '''Behind them'' communicates the spatial-resultative sense: after their
    removal, the land lay desolate in their wake.'
- source_word: מֵעֹבֵר וּמִשָּׁב
  chosen: with no one passing through or returning
  alternatives:
  - from passerby and from returner
  - without passage or return
  lexicon: HALOT
  rationale: The paired participles express the absence of human traffic in either
    direction. Supplying 'no one' is required for natural English and reflects the
    privative force of the construction.
- source_word: וַיָּשִׂימוּ
  chosen: thus they made
  alternatives:
  - and they made
  - so they made
  lexicon: HALOT
  rationale: The waw-consecutive advances the result of the prior actions. 'Thus they
    made' captures the consequential force without over-paraphrasing.
- source_word: אֶרֶץ חֶמְדָּה
  chosen: the pleasant land
  alternatives:
  - the desirable land
  - the delightful land
  - the precious land
  lexicon: HALOT
  rationale: חמדה denotes desirability or delightfulness. 'Pleasant land' is concise,
    idiomatic, and preserves the positive valuation of the land without importing
    later technical phrasing.
- source_word: לְשַׁמָּה
  chosen: a desolation
  alternatives:
  - desolate
  - an object of horror
  lexicon: HALOT
  rationale: 'The noun names the resulting state: devastation/desolation. ''A desolation''
    mirrors the Hebrew nominal expression and keeps the rhetorical contrast with ''pleasant
    land.'''
