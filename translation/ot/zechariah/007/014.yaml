theological_decisions:
- issue: Agency in judgment and exile
  chosen_reading: The verse is rendered with God as the explicit first-person agent
    of scattering and the people as responsible for making the land desolate through
    their conduct.
  alternative_readings:
  - A more impersonal rendering that softens divine agency in the exile's scattering
  rationale: The Hebrew first-person verb explicitly attributes the scattering to
    God, while the final plural verb attributes the land's desolation to the people's
    actions. The translation preserves both dimensions of judgment without collapsing
    one into the other.
  doctrine_reference: Translation philosophy §1, §3
