theological_decisions:
- issue: Anthropomorphic idioms of rebellion and deafness
  chosen_reading: Preserve the Hebrew bodily metaphors ('shoulder,' 'ears heavy')
    in readable English rather than flattening them into abstract disobedience.
  alternative_readings:
  - They stubbornly refused to listen
  - They turned away and stopped up their ears
  rationale: The verse emphasizes willful covenant rebellion through concrete bodily
    imagery. Preserving that imagery aligns with optimal equivalence and avoids paraphrasing
    away the rhetorical force.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    theological tension rather than resolve it unnecessarily.'
