id: ZEC.7.11
reference: Zechariah 7:11
source:
  edition: WLC
  text: וַ/יְמָאֲנ֣וּ לְ/הַקְשִׁ֔יב וַ/יִּתְּנ֥וּ כָתֵ֖ף סֹרָ֑רֶת וְ/אָזְנֵי/הֶ֖ם
    הִכְבִּ֥ידוּ מִ/שְּׁמֽוֹעַ׃
translation:
  text: But they refused to pay attention, turned a stubborn shoulder, and made their
    ears heavy so as not to hear.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'gave a stubborn/rebellious shoulder,' an idiom for obstinate
      resistance.
    reason: lexical_alternative
  - marker: b
    text: Or 'made their ears dull' / 'stopped up their ears.' The Hebrew literally
      says 'made their ears heavy.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְמָאֲנוּ
  chosen: they refused
  alternatives:
  - they were unwilling
  - they would not
  lexicon: HALOT
  rationale: The verb מאן denotes refusal or unwillingness. 'They refused' is concise
    and natural in English while preserving the volitional force.
- source_word: לְהַקְשִׁיב
  chosen: to pay attention
  alternatives:
  - to listen
  - to give heed
  lexicon: HALOT
  rationale: קשב in the Hiphil means to attend carefully or pay heed. 'Pay attention'
    captures more than mere auditory reception and fits the context of rejecting prophetic
    instruction.
- source_word: וַיִּתְּנוּ כָתֵף סֹרָרֶת
  chosen: turned a stubborn shoulder
  alternatives:
  - gave a stubborn shoulder
  - turned a rebellious shoulder
  - turned the shoulder away
  lexicon: HALOT
  rationale: This is an idiom for obstinate resistance. A more literal 'gave a stubborn
    shoulder' is awkward in English; 'turned a stubborn shoulder' preserves the bodily
    metaphor and the sense of defiance.
- source_word: סֹרָרֶת
  chosen: stubborn
  alternatives:
  - rebellious
  - stubbornly resisting
  lexicon: HALOT
  rationale: The participial adjective from סרר conveys stubborn or rebellious resistance.
    'Stubborn' is idiomatic and clear in English, while still carrying moral obstinacy.
- source_word: וְאָזְנֵיהֶם הִכְבִּידוּ
  chosen: made their ears heavy
  alternatives:
  - stopped up their ears
  - made their ears dull
  lexicon: HALOT
  rationale: The Hebrew is metaphorical and should be substantially preserved. 'Made
    their ears heavy' reflects the source image of rendering themselves unresponsive,
    while remaining understandable in context.
- source_word: מִשְּׁמוֹעַ
  chosen: so as not to hear
  alternatives:
  - from hearing
  - from listening
  lexicon: HALOT
  rationale: 'The preposition with infinitive here expresses prevention or result:
    they made their ears heavy in order not to hear. ''So as not to hear'' communicates
    the intended refusal more clearly than a wooden ''from hearing''.'
