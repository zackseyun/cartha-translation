id: ZEC.7.1
reference: Zechariah 7:1
source:
  edition: WLC
  text: וַֽ/יְהִי֙ בִּ/שְׁנַ֣ת אַרְבַּ֔ע לְ/דָרְיָ֖וֶשׁ הַ/מֶּ֑לֶךְ הָיָ֨ה דְבַר יְהוָ֜ה אֶל זְכַרְיָ֗ה בְּ/אַרְבָּעָ֛ה לַ/חֹ֥דֶשׁ הַ/תְּשִׁעִ֖י בְּ/כִסְלֵֽו־־׃
translation:
  text: And in the fourth year of King Darius, the word of Yahweh came to Zechariah on the fourth day of the ninth month, in Kislev.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''in Kislev,'' the name of the ninth month in the Hebrew calendar.'
    reason: cultural_note
lexical_decisions:
- source_word: וַיְהִי
  chosen: And ...
  alternatives:
  - Now it happened
  - And it came to pass
  lexicon: HALOT
  rationale: The waw-consecutive of היה introduces a new narrative setting. In modern English, a simple connective 'And' with the temporal clause conveys the discourse function without archaic phrasing like 'it came to pass.'
- source_word: בִּשְׁנַת אַרְבַּע לְדָרְיָוֶשׁ הַמֶּלֶךְ
  chosen: in the fourth year of King Darius
  alternatives:
  - in year four of Darius the king
  lexicon: HALOT
  rationale: This is a standard regnal-year dating formula. 'King Darius' is natural English while preserving the formal dating structure.
- source_word: הָיָה דְבַר יְהוָה אֶל זְכַרְיָה
  chosen: the word of the LORD came to Zechariah
  alternatives:
  - the word of the LORD was to Zechariah
  lexicon: HALOT
  rationale: This is the conventional prophetic formula. Although the Hebrew uses 'was,' English idiom normally renders the eventive sense as 'came to,' which accurately communicates prophetic revelation.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: בְּאַרְבָּעָה לַחֹדֶשׁ הַתְּשִׁיעִי
  chosen: on the fourth day of the ninth month
  alternatives:
  - on the fourth of the ninth month
  lexicon: HALOT
  rationale: The Hebrew date formula literally says 'on the fourth, of the ninth month.' In English, 'day' is supplied for clarity because it is clearly implied by the calendrical expression.
- source_word: בְּכִסְלֵו
  chosen: in Kislev
  alternatives:
  - in Chislev
  lexicon: HALOT
  rationale: The month name is transliterated, following the guideline to transliterate names. 'Kislev' is the standard modern English form.
