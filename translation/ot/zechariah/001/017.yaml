id: ZEC.1.17
reference: Zechariah 1:17
source:
  edition: WLC
  text: ע֣וֹד קְרָ֣א לֵ/אמֹ֗ר כֹּ֤ה אָמַר֙ יְהוָ֣ה צְבָא֔וֹת ע֛וֹד תְּפוּצֶ֥ינָה עָרַ֖/י מִ/טּ֑וֹב וְ/נִחַ֨ם יְהוָ֥ה עוֹד֙ אֶת צִיּ֔וֹן וּ/בָחַ֥ר ע֖וֹד בִּ/ירוּשָׁלִָֽם׀־׃ס
translation:
  text: 'Call out again, saying, ‘Thus says Yahweh of hosts: My cities will again overflow with prosperity, and Yahweh will again comfort Zion and again choose Jerusalem.’'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'My cities will again spread out because of good things' or 'will again abound with good things.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עוֹד
  chosen: again
  alternatives:
  - still
  - yet
  - once more
  lexicon: HALOT
  rationale: The adverb recurs throughout the verse and marks renewed divine action after judgment. 'Again' best captures restoration/repetition in natural English. The initial עוֹד with קְרָא is rendered 'again' as a renewed proclamation; later instances likewise signal renewed blessing, comfort, and choice.
- source_word: קְרָא
  chosen: Call out
  alternatives:
  - Proclaim
  - Cry out
  lexicon: HALOT
  rationale: Imperative to the prophet/angelic messenger to announce publicly. 'Call out' preserves the audible, heraldic force without sounding archaic.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - and say
  - as follows
  lexicon: HALOT
  rationale: Standard quotative infinitive introducing the message; 'saying' is concise and formally transparent.
- source_word: כֹּה אָמַר
  chosen: Thus says
  alternatives:
  - This is what ... says
  lexicon: HALOT
  rationale: Conventional prophetic messenger formula; retained in familiar English because it accurately reflects the Hebrew idiom and genre.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: צְבָאוֹת
  chosen: of hosts
  alternatives:
  - of armies
  lexicon: HALOT
  rationale: In the title יְהוָה צְבָאוֹת, 'of hosts' is the established and sufficiently transparent rendering for heavenly armies/forces; it preserves the title's weight better than the narrower 'of armies'.
- source_word: תְּפוּצֶינָה
  chosen: will ... overflow
  alternatives:
  - will spread out
  - will be spread abroad
  - will abound
  lexicon: HALOT
  rationale: From פוץ/פוץ in this context with מִטּוֹב, the sense is not mere geographical scattering but abundant expansion due to prosperity. 'Overflow' idiomatically conveys cities brimming with good things and fits the restoration context.
- source_word: עָרַי
  chosen: My cities
  alternatives:
  - the cities
  - my towns
  lexicon: HALOT
  rationale: 'First-person singular suffix is significant: these are the LORD''s cities. ''Cities'' is the standard gloss for עִיר and should be preserved.'
- source_word: מִטּוֹב
  chosen: with prosperity
  alternatives:
  - with good things
  - from goodness
  - with abundance
  lexicon: HALOT
  rationale: טוֹב here denotes beneficent prosperity/blessing rather than abstract moral goodness. 'With prosperity' communicates the material and covenantal blessing implied by the context.
- source_word: וְנִחַם
  chosen: and ... will ... comfort
  alternatives:
  - and ... will have compassion on
  - and ... will console
  lexicon: HALOT
  rationale: In restoration contexts נחם commonly means to comfort/console after affliction. 'Comfort' fits Zion's post-judgment restoration and preserves the pastoral nuance.
- source_word: צִיּוֹן
  chosen: Zion
  lexicon: HALOT
  rationale: Proper name retained by transliteration.
- source_word: וּבָחַר
  chosen: and again choose
  alternatives:
  - and again elect
  - and again take pleasure in
  lexicon: HALOT
  rationale: בחר denotes choosing/electing. 'Choose' is the most direct and least theologically overloaded English equivalent here, preserving the covenantal sense without importing later systematic categories.
- source_word: בִּירוּשָׁלִָם
  chosen: Jerusalem
  lexicon: HALOT
  rationale: Proper name retained by transliteration.
