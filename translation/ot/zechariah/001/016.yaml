theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Whether to make בֵּיתִי explicit as 'temple'
  chosen_reading: my house
  alternative_readings:
  - my temple
  rationale: Although the referent is the temple, the Hebrew says 'my house.' Optimal equivalence favors preserving the source expression in the main text without over-interpreting, while allowing the contextual gloss as an alternative.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
- issue: Whether to render בָּהּ with feminine personification
  chosen_reading: in her
  alternative_readings:
  - in it
  rationale: Jerusalem is grammatically feminine and often personified in prophetic literature. Preserving 'her' maintains the source-language imagery without adding doctrine.
  doctrine_reference: DOCTRINE.md Translation philosophy §5
