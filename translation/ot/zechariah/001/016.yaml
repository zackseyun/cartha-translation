id: ZEC.1.16
reference: Zechariah 1:16
source:
  edition: WLC
  text: לָ/כֵ֞ן כֹּֽה אָמַ֣ר יְהוָ֗ה שַׁ֤בְתִּי לִ/ירוּשָׁלִַ֨ם֙ בְּֽ/רַחֲמִ֔ים בֵּיתִ/י֙ יִבָּ֣נֶה בָּ֔/הּ נְאֻ֖ם יְהוָ֣ה צְבָא֑וֹת ו/קוה יִנָּטֶ֖ה עַל יְרוּשָׁלִָֽם־־׃
translation:
  text: 'Therefore, thus says Yahweh: I have returned to Jerusalem with compassion; my house will be built in it, declares Yahweh of hosts, and a measuring line will be stretched out over Jerusalem.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my temple will be built in her.' The Hebrew reads literally 'my house,' referring to the temple.
    reason: lexical_alternative
  - marker: b
    text: Or 'with mercies' or 'in mercy.' The Hebrew uses a plural form that expresses abundant compassion.
    reason: lexical_alternative
  - marker: c
    text: The 'measuring line' signifies planned restoration and rebuilding of Jerusalem.
    reason: cultural_note
lexical_decisions:
- source_word: לָכֵן
  chosen: Therefore
  alternatives:
  - For this reason
  - So
  lexicon: HALOT
  rationale: Marks an inferential conclusion from the preceding divine speech; 'Therefore' preserves the discourse connection naturally in English.
- source_word: כֹּה אָמַר יְהוָה
  chosen: thus says the LORD
  alternatives:
  - this is what the LORD says
  lexicon: HALOT
  rationale: Standard prophetic messenger formula. 'Thus says' preserves the formal prophetic register, and יְהוָה follows the doctrinal default 'the LORD'.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: שַׁבְתִּי
  chosen: I have returned
  alternatives:
  - I return
  - I have turned back
  lexicon: HALOT
  rationale: Qal perfect 1cs of שוב. The perfect is well represented by English present perfect here, expressing a decisive return already effected in response to prior anger/exile context.
- source_word: לִירוּשָׁלִַם
  chosen: to Jerusalem
  alternatives:
  - toward Jerusalem
  lexicon: HALOT
  rationale: Directional lamed is naturally rendered 'to Jerusalem'.
- source_word: בְּרַחֲמִים
  chosen: with compassion
  alternatives:
  - with mercies
  - in mercy
  lexicon: HALOT
  rationale: Plural רחמים is an abstract plural denoting compassion/mercy. 'With compassion' is idiomatic modern English while preserving the sense of merciful disposition.
- source_word: בֵּיתִי
  chosen: my house
  alternatives:
  - my temple
  lexicon: HALOT
  rationale: Literally 'my house.' In context it refers to the temple, but the Hebrew expression should be preserved in the main text; the more explicit interpretive gloss 'temple' is kept as an alternative.
- source_word: יִבָּנֶה
  chosen: will be built
  alternatives:
  - shall be rebuilt
  lexicon: HALOT
  rationale: Niphal imperfect of בנה. 'Will be built' is the straightforward passive. 'Rebuilt' is contextually plausible after destruction, but the Hebrew verb itself does not explicitly encode the re- prefix.
- source_word: בָּהּ
  chosen: in her
  alternatives:
  - in it
  lexicon: HALOT
  rationale: The feminine singular pronominal suffix refers to Jerusalem, a grammatically feminine city name. 'In her' preserves the personified-city idiom of the Hebrew better than the flattened 'in it.'
- source_word: נְאֻם יְהוָה צְבָאוֹת
  chosen: declares the LORD of hosts
  alternatives:
  - oracle of the LORD of hosts
  - declares the LORD Almighty
  lexicon: HALOT
  rationale: Prophetic affirmation formula. 'Declares' is idiomatic for נְאֻם. צְבָאוֹת is rendered 'hosts' to preserve the traditional military/cosmic imagery more closely than 'Almighty'.
- source_word: קָו
  chosen: a measuring line
  alternatives:
  - a line
  - a surveyor's line
  lexicon: HALOT
  rationale: In building/restoration context, קו denotes a measuring line used in planning or construction. The fuller phrase makes the image clear in English.
- source_word: יִנָּטֶה
  chosen: will be stretched out
  alternatives:
  - will be extended
  - will be drawn
  lexicon: HALOT
  rationale: Niphal imperfect of נטה, here in the sense of extending/stretching a line. 'Stretched out' is natural and vivid.
- source_word: עַל יְרוּשָׁלִָם
  chosen: over Jerusalem
  alternatives:
  - upon Jerusalem
  - across Jerusalem
  lexicon: HALOT
  rationale: עַל is most naturally 'over' here, fitting the image of a measuring line extended over the city for rebuilding.
