theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: Follows the project's stated default for the Tetragrammaton, preserving reverential convention and broad Christian readability.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Rendering קנא / קנאה in relation to God
  chosen_reading: jealous / exceedingly jealous
  alternative_readings:
  - zealous / with great zeal
  rationale: The Hebrew explicitly uses jealousy language, and preserving it maintains the covenantal and theological tension of divine jealousy rather than softening it to mere zeal. An alternative is worth preserving because English readers may hear 'jealous' negatively.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §3: Preserve theological tension rather than resolve it'
