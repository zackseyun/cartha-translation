id: ZEC.1.14
reference: Zechariah 1:14
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר אֵלַ֗/י הַ/מַּלְאָךְ֙ הַ/דֹּבֵ֣ר בִּ֔/י קְרָ֣א לֵ/אמֹ֔ר כֹּ֥ה אָמַ֖ר יְהוָ֣ה צְבָא֑וֹת קִנֵּ֧אתִי לִ/ירוּשָׁלִַ֛ם וּ/לְ/צִיּ֖וֹן קִנְאָ֥ה גְדוֹלָֽה׃
translation:
  text: 'Then the angel who was speaking with me said to me, “Proclaim, saying, ‘Thus says Yahweh of hosts: I am exceedingly jealous for Jerusalem and for Zion.’”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “I am zealous for Jerusalem and for Zion with great zeal.” The Hebrew uses the same root twice for emphasis.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַמַּלְאָךְ הַדֹּבֵר בִּי
  chosen: the angel who was speaking with me
  alternatives:
  - the angel speaking in me
  - the angel who spoke with me
  lexicon: HALOT
  rationale: The idiom דֹּבֵר בִּי in Zechariah commonly means 'speaking with me,' not literal indwelling speech. English past progressive fits the participial construction in context.
- source_word: קְרָא לֵאמֹר
  chosen: Proclaim, saying
  alternatives:
  - Cry out, saying
  - Call out, saying
  lexicon: HALOT
  rationale: קרא in prophetic contexts often carries the sense of public proclamation. 'Proclaim' communicates the heraldic force more naturally than the more literal 'cry out,' while retaining the imperative force.
- source_word: כֹּה אָמַר
  chosen: Thus says
  alternatives:
  - This is what ... says
  lexicon: HALOT
  rationale: Standard prophetic messenger formula; 'Thus says' preserves the formal prophetic register.
- source_word: יְהוָה צְבָאוֹת
  chosen: the LORD of hosts
  alternatives:
  - the LORD Almighty
  - Yahweh of hosts
  lexicon: HALOT
  rationale: Per doctrine, יְהוָה is rendered 'the LORD.' 'Hosts' preserves the military/cosmic imagery of צְבָאוֹת better than the interpretive 'Almighty.'
- source_word: קִנֵּאתִי
  chosen: I am exceedingly jealous
  alternatives:
  - I am zealous
  - I have been jealous
  lexicon: HALOT
  rationale: The verb denotes intense jealousy/zeal. In this context of covenant concern for Jerusalem, 'jealous' best preserves the lexical link with the following noun קִנְאָה. Present English conveys the force of the Hebrew perfect in prophetic declaration.
- source_word: לִירוּשָׁלִַם וּלְצִיּוֹן
  chosen: for Jerusalem and for Zion
  alternatives:
  - for Jerusalem and Zion
  lexicon: HALOT
  rationale: Repeating 'for' reflects the paired prepositions and keeps the emphasis on both city designations.
- source_word: קִנְאָה גְדוֹלָה
  chosen: exceedingly
  alternatives:
  - with great jealousy
  - a great jealousy
  lexicon: HALOT
  rationale: The Hebrew uses cognate noun plus adjective to intensify the preceding verb ('I am jealous with great jealousy'). Rendering it adverbially as 'exceedingly' avoids awkward English while preserving the emphatic force.
