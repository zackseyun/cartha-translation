id: ZEC.1.1
reference: Zechariah 1:1
source:
  edition: WLC
  text: בַּ/חֹ֨דֶשׁ֙ הַ/שְּׁמִינִ֔י בִּ/שְׁנַ֥ת שְׁתַּ֖יִם לְ/דָרְיָ֑וֶשׁ הָיָ֣ה דְבַר יְהוָ֗ה אֶל זְכַרְיָה֙ בֶּן בֶּ֣רֶכְיָ֔ה בֶּן עִדּ֥וֹ הַ/נָּבִ֖יא לֵ/אמֹֽר־־־־׃
translation:
  text: In the eighth month, in the second year of Darius, the word of Yahweh came to Zechariah son of Berechiah, son of Iddo the prophet, saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''Yahweh'': Hebrew has the divine name YHWH.'
    reason: alternative_reading
lexical_decisions:
- source_word: בַּ/חֹדֶשׁ הַ/שְּׁמִינִי
  chosen: In the eighth month
  alternatives:
  - In month eight
  - In the eighth new moon/month
  lexicon: HALOT
  rationale: The preposition plus noun with ordinal gives a temporal dating formula. 'In the eighth month' is idiomatic modern English and preserves the formal dating structure.
- source_word: בִּ/שְׁנַת שְׁתַּיִם לְ/דָרְיָוֶשׁ
  chosen: in the second year of Darius
  alternatives:
  - in year two of Darius
  - during the second year of Darius
  lexicon: HALOT
  rationale: This is a standard regnal-year expression. English normally renders it 'in the second year of Darius.' The name is transliterated per project policy for personal names.
- source_word: הָיָה דְבַר יְהוָה
  chosen: the word of the LORD came
  alternatives:
  - the word of the LORD was
  - the word of the LORD happened/came to pass
  lexicon: HALOT
  rationale: In prophetic superscriptions, היה + דבר יהוה is conventionally and accurately rendered 'the word of the LORD came,' expressing the onset of prophetic revelation more naturally than the wooden 'was.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֶל
  chosen: to
  alternatives:
  - unto
  lexicon: HALOT
  rationale: The preposition marks the recipient of the divine word. 'To' is the natural modern equivalent.
- source_word: זְכַרְיָה
  chosen: Zechariah
  lexicon: HALOT
  rationale: Standard English transliteration of the personal name.
- source_word: בֶּן בֶּרֶכְיָה בֶּן עִדּוֹ
  chosen: son of Berechiah, son of Iddo
  alternatives:
  - the son of Berechiah, the son of Iddo
  lexicon: HALOT
  rationale: The construct chain identifies lineage. Repeating 'son of' preserves the Hebrew genealogy without unnecessary archaism.
- source_word: הַ/נָּבִיא
  chosen: the prophet
  alternatives:
  - the prophetic one
  lexicon: HALOT
  rationale: Definite noun appositionally identifies Iddo or, by extension through the chain, Zechariah within the prophetic line. 'The prophet' is the straightforward rendering.
- source_word: לֵ/אמֹר
  chosen: saying,
  alternatives:
  - thus saying,
  - 'as follows:'
  lexicon: HALOT
  rationale: This infinitive introduces the following divine speech. 'Saying,' preserves the formal transition and signals continuation into verse 2.
