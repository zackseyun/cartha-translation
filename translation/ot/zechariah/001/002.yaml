id: ZEC.1.2
reference: Zechariah 1:2
source:
  edition: WLC
  text: קָצַ֧ף יְהוָ֛ה עַל אֲבֽוֹתֵי/כֶ֖ם קָֽצֶף־׃
translation:
  text: Yahweh was very angry with your fathers.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your ancestors' (literally, 'your fathers').
    reason: lexical_alternative
lexical_decisions:
- source_word: קָצַף
  chosen: was very angry
  alternatives:
  - was angry
  - was enraged
  - was wrathful
  lexicon: HALOT
  rationale: The verb קצף denotes being angry or wrathful. In this verse it is immediately followed by the cognate noun קָצֶף, creating an emphatic construction ('was angry with anger'). Rendering the first occurrence with 'was very angry' captures the idiomatic force in natural English without wooden repetition.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: עַל
  chosen: with
  alternatives:
  - against
  - upon
  lexicon: HALOT
  rationale: With verbs of anger, עַל marks the object toward whom anger is directed. English idiom prefers 'angry with' here; 'against' is possible but slightly more interpretive in tone.
- source_word: אֲבֹתֵיכֶם
  chosen: your fathers
  alternatives:
  - your ancestors
  lexicon: HALOT
  rationale: The Hebrew literally means 'your fathers.' In prophetic discourse it refers to the forefathers/previous generations of the audience. Following the project's gender-accurate policy, 'your fathers' is retained in the main text as the source form, while the broader sense can be noted as an alternative.
- source_word: קָצֶף
  chosen: very
  alternatives:
  - wrath
  - anger
  - greatly
  lexicon: HALOT
  rationale: The noun is cognate with the preceding verb and functions adverbially/intensively in this construction. Rather than produce awkward English such as 'was angry with anger,' the translation expresses the emphasis with 'very.'
