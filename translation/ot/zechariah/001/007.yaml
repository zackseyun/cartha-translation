id: ZEC.1.7
reference: Zechariah 1:7
source:
  edition: WLC
  text: בְּ/יוֹם֩ עֶשְׂרִ֨ים וְ/אַרְבָּעָ֜ה לְ/עַשְׁתֵּֽי עָשָׂ֥ר חֹ֨דֶשׁ֙ הוּא חֹ֣דֶשׁ שְׁבָ֔ט בִּ/שְׁנַ֥ת שְׁתַּ֖יִם לְ/דָרְיָ֑וֶשׁ הָיָ֣ה דְבַר יְהוָ֗ה אֶל זְכַרְיָה֙ בֶּן בֶּ֣רֶכְיָ֔הוּ בֶּן עִדּ֥וֹא הַ/נָּבִ֖יא לֵ/אמֹֽר־־־־־־׃
translation:
  text: 'On the twenty-fourth day of the eleventh month (that is, the month Shebat), in the second year of Darius, the word of Yahweh came to Zechariah son of Berechiah, son of Iddo the prophet, saying:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''the month Shebat''; alternatively transliterated ''Shevat.'''
    reason: lexical_alternative
  - marker: b
    text: Or 'Yahweh' for 'the LORD' (Hebrew יְהוָה).
    reason: alternative_reading
lexical_decisions:
- source_word: בְּ/יוֹם
  chosen: On the ... day
  alternatives:
  - In the ... day
  lexicon: HALOT
  rationale: Temporal ב with יוֹם is most naturally rendered as an English temporal phrase, 'On the ... day.' This is idiomatic and preserves the dating formula.
- source_word: עֶשְׂרִים וְאַרְבָּעָה
  chosen: twenty-fourth
  alternatives:
  - twenty and four
  lexicon: HALOT
  rationale: English date style normally uses the ordinal 'twenty-fourth' rather than a literal cardinal sequence. This is a natural equivalent for the Hebrew dating construction.
- source_word: לְעַשְׁתֵּי עָשָׂר חֹדֶשׁ
  chosen: of the eleventh month
  alternatives:
  - of month eleven
  - of the month, the eleventh
  lexicon: HALOT
  rationale: The Hebrew literally marks 'of the eleventh month'; this is standard calendrical phrasing and should be rendered straightforwardly.
- source_word: הוּא חֹדֶשׁ שְׁבָט
  chosen: (that is, the month Shebat)
  alternatives:
  - it is the month Shebat
  - which is the month Shebat
  lexicon: HALOT
  rationale: הוּא here identifies the named month with the numbered month. Parenthetical 'that is' communicates the appositional clarification naturally in English while preserving the explanatory force.
- source_word: שְׁבָט
  chosen: Shebat
  alternatives:
  - Shevat
  lexicon: HALOT
  rationale: As a month name, this is transliterated rather than translated, in keeping with the philosophy of transliterating names. 'Shebat' closely reflects the Hebrew form.
- source_word: בִּ/שְׁנַת שְׁתַּיִם לְדָרְיָוֶשׁ
  chosen: in the second year of Darius
  alternatives:
  - in year two of Darius
  lexicon: HALOT
  rationale: This is the standard regnal-year formula. English idiom prefers 'in the second year of Darius.'
- source_word: הָיָה דְבַר יְהוָה
  chosen: the word of the LORD came
  alternatives:
  - the word of the LORD was
  - the word of the LORD happened
  lexicon: HALOT
  rationale: In prophetic formulae, היה with דְבַר יְהוָה is idiomatically rendered 'the word of the LORD came,' expressing divine revelation rather than mere existence.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֶל
  chosen: to
  alternatives:
  - unto
  lexicon: HALOT
  rationale: Simple directional אֶל in this revelatory context is best rendered 'to'.
- source_word: זְכַרְיָה
  chosen: Zechariah
  lexicon: HALOT
  rationale: Standard English transliteration of the personal name.
- source_word: בֶּן בֶּרֶכְיָהוּ בֶּן עִדּוֹא
  chosen: son of Berechiah, son of Iddo
  alternatives:
  - the son of Berechiah, the son of Iddo
  lexicon: HALOT
  rationale: The genealogical chain is preserved directly and naturally in English.
- source_word: הַנָּבִיא
  chosen: the prophet
  alternatives:
  - a prophet
  lexicon: HALOT
  rationale: The article is present in Hebrew, so 'the prophet' is preferred. It most naturally apposes Iddo or the genealogical identification as a known prophetic figure; in either case the definite form should be retained.
- source_word: לֵאמֹר
  chosen: 'saying:'
  alternatives:
  - 'thus saying:'
  lexicon: HALOT
  rationale: Standard introduction to direct speech. Since the next verse contains the speech, 'saying:' appropriately signals continuation.
