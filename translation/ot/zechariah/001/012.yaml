id: ZEC.1.12
reference: Zechariah 1:12
source:
  edition: WLC
  text: וַ/יַּ֣עַן מַלְאַךְ יְהוָה֮ וַ/יֹּאמַר֒ יְהוָ֣ה צְבָא֔וֹת עַד מָתַ֗י אַתָּה֙ לֹֽא תְרַחֵ֣ם אֶת יְרוּשָׁלִַ֔ם וְ/אֵ֖ת עָרֵ֣י יְהוּדָ֑ה אֲשֶׁ֣ר זָעַ֔מְתָּה זֶ֖ה שִׁבְעִ֥ים שָׁנָֽה־־־־׃
translation:
  text: Then the angel of Yahweh answered and said, “O Yahweh of hosts, how long will you have no compassion on Jerusalem and on the cities of Judah, against which you have been angry these seventy years?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the messenger of the LORD.”
    reason: lexical_alternative
  - marker: b
    text: Or “will you not show mercy on Jerusalem and the cities of Judah?”
    reason: lexical_alternative
  - marker: c
    text: Or “with which you have been indignant these seventy years.”
    reason: lexical_alternative
lexical_decisions:
- source_word: מַלְאַךְ יְהוָה
  chosen: the angel of the LORD
  alternatives:
  - the messenger of the LORD
  lexicon: HALOT
  rationale: מַלְאַךְ can mean either 'messenger' or 'angel'; in prophetic vision context and in established usage for this figure, 'angel' is the most natural rendering. יְהוָה follows the doctrinal default as 'the LORD.'
- source_word: יְהוָה צְבָאוֹת
  chosen: O LORD of hosts
  alternatives:
  - LORD Almighty
  - LORD of armies
  lexicon: HALOT
  rationale: צְבָאוֹת is most literally 'hosts' or 'armies.' 'LORD of hosts' preserves the traditional and semantically transparent title without over-paraphrasing. The vocative force is conveyed with 'O.'
- source_word: וַיַּעַן
  chosen: answered
  alternatives:
  - responded
  lexicon: HALOT
  rationale: The verb commonly introduces a response in dialogue. 'Answered' is idiomatic and fits the narrative sequence.
- source_word: עַד מָתַי
  chosen: how long
  lexicon: HALOT
  rationale: Standard idiomatic rendering of the temporal lament/intercession formula.
- source_word: לֹא תְרַחֵם
  chosen: will you have no compassion
  alternatives:
  - will you not show mercy
  - will you not have mercy
  lexicon: HALOT
  rationale: רחם denotes compassion/mercy. Because the Hebrew is literally 'you will not have compassion,' this rendering preserves the negated verbal form while remaining natural English. 'Compassion' avoids overly ecclesiastical diction while retaining theological weight.
- source_word: אֶת יְרוּשָׁלַם וְאֵת עָרֵי יְהוּדָה
  chosen: on Jerusalem and on the cities of Judah
  alternatives:
  - toward Jerusalem and the cities of Judah
  lexicon: HALOT
  rationale: With רחם, English idiom commonly uses 'on' or 'toward.' Repeating 'on' clarifies that both Jerusalem and the cities are objects of the requested compassion.
- source_word: אֲשֶׁר זָעַמְתָּה
  chosen: with which you have been angry
  alternatives:
  - against which you have been indignant
  - which you have denounced in wrath
  lexicon: HALOT
  rationale: זעם conveys indignation or anger. 'Have been angry with' is clear modern English and preserves the perfect aspect's present relevance. 'With which' follows the Hebrew relative construction tied to the cities/Jerusalem as objects of divine anger.
- source_word: זֶה שִׁבְעִים שָׁנָה
  chosen: these seventy years
  alternatives:
  - for seventy years
  - this seventy years
  lexicon: HALOT
  rationale: The expression idiomatically refers to the duration up to the present. 'These seventy years' is natural English and reflects the deictic זֶה without wooden literalism.
