theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Identity of מַלְאַךְ יְהוָה
  chosen_reading: the angel of Yahweh
  alternative_readings:
  - the messenger of the LORD
  rationale: The translation preserves the text's wording without importing a doctrinal identification of this figure (for example, as a preincarnate appearance of Christ). The phrase is rendered straightforwardly and the theological question is left unresolved, in keeping with the instruction not to import doctrinal claims the text does not make.
