theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Whether to render אָבוֹת as 'fathers' or a more inclusive generational term
  chosen_reading: fathers
  alternative_readings:
  - ancestors
  rationale: The Hebrew is grammatically masculine plural and refers to prior generations. Per the gender-accurate policy, the main text keeps 'fathers' rather than flattening to a gender-neutral term, since the representative force is understandable in context.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
