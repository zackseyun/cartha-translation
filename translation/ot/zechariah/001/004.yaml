id: ZEC.1.4
reference: Zechariah 1:4
source:
  edition: WLC
  text: אַל תִּהְי֣וּ כַ/אֲבֹֽתֵי/כֶ֡ם אֲשֶׁ֣ר קָרְאֽוּ אֲלֵי/הֶם֩ הַ/נְּבִיאִ֨ים הָ/רִֽאשֹׁנִ֜ים לֵ/אמֹ֗ר כֹּ֤ה אָמַר֙ יְהוָ֣ה צְבָא֔וֹת שׁ֤וּבוּ נָא֙ מִ/דַּרְכֵי/כֶ֣ם הָ/רָעִ֔ים ו/מעלילי/כם הָֽ/רָעִ֑ים וְ/לֹ֥א שָׁמְע֛וּ וְ/לֹֽא הִקְשִׁ֥יבוּ אֵלַ֖/י נְאֻם יְהוָֽה־־־־׃
translation:
  text: 'Do not be like your fathers, to whom the former prophets proclaimed, saying, “Thus says Yahweh of hosts: Turn back, please, from your evil ways and your evil deeds.” But they did not listen or pay attention to me, declares Yahweh.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your ancestors.' Hebrew literally 'your fathers,' referring to earlier generations.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַל תִּהְיוּ
  chosen: Do not be
  alternatives:
  - Do not become
  lexicon: HALOT
  rationale: אַל with היה in the imperfect/jussive functions as a prohibition. 'Do not be' is the most natural English rendering here for a warning against resembling prior generations.
- source_word: כַאֲבֹתֵיכֶם
  chosen: like your fathers
  alternatives:
  - like your ancestors
  lexicon: HALOT
  rationale: אָבוֹת literally means 'fathers,' but in context refers to prior generations. 'Fathers' preserves the Hebrew form and the gender-accurate policy, while the broader sense is clear from context.
- source_word: קָרְאוּ אֲלֵיהֶם
  chosen: proclaimed to whom
  alternatives:
  - called to whom
  - cried out to whom
  lexicon: HALOT
  rationale: קרא can mean call, proclaim, or cry out. Because the content of the prophetic message follows in direct speech, 'proclaimed' best captures formal prophetic announcement in readable English.
- source_word: הַנְּבִיאִים הָרִאשֹׁנִים
  chosen: the former prophets
  alternatives:
  - the earlier prophets
  - the prophets of old
  lexicon: HALOT
  rationale: הראשנים marks those earlier in time. 'Former prophets' is concise and idiomatic, without importing the technical canonical label used in some traditions.
- source_word: כֹּה אָמַר יְהוָה צְבָאוֹת
  chosen: Thus says the LORD of hosts
  alternatives:
  - This is what the LORD of hosts says
  - Thus says Yahweh of armies
  lexicon: HALOT
  rationale: This is the standard prophetic messenger formula. Per doctrine, יְהוָה is rendered 'the LORD.' 'Hosts' preserves the traditional and semantically broad sense of צבאות, encompassing heavenly armies and forces.
- source_word: שׁוּבוּ נָא
  chosen: Turn back, please
  alternatives:
  - Return, please
  - Turn back now
  lexicon: HALOT
  rationale: שוב in prophetic calls commonly means to turn back/return in repentance. 'Turn back' preserves the directional and moral force. נָא adds entreaty rather than strict temporality, so 'please' is preferable to 'now'.
- source_word: מִדַּרְכֵיכֶם הָרָעִים
  chosen: from your evil ways
  alternatives:
  - from your wicked ways
  lexicon: HALOT
  rationale: דֶּרֶךְ often denotes conduct or course of life. 'Ways' is the established and accurate idiom here. 'Evil' matches רעים straightforwardly.
- source_word: וּמַעֲלִילֵיכֶם הָרָעִים
  chosen: and your evil deeds
  alternatives:
  - and your evil practices
  - and your evil actions
  lexicon: HALOT
  rationale: מעללים refers to deeds, acts, or practices. 'Deeds' is concise, natural, and preserves the concrete moral dimension alongside 'ways.'
- source_word: וְלֹא שָׁמְעוּ
  chosen: But they did not listen
  alternatives:
  - and they did not hear
  - but they did not obey
  lexicon: HALOT
  rationale: שמע can mean hear, listen, or obey. Here, paired with הִקְשִׁיבוּ, the emphasis is on refusal to heed the prophetic word. 'Listen' avoids overinterpreting as obedience while conveying more than mere auditory hearing.
- source_word: וְלֹא הִקְשִׁיבוּ אֵלַי
  chosen: or pay attention to me
  alternatives:
  - or give heed to me
  - or incline their ear to me
  lexicon: HALOT
  rationale: הקשיב means to attend closely, give heed, or pay attention. 'Pay attention to me' is clear modern English and preserves the personal object אֵלַי.
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: נְאֻם is a prophetic affirmation formula. 'Declares the LORD' is idiomatic in English prophetic style and distinguishes it from the earlier messenger formula.
