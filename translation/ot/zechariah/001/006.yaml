theological_decisions:
- issue: Whether וַיָּשׁוּבוּ should be rendered as explicit repentance
  chosen_reading: Then they turned back
  alternative_readings:
  - Then they repented
  - Then they returned
  rationale: The verb שׁוּב can denote repentance, but the immediate context only states that the fathers turned and acknowledged the justice of God's dealings. To preserve theological tension and avoid overstating inward repentance, the main text keeps the more literal 'turned back,' with 'repented' preserved as an alternative.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
