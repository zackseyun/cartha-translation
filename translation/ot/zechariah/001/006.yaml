id: ZEC.1.6
reference: Zechariah 1:6
source:
  edition: WLC
  text: אַ֣ךְ דְּבָרַ֣/י וְ/חֻקַּ֗/י אֲשֶׁ֤ר צִוִּ֨יתִי֙ אֶת עֲבָדַ֣/י הַ/נְּבִיאִ֔ים הֲ/ל֥וֹא הִשִּׂ֖יגוּ אֲבֹתֵי/כֶ֑ם וַ/יָּשׁ֣וּבוּ וַ/יֹּאמְר֗וּ כַּ/אֲשֶׁ֨ר זָמַ֜ם יְהוָ֤ה צְבָאוֹת֙ לַ/עֲשׂ֣וֹת לָ֔/נוּ כִּ/דְרָכֵ֨י/נוּ֙ וּ/כְ/מַ֣עֲלָלֵ֔י/נוּ כֵּ֖ן עָשָׂ֥ה אִתָּֽ/נוּ׀־׃ס
translation:
  text: But did not my words and my statutes, which I commanded my servants the prophets, overtake your fathers? Then they turned back and said, ‘As Yahweh of Armies planned to do to us, according to our ways and according to our deeds, so he has dealt with us.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Then they repented and said.' The Hebrew verb can mean 'turned back/returned' or, in context, 'repented.'
    reason: alternative_reading
  - marker: b
    text: 'Traditional rendering: ''the LORD of Hosts.'''
    reason: lexical_alternative
  - marker: c
    text: Or 'which I commanded through my servants the prophets.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַךְ
  chosen: But
  alternatives:
  - Surely
  - Nevertheless
  - Only
  lexicon: HALOT
  rationale: Here אַךְ introduces a contrast with the preceding statement that the fathers and prophets do not live forever. 'But' best captures the adversative force in natural English.
- source_word: דְּבָרַי
  chosen: my words
  alternatives:
  - my words/messages
  lexicon: HALOT
  rationale: דבר is broad, but 'words' preserves the directness of God's spoken declarations in context.
- source_word: חֻקַּי
  chosen: my statutes
  alternatives:
  - my decrees
  - my ordinances
  lexicon: HALOT
  rationale: חֹק/חֻקָּה often denotes an enacted prescription or decree. 'Statutes' is a standard, sufficiently transparent rendering here, paired with 'words' to reflect two related but distinct terms.
- source_word: צִוִּיתִי אֶת־עֲבָדַי הַנְּבִיאִים
  chosen: which I commanded my servants the prophets
  alternatives:
  - which I commanded through my servants the prophets
  - which I charged my servants the prophets with
  lexicon: HALOT
  rationale: The Hebrew directly says God commanded 'my servants the prophets.' In context the sense is that the prophets were commissioned to deliver these words/statutes. 'Commanded my servants the prophets' stays close to the syntax without over-paraphrasing; 'through' is interpretive and therefore preserved as an alternative rather than placed in the main text.
- source_word: עֲבָדַי
  chosen: my servants
  alternatives:
  - my slaves
  lexicon: HALOT
  rationale: Although עבד can denote slave/servant, in prophetic commissioning contexts 'servants' is the most idiomatic and contextually appropriate English rendering; the bonded-status nuance is not foregrounded here.
- source_word: הִשִּׂיגוּ
  chosen: overtake
  alternatives:
  - catch up with
  - reach
  lexicon: HALOT
  rationale: נשׂג in this context conveys pursuit catching up to someone. 'Overtake' preserves the metaphor of God's words/judgments catching up with the fathers.
- source_word: וַיָּשׁוּבוּ
  chosen: Then they turned back
  alternatives:
  - Then they repented
  - Then they returned
  lexicon: HALOT
  rationale: שׁוּב can mean return or repent depending on context. Here it introduces their acknowledgment of God's justice. 'Turned back' preserves the verbal image without importing a full theological claim of repentance beyond what the text explicitly states.
- source_word: זָמַם
  chosen: planned
  alternatives:
  - purposed
  - intended
  lexicon: HALOT
  rationale: זמם denotes purposeful intention. 'Planned' is clear modern English and fits the clause about what the LORD of Armies resolved to do.
- source_word: יְהוָה צְבָאוֹת
  chosen: the LORD of Armies
  alternatives:
  - the LORD of Hosts
  lexicon: HALOT
  rationale: Per doctrine, יְהוָה is rendered 'the LORD.' צְבָאוֹת is translated rather than merely traditionalized; 'of Armies' is more transparent to modern readers than 'of Hosts,' while preserving the martial/cosmic force of the title.
- source_word: לַעֲשׂוֹת לָנוּ
  chosen: to do to us
  alternatives:
  - to deal with us
  - to act against us
  lexicon: HALOT
  rationale: The infinitive plus pronoun is straightforwardly 'to do to us.' This is retained in the quotation for formal clarity, while the concluding verb is rendered more idiomatically.
- source_word: כִּדְרָכֵינוּ
  chosen: according to our ways
  alternatives:
  - in keeping with our ways
  lexicon: HALOT
  rationale: דֶּרֶךְ in moral contexts commonly means conduct or way of life. 'Ways' preserves the biblical idiom and moral sense.
- source_word: וּכְמַעֲלָלֵינוּ
  chosen: according to our deeds
  alternatives:
  - according to our actions
  - according to our practices
  lexicon: HALOT
  rationale: מַעֲלָלִים refers to deeds/actions, often with moral weight. 'Deeds' is concise and idiomatic alongside 'ways.'
- source_word: עָשָׂה אִתָּנוּ
  chosen: he has dealt with us
  alternatives:
  - he has done to us
  - he acted toward us
  lexicon: HALOT
  rationale: Although literally 'he has done with us/to us,' English idiom favors 'dealt with us' in a context of recompense or treatment. This preserves the sense without awkwardness.
