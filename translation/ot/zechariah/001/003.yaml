theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Repentance/covenant language in שׁוּב
  chosen_reading: Return to me ... and I will return to you
  alternative_readings:
  - Turn to me ... and I will turn to you
  rationale: The Hebrew uses the same verb for both human and divine action, creating deliberate reciprocity. 'Return' best preserves that theological symmetry and the covenant-restoration sense without importing stronger interpretive language than the text itself states.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #5 (consistency of key terms)'
