id: ZEC.1.3
reference: Zechariah 1:3
source:
  edition: WLC
  text: וְ/אָמַרְתָּ֣ אֲלֵ/הֶ֗ם כֹּ֤ה אָמַר֙ יְהוָ֣ה צְבָא֔וֹת שׁ֣וּבוּ אֵלַ֔/י נְאֻ֖ם יְהוָ֣ה צְבָא֑וֹת וְ/אָשׁ֣וּב אֲלֵי/כֶ֔ם אָמַ֖ר יְהוָ֥ה צְבָאֽוֹת׃
translation:
  text: 'Therefore say to them, ‘Thus says Yahweh of hosts: Return to me,’ declares Yahweh of hosts, ‘and I will return to you,’ says Yahweh of hosts.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Turn to me ... and I will turn to you.' The Hebrew uses the same verb in both clauses, emphasizing reciprocal restoration.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאָמַרְתָּ
  chosen: Therefore say
  alternatives:
  - And say
  - So say
  lexicon: HALOT
  rationale: The prefixed conjunction links this command to the preceding statement of divine wrath (v. 2). 'Therefore' makes the discourse connection explicit in natural English, while still reflecting the conjunction.
- source_word: אֲלֵהֶם
  chosen: to them
  lexicon: HALOT
  rationale: Standard directional use of אֶל with 3mp suffix.
- source_word: כֹּה אָמַר
  chosen: Thus says
  alternatives:
  - This is what ... says
  lexicon: HALOT
  rationale: Conventional prophetic messenger formula. 'Thus says' preserves the formal prophetic cadence without becoming archaic.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: צְבָאוֹת
  chosen: of hosts
  alternatives:
  - of armies
  lexicon: HALOT
  rationale: In the title יְהוָה צְבָאוֹת, 'hosts' is the established and semantically broad rendering, encompassing heavenly armies and sovereign power. 'Armies' is possible but narrower.
- source_word: שׁוּבוּ אֵלַי
  chosen: Return to me
  alternatives:
  - Turn to me
  - Come back to me
  lexicon: HALOT
  rationale: שׁוּב commonly denotes turning/returning, especially in covenantal calls to repentance. 'Return to me' preserves both relational and repentance overtones without over-paraphrasing.
- source_word: נְאֻם
  chosen: declares
  alternatives:
  - oracle of
  - utterance of
  lexicon: HALOT
  rationale: In prophetic speech formulas, 'declares' is idiomatic modern English and conveys authoritative divine utterance more naturally than the more wooden 'oracle of' in running text.
- source_word: וְאָשׁוּב אֲלֵיכֶם
  chosen: and I will return to you
  alternatives:
  - and I will turn to you
  lexicon: HALOT
  rationale: 'The repetition of שׁוּב creates a reciprocal covenantal pattern: the people are to return to God, and God will return to them in favor. ''Return'' preserves the lexical echo better than varying the English gloss.'
- source_word: אָמַר יְהוָה צְבָאוֹת
  chosen: says the LORD of hosts
  alternatives:
  - declares the LORD of hosts
  lexicon: HALOT
  rationale: The verse contains repeated divine speech formulas. Rendering the middle נְאֻם with 'declares' and the final אָמַר with 'says' preserves some distinction between the Hebrew forms while keeping the English readable.
