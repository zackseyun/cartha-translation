id: ZEC.4.8
reference: Zechariah 4:8
source:
  edition: WLC
  text: וַ/יְהִ֥י דְבַר יְהוָ֖ה אֵלַ֥/י לֵ/אמֹֽר־׃
translation:
  text: Then the word of Yahweh came to me, saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''YHWH''; traditionally rendered ''the LORD.'''
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְהִי
  chosen: Then ... came
  alternatives:
  - And it happened
  - And it came to pass
  lexicon: HALOT
  rationale: The waw-consecutive of היה introduces a new narrative or visionary development. In English, 'Then' naturally marks sequence without the archaic feel of 'it came to pass.' The verb is carried idiomatically with 'came' in the common prophetic formula 'the word ... came.'
- source_word: דְבַר
  chosen: the word
  alternatives:
  - a word
  - message
  lexicon: HALOT
  rationale: In the construct phrase דְבַר יְהוָה, 'the word' is the standard prophetic formula indicating a specific divine communication. 'Message' is possible but less formally tied to the recurring biblical expression.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֵלַי
  chosen: to me
  alternatives:
  - unto me
  lexicon: HALOT
  rationale: The preposition with first-person singular suffix straightforwardly means 'to me.' 'Unto me' is unnecessarily archaic for the project's modern-English style.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - to say
  lexicon: HALOT
  rationale: The infinitive construct here introduces the content of the divine speech in standard Hebrew narrative style. 'Saying' is the most natural and conventional English equivalent in this formula.
