id: ZEC.4.13
reference: Zechariah 4:13
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר אֵלַ/י֙ לֵ/אמֹ֔ר הֲ/ל֥וֹא יָדַ֖עְתָּ מָה אֵ֑לֶּה וָ/אֹמַ֖ר לֹ֥א
    אֲדֹנִֽ/י־׃
translation:
  text: Then he said to me, “Do you not know what these are?” And I said, “No, my
    lord.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “sir.” The Hebrew אֲדֹנִי is a respectful form of address meaning “my
      lord” and here refers to the speaker addressed in the vision, not to the divine
      name.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: Then he said
  alternatives:
  - And he said
  lexicon: HALOT
  rationale: Wayyiqtol of אמר advances the narrative. 'Then he said' gives natural
    English narrative flow while preserving the sequential sense of the waw-consecutive.
- source_word: אֵלַי
  chosen: to me
  lexicon: HALOT
  rationale: Direct rendering of the preposition plus 1cs suffix.
- source_word: לֵאמֹר
  chosen: omitted in direct English quotation
  alternatives:
  - saying
  lexicon: HALOT
  rationale: Hebrew quotative infinitive is commonly redundant in English when followed
    immediately by direct speech. Its function is preserved by the quotation itself.
- source_word: הֲלוֹא
  chosen: Do you not
  alternatives:
  - Surely you know
  - Do you surely not
  lexicon: HALOT
  rationale: The interrogative plus negation introduces a question expecting an affirmative
    answer. 'Do you not' preserves the form and rhetorical force without over-paraphrasing.
- source_word: יָדַעְתָּ
  chosen: know
  alternatives:
  - have known
  - understand
  lexicon: HALOT
  rationale: Though formally perfect 2ms, in this interrogative context English present
    'know' best conveys the immediate sense. 'Understand' is possible but less direct
    than the basic lexical meaning.
- source_word: מָה אֵלֶּה
  chosen: what these are
  alternatives:
  - what are these things
  lexicon: HALOT
  rationale: Natural English rendering of the interrogative pronoun with demonstrative
    plural, preserving the referential force.
- source_word: וָאֹמַר
  chosen: And I said
  alternatives:
  - Then I said
  lexicon: HALOT
  rationale: Straightforward narrative wayyiqtol. 'And I said' preserves the simple
    sequence and dialogue exchange.
- source_word: לֹא
  chosen: 'No'
  alternatives:
  - I do not know
  lexicon: HALOT
  rationale: The Hebrew gives only the negation, and English dialogue naturally supplies
    'No.' This is concise and faithful to the elliptical response.
- source_word: אֲדֹנִי
  chosen: my lord
  alternatives:
  - sir
  - my master
  lexicon: HALOT
  rationale: אדני here is a respectful address to the interpreting messenger, not
    the divine name. 'My lord' preserves the honorific sense and the lexical connection
    to אדון better than the flatter 'sir.' 'My master' is possible but can sound overly
    servile in this context.
