theological_decisions:
- issue: Rendering of אֲדֹנִי as a human/messenger address rather than a divine title
  chosen_reading: my lord
  alternative_readings:
  - sir
  - Lord
  rationale: The context is dialogue with the interpreting angel/messenger, so the
    term functions as a respectful human-directed honorific, not as the covenant name
    or necessarily a divine title. Lowercase 'lord' avoids conflation with the LORD
    while preserving the source term's dignity.
  doctrine_reference: Translate titles; transliterate names; original-language primacy
    over translation tradition.
