id: ZEC.4.12
reference: Zechariah 4:12
source:
  edition: WLC
  text: וָ/אַ֣עַן שֵׁנִ֔ית וָ/אֹמַ֖ר אֵלָ֑י/ו מַה שְׁתֵּ֞י שִׁבֲּלֵ֣י הַ/זֵּיתִ֗ים
    אֲשֶׁר֙ בְּ/יַ֗ד שְׁנֵי֙ צַנְתְּר֣וֹת הַ/זָּהָ֔ב הַֽ/מְרִיקִ֥ים מֵ/עֲלֵי/הֶ֖ם
    הַ/זָּהָֽב־׃
translation:
  text: Then I answered a second time and said to him, “What are these two olive branches
    that are beside the two golden spouts, which are pouring out the gold from themselves?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'these two clusters/sprays of the olive trees'; the Hebrew term is unusual
      here and may refer to fruit-bearing olive shoots rather than larger branches.
    reason: lexical_alternative
  - marker: b
    text: Or 'the two pipes of gold' or 'the two golden tubes.'
    reason: lexical_alternative
  - marker: c
    text: Likely referring to 'golden oil'; Hebrew literally says 'the gold.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וָ/אַ֣עַן
  chosen: Then I answered
  alternatives:
  - And I answered
  lexicon: HALOT
  rationale: Wayyiqtol of ענה continues the narrative. 'Then' conveys sequential movement
    naturally in English while preserving the response sense.
- source_word: שֵׁנִ֔ית
  chosen: a second time
  alternatives:
  - again
  lexicon: HALOT
  rationale: The adverb explicitly marks repetition. 'A second time' is slightly more
    precise than the simpler 'again' and reflects the Hebrew form.
- source_word: וָ/אֹמַ֖ר אֵלָ֑י/ו
  chosen: and said to him
  alternatives:
  - and asked him
  lexicon: HALOT
  rationale: The verb is 'said,' not the more interpretive 'asked,' though the content
    is interrogative. Retaining 'said to him' stays closer to the source.
- source_word: מַה
  chosen: What are these
  alternatives:
  - What are
  lexicon: HALOT
  rationale: The interrogative introduces identification of visible objects in the
    vision. 'These' is supplied idiomatically in English from the deictic context.
- source_word: שְׁתֵּי שִׁבֲּלֵי הַזֵּיתִים
  chosen: these two olive branches
  alternatives:
  - these two clusters of olives
  - these two ears/sprays of the olive trees
  lexicon: HALOT
  rationale: שִׁבֳּלִים commonly denotes ears/spikes, but here in a visionary botanical
    context it refers to branch-like olive offshoots bearing fruit. 'Olive branches'
    is the clearest natural rendering, though more literal alternatives are worth
    preserving.
- source_word: אֲשֶׁר בְּיַד
  chosen: that are beside
  alternatives:
  - that are in the hand of
  - that are by
  lexicon: HALOT
  rationale: Literally 'which are in/at the hand of.' In spatial descriptions this
    idiom often means 'beside' or 'next to.' Since inanimate objects are in view,
    'beside' best communicates the relation in English.
- source_word: שְׁנֵי צַנְתְּר֣וֹת הַזָּהָב
  chosen: the two golden spouts
  alternatives:
  - the two pipes of gold
  - the two golden tubes
  lexicon: HALOT
  rationale: צַנְתְּרוֹת is a rare term for channels/tubes in the lampstand vision.
    'Spouts' communicates a conduit from which liquid flows; 'golden' takes הַזָּהָב
    attributively.
- source_word: הַמְרִיקִים
  chosen: which are pouring out
  alternatives:
  - which empty out
  - which decant
  lexicon: HALOT
  rationale: The participle denotes causing to flow out or emptying. 'Pouring out'
    fits the imagery of oil flowing through the apparatus.
- source_word: מֵעֲלֵיהֶם
  chosen: from themselves
  alternatives:
  - through them
  - out of them
  lexicon: HALOT
  rationale: The prepositional phrase is difficult. Grammatically it means 'from upon
    them' or 'from them.' In context it refers to the olive branches as the source
    from which the substance comes. 'From themselves' preserves the source nuance
    without over-resolving the mechanics.
- source_word: הַזָּהָב
  chosen: the gold
  alternatives:
  - the golden oil
  lexicon: HALOT
  rationale: The Hebrew says 'the gold.' In the vision this likely refers metaphorically
    to golden oil, but the text itself uses 'gold,' probably because of the oil's
    appearance/value. The main text preserves the literal wording; the interpretive
    alternative is footnoted.
