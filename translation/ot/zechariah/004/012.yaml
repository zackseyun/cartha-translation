theological_decisions:
- issue: Interpretation of 'the gold' in the lampstand vision
  chosen_reading: Retain the literal phrase 'the gold' in the main text
  alternative_readings:
  - render as 'the golden oil'
  rationale: The verse is visionary and metaphorical. Translating literally preserves
    the imagery and avoids importing an explanatory interpretation into the text,
    while a footnote can clarify the likely referent.
  doctrine_reference: Translation philosophy §3, §5
