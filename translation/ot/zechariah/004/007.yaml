id: ZEC.4.7
reference: Zechariah 4:7
source:
  edition: WLC
  text: מִֽי אַתָּ֧ה הַֽר הַ/גָּד֛וֹל לִ/פְנֵ֥י זְרֻבָּבֶ֖ל לְ/מִישֹׁ֑ר וְ/הוֹצִיא֙
    אֶת הָ/אֶ֣בֶן הָ/רֹאשָׁ֔ה תְּשֻׁא֕וֹת חֵ֥ן חֵ֖ן לָֽ/הּ־־־׃פ
translation:
  text: Who are you, O great mountain? Before Zerubbabel you will become a plain.
    And he will bring out the top stone amid shouts of, ‘Grace, grace to it!’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the capstone'; literally 'the head stone.'
    reason: lexical_alternative
  - marker: b
    text: Or 'Favor, favor to it!' The Hebrew חֵן can mean 'grace,' 'favor,' or 'charm/beauty'
      depending on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַר הַגָּדוֹל
  chosen: O great mountain
  alternatives:
  - great mountain
  lexicon: HALOT
  rationale: Retains the metaphorical obstacle imagery with direct address. The vocative
    force is conveyed naturally in English with 'O,' though Hebrew has no separate
    vocative particle here.
- source_word: לְמִישֹׁר
  chosen: you will become a plain
  alternatives:
  - into level ground
  - into a plain
  lexicon: HALOT
  rationale: מִישׁוֹר denotes level ground/plain. 'Become a plain' preserves the transformation
    image more directly than a looser paraphrase.
- source_word: וְהוֹצִיא
  chosen: he will bring out
  alternatives:
  - he will bring forth
  - he will set out
  lexicon: HALOT
  rationale: The subject is best taken as Zerubbabel from context. 'Bring out' is
    a natural rendering of יצא in the Hiphil here, likely referring to producing or
    setting forth the final stone in the building process.
- source_word: הָאֶבֶן הָרֹאשָׁה
  chosen: the top stone
  alternatives:
  - the capstone
  - the chief stone
  - the head stone
  lexicon: HALOT
  rationale: Literally 'the head stone.' 'Top stone' is a clear modern rendering that
    preserves the architectural image without overcommitting to a technical term.
    Because 'capstone' is a common alternative and may fit the context, it is preserved
    in a footnote.
- source_word: תְּשֻׁאוֹת
  chosen: amid shouts of
  alternatives:
  - with shoutings of
  - to shouts of
  lexicon: HALOT
  rationale: The noun refers to loud cries or acclamations. 'Amid shouts of' reads
    naturally in English and captures the celebratory setting.
- source_word: חֵן חֵן לָהּ
  chosen: ‘Grace, grace to it!’
  alternatives:
  - '''Favor, favor to it!'''
  - '''Beautiful, beautiful is it!'''
  lexicon: HALOT
  rationale: חֵן commonly denotes favor/grace. 'Grace' best preserves the lexical
    and theological resonance in English. The repetition is retained for emphasis.
    לָהּ most naturally refers to the stone/building in the feminine.
