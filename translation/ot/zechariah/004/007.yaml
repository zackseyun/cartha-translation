theological_decisions:
- issue: Meaning of חֵן in the acclamation
  chosen_reading: grace/favor is being invoked or celebrated over the stone/building
  alternative_readings:
  - beauty/charm is being ascribed to it
  rationale: The Hebrew noun can denote favor, grace, or charm/beauty. In this prophetic
    temple-setting, 'grace' best preserves both the lexical sense and the theological
    tone of divine favor without forcing a narrower doctrinal claim.
  doctrine_reference: Translation philosophy §3, §6
