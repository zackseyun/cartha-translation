id: ZEC.4.14
reference: Zechariah 4:14
source:
  edition: WLC
  text: וַ/יֹּ֕אמֶר אֵ֖לֶּה שְׁנֵ֣י בְנֵֽי הַ/יִּצְהָ֑ר הָ/עֹמְדִ֖ים עַל אֲד֥וֹן כָּל
    הָ/אָֽרֶץ־־־׃
translation:
  text: And he said, “These are the two sons of fresh oil, who stand by the Lord of
    all the earth.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the two anointed ones.” Literally, “the two sons of fresh oil.”
    reason: lexical_alternative
  - marker: b
    text: Or “who stand before the Lord of all the earth.”
    reason: alternative_reading
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: And he said
  alternatives:
  - Then he said
  lexicon: HALOT
  rationale: Standard wayyiqtol narrative form of אמר, introducing the explanation
    that follows. 'And he said' preserves the simple narrative sequence.
- source_word: אֵלֶּה
  chosen: These are
  alternatives:
  - These
  lexicon: HALOT
  rationale: Demonstrative plural functioning predicatively with the implied copula
    in Hebrew; English supplies 'are' naturally.
- source_word: שְׁנֵי
  chosen: the two
  alternatives:
  - two
  lexicon: HALOT
  rationale: 'Construct form ''two of'' with following noun; English idiomatically
    renders with the article here: ''the two...'' referring back to the two olive
    trees/branches in the vision.'
- source_word: בְּנֵי הַיִּצְהָר
  chosen: sons of fresh oil
  alternatives:
  - sons of oil
  - anointed ones
  lexicon: HALOT
  rationale: Literally 'sons of the fresh oil.' יִצְהָר denotes fresh oil, especially
    olive oil. The literal expression is unusual and metaphorical; 'sons of fresh
    oil' preserves the Hebrew imagery better than the interpretive 'anointed ones.'
    Because 'anointed ones' is a common interpretive rendering, it is preserved in
    a footnote.
- source_word: הָעֹמְדִים
  chosen: who stand
  alternatives:
  - standing
  lexicon: HALOT
  rationale: Participle describing the two figures' ongoing position or role. Relative
    clause 'who stand' is natural English.
- source_word: עַל
  chosen: by
  alternatives:
  - before
  - beside
  lexicon: HALOT
  rationale: Although על often means 'on/upon,' in this idiom with 'stand' before
    a superior it can convey attendance in the presence of someone. 'By' gives clear
    modern English while preserving the sense of standing in attendance. Alternative
    'before' is viable and preserved in a footnote because it may better reflect courtly
    presence.
- source_word: אֲדוֹן
  chosen: Lord
  alternatives:
  - master
  lexicon: HALOT
  rationale: Title meaning 'lord/master.' 'Lord' is the best English rendering here
    for the exalted sovereign title, and it aligns with the project's default for
    analogous title language.
- source_word: כָּל הָאָרֶץ
  chosen: of all the earth
  alternatives:
  - of the whole earth
  lexicon: HALOT
  rationale: Genitival phrase expressing universal dominion. 'All the earth' is straightforward
    and idiomatic.
