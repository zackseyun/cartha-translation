theological_decisions:
- issue: Interpretation of בְּנֵי הַיִּצְהָר
  chosen_reading: Retain the metaphor as 'sons of fresh oil' in the main text rather
    than resolving it to 'anointed ones.'
  alternative_readings:
  - the two anointed ones
  rationale: The Hebrew expression is metaphorical and not identical to the standard
    adjective/participle for 'anointed.' Preserving the image avoids importing a more
    specific theological interpretation than the wording itself requires, while the
    common interpretive rendering is preserved in a footnote.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Nuance of עַל with הָעֹמְדִים
  chosen_reading: Render as 'stand by' rather than the more formal 'stand before.'
  alternative_readings:
  - stand before
  rationale: The phrase denotes attendance in the presence of the sovereign Lord.
    'By' is readable modern English and fits optimal equivalence, while 'before' is
    preserved in a footnote because it may capture the courtly nuance more explicitly.
  doctrine_reference: Translation philosophy §§3, 6
