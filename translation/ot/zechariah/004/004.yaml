theological_decisions:
- issue: Whether אֲדֹנִי refers to God/the Lord or to the interpreting angel
  chosen_reading: It refers to the angel as a respectful human-style address, rendered
    'my lord' in lowercase.
  alternative_readings:
  - It could be misunderstood by English readers as a divine title if capitalized
    'Lord'.
  rationale: The immediate addressee is 'the angel who was speaking with me.' Lowercase
    'lord' avoids conflating this with the divine title while preserving the respectful
    form of address.
  doctrine_reference: 'Contested terms table: κύριος/Kyrios → Lord; by analogy, divine
    titles should not be imported where the text addresses a non-divine figure.'
