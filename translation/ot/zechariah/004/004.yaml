id: ZEC.4.4
reference: Zechariah 4:4
source:
  edition: WLC
  text: וָ/אַ֨עַן֙ וָֽ/אֹמַ֔ר אֶל הַ/מַּלְאָ֛ךְ הַ/דֹּבֵ֥ר בִּ֖/י לֵ/אמֹ֑ר מָה אֵ֖לֶּה
    אֲדֹנִֽ/י־־׃
translation:
  text: Then I answered and said to the angel who was speaking with me, “What are
    these, my lord?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'who talked with me.' The Hebrew expression is a recurring formula in
      Zechariah for the interpreting angel accompanying the prophet.
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאַעַן
  chosen: Then I answered
  alternatives:
  - And I answered
  - So I answered
  lexicon: HALOT
  rationale: ענה in the qal wayyiqtol commonly introduces a response in narrative.
    'Then' reflects the sequential waw in natural English while preserving the discourse
    flow.
- source_word: וָאֹמַר
  chosen: and said
  alternatives:
  - and asked
  - saying
  lexicon: HALOT
  rationale: אמר is the standard verb 'say.' Retaining both 'answered' and 'said'
    reflects the Hebrew double-verb idiom rather than collapsing it, since both verbs
    are present and contribute to the narrative style.
- source_word: הַמַּלְאָךְ
  chosen: the angel
  alternatives:
  - the messenger
  lexicon: HALOT
  rationale: מלאך can mean 'messenger' or 'angel.' In Zechariah's visionary context,
    a heavenly interpreting figure is in view, so 'angel' best matches the referent.
- source_word: הַדֹּבֵר בִּי
  chosen: who was speaking with me
  alternatives:
  - who spoke with me
  - who talked with me
  - who was speaking in me
  lexicon: HALOT
  rationale: The participle דֹבֵר with בְּ plus pronominal suffix in this recurring
    Zechariah formula denotes ongoing speech/conversation with the prophet. 'With
    me' is the idiomatic sense here; 'in me' would be overly literal and misleading
    in context.
- source_word: לֵאמֹר
  chosen: omitted in English as redundant after 'said'
  alternatives:
  - saying
  lexicon: HALOT
  rationale: The infinitive לֵאמֹר often functions as a speech introducer. In English,
    direct quotation after 'said' already conveys this, so it is not separately represented
    to avoid awkwardness.
- source_word: מָה אֵלֶּה
  chosen: What are these
  alternatives:
  - What are these things
  lexicon: HALOT
  rationale: This is a straightforward interrogative plus demonstrative plural. English
    idiom prefers 'What are these?' without adding 'things,' though that sense is
    implicit.
- source_word: אֲדֹנִי
  chosen: my lord
  alternatives:
  - sir
  - my master
  lexicon: HALOT
  rationale: אדני here is a respectful address to the angelic interlocutor, not the
    divine name. 'My lord' preserves the elevated tone and the lexical connection
    to אדון better than the flatter 'sir.' 'My master' is possible but less natural
    in this dialogue.
