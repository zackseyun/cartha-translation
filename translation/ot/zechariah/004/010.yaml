id: ZEC.4.10
reference: Zechariah 4:10
source:
  edition: WLC
  text: כִּ֣י מִ֣י בַז֮ לְ/י֣וֹם קְטַנּוֹת֒ וְ/שָׂמְח֗וּ וְ/רָא֞וּ אֶת הָ/אֶ֧בֶן הַ/בְּדִ֛יל
    בְּ/יַ֥ד זְרֻבָּבֶ֖ל שִׁבְעָה אֵ֑לֶּה עֵינֵ֣י יְהוָ֔ה הֵ֥מָּה מְשׁוֹטְטִ֖ים בְּ/כָל
    הָ/אָֽרֶץ־־־׃
translation:
  text: For who has despised the day of small things? For these seven will rejoice
    when they see the plumb stone in the hand of Zerubbabel—these are the eyes of
    the LORD, ranging through all the earth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the tin stone,' traditionally 'the plummet.' The Hebrew term can denote
      tin, but in this building context it likely refers to a plumb weight or measuring
      stone.
    reason: lexical_alternative
lexical_decisions:
- source_word: בַז
  chosen: has despised
  alternatives:
  - has scorned
  - has looked down on
  lexicon: HALOT
  rationale: The verb denotes treating something as insignificant or contemptible.
    'Has despised' is a natural English rendering that preserves the rhetorical force
    of the question.
- source_word: לְיוֹם קְטַנּוֹת
  chosen: the day of small things
  alternatives:
  - the day of small beginnings
  - a day of insignificance
  lexicon: HALOT
  rationale: Formally the Hebrew is 'day of small things/smallnesses.' 'Small things'
    keeps the concrete Hebrew expression without over-interpreting it as only 'beginnings,'
    though that sense is contextually related.
- source_word: וְשָׂמְחוּ
  chosen: will rejoice
  alternatives:
  - and they rejoiced
  - shall be glad
  lexicon: HALOT
  rationale: 'In context this is best taken as a future/resultative statement tied
    to the rhetorical question: those who do not despise the small day will rejoice.
    English future smooths the sequence with the following ''when they see.'''
- source_word: וְרָאוּ
  chosen: when they see
  alternatives:
  - and see
  - for they will see
  lexicon: HALOT
  rationale: Rendered temporally in English to express the close relation between
    rejoicing and seeing the sign of completion in Zerubbabel's hand.
- source_word: הָאֶבֶן הַבְּדִיל
  chosen: the plumb stone
  alternatives:
  - the tin stone
  - the plummet
  - the measuring stone
  lexicon: HALOT
  rationale: Though בְּדִיל can denote 'tin,' in this construction and context of
    temple building it most likely refers to a plumb weight/plummet. 'Plumb stone'
    is clear modern English while staying close to the imagery. Because 'tin stone'
    is a possible more literal lexical alternative, it is preserved in a footnote.
- source_word: בְּיַד זְרֻבָּבֶל
  chosen: in the hand of Zerubbabel
  alternatives:
  - in Zerubbabel's hand
  lexicon: HALOT
  rationale: A straightforward rendering of the idiom; 'in the hand of Zerubbabel'
    preserves the Hebrew phrasing and emphasis on his active role.
- source_word: שִׁבְעָה אֵלֶּה
  chosen: these seven
  alternatives:
  - those seven
  lexicon: HALOT
  rationale: The demonstrative points to the seven already in view in the vision.
    'These seven' preserves the deictic force and prepares for the appositional explanation
    that follows.
- source_word: עֵינֵי יְהוָה
  chosen: the eyes of the LORD
  alternatives:
  - the LORD's eyes
  lexicon: HALOT
  rationale: This is theologically and imagistically significant language. The covenant
    name יְהוָה follows project policy as 'the LORD.' The construct phrase is kept
    explicit.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine table, the default rendering of the divine name is 'the
    LORD,' following Jewish reverence tradition and longstanding English convention.
- source_word: מְשׁוֹטְטִים בְּכָל הָאָרֶץ
  chosen: ranging through all the earth
  alternatives:
  - roaming through all the earth
  - going to and fro through all the earth
  lexicon: HALOT
  rationale: The participle conveys active movement throughout the whole earth. 'Ranging
    through' is idiomatic modern English and preserves the sense of comprehensive
    searching movement.
