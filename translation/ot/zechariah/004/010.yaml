theological_decisions:
- issue: Identity of 'these seven'
  chosen_reading: '''These seven'' refers appositionally to ''the eyes of the LORD''
    in the visionary symbolism.'
  alternative_readings:
  - '''These seven'' refers to seven lamps, then secondarily identified with the LORD''s
    eyes'
  rationale: The Hebrew syntax places 'these seven' immediately before 'the eyes of
    the LORD,' naturally yielding an appositional explanation. The translation preserves
    the symbolic linkage without over-specifying beyond the text.
