id: ZEC.4.6
reference: Zechariah 4:6
source:
  edition: WLC
  text: וַ/יַּ֜עַן וַ/יֹּ֤אמֶר אֵלַ/י֙ לֵ/אמֹ֔ר זֶ֚ה דְּבַר יְהוָ֔ה אֶל זְרֻבָּבֶ֖ל
    לֵ/אמֹ֑ר לֹ֤א בְ/חַ֨יִל֙ וְ/לֹ֣א בְ/כֹ֔חַ כִּ֣י אִם בְּ/רוּחִ֔/י אָמַ֖ר יְהוָ֥ה
    צְבָאֽוֹת־־־׃
translation:
  text: 'Then he answered and said to me, “This is the word of the LORD to Zerubbabel:
    ‘Not by might and not by power, but by my Spirit,’ says the LORD of Armies.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Not by army and not by power,” since the Hebrew word for “might” can
      also refer to military force.
    reason: lexical_alternative
  - marker: b
    text: 'Traditional rendering: “the LORD of hosts.”'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַן
  chosen: Then he answered
  alternatives:
  - And he answered
  lexicon: HALOT
  rationale: Wayyiqtol narrative form introducing the response. 'Then' reflects normal
    English narrative flow while preserving sequence.
- source_word: וַיֹּאמֶר אֵלַי
  chosen: and said to me
  alternatives:
  - and said to me, saying
  lexicon: HALOT
  rationale: Standard speech introduction. The following לֵאמֹר is not carried woodenly
    as 'saying' in English because it is idiomatic and redundant here.
- source_word: זֶה דְּבַר יְהוָה
  chosen: This is the word of the LORD
  alternatives:
  - This is the message of the LORD
  lexicon: HALOT
  rationale: דָּבָר can mean 'word' or 'message.' 'Word' preserves prophetic formula
    and intertextual resonance while remaining natural English.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following Jewish reverence tradition and longstanding English convention.
- source_word: אֶל זְרֻבָּבֶל
  chosen: to Zerubbabel
  alternatives:
  - for Zerubbabel
  lexicon: HALOT
  rationale: 'אֶל most naturally marks direction/addressee here: the prophetic word
    is addressed to Zerubbabel.'
- source_word: לֹא בְחַיִל
  chosen: Not by might
  alternatives:
  - Not by army
  - Not by military force
  lexicon: HALOT
  rationale: חַיִל can denote strength, wealth, army, or military force. In parallel
    with כֹּחַ and in this proverbial formulation, 'might' best preserves breadth
    while allowing military overtones to remain implicit.
- source_word: וְלֹא בְכֹחַ
  chosen: and not by power
  alternatives:
  - nor by power
  - and not by strength
  lexicon: HALOT
  rationale: כֹּחַ denotes strength/power. 'Power' gives a natural English parallel
    with 'might' and preserves the rhetorical contrast with God's Spirit.
- source_word: כִּי אִם
  chosen: but
  alternatives:
  - but rather
  - except
  lexicon: HALOT
  rationale: Idiomatic adversative-exceptive construction. 'But' is the clearest concise
    English rendering in this contrastive statement.
- source_word: בְּרוּחִי
  chosen: by my Spirit
  alternatives:
  - by my spirit
  - through my Spirit
  lexicon: HALOT
  rationale: רוּחַ can mean wind, breath, or spirit. In this prophetic and theological
    context, with first-person suffix referring to the LORD, 'my Spirit' is the most
    fitting. 'By' matches the instrumental contrast with 'by might' and 'by power.'
    Capitalization reflects reference to God's Spirit in English style, not a distinct
    lexical feature in Hebrew.
- source_word: אָמַר יְהוָה צְבָאוֹת
  chosen: says the LORD of Armies
  alternatives:
  - says the LORD of hosts
  - declares the LORD of Armies
  lexicon: HALOT
  rationale: אָמַר in prophetic formula is naturally rendered 'says.' צְבָאוֹת is
    literally 'armies/hosts.' 'LORD of Armies' translates the title rather than preserving
    the traditional but less transparent 'hosts.'
