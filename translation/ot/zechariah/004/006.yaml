theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering for
    YHWH. This preserves covenantal force in standard English Bible style without
    transliterating the name.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Rendering צְבָאוֹת in the divine title
  chosen_reading: the LORD of Armies
  alternative_readings:
  - the LORD of hosts
  rationale: The translation philosophy prefers translating titles to preserve meaning.
    'Armies' is more transparent to modern readers than 'hosts,' while retaining the
    martial and heavenly connotations of the Hebrew title.
  doctrine_reference: DOCTRINE.md Translation philosophy §2 (Translate titles; transliterate
    names)
