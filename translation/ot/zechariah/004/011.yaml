id: ZEC.4.11
reference: Zechariah 4:11
source:
  edition: WLC
  text: וָ/אַ֖עַן וָ/אֹמַ֣ר אֵלָ֑י/ו מַה שְּׁנֵ֤י הַ/זֵּיתִים֙ הָ/אֵ֔לֶה עַל יְמִ֥ין
    הַ/מְּנוֹרָ֖ה וְ/עַל שְׂמֹאולָֽ/הּ־־־׃
translation:
  text: Then I answered and said to him, “What are these two olive trees at the right
    of the lampstand and at its left?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'What [are] these two olive trees upon the right of the
      lampstand and upon its left?'
    reason: lexical_alternative
lexical_decisions:
- source_word: וָ/אַעַן
  chosen: Then I answered
  alternatives:
  - And I answered
  - So I answered
  lexicon: HALOT
  rationale: Wayyiqtol of ענה introduces the next action in sequence. 'Then' conveys
    the narrative progression naturally in English without overstating contrast.
- source_word: וָ/אֹמַר
  chosen: and said
  alternatives:
  - and asked
  - saying
  lexicon: HALOT
  rationale: אמר is the standard verb 'say.' Although the content is a question, retaining
    'said' reflects the Hebrew idiom 'answered and said' more closely than collapsing
    it to 'asked.'
- source_word: אֵלָיו
  chosen: to him
  alternatives:
  - to the angel
  - to him
  lexicon: HALOT
  rationale: The pronominal object is explicit in Hebrew but its antecedent is supplied
    from context. Main text keeps the pronoun only, avoiding importing an explanatory
    noun not present in this verse.
- source_word: מַה
  chosen: What are
  alternatives:
  - What is
  - What mean
  lexicon: HALOT
  rationale: With the plural subject 'these two olive trees,' English requires a plural
    copula. 'What are' is the most natural equivalent for the inquiry.
- source_word: שְׁנֵי הַזֵּיתִים הָאֵלֶּה
  chosen: these two olive trees
  alternatives:
  - these two olivewoods
  - these two olive branches
  lexicon: HALOT
  rationale: זֵיתִים here denotes olive trees, not branches; branches are mentioned
    in the following verse with a different term. 'These two olive trees' preserves
    the demonstrative and number.
- source_word: עַל
  chosen: at
  alternatives:
  - 'on'
  - beside
  - by
  lexicon: HALOT
  rationale: Although עַל often means 'on/upon,' with spatial orientation here it
    describes position relative to the lampstand. 'At' gives idiomatic English for
    objects located on either side without implying physical contact on top of it.
- source_word: יְמִין
  chosen: the right
  alternatives:
  - the right side
  - the south side
  lexicon: HALOT
  rationale: יָמִין means 'right hand/right side.' 'The right' is concise and natural
    with the following possessive construction.
- source_word: הַמְּנוֹרָה
  chosen: the lampstand
  alternatives:
  - the menorah
  - the lamp
  lexicon: HALOT
  rationale: מְנוֹרָה refers to a lampstand. 'Lampstand' translates the common noun
    rather than transliterating, in keeping with the philosophy of translating meaningful
    terms.
- source_word: וְעַל שְׂמֹאולָהּ
  chosen: and at its left
  alternatives:
  - and on its left side
  - and at its left side
  lexicon: HALOT
  rationale: שְׂמֹאול with 3fs suffix refers back to the feminine noun 'lampstand.'
    'Its left' is a natural English rendering of the suffixed form, parallel to 'the
    right of the lampstand.'
