id: ZEC.4.1
reference: Zechariah 4:1
source:
  edition: WLC
  text: וַ/יָּ֕שָׁב הַ/מַּלְאָ֖ךְ הַ/דֹּבֵ֣ר בִּ֑/י וַ/יְעִירֵ֕/נִי כְּ/אִ֖ישׁ אֲשֶׁר
    יֵע֥וֹר מִ/שְּׁנָתֽ/וֹ־׃
translation:
  text: Then the angel who was speaking with me returned and woke me, like a man who
    is awakened from his sleep.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'who wakes from his sleep.' The Hebrew verb can be understood in a passive/reflexive
      sense ('is awakened') or expressed more intransitively in English.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּשָׁב
  chosen: returned
  alternatives:
  - came back
  - turned back
  lexicon: HALOT
  rationale: The verb שוב commonly means 'return/turn back.' In this narrative setting,
    'returned' fits naturally with the angel resuming interaction with the prophet
    better than the more wooden 'turned back.'
- source_word: הַמַּלְאָךְ
  chosen: the angel
  alternatives:
  - the messenger
  lexicon: HALOT
  rationale: Although מלאך can mean 'messenger,' in prophetic vision contexts 'angel'
    is the clearest and most idiomatic rendering for a heavenly intermediary.
- source_word: הַדֹּבֵר בִּי
  chosen: who was speaking with me
  alternatives:
  - who spoke with me
  - who talked with me
  lexicon: HALOT
  rationale: The participle with preposition indicates the angel characterized as
    the one speaking with Zechariah. 'Was speaking with me' preserves the participial
    sense and the relational preposition better than the traditional but less literal
    'talked with me.'
- source_word: וַיְעִירֵנִי
  chosen: woke me
  alternatives:
  - awakened me
  - roused me
  lexicon: HALOT
  rationale: The Hiphil of עור means to awaken. 'Woke me' is natural modern English;
    the simile that follows retains the formal sense.
- source_word: כְּאִישׁ
  chosen: like a man
  alternatives:
  - as a man
  lexicon: HALOT
  rationale: The masculine singular noun is retained as 'man' in keeping with the
    gender-accurate policy and because the comparison is singular and generic.
- source_word: אֲשֶׁר יֵעוֹר מִשְּׁנָתוֹ
  chosen: who is awakened from his sleep
  alternatives:
  - who wakes from his sleep
  - who is roused from his sleep
  lexicon: HALOT
  rationale: The Niphal of עור is naturally passive/reflexive ('is awakened'/'awakens').
    'Is awakened from his sleep' best matches the stem and parallels the preceding
    causative verb, though English could also express it intransitively.
