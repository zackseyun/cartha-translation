theological_decisions:
- issue: Referent and force of אֲדֹנִי
  chosen_reading: 'a respectful address to the interpreting angel: ''my lord'''
  alternative_readings:
  - sir
  - my master
  rationale: The term does not refer to YHWH here but to the angel speaking with Zechariah.
    Rendering it 'my lord' preserves the honorific without importing deity. Lowercase
    in English avoids confusion with the divine title 'Lord.'
  doctrine_reference: 'Translation philosophy: original-language primacy; translate
    titles accurately without importing doctrinal claims'
