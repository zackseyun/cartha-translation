id: ZEC.4.5
reference: Zechariah 4:5
source:
  edition: WLC
  text: וַ֠/יַּעַן הַ/מַּלְאָ֞ךְ הַ/דֹּבֵ֥ר בִּ/י֙ וַ/יֹּ֣אמֶר אֵלַ֔/י הֲ/ל֥וֹא יָדַ֖עְתָּ
    מָה הֵ֣מָּה אֵ֑לֶּה וָ/אֹמַ֖ר לֹ֥א אֲדֹנִֽ/י־׃
translation:
  text: Then the angel who was speaking with me answered and said to me, “Do you not
    know what these are?” And I said, “No, my lord.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “who talked with me.” The Hebrew idiom describes the angel engaged in
      ongoing conversation with Zechariah.
    reason: lexical_alternative
  - marker: b
    text: Or “sir.” Hebrew “my lord,” a respectful form of address to the angel, not
      a reference to the LORD.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַן
  chosen: answered
  alternatives:
  - responded
  lexicon: HALOT
  rationale: The verb ענה in this narrative formula commonly means 'answer/respond.'
    'Answered' fits the conventional dialogue setting and pairs naturally with the
    following 'said.'
- source_word: הַמַּלְאָךְ
  chosen: the angel
  alternatives:
  - the messenger
  lexicon: HALOT
  rationale: מַלְאָךְ can mean 'messenger' or 'angel.' In Zechariah's vision reports,
    the figure is a heavenly interpreter, so 'angel' best reflects the narrative context.
- source_word: הַדֹּבֵר בִּי
  chosen: who was speaking with me
  alternatives:
  - who spoke with me
  - who talked with me
  lexicon: HALOT
  rationale: The participle דֹּבֵר with בְּ plus pronoun is an idiom in Zechariah
    for the interpreting angel in ongoing conversation. 'Speaking with me' preserves
    the progressive, descriptive force better than the more traditional but less precise
    'talked with me.'
- source_word: וַיֹּאמֶר אֵלַי
  chosen: said to me
  alternatives:
  - told me
  lexicon: HALOT
  rationale: A standard rendering of אמר אל. 'Said to me' is straightforward and preserves
    the direct-speech introduction.
- source_word: הֲלוֹא
  chosen: Do you not
  alternatives:
  - Do you not indeed
  - Surely you know
  lexicon: HALOT
  rationale: The interrogative particle with negation introduces a rhetorical question.
    'Do you not' preserves the form without over-interpreting the tone.
- source_word: יָדַעְתָּ
  chosen: know
  alternatives:
  - understand
  lexicon: HALOT
  rationale: ידע primarily means 'know.' While 'understand' is possible in context,
    'know' stays closer to the Hebrew and works naturally in English.
- source_word: מָה הֵמָּה אֵלֶּה
  chosen: what these are
  alternatives:
  - what these things are
  lexicon: HALOT
  rationale: This clause asks for the identity/significance of the visionary objects.
    'What these are' is idiomatic and sufficiently literal.
- source_word: וָאֹמַר
  chosen: And I said
  alternatives:
  - Then I said
  lexicon: HALOT
  rationale: The waw-consecutive continues the dialogue sequence. 'And I said' is
    a natural narrative rendering.
- source_word: לֹא
  chosen: 'No'
  alternatives:
  - I do not know
  lexicon: HALOT
  rationale: The Hebrew gives a brief negative reply. 'No' captures the concise response;
    the implied verb is supplied by the preceding question.
- source_word: אֲדֹנִי
  chosen: my lord
  alternatives:
  - sir
  - my master
  lexicon: HALOT
  rationale: אֲדֹנִי here is a respectful address to the angelic interlocutor, not
    the divine name. 'My lord' preserves the honorific force and the source wording
    better than the flatter 'sir.'
