id: ZEC.4.9
reference: Zechariah 4:9
source:
  edition: WLC
  text: יְדֵ֣י זְרֻבָּבֶ֗ל יִסְּד֛וּ הַ/בַּ֥יִת הַ/זֶּ֖ה וְ/יָדָ֣י/ו תְּבַצַּ֑עְנָה וְ/יָ֣דַעְתָּ֔ כִּֽי יְהוָ֥ה צְבָא֖וֹת שְׁלָחַ֥/נִי אֲלֵי/כֶֽם־׃
translation:
  text: The hands of Zerubbabel laid the foundation of this house, and his hands will complete it. Then you will know that Yahweh of Armies has sent me to you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more traditionally, 'the LORD of hosts.'
    reason: lexical_alternative
  - marker: b
    text: '''This house'' refers to the temple.'
    reason: cultural_note
lexical_decisions:
- source_word: יְדֵי
  chosen: the hands of
  alternatives:
  - the hand of
  lexicon: HALOT
  rationale: Hebrew dual/plural construct of 'hand' is idiomatically rendered 'the hands of,' preserving the emphasis on Zerubbabel's personal agency.
- source_word: יִסְּדוּ
  chosen: laid the foundation of
  alternatives:
  - founded
  - established the foundation of
  lexicon: HALOT
  rationale: From יסד, in temple-building context the sense is specifically laying a foundation. English verbal phrase makes the construction natural and explicit.
- source_word: הַבַּיִת הַזֶּה
  chosen: this house
  alternatives:
  - this temple
  lexicon: HALOT
  rationale: בַּיִת literally means 'house.' In context it refers to the temple, but 'house' preserves the Hebrew wording and its theological resonance for the house of the LORD without over-paraphrasing.
- source_word: וְיָדָיו
  chosen: and his hands
  alternatives:
  - and he
  - and his hand
  lexicon: HALOT
  rationale: Retains the repeated 'hands' imagery from the Hebrew, which highlights continuity between beginning and completion.
- source_word: תְּבַצַּעְנָה
  chosen: will complete it
  alternatives:
  - will finish it
  - will carry it through
  lexicon: HALOT
  rationale: The verb conveys bringing a task to completion. 'Complete it' is clear modern English and fits the building context. The object 'it' is supplied naturally from 'this house.'
- source_word: וְיָדַעְתָּ
  chosen: Then you will know
  alternatives:
  - and you will know
  lexicon: HALOT
  rationale: The conjunction plus perfect can function with future/result sense in prophetic discourse. 'Then' brings out the consequential force after the temple's completion.
- source_word: יְהוָה צְבָאוֹת
  chosen: the LORD of Armies
  alternatives:
  - the LORD of hosts
  lexicon: HALOT
  rationale: Per doctrine, יהוה is rendered 'the LORD.' צְבָאוֹת is translated rather than preserved in traditional form; 'of Armies' communicates the Hebrew meaning accessibly in modern English.
- source_word: שְׁלָחַנִי
  chosen: has sent me
  alternatives:
  - sent me
  lexicon: HALOT
  rationale: 'The perfect is rendered with present relevance in English: the speaker''s commission stands as an accomplished act with ongoing force.'
- source_word: אֲלֵיכֶם
  chosen: to you
  alternatives:
  - to all of you
  lexicon: HALOT
  rationale: Second person masculine plural is naturally rendered 'to you' in English; plurality is not marked in the main text unless needed for clarity.
