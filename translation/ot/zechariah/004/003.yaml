id: ZEC.4.3
reference: Zechariah 4:3
source:
  edition: WLC
  text: וּ/שְׁנַ֥יִם זֵיתִ֖ים עָלֶ֑י/הָ אֶחָד֙ מִ/ימִ֣ין הַ/גֻּלָּ֔ה וְ/אֶחָ֖ד עַל
    שְׂמֹאלָֽ/הּ־׃
translation:
  text: And two olive trees were beside it, one on the right of the bowl and one on
    its left.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'upon it' / 'over it'; the Hebrew preposition can be broader than strict
      adjacency, but the following right/left descriptions favor the sense 'beside
      it.'
    reason: lexical_alternative
  - marker: b
    text: That is, the bowl-like oil container in the lampstand vision.
    reason: cultural_note
lexical_decisions:
- source_word: וּ/שְׁנַיִם
  chosen: And two
  alternatives:
  - Now two
  lexicon: HALOT
  rationale: The conjunction waw here naturally continues the vision description,
    so 'And' is the most straightforward discourse connector. 'Two' preserves the
    cardinal number explicitly.
- source_word: זֵיתִים
  chosen: olive trees
  alternatives:
  - olives
  lexicon: HALOT
  rationale: Though the noun can denote olives/olive trees by form, in this visionary
    spatial context with positional phrases on the right and left, 'olive trees' is
    the clear sense.
- source_word: עָלֶיהָ
  chosen: beside it
  alternatives:
  - upon it
  - by it
  - over it
  lexicon: HALOT
  rationale: The preposition על can have a broader spatial range than strict 'on/upon.'
    Since the following clauses locate the trees to the right and left of the bowl/lampstand
    apparatus, idiomatic English 'beside it' best captures the relation without implying
    literal placement on top.
- source_word: אֶחָד
  chosen: one
  lexicon: HALOT
  rationale: 'Simple distributive use: one tree on one side.'
- source_word: מִ/ימִין
  chosen: on the right of
  alternatives:
  - at the right of
  - to the right of
  lexicon: HALOT
  rationale: The phrase marks position at the right side. 'On the right of' is natural
    English and keeps the spatial relation clear.
- source_word: הַגֻּלָּה
  chosen: the bowl
  alternatives:
  - the basin
  - the reservoir
  lexicon: HALOT
  rationale: In the lampstand vision, גֻּלָּה refers to the bowl-like oil container
    atop the lampstand. 'Bowl' is the most direct and readable rendering.
- source_word: וְ/אֶחָד
  chosen: and one
  lexicon: HALOT
  rationale: Coordinates the second member of the pair in a balanced structure.
- source_word: עַל שְׂמֹאלָהּ
  chosen: on its left
  alternatives:
  - to its left
  - on the left side of it
  lexicon: HALOT
  rationale: The phrase indicates the corresponding position on the left side. 'On
    its left' is concise and mirrors the Hebrew structure well.
