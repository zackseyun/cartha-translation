id: ZEC.4.2
reference: Zechariah 4:2
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר אֵלַ֔/י מָ֥ה אַתָּ֖ה רֹאֶ֑ה ו/יאמר רָאִ֣יתִי וְ/הִנֵּ֣ה מְנוֹרַת֩
    זָהָ֨ב כֻּלָּ֜/הּ וְ/גֻלָּ֣הּ עַל רֹאשָׁ֗/הּ וְ/שִׁבְעָ֤ה נֵרֹתֶ֨י/הָ֙ עָלֶ֔י/הָ
    שִׁבְעָ֤ה וְ/שִׁבְעָה֙ מֽוּצָק֔וֹת לַ/נֵּר֖וֹת אֲשֶׁ֥ר עַל רֹאשָֽׁ/הּ׀־־׃
translation:
  text: And he said to me, “What do you see?” And I said, “I see, and behold, a lampstand
    all of gold, with its bowl on top of it, and seven lamps on it, with seven and
    seven spouts for the lamps that are on top of it.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “seven each”; the Hebrew repeats the number literally, “seven and seven,”
      likely expressing distribution.
    reason: lexical_alternative
  - marker: b
    text: Or “pipes,” “channels,” or “tubes” for the lamps.
    reason: lexical_alternative
lexical_decisions:
- source_word: מָה אַתָּה רֹאֶה
  chosen: What do you see?
  alternatives:
  - What are you seeing?
  lexicon: HALOT
  rationale: The Hebrew uses a simple interrogative plus participle of ראה. Idiomatic
    modern English renders this as a present question, 'What do you see?' rather than
    the more wooden 'What are you seeing?'.
- source_word: רָאִיתִי
  chosen: I see
  alternatives:
  - I have seen
  - I looked
  lexicon: HALOT
  rationale: Although formally perfect, in this vision-report context it functions
    naturally as a present report of perception. 'I see' fits the immediate exchange
    and standard English style in prophetic vision narratives.
- source_word: וְהִנֵּה
  chosen: and behold
  alternatives:
  - and look
  - behold
  lexicon: HALOT
  rationale: הִנֵּה marks vivid presentation of what is seen. 'And behold' preserves
    the deictic force and the heightened visionary tone better than omitting it.
- source_word: מְנוֹרַת זָהָב כֻּלָּהּ
  chosen: a lampstand all of gold
  alternatives:
  - a golden lampstand
  - a lampstand wholly of gold
  lexicon: HALOT
  rationale: מְנוֹרָה is best rendered 'lampstand.' The phrase כֻּלָּהּ emphasizes
    total composition, so 'all of gold' preserves that emphasis more explicitly than
    simply 'golden.'
- source_word: גֻלָּהּ
  chosen: its bowl
  alternatives:
  - its reservoir
  - its basin
  lexicon: HALOT
  rationale: The noun refers to a rounded container associated with the lampstand.
    'Bowl' is the most natural and sufficiently precise English rendering; 'reservoir'
    is interpretive and can be preserved conceptually in study notes if needed.
- source_word: עַל רֹאשָׁהּ
  chosen: on top of it
  alternatives:
  - upon its top
  - on its top
  lexicon: HALOT
  rationale: Literally 'on its head/top.' 'On top of it' is clear modern English and
    preserves the spatial image.
- source_word: שִׁבְעָה נֵרֹתֶיהָ עָלֶיהָ
  chosen: seven lamps on it
  alternatives:
  - its seven lamps upon it
  - seven lamps above it
  lexicon: HALOT
  rationale: This describes the seven lamps belonging to the lampstand and situated
    on it. 'On it' is the clearest idiomatic rendering.
- source_word: שִׁבְעָה וְשִׁבְעָה
  chosen: seven and seven
  alternatives:
  - seven each
  - seven apiece
  lexicon: HALOT
  rationale: The Hebrew repeats the number for emphasis/distribution. Retaining 'seven
    and seven' preserves the form of the text and leaves the exact distributive nuance
    visible to the reader.
- source_word: מֽוּצָקוֹת
  chosen: spouts
  alternatives:
  - pipes
  - channels
  - tubes
  lexicon: HALOT
  rationale: The term denotes poured or cast conduits associated with supplying the
    lamps. 'Spouts' fits the imagery of a bowl feeding lamps while remaining understandable
    in modern English. Because the exact implement can also be understood as 'pipes'
    or 'channels,' those alternatives are preserved in a footnote.
- source_word: לַנֵּרוֹת אֲשֶׁר עַל רֹאשָׁהּ
  chosen: for the lamps that are on top of it
  alternatives:
  - for the lamps that are at its top
  - to the lamps on top of it
  lexicon: HALOT
  rationale: This phrase identifies the destination of the conduits and again locates
    the lamps at the top of the lampstand. 'For the lamps that are on top of it' is
    natural and sufficiently close to the Hebrew syntax.
