id: ZEC.2.6
reference: Zechariah 2:6
source:
  edition: WLC
  text: וָ/אֹמַ֕ר אָ֖נָה אַתָּ֣ה הֹלֵ֑ךְ וַ/יֹּ֣אמֶר אֵלַ֗/י לָ/מֹד֙ אֶת יְר֣וּשָׁלִַ֔ם
    לִ/רְא֥וֹת כַּ/מָּֽה רָחְבָּ֖/הּ וְ/כַ/מָּ֥ה אָרְכָּֽ/הּ־־׃
translation:
  text: And I said, “Where are you going?” And he said to me, “To measure Jerusalem,
    to see how wide it is and how long it is.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, “To where are you going?”
    reason: lexical_alternative
  - marker: b
    text: Hebrew literally, “to see how much its width and how much its length,” an
      idiom meaning “to see how wide it is and how long it is.”
    reason: lexical_alternative
lexical_decisions:
- source_word: אָ֖נָה
  chosen: Where
  alternatives:
  - To where
  lexicon: HALOT
  rationale: Interrogative adverb asking destination. English 'Where are you going?'
    is the most natural equivalent while preserving the directional sense.
- source_word: הֹלֵ֑ךְ
  chosen: are you going
  alternatives:
  - do you go
  - are you walking
  lexicon: HALOT
  rationale: הלך denotes going/walking; in this question of destination, 'are you
    going' is idiomatic modern English and fits the participial form used with the
    pronoun.
- source_word: לָ/מֹד֙
  chosen: To measure
  alternatives:
  - To survey
  lexicon: HALOT
  rationale: The infinitive of מדד means 'to measure.' 'Survey' is possible in context
    but less direct; 'measure' preserves the concrete action.
- source_word: אֶת יְר֣וּשָׁלִַ֔ם
  chosen: Jerusalem
  lexicon: HALOT
  rationale: Direct object marker plus proper name; standard transliteration of the
    city name.
- source_word: לִ/רְא֥וֹת
  chosen: to see
  alternatives:
  - to determine
  - to find out
  lexicon: HALOT
  rationale: ראה literally means 'to see.' In context it introduces the purpose of
    measurement; retaining 'to see' preserves the Hebrew idiom without over-interpreting.
- source_word: כַּ/מָּֽה
  chosen: how wide
  alternatives:
  - what its width is
  - how great its breadth is
  lexicon: HALOT
  rationale: Interrogative 'how much/how great' with the following noun of dimension.
    'How wide' is natural English for the city's breadth.
- source_word: רָחְבָּ֖/הּ
  chosen: it is
  alternatives:
  - its width
  lexicon: HALOT
  rationale: From רחב 'breadth/width' with 3fs suffix referring to Jerusalem. In English,
    'how wide it is' is smoother than the more wooden 'what its width is' while preserving
    meaning.
- source_word: וְ/כַ/מָּ֥ה
  chosen: and how long
  alternatives:
  - and what its length is
  lexicon: HALOT
  rationale: Parallel interrogative phrase introducing the second dimension; 'and
    how long' preserves the symmetry and reads naturally.
- source_word: אָרְכָּֽ/הּ
  chosen: it is
  alternatives:
  - its length
  lexicon: HALOT
  rationale: From ארך 'length' with 3fs suffix referring to Jerusalem. Rendered idiomatically
    with the preceding interrogative as 'how long it is.'
