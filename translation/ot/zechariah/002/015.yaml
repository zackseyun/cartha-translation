theological_decisions:
- issue: Speaker identity in 'the LORD of Armies has sent me to you'
  chosen_reading: Retain the first-person 'me' without interpretive expansion
  alternative_readings:
  - Read the speaker as the angelic messenger
  - Read the speaker as the prophet
  - Read the speaker as a divine/messianic figure distinguished from yet identified
    with the LORD
  rationale: The Hebrew text intentionally presents a striking formulation in which
    the speaker says that the LORD of Armies has sent 'me.' In light of the project's
    doctrine, the translation should preserve this tension rather than resolve it
    by paraphrase. No explanatory identification is inserted into the main text.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
- issue: Covenantal singular/plural tension
  chosen_reading: Render 'they will be my people' even though the subject is 'many
    nations'
  alternative_readings:
  - they will be my peoples
  rationale: The singular עָם after a plural subject reflects covenantal collective
    identity rather than multiple separate peoples. English 'my people' preserves
    the biblical covenant formula and reads naturally.
