id: ZEC.2.15
reference: Zechariah 2:15
source:
  edition: WLC
  text: וְ/נִלְווּ֩ גוֹיִ֨ם רַבִּ֤ים אֶל יְהוָה֙ בַּ/יּ֣וֹם הַ/ה֔וּא וְ/הָ֥יוּ לִ֖/י
    לְ/עָ֑ם וְ/שָׁכַנְתִּ֣י בְ/תוֹכֵ֔/ךְ וְ/יָדַ֕עַתְּ כִּי יְהוָ֥ה צְבָא֖וֹת שְׁלָחַ֥/נִי
    אֵלָֽיִ/ךְ־־׃
translation:
  text: And many nations will join themselves to the LORD in that day, and they will
    be my people. And I will dwell in your midst, and you will know that the LORD
    of Armies has sent me to you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more traditionally, 'the LORD of hosts.'
    reason: lexical_alternative
  - marker: b
    text: The speaker says, 'the LORD of Armies has sent me to you.' The text does
      not explicitly identify the 'me'; the ambiguity should be preserved.
    reason: alternative_reading
lexical_decisions:
- source_word: וְנִלְווּ
  chosen: will join themselves
  alternatives:
  - will be joined
  - will attach themselves
  lexicon: HALOT
  rationale: Nifal of לוה here is reflexive/passive in sense; 'join themselves' best
    captures voluntary attachment to the LORD, more naturally than a bare passive
    while preserving the covenantal nuance.
- source_word: גוֹיִם רַבִּים
  chosen: many nations
  alternatives:
  - many Gentiles
  lexicon: HALOT
  rationale: גוֹיִם ordinarily means 'nations.' 'Gentiles' is possible in some contexts,
    but here the international scope is primary rather than a Jew/Gentile contrast.
- source_word: אֶל יְהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: Per doctrine, יְהוָה is rendered 'the LORD.' The preposition with לוה
    expresses attachment/allegiance directed toward the LORD.
- source_word: בַּיּוֹם הַהוּא
  chosen: in that day
  alternatives:
  - on that day
  lexicon: HALOT
  rationale: Standard prophetic temporal expression. 'In that day' is idiomatic English
    and preserves the eschatological-prophetic register.
- source_word: וְהָיוּ לִי לְעָם
  chosen: and they will be my people
  alternatives:
  - and they will become a people to me
  lexicon: HALOT
  rationale: This is covenant formula language. 'My people' is the natural English
    equivalent and preserves the theological resonance.
- source_word: וְשָׁכַנְתִּי בְתוֹכֵךְ
  chosen: And I will dwell in your midst
  alternatives:
  - and I will dwell among you
  - and I will tabernacle in your midst
  lexicon: HALOT
  rationale: שׁכן denotes dwelling/settling. 'In your midst' reflects the 2fs singular
    suffix and preserves the Zion/Jerusalem address more precisely than the plural
    'among you.'
- source_word: וְיָדַעַתְּ
  chosen: and you will know
  alternatives:
  - and you will recognize
  lexicon: HALOT
  rationale: Simple future sense with 2fs addressee. 'Know' is the standard rendering
    and fits the recognition formula in prophetic discourse.
- source_word: יְהוָה צְבָאוֹת
  chosen: the LORD of Armies
  alternatives:
  - the LORD of hosts
  lexicon: HALOT
  rationale: צְבָאוֹת literally refers to armies/hosts. 'Of Armies' is more transparent
    in modern English, while 'of hosts' is preserved as a traditional alternative
    in a footnote-worthy lexical note.
- source_word: שְׁלָחַנִי
  chosen: has sent me
  alternatives:
  - sent me
  lexicon: HALOT
  rationale: The qatal after the recognition formula can be rendered with English
    present perfect to express a completed action whose significance is now recognized.
    This reads naturally in English while preserving the completed sending.
- source_word: אֵלַיִךְ
  chosen: to you
  alternatives:
  - to you, daughter Zion
  - to you, Jerusalem
  lexicon: HALOT
  rationale: The suffix is 2fs singular, referring to the feminine addressee from
    context (Zion/Jerusalem). The main text keeps the pronoun concise; the specific
    referent is contextual rather than explicit in this verse alone.
