id: ZEC.2.9
reference: Zechariah 2:9
source:
  edition: WLC
  text: וַ/אֲנִ֤י אֶֽהְיֶה לָּ/הּ֙ נְאֻם יְהוָ֔ה ח֥וֹמַת אֵ֖שׁ סָבִ֑יב וּ/לְ/כָב֖וֹד
    אֶֽהְיֶ֥ה בְ/תוֹכָֽ/הּ־־׃פ
translation:
  text: And I myself will be for her a wall of fire all around, declares the LORD,
    and I will be glory in her midst.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'and I will be a glory in her midst.' The Hebrew can be understood either
      with an anarthrous predicate ('glory') or as an indefinite predicate ('a glory').
    reason: lexical_alternative
lexical_decisions:
- source_word: וַאֲנִי
  chosen: And I myself
  alternatives:
  - And I
  - But I
  lexicon: HALOT
  rationale: The independent pronoun adds emphasis beyond the verbal subject already
    present in אֶהְיֶה. 'I myself' preserves that emphasis naturally in English. The
    prefixed conjunction is rendered 'And' to continue the oracle's flow.
- source_word: אֶהְיֶה
  chosen: will be
  alternatives:
  - am
  - shall be
  lexicon: HALOT
  rationale: Qal imperfect 1cs of היה here is future/predictive in context. 'Will
    be' is idiomatic modern English and fits both occurrences in the verse.
- source_word: לָהּ
  chosen: for her
  alternatives:
  - to her
  lexicon: HALOT
  rationale: 'The preposition ל with היה expresses relation/benefaction: the LORD
    will be something for the city. ''For her'' communicates protective function better
    than the more wooden ''to her.'' The feminine singular refers to Jerusalem/Zion
    as a city.'
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: This is a standard prophetic formula. 'Declares the LORD' is clear, contemporary,
    and preserves the solemn prophetic force. YHWH is rendered 'the LORD' per doctrine.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per DOCTRINE.md contested terms table, יְהוָה is rendered 'the LORD'
    rather than transliterated forms.
- source_word: חוֹמַת אֵשׁ
  chosen: a wall of fire
  alternatives:
  - a fiery wall
  - a fire-wall
  lexicon: HALOT
  rationale: Construct chain meaning 'wall of fire.' The straightforward rendering
    preserves the metaphor of divine protection without over-stylizing.
- source_word: סָבִיב
  chosen: all around
  alternatives:
  - around
  - round about
  lexicon: HALOT
  rationale: This adverb intensifies the encircling image. 'All around' is natural
    English and slightly fuller than bare 'around.'
- source_word: וּלְכָבוֹד
  chosen: and I will be glory
  alternatives:
  - and for glory I will be
  - and I will be glorious
  - and I will be a glory
  lexicon: HALOT
  rationale: The phrase is verbless apart from אֶהְיֶה and lacks an explicit article
    or preposition that would require 'glorious.' 'I will be glory' preserves the
    Hebrew's striking predicate noun and emphasizes the LORD himself as the city's
    glory. 'A glory' is possible but less direct.
- source_word: בְּתוֹכָהּ
  chosen: in her midst
  alternatives:
  - within her
  - in the midst of her
  lexicon: HALOT
  rationale: The phrase denotes presence at the center/interior of the city. 'In her
    midst' is idiomatic and preserves the feminine personification of Jerusalem.
