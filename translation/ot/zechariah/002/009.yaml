theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project's doctrinal and translation policy specifies 'the LORD' as
    the default rendering for YHWH, following Jewish reverence tradition and the Septuagintal
    pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Personification of Jerusalem/Zion with feminine pronouns
  chosen_reading: retain feminine reference ('her')
  alternative_readings:
  - neutralize to 'it'
  - explicitly supply 'Jerusalem'
  rationale: The Hebrew suffixes are feminine singular, referring to the city as a
    personified woman. Retaining 'her' preserves the literary and prophetic texture
    without adding a noun absent from the verse.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: original-language primacy;
    do not paraphrase beyond the source text'
