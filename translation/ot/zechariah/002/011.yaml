id: ZEC.2.11
reference: Zechariah 2:11
source:
  edition: WLC
  text: ה֥וֹי צִיּ֖וֹן הִמָּלְטִ֑י יוֹשֶׁ֖בֶת בַּת בָּבֶֽל־׃ס
translation:
  text: Up, Zion! Escape, you who dwell with Daughter Babylon.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Ho, Zion! Flee, you who dwell in the daughter of Babylon.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הוֹי
  chosen: Up!
  alternatives:
  - Ho!
  - Hey!
  - Alas!
  lexicon: HALOT
  rationale: Here the interjection functions as an urgent summons rather than a lament.
    'Up!' conveys the force of a sharp call to action in natural modern English. 'Ho!'
    is more traditional but archaic; 'Alas!' would misdirect toward mourning.
- source_word: צִיּוֹן
  chosen: Zion
  lexicon: HALOT
  rationale: Proper name transliterated per translation philosophy. In context it
    addresses the covenant people represented by Zion.
- source_word: הִמָּלְטִי
  chosen: Escape
  alternatives:
  - Flee
  - Deliver yourself
  lexicon: HALOT
  rationale: Niphal imperative feminine singular from מלט calls for urgent self-removal
    or rescue. 'Escape' best captures the imperative without over-specifying manner.
    'Flee' is possible, but the verb emphasizes getting away safely; 'deliver yourself'
    is too wooden in English.
- source_word: יוֹשֶׁבֶת
  chosen: you who dwell
  alternatives:
  - inhabiting
  - dwelling
  lexicon: HALOT
  rationale: Feminine singular participle used vocatively to identify the addressee.
    Rendering it as 'you who dwell' preserves the participial force and reads naturally
    in English.
- source_word: בַּת בָּבֶל
  chosen: Daughter Babylon
  alternatives:
  - the daughter of Babylon
  - Fair Babylon
  lexicon: HALOT
  rationale: Construct phrase literally 'daughter of Babylon.' Retaining 'Daughter
    Babylon' preserves the prophetic personification of the city/people and matches
    common biblical idiom better than paraphrastic alternatives.
