theological_decisions:
- issue: Referent of the feminine singular address
  chosen_reading: The verse addresses Zion/Jerusalem personified as a woman, calling
    the exiles associated with her to escape from Babylon.
  alternative_readings:
  - The verse addresses an individual female inhabitant of Babylon symbolically
  - The phrase could be taken as 'O Zion, escape, you who dwell in Daughter Babylon'
    with Zion itself located there
  rationale: The feminine forms and the appositional/vocative structure fit the common
    prophetic personification of Zion as female. The translation preserves that imagery
    without flattening it into a purely collective abstraction.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather
    than resolve it; translate what the Hebrew plainly says.'
