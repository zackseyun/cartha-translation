id: ZEC.2.10
reference: Zechariah 2:10
source:
  edition: WLC
  text: ה֣וֹי ה֗וֹי וְ/נֻ֛סוּ מֵ/אֶ֥רֶץ צָפ֖וֹן נְאֻם יְהוָ֑ה כִּ֠י כְּ/אַרְבַּ֞ע רוּח֧וֹת הַ/שָּׁמַ֛יִם פֵּרַ֥שְׂתִּי אֶתְ/כֶ֖ם נְאֻם יְהוָֽה־־׃
translation:
  text: Up! Up! Flee from the land of the north, declares Yahweh, for I have spread you abroad to the four winds of the heavens, declares Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to the four winds of heaven I have scattered you.' The Hebrew can be understood as either a comparison ('like the four winds') or a directional idiom ('to the four winds').
    reason: alternative_reading
  - marker: b
    text: Traditional English versions often render the opening as 'Ho! Ho!' The Hebrew is an urgent summons, hence 'Up! Up!' here.
    reason: lexical_alternative
lexical_decisions:
- source_word: הוֹי הוֹי
  chosen: Up! Up!
  alternatives:
  - Ho! Ho!
  - Hey! Hey!
  - Alas! Alas!
  lexicon: HALOT
  rationale: Here הוֹי functions as an urgent interjection summoning attention and action, not a lament. 'Up! Up!' conveys the repeated urgency in natural modern English better than the traditional but opaque 'Ho! Ho!'.
- source_word: וְנֻסוּ
  chosen: Flee
  alternatives:
  - Escape
  - Fly away
  lexicon: HALOT
  rationale: The imperative plural from נוּס calls for immediate flight. 'Flee' is direct and idiomatic, preserving the urgency of the command.
- source_word: מֵאֶרֶץ צָפוֹן
  chosen: from the land of the north
  alternatives:
  - from the north country
  - from the northern land
  lexicon: HALOT
  rationale: A relatively formal rendering preserves the Hebrew construction and likely geographic-theological resonance of the place from which the exiles are to depart.
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: This is the standard prophetic formula. 'Declares the LORD' is clear, weighty, and idiomatic. Per doctrine, יְהוָה is rendered 'the LORD' rather than transliterated.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: '''For'' naturally introduces the ground for the command and fits the discourse flow.'
- source_word: כְּאַרְבַּע רוּחוֹת הַשָּׁמַיִם
  chosen: like the four winds of the heavens
  alternatives:
  - to the four winds of heaven
  - as the four winds of the heavens
  lexicon: HALOT
  rationale: The prefixed כ on 'four' most naturally yields a comparison, 'like/as.' The phrase evokes worldwide scattering. 'Of the heavens' stays closer to the Hebrew than the smoother singular 'of heaven.'
- source_word: פֵּרַשְׂתִּי אֶתְכֶם
  chosen: I have spread you abroad
  alternatives:
  - I have scattered you
  - I spread you out
  lexicon: HALOT
  rationale: פרשׂ commonly means to spread out. 'Spread you abroad' preserves the image of dispersal without over-specifying violent scattering, though that idea is contextually related.
