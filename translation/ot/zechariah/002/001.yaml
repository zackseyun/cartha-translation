id: ZEC.2.1
reference: Zechariah 2:1
source:
  edition: WLC
  text: וָ/אֶשָּׂ֥א אֶת עֵינַ֖/י וָ/אֵ֑רֶא וְ/הִנֵּ֖ה אַרְבַּ֥ע קְרָנֽוֹת־׃
translation:
  text: And I lifted up my eyes and saw, and behold, four horns.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'four powers.' The Hebrew says 'horns,' a common biblical image for strength
      or ruling power; the literal image is retained in the main text.
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֶשָּׂא
  chosen: I lifted up
  alternatives:
  - I raised
  lexicon: HALOT
  rationale: From נשׂא in the idiom 'lift up the eyes,' a conventional Hebrew expression
    for directing one's gaze. 'Lifted up' preserves the idiom more transparently than
    the flatter 'raised.'
- source_word: עֵינַי
  chosen: my eyes
  alternatives:
  - my gaze
  lexicon: HALOT
  rationale: Literal rendering preserves the Hebrew idiom 'lift up my eyes' rather
    than collapsing it into an interpretive equivalent.
- source_word: וָאֵרֶא
  chosen: and saw
  alternatives:
  - and I saw
  lexicon: HALOT
  rationale: Simple past narrative rendering of ראה. Kept concise in English while
    preserving the sequential waw-consecutive flow.
- source_word: וְהִנֵּה
  chosen: and behold
  alternatives:
  - and look
  - and there were
  lexicon: HALOT
  rationale: הִנֵּה marks vivid presentation and draws attention to what appears in
    the vision. 'Behold' best preserves the deictic force and prophetic tone without
    adding content.
- source_word: אַרְבַּע
  chosen: four
  lexicon: HALOT
  rationale: Straightforward cardinal numeral.
- source_word: קְרָנוֹת
  chosen: horns
  alternatives:
  - powers
  lexicon: HALOT
  rationale: Literal 'horns' should be retained in the main text because the symbolic
    image is important in prophetic vision literature. An interpretive gloss like
    'powers' would over-resolve the symbolism.
