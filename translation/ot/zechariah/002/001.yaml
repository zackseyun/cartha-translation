theological_decisions:
- issue: Symbolic imagery of horns in prophetic vision
  chosen_reading: Retain the literal image 'four horns' in the main text.
  alternative_readings:
  - four powers
  rationale: The verse introduces a vision symbol whose meaning is explained by context
    in the following verses. Translating the symbol interpretively here would import
    explanation into the text rather than preserve the prophetic imagery.
  doctrine_reference: 'Translation philosophy: Preserve theological tension rather
    than resolve it; Original-language primacy over translation tradition.'
