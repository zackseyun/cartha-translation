id: ZEC.2.2
reference: Zechariah 2:2
source:
  edition: WLC
  text: וָ/אֹמַ֗ר אֶל הַ/מַּלְאָ֛ךְ הַ/דֹּבֵ֥ר בִּ֖/י מָה אֵ֑לֶּה וַ/יֹּ֣אמֶר אֵלַ֔/י
    אֵ֤לֶּה הַ/קְּרָנוֹת֙ אֲשֶׁ֣ר זֵר֣וּ אֶת יְהוּדָ֔ה אֶת יִשְׂרָאֵ֖ל וִ/ירוּשָׁלָֽם־־־־׃ס
translation:
  text: And I said to the angel who was speaking with me, “What are these?” And he
    said to me, “These are the horns that scattered Judah, Israel, and Jerusalem.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the powers' or 'the kingdoms'; the Hebrew says 'horns,' a common prophetic
      image for strength or ruling power.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַמַּלְאָךְ
  chosen: the angel
  alternatives:
  - the messenger
  lexicon: HALOT
  rationale: מַלְאָךְ can mean either 'messenger' or 'angel.' In Zechariah's vision
    context, a heavenly interpreting figure is in view, so 'angel' best communicates
    the referent in natural English.
- source_word: הַדֹּבֵר בִּי
  chosen: who was speaking with me
  alternatives:
  - who spoke with me
  - who was speaking in me
  lexicon: HALOT
  rationale: The participle דֹּבֵר with בְּ plus pronominal suffix is an idiom in
    Zechariah for the interpreting angel in conversation with the prophet. 'Speaking
    with me' is the most idiomatic English rendering. 'In me' is formally possible
    from the preposition alone but does not fit the discourse usage here.
- source_word: מָה אֵלֶּה
  chosen: What are these?
  alternatives:
  - What are these things?
  lexicon: HALOT
  rationale: A straightforward interrogative plus demonstrative plural. English idiom
    prefers 'What are these?' without adding 'things.'
- source_word: הַקְּרָנוֹת
  chosen: the horns
  lexicon: HALOT
  rationale: קֶרֶן literally means 'horn.' In prophetic imagery it often symbolizes
    power or kingdoms, but the text itself names the objects as horns, so the literal
    image should be preserved.
- source_word: זֵרוּ
  chosen: scattered
  alternatives:
  - winnowed
  - dispersed
  lexicon: HALOT
  rationale: The verb זרה commonly carries the sense of scattering or dispersing,
    sometimes like winnowing. In this context of nations being driven apart, 'scattered'
    is the clearest and most natural rendering.
- source_word: יְהוּדָה ... יִשְׂרָאֵל ... וִירוּשָׁלָם
  chosen: Judah, Israel, and Jerusalem
  lexicon: HALOT
  rationale: These are proper names and should be transliterated rather than translated.
    The coordinated sequence is retained as in the Hebrew.
