theological_decisions:
- issue: Symbolic force of 'horns'
  chosen_reading: Retain the literal image 'horns' in the main text without explicating
    the symbolism.
  alternative_readings:
  - powers
  - kingdoms
  rationale: The prophetic vision uses symbolic imagery, but the text itself identifies
    the objects as horns. Translating the symbol as its interpretation would overstep
    the source wording. The symbolism can be preserved for readers without paraphrase.
  doctrine_reference: 'Translation philosophy: original-language primacy; never paraphrase
    beyond what the source warrants.'
