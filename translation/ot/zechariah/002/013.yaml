id: ZEC.2.13
reference: Zechariah 2:13
source:
  edition: WLC
  text: כִּ֠י הִנְ/נִ֨י מֵנִ֤יף אֶת יָדִ/י֙ עֲלֵי/הֶ֔ם וְ/הָי֥וּ שָׁלָ֖ל לְ/עַבְדֵי/הֶ֑ם
    וִֽ/ידַעְתֶּ֕ם כִּֽי יְהוָ֥ה צְבָא֖וֹת שְׁלָחָֽ/נִי־־׃ס
translation:
  text: For look, I am about to wave my hand over them, and they will become plunder
    for their own slaves. Then you will know that the LORD of Armies has sent me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the LORD of hosts.'
    reason: lexical_alternative
  - marker: b
    text: Or 'they will become plunder for their servants.' The Hebrew עבד can mean
      'servant' or 'slave'; 'slaves' is chosen here to preserve the force of the reversal.
    reason: lexical_alternative
  - marker: c
    text: The speaker says, 'the LORD of Armies has sent me,' without explicitly identifying
      himself; the text leaves that identity open in context.
    reason: alternative_reading
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Because
  lexicon: HALOT
  rationale: Introduces the grounds or explanation for the preceding statement; 'For'
    fits the discourse connection naturally in English.
- source_word: הִנְנִי
  chosen: look, I am about to
  alternatives:
  - behold, I
  - here I am
  lexicon: HALOT
  rationale: The particle-plus-pronoun construction is deictic and attention-getting.
    In prophetic discourse it often signals imminent action, so 'look, I am about
    to' captures both the vividness and forward-looking force in readable modern English.
- source_word: מֵנִיף אֶת־יָדִי עֲלֵיהֶם
  chosen: wave my hand over them
  alternatives:
  - raise my hand against them
  - brandish my hand over them
  lexicon: HALOT
  rationale: הניף literally denotes a waving/brandishing motion. 'Wave my hand over
    them' preserves the concrete image without overinterpreting it as merely 'against
    them,' though hostile action is implied by context.
- source_word: וְהָיוּ
  chosen: and they will become
  alternatives:
  - and they will be
  lexicon: HALOT
  rationale: The verb היה here marks resulting state. 'Become' makes the transition
    explicit in idiomatic English.
- source_word: שָׁלָל
  chosen: plunder
  alternatives:
  - spoil
  - booty
  lexicon: HALOT
  rationale: '''Plunder'' is the clearest modern English equivalent for war spoil;
    ''booty'' is dated or potentially distracting.'
- source_word: לְעַבְדֵיהֶם
  chosen: for their own slaves
  alternatives:
  - for their servants
  - to their slaves
  lexicon: HALOT
  rationale: 'עבד can mean servant or slave depending on context. Here the reversal
    of power is salient: those formerly dominated become the possessors of spoil.
    ''Their own slaves'' preserves the shock of reversal more clearly than ''servants.'''
- source_word: וִידַעְתֶּם
  chosen: Then you will know
  alternatives:
  - and you will know
  lexicon: HALOT
  rationale: The prefixed conjunction plus perfect with future sense advances the
    result of the preceding action. 'Then' makes the consequential force explicit
    and natural.
- source_word: יְהוָה צְבָאוֹת
  chosen: the LORD of Armies
  alternatives:
  - the LORD of hosts
  lexicon: HALOT
  rationale: Per doctrine, יְהוָה is rendered 'the LORD.' צבאות is translated rather
    than left in traditional form; 'of Armies' communicates the martial sense of the
    title in contemporary English.
- source_word: שְׁלָחַנִי
  chosen: has sent me
  alternatives:
  - sent me
  lexicon: HALOT
  rationale: The perfect verb indicates completed commissioning with present relevance.
    'Has sent me' reflects that force in English.
