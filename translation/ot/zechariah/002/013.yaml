theological_decisions:
- issue: Identity of the speaker who says 'the LORD of Armies has sent me'
  chosen_reading: Retain the first-person wording without resolving the speaker's
    identity in translation.
  alternative_readings:
  - The speaker is the prophet Zechariah
  - The speaker is the angelic messenger
  - The speaker is a divine/messianic figure speaking in a way that contributes to
    the book's theological complexity
  rationale: The Hebrew text intentionally presents a striking formulation in which
    the speaker says that the LORD of Armies sent him. In keeping with the doctrine's
    instruction to preserve theological tension rather than resolve it, the translation
    leaves the statement as-is and does not import an interpretive identification
    into the main text.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
