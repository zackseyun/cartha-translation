id: ZEC.2.3
reference: Zechariah 2:3
source:
  edition: WLC
  text: וַ/יַּרְאֵ֣/נִי יְהוָ֔ה אַרְבָּעָ֖ה חָרָשִֽׁים׃
translation:
  text: Then Yahweh showed me four craftsmen.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "four smiths"; the Hebrew term can refer more specifically to skilled workers such as metalworkers, but more broadly means craftsmen or artisans.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַ/יַּרְאֵ/נִי
  chosen: Then ... showed me
  alternatives:
  - and he caused me to see
  - and he showed me
  lexicon: HALOT
  rationale: The Hiphil wayyiqtol of ראה with 1cs suffix means 'he caused me to see' or idiomatically 'he showed me.' In English, 'showed me' is the most natural optimal-equivalence rendering. 'Then' captures the narrative force of the waw-consecutive in prophetic vision sequence.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אַרְבָּעָה
  chosen: four
  lexicon: HALOT
  rationale: Straightforward cardinal numeral modifying the following masculine plural noun.
- source_word: חָרָשִׁים
  chosen: craftsmen
  alternatives:
  - artisans
  - smiths
  - workers
  lexicon: HALOT
  rationale: חָרָשׁ can denote a craftsman or artisan broadly, including workers in wood, stone, or metal. In this vision context, the term is broader than 'smiths,' so 'craftsmen' best preserves the Hebrew without over-specifying the trade. 'Artisans' is possible but slightly less plain in modern English.
