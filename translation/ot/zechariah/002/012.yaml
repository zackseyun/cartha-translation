theological_decisions:
- issue: Referent of the first-person pronoun in 'he has sent me' and the third-person
    suffix in 'his eye'
  chosen_reading: The verse is translated without resolving the speaker-identification
    ambiguity; 'me' and 'his' are left as in the Hebrew.
  alternative_readings:
  - The speaker is the prophet speaking on the LORD's behalf
  - The speaker is the angelic messenger
  - The speaker is a divine figure sent by the LORD
  rationale: The Hebrew presents a notable shift involving divine speech and first-person
    mission language. The translation preserves this tension rather than harmonizing
    it, in keeping with the project's principle not to resolve genuine ambiguity beyond
    what the text warrants.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
