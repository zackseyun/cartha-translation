id: ZEC.2.12
reference: Zechariah 2:12
source:
  edition: WLC
  text: כִּ֣י כֹ֣ה אָמַר֮ יְהוָ֣ה צְבָאוֹת֒ אַחַ֣ר כָּב֔וֹד שְׁלָחַ֕/נִי אֶל הַ/גּוֹיִ֖ם
    הַ/שֹּׁלְלִ֣ים אֶתְ/כֶ֑ם כִּ֚י הַ/נֹּגֵ֣עַ בָּ/כֶ֔ם נֹגֵ֖עַ בְּ/בָבַ֥ת עֵינֽ/וֹ־׃
translation:
  text: 'For thus says the LORD of hosts: After glory he has sent me against the nations
    that plunder you, for whoever touches you touches the pupil of his eye.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'For glory he has sent me to the nations that plunder you.' The Hebrew
      phrase 'After glory' is difficult and may express purpose, sequence, or relation
      to honor/glory.
    reason: alternative_reading
  - marker: b
    text: Or 'the apple of his eye.' The Hebrew idiom denotes the most sensitive and
      carefully protected part of the eye.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving
    Jewish reverence tradition and established English convention.
- source_word: צְבָאוֹת
  chosen: of hosts
  alternatives:
  - of armies
  lexicon: HALOT
  rationale: Traditional but still intelligible rendering of the divine title; conveys
    heavenly armies/multitudes without over-specifying military force.
- source_word: אַחַר כָּבוֹד
  chosen: After glory
  alternatives:
  - After honor
  - For glory
  - After the glory
  lexicon: HALOT
  rationale: The Hebrew phrase is syntactically difficult and somewhat elliptical.
    A relatively formal rendering best preserves the ambiguity rather than resolving
    it interpretively. 'Glory' is the most direct gloss for כָּבוֹד.
- source_word: שְׁלָחַנִי
  chosen: he has sent me
  alternatives:
  - he sent me
  - he has commissioned me
  lexicon: HALOT
  rationale: The qatal form is rendered with present relevance in English. 'Sent me'
    is the plain sense; 'commissioned me' is interpretive and therefore avoided.
- source_word: אֶל הַגּוֹיִם
  chosen: against the nations
  alternatives:
  - to the nations
  - to the Gentiles
  lexicon: HALOT
  rationale: Although אֶל commonly means 'to,' in this hostile context with 'the nations
    that plunder you,' English 'against' better conveys the directional force of being
    sent in opposition. 'Nations' is preferable to 'Gentiles' in this prophetic judgment
    context.
- source_word: הַשֹּׁלְלִים אֶתְכֶם
  chosen: that plunder you
  alternatives:
  - that spoil you
  - that despoil you
  - that rob you
  lexicon: HALOT
  rationale: The participle from שׁלל denotes taking spoil/plunder. 'Plunder' is clear
    modern English and fits the military-oppressive context.
- source_word: הַנֹּגֵעַ בָּכֶם
  chosen: whoever touches you
  alternatives:
  - the one who touches you
  - he who touches you
  lexicon: HALOT
  rationale: Generic singular participle is naturally rendered in English as 'whoever
    touches you.' This preserves the representative force without awkwardness.
- source_word: נֹגֵעַ
  chosen: touches
  alternatives:
  - strikes
  - lays a hand on
  lexicon: HALOT
  rationale: The repetition of נגע is preserved with the same English verb for rhetorical
    force. Stronger verbs would over-interpret the idiom.
- source_word: בְּבָבַת עֵינוֹ
  chosen: the pupil of his eye
  alternatives:
  - the apple of his eye
  - the eyeball of his eye
  lexicon: HALOT
  rationale: The idiom refers to the most sensitive/protected part of the eye. 'Pupil
    of his eye' is more transparent to modern readers than the traditional but opaque
    'apple of his eye,' while remaining close to the Hebrew image.
