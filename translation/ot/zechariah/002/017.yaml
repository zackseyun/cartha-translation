id: ZEC.2.17
reference: Zechariah 2:17
source:
  edition: WLC
  text: הַ֥ס כָּל בָּשָׂ֖ר מִ/פְּנֵ֣י יְהוָ֑ה כִּ֥י נֵע֖וֹר מִ/מְּע֥וֹן קָדְשֽׁ/וֹ־׃ס
translation:
  text: Be silent, all flesh, before the LORD, for he has roused himself from his
    holy dwelling.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all humanity.' The Hebrew reads 'all flesh,' a prophetic expression
      emphasizing human creatureliness before God.
    reason: lexical_alternative
  - marker: b
    text: Or 'he has arisen' / 'he has awakened.' The Hebrew verb pictures the LORD
      stirring from repose to act.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַס
  chosen: Be silent
  alternatives:
  - Hush
  - Be still
  - Silence
  lexicon: HALOT
  rationale: An interjection/imperative calling for silence. 'Be silent' is natural
    modern English and preserves the solemn command better than the more abrupt 'Hush'
    or the less precise 'Be still'.
- source_word: כָּל בָּשָׂר
  chosen: all flesh
  alternatives:
  - all humanity
  - everyone
  lexicon: HALOT
  rationale: Literally 'all flesh.' This idiom refers to all human beings, but retaining
    'flesh' preserves the prophetic register and creaturely contrast before YHWH.
    A more interpretive rendering like 'all humanity' is possible but less textually
    transparent.
- source_word: מִפְּנֵי
  chosen: before
  alternatives:
  - in the presence of
  - from before
  lexicon: HALOT
  rationale: In this context the preposition with 'face/presence' idiomatically means
    standing before someone's presence. 'Before' is concise and idiomatic in English.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD,' following established reverential convention and the stated translation
    policy.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Here it introduces the reason for the command to silence. 'For' best
    preserves the formal causal connection in concise English.
- source_word: נֵעוֹר
  chosen: he has roused himself
  alternatives:
  - he has arisen
  - he has been stirred up
  - he has awakened
  lexicon: HALOT
  rationale: The verb conveys being stirred from repose to action. 'Has roused himself'
    captures the reflexive nuance and the image of divine movement into action better
    than the more generic 'has arisen.'
- source_word: מִמְּעוֹן קָדְשׁוֹ
  chosen: from his holy dwelling
  alternatives:
  - from his holy habitation
  - from his holy abode
  lexicon: HALOT
  rationale: מָעוֹן denotes a dwelling place or habitation. 'Holy dwelling' is clear,
    natural English while preserving the sacred spatial imagery.
