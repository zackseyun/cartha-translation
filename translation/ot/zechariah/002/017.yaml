theological_decisions:
- issue: Anthropological scope of 'all flesh'
  chosen_reading: Retain the literal expression 'all flesh' rather than interpretively
    narrowing it to 'all humanity.'
  alternative_readings:
  - all humanity
  - everyone
  rationale: The Hebrew idiom often refers to humankind broadly, yet the literal wording
    underscores creatureliness before the divine presence. Preserving that tension
    fits the translation philosophy of transparency to the source while remaining
    intelligible.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: This follows the project's stated default for YHWH and aligns with the
    doctrine table on contested terms.
  doctrine_reference: 'Contested terms: יְהוָה YHWH'
