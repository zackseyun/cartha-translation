id: ZEC.2.8
reference: Zechariah 2:8
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר אֵלָ֔/ו רֻ֗ץ דַּבֵּ֛ר אֶל הַ/נַּ֥עַר הַלָּ֖ז לֵ/אמֹ֑ר פְּרָזוֹת֙
    תֵּשֵׁ֣ב יְרוּשָׁלִַ֔ם מֵ/רֹ֥ב אָדָ֛ם וּ/בְהֵמָ֖ה בְּ/תוֹכָֽ/הּ־׃
translation:
  text: And he said to him, “Run, speak to that young man, saying, ‘Jerusalem will
    dwell as open country because of the multitude of man and livestock within her.’”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Jerusalem will dwell like unwalled villages.”
    reason: lexical_alternative
  - marker: b
    text: Hebrew “man,” used here collectively for the human population; alternatively,
      “people” or “humankind.”
    reason: lexical_alternative
lexical_decisions:
- source_word: רֻץ
  chosen: Run
  alternatives:
  - Hurry
  lexicon: HALOT
  rationale: Imperative of רוץ, a direct command for swift movement. 'Run' is the
    plain, vivid English equivalent and preserves the urgency better than the slightly
    interpretive 'hurry.'
- source_word: דַּבֵּר
  chosen: speak
  alternatives:
  - tell
  lexicon: HALOT
  rationale: Piel imperative of דבר. 'Speak' closely matches the verbal act without
    narrowing it to mere reporting; 'tell' is possible but slightly more dynamic.
- source_word: הַנַּעַר הַלָּז
  chosen: that young man
  alternatives:
  - that youth
  - that boy
  lexicon: HALOT
  rationale: נַעַר commonly denotes a young male, ranging from boy to young man depending
    on context. 'Young man' best fits the prophetic scene without sounding childish;
    the demonstrative הַלָּז is preserved by 'that.'
- source_word: פְּרָזוֹת
  chosen: open country
  alternatives:
  - unwalled villages
  - as villages without walls
  - open places
  lexicon: HALOT
  rationale: Plural noun from פרז, denoting unwalled rural/open settlements. In this
    context it describes Jerusalem as spread out beyond defensive walls. 'Open country'
    gives natural English while preserving the idea of unwalled openness. Because
    the Hebrew is plural and somewhat idiomatic, an alternative is preserved in a
    footnote.
- source_word: תֵּשֵׁב
  chosen: will dwell
  alternatives:
  - will be inhabited
  - will sit
  lexicon: HALOT
  rationale: Qal imperfect of ישב. 'Will dwell' preserves the common Hebrew sense
    of settled habitation. 'Will be inhabited' captures the result but shifts voice;
    'sit' would be overly literal and misleading in English.
- source_word: מֵרֹב
  chosen: because of the multitude of
  alternatives:
  - from the abundance of
  - due to the great number of
  lexicon: HALOT
  rationale: 'The preposition with רֹב expresses cause or occasion here: Jerusalem
    will overflow its walls on account of great population. ''Because of the multitude
    of'' is clear and suitably formal.'
- source_word: אָדָם
  chosen: man
  alternatives:
  - people
  - humankind
  lexicon: HALOT
  rationale: Per doctrine, אָדָם should be rendered 'man' or 'humankind' according
    to context. Here it refers collectively to human population in contrast with livestock.
    'Man' preserves the Hebrew's generic singular and the paired structure with 'livestock.'
    An inclusive alternative is preserved in a footnote.
- source_word: וּבְהֵמָה
  chosen: livestock
  alternatives:
  - cattle
  - animals
  lexicon: HALOT
  rationale: בְּהֵמָה here is collective for domestic animals. 'Livestock' is the
    most natural modern English equivalent in a population-and-settlement context;
    'cattle' is too narrow and 'animals' too broad.
- source_word: בְּתוֹכָהּ
  chosen: within her
  alternatives:
  - in her midst
  lexicon: HALOT
  rationale: The feminine singular suffix refers to Jerusalem. 'Within her' is idiomatic
    English and preserves the city's feminine personification.
