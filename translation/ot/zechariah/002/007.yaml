theological_decisions:
- issue: Referent of the two angels
  chosen_reading: Both מַלְאָךְ instances are rendered generically as 'angel' without
    identifying either figure beyond the text.
  alternative_readings:
  - the first as an interpreting angel and the second as a distinct heavenly messenger
    with a specific mission
  rationale: The verse itself distinguishes the figures only by role and sequence.
    The translation preserves that narrative distinction without importing a fuller
    angelology or interpretive identification into the main text.
  doctrine_reference: Preserve theological tension rather than resolve it.
