id: ZEC.2.5
reference: Zechariah 2:5
source:
  edition: WLC
  text: וָ/אֶשָּׂ֥א עֵינַ֛/י וָ/אֵ֖רֶא וְ/הִנֵּה אִ֑ישׁ וּ/בְ/יָד֖/וֹ חֶ֥בֶל מִדָּֽה־׃
translation:
  text: And I lifted up my eyes and saw, and behold, a man, and in his hand a measuring
    line.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'a measuring cord.' The Hebrew term can refer more concretely to a cord
      or rope used for measuring.
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֶשָּׂא
  chosen: I lifted up
  alternatives:
  - I raised
  lexicon: HALOT
  rationale: From נשׂא, here in the idiom 'lift up the eyes,' introducing a visionary
    act of looking. 'Lifted up' preserves the Hebrew expression more closely than
    the simpler 'raised.'
- source_word: עֵינַי
  chosen: my eyes
  alternatives:
  - my gaze
  lexicon: HALOT
  rationale: Literal object of the idiom. Retaining 'my eyes' preserves the Hebrew
    visionary style rather than smoothing to the more interpretive 'my gaze.'
- source_word: וָאֵרֶא
  chosen: and saw
  alternatives:
  - and I saw
  lexicon: HALOT
  rationale: Straightforward rendering of ראה in first person. The conjunction is
    retained to reflect the narrative sequence of the vision report.
- source_word: וְהִנֵּה
  chosen: and behold
  alternatives:
  - behold
  - look
  lexicon: HALOT
  rationale: A discourse marker drawing attention to what suddenly appears in the
    vision. 'And behold' preserves the vividness and formal force of the Hebrew better
    than the more colloquial 'look.'
- source_word: אִישׁ
  chosen: a man
  alternatives:
  - someone
  lexicon: HALOT
  rationale: The noun is grammatically and semantically masculine singular, referring
    to a male figure in the vision. Per gender-accurate policy, 'a man' is preferred
    over a neutral paraphrase.
- source_word: וּבְיָדוֹ
  chosen: and in his hand
  alternatives:
  - with in his hand
  - holding
  lexicon: HALOT
  rationale: Literal rendering of the prepositional phrase preserves the visual detail.
    'Holding' is possible English smoothing, but the more explicit phrase better reflects
    the Hebrew wording.
- source_word: חֶבֶל מִדָּה
  chosen: a measuring line
  alternatives:
  - a measuring cord
  - a line for measuring
  lexicon: HALOT
  rationale: The phrase denotes a cord or line used for measurement. 'Measuring line'
    is idiomatic modern English while remaining close to the Hebrew. 'Cord' is a viable
    alternative and is preserved in a footnote because חבל can denote rope/cord more
    concretely.
