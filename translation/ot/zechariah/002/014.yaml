id: ZEC.2.14
reference: Zechariah 2:14
source:
  edition: WLC
  text: רָנִּ֥י וְ/שִׂמְחִ֖י בַּת צִיּ֑וֹן כִּ֧י הִנְ/נִי בָ֛א וְ/שָׁכַנְתִּ֥י בְ/תוֹכֵ֖/ךְ
    נְאֻם יְהוָֽה־־־׃
translation:
  text: Sing for joy and rejoice, daughter Zion, for behold, I am coming, and I will
    dwell in your midst, declares the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Shout for joy and be glad, daughter of Zion.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'daughter Zion,' a poetic personification of Zion/Jerusalem.
    reason: cultural_note
  - marker: c
    text: Hebrew YHWH, traditionally rendered 'the LORD.'
    reason: alternative_reading
lexical_decisions:
- source_word: רָנִּי
  chosen: Sing for joy
  alternatives:
  - Shout for joy
  - Cry out
  lexicon: HALOT
  rationale: Imperative feminine singular from רנן, denoting jubilant ringing out.
    'Sing for joy' captures the celebratory force in natural English; 'shout for joy'
    is possible, but the pairing with 'rejoice' reads smoothly with 'sing for joy.'
- source_word: וְשִׂמְחִי
  chosen: and rejoice
  alternatives:
  - and be glad
  lexicon: HALOT
  rationale: Imperative feminine singular from שמח. 'Rejoice' preserves the verbal
    force and elevated tone better than 'be glad' in this prophetic summons.
- source_word: בַּת צִיּוֹן
  chosen: daughter Zion
  alternatives:
  - Daughter Zion
  - daughter of Zion
  lexicon: HALOT
  rationale: A vocative personification of Zion/Jerusalem. 'daughter Zion' is a concise,
    source-near rendering increasingly natural in modern English; 'daughter of Zion'
    is traditional and remains viable. Lowercase 'daughter' treats it as a descriptive
    vocative rather than a formal title.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  lexicon: HALOT
  rationale: Introduces the ground for the imperatives. 'For' is concise and fits
    prophetic discourse.
- source_word: הִנְנִי
  chosen: behold
  alternatives:
  - look
  - see
  lexicon: HALOT
  rationale: Deictic particle with first-person suffix, literally 'behold me' / 'here
    I am.' 'Behold' preserves the prophetic solemnity and attention-marking force
    without over-paraphrase.
- source_word: בָא
  chosen: I am coming
  alternatives:
  - I come
  - I am about to come
  lexicon: HALOT
  rationale: Qal participle masculine singular with first-person sense after הִנְנִי.
    The participle conveys imminent or vivid action; 'I am coming' expresses this
    naturally in English.
- source_word: וְשָׁכַנְתִּי
  chosen: and I will dwell
  alternatives:
  - and I will live
  - and I will tabernacle
  lexicon: HALOT
  rationale: Qal perfect 1cs with vav in prophetic/future sense. 'Dwell' is the standard
    and theologically resonant rendering for שכן, especially in divine-presence contexts.
- source_word: בְתוֹכֵךְ
  chosen: in your midst
  alternatives:
  - within you
  - among you
  lexicon: HALOT
  rationale: Addressed to feminine singular Zion. 'In your midst' preserves both the
    singular addressee and the communal/spatial sense better than 'within you,' while
    remaining idiomatic.
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: Standard prophetic messenger formula. 'Declares the LORD' is idiomatic,
    weighty, and transparent. Per doctrine, יְהוָה is rendered 'the LORD' rather than
    'Yahweh' in the main text.
