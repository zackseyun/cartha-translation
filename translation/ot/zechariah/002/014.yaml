theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering for
    YHWH, following Jewish reverence tradition and the Septuagintal pattern. This
    also aligns with established English Bible convention while preserving covenantal
    significance.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Divine indwelling language in a prophetic context
  chosen_reading: I will dwell in your midst
  alternative_readings:
  - I will live among you
  rationale: The verse speaks of YHWH's coming and dwelling in Zion. 'Dwell' preserves
    the covenant-presence theme without importing later doctrinal formulations, while
    remaining fully compatible with historic Christian orthodoxy's recognition of
    divine presence among God's people.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3
