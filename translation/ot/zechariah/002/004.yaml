theological_decisions:
- issue: Retention of the horn imagery as symbolic of hostile power
  chosen_reading: Keep the metaphor literal in the main text ('horns') rather than
    interpret it as 'powers' or 'kingdoms.'
  alternative_readings:
  - These are the powers that scattered Judah
  - These are the kingdoms that scattered Judah
  rationale: The prophetic vision trades on the symbolic image of horns and craftsmen.
    Preserving the image maintains literary and theological coherence and avoids over-interpreting
    the symbol in translation.
  doctrine_reference: Translation philosophy §1, §3, §5
- issue: Rendering אִישׁ in an idiomatic clause
  chosen_reading: Use 'no man' rather than a gender-neutral paraphrase.
  alternative_readings:
  - no one
  - nobody
  rationale: The Hebrew uses masculine singular אִישׁ in a representative sense. Per
    the gender-accurate policy, 'man' is retained in the main text, while the idiom
    is explained by context rather than neutralized.
  doctrine_reference: Translation philosophy §4
