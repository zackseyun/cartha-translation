id: ZEC.2.4
reference: Zechariah 2:4
source:
  edition: WLC
  text: וָ/אֹמַ֕ר מָ֛ה אֵ֥לֶּה בָאִ֖ים לַֽ/עֲשׂ֑וֹת וַ/יֹּ֣אמֶר לֵ/אמֹ֗ר אֵ֣לֶּה הַ/קְּרָנ֞וֹת
    אֲשֶׁר זֵ֣רוּ אֶת יְהוּדָ֗ה כְּ/פִי אִישׁ֙ לֹא נָשָׂ֣א רֹאשׁ֔/וֹ וַ/יָּבֹ֤אוּ
    אֵ֨לֶּה֙ לְ/הַחֲרִ֣יד אֹתָ֔/ם לְ/יַדּ֞וֹת אֶת קַרְנ֣וֹת הַ/גּוֹיִ֗ם הַ/נֹּשְׂאִ֥ים
    קֶ֛רֶן אֶל אֶ֥רֶץ יְהוּדָ֖ה לְ/זָרוֹתָֽ/הּ־־־־־־׃ס
translation:
  text: Then I said, “What are these coming to do?” And he said, “These are the horns
    that scattered Judah, so that no man lifted up his head; and these have come to
    terrify them, to cast down the horns of the nations that lifted up a horn against
    the land of Judah to scatter her.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'so that no one lifted up his head.' The Hebrew reads literally, 'according
      to the mouth of a man, he did not lift up his head,' an idiom expressing humiliation
      or helplessness.
    reason: lexical_alternative
  - marker: b
    text: '''Horns'' symbolize power or aggressive strength; the image is kept rather
      than interpreted in the main text.'
    reason: cultural_note
  - marker: c
    text: Or, 'to throw down' the horns of the nations.
    reason: lexical_alternative
lexical_decisions:
- source_word: קְּרָנוֹת / קֶרֶן
  chosen: horns / a horn
  alternatives:
  - powers
  - strength
  lexicon: HALOT
  rationale: Rendered literally as 'horns' to preserve the prophetic image of power
    and aggression. The singular in 'lifted up a horn' is kept idiomatically within
    the metaphor rather than flattened to an abstract term like 'power'.
- source_word: זֵרוּ / לְזָרוֹתָהּ
  chosen: scattered / to scatter her
  alternatives:
  - winnowed
  - dispersed
  lexicon: HALOT
  rationale: The verb denotes scattering or dispersing. 'Scattered' is the most natural
    English rendering here and preserves the judgment/exile imagery.
- source_word: כְּפִי אִישׁ לֹא נָשָׂא רֹאשׁוֹ
  chosen: so that no man lifted up his head
  alternatives:
  - so that no one could raise his head
  - so that no man raised his head
  lexicon: HALOT
  rationale: This clause is idiomatic. The chosen rendering preserves the masculine
    singular 'man' in line with the gender-accurate policy and keeps the image of
    being so crushed that one cannot hold up his head. 'Could raise' is interpretive,
    so the more direct 'lifted up' is preferred in the main text.
- source_word: לְהַחֲרִיד
  chosen: to terrify
  alternatives:
  - to frighten
  - to make tremble
  lexicon: HALOT
  rationale: The verb conveys causing dread or trembling. 'Terrify' best matches the
    force of the term in this judgment context.
- source_word: לְיַדּוֹת
  chosen: to cast down
  alternatives:
  - to throw down
  - to strike down
  lexicon: HALOT
  rationale: The verb is difficult and relatively rare; in context it refers to bringing
    down the hostile horns. 'Cast down' is a clear idiomatic English equivalent that
    fits the imagery of overthrowing proud powers.
- source_word: הַגּוֹיִם
  chosen: the nations
  alternatives:
  - the Gentiles
  - the peoples
  lexicon: HALOT
  rationale: In this prophetic context the referent is foreign national powers hostile
    to Judah, so 'the nations' is the most natural and contextually precise rendering.
- source_word: הַנֹּשְׂאִים קֶרֶן
  chosen: that lifted up a horn
  alternatives:
  - that raised a horn
  - that exalted their power
  lexicon: HALOT
  rationale: Rendered with the horn metaphor intact. 'Lifted up a horn' reflects the
    Hebrew idiom of asserting power or pride against Judah.
- source_word: אֵלֶּה בָאִים לַעֲשׂוֹת
  chosen: these coming to do
  alternatives:
  - these here to do
  - these have come to do
  lexicon: HALOT
  rationale: The participle plus infinitive is represented naturally in English as
    'are these coming to do?' preserving the immediate visionary scene.
- source_word: וַיָּבֹאוּ אֵלֶּה
  chosen: these have come
  alternatives:
  - these came
  - these are coming
  lexicon: HALOT
  rationale: The wayyiqtol advances the vision report. 'These have come' reads naturally
    in English while linking their arrival to their purpose in the vision.
