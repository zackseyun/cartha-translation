id: ZEC.2.16
reference: Zechariah 2:16
source:
  edition: WLC
  text: וְ/נָחַ֨ל יְהוָ֤ה אֶת יְהוּדָה֙ חֶלְק֔/וֹ עַ֖ל אַדְמַ֣ת הַ/קֹּ֑דֶשׁ וּ/בָחַ֥ר
    ע֖וֹד בִּ/ירוּשָׁלִָֽם־׃
translation:
  text: And the LORD will inherit Judah as his portion in the holy land, and he will
    again choose Jerusalem.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “will take possession of Judah as his inheritance.” The Hebrew keeps
      inheritance language rather than using a more general verb for possession.
    reason: lexical_alternative
  - marker: b
    text: Literally, “upon the soil of holiness.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָחַל
  chosen: will inherit
  alternatives:
  - will take possession of
  - will have as an inheritance
  lexicon: HALOT
  rationale: The verb נחל in the Qal commonly means to receive or possess as an inheritance.
    Here with the LORD as subject and Judah as object, 'will inherit' preserves the
    covenantal inheritance imagery more directly than a flatter 'take possession of.'
    The prefixed conjunction is rendered 'And.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the divine name יְהוָה is rendered 'the LORD'
    rather than transliterated.
- source_word: אֶת יְהוּדָה
  chosen: Judah
  lexicon: HALOT
  rationale: Direct object marker plus proper name; rendered straightforwardly as
    'Judah.'
- source_word: חֶלְקוֹ
  chosen: as his portion
  alternatives:
  - his inheritance
  - his share
  lexicon: HALOT
  rationale: חלק denotes a portion, share, or allotted inheritance. 'As his portion'
    fits idiomatic English after 'inherit' while preserving the allotment imagery.
    'His inheritance' would be possible but sounds slightly redundant beside 'inherit.'
- source_word: עַל אַדְמַת הַקֹּדֶשׁ
  chosen: in the holy land
  alternatives:
  - upon the holy ground
  - on the holy soil
  lexicon: HALOT
  rationale: Literally 'upon the soil/ground of holiness.' In context, this refers
    to the land made holy by the LORD's presence and election. 'In the holy land'
    is a natural optimal-equivalence rendering that preserves the territorial sense
    better than the more awkwardly literal 'upon the holy ground.'
- source_word: וּבָחַר
  chosen: and he will choose
  alternatives:
  - and he will elect
  lexicon: HALOT
  rationale: בחר means 'choose, select.' 'Choose' is the clear and natural rendering;
    the subject remains the LORD from the previous clause.
- source_word: עוֹד
  chosen: again
  alternatives:
  - still
  - yet
  lexicon: HALOT
  rationale: 'In this restoration context, עוֹד signals renewed action: the LORD will
    once more choose Jerusalem. ''Again'' best captures that sense.'
- source_word: בִּירוּשָׁלָם
  chosen: Jerusalem
  lexicon: HALOT
  rationale: Proper name transliterated by standard English convention.
