theological_decisions:
- issue: Divine inheritance language applied to Judah
  chosen_reading: Retain the anthropomorphic covenantal wording 'the LORD will inherit
    Judah as his portion'
  alternative_readings:
  - the LORD will take Judah as his possession
  rationale: The Hebrew uses inheritance/allotment language, reversing the more familiar
    idea of Israel inheriting the land. Preserving this wording maintains the theological
    tension of mutual belonging between the LORD, Judah, and the land rather than
    smoothing it into generic possession language.
  doctrine_reference: Translation philosophy §3, §5
- issue: Rendering of אַדְמַת הַקֹּדֶשׁ
  chosen_reading: the holy land
  alternative_readings:
  - the holy ground
  - the holy soil
  rationale: The phrase denotes the land in its consecrated status, not merely a patch
    of ground. 'The holy land' communicates the covenantal-geographical sense in readable
    English without adding doctrinal content beyond the Hebrew.
  doctrine_reference: Translation philosophy §6
