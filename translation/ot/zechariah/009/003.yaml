id: ZEC.9.3
reference: Zechariah 9:3
source:
  edition: WLC
  text: וַ/תִּ֥בֶן צֹ֛ר מָצ֖וֹר לָ֑/הּ וַ/תִּצְבָּר כֶּ֨סֶף֙ כֶּֽ/עָפָ֔ר וְ/חָר֖וּץ
    כְּ/טִ֥יט חוּצֽוֹת־׃
translation:
  text: Tyre built herself a fortress, and piled up silver like dust, and gold like
    the mud of the streets.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'stronghold' for 'fortress.' The Hebrew מָצוֹר can denote a fortified
      place or defensive works.
    reason: lexical_alternative
  - marker: b
    text: Or 'fine gold' for 'gold.' The Hebrew חָרוּץ can refer specifically to refined
      gold in some contexts.
    reason: lexical_alternative
lexical_decisions:
- source_word: צֹר
  chosen: Tyre
  alternatives:
  - Zor
  lexicon: HALOT
  rationale: Proper place name referring to the Phoenician city; standard English
    transliteration is 'Tyre.'
- source_word: וַתִּבֶן
  chosen: built
  alternatives:
  - has built
  - constructed
  lexicon: HALOT
  rationale: Wayyiqtol form narrates a past action; 'built' is the straightforward
    narrative rendering.
- source_word: מָצוֹר
  chosen: fortress
  alternatives:
  - stronghold
  - siegework
  - rampart
  lexicon: HALOT
  rationale: In context of Tyre's self-protection and wealth, the noun denotes a fortified
    defense. 'Fortress' is clear modern English and fits the city's military security.
- source_word: לָהּ
  chosen: herself
  alternatives:
  - for herself
  lexicon: HALOT
  rationale: The pronominal suffix is feminine singular matching the city Tyre, personified
    as feminine. 'Built herself a fortress' is idiomatic English while preserving
    the reflexive sense.
- source_word: וַתִּצְבָּר
  chosen: piled up
  alternatives:
  - heaped up
  - stored up
  - amassed
  lexicon: HALOT
  rationale: The verb conveys accumulating in quantity. 'Piled up' preserves the concrete
    imagery and suits the similes that follow.
- source_word: כֶּסֶף
  chosen: silver
  alternatives:
  - money
  lexicon: HALOT
  rationale: The literal metal is preferable here because it pairs with 'gold' and
    contributes to the poetic image of amassed wealth.
- source_word: כֶּעָפָר
  chosen: like dust
  alternatives:
  - as dust
  lexicon: HALOT
  rationale: Simile of abundance; 'like dust' is natural English and preserves the
    comparison.
- source_word: חָרוּץ
  chosen: gold
  alternatives:
  - fine gold
  - yellow gold
  lexicon: HALOT
  rationale: In this context the noun refers to precious metal, commonly rendered
    'gold.' 'Fine gold' is possible but not required by the immediate syntax.
- source_word: כְּטִיט חוּצוֹת
  chosen: like the mud of the streets
  alternatives:
  - like street mire
  - like mire in the streets
  lexicon: HALOT
  rationale: The phrase compares Tyre's gold to abundant mud in public streets. 'Mud
    of the streets' is vivid, readable, and faithful to the Hebrew image.
