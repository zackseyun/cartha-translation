theological_decisions:
- issue: Referent of the 3ms suffixes in 'his goodness' and 'his beauty'
  chosen_reading: The suffixes refer to the LORD, whose saving kingship and blessing
    are in view in the surrounding context.
  alternative_readings:
  - The suffixes refer to the land or to Israel/Zion's restored condition.
  - The suffixes refer to the king mentioned earlier in the chapter.
  rationale: The immediate context celebrates the LORD's saving action (v. 16), making
    divine goodness and beauty/splendor the most coherent antecedent. The verse then
    moves to covenant-blessing imagery in grain and new wine. Because the Hebrew suffix
    itself does not explicitly identify the referent, alternatives are preserved in
    a footnote rather than resolved dogmatically.
  doctrine_reference: Preserve theological tension rather than resolve it.
