id: ZEC.9.17
reference: Zechariah 9:17
source:
  edition: WLC
  text: כִּ֥י מַה טּוּב֖/וֹ וּ/מַה יָפְי֑/וֹ דָּגָן֙ בַּֽחוּרִ֔ים וְ/תִיר֖וֹשׁ יְנוֹבֵ֥ב
    בְּתֻלֽוֹת־־׃
translation:
  text: For how great is his goodness, and how great his beauty! Grain will make the
    young men flourish, and new wine the young women.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or, ''how good he is, and how beautiful he is.'' The Hebrew uses abstract
      nouns: ''his goodness'' and ''his beauty.'''
    reason: lexical_alternative
  - marker: b
    text: Or 'virgins' for 'young women.' The Hebrew בְּתֻלוֹת can more specifically
      denote unmarried virgins, though here it likely functions as the female counterpart
      to 'young men.'
    reason: lexical_alternative
  - marker: c
    text: The 'his' in 'his goodness' and 'his beauty' most likely refers to the LORD
      in context, though some understand it to refer to Israel's restored condition
      or to the king.
    reason: alternative_reading
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Surely
  lexicon: HALOT
  rationale: Introduces an exclamatory explanation flowing from the previous verse.
    'For' preserves the connective force without overstating emphasis.
- source_word: מַה טּוּבוֹ
  chosen: how great is his goodness
  alternatives:
  - how good he is
  - what goodness is his
  lexicon: HALOT
  rationale: The construction is exclamatory ('how great...'). טוּב denotes goodness/bounty.
    'His goodness' preserves the noun with 3ms suffix, likely referring to the LORD
    in context.
- source_word: וּמַה יָפְיוֹ
  chosen: and how great his beauty
  alternatives:
  - and how great is his beauty
  - and how beautiful he is
  lexicon: HALOT
  rationale: Parallel exclamatory clause with יֹפִי/יָפְי denoting beauty/splendor.
    Rendering as a noun phrase preserves the Hebrew parallelism and avoids over-paraphrasing.
- source_word: דָּגָן
  chosen: Grain
  alternatives:
  - corn
  - grain harvest
  lexicon: HALOT
  rationale: Refers broadly to grain/cereal produce, not specifically maize. 'Grain'
    is standard modern English.
- source_word: בַּחוּרִים
  chosen: the young men
  alternatives:
  - young men
  - chosen ones
  lexicon: HALOT
  rationale: In this context the noun refers to youths/young men, paired with 'young
    women' in the next colon. The article is represented naturally in English.
- source_word: יְנוֹבֵב
  chosen: will make ... flourish
  alternatives:
  - will make ... thrive
  - will cause ... to sprout
  - will cheer
  lexicon: HALOT
  rationale: The verb is rare and contextually denotes causing vigorous growth or
    flourishing. 'Make ... flourish' fits the agricultural abundance imagery and the
    causative sense better than a more wooden but obscure rendering.
- source_word: וְתִירוֹשׁ
  chosen: and new wine
  alternatives:
  - and wine
  - and fresh wine
  lexicon: HALOT
  rationale: תירוש commonly denotes fresh/new wine. 'New wine' preserves the specific
    lexical sense and the poetic parallel with grain.
- source_word: בְּתֻלוֹת
  chosen: the young women
  alternatives:
  - virgins
  - maidens
  lexicon: HALOT
  rationale: Though the lexical core can be 'virgins,' in this poetic pairing with
    בַּחוּרִים the emphasis is on unmarried young women as a social group. 'Young
    women' is more natural English in context, while the more specific alternative
    is preserved in a footnote.
