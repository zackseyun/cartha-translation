id: ZEC.9.5
reference: Zechariah 9:5
source:
  edition: WLC
  text: תֵּרֶ֨א אַשְׁקְל֜וֹן וְ/תִירָ֗א וְ/עַזָּה֙ וְ/תָחִ֣יל מְאֹ֔ד וְ/עֶקְר֖וֹן
    כִּֽי הֹבִ֣ישׁ מֶבָּטָ֑/הּ וְ/אָ֤בַד מֶ֨לֶךְ֙ מֵֽ/עַזָּ֔ה וְ/אַשְׁקְל֖וֹן לֹ֥א
    תֵשֵֽׁב־׃
translation:
  text: Ashkelon will see it and fear; Gaza also will writhe greatly, and Ekron, because
    her hope has been put to shame. A king will perish from Gaza, and Ashkelon will
    not be inhabited.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'because her expectation has been disappointed.'
    reason: lexical_alternative
  - marker: b
    text: Or 'Gaza will writhe greatly'; the Hebrew sequence may be read with Gaza
      as the subject of 'will writhe greatly.'
    reason: alternative_reading
lexical_decisions:
- source_word: תֵּרֶא
  chosen: will see it
  alternatives:
  - will see
  - will look
  lexicon: HALOT
  rationale: Qal imperfect 3fs of ראה with Ashkelon as feminine singular subject.
    The object is implicit from context (the preceding judgment/oracle sequence),
    and English reads more naturally with 'it' supplied.
- source_word: וְתִירָא
  chosen: and fear
  alternatives:
  - and be afraid
  lexicon: HALOT
  rationale: Qal imperfect of ירא expresses fear in response to what is seen. 'Fear'
    is concise and preserves the prophetic cadence.
- source_word: וְתָחִיל מְאֹד
  chosen: also will writhe greatly
  alternatives:
  - will tremble greatly
  - will be in anguish greatly
  lexicon: HALOT
  rationale: From חול/חיל, often denoting writhing, trembling, or labor-like anguish.
    'Writhe greatly' preserves the visceral force better than the flatter 'tremble,'
    while remaining natural English.
- source_word: מֶבָּטָהּ
  chosen: her hope
  alternatives:
  - her expectation
  - that to which she looked
  lexicon: HALOT
  rationale: The noun denotes expectation or object of hope. 'Her hope' is the most
    idiomatic concise rendering in context, referring to Ekron's expected security/support.
- source_word: הֹבִישׁ
  chosen: has been put to shame
  alternatives:
  - is ashamed
  - has been disappointed
  lexicon: HALOT
  rationale: Hiphil of בוש here conveys causing shame/disappointment. The passive
    English 'has been put to shame' captures the causative sense and the collapse
    of expectation.
- source_word: וְאָבַד מֶלֶךְ מֵעַזָּה
  chosen: A king will perish from Gaza
  alternatives:
  - The king will perish from Gaza
  - A king will disappear from Gaza
  lexicon: HALOT
  rationale: 'אָבַד means perish/be lost. The Hebrew lacks the article on ''king,''
    so ''a king'' is preferable to ''the king.'' ''From Gaza'' reflects מִן marking
    source/origin: Gaza will lose its king.'
- source_word: לֹא תֵשֵׁב
  chosen: will not be inhabited
  alternatives:
  - will not be settled
  - will not remain inhabited
  lexicon: HALOT
  rationale: Qal imperfect of ישב with city subject commonly means to be inhabited.
    This is more idiomatic in English than the more wooden 'will not sit/dwell.'
- source_word: אַשְׁקְלוֹן / עַזָּה / עֶקְרוֹן
  chosen: Ashkelon / Gaza / Ekron
  rationale: 'Place names are transliterated according to the translation philosophy:
    translate titles, transliterate names.'
