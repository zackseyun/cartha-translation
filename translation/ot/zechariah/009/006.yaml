id: ZEC.9.6
reference: Zechariah 9:6
source:
  edition: WLC
  text: וְ/יָשַׁ֥ב מַמְזֵ֖ר בְּ/אַשְׁדּ֑וֹד וְ/הִכְרַתִּ֖י גְּא֥וֹן פְּלִשְׁתִּֽים׃
translation:
  text: A mixed people will dwell in Ashdod, and I will cut off the pride of the Philistines.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'an illegitimate person will dwell in Ashdod.' The Hebrew מַמְזֵר is
      difficult and may denote a person of mixed or excluded status; here it is rendered
      collectively in context.
    reason: lexical_alternative
lexical_decisions:
- source_word: יָשַׁב
  chosen: will dwell
  alternatives:
  - will live
  - will settle
  lexicon: HALOT
  rationale: The verb commonly means to sit, dwell, or inhabit. In this prophetic
    context of population change in a city, 'will dwell' is natural modern English
    and preserves the sense of inhabiting or residing.
- source_word: מַמְזֵר
  chosen: a mixed people
  alternatives:
  - an illegitimate person
  - a foreigner
  - a mongrel people
  lexicon: HALOT
  rationale: The noun is difficult and contextually refers not merely to one illegitimate
    individual but to a socially mixed or non-native population occupying Ashdod.
    'A mixed people' best captures the collective force implied by the prophetic context
    and avoids the misleadingly narrow modern sense of 'bastard,' while preserving
    the idea of ethnic/social mixture.
- source_word: בְּאַשְׁדּוֹד
  chosen: in Ashdod
  alternatives:
  - at Ashdod
  lexicon: HALOT
  rationale: The preposition ב marks location. 'In Ashdod' is the most idiomatic rendering
    for residence within the city.
- source_word: הִכְרַתִּי
  chosen: I will cut off
  alternatives:
  - I will destroy
  - I will remove
  lexicon: HALOT
  rationale: The Hiphil of כרת often means to cut off, remove, or eliminate. 'Cut
    off' preserves the vivid covenantal/judicial force of the Hebrew and is a standard
    prophetic idiom.
- source_word: גְּאוֹן
  chosen: the pride
  alternatives:
  - the arrogance
  - the majesty
  lexicon: HALOT
  rationale: The noun can denote exaltation, pride, or majesty. In an oracle of judgment
    against Philistia, the negative sense 'pride' fits best, referring to their boastful
    power or self-exaltation.
- source_word: פְּלִשְׁתִּים
  chosen: the Philistines
  alternatives:
  - Philistia
  lexicon: HALOT
  rationale: The form is the people-group, not the land. Therefore 'the Philistines'
    is the precise rendering.
