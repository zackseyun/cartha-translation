theological_decisions:
- issue: Referent and nuance of מַמְזֵר in a judgment oracle
  chosen_reading: Rendered collectively as 'a mixed people' occupying Ashdod
  alternative_readings:
  - '''an illegitimate person'''
  - '''a foreigner'''
  rationale: The verse concerns the humiliation and displacement of Philistine identity.
    A strictly individual rendering ('an illegitimate person') is possible lexically
    but sounds too narrow in English and underrepresents the likely collective/social
    sense in context. 'A mixed people' communicates the loss of ethnic distinctiveness
    and civic pride without importing later doctrinal or ethnic polemics.
  doctrine_reference: Translation philosophy §§1, 3, 6
