id: ZEC.9.9
reference: Zechariah 9:9
source:
  edition: WLC
  text: גִּילִ֨י מְאֹ֜ד בַּת צִיּ֗וֹן הָרִ֨יעִי֙ בַּ֣ת יְרוּשָׁלִַ֔ם הִנֵּ֤ה מַלְכֵּ/ךְ֙
    יָ֣בוֹא לָ֔/ךְ צַדִּ֥יק וְ/נוֹשָׁ֖ע ה֑וּא עָנִי֙ וְ/רֹכֵ֣ב עַל חֲמ֔וֹר וְ/עַל
    עַ֖יִר בֶּן אֲתֹנֽוֹת־־־־׃
translation:
  text: Rejoice greatly, daughter Zion! Shout in triumph, daughter Jerusalem! Look,
    your king is coming to you—righteous and victorious is he, humble and riding on
    a donkey, on a colt, the foal of a she-donkey.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'righteous and saved is he,' or 'righteous and having salvation.' The
      Hebrew term can describe one who has been delivered by God and therefore comes
      in victory.
    reason: alternative_reading
  - marker: b
    text: Or 'lowly,' 'poor,' or 'afflicted.' The Hebrew word can denote humble status
      or condition as well as demeanor.
    reason: lexical_alternative
  - marker: c
    text: The phrase 'on a donkey, on a colt, the foal of a she-donkey' is likely
      poetic parallelism describing one animal from two angles.
    reason: cultural_note
lexical_decisions:
- source_word: גִּילִי
  chosen: Rejoice
  alternatives:
  - Exult
  - Be glad
  lexicon: HALOT
  rationale: Imperative feminine singular addressed to 'daughter Zion.' 'Rejoice'
    is natural modern English and preserves the call to joyful celebration without
    overstating the nuance.
- source_word: מְאֹד
  chosen: greatly
  alternatives:
  - very much
  - exceedingly
  lexicon: HALOT
  rationale: Adverb intensifying the imperative. 'Greatly' is idiomatic with 'rejoice'
    in English.
- source_word: בַּת צִיּוֹן
  chosen: daughter Zion
  alternatives:
  - Daughter Zion
  - O daughter of Zion
  lexicon: HALOT
  rationale: A personified designation for the city/people. Kept as 'daughter Zion'
    rather than expanding to 'people of Zion' in order to preserve the prophetic imagery.
    Lowercase 'daughter' treats it as an appellative rather than a proper name.
- source_word: הָרִיעִי
  chosen: Shout in triumph
  alternatives:
  - Raise a shout
  - Shout aloud
  lexicon: HALOT
  rationale: Imperative from a verb used for a loud cry, often of jubilation or battle
    acclamation. 'Shout in triumph' captures the celebratory force in this royal-arrival
    context better than the more neutral 'shout aloud.'
- source_word: בַּת יְרוּשָׁלִַם
  chosen: daughter Jerusalem
  alternatives:
  - Daughter Jerusalem
  - O daughter of Jerusalem
  lexicon: HALOT
  rationale: Parallel to 'daughter Zion'; preserved literally for poetic and prophetic
    personification.
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: Deictic particle drawing attention. 'Look' is readable modern English
    and retains the force without archaic tone.
- source_word: מַלְכֵּךְ יָבוֹא לָךְ
  chosen: your king is coming to you
  alternatives:
  - your king comes to you
  - your king will come to you
  lexicon: HALOT
  rationale: The Hebrew imperfect can be rendered futurally or as imminent/presentive.
    'Is coming' conveys vivid prophetic immediacy in English while preserving the
    directional phrase 'to you.'
- source_word: צַדִּיק
  chosen: righteous
  alternatives:
  - just
  lexicon: HALOT
  rationale: Describes the king's moral and covenantal character. 'Righteous' better
    preserves the theological resonance than 'just,' though the latter is possible.
- source_word: וְנוֹשָׁע
  chosen: victorious
  alternatives:
  - saved
  - having salvation
  - delivered
  lexicon: HALOT
  rationale: Niphal participle of ישׁע can mean 'saved/delivered' or, in royal context,
    one who has been granted victory. In this enthronement-like announcement, 'victorious'
    communicates the result of divine deliverance in idiomatic English. Because 'saved'
    is a significant alternative with theological and messianic importance, it is
    preserved in a footnote.
- source_word: הוּא
  chosen: is he
  alternatives:
  - he is
  lexicon: HALOT
  rationale: Explicit pronoun retained for emphasis. The inverted English order after
    the dash gives a slightly elevated but still natural emphasis matching the Hebrew
    predicate sequence.
- source_word: עָנִי
  chosen: humble
  alternatives:
  - afflicted
  - poor
  - lowly
  lexicon: HALOT
  rationale: The adjective can denote poverty, affliction, or lowliness. In the context
    of the king's demeanor and mode of arrival, 'humble' best captures the intended
    contrast with worldly pomp, while 'lowly' and 'poor' remain viable alternatives.
- source_word: וְרֹכֵב עַל חֲמוֹר
  chosen: and riding on a donkey
  alternatives:
  - mounted on a donkey
  lexicon: HALOT
  rationale: Participial phrase describing the king's manner of arrival. 'Riding on
    a donkey' is straightforward and preserves the image.
- source_word: וְעַל עַיִר בֶּן אֲתֹנוֹת
  chosen: on a colt, the foal of a she-donkey
  alternatives:
  - even on a colt, the foal of a donkey
  - on a young donkey, the offspring of she-donkeys
  lexicon: HALOT
  rationale: Likely a poetic restatement/apposition intensifying the donkey imagery
    rather than describing a second animal in the Hebrew syntax. 'Colt, the foal of
    a she-donkey' preserves the parallelism and specificity. 'She-donkey' reflects
    אֲתֹנוֹת more precisely than the generic 'donkey.'
