theological_decisions:
- issue: Rendering of וְנוֹשָׁע in a messianic royal prophecy
  chosen_reading: victorious
  alternative_readings:
  - saved
  - having salvation
  rationale: The participle is passive in form and can be rendered 'saved/delivered,'
    but in context it characterizes the king as one endowed with divine deliverance
    and thus triumphant. 'Victorious' communicates this in natural English without
    denying divine agency. Because the verse is messianically significant and 'saved'
    is a longstanding interpretive option, the alternative is preserved in a footnote
    rather than erased.
  doctrine_reference: Preserve theological tension rather than resolve it
- issue: Rendering עָנִי for the coming king
  chosen_reading: humble
  alternative_readings:
  - poor
  - afflicted
  - lowly
  rationale: The term can denote socioeconomic poverty or afflicted lowliness, but
    in this royal-entry context the emphasis is on the king's meek, non-imperial manner.
    'Humble' best communicates that sense in contemporary English while leaving room
    for the broader semantic field in a footnote.
  doctrine_reference: Optimal equivalence; preserve source meaning without importing
    doctrinal claims
