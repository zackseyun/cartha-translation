theological_decisions:
- issue: Interpretation of the transformed Philistine's status
  chosen_reading: The verse depicts former Philistine enemies being cleansed from
    idolatrous/unclean practices and incorporated into the people belonging to Israel's
    God.
  alternative_readings:
  - The verse refers only to political subjugation, not religious incorporation
  - The singular refers corporately to Philistia rather than an individual representative
  rationale: 'The language of removing blood and detestable things, followed by ''he
    too'' and ''for our God,'' strongly suggests more than conquest: it portrays purification
    and inclusion. The singular may be representative, but the main text can preserve
    the singular while allowing the broader corporate sense.'
  doctrine_reference: 'Translation philosophy §3: preserve theological tension rather
    than resolve it'
- issue: Remnant terminology in וְנִשְׁאַר
  chosen_reading: Use 'be a remnant' in the main text to preserve prophetic resonance.
  alternative_readings:
  - Use 'remain' with no remnant nuance
  rationale: Although the verb can be rendered more generically, Zechariah's prophetic
    context makes the remnant nuance significant. This is not a doctrinal imposition
    but a contextually grounded lexical-theological choice.
  doctrine_reference: Translation philosophy §1 and §5
