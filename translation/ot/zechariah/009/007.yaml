id: ZEC.9.7
reference: Zechariah 9:7
source:
  edition: WLC
  text: וַ/הֲסִרֹתִ֨י דָמָ֜י/ו מִ/פִּ֗י/ו וְ/שִׁקֻּצָי/ו֙ מִ/בֵּ֣ין שִׁנָּ֔י/ו וְ/נִשְׁאַ֥ר
    גַּם ה֖וּא לֵֽ/אלֹהֵ֑י/נוּ וְ/הָיָה֙ כְּ/אַלֻּ֣ף בִּֽ/יהוּדָ֔ה וְ/עֶקְר֖וֹן כִּ/יבוּסִֽי־׃
translation:
  text: I will remove his blood from his mouth and his detestable things from between
    his teeth. Then he too will be a remnant for our God; he will be like a clan leader
    in Judah, and Ekron will be like the Jebusite.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'he too will remain for our God' or 'he too will be left for our God.'
      The Hebrew verb can be rendered more generally as 'remain,' though 'be a remnant'
      preserves the prophetic nuance.
    reason: lexical_alternative
  - marker: b
    text: '''Detestable things'' likely refers to idolatrous or ritually unclean things,
      possibly food associated with pagan worship.'
    reason: cultural_note
  - marker: c
    text: '''Like the Jebusite'' likely suggests incorporation into Judah, as the
      Jebusites were absorbed into Jerusalem rather than remaining a separate hostile
      power.'
    reason: cross_reference
lexical_decisions:
- source_word: וַהֲסִרֹתִי
  chosen: I will remove
  alternatives:
  - I will take away
  - I will turn aside
  lexicon: HALOT
  rationale: Hiphil of סור here is causative, expressing YHWH's action of removing/turning
    away what is in the Philistine's mouth. 'Remove' is clear modern English and fits
    both objects that follow.
- source_word: דָמָיו
  chosen: his blood
  alternatives:
  - his bloodshed
  - blood
  lexicon: HALOT
  rationale: Literal 'his blood' is retained. In context it likely refers to blood
    consumed in pagan practice or bloodguilt symbolized by what is in his mouth, but
    the Hebrew noun itself is simply 'blood,' and the imagery should be preserved
    rather than interpreted away in the main text.
- source_word: מִפִּיו
  chosen: from his mouth
  lexicon: HALOT
  rationale: Concrete bodily imagery is preserved; it pairs with 'from between his
    teeth' in a vivid picture of removing defiling food/practice.
- source_word: שִׁקֻּצָיו
  chosen: his detestable things
  alternatives:
  - his abominations
  - his unclean things
  lexicon: HALOT
  rationale: שִׁקּוּץ often denotes idolatrous or ritually abhorrent things. 'Detestable
    things' is accessible modern English and preserves the strong negative force without
    importing a narrower interpretation than the Hebrew requires.
- source_word: מִבֵּין שִׁנָּיו
  chosen: from between his teeth
  alternatives:
  - from among his teeth
  lexicon: HALOT
  rationale: A literal rendering best preserves the image of forbidden food or idolatrous
    consumption being removed.
- source_word: וְנִשְׁאַר גַּם הוּא
  chosen: Then he too will be a remnant
  alternatives:
  - and he too will remain
  - and he too will be left
  lexicon: HALOT
  rationale: The Niphal of שׁאר can mean 'remain/be left over.' Given prophetic remnant
    language and the following phrase 'for our God,' 'be a remnant' captures both
    the lexical sense and the theological resonance. The adverb גַּם and pronoun הוּא
    are reflected by 'too.'
- source_word: לֵאלֹהֵינוּ
  chosen: for our God
  alternatives:
  - belonging to our God
  - for our gods?
  lexicon: HALOT
  rationale: The preposition ל marks relation or belonging. 'For our God' is concise
    and natural, implying incorporation into the people belonging to Israel's God.
    The plural reading is excluded by context and pointing; this is 'our God.'
- source_word: וְהָיָה כְּאַלֻּף בִּיהוּדָה
  chosen: he will be like a clan leader in Judah
  alternatives:
  - he will be like a chief in Judah
  - he will be like a thousand in Judah
  lexicon: HALOT
  rationale: אַלּוּף can denote a clan chief/chieftain. 'Clan leader' communicates
    social prominence in understandable English. The older association with 'thousand'
    is less likely here than the leadership sense.
- source_word: וְעֶקְרוֹן כִּיבוּסִי
  chosen: and Ekron will be like the Jebusite
  alternatives:
  - and Ekron like a Jebusite
  lexicon: HALOT
  rationale: The comparison likely points to incorporation/subordination within Judah,
    as the Jebusites were absorbed into Israelite Jerusalem. The ethnic name is transliterated
    as a people-group designation.
