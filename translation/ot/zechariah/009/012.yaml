id: ZEC.9.12
reference: Zechariah 9:12
source:
  edition: WLC
  text: שׁ֚וּבוּ לְ/בִצָּר֔וֹן אֲסִירֵ֖י הַ/תִּקְוָ֑ה גַּם הַ/יּ֕וֹם מַגִּ֥יד מִשְׁנֶ֖ה
    אָשִׁ֥יב לָֽ/ךְ־׃
translation:
  text: Return to the stronghold, prisoners of hope; even today I declare that I will
    restore double to you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'captives of hope.' The Hebrew expression is metaphorical and may suggest
      those bound yet sustained by hope.
    reason: lexical_alternative
  - marker: b
    text: Or 'I will restore a double portion to you' or 'I will repay you double.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שׁוּבוּ
  chosen: Return
  alternatives:
  - Turn back
  - Come back
  lexicon: HALOT
  rationale: Qal imperative plural of שוב. 'Return' fits both the physical and covenantal
    resonance without over-specifying either.
- source_word: לְבִצָּרוֹן
  chosen: to the stronghold
  alternatives:
  - to a fortress
  - to safety
  lexicon: HALOT
  rationale: בצרון denotes a fortified place/stronghold. 'Stronghold' preserves the
    concrete image while allowing the prophetic metaphor to stand.
- source_word: אֲסִירֵי הַתִּקְוָה
  chosen: prisoners of hope
  alternatives:
  - captives of hope
  - hopeful prisoners
  lexicon: HALOT
  rationale: Construct chain literally means 'prisoners of the hope.' 'Prisoners of
    hope' is idiomatic in English and preserves the striking metaphor better than
    smoothing it into an adjective.
- source_word: גַּם הַיּוֹם
  chosen: even today
  alternatives:
  - also today
  - this very day
  lexicon: HALOT
  rationale: The phrase emphasizes immediacy. 'Even today' communicates the emphatic
    force naturally in modern English.
- source_word: מַגִּיד
  chosen: I declare
  alternatives:
  - I announce
  - I proclaim
  lexicon: HALOT
  rationale: Participle of נגד used with a first-person following verb functions as
    a present declaration. English finite verb 'I declare' is the most natural rendering.
- source_word: מִשְׁנֶה
  chosen: double
  alternatives:
  - a double portion
  - twice as much
  lexicon: HALOT
  rationale: מִשְׁנֶה commonly means 'double' or 'double portion.' 'Double' is concise
    and leaves the object of restoration implicit as in the Hebrew.
- source_word: אָשִׁיב לָךְ
  chosen: I will restore double to you
  alternatives:
  - I will repay you double
  - I will return double to you
  lexicon: HALOT
  rationale: Hiphil of שוב here is causative/ restitutive. 'Restore' fits the context
    of promised reversal and blessing better than the more transactional 'repay.'
    The 2fs suffix is rendered as singular 'you,' likely addressing Daughter Zion/covenantal
    community as a personified singular.
