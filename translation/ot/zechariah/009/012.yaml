theological_decisions:
- issue: Referent of the singular pronoun in 'to you'
  chosen_reading: Singular 'you' retained without expansion, likely addressing personified
    Zion/Jerusalem or the covenant people as a collective singular.
  alternative_readings:
  - Address to each individual prisoner collectively
  - Address specifically to Daughter Zion from the surrounding context
  rationale: The Hebrew suffix is singular feminine, but English 'you' does not mark
    gender or number. The translation preserves the source's direct address without
    importing an interpretive expansion into the main text.
  doctrine_reference: Preserve theological tension rather than resolve it.
