id: ZEC.9.15
reference: Zechariah 9:15
source:
  edition: WLC
  text: יְהוָ֣ה צְבָאוֹת֮ יָגֵ֣ן עֲלֵי/הֶם֒ וְ/אָכְל֗וּ וְ/כָֽבְשׁוּ֙ אַבְנֵי קֶ֔לַע וְ/שָׁת֥וּ הָמ֖וּ כְּמוֹ יָ֑יִן וּ/מָֽלְאוּ֙ כַּ/מִּזְרָ֔ק כְּ/זָוִיּ֖וֹת מִזְבֵּֽחַ־־׃
translation:
  text: Yahweh of Armies will shield them, and they will devour and tread down the sling stones; they will drink and roar as if with wine, and they will be filled like a bowl, like the corners of the altar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'The LORD of hosts.'
    reason: alternative_reading
  - marker: b
    text: The Hebrew term for 'bowl' refers to a vessel used in sacrificial rites.
    reason: cultural_note
  - marker: c
    text: The imagery likely evokes blood applied or splashed at the altar, but the Hebrew text says simply 'like the corners of the altar.'
    reason: cross_reference
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving covenantal reference while matching established English Bible convention.
- source_word: צְבָאוֹת
  chosen: of Armies
  alternatives:
  - of hosts
  lexicon: HALOT
  rationale: Rendered as 'Armies' rather than the traditional 'hosts' for modern readability while preserving the military sense in this battle context.
- source_word: יָגֵן עֲלֵיהֶם
  chosen: will shield them
  alternatives:
  - will defend them
  - will protect them
  lexicon: HALOT
  rationale: The verb denotes covering/protecting. 'Shield them' keeps the martial imagery and is more vivid than the broader 'protect.'
- source_word: וְאָכְלוּ
  chosen: they will devour
  alternatives:
  - they will eat
  - they will consume
  lexicon: HALOT
  rationale: Although literally 'eat,' in a warfare context this idiom conveys overwhelming conquest. 'Devour' preserves the metaphor without flattening it into mere literal eating.
- source_word: וְכָבְשׁוּ
  chosen: trample
  alternatives:
  - subdue
  - conquer
  lexicon: HALOT
  rationale: The verb can mean subdue or bring under control. With 'sling stones' as the object, 'trample' best captures the image of treating enemy missiles as powerless underfoot.
- source_word: אַבְנֵי קֶלַע
  chosen: the sling stones
  alternatives:
  - slingstones
  - stones of a sling
  lexicon: HALOT
  rationale: A straightforward rendering of the construct phrase. The article is supplied naturally in English for a definite battlefield image.
- source_word: וְשָׁתוּ
  chosen: they will drink
  lexicon: HALOT
  rationale: Retains the literal verb, which introduces the following simile of intoxication/exultation.
- source_word: הָמוּ
  chosen: roar
  alternatives:
  - make a шум/uproar
  - be noisy
  - be tumultuous
  lexicon: HALOT
  rationale: The verb denotes making a loud noise or tumult. 'Roar' fits the image of battle frenzy and intoxicated exultation better than the more colorless 'be noisy.'
- source_word: כְּמוֹ יָיִן
  chosen: as if with wine
  alternatives:
  - like wine
  lexicon: HALOT
  rationale: The comparison is not that they become wine, but that their noisy excitement resembles that produced by wine. 'As if with wine' makes the simile idiomatic in English.
- source_word: וּמָלְאוּ
  chosen: they will be filled
  alternatives:
  - they will be full
  lexicon: HALOT
  rationale: 'Passive-like/resultative sense in context: they become full. This preserves the imagery without over-interpreting the implied content.'
- source_word: כַּמִּזְרָק
  chosen: like a bowl
  alternatives:
  - like a sacrificial bowl
  - like a basin
  lexicon: HALOT
  rationale: מִזְרָק is a bowl/basin used in sacrificial ritual. 'Bowl' is clear in the main text; the cultic specificity is worth preserving in a footnote.
- source_word: כְּזָוִיּוֹת מִזְבֵּחַ
  chosen: like the corners of the altar
  alternatives:
  - like the altar's corners
  lexicon: HALOT
  rationale: A formal rendering that preserves the sacrificial imagery, likely alluding to blood splashed on the altar's corners/horns area without importing more specificity than the Hebrew states.
