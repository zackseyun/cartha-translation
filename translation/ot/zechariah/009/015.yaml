theological_decisions:
- issue: Rendering the divine title יְהוָה צְבָאוֹת
  chosen_reading: Yahweh of Armies
  alternative_readings:
  - The LORD of hosts
  rationale: This keeps the covenant name according to project policy and renders צְבָאוֹת with a transparent modern English equivalent suited to the military context of the verse.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Handling the violent and sacrificial imagery
  chosen_reading: Preserve the battle and cultic metaphors without allegorizing or softening them
  alternative_readings:
  - Interpret the imagery more abstractly as general victory or celebration
  rationale: The verse combines military triumph with sacrificial imagery. The translation keeps both tensions visible rather than resolving them into a single explanatory paraphrase.
