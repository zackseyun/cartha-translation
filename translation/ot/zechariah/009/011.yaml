id: ZEC.9.11
reference: Zechariah 9:11
source:
  edition: WLC
  text: גַּם אַ֣תְּ בְּ/דַם בְּרִיתֵ֗/ךְ שִׁלַּ֤חְתִּי אֲסִירַ֨יִ/ךְ֙ מִ/בּ֔וֹר אֵ֥ין
    מַ֖יִם בּֽ/וֹ־־׃
translation:
  text: As for you also, because of the blood of your covenant, I have sent out your
    prisoners from the pit in which there is no water.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'by the blood of your covenant.' The Hebrew preposition can be understood
      instrumentally as well as causally.
    reason: lexical_alternative
  - marker: b
    text: '''Pit'' may also be rendered ''cistern'' or ''dungeon,'' a waterless holding
      place.'
    reason: lexical_alternative
lexical_decisions:
- source_word: גַּם
  chosen: also
  alternatives:
  - even
  - indeed
  lexicon: HALOT
  rationale: Adds an emphatic/additive sense linking this address to the preceding
    promises; 'also' preserves the connective force without overtranslating.
- source_word: אַתְּ
  chosen: you
  alternatives:
  - you yourself
  lexicon: HALOT
  rationale: Second feminine singular pronoun, addressing daughter Zion/Jerusalem
    personified as female in context. English 'you' is natural; the feminine nuance
    is contextual rather than directly representable in the main text.
- source_word: בְּדַם
  chosen: because of the blood
  alternatives:
  - by the blood
  - through the blood
  - in the blood
  lexicon: HALOT
  rationale: The preposition ב here is best taken instrumentally/causally with covenantal
    force. 'Because of the blood' communicates that the covenant blood is the basis
    for the release. 'By the blood' is possible, but can sound overly mechanical in
    English.
- source_word: בְּרִיתֵךְ
  chosen: your covenant
  alternatives:
  - your treaty
  - your pact
  lexicon: HALOT
  rationale: '''Covenant'' is the standard and theologically appropriate rendering
    for ברית, especially in a prophetic context with redemptive overtones.'
- source_word: שִׁלַּחְתִּי
  chosen: I have sent out
  alternatives:
  - I have released
  - I have set free
  - I sent out
  lexicon: HALOT
  rationale: Perfect first common singular. 'I have sent out' stays close to the verbal
    idea of sending/releasing while fitting English idiom. 'Released' is interpretive
    but reflected in the object 'prisoners'; the more literal verb is retained in
    the main text.
- source_word: אֲסִירַיִךְ
  chosen: your prisoners
  alternatives:
  - your captives
  - those bound to you
  lexicon: HALOT
  rationale: Refers to those imprisoned or bound. 'Prisoners' is the most direct gloss;
    'captives' is possible and idiomatic, but 'prisoners' better matches the imagery
    of being brought out from a pit.
- source_word: מִבּוֹר
  chosen: from the pit
  alternatives:
  - from the cistern
  - from the dungeon
  lexicon: HALOT
  rationale: בור can denote a pit, cistern, or dungeon-like holding place. 'Pit' preserves
    the broad metaphor and echoes biblical imagery, while the waterless description
    clarifies the kind of pit in view.
- source_word: אֵין מַיִם בּוֹ
  chosen: in which there is no water
  alternatives:
  - where there is no water
  - that has no water in it
  lexicon: HALOT
  rationale: This clause describes the pit. 'In which there is no water' is clear,
    natural, and preserves the descriptive force of the Hebrew existential construction.
