theological_decisions:
- issue: Meaning of 'blood of your covenant'
  chosen_reading: Retained as covenantal language without specifying a particular
    covenant in the main text.
  alternative_readings:
  - allusion to the Sinai covenant ratified with blood
  - typological anticipation of the new covenant
  rationale: The phrase clearly invokes covenant ratification imagery, but the verse
    itself does not explicitly identify which covenantal moment is in view. The translation
    preserves the theological weight without importing a narrower doctrinal conclusion
    into the text.
  doctrine_reference: Preserve theological tension rather than resolve it.
