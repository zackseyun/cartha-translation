id: ZEC.9.4
reference: Zechariah 9:4
source:
  edition: WLC
  text: הִנֵּ֤ה אֲדֹנָ/י֙ יֽוֹרִשֶׁ֔/נָּה וְ/הִכָּ֥ה בַ/יָּ֖ם חֵילָ֑/הּ וְ/הִ֖יא בָּ/אֵ֥שׁ
    תֵּאָכֵֽל׃
translation:
  text: Behold, the Lord will dispossess her and strike her wealth into the sea, and
    she will be consumed by fire.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'her strength,' 'her army,' or 'her power'; the Hebrew term can denote
      wealth, resources, or military might. Here 'wealth' fits the immediate context
      of Tyre's riches in the preceding verse.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנֵּה
  chosen: Behold
  alternatives:
  - Look
  - See
  lexicon: HALOT
  rationale: Retains the prophetic deictic force and solemnity of the announcement.
    'Behold' is still natural enough in elevated English and fits prophetic discourse
    better than the more colloquial 'look' or 'see'.
- source_word: אֲדֹנָי
  chosen: the Lord
  alternatives:
  - Lord
  lexicon: HALOT
  rationale: This is the divine title Adonai, appropriately rendered 'the Lord.' The
    article in English is idiomatic with the title in this clause. It is not the Tetragrammaton
    here, so the small-caps convention 'the LORD' is not used.
- source_word: יוֹרִשֶׁנָּה
  chosen: will dispossess her
  alternatives:
  - will drive her out
  - will take possession of her
  - will impoverish her
  lexicon: HALOT
  rationale: The Hiphil of ירש commonly carries the sense of causing dispossession
    or taking possession. In context, with the feminine suffix referring to the city
    (Tyre in the preceding context), 'will dispossess her' best captures the judgment
    sense without over-specifying whether the emphasis is conquest or loss of holdings.
- source_word: וְהִכָּה
  chosen: and strike
  alternatives:
  - and smite
  - and strike down
  lexicon: HALOT
  rationale: A straightforward rendering of נכה. 'Strike' is clear modern English
    and avoids archaic 'smite.' 'Strike down' would add a nuance of killing not explicit
    in the object here.
- source_word: בַּיָּם
  chosen: into the sea
  alternatives:
  - in the sea
  - on the sea
  lexicon: HALOT
  rationale: With the verb 'strike' and the judgment context, English idiom favors
    'into the sea,' expressing the casting down or overthrow of Tyre's power/wealth
    into the sea. A more literal 'in the sea' is possible but less natural and less
    clear in context.
- source_word: חֵילָהּ
  chosen: her wealth
  alternatives:
  - her strength
  - her army
  - her power
  lexicon: HALOT
  rationale: חַיִל can denote wealth, strength, military force, or resources. In the
    immediate context of Tyre's accumulated silver and gold (v. 3), 'her wealth' is
    the most contextually grounded rendering, while still implying the broader resources
    that underwrite her power.
- source_word: וְהִיא
  chosen: and she
  alternatives:
  - and it
  lexicon: HALOT
  rationale: The pronoun is feminine singular, referring to the city as a feminine
    entity. English can render cities as 'she' in elevated literary style; this preserves
    the personified city imagery better than impersonal 'it.'
- source_word: בָּאֵשׁ
  chosen: by fire
  alternatives:
  - in fire
  - with fire
  lexicon: HALOT
  rationale: English idiom with a passive/resultative destruction verb prefers 'by
    fire' to express means or agency of destruction.
- source_word: תֵּאָכֵל
  chosen: will be consumed
  alternatives:
  - will be devoured
  - will be burned up
  lexicon: HALOT
  rationale: The Niphal of אכל here is a standard idiom for being consumed/devoured,
    especially by fire. 'Will be consumed' is natural and preserves the metaphor without
    flattening it to merely 'burned up.'
