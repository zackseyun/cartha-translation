theological_decisions:
- issue: Referent of feminine suffixes and pronoun
  chosen_reading: The feminine forms refer to the city addressed in context, rendered
    as a personified 'her/she.'
  alternative_readings:
  - Render the city impersonally as 'it'
  rationale: The Hebrew uses feminine singular forms, matching the common personification
    of cities. Preserving 'her/she' maintains the literary and prophetic force of
    the oracle without introducing doctrinal content.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented
    exception)
