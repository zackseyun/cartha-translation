theological_decisions:
- issue: Syntactic force of the clause about Tyre and Sidon
  chosen_reading: Tyre and Sidon are included in the oracle because of their great
    wisdom
  alternative_readings:
  - Tyre and Sidon are mentioned parenthetically as especially wise cities
  rationale: No major doctrinal issue is at stake, but the syntax is somewhat compressed.
    The translation keeps the causal force of כִּי without expanding into interpretation
    beyond the text.
  doctrine_reference: Translation philosophy §1, §6
- issue: Number/gender mismatch in חָכְמָה with Tyre and Sidon
  chosen_reading: Render the predicate in English plural ('they are very wise')
  alternative_readings:
  - Render singular with nearest antecedent ('for Sidon is very wise')
  - Render singular collectively ('for it is very wise')
  rationale: The Hebrew perfect 3fs can align with a feminine singular city name,
    but the coordinated pair Tyre and Sidon are both in view. English plural communicates
    the referent most clearly without forcing an artificial singular.
  doctrine_reference: Translation philosophy §6
