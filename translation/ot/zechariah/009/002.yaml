id: ZEC.9.2
reference: Zechariah 9:2
source:
  edition: WLC
  text: וְ/גַם חֲמָ֖ת תִּגְבָּל בָּ֑/הּ צֹ֣ר וְ/צִיד֔וֹן כִּ֥י חָֽכְמָ֖ה מְאֹֽד־־׃
translation:
  text: and also Hamath, which borders on it; Tyre and Sidon, because they are very
    wise.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Hamath also, which borders on it; Tyre and Sidon, for she is very wise.'
      The Hebrew shifts awkwardly between singular and coordinated city names.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/גַם
  chosen: and also
  alternatives:
  - also
  - even
  lexicon: HALOT
  rationale: Conjoins this clause with the preceding judgment sequence and adds emphasis/inclusion.
    'And also' preserves both the conjunction and the additive force of גַּם.
- source_word: חֲמָת
  chosen: Hamath
  lexicon: HALOT
  rationale: Proper place name; transliterated per translation philosophy.
- source_word: תִּגְבָּל
  chosen: which borders
  alternatives:
  - will border
  - is on the border
  lexicon: HALOT
  rationale: From גבל, 'to border, bound.' The form is 3fs agreeing with Hamath. In
    context it most naturally describes Hamath as adjoining the land/city previously
    mentioned. English relative clause smooths the Hebrew verbal expression while
    preserving sense.
- source_word: בָּהּ
  chosen: on it
  alternatives:
  - in it
  - within it
  - by it
  lexicon: HALOT
  rationale: Preposition ב with 3fs suffix. The antecedent is feminine and contextually
    refers back to the preceding locale/land in v.1. 'On it' idiomatically conveys
    territorial adjacency with 'borders' in English.
- source_word: צֹר
  chosen: Tyre
  lexicon: HALOT
  rationale: Proper place name; standard English transliteration.
- source_word: וְ/צִידוֹן
  chosen: and Sidon
  lexicon: HALOT
  rationale: Proper place name with conjunction; standard English transliteration.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  - indeed
  lexicon: HALOT
  rationale: Here introduces the reason or explanatory basis for the mention of Tyre
    and Sidon. 'Because' is clearer in modern English than the more formal 'for.'
- source_word: חָכְמָה
  chosen: they are wise
  alternatives:
  - she is wise
  - it is wise
  - has become wise
  lexicon: HALOT
  rationale: 'Though the verb is 3fs formally, the sense applies to Tyre and Sidon
    together, likely with collective or nearest-city agreement. English plural best
    reflects the coordinated subjects. Stative perfect is rendered as present in context:
    their renowned wisdom is a current characteristic.'
- source_word: מְאֹד
  chosen: very
  alternatives:
  - exceedingly
  lexicon: HALOT
  rationale: Common adverbial intensifier; 'very' is natural modern English.
