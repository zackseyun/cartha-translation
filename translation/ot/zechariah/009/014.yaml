theological_decisions:
- issue: Rendering the divine names יְהוָה and אֲדֹנָי יְהוִה
  chosen_reading: the LORD ... the Lord GOD
  alternative_readings:
  - Yahweh ... Lord Yahweh
  - the LORD ... the Lord GOD
  rationale: The verse contains both the standalone divine name and the compound title
    אֲדֹנָי יְהוִה. Following doctrine, YHWH is rendered 'the LORD.' In the compound,
    'the Lord GOD' preserves both title and name conventionally without producing
    'Lord LORD.'
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Referent of עֲלֵיהֶם ('over them')
  chosen_reading: over them refers to God's people in the immediate context
  alternative_readings:
  - over the enemy/opponents
  rationale: The broader context of Zechariah 9 depicts the LORD defending Zion and
    using his people as battle instruments. Rendering the phrase spatially as 'over
    them' preserves the ambiguity of the Hebrew while fitting the likely referent
    of God's people without forcing an interpretive gloss into the main text.
