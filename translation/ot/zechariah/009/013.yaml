theological_decisions:
- issue: Referent and rendering of יָוָן
  chosen_reading: Greece
  alternative_readings:
  - Javan
  rationale: The term refers to the Greek world; rendering it 'Greece' communicates
    the historical referent clearly to modern readers. The more formal transliteration
    'Javan' is preserved in a footnote because it is also a proper name in Hebrew
    tradition.
- issue: Temporal force of the Hebrew perfects in prophetic discourse
  chosen_reading: Render the sequence with present perfect for completed preparatory
    actions ('I have bent... I have filled...') and future for the ensuing mobilization
    ('I will stir up... and make you...')
  alternative_readings:
  - Render all verbs as futures
  - Render all verbs as prophetic perfects in English past tense
  rationale: This mixed rendering best reflects the Hebrew's rhetorical movement from
    accomplished divine preparation to imminent action, while remaining readable in
    English.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve source
    sense without woodenness'
