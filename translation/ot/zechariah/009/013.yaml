id: ZEC.9.13
reference: Zechariah 9:13
source:
  edition: WLC
  text: כִּֽי דָרַ֨כְתִּי לִ֜/י יְהוּדָ֗ה קֶ֚שֶׁת מִלֵּ֣אתִי אֶפְרַ֔יִם וְ/עוֹרַרְתִּ֤י
    בָנַ֨יִ/ךְ֙ צִיּ֔וֹן עַל בָּנַ֖יִ/ךְ יָוָ֑ן וְ/שַׂמְתִּ֖י/ךְ כְּ/חֶ֥רֶב גִּבּֽוֹר־־׃
translation:
  text: For I have bent Judah as my bow; I have filled it with Ephraim. I will stir
    up your sons, Zion, against your sons, Greece, and make you like a warrior’s sword.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'Javan,' a traditional name for the Greek peoples/world.
    reason: alternative_reading
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Because
  lexicon: HALOT
  rationale: Introduces the ground or explanation for the preceding promise; 'For'
    fits the discourse connection naturally in English.
- source_word: דָרַכְתִּי לִי יְהוּדָה קֶשֶׁת
  chosen: I have bent Judah as my bow
  alternatives:
  - I have trodden/bent Judah for myself as a bow
  - I have bent Judah for me, a bow
  lexicon: HALOT
  rationale: דרך with קשת refers to bending/treading a bow for use. The idiom is best
    rendered with the explicit sense 'bent ... as my bow' rather than a wooden 'trodden.'
    לִי is possessive/dative of advantage, naturally conveyed by 'my' in English.
- source_word: מִלֵּאתִי אֶפְרַיִם
  chosen: I have filled it with Ephraim
  alternatives:
  - I have filled Ephraim
  - I have fitted the bow with Ephraim
  lexicon: HALOT
  rationale: 'The object ''it'' is implied from the bow image: Judah is the bow, Ephraim
    the filling, likely the arrow(s) or complement. Supplying ''it'' makes the metaphor
    intelligible in English while staying close to the Hebrew imagery.'
- source_word: וְעוֹרַרְתִּי
  chosen: I will stir up
  alternatives:
  - I will rouse
  - I have stirred up
  lexicon: HALOT
  rationale: Though morphologically a perfect with vav, in this prophetic context
    it functions futurally in sequence with the divine action. 'Stir up' captures
    the sense of inciting to action or battle.
- source_word: בָנַיִךְ צִיּוֹן
  chosen: your sons, Zion
  alternatives:
  - your children, Zion
  lexicon: HALOT
  rationale: The feminine singular suffix addresses Zion personified as a woman/mother.
    'Sons' preserves the gendered martial image better than the more neutral 'children'.
- source_word: עַל בָּנַיִךְ יָוָן
  chosen: against your sons, Greece
  alternatives:
  - against your sons, Javan
  lexicon: HALOT
  rationale: יָוָן historically denotes Javan/Ionia and by extension Greece/Greeks.
    'Greece' is the clearest modern geographic-ethnic rendering in context, while
    'your sons' preserves the parallel personification.
- source_word: וְשַׂמְתִּיךְ
  chosen: and make you
  alternatives:
  - and set you
  - and place you
  lexicon: HALOT
  rationale: In this simile construction, English idiom prefers 'make you like' over
    the more literal but awkward 'set you as/like.'
- source_word: כְּחֶרֶב גִּבּוֹר
  chosen: like a warrior’s sword
  alternatives:
  - like the sword of a mighty man
  - like a hero’s sword
  lexicon: HALOT
  rationale: גִּבּוֹר denotes a mighty warrior/hero. 'Warrior’s sword' is natural
    modern English and preserves the martial force of the image.
