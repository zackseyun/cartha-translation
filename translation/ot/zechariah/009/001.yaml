id: ZEC.9.1
reference: Zechariah 9:1
source:
  edition: WLC
  text: מַשָּׂ֤א דְבַר יְהוָה֙ בְּ/אֶ֣רֶץ חַדְרָ֔ךְ וְ/דַמֶּ֖שֶׂק מְנֻחָת֑/וֹ כִּ֤י
    לַֽ/יהוָה֙ עֵ֣ין אָדָ֔ם וְ/כֹ֖ל שִׁבְטֵ֥י יִשְׂרָאֵֽל־׃
translation:
  text: 'An oracle: the word of the LORD is against the land of Hadrach, and Damascus
    is its resting place; for the eye of man and of all the tribes of Israel is toward
    the LORD.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'concerning the land of Hadrach.' The Hebrew preposition is literally
      'in,' but in prophetic headings it can function idiomatically for the target
      of an oracle.
    reason: alternative_reading
  - marker: b
    text: Or 'Damascus is his resting place.' The Hebrew suffix in 'its/his resting
      place' is ambiguous.
    reason: lexical_alternative
  - marker: c
    text: Or 'for the eye of humankind, and of all the tribes of Israel, is toward
      the LORD.' Hebrew 'man' here likely has a generic sense.
    reason: lexical_alternative
  - marker: d
    text: Some understand the clause as 'for the LORD has an eye on man and on all
      the tribes of Israel,' but the Hebrew wording is compressed and allows more
      than one construal.
    reason: alternative_reading
lexical_decisions:
- source_word: מַשָּׂא
  chosen: oracle
  alternatives:
  - burden
  - pronouncement
  lexicon: HALOT
  rationale: In prophetic headings מַשָּׂא commonly introduces a prophetic utterance
    or pronouncement. 'Oracle' is idiomatic modern English and preserves the formal
    heading sense better than the archaic 'burden.'
- source_word: דְבַר יְהוָה
  chosen: the word of the LORD
  alternatives:
  - the LORD's word
  lexicon: HALOT
  rationale: Standard prophetic formula. YHWH is rendered 'the LORD' per doctrine;
    construct relationship is naturally expressed as 'the word of the LORD.'
- source_word: בְּאֶרֶץ חַדְרָךְ
  chosen: against the land of Hadrach
  alternatives:
  - in the land of Hadrach
  - concerning the land of Hadrach
  lexicon: HALOT
  rationale: Although ב normally means 'in,' with דְבַר יְהוָה / מַשָּׂא in judgment
    contexts English often requires 'against' or 'concerning.' Given the surrounding
    oracle against foreign nations, 'against' best captures the force of the heading
    in context while remaining faithful to the prophetic idiom.
- source_word: חַדְרָךְ
  chosen: Hadrach
  lexicon: HALOT
  rationale: Proper place name is transliterated according to the translation philosophy.
- source_word: וְדַמֶּשֶׂק
  chosen: and Damascus
  lexicon: HALOT
  rationale: Proper place name, transliterated in standard English form.
- source_word: מְנֻחָתוֹ
  chosen: is its resting place
  alternatives:
  - is his resting place
  - is the place where it rests
  - its resting-place
  lexicon: HALOT
  rationale: The noun means 'resting place' or 'place of rest.' The 3ms suffix is
    syntactically difficult because the antecedent is not explicit. Rendering it as
    'its' most naturally refers back to 'the word/oracle,' yielding the sense that
    Damascus is where the oracle comes to rest or lands. This preserves the Hebrew
    ambiguity better than over-interpreting the suffix as referring directly to the
    LORD.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces the reason or ground for the preceding statement.
- source_word: לַיהוָה עֵין אָדָם
  chosen: the eye of man is toward the LORD
  alternatives:
  - the LORD has an eye on man
  - the eye of humankind belongs to the LORD
  lexicon: HALOT
  rationale: 'The Hebrew is compressed and debated. The most straightforward construal
    takes ''eye'' as subject and לַיהוָה as directional/relational: human attention
    is toward the LORD. This avoids importing a surveillance sense (''the LORD''s
    eye is on man'') not directly expressed by the word order.'
- source_word: אָדָם
  chosen: man
  alternatives:
  - humankind
  - humanity
  lexicon: HALOT
  rationale: Per doctrine, gender-accurate rendering is preferred. Here אָדָם has
    representative/generic force. 'Man' preserves the singular generic form of the
    Hebrew; inclusivity can be clarified in a footnote.
- source_word: וְכֹל שִׁבְטֵי יִשְׂרָאֵל
  chosen: and of all the tribes of Israel
  alternatives:
  - and all the tribes of Israel
  - even all the tribes of Israel
  lexicon: HALOT
  rationale: Attached to the preceding clause, this phrase extends the scope from
    generic 'man' to Israel specifically. In English, repeating 'of' clarifies that
    'eye' governs both 'man' and 'all the tribes of Israel.'
