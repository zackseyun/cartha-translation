id: ZEC.11.2
reference: Zechariah 11:2
source:
  edition: WLC
  text: הֵילֵ֤ל בְּרוֹשׁ֙ כִּֽי נָ֣פַל אֶ֔רֶז אֲשֶׁ֥ר אַדִּרִ֖ים שֻׁדָּ֑דוּ הֵילִ֨ילוּ֙
    אַלּוֹנֵ֣י בָשָׁ֔ן כִּ֥י יָרַ֖ד יַ֥עַר ה/בצור־׃
translation:
  text: Wail, cypress, for the cedar has fallen, for the majestic ones have been destroyed.
    Wail, oaks of Bashan, for the thick forest has come down.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'fir' for 'cypress.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the mighty ones have been devastated.'
    reason: lexical_alternative
  - marker: c
    text: The Hebrew expression may also mean 'the inaccessible forest' or 'the fortified
      forest.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֵילֵל / הֵילִילוּ
  chosen: Wail
  alternatives:
  - Howl
  - Lament
  lexicon: HALOT
  rationale: Imperative forms of ילל call for a cry of grief or alarm. 'Wail' is natural
    modern English and preserves the prophetic lament tone better than the harsher
    'howl' in this context.
- source_word: בְּרוֹשׁ
  chosen: cypress
  alternatives:
  - fir
  - juniper
  lexicon: HALOT
  rationale: The tree term is traditionally rendered 'fir,' but current lexical evidence
    commonly favors 'cypress' or a similar conifer. 'Cypress' is a clear modern rendering
    and fits the parallel with cedar and oaks.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  lexicon: HALOT
  rationale: Here כִּי introduces the reason for the lament. 'For' preserves the poetic-prophetic
    cadence while clearly expressing causation.
- source_word: נָפַל
  chosen: has fallen
  alternatives:
  - is fallen
  - has been felled
  lexicon: HALOT
  rationale: The verb literally means 'has fallen.' Although the broader imagery implies
    judgment and likely felling, the Hebrew wording itself is best preserved with
    'has fallen' rather than making the cause explicit.
- source_word: אֶרֶז
  chosen: cedar
  lexicon: HALOT
  rationale: Standard rendering for אֶרֶז; the cedar is a conventional image of grandeur
    and strength in prophetic poetry.
- source_word: אַדִּרִים
  chosen: the majestic ones
  alternatives:
  - the mighty ones
  - the glorious ones
  lexicon: HALOT
  rationale: The adjective/noun denotes the noble, majestic, or mighty. In this arboreal
    metaphor it likely refers to the stately trees represented by the cedar. 'The
    majestic ones' preserves the elevated poetic sense without over-specifying human
    rulers in the translation itself.
- source_word: שֻׁדָּדוּ
  chosen: have been destroyed
  alternatives:
  - have been devastated
  - have been plundered
  lexicon: HALOT
  rationale: The passive form conveys violent ruin. 'Destroyed' is broad enough to
    fit the tree metaphor and the judgment context; 'plundered' is too concrete for
    the immediate imagery.
- source_word: אַלּוֹנֵי בָשָׁן
  chosen: oaks of Bashan
  alternatives:
  - terebinths of Bashan
  lexicon: HALOT
  rationale: The phrase conventionally denotes the famed strong trees of Bashan. 'Oaks
    of Bashan' is the most recognizable and contextually fitting rendering in English.
- source_word: יָרַד
  chosen: has come down
  alternatives:
  - has fallen
  - has been brought down
  lexicon: HALOT
  rationale: Literally 'has gone down/come down.' For the forest image, 'has come
    down' preserves the Hebrew verb while allowing the sense of collapse or being
    cut down.
- source_word: יַעַר
  chosen: forest
  alternatives:
  - woodland
  lexicon: HALOT
  rationale: Standard rendering; straightforward in the arboreal judgment imagery.
- source_word: הבצור
  chosen: the thick
  alternatives:
  - the inaccessible
  - the fortified
  lexicon: HALOT
  rationale: The final expression is difficult. In context with 'forest,' the sense
    is likely a dense, inaccessible forest. 'Thick' gives idiomatic English ('thick
    forest') while reflecting the idea of density/inaccessibility better than the
    more literal but awkward 'fortified forest.'
