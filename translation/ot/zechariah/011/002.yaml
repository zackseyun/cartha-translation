theological_decisions:
- issue: Whether the tree imagery should be interpreted explicitly as human rulers
    or powers in the main text
  chosen_reading: Retain the arboreal imagery in the translation without making the
    metaphor explicit
  alternative_readings:
  - Translate interpretively with rulers/nobles in view
  rationale: The verse likely uses trees metaphorically for leaders or powerful groups,
    but the Hebrew presents the imagery directly. Following optimal equivalence and
    preserving theological/interpretive tension, the main text keeps the tree language
    and lets the metaphor stand.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather
    than resolve it.
