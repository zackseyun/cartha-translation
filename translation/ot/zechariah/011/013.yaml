id: ZEC.11.13
reference: Zechariah 11:13
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר יְהוָ֜ה אֵלַ֗/י הַשְׁלִיכֵ֨/הוּ֙ אֶל הַ/יּוֹצֵ֔ר אֶ֣דֶר הַ/יְקָ֔ר
    אֲשֶׁ֥ר יָקַ֖רְתִּי מֵֽ/עֲלֵי/הֶ֑ם וָֽ/אֶקְחָ/ה֙ שְׁלֹשִׁ֣ים הַ/כֶּ֔סֶף וָ/אַשְׁלִ֥יךְ
    אֹת֛/וֹ בֵּ֥ית יְהוָ֖ה אֶל הַ/יּוֹצֵֽר־־׃
translation:
  text: Then the LORD said to me, “Throw it to the potter—the lordly price at which
    I was valued by them.” So I took the thirty pieces of silver and threw it into
    the house of the LORD, to the potter.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'the potter.' Some interpreters propose 'the treasury' here because
      of the difficult context and the New Testament's use of this passage, but the
      Masoretic Text reads 'potter' in both places.
    reason: alternative_reading
  - marker: b
    text: 'Or ''the magnificent price,'' likely ironic: the phrase mocks the insultingly
      low valuation of thirty pieces of silver.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name per DOCTRINE.md.
- source_word: הַשְׁלִיכֵהוּ
  chosen: Throw it
  alternatives:
  - Cast it
  - Throw him
  lexicon: HALOT
  rationale: Imperative of שלך with 3ms suffix. The suffix refers to the money/price
    just mentioned in context, so English 'it' is natural. 'Cast' is possible but
    less natural in modern English.
- source_word: הַיּוֹצֵר
  chosen: the potter
  alternatives:
  - the founder
  - the smelter
  - the treasury
  lexicon: HALOT
  rationale: The participial noun from יצר ordinarily means 'potter/former.' Although
    some propose emendations or alternative senses because of the difficult context
    and Matthew 27:9–10, the MT reads 'potter' in both occurrences and should be retained
    in the main text.
- source_word: אֶדֶר הַיְקָר
  chosen: the lordly price
  alternatives:
  - the magnificent price
  - the noble price
  - the splendid price
  - the handsome price
  lexicon: HALOT
  rationale: This phrase is difficult and likely ironic. אֶדֶר conveys majesty/splendor,
    and הַיְקָר denotes preciousness/value. 'Lordly price' preserves the elevated
    tone and sarcasm better than a flat 'goodly price,' while remaining readable.
- source_word: יָקַרְתִּי
  chosen: I was valued
  alternatives:
  - I was priced
  - they valued me
  lexicon: HALOT
  rationale: 'The verb is passive/reflexive in sense in this context: the speaker
    is the one appraised by them. ''I was valued'' communicates the irony of the valuation
    more idiomatically than ''I was priced.'''
- source_word: מֵעֲלֵיהֶם
  chosen: by them
  alternatives:
  - from them
  - on their part
  lexicon: HALOT
  rationale: The prepositional phrase marks the agents/source of the valuation. 'By
    them' is the clearest idiomatic English in this clause.
- source_word: שְׁלֹשִׁים הַכֶּסֶף
  chosen: the thirty pieces of silver
  alternatives:
  - thirty silver pieces
  - thirty shekels of silver
  lexicon: HALOT
  rationale: Literally 'thirty of the silver.' 'Thirty pieces of silver' is idiomatic
    and preserves the recognized monetary expression without over-specifying 'shekels,'
    which is not explicit in the Hebrew.
- source_word: בֵּית יְהוָה
  chosen: the house of the LORD
  alternatives:
  - the temple of the LORD
  lexicon: HALOT
  rationale: More formally aligned with the Hebrew 'house,' while still clear in English.
    'Temple' is interpretive and slightly less formal.
- source_word: אֶל הַיּוֹצֵר
  chosen: to the potter
  alternatives:
  - for the potter
  - into the treasury
  lexicon: HALOT
  rationale: Retains the MT wording in the final clause as well. The repetition appears
    intentional and should be preserved rather than harmonized to a conjectural reading.
