theological_decisions:
- issue: How to render the difficult phrase involving the valuation and the repeated
    'potter'
  chosen_reading: 'Retain the Masoretic Text''s ''potter'' and render the valuation
    phrase with evident irony: ''the lordly price at which I was valued by them.'''
  alternative_readings:
  - Emend 'potter' to 'treasury'
  - Render the phrase more flatly as 'the handsome price at which they priced me'
  rationale: The Hebrew text is difficult, but there is no doctrinal reason to smooth
    it by conjecture. Preserving the MT respects original-language primacy and keeps
    the prophetic irony that the speaker's valuation was contemptibly low despite
    elevated wording.
  doctrine_reference: Translation philosophy points 1, 3, and 5
