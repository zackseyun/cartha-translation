id: ZEC.11.3
reference: Zechariah 11:3
source:
  edition: WLC
  text: ק֚וֹל יִֽלְלַ֣ת הָ/רֹעִ֔ים כִּ֥י שֻׁדְּדָ֖ה אַדַּרְתָּ֑/ם ק֚וֹל שַׁאֲגַ֣ת
    כְּפִירִ֔ים כִּ֥י שֻׁדַּ֖ד גְּא֥וֹן הַ/יַּרְדֵּֽן׃ס
translation:
  text: The sound of the shepherds’ wailing, for their glory is ruined; the sound
    of the young lions’ roaring, for the majesty of the Jordan is ruined.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their splendor.' The Hebrew term can refer to magnificence and may allude
      concretely to what adorned them.
    reason: lexical_alternative
  - marker: b
    text: Or 'the pride of the Jordan'; the phrase may refer specifically to the luxuriant
      thickets along the Jordan’s banks.
    reason: lexical_alternative
lexical_decisions:
- source_word: ק֚וֹל
  chosen: The sound of
  alternatives:
  - A sound of
  - The voice of
  lexicon: HALOT
  rationale: קוֹל commonly denotes sound, voice, or noise. Here it introduces audible
    lament/roaring in parallel cola, so 'The sound of' is natural English and preserves
    the auditory emphasis better than the more personified 'voice of'.
- source_word: יִלְלַת
  chosen: wailing
  alternatives:
  - howling
  - lamentation
  lexicon: HALOT
  rationale: From ילל, denoting a cry of lament or howl. 'Wailing' fits the human
    subject 'shepherds' and communicates grief vividly without sounding overly animalistic.
- source_word: הָרֹעִים
  chosen: the shepherds
  alternatives:
  - the herdsmen
  - the pastors
  lexicon: HALOT
  rationale: The basic sense is literal 'shepherds.' In prophetic literature the term
    may carry metaphorical force for leaders, but the translation should preserve
    the lexical image and let context supply the symbolism.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Here כִּי gives the reason for the wailing/roaring. 'For' is concise
    and fits the poetic register.
- source_word: שֻׁדְּדָה
  chosen: is ruined
  alternatives:
  - is devastated
  - is destroyed
  - is plundered
  lexicon: HALOT
  rationale: From שׁדד, to devastate, despoil, or ruin. Because the object is abstract
    ('their glory'), 'is ruined' reads more idiomatically in English than 'is plundered,'
    while still conveying severe loss.
- source_word: אַדַּרְתָּם
  chosen: their glory
  alternatives:
  - their splendor
  - their magnificence
  - their mantle
  lexicon: HALOT
  rationale: From אדרת, which can denote a splendid garment or, by extension, magnificence/splendor.
    In this context of shepherds losing status or rich pasture, the abstract sense
    'their glory' best captures the poetic force. 'Splendor' is viable, but 'glory'
    pairs well with the following גאון and preserves the elevated tone.
- source_word: שַׁאֲגַת
  chosen: roaring
  alternatives:
  - the roar
  - growling
  lexicon: HALOT
  rationale: From שׁאג, the roar of a lion. 'Roaring' parallels 'wailing' and works
    smoothly after 'the sound of.'
- source_word: כְּפִירִים
  chosen: the young lions
  alternatives:
  - the lion cubs
  - the fierce lions
  lexicon: HALOT
  rationale: כפיר denotes a young lion, often one vigorous enough to hunt. 'Young
    lions' is the standard and sufficiently precise rendering.
- source_word: שֻׁדַּד
  chosen: is ruined
  alternatives:
  - is devastated
  - is destroyed
  - is laid waste
  lexicon: HALOT
  rationale: Same verb שׁדד as earlier. Rendering it consistently as 'is ruined' preserves
    the parallelism of the verse.
- source_word: גְּאוֹן
  chosen: the majesty
  alternatives:
  - the pride
  - the glory
  - the thicket
  lexicon: HALOT
  rationale: גאון can mean majesty, exaltation, or pride; in relation to the Jordan
    it likely refers to its majestic growth or luxuriant banks. 'Majesty' preserves
    the elevated poetic sense without importing the negative moral nuance that 'pride'
    can suggest in English.
- source_word: הַיַּרְדֵּן
  chosen: the Jordan
  alternatives:
  - the Jordan River
  lexicon: HALOT
  rationale: Proper name of the river. 'The Jordan' is the standard biblical English
    form and is sufficient without adding 'River' in poetic context.
