theological_decisions:
- issue: Whether to make the metaphorical referents explicit (shepherds as leaders;
    young lions as rulers or predators)
  chosen_reading: Retain the literal imagery in the main text without interpretive
    expansion.
  alternative_readings:
  - Translate shepherds as leaders
  - Translate young lions as rulers or oppressors
  rationale: The Hebrew presents vivid poetic images whose symbolic force is contextually
    available, but the verse itself does not explicitly identify the referents. Optimal
    equivalence favors preserving the imagery rather than resolving the metaphor for
    the reader.
  doctrine_reference: Translation philosophy §1, §3
- issue: How to render גְּאוֹן הַיַּרְדֵּן
  chosen_reading: the majesty of the Jordan
  alternative_readings:
  - the pride of the Jordan
  - the thickets of the Jordan
  rationale: The phrase is traditionally rendered 'pride of Jordan' and can denote
    the luxuriant growth along the Jordan's banks. The Hebrew noun itself is 'majesty/pride,'
    not the more explicit word for thicket. The chosen rendering preserves the source
    expression while allowing readers to infer the devastated riverine grandeur; the
    more interpretive 'thickets' is preserved in a footnote.
  doctrine_reference: Translation philosophy §1, §3, §5
