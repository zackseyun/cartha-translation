id: ZEC.11.11
reference: Zechariah 11:11
source:
  edition: WLC
  text: וַ/תֻּפַ֖ר בַּ/יּ֣וֹם הַ/ה֑וּא וַ/יֵּדְע֨וּ כֵ֜ן עֲנִיֵּ֤י הַ/צֹּאן֙ הַ/שֹּׁמְרִ֣ים
    אֹתִ֔/י כִּ֥י דְבַר יְהוָ֖ה הֽוּא־׃
translation:
  text: So it was broken on that day, and thus the afflicted of the flock who were
    watching me knew that it was the word of the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the poor of the flock' or 'the humble of the flock.'
    reason: lexical_alternative
  - marker: b
    text: Or 'it was annulled' or 'it was revoked,' highlighting the covenantal force
      of the image.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתֻּפַר
  chosen: it was broken
  alternatives:
  - it was annulled
  - it was revoked
  lexicon: HALOT
  rationale: From פרר in the passive, referring back to the staff/covenant-symbol
    in the immediate context. 'Broken' preserves the concrete metaphor while allowing
    covenantal nullification to be inferred from context.
- source_word: בַּיּוֹם הַהוּא
  chosen: on that day
  alternatives:
  - in that day
  lexicon: HALOT
  rationale: Standard temporal expression. 'On that day' is idiomatic modern English
    and preserves the prophetic temporal marker.
- source_word: וַיֵּדְעוּ כֵן
  chosen: and thus ... knew
  alternatives:
  - and so ... knew
  - and ... knew it
  lexicon: HALOT
  rationale: כֵן here functions adverbially, indicating 'thus/so.' Rendering it explicitly
    preserves the logical connection between the breaking and the recognition.
- source_word: עֲנִיֵּי הַצֹּאן
  chosen: the afflicted of the flock
  alternatives:
  - the poor of the flock
  - the humble of the flock
  lexicon: HALOT
  rationale: עֲנִיִּים can denote poor, afflicted, or humble. In this prophetic context,
    'afflicted' best captures their oppressed condition without reducing the term
    to merely economic poverty.
- source_word: הַשֹּׁמְרִים אֹתִי
  chosen: who were watching me
  alternatives:
  - who were keeping watch over me
  - who were observing me
  lexicon: HALOT
  rationale: The participle of שׁמר with object suffix naturally means watching/observing
    attentively. 'Watching me' is clear and idiomatic, and fits the narrative perspective
    of the speaker.
- source_word: כִּי דְבַר יְהוָה הוּא
  chosen: that it was the word of the LORD
  alternatives:
  - that it was a word of the LORD
  - that this was the word of the LORD
  lexicon: HALOT
  rationale: The clause identifies the event/action as YHWH's word fulfilled or authenticated.
    'The word of the LORD' is the most natural English rendering and preserves the
    prophetic formula. Per doctrine, יְהוָה is rendered 'the LORD'.
