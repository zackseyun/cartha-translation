id: ZEC.11.6
reference: Zechariah 11:6
source:
  edition: WLC
  text: כִּ֠י לֹ֣א אֶחְמ֥וֹל ע֛וֹד עַל יֹשְׁבֵ֥י הָ/אָ֖רֶץ נְאֻם יְהוָ֑ה וְ/הִנֵּ֨ה
    אָנֹכִ֜י מַמְצִ֣יא אֶת הָ/אָדָ֗ם אִ֤ישׁ בְּ/יַד רֵעֵ֨/הוּ֙ וּ/בְ/יַ֣ד מַלְכּ֔/וֹ
    וְ/כִתְּתוּ֙ אֶת הָ/אָ֔רֶץ וְ/לֹ֥א אַצִּ֖יל מִ/יָּדָֽ/ם־־־־־׃
translation:
  text: For I will no longer have compassion on the inhabitants of the land, declares
    the LORD. Behold, I am handing over each man into the hand of his neighbor and
    into the hand of his king, and they will crush the land, and I will not deliver
    it from their hand.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the inhabitants of the earth' if הָאָרֶץ is taken universally rather
      than locally.
    reason: alternative_reading
  - marker: b
    text: Hebrew 'each man into the hand of his neighbor and into the hand of his
      king'; the wording depicts each person being given over to another's power.
    reason: lexical_alternative
  - marker: c
    text: Or 'I will not rescue [them/the land] from their hand.' The Hebrew object
      is not explicit in the final clause and is supplied in English from the context.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶחְמֹל
  chosen: will ... have compassion
  alternatives:
  - will spare
  - will pity
  lexicon: HALOT
  rationale: חמל denotes sparing or showing compassion/mercy. 'Have compassion' communicates
    the affective and judicial sense in readable English; 'spare' is possible but
    can sound narrower and more purely forensic.
- source_word: יֹשְׁבֵי הָאָרֶץ
  chosen: the inhabitants of the land
  alternatives:
  - those who dwell in the land
  - the inhabitants of the earth
  lexicon: HALOT
  rationale: יֹשְׁבֵי is a participial substantive, 'inhabitants/dwellers.' הָאָרֶץ
    can mean 'land' or 'earth'; in Zechariah's immediate prophetic context, 'land'
    better fits the judgment on a specific people/territory, while 'earth' would over-universalize.
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: This is the standard prophetic formula. 'Declares the LORD' is idiomatic
    modern English and preserves prophetic solemnity. Per doctrine, יְהוָה is rendered
    'the LORD' rather than transliterated.
- source_word: מַמְצִיא
  chosen: am handing over
  alternatives:
  - am causing to find themselves
  - am delivering over
  - am giving over
  lexicon: HALOT
  rationale: The Hiphil of מצא here has the idiomatic sense of causing someone to
    come into another's power. 'Handing over' best captures the causative force and
    the hostile judicial context.
- source_word: הָאָדָם אִישׁ
  chosen: each man
  alternatives:
  - mankind, each one
  - humanity, each person
  - man, each to
  lexicon: HALOT
  rationale: 'The construction intensifies distributively: ''the human/man, each one.''
    ''Each man'' preserves the singular distributive force and follows the doctrine''s
    gender-accurate principle for אָדָם in context.'
- source_word: בְיַד
  chosen: into the hand of
  alternatives:
  - into the power of
  - to the control of
  lexicon: HALOT
  rationale: '''Into the hand of'' preserves the Hebrew idiom of power/control while
    remaining understandable in English. It also maintains consistency with the repeated
    phrase in the verse.'
- source_word: רֵעֵהוּ
  chosen: his neighbor
  alternatives:
  - his companion
  - his friend
  lexicon: HALOT
  rationale: רֵעַ can mean friend, companion, or neighbor. In a context of social
    breakdown and mutual betrayal, 'neighbor' is broad and apt, avoiding an overly
    positive nuance.
- source_word: מַלְכּוֹ
  chosen: his king
  alternatives:
  - his ruler
  lexicon: HALOT
  rationale: The noun plainly means 'his king.' Retaining 'king' preserves the political
    specificity of the judgment.
- source_word: וְכִתְּתוּ
  chosen: they will crush
  alternatives:
  - they will shatter
  - they will beat down
  lexicon: HALOT
  rationale: כתת conveys crushing, beating, or shattering. 'Crush' fits the violent
    judgment context and reads naturally with 'the land' as object.
- source_word: הָאָרֶץ
  chosen: the land
  alternatives:
  - the earth
  lexicon: HALOT
  rationale: As earlier in the verse, 'land' is preferred for contextual coherence.
    The same Hebrew term is rendered consistently here.
- source_word: אַצִּיל
  chosen: I will not deliver it
  alternatives:
  - I will not rescue it
  - I will not snatch it away
  lexicon: HALOT
  rationale: נצל in Hiphil means deliver/rescue. Because the previous clause's object
    is 'the land,' supplying 'it' in English makes the sentence coherent without over-paraphrasing.
    'Deliver' matches the formal register of prophetic judgment.
- source_word: מִיָּדָם
  chosen: from their hand
  alternatives:
  - from their power
  lexicon: HALOT
  rationale: The idiom mirrors the earlier 'into the hand of' and should be preserved
    for rhetorical cohesion.
