theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering for
    YHWH, following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Scope of הָאָרֶץ
  chosen_reading: land
  alternative_readings:
  - earth
  rationale: The verse can be read more locally or universally, but the immediate
    context of Zechariah 11 favors judgment on the people/territory in view rather
    than the whole world. This preserves contextual sense without making a broader
    theological claim than the Hebrew requires.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
- issue: Gender rendering of הָאָדָם אִישׁ
  chosen_reading: each man
  alternative_readings:
  - each person
  - everyone
  rationale: The Hebrew uses masculine singular terms distributively. Per the gender-accurate
    principle, the translation preserves the source's form rather than neutralizing
    it, while the sense remains representative.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
