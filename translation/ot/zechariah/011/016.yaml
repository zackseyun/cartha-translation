id: ZEC.11.16
reference: Zechariah 11:16
source:
  edition: WLC
  text: כִּ֣י הִנֵּֽה אָנֹכִי֩ מֵקִ֨ים רֹעֶ֜ה בָּ/אָ֗רֶץ הַ/נִּכְחָד֤וֹת לֹֽא יִפְקֹד֙
    הַ/נַּ֣עַר לֹֽא יְבַקֵּ֔שׁ וְ/הַ/נִּשְׁבֶּ֖רֶת לֹ֣א יְרַפֵּ֑א הַ/נִּצָּבָה֙ לֹ֣א
    יְכַלְכֵּ֔ל וּ/בְשַׂ֤ר הַ/בְּרִיאָה֙ יֹאכַ֔ל וּ/פַרְסֵי/הֶ֖ן יְפָרֵֽק־־־׃ס
translation:
  text: For look, I am raising up a shepherd in the land who will not attend to the
    perishing, will not seek the straying, will not heal the broken, will not sustain
    the standing, but will eat the flesh of the fat ones and tear off their hooves.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the young'; Hebrew הַנַּעַר can denote a young one/youth, though in
      this shepherding context many understand it as a straying or vulnerable member
      of the flock.
    reason: lexical_alternative
  - marker: b
    text: Or 'the lost' / 'those being destroyed' for 'the perishing.'
    reason: lexical_alternative
  - marker: c
    text: Or 'the healthy one' for 'the standing.' The Hebrew is literally 'the one
      standing.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מֵקִים
  chosen: am raising up
  alternatives:
  - am setting up
  - am appointing
  lexicon: HALOT
  rationale: The Hiphil of קום commonly means to raise up or establish. 'Raising up'
    preserves divine agency and the idiomatic force without over-specifying a formal
    office installation.
- source_word: רֹעֶה
  chosen: a shepherd
  alternatives:
  - a herdsman
  - one who shepherds
  lexicon: HALOT
  rationale: The participle/noun is the standard term for shepherd and in prophetic
    literature often carries leadership imagery. 'Shepherd' preserves both literal
    and metaphorical resonance.
- source_word: הַנִּכְחָדוֹת
  chosen: the perishing
  alternatives:
  - the cut off
  - the lost
  - those being destroyed
  lexicon: HALOT
  rationale: From כחד/related passive sense, the form denotes those disappearing or
    perishing. 'The perishing' fits the flock context and avoids prematurely resolving
    whether the idea is 'lost' or 'destroyed.'
- source_word: יִפְקֹד
  chosen: attend to
  alternatives:
  - visit
  - care for
  - look after
  lexicon: HALOT
  rationale: פקד has a broad semantic range including attend to, visit, muster, or
    care for. In this shepherding context, 'attend to' is natural English and broad
    enough to preserve the Hebrew nuance.
- source_word: הַנַּעַר
  chosen: the straying
  alternatives:
  - the young
  - the youth
  - the young one
  lexicon: HALOT
  rationale: Although נער often means 'young man/youth,' in this flock context many
    interpreters understand it as a sheep gone astray or vulnerable young one. 'The
    straying' best matches the parallelism with neglected sheep and the following
    verb 'seek.' The more literal 'young' is preserved in a footnote.
- source_word: יְבַקֵּשׁ
  chosen: seek
  alternatives:
  - search for
  lexicon: HALOT
  rationale: A straightforward rendering of בקש. 'Seek' is concise and idiomatic in
    shepherd imagery.
- source_word: הַנִּשְׁבֶּרֶת
  chosen: the broken
  alternatives:
  - the injured
  - the broken one
  lexicon: HALOT
  rationale: The passive participial form from שבר naturally means broken or injured.
    'The broken' preserves the metaphorical and physical possibilities.
- source_word: יְרַפֵּא
  chosen: heal
  alternatives:
  - cure
  - bind up
  lexicon: HALOT
  rationale: רפא means heal. 'Bind up' would import imagery from other shepherd texts
    not present here.
- source_word: הַנִּצָּבָה
  chosen: the standing
  alternatives:
  - the healthy
  - the one standing firm
  - the one left standing
  lexicon: HALOT
  rationale: From נצב, the form most literally denotes one standing or stationed.
    In context it likely refers to the sheep still able to stand, hence vulnerable
    but viable. 'The standing' keeps the lexical link visible while remaining intelligible.
- source_word: יְכַלְכֵּל
  chosen: sustain
  alternatives:
  - nourish
  - support
  - feed
  lexicon: HALOT
  rationale: כלכל often means sustain, support, or provide for. 'Sustain' fits the
    neglected-shepherd contrast and avoids narrowing the sense to feeding alone.
- source_word: הַבְּרִיאָה
  chosen: the fat ones
  alternatives:
  - the healthy one
  - the well-fed one
  lexicon: HALOT
  rationale: The adjective בריא denotes fat, healthy, or well-fed. In the predatory
    image, 'the fat ones' best conveys the shepherd devouring the choice animals.
- source_word: פַרְסֵיהֶן
  chosen: their hooves
  alternatives:
  - their hoofs
  lexicon: HALOT
  rationale: פרסה is hoof/hoof-part. 'Hooves' is standard modern spelling.
- source_word: יְפָרֵק
  chosen: tear off
  alternatives:
  - break off
  - rip apart
  lexicon: HALOT
  rationale: פרק can mean tear off, break apart, or pull away. With hooves as object,
    'tear off' vividly matches the violent image without overtranslation.
