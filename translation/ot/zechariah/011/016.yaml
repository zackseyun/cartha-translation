theological_decisions:
- issue: Nature of the shepherd figure
  chosen_reading: Render the figure simply as 'a shepherd' without identifying him
    as a specific historical or eschatological person in the translation.
  alternative_readings:
  - an evil shepherd
  - a worthless shepherd
  - a specific antitype/opponent figure
  rationale: The verse itself describes a cruel shepherd raised up in judgment, but
    does not name the figure here. The translation should preserve the prophetic image
    without importing a more developed theological identification into the main text.
  doctrine_reference: Preserve theological tension rather than resolve it.
