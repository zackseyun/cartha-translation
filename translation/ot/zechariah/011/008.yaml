theological_decisions:
- issue: Identity of 'the three shepherds'
  chosen_reading: Retain the metaphor 'the three shepherds' without identifying them
    in the translation.
  alternative_readings:
  - three specific historical leaders
  - three classes of leaders such as prophets, priests, and kings
  - a symbolic number for corrupt leadership
  rationale: The Hebrew text itself does not identify the shepherds. Naming a referent
    in the main text would import an interpretive conclusion not demanded by the verse.
    The translation therefore preserves the ambiguity and symbolic force.
  doctrine_reference: Preserve theological tension rather than resolve it.
