id: ZEC.11.8
reference: Zechariah 11:8
source:
  edition: WLC
  text: וָ/אַכְחִ֛ד אֶת שְׁלֹ֥שֶׁת הָ/רֹעִ֖ים בְּ/יֶ֣רַח אֶחָ֑ד וַ/תִּקְצַ֤ר נַפְשִׁ/י֙
    בָּ/הֶ֔ם וְ/גַם נַפְשָׁ֖/ם בָּחֲלָ֥ה בִֽ/י־־׃
translation:
  text: So I removed the three shepherds in one month, and my soul grew impatient
    with them, and their soul also loathed me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I destroyed' or 'I cut off' the three shepherds; the Hebrew verb can
      denote causing them to disappear or be eliminated.
    reason: lexical_alternative
  - marker: b
    text: The phrase 'my soul grew impatient' renders a Hebrew idiom expressing deep
      impatience or revulsion.
    reason: lexical_alternative
  - marker: c
    text: The 'three shepherds' are not identified in the text; proposed interpretations
      vary.
    reason: alternative_reading
lexical_decisions:
- source_word: וָאַכְחִד
  chosen: I removed
  alternatives:
  - I destroyed
  - I cut off
  - I got rid of
  lexicon: HALOT
  rationale: The verb כחד in Hiphil can convey causing to disappear, removing, or
    destroying. In this prophetic-symbolic context, 'removed' preserves the action
    without over-specifying whether the shepherds were killed, deposed, or otherwise
    eliminated. It fits the enacted-sign character of the passage better than the
    more absolute 'destroyed,' while still reflecting decisive action.
- source_word: שְׁלֹשֶׁת הָרֹעִים
  chosen: the three shepherds
  lexicon: HALOT
  rationale: A straightforward rendering of the numeral plus definite participial
    noun. 'Shepherds' should be retained rather than interpreted as 'leaders' in the
    main text, since the metaphor is central to the chapter; any identification remains
    interpretive.
- source_word: בְּיֶרַח אֶחָד
  chosen: in one month
  alternatives:
  - within one month
  lexicon: HALOT
  rationale: The phrase literally denotes a single month. 'In one month' is idiomatic
    and preserves the temporal compression emphasized by the Hebrew.
- source_word: וַתִּקְצַר נַפְשִׁי בָּהֶם
  chosen: my soul grew impatient with them
  alternatives:
  - I became impatient with them
  - my soul was shortened toward them
  lexicon: HALOT
  rationale: The idiom קצר נפש conveys impatience, vexation, or loss of forbearance.
    Retaining 'my soul' preserves the Hebrew anthropological expression while rendering
    the idiom intelligibly in English. 'Grew impatient' captures the emotional exhaustion
    without flattening the metaphor entirely.
- source_word: נַפְשִׁי
  chosen: my soul
  alternatives:
  - I
  lexicon: HALOT
  rationale: Although English often uses a simple pronoun for such idioms, keeping
    'my soul' preserves the Hebrew wording and the reciprocal parallel with 'their
    soul' in the next clause.
- source_word: וְגַם נַפְשָׁם בָּחֲלָה בִי
  chosen: and their soul also loathed me
  alternatives:
  - and they also detested me
  - and their soul also was disgusted with me
  lexicon: HALOT
  rationale: The verb בחל expresses loathing, abhorrence, or disgust. 'Loathed' is
    strong, natural English and matches the intensity of the Hebrew. Singular 'soul'
    is retained as a collective/idiomatic singular corresponding to the Hebrew form
    and balancing 'my soul' in the previous clause.
