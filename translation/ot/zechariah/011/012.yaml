theological_decisions:
- issue: Monetary unit in the payment phrase
  chosen_reading: thirty pieces of silver
  alternative_readings:
  - thirty shekels of silver
  rationale: The phrase is famously echoed in Matthew 26:15 and 27:9-10. To avoid
    importing a more specific unit than the Hebrew explicitly states, the main text
    keeps the broader 'pieces of silver,' while preserving 'shekels' as a lexical
    alternative.
  doctrine_reference: Translation philosophy §1, §3, §5
