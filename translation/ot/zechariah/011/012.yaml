id: ZEC.11.12
reference: Zechariah 11:12
source:
  edition: WLC
  text: וָ/אֹמַ֣ר אֲלֵי/הֶ֗ם אִם ט֧וֹב בְּ/עֵינֵי/כֶ֛ם הָב֥וּ שְׂכָרִ֖/י וְ/אִם לֹ֣א
    חֲדָ֑לוּ וַ/יִּשְׁקְל֥וּ אֶת שְׂכָרִ֖/י שְׁלֹשִׁ֥ים כָּֽסֶף־־׀־׃
translation:
  text: 'Then I said to them, “If it is good in your eyes, give me my wages; but if
    not, refrain.” So they weighed out my wages: thirty pieces of silver.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''thirty silver''; possibly ''thirty shekels of silver.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֹמַר
  chosen: Then I said
  alternatives:
  - And I said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then I said' gives natural
    English narrative flow while preserving sequence.
- source_word: אֲלֵיהֶם
  chosen: to them
  lexicon: HALOT
  rationale: Standard prepositional phrase with 3mp suffix; no reason to expand beyond
    the direct addressees.
- source_word: אִם טוֹב בְּעֵינֵיכֶם
  chosen: If it is good in your eyes
  alternatives:
  - If it seems good to you
  - If it is pleasing in your sight
  lexicon: HALOT
  rationale: This idiom literally refers to what is good in someone's eyes. The chosen
    rendering preserves the Hebrew imagery while remaining understandable in English.
- source_word: הָבוּ
  chosen: give
  alternatives:
  - pay
  - provide
  lexicon: HALOT
  rationale: Imperative of 'give.' Although the context is payment, 'give' best reflects
    the lexical form, with the wage context supplied by the object.
- source_word: שְׂכָרִי
  chosen: my wages
  alternatives:
  - my pay
  - my hire
  lexicon: HALOT
  rationale: Refers to compensation due for labor or service. 'Wages' is clear modern
    English and fits the shepherd-payment context better than the archaic 'hire.'
- source_word: וְאִם לֹא חֲדָלוּ
  chosen: but if not, refrain
  alternatives:
  - but if not, leave it alone
  - but if not, stop
  lexicon: HALOT
  rationale: The verb חדל means to cease or refrain. In context, Zechariah tells them
    not to pay if they do not think it good. 'Refrain' is concise and idiomatic.
- source_word: וַיִּשְׁקְלוּ
  chosen: they weighed out
  alternatives:
  - they weighed
  - they paid out by weight
  lexicon: HALOT
  rationale: The verb שקל literally denotes weighing, especially of silver as payment.
    'Weighed out' preserves the concrete ancient payment practice.
- source_word: שְׁלֹשִׁים כָּסֶף
  chosen: thirty pieces of silver
  alternatives:
  - thirty silver pieces
  - thirty shekels of silver
  lexicon: HALOT
  rationale: The Hebrew literally says 'thirty silver.' English commonly supplies
    'pieces of silver' in such contexts. 'Shekels' is possible as an interpretive
    specification, but the unit is not explicit in the Hebrew here, so the less specific
    rendering is preferable in the main text.
