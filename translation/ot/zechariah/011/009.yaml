theological_decisions:
- issue: Whether to preserve the shepherd/flock metaphor explicitly in the refusal
    clause
  chosen_reading: I will not shepherd you
  alternative_readings:
  - I will not feed you
  - I will not pasture you
  rationale: The chapter's enacted prophecy depends on the shepherd imagery. Rendering
    רעה as 'shepherd' preserves the metaphor and avoids flattening the prophetic sign-act
    into mere provision.
  doctrine_reference: Translation philosophy §1, §5
- issue: How literally to render the final cannibalism image
  chosen_reading: let those who remain devour each one the flesh of another
  alternative_readings:
  - let the survivors eat one another's flesh
  rationale: The Hebrew depicts extreme mutual destruction in shocking terms. The
    translation preserves the image rather than softening it, while phrasing it idiomatically
    in English.
  doctrine_reference: Translation philosophy §1, §6
