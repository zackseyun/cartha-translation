id: ZEC.11.9
reference: Zechariah 11:9
source:
  edition: WLC
  text: וָ/אֹמַ֕ר לֹ֥א אֶרְעֶ֖ה אֶתְ/כֶ֑ם הַ/מֵּתָ֣ה תָמ֗וּת וְ/הַ/נִּכְחֶ֨דֶת֙ תִּכָּחֵ֔ד
    וְ/הַ֨/נִּשְׁאָר֔וֹת תֹּאכַ֕לְנָה אִשָּׁ֖ה אֶת בְּשַׂ֥ר רְעוּתָֽ/הּ־׃
translation:
  text: So I said, “I will not shepherd you. Let the dying die, and let the perishing
    perish. And let those who remain devour each one the flesh of another.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the survivors”; Hebrew “the remaining ones.”
    reason: lexical_alternative
  - marker: b
    text: Literally “woman the flesh of her companion,” a distributive idiom here
      meaning “each one ... another,” with feminine grammar matching the flock imagery.
    reason: cultural_note
lexical_decisions:
- source_word: אֶרְעֶה
  chosen: I will not shepherd
  alternatives:
  - I will not pasture
  - I will not feed
  lexicon: HALOT
  rationale: From רעה in the shepherding sense. 'Shepherd' preserves the metaphor
    active in the chapter better than the narrower 'feed' or the less idiomatic 'pasture.'
- source_word: הַמֵּתָה תָמוּת
  chosen: Let the dying die
  alternatives:
  - The one that is dying, let it die
  - What is dying, let it die
  lexicon: HALOT
  rationale: The participle plus finite verb intensifies and individualizes the action.
    'Let the dying die' preserves the Hebrew terseness and judicial resignation without
    over-specifying number.
- source_word: הַנִּכְחֶדֶת תִּכָּחֵד
  chosen: let the perishing perish
  alternatives:
  - let the doomed be destroyed
  - let the one being annihilated be annihilated
  - let the cut-off be cut off
  lexicon: HALOT
  rationale: כחד in the Niphal/passive-reflexive domain conveys being wiped out, destroyed,
    or perishing. 'Perishing perish' keeps the Hebrew repetition and avoids importing
    a more technical sense like 'annihilated.'
- source_word: הַנִּשְׁאָרוֹת
  chosen: those who remain
  alternatives:
  - the survivors
  - those left
  lexicon: HALOT
  rationale: From שׁאר, 'remain/be left over.' 'Those who remain' is transparent and
    preserves the participial force better than the more interpretive 'survivors,'
    though that is a plausible alternative.
- source_word: תֹּאכַלְנָה
  chosen: devour
  alternatives:
  - eat
  - consume
  lexicon: HALOT
  rationale: While literally 'eat,' the object 'flesh' makes the violent sense prominent.
    'Devour' communicates the brutality naturally in English without departing from
    the image.
- source_word: אִשָּׁה אֶת בְּשַׂר רְעוּתָהּ
  chosen: each one the flesh of another
  alternatives:
  - each the flesh of her companion
  - one another's flesh
  lexicon: HALOT
  rationale: Though אִשָּׁה is literally 'woman/wife,' in distributive idiom with
    feminine forms it functions like 'each one.' רְעוּתָהּ is 'her companion/associate/another.'
    Because the referents are the remaining sheep/flock under feminine grammar, a
    wooden 'woman ... her companion' would mislead in English. 'Each one the flesh
    of another' preserves the distributive mutual violence.
