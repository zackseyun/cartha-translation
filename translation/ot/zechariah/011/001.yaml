id: ZEC.11.1
reference: Zechariah 11:1
source:
  edition: WLC
  text: פְּתַ֥ח לְבָנ֖וֹן דְּלָתֶ֑י/ךָ וְ/תֹאכַ֥ל אֵ֖שׁ בַּ/אֲרָזֶֽי/ךָ׃
translation:
  text: Open your doors, Lebanon, so that fire may consume your cedars.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Open your gates, Lebanon, and fire will consume your cedars.'
    reason: lexical_alternative
lexical_decisions:
- source_word: פְּתַח
  chosen: Open
  alternatives:
  - Throw open
  lexicon: HALOT
  rationale: Imperative 2ms from פתח, addressed personified to Lebanon. 'Open' is
    the straightforward command; 'throw open' is possible but slightly more expansive
    than the Hebrew requires.
- source_word: לְבָנוֹן
  chosen: Lebanon
  lexicon: HALOT
  rationale: Proper name, here personified as the addressee. Following the philosophy,
    names are transliterated rather than translated.
- source_word: דְּלָתֶיךָ
  chosen: your doors
  alternatives:
  - your gates
  lexicon: HALOT
  rationale: דלת commonly means 'door' or 'door-leaf.' 'Doors' fits the concrete image
    and the possessive suffix. 'Gates' is possible in a broader architectural sense,
    but the lexical base more directly denotes doors.
- source_word: וְתֹאכַל
  chosen: so that ... may consume
  alternatives:
  - and ... will consume
  - and ... shall devour
  lexicon: HALOT
  rationale: 'Qal imperfect 3fs of אכל with אֵשׁ as subject. After the imperative,
    the imperfect can express result/purpose: ''so that fire may consume.'' This reads
    naturally in English while preserving the prophetic force. ''Devour'' is vivid
    but slightly more interpretive.'
- source_word: אֵשׁ
  chosen: fire
  lexicon: HALOT
  rationale: Basic lexical sense is 'fire.' No reason to paraphrase.
- source_word: בַּאֲרָזֶיךָ
  chosen: your cedars
  alternatives:
  - among your cedars
  lexicon: HALOT
  rationale: אָרֶז means 'cedar.' With ב, the phrase can be understood locatively
    ('among/in your cedars'), but in English 'consume your cedars' communicates the
    object of destruction more idiomatically. The possessive suffix is retained.
