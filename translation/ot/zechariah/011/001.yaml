theological_decisions:
- issue: Personification and prophetic imagery
  chosen_reading: Lebanon is addressed directly as a personified land/forest region
    whose 'doors' are opened to destructive judgment.
  alternative_readings:
  - A literal address to Lebanon's mountain passes or forest entrances
  - A symbolic address to political powers associated with Lebanon
  rationale: The verse is poetic and prophetic, using personification without requiring
    the translation to resolve the larger symbolic referent. The English keeps the
    imagery intact rather than specifying whether Lebanon stands for forests, rulers,
    or a broader judgment symbol.
  doctrine_reference: Preserve theological tension rather than resolve it.
