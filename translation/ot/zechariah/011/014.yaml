id: ZEC.11.14
reference: Zechariah 11:14
source:
  edition: WLC
  text: וָֽ/אֶגְדַּע֙ אֶת מַקְלִ֣/י הַ/שֵּׁנִ֔י אֵ֖ת הַ/חֹֽבְלִ֑ים לְ/הָפֵר֙ אֶת הָֽ/אַחֲוָ֔ה
    בֵּ֥ין יְהוּדָ֖ה וּ/בֵ֥ין יִשְׂרָאֵֽל־־׃ס
translation:
  text: Then I cut in pieces my second staff, Union, to break the brotherhood between
    Judah and Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "Bands" or "Binders" for the name of the second staff; the Hebrew term
      evokes things bound together.
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֶגְדַּע
  chosen: Then I cut in pieces
  alternatives:
  - And I cut down
  - Then I broke
  lexicon: HALOT
  rationale: The verb גדע commonly denotes cutting off/down, often by severing. In
    the symbolic action with the staff, 'cut in pieces' conveys deliberate breaking
    by cutting more vividly than the flatter 'broke,' while preserving the physical
    imagery.
- source_word: מַקְלִי הַשֵּׁנִי
  chosen: my second staff
  alternatives:
  - my other staff
  lexicon: HALOT
  rationale: מַקֵּל is 'staff/rod.' 'Second' is the plain sense of הַשֵּׁנִי and fits
    the sequence with the two named staffs in the context.
- source_word: הַחֹבְלִים
  chosen: Union
  alternatives:
  - Binders
  - Bands
  lexicon: HALOT
  rationale: This is the proper name of the second staff from the immediate context
    (11:7). The underlying noun can suggest bands/binders, but as a symbolic staff-name
    referring to social cohesion, 'Union' communicates the function clearly in modern
    English. The lexical alternative is worth preserving in a footnote because many
    translations render it 'Bands'.
- source_word: לְהָפֵר
  chosen: to break
  alternatives:
  - to annul
  - to frustrate
  lexicon: HALOT
  rationale: הפר often means to break, annul, or invalidate a covenantal or relational
    arrangement. Here 'to break' fits the concrete-symbolic action and the relational
    object that follows.
- source_word: הָאַחֲוָה
  chosen: the brotherhood
  alternatives:
  - the kinship
  - the fellowship
  lexicon: HALOT
  rationale: אַחֲוָה denotes brotherhood or fraternal unity. 'Brotherhood' best preserves
    the familial-political sense between Judah and Israel without flattening it to
    generic 'unity.' This also aligns with the gender-accurate principle, since the
    metaphor is explicitly fraternal.
- source_word: בֵּין יְהוּדָה וּבֵין יִשְׂרָאֵל
  chosen: between Judah and Israel
  alternatives:
  - between Judah and the rest of Israel
  lexicon: HALOT
  rationale: The phrase is straightforward. 'Judah and Israel' preserves the historical-political
    distinction in the prophetic symbolism without interpretive expansion.
