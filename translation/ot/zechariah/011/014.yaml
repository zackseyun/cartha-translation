theological_decisions:
- issue: Rendering the symbolic name הַחֹבְלִים
  chosen_reading: Union
  alternative_readings:
  - Bands
  - Binders
  rationale: The context presents the term as the name of a staff symbolizing the
    bond between Judah and Israel. 'Union' best communicates the symbolic meaning
    in readable modern English, while preserving more literal alternatives in a footnote
    for auditability.
  doctrine_reference: Translation philosophy §§1, 5, 6
- issue: Rendering אַחֲוָה with gendered language
  chosen_reading: brotherhood
  alternative_readings:
  - unity
  - fellowship
  rationale: The Hebrew term is explicitly fraternal. Per the gender-accurate principle,
    the translation should preserve that familial male-marked metaphor rather than
    neutralize it to 'unity,' while still conveying collective solidarity.
  doctrine_reference: Translation philosophy §4
