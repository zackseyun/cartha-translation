id: ZEC.11.7
reference: Zechariah 11:7
source:
  edition: WLC
  text: וָֽ/אֶרְעֶה֙ אֶת צֹ֣אן הַֽ/הֲרֵגָ֔ה לָ/כֵ֖ן עֲנִיֵּ֣י הַ/צֹּ֑אן וָ/אֶקַּֽח
    לִ֞/י שְׁנֵ֣י מַקְל֗וֹת לְ/אַחַ֞ד קָרָ֤אתִי נֹ֨עַם֙ וּ/לְ/אַחַד֙ קָרָ֣אתִי חֹֽבְלִ֔ים
    וָ/אֶרְעֶ֖ה אֶת הַ/צֹּֽאן־־־׃
translation:
  text: So I shepherded the flock doomed to slaughter, namely the afflicted of the
    flock. Then I took for myself two staffs; one I named Favor, and the other I named
    Union, and I shepherded the flock.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the poor of the flock.' The Hebrew can denote those who are poor, afflicted,
      or humbled.
    reason: lexical_alternative
  - marker: b
    text: 'Favor: alternatively ''Beauty,'' ''Pleasantness,'' or ''Grace.'''
    reason: lexical_alternative
  - marker: c
    text: 'Union: alternatively ''Bonds'' or ''Bands,'' reflecting the idea of things
      bound together.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֶרְעֶה
  chosen: I shepherded
  alternatives:
  - I pastured
  - I tended
  - I fed
  lexicon: HALOT
  rationale: From רעה in the shepherding sense. 'I shepherded' preserves both the
    literal pastoral image and the leadership metaphor better than the narrower 'fed'
    or the less idiomatic 'pastured.'
- source_word: צֹאן הַהֲרֵגָה
  chosen: the flock doomed to slaughter
  alternatives:
  - the flock of slaughter
  - the slaughter flock
  - the flock for slaughter
  lexicon: HALOT
  rationale: The construct-like phrase denotes sheep marked out for killing. 'Doomed
    to slaughter' is natural English while preserving the grim force of the Hebrew.
- source_word: לָכֵן
  chosen: namely
  alternatives:
  - therefore
  - so
  - for that reason
  lexicon: HALOT
  rationale: In this difficult clause, לָכֵן functions idiomatically to specify or
    narrow the referent rather than to mark logical consequence. 'Namely' best fits
    the appositional sense linking 'the flock doomed to slaughter' with 'the afflicted
    of the flock.'
- source_word: עֲנִיֵּי הַצֹּאן
  chosen: the afflicted of the flock
  alternatives:
  - the poor of the flock
  - the humble of the flock
  - the wretched of the flock
  lexicon: HALOT
  rationale: עני can denote poverty, affliction, or lowliness. 'Afflicted' captures
    social vulnerability without reducing the term to merely economic poverty, and
    fits the context of a flock marked for destruction.
- source_word: שְׁנֵי מַקְלוֹת
  chosen: two staffs
  alternatives:
  - two rods
  - two sticks
  lexicon: HALOT
  rationale: In a shepherding context, 'staffs' is the most natural and contextually
    precise rendering for מקלות.
- source_word: נֹעַם
  chosen: Favor
  alternatives:
  - Pleasantness
  - Beauty
  - Grace
  lexicon: HALOT
  rationale: The noun can denote pleasantness, delight, or favor. As the symbolic
    name of a staff in this prophetic sign-act, 'Favor' best conveys relational goodwill
    and aligns with the covenantal symbolism developed in the context.
- source_word: חֹבְלִים
  chosen: Union
  alternatives:
  - Bonds
  - Binders
  - Bands
  lexicon: HALOT
  rationale: The plural form derives from a root associated with binding or cords.
    In context it symbolizes the bond holding parties together. 'Union' communicates
    the figurative sense clearly in modern English; the more literal 'Bonds/Bands'
    is preserved as an alternative.
- source_word: וָאֶקַּח לִי
  chosen: Then I took for myself
  alternatives:
  - And I took for myself
  - I took
  lexicon: HALOT
  rationale: The sequence advances the narrative. Including 'for myself' reflects
    the ethical dative לִי, while 'Then' gives natural English progression.
- source_word: קָרָאתִי
  chosen: I named
  alternatives:
  - I called
  lexicon: HALOT
  rationale: When followed by the object being given a designation, 'named' is the
    clearest English equivalent.
- source_word: וָאֶרְעֶה אֶת הַצֹּאן
  chosen: and I shepherded the flock
  alternatives:
  - and I tended the flock
  - and I pastured the flock
  lexicon: HALOT
  rationale: Repeating 'shepherded' preserves the inclusio-like repetition in the
    Hebrew and keeps the prophetic action vivid.
