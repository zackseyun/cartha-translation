theological_decisions:
- issue: Symbolic names of the two staffs
  chosen_reading: Favor ... Union
  alternative_readings:
  - Beauty ... Bands
  - Grace ... Bonds
  rationale: These names carry symbolic significance in the enacted prophecy. The
    chosen renderings aim for readable modern English while preserving the theological
    force of covenant favor and communal bond. More literal alternatives are preserved
    in a footnote because the symbolism is interpretively important.
  doctrine_reference: Translation philosophy §§3, 6
- issue: Sense of עֲנִיֵּי הַצֹּאן
  chosen_reading: the afflicted of the flock
  alternative_readings:
  - the poor of the flock
  rationale: The phrase may emphasize either economic poverty or broader oppression/humiliation.
    'Afflicted' preserves the wider semantic range and avoids over-specifying the
    social condition where the Hebrew allows broader suffering.
  doctrine_reference: Translation philosophy §§1, 3, 6
