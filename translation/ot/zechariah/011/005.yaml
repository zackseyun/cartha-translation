id: ZEC.11.5
reference: Zechariah 11:5
source:
  edition: WLC
  text: אֲשֶׁ֨ר קֹנֵי/הֶ֤ן יַֽהֲרְגֻ/ן֙ וְ/לֹ֣א יֶאְשָׁ֔מוּ וּ/מֹכְרֵי/הֶ֣ן יֹאמַ֔ר בָּר֥וּךְ יְהוָ֖ה וַ/אעְשִׁ֑ר וְ/רֹ֣עֵי/הֶ֔ם לֹ֥א יַחְמ֖וֹל עֲלֵי/הֶֽן׃
translation:
  text: whose buyers slaughter them and are not held guilty, and whose sellers say, “Blessed be Yahweh, for I have become rich,” and their own shepherds have no compassion on them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and are not held guilty' / 'and do not become guilty.'
    reason: lexical_alternative
  - marker: b
    text: Or 'do not spare them.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲשֶׁר
  chosen: whose
  alternatives:
  - which
  - that
  lexicon: HALOT
  rationale: Introduces a relative clause referring back to the flock/sheep of the previous context. 'Whose' is the most natural English rendering with the following possessive participles ('their buyers,' 'their sellers').
- source_word: קֹנֵיהֶן
  chosen: buyers
  alternatives:
  - owners
  - purchasers
  lexicon: HALOT
  rationale: From קנה, 'to buy/acquire.' 'Buyers' best fits the commercial exploitation imagery in parallel with 'sellers.' 'Owners' is possible but weakens the market language.
- source_word: יַהֲרְגֻן
  chosen: slaughter
  alternatives:
  - kill
  - slay
  lexicon: HALOT
  rationale: Though the verb means 'kill,' 'slaughter' better conveys the brutal treatment of sheep/flock imagery in context and the exploitative violence of the verse without becoming paraphrastic.
- source_word: וְלֹא יֶאְשָׁמוּ
  chosen: and go unpunished
  alternatives:
  - and are not held guilty
  - and do not become guilty
  lexicon: HALOT
  rationale: The verb אשם can denote incurring guilt or being held guilty. In context the sense is that the killers suffer no accountability. 'Go unpunished' communicates the practical force in idiomatic English, while a footnote preserves the more formal alternative.
- source_word: וּמֹכְרֵיהֶן
  chosen: and whose sellers
  alternatives:
  - and their sellers
  lexicon: HALOT
  rationale: Maintains the relative-clause structure begun by אֲשֶׁר and parallels 'whose buyers.'
- source_word: יֹאמַר
  chosen: say
  alternatives:
  - says
  lexicon: HALOT
  rationale: Although morphologically singular, the subject 'sellers' is plural/collective. English idiom regularizes to plural 'say' to match the sense.
- source_word: בָּרוּךְ יְהוָה
  chosen: Blessed be the LORD
  alternatives:
  - The LORD is blessed
  - Blessed is the LORD
  lexicon: HALOT
  rationale: A conventional Hebrew blessing formula. 'Blessed be the LORD' preserves the exclamatory doxological form. Per doctrine, יְהוָה is rendered 'the LORD.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's stated default for the divine name.
- source_word: וָאֶעְשִׁר
  chosen: for I have become rich
  alternatives:
  - for I am rich
  - and I have grown rich
  lexicon: HALOT
  rationale: The Hiphil of עשר here expresses becoming wealthy/prospering. 'I have become rich' captures the resultative sense and the speaker's self-congratulatory tone.
- source_word: וְרֹעֵיהֶם
  chosen: and their shepherds
  alternatives:
  - and their pastors
  - and those who shepherd them
  lexicon: HALOT
  rationale: '''Shepherds'' preserves the metaphor and its prophetic resonance; ''pastors'' would import later ecclesial associations not warranted by the Hebrew.'
- source_word: לֹא יַחְמֹל עֲלֵיהֶן
  chosen: have no compassion on them
  alternatives:
  - do not spare them
  - do not pity them
  lexicon: HALOT
  rationale: חמל denotes sparing or showing pity/compassion. 'Have no compassion on them' communicates the relational cruelty of the shepherds in clear modern English. A footnote preserves 'do not spare them' as a more formal alternative.
