id: ZEC.11.10
reference: Zechariah 11:10
source:
  edition: WLC
  text: וָ/אֶקַּ֤ח אֶת מַקְלִ/י֙ אֶת נֹ֔עַם וָ/אֶגְדַּ֖ע אֹת֑/וֹ לְ/הָפֵיר֙ אֶת בְּרִיתִ֔/י
    אֲשֶׁ֥ר כָּרַ֖תִּי אֶת כָּל הָ/עַמִּֽים־־־־־׃
translation:
  text: Then I took my staff, Favor, and cut it in two, to break my covenant that
    I had made with all the peoples.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all the nations.' The Hebrew word can denote peoples or nations; the
      plural is retained here.
    reason: lexical_alternative
lexical_decisions:
- source_word: מַקְלִי
  chosen: my staff
  alternatives:
  - my rod
  lexicon: HALOT
  rationale: מַקֵּל commonly denotes a staff or rod. 'Staff' is the more natural English
    choice here, especially since the object is named and symbolically used by the
    shepherd.
- source_word: נֹעַם
  chosen: Favor
  alternatives:
  - Pleasantness
  - Grace
  - Beauty
  lexicon: HALOT
  rationale: As the proper name of the staff, the term should be rendered for meaning
    rather than transliterated. 'Favor' best captures the sense of pleasantness/gracious
    favor in this symbolic context and aligns with the staff's relation to covenantal
    goodwill.
- source_word: וָאֶגְדַּע אֹתוֹ
  chosen: cut it in two
  alternatives:
  - cut it off
  - broke it
  lexicon: HALOT
  rationale: גדע means to cut down/off. In context, the staff is being severed as
    a symbolic act. 'Cut it in two' makes the physical action explicit in idiomatic
    English without overparaphrasing.
- source_word: לְהָפֵיר
  chosen: to break
  alternatives:
  - to annul
  - to revoke
  lexicon: HALOT
  rationale: הפר in covenantal contexts means to break, annul, or invalidate. 'Break'
    is direct, idiomatic, and preserves the covenantal force without sounding overly
    technical.
- source_word: בְּרִיתִי
  chosen: my covenant
  alternatives:
  - my pact
  lexicon: HALOT
  rationale: בְּרִית is the standard covenant term and should be rendered consistently
    as 'covenant' given its theological significance.
- source_word: כָּרַתִּי
  chosen: I had made
  alternatives:
  - I made
  - I had cut
  lexicon: HALOT
  rationale: 'כרת ברית is the idiom ''make/cut a covenant.'' English normally says
    ''make a covenant.'' The pluperfect ''had made'' fits the sequence: the covenant
    existed prior to the symbolic breaking.'
- source_word: כָּל הָעַמִּים
  chosen: all the peoples
  alternatives:
  - all the nations
  - all the people
  lexicon: HALOT
  rationale: The plural עַמִּים is best represented by 'peoples,' preserving the plurality.
    'Nations' is possible, but 'peoples' more closely reflects the lexical sense and
    avoids importing a strictly geopolitical nuance.
