theological_decisions:
- issue: Scope of the covenant in 'with all the peoples'
  chosen_reading: Retain the broad wording 'all the peoples' without narrowing it
    to Israel alone or to hostile nations alone.
  alternative_readings:
  - all the nations
  - all the peoples around them
  rationale: The Hebrew explicitly says 'all the peoples' and does not itself specify
    a narrower referent in this verse. The translation preserves the textual breadth
    and leaves interpretive narrowing to exegesis rather than the main text.
  doctrine_reference: Preserve theological tension rather than resolve it.
