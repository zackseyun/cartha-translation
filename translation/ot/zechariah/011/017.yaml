theological_decisions:
- issue: Rendering אֱלִיל in a leadership metaphor
  chosen_reading: worthless shepherd
  alternative_readings:
  - idol shepherd
  rationale: The term can evoke both worthlessness and idolatry. In this verse the
    immediate emphasis is on the shepherd's failure and abandonment of the flock,
    so 'worthless' best communicates the denunciation in clear English. The more literal
    'idol shepherd' is preserved in a footnote because it may suggest a polemical
    nuance against false or empty leadership.
  doctrine_reference: Translation philosophy §§1, 5
