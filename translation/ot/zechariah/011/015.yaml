id: ZEC.11.15
reference: Zechariah 11:15
source:
  edition: WLC
  text: וַ/יֹּ֥אמֶר יְהוָ֖ה אֵלָ֑/י ע֣וֹד קַח לְ/ךָ֔ כְּלִ֖י רֹעֶ֥ה אֱוִלִֽי־׃
translation:
  text: Then the LORD said to me, “Take again for yourself the equipment of a foolish
    shepherd.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the implements/gear of a foolish shepherd.' The Hebrew term is broad
      and refers to the articles or equipment associated with a shepherd.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: Then ... said
  alternatives:
  - And ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then' gives natural English
    narrative flow while preserving sequence; 'and' is possible but less idiomatic
    here.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following established reverential convention and the pattern reflected in the
    Septuagint tradition.
- source_word: אֵלַי
  chosen: to me
  lexicon: HALOT
  rationale: Straightforward preposition plus 1cs suffix; 'to me' is the natural English
    equivalent.
- source_word: עוֹד
  chosen: again
  alternatives:
  - still
  - yet
  - further
  lexicon: HALOT
  rationale: In this command context, עוֹד signals repetition or an additional action.
    'Again' best fits the sense that Zechariah is to perform another symbolic action.
- source_word: קַח לְךָ
  chosen: Take for yourself
  alternatives:
  - Take
  - Get for yourself
  lexicon: HALOT
  rationale: The imperative קַח means 'take'; the dative לְךָ adds reflexive/personal
    involvement. 'Take for yourself' preserves that nuance, though the English text
    slightly smooths it as 'Take again for yourself.'
- source_word: כְּלִי
  chosen: equipment
  alternatives:
  - implements
  - gear
  - instruments
  lexicon: HALOT
  rationale: כְּלִי is a broad term for article, vessel, implement, or equipment.
    In the shepherding context, 'equipment' is the most natural collective rendering
    in modern English.
- source_word: רֹעֶה
  chosen: shepherd
  alternatives:
  - herdsman
  - one who shepherds
  lexicon: HALOT
  rationale: 'Here the participle functions attributively with כְּלִי: the equipment
    belonging to or characteristic of a shepherd. ''Shepherd'' is the standard and
    contextually appropriate rendering.'
- source_word: אֱוִלִי
  chosen: foolish
  alternatives:
  - worthless
  - senseless
  lexicon: HALOT
  rationale: The adjective denotes folly or moral senselessness. 'Foolish' is the
    most direct rendering. 'Worthless' would overstate the lexical sense here, though
    the broader context portrays a negative shepherd figure.
