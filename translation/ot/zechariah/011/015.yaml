theological_decisions:
- issue: Symbolic identity of the shepherd figure
  chosen_reading: Render the phrase descriptively as 'a foolish shepherd' without
    specifying whether this represents a particular historical ruler, false leaders
    generally, or an eschatological figure.
  alternative_readings:
  - a specific historical leader
  - the corrupt leadership of Israel in general
  - an eschatological anti-shepherd figure
  rationale: The Hebrew text itself gives only the symbolic designation and does not
    identify the figure more precisely in this verse. To preserve theological tension
    and avoid importing a disputed interpretation, the translation remains at the
    lexical level.
  doctrine_reference: Preserve theological tension rather than resolve it.
