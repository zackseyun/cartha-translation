theological_decisions:
- issue: Rendering the divine name YHWH
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project default is to render יְהוָה as 'the LORD' in keeping with
    stated doctrine and established reverential convention.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Speaker relationship in 'the LORD my God'
  chosen_reading: Retain first-person 'my God'
  alternative_readings:
  - the LORD God
  - the LORD your God
  rationale: The Hebrew suffix is first person singular, and the text presents the
    prophet reporting the command from his God. The translation preserves this rather
    than smoothing it to a more generic title.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
