id: ZEC.11.4
reference: Zechariah 11:4
source:
  edition: WLC
  text: כֹּ֥ה אָמַ֖ר יְהוָ֣ה אֱלֹהָ֑/י רְעֵ֖ה אֶת צֹ֥אן הַ/הֲרֵגָֽה־׃
translation:
  text: 'Thus says Yahweh my God: Shepherd the flock for slaughter.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the flock for slaughter,' that is, the flock destined to be slaughtered.
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּה
  chosen: Thus
  alternatives:
  - This is what
  lexicon: HALOT
  rationale: Standard prophetic discourse marker introducing direct divine speech. 'Thus' preserves the formal tone concisely.
- source_word: אָמַר
  chosen: says
  alternatives:
  - said
  lexicon: HALOT
  rationale: Although morphologically perfect, in prophetic messenger formulas it is idiomatically rendered as present in English ('Thus says...') to reflect ongoing authoritative proclamation.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives: []
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֱלֹהַי
  chosen: my God
  alternatives:
  - God of me
  lexicon: HALOT
  rationale: First-person singular suffix indicates the speaker reports the divine command as coming from 'my God.' Natural English requires 'my God.'
- source_word: רְעֵה
  chosen: Shepherd
  alternatives:
  - Pasture
  - Tend
  lexicon: HALOT
  rationale: Imperative 2ms from רעה. 'Shepherd' best preserves the verbal connection to the shepherd imagery dominating the chapter, more specifically than 'tend' and less misleading than 'pasture.'
- source_word: צֹאן
  chosen: flock
  alternatives:
  - sheep
  lexicon: HALOT
  rationale: Collective noun referring to sheep as a group. 'Flock' is idiomatic and fits the shepherding metaphor.
- source_word: הַהֲרֵגָה
  chosen: marked for slaughter
  alternatives:
  - of slaughter
  - for slaughter
  - doomed to slaughter
  lexicon: HALOT
  rationale: The noun denotes slaughter/killing. In construct-like relation with 'flock,' the sense is a flock destined to be slaughtered. 'Marked for slaughter' communicates the passive destined sense clearly in modern English without overparaphrasing.
