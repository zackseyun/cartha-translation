- issue: Rendering the divine name YHWH
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Speaker relationship in 'the LORD my God'
  chosen_reading: Retain first-person 'my God'
  alternative_readings:
  - the LORD God
  - the LORD your God
  rationale: The Hebrew suffix is first person singular, and the text presents the prophet reporting the command from his God. The translation preserves this rather than smoothing it to a more generic title.
