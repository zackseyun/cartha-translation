theological_decisions:
- issue: Scope of the geographical transformation
  chosen_reading: regional transformation around Jerusalem rather than a statement
    about the entire globe
  alternative_readings:
  - the whole earth will become like the Arabah
  rationale: The verse is framed by specific Judean boundary markers and city landmarks.
    Rendering אָרֶץ as 'land' avoids overstating the scope while preserving the eschatological
    topographical transformation described in the text.
  doctrine_reference: Translation philosophy §1, §3
