id: ZEC.14.10
reference: Zechariah 14:10
source:
  edition: WLC
  text: יִסּ֨וֹב כָּל הָ/אָ֤רֶץ כָּ/עֲרָבָה֙ מִ/גֶּ֣בַע לְ/רִמּ֔וֹן נֶ֖גֶב יְרֽוּשָׁלִָ֑ם
    וְֽ/רָאֲמָה֩ וְ/יָשְׁבָ֨ה תַחְתֶּ֜י/הָ לְ/מִ/שַּׁ֣עַר בִּנְיָמִ֗ן עַד מְק֞וֹם
    שַׁ֤עַר הָֽ/רִאשׁוֹן֙ עַד שַׁ֣עַר הַ/פִּנִּ֔ים וּ/מִגְדַּ֣ל חֲנַנְאֵ֔ל עַ֖ד יִקְבֵ֥י
    הַ/מֶּֽלֶךְ־־־׃
translation:
  text: All the land will be turned into a plain, from Geba to Rimmon south of Jerusalem.
    But Jerusalem will be raised up and will remain in its place, from the Benjamin
    Gate to the place of the First Gate, to the Corner Gate, and from the Tower of
    Hananel to the king’s winepresses.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'like the Arabah.' The Hebrew may compare the land to the Arabah valley/steppe
      rather than simply stating 'into a plain.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יִסּוֹב
  chosen: will be turned
  alternatives:
  - will turn
  - will change around
  - will be transformed
  lexicon: HALOT
  rationale: The verb סבב in this context describes a topographical change. English
    passive 'will be turned' best captures the sense that the land undergoes transformation
    into a plain, matching the surrounding eschatological geography.
- source_word: כָּל הָאָרֶץ
  chosen: all the land
  alternatives:
  - the whole הארץ
  - the whole region
  - all the earth
  lexicon: HALOT
  rationale: אָרֶץ can mean 'land' or 'earth.' Here the following boundary markers
    ('from Geba to Rimmon south of Jerusalem') indicate a regional/topographical reference
    rather than the entire globe, so 'all the land' is preferable.
- source_word: כָּעֲרָבָה
  chosen: into a plain
  alternatives:
  - like the Arabah
  - like the plain
  - like the steppe
  lexicon: HALOT
  rationale: עֲרָבָה may denote the Arabah specifically or a plain/steppe more generally.
    Because the point is flattening of terrain, 'into a plain' communicates the topographical
    result in natural English. The more formal 'like the Arabah' is preserved in a
    footnote.
- source_word: מִגֶּבַע לְרִמּוֹן נֶגֶב יְרוּשָׁלִָם
  chosen: from Geba to Rimmon south of Jerusalem
  alternatives:
  - from Geba to Rimmon, south of Jerusalem
  lexicon: HALOT
  rationale: These are place names marking the north-south extent of the transformed
    land. 'South of Jerusalem' naturally modifies Rimmon in English and reflects the
    Hebrew apposition.
- source_word: וְרָאֲמָה
  chosen: will be raised up
  alternatives:
  - will be high
  - will rise
  lexicon: HALOT
  rationale: From רום/ראה textual tradition as pointed in context, the sense is elevation.
    In contrast to the surrounding land becoming flat, Jerusalem is elevated. 'Will
    be raised up' best expresses the contrast and likely passive/resultative force
    in context.
- source_word: וְיָשְׁבָה תַחְתֶּיהָ
  chosen: will remain in its place
  alternatives:
  - will dwell in its place
  - will sit in its place
  - will stay where it is
  lexicon: HALOT
  rationale: Literally 'and it will dwell under it/in its place beneath itself,' an
    idiom for remaining settled in its proper location. 'Will remain in its place'
    is idiomatic English and fits the topographical description.
- source_word: לְמִשַּׁעַר בִּנְיָמִן
  chosen: from the Benjamin Gate
  alternatives:
  - to the Benjamin Gate
  lexicon: HALOT
  rationale: The prefixed preposition here functions as the starting point in the
    sequence of city landmarks after 'in its place.' English idiom prefers 'from the
    Benjamin Gate' to begin the range.
- source_word: מְקוֹם שַׁעַר הָרִאשׁוֹן
  chosen: the place of the First Gate
  alternatives:
  - the site of the First Gate
  lexicon: HALOT
  rationale: מקום indicates the location/site, perhaps because the gate no longer
    stood. 'The place of the First Gate' preserves that nuance.
- source_word: שַׁעַר הַפִּנִּים
  chosen: the Corner Gate
  alternatives:
  - the Gate of the Corners
  - the Pinnim Gate
  lexicon: HALOT
  rationale: The plural noun from פנה refers to corners/angles; 'Corner Gate' is the
    established and semantically clear rendering.
- source_word: מִגְדַּל חֲנַנְאֵל
  chosen: the Tower of Hananel
  lexicon: HALOT
  rationale: Proper name plus common noun; standard transliteration and title translation
    follow the project's philosophy.
- source_word: יִקְבֵי הַמֶּלֶךְ
  chosen: the king’s winepresses
  alternatives:
  - the king's vats
  lexicon: HALOT
  rationale: יֶקֶב denotes a winepress or wine vat. The plural here likely refers
    to the royal winepress installations. 'Winepresses' is the clearest ordinary English
    rendering.
