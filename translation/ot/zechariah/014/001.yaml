id: ZEC.14.1
reference: Zechariah 14:1
source:
  edition: WLC
  text: הִנֵּ֥ה יֽוֹם בָּ֖א לַֽ/יהוָ֑ה וְ/חֻלַּ֥ק שְׁלָלֵ֖/ךְ בְּ/קִרְבֵּֽ/ךְ־׃
translation:
  text: Behold, a day is coming for the LORD, when your plunder will be divided in
    your midst.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more traditionally, 'a day of the LORD is coming.' The Hebrew reads
      literally 'a day is coming for the LORD.'
    reason: alternative_reading
lexical_decisions:
- source_word: הִנֵּה
  chosen: Behold
  alternatives:
  - Look
  - See
  lexicon: HALOT
  rationale: Discourse marker introducing a solemn prophetic announcement. 'Behold'
    preserves the elevated, attention-directing force better than the more colloquial
    'look' or 'see'.
- source_word: יוֹם
  chosen: a day
  alternatives:
  - the day
  lexicon: HALOT
  rationale: Anarthrous noun in a prophetic formula; 'a day' is the most natural English
    rendering here, introducing an impending significant day without yet specifying
    it as a previously defined referent.
- source_word: בָּא
  chosen: is coming
  alternatives:
  - comes
  - is about to come
  lexicon: HALOT
  rationale: Hebrew participial/qal form used futurally in prophetic discourse. English
    progressive 'is coming' conveys imminent future force naturally.
- source_word: לַיהוָה
  chosen: for the LORD
  alternatives:
  - of the LORD
  - belonging to the LORD
  lexicon: HALOT
  rationale: The preposition ל can indicate possession, relation, or reference. 'For
    the LORD' is a close rendering of the Hebrew and avoids prematurely assimilating
    the phrase to the traditional idiom 'the day of the LORD,' though that is conceptually
    related and worth preserving in a footnote. Per doctrine, YHWH is rendered 'the
    LORD'.
- source_word: וְחֻלַּק
  chosen: will be divided
  alternatives:
  - shall be apportioned
  - will be shared out
  lexicon: HALOT
  rationale: Pual perfect with passive sense in prophetic future context. 'Will be
    divided' is clear, natural, and preserves the passive action.
- source_word: שְׁלָלֵךְ
  chosen: your plunder
  alternatives:
  - your spoil
  lexicon: HALOT
  rationale: Refers to goods taken in war. 'Plunder' is more accessible modern English
    than 'spoil' while retaining the military sense. The 2fs suffix indicates Jerusalem/Zion
    addressed as feminine singular.
- source_word: בְּקִרְבֵּךְ
  chosen: in your midst
  alternatives:
  - within you
  - inside you
  lexicon: HALOT
  rationale: Idiomatic expression for something happening within the city/community
    itself. 'In your midst' preserves the locative and rhetorical force better than
    flatter alternatives.
