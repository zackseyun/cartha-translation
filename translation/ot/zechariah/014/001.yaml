theological_decisions:
- issue: Relation of לַיהוָה to the prophetic 'day' formula
  chosen_reading: for the LORD
  alternative_readings:
  - of the LORD
  rationale: The Hebrew preposition is ל, not the construct phrase that would more
    directly yield 'day of the LORD.' Still, the phrase clearly evokes the broader
    prophetic theme of a day specially related to YHWH. To preserve original-language
    primacy, the main text keeps 'for the LORD,' while the traditional interpretive
    equivalent is preserved in a footnote.
  doctrine_reference: 'Translation philosophy §1, §3; Contested terms: יְהוָה → the
    LORD'
