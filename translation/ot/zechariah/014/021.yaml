theological_decisions:
- issue: Meaning of כְנַעֲנִי in the final clause
  chosen_reading: Retain the literal term 'Canaanite' in the main text.
  alternative_readings:
  - merchant
  - trader
  rationale: The Hebrew word can denote either an ethnic 'Canaanite' or, by extension,
    a 'merchant/trader' in some contexts. In this prophetic holiness context, the
    literal term preserves the canonical resonance of impurity/exclusion while allowing
    readers to see the text's stark imagery. Because the commercial sense is also
    plausible, especially in temple context, it is preserved in a footnote rather
    than resolved away.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather
    than resolve it)
