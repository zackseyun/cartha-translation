id: ZEC.14.21
reference: Zechariah 14:21
source:
  edition: WLC
  text: וְ֠/הָיָה כָּל סִ֨יר בִּ/ירוּשָׁלִַ֜ם וּ/בִֽ/יהוּדָ֗ה קֹ֚דֶשׁ לַ/יהוָ֣ה צְבָא֔וֹת
    וּ/בָ֨אוּ֙ כָּל הַ/זֹּ֣בְחִ֔ים וְ/לָקְח֥וּ מֵ/הֶ֖ם וּ/בִשְּׁל֣וּ בָ/הֶ֑ם וְ/לֹא
    יִהְיֶ֨ה כְנַעֲנִ֥י ע֛וֹד בְּ/בֵית יְהוָ֥ה צְבָא֖וֹת בַּ/יּ֥וֹם הַ/הֽוּא־־־־׃
translation:
  text: And every pot in Jerusalem and in Judah will be holy to the LORD of hosts,
    and all who sacrifice will come and take from them and boil in them. And there
    will no longer be a Canaanite in the house of the LORD of hosts on that day.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'merchant' or 'trader'; the Hebrew word can carry that sense in some
      contexts.
    reason: alternative_reading
lexical_decisions:
- source_word: סִיר
  chosen: pot
  alternatives:
  - cooking pot
  - cauldron
  lexicon: HALOT
  rationale: Refers to a vessel used for cooking/boiling. 'Pot' is natural modern
    English and fits the following verb 'boil in them.'
- source_word: קֹדֶשׁ
  chosen: holy
  alternatives:
  - sacred
  - holiness
  lexicon: HALOT
  rationale: Predicate adjective describing the pots as set apart for the LORD. 'Holy'
    preserves the cultic/theological force better than the more generic 'sacred.'
- source_word: יְהוָה צְבָאוֹת
  chosen: the LORD of hosts
  alternatives:
  - the LORD Almighty
  lexicon: HALOT
  rationale: Follows the project's default rendering of YHWH as 'the LORD' and translates
    צְבָאוֹת in the established prophetic title as 'of hosts.'
- source_word: הַזֹּבְחִים
  chosen: all who sacrifice
  alternatives:
  - all the sacrificers
  - all who offer sacrifice
  lexicon: HALOT
  rationale: Substantival participle referring to worshipers engaged in sacrificial
    activity. 'All who sacrifice' is idiomatic and sufficiently formal.
- source_word: מֵהֶם
  chosen: from them
  alternatives:
  - some of them
  - from among them
  lexicon: HALOT
  rationale: The pronoun refers back to the pots. The sense is that worshipers take
    pots from among the now-holy vessels for sacrificial cooking.
- source_word: וּבִשְּׁלוּ בָהֶם
  chosen: and boil in them
  alternatives:
  - and cook in them
  - and boil the meat in them
  lexicon: HALOT
  rationale: The verb commonly denotes boiling/cooking. 'Boil in them' stays close
    to the Hebrew without adding an explicit object not present in the text.
- source_word: כְנַעֲנִי
  chosen: Canaanite
  alternatives:
  - merchant
  - trader
  lexicon: HALOT
  rationale: The lexical form ordinarily means 'Canaanite.' In some contexts it can
    denote a merchant/trader, but here the main text preserves the ethnic/canonical
    term while a footnote records the possible commercial sense, since the line likely
    signals the removal of all profanation from the temple.
- source_word: בְּבֵית יְהוָה צְבָאוֹת
  chosen: in the house of the LORD of hosts
  alternatives:
  - in the temple of the LORD of hosts
  lexicon: HALOT
  rationale: '''House'' is the direct lexical equivalent and preserves the Hebrew
    idiom for the temple without over-interpreting.'
- source_word: בַּיּוֹם הַהוּא
  chosen: on that day
  alternatives:
  - in that day
  lexicon: HALOT
  rationale: Standard prophetic temporal formula; 'on that day' is idiomatic modern
    English.
