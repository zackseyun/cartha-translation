id: ZEC.14.2
reference: Zechariah 14:2
source:
  edition: WLC
  text: וְ/אָסַפְתִּ֨י אֶת כָּל הַ/גּוֹיִ֥ם אֶֽל יְרוּשָׁלִַם֮ לַ/מִּלְחָמָה֒ וְ/נִלְכְּדָ֣ה
    הָ/עִ֗יר וְ/נָשַׁ֨סּוּ֙ הַ/בָּ֣תִּ֔ים וְ/הַ/נָּשִׁ֖ים תשגלנה וְ/יָצָ֞א חֲצִ֤י
    הָ/עִיר֙ בַּ/גּוֹלָ֔ה וְ/יֶ֣תֶר הָ/עָ֔ם לֹ֥א יִכָּרֵ֖ת מִן הָ/עִֽיר־־׀־־׃
translation:
  text: And I will gather all the nations against Jerusalem for battle, and the city
    will be captured, and the houses plundered, and the women raped, and half of the
    city will go out into exile; but the rest of the people will not be cut off from
    the city.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more euphemistically in some translation traditions, 'the women violated'
      or 'the women ravished.' The Hebrew term is blunt and refers to sexual assault.
    reason: lexical_alternative
  - marker: b
    text: Or 'the rest of the people will not be exterminated,' if 'cut off' is taken
      in the stronger sense of destruction rather than removal.
    reason: alternative_reading
lexical_decisions:
- source_word: וְאָסַפְתִּי
  chosen: And I will gather
  alternatives:
  - And I will assemble
  lexicon: HALOT
  rationale: Qal perfect 1cs with prefixed conjunction in prophetic discourse functions
    futurally from the divine speaker's perspective. 'Gather' is the most natural
    English rendering and preserves the active divine agency.
- source_word: כָּל הַגּוֹיִם
  chosen: all the nations
  alternatives:
  - all the peoples
  lexicon: HALOT
  rationale: גּוֹיִם normally denotes nations/peoples in the geopolitical sense. 'Nations'
    fits the military and international context better than 'peoples'.
- source_word: אֶל יְרוּשָׁלִַם לַמִּלְחָמָה
  chosen: against Jerusalem for battle
  alternatives:
  - to Jerusalem for battle
  - to Jerusalem for war
  lexicon: HALOT
  rationale: Although אֶל is formally 'to/toward,' in this hostile military context
    English idiom requires 'against Jerusalem.' לַמִּלְחָמָה is rendered 'for battle'
    for readable modern English; 'for war' is possible but less idiomatic here.
- source_word: וְנִלְכְּדָה הָעִיר
  chosen: and the city will be captured
  alternatives:
  - and the city shall be taken
  lexicon: HALOT
  rationale: Nifal of לכד indicates being taken/captured in warfare. 'Captured' is
    contemporary and clear.
- source_word: וְנָשַׁסּוּ הַבָּתִּים
  chosen: and the houses plundered
  alternatives:
  - and the houses looted
  - and the houses pillaged
  lexicon: HALOT
  rationale: The verb denotes plundering/spoiling. 'Plundered' preserves the violent
    wartime sense without sounding colloquial.
- source_word: וְהַנָּשִׁים תשגלנה
  chosen: and the women raped
  alternatives:
  - and the women violated
  lexicon: HALOT
  rationale: The ketiv verb is a coarse term referring to sexual violation in conquest.
    'Raped' states the sense plainly and avoids euphemism that would undertranslate
    the violence. Because many readers know the qere-style euphemistic tradition 'shall
    be ravished,' an alternative is preserved in a footnote.
- source_word: וְיָצָא חֲצִי הָעִיר בַּגּוֹלָה
  chosen: and half of the city will go out into exile
  alternatives:
  - and half of the city will go into captivity
  - and half of the city will be exiled
  lexicon: HALOT
  rationale: The singular verb with 'half of the city' is naturally rendered with
    a collective singular subject in English. בַּגּוֹלָה denotes exile/deportation;
    'into exile' is the standard and clearest rendering.
- source_word: וְיֶתֶר הָעָם
  chosen: but the rest of the people
  alternatives:
  - and the remainder of the people
  - but the remnant of the people
  lexicon: HALOT
  rationale: יֶתֶר means remainder/rest. 'Rest' is more idiomatic than 'remainder.'
    'Remnant' could import theological overtones not demanded by the term here.
- source_word: לֹא יִכָּרֵת מִן הָעִיר
  chosen: will not be cut off from the city
  alternatives:
  - will not be cut off out of the city
  - will not be removed from the city
  - will not be exterminated from the city
  lexicon: HALOT
  rationale: כרת in the nifal can mean be cut off, removed, or destroyed. With מִן
    הָעִיר, the phrase most naturally indicates that the remaining people are not
    cut off from the city, i.e., not entirely removed from it. The more annihilative
    nuance is possible but less precise with the preposition here, so it is preserved
    as an alternative in a footnote.
