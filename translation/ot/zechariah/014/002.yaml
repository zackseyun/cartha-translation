theological_decisions:
- issue: Rendering of violent sexual assault
  chosen_reading: Explicitly translated תשגלנה as 'the women raped'
  alternative_readings:
  - the women violated
  - the women ravished
  rationale: Optimal equivalence and original-language primacy favor a direct rendering
    of the harsh Hebrew rather than a softened traditional euphemism. This avoids
    minimizing the atrocity described in the prophecy while remaining faithful to
    the lexical force.
  doctrine_reference: Translation philosophy §§1, 6
- issue: Meaning of לֹא יִכָּרֵת מִן הָעִיר
  chosen_reading: The remaining people are not cut off from the city
  alternative_readings:
  - The remaining people are not exterminated
  - The remaining people are not removed from the city
  rationale: The phrase is somewhat ambiguous between destruction and removal. The
    main text preserves the formal image 'cut off from the city' without overresolving
    the exact nuance; an alternative is footnoted to preserve the possible extermination
    sense.
  doctrine_reference: Translation philosophy §3
