id: ZEC.14.18
reference: Zechariah 14:18
source:
  edition: WLC
  text: וְ/אִם מִשְׁפַּ֨חַת מִצְרַ֧יִם לֹֽא תַעֲלֶ֛ה וְ/לֹ֥א בָאָ֖ה וְ/לֹ֣א עֲלֵי/הֶ֑ם
    תִּֽהְיֶ֣ה הַ/מַּגֵּפָ֗ה אֲשֶׁ֨ר יִגֹּ֤ף יְהוָה֙ אֶת הַ/גּוֹיִ֔ם אֲשֶׁר֙ לֹ֣א
    יַֽעֲל֔וּ לָ/חֹ֖ג אֶת חַ֥ג הַ/סֻּכּֽוֹת־־־־׃
translation:
  text: And if the family of Egypt does not go up and does not come, then the plague
    will not be upon them—the plague with which the LORD strikes the nations that
    do not go up to celebrate the Feast of Booths.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'and does not come.' The Hebrew uses both 'go up' and
      'come,' likely reinforcing the idea of pilgrimage to Jerusalem.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew text reads 'the plague will not be upon them—the plague with
      which the LORD strikes the nations.' This is difficult in context because the
      previous verse speaks of no rain; many understand Egypt to receive a plague
      instead, since it does not depend on rainfall in the same way.
    reason: alternative_reading
  - marker: c
    text: Traditionally, 'the Feast of Tabernacles.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִשְׁפַּחַת מִצְרַיִם
  chosen: the family of Egypt
  alternatives:
  - the clan of Egypt
  - the house of Egypt
  lexicon: HALOT
  rationale: מִשְׁפָּחָה commonly denotes a family or clan grouping. 'Family of Egypt'
    preserves the singular collective expression of the Hebrew rather than flattening
    it to simply 'Egypt.'
- source_word: תַעֲלֶה
  chosen: go up
  alternatives:
  - ascend
  lexicon: HALOT
  rationale: עלה is the standard verb for going up to Jerusalem or to a pilgrimage
    festival. 'Go up' preserves the idiomatic pilgrimage sense without sounding overly
    formal.
- source_word: וְלֹא בָאָה
  chosen: and does not come
  alternatives:
  - and does not enter
  - and does not arrive
  lexicon: HALOT
  rationale: בוא is a common verb meaning 'come/enter.' Retaining both 'go up' and
    'come' reflects the Hebrew's two-verb formulation rather than collapsing them
    into one English idea.
- source_word: וְלֹא עֲלֵיהֶם תִּהְיֶה
  chosen: then the plague will not be upon them
  alternatives:
  - then there will be no plague on them
  - then it will not come upon them
  lexicon: HALOT
  rationale: The Hebrew wording is awkward and elliptical. Rendering it as 'the plague
    will not be upon them' preserves the syntax closely while making intelligible
    English. The phrase likely alludes to the preceding statement about lack of rain,
    but the explicit noun הַמַּגֵּפָה must be represented.
- source_word: הַמַּגֵּפָה
  chosen: the plague
  alternatives:
  - the affliction
  - the blow
  lexicon: HALOT
  rationale: מַגֵּפָה regularly denotes a plague or striking affliction. 'Plague'
    is the most natural and contextually fitting rendering here, especially with the
    following verb נָגַף ('strike').
- source_word: יִגֹּף
  chosen: strikes
  alternatives:
  - plagues
  - smites
  lexicon: HALOT
  rationale: נָגַף means to strike, smite, or afflict. 'Strikes' is readable modern
    English and preserves the causal relation to 'the plague.'
- source_word: הַגּוֹיִם
  chosen: the nations
  alternatives:
  - the Gentiles
  - the peoples
  lexicon: HALOT
  rationale: In this prophetic context גּוֹיִם refers to the nations generally, not
    specifically 'Gentiles' in a later Jewish-Christian contrast.
- source_word: לָחֹג
  chosen: to celebrate
  alternatives:
  - to keep the festival
  - to observe
  lexicon: HALOT
  rationale: The infinitive from חגג refers to keeping or celebrating a pilgrimage
    feast. 'Celebrate' is idiomatic and clear in modern English.
- source_word: חַג הַסֻּכּוֹת
  chosen: the Feast of Booths
  alternatives:
  - the Festival of Booths
  - the Feast of Tabernacles
  lexicon: HALOT
  rationale: סֻכּוֹת literally means 'booths.' 'Feast of Booths' preserves the Hebrew
    image more transparently than the traditional but less immediately clear 'Feast
    of Tabernacles.'
