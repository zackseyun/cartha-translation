theological_decisions:
- issue: Apparent tension with the previous verse, where Egypt is singled out as not
    receiving rain
  chosen_reading: Retain the MT wording about 'the plague' in the main text without
    harmonizing it away
  alternative_readings:
  - Interpret the clause as an elliptical reference to 'there will be no rain upon
    them'
  - Emend the text to remove the apparent difficulty
  rationale: The Masoretic Text explicitly reads 'the plague,' and the translation
    should not smooth over the tension by importing wording from v.17 or by conjectural
    emendation. The verse may mean that Egypt, which does not depend on rainfall in
    the same way, will instead experience the same plague inflicted on other nations.
    Preserving the textual tension best fits the translation philosophy.
  doctrine_reference: Translation philosophy §1, §3, §5
- issue: Rendering יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: Per doctrine guidelines, the covenant name יְהוָה is rendered 'the LORD.'
  doctrine_reference: 'Contested terms: יְהוָה YHWH'
