id: ZEC.14.11
reference: Zechariah 14:11
source:
  edition: WLC
  text: וְ/יָ֣שְׁבוּ בָ֔/הּ וְ/חֵ֖רֶם לֹ֣א יִֽהְיֶה ע֑וֹד וְ/יָשְׁבָ֥ה יְרוּשָׁלִַ֖ם
    לָ/בֶֽטַח־׃
translation:
  text: And people will dwell in it, and there will no longer be anything devoted
    to destruction, and Jerusalem will dwell securely.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'there will no longer be a curse'; Hebrew חֵרֶם can also refer to something
      placed under a ban or devoted to destruction.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיָשְׁבוּ בָהּ
  chosen: And people will dwell in it
  alternatives:
  - And they will dwell in it
  - And they will live in it
  lexicon: HALOT
  rationale: The verb ישׁב commonly means 'sit, dwell, live.' English idiom prefers
    an explicit subject; the Hebrew 3cp leaves it implicit. 'People' makes the sense
    natural without over-specifying who the inhabitants are. 'Dwell' preserves the
    settlement/residence nuance better than the flatter 'live.'
- source_word: חֵרֶם
  chosen: anything devoted to destruction
  alternatives:
  - the ban
  - curse
  - utter destruction
  lexicon: HALOT
  rationale: חֵרֶם can denote something banned, devoted, or placed under destruction.
    In this prophetic context, the sense is not merely an abstract 'curse' but the
    state of being consigned to destruction under divine ban. 'Anything devoted to
    destruction' communicates the concept in clear modern English while preserving
    the theological weight better than the opaque traditional 'the ban.'
- source_word: לֹא יִהְיֶה עוֹד
  chosen: there will no longer be
  alternatives:
  - there will be no more
  - it will not exist again
  lexicon: HALOT
  rationale: This idiom marks the cessation of a condition into the future. 'There
    will no longer be' is natural English and preserves the durative/future force.
- source_word: וְיָשְׁבָה יְרוּשָׁלִַם
  chosen: and Jerusalem will dwell
  alternatives:
  - and Jerusalem will live
  - and Jerusalem will be inhabited
  lexicon: HALOT
  rationale: The feminine singular verb agrees with the city as subject. 'Jerusalem
    will dwell' keeps the personified-city imagery present in the Hebrew. 'Will be
    inhabited' would shift the syntax and weaken the parallel with the earlier verb.
- source_word: לָבֶטַח
  chosen: securely
  alternatives:
  - in safety
  - safely
  lexicon: HALOT
  rationale: The noun בטח in this construction expresses security/safety. 'Securely'
    is concise and idiomatic in English, though 'in safety' is a viable more formal
    alternative.
