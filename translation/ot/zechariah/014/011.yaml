theological_decisions:
- issue: Meaning of חֵרֶם in an eschatological restoration context
  chosen_reading: Rendered as 'anything devoted to destruction' rather than 'curse'
  alternative_readings:
  - curse
  - the ban
  rationale: The verse promises the end of Jerusalem's vulnerability to being placed
    under divine destruction. 'Curse' is possible in some contexts, but here it risks
    importing a broader theological abstraction not explicit in the term. The chosen
    rendering preserves the covenant-judgment background without paraphrasing beyond
    the Hebrew.
  doctrine_reference: Translation philosophy §§1, 3, 5
