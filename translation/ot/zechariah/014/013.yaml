theological_decisions:
- issue: Nature of the divinely caused disorder
  chosen_reading: The panic is presented as coming from the LORD and resulting in internal conflict among the hostile group.
  alternative_readings:
  - The phrase could be read more generally as confusion associated with the LORD's intervention.
  rationale: The construct phrase מְהוּמַת יְהוָה most naturally means a panic sent by the LORD. The following mutual aggression confirms that the judgment takes the form of divinely induced internal chaos, without requiring further theological elaboration beyond the text.
  doctrine_reference: Affirmations; Translation philosophy §§1, 3
- issue: Rendering of masculine distributive language
  chosen_reading: each man
  alternative_readings:
  - each one
  - everyone
  rationale: The source uses אִישׁ distributively. Per the project's gender-accurate policy, the masculine form is retained where it reflects the source's wording and representative force.
  doctrine_reference: Translation philosophy §4
