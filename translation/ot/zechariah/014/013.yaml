id: ZEC.14.13
reference: Zechariah 14:13
source:
  edition: WLC
  text: וְ/הָיָה֙ בַּ/יּ֣וֹם הַ/ה֔וּא תִּֽהְיֶ֧ה מְהֽוּמַת יְהוָ֛ה רַבָּ֖ה בָּ/הֶ֑ם וְ/הֶחֱזִ֗יקוּ אִ֚ישׁ יַ֣ד רֵעֵ֔/הוּ וְ/עָלְתָ֥ה יָד֖/וֹ עַל יַ֥ד רֵעֵֽ/הוּ־־׃
translation:
  text: And on that day a great panic from Yahweh will be among them, and each man will seize the hand of his neighbor, and his hand will rise against the hand of his neighbor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'confusion' or 'tumult from the LORD.' The Hebrew term can denote a divinely sent state of chaotic terror.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'his hand will rise against the hand of his neighbor,' a vivid expression for turning violently against one another.
    reason: lexical_alternative
lexical_decisions:
- source_word: מְהוּמַת
  chosen: panic
  alternatives:
  - confusion
  - tumult
  - terror
  lexicon: HALOT
  rationale: The noun denotes a divinely caused state of disarray or panic. 'Panic' is natural modern English and fits the military-chaotic context better than the more abstract 'confusion.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving reverential convention and standard English Bible practice.
- source_word: רַבָּה
  chosen: great
  alternatives:
  - large
  - intense
  lexicon: HALOT
  rationale: Here the adjective intensifies the panic. 'Great' is idiomatic with 'panic' and preserves the Hebrew emphasis without overinterpreting.
- source_word: בָּהֶם
  chosen: among them
  alternatives:
  - in them
  - against them
  lexicon: HALOT
  rationale: The preposition ב can be rendered several ways, but 'among them' best fits the sense that the panic breaks out within their ranks, leading to mutual violence in the following clauses.
- source_word: וְהֶחֱזִיקוּ
  chosen: will seize
  alternatives:
  - will grasp
  - will take hold of
  lexicon: HALOT
  rationale: The Hiphil of חזק here conveys forceful grabbing. 'Seize' captures the hostile, urgent action better than the more neutral 'take hold of.'
- source_word: אִישׁ
  chosen: each man
  alternatives:
  - each one
  - everyone
  lexicon: HALOT
  rationale: The Hebrew is singular distributive and grammatically masculine. 'Each man' preserves the form and representative force in line with the project's gender-accurate policy.
- source_word: רֵעֵהוּ
  chosen: his neighbor
  alternatives:
  - his companion
  - his fellow
  lexicon: HALOT
  rationale: In this context the term refers to another member of the group rather than a covenantal 'friend.' 'Neighbor' is clear and idiomatic in English.
- source_word: וְעָלְתָה יָדוֹ עַל יַד רֵעֵהוּ
  chosen: his hand will rise against the hand of his neighbor
  alternatives:
  - his hand will be raised against his neighbor
  - his hand will turn against his neighbor
  lexicon: HALOT
  rationale: The Hebrew repeats 'hand' on both sides, likely to depict direct physical aggression. The translation preserves the concrete imagery rather than smoothing it into a more interpretive paraphrase.
