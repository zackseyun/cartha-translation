theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Nature of the judgment imagery
  chosen_reading: Retain the graphic bodily dissolution as stated, without softening or naturalizing it
  alternative_readings:
  - Interpret as metaphorical defeat
  - Interpret as a specifically disease-based plague
  rationale: The Hebrew presents a vivid judgment scene involving flesh, eyes, and tongue rotting away. The translation preserves the text's severity without deciding whether the mechanism is miraculous, military, or epidemiological beyond what the wording states.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: original-language primacy; preserve theological tension rather than resolve it'
