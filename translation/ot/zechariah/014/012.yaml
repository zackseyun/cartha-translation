id: ZEC.14.12
reference: Zechariah 14:12
source:
  edition: WLC
  text: וְ/זֹ֣את תִּֽהְיֶ֣ה הַ/מַּגֵּפָ֗ה אֲשֶׁ֨ר יִגֹּ֤ף יְהוָה֙ אֶת כָּל הָ֣/עַמִּ֔ים אֲשֶׁ֥ר צָבְא֖וּ עַל יְרוּשָׁלִָ֑ם הָמֵ֣ק בְּשָׂר֗/וֹ וְ/הוּא֙ עֹמֵ֣ד עַל רַגְלָ֔י/ו וְ/עֵינָי/ו֙ תִּמַּ֣קְנָה בְ/חֹֽרֵי/הֶ֔ן וּ/לְשׁוֹנ֖/וֹ תִּמַּ֥ק בְּ/פִי/הֶֽם׀־־־׀־׃
translation:
  text: 'And this will be the plague with which Yahweh will strike all the peoples that wage war against Jerusalem: while he is standing on his feet, his flesh will rot away, his eyes will rot away in their sockets, and his tongue will rot away in his mouth.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all the nations.' The Hebrew עַמִּים can denote peoples or nations depending on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַמַּגֵּפָה
  chosen: the plague
  alternatives:
  - the affliction
  - the blow
  - the pestilence
  lexicon: HALOT
  rationale: מַגֵּפָה commonly denotes a plague, blow, or striking affliction. 'Plague' is the most natural English rendering here and fits the context of divine judgment without narrowing the mechanism to disease alone.
- source_word: יִגֹּף
  chosen: will strike
  alternatives:
  - will plague
  - will smite
  lexicon: HALOT
  rationale: From נגף, 'to strike, smite, afflict.' 'Will strike' is clear modern English and preserves the active divine judgment. 'Smite' is too archaic; 'plague' would over-assimilate the verb to the noun.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: כָּל־הָעַמִּים
  chosen: all the peoples
  alternatives:
  - all the nations
  - all the peoples
  lexicon: HALOT
  rationale: עַמִּים is the plural of 'people' and often refers to peoples/nations. 'Peoples' preserves the plural distinction better than the more interpretive 'nations,' though the latter is a viable contextual alternative.
- source_word: צָבְאוּ עַל
  chosen: that wage war against
  alternatives:
  - that fought against
  - that assembled against
  lexicon: HALOT
  rationale: The verb צבא in this context refers to mustering or serving in warfare. 'Wage war against' captures the military sense more fully than the flatter 'fought against' and avoids reducing the action to mere gathering.
- source_word: הָמֵק
  chosen: will rot away
  alternatives:
  - will waste away
  - will decay
  lexicon: HALOT
  rationale: The infinitive absolute from מקק intensifies the following description of bodily dissolution. Rendering the repeated forms with 'rot away' preserves the vivid, horrifying force and lexical consistency across the verse.
- source_word: בְּשָׂרוֹ
  chosen: his flesh
  alternatives:
  - his body
  lexicon: HALOT
  rationale: '''Flesh'' is the direct lexical equivalent and keeps the concrete bodily imagery. ''Body'' would be smoother but less precise.'
- source_word: וְהוּא עֹמֵד עַל־רַגְלָיו
  chosen: while he is standing on his feet
  alternatives:
  - while he stands on his feet
  - as he stands on his feet
  lexicon: HALOT
  rationale: This clause depicts the plague overtaking a person while still upright. 'While he is standing on his feet' conveys the durative, shocking immediacy of the participial construction in idiomatic English.
- source_word: וְעֵינָיו תִּמַּקְנָה בְחֹרֵיהֶן
  chosen: his eyes will rot away in their sockets
  alternatives:
  - his eyes will waste away in their sockets
  - his eyes will rot in their holes
  lexicon: HALOT
  rationale: חֹרִים here refers to eye-sockets/cavities. 'Sockets' is the natural anatomical English term and preserves the gruesome concreteness.
- source_word: וּלְשׁוֹנוֹ תִּמַּק בְּפִיהֶם
  chosen: and his tongue will rot away in his mouth
  alternatives:
  - and his tongue will waste away in his mouth
  lexicon: HALOT
  rationale: The ketiv/qere-like mismatch in pronominal number is commonly understood distributively. In English, singular 'his mouth' matches the singular subject and communicates the sense clearly. 'Rot away' maintains consistency with the repeated verb.
