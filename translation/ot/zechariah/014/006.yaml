theological_decisions:
- issue: Interpretation of the notoriously difficult final clause יְקָרוֹת יקפאון
  chosen_reading: Render the clause in a relatively literal way as referring to splendid/bright
    heavenly entities that congeal.
  alternative_readings:
  - the lights will diminish
  - the glorious ones will be frozen
  - there will be neither cold nor frost (following ancient versions/traditional construals)
  rationale: The Hebrew is textually and lexically difficult, and major translations
    diverge sharply. In keeping with optimal equivalence and the instruction to preserve
    ambiguity rather than resolve it, the main text stays close to the Masoretic wording
    rather than adopting a smoother but more interpretive reconstruction. A footnote
    preserves the major alternative represented in ancient-version-based translations.
  doctrine_reference: Translation philosophy §1, §3, §5
