id: ZEC.14.20
reference: Zechariah 14:20
source:
  edition: WLC
  text: בַּ/יּ֣וֹם הַ/ה֗וּא יִֽהְיֶה֙ עַל מְצִלּ֣וֹת הַ/סּ֔וּס קֹ֖דֶשׁ לַֽ/יהוָ֑ה וְ/הָיָ֤ה הַ/סִּירוֹת֙ בְּ/בֵ֣ית יְהוָ֔ה כַּ/מִּזְרָקִ֖ים לִ/פְנֵ֥י הַ/מִּזְבֵּֽחַ־׃
translation:
  text: On that day, there will be on the bells of the horses, “Holy to Yahweh,” and the pots in the house of Yahweh will be like the bowls before the altar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “Holiness to the LORD.” The Hebrew phrase echoes the inscription on the high priest’s gold plate in Exodus 28:36.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew term may refer to small jingling metal pieces on horse gear; 'bells' is the most likely sense.
    reason: cultural_note
  - marker: c
    text: Or, “basins” for “bowls.” These were sacred vessels used in temple ritual.
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּיּוֹם הַהוּא
  chosen: On that day
  alternatives:
  - In that day
  lexicon: HALOT
  rationale: Standard temporal prophetic formula. 'On that day' is idiomatic modern English while preserving the eschatological/deictic force.
- source_word: יִהְיֶה
  chosen: there will be
  alternatives:
  - it will be
  lexicon: HALOT
  rationale: An existential rendering fits the clause naturally in English, since the inscription is what comes to be present on the horse-bells.
- source_word: עַל מְצִלּוֹת הַסּוּס
  chosen: on the bells of the horses
  alternatives:
  - on the bells of the horse
  - on the trappings of the horses
  lexicon: HALOT
  rationale: מְצִלּוֹת commonly refers to small metallic jingling objects, hence 'bells.' The singular הַסּוּס functions generically/collectively, best rendered 'horses' in English. 'Trappings' is broader and less precise than the likely sense.
- source_word: קֹדֶשׁ לַיהוָה
  chosen: “Holy to the LORD”
  alternatives:
  - Holiness to the LORD
  - Holy belonging to the LORD
  lexicon: HALOT
  rationale: This is a fixed cultic inscriptional phrase, echoing the wording on the high priest's plate (Exod 28:36). 'Holy to the LORD' is concise, natural, and preserves the dedicatory sense. The divine name follows the project's default as 'the LORD'.
- source_word: לַיהוָה / יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine table, YHWH is rendered 'the LORD' to reflect established reverential convention and LXX-influenced usage.
- source_word: וְהָיָה
  chosen: and ... will be
  alternatives:
  - and ... shall be
  - and ... will become
  lexicon: HALOT
  rationale: Simple future works well here, linking the second result clause to the first without archaic diction.
- source_word: הַסִּירוֹת
  chosen: the pots
  alternatives:
  - the cooking pots
  - the cauldrons
  lexicon: HALOT
  rationale: The term denotes vessels/pots used in temple-related cooking or boiling. 'Pots' is broad enough for modern readers; 'cooking pots' is possible but slightly more interpretive.
- source_word: בְּבֵית יְהוָה
  chosen: in the house of the LORD
  alternatives:
  - in the temple of the LORD
  lexicon: HALOT
  rationale: '''House of the LORD'' preserves the Hebrew idiom and temple connotation without over-paraphrase.'
- source_word: כַּמִּזְרָקִים
  chosen: like the bowls
  alternatives:
  - like the basins
  lexicon: HALOT
  rationale: מִזְרָקִים are sacrificial bowls/basins used in ritual handling of blood or offerings. 'Bowls' is accessible modern English; 'basins' is possible but less idiomatic here.
- source_word: לִפְנֵי הַמִּזְבֵּחַ
  chosen: before the altar
  alternatives:
  - in front of the altar
  lexicon: HALOT
  rationale: Standard cultic spatial expression. 'Before the altar' is both literal and idiomatic.
