theological_decisions:
- issue: Cultic holiness extending beyond priestly objects to common items
  chosen_reading: The verse portrays ordinary objects associated with daily life and temple service as bearing the same holiness designation and status as sacred temple vessels.
  alternative_readings:
  - A merely symbolic statement about general blessing without specific cultic leveling
  rationale: The explicit inscription 'Holy to the LORD' and comparison of pots to bowls before the altar indicate a collapse of former sacred/common distinctions in the envisioned future holiness. The translation preserves this without overexplaining it in the main text.
