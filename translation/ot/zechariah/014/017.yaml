id: ZEC.14.17
reference: Zechariah 14:17
source:
  edition: WLC
  text: וְ֠/הָיָה אֲשֶׁ֨ר לֹֽא יַעֲלֶ֜ה מֵ/אֵ֨ת מִשְׁפְּח֤וֹת הָ/אָ֨רֶץ֙ אֶל יְר֣וּשָׁלִַ֔ם
    לְ/הִֽשְׁתַּחֲוֺ֔ת לְ/מֶ֖לֶךְ יְהוָ֣ה צְבָא֑וֹת וְ/לֹ֥א עֲלֵי/הֶ֖ם יִהְיֶ֥ה הַ/גָּֽשֶׁם־־׃
translation:
  text: And if any of the families of the earth does not go up to Jerusalem to worship
    the King, the LORD of Armies, there will be no rain on them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to bow down.'
    reason: lexical_alternative
  - marker: b
    text: 'Traditional rendering: ''the LORD of Hosts.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה אֲשֶׁר
  chosen: And if any
  alternatives:
  - And it shall be that whoever
  - And it will happen that whoever
  lexicon: HALOT
  rationale: The Hebrew idiom וְהָיָה אֲשֶׁר introduces a conditional/result clause.
    In English, a smoother conditional rendering is preferable here. 'And if any'
    captures the sense without woodenly reproducing the idiom.
- source_word: לֹא יַעֲלֶה
  chosen: does not go up
  alternatives:
  - will not go up
  - does not come up
  lexicon: HALOT
  rationale: עלה with Jerusalem commonly carries the idiomatic sense 'go up' because
    of pilgrimage/topography. Present-form English in a future/conditional setting
    reads naturally with 'does not go up.'
- source_word: מֵאֵת מִשְׁפְּחוֹת הָאָרֶץ
  chosen: of the families of the earth
  alternatives:
  - from the families of the earth
  - of the clans of the earth
  - of the families of the land
  lexicon: HALOT
  rationale: מִשְׁפְּחוֹת is well rendered 'families' or 'clans'; 'families' is more
    standard and readable. הָאָרֶץ in this eschatological international context is
    best taken as 'the earth' rather than 'the land,' referring to the nations generally.
- source_word: אֶל יְרוּשָׁלַםִ
  chosen: to Jerusalem
  lexicon: HALOT
  rationale: Straightforward directional phrase with the proper name transliterated
    by standard English convention.
- source_word: לְהִשְׁתַּחֲוֺת
  chosen: to worship
  alternatives:
  - to bow down
  lexicon: HALOT
  rationale: The verb literally denotes prostration/bowing down, but in this cultic
    context 'worship' best conveys the intended act in natural English. The more literal
    alternative is worth preserving in a footnote.
- source_word: לְמֶלֶךְ
  chosen: the King
  alternatives:
  - the king
  lexicon: HALOT
  rationale: The referent is specifically YHWH in apposition with the following divine
    title, so capitalization signals titular force in English without adding meaning
    beyond the Hebrew.
- source_word: יְהוָה צְבָאוֹת
  chosen: the LORD of Armies
  alternatives:
  - the LORD of Hosts
  lexicon: HALOT
  rationale: Per doctrine, יְהוָה is rendered 'the LORD.' צְבָאוֹת is translated rather
    than left in traditional ecclesiastical form; 'Armies' is more transparent to
    modern readers while preserving the martial/cosmic sense. The traditional 'Hosts'
    is preserved in a footnote as a lexical alternative.
- source_word: וְלֹא עֲלֵיהֶם יִהְיֶה הַגָּשֶׁם
  chosen: there will be no rain on them
  alternatives:
  - upon them there will be no rain
  - they will have no rain
  lexicon: HALOT
  rationale: This clause states the covenantal judgment plainly. 'There will be no
    rain on them' preserves both the existential construction and the preposition
    עַל without becoming awkwardly literal.
