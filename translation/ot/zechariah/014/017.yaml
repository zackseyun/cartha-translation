theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering for
    YHWH, following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Scope of הָאָרֶץ
  chosen_reading: the earth
  alternative_readings:
  - the land
  rationale: In Zechariah 14 the context is the gathering and accountability of the
    nations, so 'earth' better preserves the universal scope of the prophecy and avoids
    narrowing the reference to the land of Israel alone.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1, #5'
