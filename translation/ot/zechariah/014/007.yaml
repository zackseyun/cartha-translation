theological_decisions:
- issue: Nature of the extraordinary day
  chosen_reading: Render the verse as describing a singular, extraordinary day without specifying an eschatological timetable or mechanism.
  alternative_readings:
  - A strictly literal astronomical phenomenon
  - A purely symbolic description of salvation
  - A specific millennial chronology
  rationale: The Hebrew clearly presents an exceptional day known to the LORD and marked by paradoxical light at evening, but it does not itself define the precise prophetic scheme. The translation preserves the tension and imagery without importing a denominational eschatology.
  doctrine_reference: Preserve theological tension rather than resolve it.
