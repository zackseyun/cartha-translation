id: ZEC.14.7
reference: Zechariah 14:7
source:
  edition: WLC
  text: וְ/הָיָ֣ה יוֹם אֶחָ֗ד ה֛וּא יִוָּדַ֥ע לַֽ/יהוָ֖ה לֹא י֣וֹם וְ/לֹא לָ֑יְלָה וְ/הָיָ֥ה לְ/עֵֽת עֶ֖רֶב יִֽהְיֶה אֽוֹר־־־־־׃
translation:
  text: And it will be one day, known to Yahweh, neither day nor night; but at evening time there will be light.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or: ''one day.'' The Hebrew literally reads ''one day,'' which may emphasize either singularity or uniqueness in context.'
    reason: lexical_alternative
  - marker: b
    text: 'Or: ''neither day nor night.'''
    reason: lexical_alternative
  - marker: c
    text: 'Hebrew: ''known to the LORD.'''
    reason: cultural_note
lexical_decisions:
- source_word: וְהָיָה
  chosen: And it will be
  alternatives:
  - And it shall be
  - And it will happen
  lexicon: HALOT
  rationale: The waw + qatal introduces a future event in prophetic discourse. 'And it will be' preserves the Hebrew structure while remaining natural English.
- source_word: יוֹם אֶחָד
  chosen: one unique day
  alternatives:
  - one day
  - a single day
  lexicon: HALOT
  rationale: Literally 'one day.' In context the phrase points to a singular, extraordinary day rather than merely an unspecified day. 'Unique' brings out the marked, exceptional sense without over-interpreting.
- source_word: הוּא
  chosen: it
  alternatives:
  - that day
  - he
  lexicon: HALOT
  rationale: The pronoun resumes 'day' and is best rendered idiomatically in English as 'it' rather than left explicit. 'That day' would be interpretive expansion beyond the immediate wording.
- source_word: יִוָּדַע לַיהוָה
  chosen: known to the LORD
  alternatives:
  - known by the LORD
  - known to Yahweh
  lexicon: HALOT
  rationale: The Niphal of ידע here denotes being known, with ל marking relation. 'Known to the LORD' is the most natural English rendering. Per doctrine, יהוה is rendered 'the LORD,' not 'Yahweh,' in the main text.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: This follows the project's stated default for the divine name, preserving reverential convention and broad English Bible recognizability.
- source_word: לֹא יוֹם וְלֹא לָיְלָה
  chosen: not day and not night
  alternatives:
  - neither day nor night
  - not a day and not a night
  lexicon: HALOT
  rationale: The Hebrew negates both categories starkly. 'Not day and not night' preserves the unusual, paradoxical force more closely than the smoother 'neither day nor night,' though the latter is a viable English alternative.
- source_word: לְעֵת עֶרֶב
  chosen: at evening time
  alternatives:
  - at evening
  - toward evening
  lexicon: HALOT
  rationale: The phrase denotes the time of evening. 'At evening time' is clear, natural, and slightly fuller than a bare 'at evening' while staying close to the source.
- source_word: יִהְיֶה אוֹר
  chosen: there will be light
  alternatives:
  - it will be light
  - light will come
  lexicon: HALOT
  rationale: Hebrew existential/predicative wording is best rendered idiomatically as 'there will be light.' This preserves the surprising reversal at evening without adding imagery not in the text.
