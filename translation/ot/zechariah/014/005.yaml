id: ZEC.14.5
reference: Zechariah 14:5
source:
  edition: WLC
  text: וְ/נַסְתֶּ֣ם גֵּֽיא הָרַ֗/י כִּֽי יַגִּ֣יעַ גֵּי הָרִים֮ אֶל אָצַל֒ וְ/נַסְתֶּ֗ם
    כַּ/אֲשֶׁ֤ר נַסְתֶּם֙ מִ/פְּנֵ֣י הָ/רַ֔עַשׁ בִּ/ימֵ֖י עֻזִּיָּ֣ה מֶֽלֶךְ יְהוּדָ֑ה
    וּ/בָא֙ יְהוָ֣ה אֱלֹהַ֔/י כָּל קְדֹשִׁ֖ים עִמָּֽ/ךְ־־־־־־׃
translation:
  text: And you will flee by the valley of my mountains, for the valley of the mountains
    will reach to Azal. Yes, you will flee as you fled from before the earthquake
    in the days of Uzziah king of Judah. Then the LORD my God will come, and all the
    holy ones with him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, following another reading, 'with you.'
    reason: textual_variant
  - marker: b
    text: '''Holy ones'' may refer to heavenly attendants; some understand it as ''saints''
      or ''angels.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנַסְתֶּם
  chosen: you will flee
  alternatives:
  - you will escape
  - you will be stopped up
  lexicon: HALOT
  rationale: The verb from נוּס normally means 'flee' and fits the following comparison
    to fleeing from the earthquake. Although the consonants could suggest a different
    sense in some discussions, the immediate repetition with כַּאֲשֶׁר נַסְתֶּם strongly
    supports 'flee' here.
- source_word: גֵּיא / גֵּי
  chosen: valley
  alternatives:
  - ravine
  lexicon: HALOT
  rationale: A standard rendering for גיא. 'Valley' is natural English and suits the
    topographical context.
- source_word: הָרַי
  chosen: my mountains
  alternatives:
  - the mountains
  lexicon: HALOT
  rationale: The 1cs suffix is explicit in the Hebrew, so 'my mountains' should be
    preserved rather than flattened to 'the mountains'.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: 'Introduces the reason for the flight: the valley reaches to Azal.'
- source_word: יַגִּיעַ
  chosen: will reach
  alternatives:
  - will extend
  - will touch
  lexicon: HALOT
  rationale: 'The Hiphil of נגע here is best rendered as spatial extension: the valley
    reaches as far as Azal.'
- source_word: אָצַל
  chosen: Azal
  lexicon: HALOT
  rationale: A place name, so it is transliterated per project policy.
- source_word: כַאֲשֶׁר נַסְתֶּם
  chosen: as you fled
  alternatives:
  - just as you fled
  lexicon: HALOT
  rationale: The comparison is explicit and echoes the earlier verb, reinforcing the
    sense of literal flight.
- source_word: מִפְּנֵי הָרַעַשׁ
  chosen: from before the earthquake
  alternatives:
  - from the earthquake
  - before the earthquake
  lexicon: HALOT
  rationale: מִפְּנֵי literally means 'from before/from the presence of.' 'From before
    the earthquake' preserves the Hebrew idiom while remaining understandable.
- source_word: וּבָא
  chosen: Then ... will come
  alternatives:
  - and ... will come
  lexicon: HALOT
  rationale: The conjunction is sequential in context, moving from the people's flight
    to the LORD's arrival. 'Then' brings out the narrative progression without over-paraphrasing.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  lexicon: HALOT
  rationale: Per doctrine table, the default rendering of YHWH is 'the LORD.'
- source_word: אֱלֹהַי
  chosen: my God
  lexicon: HALOT
  rationale: 'The 1cs suffix should be retained: the speaker says ''my God,'' not
    simply ''God.'''
- source_word: כָּל קְדֹשִׁים
  chosen: all the holy ones
  alternatives:
  - all the saints
  - all the holy angels
  lexicon: HALOT
  rationale: קדשים can denote holy ones broadly, including heavenly attendants, without
    specifying angels in the Hebrew itself. 'Holy ones' preserves the ambiguity better
    than 'angels' while remaining idiomatic.
- source_word: עִמָּךְ
  chosen: with him
  alternatives:
  - with you
  lexicon: HALOT
  rationale: The ketiv/qere and ancient-version evidence create a well-known variation
    here. In context, 'with him' coheres with 'the LORD my God will come' and is widely
    reflected in translations; the alternative 'with you' should be preserved in a
    footnote as a textual/reading variant.
