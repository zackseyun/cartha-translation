theological_decisions:
- issue: Identity of 'the holy ones' accompanying the LORD
  chosen_reading: all the holy ones
  alternative_readings:
  - all the saints
  - all the holy angels
  rationale: The Hebrew does not explicitly identify these as angels or redeemed humans.
    To preserve theological tension rather than resolve it, the main text keeps the
    broader 'holy ones.'
  doctrine_reference: Translation philosophy §3 Preserve theological tension rather
    than resolve it.
- issue: Rendering of the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine table specifies 'the LORD' as the default rendering for
    YHWH.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD.'
