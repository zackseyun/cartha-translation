theological_decisions:
- issue: Nature of the judgment on animals in the enemy camps
  chosen_reading: Render as a literal plague/judgment extending to animals associated
    with the hostile camps
  alternative_readings:
  - Render more generally as 'affliction' without specifying plague
  rationale: The repeated use of מַגֵּפָה in the immediate context supports a concrete
    plague-like divine judgment. The verse extends that same judgment to the animals
    in the camps; the translation should preserve that severity without softening
    it.
