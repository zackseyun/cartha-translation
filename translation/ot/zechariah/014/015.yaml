id: ZEC.14.15
reference: Zechariah 14:15
source:
  edition: WLC
  text: וְ/כֵ֨ן תִּֽהְיֶ֜ה מַגֵּפַ֣ת הַ/סּ֗וּס הַ/פֶּ֨רֶד֙ הַ/גָּמָ֣ל וְ/הַ/חֲמ֔וֹר
    וְ/כָ֨ל הַ/בְּהֵמָ֔ה אֲשֶׁ֥ר יִהְיֶ֖ה בַּ/מַּחֲנ֣וֹת הָ/הֵ֑מָּה כַּ/מַּגֵּפָ֖ה
    הַ/זֹּֽאת־׃
translation:
  text: And so the plague will be on the horse, the mule, the camel, the donkey, and
    every animal that is in those camps—the same plague as this.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'like this plague.' The Hebrew compares the animals' judgment to the
      plague just described.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכֵן
  chosen: And so
  alternatives:
  - And likewise
  - So also
  lexicon: HALOT
  rationale: Introduces correspondence with the preceding judgment. 'And so' is natural
    English and preserves the connective force better than a bare 'so' while avoiding
    overly formal 'likewise.'
- source_word: תִּהְיֶה
  chosen: will be
  alternatives:
  - shall be
  - will come
  lexicon: HALOT
  rationale: Simple future of היה. 'Will be' preserves the stative/copular sense;
    'will come' would over-interpret the verb.
- source_word: מַגֵּפַת
  chosen: the plague
  alternatives:
  - the affliction
  - the blow
  lexicon: HALOT
  rationale: מגפה commonly denotes a plague/striking judgment. 'Plague' matches the
    immediate context in Zechariah 14 and is the most transparent rendering.
- source_word: הַסּוּס
  chosen: the horse
  lexicon: HALOT
  rationale: Straightforward animal term; singular used collectively in the list,
    retained in English.
- source_word: הַפֶּרֶד
  chosen: the mule
  alternatives:
  - the mule-horse
  lexicon: HALOT
  rationale: Standard rendering for פֶּרֶד. 'Mule' is clear modern English.
- source_word: הַגָּמָל
  chosen: the camel
  lexicon: HALOT
  rationale: Standard lexical equivalent.
- source_word: וְהַחֲמוֹר
  chosen: the donkey
  alternatives:
  - the ass
  lexicon: HALOT
  rationale: '''Donkey'' is the readable modern English equivalent; ''ass'' is archaic/liable
    to misunderstanding.'
- source_word: וְכָל הַבְּהֵמָה
  chosen: and every animal
  alternatives:
  - and all the livestock
  - and every beast
  lexicon: HALOT
  rationale: בְּהֵמָה can mean beast/animal/livestock. Here it broadens the list to
    all animals in the camps. 'Every animal' is broad and natural; 'livestock' may
    be too narrow, and 'beast' sounds archaic.
- source_word: אֲשֶׁר יִהְיֶה בַּמַּחֲנוֹת הָהֵמָּה
  chosen: that is in those camps
  alternatives:
  - that will be in those camps
  - that is in those armies
  lexicon: HALOT
  rationale: The relative clause identifies the animals located in the enemy encampments.
    'Camps' is the plain sense of מַחֲנוֹת; 'armies' would be interpretive. English
    present 'is' works idiomatically in a future frame introduced by 'will be.'
- source_word: כַּמַּגֵּפָה הַזֹּאת
  chosen: the same plague as this
  alternatives:
  - like this plague
  - according to this plague
  lexicon: HALOT
  rationale: 'כְּ marks comparison: the plague on the animals corresponds to the plague
    just described on the people. ''The same plague as this'' makes the comparison
    explicit in idiomatic English.'
