id: ZEC.14.9
reference: Zechariah 14:9
source:
  edition: WLC
  text: וְ/הָיָ֧ה יְהוָ֛ה לְ/מֶ֖לֶךְ עַל כָּל הָ/אָ֑רֶץ בַּ/יּ֣וֹם הַ/ה֗וּא יִהְיֶ֧ה יְהוָ֛ה אֶחָ֖ד וּ/שְׁמ֥/וֹ אֶחָֽד־־׃
translation:
  text: And Yahweh will be king over all the earth. On that day Yahweh will be one, and his name one.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the LORD will be alone'; the Hebrew says 'one,' which can express exclusivity or uniqueness as well as oneness.
    reason: lexical_alternative
  - marker: b
    text: Or 'and his name alone' or 'and his name unique.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  chosen: And ... will be
  alternatives:
  - And ... shall be
  - Then ... will become
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in prophetic discourse commonly carries future force. 'Will be' is natural modern English and preserves the predictive sense without archaic 'shall.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: לְמֶלֶךְ
  chosen: king
  alternatives:
  - as king
  lexicon: HALOT
  rationale: 'The lamed with ''king'' expresses resultant status/function: YHWH will be king. English idiom prefers ''will be king'' over the more wooden ''will be for king'' or ''will become as king.'''
- source_word: עַל כָּל הָאָרֶץ
  chosen: over all the earth
  alternatives:
  - over the whole earth
  - over all the land
  lexicon: HALOT
  rationale: '''Over'' best conveys royal dominion with עַל in this context. הָאָרֶץ here is global in scope within the eschatological context of the verse, so ''earth'' is preferable to ''land.'''
- source_word: בַּיּוֹם הַהוּא
  chosen: On that day
  alternatives:
  - In that day
  lexicon: HALOT
  rationale: Standard prophetic temporal formula. 'On that day' is idiomatic contemporary English while preserving the eschatological marker.
- source_word: יִהְיֶה יְהוָה אֶחָד
  chosen: the LORD will be one
  alternatives:
  - the LORD will be alone
  - the LORD will be unique
  lexicon: HALOT
  rationale: אֶחָד most directly means 'one.' In context it likely expresses the exclusive, undivided acknowledgment of YHWH, but the translation should preserve the text's compact theological wording rather than expand it interpretively to 'alone' or 'unique' in the main text.
- source_word: וּשְׁמוֹ אֶחָד
  chosen: and his name one
  alternatives:
  - and his name alone
  - and his name unique
  lexicon: HALOT
  rationale: A formally close rendering preserves the parallelism with the previous clause. 'His name one' may sound slightly compressed in English, but it reflects the Hebrew's terse theological formulation and avoids over-interpreting whether the emphasis is exclusivity, unity, or uniqueness.
