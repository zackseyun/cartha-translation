theological_decisions:
- issue: Rendering the divine name
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Meaning of 'the LORD will be one'
  chosen_reading: Preserve the wording 'one' in the main text
  alternative_readings:
  - the LORD will be alone
  - the LORD will be unique
  rationale: The verse has theological significance for divine uniqueness and universal acknowledgment, but the Hebrew wording itself is concise and should not be doctrinally over-resolved. Rendering אֶחָד as 'one' preserves the text's tension and allows readers to hear both unity and exclusivity themes without importing a narrower interpretation.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it'
