theological_decisions:
- issue: Whether בִּירוּשָׁלִָם implies Judah fights in/at Jerusalem or against Jerusalem
  chosen_reading: Judah also will fight at Jerusalem
  alternative_readings:
  - Judah also will fight against Jerusalem
  rationale: The Hebrew preposition is most naturally locative ('in/at'). Because
    the wider context has prompted some interpreters to understand Judah as fighting
    against Jerusalem, that alternative is preserved in a footnote rather than resolved
    dogmatically in the main text. This follows the project's principle of preserving
    tension where the text can be read more than one way.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
