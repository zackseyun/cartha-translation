id: ZEC.14.14
reference: Zechariah 14:14
source:
  edition: WLC
  text: וְ/גַ֨ם יְהוּדָ֔ה תִּלָּחֵ֖ם בִּ/ירֽוּשָׁלִָ֑ם וְ/אֻסַּף֩ חֵ֨יל כָּל הַ/גּוֹיִ֜ם
    סָבִ֗יב זָהָ֥ב וָ/כֶ֛סֶף וּ/בְגָדִ֖ים לָ/רֹ֥ב מְאֹֽד־־׃
translation:
  text: 'And Judah also will fight at Jerusalem, and the wealth of all the surrounding
    nations will be gathered: gold and silver and garments, in very great abundance.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Judah also will fight against Jerusalem.' The Hebrew preposition normally
      means 'in/at,' but some take the phrase in light of the surrounding context
      as indicating opposition.
    reason: alternative_reading
lexical_decisions:
- source_word: וְגַם
  chosen: And ... also
  alternatives:
  - And indeed
  - And even
  lexicon: HALOT
  rationale: The conjunction plus additive particle marks continuation with emphasis.
    'And ... also' preserves the additive force naturally in English.
- source_word: יְהוּדָה
  chosen: Judah
  lexicon: HALOT
  rationale: Proper name for the people/territory of Judah; transliterated as a name
    per project philosophy.
- source_word: תִּלָּחֵם
  chosen: will fight
  alternatives:
  - will wage war
  - will battle
  lexicon: HALOT
  rationale: Nifal of לחם here denotes engaging in battle. 'Will fight' is the clearest
    modern English rendering without over-specifying the manner of combat.
- source_word: בִּירוּשָׁלִָם
  chosen: at Jerusalem
  alternatives:
  - in Jerusalem
  - against Jerusalem
  lexicon: HALOT
  rationale: The preposition ב normally means 'in/at.' In this context, because the
    clause can be read either as location ('fight at/in Jerusalem') or opposition
    ('fight against Jerusalem' by contextual inference), the main text keeps the straightforward
    locative sense, while the alternative is preserved in a footnote due to the broader
    context of the chapter.
- source_word: וְאֻסַּף
  chosen: will be gathered
  alternatives:
  - will be collected
  - will be assembled
  lexicon: HALOT
  rationale: Passive perfect with vav in prophetic sequence functions futurally in
    English. 'Will be gathered' fits both the passive form and the context of spoils
    being collected.
- source_word: חֵיל
  chosen: the wealth
  alternatives:
  - the spoil
  - the resources
  - the army
  lexicon: HALOT
  rationale: Although חֵיל can denote strength, army, or wealth, the following list
    of gold, silver, and garments shows material possessions are intended. 'Wealth'
    best captures the sense here in readable English.
- source_word: כָּל הַגּוֹיִם סָבִיב
  chosen: of all the surrounding nations
  alternatives:
  - of all the nations around
  - of all the nations round about
  lexicon: HALOT
  rationale: This phrase identifies the nations in the vicinity. 'Surrounding nations'
    is natural modern English and preserves the spatial sense of סָבִיב.
- source_word: זָהָב וָכֶסֶף וּבְגָדִים
  chosen: gold and silver and garments
  alternatives:
  - gold, silver, and clothing
  lexicon: HALOT
  rationale: A straightforward inventory of valuables. 'Garments' is slightly more
    formal than 'clothing' and suits the list of plundered goods.
- source_word: לָרֹב מְאֹד
  chosen: in very great abundance
  alternatives:
  - in great abundance
  - exceedingly much
  lexicon: HALOT
  rationale: The phrase intensifies quantity. 'In very great abundance' preserves
    both the noun of abundance and the adverbial intensifier מְאֹד.
