id: ZEC.14.8
reference: Zechariah 14:8
source:
  edition: WLC
  text: וְ/הָיָ֣ה בַּ/יּ֣וֹם הַ/ה֗וּא יֵצְא֤וּ מַֽיִם חַיִּים֙ מִ/יר֣וּשָׁלִַ֔ם חֶצְיָ֗/ם
    אֶל הַ/יָּם֙ הַ/קַּדְמוֹנִ֔י וְ/חֶצְיָ֖/ם אֶל הַ/יָּ֣ם הָ/אַחֲר֑וֹן בַּ/קַּ֥יִץ
    וּ/בָ/חֹ֖רֶף יִֽהְיֶֽה׀־־־׃
translation:
  text: And on that day living waters will flow out from Jerusalem, half of them to
    the eastern sea and half of them to the western sea; it will be so in summer as
    well as in winter.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'fresh/flowing water'; Hebrew 'living waters,' a common expression for
      running or life-giving water.
    reason: lexical_alternative
  - marker: b
    text: That is, the sea to the east of Jerusalem, traditionally identified as the
      Dead Sea.
    reason: cultural_note
  - marker: c
    text: That is, the sea to the west of Jerusalem, traditionally identified as the
      Mediterranean Sea.
    reason: cultural_note
lexical_decisions:
- source_word: וְהָיָה
  chosen: And ... will be
  alternatives:
  - And it will happen
  - And it shall be
  lexicon: HALOT
  rationale: Introduces a future event formula common in prophetic discourse. In English,
    the idiom is best carried by a smooth future construction rather than a wooden
    'and it shall be.'
- source_word: בַּיּוֹם הַהוּא
  chosen: on that day
  alternatives:
  - in that day
  lexicon: HALOT
  rationale: Standard prophetic temporal formula. 'On that day' is idiomatic modern
    English and preserves the eschatological force.
- source_word: יֵצְאוּ
  chosen: will flow out
  alternatives:
  - will go out
  - will come out
  lexicon: HALOT
  rationale: The verb literally means 'go out/come out,' but with waters as subject
    English naturally says 'flow out.' This is an optimal-equivalence choice reflecting
    the subject matter without adding content.
- source_word: מַיִם חַיִּים
  chosen: living waters
  alternatives:
  - living water
  - fresh water
  - flowing water
  lexicon: HALOT
  rationale: The Hebrew plural is retained as 'waters.' 'Living waters' preserves
    the biblical idiom, which can denote fresh/flowing water and may also carry theological
    resonance; a more interpretive gloss like 'fresh water' would flatten that resonance.
- source_word: מִירוּשָׁלַם
  chosen: from Jerusalem
  lexicon: HALOT
  rationale: Straightforward source-oriented rendering of origin.
- source_word: חֶצְיָם
  chosen: half of them
  alternatives:
  - half
  - one half of them
  lexicon: HALOT
  rationale: The pronominal suffix refers back to the waters. 'Half of them' makes
    the referent explicit and reads naturally in English.
- source_word: הַיָּם הַקַּדְמוֹנִי
  chosen: the eastern sea
  alternatives:
  - the former sea
  - the front sea
  - the sea to the east
  lexicon: HALOT
  rationale: קַדְמוֹנִי is literally 'eastern' or 'front/oriental.' In the geography
    of the land, this points to the sea east of Jerusalem, traditionally the Dead
    Sea. 'Eastern sea' preserves the Hebrew directional expression without over-specifying
    the modern identification in the main text.
- source_word: הַיָּם הָאַחֲרוֹן
  chosen: the western sea
  alternatives:
  - the hinder sea
  - the latter sea
  - the sea to the west
  lexicon: HALOT
  rationale: אַחֲרוֹן here is the opposite of the eastern/front sea and denotes the
    sea to the west, traditionally the Mediterranean. 'Western sea' communicates the
    sense clearly in modern English.
- source_word: בַּקַּיִץ וּבָחֹרֶף
  chosen: in summer as well as in winter
  alternatives:
  - in summer and in winter
  - through summer and winter
  lexicon: HALOT
  rationale: The phrase emphasizes year-round continuity, not merely two seasons listed.
    'In summer as well as in winter' brings out the contrast and continuity naturally.
- source_word: יִהְיֶה
  chosen: it will be so
  alternatives:
  - it will be
  - they will be
  lexicon: HALOT
  rationale: The singular verb after the seasonal phrase is somewhat terse. 'It will
    be so' supplies the implied continuation/existence of the flow in idiomatic English
    without changing the sense. 'They will be' would force a plural not present in
    the Hebrew.
