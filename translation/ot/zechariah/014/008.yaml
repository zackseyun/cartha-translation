theological_decisions:
- issue: Potential symbolic resonance of 'living waters'
  chosen_reading: Retain the literal phrase 'living waters' in the main text without
    interpreting it as purely symbolic or purely hydrological.
  alternative_readings:
  - fresh/flowing water as a purely physical description
  - spiritually symbolic life-giving water
  rationale: The Hebrew expression naturally denotes fresh or flowing water, yet in
    prophetic context it may also carry theological resonance. The translation preserves
    that tension rather than resolving it into either a mundane or a fully allegorized
    reading.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
