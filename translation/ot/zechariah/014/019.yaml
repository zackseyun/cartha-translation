id: ZEC.14.19
reference: Zechariah 14:19
source:
  edition: WLC
  text: זֹ֥את תִּהְיֶ֖ה חַטַּ֣את מִצְרָ֑יִם וְ/חַטַּאת֙ כָּל הַ/גּוֹיִ֔ם אֲשֶׁר֙ לֹ֣א
    יַֽעֲל֔וּ לָ/חֹ֖ג אֶת חַ֥ג הַ/סֻּכּֽוֹת־־׃
translation:
  text: This will be the punishment of Egypt, and the punishment of all the nations
    that do not go up to celebrate the Festival of Booths.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'penalty'; the Hebrew word can also mean 'sin' in other contexts, but
      here it refers to the judgment incurred by refusing to go up for the feast.
    reason: lexical_alternative
  - marker: b
    text: Traditionally 'the Feast of Tabernacles.'
    reason: lexical_alternative
lexical_decisions:
- source_word: זֹאת
  chosen: This
  alternatives:
  - This is what
  lexicon: HALOT
  rationale: Demonstrative feminine singular referring back to the just-described
    consequence; simple deictic 'This' fits the Hebrew and English flow.
- source_word: תִּהְיֶה
  chosen: will be
  alternatives:
  - shall be
  lexicon: HALOT
  rationale: Qal imperfect of היה expresses future/resultative sense in context; 'will
    be' is natural modern English.
- source_word: חַטַּאת
  chosen: punishment
  alternatives:
  - sin
  - sin offering
  - penalty
  lexicon: HALOT
  rationale: Although חטאת often means 'sin' or 'sin offering,' in this context it
    denotes the consequence/judgment incurred by refusing to come up for the feast.
    'Punishment' best matches the immediate context of plague/judgment in vv. 18–19
    and avoids the misleading sense that Egypt itself is merely being identified with
    'sin'.
- source_word: מִצְרָיִם
  chosen: Egypt
  lexicon: HALOT
  rationale: Standard rendering of the place/nation name.
- source_word: וְחַטַּאת
  chosen: and the punishment
  alternatives:
  - and the penalty
  - and the sin
  lexicon: HALOT
  rationale: Repeated noun carried over with conjunction; rendered consistently with
    the first חטאת in this verse.
- source_word: כָּל הַגּוֹיִם
  chosen: of all the nations
  alternatives:
  - of all the Gentiles
  lexicon: HALOT
  rationale: גּוֹיִם here refers broadly to the non-Israelite nations in an eschatological
    setting; 'nations' is the most natural and least misleading English rendering.
- source_word: אֲשֶׁר לֹא יַעֲלוּ
  chosen: that do not go up
  alternatives:
  - which will not go up
  - that do not come up
  lexicon: HALOT
  rationale: Relative clause describing the nations characterized by refusal to ascend
    to Jerusalem. 'Go up' preserves the pilgrimage idiom.
- source_word: לָחֹג
  chosen: to celebrate
  alternatives:
  - to keep the feast
  - to observe as a festival
  lexicon: HALOT
  rationale: Infinitive from חגג means to celebrate/keep a pilgrimage feast. 'Celebrate'
    is readable modern English while preserving the festal sense.
- source_word: אֶת חַג הַסֻּכּוֹת
  chosen: the Festival of Booths
  alternatives:
  - the Feast of Booths
  - the Festival of Tabernacles
  lexicon: HALOT
  rationale: חַג הַסֻּכּוֹת is the pilgrimage feast traditionally called Booths/Tabernacles.
    'Festival of Booths' is transparent modern English; 'Tabernacles' is traditional
    but less immediately clear.
