theological_decisions:
- issue: Sense of חטאת in an eschatological judgment context
  chosen_reading: punishment
  alternative_readings:
  - sin
  - penalty
  rationale: The verse summarizes the judicial consequence for Egypt and the nations
    that refuse to worship the LORD at the Feast of Booths. Rendering חטאת as 'punishment'
    preserves the contextual sense of incurred judgment without importing sacrificial
    overtones.
  doctrine_reference: Translation philosophy §1, §5
- issue: Rendering of חג הסכות
  chosen_reading: Festival of Booths
  alternative_readings:
  - Feast of Booths
  - Festival of Tabernacles
  rationale: A translated title is preferred for clarity and accessibility. 'Booths'
    preserves the Hebrew imagery more transparently than the traditional 'Tabernacles.'
  doctrine_reference: Translation philosophy §6
