id: ZEC.14.16
reference: Zechariah 14:16
source:
  edition: WLC
  text: וְ/הָיָ֗ה כָּל הַ/נּוֹתָר֙ מִ/כָּל הַ/גּוֹיִ֔ם הַ/בָּאִ֖ים עַל יְרֽוּשָׁלִָ֑ם
    וְ/עָל֞וּ מִ/דֵּ֧י שָׁנָ֣ה בְ/שָׁנָ֗ה לְ/הִֽשְׁתַּחֲוֺת֙ לְ/מֶ֨לֶךְ֙ יְהוָ֣ה צְבָא֔וֹת
    וְ/לָ/חֹ֖ג אֶת חַ֥ג הַ/סֻּכּֽוֹת־־־־׃
translation:
  text: Then all who remain from all the nations that came against Jerusalem shall
    go up year after year to worship the King, the LORD of Armies, and to celebrate
    the Feast of Booths.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or traditionally, 'the LORD of hosts.'
    reason: lexical_alternative
  - marker: b
    text: Or traditionally, 'the Feast of Tabernacles.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  chosen: Then ... shall
  alternatives:
  - And it shall be
  - And it will happen
  lexicon: HALOT
  rationale: Introduces a future-result clause in prophetic sequence. 'Then' captures
    the discourse progression more naturally in English than a wooden 'and it shall
    be,' while preserving futurity with 'shall.'
- source_word: כָּל הַנּוֹתָר
  chosen: all who remain
  alternatives:
  - everyone left
  - all the survivors
  lexicon: HALOT
  rationale: The participial form denotes those left over or surviving. 'All who remain'
    is natural English and preserves the open class of persons rather than reducing
    it to a mere abstract remnant.
- source_word: מִכָּל הַגּוֹיִם
  chosen: from all the nations
  alternatives:
  - out of all the nations
  - from among all the nations
  lexicon: HALOT
  rationale: גּוֹיִם here refers to the Gentile nations in the international sense.
    'From all the nations' is straightforward and idiomatic.
- source_word: הַבָּאִים עַל יְרוּשָׁלִָם
  chosen: that came against Jerusalem
  alternatives:
  - that were coming against Jerusalem
  - that attacked Jerusalem
  lexicon: HALOT
  rationale: The participle with עַל in this military context indicates hostile advance.
    'Came against' preserves the Hebrew idiom and avoids over-interpreting the exact
    stage of the assault.
- source_word: וְעָלוּ
  chosen: shall go up
  alternatives:
  - will go up
  - shall ascend
  lexicon: HALOT
  rationale: עלה is the standard verb for going up to Jerusalem, with both topographical
    and pilgrimage resonance. 'Go up' preserves that biblical idiom better than the
    more abstract 'ascend.'
- source_word: מִדֵּי שָׁנָה בְשָׁנָה
  chosen: year after year
  alternatives:
  - from year to year
  - every year
  lexicon: HALOT
  rationale: This distributive expression denotes regular annual recurrence. 'Year
    after year' is idiomatic and preserves the repeated, ongoing sense.
- source_word: לְהִשְׁתַּחֲוֺת
  chosen: to worship
  alternatives:
  - to bow down
  - to prostrate themselves
  lexicon: HALOT
  rationale: The verb literally involves bowing down, but in this cultic context the
    act signifies worship. 'To worship' communicates the intended religious sense
    in clear modern English.
- source_word: לְמֶלֶךְ
  chosen: the King
  alternatives:
  - to the King
  lexicon: HALOT
  rationale: The preposition is governed by the infinitive 'to worship'; in English
    apposition after 'worship' is best rendered 'the King.' The title is retained
    because it is theologically significant in context.
- source_word: יְהוָה צְבָאוֹת
  chosen: the LORD of Armies
  alternatives:
  - the LORD of hosts
  - Yahweh of Armies
  lexicon: HALOT
  rationale: Per doctrine, יְהוָה is rendered 'the LORD.' צְבָאוֹת is translated rather
    than left in traditional form 'hosts' for readability and transparency; 'Armies'
    conveys the martial and heavenly-host sense of the title.
- source_word: וְלָחֹג
  chosen: and to celebrate
  alternatives:
  - and to keep
  - and to observe
  lexicon: HALOT
  rationale: The verb חגג means to celebrate or keep a pilgrimage festival. 'Celebrate'
    conveys festal observance more vividly than the flatter 'keep.'
- source_word: חַג הַסֻּכּוֹת
  chosen: the Feast of Booths
  alternatives:
  - the Festival of Booths
  - the Feast of Tabernacles
  - the Feast of Shelters
  lexicon: HALOT
  rationale: סֻכּוֹת refers to temporary booths/shelters used in the festival. 'Feast
    of Booths' is a transparent translation of the Hebrew; the traditional 'Feast
    of Tabernacles' is preserved in a footnote as a familiar alternative.
