theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering for
    YHWH, following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Rendering צְבָאוֹת in the divine title
  chosen_reading: of Armies
  alternative_readings:
  - of hosts
  rationale: The title is translated for meaning and readability rather than preserved
    in traditional ecclesiastical wording. 'Armies' makes the Hebrew sense more transparent
    while retaining the title's majesty.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: translate titles; readable
    modern English'
- issue: Eschatological scope of the nations' pilgrimage
  chosen_reading: Retained the prophetic image without resolving whether it is to
    be read strictly literally, typologically, or apocalyptically.
  alternative_readings:
  - literal future annual pilgrimage of surviving nations
  - symbolic depiction of universal worship
  rationale: The verse itself depicts surviving nations going up annually to worship
    and celebrate the feast. The translation preserves that imagery and does not import
    a specific millennial or symbolic scheme beyond the text.
  doctrine_reference: 'DOCTRINE.md Affirmations; Translation philosophy: preserve
    theological tension rather than resolve it'
