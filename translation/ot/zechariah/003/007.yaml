theological_decisions:
- issue: Meaning of the promise וְנָתַתִּי לְךָ מַהְלְכִים בֵּין הָעֹמְדִים הָאֵלֶּה
  chosen_reading: A promise of granted access/free movement among the heavenly attendants in God's presence.
  alternative_readings:
  - A promise to provide 'walkers' or attendants among those standing here
  - A promise of places to walk among those standing here
  rationale: The Hebrew expression is rare and debated. In the immediate visionary context, 'these who are standing here' most naturally refers to the heavenly beings attending the LORD. Rendering the promise as 'access' preserves the likely sense of privileged admittance without over-specifying the mechanics. Because the phrase is genuinely contested, alternatives are preserved in a footnote rather than being erased.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
