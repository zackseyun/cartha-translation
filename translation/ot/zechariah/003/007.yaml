id: ZEC.3.7
reference: Zechariah 3:7
source:
  edition: WLC
  text: כֹּה אָמַ֞ר יְהוָ֣ה צְבָא֗וֹת אִם בִּ/דְרָכַ֤/י תֵּלֵךְ֙ וְ/אִ֣ם אֶת מִשְׁמַרְתִּ֣/י תִשְׁמֹ֔ר וְ/גַם אַתָּה֙ תָּדִ֣ין אֶת בֵּיתִ֔/י וְ/גַ֖ם תִּשְׁמֹ֣ר אֶת חֲצֵרָ֑/י וְ/נָתַתִּ֤י לְ/ךָ֙ מַהְלְכִ֔ים בֵּ֥ין הָ/עֹמְדִ֖ים הָ/אֵֽלֶּה־־־־־־׃
translation:
  text: 'Thus says Yahweh of hosts: If you walk in my ways and if you keep my charge, then you also shall govern my house and also keep my courts, and I will give you free access among these who are standing here.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'free movement among these who are standing here'; the Hebrew may also be understood as 'those who walk among these standing here' or 'places to walk among these standing here.'
    reason: alternative_reading
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: צְבָאוֹת
  chosen: of hosts
  alternatives:
  - of armies
  lexicon: HALOT
  rationale: In the divine title יְהוָה צְבָאוֹת, 'hosts' is the established and semantically broad rendering, encompassing heavenly armies without narrowing the sense.
- source_word: בִּדְרָכַי תֵּלֵךְ
  chosen: you walk in my ways
  alternatives:
  - you live according to my ways
  - you go in my ways
  lexicon: HALOT
  rationale: The idiom 'walk in my ways' is both faithful to the Hebrew metaphor and clear in modern English, preserving covenantal/ethical nuance.
- source_word: מִשְׁמַרְתִּי תִשְׁמֹר
  chosen: you keep my charge
  alternatives:
  - you keep my command
  - you observe my requirement
  lexicon: HALOT
  rationale: מִשְׁמֶרֶת often denotes a charge, duty, or obligation entrusted to someone, especially in priestly contexts. 'Keep my charge' preserves that entrusted-duty sense better than the more generic 'command.'
- source_word: תָּדִין אֶת־בֵּיתִי
  chosen: you shall govern my house
  alternatives:
  - you shall judge my house
  - you shall rule my house
  lexicon: HALOT
  rationale: דִּין can mean judge, govern, or administer. In this temple-priestly context, 'govern' best captures administrative oversight without implying only judicial activity.
- source_word: חֲצֵרַי
  chosen: my courts
  alternatives:
  - my courtyards
  lexicon: HALOT
  rationale: In temple context, 'courts' is the natural English rendering for the precincts under priestly care; 'courtyards' is possible but less idiomatic here.
- source_word: מַהְלְכִים
  chosen: access
  alternatives:
  - those who walk
  - free movement
  - walkers
  lexicon: HALOT
  rationale: The noun is difficult and likely denotes the right or privilege of movement. Given the phrase 'among these who are standing here'—apparently the heavenly attendants—'access' communicates granted admittance/passage in the divine court better than a wooden 'walkers.'
- source_word: בֵּין הָעֹמְדִים הָאֵלֶּה
  chosen: among these who are standing here
  alternatives:
  - among these standing here
  - between these who stand here
  lexicon: HALOT
  rationale: The participle 'standing' likely refers to the angelic attendants present in the vision. 'Among' is idiomatic for בֵּין in this setting and avoids an overly spatial 'between'.
- source_word: וְגַם ... וְגַם
  chosen: then you also ... and also
  alternatives:
  - indeed ... and
  - you too ... and
  lexicon: HALOT
  rationale: The repeated גַם marks emphatic addition to the conditional promises. Rendering both instances preserves the stepped structure of the promise.
