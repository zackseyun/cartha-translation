theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: Follows the doctrine default for YHWH, aligning with Jewish reverence
    tradition and longstanding English Bible practice while remaining transparent
    in documentation.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Rendering of צְבָאוֹת
  chosen_reading: Armies
  alternative_readings:
  - Hosts
  rationale: The Hebrew title evokes heavenly and earthly armies. 'Armies' communicates
    the meaning more clearly to modern readers than the traditional but opaque 'Hosts.'
    This is a lexical-theological title choice, not a doctrinal alteration.
  doctrine_reference: DOCTRINE.md Translation philosophy §2, §6
