id: ZEC.3.10
reference: Zechariah 3:10
source:
  edition: WLC
  text: בַּ/יּ֣וֹם הַ/ה֗וּא נְאֻם֙ יְהוָ֣ה צְבָא֔וֹת תִּקְרְא֖וּ אִ֣ישׁ לְ/רֵעֵ֑/הוּ
    אֶל תַּ֥חַת גֶּ֖פֶן וְ/אֶל תַּ֥חַת תְּאֵנָֽה־־׃
translation:
  text: On that day, declares the LORD of Armies, each of you will invite his neighbor
    to come under the vine and under the fig tree.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'will call, each man to his neighbor.' The Hebrew verb can be rendered
      more literally as 'call,' but here likely carries the sense of invitation.
    reason: lexical_alternative
  - marker: b
    text: Many English versions read 'the LORD of Hosts.' The Hebrew title צְבָאוֹת
      refers to armies or hosts.
    reason: lexical_alternative
  - marker: c
    text: Compare 1 Kings 4:25 and Micah 4:4, where sitting under the vine and fig
      tree symbolizes peace, security, and prosperity.
    reason: cross_reference
  - marker: d
    text: Some translations supply 'his' before 'vine' and 'fig tree' from similar
      biblical idiom, but the possessive is not explicit in the Hebrew here.
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּיּוֹם הַהוּא
  chosen: On that day
  alternatives:
  - In that day
  lexicon: HALOT
  rationale: Standard temporal expression introducing a future time of divine action.
    'On that day' is idiomatic modern English and preserves the prophetic formula.
- source_word: נְאֻם יְהוָה צְבָאוֹת
  chosen: declares the LORD of Armies
  alternatives:
  - oracle of the LORD of Hosts
  - says the LORD of Hosts
  lexicon: HALOT
  rationale: נְאֻם is a prophetic declaration formula best rendered 'declares.' יְהוָה
    follows doctrine default as 'the LORD.' צְבָאוֹת is translated rather than transliterated;
    'Armies' is more transparent to modern readers than 'Hosts' while preserving the
    martial/cosmic sense.
- source_word: תִּקְרְאוּ
  chosen: will invite
  alternatives:
  - will call
  - will summon
  - will call out
  lexicon: HALOT
  rationale: קרא commonly means 'call,' but with the object 'each ... to his neighbor'
    and the following destination phrase, the sense is invitational rather than merely
    vocal. 'Will invite' captures the social-peace imagery without over-paraphrasing.
- source_word: אִישׁ לְרֵעֵהוּ
  chosen: each of you ... his neighbor
  alternatives:
  - each man ... his friend
  - a man ... his neighbor
  lexicon: HALOT
  rationale: אִישׁ distributively means 'each one/each man.' Because the verb is 2mp,
    English naturally expresses the distributive sense as 'each of you.' רֵעַ can
    mean 'friend' or 'neighbor'; 'neighbor' better fits the communal-peace motif and
    remains broad. The masculine singular is retained in 'his neighbor' per gender-accurate
    policy.
- source_word: אֶל תַּחַת גֶּפֶן וְאֶל תַּחַת תְּאֵנָה
  chosen: to come under the vine and under the fig tree
  alternatives:
  - under his vine and under his fig tree
  - beneath the vine and beneath the fig tree
  lexicon: HALOT
  rationale: The repeated אֶל with תַּחַת marks movement toward a place of repose/shelter.
    'To come under' makes the invitation explicit in English. The nouns are singular
    and anarthrous; 'the vine and the fig tree' works idiomatically as emblematic
    images of peace and prosperity. The possessive 'his' found in similar passages
    is not present here and should not be imported into the main text.
