theological_decisions:
- issue: Identity of הַמַּלְאָךְ in context
  chosen_reading: the angel
  alternative_readings:
  - the messenger
  - the angel of the LORD as a theophanic figure in the broader passage
  rationale: This verse itself reads simply 'the angel' and does not explicitly identify
    the figure beyond the noun with article. The translation therefore avoids importing
    a stronger theological identification into the main text while allowing contextual
    interpretation to remain open.
  doctrine_reference: Preserve theological tension rather than resolve it.
