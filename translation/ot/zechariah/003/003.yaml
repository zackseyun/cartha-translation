id: ZEC.3.3
reference: Zechariah 3:3
source:
  edition: WLC
  text: וִ/יהוֹשֻׁ֕עַ הָיָ֥ה לָבֻ֖שׁ בְּגָדִ֣ים צוֹאִ֑ים וְ/עֹמֵ֖ד לִ/פְנֵ֥י הַ/מַּלְאָֽךְ׃
translation:
  text: Now Joshua was clothed with filthy garments and was standing before the angel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'And Joshua.' The Hebrew conjunction can be rendered either way depending
      on English discourse flow.
    reason: lexical_alternative
  - marker: b
    text: '''Filthy'' renders a term for garments in an intensely unclean condition;
      ''soiled'' is possible but weaker.'
    reason: lexical_alternative
  - marker: c
    text: Or 'the messenger.' In this vision context, 'angel' is the more natural
      rendering.
    reason: alternative_reading
lexical_decisions:
- source_word: וִ/יהוֹשֻׁעַ
  chosen: Now Joshua
  alternatives:
  - And Joshua
  lexicon: HALOT
  rationale: The conjunction waw here advances the vision narrative. In English, 'Now
    Joshua' reads naturally while preserving the discourse move. The personal name
    is transliterated per project philosophy.
- source_word: הָיָה
  chosen: was
  alternatives:
  - became
  lexicon: HALOT
  rationale: Qal perfect of היה here functions as the copular past in the clause,
    describing Joshua's state rather than a change of state.
- source_word: לָבֻשׁ
  chosen: clothed
  alternatives:
  - wearing
  - dressed
  lexicon: HALOT
  rationale: 'Passive/stative sense: Joshua was in a state of being clothed. ''Clothed''
    preserves the formal force better than the more colloquial ''wearing''.'
- source_word: בְּגָדִים
  chosen: garments
  alternatives:
  - clothes
  - robes
  lexicon: HALOT
  rationale: '''Garments'' is a natural but slightly elevated rendering suitable to
    priestly attire in this vision context. ''Robes'' would be too specific for the
    Hebrew term by itself.'
- source_word: צוֹאִים
  chosen: filthy
  alternatives:
  - soiled
  - defiled
  lexicon: HALOT
  rationale: The adjective denotes extreme uncleanness/filth. 'Filthy' best conveys
    the vivid, offensive condition without softening it to mere dirtiness. 'Defiled'
    is interpretive and more theological than lexical.
- source_word: וְ/עֹמֵד
  chosen: and was standing
  alternatives:
  - standing
  - and standing
  lexicon: HALOT
  rationale: The participle gives an ongoing posture concurrent with the previous
    description. 'Was standing' makes the durative sense clear in idiomatic English.
- source_word: לִ/פְנֵי
  chosen: before
  alternatives:
  - in the presence of
  lexicon: HALOT
  rationale: Standard rendering for spatial/personal presence. 'Before' is concise
    and fits courtroom/vision language.
- source_word: הַ/מַּלְאָךְ
  chosen: the angel
  alternatives:
  - the messenger
  lexicon: HALOT
  rationale: Although מלאך can mean 'messenger,' in this visionary heavenly setting
    'angel' is the most natural English rendering. The definite article is preserved.
