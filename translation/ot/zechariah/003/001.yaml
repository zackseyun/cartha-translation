id: ZEC.3.1
reference: Zechariah 3:1
source:
  edition: WLC
  text: וַ/יַּרְאֵ֗/נִי אֶת יְהוֹשֻׁ֨עַ֙ הַ/כֹּהֵ֣ן הַ/גָּד֔וֹל עֹמֵ֕ד לִ/פְנֵ֖י מַלְאַ֣ךְ יְהוָ֑ה וְ/הַ/שָּׂטָ֛ן עֹמֵ֥ד עַל יְמִינ֖/וֹ לְ/שִׂטְנֽ/וֹ־־׃
translation:
  text: Then he showed me Joshua the high priest standing before the angel of Yahweh, and the Accuser standing at his right hand to accuse him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “Satan … to oppose him.” The Hebrew has “the satan,” which can function as a title meaning “the accuser” or “the adversary.”
    reason: alternative_reading
lexical_decisions:
- source_word: וַיַּרְאֵנִי
  chosen: Then he showed me
  alternatives:
  - And he showed me
  - Then he caused me to see
  lexicon: HALOT
  rationale: The Hiphil of ראה with 1cs suffix means 'caused me to see' or idiomatically 'showed me.' 'Then' reflects the narrative waw in smooth English. This is more natural than the overly literal 'caused me to see' while preserving the sense.
- source_word: יְהוֹשֻׁעַ
  chosen: Joshua
  alternatives:
  - Jeshua
  lexicon: HALOT
  rationale: This proper name is the standard transliteration 'Joshua.' Although the postexilic high priest is elsewhere often rendered 'Jeshua' in English tradition, the Hebrew form here is יְהוֹשֻׁעַ, which corresponds directly to 'Joshua.' This follows the policy to transliterate names from the source form rather than harmonize to tradition.
- source_word: הַכֹּהֵן הַגָּדוֹל
  chosen: the high priest
  alternatives:
  - the great priest
  - the chief priest
  lexicon: HALOT
  rationale: This is the established and accurate rendering of the Hebrew title for Israel's chief priest. 'High priest' is idiomatic and precise in English.
- source_word: עֹמֵד
  chosen: standing
  alternatives:
  - was standing
  lexicon: HALOT
  rationale: The participle depicts Joshua's posture/state in the vision. 'Standing' is concise and natural in English.
- source_word: לִפְנֵי
  chosen: before
  alternatives:
  - in the presence of
  lexicon: HALOT
  rationale: '''Before'' captures both spatial and judicial/presentational nuance here, fitting the courtroom-like setting without overinterpreting.'
- source_word: מַלְאַךְ יְהוָה
  chosen: the angel of the LORD
  alternatives:
  - the messenger of the LORD
  lexicon: HALOT
  rationale: מַלְאָךְ can mean 'messenger' or 'angel,' but in this prophetic vision 'angel' is the most natural English rendering. יְהוָה is rendered 'the LORD' per doctrine.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: הַשָּׂטָן
  chosen: the Accuser
  alternatives:
  - Satan
  - the adversary
  lexicon: HALOT
  rationale: With the article, the Hebrew functions as a title/role ('the accuser/adversary') rather than necessarily a proper name. In this judicial context, 'the Accuser' best matches the immediate forensic sense and preserves the lexical force of the root. Because 'Satan' is a familiar traditional rendering and may also be understood as a name/title here, it is preserved in a footnote.
- source_word: עַל יְמִינוֹ
  chosen: at his right hand
  alternatives:
  - on his right
  - at his right side
  lexicon: HALOT
  rationale: This idiom is naturally rendered 'at his right hand,' which also preserves the courtroom nuance of a prosecuting position.
- source_word: לְשִׂטְנוֹ
  chosen: to accuse him
  alternatives:
  - to be his adversary
  - to oppose him
  lexicon: HALOT
  rationale: The infinitive from the same root as שָׂטָן carries the sense of acting as accuser/adversary. In this legal scene, 'to accuse him' is the clearest and most contextually precise rendering.
