theological_decisions:
- issue: Whether הַשָּׂטָן should be rendered as a proper name or as a title/role
  chosen_reading: the Accuser
  alternative_readings:
  - Satan
  - the adversary
  rationale: 'The presence of the article in Hebrew strongly suggests a title or office (''the accuser'') in this scene. The immediate context is judicial: Joshua stands before the angel of the LORD, and this figure stands at his right hand לְשִׂטְנוֹ, ''to accuse him.'' Rendering it as ''the Accuser'' preserves the legal force without denying later canonical identification with Satan. Because English readers may expect ''Satan,'' that traditional rendering is preserved in a footnote rather than placed in the main text.'
  doctrine_reference: Preserve theological tension rather than resolve it; original-language primacy over translation tradition.
