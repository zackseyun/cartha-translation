id: ZEC.3.9
reference: Zechariah 3:9
source:
  edition: WLC
  text: כִּ֣י הִנֵּ֣ה הָ/אֶ֗בֶן אֲשֶׁ֤ר נָתַ֨תִּי֙ לִ/פְנֵ֣י יְהוֹשֻׁ֔עַ עַל אֶ֥בֶן
    אַחַ֖ת שִׁבְעָ֣ה עֵינָ֑יִם הִנְ/נִ֧י מְפַתֵּ֣חַ פִּתֻּחָ֗/הּ נְאֻם֙ יְהוָ֣ה צְבָא֔וֹת
    וּ/מַשְׁתִּ֛י אֶת עֲוֺ֥ן הָ/אָֽרֶץ הַ/הִ֖יא בְּ/י֥וֹם אֶחָֽד׀־־־׃
translation:
  text: For behold, the stone that I have set before Joshua—on one stone are seven
    eyes. Behold, I myself will engrave its engraving, declares the LORD of Armies,
    and I will remove the iniquity of that land in a single day.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more smoothly, 'I will engrave its inscription.' The Hebrew uses a cognate
      expression, literally 'engrave its engraving.'
    reason: lexical_alternative
  - marker: b
    text: 'Traditional English: ''the LORD of Hosts.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי הִנֵּה
  chosen: For behold
  alternatives:
  - Indeed, behold
  - For look
  lexicon: HALOT
  rationale: כִּי here introduces explanation or emphasis, best carried by 'For';
    הִנֵּה is a deictic attention-marker, naturally rendered 'behold' in prophetic
    discourse to preserve solemnity.
- source_word: הָאֶבֶן
  chosen: the stone
  lexicon: HALOT
  rationale: Definite noun; 'stone' is the plain sense and should be retained rather
    than interpreted symbolically in translation.
- source_word: אֲשֶׁר נָתַתִּי לִפְנֵי יְהוֹשֻׁעַ
  chosen: that I have set before Joshua
  alternatives:
  - that I have placed before Joshua
  - that I gave before Joshua
  lexicon: HALOT
  rationale: נתן has broad range including 'give, set, place.' In context with 'before
    Joshua,' 'set' or 'placed' is more idiomatic than 'gave.' Perfect is rendered
    with English present perfect for current relevance.
- source_word: יְהוֹשֻׁעַ
  chosen: Joshua
  alternatives:
  - Jeshua
  lexicon: HALOT
  rationale: Standard English transliteration of the Hebrew form in this verse is
    'Joshua.'
- source_word: עַל אֶבֶן אַחַת
  chosen: on one stone
  alternatives:
  - upon one stone
  - for one stone
  lexicon: HALOT
  rationale: The preposition עַל most naturally means 'on/upon.' The phrase is syntactically
    abrupt, so a fairly literal rendering preserves the prophetic style without over-resolving
    the imagery.
- source_word: שִׁבְעָה עֵינָיִם
  chosen: seven eyes
  lexicon: HALOT
  rationale: Literal rendering is preferable; the symbolic meaning should not be imported
    into the main text.
- source_word: הִנְנִי
  chosen: Behold, I myself
  alternatives:
  - See, I am
  - Behold, I
  lexicon: HALOT
  rationale: This particle-plus-pronoun construction is emphatic and self-referential.
    'I myself' brings out the emphasis while retaining the prophetic announcement
    force.
- source_word: מְפַתֵּחַ פִּתֻּחָהּ
  chosen: will engrave its engraving
  alternatives:
  - am engraving its engraving
  - will engrave its inscription
  - will carve its carving
  lexicon: HALOT
  rationale: The participle after הִנְנִי often has imminent/future force. The cognate
    noun construction should be reflected for auditability; 'engrave its engraving'
    is slightly formal but preserves the Hebrew wordplay and concreteness. A smoother
    alternative is preserved in a footnote.
- source_word: נְאֻם יְהוָה צְבָאוֹת
  chosen: declares the LORD of Armies
  alternatives:
  - oracle of the LORD of Hosts
  - declares the LORD of Hosts
  lexicon: HALOT
  rationale: נְאֻם is a prophetic speech formula, best rendered 'declares.' Per doctrine,
    יְהוָה is rendered 'the LORD.' צְבָאוֹת is translated rather than transliterated;
    'of Armies' is more transparent modern English than 'of Hosts.'
- source_word: וּמַשְׁתִּי
  chosen: and I will remove
  alternatives:
  - and I will take away
  lexicon: HALOT
  rationale: משך/מושׁ? In this form and context the sense is removal. 'Remove' is
    idiomatic and fits the object 'iniquity.'
- source_word: עֲוֺן
  chosen: iniquity
  alternatives:
  - guilt
  - sin
  lexicon: HALOT
  rationale: עָוֹן can denote iniquity, guilt, or punishment for guilt. Here 'remove
    the iniquity' is a familiar and contextually fitting expression that preserves
    moral weight without narrowing to subjective guilt alone.
- source_word: הָאָרֶץ הַהִיא
  chosen: that land
  alternatives:
  - that הארץ/land
  - the land
  lexicon: HALOT
  rationale: The demonstrative is significant and should be represented. 'That land'
    is natural English and preserves the specificity.
- source_word: בְּיוֹם אֶחָד
  chosen: in a single day
  alternatives:
  - in one day
  lexicon: HALOT
  rationale: Both are possible; 'in a single day' slightly heightens the force of
    the sudden, decisive action while remaining faithful.
