theological_decisions:
- issue: Symbolic imagery of the stone and seven eyes
  chosen_reading: Retain the imagery literally without identifying the stone or eyes
    in the main text.
  alternative_readings:
  - Interpret the stone messianically in the translation
  - Interpret the seven eyes as the LORD's omniscience in the translation
  rationale: The verse is symbolically dense and connected to broader canonical themes,
    but the Hebrew itself presents the imagery without explicit interpretation here.
    Per translation philosophy, theological interpretation should not be imported
    into the main text where the source leaves it symbolic.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Rendering of יְהוָה צְבָאוֹת
  chosen_reading: the LORD of Armies
  alternative_readings:
  - the LORD of Hosts
  rationale: DOCTRINE.md specifies יְהוָה as 'the LORD.' For צְבָאוֹת, a translated
    title is preferred for readability and transparency; 'of Armies' communicates
    the martial/plural sense more clearly to modern readers than the traditional 'Hosts.'
  doctrine_reference: 'Contested terms table: יְהוָה YHWH → the LORD; Translate titles;
    transliterate names.'
