id: ZEC.3.6
reference: Zechariah 3:6
source:
  edition: WLC
  text: וַ/יָּ֨עַד֙ מַלְאַ֣ךְ יְהוָ֔ה בִּ/יהוֹשֻׁ֖עַ לֵ/אמֹֽר׃
translation:
  text: Then the angel of the LORD solemnly charged Joshua, saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the messenger of the LORD.' The Hebrew word can mean either 'angel'
      or 'messenger,' though 'angel' best fits this visionary context.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּעַד
  chosen: solemnly charged
  alternatives:
  - testified
  - admonished
  - warned
  - charged
  lexicon: HALOT
  rationale: The verb here carries the sense of giving a formal, solemn charge or
    admonition. 'Solemnly charged' captures both the official and weighty force better
    than the more generic 'said' or 'commanded.' The prefixed waw-consecutive is represented
    by 'Then' to carry the narrative sequence.
- source_word: מַלְאַךְ יְהוָה
  chosen: the angel of the LORD
  alternatives:
  - the messenger of the LORD
  lexicon: HALOT
  rationale: מַלְאַךְ can mean either 'messenger' or 'angel,' but in this prophetic
    vision context 'angel' is the most natural English rendering. יְהוָה is rendered
    'the LORD' per the project's default for the divine name.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's stated default for the Tetragrammaton, preserving
    the conventional small-caps LORD practice in plain-text form.
- source_word: בִּיהוֹשֻׁעַ
  chosen: Joshua
  alternatives:
  - to Joshua
  - concerning Joshua
  lexicon: HALOT
  rationale: The preposition ב with יעד can mark the person addressed or charged.
    In idiomatic English, 'charged Joshua' communicates the relation naturally without
    forcing a wooden prepositional rendering. The personal name is transliterated
    rather than translated, per project policy.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - as follows
  lexicon: HALOT
  rationale: Standard Hebrew speech-introduction formula. 'Saying' preserves the formal
    linkage to the direct speech that follows in the next verse.
