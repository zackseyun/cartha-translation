id: ZEC.3.2
reference: Zechariah 3:2
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר יְהוָ֜ה אֶל הַ/שָּׂטָ֗ן יִגְעַ֨ר יְהוָ֤ה בְּ/ךָ֙ הַ/שָּׂטָ֔ן וְ/יִגְעַ֤ר יְהוָה֙ בְּ/ךָ֔ הַ/בֹּחֵ֖ר בִּ/ירֽוּשָׁלִָ֑ם הֲ/ל֧וֹא זֶ֦ה א֖וּד מֻצָּ֥ל מֵ/אֵֽשׁ־׃
translation:
  text: And Yahweh said to the Accuser, “Yahweh rebuke you, O Accuser! Indeed, Yahweh, who has chosen Jerusalem, rebuke you! Is not this a brand snatched from the fire?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, traditionally, “Satan.” The Hebrew has the title “the accuser.”
    reason: alternative_reading
  - marker: b
    text: Or “a firebrand rescued from the fire.”
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: הַשָּׂטָן
  chosen: the Accuser / O Accuser
  alternatives:
  - Satan
  - the adversary
  lexicon: HALOT
  rationale: With the article, the Hebrew noun denotes a role or title ('the accuser/adversary') rather than functioning straightforwardly as a proper name. Rendering it as 'Accuser' preserves the lexical sense while still fitting the courtroom context of the vision. 'Satan' is preserved as an alternative because of established translation tradition and possible titular usage.
- source_word: יִגְעַר
  chosen: rebuke
  alternatives:
  - reprove
  - restrain
  lexicon: HALOT
  rationale: The verb גער in this context is a forceful judicial or authoritative rebuke. 'Rebuke' is the standard and most natural English equivalent here, matching both the prophetic idiom and the direct address to the accuser.
- source_word: הַבֹּחֵר בִּירוּשָׁלִָם
  chosen: who has chosen Jerusalem
  alternatives:
  - the one choosing Jerusalem
  - who chooses Jerusalem
  lexicon: HALOT
  rationale: The participle with the article identifies the LORD by his characteristic action. In English, the relative clause 'who has chosen Jerusalem' reads naturally and conveys the settled covenantal sense better than a more wooden participial rendering.
- source_word: הֲלוֹא
  chosen: Is not
  alternatives:
  - Is this not
  - Surely
  lexicon: HALOT
  rationale: The particle introduces a rhetorical question expecting agreement. 'Is not' preserves that force in idiomatic English.
- source_word: אוּד
  chosen: brand
  alternatives:
  - stick
  - firebrand
  lexicon: HALOT
  rationale: The noun refers to a piece of wood taken from burning. 'Brand' is concise, idiomatic, and preserves the metaphorical force of something nearly consumed.
- source_word: מֻצָּל מֵאֵשׁ
  chosen: snatched from the fire
  alternatives:
  - rescued from the fire
  - delivered from the fire
  lexicon: HALOT
  rationale: Although the passive participle literally means 'delivered/rescued,' 'snatched from the fire' best captures the vivid imagery and established idiom of a narrow rescue, without over-paraphrasing.
