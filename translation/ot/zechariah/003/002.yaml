theological_decisions:
- issue: Whether הַשָּׂטָן should be rendered as a proper name or a title
  chosen_reading: Rendered as 'the Accuser' in the main text
  alternative_readings:
  - Satan
  - the adversary
  rationale: The Hebrew form includes the article and in this vision scene functions as a descriptive title. Translating the title preserves the lexical meaning and the legal setting of accusation. Because many readers will recognize the figure as Satan, that traditional rendering is preserved in a footnote rather than adopted in the main text.
  doctrine_reference: Translation philosophy §1, §3
- issue: The repeated formula 'The LORD rebuke you' spoken by the LORD
  chosen_reading: Retained the repetition and direct speech without smoothing it out
  alternative_readings:
  - Condensing the repeated rebuke into a single clause
  rationale: The repetition is present in the Hebrew and carries rhetorical and judicial force. Preserving it maintains the text's emphasis and avoids interpretive reduction.
  doctrine_reference: Translation philosophy §1, §5
