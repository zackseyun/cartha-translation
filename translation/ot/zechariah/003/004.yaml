theological_decisions:
- issue: Symbolic meaning of garment exchange
  chosen_reading: Retain the imagery of filthy garments removed and iniquity taken
    away without expanding it into a doctrinal paraphrase.
  alternative_readings:
  - Explicitly interpret as justification
  - Explicitly interpret as priestly reinstatement
  rationale: The verse clearly links the removal of filthy garments with the removal
    of iniquity, but it does not itself systematize the act into later doctrinal categories.
    The translation preserves the theological symbolism while avoiding imported doctrinal
    explanation.
  doctrine_reference: Translation philosophy §1, §3
- issue: Identity of those standing before him
  chosen_reading: Translate descriptively as 'those standing before him' rather than
    interpretively as angelic attendants.
  alternative_readings:
  - his attendants
  - the angels standing before him
  rationale: The context suggests heavenly attendants, but the Hebrew wording itself
    is not a title. Preserving the descriptive phrase avoids adding information not
    explicit in the text.
  doctrine_reference: Translation philosophy §1
