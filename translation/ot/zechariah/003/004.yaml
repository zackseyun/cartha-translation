id: ZEC.3.4
reference: Zechariah 3:4
source:
  edition: WLC
  text: וַ/יַּ֣עַן וַ/יֹּ֗אמֶר אֶל הָ/עֹמְדִ֤ים לְ/פָנָי/ו֙ לֵ/אמֹ֔ר הָסִ֛ירוּ הַ/בְּגָדִ֥ים
    הַ/צֹּאִ֖ים מֵ/עָלָ֑י/ו וַ/יֹּ֣אמֶר אֵלָ֗י/ו רְאֵ֨ה הֶעֱבַ֤רְתִּי מֵ/עָלֶ֨י/ךָ֙
    עֲוֺנֶ֔/ךָ וְ/הַלְבֵּ֥שׁ אֹתְ/ךָ֖ מַחֲלָצֽוֹת־׃
translation:
  text: And he answered and said to those standing before him, saying, “Remove the
    filthy garments from upon him.” Then he said to him, “See, I have taken your iniquity
    away from upon you, and I will clothe you with rich garments.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “festal robes” / “fine garments.” The Hebrew term denotes rich or stately
      clothing.
    reason: lexical_alternative
  - marker: b
    text: “Those standing before him” likely refers to heavenly attendants, but the
      Hebrew is left descriptive.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיַּעַן
  chosen: answered
  alternatives:
  - responded
  lexicon: HALOT
  rationale: ענה in narrative commonly introduces speech as 'answered,' even when
    no prior explicit question is stated. Retaining 'answered' preserves the Hebrew
    discourse texture.
- source_word: וַיֹּאמֶר
  chosen: said
  alternatives:
  - spoke
  lexicon: HALOT
  rationale: Standard rendering for אמר in narrative. 'Said' is natural and sufficiently
    formal.
- source_word: הָעֹמְדִים לְפָנָיו
  chosen: those standing before him
  alternatives:
  - those who stood before him
  - his attendants
  lexicon: HALOT
  rationale: Literally 'the ones standing before him.' This likely refers to heavenly
    attendants, but the Hebrew expression itself is descriptive, so the main text
    keeps the more transparent wording rather than interpreting it as 'attendants.'
- source_word: הָסִירוּ
  chosen: Remove
  alternatives:
  - Take away
  lexicon: HALOT
  rationale: Imperative plural calling for the garments to be removed. 'Remove' is
    direct and idiomatic.
- source_word: הַבְּגָדִים הַצֹּאִים
  chosen: the filthy garments
  alternatives:
  - the soiled garments
  - the defiled clothes
  lexicon: HALOT
  rationale: בגדים are garments/clothes; צואים denotes filth/excremental uncleanness.
    'Filthy garments' is vivid, established, and accurately conveys ritual/moral defilement
    without over-paraphrase.
- source_word: מֵעָלָיו
  chosen: from upon him
  alternatives:
  - from him
  - off him
  lexicon: HALOT
  rationale: The preposition is literally 'from upon him.' The English keeps some
    of that concreteness, though slightly wooden, because the verse repeats the same
    construction in the symbolic declaration that follows.
- source_word: רְאֵה
  chosen: See
  alternatives:
  - Look
  - Behold
  lexicon: HALOT
  rationale: A discourse marker drawing attention to the symbolic act's meaning. 'See'
    is readable modern English and preserves the imperative force.
- source_word: הֶעֱבַרְתִּי
  chosen: I have taken ... away
  alternatives:
  - I have caused ... to pass away
  - I have removed
  lexicon: HALOT
  rationale: The Hiphil of עבר here means to cause to pass away/remove. 'I have taken
    your iniquity away' is idiomatic English and preserves the completed action.
- source_word: עֲוֺנֶךָ
  chosen: your iniquity
  alternatives:
  - your guilt
  - your sin
  lexicon: HALOT
  rationale: עון can denote iniquity, guilt, or punishment for guilt. Here the removal
    of moral defilement is central; 'iniquity' preserves the ethical weight and traditional
    theological nuance better than the flatter 'sin.'
- source_word: וְהַלְבֵּשׁ אֹתְךָ
  chosen: and I will clothe you
  alternatives:
  - and clothe you
  - and I have clothed you
  lexicon: HALOT
  rationale: 'The form is best taken as continuing the speaker''s declaration with
    future/resultative sense in English: after removing iniquity, he will clothe Joshua.
    Supplying ''I will'' makes the implied subject explicit and yields natural English.'
- source_word: מַחֲלָצוֹת
  chosen: rich garments
  alternatives:
  - festal robes
  - fine clothing
  - clean garments
  lexicon: HALOT
  rationale: The noun refers to costly or stately attire, not merely generic clothing.
    'Rich garments' conveys dignity and honor without over-specifying a ceremonial
    setting. 'Clean garments' is too interpretive and weakly supported by the lexeme
    itself.
