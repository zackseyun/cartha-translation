theological_decisions:
- issue: Identity and significance of מַלְאַךְ יְהוָה
  chosen_reading: Render the phrase transparently as 'the angel of the LORD' without
    specifying whether this is a created angel or a theophanic manifestation.
  alternative_readings:
  - the angel of Yahweh as a created messenger
  - the angel of the LORD as a manifestation of the LORD
  rationale: The Hebrew phrase itself should be translated directly, preserving theological
    tension rather than resolving a debated interpretive issue not settled by this
    verse alone.
  doctrine_reference: Preserve theological tension rather than resolve it.
