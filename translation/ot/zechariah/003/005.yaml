id: ZEC.3.5
reference: Zechariah 3:5
source:
  edition: WLC
  text: וָ/אֹמַ֕ר יָשִׂ֛ימוּ צָנִ֥יף טָה֖וֹר עַל רֹאשׁ֑/וֹ וַ/יָּשִׂימוּ֩ הַ/צָּנִ֨יף
    הַ/טָּה֜וֹר עַל רֹאשׁ֗/וֹ וַ/יַּלְבִּשֻׁ֨/הוּ֙ בְּגָדִ֔ים וּ/מַלְאַ֥ךְ יְהוָ֖ה
    עֹמֵֽד־־׃
translation:
  text: Then I said, “Let them put a clean turban on his head.” So they put the clean
    turban on his head and clothed him with garments, while the angel of the LORD
    was standing by.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'And I said.' The Hebrew conjunction can be rendered simply 'and'; 'then'
      reflects the narrative flow.
    reason: lexical_alternative
  - marker: b
    text: '''Clean'' may also be rendered ''pure,'' highlighting ritual purity.'
    reason: lexical_alternative
  - marker: c
    text: The phrase 'the angel of the LORD' is left untranslated beyond its plain
      sense; interpreters differ on whether it refers to a created angelic messenger
      or a manifestation of the LORD.
    reason: alternative_reading
lexical_decisions:
- source_word: וָאֹמַר
  chosen: Then I said
  alternatives:
  - And I said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then I said' gives natural
    English sequence while preserving first-person speech.
- source_word: יָשִׂימוּ
  chosen: Let them put
  alternatives:
  - May they put
  - They should put
  lexicon: HALOT
  rationale: The jussive 3mp expresses a wish/request. 'Let them put' is the most
    natural English equivalent.
- source_word: צָנִיף
  chosen: turban
  alternatives:
  - headwrap
  - headdress
  lexicon: HALOT
  rationale: The term denotes a wrapped headpiece, especially priestly or official.
    'Turban' is the standard concise English rendering and fits the priestly context
    of Joshua.
- source_word: טָהוֹר
  chosen: clean
  alternatives:
  - pure
  lexicon: HALOT
  rationale: '''Clean'' best matches ritual purity language in this context; ''pure''
    is possible but less idiomatic for clothing in priestly restoration scenes.'
- source_word: עַל רֹאשׁוֹ
  chosen: on his head
  lexicon: HALOT
  rationale: Straightforward locative phrase preserved formally.
- source_word: וַיָּשִׂימוּ
  chosen: So they put
  alternatives:
  - And they put
  lexicon: HALOT
  rationale: Narrative waw rendered with smooth English progression; 'So' reflects
    resulting action after the speaker's request.
- source_word: הַצָּנִיף הַטָּהוֹר
  chosen: the clean turban
  alternatives:
  - the pure turban
  lexicon: HALOT
  rationale: Definite article retained; repetition from the prior clause is preserved
    for emphasis and narrative concreteness.
- source_word: וַיַּלְבִּשֻׁהוּ בְּגָדִים
  chosen: clothed him with garments
  alternatives:
  - dressed him in garments
  - put clothes on him
  lexicon: HALOT
  rationale: The causative verb means to clothe/dress someone. 'Clothed him with garments'
    preserves the formal tone and echoes the restoration imagery of the passage.
- source_word: בְּגָדִים
  chosen: garments
  alternatives:
  - clothes
  - vestments
  lexicon: HALOT
  rationale: '''Garments'' is suitably dignified and broad. ''Vestments'' would over-specify
    priestly attire beyond what this noun alone states in this clause.'
- source_word: וּמַלְאַךְ יְהוָה
  chosen: while the angel of the LORD
  alternatives:
  - and the angel of the LORD
  - with the angel of the LORD
  lexicon: HALOT
  rationale: The conjunction here is best taken circumstantially with the following
    participle, indicating concurrent action. 'The LORD' follows the project's default
    rendering for יְהוָה.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD.'
- source_word: עֹמֵד
  chosen: was standing by
  alternatives:
  - was standing
  - stood by
  lexicon: HALOT
  rationale: The participle indicates ongoing posture/action. 'Was standing by' captures
    the durative sense and the attendant presence in the scene.
