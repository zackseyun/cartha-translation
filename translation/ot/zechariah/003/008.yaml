id: ZEC.3.8
reference: Zechariah 3:8
source:
  edition: WLC
  text: שְֽׁמַֽע נָ֞א יְהוֹשֻׁ֣עַ הַ/כֹּהֵ֣ן הַ/גָּד֗וֹל אַתָּה֙ וְ/רֵעֶ֨י/ךָ֙ הַ/יֹּשְׁבִ֣ים
    לְ/פָנֶ֔י/ךָ כִּֽי אַנְשֵׁ֥י מוֹפֵ֖ת הֵ֑מָּה כִּֽי הִנְ/נִ֥י מֵבִ֛יא אֶת עַבְדִּ֖/י
    צֶֽמַח־׀־־־׃
translation:
  text: Hear now, Joshua the high priest, you and your companions who sit before you,
    for they are men of sign; for behold, I am bringing my servant, the Branch.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'men who are a sign' or 'men of portent.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׁמַע נָא
  chosen: Hear now
  alternatives:
  - Listen now
  - Please hear
  lexicon: HALOT
  rationale: Imperative שׁמע with particle נָא gives an urgent appeal. 'Hear now'
    preserves the direct summons in natural English without over-softening to a mere
    polite request.
- source_word: יְהוֹשֻׁעַ
  chosen: Joshua
  lexicon: HALOT
  rationale: Personal name is transliterated by standard English convention, following
    the translation philosophy to transliterate names rather than translate them.
- source_word: הַכֹּהֵן הַגָּדוֹל
  chosen: the high priest
  alternatives:
  - the great priest
  lexicon: HALOT
  rationale: Established and accurate rendering of the Hebrew title for the chief
    priestly office; 'great priest' would be overly literal and less idiomatic.
- source_word: וְרֵעֶיךָ
  chosen: your companions
  alternatives:
  - your associates
  - your friends
  lexicon: HALOT
  rationale: רֵעַ can denote companions/associates rather than intimate friends. In
    this priestly-vision context, 'companions' best fits those associated with Joshua
    in office or setting.
- source_word: הַיֹּשְׁבִים לְפָנֶיךָ
  chosen: who sit before you
  alternatives:
  - who are sitting before you
  - who sit in front of you
  lexicon: HALOT
  rationale: The participial phrase is rendered relatively literally. 'Before you'
    can indicate presence in attendance, not merely spatial position, and is idiomatic
    in English.
- source_word: אַנְשֵׁי מוֹפֵת
  chosen: men of sign
  alternatives:
  - men of portent
  - men who are a sign
  lexicon: HALOT
  rationale: מוֹפֵת denotes a sign, wonder, or portent. The construct phrase identifies
    these men as sign-bearing figures. 'Men of sign' keeps the compact Hebrew force
    while allowing the following context to explain its symbolic significance. An
    explanatory alternative is preserved in a footnote.
- source_word: הִנְנִי
  chosen: behold
  alternatives:
  - look
  - see
  lexicon: HALOT
  rationale: The deictic particle marks solemn divine announcement. 'Behold' retains
    the elevated prophetic tone better than flatter modern substitutes.
- source_word: מֵבִיא
  chosen: I am bringing
  alternatives:
  - I bring
  - I will bring
  lexicon: HALOT
  rationale: The participle with הִנְנִי often conveys imminent or certain future
    action. 'I am bringing' preserves the vividness and immediacy of the Hebrew construction.
- source_word: עַבְדִּי
  chosen: my servant
  alternatives:
  - my slave
  lexicon: HALOT
  rationale: Although עבד can denote slave/servant, in prophetic royal and messianic
    contexts 'servant' is the established and contextually appropriate rendering,
    emphasizing commissioned service rather than bonded status.
- source_word: צֶמַח
  chosen: the Branch
  alternatives:
  - Branch
  - sprout
  - shoot
  lexicon: HALOT
  rationale: Here צמח functions as a title-like designation for the coming Davidic
    figure in prophetic literature (cf. Zech 6:12; Jer 23:5). Capitalizing 'Branch'
    signals titular usage without importing more than the text states. 'Sprout' or
    'shoot' are lexically possible but weaker in English tradition and less suitable
    as a title.
