theological_decisions:
- issue: Whether צֶמַח should be rendered as a messianic title or a common noun
  chosen_reading: Rendered as the title 'the Branch'
  alternative_readings:
  - the sprout
  - a branch
  rationale: In Zechariah's prophetic context, especially alongside 'my servant,'
    צמח is best understood as a title for the anticipated Davidic ruler. This aligns
    with the text's intertextual usage while avoiding explicit doctrinal expansion
    beyond the verse itself.
  doctrine_reference: Affirmations; Translation philosophy §§1, 2, 3
- issue: How explicitly to interpret אַנְשֵׁי מוֹפֵת
  chosen_reading: Kept relatively literal as 'men of sign' with explanatory footnote
  alternative_readings:
  - men who are a sign
  - men of portent
  rationale: The phrase is symbolically charged, but the translation preserves the
    Hebrew's compact ambiguity rather than resolving it fully in the main text. A
    footnote preserves a more explicit English alternative.
  doctrine_reference: Translation philosophy §§1, 3, 5
