id: ZEC.8.20
reference: Zechariah 8:20
source:
  edition: WLC
  text: כֹּ֥ה אָמַ֖ר יְהוָ֣ה צְבָא֑וֹת עֹ֚ד אֲשֶׁ֣ר יָבֹ֣אוּ עַמִּ֔ים וְ/יֹשְׁבֵ֖י עָרִ֥ים רַבּֽוֹת׃
translation:
  text: 'Thus says Yahweh of hosts: Yet peoples shall come, and the inhabitants of many cities,'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'nations' for 'peoples.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּה
  chosen: Thus
  alternatives:
  - This is what
  lexicon: HALOT
  rationale: Introduces a prophetic declaration formula. 'Thus' preserves the elevated but still natural register of prophetic speech in English.
- source_word: אָמַר
  chosen: says
  alternatives:
  - said
  lexicon: HALOT
  rationale: 'Although morphologically perfect, in the prophetic messenger formula כֹּה אָמַר it functions idiomatically as a present declaration in English: ''Thus says...'' rather than a simple past.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: צְבָאוֹת
  chosen: of hosts
  alternatives:
  - of armies
  lexicon: HALOT
  rationale: In the title יְהוָה צְבָאוֹת, 'of hosts' is the standard concise rendering and preserves the breadth of heavenly and earthly armies implied by the Hebrew without over-specifying.
- source_word: עֹד
  chosen: Yet
  alternatives:
  - Still
  - Again
  lexicon: HALOT
  rationale: 'Signals continuation of the prophetic promise from the preceding context. ''Yet'' fits the forward-looking sense here: something further is still to happen.'
- source_word: אֲשֶׁר
  chosen: shall
  alternatives:
  - that
  - when
  lexicon: HALOT
  rationale: Used here with עוֹד and the following verb to introduce the content of what is still to occur. English expresses this most naturally by folding the particle into the future verbal construction rather than translating it woodenly as 'that'.
- source_word: יָבֹאוּ
  chosen: shall come
  alternatives:
  - will come
  lexicon: HALOT
  rationale: Future plural verb describing the nations' approach. 'Shall come' matches the prophetic register and keeps the movement explicit.
- source_word: עַמִּים
  chosen: peoples
  alternatives:
  - nations
  lexicon: HALOT
  rationale: The plural 'peoples' reflects multiple ethnic groups and avoids prematurely narrowing the term to geopolitical 'nations.' It also pairs well with the following phrase about city inhabitants.
- source_word: וְיֹשְׁבֵי
  chosen: and inhabitants of
  alternatives:
  - and those who dwell in
  - and residents of
  lexicon: HALOT
  rationale: Construct participle meaning 'inhabitants of' or 'those dwelling in.' 'Inhabitants of' is concise and natural in English.
- source_word: עָרִים רַבּוֹת
  chosen: many cities
  alternatives:
  - great cities
  - numerous cities
  lexicon: HALOT
  rationale: רַבּוֹת here most naturally denotes quantity, not greatness. 'Many cities' is the clearest rendering of the phrase.
