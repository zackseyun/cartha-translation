id: ZEC.8.14
reference: Zechariah 8:14
source:
  edition: WLC
  text: כִּ֣י כֹ֣ה אָמַר֮ יְהוָ֣ה צְבָאוֹת֒ כַּ/אֲשֶׁ֨ר זָמַמְ֜תִּי לְ/הָרַ֣ע לָ/כֶ֗ם בְּ/הַקְצִ֤יף אֲבֹֽתֵי/כֶם֙ אֹתִ֔/י אָמַ֖ר יְהוָ֣ה צְבָא֑וֹת וְ/לֹ֖א נִחָֽמְתִּי׃
translation:
  text: 'For thus says Yahweh of Armies: Just as I purposed to do harm to you when your fathers provoked me to wrath, says Yahweh of Armies, and I did not relent,'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your ancestors.' The Hebrew reads 'your fathers.'
    reason: lexical_alternative
  - marker: b
    text: Or 'I planned to bring disaster on you.'
    reason: lexical_alternative
  - marker: c
    text: Or 'I did not change my mind' / 'I did not repent.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: צְבָאוֹת
  chosen: of Armies
  alternatives:
  - of Hosts
  lexicon: HALOT
  rationale: The noun denotes armies/hosts. 'Of Armies' is more transparent in modern English than the traditional 'of Hosts' while preserving the martial/cosmic sense of the title.
- source_word: כִּי כֹה אָמַר
  chosen: For thus says
  alternatives:
  - For this is what ... says
  - Indeed, thus says
  lexicon: HALOT
  rationale: This is the standard prophetic messenger formula. 'For thus says' preserves the formal prophetic cadence while remaining natural English.
- source_word: כַּאֲשֶׁר
  chosen: Just as
  alternatives:
  - As
  - According as
  lexicon: HALOT
  rationale: Introduces the comparison between former judgment and the following promise in the context. 'Just as' clearly marks the correspondence.
- source_word: זָמַמְתִּי
  chosen: I purposed
  alternatives:
  - I planned
  - I intended
  - I devised
  lexicon: HALOT
  rationale: The verb conveys deliberate intention or resolve. 'I purposed' preserves the volitional force without sounding overly mechanical.
- source_word: לְהָרַע לָכֶם
  chosen: to do harm to you
  alternatives:
  - to bring disaster on you
  - to do evil to you
  lexicon: HALOT
  rationale: The Hiphil of רעע here refers to bringing calamity/judgment, not moral evil. 'Do harm to you' is direct and avoids implying moral wrongdoing by God; 'bring disaster' is possible but slightly more interpretive.
- source_word: בְּהַקְצִיף
  chosen: when ... provoked me to wrath
  alternatives:
  - when ... angered me
  - by provoking me to anger
  lexicon: HALOT
  rationale: The infinitive construct with prefixed ב marks the circumstance/time. The causative sense of the verb is well captured by 'provoked me to wrath,' which preserves the intensity of divine anger.
- source_word: אֲבֹתֵיכֶם
  chosen: your fathers
  alternatives:
  - your ancestors
  lexicon: HALOT
  rationale: The Hebrew is explicitly masculine plural 'your fathers.' Per the gender-accurate policy, the main text keeps 'fathers,' while 'ancestors' is a possible contextual alternative.
- source_word: וְלֹא נִחָמְתִּי
  chosen: and I did not relent
  alternatives:
  - and I did not repent
  - and I was not sorry
  - and I did not change my mind
  lexicon: HALOT
  rationale: נחם in this context refers to relenting from announced judgment. 'Did not relent' is idiomatic and avoids the misleading English sense of moral repentance in 'repent.'
