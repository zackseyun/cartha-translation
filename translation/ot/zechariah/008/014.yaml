theological_decisions:
- issue: Rendering divine judgment language in לְהָרַע
  chosen_reading: to do harm to you
  alternative_readings:
  - to bring disaster on you
  - to do evil to you
  rationale: The Hebrew verb can be rendered woodenly as 'do evil,' but in context it denotes covenant judgment/calamity rather than moral evil by God. The chosen rendering preserves the text's force while avoiding a misleading theological implication not intended by the Hebrew.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve theological tension without importing doctrinal claims.'
- issue: Anthropopathic language in וְלֹא נִחָמְתִּי
  chosen_reading: I did not relent
  alternative_readings:
  - I did not repent
  - I did not change my mind
  rationale: The verse speaks in accommodated human language about God's settled resolve in judgment. 'Relent' best communicates the covenantal-judicial sense without suggesting moral fault in God.
  doctrine_reference: 'Translation philosophy: readable modern English; do not import doctrinal claims the text does not make.'
