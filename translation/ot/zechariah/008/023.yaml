id: ZEC.8.23
reference: Zechariah 8:23
source:
  edition: WLC
  text: כֹּ֥ה אָמַר֮ יְהוָ֣ה צְבָאוֹת֒ בַּ/יָּמִ֣ים הָ/הֵ֔מָּה אֲשֶׁ֤ר יַחֲזִ֨יקוּ֙ עֲשָׂרָ֣ה אֲנָשִׁ֔ים מִ/כֹּ֖ל לְשֹׁנ֣וֹת הַ/גּוֹיִ֑ם וְֽ/הֶחֱזִ֡יקוּ בִּ/כְנַף֩ אִ֨ישׁ יְהוּדִ֜י לֵ/אמֹ֗ר נֵֽלְכָה֙ עִמָּ/כֶ֔ם כִּ֥י שָׁמַ֖עְנוּ אֱלֹהִ֥ים עִמָּ/כֶֽם׃ס
translation:
  text: 'Thus says Yahweh of Armies: In those days ten men from all the languages of the nations will take hold—yes, they will take hold of the edge of the garment of a Jewish man, saying, ‘Let us go with you, for we have heard that God is with you.’'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the LORD of Hosts.”
    reason: lexical_alternative
  - marker: b
    text: Literally “the edge/corner” (Hebrew כָּנָף) of a garment.
    reason: lexical_alternative
  - marker: c
    text: Or “a Judean man.”
    reason: alternative_reading
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving the covenant name in the traditional small-caps English equivalent rather than transliteration.
- source_word: צְבָאוֹת
  chosen: of Armies
  alternatives:
  - of Hosts
  lexicon: HALOT
  rationale: Translated as 'Armies' to communicate the concrete sense of צבאות in contemporary English. 'Hosts' is traditional but less transparent to modern readers.
- source_word: בַּיָּמִים הָהֵמָּה
  chosen: In those days
  alternatives:
  - In those times
  lexicon: HALOT
  rationale: Standard temporal idiom; 'days' preserves the Hebrew wording while remaining natural English.
- source_word: יַחֲזִיקוּ ... וְהֶחֱזִיקוּ
  chosen: will take hold—yes, they will take hold
  alternatives:
  - will seize ... and seize
  - will grasp ... and grasp
  lexicon: HALOT
  rationale: The repeated verb חזק in Hiphil is preserved with repetition for emphasis. The dash and 'yes' reflect the intensifying/restating force without sounding wooden.
- source_word: עֲשָׂרָה אֲנָשִׁים
  chosen: ten men
  alternatives:
  - ten people
  lexicon: HALOT
  rationale: Gender-accurate rendering per project philosophy. אֲנָשִׁים is masculine plural and here likely denotes representative men rather than a gender-neutral collective.
- source_word: מִכֹּל לְשֹׁנוֹת הַגּוֹיִם
  chosen: from every language of the nations
  alternatives:
  - from all the languages of the nations
  - from every tongue of the nations
  lexicon: HALOT
  rationale: לשונות literally means 'languages/tongues.' 'Every language of the nations' is idiomatic and preserves the multinational scope better than flattening to simply 'nations.'
- source_word: בִּכְנַף
  chosen: of the garment edge
  alternatives:
  - of the hem
  - of the corner of his garment
  - of the robe edge
  lexicon: HALOT
  rationale: כָּנָף literally means 'wing' and by extension an extremity, edge, or corner of a garment. 'Garment edge' is clear and avoids over-specifying a particular clothing type while preserving the concrete image.
- source_word: אִישׁ יְהוּדִי
  chosen: a Jewish man
  alternatives:
  - a Jew
  - a Judean man
  - a man who is a Jew
  lexicon: HALOT
  rationale: '''Jewish man'' is natural English and preserves both אִישׁ (''man'') and יְהוּדִי. ''Judean'' is possible in some contexts, but here the ethnic-religious sense fits the eschatological gathering of the nations.'
- source_word: נֵלְכָה עִמָּכֶם
  chosen: Let us go with you
  alternatives:
  - We will go with you
  lexicon: HALOT
  rationale: The cohortative expresses resolve/invitation; 'Let us go' best captures the volitional nuance.
- source_word: אֱלֹהִים עִמָּכֶם
  chosen: God is with you
  alternatives:
  - God is among you
  lexicon: HALOT
  rationale: The clause states divine presence with the addressed group. 'With you' is the most direct rendering of עִם.
