theological_decisions:
- issue: Rendering of יְהוָה צְבָאוֹת
  chosen_reading: Yahweh of Armies
  alternative_readings:
  - the LORD of Hosts
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Referent of יְהוּדִי
  chosen_reading: Jewish man
  alternative_readings:
  - Judean man
  - Jew
  rationale: In this prophetic context the term points to the people identified with Judah in a broader covenantal-ethnic sense, not merely geographic residence in Judea. The rendering avoids anachronistic narrowing while remaining readable.
  doctrine_reference: Translation philosophy §1, §4
