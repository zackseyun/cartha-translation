theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Rendering צְבָאוֹת
  chosen_reading: of hosts
  alternative_readings:
  - Almighty
  rationale: Although some English traditions use 'LORD Almighty,' the Hebrew title literally denotes hosts/armies. 'Of hosts' better preserves the source imagery and avoids importing a broader attribute term not explicit here.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
