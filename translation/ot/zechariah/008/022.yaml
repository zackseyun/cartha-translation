id: ZEC.8.22
reference: Zechariah 8:22
source:
  edition: WLC
  text: וּ/בָ֨אוּ עַמִּ֤ים רַבִּים֙ וְ/גוֹיִ֣ם עֲצוּמִ֔ים לְ/בַקֵּ֛שׁ אֶת יְהוָ֥ה צְבָא֖וֹת בִּ/ירוּשָׁלִָ֑ם וּ/לְ/חַלּ֖וֹת אֶת פְּנֵ֥י יְהוָֽה־־׃ס
translation:
  text: And many peoples and mighty nations will come to seek Yahweh of hosts in Jerusalem and to entreat the favor of Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and to seek the favor of the LORD.' The Hebrew idiom literally involves 'the face of the LORD' and means to entreat his favor or presence.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבָאוּ
  chosen: will come
  alternatives:
  - shall come
  - will arrive
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in prophetic discourse functions futurally in context; 'will come' is natural modern English and preserves the predictive sense.
- source_word: עַמִּים רַבִּים
  chosen: many peoples
  alternatives:
  - many nations
  - many peoples groups
  lexicon: HALOT
  rationale: עַמִּים is best rendered 'peoples' rather than 'nations' here to preserve the distinction from the following גּוֹיִם and to reflect multiple ethnic/population groups.
- source_word: וְגוֹיִם עֲצוּמִים
  chosen: and mighty nations
  alternatives:
  - and strong nations
  - and powerful Gentiles
  lexicon: HALOT
  rationale: גּוֹיִם commonly means 'nations'; עֲצוּמִים conveys strength or might. 'Mighty nations' is idiomatic and preserves the political-corporate sense better than 'Gentiles' in this prophetic context.
- source_word: לְבַקֵּשׁ אֶת יְהוָה צְבָאוֹת
  chosen: to seek the LORD of hosts
  alternatives:
  - to seek the LORD Almighty
  - to seek the LORD
  lexicon: HALOT
  rationale: 'בקשׁ with direct object means ''seek.'' The divine name follows the project''s default: יְהוָה = ''the LORD.'' צְבָאוֹת is translated ''of hosts'' to preserve the traditional military/cosmic title rather than flattening it to ''Almighty''.'
- source_word: בִּירוּשָׁלִָם
  chosen: in Jerusalem
  alternatives:
  - at Jerusalem
  lexicon: HALOT
  rationale: Simple locative preposition; 'in Jerusalem' is standard English and fits the pilgrimage setting.
- source_word: וּלְחַלּוֹת אֶת פְּנֵי יְהוָה
  chosen: and to entreat the favor of the LORD
  alternatives:
  - and to seek the favor of the LORD
  - and to appease the LORD
  - and to entreat the face/presence of the LORD
  lexicon: HALOT
  rationale: The idiom חלה את־פני means to appease, entreat, or seek favor from someone. 'Entreat the favor of' communicates the relational and supplicatory sense in clear English while accounting for the idiomatic use of 'face' as favor/presence.
