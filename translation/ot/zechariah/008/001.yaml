id: ZEC.8.1
reference: Zechariah 8:1
source:
  edition: WLC
  text: וַ/יְהִ֛י דְּבַר יְהוָ֥ה צְבָא֖וֹת לֵ/אמֹֽר־׃
translation:
  text: And the word of Yahweh of hosts came, saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or, more formally, ''And it happened: the word of the LORD of hosts came, saying.'''
    reason: lexical_alternative
  - marker: b
    text: '''Hosts'' may also be rendered ''armies''; the title emphasizes the LORD''s rule over heavenly and earthly forces.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: And ... came
  alternatives:
  - And it happened
  - And it came to pass
  lexicon: HALOT
  rationale: The waw-consecutive of היה functions here as a narrative/sequential introduction. In English, the idiom is best carried by attaching the sense of occurrence to the following clause ('the word ... came') rather than preserving a wooden 'it happened.' This keeps the formula natural while retaining the discourse-linking force of the Hebrew waw.
- source_word: דְּבַר
  chosen: the word
  alternatives:
  - a word
  - message
  lexicon: HALOT
  rationale: In prophetic formulae, דְּבַר commonly denotes the divine word/message. 'The word' preserves the established formula and the definiteness implied by the construct with the divine name.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: צְבָאוֹת
  chosen: of hosts
  alternatives:
  - of armies
  - Almighty
  lexicon: HALOT
  rationale: In the title יְהוָה צְבָאוֹת, 'of hosts' is the most transparent and established rendering, preserving the military/cosmic imagery better than the interpretive 'Almighty.'
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - thus saying
  - to say
  lexicon: HALOT
  rationale: This infinitive introduces the following divine speech in standard prophetic style. 'Saying' is the most natural and sufficiently formal English equivalent.
