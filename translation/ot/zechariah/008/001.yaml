theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Rendering the title יְהוָה צְבָאוֹת
  chosen_reading: Yahweh of hosts
  alternative_readings:
  - the LORD of armies
  - the LORD Almighty
  rationale: The Hebrew title is retained in a relatively formal equivalent to preserve its theological and literary weight. 'Almighty' is more interpretive and does not directly represent צְבָאוֹת.
