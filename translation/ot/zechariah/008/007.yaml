id: ZEC.8.7
reference: Zechariah 8:7
source:
  edition: WLC
  text: כֹּ֤ה אָמַר֙ יְהוָ֣ה צְבָא֔וֹת הִנְ/נִ֥י מוֹשִׁ֛יעַ אֶת עַמִּ֖/י מֵ/אֶ֣רֶץ מִזְרָ֑ח וּ/מֵ/אֶ֖רֶץ מְב֥וֹא הַ/שָּֽׁמֶשׁ־׃
translation:
  text: 'Thus says Yahweh of hosts: Behold, I will save my people from the land of the east and from the land of the setting of the sun.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I will save my people.' The Hebrew participle can express imminent or certain future action in prophetic speech.
    reason: lexical_alternative
  - marker: b
    text: Literally 'from the land of the east and from the land of the setting of the sun,' a merism for places far east and far west.
    reason: cultural_note
lexical_decisions:
- source_word: כֹּה
  chosen: Thus
  alternatives:
  - So
  - This is what
  lexicon: HALOT
  rationale: Introduces a prophetic declaration formula. 'Thus' preserves the formal prophetic tone in natural English.
- source_word: אָמַר
  chosen: says
  alternatives:
  - said
  lexicon: HALOT
  rationale: In the prophetic messenger formula כֹּה אָמַר, English idiom commonly uses the present 'says' for an ongoing authoritative declaration.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving reverential convention and established covenantal sense.
- source_word: צְבָאוֹת
  chosen: of hosts
  alternatives:
  - of armies
  - of heavenly armies
  lexicon: HALOT
  rationale: Traditional but still intelligible rendering of the divine title יְהוָה צְבָאוֹת. 'Hosts' preserves the breadth of heavenly and earthly forces under God's command better than the narrower 'armies'.
- source_word: הִנְנִי
  chosen: Behold
  alternatives:
  - Look
  - See
  lexicon: HALOT
  rationale: Marks emphatic divine self-presentation and imminent action. 'Behold' best preserves the solemn prophetic register, though somewhat elevated.
- source_word: מוֹשִׁיעַ
  chosen: am saving
  alternatives:
  - will save
  - am about to save
  - deliver
  lexicon: HALOT
  rationale: The participle expresses imminent or ongoing action from the speaker's standpoint. 'Am saving' preserves that aspect better than a simple future, while remaining idiomatic. 'Deliver' is possible but 'save' better reflects the lexical root ישׁע.
- source_word: עַמִּי
  chosen: my people
  lexicon: HALOT
  rationale: Straightforward covenantal designation; no expansion beyond the Hebrew.
- source_word: מֵאֶרֶץ מִזְרָח
  chosen: from the land of the east
  alternatives:
  - from the eastern land
  - from the land of sunrise
  lexicon: HALOT
  rationale: Keeps the singular 'land' and directional sense explicit. The phrase is geographic and likely representative rather than naming a specific nation.
- source_word: וּמֵאֶרֶץ מְבוֹא הַשָּׁמֶשׁ
  chosen: and from the land of the setting of the sun
  alternatives:
  - and from the western land
  - and from the land where the sun sets
  lexicon: HALOT
  rationale: A formally close rendering of the idiom for the west. Chosen to preserve the poetic east/west merism rather than flattening it to a bare compass term.
