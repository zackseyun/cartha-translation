theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Aspect of מוֹשִׁיעַ in divine promise
  chosen_reading: am saving
  alternative_readings:
  - will save
  - am about to save
  rationale: The Hebrew participle can function futurally in prophetic discourse, but the present-progressive English better preserves the immediacy and certainty of God's declared action without overstating a temporal nuance.
