theological_decisions:
- issue: Rendering divine jealousy
  chosen_reading: Retain 'jealous' language for YHWH rather than softening to 'concern' or only 'zeal.'
  alternative_readings:
  - I am zealous for Zion
  - I care deeply for Zion
  rationale: The Hebrew root קנא explicitly carries jealousy/zeal language, and the verse intensifies it with a cognate noun. Preserving 'jealous' maintains the covenantal and theological force of God's exclusive claim and passionate commitment, without importing sinful human jealousy into the text.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve theological tension rather than resolve it.'
