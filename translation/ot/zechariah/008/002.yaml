id: ZEC.8.2
reference: Zechariah 8:2
source:
  edition: WLC
  text: כֹּ֤ה אָמַר֙ יְהוָ֣ה צְבָא֔וֹת קִנֵּ֥אתִי לְ/צִיּ֖וֹן קִנְאָ֣ה גְדוֹלָ֑ה וְ/חֵמָ֥ה גְדוֹלָ֖ה קִנֵּ֥אתִי לָֽ/הּ׃
translation:
  text: 'Thus says Yahweh of hosts: I am jealous for Zion with great jealousy, and with great wrath I am jealous for her.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I am zealous for Zion with great zeal.' The Hebrew uses the same root for both 'am jealous' and 'jealousy,' emphasizing intense covenantal passion.
    reason: lexical_alternative
  - marker: b
    text: '''The LORD'' renders the divine name YHWH.'
    reason: alternative_reading
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: צְבָאוֹת
  chosen: of hosts
  alternatives:
  - of armies
  lexicon: HALOT
  rationale: In the title יְהוָה צְבָאוֹת, 'hosts' is the established and semantically broad rendering, encompassing heavenly and earthly armies without narrowing the sense.
- source_word: קִנֵּאתִי
  chosen: I am jealous
  alternatives:
  - I have been jealous
  - I am zealous
  lexicon: HALOT
  rationale: The verb קנא in this context expresses YHWH's ardent covenantal jealousy/zeal for Zion. 'I am jealous' gives natural English and fits the prophetic declaration, while preserving the emotional and covenantal force better than a weaker paraphrase.
- source_word: לְצִיּוֹן
  chosen: for Zion
  alternatives:
  - toward Zion
  lexicon: HALOT
  rationale: The preposition ל with קנא here is best represented idiomatically as 'for Zion,' expressing directed concern and possessive zeal.
- source_word: קִנְאָה גְדוֹלָה
  chosen: with great jealousy
  alternatives:
  - with great zeal
  lexicon: HALOT
  rationale: The cognate noun plus adjective intensifies the preceding verb. 'Great jealousy' preserves the lexical link with קִנֵּאתִי and keeps the covenantal nuance explicit.
- source_word: וְחֵמָה גְדוֹלָה
  chosen: and with great wrath
  alternatives:
  - and with great fury
  - and with great anger
  lexicon: HALOT
  rationale: חֵמָה denotes burning anger or wrath. 'Wrath' best conveys the intensity and divine judicial tone here, while 'great' preserves the adjective.
- source_word: לָהּ
  chosen: for her
  alternatives:
  - for it
  lexicon: HALOT
  rationale: The feminine singular pronoun refers back to Zion, which is grammatically feminine and often personified as a woman/city. 'Her' preserves that personification in natural English.
