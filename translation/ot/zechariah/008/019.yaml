id: ZEC.8.19
reference: Zechariah 8:19
source:
  edition: WLC
  text: כֹּֽה אָמַ֞ר יְהוָ֣ה צְבָא֗וֹת צ֣וֹם הָ/רְבִיעִ֡י וְ/צ֣וֹם הַ/חֲמִישִׁי֩ וְ/צ֨וֹם הַ/שְּׁבִיעִ֜י וְ/צ֣וֹם הָ/עֲשִׂירִ֗י יִהְיֶ֤ה לְ/בֵית יְהוּדָה֙ לְ/שָׂשׂ֣וֹן וּ/לְ/שִׂמְחָ֔ה וּֽ/לְ/מֹעֲדִ֖ים טוֹבִ֑ים וְ/הָ/אֱמֶ֥ת וְ/הַ/שָּׁל֖וֹם אֱהָֽבוּ־־׃פ
translation:
  text: 'Thus says Yahweh of hosts: The fast of the fourth month, and the fast of the fifth, and the fast of the seventh, and the fast of the tenth, shall become for the house of Judah joy and gladness and good appointed feasts. Therefore love truth and peace.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'The fourth fast, the fifth fast, the seventh fast, and the tenth fast.' The Hebrew names the fasts by ordinal number, likely referring to months.
    reason: lexical_alternative
  - marker: b
    text: Or, 'shall be for the house of Judah.' The Hebrew verb is simply 'shall be'; 'shall become' brings out the contextual sense of transformation from fasting to celebration.
    reason: lexical_alternative
  - marker: c
    text: '''Appointed feasts'' translates a term often used for set times or festivals, especially sacred observances.'
    reason: cultural_note
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: צְבָאוֹת
  chosen: of hosts
  alternatives:
  - of armies
  lexicon: HALOT
  rationale: The established title 'the LORD of hosts' is both accurate and natural in English; 'hosts' preserves the breadth of heavenly and earthly armies without over-specifying.
- source_word: צ֣וֹם ... הָרְבִיעִי / הַחֲמִישִׁי / הַשְּׁבִיעִי / הָעֲשִׂירִי
  chosen: The fast of the fourth month, and the fast of the fifth, and the fast of the seventh, and the fast of the tenth
  alternatives:
  - The fourth fast, the fifth fast, the seventh fast, and the tenth fast
  lexicon: HALOT
  rationale: The Hebrew repeats 'fast' with each ordinal. Rendering the implied months in English clarifies the idiom for modern readers while preserving the repeated structure and likely reference to known commemorative fasts.
- source_word: יִהְיֶה
  chosen: shall become
  alternatives:
  - shall be
  lexicon: HALOT
  rationale: Although the verb is simply 'shall be,' in context it marks a transformation of these fasts into occasions of celebration. 'Shall become' brings out that contextual force without departing from the sense.
- source_word: לְבֵית יְהוּדָה
  chosen: for the house of Judah
  alternatives:
  - to the house of Judah
  - for Judah
  lexicon: HALOT
  rationale: '''House of Judah'' preserves the covenantal-corporate sense of the Hebrew better than the flatter ''Judah.'' ''For'' fits the benefactive sense of ל in context.'
- source_word: לְשָׂשׂוֹן
  chosen: joy
  alternatives:
  - gladness
  - rejoicing
  lexicon: HALOT
  rationale: A concise and natural rendering. It is paired with שִׂמְחָה, so using 'joy' here helps preserve a slight distinction in the doublet.
- source_word: וּלְשִׂמְחָה
  chosen: gladness
  alternatives:
  - joy
  - mirth
  lexicon: HALOT
  rationale: Chosen to complement 'joy' for שָׂשׂוֹן and preserve the Hebrew's rhetorical pairing without collapsing both nouns into the same English word.
- source_word: וּלְמֹעֲדִים טוֹבִים
  chosen: and good appointed feasts
  alternatives:
  - and cheerful festivals
  - and good appointed times
  - and festive seasons
  lexicon: HALOT
  rationale: מוֹעֵד often denotes an appointed time or festival, especially in sacred contexts. 'Appointed feasts' preserves the cultic and calendrical nuance better than the generic 'holidays' or merely emotional 'festivals.' 'Good' translates טוֹבִים straightforwardly.
- source_word: וְהָאֱמֶת וְהַשָּׁלוֹם אֱהָבוּ
  chosen: Therefore love truth and peace
  alternatives:
  - But love truth and peace
  - And love truth and peace
  lexicon: HALOT
  rationale: The clause is formally asyndetic except for the objects, but in English a connective helps convey the exhortational turn from promise to response. 'Therefore' captures the practical implication without overstating causality. 'Truth and peace' are rendered straightforwardly.
- source_word: אֱמֶת
  chosen: truth
  alternatives:
  - faithfulness
  lexicon: HALOT
  rationale: In this ethical exhortation, 'truth' is the most direct rendering and pairs naturally with 'peace.' 'Faithfulness' is possible in some contexts but is less likely here.
- source_word: שָׁלוֹם
  chosen: peace
  alternatives:
  - wholeness
  - well-being
  lexicon: HALOT
  rationale: '''Peace'' is the standard and contextually fitting rendering in an ethical-social exhortation. Broader nuances such as wholeness are present but need not be imported into the main text.'
