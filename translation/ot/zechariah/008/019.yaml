theological_decisions:
- issue: Rendering the transformation of commemorative fasts
  chosen_reading: The fasts are presented as becoming occasions of covenantal celebration for Judah, without specifying the historical mechanism in the translation.
  alternative_readings:
  - The fasts simply 'shall be' joy and gladness
  - The fasts are abolished and replaced by feasts
  rationale: The Hebrew states that these fasts will be for Judah joy, gladness, and good appointed feasts. The translation reflects transformation in function without importing a stronger doctrinal claim that the observances are abolished.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Force of the final imperative
  chosen_reading: 'The exhortation is rendered as a direct ethical command: ''Therefore love truth and peace.'''
  alternative_readings:
  - And love truth and peace
  - But love truth and peace
  rationale: The Hebrew imperative is clear. Adding 'Therefore' in English makes the discourse movement intelligible while preserving the command and avoiding theological over-reading.
  doctrine_reference: Translation philosophy §§5, 6
