theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Rendering צְבָאוֹת in the divine title
  chosen_reading: the LORD of hosts
  alternative_readings:
  - the LORD Almighty
  - the LORD of armies
  rationale: No doctrinal dispute is at stake, but the title carries theological weight. 'Hosts' preserves the traditional breadth of heavenly and earthly forces under God's command without interpretive narrowing.
