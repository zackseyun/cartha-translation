id: ZEC.8.17
reference: Zechariah 8:17
source:
  edition: WLC
  text: וְ/אִ֣ישׁ אֶת רָעַ֣ת רֵעֵ֗/הוּ אַֽל תַּחְשְׁבוּ֙ בִּ/לְבַבְ/כֶ֔ם וּ/שְׁבֻ֥עַת שֶׁ֖קֶר אַֽל תֶּאֱהָ֑בוּ כִּ֧י אֶת כָּל אֵ֛לֶּה אֲשֶׁ֥ר שָׂנֵ֖אתִי נְאֻם יְהוָֽה׀־־־־־־׃ס
translation:
  text: And let no man devise evil against his neighbor in his heart, and do not love a false oath, for all these are what I hate, declares Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'And each man, do not plot the evil of his neighbor in your hearts.' The Hebrew addresses the community in the plural while speaking distributively of each individual.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִישׁ
  chosen: let no man
  alternatives:
  - and each man
  - and no one
  lexicon: HALOT
  rationale: אִישׁ is singular masculine 'man.' In this prohibitive context with following 2mp verbs, English idiom is best captured by 'let no man,' preserving the gender-accurate representative force rather than flattening to an abstract paraphrase.
- source_word: רָעַת רֵעֵהוּ
  chosen: evil ... against his neighbor
  alternatives:
  - harm ... against his companion
  - evil ... against his friend
  lexicon: HALOT
  rationale: רָעָה here denotes evil/harm intended toward another; רֵעַ commonly means neighbor/associate. 'Neighbor' fits prophetic ethical context and preserves interpersonal covenantal force.
- source_word: תַּחְשְׁבוּ בִּלְבַבְכֶם
  chosen: devise ... in his heart
  alternatives:
  - think ... in your hearts
  - plot ... in your hearts
  lexicon: HALOT
  rationale: חשב can mean think, plan, or devise. In context of prohibited evil against a neighbor, 'devise' conveys intentional inward planning better than the weaker 'think.' The Hebrew has plural 'your hearts' addressing the community, but English smooths the distributive sense with singular 'his heart' after 'no man.'
- source_word: שְׁבֻעַת שֶׁקֶר
  chosen: a false oath
  alternatives:
  - an oath of falsehood
  - perjury
  lexicon: HALOT
  rationale: The construct phrase literally means 'oath of falsehood.' 'False oath' is natural English and preserves the legal-ethical sense without overinterpreting as the narrower juridical term 'perjury.'
- source_word: תֶּאֱהָבוּ
  chosen: do not love
  alternatives:
  - do not delight in
  - do not cherish
  lexicon: HALOT
  rationale: אהב is straightforwardly 'love.' Retaining 'love' preserves the moral force that the issue is not merely uttering false oaths but valuing or embracing them.
- source_word: כִּי אֶת כָּל אֵלֶּה אֲשֶׁר שָׂנֵאתִי
  chosen: for all these are what I hate
  alternatives:
  - for I hate all these things
  - because all these are things that I hate
  lexicon: HALOT
  rationale: The clause emphasizes the totality of the prohibited behaviors. 'All these are what I hate' is idiomatic and keeps the focus on the listed acts as the object of divine hatred.
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: נְאֻם is the standard prophetic formula. 'Declares the LORD' is established, clear English. יְהוָה follows the doctrinal default rendering 'the LORD' rather than a transliteration.
