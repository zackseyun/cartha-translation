id: ZEC.8.3
reference: Zechariah 8:3
source:
  edition: WLC
  text: כֹּ֚ה אָמַ֣ר יְהוָ֔ה שַׁ֚בְתִּי אֶל צִיּ֔וֹן וְ/שָׁכַנְתִּ֖י בְּ/ת֣וֹךְ יְרֽוּשָׁלִָ֑ם וְ/נִקְרְאָ֤ה יְרוּשָׁלִַ֨ם֙ עִ֣יר הָֽ/אֱמֶ֔ת וְ/הַר יְהוָ֥ה צְבָא֖וֹת הַ֥ר הַ/קֹּֽדֶשׁ־־־׃ס
translation:
  text: 'Thus says Yahweh: I have returned to Zion and will dwell in the midst of Jerusalem, and Jerusalem will be called the City of Truth, and the mountain of Yahweh of Armies, the Holy Mountain.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the mountain of the LORD of Hosts.' The Hebrew title צְבָאוֹת is traditionally rendered 'Hosts'; 'Armies' makes the meaning more transparent in modern English.
    reason: lexical_alternative
  - marker: b
    text: '''City of Truth'' may also be understood as ''city of faithfulness,'' since the Hebrew אֱמֶת can denote truth, reliability, or faithfulness.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּה אָמַר יְהוָה
  chosen: Thus says the LORD
  alternatives:
  - This is what the LORD says
  - So says the LORD
  lexicon: HALOT
  rationale: Standard prophetic messenger formula. יְהוָה is rendered 'the LORD' per doctrine for the divine name.
- source_word: שַׁבְתִּי
  chosen: I have returned
  alternatives:
  - I return
  - I have come back
  lexicon: HALOT
  rationale: Qal perfect 1cs naturally conveys completed action with present relevance in prophetic discourse. 'Have returned' fits the restoration context better than a simple present.
- source_word: אֶל צִיּוֹן
  chosen: to Zion
  alternatives:
  - to Tsion
  lexicon: HALOT
  rationale: צִיּוֹן is transliterated as the standard English place-name 'Zion.' The preposition אֶל is straightforwardly directional.
- source_word: וְשָׁכַנְתִּי
  chosen: and will dwell
  alternatives:
  - and I will live
  - and I will tabernacle
  lexicon: HALOT
  rationale: 'Though formally a perfect with prefixed conjunction, in context it functions prospectively after ''I have returned'': the return issues in God''s ongoing dwelling. ''Dwell'' preserves the covenantal/theological resonance of שכן without over-technical wording.'
- source_word: בְּתוֹךְ יְרוּשָׁלִָם
  chosen: in the midst of Jerusalem
  alternatives:
  - within Jerusalem
  - in Jerusalem
  lexicon: HALOT
  rationale: בְּתוֹךְ is more specific than simple 'in'; 'in the midst of' preserves the sense of central, present indwelling.
- source_word: וְנִקְרְאָה יְרוּשָׁלִַם
  chosen: and Jerusalem will be called
  alternatives:
  - and Jerusalem shall be called
  - and one will call Jerusalem
  lexicon: HALOT
  rationale: 'Niphal imperfect 3fs is naturally rendered as a passive future: Jerusalem will bear this designation.'
- source_word: עִיר הָאֱמֶת
  chosen: the City of Truth
  alternatives:
  - the faithful city
  - the city of faithfulness
  - the true city
  lexicon: HALOT
  rationale: אֱמֶת can denote truth, faithfulness, or reliability. 'Truth' is the most direct lexical rendering and suits the renewed moral character of Jerusalem; alternatives are possible but less literal.
- source_word: הַר יְהוָה צְבָאוֹת
  chosen: the mountain of the LORD of Armies
  alternatives:
  - the mountain of the LORD of Hosts
  lexicon: HALOT
  rationale: צְבָאוֹת is translated rather than transliterated for clarity and consistency with source meaning. 'LORD of Armies' is a transparent rendering of the divine title.
- source_word: הַר הַקֹּדֶשׁ
  chosen: the Holy Mountain
  alternatives:
  - the sacred mountain
  lexicon: HALOT
  rationale: A straightforward construct-like apposition identifying the LORD's mountain as holy. 'Holy Mountain' preserves biblical diction without archaism.
