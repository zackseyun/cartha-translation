theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Temporal force of שַׁבְתִּי ... וְשָׁכַנְתִּי
  chosen_reading: I have returned ... and will dwell
  alternative_readings:
  - I return ... and dwell
  - I have returned ... and have dwelt
  rationale: The verse combines a completed return with the promised result of divine indwelling in restored Jerusalem. This preserves the prophetic tension of inaugurated restoration without flattening both verbs into the same time reference.
  doctrine_reference: DOCTRINE.md Translation philosophy §3
