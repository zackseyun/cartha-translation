id: ZEC.8.6
reference: Zechariah 8:6
source:
  edition: WLC
  text: כֹּ֤ה אָמַר֙ יְהוָ֣ה צְבָא֔וֹת כִּ֣י יִפָּלֵ֗א בְּ/עֵינֵי֙ שְׁאֵרִית֙ הָ/עָ֣ם הַ/זֶּ֔ה בַּ/יָּמִ֖ים הָ/הֵ֑ם גַּם בְּ/עֵינַ/י֙ יִפָּלֵ֔א נְאֻ֖ם יְהוָ֥ה צְבָאֽוֹת־׃פ
translation:
  text: 'Thus says Yahweh of hosts: If it is marvelous in the eyes of the remnant of this people in those days, should it also be marvelous in my eyes? declares Yahweh of hosts.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'too difficult' or 'impossible.' The Hebrew verb can describe something extraordinary or beyond human ability.
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּה אָמַר
  chosen: Thus says
  alternatives:
  - This is what ... says
  lexicon: HALOT
  rationale: Standard prophetic messenger formula; 'Thus says' preserves the formal prophetic cadence without archaic excess.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine default for the divine name, following established English convention and reverential substitution.
- source_word: צְבָאוֹת
  chosen: of hosts
  alternatives:
  - of armies
  lexicon: HALOT
  rationale: Traditional but still intelligible rendering of the divine title; preserves the breadth of heavenly/earthly forces better than the narrower 'armies.'
- source_word: כִּי
  chosen: If
  alternatives:
  - For
  - Though
  - Because
  lexicon: HALOT
  rationale: Here כִּי introduces a conditional or concessive thought tied to the rhetorical question. 'If' best fits the syntax with the following repeated verb and the implied apodosis.
- source_word: יִפָּלֵא
  chosen: seems too marvelous
  alternatives:
  - is too difficult
  - is extraordinary
  - is beyond reach
  lexicon: HALOT
  rationale: The Niphal of פלא can denote being extraordinary, wonderful, or too difficult. In this restoration context, the sense is not mere cognitive difficulty but something astonishing beyond expectation. 'Seems too marvelous' preserves both the experiential and rhetorical force.
- source_word: בְּעֵינֵי
  chosen: in the eyes of
  alternatives:
  - to
  - in the judgment of
  lexicon: HALOT
  rationale: A literal idiom that remains natural in English and preserves the evaluative perspective expressed in Hebrew.
- source_word: שְׁאֵרִית
  chosen: the remnant
  alternatives:
  - the survivors
  - the remainder
  lexicon: HALOT
  rationale: '''Remnant'' is the established prophetic term with theological significance in the Twelve, referring to the preserved people after judgment.'
- source_word: הָעָם הַזֶּה
  chosen: of this people
  alternatives:
  - of these people
  lexicon: HALOT
  rationale: Singular 'people' matches the Hebrew collective noun and sounds natural in English.
- source_word: בַּיָּמִים הָהֵם
  chosen: in those days
  alternatives:
  - at that time
  lexicon: HALOT
  rationale: Conventional prophetic temporal expression; 'in those days' preserves the plural form and eschatological/restoration resonance.
- source_word: גַּם
  chosen: also
  alternatives:
  - even
  - likewise
  lexicon: HALOT
  rationale: Marks the comparison between the people's perception and the Lord's; 'also' is the most straightforward rendering.
- source_word: בְּעֵינַי
  chosen: in my eyes
  alternatives:
  - to me
  - in my judgment
  lexicon: HALOT
  rationale: Retains the parallelism with 'in the eyes of the remnant' and preserves the rhetorical symmetry.
- source_word: נְאֻם יְהוָה צְבָאוֹת
  chosen: declares the LORD of hosts
  alternatives:
  - oracle of the LORD of hosts
  - says the LORD of hosts
  lexicon: HALOT
  rationale: Natural modern English equivalent for the prophetic affirmation formula, while preserving solemnity.
