theological_decisions:
- issue: Force of the rhetorical question in relation to divine ability
  chosen_reading: 'Rendered as a rhetorical question: ''should it also seem too marvelous in my eyes?'''
  alternative_readings:
  - 'Rendered as a flat statement: ''it will also be too marvelous in my eyes'''
  rationale: The verse contrasts human perception with God's perspective in order to deny that the promised restoration is impossible for him. English punctuation as a rhetorical question best conveys the implied negative answer and avoids suggesting any limitation in God.
  doctrine_reference: Preserve theological tension rather than resolve it; do not import doctrinal claims the text does not make.
