theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Rendering צְבָאוֹת
  chosen_reading: Armies
  alternative_readings:
  - Hosts
  rationale: This is a lexical rather than doctrinally disputed issue, but it carries theological imagery. 'Armies' communicates the martial and heavenly-host sense more transparently for modern readers while preserving divine sovereignty imagery.
