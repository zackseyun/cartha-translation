id: ZEC.8.9
reference: Zechariah 8:9
source:
  edition: WLC
  text: כֹּֽה אָמַר֮ יְהוָ֣ה צְבָאוֹת֒ תֶּחֱזַ֣קְנָה יְדֵי/כֶ֔ם הַ/שֹּֽׁמְעִים֙ בַּ/יָּמִ֣ים הָ/אֵ֔לֶּה אֵ֖ת הַ/דְּבָרִ֣ים הָ/אֵ֑לֶּה מִ/פִּי֙ הַ/נְּבִיאִ֔ים אֲ֠שֶׁר בְּ/י֞וֹם יֻסַּ֨ד בֵּית יְהוָ֧ה צְבָא֛וֹת הַ/הֵיכָ֖ל לְ/הִבָּנֽוֹת־־׃
translation:
  text: 'Thus says Yahweh of Armies: Let your hands be strong, you who in these days are hearing these words from the mouth of the prophets who were present on the day the house of Yahweh of Armies was founded for the temple to be built.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the LORD of Hosts.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'from the mouth of the prophets,' an idiom for receiving their spoken message.
    reason: lexical_alternative
  - marker: c
    text: Or 'who spoke on the day the house of the LORD of Armies was founded, the temple to be built.' The Hebrew relative clause is compact and may be construed slightly differently in English.
    reason: alternative_reading
lexical_decisions:
- source_word: כֹּה אָמַר
  chosen: Thus says
  alternatives:
  - This is what ... says
  lexicon: HALOT
  rationale: Standard prophetic messenger formula. 'Thus says' preserves the formal prophetic cadence without sounding archaic beyond normal biblical English.
- source_word: יְהוָה צְבָאוֹת
  chosen: the LORD of Armies
  alternatives:
  - the LORD of Hosts
  lexicon: HALOT
  rationale: Per doctrine, יְהוָה is rendered 'the LORD.' צְבָאוֹת is translated rather than transliterated; 'Armies' is more transparent to modern readers than 'Hosts' while preserving the martial/cosmic sense.
- source_word: תֶּחֱזַקְנָה יְדֵיכֶם
  chosen: Let your hands be strong
  alternatives:
  - Strengthen your hands
  - May your hands be strong
  lexicon: HALOT
  rationale: The Hebrew idiom speaks of strengthened hands as a call to courage and resolve for work. 'Let your hands be strong' preserves the idiom while reading naturally in English.
- source_word: הַשֹּׁמְעִים
  chosen: you who ... are hearing
  alternatives:
  - you who hear
  - you who are listening
  lexicon: HALOT
  rationale: The participle identifies the audience as the ones presently hearing. 'Are hearing' preserves the participial/imperfective force better than a simple imperative-like 'hearers.'
- source_word: בַּיָּמִים הָאֵלֶּה
  chosen: in these days
  alternatives:
  - these days
  - at this time
  lexicon: HALOT
  rationale: A straightforward temporal phrase; 'in these days' is close to the Hebrew and idiomatic.
- source_word: אֵת הַדְּבָרִים הָאֵלֶּה
  chosen: these words
  alternatives:
  - these things
  - these messages
  lexicon: HALOT
  rationale: דְּבָרִים can mean 'words' or 'matters'; here the immediate context is hearing prophetic speech, so 'words' is the most direct rendering.
- source_word: מִפִּי הַנְּבִיאִים
  chosen: from the mouth of the prophets
  alternatives:
  - from the prophets
  - from the lips of the prophets
  lexicon: HALOT
  rationale: The Hebrew literally says 'from the mouth of.' Retaining the expression preserves the vividness and prophetic-oracular feel, while remaining intelligible in English.
- source_word: אֲשֶׁר בְּיוֹם יֻסַּד
  chosen: who were there on the day ... was founded
  alternatives:
  - who spoke on the day ... was founded
  - who were present when ... was founded
  lexicon: HALOT
  rationale: The relative clause is compressed in Hebrew and modifies 'the prophets.' The sense is that these are the prophets speaking from the time when the temple project was founded. 'Who were there on the day' makes the relation explicit in natural English without adding more than the context requires.
- source_word: יֻסַּד
  chosen: was founded
  alternatives:
  - was laid
  - was established
  lexicon: HALOT
  rationale: The passive of יסד refers to founding/laying a foundation. 'Was founded' works well with 'house'; the temple-building nuance is then clarified by the following infinitive clause.
- source_word: בֵּית יְהוָה צְבָאוֹת
  chosen: the house of the LORD of Armies
  alternatives:
  - the house of the LORD of Hosts
  lexicon: HALOT
  rationale: בית here refers to the temple as the LORD's house. 'House' is retained because the next appositional term 'temple' clarifies the referent.
- source_word: הַהֵיכָל
  chosen: the temple
  alternatives:
  - the sanctuary
  - the palace
  lexicon: HALOT
  rationale: הֵיכָל in this context clearly refers to the temple building. 'Temple' is the natural English equivalent.
- source_word: לְהִבָּנוֹת
  chosen: that the temple might be built
  alternatives:
  - to be built
  - for building
  lexicon: HALOT
  rationale: The infinitive expresses purpose/result with respect to the founding of the house. 'That the temple might be built' makes the relation explicit and natural in English.
