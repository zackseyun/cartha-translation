id: ZEC.8.11
reference: Zechariah 8:11
source:
  edition: WLC
  text: וְ/עַתָּ֗ה לֹ֣א כַ/יָּמִ֤ים הָ/רִֽאשֹׁנִים֙ אֲנִ֔י לִ/שְׁאֵרִ֖ית הָ/עָ֣ם הַ/זֶּ֑ה נְאֻ֖ם יְהוָ֥ה צְבָאֽוֹת׃
translation:
  text: But now I will not be to the remnant of this people as in the former days, declares Yahweh of Armies.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'I will not deal with the remnant of this people as in the former days.' The Hebrew is elliptical, leaving the exact nuance implied by the context.
    reason: alternative_reading
  - marker: b
    text: 'Traditional rendering: ''the LORD of hosts.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  chosen: But now
  alternatives:
  - And now
  - Now
  lexicon: HALOT
  rationale: Marks a contrast with the preceding description of former hardship and introduces a new divine stance. 'But now' best captures the adversative force in context.
- source_word: לֹא
  chosen: not
  lexicon: HALOT
  rationale: Simple negation governing the comparison that follows.
- source_word: כַיָּמִים הָרִאשֹׁנִים
  chosen: as in the former days
  alternatives:
  - as in the earlier days
  - like the first days
  lexicon: HALOT
  rationale: The prefixed כ marks comparison. 'Former days' is idiomatic English and fits the contrast with the present change in God's dealings.
- source_word: אֲנִי
  chosen: I
  lexicon: HALOT
  rationale: Explicit pronoun adds emphasis to the divine speaker; retained in English as the subject of 'will be.'
- source_word: לִשְׁאֵרִית
  chosen: to the remnant
  alternatives:
  - for the remnant
  lexicon: HALOT
  rationale: The preposition ל with היה is naturally rendered 'be to' or 'be for.' 'To the remnant' preserves the Hebrew construction while remaining understandable. 'Remnant' is theologically and contextually important in prophetic literature and should not be flattened to 'rest'.
- source_word: הָעָם הַזֶּה
  chosen: of this people
  alternatives:
  - of these people
  lexicon: HALOT
  rationale: Singular 'people' matches the Hebrew collective noun עָם. The phrase modifies 'remnant' as a genitive construction.
- source_word: נְאֻם יְהוָה צְבָאוֹת
  chosen: declares the LORD of Armies
  alternatives:
  - says the LORD of Armies
  - declares the LORD of hosts
  lexicon: HALOT
  rationale: נְאֻם is a prophetic declaration formula well rendered 'declares.' Per doctrine, יְהוָה is rendered 'the LORD.' צְבָאוֹת is translated rather than transliterated; 'of Armies' preserves the martial/cosmic sense more transparently than traditional 'of hosts'.
