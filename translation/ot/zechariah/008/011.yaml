theological_decisions:
- issue: Implicit predicate after 'I will not be to the remnant of this people as in the former days'
  chosen_reading: Leave the statement open-ended in English without supplying 'against them' or 'as before' beyond the comparison phrase.
  alternative_readings:
  - I will not deal with the remnant of this people as in the former days
  - I am not like I was in the former days toward the remnant of this people
  rationale: The Hebrew omits an explicit predicate after 'I'; the sense is clarified by the surrounding context of changed divine treatment, but the translation should not over-specify what the text leaves implicit. Rendering 'I will not be to...' preserves the terseness and theological tension of the Hebrew while remaining intelligible.
  doctrine_reference: Preserve theological tension rather than resolve it.
