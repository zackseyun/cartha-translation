theological_decisions:
- issue: Scope of אֶרֶץ in the vision
  chosen_reading: earth
  alternative_readings:
  - land
  rationale: The verse belongs to a vision of divine agents sent out in multiple directions,
    which favors a world-encompassing sense. Rendering 'earth' preserves the cosmic
    scope without adding doctrinal interpretation.
- issue: Identity of הָאֲמֻצִּים
  chosen_reading: the strong ones
  alternative_readings:
  - the dappled ones
  - the bay ones
  rationale: The MT vocalization points to a strength adjective, so the main text
    follows the Hebrew as given. Because the immediate context discusses horse teams
    by appearance, the color-based alternative is preserved in a footnote rather than
    resolved silently.
  doctrine_reference: Translation philosophy §1, §3, §5
