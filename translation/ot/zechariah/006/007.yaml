id: ZEC.6.7
reference: Zechariah 6:7
source:
  edition: WLC
  text: וְ/הָ/אֲמֻצִּ֣ים יָצְא֗וּ וַ/יְבַקְשׁוּ֙ לָ/לֶ֨כֶת֙ לְ/הִתְהַלֵּ֣ך בָּ/אָ֔רֶץ
    וַ/יֹּ֕אמֶר לְכ֖וּ הִתְהַלְּכ֣וּ בָ/אָ֑רֶץ וַ/תִּתְהַלַּ֖כְנָה בָּ/אָֽרֶץ׃
translation:
  text: And the strong ones came out and sought to go, to walk throughout the earth.
    And he said, “Go, walk throughout the earth,” and they walked throughout the earth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the dappled ones” (traditionally, a color designation for the horses/teams);
      the Hebrew as pointed in the Masoretic Text more naturally reads “the strong
      ones.”
    reason: alternative_reading
  - marker: b
    text: Or “throughout the land”; Hebrew אֶרֶץ can mean either “earth” or “land,”
      depending on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָאֲמֻצִּים
  chosen: the strong ones
  alternatives:
  - the powerful ones
  - the dappled ones
  lexicon: HALOT
  rationale: The adjective from אמץ ordinarily denotes strength or might, so 'the
    strong ones' best reflects the Hebrew form as pointed in the MT. Because the broader
    chariot vision includes horse colors in the surrounding verses, some versions
    construe this with a color term ('dappled'/'bay'), but the consonantal form and
    vocalization here support a strength-related sense. The alternative is worth preserving
    in a footnote because of contextual and translation-history significance.
- source_word: יָצְאוּ
  chosen: came out
  alternatives:
  - went out
  lexicon: HALOT
  rationale: יצא commonly means 'go out/come out.' 'Came out' fits the narrative perspective
    in English while remaining close to the Hebrew.
- source_word: וַיְבַקְשׁוּ
  chosen: sought
  alternatives:
  - desired
  - requested
  lexicon: HALOT
  rationale: בקש here expresses an attempt or desire. 'Sought' preserves the verbal
    force without overinterpreting motive.
- source_word: לָלֶכֶת
  chosen: to go
  alternatives:
  - to depart
  lexicon: HALOT
  rationale: הלך in the simple stem here is the basic motion verb 'to go.'
- source_word: לְהִתְהַלֵּךְ
  chosen: to walk throughout
  alternatives:
  - to patrol
  - to roam
  lexicon: HALOT
  rationale: The hitpael of הלך often conveys iterative or roaming movement. 'Walk
    throughout' keeps the concrete imagery while implying movement over an area; 'patrol'
    is possible but slightly more interpretive.
- source_word: בָּאָרֶץ
  chosen: throughout the earth
  alternatives:
  - throughout the land
  lexicon: HALOT
  rationale: אֶרֶץ can mean 'earth' or 'land.' In this apocalyptic-vision context,
    the scope appears global rather than merely local, especially in connection with
    divine agents ranging over the world. 'Throughout the earth' best fits the scene,
    while 'land' remains a viable lexical alternative.
- source_word: וַיֹּאמֶר
  chosen: he said
  alternatives:
  - it said
  lexicon: HALOT
  rationale: The singular masculine verb has an implicit subject. In context, the
    speaker is the interpreting/commanding figure previously identified in the vision,
    so 'he said' is the natural English rendering.
- source_word: לְכוּ
  chosen: Go
  alternatives:
  - Proceed
  lexicon: HALOT
  rationale: A straightforward plural imperative of הלך.
- source_word: הִתְהַלְּכוּ
  chosen: walk throughout
  alternatives:
  - patrol
  - roam
  lexicon: HALOT
  rationale: Repeats the hitpael imperative; rendered consistently with the earlier
    infinitive.
- source_word: וַתִּתְהַלַּכְנָה
  chosen: they walked throughout
  alternatives:
  - they patrolled
  - they roamed
  lexicon: HALOT
  rationale: Feminine plural form agrees naturally with the implied feminine referent
    (the chariots/teams), even though English does not mark that gender here. 'Walked
    throughout' preserves the repeated lexical pattern.
