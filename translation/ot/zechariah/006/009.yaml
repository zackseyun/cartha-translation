id: ZEC.6.9
reference: Zechariah 6:9
source:
  edition: WLC
  text: וַ/יְהִ֥י דְבַר יְהוָ֖ה אֵלַ֥/י לֵ/אמֹֽר־׃
translation:
  text: And the word of Yahweh came to me, saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''YHWH''; traditionally rendered ''the LORD.'''
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְהִי
  chosen: And ... came
  alternatives:
  - And it happened
  - Then ... came to pass
  lexicon: HALOT
  rationale: The waw-consecutive form of היה functions here as standard narrative/sequential introduction. In English, the idiom is best carried by beginning the clause with 'And' and expressing the event through 'came' with the following subject, rather than the wooden 'and it happened.' This preserves the discourse flow without unnecessary archaism.
- source_word: דְבַר
  chosen: the word
  alternatives:
  - a word
  - message
  lexicon: HALOT
  rationale: In the prophetic formula דְבַר יְהוָה, 'the word' is the standard and most transparent rendering, preserving the formal prophetic idiom. 'Message' is possible dynamically, but 'word' better reflects the source and biblical intertextuality.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֵלַי
  chosen: to me
  alternatives:
  - unto me
  lexicon: HALOT
  rationale: 'The preposition plus first-person singular suffix straightforwardly indicates direction toward the prophet: ''to me.'' ''Unto me'' is unnecessarily archaic.'
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - thus saying
  - with these words
  lexicon: HALOT
  rationale: The infinitive construct introduces the content of divine speech in a common Hebrew formula. 'Saying' is the most natural and sufficiently formal English equivalent, especially since the spoken content follows in the next verse.
