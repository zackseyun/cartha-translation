id: ZEC.6.15
reference: Zechariah 6:15
source:
  edition: WLC
  text: וּ/רְחוֹקִ֣ים יָבֹ֗אוּ וּ/בָנוּ֙ בְּ/הֵיכַ֣ל יְהוָ֔ה וִ/ידַעְתֶּ֕ם כִּֽי יְהוָ֥ה צְבָא֖וֹת שְׁלָחַ֣/נִי אֲלֵי/כֶ֑ם וְ/הָיָה֙ אִם שָׁמ֣וֹעַ תִּשְׁמְע֔וּ/ן בְּ/ק֖וֹל יְהוָ֥ה אֱלֹהֵי/כֶֽם׀־־׃ס
translation:
  text: And those who are far off will come and build in the temple of Yahweh, and you will know that Yahweh of Armies has sent me to you. And this will happen if you diligently obey the voice of Yahweh your God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the LORD of hosts.'
    reason: lexical_alternative
  - marker: b
    text: '''Those who are far off'' may refer to people geographically distant, such as exiles, and may also carry a broader sense without specifying the group.'
    reason: alternative_reading
lexical_decisions:
- source_word: וּרְחוֹקִים
  chosen: those who are far off
  alternatives:
  - the distant ones
  - those far away
  lexicon: HALOT
  rationale: The adjective רְחוֹקִים functions substantivally for people at a distance. 'Those who are far off' preserves the personal reference and leaves open whether the distance is geographic, covenantal, or both.
- source_word: יָבֹאוּ
  chosen: will come
  alternatives:
  - shall come
  lexicon: HALOT
  rationale: Simple future sense fits the prophetic context without adding nuance beyond the Hebrew imperfect.
- source_word: וּבָנוּ
  chosen: and build
  alternatives:
  - and they will build
  lexicon: HALOT
  rationale: The waw + perfect here continues the future sequence after יָבֹאוּ. English can naturally render the coordinated action as 'and build' without losing the prospective sense.
- source_word: בְּהֵיכַל יְהוָה
  chosen: in the temple of the LORD
  alternatives:
  - on the temple of the LORD
  - the palace/temple of the LORD
  lexicon: HALOT
  rationale: הֵיכָל in this context refers to the sanctuary/temple. The preposition בְ is best rendered 'in' here for participation in the building work associated with the temple, rather than a more wooden but less idiomatic 'on'.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives: []
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וִידַעְתֶּם
  chosen: and you will know
  alternatives:
  - then you will know
  lexicon: HALOT
  rationale: Direct future/result sense is appropriate. 'Then' is possible as an inferential nuance, but the Hebrew conjunction does not require it.
- source_word: יְהוָה צְבָאוֹת
  chosen: the LORD of Armies
  alternatives:
  - the LORD of hosts
  lexicon: HALOT
  rationale: צְבָאוֹת is more transparent to modern readers as 'Armies' while preserving the martial/cosmic force of the title better than the traditional but opaque 'hosts.'
- source_word: שְׁלָחַנִי אֲלֵיכֶם
  chosen: has sent me to you
  alternatives:
  - sent me to you
  lexicon: HALOT
  rationale: The perfect can be rendered with English present perfect to express a completed action with present relevance in prophetic discourse. 'To you' correctly reflects אֲלֵיכֶם.
- source_word: וְהָיָה
  chosen: And this will happen
  alternatives:
  - And it will be
  - And it shall come to pass
  lexicon: HALOT
  rationale: The idiom introduces the outcome/condition of the preceding promise. 'And this will happen' is clearer modern English than the more wooden 'and it will be'.
- source_word: אִם שָׁמוֹעַ תִּשְׁמְעוּן
  chosen: if you diligently obey
  alternatives:
  - if you surely obey
  - if you indeed listen carefully
  lexicon: HALOT
  rationale: The infinitive absolute plus finite verb intensifies the verb שמע. In context, 'obey' captures the covenantal sense of hearing responsively, and 'diligently' conveys the intensification.
- source_word: בְּקוֹל
  chosen: the voice of
  alternatives:
  - the sound of
  lexicon: HALOT
  rationale: In covenantal contexts, קוֹל with שמע commonly means 'voice' in the sense of authoritative command, not merely sound.
- source_word: יְהוָה אֱלֹהֵיכֶם
  chosen: the LORD your God
  alternatives:
  - the LORD, your God
  lexicon: HALOT
  rationale: Standard covenant formula; the unpunctuated rendering is natural in English.
