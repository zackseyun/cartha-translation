theological_decisions:
- issue: Identity and scope of 'those who are far off'
  chosen_reading: Rendered generically as 'those who are far off' without specifying Gentiles, exiles, or diaspora Israelites.
  alternative_readings:
  - Gentiles far away
  - Judean exiles returning from distant lands
  rationale: The Hebrew expression itself does not specify the group. Preserving the broader wording maintains the prophetic openness and avoids importing a narrower interpretive conclusion not explicit in the verse.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Conditional clause and fulfillment
  chosen_reading: 'Rendered the final clause as a real condition on the realization/experience of the promise: ''And this will happen if you diligently obey...'''
  alternative_readings:
  - A general exhortational aside rather than a condition
  - A condition applying only to the recognition formula, not the whole preceding promise
  rationale: The syntax naturally presents a condition following the promise. The translation keeps the condition without over-specifying its exact theological relation beyond what the Hebrew states.
  doctrine_reference: Preserve theological tension rather than resolve it.
