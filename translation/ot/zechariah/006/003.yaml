theological_decisions:
- issue: Whether אֲמֻצִּים describes the dappled horses or names an additional horse
    color/group
  chosen_reading: It describes the fourth chariot's horses as 'dappled, strong horses.'
  alternative_readings:
  - It introduces a separate group, e.g., 'dappled horses—and strong ones.'
  rationale: The Hebrew presents בְּרֻדִּים and אֲמֻצִּים in sequence after 'horses'
    with no repeated noun, which naturally supports taking both adjectives together.
    This also fits the verse's pattern of describing the horses attached to each chariot.
    Because some translations treat the final term as a separate class, that alternative
    is preserved in a footnote rather than resolved silently.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it'
