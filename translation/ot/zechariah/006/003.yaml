id: ZEC.6.3
reference: Zechariah 6:3
source:
  edition: WLC
  text: וּ/בַ/מֶּרְכָּבָ֥ה הַ/שְּׁלִשִׁ֖ית סוּסִ֣ים לְבָנִ֑ים וּ/בַ/מֶּרְכָּבָה֙ הָ/רְבִעִ֔ית
    סוּסִ֥ים בְּרֻדִּ֖ים אֲמֻצִּֽים׃
translation:
  text: and in the third chariot, white horses; and in the fourth chariot, dappled,
    strong horses.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, possibly, 'dappled horses—and strong ones,' taking 'strong' as a separate
      group rather than as a second description of the fourth chariot's horses.
    reason: alternative_reading
lexical_decisions:
- source_word: וּבַמֶּרְכָּבָה
  chosen: and in the ... chariot
  alternatives:
  - and on the ... chariot
  lexicon: HALOT
  rationale: The preposition ב commonly means 'in' or 'on,' but with chariot imagery
    English idiom is best served by 'in the ... chariot,' matching the sense of horses
    belonging to each chariot team.
- source_word: הַשְּׁלִשִׁית
  chosen: third
  lexicon: HALOT
  rationale: Straightforward ordinal adjective modifying 'chariot.'
- source_word: סוּסִים
  chosen: horses
  lexicon: HALOT
  rationale: Standard plural noun; repeated in both clauses and rendered consistently.
- source_word: לְבָנִים
  chosen: white
  lexicon: HALOT
  rationale: Common adjective for the color white; no contextual reason to vary.
- source_word: הָרְבִעִית
  chosen: fourth
  lexicon: HALOT
  rationale: Straightforward ordinal adjective modifying 'chariot.'
- source_word: בְּרֻדִּים
  chosen: dappled
  alternatives:
  - spotted
  - speckled
  lexicon: HALOT
  rationale: The adjective denotes a variegated or spotted appearance. 'Dappled' is
    natural modern English for horses and preserves the visual sense without sounding
    technical.
- source_word: אֲמֻצִּים
  chosen: strong
  alternatives:
  - powerful
  lexicon: HALOT
  rationale: From אמץ, conveying strength or robustness. 'Strong' is concise and natural;
    it likely further describes the fourth team's horses rather than introducing a
    separate group.
