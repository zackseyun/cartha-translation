id: ZEC.6.2
reference: Zechariah 6:2
source:
  edition: WLC
  text: בַּ/מֶּרְכָּבָ֥ה הָ/רִֽאשֹׁנָ֖ה סוּסִ֣ים אֲדֻמִּ֑ים וּ/בַ/מֶּרְכָּבָ֥ה הַ/שֵּׁנִ֖ית
    סוּסִ֥ים שְׁחֹרִֽים׃
translation:
  text: In the first chariot were red horses, and in the second chariot black horses.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: בַּמֶּרְכָּבָה
  chosen: in the chariot
  alternatives:
  - on the chariot
  - with the chariot
  lexicon: HALOT
  rationale: מֶרְכָּבָה ordinarily denotes a chariot. The prefixed ב marks location/association;
    in this vision report, English idiom is best served by 'in the chariot,' expressing
    what each chariot contained or bore.
- source_word: הָרִאשֹׁנָה
  chosen: the first
  alternatives:
  - the former
  lexicon: HALOT
  rationale: Ordinal adjective indicating sequence among the chariots in the vision.
    'The first' is the natural modern English rendering.
- source_word: סוּסִים
  chosen: horses
  lexicon: HALOT
  rationale: Standard plural noun for horses; no contextual reason to narrow or expand
    the sense.
- source_word: אֲדֻמִּים
  chosen: red
  alternatives:
  - reddish
  lexicon: HALOT
  rationale: Color adjective from the root for redness. 'Red' is the straightforward
    rendering and matches normal English color terminology in visionary descriptions.
- source_word: וּבַמֶּרְכָּבָה
  chosen: and in the chariot
  alternatives:
  - and on the chariot
  - and with the chariot
  lexicon: HALOT
  rationale: The conjunction plus preposition repeats the structure from the first
    clause. Rendering it explicitly preserves the Hebrew parallelism.
- source_word: הַשֵּׁנִית
  chosen: the second
  lexicon: HALOT
  rationale: Ordinal adjective marking the next chariot in sequence. 'The second'
    is direct and idiomatic.
- source_word: שְׁחֹרִים
  chosen: black
  alternatives:
  - dark-colored
  lexicon: HALOT
  rationale: Basic color adjective meaning black. 'Black' is the plain sense and preserves
    the visual contrast in the vision.
