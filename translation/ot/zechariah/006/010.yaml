id: ZEC.6.10
reference: Zechariah 6:10
source:
  edition: WLC
  text: לָק֨וֹחַ֙ מֵ/אֵ֣ת הַ/גּוֹלָ֔ה מֵ/חֶלְדַּ֕י וּ/מֵ/אֵ֥ת טוֹבִיָּ֖ה וּ/מֵ/אֵ֣ת
    יְדַֽעְיָ֑ה וּ/בָאתָ֤ אַתָּה֙ בַּ/יּ֣וֹם הַ/ה֔וּא וּ/בָ֗אתָ בֵּ֚ית יֹאשִׁיָּ֣ה
    בֶן צְפַנְיָ֔ה אֲשֶׁר בָּ֖אוּ מִ/בָּבֶֽל־־׃
translation:
  text: Take from the exiles—from Heldai, from Tobijah, and from Jedaiah—and you yourself
    shall go on that day, and go to the house of Josiah son of Zephaniah, who have
    come from Babylon.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from the exilic community.' The Hebrew term can denote the body of exiles
      rather than exile as an abstract condition.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'come' can be rendered 'go' in English according to perspective;
      the command concerns Zechariah's movement to another location.
    reason: lexical_alternative
  - marker: c
    text: The final clause is plural, 'who have come from Babylon,' most naturally
      referring to Heldai, Tobijah, and Jedaiah rather than to Josiah alone.
    reason: alternative_reading
  - marker: d
    text: Tobijah is often rendered 'Tobiah' in English versions.
    reason: lexical_alternative
lexical_decisions:
- source_word: לָק֨וֹחַ
  chosen: Take
  alternatives:
  - Receive
  - Take as an offering
  lexicon: HALOT
  rationale: Qal infinitive absolute used imperativally/instructionally here; concise
    imperative English best fits the prophetic command context.
- source_word: מֵאֵת הַגּוֹלָה
  chosen: from the exiles
  alternatives:
  - from the exilic community
  - from the captivity
  lexicon: HALOT
  rationale: הַגּוֹלָה refers to the community of exiles/returned exiles rather than
    abstract 'captivity.' 'From the exiles' is natural English and preserves the personal
    sense.
- source_word: חֶלְדַּי
  chosen: Heldai
  alternatives:
  - Heledai
  rationale: Personal name transliterated per project philosophy; standard English
    form 'Heldai' is widely recognizable.
- source_word: טוֹבִיָּה
  chosen: Tobijah
  alternatives:
  - Tobiah
  rationale: Personal name transliterated. 'Tobijah' more closely reflects the final
    theophoric element -yāh in Hebrew, though 'Tobiah' is a common English alternative.
- source_word: יְדַעְיָה
  chosen: Jedaiah
  rationale: Personal name transliterated by standard convention.
- source_word: וּבָאתָ אַתָּה
  chosen: and you yourself shall go
  alternatives:
  - and you shall come
  - then you shall go yourself
  lexicon: HALOT
  rationale: בוא can mean 'come' or 'go' depending on deictic perspective. In English,
    movement from Zechariah to another location is more naturally 'go.' The explicit
    pronoun אַתָּה adds emphasis, reflected by 'yourself.'
- source_word: בַּיּוֹם הַהוּא
  chosen: on that day
  alternatives:
  - that same day
  lexicon: HALOT
  rationale: Standard temporal expression. 'On that day' is the most direct rendering,
    though context suggests immediacy.
- source_word: וּבָאתָ בֵּית
  chosen: and go to the house of
  alternatives:
  - and come to the house of
  - and enter the house of
  lexicon: HALOT
  rationale: Repeated בוא likely marks the next movement in the command sequence.
    'Go to the house of' is idiomatic and avoids implying entry more strongly than
    the Hebrew does.
- source_word: יֹאשִׁיָּה בֶן צְפַנְיָה
  chosen: Josiah son of Zephaniah
  alternatives:
  - Josiah the son of Zephaniah
  rationale: Standard rendering of Hebrew patronymic.
- source_word: אֲשֶׁר בָּאוּ מִבָּבֶל
  chosen: who have come from Babylon
  alternatives:
  - who came from Babylon
  lexicon: HALOT
  rationale: Relative clause is plural ('who have come'), most naturally referring
    to the named men from the exile rather than Josiah alone. Present perfect in English
    captures recent arrival with present relevance.
