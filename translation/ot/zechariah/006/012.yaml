id: ZEC.6.12
reference: Zechariah 6:12
source:
  edition: WLC
  text: וְ/אָמַרְתָּ֤ אֵלָי/ו֙ לֵ/אמֹ֔ר כֹּ֥ה אָמַ֛ר יְהוָ֥ה צְבָא֖וֹת לֵ/אמֹ֑ר הִנֵּה
    אִ֞ישׁ צֶ֤מַח שְׁמ/וֹ֙ וּ/מִ/תַּחְתָּ֣י/ו יִצְמָ֔ח וּ/בָנָ֖ה אֶת הֵיכַ֥ל יְהוָֽהּ־־׃
translation:
  text: 'And say to him, ‘Thus says the LORD of Armies: Behold, a man—Branch is his
    name—and he will branch out from his place and build the temple of the LORD.’'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, “from beneath him he will sprout.”
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the doctrinal default for the divine name, preserving the traditional
    English small-caps convention represented here as 'the LORD' rather than transliterating
    the Tetragrammaton.
- source_word: צְבָאוֹת
  chosen: of Armies
  alternatives:
  - of hosts
  - of heavenly armies
  lexicon: HALOT
  rationale: Rendered 'Armies' to communicate the concrete sense of צבאות in readable
    modern English. 'Hosts' is traditional but less transparent for contemporary readers.
- source_word: הִנֵּה
  chosen: Behold
  alternatives:
  - Look
  - See
  lexicon: HALOT
  rationale: Retained the deictic/interjectional force with a solemn literary English
    equivalent suitable to prophetic proclamation.
- source_word: אִישׁ
  chosen: a man
  alternatives:
  - a person
  lexicon: HALOT
  rationale: Gender-accurate rendering of the masculine singular noun. The verse presents
    a specific male figure, so 'a man' is preferable to a neutral term.
- source_word: צֶמַח
  chosen: Branch
  alternatives:
  - Sprout
  - Shoot
  - Growth
  lexicon: HALOT
  rationale: Capitalized as a title-like designation because in this prophetic context
    it functions as the figure's name/appellation ('Branch is his name'). 'Branch'
    preserves the established messianic imagery better than 'Sprout' while remaining
    lexical rather than paraphrastic.
- source_word: שְׁמוֹ
  chosen: is his name
  alternatives:
  - is his name/title
  lexicon: HALOT
  rationale: 'Standard rendering of the naming formula, preserving the appositional
    force: ''Branch is his name.'''
- source_word: וּמִתַּחְתָּיו
  chosen: from his place
  alternatives:
  - from beneath him
  - under him
  - from below
  lexicon: HALOT
  rationale: 'The Hebrew is somewhat compressed and idiomatic. ''From his place''
    gives the most natural English sense in context: growth/sprouting proceeding from
    where he is. The more literal ''from beneath him'' is possible but awkward and
    potentially misleading in English, so it is preserved in a footnote.'
- source_word: יִצְמָח
  chosen: he will branch out
  alternatives:
  - he will sprout
  - he will grow
  lexicon: HALOT
  rationale: Rendered with wording cognate to the preceding noun צֶמַח ('Branch')
    to preserve the wordplay between the figure's name and his action. 'Branch out'
    is idiomatic English and keeps the botanical imagery.
- source_word: וּבָנָה
  chosen: and build
  alternatives:
  - and he will build
  lexicon: HALOT
  rationale: English supplies the subject naturally from the preceding verb; the sense
    remains future/predictive in context. The shorter form avoids unnecessary repetition
    while preserving the sequence.
- source_word: הֵיכַל
  chosen: the temple
  alternatives:
  - the palace-temple
  - the sanctuary
  lexicon: HALOT
  rationale: In this context היכל יהוה refers to the temple of the LORD. 'Temple'
    is the clear and standard contextual equivalent.
