theological_decisions:
- issue: Messianic force of צֶמַח
  chosen_reading: Render צֶמַח as the title-like 'Branch' in the main text without
    making the messianic interpretation more explicit than the Hebrew states.
  alternative_readings:
  - Render as common noun 'sprout' or 'shoot' without title force
  rationale: The immediate syntax ('Branch is his name') supports a titular/appellative
    use. Given the broader prophetic usage of צמח in Zechariah and Jeremiah, the term
    carries messianic resonance, but the translation should preserve that resonance
    without inserting interpretive expansions such as 'the Messiah.'
  doctrine_reference: Affirmations; Translation philosophy §§1, 3, 6
- issue: Referent of the building figure
  chosen_reading: Keep the pronouns as in the Hebrew and do not specify beyond 'he.'
  alternative_readings:
  - Explicitly identify the figure as Joshua or as the Messiah
  rationale: The verse's prophetic symbolism has interpretive debate, but the text
    itself names only 'a man' called Branch and says 'he' will build the temple of
    the LORD. The translation preserves the textual ambiguity rather than resolving
    it.
  doctrine_reference: Translation philosophy §3
