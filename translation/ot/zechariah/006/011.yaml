theological_decisions:
- issue: Plural עֲטָרוֹת with singular placement on Joshua
  chosen_reading: Retain the plural 'crowns' in the main text
  alternative_readings:
  - Render as singular 'crown' to reflect a possible composite crown or contextual
    harmonization
  rationale: The Hebrew text explicitly uses the plural noun, and optimal equivalence
    favors preserving that form unless English becomes misleading. Because the plural
    has interpretive significance in this prophetic sign-act, the main text keeps
    'crowns,' while a footnote preserves the singular interpretive alternative.
  doctrine_reference: Translation philosophy §§1, 3, 5
