id: ZEC.6.11
reference: Zechariah 6:11
source:
  edition: WLC
  text: וְ/לָקַחְתָּ֥ כֶֽסֶף וְ/זָהָ֖ב וְ/עָשִׂ֣יתָ עֲטָר֑וֹת וְ/שַׂמְתָּ֗ בְּ/רֹ֛אשׁ
    יְהוֹשֻׁ֥עַ בֶּן יְהוֹצָדָ֖ק הַ/כֹּהֵ֥ן הַ/גָּדֽוֹל־־׃
translation:
  text: Take silver and gold, make crowns, and set them on the head of Joshua son
    of Jehozadak, the high priest.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'crowns' (plural). Some understand this as a single composite crown
      and so render 'crown.'
    reason: alternative_reading
lexical_decisions:
- source_word: וְלָקַחְתָּ
  chosen: Take
  alternatives:
  - And take
  - You shall take
  lexicon: HALOT
  rationale: Qal perfect 2ms with prefixed conjunction in prophetic instruction functions
    as an imperative-like command. English imperative is the most natural rendering
    in context.
- source_word: כֶסֶף וְזָהָב
  chosen: silver and gold
  lexicon: HALOT
  rationale: Straightforward material nouns; no reason to generalize to 'money' or
    'precious metals' since the verse specifies the metals used.
- source_word: וְעָשִׂיתָ עֲטָרוֹת
  chosen: make crowns
  alternatives:
  - make a crown
  lexicon: HALOT
  rationale: The noun עֲטָרוֹת is morphologically plural, so the main text preserves
    the plural 'crowns.' Some interpreters understand a plural of composition or a
    single composite crown in light of the singular action in the next clause and
    the broader context, but the Hebrew form itself is plural and should be represented
    in the translation.
- source_word: וְשַׂמְתָּ
  chosen: set
  alternatives:
  - place
  - put
  lexicon: HALOT
  rationale: Common verb for placing something somewhere. 'Set' is concise and idiomatic
    in ceremonial contexts.
- source_word: בְּרֹאשׁ
  chosen: on the head of
  alternatives:
  - upon the head of
  lexicon: HALOT
  rationale: The preposition plus noun indicates physical placement on Joshua's head;
    'on the head of' is natural modern English.
- source_word: יְהוֹשֻׁעַ בֶּן יְהוֹצָדָק
  chosen: Joshua son of Jehozadak
  alternatives:
  - Jeshua son of Jehozadak
  lexicon: HALOT
  rationale: Personal names are transliterated by standard conventions per project
    philosophy. 'Joshua' is the standard English form for יְהוֹשֻׁעַ in this spelling.
- source_word: הַכֹּהֵן הַגָּדוֹל
  chosen: the high priest
  alternatives:
  - the great priest
  lexicon: HALOT
  rationale: This is the standard idiomatic rendering of the Hebrew title for the
    chief priest. 'High priest' communicates the office clearly in modern English.
