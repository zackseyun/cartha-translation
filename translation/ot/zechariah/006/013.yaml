theological_decisions:
- issue: Identity of the priestly-royal figure and the referent of 'between the two
    of them'
  chosen_reading: Retain the singular subject throughout ('he will be a priest on
    his throne') while preserving the final phrase's ambiguity as 'between the two
    of them.'
  alternative_readings:
  - Read 'a priest' as a second figure distinct from the enthroned ruler, with peace
    between king and priest
  - Interpret 'the two of them' as the two offices of kingship and priesthood united
    in one person
  rationale: The Hebrew grammar most naturally keeps one subject through the clause
    sequence, yet the closing phrase explicitly introduces 'the two of them,' creating
    an interpretive tension. In keeping with the project's principle of preserving
    theological tension rather than resolving genuine ambiguity, the main text follows
    the grammar while leaving the final referents unspecified. This also avoids importing
    a more developed messianic synthesis than the verse itself states explicitly.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
