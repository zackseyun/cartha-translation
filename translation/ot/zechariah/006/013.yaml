id: ZEC.6.13
reference: Zechariah 6:13
source:
  edition: WLC
  text: וְ֠/הוּא יִבְנֶ֞ה אֶת הֵיכַ֤ל יְהוָה֙ וְ/הֽוּא יִשָּׂ֣א ה֔וֹד וְ/יָשַׁ֥ב וּ/מָשַׁ֖ל
    עַל כִּסְא֑/וֹ וְ/הָיָ֤ה כֹהֵן֙ עַל כִּסְא֔/וֹ וַ/עֲצַ֣ת שָׁל֔וֹם תִּהְיֶ֖ה בֵּ֥ין
    שְׁנֵי/הֶֽם־־־־׃
translation:
  text: Yes, he will build the temple of the LORD, and he will bear majesty, and he
    will sit and rule on his throne. And he will be a priest on his throne, and a
    counsel of peace will be between the two of them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and there will be a priest on his throne'; the Hebrew allows some to
      distinguish the priest from the enthroned ruler.
    reason: alternative_reading
  - marker: b
    text: '''Between the two of them'' may refer to the kingly and priestly roles,
      or to two distinct figures such as ruler and priest.'
    reason: alternative_reading
  - marker: c
    text: Or 'will bear honor' or 'will bear splendor.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֵיכַל יְהוָה
  chosen: the temple of the LORD
  alternatives:
  - the palace/shrine of the LORD
  lexicon: HALOT
  rationale: הֵיכָל commonly denotes a temple or palace; in this prophetic context
    referring to YHWH's sanctuary, 'temple' is the clearest and most natural English
    rendering. יְהוָה follows the project default 'the LORD'.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine default for the divine name, render as 'the LORD' rather
    than transliteration.
- source_word: יִשָּׂא הוֹד
  chosen: will bear majesty
  alternatives:
  - will bear honor
  - will bear splendor
  lexicon: HALOT
  rationale: נשא + הוֹד expresses carrying or bearing royal dignity/glory. 'Bear majesty'
    preserves both the concrete verbal image and the royal nuance better than the
    flatter 'receive honor'.
- source_word: וְיָשַׁב וּמָשַׁל עַל כִּסְאוֹ
  chosen: and he will sit and rule on his throne
  alternatives:
  - and he will sit and govern on his throne
  - and he will sit enthroned and rule
  lexicon: HALOT
  rationale: The sequence presents enthronement and exercise of rule. 'Sit and rule
    on his throne' keeps the Hebrew parallelism and royal imagery without over-paraphrase.
- source_word: וְהָיָה כֹהֵן עַל כִּסְאוֹ
  chosen: and he will be a priest on his throne
  alternatives:
  - and there will be a priest on his throne
  - and he will serve as priest on his throne
  lexicon: HALOT
  rationale: The subject remains the same masculine singular figure through the verse,
    so 'he will be a priest' is the most straightforward reading. 'On his throne'
    is retained literally, preserving the striking union of priesthood and kingship.
- source_word: וַעֲצַת שָׁלוֹם
  chosen: and a counsel of peace
  alternatives:
  - and peaceful counsel
  - and a plan of peace
  lexicon: HALOT
  rationale: עֵצָה denotes counsel, plan, or purpose. 'Counsel of peace' preserves
    the genitival compactness and allows both deliberative and purposive senses.
- source_word: בֵּין שְׁנֵיהֶם
  chosen: between the two of them
  alternatives:
  - between both offices
  - between the two
  lexicon: HALOT
  rationale: The Hebrew is intentionally terse and somewhat ambiguous. 'Between the
    two of them' preserves that ambiguity rather than specifying the referents too
    narrowly.
