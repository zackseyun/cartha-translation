theological_decisions:
- issue: Meaning of רֻחוֹת in the vision
  chosen_reading: winds
  alternative_readings:
  - spirits
  rationale: The Hebrew deliberately allows overlap between 'winds' and 'spirits.'
    In the immediate imagery of four chariots sent out in the world, 'winds' best
    preserves the cosmic, directional force of the vision. Because the term may also
    suggest heavenly spirits or agencies, the alternative is preserved in a footnote
    rather than being excluded.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
