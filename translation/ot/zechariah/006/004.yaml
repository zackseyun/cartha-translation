theological_decisions:
- issue: Whether אֲדֹנִי refers to God/the Lord or is a respectful address to the
    angel
  chosen_reading: 'It is a respectful address to the angel: ''my lord.'''
  alternative_readings:
  - '''Lord'' as a divine title'
  rationale: The immediate addressee is 'the angel who was speaking with me.' Rendering
    as 'my lord' avoids implying that the prophet is directly addressing God here
    while preserving the honorific sense of אֲדֹנִי.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
