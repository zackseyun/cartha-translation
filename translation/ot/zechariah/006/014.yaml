id: ZEC.6.14
reference: Zechariah 6:14
source:
  edition: WLC
  text: וְ/הָ/עֲטָרֹ֗ת תִּֽהְיֶה֙ לְ/חֵ֨לֶם֙ וּ/לְ/טוֹבִיָּ֣ה וְ/לִ/ידַֽעְיָ֔ה וּ/לְ/חֵ֖ן בֶּן צְפַנְיָ֑ה לְ/זִכָּר֖וֹן בְּ/הֵיכַ֥ל יְהוָֽה־׃
translation:
  text: And the crowns shall be for Helem, Tobijah, Jedaiah, and Hen son of Zephaniah, as a memorial in the temple of Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Helem is called Heldai in Zechariah 6:10; this may reflect a variant form of the same name.
    reason: alternative_reading
lexical_decisions:
- source_word: הָעֲטָרוֹת
  chosen: the crowns
  alternatives:
  - the crown
  lexicon: HALOT
  rationale: The noun is morphologically plural, so 'the crowns' best reflects the Hebrew form. Although the preceding context has prompted some discussion because a single ceremonial crown is also in view elsewhere, this verse as pointed in the MT reads plural and should be translated accordingly.
- source_word: תִּהְיֶה
  chosen: shall be
  alternatives:
  - will be
  - shall become
  lexicon: HALOT
  rationale: The Qal imperfect of היה here expresses future/resultative sense. 'Shall be' is a natural formal-modern rendering in this memorial/instructional context.
- source_word: לְחֵלֶם
  chosen: for Helem
  alternatives:
  - for Heldai
  lexicon: HALOT
  rationale: This is a personal name in the MT of this verse and should be transliterated. 'Helem' follows the consonantal/vocalized form here. Because Zechariah 6:10 has the related name 'Heldai,' some take this as a variant form or textual issue; the main text should reflect the verse's own reading, with the alternative preserved in a footnote.
- source_word: וּלְטוֹבִיָּה
  chosen: Tobijah
  alternatives:
  - Tobiah
  lexicon: HALOT
  rationale: Personal names are transliterated. 'Tobijah' closely reflects the Hebrew form טוֹבִיָּה, while 'Tobiah' is a common English simplification; the fuller transliteration better matches source-form primacy.
- source_word: וְלִידַעְיָה
  chosen: Jedaiah
  lexicon: HALOT
  rationale: A personal name; transliterated by standard English convention.
- source_word: וּלְחֵן
  chosen: Hen
  alternatives:
  - grace
  - favor
  lexicon: HALOT
  rationale: In context this functions as a personal name, especially since it is followed by 'son of Zephaniah.' Although the common noun חֵן often means 'grace' or 'favor,' here transliteration is preferable to avoid turning a name into an abstract noun.
- source_word: בֶּן צְפַנְיָה
  chosen: son of Zephaniah
  lexicon: HALOT
  rationale: Standard filial construction identifying Hen. 'Zephaniah' is the conventional English transliteration of the proper name.
- source_word: לְזִכָּרוֹן
  chosen: as a memorial
  alternatives:
  - for a memorial
  - as a reminder
  lexicon: HALOT
  rationale: 'The phrase indicates purpose/result: the crowns are kept in the temple as a commemorative memorial. ''As a memorial'' is idiomatic and preserves the cultic commemorative sense.'
- source_word: בְּהֵיכַל
  chosen: in the temple
  alternatives:
  - in the palace
  - in the sanctuary
  lexicon: HALOT
  rationale: With 'of the LORD,' הֵיכָל clearly refers to the temple/sanctuary, not a royal palace. 'Temple' is the clearest modern rendering.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
