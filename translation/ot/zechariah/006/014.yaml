theological_decisions:
- issue: Proper-name variation between this verse and Zechariah 6:10
  chosen_reading: Translate the MT names as they stand in this verse ('Helem' and 'Hen') without harmonizing them to nearby forms.
  alternative_readings:
  - Harmonize 'Helem' to 'Heldai'
  - Read 'Hen' as a common noun such as 'grace' or as another textual variant
  rationale: The translation philosophy prioritizes the original-language text of the verse itself over inherited harmonization. Because these differences may reflect variant name forms or textual transmission, the main text preserves the MT reading while noting the alternative where useful.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation tradition; Translate titles; transliterate names; Preserve theological tension rather than resolve it.'
