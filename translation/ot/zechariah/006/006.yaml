id: ZEC.6.6
reference: Zechariah 6:6
source:
  edition: WLC
  text: אֲשֶׁר בָּ֞/הּ הַ/סּוּסִ֣ים הַ/שְּׁחֹרִ֗ים יֹֽצְאִים֙ אֶל אֶ֣רֶץ צָפ֔וֹן וְ/הַ/לְּבָנִ֔ים
    יָצְא֖וּ אֶל אַֽחֲרֵי/הֶ֑ם וְ/הַ֨/בְּרֻדִּ֔ים יָצְא֖וּ אֶל אֶ֥רֶץ הַ/תֵּימָֽן־־־־׃
translation:
  text: The black horses in it are going out to the land of the north, and the white
    ones have gone out after them, and the dappled ones have gone out to the land
    of the south.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "to the land of Teman," taking תֵּימָן as the place-name Teman rather
      than the directional term "south."
    reason: alternative_reading
lexical_decisions:
- source_word: אֲשֶׁר בָּהּ
  chosen: in it
  alternatives:
  - which are in it
  - that are in it
  lexicon: HALOT
  rationale: Refers back to the chariot in the preceding context. English omits a
    more wooden relative construction for natural style while preserving the locative
    sense.
- source_word: הַסּוּסִים
  chosen: horses
  alternatives:
  - steeds
  lexicon: HALOT
  rationale: Standard rendering of סוּסִים; 'horses' is clear and natural.
- source_word: הַשְּׁחֹרִים
  chosen: black
  lexicon: HALOT
  rationale: Straightforward color adjective modifying 'horses.'
- source_word: יֹצְאִים
  chosen: are going out
  alternatives:
  - go out
  - are coming out
  lexicon: HALOT
  rationale: Participial form conveys ongoing or vivid action; 'are going out' preserves
    the aspect better than a simple present.
- source_word: אֶל אֶרֶץ צָפוֹן
  chosen: to the land of the north
  alternatives:
  - to the north country
  - to the land of the northland
  lexicon: HALOT
  rationale: A fairly literal rendering of the construct phrase. 'Land of the north'
    preserves the Hebrew expression better than the more idiomatic but less transparent
    'north country.'
- source_word: וְהַלְּבָנִים
  chosen: the white ones
  alternatives:
  - the white horses
  lexicon: HALOT
  rationale: The noun 'horses' is not repeated in Hebrew, only the adjective with
    article. 'The white ones' preserves the ellipsis while remaining natural in English.
- source_word: יָצְאוּ
  chosen: have gone out
  alternatives:
  - went out
  - go out
  lexicon: HALOT
  rationale: The qatal here is rendered as a completed action in the vision sequence.
    'Have gone out' fits the relation to the black horses and the following directional
    phrase.
- source_word: אֶל אַחֲרֵיהֶם
  chosen: after them
  alternatives:
  - behind them
  - following them
  lexicon: HALOT
  rationale: Conveys movement in sequence behind the black horses. 'After them' is
    concise and idiomatic.
- source_word: וְהַבְּרֻדִּים
  chosen: the dappled ones
  alternatives:
  - the spotted ones
  - the speckled ones
  lexicon: HALOT
  rationale: בְּרֻדִּים denotes a variegated or spotted coloration. 'Dappled' is a
    natural English equivalent for horse coloring and fits the vision imagery well.
- source_word: אֶל אֶרֶץ הַתֵּימָן
  chosen: to the land of the south
  alternatives:
  - to the south country
  - to the land of Teman
  lexicon: HALOT
  rationale: תֵּימָן can denote 'south/southland' and in some contexts functions as
    the place-name Teman. Here the directional parallel with 'land of the north' favors
    the common noun sense 'south.' The place-name possibility is preserved in a footnote.
