theological_decisions:
- issue: Meaning of הַתֵּימָן in this vision context
  chosen_reading: south
  alternative_readings:
  - Teman
  rationale: The verse pairs 'land of the north' with 'land of the south,' suggesting
    directional regions rather than a specific Edomite locale. Rendering it as 'south'
    preserves the parallelism and the movement pattern of the chariots in the vision.
  doctrine_reference: 'Translation philosophy: preserve ambiguity where genuine; document
    per-verse variance.'
