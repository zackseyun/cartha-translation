id: ZEC.6.1
reference: Zechariah 6:1
source:
  edition: WLC
  text: וָ/אָשֻׁ֗ב וָ/אֶשָּׂ֤א עֵינַ/י֙ וָֽ/אֶרְאֶ֔ה וְ/הִנֵּ֨ה אַרְבַּ֤ע מַרְכָּבוֹת֙
    יֹֽצְא֔וֹת מִ/בֵּ֖ין שְׁנֵ֣י הֶֽ/הָרִ֑ים וְ/הֶ/הָרִ֖ים הָרֵ֥י נְחֹֽשֶׁת׃
translation:
  text: Then I turned and lifted up my eyes and saw, and behold, four chariots were
    coming out from between two mountains—and the mountains were mountains of bronze.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''from between the two mountains.'' The Hebrew has the definite article:
      ''the two mountains.'''
    reason: lexical_alternative
  - marker: b
    text: '''Bronze'' may also be rendered ''copper.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאָשֻׁב
  chosen: Then I turned
  alternatives:
  - And I turned
  - I turned again
  lexicon: HALOT
  rationale: The verb שוב in this vision-report formula can mean 'turn/return.' In
    context, Zechariah resumes visionary attention, so 'turned' is the clearest main-text
    rendering. 'Then' reflects the narrative waw without overloading the English with
    repeated 'and.' 'I turned again' is possible, but the adverbial nuance is not
    required in English here.
- source_word: וָאֶשָּׂא עֵינַי
  chosen: lifted up my eyes
  alternatives:
  - raised my eyes
  - looked up
  lexicon: HALOT
  rationale: This is a common Hebrew idiom for directing one's gaze. 'Lifted up my
    eyes' preserves the idiom with natural English and maintains the elevated prophetic
    style better than the more interpretive 'looked up.'
- source_word: וָאֶרְאֶה
  chosen: and saw
  alternatives:
  - and I saw
  lexicon: HALOT
  rationale: A straightforward rendering of the vision verb ראה. The shorter English
    phrasing reads naturally while preserving the sequence of prophetic perception.
- source_word: וְהִנֵּה
  chosen: and behold
  alternatives:
  - behold
  - and look
  lexicon: HALOT
  rationale: הִנֵּה marks vivid presentation and sudden attention. 'And behold' preserves
    the discourse force and prophetic tone better than a flatter omission.
- source_word: אַרְבַּע מַרְכָּבוֹת
  chosen: four chariots
  lexicon: HALOT
  rationale: The noun clearly denotes chariots, not merely wagons or teams. 'Four
    chariots' is the direct and contextually appropriate rendering.
- source_word: יֹצְאוֹת
  chosen: were coming out
  alternatives:
  - were going out
  - came out
  lexicon: HALOT
  rationale: The participle depicts ongoing action in the vision. 'Were coming out'
    captures the progressive aspect from the prophet's viewpoint. 'Were going out'
    is also possible, but 'coming out' is more idiomatic in English for emergence
    from between the mountains.
- source_word: מִבֵּין שְׁנֵי הֶהָרִים
  chosen: from between two mountains
  alternatives:
  - from between the two mountains
  lexicon: HALOT
  rationale: The Hebrew includes the article on 'mountains' ('the two mountains'),
    likely referring to the specific mountains immediately described. English can
    render this idiomatically as 'between two mountains' without loss, since the following
    clause identifies them. The more formal alternative is preserved in a footnote.
- source_word: וְהֶהָרִים הָרֵי נְחֹשֶׁת
  chosen: and the mountains were mountains of bronze
  alternatives:
  - and the mountains were bronze mountains
  - and the mountains were mountains of النحاس/copper
  lexicon: HALOT
  rationale: 'The Hebrew repeats ''mountains'' for emphasis: literally, ''and the
    mountains, mountains of neḥoshet.'' Preserving the repetition reflects the source''s
    style. נְחֹשֶׁת can denote bronze or copper; ''bronze'' is the standard English
    rendering in many biblical contexts and best fits established usage here.'
