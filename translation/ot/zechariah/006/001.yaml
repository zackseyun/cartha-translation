theological_decisions:
- issue: Material term נְחֹשֶׁת
  chosen_reading: bronze
  alternative_readings:
  - copper
  rationale: This is primarily a lexical rather than doctrinal issue. 'Bronze' is
    retained in the main text because it is the conventional and likely intended sense
    in biblical English for monumental metal imagery, while 'copper' remains a viable
    alternative and is preserved in a footnote for transparency.
