theological_decisions:
- issue: Meaning of 'my Spirit' in the clause 'have set my Spirit at rest'
  chosen_reading: A reference to God's own Spirit/disposition being caused to rest,
    likely in the sense that divine wrath or judicial activity has been satisfied
    in the north.
  alternative_readings:
  - '''my spirit'' as my anger/wrath'
  - '''my wind'' as an impersonal force'
  rationale: The Hebrew רוּחַ allows several senses. In this vision context, the phrase
    most naturally refers to God's own רוח being quieted or given rest after the chariots'
    mission toward the north. Rendering 'my Spirit' preserves the lexical form and
    theological weight without collapsing it into an interpretive paraphrase like
    'my wrath.' The wrath-related nuance is preserved in documentation rather than
    imported into the main text.
  doctrine_reference: Preserve theological tension rather than resolve it.
