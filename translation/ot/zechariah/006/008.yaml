id: ZEC.6.8
reference: Zechariah 6:8
source:
  edition: WLC
  text: וַ/יַּזְעֵ֣ק אֹתִ֔/י וַ/יְדַבֵּ֥ר אֵלַ֖/י לֵ/אמֹ֑ר רְאֵ֗ה הַ/יּֽוֹצְאִים֙
    אֶל אֶ֣רֶץ צָפ֔וֹן הֵנִ֥יחוּ אֶת רוּחִ֖/י בְּ/אֶ֥רֶץ צָפֽוֹן־־׃ס
translation:
  text: Then he called out to me and spoke to me, saying, “See, those going out to
    the land of the north have set my Spirit at rest in the land of the north.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “have given rest to my spirit”; the phrase may also carry the sense that
      God's anger or judicial displeasure has been quieted in the north.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּזְעֵק
  chosen: called out
  alternatives:
  - cried out
  - summoned
  lexicon: HALOT
  rationale: The verb זעק commonly denotes a loud cry or call. 'Called out' preserves
    the audible, urgent sense without over-specifying emotion. 'Summoned' is possible
    in context but is less direct to the verbal force.
- source_word: וַיְדַבֵּר אֵלַי לֵאמֹר
  chosen: spoke to me, saying
  alternatives:
  - said to me
  lexicon: HALOT
  rationale: This is a standard Hebrew speech formula. 'Spoke to me, saying' keeps
    the formal structure while remaining natural English.
- source_word: רְאֵה
  chosen: See
  alternatives:
  - Look
  - Behold
  lexicon: HALOT
  rationale: The imperative draws attention to what follows. 'See' is concise and
    natural; 'Behold' is too archaic for the stated philosophy, while 'Look' is slightly
    more colloquial.
- source_word: הַיֹּצְאִים
  chosen: those going out
  alternatives:
  - those who are going out
  - those who went out
  lexicon: HALOT
  rationale: The participle is best represented as an ongoing or characteristic action.
    'Those going out' is readable and preserves the participial sense better than
    a simple past.
- source_word: אֶל אֶרֶץ צָפוֹן
  chosen: to the land of the north
  alternatives:
  - to the north country
  - toward the land of the north
  lexicon: HALOT
  rationale: Literally 'to the land of north.' 'The land of the north' preserves the
    directional-geographical expression with minimal interpretation. 'North country'
    is idiomatic but slightly more interpretive.
- source_word: הֵנִיחוּ
  chosen: have set ... at rest
  alternatives:
  - have given ... rest
  - have quieted
  - have caused ... to rest
  lexicon: HALOT
  rationale: 'From נוח/הניח, the causative sense is prominent: to cause to rest, settle,
    or quiet. ''Have set ... at rest'' communicates completed action and fits the
    idiom with ''my Spirit''.'
- source_word: רוּחִי
  chosen: my Spirit
  alternatives:
  - my spirit
  - my wind
  lexicon: HALOT
  rationale: רוּחַ can mean spirit, wind, or breath. In this prophetic context, with
    divine first-person suffix and the sense of appeasement/judgment being satisfied,
    'my Spirit' is the most fitting rendering. The lowercase alternative is possible
    if taken as disposition, and 'wind' is lexically possible but contextually weak.
- source_word: בְּאֶרֶץ צָפוֹן
  chosen: in the land of the north
  alternatives:
  - in the north country
  lexicon: HALOT
  rationale: The repeated phrase is retained consistently. 'In the land of the north'
    mirrors the Hebrew repetition and preserves the rhetorical emphasis.
