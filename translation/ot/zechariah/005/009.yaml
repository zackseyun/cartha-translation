id: ZEC.5.9
reference: Zechariah 5:9
source:
  edition: WLC
  text: וָ/אֶשָּׂ֨א עֵינַ֜/י וָ/אֵ֗רֶא וְ/הִנֵּה֩ שְׁתַּ֨יִם נָשִׁ֤ים יֽוֹצְאוֹת֙
    וְ/ר֣וּחַ בְּ/כַנְפֵי/הֶ֔ם וְ/לָ/הֵ֥נָּה כְנָפַ֖יִם כְּ/כַנְפֵ֣י הַ/חֲסִידָ֑ה
    וַ/תִּשֶּׂ֨אנָה֙ אֶת הָ֣/אֵיפָ֔ה בֵּ֥ין הָ/אָ֖רֶץ וּ/בֵ֥ין הַ/שָּׁמָֽיִם־׃
translation:
  text: Then I lifted up my eyes and saw, and behold, two women were coming out, and
    the wind was in their wings. They had wings like the wings of a stork, and they
    lifted up the ephah between the earth and the heavens.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the measuring basket.' An ephah was a standard dry measure and here
      refers to the container seen in the vision.
    reason: lexical_alternative
  - marker: b
    text: Or, 'between the earth and heaven.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֶשָּׂא עֵינַי
  chosen: Then I lifted up my eyes
  alternatives:
  - I looked up
  lexicon: HALOT
  rationale: Retains the Hebrew visionary idiom rather than flattening it entirely;
    'Then' reflects the narrative waw sequence in context.
- source_word: וָאֵרֶא וְהִנֵּה
  chosen: and saw, and behold
  alternatives:
  - and saw, and look
  - and I saw, and there were
  lexicon: HALOT
  rationale: Preserves the vividness of the vision report. 'Behold' is slightly traditional
    but still understandable and reflects הִנֵּה's deictic force better than omitting
    it.
- source_word: שְׁתַּיִם נָשִׁים
  chosen: two women
  lexicon: HALOT
  rationale: Straightforward rendering; gender is explicit in the Hebrew and should
    be preserved.
- source_word: יֹצְאוֹת
  chosen: were coming out
  alternatives:
  - were going out
  - came out
  lexicon: HALOT
  rationale: The participle conveys ongoing action in the vision scene; 'were coming
    out' fits the immediate visual perspective.
- source_word: וְרוּחַ בְּכַנְפֵיהֶם
  chosen: and the wind was in their wings
  alternatives:
  - and a wind was in their wings
  - and spirit was in their wings
  lexicon: HALOT
  rationale: רוּחַ can mean 'wind' or 'spirit.' Here the imagery of flight and the
    following mention of wings strongly favors 'wind.' The singular noun with plural
    suffix is rendered naturally in English. Although the suffix is written with a
    masculine form, the referent is the two women, so 'their wings' is the sense.
- source_word: וְלָהֵנָּה כְנָפַיִם
  chosen: They had wings
  alternatives:
  - and they had wings
  - and to them were wings
  lexicon: HALOT
  rationale: This clause is existential/possessive in Hebrew; idiomatic English expresses
    it as possession. The conjunction is absorbed for smoother English.
- source_word: כְּכַנְפֵי הַחֲסִידָה
  chosen: like the wings of a stork
  alternatives:
  - like stork wings
  lexicon: HALOT
  rationale: חֲסִידָה is the bird 'stork.' The simile is kept explicit and concrete.
- source_word: וַתִּשֶּׂאנָה
  chosen: they lifted up
  alternatives:
  - they carried away
  - they bore
  lexicon: HALOT
  rationale: The verb נשׂא commonly means 'lift/carry.' In this immediate context
    of aerial transport, 'lifted up' matches the imagery and prepares for the spatial
    phrase that follows.
- source_word: אֶת־הָאֵיפָה
  chosen: the ephah
  alternatives:
  - the basket
  - the measuring basket
  lexicon: HALOT
  rationale: אֵיפָה is literally an ephah, a dry measure; in this vision it denotes
    the container seen earlier. To avoid over-paraphrase, the main text keeps 'ephah,'
    while a footnote can clarify the object as a measuring basket/container.
- source_word: בֵּין הָאָרֶץ וּבֵין הַשָּׁמָיִם
  chosen: between the earth and the heavens
  alternatives:
  - between earth and heaven
  - between the land and the sky
  lexicon: HALOT
  rationale: שָּׁמַיִם is morphologically plural and often naturally rendered 'heavens';
    'earth' is preferable to 'land' here because the contrast is cosmic rather than
    territorial.
