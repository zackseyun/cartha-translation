theological_decisions:
- issue: Meaning of רוּחַ in the visionary transport scene
  chosen_reading: wind
  alternative_readings:
  - spirit
  rationale: 'The immediate context is physical flight: wings, stork imagery, and
    lifting the ephah between earth and heaven. Rendering רוּחַ as ''wind'' preserves
    the concrete image without importing a more theological sense not demanded by
    the text.'
  doctrine_reference: Translation philosophy §1, §3
- issue: Rendering אֵיפָה in a prophetic vision
  chosen_reading: the ephah
  alternative_readings:
  - the basket
  - the measuring basket
  rationale: A more interpretive rendering such as 'basket' may help readers, but
    the Hebrew term itself is a standard measure and has already functioned as a key
    image in the passage. Keeping 'ephah' in the main text preserves lexical continuity
    and avoids over-interpretation; explanatory clarification is suitable in a footnote.
  doctrine_reference: Translation philosophy §1, §5
