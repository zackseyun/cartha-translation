id: ZEC.5.8
reference: Zechariah 5:8
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר֙ זֹ֣את הָ/רִשְׁעָ֔ה וַ/יַּשְׁלֵ֥ךְ אֹתָ֖/הּ אֶל תּ֣וֹךְ הָֽ/אֵיפָ֑ה
    וַ/יַּשְׁלֵ֛ךְ אֶת אֶ֥בֶן הָ/עֹפֶ֖רֶת אֶל פִּֽי/הָ־־־׃ס
translation:
  text: And he said, “This is Wickedness,” and he threw her into the middle of the
    ephah basket, and he threw the lead stone onto its opening.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'ephah,' a standard dry-measure container; here it refers to the
      basket-like vessel seen in the vision.
    reason: cultural_note
  - marker: b
    text: Or 'the lead weight' / 'the stone of lead.'
    reason: lexical_alternative
  - marker: c
    text: Literally 'to its mouth'; that is, to the opening of the ephah basket.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָרִשְׁעָה
  chosen: Wickedness
  alternatives:
  - the wickedness
  - wicked woman
  lexicon: HALOT
  rationale: The noun is an abstract feminine singular with the article, used here
    as a personified designation for the woman in the basket. Capitalizing 'Wickedness'
    signals personification in English without adding content. 'The wickedness' is
    more formally literal but less natural in direct speech; 'wicked woman' over-interprets
    by converting the abstract noun into a descriptive label not present in the Hebrew.
- source_word: וַיַּשְׁלֵךְ אֹתָהּ
  chosen: he threw her
  alternatives:
  - he cast her
  - he thrust her
  lexicon: HALOT
  rationale: שׁלך commonly means 'throw/cast.' 'Threw' is clear modern English. The
    feminine object suffix refers back to the woman/personified Wickedness, so 'her'
    is required.
- source_word: תּוֹךְ
  chosen: the middle of
  alternatives:
  - into
  - inside
  lexicon: HALOT
  rationale: תּוֹךְ denotes the midst/interior. 'The middle of' preserves the concrete
    spatial force better than a bare 'into,' while remaining idiomatic with the container
    image.
- source_word: הָאֵיפָה
  chosen: the ephah basket
  alternatives:
  - the ephah
  - the basket
  lexicon: HALOT
  rationale: אֵיפָה is literally an 'ephah,' a dry-measure vessel. Since many English
    readers will not know the term, 'ephah basket' preserves the Hebrew measure term
    while clarifying that it is the container seen in the vision.
- source_word: אֶבֶן הָעֹפֶרֶת
  chosen: the lead stone
  alternatives:
  - the lead weight
  - the stone of lead
  - the lead cover
  lexicon: HALOT
  rationale: Literally 'stone of lead.' In context it is the heavy lead piece used
    to seal the container. 'Lead stone' stays close to the Hebrew wording while remaining
    intelligible. 'Lead weight' is interpretive; 'lead cover' is more explanatory
    than the text itself.
- source_word: אֶל־פִּיהָ
  chosen: onto its opening
  alternatives:
  - upon its mouth
  - to its mouth
  - over its opening
  lexicon: HALOT
  rationale: פֶּה literally means 'mouth,' but for a container in English 'opening'
    is the natural equivalent. The suffix refers to the ephah, so 'its' is appropriate.
    'Onto' reflects the motion of placing the lead stone at the opening to close it.
