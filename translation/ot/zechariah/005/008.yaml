theological_decisions:
- issue: Personification of evil in the vision
  chosen_reading: Render the abstract noun as personified 'Wickedness' while retaining
    feminine pronouns for the figure.
  alternative_readings:
  - Render more literally as 'This is the wickedness' without capitalization
  - Interpret as 'This is the wicked woman'
  rationale: The Hebrew identifies the woman with the abstract noun רִשְׁעָה. The
    vision depicts wickedness personified, but the text does not warrant expanding
    the statement into a moral description beyond that identification. Capitalization
    helps English readers perceive the personification without importing extra theology.
  doctrine_reference: Translation philosophy §3, §6
