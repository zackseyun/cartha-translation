id: ZEC.5.7
reference: Zechariah 5:7
source:
  edition: WLC
  text: וְ/הִנֵּ֛ה כִּכַּ֥ר עֹפֶ֖רֶת נִשֵּׂ֑את וְ/זֹאת֙ אִשָּׁ֣ה אַחַ֔ת יוֹשֶׁ֖בֶת
    בְּ/ת֥וֹךְ הָ/אֵיפָֽה׃
translation:
  text: And behold, a lead cover was lifted, and this was one woman sitting inside
    the ephah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a round lead weight,' 'a disk of lead,' or more literally 'a talent
      of lead.' The Hebrew expression can denote a heavy round mass of lead; here
      it appears to function as the ephah's cover.
    reason: lexical_alternative
  - marker: b
    text: An ephah was a dry measure and, by extension, the container used for it;
      hence some render 'basket.'
    reason: cultural_note
lexical_decisions:
- source_word: וְהִנֵּה
  chosen: And behold
  alternatives:
  - And look
  - Now look
  lexicon: HALOT
  rationale: Retains the vivid deictic/interjectional force that marks a new element
    in the vision. 'Behold' is slightly elevated but still natural in prophetic narrative
    and preserves the suddenness better than a flatter 'look.'
- source_word: כִּכַּר עֹפֶרֶת
  chosen: a lead cover
  alternatives:
  - a round lead weight
  - a disk of lead
  - a talent of lead
  lexicon: HALOT
  rationale: כִּכַּר can denote a round disk or loaf-shaped mass, and in context functions
    as the heavy lead object covering the ephah basket/container. 'Cover' best captures
    its narrative role here, while the more literal shape/weight nuances are preserved
    as alternatives. 'Talent of lead' is possible lexically but would foreground weight
    as a unit rather than function in the scene.
- source_word: נִשֵּׂאת
  chosen: was lifted
  alternatives:
  - was raised
  - was carried
  lexicon: HALOT
  rationale: The Niphal participial/passive sense here fits the visual action of the
    lead piece being lifted up from the ephah. 'Was lifted' is the clearest idiomatic
    English for the scene.
- source_word: וְזֹאת
  chosen: and this was
  alternatives:
  - and this is
  - and behold, this was
  lexicon: HALOT
  rationale: Introduces what the prophet sees when the cover is lifted. Supplying
    'was' makes the verbless Hebrew clause natural in English and fits the visionary
    past narration.
- source_word: אִשָּׁה אַחַת
  chosen: one woman
  alternatives:
  - a woman
  - a certain woman
  lexicon: HALOT
  rationale: אַחַת is significant and should be represented. 'One woman' preserves
    the numeral without overinterpreting it as 'certain woman.'
- source_word: יוֹשֶׁבֶת
  chosen: sitting
  alternatives:
  - dwelling
  - seated
  lexicon: HALOT
  rationale: The participle describes the woman's posture/location within the container.
    'Sitting' is the most direct and natural rendering.
- source_word: בְּתוֹךְ הָאֵיפָה
  chosen: inside the ephah
  alternatives:
  - in the midst of the ephah
  - inside the basket
  lexicon: HALOT
  rationale: אֵיפָה is literally an ephah, a dry-measure vessel; retaining 'ephah'
    preserves the concrete cultural term used throughout the vision. 'Inside' renders
    בְּתוֹךְ idiomatically. Because many readers may not know the vessel implied by
    the measure, 'basket' is preserved as an explanatory alternative in a footnote.
