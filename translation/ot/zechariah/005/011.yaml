theological_decisions:
- issue: Referent of the feminine pronouns in the final clause
  chosen_reading: The feminine forms refer to the woman/personified wickedness seen
    earlier in the vision, so the clause is rendered 'she will be set there on her
    pedestal.'
  alternative_readings:
  - The feminine may be construed more abstractly with reference to the ephah or wickedness
    as an impersonal entity, yielding 'it will be set there on its pedestal.'
  rationale: The immediately preceding vision identifies a woman in the basket as
    'Wickedness' (5:8), and the feminine verbal/suffix forms naturally continue that
    personification. Preserving 'she' maintains the literary imagery and avoids flattening
    the vision into abstraction.
  doctrine_reference: Preserve theological tension rather than resolve it; ambiguity
    is noted in footnote rather than erased.
