id: ZEC.5.11
reference: Zechariah 5:11
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר אֵלַ֔/י לִ/בְנֽוֹת לָ֥/הֿ בַ֖יִת בְּ/אֶ֣רֶץ שִׁנְעָ֑ר וְ/הוּכַ֛ן
    וְ/הֻנִּ֥יחָה שָּׁ֖ם עַל מְכֻנָתָֽ/הּ־־׃ס
translation:
  text: And he said to me, “To build a house for her in the land of Shinar; and when
    it is prepared, she will be set there on her pedestal.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'it will be set there on its base/pedestal.' The Hebrew feminine forms
      may be understood with reference to the woman called Wickedness, or more abstractly
      to the ephah/its contents.
    reason: alternative_reading
  - marker: b
    text: Shinar is the ancient name associated with Babylonia in the Old Testament.
    reason: cross_reference
lexical_decisions:
- source_word: וַיֹּאמֶר אֵלַי
  chosen: And he said to me
  alternatives:
  - Then he said to me
  lexicon: HALOT
  rationale: Standard narrative wayyiqtol introducing the angel's explanation. 'And'
    preserves Hebrew narrative flow; 'to me' is explicit in the text.
- source_word: לִבְנוֹת לָהּ בַּיִת
  chosen: To build a house for her
  alternatives:
  - To build her a house
  lexicon: HALOT
  rationale: 'Infinitive construct with ל expresses purpose: the destination/action
    is to build a house for the woman/personified wickedness in the ephah. ''For her''
    preserves the indirect-object nuance.'
- source_word: בְּאֶרֶץ שִׁנְעָר
  chosen: in the land of Shinar
  alternatives:
  - in the land of Babylonia
  - in Shinar
  lexicon: HALOT
  rationale: Shinar is a place-name and should be transliterated rather than interpreted.
    'Land of Shinar' preserves the Hebrew expression and its canonical resonance with
    Babylonian rebellion motifs.
- source_word: וְהוּכַן
  chosen: when it is prepared
  alternatives:
  - and it will be established
  - and it will be made ready
  lexicon: HALOT
  rationale: Hophal of כון conveys being made ready, established, or set in order.
    Here the antecedent is best taken as the house, and the temporal sense in English
    ('when it is prepared') makes the sequence natural without over-paraphrasing.
- source_word: וְהֻנִּיחָה
  chosen: she will be set there
  alternatives:
  - she will be placed there
  - it will be set there
  lexicon: HALOT
  rationale: The verb is feminine singular, matching the feminine figure previously
    seen in the ephah. English future best conveys the resultative sequence. 'Set'
    is concise and fits the cultic/placement context.
- source_word: עַל מְכֻנָתָהּ
  chosen: on her pedestal
  alternatives:
  - on her base
  - on its pedestal
  - on her stand
  lexicon: HALOT
  rationale: מְכוּנָה denotes a fixed base, stand, or pedestal. 'Pedestal' best fits
    the image of the woman being installed in a prepared house, possibly with idolatrous
    overtones. The feminine suffix supports 'her pedestal,' though English readers
    may also understand it as the pedestal belonging to the installed figure.
