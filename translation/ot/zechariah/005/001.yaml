id: ZEC.5.1
reference: Zechariah 5:1
source:
  edition: WLC
  text: וָ/אָשׁ֕וּב וָ/אֶשָּׂ֥א עֵינַ֖/י וָֽ/אֶרְאֶ֑ה וְ/הִנֵּ֖ה מְגִלָּ֥ה עָפָֽה׃
translation:
  text: Then I turned and lifted my eyes and saw, and behold, a flying scroll.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a scroll that was flying.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'I turned' may also be understood as 'I turned again,' introducing
      the next vision scene.
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאָשׁוּב
  chosen: Then I turned
  alternatives:
  - And I turned
  - I turned again
  lexicon: HALOT
  rationale: The verb שוב in the wayyiqtol sequence can mean 'turn/return.' In this
    vision-report context, English 'turned' is natural, while 'Then' conveys the narrative
    progression of the prefixed waw without over-literal repetition of 'and.' 'Again'
    is possible because the prophet moves from one vision to another, but the immediate
    sense is physical or attentional turning.
- source_word: וָאֶשָּׂא עֵינַי
  chosen: lifted my eyes
  alternatives:
  - raised my eyes
  - looked up
  lexicon: HALOT
  rationale: The idiom נשׂא עינים is a standard Hebrew expression meaning to lift
    or raise one's eyes. 'Lifted my eyes' preserves the Hebrew imagery and remains
    clear in English; 'looked up' is smoother but less formally transparent.
- source_word: וָאֶרְאֶה
  chosen: saw
  alternatives:
  - looked
  - I saw
  lexicon: HALOT
  rationale: ראה here reports the prophet's visionary perception. 'Saw' is the direct
    and natural rendering in the narrative chain.
- source_word: וְהִנֵּה
  chosen: behold
  alternatives:
  - look
  - there was
  lexicon: HALOT
  rationale: הִנֵּה marks vivid presentation and draws attention to what appears in
    the vision. 'Behold' preserves that force better than flatter alternatives, and
    it remains acceptable in biblical narrative despite being somewhat elevated.
- source_word: מְגִלָּה
  chosen: scroll
  alternatives:
  - roll
  lexicon: HALOT
  rationale: מְגִלָּה denotes a written roll or scroll. 'Scroll' is standard modern
    English and clearer than the older 'roll.'
- source_word: עָפָה
  chosen: flying
  alternatives:
  - that was flying
  lexicon: HALOT
  rationale: The feminine singular participle agrees with מְגִלָּה and describes its
    state/action. Attributive English 'flying scroll' is concise and natural, while
    preserving the participial sense.
