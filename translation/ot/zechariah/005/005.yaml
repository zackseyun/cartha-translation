id: ZEC.5.5
reference: Zechariah 5:5
source:
  edition: WLC
  text: וַ/יֵּצֵ֕א הַ/מַּלְאָ֖ךְ הַ/דֹּבֵ֣ר בִּ֑/י וַ/יֹּ֣אמֶר אֵלַ֔/י שָׂ֣א נָ֤א
    עֵינֶ֨י/ךָ֙ וּ/רְאֵ֔ה מָ֖ה הַ/יּוֹצֵ֥את הַ/זֹּֽאת׃
translation:
  text: Then the angel who was speaking with me came forward and said to me, “Please
    lift up your eyes and see what this is that is coming out.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “went out” / “came out”; the Hebrew verb is the common motion verb יָצָא.
    reason: lexical_alternative
  - marker: b
    text: Hebrew literally, “the angel who was speaking in me,” an idiom here meaning
      “with me.”
    reason: lexical_alternative
  - marker: c
    text: Or “what is this that is going out?”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּצֵא
  chosen: came forward
  alternatives:
  - went out
  - came out
  lexicon: HALOT
  rationale: The basic sense of יצא is 'go out/come out.' In this vision report, English
    'came forward' communicates the angel's movement into the prophet's attention
    more naturally than the wooden 'went out,' while still reflecting the motion verb
    without over-paraphrase.
- source_word: הַמַּלְאָךְ
  chosen: the angel
  alternatives:
  - the messenger
  lexicon: HALOT
  rationale: מלאך can mean 'messenger' or 'angel.' In Zechariah's visionary context,
    the being who interprets the vision is best rendered 'angel.'
- source_word: הַדֹּבֵר בִּי
  chosen: who was speaking with me
  alternatives:
  - who talked with me
  - who spoke in me
  lexicon: HALOT
  rationale: The idiom in Zechariah regularly refers to the interpreting angel in
    conversation with the prophet. Although בִּי is literally 'in me,' idiomatic English
    and contextual usage support 'with me.' 'Was speaking' reflects the participle's
    ongoing sense.
- source_word: וַיֹּאמֶר אֵלַי
  chosen: and said to me
  lexicon: HALOT
  rationale: Standard narrative rendering of the wayyiqtol plus preposition; no special
    nuance requires deviation.
- source_word: שָׂא נָא עֵינֶיךָ
  chosen: Please lift up your eyes
  alternatives:
  - Lift up your eyes, please
  - Look up
  lexicon: HALOT
  rationale: The Hebrew idiom literally says 'lift up, please, your eyes.' 'Please'
    reflects נָא as a polite particle, and 'lift up your eyes' preserves the idiom
    more closely than the more dynamic 'look up.'
- source_word: וּרְאֵה
  chosen: and see
  alternatives:
  - and look
  lexicon: HALOT
  rationale: ראה commonly means 'see.' Here it introduces attention to the next visual
    element in the vision.
- source_word: מָה
  chosen: what
  alternatives:
  - which thing
  lexicon: HALOT
  rationale: Simple interrogative pronoun introducing the object to be identified.
- source_word: הַיּוֹצֵאת
  chosen: is coming out
  alternatives:
  - is going out
  - comes out
  lexicon: HALOT
  rationale: The feminine singular participle denotes an ongoing action. 'Is coming
    out' fits the deictic perspective of the speaker showing the prophet what is emerging
    in the vision.
- source_word: הַזֹּאת
  chosen: this
  alternatives:
  - this thing
  lexicon: HALOT
  rationale: Feminine demonstrative referring to the emerging object. English can
    leave 'thing' implicit, but it is supplied in the clause for clarity.
