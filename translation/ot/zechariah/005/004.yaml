id: ZEC.5.4
reference: Zechariah 5:4
source:
  edition: WLC
  text: הוֹצֵאתִ֗י/הָ נְאֻם֙ יְהוָ֣ה צְבָא֔וֹת וּ/בָ֨אָה֙ אֶל בֵּ֣ית הַ/גַּנָּ֔ב וְ/אֶל
    בֵּ֛ית הַ/נִּשְׁבָּ֥ע בִּ/שְׁמִ֖/י לַ/שָּׁ֑קֶר וְ/לָ֨נֶה֙ בְּ/ת֣וֹךְ בֵּית֔/וֹ
    וְ/כִלַּ֖תּ/וּ וְ/אֶת עֵצָ֥י/ו וְ/אֶת אֲבָנָֽי/ו־־־־׃
translation:
  text: I have sent it out, declares the LORD of hosts, and it will enter the house
    of the thief and the house of the one who swears falsely by my name, and it will
    remain inside his house and consume it, both its timber and its stones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I have brought it forth.' The Hebrew verb can be rendered more literally
      this way, but here it carries the sense of sending the curse out to do its work.
    reason: lexical_alternative
  - marker: b
    text: Or 'and it will lodge' or 'spend the night.' The Hebrew verb suggests remaining
      in the house rather than merely entering it.
    reason: lexical_alternative
lexical_decisions:
- source_word: הוֹצֵאתִיהָ
  chosen: I have sent it out
  alternatives:
  - I have brought it forth
  - I have sent her out
  lexicon: HALOT
  rationale: From יצא in the Hiphil, first person singular with 3fs suffix, referring
    back to the flying scroll/curse (feminine). English uses 'it' for the inanimate
    antecedent. 'Sent it out' is idiomatic and preserves divine agency better than
    a more wooden 'brought it forth' in this judgment context.
- source_word: נְאֻם יְהוָה צְבָאוֹת
  chosen: declares the LORD of hosts
  alternatives:
  - oracle of the LORD of hosts
  - says the LORD of armies
  lexicon: HALOT
  rationale: Standard prophetic formula. 'Declares' is natural modern English for
    נְאֻם, and 'the LORD' follows the doctrinal default for YHWH. 'Of hosts' preserves
    the traditional sense of צבאות without over-paraphrasing.
- source_word: וּבָאָה
  chosen: and it will enter
  alternatives:
  - and it will come
  - and it will go in
  lexicon: HALOT
  rationale: Though literally 'and it will come,' with אֶל plus 'house' the sense
    is ingress. 'Enter' is the clearest English equivalent in context.
- source_word: בֵּית הַגַּנָּב
  chosen: the house of the thief
  alternatives:
  - the house of the robber
  lexicon: HALOT
  rationale: גנב denotes a thief/stealer. 'Thief' is the most direct and common rendering.
- source_word: הַנִּשְׁבָּע בִּשְׁמִי לַשָּׁקֶר
  chosen: the one who swears falsely by my name
  alternatives:
  - the one who swears by my name for falsehood
  - the perjurer by my name
  lexicon: HALOT
  rationale: The participle plus prepositional phrase describes a person invoking
    God's name deceitfully. 'Swears falsely by my name' is idiomatic and preserves
    the covenantal seriousness of false oath-taking.
- source_word: וְלָנֶה
  chosen: and it will remain
  alternatives:
  - and it will lodge
  - and it will stay overnight
  lexicon: HALOT
  rationale: לון can mean lodge/spend the night, but here the point is continued presence
    of the curse in the offender's house until destruction is complete. 'Remain' communicates
    that durative force naturally.
- source_word: בְּתוֹךְ בֵּיתוֹ
  chosen: inside his house
  alternatives:
  - in the midst of his house
  - within his house
  lexicon: HALOT
  rationale: בְּתוֹךְ indicates interior location. 'Inside his house' is clear modern
    English.
- source_word: וְכִלַּתּוּ
  chosen: and consume it
  alternatives:
  - and finish it
  - and destroy it completely
  lexicon: HALOT
  rationale: כלה in the Piel conveys bringing to an end, consuming, or destroying
    completely. 'Consume it' fits the imagery of a curse eating away a house and prepares
    for the mention of timber and stones.
- source_word: עֵצָיו
  chosen: its timber
  alternatives:
  - its wood
  - its beams
  lexicon: HALOT
  rationale: Literally 'its woods/woodwork.' In house-construction context, 'timber'
    is more natural and specific than bare 'wood,' while not over-specifying to 'beams'.
- source_word: אֲבָנָיו
  chosen: its stones
  alternatives:
  - its masonry
  lexicon: HALOT
  rationale: Straightforward plural of 'stone.' 'Its stones' preserves the concrete
    image of total structural ruin.
