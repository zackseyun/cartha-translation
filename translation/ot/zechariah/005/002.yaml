id: ZEC.5.2
reference: Zechariah 5:2
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר אֵלַ֔/י מָ֥ה אַתָּ֖ה רֹאֶ֑ה וָ/אֹמַ֗ר אֲנִ֤י רֹאֶה֙ מְגִלָּ֣ה
    עָפָ֔ה אָרְכָּ/הּ֙ עֶשְׂרִ֣ים בָּֽ/אַמָּ֔ה וְ/רָחְבָּ֖/הּ עֶ֥שֶׂר בָּ/אַמָּֽה׃
translation:
  text: And he said to me, “What do you see?” And I said, “I see a flying scroll.
    Its length is twenty cubits, and its width ten cubits.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: A cubit was a standard ancient unit of length, roughly the distance from
      the elbow to the fingertips.
    reason: cultural_note
lexical_decisions:
- source_word: וַיֹּאמֶר אֵלַי
  chosen: And he said to me
  alternatives:
  - Then he said to me
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'And he said to me' is a
    natural English rendering that preserves the sequence without overinterpreting
    temporal nuance.
- source_word: מָה אַתָּה רֹאֶה
  chosen: What do you see?
  alternatives:
  - What are you seeing?
  lexicon: HALOT
  rationale: The Hebrew participle רֹאֶה can be rendered with present sense in context.
    Idiomatic English prefers simple present in direct question.
- source_word: וָאֹמַר אֲנִי רֹאֶה
  chosen: And I said, “I see
  alternatives:
  - Then I said, 'I am seeing'
  lexicon: HALOT
  rationale: Again, the participle expresses present perception. 'I see' is the most
    natural and accurate English equivalent.
- source_word: מְגִלָּה
  chosen: scroll
  alternatives:
  - roll
  lexicon: HALOT
  rationale: מְגִלָּה denotes a rolled written document. 'Scroll' is standard modern
    English and clearer than the older 'roll.'
- source_word: עָפָה
  chosen: flying
  alternatives:
  - flying through the air
  lexicon: HALOT
  rationale: The participle modifies 'scroll' and indicates motion. 'Flying' is concise
    and preserves the vivid imagery without expansion.
- source_word: אָרְכָּהּ
  chosen: Its length
  alternatives:
  - its long side
  lexicon: HALOT
  rationale: The noun refers to the length dimension of the scroll. 'Its length' is
    the straightforward dimensional term in English.
- source_word: עֶשְׂרִים בָּאַמָּה
  chosen: twenty cubits
  alternatives:
  - twenty cubits long
  lexicon: HALOT
  rationale: אַמָּה is the standard ancient measure 'cubit.' The unit is best retained
    rather than converted, preserving the source culture and precision.
- source_word: וְרָחְבָּהּ
  chosen: and its width
  alternatives:
  - and its breadth
  lexicon: HALOT
  rationale: '''Width'' is more natural in contemporary English than ''breadth'' while
    accurately reflecting the dimensional contrast with length.'
- source_word: עֶשֶׂר בָּאַמָּה
  chosen: ten cubits
  alternatives:
  - ten cubits wide
  lexicon: HALOT
  rationale: As with the previous measurement, retaining 'cubits' preserves the original
    unit. The adjective 'wide' is unnecessary because 'its width' already supplies
    the dimension.
