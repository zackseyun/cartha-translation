theological_decisions:
- issue: Interpretation of עֵינָם in the final clause
  chosen_reading: Render as 'their appearance' in the main text
  alternative_readings:
  - Render literally as 'their eye'
  - 'Follow an alternative textual tradition/interpretation: ''their iniquity'''
  rationale: The MT points to 'their eye,' which is difficult in context. Rendering
    it as 'their appearance' preserves a meaning that can arise from the Hebrew term
    without emending the text. Because 'their iniquity' is a well-known alternative
    reflected in some versions and interpretations, it is preserved in a footnote
    rather than adopted in the main text.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
