id: ZEC.5.6
reference: Zechariah 5:6
source:
  edition: WLC
  text: וָ/אֹמַ֖ר מַה הִ֑יא וַ/יֹּ֗אמֶר זֹ֤את הָֽ/אֵיפָה֙ הַ/יּוֹצֵ֔את וַ/יֹּ֕אמֶר
    זֹ֥את עֵינָ֖/ם בְּ/כָל הָ/אָֽרֶץ־־׃
translation:
  text: And I said, “What is it?” And he said, “This is the basket that is going out.”
    And he said, “This is their appearance in all the land.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'This is the ephah that is going out.' The Hebrew term refers to an ephah-measure
      and, by extension, the measuring container itself.
    reason: lexical_alternative
  - marker: b
    text: Hebrew literally, 'This is their eye in all the land.' Many understand the
      sense as 'their appearance' or 'what is seen of them'; others, following an
      alternative reading or interpretation, render 'their iniquity in all the land.'
    reason: alternative_reading
lexical_decisions:
- source_word: אֵיפָה
  chosen: basket
  alternatives:
  - ephah
  - measuring basket
  - container
  lexicon: HALOT
  rationale: Although אֵיפָה is literally an ephah dry-measure, in this vision it
    refers metonymically to the measuring container itself. 'Basket' gives the concrete
    object seen in the vision in readable English; 'ephah' is preserved as an alternative
    because many translations retain the technical term.
- source_word: הַיּוֹצֵאת
  chosen: that is going out
  alternatives:
  - that goes out
  - going forth
  lexicon: HALOT
  rationale: The participle from יצא with the article functions attributively, describing
    the basket as in motion or proceeding outward. 'That is going out' preserves the
    verbal aspect naturally in English.
- source_word: עֵינָם
  chosen: their appearance
  alternatives:
  - their eye
  - their iniquity
  lexicon: HALOT
  rationale: The consonantal text reads 'their eye,' but in context many understand
    the sense to be figurative for what is seen of them, hence 'their appearance.'
    This follows the plain lexical value of עין as 'eye' extended to visible appearance,
    while avoiding importing the conjectural reading 'their iniquity' into the main
    text.
- source_word: בְּכָל הָאָרֶץ
  chosen: in all the land
  alternatives:
  - throughout all the earth
  - in all the earth
  lexicon: HALOT
  rationale: הָאָרֶץ can mean 'land' or 'earth.' In Zechariah's visionary context
    either is possible, but 'land' better fits the likely scope of the vision and
    avoids overstating universality unless context demands the whole world.
- source_word: מַה הִיא
  chosen: What is it?
  alternatives:
  - What is this?
  - What is she?
  lexicon: HALOT
  rationale: The feminine pronoun agrees with the feminine noun later identified as
    the basket. English idiom uses 'it' for an object, so 'What is it?' is the most
    natural rendering.
