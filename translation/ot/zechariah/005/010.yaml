id: ZEC.5.10
reference: Zechariah 5:10
source:
  edition: WLC
  text: וָ/אֹמַ֕ר אֶל הַ/מַּלְאָ֖ךְ הַ/דֹּבֵ֣ר בִּ֑/י אָ֛נָה הֵ֥מָּה מֽוֹלִכ֖וֹת אֶת
    הָ/אֵיפָֽה־־׃
translation:
  text: Then I said to the angel who was speaking with me, “Where are they taking
    the ephah?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the basket” or “the measuring basket.” The Hebrew says “the ephah,”
      a standard dry measure, here referring to the container seen in the vision.
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֹמַר
  chosen: Then I said
  alternatives:
  - And I said
  - So I said
  lexicon: HALOT
  rationale: Wayyiqtol of אמר advances the narrative. 'Then I said' gives natural
    English narrative sequence while preserving the simple first-person speech introduction.
- source_word: הַמַּלְאָךְ
  chosen: the angel
  alternatives:
  - the messenger
  lexicon: HALOT
  rationale: מלאך can mean 'messenger' or 'angel.' In Zechariah's vision context,
    this figure is a supernatural interpreting messenger, so 'angel' is the clearest
    and most idiomatic choice.
- source_word: הַדֹּבֵר בִּי
  chosen: who was speaking with me
  alternatives:
  - who spoke with me
  - who talked with me
  - who was speaking in me
  lexicon: HALOT
  rationale: The participle דֹּבֵר with בִּי in this recurring Zechariah formula is
    idiomatically understood as 'speaking with me,' not literally 'in me.' The participle
    supports an ongoing or characteristic action, hence 'was speaking with me.' 'With'
    is the established sense of ב in this construction.
- source_word: אָנָה
  chosen: Where
  alternatives:
  - To where
  - Whither
  lexicon: HALOT
  rationale: The adverb asks destination. 'Where' is natural modern English; 'to where'
    is more formally explicit but less idiomatic, and 'whither' is archaic.
- source_word: הֵמָּה
  chosen: they
  alternatives:
  - these
  lexicon: HALOT
  rationale: Independent pronoun used for emphasis, referring to the two women in
    the preceding verse. English normally expresses this simply as 'they' without
    separately marking the emphasis.
- source_word: מוֹלִכוֹת
  chosen: are they taking
  alternatives:
  - are they carrying
  - are they bringing
  - are they leading
  lexicon: HALOT
  rationale: Hiphil participle feminine plural of הלך here means causing the ephah
    to go, i.e., transporting it. 'Taking' is the most natural English rendering in
    this question. 'Carrying' is possible but too specific; 'leading' fits persons
    better than an object like an ephah.
- source_word: אֶת הָאֵיפָה
  chosen: the ephah
  alternatives:
  - the basket
  - the measuring basket
  lexicon: HALOT
  rationale: אֵיפָה is literally an ephah, a dry measure, but in this vision it denotes
    the container seen earlier. Retaining 'ephah' preserves the source term and intertextual
    continuity in the passage; an explanatory alternative is worth preserving in a
    footnote for readability.
