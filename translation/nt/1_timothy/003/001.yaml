id: 1TI.3.1
reference: 1 Timothy 3:1
source:
  edition: SBLGNT
  text: Πιστὸς ὁ λόγος· εἴ τις ἐπισκοπῆς ὀρέγεται, καλοῦ ἔργου ἐπιθυμεῖ.
translation:
  text: 'This saying is trustworthy: if anyone aspires to oversight, he desires a
    good work.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the office of overseer'; traditionally, 'bishopric.'
    reason: alternative_reading
  - marker: b
    text: Or 'a noble task.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Πιστὸς ὁ λόγος
  chosen: This saying is trustworthy
  alternatives:
  - The saying is trustworthy
  - This is a trustworthy saying
  - The word is trustworthy
  lexicon: BDAG
  rationale: The idiom πιστὸς ὁ λόγος in the Pastoral Epistles functions as a formula
    introducing a reliable statement. 'Saying' better captures λόγος here than the
    more wooden 'word,' and 'trustworthy' is the natural rendering of πιστός in this
    formula.
- source_word: εἴ τις
  chosen: if anyone
  alternatives:
  - if someone
  - if a man
  lexicon: BDAG
  rationale: τις is an indefinite pronoun meaning 'anyone/someone.' Although grammatically
    masculine, the phrase is generic rather than explicitly male in itself, so 'anyone'
    best reflects the Greek without importing a male-specific restriction from this
    phrase alone.
- source_word: ἐπισκοπῆς
  chosen: oversight
  alternatives:
  - the office of overseer
  - overseership
  - bishopric
  lexicon: BDAG
  rationale: ἐπισκοπή denotes oversight, supervision, or the role/task associated
    with an overseer. 'Oversight' preserves the semantic range without prematurely
    hardening it into later ecclesiastical office language such as 'bishopric.' The
    following context will describe qualifications for the ἐπίσκοπος, so this wording
    keeps the connection transparent.
- source_word: ὀρέγεται
  chosen: aspires to
  alternatives:
  - reaches for
  - seeks
  - sets his heart on
  lexicon: BDAG
  rationale: ὀρέγομαι literally conveys stretching oneself toward something and idiomatically
    means to aspire to or seek after. 'Aspires to' is idiomatic modern English and
    fits the positive sense here.
- source_word: καλοῦ ἔργου
  chosen: a good work
  alternatives:
  - a noble task
  - a fine work
  lexicon: BDAG
  rationale: καλός can mean good, noble, or honorable. 'A good work' stays closer
    to the Greek wording and preserves the emphasis that this is work, not merely
    status or rank. 'Noble task' is possible but slightly more interpretive.
- source_word: ἐπιθυμεῖ
  chosen: he desires
  alternatives:
  - he longs for
  - he desires eagerly
  lexicon: BDAG
  rationale: ἐπιθυμέω means to desire, long for, or set one's desire on. Here it is
    positive in context. 'He desires' is straightforward and preserves the parallel
    with ὀρέγεται without over-intensifying.
