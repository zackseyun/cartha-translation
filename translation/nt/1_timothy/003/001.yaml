theological_decisions:
- issue: Whether ἐπισκοπῆς should be rendered with later church-office terminology
  chosen_reading: oversight
  alternative_readings:
  - the office of overseer
  - bishopric
  rationale: The verse speaks positively of aspiring to ἐπισκοπή, but the noun's lexical
    sense is broader than later fixed episcopal structures. Rendering it 'oversight'
    preserves the original-language sense and avoids importing later denominational
    polity into the text.
  doctrine_reference: Affirmations; Translation philosophy §1 and §6
- issue: Whether the generic τις should be rendered male-specifically in the conditional
    clause
  chosen_reading: if anyone
  alternative_readings:
  - if a man
  rationale: The indefinite pronoun itself is generic. A male pronoun is retained
    later in English ('he desires') because the immediate literary context goes on
    to describe the overseer with masculine singular forms, but the opening condition
    is best rendered generically.
  doctrine_reference: Translation philosophy §4
