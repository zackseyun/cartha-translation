id: 1TI.3.2
reference: 1 Timothy 3:2
source:
  edition: SBLGNT
  text: δεῖ οὖν τὸν ἐπίσκοπον ἀνεπίλημπτον εἶναι, μιᾶς γυναικὸς ἄνδρα, νηφάλιον, σώφρονα,
    κόσμιον, φιλόξενον, διδακτικόν,
translation:
  text: Therefore an overseer must be above reproach, the husband of one wife, sober-minded,
    self-controlled, respectable, hospitable, able to teach,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a one-woman man'; the phrase may emphasize marital faithfulness rather
      than only marital status.
    reason: alternative_reading
lexical_decisions:
- source_word: δεῖ
  chosen: must
  alternatives:
  - it is necessary
  - ought
  lexicon: BDAG
  rationale: Conveys necessity/requirement rather than mere advisability. In this
    qualifications list, 'must' best reflects the force of the impersonal verb.
- source_word: οὖν
  chosen: therefore
  alternatives:
  - then
  - so
  lexicon: BDAG
  rationale: Marks inference from the preceding discussion. 'Therefore' preserves
    the logical connection more explicitly than 'then.'
- source_word: ἐπίσκοπον
  chosen: overseer
  alternatives:
  - bishop
  - guardian
  lexicon: BDAG
  rationale: Translates the Greek title by sense rather than importing later ecclesiastical
    office terminology. 'Overseer' is transparent and fits the translation philosophy
    of translating titles.
- source_word: ἀνεπίλημπτον
  chosen: above reproach
  alternatives:
  - blameless
  - irreproachable
  lexicon: BDAG
  rationale: A well-established and accurate rendering indicating one against whom
    no valid charge can readily stick. 'Blameless' is possible, but 'above reproach'
    better captures the social-ethical nuance without implying sinless perfection.
- source_word: μιᾶς γυναικὸς ἄνδρα
  chosen: the husband of one wife
  alternatives:
  - a one-woman man
  - faithful to his wife
  lexicon: BDAG
  rationale: This is a literally grounded rendering of the idiom that preserves the
    Greek's male-specific wording and leaves interpretive questions open. 'A one-woman
    man' is more wooden; 'faithful to his wife' is interpretive and narrows the phrase
    to marital fidelity alone.
- source_word: νηφάλιον
  chosen: sober-minded
  alternatives:
  - temperate
  - clear-headed
  lexicon: BDAG
  rationale: Captures the figurative sense of being mentally and behaviorally restrained,
    not merely abstinent from wine. 'Sober-minded' is natural modern English and fits
    the virtue list.
- source_word: σώφρονα
  chosen: self-controlled
  alternatives:
  - sensible
  - prudent
  lexicon: BDAG
  rationale: Expresses disciplined judgment and conduct. 'Self-controlled' is accessible
    and preserves the ethical force better than the weaker 'sensible' alone.
- source_word: κόσμιον
  chosen: respectable
  alternatives:
  - orderly
  - well-behaved
  lexicon: BDAG
  rationale: Conveys propriety and decorum in a way that reads naturally in contemporary
    English. 'Orderly' is possible but narrower.
- source_word: φιλόξενον
  chosen: hospitable
  alternatives:
  - welcoming to strangers
  lexicon: BDAG
  rationale: Standard concise rendering of the virtue of loving or receiving guests/strangers.
    The fuller gloss is preserved conceptually but is too expansive for the main text
    list.
- source_word: διδακτικόν
  chosen: able to teach
  alternatives:
  - apt to teach
  - skillful in teaching
  lexicon: BDAG
  rationale: Idiomatic modern English that communicates capability rather than merely
    willingness. 'Apt to teach' is traditional but archaic.
