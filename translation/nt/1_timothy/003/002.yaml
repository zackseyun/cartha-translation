theological_decisions:
- issue: Interpretation of μιᾶς γυναικὸς ἄνδρα in church-office qualifications
  chosen_reading: Render formally as 'the husband of one wife' in the main text
  alternative_readings:
  - a one-woman man
  - faithful to his wife
  rationale: 'The phrase is debated: it may emphasize marital faithfulness, prohibit
    polygamy, or imply restrictions regarding remarriage. To preserve theological
    and ecclesial tension rather than resolve it, the main text keeps the more literal
    rendering, while alternatives are preserved in a footnote.'
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it); §4 (Gender-accurate over gender-neutral)
