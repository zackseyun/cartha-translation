id: 1TI.3.9
reference: 1 Timothy 3:9
source:
  edition: SBLGNT
  text: ἔχοντας τὸ μυστήριον τῆς πίστεως ἐν καθαρᾷ συνειδήσει.
translation:
  text: holding the mystery of the faith with a clear conscience.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'holding the mystery of faith with a pure conscience.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔχοντας
  chosen: holding
  alternatives:
  - having
  - keeping
  lexicon: BDAG
  rationale: Present active participle modifying the implied subject from the previous
    verse ('deacons'). 'Holding' conveys ongoing possession/adherence, not mere abstract
    possession. It reads naturally in English while preserving the participial force.
- source_word: μυστήριον
  chosen: mystery
  alternatives:
  - secret
  - revealed mystery
  lexicon: BDAG
  rationale: In Pauline usage, μυστήριον commonly refers not to something permanently
    hidden but to a divine truth once hidden and now revealed. 'Mystery' is the established
    and sufficiently transparent rendering; 'secret' risks sounding merely esoteric,
    while 'revealed mystery' over-interprets the term here.
- source_word: τῆς πίστεως
  chosen: of the faith
  alternatives:
  - of faith
  lexicon: BDAG
  rationale: The article with πίστις here most naturally points to the Christian faith
    as the content of belief rather than the subjective act of believing. 'Of the
    faith' preserves that likely objective sense and matches the ecclesial context
    of qualifications for deacons.
- source_word: πίστεως
  chosen: faith
  alternatives:
  - faithfulness
  - trust
  lexicon: BDAG
  rationale: Per doctrine defaults, πίστις is rendered 'faith' unless context strongly
    requires otherwise. In this construction ('the mystery of the faith'), 'faith'
    best fits the likely sense of the Christian message/belief. 'Faithfulness' is
    less likely here and is preserved as an alternative only in documentation, not
    the main text.
- source_word: ἐν καθαρᾷ συνειδήσει
  chosen: with a clear conscience
  alternatives:
  - in a pure conscience
  - with a pure conscience
  lexicon: BDAG
  rationale: Although ἐν is literally 'in,' idiomatic English prefers 'with' in this
    moral/instrumental sphere. καθαρός can be rendered 'pure' or 'clean/clear'; 'clear
    conscience' is natural modern English and communicates moral integrity without
    loss of meaning. 'Pure conscience' remains a viable formal alternative.
- source_word: καθαρᾷ
  chosen: clear
  alternatives:
  - pure
  - clean
  lexicon: BDAG
  rationale: Chosen in combination with συνειδήσει to form the idiomatic phrase 'clear
    conscience.' This is a contextual rendering rather than a denial of the adjective's
    more literal sense 'pure.'
- source_word: συνειδήσει
  chosen: conscience
  lexicon: BDAG
  rationale: Standard rendering for συνείδησις in Pauline moral discourse; no stronger
    alternative is preferable here.
