theological_decisions:
- issue: Sense of 'the faith' in τῆς πίστεως
  chosen_reading: objective content of Christian belief ('the faith')
  alternative_readings:
  - subjective believing/faith
  - faithfulness
  rationale: In a church-order context describing qualifications for deacons, the
    phrase most naturally refers to the apostolic Christian faith they must firmly
    maintain. This preserves the likely ecclesial/doctrinal sense without overstating
    later technical usage.
  doctrine_reference: 'DOCTRINE.md: πίστις default ''faith''; preserve theological
    tension where ambiguity is genuine'
