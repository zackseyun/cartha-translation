id: 1TI.3.15
reference: 1 Timothy 3:15
source:
  edition: SBLGNT
  text: ἐὰν δὲ βραδύνω, ἵνα εἰδῇς πῶς δεῖ ἐν οἴκῳ θεοῦ ἀναστρέφεσθαι, ἥτις ἐστὶν ἐκκλησία
    θεοῦ ζῶντος, στῦλος καὶ ἑδραίωμα τῆς ἀληθείας·
translation:
  text: But if I am delayed, I write so that you may know how one ought to conduct
    oneself in the household of God, which is the assembly of the living God, the
    pillar and support of the truth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or traditionally, 'church of the living God.'
    reason: lexical_alternative
  - marker: b
    text: Or 'pillar and bulwark of the truth'; 'foundation' is also proposed for
      'support.'
    reason: lexical_alternative
lexical_decisions:
- source_word: βραδύνω
  chosen: am delayed
  alternatives:
  - delay
  - am slow in coming
  - linger
  lexicon: BDAG
  rationale: The passive-like intransitive sense in context refers to Paul's being
    delayed in arriving, not to a moral slowness. 'Am delayed' is idiomatic modern
    English and fits the conditional clause.
- source_word: ἵνα εἰδῇς
  chosen: so that you may know
  alternatives:
  - in order that you may know
  lexicon: BDAG
  rationale: This preserves the purpose clause naturally in English without sounding
    wooden.
- source_word: δεῖ
  chosen: ought to
  alternatives:
  - it is necessary
  - must
  lexicon: BDAG
  rationale: '''Ought to'' conveys normative necessity in a smooth English construction
    with the infinitive. ''Must'' is possible but slightly harsher than the Greek
    here.'
- source_word: ἐν οἴκῳ θεοῦ
  chosen: in the household of God
  alternatives:
  - in God's house
  - in the house of God
  lexicon: BDAG
  rationale: οἶκος can denote household/family as well as house. Here the following
    apposition to ἐκκλησία suggests the people of God rather than merely a building,
    so 'household of God' best captures the social-covenantal sense.
- source_word: ἀναστρέφεσθαι
  chosen: to conduct oneself
  alternatives:
  - to behave
  - to live
  lexicon: BDAG
  rationale: In this context the verb concerns manner of life/behavior. 'Conduct oneself'
    is slightly more formal than 'behave' and better suits the ecclesial instruction.
- source_word: ἥτις
  chosen: which
  alternatives:
  - which indeed
  - and this
  lexicon: BDAG
  rationale: The qualitative relative points back to 'household of God' and introduces
    an explanatory apposition. 'Which' is sufficient in English, while the explanatory
    force is carried by the sentence structure.
- source_word: ἐκκλησία
  chosen: assembly
  alternatives:
  - church
  - congregation
  lexicon: BDAG
  rationale: To follow original-language primacy over translation tradition, 'assembly'
    foregrounds the gathered people rather than importing later institutional connotations
    often attached to 'church.' A footnote preserves the traditional rendering.
- source_word: θεοῦ ζῶντος
  chosen: of the living God
  alternatives:
  - of God who lives
  lexicon: BDAG
  rationale: This is the standard and natural rendering of the genitive phrase, preserving
    the theological contrast implied by 'living' without expansion.
- source_word: στῦλος
  chosen: pillar
  alternatives:
  - column
  lexicon: BDAG
  rationale: The metaphor is architectural and well established in English biblical
    usage; 'pillar' is the clearest equivalent.
- source_word: ἑδραίωμα
  chosen: support
  alternatives:
  - foundation
  - bulwark
  - buttress
  lexicon: BDAG
  rationale: The noun denotes something that provides firmness or support. 'Support'
    is clear modern English and avoids overstating the image as if the church were
    the source of truth rather than its stabilizing witness. 'Foundation' is possible
    but can mislead in light of other NT texts where God/Christ is the foundation.
- source_word: τῆς ἀληθείας
  chosen: of the truth
  alternatives:
  - of truth
  lexicon: BDAG
  rationale: The article is naturally represented in English as 'the truth,' referring
    to the definite body/reality of Christian truth in context.
