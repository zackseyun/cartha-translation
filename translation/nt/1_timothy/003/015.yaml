theological_decisions:
- issue: Rendering ἐκκλησία in an ecclesiological context
  chosen_reading: assembly
  alternative_readings:
  - church
  - congregation
  rationale: The translation avoids defaulting to the tradition-laden 'church' when
    the Greek more basically denotes the gathered assembly of God's people. This does
    not deny ecclesial continuity; it seeks to preserve the source term's plain sense.
    The traditional rendering is preserved in a footnote.
  doctrine_reference: Translation philosophy §1, §6
- issue: Understanding 'pillar and support of the truth'
  chosen_reading: The phrase is predicated of 'the assembly of the living God' and
    rendered without implying that the church originates truth.
  alternative_readings:
  - '''foundation of the truth'''
  rationale: The Greek syntax identifies the assembly/household as the pillar and
    ἑδραίωμα of the truth. Rendering ἑδραίωμα as 'support' preserves the metaphor
    while avoiding a wording that could be taken to conflict with passages that locate
    the ultimate foundation in God or Messiah. The translation preserves the text's
    high ecclesial claim without importing later doctrinal formulations.
  doctrine_reference: Translation philosophy §3
