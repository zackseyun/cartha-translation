theological_decisions:
- issue: Referent of γυναῖκας in the qualifications list
  chosen_reading: Women
  alternative_readings:
  - wives
  - their wives
  rationale: 'This verse is a well-known interpretive crux: Paul may be referring
    either to women serving in a recognized ministry role or to the wives of male
    deacons. The Greek term γυνή permits either ''woman'' or ''wife,'' but the absence
    of an explicit possessive (''their'') and the parallel use of ὡσαύτως support
    leaving the wording broad in the main text. To preserve theological tension rather
    than resolve it, the alternative ''wives'' is retained in a footnote.'
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
