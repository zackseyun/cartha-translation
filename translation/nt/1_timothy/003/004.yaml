theological_decisions:
- issue: Scope of household leadership language
  chosen_reading: The verse describes a prospective overseer's responsible governance
    of his domestic household, not a broader doctrinal claim about all forms of authority.
  alternative_readings:
  - A stronger patriarchal reading emphasizing rule
  - A softened reading reducing authority to mere caregiving
  rationale: The Greek participles and noun ὑποταγή indicate real authority and ordered
    household life, but the verse itself is a qualification statement, not a full
    theology of family structure. The translation preserves the text's authority language
    without importing denominational distinctives.
  doctrine_reference: Affirmations; Translation philosophy items 1 and 3
- issue: Referent of 'with all dignity'
  chosen_reading: Retain the phrase without over-specifying its referent.
  alternative_readings:
  - The children are to be submissive with all dignity
  - He is to manage with all dignity
  rationale: The Greek permits discussion about whether μετὰ πάσης σεμνότητος modifies
    the children's submission or the man's management more broadly. The English keeps
    the phrase attached in a way that reflects the source without artificially resolving
    the ambiguity.
  doctrine_reference: Translation philosophy item 3
