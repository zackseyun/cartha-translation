id: 1TI.3.4
reference: 1 Timothy 3:4
source:
  edition: SBLGNT
  text: τοῦ ἰδίου οἴκου καλῶς προϊστάμενον, τέκνα ἔχοντα ἐν ὑποταγῇ μετὰ πάσης σεμνότητος·
translation:
  text: managing his own household well, having his children in submission with all
    dignity;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'leading his own household well' or 'ruling his own house well.'
    reason: lexical_alternative
  - marker: b
    text: Or 'having children who are submissive' or 'keeping his children under control.'
    reason: lexical_alternative
  - marker: c
    text: The phrase 'with all dignity' may describe the manner of the children's
      submission or the overall manner of his household management.
    reason: alternative_reading
lexical_decisions:
- source_word: τοῦ ἰδίου οἴκου
  chosen: his own household
  alternatives:
  - his own house
  - his own family
  lexicon: BDAG
  rationale: οἶκος can denote the physical house or the household/family unit. In
    this qualification context, the sense is the domestic sphere under his care, so
    'household' best captures the relational and managerial scope while preserving
    the possessive force of ἰδίου as 'his own'.
- source_word: καλῶς
  chosen: well
  alternatives:
  - properly
  - commendably
  lexicon: BDAG
  rationale: The adverb straightforwardly modifies the manner of management. 'Well'
    is natural, concise, and sufficiently broad to cover competent and proper oversight.
- source_word: προϊστάμενον
  chosen: managing
  alternatives:
  - leading
  - ruling
  - presiding over
  lexicon: BDAG
  rationale: προΐστημι in this context refers to exercising responsible oversight
    over one's household. 'Managing' fits modern English and avoids an overly harsh
    or archaic tone such as 'ruling,' while still conveying real authority and responsibility.
- source_word: τέκνα ἔχοντα
  chosen: having his children
  alternatives:
  - keeping his children
  - with children
  lexicon: BDAG
  rationale: The participial phrase further specifies what good household management
    looks like. 'Having his children' is a close rendering of the Greek construction
    and reads naturally when followed by the prepositional phrase.
- source_word: ἐν ὑποταγῇ
  chosen: in submission
  alternatives:
  - under control
  - submissive
  - obedient
  lexicon: BDAG
  rationale: ὑποταγή denotes subordination/submission. 'In submission' preserves the
    noun-based expression and avoids over-interpreting it as mere external control.
    'Obedient' is related but narrower and less formally aligned with the Greek.
- source_word: μετὰ πάσης σεμνότητος
  chosen: with all dignity
  alternatives:
  - with complete dignity
  - with all respectability
  - with all propriety
  lexicon: BDAG
  rationale: σεμνότης conveys dignity, seriousness, or respectability. 'With all dignity'
    is the most direct and idiomatic rendering. The phrase is somewhat syntactically
    debated, but this wording preserves the Greek's moral tone without deciding more
    than necessary whether the dignity is chiefly the father's manner, the children's
    demeanor, or the household order as a whole.
