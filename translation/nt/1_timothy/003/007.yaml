theological_decisions:
- issue: Meaning of τοῦ διαβόλου
  chosen_reading: the devil as Satan, yielding 'the devil’s snare'
  alternative_readings:
  - the slanderer's snare
  - snare characterized by slander
  rationale: Although διάβολος can lexically mean 'slanderer,' in the Pastorals and
    wider NT it commonly refers to the devil/Satan. The article and established usage
    favor the personal referent here. This reading also fits the progression from
    public reproach to spiritual danger. The alternative is worth preserving because
    some interpreters connect the term to human accusers in context.
  doctrine_reference: Affirmations; Preserve theological tension rather than resolve
    it
