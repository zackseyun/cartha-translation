id: 1TI.3.7
reference: 1 Timothy 3:7
source:
  edition: SBLGNT
  text: δεῖ ⸀δὲ καὶ μαρτυρίαν καλὴν ἔχειν ἀπὸ τῶν ἔξωθεν, ἵνα μὴ εἰς ὀνειδισμὸν ἐμπέσῃ
    καὶ παγίδα τοῦ διαβόλου.
translation:
  text: And he must also have a good testimony from those outside, so that he may
    not fall into reproach and the devil’s snare.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from outsiders.' The phrase refers to people outside the Christian community.
    reason: lexical_alternative
  - marker: b
    text: Or 'fall into disgrace.'
    reason: lexical_alternative
  - marker: c
    text: Or 'the slanderer’s trap,' if διάβολος is taken in a more generic sense;
      here it is understood as 'the devil.'
    reason: alternative_reading
lexical_decisions:
- source_word: δεῖ
  chosen: must
  alternatives:
  - it is necessary
  - it is required
  lexicon: BDAG
  rationale: Expresses necessity/obligation for the overseer qualification. 'Must'
    is natural modern English and preserves the force better than a weaker 'should.'
- source_word: δὲ καὶ
  chosen: And ... also
  alternatives:
  - Moreover
  - Now also
  lexicon: BDAG
  rationale: The combination links this qualification with the preceding list and
    adds another requirement. 'And ... also' preserves both connective and additive
    force without sounding stiff.
- source_word: μαρτυρίαν καλὴν
  chosen: a good testimony
  alternatives:
  - a good reputation
  - a good witness
  lexicon: BDAG
  rationale: μαρτυρία can denote testimony/witness/report. In this context it refers
    to favorable attestation from outsiders. 'Good testimony' stays closer to the
    Greek while remaining understandable; 'reputation' is possible but slightly more
    interpretive.
- source_word: ἔχειν
  chosen: have
  alternatives:
  - possess
  lexicon: BDAG
  rationale: Simple infinitive of possession; 'have' is the most direct and idiomatic
    rendering.
- source_word: ἀπὸ τῶν ἔξωθεν
  chosen: from those outside
  alternatives:
  - from outsiders
  - from those outside the church
  lexicon: BDAG
  rationale: Refers to people outside the Christian community. 'Those outside' is
    slightly more formal and closer to the Greek; 'outside the church' is interpretive
    and therefore left to implication rather than inserted into the main text.
- source_word: ἵνα μὴ
  chosen: so that he may not
  alternatives:
  - lest he
  - in order that he not
  lexicon: BDAG
  rationale: Introduces purpose/result with negation. 'So that he may not' is clear
    modern English and preserves the clause's force.
- source_word: εἰς ὀνειδισμὸν ἐμπέσῃ
  chosen: fall into reproach
  alternatives:
  - fall into disgrace
  - fall into disgraceful reproach
  lexicon: BDAG
  rationale: ὀνειδισμός denotes reproach, insult, or public disgrace. 'Fall into reproach'
    is fairly literal and keeps the social-shame dimension; 'disgrace' is smoother
    but less precise.
- source_word: παγίδα
  chosen: snare
  alternatives:
  - trap
  lexicon: BDAG
  rationale: The metaphor of a snare/trap is common in biblical diction. 'Snare' preserves
    the figurative and intertextual resonance better than the more ordinary 'trap.'
- source_word: τοῦ διαβόλου
  chosen: the devil’s
  alternatives:
  - of the devil
  lexicon: BDAG
  rationale: διάβολος here is best taken as the personal evil one, not merely 'slanderer.'
    The possessive construction is idiomatic in English. This also avoids confusion
    with the earlier social reproach coming from outsiders.
