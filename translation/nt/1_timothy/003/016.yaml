id: 1TI.3.16
reference: 1 Timothy 3:16
source:
  edition: SBLGNT
  text: καὶ ὁμολογουμένως μέγα ἐστὶν τὸ τῆς εὐσεβείας μυστήριον· ⸀Ὃς ἐφανερώθη ἐν
    σαρκί, ἐδικαιώθη ἐν πνεύματι, ὤφθη ἀγγέλοις, ἐκηρύχθη ἐν ἔθνεσιν, ἐπιστεύθη ἐν
    κόσμῳ, ἀνελήμφθη ἐν δόξῃ.
translation:
  text: 'And undeniably, great is the mystery of godliness:

    He was revealed in flesh,

    was vindicated in spirit,

    was seen by angels,

    was proclaimed among the nations,

    was believed on in the world,

    was taken up in glory.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Some manuscripts read 'God was revealed in flesh' instead of 'He was revealed
      in flesh.' The critical Greek text reads 'who/he,' which is reflected here.
    reason: textual_variant
  - marker: b
    text: Or 'was vindicated by the Spirit' or 'was vindicated in the Spirit.' The
      Greek phrase is concise and may refer either to the Holy Spirit's agency or
      to the sphere of spiritual life.
    reason: alternative_reading
  - marker: c
    text: Or 'was proclaimed among the Gentiles.'
    reason: lexical_alternative
  - marker: d
    text: Or 'was taken up into glory.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁμολογουμένως
  chosen: undeniably
  alternatives:
  - confessedly
  - by common confession
  - without controversy
  lexicon: BDAG
  rationale: Adverb meaning something openly acknowledged or confessed. 'Undeniably'
    gives clear modern English while preserving the sense of common acknowledgment
    without archaic phrasing like 'without controversy.'
- source_word: μέγα ἐστὶν
  chosen: great is
  alternatives:
  - is great
  lexicon: BDAG
  rationale: Retains the marked predicate-fronted emphasis of the Greek in natural
    English.
- source_word: τὸ τῆς εὐσεβείας μυστήριον
  chosen: the mystery of godliness
  alternatives:
  - the mystery of piety
  - the mystery of our religion
  - the mystery of the faith
  lexicon: BDAG
  rationale: 'μυστήριον is best kept as ''mystery'' in Pauline usage: a divine truth
    once hidden and now revealed. εὐσέβεια in the Pastorals commonly denotes godliness/devout
    living rather than ''religion'' in a broad sociological sense.'
- source_word: Ὃς
  chosen: He
  alternatives:
  - Who
  - God
  - which
  lexicon: NA28/SBLGNT textual tradition; BDAG
  rationale: The critically attested reading is the masculine relative pronoun 'who/he
    who,' not 'God.' In English, 'He' is the most natural way to continue the confessional
    hymn after the introductory clause, while preserving the personal reference to
    Christ.
- source_word: ἐφανερώθη
  chosen: was revealed
  alternatives:
  - was manifested
  - appeared
  lexicon: BDAG
  rationale: Passive form indicates manifestation or disclosure. 'Was revealed' is
    accessible modern English and preserves the sense that the one spoken of became
    openly manifest.
- source_word: ἐν σαρκί
  chosen: in flesh
  alternatives:
  - in the flesh
  - in a body
  lexicon: BDAG
  rationale: σάρξ here is literal rather than metaphorical, referring to embodied
    human existence. 'In flesh' is slightly more literal and poetic, matching the
    parallel prepositional phrases; the article is absent in Greek.
- source_word: ἐδικαιώθη
  chosen: was vindicated
  alternatives:
  - was justified
  - was shown to be righteous
  lexicon: BDAG
  rationale: δικαιόω here does not mean made righteous but publicly shown/rightly
    declared to be in the right. 'Vindicated' best fits the Christological context
    and avoids misleading soteriological overtones of 'justified.'
- source_word: ἐν πνεύματι
  chosen: in spirit
  alternatives:
  - by the Spirit
  - in the Spirit
  lexicon: BDAG
  rationale: The anarthrous πνεύματι is ambiguous. Lowercase 'spirit' in the main
    text preserves the Greek's terseness and avoids over-resolving whether this refers
    to Christ's spiritual mode of existence or the Holy Spirit's agency; alternatives
    are preserved in a footnote.
- source_word: ὤφθη
  chosen: was seen
  alternatives:
  - appeared
  lexicon: BDAG
  rationale: Aorist passive of ὁράω commonly means 'was seen' or 'appeared.' 'Was
    seen' preserves the passive form and the sequence of confessional statements.
- source_word: ἀγγέλοις
  chosen: by angels
  alternatives:
  - to angels
  - by messengers
  lexicon: BDAG
  rationale: Dative is naturally rendered 'by angels' after a passive verb of seeing.
    Given the Christological hymn context, heavenly angels is more likely than human
    messengers.
- source_word: ἐκηρύχθη ἐν ἔθνεσιν
  chosen: was proclaimed among the nations
  alternatives:
  - was preached among the Gentiles
  - was announced among the nations
  lexicon: BDAG
  rationale: κηρύσσω is proclamation language. ἔθνη can mean Gentiles, but 'nations'
    is broader and more transparent in modern English while still including the Gentile
    sense.
- source_word: ἐπιστεύθη
  chosen: was believed on
  alternatives:
  - was believed
  - was trusted
  lexicon: BDAG
  rationale: Traditional idiom 'believed on' reflects πιστεύω with personal object
    sense in this passive construction and keeps the focus on response to the proclaimed
    Christ.
- source_word: ἐν κόσμῳ
  chosen: in the world
  alternatives:
  - throughout the world
  lexicon: BDAG
  rationale: Straightforward locative rendering matching the repeated ἐν-phrases.
- source_word: ἀνελήμφθη
  chosen: was taken up
  alternatives:
  - was received up
  - was taken away
  lexicon: BDAG
  rationale: Standard rendering for ascension language; clear and idiomatic.
- source_word: ἐν δόξῃ
  chosen: in glory
  alternatives:
  - into glory
  - with glory
  lexicon: BDAG
  rationale: The preposition ἐν can be locative or modal here. 'In glory' preserves
    the Greek wording and the elevated cadence of the hymn without over-specifying
    direction.
