theological_decisions:
- issue: Textual variant at the start of the hymn (Ὃς vs θεός vs ὅ)
  chosen_reading: 'Translate the critically attested reading as a personal reference:
    ''He'''
  alternative_readings:
  - '''God was revealed in flesh'''
  - '''which was revealed in flesh'''
  rationale: The SBLGNT/critical text reads Ὃς ('who'), which is strongly supported
    in modern critical editions. Because the verse is clearly christological, English
    'He' is natural. The alternative 'God' has major historical significance and should
    be preserved in a footnote rather than adopted in the main text. This preserves
    textual transparency without diminishing orthodox Christology, which is affirmed
    by the broader passage and canon rather than by importing a later textual reading
    into the main text.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; preserve theological tension rather than resolve it'
- issue: Referent of ἐν πνεύματι
  chosen_reading: Render neutrally as 'in spirit' in the main text
  alternative_readings:
  - '''by the Spirit'' (Holy Spirit agency)'
  - '''in the Spirit'' (sphere of spiritual existence/resurrection life)'
  rationale: The phrase is grammatically ambiguous and has been interpreted either
    as reference to the Holy Spirit's vindicating action, especially in resurrection,
    or to Christ's spiritual mode/realm in contrast with 'flesh.' The main text keeps
    the ambiguity rather than resolving it dogmatically; alternatives are preserved
    in a footnote.
  doctrine_reference: 'Translation philosophy: Preserve theological tension rather
    than resolve it'
