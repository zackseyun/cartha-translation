theological_decisions:
- issue: Ecclesial office terminology for διάκονος
  chosen_reading: Translate as 'Deacons' as an office title
  alternative_readings:
  - servants
  - ministers
  rationale: In this context Paul is listing qualifications for recognized church
    roles, first overseers and then deacons. Rendering the term as the office title
    avoids flattening the institutional context while not importing later denominational
    structures beyond what the text supports.
  doctrine_reference: Translation philosophy §1, §5
