id: 1TI.3.8
reference: 1 Timothy 3:8
source:
  edition: SBLGNT
  text: Διακόνους ὡσαύτως σεμνούς, μὴ διλόγους, μὴ οἴνῳ πολλῷ προσέχοντας, μὴ αἰσχροκερδεῖς,
translation:
  text: Deacons likewise must be dignified, not double-tongued, not devoted to much
    wine, not greedy for shameful gain,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'not saying one thing to one person and another to someone else.'
    reason: lexical_alternative
  - marker: b
    text: Or 'not addicted to much wine.'
    reason: lexical_alternative
  - marker: c
    text: Or 'not pursuing sordid gain.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Διακόνους
  chosen: Deacons
  alternatives:
  - servants
  - ministers
  lexicon: BDAG
  rationale: Although διάκονος can mean servant or minister in broader contexts, here
    it occurs in a qualifications list parallel to overseers in the preceding verses,
    indicating the recognized church office. 'Deacons' best preserves that contextual
    specificity.
- source_word: ὡσαύτως
  chosen: likewise
  alternatives:
  - similarly
  - in the same way
  lexicon: BDAG
  rationale: Marks continuity with the preceding qualifications for overseers while
    introducing a new but related group. 'Likewise' is concise and natural.
- source_word: σεμνούς
  chosen: dignified
  alternatives:
  - worthy of respect
  - serious
  lexicon: BDAG
  rationale: Conveys honorable, respectable bearing without implying grimness. 'Dignified'
    fits modern English and the moral tone of the list.
- source_word: μὴ διλόγους
  chosen: not double-tongued
  alternatives:
  - not insincere in speech
  - not saying one thing to one person and another to someone else
  lexicon: BDAG
  rationale: A fairly literal rendering that preserves the vivid idiom of speaking
    with 'two words' or two faces. It communicates duplicity in speech without over-paraphrase.
- source_word: μὴ οἴνῳ πολλῷ προσέχοντας
  chosen: not devoted to much wine
  alternatives:
  - not addicted to much wine
  - not indulging in much wine
  lexicon: BDAG
  rationale: προσέχω here means to occupy oneself with or devote oneself to. 'Not
    devoted to much wine' captures ongoing attachment without importing a modern clinical
    category. 'Much wine' preserves the Greek modifier πολλῷ.
- source_word: μὴ αἰσχροκερδεῖς
  chosen: not greedy for shameful gain
  alternatives:
  - not fond of dishonest profit
  - not pursuing sordid gain
  lexicon: BDAG
  rationale: The term denotes eagerness for gain in a base or disgraceful way. 'Greedy
    for shameful gain' is clear, morally weighty, and close to the Greek components.
