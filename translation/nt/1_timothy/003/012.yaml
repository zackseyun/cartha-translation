theological_decisions:
- issue: Interpretation of μιᾶς γυναικὸς ἄνδρες in church-office qualifications
  chosen_reading: Rendered formally as 'husbands of one wife' without resolving whether
    Paul primarily means marital faithfulness, monogamy, or exclusion of remarriage/polygamy.
  alternative_readings:
  - one-woman men
  - faithful to their wives
  - married only once
  rationale: The phrase is debated, and the Greek itself is compact and somewhat idiomatic.
    Following the translation philosophy of preserving theological tension rather
    than resolving it, the main text keeps a close rendering that allows readers to
    see the wording without importing a denominational conclusion.
  doctrine_reference: Translation philosophy §3; §4
