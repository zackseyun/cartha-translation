id: 1TI.3.12
reference: 1 Timothy 3:12
source:
  edition: SBLGNT
  text: διάκονοι ἔστωσαν μιᾶς γυναικὸς ἄνδρες, τέκνων καλῶς προϊστάμενοι καὶ τῶν ἰδίων
    οἴκων·
translation:
  text: Deacons must be husbands of one wife, managing their children and their own
    households well.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'one-woman men.' The phrase may emphasize marital faithfulness; some
      understand it more specifically as excluding polygamy or remarriage.
    reason: alternative_reading
lexical_decisions:
- source_word: διάκονοι
  chosen: Deacons
  alternatives:
  - servants
  - ministers
  lexicon: BDAG
  rationale: In this church-order context, διάκονοι functions as the recognized office/title
    rather than a generic description of service. Capitalization is avoided in English
    style, but the term is rendered as the office name 'deacons' rather than the broader
    'servants' or 'ministers'.
- source_word: ἔστωσαν
  chosen: must be
  alternatives:
  - are to be
  - should be
  - let them be
  lexicon: BDAG
  rationale: The present imperative carries normative force in a qualifications list.
    'Must be' communicates requirement more naturally in modern English than the more
    wooden 'let them be'.
- source_word: μιᾶς γυναικὸς ἄνδρες
  chosen: husbands of one wife
  alternatives:
  - one-woman men
  - married only once
  - faithful to their wives
  lexicon: BDAG
  rationale: This is the most transparent formal rendering of the genitival expression
    and preserves the male-specific language of the Greek. Alternatives such as 'faithful
    to their wives' interpret the phrase more dynamically, while 'married only once'
    narrows the sense too specifically. The literal rendering best preserves the phrase's
    ambiguity for readers.
- source_word: τέκνων
  chosen: their children
  alternatives:
  - children
  lexicon: BDAG
  rationale: Although the possessive is not explicit with τέκνων alone, English idiom
    naturally supplies it from the participial construction and parallel with 'their
    own households.' This clarifies the relationship without adding new content.
- source_word: καλῶς
  chosen: well
  alternatives:
  - properly
  - competently
  lexicon: BDAG
  rationale: The adverb straightforwardly modifies the participle and is best rendered
    with the simple, natural 'well'.
- source_word: προϊστάμενοι
  chosen: managing
  alternatives:
  - leading
  - ruling
  - presiding over
  lexicon: BDAG
  rationale: The participle denotes exercising responsible oversight. 'Managing' fits
    the household context in contemporary English without sounding overly authoritarian,
    while still conveying real leadership.
- source_word: τῶν ἰδίων οἴκων
  chosen: their own households
  alternatives:
  - their own houses
  - their own families
  lexicon: BDAG
  rationale: οἶκος in this context refers to the household unit, not merely the physical
    building. 'Households' preserves the social/familial sense better than 'houses,'
    while 'families' would be slightly narrower than the Greek.
