id: 1TI.3.3
reference: 1 Timothy 3:3
source:
  edition: SBLGNT
  text: μὴ πάροινον, μὴ ⸀πλήκτην, ἀλλὰ ἐπιεικῆ, ἄμαχον, ἀφιλάργυρον,
translation:
  text: not given to drunkenness, not violent, but gentle, peaceable, free from the
    love of money,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'not addicted to wine' for πάροινον.
    reason: lexical_alternative
  - marker: b
    text: Or 'not a striker' for πλήκτην, emphasizing physical aggressiveness.
    reason: lexical_alternative
  - marker: c
    text: Or 'not quarrelsome' for ἄμαχον.
    reason: lexical_alternative
  - marker: d
    text: Or 'not a lover of money' for ἀφιλάργυρον.
    reason: lexical_alternative
lexical_decisions:
- source_word: πάροινον
  chosen: given to drunkenness
  alternatives:
  - a drunkard
  - addicted to wine
  - quarrelsome over wine
  lexicon: BDAG
  rationale: The adjective denotes one who is addicted to wine or habitually associated
    with drunkenness. 'Given to drunkenness' is natural modern English and captures
    the vice as a settled disposition rather than merely the act of drinking wine.
- source_word: πλήκτην
  chosen: violent
  alternatives:
  - a striker
  - pugnacious
  - bully
  lexicon: BDAG
  rationale: The noun literally refers to a striker, but in this qualifications list
    the broader character sense is in view. 'Violent' communicates the moral qualification
    clearly in contemporary English while preserving the idea of physical aggressiveness.
- source_word: ἐπιεικῆ
  chosen: gentle
  alternatives:
  - forbearing
  - kind
  - considerate
  lexicon: BDAG
  rationale: This term often carries the sense of gentleness, reasonableness, or forbearance.
    'Gentle' is the most idiomatic concise rendering in an elder-qualification list
    and pairs well with the surrounding negatives and positives.
- source_word: ἄμαχον
  chosen: peaceable
  alternatives:
  - not quarrelsome
  - uncontentious
  lexicon: BDAG
  rationale: The adjective means not disposed to fighting or quarreling. 'Peaceable'
    preserves the positive character trait in smooth English, though 'not quarrelsome'
    is a close alternative.
- source_word: ἀφιλάργυρον
  chosen: free from the love of money
  alternatives:
  - not a lover of money
  - not greedy for money
  lexicon: BDAG
  rationale: The compound explicitly negates love of silver/money. 'Free from the
    love of money' preserves the internal disposition rather than reducing it merely
    to greed, and echoes familiar ethical language without sounding archaic.
