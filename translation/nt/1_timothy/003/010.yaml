theological_decisions:
- issue: Whether to render διακονείτωσαν generically ('serve') or with office-specific
    force ('serve as deacons')
  chosen_reading: serve as deacons
  alternative_readings:
  - serve
  - minister
  rationale: The immediate context is a list of qualifications for deacons, so the
    verb naturally bears office-related force here. The rendering clarifies that Paul
    is not speaking of generic Christian service but of recognized diaconal service,
    while still translating the verbal idea rather than replacing it with a noun.
  doctrine_reference: Translation philosophy §1, §5
- issue: Whether ἀνέγκλητοι implies sinless perfection or qualified irreproachability
  chosen_reading: beyond reproach
  alternative_readings:
  - blameless
  rationale: The term in qualification lists denotes freedom from valid accusation,
    not absolute moral perfection. 'Beyond reproach' preserves that nuance and avoids
    overstating the requirement.
  doctrine_reference: Translation philosophy §6
