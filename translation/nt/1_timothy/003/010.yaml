id: 1TI.3.10
reference: 1 Timothy 3:10
source:
  edition: SBLGNT
  text: καὶ οὗτοι δὲ δοκιμαζέσθωσαν πρῶτον, εἶτα διακονείτωσαν ἀνέγκλητοι ὄντες.
translation:
  text: And these also must first be tested; then let them serve as deacons, being
    beyond reproach.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'let them serve'—the Greek verb means 'to serve,' but here it occurs
      in the context of qualifications for deacons, so 'serve as deacons' makes the
      office-specific sense explicit.
    reason: lexical_alternative
  - marker: b
    text: Or 'blameless.' The phrase means that no valid charge can be brought against
      them, not that they are sinless.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὗτοι
  chosen: these also
  alternatives:
  - these too
  - these men also
  lexicon: BDAG
  rationale: Refers back to the group under discussion, namely deacons/candidates
    for service. 'These also' preserves the demonstrative force and the additive relation
    to the preceding qualifications. 'These men also' is possible by context, but
    the Greek itself is simply the masculine plural demonstrative.
- source_word: δοκιμαζέσθωσαν
  chosen: must first be tested
  alternatives:
  - must first be examined
  - must first be approved after testing
  lexicon: BDAG
  rationale: The verb δοκιμάζω carries the sense of testing/examining to determine
    genuineness or fitness. 'Be tested' is the most direct and natural rendering here.
    'Must' reflects the imperative force in idiomatic English.
- source_word: πρῶτον
  chosen: first
  alternatives:
  - first of all
  - beforehand
  lexicon: BDAG
  rationale: 'Adverbial accusative indicating sequence: testing precedes service.
    ''First'' is concise and preserves the temporal order.'
- source_word: εἶτα
  chosen: then
  alternatives:
  - afterward
  - next
  lexicon: BDAG
  rationale: Marks the next step in sequence after testing. 'Then' is the clearest
    natural equivalent.
- source_word: διακονείτωσαν
  chosen: let them serve as deacons
  alternatives:
  - let them serve
  - let them minister
  lexicon: BDAG
  rationale: The verb διακονέω means 'to serve,' but in this context it is directly
    tied to the office under discussion in 1 Timothy 3. Rendering it 'serve as deacons'
    makes explicit the contextual sense without overparaphrasing. 'Minister' risks
    importing later ecclesiastical associations.
- source_word: ἀνέγκλητοι
  chosen: beyond reproach
  alternatives:
  - blameless
  - above accusation
  lexicon: BDAG
  rationale: Describes persons against whom no valid charge can be brought. 'Beyond
    reproach' is clear modern English and fits the qualification context. 'Blameless'
    is traditional but can suggest sinless perfection more readily in English.
- source_word: ὄντες
  chosen: being
  alternatives:
  - if they are
  - while being
  lexicon: BDAG
  rationale: Present participle modifying the subject, expressing the condition/character
    accompanying their service. 'Being beyond reproach' preserves the participial
    structure without making it overly wooden.
