id: 1TI.3.6
reference: 1 Timothy 3:6
source:
  edition: SBLGNT
  text: μὴ νεόφυτον, ἵνα μὴ τυφωθεὶς εἰς κρίμα ἐμπέσῃ τοῦ διαβόλου.
translation:
  text: He must not be a recent convert, so that he may not become puffed up and fall
    into the judgment of the devil.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'fall into the same condemnation as the devil'; alternatively, 'fall
      under judgment associated with the devil.'
    reason: alternative_reading
lexical_decisions:
- source_word: νεόφυτον
  chosen: a recent convert
  alternatives:
  - newly planted
  - new convert
  - novice
  lexicon: BDAG
  rationale: Literally 'newly planted,' used metaphorically for someone newly come
    to the faith. 'Recent convert' communicates the ecclesial sense clearly in modern
    English better than 'novice,' which is broader and less explicitly Christian.
- source_word: τυφωθεὶς
  chosen: become puffed up
  alternatives:
  - be blinded by pride
  - be conceited
  lexicon: BDAG
  rationale: The verb carries the sense of being puffed up with conceit. 'Become puffed
    up' preserves the metaphor and the moral warning better than the more interpretive
    'be blinded by pride.'
- source_word: κρίμα
  chosen: judgment
  alternatives:
  - condemnation
  lexicon: BDAG
  rationale: κρίμα can mean either 'judgment' or 'condemnation.' 'Judgment' is slightly
    broader and preserves the ambiguity of whether the phrase refers to the devil's
    own judgment or a judgment associated with the devil.
- source_word: τοῦ διαβόλου
  chosen: of the devil
  alternatives:
  - that the devil incurred
  - laid by the devil
  lexicon: BDAG
  rationale: The genitive is ambiguous. A straightforward formal rendering, 'of the
    devil,' best preserves the source-text tension without over-resolving whether
    this is the judgment pronounced on the devil or a snare/judgment connected with
    him.
- source_word: ἐμπέσῃ
  chosen: fall into
  alternatives:
  - incur
  - come under
  lexicon: BDAG
  rationale: '''Fall into'' is the natural rendering of the verb and preserves the
    metaphor of entering into a dangerous state or outcome.'
- source_word: ἵνα μὴ
  chosen: so that he may not
  alternatives:
  - lest he
  - in order that he not
  lexicon: BDAG
  rationale: This expresses purpose/result in clear modern English without archaic
    tone.
