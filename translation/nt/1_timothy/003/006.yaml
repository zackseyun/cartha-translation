theological_decisions:
- issue: Meaning of the phrase εἰς κρίμα ἐμπέσῃ τοῦ διαβόλου
  chosen_reading: Rendered ambiguously as 'fall into the judgment of the devil'
  alternative_readings:
  - fall into the same condemnation as the devil
  - fall under judgment brought about by the devil
  rationale: The Greek genitive τοῦ διαβόλου can plausibly be taken as an objective/genitive
    of relation ('the judgment concerning/falling on the devil') or as a more general
    relational genitive ('judgment associated with the devil'). In keeping with the
    translation philosophy, the main text preserves the ambiguity rather than resolving
    it dogmatically.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
