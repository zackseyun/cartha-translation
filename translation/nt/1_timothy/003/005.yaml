id: 1TI.3.5
reference: 1 Timothy 3:5
source:
  edition: SBLGNT
  text: (εἰ δέ τις τοῦ ἰδίου οἴκου προστῆναι οὐκ οἶδεν, πῶς ἐκκλησίας θεοῦ ἐπιμελήσεται;)
translation:
  text: But if someone does not know how to manage his own household, how will he
    care for God’s church?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the church of God.'
    reason: lexical_alternative
  - marker: b
    text: Or 'lead' or 'preside over' his own household.
    reason: lexical_alternative
  - marker: c
    text: Or 'take care of' God's church.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰ δέ
  chosen: But if
  alternatives:
  - Now if
  - If, however
  lexicon: BDAG
  rationale: Introduces a conditional statement with mild contrast to the preceding
    verse. 'But if' preserves both the conditional force of εἰ and the connective
    contrast of δέ in natural English.
- source_word: τις
  chosen: someone
  alternatives:
  - anyone
  - a man
  lexicon: BDAG
  rationale: Indefinite singular referring generically to a prospective overseer.
    'Someone' is natural English for the indefinite while avoiding over-specification
    in the main clause; the following pronouns remain masculine because the immediate
    context concerns the male-coded overseer qualifications and the Greek syntax is
    masculine singular.
- source_word: τοῦ ἰδίου οἴκου
  chosen: his own household
  alternatives:
  - his own house
  - his own family
  lexicon: BDAG
  rationale: οἶκος can denote house, household, or family. In this context of governance
    and family order, 'household' best captures the social unit under one's care,
    broader than the building itself and slightly more precise than 'family' alone.
- source_word: προστῆναι
  chosen: to manage
  alternatives:
  - to lead
  - to preside over
  - to rule
  lexicon: BDAG
  rationale: The infinitive from προΐστημι here concerns responsible leadership over
    one's household. 'Manage' fits the practical oversight sense in context and pairs
    well with the later 'care for' without sounding authoritarian beyond the Greek.
- source_word: οὐκ οἶδεν
  chosen: does not know how
  alternatives:
  - does not know
  - is not able
  lexicon: BDAG
  rationale: οἶδα with infinitive commonly conveys knowing how to do something, not
    merely possessing information. 'Does not know how' brings out the idiomatic force
    in English.
- source_word: πῶς
  chosen: how will
  alternatives:
  - how can
  - in what way will
  lexicon: BDAG
  rationale: Introduces the rhetorical inference from the household sphere to the
    church sphere. 'How will' preserves the future-oriented rhetorical question without
    adding inability beyond the text.
- source_word: ἐκκλησίας θεοῦ
  chosen: God’s church
  alternatives:
  - the church of God
  - God's assembly
  lexicon: BDAG
  rationale: The anarthrous genitive construction is naturally rendered possessively
    in English. 'Church' is the established and contextually appropriate rendering
    of ἐκκλησία in the Pastoral Epistles; 'assembly' is possible lexically but less
    fitting in this ecclesial context.
- source_word: ἐπιμελήσεται
  chosen: care for
  alternatives:
  - take care of
  - look after
  - be concerned for
  lexicon: BDAG
  rationale: ἐπιμελέομαι denotes careful concern and attending to someone's welfare.
    'Care for' is concise, natural, and may intentionally echo the usage in the parable
    of the Good Samaritan, highlighting pastoral care rather than mere administration.
