theological_decisions:
- issue: Relationship between household leadership and church oversight
  chosen_reading: Render the contrast as 'manage his own household' versus 'care for
    God’s church' to preserve the distinction between governance at home and pastoral
    care in the church.
  alternative_readings:
  - Use 'rule' for the household and 'take care of' for the church
  - Use 'lead' in both clauses for tighter lexical consistency
  rationale: The verse itself uses two different verbs, προΐστημι and ἐπιμελέομαι.
    Preserving that distinction avoids flattening church oversight into mere control
    while still maintaining the analogy between the two spheres. This aligns with
    optimal equivalence and avoids importing a denominational model of church office
    beyond the text.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Gender rendering of the indefinite subject
  chosen_reading: Use 'someone' for τις but retain masculine pronouns ('his,' 'he')
    in keeping with the masculine singular grammar and the immediate context of overseer
    qualifications.
  alternative_readings:
  - 'Use fully gender-neutral language throughout: ''if anyone... their own household...
    how will they...'''
  - Use 'a man' explicitly in the main text
  rationale: The doctrine calls for gender-accurate rather than gender-neutral rendering.
    The Greek is masculine singular and the surrounding qualifications are framed
    for a male overseer candidate, yet τις itself is indefinite. This mixed rendering
    preserves both natural English and source-language specificity.
  doctrine_reference: Translation philosophy §4
