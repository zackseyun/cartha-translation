theological_decisions:
- issue: Meaning of πίστις in the phrase ἐν πίστει τῇ ἐν Χριστῷ Ἰησοῦ
  chosen_reading: faith
  alternative_readings:
  - faithfulness
  rationale: The project default for πίστις is 'faith,' with alternatives preserved
    in footnotes where ambiguity is genuine. In this verse the phrase most naturally
    refers to the sphere/content of Christian faith centered in Messiah Jesus, but
    'faithfulness' is a possible interpretive nuance and is therefore preserved in
    a footnote rather than resolved dogmatically.
