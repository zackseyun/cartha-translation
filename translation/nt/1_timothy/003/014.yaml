id: 1TI.3.14
reference: 1 Timothy 3:14
source:
  edition: SBLGNT
  text: Ταῦτά σοι γράφω, ἐλπίζων ἐλθεῖν πρὸς σὲ ⸂ἐν τάχει⸃,
translation:
  text: I am writing these things to you, hoping to come to you soon,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'quickly' / 'in a short time' for ἐν τάχει.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ταῦτά
  chosen: these things
  alternatives:
  - this
  lexicon: BDAG
  rationale: Neuter plural demonstrative naturally refers to the preceding/ongoing
    instructions as a set; 'these things' preserves the plural and epistolary reference
    better than the more compressed 'this.'
- source_word: σοι
  chosen: to you
  alternatives:
  - for you
  lexicon: BDAG
  rationale: Dative pronoun with γράφω in epistolary usage is most naturally rendered
    'to you.'
- source_word: γράφω
  chosen: I am writing
  alternatives:
  - I write
  lexicon: BDAG
  rationale: Present indicative in a letter commonly has an epistolary present sense.
    English progressive 'I am writing' sounds natural and reflects the ongoing act
    of composition without losing formality.
- source_word: ἐλπίζων
  chosen: hoping
  alternatives:
  - while hoping
  - expecting
  lexicon: BDAG
  rationale: Present active participle expresses attendant circumstance or manner
    relative to the main verb. 'Hoping' is concise and preserves the author's expectation
    without overstating certainty.
- source_word: ἐλθεῖν
  chosen: to come
  alternatives:
  - to go
  lexicon: BDAG
  rationale: Aorist infinitive of ἔρχομαι with πρὸς σέ is idiomatically 'to come to
    you,' from the writer's perspective toward Timothy.
- source_word: πρὸς σὲ
  chosen: to you
  alternatives:
  - to be with you
  - toward you
  lexicon: BDAG
  rationale: πρός with accusative after verb of motion indicates direction toward
    a person; 'to you' is the most natural English rendering here.
- source_word: ἐν τάχει
  chosen: soon
  alternatives:
  - quickly
  - in a short time
  lexicon: BDAG
  rationale: The idiom means 'soon' or 'quickly.' 'Soon' fits expected English style
    in this epistolary context and communicates intended imminence without awkward
    literalism.
