id: 1TI.2.11
reference: 1 Timothy 2:11
source:
  edition: SBLGNT
  text: γυνὴ ἐν ἡσυχίᾳ μανθανέτω ἐν πάσῃ ὑποταγῇ·
translation:
  text: A woman must learn in quietness, in all submission.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'wife,' depending on context; the Greek word can mean either 'woman'
      or 'wife.'
    reason: alternative_reading
  - marker: b
    text: Or 'in silence'; the Greek term can also mean 'quietness' or 'calmness,'
      not necessarily absolute muteness.
    reason: lexical_alternative
lexical_decisions:
- source_word: γυνὴ
  chosen: A woman
  alternatives:
  - woman
  - wife
  lexicon: BDAG
  rationale: γυνή can mean either 'woman' or 'wife' depending on context. Here the
    anarthrous singular is best taken generically, referring to woman as a class rather
    than specifically 'a wife,' especially in the surrounding discussion of men and
    women in gathered conduct. 'A woman' preserves the singular form without over-specifying
    marital status.
- source_word: ἐν ἡσυχίᾳ
  chosen: in quietness
  alternatives:
  - in silence
  - quietly
  lexicon: BDAG
  rationale: ἡσυχία commonly denotes quietness, calmness, or settled demeanor rather
    than absolute muteness. 'In quietness' preserves the prepositional phrase and
    avoids overstating the term as total silence, while still reflecting restrained,
    non-disruptive conduct.
- source_word: μανθανέτω
  chosen: must learn
  alternatives:
  - let ... learn
  - is to learn
  lexicon: BDAG
  rationale: 'The present active imperative, third singular, is an instruction: ''let
    a woman learn.'' In contemporary English, ''must learn'' communicates the imperative
    force clearly and highlights that the verse positively commands learning, not
    merely permits it. This remains within optimal equivalence while preserving the
    directive sense.'
- source_word: ἐν πάσῃ ὑποταγῇ
  chosen: in all submission
  alternatives:
  - with full submissiveness
  - in complete submissiveness
  lexicon: BDAG
  rationale: ὑποταγή denotes submission or subordination. 'In all submission' is a
    close rendering of ἐν + dative with πάσῃ and preserves the breadth of πάσῃ ('all,
    every') without importing a more specific object of submission than the Greek
    states.
