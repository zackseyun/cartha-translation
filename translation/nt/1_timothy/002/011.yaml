theological_decisions:
- issue: Whether ἡσυχία should be rendered as absolute silence or quiet demeanor
  chosen_reading: quietness
  alternative_readings:
  - silence
  rationale: The term can be rendered 'silence,' but in this context and in related
    usage it more naturally denotes quiet, peaceable demeanor rather than total speechlessness.
    This preserves the lexical range without making the command more absolute than
    the Greek requires.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it'
- issue: Whether γυνή should be rendered 'woman' or 'wife'
  chosen_reading: woman
  alternative_readings:
  - wife
  rationale: The immediate wording does not explicitly mark marital context. Rendering
    it 'woman' avoids narrowing the referent beyond what the Greek unambiguously states,
    while a footnote preserves 'wife' as a contextual possibility.
  doctrine_reference: 'Translation philosophy §1: Original-language primacy over translation
    tradition'
