theological_decisions:
- issue: Relation to Genesis creation order in a debated ecclesial context
  chosen_reading: 'Render the verse as a simple statement of temporal sequence: Adam
    was formed first, then Eve.'
  alternative_readings:
  - A more interpretive rendering that embeds implications about authority or role
    distinctions
  rationale: The Greek text itself states the order of formation and does not explicitly
    articulate the theological inference in this verse alone. To preserve theological
    tension and avoid importing doctrinal conclusions beyond the wording, the translation
    remains close to the temporal claim only.
  doctrine_reference: Preserve theological tension rather than resolve it.
