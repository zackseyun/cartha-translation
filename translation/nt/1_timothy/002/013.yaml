id: 1TI.2.13
reference: 1 Timothy 2:13
source:
  edition: SBLGNT
  text: Ἀδὰμ γὰρ πρῶτος ἐπλάσθη, εἶτα Εὕα·
translation:
  text: For Adam was formed first, then Eve.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'was fashioned.' The verb echoes the forming language of the Genesis
      creation account.
    reason: lexical_alternative
lexical_decisions:
- source_word: γὰρ
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: BDAG
  rationale: Introduces the reason or ground for the preceding instruction. 'For'
    is the most natural concise English connective here and preserves the explanatory
    force without overinterpreting.
- source_word: Ἀδὰμ
  chosen: Adam
  lexicon: BDAG
  rationale: Proper name; transliterated according to the project's policy to transliterate
    personal names rather than translate them.
- source_word: πρῶτος
  chosen: first
  alternatives:
  - first of all
  lexicon: BDAG
  rationale: Marks temporal sequence in relation to Eve's formation. 'First' is the
    straightforward adverbial equivalent in English in this construction.
- source_word: ἐπλάσθη
  chosen: was formed
  alternatives:
  - was fashioned
  - was created
  lexicon: BDAG
  rationale: Passive of πλάσσω, commonly used for shaping or forming. 'Was formed'
    preserves the verbal link to the Genesis creation account and is more precise
    than the broader 'was created.'
- source_word: εἶτα
  chosen: then
  alternatives:
  - afterward
  - next
  lexicon: BDAG
  rationale: Signals subsequent temporal sequence. 'Then' is idiomatic and sufficiently
    formal while preserving the simple ordering.
- source_word: Εὕα
  chosen: Eve
  lexicon: BDAG
  rationale: Proper name; transliterated in standard English form.
