theological_decisions:
- issue: Referent shift from singular 'she will be saved' to plural 'if they continue'
  chosen_reading: Retain the grammatical shift as written, rendering singular 'she'
    and plural 'they' without harmonizing them.
  alternative_readings:
  - Interpret both as referring generically to women and smooth the English to 'women
    ... if they continue'
  - Interpret 'she' as Eve and 'they' as women generally
  rationale: 'The Greek text itself shifts from singular to plural. Smoothing the
    number would hide a significant feature of the source. Retaining the shift preserves
    the interpretive tension: the singular may point back to ''woman'' or Eve in the
    preceding context, while the plural broadens to women generally.'
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Meaning of 'saved through childbearing'
  chosen_reading: Keep the phrase as 'saved through childbearing' without specifying
    whether salvation is spiritual, eschatological, or preservation through the maternal
    vocation.
  alternative_readings:
  - kept safe in childbirth
  - saved by embracing motherhood
  - saved through the birth of the Messiah
  rationale: The phrase is notoriously difficult and genuinely contested. The Greek
    does not explicitly say 'kept safe in childbirth,' nor does it explicitly identify
    a specific messianic birth. The translation should preserve the ambiguity rather
    than importing a doctrinally loaded interpretation into the main text.
  doctrine_reference: Preserve theological tension rather than resolve it.
