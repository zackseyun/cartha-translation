theological_decisions:
- issue: Rendering ἀνθρώπων / ἄνθρωπος with gendered English
  chosen_reading: men ... the man
  alternative_readings:
  - human beings ... the human one
  - people ... the man
  rationale: The verse intentionally pairs generic humanity (plural ἀνθρώπων) with
    the singular ἄνθρωπος applied to Jesus, stressing his genuine humanity and representative
    role. Following the project's gender-accurate philosophy, 'men' and 'the man'
    preserve that lexical and theological linkage more transparently than mixed renderings
    such as 'human beings' and 'man.'
  doctrine_reference: 'DOCTRINE.md: Gender-accurate over gender-neutral'
- issue: Rendering Χριστός as title
  chosen_reading: Messiah Jesus
  alternative_readings:
  - Christ Jesus
  rationale: The project default is to translate Χριστός as 'Messiah' where title
    force is present. In this verse the term identifies Jesus in his messianic role
    rather than functioning merely as a surname-like element.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; Contested
    terms table for Χριστός'
- issue: Christological implication of ἄνθρωπος Χριστὸς Ἰησοῦς
  chosen_reading: Translate the phrase straightforwardly as affirming Jesus' humanity
    without implying denial of his deity
  alternative_readings:
  - Overemphasize humanity in a way that could suggest a merely human Christ
  rationale: The wording explicitly affirms the mediator's humanity. In keeping with
    Nicene and Chalcedonian orthodoxy and the translation philosophy, the translation
    preserves the text's emphasis without importing any denial of Christ's full deity,
    which the verse itself neither states nor denies.
  doctrine_reference: 'DOCTRINE.md: Nicene Creed; Definition of Chalcedon; Preserve
    theological tension rather than resolve it'
