id: 1TI.2.5
reference: 1 Timothy 2:5
source:
  edition: SBLGNT
  text: εἷς γὰρ θεός, εἷς καὶ μεσίτης θεοῦ καὶ ἀνθρώπων ἄνθρωπος Χριστὸς Ἰησοῦς,
translation:
  text: For there is one God, and one mediator between God and men, the man Christ
    Jesus,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'between God and human beings.' The Greek ἀνθρώπων is a generic term
      for humanity; 'men' is retained here to preserve the lexical link with 'the
      man' later in the verse.
    reason: lexical_alternative
  - marker: b
    text: Or 'Christ Jesus.' Greek Χριστός is rendered 'Messiah' here because it functions
      as a title.
    reason: alternative_reading
  - marker: c
    text: Or 'the man Messiah Jesus'.
    reason: previous_rendering
lexical_decisions:
- source_word: εἷς
  chosen: one
  lexicon: BDAG
  rationale: 'Rendered as ''one'' in both occurrences to preserve the emphatic parallelism:
    one God, one mediator.'
- source_word: γὰρ
  chosen: For
  alternatives:
  - because
  lexicon: BDAG
  rationale: Rendered 'For' to mark the explanatory connection to the preceding context
    in natural English.
- source_word: θεός
  chosen: God
  lexicon: BDAG
  rationale: Standard rendering for θεός here, referring to the one true God.
- source_word: καὶ
  chosen: and
  alternatives:
  - also
  lexicon: BDAG
  rationale: Rendered with simple coordination. In εἷς καὶ μεσίτης, 'and' preserves
    the parallel structure better than an adverbial 'also' in English.
- source_word: μεσίτης
  chosen: mediator
  alternatives:
  - go-between
  - intermediary
  lexicon: BDAG
  rationale: '''Mediator'' is the established and most precise English equivalent
    for one who stands between two parties to effect relation or reconciliation.'
- source_word: θεοῦ καὶ ἀνθρώπων
  chosen: between God and men
  alternatives:
  - of God and men
  - between God and human beings
  lexicon: BDAG
  rationale: Although the Greek uses genitives, English idiom with 'mediator' normally
    requires 'between.' 'Men' is chosen per the gender-accurate philosophy because
    ἀνθρώπων is the generic human term and is paired with singular ἄνθρωπος ('man')
    later in the verse, preserving the representative human contrast.
- source_word: ἄνθρωπος
  chosen: the man
  alternatives:
  - a man
  - human
  lexicon: BDAG
  rationale: Rendered 'the man' to appose and identify the mediator as truly human.
    The anarthrous Greek functions qualitatively/appositionally, but English idiom
    is best served by 'the man' before the proper/title name sequence. 'Human' would
    weaken the personal, representative force.
- source_word: Χριστὸς
  chosen: Messiah
  alternatives:
  - Christ
  lexicon: BDAG
  rationale: Per doctrine guidelines, Χριστός is translated as 'Messiah' where it
    functions as a title rather than a fixed name. Here it identifies Jesus in his
    messianic office.
- source_word: Ἰησοῦς
  chosen: Jesus
  lexicon: BDAG
  rationale: Standard transliteration of the personal name.
