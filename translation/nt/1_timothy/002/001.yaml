theological_decisions:
- issue: Scope of πάντων ἀνθρώπων
  chosen_reading: all people
  alternative_readings:
  - all kinds of people
  rationale: The Greek phrase is naturally read as 'all people' in this verse. Broader
    theological debates about whether Paul means every individual or all classes of
    people are not resolved here by the wording alone, so the translation preserves
    the plain sense without narrowing it interpretively.
  doctrine_reference: Preserve theological tension rather than resolve it; gender-accurate
    over gender-neutral.
