theological_decisions:
- issue: Meaning of ἐθνῶν in Paul's commission
  chosen_reading: Gentiles
  alternative_readings:
  - nations
  rationale: Given Pauline usage and the immediate context of God's saving concern
    extending beyond Israel, 'Gentiles' best communicates the referent without importing
    extra theology.
  doctrine_reference: Translation philosophy §1, §5
- issue: Rendering of πίστις in ἐν πίστει καὶ ἀληθείᾳ
  chosen_reading: faith
  alternative_readings:
  - faithfulness
  - trust
  rationale: The doctrine table sets 'faith' as the default rendering for πίστις,
    with alternatives preserved where relevant. Here 'faith' fits the likely sense
    of the sphere/content of Christian teaching, while 'faithfulness' remains possible
    enough to note in a footnote.
