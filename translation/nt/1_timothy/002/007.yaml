id: 1TI.2.7
reference: 1 Timothy 2:7
source:
  edition: SBLGNT
  text: εἰς ὃ ἐτέθην ἐγὼ κῆρυξ καὶ ἀπόστολος— ἀλήθειαν ⸀λέγω, οὐ ψεύδομαι— διδάσκαλος
    ἐθνῶν ἐν πίστει καὶ ἀληθείᾳ.
translation:
  text: For this I was appointed a herald and an apostle—I am telling the truth; I
    am not lying—a teacher of the Gentiles in faith and truth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for which I was appointed.'
    reason: lexical_alternative
  - marker: b
    text: Or 'a teacher of the nations.'
    reason: lexical_alternative
  - marker: c
    text: Or 'in faithfulness and truth.'
    reason: alternative_reading
lexical_decisions:
- source_word: εἰς ὃ
  chosen: For this
  alternatives:
  - for which
  - for this purpose
  lexicon: BDAG
  rationale: The preposition and relative pronoun point back to the preceding saving
    purpose/proclamation. 'For this' is idiomatic English and preserves the causal/teleological
    force without awkwardness.
- source_word: ἐτέθην
  chosen: I was appointed
  alternatives:
  - I was placed
  - I was assigned
  lexicon: BDAG
  rationale: Passive of τίθημι here refers to being appointed or commissioned to an
    office, not merely physically 'placed.' 'Appointed' best fits Paul's ministerial
    role.
- source_word: κῆρυξ
  chosen: a herald
  alternatives:
  - a preacher
  - a proclaimer
  lexicon: BDAG
  rationale: κῆρυξ is literally a herald, one who publicly announces on behalf of
    another. 'Herald' preserves the official representative nuance better than the
    more church-tradition-laden 'preacher.'
- source_word: ἀπόστολος
  chosen: an apostle
  alternatives:
  - a messenger
  - an envoy
  lexicon: BDAG
  rationale: In Pauline self-reference this is a recognized ministerial title. 'Apostle'
    is the standard and most precise rendering in this context.
- source_word: ἀλήθειαν λέγω, οὐ ψεύδομαι
  chosen: I am telling the truth; I am not lying
  alternatives:
  - I speak the truth, I am not lying
  lexicon: BDAG
  rationale: This parenthetical affirmation is rendered in natural modern English
    while preserving the emphatic double assertion.
- source_word: διδάσκαλος ἐθνῶν
  chosen: a teacher of the Gentiles
  alternatives:
  - a teacher of the nations
  lexicon: BDAG
  rationale: ἔθνη in Pauline usage commonly refers to the non-Jewish peoples, so 'Gentiles'
    is more contextually precise than the broader 'nations.'
- source_word: ἐν πίστει καὶ ἀληθείᾳ
  chosen: in faith and truth
  alternatives:
  - with faith and truth
  - in faithfulness and truth
  lexicon: BDAG
  rationale: The phrase most naturally describes the sphere or manner of Paul's teaching/apostolic
    ministry. Following the project's default, πίστις is rendered 'faith' in the main
    text; 'faithfulness' is preserved as an alternative because the semantic range
    allows it, though this instance is not strongly contested.
