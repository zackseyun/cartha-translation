id: 1TI.2.8
reference: 1 Timothy 2:8
source:
  edition: SBLGNT
  text: Βούλομαι οὖν προσεύχεσθαι τοὺς ἄνδρας ἐν παντὶ τόπῳ, ἐπαίροντας ὁσίους χεῖρας
    χωρὶς ὀργῆς καὶ ⸀διαλογισμοῦ.
translation:
  text: Therefore I want the men in every place to pray, lifting up holy hands without
    anger or quarreling.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'without anger or doubt.' The Greek word can refer to inward reasoning
      or doubt, but here likely points to contentious disputing in the assembly.
    reason: lexical_alternative
lexical_decisions:
- source_word: Βούλομαι
  chosen: I want
  alternatives:
  - I desire
  - I intend
  lexicon: BDAG
  rationale: βούλομαι expresses will or desire. 'I want' is natural modern English
    and preserves Paul's directive force without sounding overly formal.
- source_word: οὖν
  chosen: Therefore
  alternatives:
  - then
  - so
  lexicon: BDAG
  rationale: οὖν marks inference or continuation from the preceding discussion; 'Therefore'
    best preserves the logical connection.
- source_word: προσεύχεσθαι
  chosen: to pray
  alternatives:
  - to offer prayer
  lexicon: BDAG
  rationale: Standard rendering of προσεύχομαι; the infinitive depends on βούλομαι.
- source_word: τοὺς ἄνδρας
  chosen: the men
  alternatives:
  - the males
  - the husbands
  lexicon: BDAG
  rationale: ἀνήρ here most naturally means 'men' rather than generic 'people,' matching
    the gender-specific contrast in the surrounding context. 'Husbands' is possible
    in some contexts but lacks clear markers here.
- source_word: ἐν παντὶ τόπῳ
  chosen: in every place
  alternatives:
  - in every locality
  - everywhere
  lexicon: BDAG
  rationale: A fairly literal rendering that preserves the distributive sense. 'Everywhere'
    is smoother but slightly less transparent to the underlying phrase.
- source_word: ἐπαίροντας
  chosen: lifting up
  alternatives:
  - raising
  lexicon: BDAG
  rationale: The participle describes the manner accompanying prayer. 'Lifting up'
    is idiomatic in English and fits the prayer gesture.
- source_word: ὁσίους χεῖρας
  chosen: holy hands
  alternatives:
  - devout hands
  - pure hands
  lexicon: BDAG
  rationale: ὅσιος carries the sense of holy, devout, or pious in relation to conduct
    acceptable to God. 'Holy hands' is the most direct and established rendering;
    'pure hands' would import a different adjective nuance.
- source_word: χωρὶς
  chosen: without
  alternatives:
  - apart from
  lexicon: BDAG
  rationale: Standard prepositional sense indicating absence.
- source_word: ὀργῆς
  chosen: anger
  alternatives:
  - wrath
  lexicon: BDAG
  rationale: '''Anger'' is clear modern English and fits the interpersonal context
    better than the weightier ''wrath.'''
- source_word: διαλογισμοῦ
  chosen: quarreling
  alternatives:
  - disputing
  - argument
  - doubt
  lexicon: BDAG
  rationale: διαλογισμός can denote reasoning, dispute, or inward doubt depending
    on context. Here, paired with 'anger' and in an instruction about communal prayer,
    the sense of contentious disputing is most likely. 'Quarreling' communicates that
    relational dimension in natural English, while the alternative 'doubt' is preserved
    in a footnote because it has translation history and lexical plausibility.
