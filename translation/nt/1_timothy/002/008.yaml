theological_decisions:
- issue: Gender-specific reference of τοὺς ἄνδρας
  chosen_reading: the men
  alternative_readings:
  - people
  - everyone
  - husbands
  rationale: Following the gender-accurate principle, the masculine noun ἄνδρας is
    rendered specifically as 'men.' The immediate context addresses men and women
    in differentiated instructions, so a generic rendering would flatten the source
    text's specificity.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
- issue: Sense of διαλογισμοῦ in the prayer setting
  chosen_reading: quarreling
  alternative_readings:
  - disputing
  - doubt
  rationale: The translation preserves the likely communal and relational sense of
    contentious dispute rather than resolving the phrase into purely inward skepticism.
    Because 'doubt' remains lexically possible and is reflected in some translation
    tradition, it is preserved in a footnote rather than excluded.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 3
