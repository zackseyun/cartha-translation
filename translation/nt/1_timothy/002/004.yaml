theological_decisions:
- issue: Scope of πάντας ἀνθρώπους and divine salvific will
  chosen_reading: Render the phrase straightforwardly as 'all people' and θέλει as
    'desires,' preserving the text's universal scope and theological tension without
    narrowing it to 'all kinds of people' in translation.
  alternative_readings:
  - all men
  - all kinds of people
  - wills all people to be saved
  rationale: The Greek phrase naturally reads as universal in scope. Because the verse
    is often drawn into debates over the extent of God's salvific will, the translation
    should not resolve those debates by either restricting πάντας to categories of
    people or strengthening θέλει into a technical statement about decretive will.
    This follows the project's principle of preserving theological tension rather
    than resolving it beyond what the text states.
  doctrine_reference: Translation philosophy §3; Affirmations (non-sectarian within
    historic orthodoxy)
