id: 1TI.2.4
reference: 1 Timothy 2:4
source:
  edition: SBLGNT
  text: ὃς πάντας ἀνθρώπους θέλει σωθῆναι καὶ εἰς ἐπίγνωσιν ἀληθείας ἐλθεῖν.
translation:
  text: who desires all people to be saved and to come to the knowledge of the truth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'wills all people to be saved.' The Greek verb can also be rendered 'wills'
      or 'wants'; 'desires' was chosen to avoid resolving theological debates beyond
      the wording of the text.
    reason: lexical_alternative
  - marker: b
    text: Or 'to come to full knowledge of the truth.' The noun can carry the nuance
      of fuller or more complete knowledge.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὃς
  chosen: who
  alternatives:
  - he who
  lexicon: BDAG
  rationale: Relative pronoun referring back to God in the previous verse; simple
    'who' is natural English and preserves the syntactic connection.
- source_word: πάντας ἀνθρώπους
  chosen: all people
  alternatives:
  - all men
  - all human beings
  lexicon: BDAG
  rationale: πᾶς + ἄνθρωπος here denotes humanity in general, not males specifically.
    'All people' best conveys the representative/generic sense in clear modern English
    while remaining faithful to the Greek.
- source_word: θέλει
  chosen: desires
  alternatives:
  - wills
  - wants
  lexicon: BDAG
  rationale: θέλω can mean 'wish, want, desire, will.' 'Desires' preserves the semantic
    force without importing a stronger philosophical claim about decretive will that
    the verb itself does not require in context.
- source_word: σωθῆναι
  chosen: to be saved
  alternatives:
  - to be rescued
  - to be delivered
  lexicon: BDAG
  rationale: The passive infinitive of σῴζω in Pauline usage commonly carries soteriological
    force. 'To be saved' is the standard and most theologically transparent rendering
    here.
- source_word: εἰς ἐπίγνωσιν ἀληθείας
  chosen: to the knowledge of the truth
  alternatives:
  - to a knowledge of the truth
  - into full knowledge of the truth
  lexicon: BDAG
  rationale: ἐπίγνωσις often carries the sense of knowledge, recognition, or full
    knowledge. 'The knowledge of the truth' is idiomatic, preserves the article-like
    definiteness of the genitive phrase, and avoids overstating 'full knowledge' where
    the context does not demand that nuance in English.
- source_word: ἐλθεῖν
  chosen: to come
  alternatives:
  - to arrive
  - to attain
  lexicon: BDAG
  rationale: Aorist infinitive of ἔρχομαι used idiomatically with εἰς to express movement
    toward a state or reality. 'To come' is the most direct and natural equivalent.
