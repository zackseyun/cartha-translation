theological_decisions:
- issue: Scope of πάντων in relation to Christ's ransom
  chosen_reading: Rendered broadly as 'for all' without narrowing to either all people
    without exception or all kinds/classes of people.
  alternative_readings:
  - for all people without exception
  - for all kinds of people
  rationale: The immediate context emphasizes God's saving concern broadly, but the
    verse itself does not resolve later doctrinal debates about the extent of the
    atonement. The translation preserves the text's universal wording and theological
    tension rather than importing a denominational conclusion.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Substitutionary force of ἀντίλυτρον
  chosen_reading: Expressed as 'ransom' in the main text, with substitutionary nuance
    acknowledged in documentation rather than expanded in translation.
  alternative_readings:
  - substitute-ransom
  - ransom in exchange for
  rationale: The term carries redemptive and substitutionary force, but an expanded
    rendering in the main text would risk paraphrase. 'Ransom' preserves the core
    meaning while allowing the lexical note to document the stronger nuance of ἀντί-.
  doctrine_reference: Optimal equivalence; never paraphrase beyond what the source
    text warrants.
