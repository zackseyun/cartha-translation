id: 1TI.2.6
reference: 1 Timothy 2:6
source:
  edition: SBLGNT
  text: ὁ δοὺς ἑαυτὸν ἀντίλυτρον ὑπὲρ πάντων, τὸ μαρτύριον καιροῖς ἰδίοις·
translation:
  text: who gave himself as a ransom for all—the testimony at the proper times.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'on behalf of all.' The phrase 'for all' preserves the broad scope of
      the Greek without resolving debates about whether Paul means every individual
      or all kinds of people.
    reason: alternative_reading
  - marker: b
    text: Or 'the witness' or 'the testimony borne at the proper times.' The Greek
      phrase is compressed and may mean that Christ's self-giving is the testimony
      made known in God's appointed times.
    reason: lexical_alternative
lexical_decisions:
- source_word: δοὺς
  chosen: gave
  alternatives:
  - having given
  lexicon: BDAG
  rationale: Aorist participle of δίδωμι modifying the implied antecedent from the
    previous verse ('the man Messiah Jesus'). In English, 'who gave' is natural and
    preserves the participial force in relative-clause form without awkwardness.
- source_word: ἑαυτὸν
  chosen: himself
  lexicon: BDAG
  rationale: Reflexive pronoun emphasizing the self-giving nature of the act; 'himself'
    is the direct and natural equivalent.
- source_word: ἀντίλυτρον
  chosen: as a ransom
  alternatives:
  - a ransom
  - a substitute-ransom
  lexicon: BDAG
  rationale: The noun denotes a ransom price, with the ἀντί- prefix strengthening
    the substitutionary sense. 'As a ransom' is idiomatic English and preserves the
    sacrificial/redemptive meaning without overtechnical wording. The stronger nuance
    is noted in alternatives rather than forced into the main text.
- source_word: ὑπὲρ πάντων
  chosen: for all
  alternatives:
  - on behalf of all
  - for everyone
  lexicon: BDAG
  rationale: ὑπέρ commonly means 'for' or 'on behalf of.' 'For all' is concise, natural,
    and preserves the breadth of πάντων. It does not over-specify the atonement debate
    beyond what the text states.
- source_word: τὸ μαρτύριον
  chosen: the testimony
  alternatives:
  - the witness
  - the testimony borne
  lexicon: BDAG
  rationale: 'μαρτύριον here is best taken appositionally or resumptively with the
    preceding clause: Christ''s self-giving is ''the testimony.'' ''Testimony'' fits
    Pauline usage and keeps the phrase compact.'
- source_word: καιροῖς ἰδίοις
  chosen: at the proper times
  alternatives:
  - in his own times
  - at its own appointed times
  lexicon: BDAG
  rationale: The dative phrase is idiomatic for divinely appointed or fitting times.
    'At the proper times' is clear modern English and reflects the plural καιροῖς
    without awkward literalism.
