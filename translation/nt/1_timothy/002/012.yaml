id: 1TI.2.12
reference: 1 Timothy 2:12
source:
  edition: SBLGNT
  text: ⸂διδάσκειν δὲ γυναικὶ⸃ οὐκ ἐπιτρέπω, οὐδὲ αὐθεντεῖν ἀνδρός, ἀλλ’ εἶναι ἐν
    ἡσυχίᾳ.
translation:
  text: But I do not permit a woman to teach or to exercise authority over a man;
    instead, she is to be in quietness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a wife ... a husband.' The Greek words can carry either the general
      sense ('woman/man') or the marital sense ('wife/husband').
    reason: alternative_reading
  - marker: b
    text: Or 'to have authority over'; possibly 'to domineer over.' The Greek verb
      is rare and its nuance is debated.
    reason: lexical_alternative
  - marker: c
    text: Or 'in silence.' The Greek term can denote quietness, calmness, or silence
      depending on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: διδάσκειν
  chosen: to teach
  alternatives:
  - to be teaching
  lexicon: BDAG
  rationale: 'The present infinitive is naturally rendered as the verbal complement
    of ἐπιτρέπω: ''to teach.'' English does not require an aspectually marked form
    here. ''Teach'' preserves the straightforward sense without paraphrase.'
- source_word: δὲ
  chosen: But
  alternatives:
  - Now
  - And
  lexicon: BDAG
  rationale: δέ marks a mild contrast or development from the previous instruction.
    'But' best reflects the adversative turn into Paul's prohibition in this sentence.
- source_word: γυναικί
  chosen: a woman
  alternatives:
  - a wife
  lexicon: BDAG
  rationale: γυνή can mean either 'woman' or 'wife.' In this context, the broader
    discussion in 2:9–15 concerns women generally, not only wives, so 'a woman' is
    the better default in the main text. The marital alternative is preserved in a
    footnote because the term is lexically capable of that sense.
- source_word: οὐκ ἐπιτρέπω
  chosen: I do not permit
  alternatives:
  - I am not permitting
  - I do not allow
  lexicon: BDAG
  rationale: 'The present indicative is best rendered idiomatically as a general present:
    ''I do not permit.'' ''Allow'' is possible, but ''permit'' is slightly more formal
    and closer to the Greek register.'
- source_word: οὐδὲ
  chosen: or
  alternatives:
  - nor
  lexicon: BDAG
  rationale: οὐδέ coordinates a second prohibited infinitive with the first. 'Or'
    is natural modern English after 'do not permit ... to teach,' while still preserving
    the negative coordination.
- source_word: αὐθεντεῖν
  chosen: to exercise authority over
  alternatives:
  - to have authority over
  - to domineer over
  lexicon: BDAG
  rationale: αὐθεντέω is rare and debated. 'Exercise authority over' best captures
    a neutral authority sense without importing an overtly abusive nuance that the
    word itself does not unambiguously require here. Because the term is contested,
    major alternatives are preserved in a footnote.
- source_word: ἀνδρός
  chosen: a man
  alternatives:
  - a husband
  lexicon: BDAG
  rationale: ἀνήρ can mean 'man' or 'husband.' Given the surrounding passage's broader
    creation-order argument and the absence of explicit marital markers in this clause,
    'a man' is the better main-text rendering. The alternative 'husband' is preserved
    in a footnote due to the lexical range.
- source_word: ἀλλ’
  chosen: instead
  alternatives:
  - but
  - rather
  lexicon: BDAG
  rationale: ἀλλά introduces the contrasting positive expectation after the prohibition.
    'Instead' clearly signals the contrast in contemporary English.
- source_word: εἶναι
  chosen: she is to be
  alternatives:
  - to be
  - to remain
  lexicon: BDAG
  rationale: Supplying 'she is to be' makes the infinitival construction idiomatic
    in English and clarifies that the contrast states the expected posture of the
    woman in view.
- source_word: ἐν ἡσυχίᾳ
  chosen: in quietness
  alternatives:
  - in silence
  - quietly
  lexicon: BDAG
  rationale: ἡσυχία in this context denotes quietness or settledness rather than absolute
    muteness. 'In quietness' also aligns with the same term in 2:11 and preserves
    consistency. 'Silence' is possible but can overstate the sense in English.
