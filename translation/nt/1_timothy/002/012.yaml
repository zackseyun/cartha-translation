theological_decisions:
- issue: Meaning of αὐθεντεῖν in a debated ecclesial text
  chosen_reading: to exercise authority over
  alternative_readings:
  - to have authority over
  - to domineer over
  rationale: The rare verb αὐθεντέω has generated substantial debate. The translation
    avoids importing a specifically abusive sense ('domineer') that is not demanded
    by the immediate syntax, while also avoiding an overly technical gloss. A neutral
    authority rendering best preserves the lexical uncertainty without resolving the
    broader theological debate beyond the text itself.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
- issue: Whether γυνή / ἀνήρ should be read as woman/man or wife/husband
  chosen_reading: a woman ... a man
  alternative_readings:
  - a wife ... a husband
  rationale: Both nouns can bear either general or marital senses. In this verse,
    the surrounding context addresses women in the assembly more broadly, and the
    creation argument in vv. 13–14 is not limited to marriage. Therefore the general
    sense is preferred in the main text, while the marital alternative is preserved
    in a footnote.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it); §4 (Gender-accurate over gender-neutral)
