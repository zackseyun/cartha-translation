id: 1TI.2.9
reference: 1 Timothy 2:9
source:
  edition: SBLGNT
  text: ὡσαύτως ⸀καὶ γυναῖκας ἐν καταστολῇ κοσμίῳ μετὰ αἰδοῦς καὶ σωφροσύνης κοσμεῖν
    ἑαυτάς, μὴ ἐν πλέγμασιν ⸀καὶ ⸀χρυσίῳ ἢ μαργαρίταις ἢ ἱματισμῷ πολυτελεῖ,
translation:
  text: Likewise also, women are to adorn themselves in respectable clothing, with
    modesty and self-control, not with braided hair and gold or pearls or expensive
    clothing,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'proper attire' or 'modest apparel' for 'respectable clothing.'
    reason: lexical_alternative
  - marker: b
    text: '''Braided hair and gold or pearls or expensive clothing'' likely refers
      to ostentatious adornment rather than forbidding every use of braids or jewelry
      in all circumstances.'
    reason: cultural_note
lexical_decisions:
- source_word: ὡσαύτως
  chosen: Likewise also
  alternatives:
  - Likewise
  - In the same way
  lexicon: BDAG
  rationale: Connects this instruction to the preceding exhortation. Rendering both
    ὡσαύτως and καί explicitly preserves the Greek's additive linkage, though English
    could smooth to 'likewise' alone.
- source_word: γυναῖκας
  chosen: women
  alternatives:
  - wives
  lexicon: BDAG
  rationale: γυνή can mean either 'woman' or 'wife,' but here the plural in a general
    paraenetic context, without marital markers, favors 'women' rather than 'wives'.
- source_word: καταστολῇ κοσμίῳ
  chosen: respectable clothing
  alternatives:
  - proper attire
  - modest apparel
  - orderly dress
  lexicon: BDAG
  rationale: καταστολή refers to dress/attire and κόσμιος conveys propriety, respectability,
    and orderliness. 'Respectable clothing' is natural modern English and captures
    both the external garment idea and the social-moral nuance.
- source_word: μετὰ αἰδοῦς
  chosen: with modesty
  alternatives:
  - with propriety
  - with reserve
  lexicon: BDAG
  rationale: αἰδώς denotes a sense of shame/reserve that restrains impropriety. 'Modesty'
    is the clearest idiomatic rendering in this clothing context, though it should
    be understood as demeanor as well as appearance.
- source_word: σωφροσύνης
  chosen: self-control
  alternatives:
  - sound judgment
  - sobriety
  - self-restraint
  lexicon: BDAG
  rationale: σωφροσύνη includes soundness of mind expressed in restraint and good
    sense. 'Self-control' is concise and idiomatic here, pairing well with 'modesty'
    without sounding archaic.
- source_word: κοσμεῖν ἑαυτάς
  chosen: are to adorn themselves
  alternatives:
  - to adorn themselves
  - to dress themselves
  lexicon: BDAG
  rationale: κοσμέω means to adorn or arrange. 'Adorn themselves' preserves the verbal
    link with external presentation and the contrast with ostentatious adornment in
    the following phrase. 'Are to' supplies the implied exhortational force in English.
- source_word: μὴ ἐν πλέγμασιν
  chosen: not with braided hair
  alternatives:
  - not with braids
  - not with elaborate braiding
  lexicon: BDAG
  rationale: πλέγματα are braided arrangements of hair. 'Braided hair' is the most
    natural English expression and reflects the likely sense of ornate hairstyling.
- source_word: χρυσίῳ
  chosen: gold
  alternatives:
  - gold ornaments
  - gold jewelry
  lexicon: BDAG
  rationale: The dative after ἐν lists means or manner of adornment. 'Gold' is sufficiently
    broad and mirrors the Greek without over-specifying the form of jewelry.
- source_word: μαργαρίταις
  chosen: pearls
  lexicon: BDAG
  rationale: Standard lexical sense; part of the list of luxury adornments.
- source_word: ἱματισμῷ πολυτελεῖ
  chosen: expensive clothing
  alternatives:
  - costly clothing
  - luxurious clothing
  - expensive apparel
  lexicon: BDAG
  rationale: ἱματισμός refers to clothing/attire and πολυτελής means costly or expensive.
    'Expensive clothing' is clear contemporary English and preserves the critique
    of ostentation rather than clothing per se.
