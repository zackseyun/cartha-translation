theological_decisions:
- issue: Whether the verse addresses women generally or wives specifically
  chosen_reading: women generally
  alternative_readings:
  - wives
  rationale: The immediate context gives general instructions for gathered worship
    and uses plural γυναικας without contextual indicators limiting the reference
    to married women. Rendering 'women' avoids importing a narrower social setting
    than the Greek requires.
  doctrine_reference: Translation philosophy §1, §4
- issue: Whether the prohibition is absolute or targets ostentatious adornment
  chosen_reading: targets ostentatious adornment and manner of dress
  alternative_readings:
  - absolute ban on braids, gold, pearls, or expensive garments
  rationale: The syntax contrasts appropriate adornment ('in respectable clothing,
    with modesty and self-control') with socially extravagant display. The translation
    preserves the list literally without adding interpretive qualifiers, while the
    lexical choices avoid implying that all adornment is inherently forbidden.
  doctrine_reference: Affirmations; Translation philosophy §3
