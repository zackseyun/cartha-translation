id: 1TI.2.10
reference: 1 Timothy 2:10
source:
  edition: SBLGNT
  text: ἀλλ’ ὃ πρέπει γυναιξὶν ἐπαγγελλομέναις θεοσέβειαν, δι’ ἔργων ἀγαθῶν.
translation:
  text: 'but with what is proper for women who profess godliness: good works.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'what is fitting' or 'what is appropriate.'
    reason: lexical_alternative
  - marker: b
    text: Or 'devotion to God.'
    reason: lexical_alternative
  - marker: c
    text: Literally 'through good works'; here the sense is that good works are the
      fitting adornment.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀλλ’
  chosen: but
  alternatives:
  - rather
  - instead
  lexicon: BDAG
  rationale: Marks contrast with the preceding description of outward adornment in
    v. 9. 'But' is the most natural English adversative here.
- source_word: ὃ πρέπει
  chosen: what is proper
  alternatives:
  - what is fitting
  - what is appropriate
  lexicon: BDAG
  rationale: 'The neuter relative with πρέπω functions idiomatically: ''that which
    is fitting/proper.'' ''What is proper'' is clear modern English and preserves
    the sense of moral suitability.'
- source_word: γυναιξὶν
  chosen: for women
  alternatives:
  - for wives
  lexicon: BDAG
  rationale: γυνή can mean 'woman' or 'wife,' but in this context the plural is generic
    and refers to women in the assembly, not specifically married women. 'For women'
    best matches the discourse.
- source_word: ἐπαγγελλομέναις
  chosen: who profess
  alternatives:
  - who claim
  - who promise
  lexicon: BDAG
  rationale: The participle means making a claim or profession. Here it describes
    women identifying themselves as devoted to godliness. 'Who profess' is idiomatic
    and suitably formal without overstating a vow.
- source_word: θεοσέβειαν
  chosen: godliness
  alternatives:
  - devotion to God
  - reverence for God
  lexicon: BDAG
  rationale: θεοσέβεια denotes reverence/devotion toward God expressed in piety. 'Godliness'
    is concise and traditional enough while still understandable in modern English.
- source_word: δι’ ἔργων ἀγαθῶν
  chosen: with good works
  alternatives:
  - through good works
  - by means of good works
  lexicon: BDAG
  rationale: διά with the genitive commonly expresses means or attendant manner. In
    this contrast, Paul is describing the proper adornment as consisting in good works.
    'With good works' reads naturally in English and fits the implied contrast with
    external adornment.
