theological_decisions:
- issue: Relation of 'good works' to 'profess godliness'
  chosen_reading: The verse describes good works as the fitting outward expression
    for women who profess godliness, not as a doctrinal statement that works merit
    salvation.
  alternative_readings:
  - Good works as meritorious basis of acceptance before God
  rationale: The syntax contrasts external adornment with conduct befitting a profession
    of piety. The translation preserves the ethical force without importing a soteriological
    claim the verse itself does not make.
  doctrine_reference: Preserve theological tension rather than resolve it; do not
    import doctrinal claims the text does not make.
