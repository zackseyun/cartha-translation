theological_decisions:
- issue: Scope and purpose of prayer for civil rulers
  chosen_reading: The verse is rendered to express prayer for rulers with the purpose
    that believers may live peacefully and piously, without implying unqualified endorsement
    of those rulers.
  alternative_readings:
  - A rendering that more strongly emphasizes submission to governing authorities
  - A rendering that narrows the phrase to only formally constituted authorities
  rationale: The Greek states the objects of prayer and the intended social conditions
    for Christian life. It does not itself make a broader doctrinal claim about the
    legitimacy of every ruler, so the translation preserves the practical purpose
    without importing political theology.
  doctrine_reference: Preserve theological tension rather than resolve it.
