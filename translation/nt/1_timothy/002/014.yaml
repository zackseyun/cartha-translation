theological_decisions:
- issue: How to render Paul's statement about the woman in relation to transgression
    without importing a broader doctrinal conclusion about female culpability or ontology.
  chosen_reading: 'Translate the clause closely as a historical statement tied to
    the Genesis narrative: ''but the woman, having been thoroughly deceived, came
    to be in transgression.'''
  alternative_readings:
  - '''but the woman, being deceived, fell into transgression'''
  - '''but the wife, having been deceived, became a transgressor'''
  rationale: A close rendering preserves the text's own wording and theological tension
    without expanding it into claims the verse itself does not make. The translation
    avoids paraphrases like 'was the one in the transgression,' which can sound more
    interpretively loaded, and avoids turning the abstract noun into a label ('transgressor')
    not present in the Greek.
  doctrine_reference: Translation philosophy items 1 and 3; Affirmations section on
    not importing denominational distinctives unless unambiguously supported by the
    text.
