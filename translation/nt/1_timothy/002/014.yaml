id: 1TI.2.14
reference: 1 Timothy 2:14
source:
  edition: SBLGNT
  text: καὶ Ἀδὰμ οὐκ ἠπατήθη, ἡ δὲ γυνὴ ⸀ἐξαπατηθεῖσα ἐν παραβάσει γέγονεν.
translation:
  text: And Adam was not deceived, but the woman, having been thoroughly deceived,
    came to be in transgression.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'having been deceived'; the verb here is stronger than the earlier 'was
      deceived' and may carry the sense 'thoroughly deceived' or 'completely deceived.'
    reason: lexical_alternative
  - marker: b
    text: Or 'has become in transgression' or 'became in transgression'; the Greek
      perfect verb can emphasize the resulting state.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀδὰμ
  chosen: Adam
  lexicon: BDAG
  rationale: Proper name is transliterated by standard convention, in keeping with
    the translation philosophy to transliterate names rather than translate them.
- source_word: ἠπατήθη
  chosen: was not deceived
  alternatives:
  - was not led astray
  - was not tricked
  lexicon: BDAG
  rationale: Passive aorist of ἀπατάω is most naturally rendered 'was deceived.' 'Led
    astray' is possible but less direct; 'tricked' is more colloquial than the register
    of the verse.
- source_word: γυνή
  chosen: the woman
  alternatives:
  - the wife
  lexicon: BDAG
  rationale: Although γυνή can mean 'wife' or 'woman,' the allusion is to Genesis
    and the contrast with Adam favors 'the woman' as the more direct and contextually
    transparent rendering.
- source_word: ἐξαπατηθεῖσα
  chosen: having been thoroughly deceived
  alternatives:
  - having been deceived
  - being utterly deceived
  lexicon: BDAG
  rationale: The compound verb ἐξαπατάω intensifies ἀπατάω. 'Thoroughly deceived'
    preserves the force of the prefix better than simply 'deceived,' while remaining
    readable. The participle is rendered with 'having been' to reflect its antecedent
    action relative to the main verb.
- source_word: ἐν παραβάσει
  chosen: in transgression
  alternatives:
  - in trespass
  - a transgressor
  - into transgression
  lexicon: BDAG
  rationale: The prepositional phrase is retained fairly literally. 'In transgression'
    reflects ἐν + dative without over-interpreting the exact nuance. 'A transgressor'
    would shift from the abstract noun παράβασις to a personal designation not present
    in the Greek; 'into transgression' is interpretive.
- source_word: γέγονεν
  chosen: came to be
  alternatives:
  - has become
  - became
  lexicon: BDAG
  rationale: Perfect of γίνομαι indicates resulting state. 'Came to be' preserves
    the verbal idea without flattening it to a simple copula. 'Has become' is also
    viable, but 'came to be in transgression' better reflects the event-plus-state
    sense in idiomatic English for this context.
- source_word: δὲ
  chosen: but
  alternatives:
  - and
  - now
  lexicon: BDAG
  rationale: δέ here marks contrast between Adam and the woman, so 'but' best conveys
    the discourse relation.
- source_word: καὶ
  chosen: And
  alternatives:
  - Now
  - Moreover
  lexicon: BDAG
  rationale: καί links this statement to the preceding argument. 'And' is the most
    straightforward connective; stronger inferential renderings would add nuance not
    explicit in the conjunction.
