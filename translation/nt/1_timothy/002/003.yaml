theological_decisions:
- issue: Appositional relationship in τοῦ σωτῆρος ἡμῶν θεοῦ
  chosen_reading: Render as 'God our Savior'
  alternative_readings:
  - '''our Savior God'''
  rationale: The Greek genitives are naturally understood appositionally, identifying
    God as 'our Savior.' The chosen English order is idiomatic and preserves the title
    without importing additional doctrinal claims beyond the text.
