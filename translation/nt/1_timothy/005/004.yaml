theological_decisions:
- issue: Referent of the plural imperative μανθανέτωσαν
  chosen_reading: The command is directed to the widow's children or grandchildren,
    not to widows in general.
  alternative_readings:
  - The command is directed to widows, with a shift in number or implied subject.
  rationale: The nearest and most natural plural referent is τέκνα ἢ ἔκγονα. This
    fits the sense of family members learning to care for the widow and repay prior
    generations. It also coheres with the following infinitives about household piety
    and repayment to forebears.
- issue: Sense of εὐσεβεῖν in relation to family care
  chosen_reading: Family support is presented as an expression of godliness, not merely
    social duty.
  alternative_readings:
  - The term means only 'to fulfill family obligation' with minimal religious nuance.
  rationale: εὐσεβεῖν carries explicit piety/godliness language. The verse grounds
    practical care in conduct that is acceptable before God, so the translation should
    preserve the theological dimension without overstating it.
