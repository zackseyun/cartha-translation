id: 1TI.5.4
reference: 1 Timothy 5:4
source:
  edition: SBLGNT
  text: εἰ δέ τις χήρα τέκνα ἢ ἔκγονα ἔχει, μανθανέτωσαν πρῶτον τὸν ἴδιον οἶκον εὐσεβεῖν
    καὶ ἀμοιβὰς ἀποδιδόναι τοῖς προγόνοις, τοῦτο γάρ ἐστιν ἀπόδεκτον ἐνώπιον τοῦ θεοῦ.
translation:
  text: But if any widow has children or grandchildren, let them first learn to show
    godliness to their own household and to repay their forebears, for this is acceptable
    before God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'children or descendants.' The Greek ἔκγονα can be broader than 'grandchildren,'
      but here likely refers to the next generation within the family.
    reason: lexical_alternative
  - marker: b
    text: Or 'to practice piety toward their own household.' The Greek links family
      care with godliness.
    reason: lexical_alternative
  - marker: c
    text: Or 'their parents' or 'their ancestors.' The Greek literally means 'forebears.'
    reason: lexical_alternative
lexical_decisions:
- source_word: χήρα
  chosen: widow
  lexicon: BDAG
  rationale: Standard sense of a woman whose husband has died; context throughout
    the paragraph concerns widows.
- source_word: τέκνα ἢ ἔκγονα
  chosen: children or grandchildren
  alternatives:
  - children or descendants
  lexicon: BDAG
  rationale: τέκνα refers to children; ἔκγονα more specifically denotes descendants,
    here best rendered 'grandchildren' in this family-care context to reflect the
    immediate generational obligation Paul has in view.
- source_word: μανθανέτωσαν
  chosen: let them first learn
  alternatives:
  - they must first learn
  lexicon: BDAG
  rationale: Third person plural present imperative; English jussive 'let them learn'
    preserves the imperative force while remaining natural.
- source_word: πρῶτον
  chosen: first
  alternatives:
  - before anything else
  lexicon: BDAG
  rationale: 'Marks priority: family duty is the first sphere in which piety is to
    be practiced.'
- source_word: τὸν ἴδιον οἶκον
  chosen: their own household
  alternatives:
  - their own family
  - their own house
  lexicon: BDAG
  rationale: οἶκος here denotes household/family unit rather than merely a physical
    house; 'their own' reflects ἴδιον.
- source_word: εὐσεβεῖν
  chosen: to show godliness
  alternatives:
  - to practice piety
  - to be devout toward
  lexicon: BDAG
  rationale: The verb means to act with reverence/piety. In this context it is expressed
    concretely in family care, so 'show godliness' captures both the religious and
    practical sense.
- source_word: ἀμοιβὰς ἀποδιδόναι
  chosen: to repay
  alternatives:
  - to return what is due
  - to make recompense
  lexicon: BDAG
  rationale: The phrase conveys giving back in return, here for prior parental/grandparental
    care. 'Repay' is concise and natural.
- source_word: τοῖς προγόνοις
  chosen: their forebears
  alternatives:
  - their parents
  - their ancestors
  lexicon: BDAG
  rationale: πρόγονοι literally means forebears/ancestors. In this immediate household
    setting it refers to prior generations still in view, likely parents or grandparents.
    'Forebears' preserves the broader Greek without over-specifying.
- source_word: ἀπόδεκτον
  chosen: acceptable
  alternatives:
  - pleasing
  - approved
  lexicon: BDAG
  rationale: Conveys that such conduct is received favorably by God; 'acceptable'
    is a close lexical match.
- source_word: ἐνώπιον τοῦ θεοῦ
  chosen: before God
  alternatives:
  - in the sight of God
  lexicon: BDAG
  rationale: Common idiom meaning in God's presence or evaluation; 'before God' is
    concise and clear.
