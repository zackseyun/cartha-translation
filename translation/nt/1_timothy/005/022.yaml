theological_decisions:
- issue: Meaning of 'lay hands on' in context
  chosen_reading: Retain the idiom 'lay hands on' without specifying ordination.
  alternative_readings:
  - Do not appoint anyone hastily
  - Do not ordain anyone too quickly
  rationale: The immediate context concerns elders and accountability, so many interpreters
    understand the phrase as warning against hasty appointment/ordination. However,
    the Greek uses the broader ecclesial idiom rather than an explicit verb for appointing.
    To avoid importing a narrower denominational or procedural claim than the text
    states, the translation preserves the idiom while allowing the contextual implication
    to be noted in a footnote.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Relation between the two prohibitions
  chosen_reading: Translate the second clause as a warning against complicity in others'
    sins, likely connected to premature endorsement.
  alternative_readings:
  - A general warning unrelated to ordination
  - A warning specifically about sharing guilt by hasty ordination
  rationale: The Greek does not explicitly state how the clauses are connected, but
    the juxtaposition suggests that hasty laying on of hands can make Timothy complicit
    in others' sins. The English keeps the broader wording and does not force the
    precise interpretive link into the main text.
  doctrine_reference: Translation philosophy §3
