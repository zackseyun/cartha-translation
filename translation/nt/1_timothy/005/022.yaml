id: 1TI.5.22
reference: 1 Timothy 5:22
source:
  edition: SBLGNT
  text: χεῖρας ταχέως μηδενὶ ἐπιτίθει, μηδὲ κοινώνει ἁμαρτίαις ἀλλοτρίαις· σεαυτὸν
    ἁγνὸν τήρει.
translation:
  text: Do not lay hands on anyone hastily, nor share in the sins of others; keep
    yourself pure.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more specifically in context, 'Do not appoint/ordain anyone too quickly.'
      The Greek literally says 'lay hands on,' an idiom often associated with commissioning
      or recognition for ministry.
    reason: lexical_alternative
lexical_decisions:
- source_word: χεῖρας ... ἐπιτίθει
  chosen: lay hands on
  alternatives:
  - appoint
  - ordain
  lexicon: BDAG
  rationale: The idiom literally reads 'place hands on.' In this pastoral context
    it most naturally refers to the conferral/recognition of office or endorsement
    by laying on of hands, but the Greek expression itself should be preserved in
    translation rather than narrowed to 'ordain.' The more interpretive alternatives
    are preserved as lexical possibilities.
- source_word: ταχέως
  chosen: hastily
  alternatives:
  - quickly
  - too soon
  lexicon: BDAG
  rationale: The adverb conveys undue speed rather than mere physical quickness. 'Hastily'
    captures the warning against premature action.
- source_word: μηδενὶ
  chosen: on anyone
  alternatives:
  - on no one
  lexicon: BDAG
  rationale: 'With the imperative and idiom, idiomatic English prefers ''on anyone''
    after negation: ''Do not lay hands on anyone.'' This preserves the universal scope.'
- source_word: μηδὲ κοινώνει
  chosen: nor share in
  alternatives:
  - nor participate in
  - nor have fellowship with
  lexicon: BDAG
  rationale: κοινωνέω here means to participate in or become complicit with. 'Share
    in' is natural English and preserves the sense of participation without overtechnical
    wording.
- source_word: ἁμαρτίαις ἀλλοτρίαις
  chosen: the sins of others
  alternatives:
  - other people's sins
  - sins belonging to others
  lexicon: BDAG
  rationale: The adjective ἀλλότριος means belonging to another/another's. 'The sins
    of others' is clear, natural, and preserves the genitival sense in English.
- source_word: σεαυτὸν
  chosen: yourself
  lexicon: BDAG
  rationale: Straightforward reflexive object of the imperative τήρει.
- source_word: ἁγνὸν
  chosen: pure
  alternatives:
  - clean
  - chaste
  lexicon: BDAG
  rationale: ἁγνός denotes moral purity here. 'Pure' is the most natural and sufficiently
    broad rendering; 'chaste' would narrow the sense too much to sexual purity alone.
- source_word: τήρει
  chosen: keep
  alternatives:
  - guard
  - preserve
  lexicon: BDAG
  rationale: The present imperative calls for ongoing maintenance. 'Keep yourself
    pure' is idiomatic English and reflects the durative force adequately.
