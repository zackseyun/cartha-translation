id: 1TI.5.21
reference: 1 Timothy 5:21
source:
  edition: SBLGNT
  text: διαμαρτύρομαι ἐνώπιον τοῦ θεοῦ καὶ ⸂Χριστοῦ Ἰησοῦ⸃ καὶ τῶν ἐκλεκτῶν ἀγγέλων,
    ἵνα ταῦτα φυλάξῃς χωρὶς προκρίματος, μηδὲν ποιῶν κατὰ πρόσκλισιν.
translation:
  text: I solemnly charge you in the presence of God and Messiah Jesus and the chosen
    angels, that you keep these things without prejudice, doing nothing according
    to partiality.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the elect angels.'
    reason: lexical_alternative
  - marker: b
    text: Or 'without prejudgment.'
    reason: lexical_alternative
  - marker: c
    text: Or 'doing nothing out of favoritism.'
    reason: lexical_alternative
lexical_decisions:
- source_word: διαμαρτύρομαι
  chosen: I solemnly charge
  alternatives:
  - I testify
  - I strictly command
  - I solemnly urge
  lexicon: BDAG
  rationale: In epistolary exhortation this verb carries the force of a serious charge
    or adjuration, not mere testimony. 'Solemnly charge' preserves the weight and
    formal tone.
- source_word: ἐνώπιον
  chosen: in the presence of
  alternatives:
  - before
  lexicon: BDAG
  rationale: This preposition marks solemn witness before divine beings. 'In the presence
    of' is natural English and preserves the courtroom/covenantal solemnity.
- source_word: Χριστοῦ Ἰησοῦ
  chosen: Messiah Jesus
  alternatives:
  - Christ Jesus
  lexicon: BDAG
  rationale: Per doctrine, Χριστός is translated as 'Messiah' where functioning as
    a title rather than a name-like fixed form. Here the phrase retains titular force
    in a solemn invocation.
- source_word: ἐκλεκτῶν ἀγγέλων
  chosen: the chosen angels
  alternatives:
  - the elect angels
  lexicon: BDAG
  rationale: ἐκλεκτός means 'chosen' or 'elect.' 'Chosen' is more accessible modern
    English while preserving the sense of divine selection. 'Elect' is preserved as
    an alternative because of theological familiarity.
- source_word: ταῦτα
  chosen: these things
  alternatives:
  - these instructions
  - this
  lexicon: BDAG
  rationale: The demonstrative most naturally refers back to the preceding instructions
    in the immediate context. 'These things' is sufficiently literal and avoids over-specifying.
- source_word: φυλάξῃς
  chosen: you keep
  alternatives:
  - you observe
  - you guard
  lexicon: BDAG
  rationale: φυλάσσω here means to keep/observe faithfully. 'Keep' is concise and
    idiomatic, while still allowing the sense of careful observance.
- source_word: χωρὶς προκρίματος
  chosen: without prejudice
  alternatives:
  - without prejudgment
  - without preconception
  lexicon: BDAG
  rationale: πρόκριμα denotes a prior judgment or prejudging. 'Without prejudice'
    best captures the sense in clear modern English, though not in the legal-dismissal
    sense.
- source_word: μηδὲν ποιῶν
  chosen: doing nothing
  alternatives:
  - doing nothing at all
  - and do nothing
  lexicon: BDAG
  rationale: The participle is attendant to the main exhortation and is naturally
    rendered as a participial phrase in English. 'Doing nothing' preserves the Greek
    structure and connection.
- source_word: κατὰ πρόσκλισιν
  chosen: according to partiality
  alternatives:
  - from favoritism
  - with bias
  - out of favoritism
  lexicon: BDAG
  rationale: πρόσκλισις refers to inclination toward one side, favoritism, or bias.
    'According to partiality' stays close to the Greek while remaining understandable;
    a smoother alternative is preserved in a footnote.
