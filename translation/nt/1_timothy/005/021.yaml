- issue: Rendering of Χριστός
  chosen_reading: Messiah Jesus
  alternative_readings:
  - Christ Jesus
  rationale: The project default is to translate Χριστός as 'Messiah' where title
    is in view, preserving the semantic content rather than defaulting to inherited
    transliteration. In this verse the solemn invocation does not require a name-like
    rendering.
