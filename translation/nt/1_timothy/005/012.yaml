theological_decisions:
- issue: Meaning of τὴν πρώτην πίστιν in context
  chosen_reading: their former faith
  alternative_readings:
  - their first pledge
  - their former commitment
  rationale: The project's default for πίστις is 'faith,' with alternatives footnoted
    where contested. In 1 Timothy 5:12 the phrase may refer either to Christian faith
    formerly professed or to an earlier pledge/commitment associated with widow enrollment.
    Because the Greek term is πίστις and the doctrine guidance directs preserving
    ambiguity rather than resolving it, the main text keeps 'faith' while a footnote
    preserves 'pledge' as a contextual alternative.
  doctrine_reference: 'DOCTRINE.md: Contested terms table for πίστις; Translation
    philosophy §3'
