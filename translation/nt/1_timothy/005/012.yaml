id: 1TI.5.12
reference: 1 Timothy 5:12
source:
  edition: SBLGNT
  text: ἔχουσαι κρίμα ὅτι τὴν πρώτην πίστιν ἠθέτησαν·
translation:
  text: incurring judgment because they have set aside their former faith.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their first pledge' or 'their former commitment.' The Greek word can
      mean 'faith,' but in this context some understand it as a prior pledge, likely
      related to enrollment as a widow.
    reason: alternative_reading
lexical_decisions:
- source_word: ἔχουσαι
  chosen: incurring
  alternatives:
  - having
  lexicon: BDAG
  rationale: The participle literally means 'having,' but in idiomatic English with
    κρίμα it conveys coming under or incurring judgment. 'Incurring' makes the participial
    sense natural while preserving the causal connection to the previous context about
    younger widows.
- source_word: κρίμα
  chosen: judgment
  alternatives:
  - condemnation
  - penalty
  lexicon: BDAG
  rationale: κρίμα can denote judgment, condemnation, or a judicial verdict. 'Judgment'
    is broad enough to preserve the term's seriousness without over-specifying eternal
    condemnation, which the verse itself does not explicitly state.
- source_word: ὅτι
  chosen: because
  alternatives:
  - since
  - for the reason that
  lexicon: BDAG
  rationale: Here ὅτι introduces the reason for the judgment. 'Because' is the clearest
    modern English rendering.
- source_word: τὴν πρώτην πίστιν
  chosen: their former faith
  alternatives:
  - their first faith
  - their first pledge
  lexicon: BDAG
  rationale: πρῶτος here is temporal/comparative, so 'former' is smoother English
    than 'first.' πίστις defaults to 'faith' per doctrine guidance. However, in this
    context many understand it as a pledge or prior commitment, likely connected to
    widow enrollment; that alternative is preserved in a footnote because the phrase
    is genuinely debated.
- source_word: ἠθέτησαν
  chosen: have set aside
  alternatives:
  - have rejected
  - have broken
  - have nullified
  lexicon: BDAG
  rationale: ἀθετέω means to reject, set aside, or invalidate. 'Have set aside' preserves
    the sense of repudiating a prior commitment without importing a more technical
    or absolute sense than the context requires.
