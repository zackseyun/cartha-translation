theological_decisions:
- issue: Scope of the offenders in context
  chosen_reading: The verse is translated broadly as referring to those who are sinning,
    without specifying in the main text whether this means elders only or offenders
    more generally.
  alternative_readings:
  - The immediate context may specifically concern sinning elders (vv. 19–20).
  - Some readers may generalize the principle to church discipline more broadly.
  rationale: The Greek text of this verse itself says only 'those who are sinning.'
    Because the immediate context follows instructions about elders, many interpreters
    understand the referent to be elders. The translation preserves the wording of
    the verse and does not import 'elders' into the main text where it is not explicitly
    repeated.
  doctrine_reference: Preserve theological tension rather than resolve it.
