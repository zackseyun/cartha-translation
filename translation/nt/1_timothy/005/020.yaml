id: 1TI.5.20
reference: 1 Timothy 5:20
source:
  edition: SBLGNT
  text: ⸀τοὺς ἁμαρτάνοντας ἐνώπιον πάντων ἔλεγχε, ἵνα καὶ οἱ λοιποὶ φόβον ἔχωσιν.
translation:
  text: Rebuke those who are sinning before everyone, so that the rest also may have
    fear.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'those who persist in sin'; the present participle may suggest ongoing
      sinful conduct.
    reason: lexical_alternative
  - marker: b
    text: The immediate context may indicate sinning elders in particular, though
      the verse itself says only 'those who are sinning.'
    reason: cross_reference
lexical_decisions:
- source_word: τοὺς ἁμαρτάνοντας
  chosen: those who are sinning
  alternatives:
  - those who persist in sin
  - the ones sinning
  lexicon: BDAG
  rationale: The present participle is substantival and naturally rendered 'those
    who are sinning.' The present aspect may suggest ongoing action, but 'persist
    in sin' is slightly more interpretive than the Greek itself requires, so it is
    preserved as an alternative rather than placed in the main text.
- source_word: ἐνώπιον πάντων
  chosen: before everyone
  alternatives:
  - in the presence of all
  - publicly
  lexicon: BDAG
  rationale: The phrase literally means 'before all.' 'Before everyone' preserves
    the public setting in clear modern English. 'Publicly' captures the sense but
    compresses the prepositional phrase more dynamically.
- source_word: ἔλεγχε
  chosen: rebuke
  alternatives:
  - reprove
  - expose
  lexicon: BDAG
  rationale: ἐλέγχω can mean to expose, convict, or rebuke. In this disciplinary context,
    'rebuke' best fits idiomatic English and the pastoral instruction. 'Reprove' is
    more traditional but less natural; 'expose' is possible but can overemphasize
    disclosure rather than correction.
- source_word: οἱ λοιποὶ
  chosen: the rest
  alternatives:
  - the others
  - the remaining ones
  lexicon: BDAG
  rationale: λοιπός here refers to those remaining in the community beyond the offenders.
    'The rest' is concise and natural English.
- source_word: φόβον ἔχωσιν
  chosen: may have fear
  alternatives:
  - may be afraid
  - may stand in fear
  lexicon: BDAG
  rationale: The idiom is literally 'may have fear.' This can denote salutary fear
    or sober apprehension rather than mere terror. 'May have fear' preserves the lexical
    force without overinterpreting it as either reverential fear or simple fright.
