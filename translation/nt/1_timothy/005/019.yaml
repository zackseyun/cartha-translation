id: 1TI.5.19
reference: 1 Timothy 5:19
source:
  edition: SBLGNT
  text: κατὰ πρεσβυτέρου κατηγορίαν μὴ παραδέχου, ἐκτὸς εἰ μὴ ἐπὶ δύο ἢ τριῶν μαρτύρων·
translation:
  text: Do not accept an accusation against an elder, except on the basis of two or
    three witnesses.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'an older man,' if πρεσβυτέρου is taken in the age-based sense rather
      than as the church office 'elder.'
    reason: alternative_reading
  - marker: b
    text: This wording reflects the OT legal principle that a matter is established
      by 'two or three witnesses' (cf. Deut 19:15).
    reason: cross_reference
lexical_decisions:
- source_word: κατὰ πρεσβυτέρου
  chosen: against an elder
  alternatives:
  - against an older man
  - concerning an elder
  lexicon: BDAG
  rationale: πρεσβύτερος can denote either an older man or an elder/leader depending
    on context. In the Pastoral Epistles, especially in immediate context concerning
    church oversight and discipline, 'elder' best fits the likely office-bearing sense
    rather than merely age.
- source_word: κατηγορίαν
  chosen: an accusation
  alternatives:
  - a charge
  - an accusation/complaint
  lexicon: BDAG
  rationale: The noun denotes a formal accusation or charge. 'Accusation' is clear
    modern English and preserves the juridical sense without sounding overly technical.
- source_word: μὴ παραδέχου
  chosen: Do not accept
  alternatives:
  - Do not receive
  - Do not admit
  lexicon: BDAG
  rationale: The middle imperative forbids receiving or entertaining the accusation.
    'Accept' communicates the procedural sense of taking up the charge for consideration
    in readable English.
- source_word: ἐκτὸς εἰ μὴ
  chosen: except
  alternatives:
  - unless
  lexicon: BDAG
  rationale: This idiom introduces an exception. 'Except' is concise and natural here;
    'unless' would also be possible, but 'except' pairs smoothly with the following
    prepositional phrase.
- source_word: ἐπὶ δύο ἢ τριῶν μαρτύρων
  chosen: on the basis of two or three witnesses
  alternatives:
  - except by the testimony of two or three witnesses
  - except upon two or three witnesses
  lexicon: BDAG
  rationale: The phrase echoes Deuteronomic legal language. 'On the basis of' makes
    explicit the evidentiary force of ἐπί with witnesses, while preserving the formal
    judicial tone.
