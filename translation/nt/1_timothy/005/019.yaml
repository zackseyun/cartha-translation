theological_decisions:
- issue: Meaning of πρεσβυτέρου in church context
  chosen_reading: elder as a church leader/officeholder
  alternative_readings:
  - older man
  rationale: Given the immediate context of instructions about elders in 1 Timothy
    5 and the broader Pastoral Epistles' use of πρεσβύτερος, the office-related sense
    is most likely. This is a contextual lexical decision rather than a denominational
    imposition.
  doctrine_reference: Translation philosophy §1, §5
