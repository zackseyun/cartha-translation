id: 1TI.5.11
reference: 1 Timothy 5:11
source:
  edition: SBLGNT
  text: νεωτέρας δὲ χήρας παραιτοῦ· ὅταν γὰρ καταστρηνιάσωσιν τοῦ Χριστοῦ, γαμεῖν θέλουσιν,
translation:
  text: But refuse younger widows, for when they grow wanton in disregard of the Messiah, they desire to marry,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more explicitly, 'when they become sensual' or 'when their passions draw them away.'
    reason: lexical_alternative
  - marker: b
    text: Greek 'against the Messiah'; the sense may be that their desires come into conflict with prior devotion or commitment to him. Traditional English often has 'against Christ.'
    reason: alternative_reading
  - marker: c
    text: Or 'grow wanton against the Messiah'.
    reason: previous_rendering
lexical_decisions:
- source_word: νεωτέρας χήρας
  chosen: younger widows
  alternatives:
  - widows who are younger
  - young widows
  lexicon: BDAG
  rationale: The adjective modifies χήρας directly and contrasts with the older widows under discussion in context. 'Younger widows' is natural English and preserves the comparative sense without over-specifying an age threshold.
- source_word: δὲ
  chosen: But
  alternatives:
  - Now
  - and
  lexicon: BDAG
  rationale: δέ marks a mild contrast with the preceding instructions about widows who may be enrolled. 'But' best signals the shift in instruction.
- source_word: παραιτοῦ
  chosen: refuse
  alternatives:
  - decline
  - reject
  - have nothing to do with
  lexicon: BDAG
  rationale: The middle imperative here directs Timothy not to accept younger widows for the specific list under discussion. 'Refuse' is concise and fits the administrative context better than the broader 'have nothing to do with.'
- source_word: ὅταν γὰρ
  chosen: for when
  alternatives:
  - for whenever
  - because when
  lexicon: BDAG
  rationale: This combination introduces the reason and a general circumstance. 'For when' is idiomatic and preserves both explanatory and temporal force.
- source_word: καταστρηνιάσωσιν
  chosen: grow wanton
  alternatives:
  - become sensual
  - feel sexual desire
  - grow self-indulgent
  lexicon: BDAG
  rationale: This rare verb carries the idea of becoming driven by sensual impulses or desires in a way that pulls them away from prior commitment. 'Grow wanton' preserves the moral and volitional nuance without reducing it merely to remarriage itself. Because 'wanton' may be less transparent to some readers, an explanatory alternative is preserved in a footnote.
- source_word: τοῦ Χριστοῦ
  chosen: against the Messiah
  alternatives:
  - against Christ
  - in disregard of the Messiah
  - away from the Messiah
  lexicon: BDAG
  rationale: Χριστοῦ is a title here, so per doctrine it is rendered 'Messiah' rather than 'Christ.' The genitive after καταστρηνιάω is difficult; 'against the Messiah' most directly reflects the construction and the sense of desires setting themselves in opposition to devotion to him. An alternative explanatory gloss is preserved in a footnote because the relation is interpretively difficult.
- source_word: γαμεῖν θέλουσιν
  chosen: they desire to marry
  alternatives:
  - they want to marry
  - they wish to marry
  lexicon: BDAG
  rationale: The infinitive with θέλω expresses desire or intention. 'Desire to marry' is slightly weightier than 'want to marry' and suits the tone of the passage.
