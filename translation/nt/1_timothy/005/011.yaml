theological_decisions:
- issue: Rendering Χριστοῦ
  chosen_reading: the Messiah
  alternative_readings:
  - Christ
  rationale: Χριστός functions as a title here rather than a name-like form, so the default doctrinal guidance favors 'Messiah.' The traditional 'Christ' is preserved in a footnote as an alternative familiar rendering.
  doctrine_reference: 'DOCTRINE.md Contested terms: Χριστός → Messiah (where title; Christ where name-like)'
- issue: Sense of καταστρηνιάω τοῦ Χριστοῦ
  chosen_reading: their sensual or self-indulgent impulses set them in opposition to prior devotion to the Messiah
  alternative_readings:
  - they become sensual and so turn away from Christ
  - their passions make them disregard their commitment to Christ
  rationale: The verse should not be translated as though remarriage itself were condemned; the problem in context is a desire that conflicts with a prior commitment associated with enrollment. The wording preserves the tension without importing a full doctrinal explanation into the main text.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it'
revisions:
- timestamp: '2026-04-21T02:09:50Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/nt/1_timothy/005/011.json
  category: awkward_english
  tier: 1
  from: grow wanton against the Messiah
  to: grow wanton in disregard of the Messiah
  rationale: While 'against' is a traditional rendering following the KJV, the English phrase 'grow wanton against' is not idiomatic and can be slightly jarring. The sense of the Greek genitive (τοῦ Χριστοῦ) after καταστρηνιάσωσιν is that their desires are contrary to their commitment to the Messiah. 'In disregard of the Messiah'—an alternative the drafter already considered—conveys this meaning more clearly and naturally for a modern reader, better reflecting the sense explained in footnote 'b'.
