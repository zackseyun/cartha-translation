id: 1TI.5.18
reference: 1 Timothy 5:18
source:
  edition: SBLGNT
  text: λέγει γὰρ ἡ γραφή· Βοῦν ἀλοῶντα οὐ φιμώσεις, καί· Ἄξιος ὁ ἐργάτης τοῦ μισθοῦ
    αὐτοῦ.
translation:
  text: For the Scripture says, “You shall not muzzle an ox while it is threshing,”
    and, “The worker is worthy of his wages.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “treading out grain.” The Greek participle refers to an ox engaged in
      threshing.
    reason: lexical_alternative
  - marker: b
    text: Or “The laborer is worthy of his pay.”
    reason: lexical_alternative
lexical_decisions:
- source_word: λέγει γὰρ ἡ γραφή
  chosen: For the Scripture says
  alternatives:
  - For Scripture says
  - For the writing says
  lexicon: BDAG
  rationale: γάρ is rendered 'For' to show the explanatory connection to the previous
    verse. ἡ γραφή is idiomatically 'the Scripture,' referring to authoritative sacred
    writing rather than merely 'writing.' The present tense λέγει is naturally rendered
    'says' in English for a standing scriptural testimony.
- source_word: Βοῦν
  chosen: an ox
  alternatives:
  - an oxen animal
  - a bull
  lexicon: BDAG
  rationale: The accusative singular of βοῦς here refers generically to an ox used
    for farm labor. 'An ox' is standard and idiomatic in English.
- source_word: ἀλοῶντα
  chosen: while it is threshing
  alternatives:
  - treading out grain
  - threshing
  lexicon: BDAG
  rationale: The participle denotes the ox engaged in threshing. 'While it is threshing'
    expresses the contemporaneous action clearly in modern English. 'Treading out
    grain' is more explicit to the ancient practice but less concise in the main text.
- source_word: οὐ φιμώσεις
  chosen: You shall not muzzle
  alternatives:
  - Do not muzzle
  - You must not muzzle
  lexicon: BDAG
  rationale: This is a quotation from Scripture using future indicative with prohibitive
    force, conventionally rendered in English legal style as 'You shall not muzzle.'
    This preserves the scriptural register.
- source_word: καί
  chosen: and
  alternatives:
  - and also
  - also
  lexicon: BDAG
  rationale: καί links the two scriptural citations. Simple 'and' best reflects the
    coordination.
- source_word: Ἄξιος ὁ ἐργάτης
  chosen: The worker is worthy
  alternatives:
  - The laborer is worthy
  - The workman is worthy
  lexicon: BDAG
  rationale: ἐργάτης denotes one who works or labors. 'Worker' is clear modern English
    and fits the immediate context of support for elders, while preserving the general
    principle. 'Laborer' is a strong alternative and traditional in some translations.
- source_word: τοῦ μισθοῦ αὐτοῦ
  chosen: of his wages
  alternatives:
  - of his pay
  - of his reward
  lexicon: BDAG
  rationale: μισθός here refers to earned compensation, not a more abstract 'reward.'
    'Wages' best captures ordinary remuneration for work. The masculine pronoun αὐτοῦ
    is retained as 'his' in keeping with the gender-accurate policy and the singular
    Greek form.
