theological_decisions:
- issue: Scope of γραφή including both cited lines
  chosen_reading: Render both quotations straightforwardly under 'the Scripture says'
    without narrowing the term's canonical implications in translation.
  alternative_readings:
  - Treat only the first citation as Scripture and the second as a proverb or dominical
    saying
  rationale: The verse presents both citations under the introductory formula. The
    translation should reflect Paul's wording without importing a detailed theory
    of canon into the English text. Any broader theological implications are interpretive
    rather than translational.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Gender rendering of αὐτοῦ
  chosen_reading: his wages
  alternative_readings:
  - their wages
  rationale: The Greek is singular masculine. Per the gender-accurate policy, the
    translation keeps the masculine singular rather than flattening it into a gender-neutral
    plural. The statement functions generically, but the source form should be preserved.
  doctrine_reference: Gender-accurate over gender-neutral.
