theological_decisions:
- issue: Gender reference of the feminine plural adjectives and participles
  chosen_reading: they ... going around ... gossips and busybodies
  alternative_readings:
  - these women ... going around ... gossips and busybodies
  rationale: The Greek forms are feminine plural and refer specifically to the younger
    widows in context. English can preserve the referent with 'they' because the antecedent
    in the surrounding passage is explicit, avoiding unnecessary repetition while
    remaining gender-accurate by context rather than artificially neutralizing the
    referent.
  doctrine_reference: Translation philosophy §4 (Gender-accurate over gender-neutral)
