id: 1TI.5.13
reference: 1 Timothy 5:13
source:
  edition: SBLGNT
  text: ἅμα δὲ καὶ ἀργαὶ μανθάνουσιν, περιερχόμεναι τὰς οἰκίας, οὐ μόνον δὲ ἀργαὶ
    ἀλλὰ καὶ φλύαροι καὶ περίεργοι, λαλοῦσαι τὰ μὴ δέοντα.
translation:
  text: At the same time, they also learn to be idle, going around from house to house;
    and not only idle, but also gossips and busybodies, saying what they ought not
    to say.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'talkative women' for 'gossips'; the Greek term can denote foolish or
      empty talk more broadly, though in this context it likely includes gossip.
    reason: lexical_alternative
  - marker: b
    text: Or 'meddlers' for 'busybodies.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἅμα δὲ καὶ
  chosen: At the same time, they also
  alternatives:
  - Besides this, also
  - Meanwhile, also
  lexicon: BDAG
  rationale: Captures the adverbial sense of simultaneity/in addition. 'At the same
    time' is natural English and preserves the connection with the preceding discussion.
- source_word: ἀργαὶ
  chosen: idle
  alternatives:
  - lazy
  - doing nothing
  lexicon: BDAG
  rationale: The adjective denotes idleness rather than merely moral laziness. 'Idle'
    fits both occurrences and preserves the repetition in Greek.
- source_word: μανθάνουσιν
  chosen: learn to be
  alternatives:
  - learn
  - acquire the habit of being
  lexicon: BDAG
  rationale: 'In context the verb introduces a learned pattern or habit, not formal
    instruction. English idiom requires completing the sense: ''learn to be idle.'''
- source_word: περιερχόμεναι τὰς οἰκίας
  chosen: going around from house to house
  alternatives:
  - wandering about among the houses
  - going about to houses
  lexicon: BDAG
  rationale: The participle plus object conveys movement from one household to another.
    'From house to house' makes the distributive sense clear in idiomatic English.
- source_word: φλύαροι
  chosen: gossips
  alternatives:
  - talkative women
  - babblers
  lexicon: BDAG
  rationale: The term refers to foolish, empty, or indiscreet talk. In this context,
    where the speech concerns others and is socially disruptive, 'gossips' best captures
    the force for modern readers.
- source_word: περίεργοι
  chosen: busybodies
  alternatives:
  - meddlers
  - interfering persons
  lexicon: BDAG
  rationale: The adjective denotes improper meddling in matters that do not concern
    them. 'Busybodies' is a standard and accurate English rendering in this pastoral
    context.
- source_word: λαλοῦσαι
  chosen: saying
  alternatives:
  - speaking
  - talking about
  lexicon: BDAG
  rationale: A simple speech verb is sufficient here. 'Saying' reads naturally with
    the following object clause and avoids overtranslation.
- source_word: τὰ μὴ δέοντα
  chosen: what they ought not to say
  alternatives:
  - things that are not proper
  - what is inappropriate
  lexicon: BDAG
  rationale: δέοντα refers to what is fitting, necessary, or proper. The chosen rendering
    makes explicit that the impropriety concerns speech, matching the participle λαλοῦσαι.
