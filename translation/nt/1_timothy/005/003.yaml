id: 1TI.5.3
reference: 1 Timothy 5:3
source:
  edition: SBLGNT
  text: Χήρας τίμα τὰς ὄντως χήρας.
translation:
  text: Honor widows who are truly widows.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Support widows who are truly widows'; in context, 'honor' likely includes
      material care.
    reason: lexical_alternative
lexical_decisions:
- source_word: Χήρας
  chosen: widows
  lexicon: BDAG
  rationale: χήρα straightforwardly denotes women whose husbands have died. The accusative
    plural functions as the object of the imperative. Rendering as 'widows' is direct
    and contextually clear.
- source_word: τίμα
  chosen: Honor
  alternatives:
  - Show honor to
  - Support
  lexicon: BDAG
  rationale: τιμάω commonly means 'honor, value, show respect to.' In this context
    of church care for widows, the term likely includes practical support, but the
    lexical sense is broader than mere financial assistance. 'Honor' preserves the
    Greek wording while allowing the surrounding context to specify what such honor
    entails.
- source_word: τὰς ὄντως χήρας
  chosen: who are truly widows
  alternatives:
  - the widows who are really widows
  - widows indeed
  lexicon: BDAG
  rationale: ὄντως means 'really, actually, truly.' Combined with the repeated χήρας,
    it distinguishes genuine widows in the sense developed in the following context—those
    genuinely bereft and eligible for the church's care. 'Who are truly widows' is
    natural English and preserves the emphatic distinction.
- source_word: ὄντως
  chosen: truly
  alternatives:
  - really
  - indeed
  lexicon: BDAG
  rationale: The adverb marks a qualifying distinction, not merely rhetorical emphasis.
    'Truly' fits readable modern English and preserves the sense of genuineness.
