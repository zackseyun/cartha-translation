theological_decisions:
- issue: Scope of τιμάω in context
  chosen_reading: Honor includes respect and likely material support, but the main
    text retains 'honor' rather than narrowing it to financial support alone.
  alternative_readings:
  - Support widows who are truly widows
  rationale: The immediate and broader context in 1 Timothy 5 discusses material provision
    for widows, yet the Greek verb itself is broader. To avoid importing a narrower
    doctrinal or practical claim than the text explicitly states, the translation
    keeps 'honor' in the main text and preserves the contextual alternative in a footnote.
  doctrine_reference: Translation philosophy §§1, 3, 5
