theological_decisions:
- issue: Whether to make Timothy's prior practice explicit as exclusive water-drinking
  chosen_reading: No longer drink only water
  alternative_readings:
  - No longer drink water
  - Stop drinking water
  rationale: The contrast with 'but use a little wine' strongly implies abstaining
    from wine rather than forbidding water altogether. Rendering the exclusivity in
    English prevents misunderstanding while remaining faithful to the Greek idiom.
  doctrine_reference: Translation philosophy §1, §6
- issue: Whether οἶνος should be rendered literally as 'wine' or generalized as a
    medicinal drink
  chosen_reading: wine
  alternative_readings:
  - medicinal wine
  - fermented drink
  rationale: The Greek explicitly says οἶνος. The translation should not soften or
    expand the term for doctrinal or cultural reasons. The modifier 'a little' already
    preserves the text's moderation.
  doctrine_reference: Translation philosophy §1, §6
