id: 1TI.5.23
reference: 1 Timothy 5:23
source:
  edition: SBLGNT
  text: μηκέτι ὑδροπότει, ἀλλὰ οἴνῳ ὀλίγῳ χρῶ διὰ τὸν ⸀στόμαχον καὶ τὰς πυκνάς σου
    ἀσθενείας.
translation:
  text: No longer drink only water, but use a little wine because of your stomach
    and your frequent illnesses.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'No longer be a water-drinker.' The sense is that Timothy
      should not continue drinking water alone.
    reason: lexical_alternative
lexical_decisions:
- source_word: μηκέτι
  chosen: No longer
  alternatives:
  - No more
  lexicon: BDAG
  rationale: Adverb marking cessation of a prior practice. 'No longer' is idiomatic
    modern English and fits the imperative that follows.
- source_word: ὑδροπότει
  chosen: drink only water
  alternatives:
  - keep drinking water
  - be a water-drinker
  lexicon: BDAG
  rationale: The verb means to drink water. In context with the contrast introduced
    by ἀλλά and the instruction to use wine, the sense is not merely 'drink water'
    but 'drink water only' or 'be exclusively drinking water.' 'Drink only water'
    makes the implied contrast explicit in natural English without overparaphrasing.
- source_word: ἀλλὰ
  chosen: but
  alternatives:
  - instead
  lexicon: BDAG
  rationale: Standard adversative conjunction introducing the contrasting instruction.
- source_word: οἴνῳ ὀλίγῳ
  chosen: a little wine
  alternatives:
  - a small amount of wine
  - some wine
  lexicon: BDAG
  rationale: Dative with χράομαι expresses the thing used. ὀλίγῳ qualifies οἴνῳ and
    should be preserved to show moderation. 'A little wine' is concise and natural.
- source_word: χρῶ
  chosen: use
  alternatives:
  - take
  - make use of
  lexicon: BDAG
  rationale: χράομαι commonly means 'use' and with the dative here refers to making
    use of wine. 'Use' is broad enough to cover medicinal consumption and avoids implying
    recreational drinking.
- source_word: διὰ
  chosen: because of
  alternatives:
  - for
  - on account of
  lexicon: BDAG
  rationale: With the accusative, διά indicates reason or cause. 'Because of' clearly
    conveys the causal sense.
- source_word: στόμαχον
  chosen: stomach
  alternatives:
  - digestive system
  lexicon: BDAG
  rationale: The ordinary anatomical term is best rendered straightforwardly as 'stomach.'
- source_word: πυκνάς
  chosen: frequent
  alternatives:
  - often recurring
  lexicon: BDAG
  rationale: The adjective denotes frequency. 'Frequent' is the most natural collocation
    with 'illnesses' in English.
- source_word: ἀσθενείας
  chosen: illnesses
  alternatives:
  - weaknesses
  - sicknesses
  lexicon: BDAG
  rationale: Although ἀσθένεια can mean weakness broadly, in this medical context
    alongside 'stomach' and wine as a remedy, 'illnesses' best captures the likely
    sense of bodily ailments.
