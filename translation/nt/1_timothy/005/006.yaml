id: 1TI.5.6
reference: 1 Timothy 5:6
source:
  edition: SBLGNT
  text: ἡ δὲ σπαταλῶσα ζῶσα τέθνηκεν.
translation:
  text: But she who lives for pleasure is dead even while she lives.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'is self-indulgent' for 'lives for pleasure.'
    reason: lexical_alternative
lexical_decisions:
- source_word: σπαταλῶσα
  chosen: lives for pleasure
  alternatives:
  - is self-indulgent
  - lives luxuriously
  - gives herself to pleasure
  lexicon: BDAG
  rationale: The participle denotes self-indulgent, pleasure-oriented living rather
    than mere enjoyment. 'Lives for pleasure' is idiomatic modern English that preserves
    the ongoing lifestyle sense of the present participle without sounding archaic.
- source_word: ζῶσα
  chosen: while she lives
  alternatives:
  - living
  - though living
  - alive
  lexicon: BDAG
  rationale: This participle is concessive or temporal in force in relation to the
    perfect verb that follows. 'While she lives' makes the paradox clear in natural
    English and avoids a wooden repetition such as 'living, has died.'
- source_word: τέθνηκεν
  chosen: is dead
  alternatives:
  - has died
  lexicon: BDAG
  rationale: The perfect of θνῄσκω emphasizes a present state resulting from death.
    In this moral-spiritual context, 'is dead' best conveys the resultant condition
    in English.
- source_word: ἡ ... σπαταλῶσα
  chosen: she who lives for pleasure
  alternatives:
  - the woman who lives for pleasure
  - the self-indulgent woman
  lexicon: Greek grammar
  rationale: The feminine singular article plus participle functions substantivally.
    Since the immediate context concerns widows, 'she who...' preserves the grammatical
    gender and discourse reference without over-specifying beyond the text.
- source_word: δὲ
  chosen: But
  alternatives:
  - and
  - now
  lexicon: Greek grammar
  rationale: δέ marks contrast with the previous description of the true widow who
    hopes in God and continues in prayer. 'But' appropriately signals that contrast.
