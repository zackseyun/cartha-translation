theological_decisions:
- issue: Nature of 'dead' in context
  chosen_reading: metaphorically/spiritually dead while physically alive
  alternative_readings:
  - socially as good as dead
  - morally dead
  rationale: The juxtaposition of 'while she lives' with 'is dead' creates an intentional
    paradox indicating a non-physical kind of death, most naturally spiritual or moral
    alienation. The translation preserves the metaphor without importing a more technical
    doctrinal formula than the text itself states.
  doctrine_reference: Preserve theological tension rather than resolve it
