id: 1TI.5.16
reference: 1 Timothy 5:16
source:
  edition: SBLGNT
  text: εἴ ⸀τις πιστὴ ἔχει χήρας, ⸀ἐπαρκείτω αὐταῖς, καὶ μὴ βαρείσθω ἡ ἐκκλησία, ἵνα
    ταῖς ὄντως χήραις ἐπαρκέσῃ.
translation:
  text: If any believing woman has widows, let her provide for them, and let the church
    not be burdened, so that it may provide for those who are truly widows.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Some manuscripts read 'if any believing man or woman has widows' or 'if
      any believer has widows,' broadening the instruction beyond a specifically female
      subject.
    reason: textual_variant
lexical_decisions:
- source_word: τις πιστὴ
  chosen: any believing woman
  alternatives:
  - any faithful woman
  - any believer
  lexicon: BDAG
  rationale: The adjective πιστή is feminine singular, matching τις in this textual
    form, so the referent is specifically female rather than generic. 'Believing'
    fits the likely sense of Christian identity in the Pastorals, though 'faithful'
    is lexically possible.
- source_word: χήρας
  chosen: widows
  lexicon: BDAG
  rationale: Straightforward plural accusative of χήρα. The context throughout the
    chapter concerns widows who may receive material support.
- source_word: ἐπαρκείτω
  chosen: let her provide for
  alternatives:
  - let her assist
  - let her support
  lexicon: BDAG
  rationale: ἐπαρκέω here carries the sense of giving sufficient practical support.
    'Provide for' is natural English and matches the material-support context better
    than a vaguer 'help'.
- source_word: βαρείσθω
  chosen: let ... not be burdened
  alternatives:
  - let ... not be weighed down
  - let ... not be encumbered
  lexicon: BDAG
  rationale: The passive imperative conveys being burdened with an obligation. 'Be
    burdened' is idiomatic and preserves the financial/support sense in context.
- source_word: ἡ ἐκκλησία
  chosen: the church
  alternatives:
  - the assembly
  lexicon: BDAG
  rationale: In the Pastorals ἐκκλησία refers to the Christian congregation/community.
    'Church' is the standard and clearest rendering in this context.
- source_word: ὄντως
  chosen: truly
  alternatives:
  - really
  - genuinely
  lexicon: BDAG
  rationale: ὄντως distinguishes widows who are genuinely without family support from
    others. 'Truly' is concise and echoes the chapter's repeated category of 'real'
    widows.
- source_word: ταῖς ὄντως χήραις
  chosen: those who are truly widows
  alternatives:
  - the widows who are really widows
  - the genuine widows
  lexicon: BDAG
  rationale: This phrase is somewhat idiomatic in Greek and refers to widows in the
    full, qualifying sense established by the context—those left alone and eligible
    for church support. The chosen rendering is clear modern English while preserving
    the emphasis.
- source_word: ἐπαρκέσῃ
  chosen: it may provide for
  alternatives:
  - it may assist
  - it may support
  lexicon: BDAG
  rationale: 'Using the same English gloss as earlier ἐπαρκέω preserves lexical consistency.
    The aorist subjunctive after ἵνα expresses purpose: the church is thereby enabled
    to provide for the truly needy widows.'
