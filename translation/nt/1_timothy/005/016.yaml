theological_decisions:
- issue: Gender of the subject in the opening clause
  chosen_reading: 'specific female subject: ''any believing woman'''
  alternative_readings:
  - generic 'any believer' based on other textual traditions
  - '''any believing man or woman'' as an interpretive smoothing'
  rationale: The supplied SBLGNT text reads τις πιστή, which is grammatically feminine
    singular. The translation therefore reflects a woman as the subject rather than
    neutralizing the gender. Because some manuscripts/readings broaden the subject,
    that alternative is preserved in a footnote rather than imported into the main
    text.
  doctrine_reference: Translation philosophy §4 (Gender-accurate over gender-neutral);
    §3 (Preserve theological tension rather than resolve it)
