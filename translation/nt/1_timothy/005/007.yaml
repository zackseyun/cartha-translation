theological_decisions:
- issue: Referent of the implicit plural subject in 'they may be above reproach'
  chosen_reading: Rendered generically as 'they' without specifying the group in the
    main text.
  alternative_readings:
  - widows under discussion in the immediate context
  - Timothy and/or the church community more broadly
  rationale: The Greek leaves the plural subject implicit. In context, the nearest
    likely referent is the widows/families addressed in the surrounding instructions,
    but the text itself does not explicitly restate the subject here. To preserve
    the ambiguity rather than over-resolve it, the translation uses 'they.'
  doctrine_reference: Preserve theological tension rather than resolve it.
