theological_decisions:
- issue: Scope of 'judgment' (κρίσις)
  chosen_reading: Rendered simply as 'judgment' without specifying human investigation
    or final divine judgment.
  alternative_readings:
  - ecclesial evaluation in the immediate context
  - final divine judgment in an ultimate sense
  rationale: The immediate context concerns assessing people, especially before appointing
    elders (5:22), so present evaluative judgment is in view; however, the wording
    is broad enough to preserve a wider sense of judgment. The translation therefore
    keeps the term general rather than resolving the interpretive tension.
  doctrine_reference: Preserve theological tension rather than resolve it.
