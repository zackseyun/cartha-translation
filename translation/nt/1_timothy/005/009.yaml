id: 1TI.5.9
reference: 1 Timothy 5:9
source:
  edition: SBLGNT
  text: Χήρα καταλεγέσθω μὴ ἔλαττον ἐτῶν ἑξήκοντα γεγονυῖα, ἑνὸς ἀνδρὸς γυνή,
translation:
  text: Let a widow be enrolled only if she is not less than sixty years old, the
    wife of one husband,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a one-man woman'; the phrase may refer to marital faithfulness/reputation,
      though some understand it as 'having been married only once.'
    reason: alternative_reading
lexical_decisions:
- source_word: Χήρα
  chosen: widow
  lexicon: BDAG
  rationale: 'Standard sense: a woman whose husband has died. The verse concerns qualifications
    for widows to be officially recognized/enrolled.'
- source_word: καταλεγέσθω
  chosen: be enrolled
  alternatives:
  - be put on the list
  - be registered
  lexicon: BDAG
  rationale: The verb here refers to being entered on an official list, not merely
    'considered.' 'Be enrolled' is natural English and preserves the administrative
    sense in context.
- source_word: μὴ ἔλαττον ἐτῶν ἑξήκοντα
  chosen: only if she is not less than sixty years old
  alternatives:
  - not under sixty years of age
  - being at least sixty years old
  lexicon: BDAG
  rationale: This phrase sets a minimum age requirement. 'Only if she is not less
    than sixty years old' preserves the prohibitive/limiting force while remaining
    readable.
- source_word: γεγονυῖα
  chosen: she is
  alternatives:
  - being
  - having become
  lexicon: BDAG
  rationale: The participle with the age expression functions idiomatically to indicate
    attained age/state. In English, an explicit finite verb is smoother and accurately
    conveys the sense.
- source_word: ἑνὸς ἀνδρὸς γυνή
  chosen: the wife of one husband
  alternatives:
  - a one-man woman
  - faithful to her husband
  - having been married only once
  lexicon: BDAG
  rationale: A relatively formal rendering best preserves the Greek idiom and its
    ambiguity. It likely denotes marital faithfulness/reputation rather than mechanically
    requiring only one marriage, but the text itself does not fully resolve that question,
    so the idiom is retained in the main text and clarified in a footnote.
