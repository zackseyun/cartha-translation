theological_decisions:
- issue: Meaning of ἑνὸς ἀνδρὸς γυνή
  chosen_reading: Retain the idiomatic expression 'the wife of one husband' in the
    main text rather than resolving it as either strict single-marriage history or
    general marital faithfulness.
  alternative_readings:
  - having been married only once
  - faithful to her husband
  - a one-man woman
  rationale: The phrase is debated in pastoral-epistle qualification lists. Preserving
    the idiom avoids importing a denominational or overly specific doctrinal conclusion
    that the Greek does not unambiguously state. A clarifying footnote preserves major
    interpretive alternatives.
  doctrine_reference: Preserve theological tension rather than resolve it.
