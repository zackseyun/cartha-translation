theological_decisions:
- issue: Whether τὰ ἄλλως ἔχοντα refers specifically to bad works or more generally
    to works not immediately evident
  chosen_reading: more generally to works that are otherwise/not immediately evident
  alternative_readings:
  - specifically evil works
  rationale: The immediate phrase modifies 'works' and contrasts with 'good works
    [that are] evident.' While some interpreters infer a contrast between good and
    bad deeds from v. 24, the Greek here does not explicitly supply 'evil.' Preserving
    the broader wording avoids importing a stronger moral contrast than the text states,
    while still allowing the contextual implication that hidden deeds eventually become
    known.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
