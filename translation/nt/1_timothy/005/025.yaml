id: 1TI.5.25
reference: 1 Timothy 5:25
source:
  edition: SBLGNT
  text: ὡσαύτως καὶ τὰ ⸂ἔργα τὰ καλὰ⸃ ⸀πρόδηλα, καὶ τὰ ἄλλως ἔχοντα κρυβῆναι οὐ δύνανται.
translation:
  text: Likewise also, good works are evident, and even those that are otherwise cannot
    remain hidden.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'those that are different' or 'those that are not so'; some understand
      this to mean specifically evil works by analogy with the previous verse.
    reason: alternative_reading
lexical_decisions:
- source_word: ὡσαύτως
  chosen: Likewise also
  alternatives:
  - Likewise
  - In the same way
  lexicon: BDAG
  rationale: Connects this verse closely with the preceding comparison in v. 24. Rendering
    both ὡσαύτως and καί preserves the emphatic parallel structure rather than collapsing
    them into a single English adverb.
- source_word: ἔργα τὰ καλά
  chosen: good works
  alternatives:
  - good deeds
  lexicon: BDAG
  rationale: A natural and established rendering that preserves both the concrete
    sense of ἔργα ('works/deeds') and the moral quality of καλά ('good, noble'). 'Good
    deeds' is possible, but 'good works' better matches Pauline usage and the likely
    ethical emphasis here.
- source_word: πρόδηλα
  chosen: evident
  alternatives:
  - plain
  - obvious
  - clearly visible
  lexicon: BDAG
  rationale: Conveys the sense of being manifest or evident beforehand/in advance.
    'Evident' is concise and fits the contrast with what cannot stay hidden.
- source_word: τὰ ἄλλως ἔχοντα
  chosen: those that are otherwise
  alternatives:
  - those that are different
  - those that are not so
  - those of another sort
  lexicon: BDAG
  rationale: This idiom refers to works that are not immediately evident in the same
    way as the preceding 'good works.' 'Those that are otherwise' preserves the compact
    Greek contrast without over-interpreting whether the difference is moral or merely
    temporal/visible.
- source_word: κρυβῆναι οὐ δύνανται
  chosen: cannot remain hidden
  alternatives:
  - cannot be hidden
  - cannot stay concealed
  lexicon: BDAG
  rationale: 'The infinitive with δύνανται expresses inability. ''Remain hidden''
    brings out the contextual force: even works not presently evident will eventually
    come to light, matching the logic of the previous verse.'
