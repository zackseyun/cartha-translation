theological_decisions:
- issue: Referent of τῷ ἀντικειμένῳ
  chosen_reading: the opponent refers generically to a hostile person or party, not
    explicitly to Satan
  alternative_readings:
  - the adversary (understood as Satan)
  rationale: The Greek participle itself does not identify the referent as the devil,
    and the immediate concern is public reproach arising from conduct. To preserve
    the text's ambiguity and avoid importing a more specific theological identification
    than the wording warrants, the main text uses 'the opponent,' while a footnote
    preserves the possible alternative.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
