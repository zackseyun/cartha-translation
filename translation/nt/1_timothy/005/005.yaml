theological_decisions:
- issue: Characterization of the 'true widow'
  chosen_reading: The verse describes a genuinely qualified widow in the church's
    care structure as one who is both bereft of support and marked by hope in God
    and persistent prayer.
  alternative_readings:
  - The verse merely describes widows generally without implying qualification criteria.
  rationale: The adverb ὄντως and the immediate context in 1 Timothy 5 distinguish
    a specific category of widow. The translation preserves that contextual force
    without importing a denominational framework.
  doctrine_reference: Translation philosophy §§1, 3, 5
