id: 1TI.5.5
reference: 1 Timothy 5:5
source:
  edition: SBLGNT
  text: ἡ δὲ ὄντως χήρα καὶ μεμονωμένη ἤλπικεν ἐπὶ ⸀θεὸν καὶ προσμένει ταῖς δεήσεσιν
    καὶ ταῖς προσευχαῖς νυκτὸς καὶ ἡμέρας·
translation:
  text: Now the one who is truly a widow, and is left all alone, has set her hope
    on God and continues in petitions and prayers night and day.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'is alone' or 'is left alone'; the Greek participle emphasizes her state
      of being without supporting family.
    reason: lexical_alternative
  - marker: b
    text: Or 'has hoped in God.' The Greek perfect may emphasize a settled hope with
      continuing effect.
    reason: lexical_alternative
  - marker: c
    text: The two terms 'petitions' and 'prayers' are both retained to reflect the
      Greek distinction between specific requests and prayer more generally.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὄντως
  chosen: truly
  alternatives:
  - really
  - indeed
  lexicon: BDAG
  rationale: Marks the widow as genuine in the sense defined by the surrounding context,
    not merely by social label. 'Truly' is concise and idiomatic.
- source_word: χήρα
  chosen: widow
  lexicon: BDAG
  rationale: Standard and precise rendering for a woman whose husband has died.
- source_word: μεμονωμένη
  chosen: is left all alone
  alternatives:
  - is alone
  - is isolated
  - is left alone
  lexicon: BDAG
  rationale: Perfect participle indicates a state of being left by oneself, likely
    without family support. 'Is left all alone' brings out both the resultant state
    and the social vulnerability in context.
- source_word: ἤλπικεν ἐπὶ θεόν
  chosen: has set her hope on God
  alternatives:
  - has hoped in God
  - has placed her hope in God
  lexicon: BDAG
  rationale: Perfect tense suggests a settled orientation with continuing result.
    'Has set her hope on God' captures both the completed act and enduring posture.
- source_word: προσμένει
  chosen: continues
  alternatives:
  - persists
  - devotes herself
  - remains steadfast
  lexicon: BDAG
  rationale: The verb conveys ongoing persistence. 'Continues' is natural English
    and fits the present tense without overinterpreting intensity.
- source_word: ταῖς δεήσεσιν
  chosen: petitions
  alternatives:
  - supplications
  - requests
  lexicon: BDAG
  rationale: Distinguishes δέησις from προσευχή by preserving the nuance of specific
    entreaties. 'Petitions' is readable modern English.
- source_word: ταῖς προσευχαῖς
  chosen: prayers
  lexicon: BDAG
  rationale: General term for prayers; paired with 'petitions' to preserve the twofold
    expression rather than collapsing them.
- source_word: νυκτὸς καὶ ἡμέρας
  chosen: night and day
  alternatives:
  - by night and by day
  - day and night
  lexicon: BDAG
  rationale: A conventional idiom for continual practice. The Greek order is retained.
- source_word: δὲ
  chosen: Now
  alternatives:
  - But
  - And
  lexicon: BDAG
  rationale: Signals contrast with the following verse and continuation of argument.
    'Now' is smoother in English than a stark 'But' here.
