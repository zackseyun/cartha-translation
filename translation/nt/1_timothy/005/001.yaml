id: 1TI.5.1
reference: 1 Timothy 5:1
source:
  edition: SBLGNT
  text: Πρεσβυτέρῳ μὴ ἐπιπλήξῃς, ἀλλὰ παρακάλει ὡς πατέρα, νεωτέρους ὡς ἀδελφούς,
translation:
  text: Do not rebuke an older man, but appeal to him as a father, and to younger
    men as brothers,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Do not sharply rebuke an elder'; the Greek term can mean either 'older
      man' or 'elder,' but the age-based contrast in this context favors 'older man.'
    reason: alternative_reading
lexical_decisions:
- source_word: Πρεσβυτέρῳ
  chosen: an older man
  alternatives:
  - an elder
  - an older person
  lexicon: BDAG
  rationale: Here πρεσβύτερος is an adjective used substantivally and is naturally
    read in contrast with νεωτέρους ('younger men') in the same verse, favoring an
    age-based sense rather than the church office 'elder.' The masculine singular
    is retained as 'older man' rather than a gender-neutral rendering.
- source_word: μὴ ἐπιπλήξῃς
  chosen: Do not rebuke
  alternatives:
  - Do not sharply rebuke
  - Do not reprimand
  lexicon: BDAG
  rationale: ἐπιπλήσσω carries the sense of striking at verbally, censuring, or rebuking.
    'Rebuke' is concise and standard; 'sharply rebuke' is possible but slightly over-specifies
    intensity beyond what is necessary in English.
- source_word: ἀλλὰ παρακάλει
  chosen: but appeal to him
  alternatives:
  - but exhort him
  - but encourage him
  - but urge him
  lexicon: BDAG
  rationale: παρακαλέω has a broad range including exhort, encourage, urge, and appeal.
    In contrast to harsh rebuke and followed by family similes, 'appeal to him' best
    captures the respectful, relational force in context. 'To him' is supplied in
    English for clarity from the implied object.
- source_word: ὡς πατέρα
  chosen: as a father
  alternatives:
  - like a father
  lexicon: BDAG
  rationale: ὡς introduces comparison. 'As a father' is the most natural and direct
    English rendering in this exhortational context.
- source_word: νεωτέρους
  chosen: younger men
  alternatives:
  - younger people
  - the younger men
  lexicon: BDAG
  rationale: The masculine plural adjective used substantivally is best rendered 'younger
    men,' especially since the following noun ἀδελφούς is masculine plural and the
    next verse addresses older women and younger women separately. This preserves
    the gender-accurate pattern of the passage.
- source_word: ὡς ἀδελφούς
  chosen: as brothers
  alternatives:
  - like brothers
  - as brothers in the faith
  lexicon: BDAG
  rationale: ἀδελφοί can sometimes be rendered inclusively as 'brothers and sisters,'
    but here the immediate context distinguishes groups by age and sex, so the masculine
    'brothers' should be preserved. Adding 'in the faith' would import an idea not
    explicit in the text.
