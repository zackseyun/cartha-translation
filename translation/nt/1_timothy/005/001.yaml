theological_decisions:
- issue: Whether Πρεσβυτέρῳ refers to the church office ('elder') or simply an older
    male
  chosen_reading: 'age-based: ''older man'''
  alternative_readings:
  - elder
  rationale: 'The verse sets up a relational pattern by age and sex categories: older
    man/father, younger men/brothers, then older women/mothers and younger women/sisters
    in the next verse. This contextual symmetry strongly supports an age-based reading
    rather than an ecclesial office. The translation therefore avoids importing church-structure
    terminology not required by the Greek.'
  doctrine_reference: Translation philosophy §§1, 4, 5
- issue: Whether ἀδελφούς should be rendered inclusively
  chosen_reading: '''brothers'''
  alternative_readings:
  - brothers and sisters
  rationale: The doctrine calls for gender-accurate rather than gender-neutral rendering.
    In this context the masculine plural is not generic but part of a sex-specific
    set of exhortations, so 'brothers' is the appropriate rendering.
  doctrine_reference: Translation philosophy §4
