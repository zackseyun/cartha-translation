theological_decisions:
- issue: Whether ὀπίσω τοῦ Σατανᾶ should be rendered more literally ('behind Satan')
    or idiomatically ('to follow Satan').
  chosen_reading: to follow Satan
  alternative_readings:
  - behind Satan
  - after Satan
  rationale: The phrase is metaphorical for allegiance or discipleship-like following.
    'To follow Satan' communicates the warning clearly in contemporary English without
    softening its theological seriousness.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve meaning
    of the source in readable modern English.'
