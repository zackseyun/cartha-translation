id: 1TI.5.15
reference: 1 Timothy 5:15
source:
  edition: SBLGNT
  text: ἤδη γάρ τινες ἐξετράπησαν ὀπίσω τοῦ Σατανᾶ.
translation:
  text: For some have already turned aside to follow Satan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'turned aside after Satan' or 'turned aside behind Satan.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἤδη
  chosen: already
  alternatives:
  - by now
  lexicon: BDAG
  rationale: Marks that this defection has in fact occurred at the present stage;
    'already' is natural modern English and preserves the adverb's temporal force.
- source_word: γάρ
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: BDAG
  rationale: Introduces the reason or explanation for the preceding instruction. 'For'
    best preserves the connective force in a concise way.
- source_word: τινες
  chosen: some
  alternatives:
  - certain ones
  lexicon: BDAG
  rationale: Indefinite plural referring to an unspecified subset. 'Some' is idiomatic
    and sufficiently precise without overformalizing.
- source_word: ἐξετράπησαν
  chosen: have ... turned aside
  alternatives:
  - have been led astray
  - have deviated
  - have turned away
  lexicon: BDAG
  rationale: The aorist passive/deponent form of ἐκτρέπομαι here conveys departure
    from the right path. 'Turned aside' preserves the metaphor of deviation without
    importing a stronger causative sense like 'been led astray.' The English present
    perfect fits the discourse context of a past action with present relevance.
- source_word: ὀπίσω
  chosen: to follow
  alternatives:
  - after
  - behind
  lexicon: BDAG
  rationale: Literally 'behind/after,' but in this idiom with a personal object it
    conveys following after someone. Rendering it with 'to follow' makes the sense
    clear in natural English while preserving the metaphorical directionality.
- source_word: Σατανᾶ
  chosen: Satan
  alternatives:
  - the Adversary
  lexicon: BDAG
  rationale: Standard transliteration of the personal name/title in New Testament
    usage. This follows the translation philosophy to transliterate names by standard
    conventions.
