id: 1TI.5.2
reference: 1 Timothy 5:2
source:
  edition: SBLGNT
  text: πρεσβυτέρας ὡς μητέρας, νεωτέρας ὡς ἀδελφὰς ἐν πάσῃ ἁγνείᾳ.
translation:
  text: older women as mothers, younger women as sisters, in all purity.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with all purity.' The phrase can also be understood with a strong sense
      of chastity or sexual propriety in context.
    reason: lexical_alternative
lexical_decisions:
- source_word: πρεσβυτέρας
  chosen: older women
  alternatives:
  - elder women
  - older women
  lexicon: BDAG
  rationale: The adjective πρεσβύτερος here is feminine accusative plural and functions
    substantivally. In this context it contrasts with νεωτέρας ('younger women') and
    refers to age rather than the church office of 'elders.' 'Older women' is clear
    modern English and preserves the relational instruction.
- source_word: ὡς
  chosen: as
  alternatives:
  - like
  lexicon: BDAG
  rationale: ὡς introduces comparison. 'As' is the most natural concise rendering
    in this paired exhortation structure ('as mothers ... as sisters').
- source_word: μητέρας
  chosen: mothers
  alternatives:
  - your mothers
  lexicon: BDAG
  rationale: The plural noun is comparative/predicative after ὡς. 'Mothers' preserves
    the familial metaphor without adding 'your,' which is not explicit in Greek.
- source_word: νεωτέρας
  chosen: younger women
  alternatives:
  - younger women
  - younger females
  lexicon: BDAG
  rationale: Like πρεσβυτέρας, this adjective is feminine accusative plural used substantivally
    and denotes younger women by age. 'Younger women' is idiomatic and matches the
    age-based contrast.
- source_word: ἀδελφὰς
  chosen: sisters
  alternatives:
  - your sisters
  lexicon: BDAG
  rationale: The familial metaphor continues. 'Sisters' is the natural English equivalent
    and, in context, clearly means women regarded with sibling-like regard.
- source_word: ἐν πάσῃ ἁγνείᾳ
  chosen: in all purity
  alternatives:
  - with all purity
  - in complete purity
  - with complete purity
  lexicon: BDAG
  rationale: The prepositional phrase modifies the manner in which younger women are
    to be treated. ἁγνεία denotes purity/chastity, especially moral and sexual purity
    in this context. 'In all purity' is a close and traditional rendering that remains
    clear in modern English; 'all' reflects πάσῃ and avoids narrowing the phrase too
    specifically while still implying comprehensive moral purity.
