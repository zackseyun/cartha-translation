theological_decisions:
- issue: Scope of ἁγνεία in the instruction about younger women
  chosen_reading: Render broadly as 'purity' without restricting the term in the main
    text to sexual chastity alone, while recognizing that sexual propriety is strongly
    included by context.
  alternative_readings:
  - in all chastity
  - with complete sexual purity
  rationale: The immediate context concerns how Timothy should relate to women in
    the church as family members. ἁγνεία can denote moral purity generally and often
    carries sexual-propriety implications. Rendering it as 'purity' preserves the
    full semantic range and avoids over-specifying beyond what the Greek states, while
    still naturally conveying the ethical force.
  doctrine_reference: 'Translation philosophy: Preserve theological tension rather
    than resolve it; Never paraphrase beyond what the source text warrants.'
