id: 1TI.5.8
reference: 1 Timothy 5:8
source:
  edition: SBLGNT
  text: εἰ δέ τις τῶν ἰδίων καὶ ⸀μάλιστα οἰκείων οὐ ⸀προνοεῖ, τὴν πίστιν ἤρνηται καὶ
    ἔστιν ἀπίστου χείρων.
translation:
  text: But if anyone does not provide for his own, and especially for members of
    his household, he has denied the faith and is worse than an unbeliever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his own people'; the phrase is broader than only those living under
      one roof, while 'members of his household' specifies the especially obligated
      subset.
    reason: lexical_alternative
  - marker: b
    text: Or 'has renounced the faith.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τις
  chosen: anyone
  alternatives:
  - someone
  - any man
  lexicon: BDAG
  rationale: Indefinite singular with generic force. 'Anyone' conveys the representative
    sense in natural English without restricting the statement to males, while still
    matching the generic intent of the Greek.
- source_word: τῶν ἰδίων
  chosen: his own
  alternatives:
  - his own people
  - his own family
  lexicon: BDAG
  rationale: The phrase is broader than immediate household and refers to one's own
    relations/dependents. 'His own' preserves the breadth, allowing the following
    phrase to narrow the focus further.
- source_word: μάλιστα
  chosen: especially
  alternatives:
  - particularly
  - most of all
  lexicon: BDAG
  rationale: Marks a subset receiving special emphasis within a broader category.
    'Especially' is the most natural modern equivalent.
- source_word: οἰκείων
  chosen: members of his household
  alternatives:
  - household members
  - those of his house
  - family
  lexicon: BDAG
  rationale: Refers specifically to those belonging to one's household. 'Members of
    his household' is slightly more explicit and natural than the more literal 'household
    members,' while preserving the domestic/dependent sense better than the broader
    'family.'
- source_word: προνοεῖ
  chosen: provide for
  alternatives:
  - care for
  - take thought for
  - look after
  lexicon: BDAG
  rationale: In this context the verb concerns practical forethought expressed in
    material support and care. 'Provide for' best captures the concrete obligation
    in idiomatic English.
- source_word: τὴν πίστιν
  chosen: the faith
  alternatives:
  - the faithfulness
  - the trust
  lexicon: BDAG
  rationale: Here πίστις refers not to subjective believing in general but to the
    Christian faith professed by the person. This matches common Pauline/Pastoral
    usage. Because DOCTRINE.md lists πίστις as a contested term with default 'faith,'
    the main text keeps 'faith'; alternatives are noted for auditability, though they
    are not contextually likely here.
- source_word: ἤρνηται
  chosen: has denied
  alternatives:
  - has renounced
  - has disowned
  lexicon: BDAG
  rationale: Perfect/middle indicative indicates a completed state with present force.
    'Has denied' is both direct and idiomatic, preserving the moral seriousness of
    repudiating one's professed faith by conduct.
- source_word: ἀπίστου
  chosen: an unbeliever
  alternatives:
  - an unfaithful person
  - an unbelieving person
  lexicon: BDAG
  rationale: In this contrast, ἄπιστος denotes one outside belief, not merely someone
    unreliable. 'An unbeliever' is the clearest concise rendering in English.
- source_word: χείρων
  chosen: worse
  alternatives:
  - inferior
  - more blameworthy
  lexicon: BDAG
  rationale: Comparative adjective expressing moral comparison. 'Worse' is simple,
    strong, and natural.
