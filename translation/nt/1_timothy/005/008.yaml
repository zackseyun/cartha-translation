theological_decisions:
- issue: Gender representation in a generic masculine construction
  chosen_reading: Use 'anyone' for τις but retain masculine possessive 'his' in keeping
    with the representative masculine pattern of the Greek.
  alternative_readings:
  - Use fully gender-neutral phrasing such as 'their own' and 'their household'
  - Use explicitly masculine 'any man'
  rationale: The verse uses a grammatically masculine singular construction with generic
    force. Following the stated gender-accurate philosophy, the translation preserves
    representative masculine reference without narrowing the scope to males only.
    'Anyone ... his own' reflects both the generic scope and the source-language form
    better than either a fully neutral paraphrase or an explicitly male-restricted
    rendering.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Sense of πίστις in 'τὴν πίστιν ἤρνηται'
  chosen_reading: '''the faith'' as the Christian faith professed'
  alternative_readings:
  - '''faith'' as personal trust'
  - '''faithfulness'' as fidelity'
  rationale: In the Pastorals, 'the faith' commonly denotes the Christian faith as
    confessed and embodied. The statement concerns practical repudiation of that confession
    through failure to care for one's own. This also aligns with the default rendering
    of πίστις while preserving the contextual nuance through the article.
  doctrine_reference: 'DOCTRINE.md Contested terms: πίστις'
