id: 1TI.5.10
reference: 1 Timothy 5:10
source:
  edition: SBLGNT
  text: ἐν ἔργοις καλοῖς μαρτυρουμένη, εἰ ἐτεκνοτρόφησεν, εἰ ἐξενοδόχησεν, εἰ ἁγίων
    πόδας ἔνιψεν, εἰ θλιβομένοις ἐπήρκεσεν, εἰ παντὶ ἔργῳ ἀγαθῷ ἐπηκολούθησεν.
translation:
  text: 'well attested for good works: if she has raised children, if she has shown
    hospitality, if she has washed the feet of the saints, if she has helped those
    under affliction, if she has devoted herself to every good work.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'has welcomed strangers.' The Greek verb refers specifically to receiving
      guests or strangers into one's home.
    reason: lexical_alternative
  - marker: b
    text: '''The saints'' here refers to God''s holy people, that is, fellow believers.'
    reason: lexical_alternative
  - marker: c
    text: Or 'has followed after every good work.' The Greek expression emphasizes
      active pursuit and commitment.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν ἔργοις καλοῖς
  chosen: for good works
  alternatives:
  - in good works
  - by good works
  lexicon: BDAG
  rationale: The phrase with ἐν expresses the sphere or basis in which she is attested.
    'For good works' is idiomatic in English and fits the sense of reputation grounded
    in observable deeds, while preserving the close connection to the Greek.
- source_word: μαρτυρουμένη
  chosen: well attested
  alternatives:
  - having testimony
  - being testified to
  - being well spoken of
  lexicon: BDAG
  rationale: The present passive participle describes her as one who is borne witness
    to by others. 'Well attested' captures the passive sense and the idea of recognized
    reputation more naturally than a wooden rendering.
- source_word: εἰ
  chosen: if
  alternatives:
  - whether
  lexicon: BDAG
  rationale: The repeated εἰ introduces a series of qualifying criteria. 'If' preserves
    the formal structure Paul uses in listing evidences of a widow's character.
- source_word: ἐτεκνοτρόφησεν
  chosen: has raised children
  alternatives:
  - has brought up children
  - has reared children
  lexicon: BDAG
  rationale: The verb refers to nurturing or bringing up children. 'Has raised children'
    is clear modern English and does not over-specify whether the children are biological,
    which the Greek itself does not explicitly state.
- source_word: ἐξενοδόχησεν
  chosen: has shown hospitality
  alternatives:
  - has welcomed strangers
  - has hosted guests
  lexicon: BDAG
  rationale: The verb literally concerns receiving strangers/guests, but 'has shown
    hospitality' is the most natural contemporary rendering and accurately conveys
    the virtue in view.
- source_word: ἁγίων
  chosen: the saints
  alternatives:
  - the holy ones
  - believers
  lexicon: BDAG
  rationale: In Pauline usage this commonly refers to God's holy people, that is,
    fellow believers. 'The saints' preserves the established lexical sense and avoids
    flattening the term, while remaining understandable.
- source_word: πόδας ἔνιψεν
  chosen: has washed the feet
  alternatives:
  - has washed feet
  lexicon: BDAG
  rationale: This is a literal act of humble service. The explicit object should be
    retained because of its cultural and symbolic force in early Christian practice.
- source_word: θλιβομένοις
  chosen: those under affliction
  alternatives:
  - the afflicted
  - those in distress
  - those being oppressed
  lexicon: BDAG
  rationale: The participle denotes people experiencing trouble, pressure, or distress.
    'Those under affliction' preserves the passive nuance and broad scope without
    narrowing it to persecution alone.
- source_word: ἐπήρκεσεν
  chosen: has helped
  alternatives:
  - has assisted
  - has given aid to
  - has relieved
  lexicon: BDAG
  rationale: The verb means to give assistance or support. 'Has helped' is concise
    and natural, while broad enough to cover practical aid.
- source_word: παντὶ ἔργῳ ἀγαθῷ
  chosen: every good work
  alternatives:
  - every good deed
  lexicon: BDAG
  rationale: A straightforward rendering of the distributive phrase. 'Good work' is
    a common Pauline expression and should be preserved for consistency.
- source_word: ἐπηκολούθησεν
  chosen: has devoted herself to
  alternatives:
  - has followed after
  - has pursued
  - has been committed to
  lexicon: BDAG
  rationale: The verb literally means to follow after, but in this ethical context
    it conveys active pursuit or dedication. 'Has devoted herself to' communicates
    sustained commitment in idiomatic English better than the more wooden 'followed
    after'.
