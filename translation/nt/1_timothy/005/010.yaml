theological_decisions:
- issue: Referent of 'the saints' (ἁγίων)
  chosen_reading: A reference to fellow believers, rendered literally as 'the saints.'
  alternative_readings:
  - holy people
  - believers
  rationale: The term in Pauline usage ordinarily denotes Christians as God's consecrated
    people. The main text keeps the lexical form 'saints' rather than interpreting
    it more loosely, while the meaning remains accessible from context.
  doctrine_reference: Translation philosophy §5 (consistency of key terms)
