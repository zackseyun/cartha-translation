theological_decisions:
- issue: Meaning of 'double honor' in relation to church leaders
  chosen_reading: Retain the broader phrase 'double honor' in the main text without
    narrowing it to either respect alone or financial remuneration alone.
  alternative_readings:
  - double respect
  - double compensation
  - honor including material support
  rationale: The immediate context in 1 Tim 5:18 points toward material support, but
    τιμή can also include esteem. Preserving the broader expression maintains the
    text's semantic range and avoids importing a denominationally loaded polity or
    compensation theory into the translation itself.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Force of μάλιστα
  chosen_reading: Render as 'especially' rather than an appositional 'namely.'
  alternative_readings:
  - namely those who labor in word and teaching
  rationale: This preserves the likely distinction between elders generally and a
    specially emphasized subset, without foreclosing the interpretive debate over
    whether all elders teach or whether some are particularly devoted to that work.
  doctrine_reference: Translation philosophy §3
