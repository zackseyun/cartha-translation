id: 1TI.5.17
reference: 1 Timothy 5:17
source:
  edition: SBLGNT
  text: Οἱ καλῶς προεστῶτες πρεσβύτεροι διπλῆς τιμῆς ἀξιούσθωσαν, μάλιστα οἱ κοπιῶντες
    ἐν λόγῳ καὶ διδασκαλίᾳ·
translation:
  text: Let the elders who lead well be considered worthy of double honor, especially
    those who labor in word and teaching.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'be counted worthy of twofold honor.' The phrase may include both respect
      and material support, especially in light of the following verse.
    reason: lexical_alternative
  - marker: b
    text: Or 'especially' may be understood by some as 'namely,' identifying the elders
      in view as those laboring in preaching and teaching.
    reason: alternative_reading
  - marker: c
    text: '''In word and teaching'' likely refers to verbal ministry such as preaching
      and instruction.'
    reason: cultural_note
lexical_decisions:
- source_word: πρεσβύτεροι
  chosen: elders
  alternatives:
  - older men
  - presbyters
  lexicon: BDAG
  rationale: In the Pastoral Epistles the term refers to recognized church leaders
    rather than merely older males. 'Elders' is the clearest modern English equivalent
    without importing later ecclesiastical structure as strongly as 'presbyters' might.
- source_word: καλῶς προεστῶτες
  chosen: who lead well
  alternatives:
  - who rule well
  - who manage well
  - who preside well
  lexicon: BDAG
  rationale: προΐστημι in this context denotes exercising leadership or oversight.
    'Lead well' is natural modern English and avoids the potentially over-harsh or
    anachronistic connotations of 'rule,' while still preserving real authority.
- source_word: διπλῆς τιμῆς
  chosen: of double honor
  alternatives:
  - of twofold honor
  - of ample honor
  lexicon: BDAG
  rationale: A fairly literal rendering preserves the phrase's ambiguity, which may
    include both respect and material support in context. 'Double honor' is traditional
    enough to be recognizable yet still transparent.
- source_word: ἀξιούσθωσαν
  chosen: be considered worthy
  alternatives:
  - be counted worthy
  - be deemed worthy
  lexicon: BDAG
  rationale: The passive imperative calls for the community's evaluative recognition.
    'Be considered worthy' is idiomatic modern English and accurately reflects the
    passive sense.
- source_word: μάλιστα
  chosen: especially
  alternatives:
  - particularly
  - namely
  lexicon: BDAG
  rationale: μάλιστα most naturally marks a subset receiving special emphasis. 'Especially'
    preserves that force without forcing an exclusive or exhaustive distinction.
- source_word: κοπιῶντες
  chosen: those who labor
  alternatives:
  - those who work hard
  - those who toil
  lexicon: BDAG
  rationale: κοπιάω conveys strenuous effort. 'Labor' preserves the sense of exertion
    and suits the dignified tone of the passage.
- source_word: ἐν λόγῳ
  chosen: in word
  alternatives:
  - in preaching
  - in speaking
  - in the word
  lexicon: BDAG
  rationale: λόγος here likely refers to verbal ministry, probably public proclamation
    or preaching. Rendering it as 'word' keeps the Greek's breadth and avoids over-specifying
    beyond what the text explicitly states.
- source_word: διδασκαλίᾳ
  chosen: teaching
  alternatives:
  - instruction
  - doctrine
  lexicon: BDAG
  rationale: '''Teaching'' is the most natural and accessible rendering. ''Doctrine''
    can sound more technical than the Greek requires, while ''instruction'' may underplay
    the recognized teaching function.'
