id: 1TI.6.5
reference: 1 Timothy 6:5
source:
  edition: SBLGNT
  text: διαπαρατριβαὶ διεφθαρμένων ἀνθρώπων τὸν νοῦν καὶ ἀπεστερημένων τῆς ἀληθείας,
    νομιζόντων πορισμὸν εἶναι τὴν ⸀εὐσέβειαν.
translation:
  text: constant friction among people whose minds are corrupted and who have been
    deprived of the truth, imagining that godliness is a means of gain.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'constant quarrels' or 'continual wranglings.' The Greek term pictures
      ongoing friction or rubbing against one another.
    reason: lexical_alternative
  - marker: b
    text: Or 'imagining that godliness is profit' or 'a source of profit.' The sense
      is that they treat devotion to God as something to exploit for material advantage.
    reason: lexical_alternative
lexical_decisions:
- source_word: διαπαρατριβαὶ
  chosen: constant friction
  alternatives:
  - constant quarrels
  - continual wranglings
  - mutual irritations
  lexicon: BDAG
  rationale: The noun denotes persistent rubbing against, metaphorically continual
    conflict or friction. 'Constant friction' preserves the metaphorical sense without
    sounding archaic, and fits the plural noun as a summary description of ongoing
    disputes.
- source_word: διεφθαρμένων
  chosen: corrupted
  alternatives:
  - depraved
  - ruined
  lexicon: BDAG
  rationale: The perfect passive participle indicates a settled state resulting from
    corruption. 'Corrupted' is clear modern English and avoids importing stronger
    moral-philosophical freight than the context requires.
- source_word: τὸν νοῦν
  chosen: minds
  alternatives:
  - understanding
  - thinking
  lexicon: BDAG
  rationale: The accusative 'mind' is an internal object with the participle, literally
    'corrupted in mind.' English idiom prefers 'whose minds are corrupted,' preserving
    the cognitive-moral dimension of νοῦς.
- source_word: ἀπεστερημένων
  chosen: have been deprived
  alternatives:
  - have been robbed
  - are bereft
  lexicon: BDAG
  rationale: The perfect passive participle again marks a resulting state. 'Have been
    deprived' captures passive loss without overdramatizing; it also naturally governs
    'of the truth.'
- source_word: τῆς ἀληθείας
  chosen: the truth
  alternatives:
  - truth
  lexicon: BDAG
  rationale: The article is retained in English because Paul refers to the definite
    body/reality of Christian truth, not truth in a merely abstract sense.
- source_word: νομιζόντων
  chosen: imagining
  alternatives:
  - supposing
  - thinking
  lexicon: BDAG
  rationale: The participle introduces the mistaken belief motivating these people.
    'Imagining' conveys error more pointedly than the neutral 'thinking' while remaining
    natural English.
- source_word: πορισμὸν
  chosen: a means of gain
  alternatives:
  - profit
  - source of profit
  lexicon: BDAG
  rationale: The noun refers to gain, profit, or a means of acquiring it. 'A means
    of gain' best reflects the predicative construction and the idea of using religion
    instrumentally for material advantage.
- source_word: εὐσέβειαν
  chosen: godliness
  alternatives:
  - piety
  - religion
  - devotion
  lexicon: BDAG
  rationale: In the Pastorals, εὐσέβεια regularly denotes reverent, God-directed living.
    'Godliness' is the most established and accurate rendering here, whereas 'religion'
    could imply mere external practice and 'piety' sounds less natural for the target
    audience.
