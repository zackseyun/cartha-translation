theological_decisions:
- issue: Whether εὐσέβεια should be rendered in a way that suggests true devotion
    or merely outward religion
  chosen_reading: Rendered as 'godliness' while the context shows the false teachers
    treat it instrumentally.
  alternative_readings:
  - religion
  - piety
  rationale: The Greek term itself is positive and should not be flattened into merely
    external religiosity. The abuse lies in the teachers' attitude toward it, expressed
    by 'imagining that godliness is a means of gain.'
  doctrine_reference: Translation philosophy §1, §6
- issue: How strongly to express the moral condition of διεφθαρμένων
  chosen_reading: Rendered as 'whose minds are corrupted' rather than 'depraved in
    mind.'
  alternative_readings:
  - depraved in mind
  rationale: The verse condemns the teachers sharply, but the translation should not
    intensify beyond the lexical force of the participle. 'Corrupted' preserves the
    moral judgment without importing later doctrinal shorthand.
  doctrine_reference: Translation philosophy §1, §3
