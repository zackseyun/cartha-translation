id: 1TI.6.4
reference: 1 Timothy 6:4
source:
  edition: SBLGNT
  text: τετύφωται, μηδὲν ἐπιστάμενος, ἀλλὰ νοσῶν περὶ ζητήσεις καὶ λογομαχίας, ἐξ
    ὧν γίνεται φθόνος, ἔρις, βλασφημίαι, ὑπόνοιαι πονηραί,
translation:
  text: he is puffed up, understanding nothing, but sick with a craving for controversies
    and word-battles, from which come envy, strife, slanders, and evil suspicions,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'has become conceited.' The Greek literally evokes being swollen or puffed
      up with pride.
    reason: lexical_alternative
  - marker: b
    text: Or 'word-quarrels' or 'disputes about words.'
    reason: lexical_alternative
  - marker: c
    text: Here 'slanders' reflects abusive speech against people; the Greek term can
      in other contexts mean 'blasphemies.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τετύφωται
  chosen: is puffed up
  alternatives:
  - has become conceited
  - is conceited
  lexicon: BDAG
  rationale: Perfect passive/middle of τυφόω/τυφόομαι conveys a state of being swollen
    with pride or conceit. 'Is puffed up' preserves the metaphor and the resultant
    state better than the flatter 'is conceited.'
- source_word: μηδὲν ἐπιστάμενος
  chosen: understanding nothing
  alternatives:
  - knowing nothing
  - being ignorant of everything
  lexicon: BDAG
  rationale: The participial phrase describes the subject's actual lack of grasp.
    'Understanding nothing' fits idiomatic English and captures more than mere possession
    of facts, while remaining close to the Greek.
- source_word: νοσῶν
  chosen: sick with a craving
  alternatives:
  - having an unhealthy interest
  - being diseased about
  - morbidly obsessed with
  lexicon: BDAG
  rationale: νοσέω literally means 'to be sick,' used metaphorically here. 'Sick with
    a craving' preserves the illness metaphor while making clear the figurative sense
    in natural English. 'Unhealthy interest' is possible but weakens the vividness.
- source_word: περὶ ζητήσεις
  chosen: for controversies
  alternatives:
  - about controversies
  - for disputes
  - for speculations
  lexicon: BDAG
  rationale: ζητήσεις in the Pastorals often refers to speculative disputes or controversies.
    'For controversies' works with 'craving' and communicates the object of the unhealthy
    fixation.
- source_word: λογομαχίας
  chosen: word-battles
  alternatives:
  - word-quarrels
  - disputes about words
  - verbal fights
  lexicon: BDAG
  rationale: A compound of λόγος and μάχη, denoting quarrels over words. 'Word-battles'
    is vivid, readable modern English and preserves the combative force. 'Disputes
    about words' is more explanatory but less concise.
- source_word: ἐξ ὧν γίνεται
  chosen: from which come
  alternatives:
  - out of which arise
  - from these result
  lexicon: BDAG
  rationale: The phrase marks these vices as the outcome of the controversies and
    word-battles. 'From which come' is natural and sufficiently formal.
- source_word: φθόνος
  chosen: envy
  alternatives:
  - jealousy
  lexicon: BDAG
  rationale: φθόνος commonly denotes resentful envy rather than the broader English
    'jealousy.'
- source_word: ἔρις
  chosen: strife
  alternatives:
  - contention
  - quarreling
  lexicon: BDAG
  rationale: ἔρις refers to discord or contention. 'Strife' is concise and standard
    in vice lists.
- source_word: βλασφημίαι
  chosen: slanders
  alternatives:
  - blasphemies
  - abusive speech
  - revilings
  lexicon: BDAG
  rationale: In this interpersonal vice-list context, βλασφημίαι is best rendered
    as defamatory or abusive speech against others rather than specifically speech
    against God. 'Slanders' is the clearest contextual rendering.
- source_word: ὑπόνοιαι πονηραί
  chosen: evil suspicions
  alternatives:
  - wicked suspicions
  - malicious suspicions
  lexicon: BDAG
  rationale: ὑπόνοια denotes suspicion or surmise, and πονηραί qualifies it morally.
    'Evil suspicions' is direct and idiomatic.
