id: 1TI.6.18
reference: 1 Timothy 6:18
source:
  edition: SBLGNT
  text: ἀγαθοεργεῖν, πλουτεῖν ἐν ἔργοις καλοῖς, εὐμεταδότους εἶναι, κοινωνικούς,
translation:
  text: to do good, to be rich in good works, to be generous, ready to share,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἀγαθοεργεῖν
  chosen: to do good
  alternatives:
  - to do what is good
  - to do good deeds
  lexicon: BDAG
  rationale: The infinitive continues the content of Paul's charge. 'To do good' is
    concise, natural English and preserves the verbal force better than the more nominal
    'do good deeds.'
- source_word: πλουτεῖν
  chosen: to be rich
  alternatives:
  - to abound
  - to be wealthy
  lexicon: BDAG
  rationale: Here the verb is used metaphorically with ἐν ἔργοις καλοῖς. 'To be rich'
    preserves the deliberate contrast with material wealth in the surrounding context,
    while 'wealthy' would sound too literal and 'abound' would weaken the wealth imagery.
- source_word: ἐν ἔργοις καλοῖς
  chosen: in good works
  alternatives:
  - in good deeds
  - in noble works
  lexicon: BDAG
  rationale: The prepositional phrase specifies the sphere in which they are to be
    rich. 'Good works' is a clear and established rendering for ἔργα καλά in the Pastorals,
    while remaining understandable in modern English.
- source_word: εὐμεταδότους
  chosen: generous
  alternatives:
  - openhanded
  - liberal in giving
  lexicon: BDAG
  rationale: The adjective denotes willingness to give or share resources. 'Generous'
    is the most natural modern equivalent and fits the ethical exhortation without
    sounding archaic.
- source_word: κοινωνικούς
  chosen: ready to share
  alternatives:
  - willing to share
  - sharing
  - communal
  lexicon: BDAG
  rationale: The term carries the sense of being inclined toward sharing with others.
    'Ready to share' captures the dispositional nuance and avoids the misleading modern
    connotations of 'communal.'
- source_word: εὐμεταδότους εἶναι, κοινωνικούς
  chosen: to be generous, ready to share
  alternatives:
  - to be generous and willing to share
  lexicon: BDAG
  rationale: 'The two adjectives are closely related but not redundant: the first
    emphasizes generosity in giving, the second a sharing disposition. The chosen
    English preserves both ideas with a natural rhythm.'
