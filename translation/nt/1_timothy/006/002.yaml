id: 1TI.6.2
reference: 1 Timothy 6:2
source:
  edition: SBLGNT
  text: οἱ δὲ πιστοὺς ἔχοντες δεσπότας μὴ καταφρονείτωσαν, ὅτι ἀδελφοί εἰσιν· ἀλλὰ
    μᾶλλον δουλευέτωσαν, ὅτι πιστοί εἰσιν καὶ ἀγαπητοὶ οἱ τῆς εὐεργεσίας ἀντιλαμβανόμενοι.
    Ταῦτα δίδασκε καὶ παρακάλει.
translation:
  text: And those who have believing masters must not despise them because they are
    brothers; rather, they must serve them all the more, because those who receive
    the benefit are believers and beloved. Teach and urge these things.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'brothers and sisters'; Greek 'brothers.'
    reason: lexical_alternative
  - marker: b
    text: The clause 'those who receive the benefit' is difficult. It most likely
      refers to the believing masters as the beneficiaries of the slaves' service.
    reason: alternative_reading
lexical_decisions:
- source_word: πιστοὺς
  chosen: believing
  alternatives:
  - faithful
  lexicon: BDAG
  rationale: In context with δεσπότας, the adjective refers to masters who are believers
    in Christ, not merely reliable or trustworthy. 'Believing' makes the relational
    and ecclesial sense explicit in natural English.
- source_word: δεσπότας
  chosen: masters
  alternatives:
  - lords
  lexicon: BDAG
  rationale: δεσπότης denotes one who exercises ownership/absolute authority. In this
    household-slavery context, 'masters' is the most idiomatic English equivalent.
    'Lords' would sound misleadingly exalted in modern English. This is distinct from
    δοῦλος, which elsewhere may require 'slave' when that term itself appears.
- source_word: καταφρονείτωσαν
  chosen: must not despise
  alternatives:
  - must not look down on
  - must not treat with contempt
  lexicon: BDAG
  rationale: The verb conveys contempt or disregard. 'Despise' is concise and strong,
    matching the prohibition's force.
- source_word: ἀδελφοί
  chosen: brothers
  alternatives:
  - brothers and sisters
  - siblings
  lexicon: BDAG
  rationale: The Greek is grammatically masculine plural and in early Christian usage
    often refers to fellow believers. Per doctrine, gender-accurate rendering is preferred;
    'brothers' preserves the source form while the context makes clear the shared
    Christian family relationship.
- source_word: μᾶλλον δουλευέτωσαν
  chosen: rather, they must serve them all the more
  alternatives:
  - rather, let them serve all the more
  - rather, they must be slaves to them all the more
  lexicon: BDAG
  rationale: δουλεύω here means to render service in the condition of slavery. Because
    the direct object is δεσπόται and the social setting is already explicit, 'serve'
    communicates the imperative naturally without awkward English. 'All the more'
    preserves μᾶλλον.
- source_word: πιστοί
  chosen: believers
  alternatives:
  - faithful ones
  - faithful
  lexicon: BDAG
  rationale: As earlier in the verse, the sense is those who believe in Christ. Substantival
    'believers' is clearer in English than bare 'faithful'.
- source_word: ἀγαπητοὶ
  chosen: beloved
  alternatives:
  - dear
  - loved
  lexicon: BDAG
  rationale: '''Beloved'' preserves the covenantal and affectionate weight common
    in Christian usage without over-paraphrase.'
- source_word: οἱ τῆς εὐεργεσίας ἀντιλαμβανόμενοι
  chosen: those who receive the benefit
  alternatives:
  - those who partake of the good service
  - those who benefit from it
  - those who are helped by the service
  lexicon: BDAG
  rationale: This clause is syntactically difficult. The most natural reading is that
    the believing masters are the ones benefiting from the slaves' service. εὐεργεσία
    denotes benefit/good deed, and ἀντιλαμβάνομαι here carries the sense of receiving
    or benefiting from something. 'Those who receive the benefit' preserves the ambiguity
    without over-specifying 'service' in the clause itself.
- source_word: Ταῦτα δίδασκε καὶ παρακάλει
  chosen: Teach and urge these things
  alternatives:
  - Teach and exhort these things
  - Keep teaching and encouraging these things
  lexicon: BDAG
  rationale: Both verbs are present imperatives to Timothy. 'Teach and urge' is clear
    modern English; 'urge' captures παρακάλει well in this paraenetic context.
