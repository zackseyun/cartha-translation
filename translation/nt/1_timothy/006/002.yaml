theological_decisions:
- issue: Rendering of ἀδελφοί in a mixed-gender ecclesial context
  chosen_reading: brothers
  alternative_readings:
  - brothers and sisters
  - siblings
  rationale: Following the project's gender-accurate policy, the masculine plural
    is retained rather than neutralized. The familial Christian sense is preserved,
    and an inclusive alternative is noted in a footnote for readers.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Social-status terminology in a slavery context
  chosen_reading: masters ... serve
  alternative_readings:
  - masters ... be slaves to
  - owners ... serve
  rationale: The verse addresses enslaved persons and their δεσπόται, but the noun
    δοῦλος does not occur in this verse itself. 'Masters' accurately reflects δεσπότας,
    while δουλεύω is rendered 'serve' for idiomatic English in context. This preserves
    the social reality without forcing an unnatural English expression.
  doctrine_reference: DOCTRINE.md Translation philosophy §1; Contested terms table
    on δοῦλος
- issue: Interpretation of οἱ τῆς εὐεργεσίας ἀντιλαμβανόμενοι
  chosen_reading: the beneficiaries are the believing masters
  alternative_readings:
  - the believing slaves are those devoted to doing good
  - both parties share in the benefit
  rationale: The nearest and most common-sense reading in context is that the masters
    are the ones who receive the benefit of the slaves' increased service. The translation
    reflects this while keeping the wording somewhat open because the Greek construction
    is compressed and debated.
  doctrine_reference: DOCTRINE.md Translation philosophy §3
