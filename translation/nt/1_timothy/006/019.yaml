id: 1TI.6.19
reference: 1 Timothy 6:19
source:
  edition: SBLGNT
  text: ἀποθησαυρίζοντας ἑαυτοῖς θεμέλιον καλὸν εἰς τὸ μέλλον, ἵνα ἐπιλάβωνται τῆς
    ⸀ὄντως ζωῆς.
translation:
  text: storing up for themselves a good foundation for the future, so that they may
    take hold of what is truly life.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, “the life that is truly life.”
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀποθησαυρίζοντας
  chosen: storing up
  alternatives:
  - treasuring up
  - laying up in store
  lexicon: BDAG
  rationale: Present participle continuing the exhortation from the previous verse;
    'storing up' preserves the treasure imagery without archaic phrasing. 'Treasuring
    up' is possible but can suggest valuing rather than accumulating.
- source_word: ἑαυτοῖς
  chosen: for themselves
  alternatives:
  - for themselves personally
  lexicon: BDAG
  rationale: Dative reflexive pronoun indicating benefit or advantage to the subjects;
    'for themselves' is the natural English rendering.
- source_word: θεμέλιον καλὸν
  chosen: a good foundation
  alternatives:
  - a fine foundation
  - a noble foundation
  lexicon: BDAG
  rationale: θεμέλιον is literally 'foundation'; καλός here carries the sense of good,
    worthy, or sound. 'Good foundation' is clear and idiomatic while preserving the
    building metaphor.
- source_word: εἰς τὸ μέλλον
  chosen: for the future
  alternatives:
  - for what is to come
  - for the coming age
  lexicon: BDAG
  rationale: The phrase points forward to what lies ahead. 'For the future' is concise
    and natural. 'For the coming age' is interpretively stronger than the Greek requires,
    though eschatological overtones are present.
- source_word: ἵνα
  chosen: so that
  alternatives:
  - in order that
  lexicon: BDAG
  rationale: Standard purpose conjunction; 'so that' is idiomatic modern English.
- source_word: ἐπιλάβωνται
  chosen: they may take hold of
  alternatives:
  - they may grasp
  - they may obtain
  lexicon: BDAG
  rationale: Middle subjunctive of ἐπιλαμβάνομαι commonly means to take hold of or
    seize. 'Take hold of' preserves the vivid metaphor and aligns with Pauline usage
    in exhortational contexts.
- source_word: τῆς ὄντως ζωῆς
  chosen: what is truly life
  alternatives:
  - the life that is truly life
  - real life
  lexicon: BDAG
  rationale: ὄντως modifies ζωή with the sense 'really, truly.' Rendering the phrase
    as 'what is truly life' communicates the qualitative contrast between present
    wealth and genuine life. The article plus genitive after ἐπιλάβωνται is naturally
    expressed in English this way. 'The life that is truly life' is more formally
    literal and worth preserving in a footnote.
