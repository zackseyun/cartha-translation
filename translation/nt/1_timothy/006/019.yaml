theological_decisions:
- issue: Whether εἰς τὸ μέλλον should be rendered in a specifically eschatological
    way
  chosen_reading: for the future
  alternative_readings:
  - for the coming age
  rationale: The context in 1 Timothy 6 concerns generosity in light of eternal realities,
    so eschatological resonance is present. However, the Greek phrase itself is broader
    and does not explicitly specify 'age.' The main text preserves the forward-looking
    sense without over-interpreting it.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: How explicitly to render τῆς ὄντως ζωῆς
  chosen_reading: what is truly life
  alternative_readings:
  - the life that is truly life
  - real life
  rationale: The phrase contrasts apparent life grounded in riches with genuine life
    grounded in God's future. 'What is truly life' is idiomatic and preserves the
    qualitative emphasis without flattening it into colloquialism. The more literal
    alternative is preserved in a footnote.
  doctrine_reference: Readable modern English, not archaic or academic; preserve theological
    tension rather than resolve it.
