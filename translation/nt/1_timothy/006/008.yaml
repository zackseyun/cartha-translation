id: 1TI.6.8
reference: 1 Timothy 6:8
source:
  edition: SBLGNT
  text: ἔχοντες δὲ διατροφὰς καὶ σκεπάσματα, τούτοις ἀρκεσθησόμεθα.
translation:
  text: But if we have food and covering, we will be content with these.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'clothing'; the Greek term can more broadly mean what covers a person,
      possibly including shelter as well.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔχοντες
  chosen: if we have
  alternatives:
  - having
  - since we have
  lexicon: BDAG
  rationale: The participle is adverbial and sets the circumstance for the main verb.
    English idiom is clearer with a conditional-like clause ('if we have') rather
    than a bare participle ('having'). 'Since we have' would overstate the nuance;
    the Greek can be read more generally as a condition or circumstance.
- source_word: δὲ
  chosen: But
  alternatives:
  - and
  - now
  lexicon: BDAG
  rationale: δέ marks a mild contrast or development from the previous statement about
    gain and contentment. 'But' best signals the contrast in English without being
    too strong.
- source_word: διατροφὰς
  chosen: food
  alternatives:
  - nourishment
  - provisions
  lexicon: BDAG
  rationale: διατροφή refers to means of sustenance, especially food. 'Food' is the
    most natural and sufficiently precise modern English rendering.
- source_word: σκεπάσματα
  chosen: covering
  alternatives:
  - clothing
  - shelter
  - coverings
  lexicon: BDAG
  rationale: σκέπασμα can denote that which covers, and in context may include clothing
    and possibly shelter. 'Covering' preserves the broader semantic range better than
    narrowing it to only 'clothing' or only 'shelter'.
- source_word: τούτοις
  chosen: with these
  alternatives:
  - with these things
  - with them
  lexicon: BDAG
  rationale: The dative demonstrative refers back to the basic necessities just mentioned.
    'With these' is concise, natural English and keeps the demonstrative force.
- source_word: ἀρκεσθησόμεθα
  chosen: we will be content
  alternatives:
  - we will be satisfied
  - let us be content
  lexicon: BDAG
  rationale: Future passive/deponent form from ἀρκέω here expresses sufficiency/contentment.
    'We will be content' fits the semantic force and the future indicative better
    than the hortatory 'let us be content,' though the latter is sometimes adopted
    interpretively.
