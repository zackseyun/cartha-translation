theological_decisions:
- issue: Scope of σκεπάσματα
  chosen_reading: broad 'covering' that may include clothing and shelter
  alternative_readings:
  - clothing only
  - shelter only
  rationale: The verse teaches contentment with basic necessities, but the Greek term
    is broad enough that the translation should not artificially restrict the scope.
    This preserves the text's practical force without importing a narrower social
    application than the word warrants.
  doctrine_reference: Translation philosophy §1, §5
