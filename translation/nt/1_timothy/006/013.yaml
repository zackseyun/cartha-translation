theological_decisions:
- issue: Rendering Χριστός
  chosen_reading: Messiah Jesus
  alternative_readings:
  - Christ Jesus
  rationale: The doctrinal guidance directs translating Χριστός as 'Messiah' where title is in view. In this solemn confessional setting, the titular sense is still active rather than merely name-like.
  doctrine_reference: 'DOCTRINE.md: Contested terms — Χριστός default rendering'
- issue: Sense of ζῳογονοῦντος
  chosen_reading: who gives life to all things
  alternative_readings:
  - who preserves all things alive
  - who makes all things alive
  rationale: The participle can be understood as preserving life or imparting life. The chosen rendering preserves God's universal life-giving role without forcing a narrower doctrinal nuance. Alternatives are preserved in a footnote because the semantic range is significant.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it'
revisions:
- timestamp: '2026-04-21T01:59:50Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/nt/1_timothy/006/013.json
  category: awkward_english
  tier: 1
  from: who testified the good confession
  to: who testified to the good confession
  rationale: The current rendering is a very literal translation of the Greek verb μαρτυρήσαντος with its direct object τὴν... ὁμολογίαν. However, in English, the verb 'testify' is not typically used with a direct object like 'a confession,' making the phrase sound stilted. Adding the preposition 'to' creates a more natural English idiom ('testified to the good confession') without altering the core meaning of bearing witness.
