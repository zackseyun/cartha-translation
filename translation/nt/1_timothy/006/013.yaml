id: 1TI.6.13
reference: 1 Timothy 6:13
source:
  edition: SBLGNT
  text: παραγγέλλω σοι ἐνώπιον τοῦ θεοῦ τοῦ ⸀ζῳογονοῦντος τὰ πάντα καὶ Χριστοῦ Ἰησοῦ τοῦ μαρτυρήσαντος ἐπὶ Ποντίου Πιλάτου τὴν καλὴν ὁμολογίαν,
translation:
  text: I charge you before God, who gives life to all things, and Messiah Jesus, who testified to the good confession before Pontius Pilate,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'who preserves all things alive' or 'who makes all things alive.' The Greek participle ζῳογονοῦντος can emphasize either preserving life or giving life.
    reason: lexical_alternative
  - marker: b
    text: Or 'Christ Jesus.' The Greek title Χριστός is rendered 'Messiah' here to preserve its meaning as a title.
    reason: alternative_reading
  - marker: c
    text: Or 'who testified the good confession'.
    reason: previous_rendering
lexical_decisions:
- source_word: παραγγέλλω
  chosen: I charge
  alternatives:
  - I command
  - I instruct
  lexicon: BDAG
  rationale: The verb carries the sense of giving a solemn directive or command. 'I charge' best fits the formal, weighty tone of Paul's adjuration in this context, especially with the following 'before God ... and Messiah Jesus.'
- source_word: σοι
  chosen: you
  lexicon: BDAG
  rationale: Standard second-person singular indirect object; English idiom places it directly after 'charge.'
- source_word: ἐνώπιον
  chosen: before
  alternatives:
  - in the presence of
  lexicon: BDAG
  rationale: '''Before'' is concise and natural while preserving the solemn sense of being in the presence of God and Messiah Jesus.'
- source_word: θεοῦ
  chosen: God
  lexicon: BDAG
  rationale: Straightforward rendering of the genitive after ἐνώπιον.
- source_word: ζῳογονοῦντος
  chosen: who gives life
  alternatives:
  - who preserves alive
  - who makes alive
  lexicon: BDAG
  rationale: The participle can mean either to keep alive or to cause to live. In this context, describing God's life-giving power in a solemn charge, 'who gives life' is clear modern English and preserves the broad sense without over-specifying whether preservation or vivification is primary.
- source_word: τὰ πάντα
  chosen: to all things
  alternatives:
  - to everything
  - all things
  lexicon: BDAG
  rationale: With the life-giving participle, English idiom favors 'gives life to all things.' This preserves the comprehensive scope of τὰ πάντα.
- source_word: Χριστοῦ Ἰησοῦ
  chosen: Messiah Jesus
  alternatives:
  - Christ Jesus
  lexicon: BDAG
  rationale: Per doctrine, Χριστός is translated as 'Messiah' where it functions as a title rather than a name-like element. Here the titular force remains clear in a solemn confessional context.
- source_word: μαρτυρήσαντος
  chosen: who testified
  alternatives:
  - who bore witness
  - who made testimony
  lexicon: BDAG
  rationale: The aorist participle refers to Jesus' public witness under trial. 'Testified' is natural English in connection with 'before Pontius Pilate' and retains juridical overtones.
- source_word: ἐπὶ Ποντίου Πιλάτου
  chosen: before Pontius Pilate
  alternatives:
  - in the time of Pontius Pilate
  - under Pontius Pilate
  lexicon: BDAG
  rationale: Although ἐπί with the genitive can sometimes mean 'in the time of' or 'under,' here with μαρτυρήσαντος and the known trial setting, 'before Pontius Pilate' best captures the immediate narrative sense of testimony in his presence.
- source_word: τὴν καλὴν ὁμολογίαν
  chosen: the good confession
  alternatives:
  - the noble confession
  - the good profession
  lexicon: BDAG
  rationale: ὁμολογία is 'confession/profession/acknowledgment.' 'Confession' is the most established and contextually fitting term here, and καλὴν is retained as 'good' rather than paraphrased away, preserving the verbal link with Timothy's confession in the surrounding context.
