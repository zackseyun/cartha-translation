theological_decisions:
- issue: Referent of the one who 'will display' the appearing
  chosen_reading: The subject is rendered without specifying beyond the Greek titles,
    allowing the verse's own wording to identify him as God in context.
  alternative_readings:
  - Some readers may construe the subject more specifically from the immediate context
    as the Father displaying the appearing of Jesus Christ.
  rationale: The Greek text here names the subject by exalted titles rather than by
    a proper name. The translation preserves that presentation and does not import
    a more explicit doctrinal identification into the wording, while remaining fully
    compatible with orthodox Trinitarian reading.
  doctrine_reference: Preserve theological tension rather than resolve it.
