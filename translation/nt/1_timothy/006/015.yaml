id: 1TI.6.15
reference: 1 Timothy 6:15
source:
  edition: SBLGNT
  text: ἣν καιροῖς ἰδίοις δείξει ὁ μακάριος καὶ μόνος δυνάστης, ὁ βασιλεὺς τῶν βασιλευόντων
    καὶ κύριος τῶν κυριευόντων,
translation:
  text: which he will display at his own times—the blessed and only Sovereign, the
    King of those who reign and Lord of those who rule,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “in his own times”; the phrase denotes the appointed times set by him.
    reason: lexical_alternative
  - marker: b
    text: 'Traditional rendering: “the King of kings and Lord of lords.” The Greek
      uses participles, literally “the King of those who reign and Lord of those who
      rule.”'
    reason: alternative_reading
lexical_decisions:
- source_word: ἣν
  chosen: which
  alternatives:
  - whom
  lexicon: BDAG
  rationale: Feminine singular relative pronoun referring back to the immediately
    preceding noun ἐπιφάνειαν ('appearing') in v.14, so the neuter-like English relative
    'which' best fits the antecedent 'appearing.' 'Whom' would wrongly suggest a personal
    antecedent here.
- source_word: καιροῖς ἰδίοις
  chosen: at his own times
  alternatives:
  - in his own times
  - at the proper time
  - in its own times
  lexicon: BDAG
  rationale: The dative phrase with καιρός denotes appointed times/seasons. ἰδίοις
    means 'one's own.' Because the subject who reveals/displays is personal, 'his
    own times' is the most natural English rendering. Plural is retained from the
    Greek rather than smoothing to singular.
- source_word: δείξει
  chosen: will display
  alternatives:
  - will show
  - will reveal
  - will make known
  lexicon: BDAG
  rationale: Future active of δείκνυμι. In context of the appearing of Jesus, 'display'
    captures the sense of causing something to be openly seen or manifested. 'Reveal'
    is possible, but 'display' preserves the concrete force of the verb.
- source_word: ὁ μακάριος
  chosen: the blessed
  alternatives:
  - the happy
  - the blessed one
  lexicon: BDAG
  rationale: As a substantive adjective, μακάριος here functions as a divine title.
    'Blessed' is the established and semantically fitting rendering; 'happy' is too
    weak and colloquial for this context.
- source_word: μόνος δυνάστης
  chosen: only Sovereign
  alternatives:
  - only ruler
  - only potentate
  lexicon: BDAG
  rationale: δυνάστης denotes one who holds ruling power or dominion. 'Sovereign'
    communicates supreme rulership in clear modern English. 'Potentate' is traditional
    but archaic; 'ruler' is possible but less weighty.
- source_word: βασιλεὺς τῶν βασιλευόντων
  chosen: the King of those who reign
  alternatives:
  - King of kings
  - the King over those who reign
  lexicon: BDAG
  rationale: The participle βασιλευόντων is verbal ('those who reign'), not the noun
    'kings,' so this rendering follows the Greek more transparently. The traditional
    idiom 'King of kings' is concise and idiomatic, but slightly less explicit than
    the participial construction.
- source_word: κύριος
  chosen: Lord
  alternatives:
  - master
  lexicon: BDAG
  rationale: Per doctrine defaults, κύριος is rendered 'Lord.' Here it is a title
    of supreme authority, not merely household mastery.
- source_word: τῶν κυριευόντων
  chosen: of those who rule
  alternatives:
  - of lords
  - of those who exercise lordship
  lexicon: BDAG
  rationale: κυριευόντων is a participle from κυριεύω, 'to rule, exercise dominion.'
    'Those who rule' is natural English and preserves the verbal force. 'Of lords'
    would assimilate the phrase to the traditional idiom but obscure the participial
    nuance.
