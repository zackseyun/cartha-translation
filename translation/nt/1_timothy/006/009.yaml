theological_decisions:
- issue: Whether ὄλεθρον καὶ ἀπώλειαν should be rendered in a way that implies eternal
    damnation specifically
  chosen_reading: Rendered as 'ruin and destruction' without specifying eternal condemnation
  alternative_readings:
  - Rendered as 'ruin and perdition' to suggest final condemnation
  rationale: The verse strongly warns of devastating consequences, but the Greek terms
    themselves do not require the translator to define the scope as specifically eternal
    judgment in this verse. Preserving the broader wording maintains the text's gravity
    without importing a narrower doctrinal conclusion than the wording itself states.
  doctrine_reference: Preserve theological tension rather than resolve it.
