id: 1TI.6.9
reference: 1 Timothy 6:9
source:
  edition: SBLGNT
  text: οἱ δὲ βουλόμενοι πλουτεῖν ἐμπίπτουσιν εἰς πειρασμὸν καὶ παγίδα καὶ ἐπιθυμίας
    πολλὰς ἀνοήτους καὶ βλαβεράς, αἵτινες βυθίζουσι τοὺς ἀνθρώπους εἰς ὄλεθρον καὶ
    ἀπώλειαν·
translation:
  text: But those who want to be rich fall into temptation and a snare and many foolish
    and harmful desires, which plunge people into ruin and destruction.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to get rich.' The Greek can denote the desire to become wealthy, not
      merely the state of possessing wealth.
    reason: lexical_alternative
  - marker: b
    text: Or 'a trap.'
    reason: lexical_alternative
  - marker: c
    text: '''People'' translates Greek ''men/human beings'' in a generic sense.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ δὲ βουλόμενοι
  chosen: But those who want
  alternatives:
  - But those desiring
  - But those intending
  lexicon: BDAG
  rationale: βούλομαι here denotes a settled desire or intention. 'Those who want'
    is natural modern English and preserves the participial force when combined with
    the infinitive.
- source_word: πλουτεῖν
  chosen: to be rich
  alternatives:
  - to get rich
  - to become wealthy
  lexicon: BDAG
  rationale: The infinitive means 'to be/become rich.' 'To be rich' is idiomatic and
    broad enough to include the aspiration toward wealth without overstating process.
    'Get rich' is possible but slightly more colloquial and can sound more programmatic
    than the Greek requires.
- source_word: ἐμπίπτουσιν
  chosen: fall into
  alternatives:
  - plunge into
  - come into
  lexicon: BDAG
  rationale: A common metaphor for entering into a negative condition. 'Fall into'
    is the standard and clear English equivalent.
- source_word: πειρασμόν
  chosen: temptation
  alternatives:
  - trial
  - testing
  lexicon: BDAG
  rationale: In this vice-warning context, the sense is inducement toward sin rather
    than a neutral test, so 'temptation' best fits.
- source_word: παγίδα
  chosen: a snare
  alternatives:
  - a trap
  lexicon: BDAG
  rationale: '''Snare'' preserves the metaphorical and moral nuance common in biblical
    usage, while remaining understandable. ''Trap'' is viable but slightly flatter.'
- source_word: ἐπιθυμίας πολλὰς ἀνοήτους καὶ βλαβεράς
  chosen: many foolish and harmful desires
  alternatives:
  - many senseless and harmful desires
  - many foolish and injurious cravings
  lexicon: BDAG
  rationale: ἐπιθυμίαι are desires/cravings; 'desires' is readable and sufficiently
    broad. ἀνόητος is 'foolish/senseless'; 'foolish' is more idiomatic. βλαβερός means
    harmful/injurious; 'harmful' is clear modern English.
- source_word: αἵτινες
  chosen: which
  alternatives:
  - these
  - and these
  lexicon: BDAG
  rationale: The relative pronoun refers back to the desires and introduces their
    characteristic effect. 'Which' is the most natural English connector.
- source_word: βυθίζουσι
  chosen: plunge
  alternatives:
  - sink
  - drag down
  lexicon: BDAG
  rationale: βυθίζω conveys causing to sink or submerge. 'Plunge' preserves the vividness
    and transitive force better than the weaker 'sink'.
- source_word: τοὺς ἀνθρώπους
  chosen: people
  alternatives:
  - men
  - human beings
  lexicon: BDAG
  rationale: ἄνθρωποι here is generic for human beings, not specifically males. 'People'
    accurately conveys the referent in natural English while honoring the source intent.
- source_word: ὄλεθρον
  chosen: ruin
  alternatives:
  - destruction
  - disaster
  lexicon: BDAG
  rationale: ὄλεθρος often denotes ruin or devastation. Rendering it as 'ruin' helps
    preserve a distinction from the following ἀπώλεια rather than collapsing both
    into the same English word.
- source_word: ἀπώλειαν
  chosen: destruction
  alternatives:
  - perdition
  - ruin
  lexicon: BDAG
  rationale: ἀπώλεια commonly means destruction. Using 'destruction' after 'ruin'
    preserves the paired intensification without making an unwarranted technical theological
    claim.
