id: 1TI.6.11
reference: 1 Timothy 6:11
source:
  edition: SBLGNT
  text: Σὺ δέ, ὦ ἄνθρωπε ⸀θεοῦ, ταῦτα φεῦγε· δίωκε δὲ δικαιοσύνην, εὐσέβειαν, πίστιν,
    ἀγάπην, ὑπομονήν, ⸀πραϋπαθίαν.
translation:
  text: But you, man of God, flee these things; and pursue righteousness, godliness,
    faith, love, steadfastness, gentleness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'justice.'
    reason: lexical_alternative
  - marker: b
    text: Or 'faithfulness' or 'trust.'
    reason: lexical_alternative
  - marker: c
    text: The rare Greek term may also be rendered 'meekness,' 'forbearance,' or 'patient
      meekness.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Σὺ δέ
  chosen: But you
  alternatives:
  - But as for you
  - You, however
  lexicon: BDAG
  rationale: Marks a strong contrast with the preceding description and warning. 'But
    you' is concise and preserves the emphatic second-person pronoun plus δέ.
- source_word: ὦ ἄνθρωπε θεοῦ
  chosen: man of God
  alternatives:
  - O man of God
  - person of God
  lexicon: BDAG
  rationale: A recognized biblical form of address/title. 'Man of God' preserves the
    masculine singular vocative and the source's idiom. 'O' is omitted in English
    as unnecessary for natural style, and 'person of God' would flatten the gendered
    form contrary to the gender-accurate guideline.
- source_word: ταῦτα
  chosen: these things
  alternatives:
  - these
  - such things
  lexicon: BDAG
  rationale: Refers back to the vices and money-loving errors just mentioned. 'These
    things' is explicit and natural in English.
- source_word: φεῦγε
  chosen: flee
  alternatives:
  - run from
  - avoid
  lexicon: BDAG
  rationale: The present imperative calls for ongoing avoidance. 'Flee' preserves
    the force and moral urgency better than the weaker 'avoid'.
- source_word: δίωκε
  chosen: pursue
  alternatives:
  - seek after
  - strive for
  lexicon: BDAG
  rationale: 'Balances the paired imperative with ''flee'': Timothy is not only to
    avoid evil but actively chase virtue. ''Pursue'' is the standard and suitably
    forceful rendering.'
- source_word: δικαιοσύνην
  chosen: righteousness
  alternatives:
  - justice
  lexicon: BDAG
  rationale: Per doctrine defaults, δικαιοσύνη is rendered 'righteousness' in the
    main text, while 'justice' is preserved as an alternative in a footnote for Pauline
    usage. Here the virtue list favors the moral-relational sense, but the broader
    semantic range should remain visible.
- source_word: εὐσέβειαν
  chosen: godliness
  alternatives:
  - devoutness
  - piety
  lexicon: BDAG
  rationale: In the Pastorals εὐσέβεια commonly denotes reverent, God-oriented living.
    'Godliness' is idiomatic and established without being overly archaic.
- source_word: πίστιν
  chosen: faith
  alternatives:
  - faithfulness
  - trust
  lexicon: BDAG
  rationale: Per doctrine defaults, πίστις is rendered 'faith' in the main text. In
    a virtue list, 'faithfulness' is also plausible, so that alternative is preserved
    in a footnote rather than resolved absolutely.
- source_word: ἀγάπην
  chosen: love
  lexicon: BDAG
  rationale: Standard rendering per doctrine defaults; clear and natural in a virtue
    list.
- source_word: ὑπομονήν
  chosen: steadfastness
  alternatives:
  - endurance
  - perseverance
  - patience
  lexicon: BDAG
  rationale: Conveys durable constancy under pressure. 'Steadfastness' fits the virtue-list
    context slightly better than 'patience,' which can sound narrower or more passive.
- source_word: πραϋπαθίαν
  chosen: gentleness
  alternatives:
  - meekness
  - forbearance
  - patient meekness
  lexicon: BDAG
  rationale: This rare term combines the ideas of mildness and patient restraint.
    'Gentleness' is the most readable modern English option, though it does not capture
    the full nuance; alternatives are preserved in a footnote.
