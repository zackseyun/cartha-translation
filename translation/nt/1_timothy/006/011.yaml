theological_decisions:
- issue: Gendered address in ὦ ἄνθρωπε θεοῦ
  chosen_reading: man of God
  alternative_readings:
  - person of God
  rationale: The Greek is grammatically masculine singular and functions as a direct
    address to Timothy. Following the gender-accurate guideline, the masculine form
    is preserved rather than neutralized.
  doctrine_reference: DOCTRINE.md § Translation philosophy 4
- issue: Contested Pauline term δικαιοσύνη
  chosen_reading: righteousness
  alternative_readings:
  - justice
  rationale: The doctrine table sets 'righteousness' as the default rendering, while
    preserving 'justice' in a footnote for Pauline passages. This maintains consistency
    without erasing the semantic range.
  doctrine_reference: 'DOCTRINE.md § Contested terms: δικαιοσύνη'
- issue: Contested term πίστις in a virtue list
  chosen_reading: faith
  alternative_readings:
  - faithfulness
  - trust
  rationale: The doctrine table sets 'faith' as the default rendering. Because this
    is a virtue list and πίστις can denote reliability/faithfulness as well as faith,
    the alternative is preserved in a footnote rather than excluded.
  doctrine_reference: 'DOCTRINE.md § Contested terms: πίστις'
