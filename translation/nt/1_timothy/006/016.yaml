theological_decisions:
- issue: Reference of the relative clauses and doxology
  chosen_reading: The verse continues describing God, ultimately the blessed and only
    Sovereign named in the preceding context, and the doxology is addressed to him.
  alternative_readings:
  - Some readers connect the description more directly to the Lord Jesus Messiah because
    of the nearer antecedent in the broader sentence.
  rationale: The immediate syntax of v.15–16 most naturally carries over the description
    of the one whose appearing will be displayed by "the blessed and only Sovereign,"
    culminating in a doxology to God. The wording about invisibility ("whom no one
    among men has seen nor is able to see") especially supports this reading. This
    preserves orthodox Christology without forcing the verse to identify the Son and
    the Father indistinguishably.
  doctrine_reference: 'Affirmations: Nicene Creed; Translation philosophy §3 Preserve
    theological tension rather than resolve it'
- issue: Rendering ἀνθρώπων
  chosen_reading: '"men" in the main text with an inclusive alternative footnoted'
  alternative_readings:
  - humanity
  - human beings
  - mankind
  rationale: The Greek is grammatically masculine plural with representative force.
    Per the project's gender-accurate policy, the main text reflects the source form
    while a footnote preserves the inclusive sense for modern readers.
  doctrine_reference: Translation philosophy §4 Gender-accurate over gender-neutral
