id: 1TI.6.16
reference: 1 Timothy 6:16
source:
  edition: SBLGNT
  text: ὁ μόνος ἔχων ἀθανασίαν, φῶς οἰκῶν ἀπρόσιτον, ὃν εἶδεν οὐδεὶς ἀνθρώπων οὐδὲ
    ἰδεῖν δύναται· ᾧ τιμὴ καὶ κράτος αἰώνιον· ἀμήν.
translation:
  text: who alone has immortality, dwelling in unapproachable light, whom no one among
    men has seen nor is able to see. To him be honor and eternal dominion. Amen.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "no human being has seen or is able to see."
    reason: lexical_alternative
  - marker: b
    text: Some understand this description and doxology as referring more directly
      to the Lord Jesus Messiah in the broader context, though the language of invisibility
      most naturally points to God.
    reason: alternative_reading
lexical_decisions:
- source_word: μόνος
  chosen: alone
  alternatives:
  - only
  lexicon: BDAG
  rationale: 'Rendered as "alone" to emphasize exclusivity in natural English: God
    uniquely possesses what follows.'
- source_word: ἔχων ἀθανασίαν
  chosen: has immortality
  alternatives:
  - possesses immortality
  lexicon: BDAG
  rationale: A straightforward participial construction; "has immortality" is clear
    and idiomatic while preserving the claim that immortality belongs to him uniquely
    and inherently.
- source_word: φῶς οἰκῶν ἀπρόσιτον
  chosen: dwelling in unapproachable light
  alternatives:
  - living in inaccessible light
  - inhabiting unapproachable light
  lexicon: BDAG
  rationale: Takes φῶς with ἀπρόσιτον as the object phrase, "unapproachable light,"
    and οἰκῶν as "dwelling in." "Unapproachable" preserves the sense of ἀπρόσιτος
    more precisely than merely "inaccessible."
- source_word: οὐδεὶς ἀνθρώπων
  chosen: no one among men
  alternatives:
  - no human being
  - none of mankind
  lexicon: BDAG
  rationale: 'The genitive construction is partitive: "no one among men." Following
    the project''s gender-accurate principle, "men" is retained because ἀνθρώπων here
    refers representatively to humanity; a more inclusive alternative is preserved
    in a footnote.'
- source_word: οὐδὲ ἰδεῖν δύναται
  chosen: nor is able to see
  alternatives:
  - nor can see
  lexicon: BDAG
  rationale: Keeps the explicit δύναται element rather than compressing it too much;
    "is able to see" preserves the sense of incapacity.
- source_word: τιμὴ
  chosen: honor
  alternatives:
  - honor be
  lexicon: BDAG
  rationale: Standard doxological rendering; in English the verbless Greek is naturally
    completed with "be" in the clause.
- source_word: κράτος αἰώνιον
  chosen: eternal dominion
  alternatives:
  - eternal might
  - everlasting power
  lexicon: BDAG
  rationale: κράτος in doxological contexts often denotes manifested ruling power
    or dominion, not mere abstract strength. "Eternal dominion" best fits the praise
    formula and reads naturally with "honor."
- source_word: ἀμήν
  chosen: Amen
  lexicon: BDAG
  rationale: Retained by standard transliteration in English doxological usage.
