id: 1TI.6.7
reference: 1 Timothy 6:7
source:
  edition: SBLGNT
  text: οὐδὲν γὰρ εἰσηνέγκαμεν εἰς τὸν κόσμον, ⸀ὅτι οὐδὲ ἐξενεγκεῖν τι δυνάμεθα·
translation:
  text: For we brought nothing into the world, and we are not able to carry anything
    out.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'For we brought nothing into the world, because/neither
      can we carry anything out.' The Greek conjunction can be taken causally ('because')
      or as introducing the matching second statement.
    reason: alternative_reading
lexical_decisions:
- source_word: οὐδὲν
  chosen: nothing
  alternatives:
  - not anything
  lexicon: BDAG
  rationale: Indefinite negative accusative functioning as the object of 'brought';
    'nothing' is natural English and preserves the absolute negation.
- source_word: γὰρ
  chosen: For
  alternatives:
  - because
  lexicon: BDAG
  rationale: Marks explanation/grounding for the preceding statement; 'For' preserves
    the connective force in a readable way.
- source_word: εἰσηνέγκαμεν
  chosen: brought
  alternatives:
  - carried in
  lexicon: BDAG
  rationale: Aorist of εἰσφέρω, 'bring into'; 'brought' is idiomatic with 'into the
    world' and matches the birth-entry metaphor.
- source_word: εἰς τὸν κόσμον
  chosen: into the world
  alternatives:
  - into the cosmos
  lexicon: BDAG
  rationale: κόσμος here refers to the human world/order into which one is born, not
    the universe in a technical sense; 'world' is the standard natural rendering.
- source_word: ὅτι
  chosen: and
  alternatives:
  - because
  - that
  lexicon: BDAG
  rationale: Although often meaning 'because/that,' here it introduces the closely
    linked second clause in a proverbial statement. Rendering it as 'and' gives clear
    English sense while preserving the logical continuation. The causal nuance is
    reflected by the overall sentence structure.
- source_word: οὐδὲ
  chosen: not ... anything
  alternatives:
  - nor
  - not even
  lexicon: BDAG
  rationale: Combines negation with the following infinitive clause; in English the
    sense is best expressed as 'are not able to carry anything out.'
- source_word: ἐξενεγκεῖν
  chosen: to carry ... out
  alternatives:
  - to take ... out
  - to bring ... out
  lexicon: BDAG
  rationale: Aorist infinitive of ἐκφέρω, 'carry out' or 'bring out.' 'Carry anything
    out' is idiomatic in English and preserves the image of departing the world at
    death.
- source_word: τι
  chosen: anything
  alternatives:
  - something
  lexicon: BDAG
  rationale: Indefinite pronoun under negation; 'anything' is the natural English
    equivalent in this construction.
- source_word: δυνάμεθα
  chosen: we are not able
  alternatives:
  - we cannot
  lexicon: BDAG
  rationale: Present middle/passive deponent of δύναμαι. 'We are not able' is slightly
    more formal and transparent to the Greek, though equivalent in sense to 'we cannot.'
