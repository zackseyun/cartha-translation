theological_decisions:
- issue: Sense of the second clause introduced by ὅτι
  chosen_reading: A coordinate continuation expressing the corresponding truth that
    nothing can be taken out of the world at death.
  alternative_readings:
  - 'A causal clause: ''because neither can we carry anything out'''
  rationale: 'The textual form with ὅτι can be read causally, but in context the verse
    functions proverbially with two balanced assertions: nothing brought in, nothing
    carried out. The chosen English preserves that balance in natural style without
    adding doctrinal interpretation.'
  doctrine_reference: Translation philosophy §3 (preserve tension rather than resolve
    it)
