id: 1TI.6.12
reference: 1 Timothy 6:12
source:
  edition: SBLGNT
  text: ἀγωνίζου τὸν καλὸν ἀγῶνα τῆς πίστεως, ἐπιλαβοῦ τῆς αἰωνίου ζωῆς, εἰς ἣν ἐκλήθης
    καὶ ὡμολόγησας τὴν καλὴν ὁμολογίαν ἐνώπιον πολλῶν μαρτύρων.
translation:
  text: Fight the good fight of the faith; take hold of the eternal life to which
    you were called and about which you made the good confession before many witnesses.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Fight the good fight of faith.' The Greek phrase can be understood either
      as the struggle characterized by faith or as the struggle for the Christian
      faith.
    reason: alternative_reading
  - marker: b
    text: Or simply 'and you made the good confession before many witnesses.' The
      Greek does not explicitly state the content of the confession, though it is
      closely linked to the calling to eternal life.
    reason: alternative_reading
lexical_decisions:
- source_word: ἀγωνίζου
  chosen: Fight
  alternatives:
  - Strive
  - Contend
  lexicon: BDAG
  rationale: Present middle imperative of ἀγωνίζομαι conveys active, ongoing struggle.
    'Fight' best captures the athletic/martial metaphor in natural English and pairs
    idiomatically with ἀγῶνα.
- source_word: τὸν καλὸν ἀγῶνα
  chosen: the good fight
  alternatives:
  - the noble contest
  - the good struggle
  lexicon: BDAG
  rationale: This is a cognate construction with ἀγωνίζου/ἀγῶνα. 'The good fight'
    preserves the rhetorical force and established metaphor without undue paraphrase.
    καλός here is qualitative ('good,' 'noble,' 'worthy'), and 'good' is retained
    in the main text.
- source_word: τῆς πίστεως
  chosen: of the faith
  alternatives:
  - of faith
  lexicon: BDAG
  rationale: πίστις defaults to 'faith' per doctrine. The article plus context in
    the Pastorals supports a more definite sense, likely the Christian faith rather
    than merely subjective believing. 'Of the faith' preserves that likely nuance
    while remaining close to the Greek.
- source_word: ἐπιλαβοῦ
  chosen: take hold of
  alternatives:
  - grasp
  - seize
  lexicon: BDAG
  rationale: Aorist middle imperative calling for decisive appropriation. 'Take hold
    of' is the most idiomatic and contextually fitting rendering in English, preserving
    the metaphor of laying hold of something offered or pursued.
- source_word: τῆς αἰωνίου ζωῆς
  chosen: the eternal life
  alternatives:
  - eternal life
  lexicon: BDAG
  rationale: The article is retained in English because the phrase refers to the specific
    eschatological life promised in the gospel, not merely a quality of life in general.
- source_word: εἰς ἣν ἐκλήθης
  chosen: to which you were called
  alternatives:
  - for which you were called
  lexicon: BDAG
  rationale: εἰς with the relative pronoun marks goal or destination. 'To which you
    were called' is a close and natural rendering, preserving divine calling without
    overinterpreting its theological mechanics.
- source_word: ὡμολόγησας
  chosen: you made
  alternatives:
  - you confessed
  - you acknowledged
  lexicon: BDAG
  rationale: Combined with ὁμολογίαν, the idiomatic English expression is 'make a
    confession.' This avoids awkward repetition while preserving the verbal idea of
    public acknowledgment.
- source_word: τὴν καλὴν ὁμολογίαν
  chosen: the good confession
  alternatives:
  - the noble confession
  - the good profession
  lexicon: BDAG
  rationale: ὁμολογία denotes confession/profession. 'Confession' is clearer in modern
    English than 'profession.' καλός is retained as 'good' for consistency with the
    preceding phrase and to preserve the evaluative parallelism.
- source_word: ἐνώπιον πολλῶν μαρτύρων
  chosen: before many witnesses
  alternatives:
  - in the presence of many witnesses
  lexicon: BDAG
  rationale: ἐνώπιον means 'before/in the presence of.' 'Before many witnesses' is
    concise and natural. μάρτυρες here clearly means witnesses, not later ecclesial
    'martyrs'.
- source_word: καί
  chosen: and about which
  alternatives:
  - and
  lexicon: BDAG
  rationale: The conjunction links the calling and the confession. Rendering the second
    clause as 'and about which you made...' makes explicit in English that the confession
    concerns the eternal life/calling, a relation naturally implied by the Greek sequence
    without adding foreign content.
