theological_decisions:
- issue: Sense of πίστεως in τὸν καλὸν ἀγῶνα τῆς πίστεως
  chosen_reading: 'objective/definite sense: ''the faith'''
  alternative_readings:
  - 'subjective sense: ''faith'''
  rationale: The Pastorals often use πίστις with a more definite sense referring to
    the Christian faith or confession. The article in Greek and the nearby language
    of confession support this reading. Because πίστις is a contested term in doctrine,
    the alternative is preserved in a footnote.
  doctrine_reference: 'DOCTRINE.md: Contested terms — πίστις default ''faith''; preserve
    alternatives in footnotes where contested'
- issue: Relation of the confession to eternal life/calling
  chosen_reading: rendered as 'about which you made the good confession'
  alternative_readings:
  - 'coordinate reading: ''and you made the good confession before many witnesses''
    without explicit relation'
  rationale: The Greek can be read with the relative clause referring to 'eternal
    life,' and the confession then associated with that calling. English benefits
    from making the connection explicit, while still staying within the semantic range
    of the syntax. This does not specify the exact content of the confession beyond
    what the text implies.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it'
