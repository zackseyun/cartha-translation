id: 1TI.6.1
reference: 1 Timothy 6:1
source:
  edition: SBLGNT
  text: Ὅσοι εἰσὶν ὑπὸ ζυγὸν δοῦλοι, τοὺς ἰδίους δεσπότας πάσης τιμῆς ἀξίους ἡγείσθωσαν,
    ἵνα μὴ τὸ ὄνομα τοῦ θεοῦ καὶ ἡ διδασκαλία βλασφημῆται.
translation:
  text: All who are slaves under a yoke should regard their own masters as worthy
    of all honor, so that the name of God and the teaching may not be slandered.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'servants' or 'bondservants'; Greek δοῦλοι. Here 'slaves' is used because
      the phrase 'under a yoke' makes the condition of bondage explicit.
    reason: alternative_reading
  - marker: b
    text: Or 'the doctrine.'
    reason: lexical_alternative
  - marker: c
    text: Or 'may not be blasphemed.'
    reason: lexical_alternative
lexical_decisions:
- source_word: δοῦλοι
  chosen: slaves
  alternatives:
  - servants
  - bondservants
  lexicon: BDAG
  rationale: Per translation philosophy and contested-terms guidance, δοῦλος is rendered
    'slave' where the bonded nature is salient. The phrase 'under a yoke' makes the
    condition of bondage explicit, so 'slaves' best reflects the Greek.
- source_word: ὑπὸ ζυγὸν
  chosen: under a yoke
  alternatives:
  - under the yoke
  lexicon: BDAG
  rationale: A fairly literal rendering preserves the metaphor of subjection/bondage
    already present in the Greek and reinforces why δοῦλοι is rendered 'slaves.' The
    anarthrous Greek does not require 'the' in English.
- source_word: δεσπότας
  chosen: masters
  alternatives:
  - lords
  - owners
  lexicon: BDAG
  rationale: δεσπότης here refers to those exercising household authority over slaves.
    'Masters' is the most natural contextual rendering in English; 'lords' would sound
    overly elevated and potentially confuse with κύριος, while 'owners' is too narrow
    and less relationally contextual.
- source_word: ἰδίους
  chosen: their own
  alternatives:
  - their respective
  lexicon: BDAG
  rationale: The possessive nuance is explicit in Greek and is naturally conveyed
    by 'their own,' indicating the slaves' particular masters rather than masters
    in general.
- source_word: πάσης τιμῆς ἀξίους
  chosen: worthy of all honor
  alternatives:
  - worthy of full honor
  - deserving of every honor
  lexicon: BDAG
  rationale: This preserves the genitive construction's sense idiomatically in English.
    'All honor' communicates comprehensive respect without overstating beyond the
    text.
- source_word: ἡγείσθωσαν
  chosen: should regard
  alternatives:
  - must consider
  - are to count
  lexicon: BDAG
  rationale: The present middle imperative calls for an ongoing evaluative stance.
    'Should regard' is clear modern English and appropriately imperative without sounding
    wooden.
- source_word: τὸ ὄνομα τοῦ θεοῦ
  chosen: the name of God
  lexicon: BDAG
  rationale: A standard literal rendering preserves the biblical concept of God's
    reputation and revealed identity.
- source_word: ἡ διδασκαλία
  chosen: the teaching
  alternatives:
  - the doctrine
  lexicon: BDAG
  rationale: '''Teaching'' is more accessible modern English and fits the translation
    philosophy''s avoidance of unnecessary ecclesiastical jargon, while still accurately
    rendering διδασκαλία.'
- source_word: βλασφημῆται
  chosen: may not be slandered
  alternatives:
  - may not be blasphemed
  - may not be spoken against abusively
  lexicon: BDAG
  rationale: In this context the object is both God's name and 'the teaching.' 'Slandered'
    communicates abusive reviling in idiomatic English across both objects. 'Blasphemed'
    is possible, especially with reference to God, but sounds less natural when coordinated
    with 'the teaching.'
- source_word: Ὅσοι εἰσὶν
  chosen: All who are
  alternatives:
  - As many as are
  - Those who are
  lexicon: BDAG
  rationale: This idiomatic rendering captures the inclusive force of ὅσοι with εἰσίν
    in natural English.
