theological_decisions:
- issue: Rendering of δοῦλος in a socially and morally sensitive context
  chosen_reading: slaves
  alternative_readings:
  - servants
  - bondservants
  rationale: The translation follows the project's stated preference to render δοῦλος
    as 'slave' where bonded status is salient. This does not endorse slavery but reflects
    the social reality presupposed by the text. The immediate phrase 'under a yoke'
    strongly supports this rendering.
  doctrine_reference: DOCTRINE.md Translation philosophy §1; Contested terms table
    for δοῦλος
- issue: Rendering of διδασκαλία
  chosen_reading: the teaching
  alternative_readings:
  - the doctrine
  rationale: The verse concerns the public reputation of the Christian message. 'Teaching'
    preserves the meaning without importing later technical doctrinal connotations
    more strongly than the Greek requires.
  doctrine_reference: DOCTRINE.md Translation philosophy §6
