id: 1TI.6.20
reference: 1 Timothy 6:20
source:
  edition: SBLGNT
  text: Ὦ Τιμόθεε, τὴν παραθήκην φύλαξον, ἐκτρεπόμενος τὰς βεβήλους κενοφωνίας καὶ
    ἀντιθέσεις τῆς ψευδωνύμου γνώσεως,
translation:
  text: O Timothy, guard the deposit entrusted to you, turning away from the profane
    empty talk and contradictions of what is falsely called knowledge.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'oppositions.'
    reason: lexical_alternative
  - marker: b
    text: Or 'of so-called knowledge.'
    reason: lexical_alternative
lexical_decisions:
- source_word: παραθήκην
  chosen: the deposit entrusted to you
  alternatives:
  - the deposit
  - what has been entrusted to you
  - the trust
  lexicon: BDAG
  rationale: παραθήκη denotes something entrusted for safekeeping. 'Deposit' preserves
    the metaphor, while 'entrusted to you' makes explicit in natural English what
    is implicit in the noun's sense and fits the pastoral context.
- source_word: φύλαξον
  chosen: guard
  alternatives:
  - keep
  - protect
  lexicon: BDAG
  rationale: '''Guard'' best conveys vigilant preservation of something entrusted,
    stronger than the more generic ''keep''.'
- source_word: ἐκτρεπόμενος
  chosen: turning away from
  alternatives:
  - avoiding
  - shunning
  lexicon: BDAG
  rationale: The participle carries the sense of turning aside from or avoiding. 'Turning
    away from' preserves the verbal imagery while reading naturally alongside the
    imperative.
- source_word: βεβήλους
  chosen: profane
  alternatives:
  - godless
  - irreverent
  lexicon: BDAG
  rationale: βεβήλους contrasts what is common or unhallowed with what is holy. 'Profane'
    is concise and preserves the religious/moral force better than the broader 'godless'.
- source_word: κενοφωνίας
  chosen: empty talk
  alternatives:
  - vain chatter
  - empty chatter
  lexicon: BDAG
  rationale: The compound suggests speech that is empty or hollow. 'Empty talk' is
    clear modern English and avoids archaic tone while preserving the pejorative sense.
- source_word: ἀντιθέσεις
  chosen: contradictions
  alternatives:
  - oppositions
  - counterarguments
  lexicon: BDAG
  rationale: The noun can denote oppositions or contrasting assertions. 'Contradictions'
    fits the polemical context and communicates the sense of claims set against apostolic
    truth. 'Oppositions' is viable and preserved in a footnote because of historical
    familiarity.
- source_word: τῆς ψευδωνύμου γνώσεως
  chosen: of what is falsely called knowledge
  alternatives:
  - of the falsely named knowledge
  - of so-called knowledge
  lexicon: BDAG
  rationale: ψευδώνυμος means falsely named or bearing a false name. Rendering the
    phrase as 'what is falsely called knowledge' makes clear that Paul is denying
    the legitimacy of the label 'knowledge' for the teaching in view. 'So-called knowledge'
    is idiomatic but slightly less explicit.
- source_word: Ὦ Τιμόθεε
  chosen: O Timothy
  alternatives:
  - Timothy
  lexicon: BDAG
  rationale: The vocative particle Ὦ adds solemn direct address. 'O Timothy' preserves
    the rhetorical force better than simply 'Timothy'.
