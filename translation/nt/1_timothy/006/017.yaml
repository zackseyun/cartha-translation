theological_decisions:
- issue: Meaning of αἰών in an ethical-eschatological context
  chosen_reading: age
  alternative_readings:
  - world
  rationale: Rendering αἰών as 'age' preserves the temporal and eschatological contrast
    common in Pauline usage, avoiding reduction to merely the material world.
  doctrine_reference: Translation philosophy §1, original-language primacy over translation
    tradition
- issue: Scope of divine provision in πάντα
  chosen_reading: everything
  alternative_readings:
  - all things needed
  - all things
  rationale: The text states broad divine provision without restricting it to necessities
    alone. The translation avoids importing prosperity claims while preserving the
    verse's expansive wording.
  doctrine_reference: Affirmations; Translation philosophy §3, preserve theological
    tension rather than resolve it
