id: 1TI.6.17
reference: 1 Timothy 6:17
source:
  edition: SBLGNT
  text: Τοῖς πλουσίοις ἐν τῷ νῦν αἰῶνι παράγγελλε μὴ ὑψηλοφρονεῖν μηδὲ ἠλπικέναι ἐπὶ
    πλούτου ἀδηλότητι, ἀλλ’ ⸀ἐπὶ ⸀θεῷ τῷ παρέχοντι ἡμῖν πάντα πλουσίως εἰς ἀπόλαυσιν,
translation:
  text: Command those who are rich in the present age not to be arrogant, nor to set
    their hope on the uncertainty of riches, but on God, who richly provides us with
    everything for enjoyment.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in this present world.' The Greek word can mean 'age' or, by extension,
      the present world-order; 'age' better preserves Paul's temporal contrast.
    reason: lexical_alternative
  - marker: b
    text: Or 'on uncertain riches.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Τοῖς πλουσίοις
  chosen: those who are rich
  alternatives:
  - the rich
  - rich people
  lexicon: BDAG
  rationale: Dative plural with the article functions substantivally. 'Those who are
    rich' is natural English and preserves the direct address without sounding overly
    label-like.
- source_word: ἐν τῷ νῦν αἰῶνι
  chosen: in the present age
  alternatives:
  - in this present age
  - in the now age/world
  lexicon: BDAG
  rationale: αἰών here refers to the present era/order rather than the physical world.
    'Present age' preserves Pauline eschatological nuance better than 'world'.
- source_word: παράγγελλε
  chosen: Command
  alternatives:
  - Instruct
  - Charge
  lexicon: BDAG
  rationale: The imperative carries authoritative force. 'Command' best reflects the
    strength of the verb in this pastoral context, though 'charge' is also possible.
- source_word: μὴ ὑψηλοφρονεῖν
  chosen: not to be arrogant
  alternatives:
  - not to be haughty
  - not to think proudly
  lexicon: BDAG
  rationale: The verb denotes high-mindedness or pride. 'Be arrogant' is idiomatic
    modern English and captures the moral sense clearly.
- source_word: μηδὲ ἠλπικέναι
  chosen: nor to set their hope
  alternatives:
  - nor to hope
  - nor to place their confidence
  lexicon: BDAG
  rationale: The perfect infinitive expresses a settled placement of hope. 'Set their
    hope' is a standard and accurate English equivalent.
- source_word: ἐπὶ πλούτου ἀδηλότητι
  chosen: on the uncertainty of riches
  alternatives:
  - on uncertain riches
  - on the instability of wealth
  lexicon: BDAG
  rationale: The dative ἀδηλότητι is best taken as characterizing wealth as uncertain.
    'The uncertainty of riches' is slightly more explicit and natural than the more
    literal 'uncertain riches.'
- source_word: ἀλλ’ ἐπὶ θεῷ
  chosen: but on God
  alternatives:
  - but in God
  lexicon: BDAG
  rationale: The repeated ἐπί with dative parallels the prior phrase and indicates
    the object on which hope is placed. English idiom prefers 'hope on' less than
    'set hope on'; retaining 'on God' preserves the contrast.
- source_word: τῷ παρέχοντι ἡμῖν
  chosen: who ... provides us
  alternatives:
  - who gives us
  - who supplies us
  lexicon: BDAG
  rationale: The participle is attributive, describing God. 'Provides' fits the sense
    of furnishing what is needed and suits the context of divine generosity.
- source_word: πάντα
  chosen: everything
  alternatives:
  - all things
  lexicon: BDAG
  rationale: '''Everything'' is idiomatic modern English for neuter plural πάντα and
    preserves the comprehensive scope.'
- source_word: πλουσίως
  chosen: richly
  alternatives:
  - abundantly
  - generously
  lexicon: BDAG
  rationale: The adverb echoes the wealth theme in the verse. 'Richly' preserves the
    lexical connection with πλουσίοις/πλούτου better than a looser synonym.
- source_word: εἰς ἀπόλαυσιν
  chosen: for enjoyment
  alternatives:
  - for our enjoyment
  - for enjoyment/use
  lexicon: BDAG
  rationale: 'The phrase expresses purpose/result: what God provides is meant to be
    enjoyed. ''For enjoyment'' is concise and faithful; adding ''our'' is interpretively
    harmless but unnecessary since ''us'' already appears earlier.'
