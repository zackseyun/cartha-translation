theological_decisions:
- issue: Sense of 'the faith' in the warning clause
  chosen_reading: objective reference to the Christian faith
  alternative_readings:
  - subjective personal faith
  rationale: In the Pastorals, 'the faith' regularly functions as a shorthand for
    the apostolic Christian faith, especially in contexts of false teaching. This
    reading best matches the immediate context of 'knowledge falsely so called' in
    the previous verse and the warning about doctrinal deviation.
  doctrine_reference: Translation philosophy §3; Contested terms table for πίστις
- issue: Audience of the closing benediction
  chosen_reading: plural 'you' retained
  alternative_readings:
  - singularized to Timothy for stylistic smoothing
  rationale: The Greek text has plural ὑμῶν. Retaining the plural preserves the textual
    detail and may indicate that, though addressed to Timothy, the letter's closing
    extends to the wider believing community associated with him.
  doctrine_reference: Translation philosophy §1 and §5
