id: 1TI.6.21
reference: 1 Timothy 6:21
source:
  edition: SBLGNT
  text: ἥν τινες ἐπαγγελλόμενοι περὶ τὴν πίστιν ἠστόχησαν. Ἡ χάρις ⸂μεθ’ ὑμῶν⸃.
translation:
  text: By professing it, some have missed the mark concerning the faith. Grace be
    with you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'which some professing have gone astray concerning the faith.' The Greek
      keeps the relative pronoun explicit and the verb can also be rendered 'have
      gone astray' or 'have erred.'
    reason: lexical_alternative
  - marker: b
    text: '''The faith'' here likely refers to the Christian faith as a body of belief,
      though it could also be understood more broadly as personal faith.'
    reason: alternative_reading
  - marker: c
    text: The Greek says 'with you' in the plural.
    reason: textual_variant
lexical_decisions:
- source_word: ἥν
  chosen: it
  alternatives:
  - which
  lexicon: BDAG
  rationale: Feminine singular relative pronoun referring back to the immediately
    preceding noun in context ('knowledge falsely so called'). English idiom prefers
    the resumptive pronoun 'it' after fronting the participial clause rather than
    a more wooden 'which'.
- source_word: ἐπαγγελλόμενοι
  chosen: professing
  alternatives:
  - claiming
  - promising
  lexicon: BDAG
  rationale: In this middle participial form and context, the sense is to profess
    or lay claim to something rather than to make a promise. 'Professing' fits the
    polemical context of claiming possession of the so-called knowledge.
- source_word: περὶ τὴν πίστιν
  chosen: concerning the faith
  alternatives:
  - with regard to the faith
  - concerning faith
  lexicon: BDAG
  rationale: The preposition περί with the accusative here marks reference or relation.
    'The faith' is retained rather than simply 'faith' because in the Pastoral Epistles
    it commonly denotes the Christian faith as a body of belief and commitment, not
    merely subjective trust.
- source_word: πίστιν
  chosen: faith
  alternatives:
  - faithfulness
  - trust
  lexicon: BDAG
  rationale: Per doctrine defaults, πίστις is rendered 'faith' in the main text. In
    this context the objective sense 'the faith' best fits Paul's warning about doctrinal
    deviation.
- source_word: ἠστόχησαν
  chosen: have missed the mark
  alternatives:
  - have gone astray
  - have erred
  - have swerved
  lexicon: BDAG
  rationale: The verb ἀστοχέω literally conveys missing a target. 'Have missed the
    mark' preserves the metaphor while remaining natural English. It also avoids flattening
    the image into a generic 'erred'.
- source_word: Ἡ χάρις
  chosen: Grace
  alternatives:
  - The grace
  lexicon: BDAG
  rationale: Epistolary closing formula in Paul is naturally rendered 'Grace' in English
    without the article, since the article is conventional in Greek salutations and
    benedictions.
- source_word: μεθ’ ὑμῶν
  chosen: be with you
  alternatives:
  - with you
  lexicon: BDAG
  rationale: English benediction style commonly supplies 'be' for a complete and natural
    sentence. The plural 'you' reflects the Greek ὑμῶν, likely broadening the closing
    beyond Timothy alone to the church context.
