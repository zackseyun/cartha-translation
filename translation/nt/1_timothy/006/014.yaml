theological_decisions:
- issue: Rendering Χριστοῦ in the title Ἰησοῦ Χριστοῦ
  chosen_reading: Messiah
  alternative_readings:
  - Christ
  rationale: The doctrine file directs that Χριστός be translated as 'Messiah' where
    title is in view, and 'Christ' where the expression functions more like a proper
    name. Here the phrase remains a full christological title in an eschatological
    context ('the appearing of our Lord Jesus Messiah'), so the titular force is preserved
    in the main text.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; Contested
    terms table for Χριστός'
