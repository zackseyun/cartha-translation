id: 1TI.6.14
reference: 1 Timothy 6:14
source:
  edition: SBLGNT
  text: τηρῆσαί σε τὴν ἐντολὴν ἄσπιλον ἀνεπίλημπτον μέχρι τῆς ἐπιφανείας τοῦ κυρίου
    ἡμῶν Ἰησοῦ Χριστοῦ,
translation:
  text: that you keep the commandment unstained and above reproach until the appearing
    of our Lord Jesus the Messiah,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Jesus Christ.' The Greek title Χριστός can function either as the translated
      title 'Messiah' or as the more name-like traditional form 'Christ.'
    reason: alternative_reading
  - marker: b
    text: The adjectives 'unstained' and 'above reproach' may describe either 'the
      commandment' itself or Timothy's keeping of it; the Greek wording is compact
      enough to leave that relation somewhat compressed in English.
    reason: lexical_alternative
lexical_decisions:
- source_word: τηρῆσαί
  chosen: keep
  alternatives:
  - observe
  - guard
  lexicon: BDAG
  rationale: The aorist infinitive depends on the previous verse's charge and here
    conveys faithful observance. 'Keep' is natural modern English and preserves the
    sense of maintaining obedience without over-specifying either mere observance
    or defensive guarding.
- source_word: σε
  chosen: you
  lexicon: BDAG
  rationale: Direct object of the infinitive construction in context, carried into
    idiomatic English as 'that you keep.'
- source_word: ἐντολήν
  chosen: the commandment
  alternatives:
  - the command
  - the charge
  lexicon: BDAG
  rationale: A definite singular noun. 'The commandment' preserves the formal weight
    of ἐντολή and likely refers to the apostolic charge just given. 'Command' is possible,
    but 'commandment' better reflects the moral seriousness and traditional resonance
    without becoming archaic.
- source_word: ἄσπιλον
  chosen: unstained
  alternatives:
  - spotless
  - without stain
  lexicon: BDAG
  rationale: Literally free from stain or blemish. 'Unstained' is concise and idiomatic.
    It likely qualifies either Timothy's keeping of the commandment or the commandment
    as kept; the English preserves the ambiguity by attaching it to the commandment
    phrase.
- source_word: ἀνεπίλημπτον
  chosen: above reproach
  alternatives:
  - blameless
  - irreproachable
  lexicon: BDAG
  rationale: Commonly denotes being beyond legitimate criticism. 'Above reproach'
    is clear modern English and fits pastoral-epistle usage better than the less idiomatic
    'irreproachable.'
- source_word: μέχρι
  chosen: until
  alternatives:
  - up to the time of
  lexicon: BDAG
  rationale: Temporal marker indicating duration up to a future event.
- source_word: ἐπιφανείας
  chosen: the appearing
  alternatives:
  - the manifestation
  - the appearing again
  lexicon: BDAG
  rationale: In the Pastorals this term commonly refers to Christ's future visible
    appearing. 'The appearing' is the standard transparent rendering. 'Appearing again'
    would import the 'second' aspect, which is theologically true but not explicit
    in the noun itself.
- source_word: κυρίου
  chosen: Lord
  lexicon: BDAG
  rationale: Follows the project's default rendering for κύριος as a christological
    title.
- source_word: Ἰησοῦ Χριστοῦ
  chosen: Jesus Messiah
  alternatives:
  - Jesus Christ
  lexicon: BDAG
  rationale: Per project guidance, Χριστός is translated as 'Messiah' where it functions
    as a title rather than a fixed name-like form. In this solemn eschatological phrase,
    the titular sense remains audible, so 'Jesus Messiah' preserves meaning more transparently
    than inherited tradition 'Jesus Christ'.
