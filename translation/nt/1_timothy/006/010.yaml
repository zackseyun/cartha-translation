id: 1TI.6.10
reference: 1 Timothy 6:10
source:
  edition: SBLGNT
  text: ῥίζα γὰρ πάντων τῶν κακῶν ἐστιν ἡ φιλαργυρία, ἧς τινες ὀρεγόμενοι ἀπεπλανήθησαν
    ἀπὸ τῆς πίστεως καὶ ἑαυτοὺς περιέπειραν ὀδύναις πολλαῖς.
translation:
  text: For the love of money is a root of all kinds of evils; by craving it, some
    have wandered away from the faith and pierced themselves with many pains.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, traditionally, 'For the love of money is the root of all evil.' The
      Greek more naturally allows 'a root of all kinds of evils,' which avoids implying
      that every evil has a single cause.
    reason: alternative_reading
  - marker: b
    text: Or 'have strayed from faith.' Here 'the faith' likely refers to the Christian
      faith as an objective body of belief.
    reason: lexical_alternative
  - marker: c
    text: Or 'pierced themselves with many griefs' or 'many sorrows.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ῥίζα
  chosen: a root
  alternatives:
  - the root
  lexicon: BDAG
  rationale: 'Anarthrous predicate nominative before the verb is best rendered indefinitely
    here: the sense is not that love of money is the single source of every evil,
    but that it is one root/source of all sorts of evils. This avoids overstating
    the claim while remaining faithful to the Greek syntax and context.'
- source_word: πάντων τῶν κακῶν
  chosen: of all kinds of evils
  alternatives:
  - of all evils
  - of all kinds of evil things
  lexicon: BDAG
  rationale: The genitive plural with κακῶν is naturally rendered broadly as 'evils'
    or 'bad things.' In English, 'all kinds of evils' communicates the distributive
    force commonly intended in such constructions and fits the context better than
    the absolute-sounding 'all evil.'
- source_word: φιλαργυρία
  chosen: the love of money
  alternatives:
  - greed
  - love of silver
  lexicon: BDAG
  rationale: The compound noun literally denotes love of money/silver. 'The love of
    money' is transparent and preserves the lexical imagery better than the more interpretive
    'greed,' which is broader than the Greek term.
- source_word: ἧς
  chosen: it
  alternatives:
  - which
  - of which
  lexicon: BDAG
  rationale: The relative pronoun is feminine singular, referring back to φιλαργυρία
    ('love of money'). In idiomatic English within the prepositional phrase, 'it'
    best conveys the antecedent without awkwardness.
- source_word: ὀρεγόμενοι
  chosen: by craving it
  alternatives:
  - desiring it
  - reaching for it
  - longing for it
  lexicon: BDAG
  rationale: The participle denotes strong desire or aspiration toward something.
    'By craving it' captures the intense, ongoing desire and its instrumental/circumstantial
    relation to the main verb.
- source_word: ἀπεπλανήθησαν ἀπὸ τῆς πίστεως
  chosen: have wandered away from the faith
  alternatives:
  - were led astray from the faith
  - have strayed from the faith
  lexicon: BDAG
  rationale: The passive verb from ἀποπλανάω conveys being led astray or wandering
    off. 'Have wandered away' is natural English and preserves the movement away from
    a prior position. τῆς πίστεως is rendered 'the faith' here, referring to the Christian
    faith rather than subjective believing in the abstract.
- source_word: πίστεως
  chosen: the faith
  alternatives:
  - faith
  lexicon: BDAG
  rationale: 'Although πίστις defaults to ''faith,'' the article and context in the
    Pastorals strongly support an objective sense: the Christian faith/body of belief.
    This is a contextual exception documented here.'
- source_word: περιέπειραν
  chosen: pierced themselves
  alternatives:
  - impaled themselves
  - run themselves through
  lexicon: BDAG
  rationale: The verb literally means to pierce through or transfix. 'Pierced themselves'
    is vivid, faithful, and readable modern English.
- source_word: ὀδύναις πολλαῖς
  chosen: with many pains
  alternatives:
  - with many griefs
  - with many sorrows
  lexicon: BDAG
  rationale: ὀδύνη denotes severe pain, distress, or anguish. 'Pains' preserves the
    breadth of suffering without narrowing it only to emotional grief, though the
    context certainly includes inner anguish.
