theological_decisions:
- issue: Scope of Paul's claim about money and evil
  chosen_reading: The verse states that love of money is one root of all kinds of
    evils, not the sole root of every evil without exception.
  alternative_readings:
  - The love of money is the root of all evil.
  rationale: The Greek lacks the article with ῥίζα and uses a plural expression πάντων
    τῶν κακῶν. Rendering the phrase as 'a root of all kinds of evils' best reflects
    the grammar and avoids making Paul assert an absolute claim beyond the wording.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Meaning of τῆς πίστεως
  chosen_reading: 'Objective: ''the faith'' as the Christian faith.'
  alternative_readings:
  - 'subjective: ''faith'' in the sense of personal trust'
  rationale: In the Pastoral Epistles, 'the faith' commonly refers to the apostolic
    faith or Christian confession. The article supports this reading in context.
  doctrine_reference: 'Contested terms: πίστις default ''faith''; per-verse variance
    documented'
