id: 1TI.6.3
reference: 1 Timothy 6:3
source:
  edition: SBLGNT
  text: εἴ τις ἑτεροδιδασκαλεῖ καὶ μὴ προσέρχεται ὑγιαίνουσι λόγοις, τοῖς τοῦ κυρίου
    ἡμῶν Ἰησοῦ Χριστοῦ, καὶ τῇ κατ’ εὐσέβειαν διδασκαλίᾳ,
translation:
  text: If anyone teaches a different doctrine and does not agree with sound words,
    those of our Lord Jesus Messiah, and with the teaching that accords with godliness,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the words of our Lord Jesus Christ.'
    reason: lexical_alternative
  - marker: b
    text: Greek 'Jesus Christ'; translated here as 'Jesus Messiah' to preserve the
      title sense of Χριστός.
    reason: alternative_reading
lexical_decisions:
- source_word: ἑτεροδιδασκαλεῖ
  chosen: teaches a different doctrine
  alternatives:
  - teaches otherwise
  - teaches different things
  - teaches false doctrine
  lexicon: BDAG
  rationale: The compound verb means to teach something different/other than the accepted
    apostolic teaching. 'Teaches a different doctrine' is clear modern English and
    preserves the doctrinal sense without adding the evaluative word 'false,' which
    is implied by context but not explicit in the verb itself.
- source_word: προσέρχεται
  chosen: agree with
  alternatives:
  - come to
  - devote oneself to
  - adhere to
  lexicon: BDAG
  rationale: Although the verb literally means 'come/go to' or 'approach,' in this
    context with dative objects it carries the sense of attaching oneself to, accepting,
    or conforming to teaching. 'Agree with' communicates the idiomatic force in natural
    English better than a wooden 'approach to.'
- source_word: ὑγιαίνουσι λόγοις
  chosen: sound words
  alternatives:
  - healthy words
  - wholesome words
  - sound teaching
  lexicon: BDAG
  rationale: ὑγιαίνω metaphorically describes doctrinal soundness or health. 'Sound
    words' preserves the metaphor and stays close to λόγοις ('words'), while remaining
    idiomatic in English.
- source_word: τοῖς τοῦ κυρίου ἡμῶν Ἰησοῦ Χριστοῦ
  chosen: those of our Lord Jesus Messiah
  alternatives:
  - the words of our Lord Jesus Christ
  - those of our Lord Jesus Christ
  lexicon: BDAG
  rationale: The article and genitive phrase identify the 'sound words' as belonging
    to or deriving from Jesus. 'Those of our Lord Jesus Messiah' avoids repeating
    'words' unnecessarily in English. Χριστοῦ is rendered 'Messiah' per project guidance
    where the title sense is still active rather than functioning merely as a fixed
    name.
- source_word: Χριστοῦ
  chosen: Messiah
  alternatives:
  - Christ
  lexicon: BDAG
  rationale: Per DOCTRINE.md, Χριστός is rendered 'Messiah' where title sense is present.
    Here, in the full designation 'our Lord Jesus Messiah,' the messianic title remains
    meaningful, so 'Messiah' is preferred.
- source_word: κατ’ εὐσέβειαν
  chosen: that accords with godliness
  alternatives:
  - according to godliness
  - leading to godliness
  - in keeping with godliness
  lexicon: BDAG
  rationale: The κατά phrase expresses conformity or correspondence. 'That accords
    with godliness' is idiomatic and preserves the idea that the teaching is in harmony
    with a godly life, without over-specifying causation.
- source_word: διδασκαλίᾳ
  chosen: the teaching
  alternatives:
  - doctrine
  - instruction
  lexicon: BDAG
  rationale: διδασκαλία can mean either the act of teaching or the content taught.
    'The teaching' is readable modern English and fits the context of apostolic doctrinal
    content. 'Doctrine' was already used earlier for ἑτεροδιδασκαλεῖ to bring out
    the contrast.
- source_word: εὐσέβειαν
  chosen: godliness
  alternatives:
  - piety
  - devotion
  lexicon: BDAG
  rationale: '''Godliness'' is the standard and clearest rendering in the Pastorals,
    where εὐσέβεια denotes reverent, God-oriented life and conduct. ''Piety'' can
    sound archaic or narrower in modern English.'
