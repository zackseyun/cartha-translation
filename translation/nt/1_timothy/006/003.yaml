theological_decisions:
- issue: Rendering Χριστοῦ in the full title Ἰησοῦ Χριστοῦ
  chosen_reading: Messiah
  alternative_readings:
  - Christ
  rationale: The project's default is to translate Χριστός as 'Messiah' where title
    sense is active, and 'Christ' where it functions more like a name. In this verse
    the full titular expression still bears theological meaning, so 'Messiah' is retained
    in the main text while the traditional 'Christ' is preserved in a footnote for
    readers.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; Contested
    terms table for Χριστός'
