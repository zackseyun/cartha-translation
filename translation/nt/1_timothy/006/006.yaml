id: 1TI.6.6
reference: 1 Timothy 6:6
source:
  edition: SBLGNT
  text: ἔστιν δὲ πορισμὸς μέγας ἡ εὐσέβεια μετὰ αὐταρκείας·
translation:
  text: But godliness with contentment is great gain.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'great profit' or 'a great means of gain.' The Greek uses a term related
      to gain/profit, echoing the previous verse.
    reason: lexical_alternative
  - marker: b
    text: Or 'self-sufficiency.' Here the sense is likely contentment or sufficiency
      rather than independent self-reliance.
    reason: lexical_alternative
lexical_decisions:
- source_word: δὲ
  chosen: But
  alternatives:
  - Now
  - And
  lexicon: BDAG
  rationale: Rendered as a mild adversative/conjunctive, linking this statement to
    the preceding warning about imagining godliness as a means of gain. 'But' best
    captures the contrast in context.
- source_word: πορισμὸς
  chosen: gain
  alternatives:
  - means of gain
  - profit
  - wealth
  lexicon: BDAG
  rationale: The noun denotes gain, profit, or a means of acquiring resources. In
    this sentence it functions predicatively ('is great gain'), and 'gain' preserves
    the wordplay with the previous verse without over-specifying material wealth.
- source_word: μέγας
  chosen: great
  alternatives:
  - large
  - considerable
  lexicon: BDAG
  rationale: Standard rendering of the adjective; 'great gain' is idiomatic and preserves
    the emphatic valuation Paul makes.
- source_word: εὐσέβεια
  chosen: godliness
  alternatives:
  - piety
  - devotion
  lexicon: BDAG
  rationale: In the Pastoral Epistles this term commonly refers to reverent, God-directed
    living. 'Godliness' is the most natural and established English equivalent here,
    without reducing it merely to external religiosity.
- source_word: μετὰ
  chosen: with
  alternatives:
  - accompanied by
  - together with
  lexicon: BDAG
  rationale: With the genitive, μετά indicates accompaniment or association. 'With'
    is clear and sufficiently precise.
- source_word: αὐταρκείας
  chosen: contentment
  alternatives:
  - self-sufficiency
  - sufficiency
  - contentedness
  lexicon: BDAG
  rationale: Although the term can denote self-sufficiency in broader Greek usage,
    in this context 'contentment' best conveys the ethical sense of being satisfied
    with what one has, fitting the following verses about material provision. 'Self-sufficiency'
    could misleadingly suggest autonomous independence from God.
