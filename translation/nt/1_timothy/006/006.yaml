theological_decisions:
- issue: Sense of αὐτάρκεια in Christian context
  chosen_reading: contentment
  alternative_readings:
  - self-sufficiency
  - sufficiency
  rationale: The immediate context (vv. 7–8) explains the term in terms of being satisfied
    with basic provisions, not Stoic autonomy. 'Contentment' communicates the intended
    Christian virtue without importing a self-reliant philosophical ideal.
  doctrine_reference: Translation philosophy §1, §6
- issue: Relation between godliness and gain
  chosen_reading: godliness with contentment is itself great gain
  alternative_readings:
  - godliness is a means to great gain when accompanied by contentment
  rationale: The Greek predicate construction can be read either as identifying godliness-with-contentment
    as great gain or as saying it serves as a means of gain. Given the immediate contrast
    with v. 5, the concise English 'is great gain' preserves the likely wordplay and
    avoids sounding like Paul endorses utilitarian religion.
  doctrine_reference: Translation philosophy §3
