id: 1TI.1.17
reference: 1 Timothy 1:17
source:
  edition: SBLGNT
  text: τῷ δὲ βασιλεῖ τῶν αἰώνων, ἀφθάρτῳ, ἀοράτῳ, ⸀μόνῳ θεῷ, τιμὴ καὶ δόξα εἰς τοὺς
    αἰῶνας τῶν αἰώνων· ἀμήν.
translation:
  text: Now to the King of the ages, immortal, invisible, the only God, be honor and
    glory forever and ever. Amen.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Some manuscripts read: "the only wise God."'
    reason: textual_variant
lexical_decisions:
- source_word: βασιλεῖ τῶν αἰώνων
  chosen: the King of the ages
  alternatives:
  - the eternal King
  - the King eternal
  - the King of the universe
  lexicon: BDAG
  rationale: A formally transparent rendering of the genitive construction that preserves
    the underlying αἰών language rather than collapsing it into the traditional but
    more interpretive 'eternal.' It communicates God's sovereign rule across all ages.
- source_word: ἀφθάρτῳ
  chosen: immortal
  alternatives:
  - incorruptible
  - imperishable
  lexicon: BDAG
  rationale: In reference to God, 'immortal' is natural modern English and conveys
    freedom from decay or death. 'Incorruptible' is more traditional but less accessible;
    'imperishable' is possible but less idiomatic in this doxological string.
- source_word: ἀοράτῳ
  chosen: invisible
  alternatives:
  - unseen
  lexicon: BDAG
  rationale: '''Invisible'' is the standard and clearest rendering for ἀόρατος here,
    fitting the elevated doxological style.'
- source_word: μόνῳ θεῷ
  chosen: the only God
  alternatives:
  - God alone
  - the only wise God
  lexicon: BDAG
  rationale: The SBLGNT text reads only 'μόνῳ θεῷ.' 'The only God' straightforwardly
    reflects the adjective-noun construction. The longer traditional reading 'the
    only wise God' reflects a textual variant and is preserved in a footnote rather
    than adopted in the main text.
- source_word: τιμὴ καὶ δόξα
  chosen: honor and glory
  alternatives:
  - praise and glory
  lexicon: BDAG
  rationale: This is the standard pairing for τιμή and δόξα in doxological contexts.
    'Honor' best matches τιμή, while 'glory' is the established and accurate rendering
    of δόξα.
- source_word: εἰς τοὺς αἰῶνας τῶν αἰώνων
  chosen: forever and ever
  alternatives:
  - to the ages of ages
  - for the ages of the ages
  lexicon: BDAG
  rationale: This idiom is best rendered in natural English as 'forever and ever.'
    A more literal rendering would sound unnatural; the chosen wording preserves the
    force of unending duration in idiomatic English.
- source_word: ἀμήν
  chosen: Amen
  lexicon: BDAG
  rationale: Retained as the conventional transliteration used in English Bibles and
    Christian worship.
- source_word: δὲ
  chosen: Now
  alternatives:
  - And
  - Then
  lexicon: BDAG
  rationale: δώ marks a transition into a doxological response. 'Now' captures the
    discourse movement naturally in English without overstating sequence.
