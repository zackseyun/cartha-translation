theological_decisions:
- issue: Whether to render the doxology in a way that preserves monotheistic force
    without diminishing the broader Pauline and canonical witness about Christ
  chosen_reading: the only God
  alternative_readings:
  - God alone
  rationale: The phrase μόνῳ θεῷ is rendered directly and preserves the text's explicit
    monotheistic confession. No additional doctrinal qualification is imported into
    the translation; the wording stands as written while remaining fully compatible
    with historic orthodox Trinitarian doctrine.
  doctrine_reference: Affirmations; Preserve theological tension rather than resolve
    it
- issue: Textual variant involving σοφῷ ('wise') after μόνῳ
  chosen_reading: omit 'wise' from the main text
  alternative_readings:
  - the only wise God
  rationale: The provided source text (SBLGNT) does not include σοφῷ, so the main
    text follows that reading. Because 'the only wise God' is familiar from the Byzantine/Textus
    Receptus tradition and older English versions, it is preserved in a footnote as
    a textual variant rather than adopted.
  doctrine_reference: Original-language primacy over translation tradition
