theological_decisions:
- issue: Relation of 'with faith and love' to 'grace'
  chosen_reading: The grace of the Lord is described as overflowing together with
    the faith and love that are in Messiah Jesus.
  alternative_readings:
  - Faith and love are qualities produced in Paul by grace rather than strictly accompanying
    grace grammatically.
  rationale: The syntax most naturally attaches μετὰ πίστεως καὶ ἀγάπης to the overflowing
    grace, while still allowing the theological implication that grace produces these
    qualities. The translation preserves the grammatical relation without over-interpreting
    causation.
  doctrine_reference: 'Translation philosophy #3'
- issue: Rendering Χριστός
  chosen_reading: Messiah
  alternative_readings:
  - Christ
  rationale: The doctrinal guidance prefers translating Χριστός as 'Messiah' where
    the title is still semantically alive. Here that choice preserves meaning without
    distorting the familiar Pauline expression.
  doctrine_reference: 'Contested terms table: Χριστός'
