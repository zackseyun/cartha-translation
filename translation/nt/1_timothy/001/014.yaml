id: 1TI.1.14
reference: 1 Timothy 1:14
source:
  edition: SBLGNT
  text: ὑπερεπλεόνασεν δὲ ἡ χάρις τοῦ κυρίου ἡμῶν μετὰ πίστεως καὶ ἀγάπης τῆς ἐν Χριστῷ
    Ἰησοῦ.
translation:
  text: But the grace of our Lord overflowed all the more, with faith and love that
    are in Messiah Jesus.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Christ Jesus.'
    reason: alternative_reading
lexical_decisions:
- source_word: ὑπερεπλεόνασεν
  chosen: overflowed all the more
  alternatives:
  - abounded exceedingly
  - superabounded
  - overflowed exceedingly
  lexicon: BDAG
  rationale: The compound verb intensifies πλεονάζω ('abound/increase'). 'Overflowed
    all the more' captures the superabundant sense in natural modern English without
    sounding archaic like 'superabounded.'
- source_word: δὲ
  chosen: But
  alternatives:
  - And
  - Now
  lexicon: BDAG
  rationale: δέ here marks contrast with the preceding description of sin and unbelief,
    so 'But' best reflects the adversative force in context.
- source_word: χάρις
  chosen: grace
  alternatives:
  - favor
  lexicon: BDAG
  rationale: '''Grace'' is the standard and theologically appropriate rendering here,
    referring to God''s unmerited favor operative in Paul''s conversion and calling.'
- source_word: κυρίου
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Per doctrine defaults, κύριος is rendered 'Lord.' This fits both common
    NT usage and the confessional weight of the title.
- source_word: μετὰ
  chosen: with
  alternatives:
  - accompanied by
  - together with
  lexicon: BDAG
  rationale: μετά with the genitive commonly means 'with.' Here it indicates that
    grace came accompanied by faith and love.
- source_word: πίστεως
  chosen: faith
  alternatives:
  - faithfulness
  - trust
  lexicon: BDAG
  rationale: Per doctrine defaults, πίστις is rendered 'faith' in the main text. In
    this verse the noun is not in the contested pistis-Christou construction, so 'faith'
    is the most straightforward rendering.
- source_word: ἀγάπης
  chosen: love
  alternatives:
  - charity
  lexicon: BDAG
  rationale: Per doctrine defaults, ἀγάπη is rendered 'love.' 'Charity' is archaic
    and less suitable for readable modern English.
- source_word: τῆς ἐν Χριστῷ Ἰησοῦ
  chosen: that are in Messiah Jesus
  alternatives:
  - which are in Christ Jesus
  - found in Messiah Jesus
  lexicon: BDAG
  rationale: The article with the prepositional phrase modifies both 'faith' and 'love,'
    so the English plural 'that are' makes the agreement clear. Χριστῷ is rendered
    'Messiah' as a title per doctrine guidance, since the phrase still carries titular
    force rather than functioning as a bare surname.
- source_word: Χριστῷ Ἰησοῦ
  chosen: Messiah Jesus
  alternatives:
  - Christ Jesus
  lexicon: BDAG
  rationale: Per doctrine defaults, Χριστός is translated 'Messiah' where title is
    in view. In the Pauline phrase 'Messiah Jesus,' the titular sense remains intelligible
    and preserves the meaning of the Greek.
