theological_decisions:
- issue: Representative masculine language in δικαίῳ
  chosen_reading: a righteous man
  alternative_readings:
  - the righteous person
  - the righteous
  rationale: The Greek is singular masculine and appears representative rather than
    exclusively male. Per doctrine, the translation remains gender-accurate rather
    than flattening to a gender-neutral form, while preserving the generic force in
    interpretation.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Semantic force of πατρολῴαις / μητρολῴαις
  chosen_reading: those who kill their fathers / those who kill their mothers
  alternative_readings:
  - those who strike their fathers / mothers
  - patricides / matricides
  rationale: These rare terms may denote violent assault or murder of parents. In
    this context, especially before 'murderers,' the rendering 'kill' best captures
    the severity and likely sense, but the lexical uncertainty is preserved in a footnote
    for auditability.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
