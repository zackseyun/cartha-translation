id: 1TI.1.9
reference: 1 Timothy 1:9
source:
  edition: SBLGNT
  text: εἰδὼς τοῦτο, ὅτι δικαίῳ νόμος οὐ κεῖται, ἀνόμοις δὲ καὶ ἀνυποτάκτοις, ἀσεβέσι
    καὶ ἁμαρτωλοῖς, ἀνοσίοις καὶ βεβήλοις, πατρολῴαις καὶ μητρολῴαις, ἀνδροφόνοις,
translation:
  text: 'understanding this: the law is not laid down for a righteous man, but for
    the lawless and rebellious, the ungodly and sinful, the unholy and profane, those
    who kill their fathers and those who kill their mothers, murderers,'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly 'those who strike their fathers and those who strike their mothers';
      the Greek terms can refer to violent assault on parents, though in this context
      'kill' is likely.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰδὼς τοῦτο
  chosen: understanding this
  alternatives:
  - knowing this
  - realizing this
  lexicon: BDAG
  rationale: The participle introduces the basis for the preceding instruction. 'Understanding
    this' is natural English while preserving the cognitive force of εἰδώς.
- source_word: δικαίῳ
  chosen: for a righteous man
  alternatives:
  - for the righteous
  - for a just person
  lexicon: BDAG
  rationale: Dative singular with νόμος οὐ κεῖται. Rendered gender-accurately as 'a
    righteous man' in keeping with the stated philosophy, since the Greek is singular
    masculine and representative. 'The righteous' is possible but loses the singular
    form.
- source_word: νόμος οὐ κεῖται
  chosen: the law is not laid down
  alternatives:
  - the law is not made
  - the law does not apply
  lexicon: BDAG
  rationale: κεῖται literally means 'is laid/placed.' 'Is not laid down' preserves
    the legal sense of enactment or appointment better than the more interpretive
    'does not apply.'
- source_word: ἀνόμοις
  chosen: the lawless
  alternatives:
  - outlaws
  - those without law
  lexicon: BDAG
  rationale: Standard rendering that preserves the moral-legal sense without paraphrase.
- source_word: ἀνυποτάκτοις
  chosen: rebellious
  alternatives:
  - insubordinate
  - unsubmissive
  lexicon: BDAG
  rationale: '''Rebellious'' is readable modern English and captures refusal to submit.
    ''Insubordinate'' is more formal but less natural.'
- source_word: ἀσεβέσι
  chosen: ungodly
  alternatives:
  - impious
  lexicon: BDAG
  rationale: '''Ungodly'' is the clearest common English equivalent for irreverence
    toward God.'
- source_word: ἁμαρτωλοῖς
  chosen: sinful
  alternatives:
  - sinners
  lexicon: BDAG
  rationale: Used adjectivally in a paired list; 'sinful' matches the adjectival structure
    and rhythm of the series.
- source_word: ἀνοσίοις
  chosen: unholy
  alternatives:
  - undevout
  - profane in the sense of impious
  lexicon: BDAG
  rationale: Best concise equivalent for violation of what is sacred.
- source_word: βεβήλοις
  chosen: profane
  alternatives:
  - godless
  - irreverent
  lexicon: BDAG
  rationale: Distinguishes this term from ἀσεβέσι and ἀνοσίοις by keeping the sense
    of treating sacred things as common.
- source_word: πατρολῴαις
  chosen: those who kill their fathers
  alternatives:
  - patricides
  - father-beaters
  lexicon: BDAG
  rationale: The term can denote one who strikes or kills a father, but in this vice
    list paired with μητρολῴαις and followed by ἀνδροφόνοις, the stronger sense 'kill'
    is likely. The more technical 'patricides' is less accessible, so the meaning
    is translated directly and the alternative preserved in a footnote.
- source_word: μητρολῴαις
  chosen: those who kill their mothers
  alternatives:
  - matricides
  - mother-beaters
  lexicon: BDAG
  rationale: Parallel to πατρολῴαις. 'Those who kill their mothers' is clear modern
    English; the possible broader sense involving violent assault is preserved in
    a footnote.
- source_word: ἀνδροφόνοις
  chosen: murderers
  alternatives:
  - killers
  - manslayers
  lexicon: BDAG
  rationale: In a vice list, 'murderers' best conveys unlawful killing in idiomatic
    English. 'Manslayers' is archaic; 'killers' is too broad.
