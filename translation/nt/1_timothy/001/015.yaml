id: 1TI.1.15
reference: 1 Timothy 1:15
source:
  edition: SBLGNT
  text: πιστὸς ὁ λόγος καὶ πάσης ἀποδοχῆς ἄξιος, ὅτι Χριστὸς Ἰησοῦς ἦλθεν εἰς τὸν
    κόσμον ἁμαρτωλοὺς σῶσαι· ὧν πρῶτός εἰμι ἐγώ,
translation:
  text: 'The saying is trustworthy and worthy of full acceptance: that Messiah Jesus
    came into the world to save sinners, of whom I am the foremost.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Christ Jesus.'
    reason: alternative_reading
  - marker: b
    text: Or, 'of whom I am the worst' or 'chief.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πιστὸς ὁ λόγος
  chosen: The saying is trustworthy
  alternatives:
  - This saying is trustworthy
  - The word/message is trustworthy
  lexicon: BDAG
  rationale: In the Pastoral Epistles, ὁ λόγος in the formula πιστὸς ὁ λόγος functions
    idiomatically as 'the saying' or 'this saying,' introducing a reliable summary
    statement. 'Trustworthy' is a natural rendering of πιστός here.
- source_word: πάσης ἀποδοχῆς ἄξιος
  chosen: worthy of full acceptance
  alternatives:
  - deserving complete acceptance
  - worthy of every acceptance
  lexicon: BDAG
  rationale: ἀποδοχή denotes acceptance or reception; πάσης intensifies it. 'Full
    acceptance' is idiomatic English that preserves the force without wooden literalism.
- source_word: ὅτι
  chosen: that
  alternatives:
  - because
  lexicon: BDAG
  rationale: Here ὅτι introduces the content of the trustworthy saying rather than
    a causal clause, so 'that' best fits the syntax and discourse flow.
- source_word: Χριστὸς Ἰησοῦς
  chosen: Messiah Jesus
  alternatives:
  - Christ Jesus
  lexicon: BDAG
  rationale: Per project policy, Χριστός is translated as 'Messiah' where it functions
    as a title rather than a fixed name-like element. In this confessional statement
    the titular sense remains clear.
- source_word: ἦλθεν εἰς τὸν κόσμον
  chosen: came into the world
  alternatives:
  - entered the world
  lexicon: BDAG
  rationale: This is the standard and natural rendering of the aorist of ἔρχομαι with
    εἰς τὸν κόσμον, preserving both movement and incarnational/theological resonance
    without overexpansion.
- source_word: ἁμαρτωλοὺς
  chosen: sinners
  alternatives:
  - sinful people
  lexicon: BDAG
  rationale: The adjective is substantival here, referring to people characterized
    as sinners. 'Sinners' is concise, standard, and accurate.
- source_word: σῶσαι
  chosen: to save
  alternatives:
  - to rescue
  lexicon: BDAG
  rationale: σῴζω in this soteriological context is best rendered 'save,' the established
    and precise theological equivalent.
- source_word: ὧν πρῶτός εἰμι ἐγώ
  chosen: of whom I am the foremost
  alternatives:
  - of whom I am first
  - of whom I am the worst
  - of whom I am chief
  lexicon: BDAG
  rationale: πρῶτος can mean first in rank or foremost/chief. In context Paul speaks
    of his preeminence among sinners from his own perspective. 'Foremost' preserves
    the metaphor of rank without collapsing it into an interpretive paraphrase like
    'worst.' The emphatic ἐγώ is adequately conveyed by English word order.
