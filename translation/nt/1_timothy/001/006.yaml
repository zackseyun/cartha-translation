theological_decisions:
- issue: Referent of the relative pronoun ὧν
  chosen_reading: It refers to the preceding ethical/spiritual aims in v. 5, rendered
    generically as 'these things.'
  alternative_readings:
  - It refers more narrowly to the triad 'a pure heart and a good conscience and sincere
    faith'
  - It could be rendered more literally as 'from which things'
  rationale: The verse depends syntactically on the prior context, and the translation
    must make the reference intelligible in English. 'These things' preserves the
    backward reference without forcing an overly narrow identification beyond the
    immediate discourse.
