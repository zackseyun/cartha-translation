id: 1TI.1.3
reference: 1 Timothy 1:3
source:
  edition: SBLGNT
  text: Καθὼς παρεκάλεσά σε προσμεῖναι ἐν Ἐφέσῳ, πορευόμενος εἰς Μακεδονίαν, ἵνα παραγγείλῃς
    τισὶν μὴ ἑτεροδιδασκαλεῖν
translation:
  text: Just as I urged you to remain in Ephesus when I was going into Macedonia,
    so that you might instruct certain people not to teach different doctrine,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'command certain people not to teach other doctrine.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Καθὼς
  chosen: Just as
  alternatives:
  - As
  lexicon: BDAG
  rationale: Introduces a comparison or recollection of a prior appeal. 'Just as'
    preserves the resumptive force more naturally in English than a bare 'As'.
- source_word: παρεκάλεσά
  chosen: urged
  alternatives:
  - encouraged
  - appealed to
  - exhorted
  lexicon: BDAG
  rationale: παρακαλέω can range from 'encourage' to 'urge/appeal.' In this context
    of apostolic instruction to Timothy, 'urged' best conveys earnest request without
    overstating it as a command.
- source_word: σε
  chosen: you
  rationale: Direct object pronoun referring to Timothy.
- source_word: προσμεῖναι
  chosen: to remain
  alternatives:
  - to stay on
  - to continue
  lexicon: BDAG
  rationale: The infinitive means to stay on or remain in a place. 'Remain' is concise
    and fits the formal tone.
- source_word: ἐν Ἐφέσῳ
  chosen: in Ephesus
  rationale: Standard rendering of the prepositional phrase with transliterated place
    name.
- source_word: πορευόμενος εἰς Μακεδονίαν
  chosen: when I was going into Macedonia
  alternatives:
  - as I went to Macedonia
  - on my way to Macedonia
  lexicon: BDAG
  rationale: The participle is most naturally understood as referring to Paul's own
    travel. 'When I was going into Macedonia' makes the temporal circumstance explicit
    and keeps the participial relation clear.
- source_word: ἵνα
  chosen: so that
  alternatives:
  - in order that
  lexicon: BDAG
  rationale: Expresses purpose. 'So that' is natural modern English while preserving
    purposive force.
- source_word: παραγγείλῃς
  chosen: you might instruct
  alternatives:
  - you might command
  - you might charge
  lexicon: BDAG
  rationale: παραγγέλλω often carries authoritative instruction. 'Command' is possible,
    but 'instruct' better fits readable modern English while still conveying directed
    apostolic oversight. The modal 'might' reflects the subjunctive under ἵνα.
- source_word: τισὶν
  chosen: certain people
  alternatives:
  - some
  - certain ones
  lexicon: BDAG
  rationale: Indefinite dative plural referring to specific but unnamed persons. 'Certain
    people' is idiomatic and avoids awkward literalism.
- source_word: μὴ
  chosen: not
  rationale: Standard negation with the infinitive.
- source_word: ἑτεροδιδασκαλεῖν
  chosen: to teach different doctrine
  alternatives:
  - to teach differently
  - to teach other doctrine
  - to teach false doctrine
  lexicon: BDAG
  rationale: The verb literally denotes teaching differently/other doctrine. 'Different
    doctrine' preserves the lexical idea of deviation without importing the fuller
    evaluative term 'false' beyond the word itself.
