theological_decisions:
- issue: How strongly to render παραγγείλῃς in an ecclesial correction context
  chosen_reading: authoritative instruction expressed as 'instruct' rather than 'command'
  alternative_readings:
  - '''command'''
  - '''charge'''
  rationale: The context involves apostolic delegation and correction of deviant teaching,
    so the verb is stronger than mere suggestion. However, optimal equivalence favors
    accessible English, and 'instruct' communicates directed authority without sounding
    artificially harsh or archaic. The authority remains clear from context.
  doctrine_reference: 'Translation philosophy: readable modern English, not archaic
    or academic; preserve source meaning without paraphrase.'
- issue: How to render ἑτεροδιδασκαλεῖν
  chosen_reading: '''teach different doctrine'''
  alternative_readings:
  - '''teach false doctrine'''
  - '''teach other doctrine'''
  rationale: The compound emphasizes doctrinal difference from the apostolic norm.
    'False doctrine' is interpretively stronger than the lexical form itself, while
    'teach differently' is too vague in English. 'Teach different doctrine' preserves
    the contrast without adding doctrinal judgment beyond what the term directly states.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    theological tension rather than resolve it.'
