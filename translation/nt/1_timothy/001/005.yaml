theological_decisions:
- issue: Meaning of πίστις in πίστεως ἀνυποκρίτου
  chosen_reading: faith
  alternative_readings:
  - faithfulness
  - trust
  rationale: The project's default for πίστις is 'faith' unless context strongly requires
    otherwise. Here Paul likely refers to genuine faith as one of the sources from
    which love proceeds. Because the semantic range can include 'faithfulness' or
    'trust,' the alternatives are preserved in a footnote rather than resolved dogmatically.
  doctrine_reference: 'DOCTRINE.md: Contested terms table for πίστις; Translation
    philosophy §3'
