id: 1TI.1.13
reference: 1 Timothy 1:13
source:
  edition: SBLGNT
  text: ⸀τὸ πρότερον ὄντα βλάσφημον καὶ διώκτην καὶ ὑβριστήν· ἀλλὰ ἠλεήθην, ὅτι ἀγνοῶν
    ἐποίησα ἐν ἀπιστίᾳ,
translation:
  text: formerly being a blasphemer and a persecutor and a violent man; but I was
    shown mercy, because I acted ignorantly in unbelief,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'an insolent man' or 'a brutal man.' The Greek term denotes abusive,
      outrageously violent behavior, not merely pride.
    reason: lexical_alternative
  - marker: b
    text: Or 'I received mercy.'
    reason: lexical_alternative
  - marker: c
    text: Or 'in ignorance' or 'being ignorant.'
    reason: lexical_alternative
  - marker: d
    text: Or 'in faithlessness.' Here the sense is most likely lack of faith rather
      than covenantal unfaithfulness.
    reason: lexical_alternative
lexical_decisions:
- source_word: τὸ πρότερον ὄντα
  chosen: formerly being
  alternatives:
  - formerly
  - once
  - previously being
  lexicon: BDAG
  rationale: The articular accusative with participle refers back to Paul in the previous
    verse and describes his prior state. 'Formerly being' preserves the participial
    force and the temporal sense without over-paraphrasing. English smoothness could
    justify simply 'formerly,' but the participle is significant enough to retain.
- source_word: βλάσφημον
  chosen: a blasphemer
  alternatives:
  - blasphemous
  - one who blasphemed
  lexicon: BDAG
  rationale: Used substantivally here in a list of personal descriptors. 'A blasphemer'
    is the most natural and direct English equivalent.
- source_word: διώκτην
  chosen: a persecutor
  alternatives:
  - one who persecuted
  lexicon: BDAG
  rationale: Standard rendering for the noun, fitting Paul's former hostility toward
    the church.
- source_word: ὑβριστήν
  chosen: a violent man
  alternatives:
  - an insolent man
  - a brutal man
  - an arrogant aggressor
  lexicon: BDAG
  rationale: The term denotes one who acts with insulting violence or outrage. 'Violent
    man' is clear modern English and captures the abusive, injurious sense better
    than the less accessible 'insolent man,' while avoiding reduction to mere pride.
- source_word: ἠλεήθην
  chosen: I was shown mercy
  alternatives:
  - I received mercy
  - I was mercied
  lexicon: BDAG
  rationale: The passive form is best represented by 'was shown mercy,' which is idiomatic
    and preserves divine action upon Paul. 'Received mercy' is possible but less explicitly
    passive.
- source_word: ὅτι
  chosen: because
  alternatives:
  - for
  - that
  lexicon: BDAG
  rationale: Here it introduces the reason or explanatory ground for the mercy shown.
    'Because' communicates that causal sense most clearly.
- source_word: ἀγνοῶν
  chosen: acting ignorantly
  alternatives:
  - being ignorant
  - in ignorance
  lexicon: BDAG
  rationale: The participle modifies Paul's action, not merely his state. 'Acting
    ignorantly' brings out that his conduct was done in ignorance.
- source_word: ἐποίησα
  chosen: I acted
  alternatives:
  - I did it
  - I did
  lexicon: BDAG
  rationale: Given the participial construction and the absence of an explicit object,
    'I acted' is more idiomatic in English than 'I did,' while still reflecting the
    broad semantic range of ποιέω.
- source_word: ἐν ἀπιστίᾳ
  chosen: in unbelief
  alternatives:
  - in faithlessness
  - while unbelieving
  lexicon: BDAG
  rationale: ἀπιστία here denotes lack of faith/belief rather than covenantal unfaithfulness
    in a developed theological contrast. 'In unbelief' is the most natural Pauline
    rendering in this context.
