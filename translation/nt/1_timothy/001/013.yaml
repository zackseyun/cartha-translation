theological_decisions:
- issue: Ground of the statement introduced by ὅτι
  chosen_reading: Paul states that mercy was shown to him because his prior actions
    were done ignorantly in unbelief.
  alternative_readings:
  - Paul states only an explanatory circumstance, not a reason, for the mercy shown.
  rationale: The Greek ὅτι naturally bears a causal/explanatory sense here. The translation
    should not imply that ignorance merited mercy, only that Paul contrasts ignorant
    unbelief with high-handed knowing rebellion. 'Because' preserves the syntax without
    importing a doctrine of salvation by diminished culpability.
  doctrine_reference: Preserve theological tension rather than resolve it.
