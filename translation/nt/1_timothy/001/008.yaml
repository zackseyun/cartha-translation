id: 1TI.1.8
reference: 1 Timothy 1:8
source:
  edition: SBLGNT
  text: Οἴδαμεν δὲ ὅτι καλὸς ὁ νόμος ἐάν τις αὐτῷ νομίμως χρῆται,
translation:
  text: Now we know that the law is good, if one uses it lawfully,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'if anyone uses it properly' or 'if someone uses it legitimately.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Οἴδαμεν
  chosen: we know
  alternatives:
  - we understand
  - we are aware
  lexicon: BDAG
  rationale: Perfect-form οἶδα commonly carries a present sense, expressing settled
    knowledge. 'We know' is the most natural and standard English rendering.
- source_word: δὲ
  chosen: Now
  alternatives:
  - But
  - And
  lexicon: BDAG
  rationale: δέ marks a mild transition rather than a strong adversative here. 'Now'
    captures the discourse shift in readable English without overstating contrast.
- source_word: ὅτι
  chosen: that
  lexicon: BDAG
  rationale: Introduces the content of what is known; straightforwardly rendered 'that.'
- source_word: καλὸς
  chosen: good
  alternatives:
  - noble
  - excellent
  lexicon: BDAG
  rationale: In context καλός describes the positive quality of the law. 'Good' is
    idiomatic and preserves the broad moral-positive sense without over-specifying.
- source_word: ὁ νόμος
  chosen: the law
  lexicon: BDAG
  rationale: νόμος with the article in Pauline usage commonly refers to the law, especially
    the Mosaic law or law as a recognized category. 'The law' preserves the Greek
    form and leaves the precise scope to context.
- source_word: ἐάν τις
  chosen: if one
  alternatives:
  - if anyone
  - if someone
  lexicon: BDAG
  rationale: This is a generic conditional construction. 'If one' preserves the generic
    singular force and aligns with the project's gender-accurate-over-gender-neutral
    principle, while remaining natural enough in English.
- source_word: αὐτῷ
  chosen: it
  alternatives:
  - with it
  lexicon: BDAG
  rationale: Dative pronoun referring back to νόμος with χράομαι. In English, 'use
    it' is the natural construction; the instrumental nuance is adequately conveyed
    without a wooden 'with it.'
- source_word: νομίμως
  chosen: lawfully
  alternatives:
  - properly
  - legitimately
  lexicon: BDAG
  rationale: The adverb is cognate with νόμος and means in accordance with law or
    proper norm. 'Lawfully' preserves the lexical connection and rhetorical wordplay
    with 'law' better than the smoother but less transparent 'properly.'
- source_word: χρῆται
  chosen: uses
  alternatives:
  - makes use of
  lexicon: BDAG
  rationale: Middle-form χράομαι means to use or employ. 'Uses' is concise, idiomatic,
    and fits the conditional statement.
