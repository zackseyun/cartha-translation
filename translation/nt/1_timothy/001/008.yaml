theological_decisions:
- issue: Scope of 'the law'
  chosen_reading: Rendered simply as 'the law' without specifying 'Mosaic law' in
    the main text.
  alternative_readings:
  - the Mosaic law
  - law in general
  rationale: The immediate context is Pauline and likely has the Mosaic law especially
    in view, yet the Greek text itself says only 'the law.' To avoid importing a narrower
    doctrinal claim than the text states, the translation preserves the wording and
    leaves interpretive scope open.
  doctrine_reference: 'Translation philosophy: Never import doctrinal claims the text
    does not make; preserve theological tension rather than resolve it.'
- issue: Generic singular τις
  chosen_reading: Rendered as 'one' rather than a plural paraphrase.
  alternative_readings:
  - anyone
  - someone
  rationale: The Greek uses a generic singular. Following the gender-accurate principle,
    'one' preserves the singular representative force without unnecessarily neutralizing
    or pluralizing the expression.
  doctrine_reference: 'Translation philosophy §4: Gender-accurate over gender-neutral.'
