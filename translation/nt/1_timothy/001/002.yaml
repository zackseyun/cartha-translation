id: 1TI.1.2
reference: 1 Timothy 1:2
source:
  edition: SBLGNT
  text: Τιμοθέῳ γνησίῳ τέκνῳ ἐν πίστει· χάρις, ἔλεος, εἰρήνη ἀπὸ θεοῦ ⸀πατρὸς καὶ
    Χριστοῦ Ἰησοῦ τοῦ κυρίου ἡμῶν.
translation:
  text: 'To Timothy, my true child in the faith: grace, mercy, and peace from God
    the Father and Messiah Jesus our Lord.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my genuine child in faith.'
    reason: lexical_alternative
  - marker: b
    text: 'Traditional rendering: ''Christ Jesus our Lord.'''
    reason: alternative_reading
lexical_decisions:
- source_word: γνησίῳ
  chosen: 'true'
  alternatives:
  - genuine
  - legitimate
  lexicon: BDAG
  rationale: Conveys authenticity of Paul's spiritual relationship to Timothy without
    implying biological descent. 'True child' is idiomatic and natural in English.
- source_word: τέκνῳ
  chosen: child
  alternatives:
  - son
  lexicon: BDAG
  rationale: τέκνον is broader than 'son' and commonly denotes child. Here it expresses
    spiritual parentage; 'child' preserves the metaphor without over-specifying gender.
- source_word: ἐν πίστει
  chosen: in the faith
  alternatives:
  - in faith
  lexicon: BDAG
  rationale: The phrase likely denotes the sphere or shared reality of Christian faith
    rather than merely Timothy's subjective act of believing. 'In the faith' is the
    most natural English rendering here.
- source_word: χάρις
  chosen: grace
  lexicon: BDAG
  rationale: Standard Pauline greeting term; 'grace' is the established and accurate
    rendering.
- source_word: ἔλεος
  chosen: mercy
  lexicon: BDAG
  rationale: Direct lexical equivalent and part of the distinctive Pastoral Epistles
    greeting formula.
- source_word: εἰρήνη
  chosen: peace
  lexicon: BDAG
  rationale: Direct and conventional rendering, preserving the greeting's theological
    fullness.
- source_word: πατρὸς
  chosen: the Father
  alternatives:
  - Father
  lexicon: BDAG
  rationale: With θεοῦ, the phrase is best rendered 'God the Father' in English rather
    than the less natural 'God, Father.' The article is supplied idiomatically.
- source_word: Χριστοῦ
  chosen: Messiah
  alternatives:
  - Christ
  lexicon: BDAG
  rationale: Per doctrine guidance, Χριστός is translated as 'Messiah' where functioning
    as a title. In this greeting it retains titular force alongside the personal name
    Jesus.
- source_word: κυρίου
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Follows the project's default rendering for κύριος and preserves its
    christological significance.
