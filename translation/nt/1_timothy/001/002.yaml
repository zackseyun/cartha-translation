theological_decisions:
- issue: Rendering Χριστοῦ Ἰησοῦ
  chosen_reading: Messiah Jesus
  alternative_readings:
  - Christ Jesus
  rationale: The project directs that Χριστός be translated as 'Messiah' where title
    is in view rather than retained as the traditional 'Christ.' In this epistolary
    formula the titular sense remains intelligible in English.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; Contested
    terms table for Χριστός'
- issue: Force of ἐν πίστει
  chosen_reading: in the faith
  alternative_readings:
  - in faith
  rationale: This preserves the likely sense of shared Christian faith as the sphere
    of Timothy's spiritual sonship, while not overstating a technical ecclesial meaning.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it'
