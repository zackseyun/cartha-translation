id: 1TI.1.18
reference: 1 Timothy 1:18
source:
  edition: SBLGNT
  text: Ταύτην τὴν παραγγελίαν παρατίθεμαί σοι, τέκνον Τιμόθεε, κατὰ τὰς προαγούσας
    ἐπὶ σὲ προφητείας, ἵνα ⸀στρατεύῃ ἐν αὐταῖς τὴν καλὴν στρατείαν,
translation:
  text: This charge I entrust to you, child Timothy, in accordance with the prophecies
    previously made about you, so that by them you may wage the good warfare,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'concerning you'; possibly 'over you' in the sense of prophecies spoken
      over Timothy.
    reason: lexical_alternative
  - marker: b
    text: Or 'through them' or 'in them'; the Greek may express means or sphere.
    reason: lexical_alternative
  - marker: c
    text: 'Traditional rendering: ''fight the good fight.'' The Greek more literally
      says ''wage the good warfare.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: παραγγελίαν
  chosen: charge
  alternatives:
  - command
  - instruction
  lexicon: BDAG
  rationale: παραγγελία commonly denotes an authoritative instruction or directive.
    'Charge' preserves the solemn, commissioned sense in this pastoral context better
    than the flatter 'instruction,' while avoiding an overly harsh military 'command'
    in English.
- source_word: παρατίθεμαί
  chosen: entrust
  alternatives:
  - commit
  - place before
  lexicon: BDAG
  rationale: In the middle voice here, παρατίθημι conveys committing something to
    someone's care or responsibility. 'Entrust' captures the personal and fiduciary
    nuance better than the more formal 'commit.'
- source_word: τέκνον
  chosen: child
  alternatives:
  - son
  - dear child
  lexicon: BDAG
  rationale: τέκνον is literally 'child' and functions here as an affectionate spiritual
    address. 'Child' preserves the familial metaphor without importing the more specific
    'son,' which the Greek does not use.
- source_word: κατὰ
  chosen: in accordance with
  alternatives:
  - according to
  - in keeping with
  lexicon: BDAG
  rationale: κατά with the accusative here expresses conformity or correspondence.
    'In accordance with' is natural English and clearly links Paul's charge to the
    prior prophecies.
- source_word: προαγούσας
  chosen: previously made
  alternatives:
  - going before
  - earlier spoken
  lexicon: BDAG
  rationale: The participle literally means 'going before,' but in context refers
    to prophecies that had already been spoken over Timothy. 'Previously made' communicates
    the temporal force idiomatically.
- source_word: ἐπὶ σὲ
  chosen: about you
  alternatives:
  - concerning you
  - over you
  lexicon: BDAG
  rationale: With προφητείας, ἐπί + accusative can indicate reference toward a person.
    'About you' is the clearest idiomatic rendering. 'Over you' is possible in ecclesial
    usage but is less directly warranted by the preposition alone.
- source_word: προφητείας
  chosen: prophecies
  alternatives:
  - prophetic utterances
  lexicon: BDAG
  rationale: The plural noun straightforwardly refers to prophetic messages. 'Prophecies'
    is the standard and sufficiently clear rendering.
- source_word: στρατεύῃ
  chosen: you may wage
  alternatives:
  - you may fight
  - you may serve as a soldier
  lexicon: BDAG
  rationale: στρατεύομαι is military imagery meaning to engage in a campaign or serve
    in warfare. Because it governs στρατείαν, 'wage' works idiomatically in English
    with the cognate object and preserves the metaphor.
- source_word: ἐν αὐταῖς
  chosen: by them
  alternatives:
  - in them
  - through them
  lexicon: BDAG
  rationale: 'ἐν can be rendered instrumentally here: the prophecies are the means
    or sphere in which Timothy carries out his ministry struggle. ''By them'' is concise
    and natural, though the instrumental nuance could also be expressed as ''through
    them.'''
- source_word: τὴν καλὴν στρατείαν
  chosen: the good warfare
  alternatives:
  - the noble campaign
  - the good fight
  lexicon: BDAG
  rationale: The cognate phrase preserves Paul's military metaphor. 'The good warfare'
    is more formally transparent to the Greek than the traditional but interpretive
    'the good fight,' which can blur στρατεία ('campaign/service') into a single combat
    image.
