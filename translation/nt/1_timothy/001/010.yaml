theological_decisions:
- issue: Rendering of ἀρσενοκοίταις in a doctrinally and lexically contested context
  chosen_reading: men who have sex with men
  alternative_readings:
  - men who practice homosexuality
  rationale: The translation should reflect the male-specific and sexual nature of
    the Greek term without importing a modern psychological or identity-based category
    beyond the text. The chosen rendering is behavior-focused and accessible. Because
    the term is debated in scope and English equivalents are contested, a footnote
    preserves a common alternative rendering rather than overstating certainty.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it; document contested renderings and preserve alternatives in footnotes.'
