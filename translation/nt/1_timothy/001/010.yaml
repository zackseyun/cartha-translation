id: 1TI.1.10
reference: 1 Timothy 1:10
source:
  edition: SBLGNT
  text: πόρνοις, ἀρσενοκοίταις, ἀνδραποδισταῖς, ψεύσταις, ἐπιόρκοις, καὶ εἴ τι ἕτερον
    τῇ ὑγιαινούσῃ διδασκαλίᾳ ἀντίκειται,
translation:
  text: the sexually immoral, men who have sex with men,[a] slave traders, liars,
    perjurers, and whatever else is opposed to sound teaching,
  philosophy: optimal-equivalence
  footnotes:
  - marker: '[a]'
    text: Or, 'men who practice homosexuality.' The Greek term ἀρσενοκοῖται is rare
      and debated, but it clearly refers to male same-sex sexual activity.
    reason: alternative_reading
lexical_decisions:
- source_word: πόρνοις
  chosen: the sexually immoral
  alternatives:
  - fornicators
  - the sexually immoral persons
  lexicon: BDAG
  rationale: πόρνος broadly denotes one engaged in sexual immorality. 'The sexually
    immoral' is clear modern English and preserves the category without narrowing
    it only to premarital sex, which 'fornicators' may suggest in contemporary usage.
- source_word: ἀρσενοκοίταις
  chosen: men who have sex with men
  alternatives:
  - men who practice homosexuality
  - sodomites
  - male same-sex offenders
  lexicon: BDAG
  rationale: This rare term is formed from ἄρσην ('male') and κοίτη ('bed,' often
    sexual intercourse), likely echoing Leviticus in the LXX. 'Men who have sex with
    men' communicates the male-male sexual referent in accessible English without
    importing more modern identity categories than the Greek itself states. Because
    the term's precise scope is debated, an alternative is preserved in a footnote.
- source_word: ἀνδραποδισταῖς
  chosen: slave traders
  alternatives:
  - kidnappers
  - enslavers
  - slave dealers
  lexicon: BDAG
  rationale: The term refers to those who acquire or traffic persons as slaves, not
    merely generic abductors. 'Slave traders' best captures the social evil in concise
    modern English and aligns with the project's preference to preserve bonded-slavery
    language where salient.
- source_word: ψεύσταις
  chosen: liars
  alternatives:
  - false persons
  lexicon: BDAG
  rationale: Straightforward plural noun meaning those who lie; 'liars' is the natural
    English equivalent.
- source_word: ἐπιόρκοις
  chosen: perjurers
  alternatives:
  - those who swear falsely
  - oath-breakers
  lexicon: BDAG
  rationale: The term denotes those who violate or falsify an oath. 'Perjurers' is
    concise and accurate, especially in a vice list alongside 'liars.'
- source_word: καὶ εἴ τι ἕτερον
  chosen: and whatever else
  alternatives:
  - and if anything else
  - and any other thing that
  lexicon: BDAG
  rationale: This idiom broadens the list to any additional comparable behavior. 'Whatever
    else' is idiomatic English and preserves the open-ended force.
- source_word: τῇ ὑγιαινούσῃ διδασκαλίᾳ
  chosen: to sound teaching
  alternatives:
  - to healthy teaching
  - to sound doctrine
  lexicon: BDAG
  rationale: ὑγιαίνω metaphorically means 'to be healthy/sound.' 'Sound teaching'
    is natural modern English and avoids overly ecclesiastical jargon while preserving
    the metaphorical sense.
- source_word: ἀντίκειται
  chosen: is opposed
  alternatives:
  - is contrary
  - stands against
  lexicon: BDAG
  rationale: Middle/passive form here conveys being in opposition. 'Is opposed to'
    is idiomatic and fits the vice-list conclusion.
