id: 1TI.1.16
reference: 1 Timothy 1:16
source:
  edition: SBLGNT
  text: ἀλλὰ διὰ τοῦτο ἠλεήθην, ἵνα ἐν ἐμοὶ πρώτῳ ἐνδείξηται ⸂Χριστὸς Ἰησοῦς⸃ τὴν
    ⸀ἅπασαν μακροθυμίαν, πρὸς ὑποτύπωσιν τῶν μελλόντων πιστεύειν ἐπ’ αὐτῷ εἰς ζωὴν
    αἰώνιον.
translation:
  text: 'But for this reason I received mercy: so that in me, as the foremost, Messiah
    Jesus might display all his patience as a pattern for those who were going to
    believe in him for eternal life.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Christ Jesus.' The Greek title Χριστός can be rendered either 'Messiah'
      or 'Christ'; here 'Messiah' preserves the title's meaning.
    reason: alternative_reading
  - marker: b
    text: Or 'those who would believe in him.'
    reason: lexical_alternative
  - marker: c
    text: Or 'all his forbearance' or 'all his longsuffering.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἠλεήθην
  chosen: I received mercy
  alternatives:
  - I was shown mercy
  - I was mercied
  lexicon: BDAG
  rationale: Passive of ἐλεάω; 'received mercy' is natural modern English while preserving
    the divine passive sense already implied in context.
- source_word: πρώτῳ
  chosen: the foremost
  alternatives:
  - first
  - chief
  - worst
  lexicon: BDAG
  rationale: In context Paul refers back to himself as the foremost of sinners (v.
    15). 'The foremost' preserves the superlative force without over-importing 'worst'
    into this verse itself.
- source_word: ἐνδείξηται
  chosen: might display
  alternatives:
  - might demonstrate
  - might show
  lexicon: BDAG
  rationale: Aorist middle subjunctive after ἵνα expressing purpose. 'Display' captures
    public manifestation and reads smoothly in English.
- source_word: Χριστὸς Ἰησοῦς
  chosen: Messiah Jesus
  alternatives:
  - Christ Jesus
  lexicon: BDAG
  rationale: Per doctrine, Χριστός is translated as 'Messiah' where it functions as
    a title rather than a fixed name-like element. Here the titular sense remains
    clear.
- source_word: ἅπασαν μακροθυμίαν
  chosen: all his patience
  alternatives:
  - his whole patience
  - all longsuffering
  - all forbearance
  lexicon: BDAG
  rationale: ἅπας intensifies totality; μακροθυμία denotes patient restraint/forbearance.
    'All his patience' is idiomatic and preserves the fullness emphasized by ἅπασαν.
- source_word: ὑποτύπωσιν
  chosen: a pattern
  alternatives:
  - an example
  - a model
  - a prototype
  lexicon: BDAG
  rationale: The noun denotes an example or model set forth for imitation or instruction.
    'Pattern' preserves the exemplary sense with slightly more formality than 'example.'
- source_word: τῶν μελλόντων πιστεύειν
  chosen: those who were going to believe
  alternatives:
  - those who would believe
  - those about to believe
  - future believers
  lexicon: BDAG
  rationale: μέλλω with infinitive points to futurity relative to Paul's experience.
    'Were going to believe' keeps that prospective nuance more explicitly than the
    compressed 'would believe,' though the latter is possible.
- source_word: πιστεύειν ἐπ’ αὐτῷ
  chosen: believe in him
  alternatives:
  - put faith in him
  - trust in him
  lexicon: BDAG
  rationale: πιστεύω with ἐπί + dative here is well rendered 'believe in him.' This
    preserves the standard NT idiom without importing the contested 'faithfulness'
    sense, which does not apply here because the verb rather than πίστις is used.
- source_word: εἰς ζωὴν αἰώνιον
  chosen: for eternal life
  alternatives:
  - unto eternal life
  - resulting in eternal life
  lexicon: BDAG
  rationale: εἰς expresses goal/result. 'For eternal life' is concise and natural
    while preserving the telic sense of belief directed toward eternal life.
