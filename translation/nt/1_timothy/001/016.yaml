theological_decisions:
- issue: Rendering Χριστός
  chosen_reading: Messiah Jesus
  alternative_readings:
  - Christ Jesus
  rationale: The translation follows the project's default of translating Χριστός
    as 'Messiah' where the titular force is still felt. In this verse the phrase identifies
    Jesus in his messianic office rather than functioning purely as a proper name.
  doctrine_reference: 'DOCTRINE.md: Contested terms — Χριστός → Messiah (where title;
    Christ where name-like)'
- issue: Reference of divine mercy and patience
  chosen_reading: The verse presents Messiah Jesus as the one displaying patience
    through showing mercy to Paul.
  alternative_readings:
  - An implicit divine passive with God the Father foregrounded apart from the Son
  rationale: The passive 'I received mercy' does not name the agent, but the purpose
    clause explicitly states that Messiah Jesus displays the patience in Paul. The
    translation preserves that wording without collapsing Trinitarian distinctions
    or obscuring the Son's agency in the text.
  doctrine_reference: 'DOCTRINE.md: Affirmations — Nicene Creed / Chalcedonian orthodoxy'
