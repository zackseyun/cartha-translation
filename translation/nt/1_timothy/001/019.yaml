theological_decisions:
- issue: Reference of ἥν
  chosen_reading: The relative pronoun refers specifically to 'a good conscience,'
    not jointly to both 'faith and a good conscience.'
  alternative_readings:
  - The pronoun summarizes both 'faith and a good conscience' together.
  rationale: 'Grammatically, ἥν is feminine singular and most naturally agrees with
    συνείδησιν, the nearest feminine singular noun. This also fits the logic of the
    verse: by rejecting a good conscience, some come to shipwreck with respect to
    the faith.'
  doctrine_reference: Translation philosophy §3 (preserve tension rather than resolve
    it)
