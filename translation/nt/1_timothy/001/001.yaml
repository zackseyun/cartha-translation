id: 1TI.1.1
reference: 1 Timothy 1:1
source:
  edition: SBLGNT
  text: Παῦλος ἀπόστολος ⸂Χριστοῦ Ἰησοῦ⸃ κατ’ ἐπιταγὴν θεοῦ σωτῆρος ἡμῶν καὶ ⸂Χριστοῦ Ἰησοῦ⸃ τῆς ἐλπίδος ἡμῶν
translation:
  text: Paul, an apostle of Messiah Jesus by the command of God our Savior, and of Messiah Jesus our hope,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Christ Jesus' in both occurrences of 'Messiah Jesus.' The Greek title Χριστός can function either as the translated title 'Messiah' or, in some contexts, as the more name-like 'Christ.'
    reason: alternative_reading
  - marker: b
    text: Or 'God our Savior and of Messiah Jesus our hope'.
    reason: previous_rendering
lexical_decisions:
- source_word: ἀπόστολος
  chosen: apostle
  alternatives:
  - messenger
  - envoy
  lexicon: BDAG
  rationale: The term is a recognized early Christian office/title in Pauline self-identification. 'Apostle' preserves both the formal role and established NT usage better than the more generic 'messenger' or 'envoy'.
- source_word: Χριστοῦ Ἰησοῦ
  chosen: Messiah Jesus
  alternatives:
  - Christ Jesus
  - Jesus Christ
  lexicon: BDAG
  rationale: 'Per doctrine, Χριστός is rendered ''Messiah'' where it functions as a title rather than a name-like element. In this epistolary opening, the genitive construction still carries titular force: Paul is an apostle belonging to/commissioned by the Messiah, Jesus.'
- source_word: κατ’ ἐπιταγήν
  chosen: by the command
  alternatives:
  - according to the command
  - by order of
  lexicon: BDAG
  rationale: κατά with the accusative here expresses conformity to or basis in an authoritative directive. 'By the command' is natural English and preserves the sense of divine authorization without sounding wooden.
- source_word: θεοῦ σωτῆρος ἡμῶν
  chosen: of God our Savior
  alternatives:
  - of God, our Savior
  - of our Savior God
  lexicon: BDAG
  rationale: 'The genitive chain is most naturally rendered with apposition: ''God our Savior.'' This preserves the title σωτήρ as applied to God and reflects normal Pauline style.'
- source_word: καὶ
  chosen: and of
  alternatives:
  - and
  - also of
  lexicon: BDAG
  rationale: English supplies 'of' to carry forward the genitive relation from 'by the command of God our Savior' to the coordinated phrase 'of Messiah Jesus our hope.' This is not an added concept but required for clear English syntax.
- source_word: Χριστοῦ Ἰησοῦ τῆς ἐλπίδος ἡμῶν
  chosen: of Messiah Jesus our hope
  alternatives:
  - of Christ Jesus, our hope
  - of Messiah Jesus, who is our hope
  lexicon: BDAG
  rationale: The genitive phrase is appositional, identifying Messiah Jesus as 'our hope.' The compact rendering preserves the Greek structure while remaining idiomatic. A relative clause ('who is our hope') is possible but less formally aligned.
- source_word: ἐλπίδος
  chosen: hope
  alternatives:
  - confidence
  - expectation
  lexicon: BDAG
  rationale: '''Hope'' is the standard and theologically rich rendering, encompassing confident expectation grounded in God''s saving work. Alternatives narrow or flatten the term''s Pauline resonance.'
- source_word: Παῦλος
  chosen: Paul
  lexicon: BDAG
  rationale: Standard English transliteration of the proper name.
