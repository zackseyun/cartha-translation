theological_decisions:
- issue: Rendering of Χριστός
  chosen_reading: Messiah
  alternative_readings:
  - Christ
  rationale: The doctrine excerpt directs that Christological titles be translated, with Χριστός rendered 'Messiah' where context supports title rather than name-like usage. In this verse, the title remains semantically active in both occurrences.
  doctrine_reference: 'DOCTRINE.md: ''Translate titles; transliterate names'' and contested terms table for Χριστός'
- issue: Relation of 'our hope' to Messiah Jesus
  chosen_reading: 'Appositional: ''Messiah Jesus our hope'''
  alternative_readings:
  - 'Relative sense: ''Messiah Jesus, who is our hope'''
  rationale: The Greek genitive construction most naturally presents 'our hope' as an appositional designation of Messiah Jesus. The translation keeps that theological identification without expanding it into a fuller paraphrase.
  doctrine_reference: 'DOCTRINE.md: preserve theological tension rather than resolve it; optimal equivalence'
