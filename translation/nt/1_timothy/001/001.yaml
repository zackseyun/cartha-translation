  from: God our Savior and of Messiah Jesus our hope
  to: God our Savior, and of Messiah Jesus our hope
  rationale: The two sources of the 'command' are the parallel phrases 'God our Savior' and 'Messiah Jesus our hope.' Adding a comma before 'and' can improve readability by creating a clearer separation between these two dense phrases, helping the reader parse the structure of the salutation more easily. This is a stylistic suggestion for clarity.
