theological_decisions:
- issue: Rendering of Χριστός
  chosen_reading: Messiah Jesus
  alternative_readings:
  - Christ Jesus
  rationale: The project directs that Χριστός be translated as 'Messiah' where title
    sense is active. This preserves the semantic content of the title rather than
    defaulting to inherited transliteration.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; Contested
    terms table for Χριστός'
- issue: Nuance of Paul's commissioning
  chosen_reading: appointing me to ministry
  alternative_readings:
  - putting me into service
  - appointing me for service
  rationale: The text states Christ's action in assigning Paul to διακονία. 'Ministry'
    communicates commissioned service without importing later ecclesiastical office
    structures; the participle is kept subordinate to Christ's considering Paul faithful.
  doctrine_reference: 'DOCTRINE.md: optimal equivalence; preserve source text without
    importing doctrinal claims'
