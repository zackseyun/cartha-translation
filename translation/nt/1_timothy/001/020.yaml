theological_decisions:
- issue: Meaning of 'handed over to Satan'
  chosen_reading: A severe act of apostolic/church discipline placing the offenders
    outside the church's protective sphere for corrective purpose.
  alternative_readings:
  - A purely miraculous infliction of physical suffering
  - A final declaration of damnation
  rationale: The purpose clause 'so that they may be disciplined not to blaspheme'
    indicates a remedial aim rather than a final condemnation. The translation keeps
    the phrase literal and does not import a specific ecclesial mechanism into the
    main text.
  doctrine_reference: Preserve theological tension rather than resolve it.
