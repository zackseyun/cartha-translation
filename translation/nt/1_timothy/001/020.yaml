id: 1TI.1.20
reference: 1 Timothy 1:20
source:
  edition: SBLGNT
  text: ὧν ἐστιν Ὑμέναιος καὶ Ἀλέξανδρος, οὓς παρέδωκα τῷ Σατανᾷ ἵνα παιδευθῶσι μὴ
    βλασφημεῖν.
translation:
  text: among whom are Hymenaeus and Alexander, whom I have handed over to Satan so
    that they may be disciplined not to blaspheme.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'delivered over to Satan.' The phrase likely refers to severe corrective
      discipline rather than final condemnation.
    reason: lexical_alternative
  - marker: b
    text: '''Disciplined'' can also be rendered ''taught,'' ''trained,'' or ''corrected'';
      the Greek term includes the idea of formative correction.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὧν ἐστιν
  chosen: among whom are
  alternatives:
  - of whom are
  - including
  lexicon: BDAG
  rationale: The genitive relative pronoun refers back to the previously mentioned
    group; 'among whom are' is idiomatic English that preserves the partitive sense
    better than the more wooden 'of whom are.'
- source_word: Ὑμέναιος καὶ Ἀλέξανδρος
  chosen: Hymenaeus and Alexander
  rationale: Personal names are transliterated by standard English conventions per
    translation philosophy.
- source_word: παρέδωκα
  chosen: have handed over
  alternatives:
  - handed over
  - delivered over
  lexicon: BDAG
  rationale: The aorist is rendered with English present perfect for natural discourse
    connection with the present consequences in context. 'Handed over' is clear modern
    English and preserves the force of παραδίδωμι without archaic tone.
- source_word: τῷ Σατανᾷ
  chosen: to Satan
  alternatives:
  - to the Adversary
  lexicon: BDAG
  rationale: Σατανᾶς is a proper designation here; 'Satan' is the standard English
    rendering and best matches New Testament usage.
- source_word: ἵνα παιδευθῶσι
  chosen: so that they may be disciplined
  alternatives:
  - so that they may be taught
  - so that they may be trained
  - so that they may be corrected
  lexicon: BDAG
  rationale: παιδεύω can denote training, instruction, or corrective discipline. In
    this punitive-restorative context, 'be disciplined' best captures the corrective
    sense without overstating physical punishment.
- source_word: μὴ βλασφημεῖν
  chosen: not to blaspheme
  alternatives:
  - not to speak abusively
  - not to slander
  lexicon: BDAG
  rationale: βλασφημέω in this context most naturally refers to irreverent or defamatory
    speech against God/the faith, so 'blaspheme' preserves the theological gravity.
    Broader alternatives are possible lexically but are weaker in this setting.
