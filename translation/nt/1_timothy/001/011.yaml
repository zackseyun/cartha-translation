id: 1TI.1.11
reference: 1 Timothy 1:11
source:
  edition: SBLGNT
  text: κατὰ τὸ εὐαγγέλιον τῆς δόξης τοῦ μακαρίου θεοῦ, ὃ ἐπιστεύθην ἐγώ.
translation:
  text: according to the gospel of the glory of the blessed God, with which I was
    entrusted.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, 'the glorious gospel of the blessed God.'
    reason: alternative_reading
lexical_decisions:
- source_word: κατὰ
  chosen: according to
  alternatives:
  - in accordance with
  - by
  lexicon: BDAG
  rationale: In this context κατά with the accusative introduces the standard or norm
    by which the preceding statement is measured. 'According to' is the most natural
    and sufficiently formal rendering.
- source_word: εὐαγγέλιον
  chosen: gospel
  alternatives:
  - good news
  lexicon: BDAG
  rationale: '''Gospel'' is the established and still intelligible rendering in Pauline
    contexts, preserving the term''s theological weight better than the more generic
    ''good news'' here.'
- source_word: τῆς δόξης
  chosen: of the glory
  alternatives:
  - glorious
  - of glory
  lexicon: BDAG
  rationale: The genitive is retained formally as 'of the glory' rather than compressed
    into the adjectival 'glorious.' This preserves the Greek structure and leaves
    open whether the sense is possessive or descriptive without over-interpreting.
- source_word: μακαρίου
  chosen: blessed
  alternatives:
  - happy
  - fortunate
  lexicon: BDAG
  rationale: When applied to God, 'blessed' is the fitting theological English equivalent.
    'Happy' would sound trivial, and 'fortunate' is inappropriate.
- source_word: θεοῦ
  chosen: God
  lexicon: BDAG
  rationale: Straightforward rendering of θεός in the genitive, governed by the preceding
    phrase.
- source_word: ὃ
  chosen: with which
  alternatives:
  - which
  - that
  lexicon: BDAG
  rationale: The relative pronoun refers back to 'gospel.' Rendering it with the preposition
    in English ('with which') reflects the idiomatic construction required by 'entrust'
    in passive English.
- source_word: ἐπιστεύθην
  chosen: I was entrusted
  alternatives:
  - I was entrusted with it
  - it was entrusted to me
  lexicon: BDAG
  rationale: The aorist passive of πιστεύω here carries the sense 'to entrust' rather
    than 'to believe.' 'I was entrusted' is concise and idiomatic; the accompanying
    relative phrase supplies the object.
- source_word: ἐγώ
  chosen: I
  lexicon: BDAG
  rationale: The explicit pronoun adds emphasis in Greek. English naturally includes
    'I' in the passive clause; the emphasis is sufficiently conveyed by the clause
    structure without adding italics or extra wording.
