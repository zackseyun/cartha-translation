id: 1TI.1.4
reference: 1 Timothy 1:4
source:
  edition: SBLGNT
  text: μηδὲ προσέχειν μύθοις καὶ γενεαλογίαις ἀπεράντοις, αἵτινες ⸀ἐκζητήσεις παρέχουσι
    μᾶλλον ἢ οἰκονομίαν θεοῦ τὴν ἐν πίστει—
translation:
  text: nor to pay attention to myths and endless genealogies, which promote speculations
    rather than God’s stewardship that is by faith—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'which produce controversies' or 'which give rise to investigations.'
      The Greek term can denote inquiries or disputes, here with a negative sense
      of unproductive speculation.
    reason: lexical_alternative
  - marker: b
    text: Or 'God’s administration,' 'God’s plan,' or 'the stewardship from God.'
      The Greek οἰκονομία can refer to stewardship, administration, or an ordered
      plan.
    reason: lexical_alternative
  - marker: c
    text: Or 'in faith'; for 'faith,' some understand a nuance closer to 'faithfulness'
      or 'trust.'
    reason: alternative_reading
lexical_decisions:
- source_word: προσέχειν
  chosen: to pay attention to
  alternatives:
  - to devote oneself to
  - to occupy oneself with
  lexicon: BDAG
  rationale: The infinitive continues the charge from the previous verse. 'Pay attention
    to' is idiomatic modern English and preserves the sense of giving heed or attaching
    oneself to something without over-paraphrasing.
- source_word: μύθοις
  chosen: myths
  alternatives:
  - fables
  - legends
  lexicon: BDAG
  rationale: '''Myths'' is the most direct and contemporary rendering. ''Fables''
    is traditional but sounds dated and can imply a children''s-story register not
    required by the Greek.'
- source_word: γενεαλογίαις ἀπεράντοις
  chosen: endless genealogies
  alternatives:
  - interminable genealogies
  - boundless genealogies
  lexicon: BDAG
  rationale: The adjective ἀπέραντος conveys something without limit or end. 'Endless
    genealogies' is natural English and captures the pejorative force of fruitless,
    unending genealogical speculation.
- source_word: αἵτινες
  chosen: which
  alternatives:
  - such things as these, which
  lexicon: BDAG
  rationale: The relative pronoun introduces an explanatory characterization of the
    myths and genealogies. Simple 'which' is sufficient in English, though the Greek
    has a qualitative nuance.
- source_word: ἐκζητήσεις
  chosen: speculations
  alternatives:
  - controversies
  - investigations
  - questionings
  lexicon: BDAG
  rationale: The noun here denotes inquiries or disputes that do not lead to edification.
    'Speculations' best fits the context of fruitless doctrinal curiosity. 'Controversies'
    is possible, but the emphasis appears to be on unproductive inquiry rather than
    merely conflict.
- source_word: παρέχουσι
  chosen: promote
  alternatives:
  - produce
  - furnish
  - give rise to
  lexicon: BDAG
  rationale: The verb literally means 'provide' or 'cause.' 'Promote' communicates
    that these things foster or generate speculations in a continuing way.
- source_word: μᾶλλον ἢ
  chosen: rather than
  alternatives:
  - more than
  lexicon: BDAG
  rationale: This comparative construction contrasts two outcomes. 'Rather than' is
    the clearest idiomatic English equivalent here.
- source_word: οἰκονομίαν θεοῦ
  chosen: God’s stewardship
  alternatives:
  - God's administration
  - God's plan
  - the stewardship from God
  lexicon: BDAG
  rationale: οἰκονομία can mean stewardship, administration, or plan/arrangement.
    In this context the contrast is between fruitless speculation and the ordered
    outworking of God's saving purpose in the community. 'God's stewardship' preserves
    the lexical core without collapsing it into a purely abstract 'plan.' Because
    the genitive θεοῦ can be understood as possessive or source, the English remains
    somewhat open.
- source_word: τὴν ἐν πίστει
  chosen: that is by faith
  alternatives:
  - which is in faith
  - that operates in faith
  lexicon: BDAG
  rationale: The phrase qualifies 'God's stewardship.' Given the contested range of
    πίστις, the default main-text rendering 'faith' is retained per doctrine guidelines.
    'By faith' is more idiomatic than 'in faith' here while still reflecting ἐν with
    a sphere/instrument nuance.
- source_word: πίστει
  chosen: faith
  alternatives:
  - faithfulness
  - trust
  lexicon: BDAG
  rationale: Per the project's contested-terms guidance, πίστις defaults to 'faith'
    in the main text, while alternatives may be preserved in a footnote where relevant.
    Here 'faith' fits the Pauline contrast between speculative teaching and God's
    saving economy as received and lived in faith.
