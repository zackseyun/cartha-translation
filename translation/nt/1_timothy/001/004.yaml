theological_decisions:
- issue: Meaning of οἰκονομίαν θεοῦ
  chosen_reading: God’s stewardship
  alternative_readings:
  - God's administration
  - God's plan
  - the stewardship from God
  rationale: The phrase is semantically debated. Rendering it as 'God’s stewardship'
    preserves the concrete lexical sense of οἰκονομία while allowing readers to understand
    either God's ordering of salvation/history or the stewardship entrusted within
    the church. This avoids importing a narrower doctrinal system not explicit in
    the text.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Rendering of πίστει in τὴν ἐν πίστει
  chosen_reading: faith
  alternative_readings:
  - faithfulness
  - trust
  rationale: The project default for πίστις is 'faith.' Although 'faithfulness' or
    'trust' can be argued in some contexts, this verse does not require departing
    from the default. The alternative is preserved in a footnote to maintain auditability
    and theological tension where readers may see a broader nuance.
  doctrine_reference: 'Contested terms: πίστις'
