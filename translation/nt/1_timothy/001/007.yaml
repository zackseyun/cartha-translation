theological_decisions:
- issue: Reference of 'the law' in νομοδιδάσκαλοι
  chosen_reading: Rendered generically as 'the law' without specifying Mosaic/Torah
    in the main text.
  alternative_readings:
  - the Mosaic law
  - Torah
  rationale: In the Pastoral context the reference is very likely Jewish law/Torah,
    but the Greek noun itself is simply 'law.' The translation preserves the source
    wording while allowing readers to infer the Jewish context from the letter's argument.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; do not import claims the text does not make.'
