id: 1TI.1.7
reference: 1 Timothy 1:7
source:
  edition: SBLGNT
  text: θέλοντες εἶναι νομοδιδάσκαλοι, μὴ νοοῦντες μήτε ἃ λέγουσιν μήτε περὶ τίνων
    διαβεβαιοῦνται.
translation:
  text: wanting to be teachers of the law, though they understand neither what they
    are saying nor the things about which they speak so confidently.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'not understanding what they say or what they confidently assert.'
    reason: lexical_alternative
  - marker: b
    text: '''Teachers of the law'' likely refers to those claiming authority to teach
      the Jewish law (Torah).'
    reason: cultural_note
lexical_decisions:
- source_word: θέλοντες
  chosen: wanting
  alternatives:
  - desiring
  - wishing
  lexicon: BDAG
  rationale: Present participle modifying the implied subject from the previous verse;
    'wanting' preserves the ongoing volitional sense without overstating it.
- source_word: εἶναι
  chosen: to be
  lexicon: BDAG
  rationale: Standard complementary infinitive with θέλοντες.
- source_word: νομοδιδάσκαλοι
  chosen: teachers of the law
  alternatives:
  - law-teachers
  - teachers of the Mosaic law
  lexicon: BDAG
  rationale: A compound noun meaning teachers associated with the law. 'Teachers of
    the law' is natural English and preserves the likely reference to Torah/legal
    instruction without over-specifying 'Mosaic' in the main text.
- source_word: μὴ νοοῦντες
  chosen: though they understand
  alternatives:
  - not understanding
  - without understanding
  lexicon: BDAG
  rationale: 'The participial clause is concessive in sense in context: they aspire
    to teach, yet lack understanding. Rendering with ''though'' makes the relation
    clear in idiomatic English while preserving the negation.'
- source_word: μήτε ... μήτε
  chosen: neither ... nor
  lexicon: BDAG
  rationale: Standard correlative negation carried over directly into English.
- source_word: ἃ λέγουσιν
  chosen: what they are saying
  alternatives:
  - the things they say
  - what they say
  lexicon: BDAG
  rationale: The relative pronoun plus verb refers to the content of their speech.
    Progressive 'are saying' fits the present tense and the immediate discourse.
- source_word: περὶ τίνων
  chosen: the things about which
  alternatives:
  - what
  - that about which
  lexicon: BDAG
  rationale: The preposition περί with the interrogative/indefinite expression points
    to the matters under discussion. 'The things about which' is slightly formal but
    keeps the structure clear.
- source_word: διαβεβαιοῦνται
  chosen: they speak so confidently
  alternatives:
  - they insist
  - they make confident assertions
  - they strongly affirm
  lexicon: BDAG
  rationale: The middle/passive-form verb here conveys strong assertion or confident
    insistence. 'Speak so confidently' communicates the force in readable modern English
    and matches the critique of dogmatic speech without understanding.
