theological_decisions:
- issue: Rendering of πίστις in a virtue list
  chosen_reading: faith
  alternative_readings:
  - faithfulness
  rationale: The doctrine file sets 'faith' as the default rendering for πίστις, with
    alternatives preserved in footnotes where contested. Here the context could support
    either inward faith or outward faithfulness, so the default is retained in the
    main text and the alternative is preserved in a footnote rather than resolved
    dogmatically.
