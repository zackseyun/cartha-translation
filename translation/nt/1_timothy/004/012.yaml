id: 1TI.4.12
reference: 1 Timothy 4:12
source:
  edition: SBLGNT
  text: μηδείς σου τῆς νεότητος καταφρονείτω, ἀλλὰ τύπος γίνου τῶν πιστῶν ἐν λόγῳ,
    ἐν ἀναστροφῇ, ἐν ⸀ἀγάπῃ, ἐν πίστει, ἐν ἁγνείᾳ.
translation:
  text: Let no one look down on your youth, but be an example for the believers in
    speech, in conduct, in love, in faith, in purity.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "in faithfulness." The Greek word can denote either faith or faithfulness
      in this context.
    reason: alternative_reading
lexical_decisions:
- source_word: μηδείς
  chosen: Let no one
  alternatives:
  - No one should
  - Let nobody
  lexicon: BDAG
  rationale: With the present imperative καταφρονείτω, the idiomatic English prohibitive
    exhortation is best expressed as 'Let no one...' rather than a bare indicative.
- source_word: τῆς νεότητος
  chosen: your youth
  alternatives:
  - your young age
  - your youthfulness
  lexicon: BDAG
  rationale: νεότης denotes youth or young age. 'Your youth' is concise, natural English
    and preserves the genitive construction with σου.
- source_word: καταφρονείτω
  chosen: look down on
  alternatives:
  - despise
  - disregard
  - treat with contempt
  lexicon: BDAG
  rationale: καταφρονέω means to look down on or treat with contempt. 'Look down on'
    is readable modern English and captures the social sense without sounding archaic
    like 'despise'.
- source_word: τύπος
  chosen: an example
  alternatives:
  - a model
  - a pattern
  lexicon: BDAG
  rationale: τύπος here refers to an exemplary pattern to be imitated. 'Example' is
    the clearest modern rendering in this pastoral context.
- source_word: γίνου
  chosen: be
  alternatives:
  - become
  - show yourself to be
  lexicon: BDAG
  rationale: Although γίνομαι can mean 'become,' in imperative usage with a predicate
    nominative it often carries the force 'be' or 'prove to be.' 'Be' is the most
    natural English exhortation here.
- source_word: τῶν πιστῶν
  chosen: for the believers
  alternatives:
  - of the believers
  - to the believers
  - for the faithful
  lexicon: BDAG
  rationale: The genitive after τύπος can be understood as the group for whom Timothy
    is to serve as an example. 'For the believers' communicates this clearly. 'Believers'
    is preferable to 'faithful' here because πιστῶν most naturally denotes believing
    people in this context.
- source_word: ἐν λόγῳ
  chosen: in speech
  alternatives:
  - in word
  - in what you say
  lexicon: BDAG
  rationale: λόγος in this virtue list refers to manner of speaking. 'In speech' is
    concise and idiomatic.
- source_word: ἐν ἀναστροφῇ
  chosen: in conduct
  alternatives:
  - in way of life
  - in behavior
  lexicon: BDAG
  rationale: ἀναστροφή commonly denotes conduct or way of life. 'Conduct' is compact
    and fits the list structure well.
- source_word: ἐν ἀγάπῃ
  chosen: in love
  lexicon: BDAG
  rationale: Per doctrine defaults, ἀγάπη is rendered 'love.' The phrase names the
    sphere or quality in which Timothy is to be exemplary.
- source_word: ἐν πίστει
  chosen: in faith
  alternatives:
  - in faithfulness
  - in trust
  lexicon: BDAG
  rationale: Per doctrine defaults, πίστις is rendered 'faith' in the main text. In
    this virtue list, 'faith' may denote trust in God or the quality of faithful Christian
    belief; the default rendering preserves that breadth without over-resolving the
    nuance.
- source_word: ἐν ἁγνείᾳ
  chosen: in purity
  alternatives:
  - in chastity
  - in moral purity
  lexicon: BDAG
  rationale: ἁγνεία denotes purity, especially moral or sexual purity in this pastoral
    setting. 'Purity' is the most natural broad rendering; more specific alternatives
    are interpretive.
