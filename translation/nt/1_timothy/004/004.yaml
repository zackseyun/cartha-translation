theological_decisions:
- issue: Scope of κτίσμα in relation to food laws/ascetic prohibition context
  chosen_reading: Rendered broadly as 'every creation of God' rather than narrowing
    to 'every creature' or paraphrasing directly as 'all food.'
  alternative_readings:
  - every creature of God
  - everything created by God
  - all food created by God
  rationale: The immediate context concerns foods and ascetic prohibitions, but the
    Greek wording itself is broader. The translation preserves Paul's creational grounding
    without importing a narrower paraphrase. This maintains theological tension only
    insofar as the text itself applies a broad creational principle to the issue of
    food.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Conditional force of λαμβανόμενον with μετὰ εὐχαριστίας
  chosen_reading: Expressed as 'if it is received with thanksgiving.'
  alternative_readings:
  - when it is received with thanksgiving
  - being received with thanksgiving
  rationale: This avoids overstating the participle while making clear that the non-rejection
    of the created thing is tied to its reception with thanksgiving. It preserves
    the text's practical and theological condition without adding doctrinal claims.
  doctrine_reference: Translation philosophy §3
