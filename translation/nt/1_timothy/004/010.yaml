theological_decisions:
- issue: Meaning of 'Savior of all people, especially of believers'
  chosen_reading: Retain the broad statement as written, with 'especially' indicating
    a distinct, heightened sense in relation to believers without narrowing 'all people'
    to 'all kinds of people' or asserting universal salvation in the translation itself.
  alternative_readings:
  - '''Savior'' as common-preserver of all and redemptive-savior of believers'
  - universal-salvation reading
  - '''all people'' meaning ''all kinds of people'''
  rationale: The Greek text itself states both universality ('all people') and particularity
    ('especially of believers'). Per doctrine, the translation should preserve this
    theological tension rather than resolve it toward a specific denominational system
    or doctrinal conclusion.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
