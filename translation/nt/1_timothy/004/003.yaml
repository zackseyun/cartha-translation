theological_decisions:
- issue: Whether τοῖς πιστοῖς καὶ ἐπεγνωκόσι τὴν ἀλήθειαν refers to one group or two
    distinct groups
  chosen_reading: 'One group described by two coordinated characteristics: believers
    who have come to know the truth'
  alternative_readings:
  - 'Two groups: believers and those who have known the truth'
  rationale: The shared article with coordinated participial/adjectival descriptors
    most naturally identifies the same people from two angles. This avoids implying
    two separate classes of recipients without grammatical necessity.
  doctrine_reference: Preserve theological tension rather than resolve it; grammar
    here sufficiently favors a single group.
