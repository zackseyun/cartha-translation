id: 1TI.4.1
reference: 1 Timothy 4:1
source:
  edition: SBLGNT
  text: Τὸ δὲ πνεῦμα ῥητῶς λέγει ὅτι ἐν ὑστέροις καιροῖς ἀποστήσονταί τινες τῆς πίστεως,
    προσέχοντες πνεύμασι πλάνοις καὶ διδασκαλίαις δαιμονίων
translation:
  text: Now the Spirit explicitly says that in later times some will depart from the
    faith, paying attention to deceitful spirits and teachings of demons,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "deceiving spirits."
    reason: lexical_alternative
  - marker: b
    text: Or "in latter times."
    reason: lexical_alternative
  - marker: c
    text: Or "will fall away from the faith."
    reason: lexical_alternative
lexical_decisions:
- source_word: Τὸ ... πνεῦμα
  chosen: the Spirit
  alternatives:
  - the spirit
  lexicon: BDAG
  rationale: With the article and in Pauline context, this most naturally refers to
    the Holy Spirit rather than a generic spirit. Capitalization reflects the referent
    in English, though Greek manuscripts do not mark case this way.
- source_word: δὲ
  chosen: Now
  alternatives:
  - But
  - And
  lexicon: BDAG
  rationale: δέ here marks a mild transition rather than strong contrast. 'Now' gives
    readable modern English while preserving discourse movement.
- source_word: ῥητῶς
  chosen: explicitly
  alternatives:
  - expressly
  - clearly
  lexicon: BDAG
  rationale: The adverb means in an explicit or unmistakable manner. 'Explicitly'
    is natural modern English and preserves the force better than the more archaic
    'expressly'.
- source_word: λέγει
  chosen: says
  alternatives:
  - speaks
  lexicon: BDAG
  rationale: Present tense is retained as 'says,' a common way to render scriptural
    or prophetic present speech in English.
- source_word: ἐν ὑστέροις καιροῖς
  chosen: in later times
  alternatives:
  - in latter times
  - in future times
  lexicon: BDAG
  rationale: The phrase refers to subsequent periods relative to the writer's present,
    not necessarily only the final eschatological end. 'Later times' is accurate and
    avoids overloading the phrase with technical end-times connotations.
- source_word: ἀποστήσονταί
  chosen: will depart
  alternatives:
  - will fall away
  - will withdraw
  lexicon: BDAG
  rationale: Future middle of ἀφίσταμαι conveys departure or defection. 'Will depart'
    is a balanced rendering that preserves the metaphor without importing a more systematized
    theological reading. 'Fall away' is possible but more interpretive.
- source_word: τινες
  chosen: some
  alternatives:
  - certain ones
  lexicon: BDAG
  rationale: Indefinite plural pronoun naturally rendered 'some' in idiomatic English.
- source_word: τῆς πίστεως
  chosen: the faith
  alternatives:
  - the faithfulness
  - the trust
  lexicon: BDAG
  rationale: Although πίστις often means 'faith,' with the article in this context
    it most naturally denotes the Christian faith as the body/content of belief. This
    aligns with the project's default rendering while recognizing the semantic range.
- source_word: προσέχοντες
  chosen: paying attention to
  alternatives:
  - devoting themselves to
  - giving heed to
  lexicon: BDAG
  rationale: The participle explains the manner/cause of their departure. 'Paying
    attention to' is clear modern English and preserves the sense of attaching oneself
    to or heeding.
- source_word: πνεύμασι πλάνοις
  chosen: deceitful spirits
  alternatives:
  - deceiving spirits
  - wandering spirits
  lexicon: BDAG
  rationale: πλάνος can mean leading astray or deceptive. 'Deceitful spirits' communicates
    the adjectival force naturally in English; 'deceiving spirits' is also viable
    and preserved in a footnote.
- source_word: διδασκαλίαις δαιμονίων
  chosen: teachings of demons
  alternatives:
  - doctrines of demons
  - demonic teachings
  lexicon: BDAG
  rationale: 'The genitive is best taken as source or association: teachings originating
    with demons or characterized by them. ''Teachings of demons'' is more transparent
    than the traditional but somewhat ecclesiastical ''doctrines of demons.'''
