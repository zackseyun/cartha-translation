theological_decisions:
- issue: Referent of 'the Spirit'
  chosen_reading: The Holy Spirit
  alternative_readings:
  - a prophetic spirit
  - the human spirit
  rationale: In this epistolary and prophetic context, the phrase most naturally refers
    to the Holy Spirit speaking prophetically. This does not require specifying the
    exact mode of revelation beyond what the text states.
  doctrine_reference: 'Affirmations; Translation philosophy #1'
- issue: Force of 'the faith'
  chosen_reading: the Christian faith as the content/body of belief
  alternative_readings:
  - personal faith/trust
  - faithfulness
  rationale: The article and context of apostasy from orthodox teaching favor an objective
    sense ('the faith'). This preserves the warning without importing a denominational
    doctrine of apostasy beyond the text.
  doctrine_reference: 'Contested terms: πίστις → faith; Translation philosophy #3'
