theological_decisions:
- issue: Rendering of Χριστός
  chosen_reading: Messiah Jesus
  alternative_readings:
  - Christ Jesus
  rationale: The doctrine file directs that Χριστός be translated as 'Messiah' where
    title sense is present, with 'Christ' reserved where the expression functions
    more like a name. Here the titular force remains intelligible, so 'Messiah Jesus'
    is used in the main text while preserving the traditional alternative in a footnote.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; Contested
    terms table for Χριστός'
- issue: Gendered address τοῖς ἀδελφοῖς
  chosen_reading: the brothers
  alternative_readings:
  - brothers and sisters
  rationale: The Greek form is masculine plural. Per doctrine, gender-accurate rendering
    is preferred in the main text, while inclusivity relevant to context may be noted
    in a footnote. Since Paul likely addresses the believing community broadly, the
    inclusive sense is preserved in a note rather than replacing the masculine form.
  doctrine_reference: 'DOCTRINE.md: Gender-accurate over gender-neutral'
- issue: Sense of πίστις in τῆς πίστεως
  chosen_reading: the faith
  alternative_readings:
  - faith
  - faithfulness
  rationale: The doctrine file sets the default rendering of πίστις as 'faith,' with
    alternatives footnoted where contested. In this context the article and pairing
    with 'teaching' favor the objective sense 'the faith' as the content of Christian
    belief rather than 'faithfulness.'
  doctrine_reference: 'DOCTRINE.md: Contested terms table for πίστις'
