theological_decisions:
- issue: Pastoral authority implied by the imperative παραγγέλλω
  chosen_reading: Render with authoritative force as 'Command' without softening to
    a merely advisory sense.
  alternative_readings:
  - Instruct these things and teach them
  rationale: The verse addresses Timothy with two present imperatives, one of which
    carries directive authority. Translating it strongly reflects the Greek without
    importing extra ecclesial claims beyond the text.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; preserve the source text''s plain sense.'
