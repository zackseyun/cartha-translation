id: 1TI.4.11
reference: 1 Timothy 4:11
source:
  edition: SBLGNT
  text: Παράγγελλε ταῦτα καὶ δίδασκε.
translation:
  text: Command these things and teach them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Instruct these things and teach them.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Παράγγελλε
  chosen: Command
  alternatives:
  - Instruct
  - Direct
  - Charge
  lexicon: BDAG
  rationale: The present active imperative, second person singular, calls for ongoing
    authoritative instruction. 'Command' best reflects παραγγέλλω as giving an order
    or directive, stronger than merely 'instruct.'
- source_word: ταῦτα
  chosen: these things
  alternatives:
  - these
  - this
  lexicon: BDAG
  rationale: The neuter plural demonstrative naturally points back to the preceding
    teachings or instructions. 'These things' is idiomatic English and preserves the
    plural demonstrative force.
- source_word: καὶ
  chosen: and
  alternatives:
  - also
  lexicon: BDAG
  rationale: Simple coordinating conjunction linking the two imperatives; 'and' is
    the most straightforward rendering.
- source_word: δίδασκε
  chosen: teach them
  alternatives:
  - teach
  - keep teaching
  lexicon: BDAG
  rationale: The present active imperative indicates continued action. English often
    leaves the iterative force implicit in the imperative. 'Teach them' makes explicit
    the understood object from ταῦτα for natural English, while preserving the sense
    of instructing others in these matters.
