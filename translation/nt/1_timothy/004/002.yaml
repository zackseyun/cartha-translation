theological_decisions:
- issue: Metaphorical force of κεκαυστηριασμένων
  chosen_reading: Rendered metaphorically as 'has been seared,' implying a conscience
    rendered insensitive rather than making a doctrinal claim about irreversible reprobation.
  alternative_readings:
  - '''branded in their own conscience'''
  - '''cauterized in their own conscience'''
  rationale: The verse uses vivid moral imagery, but the translation should not over-specify
    whether the image is branding for ownership, cauterization causing numbness, or
    final spiritual impossibility. 'Seared' preserves the metaphor and theological
    tension without importing a systematized doctrine.
  doctrine_reference: Preserve theological tension rather than resolve it.
