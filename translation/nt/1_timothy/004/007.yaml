theological_decisions:
- issue: Rendering of the pejorative phrase γραώδεις μύθους
  chosen_reading: Retain the literal pejorative force as 'old-womanish myths' in the
    main text, with the idiomatic alternative 'old wives' myths/tales' preserved in
    a footnote.
  alternative_readings:
  - old wives' tales
  - silly myths
  rationale: The phrase is culturally marked and rhetorically sharp in Greek. A softened
    rendering like 'silly myths' reduces the specific imagery, while the familiar
    English idiom 'old wives' tales' is interpretive and less transparent to the source
    wording. Preserving the literal sense in the main text best fits original-language
    primacy, while the footnote records the common idiomatic alternative.
  doctrine_reference: Translation philosophy §1, §6
