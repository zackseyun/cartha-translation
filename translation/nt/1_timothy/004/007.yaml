id: 1TI.4.7
reference: 1 Timothy 4:7
source:
  edition: SBLGNT
  text: τοὺς δὲ βεβήλους καὶ γραώδεις μύθους παραιτοῦ. γύμναζε δὲ σεαυτὸν πρὸς εὐσέβειαν·
translation:
  text: But reject profane and old-womanish myths, and train yourself for godliness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'old wives' tales.' The Greek literally means 'myths characteristic of
      old women,' a pejorative expression.
    reason: lexical_alternative
lexical_decisions:
- source_word: βεβήλους
  chosen: profane
  alternatives:
  - godless
  - irreverent
  - unholy
  lexicon: BDAG
  rationale: βέβηλος denotes what is worldly or irreverent in contrast to what is
    sacred. 'Profane' preserves the sacred/profane contrast more precisely than the
    broader 'godless.'
- source_word: γραώδεις
  chosen: old-womanish
  alternatives:
  - old wives'
  - silly
  - senile
  lexicon: BDAG
  rationale: The adjective literally means 'characteristic of old women.' 'Old-womanish'
    is a more transparent rendering of the Greek form than the idiomatic 'old wives','
    while preserving the pejorative force. Because the idiom 'old wives' tales' is
    familiar in English, that alternative is preserved in a footnote.
- source_word: μύθους
  chosen: myths
  alternatives:
  - fables
  - legends
  lexicon: BDAG
  rationale: μῦθος is best rendered 'myth' here, referring to fabricated or speculative
    stories. 'Fables' is possible but sounds more literary and traditional than the
    likely sense in context.
- source_word: παραιτοῦ
  chosen: reject
  alternatives:
  - avoid
  - refuse
  - have nothing to do with
  lexicon: BDAG
  rationale: The middle imperative calls Timothy to decline or refuse such things.
    'Reject' is concise and forceful without over-paraphrasing.
- source_word: γύμναζε
  chosen: train
  alternatives:
  - discipline
  - exercise
  lexicon: BDAG
  rationale: The verb evokes athletic training. 'Train' communicates the metaphor
    naturally in modern English and fits the following phrase 'for godliness.'
- source_word: σεαυτόν
  chosen: yourself
  lexicon: BDAG
  rationale: Reflexive pronoun directly indicating Timothy as the object of the training.
- source_word: πρὸς εὐσέβειαν
  chosen: for godliness
  alternatives:
  - toward godliness
  - for piety
  lexicon: BDAG
  rationale: πρός with the accusative here expresses goal or purpose. εὐσέβεια in
    the Pastorals commonly denotes reverent, God-oriented living; 'godliness' is the
    most established and accurate rendering, while 'piety' can sound narrower or more
    formalistic.
- source_word: δὲ
  chosen: But ... and
  alternatives:
  - now
  - however
  lexicon: BDAG
  rationale: The first δέ marks contrast with the preceding context, hence 'But.'
    The second δέ links the positive counterpart command; in English this is naturally
    rendered with simple coordination, 'and,' rather than repeating 'but.'
