id: 1TI.4.8
reference: 1 Timothy 4:8
source:
  edition: SBLGNT
  text: ἡ γὰρ σωματικὴ γυμνασία πρὸς ὀλίγον ἐστὶν ὠφέλιμος, ἡ δὲ εὐσέβεια πρὸς πάντα
    ὠφέλιμός ἐστιν, ἐπαγγελίαν ἔχουσα ζωῆς τῆς νῦν καὶ τῆς μελλούσης.
translation:
  text: For bodily training is beneficial for a little while, but godliness is beneficial
    for all things, since it holds promise for the present life and the coming one.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'physical training' or 'bodily exercise.'
    reason: lexical_alternative
  - marker: b
    text: Or 'for a little' or 'to a small extent'; the Greek may indicate limited
      duration or limited extent.
    reason: lexical_alternative
  - marker: c
    text: Literally, 'having promise of the life now and of the coming [life].'
    reason: lexical_alternative
lexical_decisions:
- source_word: σωματικὴ γυμνασία
  chosen: bodily training
  alternatives:
  - physical training
  - bodily exercise
  lexicon: BDAG
  rationale: γυμνασία denotes training/exercise; 'bodily training' preserves the adjectival
    force of σωματική and avoids sounding narrowly athletic while still natural in
    English.
- source_word: πρὸς ὀλίγον
  chosen: for a little while
  alternatives:
  - for a little
  - to a small extent
  lexicon: BDAG
  rationale: The phrase can denote either limited duration or limited extent. In this
    context contrasting present bodily benefit with broader value of godliness, 'for
    a little while' best captures the likely temporal limitation without overstating
    insignificance.
- source_word: ὠφέλιμος
  chosen: beneficial
  alternatives:
  - profitable
  - useful
  lexicon: BDAG
  rationale: '''Beneficial'' is clear modern English and fits both clauses consistently.
    ''Profitable'' can sound overly economic in contemporary usage.'
- source_word: εὐσέβεια
  chosen: godliness
  alternatives:
  - piety
  - devotion
  lexicon: BDAG
  rationale: In the Pastoral Epistles εὐσέβεια is a key term for reverent, God-oriented
    life. 'Godliness' is the most established and accurate English rendering here;
    'piety' may sound narrower or more formalistic.
- source_word: πρὸς πάντα
  chosen: for all things
  alternatives:
  - in every way
  - for everything
  lexicon: BDAG
  rationale: A fairly formal rendering preserves the breadth of the Greek. 'For all
    things' communicates comprehensive usefulness while staying close to the source.
- source_word: ἐπαγγελίαν ἔχουσα
  chosen: since it holds promise
  alternatives:
  - having promise
  - because it has promise
  lexicon: BDAG
  rationale: The participial phrase modifies εὐσέβεια and gives the reason for its
    universal benefit. 'Since it holds promise' is idiomatic and preserves the explanatory
    force.
- source_word: ζωῆς τῆς νῦν
  chosen: the present life
  alternatives:
  - the life now
  - this present life
  lexicon: BDAG
  rationale: This naturally expresses the genitive construction in English and contrasts
    well with the future life.
- source_word: τῆς μελλούσης
  chosen: the coming one
  alternatives:
  - the life to come
  - the coming life
  lexicon: BDAG
  rationale: The participle is elliptical, with ζωή understood from the previous phrase.
    'The coming one' preserves the ellipsis in smooth English, though the sense is
    'the coming life.'
