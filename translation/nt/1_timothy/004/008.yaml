theological_decisions:
- issue: Scope of bodily training's value
  chosen_reading: bodily training has limited value in contrast to the comprehensive
    value of godliness
  alternative_readings:
  - bodily training has some value
  - bodily training has value only for a short time
  rationale: The verse contrasts relative usefulness, not absolute worthlessness.
    The translation avoids implying that physical discipline is evil or meaningless,
    while preserving Paul's prioritization of godliness.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather
    than resolve it'
