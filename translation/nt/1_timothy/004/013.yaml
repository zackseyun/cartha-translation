id: 1TI.4.13
reference: 1 Timothy 4:13
source:
  edition: SBLGNT
  text: ἕως ἔρχομαι πρόσεχε τῇ ἀναγνώσει, τῇ παρακλήσει, τῇ διδασκαλίᾳ.
translation:
  text: Until I come, devote yourself to the public reading, to exhortation, to teaching.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the reading of Scripture.' The Greek says simply 'the reading,' but
      in context it likely refers to public Scripture reading in the assembly.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἕως
  chosen: Until
  alternatives:
  - while
  - until the time that
  lexicon: BDAG
  rationale: Temporal conjunction introducing the duration of Timothy's responsibility
    up to Paul's arrival. 'Until' is the most natural and direct English equivalent
    here.
- source_word: ἔρχομαι
  chosen: I come
  alternatives:
  - I arrive
  lexicon: BDAG
  rationale: Present middle/passive in form with future-oriented sense in context.
    'I come' preserves the Greek wording naturally in English after 'until.'
- source_word: πρόσεχε
  chosen: devote yourself to
  alternatives:
  - give attention to
  - pay attention to
  lexicon: BDAG
  rationale: The imperative προσέχω here calls for sustained attention and application,
    not merely momentary notice. 'Devote yourself to' captures the durative pastoral
    force better than the weaker 'pay attention to.'
- source_word: τῇ ἀναγνώσει
  chosen: the public reading
  alternatives:
  - reading
  - the reading of Scripture
  lexicon: BDAG
  rationale: ἀνάγνωσις can mean reading, and in this ecclesial context likely refers
    to the public reading in the assembly, especially of Scripture. 'The public reading'
    makes the likely sense explicit without over-specifying beyond the Greek; 'of
    Scripture' is preserved as an alternative rather than placed in the main text
    because the object is not stated.
- source_word: τῇ παρακλήσει
  chosen: exhortation
  alternatives:
  - encouragement
  - appeal
  lexicon: BDAG
  rationale: παράκλησις can denote encouragement or exhortation. In a ministry-instruction
    sequence alongside reading and teaching, 'exhortation' best reflects the directive
    and pastoral sense.
- source_word: τῇ διδασκαλίᾳ
  chosen: teaching
  alternatives:
  - instruction
  - doctrine
  lexicon: BDAG
  rationale: διδασκαλία here refers to the act/content of teaching. 'Teaching' is
    clear modern English and avoids the potentially narrower or more systematized
    sense of 'doctrine.'
