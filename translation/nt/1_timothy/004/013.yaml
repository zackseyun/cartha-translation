theological_decisions:
- issue: Whether ἀνάγνωσις should be made explicitly scriptural in the main text
  chosen_reading: the public reading
  alternative_readings:
  - the reading of Scripture
  - reading
  rationale: The context of church order and ministry strongly suggests public reading
    of Scripture, but the Greek text itself does not state 'Scripture.' To avoid importing
    an unstated object while still reflecting likely ecclesial practice, the main
    text uses 'the public reading' and preserves the more explicit alternative in
    a footnote.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Preserve theological tension rather than resolve it.'
