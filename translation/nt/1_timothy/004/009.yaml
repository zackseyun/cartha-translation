id: 1TI.4.9
reference: 1 Timothy 4:9
source:
  edition: SBLGNT
  text: πιστὸς ὁ λόγος καὶ πάσης ἀποδοχῆς ἄξιος,
translation:
  text: The saying is trustworthy and worthy of full acceptance,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "The word is trustworthy" or "The statement is trustworthy."
    reason: lexical_alternative
lexical_decisions:
- source_word: πιστὸς
  chosen: trustworthy
  alternatives:
  - faithful
  - reliable
  lexicon: BDAG
  rationale: In the formula πιστὸς ὁ λόγος in the Pastoral Epistles, the adjective
    characterizes the statement as dependable or deserving confidence. 'Trustworthy'
    is idiomatic modern English and fits the predicative use better than the less
    natural 'faithful' here.
- source_word: ὁ λόγος
  chosen: the saying
  alternatives:
  - the word
  - the statement
  lexicon: BDAG
  rationale: In this epistolary formula, λόγος refers to a specific saying or statement
    rather than 'word' in a broader theological sense. 'The saying' preserves the
    recognizable formula while remaining natural in English.
- source_word: πάσης
  chosen: full
  alternatives:
  - all
  - every kind of
  lexicon: BDAG
  rationale: The genitive phrase πάσης ἀποδοχῆς idiomatically means complete or full
    acceptance. Rendering πάσης woodenly as 'all' would sound awkward in English;
    'full' captures the force of totality in natural style.
- source_word: ἀποδοχῆς
  chosen: acceptance
  alternatives:
  - reception
  - approval
  lexicon: BDAG
  rationale: ἀποδοχή denotes acceptance or welcome. 'Acceptance' is the clearest modern
    equivalent in this collocation and avoids the narrower nuance of 'approval.'
- source_word: ἄξιος
  chosen: worthy of
  alternatives:
  - deserving of
  lexicon: BDAG
  rationale: ἄξιος with the genitive means 'worthy of' or 'deserving of.' 'Worthy
    of' is the most direct and idiomatic rendering in this formulaic expression.
