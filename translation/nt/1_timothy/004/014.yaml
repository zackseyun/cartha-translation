theological_decisions:
- issue: Whether χάρισμα should be rendered with explicit charismatic/ecclesial specificity
  chosen_reading: gift
  alternative_readings:
  - spiritual gift
  rationale: The context likely concerns a ministry gift or gracious endowment for
    service, but the Greek text itself says only χάρισμα. Rendering it simply as 'gift'
    preserves the text's wording without narrowing it to a particular theological
    framework.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: How to render πρεσβυτέριον without importing later church-polity claims
  chosen_reading: the council of elders
  alternative_readings:
  - the presbytery
  - the eldership
  rationale: The verse indicates a collective body of elders participated in the laying
    on of hands. 'Council of elders' communicates the collective sense while avoiding
    denominationally loaded terminology that could imply a later formal office structure
    beyond what the Greek itself requires.
  doctrine_reference: Affirmations; Translation philosophy §1, §3, §6
