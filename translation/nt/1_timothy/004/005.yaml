theological_decisions:
- issue: Scope of sanctification language in context
  chosen_reading: The verse speaks of food being set apart as acceptable for use,
    not of moral purification or salvation.
  alternative_readings:
  - The verse could be read more generally as 'sanctified' in a broader religious
    sense.
  rationale: The immediate context (1 Tim 4:3-4) concerns foods received with thanksgiving.
    Rendering ἁγιάζεται as 'is made holy' preserves the sanctification language while
    the context controls its referent. This avoids importing sacramental or soteriological
    claims the text itself does not make.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather
    than resolve it; do not import doctrinal claims the text does not make.'
