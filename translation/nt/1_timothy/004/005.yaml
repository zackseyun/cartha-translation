id: 1TI.4.5
reference: 1 Timothy 4:5
source:
  edition: SBLGNT
  text: ἁγιάζεται γὰρ διὰ λόγου θεοῦ καὶ ἐντεύξεως.
translation:
  text: for it is made holy through the word of God and prayer.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'is sanctified.'
    reason: lexical_alternative
  - marker: b
    text: Or 'intercession' or 'petition' for 'prayer.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἁγιάζεται
  chosen: is made holy
  alternatives:
  - is sanctified
  - is consecrated
  lexicon: BDAG
  rationale: Present passive indicative, referring to the food mentioned in the previous
    verse. 'Is made holy' is clear modern English and preserves the passive sense
    without importing a technical theological register. 'Is sanctified' is a traditional
    alternative but less accessible.
- source_word: γὰρ
  chosen: for
  alternatives:
  - because
  lexicon: BDAG
  rationale: Standard explanatory conjunction introducing the reason for the previous
    statement. 'For' fits the concise explanatory force in context.
- source_word: διὰ
  chosen: through
  alternatives:
  - by means of
  lexicon: BDAG
  rationale: With the genitive, διά denotes means or instrumentality. 'Through' is
    natural English and preserves the mediating sense.
- source_word: λόγου θεοῦ
  chosen: the word of God
  alternatives:
  - God's word
  lexicon: BDAG
  rationale: A straightforward rendering of the genitive construction. 'The word of
    God' preserves the familiar biblical phrasing and leaves open whether Paul refers
    specifically to scriptural declaration, God's spoken declaration in creation,
    or divine authorization more broadly.
- source_word: ἐντεύξεως
  chosen: prayer
  alternatives:
  - intercession
  - petition
  lexicon: BDAG
  rationale: Although ἔντευξις can more specifically denote 'intercession' or 'petition,'
    in this context of giving thanks over food a broader 'prayer' best communicates
    the act without overstating a narrower subtype. The alternative is preserved in
    a footnote because the term can carry the nuance of petition/intercession.
