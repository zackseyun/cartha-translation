theological_decisions:
- issue: Rendering Χριστῷ in the Pauline formula ἐν Χριστῷ Ἰησοῦ
  chosen_reading: Messiah
  alternative_readings:
  - Christ
  rationale: The doctrine excerpt directs that Χριστός be translated 'Messiah' where
    title sense is present, while preserving 'Christ' where it functions more like
    a proper name. In this verse, the phrase still carries theological weight as a
    title within Paul's union-with-the-Messiah language, so 'Messiah Jesus' is preferred.
    The traditional 'Christ Jesus' is preserved in a footnote as a lexical alternative.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; Contested
    terms table for Χριστός'
