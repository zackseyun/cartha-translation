id: PHM.1.23
reference: Philemon 1:23
source:
  edition: SBLGNT
  text: ⸀Ἀσπάζεταί σε Ἐπαφρᾶς ὁ συναιχμάλωτός μου ἐν Χριστῷ Ἰησοῦ,
translation:
  text: Epaphras, my fellow prisoner in Messiah Jesus, greets you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more traditionally, 'in Christ Jesus.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀσπάζεταί
  chosen: greets
  alternatives:
  - sends greetings to
  - salutes
  lexicon: BDAG
  rationale: The middle/passive form of ἀσπάζομαι here idiomatically means to greet
    or send greetings. 'Greets' is concise, natural modern English, and fits the singular
    subject Epaphras.
- source_word: σε
  chosen: you
  lexicon: BDAG
  rationale: Second person singular object, referring to Philemon directly. English
    'you' does not mark singular, but context supplies it.
- source_word: Ἐπαφρᾶς
  chosen: Epaphras
  rationale: Personal names are transliterated by standard convention per translation
    philosophy.
- source_word: συναιχμάλωτός
  chosen: fellow prisoner
  alternatives:
  - fellow captive
  - fellow prisoner of war
  lexicon: BDAG
  rationale: The compound noun denotes one imprisoned together with another. 'Fellow
    prisoner' is the most idiomatic and contextually appropriate English rendering;
    'fellow captive' is possible but less natural here.
- source_word: μου
  chosen: my
  rationale: Simple possessive genitive modifying 'fellow prisoner'.
- source_word: ἐν Χριστῷ Ἰησοῦ
  chosen: in Messiah Jesus
  alternatives:
  - in Christ Jesus
  lexicon: BDAG
  rationale: ἐν is retained as 'in,' preserving Paul's characteristic union-with-Christ
    language rather than flattening it to 'for' or 'because of.' Χριστῷ is rendered
    'Messiah' per doctrine default where the title sense is active; here the phrase
    is still recognizably titular rather than merely name-like. 'Jesus' transliterates
    Ἰησοῦ.
