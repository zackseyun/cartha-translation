theological_decisions:
- issue: Nature of Paul's relationship to Onesimus
  chosen_reading: Retain the metaphor of spiritual parenthood without making explicit
    conversion language in the main text.
  alternative_readings:
  - whom I became a father to in prison
  - who became my son while I was in chains
  rationale: The verse strongly implies that Paul led Onesimus to faith, but the Greek
    expresses this through the metaphor ἐγέννησα rather than an explicit doctrinal
    formula. The translation preserves the metaphorical and relational force without
    importing more than the text states.
  doctrine_reference: Translation philosophy §1, §3
