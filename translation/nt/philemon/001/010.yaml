id: PHM.1.10
reference: Philemon 1:10
source:
  edition: SBLGNT
  text: παρακαλῶ σε περὶ τοῦ ἐμοῦ τέκνου, ὃν ἐγέννησα ἐν τοῖς ⸀δεσμοῖς Ὀνήσιμον,
translation:
  text: I appeal to you concerning my own child, Onesimus, whom I fathered in my chains,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'whom I became a father to in my imprisonment.' The Greek uses a birth/begetting
      metaphor for Paul's spiritual relationship to Onesimus.
    reason: lexical_alternative
  - marker: b
    text: '''In my chains'' may also be understood as ''in imprisonment''; the Greek
      keeps the concrete image of bonds.'
    reason: lexical_alternative
lexical_decisions:
- source_word: παρακαλῶ
  chosen: I appeal
  alternatives:
  - I urge
  - I ask
  - I entreat
  lexicon: BDAG
  rationale: παρακαλέω here introduces a personal, earnest request rather than a mere
    statement or command. 'I appeal' fits the epistolary and relational tone of Philemon
    better than the stronger 'I urge' or the weaker 'I ask'.
- source_word: περὶ τοῦ ἐμοῦ τέκνου
  chosen: concerning my own child
  alternatives:
  - for my child
  - about my child
  lexicon: BDAG
  rationale: περί with the genitive commonly means 'concerning/about.' τέκνον can
    denote a literal child or a spiritual child; in this context Paul speaks metaphorically
    of spiritual parentage. 'My own child' preserves ἐμοῦ's possessive emphasis without
    overexplaining in the main text.
- source_word: τέκνου
  chosen: child
  alternatives:
  - son
  lexicon: BDAG
  rationale: τέκνον is broader than 'son' and does not itself specify male offspring
    in the same way υἱός would. Since Onesimus is male, 'son' is possible, but 'child'
    better reflects the Greek term while preserving the affectionate spiritual relationship.
- source_word: ὃν ἐγέννησα
  chosen: whom I fathered
  alternatives:
  - whom I begot
  - whose father I became
  - whom I brought to birth
  lexicon: BDAG
  rationale: γεννάω is literally 'beget/give birth.' In Paul's metaphor of spiritual
    parenthood, 'whom I fathered' communicates the paternal image naturally in English
    and avoids the archaic feel of 'begot.' It also preserves the metaphor more clearly
    than the interpretive 'whose father I became'.
- source_word: ἐν τοῖς δεσμοῖς
  chosen: in my chains
  alternatives:
  - in imprisonment
  - while in prison
  - in my imprisonment
  lexicon: BDAG
  rationale: δεσμοί literally means 'chains/bonds' and is often used metonymically
    for imprisonment. 'In my chains' preserves the concrete image and Paul's self-description,
    while 'my' is supplied naturally in English from the first-person context.
- source_word: Ὀνήσιμον
  chosen: Onesimus
  rationale: Personal names are transliterated by standard convention per project
    philosophy.
