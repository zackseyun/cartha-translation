theological_decisions:
- issue: Anthropological metaphor in σπλάγχνα
  chosen_reading: Rendered idiomatically as 'my very heart' rather than literally
    as 'my inward parts.'
  alternative_readings:
  - my own heart
  - my deepest affections
  rationale: This is a lexical-idiomatic decision rather than a doctrinal one. The
    Greek metaphor refers to deep personal affection; a literal anatomical rendering
    would obscure meaning for modern readers. The chosen wording preserves Paul's
    emotional intensity without importing additional theology.
  doctrine_reference: 'Translation philosophy: optimal equivalence; readable modern
    English, not archaic or academic.'
