id: PHM.1.12
reference: Philemon 1:12
source:
  edition: SBLGNT
  text: ὃν ἀνέπεμψά ⸂σοι αὐτόν, τοῦτ’ ἔστιν τὰ ἐμὰ σπλάγχνα⸃·
translation:
  text: I am sending him back to you—him, that is, my very heart.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'I have sent him back to you' or 'I sent him back to
      you.' The Greek aorist can be represented in different ways in English; the
      present form reflects the letter's perspective as it reaches Philemon.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'my inward parts'; idiomatically, a term for deep affection or
      tender compassion.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὃν
  chosen: him
  alternatives:
  - whom
  lexicon: BDAG
  rationale: Accusative masculine singular relative pronoun referring back to Onesimus.
    'Him' is natural modern English; 'whom' is more formal but not necessary in this
    construction.
- source_word: ἀνέπεμψά
  chosen: I am sending ... back
  alternatives:
  - I sent ... back
  - I have sent ... back
  lexicon: BDAG
  rationale: Aorist indicative of ἀναπέμπω, 'send back, return.' In epistolary context,
    English present progressive often best reflects the letter-carried action from
    the recipient's perspective. 'Back' is required by the compound verb's sense.
- source_word: σοι
  chosen: to you
  alternatives:
  - you
  lexicon: BDAG
  rationale: Dative second person singular marking the recipient of the sending. 'To
    you' makes the relation explicit and idiomatic in English.
- source_word: αὐτόν
  chosen: him
  alternatives:
  - him himself
  lexicon: BDAG
  rationale: The repeated pronoun adds emphasis after σοι. Rendering it again as 'him'
    preserves the emphatic repetition without awkwardness.
- source_word: τοῦτ’ ἔστιν
  chosen: that is
  alternatives:
  - that means
  - namely
  lexicon: BDAG
  rationale: Standard explanatory formula introducing Paul's appositional clarification.
    'That is' preserves the explanatory force with minimal interpretation.
- source_word: τὰ ἐμὰ σπλάγχνα
  chosen: my very heart
  alternatives:
  - my own heart
  - my deepest affections
  - my inward parts
  lexicon: BDAG
  rationale: σπλάγχνα literally denotes inward organs but idiomatically expresses
    deep affection or the seat of tender feeling. 'My very heart' communicates the
    emotional force in clear modern English while preserving the singular personal
    intensity of Paul's identification with Onesimus.
