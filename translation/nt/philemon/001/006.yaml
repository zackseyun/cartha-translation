theological_decisions:
- issue: Sense of κοινωνία τῆς πίστεώς σου
  chosen_reading: '''the sharing of your faith'' as the active expression/communication
    of Philemon''s faith'
  alternative_readings:
  - '''the fellowship of your faith'' referring to participation in the faith'
  - '''the partnership produced by your faith'''
  rationale: The phrase is famously difficult. In context Paul prays for Philemon
    in relation to his love and practical reception of Onesimus; an outwardly effective
    sharing/expression of faith fits the paraenetic flow. This preserves the text's
    practical thrust without excluding communal overtones inherent in κοινωνία.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather
    than resolve it)
- issue: Referent of 'in us'
  chosen_reading: collective 'us' referring to Paul, Philemon, and fellow believers
  alternative_readings:
  - textual variant 'in you' referring specifically to Philemon
  rationale: The printed Greek text reads ἐν ἡμῖν, which is retained. This avoids
    narrowing the good found in the Christian life to Philemon alone while fitting
    Paul's communal perspective.
