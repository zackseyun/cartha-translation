id: PHM.1.13
reference: Philemon 1:13
source:
  edition: SBLGNT
  text: ὃν ἐγὼ ἐβουλόμην πρὸς ἐμαυτὸν κατέχειν, ἵνα ὑπὲρ σοῦ ⸂μοι διακονῇ⸃ ἐν τοῖς
    δεσμοῖς τοῦ εὐαγγελίου,
translation:
  text: I wanted to keep him with me, so that on your behalf he might serve me in
    the chains of the gospel,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'for the gospel'—that is, chains borne because of the gospel.
    reason: alternative_reading
lexical_decisions:
- source_word: ὃν
  chosen: him
  alternatives:
  - whom
  lexicon: BDAG
  rationale: Accusative masculine singular relative pronoun referring back to Onesimus.
    'Him' is natural modern English; 'whom' is more formal but unnecessary in the
    main text.
- source_word: ἐβουλόμην
  chosen: I wanted
  alternatives:
  - I was wanting
  - I wished
  lexicon: BDAG
  rationale: Imperfect middle of βούλομαι expresses Paul's desire/intention in past
    time. 'I wanted' gives clear idiomatic English without overpressing the imperfect
    nuance.
- source_word: πρὸς ἐμαυτὸν
  chosen: with me
  alternatives:
  - for myself
  - by me
  lexicon: BDAG
  rationale: The phrase with κατέχειν conveys keeping someone in one's own company/presence.
    'With me' is the most natural English expression of the relational sense here.
- source_word: κατέχειν
  chosen: to keep
  alternatives:
  - to retain
  - to hold back
  lexicon: BDAG
  rationale: In context Paul means retaining Onesimus with himself. 'Keep' is idiomatic
    and sufficiently precise; 'retain' is possible but less natural.
- source_word: ἵνα
  chosen: so that
  alternatives:
  - in order that
  lexicon: BDAG
  rationale: Introduces purpose. 'So that' preserves the purposive force in readable
    modern English.
- source_word: ὑπὲρ σοῦ
  chosen: on your behalf
  alternatives:
  - for you
  - in your place
  lexicon: BDAG
  rationale: ὑπέρ with genitive here indicates representation/benefit. 'On your behalf'
    best captures that Onesimus' service to Paul would stand in for Philemon's own
    service, without overstating substitution.
- source_word: μοι διακονῇ
  chosen: he might serve me
  alternatives:
  - he might minister to me
  - he might help me
  lexicon: BDAG
  rationale: διακονέω denotes service/assistance. 'Serve me' is broad enough to include
    practical aid and avoids overly ecclesiastical 'minister.' The subjunctive is
    reflected by 'might serve.'
- source_word: ἐν τοῖς δεσμοῖς
  chosen: in the chains
  alternatives:
  - in my imprisonment
  - while I am in chains
  - in bonds
  lexicon: BDAG
  rationale: δεσμοί literally means bonds/chains and is often used for imprisonment.
    'In the chains' preserves the concrete metaphor and Pauline diction better than
    the more abstract 'imprisonment.'
- source_word: τοῦ εὐαγγελίου
  chosen: of the gospel
  alternatives:
  - for the gospel
  lexicon: BDAG
  rationale: 'The genitive may be understood as descriptive/causal: chains associated
    with the gospel. ''Of the gospel'' is formally closer and preserves the compact
    Pauline expression; the causal sense can be noted in a footnote.'
