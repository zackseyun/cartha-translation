theological_decisions:
- issue: Force of τοῦ εὐαγγελίου modifying δεσμοῖς
  chosen_reading: of the gospel
  alternative_readings:
  - for the gospel
  rationale: The phrase likely means Paul's imprisonment is bound up with the gospel,
    i.e., chains borne because of the gospel. The main text keeps the Greek genitive
    compactly as 'of the gospel' rather than resolving it interpretively to 'for the
    gospel.'
  doctrine_reference: 'Translation philosophy #3: Preserve theological tension rather
    than resolve it.'
