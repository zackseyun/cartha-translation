id: PHM.1.25
reference: Philemon 1:25
source:
  edition: SBLGNT
  text: Ἡ χάρις τοῦ ⸀κυρίου Ἰησοῦ Χριστοῦ μετὰ τοῦ πνεύματος ⸀ὑμῶν.
translation:
  text: The grace of the Lord Jesus the Messiah be with your spirit.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, traditionally, 'The grace of the Lord Jesus Christ be with your spirit.'
    reason: alternative_reading
  - marker: b
    text: The pronoun 'your' is plural, reflecting that the closing blessing extends
      beyond Philemon alone to the gathered recipients of the letter.
    reason: lexical_alternative
lexical_decisions:
- source_word: χάρις
  chosen: grace
  alternatives:
  - favor
  - gracious favor
  lexicon: BDAG
  rationale: Standard Pauline benediction term denoting gracious favor/blessing from
    God; 'grace' is the established and most semantically fitting English equivalent
    here.
- source_word: κυρίου
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Per doctrine default for κύριος, 'Lord' best reflects the title's NT
    usage and christological weight in this benediction.
- source_word: Ἰησοῦ Χριστοῦ
  chosen: Jesus Messiah
  alternatives:
  - Jesus Christ
  lexicon: BDAG
  rationale: Χριστοῦ functions as a title rather than merely a fixed surname-like
    element in this blessing formula; per doctrine, titles are translated where context
    supports, so 'Messiah' is preferred while preserving the traditional 'Jesus Christ'
    in a footnote.
- source_word: μετὰ
  chosen: with
  alternatives:
  - be with
  lexicon: BDAG
  rationale: The preposition means 'with'; English idiom in benedictions commonly
    supplies 'be' to make the verbless Greek clause natural.
- source_word: πνεύματος
  chosen: spirit
  alternatives:
  - Spirit
  lexicon: BDAG
  rationale: The lowercase 'spirit' is preferred because the phrase 'with your spirit'
    in Pauline closings refers to the inner person/disposition of the recipients,
    not directly to the Holy Spirit.
- source_word: ὑμῶν
  chosen: your
  alternatives:
  - you all's
  - your (plural)
  lexicon: BDAG
  rationale: Second-person plural pronoun. Standard English 'your' is natural in the
    main text; plurality is worth preserving in a footnote because Philemon is addressed
    to a wider group in the letter closing.
