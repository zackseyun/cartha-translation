theological_decisions:
- issue: Rendering Χριστοῦ in the closing benediction
  chosen_reading: Messiah
  alternative_readings:
  - Christ
  rationale: The doctrine excerpt directs that Christological titles be translated,
    with Χριστός rendered 'Messiah' where title sense is present and 'Christ' where
    name-like. In this formula, title force remains intelligible, so 'Messiah' is
    used while the traditional alternative is preserved in a footnote.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; Contested
    terms table for Χριστός'
- issue: Referent of 'spirit' in 'with your spirit'
  chosen_reading: human spirit / inner person of the recipients
  alternative_readings:
  - Holy Spirit
  rationale: The possessive 'your' strongly indicates the recipients' spirit rather
    than the Holy Spirit. The translation preserves the ambiguity no further than
    the Greek warrants and avoids capitalizing in a way that would import a doctrinal
    claim not made explicitly by the text.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it; do not import doctrinal claims the text does not make'
