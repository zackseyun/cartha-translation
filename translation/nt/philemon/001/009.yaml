theological_decisions:
- issue: Meaning of πρεσβύτης
  chosen_reading: Paul refers to himself as 'an old man' rather than 'an ambassador'
    or church 'elder.'
  alternative_readings:
  - an ambassador
  - an elder
  rationale: Historic interpretation sometimes prefers 'ambassador' because it fits
    Paul's status and avoids an age reference, but the actual Greek word is πρεσβύτης,
    not πρεσβευτής. The plain lexical sense is age-related, and optimal equivalence
    favors that straightforward reading.
  doctrine_reference: Translation philosophy §1 (Original-language primacy over translation
    tradition)
- issue: Rendering of Χριστός
  chosen_reading: Messiah
  alternative_readings:
  - Christ
  rationale: The project default is to translate Χριστός as 'Messiah' where title
    force is present, while preserving 'Christ' as an alternative. In this phrase
    the title remains meaningful rather than merely name-like.
  doctrine_reference: 'DOCTRINE.md Contested terms: Χριστός → Messiah (where title;
    Christ where name-like)'
