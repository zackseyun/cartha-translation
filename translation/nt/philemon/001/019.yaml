id: PHM.1.19
reference: Philemon 1:19
source:
  edition: SBLGNT
  text: ἐγὼ Παῦλος ἔγραψα τῇ ἐμῇ χειρί, ἐγὼ ἀποτίσω· ἵνα μὴ λέγω σοι ὅτι καὶ σεαυτόν
    μοι προσοφείλεις.
translation:
  text: 'I, Paul, write this with my own hand: I will repay it—not to mention to you
    that you owe me even your very self.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'I, Paul, wrote this with my own hand; I will repay it;
      not to say to you that you owe me even yourself.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔγραψα
  chosen: write
  alternatives:
  - wrote
  - have written
  lexicon: BDAG
  rationale: Although formally aorist ('wrote'), in epistolary context English often
    uses the present for naturalness when the writer is drawing attention to the autograph
    at the moment of reading. This preserves the force of Paul's personal written
    guarantee in idiomatic English.
- source_word: τῇ ἐμῇ χειρί
  chosen: with my own hand
  alternatives:
  - by my own hand
  - in my own hand
  lexicon: BDAG
  rationale: Idiomatic expression indicating autograph writing. 'With my own hand'
    is natural English and preserves the emphatic personal guarantee.
- source_word: ἀποτίσω
  chosen: I will repay it
  alternatives:
  - I will pay back
  - I will make restitution
  lexicon: BDAG
  rationale: Future promise to settle Onesimus's debt or loss. 'Repay it' is concise
    and fits the financial context established in the previous verse.
- source_word: ἵνα μὴ λέγω σοι
  chosen: not to mention to you
  alternatives:
  - lest I say to you
  - so that I may not say to you
  lexicon: BDAG
  rationale: This clause functions rhetorically rather than expressing strict purpose.
    'Not to mention to you' captures Paul's tactful irony in natural English while
    preserving the implied statement.
- source_word: σεαυτόν
  chosen: your very self
  alternatives:
  - yourself
  - even yourself
  lexicon: BDAG
  rationale: The reflexive pronoun is intensified by καί in context. 'Your very self'
    brings out the emphasis that Philemon owes Paul more than money—his own person
    or life in a significant sense.
- source_word: προσοφείλεις
  chosen: you owe me
  alternatives:
  - you are indebted to me
  - you still owe me
  lexicon: BDAG
  rationale: The verb denotes owing in addition or besides. 'You owe me' is the clearest
    English rendering; the additive nuance is sufficiently conveyed by the surrounding
    'even your very self'.
