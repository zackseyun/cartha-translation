theological_decisions:
- issue: Nature of Philemon's debt to Paul in 'you owe me even your very self'
  chosen_reading: Retain the metaphorical/personal indebtedness without specifying
    conversion, salvation, or life-debt in the main text.
  alternative_readings:
  - Philemon owes Paul his conversion
  - Philemon owes Paul his physical life
  - Philemon owes Paul a general personal debt
  rationale: The Greek states the indebtedness strongly but does not explicitly define
    its exact basis. To avoid importing a doctrinal or historical claim beyond the
    text, the translation preserves the wording and leaves the precise referent implicit.
  doctrine_reference: Preserve theological tension rather than resolve it.
