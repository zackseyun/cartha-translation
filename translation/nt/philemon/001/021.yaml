id: PHM.1.21
reference: Philemon 1:21
source:
  edition: SBLGNT
  text: πεποιθὼς τῇ ὑπακοῇ σου ἔγραψά σοι, εἰδὼς ὅτι καὶ ὑπὲρ ⸀ἃ λέγω ποιήσεις.
translation:
  text: Confident of your obedience, I wrote to you, knowing that you will do even
    more than I say.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'beyond what I am saying.' Paul may imply that Philemon will exceed the
      specific request he has made, but the text does not state exactly how.
    reason: lexical_alternative
lexical_decisions:
- source_word: πεποιθὼς
  chosen: Confident
  alternatives:
  - Having confidence
  - Trusting
  lexicon: BDAG
  rationale: Perfect active participle from πείθω in the intransitive sense conveys
    a settled state of confidence. 'Confident' gives natural English while preserving
    the participial force introducing the basis for Paul's writing.
- source_word: τῇ ὑπακοῇ σου
  chosen: of your obedience
  alternatives:
  - in your obedience
  - of your compliance
  lexicon: BDAG
  rationale: ὑπακοή commonly means obedience, responsiveness to instruction, or compliance.
    'Obedience' best preserves the relational and moral force of Paul's appeal to
    Philemon's willing submission, without weakening it to mere politeness.
- source_word: ἔγραψά σοι
  chosen: I wrote to you
  alternatives:
  - I have written to you
  lexicon: BDAG
  rationale: Aorist indicative naturally renders as simple past in English. Although
    epistolary aorist can sometimes be translated as an English present perfect, 'I
    wrote to you' is straightforward and fits the context.
- source_word: εἰδὼς
  chosen: knowing
  alternatives:
  - since I know
  - being aware
  lexicon: BDAG
  rationale: Perfect participle functioning adverbially expresses Paul's assured knowledge
    accompanying his writing. 'Knowing' preserves the participial linkage and rhetorical
    confidence.
- source_word: καὶ ὑπὲρ ἃ λέγω
  chosen: even more than I say
  alternatives:
  - more than what I say
  - beyond what I am saying
  lexicon: BDAG
  rationale: ὑπέρ with the accusative relative pronoun ἃ means 'beyond/more than what.'
    'Even more than I say' is idiomatic English and preserves Paul's expectation that
    Philemon will exceed the explicit request.
- source_word: ποιήσεις
  chosen: you will do
  alternatives:
  - you will act
  - you will carry out
  lexicon: BDAG
  rationale: Future indicative of ποιέω is broad and naturally rendered 'you will
    do.' This keeps the statement open-ended, matching Paul's deliberate lack of specificity.
