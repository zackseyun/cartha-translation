theological_decisions:
- issue: Force of ὑπακοή in relation to Paul's appeal
  chosen_reading: Rendered as 'obedience' rather than a softer term such as 'compliance'
    or 'response.'
  alternative_readings:
  - compliance
  - readiness to respond
  rationale: The text explicitly uses ὑπακοή, which carries the sense of obedience.
    Retaining that term preserves the apostolic-authority dynamic in the letter without
    importing coercion beyond the text.
  doctrine_reference: Translation philosophy §1, §5
- issue: Implication of 'more than I say'
  chosen_reading: Left intentionally open-ended rather than specifying what extra
    action Paul expects.
  alternative_readings:
  - a hint that Philemon should free Onesimus
  - a promise merely of generous reception
  rationale: Paul's wording is suggestive but not explicit. The translation preserves
    the rhetorical and theological tension rather than resolving the debated implication
    in the main text.
  doctrine_reference: Translation philosophy §3
