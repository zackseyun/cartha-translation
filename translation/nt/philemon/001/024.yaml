id: PHM.1.24
reference: Philemon 1:24
source:
  edition: SBLGNT
  text: Μᾶρκος, Ἀρίσταρχος, Δημᾶς, Λουκᾶς, οἱ συνεργοί μου.
translation:
  text: Mark, Aristarchus, Demas, and Luke, my fellow workers.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Μᾶρκος
  chosen: Mark
  lexicon: BDAG
  rationale: Standard English transliteration of the personal name Μᾶρκος. Per translation
    philosophy, personal names are transliterated rather than translated.
- source_word: Ἀρίσταρχος
  chosen: Aristarchus
  lexicon: BDAG
  rationale: Standard English transliteration of the personal name Ἀρίσταρχος.
- source_word: Δημᾶς
  chosen: Demas
  lexicon: BDAG
  rationale: Standard English transliteration of the personal name Δημᾶς.
- source_word: Λουκᾶς
  chosen: Luke
  lexicon: BDAG
  rationale: Standard English transliteration of the personal name Λουκᾶς.
- source_word: οἱ συνεργοί
  chosen: fellow workers
  alternatives:
  - coworkers
  - fellow laborers
  - workers together
  lexicon: BDAG
  rationale: 'συνεργός denotes one who works together with another, a partner in labor.
    ''Fellow workers'' is natural modern English and preserves the collaborative sense
    without sounding corporate or overly archaic. The article οἱ functions substantivally
    with συνεργοί, identifying the named persons as a group: ''the fellow workers.''
    In English, the appositional phrase is best rendered simply as ''my fellow workers.'''
- source_word: μου
  chosen: my
  lexicon: BDAG
  rationale: 'Genitive first-person pronoun indicating possession/association: these
    men are identified as Paul''s fellow workers.'
