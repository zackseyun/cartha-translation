theological_decisions:
- issue: Agency implied by the passive verb ἐχωρίσθη
  chosen_reading: Retain the passive 'was separated' without explicitly naming God
    or Onesimus as the agent.
  alternative_readings:
  - he departed
  - God separated him
  rationale: Paul's wording is deliberately restrained and may imply divine providence
    without stating it directly. The translation preserves that theological tension
    rather than resolving it.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
