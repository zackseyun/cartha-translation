id: PHM.1.3
reference: Philemon 1:3
source:
  edition: SBLGNT
  text: χάρις ὑμῖν καὶ εἰρήνη ἀπὸ θεοῦ πατρὸς ἡμῶν καὶ κυρίου Ἰησοῦ Χριστοῦ.
translation:
  text: Grace to you and peace from God our Father and the Lord Jesus the Messiah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or: ''Jesus Christ.'' The Greek Χριστός can function title-like (''Messiah'')
      or, in some contexts, more name-like (''Christ'').'
    reason: alternative_reading
lexical_decisions:
- source_word: χάρις
  chosen: Grace
  alternatives:
  - favor
  - grace
  lexicon: BDAG
  rationale: In Pauline epistolary greetings, χάρις functions as both a conventional
    greeting and a theologically weighty term. 'Grace' preserves the established Pauline
    sense without flattening it to mere 'favor.'
- source_word: ὑμῖν
  chosen: to you
  alternatives:
  - for you
  lexicon: BDAG
  rationale: The dative here is idiomatically rendered 'to you' in English greetings
    and benedictions.
- source_word: εἰρήνη
  chosen: peace
  lexicon: BDAG
  rationale: Standard rendering that preserves both the greeting sense and the likely
    resonance with Hebrew shalom.
- source_word: ἀπὸ
  chosen: from
  lexicon: BDAG
  rationale: The preposition marks source/origin of the grace and peace.
- source_word: θεοῦ πατρὸς ἡμῶν
  chosen: God our Father
  alternatives:
  - our God and Father
  lexicon: BDAG
  rationale: 'The genitive sequence is most naturally read appositionally: ''God our
    Father,'' a standard Pauline formulation. ''Our God and Father'' would suggest
    a different syntactic construal not supported by the absence of a second article
    or conjunction here.'
- source_word: κυρίου
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Per doctrine defaults, κύριος is rendered 'Lord.' This preserves both
    honorific and christological force in Pauline usage.
- source_word: Ἰησοῦ Χριστοῦ
  chosen: Jesus Messiah
  alternatives:
  - Jesus Christ
  lexicon: BDAG
  rationale: Per doctrine defaults, Χριστός is translated 'Messiah' where it functions
    as a title rather than a name-like fixed surname. In this epistolary blessing,
    the titular sense remains intelligible and preserves the meaning of the Greek.
