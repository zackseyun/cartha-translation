- issue: Rendering Χριστοῦ in the christological title Ἰησοῦ Χριστοῦ
  chosen_reading: Jesus Messiah
  alternative_readings:
  - Jesus Christ
  rationale: The project's doctrine specifies translating christological titles to
    preserve meaning, with Χριστός rendered 'Messiah' where title sense is present.
    This verse presents a standard Pauline title formula; rendering it 'Messiah' makes
    the title explicit without altering orthodox christology.
