- issue: Rendering Χριστός in the salutation
  chosen_reading: Messiah
  alternative_readings:
  - Christ
  rationale: The doctrinal guidance prefers translating Χριστός as 'Messiah' where
    the title sense is active. In this opening identification, the title remains semantically
    meaningful rather than merely functioning as a fixed surname, so 'Messiah Jesus'
    is preferred.
