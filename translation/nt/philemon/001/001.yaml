id: PHM.1.1
reference: Philemon 1:1
source:
  edition: SBLGNT
  text: Παῦλος δέσμιος Χριστοῦ Ἰησοῦ καὶ Τιμόθεος ὁ ἀδελφὸς Φιλήμονι τῷ ἀγαπητῷ καὶ
    συνεργῷ ἡμῶν
translation:
  text: Paul, a prisoner of Messiah Jesus, and Timothy our brother, to Philemon our
    beloved fellow worker,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Paul, a prisoner for Christ Jesus.' The Greek genitive can be understood
      as indicating relationship to or cause in relation to Messiah Jesus.
    reason: alternative_reading
  - marker: b
    text: Greek 'Christ'; translated 'Messiah' here because Χριστός functions as a
      title.
    reason: lexical_alternative
lexical_decisions:
- source_word: δέσμιος
  chosen: prisoner
  alternatives:
  - prisoner for
  - captive
  lexicon: BDAG
  rationale: The noun denotes one in bonds or imprisonment. 'Prisoner' is the most
    natural modern English equivalent. The genitive that follows is left as 'of Messiah
    Jesus' rather than expanded to 'for' in the main text, preserving the Greek's
    compactness while allowing the relational nuance to be inferred.
- source_word: Χριστοῦ
  chosen: Messiah
  alternatives:
  - Christ
  lexicon: BDAG
  rationale: Per doctrine, Χριστός is translated as 'Messiah' where it functions as
    a title rather than a name-like element. Here in the epistolary opening, the titular
    sense remains clear enough to preserve the meaning of the Greek title.
- source_word: Ἰησοῦ
  chosen: Jesus
  lexicon: BDAG
  rationale: Standard transliteration of the personal name, in keeping with the policy
    to transliterate names and translate titles.
- source_word: ὁ ἀδελφὸς
  chosen: our brother
  alternatives:
  - the brother
  - brother
  lexicon: BDAG
  rationale: Although the Greek has the article ('the brother'), English epistolary
    style is more natural with 'our brother,' and the possessive sense is commonly
    implied in such Christian familial language. This also reflects the relational
    force without wooden literalism.
- source_word: ἀγαπητῷ
  chosen: beloved
  alternatives:
  - dear
  - loved
  lexicon: BDAG
  rationale: '''Beloved'' preserves the warmth and covenantal/Christian affection
    of the adjective more fully than the flatter ''dear.'''
- source_word: συνεργῷ
  chosen: fellow worker
  alternatives:
  - coworker
  - partner
  lexicon: BDAG
  rationale: The compound literally denotes one who works together with another. 'Fellow
    worker' is a clear and established rendering in Pauline contexts, preserving ministry-labor
    connotations better than the more generic 'partner'.
- source_word: ἡμῶν
  chosen: our
  alternatives:
  - my
  lexicon: BDAG
  rationale: The plural pronoun modifies 'beloved' and 'fellow worker' in the Greek.
    It should be retained as 'our,' reflecting the joint sender frame ('Paul ... and
    Timothy') rather than singularizing it.
- source_word: Φιλήμονι
  chosen: to Philemon
  lexicon: BDAG
  rationale: Dative of address in epistolary salutation, naturally rendered with 'to'
    in English.
- source_word: καὶ Τιμόθεος
  chosen: and Timothy
  lexicon: BDAG
  rationale: Coordinates Timothy with Paul as co-sender in the salutation; straightforwardly
    rendered with 'and Timothy'.
