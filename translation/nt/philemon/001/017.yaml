theological_decisions:
- issue: Relational force of κοινωνός in Paul's appeal
  chosen_reading: partner
  alternative_readings:
  - companion
  - fellowship-partner
  - sharer
  rationale: The verse concerns shared participation and standing between Paul and
    Philemon, not a sacramental or doctrinally technical concept. 'Partner' best communicates
    the mutual relationship without importing denominational language. This preserves
    the social and ecclesial force of Paul's appeal.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve source
    sense without importing doctrinal claims.'
