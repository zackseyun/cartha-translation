id: PHM.1.17
reference: Philemon 1:17
source:
  edition: SBLGNT
  text: Εἰ οὖν με ἔχεις κοινωνόν, προσλαβοῦ αὐτὸν ὡς ἐμέ.
translation:
  text: So if you consider me a partner, receive him as you would me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'welcome him.' The verb can carry the sense of receiving someone favorably
      or accepting them into fellowship.
    reason: lexical_alternative
lexical_decisions:
- source_word: Εἰ οὖν
  chosen: So if
  alternatives:
  - Therefore if
  - If then
  lexicon: BDAG
  rationale: Combines the inferential οὖν with the conditional εἰ in natural English.
    'So if' preserves the logical connection to the preceding appeal while remaining
    readable modern English.
- source_word: ἔχεις κοινωνόν
  chosen: you consider me a partner
  alternatives:
  - you have me as a partner
  - you regard me as a sharer/fellow participant
  lexicon: BDAG
  rationale: κοινωνός denotes one who shares in something with another, often 'partner'
    or 'fellow participant.' In English, 'consider me a partner' best conveys the
    relational sense with ἔχεις in this idiom, rather than the less natural 'have
    me as a partner.' 'Partner' fits Paul's appeal to shared fellowship and mutual
    standing.
- source_word: προσλαβοῦ
  chosen: receive
  alternatives:
  - welcome
  - accept
  lexicon: BDAG
  rationale: The middle imperative of προσλαμβάνομαι can mean 'receive,' 'welcome,'
    or 'accept.' 'Receive' preserves the formal force of Paul's request and leaves
    room for both personal welcome and restored relational acceptance. 'Welcome' is
    a strong alternative but slightly narrows the sense toward hospitality.
- source_word: αὐτὸν
  chosen: him
  lexicon: BDAG
  rationale: Straightforward accusative pronoun referring to Onesimus in context.
- source_word: ὡς ἐμέ
  chosen: as you would me
  alternatives:
  - as me
  - as if I were there
  lexicon: BDAG
  rationale: English idiom requires expansion for clarity. 'As you would me' makes
    explicit the comparative force of ὡς with the accusative pronoun and communicates
    Paul's request that Onesimus be treated with the same regard Paul himself would
    receive.
