id: PHM.1.22
reference: Philemon 1:22
source:
  edition: SBLGNT
  text: ἅμα δὲ καὶ ἑτοίμαζέ μοι ξενίαν, ἐλπίζω γὰρ ὅτι διὰ τῶν προσευχῶν ὑμῶν χαρισθήσομαι
    ὑμῖν.
translation:
  text: At the same time, also prepare a guest room for me, for I hope that through
    your prayers I will be graciously given to you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'lodging' or 'hospitality'; the Greek term can refer either to the act
      of hospitality or to the place prepared for a guest.
    reason: lexical_alternative
  - marker: b
    text: Or 'I will be granted to you' or 'I will be given to you'; the Greek verb
      carries the sense of being freely or graciously given, likely implying God's
      agency.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἅμα δὲ καὶ
  chosen: At the same time, also
  alternatives:
  - Meanwhile, also
  - At the same time
  - And at the same time
  lexicon: BDAG
  rationale: The combination marks an additional request alongside the previous appeal.
    'At the same time' captures ἅμα naturally, while 'also' preserves καὶ. δέ is represented
    by the connective flow rather than a separate English particle.
- source_word: ἑτοίμαζέ
  chosen: prepare
  alternatives:
  - get ready
  - make ready
  lexicon: BDAG
  rationale: Present active imperative, calling for an ongoing or immediate practical
    action. 'Prepare' is idiomatic and suitably direct in English.
- source_word: μοι
  chosen: for me
  alternatives:
  - me
  lexicon: BDAG
  rationale: 'The dative is naturally expressed in English as beneficiary: Philemon
    is to prepare lodging for Paul.'
- source_word: ξενίαν
  chosen: a guest room
  alternatives:
  - lodging
  - hospitality
  - a place to stay
  lexicon: BDAG
  rationale: ξενία can denote hospitality or lodging; here, with ἑτοίμαζέ and μοι,
    the concrete sense of accommodation is most natural. 'Guest room' is clear modern
    English and fits the singular noun.
- source_word: ἐλπίζω γὰρ ὅτι
  chosen: for I hope that
  alternatives:
  - for I am hoping that
  - because I hope that
  lexicon: BDAG
  rationale: γάρ gives the reason for the request, and ἐλπίζω with ὅτι introduces
    the content of Paul's expectation. 'For I hope that' preserves both sense and
    tone.
- source_word: διὰ τῶν προσευχῶν ὑμῶν
  chosen: through your prayers
  alternatives:
  - because of your prayers
  - by means of your prayers
  lexicon: BDAG
  rationale: διά with the genitive commonly expresses means or agency. 'Through your
    prayers' is the most natural rendering and preserves the instrumental nuance.
- source_word: χαρισθήσομαι
  chosen: will be graciously given
  alternatives:
  - will be granted
  - will be given
  lexicon: BDAG
  rationale: Future passive of χαρίζομαι, whose semantic range includes giving freely
    or graciously granting. In context Paul means he expects to be restored to them
    as a gracious gift from God, so 'graciously given' preserves the passive and the
    grace nuance better than the flatter 'granted' or 'given'.
- source_word: ὑμῖν
  chosen: to you
  alternatives:
  - for you
  lexicon: BDAG
  rationale: The dative here is best rendered 'to you,' indicating Paul's hoped-for
    return to Philemon and the church associated with him.
