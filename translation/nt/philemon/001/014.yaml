id: PHM.1.14
reference: Philemon 1:14
source:
  edition: SBLGNT
  text: χωρὶς δὲ τῆς σῆς γνώμης οὐδὲν ἠθέλησα ποιῆσαι, ἵνα μὴ ὡς κατὰ ἀνάγκην τὸ ἀγαθόν
    σου ᾖ ἀλλὰ κατὰ ἑκούσιον·
translation:
  text: But without your consent I wanted to do nothing, so that your good deed might
    not be as if by compulsion, but voluntary.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'without your approval' or 'without your opinion.'
    reason: lexical_alternative
  - marker: b
    text: Or 'your goodness' or 'your kindness'; the Greek can refer either to Philemon's
      good action in this matter or, more abstractly, to his goodness.
    reason: lexical_alternative
  - marker: c
    text: Literally 'but according to what is voluntary'; that is, 'of your own free
      will.'
    reason: lexical_alternative
lexical_decisions:
- source_word: χωρὶς ... τῆς σῆς γνώμης
  chosen: without your consent
  alternatives:
  - without your opinion
  - without your approval
  lexicon: BDAG
  rationale: γνώμη can denote opinion, judgment, intention, or consent/approval. In
    this context Paul is speaking of acting only with Philemon's permission regarding
    Onesimus, so 'consent' best captures the relational and volitional sense in natural
    English.
- source_word: οὐδὲν ἠθέλησα ποιῆσαι
  chosen: I wanted to do nothing
  alternatives:
  - I was willing to do nothing
  - I decided to do nothing
  lexicon: BDAG
  rationale: θέλω here expresses volition. 'I wanted to do nothing' preserves the
    personal willingness nuance better than the more formal 'I was willing' and avoids
    overinterpreting it as a settled decree ('decided').
- source_word: ἵνα μὴ
  chosen: so that ... might not
  alternatives:
  - in order that ... not
  - lest
  lexicon: BDAG
  rationale: This introduces Paul's purpose. 'So that ... might not' is clear modern
    English and preserves the telic force without archaic diction.
- source_word: ὡς κατὰ ἀνάγκην
  chosen: as if by compulsion
  alternatives:
  - as under necessity
  - as by constraint
  lexicon: BDAG
  rationale: 'ἀνάγκη here refers to pressure or compulsion rather than abstract necessity.
    The addition of ''as if'' reflects ὡς, softening the statement: Paul does not
    want Philemon''s action to have the character of compulsion.'
- source_word: τὸ ἀγαθόν σου
  chosen: your good deed
  alternatives:
  - your goodness
  - the good from you
  - your kindness
  lexicon: BDAG
  rationale: The articular neuter adjective likely refers to the concrete good action
    Philemon might do in response to Paul's appeal, not merely an abstract quality.
    'Your good deed' makes the implied act explicit in idiomatic English while staying
    close to the sense.
- source_word: ᾖ
  chosen: might be
  alternatives:
  - would be
  - should be
  lexicon: BDAG
  rationale: The present subjunctive after ἵνα is naturally represented by 'might
    be' in English, preserving the purpose nuance.
- source_word: ἀλλὰ κατὰ ἑκούσιον
  chosen: but voluntary
  alternatives:
  - but willingly
  - but of your own free will
  lexicon: BDAG
  rationale: ἑκούσιος denotes what is done willingly or voluntarily. 'Voluntary' pairs
    neatly with 'by compulsion' and preserves the contrast concisely, though the fuller
    sense is 'of your own free will'.
