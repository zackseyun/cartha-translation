id: PHM.1.11
reference: Philemon 1:11
source:
  edition: SBLGNT
  text: τόν ποτέ σοι ἄχρηστον νυνὶ ⸀δὲ σοὶ καὶ ἐμοὶ εὔχρηστον,
translation:
  text: who once was useless to you, but now is useful to you and to me,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Paul likely plays on the name Onesimus, which is related to the idea of
      being useful or beneficial.
    reason: lexical_alternative
lexical_decisions:
- source_word: τόν
  chosen: who
  alternatives:
  - the one who
  - him who
  lexicon: BDAG
  rationale: The accusative article functions substantivally/anaphorically, referring
    back to Onesimus from the previous verse. English idiom prefers a relative pronoun
    here to continue the sentence naturally.
- source_word: ποτέ
  chosen: once
  alternatives:
  - formerly
  - at one time
  lexicon: BDAG
  rationale: Conveys past time succinctly and idiomatically in contrast with νυνί
    ('now').
- source_word: σοι
  chosen: to you
  alternatives:
  - for you
  lexicon: BDAG
  rationale: The dative with ἄχρηστον is best rendered 'to you' in this personal relational
    context.
- source_word: ἄχρηστον
  chosen: useless
  alternatives:
  - unprofitable
  - unhelpful
  lexicon: BDAG
  rationale: Captures the plain sense of 'not useful' in contemporary English. It
    also preserves Paul's wordplay with Onesimus's name and with εὔχρηστον in the
    second half of the verse better than the more archaic 'unprofitable'.
- source_word: νυνὶ δὲ
  chosen: but now
  alternatives:
  - yet now
  - and now
  lexicon: BDAG
  rationale: Marks the strong temporal contrast with ποτέ. 'But now' is natural English
    and preserves the adversative force of δέ.
- source_word: σοὶ καὶ ἐμοὶ
  chosen: to you and to me
  alternatives:
  - for you and for me
  lexicon: BDAG
  rationale: Repeating 'to' in English reflects the datives clearly and keeps the
    balance of Paul's statement.
- source_word: εὔχρηστον
  chosen: useful
  alternatives:
  - profitable
  - helpful
  lexicon: BDAG
  rationale: Best modern equivalent to 'beneficial/useful.' It preserves the deliberate
    contrast with ἄχρηστον and likely echoes the meaning of the name Onesimus ('useful/beneficial').
