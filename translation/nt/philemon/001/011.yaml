theological_decisions:
- issue: Possible wordplay on Onesimus's name and moral transformation
  chosen_reading: Retain the simple useful/useless contrast in the main text
  alternative_readings:
  - Render more interpretively to foreground the pun, e.g., 'formerly of no use...
    now truly useful'
  rationale: The verse itself makes the contrast explicit without requiring expansion.
    A straightforward rendering preserves the literary effect while avoiding paraphrase
    beyond the Greek.
  doctrine_reference: 'Translation philosophy: optimal equivalence; never paraphrase
    beyond what the source text warrants.'
