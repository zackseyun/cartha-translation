id: PHM.1.5
reference: Philemon 1:5
source:
  edition: SBLGNT
  text: ἀκούων σου τὴν ἀγάπην καὶ τὴν πίστιν ἣν ἔχεις ⸀πρὸς τὸν κύριον Ἰησοῦν καὶ
    εἰς πάντας τοὺς ἁγίους,
translation:
  text: because I hear of your love and the faith that you have toward the Lord Jesus
    and for all the saints,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or, more explicitly by sense: ''your faith toward the Lord Jesus and your
      love for all the saints.'''
    reason: alternative_reading
  - marker: b
    text: Or 'the faithfulness that you have.' The Greek word can denote faith, trust,
      or faithfulness.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀκούων
  chosen: I hear
  alternatives:
  - hearing
  - since I hear
  - because I hear
  lexicon: BDAG
  rationale: The participle is dependent on the preceding thanksgiving syntax and
    is best rendered idiomatically in English as a finite verb. 'I hear' preserves
    the present sense; 'because' is supplied to reflect the causal force in context.
- source_word: ἀγάπην
  chosen: love
  lexicon: BDAG
  rationale: Follows the default rendering of ἀγάπη as 'love.'
- source_word: πίστιν
  chosen: faith
  alternatives:
  - faithfulness
  - trust
  lexicon: BDAG
  rationale: Follows the project's default rendering of πίστις as 'faith.' In this
    verse the term may overlap with fidelity, but the default is retained in the main
    text and the alternative is preserved in a footnote because the construction has
    generated interpretive discussion.
- source_word: πρὸς τὸν κύριον Ἰησοῦν
  chosen: toward the Lord Jesus
  alternatives:
  - in the Lord Jesus
  - for the Lord Jesus
  lexicon: BDAG
  rationale: πρός with a personal object can denote orientation or direction toward
    someone. 'Toward the Lord Jesus' preserves the prepositional distinction from
    the following εἰς phrase better than smoothing both into 'for' or 'in.'
- source_word: κύριον
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Follows the default rendering of κύριος as 'Lord' for the christological
    title.
- source_word: εἰς πάντας τοὺς ἁγίους
  chosen: for all the saints
  alternatives:
  - toward all the saints
  - for all God's holy people
  lexicon: BDAG
  rationale: εἰς here is rendered idiomatically as 'for' in connection with Philemon's
    love toward fellow believers. 'Saints' preserves the established NT designation
    ἅγιοι without paraphrase.
- source_word: ἁγίους
  chosen: saints
  alternatives:
  - holy ones
  - God's holy people
  lexicon: BDAG
  rationale: '''Saints'' is the standard concise rendering and fits the communal designation
    in Pauline usage.'
