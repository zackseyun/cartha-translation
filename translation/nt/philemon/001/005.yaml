theological_decisions:
- issue: How to relate 'love' and 'faith' to the two following prepositional phrases
  chosen_reading: The verse is translated in the surface order of the Greek, with
    both 'love' and 'faith' followed by 'toward the Lord Jesus and for all the saints,'
    while preserving the likely tension rather than restructuring the sentence.
  alternative_readings:
  - Repunctuate conceptually as 'your love for all the saints and your faith toward
    the Lord Jesus'
  rationale: 'Many interpreters understand the sense distributively: faith directed
    toward the Lord Jesus, love directed toward all the saints. That reading fits
    Pauline theology and the parallel in v. 7. However, the Greek wording places both
    nouns before the relative clause and then gives two prepositional phrases without
    explicit redistribution markers. In keeping with the project''s principle of preserving
    theological tension rather than over-resolving ambiguity, the main text follows
    the Greek flow and a footnote preserves the more explicit interpretive alternative.'
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
- issue: Rendering πίστις in a potentially nuanced context
  chosen_reading: faith
  alternative_readings:
  - faithfulness
  rationale: The project default for πίστις is 'faith.' Because this context may suggest
    not only belief but also fidelity, the alternative is preserved in a footnote
    rather than imported into the main text.
  doctrine_reference: 'Contested terms table: πίστις → faith; footnote alternatives
    where contested'
