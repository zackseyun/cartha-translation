theological_decisions:
- issue: Rendering δοῦλος in the Onesimus context
  chosen_reading: slave
  alternative_readings:
  - servant
  - bondservant
  rationale: Because the letter concerns Onesimus's social status and reception, the
    bonded status is contextually central. Using 'slave' preserves the social reality
    while allowing Paul's 'more than a slave' contrast to retain its force.
  doctrine_reference: 'DOCTRINE.md: Contested terms table for δοῦλος; Translation
    philosophy §1'
- issue: Meaning of ἐν σαρκὶ καὶ ἐν κυρίῳ
  chosen_reading: both in the flesh and in the Lord
  alternative_readings:
  - both in person and in the Lord
  - both in earthly relationship and in the Lord
  rationale: The phrase likely contrasts Philemon's relationship to Onesimus on the
    human/social plane and on the Christian/spiritual plane. The translation preserves
    Paul's wording and theological tension rather than collapsing it into a single
    interpretation.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §3; Contested terms table
    for σάρξ'
