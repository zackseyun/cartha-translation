id: PHM.1.16
reference: Philemon 1:16
source:
  edition: SBLGNT
  text: οὐκέτι ὡς δοῦλον ἀλλὰ ὑπὲρ δοῦλον, ἀδελφὸν ἀγαπητόν, μάλιστα ἐμοί, πόσῳ δὲ
    μᾶλλον σοὶ καὶ ἐν σαρκὶ καὶ ἐν κυρίῳ.
translation:
  text: no longer as a slave, but more than a slave, a beloved brother—especially
    to me, but how much more to you, both in the flesh and in the Lord.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'as a servant' or 'as a bondservant'; the Greek word can cover a range
      of servile status, but here likely refers to Onesimus's bonded social condition.
    reason: alternative_reading
  - marker: b
    text: '''In the flesh'' here likely means in earthly or social relationship, or
      simply in person, not ''sinful nature.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐκέτι
  chosen: no longer
  alternatives:
  - no more
  lexicon: BDAG
  rationale: Standard temporal negation indicating a changed status from the former
    situation.
- source_word: ὡς δοῦλον
  chosen: as a slave
  alternatives:
  - as a servant
  - as a bondservant
  lexicon: BDAG
  rationale: Given the social-legal context of Onesimus in Philemon, the bonded nature
    is salient, so 'slave' best fits the doctrine guideline for δοῦλος in context.
- source_word: ὑπὲρ δοῦλον
  chosen: more than a slave
  alternatives:
  - beyond a slave
  - above a slave
  lexicon: BDAG
  rationale: ὑπέρ here expresses surpassing status/value rather than substitution;
    'more than a slave' is idiomatic and preserves the comparative force.
- source_word: ἀδελφὸν ἀγαπητόν
  chosen: a beloved brother
  alternatives:
  - a dearly loved brother
  - a beloved fellow believer
  lexicon: BDAG
  rationale: The phrase identifies Onesimus's new relational status within the Christian
    community. 'Brother' preserves the familial metaphor directly; 'beloved' reflects
    ἀγαπητός naturally.
- source_word: μάλιστα ἐμοί
  chosen: especially to me
  alternatives:
  - most of all to me
  - particularly to me
  lexicon: BDAG
  rationale: μάλιστα marks special degree; 'especially' is concise and natural.
- source_word: πόσῳ δὲ μᾶλλον σοὶ
  chosen: but how much more to you
  alternatives:
  - and even more to you
  - but much more to you
  lexicon: BDAG
  rationale: This comparative idiom heightens the point from Paul's relation to Philemon's.
    'How much more' best captures the rhetorical force.
- source_word: ἐν σαρκὶ
  chosen: in the flesh
  alternatives:
  - in person
  - in earthly terms
  lexicon: BDAG
  rationale: Here σάρξ is not metaphorical for sinful nature but refers to earthly,
    embodied, or social relation. The main text keeps the literal Pauline wording
    'in the flesh,' with a footnote preserving the sense 'in person/earthly relation.'
- source_word: ἐν κυρίῳ
  chosen: in the Lord
  alternatives:
  - in the Lord Jesus
  - in Christian fellowship
  lexicon: BDAG
  rationale: A standard Pauline sphere/union expression. 'Lord' follows the doctrinal
    default for κύριος and preserves the theological depth without over-specifying.
