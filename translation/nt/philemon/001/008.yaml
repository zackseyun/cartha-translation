  chosen_reading: Messiah
  alternative_readings:
  - Christ
  rationale: The term functions as a title in Pauline discourse. Following the project's
    doctrine, titles are translated rather than merely transliterated where context
    supports. This choice preserves the messianic sense without adding doctrinal content
    beyond the Greek.
