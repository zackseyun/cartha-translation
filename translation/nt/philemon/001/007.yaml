theological_decisions:
- issue: Rendering of ἅγιοι
  chosen_reading: saints
  alternative_readings:
  - God's people
  - holy ones
  rationale: The term denotes believers as those set apart to God. 'Saints' preserves
    Pauline ecclesial language without importing a later canonization concept; alternatives
    are possible but less textually transparent here.
  doctrine_reference: 'Affirmations; Translation philosophy #5'
- issue: Anthropological idiom in σπλάγχνα
  chosen_reading: hearts
  alternative_readings:
  - inner affections
  - inmost being
  rationale: The Greek idiom refers to the deep inner life or affections, not merely
    emotions. 'Hearts' is the clearest natural equivalent in English and avoids misleadingly
    literal anatomy while preserving the verse's pastoral force.
  doctrine_reference: 'Translation philosophy #6'
