id: PHM.1.7
reference: Philemon 1:7
source:
  edition: SBLGNT
  text: ⸀χαρὰν γὰρ ⸂πολλὴν ἔσχον⸃ καὶ παράκλησιν ἐπὶ τῇ ἀγάπῃ σου, ὅτι τὰ σπλάγχνα
    τῶν ἁγίων ἀναπέπαυται διὰ σοῦ, ἀδελφέ.
translation:
  text: For I had much joy and encouragement because of your love, because the hearts
    of the saints have been refreshed through you, brother.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more literally, 'the inner affections' of the saints.
    reason: lexical_alternative
lexical_decisions:
- source_word: χαρὰν
  chosen: joy
  alternatives:
  - gladness
  lexicon: BDAG
  rationale: Standard sense of χαρά as joy/gladness. 'Joy' is the natural modern English
    equivalent and pairs well with παράκλησιν in Paul's affective expression.
- source_word: πολλὴν ἔσχον
  chosen: I had much
  alternatives:
  - I had great
  - I received much
  lexicon: BDAG
  rationale: 'The aorist ἔσχον with πολλήν idiomatically expresses possession/experience:
    ''I had much.'' ''Great'' is possible, but ''much'' more directly reflects πολύς.'
- source_word: παράκλησιν
  chosen: encouragement
  alternatives:
  - comfort
  - consolation
  lexicon: BDAG
  rationale: παράκλησις can mean encouragement, comfort, or consolation. In this interpersonal
    context, where Philemon's love has strengthened others and Paul, 'encouragement'
    best captures the active uplifting sense in readable modern English.
- source_word: ἐπὶ τῇ ἀγάπῃ σου
  chosen: because of your love
  alternatives:
  - at your love
  - on account of your love
  lexicon: BDAG
  rationale: 'With ἐπί plus dative here, the sense is causal/based on: Paul''s joy
    and encouragement arise because of Philemon''s love. This also preserves the default
    rendering of ἀγάπη as ''love'' per doctrine guidance.'
- source_word: ἀγάπῃ
  chosen: love
  lexicon: BDAG
  rationale: Default rendering of ἀγάπη is 'love' per DOCTRINE.md contested terms
    table; no contextual reason to vary.
- source_word: σπλάγχνα
  chosen: hearts
  alternatives:
  - inner affections
  - inmost being
  - bowels
  lexicon: BDAG
  rationale: Literally 'inner organs,' but idiomatically the seat of deep feelings/inner
    life. 'Hearts' communicates the sense naturally in English without archaic literalism.
    A footnote preserves the more literal nuance.
- source_word: τῶν ἁγίων
  chosen: of the saints
  alternatives:
  - of the holy ones
  - of God's people
  lexicon: BDAG
  rationale: ἅγιοι in Pauline usage commonly refers to believers as 'saints.' This
    is a standard and theologically transparent rendering, preserving Paul's covenant-community
    language.
- source_word: ἀναπέπαυται
  chosen: have been refreshed
  alternatives:
  - have been given rest
  - have found relief
  lexicon: BDAG
  rationale: Perfect tense indicates a present state resulting from Philemon's action.
    'Have been refreshed' fits the relational context and anticipates Paul's later
    wordplay in the letter better than the more static 'have been rested.'
- source_word: διὰ σοῦ
  chosen: through you
  alternatives:
  - by you
  - because of you
  lexicon: BDAG
  rationale: διά with genitive normally indicates agency/instrumentality. 'Through
    you' preserves that nuance while sounding natural.
- source_word: ἀδελφέ
  chosen: brother
  alternatives:
  - dear brother
  lexicon: BDAG
  rationale: Vocative ἀδελφέ is a direct familial address within the Christian community.
    'Brother' is gender-accurate and should be preserved per translation philosophy;
    'dear' would add emphasis not explicit in the Greek.
