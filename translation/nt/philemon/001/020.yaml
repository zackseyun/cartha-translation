id: PHM.1.20
reference: Philemon 1:20
source:
  edition: SBLGNT
  text: ναί, ἀδελφέ, ἐγώ σου ὀναίμην ἐν κυρίῳ· ἀνάπαυσόν μου τὰ σπλάγχνα ἐν ⸀Χριστῷ.
translation:
  text: Yes, brother, let me have this benefit from you in the Lord; refresh my heart
    in Messiah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'let me profit from you,' or 'let me have joy from you.' Paul may be
      making a wordplay on Onesimus' name and the idea of usefulness/benefit.
    reason: lexical_alternative
  - marker: b
    text: Greek 'my inward parts,' an idiom for deep affections or inner being; rendered
      'my heart' in natural English.
    reason: lexical_alternative
  - marker: c
    text: Or 'in Christ.' The Greek title Χριστός is rendered 'Messiah' here to preserve
      its titular sense.
    reason: alternative_reading
lexical_decisions:
- source_word: ναί
  chosen: 'Yes'
  alternatives:
  - Indeed
  lexicon: BDAG
  rationale: Introduces warm affirmation and appeal; 'Yes' is the most natural direct
    equivalent in modern English.
- source_word: ἀδελφέ
  chosen: brother
  alternatives:
  - brother of mine
  lexicon: BDAG
  rationale: Vocative singular directly addresses Philemon as a fellow believer. Gender-accurate
    rendering fits the singular male addressee.
- source_word: ἐγώ σου ὀναίμην
  chosen: let me have this benefit from you
  alternatives:
  - let me profit from you
  - may I have joy from you
  lexicon: BDAG
  rationale: ὀναίμην is an optative from ὀνίνημι meaning 'benefit/profit.' Paul likely
    uses a wordplay with Onesimus' name and earlier language of usefulness. 'Have
    this benefit from you' preserves the request sense without over-paraphrasing;
    alternatives are possible and worth preserving.
- source_word: ἐν κυρίῳ
  chosen: in the Lord
  alternatives:
  - in Lord
  lexicon: BDAG
  rationale: Standard Pauline sphere/instrument phrase. 'The Lord' is the natural
    English rendering for κυρίῳ and follows the doctrinal default for κύριος.
- source_word: ἀνάπαυσόν
  chosen: refresh
  alternatives:
  - give rest to
  - set at rest
  lexicon: BDAG
  rationale: Aorist imperative calling for concrete encouragement/relief. 'Refresh'
    fits the interpersonal context and echoes 1:7.
- source_word: μου τὰ σπλάγχνα
  chosen: my heart
  alternatives:
  - my inward parts
  - my affections
  - my inner being
  lexicon: BDAG
  rationale: σπλάγχνα literally refers to inward parts but idiomatically denotes deep
    affections or inner being. 'My heart' is the clearest natural English equivalent
    in this context.
- source_word: ἐν Χριστῷ
  chosen: in Messiah
  alternatives:
  - in Christ
  lexicon: BDAG
  rationale: Χριστῷ is titular here rather than merely name-like, and the doctrine
    guidance prefers 'Messiah' where context supports title sense. The phrase marks
    the sphere of Christian fellowship and action.
