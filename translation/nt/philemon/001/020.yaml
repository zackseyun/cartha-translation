theological_decisions:
- issue: Rendering Χριστῷ
  chosen_reading: Messiah
  alternative_readings:
  - Christ
  rationale: The term functions as a title and the project default is 'Messiah' where
    title sense is active. Here Paul's appeal is framed in explicitly covenantal Christian
    identity, so 'Messiah' preserves meaning better than the traditional transliteration.
  doctrine_reference: 'DOCTRINE.md Contested terms: Χριστός → Messiah (where title;
    Christ where name-like)'
- issue: Rendering κυρίῳ
  chosen_reading: the Lord
  alternative_readings:
  - the Master
  rationale: κύριος in Pauline usage here is best rendered 'Lord,' the project's default,
    preserving both reverence and established NT title usage without importing a narrower
    master-slave nuance into this phrase.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
