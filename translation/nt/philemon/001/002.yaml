id: PHM.1.2
reference: Philemon 1:2
source:
  edition: SBLGNT
  text: καὶ Ἀπφίᾳ τῇ ⸀ἀδελφῇ καὶ Ἀρχίππῳ τῷ συστρατιώτῃ ἡμῶν καὶ τῇ κατ’ οἶκόν σου
    ἐκκλησίᾳ·
translation:
  text: 'and to Apphia our sister, and to Archippus our fellow soldier, and to the
    church in your house:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Some manuscripts read 'our sister' instead of 'the sister.'
    reason: textual_variant
lexical_decisions:
- source_word: Ἀπφίᾳ
  chosen: Apphia
  lexicon: BDAG
  rationale: Personal name transliterated according to standard English convention,
    following the translation philosophy to transliterate names rather than translate
    them.
- source_word: ἀδελφῇ
  chosen: sister
  alternatives:
  - dear sister
  lexicon: BDAG
  rationale: The noun means 'sister.' The possessive 'our' is supplied from some manuscripts/traditional
    renderings, but the SBLGNT text here reads simply 'the sister.' For natural English
    and in light of the appositional greeting structure, 'our sister' is not adopted
    in the main text because it is not present in the given Greek text.
- source_word: Ἀρχίππῳ
  chosen: Archippus
  lexicon: BDAG
  rationale: Personal name transliterated by standard convention.
- source_word: συστρατιώτῃ
  chosen: fellow soldier
  alternatives:
  - comrade in arms
  lexicon: BDAG
  rationale: A compound noun meaning one who serves as a fellow soldier. 'Fellow soldier'
    preserves the metaphorical military imagery common in Pauline usage without over-paraphrase.
- source_word: ἐκκλησίᾳ
  chosen: church
  alternatives:
  - assembly
  lexicon: BDAG
  rationale: In this epistolary context, 'church' is the most natural and established
    rendering for the gathered Christian community. 'Assembly' is lexically possible
    but less idiomatic here.
- source_word: κατ’ οἶκόν σου
  chosen: in your house
  alternatives:
  - that meets in your house
  - in your home
  lexicon: BDAG
  rationale: The phrase literally means 'according to/in your house' and idiomatically
    refers to the church located or meeting in Philemon's house. 'In your house' stays
    close to the Greek while remaining clear; the more explicit 'that meets in your
    house' is interpretive and therefore kept as an alternative rather than the main
    text.
- source_word: καὶ
  chosen: and
  lexicon: BDAG
  rationale: Repeated coordinating conjunction retained to reflect the additive structure
    of the greeting.
- source_word: τῇ
  chosen: to
  lexicon: Greek grammar
  rationale: The dative article with each recipient is represented in English by repeating
    'to' where needed for clear epistolary address.
