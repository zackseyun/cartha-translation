theological_decisions:
- issue: Whether to render ἀδελφῇ with an added possessive as 'our sister' based on
    textual tradition or contextual smoothing
  chosen_reading: sister
  alternative_readings:
  - our sister
  rationale: The provided SBLGNT text reads τῇ ἀδελφῇ without ἡμῶν. The translation
    therefore follows the source text rather than harmonizing with familiar traditional
    renderings. This is a textual/lexical decision, not a doctrinal one, but it affects
    how Christian kinship language is represented.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Gender-accurate over gender-neutral.'
