id: PHM.1.4
reference: Philemon 1:4
source:
  edition: SBLGNT
  text: Εὐχαριστῶ τῷ θεῷ μου πάντοτε μνείαν σου ποιούμενος ἐπὶ τῶν προσευχῶν μου,
translation:
  text: I always thank my God, making mention of you in my prayers,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'remembering you in my prayers.' The Greek more literally says 'making
      mention of you.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Εὐχαριστῶ
  chosen: I thank
  alternatives:
  - I give thanks
  lexicon: BDAG
  rationale: Present active indicative, first person singular. 'I thank' is natural
    modern English and preserves the direct verbal force. 'I give thanks' is possible
    but slightly more formal and less direct.
- source_word: τῷ θεῷ μου
  chosen: my God
  alternatives:
  - to my God
  lexicon: BDAG
  rationale: The dative with εὐχαριστέω marks the indirect object, naturally expressed
    in English as 'thank my God' rather than the more wooden 'give thanks to my God.'
    The possessive 'my' is retained as a personal devotional expression.
- source_word: πάντοτε
  chosen: always
  alternatives:
  - continually
  lexicon: BDAG
  rationale: The adverb denotes regular constancy. 'Always' is the most straightforward
    and idiomatic rendering in this thanksgiving formula.
- source_word: μνείαν σου ποιούμενος
  chosen: making mention of you
  alternatives:
  - remembering you
  - making mention of you always
  lexicon: BDAG
  rationale: This participial idiom literally means 'making mention of you.' It is
    preserved rather than reduced to simply 'remembering you' because the context
    is explicitly prayer and verbal recollection before God. The participle is contemporaneous
    with the main verb and is rendered as an attendant participial phrase.
- source_word: ἐπὶ τῶν προσευχῶν μου
  chosen: in my prayers
  alternatives:
  - during my prayers
  - upon my prayers
  lexicon: BDAG
  rationale: With this idiom, ἐπί plus the genitive is best rendered idiomatically
    as 'in' or 'during' prayers. 'In my prayers' is standard, clear English and fits
    the sense of prayerful mention.
