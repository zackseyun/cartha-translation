id: PHM.1.18
reference: Philemon 1:18
source:
  edition: SBLGNT
  text: εἰ δέ τι ἠδίκησέν σε ἢ ὀφείλει, τοῦτο ἐμοὶ ⸀ἐλλόγα·
translation:
  text: But if he has wronged you in any way or owes you anything, charge this to
    me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'count this to my account.' The verb carries an accounting sense of reckoning
      or charging something to someone.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰ δέ
  chosen: But if
  alternatives:
  - Now if
  - And if
  lexicon: BDAG
  rationale: εἰ introduces a conditional clause, while δέ adds mild contrast or continuation.
    'But if' captures the adversative transition from the previous verse and reads
    naturally in English.
- source_word: τι
  chosen: in any way
  alternatives:
  - anything
  - at all
  lexicon: BDAG
  rationale: The indefinite neuter τι with ἠδίκησέν broadens the condition. Rendering
    it as 'in any way' avoids awkward repetition with the later 'anything' and conveys
    an unspecified possible wrong.
- source_word: ἠδίκησέν σε
  chosen: he has wronged you
  alternatives:
  - he did you wrong
  - he has harmed you
  - he has cheated you
  lexicon: BDAG
  rationale: ἀδικέω means to do wrong, act unjustly toward, or injure. 'He has wronged
    you' is idiomatic, morally weighty, and broad enough to include personal or material
    offense without over-specifying.
- source_word: ἢ ὀφείλει
  chosen: or owes you anything
  alternatives:
  - or is indebted to you
  - or owes anything
  lexicon: BDAG
  rationale: ὀφείλω here refers to owing a debt or obligation. 'Owes you anything'
    makes the indirect object explicit from context and preserves the financial/legal
    nuance that fits Paul's offer to assume the debt.
- source_word: τοῦτο
  chosen: this
  alternatives:
  - that
  - it
  lexicon: BDAG
  rationale: The demonstrative points back to either wrong or debt just mentioned.
    'This' is the most direct English equivalent and works naturally with the imperative
    that follows.
- source_word: ἐμοὶ
  chosen: to me
  alternatives:
  - to my account
  - against me
  lexicon: BDAG
  rationale: The dative pronoun marks Paul as the one to whom the charge should be
    assigned. 'To me' is formally close; the accounting sense is then carried by the
    verb choice.
- source_word: ἐλλόγα
  chosen: charge
  alternatives:
  - credit
  - impute
  - put on account
  lexicon: BDAG
  rationale: ἐλλογέω is an accounting term meaning to charge to someone's account
    or reckon. 'Charge this to me' is clear modern English that preserves the commercial/legal
    metaphor without archaic theological jargon like 'impute'.
