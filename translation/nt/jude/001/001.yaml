id: JUD.1.1
reference: Jude 1:1
source:
  edition: SBLGNT
  text: Ἰούδας Ἰησοῦ Χριστοῦ δοῦλος, ἀδελφὸς δὲ Ἰακώβου, τοῖς ἐν θεῷ πατρὶ ⸀ἠγαπημένοις καὶ Ἰησοῦ Χριστῷ τετηρημένοις κλητοῖς·
translation:
  text: 'Jude, a slave of Jesus the Messiah and brother of James, to those who are loved in God the Father and kept for Jesus the Messiah, and called:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'kept by Jesus the Messiah.' The Greek dative can be understood as agency ('by') or direction/advantage ('for').
    reason: alternative_reading
  - marker: b
    text: Some manuscripts read 'sanctified in God the Father' instead of 'loved in God the Father.'
    reason: textual_variant
  - marker: c
    text: Or 'called ones'.
    reason: previous_rendering
lexical_decisions:
- source_word: δοῦλος
  chosen: slave
  alternatives:
  - servant
  - bondservant
  lexicon: BDAG
  rationale: The term denotes bonded service. Per the doctrine guidance, 'slave' is preferred where the bonded nature is theologically salient; in an epistolary self-designation of allegiance to Jesus, that force is significant.
- source_word: Χριστοῦ / Χριστῷ
  chosen: Messiah
  alternatives:
  - Christ
  lexicon: BDAG
  rationale: This is the title Χριστός, not merely a name-like element. Per doctrine, titles are translated where context supports, so 'Messiah' preserves the title's meaning.
- source_word: ἀδελφὸς δὲ Ἰακώβου
  chosen: and brother of James
  alternatives:
  - but brother of James
  - the brother of James
  lexicon: BDAG
  rationale: δέ here is mildly connective/contrastive in self-identification, best rendered smoothly in English as 'and' rather than a stronger adversative 'but.' The anarthrous phrase does not require 'the brother.'
- source_word: ἐν θεῷ πατρὶ
  chosen: in God the Father
  alternatives:
  - by God the Father
  - for God the Father
  lexicon: BDAG
  rationale: The preposition ἐν most naturally retains its locative/sphere sense here. 'In God the Father' preserves the Greek wording and theological intimacy without over-interpreting the relation.
- source_word: ἠγαπημένοις
  chosen: loved
  alternatives:
  - beloved
  - having been loved
  lexicon: BDAG
  rationale: The perfect passive participle indicates a settled state resulting from God's love. 'Loved' is clear modern English; 'beloved' is possible but more traditional and slightly less transparent for contemporary readers.
- source_word: τετηρημένοις
  chosen: kept for
  alternatives:
  - kept by
  - preserved for
  - guarded for
  lexicon: BDAG
  rationale: The perfect passive participle denotes being kept/preserved. With the dative Ἰησοῦ Χριστῷ, the sense may be either agency ('by') or advantage/direction ('for'). 'For' best preserves the likely dative nuance and avoids prematurely resolving the ambiguity toward agency.
- source_word: κλητοῖς
  chosen: called ones
  alternatives:
  - called
  - the called
  lexicon: BDAG
  rationale: The adjective functions substantivally for the recipients. 'Called ones' makes the substantival force explicit in English, though somewhat literal; it preserves the theological weight of divine calling.
- source_word: Ἰούδας
  chosen: Jude
  alternatives:
  - Judas
  lexicon: BDAG
  rationale: Standard English convention distinguishes the author as 'Jude' to avoid confusion with Judas; this is a transliteration choice for the personal name.
- source_word: Ἰάκωβος
  chosen: James
  alternatives:
  - Jacob
  lexicon: BDAG
  rationale: Standard New Testament English transliteration renders Ἰάκωβος as 'James' in this context.
