theological_decisions:
- issue: Relation of τετηρημένοις to Ἰησοῦ Χριστῷ
  chosen_reading: kept for Jesus the Messiah
  alternative_readings:
  - kept by Jesus the Messiah
  rationale: The dative after τηρέω here is syntactically debated. Rendering it as 'for' preserves the likely sense of being preserved for or unto Christ, while not denying Christ's agency elsewhere. Because the ambiguity is genuine, the alternative is preserved in a footnote rather than resolved dogmatically.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
- issue: Rendering of ἠγαπημένοις
  chosen_reading: loved
  alternative_readings:
  - sanctified
  rationale: Some manuscripts read ἡγιασμένοις ('sanctified') instead of ἠγαπημένοις ('loved'). Following the provided SBLGNT text, 'loved' is adopted in the main text, with the textual variant preserved in a footnote.
  doctrine_reference: Original-language primacy over translation tradition; preserve significant alternatives in footnotes.
revisions:
- timestamp: '2026-04-21T03:35:53Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/nt/jude/001/001.json
  category: awkward_english
  tier: 1
  from: called ones
  to: and called
  rationale: The Greek κλητοῖς is grammatically parallel to the participles ἠγαπημένοις ('loved') and τετηρημένοις ('kept'), all modifying the implied recipients (τοῖς). The current rendering 'called ones' as a separate appositive phrase breaks this parallelism and creates a slightly awkward construction at the end of the sentence. Integrating it as 'and called' would better reflect the Greek structure and improve English flow while maintaining the theological weight of the divine calling.
