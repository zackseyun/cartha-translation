theological_decisions:
- issue: Meaning of 'the faith' (πίστις)
  chosen_reading: objective content of the Christian faith
  alternative_readings:
  - subjective faith/trust exercised by believers
  rationale: In this context, 'once for all delivered to the saints' strongly indicates a body of teaching or confession entrusted to the believing community rather than the act of believing itself. This preserves the text's emphasis on guarding apostolic teaching without importing later denominational formulations.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3; Contested terms table for πίστις'
- issue: Force of ἅπαξ παραδοθείσῃ
  chosen_reading: a definitive once-for-all delivery of the faith
  alternative_readings:
  - simply 'once' without explicit finality
  rationale: The adverb ἅπαξ commonly carries a once-for-all sense in theological contexts. Rendering it 'once for all' preserves the definitive force while not overstating beyond the lexical range.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #5'
revisions:
- timestamp: '2026-04-21T12:32:23Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/nt/jude/001/003.json
  category: awkward_english
  tier: 1
  from: I found it necessary to write to you, urging you
  to: I found it necessary to write, urging you
  rationale: The Greek repeats 'hymin' (to you) with both 'graphein' and 'grapsai'. While the draft's literal repetition is faithful, it creates a slightly clunky phrase in English ('to write to you... to write to you'). Removing the second 'to you' ('I found it necessary to write, urging you...') improves the English flow significantly without any loss of meaning, as the recipient is perfectly clear from the context established in the first clause and the immediately following 'urging you'.
