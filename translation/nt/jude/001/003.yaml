id: JUD.1.3
reference: Jude 1:3
source:
  edition: SBLGNT
  text: Ἀγαπητοί, πᾶσαν σπουδὴν ποιούμενος γράφειν ὑμῖν περὶ τῆς κοινῆς ⸀ἡμῶν σωτηρίας ἀνάγκην ἔσχον γράψαι ὑμῖν παρακαλῶν ἐπαγωνίζεσθαι τῇ ἅπαξ παραδοθείσῃ τοῖς ἁγίοις πίστει.
translation:
  text: Beloved, although I was making every effort to write to you about our common salvation, I found it necessary to write, urging you to contend earnestly for the faith once for all delivered to the saints.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'handed down' for 'delivered,' emphasizing the transmission of apostolic teaching.
    reason: lexical_alternative
  - marker: b
    text: '''The faith'' here likely refers to the body of Christian teaching entrusted to believers, not merely the personal act of believing.'
    reason: alternative_reading
  - marker: c
    text: '''Saints'' means God''s holy people, that is, believers.'
    reason: lexical_alternative
  - marker: d
    text: Or 'I found it necessary to write to you, urging you'.
    reason: previous_rendering
lexical_decisions:
- source_word: Ἀγαπητοί
  chosen: Beloved
  alternatives:
  - Dear friends
  - Loved ones
  lexicon: BDAG
  rationale: Vocative plural adjective used as a warm pastoral address. 'Beloved' preserves both the affectionate tone and the lexical connection to love better than the more interpretive 'Dear friends'.
- source_word: πᾶσαν σπουδὴν ποιούμενος
  chosen: although I was making every effort
  alternatives:
  - while being very eager
  - making all diligence
  lexicon: BDAG
  rationale: The idiom combines σπουδή ('eagerness, diligence, earnestness') with ποιέω. The participle is concessive in context, contrasting Jude's prior intention with the necessity that arose. 'Making every effort' is idiomatic modern English that preserves the force of earnest diligence.
- source_word: γράφειν ... γράψαι
  chosen: to write ... to write
  alternatives:
  - to be writing ... to write
  lexicon: BDAG
  rationale: The infinitives distinguish intended action and the action actually undertaken, but English naturally renders both with 'to write.' Retaining both occurrences reflects the Greek repetition.
- source_word: περὶ τῆς κοινῆς ἡμῶν σωτηρίας
  chosen: about our common salvation
  alternatives:
  - concerning the salvation we share
  - about the salvation common to us
  lexicon: BDAG
  rationale: κοινῆς means 'common, shared.' 'Our common salvation' is concise and natural, preserving the communal emphasis without overinterpreting the nature of that shared salvation.
- source_word: ἀνάγκην ἔσχον
  chosen: I found it necessary
  alternatives:
  - I had necessity
  - I was compelled
  lexicon: BDAG
  rationale: This idiom expresses necessity arising from circumstances. 'I found it necessary' is natural English and slightly less forceful than 'I was compelled,' which could overstate the nuance.
- source_word: παρακαλῶν
  chosen: urging
  alternatives:
  - appealing
  - exhorting
  - encouraging
  lexicon: BDAG
  rationale: παρακαλέω here introduces the purpose/content of the letter in a serious exhortatory sense. 'Urging' captures the earnest appeal in accessible modern English.
- source_word: ἐπαγωνίζεσθαι
  chosen: to contend earnestly
  alternatives:
  - to struggle for
  - to fight for
  - to contend
  lexicon: BDAG
  rationale: The compound verb intensifies ἀγωνίζομαι. 'Contend earnestly' preserves the intensified sense without sounding overly combative or colloquial.
- source_word: τῇ ... πίστει
  chosen: for the faith
  alternatives:
  - for the trust
  - for the faithfulness
  lexicon: BDAG
  rationale: Here πίστις most naturally denotes the body of Christian belief entrusted to the community, not the subjective act of believing. Per doctrine defaults, 'faith' is retained in the main text; alternatives are less likely in this context.
- source_word: ἅπαξ
  chosen: once for all
  alternatives:
  - once
  - once and for all
  lexicon: BDAG
  rationale: ἅπαξ here modifies the act of handing over and emphasizes its definitive, nonrepeatable character. 'Once for all' is a standard, clear rendering.
- source_word: παραδοθείσῃ
  chosen: delivered
  alternatives:
  - handed down
  - entrusted
  lexicon: BDAG
  rationale: The passive participle from παραδίδωμι can mean 'handed over, transmitted, delivered.' 'Delivered' is concise and traditional; 'handed down' is a viable interpretive alternative preserved in a footnote because it highlights transmission of apostolic teaching.
- source_word: τοῖς ἁγίοις
  chosen: to the saints
  alternatives:
  - to God's holy people
  - to the holy ones
  lexicon: BDAG
  rationale: ἅγιοι in early Christian usage commonly refers to believers as God's holy people. 'Saints' is concise and established, while not requiring canonized-status connotations in context; a footnote can clarify the referent if needed.
