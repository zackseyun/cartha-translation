  to: and have mercy on others
  rationale: The current phrasing inverts the standard English word order (verb-object) to mirror the Greek's fronted object (οὓς δὲ ἐλεᾶτε). While a defensible choice in an 'optimal-equivalence' model, it creates a slightly stiff and unnatural cadence. Using the more common 'have mercy on others' improves the flow and naturalness of the English without sacrificing any essential meaning or structural clarity.
