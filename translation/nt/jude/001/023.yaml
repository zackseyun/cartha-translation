- issue: Sense of 'fire' in the rescue image
  chosen_reading: Retain 'fire' as a metaphor without specifying hell/judgment in the main text.
  alternative_readings:
  - eschatological judgment
  - present destructive danger
  rationale: The verse uses vivid imagery, but the text itself does not explicitly define the referent. The translation preserves the warning without resolving the interpretive question beyond the Greek wording.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Meaning of σάρξ in 'stained by the flesh'
  chosen_reading: Render σάρξ as 'flesh' in the main text.
  alternative_readings:
  - sinful nature
  rationale: Although the phrase points to moral defilement, 'flesh' preserves the metaphor and aligns with the doctrine guideline to document context-dependent handling of σάρξ rather than flattening it into an interpretive gloss.
