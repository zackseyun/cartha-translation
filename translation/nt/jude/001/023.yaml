id: JUD.1.23
reference: Jude 1:23
source:
  edition: SBLGNT
  text: οὓς δὲ σῴζετε ἐκ πυρὸς ἁρπάζοντες, οὓς δὲ ἐλεᾶτε ἐν φόβῳ⸃, μισοῦντες καὶ τὸν ἀπὸ τῆς σαρκὸς ἐσπιλωμένον χιτῶνα.
translation:
  text: save others by snatching them out of the fire; and have mercy on others with fear, hating even the tunic stained by the flesh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'rescue others, snatching them from the fire.' The imagery may point to impending judgment or to severe spiritual danger.
    reason: alternative_reading
  - marker: b
    text: '''With fear'' may mean with reverent fear before God, or with cautious awareness lest one also be corrupted.'
    reason: lexical_alternative
  - marker: c
    text: 'Or ''the garment defiled by the sinful nature.'' Greek: ''flesh.'''
    reason: lexical_alternative
  - marker: d
    text: Or 'and on others have mercy'.
    reason: previous_rendering
lexical_decisions:
- source_word: σῴζετε
  chosen: save
  alternatives:
  - rescue
  lexicon: BDAG
  rationale: Present imperative/command sense in context; 'save' preserves the soteriological weight of σῴζω while still fitting the immediate image of rescue.
- source_word: ἐκ πυρὸς ἁρπάζοντες
  chosen: by snatching them out of the fire
  alternatives:
  - snatching them from the fire
  - seizing them out of the fire
  lexicon: BDAG
  rationale: ἁρπάζοντες is a participle explaining the manner of saving; 'snatching' preserves the forceful, urgent sense. 'Out of the fire' renders ἐκ πυρός naturally and keeps the vivid metaphor.
- source_word: ἐλεᾶτε
  chosen: have mercy
  alternatives:
  - show mercy
  - be merciful to
  lexicon: BDAG
  rationale: A direct and idiomatic rendering of the imperative. 'Have mercy' keeps the verbal force and echoes biblical diction without sounding archaic.
- source_word: ἐν φόβῳ
  chosen: with fear
  alternatives:
  - in fear
  - with reverence
  - with caution
  lexicon: BDAG
  rationale: The phrase is concise and likely modifies the manner of showing mercy. 'With fear' preserves the ambiguity between reverent fear before God and cautious fear of contamination, rather than over-interpreting.
- source_word: μισοῦντες
  chosen: hating
  alternatives:
  - detesting
  - abhorring
  lexicon: BDAG
  rationale: The participle expresses the attendant attitude accompanying mercy. 'Hating' is the most direct lexical equivalent and preserves the moral sharpness of the Greek.
- source_word: χιτῶνα
  chosen: tunic
  alternatives:
  - garment
  - shirt
  - robe
  lexicon: BDAG
  rationale: χιτών refers to an inner garment/tunic. 'Tunic' is more specific than 'garment' and avoids anachronistic narrowing to 'shirt.'
- source_word: ἐσπιλωμένον
  chosen: stained
  alternatives:
  - defiled
  - soiled
  - polluted
  lexicon: BDAG
  rationale: The perfect passive participle denotes a state of having been stained/defiled. 'Stained' works well with the clothing metaphor while still implying moral contamination.
- source_word: σάρξ
  chosen: flesh
  alternatives:
  - sinful nature
  lexicon: BDAG
  rationale: Per doctrine defaults, σάρξ is rendered 'flesh' when literal and 'sinful nature' when metaphorical. Here the phrase is metaphorical for moral corruption associated with fallen human flesh, but retaining 'flesh' preserves the source metaphor and avoids importing a more systematized theological interpretation into the main text.
