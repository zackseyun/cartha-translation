id: 2TI.3.6
reference: 2 Timothy 3:6
source:
  edition: SBLGNT
  text: ἐκ τούτων γάρ εἰσιν οἱ ἐνδύνοντες εἰς τὰς οἰκίας καὶ ⸀αἰχμαλωτίζοντες γυναικάρια
    σεσωρευμένα ἁμαρτίαις, ἀγόμενα ἐπιθυμίαις ποικίλαις,
translation:
  text: For among these are those who slip into households and capture weak women
    burdened with sins, led along by various desires,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'take captive'; the Greek verb carries the imagery of seizing captives.
    reason: lexical_alternative
  - marker: b
    text: Greek 'little women,' a diminutive and pejorative term for vulnerable women
      in this context.
    reason: lexical_alternative
  - marker: c
    text: Or 'loaded down with sins.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκ τούτων
  chosen: among these
  alternatives:
  - from these
  - out of these
  lexicon: BDAG
  rationale: Idiomatic expression indicating that such people belong to the previously
    described group. 'Among these' is more natural in English than the more literal
    'from these' while preserving the sense.
- source_word: ἐνδύνοντες εἰς τὰς οἰκίας
  chosen: slip into households
  alternatives:
  - creep into houses
  - worm their way into homes
  lexicon: BDAG
  rationale: The participle conveys stealthy or insinuating entry. 'Slip into' preserves
    the furtive nuance in readable modern English. 'Households' was chosen over 'houses'
    because the context concerns entering domestic spheres and influencing people
    within them, not merely buildings.
- source_word: αἰχμαλωτίζοντες
  chosen: capture
  alternatives:
  - take captive
  - enslave
  lexicon: BDAG
  rationale: The verb literally denotes taking captive. 'Capture' is concise and natural,
    while still conveying domination. 'Take captive' is a strong alternative and is
    preserved in a footnote because it more explicitly reflects the military/captivity
    imagery.
- source_word: γυναικάρια
  chosen: weak women
  alternatives:
  - little women
  - silly women
  - gullible women
  lexicon: BDAG
  rationale: The noun is diminutive and pejorative, referring not to women in general
    but to a morally/spiritually vulnerable subset in this context. 'Weak women' communicates
    vulnerability without the archaic or potentially misleading tone of 'silly women'
    or the overly literal but awkward 'little women.' A footnote preserves the more
    literal alternative.
- source_word: σεσωρευμένα ἁμαρτίαις
  chosen: burdened with sins
  alternatives:
  - loaded down with sins
  - heaped up with sins
  lexicon: BDAG
  rationale: The perfect passive participle suggests an accumulated condition. 'Burdened
    with sins' is idiomatic and communicates the weight of accumulated sin. 'Loaded
    down with sins' is a close formal alternative preserved in a footnote.
- source_word: ἀγόμενα
  chosen: led along
  alternatives:
  - led away
  - driven
  lexicon: BDAG
  rationale: The passive participle indicates being guided or carried along under
    influence. 'Led along' fits the image of ongoing susceptibility to desires without
    overstating the sense. 'Led away' is possible but can imply a stronger notion
    of removal than the context requires.
- source_word: ἐπιθυμίαις ποικίλαις
  chosen: by various desires
  alternatives:
  - by various passions
  - by many kinds of cravings
  lexicon: BDAG
  rationale: ἐπιθυμία can denote desire, craving, or passion, often negatively in
    moral contexts. 'Desires' is accessible and sufficiently broad; 'various' reflects
    ποικίλαις straightforwardly.
