theological_decisions:
- issue: Pejorative reference to γυναικάρια
  chosen_reading: Render as 'weak women' to reflect the contextual rebuke of a vulnerable
    subset rather than a blanket statement about women generally.
  alternative_readings:
  - little women
  - silly women
  - gullible women
  rationale: The verse criticizes false teachers who prey on susceptible persons.
    The translation should preserve the pejorative and contextual force of γυναικάρια
    without importing a universal theological claim about women. This aligns with
    the instruction not to import doctrinal claims the text does not make and to remain
    gender-accurate to the source.
  doctrine_reference: Translation philosophy §§1, 4, 6
- issue: Domestic term οἰκίας
  chosen_reading: Render as 'households' rather than 'houses.'
  alternative_readings:
  - houses
  - homes
  rationale: The context is social and relational infiltration into domestic settings.
    'Households' better captures the sphere of influence targeted by the false teachers
    while remaining faithful to the source.
  doctrine_reference: Translation philosophy §§1, 6
