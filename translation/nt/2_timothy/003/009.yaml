id: 2TI.3.9
reference: 2 Timothy 3:9
source:
  edition: SBLGNT
  text: ἀλλ’ οὐ προκόψουσιν ἐπὶ πλεῖον, ἡ γὰρ ἄνοια αὐτῶν ἔκδηλος ἔσται πᾶσιν, ὡς
    καὶ ἡ ἐκείνων ἐγένετο.
translation:
  text: But they will not advance any further, for their foolishness will be plain
    to everyone, as that of those men also became.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'will not make further progress.'
    reason: lexical_alternative
  - marker: b
    text: That is, the foolishness of Jannes and Jambres, mentioned in the previous
      verse.
    reason: cross_reference
lexical_decisions:
- source_word: προκόψουσιν
  chosen: will advance
  alternatives:
  - will make progress
  - will proceed
  lexicon: BDAG
  rationale: προκόπτω commonly means to advance or make progress. In this context
    of false teachers, 'advance' preserves the metaphor of progress without implying
    positive growth.
- source_word: ἐπὶ πλεῖον
  chosen: any further
  alternatives:
  - further
  - to a greater extent
  lexicon: BDAG
  rationale: The idiom ἐπὶ πλεῖον means 'further' or 'to a greater degree.' 'Any further'
    fits naturally with the negation οὐ and conveys that their progress will be halted.
- source_word: ἄνοια
  chosen: foolishness
  alternatives:
  - folly
  - senselessness
  lexicon: BDAG
  rationale: ἄνοια denotes lack of understanding or folly. 'Foolishness' is clear
    modern English and matches the moral-intellectual sense in context.
- source_word: ἔκδηλος
  chosen: plain
  alternatives:
  - obvious
  - clearly evident
  lexicon: BDAG
  rationale: ἔκδηλος means evident or manifest. 'Plain' is concise and idiomatic in
    the phrase 'will be plain to everyone.'
- source_word: πᾶσιν
  chosen: to everyone
  alternatives:
  - to all
  - to all people
  lexicon: BDAG
  rationale: The dative plural here is naturally rendered with an English indirect
    object. 'Everyone' communicates the universal scope in readable modern English.
- source_word: ὡς καὶ ἡ ἐκείνων ἐγένετο
  chosen: as that of those men also became
  alternatives:
  - as theirs also was
  - as happened with those men also
  lexicon: BDAG
  rationale: 'The clause is elliptical: ἡ refers back to ''foolishness,'' and ἐκείνων
    points to the previously mentioned Jannes and Jambres. ''That of those men'' makes
    the ellipsis explicit in English while preserving the comparison. ''Also'' reflects
    καί.'
