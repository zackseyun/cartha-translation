theological_decisions:
- issue: Referent of ἐκείνων
  chosen_reading: '''those men'' refers to the previously mentioned opponents, Jannes
    and Jambres.'
  alternative_readings:
  - a more general reference to prior false teachers
  rationale: The immediate context in 3:8 names Jannes and Jambres, whose exposure
    serves as the comparison for the present false teachers. Rendering ἐκείνων as
    'those men' preserves the anaphoric link without importing extra interpretation.
