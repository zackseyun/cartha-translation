id: 2TI.3.16
reference: 2 Timothy 3:16
source:
  edition: SBLGNT
  text: πᾶσα γραφὴ θεόπνευστος καὶ ὠφέλιμος πρὸς διδασκαλίαν, πρὸς ⸀ἐλεγμόν, πρὸς
    ἐπανόρθωσιν, πρὸς παιδείαν τὴν ἐν δικαιοσύνῃ,
translation:
  text: Every Scripture is God-breathed and profitable for teaching, for reproof,
    for correction, and for training in righteousness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'All Scripture is God-breathed and profitable.' The Greek πᾶσα γραφή
      may be understood distributively ('every Scripture') or collectively ('all Scripture').
    reason: alternative_reading
  - marker: b
    text: Or, 'Every God-breathed Scripture is also profitable for teaching, for reproof,
      for correction, and for training in righteousness.'
    reason: alternative_reading
  - marker: c
    text: '''Righteousness'' could also be rendered ''justice'' in some Pauline contexts;
      here the sense is moral formation in upright living.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πᾶσα γραφὴ
  chosen: Every Scripture
  alternatives:
  - All Scripture
  - Every writing
  lexicon: BDAG
  rationale: The anarthrous πᾶσα γραφή can be rendered either distributively ('every
    Scripture') or collectively ('all Scripture'). 'Every Scripture' preserves the
    Greek form most directly while still naturally referring to the body of sacred
    writings in context (vv. 15–17). 'Every writing' is too broad in this context
    because γραφή in the Pastorals refers to sacred Scripture, not merely any text.
- source_word: θεόπνευστος
  chosen: God-breathed
  alternatives:
  - inspired by God
  lexicon: BDAG
  rationale: '''God-breathed'' is the most transparent rendering of the compound θεόπνευστος
    and avoids importing later theories of inspiration beyond the lexical sense. ''Inspired
    by God'' is traditional and acceptable, but it is slightly more interpretive in
    English.'
- source_word: ὠφέλιμος
  chosen: profitable
  alternatives:
  - useful
  - beneficial
  lexicon: BDAG
  rationale: '''Profitable'' preserves the sense of being beneficial or advantageous
    for the purposes that follow, while fitting the elevated but readable tone of
    the passage. ''Useful'' is possible but slightly flatter.'
- source_word: πρὸς διδασκαλίαν
  chosen: for teaching
  alternatives:
  - for instruction
  - for doctrine
  lexicon: BDAG
  rationale: διδασκαλία here denotes the act/content of teaching. 'For teaching' is
    clear modern English and avoids the ecclesiastical narrowing of 'doctrine' while
    still covering doctrinal instruction.
- source_word: ἐλεγμόν
  chosen: reproof
  alternatives:
  - rebuke
  - conviction
  lexicon: BDAG
  rationale: ἐλεγμός carries the sense of exposing error or bringing fault to light.
    'Reproof' fits the semantic range and pairs well with the following terms. 'Rebuke'
    is possible but can sound more personal and verbal than the broader corrective
    sense here.
- source_word: ἐπανόρθωσιν
  chosen: correction
  alternatives:
  - restoration
  - setting right
  lexicon: BDAG
  rationale: The noun denotes making something right again or restoring to an upright
    state. 'Correction' is the most idiomatic concise rendering in this list, while
    still conveying rectification.
- source_word: παιδείαν τὴν ἐν δικαιοσύνῃ
  chosen: training in righteousness
  alternatives:
  - discipline in righteousness
  - instruction in righteousness
  lexicon: BDAG
  rationale: παιδεία includes formation, training, and discipline. 'Training' communicates
    formative instruction well in contemporary English. Because δικαιοσύνη is a contested
    Pauline term, the default rendering 'righteousness' is retained in the main text
    per doctrine guidance; 'justice' is preserved in a footnote as a contextual alternative,
    though here 'righteousness' is clearly the better fit for moral formation.
- source_word: δικαιοσύνῃ
  chosen: righteousness
  alternatives:
  - justice
  lexicon: BDAG
  rationale: Per the project's contested-terms guidance, δικαιοσύνη defaults to 'righteousness,'
    with 'justice' preserved in a footnote for Pauline passages. In this verse the
    phrase concerns moral formation and upright living, so 'righteousness' best matches
    the context.
