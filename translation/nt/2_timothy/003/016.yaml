theological_decisions:
- issue: Syntactical relation of θεόπνευστος and ὠφέλιμος to πᾶσα γραφή
  chosen_reading: 'Both adjectives are taken predicatively: ''Every Scripture is God-breathed
    and profitable.'''
  alternative_readings:
  - '''Every God-breathed Scripture is also profitable'''
  rationale: The traditional predicative reading best fits the flow into v. 17 and
    most naturally treats both adjectives in parallel. The alternative attributive
    construal is grammatically possible and worth preserving, but it is less likely
    in context and could imply a subset of Scripture rather than characterizing Scripture
    as such.
  doctrine_reference: Preserve theological tension rather than resolve it; preserve
    genuine ambiguity in a footnote.
