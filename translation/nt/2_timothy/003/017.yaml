id: 2TI.3.17
reference: 2 Timothy 3:17
source:
  edition: SBLGNT
  text: ἵνα ἄρτιος ᾖ ὁ τοῦ θεοῦ ἄνθρωπος, πρὸς πᾶν ἔργον ἀγαθὸν ἐξηρτισμένος.
translation:
  text: so that the man of God may be complete, equipped for every good work.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'fully equipped.' The participle ἐξηρτισμένος carries the sense of having
      been thoroughly prepared or furnished.
    reason: lexical_alternative
  - marker: b
    text: '''The man of God'' is a masculine singular expression in Greek, likely
      a recognized biblical designation; it can refer specifically to God''s minister
      while also applying more broadly to the believer shaped by Scripture.'
    reason: cultural_note
lexical_decisions:
- source_word: ἵνα
  chosen: so that
  alternatives:
  - in order that
  lexicon: BDAG
  rationale: Introduces the purpose clause flowing from v.16. 'So that' is natural
    modern English while preserving the telic force.
- source_word: ἄρτιος
  chosen: complete
  alternatives:
  - capable
  - proficient
  - fit
  lexicon: BDAG
  rationale: Conveys the sense of being fully qualified or complete. 'Perfect' would
    overstate in modern English; 'complete' pairs well with the following participle
    without implying sinlessness.
- source_word: ᾖ
  chosen: may be
  alternatives:
  - might be
  lexicon: BDAG
  rationale: Present subjunctive after ἵνα is well represented by 'may be' in English
    purpose clauses.
- source_word: ὁ τοῦ θεοῦ ἄνθρωπος
  chosen: the man of God
  alternatives:
  - the person of God
  - God's man
  lexicon: BDAG
  rationale: A recognized biblical expression, likely referring first to the minister
    of God in context, though with broader applicability. Per translation philosophy,
    the grammatically masculine singular is preserved as 'man' rather than neutralized.
- source_word: πρὸς
  chosen: for
  alternatives:
  - toward
  - for the purpose of
  lexicon: BDAG
  rationale: 'With the accusative here it expresses suitability or orientation: equipped
    ''for'' every good work.'
- source_word: πᾶν ἔργον ἀγαθόν
  chosen: every good work
  alternatives:
  - every good deed
  lexicon: BDAG
  rationale: Standard and natural rendering preserving the distributive force of πᾶν
    and the moral quality of ἀγαθόν.
- source_word: ἐξηρτισμένος
  chosen: equipped
  alternatives:
  - fully equipped
  - prepared
  - furnished
  lexicon: BDAG
  rationale: Perfect passive participle from ἐξαρτίζω denotes having been made ready
    or furnished. 'Equipped' is concise and idiomatic; the prior 'complete' already
    carries some of the intensifying force, so 'fully equipped' in the main text would
    be slightly redundant, though it remains a valid alternative.
