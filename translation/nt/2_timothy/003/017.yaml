theological_decisions:
- issue: Gendered expression in ὁ τοῦ θεοῦ ἄνθρωπος
  chosen_reading: the man of God
  alternative_readings:
  - the person of God
  rationale: The Greek is grammatically masculine singular and likely echoes a recognized
    biblical designation. Following the stated gender-accurate philosophy, the masculine
    form is retained rather than neutralized, while broader applicability can be noted
    in a footnote.
