theological_decisions:
- issue: Meaning of 'the last days'
  chosen_reading: Retain the eschatological phrase 'the last days' without narrowing
    it to only the period immediately before Christ's return.
  alternative_readings:
  - the final period before the end
  - the latter days in a broader inaugurated-escha­tological sense
  rationale: The phrase is theologically weighty and can be understood in broader
    NT eschatological perspective or in a more concentrated end-time sense. The translation
    preserves the source wording and leaves that tension unresolved rather than importing
    a specific eschatological system.
  doctrine_reference: Preserve theological tension rather than resolve it.
