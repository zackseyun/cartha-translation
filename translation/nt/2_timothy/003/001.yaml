id: 2TI.3.1
reference: 2 Timothy 3:1
source:
  edition: SBLGNT
  text: Τοῦτο δὲ γίνωσκε ὅτι ἐν ἐσχάταις ἡμέραις ἐνστήσονται καιροὶ χαλεποί·
translation:
  text: 'But know this: in the last days difficult times will come.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'perilous times' or 'hard times.' The Greek adjective can denote times
      that are difficult, dangerous, or grievous.
    reason: lexical_alternative
lexical_decisions:
- source_word: Τοῦτο
  chosen: this
  alternatives:
  - this fact
  - this
  lexicon: BDAG
  rationale: Neuter demonstrative pointing forward to the content clause introduced
    by ὅτι. English 'this' is natural and sufficiently precise.
- source_word: δὲ
  chosen: But
  alternatives:
  - Now
  - And
  lexicon: BDAG
  rationale: δέ marks a mild contrast or development from the preceding context. 'But'
    best preserves the adversative turn here without overstating it.
- source_word: γίνωσκε
  chosen: know
  alternatives:
  - understand
  - recognize
  - keep in mind
  lexicon: BDAG
  rationale: Present active imperative, second singular. 'Know' is concise and idiomatic
    in English for an exhortation to be aware of a coming reality. 'Keep in mind'
    is possible but more interpretive.
- source_word: ὅτι
  chosen: ':'
  alternatives:
  - that
  lexicon: BDAG
  rationale: Introduces the content of what Timothy is to know. In English, a colon
    after 'know this' conveys the same force more naturally than retaining 'that'.
- source_word: ἐν ἐσχάταις ἡμέραις
  chosen: in the last days
  alternatives:
  - in the final days
  - in the latter days
  lexicon: BDAG
  rationale: Standard eschatological phrase. 'Last days' is the most natural and established
    English rendering and does not overdefine the temporal scope beyond the Greek.
- source_word: ἐνστήσονται
  chosen: will come
  alternatives:
  - will arrive
  - will set in
  - will be present
  lexicon: BDAG
  rationale: Future middle of ἐνίστημι here carries the sense of becoming present
    or arriving. 'Will come' is idiomatic and clear in context with καιροί. 'Will
    set in' is possible but slightly more interpretive.
- source_word: καιροὶ
  chosen: times
  alternatives:
  - seasons
  - periods
  lexicon: BDAG
  rationale: καιρός denotes a season, period, or appointed time rather than mere chronological
    time. 'Times' is the most natural English equivalent in this collocation.
- source_word: χαλεποί
  chosen: difficult
  alternatives:
  - hard
  - grievous
  - perilous
  lexicon: BDAG
  rationale: χαλεπός can mean hard, troublesome, dangerous, or fierce. 'Difficult'
    communicates the broad sense in readable modern English without archaic coloring.
    'Perilous' preserves severity but sounds dated; 'grievous' is less natural for
    contemporary readers.
