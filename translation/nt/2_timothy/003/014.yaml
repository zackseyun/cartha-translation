id: 2TI.3.14
reference: 2 Timothy 3:14
source:
  edition: SBLGNT
  text: σὺ δὲ μένε ἐν οἷς ἔμαθες καὶ ἐπιστώθης, εἰδὼς παρὰ ⸀τίνων ἔμαθες,
translation:
  text: But as for you, remain in what you learned and became convinced of, knowing
    from whom you learned it,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Some manuscripts read 'from whom' in the singular ('from whom' = one person),
      often understood as Paul; the plural reading followed here may point more broadly
      to Timothy's teachers.
    reason: textual_variant
  - marker: b
    text: Or 'were assured of.'
    reason: lexical_alternative
lexical_decisions:
- source_word: σὺ δὲ
  chosen: But as for you
  alternatives:
  - But you
  - But as for you yourself
  lexicon: BDAG
  rationale: The pronoun is explicit and contrastive, and δέ marks a transition/contrast
    with the preceding description of evil people. 'But as for you' preserves the
    emphatic contrast more clearly than a bare 'But you.'
- source_word: μένε
  chosen: remain
  alternatives:
  - continue
  - abide
  lexicon: BDAG
  rationale: The present imperative of μένω calls for ongoing persistence. 'Remain'
    is natural modern English and preserves the sense of staying within or holding
    fast to what has been learned. 'Continue' is possible, but 'remain' better matches
    the following ἐν ('in').
- source_word: ἐν οἷς
  chosen: in what
  alternatives:
  - in the things that
  - in those things which
  lexicon: BDAG
  rationale: The preposition ἐν with the relative pronoun naturally yields 'in what'
    or 'in the things that.' 'In what' is concise and idiomatic while preserving the
    locative metaphor of remaining within the sphere/content of the teaching.
- source_word: ἔμαθες
  chosen: you learned
  alternatives:
  - you have learned
  lexicon: BDAG
  rationale: The aorist points to Timothy's prior reception of instruction. Simple
    past is the most natural English rendering here.
- source_word: ἐπιστώθης
  chosen: became convinced of
  alternatives:
  - were assured of
  - were convinced of
  - were entrusted with
  lexicon: BDAG
  rationale: πιστόομαι in the passive can mean to be assured/certain or to be confirmed
    in something. In this context, paired with 'learned,' it refers to Timothy's settled
    conviction regarding the teachings. 'Became convinced of' expresses that resulting
    certainty in clear modern English. 'Were entrusted with' is less likely here because
    the object is the content learned, not a commission.
- source_word: εἰδὼς
  chosen: knowing
  alternatives:
  - since you know
  - because you know
  lexicon: BDAG
  rationale: The participle is best rendered with a participial form that leaves the
    exact nuance slightly open (attendant circumstance/circumstantial cause). This
    preserves the Greek's compactness without over-interpreting the relation.
- source_word: παρὰ τίνων
  chosen: from whom
  alternatives:
  - from which people
  - from those from whom
  lexicon: BDAG
  rationale: 'παρά with the genitive indicates source: ''from.'' The interrogative/indefinite
    form here is text-critically notable, but in sense it points to the persons from
    whom Timothy received instruction. ''From whom'' is the most natural English rendering.'
- source_word: ἔμαθες
  chosen: you learned it
  alternatives:
  - you learned
  - you were taught
  lexicon: BDAG
  rationale: English idiom benefits from supplying 'it' to make the repeated verb
    explicit with its implied object. This does not add new content but clarifies
    the repeated learning reference.
