theological_decisions:
- issue: Referent of παρὰ τίνων
  chosen_reading: Render generically as 'from whom' without specifying the teachers
    in the main text.
  alternative_readings:
  - from whom (plural, likely including Paul and Timothy's mother/grandmother)
  - from whom (singular in some manuscripts/traditions, often taken as Paul)
  rationale: The verse itself does not identify the referent explicitly, and the textual
    form reflected in SBLGNT is plural. To avoid importing a narrower doctrinal or
    interpretive claim than the text makes, the translation preserves the open reference
    in the main text.
  doctrine_reference: Preserve theological tension rather than resolve it.
