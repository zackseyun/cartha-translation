theological_decisions:
- issue: Reference of 'the truth' and 'the faith'
  chosen_reading: Render both in their broad Pauline form without narrowing them in
    translation; 'the truth' and 'the faith' likely refer to the apostolic gospel
    and Christian faith.
  alternative_readings:
  - '''the truth'' as truth in a general moral sense'
  - '''faith'' as subjective personal trust'
  rationale: The immediate context concerns false teachers opposing apostolic teaching.
    The translation preserves the theological weight of Paul's terms without importing
    a more specific doctrinal paraphrase into the main text.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Gender rendering of ἄνθρωποι
  chosen_reading: Translate as 'men.'
  alternative_readings:
  - people
  - persons
  rationale: The referent is a specific group of male false teachers in context, not
    humanity in general. This follows the gender-accurate policy rather than neutralizing
    the masculine form.
  doctrine_reference: Gender-accurate over gender-neutral.
