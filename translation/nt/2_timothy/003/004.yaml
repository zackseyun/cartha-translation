id: 2TI.3.4
reference: 2 Timothy 3:4
source:
  edition: SBLGNT
  text: προδόται, προπετεῖς, τετυφωμένοι, φιλήδονοι μᾶλλον ἢ φιλόθεοι,
translation:
  text: traitors, reckless, puffed up, lovers of pleasure rather than lovers of God,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'betrayers.'
    reason: lexical_alternative
  - marker: b
    text: Or 'rash' or 'headstrong.'
    reason: lexical_alternative
  - marker: c
    text: Or 'conceited.' Literally 'having been puffed up.'
    reason: lexical_alternative
lexical_decisions:
- source_word: προδόται
  chosen: traitors
  alternatives:
  - betrayers
  lexicon: BDAG
  rationale: προδότης denotes one who betrays or is treacherous. 'Traitors' is the
    most natural plural rendering in this vice list and carries the moral weight of
    disloyal betrayal.
- source_word: προπετεῖς
  chosen: reckless
  alternatives:
  - rash
  - headstrong
  lexicon: BDAG
  rationale: προπετής describes someone falling forward impulsively, hence rash or
    reckless. 'Reckless' is clear modern English and fits the vice-list style better
    than the slightly archaic 'headstrong.'
- source_word: τετυφωμένοι
  chosen: puffed up
  alternatives:
  - conceited
  - swollen with pride
  lexicon: BDAG
  rationale: Perfect passive participle of τυφόομαι, literally 'having been puffed
    up,' often with the sense of being conceited. 'Puffed up' preserves the metaphor
    and Pauline diction while remaining understandable.
- source_word: φιλήδονοι
  chosen: lovers of pleasure
  alternatives:
  - pleasure-loving
  lexicon: BDAG
  rationale: A compound adjective meaning loving pleasure. 'Lovers of pleasure' mirrors
    the Greek formation and sets up the contrast with φιλόθεοι.
- source_word: μᾶλλον ἢ
  chosen: rather than
  alternatives:
  - more than
  lexicon: BDAG
  rationale: The comparative construction marks preference or contrast. 'Rather than'
    is idiomatic in English and clearly expresses misplaced allegiance.
- source_word: φιλόθεοι
  chosen: lovers of God
  alternatives:
  - God-loving
  lexicon: BDAG
  rationale: A compound adjective meaning loving God. 'Lovers of God' preserves the
    lexical parallel with φιλήδονοι and makes the contrast explicit.
