- issue: Rendering of the vice-list terms in a way that preserves rhetorical parallelism
    without importing extra doctrinal nuance
  chosen_reading: Translate the paired compounds as 'lovers of pleasure rather than
    lovers of God' and retain the metaphor 'puffed up.'
  alternative_readings:
  - '''pleasure-loving rather than God-loving'''
  - '''conceited'' instead of ''puffed up'''
  rationale: The verse is a moral description, not a technical doctrinal statement.
    The chosen rendering preserves the Greek's rhetorical symmetry and imagery while
    using readable modern English, in line with optimal equivalence.
