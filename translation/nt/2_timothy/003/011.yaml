id: 2TI.3.11
reference: 2 Timothy 3:11
source:
  edition: SBLGNT
  text: τοῖς διωγμοῖς, τοῖς παθήμασιν, οἷά μοι ἐγένετο ἐν Ἀντιοχείᾳ, ἐν Ἰκονίῳ, ἐν
    Λύστροις, οἵους διωγμοὺς ὑπήνεγκα· καὶ ἐκ πάντων με ἐρρύσατο ὁ κύριος.
translation:
  text: the persecutions, the sufferings, such as happened to me in Antioch, in Iconium,
    in Lystra—what persecutions I endured; and out of them all the Lord rescued me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'what kind of persecutions I endured.'
    reason: lexical_alternative
  - marker: b
    text: '''The Lord'' likely refers to the Lord Jesus, though the Greek text says
      only ''the Lord.'''
    reason: alternative_reading
lexical_decisions:
- source_word: διωγμοῖς / διωγμούς
  chosen: persecutions
  alternatives:
  - pursuits
  - harassments
  lexicon: BDAG
  rationale: The noun denotes hostile pursuit/oppression for one's allegiance or mission.
    'Persecutions' is the natural and established English equivalent here and fits
    the autobiographical context of opposition Paul faced.
- source_word: παθήμασιν
  chosen: sufferings
  alternatives:
  - afflictions
  - hardships
  lexicon: BDAG
  rationale: πάθημα refers broadly to experiences of suffering. 'Sufferings' preserves
    the breadth of the term without narrowing it to external affliction only.
- source_word: οἷά ... ἐγένετο
  chosen: such as happened to me
  alternatives:
  - what happened to me
  - such things as came upon me
  lexicon: BDAG
  rationale: This construction introduces examples of the sufferings/persecutions
    Paul has just mentioned. 'Such as happened to me' is idiomatic and preserves the
    exemplifying force of οἷα with ἐγένετο.
- source_word: ἐν Ἀντιοχείᾳ, ἐν Ἰκονίῳ, ἐν Λύστροις
  chosen: in Antioch, in Iconium, in Lystra
  rationale: Place names are transliterated per project philosophy. Repeating 'in'
    reflects the Greek sequence and keeps the cadence of Paul's recollection.
- source_word: οἵους διωγμοὺς
  chosen: what persecutions
  alternatives:
  - what kind of persecutions
  - such persecutions as
  lexicon: BDAG
  rationale: The exclamatory/qualitative force of οἵους is best captured by 'what
    persecutions,' which conveys the intensity without overexpanding the phrase.
- source_word: ὑπήνεγκα
  chosen: I endured
  alternatives:
  - I bore up under
  - I underwent
  lexicon: BDAG
  rationale: ὑποφέρω here means to bear or endure under pressure. 'I endured' is concise,
    natural English and matches the context of sustained persecution.
- source_word: ἐκ πάντων
  chosen: out of them all
  alternatives:
  - from them all
  - out of all of them
  lexicon: BDAG
  rationale: The phrase refers back to the persecutions and sufferings just listed.
    'Out of them all' preserves the imagery of deliverance from within/through all
    these experiences.
- source_word: ἐρρύσατο
  chosen: rescued
  alternatives:
  - delivered
  - saved
  lexicon: BDAG
  rationale: ῥύομαι means to rescue or deliver from danger. 'Rescued' is vivid, accessible
    modern English and avoids importing soteriological overtones that 'saved' might
    suggest here.
- source_word: ὁ κύριος
  chosen: the Lord
  alternatives:
  - the Master
  lexicon: BDAG
  rationale: Per doctrine, κύριος defaults to 'Lord.' In this Pauline context it most
    naturally refers to the Lord Jesus, but the translation leaves the title as given
    rather than over-specifying.
