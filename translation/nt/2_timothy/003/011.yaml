theological_decisions:
- issue: Referent of 'the Lord'
  chosen_reading: Render simply as 'the Lord' without specifying 'Jesus' in the text.
  alternative_readings:
  - the Lord Jesus
  rationale: While Paul often uses 'the Lord' for Jesus, the Greek text here reads
    only ὁ κύριος. The translation preserves the wording of the source and does not
    import an explicit name not present in the text.
  doctrine_reference: Translate titles; transliterate names; preserve theological
    tension rather than resolve it.
