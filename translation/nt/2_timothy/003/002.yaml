id: 2TI.3.2
reference: 2 Timothy 3:2
source:
  edition: SBLGNT
  text: ἔσονται γὰρ οἱ ἄνθρωποι φίλαυτοι, φιλάργυροι, ἀλαζόνες, ὑπερήφανοι, βλάσφημοι,
    γονεῦσιν ἀπειθεῖς, ἀχάριστοι, ἀνόσιοι,
translation:
  text: For people will be lovers of self, lovers of money, boastful, arrogant, slanderous,
    disobedient to parents, ungrateful, unholy,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "blasphemous" or "abusive." The Greek term can refer to speech that dishonors
      either people or God.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔσονται
  chosen: will be
  alternatives:
  - shall be
  lexicon: BDAG
  rationale: Future middle indicative of εἰμί; standard future existential/copulative
    sense. 'Will be' is natural modern English.
- source_word: γὰρ
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: BDAG
  rationale: Marks explanation for the preceding statement; 'For' preserves the connective
    force without overinterpreting.
- source_word: οἱ ἄνθρωποι
  chosen: people
  alternatives:
  - men
  - human beings
  lexicon: BDAG
  rationale: Although grammatically masculine plural, the referent is generic humanity
    rather than males specifically. 'People' best reflects the sense in readable modern
    English while honoring gender-accurate intent.
- source_word: φίλαυτοι
  chosen: lovers of self
  alternatives:
  - self-loving
  - lovers of themselves
  lexicon: BDAG
  rationale: The compound denotes selfish self-love. 'Lovers of self' is concise,
    idiomatic, and preserves the vice-list rhythm.
- source_word: φιλάργυροι
  chosen: lovers of money
  alternatives:
  - money-loving
  - greedy
  lexicon: BDAG
  rationale: Literally 'loving silver/money.' 'Lovers of money' keeps the formal parallel
    with φίλαυτοι and avoids reducing the term merely to the broader concept of greed.
- source_word: ἀλαζόνες
  chosen: boastful
  alternatives:
  - braggarts
  - pretentious boasters
  lexicon: BDAG
  rationale: Refers to swaggering pretenders/boasters. 'Boastful' is clear and fits
    the list style better than the more colloquial 'braggarts.'
- source_word: ὑπερήφανοι
  chosen: arrogant
  alternatives:
  - proud
  - haughty
  lexicon: BDAG
  rationale: '''Arrogant'' captures the negative moral sense more precisely than the
    potentially neutral English ''proud.'''
- source_word: βλάσφημοι
  chosen: slanderous
  alternatives:
  - blasphemous
  - abusive
  lexicon: BDAG
  rationale: In a vice list about human behavior toward others and God, the term can
    cover abusive or defamatory speech. 'Slanderous' best fits the interpersonal context
    here while retaining serious moral weight; 'blasphemous' remains a viable alternative.
- source_word: γονεῦσιν ἀπειθεῖς
  chosen: disobedient to parents
  alternatives:
  - disobedient to their parents
  lexicon: BDAG
  rationale: Dative plural with adjective meaning refusing compliance. This is the
    standard idiomatic English rendering.
- source_word: ἀχάριστοι
  chosen: ungrateful
  alternatives:
  - thankless
  lexicon: BDAG
  rationale: Denotes lack of gratitude; 'ungrateful' is the clearest contemporary
    equivalent.
- source_word: ἀνόσιοι
  chosen: unholy
  alternatives:
  - profane
  - ungodly
  lexicon: BDAG
  rationale: Describes those lacking piety or reverence for what is sacred. 'Unholy'
    preserves the religious-moral force without narrowing it to irreverence alone.
