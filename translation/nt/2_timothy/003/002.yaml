theological_decisions:
- issue: Generic masculine expression οἱ ἄνθρωποι
  chosen_reading: people
  alternative_readings:
  - men
  - human beings
  rationale: Per the translation philosophy's gender-accurate principle, the phrase
    is generic rather than male-specific. 'People' communicates the representative
    human scope without importing male limitation.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Sense of βλάσφημοι in this vice list
  chosen_reading: slanderous
  alternative_readings:
  - blasphemous
  - abusive
  rationale: The term can denote speech against humans or God. In this list of social
    and moral vices, 'slanderous' best preserves the likely relational emphasis while
    not excluding the broader semantic range, which is preserved in a footnote.
  doctrine_reference: DOCTRINE.md Translation philosophy §3
