id: 2TI.3.3
reference: 2 Timothy 3:3
source:
  edition: SBLGNT
  text: ἄστοργοι, ἄσπονδοι, διάβολοι, ἀκρατεῖς, ἀνήμεροι, ἀφιλάγαθοι,
translation:
  text: without natural affection, irreconcilable, slanderous, without self-control,
    savage, without love for what is good,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'implacable' or 'truce-breakers' for irreconcilable.
    reason: lexical_alternative
  - marker: b
    text: Greek διάβολοι here means 'slanderous' or 'slanderers,' not a reference
      to the Devil.
    reason: lexical_alternative
  - marker: c
    text: Or 'haters of good.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄστοργοι
  chosen: without natural affection
  alternatives:
  - without family affection
  - unloving
  - heartless
  lexicon: BDAG
  rationale: ἄστοργος denotes the absence of στοργή, the natural affection especially
    expected within family or close kin relationships. 'Without natural affection'
    preserves that specific nuance better than the broader 'unloving' or 'heartless.'
- source_word: ἄσπονδοι
  chosen: irreconcilable
  alternatives:
  - implacable
  - unappeasable
  - truce-breakers
  lexicon: BDAG
  rationale: The adjective refers to those unwilling to enter or keep terms of peace,
    hence 'irreconcilable.' 'Truce-breakers' reflects older translation tradition
    but suggests violation of an existing treaty more than refusal of reconciliation;
    'implacable' is close and worth preserving as an alternative.
- source_word: διάβολοι
  chosen: slanderous
  alternatives:
  - malicious gossips
  - slanderers
  - devilish
  lexicon: BDAG
  rationale: Though διάβολος can function as the title 'Devil,' here it is adjectival/plural
    in a vice list and means slanderous or accusatory. 'Slanderous' is concise and
    fits the list context without importing a personal-reference reading.
- source_word: ἀκρατεῖς
  chosen: without self-control
  alternatives:
  - unrestrained
  - incontinent
  lexicon: BDAG
  rationale: The term denotes lack of mastery over one's desires or impulses. 'Without
    self-control' is clear modern English and preserves the moral sense better than
    the archaic 'incontinent.'
- source_word: ἀνήμεροι
  chosen: savage
  alternatives:
  - brutal
  - fierce
  lexicon: BDAG
  rationale: ἀνήμερος describes one as untamed or brutal. 'Savage' captures the sense
    of ferocity and lack of civilized gentleness in a compact form suitable to the
    vice list.
- source_word: ἀφιλάγαθοι
  chosen: without love for what is good
  alternatives:
  - not loving good
  - haters of good
  - hostile to what is good
  lexicon: BDAG
  rationale: The compound literally means not loving what is good. 'Without love for
    what is good' preserves the privative force and moral orientation without overstating
    it to active hatred, though 'haters of good' is a traditional stronger alternative.
