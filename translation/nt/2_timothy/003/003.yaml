theological_decisions:
- issue: Meaning of διάβολοι in a vice list
  chosen_reading: common adjective meaning 'slanderous' rather than a reference to
    demons or 'devils'
  alternative_readings:
  - devils
  - devilish
  rationale: The plural adjective in this syntactic context functions as a moral descriptor
    among other vices. Rendering it as 'devils' would mislead readers into taking
    it as ontological rather than behavioral.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
