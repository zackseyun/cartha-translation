theological_decisions:
- issue: Rendering of ἄνθρωποι with masculine form
  chosen_reading: people
  alternative_readings:
  - men
  rationale: The Greek masculine plural is generic here, referring to human persons
    rather than specifically males. This follows the project's gender-accurate principle
    by matching the source intent rather than the grammatical form alone.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Nuance of γόητες
  chosen_reading: impostors
  alternative_readings:
  - sorcerers
  - charlatans
  rationale: Although the word can carry associations with magicians or enchanters
    in some contexts, this verse emphasizes fraudulent teachers worsening in deception.
    'Impostors' preserves the moral-religious fraud sense without importing a stronger
    occult claim than the context requires.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §6
