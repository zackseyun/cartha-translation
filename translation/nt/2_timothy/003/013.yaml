id: 2TI.3.13
reference: 2 Timothy 3:13
source:
  edition: SBLGNT
  text: πονηροὶ δὲ ἄνθρωποι καὶ γόητες προκόψουσιν ἐπὶ τὸ χεῖρον, πλανῶντες καὶ πλανώμενοι.
translation:
  text: But evil people and impostors will go on from bad to worse, deceiving and
    being deceived.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'charlatans' or 'deceivers'; the Greek term can denote fraudulent tricksters
      and in some contexts carries overtones of sorcery or quackery.
    reason: lexical_alternative
  - marker: b
    text: Literally 'will advance to the worse.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πονηροὶ
  chosen: evil
  alternatives:
  - wicked
  - bad
  lexicon: BDAG
  rationale: Adjectival modifier of ἄνθρωποι. 'Evil' best captures moral corruption
    rather than mere poor quality ('bad').
- source_word: δὲ
  chosen: But
  alternatives:
  - and
  - now
  lexicon: BDAG
  rationale: Marks contrast with the preceding statement about Timothy and the faithful;
    'but' conveys the adversative force naturally in English.
- source_word: ἄνθρωποι
  chosen: people
  alternatives:
  - men
  - humans
  lexicon: BDAG
  rationale: Although grammatically masculine plural, the sense is generic for human
    beings, not specifically males. 'People' communicates the referent accurately
    in modern English without implying male-only reference.
- source_word: γόητες
  chosen: impostors
  alternatives:
  - charlatans
  - deceivers
  - swindlers
  lexicon: BDAG
  rationale: The term denotes fraudulent tricksters, originally with connotations
    of sorcery or quackery. 'Impostors' captures the idea of religious/moral fraud
    without over-specifying magical practice in this context.
- source_word: προκόψουσιν
  chosen: will go on
  alternatives:
  - will advance
  - will progress
  lexicon: BDAG
  rationale: Literally 'advance/progress,' but here used ironically with ἐπὶ τὸ χεῖρον.
    'Will go on' preserves the forward-motion idea in idiomatic English while allowing
    the following phrase to define the direction negatively.
- source_word: ἐπὶ τὸ χεῖρον
  chosen: from bad to worse
  alternatives:
  - to the worse
  - into what is worse
  lexicon: BDAG
  rationale: Idiomatic comparative expression meaning movement toward a worse condition.
    'From bad to worse' is the clearest natural English equivalent.
- source_word: πλανῶντες
  chosen: deceiving
  alternatives:
  - leading astray
  lexicon: BDAG
  rationale: Present participle describing their ongoing activity. 'Deceiving' fits
    the immediate context of false teachers and fraudulent influence; 'leading astray'
    is possible but less concise here.
- source_word: πλανώμενοι
  chosen: being deceived
  alternatives:
  - being led astray
  lexicon: BDAG
  rationale: Present passive participle. The passive should be preserved rather than
    flattened into a middle sense. It highlights that the deceivers are themselves
    under deception.
