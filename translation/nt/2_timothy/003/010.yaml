id: 2TI.3.10
reference: 2 Timothy 3:10
source:
  edition: SBLGNT
  text: Σὺ δὲ ⸀παρηκολούθησάς μου τῇ διδασκαλίᾳ, τῇ ἀγωγῇ, τῇ προθέσει, τῇ πίστει,
    τῇ μακροθυμίᾳ, τῇ ἀγάπῃ, τῇ ὑπομονῇ,
translation:
  text: But you have closely followed my teaching, conduct, purpose, faith, patience,
    love, endurance,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'faithfulness.' The Greek word can denote either faith or faithfulness
      in this context.
    reason: alternative_reading
lexical_decisions:
- source_word: Σὺ δὲ
  chosen: But you
  alternatives:
  - But as for you
  - You, however
  lexicon: BDAG
  rationale: δέ marks contrast with the preceding description of evil people; including
    'But' preserves the adversative force, and explicit 'you' reflects the emphatic
    pronoun Σὺ.
- source_word: παρηκολούθησάς
  chosen: have closely followed
  alternatives:
  - followed closely
  - carefully observed
  - have accompanied
  lexicon: BDAG
  rationale: παρακολουθέω here carries the sense of following something closely, whether
    by observation and adherence. 'Have closely followed' preserves both the attentiveness
    and the likely sense of Timothy's close acquaintance with and imitation of Paul's
    life and teaching. The English present perfect reads naturally for the aorist
    in this epistolary retrospective context.
- source_word: μου
  chosen: my
  alternatives:
  - me
  lexicon: BDAG
  rationale: 'The genitive pronoun governs the following datives as possessive: ''my
    teaching, conduct...'' rather than a more awkward ''you followed me in teaching...''.'
- source_word: διδασκαλίᾳ
  chosen: teaching
  alternatives:
  - instruction
  - doctrine
  lexicon: BDAG
  rationale: '''Teaching'' is the most natural modern English equivalent and avoids
    the more technical or ecclesiastical feel of ''doctrine'' while preserving the
    content of what Paul taught.'
- source_word: ἀγωγῇ
  chosen: conduct
  alternatives:
  - way of life
  - behavior
  lexicon: BDAG
  rationale: ἀγωγή refers to manner of life or conduct. 'Conduct' is concise and fits
    the virtue list well; 'way of life' is possible but slightly more expansive than
    needed.
- source_word: προθέσει
  chosen: purpose
  alternatives:
  - resolve
  - plan
  lexicon: BDAG
  rationale: πρόθεσις here refers to Paul's settled aim or purpose. 'Purpose' is the
    clearest and most idiomatic rendering in this list.
- source_word: πίστει
  chosen: faith
  alternatives:
  - faithfulness
  - trust
  lexicon: BDAG
  rationale: Following the project's default for πίστις, the main text uses 'faith.'
    In this virtue list, 'faithfulness' is also plausible, so it is preserved in a
    footnote to maintain the lexical and theological tension without over-resolving
    it.
- source_word: μακροθυμίᾳ
  chosen: patience
  alternatives:
  - longsuffering
  - forbearance
  lexicon: BDAG
  rationale: μακροθυμία denotes patient endurance toward people, often under provocation.
    'Patience' is accessible modern English; 'longsuffering' is more traditional but
    archaic.
- source_word: ἀγάπῃ
  chosen: love
  alternatives:
  - charity
  lexicon: BDAG
  rationale: The project's default rendering for ἀγάπη is 'love.' 'Charity' is archaic
    in contemporary English and would obscure the lexical connection for modern readers.
- source_word: ὑπομονῇ
  chosen: endurance
  alternatives:
  - steadfastness
  - perseverance
  - patient endurance
  lexicon: BDAG
  rationale: ὑπομονή emphasizes steadfast endurance under trial. 'Endurance' is concise,
    natural, and distinguishes it from μακροθυμία, which has already been rendered
    'patience'.
