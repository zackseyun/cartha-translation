theological_decisions:
- issue: Rendering Χριστῷ as title or name-like element
  chosen_reading: Messiah Jesus
  alternative_readings:
  - Christ Jesus
  rationale: The doctrinal guidance prefers translating Χριστός as 'Messiah' where
    it functions as a title. In this Pauline phrase the title remains meaningful,
    so the translation preserves that sense rather than defaulting to traditional
    'Christ.'
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; Contested
    terms table for Χριστός'
- issue: Sense of πίστεως in διὰ πίστεως τῆς ἐν Χριστῷ Ἰησοῦ
  chosen_reading: through faith in Messiah Jesus
  alternative_readings:
  - through the faithfulness of Messiah Jesus
  rationale: Although πίστις can in some contexts raise the broader faith/faithfulness
    question, this construction most naturally refers to the believer's faith located
    in Messiah Jesus. Per doctrine defaults, 'faith' is used in the main text, while
    preserving the less likely alternative in a footnote where useful.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension; Contested terms
    table for πίστις'
