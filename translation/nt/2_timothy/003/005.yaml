theological_decisions:
- issue: Nature of the contrast between external religion and internal reality
  chosen_reading: Rendered μόρφωσιν εὐσεβείας as 'a form of godliness' and δύναμιν
    as 'its power,' preserving Paul's contrast between outward religious shape and
    the effective reality of true godliness without specifying a narrower doctrinal
    mechanism.
  alternative_readings:
  - '''an appearance of godliness'''
  - '''a semblance of religion'''
  rationale: The verse critiques external religiosity devoid of transformative efficacy.
    The translation preserves the theological tension and does not reduce 'power'
    to only miracles, moral transformation, or the Holy Spirit, since the Greek itself
    leaves the expression broader.
  doctrine_reference: Translation philosophy §3
