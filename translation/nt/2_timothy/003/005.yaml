id: 2TI.3.5
reference: 2 Timothy 3:5
source:
  edition: SBLGNT
  text: ἔχοντες μόρφωσιν εὐσεβείας τὴν δὲ δύναμιν αὐτῆς ἠρνημένοι· καὶ τούτους ἀποτρέπου.
translation:
  text: having a form of godliness but having denied its power; and turn away from
    these people.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'appearance of godliness.' The Greek term can emphasize outward form
      or embodiment; 'form' was chosen to preserve the contrast with 'power.'
    reason: lexical_alternative
  - marker: b
    text: Or 'avoid these people' or 'keep away from these.' The verb carries the
      sense of turning oneself away from them.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔχοντες
  chosen: having
  alternatives:
  - holding
  - possessing
  lexicon: BDAG
  rationale: Present participle modifying the people described in the preceding context;
    'having' is the most natural and direct English participial rendering.
- source_word: μόρφωσιν
  chosen: form
  alternatives:
  - appearance
  - outward form
  lexicon: BDAG
  rationale: μόρφωσις denotes form, embodiment, or outward shape. 'Form' preserves
    the likely contrast with inward reality/power. 'Appearance' is possible but slightly
    more interpretive.
- source_word: εὐσεβείας
  chosen: godliness
  alternatives:
  - piety
  - devotion
  - religion
  lexicon: BDAG
  rationale: In the Pastorals, εὐσέβεια commonly refers to reverent, God-directed
    living. 'Godliness' is the established and accurate rendering in this context;
    'piety' is possible but less natural in contemporary English.
- source_word: τὴν δὲ δύναμιν αὐτῆς
  chosen: but its power
  alternatives:
  - but the power of it
  - yet its power
  lexicon: BDAG
  rationale: δύναμις here refers to the effective reality or operative force belonging
    to true godliness. 'Its power' is concise and idiomatic, while preserving the
    genitive pronoun αὐτῆς.
- source_word: ἠρνημένοι
  chosen: having denied
  alternatives:
  - denying
  - having rejected
  - having renounced
  lexicon: BDAG
  rationale: Perfect middle/passive participle indicates a settled stance resulting
    from prior denial. 'Having denied' preserves the aspect better than a simple present
    'denying.' 'Rejected' is possible but less direct.
- source_word: καὶ τούτους ἀποτρέπου
  chosen: and turn away from these people
  alternatives:
  - and avoid these people
  - and keep away from these people
  - and turn yourself away from these
  lexicon: BDAG
  rationale: ἀποτρέπου is a present middle imperative meaning to turn oneself away,
    avoid, or shun. 'Turn away from these people' preserves the verbal imagery and
    the imperative force in readable English. 'These people' makes explicit the masculine
    plural referent of τούτους.
