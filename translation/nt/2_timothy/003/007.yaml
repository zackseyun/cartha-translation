id: 2TI.3.7
reference: 2 Timothy 3:7
source:
  edition: SBLGNT
  text: πάντοτε μανθάνοντα καὶ μηδέποτε εἰς ἐπίγνωσιν ἀληθείας ἐλθεῖν δυνάμενα.
translation:
  text: always learning and never able to come to a knowledge of the truth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'full knowledge of the truth.' The Greek word can carry the sense of
      fuller or more complete knowledge.
    reason: lexical_alternative
lexical_decisions:
- source_word: πάντοτε
  chosen: always
  alternatives:
  - continually
  lexicon: BDAG
  rationale: Adverb indicating ongoing, repeated action. 'Always' is the most natural
    concise English equivalent and preserves the force of continual activity.
- source_word: μανθάνοντα
  chosen: learning
  alternatives:
  - being taught
  - studying
  lexicon: BDAG
  rationale: Present participle conveying ongoing acquisition of instruction. 'Learning'
    fits the participial flow and avoids over-specifying whether the learning is formal
    or informal.
- source_word: μηδέποτε
  chosen: never
  alternatives:
  - not ever
  lexicon: BDAG
  rationale: Strong negative temporal adverb paired with πάντοτε for rhetorical contrast.
    'Never' preserves the stark opposition in idiomatic English.
- source_word: εἰς ἐπίγνωσιν
  chosen: to a knowledge
  alternatives:
  - into knowledge
  - to full knowledge
  - to recognition
  lexicon: BDAG
  rationale: The preposition plus noun expresses movement toward or arrival at knowledge.
    'To a knowledge' is idiomatic in English when followed by 'of the truth' and preserves
    the sense of coming into possession of such knowledge. Although ἐπίγνωσις can
    carry the nuance 'full knowledge,' rendering it simply as 'knowledge' avoids overstating
    the term in English while remaining faithful to context.
- source_word: ἀληθείας
  chosen: of the truth
  alternatives:
  - of truth
  lexicon: BDAG
  rationale: Genitive dependent on ἐπίγνωσιν. The article is not explicit in Greek,
    but 'the truth' is the natural English expression in Pauline usage, referring
    to the truth of the gospel or God's reality rather than truth in the abstract.
- source_word: ἐλθεῖν
  chosen: to come
  alternatives:
  - to arrive
  - to attain
  lexicon: BDAG
  rationale: Aorist infinitive of ἔρχομαι. 'To come' is the direct and idiomatic equivalent
    in the expression 'come to a knowledge,' preserving the metaphor of arrival.
- source_word: δυνάμενα
  chosen: able
  alternatives:
  - capable
  lexicon: BDAG
  rationale: Present middle/passive participle expressing capability. 'Able' is concise
    and natural in the construction 'never able to come.' The participle agrees with
    the women described in the previous verse, so English supplies the predicate without
    repeating the subject.
