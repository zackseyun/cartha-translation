theological_decisions:
- issue: Nuance of ἐπίγνωσις in Pauline usage
  chosen_reading: knowledge
  alternative_readings:
  - full knowledge
  rationale: ἐπίγνωσις can denote fuller or more complete knowledge, but in this context
    the main point is the tragic inability to arrive at genuine knowledge of the truth
    despite constant learning. Rendering it 'knowledge' keeps the English natural
    and avoids importing a technical distinction not demanded by the verse; the stronger
    nuance is preserved in a footnote.
  doctrine_reference: Translation philosophy §3, §6
