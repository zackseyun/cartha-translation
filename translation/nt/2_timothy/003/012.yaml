id: 2TI.3.12
reference: 2 Timothy 3:12
source:
  edition: SBLGNT
  text: καὶ πάντες δὲ οἱ θέλοντες ⸂ζῆν εὐσεβῶς⸃ ἐν Χριστῷ Ἰησοῦ διωχθήσονται·
translation:
  text: And indeed, all who want to live godly in Messiah Jesus will be persecuted.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in Christ Jesus.'
    reason: alternative_reading
lexical_decisions:
- source_word: καὶ
  chosen: And
  alternatives:
  - Indeed
  - Also
  lexicon: BDAG
  rationale: Connective coordinating the statement with the preceding context; rendered
    simply as 'And' with the emphatic force carried by the following δέ/indeed combination.
- source_word: πάντες
  chosen: all
  alternatives:
  - everyone
  lexicon: BDAG
  rationale: Plural adjective functioning substantivally with the article and participle;
    'all' preserves the universal scope concisely.
- source_word: δὲ
  chosen: indeed
  alternatives:
  - now
  - but
  - and
  lexicon: BDAG
  rationale: Here δέ is mildly connective/emphatic rather than strongly adversative;
    'indeed' brings out the confirmatory force in context without overstating contrast.
- source_word: οἱ θέλοντες
  chosen: who want
  alternatives:
  - who desire
  - who are willing
  lexicon: BDAG
  rationale: Article plus present participle forms a substantive expression, 'those
    wanting.' 'Who want' is natural modern English and preserves the volitional sense
    of θέλω.
- source_word: ζῆν
  chosen: to live
  lexicon: BDAG
  rationale: Aorist infinitive after θέλω; standard rendering 'to live' fits the idiom
    cleanly in English.
- source_word: εὐσεβῶς
  chosen: godly
  alternatives:
  - in a godly way
  - piously
  lexicon: BDAG
  rationale: Adverb meaning 'in a godly/devout manner.' 'Godly' in predicate adverbial
    force is idiomatic in English ('live godly') and preserves the religious-moral
    sense better than the potentially archaic 'piously.'
- source_word: ἐν Χριστῷ Ἰησοῦ
  chosen: in Messiah Jesus
  alternatives:
  - in Christ Jesus
  lexicon: BDAG
  rationale: 'ἐν marks sphere/union: life lived in relation to and within Messiah
    Jesus. Per doctrine, Χριστός is translated as ''Messiah'' where title is active
    rather than retained as the name-like ''Christ.'''
- source_word: διωχθήσονται
  chosen: will be persecuted
  alternatives:
  - will suffer persecution
  lexicon: BDAG
  rationale: Future passive of διώκω in the hostile sense. 'Will be persecuted' is
    the most direct and standard rendering of the passive form.
