id: 2TI.4.19
reference: 2 Timothy 4:19
source:
  edition: SBLGNT
  text: Ἄσπασαι Πρίσκαν καὶ Ἀκύλαν καὶ τὸν Ὀνησιφόρου οἶκον.
translation:
  text: Greet Prisca and Aquila, and the household of Onesiphorus.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek 'Prisca'; elsewhere she is also called 'Priscilla' (for example, Acts
      18:2, 18, 26).
    reason: alternative_reading
lexical_decisions:
- source_word: Ἄσπασαι
  chosen: Greet
  alternatives:
  - Give greetings to
  - Greet warmly
  lexicon: BDAG
  rationale: Aorist middle imperative of ἀσπάζομαι functioning as a straightforward
    epistolary command to convey greetings. 'Greet' is natural modern English and
    preserves the imperative force without adding warmth not explicit in the verb.
- source_word: Πρίσκαν
  chosen: Prisca
  alternatives:
  - Priscilla
  lexicon: BDAG
  rationale: The Greek text has Πρίσκαν, the formal name form, so 'Prisca' is the
    most direct transliteration. 'Priscilla' is the familiar alternate form used elsewhere,
    but here the source text specifically reads 'Prisca'.
- source_word: Ἀκύλαν
  chosen: Aquila
  lexicon: BDAG
  rationale: Standard transliteration of the personal name Ἀκύλας.
- source_word: τὸν Ὀνησιφόρου οἶκον
  chosen: the household of Onesiphorus
  alternatives:
  - the house of Onesiphorus
  - the family of Onesiphorus
  lexicon: BDAG
  rationale: οἶκος can denote a physical house, household, or family unit. In greeting
    contexts it commonly refers to the household as the people associated with the
    home, so 'household' best captures the social sense without reducing it merely
    to the building or narrowing it only to blood relatives.
