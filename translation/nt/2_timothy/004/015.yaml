theological_decisions:
- issue: Scope of 'our words'
  chosen_reading: Paul refers to words spoken by himself and his associates, likely
    apostolic testimony or teaching, without specifying a formal technical category.
  alternative_readings:
  - our legal defense testimony
  - our preaching/message
  - our doctrinal teaching
  rationale: The phrase does not itself define whether the opposition occurred in
    court, in public ministry, or against Christian teaching more broadly. The translation
    therefore preserves the more literal 'our words' rather than narrowing the sense
    to a specific doctrinal or legal setting.
  doctrine_reference: Preserve theological tension rather than resolve it.
