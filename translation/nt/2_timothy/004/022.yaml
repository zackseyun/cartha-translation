id: 2TI.4.22
reference: 2 Timothy 4:22
source:
  edition: SBLGNT
  text: Ὁ ⸀κύριος μετὰ τοῦ πνεύματός σου. ἡ χάρις μεθ’ ⸀ὑμῶν.
translation:
  text: The Lord be with your spirit. Grace be with you all.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek shifts from singular to plural: ''with your spirit'' (singular) ...
      ''with you all'' (plural).'
    reason: lexical_alternative
lexical_decisions:
- source_word: κύριος
  chosen: Lord
  alternatives:
  - master
  lexicon: BDAG
  rationale: Rendered as 'Lord' in keeping with the project's default for κύριος and
    standard NT usage for the exalted Jesus. The article marks a definite referent,
    and in this epistolary blessing context 'the Lord' is the natural English equivalent.
- source_word: μετὰ
  chosen: be with
  alternatives:
  - with
  lexicon: BDAG
  rationale: Although the Greek omits an explicit verb, English idiom in a benedictory
    wish requires one. 'Be with' accurately conveys μετά with the genitive in blessing
    formula style without adding content beyond the implied optative sense.
- source_word: πνεύματός
  chosen: spirit
  lexicon: BDAG
  rationale: Rendered 'spirit' rather than 'Spirit' because the possessive 'your'
    points to Timothy's human spirit, not directly to the Holy Spirit. This preserves
    the personal, inward sense common in Pauline benedictions.
- source_word: σου
  chosen: your
  lexicon: BDAG
  rationale: Singular possessive retained because the first blessing is addressed
    specifically to Timothy.
- source_word: χάρις
  chosen: Grace
  alternatives:
  - favor
  lexicon: BDAG
  rationale: Rendered 'Grace' as the conventional and theologically weighty Pauline
    benediction term. 'Favor' is possible lexically but too weak for Paul's closing
    formula.
- source_word: ὑμῶν
  chosen: you all
  alternatives:
  - you
  lexicon: BDAG
  rationale: Rendered 'you all' to reflect the plural pronoun explicitly. This preserves
    the shift from singular ('your spirit') to plural, indicating that the final grace
    wish extends beyond Timothy to the wider audience associated with the letter.
