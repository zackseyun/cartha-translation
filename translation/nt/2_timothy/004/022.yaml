theological_decisions:
- issue: Referent of 'the Lord'
  chosen_reading: A reference to the Lord Jesus in a Pauline closing benediction.
  alternative_readings:
  - A more general reference to God
  rationale: In Pauline epistolary closings, 'the Lord' commonly refers to Jesus,
    and this reading best fits the immediate literary convention. The translation
    'Lord' preserves the title without over-specifying 'Jesus' where the Greek does
    not.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Number shift between the two clauses
  chosen_reading: The first clause addresses Timothy individually; the second extends
    grace to a plural group.
  alternative_readings:
  - Treat both clauses as addressed only to Timothy in idiomatic English
  rationale: The Greek distinctly uses singular σου and plural ὑμῶν. The English translation
    preserves this theological and literary nuance by rendering the second clause
    'you all.'
