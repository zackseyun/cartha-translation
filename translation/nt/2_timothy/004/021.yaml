id: 2TI.4.21
reference: 2 Timothy 4:21
source:
  edition: SBLGNT
  text: Σπούδασον πρὸ χειμῶνος ἐλθεῖν. Ἀσπάζεταί σε Εὔβουλος καὶ Πούδης καὶ Λίνος
    καὶ Κλαυδία καὶ οἱ ἀδελφοὶ πάντες.
translation:
  text: Make every effort to come before winter. Eubulus sends greetings to you, and
    so do Pudens and Linus and Claudia and all the brothers.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all the brothers and sisters'; the Greek says 'brothers,' but in this
      context it may refer to the wider group of believers.
    reason: lexical_alternative
lexical_decisions:
- source_word: Σπούδασον
  chosen: Make every effort
  alternatives:
  - Do your best
  - Be diligent
  lexicon: BDAG
  rationale: The aorist imperative of σπουδάζω calls for earnest haste or diligence.
    'Make every effort' captures both urgency and intentionality in natural English
    better than the more wooden 'be diligent' or the idiomatic 'do your best.'
- source_word: πρὸ χειμῶνος
  chosen: before winter
  alternatives:
  - before the winter
  lexicon: BDAG
  rationale: πρό with the genitive indicates time prior to an event or season. English
    idiom prefers 'before winter' without the article.
- source_word: ἐλθεῖν
  chosen: to come
  alternatives:
  - to arrive
  lexicon: BDAG
  rationale: The infinitive complements Σπούδασον and refers to Timothy's coming to
    Paul. 'Come' is the standard and most direct rendering of ἔρχομαι in this context.
- source_word: Ἀσπάζεταί σε
  chosen: sends greetings to you
  alternatives:
  - greets you
  lexicon: BDAG
  rationale: ἀσπάζομαι commonly means to greet, but in epistolary context English
    naturally expresses this as 'sends greetings to you.' This preserves the interpersonal
    sense without sounding abrupt.
- source_word: Εὔβουλος
  chosen: Eubulus
  rationale: Personal name transliterated according to the project's policy to transliterate
    names rather than translate them.
- source_word: Πούδης
  chosen: Pudens
  alternatives:
  - Pudes
  rationale: Standard English transliteration is 'Pudens,' reflecting established
    rendering of the proper name.
- source_word: Λίνος
  chosen: Linus
  rationale: Personal name transliterated by standard convention.
- source_word: Κλαυδία
  chosen: Claudia
  rationale: Personal name transliterated by standard convention.
- source_word: οἱ ἀδελφοὶ πάντες
  chosen: all the brothers
  alternatives:
  - all the brothers and sisters
  - all the believers
  lexicon: BDAG
  rationale: The Greek is grammatically masculine plural and, in early Christian usage,
    can refer to fellow believers collectively. Per the project's gender-accurate
    policy, the masculine form is retained in the main text rather than neutralized.
    Because the referent may well include the wider Christian community, an inclusive
    alternative is worth preserving in a footnote.
