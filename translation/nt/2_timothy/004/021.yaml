theological_decisions:
- issue: Rendering of ἀδελφοί in a likely mixed Christian group
  chosen_reading: all the brothers
  alternative_readings:
  - all the brothers and sisters
  - all the believers
  rationale: The source text uses the masculine plural ἀδελφοί. In keeping with the
    stated policy of gender-accurate over gender-neutral translation, the main text
    preserves 'brothers.' Since the social referent in epistolary greetings may include
    the broader believing community, an inclusive alternative is preserved in a footnote
    rather than adopted in the main text.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over
    gender-neutral)
