id: 2TI.4.2
reference: 2 Timothy 4:2
source:
  edition: SBLGNT
  text: κήρυξον τὸν λόγον, ἐπίστηθι εὐκαίρως ἀκαίρως, ἔλεγξον, ἐπιτίμησον, παρακάλεσον,
    ἐν πάσῃ μακροθυμίᾳ καὶ διδαχῇ.
translation:
  text: Preach the word; be ready in season and out of season; reprove, rebuke, exhort,
    with all patience and teaching.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'be urgent' or 'stand ready.' The Greek imperative can carry the sense
      of being prepared, present, or pressing the matter.
    reason: lexical_alternative
  - marker: b
    text: Or 'whether the time is favorable or unfavorable.'
    reason: lexical_alternative
  - marker: c
    text: Or 'encourage' or 'urge' for 'exhort.'
    reason: lexical_alternative
lexical_decisions:
- source_word: κήρυξον
  chosen: Preach
  alternatives:
  - proclaim
  - herald
  lexicon: BDAG
  rationale: Imperative of κηρύσσω, denoting public proclamation. 'Preach' is idiomatic
    and suitably weighty in this pastoral context, while remaining close to the source.
- source_word: τὸν λόγον
  chosen: the word
  alternatives:
  - the message
  lexicon: BDAG
  rationale: λόγος here most naturally refers to the apostolic message / word Timothy
    is charged to proclaim. 'The word' preserves the familiar and theologically rich
    expression without over-specifying beyond the text.
- source_word: ἐπίστηθι
  chosen: be ready
  alternatives:
  - stand by
  - be at hand
  - be urgent
  lexicon: BDAG
  rationale: The imperative calls Timothy to be present/prepared for action. 'Be ready'
    best captures the practical force in natural English. Some take it as 'be urgent'
    or 'persist,' but readiness fits the immediate adverbial pair 'in season and out
    of season.'
- source_word: εὐκαίρως ἀκαίρως
  chosen: in season and out of season
  alternatives:
  - when convenient and inconvenient
  - whether the time is favorable or unfavorable
  lexicon: BDAG
  rationale: This paired adverbial expression is well established and accurately conveys
    whether circumstances seem opportune or not. The idiom is transparent enough in
    modern English and preserves the rhetorical balance of the Greek.
- source_word: ἔλεγξον
  chosen: reprove
  alternatives:
  - convict
  - expose
  - correct
  lexicon: BDAG
  rationale: ἐλέγχω often carries the sense of exposing wrongdoing and bringing correction.
    'Reprove' preserves the corrective force without narrowing it merely to internal
    conviction.
- source_word: ἐπιτίμησον
  chosen: rebuke
  alternatives:
  - warn sternly
  - censure
  lexicon: BDAG
  rationale: A stronger corrective imperative than the previous verb. 'Rebuke' is
    the standard concise rendering and preserves the sharper tone.
- source_word: παρακάλεσον
  chosen: exhort
  alternatives:
  - encourage
  - urge
  - comfort
  lexicon: BDAG
  rationale: παρακαλέω can mean encourage, comfort, or urge depending on context.
    Here, alongside reproof and rebuke in a ministry charge, 'exhort' best captures
    earnest urging while leaving room for encouragement.
- source_word: ἐν πάσῃ μακροθυμίᾳ
  chosen: with all patience
  alternatives:
  - with complete patience
  - with all longsuffering
  lexicon: BDAG
  rationale: μακροθυμία denotes patient endurance toward people. 'With all patience'
    is natural English and reflects πάσῃ as comprehensive in scope.
- source_word: καὶ διδαχῇ
  chosen: and teaching
  alternatives:
  - and instruction
  - in teaching
  lexicon: BDAG
  rationale: διδαχή here likely denotes the instructional manner/content accompanying
    the corrective imperatives. 'Teaching' is broad and natural, preserving the noun's
    connection to doctrinal instruction.
