theological_decisions:
- issue: Scope of 'the word'
  chosen_reading: Rendered as 'the word' without expanding to 'the gospel' or 'Scripture'
    in the main text.
  alternative_readings:
  - the message
  - the gospel
  rationale: The immediate context concerns apostolic proclamation grounded in Scripture,
    but λόγος itself is not explicitly narrowed here. Preserving 'the word' maintains
    the text's breadth and avoids importing a more specific doctrinal claim than the
    verse states.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Preserve theological tension rather than resolve it.'
