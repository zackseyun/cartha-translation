id: 2TI.4.10
reference: 2 Timothy 4:10
source:
  edition: SBLGNT
  text: Δημᾶς γάρ με ⸀ἐγκατέλιπεν ἀγαπήσας τὸν νῦν αἰῶνα, καὶ ἐπορεύθη εἰς Θεσσαλονίκην,
    Κρήσκης εἰς Γαλατίαν, Τίτος εἰς Δαλματίαν·
translation:
  text: For Demas deserted me, having loved the present age, and went to Thessalonica;
    Crescens to Galatia, Titus to Dalmatia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'this present world.' The Greek more literally refers to the present
      age or era.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγκατέλιπεν
  chosen: deserted
  alternatives:
  - abandoned
  - forsook
  lexicon: BDAG
  rationale: The verb conveys leaving someone behind in a serious or disloyal way.
    'Deserted' best captures the negative force in context without archaic tone; 'abandoned'
    is possible, but 'deserted' more clearly suggests culpable departure.
- source_word: ἀγαπήσας
  chosen: having loved
  alternatives:
  - because he loved
  - since he loved
  lexicon: BDAG
  rationale: The aorist participle is rendered with an English participial construction
    to preserve the Greek linkage between Demas's love and his desertion. A causal
    sense is likely, but 'having loved' keeps the relation slightly more transparent
    to the source text while still readable.
- source_word: τὸν νῦν αἰῶνα
  chosen: the present age
  alternatives:
  - this present world
  - the present world
  lexicon: BDAG
  rationale: αἰών here is better rendered 'age' than 'world,' preserving the temporal-ethical
    sense common in Pauline usage rather than implying the physical cosmos. 'The present
    age' is both accurate and theologically precise.
- source_word: ἐπορεύθη
  chosen: went
  alternatives:
  - departed
  - traveled
  lexicon: BDAG
  rationale: A simple motion verb fits the narrative list of destinations. 'Went'
    is natural modern English and sufficiently reflects the Greek without over-specifying
    manner.
- source_word: Θεσσαλονίκην
  chosen: Thessalonica
  rationale: Standard English transliteration of the place name.
- source_word: Κρήσκης
  chosen: Crescens
  rationale: Standard English transliteration of the personal name.
- source_word: Γαλατίαν
  chosen: Galatia
  rationale: Standard English transliteration of the region name.
- source_word: Τίτος
  chosen: Titus
  rationale: Standard English transliteration of the personal name.
- source_word: Δαλματίαν
  chosen: Dalmatia
  rationale: Standard English transliteration of the region name.
- source_word: γάρ
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: BDAG
  rationale: '''For'' preserves the connective force linking this statement to the
    preceding request and explanation. It is a natural discourse marker here.'
