id: 2TI.4.7
reference: 2 Timothy 4:7
source:
  edition: SBLGNT
  text: τὸν ⸂καλὸν ἀγῶνα⸃ ἠγώνισμαι, τὸν δρόμον τετέλεκα, τὴν πίστιν τετήρηκα·
translation:
  text: I have fought the good fight, I have finished the race, I have kept the faith.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I have kept faith' or 'I have remained faithful.' The Greek τὴν πίστιν
      can denote 'the faith' as the Christian faith, or carry the sense of faithfulness
      maintained.
    reason: alternative_reading
lexical_decisions:
- source_word: καλὸν ἀγῶνα
  chosen: the good fight
  alternatives:
  - the noble struggle
  - the good contest
  lexicon: BDAG
  rationale: ἀγών denotes a struggle, contest, or fight; in this idiomatic athletic/martial
    metaphor, 'fight' is the most natural English rendering and preserves the traditional
    force. καλός here carries the sense of 'good' or 'noble'; 'good' is retained for
    naturalness and because it is well established in this collocation.
- source_word: ἠγώνισμαι
  chosen: I have fought
  alternatives:
  - I have struggled
  - I have contended
  lexicon: BDAG
  rationale: Perfect middle/passive form of ἀγωνίζομαι expresses a completed action
    with present relevance. English present perfect ('I have fought') best matches
    the Greek perfect and fits the triadic structure of the verse.
- source_word: δρόμον
  chosen: the race
  alternatives:
  - the course
  - the course of the race
  lexicon: BDAG
  rationale: δρόμος literally refers to a running course or race. 'Race' is the clearest
    idiomatic English equivalent in this athletic metaphor; 'course' is possible but
    less vivid for modern readers.
- source_word: τετέλεκα
  chosen: I have finished
  alternatives:
  - I have completed
  - I have brought to completion
  lexicon: BDAG
  rationale: The perfect of τελέω indicates bringing something to its intended end.
    'I have finished' is concise, idiomatic, and preserves the completed-with-enduring-result
    sense.
- source_word: πίστιν
  chosen: the faith
  alternatives:
  - faith
  - the trust
  lexicon: BDAG
  rationale: Per the doctrine table, πίστις defaults to 'faith.' The article supports
    'the faith,' which in this context likely refers to the Christian faith entrusted
    to Paul, though it may also echo personal fidelity. The main text preserves the
    conventional and contextually strong reading without over-specifying.
- source_word: τετήρηκα
  chosen: I have kept
  alternatives:
  - I have guarded
  - I have preserved
  lexicon: BDAG
  rationale: τηρέω commonly means to keep, guard, or preserve. 'I have kept' is the
    most natural English rendering and allows both senses of faithful observance and
    protective guarding to remain present.
