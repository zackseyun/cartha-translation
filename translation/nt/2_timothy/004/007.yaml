theological_decisions:
- issue: Meaning of τὴν πίστιν
  chosen_reading: the faith
  alternative_readings:
  - faithfulness
  rationale: Because πίστις is a contested term, the default rendering 'faith' is
    used in the main text in keeping with DOCTRINE.md. In this context, the article
    favors 'the faith,' likely denoting the apostolic faith Paul has maintained, though
    an overlapping nuance of personal faithfulness is plausible and worth preserving
    in a footnote rather than resolving fully in the main text.
