id: 2TI.4.18
reference: 2 Timothy 4:18
source:
  edition: SBLGNT
  text: ⸀ῥύσεταί με ὁ κύριος ἀπὸ παντὸς ἔργου πονηροῦ καὶ σώσει εἰς τὴν βασιλείαν
    αὐτοῦ τὴν ἐπουράνιον· ᾧ ἡ δόξα εἰς τοὺς αἰῶνας τῶν αἰώνων, ἀμήν.
translation:
  text: The Lord will rescue me from every evil deed and will save me into his heavenly
    kingdom. To him be the glory forever and ever. Amen.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'deliver me from every evil work.'
    reason: lexical_alternative
  - marker: b
    text: Literally, 'to the ages of ages.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ῥύσεταί
  chosen: will rescue
  alternatives:
  - will deliver
  - will save
  lexicon: BDAG
  rationale: ῥύομαι commonly means to rescue or deliver from danger. 'Rescue' is clear
    modern English and preserves the sense of being brought out from threatening evil.
- source_word: ἀπὸ παντὸς ἔργου πονηροῦ
  chosen: from every evil deed
  alternatives:
  - from every evil work
  - from every wicked act
  lexicon: BDAG
  rationale: ἔργον is 'work/deed'; here 'deed' fits moral action naturally in English.
    πονηροῦ is moral evil/wickedness. The phrase is kept singular-collective with
    'every' to reflect παντός.
- source_word: σώσει
  chosen: will save
  alternatives:
  - will preserve
  - will bring safely
  lexicon: BDAG
  rationale: σῴζω here carries eschatological salvation/preservation. 'Will save'
    best preserves the theological weight and the verbal link to salvation language
    in the NT.
- source_word: εἰς τὴν βασιλείαν αὐτοῦ τὴν ἐπουράνιον
  chosen: into his heavenly kingdom
  alternatives:
  - for his heavenly kingdom
  - to his heavenly kingdom
  lexicon: BDAG
  rationale: εἰς naturally points to movement/entrance toward a goal; 'into' preserves
    that better than the more idiomatic but less precise 'for' or 'to.' ἐπουράνιον
    is attributive, 'heavenly.'
- source_word: κύριος
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Per doctrine default, κύριος is rendered 'Lord.' In this context it refers
    to the exalted Lord and carries both authority and devotional weight.
- source_word: ᾧ ἡ δόξα
  chosen: To him be the glory
  alternatives:
  - to whom be glory
  - his is the glory
  lexicon: BDAG
  rationale: This is a doxological formula. 'To him be the glory' is natural English
    while preserving the optative-like ascription implied by the nominal clause.
- source_word: εἰς τοὺς αἰῶνας τῶν αἰώνων
  chosen: forever and ever
  alternatives:
  - to the ages of ages
  lexicon: BDAG
  rationale: The idiom literally reads 'to the ages of ages,' but 'forever and ever'
    is the standard natural equivalent that preserves the force of endless duration.
- source_word: ἀμήν
  chosen: Amen
  lexicon: BDAG
  rationale: Retained by standard transliteration in English as a liturgical affirmation.
