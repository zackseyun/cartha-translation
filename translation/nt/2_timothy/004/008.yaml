theological_decisions:
- issue: Meaning of 'the crown of righteousness'
  chosen_reading: Retained the genitival phrase without resolving whether it means
    a crown awarded for righteousness, a crown consisting of righteousness, or the
    crown associated with vindication.
  alternative_readings:
  - crown awarded for righteousness
  - crown consisting in righteousness
  - crown of vindication/justice
  rationale: The Greek genitive permits more than one nuance, and the translation
    philosophy calls for preserving theological tension rather than resolving ambiguity
    beyond what the text warrants.
  doctrine_reference: 'Translation philosophy §3; Contested terms: δικαιοσύνη'
- issue: Referent of 'the Lord'
  chosen_reading: Understood as the Lord Jesus, whose appearing believers love and
    who acts as eschatological judge.
  alternative_readings:
  - God more generally
  rationale: The immediate reference to 'his appearing' in the Pastorals strongly
    points to Christ, yet the translation leaves the title as 'Lord' rather than importing
    a fuller christological paraphrase into the text.
  doctrine_reference: 'Affirmations; Contested terms: κύριος'
