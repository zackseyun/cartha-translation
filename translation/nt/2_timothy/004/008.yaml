id: 2TI.4.8
reference: 2 Timothy 4:8
source:
  edition: SBLGNT
  text: λοιπὸν ἀπόκειταί μοι ὁ τῆς δικαιοσύνης στέφανος, ὃν ἀποδώσει μοι ὁ κύριος
    ἐν ἐκείνῃ τῇ ἡμέρᾳ, ὁ δίκαιος κριτής, οὐ μόνον δὲ ἐμοὶ ἀλλὰ καὶ πᾶσιν τοῖς ἠγαπηκόσι
    τὴν ἐπιφάνειαν αὐτοῦ.
translation:
  text: From now on the crown of righteousness is laid up for me, which the Lord,
    the righteous judge, will award to me on that day—and not only to me, but also
    to all who have loved his appearing.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the crown of justice.' The Greek word can mean 'righteousness' or, in
      some contexts, 'justice.'
    reason: lexical_alternative
lexical_decisions:
- source_word: λοιπὸν
  chosen: From now on
  alternatives:
  - Henceforth
  - Finally
  - As for the rest
  lexicon: BDAG
  rationale: In this context, following Paul's statement that he has finished the
    race, λοιπὸν points to what remains ahead for him rather than introducing a concluding
    topic. 'From now on' captures the temporal sense naturally in English.
- source_word: ἀπόκειταί
  chosen: is laid up
  alternatives:
  - is reserved
  - is stored up
  - awaits
  lexicon: BDAG
  rationale: The verb denotes something being set aside or reserved. 'Is laid up'
    preserves the metaphor and the present-state nuance better than the more interpretive
    'awaits.'
- source_word: ὁ τῆς δικαιοσύνης στέφανος
  chosen: the crown of righteousness
  alternatives:
  - the righteous crown
  - the crown that consists in righteousness
  lexicon: BDAG
  rationale: This is the standard and most natural rendering of the genitival construction.
    It preserves the Greek wording without over-specifying whether the genitive is
    attributive, appositional, or epexegetical.
- source_word: δικαιοσύνης
  chosen: righteousness
  alternatives:
  - justice
  lexicon: BDAG
  rationale: Per doctrine defaults, δικαιοσύνη is rendered 'righteousness' in the
    main text, while 'justice' is preserved as a lexical alternative in a footnote
    for Pauline usage.
- source_word: ἀποδώσει
  chosen: will award
  alternatives:
  - will give
  - will repay
  - will render
  lexicon: BDAG
  rationale: '''Will award'' fits the imagery of a victor''s crown and avoids the
    potentially misleading punitive connotation of ''repay'' in English, while still
    reflecting the sense of giving what is due.'
- source_word: κύριος
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Per doctrine defaults, κύριος is rendered 'Lord.' In this context it
    refers to Christ as eschatological judge.
- source_word: ἐν ἐκείνῃ τῇ ἡμέρᾳ
  chosen: on that day
  alternatives:
  - in that day
  lexicon: BDAG
  rationale: English idiom prefers 'on that day' for a temporal dative with ἐν here,
    while preserving the eschatological force of the phrase.
- source_word: ὁ δίκαιος κριτής
  chosen: the righteous judge
  alternatives:
  - the just judge
  lexicon: BDAG
  rationale: This appositional phrase identifies the Lord's character in judgment.
    'Righteous judge' is both natural and theologically weighty.
- source_word: πᾶσιν τοῖς ἠγαπηκόσι
  chosen: to all who have loved
  alternatives:
  - to all who love
  - to all who have set their love on
  lexicon: BDAG
  rationale: The perfect participle indicates a settled disposition evidenced up to
    the present. 'Have loved' preserves that aspect better than a simple present.
- source_word: ἐπιφάνειαν
  chosen: appearing
  alternatives:
  - manifestation
  - coming
  lexicon: BDAG
  rationale: '''Appearing'' is the most direct rendering and preserves the epiphanic
    nuance without collapsing it into the broader term ''coming.'''
- source_word: αὐτοῦ
  chosen: his
  alternatives:
  - the Lord's
  lexicon: BDAG
  rationale: The pronoun naturally refers back to 'the Lord.' Retaining 'his' follows
    the Greek and keeps the sentence flowing.
