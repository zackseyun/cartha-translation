theological_decisions:
- issue: Nature of Timothy's commission in διακονία
  chosen_reading: Rendered as 'ministry' rather than the broader 'service' because
    the immediate context concerns Timothy's entrusted gospel work and pastoral charge.
  alternative_readings:
  - your service
  rationale: This is not a denominationally loaded choice but a contextual one. The
    verse addresses Timothy's ministerial responsibility in proclaiming and guarding
    the message, so 'ministry' best reflects the scope of the charge while remaining
    faithful to the Greek.
