theological_decisions:
- issue: Rendering of διακονία in Paul's statement about Mark's value
  chosen_reading: ministry
  alternative_readings:
  - service
  rationale: The term can denote service in a broad sense, but here Paul refers to
    Mark's usefulness in apostolic work. 'Ministry' best reflects the likely ecclesial
    context while not importing a technical office beyond the text.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented
    exception)
