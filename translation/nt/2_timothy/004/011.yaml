id: 2TI.4.11
reference: 2 Timothy 4:11
source:
  edition: SBLGNT
  text: Λουκᾶς ἐστιν μόνος μετ’ ἐμοῦ. Μᾶρκον ἀναλαβὼν ἄγε μετὰ σεαυτοῦ, ἔστιν γάρ
    μοι εὔχρηστος εἰς διακονίαν,
translation:
  text: Luke alone is with me. Pick up Mark and bring him with you, for he is useful
    to me for ministry.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "for service." The Greek διακονία can refer more broadly to service,
      though here it likely refers to ministry work.
    reason: lexical_alternative
lexical_decisions:
- source_word: Λουκᾶς
  chosen: Luke
  lexicon: BDAG
  rationale: Standard transliteration of the personal name, following the policy to
    transliterate names rather than translate them.
- source_word: μόνος
  chosen: alone
  alternatives:
  - the only one
  lexicon: BDAG
  rationale: μόνος emphasizes that Luke is the sole companion presently with Paul.
    'Alone' is natural English and preserves the exclusivity.
- source_word: μετ’ ἐμοῦ
  chosen: with me
  alternatives:
  - by my side
  lexicon: BDAG
  rationale: μετά with the genitive here denotes accompaniment. 'With me' is the most
    direct and idiomatic rendering.
- source_word: Μᾶρκον
  chosen: Mark
  lexicon: BDAG
  rationale: Standard transliteration of the personal name.
- source_word: ἀναλαβὼν
  chosen: pick up
  alternatives:
  - take along
  - bring along after taking
  lexicon: BDAG
  rationale: The aorist participle conveys taking Mark up/along before the main action
    of bringing him. 'Pick up' is concise modern English that fits the travel context
    and preserves the sequential sense.
- source_word: ἄγε
  chosen: bring him
  alternatives:
  - bring
  - lead
  lexicon: BDAG
  rationale: Imperative of ἄγω in this context means to bring someone along. English
    requires the object to be explicit for clarity, so 'him' is supplied from the
    context of Mark.
- source_word: μετὰ σεαυτοῦ
  chosen: with you
  alternatives:
  - along with you
  lexicon: BDAG
  rationale: This phrase modifies the command to bring Mark in Timothy's company.
    'With you' is idiomatic and sufficiently precise.
- source_word: εὔχρηστος
  chosen: useful
  alternatives:
  - helpful
  - serviceable
  lexicon: BDAG
  rationale: εὔχρηστος denotes being beneficial or useful. 'Useful' is the clearest
    modern equivalent and avoids sounding overly utilitarian in context.
- source_word: εἰς διακονίαν
  chosen: for ministry
  alternatives:
  - for service
  lexicon: BDAG
  rationale: διακονία can mean service broadly, but in this pastoral-apostolic context
    'ministry' best captures the nature of the work without over-specifying a formal
    office.
- source_word: γάρ μοι
  chosen: for he is useful to me
  alternatives:
  - because he is useful to me
  lexicon: BDAG
  rationale: γάρ introduces the reason for the command, and μοι marks personal benefit/reference.
    'For he is useful to me' preserves the explanatory force in a natural literary
    register.
