id: 2TI.4.12
reference: 2 Timothy 4:12
source:
  edition: SBLGNT
  text: Τυχικὸν δὲ ἀπέστειλα εἰς Ἔφεσον.
translation:
  text: But I sent Tychicus to Ephesus.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'And I sent Tychicus to Ephesus' or 'Now I sent Tychicus to Ephesus';
      the Greek connective δέ can mark either simple continuation or mild contrast.
    reason: lexical_alternative
lexical_decisions:
- source_word: Τυχικὸν
  chosen: Tychicus
  lexicon: BDAG
  rationale: Proper personal name in the accusative; transliterated rather than translated
    in keeping with the policy to transliterate names by standard conventions.
- source_word: δὲ
  chosen: But
  alternatives:
  - And
  - Now
  lexicon: BDAG
  rationale: δέ is a mild connective that can be rendered in several ways depending
    on discourse flow. 'But' preserves a slight contrast or transition from the previous
    statement and is idiomatic in English here.
- source_word: ἀπέστειλα
  chosen: I sent
  alternatives:
  - I have sent
  - I dispatched
  lexicon: BDAG
  rationale: Aorist active indicative, first singular of ἀποστέλλω. 'I sent' is the
    most natural English past tense and fits optimal equivalence. 'Dispatched' is
    possible but sounds overly formal; 'have sent' would overinterpret aspect.
- source_word: εἰς
  chosen: to
  alternatives:
  - into
  lexicon: BDAG
  rationale: With a city name, εἰς is naturally rendered 'to' in English destination
    language. 'Into' would be overly literal and less idiomatic.
- source_word: Ἔφεσον
  chosen: Ephesus
  lexicon: BDAG
  rationale: Place name in the accusative after εἰς; transliterated by standard English
    convention as 'Ephesus'.
