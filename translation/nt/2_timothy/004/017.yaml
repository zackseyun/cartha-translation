theological_decisions:
- issue: Referent of 'the Lord' (κύριος)
  chosen_reading: Rendered simply as 'the Lord' without specifying further in the
    text.
  alternative_readings:
  - Jesus specifically
  - God more generally
  rationale: The immediate context allows many readers to understand κύριος as the
    risen Lord Jesus, but the translation should preserve the text's own wording rather
    than insert an interpretive identification. The doctrinal default for κύριος is
    'Lord.'
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Meaning of 'from the lion’s mouth'
  chosen_reading: Kept as a literal expression of rescue from extreme danger.
  alternative_readings:
  - A metaphor for Nero
  - A metaphor for Satan
  - A reference to literal execution by beasts
  rationale: The phrase has multiple plausible interpretations, and the text itself
    does not resolve them. Preserving the image maintains theological and historical
    tension rather than narrowing it to one theory.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological
    tension rather than resolve it.'
