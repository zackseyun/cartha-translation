theological_decisions:
- issue: Whether ἀποδώσει is rendered as a wish/prayer ('may the Lord repay') or as
    a future statement ('the Lord will repay')
  chosen_reading: the Lord will repay him
  alternative_readings:
  - may the Lord repay him
  rationale: The form ἀποδώσει is future indicative, not optative or imperative. The
    main text therefore presents Paul's statement as a declaration of divine recompense
    rather than an imprecation, while preserving the traditional alternative in a
    footnote because some manuscripts/readers reflect that reading.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
