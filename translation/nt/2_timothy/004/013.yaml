id: 2TI.4.13
reference: 2 Timothy 4:13
source:
  edition: SBLGNT
  text: τὸν φαιλόνην, ὃν ⸀ἀπέλιπον ἐν Τρῳάδι παρὰ Κάρπῳ, ἐρχόμενος φέρε, καὶ τὰ βιβλία,
    μάλιστα τὰς μεμβράνας.
translation:
  text: When you come, bring the cloak that I left in Troas with Carpus, and the books,
    especially the parchments.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the scrolls' for 'the books'; the Greek term can refer to written rolls
      or similar written materials.
    reason: lexical_alternative
  - marker: b
    text: Some interpreters understand 'cloak' as a case or wrapper for books, but
      the usual sense of the Greek word is an outer garment.
    reason: lexical_alternative
lexical_decisions:
- source_word: φαιλόνην
  chosen: cloak
  alternatives:
  - coat
  - traveling cloak
  - book case
  lexicon: BDAG
  rationale: The noun most naturally refers to an outer garment or cloak. Although
    some have proposed 'book case,' the immediate mention of books and parchments
    does not require that sense, and the dominant lexical and contextual evidence
    favors a garment.
- source_word: ἀπέλιπον
  chosen: I left
  alternatives:
  - I left behind
  lexicon: BDAG
  rationale: Aorist active indicative first singular from ἀπολείπω, straightforwardly
    meaning 'I left' or 'I left behind.' 'I left' is idiomatic and sufficient in English.
- source_word: παρὰ Κάρπῳ
  chosen: with Carpus
  alternatives:
  - at Carpus's place
  - beside Carpus
  lexicon: BDAG
  rationale: With παρά plus dative in this context, the sense is location in someone's
    care or at someone's place. 'With Carpus' is concise, natural English that preserves
    the likely meaning.
- source_word: ἐρχόμενος
  chosen: When you come
  alternatives:
  - as you come
  - coming
  lexicon: BDAG
  rationale: The participle is adverbial and temporal relative to the imperative φέρε.
    'When you come' expresses the natural temporal force in idiomatic English.
- source_word: φέρε
  chosen: bring
  alternatives:
  - carry
  lexicon: BDAG
  rationale: Imperative of φέρω. 'Bring' fits the context of requesting Timothy to
    transport items to Paul.
- source_word: τὰ βιβλία
  chosen: the books
  alternatives:
  - the scrolls
  lexicon: BDAG
  rationale: βιβλία can denote books or scrolls. 'Books' is the broad and conventional
    rendering, while the exact physical format is uncertain; the alternative is preserved
    in a footnote because ancient βιβλία were often scrolls.
- source_word: μάλιστα
  chosen: especially
  alternatives:
  - above all
  - particularly
  lexicon: BDAG
  rationale: μάλιστα marks special emphasis on the following item. 'Especially' is
    the clearest modern equivalent.
- source_word: μεμβράνας
  chosen: the parchments
  alternatives:
  - the membranes
  - the parchment notebooks
  lexicon: BDAG
  rationale: μεμβράνα refers to parchment writing material, likely prepared animal
    skin documents. 'Parchments' is the standard and precise rendering.
