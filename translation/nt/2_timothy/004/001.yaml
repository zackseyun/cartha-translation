theological_decisions:
- issue: Rendering Χριστός in a christological title
  chosen_reading: Messiah Jesus
  alternative_readings:
  - Christ Jesus
  rationale: The doctrine excerpt directs that Χριστός be translated as 'Messiah'
    where title is in view, preserving the Hebraic messianic sense. In this solemn
    judicial description, the titular force is still active rather than merely name-like.
  doctrine_reference: 'DOCTRINE.md: Contested terms — Χριστός default English ''Messiah
    (where title; Christ where name-like)''.'
- issue: Force of μέλλω in eschatological judgment statement
  chosen_reading: who is about to judge
  alternative_readings:
  - who will judge
  rationale: The translation preserves the lexical contribution of μέλλω rather than
    collapsing it into a simple future. This keeps the Greek's eschatological tension
    without specifying a timetable beyond the text.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it.'
