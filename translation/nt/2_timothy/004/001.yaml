id: 2TI.4.1
reference: 2 Timothy 4:1
source:
  edition: SBLGNT
  text: ⸀Διαμαρτύρομαι ἐνώπιον τοῦ θεοῦ καὶ ⸂Χριστοῦ Ἰησοῦ⸃, τοῦ μέλλοντος κρίνειν
    ζῶντας καὶ νεκρούς, ⸀καὶ τὴν ἐπιφάνειαν αὐτοῦ καὶ τὴν βασιλείαν αὐτοῦ·
translation:
  text: 'I solemnly charge you before God and Messiah Jesus, who is about to judge
    the living and the dead, and by his appearing and his kingdom:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'who will judge the living and the dead.'
    reason: lexical_alternative
  - marker: b
    text: Or possibly, 'and his appearing and his kingdom,' with the sense left more
      implicit in Greek.
    reason: alternative_reading
lexical_decisions:
- source_word: Διαμαρτύρομαι
  chosen: I solemnly charge you
  alternatives:
  - I testify
  - I earnestly exhort
  - I solemnly urge
  lexicon: BDAG
  rationale: In this epistolary commissioning context, the verb carries the force
    of a solemn charge or earnest adjuration rather than mere testimony. Supplying
    'you' is required by English because the object is implicit from context and made
    explicit in the following imperative sequence.
- source_word: ἐνώπιον
  chosen: before
  alternatives:
  - in the presence of
  lexicon: BDAG
  rationale: '''Before'' is concise modern English that preserves the sense of being
    in the sight/presence of God and Messiah Jesus.'
- source_word: θεοῦ
  chosen: God
  lexicon: BDAG
  rationale: Standard rendering of θεός.
- source_word: Χριστοῦ Ἰησοῦ
  chosen: Messiah Jesus
  alternatives:
  - Christ Jesus
  lexicon: BDAG
  rationale: Per doctrine guidance, Χριστός is translated as 'Messiah' where it functions
    as a title rather than a fixed name-like form. Here the phrase retains clear titular
    force in a solemn theological context.
- source_word: τοῦ μέλλοντος κρίνειν
  chosen: who is about to judge
  alternatives:
  - who will judge
  - who is going to judge
  lexicon: BDAG
  rationale: μέλλω with infinitive often indicates imminence or futurity. 'About to
    judge' preserves the lexical force more closely than the flatter 'will judge,'
    while remaining idiomatic. Because English readers may hear stronger immediacy
    than intended, the alternative is preserved in a footnote.
- source_word: ζῶντας καὶ νεκρούς
  chosen: the living and the dead
  alternatives:
  - those who are living and those who are dead
  lexicon: BDAG
  rationale: This is the standard and natural English rendering of the accusative
    substantival participle/adjective pair, preserving the eschatological scope of
    judgment.
- source_word: ἐπιφάνειαν
  chosen: appearing
  alternatives:
  - manifestation
  - coming
  lexicon: BDAG
  rationale: '''Appearing'' is the most direct and established rendering for ἐπιφάνεια
    in this eschatological context, conveying visible manifestation without overinterpreting.'
- source_word: βασιλείαν
  chosen: kingdom
  alternatives:
  - reign
  - royal rule
  lexicon: BDAG
  rationale: '''Kingdom'' is the default rendering and fits the paired eschatological
    expression with ''appearing.'' ''Reign'' is possible but narrower.'
- source_word: καὶ τὴν ἐπιφάνειαν αὐτοῦ καὶ τὴν βασιλείαν αὐτοῦ
  chosen: and by his appearing and his kingdom
  alternatives:
  - and his appearing and his kingdom
  - and in view of his appearing and his kingdom
  lexicon: BDAG
  rationale: 'The second καί here is syntactically difficult and commonly understood
    as extending the solemn adjuration: ''and by his appearing and his kingdom.''
    This makes good sense of the accusatives as objects of the implied oath/charge
    formula. The more literal coordination is preserved as an alternative in a footnote.'
