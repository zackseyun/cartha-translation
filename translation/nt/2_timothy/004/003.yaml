theological_decisions:
- issue: Rendering διδασκαλία in a pastoral-epistle context
  chosen_reading: teaching
  alternative_readings:
  - doctrine
  rationale: The verse critiques rejection of apostolic instruction, but the Greek
    term itself need not be rendered with the more technical English 'doctrine.' 'Teaching'
    preserves the meaning without denominational overtones, consistent with the project's
    readability goals.
  doctrine_reference: Translation philosophy §6
- issue: Force of κνηθόμενοι τὴν ἀκοήν
  chosen_reading: because they have itching ears
  alternative_readings:
  - with itching ears
  rationale: The Greek participle can be left more formally as 'having itching ears'
    or construed to explain motive. The chosen rendering makes explicit that their
    desire-driven accumulation of teachers is motivated by a craving to hear what
    pleases them, without adding content beyond the idiom's sense.
  doctrine_reference: 'Translation philosophy: optimal equivalence'
