id: 2TI.4.3
reference: 2 Timothy 4:3
source:
  edition: SBLGNT
  text: ἔσται γὰρ καιρὸς ὅτε τῆς ὑγιαινούσης διδασκαλίας οὐκ ἀνέξονται, ἀλλὰ κατὰ
    τὰς ⸂ἰδίας ἐπιθυμίας⸃ ἑαυτοῖς ἐπισωρεύσουσιν διδασκάλους κνηθόμενοι τὴν ἀκοήν,
translation:
  text: For the time will come when they will not put up with sound teaching, but
    according to their own desires they will heap up teachers for themselves, because
    they have itching ears.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'will not endure sound doctrine.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'having itching hearing/ears'; the image describes a craving to
      hear what one wants to hear.
    reason: lexical_alternative
lexical_decisions:
- source_word: καιρὸς
  chosen: the time
  alternatives:
  - a time
  - a season
  lexicon: BDAG
  rationale: καιρός here denotes a definite season or occasion that is coming. 'The
    time' is idiomatic in English and fits the predictive force of ἔσται γὰρ καιρὸς.
- source_word: ὑγιαινούσης διδασκαλίας
  chosen: sound teaching
  alternatives:
  - healthy teaching
  - sound doctrine
  lexicon: BDAG
  rationale: The participle ὑγιαινούσης literally means 'healthy,' used metaphorically
    for what is correct and wholesome. 'Sound teaching' preserves the metaphor in
    natural English without importing heavier ecclesiastical jargon. 'Sound doctrine'
    is possible but less accessible for the stated audience.
- source_word: ἀνέξονται
  chosen: will not put up with
  alternatives:
  - will not endure
  - will not tolerate
  lexicon: BDAG
  rationale: ἀνέχομαι means to endure, bear with, or tolerate. 'Put up with' captures
    the idiomatic sense in readable modern English while retaining the negative refusal
    implied by οὐκ.
- source_word: κατὰ τὰς ἰδίας ἐπιθυμίας
  chosen: according to their own desires
  alternatives:
  - according to their own passions
  - to suit their own desires
  - in line with their own lusts
  lexicon: BDAG
  rationale: ἐπιθυμίαι can denote desires, cravings, or lusts depending on context.
    Here it refers broadly to self-directed wants that govern teacher-selection. 'Desires'
    is broad and natural; 'lusts' would be too narrow and potentially misleading.
- source_word: ἑαυτοῖς
  chosen: for themselves
  alternatives:
  - for their own benefit
  - to themselves
  lexicon: BDAG
  rationale: The dative reflexive indicates that the action is done in their own interest.
    'For themselves' makes that reflexive force clear in English.
- source_word: ἐπισωρεύσουσιν
  chosen: will heap up
  alternatives:
  - will accumulate
  - will gather in piles
  lexicon: BDAG
  rationale: The verb has the vivid sense of piling up or accumulating in quantity.
    'Heap up' preserves the metaphorical excess better than the flatter 'accumulate.'
- source_word: διδασκάλους
  chosen: teachers
  alternatives:
  - instructors
  lexicon: BDAG
  rationale: The ordinary sense is 'teachers.' No specialized title is required by
    the context.
- source_word: κνηθόμενοι τὴν ἀκοήν
  chosen: because they have itching ears
  alternatives:
  - with itching ears
  - their hearing being tickled
  - having their ears tickled
  lexicon: BDAG
  rationale: This participial phrase is idiomatic and vivid. The traditional image
    'itching ears' is close to the Greek and still understandable in modern English.
    Rendering it causally with 'because' clarifies its relation to the main clause
    in natural English.
- source_word: ἀκοήν
  chosen: ears
  alternatives:
  - hearing
  lexicon: BDAG
  rationale: Although ἀκοή literally relates to hearing, in this idiom English naturally
    uses 'ears.' This preserves the metaphor rather than flattening it to abstraction.
