id: 2TI.4.9
reference: 2 Timothy 4:9
source:
  edition: SBLGNT
  text: Σπούδασον ἐλθεῖν πρός με ταχέως·
translation:
  text: Make every effort to come to me quickly.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Be diligent to come to me soon' or 'Do your best to come to me quickly.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Σπούδασον
  chosen: Make every effort
  alternatives:
  - Be diligent
  - Do your best
  - Hurry
  lexicon: BDAG
  rationale: Aorist active imperative of σπουδάζω. The verb conveys earnestness, diligence,
    or zealous effort rather than mere speed by itself. 'Make every effort' best captures
    the imperative force and the sense of intentional exertion in natural English.
    'Hurry' would overlap too much with ταχέως and risk collapsing two distinct elements
    in the Greek.
- source_word: ἐλθεῖν
  chosen: to come
  alternatives:
  - to go
  lexicon: BDAG
  rationale: Aorist infinitive of ἔρχομαι, here governed by σπούδασον. With πρός με
    ('to me'), 'to come' is the natural deictic rendering in English.
- source_word: πρός
  chosen: to
  alternatives:
  - toward
  lexicon: BDAG
  rationale: With the accusative με, πρός indicates movement toward a person. In idiomatic
    English with 'come,' 'to me' is the clearest rendering.
- source_word: με
  chosen: me
  lexicon: BDAG
  rationale: First person singular accusative pronoun; direct object of the preposition
    πρός in this construction.
- source_word: ταχέως
  chosen: quickly
  alternatives:
  - soon
  - without delay
  lexicon: BDAG
  rationale: Adverb meaning quickly or soon. 'Quickly' preserves the adverbial sense
    of speed and avoids softening the urgency. Because σπούδασον already conveys earnest
    effort, ταχέως is best represented distinctly as temporal/rapid urgency.
