id: 2TI.4.4
reference: 2 Timothy 4:4
source:
  edition: SBLGNT
  text: καὶ ἀπὸ μὲν τῆς ἀληθείας τὴν ἀκοὴν ἀποστρέψουσιν, ἐπὶ δὲ τοὺς μύθους ἐκτραπήσονται.
translation:
  text: and they will turn their hearing away from the truth, and turn aside to myths.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their ears'; Greek 'their hearing.'
    reason: lexical_alternative
  - marker: b
    text: Or 'fables.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀληθείας
  chosen: the truth
  alternatives:
  - truth
  lexicon: BDAG
  rationale: Rendered with the article as 'the truth' to reflect the Greek definite
    article and the likely sense of recognized apostolic truth in context, not merely
    truth in the abstract.
- source_word: ἀκοὴν
  chosen: their hearing
  alternatives:
  - their ears
  - their listening
  lexicon: BDAG
  rationale: ἀκοή is literally 'hearing' or 'faculty/act of hearing.' 'Their hearing'
    preserves the object of ἀποστρέψουσιν more closely than the idiomatic but less
    literal 'their ears,' while still reading naturally enough in English.
- source_word: ἀποστρέψουσιν
  chosen: will turn ... away
  alternatives:
  - will turn away
  - will reject
  lexicon: BDAG
  rationale: The verb means to turn away or divert. The construction with τὴν ἀκοήν
    is best represented by 'will turn their hearing away,' preserving the active sense
    and the metaphor of deliberate refusal.
- source_word: μύθους
  chosen: myths
  alternatives:
  - fables
  - stories
  lexicon: BDAG
  rationale: '''Myths'' is the most direct modern equivalent and fits the Pastoral
    Epistles'' contrast between apostolic truth and fabricated or speculative narratives.
    ''Fables'' is traditional but archaic for many readers.'
- source_word: ἐκτραπήσονται
  chosen: turn aside
  alternatives:
  - be turned aside
  - wander off
  lexicon: BDAG
  rationale: The future passive/middle form can be rendered naturally as an intransitive
    'turn aside.' This preserves the contrast with the previous clause without overinterpreting
    agency.
- source_word: ἀπὸ μὲν ... ἐπὶ δὲ
  chosen: from ... and ... to
  alternatives:
  - from ... but ... to
  lexicon: BDAG
  rationale: The μέν...δέ pairing marks contrast. English can express this smoothly
    with coordinated clauses; the directional contrast 'from' and 'to' is preserved
    even without a wooden 'on the one hand ... on the other.'
