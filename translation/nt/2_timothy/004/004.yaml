theological_decisions:
- issue: Nature of 'the truth' in context
  chosen_reading: Rendered as 'the truth' without expanding it to 'sound doctrine'
    or 'the gospel.'
  alternative_readings:
  - sound doctrine
  - the gospel truth
  rationale: The immediate context strongly relates 'the truth' to apostolic teaching,
    but the verse itself uses the broader term ἀλήθεια. The translation preserves
    the text's wording and theological breadth rather than narrowing it interpretively.
  doctrine_reference: Preserve theological tension rather than resolve it.
