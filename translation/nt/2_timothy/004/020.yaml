id: 2TI.4.20
reference: 2 Timothy 4:20
source:
  edition: SBLGNT
  text: Ἔραστος ἔμεινεν ἐν Κορίνθῳ, Τρόφιμον δὲ ⸀ἀπέλιπον ἐν Μιλήτῳ ἀσθενοῦντα.
translation:
  text: Erastus remained in Corinth, but I left Trophimus sick in Miletus.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I left Trophimus behind in Miletus while he was ill.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἔραστος
  chosen: Erastus
  lexicon: BDAG
  rationale: Proper personal name; transliterated by standard English convention per
    translation philosophy.
- source_word: ἔμεινεν
  chosen: remained
  alternatives:
  - stayed
  lexicon: BDAG
  rationale: Aorist of μένω here denotes staying/remainining in a place. 'Remained'
    is slightly more formal and fits the travel-report context well.
- source_word: ἐν Κορίνθῳ
  chosen: in Corinth
  alternatives:
  - at Corinth
  lexicon: BDAG
  rationale: Standard locative use of ἐν with a city name; 'in Corinth' is natural
    modern English.
- source_word: Τρόφιμον
  chosen: Trophimus
  lexicon: BDAG
  rationale: Proper personal name; transliterated by standard English convention.
- source_word: δὲ
  chosen: but
  alternatives:
  - and
  lexicon: BDAG
  rationale: δέ marks a mild contrast between the two travel notes. 'But' brings out
    the contrast more clearly than simple 'and' in English.
- source_word: ἀπέλιπον
  chosen: I left
  alternatives:
  - I left behind
  lexicon: BDAG
  rationale: First-person singular aorist of ἀπολείπω. 'I left' is the plain sense;
    'left behind' is possible but slightly more interpretive than necessary.
- source_word: ἐν Μιλήτῳ
  chosen: in Miletus
  alternatives:
  - at Miletus
  lexicon: BDAG
  rationale: Standard locative use with place name; 'in Miletus' is idiomatic English.
- source_word: ἀσθενοῦντα
  chosen: sick
  alternatives:
  - ill
  - being sick
  - weak
  lexicon: BDAG
  rationale: Present participle modifying Trophimus, indicating his condition at the
    time Paul left him. 'Sick' is concise, natural, and contextually stronger than
    the broader 'weak'.
