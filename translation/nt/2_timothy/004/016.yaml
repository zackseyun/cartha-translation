theological_decisions:
- issue: Tone of Paul's final clause toward those who abandoned him
  chosen_reading: 'A prayer-like wish for their non-imputation of guilt: ''May it
    not be counted against them.'''
  alternative_readings:
  - 'A milder permissive sense: ''Let it not be counted against them.'''
  rationale: The aorist passive optative λογισθείη with μή naturally conveys a wish/prayer
    rather than a mere statement. This preserves the text's echo of forgiveness language
    without importing a stronger doctrinal claim than the Greek states.
  doctrine_reference: Preserve theological tension rather than resolve it.
