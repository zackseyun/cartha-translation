theological_decisions:
- issue: Referent of πνεῦμα
  chosen_reading: a spirit/disposition given by God, not a direct title for the Holy
    Spirit
  alternative_readings:
  - the Spirit
  rationale: The anarthrous πνεῦμα with qualifying genitives and the parallel contrast
    ('not of cowardice, but of power and love and self-control') favors a description
    of the kind of spirit or disposition God gives believers. Rendering it 'the Spirit'
    would over-specify the referent beyond what the immediate syntax requires, though
    the gift is of course from God and compatible with the Spirit's work.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
