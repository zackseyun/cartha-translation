id: 2TI.1.7
reference: 2 Timothy 1:7
source:
  edition: SBLGNT
  text: οὐ γὰρ ἔδωκεν ἡμῖν ὁ θεὸς πνεῦμα δειλίας, ἀλλὰ δυνάμεως καὶ ἀγάπης καὶ σωφρονισμοῦ.
translation:
  text: For God did not give us a spirit of cowardice, but of power and love and self-control.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'timidity' or 'fearfulness'; the Greek term has the sense of cowardice
      rather than ordinary fear.
    reason: lexical_alternative
  - marker: b
    text: Or 'sound judgment' or 'discipline' for 'self-control.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐ γὰρ
  chosen: For ... not
  alternatives:
  - because ... not
  - indeed ... not
  lexicon: BDAG
  rationale: γάρ is best carried forward as an explanatory 'for,' linking this verse
    to the preceding exhortation. οὐ straightforwardly negates the clause.
- source_word: ἔδωκεν
  chosen: did not give
  alternatives:
  - has not given
  - gave
  lexicon: BDAG
  rationale: Aorist indicative is naturally rendered as simple past in English. The
    auxiliary 'did not' expresses the negated past action idiomatically.
- source_word: ἡμῖν
  chosen: us
  alternatives:
  - to us
  lexicon: BDAG
  rationale: The dative indirect object is naturally expressed in English as 'us';
    'to us' would be more explicit but less smooth.
- source_word: ὁ θεὸς
  chosen: God
  alternatives:
  - the God
  lexicon: BDAG
  rationale: English idiom omits the article with 'God' in this construction.
- source_word: πνεῦμα
  chosen: a spirit
  alternatives:
  - the Spirit
  - spirit
  lexicon: BDAG
  rationale: Here πνεῦμα lacks contextual markers that would require the Holy Spirit
    as the referent. In context it denotes the disposition or animating quality God
    gives, contrasted by genitives ('of cowardice' / 'of power...'). The indefinite
    article makes natural English while preserving the qualitative sense.
- source_word: δειλίας
  chosen: cowardice
  alternatives:
  - fear
  - timidity
  lexicon: BDAG
  rationale: δειλία denotes cowardice or shameful fearfulness more specifically than
    generic 'fear.' 'Timidity' is possible and traditional, but 'cowardice' better
    reflects the stronger negative moral nuance of the noun.
- source_word: ἀλλὰ
  chosen: but
  alternatives:
  - rather
  lexicon: BDAG
  rationale: Strong adversative contrast with the preceding phrase is well represented
    by 'but.'
- source_word: δυνάμεως
  chosen: power
  alternatives:
  - strength
  - ability
  lexicon: BDAG
  rationale: δύναμις commonly denotes power or capability; 'power' is the most direct
    and idiomatic rendering in this triad.
- source_word: ἀγάπης
  chosen: love
  alternatives:
  - charity
  lexicon: BDAG
  rationale: Per doctrine default, ἀγάπη is rendered 'love.' 'Charity' is archaic
    in contemporary English.
- source_word: σωφρονισμοῦ
  chosen: self-control
  alternatives:
  - sound judgment
  - discipline
  - sobriety of mind
  lexicon: BDAG
  rationale: σωφρονισμός is a rare term denoting sound-mindedness, self-discipline,
    or self-control. 'Self-control' is clear modern English and fits the ethical triad
    with 'power and love.' 'Sound judgment' is a viable alternative and worth preserving
    in a footnote because the term includes mental sobriety as well as behavioral
    restraint.
