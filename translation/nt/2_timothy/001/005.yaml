id: 2TI.1.5
reference: 2 Timothy 1:5
source:
  edition: SBLGNT
  text: ὑπόμνησιν ⸀λαβὼν τῆς ἐν σοὶ ἀνυποκρίτου πίστεως, ἥτις ἐνῴκησεν πρῶτον ἐν τῇ μάμμῃ σου Λωΐδι καὶ τῇ μητρί σου Εὐνίκῃ, πέπεισμαι δὲ ὅτι καὶ ἐν σοί.
translation:
  text: having been reminded of the sincere faith in you, which first lived in your grandmother Lois and your mother Eunice, I am persuaded that it is also in you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the genuine faithfulness in you' or 'the genuine trust in you.' The Greek word can carry nuances of faith, faithfulness, or trust.
    reason: alternative_reading
  - marker: b
    text: Or 'and I am persuaded is also in you.'.
    reason: previous_rendering
lexical_decisions:
- source_word: ὑπόμνησιν λαβὼν
  chosen: having been reminded
  alternatives:
  - recalling
  - having received a reminder of
  - remembering
  lexicon: BDAG
  rationale: The participial construction literally means 'having received a reminder/remembrance.' In idiomatic English, 'having been reminded' best captures the passive sense of receiving recollection without awkwardness.
- source_word: ἀνυποκρίτου
  chosen: sincere
  alternatives:
  - unhypocritical
  - without hypocrisy
  - genuine
  lexicon: BDAG
  rationale: The adjective denotes absence of pretense or hypocrisy. 'Sincere' is natural modern English and preserves the moral sense of genuineness.
- source_word: πίστεως
  chosen: faith
  alternatives:
  - faithfulness
  - trust
  lexicon: BDAG
  rationale: Per doctrine defaults, πίστις is rendered 'faith' in the main text unless context strongly demands otherwise. Here the reference is to Timothy's inherited Christian believing response, though 'faithfulness' is a plausible nuance worth preserving in a footnote.
- source_word: ἐν σοὶ
  chosen: in you
  alternatives:
  - within you
  lexicon: BDAG
  rationale: A straightforward locative rendering fits both occurrences and preserves Paul's language of indwelling faith.
- source_word: ἥτις
  chosen: which
  alternatives:
  - that faith, which indeed
  - which, being such as it is
  lexicon: BDAG
  rationale: The relative pronoun can have a qualitative nuance, but simple 'which' is sufficient in English here without overtranslating.
- source_word: ἐνῴκησεν
  chosen: lived
  alternatives:
  - dwelt
  - made its home
  - inhabited
  lexicon: BDAG
  rationale: The verb means 'to dwell in.' 'Lived' is readable modern English and works well personifying faith, while retaining the indwelling idea.
- source_word: πρῶτον
  chosen: first
  alternatives:
  - first of all
  - formerly
  lexicon: BDAG
  rationale: '''First'' preserves the temporal sequence that the faith was present in Lois and Eunice before Timothy.'
- source_word: μάμμῃ
  chosen: grandmother
  alternatives:
  - grandmother/maternal grandmother
  lexicon: BDAG
  rationale: The term refers to grandmother. 'Grandmother' is the clear contemporary equivalent.
- source_word: πέπεισμαι
  chosen: I am persuaded
  alternatives:
  - I am convinced
  - I am sure
  lexicon: BDAG
  rationale: The perfect middle/passive conveys settled conviction. 'I am persuaded' preserves both the formal tone and the ongoing state.
- source_word: καὶ ἐν σοί
  chosen: is also in you
  alternatives:
  - also lives in you
  - is in you too
  lexicon: BDAG
  rationale: English supplies the verb naturally from the previous clause. 'Is also in you' is concise and preserves the parallel with the earlier indwelling language without unnecessary repetition.
