id: 2TI.1.1
reference: 2 Timothy 1:1
source:
  edition: SBLGNT
  text: Παῦλος ἀπόστολος ⸂Χριστοῦ Ἰησοῦ⸃ διὰ θελήματος θεοῦ κατ’ ἐπαγγελίαν ζωῆς τῆς
    ἐν Χριστῷ Ἰησοῦ
translation:
  text: Paul, an apostle of Messiah Jesus by the will of God, according to the promise
    of the life that is in Messiah Jesus,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Christ Jesus' in both occurrences of 'Messiah Jesus.'
    reason: alternative_reading
lexical_decisions:
- source_word: Παῦλος
  chosen: Paul
  lexicon: BDAG
  rationale: Standard English transliteration of the personal name.
- source_word: ἀπόστολος
  chosen: apostle
  alternatives:
  - messenger
  - delegate
  lexicon: BDAG
  rationale: In Pauline self-identification, the technical sense 'apostle' is established
    and should be preserved rather than flattened to a more general term.
- source_word: Χριστοῦ Ἰησοῦ / Χριστῷ Ἰησοῦ
  chosen: Messiah Jesus
  alternatives:
  - Christ Jesus
  lexicon: BDAG
  rationale: Following the doctrine guideline, Χριστός is translated as 'Messiah'
    where it functions as a title rather than a name-like fixed form. Here the phrase
    retains titular force in both occurrences, so 'Messiah Jesus' preserves meaning.
- source_word: διὰ θελήματος θεοῦ
  chosen: by the will of God
  alternatives:
  - through the will of God
  lexicon: BDAG
  rationale: διά with the genitive can be rendered 'through' or 'by.' In this commissioning
    formula, 'by the will of God' is idiomatic English and clearly expresses divine
    agency/authorization.
- source_word: κατ’ ἐπαγγελίαν
  chosen: according to the promise
  alternatives:
  - in accordance with the promise
  - for the promise
  lexicon: BDAG
  rationale: κατά with the accusative here expresses conformity or correspondence.
    'According to' is concise and natural while preserving the relation between Paul's
    apostleship and God's promise.
- source_word: ζωῆς
  chosen: of the life
  alternatives:
  - of life
  lexicon: BDAG
  rationale: The genitive depends on ἐπαγγελίαν, yielding 'promise of life.' The article
    is not separately reproduced in English because idiomatic English can express
    the sense either way; 'the life' was retained to reflect the specificity supplied
    by the following qualifier 'that is in Messiah Jesus.'
- source_word: τῆς ἐν Χριστῷ Ἰησοῦ
  chosen: that is in Messiah Jesus
  alternatives:
  - which is in Messiah Jesus
  - in Messiah Jesus
  lexicon: BDAG
  rationale: The article plus prepositional phrase functions attributively, specifying
    the life as the life located/found in union with Messiah Jesus. 'That is in' is
    clear modern English and preserves the relational force of ἐν.
