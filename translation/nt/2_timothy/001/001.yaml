theological_decisions:
- issue: Rendering of Χριστός
  chosen_reading: Messiah
  alternative_readings:
  - Christ
  rationale: The doctrinal guidance directs that Χριστός be translated as 'Messiah'
    where title is in view, while preserving 'Christ' as an alternative. In this salutation,
    the titular sense remains transparent enough to favor 'Messiah Jesus.'
