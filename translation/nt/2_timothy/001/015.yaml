id: 2TI.1.15
reference: 2 Timothy 1:15
source:
  edition: SBLGNT
  text: Οἶδας τοῦτο ὅτι ἀπεστράφησάν με πάντες οἱ ἐν τῇ Ἀσίᾳ, ὧν ἐστιν Φύγελος καὶ
    Ἑρμογένης.
translation:
  text: 'You know this: all those in Asia turned away from me, among whom are Phygelus
    and Hermogenes.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '"Asia" here refers to the Roman province in western Asia Minor, not the
      modern continent.'
    reason: cultural_note
  - marker: b
    text: Or "deserted me" / "abandoned me." The Greek more literally says they "turned
      away from me."
    reason: lexical_alternative
lexical_decisions:
- source_word: Οἶδας
  chosen: You know
  alternatives:
  - You are aware
  - You know well
  lexicon: BDAG
  rationale: οἶδα commonly functions as a present with stative force, expressing existing
    knowledge. 'You know' is the most natural and direct English equivalent.
- source_word: τοῦτο
  chosen: this
  alternatives:
  - this fact
  lexicon: BDAG
  rationale: The demonstrative introduces the content clause that follows. 'This'
    keeps the Greek structure concise; the colon in English clarifies the appositional
    relationship.
- source_word: ὅτι
  chosen: ':'
  alternatives:
  - that
  lexicon: BDAG
  rationale: ὅτι introduces the content of what Timothy knows. In English, a colon
    after 'You know this' is idiomatic and preserves the sense without awkwardness.
- source_word: ἀπεστράφησάν με
  chosen: turned away from me
  alternatives:
  - deserted me
  - abandoned me
  lexicon: BDAG
  rationale: ἀποστρέφω here denotes turning away in relational loyalty or support.
    'Turned away from me' is closer to the Greek image than the more interpretive
    'deserted' or 'abandoned,' while still reading naturally.
- source_word: πάντες οἱ ἐν τῇ Ἀσίᾳ
  chosen: all those in Asia
  alternatives:
  - everyone in Asia
  - all who are in Asia
  lexicon: BDAG
  rationale: The phrase refers to the relevant group associated with Asia, not necessarily
    every inhabitant of the Roman province without exception. 'All those in Asia'
    preserves the Greek wording while allowing the contextual limitation implied by
    the letter.
- source_word: Ἀσίᾳ
  chosen: Asia
  alternatives:
  - the province of Asia
  - Roman Asia
  lexicon: BDAG
  rationale: Ἀσία in the NT normally refers to the Roman province in western Asia
    Minor, not the modern continent. The main text keeps the conventional transliteration
    'Asia'; the cultural specificity is best preserved in a footnote rather than expanded
    in the text.
- source_word: ὧν ἐστιν
  chosen: among whom are
  alternatives:
  - of whom are
  - including
  lexicon: BDAG
  rationale: The relative construction identifies named examples from the larger group.
    'Among whom are' is natural English and preserves the partitive sense better than
    the more compressed 'including.'
- source_word: Φύγελος
  chosen: Phygelus
  rationale: Personal names are transliterated by standard convention per project
    philosophy.
- source_word: Ἑρμογένης
  chosen: Hermogenes
  rationale: Personal names are transliterated by standard convention per project
    philosophy.
