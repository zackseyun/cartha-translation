theological_decisions:
- issue: Scope of 'all those in Asia'
  chosen_reading: A contextual 'all' referring to Paul's associates or professing
    supporters in the province of Asia, not an absolute statement about every individual
    in the region.
  alternative_readings:
  - A fully absolute statement about every Christian in Asia
  - A hyperbolic lament with no intended scope precision
  rationale: The Greek πάντες can be rhetorically comprehensive while still bounded
    by context. The translation preserves the broad force of 'all' without adding
    interpretive qualifiers to the main text. This avoids overstating or softening
    Paul's complaint beyond the source text.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather
    than resolve it
