theological_decisions:
- issue: Rendering Χριστοῦ in the name-title sequence Ἰησοῦ Χριστοῦ
  chosen_reading: Jesus Messiah
  alternative_readings:
  - Jesus Christ
  rationale: The project's doctrine directs that Χριστός be translated as 'Messiah'
    where title is in view, and retained as 'Christ' where name-like. In this verse,
    the phrase follows the title 'our Savior,' so the messianic title remains semantically
    active rather than merely functioning as a surname.
  doctrine_reference: 'DOCTRINE.md: ''Translate titles; transliterate names'' and
    contested terms table for Χριστός'
- issue: Force of καταργήσαντος with respect to death
  chosen_reading: abolished death
  alternative_readings:
  - destroyed death
  - rendered death powerless
  rationale: The verse proclaims Christ's decisive victory over death without requiring
    the translation to settle the timing or extent of that victory beyond the text.
    'Abolished' preserves the strong claim while avoiding over-interpretation that
    death has ceased to exist in the present age.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it'
- issue: Meaning of ἀφθαρσίαν
  chosen_reading: incorruptibility
  alternative_readings:
  - immortality
  rationale: The term can overlap with immortality, but 'incorruptibility' better
    preserves the semantic emphasis on imperishability. The common alternative is
    preserved in a footnote for auditability and reader familiarity.
  doctrine_reference: 'DOCTRINE.md: Consistency of key terms, or documented exception'
