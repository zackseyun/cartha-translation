id: 2TI.1.10
reference: 2 Timothy 1:10
source:
  edition: SBLGNT
  text: φανερωθεῖσαν δὲ νῦν διὰ τῆς ἐπιφανείας τοῦ σωτῆρος ἡμῶν ⸂Ἰησοῦ Χριστοῦ⸃, καταργήσαντος
    μὲν τὸν θάνατον φωτίσαντος δὲ ζωὴν καὶ ἀφθαρσίαν διὰ τοῦ εὐαγγελίου,
translation:
  text: but has now been revealed through the appearing of our Savior Jesus Messiah,
    who indeed abolished death and brought life and incorruptibility to light through
    the gospel,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Jesus Christ.' The Greek Χριστός can function as a title ('Messiah')
      or as a name-like designation ('Christ').
    reason: alternative_reading
  - marker: b
    text: Or 'immortality.' The Greek term emphasizes imperishability or freedom from
      corruption.
    reason: lexical_alternative
lexical_decisions:
- source_word: φανερωθεῖσαν
  chosen: has now been revealed
  alternatives:
  - was manifested
  - has been made known
  lexicon: BDAG
  rationale: Aorist passive participle referring back to God's grace in the previous
    verse; in English, a finite verb is needed for natural connection. 'Revealed'
    is clear modern English and preserves the passive sense better than the more archaic
    'manifested'.
- source_word: ἐπιφανείας
  chosen: appearing
  alternatives:
  - manifestation
  - epiphany
  lexicon: BDAG
  rationale: '''Appearing'' is the most natural rendering in this Christological context
    and is standard for the visible historical advent of Jesus. ''Epiphany'' is too
    transliterated for main text.'
- source_word: σωτῆρος
  chosen: Savior
  alternatives:
  - Deliverer
  lexicon: BDAG
  rationale: Established and accurate rendering for the christological title, preserving
    both soteriological and titular force.
- source_word: Ἰησοῦ Χριστοῦ
  chosen: Jesus Messiah
  alternatives:
  - Jesus Christ
  lexicon: BDAG
  rationale: Per doctrine, Χριστός is translated as 'Messiah' where it functions as
    a title rather than a fixed name-like element. Here, following 'our Savior,' the
    titular sense remains strong.
- source_word: καταργήσαντος
  chosen: abolished
  alternatives:
  - nullified
  - rendered powerless
  - destroyed
  lexicon: BDAG
  rationale: καταργέω commonly means to make ineffective or abolish. 'Abolished' best
    captures decisive defeat without implying annihilation of the phenomenon in an
    absolute present sense. 'Destroyed' could overstate the realized aspect.
- source_word: θάνατον
  chosen: death
  lexicon: BDAG
  rationale: Straightforward lexical rendering; personified in context by the governing
    participle but not requiring capitalization.
- source_word: φωτίσαντος
  chosen: brought ... to light
  alternatives:
  - illuminated
  - made known
  lexicon: BDAG
  rationale: The idiom 'brought to light' naturally conveys revelation/disclosure
    in English and fits the paired objects 'life and incorruptibility'.
- source_word: ζωὴν
  chosen: life
  lexicon: BDAG
  rationale: Standard rendering; in this context it carries eschatological and salvific
    weight but should not be expanded beyond the Greek.
- source_word: ἀφθαρσίαν
  chosen: incorruptibility
  alternatives:
  - immortality
  - imperishability
  lexicon: BDAG
  rationale: ἀφθαρσία denotes freedom from decay/corruption. 'Incorruptibility' is
    more precise than 'immortality,' which can suggest mere endless existence rather
    than imperishable life. The alternative is worth preserving in a footnote because
    many English versions use 'immortality'.
- source_word: διὰ τοῦ εὐαγγελίου
  chosen: through the gospel
  alternatives:
  - by means of the good news
  lexicon: BDAG
  rationale: '''Gospel'' is standard, readable, and suitably weighty; ''through''
    preserves διά with genitive as means/instrument.'
- source_word: μὲν ... δὲ
  chosen: indeed ... and
  alternatives:
  - on the one hand ... on the other
  - while ... and
  lexicon: BDAG
  rationale: 'The pair marks a rhetorical contrast/complement: abolishing death on
    the one side and bringing life/incorruptibility to light on the other. English
    does not require a fully mirrored construction; ''indeed ... and'' preserves the
    emphasis without stiffness.'
