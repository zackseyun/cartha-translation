theological_decisions:
- issue: Reference of the repeated 'Lord' (ὁ κύριος ... παρὰ κυρίου)
  chosen_reading: Both occurrences are rendered simply as 'the Lord' without specifying
    whether the second refers distinctly to the Father or to the Son.
  alternative_readings:
  - first 'Lord' = Christ, second 'Lord' = the Father
  - both occurrences refer to Christ
  rationale: The Greek uses κύριος twice without explicit differentiation. The translation
    preserves the wording and theological ambiguity rather than resolving it beyond
    the text.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Eschatological force of 'that day'
  chosen_reading: Rendered as 'that day' without interpretive expansion.
  alternative_readings:
  - the day of judgment
  - the last day
  rationale: Paul likely refers to the eschatological day of the Lord/judgment, but
    the Greek itself uses the conventional phrase 'that day.' The translation keeps
    the phrase and leaves fuller interpretation to readers.
  doctrine_reference: Preserve theological tension rather than resolve it.
