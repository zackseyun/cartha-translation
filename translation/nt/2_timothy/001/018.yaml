id: 2TI.1.18
reference: 2 Timothy 1:18
source:
  edition: SBLGNT
  text: δῴη αὐτῷ ὁ κύριος εὑρεῖν ἔλεος παρὰ κυρίου ἐν ἐκείνῃ τῇ ἡμέρᾳ— καὶ ὅσα ἐν
    Ἐφέσῳ διηκόνησεν, βέλτιον σὺ γινώσκεις.
translation:
  text: May the Lord grant him to find mercy from the Lord on that day—and you know
    better how much he served in Ephesus.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with the Lord'; the phrase 'from the Lord' takes παρά κυρίου as indicating
      source, while some understand it as emphasizing presence before the Lord.
    reason: lexical_alternative
  - marker: b
    text: '''That day'' is a common New Testament way of referring to the coming day
      of divine judgment or vindication.'
    reason: cross_reference
  - marker: c
    text: Or 'all that he served' / 'what services he rendered.' The Greek expression
      summarizes the extent of his service in Ephesus.
    reason: lexical_alternative
lexical_decisions:
- source_word: δῴη
  chosen: May ... grant
  alternatives:
  - may ... give
  lexicon: BDAG
  rationale: Aorist optative expresses a wish/prayer. 'May ... grant' is idiomatic
    English for a benedictory wish and fits the infinitive complement εὑρεῖν.
- source_word: αὐτῷ
  chosen: him
  alternatives:
  - to him
  lexicon: BDAG
  rationale: Dative indirect object after δῴη. English smooths this as 'grant him
    to find' rather than the more wooden 'grant to him to find.'
- source_word: ὁ κύριος
  chosen: the Lord
  lexicon: BDAG
  rationale: Follows the project's default rendering of κύριος as 'Lord.' The article
    is retained naturally in English.
- source_word: εὑρεῖν ἔλεος
  chosen: to find mercy
  alternatives:
  - to receive mercy
  lexicon: BDAG
  rationale: A straightforward infinitive phrase. 'Find mercy' preserves the Greek
    idiom and echoes biblical usage, while remaining clear in English.
- source_word: παρὰ κυρίου
  chosen: from the Lord
  alternatives:
  - before the Lord
  - with the Lord
  lexicon: BDAG
  rationale: 'With genitive, παρά commonly denotes source or presence. Here source
    is most natural: the mercy is granted ''from the Lord.'' Because κύριος appears
    twice, the repetition is preserved rather than harmonized away.'
- source_word: ἐν ἐκείνῃ τῇ ἡμέρᾳ
  chosen: on that day
  alternatives:
  - in that day
  lexicon: BDAG
  rationale: Idiomatic English for temporal ἐν with 'day.' The demonstrative points
    to the eschatologically significant day already familiar in Pauline usage.
- source_word: ὅσα
  chosen: how much
  alternatives:
  - what things
  - all that
  lexicon: BDAG
  rationale: Neuter plural relative pronoun here summarizes the extent of Onesiphorus's
    service. 'How much' communicates degree naturally in English better than the wooden
    'what things.'
- source_word: ἐν Ἐφέσῳ
  chosen: in Ephesus
  lexicon: BDAG
  rationale: Standard locative rendering of the prepositional phrase.
- source_word: διηκόνησεν
  chosen: he served
  alternatives:
  - he ministered
  lexicon: BDAG
  rationale: Aorist active indicative of διακονέω. 'Served' is clearer and more contemporary
    than 'ministered,' while still conveying practical service.
- source_word: βέλτιον σὺ γινώσκεις
  chosen: you know better
  alternatives:
  - you know very well
  - you know better than I
  lexicon: BDAG
  rationale: Comparative adverb βέλτιον with γινώσκεις idiomatically means Timothy
    knows this more fully. 'You know better' preserves the comparative sense without
    adding an explicit object not present in Greek.
