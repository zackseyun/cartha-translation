id: 2TI.1.2
reference: 2 Timothy 1:2
source:
  edition: SBLGNT
  text: Τιμοθέῳ ἀγαπητῷ τέκνῳ· χάρις, ἔλεος, εἰρήνη ἀπὸ θεοῦ πατρὸς καὶ Χριστοῦ Ἰησοῦ
    τοῦ κυρίου ἡμῶν.
translation:
  text: 'To Timothy, my beloved child: grace, mercy, and peace from God the Father
    and Messiah Jesus our Lord.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Christ Jesus.' The Greek title Χριστός is rendered 'Messiah' here to
      preserve its meaning rather than its traditional transliteration.
    reason: alternative_reading
lexical_decisions:
- source_word: ἀγαπητῷ
  chosen: beloved
  alternatives:
  - dear
  - loved
  lexicon: BDAG
  rationale: ἀγαπητός commonly means 'beloved' or 'dear.' 'Beloved' preserves the
    affectionate and weighty tone of Paul's address better than the lighter 'dear.'
- source_word: τέκνῳ
  chosen: child
  alternatives:
  - son
  lexicon: BDAG
  rationale: τέκνον is more general than 'son' and denotes filial relationship or
    spiritual offspring. 'Child' preserves the metaphor without over-specifying gendered
    descent, while Timothy's male identity is already clear from context.
- source_word: χάρις
  chosen: grace
  lexicon: BDAG
  rationale: Standard Pauline greeting term; 'grace' is the established and accurate
    rendering.
- source_word: ἔλεος
  chosen: mercy
  lexicon: BDAG
  rationale: Direct lexical equivalent; important to preserve distinctly alongside
    'grace' and 'peace,' especially in the Pastoral Epistles where Paul includes it
    in the greeting.
- source_word: εἰρήνη
  chosen: peace
  lexicon: BDAG
  rationale: Direct and conventional rendering, preserving both relational and covenantal
    resonance.
- source_word: θεοῦ πατρὸς
  chosen: God the Father
  alternatives:
  - God our Father
  lexicon: BDAG
  rationale: The Greek lacks ἡμῶν modifying 'Father' here, so 'God the Father' is
    more textually precise than the common traditional expansion 'God our Father.'
- source_word: Χριστοῦ
  chosen: Messiah
  alternatives:
  - Christ
  lexicon: BDAG
  rationale: Per doctrine, Χριστός is translated as 'Messiah' where it functions as
    a title. Here in the greeting formula it still carries titular force, so 'Messiah'
    is preferred, while the traditional 'Christ' is preserved in a footnote.
- source_word: κυρίου
  chosen: Lord
  lexicon: BDAG
  rationale: Per doctrine, κύριος is rendered 'Lord.' This preserves both authority
    and christological significance without importing a narrower gloss such as 'Master'.
