theological_decisions:
- issue: Rendering of Χριστοῦ Ἰησοῦ
  chosen_reading: Messiah Jesus
  alternative_readings:
  - Christ Jesus
  rationale: The translation philosophy directs that Χριστός be translated as 'Messiah'
    when functioning as a title rather than retained as the traditional transliteration
    'Christ.' In this epistolary formula, the titular sense remains intelligible and
    the rendering preserves the meaning of the Greek title.
