id: 2TI.1.12
reference: 2 Timothy 1:12
source:
  edition: SBLGNT
  text: δι’ ἣν αἰτίαν καὶ ταῦτα πάσχω, ἀλλ’ οὐκ ἐπαισχύνομαι, οἶδα γὰρ ᾧ πεπίστευκα,
    καὶ πέπεισμαι ὅτι δυνατός ἐστιν τὴν παραθήκην μου φυλάξαι εἰς ἐκείνην τὴν ἡμέραν.
translation:
  text: For this reason I also suffer these things, but I am not ashamed, for I know
    whom I have believed, and I am convinced that he is able to guard my deposit until
    that day.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the one in whom I have believed'; also possibly 'the one I have trusted.'
    reason: lexical_alternative
  - marker: b
    text: '''My deposit'' translates a term for something placed in another''s care
      for safekeeping. It may refer to what Paul has entrusted to God, or to what
      has been entrusted to Paul.'
    reason: alternative_reading
  - marker: c
    text: That is, the future day of God's final judgment and vindication.
    reason: cross_reference
lexical_decisions:
- source_word: δι’ ἣν αἰτίαν
  chosen: For this reason
  alternatives:
  - Because of this cause
  - For which reason
  lexicon: BDAG
  rationale: Idiomatic causal expression. 'For this reason' preserves the formal link
    while sounding natural in modern English.
- source_word: ταῦτα πάσχω
  chosen: I also suffer these things
  alternatives:
  - I suffer these things also
  - I am suffering these things
  lexicon: BDAG
  rationale: πάσχω means 'suffer, endure suffering.' The present tense is rendered
    simply as English present. 'These things' preserves the demonstrative rather than
    specifying the sufferings.
- source_word: οὐκ ἐπαισχύνομαι
  chosen: I am not ashamed
  alternatives:
  - I am not put to shame
  - I do not feel shame
  lexicon: BDAG
  rationale: The middle/passive form here is best rendered with the standard idiom
    'be ashamed.' 'Put to shame' is possible but less likely in this immediate context,
    where Paul speaks of his own stance toward suffering.
- source_word: οἶδα
  chosen: I know
  alternatives:
  - I have known
  lexicon: BDAG
  rationale: 'Although οἶδα is formally perfect in form, it functions as a present
    with stative force: ''I know.'''
- source_word: ᾧ πεπίστευκα
  chosen: whom I have believed
  alternatives:
  - the one in whom I have believed
  - the one I have trusted
  lexicon: BDAG
  rationale: The dative relative pronoun with πιστεύω can mean 'believe in' or 'trust.'
    'Whom I have believed' is a close rendering that preserves the personal object
    and the perfect tense's settled commitment. The more idiomatic English alternative
    'trusted' is preserved in a footnote.
- source_word: πέπεισμαι
  chosen: I am convinced
  alternatives:
  - I am persuaded
  - I remain convinced
  lexicon: BDAG
  rationale: Perfect passive with present force expressing settled persuasion. 'Convinced'
    is clear modern English; 'persuaded' is more traditional but less natural.
- source_word: δυνατός ἐστιν
  chosen: he is able
  alternatives:
  - he is powerful enough
  - he can
  lexicon: BDAG
  rationale: Standard rendering of ability/capacity. 'He is able' preserves the theological
    weight without overexpansion.
- source_word: τὴν παραθήκην μου
  chosen: my deposit
  alternatives:
  - what has been entrusted to me
  - what I have entrusted to him
  lexicon: BDAG
  rationale: παραθήκη denotes a deposit or trust placed for safekeeping. 'My deposit'
    is the most lexically transparent rendering and preserves the ambiguity of whether
    the genitive refers to what belongs to Paul or what has been entrusted to him.
    Because interpreters dispute the direction of the entrustment, the alternatives
    are preserved in footnotes rather than resolved in the main text.
- source_word: φυλάξαι
  chosen: to guard
  alternatives:
  - to keep
  - to protect
  lexicon: BDAG
  rationale: φυλάσσω commonly means 'guard, keep watch over, preserve.' 'Guard' fits
    the deposit metaphor especially well.
- source_word: εἰς ἐκείνην τὴν ἡμέραν
  chosen: until that day
  alternatives:
  - for that day
  - until that Day
  lexicon: BDAG
  rationale: εἰς with temporal force here points forward to the eschatological day.
    'Until that day' is idiomatic and preserves the temporal sense. Capitalization
    is interpretive in English, so lowercase is retained in the main text.
