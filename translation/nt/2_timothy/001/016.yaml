theological_decisions:
- issue: Referent of 'the Lord' in Paul's benediction
  chosen_reading: Render generically as 'the Lord' without specifying further in translation.
  alternative_readings:
  - the Lord as God the Father
  - the Lord as the Lord Jesus
  rationale: The Greek text says only ὁ κύριος. Since the verse itself does not explicitly
    identify the referent, the translation preserves the wording without importing
    a doctrinally specific identification.
  doctrine_reference: Preserve theological tension rather than resolve it.
