id: 2TI.1.16
reference: 2 Timothy 1:16
source:
  edition: SBLGNT
  text: δῴη ἔλεος ὁ κύριος τῷ Ὀνησιφόρου οἴκῳ, ὅτι πολλάκις με ἀνέψυξεν, καὶ τὴν ἅλυσίν
    μου οὐκ ἐπαισχύνθη·
translation:
  text: May the Lord grant mercy to the household of Onesiphorus, because he often
    refreshed me and was not ashamed of my chain.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my imprisonment'; literally 'my chain.'
    reason: lexical_alternative
lexical_decisions:
- source_word: δῴη
  chosen: May ... grant
  alternatives:
  - give
  - bestow
  lexicon: BDAG
  rationale: Aorist optative expresses a wish/prayer. English 'May ... grant' naturally
    conveys the volitional nuance better than a simple indicative 'gives' or a wooden
    'may give'.
- source_word: ἔλεος
  chosen: mercy
  alternatives:
  - compassion
  lexicon: BDAG
  rationale: Standard and contextually fitting rendering for divine favor shown in
    need; 'mercy' is idiomatic in a benedictory wish.
- source_word: ὁ κύριος
  chosen: the Lord
  lexicon: BDAG
  rationale: DOCTRINE.md specifies 'Lord' as the default rendering for κύριος. Here
    it functions as a divine title in a prayer-like blessing.
- source_word: τῷ Ὀνησιφόρου οἴκῳ
  chosen: to the household of Onesiphorus
  alternatives:
  - to Onesiphorus's house
  - to the family of Onesiphorus
  lexicon: BDAG
  rationale: οἶκος here likely refers to the household/family unit rather than merely
    the physical building. 'Household' preserves the social sense while remaining
    natural English.
- source_word: ὅτι
  chosen: because
  alternatives:
  - for
  - since
  lexicon: BDAG
  rationale: Introduces the reason for the blessing. 'Because' is the clearest modern
    English connector.
- source_word: πολλάκις
  chosen: often
  alternatives:
  - many times
  - frequently
  lexicon: BDAG
  rationale: Concise and natural rendering of repeated action.
- source_word: ἀνέψυξεν
  chosen: refreshed
  alternatives:
  - revived
  - encouraged
  lexicon: BDAG
  rationale: The verb denotes giving relief or refreshment. 'Refreshed' preserves
    the metaphor and fits Paul's experience of personal encouragement and relief.
- source_word: τὴν ἅλυσίν μου
  chosen: my chain
  alternatives:
  - my imprisonment
  - my chains
  lexicon: BDAG
  rationale: Singular ἅλυσις is best kept as 'chain.' It likely stands metonymically
    for Paul's imprisonment, but the concrete image should be preserved in the main
    text.
- source_word: οὐκ ἐπαισχύνθη
  chosen: was not ashamed
  alternatives:
  - did not feel shame
  - was not embarrassed
  lexicon: BDAG
  rationale: Aorist passive/deponent idiomatically means 'was not ashamed.' This preserves
    the moral-social force better than the weaker 'embarrassed'.
