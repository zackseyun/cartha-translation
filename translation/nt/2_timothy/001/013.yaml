theological_decisions:
- issue: Sense of ἐν πίστει καὶ ἀγάπῃ τῇ ἐν Χριστῷ Ἰησοῦ
  chosen_reading: The phrase modifies Timothy's holding to the pattern, expressing
    the sphere/manner characterized by faith and love rooted in Messiah Jesus.
  alternative_readings:
  - The phrase modifies the 'sound words' themselves, i.e., words about faith and
    love in Messiah Jesus.
  rationale: Greek syntax allows some ambiguity, but the exhortational flow favors
    understanding faith and love as the manner or sphere in which Timothy is to maintain
    the apostolic pattern. This preserves the theological tension without overstating
    certainty; the alternative is noted in a footnote.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather
    than resolve it)
- issue: Rendering Χριστός
  chosen_reading: Messiah
  alternative_readings:
  - Christ
  rationale: The doctrine excerpt directs that Χριστός be translated as 'Messiah'
    where it functions as a title. In this Pauline formula the titular sense remains
    present enough to prefer 'Messiah Jesus,' while preserving the traditional alternative
    in a footnote.
  doctrine_reference: 'Contested terms table: Χριστός → Messiah (where title; Christ
    where name-like)'
