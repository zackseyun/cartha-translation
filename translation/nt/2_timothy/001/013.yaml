id: 2TI.1.13
reference: 2 Timothy 1:13
source:
  edition: SBLGNT
  text: ὑποτύπωσιν ἔχε ὑγιαινόντων λόγων ὧν παρ’ ἐμοῦ ἤκουσας ἐν πίστει καὶ ἀγάπῃ
    τῇ ἐν Χριστῷ Ἰησοῦ·
translation:
  text: Hold to the pattern of sound words that you heard from me, in faith and love
    that are in Messiah Jesus.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in faithfulness and love.' The Greek word for 'faith' can also carry
      the sense 'faithfulness' or 'trust.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the sound words that you heard from me concerning faith and love in
      Messiah Jesus.' The Greek construction may be taken to describe either Timothy's
      manner of holding the pattern or the content of the words.
    reason: alternative_reading
  - marker: c
    text: 'Traditional rendering: ''Christ Jesus.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: ὑποτύπωσιν
  chosen: pattern
  alternatives:
  - standard
  - outline
  - example
  - model
  lexicon: BDAG
  rationale: ὑποτύπωσις denotes a pattern, sketch, or model to be followed. 'Pattern'
    is natural English and preserves the idea of a normative form without over-specifying
    'standard.'
- source_word: ἔχε
  chosen: Hold to
  alternatives:
  - have
  - keep
  - maintain
  lexicon: BDAG
  rationale: Although literally 'have,' the imperative in context calls Timothy to
    retain or adhere to the apostolic pattern. 'Hold to' captures the force in idiomatic
    modern English without excessive paraphrase.
- source_word: ὑγιαινόντων λόγων
  chosen: sound words
  alternatives:
  - healthy words
  - sound teaching
  - wholesome words
  lexicon: BDAG
  rationale: ὑγιαίνω metaphorically means 'be sound/healthy,' especially of teaching.
    λόγοι is 'words,' and retaining 'words' stays closer to the Greek than the more
    interpretive 'teaching,' while 'sound' preserves the established metaphor.
- source_word: ὧν παρ’ ἐμοῦ ἤκουσας
  chosen: that you heard from me
  alternatives:
  - which you heard from me
  - that you heard beside me
  lexicon: BDAG
  rationale: παρά with genitive here indicates source, 'from me.' The relative clause
    naturally modifies 'words' in English.
- source_word: ἐν πίστει
  chosen: in faith
  alternatives:
  - with faith
  - in faithfulness
  - with trust
  lexicon: BDAG
  rationale: πίστις is rendered by the project's default as 'faith.' Here the phrase
    most naturally describes the sphere or manner in which Timothy is to hold the
    pattern. Because πίστις can also mean 'faithfulness,' that alternative is preserved
    in a footnote.
- source_word: καὶ ἀγάπῃ
  chosen: and love
  lexicon: BDAG
  rationale: ἀγάπη is straightforwardly 'love' per project default.
- source_word: τῇ ἐν Χριστῷ Ἰησοῦ
  chosen: that are in Messiah Jesus
  alternatives:
  - which are in Christ Jesus
  lexicon: BDAG
  rationale: The article with the prepositional phrase modifies both 'faith' and 'love'
    collectively in sense. 'That are in' makes the English agree with the plural pair
    'faith and love.' Χριστῷ is rendered 'Messiah' as a title per doctrine guidance
    rather than the traditional 'Christ'.
- source_word: Χριστῷ Ἰησοῦ
  chosen: Messiah Jesus
  alternatives:
  - Christ Jesus
  lexicon: BDAG
  rationale: Χριστός functions as a title here, so 'Messiah' best preserves meaning
    and aligns with the stated translation philosophy.
