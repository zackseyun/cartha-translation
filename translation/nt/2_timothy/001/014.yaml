theological_decisions:
- issue: Referent of 'the good deposit'
  chosen_reading: The phrase is left general as 'the good deposit' rather than specifying
    'the gospel' or 'your ministry.'
  alternative_readings:
  - the gospel message entrusted to Timothy
  - Timothy's ministerial commission
  rationale: The immediate context strongly suggests the apostolic gospel/trust, but
    the Greek expression itself is compact and metaphorical. The translation preserves
    the text's wording rather than resolving the referent interpretively in the main
    text.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Scope of 'us' in 'who dwells in us'
  chosen_reading: Rendered as 'us' without narrowing to either Paul-and-Timothy specifically
    or all believers universally.
  alternative_readings:
  - in us believers generally
  - in us, Paul and Timothy specifically
  rationale: ἡμῖν could be heard as the immediate Christian community represented
    by Paul and Timothy, with broader ecclesial implication. The translation keeps
    the pronoun unchanged and does not force a narrower theological conclusion.
  doctrine_reference: Preserve theological tension rather than resolve it.
