id: 2TI.1.14
reference: 2 Timothy 1:14
source:
  edition: SBLGNT
  text: τὴν καλὴν παραθήκην φύλαξον διὰ πνεύματος ἁγίου τοῦ ἐνοικοῦντος ἐν ἡμῖν.
translation:
  text: Guard the good deposit through the Holy Spirit who dwells in us.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the noble deposit' or 'what has been entrusted to you.'
    reason: lexical_alternative
  - marker: b
    text: Or 'by the Holy Spirit who lives in us.'
    reason: lexical_alternative
lexical_decisions:
- source_word: παραθήκην
  chosen: deposit
  alternatives:
  - entrustment
  - what has been entrusted
  lexicon: BDAG
  rationale: παραθήκη denotes something entrusted for safekeeping. 'Deposit' is concise
    and preserves the metaphor of a valuable trust better than a more interpretive
    expansion.
- source_word: καλὴν
  chosen: good
  alternatives:
  - noble
  - beautiful
  - precious
  lexicon: BDAG
  rationale: καλός here qualifies the entrusted deposit as morally and intrinsically
    good. 'Good' is the most natural English rendering and avoids over-interpreting
    the nuance as merely aesthetic ('beautiful') or value-based ('precious').
- source_word: φύλαξον
  chosen: Guard
  alternatives:
  - keep
  - protect
  lexicon: BDAG
  rationale: The aorist imperative calls for active safeguarding. 'Guard' best conveys
    vigilant protection of something entrusted, stronger than the more generic 'keep'.
- source_word: διὰ πνεύματος ἁγίου
  chosen: through the Holy Spirit
  alternatives:
  - by the Holy Spirit
  - through the agency of the Holy Spirit
  lexicon: BDAG
  rationale: διά with the genitive commonly expresses means or agency. 'Through the
    Holy Spirit' preserves that instrumental sense in natural English.
- source_word: τοῦ ἐνοικοῦντος ἐν ἡμῖν
  chosen: who dwells in us
  alternatives:
  - who lives in us
  - who indwells us
  lexicon: BDAG
  rationale: The present participle ἐνοικοῦντος describes the Spirit as presently
    residing within believers. 'Who dwells in us' is clear, idiomatic, and preserves
    the ongoing sense without importing technical jargon like 'indwells' into the
    main text.
- source_word: ἐν ἡμῖν
  chosen: in us
  alternatives:
  - among us
  lexicon: BDAG
  rationale: The most direct sense is internal presence 'in us.' While some argue
    for a corporate nuance ('among us'), the immediate wording naturally supports
    'in us,' and this also fits Pauline usage of the Spirit's indwelling.
