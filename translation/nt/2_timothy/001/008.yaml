theological_decisions:
- issue: Relation of 'testimony' to 'our Lord'
  chosen_reading: 'objective genitive: ''the testimony about our Lord'''
  alternative_readings:
  - 'subjective genitive: ''the testimony of our Lord'''
  rationale: In context Paul urges Timothy not to be ashamed of the Christian witness
    centered on Jesus, parallel to not being ashamed of Paul as Christ's prisoner.
    The objective sense best fits the exhortation and is clearer in English.
  doctrine_reference: Translation philosophy §1, §3
- issue: Force of Paul's imprisonment in 'his prisoner'
  chosen_reading: retain possessive relation to the Lord rather than flatten to merely
    'a prisoner for him'
  alternative_readings:
  - his prisoner = prisoner for his sake
  - the Lord's prisoner
  rationale: The genitive αὐτοῦ signals belonging/association with the Lord. 'His
    prisoner' preserves the theological claim that Paul's chains are bound up with
    his allegiance to Christ without importing more than the text states.
  doctrine_reference: Translation philosophy §1, §5
