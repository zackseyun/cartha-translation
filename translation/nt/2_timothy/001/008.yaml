id: 2TI.1.8
reference: 2 Timothy 1:8
source:
  edition: SBLGNT
  text: Μὴ οὖν ἐπαισχυνθῇς τὸ μαρτύριον τοῦ κυρίου ἡμῶν μηδὲ ἐμὲ τὸν δέσμιον αὐτοῦ,
    ἀλλὰ συγκακοπάθησον τῷ εὐαγγελίῳ κατὰ δύναμιν θεοῦ,
translation:
  text: Therefore, do not be ashamed of the testimony about our Lord, nor of me, his
    prisoner, but suffer hardship with the gospel according to the power of God,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the testimony of our Lord.' The Greek genitive could be read that way,
      but here it likely means the testimony about the Lord.
    reason: alternative_reading
  - marker: b
    text: Or, 'share in suffering for the gospel.' The Greek verb includes the idea
      of joining with others in suffering hardship.
    reason: lexical_alternative
  - marker: c
    text: Or, 'by the power of God.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Μὴ οὖν
  chosen: Therefore, do not
  alternatives:
  - So do not
  - Then do not
  lexicon: BDAG
  rationale: οὖν marks inference from the preceding exhortation; 'Therefore' preserves
    the logical connection, while μή with the aorist subjunctive gives a prohibition.
- source_word: ἐπαισχυνθῇς
  chosen: be ashamed
  alternatives:
  - be embarrassed
  - feel shame
  lexicon: BDAG
  rationale: The verb denotes experiencing shame or shrinking back in disgrace. 'Be
    ashamed' is the standard, natural English equivalent and fits the moral-social
    force of the context.
- source_word: τὸ μαρτύριον
  chosen: the testimony
  alternatives:
  - the witness
  - the testimony borne
  lexicon: BDAG
  rationale: μαρτύριον here refers to the witness/testimony concerning the Lord rather
    than a legal 'testimony' only. 'Testimony' is idiomatic and preserves the noun
    form.
- source_word: τοῦ κυρίου ἡμῶν
  chosen: about our Lord
  alternatives:
  - of our Lord
  lexicon: BDAG
  rationale: 'The genitive with μαρτύριον is most naturally understood as objective
    here: the testimony concerning our Lord. Rendering ''about our Lord'' makes the
    relation explicit in English and avoids ambiguity that ''of our Lord'' could suggest
    (i.e., testimony given by the Lord).'
- source_word: μηδὲ ἐμὲ τὸν δέσμιον αὐτοῦ
  chosen: nor of me, his prisoner
  alternatives:
  - nor me, his prisoner
  - nor of me, the prisoner of him
  - nor of me, his captive
  lexicon: BDAG
  rationale: μηδέ coordinates a second object of shame. δέσμιος means 'prisoner.'
    'His prisoner' preserves the genitive αὐτοῦ and the theological nuance that Paul's
    imprisonment is on account of and in belonging to the Lord.
- source_word: συγκακοπάθησον
  chosen: suffer hardship with
  alternatives:
  - share in suffering for
  - join in suffering with
  - endure hardship with
  lexicon: BDAG
  rationale: The compound verb calls Timothy to participate together in suffering
    hardship. 'Suffer hardship with' preserves the prefixed συν- idea without over-specifying
    the implied companion. A more expansive rendering is possible, but this keeps
    close to the Greek.
- source_word: τῷ εὐαγγελίῳ
  chosen: the gospel
  alternatives:
  - the good news
  lexicon: BDAG
  rationale: Dative relation after συγκακοπάθησον is compressed in Greek. 'With the
    gospel' is retained in English to mirror the construction and preserve the sense
    of suffering in association with the gospel/message.
- source_word: κατὰ δύναμιν θεοῦ
  chosen: according to the power of God
  alternatives:
  - by the power of God
  - in keeping with God's power
  lexicon: BDAG
  rationale: κατά with the accusative here expresses standard or accordance. 'According
    to the power of God' is formally close and leaves open whether the sense is measure,
    norm, or enabling basis; 'by the power of God' is interpretive.
