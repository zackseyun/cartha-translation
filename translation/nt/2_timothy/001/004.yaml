id: 2TI.1.4
reference: 2 Timothy 1:4
source:
  edition: SBLGNT
  text: ἐπιποθῶν σε ἰδεῖν, μεμνημένος σου τῶν δακρύων, ἵνα χαρᾶς πληρωθῶ
translation:
  text: longing to see you, remembering your tears, so that I may be filled with joy,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'yearning to see you.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπιποθῶν
  chosen: longing
  alternatives:
  - yearning
  - greatly desiring
  lexicon: BDAG
  rationale: Present participle expressing strong personal desire. 'Longing' is natural
    modern English and preserves the emotional force without sounding archaic.
- source_word: σε ἰδεῖν
  chosen: to see you
  alternatives:
  - to behold you
  lexicon: BDAG
  rationale: 'Infinitive construction after ἐπιποθῶν is straightforwardly complementary:
    the object of longing is seeing Timothy. ''To see you'' is idiomatic and sufficiently
    direct.'
- source_word: μεμνημένος
  chosen: remembering
  alternatives:
  - recalling
  - mindful of
  lexicon: BDAG
  rationale: Perfect middle/passive participle of μιμνῄσκομαι conveys a state of remembrance.
    English present participle 'remembering' fits the flow of the sentence and communicates
    the ongoing recollection.
- source_word: σου τῶν δακρύων
  chosen: your tears
  alternatives:
  - your weeping
  lexicon: BDAG
  rationale: Genitive construction naturally refers to Timothy's tears. 'Your tears'
    is the most direct rendering; 'weeping' would be more interpretive.
- source_word: ἵνα
  chosen: so that
  alternatives:
  - in order that
  lexicon: BDAG
  rationale: Introduces purpose/result. 'So that' is readable modern English and preserves
    the clause relationship.
- source_word: χαρᾶς
  chosen: with joy
  alternatives:
  - of joy
  lexicon: BDAG
  rationale: Genitive with πληρωθῶ is idiomatically rendered in English as 'filled
    with joy' rather than the wooden 'filled of joy.'
- source_word: πληρωθῶ
  chosen: I may be filled
  alternatives:
  - I may be made full
  - I may be fulfilled
  lexicon: BDAG
  rationale: Aorist passive subjunctive after ἵνα. 'I may be filled' is the standard
    idiomatic equivalent and avoids the misleading English sense of 'fulfilled' as
    self-actualized.
