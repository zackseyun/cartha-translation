theological_decisions:
- issue: Whether to render κῆρυξ with the traditional ecclesial term 'preacher' or
    the more lexical 'herald'
  chosen_reading: herald
  alternative_readings:
  - preacher
  rationale: The verse lists Paul's commissioned roles. Rendering κῆρυξ as 'herald'
    foregrounds the official proclamation aspect of the Greek term and avoids narrowing
    it to a later church-office concept. This is a lexical/theological nuance rather
    than a doctrinal dispute.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; readable modern English, not archaic or academic.'
