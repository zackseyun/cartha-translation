id: 2TI.1.11
reference: 2 Timothy 1:11
source:
  edition: SBLGNT
  text: εἰς ὃ ἐτέθην ἐγὼ κῆρυξ καὶ ἀπόστολος καὶ ⸀διδάσκαλος.
translation:
  text: for which I was appointed a herald and an apostle and a teacher.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a preacher.' The Greek term denotes an official herald or public proclaimer.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰς ὃ
  chosen: for which
  alternatives:
  - for this
  - to which
  - for which purpose
  lexicon: BDAG
  rationale: The preposition εἰς with the relative pronoun here points back to the
    gospel/testimony in the previous context and expresses purpose/reference. 'For
    which' is idiomatic English and preserves the backward reference better than the
    more wooden 'to which.'
- source_word: ἐτέθην
  chosen: I was appointed
  alternatives:
  - I was placed
  - I was assigned
  - I was made
  lexicon: BDAG
  rationale: Passive of τίθημι can mean 'be appointed/assigned' in role contexts.
    Given the following predicate nouns naming ministerial roles, 'was appointed'
    best conveys commissioning rather than mere physical placement.
- source_word: ἐγὼ
  chosen: I
  alternatives:
  - I myself
  lexicon: BDAG
  rationale: The explicit pronoun adds emphasis in Greek, but English does not require
    a marked rendering here. The emphasis is sufficiently carried by the clause structure;
    'I myself' would sound overstated in this context.
- source_word: κῆρυξ
  chosen: a herald
  alternatives:
  - a preacher
  - a proclaimer
  lexicon: BDAG
  rationale: κῆρυξ denotes an official herald or public announcer. 'Herald' preserves
    the formal, commissioned sense better than 'preacher,' which can import later
    ecclesial associations not explicit in the term itself.
- source_word: ἀπόστολος
  chosen: an apostle
  alternatives:
  - a messenger
  - an envoy
  lexicon: BDAG
  rationale: Although the term can broadly mean messenger/envoy, in Pauline self-reference
    it functions as the recognized apostolic title. 'Apostle' is the most accurate
    and established rendering here.
- source_word: διδάσκαλος
  chosen: a teacher
  alternatives:
  - an instructor
  lexicon: BDAG
  rationale: The ordinary sense is 'teacher.' This is clear, natural English and fits
    the sequence of ministry roles without unnecessary elaboration.
