  from: before times eternal
  to: before eternal ages
  rationale: The current rendering 'before times eternal' uses a postpositive adjective, which is an archaic and unnatural construction in modern English prose. While it mirrors the Greek word order, this is a common pattern in Greek and does not carry special emphasis that warrants an awkward English calque. A more natural rendering like 'before eternal ages' (already noted as an alternative) or 'before eternal times' is equally faithful to the source text's meaning while being significantly more readable.
