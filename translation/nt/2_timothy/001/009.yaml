theological_decisions:
- issue: Rendering Χριστῷ as title or name-like form
  chosen_reading: Messiah Jesus
  alternative_readings:
  - Christ Jesus
  rationale: The translation philosophy directs that Χριστός be rendered 'Messiah' where title is in view. In this Pauline formula the titular sense remains active, so the meaning-bearing translation is preferred.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; Contested terms table for Χριστός'
- issue: Interpretive force of κλήσει ἁγίᾳ
  chosen_reading: with a holy calling
  alternative_readings:
  - to a holy calling
  - by a holy calling
  rationale: The dative construction can be understood in more than one way. The chosen rendering preserves the ambiguity rather than resolving it too narrowly, in keeping with the instruction to preserve theological tension where the source permits multiple nuances.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it'
