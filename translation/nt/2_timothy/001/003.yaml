id: 2TI.1.3
reference: 2 Timothy 1:3
source:
  edition: SBLGNT
  text: Χάριν ἔχω τῷ θεῷ, ᾧ λατρεύω ἀπὸ προγόνων ἐν καθαρᾷ συνειδήσει, ὡς ἀδιάλειπτον
    ἔχω τὴν περὶ σοῦ μνείαν ἐν ταῖς δεήσεσίν μου, νυκτὸς καὶ ἡμέρας
translation:
  text: I thank God, whom I serve as my ancestors did with a clean conscience, as
    I constantly remember you in my prayers night and day.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'whom I worship.' The Greek verb can refer to religious service or worship
      offered to God.
    reason: lexical_alternative
  - marker: b
    text: Or 'in the tradition of my ancestors' or more literally 'from my ancestors.'
      The phrase expresses continuity with ancestral faith and service.
    reason: lexical_alternative
  - marker: c
    text: More literally, 'I have the remembrance concerning you in my prayers.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Χάριν ἔχω
  chosen: I thank
  alternatives:
  - I have thanks
  - I am grateful
  lexicon: BDAG
  rationale: The idiom χάριν ἔχω + dative means to express thanks to someone. 'I thank'
    is natural English and preserves the direct thanksgiving sense better than the
    overly literal 'I have thanks.'
- source_word: τῷ θεῷ
  chosen: God
  lexicon: BDAG
  rationale: 'Simple dative object of thanksgiving: ''to God.'' In English this is
    naturally incorporated into ''I thank God.'''
- source_word: ᾧ λατρεύω
  chosen: whom I serve
  alternatives:
  - whom I worship
  - to whom I render sacred service
  lexicon: BDAG
  rationale: λατρεύω can denote religious service/worship offered to God. 'Serve'
    is the best optimal-equivalence rendering here because it preserves both devotion
    and ongoing service without sounding overly technical.
- source_word: ἀπὸ προγόνων
  chosen: as my ancestors did
  alternatives:
  - from my ancestors
  - in the tradition of my ancestors
  - from forefathers
  lexicon: BDAG
  rationale: The phrase likely indicates continuity with ancestral heritage rather
    than mere temporal origin. 'As my ancestors did' communicates inherited continuity
    of worship/service in idiomatic English.
- source_word: ἐν καθαρᾷ συνειδήσει
  chosen: with a clean conscience
  alternatives:
  - in a clean conscience
  - with a pure conscience
  lexicon: BDAG
  rationale: The prepositional phrase expresses manner. 'Clean conscience' is clear
    modern English; 'pure conscience' is also possible, but 'clean' fits the moral-cleanness
    nuance naturally.
- source_word: ὡς
  chosen: as
  alternatives:
  - when
  - because
  - how
  lexicon: BDAG
  rationale: 'Here ὡς introduces the content/circumstance accompanying the thanksgiving:
    Paul thanks God as he continually remembers Timothy. ''As'' preserves the connection
    without overinterpreting it causally.'
- source_word: ἀδιάλειπτον
  chosen: constantly
  alternatives:
  - unceasingly
  - without ceasing
  lexicon: BDAG
  rationale: The adjective functions adverbially with ἔχω ... μνείαν. 'Constantly'
    gives the sense in readable modern English; 'unceasingly' is more formal but less
    natural.
- source_word: τὴν περὶ σοῦ μνείαν
  chosen: remember you
  alternatives:
  - have remembrance concerning you
  - make mention of you
  - keep mention of you
  lexicon: BDAG
  rationale: The expression literally refers to remembrance/mention concerning Timothy.
    In context of prayer, 'remember you' is idiomatic and faithful, while avoiding
    awkward literalism.
- source_word: ἐν ταῖς δεήσεσίν μου
  chosen: in my prayers
  alternatives:
  - in my petitions
  - in my supplications
  lexicon: BDAG
  rationale: δέησις emphasizes petitionary prayer, but in English 'prayers' is the
    most natural rendering here. More specific alternatives are possible but sound
    stilted in this context.
- source_word: νυκτὸς καὶ ἡμέρας
  chosen: night and day
  alternatives:
  - by night and by day
  lexicon: BDAG
  rationale: A standard idiomatic expression indicating continual regularity. 'Night
    and day' is concise and natural.
