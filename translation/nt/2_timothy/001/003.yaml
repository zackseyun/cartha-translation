theological_decisions:
- issue: Meaning of Paul's relation to his Jewish heritage in ἀπὸ προγόνων
  chosen_reading: Paul presents his service to God as continuous with that of his
    ancestors, not as a repudiation of Israel's faith.
  alternative_readings:
  - Paul has served God since his forefathers
  - Paul serves God on the basis of ancestral tradition
  rationale: The phrase is best read as continuity with ancestral worship, fitting
    Paul's broader self-presentation as a faithful Jew who now serves God in light
    of Messiah. The translation 'as my ancestors did' expresses continuity without
    importing extra doctrinal claims.
  doctrine_reference: Translation philosophy §1, §3
- issue: Rendering of λατρεύω
  chosen_reading: serve
  alternative_readings:
  - worship
  rationale: Because λατρεύω can denote worshipful service to God, either rendering
    is possible. 'Serve' preserves the broader semantic range and avoids narrowing
    the term to liturgical worship alone.
  doctrine_reference: Translation philosophy §5
