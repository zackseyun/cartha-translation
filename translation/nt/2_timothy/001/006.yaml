theological_decisions:
- issue: Nature of the gift's mediation through Paul's action
  chosen_reading: through the laying on of my hands
  alternative_readings:
  - by means of the laying on of my hands
  rationale: The wording preserves the text's statement that the gift is associated
    with and mediated through Paul's laying on of hands, without importing a more
    developed sacramental theology than the verse itself states.
  doctrine_reference: Preserve theological tension rather than resolve it.
