id: 2TI.1.17
reference: 2 Timothy 1:17
source:
  edition: SBLGNT
  text: ἀλλὰ γενόμενος ἐν Ῥώμῃ ⸀σπουδαίως ἐζήτησέν με καὶ εὗρεν—
translation:
  text: but when he arrived in Rome, he searched for me diligently and found me—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'when he came to Rome' or more formally 'being in Rome.' The Greek participle
      γενόμενος can be rendered in several idiomatic ways in English.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀλλὰ
  chosen: but
  alternatives:
  - rather
  - instead
  lexicon: BDAG
  rationale: Adversative conjunction contrasting Onesiphorus's conduct with the shame
    of others in the previous context. 'But' is the most natural English adversative
    here.
- source_word: γενόμενος
  chosen: when he arrived
  alternatives:
  - being
  - having come
  - when he came
  lexicon: BDAG
  rationale: Aorist middle participle of γίνομαι used idiomatically with ἐν Ῥώμῃ to
    indicate coming to or being in Rome. 'When he arrived' gives clear English sense
    without woodenly preserving the participial form.
- source_word: ἐν Ῥώμῃ
  chosen: in Rome
  alternatives:
  - at Rome
  lexicon: BDAG
  rationale: Standard locative rendering. Combined with γενόμενος, the phrase conveys
    his presence upon arrival in Rome.
- source_word: σπουδαίως
  chosen: diligently
  alternatives:
  - earnestly
  - eagerly
  - carefully
  lexicon: BDAG
  rationale: The adverb denotes earnestness and serious effort. 'Diligently' fits
    the context of an intentional search and reads naturally in English.
- source_word: ἐζήτησέν με
  chosen: he searched for me
  alternatives:
  - he sought me out
  - he looked for me
  lexicon: BDAG
  rationale: ζητέω here means to seek or look for someone. 'Searched for me' pairs
    well with σπουδαίως and preserves the active effort implied.
- source_word: καὶ εὗρεν
  chosen: and found me
  alternatives:
  - and he found me
  lexicon: BDAG
  rationale: Simple coordinate action completing the search. The direct object 'me'
    is carried naturally in English from the previous clause.
