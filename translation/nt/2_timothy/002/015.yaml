theological_decisions:
- issue: Meaning of ὀρθοτομοῦντα in ministry context
  chosen_reading: rightly handling the word of truth
  alternative_readings:
  - correctly teaching the word of truth
  - cutting straight the word of truth
  rationale: The verse concerns Timothy's faithful ministry before God. The participle
    likely denotes proper, accurate dealing with the gospel message, not merely one
    narrow ministerial act. The main text uses a broad rendering that fits the metaphor
    and context, while preserving more literal and more interpretive alternatives
    in a footnote. This preserves interpretive tension rather than collapsing it.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
