id: 2TI.2.15
reference: 2 Timothy 2:15
source:
  edition: SBLGNT
  text: σπούδασον σεαυτὸν δόκιμον παραστῆσαι τῷ θεῷ, ἐργάτην ἀνεπαίσχυντον, ὀρθοτομοῦντα
    τὸν λόγον τῆς ἀληθείας.
translation:
  text: Be diligent to present yourself approved to God, a worker with no need to
    be ashamed, rightly handling the word of truth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'correctly teaching'; more literally, 'cutting straight' the word of
      truth.
    reason: lexical_alternative
lexical_decisions:
- source_word: σπούδασον
  chosen: Be diligent
  alternatives:
  - Make every effort
  - Be eager
  - Do your best
  lexicon: BDAG
  rationale: Aorist imperative of σπουδάζω calls for earnest effort. 'Be diligent'
    preserves the imperative force and sustained seriousness without sounding colloquial.
    'Do your best' is idiomatic but can sound weaker and more subjective than the
    Greek.
- source_word: σεαυτόν
  chosen: yourself
  lexicon: BDAG
  rationale: Reflexive pronoun functioning as the object of παραστῆσαι; straightforwardly
    rendered 'yourself'.
- source_word: δόκιμον
  chosen: approved
  alternatives:
  - proven
  - tested and approved
  lexicon: BDAG
  rationale: δόκιμος denotes someone who has stood testing and is therefore approved.
    'Approved' fits the immediate evaluative context before God and is concise. The
    nuance of testing is implicit and could be expanded in alternatives, but the main
    text remains natural English.
- source_word: παραστῆσαι
  chosen: to present
  alternatives:
  - to present yourself
  - to stand before
  lexicon: BDAG
  rationale: Aorist infinitive of purpose/complement after σπούδασον. 'To present'
    captures the sense of placing oneself before God for evaluation or service. 'Stand
    before' is interpretive and narrower.
- source_word: τῷ θεῷ
  chosen: to God
  alternatives:
  - before God
  lexicon: BDAG
  rationale: Dative with παραστῆσαι naturally yields 'to God.' English readers may
    also hear 'before God'; that nuance is preserved conceptually but not required
    in the main text.
- source_word: ἐργάτην
  chosen: a worker
  alternatives:
  - a laborer
  - a workman
  lexicon: BDAG
  rationale: '''Worker'' is clear modern English and preserves the occupational metaphor.
    ''Workman'' is traditional but dated and potentially gender-marked beyond the
    Greek''s intent.'
- source_word: ἀνεπαίσχυντον
  chosen: with no need to be ashamed
  alternatives:
  - unashamed
  - not ashamed
  lexicon: BDAG
  rationale: The adjective means not being put to shame or having no cause for shame.
    The fuller English phrase communicates the idiomatic force more naturally than
    the bare adjective 'unashamed,' which can suggest attitude rather than warranted
    standing.
- source_word: ὀρθοτομοῦντα
  chosen: rightly handling
  alternatives:
  - correctly teaching
  - cutting straight
  - guiding straight
  lexicon: BDAG
  rationale: The participle's literal image is 'cutting straight,' but in this context
    it refers metaphorically to proper, accurate treatment of the message. 'Rightly
    handling' preserves breadth and avoids over-specifying to preaching alone. The
    literal image is worth preserving in a footnote because the verb is rare and debated.
- source_word: τὸν λόγον τῆς ἀληθείας
  chosen: the word of truth
  alternatives:
  - the message of truth
  - the true word
  lexicon: BDAG
  rationale: A familiar Pauline expression. 'Word of truth' preserves the genitival
    construction and theological resonance, while remaining understandable. 'Message
    of truth' is possible but less formally tied to the Greek wording.
