id: 2TI.2.20
reference: 2 Timothy 2:20
source:
  edition: SBLGNT
  text: Ἐν μεγάλῃ δὲ οἰκίᾳ οὐκ ἔστιν μόνον σκεύη χρυσᾶ καὶ ἀργυρᾶ ἀλλὰ καὶ ξύλινα
    καὶ ὀστράκινα, καὶ ἃ μὲν εἰς τιμὴν ἃ δὲ εἰς ἀτιμίαν·
translation:
  text: Now in a large house there are not only gold and silver vessels, but also
    wooden and earthenware ones, and some are for honor, but others for dishonor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for honorable use ... for dishonorable use.' The Greek reads more literally,
      'for honor ... for dishonor.'
    reason: lexical_alternative
  - marker: b
    text: '''Earthenware'' refers to vessels made of clay or pottery.'
    reason: cultural_note
lexical_decisions:
- source_word: μεγάλῃ οἰκίᾳ
  chosen: a large house
  alternatives:
  - a great house
  lexicon: BDAG
  rationale: μέγας with οἰκία denotes size/status; 'large house' is natural modern
    English and preserves the image without the slightly archaic or potentially evaluative
    'great house'.
- source_word: σκεύη
  chosen: vessels
  alternatives:
  - containers
  - utensils
  - articles
  lexicon: BDAG
  rationale: σκεῦος is a broad term for an object/container used for a purpose. 'Vessels'
    preserves the metaphorical breadth and fits the household imagery better than
    narrower options like 'utensils.'
- source_word: χρυσᾶ καὶ ἀργυρᾶ
  chosen: gold and silver
  alternatives:
  - golden and silver
  lexicon: BDAG
  rationale: The adjectives describe the material composition of the vessels. English
    idiom prefers 'gold and silver vessels' over 'golden and silver vessels' in this
    contrastive list.
- source_word: ξύλινα καὶ ὀστράκινα
  chosen: wooden and earthenware ones
  alternatives:
  - wooden and clay ones
  - wooden and pottery ones
  lexicon: BDAG
  rationale: ὀστράκινος refers to something made of baked clay/earthenware. 'Earthenware'
    is precise and readable. 'Ones' is supplied in English to avoid repeating 'vessels'
    awkwardly while preserving the parallelism.
- source_word: καὶ ἃ μὲν ... ἃ δὲ ...
  chosen: and some are ... but others ...
  alternatives:
  - and some ... and others ...
  lexicon: BDAG
  rationale: The correlative construction marks contrast within the set of vessels.
    'Some ... but others ...' communicates the μέν...δέ distinction clearly in idiomatic
    English.
- source_word: εἰς τιμήν
  chosen: for honor
  alternatives:
  - for honorable use
  - for honorific use
  lexicon: BDAG
  rationale: τιμή here denotes honor/status rather than merely practical function.
    'For honor' is concise and preserves the abstract noun used in Greek; 'for honorable
    use' is interpretive and can be preserved as an alternative.
- source_word: εἰς ἀτιμίαν
  chosen: for dishonor
  alternatives:
  - for dishonorable use
  - for common use
  lexicon: BDAG
  rationale: ἀτιμία is the antonym of τιμή, meaning dishonor/disgrace. 'For dishonor'
    keeps the lexical contrast explicit. 'For common use' reflects an interpretive
    contextualization from the household metaphor, but it is less literal and should
    remain secondary.
- source_word: δὲ (initial)
  chosen: Now
  alternatives:
  - But
  lexicon: BDAG
  rationale: The initial δέ marks continuation/transition. 'Now' gives a smooth discourse
    transition in English without overstating adversative force.
