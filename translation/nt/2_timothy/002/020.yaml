theological_decisions:
- issue: Whether to interpret τιμή/ἀτιμία functionally ('honorable/common use') or
    morally/status-wise ('honor/dishonor') in the main text
  chosen_reading: Retain the more literal 'for honor ... for dishonor' in the main
    text
  alternative_readings:
  - for honorable use ... for dishonorable use
  - for special use ... for ordinary use
  - for noble purposes ... for ignoble purposes
  rationale: The immediate metaphor concerns household vessels, but Paul's wording
    uses the abstract nouns τιμή and ἀτιμία. Rendering them literally preserves the
    theological and rhetorical tension for the following verse rather than resolving
    the image into a purely utilitarian distinction.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather
    than resolve it.
