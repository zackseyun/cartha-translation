theological_decisions:
- issue: Nature of the crown imagery
  chosen_reading: Retain the athletic metaphor of a victor being crowned, without
    specifying a spiritual reward beyond the text.
  alternative_readings:
  - Interpret the crown explicitly as eschatological reward
  - Interpret the crown as ministerial approval
  rationale: The verse uses an athletic analogy to stress proper conduct and qualification.
    The translation should preserve the metaphor and not import a more specific doctrinal
    interpretation than the Greek states.
  doctrine_reference: Preserve theological tension rather than resolve it.
