  rationale: The doctrine excerpt specifies that δοῦλος may be rendered 'servant'
    or 'slave' context-dependently, with 'slave' used where bonded status is theologically
    salient. In 2 Timothy 2:24 the emphasis is ethical conduct in ministry, so 'servant'
    better communicates the role without importing unnecessary social imagery into
