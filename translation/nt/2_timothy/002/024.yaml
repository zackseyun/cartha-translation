id: 2TI.2.24
reference: 2 Timothy 2:24
source:
  edition: SBLGNT
  text: δοῦλον δὲ κυρίου οὐ δεῖ μάχεσθαι, ἀλλὰ ἤπιον εἶναι πρὸς πάντας, διδακτικόν,
    ἀνεξίκακον,
translation:
  text: And the Lord’s servant must not quarrel, but must be gentle toward everyone,
    able to teach, patient when wronged,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the Lord’s slave.” The Greek word doulos can mean either “servant” or
      “slave,” depending on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: δοῦλον
  chosen: servant
  alternatives:
  - slave
  - bondservant
  lexicon: BDAG
  rationale: The noun δοῦλος can mean either 'slave' or 'servant' depending on context.
    Here the focus is on the conduct expected of one serving the Lord in ministry
    rather than on bonded status as a theological identity marker. Following the doctrine's
    context-dependent policy for δοῦλος, 'servant' is the most natural English rendering
    in this instructional context, while preserving 'slave' as a lexical alternative.
- source_word: κυρίου
  chosen: the Lord’s
  alternatives:
  - of the Lord
  lexicon: BDAG
  rationale: κύριος is rendered 'Lord' per the doctrine's default for Kyrios. The
    possessive form 'the Lord’s' is idiomatic English for the genitive construction
    δοῦλον κυρίου.
- source_word: οὐ δεῖ
  chosen: must not
  alternatives:
  - it is not necessary to
  - ought not to
  lexicon: BDAG
  rationale: The impersonal δεῖ expresses necessity or obligation. In context it conveys
    what is required of the Lord's servant, so 'must not' best captures the prescriptive
    force in clear modern English.
- source_word: μάχεσθαι
  chosen: quarrel
  alternatives:
  - fight
  - be combative
  - engage in disputes
  lexicon: BDAG
  rationale: μάχομαι can denote fighting or engaging in contentious dispute. In this
    pastoral context, verbal contentiousness is primary, so 'quarrel' fits better
    than the more physical-sounding 'fight'.
- source_word: ἤπιον
  chosen: gentle
  alternatives:
  - kind
  - mild
  lexicon: BDAG
  rationale: ἤπιος denotes a mild, gentle demeanor. 'Gentle' is the clearest and most
    established English equivalent here, matching the contrast with quarrelsomeness.
- source_word: πρὸς πάντας
  chosen: toward everyone
  alternatives:
  - to all
  - with everyone
  lexicon: BDAG
  rationale: The phrase indicates the scope of the servant's gentleness. 'Toward everyone'
    preserves the relational force of πρός and communicates universal extent naturally.
- source_word: διδακτικόν
  chosen: able to teach
  alternatives:
  - teachable
  - skillful in teaching
  lexicon: BDAG
  rationale: διδακτικός means qualified or apt to teach, not merely willing to learn.
    'Able to teach' is concise, idiomatic, and aligns with its use in pastoral qualifications.
- source_word: ἀνεξίκακον
  chosen: patient when wronged
  alternatives:
  - forbearing
  - enduring evil without resentment
  - tolerant of mistreatment
  lexicon: BDAG
  rationale: ἀνεξίκακος is rare and conveys bearing up under wrongs or injuries without
    retaliating. 'Patient when wronged' makes the sense explicit in accessible English,
    avoiding the ambiguity of 'patient' alone.
