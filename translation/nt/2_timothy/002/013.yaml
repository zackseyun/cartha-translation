id: 2TI.2.13
reference: 2 Timothy 2:13
source:
  edition: SBLGNT
  text: εἰ ἀπιστοῦμεν, ἐκεῖνος πιστὸς μένει· ⸀ἀρνήσασθαι ἑαυτὸν οὐ δύναται.
translation:
  text: If we are faithless, he remains faithful, for he cannot deny himself.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'If we disbelieve' or 'If we are unfaithful.' The Greek verb can carry
      either sense.
    reason: lexical_alternative
  - marker: b
    text: Or 'trustworthy.' 'Faithful' is retained to preserve the contrast with 'are
      faithless.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπιστοῦμεν
  chosen: are faithless
  alternatives:
  - disbelieve
  - are unfaithful
  lexicon: BDAG
  rationale: The verb ἀπιστέω can mean either 'disbelieve' or 'be unfaithful/faithless.'
    In this poetic saying, the contrast with πιστός favors 'are faithless,' preserving
    the wordplay and leaving open both unbelief and unfaithfulness without narrowing
    to one doctrinally loaded sense.
- source_word: πιστὸς
  chosen: faithful
  alternatives:
  - trustworthy
  lexicon: BDAG
  rationale: '''Faithful'' best preserves the lexical connection with ἀπιστοῦμεν and
    the covenantal/theological resonance of God''s constancy. ''Trustworthy'' is possible
    but weakens the deliberate contrast.'
- source_word: μένει
  chosen: remains
  alternatives:
  - continues
  - abides
  lexicon: BDAG
  rationale: '''Remains'' is natural modern English and conveys ongoing constancy.
    ''Abides'' is more traditional but less idiomatic for the target audience.'
- source_word: ἀρνήσασθαι
  chosen: deny
  alternatives:
  - disown
  - renounce
  lexicon: BDAG
  rationale: '''Deny'' is the most direct rendering and matches common NT usage for
    ἀρνέομαι. It also preserves the strong relational and moral force of the statement.'
- source_word: ἑαυτὸν
  chosen: himself
  lexicon: BDAG
  rationale: Reflexive pronoun referring to ἐκεῖνος ('he'). 'Himself' is the straightforward
    English equivalent and is theologically significant, grounding God's faithfulness
    in his own unchanging character.
- source_word: οὐ δύναται
  chosen: cannot
  alternatives:
  - is not able to
  lexicon: BDAG
  rationale: '''Cannot'' is concise, idiomatic, and accurately expresses inability
    rather than mere unwillingness.'
