theological_decisions:
- issue: Meaning of God's faithfulness in relation to human faithlessness
  chosen_reading: The verse states that God's faithfulness persists because he cannot
    deny his own character; it does not specify in the main text whether this faithfulness
    is primarily to save, to keep promises, or to judge.
  alternative_readings:
  - God remains faithful to save his people despite their weakness
  - God remains faithful to his word, including warnings of judgment against apostasy
  rationale: The immediate Greek affirms divine constancy without explicitly resolving
    the debated pastoral/theological implication. The translation preserves that tension
    rather than importing one confessional interpretation.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
