id: 2TI.2.11
reference: 2 Timothy 2:11
source:
  edition: SBLGNT
  text: πιστὸς ὁ λόγος· εἰ γὰρ συναπεθάνομεν, καὶ συζήσομεν·
translation:
  text: 'The saying is trustworthy: for if we died with him, we will also live with
    him.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'The word is faithful' or 'The statement is reliable.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'if we died together with'; the Greek compound verb implies shared
      death with Christ.
    reason: lexical_alternative
  - marker: c
    text: The future 'we will live with him' may refer to resurrection life with Christ,
      present participation in his life, or both.
    reason: alternative_reading
lexical_decisions:
- source_word: πιστὸς
  chosen: trustworthy
  alternatives:
  - faithful
  - reliable
  lexicon: BDAG
  rationale: Predicate adjective describing λόγος. 'Trustworthy' is idiomatic modern
    English for the formula πιστὸς ὁ λόγος in the Pastorals, conveying that the statement
    is dependable and worthy of acceptance without implying personal faithfulness.
- source_word: ὁ λόγος
  chosen: the saying
  alternatives:
  - the word
  - the statement
  lexicon: BDAG
  rationale: In the Pastorals, πιστὸς ὁ λόγος functions as a formula introducing a
    concise, memorable declaration. 'The saying' captures this idiomatic use better
    than the more wooden 'the word'.
- source_word: εἰ γὰρ
  chosen: for if
  alternatives:
  - if indeed
  - for
  lexicon: BDAG
  rationale: 'Retains both particles: εἰ introduces the conditional clause and γάρ
    gives explanatory force linking the trustworthy saying to its content. ''For if''
    preserves the Greek flow without overcomplication.'
- source_word: συναπεθάνομεν
  chosen: we died with him
  alternatives:
  - we have died with him
  - we died together with him
  lexicon: BDAG
  rationale: Aorist active indicative first plural of συναποθνῄσκω. The compound συν-
    implies participation 'with' another; English requires the implied referent from
    context, namely Christ/him. 'Died with him' is concise and reflects union with
    Christ language without overinterpreting aspect.
- source_word: καὶ
  chosen: also
  alternatives:
  - and
  lexicon: BDAG
  rationale: 'Here καί has an adjunctive sense pairing the two clauses: if we died
    with him, we will also live with him. ''Also'' makes the correspondence explicit
    in natural English.'
- source_word: συζήσομεν
  chosen: we will also live with him
  alternatives:
  - we will live with him
  - we will come to life with him
  lexicon: BDAG
  rationale: Future active indicative first plural of συζάω, again with the συν- prefix
    indicating shared life with Christ. 'Live with him' is the clearest natural rendering;
    'also' is included to mirror καί and the balanced conditional structure.
