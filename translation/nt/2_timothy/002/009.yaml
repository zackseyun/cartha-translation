id: 2TI.2.9
reference: 2 Timothy 2:9
source:
  edition: SBLGNT
  text: ἐν ᾧ κακοπαθῶ μέχρι δεσμῶν ὡς κακοῦργος. ἀλλὰ ὁ λόγος τοῦ θεοῦ οὐ δέδεται·
translation:
  text: for which I am suffering hardship, even to the point of chains, as a criminal.
    But the word of God is not bound.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in which' or 'because of which'; the Greek likely refers back to the
      gospel mentioned in the previous verse.
    reason: alternative_reading
  - marker: b
    text: Or 'as an evildoer.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν ᾧ
  chosen: for which
  alternatives:
  - in which
  - because of which
  lexicon: BDAG
  rationale: The relative phrase refers back to the gospel in v. 8 and expresses sphere/cause.
    In idiomatic English here, 'for which' best captures suffering on account of the
    gospel without the awkwardness of 'in which.'
- source_word: κακοπαθῶ
  chosen: I am suffering hardship
  alternatives:
  - I suffer
  - I endure suffering
  lexicon: BDAG
  rationale: The verb denotes experiencing trouble or hardship. 'I am suffering hardship'
    preserves the present tense sense and the nuance of ongoing affliction more clearly
    than the bare 'I suffer.'
- source_word: μέχρι δεσμῶν
  chosen: even to the point of chains
  alternatives:
  - up to chains
  - as far as imprisonment
  lexicon: BDAG
  rationale: μέχρι marks extent, and δεσμῶν literally means 'chains' but metonymically
    refers to imprisonment. Retaining 'chains' preserves Paul's concrete imagery while
    'to the point of' makes the idiom natural in English.
- source_word: ὡς κακοῦργος
  chosen: as a criminal
  alternatives:
  - as an evildoer
  - as a wrongdoer
  lexicon: BDAG
  rationale: κακοῦργος can denote a criminal or evildoer; 'criminal' is the clearest
    contemporary English equivalent in this judicial/imprisonment context and matches
    the force of being treated as a lawbreaker.
- source_word: ἀλλὰ
  chosen: But
  alternatives:
  - Yet
  - Nevertheless
  lexicon: BDAG
  rationale: The conjunction marks strong contrast between Paul's imprisonment and
    the freedom of God's word. 'But' is simple and forceful.
- source_word: ὁ λόγος τοῦ θεοῦ
  chosen: the word of God
  alternatives:
  - God's word
  - the message of God
  lexicon: BDAG
  rationale: This is the standard and natural rendering. 'Word' preserves the breadth
    of λόγος here, referring to God's proclaimed message, without narrowing it unnecessarily.
- source_word: οὐ δέδεται
  chosen: is not bound
  alternatives:
  - is not chained
  - has not been bound
  lexicon: BDAG
  rationale: The perfect passive indicates a state of being bound. 'Is not bound'
    preserves the metaphor and creates a deliberate contrast with Paul's 'chains.'
    'Is not chained' is possible but less broad than the Greek.
