theological_decisions:
- issue: Nature of 'the word of God'
  chosen_reading: Rendered as 'the word of God' without specifying whether this means
    Scripture, the gospel proclamation, or God's message more broadly.
  alternative_readings:
  - the gospel message
  - Scripture
  rationale: The immediate context points especially to the proclaimed gospel, but
    the Greek phrase itself is broader. The translation preserves that breadth rather
    than resolving the referent more narrowly than the text requires.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
