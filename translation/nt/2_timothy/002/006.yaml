id: 2TI.2.6
reference: 2 Timothy 2:6
source:
  edition: SBLGNT
  text: τὸν κοπιῶντα γεωργὸν δεῖ πρῶτον τῶν καρπῶν μεταλαμβάνειν.
translation:
  text: The hardworking farmer must be the first to receive a share of the crops.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'The farmer who labors must first partake of the crops.' The Greek can
      be rendered more formally with 'partake,' but the main text uses clearer contemporary
      English.
    reason: lexical_alternative
lexical_decisions:
- source_word: κοπιῶντα
  chosen: hardworking
  alternatives:
  - laboring
  - toiling
  - working hard
  lexicon: BDAG
  rationale: The participle from κοπιάω denotes strenuous labor or toil. 'Hardworking'
    conveys the ongoing characteristic of the farmer in natural English while preserving
    the emphasis on effort.
- source_word: γεωργὸν
  chosen: farmer
  alternatives:
  - cultivator
  - field-worker
  - husbandman
  lexicon: BDAG
  rationale: γεωργός refers to one who works the land. 'Farmer' is the clearest modern
    English equivalent; older terms like 'husbandman' are archaic.
- source_word: δεῖ
  chosen: must
  alternatives:
  - it is necessary
  - ought
  lexicon: BDAG
  rationale: δεῖ expresses necessity or obligation. 'Must' is concise and preserves
    the force of necessity in idiomatic English.
- source_word: πρῶτον
  chosen: the first
  alternatives:
  - first
  - first of all
  lexicon: BDAG
  rationale: Here πρῶτον modifies the infinitive idea and indicates priority in receiving.
    Rendering it as 'the first' makes the English construction natural with 'to receive
    a share' while preserving the sense of precedence.
- source_word: τῶν καρπῶν
  chosen: of the crops
  alternatives:
  - of the fruits
  - of the produce
  - from the fruits
  lexicon: BDAG
  rationale: καρποί can mean fruits literally, but in an agricultural proverb about
    a farmer, 'crops' better communicates the broader produce of the field in contemporary
    English. This is a contextual, not theological, choice.
- source_word: μεταλαμβάνειν
  chosen: to receive a share
  alternatives:
  - to partake
  - to share in
  - to receive
  lexicon: BDAG
  rationale: μεταλαμβάνω means to share in or partake of. 'Receive a share' makes
    explicit the partitive sense implied by the verb and the genitive τῶν καρπῶν,
    yielding clear modern English.
