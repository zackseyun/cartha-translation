theological_decisions:
- issue: Sense of the proverb-like statement
  chosen_reading: The verse states the principle that the one who labors should have
    prior participation in the results of that labor.
  alternative_readings:
  - The farmer must labor first before partaking of the crops.
  rationale: The Greek word order and syntax most naturally connect πρῶτον with receiving
    a share, not with the timing of laboring. Thus the emphasis is on priority in
    participation, not merely on working before eating.
