id: 2TI.2.22
reference: 2 Timothy 2:22
source:
  edition: SBLGNT
  text: τὰς δὲ νεωτερικὰς ἐπιθυμίας φεῦγε, δίωκε δὲ δικαιοσύνην, πίστιν, ἀγάπην, εἰρήνην
    μετὰ τῶν ἐπικαλουμένων τὸν κύριον ἐκ καθαρᾶς καρδίας.
translation:
  text: But flee youthful desires, and pursue righteousness, faith, love, and peace,
    together with those who call on the Lord from a pure heart.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'youthful passions.' The Greek phrase can refer broadly to desires characteristic
      of youth, not only sexual desire.
    reason: lexical_alternative
  - marker: b
    text: Or 'justice.' The Greek word can carry both moral and relational/legal overtones
      in Pauline usage.
    reason: alternative_reading
  - marker: c
    text: Or 'faithfulness.' The Greek word can denote faith, trust, or faithfulness
      depending on context.
    reason: alternative_reading
lexical_decisions:
- source_word: νεωτερικὰς ἐπιθυμίας
  chosen: youthful desires
  alternatives:
  - youthful passions
  - young desires
  lexicon: BDAG
  rationale: νεωτερικός denotes what pertains to youth; ἐπιθυμίαι are desires/cravings.
    'Youthful desires' is natural modern English and avoids over-specifying the desires
    as exclusively sexual, though that may be included.
- source_word: φεῦγε
  chosen: flee
  alternatives:
  - run from
  - avoid
  lexicon: BDAG
  rationale: The present imperative calls for ongoing avoidance. 'Flee' preserves
    the force and vividness of the Greek better than the weaker 'avoid'.
- source_word: δίωκε
  chosen: pursue
  alternatives:
  - seek
  - strive for
  lexicon: BDAG
  rationale: διώκω in ethical exhortation conveys active, sustained pursuit. 'Pursue'
    matches the verbal contrast with 'flee' and preserves the energetic sense.
- source_word: δικαιοσύνην
  chosen: righteousness
  alternatives:
  - justice
  lexicon: BDAG
  rationale: Following the project's default for δικαιοσύνη in Pauline usage, 'righteousness'
    is retained in the main text. 'Justice' is a viable alternative nuance and is
    preserved in a footnote per doctrine guidance.
- source_word: πίστιν
  chosen: faith
  alternatives:
  - faithfulness
  - trust
  lexicon: BDAG
  rationale: Following the project's default rendering of πίστις as 'faith.' In this
    virtue list, 'faith' fits naturally, while 'faithfulness' is a plausible ethical
    nuance and is preserved in a footnote.
- source_word: ἀγάπην
  chosen: love
  lexicon: BDAG
  rationale: Standard and contextually appropriate rendering; it preserves the lexical
    connection to other NT uses of ἀγάπη.
- source_word: εἰρήνην
  chosen: peace
  lexicon: BDAG
  rationale: Direct and natural rendering of εἰρήνη in a virtue list.
- source_word: μετὰ τῶν ἐπικαλουμένων τὸν κύριον
  chosen: together with those who call on the Lord
  alternatives:
  - with those who call upon the Lord
  lexicon: BDAG
  rationale: μετά with the genitive indicates association. 'Together with' makes explicit
    that these virtues are pursued in fellowship with other believers. 'Call on the
    Lord' is idiomatic and faithful to ἐπικαλέω.
- source_word: κύριον
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Per project default, κύριος is rendered 'Lord' in NT usage.
- source_word: ἐκ καθαρᾶς καρδίας
  chosen: from a pure heart
  alternatives:
  - out of a pure heart
  - with a pure heart
  lexicon: BDAG
  rationale: ἐκ marks source/origin. 'From a pure heart' is both literal and idiomatic,
    expressing the inward source of sincere invocation.
