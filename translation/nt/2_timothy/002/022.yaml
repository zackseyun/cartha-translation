theological_decisions:
- issue: Scope of 'youthful desires'
  chosen_reading: Broad moral desires associated with youth, not limited to sexual
    lust
  alternative_readings:
  - Primarily sexual passions
  rationale: The phrase itself is broader than sexual desire alone, and the surrounding
    context of character and conduct supports a wider ethical sense. The translation
    therefore avoids narrowing the meaning beyond the Greek.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition'
- issue: Rendering of Pauline virtue-term δικαιοσύνη
  chosen_reading: righteousness in main text, with 'justice' preserved in footnote
  alternative_readings:
  - justice
  rationale: The doctrine excerpt specifies 'righteousness' as the default for δικαιοσύνη,
    while preserving 'justice' in footnotes for Pauline passages.
  doctrine_reference: 'DOCTRINE.md Contested terms: δικαιοσύνη'
