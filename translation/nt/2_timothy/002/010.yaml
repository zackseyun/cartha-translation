theological_decisions:
- issue: Rendering ἐκλεκτούς
  chosen_reading: the elect
  alternative_readings:
  - the chosen
  rationale: The Greek adjective plainly denotes those chosen/elect. Because the term
    carries theological weight in Christian debates, the translation preserves the
    lexical form rather than substituting a less loaded paraphrase. This maintains
    the text's own tension without importing a denominational system.
  doctrine_reference: Affirmations; Translation philosophy §3
- issue: Rendering Χριστῷ as title or name-like form
  chosen_reading: Messiah Jesus
  alternative_readings:
  - Christ Jesus
  rationale: The project's default is to translate Χριστός as 'Messiah' where title
    sense is present. In this Pauline formula the traditional English 'Christ Jesus'
    is possible, but the title remains semantically meaningful, so 'Messiah Jesus'
    better reflects original-language primacy.
  doctrine_reference: Translation philosophy §2; Contested terms table for Χριστός
