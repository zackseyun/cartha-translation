theological_decisions:
- issue: Referent of κύριος
  chosen_reading: the Lord
  alternative_readings:
  - God
  - the Lord Jesus
  rationale: The Greek reads simply 'the Lord' without explicit specification. In
    the Pastorals, κύριος often refers to Jesus, but the text here does not require
    narrowing the referent. Following the doctrine's default for κύριος, the translation
    preserves the title without interpretive expansion.
  doctrine_reference: 'DOCTRINE.md: Contested terms — κύριος → Lord; Translation philosophy
    #3 preserve theological tension where ambiguity is genuine.'
