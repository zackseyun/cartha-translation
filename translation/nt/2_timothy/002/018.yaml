theological_decisions:
- issue: Meaning of 'the resurrection has already happened'
  chosen_reading: Render as a false claim about the eschatological resurrection having
    already occurred, without specifying the exact heretical system behind it.
  alternative_readings:
  - a realized-spiritual-only resurrection
  - a denial of future bodily resurrection
  rationale: The Greek reports the content of the false teaching but does not fully
    explain its doctrinal mechanics in this verse. The translation should preserve
    the claim itself without importing a more detailed theological reconstruction
    than the text states.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Rendering of πίστις
  chosen_reading: faith
  alternative_readings:
  - trust
  - faithfulness
  rationale: DOCTRINE.md lists 'faith' as the default rendering for πίστις, with alternatives
    preserved where contested. In this context, 'faith' is the most natural and least
    interpretively intrusive rendering.
  doctrine_reference: 'Contested terms table: πίστις → faith'
