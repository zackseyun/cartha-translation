id: 2TI.2.18
reference: 2 Timothy 2:18
source:
  edition: SBLGNT
  text: οἵτινες περὶ τὴν ἀλήθειαν ἠστόχησαν, ⸀λέγοντες ἀνάστασιν ἤδη γεγονέναι, καὶ
    ἀνατρέπουσιν τήν τινων πίστιν.
translation:
  text: who have gone astray from the truth, saying that the resurrection has already
    happened, and they are upsetting the faith of some.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'have missed the mark concerning the truth' or 'have swerved from the
      truth.'
    reason: lexical_alternative
  - marker: b
    text: That is, they were claiming that the future resurrection was already past.
    reason: cross_reference
  - marker: c
    text: Or 'are overturning' or 'are subverting.'
    reason: lexical_alternative
  - marker: d
    text: Greek 'faith'; alternatively, 'trust' in context.
    reason: alternative_reading
lexical_decisions:
- source_word: οἵτινες
  chosen: who
  alternatives:
  - such people as
  - who indeed
  lexicon: BDAG
  rationale: Introduces the relative clause referring back to the false teachers.
    Simple 'who' is natural English and sufficient here; the qualitative nuance of
    ὅστις is not strong enough to require expansion.
- source_word: περὶ τὴν ἀλήθειαν
  chosen: from the truth
  alternatives:
  - concerning the truth
  - with regard to the truth
  lexicon: BDAG
  rationale: With ἀστοχέω, περί + accusative forms an idiom meaning to miss the mark
    with respect to something, hence 'go astray from the truth' rather than the more
    wooden 'have missed concerning the truth.' This best conveys the sense in idiomatic
    English.
- source_word: ἠστόχησαν
  chosen: have gone astray
  alternatives:
  - have missed the mark
  - have erred
  - have swerved
  lexicon: BDAG
  rationale: Aorist indicative describing their deviation from correct teaching. 'Have
    gone astray' communicates doctrinal deviation clearly in modern English. 'Missed
    the mark' is vivid but less idiomatic here; 'swerved' is possible but less accessible.
- source_word: λέγοντες
  chosen: saying
  alternatives:
  - by saying
  - while saying
  lexicon: BDAG
  rationale: Present participle explaining how they have gone astray. 'Saying' is
    concise and preserves the participial relation without overinterpreting whether
    it is means or content.
- source_word: ἀνάστασιν
  chosen: the resurrection
  alternatives:
  - a resurrection
  - rising again
  lexicon: BDAG
  rationale: Anarthrous in Greek but definite in sense in this doctrinal context,
    referring to the eschatological resurrection. English idiom naturally takes the
    definite article here.
- source_word: ἤδη
  chosen: already
  alternatives:
  - by now
  - even now
  lexicon: BDAG
  rationale: Standard temporal adverb; 'already' is the most direct rendering.
- source_word: γεγονέναι
  chosen: has already happened
  alternatives:
  - has already taken place
  - has already come about
  lexicon: BDAG
  rationale: Perfect infinitive of γίνομαι indicates a completed event with present
    relevance. 'Has already happened' is natural English and fits the false claim
    being reported.
- source_word: ἀνατρέπουσιν
  chosen: are upsetting
  alternatives:
  - are overturning
  - are ruining
  - are subverting
  lexicon: BDAG
  rationale: Present tense indicates ongoing effect. The verb can mean overturn or
    ruin; here it refers to destabilizing believers' faith. 'Are upsetting' communicates
    that effect clearly without overstating total apostasy.
- source_word: τήν τινων πίστιν
  chosen: the faith of some
  alternatives:
  - some people's faith
  - the trust of some
  lexicon: BDAG
  rationale: πίστις is rendered by the default 'faith' per doctrine guidance. The
    genitive τινων is partitive/indefinite, hence 'of some.' 'Faith' here likely denotes
    believers' trust/commitment, but the standard rendering should be retained.
