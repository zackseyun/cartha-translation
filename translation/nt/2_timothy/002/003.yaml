id: 2TI.2.3
reference: 2 Timothy 2:3
source:
  edition: SBLGNT
  text: ⸀συγκακοπάθησον ὡς καλὸς στρατιώτης ⸂Χριστοῦ Ἰησοῦ⸃.
translation:
  text: Share in suffering as a good soldier of Messiah Jesus.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Suffer hardship with me as a good soldier of Christ Jesus.'
    reason: lexical_alternative
  - marker: b
    text: Greek 'Christ Jesus'; translated 'Messiah Jesus' here because Χριστός functions
      as a title.
    reason: alternative_reading
lexical_decisions:
- source_word: συγκακοπάθησον
  chosen: Share in suffering
  alternatives:
  - Suffer hardship with me
  - Endure suffering together
  lexicon: BDAG
  rationale: Aorist active imperative, second singular, from συγκακοπαθέω. The σύν-
    prefix indicates participation with another/in common, not merely suffering in
    isolation. 'Share in suffering' captures the imperative force and communal nuance
    without importing an explicit object ('with me') that is absent in this form here,
    though the broader context may imply companionship.
- source_word: ὡς
  chosen: as
  alternatives:
  - like
  lexicon: BDAG
  rationale: Standard comparative particle introducing the manner in which Timothy
    is to share in suffering.
- source_word: καλὸς
  chosen: good
  alternatives:
  - noble
  - worthy
  - excellent
  lexicon: BDAG
  rationale: In this collocation with 'soldier,' καλός conveys commendable quality
    or fitness. 'Good' is natural modern English and preserves the evaluative sense
    without overtranslating.
- source_word: στρατιώτης
  chosen: soldier
  alternatives:
  - warrior
  lexicon: BDAG
  rationale: The ordinary term for a soldier. 'Soldier' fits both the literal lexical
    sense and Paul's metaphorical use.
- source_word: Χριστοῦ
  chosen: Messiah
  alternatives:
  - Christ
  lexicon: BDAG
  rationale: Per doctrine, Χριστός is translated as 'Messiah' where functioning as
    a title rather than a fixed name. Here the genitive construction 'soldier of Messiah
    Jesus' retains the titular sense and preserves the meaning of the Greek.
- source_word: Ἰησοῦ
  chosen: Jesus
  lexicon: BDAG
  rationale: Standard transliteration of the personal name Ἰησοῦς in the genitive
    construction with Χριστοῦ.
