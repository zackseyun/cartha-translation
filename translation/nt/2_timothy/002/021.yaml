id: 2TI.2.21
reference: 2 Timothy 2:21
source:
  edition: SBLGNT
  text: ἐὰν οὖν τις ἐκκαθάρῃ ἑαυτὸν ἀπὸ τούτων, ἔσται σκεῦος εἰς τιμήν, ἡγιασμένον,
    ⸀εὔχρηστον τῷ δεσπότῃ, εἰς πᾶν ἔργον ἀγαθὸν ἡτοιμασμένον.
translation:
  text: Therefore, if anyone cleanses himself from these things, he will be a vessel
    for honor, sanctified, useful to the Master, prepared for every good work.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for honorable use.'
    reason: lexical_alternative
  - marker: b
    text: Or 'made holy' or 'set apart.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐὰν οὖν
  chosen: Therefore, if
  alternatives:
  - So if
  - If then
  lexicon: BDAG
  rationale: ἐὰν introduces a conditional clause ('if'), while οὖν marks inference
    from the preceding context. 'Therefore, if' preserves both the logical connection
    and the conditional force in natural English.
- source_word: τις
  chosen: anyone
  alternatives:
  - someone
  - a person
  lexicon: BDAG
  rationale: Indefinite τις is generic and not specifically male here. 'Anyone' conveys
    the representative force naturally in English without overstating gender.
- source_word: ἐκκαθάρῃ
  chosen: cleanses
  alternatives:
  - purges
  - thoroughly cleanses
  lexicon: BDAG
  rationale: The verb carries the sense of cleansing out or purging thoroughly. 'Cleanses'
    is clear modern English; the intensive nuance of ἐκ- is sufficiently conveyed
    by the context ('from these things') without awkwardness.
- source_word: ἑαυτὸν
  chosen: himself
  alternatives:
  - oneself
  lexicon: BDAG
  rationale: The reflexive pronoun is singular and grammatically masculine with generic
    force. 'Himself' keeps the singular reflexive and aligns with the project's gender-accurate
    policy for representative masculine forms.
- source_word: ἀπὸ τούτων
  chosen: from these things
  alternatives:
  - from these
  - from such things
  lexicon: BDAG
  rationale: τούτων points back to the immediately preceding dishonorable matters/persons
    in context. 'From these things' is explicit and readable, preserving the demonstrative
    reference without over-interpreting it.
- source_word: ἔσται
  chosen: he will be
  alternatives:
  - he shall be
  lexicon: BDAG
  rationale: Future middle of εἰμί is simply predictive here. 'He will be' is standard
    modern English.
- source_word: σκεῦος
  chosen: a vessel
  alternatives:
  - an instrument
  - a container
  lexicon: BDAG
  rationale: In the household metaphor of the immediate context, σκεῦος is best rendered
    'vessel.' 'Instrument' is possible metaphorically but weakens the continuity with
    the preceding imagery of household utensils.
- source_word: εἰς τιμήν
  chosen: for honor
  alternatives:
  - for honorable use
  - for honor's sake
  lexicon: BDAG
  rationale: The phrase contrasts with the previous verse's dishonorable vessels.
    'For honor' is concise and preserves the metaphor; 'for honorable use' is interpretive
    and is preserved as an alternative.
- source_word: ἡγιασμένον
  chosen: sanctified
  alternatives:
  - made holy
  - set apart
  lexicon: BDAG
  rationale: Perfect passive participle of ἁγιάζω denotes a consecrated state resulting
    from sanctifying action. 'Sanctified' preserves the theological register and verbal
    connection to holiness; simpler alternatives are possible but less precise.
- source_word: εὔχρηστον
  chosen: useful
  alternatives:
  - fit for use
  - serviceable
  lexicon: BDAG
  rationale: The adjective means useful or beneficial for service. 'Useful' is the
    clearest modern equivalent and fits the household-vessel imagery.
- source_word: τῷ δεσπότῃ
  chosen: to the Master
  alternatives:
  - to the owner
  - to the lord
  lexicon: BDAG
  rationale: δεσπότης denotes a master/owner with authority over the household. 'Master'
    best fits the metaphor and preserves the authority nuance. Lowercase avoids importing
    a fixed christological title where the image is metaphorical, though the referent
    is ultimately God/the Lord in context.
- source_word: εἰς πᾶν ἔργον ἀγαθὸν
  chosen: for every good work
  alternatives:
  - for every good deed
  lexicon: BDAG
  rationale: A standard Pauline expression. 'Good work' is idiomatic and preserves
    the broad scope of ἔργον better than 'deed,' which can sound narrower.
- source_word: ἡτοιμασμένον
  chosen: prepared
  alternatives:
  - made ready
  - having been prepared
  lexicon: BDAG
  rationale: Perfect passive participle indicates a state of readiness resulting from
    prior preparation. 'Prepared' is concise and natural, and it pairs well with the
    preceding participles.
