theological_decisions:
- issue: Rendering the reflexive pronoun with generic masculine force
  chosen_reading: he cleanses himself ... he will be
  alternative_readings:
  - one cleanses oneself ... one will be
  - anyone cleanses himself ... that person will be
  rationale: The Greek uses singular forms with representative force. Following the
    project's gender-accurate policy, the translation preserves the singular masculine
    reflexive/pronoun rather than flattening to plural or fully neutralized forms,
    while still rendering τις as 'anyone' for natural English.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
- issue: Rendering δεσπότης in a metaphorical household context
  chosen_reading: the Master
  alternative_readings:
  - the owner
  - the lord
  rationale: The verse uses household-vessel imagery. 'Master' preserves the authority
    relation inherent in δεσπότης without forcing a more explicit theological title
    than the metaphor itself states. Capitalization reflects likely divine reference
    while still functioning as a translated title within the metaphor.
  doctrine_reference: DOCTRINE.md §Translation philosophy, points 1 and 6
