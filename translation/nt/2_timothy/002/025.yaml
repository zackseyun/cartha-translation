theological_decisions:
- issue: Divine agency and human repentance
  chosen_reading: The verse is rendered to preserve the text's statement that repentance
    is something God may grant, without resolving broader debates about divine sovereignty
    and human responsibility.
  alternative_readings:
  - A stronger deterministic implication
  - A reading minimizing divine agency in repentance
  rationale: The Greek explicitly presents God as the one who may grant repentance,
    but the verse itself does not systematize how this relates to human response.
    The translation keeps the tension intact per the project's doctrine.
  doctrine_reference: Preserve theological tension rather than resolve it.
