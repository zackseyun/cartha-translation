theological_decisions:
- issue: Voice and agency in ἐνδυναμοῦ
  chosen_reading: The command is rendered 'be strengthened,' implying received strength
    rather than autonomous self-strengthening.
  alternative_readings:
  - be strong
  - strengthen yourself
  rationale: The middle/passive imperative naturally allows a receptive nuance. This
    avoids importing a self-reliant sense and fits the following phrase 'in the grace
    that is in Messiah Jesus.'
  doctrine_reference: Translation philosophy §1, §3
- issue: Rendering Χριστός
  chosen_reading: Messiah Jesus
  alternative_readings:
  - Christ Jesus
  rationale: The project default is to translate Χριστός as 'Messiah' where title
    force is present, preserving the meaning of the Greek title rather than relying
    on inherited English tradition.
  doctrine_reference: Translation philosophy §2; Contested terms table for Χριστός
