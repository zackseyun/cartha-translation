id: 2TI.2.17
reference: 2 Timothy 2:17
source:
  edition: SBLGNT
  text: καὶ ὁ λόγος αὐτῶν ὡς γάγγραινα νομὴν ἕξει· ὧν ἐστιν Ὑμέναιος καὶ Φίλητος,
translation:
  text: and their talk will spread like gangrene. Among them are Hymenaeus and Philetus,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their word' or 'their message.'
    reason: lexical_alternative
  - marker: b
    text: Or more literally, 'will have its course'; the sense is that it will spread
      destructively.
    reason: lexical_alternative
lexical_decisions:
- source_word: λόγος
  chosen: talk
  alternatives:
  - word
  - message
  - speech
  lexicon: BDAG
  rationale: In this context of false teaching and irreverent chatter (vv. 16, 18),
    λόγος refers to what they are saying/discourse rather than a single 'word.' 'Talk'
    is natural modern English and fits the pejorative context better than the more
    neutral 'message.'
- source_word: αὐτῶν
  chosen: their
  rationale: Straightforward genitive possessive modifying λόγος.
- source_word: ὡς γάγγραινα
  chosen: like gangrene
  alternatives:
  - like a gangrene disease
  - like cancer
  lexicon: BDAG
  rationale: γάγγραινα denotes gangrene, a spreading, destructive bodily disease.
    'Gangrene' is the most direct lexical equivalent. 'Cancer' is interpretive and
    less precise historically, though some English versions use it to convey spread.
- source_word: νομὴν ἕξει
  chosen: will spread
  alternatives:
  - will have pasture
  - will make progress
  - will eat/spread its way
  lexicon: BDAG
  rationale: The idiom literally involves 'having pasture/course,' but in context
    with gangrene it denotes spreading or advancing destructively. 'Will spread' captures
    the sense in clear English without wooden literalism.
- source_word: ὧν ἐστιν
  chosen: Among them are
  alternatives:
  - of whom are
  - among whom are
  lexicon: BDAG
  rationale: The relative construction identifies examples from the group just mentioned.
    'Among them are' is idiomatic English and preserves the partitive sense.
- source_word: Ὑμέναιος
  chosen: Hymenaeus
  rationale: Personal name transliterated by standard convention, per translation
    philosophy.
- source_word: Φίλητος
  chosen: Philetus
  rationale: Personal name transliterated by standard convention, per translation
    philosophy.
