theological_decisions:
- issue: Metaphorical force of the disease image
  chosen_reading: The verse depicts the corrupting teaching as something that spreads
    destructively through a community.
  alternative_readings:
  - A more literal rendering emphasizing the image's medical wording without explicating
    the metaphor
  rationale: The metaphor is part of Paul's warning about false teaching. Rendering
    νομὴν ἕξει as 'will spread' preserves the theological warning without overinterpreting
    beyond the text.
  doctrine_reference: Translation philosophy §1, §3, §6
