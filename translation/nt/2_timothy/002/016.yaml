id: 2TI.2.16
reference: 2 Timothy 2:16
source:
  edition: SBLGNT
  text: τὰς δὲ βεβήλους κενοφωνίας περιΐστασο· ἐπὶ πλεῖον γὰρ προκόψουσιν ἀσεβείας,
translation:
  text: But avoid profane empty talk, for they will advance into more and more ungodliness,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'godless chatter,' 'vain babblings,' or 'hollow speech.'
    reason: lexical_alternative
lexical_decisions:
- source_word: βεβήλους
  chosen: profane
  alternatives:
  - godless
  - irreverent
  - worldly
  lexicon: BDAG
  rationale: βέβηλος denotes what is unhallowed or irreverent, in contrast to what
    is sacred. 'Profane' preserves the religious/moral force better than the weaker
    'worldly.'
- source_word: κενοφωνίας
  chosen: empty talk
  alternatives:
  - empty chatter
  - vain babblings
  - hollow speech
  lexicon: BDAG
  rationale: κενοφωνία is literally 'empty sounding/speech.' 'Empty talk' is natural
    modern English and preserves the sense of speech lacking substance or value.
- source_word: περιΐστασο
  chosen: avoid
  alternatives:
  - shun
  - keep away from
  - turn aside from
  lexicon: BDAG
  rationale: The middle imperative calls Timothy to keep clear of or steer around
    such speech. 'Avoid' is concise, idiomatic, and strong without sounding archaic
    like 'shun.'
- source_word: ἐπὶ πλεῖον
  chosen: into more and more
  alternatives:
  - further
  - to a greater degree
  - still more
  lexicon: BDAG
  rationale: The phrase expresses movement/progression to a greater extent. 'Into
    more and more' fits the following genitive and conveys escalating development.
- source_word: προκόψουσιν
  chosen: will advance
  alternatives:
  - will progress
  - will go forward
  lexicon: BDAG
  rationale: προκόπτω means to advance or make progress. Here the progress is negative
    in moral direction, so 'advance' keeps the irony without implying positive improvement.
- source_word: ἀσεβείας
  chosen: ungodliness
  alternatives:
  - impiety
  - godlessness
  lexicon: BDAG
  rationale: The genitive after ἐπὶ πλεῖον with προκόπτω indicates advance into a
    greater degree of irreverence toward God. 'Ungodliness' is standard, clear, and
    preserves the moral-religious sense.
- source_word: δὲ
  chosen: But
  alternatives:
  - Now
  - And
  lexicon: BDAG
  rationale: δέ marks contrast with the preceding exhortation. 'But' best signals
    the adversative turn in English.
