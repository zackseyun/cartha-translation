theological_decisions:
- issue: Whether the warning concerns merely useless speech or morally/religiously
    corrupt speech
  chosen_reading: The speech is rendered as 'profane empty talk,' preserving both
    its emptiness and its irreverent character.
  alternative_readings:
  - '''godless chatter'''
  - '''worldly babble'''
  rationale: The verse does not describe neutral unhelpful conversation but speech
    that is spiritually corrupt and leads to greater ἀσέβεια. The translation therefore
    keeps explicit religious-moral weight.
  doctrine_reference: 'Translation philosophy: preserve source meaning without flattening
    theological weight.'
