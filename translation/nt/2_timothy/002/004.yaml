theological_decisions:
- issue: Extent of the military metaphor
  chosen_reading: Render the imagery straightforwardly as a soldier avoiding entanglement
    in ordinary-life affairs to please his enlisting authority.
  alternative_readings:
  - Interpret more specifically as avoiding 'civilian pursuits'
  - Generalize the metaphor into a broader statement about ministry priorities
  rationale: The verse uses a military metaphor in service of Paul's exhortation,
    but the translation should preserve the image rather than prematurely interpret
    its application. The wording keeps the metaphor vivid while remaining readable.
  doctrine_reference: 'Translation philosophy: Preserve theological tension rather
    than resolve it; readable modern English, not archaic or academic.'
