id: 2TI.2.4
reference: 2 Timothy 2:4
source:
  edition: SBLGNT
  text: οὐδεὶς στρατευόμενος ἐμπλέκεται ταῖς τοῦ βίου πραγματείαις, ἵνα τῷ στρατολογήσαντι
    ἀρέσῃ·
translation:
  text: No one serving as a soldier gets entangled in the affairs of ordinary life,
    so that he may please the one who enlisted him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in civilian pursuits.' The Greek contrasts military service with the
      ordinary affairs of life.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐδεὶς
  chosen: No one
  alternatives:
  - No man
  - No person
  lexicon: BDAG
  rationale: Indefinite negative pronoun meaning 'no one' or 'nobody.' 'No one' is
    natural modern English and preserves the universal force without unnecessary gendering.
- source_word: στρατευόμενος
  chosen: serving as a soldier
  alternatives:
  - being a soldier
  - on active service
  - soldiering
  lexicon: BDAG
  rationale: Present middle/passive participle from στρατεύομαι, denoting engagement
    in military service. 'Serving as a soldier' captures the ongoing participial sense
    and fits the metaphor without sounding archaic.
- source_word: ἐμπλέκεται
  chosen: gets entangled
  alternatives:
  - becomes entangled
  - is involved
  lexicon: BDAG
  rationale: The verb ἐμπλέκομαι has the sense of becoming entangled or involved in
    a way that hinders freedom of action. 'Gets entangled' preserves the vivid metaphor
    better than the flatter 'is involved.'
- source_word: ταῖς τοῦ βίου πραγματείαις
  chosen: in the affairs of ordinary life
  alternatives:
  - in civilian pursuits
  - in the business affairs of life
  - in everyday affairs
  lexicon: BDAG
  rationale: πραγματεία refers to occupations, business, or affairs; βίος here denotes
    everyday earthly life/livelihood rather than ζωή in a broader existential sense.
    'Affairs of ordinary life' communicates the contrast with military service clearly
    in contemporary English. 'Civilian pursuits' is possible and preserves the military
    contrast, but may sound more interpretive and less directly tied to βίος.
- source_word: ἵνα
  chosen: so that
  alternatives:
  - in order that
  lexicon: BDAG
  rationale: Standard purposive conjunction. 'So that' is idiomatic and clearly marks
    purpose.
- source_word: τῷ στρατολογήσαντι
  chosen: the one who enlisted him
  alternatives:
  - his enlisting officer
  - the one who recruited him
  lexicon: BDAG
  rationale: Aorist active participle of στρατολογέω, 'to enlist/recruit.' 'The one
    who enlisted him' is transparent and avoids importing a more specific military
    rank not present in the Greek.
- source_word: ἀρέσῃ
  chosen: may please
  alternatives:
  - might please
  lexicon: BDAG
  rationale: Aorist active subjunctive after ἵνα expressing purpose. 'May please'
    is natural English and preserves the intended goal of the soldier's undivided
    focus.
