id: 2TI.2.23
reference: 2 Timothy 2:23
source:
  edition: SBLGNT
  text: τὰς δὲ μωρὰς καὶ ἀπαιδεύτους ζητήσεις παραιτοῦ, εἰδὼς ὅτι γεννῶσι μάχας·
translation:
  text: But refuse foolish and uninstructed controversies, knowing that they produce
    quarrels.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'questions' or 'debates'; the Greek term can denote inquiries, but here
      likely refers to contentious disputes rather than sincere investigation.
    reason: lexical_alternative
  - marker: b
    text: Literally 'give birth to' or 'beget'; the expression is metaphorical for
      causing or generating quarrels.
    reason: lexical_alternative
lexical_decisions:
- source_word: μωρὰς
  chosen: foolish
  alternatives:
  - stupid
  - senseless
  lexicon: BDAG
  rationale: μωρός commonly denotes what is foolish or lacking sense. 'Foolish' is
    natural modern English and preserves the moral-intellectual force without sounding
    overly colloquial.
- source_word: ἀπαιδεύτους
  chosen: uninstructed
  alternatives:
  - ignorant
  - undisciplined
  - uneducated
  lexicon: BDAG
  rationale: The adjective denotes lack of training or instruction. 'Uninstructed'
    best captures the idea of being untaught rather than merely unintelligent, and
    fits the context of speculative disputes.
- source_word: ζητήσεις
  chosen: controversies
  alternatives:
  - questions
  - debates
  - speculations
  lexicon: BDAG
  rationale: While the noun can mean 'questions' or 'inquiries,' in the Pastoral Epistles
    it often refers to contentious disputes rather than neutral inquiry. 'Controversies'
    conveys the argumentative sense in context.
- source_word: παραιτοῦ
  chosen: refuse
  alternatives:
  - avoid
  - reject
  - have nothing to do with
  lexicon: BDAG
  rationale: The middle imperative calls Timothy to decline or avoid involvement.
    'Refuse' is concise and strong, preserving the imperative force without overexpanding
    the wording.
- source_word: εἰδὼς
  chosen: knowing
  alternatives:
  - since you know
  - because you know
  lexicon: BDAG
  rationale: The participle gives the reason or attendant circumstance for the command.
    'Knowing' preserves the participial structure while remaining clear in English.
- source_word: γεννῶσι
  chosen: produce
  alternatives:
  - give birth to
  - generate
  - breed
  lexicon: BDAG
  rationale: Literally the verb is 'beget/give birth to,' but here it is metaphorical.
    'Produce' communicates the causal result in readable modern English without an
    awkward literalism.
- source_word: μάχας
  chosen: quarrels
  alternatives:
  - fights
  - conflicts
  - strifes
  lexicon: BDAG
  rationale: The noun refers to fights or disputes. 'Quarrels' fits the verbal and
    relational context of argumentative conflict better than the more physical-sounding
    'fights'.
- source_word: δὲ
  chosen: But
  alternatives:
  - Now
  - And
  lexicon: BDAG
  rationale: δέ marks a mild contrast with the preceding exhortation. 'But' appropriately
    signals the contrast in English.
