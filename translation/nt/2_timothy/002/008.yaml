theological_decisions:
- issue: Rendering Χριστός
  chosen_reading: Messiah
  alternative_readings:
  - Christ
  rationale: The doctrinal guidelines specify 'Messiah' where Χριστός functions as
    a title. In this verse Paul presents Jesus in relation to resurrection and Davidic
    descent, both strongly messianic categories, so the title sense is prominent.
  doctrine_reference: 'DOCTRINE.md Contested terms: Χριστός → Messiah (where title;
    Christ where name-like)'
- issue: Force of the perfect passive participle ἐγηγερμένον
  chosen_reading: raised
  alternative_readings:
  - risen
  - having been raised
  rationale: The passive form preserves the resurrection as an act done to Jesus,
    fitting apostolic proclamation and avoiding interpretive flattening. The concise
    English 'raised' best balances accuracy and readability.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: preserve source text''s
    plain sense; readable modern English'
- issue: Meaning of 'my gospel'
  chosen_reading: Paul's proclaimed/entrusted gospel, not a distinct gospel
  alternative_readings:
  - the gospel as uniquely Paul's
  rationale: The possessive μου should be translated straightforwardly as 'my,' but
    not interpreted as implying a different message from the apostolic gospel. This
    is a matter of interpretation rather than wording, so the main text remains literal.
  doctrine_reference: 'DOCTRINE.md Affirmations; Translation philosophy: do not import
    doctrinal claims the text does not make'
