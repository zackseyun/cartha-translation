id: 2TI.2.8
reference: 2 Timothy 2:8
source:
  edition: SBLGNT
  text: Μνημόνευε Ἰησοῦν Χριστὸν ἐγηγερμένον ἐκ νεκρῶν, ἐκ σπέρματος Δαυίδ, κατὰ τὸ
    εὐαγγέλιόν μου·
translation:
  text: Remember Jesus the Messiah, raised from the dead, descended from David, according
    to my gospel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or: ''Jesus Christ.'' The Greek title Χριστός can be rendered ''Christ''
      or ''Messiah''; here ''Messiah'' is used to preserve the title''s meaning, especially
      alongside ''descended from David.'''
    reason: alternative_reading
  - marker: b
    text: Literally, 'from the seed of David.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Μνημόνευε
  chosen: Remember
  alternatives:
  - Keep in mind
  - Remember continually
  lexicon: BDAG
  rationale: Present imperative of μνημονεύω calls for an ongoing exhortation to keep
    Jesus in remembrance. 'Remember' is natural English and preserves the imperative
    force without over-paraphrasing.
- source_word: Ἰησοῦν Χριστόν
  chosen: Jesus the Messiah
  alternatives:
  - Jesus Christ
  - Jesus Messiah
  lexicon: BDAG
  rationale: Χριστός is a title here rather than merely a fixed surname-like element,
    and the doctrine guidelines prefer 'Messiah' where context supports. The appositional
    English 'Jesus the Messiah' is clear and preserves the title's meaning.
- source_word: ἐγηγερμένον
  chosen: raised
  alternatives:
  - having been raised
  - risen
  lexicon: BDAG
  rationale: Perfect passive participle of ἐγείρω describes Jesus as one who has been
    raised and remains so. 'Raised' is concise and idiomatic in English; 'risen' could
    suggest intransitive nuance, while the Greek passive points to resurrection effected
    by God.
- source_word: ἐκ νεκρῶν
  chosen: from the dead
  alternatives:
  - out from among the dead
  lexicon: BDAG
  rationale: Standard idiomatic rendering of the prepositional phrase in resurrection
    contexts. It communicates the sense clearly without unnecessary literalism.
- source_word: ἐκ σπέρματος Δαυίδ
  chosen: descended from David
  alternatives:
  - from the seed of David
  - of the offspring of David
  lexicon: BDAG
  rationale: σπέρμα literally means 'seed,' but in genealogical contexts 'descended
    from' or 'offspring of' best conveys the sense in natural English. 'Descended
    from David' preserves the Davidic lineage emphasis without archaic phrasing.
- source_word: κατὰ τὸ εὐαγγέλιόν μου
  chosen: according to my gospel
  alternatives:
  - in accordance with my gospel
  - according to the gospel I proclaim
  lexicon: BDAG
  rationale: κατά here means 'according to/in accordance with.' Retaining 'my gospel'
    reflects Paul's idiom of the gospel entrusted to and proclaimed by him, not a
    private or different gospel.
