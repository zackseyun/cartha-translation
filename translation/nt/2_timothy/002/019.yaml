id: 2TI.2.19
reference: 2 Timothy 2:19
source:
  edition: SBLGNT
  text: ὁ μέντοι στερεὸς θεμέλιος τοῦ θεοῦ ἕστηκεν, ἔχων τὴν σφραγῖδα ταύτην· Ἔγνω
    κύριος τοὺς ὄντας αὐτοῦ, καί· Ἀποστήτω ἀπὸ ἀδικίας πᾶς ὁ ὀνομάζων τὸ ὄνομα κυρίου.
translation:
  text: 'Nevertheless, the firm foundation of God stands, having this seal: “The Lord
    knows those who are his,” and, “Let everyone who names the name of the Lord depart
    from unrighteousness.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'bearing this inscription.' The word translated 'seal' can refer to the
      identifying mark or inscription on a seal.
    reason: lexical_alternative
  - marker: b
    text: Or 'everyone who calls on the name of the Lord.' The Greek literally says
      'names the name of the Lord,' an idiom for invoking or professing allegiance
      to him.
    reason: lexical_alternative
lexical_decisions:
- source_word: μέντοι
  chosen: Nevertheless
  alternatives:
  - Yet
  - However
  lexicon: BDAG
  rationale: Marks a strong concessive/adversative transition after the preceding
    discussion of false teaching; 'Nevertheless' preserves the contrast and rhetorical
    weight.
- source_word: στερεὸς θεμέλιος
  chosen: firm foundation
  alternatives:
  - solid foundation
  - sure foundation
  lexicon: BDAG
  rationale: The adjective-noun combination emphasizes stability and permanence. 'Firm
    foundation' is natural English and preserves the metaphor without over-literal
    awkwardness.
- source_word: τοῦ θεοῦ
  chosen: of God
  alternatives:
  - God's
  lexicon: BDAG
  rationale: The genitive is retained straightforwardly. 'Of God' preserves the formal
    relation and leaves open whether the sense is source, possession, or characterization,
    all of which may be rhetorically present.
- source_word: ἕστηκεν
  chosen: stands
  alternatives:
  - has stood
  - remains standing
  lexicon: BDAG
  rationale: Perfect tense of ἵστημι conveys a settled standing state. English present
    'stands' best captures the stative force in idiomatic form.
- source_word: ἔχων τὴν σφραγῖδα ταύτην
  chosen: having this seal
  alternatives:
  - bearing this seal
  - with this inscription
  lexicon: BDAG
  rationale: Retains the participial construction and the image of an identifying/authenticating
    seal. 'Seal' is preferable in the main text because it preserves the metaphor;
    the idea of inscription is worth noting as an alternative.
- source_word: Ἔγνω
  chosen: knows
  alternatives:
  - has known
  - recognized
  lexicon: BDAG
  rationale: Although formally aorist, in this citation the sense is effectively gnomic
    or timeless. 'Knows' communicates the enduring divine knowledge more naturally
    in English than a simple past.
- source_word: κύριος
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Follows the doctrinal default for κύριος. In this citation the referent
    is the Lord in a scriptural, covenantally weighty sense, and 'Lord' preserves
    that resonance.
- source_word: τοὺς ὄντας αὐτοῦ
  chosen: those who are his
  alternatives:
  - those belonging to him
  - his own
  lexicon: BDAG
  rationale: This rendering preserves both the participial construction and the possessive
    relationship without sounding wooden. It communicates belonging/identity clearly.
- source_word: Ἀποστήτω
  chosen: Let ... depart
  alternatives:
  - Let ... turn away
  - Let ... withdraw
  lexicon: BDAG
  rationale: Aorist imperative calls for decisive separation. 'Depart' is concise
    and preserves the formal, moral force of the command.
- source_word: ἀπὸ ἀδικίας
  chosen: from unrighteousness
  alternatives:
  - from wickedness
  - from injustice
  lexicon: BDAG
  rationale: ἀδικία can denote wrongdoing, injustice, or unrighteousness. 'Unrighteousness'
    best fits the moral-religious register of the verse and aligns with the project's
    handling of δικ- terms, while preserving broad ethical scope.
- source_word: πᾶς ὁ ὀνομάζων τὸ ὄνομα κυρίου
  chosen: everyone who names the name of the Lord
  alternatives:
  - everyone who calls on the name of the Lord
  - everyone who confesses the Lord's name
  lexicon: BDAG
  rationale: The Greek says 'names the name,' an idiom for invoking or professing
    allegiance. The main text keeps the verbal and rhetorical texture of the source;
    a more idiomatic alternative is preserved in a footnote.
