theological_decisions:
- issue: Referent of 'the Lord' in the two seal quotations
  chosen_reading: Render both occurrences simply as 'the Lord' without specifying
    in the translation whether the referent is the Father, Christ, or a scriptural
    citation with layered referential force.
  alternative_readings:
  - Interpret both as God the Father
  - Interpret both as Christ
  - Differentiate the referent between the two clauses
  rationale: The verse cites scriptural language and applies it in a Christian context.
    The Greek text itself uses κύριος without explicit clarification, and the translation
    should preserve that theological density rather than resolve it beyond what the
    text states.
  doctrine_reference: Preserve theological tension rather than resolve it.
