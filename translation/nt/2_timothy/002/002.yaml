theological_decisions:
- issue: Gender rendering of πιστοῖς ἀνθρώποις
  chosen_reading: faithful men
  alternative_readings:
  - faithful people
  - faithful persons
  rationale: The Greek is masculine plural and may have representative force, but
    the translation philosophy directs gender-accurate rendering rather than default
    gender-neutralization. A footnote preserves the possibility that the phrase can
    function more broadly in context.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
