theological_decisions:
- issue: Referent of 'the Lord' (ὁ κύριος)
  chosen_reading: Render generically as 'the Lord' without specifying whether Paul
    means the Lord Jesus or God more broadly.
  alternative_readings:
  - the Lord Jesus
  - God
  rationale: The Greek text itself does not explicitly identify the referent beyond
    'the Lord.' In Pauline usage this can often refer to Jesus, but the translation
    should preserve the textual wording and not resolve the ambiguity beyond what
    the verse states.
  doctrine_reference: Preserve theological tension rather than resolve it.
