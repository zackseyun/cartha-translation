id: 2TI.2.12
reference: 2 Timothy 2:12
source:
  edition: SBLGNT
  text: εἰ ὑπομένομεν, καὶ συμβασιλεύσομεν· εἰ ⸀ἀρνησόμεθα, κἀκεῖνος ἀρνήσεται ἡμᾶς·
translation:
  text: If we endure, we will also reign with him; if we deny him, he also will deny
    us.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'disown him' / 'he also will disown us.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὑπομένομεν
  chosen: endure
  alternatives:
  - persevere
  - remain steadfast
  lexicon: BDAG
  rationale: ὑπομένω here carries the sense of steadfast endurance under trial or
    suffering. 'Endure' is concise, natural English and preserves the conditional
    force without importing later theological terminology more strongly than the Greek
    itself requires.
- source_word: συμβασιλεύσομεν
  chosen: will reign with him
  alternatives:
  - will rule with him
  lexicon: BDAG
  rationale: The compound verb means 'reign together with.' English normally requires
    an explicit object, so 'with him' makes the implied co-regency clear from the
    context of the faithful saying about union with Christ. 'Reign' better matches
    royal imagery than 'rule'.
- source_word: ἀρνησόμεθα
  chosen: deny him
  alternatives:
  - disown him
  lexicon: BDAG
  rationale: ἀρνέομαι means to deny, repudiate, or disown. 'Deny him' preserves the
    verbal correspondence with the following clause and echoes established NT usage
    (including Jesus' sayings) without becoming archaic. The object 'him' is supplied
    from context because English idiom expects it and the parallel clause makes the
    referent clear.
- source_word: κἀκεῖνος
  chosen: he also
  alternatives:
  - that one also
  - he in turn
  lexicon: BDAG
  rationale: 'κἀκεῖνος is a crasis of καὶ ἐκεῖνος, emphasizing reciprocal correspondence:
    ''he also'' or ''he in turn.'' ''He also'' is idiomatic and preserves the parallelism
    of the saying.'
- source_word: ἀρνήσεται ἡμᾶς
  chosen: will deny us
  alternatives:
  - will disown us
  lexicon: BDAG
  rationale: Using 'deny' again preserves the deliberate repetition of ἀρνέομαι in
    both clauses. This lexical consistency is important to the warning's rhetorical
    force.
