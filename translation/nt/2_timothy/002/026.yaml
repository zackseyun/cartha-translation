theological_decisions:
- issue: Referent of ἐκείνου in εἰς τὸ ἐκείνου θέλημα
  chosen_reading: The pronoun refers to the devil, yielding 'for his will.'
  alternative_readings:
  - The pronoun refers to God, yielding 'for his will' in the sense of rescue into
    God's will.
  rationale: The most immediate and syntactically natural antecedent is the devil
    in the preceding phrase ('by him'), and the flow of the sentence describes those
    still in the state of captivity from which they need to recover. This reading
    avoids importing a theological reversal not explicitly marked in the Greek. Because
    interpreters have long disputed the referent, the alternative is preserved in
    a footnote rather than erased.
  doctrine_reference: Preserve theological tension rather than resolve it
