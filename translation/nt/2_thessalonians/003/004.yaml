id: 2TH.3.4
reference: 2 Thessalonians 3:4
source:
  edition: SBLGNT
  text: πεποίθαμεν δὲ ἐν κυρίῳ ἐφ’ ὑμᾶς, ὅτι ἃ ⸀παραγγέλλομεν καὶ ποιεῖτε καὶ ποιήσετε.
translation:
  text: And we have confidence in the Lord about you, that you are doing and will
    do what we command.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: πεποίθαμεν
  chosen: we have confidence
  alternatives:
  - we are confident
  - we trust
  lexicon: BDAG
  rationale: Perfect tense conveys a settled state of confidence resulting from prior
    persuasion; 'we have confidence' preserves that aspect better than a simple present
    while remaining natural English.
- source_word: ἐν κυρίῳ
  chosen: in the Lord
  alternatives:
  - through the Lord
  - before the Lord
  lexicon: BDAG
  rationale: The prepositional phrase most naturally expresses the sphere or basis
    of Paul's confidence. 'In the Lord' preserves the theological grounding without
    over-interpreting instrumentality.
- source_word: ἐφ’ ὑμᾶς
  chosen: about you
  alternatives:
  - concerning you
  - with regard to you
  lexicon: BDAG
  rationale: With πεποίθαμεν, ἐπί plus accusative here indicates the object/reference
    of confidence. 'About you' is idiomatic modern English and fits the sense of confidence
    regarding the Thessalonians.
- source_word: ὅτι
  chosen: that
  alternatives:
  - because
  lexicon: BDAG
  rationale: Introduces the content of the confidence rather than its cause in this
    context.
- source_word: ἃ
  chosen: what
  alternatives:
  - the things that
  - whatever
  lexicon: BDAG
  rationale: The neuter plural relative pronoun refers to the content of the apostolic
    commands. 'What' is concise and natural in English while preserving the object
    sense.
- source_word: παραγγέλλομεν
  chosen: we command
  alternatives:
  - we instruct
  - we give orders
  lexicon: BDAG
  rationale: παραγγέλλω carries authoritative instruction. 'Command' best reflects
    the apostolic authority in context without softening it to mere advice.
- source_word: ποιεῖτε
  chosen: you are doing
  alternatives:
  - you do
  - you are carrying out
  lexicon: BDAG
  rationale: Present tense here is naturally rendered as progressive in English to
    pair clearly with the future 'will do,' highlighting present obedience and continued
    future obedience.
- source_word: ποιήσετε
  chosen: will do
  alternatives:
  - will continue to do
  - will carry out
  lexicon: BDAG
  rationale: Future indicative points to expected ongoing obedience. 'Will do' is
    the most direct rendering; the sense of continuation is already supported by the
    coordination with the present tense.
- source_word: δέ
  chosen: And
  alternatives:
  - Now
  - But
  lexicon: BDAG
  rationale: δέ marks a mild transition rather than strong contrast. 'And' fits the
    flow from the preceding verse in natural English.
