theological_decisions:
- issue: Ground of apostolic confidence
  chosen_reading: Paul's confidence is expressed as being in the Lord, not merely
    in the Thessalonians themselves.
  alternative_readings:
  - Paul is simply confident about the Thessalonians' character
  rationale: The phrase ἐν κυρίῳ explicitly locates the confidence in relation to
    the Lord. The translation preserves this theological grounding rather than making
    the confidence purely human.
  doctrine_reference: 'Translation philosophy §1, §3; Contested terms: κύριος → Lord'
