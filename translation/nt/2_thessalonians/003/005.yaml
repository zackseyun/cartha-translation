theological_decisions:
- issue: Ambiguous genitive in 'τὴν ἀγάπην τοῦ θεοῦ'
  chosen_reading: Rendered literally as 'the love of God' without resolving whether
    it means God's love, love for God, or participation in divine love.
  alternative_readings:
  - love for God
  - God's love
  rationale: The Greek genitive is genuinely open, and the translation should preserve
    the theological tension rather than force a devotional or doctrinally preferred
    interpretation.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it.'
- issue: Ambiguous genitive in 'τὴν ὑπομονὴν τοῦ Χριστοῦ'
  chosen_reading: Rendered as 'the steadfastness of the Messiah' to preserve ambiguity.
  alternative_readings:
  - steadfastness for the Messiah
  - the Messiah's steadfastness
  - endurance like the Messiah's
  rationale: The phrase can be read subjectively, objectively, or qualitatively. The
    main text keeps the ambiguity; alternatives are preserved in a footnote.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it.'
- issue: Rendering Χριστοῦ
  chosen_reading: Messiah
  alternative_readings:
  - Christ
  rationale: The term is a title here rather than a mere name-like label. Translating
    it as 'Messiah' preserves the meaning of Χριστός in line with project policy.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; Contested
    terms table for Χριστός.'
