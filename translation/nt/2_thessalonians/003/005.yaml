id: 2TH.3.5
reference: 2 Thessalonians 3:5
source:
  edition: SBLGNT
  text: ὁ δὲ κύριος κατευθύναι ὑμῶν τὰς καρδίας εἰς τὴν ἀγάπην τοῦ θεοῦ καὶ εἰς τὴν
    ὑπομονὴν τοῦ Χριστοῦ.
translation:
  text: Now may the Lord direct your hearts into the love of God and into the steadfastness
    of the Messiah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'into love for God.' The Greek can also mean 'into God's love.'
    reason: alternative_reading
  - marker: b
    text: Or 'into the Messiah's steadfastness,' or 'into steadfastness for the Messiah.'
    reason: alternative_reading
  - marker: c
    text: Greek 'Christ'; translated 'Messiah' here because the term functions as
      a title.
    reason: lexical_alternative
lexical_decisions:
- source_word: κύριος
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Follows the project's default rendering for κύριος. In this context it
    functions as a divine/christological title, and 'Lord' best preserves both NT
    usage and theological weight without over-specifying the referent beyond the text.
- source_word: κατευθύναι
  chosen: direct
  alternatives:
  - guide
  - make straight
  lexicon: BDAG
  rationale: 'The optative expresses a wish/prayer: ''may ... direct.'' ''Direct''
    preserves the sense of leading or making a path straight for the readers'' inner
    disposition, while remaining natural English.'
- source_word: καρδίας
  chosen: hearts
  alternatives:
  - inner selves
  - minds
  lexicon: BDAG
  rationale: '''Hearts'' is the standard biblical anthropological term and preserves
    the source metaphor for the center of thought, will, and affection. Alternatives
    flatten the biblical idiom.'
- source_word: ἀγάπην
  chosen: love
  lexicon: BDAG
  rationale: Follows the project's default rendering for ἀγάπη. 'Love' is the plain
    and accurate English equivalent.
- source_word: τοῦ θεοῦ
  chosen: of God
  alternatives:
  - for God
  - God's
  lexicon: BDAG
  rationale: 'The genitive is ambiguous: it may mean God''s love for believers, believers''
    love for God, or more broadly the sphere/quality of divine love. ''Of God'' preserves
    that ambiguity better than resolving it to ''for God'' or a possessive paraphrase.'
- source_word: ὑπομονὴν
  chosen: steadfastness
  alternatives:
  - endurance
  - patient endurance
  lexicon: BDAG
  rationale: ὑπομονή denotes persevering endurance under pressure. 'Steadfastness'
    fits the prayerful, character-oriented context and pairs well with 'direct your
    hearts into...' while remaining readable.
- source_word: τοῦ Χριστοῦ
  chosen: of the Messiah
  alternatives:
  - of Christ
  - for the Messiah
  - Messiah's
  lexicon: BDAG
  rationale: 'Per project guidance, Χριστός is translated as ''Messiah'' where it
    functions as a title. The genitive is ambiguous: it may refer to the Messiah''s
    own steadfastness, steadfastness directed toward the Messiah, or steadfastness
    characterized by him. ''Of the Messiah'' preserves that ambiguity in the main
    text.'
