id: 2TH.3.16
reference: 2 Thessalonians 3:16
source:
  edition: SBLGNT
  text: Αὐτὸς δὲ ὁ κύριος τῆς εἰρήνης δῴη ὑμῖν τὴν εἰρήνην διὰ παντὸς ἐν παντὶ τρόπῳ.
    ὁ κύριος μετὰ πάντων ὑμῶν.
translation:
  text: Now may the Lord of peace himself give you peace at all times in every way.
    The Lord be with all of you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'continually' for 'at all times.'
    reason: lexical_alternative
  - marker: b
    text: Or 'in every manner' for 'in every way.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Αὐτὸς
  chosen: himself
  alternatives:
  - he himself
  lexicon: BDAG
  rationale: 'Intensive use of αὐτός with ὁ κύριος emphasizes the subject personally:
    ''the Lord of peace himself.'' ''Himself'' preserves the emphasis naturally in
    English.'
- source_word: δὲ
  chosen: Now
  alternatives:
  - and
  - but
  lexicon: BDAG
  rationale: δέ here marks a mild transition into the closing benediction rather than
    strong contrast. 'Now' is a natural English discourse marker in this context.
- source_word: κύριος
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Per doctrine default, κύριος is rendered 'Lord.' In this benediction
    it functions as a christological title and should be translated, not transliterated.
- source_word: τῆς εἰρήνης
  chosen: of peace
  alternatives:
  - who gives peace
  lexicon: BDAG
  rationale: 'The genitive is most straightforwardly attributive/relational: ''the
    Lord of peace.'' This preserves the title-like expression without expanding it
    interpretively.'
- source_word: δῴη
  chosen: may ... give
  alternatives:
  - give
  - would give
  lexicon: BDAG
  rationale: Aorist optative in a benedictory/prayer context is well represented by
    English 'may ... give,' conveying wish/prayer rather than simple assertion.
- source_word: τὴν εἰρήνην
  chosen: peace
  alternatives:
  - the peace
  lexicon: BDAG
  rationale: 'Although the Greek has the article, idiomatic English in this benediction
    omits it: ''give you peace.'' Retaining ''the peace'' would sound wooden without
    adding clarity.'
- source_word: διὰ παντὸς
  chosen: at all times
  alternatives:
  - continually
  - always
  lexicon: BDAG
  rationale: The phrase denotes constancy through all time/circumstances. 'At all
    times' is clear and preserves the temporal force better than the more interpretive
    'continually.'
- source_word: ἐν παντὶ τρόπῳ
  chosen: in every way
  alternatives:
  - in every manner
  - by every means
  lexicon: BDAG
  rationale: τρόπος here refers to manner/mode. 'In every way' is idiomatic modern
    English and preserves the breadth of the expression.
- source_word: μετὰ πάντων ὑμῶν
  chosen: with all of you
  alternatives:
  - with you all
  lexicon: BDAG
  rationale: This preserves the inclusive scope of πάντων and reads naturally in contemporary
    English. 'All of you' makes the distributive breadth explicit.
