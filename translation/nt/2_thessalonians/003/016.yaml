theological_decisions:
- issue: Referent of 'the Lord' in the benediction
  chosen_reading: Retain 'Lord' without specifying beyond the text, while allowing
    the likely Pauline reference to the Lord Jesus to stand implicitly.
  alternative_readings:
  - Explicitly paraphrase as 'the Lord Jesus'
  - Treat as a more general reference to God
  rationale: The Greek text says only ὁ κύριος. In Pauline closing benedictions this
    commonly refers to the Lord Jesus, especially in the immediately preceding context,
    but the translation should not import a fuller identification than the verse states.
    Rendering simply 'Lord' preserves the text while remaining fully compatible with
    orthodox christological reading.
  doctrine_reference: Affirmations; Translation philosophy §§1, 3
- issue: Force of the final clause
  chosen_reading: 'Translate as an implied benedictory wish: ''The Lord be with all
    of you.'''
  alternative_readings:
  - '''The Lord is with all of you'''
  rationale: Although no explicit verb appears in Greek, the clause functions as a
    conventional blessing/wish in context, not a flat indicative assertion. English
    idiom supplies 'be' to reflect the benedictory force.
  doctrine_reference: Translation philosophy §6
