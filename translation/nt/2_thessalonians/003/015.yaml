theological_decisions:
- issue: Disciplinary posture toward a disobedient believer
  chosen_reading: 'The verse distinguishes church discipline from personal hostility:
    the person is not to be treated as an enemy but corrected as a fellow believer.'
  alternative_readings:
  - The verse could be read more generally as advice about interpersonal conflict
    rather than specifically ecclesial discipline.
  rationale: In context (2 Thess 3:14–15), Paul speaks about someone within the community
    who is to be noted and socially distanced for correction. The language of 'brother'
    indicates continued recognition of covenant/community relationship rather than
    excommunication as an enemy.
  doctrine_reference: Translation philosophy §3; Affirmations (ecumenical orthodoxy
    without denominational overreach)
