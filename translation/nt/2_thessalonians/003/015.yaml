id: 2TH.3.15
reference: 2 Thessalonians 3:15
source:
  edition: SBLGNT
  text: καὶ μὴ ὡς ἐχθρὸν ἡγεῖσθε, ἀλλὰ νουθετεῖτε ὡς ἀδελφόν.
translation:
  text: And do not regard him as an enemy, but admonish him as a brother.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'consider him an enemy.'
    reason: lexical_alternative
  - marker: b
    text: '''Brother'' here refers to a fellow believer; the term may be used representatively
      for a member of the Christian community.'
    reason: cultural_note
lexical_decisions:
- source_word: ἡγεῖσθε
  chosen: regard
  alternatives:
  - consider
  - think of
  lexicon: BDAG
  rationale: The middle imperative here means to hold or consider someone in a certain
    way. 'Regard' is natural modern English and preserves the evaluative sense without
    sounding overly formal.
- source_word: ἐχθρὸν
  chosen: enemy
  alternatives:
  - foe
  lexicon: BDAG
  rationale: The accusative predicate after ὡς with ἡγεῖσθε indicates the person is
    not to be treated or considered in the category of an enemy. 'Enemy' is the clear
    and standard rendering.
- source_word: νουθετεῖτε
  chosen: admonish
  alternatives:
  - warn
  - instruct
  - correct
  lexicon: BDAG
  rationale: νουθετέω carries the sense of warning or instructing with corrective
    intent. 'Admonish' best preserves both the pastoral and corrective force; 'warn'
    is narrower and 'instruct' is too weak in this disciplinary context.
- source_word: ἀδελφόν
  chosen: brother
  alternatives:
  - brother or sister
  - fellow believer
  lexicon: BDAG
  rationale: The singular masculine noun is used here for a fellow member of the Christian
    community. Per the project's gender-accurate philosophy, 'brother' is retained
    in the main text rather than neutralized, while the representative sense can be
    noted in a footnote.
- source_word: ὡς
  chosen: as
  alternatives:
  - like
  lexicon: BDAG
  rationale: In both clauses ὡς marks the manner or category in which the person is
    to be regarded and addressed. 'As' is the most direct and idiomatic rendering.
- source_word: καὶ μὴ ... ἀλλὰ
  chosen: And do not ... but ...
  alternatives:
  - Yet do not ... but ...
  lexicon: BDAG
  rationale: The construction sets a strong contrast with the preceding disciplinary
    instruction. 'And do not ... but ...' preserves the connective flow while clearly
    expressing the contrast.
