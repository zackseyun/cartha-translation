id: 2TH.3.12
reference: 2 Thessalonians 3:12
source:
  edition: SBLGNT
  text: τοῖς δὲ τοιούτοις παραγγέλλομεν καὶ παρακαλοῦμεν ⸂ἐν κυρίῳ Ἰησοῦ Χριστῷ⸃ ἵνα
    μετὰ ἡσυχίας ἐργαζόμενοι τὸν ἑαυτῶν ἄρτον ἐσθίωσιν.
translation:
  text: Now to such people we command and urge in the Lord Jesus Christ that, working
    quietly, they should eat their own bread.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the Lord Jesus Christ.' The Greek title Χριστός is rendered 'Messiah'
      here because it functions as a title.
    reason: alternative_reading
  - marker: b
    text: Or 'quietly.' The phrase means in a quiet, settled manner, in contrast to
      disruptive idleness.
    reason: lexical_alternative
  - marker: c
    text: Or 'that, working with quietness, they should eat'.
    reason: previous_rendering
lexical_decisions:
- source_word: τοῖς δὲ τοιούτοις
  chosen: Now to such people
  alternatives:
  - But to such people
  - Now such ones
  lexicon: BDAG
  rationale: τοῖς τοιούτοις is a dative phrase referring back to the idle/disorderly
    persons in context. 'Such people' is natural modern English; 'Now' renders δέ
    as a mild transition rather than strong contrast.
- source_word: παραγγέλλομεν
  chosen: we command
  alternatives:
  - we instruct
  - we order
  lexicon: BDAG
  rationale: παραγγέλλω carries authoritative force; 'command' best preserves Paul's
    apostolic authority here.
- source_word: καὶ παρακαλοῦμεν
  chosen: and urge
  alternatives:
  - and exhort
  - and appeal
  lexicon: BDAG
  rationale: παρακαλέω here softens but does not negate the prior command. 'Urge'
    is readable modern English and preserves earnest appeal without sounding archaic
    like 'exhort'.
- source_word: ἐν κυρίῳ Ἰησοῦ Χριστῷ
  chosen: in the Lord Jesus Messiah
  alternatives:
  - by the Lord Jesus Messiah
  - in the Lord Jesus Christ
  lexicon: BDAG
  rationale: ἐν with κύριος + name/title is most naturally rendered 'in,' expressing
    sphere or authority/union rather than a simple instrumental 'by.' κύριος is rendered
    'Lord' per doctrine. Χριστός is rendered 'Messiah' because it functions as a title
    here rather than a fixed surname-like name.
- source_word: ἵνα
  chosen: that
  alternatives:
  - so that
  lexicon: BDAG
  rationale: Introduces the content/purpose of the command. 'That' is concise and
    idiomatic in English after 'command and urge.'
- source_word: μετὰ ἡσυχίας
  chosen: with quietness
  alternatives:
  - quietly
  - in quietness
  lexicon: BDAG
  rationale: The phrase denotes a quiet, settled manner of life/work, in contrast
    to disruptive idleness. 'With quietness' preserves the nominal expression and
    avoids over-paraphrase, though 'quietly' is possible.
- source_word: ἐργαζόμενοι
  chosen: working
  alternatives:
  - as they work
  - by working
  lexicon: BDAG
  rationale: Present participle expressing attendant manner/circumstance. 'Working'
    keeps the participial force compactly in English.
- source_word: τὸν ἑαυτῶν ἄρτον
  chosen: their own bread
  alternatives:
  - the bread of their own labor
  - their own food
  lexicon: BDAG
  rationale: ἄρτος literally means 'bread,' and in context idiomatically refers to
    one's sustenance/livelihood. Retaining 'bread' preserves the concrete metaphor
    and traditional biblical diction without obscuring meaning.
- source_word: ἐσθίωσιν
  chosen: they should eat
  alternatives:
  - let them eat
  - they may eat
  lexicon: BDAG
  rationale: Present subjunctive under ἵνα after verbs of command is well represented
    by 'they should eat,' conveying intended obligation/result more clearly than permissive
    'may'.
