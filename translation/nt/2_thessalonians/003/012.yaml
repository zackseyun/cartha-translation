  to: that by working quietly, they should eat
  rationale: The current phrasing, especially with the comma after 'that', is stilted
    in English. The suggested rewrite uses a more natural construction ('by working
    quietly') to render the circumstantial participle ἐργαζόμενοι. This better clarifies
    the instrumental relationship between working and eating, which is central to
    the verse's meaning, while also being a more fluid and readable translation.
