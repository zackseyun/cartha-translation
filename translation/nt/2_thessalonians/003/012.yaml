theological_decisions:
- issue: Rendering of Χριστός
  chosen_reading: Messiah
  alternative_readings:
  - Christ
  rationale: Per doctrine, Χριστός is translated as 'Messiah' where it functions as
    a title. In 'Lord Jesus Messiah,' the title remains semantically active rather
    than merely name-like.
  doctrine_reference: 'DOCTRINE.md Contested terms: Χριστός → Messiah (where title;
    Christ where name-like)'
- issue: Force of apostolic instruction
  chosen_reading: Retain both 'command' and 'urge'
  alternative_readings:
  - Flatten to a single verb such as 'instruct'
  rationale: The verse intentionally combines authority and pastoral appeal. Preserving
    both verbs avoids muting either Paul's authority or his earnestness.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1 and #6'
