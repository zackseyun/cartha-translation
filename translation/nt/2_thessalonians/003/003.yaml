id: 2TH.3.3
reference: 2 Thessalonians 3:3
source:
  edition: SBLGNT
  text: πιστὸς δέ ἐστιν ὁ κύριος, ὃς στηρίξει ὑμᾶς καὶ φυλάξει ἀπὸ τοῦ πονηροῦ.
translation:
  text: But the Lord is faithful, who will strengthen you and guard you from the evil
    one.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or: ''from evil.'' The Greek τοῦ πονηροῦ can be read either as masculine
      (''the evil one'') or neuter (''evil'').'
    reason: alternative_reading
lexical_decisions:
- source_word: πιστὸς
  chosen: faithful
  alternatives:
  - trustworthy
  lexicon: BDAG
  rationale: Predicate adjective describing the Lord's reliability and covenant faithfulness
    in contrast to human unreliability in the surrounding context. 'Faithful' is the
    most natural and theologically weighty rendering.
- source_word: δέ
  chosen: But
  alternatives:
  - Now
  - Yet
  lexicon: BDAG
  rationale: Marks a contrast with the preceding statement about not all having faith.
    'But' best preserves the adversative force in clear modern English.
- source_word: ὁ κύριος
  chosen: the Lord
  lexicon: BDAG
  rationale: κύριος is rendered by the doctrinal default 'Lord.' In this Pauline context
    it most naturally refers to the Lord Jesus, though the title itself is retained
    without over-specification.
- source_word: στηρίξει
  chosen: will strengthen
  alternatives:
  - will establish
  - will make firm
  lexicon: BDAG
  rationale: The verb can mean establish, strengthen, or make firm. 'Will strengthen'
    fits the pastoral context and pairs well with the following promise of protection,
    while remaining faithful to the semantic range.
- source_word: φυλάξει
  chosen: will guard
  alternatives:
  - will protect
  - will keep
  lexicon: BDAG
  rationale: φυλάσσω conveys guarding or keeping watch over. 'Guard' preserves the
    active protective sense and works naturally with the following prepositional phrase.
- source_word: ἀπὸ
  chosen: from
  alternatives:
  - against
  lexicon: BDAG
  rationale: Standard rendering of the preposition here, expressing protection away
    from or out of the reach of the following danger.
- source_word: τοῦ πονηροῦ
  chosen: the evil one
  alternatives:
  - evil
  lexicon: BDAG
  rationale: The genitive singular with article may be either masculine ('the evil
    one') or neuter ('evil'). Given common NT usage and the personal sense that fits
    spiritual opposition, the main text adopts 'the evil one' while preserving 'evil'
    in a footnote to maintain the genuine ambiguity.
