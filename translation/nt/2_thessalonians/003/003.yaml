theological_decisions:
- issue: Referent of τοῦ πονηροῦ
  chosen_reading: the evil one
  alternative_readings:
  - evil
  rationale: The Greek form is grammatically ambiguous between masculine and neuter.
    To preserve theological tension rather than resolve it absolutely, the main text
    uses the personal reading common in English translations and NT usage, while the
    alternative abstract reading is preserved in a footnote.
