theological_decisions:
- issue: Interpretive force of Paul's autograph formula
  chosen_reading: The verse is rendered as an authentication statement about Paul's
    personal handwriting in his letters.
  alternative_readings:
  - 'The final clause could be taken more narrowly as referring only to the present
    greeting: ''so I am writing.'''
  rationale: The immediate context and the phrase 'a sign in every letter' favor understanding
    the autograph note as a mark of authenticity rather than making a broader theological
    or stylistic claim. The translation preserves this without over-interpreting.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather
    than resolve it)
