id: 2TH.3.17
reference: 2 Thessalonians 3:17
source:
  edition: SBLGNT
  text: Ὁ ἀσπασμὸς τῇ ἐμῇ χειρὶ Παύλου, ὅ ἐστιν σημεῖον ἐν πάσῃ ἐπιστολῇ· οὕτως γράφω.
translation:
  text: The greeting is in my own hand—Paul's—which is a sign in every letter; this
    is how I write.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'The greeting by my hand—Paul's—which is a sign in every letter; so I
      write.' The final clause may also be rendered more literally, 'thus I write.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀσπασμὸς
  chosen: greeting
  alternatives:
  - greeting of greeting
  - salutation
  lexicon: BDAG
  rationale: ἀσπασμός commonly denotes a greeting or salutation. 'Greeting' is natural
    modern English and fits the epistolary context better than the more formal 'salutation.'
- source_word: τῇ ἐμῇ χειρὶ
  chosen: in my own hand
  alternatives:
  - with my hand
  - by my hand
  lexicon: BDAG
  rationale: The dative phrase is idiomatic for handwriting or personal autograph.
    'In my own hand' clearly conveys that Paul personally writes this portion.
- source_word: Παύλου
  chosen: Paul's
  alternatives:
  - of Paul
  - Paul
  lexicon: BDAG
  rationale: The genitive identifies whose hand/greeting this is. Rendering it as
    'Paul's' in apposition is idiomatic English and preserves the self-identifying
    force.
- source_word: ὅ
  chosen: which
  alternatives:
  - that
  - this
  lexicon: BDAG
  rationale: The relative pronoun refers back to the autograph greeting as the antecedent.
    'Which' best preserves the relative connection in English.
- source_word: σημεῖον
  chosen: a sign
  alternatives:
  - mark
  - token
  lexicon: BDAG
  rationale: σημεῖον here refers to an identifying sign or authenticating mark. 'Sign'
    is the most direct and broadly understandable rendering; 'mark' is possible but
    less standard in this construction.
- source_word: ἐν πάσῃ ἐπιστολῇ
  chosen: in every letter
  alternatives:
  - in each letter
  - in every epistle
  lexicon: BDAG
  rationale: The phrase indicates Paul's customary practice across his correspondence.
    'Letter' is preferable to the ecclesiastical 'epistle' for readable modern English.
- source_word: οὕτως γράφω
  chosen: this is how I write
  alternatives:
  - so I write
  - thus I write
  lexicon: BDAG
  rationale: οὕτως can point either to manner ('this is how') or resumptively ('so/thus').
    The fuller English phrase communicates the likely sense that this autograph style
    functions as authentication.
