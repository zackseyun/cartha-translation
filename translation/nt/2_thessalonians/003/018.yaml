id: 2TH.3.18
reference: 2 Thessalonians 3:18
source:
  edition: SBLGNT
  text: ἡ χάρις τοῦ κυρίου ἡμῶν Ἰησοῦ Χριστοῦ μετὰ πάντων ⸀ὑμῶν.
translation:
  text: The grace of our Lord Jesus Messiah be with all of you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more traditionally, 'The grace of our Lord Jesus Christ be with all
      of you.'
    reason: alternative_reading
lexical_decisions:
- source_word: χάρις
  chosen: grace
  alternatives:
  - favor
  - gracious gift
  lexicon: BDAG
  rationale: Standard Pauline benediction term denoting gracious favor/gift from God
    through Christ. 'Grace' is the established and most semantically fitting English
    rendering in this epistolary blessing.
- source_word: κυρίου
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Per doctrine defaults, κύριος is rendered 'Lord.' In this christological
    title it conveys authority and reverence without reducing the term to merely social
    mastery.
- source_word: Ἰησοῦ Χριστοῦ
  chosen: Jesus Messiah
  alternatives:
  - Jesus Christ
  lexicon: BDAG
  rationale: Following the doctrine guideline to translate titles and transliterate
    names, Ἰησοῦς is transliterated 'Jesus' and Χριστός, functioning as a title, is
    rendered 'Messiah.' Although 'Jesus Christ' is traditional and may sound name-like
    in Pauline usage, the title sense remains transparent and is preferred here.
- source_word: μετὰ πάντων ὑμῶν
  chosen: with all of you
  alternatives:
  - be with you all
  - with you all
  lexicon: BDAG
  rationale: μετά with the genitive means 'with.' πάντων ὑμῶν is naturally rendered
    'all of you,' preserving the inclusive scope of the blessing to the whole community.
    English supplies 'be' to make the benediction idiomatic.
