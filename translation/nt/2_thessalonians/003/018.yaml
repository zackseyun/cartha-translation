theological_decisions:
- issue: Rendering Χριστοῦ in the closing benediction
  chosen_reading: Messiah
  alternative_readings:
  - Christ
  rationale: DOCTRINE.md directs that Χριστός be rendered 'Messiah' where it functions
    as a title, with 'Christ' reserved where the term is more name-like. In this formulaic
    closing, either is defensible, but the title remains semantically active enough
    to favor 'Messiah.' The traditional alternative is preserved in a footnote for
