id: 2TH.3.13
reference: 2 Thessalonians 3:13
source:
  edition: SBLGNT
  text: ὑμεῖς δέ, ἀδελφοί, μὴ ⸀ἐγκακήσητε καλοποιοῦντες.
translation:
  text: But as for you, brothers, do not grow weary in doing good.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'brothers and sisters'; the Greek says 'brothers' and can address the
      whole believing community inclusively.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὑμεῖς δέ
  chosen: But as for you
  alternatives:
  - But you
  - Now you
  lexicon: BDAG
  rationale: δέ marks contrast with the preceding discussion about the idle; the fronted
    pronoun ὑμεῖς is emphatic. 'But as for you' preserves both the contrast and the
    emphasis more clearly than a bare 'But you.'
- source_word: ἀδελφοί
  chosen: brothers
  alternatives:
  - brothers and sisters
  - siblings
  lexicon: BDAG
  rationale: The vocative plural literally means 'brothers.' Per the translation philosophy,
    gender-accurate rendering is preferred over gender-neutral where the Greek uses
    a masculine representative term. Because Paul commonly addresses mixed congregations
    this way, the inclusive force is better noted in a footnote than flattened in
    the main text.
- source_word: μὴ ἐγκακήσητε
  chosen: do not grow weary
  alternatives:
  - do not lose heart
  - do not become discouraged
  - do not tire
  lexicon: BDAG
  rationale: The aorist subjunctive with μή functions as a prohibition. ἐγκακέω can
    mean to lose heart or become weary in continuing an action. In this context, where
    perseverance in beneficent action is in view, 'do not grow weary' is idiomatic
    and fits the participial qualifier that follows.
- source_word: καλοποιοῦντες
  chosen: in doing good
  alternatives:
  - while doing good
  - in well-doing
  - doing what is good
  lexicon: BDAG
  rationale: The present participle expresses the sphere or ongoing activity in which
    they must not grow weary. 'In doing good' is natural modern English and preserves
    the durative sense of continuing beneficent action.
