id: 2TH.3.10
reference: 2 Thessalonians 3:10
source:
  edition: SBLGNT
  text: καὶ γὰρ ὅτε ἦμεν πρὸς ὑμᾶς, τοῦτο παρηγγέλλομεν ὑμῖν, ὅτι εἴ τις οὐ θέλει
    ἐργάζεσθαι μηδὲ ἐσθιέτω.
translation:
  text: 'For even when we were with you, we kept commanding you this: if anyone is
    not willing to work, neither let him eat.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'let him not eat.'
    reason: lexical_alternative
  - marker: b
    text: The Greek says 'is not willing to work,' referring to unwillingness, not
      inability.
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ γὰρ
  chosen: For even
  alternatives:
  - For
  - Indeed, even
  - Because even
  lexicon: BDAG
  rationale: The combination is explanatory and emphatic, linking this verse to the
    preceding example. 'For even' preserves both the inferential force of γάρ and
    the added emphasis of καί in natural English.
- source_word: ὅτε ἦμεν πρὸς ὑμᾶς
  chosen: when we were with you
  alternatives:
  - while we were with you
  - when we were present with you
  lexicon: BDAG
  rationale: πρός with persons here idiomatically means being in someone's company/presence.
    'With you' is the most natural modern rendering.
- source_word: τοῦτο
  chosen: this
  alternatives:
  - this command
  - this principle
  lexicon: BDAG
  rationale: The demonstrative points forward to the content clause. Supplying 'command'
    in the main text would over-interpret, since the verb already carries the commanding
    sense.
- source_word: παρηγγέλλομεν
  chosen: we kept commanding
  alternatives:
  - we commanded
  - we were instructing
  - we gave this command
  lexicon: BDAG
  rationale: The imperfect indicates repeated or customary action in past time. 'Kept
    commanding' preserves that iterative force better than a simple past.
- source_word: ὅτι
  chosen: ':'
  alternatives:
  - that
  lexicon: BDAG
  rationale: Here ὅτι introduces the content of what was commanded. In English, a
    colon after 'this' communicates the content clause naturally without awkwardness.
- source_word: εἴ τις
  chosen: if anyone
  alternatives:
  - if someone
  - if any person
  lexicon: BDAG
  rationale: Indefinite conditional expression. 'Anyone' is idiomatic and preserves
    the generic scope.
- source_word: οὐ θέλει ἐργάζεσθαι
  chosen: is not willing to work
  alternatives:
  - does not want to work
  - refuses to work
  lexicon: BDAG
  rationale: θέλει denotes willingness/desire, not inability. 'Is not willing to work'
    preserves the moral distinction between unwillingness and incapacity. 'Refuses'
    is stronger than the Greek requires.
- source_word: μηδὲ ἐσθιέτω
  chosen: neither let him eat
  alternatives:
  - let him not eat
  - neither should he eat
  lexicon: BDAG
  rationale: The present imperative with μηδέ continues the conditional consequence.
    'Neither let him eat' is a close, idiomatic rendering that preserves the prohibitive/imperatival
    force.
