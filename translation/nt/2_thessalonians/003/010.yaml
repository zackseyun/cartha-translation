theological_decisions:
- issue: Whether the statement addresses inability to work or unwillingness to work
  chosen_reading: 'The verse addresses unwillingness, not inability: ''if anyone is
    not willing to work.'''
  alternative_readings:
  - if anyone cannot work
  rationale: The verb θέλει concerns volition. Rendering it as inability would import
    a harsher social principle than the Greek states and would obscure the text's
    ethical focus on idleness rather than incapacity.
  doctrine_reference: Translation philosophy §1, §3
- issue: Generic masculine in the consequence clause
  chosen_reading: 'Retain gender-accurate singular with representative force: ''let
    him eat.'''
  alternative_readings:
  - let them eat
  rationale: The Greek uses an indefinite τις followed by a third-person singular
    imperative. Per the doctrine's gender-accurate principle, the English should reflect
    the singular representative form rather than flatten it into plural.
  doctrine_reference: Translation philosophy §4
