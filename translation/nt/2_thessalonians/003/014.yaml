id: 2TH.3.14
reference: 2 Thessalonians 3:14
source:
  edition: SBLGNT
  text: Εἰ δέ τις οὐχ ὑπακούει τῷ λόγῳ ἡμῶν διὰ τῆς ἐπιστολῆς, τοῦτον σημειοῦσθε,
    ⸀μὴ ⸀συναναμίγνυσθαι αὐτῷ, ἵνα ἐντραπῇ·
translation:
  text: And if anyone does not obey our word through this letter, take note of that
    person; do not associate with him, so that he may be ashamed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'by this letter' or 'in this letter.' The Greek phrase can denote the
      means by which the instruction comes.
    reason: lexical_alternative
  - marker: b
    text: Or 'mark' or 'keep note of.'
    reason: lexical_alternative
  - marker: c
    text: Or 'do not keep company with him.'
    reason: lexical_alternative
  - marker: d
    text: 'The aim is corrective: compare v. 15, where he is still to be warned ''as
      a brother.'''
    reason: cross_reference
lexical_decisions:
- source_word: ὑπακούει
  chosen: does not obey
  alternatives:
  - does not heed
  - does not listen to
  lexicon: BDAG
  rationale: ὑπακούω commonly means to obey or heed authority/instruction. 'Obey'
    best fits the paraenetic context and the object 'our word.'
- source_word: τῷ λόγῳ ἡμῶν
  chosen: our word
  alternatives:
  - our instruction
  - what we say
  lexicon: BDAG
  rationale: λόγος here refers to the apostolic message/instruction rather than a
    single spoken utterance. 'Our word' preserves the Greek expression while remaining
    natural in English.
- source_word: διὰ τῆς ἐπιστολῆς
  chosen: through this letter
  alternatives:
  - by this letter
  - in this letter
  lexicon: BDAG
  rationale: διά with the genitive commonly expresses means or instrumentality. 'Through
    this letter' conveys that the apostolic word is being communicated by means of
    the present letter. 'This' is contextually supplied in idiomatic English because
    Paul refers to the letter at hand.
- source_word: σημειοῦσθε
  chosen: take note of
  alternatives:
  - mark
  - identify
  lexicon: BDAG
  rationale: The middle imperative calls for recognizing or marking the disobedient
    person. 'Take note of' is clear modern English and avoids overly harsh connotations
    while preserving the directive.
- source_word: τοῦτον
  chosen: that person
  alternatives:
  - him
  - this one
  lexicon: BDAG
  rationale: The demonstrative points specifically to the disobedient individual.
    'That person' makes the reference explicit and readable in English.
- source_word: μὴ συναναμίγνυσθαι αὐτῷ
  chosen: do not associate with him
  alternatives:
  - do not keep company with him
  - do not mix with him
  lexicon: BDAG
  rationale: συναναμίγνυμι means to associate or mix together with. 'Do not associate
    with him' is idiomatic modern English and matches the disciplinary sense in context.
- source_word: ἐντραπῇ
  chosen: he may be ashamed
  alternatives:
  - he may feel shame
  - he may be put to shame
  lexicon: BDAG
  rationale: ἐντρέπω in the passive/subjunctive here expresses coming to a sense of
    shame. 'He may be ashamed' preserves the purpose clause without overstating punitive
    humiliation; the aim is corrective, not merely disgrace.
- source_word: τις
  chosen: anyone
  alternatives:
  - someone
  - any person
  lexicon: BDAG
  rationale: The indefinite pronoun is generic. 'Anyone' is natural English and preserves
    the open conditional scope.
- source_word: αὐτῷ
  chosen: him
  alternatives:
  - that person
  lexicon: BDAG
  rationale: The Greek pronoun is grammatically masculine singular referring back
    to τις. Per the project's gender-accurate policy, 'him' preserves the source grammar's
    representative singular usage.
