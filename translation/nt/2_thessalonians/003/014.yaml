theological_decisions:
- issue: Nature of the disciplinary action commanded by μὴ συναναμίγνυσθαι αὐτῷ
  chosen_reading: A form of social/church disassociation intended to correct a disobedient
    believer, not a declaration of final condemnation.
  alternative_readings:
  - Full excommunication in the strongest formal sense
  - Merely casual avoidance with no ecclesial dimension
  rationale: The immediate context (especially v. 15, 'do not regard him as an enemy,
    but warn him as a brother') indicates a corrective disciplinary measure within
    the believing community. The translation 'do not associate with him' preserves
    that force without importing later technical church-legal categories.
  doctrine_reference: Preserve theological tension rather than resolve it; do not
    import doctrinal claims the text does not make.
- issue: Force of ἐντραπῇ
  chosen_reading: The intended result is restorative shame leading to repentance or
    correction.
  alternative_readings:
  - Public humiliation as an end in itself
  rationale: The purpose clause and the following verse frame the shame as remedial.
    The English wording avoids suggesting vindictive disgrace while retaining the
    text's moral seriousness.
  doctrine_reference: Do not import doctrinal claims the text does not make.
