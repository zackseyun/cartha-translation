theological_decisions:
- issue: Nature of Paul's claim in ἐξουσίαν
  chosen_reading: Paul says he and his companions possess a legitimate right to support,
    which they voluntarily did not exercise here.
  alternative_readings:
  - Paul refers more broadly to apostolic authority or power.
  rationale: The immediate context concerns working rather than burdening others,
    so the sense is a rightful claim to receive support. The translation avoids overstating
    this into a broader doctrinal claim about authority while preserving the practical
    point.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; preserve what the text says without importing broader doctrinal claims.'
