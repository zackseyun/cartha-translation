id: 2TH.3.9
reference: 2 Thessalonians 3:9
source:
  edition: SBLGNT
  text: οὐχ ὅτι οὐκ ἔχομεν ἐξουσίαν, ἀλλ’ ἵνα ἑαυτοὺς τύπον δῶμεν ὑμῖν εἰς τὸ μιμεῖσθαι
    ἡμᾶς.
translation:
  text: not because we do not have the right, but in order to give ourselves to you
    as an example for you to imitate us.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'authority' or 'power' for 'the right.' The context favors the sense
      of a legitimate claim or entitlement.
    reason: lexical_alternative
  - marker: b
    text: Or 'as a model' or 'as a pattern.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξουσίαν
  chosen: the right
  alternatives:
  - authority
  - power
  lexicon: BDAG
  rationale: In this context Paul refers to his legitimate claim or entitlement to
    material support, not raw power. 'The right' communicates lawful/appropriate entitlement
    in natural English better than 'authority' or 'power'.
- source_word: ἑαυτοὺς
  chosen: ourselves
  lexicon: BDAG
  rationale: Reflexive pronoun referring to Paul and his companions; 'ourselves' preserves
    the self-referential force.
- source_word: τύπον
  chosen: an example
  alternatives:
  - a model
  - a pattern
  lexicon: BDAG
  rationale: τύπος here denotes an exemplary pattern of conduct to be copied. 'Example'
    is the clearest modern English rendering, while still conveying exemplary force.
- source_word: δῶμεν
  chosen: give
  alternatives:
  - present
  - set forth
  lexicon: BDAG
  rationale: The idiom ἑαυτοὺς τύπον δῶμεν is literally 'give ourselves as a pattern/example.'
    Retaining 'give' preserves the Greek image without becoming unnatural in English.
- source_word: εἰς τὸ μιμεῖσθαι
  chosen: for you to imitate
  alternatives:
  - so that you might imitate
  - for the purpose of imitating
  lexicon: BDAG
  rationale: This construction expresses purpose/result. 'For you to imitate' is concise
    and natural, preserving the telic sense.
- source_word: μιμεῖσθαι ἡμᾶς
  chosen: imitate us
  alternatives:
  - follow our example
  lexicon: BDAG
  rationale: The infinitive with object is straightforwardly 'imitate us.' This is
    more direct and closer to the Greek than the expanded idiom 'follow our example'.
- source_word: οὐχ ὅτι οὐκ
  chosen: not because we do not
  alternatives:
  - not that we do not
  - not because we lack
  lexicon: BDAG
  rationale: This paired negation introduces a clarification of motive. 'Not because
    we do not' preserves the syntax and rhetorical contrast with ἀλλ᾽ ἵνα.
- source_word: ἀλλ’ ἵνα
  chosen: but in order to
  alternatives:
  - but so that
  - but rather to
  lexicon: BDAG
  rationale: This marks the positive purpose in contrast to the preceding denial.
    'But in order to' clearly expresses purpose in contemporary English.
