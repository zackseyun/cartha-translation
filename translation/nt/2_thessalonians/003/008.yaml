id: 2TH.3.8
reference: 2 Thessalonians 3:8
source:
  edition: SBLGNT
  text: οὐδὲ δωρεὰν ἄρτον ἐφάγομεν παρά τινος, ἀλλ’ ἐν κόπῳ καὶ μόχθῳ ⸂νυκτὸς καὶ
    ἡμέρας⸃ ἐργαζόμενοι πρὸς τὸ μὴ ἐπιβαρῆσαί τινα ὑμῶν·
translation:
  text: nor did we eat bread from anyone free of charge, but with labor and hardship,
    working night and day so as not to burden any of you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'nor did we eat anyone's bread for nothing.' The Greek keeps 'bread'
      literally, though it can refer more broadly to food or material support.
    reason: lexical_alternative
lexical_decisions:
- source_word: δωρεὰν
  chosen: free of charge
  alternatives:
  - for nothing
  - without paying
  lexicon: BDAG
  rationale: The adverb denotes receiving something as a gift or without cost. 'Free
    of charge' is idiomatic modern English and preserves the economic nuance in context.
- source_word: ἄρτον
  chosen: bread
  alternatives:
  - food
  lexicon: BDAG
  rationale: Literally 'bread.' While it can stand metonymically for food, retaining
    'bread' preserves the concrete expression and echoes common biblical idiom without
    obscuring the sense.
- source_word: παρά τινος
  chosen: from anyone
  alternatives:
  - from anyone's hand
  - from anyone at all
  lexicon: BDAG
  rationale: παρά with the genitive indicates source, and τις is indefinite. 'From
    anyone' is natural English and captures the broad denial of receiving support.
- source_word: ἐν κόπῳ καὶ μόχθῳ
  chosen: with labor and hardship
  alternatives:
  - in toil and hardship
  - with toil and trouble
  lexicon: BDAG
  rationale: κόπος and μόχθος are near-synonyms emphasizing strenuous effort and difficulty.
    'Labor and hardship' is readable modern English that preserves the cumulative
    force without sounding archaic.
- source_word: νυκτὸς καὶ ἡμέρας
  chosen: night and day
  alternatives:
  - by night and by day
  lexicon: BDAG
  rationale: A genitive of time idiom meaning continual effort across the whole cycle.
    'Night and day' is the standard natural rendering.
- source_word: ἐργαζόμενοι
  chosen: working
  alternatives:
  - laboring
  lexicon: BDAG
  rationale: The participle explains how Paul and his companions conducted themselves.
    'Working' is straightforward and fits the vocational context of self-support.
- source_word: πρὸς τὸ μὴ ἐπιβαρῆσαί
  chosen: so as not to burden
  alternatives:
  - in order not to be a burden to
  - so that we might not weigh down
  lexicon: BDAG
  rationale: The construction expresses purpose. ἐπιβαρέω here refers to imposing
    a financial or material burden. 'So as not to burden' is concise and accurate.
- source_word: τινα ὑμῶν
  chosen: any of you
  alternatives:
  - any one of you
  lexicon: BDAG
  rationale: The singular indefinite with the genitive pronoun yields a distributive
    sense. 'Any of you' is idiomatic English and preserves the meaning.
- source_word: οὐδὲ ... ἀλλ’
  chosen: nor ... but
  alternatives:
  - and not ... but rather
  lexicon: BDAG
  rationale: This pair marks a strong contrast between not receiving free support
    and instead working strenuously. 'Nor ... but' preserves the rhetorical structure.
