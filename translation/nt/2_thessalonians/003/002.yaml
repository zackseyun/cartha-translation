theological_decisions:
- issue: Rendering of πίστις in a potentially ambiguous clause
  chosen_reading: faith
  alternative_readings:
  - faithfulness
  - trust
  rationale: The project default for πίστις is 'faith.' In this verse the immediate
    context concerns opposition from hostile persons, so 'not all have faith' most
    plausibly refers to lack of belief rather than lack of reliability. The alternative
    is preserved in a footnote because πίστις can bear that semantic range and the
    doctrine statement requires preserving tension where ambiguity is genuine.
  doctrine_reference: 'DOCTRINE.md: Contested terms table (πίστις → faith; alternatives
    footnoted where contested)'
