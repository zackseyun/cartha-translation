id: 2TH.3.2
reference: 2 Thessalonians 3:2
source:
  edition: SBLGNT
  text: καὶ ἵνα ῥυσθῶμεν ἀπὸ τῶν ἀτόπων καὶ πονηρῶν ἀνθρώπων, οὐ γὰρ πάντων ἡ πίστις.
translation:
  text: and that we may be delivered from perverse and evil men, for not all have
    faith.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'unreasonable and evil men.' The Greek adjective can mean 'improper,'
      'absurd,' or 'unreasonable,' and in context refers to morally wayward opponents.
    reason: lexical_alternative
  - marker: b
    text: Or 'for not everyone is faithful.' The Greek says literally, 'for not of
      all is the faith.'
    reason: alternative_reading
lexical_decisions:
- source_word: ῥυσθῶμεν
  chosen: we may be delivered
  alternatives:
  - we may be rescued
  lexicon: BDAG
  rationale: 'Aorist passive subjunctive after ἵνα expresses purpose: ''that we may
    be delivered/rescued.'' ''Delivered'' is natural English and preserves the sense
    of being freed from hostile people without over-specifying the means.'
- source_word: ἀτόπων
  chosen: perverse
  alternatives:
  - unreasonable
  - wicked
  - out of place
  lexicon: BDAG
  rationale: ἄτοπος can mean improper, absurd, or unreasonable; in this context of
    hostile opponents paired with πονηρῶν, 'perverse' best conveys morally distorted
    and socially improper behavior without collapsing it into the same sense as 'evil.'
    An alternative is worth preserving because many English versions use 'unreasonable'.
- source_word: πονηρῶν
  chosen: evil
  alternatives:
  - wicked
  lexicon: BDAG
  rationale: A common moral term meaning evil or wicked. 'Evil' is the clearest modern
    rendering and pairs well with 'perverse'.
- source_word: ἀνθρώπων
  chosen: men
  alternatives:
  - people
  lexicon: BDAG
  rationale: The Greek is grammatically masculine plural and here refers to specific
    male opponents in context rather than humanity in general. Following the gender-accurate
    principle, 'men' is retained rather than neutralizing to 'people'.
- source_word: πίστις
  chosen: faith
  alternatives:
  - faithfulness
  - trust
  lexicon: BDAG
  rationale: Per DOCTRINE.md, πίστις defaults to 'faith,' with alternatives preserved
    where contested. Here the phrase most naturally means that not all people possess
    faith/belief. 'Faithfulness' is possible in isolation but less likely in this
    context about hostile opposition to the apostolic mission.
- source_word: οὐ γὰρ πάντων ἡ πίστις
  chosen: for not all have faith
  alternatives:
  - for faith is not for everyone
  - for not everyone is faithful
  lexicon: BDAG
  rationale: This clause is elliptical in Greek ('for not of all is the faith'). The
    English supplies 'have' to express the idiom naturally. 'Not all have faith' best
    captures the sense without making a stronger theological claim than the text states.
