id: 2TH.3.7
reference: 2 Thessalonians 3:7
source:
  edition: SBLGNT
  text: αὐτοὶ γὰρ οἴδατε πῶς δεῖ μιμεῖσθαι ἡμᾶς, ὅτι οὐκ ἠτακτήσαμεν ἐν ὑμῖν
translation:
  text: For you yourselves know how it is necessary to imitate us, because we did
    not behave disorderly among you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more specifically in this context, "we were not idle among you."
    reason: lexical_alternative
lexical_decisions:
- source_word: αὐτοὶ
  chosen: yourselves
  alternatives:
  - you yourselves
  - you
  lexicon: BDAG
  rationale: 'The intensive pronoun adds emphasis to ὑμεῖς implied in οἴδατε. Rendering
    it as "yourselves" preserves the emphatic force: the Thessalonians themselves
    already know this.'
- source_word: γὰρ
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: BDAG
  rationale: γάρ introduces the reason or explanation for the preceding exhortation.
    "For" is a natural and sufficiently formal connective here.
- source_word: οἴδατε
  chosen: you know
  alternatives:
  - you are aware
  - you have known
  lexicon: BDAG
  rationale: Although οἶδα is formally perfect in form, it commonly carries present
    meaning. "You know" is the standard idiomatic rendering.
- source_word: πῶς
  chosen: how
  alternatives:
  - in what way
  lexicon: BDAG
  rationale: πῶς introduces the manner of imitation. "How" is concise and natural
    English.
- source_word: δεῖ
  chosen: it is necessary
  alternatives:
  - one must
  - it ought
  lexicon: BDAG
  rationale: δεῖ expresses necessity or obligation. "It is necessary" preserves the
    force without over-paraphrasing; it also matches the infinitive construction that
    follows.
- source_word: μιμεῖσθαι
  chosen: to imitate
  alternatives:
  - to follow the example of
  - to copy
  lexicon: BDAG
  rationale: The verb means to imitate or emulate. "To imitate" is the most direct
    lexical equivalent and fits Paul's paraenetic use.
- source_word: ἡμᾶς
  chosen: us
  alternatives:
  - our example
  lexicon: BDAG
  rationale: The direct object is personal, not abstract. "Us" preserves the wording;
    "our example" would be interpretive expansion.
- source_word: ὅτι
  chosen: because
  alternatives:
  - that
  lexicon: BDAG
  rationale: 'Here ὅτι gives the content-ground for why they know how to imitate Paul
    and his companions: their conduct among them. "Because" makes the causal relation
    explicit in natural English.'
- source_word: οὐκ ἠτακτήσαμεν
  chosen: we did not behave disorderly
  alternatives:
  - we were not idle
  - we did not act irresponsibly
  - we did not live undisciplined lives
  lexicon: BDAG
  rationale: ἀτακτέω denotes behaving in a disorderly, undisciplined, or out-of-line
    manner. In this chapter the term is connected with idleness, but the lexical sense
    is broader than mere laziness. "Behave disorderly" preserves the semantic range
    while remaining readable.
- source_word: ἐν ὑμῖν
  chosen: among you
  alternatives:
  - with you
  - in your midst
  lexicon: BDAG
  rationale: The phrase refers to conduct in the Thessalonians' midst. "Among you"
    is idiomatic and contextually precise.
