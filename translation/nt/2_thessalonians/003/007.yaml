theological_decisions:
- issue: Meaning of ἀτακτέω in the immediate context
  chosen_reading: A broader description of disorderly or undisciplined conduct, not
    restricted in the main text to idleness alone.
  alternative_readings:
  - specifically 'we were not idle among you'
  rationale: In 2 Thessalonians 3 the broader theme includes refusal to work, so "idle"
    is contextually attractive. However, the lexical value of ἀτακτέω is wider, referring
    to disorderly conduct more generally. To avoid narrowing Paul's statement beyond
    the Greek, the main text keeps the broader sense while preserving the contextual
    alternative in a footnote.
  doctrine_reference: Translation philosophy §1, §3, §5
