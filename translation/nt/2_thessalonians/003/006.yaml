theological_decisions:
- issue: Rendering Χριστοῦ in the christological title
  chosen_reading: Messiah
  alternative_readings:
  - Christ
  rationale: Per doctrine guidance, Χριστός is rendered 'Messiah' where it functions
    as a title rather than a name-like fixed form. In 'our Lord Jesus Messiah,' the
    titular sense remains clear.
  doctrine_reference: 'DOCTRINE.md Contested terms: Χριστός → Messiah (where title;
    Christ where name-like)'
- issue: Scope of separation commanded by στέλλεσθαι ὑμᾶς ἀπὸ
  chosen_reading: to keep away from
  alternative_readings:
  - to withdraw from
  - to avoid
  rationale: The verse commands social distancing from disorderly believers, but the
    wording should not be sharpened into formal expulsion unless the text states that
    more explicitly. 'Keep away from' preserves the disciplinary force without importing
    a later technical church-judicial category.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: preserve theological tension
    rather than resolve it'
