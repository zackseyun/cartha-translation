id: 2TH.3.6
reference: 2 Thessalonians 3:6
source:
  edition: SBLGNT
  text: Παραγγέλλομεν δὲ ὑμῖν, ἀδελφοί, ἐν ὀνόματι τοῦ κυρίου ⸀ἡμῶν Ἰησοῦ Χριστοῦ
    στέλλεσθαι ὑμᾶς ἀπὸ παντὸς ἀδελφοῦ ἀτάκτως περιπατοῦντος καὶ μὴ κατὰ τὴν παράδοσιν
    ἣν ⸀παρελάβοσαν παρ’ ἡμῶν.
translation:
  text: Now we command you, brothers, in the name of our Lord Jesus the Messiah, to
    keep away from every brother who walks disorderly and not according to the tradition
    that they received from us.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '"Brothers" translates the masculine plural ἀδελφοί; Paul is addressing
      the church as a whole.'
    reason: lexical_alternative
  - marker: b
    text: Or "to withdraw from"; the Greek means to keep oneself away from close association.
    reason: lexical_alternative
  - marker: c
    text: '"Messiah" could also be rendered "Christ."'
    reason: alternative_reading
  - marker: d
    text: Some manuscripts read "which you received from us" or "which he received
      from us," smoothing the syntax after "every brother." The printed text reads
      "they received from us."
    reason: textual_variant
lexical_decisions:
- source_word: Παραγγέλλομεν
  chosen: we command
  alternatives:
  - we instruct
  - we order
  lexicon: BDAG
  rationale: παραγγέλλω carries the sense of giving an authoritative directive, stronger
    than mere exhortation. 'Command' best reflects the apostolic authority in context.
- source_word: ἀδελφοί
  chosen: brothers
  alternatives:
  - brothers and sisters
  - siblings
  lexicon: BDAG
  rationale: The vocative masculine plural is retained as 'brothers' per the gender-accurate
    philosophy. Since the address is to the whole church, inclusivity can be noted
    in a footnote rather than flattening the source form in the main text.
- source_word: ἐν ὀνόματι τοῦ κυρίου ἡμῶν Ἰησοῦ Χριστοῦ
  chosen: in the name of our Lord Jesus Messiah
  alternatives:
  - by the authority of our Lord Jesus Messiah
  - in the name of our Lord Jesus Christ
  lexicon: BDAG
  rationale: '''In the name of'' is the natural rendering of ἐν ὀνόματι and preserves
    both idiom and solemnity. κύριος is rendered ''Lord'' per default. Χριστοῦ is
    a title here and so rendered ''Messiah'' per doctrine guidance.'
- source_word: στέλλεσθαι ὑμᾶς ἀπὸ
  chosen: to keep away from
  alternatives:
  - to withdraw from
  - to avoid
  lexicon: BDAG
  rationale: The middle infinitive στέλλεσθαι with ἀπό conveys drawing oneself back
    from association. 'Keep away from' is clear modern English and preserves the practical
    force without overreading formal excommunication.
- source_word: παντὸς ἀδελφοῦ
  chosen: every brother
  alternatives:
  - every believer
  - every brother or sister
  lexicon: BDAG
  rationale: The phrase is singular and masculine. 'Every brother' preserves the grammar
    and the familial church language. The referent is a fellow member of the Christian
    community.
- source_word: ἀτάκτως
  chosen: disorderly
  alternatives:
  - idly
  - undisciplinedly
  - in an unruly way
  lexicon: BDAG
  rationale: ἀτάκτως can denote behavior out of proper order or discipline. In this
    immediate context of idleness later in the passage, 'idly' is possible, but here
    'disorderly' better preserves the broader semantic range and prepares for the
    fuller description that follows.
- source_word: περιπατοῦντος
  chosen: who walks
  alternatives:
  - who lives
  - who conducts himself
  lexicon: BDAG
  rationale: Paul's metaphor of 'walking' is common and worth preserving where natural
    in English. It denotes manner of life.
- source_word: μὴ κατὰ τὴν παράδοσιν
  chosen: and not according to the tradition
  alternatives:
  - and not according to the teaching
  - and not according to the instruction
  lexicon: BDAG
  rationale: παράδοσις means what is handed down. 'Tradition' is the most direct rendering
    and does not necessarily imply later ecclesiastical tradition; the content is
    specified as apostolic transmission.
- source_word: ἣν παρελάβοσαν παρ’ ἡμῶν
  chosen: that they received from us
  alternatives:
  - which he received from us
  - that you received from us
  lexicon: BDAG
  rationale: The SBLGNT reading παρελάβοσαν is third person plural, so 'they received'
    matches the printed text. This yields a slightly less expected construction after
    the singular 'every brother,' but it is a defensible rendering of the attested
    form and should be documented with alternatives in a footnote because other textual
    forms smooth the syntax.
