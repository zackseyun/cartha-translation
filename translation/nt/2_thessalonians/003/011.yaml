id: 2TH.3.11
reference: 2 Thessalonians 3:11
source:
  edition: SBLGNT
  text: ἀκούομεν γάρ τινας περιπατοῦντας ἐν ὑμῖν ἀτάκτως, μηδὲν ἐργαζομένους ἀλλὰ
    περιεργαζομένους·
translation:
  text: For we hear that some among you are walking disorderly, doing no work at all,
    but meddling in what is not theirs to do.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'walking idly' or 'living undisciplined lives.' The Greek adverb can
      describe behavior that is out of order or idle in relation to the community's
      expectations.
    reason: lexical_alternative
  - marker: b
    text: 'Traditionally ''being busybodies.'' The Greek makes a wordplay: they are
      ''doing no work'' yet are ''working around'' in matters that do not belong to
      them.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀκούομεν
  chosen: we hear
  alternatives:
  - we are hearing
  - we have heard
  lexicon: BDAG
  rationale: Present indicative naturally conveys a current report or ongoing awareness.
    'We hear' is idiomatic English and preserves the present sense without overtranslating
    aspect.
- source_word: γάρ
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: BDAG
  rationale: γάρ gives the reason or explanation for the preceding exhortation. 'For'
    preserves the connective force in a concise, natural way.
- source_word: τινας
  chosen: some
  alternatives:
  - certain people
  - some people
  lexicon: BDAG
  rationale: Indefinite accusative plural referring to an unspecified subset within
    the community. 'Some' is the most natural and sufficiently precise rendering.
- source_word: περιπατοῦντας
  chosen: are walking
  alternatives:
  - are living
  - are conducting themselves
  lexicon: BDAG
  rationale: περιπατέω is a common idiom for manner of life or conduct. Rendering
    it as 'are walking' preserves the metaphor present in Paul while remaining understandable
    in English.
- source_word: ἐν ὑμῖν
  chosen: among you
  alternatives:
  - in your midst
  - among your number
  lexicon: BDAG
  rationale: The phrase indicates location within the Thessalonian community. 'Among
    you' is natural English and clearly communal in force.
- source_word: ἀτάκτως
  chosen: disorderly
  alternatives:
  - idly
  - out of order
  - undisciplined
  lexicon: BDAG
  rationale: The adverb can denote behavior that is out of line, undisciplined, or
    disorderly. In this context of refusing ordinary work, 'disorderly' best preserves
    the broader sense without reducing it merely to laziness. The narrower implication
    of idleness is then clarified by the following participles.
- source_word: μηδὲν ἐργαζομένους
  chosen: doing no work at all
  alternatives:
  - working at nothing
  - not working at all
  lexicon: BDAG
  rationale: The phrase emphasizes complete refusal of productive labor. 'Doing no
    work at all' captures the emphatic μηδέν in idiomatic English.
- source_word: ἀλλὰ
  chosen: but
  alternatives:
  - rather
  - instead
  lexicon: BDAG
  rationale: Strong adversative contrast between proper labor and improper activity.
    'But' is sufficient and natural.
- source_word: περιεργαζομένους
  chosen: meddling in what is not theirs to do
  alternatives:
  - being busybodies
  - meddling
  - busying themselves with trifles
  lexicon: BDAG
  rationale: 'The verb is a wordplay with ἐργάζομαι: not working, but ''working around''
    inappropriately. Traditional ''busybodies'' captures part of the sense but sounds
    dated and nominal rather than verbal. ''Meddling in what is not theirs to do''
    makes the meaning clear in modern English while preserving the contrast with proper
    work.'
