theological_decisions:
- issue: Agreement of the singular participles ('who loved... and gave...') with the
    coordinated subjects 'our Lord Jesus Messiah' and 'God our Father'
  chosen_reading: Retain the Greek's singular relative-participial construction without
    forcing an explanatory expansion, allowing the coordinated blessing to stand while
    the descriptive clause is rendered once.
  alternative_readings:
  - Treat the singular participles as referring primarily to 'God our Father' alone
  - Expand the English to make both persons explicitly the antecedent of the participles
  rationale: The Greek presents a coordinated subject followed by singular modifiers,
    a construction often noted in discussions of Paul's high christology. The translation
    should not flatten this feature by paraphrase, nor should it overstate a doctrinal
    inference beyond the syntax. Rendering the clause straightforwardly preserves
    the textual phenomenon and the theological weight without interpretive overreach.
  doctrine_reference: 'Affirmations; Translation philosophy #3'
