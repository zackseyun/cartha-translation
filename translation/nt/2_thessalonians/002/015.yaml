theological_decisions:
- issue: Rendering παράδοσις in a context often cited in debates over apostolic tradition
  chosen_reading: traditions
  alternative_readings:
  - teachings
  - instructions
  rationale: The Greek explicitly refers to things handed down and includes both oral
    and written apostolic transmission. Rendering it 'traditions' best reflects the
    lexical sense without importing later denominational claims about the scope or
    authority of tradition beyond what the verse itself states. The translation preserves
    the text's affirmation of apostolic tradition while not resolving later theological
    disputes not explicit in the verse.
  doctrine_reference: Affirmations; Translation philosophy §§1, 3, 5
- issue: Addressing ἀδελφοί in a likely mixed congregation
  chosen_reading: brothers
  alternative_readings:
  - brothers and sisters
  rationale: The masculine vocative plural is retained in the main text in keeping
    with the project's gender-accurate policy. Because the referent is likely the
    whole church, an explanatory footnote preserves the inclusive sense without replacing
    the source-form in the translation.
  doctrine_reference: Translation philosophy §4
