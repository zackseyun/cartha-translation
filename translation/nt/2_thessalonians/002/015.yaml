id: 2TH.2.15
reference: 2 Thessalonians 2:15
source:
  edition: SBLGNT
  text: ἄρα οὖν, ἀδελφοί, στήκετε, καὶ κρατεῖτε τὰς παραδόσεις ἃς ἐδιδάχθητε εἴτε
    διὰ λόγου εἴτε δι’ ἐπιστολῆς ἡμῶν.
translation:
  text: So then, brothers, stand firm and hold fast to the traditions that you were
    taught, whether by word or by our letter.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'brothers and sisters'; the Greek says 'brothers' but likely addresses
      the whole congregation.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄρα οὖν
  chosen: So then
  alternatives:
  - Therefore
  - Accordingly then
  lexicon: BDAG
  rationale: The paired inferential particles intensify the conclusion drawn from
    the preceding argument. 'So then' is natural modern English and preserves the
    transitional force without sounding wooden.
- source_word: ἀδελφοί
  chosen: brothers
  alternatives:
  - brothers and sisters
  - siblings
  lexicon: BDAG
  rationale: The vocative plural literally means 'brothers.' Per the translation philosophy,
    gender-accurate rendering is preferred over gender-neutral. In Pauline usage this
    often addresses the whole believing community, but the masculine form is retained
    in the main text.
- source_word: στήκετε
  chosen: stand firm
  alternatives:
  - stand fast
  - stand
  lexicon: BDAG
  rationale: The present imperative calls for continued steadfastness. 'Stand firm'
    communicates perseverance and stability idiomatically in contemporary English
    better than the more archaic 'stand fast.'
- source_word: κρατεῖτε
  chosen: hold fast
  alternatives:
  - hold to
  - keep hold of
  lexicon: BDAG
  rationale: The verb conveys firmly retaining or maintaining adherence. 'Hold fast'
    preserves the strength of the imperative and pairs well with 'stand firm' in English.
- source_word: παραδόσεις
  chosen: traditions
  alternatives:
  - teachings
  - instructions
  lexicon: BDAG
  rationale: The noun παράδοσις denotes what is handed down. 'Traditions' is the most
    direct rendering and fits the immediate contrast between oral and written apostolic
    transmission. Although 'teachings' is possible, it weakens the handed-down sense
    present in the Greek.
- source_word: ἐδιδάχθητε
  chosen: you were taught
  alternatives:
  - you received instruction in
  - you learned
  lexicon: BDAG
  rationale: The passive imperfective form is naturally rendered 'you were taught,'
    emphasizing the Thessalonians as recipients of apostolic instruction. This is
    clearer and more direct than a looser rendering like 'you learned.'
- source_word: διὰ λόγου
  chosen: by word
  alternatives:
  - by spoken word
  - orally
  lexicon: BDAG
  rationale: λόγος here refers to spoken communication in contrast with written communication.
    'By word' is concise and sufficiently clear in the paired structure; the oral
    sense is reinforced by the contrast with 'by our letter.'
- source_word: δι’ ἐπιστολῆς ἡμῶν
  chosen: by our letter
  alternatives:
  - by letter from us
  - through our letter
  lexicon: BDAG
  rationale: The phrase contrasts written apostolic instruction with oral instruction.
    'By our letter' is smooth English and preserves the possessive force of ἡμῶν without
    overcomplicating the clause.
