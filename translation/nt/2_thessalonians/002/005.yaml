id: 2TH.2.5
reference: 2 Thessalonians 2:5
source:
  edition: SBLGNT
  text: οὐ μνημονεύετε ὅτι ἔτι ὢν πρὸς ὑμᾶς ταῦτα ἔλεγον ὑμῖν;
translation:
  text: Do you not remember that while I was still with you, I was telling you these
    things?
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: μνημονεύετε
  chosen: remember
  alternatives:
  - recall
  - keep in mind
  lexicon: BDAG
  rationale: The verb asks whether the readers retain prior instruction in memory.
    'Remember' is the most natural modern English equivalent and fits the present
    indicative in a rhetorical question.
- source_word: ἔτι
  chosen: still
  alternatives:
  - yet
  lexicon: BDAG
  rationale: 'In this temporal construction with ὢν, ἔτι indicates continued prior
    circumstance: Paul was ''still'' with them at that time.'
- source_word: ὢν πρὸς ὑμᾶς
  chosen: while I was still with you
  alternatives:
  - being with you
  - while I was with you
  lexicon: BDAG
  rationale: The participle ὢν with πρὸς ὑμᾶς is idiomatic for personal presence among
    them. 'While I was still with you' renders the participial temporal sense in clear
    English.
- source_word: ταῦτα
  chosen: these things
  alternatives:
  - this
  - these matters
  lexicon: BDAG
  rationale: The plural demonstrative points back to the matters Paul had been teaching
    in this context. 'These things' preserves the plural and remains idiomatic.
- source_word: ἔλεγον
  chosen: I was telling
  alternatives:
  - I told
  - I kept telling
  lexicon: BDAG
  rationale: The imperfect indicates repeated or ongoing past action. 'I was telling'
    preserves that imperfective sense better than the simple past 'I told,' while
    remaining natural English.
- source_word: οὐ ... ὅτι
  chosen: Do you not remember that ... ?
  alternatives:
  - Do you not remember how ... ?
  lexicon: BDAG
  rationale: The construction introduces the content remembered. 'That' is the straightforward
    content marker in English and best matches the Greek syntax.
