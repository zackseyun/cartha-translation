id: 2TH.2.7
reference: 2 Thessalonians 2:7
source:
  edition: SBLGNT
  text: τὸ γὰρ μυστήριον ἤδη ἐνεργεῖται τῆς ἀνομίας· μόνον ὁ κατέχων ἄρτι ἕως ἐκ μέσου
    γένηται.
translation:
  text: For the mystery of lawlessness is already at work; only the one who now restrains
    will do so until he is out of the way.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the one now holding back'; the Greek does not identify who this restrainer
      is.
    reason: alternative_reading
  - marker: b
    text: Or 'until he is removed' or 'until he is taken out of the way.' The Greek
      is less explicit about how this occurs.
    reason: lexical_alternative
lexical_decisions:
- source_word: μυστήριον
  chosen: mystery
  alternatives:
  - secret
  lexicon: BDAG
  rationale: Retains the Pauline sense of a hidden reality now being disclosed or
    operative, without reducing it to a mere puzzle. 'Mystery' is established and
    accurate in this context.
- source_word: ἐνεργεῖται
  chosen: is already at work
  alternatives:
  - is already working
  - is already operative
  lexicon: BDAG
  rationale: The middle/passive form here conveys active operation already underway.
    'Is already at work' is idiomatic modern English and preserves the sense of present
    ongoing activity.
- source_word: ἀνομίας
  chosen: lawlessness
  alternatives:
  - wickedness
  - rebellion against law
  lexicon: BDAG
  rationale: '''Lawlessness'' is the most direct rendering of ἀνομία and preserves
    the thematic link with the surrounding passage about rebellion against God''s
    order.'
- source_word: μόνον
  chosen: only
  alternatives:
  - except that
  - but only
  lexicon: BDAG
  rationale: Here μόνον introduces a limiting qualification to the preceding statement.
    'Only' is concise and natural in English.
- source_word: ὁ κατέχων
  chosen: the one who now restrains
  alternatives:
  - the one now holding back
  - the restrainer
  lexicon: BDAG
  rationale: κατέχω in this context means to restrain or hold back. 'The one who now
    restrains' preserves the participial construction and avoids over-interpreting
    the identity of the figure.
- source_word: ἄρτι
  chosen: now
  alternatives:
  - at present
  - for the present
  lexicon: BDAG
  rationale: Marks the present time of the restraining activity. 'Now' is the clearest
    idiomatic equivalent.
- source_word: ἕως ἐκ μέσου γένηται
  chosen: until he is out of the way
  alternatives:
  - until he comes out of the midst
  - until he is removed
  - until he is taken out of the way
  lexicon: BDAG
  rationale: The phrase is idiomatic and elliptical. 'Is out of the way' preserves
    the result state without specifying an agent of removal, which the Greek does
    not explicitly state. 'Is removed' or 'is taken out of the way' are possible but
    more interpretive regarding agency.
