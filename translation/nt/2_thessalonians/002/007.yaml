theological_decisions:
- issue: Identity of ὁ κατέχων ('the one who restrains')
  chosen_reading: Render generically as 'the one who now restrains' without identifying
    the restrainer.
  alternative_readings:
  - the Roman state
  - human government
  - the Holy Spirit
  - an angelic being
  - Paul himself or apostolic preaching
  rationale: The Greek text names a restraining figure but does not identify him in
    this verse. The translation should preserve the ambiguity rather than resolve
    a debated eschatological interpretation.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Agency in ἕως ἐκ μέσου γένηται
  chosen_reading: Use 'until he is out of the way' rather than an explicitly agentive
    passive such as 'until he is taken out of the way.'
  alternative_readings:
  - until he is removed
  - until he is taken out of the way
  rationale: γένηται with ἐκ μέσου can denote coming to be out of the midst/out of
    the way. The wording should not force a specific implied agent where the Greek
    remains less explicit.
  doctrine_reference: Original-language primacy over translation tradition; preserve
    theological tension rather than resolve it.
