id: 2TH.2.2
reference: 2 Thessalonians 2:2
source:
  edition: SBLGNT
  text: εἰς τὸ μὴ ταχέως σαλευθῆναι ὑμᾶς ἀπὸ τοῦ νοὸς ⸀μηδὲ θροεῖσθαι μήτε διὰ πνεύματος
    μήτε διὰ λόγου μήτε δι’ ἐπιστολῆς ὡς δι’ ἡμῶν, ὡς ὅτι ἐνέστηκεν ἡ ἡμέρα τοῦ ⸀κυρίου.
translation:
  text: that you not be quickly shaken from your mind or alarmed, either by a spirit
    or by a message or by a letter as if from us, as though the day of the Lord has
    come.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a spiritual utterance' or 'a prophetic revelation.'
    reason: lexical_alternative
  - marker: b
    text: Or 'is present.' The Greek perfect can express that the day of the Lord
      is claimed to be already here.
    reason: alternative_reading
lexical_decisions:
- source_word: ταχέως
  chosen: quickly
  alternatives:
  - soon
  - readily
  lexicon: BDAG
  rationale: Adverb modifying the infinitives; 'quickly' fits the warning against
    being rapidly unsettled better than the more temporal 'soon.'
- source_word: σαλευθῆναι
  chosen: be shaken
  alternatives:
  - be unsettled
  - be moved
  lexicon: BDAG
  rationale: The passive infinitive literally conveys being shaken or disturbed. 'Be
    shaken' preserves the metaphor and remains natural English.
- source_word: ἀπὸ τοῦ νοὸς
  chosen: from your mind
  alternatives:
  - from your understanding
  - from your composure
  lexicon: BDAG
  rationale: The phrase is somewhat idiomatic, likely meaning from a settled frame
    of mind or understanding. 'From your mind' stays close to the Greek while remaining
    intelligible; the broader sense is reflected by the paired verb 'alarmed.'
- source_word: θροεῖσθαι
  chosen: alarmed
  alternatives:
  - troubled
  - frightened
  lexicon: BDAG
  rationale: The verb denotes being disturbed or thrown into alarm. 'Alarmed' captures
    the emotional force without overstating it.
- source_word: πνεύματος
  chosen: a spirit
  alternatives:
  - a spiritual utterance
  - the Spirit
  lexicon: BDAG
  rationale: In this context, alongside 'message' and 'letter,' it likely refers to
    a claimed prophetic/spiritual revelation. 'A spirit' is the most literal rendering;
    the more interpretive sense is preserved in a footnote.
- source_word: λόγου
  chosen: a message
  alternatives:
  - a word
  - a spoken message
  lexicon: BDAG
  rationale: Here λόγος contrasts with letter and likely refers to an oral report
    or teaching. 'Message' communicates that sense more clearly than the bare 'word.'
- source_word: ἐπιστολῆς
  chosen: a letter
  alternatives:
  - an epistle
  lexicon: BDAG
  rationale: Standard and natural rendering for written correspondence; 'epistle'
    is unnecessarily traditional in modern English.
- source_word: ὡς δι’ ἡμῶν
  chosen: as if from us
  alternatives:
  - as through us
  - as though by us
  lexicon: BDAG
  rationale: The phrase indicates false attribution to Paul and his companions. 'As
    if from us' makes the implied claim explicit in idiomatic English.
- source_word: ἐνέστηκεν
  chosen: has come
  alternatives:
  - is present
  - has arrived
  lexicon: BDAG
  rationale: Perfect tense of ἐνίστημι here indicates that the day is claimed to have
    already arrived/presently set in. 'Has come' is clear modern English; the more
    literal 'is present' is preserved in a footnote because it can affect eschatological
    nuance.
- source_word: ἡμέρα τοῦ κυρίου
  chosen: the day of the Lord
  alternatives:
  - the Lord's day
  lexicon: BDAG
  rationale: This is the established eschatological expression, not a reference to
    a weekly day of worship. The contested term κύριος is rendered by the doctrinal
    default 'Lord.'
