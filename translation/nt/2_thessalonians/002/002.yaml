theological_decisions:
- issue: Meaning of ἐνέστηκεν in the eschatological claim
  chosen_reading: has come
  alternative_readings:
  - is present
  - has already arrived
  rationale: The perfect verb indicates present reality resulting from arrival. 'Has
    come' communicates that the false claim is that the day of the Lord is already
    here. Because 'is present' is a viable more literal alternative with possible
    interpretive significance, it is preserved in a footnote rather than silently
    excluded.
  doctrine_reference: 'Translation philosophy #3; Contested terms: κύριος → Lord'
- issue: Sense of πνεύματος in the triad of alleged sources
  chosen_reading: a spirit
  alternative_readings:
  - a spiritual utterance
  - the Spirit
  rationale: The anarthrous noun in context most naturally refers to a purported prophetic
    revelation or spiritual message, not necessarily the Holy Spirit himself. The
    main text keeps the literal wording while a footnote preserves the interpretive
    alternative.
  doctrine_reference: 'Translation philosophy #3'
