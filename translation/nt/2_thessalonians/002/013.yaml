theological_decisions:
- issue: Meaning of πνεύματος in ἐν ἁγιασμῷ πνεύματος
  chosen_reading: the Holy Spirit
  alternative_readings:
  - the human spirit
  rationale: In this Pauline soteriological context, sanctification is most naturally
    attributed to the Holy Spirit. Capitalization in English signals this interpretive
    judgment without adding words not present in Greek.
  doctrine_reference: Preserve theological tension rather than resolve it; here context
    sufficiently favors the Holy Spirit.
- issue: Implication of εἵλατο ὑμᾶς ὁ θεὸς
  chosen_reading: God chose you
  alternative_readings:
  - God appointed you
  - God took you for himself
  rationale: The translation preserves the lexical sense of divine choosing without
    importing a specific denominational doctrine of election beyond what the text
    states.
  doctrine_reference: The translation does not advocate for a particular denominational
    distinctive unless the Greek unambiguously supports one reading over another.
