id: 2TH.2.13
reference: 2 Thessalonians 2:13
source:
  edition: SBLGNT
  text: Ἡμεῖς δὲ ὀφείλομεν εὐχαριστεῖν τῷ θεῷ πάντοτε περὶ ὑμῶν, ἀδελφοὶ ἠγαπημένοι
    ὑπὸ κυρίου, ὅτι εἵλατο ὑμᾶς ὁ θεὸς ⸀ἀπαρχὴν εἰς σωτηρίαν ἐν ἁγιασμῷ πνεύματος
    καὶ πίστει ἀληθείας,
translation:
  text: But we ought always to give thanks to God for you, brothers beloved by the
    Lord, because God chose you as firstfruits for salvation through sanctification
    by the Spirit and faith in the truth,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, in some manuscripts, 'because God chose you from the beginning for salvation.'
      The main text follows the reading 'as firstfruits' (ἀπαρχήν); the alternative
      reflects the variant ἀπ’ ἀρχῆς ('from the beginning').
    reason: textual_variant
  - marker: b
    text: '''Brothers'' renders the masculine plural ἀδελφοί; the address may include
      the whole believing community.'
    reason: cultural_note
lexical_decisions:
- source_word: Ἡμεῖς δὲ
  chosen: But we
  alternatives:
  - Now we
  - But as for us
  lexicon: BDAG
  rationale: δέ marks contrast with the preceding description of those who perish;
    the explicit pronoun Ἡμεῖς adds emphasis, naturally carried in English as 'But
    we'.
- source_word: ὀφείλομεν
  chosen: ought
  alternatives:
  - are obligated
  - must
  lexicon: BDAG
  rationale: Conveys moral obligation or fitting duty without overstating compulsion.
    'Ought' fits Paul's thanksgiving formula idiomatically.
- source_word: εὐχαριστεῖν τῷ θεῷ πάντοτε περὶ ὑμῶν
  chosen: always to give thanks to God for you
  alternatives:
  - to thank God always concerning you
  - always to thank God about you
  lexicon: BDAG
  rationale: Standard Pauline expression; 'give thanks to God for you' is natural
    English and preserves the dative object and περί phrase.
- source_word: ἀδελφοὶ
  chosen: brothers
  alternatives:
  - brothers and sisters
  - siblings
  lexicon: BDAG
  rationale: Per doctrine, gender-accurate rendering is preferred. Though the audience
    likely includes women, the Greek masculine plural is retained in the main text;
    inclusivity can be noted in a footnote.
- source_word: ἠγαπημένοι ὑπὸ κυρίου
  chosen: beloved by the Lord
  alternatives:
  - loved by the Lord
  - dearly loved by the Lord
  lexicon: BDAG
  rationale: The perfect/passive participle functions adjectivally. 'Beloved' is concise
    and preserves the covenantal/theological warmth of the expression. κύριος is rendered
    'Lord' per doctrine.
- source_word: εἵλατο
  chosen: chose
  alternatives:
  - selected
  - took for himself
  lexicon: BDAG
  rationale: Middle voice of αἱρέομαι here means 'choose/select.' 'Chose' is the most
    direct and idiomatic rendering.
- source_word: ἀπαρχὴν
  chosen: as firstfruits
  alternatives:
  - from the beginning
  lexicon: BDAG
  rationale: The printed SBLGNT reading is ἀπαρχήν, literally 'firstfruits.' Because
    another well-known textual reading is ἀπ’ ἀρχῆς ('from the beginning'), the main
    text follows the given source text while preserving the variant in a footnote.
- source_word: εἰς σωτηρίαν
  chosen: for salvation
  alternatives:
  - unto salvation
  - to be saved
  lexicon: BDAG
  rationale: εἰς with accusative expresses goal or result. 'For salvation' is clear
    modern English and preserves teleology.
- source_word: ἐν ἁγιασμῷ πνεύματος
  chosen: through sanctification by the Spirit
  alternatives:
  - in sanctification of spirit
  - in holiness of spirit
  lexicon: BDAG
  rationale: ἐν here is instrumental/sphere-like; 'through' communicates means well
    in English. Given Pauline usage and the capitalized personal sense in context,
    πνεύματος is best taken as the Holy Spirit rather than the human spirit.
- source_word: καὶ πίστει ἀληθείας
  chosen: and faith in the truth
  alternatives:
  - and belief of the truth
  - and faith in truth
  lexicon: BDAG
  rationale: πίστις defaults to 'faith' per doctrine. The genitive ἀληθείας is most
    naturally objective, 'faith in the truth,' rather than a subjective genitive such
    as 'truth's faithfulness.'
