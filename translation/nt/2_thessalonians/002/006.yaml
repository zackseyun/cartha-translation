theological_decisions:
- issue: Identity of the restraining force/person
  chosen_reading: Render the Greek neutrally as 'what is restraining him' without
    identifying the restrainer.
  alternative_readings:
  - the Roman order/government
  - the Holy Spirit
  - an angelic power
  - God's decree/providence
  rationale: The verse itself does not identify the restrainer, and the neuter τὸ
    κατέχον should be translated without resolving a long-debated interpretive question.
    This preserves the text's ambiguity rather than importing a doctrinal conclusion.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
- issue: Force of καιρός in eschatological context
  chosen_reading: Translate as 'his own time' rather than a more interpretive 'appointed
    time.'
  alternative_readings:
  - his appointed time
  - the proper time
  rationale: While καιρός often carries the sense of an appointed or fitting time,
    the more literal rendering better preserves the wording and avoids adding interpretive
    specificity in an eschatological passage.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve ambiguity
    where the source does not force a narrower reading.'
