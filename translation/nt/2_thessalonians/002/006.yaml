id: 2TH.2.6
reference: 2 Thessalonians 2:6
source:
  edition: SBLGNT
  text: καὶ νῦν τὸ κατέχον οἴδατε, εἰς τὸ ἀποκαλυφθῆναι αὐτὸν ἐν τῷ ⸀ἑαυτοῦ καιρῷ·
translation:
  text: And now you know what is restraining him, so that he may be revealed in his
    own time.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'what is holding him back.' The Greek uses a neuter expression and does
      not identify the restraining force here.
    reason: lexical_alternative
  - marker: b
    text: Or 'in his appointed time.' The Greek phrase can carry the sense of a fitting
      or appointed time.
    reason: alternative_reading
lexical_decisions:
- source_word: κατέχον
  chosen: what is restraining
  alternatives:
  - what holds back
  - the thing restraining
  - what is holding him back
  lexicon: BDAG
  rationale: The neuter articular participle τὸ κατέχον is best rendered impersonally
    as 'what is restraining' rather than with a personal subject. 'Restraining' captures
    the sense of preventing or holding back without over-specifying the agent.
- source_word: οἴδατε
  chosen: you know
  alternatives:
  - you are aware
  - you understand
  lexicon: BDAG
  rationale: A straightforward rendering of the perfect-form verb with present sense.
    'You know' is natural English and preserves Paul's appeal to prior instruction.
- source_word: εἰς τὸ ἀποκαλυφθῆναι
  chosen: so that he may be revealed
  alternatives:
  - for him to be revealed
  - unto his being revealed
  lexicon: BDAG
  rationale: The preposition with articular infinitive expresses purpose/result here.
    'So that he may be revealed' gives clear modern English while preserving the intended
    timing/purpose nuance.
- source_word: ἐν τῷ ἑαυτοῦ καιρῷ
  chosen: in his own time
  alternatives:
  - at his own time
  - in his appointed time
  - in the proper time for him
  lexicon: BDAG
  rationale: καιρός denotes an appointed or fitting time, and ἑαυτοῦ points to the
    subject's own time. 'In his own time' is concise and faithful; 'appointed time'
    is interpretive and therefore kept as an alternative rather than the main text.
- source_word: νῦν
  chosen: now
  alternatives:
  - at present
  lexicon: BDAG
  rationale: Simple temporal adverb; 'now' fits the discourse naturally.
- source_word: αὐτόν
  chosen: him
  lexicon: BDAG
  rationale: The masculine pronoun refers back to the previously mentioned figure
    to be revealed. 'Him' preserves the personal reference without importing further
    identification.
