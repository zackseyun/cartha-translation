theological_decisions:
- issue: Rendering Χριστοῦ in the christological title
  chosen_reading: Messiah
  alternative_readings:
  - Christ
  rationale: The doctrine excerpt directs that Χριστός be translated as 'Messiah'
    where it functions as a title, while preserving 'Christ' where name-like. In this
    verse the title sense is still active, so 'Messiah' is used in the main text and
    the traditional rendering is preserved in a footnote.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; Contested
    terms table for Χριστός'
- issue: Scope of ἀδελφοί
  chosen_reading: brothers
  alternative_readings:
  - brothers and sisters
  rationale: The translation philosophy requires gender-accurate rendering rather
    than flattening masculine forms into gender-neutral English. Because Paul likely
    addresses the whole congregation, the inclusive sense is preserved in a footnote
    rather than altering the main text.
  doctrine_reference: 'DOCTRINE.md: Gender-accurate over gender-neutral'
- issue: Relation between 'the coming' and 'our gathering together'
  chosen_reading: Two coordinated but closely related events/realities are left simply
    coordinated in translation
  alternative_readings:
  - our gathering together at his coming
  - our gathering together, namely his coming
  rationale: The Greek joins the two genitives with καί under ὑπέρ without explicitly
    defining their precise temporal or logical relation. The translation preserves
    that syntactic coordination and does not import a specific eschatological scheme.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it'
