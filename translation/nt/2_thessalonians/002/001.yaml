id: 2TH.2.1
reference: 2 Thessalonians 2:1
source:
  edition: SBLGNT
  text: Ἐρωτῶμεν δὲ ὑμᾶς, ἀδελφοί, ὑπὲρ τῆς παρουσίας τοῦ κυρίου ἡμῶν Ἰησοῦ Χριστοῦ
    καὶ ἡμῶν ἐπισυναγωγῆς ἐπ’ αὐτόν,
translation:
  text: Now we ask you, brothers, concerning the coming of our Lord Jesus the Messiah
    and our gathering together to him,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Jesus Christ.' The Greek title Χριστός is rendered 'Messiah' here to
      preserve its meaning.
    reason: alternative_reading
  - marker: b
    text: '''Brothers'' is Paul''s form of address; in context he is likely addressing
      the whole believing community.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐρωτῶμεν
  chosen: we ask
  alternatives:
  - we request
  - we urge
  - we beseech
  lexicon: BDAG
  rationale: The verb ἐρωτάω here introduces a pastoral appeal rather than a command.
    'We ask' is natural modern English and preserves the gentler force better than
    'urge,' which can sound stronger.
- source_word: δὲ
  chosen: Now
  alternatives:
  - and
  - but
  - ''
  lexicon: BDAG
  rationale: δέ marks a transition. 'Now' captures the discourse shift into a new
    but related topic without implying strong contrast. It is retained in English
    because it helps the flow of Paul's argument.
- source_word: ἀδελφοί
  chosen: brothers
  alternatives:
  - brothers and sisters
  - siblings
  lexicon: BDAG
  rationale: Per the gender-accurate philosophy, the grammatically masculine vocative
    is rendered 'brothers.' In Pauline usage it often addresses the whole congregation,
    so an inclusivity note is appropriate rather than replacing the source-shaped
    term in the main text.
- source_word: ὑπὲρ
  chosen: concerning
  alternatives:
  - about
  - with regard to
  - for
  lexicon: BDAG
  rationale: In this context ὑπέρ introduces the matter under discussion rather than
    meaning 'for' in a benefactive sense. 'Concerning' is clear and suitably formal
    without being stiff.
- source_word: παρουσίας
  chosen: coming
  alternatives:
  - presence
  - arrival
  lexicon: BDAG
  rationale: Although παρουσία can literally denote 'presence,' in eschatological
    contexts referring to Jesus it conventionally means his future advent. 'Coming'
    is the clearest idiomatic rendering in English.
- source_word: κυρίου
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: This follows the doctrinal default for κύριος. 'Lord' preserves both
    the title's authority and its established New Testament theological force.
- source_word: Ἰησοῦ Χριστοῦ
  chosen: Jesus Messiah
  alternatives:
  - Jesus Christ
  lexicon: BDAG
  rationale: 'Per the translation philosophy, Χριστός is rendered ''Messiah'' where
    it functions as a title rather than a fixed name-like element. Here the full phrase
    remains transparently titular: ''our Lord Jesus Messiah.'' The traditional ''Jesus
    Christ'' is preserved as an alternative.'
- source_word: ἐπισυναγωγῆς
  chosen: gathering together
  alternatives:
  - assembly
  - gathering
  lexicon: BDAG
  rationale: The noun denotes a gathering together, here of believers to Christ. 'Gathering
    together' preserves the compound force of the Greek and avoids over-specifying
    institutional connotations that 'assembly' might suggest.
- source_word: ἐπ’ αὐτόν
  chosen: to him
  alternatives:
  - unto him
  - around him
  lexicon: BDAG
  rationale: With ἐπί plus accusative after ἐπισυναγωγή, the sense is movement or
    orientation toward Christ. 'To him' is idiomatic and sufficiently precise in English.
