id: 2TH.2.10
reference: 2 Thessalonians 2:10
source:
  edition: SBLGNT
  text: καὶ ἐν πάσῃ ἀπάτῃ ⸀ἀδικίας τοῖς ἀπολλυμένοις, ἀνθ’ ὧν τὴν ἀγάπην τῆς ἀληθείας
    οὐκ ἐδέξαντο εἰς τὸ σωθῆναι αὐτούς·
translation:
  text: and with every deception of unrighteousness among those who are perishing,
    because they did not accept the love of the truth so as to be saved.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'every deceit of unrighteousness.'
    reason: lexical_alternative
  - marker: b
    text: Or 'for/to those who are perishing.'
    reason: lexical_alternative
  - marker: c
    text: Or 'did not receive' or 'did not welcome the love of the truth.'
    reason: lexical_alternative
  - marker: d
    text: Or 'for them to be saved.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπάτῃ
  chosen: deception
  alternatives:
  - delusion
  - deceit
  lexicon: BDAG
  rationale: ἀπάτη denotes deceit or deception. 'Deception' is natural English and
    fits the instrumental/surrounding sense with ἐν ('with/in every deception'). 'Delusion'
    is possible but can imply an internal mental state more than the active misleading
    in context.
- source_word: ἀδικίας
  chosen: of unrighteousness
  alternatives:
  - of wickedness
  - of injustice
  - unrighteous
  lexicon: BDAG
  rationale: 'The genitive most naturally qualifies the kind of deception: deception
    characterized by ἀδικία. ''Of unrighteousness'' preserves the moral/theological
    force and the noun form. ''Wickedness'' is smoother but less formally tied to
    the Greek; ''injustice'' is possible but narrower here.'
- source_word: τοῖς ἀπολλυμένοις
  chosen: among those who are perishing
  alternatives:
  - for those who are perishing
  - to those who are perishing
  lexicon: BDAG
  rationale: 'The dative with the preceding phrase is somewhat flexible. In context,
    the deception operates in relation to the perishing group. ''Among those who are
    perishing'' communicates the sphere/target naturally in English without overstating
    directionality. The present participle is rendered progressively: ''are perishing.'''
- source_word: ἀνθ’ ὧν
  chosen: because
  alternatives:
  - in return for which
  - for which reason
  - because of which
  lexicon: BDAG
  rationale: Here ἀνθ’ ὧν introduces the reason for their perishing/deception. 'Because'
    gives the causal force idiomatically. A more literal 'in return for which' is
    possible but awkward in English and can obscure the sense.
- source_word: ἀγάπην
  chosen: love
  lexicon: BDAG
  rationale: Per doctrine defaults, ἀγάπη is rendered 'love.' The phrase is not merely
    cognitive acceptance of truth but an affectionate embrace of it.
- source_word: τῆς ἀληθείας
  chosen: of the truth
  alternatives:
  - for the truth
  - true message
  lexicon: BDAG
  rationale: The genitive is retained as 'of the truth,' yielding the idiomatic Pauline
    phrase 'the love of the truth.' This preserves the objective sense without reducing
    ἀλήθεια to a paraphrase like 'true message.'
- source_word: ἐδέξαντο
  chosen: did not accept
  alternatives:
  - did not receive
  - did not welcome
  lexicon: BDAG
  rationale: δέχομαι often means receive/accept/welcome. 'Accept' works well with
    an abstract object ('the love of the truth') and communicates culpable refusal.
    'Receive' is more literal and preserved in a footnote as an alternative.
- source_word: εἰς τὸ σωθῆναι αὐτούς
  chosen: so as to be saved
  alternatives:
  - for them to be saved
  - unto their being saved
  lexicon: BDAG
  rationale: The articular infinitive with εἰς expresses purpose or result. 'So as
    to be saved' preserves that telic nuance in clear English. 'For them to be saved'
    is also possible and slightly more explicit, but less idiomatic in the flow of
    the sentence.
