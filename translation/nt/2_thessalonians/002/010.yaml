theological_decisions:
- issue: Whether 'those who are perishing' should be rendered as a fixed decree ('the
    doomed') or as an ongoing state.
  chosen_reading: those who are perishing
  alternative_readings:
  - the doomed
  - those who are being destroyed
  rationale: The present middle/passive participle ἀπολλυμένοις is best represented
    as an ongoing condition rather than a more interpretively loaded label. This preserves
    theological tension and avoids importing a specific soteriological system beyond
    the text.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Whether 'the love of the truth' means love for the truth or the truth's love
    toward them.
  chosen_reading: the love of the truth
  alternative_readings:
  - love for the truth
  - the truth's love
  rationale: The Greek genitive is left in a form that naturally communicates the
    likely objective sense in English while preserving the wording of the source.
    Context strongly favors their failure to embrace the truth, not the truth's love
    toward them.
  doctrine_reference: Original-language primacy over translation tradition; preserve
    theological tension where genuine.
