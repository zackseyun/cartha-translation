id: 2TH.2.12
reference: 2 Thessalonians 2:12
source:
  edition: SBLGNT
  text: ἵνα κριθῶσιν ⸀πάντες οἱ μὴ πιστεύσαντες τῇ ἀληθείᾳ ἀλλὰ εὐδοκήσαντες ⸀τῇ ἀδικίᾳ.
translation:
  text: so that all may be judged who did not believe the truth but took pleasure
    in unrighteousness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'may be condemned.' The Greek verb can imply adverse judgment in context,
      though it more literally means 'may be judged.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἵνα
  chosen: so that
  alternatives:
  - in order that
  - that
  lexicon: BDAG
  rationale: Introduces purpose/result in relation to the preceding context. 'So that'
    is natural English and preserves the clause linkage without over-specifying whether
    the nuance is purpose or result.
- source_word: κριθῶσιν
  chosen: may be judged
  alternatives:
  - may be condemned
  - might be judged
  lexicon: BDAG
  rationale: The passive subjunctive of κρίνω most basically means 'be judged.' Although
    the context implies adverse judgment, 'condemned' would interpret the result more
    explicitly than the Greek states. 'May be judged' preserves the judicial sense
    and leaves the contextual force intact.
- source_word: πάντες
  chosen: all
  alternatives:
  - all of them
  - everyone
  lexicon: BDAG
  rationale: A straightforward rendering of the nominative plural adjective/substantive.
    'All' is concise and fits the generic plural construction with the following participles.
- source_word: οἱ μὴ πιστεύσαντες
  chosen: who did not believe
  alternatives:
  - those who did not believe
  - who did not trust
  lexicon: BDAG
  rationale: 'The article with aorist participle functions substantivally: ''those
    who did not believe.'' In English, ''who did not believe'' after ''all'' is smooth
    and accurate. ''Believe'' is preferred over ''trust'' here because the object
    is ''the truth,'' and Pauline usage commonly frames rejection of the gospel as
    refusal to believe the truth.'
- source_word: τῇ ἀληθείᾳ
  chosen: the truth
  alternatives:
  - truth
  lexicon: BDAG
  rationale: The dative after πιστεύω is naturally rendered with an English direct
    object idiom, 'believe the truth.' The article is retained because it likely points
    to the definite truth of the gospel rather than truth in the abstract.
- source_word: ἀλλὰ
  chosen: but
  alternatives:
  - rather
  - instead
  lexicon: BDAG
  rationale: Marks strong contrast between rejecting the truth and delighting in wrongdoing.
    'But' is the most natural English adversative here.
- source_word: εὐδοκήσαντες
  chosen: took pleasure in
  alternatives:
  - delighted in
  - approved of
  lexicon: BDAG
  rationale: εὐδοκέω can mean to take pleasure, delight, or approve. 'Took pleasure
    in' best captures the volitional and affective sense in this moral contrast, without
    reducing it merely to intellectual approval.
- source_word: τῇ ἀδικίᾳ
  chosen: unrighteousness
  alternatives:
  - wickedness
  - injustice
  - wrongdoing
  lexicon: BDAG
  rationale: ἀδικία broadly denotes unrighteousness, wrongdoing, or injustice. 'Unrighteousness'
    preserves the moral-theological register of the Greek and matches Pauline diction
    better than the more colloquial 'wrongdoing.'
