theological_decisions:
- issue: Whether κριθῶσιν should be rendered as 'be judged' or the more interpretive
    'be condemned'
  chosen_reading: be judged
  alternative_readings:
  - be condemned
  rationale: The immediate context is certainly negative, but the verb κρίνω itself
    denotes judgment more broadly. To avoid importing a stronger doctrinal conclusion
    into the wording than the Greek explicitly states, the main text keeps 'be judged.'
    The condemnatory outcome remains clear from context.
  doctrine_reference: 'Translation philosophy: Preserve theological tension rather
    than resolve it.'
