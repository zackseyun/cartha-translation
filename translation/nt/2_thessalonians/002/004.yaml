id: 2TH.2.4
reference: 2 Thessalonians 2:4
source:
  edition: SBLGNT
  text: ὁ ἀντικείμενος καὶ ὑπεραιρόμενος ἐπὶ πάντα λεγόμενον θεὸν ἢ σέβασμα, ὥστε
    αὐτὸν εἰς τὸν ναὸν τοῦ ⸀θεοῦ καθίσαι ἀποδεικνύντα ἑαυτὸν ὅτι ἔστιν θεός.
translation:
  text: the one who opposes and exalts himself over every so-called god or object
    of worship, so that he takes his seat in the temple of God, displaying himself
    as being God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "displaying himself that he is a god."
    reason: alternative_reading
  - marker: b
    text: Or "sanctuary of God" for "temple of God."
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀντικείμενος
  chosen: the one who opposes
  alternatives:
  - the adversary
  - the one opposing
  lexicon: BDAG
  rationale: Present middle participle used substantivally with the article; 'the
    one who opposes' preserves the ongoing oppositional sense without importing a
    technical title not explicit in the Greek.
- source_word: ὑπεραιρόμενος
  chosen: exalts himself over
  alternatives:
  - raises himself above
  - is arrogant over
  lexicon: BDAG
  rationale: Middle/passive participle here conveys self-exaltation. 'Exalts himself
    over' is idiomatic and keeps the reflexive force.
- source_word: ἐπὶ πάντα λεγόμενον θεὸν
  chosen: over every so-called god
  alternatives:
  - against every so-called god
  - over every being called god
  lexicon: BDAG
  rationale: With ἐπί and accusative after a verb of self-exaltation, the sense is
    superiority over. λεγόμενον is well captured by 'so-called,' indicating what is
    designated as god without affirming its reality.
- source_word: σέβασμα
  chosen: object of worship
  alternatives:
  - object of reverence
  - that which is worshiped
  lexicon: BDAG
  rationale: The noun denotes an object of religious veneration broadly, not necessarily
    a deity. 'Object of worship' is clear modern English and preserves the breadth.
- source_word: ὥστε
  chosen: so that
  alternatives:
  - with the result that
  - so as to
  lexicon: BDAG
  rationale: Introduces the result/effect of the preceding self-exaltation. 'So that'
    is natural and sufficiently flexible for the construction with infinitive.
- source_word: εἰς τὸν ναὸν τοῦ θεοῦ
  chosen: in the temple of God
  alternatives:
  - into the sanctuary of God
  lexicon: BDAG
  rationale: ναός refers specifically to the temple/sanctuary. 'Temple of God' is
    the most transparent rendering in context; 'sanctuary' is possible but less natural
    here.
- source_word: καθίσαι
  chosen: takes his seat
  alternatives:
  - to sit
  - to seat himself
  lexicon: BDAG
  rationale: Aorist infinitive after ὥστε expresses the resulting act. 'Takes his
    seat' is idiomatic English that conveys deliberate enthronement-like sitting better
    than the bare 'sit.'
- source_word: ἀποδεικνύντα ἑαυτὸν
  chosen: displaying himself
  alternatives:
  - proclaiming himself
  - presenting himself
  - demonstrating himself
  lexicon: BDAG
  rationale: The participle indicates making oneself known or showing oneself to be
    something. 'Displaying himself' avoids overreading as a formal verbal claim while
    preserving public self-presentation.
- source_word: ὅτι ἔστιν θεός
  chosen: as being God
  alternatives:
  - that he is God
  - that he is a god
  lexicon: BDAG
  rationale: Anarthrous θεός can be rendered qualitatively or definitely depending
    on context. Here the claim is climactic and parallels the temple of God, so 'God'
    best reflects the blasphemous self-claim. 'As being' fits the participial construction
    with ἀποδεικνύντα.
