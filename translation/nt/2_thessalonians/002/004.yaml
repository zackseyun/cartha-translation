theological_decisions:
- issue: Whether θεός at the end should be rendered 'God' or 'a god'
  chosen_reading: God
  alternative_readings:
  - a god
  rationale: In this context the figure seats himself in the temple of God and presents
    himself with the highest divine claim. Rendering θεός as 'God' best captures the
    force of the blasphemous pretension in context without making an ontological affirmation
    about the figure. The alternative 'a god' is lexically possible because the noun
    is anarthrous, so it is preserved in a footnote.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
- issue: Whether ναός should be rendered more specifically as 'sanctuary'
  chosen_reading: temple of God
  alternative_readings:
  - sanctuary of God
  rationale: The Greek term can denote the inner sanctuary, but in English 'temple
    of God' is the clearest natural rendering and does not foreclose interpretive
    debates about whether Paul means a literal temple or a metaphorical sacred sphere.
    A more specific rendering could over-narrow the image.
  doctrine_reference: Optimal equivalence; preserve theological tension rather than
    resolve it.
