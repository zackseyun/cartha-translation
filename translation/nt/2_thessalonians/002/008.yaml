theological_decisions:
- issue: Identity and portrayal of the eschatological opponent
  chosen_reading: the lawless one
  alternative_readings:
  - the man of lawlessness
  rationale: This verse itself uses the substantival adjective ὁ ἄνομος, not the fuller
    expression from the surrounding context. Rendering it 'the lawless one' stays
    close to the wording here and avoids importing additional wording from nearby
    verses, while still allowing readers to connect the figure contextually.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
- issue: Means of the Lord Jesus' victory
  chosen_reading: with the breath of his mouth
  alternative_readings:
  - with the spirit of his mouth
  rationale: Choosing 'breath' follows the most natural sense of πνεῦμα in this idiom
    and preserves the likely allusion to prophetic judgment imagery. The alternative
    'spirit' is lexically possible and therefore preserved in a footnote rather than
    excluded.
  doctrine_reference: Preserve theological tension rather than resolve it.
