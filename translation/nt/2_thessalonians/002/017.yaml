id: 2TH.2.17
reference: 2 Thessalonians 2:17
source:
  edition: SBLGNT
  text: παρακαλέσαι ὑμῶν τὰς καρδίας καὶ ⸀στηρίξαι ἐν παντὶ ⸂ἔργῳ καὶ λόγῳ⸃ ἀγαθῷ.
translation:
  text: encourage your hearts and strengthen them in every good work and word.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'comfort your hearts'; παρακαλέσαι can also carry the sense 'comfort'
      or 'exhort.'
    reason: lexical_alternative
  - marker: b
    text: Or 'establish' or 'confirm' in every good work and word.
    reason: lexical_alternative
lexical_decisions:
- source_word: παρακαλέσαι
  chosen: encourage
  alternatives:
  - comfort
  - exhort
  lexicon: BDAG
  rationale: The verb παρακαλέω can mean encourage, comfort, or exhort depending on
    context. In this prayer-wish following mention of God's eternal encouragement
    (v.16), 'encourage' best carries the broad sense without narrowing it to emotional
    comfort alone or moral urging alone.
- source_word: καρδίας
  chosen: hearts
  alternatives:
  - inner selves
  - minds
  lexicon: BDAG
  rationale: '''Hearts'' preserves the biblical anthropological term καρδία, referring
    to the inner person, rather than reducing it to merely emotions or intellect.'
- source_word: στηρίξαι
  chosen: strengthen
  alternatives:
  - establish
  - confirm
  lexicon: BDAG
  rationale: στηρίζω often means to make firm or establish. 'Strengthen' is natural
    English here and fits the paired prayer that the Thessalonians be inwardly encouraged
    and made firm for faithful living.
- source_word: ἐν παντὶ
  chosen: in every
  alternatives:
  - for every
  - with respect to every
  lexicon: BDAG
  rationale: The preposition ἐν with the dative here is best rendered 'in,' expressing
    the sphere in which the strengthening is to occur.
- source_word: ἔργῳ
  chosen: work
  alternatives:
  - deed
  - action
  lexicon: BDAG
  rationale: ἔργον commonly denotes deed or work. 'Work' pairs idiomatically with
    'word' and preserves the singular distributive sense under παντί.
- source_word: λόγῳ
  chosen: word
  alternatives:
  - speech
  - message
  lexicon: BDAG
  rationale: λόγος here most naturally refers to speech or utterance in parallel with
    'work.' 'Word' preserves the concise pairing 'work and word' familiar in English
    while remaining accurate.
- source_word: ἀγαθῷ
  chosen: good
  alternatives:
  - beneficial
  - upright
  lexicon: BDAG
  rationale: ἀγαθός modifies both 'work' and 'word' in sense. 'Good' is the most direct
    and sufficiently broad rendering.
- source_word: ὑμῶν
  chosen: your
  lexicon: BDAG
  rationale: 'Genitive plural pronoun dependent on ''hearts'': ''your hearts.'''
- source_word: καὶ
  chosen: and
  alternatives:
  - also
  lexicon: BDAG
  rationale: Coordinates the two prayer verbs and the paired nouns in a straightforward
    way.
