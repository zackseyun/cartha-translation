theological_decisions:
- issue: Whether to render καρδία in a more interpretive psychological sense
  chosen_reading: hearts
  alternative_readings:
  - inner selves
  - minds
  rationale: The translation preserves the biblical metaphor and does not domesticate
    the anthropology into a narrower modern category.
  doctrine_reference: Translation philosophy §1, §6
- issue: Whether στηρίξαι should be rendered more formally as 'establish'
  chosen_reading: strengthen
  alternative_readings:
  - establish
  - confirm
  rationale: Optimal equivalence favors natural modern English while retaining the
    sense of being made firm. 'Strengthen' communicates the intended result in accessible
    language.
  doctrine_reference: Translation philosophy §6
