id: 2TH.2.14
reference: 2 Thessalonians 2:14
source:
  edition: SBLGNT
  text: εἰς ⸀ὃ ἐκάλεσεν ὑμᾶς διὰ τοῦ εὐαγγελίου ἡμῶν, εἰς περιποίησιν δόξης τοῦ κυρίου
    ἡμῶν Ἰησοῦ Χριστοῦ.
translation:
  text: to which he called you through our gospel, for the obtaining of the glory
    of our Lord Jesus Messiah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more traditionally, 'Jesus Christ.'
    reason: alternative_reading
  - marker: b
    text: '''For the obtaining of the glory'' could also be rendered ''for possession
      of the glory'' or ''to share in the glory'' of our Lord Jesus Messiah.'
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰς ὃ
  chosen: to which
  alternatives:
  - for which
  - to this
  lexicon: BDAG
  rationale: The preposition with the relative pronoun points back to the preceding
    salvation/sanctification complex and introduces purpose or goal. 'To which' is
    natural English and preserves the forward movement of the Greek without over-specifying
    the antecedent.
- source_word: ἐκάλεσεν
  chosen: he called
  alternatives:
  - he summoned
  - he invited
  lexicon: BDAG
  rationale: καλέω in Pauline usage commonly denotes God's effective call into salvation.
    'Called' is the standard and sufficiently broad rendering without importing a
    narrower theological system.
- source_word: διὰ τοῦ εὐαγγελίου ἡμῶν
  chosen: through our gospel
  alternatives:
  - through the gospel we proclaimed
  - by means of our good news
  lexicon: BDAG
  rationale: διά with the genitive indicates means or instrument. 'Through our gospel'
    is concise and reflects Paul's idiom, where 'our gospel' means the gospel proclaimed
    by the apostolic mission, not a different gospel belonging to them.
- source_word: εὐαγγελίου
  chosen: gospel
  alternatives:
  - good news
  lexicon: BDAG
  rationale: '''Gospel'' is established, readable modern English and retains the term''s
    theological weight in Pauline context better than the more generic ''good news''
    here.'
- source_word: εἰς περιποίησιν
  chosen: for the obtaining of
  alternatives:
  - for possession of
  - for acquiring
  - for gaining
  lexicon: BDAG
  rationale: περιποίησις can denote acquisition, obtaining, possession, or preservation.
    In this context with 'glory' as the genitive complement, 'the obtaining of' best
    captures the telic force and avoids the awkwardness of 'possession of glory' while
    staying close to the Greek.
- source_word: δόξης
  chosen: the glory
  alternatives:
  - glory
  - splendor
  lexicon: BDAG
  rationale: The genitive is objective/complementary with περιποίησιν. Including the
    article in English yields a more natural phrase and reflects the specific eschatological
    glory associated with the Lord Jesus.
- source_word: τοῦ κυρίου ἡμῶν
  chosen: of our Lord
  alternatives:
  - of our master
  lexicon: BDAG
  rationale: Per doctrine defaults, κύριος is rendered 'Lord.' This preserves both
    common NT usage and the title's theological significance.
- source_word: Ἰησοῦ Χριστοῦ
  chosen: Jesus Messiah
  alternatives:
  - Jesus Christ
  lexicon: BDAG
  rationale: Per doctrine defaults, Χριστός is translated 'Messiah' where it functions
    as a title rather than a fixed name-like surname. In this context after 'Lord
    Jesus,' the titular sense remains clear and preserves the meaning of the Greek.
