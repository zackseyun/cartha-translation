theological_decisions:
- issue: Nature of the divine call in Pauline soteriology
  chosen_reading: Render ἐκάλεσεν simply as 'he called' without specifying 'effectually
    called' or reducing it to a mere invitation.
  alternative_readings:
  - he effectually called
  - he invited
  rationale: The verse states that God called the Thessalonians through the apostolic
    gospel, but the translation should preserve the text's wording without importing
    a denominational account of irresistible grace or, conversely, flattening the
    salvific force of Paul's language.
  doctrine_reference: Affirmations; Preserve theological tension rather than resolve
    it.
- issue: Rendering Χριστοῦ
  chosen_reading: Translate as 'Messiah' in the main text.
  alternative_readings:
  - Christ
  rationale: The doctrine excerpt directs that Χριστός be rendered 'Messiah' where
    title is in view, while preserving alternatives where useful. Here the title remains
    semantically active, so 'Messiah' is preferred; the traditional 'Christ' is preserved
    in a footnote.
  doctrine_reference: 'Contested terms table: Χριστός → Messiah (where title; Christ
    where name-like).'
