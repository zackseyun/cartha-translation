id: 2TH.2.3
reference: 2 Thessalonians 2:3
source:
  edition: SBLGNT
  text: μή τις ὑμᾶς ἐξαπατήσῃ κατὰ μηδένα τρόπον· ὅτι ἐὰν μὴ ἔλθῃ ἡ ἀποστασία πρῶτον
    καὶ ἀποκαλυφθῇ ὁ ἄνθρωπος τῆς ⸀ἀνομίας, ὁ υἱὸς τῆς ἀπωλείας,
translation:
  text: Let no one deceive you in any way, because that day will not come unless the
    rebellion comes first and the man of lawlessness is revealed, the son of destruction.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the apostasy' or 'the falling away.' The Greek term can denote a decisive
      rebellion, often understood as religious defection.
    reason: alternative_reading
  - marker: b
    text: Some manuscripts read 'the man of sin' instead of 'the man of lawlessness.'
    reason: textual_variant
lexical_decisions:
- source_word: ἐξαπατήσῃ
  chosen: deceive
  alternatives:
  - mislead
  - thoroughly deceive
  lexicon: BDAG
  rationale: The verb means to deceive or mislead. 'Deceive' is the most natural modern
    English equivalent and fits the warning context without overtranslating the prefixed
    force.
- source_word: κατὰ μηδένα τρόπον
  chosen: in any way
  alternatives:
  - by any means
  - in no way
  lexicon: BDAG
  rationale: This idiom intensifies the prohibition. 'In any way' is clear modern
    English and preserves the sense that no manner of deception is to be accepted.
    'By any means' is possible but sounds more traditional than necessary.
- source_word: ὅτι
  chosen: because
  alternatives:
  - for
  - that
  lexicon: BDAG
  rationale: Here ὅτι introduces the reason for the prohibition. 'Because' makes the
    logic explicit in natural English.
- source_word: ἐὰν μὴ ἔλθῃ
  chosen: will not come unless ... comes
  alternatives:
  - except ... come first
  lexicon: BDAG
  rationale: 'Although ''that day'' is implied from the previous verse rather than
    repeated here, English requires the ellipsis to be supplied for clarity. The construction
    states a necessary prior condition: it will not come unless the specified events
    occur.'
- source_word: ἀποστασία
  chosen: the rebellion
  alternatives:
  - the apostasy
  - the falling away
  lexicon: BDAG
  rationale: ἀποστασία can denote rebellion, revolt, or apostasy. 'The rebellion'
    best preserves the broad sense of decisive revolt without prematurely narrowing
    it to specifically religious apostasy. Because 'apostasy' is a longstanding and
    plausible alternative, it is preserved in a footnote.
- source_word: πρῶτον
  chosen: first
  alternatives:
  - beforehand
  lexicon: BDAG
  rationale: The adverb marks sequence. 'First' is the straightforward rendering.
- source_word: ἀποκαλυφθῇ
  chosen: is revealed
  alternatives:
  - is disclosed
  - is unveiled
  lexicon: BDAG
  rationale: The passive indicates that this figure is made manifest. 'Is revealed'
    is both accurate and idiomatic, and it preserves the apocalyptic resonance of
    the verb.
- source_word: ὁ ἄνθρωπος τῆς ἀνομίας
  chosen: the man of lawlessness
  alternatives:
  - the man of sin
  lexicon: BDAG
  rationale: The SBLGNT reading here is ἀνομίας ('lawlessness'), which should be translated
    directly. 'Man' is retained as gender-accurate because the Greek is singular masculine
    and refers to a specific individual. The textual variant 'man of sin' is preserved
    in a footnote.
- source_word: ὁ υἱὸς τῆς ἀπωλείας
  chosen: the son of destruction
  alternatives:
  - the son of perdition
  - the one destined for destruction
  lexicon: BDAG
  rationale: This Semitic-style expression can denote one characterized by or destined
    for destruction. 'Son of destruction' preserves the form of the Greek while remaining
    understandable. 'Perdition' is traditional but less accessible in modern English.
