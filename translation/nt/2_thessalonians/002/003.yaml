theological_decisions:
- issue: Supplying the implied subject of 'will not come' from the previous verse
  chosen_reading: Explicitly supplied 'that day' in English
  alternative_readings:
  - 'Leave the clause elliptical: ''because unless the rebellion comes first...'''
  rationale: The Greek ellipsis is clear from context (the day of the Lord in v. 2),
    but English benefits from supplying the implied subject to avoid awkwardness and
    ambiguity. This is a translation-level clarification, not an interpretive addition
    beyond the immediate context.
  doctrine_reference: Translation philosophy §1, §6
- issue: Meaning of ἀποστασία
  chosen_reading: Rendered broadly as 'the rebellion'
  alternative_readings:
  - the apostasy
  - the falling away
  rationale: The term can refer to rebellion or apostasy. To preserve theological
    tension rather than resolve a debated eschatological interpretation too narrowly,
    the main text uses the broader 'rebellion' and a footnote preserves 'apostasy.'
  doctrine_reference: Translation philosophy §3
- issue: Textual reading at τῆς ἀνομίας
  chosen_reading: 'Followed SBLGNT: ''of lawlessness'''
  alternative_readings:
  - '''of sin'' from a well-known textual variant'
  rationale: The provided source text reads ἀνομίας, so the draft follows that reading
    in the main text. Because 'man of sin' is a familiar variant in the manuscript
    tradition and translation history, it is preserved in a footnote for auditability.
