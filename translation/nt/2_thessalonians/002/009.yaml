id: 2TH.2.9
reference: 2 Thessalonians 2:9
source:
  edition: SBLGNT
  text: οὗ ἐστιν ἡ παρουσία κατ’ ἐνέργειαν τοῦ Σατανᾶ ἐν πάσῃ δυνάμει καὶ σημείοις
    καὶ τέρασιν ψεύδους
translation:
  text: whose coming is according to the working of Satan, with all power and signs
    and false wonders.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'whose presence/arrival is according to the activity of Satan.'
    reason: lexical_alternative
  - marker: b
    text: 'Literally, ''with all power and signs and wonders of falsehood''; also
      possible: ''lying wonders.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: οὗ
  chosen: whose
  alternatives:
  - of whom
  - whose one
  lexicon: BDAG
  rationale: Genitive relative pronoun referring back to the 'lawless one' in the
    previous verse; 'whose' gives natural English linkage and preserves the possessive/genitival
    force.
- source_word: παρουσία
  chosen: coming
  alternatives:
  - presence
  - arrival
  lexicon: BDAG
  rationale: In this eschatological context, παρουσία denotes the advent/arrival of
    a figure rather than mere static presence. 'Coming' is the most idiomatic and
    contextually appropriate rendering in English.
- source_word: κατ’ ἐνέργειαν
  chosen: according to the working
  alternatives:
  - in accordance with the activity
  - by the operation
  lexicon: BDAG
  rationale: 'The phrase expresses manner or standard: the coming corresponds to Satan''s
    operative activity. ''According to the working'' preserves the causal-operative
    sense without becoming overly technical.'
- source_word: Σατανᾶ
  chosen: Satan
  alternatives:
  - the Adversary
  lexicon: BDAG
  rationale: Standard NT proper-name transliteration; the genitive indicates the working
    belongs to or proceeds from Satan.
- source_word: ἐν πάσῃ δυνάμει
  chosen: with all power
  alternatives:
  - in every kind of power
  - with every power
  lexicon: BDAG
  rationale: ἐν here is instrumental/accompaniment-like, introducing the sphere or
    means accompanying the coming. 'With all power' is concise and natural, and πάσῃ
    is best taken intensively/comprehensively.
- source_word: σημείοις
  chosen: signs
  alternatives:
  - miraculous signs
  - tokens
  lexicon: BDAG
  rationale: Standard rendering for σημεῖον. The term often denotes acts that signify
    or authenticate; here it is part of a triad describing deceptive supernatural
    displays.
- source_word: τέρασιν
  chosen: wonders
  alternatives:
  - portents
  - marvels
  lexicon: BDAG
  rationale: Common paired rendering with 'signs.' 'Wonders' communicates extraordinary
    phenomena in readable modern English.
- source_word: ψεύδους
  chosen: 'false'
  alternatives:
  - of falsehood
  - lying
  lexicon: BDAG
  rationale: The genitive most naturally qualifies 'signs and wonders' (and possibly
    the whole triad) as characterized by falsehood. In English, attributive 'false
    wonders' is idiomatic; the adjective is allowed to govern the coordinated phrase
    'signs and false wonders' in smooth translation. A footnote preserves the more
    formally literal option 'lying wonders'/'wonders of falsehood.'
- source_word: δυνάμει καὶ σημείοις καὶ τέρασιν
  chosen: power and signs and false wonders
  alternatives:
  - miracles and signs and wonders
  - power, signs, and wonders
  lexicon: BDAG
  rationale: δύναμις can mean power or powerful deed. Here retaining 'power' avoids
    prematurely narrowing it to 'miracles' and preserves the rhetorical buildup of
    the triad.
