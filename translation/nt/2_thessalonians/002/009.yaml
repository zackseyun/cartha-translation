theological_decisions:
- issue: Nature of the satanic phenomena
  chosen_reading: The verse describes the lawless one's coming as accompanied by real
    displays of power that are characterized by falsehood or used deceptively, without
    specifying whether they are wholly counterfeit or genuinely supernatural.
  alternative_readings:
  - The signs and wonders are merely fake tricks
  - The signs and wonders are genuine miracles from Satan
  rationale: The Greek states that the coming is according to Satan's working and
    is accompanied by power, signs, and wonders of falsehood. It does not force a
    full metaphysical explanation of the phenomena, so the translation preserves the
    text's wording without importing a doctrinal resolution.
  doctrine_reference: Preserve theological tension rather than resolve it.
