theological_decisions:
- issue: Meaning of ἀπό in relation to final judgment
  chosen_reading: 'separation/exclusion: ''away from the presence of the Lord'''
  alternative_readings:
  - 'source/origin: destruction that comes from the presence of the Lord'
  rationale: The preposition ἀπό can mark either separation or source. In this context,
    the traditional and contextually strong reading is exclusion from the Lord's presence,
    which fits the judicial penalty language and yields natural English. Because the
    source/origin reading is also grammatically possible and has interpretive significance,
    it is preserved in a footnote rather than being erased.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Implication of 'eternal destruction'
  chosen_reading: rendered as 'eternal destruction' without specifying annihilation
    or eternal conscious punishment
  alternative_readings:
  - annihilationist construal
  - eternal conscious punishment construal
  rationale: The Greek phrase states the penalty but does not itself settle the broader
    doctrinal debate over the precise nature of final punishment. The translation
    therefore preserves the wording of the text and avoids importing a denominational
    conclusion.
  doctrine_reference: Do not import doctrinal claims the text does not make.
