id: 2TH.1.9
reference: 2 Thessalonians 1:9
source:
  edition: SBLGNT
  text: οἵτινες δίκην τίσουσιν ὄλεθρον αἰώνιον ἀπὸ προσώπου τοῦ κυρίου καὶ ἀπὸ τῆς
    δόξης τῆς ἰσχύος αὐτοῦ,
translation:
  text: These will pay the penalty of eternal destruction, away from the presence
    of the Lord and from the glory of his might,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly, 'destruction that comes from the presence of the Lord and from
      the glory of his might.' The Greek preposition can be understood either as separation
      ('away from') or as source/origin ('from').
    reason: alternative_reading
lexical_decisions:
- source_word: οἵτινες
  chosen: These
  alternatives:
  - who
  - such people
  lexicon: BDAG
  rationale: Refers back to the persecutors/opponents in the previous verse. 'These'
    gives a natural English resumptive force without overtranslating the qualitative
    nuance of ὅστις.
- source_word: δίκην τίσουσιν
  chosen: will pay the penalty
  alternatives:
  - will suffer punishment
  - will pay justice
  lexicon: BDAG
  rationale: The collocation means to incur or pay a judicial penalty. 'Will pay the
    penalty' preserves the legal sense of δίκη with the future verb τίνω in readable
    modern English.
- source_word: ὄλεθρον
  chosen: destruction
  alternatives:
  - ruin
  - doom
  lexicon: BDAG
  rationale: '''Destruction'' is the standard and clearest rendering in this judgment
    context. It preserves the severity of the term without importing a more specific
    doctrinal claim about the mode of final judgment.'
- source_word: αἰώνιον
  chosen: eternal
  alternatives:
  - everlasting
  - age-long
  lexicon: BDAG
  rationale: In this eschatological context, 'eternal' is the most natural rendering
    and best reflects the enduring finality of the judgment. 'Age-long' is possible
    lexically in some contexts but is not the best fit here.
- source_word: ἀπὸ προσώπου τοῦ κυρίου
  chosen: away from the presence of the Lord
  alternatives:
  - from the presence of the Lord
  - from the face of the Lord
  lexicon: BDAG
  rationale: ἀπό can denote separation, and in this judgment context 'away from' best
    captures the sense of exclusion. πρόσωπον literally means 'face,' but 'presence'
    is the idiomatic English equivalent here. κύριος is rendered 'Lord' per doctrine
    defaults.
- source_word: καὶ ἀπὸ τῆς δόξης τῆς ἰσχύος αὐτοῦ
  chosen: and from the glory of his might
  alternatives:
  - and from the splendor of his strength
  - and from the glory of his power
  lexicon: BDAG
  rationale: 'δόξα is rendered ''glory'' consistently; ἰσχύς denotes strength/might.
    ''Might'' is slightly more elevated and fitting in a theophanic judgment context.
    The genitive is taken straightforwardly: the glory that belongs to or manifests
    his might.'
