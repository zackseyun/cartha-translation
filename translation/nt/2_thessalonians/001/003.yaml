theological_decisions:
- issue: Rendering of πίστις
  chosen_reading: faith
  alternative_readings:
  - faithfulness
  - trust
  rationale: The doctrine file sets 'faith' as the default rendering for πίστις, with alternatives preserved in footnotes where relevant. Here the context most naturally refers to the Thessalonians' faith increasing, but the semantic overlap with 'faithfulness' is worth noting.
  doctrine_reference: 'DOCTRINE.md Contested terms: πίστις → faith; footnote alternatives where contested'
- issue: Rendering of ἀδελφοί in a mixed-gender church address
  chosen_reading: brothers
  alternative_readings:
  - brothers and sisters
  - siblings
  rationale: The doctrine file requires gender-accurate rather than gender-neutral rendering. Since the Greek is masculine plural with representative force, 'brothers' is retained in the main text and inclusivity is preserved by annotation rather than replacement.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #4: Gender-accurate over gender-neutral'
revisions:
- timestamp: '2026-04-21T02:33:51Z'
  adjudicator: auto_apply_tier1
