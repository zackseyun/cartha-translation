  source_review: state/reviews/gemini/nt/2_thessalonians/001/003.json
  category: awkward_english
  tier: 1
  from: of each one of all of you
  to: of each and every one of you
  rationale: The Greek phrase 'ἑνὸς ἑκάστου πάντων ὑμῶν' is emphatic and uses pleonasm (redundancy) for effect. The current rendering 'of each one of all of you' is a very literal translation that, while defensible, sounds unnatural and cumbersome in English, slightly hindering readability. A common English idiom that also uses emphasis through redundancy is 'each and every one.' Translating the phrase as 'of each and every one of you' would capture the same emphatic force as the Greek in a much more natural and idiomatic way.
