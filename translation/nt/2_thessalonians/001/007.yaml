id: 2TH.1.7
reference: 2 Thessalonians 1:7
source:
  edition: SBLGNT
  text: καὶ ὑμῖν τοῖς θλιβομένοις ἄνεσιν μεθ’ ἡμῶν ἐν τῇ ἀποκαλύψει τοῦ κυρίου Ἰησοῦ
    ἀπ’ οὐρανοῦ μετ’ ἀγγέλων δυνάμεως αὐτοῦ
translation:
  text: and to you who are being afflicted, relief with us at the revelation of the
    Lord Jesus from heaven with the angels of his power.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, 'with his mighty angels.'
    reason: lexical_alternative
lexical_decisions:
- source_word: θλιβομένοις
  chosen: who are being afflicted
  alternatives:
  - who are suffering affliction
  - who are troubled
  lexicon: BDAG
  rationale: Present passive participle of θλίβω denotes those presently undergoing
    distress or oppression. 'Being afflicted' preserves the passive sense and links
    naturally with the noun θλῖψις in the surrounding context.
- source_word: ἄνεσιν
  chosen: relief
  alternatives:
  - rest
  - ease
  lexicon: BDAG
  rationale: ἄνεσις can mean relief, rest, or easing of pressure. 'Relief' best fits
    the contrast with present affliction and avoids suggesting merely inward repose;
    it conveys release from pressure.
- source_word: μεθ’ ἡμῶν
  chosen: with us
  alternatives:
  - along with us
  lexicon: BDAG
  rationale: Simple associative μετά with genitive. 'With us' is natural English and
    preserves Paul's inclusion of himself and his companions in the same promised
    relief.
- source_word: ἐν τῇ ἀποκαλύψει
  chosen: at the revelation
  alternatives:
  - in the revelation
  - when ... is revealed
  lexicon: BDAG
  rationale: ἐν with a temporal event noun here is best rendered temporally. 'At the
    revelation' keeps the nominal form of ἀποκάλυψις while expressing the timing of
    the relief.
- source_word: ἀποκαλύψει
  chosen: revelation
  alternatives:
  - appearing
  - unveiling
  lexicon: BDAG
  rationale: The noun denotes disclosure or unveiling. 'Revelation' is the most direct
    rendering and preserves the eschatological weight of the term; alternatives are
    possible but less formally aligned.
- source_word: κυρίου
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Per doctrine defaults, κύριος is rendered 'Lord.' This preserves both
    title force and established NT usage.
- source_word: ἀπ’ οὐρανοῦ
  chosen: from heaven
  alternatives:
  - out of heaven
  lexicon: BDAG
  rationale: ἀπό marks source/origin. 'From heaven' is the standard and natural rendering
    in this eschatological context.
- source_word: μετ’ ἀγγέλων δυνάμεως αὐτοῦ
  chosen: with the angels of his power
  alternatives:
  - with his mighty angels
  - with the angels of his might
  lexicon: BDAG
  rationale: The Greek is literally 'with angels of his power.' This genitival construction
    can be understood qualitatively ('mighty angels') or as angels associated with
    his power. The chosen rendering stays closer to the Greek form and leaves the
    precise nuance more transparent.
