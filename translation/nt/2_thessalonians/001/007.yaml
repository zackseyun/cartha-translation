theological_decisions:
- issue: Rendering of the genitive phrase ἀγγέλων δυνάμεως αὐτοῦ
  chosen_reading: with the angels of his power
  alternative_readings:
  - with his mighty angels
  rationale: The phrase is syntactically compressed and could be rendered idiomatically
    as 'his mighty angels.' To preserve theological and lexical transparency, the
    main text keeps the more literal genitival structure, while the smoother idiomatic
    alternative is preserved in a footnote.
  doctrine_reference: Translation philosophy §3, §5
- issue: Temporal force of ἐν τῇ ἀποκαλύψει
  chosen_reading: at the revelation
  alternative_readings:
  - when the Lord Jesus is revealed
  rationale: The verse ties the promised relief to the eschatological unveiling of
    Jesus. Rendering the phrase nominally preserves the source structure and avoids
    over-paraphrase, while still communicating temporal sense.
  doctrine_reference: Translation philosophy §1, §6
