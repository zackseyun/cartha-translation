id: 2TH.1.8
reference: 2 Thessalonians 1:8
source:
  edition: SBLGNT
  text: ἐν ⸂φλογὶ πυρός⸃, διδόντος ἐκδίκησιν τοῖς μὴ εἰδόσι θεὸν καὶ τοῖς μὴ ὑπακούουσιν
    τῷ εὐαγγελίῳ τοῦ κυρίου ἡμῶν Ἰησοῦ,
translation:
  text: in flaming fire, inflicting vengeance on those who do not know God and on
    those who do not obey the gospel of our Lord Jesus,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in a flame of fire.'
    reason: lexical_alternative
  - marker: b
    text: Or 'dealing out retribution.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν φλογὶ πυρός
  chosen: in flaming fire
  alternatives:
  - in a flame of fire
  - in fire of flame
  lexicon: BDAG
  rationale: A literal but natural rendering of the dative phrase. 'Flaming fire'
    preserves the vivid, intensified imagery without awkward English. The phrase modifies
    the revelation of the Lord from the previous verse.
- source_word: διδόντος
  chosen: inflicting
  alternatives:
  - giving
  - dealing out
  - rendering
  lexicon: BDAG
  rationale: Although the participle is formally 'giving,' in the idiom with ἐκδίκησιν
    it means to administer or inflict judicial retribution. 'Inflicting' is idiomatic
    and preserves the active sense.
- source_word: ἐκδίκησιν
  chosen: vengeance
  alternatives:
  - justice
  - punishment
  - retribution
  lexicon: BDAG
  rationale: '''Vengeance'' is the most direct lexical equivalent and matches common
    biblical judicial language. ''Retribution'' is possible, but ''vengeance'' better
    preserves the force of divine judgment in context without softening it.'
- source_word: τοῖς μὴ εἰδόσι θεὸν
  chosen: those who do not know God
  alternatives:
  - those not knowing God
  lexicon: BDAG
  rationale: The perfect-form participle of οἶδα functions with present sense ('know').
    This rendering is natural English and preserves the ongoing state implied.
- source_word: τοῖς μὴ ὑπακούουσιν
  chosen: those who do not obey
  alternatives:
  - those who are not obeying
  - those who refuse to obey
  lexicon: BDAG
  rationale: ὑπακούω denotes obedience or heeding. 'Do not obey' is the most straightforward
    rendering; 'refuse to obey' would add volitional emphasis not explicit in the
    form.
- source_word: τῷ εὐαγγελίῳ
  chosen: the gospel
  alternatives:
  - the good news
  lexicon: BDAG
  rationale: '''Gospel'' is the established and accurate rendering in Pauline contexts,
    and remains accessible in modern English. ''Good news'' is possible but less precise
    as a recurring Pauline term.'
- source_word: τοῦ κυρίου ἡμῶν Ἰησοῦ
  chosen: of our Lord Jesus
  alternatives:
  - of Jesus our Lord
  lexicon: BDAG
  rationale: κύριος is rendered 'Lord' per doctrinal guidance on contested terms.
    The genitival phrase is translated in natural English order while preserving possession
    and title.
