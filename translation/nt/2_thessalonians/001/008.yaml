theological_decisions:
- issue: Nature of ἐκδίκησις in divine judgment
  chosen_reading: vengeance
  alternative_readings:
  - retribution
  - justice
  rationale: The term denotes judicial punishment executed by the revealed Lord. 'Vengeance'
    preserves the text's severity without importing a merely emotional or sinful human
    sense; the context is divine, righteous judgment.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather
    than resolve it; do not soften source-text claims.'
