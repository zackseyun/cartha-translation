theological_decisions:
- issue: Referent and force of 'his saints' in an eschatological context
  chosen_reading: Rendered as 'his saints' referring to Christ's holy people, with
    the preposition expressed as 'among' rather than 'in.'
  alternative_readings:
  - '''in his saints'' emphasizing that Christ is glorified in them'
  - '''among his holy ones'' with possible broader heavenly reference'
  rationale: The immediate context links 'his saints' with 'all who have believed,'
    favoring believers as the referent. Using 'among' avoids over-interpreting the
    mystical/instrumental nuance of ἐν while preserving the public, communal manifestation
    of Christ's glory. The alternative 'in his saints' is worth preserving because
    many interpreters see an indwelling/display nuance.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Meaning of πιστεύσασιν / ἐπιστεύθη in relation to apostolic proclamation
  chosen_reading: 'Translated with the ordinary sense of believing the apostolic testimony:
    ''all who have believed—because our testimony to you was believed.'''
  alternative_readings:
  - '''all who believed'' with simple past aspect'
  - '''all who trusted'' emphasizing personal reliance'
  rationale: No special doctrinally loaded rendering is required here. The default
    rendering of πιστεύω-related language is maintained with 'believed,' which fits
    both occurrences and preserves lexical consistency.
  doctrine_reference: 'Contested terms table: πίστις default ''faith''; related πιστεύω
    rendered with belief/faith language as context requires.'
