id: 2TH.1.10
reference: 2 Thessalonians 1:10
source:
  edition: SBLGNT
  text: ὅταν ἔλθῃ ἐνδοξασθῆναι ἐν τοῖς ἁγίοις αὐτοῦ καὶ θαυμασθῆναι ἐν πᾶσιν τοῖς
    πιστεύσασιν, ὅτι ἐπιστεύθη τὸ μαρτύριον ἡμῶν ἐφ’ ὑμᾶς, ἐν τῇ ἡμέρᾳ ἐκείνῃ.
translation:
  text: when he comes to be glorified among his saints and to be marveled at among
    all who have believed—because our testimony to you was believed—on that day.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in his saints.' The Greek preposition can suggest either that he is
      glorified among his holy people or that his glory is displayed in them.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅταν ἔλθῃ
  chosen: when he comes
  alternatives:
  - when he shall come
  - whenever he comes
  lexicon: BDAG
  rationale: ὅταν with the aorist subjunctive ἔλθῃ is a temporal clause referring
    here to a definite future event. 'When he comes' is natural modern English and
    preserves the future-oriented sense without archaic wording.
- source_word: ἐνδοξασθῆναι
  chosen: to be glorified
  alternatives:
  - to be shown in glory
  - to be honored
  lexicon: BDAG
  rationale: 'The aorist passive infinitive expresses purpose/result with ἔλθῃ: he
    comes ''to be glorified.'' This preserves the divine-glory sense better than the
    weaker ''honored.'''
- source_word: ἐν τοῖς ἁγίοις αὐτοῦ
  chosen: among his saints
  alternatives:
  - in his saints
  - among his holy ones
  lexicon: BDAG
  rationale: ἐν can be rendered 'in' or 'among' here. 'Among' communicates the corporate
    setting in idiomatic English while still allowing the sense that his glory is
    displayed in relation to his holy people. 'Saints' is retained as the established
    rendering of ἅγιοι in Pauline usage; 'holy ones' is possible but less natural
    here.
- source_word: θαυμασθῆναι
  chosen: to be marveled at
  alternatives:
  - to be admired
  - to be wondered at
  lexicon: BDAG
  rationale: The passive infinitive parallels ἐνδοξασθῆναι. 'Marveled at' best conveys
    astonished admiration without flattening the force to mere approval, as 'admired'
    might.
- source_word: ἐν πᾶσιν τοῖς πιστεύσασιν
  chosen: among all who have believed
  alternatives:
  - in all who have believed
  - among all believers
  lexicon: BDAG
  rationale: The dative plural participle πιστεύσασιν refers to those who believed
    the gospel. 'All who have believed' preserves the verbal force of the participle
    better than the nominal shorthand 'believers.' 'Among' matches the earlier ἐν
    phrase for parallelism in English.
- source_word: ὅτι
  chosen: because
  alternatives:
  - for
  - that
  lexicon: BDAG
  rationale: Here ὅτι gives the reason the Thessalonians are included among those
    who have believed. 'Because' makes the causal relation explicit in contemporary
    English.
- source_word: ἐπιστεύθη
  chosen: was believed
  alternatives:
  - was trusted
  - was accepted in faith
  lexicon: BDAG
  rationale: The passive of πιστεύω with τὸ μαρτύριον as subject means the testimony
    was believed. 'Was believed' is the most direct and transparent rendering.
- source_word: τὸ μαρτύριον ἡμῶν
  chosen: our testimony
  alternatives:
  - our witness
  - the testimony from us
  lexicon: BDAG
  rationale: μαρτύριον in this context refers to apostolic witness/proclamation. 'Our
    testimony' is concise and idiomatic, while still preserving the evidentiary/witness
    nuance.
- source_word: ἐφ’ ὑμᾶς
  chosen: to you
  alternatives:
  - among you
  - concerning you
  lexicon: BDAG
  rationale: With verbs/nouns of communication, ἐπί plus accusative can indicate direction
    toward persons. 'To you' best fits the sense that the apostolic testimony was
    delivered to and believed by the Thessalonians. 'Concerning you' is possible grammatically
    but less likely in context.
- source_word: ἐν τῇ ἡμέρᾳ ἐκείνῃ
  chosen: on that day
  alternatives:
  - in that day
  lexicon: BDAG
  rationale: This is a standard temporal expression. 'On that day' is idiomatic English
    and preserves the eschatological solemnity.
