id: 2TH.1.2
reference: 2 Thessalonians 1:2
source:
  edition: SBLGNT
  text: χάρις ὑμῖν καὶ εἰρήνη ἀπὸ θεοῦ ⸀πατρὸς καὶ κυρίου Ἰησοῦ Χριστοῦ.
translation:
  text: Grace to you and peace from God our Father and the Lord Jesus Messiah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Jesus Christ.' The Greek title Χριστός can be rendered 'Christ' or 'Messiah';
      here 'Messiah' preserves the title's meaning.
    reason: alternative_reading
lexical_decisions:
- source_word: χάρις
  chosen: Grace
  alternatives:
  - favor
  lexicon: BDAG
  rationale: In Pauline greetings, χάρις is a conventional yet theologically weighty
    blessing. 'Grace' preserves both the greeting formula and Paul's characteristic
    theological usage better than the less established 'favor'.
- source_word: ὑμῖν
  chosen: to you
  alternatives:
  - for you
  lexicon: BDAG
  rationale: The dative here is idiomatically rendered 'to you' in epistolary blessing
    formulas in English.
- source_word: εἰρήνη
  chosen: peace
  lexicon: BDAG
  rationale: Standard rendering that preserves both the Greek sense and the likely
    resonance with the Jewish greeting concept of wholeness and well-being.
- source_word: ἀπὸ
  chosen: from
  lexicon: BDAG
  rationale: The preposition marks source/origin of the blessing; 'from' is the natural
    and accurate English equivalent.
- source_word: θεοῦ πατρὸς
  chosen: God our Father
  alternatives:
  - God the Father
  - God the Father of us
  lexicon: BDAG
  rationale: Although the Greek text here reads 'from God Father' without an explicit
    ἡμῶν ('our'), the standard epistolary formula in Paul and natural English idiom
    support 'God our Father.' This also reflects the likely intended relational sense
    rather than an awkwardly literal 'God Father.'
- source_word: κυρίου
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Per doctrine defaults, κύριος is rendered 'Lord.' This preserves both
    its titular force and its established New Testament usage.
- source_word: Ἰησοῦ Χριστοῦ
  chosen: Jesus Messiah
  alternatives:
  - Jesus Christ
  lexicon: BDAG
  rationale: Per doctrine defaults, Χριστός is rendered 'Messiah' where it functions
    as a title rather than a fixed name-like element. In this greeting formula, the
    titular sense remains intelligible in English, so 'Jesus Messiah' best preserves
    meaning from the Greek.
