theological_decisions:
- issue: Supplying 'our' with 'Father' although not explicit in the printed Greek
    text
  chosen_reading: God our Father
  alternative_readings:
  - God Father
  - God the Father
  rationale: The phrase is a standard Pauline greeting formula, and English normally
    requires a determiner or possessive before 'Father' in this construction. 'Our
    Father' best communicates the relational sense naturally and coheres with the
    parallel in closely related greetings, without adding a new doctrinal claim beyond
    the idiom already present in Paul's usage.
  doctrine_reference: 'Translation philosophy: optimal equivalence; readable modern
    English, not archaic or academic.'
