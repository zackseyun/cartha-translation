id: 2TH.1.1
reference: 2 Thessalonians 1:1
source:
  edition: SBLGNT
  text: Παῦλος καὶ Σιλουανὸς καὶ Τιμόθεος τῇ ἐκκλησίᾳ Θεσσαλονικέων ἐν θεῷ πατρὶ ἡμῶν
    καὶ κυρίῳ Ἰησοῦ Χριστῷ·
translation:
  text: 'Paul and Silvanus and Timothy, to the church of the Thessalonians in God
    our Father and the Lord Jesus Christ:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Jesus Christ.' The Greek title Χριστός can be rendered 'Messiah' or,
      more traditionally, 'Christ.'
    reason: alternative_reading
  - marker: b
    text: Or 'the Lord Jesus the Messiah'.
    reason: previous_rendering
lexical_decisions:
- source_word: Παῦλος
  chosen: Paul
  lexicon: BDAG
  rationale: Standard English transliteration of the personal name Παῦλος.
- source_word: Σιλουανὸς
  chosen: Silvanus
  alternatives:
  - Silas
  lexicon: BDAG
  rationale: The Greek text reads Σιλουανός, so the direct transliteration 'Silvanus'
    is preferred over harmonizing to the shortened form 'Silas' known from Acts.
- source_word: Τιμόθεος
  chosen: Timothy
  lexicon: BDAG
  rationale: Standard English transliteration of the personal name Τιμόθεος.
- source_word: ἐκκλησίᾳ
  chosen: church
  alternatives:
  - assembly
  lexicon: BDAG
  rationale: In Pauline epistolary usage, ἐκκλησία conventionally denotes the gathered
    Christian community. 'Church' is the most natural modern equivalent while still
    reflecting the communal sense.
- source_word: Θεσσαλονικέων
  chosen: of the Thessalonians
  alternatives:
  - in Thessalonica
  lexicon: BDAG
  rationale: The genitive plural refers to the people, not directly to the city name.
    'Of the Thessalonians' preserves the Greek wording more closely than converting
    it to a locative expression.
- source_word: ἐν
  chosen: in
  alternatives:
  - belonging to
  - established in
  lexicon: BDAG
  rationale: The preposition ἐν is retained as 'in' to preserve Paul's theological
    phrasing about the church's sphere or union in relation to God the Father and
    the Lord Jesus.
- source_word: θεῷ πατρὶ ἡμῶν
  chosen: God our Father
  alternatives:
  - God the Father
  lexicon: BDAG
  rationale: The anarthrous construction with possessive pronoun is most naturally
    rendered 'God our Father.' This preserves the explicit possessive ἡμῶν rather
    than smoothing to the more titular 'God the Father.'
- source_word: κυρίῳ
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Per the doctrine guidelines for κύριος, 'Lord' is the default rendering
    and best matches New Testament usage here as a title for Jesus.
- source_word: Χριστῷ
  chosen: Messiah
  alternatives:
  - Christ
  lexicon: BDAG
  rationale: Per the doctrine guidelines, Χριστός is rendered 'Messiah' where it functions
    as a title. In this greeting, 'Jesus Messiah' preserves the titular force better
    than the more name-like traditional 'Jesus Christ'.
