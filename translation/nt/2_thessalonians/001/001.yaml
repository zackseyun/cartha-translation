theological_decisions:
- issue: Rendering Χριστῷ in the name-title sequence Ἰησοῦ Χριστῷ
  chosen_reading: Messiah
  alternative_readings:
  - Christ
  rationale: The translation philosophy directs that Christological titles be translated
    where context supports title force. In this epistolary greeting, Χριστός still
    functions as a title attached to Jesus, so 'Messiah' is preferred, while the traditional
    'Christ' is preserved as an alternative.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; Contested
    terms table for Χριστός'
- issue: Relation expressed by ἐν θεῷ πατρὶ ἡμῶν καὶ κυρίῳ Ἰησοῦ Χριστῷ
  chosen_reading: in God our Father and the Lord Jesus Messiah
  alternative_readings:
  - belonging to God our Father and the Lord Jesus Messiah
  - established in God our Father and the Lord Jesus Messiah
  rationale: The Greek preposition ἐν is left as 'in' rather than interpreted more
    expansively. This preserves the theological tension of sphere, union, or grounding
    without over-resolving Paul's compressed greeting formula.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it'
revisions:
- timestamp: '2026-04-21T02:23:51Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/nt/2_thessalonians/001/001.json
  category: awkward_english
  tier: 1
  from: the Lord Jesus the Messiah
  to: the Lord Jesus Messiah
  rationale: The current rendering, "the Lord Jesus the Messiah," is slightly redundant
    and rhythmically awkward due to the inclusion of the second article ("the"). While
    the intent to emphasize the titular nature of 'Messiah' is understandable, the
    Greek phrase 'κυρίῳ Ἰησοῦ Χριστῷ' functions as a single, cohesive name-title block.
    Rendering it as "the Lord Jesus Messiah" maintains the project's preference for
    "Messiah" while creating a smoother, more natural English phrase that is analogous
    to the traditional "the Lord Jesus Christ." The single initial article can be
    understood to govern the entire name-title complex.
