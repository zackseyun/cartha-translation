id: 2TH.1.6
reference: 2 Thessalonians 1:6
source:
  edition: SBLGNT
  text: εἴπερ δίκαιον παρὰ θεῷ ἀνταποδοῦναι τοῖς θλίβουσιν ὑμᾶς θλῖψιν
translation:
  text: since it is just before God to repay affliction to those who afflict you
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'if indeed it is righteous with God to repay tribulation to those who
      afflict you.'
    reason: lexical_alternative
lexical_decisions:
- source_word: εἴπερ
  chosen: since
  alternatives:
  - if indeed
  - if after all
  lexicon: BDAG
  rationale: In this context εἴπερ introduces a premise Paul assumes to be true for
    rhetorical force, not a doubtful condition. 'Since' communicates the assumed reality
    more naturally in English while preserving the logical connection to the surrounding
    sentence.
- source_word: δίκαιον
  chosen: just
  alternatives:
  - righteous
  - right
  lexicon: BDAG
  rationale: The adjective here describes what is morally proper in God's judgment.
    'Just' best fits the judicial context of recompense in this verse, whereas 'righteous'
    would sound less idiomatic in English here.
- source_word: παρὰ θεῷ
  chosen: before God
  alternatives:
  - with God
  - in God's sight
  lexicon: BDAG
  rationale: The phrase indicates evaluation in relation to God, i.e., in God's judgment
    or sight. 'Before God' is concise and natural, preserving the sense that this
    justice is measured according to God's standard.
- source_word: ἀνταποδοῦναι
  chosen: to repay
  alternatives:
  - to recompense
  - to pay back
  lexicon: BDAG
  rationale: '''Repay'' captures the idea of giving back in return, fitting the context
    of divine retribution. ''Pay back'' can sound colloquial; ''recompense'' is more
    formal than needed.'
- source_word: τοῖς θλίβουσιν ὑμᾶς
  chosen: to those who afflict you
  alternatives:
  - to those who trouble you
  - to those who oppress you
  lexicon: BDAG
  rationale: The participle θλίβουσιν denotes causing distress, pressure, or persecution.
    'Afflict' preserves the gravity and verbal link with θλῖψιν in the same verse
    better than the weaker 'trouble.'
- source_word: θλῖψιν
  chosen: affliction
  alternatives:
  - tribulation
  - distress
  - trouble
  lexicon: BDAG
  rationale: Using 'affliction' preserves the lexical connection with θλίβουσιν ('afflict')
    and communicates suffering imposed on the persecutors as recompense. 'Tribulation'
    is traditional but less natural for modern readers; 'trouble' is too weak.
