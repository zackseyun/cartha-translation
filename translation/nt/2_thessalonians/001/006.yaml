theological_decisions:
- issue: Nature of divine recompense
  chosen_reading: The verse states that God justly repays persecutors with affliction,
    without specifying the full timing or mode of that judgment in this clause.
  alternative_readings:
  - The affliction is exclusively eschatological.
  - The affliction includes present historical judgments as well as final judgment.
  rationale: The Greek affirms the justice of God's recompense but does not itself
    resolve all questions about when or how that recompense is executed. The translation
    therefore keeps the statement general and does not import a narrower doctrinal
    scheme.
  doctrine_reference: Preserve theological tension rather than resolve it.
