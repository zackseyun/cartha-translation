id: 2TH.1.12
reference: 2 Thessalonians 1:12
source:
  edition: SBLGNT
  text: ὅπως ἐνδοξασθῇ τὸ ὄνομα τοῦ κυρίου ἡμῶν Ἰησοῦ ἐν ὑμῖν, καὶ ὑμεῖς ἐν αὐτῷ,
    κατὰ τὴν χάριν τοῦ θεοῦ ἡμῶν καὶ κυρίου Ἰησοῦ Χριστοῦ.
translation:
  text: so that the name of our Lord Jesus may be glorified in you, and you in him,
    according to the grace of our God and Lord Jesus Messiah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'among you' for 'in you.' The Greek preposition can carry either nuance
      in context.
    reason: lexical_alternative
  - marker: b
    text: Or 'Christ' instead of 'Messiah.' The Greek title is Χριστός.
    reason: alternative_reading
  - marker: c
    text: The final phrase may be understood either as closely linking 'God' and 'Lord
      Jesus Messiah' in one expression, or as referring distinctly to 'our God' and
      'the Lord Jesus Messiah.' The translation preserves the Greek wording without
      forcing the question.
    reason: alternative_reading
lexical_decisions:
- source_word: ὅπως
  chosen: so that
  alternatives:
  - in order that
  lexicon: BDAG
  rationale: Introduces purpose/result flowing from the previous prayer. 'So that'
    is natural modern English while preserving the telic force.
- source_word: ἐνδοξασθῇ
  chosen: may be glorified
  alternatives:
  - may be honored
  - may be made glorious
  lexicon: BDAG
  rationale: Aorist passive subjunctive expressing desired result. 'May be glorified'
    preserves both the passive form and the theological weight of δοξ- language better
    than flatter alternatives.
- source_word: τὸ ὄνομα
  chosen: the name
  lexicon: BDAG
  rationale: Retained literally. In biblical usage 'name' can stand for the person's
    revealed identity and reputation, but the text itself says 'name,' so the metonymy
    is preserved rather than paraphrased.
- source_word: τοῦ κυρίου ἡμῶν Ἰησοῦ
  chosen: of our Lord Jesus
  alternatives:
  - of Jesus our Lord
  lexicon: BDAG
  rationale: κύριος is rendered 'Lord' per doctrine default. Word order chosen for
    natural English while preserving possession and title.
- source_word: ἐν ὑμῖν
  chosen: in you
  alternatives:
  - among you
  lexicon: BDAG
  rationale: ἐν with plural dative can mean either 'in' or 'among.' 'In you' best
    preserves the Greek form and the likely sense that Christ's name is glorified
    in the Thessalonian believers themselves, though the corporate nuance remains
    possible.
- source_word: καὶ ὑμεῖς ἐν αὐτῷ
  chosen: and you in him
  alternatives:
  - and you in it
  - and you by him
  lexicon: BDAG
  rationale: 'The parallel structure is preserved: the Lord is glorified in believers,
    and believers in him. αὐτῷ is most naturally masculine, referring back to the
    Lord Jesus rather than to ''name.'''
- source_word: κατὰ τὴν χάριν
  chosen: according to the grace
  alternatives:
  - in keeping with the grace
  - by the grace
  lexicon: BDAG
  rationale: κατά with the accusative here expresses standard or basis. 'According
    to' is the most transparent rendering and avoids over-interpreting instrumentality.
- source_word: χάριν
  chosen: grace
  alternatives:
  - favor
  lexicon: BDAG
  rationale: '''Grace'' is the established and theologically appropriate rendering
    for χάρις in Pauline contexts.'
- source_word: τοῦ θεοῦ ἡμῶν καὶ κυρίου Ἰησοῦ Χριστοῦ
  chosen: of our God and Lord Jesus Messiah
  alternatives:
  - of our God and the Lord Jesus Messiah
  - of God and of the Lord Jesus Christ
  lexicon: BDAG
  rationale: Χριστοῦ is rendered 'Messiah' because it functions as a title, per doctrine
    guidance. The Greek construction naturally reads with a close linkage between
    'God' and 'Lord Jesus Messiah'; the English preserves that linkage without adding
    words absent from the text.
