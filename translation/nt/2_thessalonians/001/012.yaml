theological_decisions:
- issue: Rendering Χριστοῦ
  chosen_reading: Messiah
  alternative_readings:
  - Christ
  rationale: Per doctrine guidance, Χριστός is translated 'Messiah' where it functions
    as a title rather than a fixed name-like form. Here 'Jesus Messiah' preserves
    the title's meaning.
  doctrine_reference: 'DOCTRINE.md Contested terms: Χριστός → Messiah (where title;
    Christ where name-like)'
- issue: Referent of αὐτῷ
  chosen_reading: him (the Lord Jesus)
  alternative_readings:
  - it (the name)
  rationale: Although a grammatical back-reference to 'name' is formally possible,
    the masculine pronoun and the reciprocal glorification pattern strongly favor
    reference to the Lord Jesus himself. This also fits Pauline union-with-Christ
    language ('in him').
  doctrine_reference: Preserve theological tension rather than resolve it; ambiguity
    documented per verse
- issue: Force of the final genitive phrase
  chosen_reading: 'A closely linked expression: ''our God and Lord Jesus Messiah'''
  alternative_readings:
  - 'Two distinct referents: ''our God'' and ''the Lord Jesus Messiah'''
  rationale: The single article before θεοῦ with καί joining κυρίου Ἰησοῦ Χριστοῦ
    creates a syntactically close linkage often discussed in relation to Granville
    Sharp-like constructions. Because the phrase is debated, the translation preserves
    the Greek's compact form without inserting clarifying words that would force either
    interpretation beyond the text.
  doctrine_reference: 'Affirmations: Nicene Creed; Translation philosophy: preserve
    theological tension rather than resolve it'
