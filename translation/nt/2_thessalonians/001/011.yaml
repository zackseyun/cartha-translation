theological_decisions:
- issue: Sense of ἀξιώσῃ in relation to divine calling
  chosen_reading: may count you worthy of the calling
  alternative_readings:
  - may make you worthy of the calling
  rationale: This avoids implying that believers establish their own worthiness while
    still preserving the prayer that God would regard them as fitting participants
    in his call. The Greek verb can bear either nuance, so the alternative is preserved
    in a footnote rather than excluded.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Rendering of πίστις in ἔργον πίστεως
  chosen_reading: faith
  alternative_readings:
  - faithfulness
  - trust
  rationale: Following the doctrine table, πίστις defaults to 'faith.' Because the
    genitive could be heard as work arising from faith or characterized by faithfulness,
    the lexical alternative is preserved in a footnote without forcing a narrower
    doctrinal reading.
  doctrine_reference: 'Contested terms table: πίστις → faith; footnote alternatives
    where contested.'
