id: 2TH.1.4
reference: 2 Thessalonians 1:4
source:
  edition: SBLGNT
  text: ὥστε ⸂αὐτοὺς ἡμᾶς⸃ ἐν ὑμῖν ⸀ἐγκαυχᾶσθαι ἐν ταῖς ἐκκλησίαις τοῦ θεοῦ ὑπὲρ τῆς
    ὑπομονῆς ὑμῶν καὶ πίστεως ἐν πᾶσιν τοῖς διωγμοῖς ὑμῶν καὶ ταῖς θλίψεσιν αἷς ἀνέχεσθε,
translation:
  text: so that we ourselves boast about you among the churches of God because of
    your perseverance and faith in all your persecutions and afflictions that you
    are enduring,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'faithfulness'; πίστις can denote either faith or steadfast fidelity,
      especially in contexts of suffering.
    reason: alternative_reading
lexical_decisions:
- source_word: ὥστε
  chosen: so that
  alternatives:
  - therefore
  - as a result that
  lexicon: BDAG
  rationale: Introduces the result of the preceding statement. 'So that' preserves
    the inferential/result nuance naturally in English.
- source_word: αὐτοὺς ἡμᾶς
  chosen: we ourselves
  alternatives:
  - we ourselves indeed
  - we ourselves also
  lexicon: BDAG
  rationale: The emphatic pronoun construction highlights Paul and his companions
    personally. 'We ourselves' captures the emphasis without awkwardness.
- source_word: ἐν ὑμῖν
  chosen: about you
  alternatives:
  - in your case
  - concerning you
  lexicon: BDAG
  rationale: With verbs of boasting, ἐν plus persons can indicate the basis or object
    of boasting. 'About you' is the most idiomatic English expression here.
- source_word: ἐγκαυχᾶσθαι
  chosen: boast
  alternatives:
  - take pride
  - glory
  lexicon: BDAG
  rationale: The verb means to boast or take pride in. 'Boast' is direct and preserves
    Paul's strong rhetoric without softening it.
- source_word: ἐν ταῖς ἐκκλησίαις τοῦ θεοῦ
  chosen: among the churches of God
  alternatives:
  - in the churches of God
  lexicon: BDAG
  rationale: The phrase indicates the sphere/community within which the boasting occurs.
    'Among' reads more naturally in English while preserving the plural assemblies
    belonging to God.
- source_word: ὑπὲρ
  chosen: because of
  alternatives:
  - concerning
  - on account of
  lexicon: BDAG
  rationale: Here ὑπέρ introduces the grounds for the boasting. 'Because of' clearly
    expresses that causal sense.
- source_word: ὑπομονῆς
  chosen: perseverance
  alternatives:
  - steadfastness
  - endurance
  lexicon: BDAG
  rationale: The term denotes patient endurance under pressure. 'Perseverance' fits
    the context of ongoing persecution and remains accessible modern English.
- source_word: πίστεως
  chosen: faith
  alternatives:
  - faithfulness
  - trust
  lexicon: BDAG
  rationale: Following the project's default for πίστις, the main text uses 'faith.'
    In this context it may shade toward fidelity under trial, so alternatives are
    preserved in a footnote.
- source_word: ἐν πᾶσιν τοῖς διωγμοῖς ὑμῶν καὶ ταῖς θλίψεσιν
  chosen: in all your persecutions and afflictions
  alternatives:
  - amid all your persecutions and troubles
  - in all your persecutions and tribulations
  lexicon: BDAG
  rationale: ἐν is locative/situational here, indicating the circumstances in which
    their perseverance and faith are displayed. 'Persecutions and afflictions' preserves
    the distinction between hostile opposition (διωγμοί) and broader pressures/distresses
    (θλίψεις).
- source_word: διωγμοῖς
  chosen: persecutions
  alternatives:
  - pursuits
  - harassments
  lexicon: BDAG
  rationale: In NT usage this refers to hostile oppression for one's allegiance. 'Persecutions'
    is the standard and clearest rendering.
- source_word: θλίψεσιν
  chosen: afflictions
  alternatives:
  - troubles
  - distresses
  - tribulations
  lexicon: BDAG
  rationale: The word denotes pressures, troubles, or afflictions. 'Afflictions' is
    readable and weighty without sounding overly archaic.
- source_word: αἷς ἀνέχεσθε
  chosen: that you are enduring
  alternatives:
  - which you are bearing up under
  - which you endure
  lexicon: BDAG
  rationale: ἀνέχομαι here means to endure or put up with. The present tense suggests
    ongoing experience, well conveyed by 'are enduring.'
