theological_decisions:
- issue: Rendering of πίστις in a context where both 'faith' and 'faithfulness' are
    plausible
  chosen_reading: faith
  alternative_readings:
  - faithfulness
  - trust
  rationale: Per DOCTRINE.md, πίστις defaults to 'faith' in the main text, while alternatives
    should be preserved in a footnote where context makes them plausible. Here Paul
    may refer both to continued belief and steadfast fidelity under persecution; the
    translation preserves the default in the text and notes the alternative.
  doctrine_reference: 'DOCTRINE.md: Contested terms table for πίστις; Translation
    philosophy §3'
