theological_decisions:
- issue: Relation of suffering to worthiness for the kingdom
  chosen_reading: The verse states that their suffering serves as evidence within
    God's righteous judgment, with the purpose/result that they are counted worthy
    of the kingdom; it does not teach that suffering merits entry into the kingdom.
  alternative_readings:
  - Their suffering earns or achieves worthiness for the kingdom.
  rationale: The passive καταξιωθῆναι means 'to be counted/considered worthy,' and
    the syntax presents suffering as connected to God's righteous judgment rather
    than as meritorious payment. This preserves the text's theological tension without
    importing a doctrine of merit.
  doctrine_reference: Translation philosophy §3; Affirmations (historic ecumenical
    orthodoxy)
