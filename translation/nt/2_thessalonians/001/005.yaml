id: 2TH.1.5
reference: 2 Thessalonians 1:5
source:
  edition: SBLGNT
  text: ἔνδειγμα τῆς δικαίας κρίσεως τοῦ θεοῦ, εἰς τὸ καταξιωθῆναι ὑμᾶς τῆς βασιλείας
    τοῦ θεοῦ, ὑπὲρ ἧς καὶ πάσχετε,
translation:
  text: This is evidence of the righteous judgment of God, so that you may be counted
    worthy of the kingdom of God, for which you are also suffering,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'proof' or 'sign' of God's righteous judgment.
    reason: lexical_alternative
  - marker: b
    text: Or 'for you to be considered worthy' or 'resulting in your being counted
      worthy.' The Greek construction may express purpose or result.
    reason: alternative_reading
  - marker: c
    text: Or 'for the sake of which' or 'on behalf of which.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔνδειγμα
  chosen: evidence
  alternatives:
  - proof
  - indication
  - sign
  lexicon: BDAG
  rationale: ἔνδειγμα denotes something that demonstrates or points to a reality.
    'Evidence' is natural English and preserves the inferential force without overstating
    it as conclusive 'proof.' The implied subject ('This is') is supplied because
    the Greek is a verbless fragment dependent on the previous verse.
- source_word: δικαίας κρίσεως
  chosen: righteous judgment
  alternatives:
  - just judgment
  lexicon: BDAG
  rationale: The adjective-noun pairing is rendered straightforwardly. 'Righteous
    judgment' preserves the moral quality of God's judgment and aligns with common
    biblical diction; 'just judgment' is possible but slightly flattens the theological
    resonance of δίκαιος.
- source_word: εἰς τὸ καταξιωθῆναι
  chosen: so that you may be counted worthy
  alternatives:
  - for you to be considered worthy
  - resulting in your being counted worthy
  lexicon: BDAG
  rationale: The preposition plus articular infinitive expresses purpose or result.
    In context, 'so that' communicates the forward movement well in idiomatic English.
    καταξιόω in the passive means 'to consider/count worthy,' not to make inherently
    worthy.
- source_word: βασιλείας τοῦ θεοῦ
  chosen: the kingdom of God
  alternatives:
  - God's kingdom
  lexicon: BDAG
  rationale: Standard and transparent rendering of the genitive phrase. 'The kingdom
    of God' preserves the familiar biblical expression and its theological weight.
- source_word: ὑπὲρ ἧς
  chosen: for which
  alternatives:
  - on behalf of which
  - for the sake of which
  lexicon: BDAG
  rationale: ὑπέρ with the genitive can mean 'for the sake of' or 'on behalf of.'
    Here it links their suffering to the kingdom; 'for which' is concise and idiomatic
    while preserving the causal/benefactive sense.
- source_word: καὶ πάσχετε
  chosen: you are also suffering
  alternatives:
  - you also suffer
  lexicon: BDAG
  rationale: Present tense is rendered progressively to fit the ongoing persecution
    context. καί is retained as 'also,' linking this suffering with the preceding
    mention of afflictions.
