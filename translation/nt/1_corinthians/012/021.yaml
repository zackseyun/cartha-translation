id: 1CO.12.21
reference: 1 Corinthians 12:21
source:
  edition: SBLGNT
  text: οὐ δύναται δὲ ὁ ὀφθαλμὸς εἰπεῖν τῇ χειρί· Χρείαν σου οὐκ ἔχω, ἢ πάλιν ἡ κεφαλὴ
    τοῖς ποσίν· Χρείαν ὑμῶν οὐκ ἔχω·
translation:
  text: But the eye cannot say to the hand, ‘I have no need of you,’ or again the
    head to the feet, ‘I have no need of you.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek 'you' in the second clause is plural, addressed to the 'feet.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐ δύναται
  chosen: cannot
  alternatives:
  - is not able to
  - is unable to
  lexicon: BDAG
  rationale: Combines the negation and δύναμαι into natural English while preserving
    the sense of inability, not mere impropriety.
- source_word: δὲ
  chosen: But
  alternatives:
  - Now
  - And
  lexicon: BDAG
  rationale: Marks contrast with the preceding discussion about the body's interdependence;
    'But' best carries the adversative force in context.
- source_word: ὁ ὀφθαλμός
  chosen: the eye
  lexicon: BDAG
  rationale: Literal body-part imagery should be preserved because Paul is extending
    the metaphor of the body.
- source_word: εἰπεῖν
  chosen: say
  alternatives:
  - declare
  - tell
  lexicon: BDAG
  rationale: Simple, idiomatic rendering of the infinitive after δύναται in indirect
    construction.
- source_word: τῇ χειρί
  chosen: to the hand
  lexicon: BDAG
  rationale: Dative of indirect object; literal rendering preserves the body metaphor.
- source_word: Χρείαν σου οὐκ ἔχω
  chosen: I have no need of you
  alternatives:
  - I do not need you
  - I have no use for you
  lexicon: BDAG
  rationale: Retains the noun χρεία ('need') rather than flattening to a purely verbal
    form. 'No use for you' is too dismissive and slightly stronger than the Greek.
- source_word: ἢ πάλιν
  chosen: or again
  alternatives:
  - or on the other hand
  - or likewise
  lexicon: BDAG
  rationale: πάλιν here introduces a second analogous example; 'or again' is concise
    and natural.
- source_word: ἡ κεφαλή
  chosen: the head
  lexicon: BDAG
  rationale: Literal rendering preserves the metaphorical body imagery.
- source_word: τοῖς ποσίν
  chosen: to the feet
  lexicon: BDAG
  rationale: Plural dative rendered straightforwardly; the plural is important to
    preserve the image.
- source_word: ὑμῶν
  chosen: you
  alternatives:
  - you all
  lexicon: BDAG
  rationale: The Greek plural distinguishes the feet from the singular hand, but standard
    English 'you' is idiomatic here. The plural nuance is preserved implicitly by
    'feet' and can be noted in a footnote.
