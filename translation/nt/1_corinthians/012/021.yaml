theological_decisions:
- issue: Metaphorical body language for church interdependence
  chosen_reading: Preserve the literal body-part imagery without interpretive expansion
  alternative_readings:
  - Explicitly interpret as members of the church in the main text
  rationale: Paul's theological point depends on the metaphor itself. Adding interpretive
    explanation in the main text would go beyond translation into commentary.
  doctrine_reference: 'Translation philosophy: Never paraphrase beyond what the source
    text warrants; preserve theological tension rather than resolve it.'
