id: 1CO.12.23
reference: 1 Corinthians 12:23
source:
  edition: SBLGNT
  text: καὶ ἃ δοκοῦμεν ἀτιμότερα εἶναι τοῦ σώματος, τούτοις τιμὴν περισσοτέραν περιτίθεμεν,
    καὶ τὰ ἀσχήμονα ἡμῶν εὐσχημοσύνην περισσοτέραν ἔχει,
translation:
  text: and those parts of the body that we think to be less honorable, on these we
    bestow greater honor, and our unpresentable parts have greater propriety,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'our less presentable parts.' The Greek term can refer to what is unseemly
      or not fit for public display.
    reason: lexical_alternative
  - marker: b
    text: Or 'greater presentability' or 'greater comeliness.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἃ δοκοῦμεν
  chosen: those ... that we think
  alternatives:
  - those ... that we consider
  - those ... that seem to us
  lexicon: BDAG
  rationale: δοκέω here expresses human evaluation or judgment, not objective reality.
    'We think' is natural modern English and preserves Paul's rhetorical contrast
    between perceived lesser status and bestowed honor.
- source_word: ἀτιμότερα
  chosen: less honorable
  alternatives:
  - less esteemed
  - more dishonorable
  lexicon: BDAG
  rationale: Comparative of ἄτιμος. 'Less honorable' fits the comparative sense in
    context better than the harsher 'more dishonorable,' and matches the honor/shame
    contrast with τιμή.
- source_word: τοῦ σώματος
  chosen: of the body
  lexicon: BDAG
  rationale: Straightforward genitive specifying the whole of which these are parts.
    Retained formally because the body metaphor is central to the passage.
- source_word: τούτοις
  chosen: on these
  alternatives:
  - to these
  - upon these
  lexicon: BDAG
  rationale: With περιτίθεμεν, the idiom is of placing or putting something on someone/something.
    'On these' best reflects the embodied imagery of clothing/adornment.
- source_word: τιμὴν περισσοτέραν
  chosen: greater honor
  alternatives:
  - more abundant honor
  - special honor
  lexicon: BDAG
  rationale: τιμή is 'honor,' and περισσοτέραν is comparative 'greater/more.' 'Greater
    honor' is idiomatic and preserves the comparison without overinterpreting.
- source_word: περιτίθεμεν
  chosen: we bestow
  alternatives:
  - we place
  - we put on
  lexicon: BDAG
  rationale: Though literally 'put around/on,' in this context of assigning honor
    to body parts the idiomatic sense is 'bestow.' This balances formal imagery with
    readable English.
- source_word: τὰ ἀσχήμονα ἡμῶν
  chosen: our unpresentable parts
  alternatives:
  - our indecent parts
  - our less presentable parts
  - our unbecoming parts
  lexicon: BDAG
  rationale: ἀσχήμων can denote what is socially unseemly or not fit for display.
    'Unpresentable parts' communicates the bodily/social sense without importing moral
    indecency too strongly; it fits the immediate context of covering certain body
    parts.
- source_word: εὐσχημοσύνην
  chosen: propriety
  alternatives:
  - presentability
  - comeliness
  - modesty
  lexicon: BDAG
  rationale: The noun denotes seemliness or proper appearance. 'Propriety' captures
    the idea of suitable presentation, though the context also overlaps with outward
    presentability. A footnote preserves that lexical alternative.
- source_word: ἔχει
  chosen: have
  alternatives:
  - possess
  - receive
  lexicon: BDAG
  rationale: 'Though singular in form with neuter plural subject, standard Greek syntax
    takes a singular verb. English requires plural agreement: ''parts have.'''
