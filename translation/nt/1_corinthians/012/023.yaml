theological_decisions:
- issue: Metaphorical body language and social honor
  chosen_reading: Retain the concrete body-part language without softening it into
    a purely abstract statement about church members.
  alternative_readings:
  - Paraphrase as socially weaker members receiving respect
  rationale: Paul's argument depends on the analogy between literal bodily treatment
    and the church as Christ's body. Preserving the bodily imagery allows the theological
    application to emerge from the text rather than being imported into the translation.
  doctrine_reference: Translation philosophy §§1, 3, 6
