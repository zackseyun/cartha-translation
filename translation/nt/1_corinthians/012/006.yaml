id: 1CO.12.6
reference: 1 Corinthians 12:6
source:
  edition: SBLGNT
  text: καὶ διαιρέσεις ἐνεργημάτων εἰσίν, ⸂ὁ δὲ⸃ ⸀αὐτὸς θεός, ὁ ἐνεργῶν τὰ πάντα ἐν πᾶσιν.
translation:
  text: And there are varieties of workings, but it is the same God who works all things in all people.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more literally, 'in all.' The Greek does not state the noun explicitly; the context suggests people, that is, all members among whom God works these manifestations.
    reason: lexical_alternative
  - marker: b
    text: Or 'but the same God, who works all things in all people.'.
    reason: previous_rendering
lexical_decisions:
- source_word: διαιρέσεις
  chosen: varieties
  alternatives:
  - distributions
  - differences
  - diversities
  lexicon: BDAG
  rationale: In this context Paul is describing differentiated manifestations within unity (cf. vv. 4–5). 'Varieties' is natural English and preserves the sense of distinct kinds without implying division or conflict.
- source_word: ἐνεργημάτων
  chosen: workings
  alternatives:
  - activities
  - effects
  - operations
  lexicon: BDAG
  rationale: The noun denotes results or manifestations of divine activity. 'Workings' preserves the lexical connection with ἐνεργῶν later in the verse ('who works'), making Paul's wordplay and conceptual linkage visible in English better than the more abstract 'effects' or the less transparent 'operations.'
- source_word: ὁ δὲ αὐτὸς θεός
  chosen: but the same God
  alternatives:
  - and the same God
  - yet the same God
  lexicon: BDAG
  rationale: 'δέ here marks mild contrast within a parallel triad: varieties exist, but the source remains one. ''But'' best captures the adversative nuance in readable English. ''The same God'' preserves αὐτός as emphatic identity across the sequence of vv. 4–6.'
- source_word: ὁ ἐνεργῶν
  chosen: who works
  alternatives:
  - who is working
  - the one working
  - who accomplishes
  lexicon: BDAG
  rationale: The present participle is rendered with a relative clause for idiomatic English. 'Who works' is concise and preserves the ongoing, active sense while maintaining the lexical tie to ἐνεργημάτων.
- source_word: τὰ πάντα
  chosen: all things
  alternatives:
  - everything
  - all these things
  lexicon: BDAG
  rationale: The phrase is broad and comprehensive. 'All things' is slightly more formal than 'everything' and fits Paul's elevated style. 'All these things' would narrow the scope more than the Greek explicitly does, though the immediate context concerns spiritual manifestations.
- source_word: ἐν πᾶσιν
  chosen: in all people
  alternatives:
  - in everyone
  - in all
  - among all
  lexicon: BDAG
  rationale: The dative plural πᾶσιν is masculine and in context refers to the members of the body/community among whom God works these manifestations. 'In all people' makes the personal reference explicit in English and avoids an impersonal reading ('in all things'). A footnote preserves the more literal 'in all' because the Greek leaves the object unstated.
