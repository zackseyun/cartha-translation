theological_decisions:
- issue: Rendering the final item δυνάμεις in a role/gift list
  chosen_reading: Not all do miracles, do they?
  alternative_readings:
  - Not all are workers of miracles, are they?
  - Not all have miraculous powers, do they?
  rationale: The Greek uses a shorthand noun within a sequence of ministry roles and
    functions. Rendering it verbally in English communicates Paul's point that not
    every member exercises miraculous works, without implying that persons literally
    'are miracles.' This is a contextual, not doctrinal, decision.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve the source''s
    plain sense in readable modern English.'
