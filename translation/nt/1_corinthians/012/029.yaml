id: 1CO.12.29
reference: 1 Corinthians 12:29
source:
  edition: SBLGNT
  text: μὴ πάντες ἀπόστολοι; μὴ πάντες προφῆται; μὴ πάντες διδάσκαλοι; μὴ πάντες δυνάμεις;
translation:
  text: Not all are apostles, are they? Not all are prophets, are they? Not all are
    teachers, are they? Not all do miracles, do they?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'Not all are powers/miracles, are they?' The Greek uses
      'powers' as shorthand for miraculous works or those who perform them.
    reason: lexical_alternative
lexical_decisions:
- source_word: μὴ
  chosen: Not ... are they? / do they?
  alternatives:
  - surely not
  - all are not
  lexicon: BDAG
  rationale: μή introducing a question expects a negative answer. In English, this
    is best conveyed with a negative statement plus a tag question rather than a bare
    literal 'Are not all...?' which can sound stilted or ambiguous in modern English.
- source_word: πάντες
  chosen: all
  alternatives:
  - everyone
  lexicon: BDAG
  rationale: The adjective means 'all' and in this repeated construction emphasizes
    that the whole body does not share the same role or gift. 'All' preserves the
    rhetorical repetition of the Greek.
- source_word: ἀπόστολοι
  chosen: apostles
  alternatives:
  - messengers
  lexicon: BDAG
  rationale: In Pauline usage here the term refers to the recognized ministry role
    'apostles,' not merely generic messengers. Retaining 'apostles' preserves the
    ecclesial office/function in the list.
- source_word: προφῆται
  chosen: prophets
  lexicon: BDAG
  rationale: Standard rendering for those who prophesy; it fits the ministry-gift
    list context and is the natural English equivalent.
- source_word: διδάσκαλοι
  chosen: teachers
  alternatives:
  - instructors
  lexicon: BDAG
  rationale: '''Teachers'' is the normal and clearest rendering in a church-ministry
    context.'
- source_word: δυνάμεις
  chosen: do miracles
  alternatives:
  - are workers of miracles
  - have powers
  - perform mighty works
  lexicon: BDAG
  rationale: Although the noun literally means 'powers' or 'miracles,' in this list
    it stands metonymically for those exercising miraculous works, as the following
    verse continues with gifts of healings and related manifestations. 'Do miracles'
    is idiomatic modern English and matches the sense in context better than the overly
    literal 'are miracles/powers.'
