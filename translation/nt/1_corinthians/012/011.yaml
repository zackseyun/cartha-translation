id: 1CO.12.11
reference: 1 Corinthians 12:11
source:
  edition: SBLGNT
  text: πάντα δὲ ταῦτα ἐνεργεῖ τὸ ἓν καὶ τὸ αὐτὸ πνεῦμα, διαιροῦν ἰδίᾳ ἑκάστῳ καθὼς
    βούλεται.
translation:
  text: But one and the same Spirit works all these things, distributing to each one
    individually just as he wills.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'produces' or 'effects' all these things.
    reason: lexical_alternative
  - marker: b
    text: Greek 'one and the same Spirit,' emphasizing that the diverse gifts come
      from a single source.
    reason: cross_reference
  - marker: c
    text: Or 'apportioning' to each one.
    reason: lexical_alternative
  - marker: d
    text: Or 'just as he chooses.' The Greek verb can denote willing, choosing, or
      desiring.
    reason: lexical_alternative
lexical_decisions:
- source_word: πάντα δὲ ταῦτα
  chosen: But ... all these things
  alternatives:
  - Now all these things
  - And all these things
  lexicon: BDAG
  rationale: 'πάντα and ταῦτα together emphasize the totality of the manifestations
    just listed: ''all these things.'' δέ is rendered ''But'' to mark a mild continuative/contrastive
    transition from the preceding list to the single source behind it.'
- source_word: ἐνεργεῖ
  chosen: works
  alternatives:
  - produces
  - effects
  - is at work in
  lexicon: BDAG
  rationale: ἐνεργέω here denotes active causation or operation. 'Works' is natural
    English, preserves the verbal force, and avoids over-specifying mechanism while
    fitting Paul's style in this context.
- source_word: τὸ ἓν καὶ τὸ αὐτὸ πνεῦμα
  chosen: one and the same Spirit
  alternatives:
  - the one and the same Spirit
  - one and the very same Spirit
  lexicon: BDAG
  rationale: 'The article-adjective construction stresses identity and unity: the
    very same Spirit is the source of the diverse gifts. English idiom is best captured
    by ''one and the same Spirit.'' ''Spirit'' is capitalized because in Pauline context
    this refers to the Holy Spirit, not an impersonal force or human spirit.'
- source_word: διαιροῦν
  chosen: distributing
  alternatives:
  - apportioning
  - dividing
  - giving out
  lexicon: BDAG
  rationale: The participle is contemporaneous with ἐνεργεῖ and explains the manner
    of the Spirit's working. 'Distributing' fits the context of gifting and preserves
    the idea of allotment without implying division in a negative sense.
- source_word: ἰδίᾳ
  chosen: individually
  alternatives:
  - personally
  - severally
  - in particular
  lexicon: BDAG
  rationale: ἰδίᾳ here modifies the distribution as being to each person in an individual
    way. 'Individually' is clear modern English and pairs well with 'to each one.'
- source_word: ἑκάστῳ
  chosen: to each one
  alternatives:
  - to each
  - to every one
  lexicon: BDAG
  rationale: The dative marks recipients of the Spirit's distribution. 'To each one'
    preserves the singular distributive sense and reads naturally in English.
- source_word: καθὼς βούλεται
  chosen: just as he wills
  alternatives:
  - as he chooses
  - as he desires
  lexicon: BDAG
  rationale: καθώς introduces the standard governing the distribution. βούλομαι expresses
    volition or intention. 'Just as he wills' preserves the personal, intentional
    agency of the Spirit and closely reflects the Greek wording.
