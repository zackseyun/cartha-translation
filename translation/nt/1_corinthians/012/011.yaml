theological_decisions:
- issue: Referent and personhood of πνεῦμα / βούλεται
  chosen_reading: πνεῦμα refers to the Holy Spirit, and the masculine English pronoun
    'he' is used in 'just as he wills' to reflect the Spirit's personal agency in
    context.
  alternative_readings:
  - Render 'it wills' to match the neuter grammatical gender of πνεῦμα
  - 'Leave the subject implicit: ''just as desired/just as is willed'''
  rationale: Although πνεῦμα is grammatically neuter in Greek, the verb βούλεται attributes
    volition to the Spirit. In this Pauline context the Spirit is presented as a personal
    divine agent who sovereignly distributes gifts. Using 'he' in English communicates
    personhood rather than mere grammatical gender, without importing a claim beyond
    the text's own portrayal.
  doctrine_reference: Nicene Creed (Holy Spirit as personal divine agent); Preserve
    theological tension rather than resolve it only where the source is genuinely
    ambiguous—here the context strongly supports personal agency.
