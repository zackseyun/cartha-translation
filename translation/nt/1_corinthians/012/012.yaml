id: 1CO.12.12
reference: 1 Corinthians 12:12
source:
  edition: SBLGNT
  text: Καθάπερ γὰρ τὸ σῶμα ἕν ἐστιν καὶ μέλη ⸂πολλὰ ἔχει⸃, πάντα δὲ τὰ μέλη τοῦ ⸀σώματος
    πολλὰ ὄντα ἕν ἐστιν σῶμα, οὕτως καὶ ὁ Χριστός·
translation:
  text: For just as the body is one and has many members, and all the members of the
    body, though they are many, are one body, so also is the Messiah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Christ.' The Greek title Χριστός is rendered 'Messiah' here to preserve
      its meaning as a title rather than treating it merely as a proper name.
    reason: alternative_reading
  - marker: b
    text: Paul's wording is literally 'so also the Messiah,' a compressed expression
      that the following verses unpack in terms of the many members forming one body.
    reason: cross_reference
lexical_decisions:
- source_word: Καθάπερ γὰρ
  chosen: For just as
  alternatives:
  - Just as
  - For as
  lexicon: BDAG
  rationale: Combines the comparative force of καθάπερ ('just as') with the explanatory/connective
    force of γάρ ('for'). 'For just as' preserves Paul's logical linkage to the surrounding
    argument.
- source_word: σῶμα
  chosen: body
  lexicon: BDAG
  rationale: Standard literal rendering in the body metaphor; central to Paul's analogy
    and should remain consistent.
- source_word: ἕν
  chosen: one
  alternatives:
  - single
  lexicon: BDAG
  rationale: '''One'' best preserves both numerical unity and the theological point
    of corporate oneness.'
- source_word: μέλη
  chosen: members
  alternatives:
  - parts
  - limbs
  lexicon: BDAG
  rationale: In English, 'members' is the most natural rendering in Paul's body metaphor
    and prepares for the ecclesial application in the context.
- source_word: πολλὰ ἔχει
  chosen: has many
  alternatives:
  - has many parts
  - has many members
  lexicon: BDAG
  rationale: Rendered with 'many members' in the full clause to preserve the explicit
    object μέλη. This keeps the syntax readable while staying close to the Greek.
- source_word: πάντα δὲ τὰ μέλη τοῦ σώματος
  chosen: and all the members of the body
  alternatives:
  - but all the members of the body
  lexicon: BDAG
  rationale: δέ here is mildly connective rather than strongly adversative; 'and'
    reads naturally in English while preserving the progression of the analogy.
- source_word: πολλὰ ὄντα
  chosen: though they are many
  alternatives:
  - being many
  - although many
  lexicon: BDAG
  rationale: The participial phrase is concessive in sense within the argument. 'Though
    they are many' expresses that concessive force in natural English.
- source_word: ἕν ἐστιν σῶμα
  chosen: are one body
  alternatives:
  - is one body
  lexicon: BDAG
  rationale: Although the predicate is singular in Greek, English idiom with plural
    subject 'all the members' naturally takes 'are.' This preserves meaning rather
    than forcing awkward formal concord.
- source_word: οὕτως καὶ
  chosen: so also
  alternatives:
  - so too
  - in the same way also
  lexicon: BDAG
  rationale: Standard comparative conclusion to the analogy; concise and natural.
- source_word: ὁ Χριστός
  chosen: the Messiah
  alternatives:
  - Christ
  lexicon: BDAG
  rationale: Per doctrine, Χριστός as a title is translated 'Messiah' where context
    supports. Here Paul uses the title in a theological statement, not merely as a
    name-like identifier, so 'the Messiah' preserves the title's meaning.
