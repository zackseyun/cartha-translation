theological_decisions:
- issue: Rendering Χριστός
  chosen_reading: the Messiah
  alternative_readings:
  - Christ
  rationale: The doctrine file directs that Χριστός be translated as 'Messiah' where
    it functions as a title, with 'Christ' reserved for more name-like usage. In this
    verse the term stands in a theological analogy about corporate unity in relation
    to Jesus as the anointed one, so the titular sense is retained.
  doctrine_reference: 'DOCTRINE.md: Contested terms — Χριστός default rendering'
- issue: Interpretation of 'so also is the Messiah'
  chosen_reading: Retain the striking expression 'so also is the Messiah' without
    expanding it to 'so also is the body of the Messiah/church.'
  alternative_readings:
  - so also is Christ's body
  - so also is the church
  rationale: Paul's wording intentionally identifies the corporate body with the Messiah
    in a compressed theological expression. Expanding the text would import interpretation
    not explicitly stated. The translation preserves the tension and leaves the fuller
    explanation to the following context.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it'
