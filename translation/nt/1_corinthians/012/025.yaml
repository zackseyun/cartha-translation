id: 1CO.12.25
reference: 1 Corinthians 12:25
source:
  edition: SBLGNT
  text: ἵνα μὴ ᾖ ⸀σχίσμα ἐν τῷ σώματι, ἀλλὰ τὸ αὐτὸ ὑπὲρ ἀλλήλων μεριμνῶσι τὰ μέλη.
translation:
  text: so that there may be no division in the body, but that the members may have
    the same concern for one another.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'schism.' The Greek term can denote a split or tear; here it refers to
      division within the body.
    reason: lexical_alternative
  - marker: b
    text: Or 'care for one another equally.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἵνα
  chosen: so that
  alternatives:
  - in order that
  - that
  lexicon: BDAG
  rationale: Introduces purpose/result. 'So that' is natural modern English and preserves
    the purposive force in context.
- source_word: σχίσμα
  chosen: division
  alternatives:
  - schism
  - split
  lexicon: BDAG
  rationale: In Pauline usage this denotes a tear, split, or division within a community.
    'Division' is clear modern English and fits both the body metaphor and the church
    context without importing later ecclesiastical jargon as strongly as 'schism.'
- source_word: σῶμα
  chosen: body
  lexicon: BDAG
  rationale: The immediate context is Paul's body metaphor for the church; 'body'
    preserves the metaphor directly and is the standard rendering.
- source_word: τὸ αὐτό
  chosen: the same concern
  alternatives:
  - the same thing
  - the same care
  lexicon: BDAG
  rationale: The accusative neuter phrase functions adverbially/objectively with μεριμνῶσι,
    expressing sameness in the members' mutual care. Rendering it with 'the same concern'
    makes the English idiomatic while preserving the idea of equal, shared regard.
- source_word: ὑπὲρ ἀλλήλων
  chosen: for one another
  alternatives:
  - for each other
  - on behalf of one another
  lexicon: BDAG
  rationale: Here ὑπέρ conveys concern directed toward others rather than substitution.
    'For one another' is natural and preserves the reciprocal sense.
- source_word: μεριμνῶσι
  chosen: may have ... concern
  alternatives:
  - may care
  - may be concerned
  lexicon: BDAG
  rationale: The verb can mean to be concerned for, care for, or be anxious about
    depending on context. Here it is positive mutual care, not sinful anxiety. 'May
    have the same concern' fits the syntax with τὸ αὐτό and communicates active mutual
    care.
- source_word: μέλη
  chosen: the members
  alternatives:
  - the parts
  lexicon: BDAG
  rationale: Within the body metaphor, 'members' is the established and precise term
    for body parts and, by extension, constituents of the church. It preserves Paul's
    metaphor better than the flatter 'parts.'
