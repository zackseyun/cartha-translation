theological_decisions:
- issue: Rendering σχίσμα in an ecclesial metaphor
  chosen_reading: division
  alternative_readings:
  - schism
  rationale: The verse addresses unity within the church as the body of Christ, but
    the Greek term itself need not be rendered with the later technical-sounding 'schism.'
    'Division' preserves the metaphor and avoids importing later ecclesiastical categories
    beyond the text's immediate sense.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; readable modern English, not archaic or academic.'
