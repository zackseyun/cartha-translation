theological_decisions:
- issue: Meaning of δοξάζεται in ecclesial body metaphor
  chosen_reading: social honor within the body ('is honored')
  alternative_readings:
  - is glorified
  rationale: The immediate context concerns mutual care and interdependence among
    members of one body. Rendering δοξάζεται as 'is honored' avoids importing a heavier
    theological sense of eschatological or divine glorification that the context does
    not require.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
