id: 1CO.12.26
reference: 1 Corinthians 12:26
source:
  edition: SBLGNT
  text: καὶ ⸀εἴτε πάσχει ἓν μέλος, συμπάσχει πάντα τὰ μέλη· εἴτε δοξάζεται ⸀μέλος,
    συγχαίρει πάντα τὰ μέλη.
translation:
  text: And if one member suffers, all the members suffer with it; if a member is
    honored, all the members rejoice with it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'is glorified.' Here the sense is likely that a member receives honor,
      and the whole body shares in the joy.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἴτε
  chosen: if
  alternatives:
  - whether
  lexicon: BDAG
  rationale: In this correlative construction, English idiom is best served by repeating
    'if ... if ...' rather than the more wooden 'whether ... or.' This preserves the
    conditional-scenario force in Paul's body metaphor.
- source_word: πάσχει
  chosen: suffers
  alternatives:
  - is suffering
  - experiences pain
  lexicon: BDAG
  rationale: The present tense conveys a general or vivid present situation. 'Suffers'
    is concise and natural, preserving the broad sense of undergoing distress without
    over-specifying the kind of pain.
- source_word: ἓν μέλος
  chosen: one member
  alternatives:
  - one part
  lexicon: BDAG
  rationale: Within the extended body metaphor in 1 Corinthians 12, μέλος is best
    rendered 'member,' the established anatomical/corporate term in English that preserves
    Paul's metaphor of the church as a body. 'Part' is possible but weaker and less
    idiomatic in this context.
- source_word: συμπάσχει
  chosen: suffer with it
  alternatives:
  - suffer together
  - share its suffering
  lexicon: BDAG
  rationale: The compound verb explicitly includes the idea of shared suffering. 'Suffer
    with it' makes the solidarity explicit and matches the singular antecedent 'one
    member.'
- source_word: πάντα τὰ μέλη
  chosen: all the members
  alternatives:
  - all the parts
  - every member
  lexicon: BDAG
  rationale: The phrase is repeated for rhetorical effect; rendering it consistently
    as 'all the members' preserves both the repetition and the body metaphor.
- source_word: δοξάζεται
  chosen: is honored
  alternatives:
  - is glorified
  - is praised
  lexicon: BDAG
  rationale: In this body-life context, δοξάζω refers to receiving honor or esteem
    rather than divine glorification in a technical theological sense. 'Is honored'
    communicates the social-relational sense clearly in modern English.
- source_word: μέλος
  chosen: a member
  alternatives:
  - one member
  - a part
  lexicon: BDAG
  rationale: The second clause lacks the explicit numeral ἕν in the printed text,
    so 'a member' is the most natural English rendering. This avoids implying a textual
    element not present while maintaining the parallelism of the sentence.
- source_word: συγχαίρει
  chosen: rejoice with it
  alternatives:
  - rejoice together
  - share its joy
  lexicon: BDAG
  rationale: The compound verb denotes rejoicing together with someone/something.
    'Rejoice with it' preserves the shared-response idea and matches the singular
    antecedent 'a member.'
