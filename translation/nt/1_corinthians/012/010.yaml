theological_decisions:
- issue: Nature of δυνάμεων in charismatic-gift list
  chosen_reading: Rendered as 'miracles' rather than the more literal 'powers.'
  alternative_readings:
  - powers
  - mighty deeds
  rationale: In this context Paul is listing manifestations of the Spirit, and δυνάμεις
    commonly denotes miraculous works. 'Miracles' communicates the likely referent
    without importing a specific theology of gifts beyond the text.
  doctrine_reference: 'Translation philosophy: readable modern English; preserve source
    sense over tradition where appropriate.'
- issue: Meaning of γλωσσῶν
  chosen_reading: Rendered as 'tongues' in both occurrences.
  alternative_readings:
  - languages
  rationale: The term is debated in discussions of spiritual gifts. Using 'tongues'
    preserves the lexical and theological tension rather than resolving whether Paul
    means known human languages, ecstatic speech, or a broader category. The alternative
    is preserved in a footnote.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
- issue: Meaning of πνευμάτων in 'discernments of spirits'
  chosen_reading: Left broad as 'spirits.'
  alternative_readings:
  - spiritual utterances
  - spirits behind utterances
  - human spirits
  - evil spirits
  rationale: The Greek does not specify the exact referent, and narrowing it would
    import an interpretive conclusion. The translation therefore preserves the ambiguity.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
