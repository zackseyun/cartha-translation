id: 1CO.12.10
reference: 1 Corinthians 12:10
source:
  edition: SBLGNT
  text: ⸀ἄλλῳ ἐνεργήματα δυνάμεων, ⸁ἄλλῳ προφητεία, ⸀1ἄλλῳ διακρίσεις πνευμάτων, ⸀ἑτέρῳ
    γένη γλωσσῶν, ⸀2ἄλλῳ ἑρμηνεία γλωσσῶν·
translation:
  text: to another, workings of miracles; to another, prophecy; to another, discernments
    of spirits; to another, kinds of tongues; to another, interpretation of tongues.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'workings of powers' or 'workings of mighty deeds.'
    reason: lexical_alternative
  - marker: b
    text: Or 'kinds of languages' and 'interpretation of languages.' The Greek term
      can mean either 'tongues' or 'languages'; 'tongues' is retained here to preserve
      the ambiguity in Paul's discussion of spiritual gifts.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐνεργήματα
  chosen: workings
  alternatives:
  - activities
  - operations
  - effects
  lexicon: BDAG
  rationale: The noun denotes effects or workings produced by divine power. 'Workings'
    preserves the concrete/resultative sense and pairs naturally with the following
    genitive.
- source_word: δυνάμεων
  chosen: of miracles
  alternatives:
  - of powers
  - of mighty deeds
  lexicon: BDAG
  rationale: Although literally 'powers,' in this charismatic-gift context the term
    commonly refers to miraculous works. 'Miracles' communicates the sense clearly
    in modern English while reflecting established lexical usage.
- source_word: προφητεία
  chosen: prophecy
  alternatives:
  - prophetic utterance
  lexicon: BDAG
  rationale: Standard rendering for the gift named here; concise and natural, without
    narrowing the term beyond the Greek.
- source_word: διακρίσεις
  chosen: discernments
  alternatives:
  - distinguishings
  - distinctions
  - evaluations
  lexicon: BDAG
  rationale: The plural indicates repeated acts or varieties of discernment. 'Discernments'
    is idiomatic English and preserves the plural better than a singular abstraction.
- source_word: πνευμάτων
  chosen: of spirits
  alternatives:
  - of spiritual utterances
  lexicon: BDAG
  rationale: The genitive most naturally refers to spirits, likely involving discernment
    regarding spiritual influences or sources. The translation preserves the ambiguity
    rather than specifying good/evil spirits or human/divine spirits.
- source_word: γένη
  chosen: kinds
  alternatives:
  - varieties
  - species
  lexicon: BDAG
  rationale: The term denotes classes or kinds. 'Kinds' is simple, natural English
    and fits the plural expression with 'tongues.'
- source_word: γλωσσῶν
  chosen: tongues
  alternatives:
  - languages
  lexicon: BDAG
  rationale: In Pauline discussion of spiritual gifts, 'tongues' is the established
    and contextually appropriate rendering, preserving the term's ecclesial and lexical
    ambiguity. 'Languages' is possible but would prematurely resolve debated questions
    about the phenomenon.
- source_word: ἑρμηνεία
  chosen: interpretation
  alternatives:
  - translation
  - explanation
  lexicon: BDAG
  rationale: The noun refers to rendering the content of tongues intelligibly. 'Interpretation'
    is the most natural and contextually fitting English equivalent.
- source_word: ἄλλῳ / ἑτέρῳ
  chosen: to another
  alternatives:
  - for another
  - to a different one
  lexicon: BDAG
  rationale: The repeated dative structure marks distribution of gifts among different
    persons. Rendering both ἄλλῳ and ἑτέρῳ as 'to another' keeps the English smooth;
    the shift to ἑτέρῳ is not pressed here as a major semantic contrast in context.
