id: 1CO.12.28
reference: 1 Corinthians 12:28
source:
  edition: SBLGNT
  text: καὶ οὓς μὲν ἔθετο ὁ θεὸς ἐν τῇ ἐκκλησίᾳ πρῶτον ἀποστόλους, δεύτερον προφήτας,
    τρίτον διδασκάλους, ἔπειτα δυνάμεις, ⸀ἔπειτα χαρίσματα ἰαμάτων, ἀντιλήμψεις, κυβερνήσεις,
    γένη γλωσσῶν.
translation:
  text: And God has appointed in the church first apostles, second prophets, third
    teachers, then miracles, then gifts of healings, helps, administrations, kinds
    of tongues.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'works of power' for 'miracles.'
    reason: lexical_alternative
  - marker: b
    text: Or 'guidance' or 'forms of leadership' for 'administrations.'
    reason: lexical_alternative
  - marker: c
    text: Or 'kinds of languages.' The Greek term can mean 'tongues' or 'languages';
      the main text preserves the ambiguity of Paul's wording in this context.
    reason: alternative_reading
lexical_decisions:
- source_word: ἔθετο
  chosen: has appointed
  alternatives:
  - placed
  - set
  - appointed
  lexicon: BDAG
  rationale: τίθημι here means to assign or appoint to a role within the church. 'Has
    appointed' communicates divine placement with ongoing relevance in context better
    than the more spatial 'placed' or the less idiomatic 'set.'
- source_word: ἐν τῇ ἐκκλησίᾳ
  chosen: in the church
  alternatives:
  - in the assembly
  - in the congregation
  lexicon: BDAG
  rationale: ἐκκλησία in Pauline usage commonly refers to the gathered people of God/church.
    'Church' is the most natural modern rendering here and fits the institutional/body
    context of distributed gifts and roles.
- source_word: πρῶτον ... δεύτερον ... τρίτον
  chosen: first ... second ... third
  alternatives:
  - firstly ... secondly ... thirdly
  lexicon: BDAG
  rationale: These adverbial accusatives mark sequence or rank. Simple ordinal adverbs
    in English preserve the structure clearly and naturally.
- source_word: ἀποστόλους
  chosen: apostles
  alternatives:
  - messengers
  - sent ones
  lexicon: BDAG
  rationale: In this ecclesial list the term refers to the recognized apostolic role,
    not merely generic messengers. 'Apostles' preserves the established office/function.
- source_word: προφήτας
  chosen: prophets
  lexicon: BDAG
  rationale: Standard rendering for those who speak prophetic revelation; no contextual
    reason to vary.
- source_word: διδασκάλους
  chosen: teachers
  lexicon: BDAG
  rationale: Straightforward rendering of instructional role within the church.
- source_word: δυνάμεις
  chosen: miracles
  alternatives:
  - works of power
  - mighty deeds
  - powers
  lexicon: BDAG
  rationale: Although literally 'powers,' in gift lists and in immediate parallel
    with healing gifts it refers to miraculous works. 'Miracles' best communicates
    the sense in accessible English. A footnote preserves the more literal alternative.
- source_word: χαρίσματα ἰαμάτων
  chosen: gifts of healings
  alternatives:
  - gifts of healing
  - healing gifts
  lexicon: BDAG
  rationale: Both nouns are plural in Greek. Retaining the plural expression 'gifts
    of healings' reflects the source more closely, even if slightly less idiomatic,
    and avoids flattening the Greek form.
- source_word: ἀντιλήμψεις
  chosen: helps
  alternatives:
  - forms of help
  - assistance
  lexicon: BDAG
  rationale: The noun denotes acts or capacities of assistance/support. 'Helps' is
    concise and traditional without being opaque in this list context.
- source_word: κυβερνήσεις
  chosen: administrations
  alternatives:
  - guidance
  - leaderships
  - forms of leadership
  lexicon: BDAG
  rationale: The term literally evokes steering or directing. 'Administrations' captures
    governing/organizing functions in the church without overstating hierarchical
    office. A footnote preserves 'guidance' as an alternative nuance.
- source_word: γένη γλωσσῶν
  chosen: kinds of tongues
  alternatives:
  - various kinds of tongues
  - kinds of languages
  lexicon: BDAG
  rationale: γένη means kinds/sorts, and γλῶσσαι in this chapter refers to the gift
    of tongues. 'Tongues' preserves Pauline terminology and avoids prematurely resolving
    whether the emphasis is human languages, ecstatic speech, or both. A footnote
    preserves 'languages' as an alternative gloss.
