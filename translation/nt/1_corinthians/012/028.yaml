theological_decisions:
- issue: Whether the sequence indicates permanent rank, chronological order, or functional
    prominence
  chosen_reading: 'Render the sequence straightforwardly without interpreting beyond
    the text: ''first ... second ... third ... then ... then.'''
  alternative_readings:
  - A hierarchy of authority
  - A chronological order of appearance
  - A rhetorical ordering of relative importance
  rationale: The verse clearly presents an ordered list, but it does not explicitly
    explain whether the order is hierarchical, chronological, or situational. To preserve
    theological tension, the translation mirrors the Greek sequence without adding
    interpretive qualifiers.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Meaning of γλῶσσαι in this context
  chosen_reading: Use 'tongues' in the main text.
  alternative_readings:
  - languages
  rationale: Because the broader Pauline discussion leaves room for debate about the
    precise nature of the phenomenon, 'tongues' preserves the traditional and textually
    cautious rendering. The alternative 'languages' is preserved in a footnote rather
    than resolved in the main text.
  doctrine_reference: Preserve theological tension rather than resolve it.
