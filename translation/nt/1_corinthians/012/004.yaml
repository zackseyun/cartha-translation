id: 1CO.12.4
reference: 1 Corinthians 12:4
source:
  edition: SBLGNT
  text: Διαιρέσεις δὲ χαρισμάτων εἰσίν, τὸ δὲ αὐτὸ πνεῦμα·
translation:
  text: Now there are varieties of gifts, but the same Spirit.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'distributions' or 'differences of gifts.' The Greek emphasizes diversity
      within the gifts, not division in the church.
    reason: lexical_alternative
lexical_decisions:
- source_word: Διαιρέσεις
  chosen: varieties
  alternatives:
  - distributions
  - differences
  - divisions
  lexicon: BDAG
  rationale: The noun denotes distinctions or kinds within a larger whole. In this
    context Paul is introducing differing manifestations within the church, not factions;
    'varieties' communicates legitimate diversity without the negative connotation
    that 'divisions' often carries in English.
- source_word: δὲ
  chosen: Now
  alternatives:
  - but
  - and
  lexicon: BDAG
  rationale: The first δέ marks a transition to a new explanatory point in the argument.
    'Now' reflects discourse movement naturally in English. The second δέ is adversative/contrastive
    and is rendered 'but' to preserve the contrast between diversity and unity.
- source_word: χαρισμάτων
  chosen: gifts
  alternatives:
  - gracious gifts
  - giftings
  lexicon: BDAG
  rationale: χάρισμα refers to a gift given by grace, especially spiritual enablements
    in this context. 'Gifts' is the clearest and most idiomatic English rendering
    here; the grace nuance is important etymologically but need not be made explicit
    in the main text of this verse.
- source_word: τὸ ... αὐτὸ
  chosen: the same
  alternatives:
  - one and the same
  lexicon: BDAG
  rationale: 'The article with αὐτός functions idiomatically to stress identity: despite
    the diversity, the Spirit is identical in source. ''The same'' is concise and
    natural, while preserving Paul''s emphasis on unity.'
- source_word: πνεῦμα
  chosen: Spirit
  alternatives:
  - spirit
  lexicon: BDAG
  rationale: In the immediate context of 12:3-11 Paul refers to the Holy Spirit as
    the source of spiritual gifts. Capitalizing 'Spirit' reflects the referent rather
    than adding doctrine beyond the context.
