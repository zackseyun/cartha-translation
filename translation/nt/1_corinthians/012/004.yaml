theological_decisions:
- issue: Referent of πνεῦμα
  chosen_reading: Holy Spirit
  alternative_readings:
  - human spirit
  - spiritual power/principle
  rationale: The broader context of 1 Corinthians 12 repeatedly identifies the Spirit
    as the divine source distributing gifts among believers. Rendering as 'Spirit'
    with capitalization best reflects Paul's meaning and historic Christian reading
    without overexpansion in the main text.
  doctrine_reference: Affirmations; Translation philosophy §3
