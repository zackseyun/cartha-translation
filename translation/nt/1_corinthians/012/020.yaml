theological_decisions:
- issue: Rendering μέλη in the body metaphor
  chosen_reading: parts
  alternative_readings:
  - members
  rationale: The verse uses an anatomical metaphor, and 'parts' communicates that
    clearly in contemporary English without importing ecclesial jargon. Because Paul
    is speaking of the church as a body, 'members' remains a meaningful alternative
    and is preserved in a footnote for auditability.
  doctrine_reference: Translation philosophy §§5–6
