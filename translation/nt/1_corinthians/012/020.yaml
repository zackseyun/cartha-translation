id: 1CO.12.20
reference: 1 Corinthians 12:20
source:
  edition: SBLGNT
  text: νῦν δὲ πολλὰ ⸀μὲν μέλη, ἓν δὲ σῶμα.
translation:
  text: But as it is, there are many parts, yet one body.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'many members, but one body.'
    reason: lexical_alternative
lexical_decisions:
- source_word: νῦν
  chosen: as it is
  alternatives:
  - now
  lexicon: BDAG
  rationale: In this argumentative context, νῦν functions idiomatically to mark the
    present reality or actual state of affairs rather than merely a temporal 'now.'
    'As it is' captures Paul's contrast with the hypothetical in the preceding verse.
- source_word: δὲ
  chosen: But
  alternatives:
  - and
  - now
  lexicon: BDAG
  rationale: δέ marks a mild contrast/resumption from the previous conditional statement.
    'But' best reflects the adversative turn in English.
- source_word: πολλὰ ... μέλη
  chosen: many parts
  alternatives:
  - many members
  - many limbs
  lexicon: BDAG
  rationale: μέλη in the body metaphor refers to constituent body parts. 'Parts' is
    clear modern English and fits the metaphor naturally. 'Members' is traditional
    and possible, but in contemporary English can sound institutional rather than
    anatomical.
- source_word: μὲν ... δὲ
  chosen: many parts, yet one body
  alternatives:
  - on the one hand ... on the other
  - indeed ... but
  lexicon: BDAG
  rationale: 'The correlative pair sets up contrast: many on one side, one on the
    other. English does not require a wooden rendering of both particles; ''yet''
    conveys the balancing contrast smoothly.'
- source_word: ἓν
  chosen: one
  lexicon: BDAG
  rationale: The numeral/adjective emphasizes unity in contrast to plurality.
- source_word: σῶμα
  chosen: body
  lexicon: BDAG
  rationale: σῶμα is literal within Paul's extended metaphor of the church as a body.
    'Body' preserves both the image and the theological force of unity-in-diversity.
