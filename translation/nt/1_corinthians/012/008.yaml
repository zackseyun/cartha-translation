id: 1CO.12.8
reference: 1 Corinthians 12:8
source:
  edition: SBLGNT
  text: ᾧ μὲν γὰρ διὰ τοῦ πνεύματος δίδοται λόγος σοφίας, ἄλλῳ δὲ λόγος γνώσεως κατὰ
    τὸ αὐτὸ πνεῦμα,
translation:
  text: For to one is given through the Spirit a message of wisdom, and to another
    a message of knowledge according to the same Spirit,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a word of wisdom' / 'an utterance of wisdom.'
    reason: lexical_alternative
  - marker: b
    text: Or 'a word of knowledge' / 'an utterance of knowledge.'
    reason: lexical_alternative
  - marker: c
    text: Or 'by the same Spirit.' The Greek uses a different preposition here than
      in 'through the Spirit,' likely emphasizing accordance with the one Spirit as
      the common source.
    reason: lexical_alternative
lexical_decisions:
- source_word: ᾧ
  chosen: to one
  alternatives:
  - to whom
  - to one person
  lexicon: BDAG
  rationale: Dative singular relative pronoun referring back to an implied member
    of the body/community. In idiomatic English within this distributive construction,
    'to one' best captures the sense without awkwardness.
- source_word: διὰ τοῦ πνεύματος
  chosen: through the Spirit
  alternatives:
  - by the Spirit
  lexicon: BDAG
  rationale: διά with the genitive commonly expresses means or agency. 'Through the
    Spirit' preserves the mediating sense and fits Paul's emphasis on the Spirit as
    the giver/means of distribution.
- source_word: πνεύματος / πνεῦμα
  chosen: Spirit
  alternatives:
  - spirit
  lexicon: BDAG
  rationale: In context of 1 Corinthians 12, Paul is speaking of the Holy Spirit distributing
    gifts. Capitalization in English signals this referent, though the Greek manuscripts
    themselves do not mark case distinction.
- source_word: δίδοται
  chosen: is given
  alternatives:
  - is being given
  - is granted
  lexicon: BDAG
  rationale: Present passive indicative. 'Is given' is the most natural English rendering
    and preserves the passive sense that the gift is bestowed, not self-generated.
- source_word: λόγος σοφίας
  chosen: a message of wisdom
  alternatives:
  - an utterance of wisdom
  - a word of wisdom
  lexicon: BDAG
  rationale: λόγος here likely refers to an expression, message, or utterance rather
    than merely a single lexical 'word.' 'Message' is more natural modern English
    while still broad enough to cover inspired speech. 'Of wisdom' preserves the genitival
    relation.
- source_word: ἄλλῳ
  chosen: to another
  alternatives:
  - to another person
  lexicon: BDAG
  rationale: Dative singular in parallel with ᾧ; the distributive contrast is best
    represented by 'to another.'
- source_word: λόγος γνώσεως
  chosen: a message of knowledge
  alternatives:
  - an utterance of knowledge
  - a word of knowledge
  lexicon: BDAG
  rationale: Parallel to λόγος σοφίας, so the same rendering of λόγος is maintained
    for consistency. γνώσις is straightforwardly 'knowledge' here.
- source_word: κατὰ τὸ αὐτὸ πνεῦμα
  chosen: according to the same Spirit
  alternatives:
  - by the same Spirit
  - in keeping with the same Spirit
  lexicon: BDAG
  rationale: κατά with the accusative can indicate accordance or conformity. 'According
    to the same Spirit' preserves the Greek preposition distinctly from the earlier
    διά and highlights Paul's rhetorical variation while affirming the common divine
    source.
