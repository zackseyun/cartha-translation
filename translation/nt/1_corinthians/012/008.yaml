theological_decisions:
- issue: Referent of 'the Spirit'
  chosen_reading: Holy Spirit
  alternative_readings:
  - human spirit
  rationale: The immediate context in 1 Corinthians 12 concerns varieties of gifts,
    service, and workings distributed by the one divine Spirit. Rendering with capital
    'Spirit' reflects the contextual referent without adding doctrinal content beyond
    the passage.
  doctrine_reference: Affirmations; Translation philosophy §1
- issue: Rendering of λόγος in charismatic-gift expressions
  chosen_reading: message
  alternative_readings:
  - word
  - utterance
  rationale: '''Message'' communicates intelligible inspired communication in accessible
    modern English and avoids overly traditional phrasing that may obscure meaning.
    Alternatives are preserved in a footnote because ''word of wisdom/knowledge''
    is a familiar traditional rendering.'
  doctrine_reference: Translation philosophy §6
