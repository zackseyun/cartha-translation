id: 1CO.12.9
reference: 1 Corinthians 12:9
source:
  edition: SBLGNT
  text: ⸀ἑτέρῳ πίστις ἐν τῷ αὐτῷ πνεύματι, ⸀ἄλλῳ χαρίσματα ἰαμάτων ἐν τῷ ⸀ἑνὶ πνεύματι,
translation:
  text: to another, faith by the same Spirit; to another, gifts of healings by the
    one Spirit,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'faithfulness' or 'trust' for 'faith' (πίστις).
    reason: lexical_alternative
  - marker: b
    text: Greek 'gifts of healings,' with both nouns plural.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἑτέρῳ
  chosen: to another
  alternatives:
  - to a different one
  lexicon: BDAG
  rationale: Dative singular functioning in the implied distribution from the previous
    verse ('to one ... to another'). 'To another' is natural English and preserves
    the distributive sense without overpressing the distinction between ἕτερος and
    ἄλλος in a way English cannot sustain clearly here.
- source_word: πίστις
  chosen: faith
  alternatives:
  - faithfulness
  - trust
  lexicon: BDAG
  rationale: Following the project's default for πίστις, the main text uses 'faith.'
    In this gifts context, the sense is a Spirit-given capacity of faith rather than
    saving faith in general. Alternatives are preserved because πίστις can denote
    trust or faithfulness, but 'faith' best matches both Pauline usage and the doctrine
    default.
- source_word: ἐν τῷ αὐτῷ πνεύματι
  chosen: by the same Spirit
  alternatives:
  - in the same Spirit
  lexicon: BDAG
  rationale: ἐν with the dative can be rendered instrumentally here in the repeated
    gift-distribution formula. 'By the same Spirit' communicates agency/source more
    idiomatically in English while preserving Paul's emphasis on the Spirit as the
    one giver.
- source_word: ἄλλῳ
  chosen: to another
  alternatives:
  - to another one
  lexicon: BDAG
  rationale: Like ἑτέρῳ, this dative continues the distributive pattern. English normally
    renders both ἑτέρῳ and ἄλλῳ as 'to another' in this context; attempting to force
    a sharp distinction would sound unnatural and likely overinterpret the Greek.
- source_word: χαρίσματα
  chosen: gifts
  alternatives:
  - gracious gifts
  lexicon: BDAG
  rationale: The plural noun denotes gifts graciously given. 'Gifts' is the standard
    concise rendering and fits the immediate context of spiritual gifts.
- source_word: ἰαμάτων
  chosen: of healings
  alternatives:
  - of healing
  lexicon: BDAG
  rationale: The Greek uses plural forms ('gifts of healings'). Retaining the plural
    is more formally accurate and preserves the textual nuance, even if slightly less
    idiomatic than singular 'healing.'
- source_word: ἐν τῷ ἑνὶ πνεύματι
  chosen: by the one Spirit
  alternatives:
  - in the one Spirit
  lexicon: BDAG
  rationale: As above, ἐν is rendered instrumentally. 'The one Spirit' reflects ἑνί
    and highlights Paul's emphasis on unity amid diversity. The variation from 'same'
    to 'one' follows the Greek wording rather than flattening the distinction.
