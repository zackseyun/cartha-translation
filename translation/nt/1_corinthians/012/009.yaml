theological_decisions:
- issue: Rendering πίστις in a potentially nuanced charismatic context
  chosen_reading: faith
  alternative_readings:
  - faithfulness
  - trust
  rationale: The doctrine table sets 'faith' as the default rendering for πίστις,
    with alternatives preserved where contested. Here the context is a Spirit-given
    gift, but the text does not require importing a specific denominational theology
    of charismatic experience beyond the lexical sense.
  doctrine_reference: 'DOCTRINE.md Contested terms: πίστις → faith; alternatives preserved
    where contested'
- issue: Reference of πνεύματι
  chosen_reading: Spirit (capitalized, referring to the Holy Spirit)
  alternative_readings:
  - spirit
  rationale: In 1 Corinthians 12 the repeated formula clearly refers to the Holy Spirit
    as the source/distributor of gifts (cf. surrounding verses). Capitalization reflects
    this referent in English without adding doctrinal content beyond the context.
  doctrine_reference: 'Affirmations / translation philosophy: preserve source meaning
    without importing extra doctrinal claims'
