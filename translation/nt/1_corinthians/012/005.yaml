theological_decisions:
- issue: Referent of 'Lord' in the triadic formulation of 1 Corinthians 12:4–6
  chosen_reading: '''Lord'' is rendered as a title without expanding it in the text;
    contextually it most likely refers to the Lord Jesus.'
  alternative_readings:
  - A more generic reference to the Lord/God
  rationale: 'The immediate context presents a triadic pattern: same Spirit, same
    Lord, same God. The translation preserves Paul''s wording without interpretive
    expansion, while recognizing the likely Christological referent.'
  doctrine_reference: 'Affirmations: Nicene Creed; Translation philosophy: preserve
