id: 1CO.12.5
reference: 1 Corinthians 12:5
source:
  edition: SBLGNT
  text: καὶ διαιρέσεις διακονιῶν εἰσιν, καὶ ὁ αὐτὸς κύριος·
translation:
  text: And there are varieties of ministries, and the same Lord.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'services' or 'forms of service.'
    reason: lexical_alternative
lexical_decisions:
- source_word: διαιρέσεις
  chosen: varieties
  alternatives:
  - distributions
  - differences
  - divisions
  lexicon: BDAG
  rationale: In this context Paul is describing differing manifestations within unity
    (vv. 4–6), not schisms. 'Varieties' communicates differentiated kinds without
    implying conflict. 'Divisions' would misleadingly suggest factionalism.
- source_word: διακονιῶν
  chosen: ministries
  alternatives:
  - services
  - forms of service
  lexicon: BDAG
  rationale: The noun can denote service, ministry, or office of service. 'Ministries'
    fits Paul's discussion of Spirit-given functions in the church while remaining
    readable. 'Services' is possible but can sound impersonal or task-only in English.
- source_word: ὁ αὐτὸς
  chosen: the same
  alternatives:
  - one and the same
  lexicon: BDAG
  rationale: This phrase emphasizes continuity and unity across differing gifts/functions.
    'The same' is the natural English equivalent and preserves the repeated pattern
    across vv. 4–6.
- source_word: κύριος
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Per doctrine guidelines, κύριος is rendered 'Lord' as the default. In
    Pauline usage here it most naturally refers to the Lord Jesus within the triadic
    pattern of Spirit (v. 4), Lord (v. 5), and God (v. 6), while preserving the title's
    theological weight.
- source_word: καὶ
  chosen: And
  alternatives:
  - also
  - now
  lexicon: BDAG
  rationale: The conjunction links this verse to the parallel statements in the surrounding
    context. 'And' best preserves the simple additive structure.
- source_word: εἰσιν
  chosen: there are
  alternatives:
  - exist
  lexicon: BDAG
  rationale: 'Rendering the existential verb as ''there are'' produces natural English
    and reflects the clause structure: ''there are varieties of ministries.'''
