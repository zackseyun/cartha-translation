id: 1CO.12.7
reference: 1 Corinthians 12:7
source:
  edition: SBLGNT
  text: ἑκάστῳ δὲ δίδοται ἡ φανέρωσις τοῦ πνεύματος πρὸς τὸ συμφέρον.
translation:
  text: But to each one the manifestation of the Spirit is given for the common good.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for what is beneficial' or 'for the benefit of all.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἑκάστῳ
  chosen: to each one
  alternatives:
  - to each
  - to every person
  lexicon: BDAG
  rationale: Dative singular of ἕκαστος indicates distribution to each individual
    within the body. 'To each one' preserves the distributive force clearly in natural
    English.
- source_word: δὲ
  chosen: But
  alternatives:
  - Now
  - And
  lexicon: BDAG
  rationale: δέ here marks a mild contrast or transition from the preceding discussion
    of varieties of gifts and the same Spirit. 'But' preserves the connective force
    without overstating it.
- source_word: δίδοται
  chosen: is given
  alternatives:
  - is granted
  - is bestowed
  lexicon: BDAG
  rationale: Present passive indicative singular of δίδωμι. 'Is given' is the most
    direct and transparent rendering, preserving the passive voice and divine-gift
    nuance without embellishment.
- source_word: φανέρωσις
  chosen: manifestation
  alternatives:
  - disclosure
  - expression
  - revealing
  lexicon: BDAG
  rationale: φανέρωσις denotes a making visible or evident. 'Manifestation' is the
    established and accurate rendering here, fitting the context of spiritual gifts
    as visible expressions of the Spirit's activity.
- source_word: τοῦ πνεύματος
  chosen: of the Spirit
  alternatives:
  - of the Holy Spirit
  - of the spirit
  lexicon: BDAG
  rationale: In the context of 1 Corinthians 12, πνεῦμα refers to the Holy Spirit.
    'Of the Spirit' preserves the Greek wording while allowing the immediate context
    to identify the referent. Adding 'Holy' would be interpretively true but slightly
    more explicit than the Greek here.
- source_word: πρὸς τὸ συμφέρον
  chosen: for the common good
  alternatives:
  - for what is beneficial
  - for the benefit of all
  - for what is profitable
  lexicon: BDAG
  rationale: The articular participial expression functions idiomatically to denote
    benefit or advantage. In this context of gifts within the gathered body, 'for
    the common good' best captures the communal orientation implied by Paul's argument,
    not merely individual benefit.
