theological_decisions:
- issue: Referent of 'the Spirit'
  chosen_reading: The phrase refers to the Holy Spirit.
  alternative_readings:
  - a more generic 'spirit'
  rationale: The immediate context repeatedly identifies the source of gifts as the
    one and same Spirit (vv. 4, 8–11), making the Holy Spirit the clear referent.
    The translation keeps 'Spirit' rather than 'Holy Spirit' to remain close to the
    Greek while preserving the capitalized referent in English.
  doctrine_reference: Affirmations; Translation philosophy §1
- issue: Scope of συμφέρον
  chosen_reading: The benefit is communal, hence 'for the common good.'
  alternative_readings:
  - for personal benefit
  - for what is beneficial in a general sense
  rationale: Although συμφέρον can denote benefit generally, the chapter's emphasis
    is on the body and mutual edification. Rendering it 'for the common good' preserves
    Paul's ecclesial focus without importing a denominational reading.
  doctrine_reference: Translation philosophy §3
