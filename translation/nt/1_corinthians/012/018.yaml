id: 1CO.12.18
reference: 1 Corinthians 12:18
source:
  edition: SBLGNT
  text: ⸀νυνὶ δὲ ὁ θεὸς ἔθετο τὰ μέλη, ἓν ἕκαστον αὐτῶν, ἐν τῷ σώματι καθὼς ἠθέλησεν.
translation:
  text: But as it is, God arranged the members, each one of them, in the body just
    as he desired.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'placed' or 'set' for 'arranged.'
    reason: lexical_alternative
  - marker: b
    text: Or 'as he willed.'
    reason: lexical_alternative
lexical_decisions:
- source_word: νυνὶ δὲ
  chosen: But as it is
  alternatives:
  - But now
  - But in fact
  lexicon: BDAG
  rationale: The combination marks a contrast with the preceding hypothetical statements
    and shifts back to the actual state of affairs. 'But as it is' is idiomatic modern
    English that preserves the adversative force and present-discourse function better
    than a bare 'But now,' which could sound temporal.
- source_word: ὁ θεὸς
  chosen: God
  lexicon: BDAG
  rationale: Straightforward rendering of the subject with the article functioning
    normally in Greek. No need to reproduce the article in English.
- source_word: ἔθετο
  chosen: arranged
  alternatives:
  - placed
  - set
  lexicon: BDAG
  rationale: τίθημι can mean 'put, place, set,' but in this body-metaphor context
    'arranged' best conveys purposeful ordering of the members within the whole, not
    merely physical placement. It also fits Paul's emphasis on divine intentionality.
- source_word: τὰ μέλη
  chosen: the members
  alternatives:
  - the parts
  - the limbs
  lexicon: BDAG
  rationale: In the immediate context of the body metaphor, 'members' is the established
    and precise term for body parts functioning within a whole. 'Parts' is possible
    but less specific; 'limbs' is too narrow.
- source_word: ἓν ἕκαστον αὐτῶν
  chosen: each one of them
  alternatives:
  - every one of them
  - each of them individually
  lexicon: BDAG
  rationale: The distributive expression emphasizes the individuality of every member.
    'Each one of them' preserves both the distributive force and the explicit reference
    back to the members.
- source_word: ἐν τῷ σώματι
  chosen: in the body
  alternatives:
  - within the body
  lexicon: BDAG
  rationale: A direct and natural rendering of the prepositional phrase. In context
    'the body' refers first to the metaphorical body composed of members, with application
    to the church in the larger passage.
- source_word: καθὼς ἠθέλησεν
  chosen: just as he desired
  alternatives:
  - as he willed
  - just as he wanted
  lexicon: BDAG
  rationale: This clause expresses correspondence to God's intention. 'Desired' is
    readable modern English and preserves volitional force without sounding overly
    technical. 'Willed' is more formal but can sound stilted; 'wanted' may sound too
    casual.
