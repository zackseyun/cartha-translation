theological_decisions:
- issue: Divine intentionality in the distribution of members within the body
  chosen_reading: The verse states that God intentionally arranged each member in
    the body according to his own desire.
  alternative_readings:
  - A weaker reading emphasizing mere placement without purposeful ordering
  rationale: Paul's argument in context is that diversity within the body is not accidental
    but divinely ordered. Rendering ἔθετο as 'arranged' and καθὼς ἠθέλησεν as 'just
    as he desired' preserves that theological emphasis without importing a broader
    doctrine beyond the verse.
  doctrine_reference: Translation philosophy §§1, 3, 6
