id: 1CO.12.14
reference: 1 Corinthians 12:14
source:
  edition: SBLGNT
  text: Καὶ γὰρ τὸ σῶμα οὐκ ἔστιν ἓν μέλος ἀλλὰ πολλά.
translation:
  text: For the body is not one member, but many.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Καὶ γὰρ
  chosen: For
  alternatives:
  - Indeed
  - For indeed
  - Because
  lexicon: BDAG
  rationale: The combination is inferential/explanatory, linking this statement to
    the preceding argument. In natural English, 'For' best captures the explanatory
    force without awkwardly reproducing both particles separately.
- source_word: τὸ σῶμα
  chosen: the body
  lexicon: BDAG
  rationale: A straightforward rendering of the nominative subject. In context Paul
    is using the body metaphor for the church, but the metaphor itself should remain
    explicit rather than interpreted in the main text.
- source_word: οὐκ ἔστιν
  chosen: is not
  alternatives:
  - is not made up of
  lexicon: BDAG
  rationale: The simple copula with negation is best rendered directly. Although 'is
    not made up of' could make the sense more explicit, it adds wording not present
    in the Greek.
- source_word: ἓν μέλος
  chosen: one member
  alternatives:
  - one part
  - a single member
  lexicon: BDAG
  rationale: '''Member'' preserves Paul''s body imagery and is a standard lexical
    equivalent for μέλος in this context. ''Part'' is possible and more idiomatic
    for some readers, but it weakens the metaphorical connection to the repeated use
    of ''member'' in the surrounding passage.'
- source_word: ἀλλὰ πολλά
  chosen: but many
  alternatives:
  - but many members
  - but many parts
  lexicon: BDAG
  rationale: The adjective πολλά stands substantivally, with 'members' understood
    from the previous phrase. Rendering it as 'but many' is concise and closely follows
    the Greek ellipsis. The fuller 'but many members' is interpretive but legitimate;
    the shorter form better preserves the source structure while remaining clear in
    English.
