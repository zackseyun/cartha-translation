theological_decisions:
- issue: Metaphorical reference of 'the body'
  chosen_reading: Retain 'the body' as Paul's metaphor without expanding it to 'the
    body of Christ' in the main text.
  alternative_readings:
  - the body of Christ
  rationale: Although the broader context concerns the church as Christ's body, this
    verse itself says only 'the body.' Expanding the phrase would import contextual
    interpretation into the translation rather than translating the words present.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Preserve theological tension rather than resolve it.'
