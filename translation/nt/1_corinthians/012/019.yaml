id: 1CO.12.19
reference: 1 Corinthians 12:19
source:
  edition: SBLGNT
  text: εἰ δὲ ἦν τὰ πάντα ἓν μέλος, ποῦ τὸ σῶμα;
translation:
  text: If all were one member, where would the body be?
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: εἰ
  chosen: If
  lexicon: BDAG
  rationale: Introduces a conditional statement; standard English conditional 'if'
    fits the hypothetical argument.
- source_word: δὲ
  chosen: —
  alternatives:
  - but
  - now
  - and
  lexicon: BDAG
  rationale: Here δέ functions as a mild connective in a rhetorical flow. English
    can convey the sense naturally without an explicit conjunction; the contrast is
    already clear from context. The conditional clause remains smooth and idiomatic
    without adding 'but' or 'now'.
- source_word: ἦν
  chosen: were
  alternatives:
  - was
  lexicon: BDAG
  rationale: Imperfect of 'to be' in a contrary-to-fact or hypothetical condition
    is best rendered with English subjunctive-style 'were' rather than 'was' for natural
    and precise idiom.
- source_word: τὰ πάντα
  chosen: all
  alternatives:
  - all things
  - the whole
  lexicon: BDAG
  rationale: In context of the body metaphor, τὰ πάντα refers to all the parts collectively,
    not abstract 'all things.' 'All' is concise and idiomatic in English.
- source_word: ἓν
  chosen: one
  lexicon: BDAG
  rationale: Straightforward numeral/adjective modifying 'member.'
- source_word: μέλος
  chosen: member
  alternatives:
  - part
  - limb
  lexicon: BDAG
  rationale: Paul's body metaphor regularly uses μέλος for a body part/member. 'Member'
    preserves the metaphor and aligns with Pauline usage in this context better than
    the more anatomical 'limb' or the more generic 'part.'
- source_word: ποῦ
  chosen: where would ... be?
  alternatives:
  - where is ...?
  - what would become of ...?
  lexicon: BDAG
  rationale: The adverb asks rhetorically about the body's existence/location in the
    hypothetical scenario. 'Where would the body be?' captures the rhetorical force
    in natural English.
- source_word: τὸ σῶμα
  chosen: the body
  lexicon: BDAG
  rationale: Definite noun referring to the corporate body in Paul's metaphor; 'the
    body' is the direct and contextually appropriate rendering.
