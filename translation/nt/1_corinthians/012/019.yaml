theological_decisions:
- issue: Extent of the body metaphor
  chosen_reading: Render the verse as a rhetorical statement about the necessity of
    diversity within one body, without importing ecclesiological specifics into the
    translation itself.
  alternative_readings:
  - A more interpretive rendering that explicitly says 'the body of Christ'
  rationale: Although the broader context concerns the church as Christ's body, this
    verse itself says only 'the body.' The translation preserves Paul's metaphor without
    adding theological specification not present in the Greek.
  doctrine_reference: Translation philosophy items 1 and 3
