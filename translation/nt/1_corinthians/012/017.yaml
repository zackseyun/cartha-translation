theological_decisions:
- issue: Body-part metaphor expressed in terms of sensory faculties versus physical
    organs
  chosen_reading: Translate ἀκοή and ὄσφρησις as sensory functions ('hearing,' 'the
    sense of smell') rather than as organs ('ear,' 'nose').
  alternative_readings:
  - 'Translate as organs for smoother parallelism: ''where would the ear be?... where
    would the nose be?'''
  rationale: Paul's Greek uses nouns for the capacities of hearing and smelling, not
    the anatomical terms for ear and nose. Preserving the functional language better
    reflects the source text and avoids importing a more concrete image than Paul
    states.
  doctrine_reference: Translation philosophy §1, §5
