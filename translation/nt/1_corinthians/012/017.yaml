id: 1CO.12.17
reference: 1 Corinthians 12:17
source:
  edition: SBLGNT
  text: εἰ ὅλον τὸ σῶμα ὀφθαλμός, ποῦ ἡ ἀκοή; εἰ ὅλον ἀκοή, ποῦ ἡ ὄσφρησις;
translation:
  text: If the whole body were an eye, where would the hearing be? If the whole were
    hearing, where would the sense of smell be?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'where would the ear be?... where would the nose be?' The Greek more
      literally speaks of the faculties of hearing and smelling.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅλον τὸ σῶμα
  chosen: the whole body
  alternatives:
  - the entire body
  lexicon: BDAG
  rationale: A straightforward rendering of the adjective-noun phrase. 'Whole body'
    is natural English and preserves Paul's hypothetical image of a body consisting
    entirely of one part.
- source_word: ὀφθαλμός
  chosen: an eye
  alternatives:
  - eye
  lexicon: BDAG
  rationale: Rendered with the indefinite article in English because the predicate
    nominative in this conditional clause is most naturally expressed as 'were an
    eye.' This preserves the singular body-part metaphor.
- source_word: ποῦ
  chosen: where would ... be?
  alternatives:
  - where is ...?
  - where then would ... be?
  lexicon: BDAG
  rationale: The Greek adverb means 'where?' In this unreal or hypothetical condition,
    English idiom prefers 'where would ... be?' to make the implied conditional force
    explicit.
- source_word: ἀκοή
  chosen: the hearing / hearing
  alternatives:
  - the ear / ear
  - the faculty of hearing
  lexicon: BDAG
  rationale: The noun denotes hearing rather than the physical organ. In the first
    clause, the article is retained as 'the hearing' to mirror the Greek structure;
    in the second, anarthrous ἀκοή is rendered simply 'hearing' in predicate position.
    Using 'ear' would over-specify anatomy where Paul uses the sensory function.
- source_word: ὅλον
  chosen: the whole
  alternatives:
  - the whole body
  - all
  lexicon: BDAG
  rationale: In the second conditional clause, the adjective stands without an explicit
    noun. 'The whole' is concise English that preserves the ellipsis from the Greek
    without awkward repetition.
- source_word: ὄσφρησις
  chosen: the sense of smell
  alternatives:
  - smell
  - smelling
  lexicon: BDAG
  rationale: This noun refers to the faculty of smelling. 'The sense of smell' communicates
    the meaning clearly in modern English and matches the sensory-function language
    of ἀκοή better than the bare noun 'smell.'
