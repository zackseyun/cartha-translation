theological_decisions:
- issue: Nature of Paul's rhetorical questions with μή
  chosen_reading: Render as questions expecting a negative answer
  alternative_readings:
  - Render as simple interrogatives without signaling expected answer
  rationale: The Greek syntax signals that not every believer has every gift. The
    translation should preserve Paul's theological emphasis on diversity within the
    one body rather than imply universal possession of these gifts.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
