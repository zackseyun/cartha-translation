id: 1CO.12.30
reference: 1 Corinthians 12:30
source:
  edition: SBLGNT
  text: μὴ πάντες χαρίσματα ἔχουσιν ἰαμάτων; μὴ πάντες γλώσσαις λαλοῦσιν; μὴ πάντες
    διερμηνεύουσιν;
translation:
  text: Not all have gifts of healings, do they? Not all speak in tongues, do they?
    Not all interpret, do they?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''gifts of healing.'' The Greek is plural: ''gifts of healings.'''
    reason: lexical_alternative
  - marker: b
    text: Or 'speak in languages.' In this context, the term refers to the gift commonly
      called 'tongues.'
    reason: lexical_alternative
lexical_decisions:
- source_word: μὴ πάντες
  chosen: Not all ... do they?
  alternatives:
  - Surely not all ... ?
  - All do not ... ?
  lexicon: BDAG
  rationale: The particle μή introducing these questions expects a negative answer.
    English idiom is best captured by a tag question such as 'Not all ... do they?'
    rather than a wooden 'Do all ... ?' because Paul is rhetorically stressing diversity
    of gifts.
- source_word: χαρίσματα
  chosen: gifts
  alternatives:
  - gracious gifts
  lexicon: BDAG
  rationale: χάρισμα commonly denotes a gift of grace or gracious endowment. 'Gifts'
    is the natural English rendering here, with the gracious source understood from
    context in 1 Corinthians 12.
- source_word: ἰαμάτων
  chosen: of healings
  alternatives:
  - of healing
  lexicon: BDAG
  rationale: The Greek uses the plural noun ἰαμάτων, and Paul elsewhere in this chapter
    uses the plural expression χαρίσματα ἰαμάτων. Rendering it 'of healings' preserves
    the plural form and avoids flattening the expression into a singular abstraction.
- source_word: γλώσσαις
  chosen: in tongues
  alternatives:
  - in languages
  lexicon: BDAG
  rationale: In this Pauline context γλῶσσα refers to the charismatic phenomenon traditionally
    called 'tongues.' 'In tongues' is the clearest contextual rendering. 'In languages'
    is lexically possible but less precise for this discourse context.
- source_word: λαλοῦσιν
  chosen: speak
  alternatives:
  - are speaking
  lexicon: BDAG
  rationale: Present indicative here expresses a general characteristic, not progressive
    aspect, so simple present 'speak' is best.
- source_word: διερμηνεύουσιν
  chosen: interpret
  alternatives:
  - translate
  - explain
  lexicon: BDAG
  rationale: Within the context of tongues in 1 Corinthians 12–14, διερμηνεύω refers
    to rendering the utterance intelligible to others. 'Interpret' is the standard
    and contextually precise English choice.
