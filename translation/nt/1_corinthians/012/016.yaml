theological_decisions:
- issue: Interpretive smoothing of Paul's body-metaphor rhetoric
  chosen_reading: Retain the source-text logic and repeated 'from the body' language
    rather than paraphrasing into a more idiomatic ecclesiological statement.
  alternative_readings:
  - '''that does not make it any less a part of the body'''
  rationale: The verse is not making a novel doctrinal claim but illustrating belonging
    within the church as Christ's body. Preserving the rhetorical form avoids importing
    explanatory language beyond what the Greek states.
  doctrine_reference: Translation philosophy §§1, 3, 5
