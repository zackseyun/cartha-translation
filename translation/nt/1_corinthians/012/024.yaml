id: 1CO.12.24
reference: 1 Corinthians 12:24
source:
  edition: SBLGNT
  text: τὰ δὲ εὐσχήμονα ἡμῶν οὐ χρείαν ⸀ἔχει. ἀλλὰ ὁ θεὸς συνεκέρασεν τὸ σῶμα, τῷ
    ⸀ὑστεροῦντι περισσοτέραν δοὺς τιμήν,
translation:
  text: but our presentable parts have no need. Instead, God has composed the body,
    giving greater honor to the part that lacked it,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'has blended together the body.' The Greek verb can emphasize combining
      or mixing into a unified whole.
    reason: lexical_alternative
lexical_decisions:
- source_word: εὐσχήμονα
  chosen: presentable parts
  alternatives:
  - comely parts
  - respectable parts
  - more honorable parts
  lexicon: BDAG
  rationale: In the immediate body metaphor, εὐσχήμονα contrasts with the less presentable
    parts in the previous verse. 'Presentable' fits modern English and preserves the
    idea of outward propriety/decency without archaic 'comely.' 'Parts' is supplied
    from context to make the neuter plural adjective natural in English.
- source_word: χρείαν ἔχει
  chosen: have no need
  alternatives:
  - have no necessity
  - do not need special treatment
  lexicon: BDAG
  rationale: This is the straightforward idiom 'have need.' The plural English verb
    reflects the neuter plural subject.
- source_word: συνεκέρασεν
  chosen: has composed
  alternatives:
  - has blended together
  - has combined
  - has arranged
  lexicon: BDAG
  rationale: The verb conveys mixing/combining into a unified whole. 'Has composed'
    works well in the body metaphor, expressing purposeful arrangement by God without
    sounding overly mechanical. The perfect-like English present perfect is stylistic,
    but the aorist sense could also be rendered simply as past; here it highlights
    God's completed ordering with present effect.
- source_word: σῶμα
  chosen: the body
  alternatives:
  - the body as a whole
  lexicon: BDAG
  rationale: Retains Paul's central metaphor of the church as a body. No expansion
    is needed in the main text.
- source_word: τῷ ὑστεροῦντι
  chosen: to the part that lacked it
  alternatives:
  - to the inferior part
  - to the part that was lacking
  - to the deficient part
  lexicon: BDAG
  rationale: The participle means 'lacking' or 'being deficient/behind.' In context
    it refers to the body part lacking honor, not intrinsic worth. 'The part that
    lacked it' makes explicit that what is lacking is honor, inferred from the following
    τιμήν.
- source_word: περισσοτέραν τιμήν
  chosen: greater honor
  alternatives:
  - more abundant honor
  - surpassing honor
  lexicon: BDAG
  rationale: A natural rendering of the comparative adjective plus noun. 'Greater
    honor' is clear modern English and preserves the comparative force.
- source_word: δοὺς
  chosen: giving
  alternatives:
  - by giving
  - having given
  lexicon: BDAG
  rationale: 'The aorist participle is contemporaneous or instrumental relative to
    the main verb: God composed the body by giving greater honor. ''Giving'' is the
    most natural English participial rendering.'
