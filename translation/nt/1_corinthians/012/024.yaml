theological_decisions:
- issue: Interpretation of God's action in arranging the body metaphor
  chosen_reading: God is described as purposefully ordering the members of the body
    so that less-honored parts receive greater honor.
  alternative_readings:
  - God merely mixed the body parts together physically
  - God's action refers only to natural human anatomy rather than the church analogy
  rationale: The immediate context is Paul's extended analogy of the church as Christ's
    body. The translation preserves the metaphor without over-allegorizing, while
    making clear that God's arrangement is purposeful and honor-bestowing.
  doctrine_reference: Translation philosophy §3, preserve theological tension rather
    than resolve it
