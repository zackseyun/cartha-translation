id: 1CO.12.22
reference: 1 Corinthians 12:22
source:
  edition: SBLGNT
  text: ἀλλὰ πολλῷ μᾶλλον τὰ δοκοῦντα μέλη τοῦ σώματος ἀσθενέστερα ὑπάρχειν ἀναγκαῖά
    ἐστιν,
translation:
  text: On the contrary, the parts of the body that seem to be weaker are necessary,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'much more, the parts of the body that seem weaker are necessary.' The
      Greek includes an explicit intensifier ('much more' / 'far more').
    reason: lexical_alternative
  - marker: b
    text: Or 'members' instead of 'parts.'
    reason: lexical_alternative
  - marker: c
    text: Or 'indispensable.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀλλὰ
  chosen: On the contrary
  alternatives:
  - But
  - Rather
  lexicon: BDAG
  rationale: Marks a strong contrast with the preceding statement. 'On the contrary'
    captures the corrective force more clearly than a bare 'but' in modern English.
- source_word: πολλῷ μᾶλλον
  chosen: the parts of the body that seem to be weaker are necessary
  alternatives:
  - much more
  - far more
  lexicon: BDAG
  rationale: The comparative intensifier means 'much more' or 'far more.' In English
    the force is preserved in the overall adversative construction, though not rendered
    woodenly as a separate phrase. The sense is that the opposite is emphatically
    true.
- source_word: τὰ δοκοῦντα
  chosen: that seem
  alternatives:
  - that appear
  - that are considered
  lexicon: BDAG
  rationale: δοκέω here expresses appearance or perception rather than actual status.
    'Seem' is concise and natural.
- source_word: μέλη
  chosen: parts
  alternatives:
  - members
  lexicon: BDAG
  rationale: In the body metaphor, 'parts' is more idiomatic for contemporary readers
    while preserving the anatomical sense. 'Members' is possible but can sound institutional
    in modern English.
- source_word: τοῦ σώματος
  chosen: of the body
  lexicon: BDAG
  rationale: Straightforward genitive specifying the whole to which the parts belong.
- source_word: ἀσθενέστερα
  chosen: weaker
  alternatives:
  - more weak
  - less strong
  lexicon: BDAG
  rationale: Comparative adjective indicating relative weakness, whether in appearance,
    honor, or function within the metaphor. 'Weaker' is the natural English comparative.
- source_word: ὑπάρχειν
  chosen: to be
  alternatives:
  - to exist as
  lexicon: BDAG
  rationale: Functions with δοκοῦντα to express what the parts seem to be. English
    idiom prefers 'seem to be' rather than a more literal but awkward 'seem to exist
    as.'
- source_word: ἀναγκαῖά ἐστιν
  chosen: are necessary
  alternatives:
  - are indispensable
  - are essential
  lexicon: BDAG
  rationale: Conveys necessity or indispensability. 'Necessary' is closest formally
    and fits the argument well; 'indispensable' is interpretive but possible.
