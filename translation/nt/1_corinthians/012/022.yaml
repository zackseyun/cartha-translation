theological_decisions:
- issue: Metaphorical force of body imagery in ecclesial context
  chosen_reading: Retain the concrete body metaphor without importing explicit ecclesiological
    explanation into the verse itself.
  alternative_readings:
  - Translate more interpretively toward church members rather than body parts
  rationale: Paul is applying the body metaphor to the church in context, but this
    verse itself speaks in terms of body parts. The translation preserves the metaphor
    and does not flatten it into an explanatory paraphrase.
  doctrine_reference: 'Translation philosophy: Never paraphrase beyond what the source
    text warrants; preserve theological tension rather than resolve it.'
