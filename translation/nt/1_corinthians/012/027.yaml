theological_decisions:
- issue: Rendering Χριστοῦ in a Pauline ecclesiological statement
  chosen_reading: Messiah
  alternative_readings:
  - Christ
  rationale: The term functions as a title here, not merely a proper-name element.
    Using 'Messiah' preserves the semantic content of Χριστός in line with project
    policy, while not altering the ecclesiological claim that believers corporately
    constitute the Messiah's body.
  doctrine_reference: 'DOCTRINE.md: Contested terms table (Χριστός → Messiah where
    title; Christ where name-like)'
- issue: Sense of ἐκ μέρους in the clause καὶ μέλη ἐκ μέρους
  chosen_reading: 'distributive: ''individually members of it'''
  alternative_readings:
  - '''members in particular'''
  - '''members in part'''
  rationale: The immediate context contrasts the one body with many members. The distributive
    sense best preserves Paul's tension between corporate unity and individual participation.
    'In part' could be misunderstood as partial possession rather than each member's
    place within the whole.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it'
