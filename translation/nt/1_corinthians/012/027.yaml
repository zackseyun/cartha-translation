  from: and individually members of it
  to: and its members individually
  rationale: The current rendering is grammatically correct and its meaning is clear. However, using the possessive 'its' before 'members' creates a slightly more fluid and concise English phrase ('and its members individually') compared to adding 'of it' after the noun. This change is a minor stylistic improvement, making the connection to 'the body' more immediate without altering the theological or lexical meaning.
