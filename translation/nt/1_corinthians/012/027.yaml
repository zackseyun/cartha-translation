id: 1CO.12.27
reference: 1 Corinthians 12:27
source:
  edition: SBLGNT
  text: Ὑμεῖς δέ ἐστε σῶμα Χριστοῦ καὶ μέλη ἐκ μέρους.
translation:
  text: Now you are the body of the Messiah, and its members individually.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the body of Christ.' The Greek title Χριστός can be rendered 'Messiah' or 'Christ'; here it is translated as a title.
    reason: alternative_reading
  - marker: b
    text: Literally 'members from a part' or 'members in particular'; the sense is that each of you is a member within the whole body.
    reason: lexical_alternative
  - marker: c
    text: Or 'and individually members of it'.
    reason: previous_rendering
lexical_decisions:
- source_word: Ὑμεῖς
  chosen: you
  alternatives:
  - you yourselves
  lexicon: BDAG
  rationale: Second-person plural pronoun, explicitly stated for emphasis. English 'you' captures the plural addressees; the emphatic force is conveyed by word order with 'Now you are' rather than an overly heavy 'you yourselves'.
- source_word: δέ
  chosen: Now
  alternatives:
  - But
  - And
  lexicon: BDAG
  rationale: Here δέ marks a transition/application from the body metaphor just developed to the Corinthians directly. 'Now' fits the discourse move in natural English better than the more adversative 'but'.
- source_word: σῶμα Χριστοῦ
  chosen: the body of the Messiah
  alternatives:
  - Messiah's body
  - the body of Christ
  lexicon: BDAG
  rationale: 'The anarthrous predicate nominative with genitive is best rendered as a definite expression in English in this context: Paul identifies the church as ''the body of'' the Messiah. ''Messiah'' follows the project''s default for Χριστός when used as a title rather than a name-like form.'
- source_word: Χριστοῦ
  chosen: the Messiah
  alternatives:
  - Christ
  lexicon: BDAG
  rationale: Genitive singular of Χριστός functions as the messianic title. Per doctrine guidance, the default rendering is 'Messiah' where title is in view; 'Christ' is preserved as an alternative.
- source_word: μέλη
  chosen: members
  alternatives:
  - parts
  - limbs
  lexicon: BDAG
  rationale: Within the body metaphor, μέλη refers to constituent body-members. 'Members' is idiomatic in English and preserves both the bodily metaphor and the corporate sense Paul is emphasizing.
- source_word: ἐκ μέρους
  chosen: individually
  alternatives:
  - in part
  - in particular
  - each for your part
  lexicon: BDAG
  rationale: 'In this context the phrase qualifies the members distributively: the Corinthians are collectively the Messiah''s body and individually its members. ''Individually'' best communicates the sense in contemporary English. More literal options like ''in part'' are possible but can suggest incompleteness rather than distributive membership.'
