theological_decisions:
- issue: Force of ζηλοῦτε
  chosen_reading: 'imperative: ''earnestly desire'''
  alternative_readings:
  - 'indicative: ''you are earnestly desiring'''
  rationale: The form can be read as either imperative or indicative in context. The
    imperative better matches the paraenetic flow of the chapter and the transition
    into Paul's commendation of love as the superior way. The alternative is preserved
    in a footnote to maintain transparency and avoid overstating certainty.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
