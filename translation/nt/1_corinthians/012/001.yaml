theological_decisions:
- issue: Interpretation of τῶν πνευματικῶν
  chosen_reading: Rendered as 'spiritual gifts' in the main text
  alternative_readings:
  - spiritual things
  - spiritual persons
  rationale: The Greek expression is elliptical and could be taken more broadly than
    'gifts.' However, the ensuing discussion centers on distributions and manifestations
    given by the Spirit (12:4–11), making 'spiritual gifts' the most contextually
    natural English rendering. To preserve the genuine lexical ambiguity, the broader
    alternative is retained in a footnote rather than being erased.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3 (Preserve theological
    tension rather than resolve it)'
