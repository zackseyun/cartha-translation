id: 1CO.12.1
reference: 1 Corinthians 12:1
source:
  edition: SBLGNT
  text: Περὶ δὲ τῶν πνευματικῶν, ἀδελφοί, οὐ θέλω ὑμᾶς ἀγνοεῖν.
translation:
  text: Now concerning spiritual gifts, brothers, I do not want you to be uninformed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'spiritual things'; the Greek is broader than 'gifts,' though the context
      in this chapter focuses on gifts given by the Spirit.
    reason: alternative_reading
  - marker: b
    text: '''Brothers'' here is Paul''s form of address to the congregation and likely
      includes women as well.'
    reason: cultural_note
lexical_decisions:
- source_word: Περὶ δὲ
  chosen: Now concerning
  alternatives:
  - Now about
  - Concerning
  lexicon: BDAG
  rationale: Introduces a new topic with mild discourse progression. 'Now concerning'
    reflects both περί ('concerning/about') and δέ as a transitional particle without
    overtranslating it.
- source_word: τῶν πνευματικῶν
  chosen: spiritual gifts
  alternatives:
  - spiritual things
  - spiritual persons
  - things of the Spirit
  lexicon: BDAG
  rationale: 'The adjective πνευματικός is substantivized and grammatically ambiguous:
    it can mean ''spiritual things'' or, less likely here, ''spiritual people/persons.''
    In the immediate context of chapters 12–14, Paul discusses manifestations and
    gifts of the Spirit, so ''spiritual gifts'' best captures the referent in clear
    English. Because ''gifts'' is interpretive rather than explicit in the Greek,
    the broader alternative is preserved in a footnote.'
- source_word: ἀδελφοί
  chosen: brothers
  alternatives:
  - brothers and sisters
  - brothers, sisters
  lexicon: BDAG
  rationale: Following the gender-accurate policy, the vocative masculine plural is
    rendered 'brothers.' In Pauline usage it often addresses the whole congregation,
    likely including women, but the source form is masculine. Inclusivity relevant
    to sense is preserved in a footnote rather than neutralizing the main text.
- source_word: οὐ θέλω ὑμᾶς ἀγνοεῖν
  chosen: I do not want you to be uninformed
  alternatives:
  - I do not want you to be ignorant
  - I do not want you to be unaware
  lexicon: BDAG
  rationale: This idiom is common in Paul for introducing important instruction. 'Uninformed'
    communicates the sense naturally in modern English without the pejorative force
    'ignorant' can carry today, while remaining faithful to ἀγνοεῖν ('to not know,
    be unaware').
