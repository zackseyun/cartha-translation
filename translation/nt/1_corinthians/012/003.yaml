theological_decisions:
- issue: Rendering of κύριος in the confessional phrase Κύριος Ἰησοῦς
  chosen_reading: Lord
  alternative_readings:
  - Master
  rationale: Per DOCTRINE.md, κύριος defaults to 'Lord.' In this Pauline confessional
    context, 'Lord' preserves both the title's ordinary sense and its high christological
    weight without over-specifying theological implications beyond the text.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Implication of spiritual enablement in 'no one is able to say, “Jesus is
    Lord,” except by the Holy Spirit'
  chosen_reading: Retained as stated without narrowing it to mere verbal utterance
    or expanding it to a full doctrine of regeneration
  alternative_readings:
  - A merely sincere confession
  - A comprehensive statement about conversion/regeneration
  rationale: The verse links true confession of Jesus' lordship to the Holy Spirit's
    agency. The translation preserves that theological claim while avoiding importing
    a more detailed doctrinal system not explicit in the wording.
  doctrine_reference: DOCTRINE.md Affirmations; Preserve theological tension rather
    than resolve it
