id: 1CO.12.3
reference: 1 Corinthians 12:3
source:
  edition: SBLGNT
  text: διὸ γνωρίζω ὑμῖν ὅτι οὐδεὶς ἐν πνεύματι θεοῦ λαλῶν λέγει· Ἀνάθεμα ⸀Ἰησοῦς,
    καὶ οὐδεὶς δύναται εἰπεῖν· ⸂Κύριος Ἰησοῦς⸃ εἰ μὴ ἐν πνεύματι ἁγίῳ.
translation:
  text: Therefore I make known to you that no one speaking by the Spirit of God says,
    “Jesus is accursed,” and no one is able to say, “Jesus is Lord,” except by the
    Holy Spirit.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “Jesus be accursed,” reflecting the force of the Greek exclamation Ἀνάθεμα
      Ἰησοῦς.
    reason: lexical_alternative
  - marker: b
    text: 'Greek, “Lord Jesus”; in context the sense is confessional: “Jesus is Lord.”'
    reason: lexical_alternative
lexical_decisions:
- source_word: διό
  chosen: Therefore
  alternatives:
  - For this reason
  - So
  lexicon: BDAG
  rationale: Marks an inference from the preceding discussion; 'Therefore' is natural
    and preserves the logical connection.
- source_word: γνωρίζω
  chosen: I make known
  alternatives:
  - I inform
  - I want you to know
  lexicon: BDAG
  rationale: A transparent rendering of the verb's causative sense ('make known').
    'I want you to know' is idiomatic but adds volitional nuance not explicit in the
    Greek.
- source_word: οὐδεὶς
  chosen: no one
  alternatives:
  - nobody
  lexicon: BDAG
  rationale: Standard, clear rendering of the universal negative.
- source_word: ἐν πνεύματι θεοῦ
  chosen: by the Spirit of God
  alternatives:
  - in the Spirit of God
  - by God's Spirit
  lexicon: BDAG
  rationale: Here ἐν with πνεῦμα is best taken instrumentally or in the sphere of
    spiritual inspiration. 'By the Spirit of God' communicates agency/instrument clearly
    in English.
- source_word: λαλῶν
  chosen: speaking
  alternatives:
  - talking
  - uttering
  lexicon: BDAG
  rationale: Present participle describing the person in the act/state of inspired
    speech; 'speaking' is the most natural equivalent.
- source_word: λέγει
  chosen: says
  alternatives:
  - declares
  lexicon: BDAG
  rationale: Simple present is sufficient and matches the direct-speech construction.
- source_word: Ἀνάθεμα Ἰησοῦς
  chosen: Jesus is accursed
  alternatives:
  - Anathema is Jesus
  - Jesus be accursed
  - Jesus is under a curse
  lexicon: BDAG
  rationale: The verbless exclamation is rendered idiomatically in English with an
    implied copula. 'Jesus is accursed' preserves the force of ἀνάθεμα without importing
    a liturgical transliteration. 'Jesus be accursed' is possible, but the Greek here
    is not an explicit imperative.
- source_word: δύναται εἰπεῖν
  chosen: is able to say
  alternatives:
  - can say
  lexicon: BDAG
  rationale: Slightly more formal than 'can say' and preserves the sense of capability/possibility.
- source_word: Κύριος Ἰησοῦς
  chosen: Jesus is Lord
  alternatives:
  - Lord Jesus
  lexicon: BDAG
  rationale: 'Because the phrase is the content of what is said after εἰπεῖν, English
    idiom requires an implied copula: ''Jesus is Lord.'' This also preserves the confessional
    force of the nominative expression. ''Lord Jesus'' would sound like direct address
    or a title rather than a confession.'
- source_word: εἰ μὴ
  chosen: except
  alternatives:
  - unless
  lexicon: BDAG
  rationale: In this construction it marks the sole exception. 'Except' reads more
    naturally with the preceding negative statement.
- source_word: ἐν πνεύματι ἁγίῳ
  chosen: by the Holy Spirit
  alternatives:
  - in the Holy Spirit
  lexicon: BDAG
  rationale: As earlier in the verse, ἐν is best rendered instrumentally here. Capitalization
    reflects the personal divine referent in context.
