id: 1CO.12.2
reference: 1 Corinthians 12:2
source:
  edition: SBLGNT
  text: οἴδατε ὅτι ὅτε ἔθνη ἦτε πρὸς τὰ εἴδωλα τὰ ἄφωνα ὡς ἂν ἤγεσθε ἀπαγόμενοι.
translation:
  text: You know that when you were Gentiles, you were being led away to the mute
    idols, however you were led.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the speechless idols' or 'idols that cannot speak.'
    reason: lexical_alternative
  - marker: b
    text: Or 'you were being led away to the mute idols, however you were being led.'
      The Greek emphasizes their passive movement under former influence.
    reason: lexical_alternative
lexical_decisions:
- source_word: οἴδατε
  chosen: You know
  alternatives:
  - You know well
  - You are aware
  lexicon: BDAG
  rationale: A straightforward present sense fits Paul's appeal to shared knowledge.
    'You know' is idiomatic and sufficiently direct.
- source_word: ἔθνη
  chosen: Gentiles
  alternatives:
  - nations
  - pagans
  lexicon: BDAG
  rationale: In this context Paul contrasts the Corinthians' former non-Jewish, pagan
    state with their present life in the Spirit. 'Gentiles' best preserves the ethnic-religious
    force without the pejorative tone of 'pagans,' while 'nations' would sound too
    literal and unclear in English.
- source_word: πρὸς τὰ εἴδωλα
  chosen: to the idols
  alternatives:
  - toward the idols
  - to idols
  lexicon: BDAG
  rationale: πρός with the accusative here conveys movement/direction toward an object
    of devotion. 'To the idols' is natural English and preserves the directional sense.
- source_word: τὰ ἄφωνα
  chosen: the mute
  alternatives:
  - speechless
  - voiceless
  - dumb
  lexicon: BDAG
  rationale: The adjective highlights the idols' inability to speak, likely in contrast
    to true spiritual utterance in the surrounding context. 'Mute' is concise, modern
    enough, and avoids the misleading modern connotations of 'dumb.'
- source_word: εἴδωλα τὰ ἄφωνα
  chosen: the mute idols
  alternatives:
  - the speechless idols
  - idols that cannot speak
  lexicon: BDAG
  rationale: Keeping the adjective attributive in English preserves Paul's compact
    phrasing and rhetorical force.
- source_word: ὡς ἂν
  chosen: however
  alternatives:
  - as
  - just as
  - whenever
  lexicon: BDAG
  rationale: 'The combination here has an indefinite/modal force: ''in whatever manner''
    or ''however.'' ''However'' best captures the sense that they were passively carried
    along in whatever way they happened to be led.'
- source_word: ἤγεσθε
  chosen: you were led
  alternatives:
  - you were being led
  - you were guided
  lexicon: BDAG
  rationale: The imperfect denotes ongoing past action. In English, the following
    participle already conveys process, so 'you were led' avoids awkward repetition
    while preserving the passive sense.
- source_word: ἀπαγόμενοι
  chosen: being led away
  alternatives:
  - being carried away
  - being driven away
  lexicon: BDAG
  rationale: The participle intensifies the passive movement and suggests being taken
    off toward false worship. 'Being led away' is clear and preserves the metaphor
    of being drawn off.
