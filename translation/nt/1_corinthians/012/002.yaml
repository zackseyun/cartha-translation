theological_decisions:
- issue: Sense of ἔθνη in relation to the Corinthians' former life
  chosen_reading: Rendered as 'Gentiles' to preserve the ethnic-religious identity
    of their pre-Christian state without importing a stronger moral label.
  alternative_readings:
  - pagans
  - nations
  rationale: The verse recalls their former life before confessing Jesus as Lord.
    'Gentiles' is the most textually grounded and least interpretively loaded English
    choice in Pauline usage here.
  doctrine_reference: Translation philosophy §1, §6
- issue: Rhetorical contrast between mute idols and Spirit-inspired speech in the
    surrounding context
  chosen_reading: Preserved with 'mute idols' rather than a looser paraphrase.
  alternative_readings:
  - idols that cannot speak
  rationale: The wording keeps Paul's contrast intact without expanding it into a
    theological explanation not stated in the verse itself.
  doctrine_reference: Translation philosophy §1, §3
