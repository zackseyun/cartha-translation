id: 1CO.12.13
reference: 1 Corinthians 12:13
source:
  edition: SBLGNT
  text: καὶ γὰρ ἐν ἑνὶ πνεύματι ἡμεῖς πάντες εἰς ἓν σῶμα ἐβαπτίσθημεν, εἴτε Ἰουδαῖοι
    εἴτε Ἕλληνες, εἴτε δοῦλοι εἴτε ἐλεύθεροι, καὶ ⸀πάντες ἓν πνεῦμα ἐποτίσθημεν.
translation:
  text: For indeed, in one Spirit we all were baptized into one body—whether Jews
    or Greeks, whether slaves or free—and we all were made to drink one Spirit.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'by one Spirit'; the Greek ἐν can indicate sphere ('in') or means/agency
      ('by').
    reason: alternative_reading
  - marker: b
    text: Or 'we all were given one Spirit to drink.'
    reason: lexical_alternative
  - marker: c
    text: Or 'one spirit' if taken less specifically, though the context strongly
      points to the Holy Spirit.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐν ἑνὶ πνεύματι
  chosen: in one Spirit
  alternatives:
  - by one Spirit
  - with one Spirit
  lexicon: BDAG
  rationale: The preposition ἐν with the dative can express sphere, means, or agency.
    Here 'in one Spirit' preserves the Greek form and the theological tension without
    over-resolving whether the Spirit is the sphere or agent of baptism. Because this
    is a debated nuance, alternatives are preserved in a footnote rather than fixed
    dogmatically.
- source_word: ἐβαπτίσθημεν
  chosen: we all were baptized
  alternatives:
  - we were immersed
  lexicon: BDAG
  rationale: '''Were baptized'' is the standard and contextually appropriate rendering
    for βαπτίζω in Pauline ecclesial usage. ''Immersed'' is lexically possible but
    would import a mode emphasis not explicit here.'
- source_word: εἰς ἓν σῶμα
  chosen: into one body
  alternatives:
  - into a single body
  lexicon: BDAG
  rationale: εἰς marks movement/result into incorporation, and 'one body' preserves
    Paul's body-unity imagery tied to the church in this context.
- source_word: Ἰουδαῖοι
  chosen: Jews
  alternatives:
  - Judeans
  lexicon: BDAG
  rationale: In this ethnic/religious pairing with 'Greeks,' the sense is 'Jews,'
    not geographically 'Judeans.'
- source_word: Ἕλληνες
  chosen: Greeks
  alternatives:
  - Gentiles
  lexicon: BDAG
  rationale: The lexical form is specifically 'Greeks.' While in some contexts it
    can function broadly for non-Jews, here the direct ethnic contrast is best preserved
    as 'Greeks.'
- source_word: δοῦλοι
  chosen: slaves
  alternatives:
  - servants
  lexicon: BDAG
  rationale: Per the doctrine guidance, δοῦλος should be rendered 'slave' where bonded
    status is salient. In this social-status contrast with 'free,' the bonded nature
    is explicit, so 'slaves' is the most accurate rendering.
- source_word: ἐλεύθεροι
  chosen: free
  alternatives:
  - freemen
  lexicon: BDAG
  rationale: '''Free'' naturally and accurately contrasts with ''slaves'' in modern
    English without unnecessary archaism.'
- source_word: ἓν πνεῦμα
  chosen: one Spirit
  alternatives:
  - one spirit
  lexicon: BDAG
  rationale: Given the parallel with the first clause and Paul's argument about the
    unifying work of the Holy Spirit, the referent is best taken as the Spirit, hence
    capitalized in English. The lowercase alternative is preserved in a footnote because
    some take it as a shared spiritual reality.
- source_word: ἐποτίσθημεν
  chosen: were made to drink
  alternatives:
  - were given to drink
  - were all given one Spirit to drink
  lexicon: BDAG
  rationale: The passive of ποτίζω means 'to give drink' or 'cause to drink.' 'Were
    made to drink' is a natural rendering that preserves the passive force and the
    metaphor of shared participation. The alternative word order 'were all given one
    Spirit to drink' reflects another possible construal in English and is preserved
    in a footnote.
- source_word: καὶ γὰρ
  chosen: For indeed
  alternatives:
  - For
  - Indeed
  lexicon: BDAG
  rationale: This combination gives explanatory force with emphasis. 'For indeed'
    preserves both particles in readable English.
- source_word: πάντες
  chosen: we all
  alternatives:
  - all of us
  lexicon: BDAG
  rationale: The explicit pronoun ἡμεῖς plus πάντες is emphatic; 'we all' captures
    the collective emphasis succinctly.
