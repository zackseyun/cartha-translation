theological_decisions:
- issue: Whether ἐν ἑνὶ πνεύματι should be rendered instrumentally ('by one Spirit')
    or locatively/spherically ('in one Spirit')
  chosen_reading: in one Spirit
  alternative_readings:
  - by one Spirit
  - with one Spirit
  rationale: The Greek construction allows more than one nuance, and the doctrine
    requires preserving theological tension rather than resolving genuine ambiguity.
    'In one Spirit' keeps closest to the Greek wording while allowing readers to see
    the Spirit's unifying role without forcing a denominationally loaded reading about
    Spirit baptism.
  doctrine_reference: DOCTRINE.md Translation philosophy §3
- issue: Whether ἓν πνεῦμα in the second clause refers to the Holy Spirit or to a
    shared spiritual reality
  chosen_reading: one Spirit
  alternative_readings:
  - one spirit
  rationale: The immediate context of Paul's discussion of the Spirit's unifying work
    strongly favors reference to the Holy Spirit. Still, because capitalization is
    an interpretive decision in English, the alternative is preserved in a footnote.
  doctrine_reference: DOCTRINE.md Translation philosophy §3
- issue: Rendering δοῦλοι in a social-status contrast
  chosen_reading: slaves
  alternative_readings:
  - servants
  rationale: The doctrine's contested-terms guidance prefers 'slave' where bonded
    status is salient. In the pair 'slaves or free,' the contrast explicitly concerns
    legal/social bondage versus freedom, so 'slaves' is required for accuracy.
  doctrine_reference: 'DOCTRINE.md Contested terms table: δοῦλος'
