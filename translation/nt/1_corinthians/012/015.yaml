id: 1CO.12.15
reference: 1 Corinthians 12:15
source:
  edition: SBLGNT
  text: ἐὰν εἴπῃ ὁ πούς· Ὅτι οὐκ εἰμὶ χείρ, οὐκ εἰμὶ ἐκ τοῦ σώματος, οὐ παρὰ τοῦτο
    οὐκ ἔστιν ἐκ τοῦ σώματος;
translation:
  text: If the foot says, “Because I am not a hand, I am not from the body,” it is
    not for this reason not from the body, is it?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, “I do not belong to the body ... that does not make
      it any less part of the body.”
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐὰν εἴπῃ
  chosen: If ... says
  alternatives:
  - If ... should say
  - If ... were to say
  lexicon: BDAG
  rationale: ἐὰν with the aorist subjunctive introduces a present general condition.
    'If ... says' is natural modern English and preserves the hypothetical force without
    sounding overly formal.
- source_word: ὁ πούς
  chosen: the foot
  lexicon: BDAG
  rationale: Literal body-part imagery should be preserved because Paul’s metaphor
    depends on concrete members of the body.
- source_word: Ὅτι
  chosen: Because
  alternatives:
  - That
  lexicon: BDAG
  rationale: 'Here ὅτι introduces the content of the foot’s statement with a causal
    nuance: ''Because I am not a hand...'' English ''Because'' best reflects the logic
    of the complaint.'
- source_word: χείρ
  chosen: a hand
  lexicon: BDAG
  rationale: Literal rendering maintains the body metaphor and the contrast with 'foot.'
    The indefinite article is idiomatic in English.
- source_word: ἐκ τοῦ σώματος
  chosen: from the body
  alternatives:
  - part of the body
  - of the body
  lexicon: BDAG
  rationale: A more formal rendering of ἐκ is retained as 'from' to mirror the repeated
    Greek phrase and preserve the rhetorical wording. 'Part of the body' is interpretive
    and smoother, but less transparent to the source.
- source_word: οὐ παρὰ τοῦτο
  chosen: not for this reason
  alternatives:
  - not because of this
  - not on account of this
  lexicon: BDAG
  rationale: This phrase denies the conclusion on the basis stated. 'Not for this
    reason' closely tracks the Greek while remaining understandable.
- source_word: οὐκ ἔστιν ἐκ τοῦ σώματος
  chosen: it is not ... not from the body, is it?
  alternatives:
  - it is not therefore not from the body
  - that does not make it any less from the body
  lexicon: BDAG
  rationale: The Greek uses a rhetorical question with double negation to reject the
    foot’s claim. The chosen wording preserves the negation pattern and rhetorical
    force more transparently than a smoothed paraphrase.
