theological_decisions:
- issue: Degree of smoothing in Paul’s body-metaphor rhetoric
  chosen_reading: Preserve the repeated 'from the body' phrasing and the rhetorical
    double negation rather than paraphrasing to 'part of the body.'
  alternative_readings:
  - Because I am not a hand, I do not belong to the body ... that does not make it
    any less a part of the body
  rationale: No doctrinal controversy is present, but the translation philosophy prioritizes
    original-language primacy and preserving textual tension. Keeping the repetition
    and negation makes Paul’s argument auditable and closer to the Greek structure.
  doctrine_reference: Translation philosophy §§1, 3, 5
