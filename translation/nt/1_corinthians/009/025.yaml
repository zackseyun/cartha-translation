theological_decisions:
- issue: Nature of the reward metaphor
  chosen_reading: Retain the athletic prize image as 'crown' without specifying a
    doctrinal referent beyond Paul's contrast between temporary and enduring reward.
  alternative_readings:
  - Interpret explicitly as eternal life
  - Interpret explicitly as heavenly rewards
  rationale: The verse itself uses metaphor and does not define the reward with doctrinal
    precision. Preserving the image avoids importing a narrower theological system
    than the text states.
  doctrine_reference: Preserve theological tension rather than resolve it.
