id: 1CO.9.25
reference: 1 Corinthians 9:25
source:
  edition: SBLGNT
  text: πᾶς δὲ ὁ ἀγωνιζόμενος πάντα ἐγκρατεύεται, ἐκεῖνοι μὲν οὖν ἵνα φθαρτὸν στέφανον
    λάβωσιν, ἡμεῖς δὲ ἄφθαρτον.
translation:
  text: Now everyone who competes exercises self-control in all things. They do so
    in order to receive a perishable crown, but we an imperishable one.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'wreath'; the Greek word refers to the victor's garland awarded in athletic
      contests.
    reason: lexical_alternative
lexical_decisions:
- source_word: πᾶς
  chosen: everyone
  alternatives:
  - every man
  - all
  lexicon: BDAG
  rationale: Generic singular with representative force; 'everyone' conveys the inclusive
    sense naturally in English without overstating masculinity, while matching the
    referent of the participial phrase.
- source_word: ἀγωνιζόμενος
  chosen: who competes
  alternatives:
  - who strives
  - who contends
  - who trains for a contest
  lexicon: BDAG
  rationale: In the athletic metaphor of the immediate context, the verb refers to
    engaging in competitive struggle. 'Who competes' is clear modern English and fits
    the race imagery better than the more general 'strives'.
- source_word: πάντα
  chosen: in all things
  alternatives:
  - in everything
  - in every respect
  lexicon: BDAG
  rationale: Accusative of respect/scope with ἐγκρατεύεται. 'In all things' preserves
    the breadth of the discipline without narrowing it merely to diet or training.
- source_word: ἐγκρατεύεται
  chosen: exercises self-control
  alternatives:
  - is self-controlled
  - practices self-discipline
  lexicon: BDAG
  rationale: The middle/passive form here denotes practicing restraint. 'Exercises
    self-control' preserves the active, habitual sense and suits the athletic analogy.
- source_word: ἐκεῖνοι μὲν οὖν
  chosen: They do so
  alternatives:
  - Those men indeed
  - They indeed
  - Those ones therefore
  lexicon: BDAG
  rationale: This resumptive contrast points back to the athletes just mentioned.
    'They do so' makes explicit the implied verbal idea in idiomatic English while
    preserving the contrast with ἡμεῖς δέ.
- source_word: ἵνα
  chosen: in order to
  alternatives:
  - so that
  - that
  lexicon: BDAG
  rationale: Expresses purpose. 'In order to' clearly marks intentionality in contemporary
    English.
- source_word: φθαρτὸν
  chosen: perishable
  alternatives:
  - corruptible
  - fading
  lexicon: BDAG
  rationale: Contrasts directly with ἄφθαρτον. 'Perishable' is the most natural modern
    antonym pair with 'imperishable' and avoids archaic 'corruptible.'
- source_word: στέφανον
  chosen: crown
  alternatives:
  - wreath
  - victor's wreath
  lexicon: BDAG
  rationale: στέφανος in athletic contexts refers to the victor's wreath, but 'crown'
    is the standard concise rendering and preserves the metaphor's honor/reward dimension.
    The more specific athletic sense is worth preserving in a footnote.
- source_word: λάβωσιν
  chosen: receive
  alternatives:
  - obtain
  - gain
  lexicon: BDAG
  rationale: Aorist subjunctive after ἵνα expressing intended result. 'Receive' is
    idiomatic and fits the image of being awarded a prize.
- source_word: ἡμεῖς δὲ ἄφθαρτον
  chosen: but we an imperishable one
  alternatives:
  - but we an imperishable crown
  - but we one that is imperishable
  lexicon: BDAG
  rationale: The noun 'crown' is ellipsed in Greek and supplied from the previous
    clause. 'An imperishable one' preserves the ellipsis more closely while remaining
    intelligible in English.
