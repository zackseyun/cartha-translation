theological_decisions:
- issue: Meaning of Paul's claimed ἐξουσία in context
  chosen_reading: Paul refers to the apostolic right to forgo manual labor and receive
    material support from the churches.
  alternative_readings:
  - Paul refers more generally to authority or freedom without specific reference
    to financial support.
  rationale: The immediate context of 1 Corinthians 9 concerns the rights of apostles,
    especially receiving food, drink, and support, and Paul's voluntary renunciation
    of those rights. Rendering ἐξουσία as 'right' and μὴ ἐργάζεσθαι as 'not to work'
    preserves that contextual sense without overexpanding the text.
