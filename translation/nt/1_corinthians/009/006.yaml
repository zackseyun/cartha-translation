id: 1CO.9.6
reference: 1 Corinthians 9:6
source:
  edition: SBLGNT
  text: ἢ μόνος ἐγὼ καὶ Βαρναβᾶς οὐκ ἔχομεν ἐξουσίαν ⸀μὴ ἐργάζεσθαι;
translation:
  text: Or is it only Barnabas and I who have no right not to work?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'authority not to work' or 'freedom not to labor.' The sense here is
      the right to refrain from manual work in order to be supported in ministry.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἢ
  chosen: Or
  alternatives:
  - Or is it that
  lexicon: BDAG
  rationale: Introduces the next rhetorical alternative in Paul's argument; simple
    'Or' best preserves the connective force and rhetorical flow.
- source_word: μόνος
  chosen: only
  alternatives:
  - alone
  lexicon: BDAG
  rationale: μόνος modifies the coordinated subject ('I and Barnabas'), emphasizing
    exclusivity. 'Only' is idiomatic in English rhetorical questions.
- source_word: ἐγὼ καὶ Βαρναβᾶς
  chosen: Barnabas and I
  alternatives:
  - I and Barnabas
  lexicon: BDAG
  rationale: The Greek order is 'I and Barnabas,' but English idiom strongly prefers
    'Barnabas and I' without changing meaning. Names are transliterated per translation
    philosophy.
- source_word: οὐκ ἔχομεν
  chosen: have no
  alternatives:
  - do not have
  lexicon: BDAG
  rationale: A natural English rendering of the negated present indicative; concise
    and clear in a rhetorical question.
- source_word: ἐξουσίαν
  chosen: right
  alternatives:
  - authority
  - freedom
  lexicon: BDAG
  rationale: In this context Paul speaks of apostolic entitlement or legitimate claim
    to material support, not governing authority. 'Right' best captures the practical-juridical
    sense in contemporary English.
- source_word: μὴ ἐργάζεσθαι
  chosen: not to work
  alternatives:
  - to refrain from working
  - not to labor
  lexicon: BDAG
  rationale: 'The infinitive with μή expresses the content of the right: the right
    to abstain from manual labor for self-support. ''Not to work'' is the clearest
    and most natural rendering.'
