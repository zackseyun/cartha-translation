theological_decisions:
- issue: Meaning of 'the weak' in context
  chosen_reading: Render broadly as 'the weak' without narrowing in the main text.
  alternative_readings:
  - the weak in conscience
  - the powerless
  rationale: Within 1 Corinthians, 'weak' often refers to those with vulnerable consciences,
    especially in chapters 8–10, but the immediate wording is generalized and rhetorically
    parallel to the surrounding groups. Narrowing the phrase in the main text would
    resolve more than the Greek states.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Force of 'save'
  chosen_reading: Use 'save' in the main text for Paul's evangelistic aim.
  alternative_readings:
  - win for salvation
  - help save
  rationale: The verb σώζω carries genuine salvation language here. Rendering it more
    weakly would understate the text; rendering it as if Paul is the ultimate agent
    would overstate it. English 'I might save some' appropriately reflects Paul's
    instrumental role in context.
  doctrine_reference: Optimal equivalence; do not import doctrinal claims the text
    does not make.
