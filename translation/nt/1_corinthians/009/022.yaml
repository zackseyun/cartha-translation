id: 1CO.9.22
reference: 1 Corinthians 9:22
source:
  edition: SBLGNT
  text: ἐγενόμην τοῖς ⸀ἀσθενέσιν ἀσθενής, ἵνα τοὺς ἀσθενεῖς κερδήσω· τοῖς πᾶσιν ⸀γέγονα
    πάντα, ἵνα πάντως τινὰς σώσω.
translation:
  text: To the weak I became weak, so that I might win the weak. I have become all
    things to all people, so that by all means I might save some.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the weak in conscience'; in 1 Corinthians this expression can refer
      specifically to those whose consciences are vulnerable.
    reason: lexical_alternative
  - marker: b
    text: Or 'in every way' or 'at all costs'; the phrase means using every possible
      means in pursuit of the goal.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγενόμην
  chosen: I became
  alternatives:
  - I was made
  - I came to be
  lexicon: BDAG
  rationale: Aorist middle of γίνομαι here denotes Paul's adaptive action in past
    ministry situations. 'I became' is idiomatic and preserves the sense of entering
    a condition or stance.
- source_word: ἀσθενέσιν / ἀσθενής / ἀσθενεῖς
  chosen: weak
  alternatives:
  - powerless
  - weak in conscience
  lexicon: BDAG
  rationale: The repeated adjective is best preserved with the same English gloss
    for rhetorical force. In 1 Corinthians, 'weak' can include those weak in conscience,
    but the verse itself leaves the category broad enough that 'weak' should remain
    in the main text.
- source_word: κερδήσω
  chosen: I might win
  alternatives:
  - I might gain
  lexicon: BDAG
  rationale: In Pauline evangelistic context, κερδαίνω commonly means to win people
    over rather than merely gain advantage. 'Win' is natural English and fits the
    missionary aim.
- source_word: τοῖς πᾶσιν
  chosen: to all people
  alternatives:
  - to all
  - for all
  lexicon: BDAG
  rationale: The dative phrase is elliptical in Greek. Supplying 'people' makes the
    sense clear in English without overtranslating, since the context is Paul's relation
    to various groups of persons.
- source_word: γέγονα
  chosen: I have become
  alternatives:
  - I became
  lexicon: BDAG
  rationale: The perfect tense suggests a present state resulting from Paul's pattern
    of conduct. 'I have become' preserves that aspect better than a simple past.
- source_word: πάντα
  chosen: all things
  alternatives:
  - everything
  lexicon: BDAG
  rationale: The idiom 'all things to all people' is both literal and natural here,
    preserving the breadth and rhetorical compactness of the Greek.
- source_word: πάντως
  chosen: by all means
  alternatives:
  - certainly
  - in every way
  - at all costs
  lexicon: BDAG
  rationale: πάντως here modifies the saving aim with the sense of using every possible
    legitimate means. 'By all means' is the closest idiomatic equivalent without implying
    unethical compromise.
- source_word: τινὰς
  chosen: some
  alternatives:
  - some people
  - certain ones
  lexicon: BDAG
  rationale: 'The indefinite pronoun is intentionally modest: Paul does not claim
    all will be saved through his efforts. ''Some'' preserves that restraint.'
- source_word: σώσω
  chosen: I might save
  alternatives:
  - I might bring to salvation
  lexicon: BDAG
  rationale: σῴζω in this evangelistic context refers to salvation. 'Save' is the
    standard concise rendering and preserves the theological weight of the verb.
