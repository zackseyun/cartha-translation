id: 1CO.9.1
reference: 1 Corinthians 9:1
source:
  edition: SBLGNT
  text: Οὐκ εἰμὶ ⸂ἐλεύθερος; οὐκ εἰμὶ ἀπόστολος⸃; οὐχὶ ⸀Ἰησοῦν τὸν κύριον ἡμῶν ἑόρακα;
    οὐ τὸ ἔργον μου ὑμεῖς ἐστε ἐν κυρίῳ;
translation:
  text: Am I not free? Am I not an apostle? Have I not seen Jesus our Lord? Are you
    not my work in the Lord?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, 'our Lord Jesus.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐλεύθερος
  chosen: free
  alternatives:
  - independent
  lexicon: BDAG
  rationale: In this context Paul is asserting his liberty/rights, especially in relation
    to the preceding discussion of freedom. 'Free' is the most natural and direct
    English equivalent.
- source_word: ἀπόστολος
  chosen: apostle
  alternatives:
  - messenger
  - envoy
  lexicon: BDAG
  rationale: The term refers here to Paul's recognized apostolic office, not merely
    a generic messenger. 'Apostle' preserves the technical ecclesial sense established
    in the New Testament.
- source_word: Ἰησοῦν τὸν κύριον ἡμῶν
  chosen: Jesus our Lord
  alternatives:
  - our Lord Jesus
  lexicon: BDAG
  rationale: κύριος is rendered 'Lord' per the project's default for this christological
    title. The word order 'Jesus our Lord' follows the Greek more closely while remaining
    natural English.
- source_word: ἑόρακα
  chosen: have ... seen
  alternatives:
  - saw
  lexicon: BDAG
  rationale: The perfect form naturally supports an English present perfect, highlighting
    the abiding significance of Paul's having seen the risen Lord as credentialing
    his apostleship.
- source_word: ἔργον
  chosen: work
  alternatives:
  - result
  - handiwork
  lexicon: BDAG
  rationale: Paul refers to the Corinthian believers/church as the product of his
    apostolic labor. 'Work' is the most straightforward rendering and fits Paul's
    rhetorical argument.
- source_word: ἐν κυρίῳ
  chosen: in the Lord
  alternatives:
  - in union with the Lord
  lexicon: BDAG
  rationale: This Pauline phrase is best preserved in its familiar but still transparent
    form. It indicates the sphere or relationship in which the Corinthians are Paul's
    work.
- source_word: οὐκ / οὐχὶ / οὐ
  chosen: Am I not ... ? / Have I not ... ? / Are you not ... ?
  lexicon: BDAG
  rationale: These negatives introduce rhetorical questions expecting an affirmative
    answer. English idiom is best served by rendering them as negative interrogatives.
