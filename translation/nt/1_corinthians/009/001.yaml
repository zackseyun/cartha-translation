theological_decisions:
- issue: Force of Paul's claim to have seen Jesus
  chosen_reading: A reference to Paul's seeing the risen Jesus as support for his
    apostolic status
  alternative_readings:
  - A more general claim to having seen Jesus
  rationale: In context, the question functions as evidence for Paul's apostleship.
    The translation remains formally simple ('Have I not seen Jesus our Lord?') without
    importing 'risen' into the main text, since the Greek does not explicitly state
    it.
  doctrine_reference: Preserve theological tension rather than resolve it.
