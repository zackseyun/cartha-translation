id: 1CO.9.3
reference: 1 Corinthians 9:3
source:
  edition: SBLGNT
  text: Ἡ ἐμὴ ἀπολογία τοῖς ἐμὲ ἀνακρίνουσίν ⸂ἐστιν αὕτη⸃.
translation:
  text: This is my defense to those who examine me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'This is my defense before those who judge me.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπολογία
  chosen: defense
  alternatives:
  - reply
  - vindication
  lexicon: BDAG
  rationale: In this context Paul is answering scrutiny regarding his apostolic rights
    and conduct. 'Defense' best captures a formal answer to charges or criticism without
    sounding overly technical. 'Apology' in modern English is misleading because it
    suggests an expression of regret.
- source_word: ἀνακρίνουσίν
  chosen: examine
  alternatives:
  - judge
  - question
  - investigate
  lexicon: BDAG
  rationale: The participle denotes those subjecting Paul to scrutiny or evaluation.
    'Examine' preserves the sense of critical assessment without importing a final
    judicial verdict as strongly as 'judge' might. The immediate context concerns
    evaluation of Paul's apostleship and rights.
- source_word: Ἡ ἐμὴ
  chosen: my
  alternatives:
  - my own
  lexicon: BDAG
  rationale: The possessive is straightforward. English does not require an emphatic
    'my own' here unless extra stress is intended; simple 'my' is natural and sufficient.
- source_word: τοῖς ἐμὲ ἀνακρίνουσίν
  chosen: to those who examine me
  alternatives:
  - before those who examine me
  - to those who judge me
  lexicon: BDAG
  rationale: The dative is best taken as the indirect object of Paul's 'defense'—the
    audience to whom it is addressed. 'To those who examine me' is idiomatic and reflects
    the Greek construction.
- source_word: ἐστιν αὕτη
  chosen: This is
  alternatives:
  - is this
  lexicon: BDAG
  rationale: The clause identifies what follows or what Paul has just said as his
    defense. English normal word order is 'This is,' even though Greek places the
    verb before the demonstrative in this reading.
