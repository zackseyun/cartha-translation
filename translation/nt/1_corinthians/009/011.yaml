theological_decisions:
- issue: Meaning of σαρκικὰ in contrast with πνευματικὰ
  chosen_reading: Refers to material or bodily support for ministry, not morally negative
    'fleshly' behavior.
  alternative_readings:
  - fleshly things
  rationale: In context Paul is defending the right of apostles to receive financial
    provision. The contrast is between spiritual ministry and temporal/material support,
    not between holy and sinful conduct. This aligns with the doctrine guideline that
    σάρξ-family terms are rendered contextually.
  doctrine_reference: 'DOCTRINE.md: Contested terms table on σάρξ'
