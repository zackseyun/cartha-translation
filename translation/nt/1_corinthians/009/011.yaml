id: 1CO.9.11
reference: 1 Corinthians 9:11
source:
  edition: SBLGNT
  text: εἰ ἡμεῖς ὑμῖν τὰ πνευματικὰ ἐσπείραμεν, μέγα εἰ ἡμεῖς ὑμῶν τὰ σαρκικὰ θερίσομεν;
translation:
  text: If we have sown spiritual things among you, is it too much if we reap material
    things from you?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'earthly things.' The Greek contrasts 'spiritual things' with things
      belonging to ordinary bodily or material life.
    reason: lexical_alternative
lexical_decisions:
- source_word: τὰ πνευματικὰ
  chosen: spiritual things
  alternatives:
  - spiritual blessings
  - things of the Spirit
  lexicon: BDAG
  rationale: The neuter plural adjective functions substantivally, referring broadly
    to spiritual benefits or ministry rather than a narrowly defined object. 'Spiritual
    things' preserves the Greek's breadth and Paul's agricultural metaphor without
    over-interpreting.
- source_word: ἐσπείραμεν
  chosen: have sown
  alternatives:
  - sowed
  lexicon: BDAG
  rationale: The aorist refers to Paul's prior ministry activity. 'Have sown' is idiomatic
    English that keeps the completed action with present relevance in the rhetorical
    comparison.
- source_word: μέγα
  chosen: too much
  alternatives:
  - a great thing
  - something great
  lexicon: BDAG
  rationale: In this rhetorical question, μέγα idiomatically asks whether something
    is excessive or unreasonable. 'Too much' communicates the sense naturally in modern
    English.
- source_word: τὰ σαρκικὰ
  chosen: material things
  alternatives:
  - earthly things
  - fleshly things
  lexicon: BDAG
  rationale: Here σαρκικός contrasts with πνευματικός in the sphere of practical,
    bodily, temporal support. 'Material things' best conveys financial or physical
    provision. 'Fleshly things' would misleadingly suggest sinful desire, which is
    not the point here.
- source_word: θερίσομεν
  chosen: we reap
  alternatives:
  - we will reap
  lexicon: BDAG
  rationale: The future verb continues the sowing/reaping metaphor for receiving support.
    In English rhetorical questions, the present-form 'we reap' can sound natural,
    but the future sense is retained contextually by 'if.'
- source_word: ὑμῶν
  chosen: from you
  alternatives:
  - your
  lexicon: BDAG
  rationale: 'The genitive after θερίζω is naturally expressed in English as source:
    ''from you.'' This avoids awkward literalism while preserving the sense that material
    support would come from the Corinthians.'
- source_word: ἡμεῖς
  chosen: we
  lexicon: BDAG
  rationale: The explicit pronoun is emphatic in Greek, contrasting apostolic labor
    with expected support. English 'we' adequately carries the emphasis in this rhetorical
    structure without artificial stress markers.
