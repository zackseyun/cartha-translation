id: 1CO.9.24
reference: 1 Corinthians 9:24
source:
  edition: SBLGNT
  text: Οὐκ οἴδατε ὅτι οἱ ἐν σταδίῳ τρέχοντες πάντες μὲν τρέχουσιν, εἷς δὲ λαμβάνει
    τὸ βραβεῖον; οὕτως τρέχετε ἵνα καταλάβητε.
translation:
  text: Do you not know that those who run in a stadium all run, but one receives
    the prize? Run in this way, so that you may obtain it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in a racecourse.' The Greek στάδιον refers to the place of the race,
      a stadium or track.
    reason: lexical_alternative
  - marker: b
    text: Or 'so run that you may win' or 'so that you may seize it.' The Greek καταλάβητε
      can mean 'obtain,' 'grasp,' or 'attain.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Οὐκ οἴδατε
  chosen: Do you not know
  alternatives:
  - Do you not understand
  - Do you not realize
  lexicon: BDAG
  rationale: A standard rhetorical question formula in Paul. 'Know' preserves the
    lexical sense of οἶδα while remaining natural English.
- source_word: ἐν σταδίῳ
  chosen: in a stadium
  alternatives:
  - in a racecourse
  - in the games
  lexicon: BDAG
  rationale: στάδιον refers literally to the racecourse/stadium. 'In a stadium' keeps
    the concrete athletic image rather than generalizing to 'in a race.'
- source_word: τρέχοντες ... τρέχουσιν
  chosen: those who run ... all run
  alternatives:
  - the runners ... all run
  lexicon: BDAG
  rationale: Retains the participial construction and repetition of τρέχω, preserving
    Paul's vivid athletic metaphor.
- source_word: πάντες μὲν ... εἷς δὲ
  chosen: all ... but one
  alternatives:
  - all indeed ... but one alone
  lexicon: BDAG
  rationale: Represents the μέν...δέ contrast clearly in idiomatic English without
    overtranslating the particles.
- source_word: λαμβάνει
  chosen: receives
  alternatives:
  - wins
  - takes
  lexicon: BDAG
  rationale: '''Receives'' is the direct lexical sense and avoids importing a more
    interpretive athletic idiom than the Greek explicitly states.'
- source_word: βραβεῖον
  chosen: the prize
  alternatives:
  - the award
  - the prize of victory
  lexicon: BDAG
  rationale: Standard rendering for the victor's prize in an athletic contest; concise
    and natural.
- source_word: οὕτως
  chosen: in this way
  alternatives:
  - thus
  - so
  lexicon: BDAG
  rationale: Makes explicit that Paul is drawing an analogy from the race to Christian
    conduct. 'In this way' is clearer in modern English than bare 'thus.'
- source_word: τρέχετε
  chosen: Run
  alternatives:
  - Keep running
  lexicon: BDAG
  rationale: Present imperative calls for ongoing action, but simple 'Run' is idiomatic
    and forceful in English without sounding wooden.
- source_word: ἵνα καταλάβητε
  chosen: so that you may obtain it
  alternatives:
  - so that you may win
  - so that you may seize it
  lexicon: BDAG
  rationale: καταλαμβάνω can mean grasp, obtain, or attain. 'Obtain it' fits the prize
    metaphor and avoids overstating with 'win' while still conveying purposeful striving.
    'It' is supplied from the immediately preceding 'prize' in natural English.
