theological_decisions:
- issue: Athletic metaphor applied to Christian perseverance
  chosen_reading: Preserve the competitive race imagery without specifying a doctrinal
    system of salvation or reward beyond the text's exhortation.
  alternative_readings:
  - Render more interpretively as 'run to win'
  rationale: Paul uses an athletic analogy to urge disciplined pursuit. The translation
    should not resolve broader theological debates about perseverance, merit, or reward
    by adding language not present in the Greek.
  doctrine_reference: Preserve theological tension rather than resolve it.
