id: 1CO.9.14
reference: 1 Corinthians 9:14
source:
  edition: SBLGNT
  text: οὕτως καὶ ὁ κύριος διέταξεν τοῖς τὸ εὐαγγέλιον καταγγέλλουσιν ἐκ τοῦ εὐαγγελίου
    ζῆν.
translation:
  text: In the same way, the Lord also commanded that those who proclaim the gospel
    should live from the gospel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'those who preach the gospel.'
    reason: lexical_alternative
  - marker: b
    text: Or 'make their living from the gospel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οὕτως
  chosen: In the same way
  alternatives:
  - Thus
  - So
  lexicon: BDAG
  rationale: Signals analogy with the preceding examples in context; 'In the same
    way' makes the comparative force clear in natural English.
- source_word: καὶ
  chosen: also
  alternatives:
  - and
  - even
  lexicon: BDAG
  rationale: 'Placed with ''the Lord'' to convey additive emphasis: beyond prior scriptural
    examples, the Lord also gave this command.'
- source_word: ὁ κύριος
  chosen: the Lord
  alternatives:
  - the Master
  lexicon: BDAG
  rationale: Follows the doctrinal default for κύριος as 'Lord.' In Pauline context
    this most naturally refers to the Lord Jesus.
- source_word: διέταξεν
  chosen: commanded
  alternatives:
  - ordered
  - directed
  - arranged
  lexicon: BDAG
  rationale: In this context the verb denotes authoritative instruction, not mere
    arrangement; 'commanded' best reflects the force.
- source_word: τοῖς ... καταγγέλλουσιν
  chosen: those who proclaim
  alternatives:
  - those who preach
  - the ones announcing
  lexicon: BDAG
  rationale: The articular participle is rendered as a substantive phrase. 'Proclaim'
    preserves the heralding sense of καταγγέλλω while remaining readable.
- source_word: τὸ εὐαγγέλιον
  chosen: the gospel
  alternatives:
  - the good news
  lexicon: BDAG
  rationale: '''Gospel'' is the established and still accessible rendering in Pauline
    contexts; it also preserves lexical consistency.'
- source_word: ἐκ τοῦ εὐαγγελίου
  chosen: from the gospel
  alternatives:
  - by the gospel
  - from preaching the gospel
  lexicon: BDAG
  rationale: ἐκ here expresses source/means of livelihood. 'From the gospel' is concise
    and preserves the Greek wording, with the context making clear that material support
    through gospel ministry is meant.
- source_word: ζῆν
  chosen: should live
  alternatives:
  - to live
  - make their living
  lexicon: BDAG
  rationale: The infinitive depends on 'commanded' and expresses what is commanded.
    'Should live' communicates the normative force in idiomatic English without over-paraphrasing.
