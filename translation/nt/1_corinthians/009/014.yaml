theological_decisions:
- issue: Referent of 'the Lord'
  chosen_reading: the Lord refers to Jesus, likely alluding to his teaching that gospel
    workers receive support
  alternative_readings:
  - the Lord as a more general divine reference
  rationale: Within 1 Corinthians and the immediate argument, Paul most naturally
    invokes the authority of Jesus' instruction. The translation keeps the text's
    wording 'the Lord' without expanding it to 'the Lord Jesus,' preserving the source
    while noting the likely referent.
  doctrine_reference: 'Contested terms: κύριος → ''Lord''; preserve source-level meaning
    without importing extra wording.'
- issue: Nature of support implied by 'live from the gospel'
  chosen_reading: material/livelihood support for those engaged in gospel proclamation
  alternative_readings:
  - spiritual life derived from the gospel
  rationale: The surrounding context concerns the right of ministers to receive material
    support. The translation retains the literal phrase 'live from the gospel' rather
    than paraphrasing it more heavily, allowing the context to specify the sense.
  doctrine_reference: 'Translation philosophy: preserve theological tension and avoid
    paraphrase beyond what the source warrants.'
