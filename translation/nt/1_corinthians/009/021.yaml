id: 1CO.9.21
reference: 1 Corinthians 9:21
source:
  edition: SBLGNT
  text: τοῖς ἀνόμοις ὡς ἄνομος, μὴ ὢν ἄνομος ⸀θεοῦ ἀλλ’ ἔννομος ⸀Χριστοῦ, ἵνα ⸀κερδάνω
    ⸀τοὺς ἀνόμους·
translation:
  text: To those outside the law, as one outside the law—though not being outside
    God’s law but under Messiah’s law—so that I might win those outside the law.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'without the law'; the phrase refers here to those not under the Mosaic
      law, not necessarily to morally lawless people.
    reason: lexical_alternative
  - marker: b
    text: Greek 'but under Messiah’s law'; alternatively, 'but within the law of Messiah/Christ.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἀνόμοις / ἄνομος / ἀνόμους
  chosen: outside the law
  alternatives:
  - lawless
  - without the law
  lexicon: BDAG
  rationale: The repeated adjective ἄνομος here refers contextually to people not
    under the Mosaic law, not necessarily morally anarchic or wicked. 'Outside the
    law' preserves the relational sense and avoids the misleading moral connotation
    of 'lawless.' The singular predicate ἄνομος is correspondingly rendered 'one outside
    the law' for consistency and readability.
- source_word: ὡς
  chosen: as
  alternatives:
  - like
  lexicon: BDAG
  rationale: 'Marks Paul''s adaptive posture: he behaves ''as'' one outside the law,
    not that he actually becomes such in an absolute sense.'
- source_word: μὴ ὢν
  chosen: though not being
  alternatives:
  - not being
  - while not being
  lexicon: BDAG
  rationale: This participial clause is concessive in context, qualifying Paul's preceding
    statement. 'Though not being' brings out the concessive force naturally in English.
- source_word: θεοῦ
  chosen: God’s
  alternatives:
  - of God
  lexicon: BDAG
  rationale: Possessive genitive rendered idiomatically in English.
- source_word: ἔννομος
  chosen: under
  alternatives:
  - within
  - subject to
  - in-lawed to
  lexicon: BDAG
  rationale: ἔννομος means being within the sphere of law or subject to law. 'Under'
    is idiomatic and clearly contrasts with 'outside the law.' It avoids the awkwardly
    literal 'in-lawed' while preserving the legal-relational sense.
- source_word: Χριστοῦ
  chosen: Messiah’s
  alternatives:
  - Christ’s
  lexicon: BDAG
  rationale: Per project doctrine, Χριστός is translated as 'Messiah' where it functions
    as a title. Here the genitive denotes relation to the Messiah's law, so the titular
    sense is active and should be translated.
- source_word: ἵνα
  chosen: so that
  alternatives:
  - in order that
  lexicon: BDAG
  rationale: Introduces purpose; 'so that' is natural modern English.
- source_word: κερδάνω
  chosen: I might win
  alternatives:
  - I may win
  - I might gain
  lexicon: BDAG
  rationale: In Pauline evangelistic context, κερδαίνω commonly means to win people
    over, not financial gain. 'I might win' preserves the subjunctive nuance and idiomatic
    missionary sense.
