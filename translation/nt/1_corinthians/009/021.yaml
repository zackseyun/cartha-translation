theological_decisions:
- issue: Meaning of ἄνομος in this context
  chosen_reading: Refers to those outside the Mosaic law/Gentiles rather than morally
    'lawless' people in a general ethical sense.
  alternative_readings:
  - lawless in the sense of wicked or rebellious
  rationale: The immediate context in 1 Corinthians 9:20–21 contrasts Jews/those under
    the law with those outside the law. Paul's clarification that he is not outside
    God's law but under Messiah's law shows covenantal/legal location is in view,
    not moral antinomianism.
- issue: Force of ἔννομος Χριστοῦ
  chosen_reading: Paul denies antinomianism by affirming that he is under/in relation
    to Messiah's law.
  alternative_readings:
  - within the law to Christ
  - under Christ's law
  rationale: The phrase indicates continuing moral accountability under God's will
    as mediated through the Messiah, while not requiring that Paul remains under the
    Mosaic law as covenantal boundary marker. 'Under Messiah's law' is the clearest
    idiomatic English expression of this relation.
  doctrine_reference: Affirmations; Translation philosophy §§1, 3, 6
- issue: Rendering Χριστοῦ
  chosen_reading: Messiah
  alternative_readings:
  - Christ
  rationale: DOCTRINE.md directs that Χριστός be translated as 'Messiah' where title
    is in view. Here the genitive is clearly titular rather than a fixed name-like
    form.
  doctrine_reference: 'Contested terms: Χριστός → Messiah (where title; Christ where
    name-like)'
