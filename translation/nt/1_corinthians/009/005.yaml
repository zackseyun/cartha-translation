id: 1CO.9.5
reference: 1 Corinthians 9:5
source:
  edition: SBLGNT
  text: μὴ οὐκ ἔχομεν ἐξουσίαν ἀδελφὴν γυναῖκα περιάγειν, ὡς καὶ οἱ λοιποὶ ἀπόστολοι
    καὶ οἱ ἀδελφοὶ τοῦ κυρίου καὶ Κηφᾶς;
translation:
  text: Do we not have the right to take along a believing wife, as also the rest
    of the apostles and the brothers of the Lord and Cephas?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'a sister, a wife'—that is, a wife who is a fellow believer.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξουσίαν
  chosen: the right
  alternatives:
  - authority
  - freedom
  lexicon: BDAG
  rationale: In this context Paul is defending an apostolic entitlement or legitimate
    claim, not abstract authority in general. 'The right' is natural English and fits
    the argument of 1 Corinthians 9.
- source_word: ἀδελφὴν γυναῖκα
  chosen: a believing wife
  alternatives:
  - a sister as wife
  - a sister wife
  - a Christian wife
  lexicon: BDAG
  rationale: The paired accusatives are idiomatic and most naturally mean 'a wife
    who is a sister,' i.e., a believing wife. Rendering both elements preserves the
    force of ἀδελφή while avoiding the misleading English expression 'sister wife.'
    'Christian wife' is interpretive and anachronistic; 'believing wife' best conveys
    the sense.
- source_word: περιάγειν
  chosen: to take along
  alternatives:
  - to lead around
  - to bring along
  lexicon: BDAG
  rationale: The infinitive refers to traveling with or taking someone along in ministry
    journeys. 'Take along' is idiomatic modern English and fits the practical context.
- source_word: ὡς καὶ
  chosen: as also
  alternatives:
  - just as also
  - as
  lexicon: BDAG
  rationale: This comparative phrase introduces examples parallel to Paul and Barnabas.
    'As also' preserves the additive comparison without sounding overly wooden.
- source_word: οἱ λοιποὶ ἀπόστολοι
  chosen: the rest of the apostles
  alternatives:
  - the other apostles
  lexicon: BDAG
  rationale: λοιποί distinguishes those just mentioned from others in the same group.
    'The rest of the apostles' is slightly more precise in context than 'the other
    apostles.'
- source_word: οἱ ἀδελφοὶ τοῦ κυρίου
  chosen: the brothers of the Lord
  alternatives:
  - the brothers of Jesus
  - the Lord's brothers
  lexicon: BDAG
  rationale: κύριος should be translated 'Lord' per project guidance, and the genitive
    construction is straightforward. This preserves the wording of the Greek without
    importing a specific doctrinal explanation of the relationship.
- source_word: Κηφᾶς
  chosen: Cephas
  alternatives:
  - Peter
  lexicon: BDAG
  rationale: The Greek text has the transliterated name Κηφᾶς, so the translation
    should preserve the name form actually used here rather than substitute the more
    familiar 'Peter.'
