theological_decisions:
- issue: Meaning of 'the brothers of the Lord'
  chosen_reading: Translate the phrase straightforwardly without resolving debates
    about whether these were biological brothers, stepbrothers, or kin more broadly.
  alternative_readings:
  - biological brothers of Jesus
  - stepbrothers
  - close relatives/kinsmen
  rationale: The Greek phrase itself identifies them as 'the brothers of the Lord'
    but does not by itself settle later theological debates about Mary's perpetual
    virginity or the exact familial relationship. The translation preserves the textual
    wording and leaves doctrinal inference unresolved.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Sense of ἀδελφὴν γυναῖκα
  chosen_reading: Render as 'a believing wife' in the main text.
  alternative_readings:
  - a sister as wife
  - a Christian woman/wife
  rationale: The phrase most naturally refers to a wife who is also a sister in the
    faith. This avoids the misleading impression that Paul means merely a female Christian
    companion, while still preserving the πιστός-like sense through 'believing.' An
    alternative is worth preserving in a footnote because the literal form is unusual
    in English.
  doctrine_reference: Original-language primacy over translation tradition; preserve
    ambiguity where genuine.
