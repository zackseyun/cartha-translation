id: 1CO.9.12
reference: 1 Corinthians 9:12
source:
  edition: SBLGNT
  text: εἰ ἄλλοι τῆς ⸂ὑμῶν ἐξουσίας⸃ μετέχουσιν, οὐ μᾶλλον ἡμεῖς; Ἀλλ’ οὐκ ἐχρησάμεθα
    τῇ ἐξουσίᾳ ταύτῃ, ἀλλὰ πάντα στέγομεν ἵνα μή ⸂τινα ἐγκοπὴν⸃ δῶμεν τῷ εὐαγγελίῳ
    τοῦ Χριστοῦ.
translation:
  text: If others share in this right over you, do not we even more? But we have not
    made use of this right; instead, we endure everything so that we may give no hindrance
    to the gospel of the Messiah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'this claim on you' / 'this authority in relation to you.' The Greek
      phrase likely refers to the apostles' right to receive material support from
      the Corinthians.
    reason: lexical_alternative
  - marker: b
    text: Greek 'the gospel of the Christ'; here 'Messiah' is used because Χριστός
      functions as a title. Traditional English often has 'Christ.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἐξουσίας / ἐξουσίᾳ
  chosen: right
  alternatives:
  - authority
  - claim
  lexicon: BDAG
  rationale: In this context Paul speaks of the legitimate entitlement of apostles
    to material support. 'Right' communicates lawful entitlement more naturally in
    English than 'authority,' while still preserving the sense of a claim that could
    be exercised.
- source_word: τῆς ὑμῶν ἐξουσίας
  chosen: this right over you
  alternatives:
  - your right
  - the right from you
  - claim on you
  lexicon: BDAG
  rationale: The genitive with ὑμῶν is best taken as referring to a right in relation
    to the Corinthians, specifically a claim upon them for support. 'Over you' preserves
    the relational force better than the potentially misleading 'your right,' which
    could imply the Corinthians possess the right.
- source_word: μετέχουσιν
  chosen: share in
  alternatives:
  - partake of
  - have a share in
  lexicon: BDAG
  rationale: A standard rendering that fits the idiom of participating in or benefiting
    from a right.
- source_word: οὐ μᾶλλον ἡμεῖς;
  chosen: do not we even more?
  alternatives:
  - how much more we?
  - should not we all the more?
  lexicon: BDAG
  rationale: This preserves the rhetorical question and comparative force of μᾶλλον
    while keeping natural English word order close to the Greek emphasis.
- source_word: ἐχρησάμεθα
  chosen: have not made use of
  alternatives:
  - have not used
  - have not exercised
  lexicon: BDAG
  rationale: χράομαι here means to make use of or avail oneself of something. 'Made
    use of' is slightly fuller and idiomatic in English.
- source_word: πάντα
  chosen: everything
  alternatives:
  - all things
  - it all
  lexicon: BDAG
  rationale: Accusative neuter plural used comprehensively; 'everything' is natural
    modern English and preserves the breadth of Paul's claim.
- source_word: στέγομεν
  chosen: endure
  alternatives:
  - bear
  - put up with
  - cover
  lexicon: BDAG
  rationale: In context the sense is bearing hardships rather than concealing. 'Endure'
    communicates sustained forbearance in order not to burden the gospel.
- source_word: τινα ἐγκοπὴν
  chosen: no hindrance
  alternatives:
  - no obstacle
  - no interruption
  - no impediment
  lexicon: BDAG
  rationale: ἐγκοπή denotes an impediment or obstacle. 'Hindrance' is concise, idiomatic,
    and fits the evangelistic context.
- source_word: δῶμεν
  chosen: we may give
  alternatives:
  - we may cause
  - we may place
  lexicon: BDAG
  rationale: 'Aorist subjunctive after ἵνα μή expresses purpose: Paul refrains from
    using his right so as not to give or cause any obstacle.'
- source_word: εὐαγγελίῳ
  chosen: gospel
  alternatives:
  - good news
  lexicon: BDAG
  rationale: '''Gospel'' remains the clearest established English equivalent in Pauline
    contexts and carries the needed theological weight without distortion.'
- source_word: Χριστοῦ
  chosen: the Messiah
  alternatives:
  - Christ
  lexicon: BDAG
  rationale: Per project doctrine, Χριστός is rendered 'Messiah' where it functions
    as a title. Here τοῦ Χριστοῦ is titular, referring to the gospel belonging to
    or concerning the Messiah.
