theological_decisions:
- issue: Nature of Paul's obligation to preach
  chosen_reading: Rendered as an imposed necessity without specifying whether it is
    divine commission, internal compulsion, or external circumstance alone.
  alternative_readings:
  - Rendered more strongly as 'compulsion is upon me'
  - Rendered more interpretively as 'God has entrusted me with this duty'
  rationale: The Greek states that necessity is upon Paul but does not explicitly
    define the source in this verse. The translation preserves the theological tension
    and avoids importing a fuller doctrinal explanation from the wider context into
    the wording of the verse itself.
  doctrine_reference: Translation philosophy §3
