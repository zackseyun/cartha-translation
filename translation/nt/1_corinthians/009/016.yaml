id: 1CO.9.16
reference: 1 Corinthians 9:16
source:
  edition: SBLGNT
  text: ἐὰν γὰρ εὐαγγελίζωμαι, οὐκ ἔστιν μοι καύχημα, ἀνάγκη γάρ μοι ἐπίκειται· οὐαὶ
    ⸀γάρ μοί ἐστιν ἐὰν μὴ ⸀εὐαγγελίσωμαι.
translation:
  text: For if I preach the gospel, I have no ground for boasting, for necessity is
    laid upon me. For woe is me if I do not preach the gospel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'proclaim the good news' for both occurrences of 'preach the gospel.'
    reason: lexical_alternative
  - marker: b
    text: Or 'woe to me if I do not preach the gospel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: εὐαγγελίζωμαι / εὐαγγελίσωμαι
  chosen: preach the gospel
  alternatives:
  - proclaim the good news
  - announce the gospel
  lexicon: BDAG
  rationale: The verb means to proclaim good news. In Pauline usage here, the object
    is implicit but clearly the gospel message; 'preach the gospel' is idiomatic modern
    English and preserves the evangelistic/proclamatory force better than the less
    natural bare 'gospelize.' The same English rendering is kept for both occurrences
    for consistency.
- source_word: καύχημα
  chosen: ground for boasting
  alternatives:
  - boast
  - reason to boast
  lexicon: BDAG
  rationale: '''Καύχημα'' denotes that in which one boasts or a basis for boasting.
    ''Ground for boasting'' brings out that Paul denies having any legitimate basis
    for self-congratulation, not merely the act of speaking boastfully.'
- source_word: ἀνάγκη
  chosen: necessity
  alternatives:
  - compulsion
  - constraint
  lexicon: BDAG
  rationale: The noun conveys an imposed necessity or compulsion. 'Necessity' is a
    clear, natural rendering that preserves the sense of obligation without over-specifying
    whether the pressure is internal or external.
- source_word: ἐπίκειται
  chosen: is laid upon me
  alternatives:
  - rests upon me
  - is imposed on me
  lexicon: BDAG
  rationale: The verb here expresses something pressing upon or being imposed on Paul.
    'Is laid upon me' is idiomatic English that communicates burden and obligation,
    matching the force of the Greek middle/passive form in context.
- source_word: οὐαί
  chosen: woe
  alternatives:
  - alas
  - judgment
  lexicon: BDAG
  rationale: The interjection signals impending disaster or severe distress. 'Woe'
    preserves the prophetic and solemn tone better than 'alas,' which can sound merely
    emotional.
- source_word: οὐαὶ γάρ μοί ἐστιν
  chosen: woe is me
  alternatives:
  - woe to me
  - I am in trouble
  lexicon: BDAG
  rationale: This clause is an idiomatic exclamation. 'Woe is me' is a recognizable
    English equivalent that preserves the gravity and rhetorical force. 'Woe to me'
    is also possible and may be more literal, but the chosen form reads more naturally
    while retaining solemnity.
- source_word: ἐὰν μὴ
  chosen: if I do not
  alternatives:
  - unless I
  lexicon: BDAG
  rationale: The conditional construction is straightforward. 'If I do not' is the
    clearest English rendering in this sentence structure; 'unless I' would require
    recasting the clause and is less direct.
- source_word: γάρ
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: BDAG
  rationale: The repeated γάρ links Paul's explanation tightly to the preceding argument.
    'For' preserves the connective, explanatory force in both clauses without paraphrase.
