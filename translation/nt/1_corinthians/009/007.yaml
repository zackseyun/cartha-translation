id: 1CO.9.7
reference: 1 Corinthians 9:7
source:
  edition: SBLGNT
  text: τίς στρατεύεται ἰδίοις ὀψωνίοις ποτέ; τίς φυτεύει ἀμπελῶνα καὶ ⸂τὸν καρπὸν⸃
    αὐτοῦ οὐκ ἐσθίει; ⸀τίς ποιμαίνει ποίμνην καὶ ἐκ τοῦ γάλακτος τῆς ποίμνης οὐκ ἐσθίει;
translation:
  text: Who ever serves as a soldier at his own expense? Who plants a vineyard and
    does not eat its fruit? Or who shepherds a flock and does not drink from the milk
    of the flock?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with his own wages/pay.' The Greek refers to a soldier's pay or rations;
      the sense is that a soldier does not bear the cost of his own service.
    reason: lexical_alternative
  - marker: b
    text: Literally 'does not eat from the milk of the flock.' English normally says
      'drink' with milk.
    reason: lexical_alternative
lexical_decisions:
- source_word: στρατεύεται
  chosen: serves as a soldier
  alternatives:
  - serves in the army
  - goes to war
  lexicon: BDAG
  rationale: The verb denotes performing military service. 'Serves as a soldier' is
    natural English and preserves the occupational analogy without over-specifying
    active combat.
- source_word: ἰδίοις ὀψωνίοις
  chosen: at his own expense
  alternatives:
  - with his own wages
  - on his own pay
  lexicon: BDAG
  rationale: ὀψώνιον originally refers to pay or rations, especially military pay.
    In this rhetorical question the idiomatic sense is that a soldier does not fund
    his own service. 'At his own expense' communicates the point clearly in modern
    English.
- source_word: ποτέ
  chosen: ever
  alternatives:
  - at any time
  lexicon: BDAG
  rationale: In rhetorical questions ποτέ adds the sense 'ever' or 'at any time.'
    'Ever' is concise and idiomatic.
- source_word: φυτεύει ἀμπελῶνα
  chosen: plants a vineyard
  alternatives:
  - cultivates a vineyard
  lexicon: BDAG
  rationale: A straightforward agricultural image. 'Plants a vineyard' is the plain
    sense and matches common English usage.
- source_word: τὸν καρπὸν αὐτοῦ
  chosen: its fruit
  alternatives:
  - its produce
  - the fruit of it
  lexicon: BDAG
  rationale: καρπός here refers to the produce yielded by the vineyard. 'Its fruit'
    is both literal and idiomatic.
- source_word: ποιμαίνει ποίμνην
  chosen: shepherds a flock
  alternatives:
  - tends a flock
  - pastures a flock
  lexicon: BDAG
  rationale: ποιμαίνω can mean shepherd, tend, or pasture. 'Shepherds' preserves the
    pastoral imagery more directly than the more generic 'tends.'
- source_word: ἐκ τοῦ γάλακτος τῆς ποίμνης
  chosen: from the milk of the flock
  alternatives:
  - some of the flock's milk
  - milk from the flock
  lexicon: BDAG
  rationale: The phrase is partitive/source-oriented. 'From the milk of the flock'
    stays close to the Greek while remaining understandable. It also preserves the
    image of benefiting from what the flock provides.
- source_word: ἐσθίει
  chosen: eat / drink
  alternatives:
  - partake of
  lexicon: BDAG
  rationale: The verb literally means 'eat' in both clauses, but with 'milk' English
    normally uses 'drink.' This is a context-driven adjustment for natural English
    while preserving the rhetorical parallel.
