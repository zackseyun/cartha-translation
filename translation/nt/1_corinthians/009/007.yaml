theological_decisions:
- issue: Generic masculine singular in repeated τίς clauses
  chosen_reading: Rendered with 'his' in 'at his own expense'
  alternative_readings:
  - their own expense
  rationale: The Greek uses singular masculine forms in generic rhetorical examples.
    Per the translation philosophy, gender-accurate rendering is preferred over flattening
    to plural/gender-neutral English when the source uses masculine singular representatively.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
