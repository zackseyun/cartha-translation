id: 1CO.9.13
reference: 1 Corinthians 9:13
source:
  edition: SBLGNT
  text: οὐκ οἴδατε ὅτι οἱ τὰ ἱερὰ ἐργαζόμενοι ⸀τὰ ἐκ τοῦ ἱεροῦ ἐσθίουσιν, οἱ τῷ θυσιαστηρίῳ
    ⸀παρεδρεύοντες τῷ θυσιαστηρίῳ συμμερίζονται;
translation:
  text: Do you not know that those who work in the temple eat from the temple, and
    those who serve at the altar share in what is offered on the altar?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more literally, 'those who work with the holy things eat the things from
      the temple.'
    reason: lexical_alternative
  - marker: b
    text: Or 'those who attend the altar share with the altar,' that is, they receive
      a portion from the sacrifices offered there.
    reason: alternative_reading
lexical_decisions:
- source_word: οὐκ οἴδατε
  chosen: Do you not know
  alternatives:
  - Do you not understand
  - Don't you know
  lexicon: BDAG
  rationale: A conventional rhetorical question formula in Paul. 'Do you not know'
    preserves the formal force and recognizable Pauline style better than the more
    colloquial contraction.
- source_word: τὰ ἱερὰ ἐργαζόμενοι
  chosen: those who work in the temple
  alternatives:
  - those who perform the sacred services
  - those who work with the holy things
  lexicon: BDAG
  rationale: The phrase literally involves 'the sacred things,' but in this context
    it refers to temple service personnel. 'Work in the temple' communicates the institutional
    setting clearly in natural English while staying close to the sense.
- source_word: τὰ ἐκ τοῦ ἱεροῦ ἐσθίουσιν
  chosen: eat from the temple
  alternatives:
  - eat the things from the temple
  - receive their food from the temple
  lexicon: BDAG
  rationale: The expression means that temple workers derive sustenance from temple
    provisions. 'Eat from the temple' is concise and idiomatic, preserving the source
    metaphor of eating without overexplaining.
- source_word: ἱεροῦ
  chosen: temple
  alternatives:
  - sanctuary
  - sacred precinct
  lexicon: BDAG
  rationale: ἱερόν normally denotes the temple complex or sacred precinct rather than
    the inner sanctuary. 'Temple' is the clearest standard rendering in this context.
- source_word: παρεδρεύοντες
  chosen: those who serve at
  alternatives:
  - those who attend
  - those who are in attendance at
  lexicon: BDAG
  rationale: The participle denotes being stationed beside or attending in service.
    'Serve at' captures the cultic/ministerial sense more naturally than the more
    wooden 'attend'.
- source_word: θυσιαστηρίῳ
  chosen: altar
  lexicon: BDAG
  rationale: Standard and precise rendering for the sacrificial altar.
- source_word: συμμερίζονται
  chosen: share in what is offered on the altar
  alternatives:
  - share with the altar
  - receive a share from the altar
  - partake of the altar offerings
  lexicon: BDAG
  rationale: The verb means to receive a share together/participate in a portion.
    Because English cannot naturally say 'share with the altar' without obscurity,
    the translation makes explicit that the share is in the sacrificial portions associated
    with the altar.
