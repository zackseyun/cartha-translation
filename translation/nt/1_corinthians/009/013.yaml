theological_decisions:
- issue: Cultic imagery and source of support for ministers
  chosen_reading: The verse is rendered to preserve Paul's analogy from temple and
    altar service to material support derived from sacred ministry, without importing
    later ecclesial structures into the wording.
  alternative_readings:
  - A more literal rendering could leave the final clause as 'share with the altar'
  rationale: Paul's argument depends on the principle that those engaged in sacred
    service receive sustenance from that service. The translation clarifies this economic/cultic
    logic while avoiding interpretive expansion beyond the verse itself.
  doctrine_reference: Translation philosophy §§1, 3, 6
