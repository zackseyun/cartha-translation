- issue: Rendering of δουλόω / doulos-language
  chosen_reading: slave
  alternative_readings:
  - servant
  - bondservant
  rationale: The doctrine guidelines specify 'servant / slave (context-dependent)'
    and prefer 'slave' where the bonded nature is theologically or rhetorically salient.
    Here Paul contrasts being 'free' with making himself a slave, so preserving the
    slavery imagery is important.
