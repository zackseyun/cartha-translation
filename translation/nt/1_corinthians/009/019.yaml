id: 1CO.9.19
reference: 1 Corinthians 9:19
source:
  edition: SBLGNT
  text: Ἐλεύθερος γὰρ ὢν ἐκ πάντων πᾶσιν ἐμαυτὸν ἐδούλωσα, ἵνα τοὺς πλείονας κερδήσω·
translation:
  text: For though I am free from all, I made myself a slave to all, so that I might
    win more of them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'I made myself a servant to all.' The Greek uses slavery language; 'slave'
      is retained in the main text because the contrast with 'free' is central to
      Paul's point.
    reason: alternative_reading
lexical_decisions:
- source_word: Ἐλεύθερος
  chosen: free
  alternatives:
  - independent
  lexicon: BDAG
  rationale: The adjective denotes being free, not under bondage or obligation. 'Free'
    is the natural English equivalent and pairs well with the later slavery metaphor.
- source_word: ἐκ πάντων
  chosen: from all
  alternatives:
  - with respect to all
  - from everyone
  lexicon: BDAG
  rationale: The preposition ἐκ with πάντων expresses freedom in relation to all people,
    i.e., not being under anyone's control or claim. 'From all' preserves the compact
    Greek expression.
- source_word: πᾶσιν
  chosen: to all
  alternatives:
  - to everyone
  lexicon: BDAG
  rationale: Dative plural after ἐδούλωσα indicates those to whom Paul has made himself
    enslaved in service. 'To all' preserves the rhetorical parallel with 'from all.'
- source_word: ἐμαυτὸν ἐδούλωσα
  chosen: I made myself a slave
  alternatives:
  - I enslaved myself
  - I made myself a servant
  lexicon: BDAG
  rationale: The verb δουλόω means to make into a slave or enslave. In keeping with
    the project's guidance on doulos-language, 'slave' is preferred here because the
    bonded nature of Paul's self-subordination is rhetorically salient. 'I made myself
    a slave' is idiomatic while preserving the force of the middle-like reflexive
    construction.
- source_word: ἵνα
  chosen: so that
  alternatives:
  - in order that
  lexicon: BDAG
  rationale: This conjunction introduces purpose. 'So that' is clear modern English
    and preserves the purposive sense.
- source_word: τοὺς πλείονας
  chosen: more of them
  alternatives:
  - the more
  - as many as possible
  - the greater number
  lexicon: BDAG
  rationale: The comparative πλείονας here means 'more' in the sense of a greater
    number of people won through Paul's adaptive ministry. 'More of them' makes the
    implied object explicit in natural English without over-paraphrasing. 'As many
    as possible' is interpretive and stronger than the Greek.
- source_word: κερδήσω
  chosen: might win
  alternatives:
  - might gain
  lexicon: BDAG
  rationale: In Pauline evangelistic context, κερδαίνω carries the metaphorical sense
    of gaining or winning people. 'Win' is idiomatic in English and fits the missionary
    context.
