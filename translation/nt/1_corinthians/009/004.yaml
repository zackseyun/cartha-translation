theological_decisions:
- issue: Scope of apostolic entitlement in context
  chosen_reading: Paul refers to the legitimate right of apostles/workers to receive
    food and drink, likely as material support from those they serve.
  alternative_readings:
  - A more general statement about ordinary human freedom to eat and drink
  rationale: The immediate context (1 Cor 9) concerns Paul's rights as an apostle,
    especially support from the churches. Rendering ἐξουσία as 'the right' preserves
    this without over-specifying 'support' in the main text.
