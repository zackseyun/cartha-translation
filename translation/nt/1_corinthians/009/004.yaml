id: 1CO.9.4
reference: 1 Corinthians 9:4
source:
  edition: SBLGNT
  text: μὴ οὐκ ἔχομεν ἐξουσίαν φαγεῖν καὶ ⸀πεῖν;
translation:
  text: Do we not have the right to eat and drink?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'authority to eat and drink.' Here 'the right' refers to a legitimate
      claim or freedom, likely in the sense of receiving material support in Paul's
      argument.
    reason: lexical_alternative
lexical_decisions:
- source_word: μὴ οὐκ
  chosen: Do we not
  alternatives:
  - Surely we do not
  - Do we not indeed
  lexicon: BDAG
  rationale: The combination introduces a rhetorical question expecting a positive
    answer. In idiomatic English, 'Do we not ... ?' preserves both the interrogative
    form and the expected affirmation without sounding wooden.
- source_word: ἔχομεν
  chosen: have
  alternatives:
  - possess
  lexicon: BDAG
  rationale: A straightforward present-tense rendering fits the context and natural
    English style. 'Possess' is too formal for the sentence's rhetorical force.
- source_word: ἐξουσίαν
  chosen: the right
  alternatives:
  - authority
  - freedom
  - power
  lexicon: BDAG
  rationale: In this context Paul is speaking about apostolic entitlement or legitimate
    claim, not raw power or governing authority. 'The right' best captures the practical
    sense of authorized liberty to receive material support.
- source_word: φαγεῖν
  chosen: to eat
  lexicon: BDAG
  rationale: The aorist infinitive after ἐξουσίαν is naturally rendered as an infinitive
    of activity in English.
- source_word: καὶ πεῖν
  chosen: and drink
  alternatives:
  - and to drink
  lexicon: BDAG
  rationale: English commonly omits the repeated 'to' in coordinated infinitives.
    'And drink' is smoother while preserving the meaning.
