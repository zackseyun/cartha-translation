id: 1CO.9.26
reference: 1 Corinthians 9:26
source:
  edition: SBLGNT
  text: ἐγὼ τοίνυν οὕτως τρέχω ὡς οὐκ ἀδήλως, οὕτως πυκτεύω ὡς οὐκ ἀέρα δέρων·
translation:
  text: 'So then, I run in this way: not aimlessly; in this way I box: not beating
    the air.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'not uncertainly.' The Greek adverb can emphasize lack of clarity or
      lack of definite aim; in the racing image, 'aimlessly' brings out the sense
      of running without a clear goal.
    reason: lexical_alternative
lexical_decisions:
- source_word: τοίνυν
  chosen: So then
  alternatives:
  - therefore
  - then
  lexicon: BDAG
  rationale: Marks an inferential transition from the preceding athletic analogy to
    Paul's personal application. 'So then' preserves both the logical and resumptive
    force in natural English.
- source_word: οὕτως
  chosen: in this way
  alternatives:
  - thus
  - so
  lexicon: BDAG
  rationale: Used twice for emphasis, pointing to manner. 'In this way' is slightly
    more explicit and readable than bare 'thus' while preserving the repeated structure.
- source_word: τρέχω
  chosen: I run
  lexicon: BDAG
  rationale: Straightforward athletic metaphor carried over from the preceding context;
    present tense retained as vivid, habitual self-description.
- source_word: ἀδήλως
  chosen: aimlessly
  alternatives:
  - uncertainly
  - without a clear goal
  lexicon: BDAG
  rationale: The adverb denotes lack of clarity or definite aim. In the race metaphor,
    'aimlessly' best captures purposeful direction rather than mere uncertainty.
- source_word: πυκτεύω
  chosen: I box
  alternatives:
  - I fight with my fists
  lexicon: BDAG
  rationale: Specifically refers to boxing, fitting the athletic imagery. 'I box'
    is concise and natural modern English.
- source_word: ἀέρα
  chosen: the air
  lexicon: BDAG
  rationale: Literal object in the idiom of shadowboxing or striking without landing
    a blow.
- source_word: δέρων
  chosen: beating
  alternatives:
  - striking
  - hitting
  lexicon: BDAG
  rationale: Present participle describing the manner of boxing. 'Beating the air'
    is a natural English idiom that preserves the Greek image of ineffective blows.
