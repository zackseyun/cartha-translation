id: 1CO.9.17
reference: 1 Corinthians 9:17
source:
  edition: SBLGNT
  text: εἰ γὰρ ἑκὼν τοῦτο πράσσω, μισθὸν ἔχω· εἰ δὲ ἄκων, οἰκονομίαν πεπίστευμαι.
translation:
  text: For if I do this willingly, I have a reward; but if unwillingly, I have been
    entrusted with a stewardship.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a commission has been entrusted to me.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἑκὼν
  chosen: willingly
  alternatives:
  - of my own will
  - voluntarily
  lexicon: BDAG
  rationale: Adverbial use of the adjective means acting willingly or voluntarily.
    'Willingly' is concise and natural in English while preserving the contrast with
    ἄκων.
- source_word: τοῦτο πράσσω
  chosen: do this
  alternatives:
  - practice this
  - carry this out
  lexicon: BDAG
  rationale: πράσσω here refers to carrying out the ministry action under discussion
    in context. 'Do this' is idiomatic and sufficiently broad without over-specifying
    beyond the immediate Greek.
- source_word: μισθὸν
  chosen: a reward
  alternatives:
  - wages
  - pay
  lexicon: BDAG
  rationale: μισθός can mean wages or reward. In this context Paul speaks of recompense
    for willing service, not merely salary, so 'a reward' best preserves the broader
    sense.
- source_word: ἄκων
  chosen: unwillingly
  alternatives:
  - against my will
  - reluctantly
  lexicon: BDAG
  rationale: The term is the direct antonym of ἑκών. 'Unwillingly' keeps the formal
    contrast and avoids importing emotional nuance stronger than the Greek requires.
- source_word: οἰκονομίαν
  chosen: a stewardship
  alternatives:
  - a commission
  - an administration
  - a trust
  lexicon: BDAG
  rationale: οἰκονομία denotes management of a trust or stewardship. 'Stewardship'
    preserves the metaphor of entrusted responsibility better than the more interpretive
    'commission,' though that sense is contextually related.
- source_word: πεπίστευμαι
  chosen: I have been entrusted
  alternatives:
  - I am entrusted
  - I have been given in trust
  lexicon: BDAG
  rationale: Perfect passive of πιστεύω here means to be entrusted with something.
    'I have been entrusted' reflects both the passive sense and the resulting state
    conveyed by the perfect.
