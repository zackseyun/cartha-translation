theological_decisions:
- issue: Nature of Paul's ministry in the second clause
  chosen_reading: Paul states that even if he does not act willingly, he still remains
    under a divinely entrusted stewardship.
  alternative_readings:
  - Paul means he receives only a duty, not a reward, if he acts unwillingly
  - Paul contrasts voluntary service with compulsory office without denying divine
    calling in either case
  rationale: The Greek contrasts μισθὸν ἔχω with οἰκονομίαν πεπίστευμαι. The second
    clause is best rendered as entrusted responsibility rather than as a denial of
    calling. This preserves the text's tension between willing service and obligation
    without importing a denominational theory of ministry.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
