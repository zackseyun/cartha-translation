id: 1CO.9.18
reference: 1 Corinthians 9:18
source:
  edition: SBLGNT
  text: τίς οὖν ⸀μού ἐστιν ὁ μισθός; ἵνα εὐαγγελιζόμενος ἀδάπανον θήσω τὸ ⸀εὐαγγέλιον,
    εἰς τὸ μὴ καταχρήσασθαι τῇ ἐξουσίᾳ μου ἐν τῷ εὐαγγελίῳ.
translation:
  text: What then is my reward? That in preaching the good news I may present the
    good news free of charge, so as not to make full use of my right in the good news.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the gospel' throughout this verse.
    reason: lexical_alternative
  - marker: b
    text: Or 'so as not to make full use of my right in gospel ministry.'
    reason: lexical_alternative
lexical_decisions:
- source_word: μισθός
  chosen: reward
  alternatives:
  - wages
  - pay
  lexicon: BDAG
  rationale: In this context Paul speaks of the recompense he receives for ministry,
    not literal salary alone. 'Reward' fits the rhetorical question and allows the
    irony that his 'reward' is to preach without charge.
- source_word: εὐαγγελιζόμενος
  chosen: in preaching the good news
  alternatives:
  - while proclaiming the gospel
  - as I evangelize
  lexicon: BDAG
  rationale: The participle is contemporaneous with the main verb and describes Paul's
    activity. 'Preaching the good news' is natural English and preserves the verbal
    force better than a noun alone.
- source_word: ἀδάπανον
  chosen: free of charge
  alternatives:
  - without expense
  - at no cost
  lexicon: BDAG
  rationale: The adjective means 'without cost/expense.' 'Free of charge' is idiomatic
    modern English and clearly conveys that Paul does not require payment.
- source_word: θήσω τὸ εὐαγγέλιον
  chosen: present the good news
  alternatives:
  - offer the good news
  - make the good news
  lexicon: BDAG
  rationale: Literally 'place/set the gospel,' but in context the idiom means to set
    it forth or offer it. 'Present' preserves the sense without wooden English.
- source_word: εὐαγγέλιον
  chosen: good news
  alternatives:
  - gospel
  lexicon: BDAG
  rationale: The term means 'good news.' This follows the project's preference for
    readable modern English over inherited ecclesiastical jargon where the source
    sense is clear.
- source_word: καταχρήσασθαι
  chosen: make full use of
  alternatives:
  - use to the full
  - take advantage of
  - exploit
  lexicon: BDAG
  rationale: The verb can mean to use fully or make full use of, sometimes with a
    negative nuance. Here Paul refers to declining to exercise his legitimate entitlement.
    'Make full use of' best fits the immediate context without overstating abuse.
- source_word: ἐξουσίᾳ
  chosen: right
  alternatives:
  - authority
  - claim
  lexicon: BDAG
  rationale: In 1 Corinthians 9 Paul discusses his legitimate entitlement to material
    support. 'Right' communicates that specific nuance more clearly than the broader
    'authority.'
- source_word: ἐν τῷ εὐαγγελίῳ
  chosen: in the good news
  alternatives:
  - in the gospel
  - in my ministry of the good news
  lexicon: BDAG
  rationale: The phrase is concise in Greek and likely means 'in connection with the
    gospel' or 'in gospel ministry.' 'In the good news' is a close rendering that
    preserves the wording; the more explicit ministry sense is preserved in a footnote.
