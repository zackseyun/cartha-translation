theological_decisions:
- issue: Nature of Paul's ἐξουσία in context
  chosen_reading: Paul refers to his legitimate right to receive support in gospel
    ministry, which he voluntarily declines to use fully.
  alternative_readings:
  - Paul refers more broadly to apostolic authority
  - Paul implies abusive use of authority
  rationale: The surrounding context in 1 Corinthians 9 repeatedly concerns the apostle's
    right to material support. The translation therefore uses 'right' and 'make full
    use of' rather than language implying illegitimate domination or exploitation.
  doctrine_reference: Translation philosophy §1, §5
- issue: Rendering of εὐαγγέλιον
  chosen_reading: good news
  alternative_readings:
  - gospel
  rationale: No doctrinally contested term is involved here, but the project favors
    readable modern English where it reflects the source text's plain sense. 'Good
    news' preserves meaning while avoiding unnecessary traditional jargon.
  doctrine_reference: Translation philosophy §6
