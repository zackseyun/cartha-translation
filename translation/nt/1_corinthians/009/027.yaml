id: 1CO.9.27
reference: 1 Corinthians 9:27
source:
  edition: SBLGNT
  text: ἀλλὰ ὑπωπιάζω μου τὸ σῶμα καὶ δουλαγωγῶ, μή πως ἄλλοις κηρύξας αὐτὸς ἀδόκιμος
    γένωμαι.
translation:
  text: But I discipline my body and make it my slave, lest somehow, after preaching
    to others, I myself should become disqualified.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I pummel my body'; the Greek verb literally refers to striking under
      the eye, used here metaphorically for severe self-discipline.
    reason: lexical_alternative
  - marker: b
    text: Or 'make it a slave' / 'enslave it.'
    reason: lexical_alternative
  - marker: c
    text: Or 'rejected' or 'unapproved'; 'disqualified' fits the athletic imagery
      in the context.
    reason: alternative_reading
lexical_decisions:
- source_word: ὑπωπιάζω
  chosen: discipline
  alternatives:
  - strike under the eye
  - beat
  - pummel
  lexicon: BDAG
  rationale: Literally the verb can denote striking under the eye, hence giving a
    black eye; in this athletic/self-control context Paul uses it metaphorically for
    severe bodily discipline. 'Discipline' communicates the metaphor's force in natural
    English without over-literalizing into self-harm language, while preserving the
    rigor of the image.
- source_word: σῶμα
  chosen: body
  alternatives:
  - self
  lexicon: BDAG
  rationale: The concrete term 'body' should be retained rather than generalized to
    'self,' since Paul explicitly names the body as the object of discipline.
- source_word: δουλαγωγῶ
  chosen: make it my slave
  alternatives:
  - enslave it
  - bring it into slavery
  - make it serve me
  lexicon: BDAG
  rationale: The verb means to bring into slavery or make a slave of. In keeping with
    the project's guidance on slave-language where bonded status is salient, 'make
    it my slave' preserves the strong metaphor better than softer renderings like
    'keep it under control.'
- source_word: μή πως
  chosen: lest somehow
  alternatives:
  - so that somehow not
  - for fear that somehow
  lexicon: BDAG
  rationale: This idiom introduces a negative purpose or apprehension clause. 'Lest
    somehow' is concise and natural while preserving Paul's note of caution.
- source_word: ἄλλοις
  chosen: to others
  alternatives:
  - to other people
  lexicon: BDAG
  rationale: The dative after 'preaching' is naturally rendered 'to others.'
- source_word: κηρύξας
  chosen: after preaching
  alternatives:
  - having preached
  - after proclaiming
  lexicon: BDAG
  rationale: The aorist participle is antecedent to the main verb, so 'after preaching'
    clearly conveys the temporal relationship in idiomatic English. 'Preaching' fits
    the public heralding sense of κηρύσσω in this context.
- source_word: ἀδόκιμος
  chosen: disqualified
  alternatives:
  - rejected
  - unapproved
  - failing the test
  lexicon: BDAG
  rationale: In the surrounding athletic context (race, self-control, prize), 'disqualified'
    best captures the testing/approval nuance of ἀδόκιμος without importing a narrower
    doctrine of final damnation. It also matches the metaphor of failing to meet the
    standard after competing or officiating.
- source_word: γένωμαι
  chosen: should become
  alternatives:
  - might be
  - might prove to be
  lexicon: BDAG
  rationale: The aorist middle subjunctive with μή πως expresses feared result. 'Should
    become' preserves the prospective sense.
- source_word: ἀλλὰ
  chosen: But
  alternatives:
  - Rather
  - Instead
  lexicon: BDAG
  rationale: This marks a strong contrast with the preceding discussion of athletic
    discipline; 'But' is the most natural English connective here.
