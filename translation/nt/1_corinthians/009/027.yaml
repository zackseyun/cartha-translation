theological_decisions:
- issue: Meaning of Paul's fear of becoming ἀδόκιμος
  chosen_reading: Rendered as 'disqualified' in an athletic/ministry-testing sense,
    without specifying loss of salvation or mere loss of reward.
  alternative_readings:
  - rejected by God in an ultimate salvific sense
  - disqualified only from ministerial usefulness or reward
  rationale: The immediate context is athletic imagery and self-discipline, so the
    translation should preserve the warning's seriousness while not resolving a debated
    theological question beyond what the Greek states. 'Disqualified' keeps the tension
    intact.
  doctrine_reference: Preserve theological tension rather than resolve it.
