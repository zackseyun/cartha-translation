id: 1CO.9.20
reference: 1 Corinthians 9:20
source:
  edition: SBLGNT
  text: καὶ ἐγενόμην τοῖς Ἰουδαίοις ὡς Ἰουδαῖος, ἵνα Ἰουδαίους κερδήσω· τοῖς ὑπὸ νόμον
    ὡς ὑπὸ νόμον, ⸂μὴ ὢν αὐτὸς ὑπὸ νόμον⸃, ἵνα τοὺς ὑπὸ νόμον κερδήσω·
translation:
  text: And to the Jews I became as a Jew, so that I might win Jews; to those under
    the law, as under the law—though I myself am not under the law—so that I might
    win those under the law.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'gain'; the verb can mean to gain or win over.
    reason: lexical_alternative
  - marker: b
    text: '''The law'' here most likely refers to the Mosaic law.'
    reason: cultural_note
lexical_decisions:
- source_word: ἐγενόμην
  chosen: I became
  alternatives:
  - I made myself
  - I was
  lexicon: BDAG
  rationale: Aorist middle of γίνομαι here expresses Paul's adopting a manner or stance
    in relation to different groups. 'I became' is the most natural and sufficiently
    formal rendering.
- source_word: τοῖς Ἰουδαίοις ... ὡς Ἰουδαῖος
  chosen: to the Jews ... as a Jew
  alternatives:
  - for the Jews ... like a Jew
  lexicon: BDAG
  rationale: The dative with repeated ὡς marks Paul's adaptive conduct toward a group.
    'As a Jew' preserves the comparative force without implying he ceased actually
    being Jewish ethnically.
- source_word: ἵνα ... κερδήσω
  chosen: so that I might win
  alternatives:
  - that I might gain
  lexicon: BDAG
  rationale: κερδαίνω literally means 'gain/profit,' but in Pauline missionary context
    it idiomatically means to win people over. 'Win' is idiomatic and clear in English
    while preserving the evangelistic aim.
- source_word: τοῖς ὑπὸ νόμον
  chosen: to those under the law
  alternatives:
  - to those under law
  lexicon: BDAG
  rationale: The article plus prepositional phrase functions substantivally. Including
    'the' yields natural English and reflects νόμον as a recognizable legal framework,
    here most naturally the Mosaic law.
- source_word: ὡς ὑπὸ νόμον
  chosen: as under the law
  alternatives:
  - like one under the law
  lexicon: BDAG
  rationale: This mirrors the earlier 'as a Jew' and preserves the compressed Greek
    expression. It communicates adaptive identification without asserting Paul's actual
    subjection in the following parenthetical qualification.
- source_word: μὴ ὢν αὐτὸς ὑπὸ νόμον
  chosen: though I myself am not under the law
  alternatives:
  - not being myself under the law
  - although I myself was not under the law
  lexicon: BDAG
  rationale: The present participle with μή gives a contemporaneous qualifying aside.
    'Though I myself am not under the law' reads naturally in English and preserves
    the parenthetical contrast. Present tense is preferable to past because the statement
    expresses Paul's standing, not merely a past circumstance.
- source_word: αὐτὸς
  chosen: I myself
  alternatives:
  - I
  lexicon: BDAG
  rationale: αὐτός is emphatic; 'I myself' preserves the emphasis that Paul personally
    is not under the law even while adapting to those who are.
- source_word: νόμος
  chosen: the law
  alternatives:
  - law
  - the Mosaic law
  lexicon: BDAG
  rationale: In this context, especially alongside 'Jews,' νόμος most likely refers
    to the Jewish/Mosaic law. The translation keeps the slightly broader Pauline phrase
    'the law' in the main text and leaves the more explicit interpretive expansion
    unstated.
