theological_decisions:
- issue: Meaning of Paul's statement that he is 'not under the law'
  chosen_reading: 'Render straightforwardly as Paul''s own status: ''though I myself
    am not under the law,'' without adding explanatory qualifiers.'
  alternative_readings:
  - though I myself am not under the law of Moses
  - though I myself am not without God's law but under Messiah's law (harmonized from
    v. 21)
  rationale: The Greek of this verse states only that Paul is not under the law. It
    should not be narrowed or harmonized in the main text by importing language from
    the next verse. This preserves Paul's rhetorical contrast and theological tension
    as instructed.
  doctrine_reference: Translation philosophy §3 Preserve theological tension rather
    than resolve it.
