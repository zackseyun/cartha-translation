theological_decisions:
- issue: Paul's rhetorical question about God's care for animals
  chosen_reading: Render the question straightforwardly as a rhetorical question without
    adding interpretive qualifiers.
  alternative_readings:
  - Is it only about oxen that God is concerned?
  - Surely God is not concerned about oxen, is he?
  rationale: The Greek text presents a rhetorical question with μή. The translation
    should preserve Paul's argumentative force while avoiding an interpretive expansion
    such as 'only,' which is not explicit here, or a paraphrase that overstates the
    denial. This preserves theological tension rather than resolving whether Paul
    means absolute or comparative concern.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
