id: 1CO.9.9
reference: 1 Corinthians 9:9
source:
  edition: SBLGNT
  text: ἐν γὰρ τῷ Μωϋσέως νόμῳ γέγραπται· Οὐ ⸀κημώσεις βοῦν ἀλοῶντα. μὴ τῶν βοῶν μέλει
    τῷ θεῷ,
translation:
  text: For it is written in the law of Moses, “You shall not muzzle an ox while it
    is threshing.” Is God concerned about oxen?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “as it treads out the grain.”
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν γὰρ τῷ Μωϋσέως νόμῳ
  chosen: in the law of Moses
  alternatives:
  - in Moses' law
  - in the Mosaic law
  lexicon: BDAG
  rationale: A natural rendering of the dative phrase with ἐν. 'Law of Moses' preserves
    the genitive relation and echoes common biblical idiom without becoming overly
    formal.
- source_word: γέγραπται
  chosen: it is written
  alternatives:
  - it stands written
  lexicon: BDAG
  rationale: Standard translation of the perfect passive formula introducing Scripture
    citation. 'It is written' is idiomatic and preserves the scriptural-authority
    formula.
- source_word: Οὐ κημώσεις
  chosen: You shall not muzzle
  alternatives:
  - Do not muzzle
  lexicon: BDAG
  rationale: Future indicative used as a prohibitive citation from the law, naturally
    rendered in English legal style as 'You shall not.' 'Muzzle' is the direct lexical
    equivalent of κημόω.
- source_word: βοῦν
  chosen: an ox
  alternatives:
  - an oxen animal
  - a cow
  lexicon: BDAG
  rationale: Singular accusative of βοῦς in the cited law. 'Ox' is the conventional
    and precise English term for a bovine work animal in this context.
- source_word: ἀλοῶντα
  chosen: while it is threshing
  alternatives:
  - as it treads out the grain
  - while treading grain
  lexicon: BDAG
  rationale: Present participle describing the ox's activity. 'While it is threshing'
    is clear modern English and captures the ongoing action. The more explicit 'treads
    out the grain' reflects the Deuteronomy background but adds specificity not explicit
    in Paul's wording here, so it is preserved as an alternative in a footnote.
- source_word: μὴ τῶν βοῶν μέλει τῷ θεῷ
  chosen: Is God concerned about oxen?
  alternatives:
  - Is it about oxen that God cares?
  - Does God care for oxen?
  lexicon: BDAG
  rationale: μή introduces a rhetorical question expecting a negative answer in context.
    'Concerned about' communicates μέλει naturally in modern English without flattening
    the rhetorical force. The wording leaves intact the tension that Paul is arguing
    from the law's broader intent, not denying God's providential care for animals
    in an absolute sense.
