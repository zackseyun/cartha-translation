theological_decisions:
- issue: Referent of 'the Law' in Paul's argument
  chosen_reading: '''the Law'' refers to the Mosaic Law / scriptural legal corpus,
    not merely law in a general sense'
  alternative_readings:
  - law in a generic principle sense
  rationale: The immediate context in 1 Corinthians 9:9 cites Deuteronomy 25:4, so
    Paul's appeal is specifically to Scripture's Law. Rendering as 'the Law' preserves
    that canonical reference without importing extra doctrinal claims.
  doctrine_reference: Translation philosophy §1, §5
