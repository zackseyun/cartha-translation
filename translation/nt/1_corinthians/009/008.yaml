id: 1CO.9.8
reference: 1 Corinthians 9:8
source:
  edition: SBLGNT
  text: Μὴ κατὰ ἄνθρωπον ταῦτα λαλῶ ἢ ⸂καὶ ὁ νόμος ταῦτα οὐ⸃ λέγει;
translation:
  text: Am I saying these things from a merely human perspective, or does not the
    Law also say these things?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'according to man' / 'from a human point of view.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Μὴ
  chosen: Am ... not
  alternatives:
  - Do I not ...
  - Surely ... not
  lexicon: BDAG
  rationale: Introduces a question expecting a negative answer. In English, this is
    best conveyed by an interrogative with 'not' rather than a bare negative particle.
- source_word: κατὰ ἄνθρωπον
  chosen: from a merely human perspective
  alternatives:
  - according to man
  - from a human point of view
  - on merely human authority
  lexicon: BDAG
  rationale: The idiom means speaking on a merely human basis or viewpoint, not simply
    'as a man.' 'Merely human perspective' captures the contrast with scriptural authority
    in the next clause.
- source_word: ταῦτα
  chosen: these things
  alternatives:
  - this
  lexicon: BDAG
  rationale: Plural demonstrative referring back to Paul's preceding argument; 'these
    things' preserves the Greek number and discourse linkage.
- source_word: λαλῶ
  chosen: am ... saying
  alternatives:
  - speak
  - am speaking
  lexicon: BDAG
  rationale: Present tense in context refers to Paul's current argumentation. 'Am
    saying' is idiomatic in English for present discourse and fits the direct-question
    form.
- source_word: ἢ
  chosen: or
  alternatives:
  - or rather
  lexicon: BDAG
  rationale: Simple disjunctive introducing the alternative source of authority.
- source_word: καὶ
  chosen: also
  alternatives:
  - even
  lexicon: BDAG
  rationale: Adds the Law as an additional witness beyond human reasoning. 'Also'
    is the most natural additive rendering here.
- source_word: ὁ νόμος
  chosen: the Law
  alternatives:
  - the law
  - the Mosaic Law
  lexicon: BDAG
  rationale: In Pauline usage here, the reference is to Scripture's legal corpus,
    specifically the Mosaic Law cited in the next verse. Capitalizing 'Law' signals
    this recognized scriptural referent without over-specifying in the main text.
- source_word: οὐ λέγει
  chosen: does not ... say
  alternatives:
  - doesn't ... say
  - also says
  lexicon: BDAG
  rationale: 'The negation with the interrogative expects an affirmative force: ''does
    not the Law also say...?'' This preserves the Greek rhetorical structure more
    transparently than flattening it into a positive statement.'
