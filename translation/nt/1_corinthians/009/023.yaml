theological_decisions:
- issue: Meaning of Paul's participation in relation to 'the good news'
  chosen_reading: Paul speaks of sharing in the blessings/advance of the good news
    rather than making a technical doctrinal claim about sacramental or mystical union.
  alternative_readings:
  - sharing in its blessings
  - sharing in its spread
  - becoming a partner in the gospel ministry
  rationale: συγκοινωνός is broad enough to include shared participation in the good
    news and its benefits or mission. The translation keeps this breadth with 'fellow
    participant in it' and avoids narrowing the phrase to ministry only or to a specific
    theological system.
  doctrine_reference: Preserve theological tension rather than resolve it.
