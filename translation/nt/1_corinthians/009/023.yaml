id: 1CO.9.23
reference: 1 Corinthians 9:23
source:
  edition: SBLGNT
  text: ⸀πάντα δὲ ποιῶ διὰ τὸ εὐαγγέλιον, ἵνα συγκοινωνὸς αὐτοῦ γένωμαι.
translation:
  text: But I do all things for the sake of the good news, so that I may become a
    fellow participant in it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for the sake of the gospel.'
    reason: lexical_alternative
  - marker: b
    text: Or 'so that I may share in it' or 'so that I may become a partner in it.'
    reason: alternative_reading
lexical_decisions:
- source_word: πάντα
  chosen: all things
  alternatives:
  - everything
  lexicon: BDAG
  rationale: Accusative neuter plural of πᾶς functioning comprehensively. 'All things'
    preserves the breadth of Paul's statement with slightly more formal correspondence
    than 'everything.'
- source_word: δὲ
  chosen: But
  alternatives:
  - And
  - Now
  lexicon: BDAG
  rationale: δέ marks a mild contrast or transition from the preceding discussion.
    'But' best reflects the adversative nuance in context.
- source_word: ποιῶ
  chosen: I do
  alternatives:
  - I am doing
  - I practice
  lexicon: BDAG
  rationale: Present indicative first singular of ποιέω. Simple present 'I do' is
    natural English and adequately conveys Paul's ongoing customary action.
- source_word: διὰ τὸ εὐαγγέλιον
  chosen: for the sake of the good news
  alternatives:
  - because of the gospel
  - for the gospel
  lexicon: BDAG
  rationale: διά with the accusative commonly expresses reason, purpose, or benefit.
    'For the sake of' captures Paul's motivation and self-giving orientation. εὐαγγέλιον
    is rendered 'good news' in keeping with source-oriented accessibility rather than
    preserving traditional ecclesial jargon 'gospel' where not required.
- source_word: ἵνα
  chosen: so that
  alternatives:
  - in order that
  lexicon: BDAG
  rationale: Introduces Paul's purpose clause. 'So that' is idiomatic modern English
    while preserving the telic force.
- source_word: συγκοινωνὸς
  chosen: a fellow participant
  alternatives:
  - a sharer
  - a partner
  - a co-participant
  lexicon: BDAG
  rationale: The noun denotes one who shares with others in something. 'Fellow participant'
    preserves the συν- prefix's shared aspect better than the vaguer 'partner' and
    avoids overinterpreting the nature of the sharing.
- source_word: αὐτοῦ
  chosen: in it
  alternatives:
  - of it
  - in him
  lexicon: BDAG
  rationale: The pronoun is genitive singular and most naturally refers back to εὐαγγέλιον
    ('good news'). English idiom with 'participant' prefers 'in it' rather than the
    more wooden 'participant of it.' The alternative 'in him' is grammatically possible
    only if αὐτοῦ were taken personally, but the immediate neuter antecedent εὐαγγέλιον
    makes 'it' the better reading.
- source_word: γένωμαι
  chosen: I may become
  alternatives:
  - I may be
  - I might become
  lexicon: BDAG
  rationale: Aorist middle subjunctive of γίνομαι after ἵνα. 'May become' preserves
    the ingressive nuance better than simply 'may be.'
