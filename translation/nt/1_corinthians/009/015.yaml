id: 1CO.9.15
reference: 1 Corinthians 9:15
source:
  edition: SBLGNT
  text: Ἐγὼ δὲ ⸂οὐ κέχρημαι οὐδενὶ⸃ τούτων. οὐκ ἔγραψα δὲ ταῦτα ἵνα οὕτως γένηται
    ἐν ἐμοί, καλὸν γάρ μοι μᾶλλον ἀποθανεῖν ἤ— τὸ καύχημά μου ⸂οὐδεὶς κενώσει⸃.
translation:
  text: But I have made use of none of these things. And I did not write these things
    so that it should be done this way for me, for I would rather die than—no one
    will empty my boasting.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more explicitly from the context, 'none of these rights.'
    reason: lexical_alternative
  - marker: b
    text: 'The Greek breaks off after ''than—'' and then resumes: ''my boasting no
      one will empty.'' Many translations smooth the sense as ''than have anyone empty
      my boasting.'''
    reason: alternative_reading
lexical_decisions:
- source_word: κέχρημαι
  chosen: have made use of
  alternatives:
  - have used
  - have taken advantage of
  lexicon: BDAG
  rationale: 'The perfect middle indicates a state resulting from prior action: Paul
    has not availed himself of the rights just discussed. ''Made use of'' is idiomatic
    and preserves the sense of employing or benefiting from something without implying
    abuse.'
- source_word: οὐδενὶ τούτων
  chosen: none of these things
  alternatives:
  - none of these rights
  - none of these provisions
  lexicon: BDAG
  rationale: Literally 'none of these,' referring back to the support-rights enumerated
    in the context. 'Things' keeps the wording close to the Greek; the contextual
    referent can be inferred. An alternative more interpretive gloss is preserved
    in rationale rather than main text.
- source_word: ἔγραψα ... ταῦτα
  chosen: I did not write these things
  alternatives:
  - I have not written these things
  lexicon: BDAG
  rationale: The aorist is naturally rendered as a simple past in English. 'These
    things' refers to the preceding discussion in the letter.
- source_word: ἵνα οὕτως γένηται ἐν ἐμοί
  chosen: so that it should be done this way for me
  alternatives:
  - so that it might happen this way in my case
  - so that this may be done for me
  lexicon: BDAG
  rationale: This clause is somewhat compressed in Greek. The translation aims to
    preserve the purpose sense of ἵνα and the passive-like/resultative force of γένηται
    with ἐν ἐμοί, meaning Paul is not writing in order to secure such treatment for
    himself.
- source_word: καλὸν γάρ μοι μᾶλλον ἀποθανεῖν
  chosen: for I would rather die
  alternatives:
  - for it is better for me to die
  - for it would be better for me to die
  lexicon: BDAG
  rationale: 'The idiom καλὸν ... μᾶλλον is best expressed naturally in English as
    preference: ''I would rather die.'' This preserves Paul''s emphatic resolve without
    woodenly reproducing the Greek syntax.'
- source_word: τὸ καύχημά μου
  chosen: my boasting
  alternatives:
  - my ground for boasting
  - my reason for boasting
  lexicon: BDAG
  rationale: καύχημα can denote the object or basis of boasting, not merely the act.
    Here Paul refers to the boast he has in preaching free of charge. 'My boasting'
    is concise and close to the Greek, while the fuller nuance is noted by alternatives.
- source_word: κενώσει
  chosen: will empty
  alternatives:
  - will nullify
  - will deprive of content
  lexicon: BDAG
  rationale: The verb literally means 'to empty' and is used metaphorically for rendering
    something void or without force. 'Will empty' preserves the metaphor and echoes
    Pauline usage elsewhere; English readers can understand it in context.
