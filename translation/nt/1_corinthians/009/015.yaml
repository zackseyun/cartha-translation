theological_decisions:
- issue: Abrupt broken syntax after ἤ
  chosen_reading: Represent the dash in English to preserve Paul's emotional interruption
    rather than smoothing into a fully regular sentence.
  alternative_readings:
  - for I would rather die than have anyone empty my boasting
  - for I would rather die—no one will empty my boasting
  rationale: The Greek breaks off after ἤ ('than—'), leaving an anacoluthon. Preserving
    the dash reflects the intensity and unfinished force of Paul's statement better
    than supplying omitted words in the main text. A smoother completion is possible,
    but the source text's rhetorical abruptness is significant and should remain visible.
  doctrine_reference: Translation philosophy §1, §3, §6
