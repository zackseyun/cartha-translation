id: 1CO.9.10
reference: 1 Corinthians 9:10
source:
  edition: SBLGNT
  text: ἢ δι’ ἡμᾶς πάντως λέγει; δι’ ἡμᾶς γὰρ ἐγράφη, ὅτι ⸂ὀφείλει ἐπ’ ἐλπίδι⸃ ὁ ἀροτριῶν
    ἀροτριᾶν, καὶ ὁ ἀλοῶν ⸂ἐπ’ ἐλπίδι τοῦ μετέχειν⸃.
translation:
  text: Or is he speaking entirely for our sake? Yes, it was written for our sake,
    because the one who plows ought to plow in hope, and the one who threshes, in
    hope of sharing in the harvest.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'surely' or 'certainly' for 'entirely.' The Greek adverb intensifies
      the rhetorical question.
    reason: lexical_alternative
  - marker: b
    text: Literally 'in hope of sharing.' The object ('the harvest' or 'the crop')
      is implicit in the Greek and supplied from the farming context.
    reason: lexical_alternative
lexical_decisions:
- source_word: πάντως
  chosen: entirely
  alternatives:
  - surely
  - altogether
  - certainly
  lexicon: BDAG
  rationale: In this rhetorical question, πάντως intensifies the claim that the scriptural
    statement is indeed directed toward human benefit. 'Entirely' fits the adverbial
    force in context better than the more inferential 'surely,' while still sounding
    natural in English.
- source_word: δι’ ἡμᾶς
  chosen: for our sake
  alternatives:
  - because of us
  - for us
  lexicon: BDAG
  rationale: διά with the accusative commonly expresses reason or benefit. 'For our
    sake' captures the purposive/benefactive sense in Paul's argument better than
    the flatter 'for us.'
- source_word: ἐγράφη
  chosen: it was written
  alternatives:
  - it has been written
  lexicon: BDAG
  rationale: The aorist passive is naturally rendered 'it was written.' English present
    perfect is possible in citation formulas, but the simple past is closer to the
    Greek form here and remains idiomatic.
- source_word: ὀφείλει
  chosen: ought to
  alternatives:
  - must
  - is obligated to
  lexicon: BDAG
  rationale: ὀφείλω can denote obligation or necessity. 'Ought to' preserves the normative
    sense without overstating compulsion; it fits Paul's proverbial application about
    rightful expectation in labor.
- source_word: ἐπ’ ἐλπίδι
  chosen: in hope
  alternatives:
  - with hope
  - on the basis of hope
  lexicon: BDAG
  rationale: The prepositional phrase expresses the manner or motivating expectation
    of the labor. 'In hope' is concise, idiomatic, and preserves the repeated phrase
    in both clauses.
- source_word: ὁ ἀροτριῶν ἀροτριᾶν
  chosen: the one who plows ought to plow
  alternatives:
  - the plowman ought to plow
  - he who plows should plow
  lexicon: BDAG
  rationale: The articular participle plus infinitive is rendered with a generic personal
    expression. 'The one who plows' is gender-accurate and natural, preserving the
    representative force of the Greek without unnecessarily specifying 'man.'
- source_word: ὁ ἀλοῶν
  chosen: the one who threshes
  alternatives:
  - the thresher
  - he who threshes
  lexicon: BDAG
  rationale: Like the previous participial expression, this is a generic worker. 'The
    one who threshes' keeps the parallel structure and representative force.
- source_word: τοῦ μετέχειν
  chosen: of sharing in the harvest
  alternatives:
  - of partaking
  - of receiving a share
  lexicon: BDAG
  rationale: μετέχω means to share in or partake of something. The object is implicit
    from the farming context and Paul's argument about receiving material support;
    'the harvest' makes the sense explicit in natural English without adding a foreign
    idea.
