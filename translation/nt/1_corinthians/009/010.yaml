theological_decisions:
- issue: Implicit object of μετέχειν
  chosen_reading: Made explicit as 'sharing in the harvest'
  alternative_readings:
  - sharing in it
  - partaking of the crop
  rationale: The Greek leaves the object unstated, but the agricultural image and
    Paul's argument about laborers benefiting from their work make the implied object
    clear. Explicitating 'the harvest' aids readability while remaining within the
    source text's warranted sense.
  doctrine_reference: 'Translation philosophy: optimal equivalence; readable modern
    English, not archaic or academic.'
