id: 1CO.11.6
reference: 1 Corinthians 11:6
source:
  edition: SBLGNT
  text: εἰ γὰρ οὐ κατακαλύπτεται γυνή, καὶ κειράσθω· εἰ δὲ αἰσχρὸν γυναικὶ τὸ κείρασθαι
    ἢ ξυρᾶσθαι, κατακαλυπτέσθω.
translation:
  text: For if a woman does not cover her head, she should also have her hair cut
    off; but if it is disgraceful for a woman to have her hair cut off or to be shaved,
    she should cover her head.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'wife' throughout the verse; Greek gynē can mean either 'woman' or 'wife'
      depending on context.
    reason: alternative_reading
  - marker: b
    text: The verb can also be rendered 'be veiled'; the Greek speaks of being covered,
      with the head covering implied by the context.
    reason: lexical_alternative
lexical_decisions:
- source_word: κατακαλύπτεται / κατακαλυπτέσθω
  chosen: cover her head / should cover her head
  alternatives:
  - is veiled / should be veiled
  - covers herself / should cover herself
  lexicon: BDAG
  rationale: The verb means to cover or veil. In this context of head coverings, English
    needs the object made explicit for clarity, so 'cover her head' best communicates
    the implied sense without overcommitting to a specific garment. 'Veiled' is possible
    but narrower and more interpretive.
- source_word: γυνή
  chosen: woman
  alternatives:
  - wife
  lexicon: BDAG
  rationale: γυνή can mean either 'woman' or 'wife.' In this verse the statement is
    framed generally rather than explicitly about a husband-wife pair, so 'woman'
    is the less restrictive rendering. The alternative remains contextually possible
    in the broader passage.
- source_word: κειράσθω
  chosen: she should also have her hair cut off
  alternatives:
  - let her also be shorn
  - she should also cut her hair
  lexicon: BDAG
  rationale: The imperative carries a consequential force in Paul's argument. 'Have
    her hair cut off' communicates the sense of shearing/cropping the hair in idiomatic
    modern English. 'Cut her hair' alone can sound too mild; 'shorn' is accurate but
    less natural.
- source_word: καὶ
  chosen: also
  alternatives:
  - even
  lexicon: BDAG
  rationale: 'Here καί links the consequence rhetorically: if she will not be covered,
    then she should ''also'' accept the further step. ''Also'' preserves the argumentative
    progression.'
- source_word: αἰσχρὸν
  chosen: disgraceful
  alternatives:
  - shameful
  - dishonorable
  lexicon: BDAG
  rationale: '''Disgraceful'' captures the social-honor dimension of αἰσχρός in this
    context. ''Shameful'' is also possible, but ''disgraceful'' reads more naturally
    in contemporary English while retaining moral-social force.'
- source_word: τὸ κείρασθαι
  chosen: to have her hair cut off
  alternatives:
  - to be shorn
  - to cut her hair
  lexicon: BDAG
  rationale: The articular infinitive functions as the subject of 'is disgraceful.'
    The phrase refers to having the hair cropped/sheared. This rendering keeps the
    distinction from shaving in the next term.
- source_word: ξυρᾶσθαι
  chosen: to be shaved
  alternatives:
  - to shave her head
  lexicon: BDAG
  rationale: The verb denotes shaving. 'To be shaved' matches the infinitive construction
    and keeps the contrast with cutting/shearing the hair.
- source_word: γὰρ ... δὲ
  chosen: For ... but
  alternatives:
  - For ... now
  - Indeed ... but
  lexicon: BDAG
  rationale: These conjunctions structure Paul's reasoning. 'For ... but' gives a
    clear and natural representation of the argumentative flow in English.
