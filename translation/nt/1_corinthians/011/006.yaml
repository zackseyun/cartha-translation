theological_decisions:
- issue: Whether γυνή should be rendered 'woman' or 'wife' in this verse
  chosen_reading: woman
  alternative_readings:
  - wife
  rationale: The immediate verse states a general principle about female head covering
    and hair, without explicit mention of a husband. Since the broader passage includes
    both creation-order and honor/shame reasoning, translating γυνή here as 'woman'
    preserves the wider scope and avoids narrowing the statement to married women
    only. The alternative 'wife' is preserved in a footnote because the broader context
    has been interpreted that way by some readers.
  doctrine_reference: Translation philosophy §3, §4
