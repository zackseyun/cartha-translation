theological_decisions:
- issue: Referent of 'no such custom'
  chosen_reading: The phrase is left intentionally broad as 'no such custom' without
    specifying in translation whether Paul means the custom of contentiousness or
    the custom under discussion in the preceding verses.
  alternative_readings:
  - no such custom of being contentious
  - no such custom as rejecting the head-covering practice under discussion
  rationale: The Greek τοιαύτην συνήθειαν is syntactically concise and contextually
    debated. To preserve the text's ambiguity rather than resolve it interpretively,
    the translation keeps the general expression 'no such custom.' This follows the
    project's principle of preserving theological and interpretive tension where the
    source is genuinely ambiguous.
  doctrine_reference: DOCTRINE.md Translation philosophy §3
