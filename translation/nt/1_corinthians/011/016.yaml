id: 1CO.11.16
reference: 1 Corinthians 11:16
source:
  edition: SBLGNT
  text: εἰ δέ τις δοκεῖ φιλόνεικος εἶναι, ἡμεῖς τοιαύτην συνήθειαν οὐκ ἔχομεν, οὐδὲ
    αἱ ἐκκλησίαι τοῦ θεοῦ.
translation:
  text: But if anyone seems to be contentious, we have no such custom, nor do the
    churches of God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'quarrelsome' or 'fond of strife.'
    reason: lexical_alternative
  - marker: b
    text: '''No such custom'' may refer either to the practice of being contentious
      or to the disputed practice discussed in the preceding verses.'
    reason: alternative_reading
lexical_decisions:
- source_word: δοκεῖ
  chosen: seems
  alternatives:
  - thinks
  - is inclined
  lexicon: BDAG
  rationale: The verb can mean 'seems' or 'thinks/supposes.' In this construction
    with the infinitive ('seems to be contentious'), 'seems' preserves the Greek idiom
    and leaves open whether Paul is describing self-perception or apparent disposition.
- source_word: φιλόνεικος
  chosen: contentious
  alternatives:
  - quarrelsome
  - fond of strife
  - argumentative
  lexicon: BDAG
  rationale: The adjective denotes a person inclined to strife or dispute. 'Contentious'
    is concise, natural English and fits Paul's warning against combative resistance
    better than the more colloquial 'argumentative.'
- source_word: τοιαύτην
  chosen: such
  alternatives:
  - this kind of
  - like this
  lexicon: BDAG
  rationale: The demonstrative points to a kind or sort of practice. 'Such' is idiomatic
    in English and preserves the backward reference without over-specifying.
- source_word: συνήθειαν
  chosen: custom
  alternatives:
  - practice
  - habit
  - usage
  lexicon: BDAG
  rationale: The noun can refer to customary practice or established usage. 'Custom'
    best conveys an accepted communal practice here, while remaining broad enough
    to cover the debated referent in context.
- source_word: οὐκ ἔχομεν
  chosen: we have no
  alternatives:
  - we do not have
  - we do not follow
  lexicon: BDAG
  rationale: A straightforward rendering of the verbal expression. 'We have no such
    custom' is idiomatic English and avoids importing the stronger interpretive nuance
    'we do not permit' or 'we do not follow'.
- source_word: ἐκκλησίαι τοῦ θεοῦ
  chosen: the churches of God
  alternatives:
  - God's churches
  lexicon: BDAG
  rationale: A formal but natural rendering that preserves the genitival phrase and
    Paul's wider appeal beyond his own practice to the congregations belonging to
    God.
