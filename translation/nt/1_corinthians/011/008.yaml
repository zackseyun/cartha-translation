id: 1CO.11.8
reference: 1 Corinthians 11:8
source:
  edition: SBLGNT
  text: οὐ γάρ ἐστιν ἀνὴρ ἐκ γυναικός, ἀλλὰ γυνὴ ἐξ ἀνδρός·
translation:
  text: For man is not from woman, but woman from man.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'For a husband is not from a wife, but a wife from a husband.' The Greek
      terms can mean either 'man/woman' or 'husband/wife'; here the broader creational
      sense is preferred.
    reason: alternative_reading
lexical_decisions:
- source_word: γάρ
  chosen: For
  alternatives:
  - because
  lexicon: BDAG
  rationale: Introduces the ground or explanation for the preceding statement. 'For'
    is the most natural concise English connective in this argumentative context.
- source_word: ἀνὴρ
  chosen: man
  alternatives:
  - husband
  - male
  lexicon: BDAG
  rationale: Although ἀνήρ can mean 'husband' in some contexts, here the creational
    argument and the paired contrast with γυνή point to 'man' and 'woman' as sexed
    categories rather than a specific married couple. This also aligns with the doctrine's
    gender-accurate principle.
- source_word: ἐκ
  chosen: from
  alternatives:
  - out of
  lexicon: BDAG
  rationale: The preposition marks source/origin. 'From' is idiomatic modern English
    and adequately preserves the sense of derivation without over-literal stiffness.
- source_word: γυναικός
  chosen: woman
  alternatives:
  - wife
  lexicon: BDAG
  rationale: Genitive of γυνή. In this creational context it refers to woman as such,
    not specifically 'wife.' 'Woman' preserves the source-level contrast with ἀνήρ.
- source_word: ἀλλὰ
  chosen: but
  alternatives:
  - rather
  - instead
  lexicon: BDAG
  rationale: Marks strong contrast between the two clauses. 'But' is the clearest
    and most natural rendering.
- source_word: γυνὴ
  chosen: woman
  alternatives:
  - wife
  lexicon: BDAG
  rationale: As in the first clause, γυνή is best rendered 'woman' because Paul is
    appealing to the creation order rather than speaking narrowly of marriage.
- source_word: ἀνδρός
  chosen: man
  alternatives:
  - husband
  - male
  lexicon: BDAG
  rationale: Genitive of ἀνήρ. 'Man' best fits the creational source/origin argument
    and maintains the man/woman pairing in English.
- source_word: ἐστιν
  chosen: is
  alternatives:
  - exists
  lexicon: BDAG
  rationale: Simple copular verb in a statement of origin/source. 'Is' is the straightforward
    English equivalent.
