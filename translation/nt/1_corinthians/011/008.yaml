theological_decisions:
- issue: Whether ἀνήρ/γυνή should be rendered as 'man/woman' or 'husband/wife'
  chosen_reading: man/woman
  alternative_readings:
  - husband/wife
  rationale: Paul's statement grounds his argument in the creation narrative, emphasizing
    origin ('from') rather than the institution of marriage in particular. Rendering
    the pair as 'man/woman' preserves the broader creational scope and avoids narrowing
    the claim to spouses only.
  doctrine_reference: Translation philosophy §4 (Gender-accurate over gender-neutral)
