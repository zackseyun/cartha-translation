theological_decisions:
- issue: Rendering αἱρέσεις
  chosen_reading: factions
  alternative_readings:
  - heresies
  - sects
  - divisions
  rationale: Although αἵρεσις later developed the sense 'heresy,' in this immediate
    context Paul is addressing social and communal splits in the Corinthian assembly.
    Rendering it as 'factions' avoids importing later doctrinal categories the text
    does not explicitly state.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Preserve theological tension rather than resolve it.'
- issue: Force of δεῖ ('must')
  chosen_reading: Retained as 'must' without specifying the source of necessity
  alternative_readings:
  - divine necessity
  - practical inevitability
  rationale: The verse states necessity but does not explicitly explain whether this
    is God's providential purpose, a tragic inevitability in fallen communities, or
    both. The translation preserves that tension rather than resolving it.
  doctrine_reference: 'Translation philosophy: Preserve theological tension rather
    than resolve it.'
