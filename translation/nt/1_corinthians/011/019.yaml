id: 1CO.11.19
reference: 1 Corinthians 11:19
source:
  edition: SBLGNT
  text: δεῖ γὰρ καὶ αἱρέσεις ἐν ὑμῖν εἶναι, ἵνα ⸀καὶ οἱ δόκιμοι φανεροὶ γένωνται ἐν
    ὑμῖν.
translation:
  text: For there must also be factions among you, so that those who are approved
    may also become evident among you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'divisions,' 'sects,' or, in later usage, 'heresies.' Here the sense
      is most likely factions within the congregation.
    reason: lexical_alternative
  - marker: b
    text: '''Those who are approved'' can also be rendered ''the genuine'' or ''those
      who have stood the test.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: δεῖ
  chosen: there must be
  alternatives:
  - it is necessary
  - it is inevitable
  lexicon: BDAG
  rationale: Expresses necessity. 'There must be' preserves Paul's strong statement
    without over-interpreting whether the necessity is logical, providential, or situational.
- source_word: γὰρ
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: BDAG
  rationale: Retains the explanatory connection to the previous verse.
- source_word: καὶ αἱρέσεις
  chosen: also be factions
  alternatives:
  - also be divisions
  - also be sects
  - also be dissensions
  lexicon: BDAG
  rationale: αἵρεσις in this context refers to divisive groupings or parties within
    the assembly, not later formal 'heresies' in the doctrinal sense. 'Factions' best
    fits the immediate context of internal splits at the Lord's Supper.
- source_word: ἐν ὑμῖν
  chosen: among you
  alternatives:
  - in you
  - in your midst
  lexicon: BDAG
  rationale: Idiomatic English for divisions existing within the community.
- source_word: ἵνα
  chosen: so that
  alternatives:
  - in order that
  - with the result that
  lexicon: BDAG
  rationale: Preserves the purpose/result nuance without forcing a strict distinction.
- source_word: καὶ οἱ δόκιμοι
  chosen: those who are approved may also
  alternatives:
  - the genuine may also
  - those who stand the test may also
  - the tested-and-approved may also
  lexicon: BDAG
  rationale: δόκιμοι denotes those proven genuine after testing. 'Approved' is concise
    and natural, while the added 'those who are' makes the substantival adjective
    clear in English. The second καί is retained as 'also' to mirror the Greek emphasis.
- source_word: φανεροὶ γένωνται
  chosen: become evident
  alternatives:
  - be revealed
  - be made manifest
  - become plain
  lexicon: BDAG
  rationale: The combination conveys coming into open visibility. 'Become evident'
    is natural English and preserves the process/result sense of γένωνται with φανεροί.
- source_word: ἐν ὑμῖν
  chosen: among you
  alternatives:
  - in your midst
  - among you all
  lexicon: BDAG
  rationale: Repeats the communal setting in idiomatic English and preserves the rhetorical
    framing of the verse.
