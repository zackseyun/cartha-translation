theological_decisions:
- issue: Meaning of 'nature' (φύσις) in Paul's argument
  chosen_reading: Rendered broadly as 'nature itself' without specifying whether Paul
    means created order, common human perception, or culturally embedded natural propriety.
  alternative_readings:
  - created biological order
  - social convention perceived as natural
  - innate moral intuition
  rationale: The Greek term can bear a range of senses in Pauline usage and in Greco-Roman
    moral discourse. The translation preserves the ambiguity rather than resolving
    the interpretive question in favor of a specific theological or cultural claim.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
