id: 1CO.11.14
reference: 1 Corinthians 11:14
source:
  edition: SBLGNT
  text: ⸀οὐδὲ ⸂ἡ φύσις αὐτὴ⸃ διδάσκει ὑμᾶς ὅτι ἀνὴρ μὲν ἐὰν κομᾷ, ἀτιμία αὐτῷ ἐστιν,
translation:
  text: Does not even nature itself teach you that if a man wears long hair, it is
    a dishonor to him,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'if a man lets his hair grow long' or 'if a man has long hair.' The Greek
      verb refers to wearing or having long hair.
    reason: lexical_alternative
  - marker: b
    text: '''Nature itself'' may refer to created order, common human perception,
      or what a culture regards as naturally fitting; the Greek does not specify more
      narrowly here.'
    reason: alternative_reading
lexical_decisions:
- source_word: οὐδὲ
  chosen: Does not even
  alternatives:
  - Nor does
  - Not even
  lexicon: BDAG
  rationale: Introduces a rhetorical question continuing Paul's argument. 'Does not
    even' captures both the negative and the emphatic force in natural English.
- source_word: ἡ φύσις αὐτὴ
  chosen: nature itself
  alternatives:
  - natural instinct itself
  - nature
  lexicon: BDAG
  rationale: The phrase is emphatic, with αὐτή intensifying φύσις. 'Nature itself'
    preserves the emphasis and leaves the referent broad, without over-interpreting
    it as biology alone or mere social custom.
- source_word: διδάσκει ὑμᾶς
  chosen: teach you
  alternatives:
  - instruct you
  - show you
  lexicon: BDAG
  rationale: A straightforward rendering of the present indicative with direct object.
    'Teach you' is idiomatic and preserves the didactic sense.
- source_word: ὅτι
  chosen: that
  alternatives:
  - —
  lexicon: BDAG
  rationale: Introduces the content of what nature teaches. Retained explicitly for
    clarity.
- source_word: ἀνὴρ
  chosen: a man
  alternatives:
  - a male
  - a husband
  lexicon: BDAG
  rationale: In this context the contrast is between male and female presentation
    in the assembly, not specifically husband and wife in this clause. 'A man' is
    the natural gender-accurate rendering.
- source_word: μὲν
  chosen: —
  alternatives:
  - indeed
  - on the one hand
  lexicon: BDAG
  rationale: μέν signals the first half of a contrast completed in the next verse.
    English normally leaves it implicit here rather than forcing an awkward 'indeed'
    or 'on the one hand.' The contrast is preserved across the sentence pair.
- source_word: ἐὰν κομᾷ
  chosen: if a man wears long hair
  alternatives:
  - if a man lets his hair grow long
  - if a man has long hair
  lexicon: BDAG
  rationale: κομάω refers to wearing or having long hair, not merely possessing hair.
    'Wears long hair' is concise, idiomatic, and reflects the customary/presentative
    sense.
- source_word: ἀτιμία
  chosen: a dishonor
  alternatives:
  - shame
  - disgrace
  lexicon: BDAG
  rationale: The noun denotes dishonor or shame. 'Dishonor' fits the honor-shame context
    and pairs well with the dative 'to him' without sounding overly colloquial.
- source_word: αὐτῷ ἐστιν
  chosen: it is to him
  alternatives:
  - it is for him
  - it is his
  lexicon: BDAG
  rationale: Rendered idiomatically as 'it is a dishonor to him.' This preserves the
    predicative construction while producing natural English.
