theological_decisions:
- issue: Whether γυνή / ἀνήρ should be rendered as 'woman/man' or 'wife/husband'
  chosen_reading: woman/man
  alternative_readings:
  - wife/husband
  rationale: The immediate context discusses man and woman in creation and worship,
    and this verse functions as a balancing generalization about mutuality rather
    than a narrowly marital statement. Rendering the pair as 'woman/man' preserves
    the broader anthropological scope while leaving marital implications to context
    rather than importing them into the verse itself.
  doctrine_reference: Translation philosophy §4 (Gender-accurate over gender-neutral);
    §3 (Preserve theological tension rather than resolve it)
