id: 1CO.11.11
reference: 1 Corinthians 11:11
source:
  edition: SBLGNT
  text: πλὴν οὔτε ⸂γυνὴ χωρὶς ἀνδρὸς οὔτε ἀνὴρ χωρὶς γυναικὸς⸃ ἐν κυρίῳ·
translation:
  text: Nevertheless, in the Lord woman is not apart from man, nor man apart from
    woman.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'wife is not apart from husband, nor husband apart from wife.' The Greek
      terms can refer either to man/woman or husband/wife; the broader sense is preferred
      here because the statement appears general rather than limited to marriage.
    reason: alternative_reading
lexical_decisions:
- source_word: πλὴν
  chosen: Nevertheless
  alternatives:
  - However
  - Yet
  - Except that
  lexicon: BDAG
  rationale: Signals a qualifying or balancing statement after the preceding argument.
    'Nevertheless' best captures Paul's concessive-turning nuance here.
- source_word: γυνή
  chosen: woman
  alternatives:
  - wife
  lexicon: BDAG
  rationale: Although γυνή can mean either 'woman' or 'wife,' the surrounding contrast
    with ἀνήρ in a general theological statement about mutual relation favors the
    broader sense 'woman' rather than the specifically marital 'wife'.
- source_word: ἀνήρ
  chosen: man
  alternatives:
  - husband
  lexicon: BDAG
  rationale: As with γυνή, ἀνήρ can mean 'man' or 'husband.' In this verse Paul appears
    to speak generally of the relation of the sexes 'in the Lord,' so 'man' is the
    better rendering.
- source_word: χωρὶς
  chosen: apart from
  alternatives:
  - without
  - independent of
  lexicon: BDAG
  rationale: χωρίς here expresses separation or independence. 'Apart from' is a natural
    English rendering that preserves the relational nuance without overinterpreting
    it.
- source_word: ἐν κυρίῳ
  chosen: in the Lord
  alternatives:
  - in the Lord Messiah
  - in relation to the Lord
  lexicon: BDAG
  rationale: The phrase is a standard Pauline locution denoting sphere or relation
    within union with or reference to the Lord. Following the doctrine default for
    κύριος, 'Lord' is retained. 'In the Lord' is both accurate and idiomatic.
- source_word: οὔτε ... οὔτε
  chosen: is not ... nor
  alternatives:
  - neither ... nor
  lexicon: BDAG
  rationale: The correlative negation links the two balanced clauses. Because English
    idiom with singular subjects reads more smoothly with an explicit verb in the
    first clause, 'is not ... nor' communicates the force clearly while preserving
    the parallelism.
