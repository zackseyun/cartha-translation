id: 1CO.11.33
reference: 1 Corinthians 11:33
source:
  edition: SBLGNT
  text: Ὥστε, ἀδελφοί μου, συνερχόμενοι εἰς τὸ φαγεῖν ἀλλήλους ἐκδέχεσθε.
translation:
  text: So then, my brothers, when you come together to eat, wait for one another.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'brothers and sisters'; the Greek says 'brothers' and often uses the
      masculine form to address a mixed congregation.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ὥστε
  chosen: So then
  alternatives:
  - Therefore
  - So
  lexicon: BDAG
  rationale: Inferential conjunction drawing a conclusion from the preceding correction
    about abuses at the Lord's Supper. 'So then' is natural English and preserves
    the logical force.
- source_word: ἀδελφοί μου
  chosen: my brothers
  alternatives:
  - my brothers and sisters
  - brothers of mine
  lexicon: BDAG
  rationale: Vocative plural with possessive pronoun, literally 'my brothers.' Per
    the translation philosophy, the masculine form is retained where the Greek uses
    it representatively; inclusivity can be clarified in a footnote rather than neutralized
    in the main text.
- source_word: συνερχόμενοι
  chosen: when you come together
  alternatives:
  - as you come together
  - coming together
  lexicon: BDAG
  rationale: Present middle/passive participle used adverbially with the imperative,
    indicating the circumstance in which the command applies. 'When you come together'
    is idiomatic and fits the repeated communal-gathering language in this chapter.
- source_word: εἰς τὸ φαγεῖν
  chosen: to eat
  alternatives:
  - for eating
  - for the meal
  lexicon: BDAG
  rationale: 'Preposition with articular infinitive expressing purpose: ''for the
    purpose of eating'' or ''to eat.'' The concise English infinitive best captures
    the sense without over-specifying the meal.'
- source_word: ἀλλήλους
  chosen: one another
  alternatives:
  - each other
  lexicon: BDAG
  rationale: Reciprocal pronoun in the accusative as the object of the imperative.
    'One another' is the standard natural rendering.
- source_word: ἐκδέχεσθε
  chosen: wait for
  alternatives:
  - receive
  - welcome
  - wait for and receive
  lexicon: BDAG
  rationale: In this context of some eating ahead of others (vv. 21, 33), the verb
    most naturally means to wait for others before beginning the meal. Although the
    verb can carry the sense 'receive' or 'welcome,' the immediate context favors
    'wait for' as the practical corrective Paul gives.
