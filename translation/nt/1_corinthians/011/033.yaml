theological_decisions:
- issue: Representative masculine address in ἀδελφοί
  chosen_reading: Retain 'brothers' in the main text, with inclusive force noted in
    a footnote.
  alternative_readings:
  - brothers and sisters
  rationale: The Greek vocative plural ἀδελφοί often addresses the whole congregation,
    likely including women, but the source text is grammatically masculine. Per doctrine
    and translation philosophy, gender-accurate rendering is preferred over flattening
    to gender-neutral language in the main text.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
