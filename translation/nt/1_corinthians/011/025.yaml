theological_decisions:
- issue: Meaning of διαθήκη in Eucharistic institution context
  chosen_reading: covenant
  alternative_readings:
  - testament
  rationale: Given the allusion to covenant-establishing blood and the OT background,
    'covenant' best reflects the theological and lexical sense here. Rendering it
    'testament' would lean on later ecclesiastical usage rather than the source text's
    plain sense.
  doctrine_reference: Translation philosophy §1; Contested terms table principle of
    original-language primacy
- issue: Relation of the cup to the covenant phrase
  chosen_reading: '''This cup is the new covenant in my blood'' retained as stated
    without sacramental over-specification'
  alternative_readings:
  - '''This cup is the new covenant ratified by my blood'''
  - '''This cup represents the new covenant in my blood'''
  rationale: The Greek states the identification directly and does not itself resolve
    later doctrinal debates about sacramental presence or symbolism. The translation
    preserves the wording and theological tension rather than importing a denominational
    explanation.
  doctrine_reference: Affirmations paragraph on not advocating denominational distinctives;
    Translation philosophy §3
