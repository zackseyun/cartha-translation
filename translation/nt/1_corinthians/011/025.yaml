id: 1CO.11.25
reference: 1 Corinthians 11:25
source:
  edition: SBLGNT
  text: ὡσαύτως καὶ τὸ ποτήριον μετὰ τὸ δειπνῆσαι, λέγων· Τοῦτο τὸ ποτήριον ἡ καινὴ
    διαθήκη ἐστὶν ἐν τῷ ἐμῷ αἵματι· τοῦτο ποιεῖτε, ὁσάκις ⸀ἐὰν πίνητε, εἰς τὴν ἐμὴν
    ἀνάμνησιν.
translation:
  text: In the same way also, after supper, he took the cup, saying, “This cup is
    the new covenant in my blood. Do this, as often as you drink it, in remembrance
    of me.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'This cup is the new testament in my blood.' The Greek word can mean
      'covenant' or 'testament,' but 'covenant' best fits the biblical background
      here.
    reason: alternative_reading
  - marker: b
    text: Or, 'whenever you drink.' The Greek expression indicates repeated occasions.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὡσαύτως καὶ
  chosen: In the same way also
  alternatives:
  - Likewise also
  - In the same way
  lexicon: BDAG
  rationale: Marks correspondence with the preceding action over the bread. 'In the
    same way also' preserves both ὡσαύτως and καί without sounding overly wooden.
- source_word: ποτήριον
  chosen: cup
  alternatives:
  - chalice
  lexicon: BDAG
  rationale: '''Cup'' is the plain lexical sense and fits readable modern English.
    ''Chalice'' would import liturgical register not required by the Greek.'
- source_word: μετὰ τὸ δειπνῆσαι
  chosen: after supper
  alternatives:
  - after eating
  - after the meal
  lexicon: BDAG
  rationale: 'The articular infinitive with μετά indicates time: ''after eating/supper.''
    ''After supper'' is concise, natural, and contextually appropriate for the meal
    setting.'
- source_word: λέγων
  chosen: he took the cup, saying
  alternatives:
  - saying
  lexicon: BDAG
  rationale: The participle itself means 'saying,' but English idiom benefits from
    supplying the implied action from the parallel institution narrative. This is
    not paraphrastic expansion beyond the context; it makes the sentence complete
    in English while preserving the participial force.
- source_word: Τοῦτο τὸ ποτήριον
  chosen: This cup
  alternatives:
  - This cup here
  lexicon: BDAG
  rationale: Straightforward demonstrative construction. English does not require
    repeating the article.
- source_word: ἡ καινὴ διαθήκη
  chosen: the new covenant
  alternatives:
  - the new testament
  - the renewed covenant
  lexicon: BDAG
  rationale: διαθήκη in this context refers to covenantal arrangement, echoing Jeremiah
    31 and the Synoptic institution narratives. 'New covenant' is the standard and
    contextually strongest rendering; 'testament' would be misleading in contemporary
    English.
- source_word: ἐν τῷ ἐμῷ αἵματι
  chosen: in my blood
  alternatives:
  - by my blood
  - through my blood
  lexicon: BDAG
  rationale: A formally close rendering preserves the sacrificial/covenantal wording
    without over-interpreting the preposition. 'By/through my blood' are interpretive
    possibilities but less direct.
- source_word: τοῦτο ποιεῖτε
  chosen: Do this
  alternatives:
  - Keep doing this
  lexicon: BDAG
  rationale: Present imperative can imply repeated action, but the following clause
    'as often as you drink it' already supplies recurrence. 'Do this' is sufficient
    and idiomatic.
- source_word: ὁσάκις ἐὰν πίνητε
  chosen: as often as you drink it
  alternatives:
  - whenever you drink
  - as often as you may drink
  lexicon: BDAG
  rationale: 'This construction expresses repeated contingency: whenever/as often
    as. ''As often as you drink it'' preserves the iterative sense and reads naturally.
    ''It'' is supplied in English because the object is implicit from ''cup'' and
    expected in idiomatic English.'
- source_word: εἰς τὴν ἐμὴν ἀνάμνησιν
  chosen: in remembrance of me
  alternatives:
  - for my remembrance
  - as my memorial
  lexicon: BDAG
  rationale: 'This is the established and accurate sense of ἀνάμνησις here: an act
    done with memorial reference to Jesus. ''In remembrance of me'' is both natural
    and semantically faithful.'
