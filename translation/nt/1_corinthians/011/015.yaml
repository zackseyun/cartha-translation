theological_decisions:
- issue: Whether περιβόλαιον should be rendered specifically as 'veil' and thus identify
    the woman's hair itself as the mandated head covering in the passage.
  chosen_reading: Render the term generically as 'a covering' without resolving the
    broader interpretive debate in the translation itself.
  alternative_readings:
  - '''a veil'''
  - '''a wrap'''
  rationale: The Greek noun is broader than 'veil.' Translating it as 'a covering'
    preserves the lexical data and avoids importing a specific doctrinal or cultural
    conclusion about whether Paul means a cloth veil, a general head covering, or
    an analogy between natural hair and an additional covering. This follows the instruction
    to preserve theological tension rather than resolve it where the text itself does
    not force a narrower reading.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
