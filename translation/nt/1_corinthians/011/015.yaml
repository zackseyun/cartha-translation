id: 1CO.11.15
reference: 1 Corinthians 11:15
source:
  edition: SBLGNT
  text: γυνὴ δὲ ἐὰν κομᾷ, δόξα αὐτῇ ἐστιν; ὅτι ἡ κόμη ἀντὶ περιβολαίου ⸀δέδοται.
translation:
  text: But if a woman has long hair, it is her glory, because her hair has been given
    to her instead of a covering.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'as a covering.' The Greek preposition can express correspondence or
      substitution; the phrase does not by itself settle whether Paul means hair functions
      as the covering or is given in relation to one.
    reason: lexical_alternative
  - marker: b
    text: The Greek word can mean 'woman' or 'wife' depending on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: γυνή
  chosen: a woman
  alternatives:
  - a wife
  lexicon: BDAG
  rationale: γυνή can mean either 'woman' or 'wife' depending on context. In this
    verse the statement is presented as a general principle rather than explicitly
    about a particular husband-wife pair, so 'a woman' best fits the immediate wording
    while preserving the broader discussion context.
- source_word: κομᾷ
  chosen: has long hair
  alternatives:
  - wears her hair long
  - lets her hair grow
  lexicon: BDAG
  rationale: κομάω refers to wearing or having long hair, not merely possessing hair.
    'Has long hair' is idiomatic modern English and captures the stative sense in
    context.
- source_word: δόξα
  chosen: glory
  alternatives:
  - honor
  - splendor
  lexicon: BDAG
  rationale: δόξα here denotes that which brings honor or credit. 'Glory' preserves
    the lexical connection and rhetorical force of Paul's wording better than the
    flatter 'honor,' while remaining understandable.
- source_word: κόμη
  chosen: hair
  alternatives:
  - long hair
  - tresses
  lexicon: BDAG
  rationale: κόμη denotes the hair of the head, often with the nuance of grown/long
    hair. Since the preceding verb already expresses the long-hair idea, rendering
    κόμη simply as 'hair' avoids redundancy while preserving sense.
- source_word: ἀντί
  chosen: instead of
  alternatives:
  - for
  - in place of
  - as
  lexicon: BDAG
  rationale: 'ἀντί most naturally expresses substitution or correspondence. ''Instead
    of'' best reflects the preposition''s ordinary force here: the hair is given in
    the place of, or as a natural counterpart to, a covering.'
- source_word: περιβολαίου
  chosen: a covering
  alternatives:
  - a wrap
  - a veil
  lexicon: BDAG
  rationale: περιβόλαιον is a general term for something thrown around or used as
    a covering. 'A covering' is the broadest and most textually defensible rendering;
    'veil' is more specific than the Greek requires and could overstate the lexical
    claim.
- source_word: δέδοται
  chosen: has been given to her
  alternatives:
  - was given to her
  - is given to her
  lexicon: BDAG
  rationale: The perfect passive indicates a given state resulting from a completed
    action. 'Has been given to her' preserves both the passive voice and the resultant-state
    nuance in natural English.
