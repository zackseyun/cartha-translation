id: 1CO.11.5
reference: 1 Corinthians 11:5
source:
  edition: SBLGNT
  text: πᾶσα δὲ γυνὴ προσευχομένη ἢ προφητεύουσα ἀκατακαλύπτῳ τῇ κεφαλῇ καταισχύνει
    τὴν κεφαλὴν ⸀αὐτῆς, ἓν γάρ ἐστιν καὶ τὸ αὐτὸ τῇ ἐξυρημένῃ.
translation:
  text: But every woman who prays or prophesies with her head uncovered dishonors
    her head, for that is one and the same as having been shaved.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'every wife who prays or prophesies ... dishonors her husband/head.'
      The Greek word gynē can mean 'woman' or 'wife,' and 'head' may be understood
      literally or metaphorically from the surrounding context.
    reason: alternative_reading
  - marker: b
    text: '''Uncovered'' does not by itself specify the exact kind of covering; interpreters
      differ on whether Paul refers specifically to a veil or more generally to an
      uncovered head.'
    reason: lexical_alternative
lexical_decisions:
- source_word: γυνή
  chosen: woman
  alternatives:
  - wife
  lexicon: BDAG
  rationale: The noun can mean either 'woman' or 'wife' depending on context. In this
    verse the broader discussion may involve women in relation to men/husbands, but
    the immediate construction 'every woman who prays or prophesies' is most naturally
    generic rather than restricted to married women. 'Woman' best preserves the surface
    sense without over-specifying marital status; 'wife' is preserved as an alternative
    in a footnote-worthy decision.
- source_word: προσευχομένη ἢ προφητεύουσα
  chosen: who prays or prophesies
  alternatives:
  - while praying or prophesying
  lexicon: BDAG
  rationale: The present participles describe the woman engaged in these activities.
    A relative-clause rendering is natural English and preserves the ongoing/actional
    sense without awkwardness.
- source_word: ἀκατακαλύπτῳ τῇ κεφαλῇ
  chosen: with her head uncovered
  alternatives:
  - with uncovered head
  - having her head uncovered
  lexicon: BDAG
  rationale: 'The dative phrase is most naturally rendered as a circumstance/state:
    her head is uncovered. ''With her head uncovered'' is idiomatic English and preserves
    the concrete image without deciding beyond the text whether this refers to hair,
    a veil, or another covering.'
- source_word: καταισχύνει
  chosen: dishonors
  alternatives:
  - shames
  - disgraces
  lexicon: BDAG
  rationale: '''Dishonors'' communicates public shame/disgrace in readable modern
    English. ''Shames'' is possible, but ''dishonors'' better fits the social-honor
    context and avoids sounding merely emotional.'
- source_word: τὴν κεφαλὴν αὐτῆς
  chosen: her head
  alternatives:
  - her own head
  lexicon: BDAG
  rationale: The phrase is literally 'her head.' Because κεφαλή occurs twice in the
    verse, the second instance may refer either to her physical head or metaphorically
    to her relational 'head' in the argument's broader context. The translation keeps
    the literal wording 'her head' and preserves the ambiguity rather than resolving
    it.
- source_word: ἓν γάρ ἐστιν καὶ τὸ αὐτὸ
  chosen: for that is one and the same
  alternatives:
  - for it is the same thing
  - for it is one and the same thing
  lexicon: BDAG
  rationale: This idiom stresses equivalence. 'One and the same' is a natural English
    rendering that preserves the emphatic force.
- source_word: τῇ ἐξυρημένῃ
  chosen: as having been shaved
  alternatives:
  - as being shaved
  - as a woman whose head has been shaved
  lexicon: BDAG
  rationale: The perfect participle indicates a completed state resulting from shaving.
    'Having been shaved' preserves that resultant-state nuance better than a simple
    present expression.
