theological_decisions:
- issue: Meaning of the second 'head' (κεφαλή) in 'dishonors her head'
  chosen_reading: Retain the ambiguous wording 'her head' in the main text without
    specifying physical head or metaphorical head.
  alternative_readings:
  - physical head
  - metaphorical head, i.e., her husband/man in the argument's framework
  rationale: The immediate Greek wording allows the literal phrase while the surrounding
    context raises the metaphorical possibility. The translation philosophy requires
    preserving theological/interpre­tive tension rather than resolving it where the
    text itself does not force a single reading.
  doctrine_reference: Translation philosophy §3
- issue: Nature of the covering in 'uncovered'
  chosen_reading: Translate generically as 'uncovered' without specifying veil or
    hair.
  alternative_readings:
  - without a veil
  - with hair let down/uncovered
  rationale: The adjective states lack of covering but does not itself identify the
    precise material form. Specifying 'veil' in the main text would import an interpretive
    conclusion beyond the word's plain sense.
  doctrine_reference: Translation philosophy §1 and §3
