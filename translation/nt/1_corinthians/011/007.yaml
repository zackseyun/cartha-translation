theological_decisions:
- issue: Whether ἀνήρ/γυνή should be rendered as husband/wife or man/woman
  chosen_reading: man/woman
  alternative_readings:
  - husband/wife
  rationale: The immediate clause structure contrasts male and female in relation
    to head covering and creation theology ('image and glory of God ... glory of man'),
    which is broader than a narrowly marital instruction. Rendering 'man/woman' preserves
    the representative scope without importing a specifically marital limitation.
  doctrine_reference: Gender-accurate over gender-neutral; original-language primacy
    over translation tradition.
- issue: How to render Paul's asymmetrical theological statement without softening
    it
  chosen_reading: Retain 'the woman is the glory of man' in the main text
  alternative_readings:
  - the woman reflects man's glory
  - woman is man's honor
  rationale: The Greek states the claim directly with ἐστιν and δόξα. The translation
    should preserve the text's theological tension rather than soften or reinterpret
    it. Alternative phrasings can reduce the force or shift the meaning from 'glory'
    to a narrower concept such as 'honor.'
  doctrine_reference: Preserve theological tension rather than resolve it.
