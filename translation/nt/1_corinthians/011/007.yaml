id: 1CO.11.7
reference: 1 Corinthians 11:7
source:
  edition: SBLGNT
  text: ἀνὴρ μὲν γὰρ οὐκ ὀφείλει κατακαλύπτεσθαι τὴν κεφαλήν, εἰκὼν καὶ δόξα θεοῦ
    ὑπάρχων· ⸀ἡ γυνὴ δὲ δόξα ἀνδρός ἐστιν.
translation:
  text: For a man ought not to cover his head, since he is the image and glory of
    God; but the woman is the glory of man.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'husband' / 'wife' for 'man' / 'woman' throughout the verse; the Greek
      terms ἀνήρ and γυνή can bear either sense depending on context.
    reason: alternative_reading
  - marker: b
    text: Or 'to veil his head'; the Greek says more generally 'to cover his head.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνὴρ
  chosen: a man
  alternatives:
  - a husband
  - the man
  lexicon: BDAG
  rationale: Rendered 'a man' because in this context Paul is speaking in male/female
    terms within gathered worship, not narrowly of one husband in relation to one
    wife. The anarthrous noun is naturally generic here. The alternative 'husband'
    is possible lexically for ἀνήρ, but the broader argument in the immediate context
    supports 'man' as the representative male term.
- source_word: ὀφείλει
  chosen: ought
  alternatives:
  - is obligated
  - must
  lexicon: BDAG
  rationale: Rendered 'ought' to express moral/normative obligation in natural English
    without overstating the force to an absolute imperative. 'Must' is possible but
    can sound harsher than the Greek here.
- source_word: κατακαλύπτεσθαι τὴν κεφαλήν
  chosen: to cover his head
  alternatives:
  - to veil his head
  - to have his head covered
  lexicon: BDAG
  rationale: The infinitive with object is best rendered straightforwardly as 'to
    cover his head.' 'Veil' is more specific than the Greek requires, while 'have
    his head covered' is possible but less direct. This preserves the concrete imagery
    without deciding the exact form of covering beyond the text.
- source_word: εἰκὼν
  chosen: image
  lexicon: BDAG
  rationale: Standard rendering for εἰκών, especially in theological contexts echoing
    creation language. 'Image' preserves the likely allusion to Genesis without paraphrase.
- source_word: δόξα
  chosen: glory
  alternatives:
  - honor
  - splendor
  lexicon: BDAG
  rationale: Rendered 'glory' in both occurrences for consistency within the verse
    and because it best preserves the theological and relational weight of δόξα. 'Honor'
    captures one aspect but narrows the term.
- source_word: θεοῦ
  chosen: of God
  lexicon: BDAG
  rationale: Simple possessive genitive retained. This keeps the theological claim
    as stated without expansion.
- source_word: ὑπάρχων
  chosen: since he is
  alternatives:
  - being
  - as one who is
  lexicon: BDAG
  rationale: The participle gives the ground for the preceding statement. 'Since he
    is' makes the causal force clear in idiomatic English. A more formal 'being' is
    possible but less natural.
- source_word: ἡ γυνὴ
  chosen: the woman
  alternatives:
  - a woman
  - the wife
  lexicon: BDAG
  rationale: Rendered 'the woman' to mirror the generic-but-classed contrast with
    'a man' and to preserve the representative female category in Paul's argument.
    'Wife' is lexically possible for γυνή, but the verse presents a broader male/female
    contrast rather than only a marital one.
- source_word: ἀνδρός
  chosen: of man
  alternatives:
  - of a man
  - of her husband
  lexicon: BDAG
  rationale: Rendered 'of man' to match the generic representative sense of ἀνήρ in
    this verse and to preserve the parallelism with the first clause. 'Of her husband'
    would over-specify the relation beyond what the Greek explicitly marks here.
