- issue: Rendering Χριστοῦ
  chosen_reading: the Messiah
  alternative_readings:
  - Christ
  rationale: The translation follows the project's default of rendering Χριστός as
    'Messiah' where title sense is active. This verse presents Paul as imitating Jesus
    in his messianic role and example, not merely using 'Christ' as a proper-name
    element. The alternative traditional rendering is preserved in a footnote for
    reader familiarity.
