  source_review: state/reviews/gemini/nt/1_corinthians/011/001.json
  category: awkward_english
  tier: 1
  from: am of the Messiah
  to: imitate the Messiah
  rationale: The current rendering 'am of the Messiah' is an unnatural English construction resulting from a literal translation of the Greek ellipsis (κἀγὼ [μιμητὴς] Χριστοῦ). While the meaning is recoverable from the parallel structure, the phrase itself is awkward and could be misread (e.g., as 'belong to the Messiah'). Resolving the ellipsis by supplying the implied action as a verb ('imitate the Messiah') is more idiomatic and clearer for the English reader, while remaining faithful to the source's meaning.
