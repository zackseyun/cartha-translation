id: 1CO.11.13
reference: 1 Corinthians 11:13
source:
  edition: SBLGNT
  text: ἐν ὑμῖν αὐτοῖς κρίνατε· πρέπον ἐστὶν γυναῖκα ἀκατακάλυπτον τῷ θεῷ προσεύχεσθαι;
translation:
  text: 'Judge for yourselves: is it proper for a woman to pray to God with her head
    uncovered?'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a wife' if γυνή is taken in the marital sense within the broader context
      of this passage.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐν ὑμῖν αὐτοῖς
  chosen: for yourselves
  alternatives:
  - among yourselves
  - in yourselves
  lexicon: BDAG
  rationale: The phrase is idiomatic, intensifying the appeal to the Corinthians'
    own judgment. 'For yourselves' communicates the reflexive emphasis naturally in
    English better than a more wooden 'among yourselves' or 'in yourselves.'
- source_word: κρίνατε
  chosen: Judge
  alternatives:
  - decide
  - discern
  lexicon: BDAG
  rationale: An aorist imperative calling for evaluation. 'Judge' preserves the direct
    force of the command and fits Paul's rhetorical appeal.
- source_word: πρέπον ἐστὶν
  chosen: is it proper
  alternatives:
  - is it fitting
  - is it appropriate
  lexicon: BDAG
  rationale: The participial construction functions idiomatically to ask whether something
    is socially or morally fitting. 'Proper' is clear modern English and preserves
    the sense of decorum.
- source_word: γυναῖκα
  chosen: a woman
  alternatives:
  - a wife
  lexicon: BDAG
  rationale: γυνή can mean either 'woman' or 'wife.' In this verse the statement is
    framed generically rather than explicitly in relation to a husband, so 'a woman'
    is the better default. The marital nuance remains a plausible alternative in the
    broader passage and is preserved in a footnote.
- source_word: ἀκατακάλυπτον
  chosen: with her head uncovered
  alternatives:
  - uncovered
  - with uncovered head
  lexicon: BDAG
  rationale: The adjective literally means 'uncovered.' Because the immediate context
    concerns head covering, English idiom is clearer if the implied reference is made
    explicit as 'with her head uncovered' rather than leaving the adjective bare.
- source_word: τῷ θεῷ
  chosen: to God
  alternatives:
  - before God
  lexicon: BDAG
  rationale: The dative after προσεύχομαι commonly marks the one addressed in prayer.
    'To God' is the most straightforward rendering.
- source_word: προσεύχεσθαι
  chosen: to pray
  alternatives:
  - to offer prayer
  lexicon: BDAG
  rationale: 'Standard infinitive meaning ''to pray.'' The infinitive depends on the
    question of propriety: whether it is proper for a woman ''to pray'' in this manner.'
