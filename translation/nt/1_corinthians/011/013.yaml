theological_decisions:
- issue: Meaning of γυνή in the head-covering discussion
  chosen_reading: a woman
  alternative_readings:
  - a wife
  rationale: The verse itself does not explicitly mention a husband, and Paul's rhetorical
    question is framed in general terms about female propriety in prayer. To avoid
    importing a narrower marital reading not demanded by this verse alone, the main
    text uses 'a woman,' while preserving 'a wife' as a contextual alternative in
    a footnote.
  doctrine_reference: Translation philosophy §3, §4
