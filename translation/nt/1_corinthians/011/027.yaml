id: 1CO.11.27
reference: 1 Corinthians 11:27
source:
  edition: SBLGNT
  text: Ὥστε ὃς ἂν ἐσθίῃ τὸν ⸀ἄρτον ἢ πίνῃ τὸ ποτήριον τοῦ κυρίου ⸀ἀναξίως, ἔνοχος
    ἔσται τοῦ σώματος καὶ τοῦ αἵματος τοῦ κυρίου.
translation:
  text: Therefore, whoever eats the bread or drinks the cup of the Lord in an unworthy
    manner will be guilty concerning the body and blood of the Lord.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more traditionally, 'will be guilty of the body and blood of the Lord.'
      The Greek construction can be rendered more literally this way; 'concerning'
      is used in the main text to clarify the sense of liability with respect to the
      Lord's body and blood.
    reason: lexical_alternative
  - marker: b
    text: '''In an unworthy manner'' translates an adverb and describes how one eats
      or drinks, not the intrinsic worth of the person.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ὥστε
  chosen: Therefore
  alternatives:
  - So then
  - Therefore then
  lexicon: BDAG
  rationale: Marks an inferential conclusion from the preceding discussion about the
    Lord's Supper. 'Therefore' is natural English and preserves the logical force.
- source_word: ὃς ἂν
  chosen: whoever
  alternatives:
  - whoever it is that
  - anyone who
  lexicon: BDAG
  rationale: The relative pronoun with ἄν gives an indefinite/generalizing sense.
    'Whoever' captures the open conditional force idiomatically.
- source_word: ἐσθίῃ
  chosen: eats
  alternatives:
  - should eat
  lexicon: BDAG
  rationale: Present subjunctive in a general condition is well represented by simple
    present in English.
- source_word: τὸν ἄρτον
  chosen: the bread
  alternatives:
  - this bread
  lexicon: BDAG
  rationale: The article is retained naturally as 'the bread,' referring to the eucharistic
    bread under discussion. 'This bread' would add deixis not explicit in the Greek.
- source_word: ἢ
  chosen: or
  alternatives:
  - and/or
  lexicon: BDAG
  rationale: The Greek conjunction is disjunctive. It should not be harmonized to
    'and,' since Paul warns against either act done improperly.
- source_word: πίνῃ τὸ ποτήριον
  chosen: drinks the cup
  alternatives:
  - drinks from the cup
  lexicon: BDAG
  rationale: This is standard metonymic sacramental language in Greek and English.
    'Drinks the cup' is idiomatic and closer to the source than expanding to 'drinks
    from the cup.'
- source_word: τοῦ κυρίου
  chosen: of the Lord
  alternatives:
  - belonging to the Lord
  lexicon: BDAG
  rationale: Genitive of possession/association. 'Lord' follows the doctrinal default
    for κύριος.
- source_word: ἀναξίως
  chosen: in an unworthy manner
  alternatives:
  - unworthily
  - inappropriately
  lexicon: BDAG
  rationale: The adverb modifies the manner of eating/drinking, not the personal worthiness
    of the participant as such. 'In an unworthy manner' makes that syntactic force
    clear in contemporary English better than the archaic 'unworthily.'
- source_word: ἔνοχος ἔσται
  chosen: will be guilty
  alternatives:
  - will be liable
  - will answer for
  lexicon: BDAG
  rationale: Expresses culpability/liability. 'Will be guilty' is the most direct
    and widely understood rendering in this solemn context.
- source_word: τοῦ σώματος καὶ τοῦ αἵματος
  chosen: concerning the body and blood
  alternatives:
  - of the body and blood
  - answerable for the body and blood
  lexicon: BDAG
  rationale: With ἔνοχος, the genitive can indicate that with respect to which one
    is guilty/liable. 'Concerning' avoids over-specifying the exact legal nuance while
    preserving the gravity. The phrase refers to the Lord's body and blood in the
    sacramental context.
- source_word: τοῦ κυρίου
  chosen: of the Lord
  alternatives:
  - of the Messiah
  lexicon: BDAG
  rationale: κύριος is a title and the doctrinal default rendering is 'Lord.' Here
    it refers to Jesus in the supper context.
