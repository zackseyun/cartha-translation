theological_decisions:
- issue: Meaning of ἀναξίως in relation to communion
  chosen_reading: The verse condemns eating and drinking in an unworthy manner, not
    declaring that only personally worthy people may partake.
  alternative_readings:
  - The verse speaks of an unworthy person rather than an unworthy manner
  rationale: ἀναξίως is an adverb modifying the verbs 'eats' and 'drinks.' The translation
    should preserve Paul's focus on the manner of participation and not import later
    doctrinal formulations about personal worthiness beyond the grammar of the text.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather
    than resolve it) and §6 (readable modern English)
- issue: Force of ἢ between eating and drinking
  chosen_reading: The warning applies if either action is done improperly.
  alternative_readings:
  - The two actions should be read as a fixed pair, effectively 'and'
  rationale: The Greek text uses the disjunctive conjunction ἤ. The translation preserves
    the textual force rather than conforming it to liturgical expectation.
  doctrine_reference: Translation philosophy §1 (original-language primacy over translation
    tradition)
