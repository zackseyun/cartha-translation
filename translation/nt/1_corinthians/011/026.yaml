id: 1CO.11.26
reference: 1 Corinthians 11:26
source:
  edition: SBLGNT
  text: ὁσάκις γὰρ ⸀ἐὰν ἐσθίητε τὸν ἄρτον τοῦτον καὶ τὸ ⸀ποτήριον πίνητε, τὸν θάνατον
    τοῦ κυρίου καταγγέλλετε, ἄχρι ⸀οὗ ἔλθῃ.
translation:
  text: For as often as you eat this bread and drink the cup, you proclaim the Lord’s
    death until he comes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'whenever you eat this bread and drink the cup.'
    reason: lexical_alternative
  - marker: b
    text: Greek 'the cup,' not 'this cup' in this verse, though the immediate context
      identifies which cup is meant.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁσάκις ... ἐὰν
  chosen: as often as
  alternatives:
  - whenever
  lexicon: BDAG
  rationale: 'The combination expresses an indefinite repeated occurrence: each time
    the action happens. ''As often as'' preserves the iterative force and matches
    natural English in this liturgical context.'
- source_word: γὰρ
  chosen: for
  alternatives:
  - because
  lexicon: BDAG
  rationale: γάρ gives explanatory support for the preceding instruction. 'For' is
    the most direct and idiomatic connective here.
- source_word: ἐσθίητε
  chosen: you eat
  alternatives:
  - you may eat
  lexicon: BDAG
  rationale: 'Present subjunctive under ἐὰν in an indefinite temporal clause is best
    rendered in English with a simple present: ''as often as you eat.'''
- source_word: ἄρτον τοῦτον
  chosen: this bread
  alternatives:
  - this loaf
  lexicon: BDAG
  rationale: ἄρτος commonly means 'bread.' While 'loaf' is possible in some contexts,
    'bread' is the standard and sufficiently concrete rendering here, especially in
    Eucharistic context.
- source_word: ποτήριον
  chosen: the cup
  alternatives:
  - this cup
  lexicon: BDAG
  rationale: The Greek text here has the article with ποτήριον but not the demonstrative
    τοῦτο. 'The cup' reflects the source text more precisely than 'this cup,' while
    still clearly referring to the cup of the meal from the immediate context.
- source_word: καταγγέλλετε
  chosen: you proclaim
  alternatives:
  - you announce
  - you declare
  lexicon: BDAG
  rationale: καταγγέλλω means to proclaim or announce publicly. 'Proclaim' best preserves
    the formal, declarative sense appropriate to the Lord's Supper without over-paraphrasing.
- source_word: τὸν θάνατον τοῦ κυρίου
  chosen: the Lord’s death
  alternatives:
  - the death of the Lord
  lexicon: BDAG
  rationale: The genitive is naturally rendered as an English possessive. 'The Lord’s
    death' is concise and preserves the solemn emphasis of the phrase.
- source_word: κυρίου
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Per doctrine guidelines, κύριος defaults to 'Lord.' This also fits Pauline
    usage and the immediate context of Jesus' words over the meal.
- source_word: ἄχρι οὗ ἔλθῃ
  chosen: until he comes
  alternatives:
  - until he should come
  - until he may come
  lexicon: BDAG
  rationale: This clause marks the temporal limit of the proclamation. English idiom
    renders the aorist subjunctive simply as 'until he comes.' The subject is understood
    from context as the Lord.
