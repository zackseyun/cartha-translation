theological_decisions:
- issue: Referent of 'he' in ἄχρι οὗ ἔλθῃ
  chosen_reading: The implied subject is the Lord Jesus.
  rationale: The nearest and most natural antecedent is 'the Lord' in the preceding
    clause, and the phrase coheres with Pauline expectation of the Lord's return.
    This is not an imported doctrinal claim but the contextual referent of the Greek.
  doctrine_reference: Affirmations; Translation philosophy §1
- issue: Eucharistic/sacramental wording
  chosen_reading: Render the actions straightforwardly as eating bread, drinking the
    cup, and proclaiming the Lord's death, without importing a denominational explanation
    of the Supper.
  alternative_readings:
  - More sacramentalized paraphrase
  - Purely memorialist paraphrase
  rationale: The verse states what the act does—proclaims the Lord's death—without
    specifying a full sacramental theology. The translation preserves that theological
    tension rather than resolving it.
  doctrine_reference: Translation philosophy §3
