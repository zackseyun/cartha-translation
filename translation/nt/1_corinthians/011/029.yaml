id: 1CO.11.29
reference: 1 Corinthians 11:29
source:
  edition: SBLGNT
  text: ὁ γὰρ ἐσθίων καὶ ⸀πίνων κρίμα ἑαυτῷ ἐσθίει καὶ πίνει μὴ διακρίνων τὸ ⸀σῶμα.
translation:
  text: For the one who eats and drinks eats and drinks judgment on himself if he
    does not discern the body.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Some manuscripts read 'the Lord's body' instead of 'the body.'
    reason: textual_variant
  - marker: b
    text: Or 'distinguishing the body'; this may refer to recognizing the significance
      of the Lord's Supper, the gathered body of believers, or both.
    reason: alternative_reading
lexical_decisions:
- source_word: κρίμα
  chosen: judgment
  alternatives:
  - condemnation
  lexicon: BDAG
  rationale: κρίμα denotes a judicial verdict or judgment. 'Judgment' is broader and
    fits the immediate context, especially since the following verses describe temporal
    divine discipline rather than final condemnation. 'Condemnation' would overstate
    the term here.
- source_word: ἑαυτῷ
  chosen: on himself
  alternatives:
  - against himself
  - for himself
  lexicon: BDAG
  rationale: The dative reflexive indicates the judgment is incurred by the eater/drinker
    himself. 'On himself' is idiomatic in English and conveys adverse consequence
    clearly.
- source_word: διακρίνων
  chosen: discern
  alternatives:
  - distinguish
  - judge rightly
  - recognize
  lexicon: BDAG
  rationale: The participle carries the sense of making a proper distinction or evaluation.
    'Discern' preserves both cognitive and moral weight without over-interpreting
    the exact object of the distinction.
- source_word: τὸ σῶμα
  chosen: the body
  alternatives:
  - the Lord's body
  - the body of believers
  lexicon: BDAG
  rationale: The earliest recoverable text here reads simply 'the body,' not 'the
    Lord's body.' The phrase is intentionally retained in its concise form to preserve
    Paul's wording and the interpretive tension between reference to Christ's body
    in the meal and the gathered church as Christ's body in context.
- source_word: ὁ ... ἐσθίων καὶ πίνων
  chosen: the one who eats and drinks
  alternatives:
  - whoever eats and drinks
  lexicon: BDAG
  rationale: The substantival participle is naturally rendered as a generic singular.
    'The one who' is slightly more formal and tracks the Greek structure well while
    remaining readable.
- source_word: μὴ διακρίνων
  chosen: if he does not discern
  alternatives:
  - without discerning
  - not discerning
  lexicon: BDAG
  rationale: 'Rendering the participle with a conditional clause makes the logic explicit
    in natural English: the incurred judgment is tied to the failure to discern. This
    is an optimal-equivalence adjustment for clarity.'
