theological_decisions:
- issue: Meaning of 'the body' in the Lord's Supper context
  chosen_reading: Retain the ambiguous 'the body' in the main text without specifying
    whether Paul refers primarily to Christ's sacrificial body, the ecclesial body,
    or both.
  alternative_readings:
  - the Lord's body
  - the body of believers
  rationale: The Greek text says only 'the body.' Because the context includes both
    the supper's relation to Jesus and the Corinthians' mistreatment of one another,
    the translation should preserve the theological tension rather than resolve it.
    Supplying 'Lord's' in the main text would import wording from later textual tradition
    and narrow the sense.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Force of κρίμα
  chosen_reading: judgment rather than condemnation
  alternative_readings:
  - condemnation
  rationale: In context, Paul speaks of divine chastening so that believers may not
    be condemned with the world (v. 32). Therefore 'judgment' best reflects the term
    here without implying final damnation.
