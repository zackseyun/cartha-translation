id: 1CO.11.34
reference: 1 Corinthians 11:34
source:
  edition: SBLGNT
  text: ⸀εἴ τις πεινᾷ, ἐν οἴκῳ ἐσθιέτω, ἵνα μὴ εἰς κρίμα συνέρχησθε. Τὰ δὲ λοιπὰ ὡς
    ἂν ἔλθω διατάξομαι.
translation:
  text: If anyone is hungry, let him eat at home, so that you may not come together
    for judgment. And I will give directions about the rest when I come.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for condemnation.' The Greek κρίμα can mean 'judgment' or 'condemnation';
      here 'judgment' best fits the immediate context, where Paul speaks of the Lord's
      present discipline rather than final condemnation (vv. 29–32).
    reason: lexical_alternative
lexical_decisions:
- source_word: πεινᾷ
  chosen: is hungry
  alternatives:
  - hungers
  lexicon: BDAG
  rationale: Present indicative describing a current condition; 'is hungry' is idiomatic
    modern English, while 'hungers' is more formal and less natural here.
- source_word: ἐν οἴκῳ
  chosen: at home
  alternatives:
  - in the house
  - at his own house
  lexicon: BDAG
  rationale: The phrase refers to eating in one's domestic setting rather than at
    the church gathering. 'At home' is the most natural English equivalent.
- source_word: ἐσθιέτω
  chosen: let him eat
  alternatives:
  - he should eat
  lexicon: BDAG
  rationale: Third-person present imperative. 'Let him eat' preserves the imperative
    force in natural English.
- source_word: εἰς κρίμα
  chosen: for judgment
  alternatives:
  - into judgment
  - for condemnation
  lexicon: BDAG
  rationale: κρίμα can denote judgment or a judicial verdict. In this context Paul
    warns of divine disciplinary judgment connected with improper gathering. 'For
    judgment' preserves the seriousness without overstating it as final condemnation.
- source_word: συνέρχησθε
  chosen: you may not come together
  alternatives:
  - you may not assemble
  - you may not gather together
  lexicon: BDAG
  rationale: The verb is used repeatedly in this passage for the church's assembling.
    'Come together' preserves the verbal link with the surrounding context and is
    standard English.
- source_word: Τὰ δὲ λοιπὰ
  chosen: And ... about the rest
  alternatives:
  - Now the remaining matters
  - As for the other things
  lexicon: BDAG
  rationale: An idiomatic transition to remaining issues. 'About the rest' communicates
    that Paul is postponing further instructions.
- source_word: ὡς ἂν ἔλθω
  chosen: when I come
  alternatives:
  - whenever I come
  lexicon: BDAG
  rationale: The construction indicates an indefinite future time, but in context
    it refers to Paul's anticipated visit. 'When I come' is the most natural rendering.
- source_word: διατάξομαι
  chosen: I will give directions
  alternatives:
  - I will set in order
  - I will arrange
  - I will instruct
  lexicon: BDAG
  rationale: Future middle of διατάσσω, here meaning to arrange or prescribe what
    should be done. 'Give directions' is clear modern English and fits the practical
    context.
