theological_decisions:
- issue: Meaning of κρίμα in the warning about the Lord's Supper gathering
  chosen_reading: judgment understood as divine disciplinary judgment rather than
    explicitly final condemnation
  alternative_readings:
  - condemnation
  - judicial sentence in a broader sense
  rationale: The immediate context (vv. 29–32) distinguishes the Lord's present judgment/discipline
    from final condemnation with the world. Rendering κρίμα as 'judgment' preserves
    that distinction and avoids importing a stronger doctrinal claim than the text
    itself states.
  doctrine_reference: Preserve theological tension rather than resolve it; do not
    import doctrinal claims the text does not make.
- issue: Generic masculine τις with imperative
  chosen_reading: let him eat
  alternative_readings:
  - let that person eat
  - let them eat
  rationale: The Greek uses an indefinite singular τις with a third-person singular
    imperative. Following the gender-accurate policy, the English keeps the singular
    form rather than flattening it into plural or fully gender-neutral language.
  doctrine_reference: 'Translation philosophy §4: Gender-accurate over gender-neutral.'
