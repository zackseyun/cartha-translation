theological_decisions:
- issue: Rendering of παραδόσεις in an ecclesial context
  chosen_reading: traditions
  alternative_readings:
  - teachings
  - instructions
  rationale: The verse refers to apostolic material handed down to the Corinthians.
    Rendering it 'traditions' preserves the lexical link to transmission without importing
    later denominational claims about tradition. The text itself commends retention
    of what Paul delivered, and the translation should preserve that category rather
    than flatten it.
  doctrine_reference: Translation philosophy §§1, 5
