id: 1CO.11.2
reference: 1 Corinthians 11:2
source:
  edition: SBLGNT
  text: Ἐπαινῶ δὲ ⸀ὑμᾶς ὅτι πάντα μου μέμνησθε καὶ καθὼς παρέδωκα ὑμῖν τὰς παραδόσεις
    κατέχετε.
translation:
  text: Now I praise you because you remember me in everything and hold firmly to
    the traditions just as I delivered them to you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the teachings' or 'the instructions'; Greek 'the traditions,' that is,
      what was handed down.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐπαινῶ
  chosen: I praise
  alternatives:
  - I commend
  lexicon: BDAG
  rationale: The verb means to praise or commend. 'I praise' is the most direct rendering
    and fits the positive tone introducing this section.
- source_word: δὲ
  chosen: Now
  alternatives:
  - But
  - And
  lexicon: BDAG
  rationale: δέ here marks a mild transition rather than strong contrast. 'Now' signals
    discourse movement naturally in English.
- source_word: ὑμᾶς
  chosen: you
  lexicon: BDAG
  rationale: Direct object of Ἐπαινῶ; standard second-person plural sense is adequately
    conveyed by English 'you'.
- source_word: ὅτι
  chosen: because
  alternatives:
  - that
  lexicon: BDAG
  rationale: Introduces the reason for Paul's praise. 'Because' makes the causal force
    explicit in natural English.
- source_word: πάντα
  chosen: in everything
  alternatives:
  - all things
  - always
  lexicon: BDAG
  rationale: With μέμνησθε and μου, the sense is that in all respects they keep Paul
    in mind. 'In everything' is idiomatic and preserves the broad scope better than
    the wooden 'all things.'
- source_word: μου μέμνησθε
  chosen: you remember me
  alternatives:
  - you keep me in mind
  - you are mindful of me
  lexicon: BDAG
  rationale: The perfect/middle form of μιμνῄσκομαι conveys ongoing remembrance. 'You
    remember me' is clear and natural, while the ongoing sense is sufficiently carried
    by context.
- source_word: καὶ
  chosen: and
  lexicon: BDAG
  rationale: Simple coordination joining the two grounds for praise.
- source_word: καθὼς
  chosen: just as
  alternatives:
  - as
  lexicon: BDAG
  rationale: Marks correspondence between Paul's delivery and their retention. 'Just
    as' brings out the comparative force clearly.
- source_word: παρέδωκα
  chosen: I delivered
  alternatives:
  - I handed on
  - I passed on
  lexicon: BDAG
  rationale: παραδίδωμι in this context refers to transmitting authoritative teaching
    or practice. 'Delivered' preserves the formal sense and connects well with 'traditions.'
    'Passed on' is possible but slightly less weighty.
- source_word: τὰς παραδόσεις
  chosen: the traditions
  alternatives:
  - the teachings
  - the instructions
  lexicon: BDAG
  rationale: παράδοσις denotes what is handed down. 'Traditions' is the most lexically
    transparent rendering and preserves the technical sense of apostolic transmission
    without reducing it to generic teaching.
- source_word: κατέχετε
  chosen: hold firmly to
  alternatives:
  - hold fast to
  - maintain
  - keep
  lexicon: BDAG
  rationale: κατέχω here means to retain or adhere to. 'Hold firmly to' communicates
    active adherence in contemporary English better than the more idiomatic but slightly
    archaic 'hold fast.'
