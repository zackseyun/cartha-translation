id: 1CO.11.32
reference: 1 Corinthians 11:32
source:
  edition: SBLGNT
  text: κρινόμενοι δὲ ⸀ὑπὸ κυρίου παιδευόμεθα, ἵνα μὴ σὺν τῷ κόσμῳ κατακριθῶμεν.
translation:
  text: But when we are judged by the Lord, we are disciplined, so that we may not
    be condemned along with the world.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'being judged by the Lord, we are being disciplined.' The Greek uses
      present forms that can emphasize ongoing action.
    reason: lexical_alternative
lexical_decisions:
- source_word: κρινόμενοι
  chosen: when we are judged
  alternatives:
  - being judged
  - when we are being judged
  lexicon: BDAG
  rationale: 'The present passive participle is best taken temporally in context with
    δέ and the following finite verb: ''when we are judged.'' Rendering it as ''judged''
    preserves the judicial sense of κρίνω without over-specifying whether this is
    mere evaluation or punitive judgment; the following παιδευόμεθα clarifies that
    the judgment has a corrective function.'
- source_word: δὲ
  chosen: But
  alternatives:
  - Now
  - And
  lexicon: BDAG
  rationale: δέ marks a mild contrast with the previous verse's warning about eating
    and drinking judgment. 'But' clearly signals the contrast in English.
- source_word: ὑπὸ κυρίου
  chosen: by the Lord
  alternatives:
  - by the Lord Jesus
  - by the Master
  lexicon: BDAG
  rationale: ὑπό with the genitive marks agency. κύριος is rendered by the doctrinal
    default 'Lord.' The immediate context in 1 Corinthians 11 concerns the Lord's
    Supper, so 'the Lord' is sufficiently clear without expanding the text.
- source_word: παιδευόμεθα
  chosen: we are disciplined
  alternatives:
  - we are trained
  - we are corrected
  - we are chastened
  lexicon: BDAG
  rationale: παιδεύω can denote education, training, or disciplinary correction. In
    this context of divine corrective judgment, 'disciplined' best captures the remedial,
    not merely punitive, force. 'Chastened' is traditional but less natural in modern
    English.
- source_word: ἵνα μὴ
  chosen: so that ... not
  alternatives:
  - in order that ... not
  lexicon: BDAG
  rationale: This introduces purpose/result. 'So that ... not' is idiomatic modern
    English and preserves the clause's telic force.
- source_word: σὺν τῷ κόσμῳ
  chosen: along with the world
  alternatives:
  - with the world
  - together with the world
  lexicon: BDAG
  rationale: σύν denotes association. 'Along with' is natural English and preserves
    the sense of sharing the same fate. κόσμος here refers to the world-order in rebellion
    against God, represented collectively as 'the world.'
- source_word: κατακριθῶμεν
  chosen: we may not be condemned
  alternatives:
  - we may not be sentenced
  - we may not be condemned to judgment
  lexicon: BDAG
  rationale: κατακρίνω intensifies κρίνω and carries the sense of adverse judgment/condemnation.
    'Condemned' preserves the distinction from the earlier κρινόμενοι ('judged'),
    showing that the Lord's present disciplinary judgment aims to prevent final condemnation.
