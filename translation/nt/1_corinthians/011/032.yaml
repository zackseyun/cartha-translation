theological_decisions:
- issue: Relationship between present divine judgment and final condemnation
  chosen_reading: The verse distinguishes the Lord's present corrective discipline
    of believers from the world's final condemnation.
  alternative_readings:
  - The verse could be read more generally as temporal punishment without implying
    a believer/unbeliever distinction.
  rationale: The lexical contrast between κρινόμενοι and κατακριθῶμεν, together with
    παιδευόμεθα and the purpose clause ἵνα μὴ, indicates a distinction between remedial
    discipline now and eschatological condemnation avoided. The translation preserves
    this tension without importing a full doctrinal system about perseverance or sacramental
    efficacy.
  doctrine_reference: Preserve theological tension rather than resolve it.
