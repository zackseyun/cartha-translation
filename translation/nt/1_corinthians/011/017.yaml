id: 1CO.11.17
reference: 1 Corinthians 11:17
source:
  edition: SBLGNT
  text: Τοῦτο δὲ ⸂παραγγέλλων οὐκ ἐπαινῶ⸃ ὅτι οὐκ εἰς τὸ κρεῖσσον ἀλλὰ εἰς τὸ ἧσσον
    συνέρχεσθε.
translation:
  text: But in giving this instruction, I do not praise you, because you come together
    not for the better but for the worse.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in giving this command.' The Greek participle can carry the sense of
      giving an instruction, direction, or command.
    reason: lexical_alternative
lexical_decisions:
- source_word: Τοῦτο
  chosen: this
  alternatives:
  - this matter
  - this instruction
  lexicon: BDAG
  rationale: Neuter demonstrative referring forward to the instruction Paul is about
    to give. Rendered simply as 'this' and clarified by the participial phrase 'in
    giving this instruction.'
- source_word: δὲ
  chosen: But
  alternatives:
  - Now
  - And
  lexicon: BDAG
  rationale: Marks a transition with mild contrast from the preceding discussion.
    'But' best reflects the adversative turn into rebuke.
- source_word: παραγγέλλων
  chosen: in giving this instruction
  alternatives:
  - while instructing
  - as I command
  - in directing
  lexicon: BDAG
  rationale: Present active participle of παραγγέλλω, which can mean instruct, direct,
    command. Here it introduces Paul's directive in the assembly context. 'In giving
    this instruction' is natural English and preserves the authoritative but not overly
    harsh force.
- source_word: οὐκ ἐπαινῶ
  chosen: I do not praise you
  alternatives:
  - I do not commend you
  - I cannot praise you
  lexicon: BDAG
  rationale: ἐπαινέω means praise/commend. 'Praise' is straightforward and echoes
    the contrast with v. 2, where Paul had praised them.
- source_word: ὅτι
  chosen: because
  alternatives:
  - that
  lexicon: BDAG
  rationale: Introduces the reason for Paul's refusal to praise them. 'Because' makes
    the causal sense explicit in idiomatic English.
- source_word: οὐκ εἰς τὸ κρεῖσσον
  chosen: not for the better
  alternatives:
  - not for the improvement
  - not for the good
  lexicon: BDAG
  rationale: Idiomatic construction with εἰς + article + comparative adjective expressing
    result or purpose. 'For the better' is concise and idiomatic.
- source_word: ἀλλὰ εἰς τὸ ἧσσον
  chosen: but for the worse
  alternatives:
  - but for the inferior
  - but for the harm
  lexicon: BDAG
  rationale: Antithetical idiom paired with the previous phrase. 'For the worse' preserves
    the comparative contrast and natural English style.
- source_word: συνέρχεσθε
  chosen: you come together
  alternatives:
  - you assemble
  - you gather together
  lexicon: BDAG
  rationale: Middle/passive form used intransitively for assembling. 'Come together'
    is a standard and clear rendering in this context of church gathering.
