theological_decisions:
- issue: Tone and authority of παραγγέλλων
  chosen_reading: instruction
  alternative_readings:
  - command
  - charge
  rationale: The verb can carry stronger authoritative force, but in this context
    Paul is transitioning into corrective apostolic direction regarding gathered worship.
    'Instruction' preserves authority without overstating the tone in English. No
    doctrinal issue is altered by this choice.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve source
    sense without importing extra force.'
