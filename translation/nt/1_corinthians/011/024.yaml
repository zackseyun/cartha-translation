id: 1CO.11.24
reference: 1 Corinthians 11:24
source:
  edition: SBLGNT
  text: καὶ εὐχαριστήσας ἔκλασεν καὶ ⸀εἶπεν· Τοῦτό μού ἐστιν τὸ σῶμα τὸ ὑπὲρ ⸀ὑμῶν·
    τοῦτο ποιεῖτε εἰς τὴν ἐμὴν ἀνάμνησιν.
translation:
  text: And after giving thanks, he broke it and said, “This is my body, which is
    for you. Do this in remembrance of me.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'which is on your behalf' or 'which is for your sake.'
    reason: lexical_alternative
  - marker: b
    text: 'Some manuscripts add ''broken'' after ''for you'': ''This is my body, which
      is broken for you.'''
    reason: textual_variant
lexical_decisions:
- source_word: εὐχαριστήσας
  chosen: after giving thanks
  alternatives:
  - having given thanks
  - when he had given thanks
  lexicon: BDAG
  rationale: Aorist participle preceding the main verb; 'after giving thanks' is natural
    modern English and preserves the temporal/sequential sense without unnecessary
    stiffness.
- source_word: ἔκλασεν
  chosen: he broke it
  alternatives:
  - he broke
  lexicon: BDAG
  rationale: The verb means 'broke'; English idiom supplies the object from context
    (the bread), making the action clear for readers.
- source_word: Τοῦτό μού ἐστιν τὸ σῶμα
  chosen: This is my body
  alternatives:
  - This is the body of me
  - This means my body
  lexicon: BDAG
  rationale: The straightforward copular construction is best rendered directly. 'Means'
    would import an interpretive paraphrase not demanded by the Greek.
- source_word: τὸ ὑπὲρ ὑμῶν
  chosen: which is for you
  alternatives:
  - which is on your behalf
  - which is for your sake
  lexicon: BDAG
  rationale: ὑπέρ with genitive commonly conveys representation or benefit ('for,
    on behalf of'). 'For you' is concise and preserves the sacrificial/benefactive
    force without over-specifying a doctrinal theory of atonement.
- source_word: τοῦτο ποιεῖτε
  chosen: Do this
  alternatives:
  - Keep doing this
  lexicon: BDAG
  rationale: Present imperative can imply customary repetition, but in English 'Do
    this' naturally functions as an ongoing liturgical instruction in context. 'Keep
    doing this' is possible but slightly more interpretive.
- source_word: εἰς τὴν ἐμὴν ἀνάμνησιν
  chosen: in remembrance of me
  alternatives:
  - for my remembrance
  - as my memorial
  lexicon: BDAG
  rationale: This is the most natural English rendering of the memorial sense of ἀνάμνησις
    in this context. 'As my memorial' is possible but less idiomatic.
