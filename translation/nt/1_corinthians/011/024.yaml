theological_decisions:
- issue: Meaning of 'This is my body' in Eucharistic context
  chosen_reading: Rendered the clause literally as 'This is my body' without interpretive
    qualification.
  alternative_readings:
  - sacramental realism
  - symbolic/memorial emphasis via 'This represents my body'
  rationale: The translation preserves the wording of the Greek and does not resolve
    later doctrinal debates about the mode of Christ's presence. This follows the
    instruction to preserve theological tension rather than resolve it where the text
    itself does not specify more.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it.'
- issue: Force of ὑπὲρ ὑμῶν
  chosen_reading: Benefactive/representative 'for you'
  alternative_readings:
  - on your behalf
  - for your sake
  rationale: The phrase clearly indicates action directed toward the recipients' benefit,
    but the translation avoids importing a more technical atonement formulation than
    the Greek itself states.
  doctrine_reference: 'DOCTRINE.md: Do not import doctrinal claims the text does not
    make.'
