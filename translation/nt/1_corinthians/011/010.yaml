theological_decisions:
- issue: Meaning of ἐξουσίαν ἔχειν ἐπὶ τῆς κεφαλῆς
  chosen_reading: Retain the text's wording as 'have authority on her head' rather
    than interpretively expanding it to 'wear a sign of authority.'
  alternative_readings:
  - wear a sign of authority on her head
  - have a head covering as a sign of authority
  rationale: The Greek does not include words for 'sign' or 'covering.' Because the
    phrase is debated, the translation preserves the lexical form in the main text
    and records the common interpretive expansion in a footnote, in keeping with the
    principle of preserving tension rather than resolving it beyond the text.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Referent of ἀγγέλους
  chosen_reading: angels
  alternative_readings:
  - messengers
  rationale: While ἄγγελος can mean either 'angel' or 'messenger,' the unqualified
    plural in Pauline usage normally refers to heavenly beings. The translation keeps
    the standard sense without importing a specific theory about why angels are mentioned.
  doctrine_reference: Translation philosophy §3
- issue: Scope of γυνή
  chosen_reading: woman
  alternative_readings:
  - wife
  rationale: The verse participates in a broader man/woman discussion, and the generic
    singular is best preserved as 'the woman.' This avoids narrowing the statement
    to marriage where the Greek here does not require it.
  doctrine_reference: Translation philosophy §4
