id: 1CO.11.10
reference: 1 Corinthians 11:10
source:
  edition: SBLGNT
  text: διὰ τοῦτο ὀφείλει ἡ γυνὴ ἐξουσίαν ἔχειν ἐπὶ τῆς κεφαλῆς διὰ τοὺς ἀγγέλους.
translation:
  text: For this reason the woman ought to have authority on her head, because of
    the angels.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more interpretively, 'ought to wear a sign of authority on her head.'
      The Greek text says 'authority' and does not explicitly include 'sign' or 'covering.'
    reason: alternative_reading
  - marker: b
    text: Or 'because of the messengers,' though 'angels' is the more likely sense
      here.
    reason: lexical_alternative
lexical_decisions:
- source_word: διὰ τοῦτο
  chosen: For this reason
  alternatives:
  - Because of this
  - Therefore
  lexicon: BDAG
  rationale: A natural causal-consequential connector in English that preserves Paul's
    inferential force from the preceding argument.
- source_word: ὀφείλει
  chosen: ought to
  alternatives:
  - must
  - is obligated to
  lexicon: BDAG
  rationale: Conveys moral or fitting obligation without overstating the force as
    an absolute legal command. It fits Paul's argumentative style here.
- source_word: ἡ γυνὴ
  chosen: the woman
  alternatives:
  - a woman
  - the wife
  lexicon: BDAG
  rationale: The article supports a generic-singular sense. In this context Paul has
    been speaking of man/woman in a representative way, so 'the woman' best preserves
    the Greek form. 'Wife' is possible in some contexts for γυνή, but the immediate
    discourse is broader than a single marital pair.
- source_word: ἐξουσίαν
  chosen: authority
  alternatives:
  - a sign of authority
  - a covering
  - freedom/right
  lexicon: BDAG
  rationale: The Greek text says 'authority,' not explicitly 'a sign of authority.'
    The traditional expansion likely reflects interpretation from context rather than
    the lexical content of ἐξουσία. To follow original-language primacy, the main
    text keeps the more literal term, while interpretive alternatives are preserved
    in a footnote.
- source_word: ἔχειν
  chosen: to have
  alternatives:
  - to wear
  - to bear
  lexicon: BDAG
  rationale: The infinitive straightforwardly means 'to have.' Renderings like 'to
    wear' import the idea of a head covering from context rather than from this verb
    itself.
- source_word: ἐπὶ τῆς κεφαλῆς
  chosen: on her head
  alternatives:
  - over her head
  - upon her head
  lexicon: BDAG
  rationale: This is the most natural English rendering of the prepositional phrase
    and leaves the exact nuance spatially broad, as in the Greek.
- source_word: διὰ τοὺς ἀγγέλους
  chosen: because of the angels
  alternatives:
  - for the sake of the angels
  - on account of the messengers
  lexicon: BDAG
  rationale: διά with the accusative commonly expresses reason or cause. 'Angels'
    is the normal sense of ἄγγελοι here; 'messengers' is lexically possible but contextually
    less likely in this difficult phrase.
