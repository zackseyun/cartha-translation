id: 1CO.11.22
reference: 1 Corinthians 11:22
source:
  edition: SBLGNT
  text: μὴ γὰρ οἰκίας οὐκ ἔχετε εἰς τὸ ἐσθίειν καὶ πίνειν; ἢ τῆς ἐκκλησίας τοῦ θεοῦ
    καταφρονεῖτε, καὶ καταισχύνετε τοὺς μὴ ἔχοντας; τί ⸂εἴπω ὑμῖν⸃; ἐπαινέσω ὑμᾶς;
    ἐν τούτῳ οὐκ ἐπαινῶ.
translation:
  text: For do you not have houses for eating and drinking? Or do you despise the
    church of God and shame those who have nothing? What should I say to you? Should
    I praise you? In this I do not praise you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the poor' or 'those who have no food'; Greek literally, 'those not having.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οἰκίας
  chosen: houses
  alternatives:
  - homes
  lexicon: BDAG
  rationale: Plural noun referring to private domestic spaces in contrast to the gathered
    church. 'Houses' is slightly more formal/literal and preserves the contrast with
    'the church of God.'
- source_word: εἰς τὸ ἐσθίειν καὶ πίνειν
  chosen: for eating and drinking
  alternatives:
  - to eat and drink
  lexicon: BDAG
  rationale: The preposition with articular infinitives expresses purpose. 'For eating
    and drinking' is natural English while preserving the purposive force.
- source_word: ἐκκλησίας τοῦ θεοῦ
  chosen: the church of God
  alternatives:
  - God's assembly
  lexicon: BDAG
  rationale: Standard Pauline usage for the gathered people/community belonging to
    God. 'Church' is the clearest established rendering in this context and does not
    over-specify institutionally.
- source_word: καταφρονεῖτε
  chosen: despise
  alternatives:
  - look down on
  - treat with contempt
  lexicon: BDAG
  rationale: The verb carries the sense of treating something as of little account.
    'Despise' best preserves the moral sharpness of Paul's rebuke.
- source_word: καταισχύνετε
  chosen: shame
  alternatives:
  - humiliate
  - disgrace
  lexicon: BDAG
  rationale: The verb denotes causing shame. 'Shame' is concise and direct; 'humiliate'
    is possible but slightly more interpretive.
- source_word: τοὺς μὴ ἔχοντας
  chosen: those who have nothing
  alternatives:
  - those who do not have
  - the poor
  lexicon: BDAG
  rationale: Literally 'those not having.' In context it refers to members lacking
    food/resources, but 'those who have nothing' preserves the Greek expression without
    narrowing it to a socioeconomic label beyond the text.
- source_word: τί εἴπω ὑμῖν;
  chosen: What should I say to you?
  alternatives:
  - What am I to say to you?
  - What shall I say to you?
  lexicon: BDAG
  rationale: The deliberative aorist subjunctive expresses rhetorical perplexity.
    'What should I say to you?' is idiomatic modern English and preserves the force.
- source_word: ἐπαινέσω ὑμᾶς;
  chosen: Should I praise you?
  alternatives:
  - Am I to praise you?
  - Shall I praise you?
  lexicon: BDAG
  rationale: Another deliberative rhetorical question. 'Should I praise you?' communicates
    the irony and expected negative answer clearly.
- source_word: ἐν τούτῳ
  chosen: In this
  alternatives:
  - In this matter
  - For this
  lexicon: BDAG
  rationale: The phrase points to the matter under discussion. 'In this' is sufficiently
    literal and readable; the broader referent is clear from context.
- source_word: οὐκ ἐπαινῶ
  chosen: I do not praise you
  alternatives:
  - I do not commend you
  lexicon: BDAG
  rationale: Using 'praise' maintains lexical consistency with the preceding ἐπαινέσω.
    'Commend' is possible, but repeating 'praise' better reflects Paul's rhetorical
    repetition.
