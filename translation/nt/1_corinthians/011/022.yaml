theological_decisions:
- issue: Referent of 'those who have nothing' in the Lord's Supper context
  chosen_reading: Rendered generically as 'those who have nothing' rather than explicitly
    'the poor' in the main text.
  alternative_readings:
  - the poor
  - those who have no food
  rationale: The immediate context strongly suggests materially disadvantaged believers,
    but the Greek expression itself is broader and literally means 'those not having.'
    The translation preserves the textual wording and lets the context supply the
    socioeconomic implication without importing a narrower label into the main text.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; preserve theological tension rather than resolve it.'
