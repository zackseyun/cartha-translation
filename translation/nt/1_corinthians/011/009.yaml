id: 1CO.11.9
reference: 1 Corinthians 11:9
source:
  edition: SBLGNT
  text: καὶ γὰρ οὐκ ἐκτίσθη ἀνὴρ διὰ τὴν γυναῖκα, ἀλλὰ γυνὴ διὰ τὸν ἄνδρα.
translation:
  text: For indeed, man was not created for the woman, but woman for the man.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'because of the woman' / 'because of the man.' The Greek preposition
      can indicate cause or purpose; here it is rendered 'for' to reflect the creation-oriented
      argument.
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ γὰρ
  chosen: For indeed
  alternatives:
  - For
  - Indeed
  - For also
  lexicon: BDAG
  rationale: The combination is explanatory and emphatic, linking this verse to the
    preceding argument. 'For indeed' preserves both the inferential force of γάρ and
    the slight emphasis of καί without sounding overly wooden.
- source_word: οὐκ
  chosen: not
  lexicon: BDAG
  rationale: Standard negation; directly negates the passive verb.
- source_word: ἐκτίσθη
  chosen: was created
  alternatives:
  - was formed
  lexicon: BDAG
  rationale: κτίζω ordinarily means 'create.' 'Was created' is the most direct rendering
    and fits Paul's appeal to the creation order in Genesis. 'Was formed' could echo
    Genesis idiom in English, but it is less precise to the Greek verb here.
- source_word: ἀνὴρ
  chosen: man
  alternatives:
  - a man
  - husband
  lexicon: BDAG
  rationale: In this context Paul is speaking generically from the Genesis creation
    narrative, not about one particular husband. 'Man' best preserves the representative/generic
    masculine sense and aligns with the doctrine's gender-accurate principle.
- source_word: διὰ τὴν γυναῖκα
  chosen: for the woman
  alternatives:
  - because of the woman
  - for the sake of the woman
  lexicon: BDAG
  rationale: With διά + accusative, the phrase can express reason, purpose, or benefit.
    In this creation-context argument, 'for' best captures intended purpose/benefit
    without over-specifying. 'Because of' would suggest causal occasion more than
    teleological orientation.
- source_word: ἀλλὰ
  chosen: but
  alternatives:
  - rather
  lexicon: BDAG
  rationale: Simple adversative contrast between the two clauses.
- source_word: γυνὴ
  chosen: woman
  alternatives:
  - a woman
  - wife
  lexicon: BDAG
  rationale: As with ἀνήρ, the term is generic and rooted in the Genesis account.
    'Woman' is preferable to 'wife' because the statement concerns creation, not merely
    marriage.
- source_word: διὰ τὸν ἄνδρα
  chosen: for the man
  alternatives:
  - because of the man
  - for the sake of the man
  lexicon: BDAG
  rationale: Parallel to the earlier διά phrase; 'for the man' preserves the teleological
    contrast and keeps the English balanced and readable.
