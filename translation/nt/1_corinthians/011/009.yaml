theological_decisions:
- issue: Whether ἀνήρ/γυνή should be rendered as 'man/woman' or 'husband/wife'
  chosen_reading: man/woman
  alternative_readings:
  - husband/wife
  rationale: Although ἀνήρ and γυνή can mean 'husband' and 'wife' in some contexts,
    here Paul grounds his statement in the creation account ('created'), indicating
    a broader male/female reference rather than a narrower marital one. Rendering
    'man/woman' preserves the creational scope of the argument without importing a
    specifically marital limitation.
  doctrine_reference: Translation philosophy §4 (Gender-accurate over gender-neutral)
