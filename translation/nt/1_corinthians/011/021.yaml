theological_decisions:
- issue: Gendered distributive singular reference
  chosen_reading: his own supper
  alternative_readings:
  - their own supper
  - their own meal
  rationale: The Greek uses singular masculine forms with distributive force. Per
    the translation philosophy's gender-accurate guideline, the draft preserves the
    singular masculine reference rather than flattening it to plural 'their.'
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Nature of the abuse at the Lord's Supper
  chosen_reading: gets drunk
  alternative_readings:
  - is drunk
  rationale: The text plainly depicts actual intoxication among some participants
    and should not be softened into mere overindulgence. This is a lexical-contextual
    decision, not an imported doctrinal claim.
