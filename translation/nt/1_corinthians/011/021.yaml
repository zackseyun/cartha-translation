id: 1CO.11.21
reference: 1 Corinthians 11:21
source:
  edition: SBLGNT
  text: ἕκαστος γὰρ τὸ ἴδιον δεῖπνον προλαμβάνει ἐν τῷ φαγεῖν, καὶ ὃς μὲν πεινᾷ, ὃς
    δὲ μεθύει.
translation:
  text: For each one goes ahead with his own supper when it is time to eat, and one
    is hungry while another gets drunk.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'takes his own meal before others'; the Greek verb can emphasize taking
      something beforehand or going ahead without waiting for others.
    reason: lexical_alternative
  - marker: b
    text: Or 'one goes hungry, another is drunk.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἕκαστος
  chosen: each one
  alternatives:
  - everyone
  - each person
  lexicon: BDAG
  rationale: Indefinite distributive singular; 'each one' preserves the individualizing
    force better than the more collective 'everyone.'
- source_word: γὰρ
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: BDAG
  rationale: Connects this verse as an explanation of the rebuke in the previous context;
    'for' is the most natural English discourse marker here.
- source_word: τὸ ἴδιον δεῖπνον
  chosen: his own supper
  alternatives:
  - their own meal
  - his own meal
  lexicon: BDAG
  rationale: δεῖπνον denotes a meal/supper, and ἴδιον stresses private possession
    in contrast to the shared Lord's Supper context. 'Supper' preserves the likely
    evening-meal sense and echoes the surrounding discussion. The singular masculine
    distributive sense of ἕκαστος is reflected by 'his,' consistent with the project's
    gender-accurate policy.
- source_word: προλαμβάνει
  chosen: goes ahead with
  alternatives:
  - takes before others
  - eats ahead of others
  - takes first
  lexicon: BDAG
  rationale: The verb can mean to take beforehand or go on ahead. In context Paul
    rebukes people for proceeding with their own meal before/without regard for others.
    'Goes ahead with' captures both temporal priority and selfish initiative in idiomatic
    English without over-specifying the object.
- source_word: ἐν τῷ φαγεῖν
  chosen: when it is time to eat
  alternatives:
  - in eating
  - while eating
  - at the meal
  lexicon: BDAG
  rationale: The articular infinitive with ἐν is temporal here. A more literal 'in
    eating' is awkward in English; 'when it is time to eat' communicates the temporal
    sense clearly and naturally.
- source_word: ὃς μὲν ... ὃς δὲ
  chosen: one ... another
  alternatives:
  - one person ... another person
  - one ... the other
  lexicon: BDAG
  rationale: This correlative construction contrasts different outcomes among participants.
    'One ... another' is concise and idiomatic.
- source_word: πεινᾷ
  chosen: is hungry
  alternatives:
  - goes hungry
  - hungers
  lexicon: BDAG
  rationale: Present tense describes the resulting condition. 'Is hungry' is straightforward;
    'goes hungry' is possible but slightly more interpretive.
- source_word: μεθύει
  chosen: gets drunk
  alternatives:
  - is drunk
  - becomes drunk
  lexicon: BDAG
  rationale: The verb commonly means to be/become intoxicated. 'Gets drunk' best conveys
    the force in contemporary English and the scandalous excess Paul condemns.
