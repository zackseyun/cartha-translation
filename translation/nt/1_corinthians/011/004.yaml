id: 1CO.11.4
reference: 1 Corinthians 11:4
source:
  edition: SBLGNT
  text: πᾶς ἀνὴρ προσευχόμενος ἢ προφητεύων κατὰ κεφαλῆς ἔχων καταισχύνει τὴν κεφαλὴν
    αὐτοῦ·
translation:
  text: Every man who prays or prophesies with something on his head dishonors his
    head.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more traditionally, 'with his head covered.' The Greek literally says
      'having something on/down from the head' and does not specify the exact covering.
    reason: lexical_alternative
  - marker: b
    text: '''His head'' may refer to his own head literally, while also echoing the
      relational use of ''head'' in the surrounding context.'
    reason: alternative_reading
lexical_decisions:
- source_word: πᾶς ἀνὴρ
  chosen: Every man
  alternatives:
  - Every husband
  - Any man
  lexicon: BDAG
  rationale: ἀνήρ can mean either 'man' or 'husband' depending on context. In this
    immediate verse, the statement is framed generically ('every man') and pairs with
    v.5's 'every woman'; the broader passage may involve husband/wife implications,
    but here the generic male reference is the least interpretively loaded main-text
    rendering. This also follows the gender-accurate principle rather than neutralizing
    the masculine.
- source_word: προσευχόμενος
  chosen: who prays
  alternatives:
  - while praying
  lexicon: BDAG
  rationale: The present middle participle describes the man engaged in prayer. English
    relative-clause style ('who prays') is natural and preserves the ongoing/characterizing
    sense without awkwardness.
- source_word: προφητεύων
  chosen: or prophesies
  alternatives:
  - or while prophesying
  lexicon: BDAG
  rationale: The participle is coordinated with προσευχόμενος and refers to speaking
    prophetically. 'Prophesies' is the standard transparent rendering and avoids paraphrase.
- source_word: κατὰ κεφαλῆς ἔχων
  chosen: with something on his head
  alternatives:
  - having his head covered
  - with his head covered
  lexicon: BDAG
  rationale: The Greek expression is somewhat idiomatic and literally means 'having
    [something] down from/on the head.' It does not explicitly name a veil or covering
    object. 'With something on his head' preserves the sense of a head covering without
    over-specifying the exact item, while remaining readable. The more traditional
    'having his head covered' is a plausible interpretive equivalent and is preserved
    in a footnote because the Greek wording is less explicit than that English idiom
    suggests.
- source_word: καταισχύνει
  chosen: dishonors
  alternatives:
  - shames
  - disgraces
  lexicon: BDAG
  rationale: The verb denotes bringing shame or dishonor. 'Dishonors' fits modern
    English well and works with the honor/shame dynamics of the passage; 'shames'
    is possible but slightly harsher and less idiomatic with the object 'his head'
    in English.
- source_word: τὴν κεφαλὴν αὐτοῦ
  chosen: his head
  alternatives:
  - his own head
  lexicon: BDAG
  rationale: κεφαλή here may refer literally to the man's physical head and, by contextual
    extension in the passage, possibly to his metaphorical 'head' as discussed in
    v.3. The translation preserves the lexical ambiguity by rendering simply 'his
    head' rather than resolving it interpretively.
