theological_decisions:
- issue: Whether κεφαλή in the final clause should be interpreted explicitly as literal
    head or metaphorical authority/headship
  chosen_reading: Retain the ambiguity with 'his head'
  alternative_readings:
  - his physical head
  - the one who is his head
  rationale: Paul's wording allows a rhetorical overlap between the literal head and
    the relational/theological use of 'head' in the surrounding context. The translation
    should preserve this tension rather than resolve it in the main text.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
