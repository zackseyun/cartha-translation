id: 1CO.11.30
reference: 1 Corinthians 11:30
source:
  edition: SBLGNT
  text: διὰ τοῦτο ἐν ὑμῖν πολλοὶ ἀσθενεῖς καὶ ἄρρωστοι καὶ κοιμῶνται ἱκανοί.
translation:
  text: For this reason many among you are weak and sick, and a good number have fallen
    asleep.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more explicitly, 'have died.' Paul likely uses 'fallen asleep' as a
      customary Christian metaphor for death.
    reason: lexical_alternative
lexical_decisions:
- source_word: διὰ τοῦτο
  chosen: For this reason
  alternatives:
  - Because of this
  - Therefore
  lexicon: BDAG
  rationale: Causal expression pointing back to the preceding abuse of the Lord's
    Supper. 'For this reason' is natural English and preserves the explicit causal
    force better than the more inferential 'therefore.'
- source_word: ἐν ὑμῖν
  chosen: among you
  alternatives:
  - in you
  - among yourselves
  lexicon: BDAG
  rationale: In context Paul refers to conditions present within the Corinthian community,
    not an internal physical state. 'Among you' best conveys communal location in
    idiomatic English.
- source_word: πολλοὶ
  chosen: many
  alternatives:
  - many people
  - many ones
  lexicon: BDAG
  rationale: Straightforward quantitative adjective used substantivally. 'Many' is
    the natural concise rendering.
- source_word: ἀσθενεῖς
  chosen: weak
  alternatives:
  - feeble
  - ill
  lexicon: BDAG
  rationale: The term can denote weakness broadly, including bodily weakness. Here,
    paired with ἄρρωστοι, it likely refers to a lesser stage of physical debility.
    'Weak' preserves the lexical distinction from the stronger term that follows.
- source_word: ἄρρωστοι
  chosen: sick
  alternatives:
  - ill
  - infirm
  lexicon: BDAG
  rationale: This term commonly denotes sickness or illness. Rendering it as 'sick'
    maintains a clear distinction from ἀσθενεῖς ('weak') while using accessible modern
    English.
- source_word: κοιμῶνται
  chosen: have fallen asleep
  alternatives:
  - are asleep
  - have died
  lexicon: BDAG
  rationale: In early Christian usage κοιμάομαι can function as a reverent metaphor
    for death. Here that sense fits the escalating sequence weak → sick → dead. 'Have
    fallen asleep' preserves Paul's metaphor in the main text without flattening it
    to 'have died.'
- source_word: ἱκανοί
  chosen: a good number
  alternatives:
  - many
  - quite a few
  - enough
  lexicon: BDAG
  rationale: ἱκανοί here means a considerable number. 'A good number' is idiomatic
    modern English and avoids repeating 'many' too mechanically while preserving the
    sense of substantial quantity.
