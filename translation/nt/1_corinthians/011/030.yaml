theological_decisions:
- issue: Whether κοιμῶνται should be rendered literally as sleep or interpreted as
    death
  chosen_reading: Metaphorical reference to death, preserved as 'have fallen asleep'
    in the main text
  alternative_readings:
  - are asleep literally
  - have died
  rationale: The immediate context concerns divine judgment on the Corinthian assembly,
    and the sequence from weakness to sickness to sleep strongly indicates death as
    a euphemistic metaphor. Preserving 'fallen asleep' maintains the source metaphor
    and theological tone without over-interpreting beyond what Paul says.
  doctrine_reference: Preserve theological tension rather than resolve it; optimal
    equivalence
