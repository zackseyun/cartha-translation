theological_decisions:
- issue: Generic masculine language in an instruction about participation in the Lord's
    Supper
  chosen_reading: Render ἄνθρωπος as 'a man' in the main text, with an inclusive alternative
    preserved in a footnote.
  alternative_readings:
  - a person
  - someone
  rationale: The Greek uses a masculine singular noun with representative force. The
    translation philosophy directs gender-accurate rendering over gender-neutral smoothing,
    while allowing annotation where inclusivity is contextually relevant. The instruction
    plainly applies to all participants, not only males, so the footnote preserves
    that scope without altering the source-shaped wording of the main text.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
