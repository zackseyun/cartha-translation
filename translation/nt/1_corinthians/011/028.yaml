id: 1CO.11.28
reference: 1 Corinthians 11:28
source:
  edition: SBLGNT
  text: δοκιμαζέτω δὲ ἄνθρωπος ἑαυτόν, καὶ οὕτως ἐκ τοῦ ἄρτου ἐσθιέτω καὶ ἐκ τοῦ ποτηρίου
    πινέτω·
translation:
  text: But let a man examine himself, and in this way let him eat from the bread
    and drink from the cup.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'let a person examine himself'—the Greek says 'a man' but uses the singular
      generically for any participant.
    reason: lexical_alternative
lexical_decisions:
- source_word: δοκιμαζέτω
  chosen: let ... examine
  alternatives:
  - test
  - approve after testing
  lexicon: BDAG
  rationale: The present active imperative calls for self-scrutiny prior to participation.
    'Examine' is natural modern English and fits the reflexive object ἑαυτόν. 'Test'
    is possible, but 'examine' better conveys deliberate self-assessment in this context.
- source_word: δὲ
  chosen: But
  alternatives:
  - and
  - now
  lexicon: BDAG
  rationale: δέ marks a mild contrast or transition from the preceding warning to
    the proper response. 'But' captures that adversative turn better than a simple
    'and'.
- source_word: ἄνθρωπος
  chosen: a man
  alternatives:
  - a person
  - someone
  lexicon: BDAG
  rationale: The noun is grammatically masculine singular but used generically. Per
    the translation philosophy's gender-accurate principle, 'a man' preserves the
    source form and representative force. An inclusive alternative is worth preserving
    in a footnote because the referent is not limited to males.
- source_word: ἑαυτόν
  chosen: himself
  alternatives:
  - oneself
  lexicon: BDAG
  rationale: The reflexive pronoun agrees with the singular masculine generic subject.
    'Himself' matches the chosen rendering of ἄνθρωπος as 'a man'.
- source_word: οὕτως
  chosen: in this way
  alternatives:
  - thus
  - so
  lexicon: BDAG
  rationale: 'οὕτως points to the manner of eating and drinking: after self-examination.
    ''In this way'' makes the logical connection explicit in clear modern English.'
- source_word: ἐκ τοῦ ἄρτου
  chosen: from the bread
  alternatives:
  - of the bread
  lexicon: BDAG
  rationale: The preposition ἐκ is most naturally 'from/out of.' In idiomatic English
    with eating and drinking, 'eat from the bread' preserves the Greek preposition
    without becoming unnatural. The article likely points to the eucharistic bread
    already under discussion.
- source_word: ἐσθιέτω
  chosen: let him eat
  alternatives:
  - he must eat
  lexicon: BDAG
  rationale: A third-person present imperative is well represented by 'let him eat.'
    This preserves the exhortational force without overstrengthening it.
- source_word: ἐκ τοῦ ποτηρίου
  chosen: from the cup
  alternatives:
  - of the cup
  lexicon: BDAG
  rationale: As with ἐκ τοῦ ἄρτου, 'from the cup' reflects the Greek preposition naturally
    in English and maintains parallelism.
- source_word: πινέτω
  chosen: drink
  alternatives:
  - let him drink
  lexicon: BDAG
  rationale: 'Included under the governing ''let him'' from the coordinated structure:
    ''let him eat ... and drink ...'' This avoids unnecessary repetition in English
    while preserving the imperative sense.'
