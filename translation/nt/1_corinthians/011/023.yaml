id: 1CO.11.23
reference: 1 Corinthians 11:23
source:
  edition: SBLGNT
  text: Ἐγὼ γὰρ παρέλαβον ἀπὸ τοῦ κυρίου, ὃ καὶ παρέδωκα ὑμῖν, ὅτι ὁ κύριος Ἰησοῦς
    ἐν τῇ νυκτὶ ᾗ ⸀παρεδίδετο ἔλαβεν ἄρτον
translation:
  text: 'For I received from the Lord what I also delivered to you: that the Lord
    Jesus, on the night when he was being handed over, took bread'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, traditionally, 'on the night when he was betrayed.'
    reason: alternative_reading
lexical_decisions:
- source_word: παρέλαβον
  chosen: received
  alternatives:
  - accepted
  - received as tradition
  lexicon: BDAG
  rationale: Aorist of παραλαμβάνω here refers to Paul’s reception of the Eucharistic
    tradition/instruction. 'Received' is the standard and clear English equivalent,
    preserving the formal link with παρέδωκα ('delivered').
- source_word: ἀπὸ τοῦ κυρίου
  chosen: from the Lord
  alternatives:
  - from the Lord Jesus
  - from the Lord's authority
  lexicon: BDAG
  rationale: The phrase most naturally indicates source. 'The Lord' is retained rather
    than expanded, preserving the Greek wording and allowing the following clause
    to identify 'the Lord Jesus.'
- source_word: παρέδωκα
  chosen: delivered
  alternatives:
  - handed on
  - passed on
  lexicon: BDAG
  rationale: '''Delivered'' preserves the lexical correspondence with tradition language
    and echoes the formal receive/hand-on pattern in Paul. ''Handed on'' is idiomatic
    but would blur the later use of παραδίδωμι in παρεδίδετο within the same verse.'
- source_word: ὅτι
  chosen: that
  alternatives:
  - namely that
  lexicon: BDAG
  rationale: Introduces the content of what Paul delivered. Simple 'that' is sufficient
    and natural.
- source_word: κύριος
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Follows the doctrinal default for κύριος as 'Lord.' This preserves both
    reverential and christological force without importing a different nuance.
- source_word: ἐν τῇ νυκτὶ ᾗ
  chosen: on the night when
  alternatives:
  - in the night in which
  - during the night when
  lexicon: BDAG
  rationale: Idiomatic English for the temporal construction while preserving the
    relative clause's force.
- source_word: παρεδίδετο
  chosen: was being handed over
  alternatives:
  - was betrayed
  - was being delivered up
  lexicon: BDAG
  rationale: The imperfect passive of παραδίδωμι literally means 'was being handed
    over/delivered up.' 'Was betrayed' is traditional and contextually possible, but
    'was being handed over' better preserves the broader semantic range and avoids
    narrowing the action solely to Judas, while still fitting the passion context.
- source_word: ἔλαβεν ἄρτον
  chosen: took bread
  alternatives:
  - took a loaf of bread
  - received bread
  lexicon: BDAG
  rationale: Standard rendering of the aorist verb with direct object. The anarthrous
    ἄρτον does not require 'a loaf' in English, and 'took bread' is both natural and
    liturgically recognizable.
