theological_decisions:
- issue: Rendering of παρεδίδετο in the institution narrative
  chosen_reading: was being handed over
  alternative_readings:
  - was betrayed
  rationale: 'The Greek verb παραδίδωμι can denote handing over, delivering up, or
    betraying depending on context. Here the more literal passive preserves the text''s
    theological breadth: Jesus is handed over through human betrayal, yet also within
    the larger divine-redemptive framework seen elsewhere in the NT. This avoids importing
    a narrower interpretation into the main text while preserving the traditional
    reading in a footnote.'
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it); Contested terms table for κύριος
