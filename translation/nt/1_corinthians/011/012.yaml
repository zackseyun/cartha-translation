id: 1CO.11.12
reference: 1 Corinthians 11:12
source:
  edition: SBLGNT
  text: ὥσπερ γὰρ ἡ γυνὴ ἐκ τοῦ ἀνδρός, οὕτως καὶ ὁ ἀνὴρ διὰ τῆς γυναικός· τὰ δὲ πάντα
    ἐκ τοῦ θεοῦ.
translation:
  text: For just as the woman is from the man, so also the man is through the woman;
    but all things are from God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'wife' and 'husband' where the context is taken more narrowly as marital
      rather than generic male-female relations.
    reason: alternative_reading
lexical_decisions:
- source_word: ὥσπερ γὰρ
  chosen: For just as
  alternatives:
  - For as
  - Just as
  lexicon: BDAG
  rationale: Renders the comparative conjunction with explanatory γάρ. 'For just as'
    preserves both the logical connection to the previous argument and the comparison
    structure.
- source_word: ἡ γυνή
  chosen: the woman
  alternatives:
  - woman
  - wife
  lexicon: BDAG
  rationale: γυνή can mean 'woman' or 'wife.' In this context Paul is speaking in
    a broader male-female relation grounded in creation and birth, not narrowly of
    one married couple, so 'the woman' best fits the generic representative sense
    while preserving the article.
- source_word: ἐκ τοῦ ἀνδρός
  chosen: from the man
  alternatives:
  - out of the man
  - from a man
  - from her husband
  lexicon: BDAG
  rationale: ἐκ indicates source/origin. 'From the man' preserves the creation allusion
    to woman being taken from man and matches the generic sense of ἀνήρ here.
- source_word: ὁ ἀνήρ
  chosen: the man
  alternatives:
  - man
  - husband
  lexicon: BDAG
  rationale: ἀνήρ can mean 'man' or 'husband.' Here the statement is general and reciprocal
    with γυνή, so 'the man' is preferable to the narrower 'husband.'
- source_word: διὰ τῆς γυναικός
  chosen: through the woman
  alternatives:
  - by means of the woman
  - through woman
  lexicon: BDAG
  rationale: διά with the genitive commonly expresses means or agency. 'Through the
    woman' naturally conveys that man comes into the world by means of woman, balancing
    the prior 'from the man' without flattening the distinction between ἐκ and διά.
- source_word: τὰ δὲ πάντα
  chosen: but all things
  alternatives:
  - and all things
  - now all things
  - yet all things
  lexicon: BDAG
  rationale: δέ marks a mild contrast or transition. 'But all things' preserves the
    shift from mutual human relations to the ultimate divine source.
- source_word: ἐκ τοῦ θεοῦ
  chosen: from God
  alternatives:
  - out of God
  - from the God
  lexicon: BDAG
  rationale: ἐκ again denotes source/origin. 'From God' is idiomatic English and preserves
    Paul's climactic assertion that ultimate origin lies in God.
