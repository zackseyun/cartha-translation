theological_decisions:
- issue: Sense of γυνή / ἀνήρ in the passage
  chosen_reading: generic 'woman' and 'man' rather than 'wife' and 'husband'
  alternative_readings:
  - wife and husband
  rationale: Although γυνή and ἀνήρ can denote wife/husband, this verse appeals both
    to creation ('woman from man') and ordinary human birth ('man through woman'),
    which broadens the scope beyond marriage alone. Rendering them generically preserves
    Paul's theological balancing of the sexes without importing a narrower marital
    claim.
  doctrine_reference: Translation philosophy §4 (Gender-accurate over gender-neutral)
- issue: Relationship between male and female origins
  chosen_reading: preserve the distinction between 'from' (ἐκ) and 'through' (διά)
  alternative_readings:
  - flatten both to 'from' for smoother English
  rationale: Paul intentionally distinguishes woman's origin from man in creation
    and man's coming through woman in birth. Keeping 'from' and 'through' preserves
    the theological tension and reciprocity in the text rather than resolving it into
    a single undifferentiated relation.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
