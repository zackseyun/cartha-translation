theological_decisions:
- issue: Meaning of κεφαλή in the three parallel clauses
  chosen_reading: Retain the metaphor as 'head' without specifying 'authority over'
    or 'source' in the main text.
  alternative_readings:
  - source
  - authority over
  rationale: This is a well-known interpretive and theological dispute. The Greek
    itself uses the metaphor κεφαλή, and the translation should preserve that tension
    rather than resolve it beyond what the text explicitly states. Alternatives are
    preserved in a footnote for auditability.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
- issue: Whether ἀνήρ / γυνή here should be rendered as man/woman or husband/wife
  chosen_reading: Render generically as 'man' and 'woman' in the main text.
  alternative_readings:
  - husband and wife
  rationale: The immediate syntax presents broad parallel statements ('every man ...',
    'a woman ...', 'the Messiah ...'), which favors a general anthropological reading.
    However, because the surrounding passage concerns male-female relations in gathered
    worship and these nouns can denote spouses, the marital reading is preserved in
    a footnote rather than excluded.
  doctrine_reference: Translation philosophy §3 and §4.
- issue: Relation of the final clause to Nicene and Chalcedonian orthodoxy
  chosen_reading: Translate literally as 'the head of the Messiah is God' without
    weakening or expanding the statement.
  alternative_readings:
  - interpretive paraphrases that specify functional order only
  rationale: The verse must be rendered as written while avoiding doctrinally loaded
    paraphrase. Historic orthodoxy affirmed in DOCTRINE.md requires that this clause
    not be translated in a way that denies the full deity of the Son; the literal
    rendering preserves the text's wording without importing a subordinationist explanation
    into the translation itself.
  doctrine_reference: 'Affirmations: Nicene Creed (381 AD), Definition of Chalcedon
    (451 AD).'
