id: 1CO.11.3
reference: 1 Corinthians 11:3
source:
  edition: SBLGNT
  text: θέλω δὲ ὑμᾶς εἰδέναι ὅτι παντὸς ἀνδρὸς ἡ κεφαλὴ ὁ Χριστός ἐστιν, κεφαλὴ δὲ
    γυναικὸς ὁ ἀνήρ, κεφαλὴ δὲ ⸀τοῦ Χριστοῦ ὁ θεός.
translation:
  text: But I want you to know that the head of every man is the Messiah, and the
    head of a woman is the man, and the head of the Messiah is God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'head' may be understood as 'source' or 'authority over'; the Greek
      metaphor itself is retained in the main text.
    reason: lexical_alternative
  - marker: b
    text: '''Woman'' and ''man'' here can also be read as ''wife'' and ''husband.'''
    reason: alternative_reading
lexical_decisions:
- source_word: θέλω
  chosen: I want
  alternatives:
  - I desire
  - I wish
  lexicon: BDAG
  rationale: A straightforward present-tense expression of Paul's intent. 'I want'
    is natural modern English and preserves the personal force without sounding stilted.
- source_word: δὲ
  chosen: But
  alternatives:
  - Now
  - And
  lexicon: BDAG
  rationale: Marks a mild transition or contrast with the preceding discussion. 'But'
    best signals the discourse shift here.
- source_word: ὑμᾶς εἰδέναι
  chosen: you to know
  alternatives:
  - you to understand
  - you to be aware
  lexicon: BDAG
  rationale: This infinitival construction idiomatically means 'I want you to know.'
    'Know' is the most direct rendering and preserves the informational force.
- source_word: παντὸς ἀνδρὸς
  chosen: every man
  alternatives:
  - every husband
  - every male
  lexicon: BDAG
  rationale: ἀνήρ can mean 'man' or 'husband' depending on context. Here the first
    clause is most naturally generic and representative, pairing with the following
    relational statements. Per the gender-accurate policy, 'man' is retained rather
    than neutralizing.
- source_word: κεφαλή
  chosen: head
  alternatives:
  - source
  - authority over
  lexicon: BDAG
  rationale: The Greek term literally means 'head' and is theologically contested
    in this context. To preserve the text's metaphorical tension rather than resolve
    it interpretively, the main text keeps 'head' and alternatives are preserved in
    a footnote.
- source_word: ὁ Χριστός
  chosen: the Messiah
  alternatives:
  - Christ
  lexicon: BDAG
  rationale: Per doctrine, Χριστός is translated as 'Messiah' where functioning as
    a title rather than a name-like designation. Here the article and predicative
    structure support title force.
- source_word: γυναικός
  chosen: a woman
  alternatives:
  - a wife
  - woman
  lexicon: BDAG
  rationale: γυνή can mean 'woman' or 'wife.' Because the verse states a general principle
    in parallel clauses and does not explicitly mark marriage, 'a woman' is preferred
    in the main text, while the marital alternative is preserved in a footnote due
    to the broader context of the passage.
- source_word: ὁ ἀνήρ
  chosen: the man
  alternatives:
  - her husband
  - man
  lexicon: BDAG
  rationale: In parallel with γυνή, ἀνήρ may mean 'man' or 'husband.' The generic
    relational reading is kept in the main text to match the syntax and preserve ambiguity;
    the marital reading is noted in a footnote.
- source_word: τοῦ Χριστοῦ
  chosen: the Messiah
  alternatives:
  - Christ
  lexicon: BDAG
  rationale: Again treated as a title and therefore translated 'Messiah' in keeping
    with project policy and consistency within the verse.
- source_word: ὁ θεός
  chosen: God
  lexicon: BDAG
  rationale: Standard rendering of θεός. The articular nominative functions as the
    predicate subject in the final clause.
