id: 1CO.11.20
reference: 1 Corinthians 11:20
source:
  edition: SBLGNT
  text: συνερχομένων οὖν ὑμῶν ἐπὶ τὸ αὐτὸ οὐκ ἔστιν κυριακὸν δεῖπνον φαγεῖν,
translation:
  text: Therefore, when you come together in the same place, it is not to eat the
    Lord’s supper,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'you are not eating the Lord’s supper,' emphasizing that their conduct
      means the meal no longer qualifies as such.
    reason: alternative_reading
lexical_decisions:
- source_word: συνερχομένων
  chosen: when you come together
  alternatives:
  - when you assemble
  - as you gather together
  lexicon: BDAG
  rationale: 'The genitive participle with ὑμῶν forms a temporal construction: ''when
    you come together.'' ''Come together'' is natural English and preserves the communal
    gathering sense without overformalizing.'
- source_word: οὖν
  chosen: Therefore
  alternatives:
  - So
  - Then
  lexicon: BDAG
  rationale: Marks an inference from the preceding rebuke about divisions. 'Therefore'
    preserves the logical connection more clearly than the lighter 'so' or merely
    sequential 'then.'
- source_word: ἐπὶ τὸ αὐτό
  chosen: in the same place
  alternatives:
  - in one place
  - together
  lexicon: BDAG
  rationale: This idiom refers to assembling at the same location or in one gathering.
    'In the same place' keeps the spatial nuance better than simply 'together,' which
    would duplicate the force of συνερχομένων.
- source_word: οὐκ ἔστιν ... φαγεῖν
  chosen: it is not to eat
  alternatives:
  - it is not possible to eat
  - you are not eating
  lexicon: BDAG
  rationale: The construction is somewhat compressed and idiomatic. In context Paul
    means that their gathering does not amount to eating the Lord's supper. 'It is
    not to eat' preserves the infinitival structure while communicating that their
    action cannot properly be described this way. 'You are not eating' is interpretive
    and smoother, but less formally tied to the Greek wording.
- source_word: κυριακὸν
  chosen: the Lord’s
  alternatives:
  - belonging to the Lord
  - lordly
  lexicon: BDAG
  rationale: The adjective means 'belonging to the Lord.' In established and clear
    English, 'the Lord’s' is the most natural attributive rendering and preserves
    the possessive force.
- source_word: δεῖπνον
  chosen: supper
  alternatives:
  - meal
  - dinner
  lexicon: BDAG
  rationale: In this context the term refers to the communal meal associated with
    the remembrance of Jesus. 'Supper' preserves the traditional and contextual sense
    without becoming archaic; 'meal' is broader but weaker, and 'dinner' is too culturally
    specific.
- source_word: κυριακὸν δεῖπνον
  chosen: the Lord’s supper
  alternatives:
  - the Lord’s meal
  lexicon: BDAG
  rationale: The phrase is a recognized expression in Christian usage and accurately
    renders the Greek adjective-noun combination. 'The Lord’s meal' is possible but
    less idiomatic in English and less clearly connected to the ecclesial context
    of the passage.
