theological_decisions:
- issue: Whether Paul denies the possibility of eating the meal at all or denies that
    their practice qualifies as the Lord’s Supper
  chosen_reading: Their gathering and behavior mean that what they are eating cannot
    properly be called the Lord’s supper.
  alternative_readings:
  - It is impossible for you to eat the Lord’s supper
  - You are not eating the Lord’s supper
  rationale: 'The immediate context (vv. 21–22) shows Paul rebuking the manner of
    their communal meal, not claiming a metaphysical impossibility. The chosen English
    preserves the evaluative force: because of their divisive conduct, their meal
    is not truly the Lord’s supper.'
  doctrine_reference: Preserve theological tension rather than resolve it; optimal
    equivalence
