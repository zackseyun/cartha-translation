theological_decisions:
- issue: Whether the second clause refers to final condemnation or temporal/divine
    disciplinary judgment
  chosen_reading: temporal or divine disciplinary judgment is implied, rendered simply
    as 'be judged'
  alternative_readings:
  - final condemnation
  rationale: The immediate context in v. 32 distinguishes the Lord's judging/disciplining
    believers from condemnation with the world. Therefore the translation should not
    preemptively intensify ἐκρινόμεθα to 'be condemned.'
  doctrine_reference: Preserve theological tension rather than resolve it; do not
    import doctrinal claims the text does not make.
