id: 1CO.11.31
reference: 1 Corinthians 11:31
source:
  edition: SBLGNT
  text: εἰ ⸀δὲ ἑαυτοὺς διεκρίνομεν, οὐκ ἂν ἐκρινόμεθα·
translation:
  text: But if we judged ourselves, we would not be judged.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'examined ourselves' or 'discerned ourselves.' The Greek verb can mean
      to evaluate or distinguish, but 'judged' is used here to preserve the contrast
      with 'be judged' in the next clause.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰ δὲ
  chosen: But if
  alternatives:
  - Now if
  - If, however
  lexicon: BDAG
  rationale: εἰ introduces the conditional clause, while δέ marks a mild contrast
    or transition from the previous verse. 'But if' preserves both the conditional
    force and the contrast in natural English.
- source_word: ἑαυτοὺς
  chosen: ourselves
  alternatives:
  - our own selves
  lexicon: BDAG
  rationale: Reflexive accusative object of the verb; 'ourselves' is the natural modern
    English equivalent.
- source_word: διεκρίνομεν
  chosen: judged
  alternatives:
  - examined
  - discerned
  - evaluated
  lexicon: BDAG
  rationale: In this context, διακρίνω carries the sense of making a discriminating
    assessment of oneself in light of the Lord's Supper context. 'Judged' best matches
    the wordplay with ἐκρινόμεθα in the second clause and preserves the forensic/self-assessing
    force. 'Examined' is contextually plausible but weakens the lexical parallel.
- source_word: οὐκ ἂν
  chosen: would not
  alternatives:
  - would certainly not
  lexicon: BDAG
  rationale: The combination with the imperfect verb expresses the apodosis of a contrary-to-fact
    or more vivid condition in idiomatic English. 'Would not' is the standard rendering.
- source_word: ἐκρινόμεθα
  chosen: be judged
  alternatives:
  - be condemned
  - come under judgment
  lexicon: BDAG
  rationale: κρίνω here refers to being judged by the Lord in the disciplinary sense
    developed in the surrounding context, especially v. 32. 'Be judged' preserves
    the lexical connection with the first clause and avoids importing the stronger
    final-condemnation sense of 'be condemned' into this verse.
