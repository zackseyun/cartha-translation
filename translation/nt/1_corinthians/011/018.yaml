id: 1CO.11.18
reference: 1 Corinthians 11:18
source:
  edition: SBLGNT
  text: πρῶτον μὲν γὰρ συνερχομένων ὑμῶν ἐν ἐκκλησίᾳ ἀκούω σχίσματα ἐν ὑμῖν ὑπάρχειν,
    καὶ μέρος τι πιστεύω.
translation:
  text: For, in the first place, when you come together as a church, I hear that divisions
    exist among you, and in part I believe it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in assembly' or 'in the church'; the Greek refers to the congregation
      gathered together, not specifically to a building.
    reason: lexical_alternative
lexical_decisions:
- source_word: πρῶτον μὲν
  chosen: in the first place
  alternatives:
  - first of all
  - first
  lexicon: BDAG
  rationale: The idiom introduces the first item in a sequence or argument. 'In the
    first place' preserves the discourse function without sounding overly wooden.
    Although Paul does not complete a formal μέν...δέ pair here, the phrase still
    signals an initial point.
- source_word: συνερχομένων ὑμῶν
  chosen: when you come together
  alternatives:
  - when you assemble
  - as you gather together
  lexicon: BDAG
  rationale: The genitive absolute is best rendered temporally. 'Come together' is
    a natural English equivalent for συνέρχομαι in this congregational context and
    matches Paul's repeated usage in this chapter.
- source_word: ἐν ἐκκλησίᾳ
  chosen: as a church
  alternatives:
  - in church
  - in assembly
  - in the church
  lexicon: BDAG
  rationale: Here ἐκκλησία refers to the gathered congregation rather than a building.
    'As a church' communicates corporate assembly more clearly in modern English than
    'in church,' while avoiding anachronistic building-centered language.
- source_word: ἀκούω
  chosen: I hear
  alternatives:
  - I am hearing
  - I have heard
  lexicon: BDAG
  rationale: Present tense is naturally rendered 'I hear' in English. It conveys Paul's
    report-based knowledge without overtranslating aspect.
- source_word: σχίσματα
  chosen: divisions
  alternatives:
  - splits
  - factions
  lexicon: BDAG
  rationale: The noun denotes tears, splits, or divisions within a community. 'Divisions'
    is the most idiomatic and contextually fitting rendering here. 'Factions' is possible
    but can suggest more formal party-grouping than the term itself requires in this
    verse.
- source_word: ὑπάρχειν
  chosen: exist
  alternatives:
  - are present
  - are occurring
  lexicon: BDAG
  rationale: 'With σχίσματα, the infinitive expresses reported existence: Paul hears
    that divisions ''exist'' among them. This is concise and faithful to the Greek
    construction.'
- source_word: καὶ μέρος τι
  chosen: and in part
  alternatives:
  - and partly
  - and to some extent
  lexicon: BDAG
  rationale: The phrase qualifies Paul's belief, indicating partial or limited acceptance
    of the report. 'In part' is a standard and clear rendering that preserves the
    nuance of reservation.
- source_word: πιστεύω
  chosen: I believe it
  alternatives:
  - I believe
  - I accept it
  lexicon: BDAG
  rationale: 'English idiom benefits from supplying the object implied by the context:
    Paul believes the report to some extent. ''I believe it'' makes the sense explicit
    without adding new content.'
