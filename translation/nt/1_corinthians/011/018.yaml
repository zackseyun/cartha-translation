theological_decisions:
- issue: Meaning of ἐκκλησία in context
  chosen_reading: the gathered congregation ('as a church') rather than a building
    or institutional abstraction
  alternative_readings:
  - in church
  - in the assembly
  rationale: The context concerns the Corinthians' act of gathering for communal worship
    and the Lord's Supper. Rendering ἐκκλησία as the gathered body preserves the ecclesial
    sense without importing later building-centered usage.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; readable modern English, not archaic or academic.'
