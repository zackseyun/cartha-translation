id: 1CO.16.18
reference: 1 Corinthians 16:18
source:
  edition: SBLGNT
  text: ἀνέπαυσαν γὰρ τὸ ἐμὸν πνεῦμα καὶ τὸ ὑμῶν. ἐπιγινώσκετε οὖν τοὺς τοιούτους.
translation:
  text: For they refreshed my spirit and yours. Therefore acknowledge such men.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'recognize' or 'appreciate such people.' The Greek is masculine ('such
      men') and here refers specifically to the men just mentioned.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνέπαυσαν
  chosen: refreshed
  alternatives:
  - gave rest to
  - encouraged
  lexicon: BDAG
  rationale: ἀναπαύω here is metaphorical, referring to inward relief or renewal rather
    than literal rest. 'Refreshed' is natural modern English and preserves the sense
    of strengthening or relieving Paul's inner being.
- source_word: γὰρ
  chosen: For
  alternatives:
  - because
  lexicon: BDAG
  rationale: γάρ gives the reason for the preceding commendation. 'For' preserves
    the connective force in a concise, natural way.
- source_word: πνεῦμα
  chosen: spirit
  alternatives:
  - inner being
  lexicon: BDAG
  rationale: In this context πνεῦμα refers to the person's inward disposition or emotional/spiritual
    state, not the Holy Spirit. 'Spirit' is the standard rendering and fits Paul's
    idiom.
- source_word: τὸ ἐμὸν πνεῦμα καὶ τὸ ὑμῶν
  chosen: my spirit and yours
  alternatives:
  - my spirit as well as yours
  - me and you inwardly
  lexicon: BDAG
  rationale: The ellipsis after τὸ ὑμῶν is naturally supplied from πνεῦμα. The translation
    keeps the compact Greek structure while making the sense clear in English.
- source_word: ἐπιγινώσκετε
  chosen: acknowledge
  alternatives:
  - recognize
  - appreciate
  - honor
  lexicon: BDAG
  rationale: ἐπιγινώσκω here calls for more than mere identification; it urges the
    Corinthians to give due recognition to such people. 'Acknowledge' captures that
    sense without overstating it to formal 'honor.'
- source_word: οὖν
  chosen: Therefore
  alternatives:
  - then
  - so
  lexicon: BDAG
  rationale: οὖν marks an inference from the preceding statement. 'Therefore' clearly
    signals the exhortational conclusion.
- source_word: τοὺς τοιούτους
  chosen: such men
  alternatives:
  - such people
  - people like these
  lexicon: BDAG
  rationale: The phrase refers specifically to Stephanas, Fortunatus, and Achaicus
    in the immediate context, all male individuals. In keeping with the gender-accurate
    philosophy, 'such men' reflects the masculine form and the specific referents
    better than the generic 'such people.'
