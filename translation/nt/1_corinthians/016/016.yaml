theological_decisions:
- issue: Nature of the submission commanded
  chosen_reading: A call to voluntary deference toward recognized Christian workers
    like those just mentioned, not an unqualified doctrine of absolute subordination.
  alternative_readings:
  - A broader command of hierarchical obedience
  rationale: The immediate context (vv. 15–18) concerns Stephanas' household and all
    who share in the work. Rendering ὑποτάσσησθε as 'submit yourselves' preserves
    the text's force without importing a more absolute or institutionalized claim
    than the verse itself states.
  doctrine_reference: Preserve theological tension rather than resolve it; do not
    import doctrinal claims the text does not make.
