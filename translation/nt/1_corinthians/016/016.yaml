id: 1CO.16.16
reference: 1 Corinthians 16:16
source:
  edition: SBLGNT
  text: ἵνα καὶ ὑμεῖς ὑποτάσσησθε τοῖς τοιούτοις καὶ παντὶ τῷ συνεργοῦντι καὶ κοπιῶντι.
translation:
  text: that you also submit yourselves to such people, and to everyone who works
    together and labors.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'so that you too may be subject to people like these.'
    reason: lexical_alternative
  - marker: b
    text: '''Works together'' could also be rendered ''is a fellow worker'' or ''cooperates.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: ἵνα
  chosen: that
  alternatives:
  - so that
  lexicon: BDAG
  rationale: Introduces the content/purpose of Paul's appeal from the previous verse.
    'That' is natural in English while preserving the subordinating force.
- source_word: καὶ ὑμεῖς
  chosen: you also
  alternatives:
  - you too
  - even you
  lexicon: BDAG
  rationale: 'The combination marks inclusion/emphasis: the Corinthians likewise are
    to respond in this way. ''You also'' preserves the emphasis without sounding wooden.'
- source_word: ὑποτάσσησθε
  chosen: submit yourselves
  alternatives:
  - be subject
  - be submissive
  lexicon: BDAG
  rationale: Middle/passive present subjunctive here carries the sense of voluntarily
    placing oneself under recognized leadership or order. 'Submit yourselves' best
    reflects the reflexive nuance and avoids implying mere passive status.
- source_word: τοῖς τοιούτοις
  chosen: to such people
  alternatives:
  - to such men
  - to people like these
  lexicon: BDAG
  rationale: Refers back to people like Stephanas and those devoted to service. 'Such
    people' captures the class reference without unnecessarily restricting by gender
    in English, since the phrase points to a type of person rather than making maleness
    the point.
- source_word: παντὶ τῷ συνεργοῦντι
  chosen: to everyone who works together
  alternatives:
  - to every fellow worker
  - to everyone who joins in the work
  - to everyone who cooperates
  lexicon: BDAG
  rationale: The participle συνεργοῦντι denotes working together with others in the
    ministry/task. 'Works together' preserves the verbal force and communal nuance;
    'fellow worker' is possible but slightly more interpretive than the participial
    construction.
- source_word: καὶ κοπιῶντι
  chosen: and labors
  alternatives:
  - and toils
  - and works hard
  lexicon: BDAG
  rationale: κοπιάω often conveys strenuous labor. 'Labors' is concise, dignified,
    and stronger than a generic 'works,' while remaining readable modern English.
