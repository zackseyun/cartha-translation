id: 1CO.16.4
reference: 1 Corinthians 16:4
source:
  edition: SBLGNT
  text: ἐὰν δὲ ⸂ἄξιον ᾖ⸃ τοῦ κἀμὲ πορεύεσθαι, σὺν ἐμοὶ πορεύσονται.
translation:
  text: And if it is worthwhile for me to go also, they will go with me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'if it is fitting for me also to go.' The Greek expression can denote
      what is appropriate, fitting, or worthwhile in the circumstances.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐὰν δὲ
  chosen: And if
  alternatives:
  - But if
  - Now if
  lexicon: BDAG
  rationale: ἐὰν introduces a conditional clause, and δέ here is a mild connective.
    'And if' preserves the flow from the previous verse without overstating contrast.
- source_word: ἄξιον ᾖ
  chosen: it is worthwhile
  alternatives:
  - it is fitting
  - it is worthy
  - it is advisable
  lexicon: BDAG
  rationale: The neuter adjective ἄξιον with ᾖ forms an impersonal expression. In
    context Paul means that his accompanying the collection would be appropriate or
    warranted. 'Worthwhile' communicates practical suitability in natural English
    better than the more wooden 'worthy'.
- source_word: τοῦ κἀμὲ πορεύεσθαι
  chosen: for me to go also
  alternatives:
  - for me also to go
  - that I also should go
  lexicon: BDAG
  rationale: The articular infinitive with τοῦ expresses the content/complement of
    what would be considered fitting. κἀμέ means 'also me' (= 'me also'). 'For me
    to go also' is idiomatic and preserves the additive force.
- source_word: σὺν ἐμοὶ
  chosen: with me
  alternatives:
  - together with me
  lexicon: BDAG
  rationale: σύν with the dative straightforwardly means accompaniment. 'With me'
    is the natural English rendering.
- source_word: πορεύσονται
  chosen: they will go
  alternatives:
  - they will travel
  - they will accompany
  lexicon: BDAG
  rationale: The future middle here denotes the delegates' going/traveling. 'They
    will go' keeps the verbal repetition with πορεύεσθαι and avoids importing a stronger
    nuance than the Greek requires.
