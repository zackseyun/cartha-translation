id: 1CO.16.21
reference: 1 Corinthians 16:21
source:
  edition: SBLGNT
  text: Ὁ ἀσπασμὸς τῇ ἐμῇ χειρὶ Παύλου.
translation:
  text: This greeting is in my own hand—Paul.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or, more formally, ''The greeting with my own hand: Paul.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀσπασμὸς
  chosen: greeting
  alternatives:
  - greeting of greeting
  - salutation
  lexicon: BDAG
  rationale: ἀσπασμός commonly denotes a greeting or salutation. 'Greeting' is the
    most natural modern English equivalent and fits the epistolary context.
- source_word: τῇ ἐμῇ χειρὶ
  chosen: in my own hand
  alternatives:
  - with my own hand
  - by my own hand
  lexicon: BDAG
  rationale: The dative phrase is an idiom indicating handwriting by the author personally.
    'In my own hand' is idiomatic English for an autograph subscription and preserves
    the sense that Paul himself writes this line.
- source_word: Παύλου
  chosen: Paul
  alternatives:
  - of Paul
  lexicon: BDAG
  rationale: The genitive functions appositionally/signature-like after the handwriting
    formula, identifying the writer. English idiom prefers simply 'Paul' rather than
    the overly literal 'of Paul.'
- source_word: Ὁ
  chosen: This
  alternatives:
  - The
  lexicon: BDAG
  rationale: Although the article is formally 'the,' English epistolary style is more
    natural with 'This greeting' in this elliptical construction. This is a modest
    dynamic adjustment within optimal equivalence.
