id: 1CO.16.13
reference: 1 Corinthians 16:13
source:
  edition: SBLGNT
  text: Γρηγορεῖτε, στήκετε ἐν τῇ πίστει, ἀνδρίζεσθε, κραταιοῦσθε.
translation:
  text: Stay alert, stand firm in the faith, act like men, be strong.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or: ''be courageous'' or ''be brave.'' The Greek verb is literally gendered
      (''act like men'') but idiomatically calls for courage.'
    reason: lexical_alternative
  - marker: b
    text: 'Or: ''be strengthened.'' The Greek form is passive in voice, though ''be
      strong'' is a natural English imperative here.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Γρηγορεῖτε
  chosen: Stay alert
  alternatives:
  - Keep watch
  - Be watchful
  - Be awake
  lexicon: BDAG
  rationale: Present active imperative plural of γρηγορέω calls for ongoing vigilance.
    'Stay alert' is idiomatic modern English that preserves the imperative force without
    sounding archaic.
- source_word: στήκετε
  chosen: stand firm
  alternatives:
  - stand fast
  - stand
  lexicon: BDAG
  rationale: The verb στήκω commonly conveys steadfastness or firmness rather than
    merely physical standing. 'Stand firm' best captures the metaphorical sense in
    readable English.
- source_word: ἐν τῇ πίστει
  chosen: in the faith
  alternatives:
  - in faith
  lexicon: BDAG
  rationale: With the article, the phrase most naturally refers to the sphere or content
    of Christian faith rather than a subjective act of believing in the moment. This
    also aligns with Pauline usage of 'the faith' as the Christian confession or commitment.
- source_word: ἀνδρίζεσθε
  chosen: act like men
  alternatives:
  - be courageous
  - be brave
  - conduct yourselves manfully
  lexicon: BDAG
  rationale: The verb literally derives from 'man' and means to conduct oneself in
    a manly/courageous way. Per the doctrine's gender-accurate principle, the masculine
    nuance should be preserved rather than flattened to a gender-neutral abstraction
    in the main text. A footnote preserves the idiomatic alternative 'be courageous.'
- source_word: κραταιοῦσθε
  chosen: be strong
  alternatives:
  - be strengthened
  - grow strong
  lexicon: BDAG
  rationale: Present passive imperative plural can be rendered idiomatically as an
    exhortation to strength. 'Be strong' is natural English and fits the sequence
    of short imperatives, while a footnote preserves the more explicitly passive nuance
    'be strengthened'.
