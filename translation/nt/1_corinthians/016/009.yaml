id: 1CO.16.9
reference: 1 Corinthians 16:9
source:
  edition: SBLGNT
  text: θύρα γάρ μοι ἀνέῳγεν μεγάλη καὶ ἐνεργής, καὶ ἀντικείμενοι πολλοί.
translation:
  text: For a great and effective door has opened to me, and there are many opponents.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a great and effective opportunity has opened to me.' Paul uses 'door'
      metaphorically for an opening for ministry.
    reason: lexical_alternative
lexical_decisions:
- source_word: θύρα
  chosen: door
  alternatives:
  - opportunity
  lexicon: BDAG
  rationale: θύρα literally means 'door' and is commonly used metaphorically by Paul
    for an opening for ministry. Retaining 'door' preserves the metaphor in the source
    text rather than flattening it into the interpretation 'opportunity'.
- source_word: γάρ
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: BDAG
  rationale: γάρ gives the reason for Paul's stated travel plans in the surrounding
    context. 'For' is the most natural concise English connector here.
- source_word: μοι
  chosen: to me
  alternatives:
  - for me
  lexicon: BDAG
  rationale: The dative pronoun marks personal reference/advantage. 'To me' fits naturally
    with 'has opened' in English, though 'for me' is also possible.
- source_word: ἀνέῳγεν
  chosen: has opened
  alternatives:
  - stands open
  - has been opened
  lexicon: BDAG
  rationale: The perfect form indicates a present state resulting from a prior opening.
    'Has opened' preserves that aspect in idiomatic English. 'Has been opened' would
    make the passive sense more explicit, but the Greek form here can be rendered
    naturally without over-specifying agency.
- source_word: μεγάλη
  chosen: great
  alternatives:
  - wide
  - large
  lexicon: BDAG
  rationale: μεγάλη modifies 'door' and likely emphasizes the significance or extent
    of the opening. 'Great' preserves both the metaphor and the qualitative force
    better than the more spatial 'large' or interpretive 'wide'.
- source_word: ἐνεργής
  chosen: effective
  alternatives:
  - active
  - powerful
  lexicon: BDAG
  rationale: In context, ἐνεργής describes the door as productive or fruitful for
    ministry. 'Effective' communicates this clearly in modern English while fitting
    the metaphorical expression.
- source_word: ἀντικείμενοι
  chosen: opponents
  alternatives:
  - those who oppose
  - adversaries
  lexicon: BDAG
  rationale: The participle functions substantivally for people who are set against
    Paul and his work. 'Opponents' is concise, natural, and captures active resistance
    without overstating hostility.
- source_word: πολλοί
  chosen: many
  alternatives:
  - numerous
  lexicon: BDAG
  rationale: πολλοί straightforwardly means 'many.' 'Numerous' is possible but less
    natural here.
