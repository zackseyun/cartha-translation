theological_decisions:
- issue: Metaphorical 'door' for ministry opportunity
  chosen_reading: Retain the metaphor 'door' rather than interpretively rendering
    it as 'opportunity.'
  alternative_readings:
  - For a great and effective opportunity has opened to me
  rationale: The source text uses a common Pauline metaphor. Preserving it maintains
    the imagery and leaves the reader to perceive the ministry implication from context,
    in keeping with optimal equivalence and original-language primacy.
  doctrine_reference: Translation philosophy §§1, 3, 6
