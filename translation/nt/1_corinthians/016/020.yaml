- issue: Rendering ἀδελφοί in a congregational context
  chosen_reading: brothers
  alternative_readings:
  - brothers and sisters
  rationale: Following the stated philosophy of gender-accurate over gender-neutral,
    the masculine plural is retained in the main text. Since Paul often addresses
