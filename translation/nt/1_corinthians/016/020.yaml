id: 1CO.16.20
reference: 1 Corinthians 16:20
source:
  edition: SBLGNT
  text: ἀσπάζονται ὑμᾶς οἱ ἀδελφοὶ πάντες. ἀσπάσασθε ἀλλήλους ἐν φιλήματι ἁγίῳ.
translation:
  text: All the brothers greet you. Greet one another with a holy kiss.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'All the brothers and sisters greet you,' since 'brothers' can refer
      to fellow believers collectively.
    reason: lexical_alternative
  - marker: b
    text: The 'holy kiss' was a customary greeting among believers, marked by holiness
      and mutual fellowship.
    reason: cultural_note
lexical_decisions:
- source_word: ἀσπάζονται
  chosen: greet
  alternatives:
  - send greetings to
  - welcome
  lexicon: BDAG
  rationale: The verb denotes offering greetings. 'Greet' is the most natural concise
    English equivalent in an epistolary context and matches the reciprocal imperative
    later in the verse.
- source_word: οἱ ἀδελφοὶ πάντες
  chosen: All the brothers
  alternatives:
  - All the brothers and sisters
  - All the believers
  lexicon: BDAG
  rationale: ἀδελφοί is grammatically masculine plural and often can include mixed-gender
    fellow believers, but the project's philosophy is gender-accurate over gender-neutral.
    The Greek wording is retained as 'brothers' rather than expanding to 'brothers
    and sisters' in the main text. Because inclusivity may be contextually relevant,
    an alternative is preserved in a footnote.
- source_word: ἀσπάσασθε
  chosen: Greet
  alternatives:
  - Welcome
  - Exchange greetings with
  lexicon: BDAG
  rationale: 'Aorist middle imperative, naturally rendered as a direct command: ''Greet.''
    Using the same English gloss as the indicative earlier preserves lexical consistency.'
- source_word: ἀλλήλους
  chosen: one another
  alternatives:
  - each other
  lexicon: BDAG
  rationale: Standard reciprocal pronoun rendering in contemporary English; 'one another'
    fits the formal yet natural tone of the epistle.
- source_word: ἐν φιλήματι ἁγίῳ
  chosen: with a holy kiss
  alternatives:
  - with a sacred kiss
  - with a kiss of holiness
  lexicon: BDAG
  rationale: The prepositional phrase expresses means or manner. 'With a holy kiss'
    is idiomatic English and preserves both the physical greeting ('kiss') and its
    consecrated, morally pure character ('holy').
