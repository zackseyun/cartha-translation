id: 1CO.16.5
reference: 1 Corinthians 16:5
source:
  edition: SBLGNT
  text: Ἐλεύσομαι δὲ πρὸς ὑμᾶς ὅταν Μακεδονίαν διέλθω, Μακεδονίαν γὰρ διέρχομαι,
translation:
  text: But I will come to you when I have gone through Macedonia, for I am going
    through Macedonia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'when I pass through Macedonia.' The Greek aorist subjunctive can be
      rendered more simply in English, but 'when I have gone through' better preserves
      the sense of prior completion before Paul's visit.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐλεύσομαι
  chosen: I will come
  alternatives:
  - I will go
  - I am coming
  lexicon: BDAG
  rationale: Future middle of ἔρχομαι here is naturally rendered as a future intention
    directed toward the Corinthians. 'Come' fits the deictic orientation with πρὸς
    ὑμᾶς better than 'go.'
- source_word: δὲ
  chosen: But
  alternatives:
  - Now
  - And
  lexicon: BDAG
  rationale: δέ marks a mild transition/contrast from the preceding travel plans.
    'But' best captures the shift in English, though not a strong adversative.
- source_word: πρὸς ὑμᾶς
  chosen: to you
  alternatives:
  - with you
  - toward you
  lexicon: BDAG
  rationale: πρός with the accusative after a motion verb indicates movement toward
    persons; idiomatic English is 'to you.'
- source_word: ὅταν
  chosen: when
  alternatives:
  - whenever
  - after
  lexicon: BDAG
  rationale: 'With the aorist subjunctive διέλθω, ὅταν introduces a future contingency:
    ''when'' or ''whenever.'' In this specific travel-plan context, ''when'' is the
    most natural English rendering.'
- source_word: Μακεδονίαν
  chosen: Macedonia
  lexicon: BDAG
  rationale: Standard transliteration of the Roman province name, in keeping with
    the policy to transliterate names.
- source_word: διέλθω
  chosen: I have gone through
  alternatives:
  - I pass through
  - I go through
  lexicon: BDAG
  rationale: Aorist subjunctive of διέρχομαι under ὅταν points to a completed action
    prior to the main future verb in English sequence, so 'when I have gone through'
    best conveys the sense. This avoids flattening the aspectual distinction with
    the present διέρχομαι later in the verse.
- source_word: γὰρ
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: BDAG
  rationale: γάρ gives the reason for the stated timing of the visit. 'For' is concise
    and preserves the explanatory connection.
- source_word: διέρχομαι
  chosen: I am going through
  alternatives:
  - I am passing through
  - I pass through
  lexicon: BDAG
  rationale: Present middle/passive indicative here describes Paul's current/planned
    route in progress or as settled intention. 'I am going through' preserves the
    present tense and explains why he will come after that journey.
