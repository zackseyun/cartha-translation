id: 1CO.16.8
reference: 1 Corinthians 16:8
source:
  edition: SBLGNT
  text: ⸀ἐπιμενῶ δὲ ἐν Ἐφέσῳ ἕως τῆς πεντηκοστῆς·
translation:
  text: But I will stay in Ephesus until Pentecost.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I will remain in Ephesus until the Festival of Weeks.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπιμενῶ
  chosen: I will stay
  alternatives:
  - I will remain
  - I will continue
  lexicon: BDAG
  rationale: Future active of ἐπιμένω, here in a travel-plan context, indicates remaining
    in a place for a period of time. 'Stay' is natural modern English and preserves
    the sense without sounding stiff; 'remain' is more formal but not necessary here.
- source_word: δὲ
  chosen: But
  alternatives:
  - Now
  - And
  lexicon: BDAG
  rationale: δέ marks a mild contrast or transition with the preceding travel discussion.
    'But' best reflects the contrastive nuance in context, though 'now' or 'and' are
    possible in looser English.
- source_word: ἐν Ἐφέσῳ
  chosen: in Ephesus
  lexicon: BDAG
  rationale: ἐν with the dative gives straightforward locative sense. The city name
    is transliterated per translation philosophy for personal/place names.
- source_word: ἕως τῆς πεντηκοστῆς
  chosen: until Pentecost
  alternatives:
  - until the Festival of Weeks
  lexicon: BDAG
  rationale: ἕως with the genitive marks duration up to a point in time. πεντηκοστή
    in this Jewish-calendar context is conventionally and accurately rendered 'Pentecost.'
    'Festival of Weeks' would foreground the Hebrew background, but 'Pentecost' is
    the established and readily understood designation in NT context.
