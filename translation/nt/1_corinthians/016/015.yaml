id: 1CO.16.15
reference: 1 Corinthians 16:15
source:
  edition: SBLGNT
  text: Παρακαλῶ δὲ ὑμᾶς, ἀδελφοί· οἴδατε τὴν οἰκίαν Στεφανᾶ, ὅτι ἐστὶν ἀπαρχὴ τῆς
    Ἀχαΐας καὶ εἰς διακονίαν τοῖς ἁγίοις ἔταξαν ἑαυτούς·
translation:
  text: 'Now I urge you, brothers: you know the household of Stephanas, that it is
    the firstfruits of Achaia, and they devoted themselves to service for the saints.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'brothers and sisters'; the Greek says 'brothers,' a common form of address
      that can include the whole congregation.
    reason: lexical_alternative
  - marker: b
    text: '''Firstfruits'' likely means the earliest believers in Achaia, while also
      preserving the metaphor of an initial portion set apart to God.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Παρακαλῶ
  chosen: I urge
  alternatives:
  - I appeal to
  - I exhort
  lexicon: BDAG
  rationale: παρακαλέω here introduces an earnest appeal rather than a mere request.
    'I urge' is natural modern English and preserves the apostolic force without sounding
    overly formal.
- source_word: δὲ
  chosen: Now
  alternatives:
  - and
  - but
  lexicon: BDAG
  rationale: δέ marks a mild transition. 'Now' captures the discourse shift better
    than a stronger adversative like 'but.'
- source_word: ἀδελφοί
  chosen: brothers
  alternatives:
  - brothers and sisters
  lexicon: BDAG
  rationale: Per the gender-accurate philosophy, the grammatically masculine vocative
    is rendered 'brothers.' Since Paul often addresses mixed congregations this way,
    the inclusive sense can be noted in a footnote rather than flattened in the main
    text.
- source_word: οἴδατε
  chosen: you know
  alternatives:
  - you are acquainted with
  - you have known
  lexicon: BDAG
  rationale: The perfect-form verb functions with present sense here. 'You know' is
    the straightforward idiomatic rendering.
- source_word: οἰκίαν Στεφανᾶ
  chosen: the household of Stephanas
  alternatives:
  - the house of Stephanas
  - Stephanas's family
  lexicon: BDAG
  rationale: οἰκία can denote household, family, or house. 'Household' best preserves
    the likely social unit in view, broader than the physical building and not limited
    only to blood relatives.
- source_word: ἀπαρχὴ τῆς Ἀχαΐας
  chosen: the firstfruits of Achaia
  alternatives:
  - the first converts of Achaia
  - the first portion of Achaia
  lexicon: BDAG
  rationale: ἀπαρχή is literally 'firstfruits' and carries possible consecratory overtones.
    Retaining 'firstfruits' preserves Paul's metaphor and avoids reducing it to a
    purely temporal statement, though the sense includes being among the earliest
    believers.
- source_word: εἰς διακονίαν
  chosen: to service
  alternatives:
  - for ministry
  - for serving
  lexicon: BDAG
  rationale: διακονία denotes service/ministry. 'Service' is accessible and broad
    enough to include practical ministry without importing later ecclesiastical office
    language.
- source_word: τοῖς ἁγίοις
  chosen: for the saints
  alternatives:
  - for the holy ones
  - for God's people
  lexicon: BDAG
  rationale: ἅγιοι in Pauline usage commonly refers to believers as 'saints.' This
    is a standard and theologically meaningful rendering, while 'for' fits the benefactive
    sense in context.
- source_word: ἔταξαν ἑαυτούς
  chosen: they devoted themselves
  alternatives:
  - they appointed themselves
  - they set themselves
  - they dedicated themselves
  lexicon: BDAG
  rationale: τάσσω with the reflexive here means to set oneself to a task, not merely
    to appoint in an official sense. 'They devoted themselves' best conveys intentional,
    sustained commitment in idiomatic English.
