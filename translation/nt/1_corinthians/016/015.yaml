theological_decisions:
- issue: Rendering of ἀδελφοί in congregational address
  chosen_reading: brothers
  alternative_readings:
  - brothers and sisters
  rationale: The translation follows the project's gender-accurate policy by preserving
    the masculine form in the main text while recognizing the likely mixed audience
    in Corinth. The inclusive force is preserved in a footnote rather than replacing
    the source-form in the text.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Rendering of ἀπαρχὴ τῆς Ἀχαΐας
  chosen_reading: the firstfruits of Achaia
  alternative_readings:
  - the first converts of Achaia
  rationale: Retaining 'firstfruits' preserves Paul's metaphorical and possibly consecratory
    language rather than resolving it into a purely interpretive paraphrase. The temporal
    sense can be noted in a footnote.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3
