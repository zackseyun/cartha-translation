id: 1CO.16.2
reference: 1 Corinthians 16:2
source:
  edition: SBLGNT
  text: κατὰ μίαν ⸀σαββάτου ἕκαστος ὑμῶν παρ’ ἑαυτῷ τιθέτω θησαυρίζων ὅ τι ⸀ἐὰν εὐοδῶται,
    ἵνα μὴ ὅταν ἔλθω τότε λογεῖαι γίνωνται.
translation:
  text: On the first day of every week, each of you is to set something aside, storing
    up whatever he may prosper in, so that collections will not be made when I come.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'On the first day of the week'; the Greek expression is distributive
      here, indicating a regular weekly practice.
    reason: lexical_alternative
  - marker: b
    text: Literally 'by himself' or 'with himself.' This may mean each person should
      set the money aside personally, possibly at home.
    reason: lexical_alternative
  - marker: c
    text: Or 'in keeping with how he prospers.' The sense is that each person should
      give according to whatever prosperity he has received.
    reason: lexical_alternative
lexical_decisions:
- source_word: κατὰ μίαν σαββάτου
  chosen: On the first day of every week
  alternatives:
  - On the first day of the week
  - Every first day of the week
  lexicon: BDAG
  rationale: The idiom κατά + accusative with μίαν σαββάτου is distributive, indicating
    regular recurrence. In this context Paul gives a repeated weekly practice, so
    'on the first day of every week' best captures the force in natural English. 'Of
    the week' is a possible more formal rendering and is preserved as an alternative.
- source_word: ἕκαστος ὑμῶν
  chosen: each of you
  lexicon: BDAG
  rationale: Straightforward distributive expression applying the instruction individually
    to all members of the audience.
- source_word: παρ’ ἑαυτῷ
  chosen: set something aside
  alternatives:
  - by himself
  - at home
  lexicon: BDAG
  rationale: The phrase literally means 'by himself/with himself,' but in context
    with τιθέτω and θησαυρίζων it refers to putting funds aside personally rather
    than taking up the collection upon Paul's arrival. English idiom requires the
    sense to be carried by the verbal phrase. The more literal possibilities are preserved
    as alternatives and noted in a footnote because the phrase has been understood
    either as private saving at home or as setting aside personally.
- source_word: τιθέτω
  chosen: is to set
  alternatives:
  - let him put
  - should place
  lexicon: BDAG
  rationale: Present active imperative, third singular, expressing ongoing instruction.
    'Is to set' gives clear modern English with imperative force.
- source_word: θησαυρίζων
  chosen: storing up
  alternatives:
  - saving
  - laying up in store
  lexicon: BDAG
  rationale: 'The participle adds the manner or attendant action of τιθέτω: the money
    is to be accumulated over time. ''Storing up'' preserves the treasury/saving nuance
    without archaic phrasing.'
- source_word: ὅ τι ἐὰν εὐοδῶται
  chosen: whatever he may prosper in
  alternatives:
  - whatever he may be prospered with
  - whatever he may earn
  - in keeping with how he prospers
  lexicon: BDAG
  rationale: The clause is indefinite and conditional, referring to whatever amount
    corresponds to one's prosperity. The passive/middle form εὐοδῶται is idiomatically
    difficult in English; this rendering keeps the connection to prosperity while
    remaining readable. A more idiomatic sense, 'in keeping with how he prospers,'
    is preserved in a footnote as a lexical alternative.
- source_word: ἵνα μὴ ὅταν ἔλθω τότε
  chosen: so that ... when I come
  alternatives:
  - so that ... whenever I come
  lexicon: BDAG
  rationale: 'Purpose clause with temporal subclause: the weekly setting aside is
    intended to prevent last-minute fundraising at Paul''s arrival. ''When I come''
    is the most natural English equivalent here.'
- source_word: λογεῖαι γίνωνται
  chosen: collections will not be made
  alternatives:
  - collections may not take place
  - there may be no collections
  lexicon: BDAG
  rationale: λογεῖαι refers to collections, specifically monetary collections in this
    context. γίνωνται with λογεῖαι is naturally rendered as 'be made' or 'take place.'
    'Will not be made' fits the purpose clause smoothly in English.
