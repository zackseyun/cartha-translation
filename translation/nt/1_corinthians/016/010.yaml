theological_decisions:
- issue: Reference of 'the Lord' in κυρίου
  chosen_reading: '''the Lord'' is retained without specifying beyond the Greek text'
  alternative_readings:
  - explicitly identifying the referent as Jesus in translation
  rationale: In Pauline usage the referent is very likely the Lord Jesus, but the
    Greek text simply says 'the Lord.' The translation preserves the text's wording
    and does not import an explanatory identification into the main text.
  doctrine_reference: 'Affirmations; Translation philosophy #1 and #3'
