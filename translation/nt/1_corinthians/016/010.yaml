id: 1CO.16.10
reference: 1 Corinthians 16:10
source:
  edition: SBLGNT
  text: Ἐὰν δὲ ἔλθῃ Τιμόθεος, βλέπετε ἵνα ἀφόβως γένηται πρὸς ὑμᾶς, τὸ γὰρ ἔργον κυρίου
    ἐργάζεται ὡς ⸀κἀγώ·
translation:
  text: Now if Timothy comes, see that he is with you without fear, for he is doing
    the Lord’s work, as I also am.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'see that he may be among you without fear.' The Greek expression can
      emphasize Timothy’s being present among them in a state free from fear.
    reason: lexical_alternative
  - marker: b
    text: Or 'for he works the work of the Lord, as I also do.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐὰν δὲ
  chosen: Now if
  alternatives:
  - But if
  - If then
  lexicon: BDAG
  rationale: Renders the conditional particle ἐάν with δέ as a natural transition
    in English. 'Now if' preserves both the conditional sense and the mild discourse
    shift without sounding overly adversative.
- source_word: ἔλθῃ Τιμόθεος
  chosen: Timothy comes
  alternatives:
  - Timothy should come
  - Timothy arrives
  lexicon: BDAG
  rationale: Aorist subjunctive after ἐάν forms a future-more-vivid condition. 'Comes'
    is idiomatic English for the contingency; 'arrives' is possible but less natural
    here.
- source_word: βλέπετε
  chosen: see that
  alternatives:
  - take care that
  - make sure that
  - watch that
  lexicon: BDAG
  rationale: Imperative calling for active concern or vigilance. 'See that' is concise
    and idiomatic, fitting the following ἵνα clause.
- source_word: ἵνα ἀφόβως γένηται πρὸς ὑμᾶς
  chosen: he is with you without fear
  alternatives:
  - he may be among you without fear
  - he may be with you fearlessly
  - he may feel safe with you
  lexicon: BDAG
  rationale: γένηται with πρὸς ὑμᾶς is somewhat idiomatic, expressing Timothy's state/presence
    in relation to them. 'He is with you without fear' preserves the relational sense
    and avoids overinterpreting as merely internal emotion ('feel safe') while remaining
    natural English.
- source_word: ἀφόβως
  chosen: without fear
  alternatives:
  - fearlessly
  - unafraid
  lexicon: BDAG
  rationale: The adverb denotes freedom from fear. 'Without fear' is slightly more
    transparent than 'fearlessly' and fits the pastoral concern of the context.
- source_word: τὸ γὰρ ἔργον κυρίου
  chosen: the Lord’s work
  alternatives:
  - the work of the Lord
  lexicon: BDAG
  rationale: A straightforward genitival construction. The possessive form is natural
    modern English while preserving the sense that the work belongs to or is defined
    by the Lord.
- source_word: κυρίου
  chosen: Lord’s
  alternatives:
  - Master's
  lexicon: BDAG
  rationale: Per doctrine, κύριος is rendered 'Lord.' No contextual reason warrants
    variance.
- source_word: ἐργάζεται
  chosen: he is doing
  alternatives:
  - he works
  - he is engaged in
  lexicon: BDAG
  rationale: Present middle conveys ongoing activity. 'He is doing' brings out the
    progressive sense in natural English and pairs well with 'the Lord’s work.'
- source_word: ὡς κἀγώ
  chosen: as I also am
  alternatives:
  - as I also do
  - just as I do
  lexicon: BDAG
  rationale: κἀγώ = καὶ ἐγώ, 'I also.' The ellipsis after ὡς can be completed in English
    either with 'do' or 'am.' Because the preceding clause is 'he is doing the Lord’s
    work,' 'as I also am' naturally echoes the progressive verbal idea without awkward
    repetition, while preserving Paul's alignment of Timothy's ministry with his own.
