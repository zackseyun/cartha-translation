id: 1CO.16.7
reference: 1 Corinthians 16:7
source:
  edition: SBLGNT
  text: οὐ θέλω γὰρ ὑμᾶς ἄρτι ἐν παρόδῳ ἰδεῖν, ἐλπίζω ⸀γὰρ χρόνον τινὰ ἐπιμεῖναι πρὸς
    ὑμᾶς, ἐὰν ὁ κύριος ⸀ἐπιτρέψῃ.
translation:
  text: For I do not want to see you now in passing, for I hope to remain with you
    for some time, if the Lord permits.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'while passing through' or 'on the way.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐ θέλω
  chosen: I do not want
  alternatives:
  - I do not wish
  - I am not willing
  lexicon: BDAG
  rationale: θέλω here expresses Paul's desire/intention rather than volition in a
    strongly formal sense. 'I do not want' is natural modern English and preserves
    the personal force.
- source_word: ἄρτι
  chosen: now
  alternatives:
  - at present
  - for the present
  lexicon: BDAG
  rationale: ἄρτι marks the present moment/current circumstance. 'Now' is concise
    and idiomatic.
- source_word: ἐν παρόδῳ
  chosen: in passing
  alternatives:
  - while passing through
  - on the way
  lexicon: BDAG
  rationale: The phrase denotes a brief stop made en route rather than a settled visit.
    'In passing' preserves the idiom compactly while communicating the transient nature
    of the visit.
- source_word: ἰδεῖν
  chosen: to see
  alternatives:
  - to visit
  lexicon: BDAG
  rationale: The infinitive literally means 'to see.' In context it implies visiting,
    but 'to see' is sufficiently natural in English and stays closer to the Greek.
- source_word: ἐλπίζω
  chosen: I hope
  alternatives:
  - I expect
  - I trust
  lexicon: BDAG
  rationale: Paul expresses expectation/desire without certainty. 'I hope' best captures
    the nuance.
- source_word: χρόνον τινά
  chosen: for some time
  alternatives:
  - for a while
  - for a certain time
  lexicon: BDAG
  rationale: The phrase indicates an indefinite but meaningful duration. 'For some
    time' is idiomatic and slightly weightier than 'for a while.'
- source_word: ἐπιμεῖναι
  chosen: to remain
  alternatives:
  - to stay
  - to spend time
  lexicon: BDAG
  rationale: ἐπιμένω means to stay on/remain. 'Remain' preserves the sense of continuing
    presence, though 'stay' is possible.
- source_word: πρὸς ὑμᾶς
  chosen: with you
  alternatives:
  - among you
  - at your place
  lexicon: BDAG
  rationale: With verbs of staying, πρὸς plus persons naturally conveys being in their
    company/presence. 'With you' is the most idiomatic English rendering.
- source_word: ἐὰν ὁ κύριος ἐπιτρέψῃ
  chosen: if the Lord permits
  alternatives:
  - if the Lord allows
  lexicon: BDAG
  rationale: This is a standard conditional expression of dependence on the Lord's
    will. 'Permits' is slightly more traditional and fits the tone well.
- source_word: κύριος
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Per doctrine defaults, κύριος is rendered 'Lord.' In this context it
    most naturally refers to the Lord Jesus or to the Lord in divine sovereignty without
    needing further specification.
