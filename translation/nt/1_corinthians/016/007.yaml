- issue: Referent of 'the Lord'
  chosen_reading: Render simply as 'the Lord' without specifying Jesus or God the
    Father.
  alternative_readings:
  - the Lord Jesus
  - God
  rationale: The Greek text uses κύριος without explicit specification. The translation
    should preserve the text's wording and theological openness rather than resolve
    the referent beyond what the verse states.
