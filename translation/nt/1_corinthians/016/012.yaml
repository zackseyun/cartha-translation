theological_decisions:
- issue: Subject and sense of οὐκ ἦν θέλημα
  chosen_reading: The clause refers to Apollos's own will/desire, not to an impersonal
    divine prohibition.
  alternative_readings:
  - it was not God's will for him to come now
  - there was no desire/willingness in a vague impersonal sense
  rationale: The nearest and most natural referent is Apollos, whom Paul has just
    mentioned and urged. Nothing in the immediate context signals a shift to divine
    will, and importing that would add theological content not stated by the text.
  doctrine_reference: 'Translation philosophy: Do not import doctrinal claims the
    text does not make; preserve the source text''s plain sense.'
