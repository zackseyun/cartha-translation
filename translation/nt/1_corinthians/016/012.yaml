id: 1CO.16.12
reference: 1 Corinthians 16:12
source:
  edition: SBLGNT
  text: Περὶ δὲ Ἀπολλῶ τοῦ ἀδελφοῦ, πολλὰ παρεκάλεσα αὐτὸν ἵνα ἔλθῃ πρὸς ὑμᾶς μετὰ
    τῶν ἀδελφῶν· καὶ πάντως οὐκ ἦν θέλημα ἵνα νῦν ἔλθῃ, ἐλεύσεται δὲ ὅταν εὐκαιρήσῃ.
translation:
  text: Now concerning Apollos the brother, I strongly urged him to come to you with
    the brothers; but it was not at all his will to come now. Yet he will come when
    he has opportunity.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'our brother.' The Greek reads 'the brother' without an explicit possessive
      pronoun.
    reason: lexical_alternative
  - marker: b
    text: Or, 'he was not at all willing to come now.' The Greek more literally says,
      'it was not at all his will to come now.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Περὶ δὲ
  chosen: Now concerning
  alternatives:
  - Now about
  - As for
  lexicon: BDAG
  rationale: A standard epistolary transition introducing a new subject. 'Now concerning'
    preserves the discourse marker force of περὶ δὲ without sounding overly stiff.
- source_word: Ἀπολλῶ
  chosen: Apollos
  rationale: Personal names are transliterated by standard convention per translation
    philosophy.
- source_word: τοῦ ἀδελφοῦ
  chosen: the brother
  alternatives:
  - our brother
  lexicon: BDAG
  rationale: The Greek has the article with ἀδελφός but no explicit possessive pronoun.
    'The brother' is the most direct rendering. 'Our brother' is idiomatic in English
    and contextually possible, but it adds a possessive not present in the text.
- source_word: πολλὰ παρεκάλεσα
  chosen: I strongly urged
  alternatives:
  - I urged him much
  - I repeatedly urged
  lexicon: BDAG
  rationale: πολλὰ with παρακαλέω intensifies the appeal. 'Strongly urged' communicates
    the force naturally in English better than a wooden 'urged much'.
- source_word: ἵνα ἔλθῃ
  chosen: to come
  alternatives:
  - that he should come
  lexicon: BDAG
  rationale: The ἵνα clause expresses the content/purpose of Paul's urging. English
    infinitive style is natural and accurate here.
- source_word: πρὸς ὑμᾶς
  chosen: to you
  alternatives:
  - to visit you
  lexicon: BDAG
  rationale: πρός with accusative here indicates movement toward the Corinthians.
    'To you' is sufficiently direct; 'visit' would add nuance not explicit in the
    Greek.
- source_word: μετὰ τῶν ἀδελφῶν
  chosen: with the brothers
  alternatives:
  - with the brothers and sisters
  - with the brethren
  lexicon: BDAG
  rationale: ἀδελφῶν is grammatically masculine plural. Per gender-accurate policy,
    'brothers' is retained in the main text. In this context it likely refers to specific
    male coworkers/traveling brothers rather than a generic mixed congregation, so
    no inclusive expansion is warranted.
- source_word: καὶ πάντως
  chosen: but ... not at all
  alternatives:
  - and certainly ... not
  - and absolutely ... not
  lexicon: BDAG
  rationale: πάντως intensifies the negation that follows. Rendering the force as
    'not at all' captures the emphatic denial in idiomatic English.
- source_word: οὐκ ἦν θέλημα
  chosen: it was not at all his will
  alternatives:
  - he was not at all willing
  - it was not his desire
  lexicon: BDAG
  rationale: The clause is literally about 'will/desire,' and the implied possessor
    is Apollos from context. 'It was not at all his will' preserves the noun θέλημα
    rather than converting too quickly to an adjectival paraphrase.
- source_word: νῦν
  chosen: now
  alternatives:
  - at present
  lexicon: BDAG
  rationale: Temporal adverb indicating the present time; 'now' is the plain sense.
- source_word: ἐλεύσεται δὲ
  chosen: Yet he will come
  alternatives:
  - But he will come
  lexicon: BDAG
  rationale: δέ marks a mild contrast after the refusal. 'Yet' fits the concessive
    flow in English after the previous negative statement.
- source_word: ὅταν εὐκαιρήσῃ
  chosen: when he has opportunity
  alternatives:
  - when he finds a good opportunity
  - when it is convenient for him
  lexicon: BDAG
  rationale: εὐκαιρέω means to have a favorable opportunity or suitable time. 'When
    he has opportunity' is concise and avoids the potentially misleading modern connotation
    of mere personal convenience.
