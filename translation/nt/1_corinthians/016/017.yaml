id: 1CO.16.17
reference: 1 Corinthians 16:17
source:
  edition: SBLGNT
  text: χαίρω δὲ ἐπὶ τῇ παρουσίᾳ Στεφανᾶ καὶ Φορτουνάτου καὶ Ἀχαϊκοῦ, ὅτι τὸ ⸀ὑμέτερον
    ὑστέρημα οὗτοι ἀνεπλήρωσαν,
translation:
  text: And I rejoice at the coming of Stephanas and Fortunatus and Achaicus, because
    these men have made up for your absence.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'what was lacking from you these men supplied.' Paul likely refers to
      the Corinthians' inability to be present with him personally, not to a moral
      deficiency.
    reason: lexical_alternative
lexical_decisions:
- source_word: χαίρω
  chosen: I rejoice
  alternatives:
  - I am glad
  - I rejoice greatly
  lexicon: BDAG
  rationale: Present indicative first person singular; 'I rejoice' preserves the direct
    personal expression and fits Paul's epistolary tone better than the flatter 'I
    am glad.'
- source_word: δὲ
  chosen: And
  alternatives:
  - Now
  - But
  lexicon: BDAG
  rationale: δέ here is a mild connective rather than a strong contrast. 'And' gives
    natural English flow while preserving continuity with the preceding context.
- source_word: ἐπὶ τῇ παρουσίᾳ
  chosen: at the coming
  alternatives:
  - at the presence
  - over the arrival
  lexicon: BDAG
  rationale: παρουσία in this context refers to the personal arrival/presence of these
    coworkers, not the technical eschatological sense. 'At the coming' is natural
    and sufficiently close to the Greek.
- source_word: Στεφανᾶ καὶ Φορτουνάτου καὶ Ἀχαϊκοῦ
  chosen: Stephanas and Fortunatus and Achaicus
  rationale: Personal names are transliterated by standard conventions per translation
    philosophy.
- source_word: ὅτι
  chosen: because
  alternatives:
  - for
  - that
  lexicon: BDAG
  rationale: Introduces the reason for Paul's rejoicing. 'Because' is the clearest
    modern English rendering.
- source_word: τὸ ὑμέτερον ὑστέρημα
  chosen: your absence
  alternatives:
  - what was lacking from you
  - your deficiency
  - your lack
  lexicon: BDAG
  rationale: ὑστέρημα literally denotes lack or deficiency, but in context Paul is
    not rebuking the Corinthians morally; he means that their inability to be personally
    present with him has been compensated for by these delegates. 'Your absence' best
    captures the contextual sense in idiomatic English.
- source_word: οὗτοι
  chosen: these men
  alternatives:
  - these
  - they
  lexicon: BDAG
  rationale: The demonstrative is emphatic. 'These men' makes the referent explicit
    in English and reflects the personal emphasis on Stephanas, Fortunatus, and Achaicus.
- source_word: ἀνεπλήρωσαν
  chosen: have made up for
  alternatives:
  - have supplied
  - have filled up
  lexicon: BDAG
  rationale: The verb means to fill up or supply what is lacking. 'Have made up for'
    communicates the idiomatic sense in this relational context better than the more
    wooden 'have supplied.'
