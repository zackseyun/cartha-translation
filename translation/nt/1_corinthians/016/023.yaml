id: 1CO.16.23
reference: 1 Corinthians 16:23
source:
  edition: SBLGNT
  text: ἡ χάρις τοῦ κυρίου ⸀Ἰησοῦ μεθ’ ὑμῶν.
translation:
  text: The grace of the Lord Jesus be with you.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: χάρις
  chosen: grace
  alternatives:
  - favor
  - gracious favor
  lexicon: BDAG
  rationale: Standard Pauline benediction term denoting gracious favor/blessing from
    the Lord. 'Grace' is the established and most semantically fitting English equivalent
    here, preserving both theological weight and natural English style.
- source_word: κύριος
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Per doctrine default for κύριος, 'Lord' best reflects the title's NT
    usage and christological force. 'Master' is possible lexically but is less idiomatic
    in Pauline benedictions and would underrepresent the title's established theological
    resonance.
- source_word: Ἰησοῦ
  chosen: Jesus
  lexicon: BDAG
  rationale: Personal name, so transliterated rather than translated, in keeping with
    the translation philosophy.
- source_word: μεθ’ ὑμῶν
  chosen: be with you
  alternatives:
  - with you
  lexicon: BDAG
  rationale: The Greek phrase literally means 'with you,' but English benedictory
    style normally supplies the implied optative/elliptical sense as 'be with you.'
    This makes the blessing natural in English without adding meaning beyond what
    the formula conventionally conveys.
- source_word: τοῦ κυρίου Ἰησοῦ
  chosen: of the Lord Jesus
  alternatives:
  - from the Lord Jesus
  lexicon: BDAG
  rationale: 'The genitive is most naturally rendered as possession/source within
    the noun phrase: ''the grace of the Lord Jesus.'' ''From the Lord Jesus'' makes
    the source explicit, but the more literal phrasing better matches the Greek structure
    while remaining clear.'
