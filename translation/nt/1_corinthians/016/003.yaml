  from: I will send to Jerusalem with letters those whom you approve, to carry your gift.
  to: I will send those whom you approve with letters to carry your gift to Jerusalem.
  rationale: The current word order separates the verb ('send') from its direct object ('those whom you approve') with two prepositional phrases. This creates an awkward and difficult-to-parse sentence structure in English. The suggested rewrite places the object immediately after the verb and keeps the infinitive phrase of purpose ('to carry your gift to Jerusalem') together, resulting in a much clearer and more natural sentence.
