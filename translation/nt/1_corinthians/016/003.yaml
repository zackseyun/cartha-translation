id: 1CO.16.3
reference: 1 Corinthians 16:3
source:
  edition: SBLGNT
  text: ὅταν δὲ παραγένωμαι, οὓς ⸀ἐὰν δοκιμάσητε δι’ ἐπιστολῶν, τούτους πέμψω ἀπενεγκεῖν τὴν χάριν ὑμῶν εἰς Ἰερουσαλήμ·
translation:
  text: And when I arrive, I will send those whom you approve with letters to carry your gift to Jerusalem.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your gracious gift'; the Greek word can also mean 'grace,' but here it refers to the contribution being sent to Jerusalem.
    reason: lexical_alternative
  - marker: b
    text: Or 'I will send to Jerusalem with letters those whom you approve, to carry your gift.'.
    reason: previous_rendering
lexical_decisions:
- source_word: ὅταν δὲ παραγένωμαι
  chosen: And when I arrive
  alternatives:
  - But when I come
  - Now when I arrive
  lexicon: BDAG
  rationale: ὅταν with the aorist subjunctive παραγένωμαι introduces a future contingency, naturally rendered 'when I arrive.' δέ is lightly connective here; 'And' preserves the flow without overstating contrast.
- source_word: οὓς ἐὰν δοκιμάσητε
  chosen: those whom you approve
  alternatives:
  - whomever you approve
  - those whom you test and approve
  lexicon: BDAG
  rationale: δοκιμάζω can mean 'test, examine, approve after testing.' In this context of selecting delegates, English idiom favors 'approve,' while the idea of prior evaluation remains implicit.
- source_word: δι’ ἐπιστολῶν
  chosen: with letters
  alternatives:
  - by letters
  - through letters
  - with letters of recommendation
  lexicon: BDAG
  rationale: διά with the genitive can express means or instrument. 'With letters' is concise and natural in English, indicating that Paul will send the approved men accompanied by letters. 'Letters of recommendation' is interpretive and therefore left as an alternative only.
- source_word: τούτους πέμψω
  chosen: I will send
  alternatives:
  - these I will send
  - I will send these men
  lexicon: BDAG
  rationale: τούτους is resumptive and emphatic, pointing back to the approved persons. English usually does not require explicit repetition, so 'I will send' communicates the sense smoothly; the object is already supplied by 'those whom you approve.'
- source_word: ἀπενεγκεῖν
  chosen: to carry
  alternatives:
  - to take
  - to bring
  lexicon: BDAG
  rationale: 'The infinitive expresses purpose: the delegates are sent in order to transport the collection. ''Carry'' fits the concrete sense well. ''Bring'' is less suitable from the Corinthians'' perspective toward Jerusalem.'
- source_word: τὴν χάριν ὑμῶν
  chosen: your gift
  alternatives:
  - your gracious gift
  - your grace
  - your offering
  lexicon: BDAG
  rationale: χάρις here refers to the charitable contribution for Jerusalem, not abstract 'grace.' 'Your gift' is clear modern English; 'gracious gift' preserves more of the lexical nuance but is slightly heavier. Because χάρις can be heard more literally, that alternative is preserved in a footnote.
- source_word: εἰς Ἰερουσαλήμ
  chosen: to Jerusalem
  alternatives:
  - into Jerusalem
  lexicon: BDAG
  rationale: εἰς with a city name is idiomatically rendered 'to Jerusalem' in English.
