theological_decisions:
- issue: Meaning of χάρις in the collection context
  chosen_reading: Material gift/contribution for the Jerusalem believers
  alternative_readings:
  - grace in a more abstract sense
  - gracious act
  rationale: In 1 Corinthians 16 the context is the collection for the saints, so χάρις denotes the concrete gift or contribution, though the term retains an undertone of gracious generosity. Rendering it as 'gift' avoids importing a theological abstraction the immediate context does not support.
  doctrine_reference: Translation philosophy §§1, 6
