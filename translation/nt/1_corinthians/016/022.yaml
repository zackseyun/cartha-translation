id: 1CO.16.22
reference: 1 Corinthians 16:22
source:
  edition: SBLGNT
  text: εἴ τις οὐ φιλεῖ τὸν ⸀κύριον, ἤτω ἀνάθεμα. ⸂Μαράνα θά⸃.
translation:
  text: If anyone does not love the Lord, let him be accursed. Marana tha.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or traditional: ''anathema''; that is, under a curse.'
    reason: lexical_alternative
  - marker: b
    text: Aramaic. Possibly 'Our Lord, come!' or 'Our Lord has come.'
    reason: alternative_reading
lexical_decisions:
- source_word: φιλεῖ
  chosen: does not love
  alternatives:
  - does not have affection for
  - does not cherish
  lexicon: BDAG
  rationale: φιλέω here denotes personal love/affection toward the Lord. 'Love' is
    the most natural and idiomatic English rendering and preserves the force of Paul's
    warning without over-specifying a nuance such as mere friendship or emotional
    warmth.
- source_word: κύριον
  chosen: the Lord
  alternatives:
  - the master
  lexicon: BDAG
  rationale: Per doctrine default, κύριος is rendered 'Lord.' In this Pauline context
    it refers to Jesus with christological weight, and 'Lord' best preserves both
    title and established NT usage.
- source_word: ἤτω
  chosen: let him be
  alternatives:
  - let that person be
  - he is to be
  lexicon: BDAG
  rationale: The present imperative of εἰμί functions jussively. 'Let him be' is a
    clear English equivalent for the imprecatory/judicial force of the clause.
- source_word: ἀνάθεμα
  chosen: accursed
  alternatives:
  - anathema
  - under a curse
  lexicon: BDAG
  rationale: ἀνάθεμα denotes one devoted to destruction or under divine curse. 'Accursed'
    communicates the sense in readable modern English better than the untranslated
    'anathema,' while retaining the solemn judicial force. The traditional term is
    worth preserving in a footnote.
- source_word: Μαράνα θά
  chosen: Marana tha
  alternatives:
  - Our Lord, come!
  - Our Lord has come
  lexicon: BDAG
  rationale: This is an Aramaic expression preserved in Greek letters. Because its
    exact parsing and sense are debated, transliteration in the main text best preserves
    the source form, while the principal interpretive options are given in a footnote
    for transparency.
