theological_decisions:
- issue: Sense of the Aramaic expression Μαράνα θά
  chosen_reading: 'Retain as transliteration in the main text: ''Marana tha.'''
  alternative_readings:
  - Our Lord, come!
  - Our Lord has come.
  rationale: The phrase is textually stable but semantically debated due to how the
    Aramaic is divided and understood. Transliteration preserves the original liturgical/exclamatory
    character without prematurely resolving the debate. The leading interpretive options
    are preserved in a footnote, in keeping with the principle of preserving theological
    tension where the source is genuinely ambiguous.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
