id: 1CO.16.19
reference: 1 Corinthians 16:19
source:
  edition: SBLGNT
  text: Ἀσπάζονται ὑμᾶς αἱ ἐκκλησίαι τῆς Ἀσίας. ⸀ἀσπάζεται ὑμᾶς ἐν κυρίῳ πολλὰ Ἀκύλας
    καὶ ⸀Πρίσκα σὺν τῇ κατ’ οἶκον αὐτῶν ἐκκλησίᾳ.
translation:
  text: The churches of Asia greet you. Aquila and Prisca, together with the church
    in their house, greet you warmly in the Lord.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '"Asia" here refers to the Roman province of Asia in western Asia Minor,
      not the modern continent.'
    reason: cultural_note
  - marker: b
    text: Greek has "Prisca"; elsewhere she is also called "Priscilla" (for example,
      Acts 18:2, 18, 26; Rom. 16:3).
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀσπάζονται / ἀσπάζεται
  chosen: greet / greet
  alternatives:
  - send greetings to
  - greet warmly
  lexicon: BDAG
  rationale: ἀσπάζομαι commonly means to greet or send greetings. English 'greet'
    is natural and sufficiently formal. The second clause is intensified by πολλὰ,
    so the warmth is expressed there rather than by changing the core verb itself.
- source_word: αἱ ἐκκλησίαι
  chosen: the churches
  alternatives:
  - the assemblies
  lexicon: BDAG
  rationale: ἐκκλησία in Pauline usage ordinarily refers to Christian congregations/churches.
    'Churches' is the clearest and most idiomatic rendering here for multiple local
    congregations.
- source_word: τῆς Ἀσίας
  chosen: of Asia
  alternatives:
  - of the province of Asia
  lexicon: BDAG
  rationale: Ἀσία here refers to the Roman province in western Asia Minor, not the
    modern continent. The simple rendering 'Asia' preserves the Greek form; the provincial
    sense is worth clarifying in a footnote rather than expanding the main text.
- source_word: ἐν κυρίῳ
  chosen: in the Lord
  alternatives:
  - in the Lord Jesus
  - as fellow believers in the Lord
  lexicon: BDAG
  rationale: κύριος should be translated 'Lord' per doctrine guidance. The phrase
    is a standard Pauline qualifier indicating Christian fellowship or sphere; 'in
    the Lord' preserves the theological and relational nuance without over-specifying.
- source_word: πολλὰ
  chosen: warmly
  alternatives:
  - much
  - many times
  - heartily
  lexicon: BDAG
  rationale: As an adverbial accusative with ἀσπάζεται, πολλὰ intensifies the greeting.
    Literal 'much' is awkward in English; 'warmly' communicates the idiomatic force
    in readable modern English.
- source_word: Ἀκύλας καὶ Πρίσκα
  chosen: Aquila and Prisca
  alternatives:
  - Aquila and Priscilla
  lexicon: BDAG
  rationale: Personal names are transliterated. The Greek text here reads Πρίσκα,
    the shorter form, so 'Prisca' best reflects the source text; the more familiar
    'Priscilla' should be preserved in a footnote as an alternate name form known
    from other passages.
- source_word: σὺν τῇ κατ’ οἶκον αὐτῶν ἐκκλησίᾳ
  chosen: together with the church in their house
  alternatives:
  - with the church that meets in their house
  - along with their house church
  lexicon: BDAG
  rationale: κατ’ οἶκον literally means 'according to house' and idiomatically denotes
    a gathering in a home. 'The church in their house' is a close, natural rendering
    that avoids importing the interpretive expansion 'meets' into the main text while
    still conveying the sense.
