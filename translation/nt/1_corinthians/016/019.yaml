theological_decisions:
- issue: Sense of ἐκκλησία in a domestic setting
  chosen_reading: '''the church in their house'' refers to a local Christian congregation
    gathering in Aquila and Prisca''s home'
  alternative_readings:
  - '''their household/church'' as a more institutional label'
  rationale: The phrase most naturally denotes a congregation meeting in a private
    home, not merely the family itself. This is ecclesiological rather than denominational
    and follows normal Pauline usage of ἐκκλησία.
  doctrine_reference: Translation philosophy §§1, 5
- issue: Rendering of κύριος
  chosen_reading: Lord
  alternative_readings:
  - Master
  rationale: DOCTRINE.md lists κύριος → 'Lord' as the default rendering. In this Pauline
    phrase, 'Lord' preserves both confessional and relational force without narrowing
    the referent beyond the text.
  doctrine_reference: 'Contested terms: κύριος *Kyrios*'
