id: 1CO.16.1
reference: 1 Corinthians 16:1
source:
  edition: SBLGNT
  text: Περὶ δὲ τῆς λογείας τῆς εἰς τοὺς ἁγίους, ὥσπερ διέταξα ταῖς ἐκκλησίαις τῆς
    Γαλατίας, οὕτως καὶ ὑμεῖς ποιήσατε.
translation:
  text: Now concerning the collection for the saints, as I directed the churches of
    Galatia, so you also are to do.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Now about the collection for God's people.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Περὶ δὲ
  chosen: Now concerning
  alternatives:
  - Now about
  - Concerning
  lexicon: BDAG
  rationale: A standard epistolary transition introducing a new topic. 'Now concerning'
    preserves the discourse marker force of περὶ δὲ in Paul.
- source_word: λογείας
  chosen: collection
  alternatives:
  - contribution
  - offering
  lexicon: BDAG
  rationale: λογεία refers to a monetary collection. 'Collection' is the most natural
    modern English rendering and avoids over-specifying it as a cultic 'offering'.
- source_word: τῆς εἰς τοὺς ἁγίους
  chosen: for the saints
  alternatives:
  - for the holy ones
  - for God's people
  lexicon: BDAG
  rationale: The prepositional phrase indicates the destination/beneficiaries of the
    collection. 'Saints' is a standard Pauline rendering for ἅγιοι and preserves the
    covenant-community sense without paraphrase.
- source_word: διέταξα
  chosen: I directed
  alternatives:
  - I instructed
  - I ordered
  lexicon: BDAG
  rationale: διατάσσω can carry the sense of giving instructions or directing. 'Directed'
    preserves Paul's apostolic authority without sounding unnecessarily harsh as 'ordered'
    might in English.
- source_word: ἐκκλησίαις
  chosen: churches
  alternatives:
  - assemblies
  lexicon: BDAG
  rationale: In Pauline usage ἐκκλησία refers to Christian congregations. 'Churches'
    is the established and accurate rendering here.
- source_word: Γαλατίας
  chosen: Galatia
  lexicon: BDAG
  rationale: Standard transliteration of the Roman provincial/geographical name.
- source_word: οὕτως καὶ ὑμεῖς ποιήσατε
  chosen: so you also are to do
  alternatives:
  - so you also should do
  - do likewise
  lexicon: BDAG
  rationale: The aorist imperative calls for corresponding action. 'Are to do' communicates
    directive force in natural English while preserving the comparison introduced
    by οὕτως.
