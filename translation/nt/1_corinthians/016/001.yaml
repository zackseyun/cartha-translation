theological_decisions:
- issue: Rendering ἅγιοι in a financial-relief context
  chosen_reading: saints
  alternative_readings:
  - God's people
  - holy ones
  rationale: Paul commonly uses ἅγιοι as a designation for believers. 'Saints' preserves
    the lexical and theological continuity of Paul's language without importing later
    canonization concepts.
