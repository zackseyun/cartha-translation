id: 1CO.16.11
reference: 1 Corinthians 16:11
source:
  edition: SBLGNT
  text: μή τις οὖν αὐτὸν ἐξουθενήσῃ. προπέμψατε δὲ αὐτὸν ἐν εἰρήνῃ, ἵνα ἔλθῃ πρός
    ⸀με, ἐκδέχομαι γὰρ αὐτὸν μετὰ τῶν ἀδελφῶν.
translation:
  text: So then, let no one despise him. But send him on his way in peace, so that
    he may come to me, for I am expecting him with the brothers.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with the brothers and sisters,' if Paul means the wider group of fellow
      believers or coworkers accompanying him in expectation.
    reason: lexical_alternative
lexical_decisions:
- source_word: μή τις οὖν
  chosen: So then, let no one
  alternatives:
  - Therefore let no one
  - So let no one
  lexicon: BDAG
  rationale: μή with the aorist subjunctive forms a prohibition ('let no one...').
    οὖν is carried by 'so then' to preserve the inferential connection without sounding
    wooden.
- source_word: ἐξουθενήσῃ
  chosen: despise
  alternatives:
  - look down on
  - treat with contempt
  lexicon: BDAG
  rationale: The verb means to regard as of no account or to disdain. 'Despise' is
    concise and strong, fitting Paul's concern that Timothy not be belittled.
- source_word: προπέμψατε
  chosen: send him on his way
  alternatives:
  - send him forward
  - help him on his journey
  lexicon: BDAG
  rationale: The verb commonly refers to accompanying or assisting someone for onward
    travel. 'Send him on his way' captures the travel-assistance sense in natural
    English better than a bare 'send him.'
- source_word: ἐν εἰρήνῃ
  chosen: in peace
  alternatives:
  - peacefully
  - with peace
  lexicon: BDAG
  rationale: The prepositional phrase is retained fairly literally. In this context
    it conveys a peaceful, unhindered, and supportive departure.
- source_word: ἵνα ἔλθῃ πρός με
  chosen: so that he may come to me
  alternatives:
  - that he may come to me
  - so he can come to me
  lexicon: BDAG
  rationale: ἵνα with the subjunctive expresses purpose. 'So that he may come to me'
    preserves that purposive nuance.
- source_word: ἐκδέχομαι
  chosen: I am expecting
  alternatives:
  - I am waiting for
  - I await
  lexicon: BDAG
  rationale: The present middle indicates ongoing expectation. 'I am expecting' is
    idiomatic and conveys active anticipation.
- source_word: μετὰ τῶν ἀδελφῶν
  chosen: with the brothers
  alternatives:
  - with the brothers and sisters
  - with the brethren
  lexicon: BDAG
  rationale: ἀδελφῶν is grammatically masculine plural and often refers to fellow
    believers. Per the gender-accurate policy, 'brothers' is retained in the main
    text; inclusivity can be clarified in a footnote because the referent may be a
    mixed group of fellow workers.
