theological_decisions:
- issue: Rendering of ἀδελφῶν in a potentially mixed-gender Christian group
  chosen_reading: brothers
  alternative_readings:
  - brothers and sisters
  rationale: The Greek is masculine plural. Following the stated gender-accurate policy,
    the main text keeps 'brothers' rather than resolving the representative force
    into an explicitly inclusive paraphrase. Because context may imply a broader group
    of fellow believers or coworkers, the inclusive sense is preserved in a footnote.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over
    gender-neutral)
