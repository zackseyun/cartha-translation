id: 1CO.16.14
reference: 1 Corinthians 16:14
source:
  edition: SBLGNT
  text: πάντα ὑμῶν ἐν ἀγάπῃ γινέσθω.
translation:
  text: Let everything you do be done in love.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'Let all things of you be in love.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πάντα
  chosen: everything
  alternatives:
  - all things
  lexicon: BDAG
  rationale: Neuter plural of πᾶς used comprehensively. 'Everything' gives natural
    English while preserving the universal scope. 'All things' is more formally literal
    but less idiomatic here.
- source_word: ὑμῶν
  chosen: you do
  alternatives:
  - of you
  - among you
  - your things
  lexicon: BDAG
  rationale: 'The genitive pronoun with πάντα is elliptical: literally ''all things
    of you.'' In idiomatic English, the sense is what belongs to or proceeds from
    the Corinthians, hence ''everything you do.'' This makes explicit the implied
    verbal force without materially expanding the meaning.'
- source_word: ἐν ἀγάπῃ
  chosen: in love
  alternatives:
  - with love
  lexicon: BDAG
  rationale: ἀγάπη is rendered by the default doctrinal gloss 'love.' The prepositional
    phrase denotes manner or sphere. 'In love' preserves the Greek wording closely;
    the full clause 'be done in love' communicates this naturally in English.
- source_word: γινέσθω
  chosen: let ... be done
  alternatives:
  - let ... be
  - let ... happen
  - must be
  lexicon: BDAG
  rationale: 'Third-person singular present middle/passive imperative of γίνομαι.
    In this construction it functions as an exhortation: ''let it be / let it happen.''
    Because English requires a smoother predicate with the preceding elements, ''let
    everything you do be done'' captures the imperative force and resultant state/action
    in idiomatic form.'
