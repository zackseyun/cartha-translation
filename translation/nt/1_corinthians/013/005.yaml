  from: it does not count up wrong
  to: it does not reckon the wrong
  rationale: The current rendering 'count up wrong' is not idiomatic English. The
    phrasal verb 'count up' typically implies summing a collection of items (e.g.,
    'count up the votes'), which clashes with the singular 'wrong' (faithful to the
    Greek 'τὸ κακόν'). This creates a slightly awkward phrase. 'Reckon the wrong'
    is a more fitting translation; 'reckon' is a primary sense of 'λογίζεται' and
    carries the same accounting metaphor without the awkwardness. A simpler alternative
    would be 'it does not count the wrong'.
