id: 1CO.13.5
reference: 1 Corinthians 13:5
source:
  edition: SBLGNT
  text: οὐκ ἀσχημονεῖ, οὐ ζητεῖ τὰ ἑαυτῆς, οὐ παροξύνεται, οὐ λογίζεται τὸ κακόν,
translation:
  text: it does not behave disgracefully, it does not seek its own, it is not provoked,
    it does not count the wrong.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'act unbecomingly' or 'behave rudely.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'does not seek its own'; that is, it is not self-seeking.
    reason: lexical_alternative
  - marker: c
    text: Or 'is not easily angered.'
    reason: alternative_reading
  - marker: d
    text: Or 'does not keep a record of wrongs.' Literally, 'does not count/reckon
      the wrong.'
    reason: alternative_reading
  - marker: e
    text: Or 'it does not count up wrong'.
    reason: previous_rendering
lexical_decisions:
- source_word: ἀσχημονεῖ
  chosen: behave disgracefully
  alternatives:
  - act unbecomingly
  - behave rudely
  - dishonor others
  lexicon: BDAG
  rationale: The verb denotes acting in an improper, shameful, or indecorous way.
    'Behave disgracefully' preserves the moral/social sense without narrowing it merely
    to impoliteness ('rudely') or expanding it to a specific object not stated in
    the Greek ('dishonor others').
- source_word: ζητεῖ τὰ ἑαυτῆς
  chosen: seek its own
  alternatives:
  - insist on its own way
  - seek its own interests
  lexicon: BDAG
  rationale: Literally 'seek the things of itself/her own.' The idiom refers to self-seeking.
    'Seek its own' stays close to the Greek while remaining intelligible; alternatives
    are interpretive expansions that specify manner ('insist') or object ('interests').
- source_word: παροξύνεται
  chosen: is provoked
  alternatives:
  - is irritated
  - is easily angered
  - is stirred up
  lexicon: BDAG
  rationale: The passive/middle form conveys being aroused to sharp irritation or
    anger. 'Is provoked' is broad and close to the Greek, avoiding the added adverb
    'easily,' which is not explicit in the text, while still capturing the emotional
    sense.
- source_word: λογίζεται
  chosen: count up
  alternatives:
  - reckon
  - count
  - keep a record of
  - consider
  lexicon: BDAG
  rationale: The verb means to calculate, reckon, or keep account. In this context
    of love's disposition, the accounting metaphor is prominent. 'Count up' preserves
    that metaphor in accessible English without the fuller interpretive expansion
    'keep a record of.'
- source_word: τὸ κακόν
  chosen: wrong
  alternatives:
  - evil
  - the wrong done
  - injury
  lexicon: BDAG
  rationale: The neuter singular with article can denote evil/wrong in a general or
    relational sense. Here, in connection with 'λογίζεται,' it most naturally refers
    to wrong suffered or wrongs in interpersonal relations. 'Wrong' is idiomatic and
    contextually apt, while 'evil' sounds broader and less relational.
- source_word: ἀγάπη (implicit subject from context)
  chosen: it
  alternatives:
  - love
  lexicon: BDAG
  rationale: The subject is carried over from the preceding context ('love'). English
    can naturally use 'it' in a series after the subject has been established, avoiding
    unnecessary repetition while preserving the personified description of love.
