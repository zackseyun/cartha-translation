theological_decisions:
- issue: Whether to intensify παροξύνεται as 'easily angered' by importing an adverb
    not present in Greek
  chosen_reading: is not provoked
  alternative_readings:
  - is not easily angered
  rationale: The Greek states the predicate without an explicit modifier. To preserve
    the text's wording and avoid interpretive addition, the translation keeps the
    simpler form while allowing readers to infer the practical sense.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Whether to expand λογίζεται τὸ κακόν into an idiom like 'keeps no record
    of wrongs'
  chosen_reading: does not count up wrong
  alternative_readings:
  - does not keep a record of wrongs
  - does not reckon evil
  rationale: The common English tradition is interpretive and pluralizes 'wrongs.'
    The Greek is singular and uses an accounting verb. The chosen rendering preserves
    the metaphor and number more transparently while remaining readable.
  doctrine_reference: Translation philosophy §1, §5, §6
revisions:
