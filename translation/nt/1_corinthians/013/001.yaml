id: 1CO.13.1
reference: 1 Corinthians 13:1
source:
  edition: SBLGNT
  text: Ἐὰν ταῖς γλώσσαις τῶν ἀνθρώπων λαλῶ καὶ τῶν ἀγγέλων, ἀγάπην δὲ μὴ ἔχω, γέγονα
    χαλκὸς ἠχῶν ἢ κύμβαλον ἀλαλάζον.
translation:
  text: If I speak in the tongues of men and of angels, but do not have love, I have
    become sounding bronze or a clashing cymbal.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'languages.' The Greek word can refer to tongues or languages; here 'tongues'
      preserves the connection with the Corinthian discussion of inspired speech.
    reason: lexical_alternative
  - marker: b
    text: '''Men'' here means human beings, in contrast with angels.'
    reason: lexical_alternative
  - marker: c
    text: Or 'resounding brass' or 'a ringing gong.' The Greek names sounding metal
      rather than a specific instrument.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐὰν
  chosen: If
  alternatives:
  - If ever
  - Even if
  lexicon: BDAG
  rationale: Introduces a conditional, hypothetical scenario. Simple 'If' best fits
    idiomatic English and preserves Paul's rhetorical setup.
- source_word: ταῖς γλώσσαις
  chosen: in the tongues
  alternatives:
  - with tongues
  - in languages
  lexicon: BDAG
  rationale: γλῶσσα can mean 'tongue' literally or 'language/speech.' In this context,
    given the Corinthian discussion of tongues, 'tongues' preserves the established
    phenomenon without over-interpreting it as merely human languages. 'In the tongues'
    reflects the dative construction naturally enough in English.
- source_word: τῶν ἀνθρώπων
  chosen: of men
  alternatives:
  - of human beings
  - of people
  lexicon: BDAG
  rationale: ἄνθρωπος here denotes human beings in contrast with angels. 'Men' is
    concise and traditional, and in this contrastive plural context functions representatively
    for humanity. This follows the gender-accurate principle rather than flattening
    the human/angel contrast.
- source_word: λαλῶ
  chosen: I speak
  alternatives:
  - I am speaking
  lexicon: BDAG
  rationale: 'Present active subjunctive in a conditional clause is best rendered
    with simple present in English: ''If I speak.'''
- source_word: καὶ τῶν ἀγγέλων
  chosen: and of angels
  alternatives:
  - and of messengers
  lexicon: BDAG
  rationale: ἄγγελος can mean 'messenger' or 'angel,' but here the contrast with 'men'
    and the rhetorical heightening strongly favor heavenly beings. 'Angels' is the
    plain sense.
- source_word: ἀγάπην
  chosen: love
  alternatives:
  - charity
  lexicon: BDAG
  rationale: Per doctrine table, ἀγάπη defaults to 'love.' 'Charity' is archaic in
    contemporary English and may mislead modern readers.
- source_word: δὲ μὴ ἔχω
  chosen: but do not have
  alternatives:
  - but have not
  - yet do not possess
  lexicon: BDAG
  rationale: δέ marks contrast; μή with ἔχω negates possession. 'But do not have'
    is clear, natural, and preserves the adversative force.
- source_word: γέγονα
  chosen: I have become
  alternatives:
  - I am
  - I have turned into
  lexicon: BDAG
  rationale: 'Perfect tense indicates a resulting state from the condition: ''I have
    become'' preserves both the completed/resultative nuance and Paul''s self-involving
    rhetoric.'
- source_word: χαλκὸς ἠχῶν
  chosen: sounding bronze
  alternatives:
  - a sounding bronze
  - resounding brass
  - a ringing gong
  lexicon: BDAG
  rationale: χαλκός is bronze/copper/brass-like metal; ἠχῶν means sounding/resounding.
    'Sounding bronze' stays close to the Greek image without importing a specific
    instrument not named in the text. 'Brass' is traditional but less precise. Rendered
    without the indefinite article because 'bronze' here is a mass noun; 'a bronze'
    ungrammatically treats the material as a count noun.
- source_word: ἢ κύμβαλον ἀλαλάζον
  chosen: or a clashing cymbal
  alternatives:
  - or a noisy cymbal
  - or a cymbal making a loud crash
  lexicon: BDAG
  rationale: κύμβαλον is 'cymbal'; ἀλαλάζον conveys loud, shrill, clamorous sound.
    'Clashing cymbal' is vivid, idiomatic, and captures the harsh auditory image better
    than the more generic 'noisy.'
