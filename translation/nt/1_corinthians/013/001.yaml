theological_decisions:
- issue: Meaning of 'tongues of men and of angels'
  chosen_reading: Rendered straightforwardly as a rhetorical contrast between human
    and angelic tongues without deciding whether Paul refers to actual angelic languages
    or hyperbolic speech.
  alternative_readings:
  - actual heavenly languages
  - rhetorical hyperbole for the highest conceivable speech
  rationale: The verse does not require the translator to resolve whether angelic
    tongues are literal or figurative. The wording preserves the theological and rhetorical
    tension rather than importing a doctrinal conclusion about glossolalia.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Rendering ἀνθρώπων
  chosen_reading: men
  alternative_readings:
  - human beings
  - people
  rationale: The contrast is between humanity and angels, not male and female humans.
    'Men' preserves the source's representative force and the compact antithesis,
    while the footnote preserves the inclusive sense for modern readers.
  doctrine_reference: Gender-accurate over gender-neutral.
