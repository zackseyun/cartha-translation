theological_decisions:
- issue: Referent of 'the word of God'
  chosen_reading: Rendered generically as 'the word of God' without narrowing it to
    a specific technical sense.
  alternative_readings:
  - the gospel message specifically
  - prophetic utterance in the assembly
  rationale: In context Paul rebukes the Corinthians for acting as though they were
    the source or sole recipients of God's authoritative message. The phrase likely
    includes the gospel and apostolic instruction broadly. The translation preserves
    the phrase's breadth rather than resolving the interpretive question in the main
    text.
  doctrine_reference: Preserve theological tension rather than resolve it.
