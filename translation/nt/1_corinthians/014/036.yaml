id: 1CO.14.36
reference: 1 Corinthians 14:36
source:
  edition: SBLGNT
  text: ἢ ἀφ’ ὑμῶν ὁ λόγος τοῦ θεοῦ ἐξῆλθεν, ἢ εἰς ὑμᾶς μόνους κατήντησεν;
translation:
  text: Or did the word of God go out from you, or has it reached only you?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Did God's word originate with you?'
    reason: lexical_alternative
  - marker: b
    text: Or, 'has it come to you alone?'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἢ
  chosen: Or
  alternatives:
  - What!
  - Or
  lexicon: BDAG
  rationale: Rendered as the disjunctive/interrogative 'Or' at the start of Paul's
    rhetorical rebuke. Some translations use an exclamatory 'What!' to bring out the
    sharpness, but the Greek particle itself is simply ἤ; the rhetorical force is
    carried by the question form.
- source_word: ἀφ’ ὑμῶν
  chosen: from you
  alternatives:
  - from among you
  - with you as the source
  lexicon: BDAG
  rationale: ἀπό with the genitive marks source or origin. 'From you' is the most
    direct and natural English rendering in this rhetorical question.
- source_word: ὁ λόγος τοῦ θεοῦ
  chosen: the word of God
  alternatives:
  - God's word
  - the message of God
  lexicon: BDAG
  rationale: A standard Pauline expression. 'The word of God' preserves the formal
    weight and likely refers to the divine message/gospel rather than a merely private
    utterance. 'God's word' is possible but slightly less formal.
- source_word: ἐξῆλθεν
  chosen: go out
  alternatives:
  - come forth
  - originate
  lexicon: BDAG
  rationale: The aorist of ἐξέρχομαι literally means 'went out/came out.' In English
    rhetorical style, 'did ... go out' preserves the verbal image and the challenge
    to Corinthian self-importance. 'Originate' captures the sense but is more interpretive.
- source_word: εἰς ὑμᾶς μόνους
  chosen: only you
  alternatives:
  - you alone
  - to you only
  lexicon: BDAG
  rationale: μόνους modifies ὑμᾶς and emphasizes exclusivity. 'Only you' is idiomatic
    modern English and preserves the rebuke that they are not the sole recipients.
- source_word: κατήντησεν
  chosen: has it reached
  alternatives:
  - did it come
  - has it come as far as
  lexicon: BDAG
  rationale: καταντάω can mean 'arrive at, reach.' English present perfect ('has it
    reached') works well in a rhetorical question about whether the word has come
    only to them. It also avoids awkwardness while preserving the sense of arrival.
