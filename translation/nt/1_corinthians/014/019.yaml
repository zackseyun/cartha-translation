theological_decisions:
- issue: Rendering γλῶσσα in the context of 1 Corinthians 12–14
  chosen_reading: Rendered as 'a tongue' to preserve the chapter's terminology without
    resolving the nature of the phenomenon beyond the text.
  alternative_readings:
  - a language
  - tongues
  rationale: The passage contrasts intelligible congregational speech with speech
    designated by γλῶσσα. Translating 'a tongue' preserves the traditional and lexical
    sense while avoiding a doctrinally loaded paraphrase such as 'ecstatic speech'
    or an over-resolution to ordinary foreign language. This maintains theological
    tension rather than resolving a debated charismatic question.
  doctrine_reference: Preserve theological tension rather than resolve it.
