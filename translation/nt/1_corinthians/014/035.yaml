theological_decisions:
- issue: Scope of the prohibition in relation to women speaking
  chosen_reading: Render the clause as written without narrowing it to a specific
    kind of speech in the main text.
  alternative_readings:
  - Restrict the sense to disruptive questioning
  - Restrict the sense to judging prophecies
  - Treat the statement as a quotation of a Corinthian position
  rationale: The Greek text simply says 'for it is shameful for a woman to speak in
    the assembly.' Because the immediate lexical data do not themselves specify the
    exact scope, the translation preserves the wording and leaves interpretive narrowing
    to exegesis rather than importing it into the English.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
- issue: Whether γυνή/ἀνήρ should be rendered as wife/husband or woman/man
  chosen_reading: Use 'husbands' for ἄνδρας and 'woman' for γυναικί in the main text,
    preserving the alternative 'wife' in a footnote.
  alternative_readings:
  - wife ... husband throughout
  - woman ... men throughout
  rationale: The immediate phrase 'their own husbands' strongly supports the marital
    sense for ἄνδρας. The following singular γυναικί may be either generic 'woman'
    or contextually 'wife.' To preserve the ambiguity without flattening the syntax,
    the main text keeps 'woman' and the footnote notes 'wife' as a viable contextual
    alternative.
  doctrine_reference: Translation philosophy §3 and §4.
