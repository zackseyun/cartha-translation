id: 1CO.14.35
reference: 1 Corinthians 14:35
source:
  edition: SBLGNT
  text: εἰ δέ τι ⸀μαθεῖν θέλουσιν, ἐν οἴκῳ τοὺς ἰδίους ἄνδρας ἐπερωτάτωσαν, αἰσχρὸν
    γάρ ἐστιν γυναικὶ ⸂λαλεῖν ἐν ἐκκλησίᾳ⸃.
translation:
  text: But if they want to learn anything, let them ask their own husbands at home,
    for it is shameful for a woman to speak in the assembly.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for a wife to speak in the assembly.' The Greek word can mean either
      'woman' or 'wife' depending on context.
    reason: lexical_alternative
  - marker: b
    text: Or 'in church' or 'in the congregation'; the Greek refers to the gathered
      assembly.
    reason: lexical_alternative
lexical_decisions:
- source_word: μαθεῖν
  chosen: to learn
  alternatives:
  - to find out
  - to be instructed
  lexicon: BDAG
  rationale: The aorist infinitive of μανθάνω straightforwardly denotes learning or
    coming to know. 'Learn' is the most direct and natural English equivalent here.
- source_word: ἐν οἴκῳ
  chosen: at home
  alternatives:
  - in the house
  - at their house
  lexicon: BDAG
  rationale: The idiom is naturally rendered 'at home' in English rather than the
    more wooden 'in the house.' This preserves the domestic contrast with the gathered
    church.
- source_word: τοὺς ἰδίους ἄνδρας
  chosen: their own husbands
  alternatives:
  - their own men
  lexicon: BDAG
  rationale: ἀνήρ can mean either 'man' or 'husband' depending on context. Here, with
    ἰδίους ('their own') and the domestic setting, 'husbands' is the most contextually
    specific and idiomatic rendering.
- source_word: ἐπερωτάτωσαν
  chosen: let them ask
  alternatives:
  - let them question
  - let them inquire of
  lexicon: BDAG
  rationale: The present active imperative calls for asking or inquiring. 'Let them
    ask' is clear, idiomatic, and preserves the imperatival force without over-translating.
- source_word: αἰσχρὸν
  chosen: shameful
  alternatives:
  - disgraceful
  - improper
  lexicon: BDAG
  rationale: αἰσχρός denotes what is shameful or disgraceful. 'Shameful' best preserves
    the moral-social force of the term in concise modern English.
- source_word: γυναικὶ
  chosen: for a woman
  alternatives:
  - for a wife
  lexicon: BDAG
  rationale: γυνή can mean 'woman' or 'wife.' Since the clause states a more general
    principle and lacks a possessive marker here, 'woman' is the better default in
    the main text, while the contextual possibility of 'wife' is worth preserving
    in a footnote.
- source_word: λαλεῖν
  chosen: to speak
  alternatives:
  - to talk
  lexicon: BDAG
  rationale: λαλέω commonly means 'to speak.' 'Talk' would sound too informal and
    potentially trivialize the register. 'Speak' is broad enough to preserve the Greek
    without prematurely narrowing the kind of speech in view.
- source_word: ἐν ἐκκλησίᾳ
  chosen: in the assembly
  alternatives:
  - in church
  - in the congregation
  lexicon: BDAG
  rationale: ἐκκλησία here refers to the gathered assembly. 'Assembly' avoids anachronistic
    institutional overtones of 'church' while still fitting the immediate context
    of congregational gathering.
