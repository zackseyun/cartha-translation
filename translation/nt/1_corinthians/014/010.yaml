id: 1CO.14.10
reference: 1 Corinthians 14:10
source:
  edition: SBLGNT
  text: τοσαῦτα εἰ τύχοι γένη φωνῶν ⸀εἰσιν ἐν κόσμῳ, καὶ ⸀οὐδὲν ἄφωνον·
translation:
  text: There are, perhaps, so many kinds of sounds in the world, and none is without
    sound.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'There are perhaps many kinds of languages in the world, and none is
      without meaning.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τοσαῦτα
  chosen: so many
  alternatives:
  - so many of them
  - such a great number
  lexicon: BDAG
  rationale: τοσαῦτα is a neuter plural demonstrative/quantifier referring forward
    to the number of kinds; 'so many' is idiomatic English and preserves the sense
    of multitude without over-specifying.
- source_word: εἰ τύχοι
  chosen: perhaps
  alternatives:
  - it may be
  - if it should happen
  - as it may be
  lexicon: BDAG
  rationale: The idiom εἰ τύχοι softens or qualifies the statement, functioning adverbially
    as 'perhaps' or 'it may be.' Rendering it as 'perhaps' captures Paul's tentative,
    incidental tone in natural English.
- source_word: γένη
  chosen: kinds
  alternatives:
  - classes
  - species
  - sorts
  lexicon: BDAG
  rationale: γένη denotes kinds or classes. 'Kinds' is the most natural English choice
    here and fits the discussion of varieties of speech/languages.
- source_word: φωνῶν
  chosen: of sounds
  alternatives:
  - of voices
  - of languages
  - of utterances
  lexicon: BDAG
  rationale: φωνή can mean sound, voice, or language. In this context Paul is speaking
    broadly about meaningful utterances and their significance. 'Sounds' preserves
    the lexical breadth and avoids prematurely narrowing the term to human languages,
    while still fitting the immediate argument.
- source_word: ἐν κόσμῳ
  chosen: in the world
  alternatives:
  - in the world order
  - in creation
  lexicon: BDAG
  rationale: κόσμος here refers to the inhabited world or the world generally. 'In
    the world' is the straightforward rendering.
- source_word: οὐδὲν ἄφωνον
  chosen: none is without sound
  alternatives:
  - nothing is voiceless
  - none is without a voice
  - nothing is meaningless
  lexicon: BDAG
  rationale: ἄφωνος literally means voiceless or soundless. In context Paul stresses
    that no sound-system is devoid of significance. The main text keeps the more literal
    image with 'without sound,' while an interpretive alternative is preserved in
    a footnote because many understand the phrase to imply 'without meaning.'
