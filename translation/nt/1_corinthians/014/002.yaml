theological_decisions:
- issue: Referent of πνεύματι
  chosen_reading: Rendered 'in the Spirit' in the main text
  alternative_readings:
  - in spirit (the speaker's spirit)
  - by the Spirit
  rationale: The Greek dative permits more than one construal, and the context concerns
    spiritual speech. The main text keeps the capitalized rendering as a plausible
    reading while preserving the alternative in a footnote rather than collapsing
    the ambiguity into a single doctrinally loaded interpretation.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
