id: 1CO.14.2
reference: 1 Corinthians 14:2
source:
  edition: SBLGNT
  text: ὁ γὰρ λαλῶν γλώσσῃ οὐκ ἀνθρώποις λαλεῖ ⸀ἀλλὰ θεῷ, οὐδεὶς γὰρ ἀκούει, πνεύματι
    δὲ λαλεῖ μυστήρια·
translation:
  text: For the one speaking in a tongue does not speak to people but to God, for
    no one understands; rather, he speaks mysteries in the Spirit.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for no one hears.' The Greek verb can mean either 'hear' or, by implication
      in context, 'understand.'
    reason: lexical_alternative
  - marker: b
    text: Or 'he speaks mysteries in spirit.' The Greek phrase may refer to the Holy
      Spirit or to the speaker's spirit.
    reason: alternative_reading
lexical_decisions:
- source_word: ὁ λαλῶν
  chosen: the one speaking
  alternatives:
  - whoever speaks
  - the person speaking
  lexicon: BDAG
  rationale: The article with present participle functions substantivally. 'The one
    speaking' preserves the generic singular without over-specifying gender, while
    remaining natural English.
- source_word: γλώσσῃ
  chosen: in a tongue
  alternatives:
  - in tongues
  - with a tongue
  - in another language
  lexicon: BDAG
  rationale: Singular dative is best represented as 'in a tongue.' In this chapter
    γλῶσσα refers to the phenomenon of tongue-speech; 'in tongues' would smooth the
    singular, while 'in another language' interprets more than the immediate wording
    warrants.
- source_word: ἀνθρώποις
  chosen: to people
  alternatives:
  - to men
  - to human beings
  lexicon: BDAG
  rationale: The dative plural is generic, not male-specific. 'To people' is gender-accurate
    and natural modern English.
- source_word: θεῷ
  chosen: to God
  lexicon: BDAG
  rationale: Simple dative object after λαλεῖ; no reason to paraphrase.
- source_word: ἀκούει
  chosen: understands
  alternatives:
  - hears
  - listens to
  lexicon: BDAG
  rationale: Although ἀκούω literally means 'hear,' in context Paul contrasts unintelligible
    speech with meaningful communication. 'Understands' captures the sense that no
    one comprehends what is said. The more literal 'hears' is preserved in a footnote
    because it remains a viable rendering.
- source_word: πνεύματι
  chosen: in the Spirit
  alternatives:
  - by the Spirit
  - in spirit
  - with the spirit
  lexicon: BDAG
  rationale: The dative is syntactically ambiguous. Given the chapter's discussion
    of spiritual utterance and the common Pauline use of πνεῦμα for the Holy Spirit,
    'in the Spirit' is a natural rendering that preserves some ambiguity better than
    the more interpretive 'by the Spirit.' Because interpreters dispute whether this
    means the Holy Spirit or the speaker's spirit, the alternative is preserved in
    a footnote.
- source_word: μυστήρια
  chosen: mysteries
  alternatives:
  - secret things
  - hidden truths
  lexicon: BDAG
  rationale: Pauline usage often gives μυστήριον theological weight. 'Mysteries' preserves
    that resonance better than explanatory paraphrases.
- source_word: δὲ
  chosen: rather
  alternatives:
  - but
  - and
  lexicon: BDAG
  rationale: Here δέ marks contrast/explanation within the clause. 'Rather' makes
    the contrast with the preceding statement clear in idiomatic English.
