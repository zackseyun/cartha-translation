id: 1CO.14.13
reference: 1 Corinthians 14:13
source:
  edition: SBLGNT
  text: ⸀Διὸ ὁ λαλῶν γλώσσῃ προσευχέσθω ἵνα διερμηνεύῃ.
translation:
  text: Therefore, the one who speaks in a tongue should pray that he may interpret.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "in a language." The Greek says "in a tongue," the usual wording in this
      chapter for speech that requires interpretation.
    reason: lexical_alternative
  - marker: b
    text: Greek "that he may interpret." The singular masculine is representative,
      referring to anyone who speaks in a tongue.
    reason: lexical_alternative
lexical_decisions:
- source_word: Διὸ
  chosen: Therefore
  alternatives:
  - For this reason
  - So then
  lexicon: BDAG
  rationale: Inferential conjunction drawing a conclusion from the preceding discussion;
    'Therefore' is natural modern English and preserves the logical force.
- source_word: ὁ λαλῶν
  chosen: the one who speaks
  alternatives:
  - whoever speaks
  - the speaker
  lexicon: BDAG
  rationale: Articular present participle used substantivally. 'The one who speaks'
    preserves the generic singular and the ongoing verbal idea without over-paraphrase.
- source_word: γλώσσῃ
  chosen: in a tongue
  alternatives:
  - in tongues
  - in a language
  lexicon: BDAG
  rationale: Dative singular with λαλέω. Singular is retained because the Greek is
    singular. In this chapter γλῶσσα refers to Spirit-inspired speech not understood
    by the congregation unless interpreted; 'tongue' preserves the established Pauline
    usage better than the potentially flattening 'language'.
- source_word: προσευχέσθω
  chosen: should pray
  alternatives:
  - must pray
  - is to pray
  - let him pray
  lexicon: BDAG
  rationale: Third-person present middle imperative. 'Should pray' gives clear exhortational
    force in contemporary English without archaic 'let him pray.'
- source_word: ἵνα
  chosen: that
  alternatives:
  - so that
  - in order that
  lexicon: BDAG
  rationale: Introduces the content/purpose of the prayer. 'That' is concise and idiomatic
    here while still allowing the purposive nuance to be heard.
- source_word: διερμηνεύῃ
  chosen: he may interpret
  alternatives:
  - he may translate
  - he may explain
  lexicon: BDAG
  rationale: Verb denotes rendering intelligible speech for others. 'Interpret' best
    fits the chapter's concern with making tongue-speech understandable in the assembly;
    'translate' is too narrow and 'explain' too broad.
