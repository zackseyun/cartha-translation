theological_decisions:
- issue: Generic masculine expression in English
  chosen_reading: he may interpret
  alternative_readings:
  - they may interpret
  rationale: The Greek uses a grammatically masculine singular participle and verb
    forms for a representative individual. Per translation philosophy, gender-accurate
    rendering is preferred over flattening to plural/gender-neutral English. The phrase
    is generic, not restricted to males, but the singular masculine form is preserved
    in the main text.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Meaning of γλώσσῃ in the context of 1 Corinthians 12–14
  chosen_reading: tongue
  alternative_readings:
  - language
  rationale: The chapter discusses a charismatic phenomenon requiring interpretation
    in gathered worship. 'Tongue' preserves the theological and literary connection
    within the passage and avoids prematurely resolving debates over whether the referent
    is human language, ecstatic speech, or a broader category.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
