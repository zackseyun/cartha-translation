id: 1CO.14.8
reference: 1 Corinthians 14:8
source:
  edition: SBLGNT
  text: καὶ γὰρ ἐὰν ἄδηλον ⸂φωνὴν σάλπιγξ⸃ δῷ, τίς παρασκευάσεται εἰς πόλεμον;
translation:
  text: For if the trumpet gives an unclear sound, who will prepare for battle?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'an indistinct sound.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'for war.'
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ γὰρ
  chosen: For
  alternatives:
  - Indeed, if
  - For indeed
  lexicon: BDAG
  rationale: The combination is discourse-marking and explanatory. In smooth English,
    'For' adequately carries the explanatory force without overloading the sentence
    with particles.
- source_word: ἐὰν
  chosen: if
  alternatives:
  - whenever
  lexicon: BDAG
  rationale: Introduces a conditional clause with the subjunctive δῷ. 'If' is the
    natural English equivalent in this illustrative argument.
- source_word: ἄδηλον
  chosen: unclear
  alternatives:
  - indistinct
  - uncertain
  lexicon: BDAG
  rationale: ἄδηλος means not clear, not evident, indistinct. 'Unclear' is idiomatic
    modern English and fits Paul's point about unintelligible signaling.
- source_word: φωνὴν
  chosen: sound
  alternatives:
  - voice
  - call
  lexicon: BDAG
  rationale: Although φωνή often means 'voice,' with a trumpet it refers to the sound
    it emits. 'Sound' is the most natural contextual rendering.
- source_word: σάλπιγξ
  chosen: the trumpet
  alternatives:
  - a trumpet
  lexicon: BDAG
  rationale: The noun is anarthrous in Greek, but English generic singular often idiomatically
    uses the definite article in proverbial or illustrative statements. 'The trumpet'
    sounds natural and preserves the representative force.
- source_word: δῷ
  chosen: gives
  alternatives:
  - produces
  - sounds
  lexicon: BDAG
  rationale: δίδωμι literally means 'give.' In this collocation, 'gives' is a natural
    English equivalent ('gives a sound') and preserves the Greek imagery better than
    a freer paraphrase.
- source_word: τίς
  chosen: who
  alternatives:
  - what person
  lexicon: BDAG
  rationale: An interrogative pronoun introducing the rhetorical question. 'Who' is
    direct and idiomatic.
- source_word: παρασκευάσεται
  chosen: will prepare
  alternatives:
  - will get ready
  - will make himself ready
  lexicon: BDAG
  rationale: The future middle conveys preparing oneself or making ready. 'Will prepare'
    is concise and sufficiently captures the sense in context; the reflexive nuance
    is implicit in English.
- source_word: εἰς πόλεμον
  chosen: for battle
  alternatives:
  - for war
  lexicon: BDAG
  rationale: Literally 'for war,' but in this immediate military-signal context 'for
    battle' is more idiomatic and evokes readiness for combat in response to a trumpet
    call.
