theological_decisions:
- issue: Rendering γλώσσαις in a charismatic-context passage
  chosen_reading: in tongues
  alternative_readings:
  - in languages
  rationale: The immediate literary context in 1 Corinthians 12–14 uses γλῶσσα/γλῶσσαι
    as a label for the gift under discussion. Rendering it 'in tongues' preserves
    the text's own terminology without deciding disputed theological questions about
    whether these are human languages, ecstatic speech, or a broader category. 'In
    languages' is preserved as a lexical alternative in a footnote-worthy note but
    not adopted in the main text because it narrows the term beyond what the verse
    itself states.
  doctrine_reference: Preserve theological tension rather than resolve it.
