id: 1CO.14.18
reference: 1 Corinthians 14:18
source:
  edition: SBLGNT
  text: εὐχαριστῶ τῷ ⸀θεῷ, πάντων ὑμῶν μᾶλλον ⸀γλώσσαις ⸀λαλῶ·
translation:
  text: I thank God that I speak in tongues more than all of you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I speak in languages more than all of you.' The Greek term can mean
      'languages,' but in this context it refers to the phenomenon discussed throughout
      1 Corinthians 12–14 and is traditionally rendered 'tongues.'
    reason: lexical_alternative
lexical_decisions:
- source_word: εὐχαριστῶ
  chosen: I thank
  alternatives:
  - I give thanks
  lexicon: BDAG
  rationale: Present active indicative, first person singular. 'I thank' is natural
    modern English and preserves the direct verbal force; 'I give thanks' is possible
    but slightly more formal.
- source_word: τῷ θεῷ
  chosen: God
  alternatives:
  - to God
  lexicon: BDAG
  rationale: Dative object with εὐχαριστέω, naturally rendered in English as the direct
    object 'God' after 'thank' rather than the more literal 'to God.'
- source_word: πάντων ὑμῶν
  chosen: than all of you
  alternatives:
  - more than all of you
  - more than any of you individually
  lexicon: BDAG
  rationale: Genitive plural with comparative μᾶλλον expresses comparison with the
    whole group. In idiomatic English this is best represented as 'more than all of
    you.' It does not necessarily imply each one individually beyond every member
    taken separately, though that is often inferred from the context.
- source_word: μᾶλλον
  chosen: more than
  alternatives:
  - more
  lexicon: BDAG
  rationale: 'Comparative adverb modifying λαλῶ in relation to πάντων ὑμῶν. English
    requires an explicit comparative construction: ''more than all of you.'''
- source_word: γλώσσαις
  chosen: in tongues
  alternatives:
  - with tongues
  - in languages
  lexicon: BDAG
  rationale: Dative plural of γλῶσσα in the context of 1 Corinthians 12–14 refers
    to the spiritual phenomenon commonly called 'tongues.' 'In tongues' is the established
    and contextually precise rendering here. 'In languages' is lexically possible
    but would obscure the specific discourse context and could over-resolve the nature
    of the phenomenon.
- source_word: λαλῶ
  chosen: I speak
  alternatives:
  - I am speaking
  lexicon: BDAG
  rationale: Present active indicative, first person singular. Simple present fits
    the gnomic/assertive sense in context better than an English progressive.
