id: 1CO.14.22
reference: 1 Corinthians 14:22
source:
  edition: SBLGNT
  text: ὥστε αἱ γλῶσσαι εἰς σημεῖόν εἰσιν οὐ τοῖς πιστεύουσιν ἀλλὰ τοῖς ἀπίστοις,
    ἡ δὲ προφητεία οὐ τοῖς ἀπίστοις ἀλλὰ τοῖς πιστεύουσιν.
translation:
  text: So then, tongues are for a sign not to those who believe but to unbelievers,
    while prophecy is not to unbelievers but to those who believe.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'languages.' The Greek term can denote languages, but in 1 Corinthians
      12–14 'tongues' preserves Paul's established terminology without deciding a
      debated interpretation.
    reason: lexical_alternative
  - marker: b
    text: '''A sign'' may be understood by some interpreters as a sign of judgment
      in light of the preceding citation of Isaiah 28:11–12.'
    reason: cross_reference
lexical_decisions:
- source_word: ὥστε
  chosen: So then
  alternatives:
  - therefore
  - thus
  lexicon: BDAG
  rationale: Marks an inferential conclusion from the preceding argument. 'So then'
    is natural English and preserves the logical force without sounding overly formal.
- source_word: γλῶσσαι
  chosen: tongues
  alternatives:
  - languages
  lexicon: BDAG
  rationale: In the immediate context of 1 Corinthians 12–14, γλῶσσαι is the established
    term for the gift/practice of speaking in tongues. 'Tongues' preserves Pauline
    terminology and avoids prematurely resolving whether the emphasis is ecstatic
    speech or foreign languages.
- source_word: εἰς σημεῖόν
  chosen: for a sign
  alternatives:
  - as a sign
  - for a sign-purpose
  lexicon: BDAG
  rationale: The preposition εἰς with the accusative here expresses purpose/result.
    'For a sign' is idiomatic and retains the compactness of the Greek.
- source_word: τοῖς πιστεύουσιν
  chosen: to those who believe
  alternatives:
  - for believers
  - to believers
  lexicon: BDAG
  rationale: The participle πιστεύουσιν is substantival, literally 'the believing
    ones.' 'Those who believe' is slightly more transparent to the verbal idea than
    the adjectival 'believers,' while remaining natural English.
- source_word: τοῖς ἀπίστοις
  chosen: to unbelievers
  alternatives:
  - to those who do not believe
  - to the unbelieving
  lexicon: BDAG
  rationale: ἄπιστος here contrasts with πιστεύων in a communal/religious sense. 'Unbelievers'
    is concise and standard, matching the contrast in the verse.
- source_word: προφητεία
  chosen: prophecy
  alternatives:
  - prophetic speech
  lexicon: BDAG
  rationale: In this chapter προφητεία refers to the gift/activity of prophecy. 'Prophecy'
    is the most direct and established rendering; 'prophetic speech' is possible but
    less concise.
- source_word: δὲ
  chosen: while
  alternatives:
  - but
  - and
  lexicon: BDAG
  rationale: δέ marks a contrast between tongues and prophecy. 'While' brings out
    the adversative comparison smoothly in English.
