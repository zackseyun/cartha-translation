theological_decisions:
- issue: Meaning of γλῶσσαι in charismatic context
  chosen_reading: Rendered as 'tongues' without specifying 'foreign languages' or
    'ecstatic utterances.'
  alternative_readings:
  - languages
  - ecstatic speech
  rationale: The verse participates in Paul's broader discussion of glossolalia, and
    the precise phenomenology is debated. The translation preserves the Greek term's
    established ecclesial sense without importing a denominational conclusion.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Force of σημεῖον in relation to unbelievers
  chosen_reading: Rendered neutrally as 'a sign' rather than specifying 'positive
    sign' or 'sign of judgment.'
  alternative_readings:
  - a confirming sign
  - a sign of judgment
  rationale: The immediate and wider context, especially the preceding citation of
    Isaiah, creates interpretive debate about whether the sign is chiefly evidentiary
    or judicial. The Greek itself states only 'a sign,' so the translation should
    not resolve the theological question in the main text.
  doctrine_reference: Preserve theological tension rather than resolve it.
