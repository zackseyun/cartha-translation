id: 1CO.14.6
reference: 1 Corinthians 14:6
source:
  edition: SBLGNT
  text: ⸀Νῦν δέ, ἀδελφοί, ἐὰν ἔλθω πρὸς ὑμᾶς γλώσσαις λαλῶν, τί ὑμᾶς ὠφελήσω, ἐὰν
    μὴ ὑμῖν λαλήσω ἢ ἐν ἀποκαλύψει ἢ ἐν γνώσει ἢ ἐν προφητείᾳ ἢ ἐν διδαχῇ;
translation:
  text: Now, brothers, if I come to you speaking in tongues, what will I benefit you
    unless I speak to you either by revelation or by knowledge or by prophecy or by
    teaching?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'brothers and sisters'; Greek 'brothers' can address a mixed congregation.
    reason: lexical_alternative
  - marker: b
    text: Or 'speaking in languages'; the Greek term can mean 'languages,' but in
      this context it refers to the phenomenon discussed throughout 1 Corinthians
      12–14.
    reason: lexical_alternative
lexical_decisions:
- source_word: Νῦν δέ
  chosen: Now
  alternatives:
  - But now
  - As it is
  lexicon: BDAG
  rationale: Marks a transition to the present point in Paul's argument. 'Now' is
    natural English and preserves the discourse shift without overemphasizing contrast.
- source_word: ἀδελφοί
  chosen: brothers
  alternatives:
  - brothers and sisters
  - siblings
  lexicon: BDAG
  rationale: The Greek is grammatically masculine plural and in Pauline usage often
    addresses the whole congregation. Per doctrine, gender-accurate rendering is preferred
    in the main text; inclusivity can be noted in a footnote.
- source_word: γλώσσαις λαλῶν
  chosen: speaking in tongues
  alternatives:
  - speaking with tongues
  - speaking in languages
  lexicon: BDAG
  rationale: In 1 Corinthians 12–14, γλῶσσα in this construction refers to the charismatic
    phenomenon under discussion. 'Speaking in tongues' is the clearest idiomatic rendering
    in English. 'Languages' is lexically possible but would understate the established
    contextual sense in this chapter.
- source_word: τί ὑμᾶς ὠφελήσω
  chosen: what will I benefit you
  alternatives:
  - what good will I do you
  - how will I profit you
  lexicon: BDAG
  rationale: ὠφελέω means to benefit, help, or profit. 'What will I benefit you' is
    slightly unusual but transparent and close to the Greek structure; it preserves
    Paul's focus on practical edification.
- source_word: ἐὰν μὴ
  chosen: unless
  alternatives:
  - if not
  lexicon: BDAG
  rationale: Standard idiomatic rendering of the conditional negation in English.
- source_word: λαλήσω
  chosen: I speak
  alternatives:
  - I say
  lexicon: BDAG
  rationale: Maintains lexical continuity with λαλῶν earlier in the verse and fits
    the oral/communicative context.
- source_word: ἐν ἀποκαλύψει
  chosen: by revelation
  alternatives:
  - in revelation
  - with a revelation
  lexicon: BDAG
  rationale: The preposition ἐν here is instrumental or modal in sense, indicating
    the means or manner of profitable speech. 'By revelation' is concise and natural.
- source_word: ἐν γνώσει
  chosen: by knowledge
  alternatives:
  - in knowledge
  - with knowledge
  lexicon: BDAG
  rationale: Parallel to the surrounding ἐν-phrases; 'by knowledge' preserves the
    instrumental sense and rhetorical symmetry.
- source_word: ἐν προφητείᾳ
  chosen: by prophecy
  alternatives:
  - in prophecy
  - with prophecy
  - in prophetic speech
  lexicon: BDAG
  rationale: Keeps the parallel structure of the list and reflects Paul's category
    of intelligible, edifying speech.
- source_word: ἐν διδαχῇ
  chosen: by teaching
  alternatives:
  - in teaching
  - with teaching
  - by instruction
  lexicon: BDAG
  rationale: δίδαχή denotes teaching or instruction. 'By teaching' is natural and
    preserves the list's cadence.
