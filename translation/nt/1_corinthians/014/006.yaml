theological_decisions:
- issue: Rendering of ἀδελφοί in congregational address
  chosen_reading: brothers
  alternative_readings:
  - brothers and sisters
  rationale: The main text follows the doctrine's gender-accurate principle, retaining
    the masculine plural form while recognizing that Paul likely addresses the mixed
    congregation representatively.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Sense of γλώσσαις in this chapter
  chosen_reading: tongues
  alternative_readings:
  - languages
  rationale: Within 1 Corinthians 12–14, the term refers to the debated spiritual-speech
    phenomenon. The translation preserves the conventional and contextually specific
    sense without resolving broader theological debates about its nature.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
