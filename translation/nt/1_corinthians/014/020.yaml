id: 1CO.14.20
reference: 1 Corinthians 14:20
source:
  edition: SBLGNT
  text: Ἀδελφοί, μὴ παιδία γίνεσθε ταῖς φρεσίν, ἀλλὰ τῇ κακίᾳ νηπιάζετε, ταῖς δὲ φρεσὶν
    τέλειοι γίνεσθε.
translation:
  text: Brothers, do not become children in your thinking, but be infants in evil;
    yet in your thinking become mature.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Brothers and sisters'; the Greek uses the masculine plural 'brothers'
      as a congregational address.
    reason: lexical_alternative
  - marker: b
    text: Or 'in malice'; the Greek κακία can denote evil, badness, or malice.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀδελφοί
  chosen: Brothers
  alternatives:
  - Brothers and sisters
  - Siblings
  lexicon: BDAG
  rationale: 'Vocative plural of ἀδελφός. Per doctrine, gender-accurate over gender-neutral:
    retain the masculine form while recognizing its representative address to the
    mixed congregation. Inclusivity is best preserved in a footnote rather than flattening
    the source term in the main text.'
- source_word: παιδία
  chosen: children
  alternatives:
  - little children
  - infants
  lexicon: BDAG
  rationale: The term denotes children generally. 'Children' fits the contrast with
    νηπιάζετε/τέλειοι and avoids over-specifying age in the first clause.
- source_word: γίνεσθε
  chosen: do not become / become
  alternatives:
  - be
  - grow to be
  lexicon: BDAG
  rationale: Present middle imperative of γίνομαι carries a sense of becoming rather
    than simple stative being. Rendering both occurrences with 'become' preserves
    the verbal force and the rhetorical parallelism.
- source_word: ταῖς φρεσίν / ταῖς δὲ φρεσὶν
  chosen: in your thinking
  alternatives:
  - in mind
  - in understanding
  - in your minds
  lexicon: BDAG
  rationale: φρήν refers to the faculty of understanding, thought, or mindset. 'In
    your thinking' is natural modern English and suits the dative of respect/in reference,
    while avoiding the slightly awkward repetition of 'minds.'
- source_word: τῇ κακίᾳ
  chosen: in evil
  alternatives:
  - with respect to evil
  - in malice
  - in wickedness
  lexicon: BDAG
  rationale: κακία can mean evil, badness, or malice. Here the broader ethical contrast
    is likely intended rather than interpersonal spite alone, so 'in evil' best preserves
    the general moral sphere. A lexical alternative is worth preserving in a footnote
    because many translations use 'malice.'
- source_word: νηπιάζετε
  chosen: be infants
  alternatives:
  - be babies
  - be childlike
  lexicon: BDAG
  rationale: Imperative from νηπιάζω, 'to be an infant/act as an infant.' 'Be infants'
    preserves the deliberate contrast with 'children' and 'mature' without sounding
    overly colloquial.
- source_word: τέλειοι
  chosen: mature
  alternatives:
  - perfect
  - fully grown
  lexicon: BDAG
  rationale: τέλειος in this context refers to maturity or completeness, not sinless
    perfection. 'Mature' communicates Paul's exhortation clearly in contemporary English.
- source_word: ἀλλὰ ... δὲ
  chosen: but ... yet
  alternatives:
  - but ... and
  - rather ... but
  lexicon: BDAG
  rationale: The paired particles mark contrast and progression. Rendering the second
    δέ as 'yet' helps English flow and preserves the rhetorical turn from evil to
    thinking.
