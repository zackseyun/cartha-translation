theological_decisions:
- issue: Gendered congregational address
  chosen_reading: Retain 'Brothers' in the main text, with inclusive force noted in
    a footnote.
  alternative_readings:
  - Brothers and sisters
  rationale: The doctrine excerpt directs gender-accurate over gender-neutral renderings
    where the masculine carries representative force. The vocative ἀδελφοί likely
    addresses the whole church, but the masculine form should remain visible in the
    translation, with contextual inclusivity preserved by annotation.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
