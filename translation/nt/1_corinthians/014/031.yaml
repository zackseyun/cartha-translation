id: 1CO.14.31
reference: 1 Corinthians 14:31
source:
  edition: SBLGNT
  text: δύνασθε γὰρ καθ’ ἕνα πάντες προφητεύειν, ἵνα πάντες μανθάνωσιν καὶ πάντες
    παρακαλῶνται
translation:
  text: For you can all prophesy one by one, so that all may learn and all may be
    encouraged.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'one at a time.'
    reason: lexical_alternative
  - marker: b
    text: Or 'all may learn and all may be exhorted' or 'comforted'; the Greek verb
      can carry the senses of encouragement, exhortation, or comfort depending on
      context.
    reason: lexical_alternative
lexical_decisions:
- source_word: δύνασθε
  chosen: you can
  alternatives:
  - you are able
  - you may
  lexicon: BDAG
  rationale: Present middle/passive indicative, 2nd plural, expressing capability/possibility.
    'You can' is natural modern English and fits Paul's practical instruction better
    than the more formal 'you are able.'
- source_word: γὰρ
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: BDAG
  rationale: Marks explanation/grounding for the preceding instruction. 'For' preserves
    the connective force succinctly.
- source_word: καθ’ ἕνα
  chosen: one by one
  alternatives:
  - individually
  - one at a time
  lexicon: BDAG
  rationale: Idiomatic expression meaning in sequence, one person at a time. 'One
    by one' is the clearest natural equivalent in context of orderly congregational
    speech.
- source_word: πάντες
  chosen: all
  alternatives:
  - everyone
  lexicon: BDAG
  rationale: Repeated three times for emphasis. 'All' preserves the repetition and
    breadth without over-specifying individuals beyond the context.
- source_word: προφητεύειν
  chosen: prophesy
  alternatives:
  - speak prophetically
  lexicon: BDAG
  rationale: Standard rendering of the infinitive. 'Prophesy' preserves the established
    Pauline category without paraphrasing it into a narrower explanatory gloss.
- source_word: ἵνα
  chosen: so that
  alternatives:
  - in order that
  - that
  lexicon: BDAG
  rationale: Introduces purpose/result. 'So that' is readable modern English and preserves
    the clause's purposive sense.
- source_word: μανθάνωσιν
  chosen: may learn
  alternatives:
  - might learn
  - keep learning
  lexicon: BDAG
  rationale: Present active subjunctive, 3rd plural. 'May learn' reflects the subjunctive
    after ἵνα and keeps the general pedagogical sense.
- source_word: παρακαλῶνται
  chosen: may be encouraged
  alternatives:
  - may be exhorted
  - may be comforted
  lexicon: BDAG
  rationale: Present passive subjunctive, 3rd plural, from παρακαλέω, which can mean
    encourage, exhort, or comfort depending on context. In the setting of orderly
    prophetic speech building up the assembly, 'encouraged' best captures the broad
    edifying effect without narrowing it to admonition alone.
