theological_decisions:
- issue: Scope of πάντες ('all') in a congregational instruction context
  chosen_reading: Rendered as 'all' without specifying 'all of you' or 'all the prophets,'
    preserving Paul's broad rhetorical repetition while allowing the immediate context
    to define the group.
  alternative_readings:
  - all of you
  - all the prophets
  rationale: The verse repeats πάντες three times. The first likely refers to those
    permitted to prophesy in the assembly; the latter two to the gathered hearers/participants.
    Rather than resolve the scope more narrowly than the Greek does, the translation
    preserves the repeated 'all' and lets context carry the referent.
  doctrine_reference: Preserve theological tension rather than resolve it.
