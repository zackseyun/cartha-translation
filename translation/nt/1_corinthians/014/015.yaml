theological_decisions:
- issue: Meaning of πνεῦμα in the contrast between spirit and mind
  chosen_reading: Render generically as 'spirit' without specifying 'Holy Spirit'
    or 'human spirit' in the main text.
  alternative_readings:
  - the Spirit
  - my spirit
  rationale: The immediate context concerns ecstatic speech and intelligible understanding
    in worship, and interpreters differ on whether Paul means the human spirit, the
    Holy Spirit's activity, or the human spirit energized by the Holy Spirit. The
    Greek text leaves this less explicit than some interpretations do, so the translation
    preserves the ambiguity rather than resolving it.
  doctrine_reference: Preserve theological tension rather than resolve it.
