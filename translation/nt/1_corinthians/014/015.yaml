id: 1CO.14.15
reference: 1 Corinthians 14:15
source:
  edition: SBLGNT
  text: τί οὖν ἐστιν; προσεύξομαι τῷ πνεύματι, προσεύξομαι δὲ καὶ τῷ νοΐ· ψαλῶ τῷ
    πνεύματι, ψαλῶ δὲ καὶ τῷ νοΐ·
translation:
  text: What then is to be done? I will pray with the spirit, but I will also pray
    with the mind; I will sing praise with the spirit, but I will also sing praise
    with the mind.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the spirit' or 'by the spirit'; the Greek does not make explicit
      whether 'spirit' refers specifically to the Holy Spirit, the speaker's human
      spirit, or spiritual utterance.
    reason: lexical_alternative
  - marker: b
    text: Or 'with understanding' for 'with the mind.'
    reason: lexical_alternative
  - marker: c
    text: Or 'I will sing' or 'I will make melody.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τί οὖν ἐστιν;
  chosen: What then is to be done?
  alternatives:
  - What then is it?
  - What then?
  lexicon: BDAG
  rationale: The idiom τί οὖν ἐστιν; functions rhetorically to ask for the practical
    conclusion of the argument. 'What then is to be done?' brings out the sense more
    clearly in modern English than the more literal but less natural 'What then is
    it?' while staying close to the Greek.
- source_word: προσεύξομαι
  chosen: I will pray
  lexicon: BDAG
  rationale: Future middle of προσεύχομαι is straightforwardly rendered 'I will pray.'
    The middle voice does not require a distinct English reflexive expression here.
- source_word: τῷ πνεύματι
  chosen: with the spirit
  alternatives:
  - in the spirit
  - by the spirit
  lexicon: BDAG
  rationale: In this chapter Paul contrasts praying in/with the spirit and with the
    mind in the context of intelligibility in worship. 'With the spirit' best preserves
    the dative's instrumental/associative force and the parallel with 'with the mind'
    without over-specifying whether πνεῦμα refers to the human spirit or the Holy
    Spirit.
- source_word: τῷ νοΐ
  chosen: with the mind
  alternatives:
  - with understanding
  - with the understanding
  lexicon: BDAG
  rationale: νοῦς here denotes the faculty of understanding or conscious thought.
    'With the mind' keeps the lexical parallel with πνεῦμα and is natural English.
    'With understanding' is interpretive and less formally aligned with the Greek
    noun.
- source_word: ψαλῶ
  chosen: I will sing praise
  alternatives:
  - I will sing
  - I will make melody
  lexicon: BDAG
  rationale: ψάλλω in this context refers to sung praise. 'Sing praise' communicates
    the worship sense more clearly than bare 'sing' while avoiding the potentially
    archaic or overly literal 'make melody.'
- source_word: δὲ καὶ
  chosen: but I will also
  alternatives:
  - and also
  - also
  lexicon: BDAG
  rationale: 'The combination marks addition with mild contrast: not only one mode,
    but also the other. ''But I will also'' captures the balancing force in English
    discourse.'
