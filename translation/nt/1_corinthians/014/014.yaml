theological_decisions:
- issue: Referent of 'my spirit' (τὸ πνεῦμά μου)
  chosen_reading: the speaker's own spirit, not the Holy Spirit
  alternative_readings:
  - the Holy Spirit within the speaker
  rationale: The possessive 'my' and the contrast with 'my mind' favor an anthropological
    contrast within the speaker. Rendering as 'my spirit' preserves the text's wording
    without importing a stronger doctrinal claim about the Holy Spirit's direct referent.
  doctrine_reference: Preserve theological tension rather than resolve it
