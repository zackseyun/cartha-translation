id: 1CO.14.14
reference: 1 Corinthians 14:14
source:
  edition: SBLGNT
  text: ἐὰν γὰρ προσεύχωμαι γλώσσῃ, τὸ πνεῦμά μου προσεύχεται, ὁ δὲ νοῦς μου ἄκαρπός
    ἐστιν.
translation:
  text: For if I pray in a tongue, my spirit prays, but my mind is unfruitful.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in a language.' The Greek word can refer to a human language or to 'tongue'
      in the sense used throughout this chapter for Spirit-enabled speech.
    reason: lexical_alternative
  - marker: b
    text: Or 'my understanding is unfruitful.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐὰν γὰρ
  chosen: For if
  alternatives:
  - If indeed
  - For whenever
  lexicon: BDAG
  rationale: γάρ gives explanatory force linking this statement to Paul's argument,
    while ἐάν introduces a conditional clause. 'For if' preserves both functions in
    natural English.
- source_word: προσεύχωμαι
  chosen: I pray
  alternatives:
  - I am praying
  lexicon: BDAG
  rationale: Present subjunctive after ἐάν is best rendered with a simple present
    in English in this conditional construction.
- source_word: γλώσσῃ
  chosen: in a tongue
  alternatives:
  - in tongues
  - in a language
  lexicon: BDAG
  rationale: The singular dative is retained as 'in a tongue,' matching the Greek
    number and the immediate discourse about glossolalia. 'Language' is lexically
    possible but 'tongue' better preserves the established term in this chapter without
    over-paraphrasing.
- source_word: τὸ πνεῦμά μου
  chosen: my spirit
  alternatives:
  - my Spirit
  - my inner spirit
  lexicon: BDAG
  rationale: The possessive and lowercase 'spirit' best reflect the likely reference
    to the speaker's own spirit rather than the Holy Spirit. 'Inner spirit' would
    be interpretive expansion beyond the Greek.
- source_word: προσεύχεται
  chosen: prays
  alternatives:
  - is praying
  lexicon: BDAG
  rationale: Simple present gives a clear, idiomatic rendering and matches the aspectual
    force adequately in English.
- source_word: ὁ δὲ νοῦς μου
  chosen: but my mind
  alternatives:
  - but my understanding
  - but my intellect
  lexicon: BDAG
  rationale: νοῦς can denote mind or understanding. 'Mind' is the more direct lexical
    equivalent and preserves Paul's contrast with 'spirit' without narrowing the sense
    too much.
- source_word: ἄκαρπός ἐστιν
  chosen: is unfruitful
  alternatives:
  - bears no fruit
  - is unproductive
  lexicon: BDAG
  rationale: '''Is unfruitful'' is a close, natural rendering of the predicate adjective
    ἄκαρπος and preserves Paul''s metaphorical language.'
