theological_decisions:
- issue: Rendering κύριος in a scriptural citation of divine speech
  chosen_reading: the Lord
  alternative_readings:
  - the LORD
  rationale: The speaker in the Isaiah citation is Israel's God. Per doctrine, κύριος
    defaults to 'Lord.' Because the Greek text has κύριος rather than the Hebrew divine
    name, 'the Lord' is preferred in the main text, while the covenantal background
    can be noted as an alternative.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord; יְהוָה → the LORD'
