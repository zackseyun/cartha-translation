id: 1CO.14.21
reference: 1 Corinthians 14:21
source:
  edition: SBLGNT
  text: ἐν τῷ νόμῳ γέγραπται ὅτι Ἐν ἑτερογλώσσοις καὶ ἐν χείλεσιν ⸀ἑτέρων λαλήσω τῷ
    λαῷ τούτῳ, καὶ οὐδ’ οὕτως εἰσακούσονταί μου, λέγει κύριος.
translation:
  text: 'In the Law it is written: “By people of other tongues and by the lips of
    foreigners I will speak to this people, and not even in this way will they listen
    to me,” says the Lord.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “By other tongues and by the lips of others.”
    reason: lexical_alternative
  - marker: b
    text: Or “will they heed me.”
    reason: lexical_alternative
  - marker: c
    text: The quotation echoes Isaiah 28:11–12.
    reason: cross_reference
  - marker: d
    text: Because this is a citation of Israel’s God speaking, some translations render
      “says the LORD” to reflect the Hebrew background.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐν τῷ νόμῳ
  chosen: In the Law
  alternatives:
  - In the law
  - In the Scriptures
  lexicon: BDAG
  rationale: νόμος here refers broadly to the Jewish scriptural corpus, even though
    Paul is quoting Isaiah rather than the Pentateuch. Capitalizing 'Law' preserves
    the conventional Jewish/Pauline way of referring to Scripture while staying close
    to the Greek.
- source_word: γέγραπται
  chosen: it is written
  alternatives:
  - it stands written
  lexicon: BDAG
  rationale: Standard rendering of the perfect passive formula introducing Scripture
    citation; idiomatic and formally close.
- source_word: ἑτερογλώσσοις
  chosen: people of other tongues
  alternatives:
  - other tongues
  - foreign tongues
  - strange tongues
  lexicon: BDAG
  rationale: The adjective literally means 'of another/different language.' Adding
    'people of' makes the English syntax natural and reflects the instrumental sense
    in context, while preserving the connection to the topic of tongues in the surrounding
    passage.
- source_word: χείλεσιν ἑτέρων
  chosen: the lips of foreigners
  alternatives:
  - other lips
  - the lips of others
  lexicon: BDAG
  rationale: A literal image retained from the citation. 'Foreigners' makes explicit
    that ἑτέρων here refers to those of another people/language, not merely 'others'
    in a generic sense.
- source_word: λαλήσω
  chosen: I will speak
  alternatives:
  - I will talk
  lexicon: BDAG
  rationale: Simple future of λαλέω; 'speak' is the natural formal equivalent and
    fits divine speech.
- source_word: τῷ λαῷ τούτῳ
  chosen: to this people
  alternatives:
  - to this nation
  lexicon: BDAG
  rationale: λαός commonly means 'people,' especially covenant people in scriptural
    citation. 'Nation' would be possible but less natural here.
- source_word: οὐδ’ οὕτως
  chosen: not even in this way
  alternatives:
  - not even then
  - not even so
  lexicon: BDAG
  rationale: 'This preserves the emphatic force of οὐδέ plus οὕτως: even by this extraordinary
    means, the people still will not respond.'
- source_word: εἰσακούσονταί μου
  chosen: will they listen to me
  alternatives:
  - will they hear me
  - will they heed me
  lexicon: BDAG
  rationale: εἰσακούω can mean hear/listen attentively, often with the nuance of heeding.
    'Listen to me' is clear modern English; 'heed me' is a viable alternative preserved
    in a footnote because obedience is part of the sense.
- source_word: λέγει κύριος
  chosen: says the Lord
  alternatives:
  - says Lord
  - the Lord says
  lexicon: BDAG
  rationale: κύριος follows the doctrine default 'Lord.' The present-tense citation
    formula is naturally rendered 'says the Lord.'
