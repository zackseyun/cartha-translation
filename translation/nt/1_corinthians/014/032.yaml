theological_decisions:
- issue: Meaning of 'spirits of prophets' in relation to prophetic control
  chosen_reading: The verse teaches that prophetic spiritual impulses are under the
    control of the prophets themselves.
  alternative_readings:
  - The verse refers to the prophets' human spirits being subject to other prophets
  - The verse refers to prophetic messages being evaluated by prophets
  rationale: In the immediate context of orderly prophecy in gathered worship (14:29-33),
    Paul argues against ecstatic loss of self-control. The wording should preserve
    that prophets remain responsible and orderly without importing a specific later
    doctrinal framework about spiritual manifestations.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it'
