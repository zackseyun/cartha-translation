id: 1CO.14.30
reference: 1 Corinthians 14:30
source:
  edition: SBLGNT
  text: ἐὰν δὲ ἄλλῳ ἀποκαλυφθῇ καθημένῳ, ὁ πρῶτος σιγάτω.
translation:
  text: But if a revelation is given to another who is seated, let the first be silent.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'if something is revealed to another who is seated.'
    reason: lexical_alternative
  - marker: b
    text: That is, the first speaker should stop speaking so the other may speak.
    reason: cross_reference
lexical_decisions:
- source_word: ἐὰν δὲ
  chosen: But if
  alternatives:
  - Now if
  - And if
  lexicon: BDAG
  rationale: ἐὰν introduces a conditional clause ('if'), and δὲ marks a mild contrast
    or development. 'But if' fits the flow of corrective instruction in this context.
- source_word: ἄλλῳ
  chosen: to another
  alternatives:
  - to someone else
  - to another person
  lexicon: BDAG
  rationale: Dative singular of ἄλλος indicates another participant distinct from
    the current speaker. 'To another' is concise and preserves the interpersonal contrast.
- source_word: ἀποκαλυφθῇ
  chosen: is given
  alternatives:
  - is revealed
  - comes by revelation
  lexicon: BDAG
  rationale: Aorist passive subjunctive of ἀποκαλύπτω literally means 'is revealed.'
    In this prophetic-church setting, English idiom is smoother with 'a revelation
    is given,' which preserves the passive sense and implies divine disclosure without
    over-specifying the agent.
- source_word: ἀποκαλυφθῇ ... ἄλλῳ
  chosen: a revelation is given to another
  alternatives:
  - something is revealed to another
  - another receives a revelation
  lexicon: BDAG
  rationale: The clause likely refers not merely to abstract disclosure but to a revelatory
    message received by another participant. Supplying 'a revelation' in English reflects
    the event implied by the passive verb in context.
- source_word: καθημένῳ
  chosen: who is seated
  alternatives:
  - who is sitting
  - sitting there
  lexicon: BDAG
  rationale: Present middle/passive participle, dative singular, modifying ἄλλῳ. 'Who
    is seated' is natural and slightly more formal, fitting the instructional tone
    while preserving the image of one seated among the assembly.
- source_word: ὁ πρῶτος
  chosen: the first
  alternatives:
  - the first speaker
  - the one speaking first
  lexicon: BDAG
  rationale: Literally 'the first.' In context it refers to the first prophet/speaker
    currently speaking. The main text keeps the literal expression; the contextual
    sense is clear from the surrounding discourse.
- source_word: σιγάτω
  chosen: let ... be silent
  alternatives:
  - must keep silent
  - should stop speaking
  lexicon: BDAG
  rationale: Present active imperative, third singular, from σιγάω. 'Let the first
    be silent' preserves the imperative force without sounding overly harsh. It implies
    ceasing speech in order to yield the floor.
