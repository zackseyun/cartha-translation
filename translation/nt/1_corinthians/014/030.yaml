theological_decisions:
- issue: Nature of the revelatory event in congregational prophecy
  chosen_reading: Render the passive as 'a revelation is given' without specifying
    the divine agent explicitly.
  alternative_readings:
  - '''something is revealed to another'''
  - '''another receives a revelation from God'''
  rationale: The passive verb naturally implies revelation, and within Paul's discussion
    the source is understood to be God, but the text itself does not explicitly name
    the agent here. The translation preserves that restraint and avoids importing
    a fuller doctrinal statement than the verse itself makes.
  doctrine_reference: Translation philosophy items 1 and 3
