theological_decisions:
- issue: Representative masculine address in congregational instruction
  chosen_reading: Retain 'brothers' in the main text, with a footnote indicating the
    inclusive sense in context.
  alternative_readings:
  - brothers and sisters
  rationale: 'This follows the doctrine''s gender-accurate principle: preserve the
    masculine form where it carries representative force, while annotating inclusivity
    where relevant.'
  doctrine_reference: 'DOCTRINE.md §Translation philosophy #4'
- issue: Meaning of γλῶσσα in this chapter
  chosen_reading: Render as 'tongue' rather than 'language' in the main text.
  alternative_readings:
  - language
  rationale: The immediate context in 1 Corinthians 12–14 uses γλῶσσα as a technical
    term for the phenomenon under discussion. 'Tongue' preserves the textual and theological
    tension without deciding beyond the text whether the speech is known human language,
    ecstatic speech, or a broader category.
  doctrine_reference: 'DOCTRINE.md §Translation philosophy #3'
