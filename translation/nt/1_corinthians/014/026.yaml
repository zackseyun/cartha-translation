id: 1CO.14.26
reference: 1 Corinthians 14:26
source:
  edition: SBLGNT
  text: Τί οὖν ἐστιν, ἀδελφοί; ὅταν συνέρχησθε, ⸀ἕκαστος ψαλμὸν ἔχει, διδαχὴν ἔχει,
    ⸂ἀποκάλυψιν ἔχει, γλῶσσαν⸃ ἔχει, ἑρμηνείαν ἔχει· πάντα πρὸς οἰκοδομὴν γινέσθω.
translation:
  text: What then is it, brothers? When you come together, each one has a psalm, has
    a teaching, has a revelation, has a tongue, has an interpretation. Let all things
    be done for building up.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '''Brothers'' here addresses the congregation representatively, including
      women as well as men.'
    reason: lexical_alternative
  - marker: b
    text: Or 'a language.' The Greek term can denote a tongue or language; here 'tongue'
      preserves Paul's wording in this discussion.
    reason: alternative_reading
lexical_decisions:
- source_word: Τί οὖν ἐστιν
  chosen: What then is it
  alternatives:
  - What then
  - What then, brothers?
  lexicon: BDAG
  rationale: Retains the idiomatic rhetorical question while staying close to the
    Greek wording. The phrase introduces Paul's practical conclusion from the preceding
    discussion.
- source_word: ἀδελφοί
  chosen: brothers
  alternatives:
  - brothers and sisters
  - siblings
  lexicon: BDAG
  rationale: 'Rendered gender-accurately per doctrine: the Greek is grammatically
    masculine plural but addresses the mixed congregation representatively. The main
    text keeps ''brothers,'' with inclusivity clarified in a footnote.'
- source_word: ὅταν συνέρχησθε
  chosen: When you come together
  alternatives:
  - Whenever you assemble
  - When you gather together
  lexicon: BDAG
  rationale: Natural modern English for the repeated Corinthian context of congregational
    assembly, preserving the temporal sense of ὅταν with the subjunctive.
- source_word: ἕκαστος
  chosen: each one
  alternatives:
  - each
  - every one of you
  lexicon: BDAG
  rationale: Captures the distributive force clearly in English and fits the list
    that follows.
- source_word: ψαλμὸν
  chosen: a psalm
  alternatives:
  - a song
  - a hymn
  lexicon: BDAG
  rationale: Keeps the more specific term rather than broadening to 'song.' It likely
    refers to a sung praise item, but 'psalm' best reflects the Greek noun.
- source_word: διδαχὴν
  chosen: a teaching
  alternatives:
  - instruction
  - doctrine
  lexicon: BDAG
  rationale: Readable and accurate; 'doctrine' sounds too systematized here, while
    'teaching' fits a congregational contribution.
- source_word: ἀποκάλυψιν
  chosen: a revelation
  alternatives:
  - an unveiling
  - a disclosure
  lexicon: BDAG
  rationale: Standard and transparent rendering for a revelatory disclosure given
    in the assembly.
- source_word: γλῶσσαν
  chosen: a tongue
  alternatives:
  - a language
  - an utterance in a tongue
  lexicon: BDAG
  rationale: In 1 Corinthians 12–14 γλῶσσα in this setting conventionally refers to
    tongue-speech. 'Tongue' preserves the established Pauline term without prematurely
    resolving the precise phenomenon.
- source_word: ἑρμηνείαν
  chosen: an interpretation
  alternatives:
  - a translation
  - an explanation
  lexicon: BDAG
  rationale: Best fits the immediate context of interpreting tongue-speech for the
    congregation.
- source_word: πάντα
  chosen: all things
  alternatives:
  - everything
  lexicon: BDAG
  rationale: Slightly more formal phrasing matches the comprehensive scope of Paul's
    instruction and pairs well with the imperative.
- source_word: πρὸς οἰκοδομὴν
  chosen: for building up
  alternatives:
  - for edification
  - for strengthening
  lexicon: BDAG
  rationale: Chooses accessible modern English over ecclesiastical 'edification' while
    preserving the metaphor of communal construction/strengthening.
- source_word: γινέσθω
  chosen: Let all things be done
  alternatives:
  - Let all things happen
  - Let everything take place
  lexicon: BDAG
  rationale: English idiom naturally supplies 'be done' for the permissive/imperatival
    force here, expressing Paul's directive for orderly congregational practice.
