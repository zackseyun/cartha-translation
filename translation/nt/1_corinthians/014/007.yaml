id: 1CO.14.7
reference: 1 Corinthians 14:7
source:
  edition: SBLGNT
  text: ὅμως τὰ ἄψυχα φωνὴν διδόντα, εἴτε αὐλὸς εἴτε κιθάρα, ἐὰν διαστολὴν τοῖς φθόγγοις
    μὴ ⸀δῷ, πῶς γνωσθήσεται τὸ αὐλούμενον ἢ τὸ κιθαριζόμενον;
translation:
  text: Even lifeless things that produce sound—whether flute or harp—if they do not
    give a distinction in the notes, how will what is being played on the flute or
    on the harp be recognized?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'whether flute or lyre.' The Greek κιθάρα refers to an ancient stringed
      instrument more specifically like a lyre, though 'harp' is used here for readability.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅμως
  chosen: Even
  alternatives:
  - Nevertheless
  - Yet
  - Likewise
  lexicon: BDAG
  rationale: 'Introduces an illustrative comparison with emphatic force. ''Even''
    fits the argument smoothly in English: Paul moves from living speakers to inanimate
    instruments as a further example.'
- source_word: τὰ ἄψυχα
  chosen: lifeless things
  alternatives:
  - inanimate things
  - things without life
  lexicon: BDAG
  rationale: The neuter plural refers broadly to nonliving objects, here specifically
    musical instruments. 'Lifeless things' is natural English and preserves the contrast
    with living speakers.
- source_word: φωνὴν διδόντα
  chosen: that produce sound
  alternatives:
  - giving a sound
  - making a sound
  lexicon: BDAG
  rationale: A participial phrase modifying 'lifeless things.' 'Produce sound' is
    idiomatic modern English while staying close to the Greek sense of 'give a sound/voice.'
- source_word: εἴτε αὐλὸς εἴτε κιθάρα
  chosen: whether flute or harp
  alternatives:
  - whether pipe or lyre
  - whether flute or lyre
  lexicon: BDAG
  rationale: αὐλός is a wind instrument commonly rendered 'flute' or 'pipe'; κιθάρα
    is an ancient stringed instrument, often 'harp' or 'lyre.' 'Flute or harp' is
    more immediately intelligible to modern readers, though 'lyre' is historically
    more specific; the alternative is preserved in a footnote.
- source_word: ἐὰν διαστολὴν τοῖς φθόγγοις μὴ δῷ
  chosen: if they do not give a distinction in the notes
  alternatives:
  - if it does not make a distinction in the sounds
  - if they do not produce distinct tones
  lexicon: BDAG
  rationale: διαστολή conveys distinction/differentiation; φθόγγοι are tones, sounds,
    or notes. The plural subject sense follows the generic reference to instruments.
    'Distinction in the notes' preserves the idea that the sounds must be differentiated
    to communicate melody.
- source_word: πῶς γνωσθήσεται
  chosen: how will ... be recognized
  alternatives:
  - how will ... be known
  - how will ... be understood
  lexicon: BDAG
  rationale: 'Future passive of γινώσκω here means to become known or recognized.
    ''Recognized'' fits the musical context: one can identify the tune only if the
    notes are distinct.'
- source_word: τὸ αὐλούμενον
  chosen: what is being played on the flute
  alternatives:
  - the flute tune
  - what is being piped
  lexicon: BDAG
  rationale: The articular passive participle refers to the musical piece being performed
    by flute, not merely the instrument itself. 'What is being played on the flute'
    makes the implicit object explicit in natural English.
- source_word: τὸ κιθαριζόμενον
  chosen: on the harp
  alternatives:
  - what is being played on the harp
  - on the lyre
  lexicon: BDAG
  rationale: 'Paired with the previous participle, this refers to the piece played
    on the stringed instrument. To avoid awkward repetition, the full sense is carried
    by ellipsis in English: ''what is being played on the flute or on the harp.'''
