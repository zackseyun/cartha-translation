theological_decisions:
- issue: Relative superiority of prophecy over tongues
  chosen_reading: Paul states that the one prophesying is 'greater' in the sense of
    greater usefulness for congregational edification, not greater intrinsic spiritual
    status.
  alternative_readings:
  - greater in rank or holiness
  rationale: The immediate purpose clause 'so that the church may receive edification'
    defines the comparison functionally. The translation keeps 'greater' in the text
    and explains the contextual sense here rather than importing a hierarchy of spirituality.
  doctrine_reference: Preserve theological tension rather than resolve it; do not
    import doctrinal claims the text does not make.
- issue: Referent of διερμηνεύῃ
  chosen_reading: The interpreter is most naturally the tongue-speaker himself ('unless
    he interprets').
  alternative_readings:
  - unless someone interprets
  - unless there is interpretation
  rationale: The singular verb without an explicit new subject most naturally continues
    the singular subject of 'the one who speaks in tongues.' However, the broader
    chapter allows interpretation by another person, so that alternative is preserved
    in a footnote rather than forced into the main text.
  doctrine_reference: Preserve theological tension rather than resolve it.
