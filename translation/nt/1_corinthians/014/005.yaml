id: 1CO.14.5
reference: 1 Corinthians 14:5
source:
  edition: SBLGNT
  text: θέλω δὲ πάντας ὑμᾶς λαλεῖν γλώσσαις, μᾶλλον δὲ ἵνα προφητεύητε· μείζων ⸀δὲ
    ὁ προφητεύων ἢ ὁ λαλῶν γλώσσαις, ἐκτὸς εἰ μὴ ⸀διερμηνεύῃ, ἵνα ἡ ἐκκλησία οἰκοδομὴν
    λάβῃ.
translation:
  text: Now I want all of you to speak in tongues, but even more that you would prophesy.
    The one who prophesies is greater than the one who speaks in tongues, unless he
    interprets, so that the church may receive edification.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'unless someone interprets.' The Greek singular verb could refer to
      the tongue-speaker himself or, more generally in context, to interpretation
      being provided.
    reason: alternative_reading
  - marker: b
    text: '''Edification'' means the building up of the gathered church.'
    reason: lexical_alternative
lexical_decisions:
- source_word: θέλω
  chosen: I want
  alternatives:
  - I wish
  - I desire
  lexicon: BDAG
  rationale: Present indicative expressing Paul's personal desire or preference. 'I
    want' is natural modern English and preserves the directness without sounding
    overly formal.
- source_word: πάντας ὑμᾶς
  chosen: all of you
  alternatives:
  - you all
  - every one of you
  lexicon: BDAG
  rationale: Explicitly plural and comprehensive; 'all of you' clearly conveys Paul's
    inclusive address to the whole congregation.
- source_word: λαλεῖν γλώσσαις
  chosen: to speak in tongues
  alternatives:
  - to speak with tongues
  - to speak in other languages
  lexicon: BDAG
  rationale: This is the established and contextually accurate rendering in 1 Corinthians
    12–14 for glossolalic speech. 'Tongues' preserves the lexical form γλώσσαις while
    matching idiomatic English usage in this discourse.
- source_word: μᾶλλον δὲ
  chosen: but even more
  alternatives:
  - but rather
  - and more
  lexicon: BDAG
  rationale: Marks contrast of preference, not absolute rejection. 'But even more'
    preserves Paul's comparative valuation.
- source_word: ἵνα προφητεύητε
  chosen: that you would prophesy
  alternatives:
  - that you may prophesy
  - for you to prophesy
  lexicon: BDAG
  rationale: After θέλω, ἵνα with subjunctive expresses desired result/content. 'That
    you would prophesy' is idiomatic and preserves the volitional nuance.
- source_word: μείζων
  chosen: greater
  alternatives:
  - more important
  - superior
  lexicon: BDAG
  rationale: Comparative adjective indicating relative value in the congregational
    setting. 'Greater' is sufficiently literal while allowing the context to define
    the sense as greater usefulness for edification, not greater personal worth.
- source_word: ὁ προφητεύων
  chosen: the one who prophesies
  alternatives:
  - the person who prophesies
  - the prophetizing one
  lexicon: BDAG
  rationale: Substantival participle referring to a person characterized by the action.
    'The one who prophesies' is natural and preserves the generic singular.
- source_word: ὁ λαλῶν γλώσσαις
  chosen: the one who speaks in tongues
  alternatives:
  - the person who speaks in tongues
  lexicon: BDAG
  rationale: Parallel substantival participle; keeping the same structure preserves
    Paul's comparison.
- source_word: ἐκτὸς εἰ μὴ
  chosen: unless
  alternatives:
  - except if
  - unless indeed
  lexicon: BDAG
  rationale: Standard idiomatic rendering of the exception clause.
- source_word: διερμηνεύῃ
  chosen: he interprets
  alternatives:
  - he translates
  - there is interpretation
  lexicon: BDAG
  rationale: The singular verb most naturally refers back to the tongue-speaker in
    the immediate comparison. 'Interprets' fits the chapter's terminology better than
    'translates.'
- source_word: ἡ ἐκκλησία
  chosen: the church
  alternatives:
  - the assembly
  - the congregation
  lexicon: BDAG
  rationale: In Pauline usage this refers to the gathered Christian community. 'Church'
    is the most natural rendering in English, though the sense here is specifically
    the assembled congregation.
- source_word: οἰκοδομὴν λάβῃ
  chosen: may receive edification
  alternatives:
  - may be built up
  - may receive building up
  lexicon: BDAG
  rationale: Literally 'may receive edification/building up.' 'Receive edification'
    preserves the verbal image of receiving benefit from the interpreted message and
    stays close to the Greek structure.
