id: 1CO.14.9
reference: 1 Corinthians 14:9
source:
  edition: SBLGNT
  text: οὕτως καὶ ὑμεῖς διὰ τῆς γλώσσης ἐὰν μὴ εὔσημον λόγον δῶτε, πῶς γνωσθήσεται
    τὸ λαλούμενον; ἔσεσθε γὰρ εἰς ἀέρα λαλοῦντες.
translation:
  text: 'So also with you: if through the tongue you do not give intelligible speech,
    how will what is spoken be understood? For you will be speaking into the air.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'distinct speech' or 'a clear message.' The Greek emphasizes speech that
      is recognizable and understandable to hearers.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὕτως καὶ ὑμεῖς
  chosen: So also with you
  alternatives:
  - So also you
  - In the same way, you also
  lexicon: BDAG
  rationale: Captures Paul's comparison with the preceding illustration and addresses
    the Corinthians directly. 'With you' makes the application idiomatic in English
    without adding content beyond the Greek.
- source_word: διὰ τῆς γλώσσης
  chosen: through the tongue
  alternatives:
  - with the tongue
  - by means of the tongue
  lexicon: BDAG
  rationale: A relatively formal rendering preserves the concrete imagery of 'tongue'
    rather than immediately interpreting it as 'language.' In context Paul is speaking
    about vocal utterance, and the phrase naturally means by means of speech.
- source_word: εὔσημον λόγον
  chosen: intelligible speech
  alternatives:
  - a clear message
  - distinct speech
  - understandable word
  lexicon: BDAG
  rationale: εὔσημος denotes something clear, distinct, or readily recognized. Rendering
    the phrase as 'intelligible speech' communicates the sense naturally in English
    while preserving the focus on comprehensibility. 'Word' would sound too narrow
    in English for the collective sense here.
- source_word: δῶτε
  chosen: you do not give
  alternatives:
  - you do not produce
  - you do not utter
  lexicon: BDAG
  rationale: Retains the verbal idea of 'give' from δίδωμι, which is idiomatic enough
    in English with 'speech' and reflects the Greek more closely than a freer paraphrase.
- source_word: πῶς γνωσθήσεται
  chosen: how will ... be understood
  alternatives:
  - how will ... be known
  - how will ... be recognized
  lexicon: BDAG
  rationale: Although γινώσκω is literally 'know,' the passive here in context concerns
    comprehension by hearers. 'Be understood' best conveys the communicative point
    of the argument.
- source_word: τὸ λαλούμενον
  chosen: what is spoken
  alternatives:
  - what is being said
  - the thing spoken
  lexicon: BDAG
  rationale: A natural rendering of the substantival participle that preserves the
    passive sense and avoids awkward English.
- source_word: ἔσεσθε γὰρ εἰς ἀέρα λαλοῦντες
  chosen: For you will be speaking into the air
  alternatives:
  - For you will be talking to the air
  - For you will be speaking into empty air
  lexicon: BDAG
  rationale: Preserves the metaphor of futile, uncomprehended speech. 'Into the air'
    is the most direct and idiomatic rendering of εἰς ἀέρα.
