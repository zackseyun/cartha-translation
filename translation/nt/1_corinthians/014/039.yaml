id: 1CO.14.39
reference: 1 Corinthians 14:39
source:
  edition: SBLGNT
  text: ὥστε, ἀδελφοί ⸀μου, ζηλοῦτε τὸ προφητεύειν, καὶ τὸ λαλεῖν ⸂μὴ κωλύετε γλώσσαις⸃·
translation:
  text: So then, my brothers, be eager to prophesy, and do not forbid speaking in
    tongues.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'brothers and sisters'; the Greek says 'brothers' and may address the
      whole congregation inclusively.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὥστε
  chosen: So then
  alternatives:
  - therefore
  - so
  lexicon: BDAG
  rationale: Inferential conjunction drawing a conclusion from the preceding discussion;
    'So then' is natural English that preserves the summative force.
- source_word: ἀδελφοί μου
  chosen: my brothers
  alternatives:
  - brothers
  - brothers and sisters
  lexicon: BDAG
  rationale: Vocative plural with possessive 'my.' Per gender-accurate philosophy,
    'brothers' preserves the masculine form while still functioning representatively
    in context; inclusivity can be noted in a footnote rather than flattening the
    source form.
- source_word: ζηλοῦτε
  chosen: be eager
  alternatives:
  - be zealous
  - earnestly desire
  lexicon: BDAG
  rationale: Present active imperative calls for ongoing earnest pursuit. 'Be eager'
    is clear modern English and fits the positive exhortational sense without sounding
    archaic.
- source_word: τὸ προφητεύειν
  chosen: to prophesy
  alternatives:
  - prophecy
  - the act of prophesying
  lexicon: BDAG
  rationale: Articular infinitive functioning as the object of the exhortation. English
    idiom is best served by the infinitive 'to prophesy' rather than a more wooden
    nominal expression.
- source_word: μὴ κωλύετε
  chosen: do not forbid
  alternatives:
  - do not prevent
  - do not hinder
  lexicon: BDAG
  rationale: Present imperative with μή gives a prohibition. 'Forbid' best matches
    the directness of κωλύω in this ecclesial instruction.
- source_word: τὸ λαλεῖν γλώσσαις
  chosen: speaking in tongues
  alternatives:
  - to speak in tongues
  - speaking with tongues
  lexicon: BDAG
  rationale: The articular infinitive plus dative γλώσσαις refers to the practice
    under discussion in this chapter. 'Speaking in tongues' is the standard, natural
    rendering in contemporary English and accurately conveys the idiom.
