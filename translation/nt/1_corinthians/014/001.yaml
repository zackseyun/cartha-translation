id: 1CO.14.1
reference: 1 Corinthians 14:1
source:
  edition: SBLGNT
  text: Διώκετε τὴν ἀγάπην, ζηλοῦτε δὲ τὰ πνευματικά, μᾶλλον δὲ ἵνα προφητεύητε.
translation:
  text: Pursue love, and earnestly desire the spiritual gifts, especially that you may prophesy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the spiritual things' or 'spiritual matters.' The Greek is broader than 'gifts,' but here the context focuses on Spirit-given manifestations in the church.
    reason: lexical_alternative
  - marker: b
    text: Or 'but rather that you may prophesy.'
    reason: alternative_reading
  - marker: c
    text: Or 'but especially that you may prophesy'.
    reason: previous_rendering
lexical_decisions:
- source_word: Διώκετε
  chosen: Pursue
  alternatives:
  - Follow after
  - Seek eagerly
  lexicon: BDAG
  rationale: διώκω literally can mean 'pursue' or 'chase,' and in ethical contexts 'strive for.' 'Pursue' preserves the active, sustained force better than a weaker 'seek.'
- source_word: ἀγάπην
  chosen: love
  alternatives:
  - charity
  lexicon: BDAG
  rationale: Per doctrine default, ἀγάπη is rendered 'love.' 'Charity' is archaic in contemporary English and would obscure the lexical connection to the preceding chapter.
- source_word: ζηλοῦτε
  chosen: earnestly desire
  alternatives:
  - be zealous for
  - eagerly seek
  lexicon: BDAG
  rationale: ζηλόω can denote zeal, strong desire, or earnest concern. 'Earnestly desire' communicates the positive imperative sense clearly in modern English without sounding awkwardly literal.
- source_word: τὰ πνευματικά
  chosen: the spiritual gifts
  alternatives:
  - spiritual things
  - spiritual matters
  - the things of the Spirit
  lexicon: BDAG
  rationale: The neuter plural adjective can mean 'spiritual things/matters' broadly, but in the immediate context of chapters 12–14 Paul is discussing manifestations/gifts of the Spirit. Rendering it 'the spiritual gifts' makes the referent explicit in idiomatic English while staying within the contextual sense.
- source_word: μᾶλλον
  chosen: especially
  alternatives:
  - rather
  - more
  lexicon: BDAG
  rationale: μᾶλλον marks preference or greater emphasis. 'Especially' fits the exhortational flow better than the more wooden 'rather' while preserving the comparative force.
- source_word: ἵνα προφητεύητε
  chosen: that you may prophesy
  alternatives:
  - to prophesy
  - that you should prophesy
  lexicon: BDAG
  rationale: ἵνα with the subjunctive expresses content/purpose of the desire. 'That you may prophesy' is natural English and preserves the subordinate construction.
- source_word: προφητεύητε
  chosen: prophesy
  alternatives:
  - speak prophetically
  lexicon: BDAG
  rationale: The standard rendering 'prophesy' is clear and preserves the established biblical category without unnecessary paraphrase.
