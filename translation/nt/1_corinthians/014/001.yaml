theological_decisions:
- issue: Scope of τὰ πνευματικά
  chosen_reading: Rendered as 'the spiritual gifts' in light of the immediate context of 1 Corinthians 12–14.
  alternative_readings:
  - the spiritual things
  - spiritual matters
  rationale: Although the Greek expression is formally broader than 'gifts,' Paul's surrounding discussion concerns Spirit-given manifestations in the assembly, especially prophecy and tongues. The translation makes this contextual referent explicit without importing a sectarian theology of gifts.
  doctrine_reference: Translation philosophy §1, §5
- issue: Force of Paul's preference for prophecy
  chosen_reading: Rendered μᾶλλον δὲ ἵνα προφητεύητε as 'but especially that you may prophesy.'
  alternative_readings:
  - but rather that you may prophesy
  rationale: This preserves Paul's prioritization of prophecy over other spiritual manifestations in this context, without implying that prophecy is the only valid gift or flattening the comparative nuance.
  doctrine_reference: Translation philosophy §3
revisions:
- timestamp: '2026-04-21T00:59:48Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/nt/1_corinthians/014/001.json
  category: awkward_english
  tier: 1
  from: but especially that you may prophesy
  to: especially that you may prophesy
  rationale: The current phrasing creates a slight grammatical imbalance by making the noun phrase 'the spiritual gifts' and the clause 'that you may prophesy' parallel objects of the verb 'desire', linked by 'but especially'. This is understandable but slightly clunky in English. Simply removing the adversative 'but' allows 'especially...' to function more smoothly as a specification of the initial desire, a common English idiom. This improves readability without losing the comparative force of μᾶλλον, as the δὲ in μᾶλλον δὲ does not always require an explicit 'but' in translation.
