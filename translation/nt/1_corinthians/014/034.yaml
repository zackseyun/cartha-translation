id: 1CO.14.34
reference: 1 Corinthians 14:34
source:
  edition: SBLGNT
  text: Αἱ ⸀γυναῖκες ἐν ταῖς ἐκκλησίαις σιγάτωσαν, οὐ γὰρ ⸀ἐπιτρέπεται αὐταῖς λαλεῖν·
    ἀλλὰ ⸀ὑποτασσέσθωσαν, καθὼς καὶ ὁ νόμος λέγει.
translation:
  text: The women should keep silent in the churches, for they are not permitted to
    speak, but should be in submission, just as the law also says.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "the wives should keep silent in the churches"; γυνή can mean either
      "woman" or "wife" depending on context.
    reason: alternative_reading
  - marker: b
    text: That is, the verse does not itself specify what kind of speaking is in view;
      some understand it more narrowly from the surrounding context.
    reason: lexical_alternative
  - marker: c
    text: Or "the Law"; Paul may be referring specifically to the Mosaic Law or more
      broadly to Scripture.
    reason: alternative_reading
lexical_decisions:
- source_word: γυναῖκες
  chosen: the women
  alternatives:
  - wives
  lexicon: BDAG
  rationale: γυνή can mean either 'woman' or 'wife.' In this context, the plural with
    article is most naturally rendered 'the women,' referring to women in the gathered
    assemblies. 'Wives' is possible in some interpretations, but the immediate wording
    does not explicitly mark husbands, so the broader sense is retained in the main
    text.
- source_word: ἐκκλησίαις
  chosen: churches
  alternatives:
  - assemblies
  - congregations
  lexicon: BDAG
  rationale: ἐκκλησία in Pauline usage commonly refers to gathered Christian assemblies/churches.
    'Churches' is the most natural modern rendering here, while still allowing the
    sense of gathered congregations.
- source_word: σιγάτωσαν
  chosen: should keep silent
  alternatives:
  - must be silent
  - should be silent
  lexicon: BDAG
  rationale: The present active imperative calls for silence/restraint in the setting
    described. 'Keep silent' preserves the verbal force and matches the nearby discourse
    in this chapter, where the same verb is used for orderly silence.
- source_word: ἐπιτρέπεται
  chosen: are not permitted
  alternatives:
  - it is not allowed
  - it is not permitted
  lexicon: BDAG
  rationale: The passive form expresses permission being denied. 'Are not permitted'
    is clear modern English and preserves the impersonal force without overparaphrase.
- source_word: λαλεῖν
  chosen: to speak
  alternatives:
  - to talk
  lexicon: BDAG
  rationale: λαλέω is a broad verb for speaking. 'To speak' is the standard and suitably
    neutral rendering; 'to talk' is too colloquial.
- source_word: ὑποτασσέσθωσαν
  chosen: should be in submission
  alternatives:
  - should submit themselves
  - should be subordinate
  lexicon: BDAG
  rationale: The present middle/passive imperative indicates a posture of submission.
    'Should be in submission' preserves the imperative sense while avoiding an unnecessarily
    harsh English expression like 'be subordinate.'
- source_word: νόμος
  chosen: the law
  alternatives:
  - the Law
  lexicon: BDAG
  rationale: νόμος is rendered 'the law' here. Capitalization is interpretive in English;
    the Greek itself does not mark case distinction. Lowercase preserves ambiguity
    as to whether Paul means Scripture's legal corpus specifically or scriptural principle
    more broadly.
- source_word: καθὼς καὶ ὁ νόμος λέγει
  chosen: just as the law also says
  alternatives:
  - as the law also says
  - just as the Law says
  lexicon: BDAG
  rationale: καθὼς ... καί introduces comparison with an additional supporting appeal.
    'Just as the law also says' preserves both the comparative force and the καί.
