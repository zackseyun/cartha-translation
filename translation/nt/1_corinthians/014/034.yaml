theological_decisions:
- issue: Referent of γυναῖκες
  chosen_reading: women in the assemblies
  alternative_readings:
  - wives in the assemblies
  rationale: The verse has been interpreted either as addressing women generally or
    wives specifically. Since the Greek term can bear either sense and the immediate
    verse does not specify husbands, the broader rendering 'women' is retained in
    the main text, with the narrower alternative preserved in a footnote to maintain
    interpretive transparency.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Scope of the prohibition on speaking
  chosen_reading: rendered straightforwardly without narrowing the kind of speech
    in the main text
  alternative_readings:
  - a restriction on disruptive speech
  - a restriction limited to judging prophecies
  rationale: The Greek simply says 'to speak' in this verse. Because the broader contextual
    limitation is debated, the translation does not import a narrower interpretive
    gloss into the main text.
  doctrine_reference: Original-language primacy over translation tradition; Preserve
    theological tension rather than resolve it.
- issue: Meaning of ὁ νόμος
  chosen_reading: the law
  alternative_readings:
  - the Law (as the Mosaic Law specifically)
  - Scripture more broadly
  rationale: Paul's exact referent is debated. The translation preserves the Greek's
    ambiguity by using 'the law' and not specifying a source beyond the text itself.
  doctrine_reference: Preserve theological tension rather than resolve it.
