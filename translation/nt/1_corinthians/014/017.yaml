theological_decisions:
- issue: Pauline metaphor of οἰκοδομέω in congregational context
  chosen_reading: is not built up
  alternative_readings:
  - is not edified
  rationale: The translation preserves Paul's metaphor of communal spiritual strengthening
    without importing a narrower doctrinal meaning. 'Built up' is more accessible
    while remaining faithful to the image and argument of the chapter.
  doctrine_reference: Translation philosophy §6; §5
