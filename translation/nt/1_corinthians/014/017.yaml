id: 1CO.14.17
reference: 1 Corinthians 14:17
source:
  edition: SBLGNT
  text: σὺ μὲν γὰρ καλῶς εὐχαριστεῖς, ἀλλ’ ὁ ἕτερος οὐκ οἰκοδομεῖται.
translation:
  text: For you may indeed give thanks well, but the other person is not built up.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the other is not edified.'
    reason: lexical_alternative
lexical_decisions:
- source_word: σὺ
  chosen: you
  lexicon: BDAG
  rationale: Second-person singular pronoun retained for direct address; English 'you'
    does not mark singular, but context makes the individual addressee clear.
- source_word: μὲν γὰρ
  chosen: for ... indeed
  alternatives:
  - for
  - indeed
  - to be sure
  lexicon: BDAG
  rationale: The combination marks explanatory force (γάρ) with a concessive/contrastive
    setup (μέν ... ἀλλά). Rendering both ideas in English preserves Paul's acknowledgment
    before the contrast.
- source_word: καλῶς
  chosen: well
  alternatives:
  - properly
  - beautifully
  lexicon: BDAG
  rationale: Adverb meaning 'well' or 'properly'; 'well' is the most natural modern
    English equivalent and fits the evaluative sense here.
- source_word: εὐχαριστεῖς
  chosen: give thanks
  alternatives:
  - offer thanks
  - thank
  lexicon: BDAG
  rationale: In this context of prayer/speech in the assembly, the verb refers to
    giving thanks to God. 'Give thanks' is idiomatic and clearer than the more wooden
    'thank'.
- source_word: ἀλλ’
  chosen: but
  alternatives:
  - yet
  - however
  lexicon: BDAG
  rationale: Simple adversative conjunction introducing the main contrast.
- source_word: ὁ ἕτερος
  chosen: the other person
  alternatives:
  - the other
  - the other one
  lexicon: BDAG
  rationale: ἕτερος means 'other' or 'another of a different kind'; here it refers
    to the other participant/listener in the gathering. 'The other person' makes the
    referent natural in English without overinterpreting.
- source_word: οὐκ οἰκοδομεῖται
  chosen: is not built up
  alternatives:
  - is not edified
  - is not strengthened
  lexicon: BDAG
  rationale: Passive of οἰκοδομέω is a common Pauline metaphor for spiritual strengthening/benefit.
    'Built up' preserves the metaphor in readable modern English; 'edified' is accurate
    but more ecclesiastical.
