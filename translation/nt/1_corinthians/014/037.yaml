id: 1CO.14.37
reference: 1 Corinthians 14:37
source:
  edition: SBLGNT
  text: Εἴ τις δοκεῖ προφήτης εἶναι ἢ πνευματικός, ἐπιγινωσκέτω ἃ γράφω ὑμῖν ὅτι κυρίου
    ⸀ἐστίν·
translation:
  text: If anyone thinks he is a prophet or spiritual, let him recognize that what
    I am writing to you is a command of the Lord.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'that what I am writing to you is the Lord's.' The Greek literally reads
      'is of the Lord' / 'is the Lord's'; 'a command' is supplied in English to make
      the sense explicit.
    reason: alternative_reading
lexical_decisions:
- source_word: δοκεῖ
  chosen: thinks
  alternatives:
  - seems
  - supposes
  - considers himself
  lexicon: BDAG
  rationale: In this context δοκεῖ introduces a self-assessment or claim ('if anyone
    thinks he is...'). 'Thinks' is natural modern English and preserves the potentially
    corrective tone better than the more neutral 'seems'.
- source_word: προφήτης
  chosen: prophet
  lexicon: BDAG
  rationale: Standard rendering for προφήτης; the context is spiritual gifts and prophetic
    speech, so 'prophet' is the clearest equivalent.
- source_word: πνευματικός
  chosen: spiritual
  alternatives:
  - spiritually gifted
  - a spiritual person
  lexicon: BDAG
  rationale: The adjective likely means a person who considers himself spiritually
    endowed or directed by the Spirit. 'Spiritual' preserves the Greek's compactness
    and leaves the category broad, as in Paul's usage elsewhere.
- source_word: ἐπιγινωσκέτω
  chosen: let him recognize
  alternatives:
  - let him acknowledge
  - let him know fully
  lexicon: BDAG
  rationale: The present imperative calls for acknowledgment/recognition. 'Recognize'
    fits the context of submitting to apostolic instruction, while remaining readable.
- source_word: ἃ γράφω ὑμῖν
  chosen: what I am writing to you
  alternatives:
  - the things I write to you
  - what I write to you
  lexicon: BDAG
  rationale: This renders the relative pronoun plus present tense naturally in English.
    The progressive 'am writing' reflects the epistolary present without sounding
    wooden.
- source_word: κυρίου ἐστίν
  chosen: is a command of the Lord
  alternatives:
  - is of the Lord
  - belongs to the Lord
  - is the Lord's
  lexicon: BDAG
  rationale: The genitive κυρίου with ἐστίν is elliptical. In context Paul is asserting
    divine authority for his written instructions. Supplying 'a command' makes the
    sense explicit in idiomatic English and matches the force of the surrounding argument,
    though the noun is implied rather than overtly stated in Greek.
