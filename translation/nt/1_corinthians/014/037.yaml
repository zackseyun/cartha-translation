theological_decisions:
- issue: Elliptical force of κυρίου ἐστίν
  chosen_reading: Render the clause as 'is a command of the Lord' to express that
    Paul's instruction carries the Lord's authority.
  alternative_readings:
  - '''is the Lord''s'''
  - '''is of the Lord'''
  rationale: The Greek is compressed, but in context Paul is not merely saying the
    writing belongs to the Lord in some vague sense; he is asserting binding divine
    authority over the instructions in this chapter. Expanding the ellipsis to 'a
    command of the Lord' communicates that force clearly in English without importing
    a foreign doctrine.
  doctrine_reference: 'Translation philosophy §1, §6; Contested terms: κύριος → Lord'
- issue: Gender in τις ... προφήτης ... πνευματικός
  chosen_reading: Use 'he' in English.
  alternative_readings:
  - '''they'' as singular generic'
  rationale: The Greek is grammatically masculine singular and refers generically
    to any individual claimant. Per the gender-accurate policy, the masculine form
    is retained rather than neutralized.
  doctrine_reference: Translation philosophy §4
