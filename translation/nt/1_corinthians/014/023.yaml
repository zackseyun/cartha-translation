theological_decisions:
- issue: Nature of γλώσσαι in 1 Corinthians 14
  chosen_reading: Rendered as 'tongues' rather than 'languages' in the main text.
  alternative_readings:
  - languages
  rationale: The lexical item can denote languages, but in this chapter it functions
    as the recognized label for the charismatic speech phenomenon under discussion.
    Using 'tongues' preserves the text's theological and interpretive openness rather
    than deciding the modern debate over whether these were human languages, ecstatic
    speech, or both.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
