id: 1CO.14.23
reference: 1 Corinthians 14:23
source:
  edition: SBLGNT
  text: ἐὰν οὖν συνέλθῃ ἡ ἐκκλησία ὅλη ἐπὶ τὸ αὐτὸ καὶ πάντες ⸂λαλῶσιν γλώσσαις⸃,
    εἰσέλθωσιν δὲ ἰδιῶται ἢ ἄπιστοι, οὐκ ἐροῦσιν ὅτι μαίνεσθε;
translation:
  text: Therefore, if the whole church comes together in one place and all speak in
    tongues, and uninstructed people or unbelievers enter, will they not say that
    you are out of your minds?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'speak in languages.' The Greek term can mean 'languages,' but 'tongues'
      preserves the established expression in this context without resolving the debated
      nature of the phenomenon.
    reason: alternative_reading
  - marker: b
    text: Or 'outsiders' for 'uninstructed people.' The Greek likely refers to those
      not informed or initiated in the congregation's practices, distinguished here
      from 'unbelievers.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκκλησία
  chosen: church
  alternatives:
  - assembly
  lexicon: BDAG
  rationale: In Pauline usage this commonly refers to the gathered Christian community.
    'Church' is the most natural modern English equivalent here, while the immediate
    context of gathering is already expressed by the verb and phrase 'comes together
    in one place.'
- source_word: ὅλη
  chosen: the whole
  alternatives:
  - all
  lexicon: BDAG
  rationale: Modifies ἐκκλησία and emphasizes the entirety of the congregation. 'The
    whole church' preserves that collective force idiomatically.
- source_word: ἐπὶ τὸ αὐτό
  chosen: in one place
  alternatives:
  - together
  - at the same place
  lexicon: BDAG
  rationale: This idiom denotes assembling together in the same location. 'In one
    place' is clear modern English and preserves the spatial sense better than simply
    'together,' which could sound redundant with 'comes together.'
- source_word: λαλῶσιν γλώσσαις
  chosen: speak in tongues
  alternatives:
  - speak with tongues
  - speak in languages
  lexicon: BDAG
  rationale: Within 1 Corinthians 12–14, γλῶσσαι refers to the charismatic phenomenon
    commonly called 'tongues.' 'Speak in tongues' is the established and contextually
    precise rendering. 'Languages' is possible at the lexical level but would risk
    narrowing or resolving the debated nature of the phenomenon beyond what the verse
    itself states.
- source_word: ἰδιῶται
  chosen: uninstructed people
  alternatives:
  - outsiders
  - unlearned people
  - those without understanding
  lexicon: BDAG
  rationale: The term denotes those who are not initiated, trained, or informed in
    the relevant practice or setting. 'Uninstructed people' preserves that sense better
    than 'outsiders,' which can overlap too much with 'unbelievers' in the next term
    and flatten Paul's distinction.
- source_word: ἄπιστοι
  chosen: unbelievers
  alternatives:
  - unbelieving people
  lexicon: BDAG
  rationale: A standard rendering for those who do not believe. It maintains the contrast
    with the gathered church and with ἰδιῶται.
- source_word: μαίνεσθε
  chosen: you are out of your minds
  alternatives:
  - you are mad
  - you are insane
  - you are crazy
  lexicon: BDAG
  rationale: The verb means to be mad or insane. 'Out of your minds' communicates
    the idiomatic force in readable modern English without sounding either archaic
    ('mad') or too colloquial ('crazy').
- source_word: οὐκ ἐροῦσιν ὅτι
  chosen: will they not say that
  alternatives:
  - will they not say
  - would they not say that
  lexicon: BDAG
  rationale: This construction expects an affirmative answer in a rhetorical question.
    'Will they not say that' preserves both the future and the rhetorical force.
- source_word: οὖν
  chosen: Therefore
  alternatives:
  - So
  - Then
  lexicon: BDAG
  rationale: Marks an inference from the preceding argument. 'Therefore' preserves
    the logical connection more explicitly than 'So'.
- source_word: συνέλθῃ
  chosen: comes together
  alternatives:
  - assembles
  - gathers
  lexicon: BDAG
  rationale: The verb means to come together or assemble. 'Comes together' is a natural
    rendering that also echoes Paul's repeated language in this chapter.
