id: 1CO.14.4
reference: 1 Corinthians 14:4
source:
  edition: SBLGNT
  text: ὁ λαλῶν γλώσσῃ ἑαυτὸν οἰκοδομεῖ· ὁ δὲ προφητεύων ἐκκλησίαν οἰκοδομεῖ.
translation:
  text: The one who speaks in a tongue builds up himself, but the one who prophesies
    builds up the church.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in a language.' In this chapter, however, the term likely refers to
      the gift of tongue-speech; the exact nature of the speech is debated.
    reason: lexical_alternative
  - marker: b
    text: Greek 'himself'; the masculine singular is representative.
    reason: lexical_alternative
  - marker: c
    text: Or 'the assembly' or 'the congregation.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ λαλῶν
  chosen: The one who speaks
  alternatives:
  - Whoever speaks
  - The person speaking
  lexicon: BDAG
  rationale: The article with present participle functions substantivally, referring
    to a representative person characterized by the action. 'The one who speaks' preserves
    the Greek structure and keeps the parallel with 'the one who prophesies.'
- source_word: γλώσσῃ
  chosen: in a tongue
  alternatives:
  - in tongues
  - in a language
  lexicon: BDAG
  rationale: Singular dative without article is best rendered straightforwardly as
    'in a tongue.' In this chapter γλῶσσα refers to Spirit-enabled tongue-speech,
    not merely ordinary language in the abstract. The singular is preserved rather
    than generalized to the idiomatic plural 'in tongues.'
- source_word: ἑαυτὸν
  chosen: himself
  alternatives:
  - oneself
  - his own self
  lexicon: BDAG
  rationale: The reflexive pronoun is masculine singular matching the substantival
    participle. Per the gender-accurate policy, 'himself' reflects the Greek form
    while functioning representatively. A more inclusive English alternative is possible,
    but the source is singular masculine.
- source_word: οἰκοδομεῖ
  chosen: builds up
  alternatives:
  - edifies
  - strengthens
  lexicon: BDAG
  rationale: οἰκοδομέω is metaphorical here for spiritual strengthening or benefit.
    'Builds up' is clear modern English and preserves the construction metaphor better
    than the ecclesiastical term 'edifies.'
- source_word: ὁ δὲ προφητεύων
  chosen: but the one who prophesies
  alternatives:
  - but whoever prophesies
  - but the person prophesying
  lexicon: BDAG
  rationale: Again a substantival present participle. 'But' appropriately renders
    δέ as a mild contrast between private benefit and corporate benefit.
- source_word: ἐκκλησίαν
  chosen: the church
  alternatives:
  - the assembly
  - the congregation
  lexicon: BDAG
  rationale: In Pauline usage ἐκκλησία commonly denotes the gathered Christian community.
    'The church' is the most natural rendering in context, especially given the contrast
    with self-edification. 'Assembly' is possible but less idiomatic here.
