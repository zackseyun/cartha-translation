theological_decisions:
- issue: Meaning of γλώσσῃ in the context of 1 Corinthians 12–14
  chosen_reading: Spirit-enabled tongue-speech rather than generic ordinary language
  alternative_readings:
  - ordinary foreign language
  - ecstatic speech
  rationale: The immediate discourse concerns the gift of tongues and its role in
    congregational worship. The translation keeps the traditional term 'tongue' to
    preserve the ambiguity of the phenomenon without forcing a narrower denominational
    interpretation.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Rendering masculine singular forms representatively
  chosen_reading: Use 'the one who... himself'
  alternative_readings:
  - gender-neutral 'the person who... themselves'
  rationale: The Greek uses masculine singular participles and reflexive pronoun in
    a representative sense. Following the gender-accurate policy, the translation
    reflects the source form rather than neutralizing it, while the syntax still communicates
    a general principle.
  doctrine_reference: 'Translation philosophy §4: Gender-accurate over gender-neutral.'
