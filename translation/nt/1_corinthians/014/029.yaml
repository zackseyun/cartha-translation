theological_decisions:
- issue: Identity of 'the others' in the assembly
  chosen_reading: Rendered generically as 'the others' without specifying whether
    these are other prophets, leaders, or the congregation as a whole.
  alternative_readings:
  - other prophets
  - the rest of the congregation
  rationale: The Greek does not explicitly define the group beyond 'the others.' The
    translation preserves that ambiguity rather than resolving an ecclesiological
    question the text itself leaves open.
  doctrine_reference: Preserve theological tension rather than resolve it.
