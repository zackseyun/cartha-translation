id: 1CO.14.29
reference: 1 Corinthians 14:29
source:
  edition: SBLGNT
  text: προφῆται δὲ δύο ἢ τρεῖς λαλείτωσαν, καὶ οἱ ἄλλοι διακρινέτωσαν·
translation:
  text: Let two or three prophets speak, and let the others weigh what is said.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'judge,' 'discern,' or 'evaluate.' The Greek verb can denote assessing
      prophetic speech.
    reason: lexical_alternative
lexical_decisions:
- source_word: προφῆται
  chosen: prophets
  alternatives:
  - those who prophesy
  lexicon: BDAG
  rationale: The noun denotes prophets/prophetic speakers. 'Prophets' is the most
    direct rendering and fits Paul's regulation of congregational speech.
- source_word: δὲ
  chosen: and
  alternatives:
  - now
  - but
  lexicon: BDAG
  rationale: δέ here marks a mild transition within a sequence of instructions. English
    often leaves it untranslated or smooths it with 'and'; 'and' keeps the flow natural
    without overstating contrast.
- source_word: δύο ἢ τρεῖς
  chosen: two or three
  lexicon: BDAG
  rationale: Straightforward numerical expression; retained formally.
- source_word: λαλείτωσαν
  chosen: let ... speak
  alternatives:
  - should speak
  lexicon: BDAG
  rationale: Third-person present active imperative plural. 'Let ... speak' preserves
    the imperative force in idiomatic English.
- source_word: οἱ ἄλλοι
  chosen: the others
  alternatives:
  - the rest
  - the other people present
  lexicon: BDAG
  rationale: The phrase refers to others in the gathered assembly, most likely other
    qualified participants evaluating the prophetic utterance. 'The others' is sufficiently
    literal while leaving the referent as open as the Greek does.
- source_word: διακρινέτωσαν
  chosen: weigh what is said
  alternatives:
  - judge
  - discern
  - evaluate
  lexicon: BDAG
  rationale: In this context διακρίνω carries the sense of evaluating/discerning prophetic
    speech rather than condemning. 'Weigh what is said' communicates careful assessment
    in natural English and avoids implying harsh judicial condemnation.
