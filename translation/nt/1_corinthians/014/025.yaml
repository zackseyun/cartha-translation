id: 1CO.14.25
reference: 1 Corinthians 14:25
source:
  edition: SBLGNT
  text: ⸀τὰ κρυπτὰ τῆς καρδίας αὐτοῦ φανερὰ γίνεται, καὶ οὕτως πεσὼν ἐπὶ πρόσωπον
    προσκυνήσει τῷ θεῷ, ἀπαγγέλλων ὅτι ⸂Ὄντως ὁ θεὸς⸃ ἐν ὑμῖν ἐστιν.
translation:
  text: the secrets of his heart become evident, and so, falling on his face, he will
    worship God, declaring that God truly is among you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or: "God truly is in you."'
    reason: alternative_reading
lexical_decisions:
- source_word: τὰ κρυπτὰ
  chosen: the secrets
  alternatives:
  - the hidden things
  - the hidden matters
  lexicon: BDAG
  rationale: The neuter plural adjective used substantivally refers to what is hidden
    within the person. 'Secrets' is natural English and fits the inward, revelatory
    context better than the more wooden 'hidden things.'
- source_word: καρδίας
  chosen: heart
  alternatives:
  - inner self
  lexicon: BDAG
  rationale: '''Heart'' preserves the biblical anthropological term and is standard
    for the seat of inner thoughts and motives. ''Inner self'' would interpret rather
    than translate.'
- source_word: φανερὰ γίνεται
  chosen: become evident
  alternatives:
  - become manifest
  - are revealed
  lexicon: BDAG
  rationale: The phrase denotes coming into the open or becoming plain. 'Become evident'
    is clear modern English while preserving the inceptive sense of γίνεται. 'Are
    revealed' is possible but slightly more interpretive and less formally tied to
    φανερά.
- source_word: οὕτως
  chosen: and so
  alternatives:
  - thus
  - in this way
  lexicon: BDAG
  rationale: This connects the exposure of the heart with the resulting response.
    'And so' is idiomatic and preserves the inferential/resultative force.
- source_word: πεσὼν ἐπὶ πρόσωπον
  chosen: falling on his face
  alternatives:
  - falling facedown
  - falling to the ground on his face
  lexicon: BDAG
  rationale: This is a conventional expression for prostration. 'Falling on his face'
    is both accurate and readable, preserving the vivid bodily posture.
- source_word: προσκυνήσει
  chosen: he will worship
  alternatives:
  - he will bow down in worship
  - he will prostrate himself before
  lexicon: BDAG
  rationale: In this context the verb denotes worship directed to God, not merely
    physical obeisance. 'Worship' captures the religious act succinctly; the bodily
    aspect is already conveyed by 'falling on his face.'
- source_word: τῷ θεῷ
  chosen: God
  lexicon: BDAG
  rationale: 'Direct object in English after ''worship'' is most naturally rendered
    without a preposition: ''worship God.'''
- source_word: ἀπαγγέλλων
  chosen: declaring
  alternatives:
  - reporting
  - proclaiming
  - announcing
  lexicon: BDAG
  rationale: The participle expresses what he says as he responds. 'Declaring' fits
    the solemn acknowledgment without overstating it as public proclamation.
- source_word: Ὄντως
  chosen: truly
  alternatives:
  - really
  - certainly
  - indeed
  lexicon: BDAG
  rationale: The adverb emphasizes the genuineness of the conclusion. 'Truly' is natural
    in English and preserves the force well.
- source_word: ἐν ὑμῖν
  chosen: among you
  alternatives:
  - in you
  lexicon: BDAG
  rationale: In this congregational context Paul addresses the gathered community,
    so 'among you' best conveys God's presence in their midst. 'In you' could suggest
    individual indwelling and is worth preserving as an alternative but is less likely
    here.
