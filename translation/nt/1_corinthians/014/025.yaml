theological_decisions:
- issue: Sense of ἐν ὑμῖν in the concluding confession
  chosen_reading: among you
  alternative_readings:
  - in you
  rationale: The immediate context concerns the gathered church assembly and the outsider's
    recognition of God's presence manifested in the congregation's orderly prophetic
    activity. Rendering ἐν ὑμῖν as 'among you' preserves that corporate sense without
    denying the broader Pauline theme of indwelling. The alternative 'in you' is preserved
    in a footnote because the Greek preposition can bear that sense.
  doctrine_reference: Preserve theological tension rather than resolve it; Translation
    philosophy §3
