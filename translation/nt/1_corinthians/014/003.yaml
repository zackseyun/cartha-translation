theological_decisions:
- issue: Meaning of 'prophesies' in congregational context
  chosen_reading: Retain 'prophesies' without narrowing it to 'preaches' or expanding
    it to ecstatic prediction.
  alternative_readings:
  - preaches
  - speaks a revelation
  rationale: The verse contrasts prophecy with tongues in the assembly and describes
    prophecy by its effect on others. Translating προφητεύων as 'prophesies' preserves
    the canonical and theological breadth of the term without importing a denominationally
    specific definition.
  doctrine_reference: 'Translation philosophy: Preserve theological tension rather
    than resolve it.'
