id: 1CO.14.3
reference: 1 Corinthians 14:3
source:
  edition: SBLGNT
  text: ὁ δὲ προφητεύων ἀνθρώποις λαλεῖ οἰκοδομὴν καὶ παράκλησιν καὶ παραμυθίαν.
translation:
  text: But the one who prophesies speaks to people for edification and encouragement
    and consolation.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for building up' instead of 'for edification.'
    reason: lexical_alternative
  - marker: b
    text: '''Encouragement'' translates παράκλησις; it can also mean ''exhortation''
      or, in some contexts, ''comfort.'''
    reason: lexical_alternative
  - marker: c
    text: '''Consolation'' translates παραμυθία; alternatively, ''comfort.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ δὲ προφητεύων
  chosen: But the one who prophesies
  alternatives:
  - But whoever prophesies
  - But the one prophesying
  lexicon: BDAG
  rationale: The articular present participle functions substantivally, referring
    to a person characterized by the action. 'The one who prophesies' preserves the
    Greek structure in natural English. 'But' renders δέ as a mild contrast with the
    preceding verse.
- source_word: ἀνθρώποις
  chosen: to people
  alternatives:
  - to men
  - to human beings
  lexicon: BDAG
  rationale: The dative plural indicates the recipients of speech. In context it is
    generic rather than male-specific, so 'people' best reflects the sense while remaining
    natural English. This follows the gender-accurate principle rather than a wooden
    masculine rendering.
- source_word: λαλεῖ
  chosen: speaks
  alternatives:
  - speaks to
  - utters
  lexicon: BDAG
  rationale: A straightforward present-tense rendering of λαλέω. Because English requires
    the indirect object relation to be explicit, the full clause is rendered 'speaks
    to people.'
- source_word: οἰκοδομὴν
  chosen: for edification
  alternatives:
  - for building up
  - for strengthening
  lexicon: BDAG
  rationale: In Pauline usage οἰκοδομή often carries the metaphorical sense of spiritual
    strengthening or building up. 'Edification' preserves the established theological
    sense with concise dignity, while 'for' makes explicit the telic/resultative force
    implied by the accusative objects after 'speaks.'
- source_word: παράκλησιν
  chosen: encouragement
  alternatives:
  - exhortation
  - comfort
  lexicon: BDAG
  rationale: παράκλησις can denote exhortation, encouragement, or comfort depending
    on context. Here, alongside παραμυθία, 'encouragement' helps distinguish it from
    the more soothing nuance of the following term while remaining accessible modern
    English.
- source_word: παραμυθίαν
  chosen: consolation
  alternatives:
  - comfort
  - encouragement
  lexicon: BDAG
  rationale: παραμυθία denotes comfort, consolation, or soothing speech. 'Consolation'
    differentiates it from παράκλησις and preserves the threefold progression without
    collapsing two terms into one English gloss.
