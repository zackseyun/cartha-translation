id: 1CO.14.28
reference: 1 Corinthians 14:28
source:
  edition: SBLGNT
  text: ἐὰν δὲ μὴ ᾖ ⸀διερμηνευτής, σιγάτω ἐν ἐκκλησίᾳ, ἑαυτῷ δὲ λαλείτω καὶ τῷ θεῷ.
translation:
  text: But if there is no interpreter, he must keep silent in the church and speak
    to himself and to God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the assembly' or 'in the congregation.'
    reason: lexical_alternative
lexical_decisions:
- source_word: διερμηνευτής
  chosen: interpreter
  alternatives:
  - translator
  lexicon: BDAG
  rationale: Refers to one who renders a tongue intelligible to others. 'Interpreter'
    is the standard and clearest English equivalent in this ecclesial context; 'translator'
    is possible but less idiomatic here.
- source_word: σιγάτω
  chosen: he must keep silent
  alternatives:
  - let him be silent
  - he should keep quiet
  lexicon: BDAG
  rationale: Present active imperative, third singular, expressing a directive. 'He
    must keep silent' preserves the force of the imperative in natural modern English
    without sounding archaic.
- source_word: ἐν ἐκκλησίᾳ
  chosen: in the church
  alternatives:
  - in the assembly
  - in the congregation
  lexicon: BDAG
  rationale: In 1 Corinthians 14 the setting is the gathered Christian assembly. 'Church'
    is natural and contextually accurate, though 'assembly' is a viable more formal
    alternative.
- source_word: ἑαυτῷ
  chosen: to himself
  alternatives:
  - to himself privately
  - to himself alone
  lexicon: BDAG
  rationale: Dative reflexive pronoun indicating speech not directed to the gathered
    body. 'To himself' is the most direct rendering; adverbial expansions would over-interpret.
- source_word: λαλείτω
  chosen: speak
  alternatives:
  - keep speaking
  - talk
  lexicon: BDAG
  rationale: The imperative continues the instruction about speech. 'Speak' is appropriately
    neutral and fits the solemn tone better than 'talk.'
- source_word: τῷ θεῷ
  chosen: to God
  lexicon: BDAG
  rationale: Straightforward dative object after 'speak,' indicating that such speech
    may be directed Godward rather than publicly to the congregation.
- source_word: ἐὰν δὲ μὴ ᾖ
  chosen: But if there is no
  alternatives:
  - But if there is not
  - But if no ... is present
  lexicon: BDAG
  rationale: Conditional clause with subjunctive of εἰμί. 'There is no' is idiomatic
    English and naturally introduces the absence of an interpreter.
