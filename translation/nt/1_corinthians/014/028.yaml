theological_decisions:
- issue: Scope of the silence command in congregational worship
  chosen_reading: The command restricts public speech in the gathered church when
    no interpreter is present, not all forms of private or God-directed speech.
  alternative_readings:
  - The speaker must cease all speaking entirely
  - The speaker may continue audibly in a way still directed to the congregation
  rationale: The contrast between 'keep silent in the church' and 'speak to himself
    and to God' indicates a limitation on public congregational utterance rather than
    an absolute prohibition on any speech whatsoever. The translation preserves this
    tension without importing a denominational doctrine of spiritual gifts.
  doctrine_reference: Preserve theological tension rather than resolve it.
