id: 1CO.14.12
reference: 1 Corinthians 14:12
source:
  edition: SBLGNT
  text: οὕτως καὶ ὑμεῖς, ἐπεὶ ζηλωταί ἐστε πνευμάτων, πρὸς τὴν οἰκοδομὴν τῆς ἐκκλησίας
    ζητεῖτε ἵνα περισσεύητε.
translation:
  text: So also you, since you are eager for spiritual gifts, seek to abound in them
    for the building up of the church.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''spirituals'' or ''spirits''; context suggests spiritual gifts
      or manifestations of the Spirit.'
    reason: alternative_reading
lexical_decisions:
- source_word: οὕτως καὶ ὑμεῖς
  chosen: So also you
  alternatives:
  - So with you also
  - In the same way, you also
  lexicon: BDAG
  rationale: Carries forward Paul's comparison from the preceding argument. 'So also
    you' is concise and preserves the inferential force without over-paraphrasing.
- source_word: ἐπεὶ
  chosen: since
  alternatives:
  - because
  - inasmuch as
  lexicon: BDAG
  rationale: Introduces the reason or basis for the exhortation. 'Since' fits natural
    English and preserves the causal nuance.
- source_word: ζηλωταί
  chosen: eager
  alternatives:
  - zealous
  - enthusiasts
  lexicon: BDAG
  rationale: The noun denotes those marked by zeal. 'Eager' communicates the positive
    desire in readable modern English; 'zealous' is possible but slightly stiffer.
- source_word: πνευμάτων
  chosen: spiritual gifts
  alternatives:
  - spiritual things
  - spirits
  lexicon: BDAG
  rationale: In the immediate context of 1 Corinthians 12–14, Paul is discussing manifestations/gifts
    of the Spirit, especially tongues and prophecy. Although the bare genitive plural
    literally reads 'of spirits' or 'of spirituals,' English requires clarification.
    'Spiritual gifts' best captures the contextual referent without suggesting personal
    spirits as the object of zeal. The broader alternative is preserved in a footnote
    because the Greek is more compressed than the English rendering.
- source_word: πρὸς τὴν οἰκοδομὴν
  chosen: for the building up
  alternatives:
  - for edification
  - toward the strengthening
  lexicon: BDAG
  rationale: οἰκοδομή is a key Pauline metaphor for strengthening or edifying the
    community. 'Building up' preserves the metaphor in accessible English better than
    the ecclesiastical term 'edification'.
- source_word: τῆς ἐκκλησίας
  chosen: of the church
  alternatives:
  - of the assembly
  lexicon: BDAG
  rationale: In Pauline usage ἐκκλησία commonly denotes the gathered Christian community.
    'Church' is the standard and contextually appropriate rendering, though 'assembly'
    is a lexical possibility.
- source_word: ζητεῖτε
  chosen: seek
  alternatives:
  - strive
  - aim
  lexicon: BDAG
  rationale: An imperative calling for intentional pursuit. 'Seek' is direct and preserves
    the verbal connection with desire already expressed.
- source_word: ἵνα περισσεύητε
  chosen: to abound in them
  alternatives:
  - that you may abound
  - to excel
  lexicon: BDAG
  rationale: περισσεύω means to abound, overflow, or have in abundance. In this context
    it refers to excelling in what benefits the church. 'To abound in them' makes
    explicit the implied object from the prior clause in idiomatic English. 'Excel'
    is contextually possible, but 'abound' stays closer to the Greek wording.
