theological_decisions:
- issue: Meaning of πνευμάτων in context
  chosen_reading: Rendered as 'spiritual gifts' rather than the more literal but ambiguous
    'spiritual things' or 'spirits.'
  alternative_readings:
  - spiritual things
  - spirits
  rationale: The chapter concerns manifestations associated with the Spirit and their
    value for congregational edification. Rendering πνευμάτων as 'spiritual gifts'
    reflects the contextual sense while avoiding a misleading suggestion that believers
    are eager for multiple spirits. Because the Greek expression is compressed and
    could be represented more literally, the alternative is preserved in a footnote
    rather than elevated into the main text.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather
    than resolve it
