id: 1CO.14.40
reference: 1 Corinthians 14:40
source:
  edition: SBLGNT
  text: πάντα ⸀δὲ εὐσχημόνως καὶ κατὰ τάξιν γινέσθω.
translation:
  text: But let everything be done decently and in order.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'properly' for 'decently'; the Greek denotes what is fitting or becoming.
    reason: lexical_alternative
lexical_decisions:
- source_word: πάντα
  chosen: everything
  alternatives:
  - all things
  lexicon: BDAG
  rationale: Neuter plural with broad scope; 'everything' gives natural English while
    preserving the comprehensive sense of Paul's instruction.
- source_word: δὲ
  chosen: But
  alternatives:
  - and
  - now
  lexicon: BDAG
  rationale: Marks a mild contrast or transition from the preceding discussion to
    a summarizing directive. 'But' best reflects the discourse turn in context.
- source_word: εὐσχημόνως
  chosen: decently
  alternatives:
  - properly
  - becomingly
  lexicon: BDAG
  rationale: Conveys conduct that is fitting, respectable, and appropriate in gathered
    worship. 'Decently' is concise and idiomatic, though 'properly' is a viable alternative.
- source_word: κατὰ τάξιν
  chosen: in order
  alternatives:
  - according to order
  - orderly
  lexicon: BDAG
  rationale: The prepositional phrase denotes conformity to proper arrangement or
    sequence. 'In order' is standard, clear English and preserves the sense of orderly
    procedure.
- source_word: γινέσθω
  chosen: let everything be done
  alternatives:
  - let it happen
  - let it take place
  lexicon: BDAG
  rationale: Third-person present middle/passive imperative functioning as a general
    directive. In English, 'let everything be done' naturally conveys the imperative
    force in context better than a more literal 'let everything happen.'
