theological_decisions:
- issue: Scope of Paul's command in the worship context
  chosen_reading: A general directive for orderly and fitting conduct in the assembly
    without specifying a particular denominational liturgical model.
  alternative_readings:
  - A narrowly liturgical rule prescribing a fixed formal order of service
  - A broad principle applicable to all church practice beyond the immediate context
  rationale: The verse summarizes the immediate discussion of congregational speech
    and order in worship. The translation preserves the generality of the Greek and
    does not import a specific ecclesial structure or denominational practice beyond
    what the text states.
  doctrine_reference: Preserve theological tension rather than resolve it; do not
    advocate denominational distinctives unless unambiguously supported by the text.
