theological_decisions:
- issue: Meaning of γλώσσῃ in the context of spiritual gifts
  chosen_reading: Render as 'tongue' in the main text, referring to the phenomenon
    discussed in 1 Corinthians 12–14, without specifying whether the speech is human
    or heavenly.
  alternative_readings:
  - Render as 'language'
  - Interpret specifically as ecstatic speech
  - Interpret specifically as foreign human languages
  rationale: The immediate context concerns the gift of tongues, but the verse itself
    does not resolve the broader theological debate over the nature of the phenomenon.
    'Tongue' preserves the lexical form and theological openness better than a more
    interpretively loaded rendering.
  doctrine_reference: Preserve theological tension rather than resolve it.
