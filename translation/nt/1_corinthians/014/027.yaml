id: 1CO.14.27
reference: 1 Corinthians 14:27
source:
  edition: SBLGNT
  text: εἴτε γλώσσῃ τις λαλεῖ, κατὰ δύο ἢ τὸ πλεῖστον τρεῖς, καὶ ἀνὰ μέρος, καὶ εἷς
    διερμηνευέτω·
translation:
  text: If anyone speaks in a tongue, let there be two, or at most three, and each
    in turn, and let one interpret.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in a language.' The Greek word can denote a tongue or a language; here
      'tongue' preserves Paul's established wording in this chapter without deciding
      the broader debate about the nature of the gift.
    reason: lexical_alternative
lexical_decisions:
- source_word: γλώσσῃ
  chosen: in a tongue
  alternatives:
  - in a language
  lexicon: BDAG
  rationale: The dative with λαλεῖ refers to speaking in tongues/languages. In 1 Corinthians
    12–14, γλῶσσα is the established term for the charismatic phenomenon, so 'tongue'
    preserves Pauline usage and the historical church's recognition of the term, while
    'language' remains a plausible lexical alternative.
- source_word: τις
  chosen: anyone
  alternatives:
  - someone
  - a person
  lexicon: BDAG
  rationale: Indefinite pronoun with generic force; 'anyone' is natural modern English
    and preserves the conditional, non-specific sense.
- source_word: λαλεῖ
  chosen: speaks
  alternatives:
  - is speaking
  lexicon: BDAG
  rationale: Present indicative in a general conditional setting is best rendered
    as a simple present in English.
- source_word: κατὰ δύο ἢ τὸ πλεῖστον τρεῖς
  chosen: let there be two, or at most three
  alternatives:
  - by two or at most three
  - two, or at the most three
  lexicon: BDAG
  rationale: This idiom limits the number of speakers. English requires some smoothing
    for clarity; 'let there be two, or at most three' conveys Paul's regulatory instruction
    without over-paraphrase.
- source_word: ἀνὰ μέρος
  chosen: each in turn
  alternatives:
  - one by one
  - in turn
  lexicon: BDAG
  rationale: The phrase means separately, one at a time, not simultaneously. 'Each
    in turn' makes the distributive force explicit in idiomatic English.
- source_word: εἷς
  chosen: one
  alternatives:
  - someone
  lexicon: BDAG
  rationale: 'The numeral functions substantivally: one person is to perform the interpretation.'
- source_word: διερμηνευέτω
  chosen: let one interpret
  alternatives:
  - let one translate
  - let one explain
  lexicon: BDAG
  rationale: The imperative calls for intelligible rendering of the tongue-speech
    for the assembly. 'Interpret' is the standard and contextually precise gloss;
    'translate' or 'explain' are possible but narrower or less established in this
    context.
