theological_decisions:
- issue: Scope of the clause introduced by ὡς ἐν πάσαις ταῖς ἐκκλησίαις τῶν ἁγίων
  chosen_reading: Attached to verse 33 as a comparison/appeal to the practice of all
    the churches
  alternative_readings:
  - Attached to the following verse, beginning a new sentence about conduct in the
    churches
  rationale: 'The Greek punctuation tradition varies, and some modern editions/connective
    readings link the phrase with v.34. Given the provided SBLGNT text and punctuation,
    the phrase is taken with v.33. This yields a coherent sense: God is characterized
    by peace, as is reflected in all the churches of the saints. The alternative should
    be preserved because the verse division and syntactical attachment are debated.'
  doctrine_reference: Preserve theological tension rather than resolve it
