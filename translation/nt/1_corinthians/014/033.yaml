id: 1CO.14.33
reference: 1 Corinthians 14:33
source:
  edition: SBLGNT
  text: οὐ γάρ ἐστιν ἀκαταστασίας ὁ θεὸς ἀλλὰ εἰρήνης), ὡς ἐν πάσαις ταῖς ἐκκλησίαις
    τῶν ἁγίων.
translation:
  text: For God is not a God of disorder but of peace—as in all the churches of the
    saints.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'For God is not a God of confusion but of peace.'
    reason: lexical_alternative
  - marker: b
    text: Or, 'as is the case in all the churches of God’s holy people.' Some connect
      this phrase with the following verse instead of with this one.
    reason: alternative_reading
lexical_decisions:
- source_word: ἀκαταστασίας
  chosen: disorder
  alternatives:
  - confusion
  - instability
  - unrest
  lexicon: BDAG
  rationale: The genitive after an implied predicate noun yields the sense 'a God
    characterized by disorder/confusion.' 'Disorder' best fits the immediate context
    of orderly congregational worship and avoids narrowing the term merely to mental
    confusion.
- source_word: εἰρήνης
  chosen: peace
  alternatives:
  - wholeness
  - harmony
  lexicon: BDAG
  rationale: Standard rendering of εἰρήνη. In this context it contrasts with congregational
    disorder and conveys ordered peace without overexpanding to broader covenantal
    senses.
- source_word: ὁ θεὸς
  chosen: God
  alternatives:
  - the God
  lexicon: BDAG
  rationale: English idiom normally omits the article with 'God' in such predicate
    constructions. The sense is definite and personal, not generic.
- source_word: ὡς
  chosen: as in
  alternatives:
  - as also in
  - as is the case in
  - like in
  lexicon: BDAG
  rationale: 'Here ὡς most naturally introduces a comparison/appeal to common practice:
    Paul''s statement about God and orderly worship accords with what is found in
    all the assemblies. ''As in'' preserves the compact Greek connection.'
- source_word: ἐκκλησίαις
  chosen: churches
  alternatives:
  - assemblies
  - congregations
  lexicon: BDAG
  rationale: '''Churches'' is the established and contextually appropriate rendering
    for local Christian assemblies here. ''Assemblies'' is possible but less natural
    in this Pauline ecclesial context.'
- source_word: τῶν ἁγίων
  chosen: of the saints
  alternatives:
  - of God's holy people
  - of the holy ones
  lexicon: BDAG
  rationale: ἅγιοι is a common Pauline designation for believers. 'Saints' preserves
    the lexical link and theological register; a more explanatory alternative is worth
    preserving in a footnote for readability.
- source_word: γάρ
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: BDAG
  rationale: γάρ gives the reason for the preceding instructions about orderly speech
    in the assembly. 'For' is concise and natural.
