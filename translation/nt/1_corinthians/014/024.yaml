id: 1CO.14.24
reference: 1 Corinthians 14:24
source:
  edition: SBLGNT
  text: ἐὰν δὲ πάντες προφητεύωσιν, εἰσέλθῃ δέ τις ἄπιστος ἢ ἰδιώτης, ἐλέγχεται ὑπὸ
    πάντων, ἀνακρίνεται ὑπὸ πάντων,
translation:
  text: But if all prophesy, and some unbeliever or uninstructed person enters, he
    is convicted by all; he is examined by all.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "outsider." The Greek term can refer to one who is not informed, not
      initiated, or not part of the speaking group.
    reason: alternative_reading
lexical_decisions:
- source_word: πάντες
  chosen: all
  lexicon: BDAG
  rationale: Retained as the straightforward inclusive quantifier referring to the
    gathered speakers in context.
- source_word: προφητεύωσιν
  chosen: prophesy
  alternatives:
  - speak prophetically
  lexicon: BDAG
  rationale: '"Prophesy" preserves the established Pauline category in this chapter
    without overexplaining it as merely inspired speech. It is readable modern English
    and keeps continuity with the surrounding argument about prophecy versus tongues.'
- source_word: ἄπιστος
  chosen: unbeliever
  alternatives:
  - unbelieving person
  lexicon: BDAG
  rationale: In Pauline usage here the term denotes one who does not believe, not
    merely one who is unfaithful. "Unbeliever" is the most natural contextual rendering.
- source_word: ἰδιώτης
  chosen: uninstructed person
  alternatives:
  - outsider
  - layperson
  - unlearned person
  lexicon: BDAG
  rationale: The term refers to someone without the relevant understanding or participation
    in the assembly's practices, not necessarily a hostile outsider. "Uninstructed
    person" best captures lack of familiarity/competence without importing modern
    ecclesial categories. An alternative is preserved in a footnote because "outsider"
    is a common rendering.
- source_word: ἐλέγχεται
  chosen: is convicted
  alternatives:
  - is reproved
  - is exposed
  - is convinced
  lexicon: BDAG
  rationale: In context the sense is that the person's inner condition is brought
    under conviction by what is heard. "Is convicted" communicates moral exposure
    and persuasive force better than the more generic "is reproved."
- source_word: ἀνακρίνεται
  chosen: is examined
  alternatives:
  - is called to account
  - is scrutinized
  - is judged
  lexicon: BDAG
  rationale: The verb can mean to examine or scrutinize. "Is examined" fits the sequence
    after "is convicted" and avoids overstating the sense as final condemnation. The
    idea is searching evaluation by what all are saying.
- source_word: ὑπὸ πάντων
  chosen: by all
  alternatives:
  - by everyone
  lexicon: BDAG
  rationale: A concise and natural rendering of the repeated phrase, preserving the
    rhetorical repetition in Greek.
- source_word: δέ
  chosen: But / and
  alternatives:
  - now
  lexicon: BDAG
  rationale: The first δέ is rendered adversatively as "But" to mark contrast with
    the previous scenario; the second is represented by "and" for natural English
    flow within the conditional sentence.
- source_word: τις
  chosen: some
  alternatives:
  - someone
  - a certain person
  lexicon: BDAG
  rationale: Indefinite τις is naturally rendered "some" before the paired descriptors
    "unbeliever or uninstructed person." This avoids awkwardness while preserving
    indefiniteness.
