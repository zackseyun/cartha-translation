theological_decisions:
- issue: Meaning of ἰδιώτης in the assembly context
  chosen_reading: Rendered as "uninstructed person" rather than "outsider."
  alternative_readings:
  - outsider
  - layperson
  - unlearned person
  rationale: The immediate context concerns intelligibility and the effect of congregational
    speech on those lacking understanding. "Uninstructed person" preserves that semantic
    focus without deciding that the person is necessarily entirely outside the Christian
    gathering. Because "outsider" is a plausible contextual alternative and common
    in translation tradition, it is preserved in a footnote rather than excluded.
  doctrine_reference: Translation philosophy §3, §5
