theological_decisions:
- issue: Meaning of πνεύματι in charismatic worship context
  chosen_reading: Rendered generically as 'in the spirit' without specifying whether
    Paul means the speaker's human spirit or Spirit-enabled speech.
  alternative_readings:
  - with your spirit
  - by the Spirit
  rationale: The verse does not require a dogmatic resolution of the referent. Preserving
    the broader wording maintains the theological tension and fits the translation
    philosophy of not resolving ambiguities beyond what the Greek warrants.
  doctrine_reference: Translation philosophy §3 Preserve theological tension rather
    than resolve it.
- issue: Meaning of εὐχαριστίᾳ
  chosen_reading: Rendered as 'thanksgiving' rather than a technical sacramental term.
  alternative_readings:
  - Eucharist
  rationale: Although εὐχαριστία later became a technical term in Christian usage,
    the immediate context concerns intelligible spoken thanks in gathered worship.
    Translating it as 'Eucharist' would import later ecclesial specificity not demanded
    by the Greek.
  doctrine_reference: Affirmations; Translation philosophy §1 Original-language primacy
    over translation tradition.
