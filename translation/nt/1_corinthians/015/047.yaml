id: 1CO.15.47
reference: 1 Corinthians 15:47
source:
  edition: SBLGNT
  text: ὁ πρῶτος ἄνθρωπος ἐκ γῆς χοϊκός, ὁ δεύτερος ⸀ἄνθρωπος ἐξ οὐρανοῦ.
translation:
  text: The first man was from the earth, made of dust; the second man is from heaven.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'earthy' or 'of dust.' The Greek adjective χοϊκός echoes the creation
      of Adam from dust.
    reason: lexical_alternative
lexical_decisions:
- source_word: πρῶτος
  chosen: first
  alternatives:
  - former
  lexicon: BDAG
  rationale: Ordinal adjective marking the first member in Paul's Adam/Christ contrast;
    'first' is the natural and consistent English equivalent.
- source_word: ἄνθρωπος
  chosen: man
  alternatives:
  - human being
  - person
  lexicon: BDAG
  rationale: The noun is singular masculine and here refers representatively to Adam
    and then to Christ in parallel. Per gender-accurate policy, 'man' best matches
    the source and the Adamic typology.
- source_word: ἐκ γῆς
  chosen: from the earth
  alternatives:
  - out of the earth
  - from the ground
  lexicon: BDAG
  rationale: ἐκ/ἐξ with γῆ denotes origin/source. 'From the earth' is idiomatic and
    preserves the creation-from-earth allusion.
- source_word: χοϊκός
  chosen: made of dust
  alternatives:
  - earthy
  - dusty
  - of dust
  lexicon: BDAG
  rationale: The adjective means 'made of dust' or 'dust-like,' echoing Genesis creation
    language. 'Earthy' in modern English can suggest temperament rather than material
    origin, so 'made of dust' best communicates Paul's intended contrast.
- source_word: δεύτερος
  chosen: second
  alternatives:
  - the second
  lexicon: BDAG
  rationale: Ordinal adjective contrasting the second representative man with the
    first. 'Second' preserves the formal parallel with 'first'.
- source_word: ἄνθρωπος
  chosen: man
  alternatives:
  - human being
  - person
  lexicon: BDAG
  rationale: 'Repeated for the second clause to preserve Paul''s deliberate parallelism:
    ''the first man ... the second man.'''
- source_word: ἐξ οὐρανοῦ
  chosen: from heaven
  alternatives:
  - out of heaven
  - from the sky
  lexicon: BDAG
  rationale: Denotes heavenly origin. 'From heaven' is the standard and theologically
    appropriate rendering; 'sky' would flatten the transcendent sense in this context.
