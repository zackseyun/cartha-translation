theological_decisions:
- issue: Christological force of 'the second man'
  chosen_reading: Retain 'the second man' without adding an explicit identifier such
    as 'Christ' or interpretive expansion.
  alternative_readings:
  - The second man, Christ, is from heaven.
  rationale: Paul's context identifies the second man with Christ, but the Greek text
    here does not name him explicitly. To avoid importing words not present while
    preserving the Adam/Christ typology, the translation keeps the literal expression.
  doctrine_reference: 'Translation philosophy: Never paraphrase beyond what the source
    text warrants; preserve theological tension rather than resolve it.'
- issue: Present tense in the second clause
  chosen_reading: Render as 'is from heaven.'
  alternative_readings:
  - was from heaven
  rationale: The Greek lacks an explicit copula, but the clause naturally reads as
    a present assertion in contrast with the first clause. Rendering the second as
    present reflects the common understanding of the ellipsis and preserves the theological
    emphasis on the heavenly man without forcing a past-tense symmetry not required
    by the Greek.
  doctrine_reference: Optimal equivalence; original-language primacy over translation
    tradition.
