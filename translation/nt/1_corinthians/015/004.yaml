theological_decisions:
- issue: Rendering the resurrection verb in relation to aspect and voice
  chosen_reading: he has been raised
  alternative_readings:
  - he was raised
  - he is risen
  rationale: The perfect passive ἐγήγερται presents the resurrection as an accomplished
    act with ongoing significance. 'He has been raised' preserves both the passive
    voice and the continuing force better than the simple past. 'He is risen' is traditional
    but less transparent to contemporary readers and less directly tied to the passive
    morphology.
  doctrine_reference: Translation philosophy §§1, 5, 6
- issue: Reference of 'the Scriptures'
  chosen_reading: the Scriptures
  alternative_readings:
  - the Jewish Scriptures
  - the sacred writings
  rationale: Paul's phrase refers to the recognized scriptural corpus without needing
    expansion in the main text. More explicit renderings may clarify for some readers
    but add interpretive material not present in the Greek.
  doctrine_reference: Translation philosophy §§1, 6
