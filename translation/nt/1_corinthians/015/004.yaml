id: 1CO.15.4
reference: 1 Corinthians 15:4
source:
  edition: SBLGNT
  text: καὶ ὅτι ἐτάφη, καὶ ὅτι ἐγήγερται τῇ ⸂ἡμέρᾳ τῇ τρίτῃ⸃ κατὰ τὰς γραφάς,
translation:
  text: and that he was buried, and that he has been raised on the third day according
    to the Scriptures,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or: “in accordance with the Scriptures.”'
    reason: lexical_alternative
  - marker: b
    text: 'Or: “he was raised.” The Greek perfect tense can emphasize the present
      abiding significance of the resurrection.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐτάφη
  chosen: he was buried
  alternatives:
  - he was entombed
  lexicon: BDAG
  rationale: Aorist passive of θάπτω, straightforwardly denoting burial. 'Was buried'
    is the natural English equivalent and preserves the passive form without adding
    specificity not explicit in the verb itself.
- source_word: ἐγήγερται
  chosen: he has been raised
  alternatives:
  - he was raised
  - he is risen
  lexicon: BDAG
  rationale: 'Perfect passive indicative of ἐγείρω. ''Has been raised'' best reflects
    the perfect aspect: a past event with abiding present significance. Passive voice
    is preserved, matching Paul''s formulation.'
- source_word: τῇ ἡμέρᾳ τῇ τρίτῃ
  chosen: on the third day
  alternatives:
  - on the third day after
  - on day three
  lexicon: BDAG
  rationale: Dative temporal expression idiomatically means 'on the third day.' Adding
    'after' would interpret the chronology beyond the Greek wording.
- source_word: κατὰ τὰς γραφάς
  chosen: according to the Scriptures
  alternatives:
  - in accordance with the Scriptures
  lexicon: BDAG
  rationale: Standard idiom indicating conformity with or fulfillment of the scriptural
    witness. 'According to the Scriptures' is clear, natural, and preserves the formal
    link to Paul's repeated formula in this context.
- source_word: γραφάς
  chosen: the Scriptures
  alternatives:
  - the writings
  lexicon: BDAG
  rationale: In Pauline usage γραφαί refers to the sacred scriptural writings, not
    merely writings in general. Capitalized 'Scriptures' appropriately signals this
    recognized referent in English.
- source_word: ὅτι
  chosen: that
  lexicon: BDAG
  rationale: Introduces content clauses in the creedal sequence. Repeating 'that'
    in English preserves the structured, confessional rhythm of the Greek.
- source_word: καὶ
  chosen: and
  lexicon: BDAG
  rationale: Simple connective repeated in the formulaic sequence; retained for fidelity
    to the source structure.
