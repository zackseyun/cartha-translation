id: 1CO.15.33
reference: 1 Corinthians 15:33
source:
  edition: SBLGNT
  text: μὴ πλανᾶσθε· φθείρουσιν ἤθη χρηστὰ ὁμιλίαι κακαί.
translation:
  text: 'Do not be deceived: bad company corrupts good morals.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'bad conversations corrupt good morals.' The Greek term can refer to
      association or conversation; the broader sense 'company' best fits the context.
    reason: lexical_alternative
lexical_decisions:
- source_word: μὴ πλανᾶσθε
  chosen: Do not be deceived
  alternatives:
  - Do not be led astray
  - Stop deceiving yourselves
  lexicon: BDAG
  rationale: The present imperative with μή functions as a prohibition. 'Do not be
    deceived' is idiomatic, concise, and fits the passive/middle form without over-specifying
    whether the deception is self-induced or from others. 'Led astray' is possible,
    but 'deceived' better matches common English usage in this warning formula.
- source_word: φθείρουσιν
  chosen: corrupts
  alternatives:
  - ruins
  - spoils
  - destroys
  lexicon: BDAG
  rationale: The verb denotes causing deterioration or moral corruption. 'Corrupts'
    best fits the ethical context created by ἤθη and preserves the proverbial force.
    'Destroys' is too strong here, while 'ruins' and 'spoils' are less precise morally.
- source_word: ἤθη
  chosen: morals
  alternatives:
  - character
  - habits
  - manners
  lexicon: BDAG
  rationale: In this context ἤθη refers to moral character or ethical habits, not
    merely social etiquette. 'Morals' is the most natural concise rendering in English
    and reflects the established sense of the proverb. 'Character' is possible, but
    the plural noun in Greek is better mirrored by 'morals' than by singular 'character'.
- source_word: χρηστὰ
  chosen: good
  alternatives:
  - sound
  - upright
  lexicon: BDAG
  rationale: χρηστός here qualifies ἤθη in an ethical sense. 'Good' is the plain and
    sufficient rendering in modern English. 'Sound' or 'upright' add interpretive
    nuance not required by the text.
- source_word: ὁμιλίαι
  chosen: company
  alternatives:
  - associations
  - conversations
  - companionship
  lexicon: BDAG
  rationale: 'Although the noun can refer to association or conversation, in this
    proverb the sense is broader than speech alone: the people one keeps company with.
    ''Company'' captures the relational sense naturally in English. Because some readers
    may hear a speech-focused nuance, the alternative ''conversations'' is preserved
    in a footnote.'
- source_word: κακαί
  chosen: bad
  alternatives:
  - evil
  - corrupt
  lexicon: BDAG
  rationale: The adjective describes morally harmful associations. 'Bad' is idiomatic
    in the proverb and avoids overstating the term with 'evil.' 'Corrupt' would duplicate
    the following verb's semantic field too closely.
