theological_decisions:
- issue: Moral force of δικαίως in the exhortation
  chosen_reading: Rendered as 'rightly' rather than 'righteously'
  alternative_readings:
  - righteously
  - as is right
  rationale: The verse is an ethical rebuke, but the adverb most naturally modifies
    the command to regain sober judgment in a proper way. 'Rightly' preserves the
    moral dimension without importing a heavier Pauline technical sense of righteousness
    not explicit in this form.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve source
    sense without importing doctrinal claims.'
