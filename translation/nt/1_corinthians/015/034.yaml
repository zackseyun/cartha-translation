id: 1CO.15.34
reference: 1 Corinthians 15:34
source:
  edition: SBLGNT
  text: ἐκνήψατε δικαίως καὶ μὴ ἁμαρτάνετε, ἀγνωσίαν γὰρ θεοῦ τινες ἔχουσιν· πρὸς
    ἐντροπὴν ὑμῖν ⸀λαλῶ.
translation:
  text: Sober up rightly, and do not go on sinning; for some have ignorance of God.
    I say this to your shame.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Come to your senses properly'; the verb literally evokes sobering up
      from drunkenness and is likely metaphorical here.
    reason: lexical_alternative
  - marker: b
    text: Or 'do not sin' or 'stop sinning'; the present imperative may imply ongoing
      or habitual action.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκνήψατε
  chosen: Sober up
  alternatives:
  - Come to your senses
  - Wake up from your drunken stupor
  lexicon: BDAG
  rationale: Aorist imperative calling for decisive return to clear-mindedness. The
    verb literally evokes sobering from intoxication, but here functions metaphorically.
    'Sober up' preserves the vivid image and imperative force without over-paraphrasing.
- source_word: δικαίως
  chosen: rightly
  alternatives:
  - properly
  - as is right
  - righteously
  lexicon: BDAG
  rationale: Adverb modifying the imperative. 'Rightly' is concise and natural, preserving
    the sense of acting in a proper/right way. 'Righteously' is possible but can sound
    more moralized than the immediate adverbial force requires.
- source_word: μὴ ἁμαρτάνετε
  chosen: do not go on sinning
  alternatives:
  - do not sin
  - stop sinning
  lexicon: BDAG
  rationale: Present imperative with μή commonly carries a prohibition with ongoing
    force. 'Do not go on sinning' best reflects the aspectual nuance without overstating
    it. 'Stop sinning' is possible but can imply they are all presently engaged in
    the same act more directly than the Greek requires.
- source_word: ἀγνωσίαν
  chosen: ignorance
  alternatives:
  - lack of knowledge
  lexicon: BDAG
  rationale: The noun denotes ignorance or lack of knowledge. 'Ignorance' is the most
    direct and idiomatic rendering.
- source_word: θεοῦ
  chosen: of God
  alternatives:
  - about God
  lexicon: BDAG
  rationale: The genitive is naturally rendered 'of God' in English here, expressing
    ignorance concerning God. 'About God' is interpretive and smoother, but the more
    literal phrase is still clear.
- source_word: τινες
  chosen: some
  alternatives:
  - certain people
  lexicon: BDAG
  rationale: Indefinite plural referring to a subset within or associated with the
    audience. 'Some' is the natural English equivalent.
- source_word: πρὸς ἐντροπὴν ὑμῖν
  chosen: to your shame
  alternatives:
  - for your shame
  - to shame you
  lexicon: BDAG
  rationale: This idiom expresses intended effect or result in relation to the hearers'
    shame. 'To your shame' is idiomatic and preserves Paul's rebuking tone. 'To shame
    you' would shift slightly toward purpose directed by Paul rather than the idiomatic
    dative relation.
- source_word: λαλῶ
  chosen: I say this
  alternatives:
  - I speak
  - I am speaking
  lexicon: BDAG
  rationale: Present active indicative of speaking. In English, 'I say this' best
    fits the discourse function, pointing back to the rebuke just given.
