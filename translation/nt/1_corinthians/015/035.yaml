id: 1CO.15.35
reference: 1 Corinthians 15:35
source:
  edition: SBLGNT
  text: Ἀλλὰ ἐρεῖ τις· Πῶς ἐγείρονται οἱ νεκροί, ποίῳ δὲ σώματι ἔρχονται;
translation:
  text: But someone will say, “How are the dead raised, and with what kind of body
    do they come?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “How do the dead rise?” The Greek verb is passive, literally “are raised,”
      which may imply divine agency.
    reason: alternative_reading
lexical_decisions:
- source_word: Ἀλλὰ
  chosen: But
  alternatives:
  - However
  - Yet
  lexicon: BDAG
  rationale: Marks a contrastive transition to an anticipated objection or question;
    'But' is natural and sufficiently direct in English.
- source_word: ἐρεῖ τις
  chosen: someone will say
  alternatives:
  - someone may say
  - someone will ask
  lexicon: BDAG
  rationale: Future indicative with indefinite pronoun naturally introduces a hypothetical
    interlocutor. 'Will say' preserves the future form better than 'may say,' while
    still functioning idiomatically as a rhetorical objection.
- source_word: Πῶς
  chosen: How
  alternatives:
  - In what way
  lexicon: BDAG
  rationale: Directly renders the interrogative adverb and preserves the question
    about manner or possibility.
- source_word: ἐγείρονται
  chosen: are raised
  alternatives:
  - are awakened
  - rise
  lexicon: BDAG
  rationale: Passive voice is explicit in Greek and important in resurrection contexts;
    'are raised' preserves that passive nuance better than the intransitive 'rise.'
- source_word: οἱ νεκροί
  chosen: the dead
  alternatives:
  - dead people
  - the dead ones
  lexicon: BDAG
  rationale: Standard and natural English rendering for the substantival adjective,
    preserving the collective reference.
- source_word: ποίῳ ... σώματι
  chosen: with what kind of body
  alternatives:
  - with what body
  - in what kind of body
  lexicon: BDAG
  rationale: ποίῳ asks not merely 'what' but 'what kind/sort.' Including 'kind of'
    preserves the qualitative force. The dative is rendered idiomatically with 'with'
    in English.
- source_word: δὲ
  chosen: and
  alternatives:
  - but
  - then
  lexicon: BDAG
  rationale: Here δέ links the second question to the first without strong adversative
    force; 'and' is the most natural English connective.
- source_word: ἔρχονται
  chosen: do they come
  alternatives:
  - do they arrive
  - do they appear
  lexicon: BDAG
  rationale: A straightforward rendering of ἔρχομαι. In context it refers to the dead
    in resurrection coming with a certain kind of body. 'Come' preserves the Greek
    wording without overinterpreting it as 'appear' or replacing it with 'are raised'
    again.
