theological_decisions:
- issue: Resurrection wording and agency
  chosen_reading: How are the dead raised
  alternative_readings:
  - How do the dead rise
  rationale: The passive ἐγείρονται is retained to preserve the text's wording and
    its resonance with divine agency in resurrection, without making that agency more
    explicit than the verse itself does.
  doctrine_reference: Preserve theological tension rather than resolve it.
