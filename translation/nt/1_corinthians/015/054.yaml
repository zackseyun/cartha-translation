theological_decisions:
- issue: Rendering γενήσεται in relation to the scriptural citation
  chosen_reading: Translated as 'will happen' rather than 'will be fulfilled.'
  alternative_readings:
  - will be fulfilled
  - will come to pass
  rationale: This preserves the source verb γίνομαι without importing a stronger fulfillment
    formula. The verse certainly presents the written word as coming true, but the
    translation should not overstate beyond the Greek wording.
  doctrine_reference: Translation philosophy §1, §3
- issue: Aspect of the quotation 'Κατεπόθη ὁ θάνατος εἰς νῖκος'
  chosen_reading: Rendered 'Death has been swallowed up in victory.'
  alternative_readings:
  - Death is swallowed up in victory
  - Death was swallowed up in victory
  rationale: 'English present perfect best captures the force of the aorist within
    a future-oriented eschatological statement: at that time the written declaration
    stands realized. This avoids flattening the quotation into a mere timeless present
    while remaining idiomatic.'
  doctrine_reference: Translation philosophy §6
