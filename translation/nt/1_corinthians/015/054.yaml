id: 1CO.15.54
reference: 1 Corinthians 15:54
source:
  edition: SBLGNT
  text: ὅταν δὲ τὸ ⸂φθαρτὸν τοῦτο ἐνδύσηται ἀφθαρσίαν καὶ τὸ⸃ θνητὸν τοῦτο ἐνδύσηται
    ⸀ἀθανασίαν, τότε γενήσεται ὁ λόγος ὁ γεγραμμένος· Κατεπόθη ὁ θάνατος εἰς νῖκος.
translation:
  text: 'But when this perishable puts on imperishability, and this mortal puts on
    immortality, then the written word will come to pass: “Death has been swallowed
    up in victory.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the saying that is written.'
    reason: lexical_alternative
  - marker: b
    text: Or 'then the written word will be fulfilled.' The Greek verb is more literally
      'will happen' or 'will come to pass.'
    reason: alternative_reading
  - marker: c
    text: Quoted from Isaiah 25:8, with wording reflecting the Greek tradition Paul
      cites.
    reason: cross_reference
  - marker: d
    text: Or 'the word that is written'.
    reason: previous_rendering
lexical_decisions:
- source_word: φθαρτὸν
  chosen: perishable
  alternatives:
  - corruptible
  - subject to decay
  lexicon: BDAG
  rationale: Adjectival substantive referring to the present body in its liable-to-decay
    condition. 'Perishable' is clear modern English and pairs naturally with 'imperishability.'
- source_word: ἐνδύσηται
  chosen: puts on
  alternatives:
  - is clothed with
  - puts on itself
  lexicon: BDAG
  rationale: The middle voice preserves the clothing metaphor of being invested with
    a new quality. 'Puts on' is idiomatic and keeps Paul's imagery without overformal
    wording.
- source_word: ἀφθαρσίαν
  chosen: imperishability
  alternatives:
  - incorruption
  lexicon: BDAG
  rationale: Chosen for lexical correspondence with φθαρτός and for readable modern
    English. 'Incorruption' is traditional but less natural for contemporary readers.
- source_word: θνητὸν
  chosen: mortal
  alternatives:
  - subject to death
  lexicon: BDAG
  rationale: Standard concise rendering for that which is liable to die; it forms
    the expected pair with 'immortality.'
- source_word: ἀθανασίαν
  chosen: immortality
  lexicon: BDAG
  rationale: Direct and standard rendering of the noun meaning deathlessness.
- source_word: γενήσεται
  chosen: will happen
  alternatives:
  - will come to pass
  - will be fulfilled
  lexicon: BDAG
  rationale: γίνομαι here means 'come about' or 'happen.' 'Will happen' reflects the
    verb's plain sense. 'Will be fulfilled' is interpretively attractive in a quotation
    context, but it imports fulfillment language not explicit in γίνομαι.
- source_word: ὁ λόγος ὁ γεγραμμένος
  chosen: the word that is written
  alternatives:
  - the saying that is written
  - the scripture that is written
  lexicon: BDAG
  rationale: λόγος here introduces the cited written statement. 'Word' is formally
    closer, while 'that is written' makes the perfect participle natural in English.
    'Saying' is possible and idiomatic, but 'word' better preserves the Greek term.
- source_word: Κατεπόθη
  chosen: has been swallowed up
  alternatives:
  - was swallowed up
  - is swallowed up
  lexicon: BDAG
  rationale: Aorist passive in the citation is rendered with English present perfect
    to reflect the prophetic declaration as realized at that future moment in Paul's
    argument. The passive preserves the image without specifying the implied agent.
- source_word: εἰς νῖκος
  chosen: in victory
  alternatives:
  - into victory
  - for victory
  lexicon: BDAG
  rationale: Idiomatic rendering of εἰς with the result/state expressed by νῖκος.
    'In victory' is the standard natural English equivalent in this citation and conveys
    death's complete defeat.
