id: 1CO.15.58
reference: 1 Corinthians 15:58
source:
  edition: SBLGNT
  text: Ὥστε, ἀδελφοί μου ἀγαπητοί, ἑδραῖοι γίνεσθε, ἀμετακίνητοι, περισσεύοντες ἐν
    τῷ ἔργῳ τοῦ κυρίου πάντοτε, εἰδότες ὅτι ὁ κόπος ὑμῶν οὐκ ἔστιν κενὸς ἐν κυρίῳ.
translation:
  text: Therefore, my beloved brothers, become steadfast, immovable, always abounding
    in the work of the Lord, knowing that your labor in the Lord is not in vain.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '''Brothers'' translates Greek adelphoi, which can refer to fellow believers
      collectively, including women, depending on context.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ὥστε
  chosen: Therefore
  alternatives:
  - So then
  - Therefore then
  lexicon: BDAG
  rationale: Inferential conjunction drawing a conclusion from the resurrection argument
    in the preceding context; 'Therefore' is natural English and preserves the logical
    force.
- source_word: ἀδελφοί μου ἀγαπητοί
  chosen: my beloved brothers
  alternatives:
  - my beloved brothers and sisters
  - my dear brothers
  lexicon: BDAG
  rationale: ἀδελφοί is grammatically masculine plural and often representative; per
    doctrine, gender-accurate rendering is preferred over gender-neutral. 'Beloved'
    preserves ἀγαπητοί more directly than 'dear,' while a footnote can note inclusive
    force in context.
- source_word: ἑδραῖοι
  chosen: steadfast
  alternatives:
  - firm
  - settled
  lexicon: BDAG
  rationale: Conveys being firmly seated/established in conviction; 'steadfast' is
    idiomatic and pairs well with the following adjective.
- source_word: γίνεσθε
  chosen: become
  alternatives:
  - be
  - continue to be
  lexicon: BDAG
  rationale: Present middle imperative of γίνομαι is more literally 'become' or 'prove
    to be' rather than simple copula 'be.' Here 'become steadfast' preserves the verbal
    force of entering/maintaining this state in response to the exhortation.
- source_word: ἀμετακίνητοι
  chosen: immovable
  alternatives:
  - unshaken
  - not moved
  lexicon: BDAG
  rationale: Strong term for not being shifted from position; 'immovable' is the standard
    concise equivalent and complements 'steadfast' without redundancy.
- source_word: περισσεύοντες
  chosen: abounding
  alternatives:
  - excelling
  - overflowing
  lexicon: BDAG
  rationale: Present participle indicating ongoing abundance; 'abounding' preserves
    both continuity and fullness better than the more interpretive 'excelling.'
- source_word: ἐν τῷ ἔργῳ τοῦ κυρίου
  chosen: in the work of the Lord
  alternatives:
  - in the Lord's work
  - in the Lord's service
  lexicon: BDAG
  rationale: Formal enough to preserve the genitival construction and broad enough
    not to narrow ἔργον to ministry activity alone. κύριος follows the doctrinal default
    'Lord.'
- source_word: πάντοτε
  chosen: always
  alternatives:
  - at all times
  lexicon: BDAG
  rationale: Straightforward adverb; 'always' is the natural modern equivalent.
- source_word: εἰδότες
  chosen: knowing
  alternatives:
  - since you know
  - because you know
  lexicon: BDAG
  rationale: Perfect participle functioning adverbially; 'knowing' preserves the participial
    connection without over-interpreting the causal nuance.
- source_word: ὁ κόπος ὑμῶν
  chosen: your labor
  alternatives:
  - your toil
  - your hard work
  lexicon: BDAG
  rationale: κόπος emphasizes laborious effort to the point of weariness; 'labor'
    captures the weight better than the lighter 'work.'
- source_word: οὐκ ἔστιν κενὸς
  chosen: is not in vain
  alternatives:
  - is not empty
  - is not futile
  lexicon: BDAG
  rationale: Idiomatic English for κενός in this context of meaningfulness/result;
    'in vain' best matches Paul's contrast with emptiness or fruitlessness in the
    resurrection chapter.
- source_word: ἐν κυρίῳ
  chosen: in the Lord
  alternatives:
  - in union with the Lord
  - before the Lord
  lexicon: BDAG
  rationale: Pauline locative/instrumental phrase best left as 'in the Lord' to preserve
    theological breadth rather than narrowing it to one interpretive paraphrase.
