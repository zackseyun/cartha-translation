theological_decisions:
- issue: Gender reference of ἀδελφοί
  chosen_reading: Rendered 'brothers' in the main text with inclusive force noted
    in a footnote.
  alternative_readings:
  - brothers and sisters
  rationale: The doctrine excerpt directs gender-accurate rather than gender-neutral
    renderings where the Greek is grammatically masculine and representative. In this
    epistolary context the audience is the whole church, so the inclusive sense is
    worth preserving in a footnote without replacing the masculine form in the main
    text.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Sense of ἐν κυρίῳ at the end of the verse
  chosen_reading: Attached to 'your labor' as 'your labor in the Lord is not in vain.'
  alternative_readings:
  - your labor is not in vain because of the Lord
  - your labor is not empty in relation to the Lord
  rationale: The phrase most naturally qualifies the believers' labor in Pauline usage,
    emphasizing labor done in union with the Lord. This preserves the theological
    connection without paraphrastic expansion.
  doctrine_reference: DOCTRINE.md Translation philosophy §3
- issue: Rendering of κύριος
  chosen_reading: Lord
  alternative_readings:
  - Master
  rationale: The doctrinal default for κύριος is 'Lord,' and nothing in this verse
    requires deviation.
  doctrine_reference: DOCTRINE.md Contested terms table
