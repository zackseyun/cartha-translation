id: 1CO.15.56
reference: 1 Corinthians 15:56
source:
  edition: SBLGNT
  text: τὸ δὲ κέντρον τοῦ θανάτου ἡ ἁμαρτία, ἡ δὲ δύναμις τῆς ἁμαρτίας ὁ νόμος·
translation:
  text: Now the sting of death is sin, and the power of sin is the law.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''strength'': ''the strength of sin is the law.'''
    reason: lexical_alternative
  - marker: b
    text: '''The law'' likely refers especially to the Mosaic law in Paul''s argument,
      though the wording also allows the broader sense of law''s role in exposing
      and intensifying sin.'
    reason: alternative_reading
lexical_decisions:
- source_word: κέντρον
  chosen: sting
  alternatives:
  - goad
  lexicon: BDAG
  rationale: In this context of death personified and in close connection with the
    preceding taunt about death's 'sting,' 'sting' is the most natural English rendering.
    Although κέντρον can denote a 'goad' or sharp point, here it refers metaphorically
    to the injurious weapon by which death harms.
- source_word: θανάτου
  chosen: of death
  lexicon: BDAG
  rationale: 'The genitive is best rendered straightforwardly as possession or association:
    the sting belonging to death, i.e., death''s sting.'
- source_word: ἁμαρτία
  chosen: sin
  lexicon: BDAG
  rationale: Standard Pauline usage; singular is retained because Paul speaks of sin
    as a power or principle, not merely individual sins.
- source_word: δύναμις
  chosen: power
  alternatives:
  - strength
  lexicon: BDAG
  rationale: '''Power'' best captures the capacity or force that the law gives to
    sin in Paul''s argument. ''Strength'' is traditional and possible, but ''power''
    is more natural modern English while preserving the sense.'
- source_word: νόμος
  chosen: the law
  alternatives:
  - Law
  lexicon: BDAG
  rationale: Rendered 'the law' to preserve Paul's likely reference to law in the
    theological sense, especially the Mosaic law in context, while allowing the broader
    Pauline force of law as that which exposes and intensifies sin. Lowercase avoids
    over-specifying beyond what the Greek itself marks.
- source_word: δὲ
  chosen: now ... and
  alternatives:
  - but ... and
  - and ... and
  lexicon: BDAG
  rationale: δέ marks progression/explanation rather than strong contrast here. 'Now'
    in the first clause gives a natural explanatory transition in English; the second
    δέ is adequately represented by 'and'.
