id: 1CO.15.29
reference: 1 Corinthians 15:29
source:
  edition: SBLGNT
  text: Ἐπεὶ τί ποιήσουσιν οἱ βαπτιζόμενοι ὑπὲρ τῶν νεκρῶν; εἰ ὅλως νεκροὶ οὐκ ἐγείρονται,
    τί καὶ βαπτίζονται ὑπὲρ ⸀αὐτῶν;
translation:
  text: Otherwise, what will those do who are being baptized on behalf of the dead?
    If the dead are not raised at all, why then are they being baptized on their behalf?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for the dead,' 'because of the dead,' or less likely 'over the dead.'
      The Greek preposition can be understood in more than one way, and the exact
      practice Paul refers to is uncertain.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐπεὶ
  chosen: Otherwise
  alternatives:
  - Since
  - Else
  lexicon: BDAG
  rationale: In this argumentative context, ἐπεί introduces an inference from the
    preceding discussion. 'Otherwise' best captures Paul's rhetorical transition to
    a consequence if resurrection is denied.
- source_word: τί ποιήσουσιν
  chosen: what will those do
  alternatives:
  - what will they accomplish
  - what will become of those
  lexicon: BDAG
  rationale: ποιέω here is kept with its broad sense 'do' rather than narrowed to
    'accomplish,' preserving the rhetorical question's open-ended force.
- source_word: οἱ βαπτιζόμενοι
  chosen: those who are being baptized
  alternatives:
  - those being baptized
  - the ones being baptized
  lexicon: BDAG
  rationale: The present passive participle is rendered progressively to reflect an
    ongoing or customary practice without specifying its legitimacy.
- source_word: ὑπὲρ τῶν νεκρῶν
  chosen: on behalf of the dead
  alternatives:
  - for the dead
  - because of the dead
  - over the dead
  lexicon: BDAG
  rationale: ὑπέρ with the genitive most naturally means 'on behalf of' or 'for.'
    'On behalf of' makes explicit the representative sense many see here while remaining
    a direct lexical rendering. Because the phrase is notoriously debated, alternatives
    are preserved in a footnote rather than resolved dogmatically.
- source_word: εἰ ὅλως
  chosen: If ... at all
  alternatives:
  - If really
  - If indeed
  lexicon: BDAG
  rationale: ὅλως intensifies the condition. Rendering it with 'at all' preserves
    the emphatic force in natural English.
- source_word: νεκροὶ οὐκ ἐγείρονται
  chosen: the dead are not raised
  alternatives:
  - dead people are not raised
  - the dead do not rise
  lexicon: BDAG
  rationale: The passive ἐγείρονται is preserved as 'are not raised,' matching Paul's
    usual resurrection language and avoiding flattening divine agency implied by the
    passive.
- source_word: τί καὶ
  chosen: why then
  alternatives:
  - why also
  - what also
  lexicon: BDAG
  rationale: In this rhetorical repetition, τί with καί is idiomatically rendered
    'why then,' conveying the argumentative force rather than a wooden 'what also.'
- source_word: βαπτίζονται
  chosen: are they being baptized
  alternatives:
  - are they baptized
  - do they get baptized
  lexicon: BDAG
  rationale: The present passive is rendered progressively for consistency with the
    participle earlier in the verse and to reflect the ongoing practice under discussion.
- source_word: ὑπὲρ αὐτῶν
  chosen: on their behalf
  alternatives:
  - for them
  - because of them
  lexicon: BDAG
  rationale: The pronoun αὐτῶν refers back to 'the dead.' 'On their behalf' keeps
    the lexical parallel with the first clause and preserves the ambiguity of the
    practice rather than interpreting it away.
