theological_decisions:
- issue: Meaning of baptism 'for/on behalf of the dead'
  chosen_reading: 'Retain the phrase in a minimally interpretive form: ''being baptized
    on behalf of the dead,'' without endorsing any specific historical practice or
    theology.'
  alternative_readings:
  - being baptized for the sake of the dead
  - being baptized because of the dead
  - being baptized over the dead
  rationale: This verse is famously difficult and has generated multiple interpretations.
    The translation should preserve the textual ambiguity and Paul's rhetorical use
    of the practice in his resurrection argument, rather than importing a denominational
    explanation. 'On behalf of' reflects a common sense of ὑπέρ while footnoting alternatives.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
