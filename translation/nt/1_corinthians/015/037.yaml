theological_decisions:
- issue: Relation of seed to resurrection body
  chosen_reading: Retain 'body' and future-oriented wording without interpreting beyond
    the metaphor.
  alternative_readings:
  - Render more dynamically as 'the plant that will grow'
  rationale: Paul's point supports continuity and transformation in bodily resurrection,
    but the verse itself uses agricultural analogy. The translation preserves the
    metaphor and the term 'body' without collapsing it into a purely botanical paraphrase
    or importing a full doctrinal explanation into the text.
  doctrine_reference: Translation philosophy §§1, 3, 5
