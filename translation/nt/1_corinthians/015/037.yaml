id: 1CO.15.37
reference: 1 Corinthians 15:37
source:
  edition: SBLGNT
  text: καὶ ὃ σπείρεις, οὐ τὸ σῶμα τὸ γενησόμενον σπείρεις ἀλλὰ γυμνὸν κόκκον εἰ τύχοι
    σίτου ἤ τινος τῶν λοιπῶν·
translation:
  text: And what you sow, you do not sow the body that will come to be, but a bare
    seed—perhaps of wheat or of one of the others.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the body that will be.'
    reason: lexical_alternative
  - marker: b
    text: Or 'a bare grain' or 'a naked kernel.'
    reason: lexical_alternative
  - marker: c
    text: Or 'perhaps wheat, or some other kind.'
    reason: lexical_alternative
lexical_decisions:
- source_word: σπείρεις
  chosen: you sow
  alternatives:
  - you plant
  lexicon: BDAG
  rationale: The agricultural verb literally means 'sow.' 'Plant' is possible in idiomatic
    English, but 'sow' preserves Paul's seed imagery and keeps closer verbal continuity
    with the surrounding argument about resurrection.
- source_word: σῶμα
  chosen: body
  alternatives:
  - form
  lexicon: BDAG
  rationale: '''Body'' is the standard and contextually important Pauline term in
    this resurrection discussion. Rendering it more loosely as ''form'' would weaken
    the connection to the larger argument about bodily resurrection.'
- source_word: τὸ γενησόμενον
  chosen: that will come to be
  alternatives:
  - that will be
  - that is to be
  - that will grow
  lexicon: BDAG
  rationale: The participle from γίνομαι denotes what will come into existence. 'That
    will come to be' is slightly more explicit than 'that will be' and avoids over-specifying
    the process as merely botanical growth, while still sounding natural enough in
    context.
- source_word: γυμνὸν
  chosen: bare
  alternatives:
  - naked
  - mere
  lexicon: BDAG
  rationale: The adjective means 'naked' or 'bare.' 'Bare' is idiomatic in English
    for an unshelled or unadorned seed and avoids awkwardness while preserving the
    contrast with the future body.
- source_word: κόκκον
  chosen: seed
  alternatives:
  - grain
  - kernel
  lexicon: BDAG
  rationale: Although κόκκος can mean 'grain' or 'kernel,' 'seed' best communicates
    the agricultural image in contemporary English. The following genitive 'of wheat'
    clarifies the kind of seed in view.
- source_word: εἰ τύχοι
  chosen: perhaps
  alternatives:
  - it may be
  - if it happens to be
  lexicon: BDAG
  rationale: 'This idiom expresses contingency or example: ''perhaps'' or ''it may
    be.'' ''Perhaps'' is concise and natural in English while preserving the illustrative
    force rather than making a strict conditional statement.'
- source_word: σίτου
  chosen: of wheat
  alternatives:
  - of grain
  lexicon: BDAG
  rationale: σῖτος here most naturally refers specifically to wheat rather than grain
    in general, especially in contrast with 'one of the others.' 'Wheat' gives the
    clearer concrete example.
- source_word: τινος τῶν λοιπῶν
  chosen: of one of the others
  alternatives:
  - of some other kind
  - of one of the rest
  lexicon: BDAG
  rationale: The phrase refers to some other seed among the remaining kinds. 'Of one
    of the others' stays close to the Greek structure while remaining understandable;
    the broader sense is preserved in a footnote alternative.
