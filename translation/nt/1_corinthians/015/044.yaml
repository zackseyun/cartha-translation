theological_decisions:
- issue: Meaning of the contrast between 'natural body' and 'spiritual body'
  chosen_reading: The main text preserves Paul's wording as a contrast between a body
    characterized by natural life and a body characterized by the Spirit, not between
    a material body and an immaterial existence.
  alternative_readings:
  - '''physical body'' versus ''nonphysical body'''
  - '''soulish body'' versus ''spirit body'''
  rationale: Historic Christian orthodoxy affirms bodily resurrection. Rendering ψυχικόν
    as 'natural' and πνευματικόν as 'spiritual' preserves the lexical contrast without
    implying that the resurrection body is immaterial. A clarifying footnote preserves
    the alternative lexical possibilities and guards against misunderstanding.
  doctrine_reference: Affirmations; Translation philosophy §3
