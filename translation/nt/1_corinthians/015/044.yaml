id: 1CO.15.44
reference: 1 Corinthians 15:44
source:
  edition: SBLGNT
  text: σπείρεται σῶμα ψυχικόν, ἐγείρεται σῶμα πνευματικόν. ⸀Εἰ ἔστιν σῶμα ψυχικόν,
    ⸂ἔστιν καὶ⸃ πνευματικόν.
translation:
  text: It is sown a natural body; it is raised a spiritual body. If there is a natural
    body, there is also a spiritual body.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'soulish body' ... 'spiritual body.' Paul’s contrast is not between a
      material body and an immaterial one, but between a body animated by ordinary
      human life and one animated by the Spirit.
    reason: lexical_alternative
lexical_decisions:
- source_word: σπείρεται
  chosen: it is sown
  alternatives:
  - is planted
  lexicon: BDAG
  rationale: Passive present is retained with 'it is sown,' matching Paul's seed/resurrection
    imagery in the immediate context. 'Planted' is possible but less direct and less
    consistent with the agricultural metaphor already established.
- source_word: σῶμα
  chosen: body
  lexicon: BDAG
  rationale: Standard gloss. In this context it refers to the embodied human person
    in death and resurrection, so 'body' is the most direct and natural rendering.
- source_word: ψυχικόν
  chosen: natural
  alternatives:
  - soulish
  - physical
  - unspiritual
  lexicon: BDAG
  rationale: In Pauline usage here, ψυχικός contrasts with πνευματικός not as material
    versus immaterial, but as life animated by ordinary creaturely life (ψυχή) versus
    life animated by the Spirit. 'Natural' is established and communicates this better
    than the misleading 'physical,' while 'soulish' is too opaque for modern readers
    and 'unspiritual' overstates the negative sense.
- source_word: ἐγείρεται
  chosen: it is raised
  alternatives:
  - it is awakened
  lexicon: BDAG
  rationale: Passive present is best rendered 'it is raised,' the standard resurrection
    idiom in English and the clearest fit in context.
- source_word: πνευματικόν
  chosen: spiritual
  alternatives:
  - Spirit-empowered
  - of the Spirit
  lexicon: BDAG
  rationale: '''Spiritual'' is the most natural gloss and preserves Paul''s terminology.
    It should not be taken to mean non-bodily; rather, it denotes a body characterized
    by or animated by the Spirit. More interpretive renderings are possible but better
    reserved for notes.'
- source_word: Εἰ
  chosen: If
  alternatives:
  - Since
  lexicon: BDAG
  rationale: The conditional particle is straightforwardly rendered 'If.' Although
    the logic may imply a fulfilled condition, 'if' preserves the Greek form without
    over-interpreting.
- source_word: καὶ
  chosen: also
  alternatives:
  - indeed
  - even
  lexicon: BDAG
  rationale: '''Also'' best conveys the additive force in the second clause: the existence
    of the natural body entails the existence of the spiritual body.'
