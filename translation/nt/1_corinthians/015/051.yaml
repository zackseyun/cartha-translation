id: 1CO.15.51
reference: 1 Corinthians 15:51
source:
  edition: SBLGNT
  text: ἰδοὺ μυστήριον ὑμῖν λέγω· ⸀πάντες οὐ κοιμηθησόμεθα πάντες δὲ ἀλλαγησόμεθα,
translation:
  text: 'Behold, I tell you a mystery: we will not all sleep, but we will all be changed,'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more interpretively, 'we will not all die.' The Greek says 'sleep,'
      a common New Testament metaphor for death in light of resurrection.
    reason: lexical_alternative
  - marker: b
    text: A notable textual variant reads, in effect, 'we will all sleep, but we will
      not all be changed.' The main text follows the SBLGNT reading.
    reason: textual_variant
lexical_decisions:
- source_word: ἰδοὺ
  chosen: Behold
  alternatives:
  - Look
  - Listen
  lexicon: BDAG
  rationale: Retains the attention-getting force of the discourse marker with elevated
    but still intelligible English suitable to the solemn announcement. 'Look' is
    possible but weaker and more colloquial.
- source_word: μυστήριον
  chosen: mystery
  alternatives:
  - secret
  lexicon: BDAG
  rationale: In Pauline usage this denotes a divine truth previously hidden and now
    revealed, not something merely puzzling. 'Mystery' preserves established theological
    sense without paraphrase.
- source_word: ὑμῖν λέγω
  chosen: I tell you
  alternatives:
  - I say to you
  lexicon: BDAG
  rationale: Natural modern English that preserves the direct address and declarative
    force. 'I say to you' is more formal but less idiomatic here.
- source_word: πάντες οὐ κοιμηθησόμεθα
  chosen: we will not all sleep
  alternatives:
  - not all of us will fall asleep
  - we will not all die
  lexicon: BDAG
  rationale: The future middle/passive of κοιμάομαι is a common Christian euphemism
    for death. 'Sleep' preserves Paul's metaphor and intertextual resonance with resurrection
    language; 'die' interprets the metaphor and is therefore kept as an alternative
    rather than the main text. The placement 'not all' reflects the Greek syntax.
- source_word: πάντες δὲ ἀλλαγησόμεθα
  chosen: but we will all be changed
  alternatives:
  - and we will all be changed
  lexicon: BDAG
  rationale: ἀλλάσσω here refers to eschatological transformation. 'Be changed' is
    the most direct rendering. δέ is rendered 'but' to mark the contrast between not
    all dying and all undergoing transformation; 'and' is possible but underplays
    the contrast.
