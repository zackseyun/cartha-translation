theological_decisions:
- issue: Meaning of 'sleep' in resurrection context
  chosen_reading: '''sleep'' is retained as a metaphor for physical death prior to
    resurrection'
  alternative_readings:
  - '''die'' as an interpretive rendering'
  rationale: The verse concerns the resurrection transformation of believers. Retaining
    the metaphor preserves Paul's theological idiom without importing a doctrine of
    soul sleep; the context makes clear this is death viewed from the standpoint of
    future resurrection.
  doctrine_reference: 'Translation philosophy: preserve source-language sense and
    theological tension without over-resolving.'
- issue: Text-critical/interpretive tension in the clause order and sense
  chosen_reading: Main text follows the SBLGNT reading, 'we will not all sleep, but
    we will all be changed'
  alternative_readings:
  - Some manuscripts/readings are reflected in the traditional rendering 'we shall
    not all sleep, but we shall all be changed' with essentially the same sense
  - A well-known textual variant reverses the sense toward 'we will all sleep, but
    we will not all be changed'
  rationale: The provided source text reads πάντες οὐ κοιμηθησόμεθα πάντες δὲ ἀλλαγησόμεθα.
    This is translated directly. Because a notable variant exists in the manuscript
    tradition and has interpretive significance, it is preserved in a footnote rather
    than adopted.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    alternatives in footnotes where significant.'
