id: 1CO.15.26
reference: 1 Corinthians 15:26
source:
  edition: SBLGNT
  text: ἔσχατος ἐχθρὸς καταργεῖται ὁ θάνατος,
translation:
  text: The last enemy to be abolished is death.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'The last enemy destroyed is death.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔσχατος
  chosen: last
  alternatives:
  - final
  - ultimate
  lexicon: BDAG
  rationale: The adjective denotes what is last in a sequence. 'Last' is the most
    natural English rendering here and preserves the eschatological sequence in Paul's
    argument.
- source_word: ἐχθρὸς
  chosen: enemy
  alternatives:
  - foe
  lexicon: BDAG
  rationale: The noun refers to an adversary or hostile power. 'Enemy' is standard,
    clear English and fits Paul's personification of death as an opposing power.
- source_word: καταργεῖται
  chosen: to be abolished
  alternatives:
  - is abolished
  - is destroyed
  - is nullified
  - is rendered powerless
  lexicon: BDAG
  rationale: 'The present passive here is best rendered with an infinitival complement
    in English after the implied copular structure: ''The last enemy to be abolished
    is death.'' ''Abolished'' preserves the sense of being brought to an end or made
    ineffective without overstating annihilation. ''Destroyed'' is traditional and
    possible, but ''abolished'' better reflects καταργέω''s semantic range of nullifying
    or bringing to nothing.'
- source_word: ὁ θάνατος
  chosen: death
  lexicon: BDAG
  rationale: With the article, the noun is definite and personified as the final enemy.
    English idiom does not require the article here; 'death' naturally conveys the
    concept and the personified hostile power in context.
