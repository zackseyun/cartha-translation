theological_decisions:
- issue: Rendering of καταργεῖται in relation to death's defeat
  chosen_reading: to be abolished
  alternative_readings:
  - is destroyed
  - is abolished
  rationale: Paul's statement concerns the eschatological end of death as an enemy.
    Rendering καταργεῖται as 'to be abolished' preserves the Greek sense of being
    brought to an end or rendered inoperative, while avoiding importing a more specific
    metaphysical claim than the verb itself requires. 'Destroyed' remains a legitimate
    traditional alternative and is preserved in a footnote.
  doctrine_reference: 'Translation philosophy: Preserve theological tension rather
    than resolve it; Original-language primacy over translation tradition.'
