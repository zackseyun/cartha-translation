id: 1CO.15.32
reference: 1 Corinthians 15:32
source:
  edition: SBLGNT
  text: εἰ κατὰ ἄνθρωπον ἐθηριομάχησα ἐν Ἐφέσῳ, τί μοι τὸ ὄφελος; εἰ νεκροὶ οὐκ ἐγείρονται,
    Φάγωμεν καὶ πίωμεν, αὔριον γὰρ ἀποθνῄσκομεν.
translation:
  text: If, speaking in merely human terms, I fought with wild beasts in Ephesus,
    what does it profit me? If the dead are not raised, “Let us eat and drink, for
    tomorrow we die.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly, 'If, from a merely human point of view, I fought with wild
      beasts in Ephesus…' The phrase may qualify Paul's manner of speaking or perspective.
    reason: lexical_alternative
  - marker: b
    text: '''I fought with wild beasts'' may be understood literally or as a metaphor
      for brutal human opposition; the Greek wording itself is left intact in the
      main text.'
    reason: alternative_reading
  - marker: c
    text: Quotation/allusion to Isaiah 22:13.
    reason: cross_reference
lexical_decisions:
- source_word: κατὰ ἄνθρωπον
  chosen: speaking in merely human terms
  alternatives:
  - from a merely human point of view
  - according to man
  - humanly speaking
  lexicon: BDAG
  rationale: The phrase is idiomatic and likely qualifies the manner of speaking rather
    than introducing a literal contrast with divine action. 'Speaking in merely human
    terms' makes the idiom natural in English while preserving the sense of a merely
    human perspective.
- source_word: ἐθηριομάχησα
  chosen: I fought with wild beasts
  alternatives:
  - I fought beasts
  - I battled wild animals
  lexicon: BDAG
  rationale: The verb literally denotes fighting wild beasts. The translation preserves
    the vivid lexical sense without deciding in the main text whether Paul means a
    literal arena encounter or a metaphorical struggle with brutal opponents.
- source_word: ἐν Ἐφέσῳ
  chosen: in Ephesus
  lexicon: BDAG
  rationale: Standard transliteration of the place name, following the philosophy
    of transliterating names.
- source_word: τί μοι τὸ ὄφελος
  chosen: what does it profit me?
  alternatives:
  - what is the benefit to me?
  - what good is it to me?
  lexicon: BDAG
  rationale: This preserves the rhetorical force and the lexical idea of benefit/profit.
    'Profit' is idiomatic and concise in English.
- source_word: νεκροὶ
  chosen: the dead
  alternatives:
  - dead people
  lexicon: BDAG
  rationale: The substantival adjective is naturally rendered 'the dead' in English
    and fits the resurrection context.
- source_word: ἐγείρονται
  chosen: are not raised
  alternatives:
  - are not being raised
  - do not rise
  lexicon: BDAG
  rationale: Passive 'are raised' best reflects the Greek form and the theological
    context of resurrection as an act of God, without overexplaining.
- source_word: Φάγωμεν καὶ πίωμεν
  chosen: Let us eat and drink
  alternatives:
  - We should eat and drink
  lexicon: BDAG
  rationale: The hortatory subjunctives are well represented by 'Let us…' and preserve
    the quoted slogan's force.
- source_word: αὔριον γὰρ ἀποθνῄσκομεν
  chosen: for tomorrow we die
  alternatives:
  - for tomorrow we are dying
  lexicon: BDAG
  rationale: This is a conventional future-oriented statement despite the present
    tense form; 'for tomorrow we die' is the natural and recognizable English rendering,
    echoing Isaiah 22:13.
