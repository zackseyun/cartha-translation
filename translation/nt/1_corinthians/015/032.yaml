theological_decisions:
- issue: Whether ἐθηριομάχησα should be interpreted literally (actual beasts) or metaphorically
    (brutal human opponents)
  chosen_reading: Retain the literal lexical rendering 'I fought with wild beasts'
    in the main text without resolving whether Paul speaks literally or figuratively.
  alternative_readings:
  - Interpret as metaphor for severe conflict with human opponents in Ephesus
  rationale: Optimal equivalence favors preserving the Greek image in the main text.
    The verse's argument does not require the translator to settle the historical
    question, so the translation preserves the textual tension rather than importing
    an interpretive conclusion.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
