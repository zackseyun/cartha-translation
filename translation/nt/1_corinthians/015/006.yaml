id: 1CO.15.6
reference: 1 Corinthians 15:6
source:
  edition: SBLGNT
  text: ἔπειτα ὤφθη ἐπάνω πεντακοσίοις ἀδελφοῖς ἐφάπαξ, ἐξ ὧν οἱ ⸀πλείονες μένουσιν
    ἕως ἄρτι, τινὲς ⸀δὲ ἐκοιμήθησαν·
translation:
  text: Then he appeared to more than five hundred brothers at one time, most of whom
    remain until now, though some have fallen asleep.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'brothers and sisters'; the Greek says 'brothers,' which in early Christian
      usage can sometimes refer to the wider community of believers.
    reason: lexical_alternative
  - marker: b
    text: That is, they have died. Paul uses 'fallen asleep,' a common early Christian
      expression for death in light of the hope of resurrection.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔπειτα
  chosen: Then
  alternatives:
  - After that
  lexicon: BDAG
  rationale: Marks sequential progression in Paul's recital of resurrection appearances;
    'Then' is concise, natural English.
- source_word: ὤφθη
  chosen: he appeared
  alternatives:
  - he was seen
  lexicon: BDAG
  rationale: Aorist passive of ὁράω commonly functions in resurrection-appearance
    contexts as an intransitive/passive of appearance. 'He appeared' is idiomatic
    and preserves the event sense better than the more wooden 'was seen.' The implied
    subject is Christ from the preceding context.
- source_word: ἐπάνω πεντακοσίοις
  chosen: to more than five hundred
  alternatives:
  - to over five hundred
  lexicon: BDAG
  rationale: ἐπάνω with a numeral conveys 'more than/over.' 'More than five hundred'
    is standard and clear.
- source_word: ἀδελφοῖς
  chosen: brothers
  alternatives:
  - brothers and sisters
  - brethren
  lexicon: BDAG
  rationale: Per gender-accurate philosophy, the masculine plural is retained as 'brothers.'
    In early Christian usage it may include the wider believing community, but the
    source form is masculine and should not be flattened in the main text.
- source_word: ἐφάπαξ
  chosen: at one time
  alternatives:
  - all at once
  - at once
  lexicon: BDAG
  rationale: Here the adverb indicates simultaneity of the appearance to the large
    group. 'At one time' communicates that the five hundred saw him in a single occasion,
    not merely 'once' in the sense of one occurrence.
- source_word: ἐξ ὧν
  chosen: most of whom
  alternatives:
  - from whom ... most
  - of whom ... most
  lexicon: BDAG
  rationale: 'Combined with the following clause, idiomatic English front-loads the
    quantitative statement: ''most of whom.'' This preserves the partitive sense.'
- source_word: οἱ πλείονες
  chosen: most
  alternatives:
  - the majority
  - most of them
  lexicon: BDAG
  rationale: Comparative form used substantivally means 'most' or 'the greater number.'
    'Most' is the most natural English rendering.
- source_word: μένουσιν
  chosen: remain
  alternatives:
  - are still alive
  - continue
  lexicon: BDAG
  rationale: μένω literally means 'remain.' In context it implies continued living
    presence, but 'remain' preserves the lexical sense while allowing the context
    to carry the implication.
- source_word: ἕως ἄρτι
  chosen: until now
  alternatives:
  - to this day
  - until the present
  lexicon: BDAG
  rationale: Temporal phrase indicating continuance up to Paul's present time. 'Until
    now' is direct and readable.
- source_word: τινὲς δὲ
  chosen: though some
  alternatives:
  - but some
  - and some
  lexicon: BDAG
  rationale: δέ marks mild contrast. 'Though some' fits the English flow after 'most
    of whom remain until now' while preserving the contrast between the majority and
    the minority.
- source_word: ἐκοιμήθησαν
  chosen: have fallen asleep
  alternatives:
  - have died
  lexicon: BDAG
  rationale: κοιμάομαι is a conventional Christian euphemism for death, especially
    in resurrection contexts. The metaphor should be preserved in the main text rather
    than reduced to 'died.'
