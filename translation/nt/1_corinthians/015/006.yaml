theological_decisions:
- issue: Rendering ἀδελφοῖς in a potentially mixed-group context
  chosen_reading: brothers
  alternative_readings:
  - brothers and sisters
  rationale: The translation philosophy specifies gender-accurate over gender-neutral
    renderings. Although the referent may include the broader Christian community,
    the Greek form is masculine plural and is retained in the main text, with inclusivity
    noted in a footnote.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Rendering ἐκοιμήθησαν in a resurrection context
  chosen_reading: have fallen asleep
  alternative_readings:
  - have died
  rationale: The metaphor of sleep for believers' death is theologically significant
    in 1 Corinthians 15 because it resonates with the chapter's resurrection argument.
    Preserving the metaphor avoids flattening Paul's wording.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3
