theological_decisions:
- issue: Aspect of salvation in σῴζεσθε
  chosen_reading: ongoing 'are being saved'
  alternative_readings:
  - simple present 'are saved'
  rationale: The present passive is best represented with progressive force in English
    here. This preserves Pauline tension between accomplished and ongoing salvation
    without resolving debates about perseverance or assurance.
  doctrine_reference: Translation philosophy §3 Preserve theological tension rather
    than resolve it.
- issue: Conditional clause εἰ κατέχετε
  chosen_reading: real condition 'if you hold firmly'
  alternative_readings:
  - evidential condition implying proof of genuine faith
  - rhetorical condition with assumed truth
  rationale: The translation keeps the conditional form without importing a denominational
    reading on perseverance. Paul states the condition; the translation should not
    explain it away.
  doctrine_reference: Affirmations paragraph on not advocating denominational distinctives
    unless unambiguous; Translation philosophy §3.
