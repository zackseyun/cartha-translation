id: 1CO.15.2
reference: 1 Corinthians 15:2
source:
  edition: SBLGNT
  text: δι’ οὗ καὶ σῴζεσθε, τίνι λόγῳ εὐηγγελισάμην ὑμῖν, εἰ κατέχετε, ἐκτὸς εἰ μὴ
    εἰκῇ ἐπιστεύσατε.
translation:
  text: through which you also are being saved, if you hold firmly to the message
    I proclaimed as good news to you—unless you believed in vain.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'by which you are saved.' The Greek present tense may be rendered either
      as ongoing ('are being saved') or more generally ('are saved').
    reason: lexical_alternative
  - marker: b
    text: Literally, 'if you hold fast in/by what message I proclaimed as good news
      to you.'
    reason: lexical_alternative
lexical_decisions:
- source_word: δι’ οὗ
  chosen: through which
  alternatives:
  - by which
  lexicon: BDAG
  rationale: διά with the genitive commonly expresses means or instrumentality. 'Through
    which' is natural English and refers back to the gospel in v. 1.
- source_word: σῴζεσθε
  chosen: are being saved
  alternatives:
  - are saved
  - are saved continually
  lexicon: BDAG
  rationale: Present passive indicative suggests an ongoing process in context rather
    than a simple punctiliar statement. 'Are being saved' preserves the aspect without
    importing a full doctrinal system.
- source_word: τίνι λόγῳ
  chosen: to the message
  alternatives:
  - in what word
  - with what message
  - by what word
  lexicon: BDAG
  rationale: The dative phrase is idiomatic and tied to εἰ κατέχετε. In context Paul
    refers to the content/form of the gospel proclamation. Rendering with 'the message'
    gives clear English while preserving the referential sense. The interrogative
    force is absorbed idiomatically into the conditional clause.
- source_word: εὐηγγελισάμην
  chosen: I proclaimed as good news
  alternatives:
  - I preached
  - I gospelized
  - I announced the gospel
  lexicon: BDAG
  rationale: The verb means to announce good news. 'Proclaimed as good news' preserves
    the evangel/gospel sense more transparently than the traditional but narrower
    'preached.'
- source_word: κατέχετε
  chosen: hold firmly to
  alternatives:
  - hold fast to
  - keep
  - retain
  lexicon: BDAG
  rationale: κατέχω here conveys continuing adherence or retention. 'Hold firmly to'
    is readable modern English and fits the conditional sense.
- source_word: ἐκτὸς εἰ μὴ
  chosen: unless
  alternatives:
  - except if indeed
  - unless perhaps
  lexicon: BDAG
  rationale: This idiom introduces an exception. 'Unless' is the most natural concise
    rendering.
- source_word: εἰκῇ
  chosen: in vain
  alternatives:
  - for nothing
  - without cause
  - to no purpose
  lexicon: BDAG
  rationale: In this context εἰκῇ denotes something empty, futile, or without result.
    'In vain' is idiomatic and preserves Paul's warning.
- source_word: ἐπιστεύσατε
  chosen: you believed
  alternatives:
  - you came to believe
  - you put faith
  lexicon: BDAG
  rationale: Aorist indicative refers to their act of believing at the time of receiving
    the gospel. 'You believed' is the straightforward rendering.
