id: 1CO.15.12
reference: 1 Corinthians 15:12
source:
  edition: SBLGNT
  text: Εἰ δὲ Χριστὸς κηρύσσεται ὅτι ἐκ νεκρῶν ἐγήγερται, πῶς λέγουσιν ⸂ἐν ὑμῖν τινες⸃
    ὅτι ἀνάστασις νεκρῶν οὐκ ἔστιν;
translation:
  text: Now if the Messiah is proclaimed as having been raised from the dead, how
    can some among you say that there is no resurrection of the dead?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Christ is proclaimed.' Greek Χριστός can be rendered either 'Messiah'
      or 'Christ'; here the title sense is preserved in the main text.
    reason: alternative_reading
lexical_decisions:
- source_word: Χριστὸς
  chosen: the Messiah
  alternatives:
  - Christ
  lexicon: BDAG
  rationale: Used as a title rather than a name here, so rendered 'the Messiah' per
    doctrine guidance to translate titles where context supports. The article is supplied
    in English for naturalness and because the title is definite in sense.
- source_word: κηρύσσεται
  chosen: is proclaimed
  alternatives:
  - is preached
  lexicon: BDAG
  rationale: Passive present indicates the ongoing public announcement about Messiah.
    'Is proclaimed' is slightly more natural in modern English while preserving the
    heraldic sense of κηρύσσω.
- source_word: ἐκ νεκρῶν
  chosen: from the dead
  alternatives:
  - out from among the dead
  lexicon: BDAG
  rationale: Standard idiomatic rendering for resurrection language. The plural νεκρῶν
    literally means 'dead ones/dead people,' but English idiom prefers 'the dead'.
- source_word: ἐγήγερται
  chosen: has been raised
  alternatives:
  - has risen
  - has been awakened
  lexicon: BDAG
  rationale: Perfect passive best represented by 'has been raised,' emphasizing the
    completed act with abiding result and preserving the passive form, which in Pauline
    usage often implies God's action.
- source_word: πῶς
  chosen: how can
  alternatives:
  - how
  lexicon: BDAG
  rationale: The interrogative here carries rhetorical force expressing incongruity,
    which English idiom captures well with 'how can'.
- source_word: ἐν ὑμῖν τινες
  chosen: some among you
  alternatives:
  - some of you
  - certain ones among you
  lexicon: BDAG
  rationale: This phrase identifies a subset within the Corinthian community. 'Some
    among you' preserves the internal-group sense of ἐν ὑμῖν while remaining natural
    English.
- source_word: ἀνάστασις νεκρῶν
  chosen: resurrection of the dead
  alternatives:
  - resurrection from the dead
  lexicon: BDAG
  rationale: This is the standard Pauline expression for the general resurrection.
    'Of the dead' best reflects the genitive construction and the broad category in
    view, not merely one resurrection event.
- source_word: οὐκ ἔστιν
  chosen: there is no
  alternatives:
  - does not exist
  - is not
  lexicon: BDAG
  rationale: Existential εἰμί is most naturally rendered 'there is no' in English
    in this construction.
