theological_decisions:
- issue: Whether to make the Adam/Christ contrast explicit with supplied 'man' in
    both singular clauses
  chosen_reading: Use 'the man of dust' and 'the heavenly man'
  alternative_readings:
  - the one of dust ... the heavenly one
  - the earthy one ... the heavenly one
  rationale: The immediate context (vv. 45–49) contrasts Adam and Christ as representative
    heads. Supplying 'man' clarifies the referent in English without adding a doctrinal
    claim beyond the context. It also preserves gender-accurate representative language
    per translation philosophy.
  doctrine_reference: DOCTRINE.md Translation philosophy §§3–4
- issue: Whether οἱ ἐπουράνιοι refers to heavenly beings or people conformed to the
    heavenly man
  chosen_reading: 'Render as human referents: ''those who are heavenly'''
  alternative_readings:
  - the heavenly ones
  rationale: In context Paul is speaking about human resurrection and those who bear
    the image/nature corresponding to the heavenly man, not angels. The chosen rendering
    preserves the anthropological focus without overexpansion.
  doctrine_reference: DOCTRINE.md Affirmations; Translation philosophy §1
