id: 1CO.15.48
reference: 1 Corinthians 15:48
source:
  edition: SBLGNT
  text: οἷος ὁ χοϊκός, τοιοῦτοι καὶ οἱ χοϊκοί, καὶ οἷος ὁ ἐπουράνιος, τοιοῦτοι καὶ
    οἱ ἐπουράνιοι·
translation:
  text: As is the man of dust, so also are those of dust; and as is the heavenly man,
    so also are those who are heavenly.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'Such as the man of dust, such also are those of dust;
      and such as the heavenly man, such also are those who are heavenly.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οἷος ... τοιοῦτοι
  chosen: As is ... so also are ...
  alternatives:
  - such as ... such also are ...
  - like ... so also ...
  lexicon: BDAG
  rationale: The correlative construction expresses correspondence between prototype
    and those who belong to that order. 'As is ... so also are ...' is idiomatic English
    that preserves the parallelism.
- source_word: χοϊκός
  chosen: of dust
  alternatives:
  - dusty
  - earthly
  - made of dust
  lexicon: BDAG
  rationale: The adjective denotes being made from or characterized by dust/earth,
    echoing Adam's origin in the preceding context (v. 47). 'Of dust' preserves the
    Genesis allusion and avoids the awkward English adjective 'dusty,' which could
    suggest mere appearance.
- source_word: ὁ χοϊκός
  chosen: the man of dust
  alternatives:
  - the one of dust
  - the earthy man
  lexicon: BDAG
  rationale: In context Paul contrasts Adamic humanity with the heavenly man. Supplying
    'man' makes the English natural and reflects the representative singular masculine
    without flattening the personal contrast established in the surrounding verses.
- source_word: οἱ χοϊκοί
  chosen: those of dust
  alternatives:
  - the ones of dust
  - the earthy ones
  - those who are of dust
  lexicon: BDAG
  rationale: The plural refers to people who share the dust-man's nature. 'Those of
    dust' is concise, preserves the repeated lexical link with χοϊκός, and avoids
    overinterpreting with 'earthly people'.
- source_word: ἐπουράνιος
  chosen: heavenly
  alternatives:
  - from heaven
  - of heaven
  lexicon: BDAG
  rationale: The adjective means 'heavenly' or 'belonging to heaven.' 'Heavenly' preserves
    the lexical correspondence with χοϊκός as an adjective and matches Paul's contrast.
    'From heaven' would import the wording of v. 47 rather than this verse's adjective.
- source_word: ὁ ἐπουράνιος
  chosen: the heavenly man
  alternatives:
  - the heavenly one
  - the one from heaven
  lexicon: BDAG
  rationale: The singular likely refers to Christ in contrast with Adam in the immediate
    context. 'The heavenly man' keeps the representative-person contrast explicit
    in English and aligns with the supplied 'man' in the first clause.
- source_word: οἱ ἐπουράνιοι
  chosen: those who are heavenly
  alternatives:
  - the heavenly ones
  - those of heaven
  lexicon: BDAG
  rationale: The plural denotes those who share the heavenly man's character or destiny.
    'Those who are heavenly' is natural English and preserves the adjectival force
    without implying angelic beings.
