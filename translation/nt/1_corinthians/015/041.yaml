id: 1CO.15.41
reference: 1 Corinthians 15:41
source:
  edition: SBLGNT
  text: ἄλλη δόξα ἡλίου, καὶ ἄλλη δόξα σελήνης, καὶ ἄλλη δόξα ἀστέρων, ἀστὴρ γὰρ ἀστέρος
    διαφέρει ἐν δόξῃ.
translation:
  text: There is one glory of the sun, and another glory of the moon, and another
    glory of the stars; for star differs from star in glory.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'splendor' or 'brightness' throughout the verse; Greek δόξα can denote
      visible radiance here, though 'glory' preserves Paul's repeated wording in the
      surrounding argument.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄλλη
  chosen: another / one ... another ... another
  alternatives:
  - different
  lexicon: BDAG
  rationale: Repeated ἄλλη marks distinction among kinds or instances. In English,
    the first clause is smoothed to 'one glory' for natural style, while preserving
    the contrastive sequence with 'another ... another.'
- source_word: δόξα
  chosen: glory
  alternatives:
  - splendor
  - brightness
  lexicon: BDAG
  rationale: δόξα here refers to visible splendor or radiance in Paul's analogy. 'Glory'
    preserves the lexical link with the broader resurrection argument and avoids reducing
    the term to merely physical brightness, though that nuance is present.
- source_word: ἡλίου
  chosen: of the sun
  lexicon: BDAG
  rationale: Genitive dependent on δόξα, naturally rendered 'of the sun.'
- source_word: σελήνης
  chosen: of the moon
  lexicon: BDAG
  rationale: Genitive dependent on δόξα, parallel to 'of the sun.'
- source_word: ἀστέρων
  chosen: of the stars
  lexicon: BDAG
  rationale: Plural genitive dependent on δόξα, completing the triad sun/moon/stars.
- source_word: ἀστὴρ ... ἀστέρος
  chosen: star ... star
  lexicon: BDAG
  rationale: 'The singular-to-singular comparison is best preserved directly: ''star
    differs from star.'' This keeps Paul''s point about variation within the same
    category.'
- source_word: γὰρ
  chosen: for
  alternatives:
  - indeed
  - because
  lexicon: BDAG
  rationale: γάρ introduces an explanatory ground for the preceding statement. 'For'
    is concise and natural here.
- source_word: διαφέρει
  chosen: differs
  alternatives:
  - is different
  - surpasses
  lexicon: BDAG
  rationale: The verb denotes distinction or difference. 'Differs' fits the comparative
    construction and avoids importing the stronger idea of superiority, though comparative
    excellence may be implied by context.
- source_word: ἐν δόξῃ
  chosen: in glory
  alternatives:
  - in splendor
  - in brightness
  lexicon: BDAG
  rationale: The prepositional phrase specifies the respect in which one star differs
    from another. 'In glory' preserves the repeated key term δόξα across the verse
    and context.
