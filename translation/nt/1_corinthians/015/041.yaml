theological_decisions:
- issue: Rendering δόξα in a cosmological analogy within the resurrection discourse
  chosen_reading: glory
  alternative_readings:
  - splendor
  - brightness
  rationale: Although the immediate referent is the differing radiance of heavenly
    bodies, Paul uses the same term in the surrounding argument about resurrected
    bodies. Retaining 'glory' preserves that theological and rhetorical continuity
    without overinterpreting the metaphor.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented
    exception)
