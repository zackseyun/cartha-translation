theological_decisions:
- issue: Rendering Χριστός
  chosen_reading: the Messiah
  alternative_readings:
  - Christ
  rationale: The doctrine excerpt directs that Christological titles be translated,
    with Χριστός rendered 'Messiah' where context supports title rather than name-like
    usage. This verse supports titular force within Paul's resurrection argument.
  doctrine_reference: 'DOCTRINE.md: ''Translate titles; transliterate names'' and
    contested terms table for Χριστός'
- issue: Voice of ἐγήγερται
  chosen_reading: has been raised
  alternative_readings:
  - has risen
  rationale: The passive form should be preserved rather than converted to an intransitive
    active, because the Greek form foregrounds resurrection as something done to the
    Messiah, cohering with Paul's usual emphasis on God's act while not importing
    the agent into the text.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it'
