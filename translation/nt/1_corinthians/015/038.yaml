theological_decisions:
- issue: Divine agency and volition in the seed/body analogy
  chosen_reading: The verse is rendered to emphasize that God sovereignly assigns
    the body/form to each seed without importing a broader doctrinal system.
  alternative_readings:
  - A more interpretive rendering could stress 'kind' or 'species' of body more explicitly.
  rationale: Paul's point in context is that bodily form is determined by God's will
    and differs according to what he assigns. The translation preserves this theological
    point while avoiding explanatory additions not stated in the Greek.
  doctrine_reference: Translation philosophy §§1, 3, 5
