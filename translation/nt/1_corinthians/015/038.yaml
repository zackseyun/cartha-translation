id: 1CO.15.38
reference: 1 Corinthians 15:38
source:
  edition: SBLGNT
  text: ὁ δὲ θεὸς ⸂δίδωσιν αὐτῷ⸃ σῶμα καθὼς ἠθέλησεν, καὶ ἑκάστῳ τῶν σπερμάτων ⸀ἴδιον
    σῶμα.
translation:
  text: But God gives it a body as he willed, and to each of the seeds its own body.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to each seed its own body.' The Greek literally says 'to each of the
      seeds,' which may function distributively.
    reason: lexical_alternative
lexical_decisions:
- source_word: δίδωσιν
  chosen: gives
  alternatives:
  - gives to
  - provides
  lexicon: BDAG
  rationale: Present tense is naturally rendered 'gives.' 'Provides' is possible,
    but 'gives' more directly reflects the verb and keeps the agricultural analogy
    vivid.
- source_word: αὐτῷ
  chosen: it
  alternatives:
  - to it
  - to that seed
  lexicon: BDAG
  rationale: Dative singular refers back to the seed in the preceding context. English
    idiom prefers 'gives it a body' rather than the more wooden 'gives to it a body.'
- source_word: σῶμα
  chosen: body
  lexicon: BDAG
  rationale: Standard rendering of σῶμα. In this context it refers to the embodied
    form God assigns in the seed/resurrection analogy; 'body' preserves the lexical
    link with the wider chapter.
- source_word: καθὼς ἠθέλησεν
  chosen: as he willed
  alternatives:
  - as he desired
  - as he chose
  lexicon: BDAG
  rationale: The aorist of θέλω points to God's volition. 'As he willed' is concise
    and preserves the emphasis on divine intention without overinterpreting.
- source_word: ἑκάστῳ τῶν σπερμάτων
  chosen: to each of the seeds
  alternatives:
  - to each seed
  - to each kind of seed
  lexicon: BDAG
  rationale: This reproduces the distributive force of ἑκάστῳ with the partitive genitive.
    'Each seed' is smoother, but 'each of the seeds' more closely reflects the Greek
    wording. 'Kind of seed' is interpretive and not explicit in the text.
- source_word: ἴδιον
  chosen: its own
  alternatives:
  - a distinct
  - proper
  lexicon: BDAG
  rationale: ἴδιον emphasizes what belongs particularly to each seed. 'Its own' is
    the most natural English equivalent and preserves the individualizing force.
