theological_decisions:
- issue: Anthropological sense of ψυχή in the Genesis citation
  chosen_reading: Render ψυχὴν ζῶσαν as 'a living being' rather than 'a living soul.'
  alternative_readings:
  - a living soul
  rationale: The phrase echoes Gen 2:7 and refers to Adam as an animate living creature/person,
    not primarily to a separable immaterial soul. 'Living being' better reflects the
    source sense in contemporary English while avoiding importing a specific anthropology
    the text does not explicitly teach. Because 'living soul' is traditional and theologically
    significant for some readers, it is preserved in a footnote.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Meaning of 'the last Adam became a life-giving spirit'
  chosen_reading: Retain the literal typological contrast without explanatory expansion.
  alternative_readings:
  - the last Adam became the life-giving Spirit
  - the last Adam became a spirit who gives life
  rationale: The Greek lacks the article before πνεῦμα, so the phrase is best rendered
    qualitatively as 'a life-giving spirit,' not as an identification with the Holy
    Spirit as a distinct person. This preserves orthodox Christology and Trinitarian
    doctrine without collapsing Paul's typological contrast into a narrower dogmatic
    formula. An alternative capitalization/identification is worth noting in a footnote
    because some readers may hear an allusion to the Spirit's work.
  doctrine_reference: Affirmations (Nicene Creed; Chalcedon); Translation philosophy
    §3
