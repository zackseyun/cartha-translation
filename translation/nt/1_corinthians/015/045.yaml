id: 1CO.15.45
reference: 1 Corinthians 15:45
source:
  edition: SBLGNT
  text: οὕτως καὶ γέγραπται· Ἐγένετο ὁ πρῶτος ἄνθρωπος Ἀδὰμ εἰς ψυχὴν ζῶσαν· ὁ ἔσχατος
    Ἀδὰμ εἰς πνεῦμα ζῳοποιοῦν.
translation:
  text: 'So also it is written: “The first man, Adam, became a living being”; the
    last Adam became a life-giving spirit.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “a living soul,” echoing the traditional rendering of Genesis 2:7.
    reason: lexical_alternative
  - marker: b
    text: Or “became a spirit who gives life.” The phrase describes the last Adam
      in contrast with the first Adam; the Greek is qualitative, not necessarily an
      explicit identification of Christ with the Holy Spirit as a distinct person.
    reason: alternative_reading
lexical_decisions:
- source_word: οὕτως καὶ γέγραπται
  chosen: So also it is written
  alternatives:
  - Thus also it is written
  - So it is written
  lexicon: BDAG
  rationale: οὕτως with καί introduces the scriptural support for the preceding argument.
    'So also' preserves the inferential force and connection. γέγραπται is a standard
    formula for Scripture citation, best rendered with the English present perfect/passive
    idiom 'it is written.'
- source_word: Ἐγένετο
  chosen: became
  alternatives:
  - came to be
  - was made
  lexicon: BDAG
  rationale: γίνομαι here marks a change or resulting state in the citation/allusion
    to Gen 2:7. 'Became' is idiomatic and preserves the sense better than the more
    wooden 'came to be.'
- source_word: ὁ πρῶτος ἄνθρωπος
  chosen: the first man
  alternatives:
  - the first human
  - the first person
  lexicon: BDAG
  rationale: ἄνθρωπος can mean 'human being,' but here Paul contrasts Adam as the
    representative first man with 'the last Adam.' Per the gender-accurate policy,
    'man' best matches the source's representative and typological force.
- source_word: Ἀδὰμ
  chosen: Adam
  rationale: Personal name is transliterated by standard convention.
- source_word: εἰς ψυχὴν ζῶσαν
  chosen: a living being
  alternatives:
  - a living soul
  - a living creature
  lexicon: BDAG
  rationale: This echoes the LXX of Gen 2:7. ψυχή can be rendered 'soul,' but in this
    creation context it denotes animate life/the living self rather than an immaterial
    component alone. 'Living being' communicates the Hebrew/Greek sense clearly in
    modern English while avoiding misleading anthropological overprecision. The traditional
    alternative 'living soul' is preserved in a footnote because of its familiarity
    and theological significance in some traditions.
- source_word: ὁ ἔσχατος Ἀδὰμ
  chosen: the last Adam
  alternatives:
  - the final Adam
  lexicon: BDAG
  rationale: ἔσχατος here is eschatological and typological. 'Last Adam' is the established
    and accurate rendering, preserving Paul's Adam-Christ contrast. 'Final Adam' is
    possible but less idiomatic.
- source_word: εἰς πνεῦμα ζῳοποιοῦν
  chosen: a life-giving spirit
  alternatives:
  - a spirit giving life
  - a life-making spirit
  lexicon: BDAG
  rationale: πνεῦμα is anarthrous and qualitative here; 'spirit' is the natural rendering.
    ζῳοποιοῦν means 'giving life' or 'making alive.' 'Life-giving spirit' is concise,
    idiomatic, and preserves the qualitative force. The phrase should not be paraphrased
    into a doctrinal explanation; Paul is describing the risen Christ's mode/source
    of life in contrast with Adam.
