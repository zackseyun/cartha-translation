theological_decisions:
- issue: Identity and scope of 'all the apostles' in relation to James
  chosen_reading: Render the phrase straightforwardly as 'all the apostles' without
    narrowing the referent.
  alternative_readings:
  - the Twelve specifically
  - a broader group of commissioned witnesses distinct from the Twelve
  rationale: The Greek text itself does not define the exact membership of this group.
    A translation should preserve the wording without importing a harmonizing interpretation.
    This also allows the distinction between the appearance to James and the subsequent
    appearance to 'all the apostles' to remain as Paul states it.
  doctrine_reference: Preserve theological tension rather than resolve it.
