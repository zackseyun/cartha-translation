id: 1CO.15.7
reference: 1 Corinthians 15:7
source:
  edition: SBLGNT
  text: ἔπειτα ὤφθη Ἰακώβῳ, εἶτα τοῖς ἀποστόλοις πᾶσιν·
translation:
  text: Then he appeared to James, then to all the apostles.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'he was seen by James ... by all the apostles.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔπειτα
  chosen: Then
  alternatives:
  - After that
  lexicon: BDAG
  rationale: Temporal/sequential adverb marking the next event in the resurrection
    appearance list. 'Then' is natural modern English and preserves the sequence.
- source_word: ὤφθη
  chosen: he appeared
  alternatives:
  - he was seen
  lexicon: BDAG
  rationale: Aorist passive of ὁράω used idiomatically for resurrection appearances.
    'He appeared' is standard and clearer in English than the more literal 'he was
    seen,' while preserving the event as an appearance.
- source_word: Ἰακώβῳ
  chosen: to James
  lexicon: BDAG
  rationale: Dative indirect object after ὤφθη. The personal name is transliterated
    per translation philosophy. 'James' is the standard English form of Ἰάκωβος.
- source_word: εἶτα
  chosen: then
  alternatives:
  - next
  lexicon: BDAG
  rationale: A second sequential adverb. Rendering it again as 'then' preserves Paul's
    step-by-step listing without unnecessary stylistic variation.
- source_word: ἀποστόλοις
  chosen: apostles
  alternatives:
  - messengers
  - envoys
  lexicon: BDAG
  rationale: In this context the term refers to recognized apostolic witnesses, not
    generic messengers. 'Apostles' preserves the established technical sense in Paul's
    resurrection-witness list.
- source_word: πᾶσιν
  chosen: all
  alternatives:
  - the whole group of
  lexicon: BDAG
  rationale: Modifier of 'apostles' emphasizing the entirety of the group. 'All the
    apostles' is the most direct and natural rendering.
