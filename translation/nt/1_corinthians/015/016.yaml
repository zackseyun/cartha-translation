id: 1CO.15.16
reference: 1 Corinthians 15:16
source:
  edition: SBLGNT
  text: εἰ γὰρ νεκροὶ οὐκ ἐγείρονται, οὐδὲ Χριστὸς ἐγήγερται·
translation:
  text: For if the dead are not raised, not even the Messiah has been raised.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or: “Christ.” The Greek title Χριστός can be rendered either “Messiah”
      or, by longstanding tradition, “Christ.”'
    reason: alternative_reading
lexical_decisions:
- source_word: εἰ γὰρ
  chosen: For if
  alternatives:
  - If indeed
  - For if indeed
  lexicon: BDAG
  rationale: Renders the conditional particle εἰ with the explanatory γάρ in natural
    English while preserving Paul's argumentative flow from the surrounding context.
- source_word: νεκροὶ
  chosen: the dead
  alternatives:
  - dead people
  - the dead ones
  lexicon: BDAG
  rationale: The plural adjective functions substantivally, referring to dead persons
    generally. 'The dead' is idiomatic, concise, and preserves the categorical force.
- source_word: ἐγείρονται
  chosen: are not raised
  alternatives:
  - are not being raised
  - do not rise
  lexicon: BDAG
  rationale: Passive present is best represented as 'are raised' in this resurrection
    context. 'Do not rise' would shift toward an intransitive nuance, while the passive
    keeps the verbal link with God's act of raising.
- source_word: οὐδὲ
  chosen: not even
  alternatives:
  - nor
  - neither
  lexicon: BDAG
  rationale: 'In this argument Paul intensifies the consequence: if there is no resurrection
    of the dead, then ''not even'' the Messiah has been raised. This captures the
    emphatic force better than a bare ''nor.'''
- source_word: Χριστὸς
  chosen: the Messiah
  alternatives:
  - Christ
  lexicon: BDAG
  rationale: Per project doctrine, Χριστός is translated as 'Messiah' where it functions
    as a title rather than a name-like form. Here the title sense remains clear in
    Paul's theological argument about the anointed one and resurrection.
- source_word: ἐγήγερται
  chosen: has been raised
  alternatives:
  - is raised
  - has risen
  lexicon: BDAG
  rationale: The perfect passive indicates a completed act with abiding result. 'Has
    been raised' preserves both the passive voice and the perfect aspect better than
    'has risen,' which would obscure the passive, or 'is raised,' which weakens the
    completed-result nuance.
