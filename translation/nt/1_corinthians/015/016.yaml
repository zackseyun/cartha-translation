- issue: Rendering Χριστός in a resurrection argument
  chosen_reading: the Messiah
  alternative_readings:
  - Christ
  rationale: The doctrinal guidance directs translating Christological titles rather
    than defaulting to traditional transliteration when context supports title force.
    This verse presents a theological claim about the Messiah's resurrection, so 'the
    Messiah' best preserves meaning while remaining orthodox and transparent.
