id: 1CO.15.9
reference: 1 Corinthians 15:9
source:
  edition: SBLGNT
  text: ἐγὼ γάρ εἰμι ὁ ἐλάχιστος τῶν ἀποστόλων, ὃς οὐκ εἰμὶ ἱκανὸς καλεῖσθαι ἀπόστολος,
    διότι ἐδίωξα τὴν ἐκκλησίαν τοῦ θεοῦ·
translation:
  text: For I am the least of the apostles, who am not worthy to be called an apostle,
    because I persecuted the church of God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'qualified' or 'fit' to be called an apostle.'
    reason: lexical_alternative
lexical_decisions:
- source_word: γάρ
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: BDAG
  rationale: Retains the explanatory connection to the previous verse in natural English.
    'For' is concise and preserves Paul's reasoning.
- source_word: ἐλάχιστος
  chosen: least
  alternatives:
  - smallest
  - lowest
  lexicon: BDAG
  rationale: In context Paul speaks of relative status among the apostles, not physical
    size. 'Least' is the most idiomatic and established English equivalent.
- source_word: ἀπόστολος / ἀποστόλων
  chosen: apostle(s)
  alternatives:
  - messenger(s)
  - delegate(s)
  lexicon: BDAG
  rationale: Here the term refers to the recognized apostolic office/group, not merely
    generic messengers. 'Apostle' preserves the technical ecclesial sense.
- source_word: ἱκανός
  chosen: worthy
  alternatives:
  - fit
  - qualified
  - adequate
  lexicon: BDAG
  rationale: Although ἱκανός can denote sufficiency or qualification, in this self-humbling
    context 'worthy' best captures Paul's moral unfitness in light of his past persecution.
- source_word: καλεῖσθαι
  chosen: to be called
  alternatives:
  - to be named
  - to be designated
  lexicon: BDAG
  rationale: A straightforward passive infinitive rendering that preserves the Greek
    construction and idiomatic English.
- source_word: διότι
  chosen: because
  alternatives:
  - for
  - since
  lexicon: BDAG
  rationale: Introduces the explicit reason for Paul's unworthiness. 'Because' is
    the clearest modern English equivalent.
- source_word: ἐδίωξα
  chosen: I persecuted
  alternatives:
  - I pursued
  - I harassed
  lexicon: BDAG
  rationale: In Pauline usage regarding his former actions against believers, the
    hostile sense 'persecuted' is clearly intended.
- source_word: ἐκκλησίαν τοῦ θεοῦ
  chosen: the church of God
  alternatives:
  - the assembly of God
  - God's church
  lexicon: BDAG
  rationale: ἐκκλησία in Pauline usage commonly denotes the gathered people/community
    of believers. 'The church of God' is both accurate and natural, and preserves
    the genitive construction.
- source_word: ὃς
  chosen: who
  alternatives:
  - I who
  lexicon: BDAG
  rationale: The relative pronoun links Paul's identity as 'least of the apostles'
    with his statement of unworthiness. Simple 'who' is sufficient in English.
