theological_decisions:
- issue: Nature of Paul's statement about apostleship
  chosen_reading: Paul affirms that he truly is an apostle while expressing humility
    about his worthiness to bear the title.
  alternative_readings:
  - Paul denies his apostleship altogether
  - Paul means only that he is socially inferior, not morally unworthy
  rationale: The clause 'I am the least of the apostles' presumes inclusion among
    the apostles, while 'not worthy to be called an apostle' expresses humility grounded
    in his former persecution. The translation should preserve both realities without
    resolving the tension away.
  doctrine_reference: Preserve theological tension rather than resolve it.
