id: 1CO.15.22
reference: 1 Corinthians 15:22
source:
  edition: SBLGNT
  text: ὥσπερ γὰρ ἐν τῷ Ἀδὰμ πάντες ἀποθνῄσκουσιν, οὕτως καὶ ἐν τῷ Χριστῷ πάντες ζῳοποιηθήσονται.
translation:
  text: For just as in Adam all die, so also in the Messiah all will be made alive.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'in Christ.' The Greek title Χριστός can be rendered 'Christ' or translated
      as 'Messiah'; here it is translated for meaning.
    reason: alternative_reading
lexical_decisions:
- source_word: ὥσπερ γὰρ
  chosen: For just as
  alternatives:
  - Just as
  - For as
  lexicon: BDAG
  rationale: Renders the comparative force of ὥσπερ and the explanatory/connecting
    force of γάρ together in natural English. 'For just as' preserves Paul's argumentative
    linkage to the preceding context.
- source_word: ἐν τῷ Ἀδὰμ
  chosen: in Adam
  alternatives:
  - in union with Adam
  - through Adam
  lexicon: BDAG
  rationale: A formally close rendering that preserves Paul's compact representative/corporate
    language without over-interpreting the precise nuance of ἐν. 'Through Adam' would
    shift the relation toward instrumentality; 'in union with Adam' is interpretive.
- source_word: πάντες
  chosen: all
  alternatives:
  - all people
  - everyone
  lexicon: BDAG
  rationale: Keeps the broad, unqualified scope of the Greek and preserves the parallelism
    between the two occurrences of πάντες. 'All people' is possible but slightly more
    expansive than the Greek wording.
- source_word: ἀποθνῄσκουσιν
  chosen: die
  alternatives:
  - are dying
  lexicon: BDAG
  rationale: The present tense here states the general reality or condition associated
    with Adam. English simple present best conveys the gnomic force without awkwardness.
- source_word: οὕτως καὶ
  chosen: so also
  alternatives:
  - so
  - in the same way also
  lexicon: BDAG
  rationale: Preserves the correlative structure with ὥσπερ and the additive force
    of καί in idiomatic English.
- source_word: ἐν τῷ Χριστῷ
  chosen: in the Messiah
  alternatives:
  - in Christ
  lexicon: BDAG
  rationale: Per doctrine, Χριστός is rendered 'Messiah' where functioning as a title.
    Here the phrase is titular and parallel to 'in Adam,' so 'Messiah' preserves the
    meaning of the title rather than defaulting to the traditional transliteration
    'Christ'.
- source_word: ζῳοποιηθήσονται
  chosen: will be made alive
  alternatives:
  - will be given life
  - will be vivified
  lexicon: BDAG
  rationale: The future passive is best represented by 'will be made alive,' which
    preserves both the future orientation and the passive sense of divine action.
    'Will be given life' is possible but less directly tied to the verbal form.
