theological_decisions:
- issue: Scope of 'all' in both clauses
  chosen_reading: Retain the unqualified 'all' in both halves of the verse without
    narrowing or resolving the theological implications in translation.
  alternative_readings:
  - Interpret the second 'all' as all believers only
  - Interpret both occurrences as all humanity in exactly the same sense
  rationale: The Greek text presents a deliberate parallel with πάντες... πάντες and
    does not itself specify the theological mechanism or extent beyond the immediate
    statement. In keeping with the doctrine's instruction to preserve theological
    tension rather than resolve it, the translation leaves 'all' unqualified and avoids
    importing a denominationally specific interpretation.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
