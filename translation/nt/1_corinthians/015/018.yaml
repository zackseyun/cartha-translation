id: 1CO.15.18
reference: 1 Corinthians 15:18
source:
  edition: SBLGNT
  text: ἄρα καὶ οἱ κοιμηθέντες ἐν Χριστῷ ἀπώλοντο.
translation:
  text: Then those also who have fallen asleep in the Messiah have perished.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or: "in Christ."'
    reason: alternative_reading
  - marker: b
    text: '"Fallen asleep" is a Greek euphemism for death, especially of believers.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄρα
  chosen: Then
  alternatives:
  - So
  - Consequently
  - Therefore
  lexicon: BDAG
  rationale: Inferential particle drawing a conclusion from the preceding argument.
    'Then' fits Paul's reductio flow in context and reads naturally in English.
- source_word: καὶ
  chosen: also
  alternatives:
  - even
  - too
  lexicon: BDAG
  rationale: Adds those dead in Christ/Messiah to the consequences being inferred.
    'Also' preserves the additive force without overemphasis.
- source_word: οἱ κοιμηθέντες
  chosen: those who have fallen asleep
  alternatives:
  - those who have died
  - those who sleep
  lexicon: BDAG
  rationale: The participle from κοιμάομαι is a conventional euphemism for death,
    especially among believers. 'Have fallen asleep' preserves the metaphor present
    in the Greek rather than flattening it to 'have died.'
- source_word: ἐν Χριστῷ
  chosen: in the Messiah
  alternatives:
  - in Christ
  lexicon: BDAG
  rationale: Χριστῷ is titular here, not merely name-like, and the project default
    is 'Messiah' where context supports title sense. 'In the Messiah' preserves Paul's
    union-with-Christ language while translating the title.
- source_word: ἀπώλοντο
  chosen: have perished
  alternatives:
  - perished
  - were lost
  - have been destroyed
  lexicon: BDAG
  rationale: Aorist middle of ἀπόλλυμι here expresses ruin/perishing as the consequence
    if there is no resurrection. Present perfect English ('have perished') communicates
    the resulting state in this conditional argument more naturally than simple past.
