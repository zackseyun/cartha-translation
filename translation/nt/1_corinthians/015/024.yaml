theological_decisions:
- issue: Relation of 'God' and 'Father' in τῷ θεῷ καὶ πατρί
  chosen_reading: 'Appositional: ''God the Father'''
  alternative_readings:
  - 'Coordinated: ''to God and Father'''
  rationale: The Greek can be rendered more literally, but in context Paul refers
    to the Father as the one to whom the Son hands over the kingdom. 'God the Father'
    is the clearest English expression and does not diminish the Son's deity; it reflects
    standard Pauline usage.
  doctrine_reference: 'Affirmations: Nicene Creed (381 AD), including the homoousios
    language'
- issue: Force of καταργήσῃ regarding hostile powers
  chosen_reading: Decisive abolition/nullification rather than necessarily annihilation
  alternative_readings:
  - destroy in the sense of total annihilation
  - render ineffective
  rationale: The verb indicates the ending or nullifying of the operative status of
    all opposing rule, authority, and power. 'Abolishes' preserves the text's force
    while avoiding speculative claims about the metaphysical fate of these powers.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it'
