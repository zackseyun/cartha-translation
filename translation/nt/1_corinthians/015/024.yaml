id: 1CO.15.24
reference: 1 Corinthians 15:24
source:
  edition: SBLGNT
  text: εἶτα τὸ τέλος, ὅταν ⸀παραδιδῷ τὴν βασιλείαν τῷ θεῷ καὶ πατρί, ὅταν καταργήσῃ
    πᾶσαν ἀρχὴν καὶ πᾶσαν ἐξουσίαν καὶ δύναμιν,
translation:
  text: Then comes the end, when he hands over the kingdom to God the Father, when
    he abolishes every ruler and every authority and power.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the consummation.' The Greek τέλος can mean 'end,' 'goal,' or 'consummation.'
    reason: lexical_alternative
  - marker: b
    text: Or 'when he delivers up the kingdom to God and Father.'
    reason: lexical_alternative
  - marker: c
    text: Or 'when he nullifies' or 'brings to nothing' every ruler and every authority
      and power.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἶτα
  chosen: Then
  alternatives:
  - After that
  - Next
  lexicon: BDAG
  rationale: Marks the next stage in Paul's resurrection sequence. 'Then' is concise
    and natural in English while preserving the temporal progression.
- source_word: τὸ τέλος
  chosen: the end
  alternatives:
  - the consummation
  - the goal
  lexicon: BDAG
  rationale: τέλος can mean end, goal, or consummation. In this eschatological sequence,
    'the end' best preserves the straightforward temporal sense without overinterpreting.
- source_word: ὅταν παραδιδῷ
  chosen: when he hands over
  alternatives:
  - when he delivers up
  - when he gives over
  lexicon: BDAG
  rationale: The present subjunctive with ὅταν indicates a future event contingent
    in time. 'Hands over' is idiomatic modern English and preserves the sense of transferring
    rule or charge.
- source_word: τὴν βασιλείαν
  chosen: the kingdom
  alternatives:
  - the reign
  - the kingship
  lexicon: BDAG
  rationale: βασιλεία can denote reign or kingdom. Here 'the kingdom' is the most
    natural rendering and fits the imagery of handing over royal rule, while not excluding
    the dynamic sense of reign.
- source_word: τῷ θεῷ καὶ πατρί
  chosen: to God the Father
  alternatives:
  - to God and Father
  - to the God and Father
  lexicon: BDAG
  rationale: 'The construction is commonly understood appositionally: God, namely
    the Father. ''God the Father'' is clear modern English and avoids the awkwardness
    of a more literal but less natural rendering.'
- source_word: ὅταν καταργήσῃ
  chosen: when he abolishes
  alternatives:
  - when he destroys
  - when he nullifies
  - when he brings to nothing
  lexicon: BDAG
  rationale: καταργέω often means to render ineffective, abolish, or nullify. In this
    context of subduing hostile powers, 'abolishes' captures decisive termination
    without importing annihilation beyond the verb's scope.
- source_word: πᾶσαν ἀρχὴν
  chosen: every ruler
  alternatives:
  - every rule
  - every principality
  - every first power
  lexicon: BDAG
  rationale: ἀρχή here likely refers not to the abstract concept of rule but to ruling
    powers or rulers in a list with ἐξουσία and δύναμις. 'Every ruler' makes the personal
    or institutional force clear in contemporary English.
- source_word: πᾶσαν ἐξουσίαν
  chosen: every authority
  alternatives:
  - every jurisdiction
  - every dominion
  lexicon: BDAG
  rationale: ἐξουσία commonly denotes delegated or exercised authority. 'Authority'
    is the standard and clearest rendering.
- source_word: δύναμιν
  chosen: power
  alternatives:
  - might
  - force
  lexicon: BDAG
  rationale: δύναμις here belongs to a triad of hostile powers. 'Power' is the broadest
    and most idiomatic English equivalent.
