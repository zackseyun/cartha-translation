id: 1CO.15.23
reference: 1 Corinthians 15:23
source:
  edition: SBLGNT
  text: ἕκαστος δὲ ἐν τῷ ἰδίῳ τάγματι· ἀπαρχὴ Χριστός, ἔπειτα οἱ τοῦ Χριστοῦ ἐν τῇ
    παρουσίᾳ αὐτοῦ·
translation:
  text: 'But each in his own order: the Messiah as firstfruits, then those who belong
    to the Messiah at his coming.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Christ' for 'the Messiah' (Χριστός). The Greek title means 'Anointed
      One.'
    reason: alternative_reading
  - marker: b
    text: Or 'presence' or 'arrival' for 'coming' (παρουσία), though in this context
      it refers to his future advent.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἕκαστος
  chosen: each
  alternatives:
  - each one
  - every person
  lexicon: BDAG
  rationale: Indefinite distributive adjective referring back to the sequence of resurrection
    in the preceding context. 'Each' is concise and natural in English.
- source_word: ἐν τῷ ἰδίῳ τάγματι
  chosen: in his own order
  alternatives:
  - in his own rank
  - in his own sequence
  lexicon: BDAG
  rationale: τάγμα can denote an ordered arrangement, rank, or appointed order. Here
    the context is the sequence of resurrection events, so 'order' best captures the
    sense without over-militarizing the term. 'His own' reflects the masculine singular
    form tied to ἕκαστος and follows the project's gender-accurate policy.
- source_word: ἀπαρχὴ
  chosen: firstfruits
  alternatives:
  - first portion
  - first offering
  lexicon: BDAG
  rationale: A theologically loaded cultic term evoking the first portion of a harvest
    offered to God and implying what follows. 'Firstfruits' preserves the biblical
    imagery and intertextual resonance.
- source_word: Χριστός
  chosen: the Messiah
  alternatives:
  - Christ
  lexicon: BDAG
  rationale: Used here as a title rather than a name-like form, and the doctrine guidance
    specifies 'Messiah' where title/context supports. The anarthrous predicate-like
    construction still clearly identifies Jesus in his messianic role.
- source_word: οἱ τοῦ Χριστοῦ
  chosen: those who belong to the Messiah
  alternatives:
  - those of the Messiah
  - the Messiah's people
  lexicon: BDAG
  rationale: The genitive denotes belonging or possession. 'Those who belong to the
    Messiah' is clear modern English and preserves the relational force.
- source_word: παρουσίᾳ
  chosen: coming
  alternatives:
  - presence
  - arrival
  lexicon: BDAG
  rationale: In Pauline eschatological usage, παρουσία commonly refers to the Messiah's
    future advent. 'Coming' is the standard accessible rendering and best fits the
    temporal sequence in the verse.
