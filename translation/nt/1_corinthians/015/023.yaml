theological_decisions:
- issue: Rendering Χριστός in a verse where it functions as a title with eschatological
    significance
  chosen_reading: the Messiah
  alternative_readings:
  - Christ
  rationale: The project's contested-terms guidance prefers 'Messiah' where Χριστός
    functions as a title rather than a name-like designation. In this verse Paul contrasts
    the Messiah and those who belong to him within the resurrection order, so the
    titular sense is prominent.
  doctrine_reference: 'DOCTRINE.md: Contested terms — Χριστός → Messiah (where title;
    Christ where name-like)'
- issue: Whether παρουσία should be rendered with a more technical eschatological
    term
  chosen_reading: coming
  alternative_readings:
  - presence
  - arrival
  rationale: The verse speaks of the future event at which those belonging to the
    Messiah are raised. 'Coming' communicates the eschatological event clearly without
    importing extra doctrinal specificity beyond the Greek.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it'
