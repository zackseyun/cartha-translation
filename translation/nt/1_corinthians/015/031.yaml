id: 1CO.15.31
reference: 1 Corinthians 15:31
source:
  edition: SBLGNT
  text: καθ’ ἡμέραν ἀποθνῄσκω, νὴ τὴν ὑμετέραν ⸀καύχησιν, ἣν ἔχω ἐν Χριστῷ Ἰησοῦ τῷ
    κυρίῳ ἡμῶν.
translation:
  text: I die every day—by the boasting about you that I have in Messiah Jesus our
    Lord.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'daily I die.'
    reason: lexical_alternative
  - marker: b
    text: Or 'as surely as the boasting I have in you' or 'by your boasting'; the
      Greek expression is oath-like and the phrase about boasting is syntactically
      debated.
    reason: alternative_reading
  - marker: c
    text: 'Traditional rendering: ''Christ Jesus.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: καθ’ ἡμέραν
  chosen: every day
  alternatives:
  - daily
  - day by day
  lexicon: BDAG
  rationale: Idiomatic accusative expression meaning 'each day' or 'daily.' 'Every
    day' is natural modern English and preserves the iterative force.
- source_word: ἀποθνῄσκω
  chosen: I die
  alternatives:
  - I am dying
  - I face death
  lexicon: BDAG
  rationale: Present active indicative first singular. The literal 'I die' best preserves
    Paul's vivid rhetorical expression; 'I face death' is interpretive and better
    left as an alternative nuance.
- source_word: νὴ
  chosen: by
  alternatives:
  - surely by
  - as surely as
  lexicon: BDAG
  rationale: Particle used in asseveration/oath formulas. In English, 'by' naturally
    introduces the object sworn by. The stronger paraphrastic force is preserved in
    alternatives/footnote rather than expanded in the main text.
- source_word: τὴν ὑμετέραν καύχησιν
  chosen: the boasting about you
  alternatives:
  - your boasting
  - my boasting in you
  - the pride I have in you
  lexicon: BDAG
  rationale: 'καύχησις can mean ''boasting'' or ''ground of boasting.'' With ὑμετέραν,
    the phrase is syntactically ambiguous: it may mean boasting belonging to the Corinthians
    or Paul''s boasting concerning them. Given the relative clause ''which I have,''
    the sense is best taken as Paul''s boasting about them, not their own boasting.
    ''Boasting'' preserves the lexical connection to Pauline usage better than the
    softer ''pride.'''
- source_word: ἣν ἔχω
  chosen: that I have
  alternatives:
  - which I possess
  lexicon: BDAG
  rationale: Straightforward relative clause; 'that I have' is idiomatic and clear.
- source_word: ἐν Χριστῷ Ἰησοῦ
  chosen: in Messiah Jesus
  alternatives:
  - in Christ Jesus
  lexicon: BDAG
  rationale: Χριστῷ is a title here rather than a mere name-like element, so 'Messiah'
    follows the project's default for Χριστός where title sense is active. 'In' is
    retained as theologically important Pauline union language.
- source_word: τῷ κυρίῳ ἡμῶν
  chosen: our Lord
  alternatives: []
  lexicon: BDAG
  rationale: κύριος is rendered by the project's default 'Lord.' The possessive ἡμῶν
    is naturally attached as 'our Lord.'
