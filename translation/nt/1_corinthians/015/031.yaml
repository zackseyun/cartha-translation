theological_decisions:
- issue: Rendering Χριστῷ as title or name-like form
  chosen_reading: Messiah Jesus
  alternative_readings:
  - Christ Jesus
  rationale: The phrase retains clear titular force in Pauline usage, and the doctrine
    guidelines prefer translating Χριστός as 'Messiah' where context supports title
    sense. The traditional 'Christ Jesus' is preserved as an alternative.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; Contested
    terms table for Χριστός'
- issue: Sense of καύχησις with ὑμετέραν
  chosen_reading: Paul's boasting about the Corinthians
  alternative_readings:
  - the Corinthians' own boasting
  rationale: The relative clause 'which I have' strongly favors understanding the
    boasting as something Paul possesses concerning them. This avoids importing a
    rebuke of Corinthian self-boasting into a context where Paul is making an oath-like
    affirmation.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it; document ambiguity per verse'
