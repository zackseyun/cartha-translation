id: 1CO.15.3
reference: 1 Corinthians 15:3
source:
  edition: SBLGNT
  text: Παρέδωκα γὰρ ὑμῖν ἐν πρώτοις, ὃ καὶ παρέλαβον, ὅτι Χριστὸς ἀπέθανεν ὑπὲρ τῶν
    ἁμαρτιῶν ἡμῶν κατὰ τὰς γραφάς,
translation:
  text: 'For I delivered to you as of first importance what I also received: that
    the Messiah died for our sins according to the Scriptures,'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Christ died for our sins.' The Greek title Χριστός can be rendered 'Messiah'
      when its titular sense is prominent.
    reason: alternative_reading
  - marker: b
    text: Or 'in accordance with the Scriptures.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Παρέδωκα
  chosen: I delivered
  alternatives:
  - I handed on
  - I passed on
  lexicon: BDAG
  rationale: παραδίδωμι here refers to transmitting received tradition or teaching.
    'Delivered' is formal and idiomatic in this context, while preserving the sense
    of authoritative transmission. 'Passed on' is possible but slightly less weighty.
- source_word: γὰρ
  chosen: For
  alternatives:
  - because
  - now
  lexicon: BDAG
  rationale: γάρ introduces an explanation of the preceding statement; 'For' best
    preserves the connective force in readable English.
- source_word: ἐν πρώτοις
  chosen: as of first importance
  alternatives:
  - among the first things
  - first of all
  lexicon: BDAG
  rationale: The phrase is idiomatic and in this context most naturally conveys priority
    of importance within the apostolic message, not merely temporal sequence. 'As
    of first importance' is standard and accurate.
- source_word: ὃ καὶ παρέλαβον
  chosen: what I also received
  alternatives:
  - which I also received
  lexicon: BDAG
  rationale: The relative pronoun refers to the content Paul transmitted. 'What I
    also received' is natural English and preserves the parallel with 'I delivered.'
- source_word: ὅτι
  chosen: that
  alternatives:
  - namely that
  lexicon: BDAG
  rationale: Introduces the content of what Paul received and delivered; simple 'that'
    is sufficient.
- source_word: Χριστὸς
  chosen: the Messiah
  alternatives:
  - Christ
  lexicon: BDAG
  rationale: Per doctrine guidance, Χριστός is translated as 'Messiah' where it functions
    as a title rather than a name-like form. Here it introduces the confessional content
    and retains titular force.
- source_word: ἀπέθανεν
  chosen: died
  alternatives:
  - has died
  lexicon: BDAG
  rationale: Aorist indicative is best rendered with simple past in this narrative-confessional
    summary.
- source_word: ὑπὲρ τῶν ἁμαρτιῶν ἡμῶν
  chosen: for our sins
  alternatives:
  - on behalf of our sins
  - because of our sins
  lexicon: BDAG
  rationale: ὑπέρ with genitive commonly means 'for, on behalf of.' In this salvific
    context, 'for our sins' is the most natural and established rendering without
    over-specifying a theory of atonement.
- source_word: κατὰ τὰς γραφάς
  chosen: according to the Scriptures
  alternatives:
  - in accordance with the Scriptures
  lexicon: BDAG
  rationale: κατά here expresses conformity with or correspondence to Scripture. 'According
    to the Scriptures' is clear, idiomatic, and preserves the plural γραφάς.
