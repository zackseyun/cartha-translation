theological_decisions:
- issue: Rendering of Χριστός
  chosen_reading: the Messiah
  alternative_readings:
  - Christ
  rationale: The term functions as a title in this creedal summary, and the project's
    default is to translate Χριστός as 'Messiah' where title force is present. This
    preserves the Jewish-messianic sense without denying traditional Christological
    meaning.
  doctrine_reference: 'DOCTRINE.md: Contested terms table; ''Χριστός Christos → Messiah
    (where title; Christ where name-like)''.'
- issue: Force of ὑπὲρ τῶν ἁμαρτιῶν ἡμῶν
  chosen_reading: for our sins
  alternative_readings:
  - on behalf of our sins
  - because of our sins
  rationale: The phrase is rendered in a way that preserves the text's soteriological
    claim while not importing a narrower atonement model than the Greek itself states.
    'For our sins' keeps the theological tension broad and traditional.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it.'
