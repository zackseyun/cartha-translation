theological_decisions:
- issue: Rendering of Χριστός
  chosen_reading: the Messiah
  alternative_readings:
  - Christ
  rationale: The translation philosophy directs that Christological titles be translated
    rather than transliterated where context supports title force. In this verse Χριστός
    functions as a title in Paul's resurrection argument, so 'Messiah' is preferred.
  doctrine_reference: 'DOCTRINE.md: Contested terms table, Χριστός → Messiah (where
    title; Christ where name-like)'
- issue: Force of κατὰ τοῦ θεοῦ
  chosen_reading: against God
  alternative_readings:
  - concerning God
  rationale: This is not a doctrinal embellishment but an interpretive decision with
    theological implications. Paul's point is that denying resurrection would make
    the apostles false witnesses in opposition to God, because they attributed to
    God an act he did not do. The stronger adversative sense best preserves the argument's
    severity.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it; original-language primacy'
