id: 1CO.15.15
reference: 1 Corinthians 15:15
source:
  edition: SBLGNT
  text: εὑρισκόμεθα δὲ καὶ ψευδομάρτυρες τοῦ θεοῦ, ὅτι ἐμαρτυρήσαμεν κατὰ τοῦ θεοῦ
    ὅτι ἤγειρεν τὸν Χριστόν, ὃν οὐκ ἤγειρεν εἴπερ ἄρα νεκροὶ οὐκ ἐγείρονται.
translation:
  text: Then we are even found to be false witnesses of God, because we testified
    against God that he raised the Messiah, whom he did not raise if in fact the dead
    are not raised.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'false witnesses about God.' The Greek genitive in 'false witnesses of
      God' can be understood as testimony concerning God, though the following phrase
      'against God' supports the stronger sense in the main text.
    reason: lexical_alternative
  - marker: b
    text: Greek 'Christ'; rendered 'Messiah' here because Χριστός functions as a title
      rather than a name-like form in this context.
    reason: alternative_reading
lexical_decisions:
- source_word: εὑρισκόμεθα
  chosen: we are found
  alternatives:
  - we are discovered
  - we prove to be
  lexicon: BDAG
  rationale: Passive present indicates resultant status or being shown to be something;
    'are found' preserves the Greek idiom while remaining natural English.
- source_word: δὲ καὶ
  chosen: Then ... even
  alternatives:
  - and indeed
  - but also
  lexicon: BDAG
  rationale: The combination heightens Paul's inference in the argument. 'Then' captures
    the logical consequence from the prior claim, and 'even' preserves the emphatic
    additive force of καὶ.
- source_word: ψευδομάρτυρες
  chosen: false witnesses
  alternatives:
  - lying witnesses
  lexicon: BDAG
  rationale: Standard and precise rendering of the compound noun; it denotes those
    who bear false testimony.
- source_word: τοῦ θεοῦ
  chosen: of God
  alternatives:
  - about God
  - belonging to God
  lexicon: BDAG
  rationale: 'With ψευδομάρτυρες, the genitive is most naturally taken as reference/object:
    false witnesses concerning God or in relation to God. ''Of God'' is concise and
    preserves the Greek form, while the following clause clarifies the sense.'
- source_word: ἐμαρτυρήσαμεν
  chosen: we testified
  alternatives:
  - we bore witness
  lexicon: BDAG
  rationale: Aorist refers to the apostolic witness already given. 'Testified' is
    idiomatic modern English and retains forensic/witness connotations.
- source_word: κατὰ τοῦ θεοῦ
  chosen: against God
  alternatives:
  - concerning God
  lexicon: BDAG
  rationale: κατά with the genitive commonly means 'against.' In context Paul argues
    that if the resurrection is false, their testimony places them in opposition to
    God by attributing to him an act he did not do. This stronger rendering best fits
    the logic.
- source_word: ἤγειρεν
  chosen: he raised
  alternatives:
  - he has raised
  lexicon: BDAG
  rationale: Aorist active is best rendered as simple past in this argumentative context.
- source_word: τὸν Χριστόν
  chosen: the Messiah
  alternatives:
  - Christ
  lexicon: BDAG
  rationale: Per doctrine, Χριστός is translated as 'Messiah' where functioning as
    a title. Here the article and argumentative context support title usage rather
    than a name-like use.
- source_word: ὃν οὐκ ἤγειρεν
  chosen: whom he did not raise
  alternatives:
  - whom he has not raised
  lexicon: BDAG
  rationale: Maintains the relative clause structure and mirrors the prior verb for
    rhetorical force.
- source_word: εἴπερ ἄρα
  chosen: if in fact
  alternatives:
  - if indeed then
  - if really
  lexicon: BDAG
  rationale: The combination marks a conditional premise assumed for argument's sake.
    'If in fact' communicates the argumentative force without awkwardness.
- source_word: νεκροὶ
  chosen: the dead
  alternatives:
  - dead people
  lexicon: BDAG
  rationale: Substantival adjective referring to dead persons generally; 'the dead'
    is idiomatic and suitably weighty.
- source_word: οὐκ ἐγείρονται
  chosen: are not raised
  alternatives:
  - are not being raised
  - do not rise
  lexicon: BDAG
  rationale: 'Present passive fits the general proposition under dispute: the dead
    are not raised. Passive preserves the theological emphasis on resurrection as
    an act done to the dead.'
