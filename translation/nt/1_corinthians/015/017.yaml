theological_decisions:
- issue: Resurrection wording and agency
  chosen_reading: has not been raised
  alternative_readings:
  - has not risen
  rationale: The Greek perfect ἐγήγερται supports a passive-style rendering that preserves
    Paul's usual resurrection idiom and avoids obscuring the implied divine agency.
    This is a translational rather than doctrinal expansion, since the agent is not
    explicitly stated.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; preserve what the Greek says without importing more.'
- issue: Rendering Χριστός
  chosen_reading: the Messiah
  alternative_readings:
  - Christ
  rationale: DOCTRINE.md directs that Χριστός be translated as 'Messiah' where it
    functions as a title. Here Paul is making a theological claim about the anointed
    one's resurrection, so the titular sense is appropriate.
  doctrine_reference: 'Contested terms table: Χριστός → Messiah (where title; Christ
    where name-like)'
