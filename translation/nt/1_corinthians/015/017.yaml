id: 1CO.15.17
reference: 1 Corinthians 15:17
source:
  edition: SBLGNT
  text: εἰ δὲ Χριστὸς οὐκ ἐγήγερται, ματαία ἡ πίστις ⸀ὑμῶν, ἔτι ἐστὲ ἐν ταῖς ἁμαρτίαις
    ὑμῶν.
translation:
  text: But if the Messiah has not been raised, your faith is futile; you are still
    in your sins.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Christ has not been raised.'
    reason: alternative_reading
  - marker: b
    text: Or, 'your faith is vain.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Χριστὸς
  chosen: the Messiah
  alternatives:
  - Christ
  lexicon: BDAG
  rationale: Used as a title rather than a name-like form in keeping with the project's
    default for Χριστός. The context is theological and messianic rather than merely
    titular by tradition.
- source_word: ἐγήγερται
  chosen: has not been raised
  alternatives:
  - has not risen
  - has not been resurrected
  lexicon: BDAG
  rationale: Perfect passive/middle form of ἐγείρω is best rendered with an English
    perfect passive here, emphasizing the present consequence of the resurrection
    event. 'Been raised' also preserves the common Pauline divine-passive nuance without
    making God explicit beyond the Greek.
- source_word: ματαία
  chosen: futile
  alternatives:
  - vain
  - useless
  - empty
  lexicon: BDAG
  rationale: '''Futile'' communicates ineffectiveness and pointlessness in clear modern
    English. ''Vain'' is traditional but more archaic/ambiguous for contemporary readers.'
- source_word: πίστις
  chosen: faith
  alternatives:
  - trust
  - faithfulness
  lexicon: BDAG
  rationale: Per project default, πίστις is rendered 'faith.' In this context it refers
    to the Corinthians' believing response, not primarily their faithfulness. Alternatives
    are noted for lexical transparency, though the phrase is not one of the major
    contested constructions like pistis Christou.
- source_word: ἔτι
  chosen: still
  alternatives:
  - yet
  - even now
  lexicon: BDAG
  rationale: Still naturally conveys continued state/result in idiomatic English and
    fits Paul's argument about the ongoing condition if Christ has not been raised.
- source_word: ἐν ταῖς ἁμαρτίαις ὑμῶν
  chosen: in your sins
  alternatives:
  - under your sins
  - in the sphere of your sins
  lexicon: BDAG
  rationale: The prepositional phrase is retained fairly literally as 'in your sins,'
    a well-established and accurate English expression for remaining under the condition
    and guilt/power associated with sin.
- source_word: δὲ
  chosen: But
  alternatives:
  - Now
  - And
  lexicon: BDAG
  rationale: Marks contrast with the preceding argument. 'But' best captures the adversative
    force in context.
