- issue: Rendering of σάρξ in a Pauline passage
  chosen_reading: literal 'flesh'
  alternative_readings:
  - body
  - nature
  rationale: Per doctrine guidance, σάρξ should be rendered 'flesh' when literal and
    'sinful nature' only when metaphorical. Here the context is resurrection and varieties
    of created bodily life, so the literal sense is required.
