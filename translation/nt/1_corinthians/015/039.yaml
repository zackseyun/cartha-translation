id: 1CO.15.39
reference: 1 Corinthians 15:39
source:
  edition: SBLGNT
  text: οὐ πᾶσα σὰρξ ἡ αὐτὴ σάρξ, ἀλλὰ ἄλλη μὲν ἀνθρώπων, ἄλλη δὲ σὰρξ κτηνῶν, ἄλλη δὲ ⸂σὰρξ πτηνῶν⸃, ἄλλη δὲ ⸀ἰχθύων.
translation:
  text: Not all flesh is the same flesh, but one flesh is of humans, another flesh of animals, another flesh of birds, and another of fish.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, 'Not every kind of flesh is the same.'
    reason: lexical_alternative
  - marker: b
    text: Or 'one kind is that of humans, another flesh of animals, another flesh of birds, and another of fish.'.
    reason: previous_rendering
lexical_decisions:
- source_word: σὰρξ
  chosen: flesh
  alternatives:
  - body
  - kind
  lexicon: BDAG
  rationale: The term is used literally here in a discussion of differing created bodily forms, not metaphorically for sinful nature. The repeated use of 'flesh' preserves Paul's lexical repetition and the contrast among living creatures.
- source_word: οὐ πᾶσα σὰρξ ἡ αὐτὴ σάρξ
  chosen: Not all flesh is the same flesh
  alternatives:
  - All flesh is not the same flesh
  - Not every kind of flesh is the same
  lexicon: BDAG
  rationale: This rendering preserves the Greek emphasis and repetition while using natural English. 'Not all flesh is the same flesh' best reflects the categorical distinction Paul is making.
- source_word: ἄλλη
  chosen: another
  alternatives:
  - different
  - one kind ... another
  lexicon: BDAG
  rationale: ἄλλη marks distinction by category. In English, repeating 'another' preserves the rhetorical pattern, while the first occurrence is slightly expanded in the full sentence as 'one kind is that of humans' for readability.
- source_word: ἀνθρώπων
  chosen: humans
  alternatives:
  - men
  - people
  lexicon: BDAG
  rationale: The genitive refers to human beings generally, not specifically males. 'Humans' is gender-accurate and fits the contrast with animals, birds, and fish.
- source_word: κτηνῶν
  chosen: animals
  alternatives:
  - beasts
  - livestock
  lexicon: BDAG
  rationale: κτῆνος can denote domesticated animals or beasts more broadly. In this list of creature categories, 'animals' is the clearest natural English rendering without implying only wild beasts or only livestock.
- source_word: πτηνῶν
  chosen: birds
  alternatives:
  - flying creatures
  - winged creatures
  lexicon: BDAG
  rationale: Though the Greek term can broadly denote flying creatures, 'birds' is the most idiomatic and contextually appropriate category in English for this creature list.
- source_word: ἰχθύων
  chosen: fish
  alternatives:
  - fishes
  lexicon: BDAG
  rationale: '''Fish'' is standard modern English for the category and matches the generic sense of the Greek genitive plural.'
- source_word: σὰρξ κτηνῶν / σὰρξ πτηνῶν / ἰχθύων
  chosen: flesh of animals ... flesh of birds ... of fish
  alternatives:
  - that of animals ... that of birds ... that of fish
  lexicon: BDAG
  rationale: The Greek explicitly repeats σὰρξ with animals and birds but not with fish in the final phrase. The English keeps much of the repetition while allowing a slightly smoother final clause, where 'another of fish' naturally carries over 'flesh' from the prior pattern.
