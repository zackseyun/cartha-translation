theological_decisions:
- issue: Rendering of σάρξ in a Pauline passage
  chosen_reading: literal 'flesh'
  alternative_readings:
  - body
  - nature
  rationale: Per doctrine guidance, σάρξ should be rendered 'flesh' when literal and 'sinful nature' only when metaphorical. Here the context is resurrection and varieties of created bodily life, so the literal sense is required.
  doctrine_reference: 'DOCTRINE.md Contested terms: σάρξ = flesh (literal) / sinful nature (metaphorical)'
revisions:
- timestamp: '2026-04-21T01:05:48Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/nt/1_corinthians/015/039.json
  category: awkward_english
  tier: 1
  from: one kind is that of humans, another flesh of animals, another flesh of birds, and another of fish.
  to: one flesh is of humans, another flesh of animals, another flesh of birds, and another of fish.
  rationale: The current rendering creates a slight grammatical awkwardness by starting the list with a full clause ('one kind is...') and continuing with noun phrases ('another flesh...'). This non-parallel structure can feel disjointed. The suggested rewrite makes the list items grammatically parallel ('one flesh is..., another flesh of...'), which improves the rhythm and clarity in English. While this makes the implied 'flesh' explicit in the first and last items, the gain in structural parallelism is a worthwhile trade-off under an optimal-equivalence philosophy, as it better conveys the rhetorical force of Paul's categorical list.
