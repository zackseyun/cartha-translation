id: 1CO.15.53
reference: 1 Corinthians 15:53
source:
  edition: SBLGNT
  text: δεῖ γὰρ τὸ φθαρτὸν τοῦτο ἐνδύσασθαι ἀφθαρσίαν καὶ τὸ θνητὸν τοῦτο ἐνδύσασθαι
    ἀθανασίαν.
translation:
  text: For this perishable body must put on imperishability, and this mortal body
    must put on immortality.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'this perishable must put on imperishability, and this
      mortal must put on immortality.' The Greek does not explicitly repeat the word
      'body' in this verse, though the context makes the bodily referent clear.
    reason: lexical_alternative
lexical_decisions:
- source_word: δεῖ
  chosen: must
  alternatives:
  - is necessary
  - has to
  lexicon: BDAG
  rationale: Conveys necessity/inevitability more naturally and forcefully than 'is
    necessary' in English, fitting Paul's argument about the required transformation
    at resurrection.
- source_word: γὰρ
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: BDAG
  rationale: Retains the explanatory connection to the previous verse in a natural
    formal way.
- source_word: τὸ φθαρτὸν τοῦτο
  chosen: this perishable body
  alternatives:
  - this perishable thing
  - this corruptible
  - this which is perishable
  lexicon: BDAG
  rationale: φθαρτός means subject to decay/corruption. 'Perishable' is clear modern
    English. 'Body' is supplied because the immediate context concerns bodily resurrection
    and the English otherwise sounds abstract; this makes explicit what is implicit
    in the neuter substantive adjective.
- source_word: ἐνδύσασθαι
  chosen: put on
  alternatives:
  - be clothed with
  - clothe itself with
  lexicon: BDAG
  rationale: Preserves the clothing metaphor in accessible English. 'Put on' is idiomatic
    and keeps the metaphorical force without sounding archaic.
- source_word: ἀφθαρσίαν
  chosen: imperishability
  alternatives:
  - incorruption
  - incorruptibility
  lexicon: BDAG
  rationale: Matches φθαρτός/ἀφθαρσία by preserving the perishability contrast in
    contemporary English. 'Incorruption' is traditional but less natural for modern
    readers.
- source_word: καὶ
  chosen: and
  lexicon: BDAG
  rationale: Simple coordinating conjunction linking the parallel clauses.
- source_word: τὸ θνητὸν τοῦτο
  chosen: this mortal body
  alternatives:
  - this mortal thing
  - this which is mortal
  lexicon: BDAG
  rationale: θνητός means subject to death. 'Mortal' is the standard concise rendering.
    'Body' is again supplied from context for clarity and parallelism with the first
    clause.
- source_word: ἀθανασίαν
  chosen: immortality
  alternatives:
  - deathlessness
  lexicon: BDAG
  rationale: Standard and accurate rendering for the state of not being subject to
    death, and it pairs naturally with 'mortal.'
