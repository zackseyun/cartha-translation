theological_decisions:
- issue: Supplying 'body' in both clauses though σώμα does not appear in this verse
  chosen_reading: Explicitly render the substantival adjectives as 'this perishable
    body' and 'this mortal body'
  alternative_readings:
  - this perishable must put on imperishability, and this mortal must put on immortality
  - this perishable thing... this mortal thing...
  rationale: The immediate context (vv. 42–54) is explicitly about the resurrection/transformation
    of the body. Supplying 'body' in English clarifies the referent without adding
    a new doctrinal claim, and avoids an awkward abstract phrasing that could obscure
    Paul's meaning.
  doctrine_reference: Translation philosophy §6; §1
