id: 1CO.15.14
reference: 1 Corinthians 15:14
source:
  edition: SBLGNT
  text: εἰ δὲ Χριστὸς οὐκ ἐγήγερται, κενὸν ⸀ἄρα τὸ κήρυγμα ἡμῶν, ⸀κενὴ καὶ ἡ πίστις
    ⸀ὑμῶν,
translation:
  text: And if the Messiah has not been raised, then our proclamation is empty, and
    your faith is empty.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''Christ'' for ''the Messiah'' (Greek: Christos).'
    reason: alternative_reading
  - marker: b
    text: Or 'vain' instead of 'empty' in both occurrences of kenos.
    reason: lexical_alternative
  - marker: c
    text: Or 'your trust' for 'your faith.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Χριστὸς
  chosen: the Messiah
  alternatives:
  - Christ
  lexicon: BDAG
  rationale: Used as a title rather than a name-like form in keeping with the project's
    default for Χριστός where context supports a titular sense. In Paul's resurrection
    argument, the messianic office remains in view, so 'Messiah' preserves meaning
    better than the traditional 'Christ'.
- source_word: ἐγήγερται
  chosen: has not been raised
  alternatives:
  - has not been awakened
  - has not risen
  lexicon: BDAG
  rationale: Perfect passive indicative of ἐγείρω in resurrection context. 'Has been
    raised' best reflects both the passive form and the ongoing-result nuance of the
    perfect, without obscuring the implied divine agency.
- source_word: κενὸν
  chosen: empty
  alternatives:
  - vain
  - useless
  - without content
  lexicon: BDAG
  rationale: Rendered 'empty' for accessible modern English and to preserve the sense
    of lacking substance or validity. 'Vain' is traditional but more archaic and can
    suggest merely emotional disappointment rather than objective emptiness.
- source_word: ἄρα
  chosen: then
  alternatives:
  - therefore
  - so
  lexicon: BDAG
  rationale: Marks the logical inference from the conditional clause. 'Then' is natural
    English in this construction and preserves the argumentative flow.
- source_word: κήρυγμα
  chosen: proclamation
  alternatives:
  - preaching
  - message
  lexicon: BDAG
  rationale: '''Proclamation'' captures the heraldic/public-announcement sense of
    κήρυγμα and avoids narrowing the term to the act of sermon delivery alone, while
    remaining readable.'
- source_word: πίστις
  chosen: faith
  alternatives:
  - trust
  - faithfulness
  lexicon: BDAG
  rationale: Per project default, πίστις is rendered 'faith' in the main text. Here
    it refers to the Corinthians' believing response, so 'faith' is the most natural
    rendering; 'trust' is possible but less standard, and 'faithfulness' is less likely
    in this context.
- source_word: κενὴ
  chosen: empty
  alternatives:
  - vain
  - useless
  lexicon: BDAG
  rationale: Repeated with the feminine form to match πίστις. Kept the same English
    gloss as earlier κενὸν for consistency and to preserve Paul's rhetorical parallelism.
