theological_decisions:
- issue: Resurrection wording and agency
  chosen_reading: has not been raised
  alternative_readings:
  - has not risen
  rationale: The Greek uses a passive form, and preserving that form avoids flattening
    the text's theological nuance. It leaves intact the New Testament pattern of speaking
    of God raising Jesus while not denying Jesus' own participation in resurrection
    life.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather
    than resolve it.'
