id: 1CO.15.20
reference: 1 Corinthians 15:20
source:
  edition: SBLGNT
  text: Νυνὶ δὲ Χριστὸς ἐγήγερται ἐκ νεκρῶν, ἀπαρχὴ τῶν ⸀κεκοιμημένων.
translation:
  text: But now the Messiah has been raised from the dead, the firstfruits of those
    who have fallen asleep.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Christ has been raised from the dead.'
    reason: alternative_reading
  - marker: b
    text: '''Firstfruits'' evokes the first portion of a harvest offered to God, implying
      both priority and the guarantee of the full harvest to come.'
    reason: cultural_note
  - marker: c
    text: '''Those who have fallen asleep'' is a metaphor for the dead, especially
      in a resurrection context.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Νυνὶ δὲ
  chosen: But now
  alternatives:
  - But as it is
  - But in fact now
  lexicon: BDAG
  rationale: Marks a strong adversative and present corrective turn from the hypothetical
    denial of resurrection in the preceding argument to the affirmed reality of Messiah's
    resurrection.
- source_word: Χριστὸς
  chosen: the Messiah
  alternatives:
  - Christ
  lexicon: BDAG
  rationale: Used as a title rather than a name-like label in this theological argument.
    Per doctrine, Χριστός is rendered 'Messiah' where context supports title sense,
    preserving the meaning of the Greek.
- source_word: ἐγήγερται
  chosen: has been raised
  alternatives:
  - is raised
  - has risen
  lexicon: BDAG
  rationale: Perfect passive indicative emphasizes the completed act with abiding
    result. 'Has been raised' preserves both the passive form and the continuing significance
    better than the more intransitive 'has risen'.
- source_word: ἐκ νεκρῶν
  chosen: from the dead
  alternatives:
  - out from among the dead
  lexicon: BDAG
  rationale: Standard idiomatic rendering in English for resurrection language. The
    plural νεκρῶν literally means 'dead ones/dead people,' but 'from the dead' is
    the natural equivalent.
- source_word: ἀπαρχὴ
  chosen: the firstfruits
  alternatives:
  - firstfruit
  - first portion
  lexicon: BDAG
  rationale: Cultic and representative term indicating the initial portion that anticipates
    and guarantees the full harvest. The plural form in English is conventional and
    best conveys the established biblical-theological sense.
- source_word: τῶν κεκοιμημένων
  chosen: of those who have fallen asleep
  alternatives:
  - of those who sleep
  - of those who have died
  lexicon: BDAG
  rationale: Perfect middle/passive participle from κοιμάομαι is a common Christian
    euphemism for believers' death in resurrection contexts. 'Have fallen asleep'
    preserves the metaphor and its theological softness better than flattening it
    to 'have died'.
