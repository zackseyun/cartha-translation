theological_decisions:
- issue: Resurrection voice and agency
  chosen_reading: has been raised
  alternative_readings:
  - has risen
  rationale: The passive form in Greek is retained to avoid obscuring divine agency
    in the resurrection while not over-specifying the agent in the English text.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Christological title rendering
  chosen_reading: the Messiah
  alternative_readings:
  - Christ
  rationale: In line with the doctrine's contested-terms guidance, the title is translated
    rather than transliterated where the context is explicitly theological and representative.
  doctrine_reference: 'Contested terms: Χριστός → Messiah (where title; Christ where
    name-like)'
