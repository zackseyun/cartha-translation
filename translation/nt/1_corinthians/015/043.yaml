id: 1CO.15.43
reference: 1 Corinthians 15:43
source:
  edition: SBLGNT
  text: σπείρεται ἐν ἀτιμίᾳ, ἐγείρεται ἐν δόξῃ· σπείρεται ἐν ἀσθενείᾳ, ἐγείρεται ἐν
    δυνάμει·
translation:
  text: It is sown in dishonor; it is raised in glory. It is sown in weakness; it
    is raised in power.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: σπείρεται
  chosen: it is sown
  alternatives:
  - is planted
  lexicon: BDAG
  rationale: Passive present is retained with an English passive. 'Sown' preserves
    Paul's seed/body metaphor from the surrounding context better than the more general
    'planted.' The singular impersonal 'it' reflects the implied subject, the body
    discussed in the immediate context.
- source_word: ἀτιμίᾳ
  chosen: dishonor
  alternatives:
  - humiliation
  - ignominy
  lexicon: BDAG
  rationale: '''Dishonor'' best matches the semantic contrast with ''glory'' (δόξῃ)
    and fits the bodily/resurrection context without over-specifying emotional shame.
    It preserves the antithetical parallelism.'
- source_word: ἐγείρεται
  chosen: it is raised
  alternatives:
  - it is awakened
  - it rises
  lexicon: BDAG
  rationale: In resurrection contexts, ἐγείρω is most naturally rendered 'raise.'
    The passive is preserved, matching Paul's repeated resurrection formula and leaving
    the implied divine agency unstated rather than paraphrasing it.
- source_word: δόξῃ
  chosen: glory
  alternatives:
  - splendor
  - honor
  lexicon: BDAG
  rationale: '''Glory'' is the standard and theologically weighty rendering, especially
    in resurrection contexts. ''Honor'' would weaken the contrast with ἀτιμία, and
    ''splendor'' is too narrow.'
- source_word: ἀσθενείᾳ
  chosen: weakness
  alternatives:
  - frailty
  - powerlessness
  lexicon: BDAG
  rationale: '''Weakness'' is the most direct and idiomatic rendering and preserves
    the contrast with δύναμις. It can encompass bodily frailty in context without
    narrowing the term.'
- source_word: δυνάμει
  chosen: power
  alternatives:
  - strength
  - might
  lexicon: BDAG
  rationale: '''Power'' is the most natural counterpart to ''weakness'' and aligns
    with common Pauline usage of δύναμις. ''Strength'' would sound more merely physical,
    whereas ''power'' can include transformed resurrection vitality.'
