theological_decisions:
- issue: Voice and agency in resurrection language
  chosen_reading: Use passive forms ('it is raised') without explicitly naming God
    as the agent in the main text.
  alternative_readings:
  - God raises it
  rationale: The Greek uses passive verbs throughout the contrast. Preserving the
    passive maintains fidelity to the source and allows the implied divine agency
    to remain implicit, as Paul states it.
  doctrine_reference: 'Translation philosophy #1 and #3'
- issue: Referent of the implied subject
  chosen_reading: Render the implied subject as 'it,' referring to the body from the
    immediate context.
  alternative_readings:
  - the body is sown ... the body is raised
  rationale: English can supply 'it' naturally from the preceding context without
    repeating 'the body' four times. This preserves readability while remaining faithful
    to the singular implied subject.
  doctrine_reference: 'Translation philosophy #6'
