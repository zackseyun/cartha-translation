id: 1CO.15.46
reference: 1 Corinthians 15:46
source:
  edition: SBLGNT
  text: ἀλλ’ οὐ πρῶτον τὸ πνευματικὸν ἀλλὰ τὸ ψυχικόν, ἔπειτα τὸ πνευματικόν.
translation:
  text: But the spiritual is not first; rather, the natural, and afterward the spiritual.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the natural body ... the spiritual body.' Paul omits the word 'body'
      here, though it is explicit in the surrounding context.
    reason: alternative_reading
  - marker: b
    text: '''Natural'' translates Greek psychikon, meaning what belongs to ordinary
      animate life; alternatively, more literally, ''soulish.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: πρῶτον
  chosen: first
  alternatives:
  - at first
  - before
  lexicon: BDAG
  rationale: Adverbial use marking sequence/order. 'First' is the most direct and
    natural English equivalent in Paul's contrast of temporal order.
- source_word: πνευματικόν
  chosen: the spiritual
  alternatives:
  - the spiritual body
  - what is spiritual
  lexicon: BDAG
  rationale: The adjective is articular and neuter singular, functioning substantivally.
    In the immediate context (vv. 44–49) it refers to the spiritual mode/order of
    existence, not necessarily requiring 'body' to be repeated here. 'The spiritual'
    preserves the Greek terseness while allowing the reader to hear the contrast with
    'the natural.'
- source_word: ψυχικόν
  chosen: the natural
  alternatives:
  - the soulish
  - the physical
  - the unspiritual
  lexicon: BDAG
  rationale: ψυχικός in Paul contrasts with πνευματικός and denotes what belongs to
    ordinary animate life rather than the eschatological life of the Spirit. 'The
    natural' is established, readable English and fits the resurrection-order argument
    better than the overly literal 'soulish.' 'Physical' is too narrow, and 'unspiritual'
    can sound morally pejorative, which is not required here.
- source_word: ἔπειτα
  chosen: afterward
  alternatives:
  - then
  - after that
  lexicon: BDAG
  rationale: Marks subsequent sequence. 'Afterward' gives a slightly clearer temporal
    progression in English than a second bare 'then,' while remaining faithful to
    the Greek.
- source_word: ἀλλ’ οὐ ... ἀλλὰ
  chosen: But ... not ... rather
  alternatives:
  - However ... not ... but
  - But ... not ... but
  lexicon: BDAG
  rationale: 'The paired contrastive structure is important: Paul is correcting an
    assumed order. Rendering the second ἀλλά as ''rather'' makes the corrective force
    explicit in idiomatic English without adding meaning.'
