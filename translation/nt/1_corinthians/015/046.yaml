theological_decisions:
- issue: Meaning of the contrast between ψυχικόν and πνευματικόν
  chosen_reading: 'A contrast of sequential modes/orders of human existence in Paul''s
    resurrection argument: the natural/animate comes first, then the spiritual.'
  alternative_readings:
  - A contrast specifically between the natural body and the spiritual body
  - A contrast between unspiritual and spiritual persons
  rationale: The immediate context includes 'natural body' and 'spiritual body' (v.
    44), but v. 46 itself omits 'body' and states the principle more broadly. The
    translation therefore preserves the substantival adjectives without narrowing
    the statement to 'body' alone, while still fitting Paul's resurrection theology.
  doctrine_reference: Preserve theological tension rather than resolve it.
