theological_decisions:
- issue: Use of the critical-text reading in the first clause
  chosen_reading: Translate νῖκος as 'victory' in the main text
  alternative_readings:
  - 'Translate the first clause with ''sting'' based on the variant reflected in the
    Textus Receptus/KJV tradition: ''O death, where is your sting?'''
  rationale: The provided source text is SBLGNT and reads νῖκος in the first clause,
    yielding the parallel 'victory ... sting.' This also aligns with Paul's argument
    in the immediate context about death being swallowed up in victory (v.54). The
    traditional alternative is worth preserving in a footnote because of its prominence
    in English Bible tradition and its relation to Hosea 13:14 citation patterns.
  doctrine_reference: Translation philosophy §1 (original-language primacy over translation
    tradition); §3 (preserve theological tension/alternatives in footnotes where relevant)
