id: 1CO.15.55
reference: 1 Corinthians 15:55
source:
  edition: SBLGNT
  text: ποῦ σου, θάνατε, τὸ ⸂νῖκος; ποῦ σου, θάνατε, τὸ κέντρον⸃;
translation:
  text: Where, O death, is your victory? Where, O death, is your sting?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Some manuscripts read, 'Where, O death, is your sting?' in the first clause,
      a reading reflected in the KJV and other traditional translations.
    reason: textual_variant
lexical_decisions:
- source_word: ποῦ
  chosen: Where
  alternatives:
  - Where now
  lexicon: BDAG
  rationale: Interrogative adverb introducing a taunt-like rhetorical question. Simple
    'Where' best preserves the direct force without adding emphasis not explicit in
    the Greek.
- source_word: σου
  chosen: your
  alternatives:
  - of you
  lexicon: BDAG
  rationale: Genitive second-person pronoun expressing possession. English possessive
    'your' is the natural equivalent in both clauses.
- source_word: θάνατε
  chosen: O death
  alternatives:
  - death
  lexicon: BDAG
  rationale: Vocative singular directly addresses death personified. 'O death' preserves
    the apostrophic, poetic force better than a bare 'death' in modern English.
- source_word: νῖκος
  chosen: victory
  alternatives:
  - triumph
  lexicon: BDAG
  rationale: νῖκος denotes victory/conquest. 'Victory' is the standard, clear English
    equivalent and fits the resurrection-taunt context. Although some manuscripts
    read 'sting' here by assimilation to Hosea 13:14, the SBLGNT text reads νῖκος
    and should be translated accordingly.
- source_word: κέντρον
  chosen: sting
  alternatives:
  - goad
  lexicon: BDAG
  rationale: κέντρον can denote a sting or a pointed instrument/goad. In this context
    of death personified and in Pauline usage immediately explained in v.56, 'sting'
    is the idiomatic and contextually fitting rendering.
