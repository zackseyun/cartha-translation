id: 1CO.15.36
reference: 1 Corinthians 15:36
source:
  edition: SBLGNT
  text: ⸀ἄφρων, σὺ ὃ σπείρεις, οὐ ζῳοποιεῖται ἐὰν μὴ ἀποθάνῃ·
translation:
  text: Foolish one, what you sow is not made alive unless it dies.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Fool' or 'Senseless one.'
    reason: lexical_alternative
  - marker: b
    text: Or 'does not come to life.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄφρων
  chosen: Foolish one
  alternatives:
  - Fool
  - Senseless one
  lexicon: BDAG
  rationale: A direct rebuke is intended, but 'Foolish one' preserves the vocative
    force without sounding needlessly harsh or archaic. It reflects Paul's sharp correction
    while remaining natural English.
- source_word: σὺ
  chosen: implicit in English
  alternatives:
  - you
  lexicon: Greek grammar
  rationale: The explicit pronoun adds emphasis in Greek, but English can carry the
    address naturally without a separate emphatic 'you' before 'what you sow.' The
    second-person sense is preserved in the clause.
- source_word: ὃ σπείρεις
  chosen: what you sow
  alternatives:
  - that which you sow
  - what you plant
  lexicon: BDAG
  rationale: '''What you sow'' is the most natural and sufficiently formal rendering.
    ''That which you sow'' is overly stiff; ''plant'' is possible but loses the agricultural
    metaphor''s lexical tie to sowing.'
- source_word: ζῳοποιεῖται
  chosen: is not made alive
  alternatives:
  - does not come to life
  - is not given life
  lexicon: BDAG
  rationale: The passive form is preserved with 'is not made alive,' which closely
    reflects the Greek and keeps the resurrection/life-giving nuance. 'Come to life'
    is idiomatic but less formally transparent to the passive verb.
- source_word: ἐὰν μὴ
  chosen: unless
  alternatives:
  - if not
  - except if
  lexicon: Greek grammar
  rationale: '''Unless'' is the standard and natural English rendering of this conditional
    construction.'
- source_word: ἀποθάνῃ
  chosen: it dies
  alternatives:
  - it should die
  - it dies first
  lexicon: BDAG
  rationale: The aorist subjunctive after ἐὰν μή is well represented by simple present
    English in this conditional statement. Adding 'first' would over-interpret the
    sequence, though it is implied by context.
