theological_decisions:
- issue: Metaphorical relation between seed-death and resurrection life
  chosen_reading: Retain the agricultural metaphor without explicating it as a doctrinal
    statement beyond the text.
  alternative_readings:
  - Interpret the verse more explicitly as a direct doctrinal formula for bodily resurrection
  rationale: Paul uses the seed analogy to answer skepticism about resurrection. The
    translation should preserve the metaphor and not import explanatory theological
    language not present in the verse itself.
  doctrine_reference: Preserve theological tension rather than resolve it.
