theological_decisions:
- issue: Future indicative vs hortatory subjunctive in the second verb
  chosen_reading: we will also bear
  alternative_readings:
  - let us also bear
  rationale: The SBLGNT text reads φορέσομεν (future indicative), which fits Paul's
    argument about the certainty of future resurrection conformity to the heavenly
    man. Because a well-known textual variant supports the exhortational reading,
    it is preserved in a footnote rather than adopted in the main text.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
