id: 1CO.15.49
reference: 1 Corinthians 15:49
source:
  edition: SBLGNT
  text: καὶ καθὼς ἐφορέσαμεν τὴν εἰκόνα τοῦ χοϊκοῦ, ⸀φορέσομεν καὶ τὴν εἰκόνα τοῦ
    ἐπουρανίου.
translation:
  text: And just as we have borne the image of the man of dust, we will also bear
    the image of the heavenly man.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Some manuscripts read 'let us also bear the image of the heavenly man.'
    reason: textual_variant
lexical_decisions:
- source_word: καθὼς
  chosen: just as
  alternatives:
  - as
  lexicon: BDAG
  rationale: Introduces a comparison between present/past human condition and future
    transformed condition. 'Just as' clearly signals the correspondence.
- source_word: ἐφορέσαμεν
  chosen: we have borne
  alternatives:
  - we bore
  - we wore
  lexicon: BDAG
  rationale: Aorist indicative of φορέω, here referring to having borne or carried
    the likeness of Adamic humanity. English present perfect fits the experiential
    force in context better than simple past, linking past participation with present
    condition.
- source_word: εἰκόνα
  chosen: image
  alternatives:
  - likeness
  lexicon: BDAG
  rationale: Standard rendering for εἰκών, preserving the Adam/Christ typological
    contrast without overinterpreting.
- source_word: τοῦ χοϊκοῦ
  chosen: of the man of dust
  alternatives:
  - of the earthly man
  - of the dust-made one
  lexicon: BDAG
  rationale: χοϊκός means made of dust or dusty, echoing Genesis and the immediately
    preceding context contrasting 'the first man' with 'the second man.' Supplying
    'man' in English makes the referent explicit and preserves the Adamic contrast.
- source_word: φορέσομεν
  chosen: we will also bear
  alternatives:
  - let us also bear
  lexicon: BDAG
  rationale: The printed SBLGNT reads the future indicative, yielding a future promise
    corresponding to resurrection transformation in context. The hortatory subjunctive
    variant is significant and preserved in a footnote.
- source_word: τοῦ ἐπουρανίου
  chosen: of the heavenly man
  alternatives:
  - of the heavenly one
  lexicon: BDAG
  rationale: ἐπουράνιος means heavenly. As with 'the man of dust,' supplying 'man'
    preserves the parallelism with the preceding Adam/Christ contrast in the immediate
    context.
- source_word: καὶ
  chosen: also
  alternatives:
  - and
  lexicon: BDAG
  rationale: In the second clause, καί has an additive force best brought out by 'also,'
    though the verse still begins with 'And' for discourse continuity.
