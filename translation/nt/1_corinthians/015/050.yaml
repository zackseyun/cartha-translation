theological_decisions:
- issue: Meaning of 'flesh and blood' in relation to resurrection
  chosen_reading: An idiom for mortal, corruptible human existence in its present
    state, not a denial of embodied resurrection.
  alternative_readings:
  - A statement that physical materiality as such cannot enter God's kingdom
  rationale: In the immediate context Paul argues for transformation from perishable
    to imperishable embodiment, not for the abandonment of embodiment itself. The
    translation preserves the idiom rather than importing an anti-physical reading.
  doctrine_reference: Affirmations; Translation philosophy §3
- issue: Audience term ἀδελφοί
  chosen_reading: Retain 'brothers' in the main text with inclusive sense noted in
    a footnote.
  alternative_readings:
  - brothers and sisters
  rationale: 'This follows the gender-accurate policy: preserve the masculine form
    in translation while acknowledging likely mixed-gender reference in context.'
  doctrine_reference: Translation philosophy §4
