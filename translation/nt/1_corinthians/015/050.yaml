id: 1CO.15.50
reference: 1 Corinthians 15:50
source:
  edition: SBLGNT
  text: Τοῦτο δέ φημι, ἀδελφοί, ὅτι σὰρξ καὶ αἷμα βασιλείαν θεοῦ κληρονομῆσαι οὐ ⸀δύναται,
    οὐδὲ ἡ φθορὰ τὴν ἀφθαρσίαν κληρονομεῖ.
translation:
  text: 'Now I say this, brothers: flesh and blood cannot inherit the kingdom of God,
    nor does the perishable inherit the imperishable.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'brothers and sisters'; the Greek says 'brothers' and may address the
      whole congregation inclusively.
    reason: lexical_alternative
  - marker: b
    text: '''Flesh and blood'' is an idiom for mortal human life in its present condition,
      not a denial of bodily resurrection.'
    reason: cultural_note
lexical_decisions:
- source_word: Τοῦτο δέ φημι
  chosen: Now I say this
  alternatives:
  - But I say this
  - This is what I mean
  lexicon: BDAG
  rationale: Renders the discourse marker δέ with a natural transitional 'Now' and
    φημι with 'I say,' preserving Paul's direct explanatory style without over-paraphrasing.
- source_word: ἀδελφοί
  chosen: brothers
  alternatives:
  - brothers and sisters
  - siblings
  lexicon: BDAG
  rationale: Per gender-accurate philosophy, the grammatically masculine plural is
    retained as 'brothers.' In Pauline address this often includes the whole congregation,
    so an inclusive alternative is preserved in a footnote rather than moved into
    the main text.
- source_word: σὰρξ καὶ αἷμα
  chosen: flesh and blood
  alternatives:
  - human flesh and blood
  - mere humanity
  lexicon: BDAG
  rationale: This is a fixed idiomatic expression referring to mortal human existence.
    'Flesh and blood' preserves the source wording and the idiom's resonance; more
    interpretive alternatives are possible but too expansive for the main text.
- source_word: βασιλείαν θεοῦ
  chosen: the kingdom of God
  alternatives:
  - God's kingdom
  lexicon: BDAG
  rationale: Standard and transparent rendering that preserves the genitival construction
    and theological weight of the phrase.
- source_word: κληρονομῆσαι
  chosen: inherit
  alternatives:
  - receive as an inheritance
  - come into possession of
  lexicon: BDAG
  rationale: '''Inherit'' is the natural and established equivalent for κληρονομέω
    and preserves the covenantal/eschatological nuance.'
- source_word: οὐ δύναται
  chosen: cannot
  alternatives:
  - is not able to
  lexicon: BDAG
  rationale: Concise modern English that accurately conveys inability.
- source_word: ἡ φθορά
  chosen: the perishable
  alternatives:
  - corruption
  - the corruptible
  - decay
  lexicon: BDAG
  rationale: Here φθορά is contrasted with ἀφθαρσία in the resurrection context. 'The
    perishable' communicates the state of being subject to decay more clearly in modern
    English than the abstract 'corruption,' while preserving the contrast.
- source_word: τὴν ἀφθαρσίαν
  chosen: the imperishable
  alternatives:
  - incorruption
  - immortality
  lexicon: BDAG
  rationale: Matches the lexical contrast with φθορά and fits Paul's resurrection
    argument. 'Immortality' is related but not identical and is better reserved for
    terms like ἀθανασία.
- source_word: κληρονομεῖ
  chosen: inherit
  alternatives:
  - inherits
  lexicon: BDAG
  rationale: Rendered as 'inherit' within the English clause 'nor does the perishable
    inherit...' to maintain consistency with the earlier infinitive and preserve the
    parallelism.
