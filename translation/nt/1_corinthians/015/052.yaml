theological_decisions:
- issue: Rendering the eschatological trumpet phrase without importing a specific
    end-times system
  chosen_reading: at the last trumpet
  alternative_readings:
  - at the final trumpet
  rationale: The Greek plainly speaks of 'the last trumpet,' but the translation should
    not build in a detailed eschatological scheme beyond the text. The chosen wording
    is direct and traditional enough to preserve the imagery while remaining interpretively
    open.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Meaning of 'we' in relation to resurrection and transformation
  chosen_reading: we will be changed
  alternative_readings:
  - those of us still living will be changed
  rationale: Paul's first-person plural should be preserved rather than expanded interpretively.
    The broader context explains that 'we' contrasts with 'the dead,' but the verse
    itself does not require an explanatory paraphrase.
  doctrine_reference: 'Translation philosophy: never paraphrase beyond what the source
    text warrants.'
