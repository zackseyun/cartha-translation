id: 1CO.15.52
reference: 1 Corinthians 15:52
source:
  edition: SBLGNT
  text: ἐν ἀτόμῳ, ἐν ῥιπῇ ὀφθαλμοῦ, ἐν τῇ ἐσχάτῃ σάλπιγγι· σαλπίσει γάρ, καὶ οἱ νεκροὶ
    ἐγερθήσονται ἄφθαρτοι, καὶ ἡμεῖς ἀλλαγησόμεθα.
translation:
  text: in an instant, in the blink of an eye, at the last trumpet. For the trumpet
    will sound, and the dead will be raised imperishable, and we will be changed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the twinkling of an eye.' The Greek idiom denotes extreme suddenness.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν ἀτόμῳ
  chosen: in an instant
  alternatives:
  - in a moment
  - in an indivisible instant
  lexicon: BDAG
  rationale: ἄτομος literally denotes something indivisible or not cut, but in this
    idiom it refers to an extremely brief point of time. 'In an instant' communicates
    the temporal force in natural English better than a more wooden 'in an atom' or
    overly technical 'indivisible instant.'
- source_word: ἐν ῥιπῇ ὀφθαλμοῦ
  chosen: in the blink of an eye
  alternatives:
  - in the twinkling of an eye
  - with a flicker of an eye
  lexicon: BDAG
  rationale: The phrase is an idiom for extreme suddenness. Traditional 'twinkling
    of an eye' is possible, but 'blink of an eye' is clearer in contemporary English
    while preserving the sense of rapidity.
- source_word: ἐν τῇ ἐσχάτῃ σάλπιγγι
  chosen: at the last trumpet
  alternatives:
  - at the final trumpet
  - with the last trumpet
  lexicon: BDAG
  rationale: ἐν with the dative here is temporal/instrumental in context; 'at the
    last trumpet' is idiomatic and preserves the eschatological marker without over-specifying
    mechanism. 'Last' is retained for ἐσχάτῃ.
- source_word: σαλπίσει
  chosen: the trumpet will sound
  alternatives:
  - it will sound
  - a trumpet will sound
  lexicon: BDAG
  rationale: The verb means 'to sound a trumpet' or 'to sound.' English normally supplies
    the subject explicitly. Given the immediately preceding σάλπιγγι, 'the trumpet
    will sound' is the most natural and contextually anchored rendering.
- source_word: οἱ νεκροὶ
  chosen: the dead
  alternatives:
  - the dead ones
  lexicon: BDAG
  rationale: The substantival adjective refers to dead people collectively. 'The dead'
    is standard, natural English and preserves the collective force.
- source_word: ἐγερθήσονται
  chosen: will be raised
  alternatives:
  - will be awakened
  - will rise
  lexicon: BDAG
  rationale: Passive future of ἐγείρω in resurrection context is best rendered 'will
    be raised,' preserving both the passive form and the resurrection sense.
- source_word: ἄφθαρτοι
  chosen: imperishable
  alternatives:
  - incorruptible
  - undecaying
  lexicon: BDAG
  rationale: ἄφθαρτος denotes freedom from decay/corruption. 'Imperishable' is clear
    modern English and fits Paul's resurrection argument in this chapter.
- source_word: ἡμεῖς
  chosen: we
  lexicon: NA28/SBLGNT context
  rationale: The pronoun is explicit in Greek and should be retained for emphasis
    and contrast with 'the dead.' It includes Paul with living believers hypothetically/pastorally
    within the eschatological event.
- source_word: ἀλλαγησόμεθα
  chosen: will be changed
  alternatives:
  - will be transformed
  lexicon: BDAG
  rationale: Future passive of ἀλλάσσω means 'to change.' 'Will be changed' is the
    most direct rendering and maintains lexical continuity with the surrounding discussion
    in 1 Corinthians 15.
