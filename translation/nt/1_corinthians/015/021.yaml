id: 1CO.15.21
reference: 1 Corinthians 15:21
source:
  edition: SBLGNT
  text: ἐπειδὴ γὰρ δι’ ἀνθρώπου ⸀θάνατος, καὶ δι’ ἀνθρώπου ἀνάστασις νεκρῶν·
translation:
  text: For since death came through a man, the resurrection of the dead also came
    through a man.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'by a man' in both clauses; the Greek preposition can express agency
      as well as means.
    reason: lexical_alternative
  - marker: b
    text: Paul's context identifies the two men as Adam and Messiah (see 15:22, 45).
    reason: cross_reference
lexical_decisions:
- source_word: ἐπειδὴ γὰρ
  chosen: For since
  alternatives:
  - Since
  - Because
  lexicon: BDAG
  rationale: The combination is explanatory and grounds the preceding argument. 'For
    since' preserves both the causal/subordinating force of ἐπειδή and the explanatory
    connective γάρ in natural English.
- source_word: δι’ ἀνθρώπου
  chosen: through a man
  alternatives:
  - by a man
  - through man
  lexicon: BDAG
  rationale: διά with the genitive commonly expresses agency or instrumentality, here
    indicating mediation. 'Through a man' preserves the anarthrous singular and the
    representative force tied to Adam in context, while remaining natural English.
    'A man' is preferred over gender-neutral wording in keeping with the gender-accurate
    policy and the Adam/Christ parallel.
- source_word: θάνατος
  chosen: death came
  alternatives:
  - death
  - there was death
  lexicon: BDAG
  rationale: The Greek is verbless, but English requires a supplied verb. 'Came' is
    idiomatic and mirrors the implied arrival/origin of death through a man, matching
    the parallel structure with the second clause.
- source_word: ἀνάστασις νεκρῶν
  chosen: the resurrection of the dead
  alternatives:
  - resurrection from the dead
  - resurrection of dead people
  lexicon: BDAG
  rationale: This is the standard Pauline expression for bodily resurrection. 'Of
    the dead' is the most direct and recognizable rendering of the genitive νεκρῶν.
    The article is supplied in English for naturalness and because the phrase functions
    as a definite concept in context.
- source_word: καὶ
  chosen: also
  alternatives:
  - and
  - so also
  lexicon: BDAG
  rationale: Here καί marks the corresponding second member of the comparison. 'Also'
    brings out the parallelism more clearly in English than a bare 'and'.
- source_word: δι’ ἀνθρώπου
  chosen: through a man
  alternatives:
  - by a man
  - through man
  lexicon: BDAG
  rationale: Repeated unchanged to preserve Paul's deliberate parallel between the
    man through whom death came (Adam) and the man through whom resurrection came
    (Messiah). Consistency is important to the argument.
