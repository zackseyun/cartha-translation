theological_decisions:
- issue: Representative contrast between Adam and Christ
  chosen_reading: Retain the singular 'a man' in both clauses without making the identities
    explicit in the main text.
  alternative_readings:
  - through one man ... through one man
  - through man ... through man
  - through Adam ... through Christ
  rationale: The immediate context identifies the two figures, but this verse itself
    states the principle in concise parallel form. Keeping 'a man' preserves the Greek
    wording and the theological symmetry without importing names not present in the
    text. 'One man' is possible, but the numeral is not explicit here.
  doctrine_reference: Translation philosophy §§1, 4, 5
- issue: Nature of resurrection
  chosen_reading: Render ἀνάστασις νεκρῶν as 'the resurrection of the dead' without
    spiritualizing it.
  alternative_readings:
  - spiritual resurrection
  - life after death
  rationale: In 1 Corinthians 15 Paul is arguing for the real resurrection of the
    dead. The translation should preserve that concrete claim and not weaken it into
    a vague afterlife concept.
  doctrine_reference: Affirmations; Translation philosophy §1
