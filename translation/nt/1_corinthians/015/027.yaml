theological_decisions:
- issue: Relation between the Son and the one subjecting all things
  chosen_reading: The verse explicitly excludes God, the one who subjected all things
    to the Son, from being included in 'all things.'
  alternative_readings:
  - A less explicit rendering with 'except him who put all things in subjection to
    him'
  rationale: Paul's wording safeguards the distinction between the Son and God the
    Father within the economy described here without diminishing the Son's dignity.
    The translation should preserve the logical exception stated in the text and not
    blur the persons.
  doctrine_reference: 'Affirmations: Nicene Creed (381 AD), Definition of Chalcedon
    (451 AD); Translation philosophy §3 Preserve theological tension rather than resolve
    it.'
