id: 1CO.15.27
reference: 1 Corinthians 15:27
source:
  edition: SBLGNT
  text: πάντα γὰρ ὑπέταξεν ὑπὸ τοὺς πόδας αὐτοῦ. ὅταν δὲ εἴπῃ ὅτι πάντα ὑποτέτακται,
    δῆλον ὅτι ἐκτὸς τοῦ ὑποτάξαντος αὐτῷ τὰ πάντα.
translation:
  text: For he has subjected all things under his feet. But when it says that all
    things have been subjected, it is clear that this excludes the one who subjected
    all things to him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'except for the one who subjected all things to him.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πάντα / τὰ πάντα
  chosen: all things
  alternatives:
  - everything
  lexicon: BDAG
  rationale: The neuter plural refers comprehensively to all things rather than all
    people specifically. 'All things' preserves the broad scope and echoes the Psalm
    8 allusion behind Paul's wording.
- source_word: ὑπέταξεν
  chosen: has subjected
  alternatives:
  - put in subjection
  - placed under
  lexicon: BDAG
  rationale: The verb ὑποτάσσω denotes causing something to be in a subordinate relation.
    'Has subjected' is natural modern English while retaining the force of decisive
    subordination. The English present perfect fits the aorist here in context because
    Paul is citing a scriptural declaration with abiding significance.
- source_word: ὑπὸ τοὺς πόδας αὐτοῦ
  chosen: under his feet
  alternatives:
  - beneath his feet
  lexicon: BDAG
  rationale: This is a conventional biblical idiom for dominion/subjugation and should
    be preserved literally because of its scriptural resonance.
- source_word: ὅταν δὲ εἴπῃ
  chosen: But when it says
  alternatives:
  - But whenever he says
  - But when he says
  lexicon: BDAG
  rationale: The subject is best taken impersonally with reference to Scripture/the
    cited statement, not to God directly. 'It says' is idiomatic English for scriptural
    citation and avoids over-specifying the subject.
- source_word: ὑποτέτακται
  chosen: have been subjected
  alternatives:
  - are subjected
  - have been put in subjection
  lexicon: BDAG
  rationale: The perfect passive indicates a completed act with continuing state.
    'Have been subjected' preserves both the passive voice and the resultant condition.
- source_word: δῆλον
  chosen: it is clear
  alternatives:
  - it is evident
  - it is obvious
  lexicon: BDAG
  rationale: This impersonal predicate marks an inference Paul expects the reader
    to recognize. 'It is clear' is straightforward and readable.
- source_word: ἐκτὸς τοῦ ὑποτάξαντος αὐτῷ τὰ πάντα
  chosen: this excludes the one who subjected all things to him
  alternatives:
  - except for the one who subjected all things to him
  - apart from the one who subjected all things to him
  lexicon: BDAG
  rationale: ἐκτός here expresses exception. 'Excludes' makes the logic explicit in
    natural English while preserving the meaning that the subjecting God is not included
    among the 'all things' subjected to Christ.
- source_word: αὐτῷ
  chosen: to him
  alternatives:
  - under him
  lexicon: BDAG
  rationale: The dative with ὑποτάξαντος indicates the one to whom all things are
    subjected, namely the Son/Messiah in context. 'To him' is the most direct rendering.
