id: 1CO.15.57
reference: 1 Corinthians 15:57
source:
  edition: SBLGNT
  text: τῷ δὲ θεῷ χάρις τῷ διδόντι ἡμῖν τὸ νῖκος διὰ τοῦ κυρίου ἡμῶν Ἰησοῦ Χριστοῦ.
translation:
  text: But thanks be to God, who gives us the victory through our Lord Jesus Messiah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Traditional English: ''Jesus Christ.'' The Greek title Χριστός means ''Messiah.'''
    reason: alternative_reading
lexical_decisions:
- source_word: χάρις
  chosen: thanks be to
  alternatives:
  - thanks
  - grace
  lexicon: BDAG
  rationale: Although χάρις often means 'grace,' in this idiomatic nominative expression
    addressed toward God it functions as an ascription of thanks. 'Thanks be to God'
    is natural English and preserves the doxological force without woodenly rendering
    'grace to God.'
- source_word: δὲ
  chosen: But
  alternatives:
  - Now
  - And
  lexicon: BDAG
  rationale: δέ marks a mild contrast or transition from the preceding discussion
    of death and victory. 'But' best captures the rhetorical turn into thanksgiving.
- source_word: θεῷ
  chosen: God
  lexicon: BDAG
  rationale: Standard rendering of θεός in the dative within the thanksgiving formula.
- source_word: τῷ διδόντι
  chosen: who gives
  alternatives:
  - the one giving
  - who is giving
  lexicon: BDAG
  rationale: The present participle is substantival and describes God as the giver.
    'Who gives' is idiomatic English and preserves the ongoing/generic sense better
    than a more wooden participial rendering.
- source_word: ἡμῖν
  chosen: us
  lexicon: BDAG
  rationale: 'Straightforward dative indirect object: God gives the victory to ''us,''
    referring to believers in context.'
- source_word: τὸ νῖκος
  chosen: the victory
  alternatives:
  - victory
  - the triumph
  lexicon: BDAG
  rationale: The article is retained in English because the phrase points to the specific
    eschatological victory just discussed over death. 'Victory' is the standard and
    clearest gloss for νῖκος.
- source_word: διὰ
  chosen: through
  alternatives:
  - by means of
  lexicon: BDAG
  rationale: With the genitive, διά denotes means or agency. 'Through' is the most
    natural English rendering here.
- source_word: τοῦ κυρίου ἡμῶν
  chosen: our Lord
  lexicon: BDAG
  rationale: κύριος is rendered 'Lord' per doctrinal default for this christological
    title; the possessive ἡμῶν is naturally expressed as 'our.'
- source_word: Ἰησοῦ Χριστοῦ
  chosen: Jesus Messiah
  alternatives:
  - Jesus Christ
  lexicon: BDAG
  rationale: Per translation philosophy, Χριστός is translated as 'Messiah' where
    it functions as a title rather than a fixed name-like form. In this confessional
    phrase, the titular sense remains clear, so 'Jesus Messiah' preserves meaning
    more transparently than traditional 'Jesus Christ.'
