theological_decisions:
- issue: Rendering Χριστοῦ in the christological name-title sequence Ἰησοῦ Χριστοῦ
  chosen_reading: Messiah in the main text ('Jesus Messiah')
  alternative_readings:
  - Christ ('Jesus Christ')
  rationale: The doctrine file directs that Christological titles be translated and
    specifically gives Χριστός → 'Messiah' where title sense is present, while allowing
    'Christ' where name-like. Here the phrase can be heard name-like in English tradition,
    but the title remains semantically active in Paul. Therefore the main text uses
    'Messiah,' while the traditional alternative is preserved in a footnote for readability
    and auditability.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; Contested
    terms table for Χριστός'
