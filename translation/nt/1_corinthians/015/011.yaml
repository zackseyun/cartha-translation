id: 1CO.15.11
reference: 1 Corinthians 15:11
source:
  edition: SBLGNT
  text: εἴτε οὖν ἐγὼ εἴτε ἐκεῖνοι, οὕτως κηρύσσομεν καὶ οὕτως ἐπιστεύσατε.
translation:
  text: Therefore, whether I or they, this is what we proclaim, and this is what you
    believed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'Thus we preach, and thus you believed.'
    reason: lexical_alternative
lexical_decisions:
- source_word: εἴτε ... εἴτε
  chosen: whether ... or
  alternatives:
  - either ... or
  lexicon: BDAG
  rationale: Correlative conjunction introducing alternatives; 'whether ... or' is
    idiomatic and preserves the rhetorical structure.
- source_word: οὖν
  chosen: therefore
  alternatives:
  - then
  - so
  lexicon: BDAG
  rationale: Marks an inference or conclusion from the preceding discussion about
    the resurrection witnesses; 'therefore' best captures the logical force in clear
    English.
- source_word: ἐγὼ
  chosen: I
  lexicon: BDAG
  rationale: Straightforward first-person singular pronoun, contrasted with 'they'.
- source_word: ἐκεῖνοι
  chosen: they
  alternatives:
  - those men
  - those ones
  lexicon: BDAG
  rationale: Refers back to the other apostles/witnesses mentioned in context. Simple
    'they' is natural English and sufficiently definite from context.
- source_word: οὕτως
  chosen: this is what
  alternatives:
  - thus
  - so
  - in this way
  lexicon: BDAG
  rationale: The adverb points to the content/manner of apostolic proclamation just
    summarized. 'This is what' communicates the referential force naturally in English
    better than the stiffer 'thus'.
- source_word: κηρύσσομεν
  chosen: we proclaim
  alternatives:
  - we preach
  - we announce
  lexicon: BDAG
  rationale: κηρύσσω denotes public proclamation. 'Proclaim' preserves the heraldic
    sense while remaining accessible modern English; 'we' includes Paul and the other
    apostles together.
- source_word: καὶ
  chosen: and
  alternatives:
  - also
  lexicon: BDAG
  rationale: Simple coordinating conjunction linking apostolic proclamation and Corinthian
    response.
- source_word: οὕτως
  chosen: this is what
  alternatives:
  - thus
  - so
  - in this way
  lexicon: BDAG
  rationale: 'Repeated adverb intentionally mirrors the first οὕτως. Rendering it
    the same way preserves the parallel: the message proclaimed is the message believed.'
- source_word: ἐπιστεύσατε
  chosen: you believed
  alternatives:
  - you came to believe
  - you put your faith in it
  lexicon: BDAG
  rationale: Aorist indicative referring to the Corinthians' past act of believing
    the proclaimed gospel. 'You believed' is direct and avoids adding interpretive
    material not explicit in the Greek.
