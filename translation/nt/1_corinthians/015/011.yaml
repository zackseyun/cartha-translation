theological_decisions:
- issue: Scope of apostolic unity in proclamation
  chosen_reading: Paul states that whether the gospel was proclaimed by him or by
    the other apostles, the proclaimed message was the same, and the Corinthians believed
    that same message.
  alternative_readings:
  - 'A stronger emphasis on manner: ''thus we preach and thus you believed'''
  rationale: The verse underscores unity of apostolic witness without importing broader
    ecclesiological claims. The repeated οὕτως links the content just summarized in
    15:1–10 with both proclamation and belief.
  doctrine_reference: Preserve theological tension rather than resolve it; do not
    import doctrinal claims the text does not make.
