theological_decisions:
- issue: Resurrection appearance language
  chosen_reading: he appeared
  alternative_readings:
  - he was seen
  rationale: The verse reports post-resurrection appearances without specifying the
    mode beyond visible manifestation. 'Appeared' preserves the historical claim while
    avoiding unnecessary interpretive expansion. It also coheres with the sequence
    of resurrection witnesses in the passage.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Reference to 'the twelve' despite Judas's absence
  chosen_reading: the twelve
  alternative_readings:
  - the apostles
  - the Eleven
  rationale: The Greek text uses the traditional group designation τοῖς δώδεκα. Translating
    it literally avoids harmonizing the text to historical reconstructions from other
    passages. The title functions as a fixed name for the apostolic body.
  doctrine_reference: Original-language primacy over translation tradition.
