id: 1CO.15.5
reference: 1 Corinthians 15:5
source:
  edition: SBLGNT
  text: καὶ ὅτι ὤφθη Κηφᾷ, εἶτα τοῖς δώδεκα·
translation:
  text: and that he appeared to Cephas, then to the twelve.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'he was seen by Cephas.' The Greek verb is formally passive, but in resurrection-appearance
      contexts it is commonly rendered 'appeared.'
    reason: lexical_alternative
  - marker: b
    text: Cephas is the Aramaic name corresponding to Peter.
    reason: cross_reference
  - marker: c
    text: '''The twelve'' is the established designation for Jesus''s apostolic circle,
      even though the group was not numerically twelve at every moment.'
    reason: cultural_note
lexical_decisions:
- source_word: ὤφθη
  chosen: appeared
  alternatives:
  - was seen
  - was revealed
  lexicon: BDAG
  rationale: Aorist passive of ὁράω used in resurrection-appearance contexts is idiomatically
    rendered 'appeared' in English. 'Was seen' is more formally passive but can obscure
    the emphasis on the risen Jesus making himself visible; 'appeared' is natural
    modern English and fits the creedal sequence in vv. 3–8.
- source_word: Κηφᾷ
  chosen: Cephas
  alternatives:
  - Peter
  lexicon: BDAG
  rationale: This is the dative of the proper name Κηφᾶς. Per translation philosophy,
    personal names are transliterated rather than translated or harmonized to more
    familiar equivalents. 'Peter' is the common equivalent but does not reflect the
    Greek form used here.
- source_word: εἶτα
  chosen: then
  alternatives:
  - after that
  - next
  lexicon: BDAG
  rationale: Marks sequence in the tradition Paul is reciting. 'Then' is concise,
    natural, and preserves the temporal progression.
- source_word: τοῖς δώδεκα
  chosen: the twelve
  alternatives:
  - the Twelve
  lexicon: BDAG
  rationale: A recognized designation for Jesus's apostolic circle. Lowercase is acceptable
    in running translation, while still preserving the group title. The phrase is
    retained literally even though Judas was no longer among them, because this was
    an established collective designation.
- source_word: καὶ ὅτι
  chosen: and that
  alternatives:
  - and that indeed
  - and
  lexicon: BDAG
  rationale: Continues the series of content clauses introduced in vv. 3–4. Rendering
    both particles preserves the formal structure of the tradition Paul is passing
    on.
