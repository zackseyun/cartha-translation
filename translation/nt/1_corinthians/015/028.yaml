theological_decisions:
- issue: Relation of the Son's subjection to the Father
  chosen_reading: Render the text straightforwardly as the Son being subjected to
    God/the one who subjected all things to him, without explanatory additions that
    would imply inferiority of essence or deny personal distinction.
  alternative_readings:
  - Paraphrasing to avoid any notion of subordination
  - Expanding the text to specify economic rather than ontological subordination
  rationale: The verse plainly states a future subjection of the Son within Paul's
    eschatological argument. In line with Nicene and Chalcedonian orthodoxy, the translation
    should neither mute the text nor import later theological qualifiers into the
    main line. The wording preserves the biblical statement while leaving doctrinal
    synthesis to theology rather than translation.
  doctrine_reference: 'Affirmations: Nicene Creed (381 AD, including homoousios language);
    Definition of Chalcedon (451 AD); Translation philosophy #3 Preserve theological
    tension rather than resolve it.'
- issue: Scope of τὰ πάντα / πάντα ἐν πᾶσιν
  chosen_reading: Use the comprehensive wording 'all things' and 'all in all' to preserve
    Paul's universal scope.
  alternative_readings:
  - everything
  - all things in everyone
  rationale: The repeated πᾶς language is central to the argument's cosmic scope.
    The translation should preserve that breadth without narrowing it to merely human
    subjects or over-specifying the final phrase.
  doctrine_reference: 'Translation philosophy #5 Consistency of key terms, or documented
    exception.'
