id: 1CO.15.28
reference: 1 Corinthians 15:28
source:
  edition: SBLGNT
  text: ὅταν δὲ ὑποταγῇ αὐτῷ τὰ πάντα, ⸀τότε αὐτὸς ὁ υἱὸς ὑποταγήσεται τῷ ὑποτάξαντι
    αὐτῷ τὰ πάντα, ἵνα ᾖ ὁ θεὸς ⸀πάντα ἐν πᾶσιν.
translation:
  text: But when all things are subjected to him, then the Son himself will also be
    subjected to the one who subjected all things to him, so that God may be all in
    all.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'everything'; Greek repeatedly uses 'all things' (τὰ πάντα), preserving
      the cosmic scope of Paul's argument.
    reason: lexical_alternative
  - marker: b
    text: Or 'God may be everything in everyone.' The Greek expression is compact
      and can be rendered more literally as 'all things in all,' but 'all in all'
      best preserves its rhetorical force in English.
    reason: alternative_reading
lexical_decisions:
- source_word: ὅταν δὲ
  chosen: But when
  alternatives:
  - And when
  - Now when
  lexicon: BDAG
  rationale: ὅταν introduces a temporal clause ('when/whenever'), and δέ here is best
    rendered with a mild adversative/continuative 'but' to mark progression from the
    prior argument.
- source_word: ὑποταγῇ
  chosen: are subjected
  alternatives:
  - are put in subjection
  - are subordinated
  lexicon: BDAG
  rationale: Aorist passive subjunctive of ὑποτάσσω in a temporal clause. 'Are subjected'
    is clear modern English and preserves the passive sense without over-paraphrase.
- source_word: αὐτῷ
  chosen: to him
  lexicon: BDAG
  rationale: Dative pronoun referring to the Son in context; 'to him' preserves the
    relational direction of subjection.
- source_word: τὰ πάντα
  chosen: all things
  alternatives:
  - everything
  lexicon: BDAG
  rationale: Paul's repeated neuter plural phrase is cosmic in scope here. 'All things'
    preserves the formal repetition and intertextual resonance in the argument.
- source_word: τότε
  chosen: then
  alternatives:
  - at that time
  lexicon: BDAG
  rationale: Temporal adverb marking the consequent stage in the sequence; 'then'
    is the natural concise rendering.
- source_word: αὐτὸς ὁ υἱὸς
  chosen: the Son himself
  alternatives:
  - the Son also
  - the Son himself also
  lexicon: BDAG
  rationale: The emphatic αὐτός highlights the Son personally. 'The Son himself' captures
    the emphasis idiomatically in English.
- source_word: ὑποταγήσεται
  chosen: will also be subjected
  alternatives:
  - will be put in subjection
  - will submit
  lexicon: BDAG
  rationale: Future passive indicative of ὑποτάσσω. Passive 'be subjected' matches
    the Greek form and maintains lexical consistency with the earlier occurrence.
    'Also' reflects καί implied by the construction's sequence and common translation
    sense, though not separately expressed in the printed text; here it is represented
    by the relation of the Son to the universal subjection already mentioned.
- source_word: τῷ ὑποτάξαντι
  chosen: to the one who subjected
  alternatives:
  - to the one who has subjected
  - to him who subjected
  lexicon: BDAG
  rationale: Aorist active participle with article functioning substantivally. 'The
    one who subjected' is transparent and preserves the participial force.
- source_word: ἵνα ᾖ
  chosen: so that ... may be
  alternatives:
  - in order that ... may be
  lexicon: BDAG
  rationale: ἵνα with present subjunctive expresses purpose/result. 'So that ... may
    be' is natural English and preserves the clause's teleological force.
- source_word: ὁ θεὸς
  chosen: God
  lexicon: BDAG
  rationale: Straightforward rendering of the nominative subject.
- source_word: πάντα ἐν πᾶσιν
  chosen: all in all
  alternatives:
  - everything in everyone
  - all things in all things
  lexicon: BDAG
  rationale: This compressed Pauline expression is traditionally and accurately rendered
    'all in all.' It preserves the breadth and rhetorical force better than an over-expanded
    gloss, while remaining intelligible in English.
