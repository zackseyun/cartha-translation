id: 1CO.15.10
reference: 1 Corinthians 15:10
source:
  edition: SBLGNT
  text: χάριτι δὲ θεοῦ εἰμι ὅ εἰμι, καὶ ἡ χάρις αὐτοῦ ἡ εἰς ἐμὲ οὐ κενὴ ἐγενήθη, ἀλλὰ
    περισσότερον αὐτῶν πάντων ἐκοπίασα, οὐκ ἐγὼ δὲ ἀλλὰ ἡ χάρις τοῦ θεοῦ ⸀ἡ σὺν ἐμοί.
translation:
  text: But by the grace of God I am what I am, and his grace toward me did not prove
    empty. On the contrary, I labored more than all of them—yet not I, but the grace
    of God that was with me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'did not become empty' or 'was not in vain.'
    reason: lexical_alternative
lexical_decisions:
- source_word: χάριτι δὲ θεοῦ
  chosen: But by the grace of God
  alternatives:
  - But through the grace of God
  - Now by the grace of God
  lexicon: BDAG
  rationale: Dative χάριτι is best rendered instrumentally ('by'/'through grace').
    'But' reflects δέ as a mild contrast with the previous context. 'Grace' is retained
    as the central Pauline term rather than paraphrased.
- source_word: εἰμι ὅ εἰμι
  chosen: I am what I am
  alternatives:
  - I am who I am
  lexicon: BDAG
  rationale: The idiomatic repetition is preserved closely. 'What I am' fits Paul's
    statement about his present status and identity as shaped by grace.
- source_word: ἡ χάρις αὐτοῦ ἡ εἰς ἐμὲ
  chosen: his grace toward me
  alternatives:
  - his grace to me
  - his grace that came to me
  lexicon: BDAG
  rationale: The article + prepositional phrase specifies grace directed toward Paul.
    'Toward me' is natural English and preserves the directional force of εἰς.
- source_word: οὐ κενὴ ἐγενήθη
  chosen: did not prove empty
  alternatives:
  - was not in vain
  - did not become empty
  lexicon: BDAG
  rationale: κενός can mean empty, without result, or in vain. 'Did not prove empty'
    captures both the metaphor and the idea of effectiveness, while avoiding a wooden
    'became empty.'
- source_word: ἀλλὰ περισσότερον αὐτῶν πάντων ἐκοπίασα
  chosen: On the contrary, I labored more than all of them
  alternatives:
  - but I worked harder than all of them
  - rather, I toiled more than all of them
  lexicon: BDAG
  rationale: κοπιάω often denotes strenuous labor; 'labored' preserves that force
    in readable English. περισσότερον with the genitive comparison is naturally rendered
    'more than all of them.' 'On the contrary' gives the adversative force of ἀλλά
    in context.
- source_word: οὐκ ἐγὼ δὲ ἀλλὰ ἡ χάρις τοῦ θεοῦ
  chosen: yet not I, but the grace of God
  alternatives:
  - though not I, but the grace of God
  - not I, however, but the grace of God
  lexicon: BDAG
  rationale: The clause qualifies Paul's claim to labor, preserving both his real
    effort and God's prior agency. 'Yet' smooths the contrast in idiomatic English
    without weakening it.
- source_word: ἡ σὺν ἐμοί
  chosen: that was with me
  alternatives:
  - which was with me
  - with me
  lexicon: BDAG
  rationale: σύν with the dative means 'with.' The article links the phrase to 'the
    grace of God'; 'that was with me' makes the relation explicit in natural English.
