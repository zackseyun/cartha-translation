id: 1CO.15.25
reference: 1 Corinthians 15:25
source:
  edition: SBLGNT
  text: δεῖ γὰρ αὐτὸν βασιλεύειν ἄχρι ⸀οὗ θῇ πάντας τοὺς ἐχθροὺς ὑπὸ τοὺς πόδας αὐτοῦ.
translation:
  text: For he must reign until he has put all his enemies under his feet.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'until he puts all his enemies under his feet.' The Greek wording does
      not itself require a distinction between these English aspect choices.
    reason: lexical_alternative
  - marker: b
    text: This imagery of enemies being placed 'under his feet' is a biblical figure
      for complete subjugation; compare Psalm 110:1.
    reason: cross_reference
lexical_decisions:
- source_word: δεῖ
  chosen: must
  alternatives:
  - is necessary
  - has to
  lexicon: BDAG
  rationale: Expresses necessity or divine inevitability. 'Must' is concise, natural
    English and preserves the force of the Greek without over-expanding it.
- source_word: γὰρ
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: BDAG
  rationale: Marks explanation/grounding for the preceding statement. 'For' preserves
    the connective logic in a formal yet readable way.
- source_word: αὐτὸν
  chosen: he
  alternatives:
  - him
  lexicon: BDAG
  rationale: 'Although accusative in Greek as the subject of the infinitive construction,
    idiomatic English renders the clause with a finite verb: ''he must reign.'' This
    preserves sense rather than wooden form.'
- source_word: βασιλεύειν
  chosen: reign
  alternatives:
  - rule as king
  - be king
  lexicon: BDAG
  rationale: '''Reign'' is the standard and most precise rendering for royal rule,
    preserving the kingship nuance without unnecessary expansion.'
- source_word: ἄχρι οὗ
  chosen: until
  alternatives:
  - up to the time when
  - until the time that
  lexicon: BDAG
  rationale: This construction marks a temporal endpoint. 'Until' is the natural English
    equivalent and does not imply cessation beyond that point by itself.
- source_word: θῇ
  chosen: has put
  alternatives:
  - puts
  - places
  lexicon: BDAG
  rationale: 'From τίθημι, here in a subjunctive clause after ἄχρι οὗ. English idiom
    commonly uses present perfect after ''until'' to express the completed subjugation
    envisioned: ''until he has put.'' ''Put'' fits the idiom ''put under his feet''
    better than ''place.'''
- source_word: πάντας τοὺς ἐχθροὺς
  chosen: all his enemies
  alternatives:
  - all the enemies
  - every enemy of his
  lexicon: BDAG
  rationale: The phrase is comprehensive and personal in reference. 'All his enemies'
    is clear, idiomatic, and preserves the totality of opposition.
- source_word: ὑπὸ τοὺς πόδας αὐτοῦ
  chosen: under his feet
  alternatives:
  - beneath his feet
  lexicon: BDAG
  rationale: This is a conventional biblical image of subjugation, echoing Psalm 110:1
    and related texts. 'Under his feet' preserves the metaphor directly and recognizably.
