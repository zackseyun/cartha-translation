theological_decisions:
- issue: Temporal force of 'until' (ἄχρι οὗ)
  chosen_reading: Rendered 'until' without implying that Messiah's reign ceases afterward.
  alternative_readings:
  - A reading that suggests his reign ends once the enemies are subdued
  rationale: The Greek marks the point up to which the stated action is in view, but
    does not by itself assert cessation after that point. The translation preserves
    the wording without importing a theological conclusion not explicit in this clause.
  doctrine_reference: Preserve theological tension rather than resolve it.
