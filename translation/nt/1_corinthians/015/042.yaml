theological_decisions:
- issue: Nature of the resurrection body in Paul's contrast
  chosen_reading: Retain bodily sowing/raising metaphor with passive verbs, without
    paraphrasing into a merely spiritual resurrection.
  alternative_readings:
  - Render more dynamically as 'the body is buried... raised imperishable'
  - Interpret the contrast as primarily moral rather than bodily
  rationale: In context Paul is defending bodily resurrection through the seed analogy.
    The translation preserves the embodied continuity/discontinuity tension by keeping
    'it is sown ... it is raised' rather than replacing the metaphor with an interpretive
    paraphrase.
  doctrine_reference: 'Affirmations; Translation philosophy #3'
