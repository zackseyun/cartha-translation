id: 1CO.15.42
reference: 1 Corinthians 15:42
source:
  edition: SBLGNT
  text: Οὕτως καὶ ἡ ἀνάστασις τῶν νεκρῶν. σπείρεται ἐν φθορᾷ, ἐγείρεται ἐν ἀφθαρσίᾳ·
translation:
  text: 'So also is the resurrection of the dead: it is sown in corruption; it is
    raised in incorruption.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in perishability ... in imperishability.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Οὕτως καὶ
  chosen: So also
  alternatives:
  - Thus also
  - In the same way also
  lexicon: BDAG
  rationale: Introduces the comparison/conclusion from the seed analogy in the preceding
    context. 'So also' is concise modern English that preserves the inferential-comparative
    force without sounding wooden.
- source_word: ἡ ἀνάστασις τῶν νεκρῶν
  chosen: the resurrection of the dead
  alternatives:
  - the resurrection of dead people
  - the resurrection from the dead
  lexicon: BDAG
  rationale: Standard and precise rendering of the genitive construction. 'Of the
    dead' best matches the Greek and Paul's argument about bodily resurrection; 'from
    the dead' would slightly shift the syntax and emphasis.
- source_word: σπείρεται
  chosen: it is sown
  alternatives:
  - one sows it
  - it is planted
  lexicon: BDAG
  rationale: Passive present is retained to mirror Paul's agricultural metaphor and
    the parallel with 'it is raised.' 'Planted' is more interpretive and less exact
    than the seed imagery.
- source_word: ἐν φθορᾷ
  chosen: in corruption
  alternatives:
  - in perishability
  - in decay
  lexicon: BDAG
  rationale: φθορά here denotes corruptibility/perishability of the present body.
    'In corruption' preserves the formal parallel with 'in incorruption' and avoids
    over-narrowing to a process ('decay') alone. Though somewhat traditional, it remains
    understandable in context.
- source_word: ἐγείρεται
  chosen: it is raised
  alternatives:
  - it is awakened
  - it rises
  lexicon: BDAG
  rationale: 'Passive is important theologically and grammatically: the body is acted
    upon in resurrection. ''Raised'' is the established and accurate rendering in
    resurrection contexts.'
- source_word: ἐν ἀφθαρσίᾳ
  chosen: in incorruption
  alternatives:
  - in imperishability
  - in incorruptibility
  lexicon: BDAG
  rationale: Chosen to preserve the direct lexical contrast with φθορά/'corruption.'
    'Imperishability' is a strong modern alternative, but 'incorruption' keeps the
    antithetical wordplay more transparently in English.
