theological_decisions:
- issue: Rhetorical force within Paul's resurrection argument
  chosen_reading: The verse is rendered as a rhetorical question highlighting the
    absurdity of apostolic peril if the dead are not raised.
  rationale: The Greek syntax and immediate context in 1 Corinthians 15 support a
    rhetorical question rather than a simple request for information. This preserves
    Paul's argumentative tension without importing additional doctrinal claims.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
