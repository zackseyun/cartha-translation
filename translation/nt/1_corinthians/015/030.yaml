id: 1CO.15.30
reference: 1 Corinthians 15:30
source:
  edition: SBLGNT
  text: τί καὶ ἡμεῖς κινδυνεύομεν πᾶσαν ὥραν;
translation:
  text: Why are we also in danger every hour?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'What also [is it that] we are in danger every hour?'
      The sense in context is 'Why are we also in danger every hour?'
    reason: lexical_alternative
lexical_decisions:
- source_word: τί
  chosen: Why
  alternatives:
  - What
  lexicon: BDAG
  rationale: In this rhetorical question, τί introduces the reason or point of the
    action rather than asking for an object. Rendering it as 'Why' best captures Paul's
    argumentative force in context ('if there is no resurrection, why...?').
- source_word: καὶ
  chosen: also
  alternatives:
  - even
  - and
  lexicon: BDAG
  rationale: καὶ here adds Paul's group to the preceding examples in the argument.
    'Also' naturally conveys the additive sense in English.
- source_word: ἡμεῖς
  chosen: we
  lexicon: BDAG
  rationale: The explicit pronoun is retained as 'we.' English does not need extra
    emphasis beyond the normal pronoun here, since 'also' already helps convey the
    contrastive/additive force.
- source_word: κινδυνεύομεν
  chosen: are in danger
  alternatives:
  - risk our lives
  - face danger
  lexicon: BDAG
  rationale: κινδυνεύω means to be in danger or be at risk. 'Are in danger' is the
    most direct and formally transparent rendering; 'risk our lives' would be slightly
    more interpretive than the Greek requires.
- source_word: πᾶσαν ὥραν
  chosen: every hour
  alternatives:
  - at every hour
  - all the time
  lexicon: BDAG
  rationale: The accusative expression is idiomatic for continual exposure to danger.
    'Every hour' preserves the Greek wording closely while remaining natural English;
    'all the time' is smoother but less formally tied to the source.
