id: 1CO.15.1
reference: 1 Corinthians 15:1
source:
  edition: SBLGNT
  text: Γνωρίζω δὲ ὑμῖν, ἀδελφοί, τὸ εὐαγγέλιον ὃ εὐηγγελισάμην ὑμῖν, ὃ καὶ παρελάβετε,
    ἐν ᾧ καὶ ἑστήκατε,
translation:
  text: Now I make known to you, brothers, the good news that I proclaimed to you,
    which you also received, in which you also stand,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'brothers and sisters'; the Greek says 'brothers' and often uses the
      masculine form to address the whole believing community.
    reason: lexical_alternative
lexical_decisions:
- source_word: Γνωρίζω
  chosen: I make known
  alternatives:
  - I remind
  - I declare
  - I want to make known
  lexicon: BDAG
  rationale: The present active indicative most directly means 'make known' or 'inform.'
    Although many English versions use 'I would remind,' the Greek verb here is not
    the usual term for reminding; 'make known' better reflects the source text's plain
    sense while still fitting Paul's rhetorical reintroduction of the gospel.
- source_word: δὲ
  chosen: Now
  alternatives:
  - And
  - But
  - ''
  lexicon: BDAG
  rationale: δέ marks a mild transition rather than strong contrast. 'Now' captures
    the discourse shift naturally in English.
- source_word: ἀδελφοί
  chosen: brothers
  alternatives:
  - brothers and sisters
  - siblings
  lexicon: BDAG
  rationale: Per the gender-accurate philosophy, the grammatically masculine vocative
    is rendered 'brothers.' In Pauline usage it often addresses the whole congregation,
    so an inclusivity note is appropriate rather than replacing the source-shaped
    term in the main text.
- source_word: τὸ εὐαγγέλιον
  chosen: the good news
  alternatives:
  - the gospel
  lexicon: BDAG
  rationale: εὐαγγέλιον means 'good news.' This rendering preserves the meaning in
    accessible modern English and avoids relying on ecclesiastical tradition where
    the source term is transparent.
- source_word: εὐηγγελισάμην
  chosen: I proclaimed
  alternatives:
  - I preached
  - I announced as good news
  lexicon: BDAG
  rationale: The aorist middle of εὐαγγελίζω refers to announcing/proclaiming good
    news. 'Proclaimed' is natural English and keeps the verbal connection to εὐαγγέλιον
    without awkward repetition like 'good newsed.'
- source_word: παρελάβετε
  chosen: you received
  alternatives:
  - you accepted
  lexicon: BDAG
  rationale: παραλαμβάνω in this context refers to receiving a tradition/message.
    'Received' is the standard and sufficiently broad rendering, without importing
    a stronger subjective nuance such as 'accepted.'
- source_word: ἐν ᾧ
  chosen: in which
  alternatives:
  - by which
  - on which
  lexicon: BDAG
  rationale: The preposition ἐν with the relative pronoun is most naturally rendered
    'in which' here, referring back to the gospel as the sphere or basis in which
    they stand. 'By which' would anticipate v.2 more than this clause itself warrants.
- source_word: ἑστήκατε
  chosen: you stand
  alternatives:
  - you have stood firm
  - you are standing firm
  lexicon: BDAG
  rationale: The perfect of ἵστημι conveys a present state resulting from prior action.
    'You stand' is concise, idiomatic, and captures the settled state without overtranslating.
