theological_decisions:
- issue: Rendering of ἀδελφοί in a mixed-congregation address
  chosen_reading: brothers in the main text, with an inclusivity footnote
  alternative_readings:
  - brothers and sisters
  - siblings
  rationale: The translation philosophy requires gender-accurate rendering over gender-neutral
    replacement. Because Paul's vocative likely addresses the whole church, the representative
    force is preserved in a footnote rather than flattened in the main text.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
