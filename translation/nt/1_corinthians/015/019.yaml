id: 1CO.15.19
reference: 1 Corinthians 15:19
source:
  edition: SBLGNT
  text: εἰ ἐν τῇ ζωῇ ταύτῃ ⸂ἐν Χριστῷ ἠλπικότες ἐσμὲν⸃ μόνον, ἐλεεινότεροι πάντων
    ἀνθρώπων ἐσμέν.
translation:
  text: If we have hoped in Christ for this life only, we are more pitiable than all
    people.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in Christ.' The Greek title Χριστός can be rendered 'Christ' or 'Messiah';
      here 'Messiah' is used to preserve the title's meaning.
    reason: alternative_reading
  - marker: b
    text: Or 'most to be pitied of all people.' The Greek comparative can be expressed
      idiomatically in English with a superlative sense.
    reason: lexical_alternative
  - marker: c
    text: Or 'If in this life only we have hoped in the Messiah'.
    reason: previous_rendering
lexical_decisions:
- source_word: εἰ
  chosen: If
  lexicon: BDAG
  rationale: Introduces a conditional statement; standard rendering in this context.
- source_word: ἐν τῇ ζωῇ ταύτῃ
  chosen: in this life
  alternatives:
  - for this life
  - during this life
  lexicon: BDAG
  rationale: Natural English rendering of the prepositional phrase, referring to the
    present earthly life.
- source_word: ἐν Χριστῷ
  chosen: in the Messiah
  alternatives:
  - in Christ
  lexicon: BDAG
  rationale: Following the project's default for Χριστός as a title, 'Messiah' preserves
    the titular sense better than the traditional 'Christ.' The preposition 'in' is
    retained because the phrase is Pauline and theologically significant.
- source_word: ἠλπικότες ἐσμὲν
  chosen: we have hoped
  alternatives:
  - we are having hope
  - we have placed our hope
  lexicon: BDAG
  rationale: The periphrastic perfect is best represented by English present perfect,
    expressing a settled hope held up to the present.
- source_word: μόνον
  chosen: only
  alternatives:
  - alone
  lexicon: BDAG
  rationale: Placed with 'in this life' in English to reflect the sense that the hope
    is limited to this life alone.
- source_word: ἐλεεινότεροι
  chosen: more pitiable
  alternatives:
  - most to be pitied
  - more miserable
  lexicon: BDAG
  rationale: Comparative adjective meaning deserving pity. 'More pitiable' is closer
    to the Greek comparative form than the idiomatic traditional 'most to be pitied,'
    though that sense is contextually similar.
- source_word: πάντων ἀνθρώπων
  chosen: than all people
  alternatives:
  - than all men
  - than everyone
  lexicon: BDAG
  rationale: ἄνθρωποι here refers to human beings generally, not specifically males.
    'All people' is gender-accurate to the referent while preserving the universal
    comparison.
