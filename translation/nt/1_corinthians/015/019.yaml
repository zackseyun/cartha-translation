theological_decisions:
- issue: Rendering Χριστῷ in Pauline formula ἐν Χριστῷ
  chosen_reading: the Messiah
  alternative_readings:
  - Christ
  rationale: DOCTRINE.md directs that Χριστός be translated as 'Messiah' where it
    functions as a title rather than a name-like form. Here the phrase retains titular
    force, so 'Messiah' is preferred while preserving 'Christ' as an alternative.
  doctrine_reference: 'DOCTRINE.md: Contested terms; Translate titles; transliterate
    names'
- issue: Scope of Paul's statement about Christian hope
  chosen_reading: A conditional statement limited to hope confined to this life, without
    importing broader doctrinal conclusions
  rationale: The verse argues that if Christian hope terminates in this life only,
    believers are especially pitiable. The translation preserves Paul's rhetorical
    force without expanding it into a doctrinal paraphrase about the afterlife beyond
    what the text states.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it'
revisions:
- timestamp: '2026-04-21T01:05:48Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/nt/1_corinthians/015/019.json
  category: awkward_english
  tier: 1
  from: If in this life only we have hoped in the Messiah
  to: If we have hoped in the Messiah for this life only
  rationale: The current word order, while grammatically possible, is slightly awkward
    and creates a minor ambiguity. It could be misread as 'we have *only* hoped' (i.e.,
    done nothing else), rather than the intended meaning that the hope is limited
    to this life. Reordering the clause and using the more idiomatic 'for this life'
    (which is listed as a valid alternative in the lexical notes for 'ἐν τῇ ζωῇ ταύτῃ')
    makes the meaning clearer and the sentence flow more natural in English.
