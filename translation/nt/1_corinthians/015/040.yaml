theological_decisions:
- issue: Referent of 'heavenly bodies' and 'earthly bodies'
  chosen_reading: Render generically as 'heavenly bodies and earthly bodies' without
    narrowing the referent.
  alternative_readings:
  - celestial bodies and terrestrial bodies
  - heavenly beings and earthly beings
  rationale: In context Paul is illustrating differing kinds of embodied existence
    and differing glory. The Greek uses σώματα ('bodies'), not 'beings,' so the translation
    should not import angelology or reduce the phrase to astronomical objects alone.
    The generic rendering preserves Paul's analogy and theological tension without
    over-interpretation.
  doctrine_reference: Preserve theological tension rather than resolve it.
