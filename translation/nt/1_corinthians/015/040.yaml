id: 1CO.15.40
reference: 1 Corinthians 15:40
source:
  edition: SBLGNT
  text: καὶ σώματα ἐπουράνια, καὶ σώματα ἐπίγεια· ἀλλὰ ἑτέρα μὲν ἡ τῶν ἐπουρανίων
    δόξα, ἑτέρα δὲ ἡ τῶν ἐπιγείων.
translation:
  text: And there are heavenly bodies and earthly bodies; but the glory of the heavenly
    is one kind, and the glory of the earthly is another.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'celestial bodies and terrestrial bodies.'
    reason: lexical_alternative
lexical_decisions:
- source_word: σώματα
  chosen: bodies
  alternatives:
  - physical bodies
  lexicon: BDAG
  rationale: σῶμα is straightforwardly 'body/bodies.' 'Bodies' preserves the broad
    referent in Paul's analogy without over-specifying whether he means celestial
    bodies, resurrected bodies, or embodied forms in general at this point.
- source_word: ἐπουράνια
  chosen: heavenly
  alternatives:
  - celestial
  lexicon: BDAG
  rationale: ἐπουράνιος means 'heavenly' or 'belonging to heaven.' 'Heavenly' is more
    natural modern English and preserves the possible double sense of belonging to
    heaven, whereas 'celestial' can sound more narrowly astronomical.
- source_word: ἐπίγεια
  chosen: earthly
  alternatives:
  - terrestrial
  lexicon: BDAG
  rationale: ἐπίγειος means 'earthly' or 'on earth.' 'Earthly' matches the register
    of 'heavenly' and avoids the more technical-sounding 'terrestrial.'
- source_word: ἀλλὰ
  chosen: but
  alternatives:
  - however
  lexicon: BDAG
  rationale: ἀλλά marks contrast. 'But' best reflects the simple adversative force
    in a readable way.
- source_word: ἑτέρα ... ἑτέρα
  chosen: one kind ... another
  alternatives:
  - different ... different
  - one ... another
  lexicon: BDAG
  rationale: ἕτερος emphasizes difference or distinct kind. Rendering the first pair
    as 'one kind ... another' brings out qualitative distinction more clearly than
    a bare repetition of 'different,' while remaining idiomatic.
- source_word: δόξα
  chosen: glory
  alternatives:
  - splendor
  - brightness
  lexicon: BDAG
  rationale: δόξα here refers to distinctive splendor or radiance. 'Glory' preserves
    Paul's theological vocabulary and allows the physical sense of splendor to remain
    within the broader semantic range. Alternatives like 'splendor' capture the immediate
    image but lose intertextual and theological continuity.
- source_word: τῶν ἐπουρανίων ... τῶν ἐπιγείων
  chosen: the heavenly ... the earthly
  alternatives:
  - heavenly bodies ... earthly bodies
  lexicon: BDAG
  rationale: The genitive plurals are elliptical, referring back to σώματα. In English,
    repeating 'the glory of the heavenly ... the glory of the earthly' preserves the
    compactness of the Greek while remaining clear; the referent 'bodies' is already
    established in the first clause.
