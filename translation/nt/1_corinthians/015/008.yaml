id: 1CO.15.8
reference: 1 Corinthians 15:8
source:
  edition: SBLGNT
  text: ἔσχατον δὲ πάντων ὡσπερεὶ τῷ ἐκτρώματι ὤφθη κἀμοί.
translation:
  text: And last of all, as to one untimely born, he appeared also to me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more literally, 'as to the miscarriage' or 'as to the aborted one.' Paul
      uses a stark self-deprecating metaphor.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔσχατον
  chosen: last of all
  alternatives:
  - last
  - finally
  lexicon: BDAG
  rationale: Accusative neuter used adverbially; 'last of all' naturally conveys temporal
    sequence in English and fits Paul's list of resurrection appearances.
- source_word: δὲ
  chosen: And
  alternatives:
  - Now
  - But
  lexicon: BDAG
  rationale: Here δέ continues the sequence rather than sharply contrasting; 'And'
    gives smooth discourse flow in English.
- source_word: πάντων
  chosen: of all
  alternatives:
  - of them all
  - of everyone
  lexicon: BDAG
  rationale: Genitive plural with ἔσχατον completes the idiom 'last of all,' referring
    to all the previously mentioned witnesses.
- source_word: ὡσπερεὶ
  chosen: as to
  alternatives:
  - as if to
  - like
  lexicon: BDAG
  rationale: The particle introduces a comparison softened by approximation. 'As to
    one untimely born' preserves the comparative force without overcommitting to a
    purely literal simile such as 'as if to.'
- source_word: τῷ ἐκτρώματι
  chosen: to one untimely born
  alternatives:
  - to the miscarriage
  - to the aborted one
  - to one born abnormally
  lexicon: BDAG
  rationale: ἔκτρωμα is a difficult, self-deprecating metaphor referring literally
    to an aborted fetus or miscarriage. 'One untimely born' is idiomatic, readable
    modern English that preserves the abnormality and pathos without becoming needlessly
    clinical or jarring in the main text. The more literal alternatives are preserved
    in a footnote.
- source_word: ὤφθη
  chosen: he appeared
  alternatives:
  - he was seen
  lexicon: BDAG
  rationale: Aorist passive of ὁράω in resurrection-appearance contexts is commonly
    rendered 'appeared.' This communicates the event clearly in English while preserving
    the sense of a visible manifestation.
- source_word: κἀμοί
  chosen: also to me
  alternatives:
  - to me also
  - even to me
  lexicon: BDAG
  rationale: Crasis of καί + ἐμοί. 'Also to me' keeps the additive force and places
    Paul within the sequence of witnesses.
