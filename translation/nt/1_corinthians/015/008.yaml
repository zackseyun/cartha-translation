theological_decisions:
- issue: Rendering Paul's self-description ἐκτρώματι
  chosen_reading: Use the metaphor 'one untimely born' in the main text, with more
    literal alternatives footnoted.
  alternative_readings:
  - the miscarriage
  - the aborted one
  - one born abnormally
  rationale: The verse does not require resolving the precise nuance of Paul's self-abasement
    beyond preserving its abnormal and humbling force. A readable main text should
    retain the metaphor without flattening it or importing a doctrinal interpretation
    about Paul's apostleship beyond what the Greek states.
  doctrine_reference: Translation philosophy §§3, 6
