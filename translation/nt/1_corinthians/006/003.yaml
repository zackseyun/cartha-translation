theological_decisions:
- issue: Nature of believers 'judging angels'
  chosen_reading: Retain the literal wording 'we will judge angels' without interpretive
    expansion.
  alternative_readings:
  - we will rule over angels
  - we will pass judgment on fallen angels
  rationale: The text states the future action plainly but does not specify the mechanism,
    scope, or whether only fallen angels are in view. To preserve theological tension
    and avoid importing a systematized eschatology, the translation keeps the direct
    wording and leaves narrower interpretations to exegesis rather than the main text.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
