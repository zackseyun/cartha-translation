id: 1CO.6.3
reference: 1 Corinthians 6:3
source:
  edition: SBLGNT
  text: οὐκ οἴδατε ὅτι ἀγγέλους κρινοῦμεν, μήτιγε βιωτικά;
translation:
  text: Do you not know that we will judge angels—how much more, matters of this life?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'let alone the things of this life' or 'much less matters of this life.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐκ οἴδατε
  chosen: Do you not know
  alternatives:
  - Do you not realize
  - Don't you know
  lexicon: BDAG
  rationale: A standard rhetorical question formula in Paul. 'Do you not know' preserves
    the formal force and repeated Pauline idiom, while remaining natural English.
- source_word: ὅτι
  chosen: that
  lexicon: BDAG
  rationale: Introduces the content clause after 'know'; straightforwardly rendered
    as 'that.'
- source_word: ἀγγέλους
  chosen: angels
  alternatives:
  - messengers
  lexicon: BDAG
  rationale: In this eschatological/judicial context, the referent is heavenly beings,
    not human messengers. 'Angels' is the clear contextual sense.
- source_word: κρινοῦμεν
  chosen: we will judge
  alternatives:
  - we judge
  - we will govern
  lexicon: BDAG
  rationale: Future indicative points to a future reality, so 'will judge' is preferred
    over a present-sounding rendering. 'Judge' preserves the semantic range of κρίνω
    in a legal/discernment context without over-specifying the exact mode of rule.
- source_word: μήτιγε
  chosen: how much more
  alternatives:
  - let alone
  - much less
  lexicon: BDAG
  rationale: This particle intensifies an argument from greater to lesser. Since Paul
    argues from judging angels to handling ordinary disputes, 'how much more' communicates
    the rhetorical force clearly in modern English.
- source_word: βιωτικά
  chosen: matters of this life
  alternatives:
  - things pertaining to this life
  - everyday matters
  - temporal matters
  lexicon: BDAG
  rationale: The adjective used substantivally refers to affairs belonging to ordinary
    earthly life. 'Matters of this life' is clear, natural, and broad enough to include
    the legal disputes in context without narrowing the term too much.
