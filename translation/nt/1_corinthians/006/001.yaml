id: 1CO.6.1
reference: 1 Corinthians 6:1
source:
  edition: SBLGNT
  text: Τολμᾷ τις ὑμῶν πρᾶγμα ἔχων πρὸς τὸν ἕτερον κρίνεσθαι ἐπὶ τῶν ἀδίκων, καὶ οὐχὶ
    ἐπὶ τῶν ἁγίων;
translation:
  text: Does any one of you dare, when he has a case against another, to be judged
    before the unrighteous and not before the saints?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'before the unjust.' Some translations render this interpretively as
      'before unbelievers,' but the Greek says 'the unrighteous.'
    reason: lexical_alternative
  - marker: b
    text: '''Saints'' here refers to God''s holy people, that is, believers.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Τολμᾷ
  chosen: Does ... dare
  alternatives:
  - dares
  - presumes
  lexicon: BDAG
  rationale: Rendered as an interrogative with 'Does ... dare' to reflect Paul's rhetorical
    question and the force of τολμάω as boldness bordering on audacity in context.
- source_word: τις ὑμῶν
  chosen: any one of you
  alternatives:
  - any of you
  - someone among you
  lexicon: BDAG
  rationale: Captures the indefinite singular τις with the partitive genitive ὑμῶν
    in natural English while preserving the direct address to the Corinthian believers.
- source_word: πρᾶγμα ἔχων
  chosen: when he has a case
  alternatives:
  - having a matter
  - having a dispute
  - having a lawsuit
  lexicon: BDAG
  rationale: πρᾶγμα can mean 'matter, affair, case.' In this legal context, 'case'
    best conveys a concrete legal dispute without over-specifying beyond the Greek.
    'When he has' smooths the participial construction into idiomatic English.
- source_word: πρὸς τὸν ἕτερον
  chosen: against another
  alternatives:
  - with another
  - against the other
  lexicon: BDAG
  rationale: In legal/dispute context, πρός with accusative indicates relation or
    opposition. 'Against another' fits English legal idiom and avoids implying only
    one specific counterpart by translating ἕτερον generically.
- source_word: κρίνεσθαι
  chosen: to be judged
  alternatives:
  - to go to court
  - to have the case decided
  lexicon: BDAG
  rationale: The passive infinitive is preserved with 'to be judged,' maintaining
    the formal judicial sense of κρίνω while allowing the surrounding context to imply
    court proceedings.
- source_word: ἐπὶ τῶν ἀδίκων
  chosen: before the unrighteous
  alternatives:
  - before the unjust
  - before unbelievers
  - before unjust men
  lexicon: BDAG
  rationale: ἀδίκων is literally 'unrighteous/unjust ones.' 'Before the unrighteous'
    preserves Paul's evaluative term rather than replacing it with the interpretive
    'unbelievers.' The preposition ἐπί in this judicial setting is idiomatically rendered
    'before.'
- source_word: καὶ οὐχὶ
  chosen: and not
  alternatives:
  - and not rather
  - instead of
  lexicon: BDAG
  rationale: A straightforward rendering preserves the contrast without adding emphasis
    not explicit in the Greek, though the rhetorical force is clear from the question
    form.
- source_word: ἐπὶ τῶν ἁγίων
  chosen: before the saints
  alternatives:
  - before God's holy people
  - before the holy ones
  lexicon: BDAG
  rationale: ἅγιοι is a standard Pauline designation for believers. 'Saints' preserves
    the established theological term and the lexical correspondence, while 'before'
    matches the judicial sense of ἐπί as above.
