theological_decisions:
- issue: Rendering ἀδίκων in contrast with ἁγίων
  chosen_reading: the unrighteous ... the saints
  alternative_readings:
  - the unjust ... the saints
  - unbelievers ... believers
  rationale: The verse contrasts secular judges with the Christian community, but
    the Greek uses morally/theologically charged terms rather than the more explicit
    'unbelievers.' The translation preserves Paul's wording and leaves the implication
    to context rather than resolving it interpretively.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
- issue: Generic masculine participle ἔχων
  chosen_reading: when he has a case
  alternative_readings:
  - when they have a case
  rationale: The Greek is grammatically masculine singular and representative. The
    English keeps singular reference with 'any one of you' and 'he' to remain gender-accurate
    to the source, in line with the stated philosophy.
  doctrine_reference: Gender-accurate over gender-neutral.
