theological_decisions:
- issue: Voice and agency in ἀπελούσασθε
  chosen_reading: Rendered as passive-like 'you were washed' within a sequence of divine saving acts
  alternative_readings:
  - Rendered reflexively as 'you washed yourselves'
  rationale: The middle form could be taken reflexively, but the surrounding passives ('were sanctified,' 'were justified') and Paul's emphasis on God's saving action favor a passive/effective-middle sense in translation. The alternative is preserved in a footnote because the Greek form does allow discussion.
  doctrine_reference: Preserve theological tension rather than resolve it
- issue: Reference of πνεύματι
  chosen_reading: The Holy Spirit
  alternative_readings:
  - a more general spiritual sphere
  rationale: In Pauline usage, 'the Spirit of our God' naturally refers to the Holy Spirit. Capitalization in English signals this likely referent without adding content beyond the text.
  doctrine_reference: Affirmations; optimal equivalence
revisions:
- timestamp: '2026-04-21T00:47:47Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/nt/1_corinthians/006/011.json
  category: awkward_english
  tier: 1
  from: And some of you were these things.
  to: And such were some of you.
  rationale: The current rendering is an overly literal translation of 'καὶ ταῦτά τινες ἦτε'. While 'ταῦτα' is a neuter plural, it refers back to a list of types of people, not inanimate objects. Stating that people 'were these things' is unnatural in English. The idiomatic rendering 'And such were some of you,' which is already in a footnote, more accurately conveys the sense that they formerly belonged to these categories of people.
