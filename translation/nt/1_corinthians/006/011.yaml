id: 1CO.6.11
reference: 1 Corinthians 6:11
source:
  edition: SBLGNT
  text: καὶ ταῦτά τινες ἦτε· ἀλλὰ ἀπελούσασθε, ἀλλὰ ἡγιάσθητε, ἀλλὰ ἐδικαιώθητε ἐν τῷ ὀνόματι τοῦ κυρίου ⸀Ἰησοῦ καὶ ἐν τῷ πνεύματι τοῦ θεοῦ ἡμῶν.
translation:
  text: And such were some of you. But you were washed, but you were sanctified, but you were justified in the name of the Lord Jesus and by the Spirit of our God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, 'And such were some of you.'
    reason: lexical_alternative
  - marker: b
    text: The Greek form for 'were washed' can also be understood as 'washed yourselves.' In context, many understand it as part of a sequence of God's saving actions.
    reason: alternative_reading
  - marker: c
    text: Or 'And some of you were these things.'.
    reason: previous_rendering
lexical_decisions:
- source_word: καὶ ταῦτά τινες ἦτε
  chosen: And some of you were these things
  alternatives:
  - And such were some of you
  - And some of you used to be like this
  lexicon: BDAG
  rationale: Retains the demonstrative force of ταῦτα ('these things') rather than smoothing immediately to the idiomatic traditional English 'such.' The clause refers back to the vice list in the previous verse. An alternative more idiomatic rendering is preserved in a footnote-worthy alternative list, but the main text keeps the source-text emphasis.
- source_word: ἀλλὰ
  chosen: But
  alternatives:
  - Rather
  - Yet
  lexicon: BDAG
  rationale: Repeated ἀλλά marks strong contrast after the former identity. Rendering each occurrence as 'but' preserves Paul's rhetorical rhythm and emphatic reversal.
- source_word: ἀπελούσασθε
  chosen: you were washed
  alternatives:
  - you washed yourselves
  - you were cleansed
  lexicon: BDAG
  rationale: Although the form is middle, in this context many interpreters understand it in a passive or effective-middle sense within a sequence of divine saving acts ('were sanctified,' 'were justified'). 'You were washed' best matches the likely sense in context and avoids implying self-generated cleansing. The reflexive nuance is preserved in a footnote as an alternative.
- source_word: ἡγιάσθητε
  chosen: you were sanctified
  alternatives:
  - you were made holy
  - you were consecrated
  lexicon: BDAG
  rationale: '''Sanctified'' is the standard theological rendering of ἁγιάζω and fits Paul''s salvation-language here. ''Made holy'' is clearer in some contexts, but ''sanctified'' preserves lexical continuity with Pauline usage.'
- source_word: ἐδικαιώθητε
  chosen: you were justified
  alternatives:
  - you were declared righteous
  - you were acquitted
  lexicon: BDAG
  rationale: δικαιόω in Paul commonly carries forensic covenantal force. 'Justified' is the established and precise rendering; explanatory alternatives are possible but less concise. This is distinct from δικαιοσύνη, so the contested-terms note on 'righteousness/justice' does not directly govern this verb.
- source_word: ἐν τῷ ὀνόματι
  chosen: in the name
  alternatives:
  - through the name
  - on the basis of the name
  lexicon: BDAG
  rationale: A formal rendering preserves the instrumental/locative ambiguity of ἐν. 'In the name' is idiomatic English and leaves intact the sense of agency, authority, and sphere associated with Jesus' name.
- source_word: τοῦ κυρίου Ἰησοῦ
  chosen: of the Lord Jesus
  alternatives:
  - of Lord Jesus
  lexicon: BDAG
  rationale: κύριος is rendered 'Lord' per doctrine guidance. Ἰησοῦς is transliterated as 'Jesus.' No 'Messiah/Christ' issue arises because Χριστός is absent here.
- source_word: ἐν τῷ πνεύματι τοῦ θεοῦ ἡμῶν
  chosen: by the Spirit of our God
  alternatives:
  - in the Spirit of our God
  - by the spirit of our God
  lexicon: BDAG
  rationale: The second ἐν phrase is rendered instrumentally as 'by the Spirit' to communicate agency in natural English and to distinguish the Spirit's role in the saving actions. Capitalized 'Spirit' reflects the likely reference to the Holy Spirit in this Pauline context, not a generic human spirit.
