theological_decisions:
- issue: Rendering of ἄνθρωπος in a generic statement
  chosen_reading: a man
  alternative_readings:
  - a person
  - someone
  rationale: The Greek uses a grammatically masculine singular noun with representative
    force. Following the stated gender-accurate philosophy, the main text preserves
    'man' rather than adopting a gender-neutral substitute, while the generic sense
    is noted in a footnote for clarity.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Interpretive force of Paul's statement about 'every sin' being 'outside the
    body'
  chosen_reading: Translate the clause straightforwardly without softening or resolving
    its debated meaning
  alternative_readings:
  - Interpret as a rhetorical slogan quoted from the Corinthians
  - Interpret as an absolute statement requiring doctrinal qualification
  rationale: The verse is exegetically difficult, but the Greek text itself presents
    the statement directly. The translation should preserve the tension rather than
    importing a harmonizing interpretation into the main text.
  doctrine_reference: DOCTRINE.md Translation philosophy §3
