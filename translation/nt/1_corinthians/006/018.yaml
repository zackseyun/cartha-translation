id: 1CO.6.18
reference: 1 Corinthians 6:18
source:
  edition: SBLGNT
  text: φεύγετε τὴν πορνείαν· πᾶν ἁμάρτημα ὃ ἐὰν ποιήσῃ ἄνθρωπος ἐκτὸς τοῦ σώματός
    ἐστιν, ὁ δὲ πορνεύων εἰς τὸ ἴδιον σῶμα ἁμαρτάνει.
translation:
  text: Flee sexual immorality. Every sin that a man may commit is outside the body,
    but the one who commits sexual immorality sins against his own body.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'that a person may commit.' The Greek says 'a man' (ἄνθρωπος) with a
      representative, generic sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: φεύγετε
  chosen: Flee
  alternatives:
  - Keep fleeing
  - Run from
  lexicon: BDAG
  rationale: Present active imperative, second person plural, calling for ongoing
    avoidance. 'Flee' is concise, idiomatic, and preserves the force of urgent command
    without over-paraphrasing.
- source_word: πορνείαν
  chosen: sexual immorality
  alternatives:
  - fornication
  - sexual sin
  lexicon: BDAG
  rationale: πορνεία broadly denotes illicit sexual behavior, not merely premarital
    intercourse. 'Sexual immorality' is the clearest modern English rendering and
    best captures the term's breadth.
- source_word: πᾶν ἁμάρτημα
  chosen: Every sin
  alternatives:
  - Any sin
  - Every sinful act
  lexicon: BDAG
  rationale: The phrase is generic and comprehensive. 'Every sin' is the most natural
    and sufficiently formal rendering.
- source_word: ὃ ἐὰν ποιήσῃ ἄνθρωπος
  chosen: that a man may commit
  alternatives:
  - that a person may commit
  - whatever a man does
  lexicon: BDAG
  rationale: ἄνθρωπος here is grammatically masculine with representative/generic
    force. Per doctrine, gender-accurate rendering is preferred, so 'a man' is retained
    in the main text rather than neutralizing to 'a person.' The modal nuance of ἐὰν
    with aorist subjunctive is conveyed by 'may commit.'
- source_word: ἐκτὸς τοῦ σώματός ἐστιν
  chosen: is outside the body
  alternatives:
  - is apart from the body
  lexicon: BDAG
  rationale: A straightforward spatial/metaphorical expression. 'Outside the body'
    preserves the Greek wording and Paul's contrast with the following clause.
- source_word: ὁ δὲ πορνεύων
  chosen: the one who commits sexual immorality
  alternatives:
  - the sexually immoral person
  - the one who is sexually immoral
  lexicon: BDAG
  rationale: The substantival present participle denotes the person engaging in the
    act. This rendering keeps the verbal force and links clearly with πορνεία earlier
    in the verse.
- source_word: εἰς τὸ ἴδιον σῶμα ἁμαρτάνει
  chosen: sins against his own body
  alternatives:
  - sins into his own body
  - sins with respect to his own body
  lexicon: BDAG
  rationale: Although εἰς is literally 'into,' in this idiom English 'against' best
    communicates the sense of sin directed toward one's own body. 'His own' reflects
    ἴδιον and maintains the personal reflexive emphasis.
