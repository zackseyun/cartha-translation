theological_decisions:
- issue: Nature of the Genesis citation's implication for sexual union outside marriage
  chosen_reading: Render the citation straightforwardly as grounding Paul's claim
    that sexual union creates a real bodily 'one flesh' union, without importing a
    fuller doctrinal statement about marriage into the verse itself.
  alternative_readings:
  - Treat the citation as applying only to marriage and not analogically to prostitution
  - Expand the translation to make explicit moral conclusions beyond the verse's wording
  rationale: Paul applies Genesis 2:24 analogically to intercourse with a prostitute.
    The translation should preserve that theological force while not adding interpretive
    expansions not stated in the Greek.
  doctrine_reference: Preserve theological tension rather than resolve it.
