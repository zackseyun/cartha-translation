id: 1CO.6.16
reference: 1 Corinthians 6:16
source:
  edition: SBLGNT
  text: ⸀ἢ οὐκ οἴδατε ὅτι ὁ κολλώμενος τῇ πόρνῃ ἓν σῶμά ἐστιν; Ἔσονται γάρ, φησίν,
    οἱ δύο εἰς σάρκα μίαν.
translation:
  text: Or do you not know that the one who joins himself to a prostitute is one body
    with her? For, as he says, “The two will become one flesh.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'the one who is joined to a prostitute is one body.'
    reason: lexical_alternative
  - marker: b
    text: Greek 'he says'; the quotation is from Genesis 2:24.
    reason: cross_reference
lexical_decisions:
- source_word: ἢ
  chosen: Or
  alternatives:
  - Or rather
  - Or do
  lexicon: BDAG
  rationale: Introduces a rhetorical alternative/continuation from the previous argument;
    simple 'Or' preserves Paul's argumentative flow.
- source_word: οὐκ οἴδατε
  chosen: do you not know
  alternatives:
  - do you not realize
  lexicon: BDAG
  rationale: A standard Pauline rhetorical formula. 'Know' is more formally aligned
    with οἶδα while remaining natural English.
- source_word: ὁ κολλώμενος
  chosen: the one who joins himself
  alternatives:
  - he who is joined
  - the one who unites himself
  - the one who clings to
  lexicon: BDAG
  rationale: κολλάομαι can mean join, unite, cling to. Here the sexual-union context
    favors 'joins himself' as clear modern English while preserving the reflexive
    sense of personal attachment.
- source_word: τῇ πόρνῃ
  chosen: to a prostitute
  alternatives:
  - to the prostitute
  - to a sexually immoral woman
  lexicon: BDAG
  rationale: πόρνη specifically denotes a prostitute rather than the broader category
    'sexually immoral woman.' The article is likely generic, so English idiom prefers
    the indefinite 'a prostitute'.
- source_word: ἓν σῶμά ἐστιν
  chosen: is one body with her
  alternatives:
  - is one body
  - becomes one body with her
  lexicon: BDAG
  rationale: The predicate states the resulting union. Adding 'with her' makes explicit
    in English what is implicit in the Greek relationship and avoids awkwardness,
    without changing the sense.
- source_word: Ἔσονται γάρ
  chosen: For ... will become
  alternatives:
  - For ... will be
  lexicon: BDAG
  rationale: In the Genesis citation, future εἰμί with εἰς commonly carries the sense
    'become.' This is the established and contextually accurate English rendering.
- source_word: φησίν
  chosen: as he says
  alternatives:
  - he says
  - it says
  - as Scripture says
  lexicon: BDAG
  rationale: The singular 'he says' reflects the Greek. 'As he says' smoothly introduces
    the scriptural citation without over-specifying the subject in the main text.
- source_word: οἱ δύο
  chosen: The two
  alternatives:
  - the two of them
  lexicon: BDAG
  rationale: Directly reflects the Greek wording of the citation and keeps the quotation
    concise.
- source_word: εἰς σάρκα μίαν
  chosen: one flesh
  alternatives:
  - into one flesh
  lexicon: BDAG
  rationale: This is a literal, established rendering of the Genesis phrase. Here
    σάρξ is literal/relational rather than metaphorical 'sinful nature,' in line with
    the doctrine guidance on sarx.
