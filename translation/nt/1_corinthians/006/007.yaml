id: 1CO.6.7
reference: 1 Corinthians 6:7
source:
  edition: SBLGNT
  text: ἤδη μὲν ⸀οὖν ὅλως ἥττημα ὑμῖν ἐστιν ὅτι κρίματα ἔχετε μεθ’ ἑαυτῶν· διὰ τί
    οὐχὶ μᾶλλον ἀδικεῖσθε; διὰ τί οὐχὶ μᾶλλον ἀποστερεῖσθε;
translation:
  text: Indeed, then, it is already altogether a defeat for you that you have lawsuits
    among yourselves. Why not rather be wronged? Why not rather be defrauded?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'loss' or 'failure' for 'defeat.' The Greek term ἥττημα can denote a
      loss or defeat; 'defeat' is chosen to reflect Paul's rhetorical force.
    reason: lexical_alternative
  - marker: b
    text: Or 'legal cases' for 'lawsuits.' The Greek κρίματα here refers to disputes
      being taken to court.
    reason: lexical_alternative
  - marker: c
    text: Or 'be deprived' for 'be defrauded.' The Greek ἀποστερεῖσθε can mean being
      deprived, cheated, or defrauded.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἤδη
  chosen: already
  alternatives:
  - as it is already
  - by now
  lexicon: BDAG
  rationale: Marks the present state as already reached; Paul says the failure exists
    prior to the outcome of the cases.
- source_word: μὲν οὖν
  chosen: indeed, then
  alternatives:
  - therefore indeed
  - to be sure, then
  lexicon: BDAG
  rationale: Represents the inferential and mildly emphatic connective force without
    overloading the English. The pair signals a transition drawing a conclusion from
    the preceding rebuke.
- source_word: ὅλως
  chosen: altogether
  alternatives:
  - completely
  - in any case
  lexicon: BDAG
  rationale: 'Here it intensifies the assessment: the situation is, in sum, a defeat.
    ''Altogether'' preserves the adverbial force better than omitting it.'
- source_word: ἥττημα
  chosen: defeat
  alternatives:
  - loss
  - failure
  lexicon: BDAG
  rationale: The noun denotes a loss/defeat. 'Defeat' best fits Paul's rhetorical
    point that the very existence of such litigation means they have already lost
    morally, regardless of legal outcome.
- source_word: ὑμῖν ἐστιν
  chosen: it is for you
  alternatives:
  - it is to your shame
  - it is your
  lexicon: BDAG
  rationale: Rendered idiomatically as 'it is ... for you' within the clause 'it is
    already altogether a defeat for you.' This preserves the dative of reference without
    importing 'shame,' which is interpretive.
- source_word: ὅτι
  chosen: that
  alternatives:
  - because
  lexicon: BDAG
  rationale: 'Introduces the content/explanation of the defeat: namely, that they
    have lawsuits among themselves. ''That'' is slightly less interpretive than ''because''
    while still natural in English.'
- source_word: κρίματα
  chosen: lawsuits
  alternatives:
  - legal cases
  - judgments
  lexicon: BDAG
  rationale: In this context of believers taking disputes before courts, 'lawsuits'
    best captures the concrete legal sense. 'Judgments' would be too abstract and
    potentially misleading.
- source_word: μεθ’ ἑαυτῶν
  chosen: among yourselves
  alternatives:
  - with one another
  - against one another
  lexicon: BDAG
  rationale: Expresses internal conflict within the community. 'Among yourselves'
    is idiomatic and reflects the reciprocal sense in context.
- source_word: διὰ τί οὐχὶ μᾶλλον
  chosen: Why not rather
  alternatives:
  - Why do you not instead
  - Why not all the more
  lexicon: BDAG
  rationale: Preserves Paul's rhetorical challenge and the comparative force of μᾶλλον.
- source_word: ἀδικεῖσθε
  chosen: be wronged
  alternatives:
  - suffer injustice
  - be treated unjustly
  lexicon: BDAG
  rationale: Passive sense is clear. 'Be wronged' is concise, natural, and retains
    the ethical dimension of unjust treatment.
- source_word: ἀποστερεῖσθε
  chosen: be defrauded
  alternatives:
  - be cheated
  - be deprived
  lexicon: BDAG
  rationale: The verb can mean deprive/rob/defraud. 'Be defrauded' fits the likely
    material or legal context and preserves the sharper sense of being deprived by
    another.
