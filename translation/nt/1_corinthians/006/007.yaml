theological_decisions:
- issue: Nature of Paul's evaluation of intra-church litigation
  chosen_reading: Rendered ἥττημα as 'defeat' to preserve Paul's moral assessment
    without specifying a doctrinal category beyond the text.
  alternative_readings:
  - loss
  - failure
  rationale: The verse condemns the practice as itself a loss for the community. 'Defeat'
    communicates this strongly while avoiding added theological explanation not explicit
    in the Greek.
  doctrine_reference: 'Translation philosophy: preserve the source text''s plain sense
    without importing doctrinal claims the text does not make.'
