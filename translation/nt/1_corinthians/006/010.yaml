id: 1CO.6.10
reference: 1 Corinthians 6:10
source:
  edition: SBLGNT
  text: οὔτε ⸂κλέπται οὔτε πλεονέκται⸃, ⸀οὐ μέθυσοι, οὐ λοίδοροι, οὐχ ἅρπαγες βασιλείαν
    ⸀θεοῦ κληρονομήσουσιν.
translation:
  text: nor thieves, nor the greedy, nor drunkards, nor revilers, nor swindlers will
    inherit the kingdom of God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'extortioners' for 'swindlers' (ἅρπαγες).
    reason: lexical_alternative
  - marker: b
    text: Or 'the covetous' for 'the greedy' (πλεονέκται).
    reason: lexical_alternative
  - marker: c
    text: That is, they will not receive a share in God's kingdom.
    reason: lexical_alternative
lexical_decisions:
- source_word: κλέπται
  chosen: thieves
  alternatives:
  - stealers
  lexicon: BDAG
  rationale: Standard plural noun for those who steal. 'Thieves' is the natural modern
    English equivalent and fits the vice-list context.
- source_word: πλεονέκται
  chosen: the greedy
  alternatives:
  - the covetous
  - the grasping
  lexicon: BDAG
  rationale: Refers to those characterized by greed or insatiable desire for more,
    often with material connotations. 'The greedy' is clear modern English; 'covetous'
    is more traditional but less accessible.
- source_word: μέθυσοι
  chosen: drunkards
  alternatives:
  - those who get drunk
  lexicon: BDAG
  rationale: Denotes people characterized by drunkenness, not merely those who have
    ever been drunk. 'Drunkards' preserves the vice-list force concisely.
- source_word: λοίδοροι
  chosen: revilers
  alternatives:
  - abusive people
  - slanderers
  lexicon: BDAG
  rationale: Describes verbally abusive, insulting people. 'Revilers' is more formally
    precise in vice-list style, while 'abusive people' is a viable modern alternative.
    'Slanderers' is too narrow because the term includes abusive speech beyond false
    accusation.
- source_word: ἅρπαγες
  chosen: swindlers
  alternatives:
  - robbers
  - extortioners
  lexicon: BDAG
  rationale: In this ethical list the term points to those who seize or exploit for
    gain. 'Swindlers' communicates predatory exploitation in idiomatic modern English.
    'Extortioners' is a traditional rendering and worth preserving; 'robbers' is possible
    but can sound too limited to physical theft.
- source_word: βασιλείαν θεοῦ
  chosen: the kingdom of God
  alternatives:
  - God's kingdom
  lexicon: BDAG
  rationale: Established and accurate rendering for God's reign/kingdom. 'The kingdom
    of God' preserves the phrase's theological resonance in Paul.
- source_word: κληρονομήσουσιν
  chosen: will inherit
  alternatives:
  - will receive as an inheritance
  lexicon: BDAG
  rationale: Future verb meaning to inherit or receive as heir. 'Will inherit' is
    concise, standard, and preserves the eschatological/juridical nuance.
