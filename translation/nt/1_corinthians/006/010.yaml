theological_decisions:
- issue: Vice-list force and inheritance language
  chosen_reading: The verse states that people characterized by these unrepentant
    practices will not inherit God's kingdom.
  alternative_readings:
  - The verse refers to isolated acts without reference to settled pattern of life.
  rationale: The plural substantival terms in a vice list naturally denote classes
    of persons characterized by these behaviors. The translation preserves the list
    without adding interpretive qualifiers into the main text.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather
    than resolve it; readable modern English without importing doctrinal claims.'
