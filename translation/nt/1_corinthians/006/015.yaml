theological_decisions:
- issue: Rendering Χριστός in Pauline body-union language
  chosen_reading: the Messiah
  alternative_readings:
  - Christ
  rationale: The term functions as a title and should be translated per the project's
    default unless context is strongly name-like. Using 'Messiah' preserves the title's
    meaning without altering Paul's theology of believers' union with him.
  doctrine_reference: 'DOCTRINE.md: Contested terms — Χριστός default English ''Messiah''
    where title; ''Christ'' where name-like'
- issue: Force of Paul's repudiation in μὴ γένοιτο
  chosen_reading: May it never be
  alternative_readings:
  - By no means
  - Certainly not
  rationale: The phrase is not merely a negation but an emphatic rejection of an abhorrent
    inference. The chosen rendering preserves the theological and rhetorical intensity
    without importing extra doctrinal content.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it; readable modern English'
