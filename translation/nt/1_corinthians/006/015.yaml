id: 1CO.6.15
reference: 1 Corinthians 6:15
source:
  edition: SBLGNT
  text: οὐκ οἴδατε ὅτι τὰ σώματα ὑμῶν μέλη Χριστοῦ ἐστιν; ἄρας οὖν τὰ μέλη τοῦ Χριστοῦ
    ποιήσω πόρνης μέλη; μὴ γένοιτο.
translation:
  text: Do you not know that your bodies are members of the Messiah? Shall I then
    take the members of the Messiah and make them members of a prostitute? May it
    never be.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Christ' instead of 'the Messiah.' The Greek title Χριστός can function
      either as a translated title ('Messiah') or a name-like form ('Christ').
    reason: alternative_reading
  - marker: b
    text: Or, 'By no means' / 'Certainly not.' Greek μὴ γένοιτο is a strong expression
      of repudiation.
    reason: lexical_alternative
lexical_decisions:
- source_word: σώματα
  chosen: bodies
  alternatives:
  - body parts
  - physical bodies
  lexicon: BDAG
  rationale: The plural refers to the believers' actual embodied selves, not merely
    metaphorical parts. 'Bodies' is the natural and sufficiently literal English rendering
    in Paul's argument about sexual immorality.
- source_word: μέλη
  chosen: members
  alternatives:
  - parts
  - limbs
  lexicon: BDAG
  rationale: Paul uses body imagery with theological force. 'Members' preserves the
    metaphorical sense of bodily parts belonging to a larger whole and fits established
    Pauline usage better than the more anatomical 'limbs' here.
- source_word: Χριστοῦ
  chosen: the Messiah
  alternatives:
  - Christ
  lexicon: BDAG
  rationale: Per doctrine, Χριστός is translated as 'Messiah' where it functions as
    a title rather than a name-like identifier. In this verse it denotes the anointed
    one to whom believers belong.
- source_word: ἄρας
  chosen: take
  alternatives:
  - having taken
  - remove
  - carry off
  lexicon: BDAG
  rationale: 'The participle introduces the contemplated action rhetorically: ''Shall
    I then take...?'' ''Take'' is idiomatic in English and captures the force of seizing
    or appropriating Christ''s members for another union.'
- source_word: ποιήσω
  chosen: make
  alternatives:
  - cause to be
  - turn into
  lexicon: BDAG
  rationale: '''Make'' is the straightforward rendering and preserves the shocking
    rhetorical force of making Christ''s members into members of a prostitute.'
- source_word: πόρνης
  chosen: of a prostitute
  alternatives:
  - of a sexually immoral woman
  - of a harlot
  lexicon: BDAG
  rationale: πόρνη specifically denotes a prostitute in this context, not sexual immorality
    in general. 'Harlot' is archaic, and the broader phrase would weaken the lexical
    specificity.
- source_word: μὴ γένοιτο
  chosen: May it never be
  alternatives:
  - By no means
  - Certainly not
  - Far be it
  lexicon: BDAG
  rationale: This idiomatic optative expresses Paul's emphatic repudiation. 'May it
    never be' preserves both the strength and the volitional flavor better than the
    flatter 'Certainly not.'
- source_word: οὐκ οἴδατε
  chosen: Do you not know
  alternatives:
  - Do you not realize
  - Don't you know
  lexicon: BDAG
  rationale: This keeps Paul's rhetorical question formal enough for the context while
    remaining natural English. It preserves the appeal to knowledge already expected
    of the audience.
