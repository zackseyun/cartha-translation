theological_decisions:
- issue: Rendering of ἀδελφούς in a mixed-gender ecclesial context
  chosen_reading: brothers
  alternative_readings:
  - brothers and sisters
  - fellow believers
  rationale: The source term is masculine plural and likely refers to fellow members
    of the Christian community, not only male siblings. Following the stated philosophy,
    the main text remains gender-accurate to the Greek form while a footnote can clarify
    the representative/inclusive sense.
