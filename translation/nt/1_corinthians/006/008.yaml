id: 1CO.6.8
reference: 1 Corinthians 6:8
source:
  edition: SBLGNT
  text: ἀλλὰ ὑμεῖς ἀδικεῖτε καὶ ἀποστερεῖτε, καὶ ⸀τοῦτο ἀδελφούς.
translation:
  text: But you yourselves do wrong and defraud—and this to brothers.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'brothers and sisters'; the Greek says 'brothers' and can refer to fellow
      believers more broadly.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀλλὰ
  chosen: But
  alternatives:
  - Instead
  - On the contrary
  lexicon: BDAG
  rationale: Marks a strong contrast with the preceding statement; 'But' is natural
    and sufficiently forceful in English.
- source_word: ὑμεῖς
  chosen: you yourselves
  alternatives:
  - you
  - you on your part
  lexicon: BDAG
  rationale: The explicit pronoun is emphatic in Greek. 'You yourselves' preserves
    the emphasis that Paul is placing on the Corinthians' own conduct.
- source_word: ἀδικεῖτε
  chosen: do wrong
  alternatives:
  - act unjustly
  - wrong others
  lexicon: BDAG
  rationale: A broad verb for acting unjustly or wronging someone. 'Do wrong' is concise,
    idiomatic, and preserves the moral force without over-specifying the object.
- source_word: ἀποστερεῖτε
  chosen: defraud
  alternatives:
  - cheat
  - deprive
  - rob
  lexicon: BDAG
  rationale: The verb commonly carries the sense of depriving someone of what is due
    or cheating them. 'Defraud' best fits the legal/economic context of lawsuits in
    this passage, while remaining more precise than 'cheat' and less overstated than
    'rob'.
- source_word: καὶ τοῦτο
  chosen: —and this
  alternatives:
  - and that
  - indeed this
  lexicon: BDAG
  rationale: 'This idiom heightens the offense: not only do they act this way, but
    they do so against fellow believers. The dash helps convey the rhetorical punch
    in natural English.'
- source_word: ἀδελφούς
  chosen: brothers
  alternatives:
  - brothers and sisters
  - fellow believers
  lexicon: BDAG
  rationale: The Greek is grammatically masculine plural and in Pauline usage often
    refers to fellow Christians in a representative sense. Per the gender-accurate
    policy, 'brothers' is retained in the main text, with an inclusive contextual
    note preserved in a footnote.
