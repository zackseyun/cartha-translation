theological_decisions:
- issue: Whether the opening clause is presented as a Corinthian slogan or as Paul's
    own statement
  chosen_reading: 'Render the clause straightforwardly without quotation marks: ''Food
    is for the stomach, and the stomach for food'''
  alternative_readings:
  - Present it in quotation marks as a Corinthian slogan
  - Add an explicit introductory formula such as 'You say'
  rationale: The Greek text itself does not mark quotation. Many interpreters understand
    the line as a slogan Paul cites and then qualifies, but making that explicit in
    the main text would import an interpretive decision not directly signaled by the
    wording. The dash before the corrective clause allows the contrast to be felt
    while preserving the Greek's ambiguity.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Meaning of καταργήσει in relation to food and stomach
  chosen_reading: Express future cessation rather than explicit annihilation
  alternative_readings:
  - God will destroy both
  - God will abolish both
  rationale: Paul's point is that the food-stomach relation is temporary and not determinative
    for sexual ethics. 'Will do away with' preserves that theological point without
    forcing a more material or metaphysical claim than the verb itself requires in
    context.
- issue: Force of 'the Lord for the body'
  chosen_reading: Retain the concise reciprocal wording without expansion
  alternative_readings:
  - the Lord cares for the body
  - the Lord is for the body's good
  rationale: The Greek is terse and parallel to the preceding phrase. Expanding it
    would interpret the exact nature of the Lord's relation to the body beyond what
    the text states. The translation preserves the theological compactness and reciprocity
    of Paul's wording.
  doctrine_reference: Preserve theological tension rather than resolve it.
