id: 1CO.6.13
reference: 1 Corinthians 6:13
source:
  edition: SBLGNT
  text: τὰ βρώματα τῇ κοιλίᾳ, καὶ ἡ κοιλία τοῖς βρώμασιν· ὁ δὲ θεὸς καὶ ταύτην καὶ
    ταῦτα καταργήσει. τὸ δὲ σῶμα οὐ τῇ πορνείᾳ ἀλλὰ τῷ κυρίῳ, καὶ ὁ κύριος τῷ σώματι·
translation:
  text: Food is for the stomach, and the stomach for food—but God will do away with
    both it and them. But the body is not for sexual immorality, but for the Lord,
    and the Lord for the body.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Foods are for the stomach, and the stomach for foods.' The Greek uses
      plurals, but the main text renders the saying idiomatically in English.
    reason: lexical_alternative
  - marker: b
    text: Many interpreters take 'Food is for the stomach, and the stomach for food'
      as a Corinthian slogan that Paul quotes before correcting it.
    reason: alternative_reading
  - marker: c
    text: Or 'God will destroy both this and these.' The verb can also be rendered
      'abolish' or 'render inoperative.'
    reason: lexical_alternative
lexical_decisions:
- source_word: βρώματα
  chosen: Food
  alternatives:
  - foods
  lexicon: BDAG
  rationale: The plural noun can be rendered literally as 'foods,' but idiomatic English
    often uses the mass noun 'food' in proverbial statements. This preserves the generic
    sense without sounding wooden.
- source_word: κοιλίᾳ / κοιλία
  chosen: stomach
  alternatives:
  - belly
  lexicon: BDAG
  rationale: In this context Paul is speaking of bodily appetite and digestion, not
    the womb or inner being. 'Stomach' is the clearest modern English equivalent;
    'belly' is possible but less precise and more colloquial.
- source_word: καταργήσει
  chosen: will do away with
  alternatives:
  - will destroy
  - will abolish
  - will render inoperative
  lexicon: BDAG
  rationale: The verb often carries the sense of bringing something to an end or nullifying
    its function. 'Will do away with' captures the future cessation of the food-stomach
    arrangement without overstating annihilation. 'Destroy' is possible, but may suggest
    physical obliteration more strongly than the context requires.
- source_word: ταύτην καὶ ταῦτα
  chosen: both it and them
  alternatives:
  - both this and these
  - both the one and the others
  lexicon: BDAG
  rationale: The pronouns refer back respectively to 'the stomach' and 'foods.' English
    requires explicit pronominal clarification for naturalness.
- source_word: σῶμα
  chosen: body
  lexicon: BDAG
  rationale: Standard rendering in Paul. The concrete physical body is in view, though
    with theological significance; no contextual reason warrants a more metaphorical
    gloss.
- source_word: πορνείᾳ
  chosen: sexual immorality
  alternatives:
  - fornication
  - sexual sin
  lexicon: BDAG
  rationale: This is the standard accessible rendering for πορνεία in modern English.
    'Fornication' is traditional but archaic/narrower in contemporary usage. 'Sexual
    immorality' preserves the broad category Paul intends.
- source_word: κυρίῳ / κύριος
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Per DOCTRINE.md contested terms, κύριος defaults to 'Lord.' Here it refers
    to Jesus in a theological relation to the believer's body, and 'Lord' preserves
    both Pauline usage and christological weight.
- source_word: δὲ
  chosen: but
  alternatives:
  - now
  - and
  lexicon: BDAG
  rationale: The particle marks contrast between the slogan about food/stomach and
    Paul's corrective statement about the body. 'But' best signals that contrast in
    English.
