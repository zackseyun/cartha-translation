id: 1CO.6.2
reference: 1 Corinthians 6:2
source:
  edition: SBLGNT
  text: ⸀ἢ οὐκ οἴδατε ὅτι οἱ ἅγιοι τὸν κόσμον κρινοῦσιν; καὶ εἰ ἐν ὑμῖν κρίνεται ὁ
    κόσμος, ἀνάξιοί ἐστε κριτηρίων ἐλαχίστων;
translation:
  text: Or do you not know that the saints will judge the world? And if the world
    is judged by you, are you unworthy of the smallest law courts?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''among you'': the Greek phrase can be read more literally as ''if the
      world is judged among you,'' but the sense in context is that the saints participate
      in judging the world.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the least important cases' for 'the smallest law courts.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἢ
  chosen: Or
  alternatives:
  - Or is it that
  lexicon: BDAG
  rationale: Introduces a rhetorical alternative/continuation from the previous argument.
    Simple 'Or' preserves Paul's sharp argumentative flow.
- source_word: οὐκ οἴδατε
  chosen: do you not know
  alternatives:
  - do you not realize
  lexicon: BDAG
  rationale: A standard rhetorical formula in Paul. 'Know' is more formally aligned
    with οἶδα while remaining natural English.
- source_word: οἱ ἅγιοι
  chosen: the saints
  alternatives:
  - the holy ones
  - God's holy people
  lexicon: BDAG
  rationale: ἅγιοι in Pauline usage commonly refers to believers as those set apart
    to God. 'The saints' is concise and traditional without importing canonization
    concepts in context.
- source_word: κόσμον
  chosen: the world
  alternatives:
  - the world order
  - the cosmos
  lexicon: BDAG
  rationale: κόσμος here refers to the world in the broad human/cosmic sense that
    will come under judgment. 'The world' is the most natural and contextually sufficient
    rendering.
- source_word: κρινοῦσιν
  chosen: will judge
  alternatives:
  - will govern
  - will pass judgment on
  lexicon: BDAG
  rationale: Future active indicative points to a future act of judgment. 'Will judge'
    preserves the lexical core of κρίνω and the eschatological force.
- source_word: ἐν ὑμῖν
  chosen: by you
  alternatives:
  - among you
  - in your case
  lexicon: BDAG
  rationale: 'Although literally ''in you/among you,'' in this judicial context the
    phrase is best taken instrumentally or associatively: the world is judged in connection
    with the saints. ''By you'' makes Paul''s point clear in idiomatic English while
    preserving the sense that believers participate in judgment.'
- source_word: κρίνεται
  chosen: is judged
  alternatives:
  - is being judged
  lexicon: BDAG
  rationale: Present passive is used in a conditional clause with a general/future-oriented
    sense. English present passive 'is judged' fits the Greek form and the rhetorical
    argument.
- source_word: ἀνάξιοί ἐστε
  chosen: are you unworthy
  alternatives:
  - are you not competent
  - are you unfit
  lexicon: BDAG
  rationale: ἀνάξιος denotes being unworthy or not fit for something. 'Are you unworthy'
    preserves the evaluative force and rhetorical sting better than the more interpretive
    'not competent.'
- source_word: κριτηρίων
  chosen: law courts
  alternatives:
  - courts
  - tribunals
  - judgment cases
  lexicon: BDAG
  rationale: κριτήριον can denote a court or tribunal, and in this context refers
    to judicial matters among believers. 'Law courts' communicates institutional judicial
    settings more clearly than the less specific 'judgments.'
- source_word: ἐλαχίστων
  chosen: the smallest
  alternatives:
  - the least important
  - very minor
  lexicon: BDAG
  rationale: Superlative adjective modifying κριτηρίων. 'The smallest' is a close
    rendering; in context it implies matters of least significance, but the more literal
    wording is retained in the main text.
