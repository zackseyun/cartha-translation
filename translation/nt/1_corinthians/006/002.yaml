theological_decisions:
- issue: Identity of 'the saints'
  chosen_reading: believers, the people of God, who will participate in eschatological
    judgment
  alternative_readings:
  - a narrower group of especially holy believers
  rationale: In Pauline usage, 'saints' ordinarily refers to Christians generally,
    not an elite subset. The translation keeps the term 'saints' while understanding
    it corporately.
  doctrine_reference: Affirmations; Translation philosophy §5
- issue: Force of believers judging the world
  chosen_reading: real participation in future judgment without specifying the exact
    mode
  alternative_readings:
  - metaphorical moral evaluation only
  - full independent judicial authority
  rationale: The text plainly states that the saints will judge the world, but does
    not define the mechanics. The translation preserves the statement without over-specifying
    how this judgment is exercised.
  doctrine_reference: Translation philosophy §3
