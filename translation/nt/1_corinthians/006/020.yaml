id: 1CO.6.20
reference: 1 Corinthians 6:20
source:
  edition: SBLGNT
  text: ἠγοράσθητε γὰρ τιμῆς· δοξάσατε δὴ τὸν θεὸν ἐν τῷ σώματι ⸀ὑμῶν.
translation:
  text: For you were bought with a price; therefore glorify God in your body.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'For you were purchased for a price.' The Greek keeps the imagery of
      a purchase cost paid.
    reason: lexical_alternative
  - marker: b
    text: Or 'therefore' may be rendered 'then' or left untranslated; the particle
      adds urgency to the command.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἠγοράσθητε
  chosen: were bought
  alternatives:
  - were purchased
  lexicon: BDAG
  rationale: Aorist passive of ἀγοράζω, literally 'buy/purchase.' 'Were bought' is
    natural English and preserves the redemption/purchase metaphor without overformal
    wording.
- source_word: γὰρ
  chosen: For
  alternatives:
  - because
  lexicon: BDAG
  rationale: γάρ gives the reason for the preceding exhortation. 'For' preserves the
    connective force succinctly in English.
- source_word: τιμῆς
  chosen: with a price
  alternatives:
  - for a price
  - at a price
  lexicon: BDAG
  rationale: Genitive of price after ἀγοράζω idiomatically indicates the cost paid.
    'With a price' is a standard and clear English rendering that preserves the commercial
    metaphor.
- source_word: δοξάσατε
  chosen: glorify
  alternatives:
  - honor
  - give glory to
  lexicon: BDAG
  rationale: Aorist imperative calling for decisive action. 'Glorify' best matches
    δοξάζω and retains the theological weight of rendering glory to God.
- source_word: δὴ
  chosen: therefore
  alternatives:
  - then
  - indeed
  - so
  lexicon: BDAG
  rationale: δή adds urgency or inferential force to the command. English often leaves
    it implicit, but 'therefore' captures the exhortational transition from the reason
    just given to the command.
- source_word: ἐν τῷ σώματι ὑμῶν
  chosen: in your body
  alternatives:
  - with your body
  - in your bodies
  lexicon: BDAG
  rationale: The singular σῶμα with plural ὑμῶν is best rendered idiomatically as
    'your body,' preserving Paul's focus on embodied conduct for each member of the
    community. 'In' follows ἐν directly and keeps the locative/instrumental breadth
    without overinterpreting.
