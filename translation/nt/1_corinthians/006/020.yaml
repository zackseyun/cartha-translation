theological_decisions:
- issue: Commercial redemption imagery
  chosen_reading: Retain the purchase metaphor in 'were bought with a price'
  alternative_readings:
  - you were redeemed at a cost
  rationale: Paul's wording explicitly uses marketplace language. Preserving that
    metaphor is important for auditability and avoids importing a narrower doctrinal
    formulation while still fitting orthodox soteriological context.
  doctrine_reference: Translation philosophy §1, §5
- issue: Embodied ethics
  chosen_reading: Translate σῶμα concretely as 'body'
  alternative_readings:
  - self
  - life
  rationale: The immediate context concerns bodily sexual conduct, so a concrete rendering
    preserves Paul's argument and avoids paraphrastic broadening.
  doctrine_reference: Translation philosophy §1, §6
