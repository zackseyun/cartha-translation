theological_decisions:
- issue: Gendered familial and representative language in a mixed congregation
  chosen_reading: wise man ... his brother
  alternative_readings:
  - wise person ... a fellow believer
  - one wise person ... brother or sister
  rationale: The Greek uses masculine singular forms (οὐδεὶς σοφὸς; ἀδελφοῦ αὐτοῦ).
    Following the stated gender-accurate policy, the main text preserves the source's
    grammatical form while a footnote can clarify representative force in context.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
