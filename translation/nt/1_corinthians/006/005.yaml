id: 1CO.6.5
reference: 1 Corinthians 6:5
source:
  edition: SBLGNT
  text: πρὸς ἐντροπὴν ὑμῖν λέγω. οὕτως οὐκ ἔνι ἐν ὑμῖν ⸂οὐδεὶς σοφὸς⸃ ὃς δυνήσεται
    διακρῖναι ἀνὰ μέσον τοῦ ⸀ἀδελφοῦ αὐτοῦ,
translation:
  text: I say this to your shame. Is it really so, that there is not among you even
    one wise man who will be able to judge between his brother and another?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'even one wise person.' The Greek is masculine singular, but Paul addresses
      the whole congregation.
    reason: lexical_alternative
  - marker: b
    text: '''Brother'' here refers to a fellow believer; in context it can include
      a brother or sister in the congregation.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πρὸς ἐντροπὴν
  chosen: to your shame
  alternatives:
  - for your shame
  - to shame you
  lexicon: BDAG
  rationale: The preposition with accusative idiom expresses purpose/result directed
    toward the hearers' shame. 'To your shame' is idiomatic modern English and preserves
    Paul's rebuking force without over-paraphrase.
- source_word: λέγω
  chosen: I say
  alternatives:
  - I am saying
  lexicon: BDAG
  rationale: Simple present is best rendered as an English present here in direct
    discourse.
- source_word: οὕτως
  chosen: Is it really so
  alternatives:
  - So then
  - Thus
  - Is it so
  lexicon: BDAG
  rationale: Here οὕτως introduces an indignant rhetorical inference from the prior
    discussion. Rendering it as a rhetorical 'Is it really so' captures the force
    more naturally in English than a bare 'thus' or 'so'.
- source_word: οὐκ ἔνι ἐν ὑμῖν
  chosen: there is not among you
  alternatives:
  - there is no one among you
  - there is not in your midst
  lexicon: BDAG
  rationale: ἔνι means 'there is/exists,' and with ἐν ὑμῖν refers to the community.
    The chosen wording is natural and keeps the communal setting explicit.
- source_word: οὐδεὶς σοφὸς
  chosen: even one wise man
  alternatives:
  - no wise one
  - no one wise
  - one wise person
  lexicon: BDAG
  rationale: The phrase is masculine singular and likely representative. Per gender-accurate
    policy, 'wise man' preserves the grammatical form; 'even one' brings out the emphatic
    negative. An inclusive alternative is preserved in a footnote because the referent
    is the mixed congregation.
- source_word: δυνήσεται
  chosen: will be able to
  alternatives:
  - can
  lexicon: BDAG
  rationale: Future middle indicates prospective capability. 'Will be able to' preserves
    the future nuance more clearly than simple 'can.'
- source_word: διακρῖναι
  chosen: judge
  alternatives:
  - decide
  - arbitrate
  - distinguish
  lexicon: BDAG
  rationale: In this legal-dispute context, the verb refers to rendering a decision
    between parties. 'Judge' is concise and fits the forensic setting; 'arbitrate'
    is possible but slightly more interpretive.
- source_word: ἀνὰ μέσον
  chosen: between
  alternatives:
  - in the midst of
  - from between
  lexicon: BDAG
  rationale: This prepositional expression idiomatically means 'between' two parties.
- source_word: τοῦ ἀδελφοῦ αὐτοῦ
  chosen: his brother and another
  alternatives:
  - his brother
  - his brother's case
  - one brother and another
  lexicon: BDAG
  rationale: The Greek as transmitted is elliptical after 'between,' with 'his brother'
    standing for one party in a dispute and the second party implied by the context
    and the following verse. Supplying 'and another' makes the English intelligible
    while staying close to the sense. 'Brother' is retained rather than 'believer'
    to preserve the familial language, with inclusivity noted in a footnote.
