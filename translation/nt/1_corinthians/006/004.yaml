id: 1CO.6.4
reference: 1 Corinthians 6:4
source:
  edition: SBLGNT
  text: βιωτικὰ μὲν οὖν κριτήρια ἐὰν ἔχητε, τοὺς ἐξουθενημένους ἐν τῇ ἐκκλησίᾳ, τούτους
    καθίζετε;
translation:
  text: So if you have courts for matters of this life, do you appoint as judges those
    who are of no standing in the church?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'matters of everyday life'; the Greek refers to ordinary earthly or
      civil affairs.
    reason: lexical_alternative
  - marker: b
    text: Or, 'those who are despised in the church.' The Greek expression may refer
      ironically either to people regarded as insignificant within the church or to
      those with no standing from the church's perspective.
    reason: alternative_reading
  - marker: c
    text: 'Some understand this clause as a sarcastic imperative: ''appoint those
      of no standing in the church as judges.'''
    reason: alternative_reading
lexical_decisions:
- source_word: βιωτικὰ
  chosen: of this life
  alternatives:
  - worldly
  - pertaining to everyday life
  - secular
  lexicon: BDAG
  rationale: The adjective refers to matters belonging to ordinary earthly life, especially
    civil or temporal affairs. 'Of this life' is natural English and avoids the potentially
    misleading moral sense of 'worldly.'
- source_word: κριτήρια
  chosen: courts
  alternatives:
  - tribunals
  - cases
  - judgments
  lexicon: BDAG
  rationale: The noun can denote law-courts or judicial proceedings. In this context
    of believers taking disputes before secular adjudication, 'courts' best captures
    the institutional sense, while still allowing the rhetorical force of Paul's rebuke.
- source_word: ἐὰν ἔχητε
  chosen: if you have
  alternatives:
  - if you hold
  - if you possess
  lexicon: BDAG
  rationale: A straightforward conditional expression. 'If you have' is idiomatic
    and preserves the conditional setup of the Greek.
- source_word: τοὺς ἐξουθενημένους
  chosen: those who are of no standing
  alternatives:
  - those who are despised
  - those who are looked down on
  - those who are of little account
  lexicon: BDAG
  rationale: The participle means those treated as nothing or held in contempt. In
    context it likely refers ironically to persons regarded as insignificant by the
    church, or possibly outsiders whom the church regards as having no standing. 'Of
    no standing' preserves the social/judicial nuance without overcommitting to one
    interpretive option.
- source_word: ἐν τῇ ἐκκλησίᾳ
  chosen: in the church
  alternatives:
  - by the church
  - in the assembly
  lexicon: BDAG
  rationale: The phrase most naturally locates the evaluation with reference to the
    church community. 'In the church' is the most direct rendering, while leaving
    open whether the sense is 'within the church's estimation' or 'within the church
    community.'
- source_word: τούτους καθίζετε
  chosen: do you appoint as judges
  alternatives:
  - do you seat these as judges
  - seat these
  - appoint these
  lexicon: BDAG
  rationale: καθίζω literally means 'seat,' but in judicial context it can mean to
    seat or appoint for judgment. 'Appoint as judges' makes the implied judicial function
    explicit in clear English while preserving the rhetorical question.
