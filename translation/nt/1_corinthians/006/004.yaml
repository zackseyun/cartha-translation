theological_decisions:
- issue: Interpretation of Paul's rhetorical question and the identity of 'the despised'
  chosen_reading: 'Render the verse as a rebuke: ''do you appoint as judges those
    who are of no standing in the church?'''
  alternative_readings:
  - 'Render as an imperative: ''appoint those of no standing in the church as judges'''
  - Interpret 'those who are of no standing' as secular outsiders rather than insignificant
    insiders
  rationale: The Greek wording is syntactically difficult and has been taken either
    as a sarcastic imperative or as a rhetorical question. The punctuation of the
    SBLGNT supports the interrogative reading, and the immediate context of rebuke
    in 6:1–6 fits this well. The translation preserves some ambiguity in 'of no standing
    in the church,' allowing readers to see the social irony without forcing a narrow
    identification.
  doctrine_reference: Translation philosophy §3, preserve theological tension rather
    than resolve it
