id: 1CO.6.19
reference: 1 Corinthians 6:19
source:
  edition: SBLGNT
  text: ἢ οὐκ οἴδατε ὅτι τὸ σῶμα ὑμῶν ναὸς τοῦ ἐν ὑμῖν ἁγίου πνεύματός ἐστιν, οὗ ἔχετε
    ἀπὸ θεοῦ; καὶ οὐκ ἐστὲ ἑαυτῶν,
translation:
  text: Or do you not know that your body is a temple of the Holy Spirit in you, whom
    you have from God? And you are not your own,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'of the Holy Spirit who is in you.'
    reason: lexical_alternative
  - marker: b
    text: The Greek has singular 'body' with plural 'your,' which may be understood
      distributively ('each of your bodies') or representatively.
    reason: alternative_reading
lexical_decisions:
- source_word: ἢ
  chosen: Or
  alternatives:
  - Or else
  - Or do
  lexicon: BDAG
  rationale: Introduces a rhetorical alternative/continuation from the preceding argument.
    'Or' preserves Paul's sharp rhetorical transition better than smoothing it away.
- source_word: οὐκ οἴδατε
  chosen: do you not know
  alternatives:
  - do you not realize
  - do you not understand
  lexicon: BDAG
  rationale: A standard Pauline rhetorical formula. 'Know' closely matches οἶδα while
    remaining natural in English.
- source_word: σῶμα
  chosen: body
  alternatives:
  - bodily self
  lexicon: BDAG
  rationale: The plain sense is the physical body, which is central to Paul's argument
    about sexual immorality in the immediate context. No expansion beyond the lexical
    sense is warranted.
- source_word: ναὸς
  chosen: temple
  alternatives:
  - sanctuary
  - shrine
  lexicon: BDAG
  rationale: ναός refers specifically to a temple/sanctuary, not merely a sacred precinct.
    'Temple' is the clearest and most idiomatic English rendering, preserving the
    sacred-force of the metaphor.
- source_word: τοῦ ἐν ὑμῖν ἁγίου πνεύματός
  chosen: of the Holy Spirit in you
  alternatives:
  - of the Holy Spirit who is in you
  - of the Holy Spirit within you
  lexicon: BDAG
  rationale: 'The genitive construction modifies ''temple'': the body is a temple
    belonging to or characterized by the Holy Spirit who is in them. ''In you'' preserves
    the prepositional phrase ἐν ὑμῖν without overinterpreting it.'
- source_word: οὗ
  chosen: whom
  alternatives:
  - which
  - that
  lexicon: BDAG
  rationale: The relative pronoun refers to the Holy Spirit, a personal referent.
    English 'whom' best reflects that personal reference and aligns with orthodox
    Trinitarian reading without importing anything beyond the grammar.
- source_word: ἔχετε ἀπὸ θεοῦ
  chosen: you have from God
  alternatives:
  - you received from God
  - you possess from God
  lexicon: BDAG
  rationale: ἔχετε is present 'have,' not explicitly 'received,' though reception
    is implied by ἀπὸ θεοῦ. 'Have from God' stays closer to the Greek while remaining
    clear.
- source_word: καὶ οὐκ ἐστὲ ἑαυτῶν
  chosen: And you are not your own
  alternatives:
  - and you do not belong to yourselves
  - and you are not of yourselves
  lexicon: BDAG
  rationale: 'This concise rendering preserves the idiomatic force of the genitive
    reflexive construction: they do not belong to themselves. ''You are not your own''
    is both literal and natural, and it prepares for the next verse''s rationale.'
