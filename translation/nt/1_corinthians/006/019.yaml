theological_decisions:
- issue: Referent and personhood of the relative pronoun οὗ
  chosen_reading: The pronoun refers to the Holy Spirit and is rendered personally
    as 'whom.'
  alternative_readings:
  - Render impersonally as 'which'
  - Restructure as 'the Holy Spirit, who is in you, whom you have from God'
  rationale: Because οὗ is grammatically linked to ἁγίου πνεύματός, the referent is
    the Holy Spirit. Rendering it personally reflects the Greek referent and coheres
    with historic orthodox Trinitarian doctrine without adding extra doctrinal wording.
  doctrine_reference: 'Affirmations: Nicene Creed (381 AD, including the homoousios
    language)'
- issue: Singular 'body' with plural audience
  chosen_reading: Retain singular 'your body' rather than pluralizing to 'your bodies.'
  alternative_readings:
  - your bodies
  rationale: The Greek text has singular τὸ σῶμα with plural ὑμῶν. Retaining the singular
    preserves the source wording and the possibility that Paul speaks either distributively
    to each believer or representatively. The translation should preserve that tension
    rather than resolve it.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
