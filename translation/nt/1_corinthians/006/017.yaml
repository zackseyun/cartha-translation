id: 1CO.6.17
reference: 1 Corinthians 6:17
source:
  edition: SBLGNT
  text: ὁ δὲ κολλώμενος τῷ κυρίῳ ἓν πνεῦμά ἐστιν.
translation:
  text: But the one who joins himself to the Lord is one spirit with him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'is joined to the Lord.' The Greek verb can be rendered either with reflexive
      force ('joins himself to') or as a passive-like expression ('is joined to').
    reason: lexical_alternative
  - marker: b
    text: Or simply 'is one spirit.' 'With him' is implicit in the Greek and added
      for clarity in English.
    reason: lexical_alternative
  - marker: c
    text: '''Spirit'' could be capitalized by some interpreters, but the phrase most
      naturally means that the believer is united with the Lord in one spirit.'
    reason: alternative_reading
lexical_decisions:
- source_word: κολλώμενος
  chosen: joins himself to
  alternatives:
  - is joined to
  - clings to
  - unites himself with
  lexicon: BDAG
  rationale: The participle from κολλάομαι denotes close attachment or joining. In
    this context, Paul contrasts sexual union in the previous verse with union with
    the Lord, so 'joins himself to' preserves the relational and bodily resonance
    without sounding overly wooden. 'Is joined to' is possible, but the middle/passive
    form here can naturally be rendered in English with reflexive force.
- source_word: κύριος
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Per doctrine defaults, κύριος is rendered 'Lord.' In Pauline usage here
    it refers to the risen Jesus and carries theological weight beyond mere authority.
- source_word: ἓν
  chosen: one
  lexicon: BDAG
  rationale: The numeral/adjective straightforwardly means 'one' and expresses unity
    rather than mere harmony.
- source_word: πνεῦμα
  chosen: spirit
  alternatives:
  - Spirit
  lexicon: BDAG
  rationale: Lowercase 'spirit' is preferred because the phrase ἓν πνεῦμά ἐστιν most
    naturally describes the believer and the Lord as being 'one spirit' in union,
    not identifying them as the Holy Spirit himself. The capitalization question is
    interpretive in English, since Greek manuscripts do not distinguish case here.
- source_word: ὁ δὲ ... ἐστιν
  chosen: But the one who ... is
  alternatives:
  - But whoever ... is
  - But he who ... is
  lexicon: Greek grammar
  rationale: 'The article plus participle functions substantivally: ''the one who
    joins himself.'' This is gender-accurate to the Greek singular masculine while
    still idiomatic in English and representative in force.'
