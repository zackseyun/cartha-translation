theological_decisions:
- issue: Nature of the union expressed in 'one spirit'
  chosen_reading: The phrase expresses real spiritual union with the Lord without
    collapsing the distinction between the believer and the Lord.
  alternative_readings:
  - A stronger mystical identification
  - A looser sense of shared attitude or purpose only
  rationale: In context Paul contrasts bodily union with a prostitute (v. 16) and
    spiritual union with the Lord. The translation should preserve the strength of
    the union language while avoiding wording that implies ontological fusion or identity.
    'One spirit with him' makes the relational sense explicit in English.
  doctrine_reference: Affirmations; Translation philosophy §3
- issue: Supplying 'with him' in English
  chosen_reading: Include 'with him' for clarity.
  alternative_readings:
  - Omit the phrase and render simply 'is one spirit'
  rationale: Greek can leave the relational complement implicit, but English readers
    may otherwise hear an incomplete predicate. Adding 'with him' clarifies that the
    unity is between the believer and the Lord and reflects the sense of the construction
    in context.
  doctrine_reference: 'Translation philosophy: optimal equivalence'
