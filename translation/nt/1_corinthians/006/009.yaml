id: 1CO.6.9
reference: 1 Corinthians 6:9
source:
  edition: SBLGNT
  text: Ἢ οὐκ οἴδατε ὅτι ἄδικοι ⸂θεοῦ βασιλείαν⸃ οὐ κληρονομήσουσιν; μὴ πλανᾶσθε·
    οὔτε πόρνοι οὔτε εἰδωλολάτραι οὔτε μοιχοὶ οὔτε μαλακοὶ οὔτε ἀρσενοκοῖται
translation:
  text: 'Or do you not know that the unrighteous will not inherit the kingdom of God?
    Do not be deceived: neither the sexually immoral, nor idolaters, nor adulterers,
    nor passive homosexual partners, nor men who have sex with men'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'effeminate men,' 'soft men,' or possibly 'male prostitutes' for μαλακοί;
      the term can denote softness, effeminacy, moral weakness, or in this context
      possibly the passive partner in male-male intercourse.
    reason: lexical_alternative
  - marker: b
    text: Or 'men who practice homosexuality,' 'sodomites,' or more broadly 'men who
      engage in illicit sex with males' for ἀρσενοκοῖται; the term is rare and debated,
      though many connect it to the wording of Leviticus in Greek.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἢ
  chosen: Or
  alternatives:
  - Or is it that
  - Or
  lexicon: BDAG
  rationale: Introduces a rhetorical continuation from the previous argument; 'Or'
    preserves Paul's sharp corrective transition.
- source_word: οὐκ οἴδατε
  chosen: do you not know
  alternatives:
  - do you not realize
  lexicon: BDAG
  rationale: A standard rhetorical formula in Paul. 'Know' is more formally aligned
    with οἶδα while remaining natural English.
- source_word: ἄδικοι
  chosen: the unrighteous
  alternatives:
  - wrongdoers
  - the unjust
  lexicon: BDAG
  rationale: Retains the moral-ethical category with theological resonance. 'Wrongdoers'
    is possible but narrows the term to acts rather than character/status.
- source_word: θεοῦ βασιλείαν
  chosen: the kingdom of God
  alternatives:
  - God's kingdom
  lexicon: BDAG
  rationale: Standard and transparent rendering of the genitive construction; preserves
    biblical idiom.
- source_word: κληρονομήσουσιν
  chosen: will not inherit
  alternatives:
  - will not receive as an inheritance
  - will not have a share in
  lexicon: BDAG
  rationale: '''Inherit'' is the established and accurate rendering for κληρονομέω,
    preserving covenantal and eschatological overtones.'
- source_word: μὴ πλανᾶσθε
  chosen: Do not be deceived
  alternatives:
  - Do not be led astray
  - Stop deceiving yourselves
  lexicon: BDAG
  rationale: Natural imperative/passive rendering that preserves the warning against
    moral and theological self-deception.
- source_word: πόρνοι
  chosen: the sexually immoral
  alternatives:
  - fornicators
  - the sexually immoral persons
  lexicon: BDAG
  rationale: Broad term for sexual immorality; 'fornicators' is archaic and too narrow
    for modern readers.
- source_word: εἰδωλολάτραι
  chosen: idolaters
  alternatives:
  - those who worship idols
  lexicon: BDAG
  rationale: Direct and standard rendering; concise and readily understood.
- source_word: μοιχοὶ
  chosen: adulterers
  alternatives:
  - those who commit adultery
  lexicon: BDAG
  rationale: Straightforward lexical equivalent preserving the marital-specific sexual
    sin in view.
- source_word: μαλακοὶ
  chosen: passive homosexual partners
  alternatives:
  - soft men
  - effeminate men
  lexicon: BDAG
  rationale: In this vice list, the term likely carries a sexual sense rather than
    merely 'soft' or 'self-indulgent.' This rendering attempts to reflect the probable
    referent in relation to the following term while avoiding anachronistic identity
    language.
- source_word: ἀρσενοκοῖται
  chosen: men who have sex with men
  alternatives:
  - sodomites
  - men who practice homosexuality
  - male same-sex offenders
  lexicon: BDAG
  rationale: A difficult and debated term, but its components and likely Levitical
    background point to male-male sexual activity. This rendering is descriptive rather
    than identity-based and is more transparent than traditional but potentially misleading
    labels.
