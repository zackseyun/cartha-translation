theological_decisions:
- issue: Rendering of μαλακοὶ and ἀρσενοκοῖται in a contested vice list
  chosen_reading: Rendered as 'passive homosexual partners' and 'men who have sex
    with men' in sequence
  alternative_readings:
  - '''effeminate'' and ''sodomites'''
  - '''male prostitutes'' and ''homosexual offenders'''
  - '''the sexually immoral'' subsuming both terms more generally'
  rationale: These two terms are among the most disputed in Pauline vice lists. The
    chosen rendering reflects a common interpretation that the pair refers to participants
    in male-male sexual acts, while avoiding modern identity categories as such. Because
    the terms are contested and lexical precision is debated, alternatives are preserved
    in footnotes rather than silently excluded.
  doctrine_reference: Preserve theological tension rather than resolve it; document
    contested interpretive questions and preserve alternatives in footnotes.
