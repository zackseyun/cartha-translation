id: 1CO.6.6
reference: 1 Corinthians 6:6
source:
  edition: SBLGNT
  text: ἀλλὰ ἀδελφὸς μετὰ ἀδελφοῦ κρίνεται, καὶ τοῦτο ἐπὶ ἀπίστων;
translation:
  text: But brother goes to court against brother, and this before unbelievers?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'before the unbelievers.' The phrase likely refers to secular courts
      staffed by those outside the church, but the Greek says simply 'before unbelievers.'
    reason: lexical_alternative
  - marker: b
    text: The repeated 'brother' refers to fellow members of the Christian community.
    reason: cultural_note
lexical_decisions:
- source_word: ἀλλὰ
  chosen: But
  alternatives:
  - Instead
  - Rather
  lexicon: BDAG
  rationale: Strong adversative contrasting the ideal of internal judgment in the
    previous verse with the shameful reality Paul now states.
- source_word: ἀδελφὸς ... ἀδελφοῦ
  chosen: brother ... brother
  alternatives:
  - one brother ... another
  - a brother ... his brother
  lexicon: BDAG
  rationale: The repeated singular ἀδελφός is retained as 'brother' to match the masculine
    singular form and Paul's familial language for fellow believers. This is gender-accurate
    to the Greek while functioning representatively for members of the Christian community.
- source_word: μετὰ
  chosen: against
  alternatives:
  - with
  lexicon: BDAG
  rationale: Although μετά with the genitive often means 'with,' in legal-conflict
    context with κρίνεται it indicates opposition between parties in a dispute. 'Against'
    makes the adversarial sense explicit in natural English.
- source_word: κρίνεται
  chosen: goes to court
  alternatives:
  - is judged
  - has a lawsuit
  - is brought to trial
  lexicon: BDAG
  rationale: The middle/passive form of κρίνω here is used in the forensic sense within
    the immediate context of lawsuits. 'Goes to court' communicates the legal action
    more clearly than the overly literal 'is judged.'
- source_word: καὶ τοῦτο
  chosen: and this
  alternatives:
  - and that
  - and indeed this
  lexicon: BDAG
  rationale: 'This idiom adds rhetorical shock: not only is there litigation between
    believers, but it is happening in a particularly shameful setting.'
- source_word: ἐπὶ ἀπίστων
  chosen: before unbelievers
  alternatives:
  - before the unbelievers
  - in the presence of unbelievers
  - before unbelieving judges
  lexicon: BDAG
  rationale: ἐπί with the genitive here conveys the setting or audience before whom
    the case is heard. 'Before unbelievers' is broad enough to reflect the Greek without
    adding 'judges,' though that is implied by the legal context.
