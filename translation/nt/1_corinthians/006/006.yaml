theological_decisions:
- issue: Rendering ἀδελφός in a representative sense within the church
  chosen_reading: brother
  alternative_readings:
  - fellow believer
  - brother or sister
  rationale: Following the stated gender-accurate philosophy, the masculine singular
    is preserved as 'brother' rather than neutralizing the term. The context clearly
    concerns disputes among Christians generally, so the representative force is acknowledged
    in documentation rather than flattened in the main text.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Scope of ἀπίστων
  chosen_reading: unbelievers
  alternative_readings:
  - unbelieving judges
  - pagans
  - outsiders
  rationale: Paul's contrast is between the church and those outside the faith. 'Unbelievers'
    preserves that contrast without importing a narrower identification than the Greek
    states.
