- issue: Resurrection reference in the future clause
  chosen_reading: future bodily resurrection of believers
  alternative_readings:
  - general divine vindication or metaphorical spiritual raising
  rationale: The immediate context concerns the body (6:13-20), and the parallel with
    'God raised the Lord' strongly supports an actual future resurrection of believers
    rather than a merely metaphorical sense.
