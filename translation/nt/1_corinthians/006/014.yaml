id: 1CO.6.14
reference: 1 Corinthians 6:14
source:
  edition: SBLGNT
  text: ὁ δὲ θεὸς καὶ τὸν κύριον ἤγειρεν καὶ ἡμᾶς ἐξεγερεῖ διὰ τῆς δυνάμεως αὐτοῦ.
translation:
  text: And God raised the Lord and will also raise us by his power.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: δὲ
  chosen: And
  alternatives:
  - Now
  - But
  lexicon: BDAG
  rationale: Here δέ functions as a mild connective continuing Paul's argument rather
    than marking a strong contrast, so 'And' gives natural English flow without overstating
    adversative force.
- source_word: θεὸς
  chosen: God
  lexicon: BDAG
  rationale: Standard rendering for θεός; the subject is explicitly God as the one
    acting in resurrection.
- source_word: τὸν κύριον
  chosen: the Lord
  alternatives:
  - the Master
  lexicon: BDAG
  rationale: κύριος is rendered by the project's default as 'Lord.' In this context
    it refers to Jesus and functions as a christological title, so 'the Lord' is appropriate
    and consistent.
- source_word: ἤγειρεν
  chosen: raised
  alternatives:
  - raised up
  lexicon: BDAG
  rationale: Aorist of ἐγείρω referring to God's past act of raising Jesus from the
    dead. 'Raised' is clear, idiomatic, and preserves the resurrection sense without
    unnecessary expansion.
- source_word: ἡμᾶς
  chosen: us
  lexicon: BDAG
  rationale: Direct object referring to believers inclusively; simple first-person
    plural pronoun is sufficient.
- source_word: ἐξεγερεῖ
  chosen: will also raise
  alternatives:
  - will raise up also
  - will awaken
  lexicon: BDAG
  rationale: Future of ἐξεγείρω, parallel to the prior resurrection verb but with
    the prefix ἐξ-. English normally does not preserve a meaningful distinction here,
    so 'will also raise' captures both the future tense and the καί-linked parallel
    with Christ's resurrection.
- source_word: διὰ τῆς δυνάμεως αὐτοῦ
  chosen: by his power
  alternatives:
  - through his power
  lexicon: BDAG
  rationale: διά with the genitive commonly expresses means or instrumentality. 'By
    his power' is idiomatic English and clearly conveys that God's power is the means
    of our resurrection.
