theological_decisions:
- issue: Whether to mark Πάντα μοι ἔξεστιν as a Corinthian slogan
  chosen_reading: 'Render the repeated clause in quotation marks as a slogan: “All
    things are lawful for me”'
  alternative_readings:
  - Render without quotation marks as Paul's own statement qualified by the following
    clauses
  rationale: Many interpreters understand this as a Corinthian catchphrase that Paul
    cites and corrects. The Greek manuscripts lacked quotation marks, so this is interpretive
    rather than textual. Quotation marks help modern readers follow the rhetoric without
    changing the wording. Because the interpretation is plausible but not explicit
    in the Greek, the translation preserves the exact clause and documents the decision
    here.
  doctrine_reference: Preserve theological tension rather than resolve it; document
    genuine interpretive ambiguity.
