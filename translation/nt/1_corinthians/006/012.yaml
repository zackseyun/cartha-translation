id: 1CO.6.12
reference: 1 Corinthians 6:12
source:
  edition: SBLGNT
  text: Πάντα μοι ἔξεστιν· ἀλλ’ οὐ πάντα συμφέρει. πάντα μοι ἔξεστιν· ἀλλ’ οὐκ ἐγὼ
    ἐξουσιασθήσομαι ὑπό τινος.
translation:
  text: “All things are lawful for me,” but not all things are beneficial. “All things
    are lawful for me,” but I will not be mastered by anything.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or, without quotation marks: All things are lawful for me. Many understand
      this clause as a Corinthian slogan that Paul quotes and then qualifies.'
    reason: alternative_reading
  - marker: b
    text: Or 'profitable' or 'helpful' for beneficial.
    reason: lexical_alternative
  - marker: c
    text: Or 'I will not be brought under the power of anything.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Πάντα
  chosen: All things
  alternatives:
  - Everything
  lexicon: BDAG
  rationale: Neuter plural used comprehensively. 'All things' preserves the slogan-like
    breadth and matches the repeated structure better than the more idiomatic 'everything.'
- source_word: μοι
  chosen: for me
  alternatives:
  - to me
  lexicon: BDAG
  rationale: With ἔξεστιν, the dative marks the person for whom something is permitted.
    'For me' is the most natural English idiom.
- source_word: ἔξεστιν
  chosen: are lawful
  alternatives:
  - are permitted
  - are allowed
  lexicon: BDAG
  rationale: The verb denotes what is permitted or lawful. 'Are lawful' preserves
    the likely slogan form and its ethical/juridical nuance in Paul's rebuttal; 'permitted'
    is possible but slightly flatter.
- source_word: ἀλλ’ οὐ πάντα συμφέρει
  chosen: but not all things are beneficial
  alternatives:
  - but not all things are profitable
  - but not everything is helpful
  lexicon: BDAG
  rationale: συμφέρει here means to be advantageous or beneficial. 'Beneficial' keeps
    the evaluative force without sounding overly commercial ('profitable') or too
    colloquial ('helpful'). Repeating 'all things' mirrors the Greek.
- source_word: οὐκ ἐγὼ
  chosen: but I will not
  alternatives:
  - but I myself will not
  lexicon: BDAG
  rationale: The explicit ἐγώ adds emphasis. English can reflect this adequately with
    the clause structure 'but I will not'; adding 'myself' would overemphasize in
    English.
- source_word: ἐξουσιασθήσομαι
  chosen: be mastered
  alternatives:
  - be dominated
  - be brought under the power
  lexicon: BDAG
  rationale: Future passive of ἐξουσιάζω means to be controlled by or subjected to
    the authority/power of something. 'Be mastered' is concise, idiomatic, and preserves
    the authority nuance. 'Brought under the power' is traditional and accurate but
    less direct in modern English.
- source_word: ὑπό τινος
  chosen: by anything
  alternatives:
  - by anyone
  - by anything at all
  lexicon: BDAG
  rationale: The indefinite τινος is grammatically broad and, in this context of behaviors/things,
    is best rendered non-personally as 'anything,' while still allowing the principle
    to extend generally. This fits the immediate discussion of permissible actions
    and appetites.
