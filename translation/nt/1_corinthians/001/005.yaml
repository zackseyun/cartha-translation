id: 1CO.1.5
reference: 1 Corinthians 1:5
source:
  edition: SBLGNT
  text: ὅτι ἐν παντὶ ἐπλουτίσθητε ἐν αὐτῷ, ἐν παντὶ λόγῳ καὶ πάσῃ γνώσει,
translation:
  text: because in him you were enriched in every way, in all speech and all knowledge,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ὅτι
  chosen: because
  alternatives:
  - that
  lexicon: BDAG
  rationale: In context, this clause gives the ground for Paul's thanksgiving in the
    previous verse, so the causal sense 'because' is clearer in English than a bare
    'that'.
- source_word: ἐν παντὶ
  chosen: in every way
  alternatives:
  - in everything
  lexicon: BDAG
  rationale: The neuter singular with ἐν is idiomatic and broad; 'in every way' communicates
    comprehensive enrichment more naturally than the more wooden 'in everything.'
- source_word: ἐπλουτίσθητε
  chosen: were enriched
  alternatives:
  - became rich
  - were made rich
  lexicon: BDAG
  rationale: The aorist passive indicates that the Corinthians received richness from
    another source. 'Were enriched' preserves both the passive force and the metaphor
    without sounding overly material.
- source_word: ἐν αὐτῷ
  chosen: in him
  alternatives:
  - by him
  - through him
  lexicon: BDAG
  rationale: The preposition ἐν most naturally expresses sphere or union here. 'In
    him' preserves Paul's recurring union-with-Christ language and should not be paraphrased
    away.
- source_word: ἐν παντὶ λόγῳ
  chosen: in all speech
  alternatives:
  - in every kind of speech
  - in all utterance
  - in all speaking
  lexicon: BDAG
  rationale: λόγος can mean word, message, account, or speech. In this pairing with
    γνώσις, it most likely refers to verbal expression or speaking ability, so 'speech'
    is the clearest concise rendering.
- source_word: πάσῃ γνώσει
  chosen: all knowledge
  alternatives:
  - every kind of knowledge
  lexicon: BDAG
  rationale: γνῶσις here refers to knowledge in a broad sense. 'All knowledge' mirrors
    the Greek structure and matches the parallelism with 'all speech' while remaining
    natural English.
