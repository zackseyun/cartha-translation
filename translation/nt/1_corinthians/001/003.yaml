theological_decisions:
- issue: Whether to preserve the shared source relationship of grace and peace to
    both the Father and Jesus.
  chosen_reading: Rendered a single 'from' governing both 'God our Father' and 'the
    Lord Jesus Messiah.'
  alternative_readings:
  - Repeated 'from' before 'the Lord Jesus Messiah'
  - Restructured the clause to soften the coordination
  rationale: The Greek presents both figures under the same preposition ἀπό. Preserving
    that coordination reflects the text's wording without adding doctrinal explanation
    beyond what the verse itself states.
  doctrine_reference: Nicene Creed (381 AD), within bounds but not imported beyond
    the text
