id: 1CO.1.3
reference: 1 Corinthians 1:3
source:
  edition: SBLGNT
  text: χάρις ὑμῖν καὶ εἰρήνη ἀπὸ θεοῦ πατρὸς ἡμῶν καὶ κυρίου Ἰησοῦ Χριστοῦ.
translation:
  text: Grace to you and peace from God our Father and the Lord Jesus Messiah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or: ''the Lord Jesus Christ.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: χάρις
  chosen: Grace
  alternatives:
  - favor
  - grace
  lexicon: BDAG
  rationale: Standard Pauline greeting term; 'grace' preserves both theological weight
    and the established semantic range better than a flatter option like 'favor'.
- source_word: ὑμῖν
  chosen: to you
  alternatives:
  - for you
  lexicon: BDAG
  rationale: The dative in epistolary blessing style is most naturally rendered 'to
    you' in English.
- source_word: εἰρήνη
  chosen: peace
  alternatives:
  - well-being
  lexicon: BDAG
  rationale: '''Peace'' is the natural and established rendering, preserving both
    relational and covenantal resonance in Paul''s greeting.'
- source_word: ἀπὸ
  chosen: from
  alternatives:
  - coming from
  lexicon: BDAG
  rationale: A direct rendering that cleanly marks source without unnecessary expansion.
- source_word: θεοῦ πατρὸς ἡμῶν
  chosen: God our Father
  alternatives:
  - God, our Father
  - our God and Father
  lexicon: BDAG
  rationale: The genitive construction is naturally rendered appositionally as 'God
    our Father.' 'Our God and Father' would suggest a different structure than the
    Greek here.
- source_word: κυρίου
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Follows the project's default rendering for κύριος and preserves the
    title's theological force.
- source_word: Ἰησοῦ Χριστοῦ
  chosen: Jesus Messiah
  alternatives:
  - Jesus Christ
  lexicon: BDAG
  rationale: Per project philosophy, Χριστός is translated as 'Messiah' where it still
    functions as a title. In this greeting formula, the titular sense remains sufficiently
    alive to preserve the meaning in English.
