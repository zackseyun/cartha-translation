id: 1CO.1.16
reference: 1 Corinthians 1:16
source:
  edition: SBLGNT
  text: ἐβάπτισα δὲ καὶ τὸν Στεφανᾶ οἶκον· λοιπὸν οὐκ οἶδα εἴ τινα ἄλλον ἐβάπτισα.
translation:
  text: I also baptized the household of Stephanas; beyond that, I do not know if
    I baptized anyone else.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the house of Stephanas.” The Greek term can denote a household unit
      rather than only a building.
    reason: lexical_alternative
  - marker: b
    text: Or “whether I baptized anyone else.”
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐβάπτισα
  chosen: baptized
  alternatives:
  - immersed
  lexicon: BDAG
  rationale: The aorist verb plainly refers to administering baptism. “Baptized” is
    the standard and most transparent English rendering without importing a mode-specific
    meaning.
- source_word: δὲ
  chosen: also
  alternatives:
  - and
  - now
  - but
  lexicon: BDAG
  rationale: Here δέ functions as a mild connective within Paul’s recollection. Its
    force is adequately carried in English by the adverbial flow of “also,” without
    requiring a heavier adversative such as “but.”
- source_word: καὶ
  chosen: also
  alternatives:
  - even
  - too
  lexicon: BDAG
  rationale: καί adds Stephanas’s household to the prior list. “Also” naturally conveys
    the additive sense in modern English.
- source_word: τὸν Στεφανᾶ οἶκον
  chosen: the household of Stephanas
  alternatives:
  - the house of Stephanas
  - Stephanas’s family
  lexicon: BDAG
  rationale: οἶκος in this context most naturally refers to the household as a social
    unit, not merely the physical building. “Household” preserves that breadth better
    than “family” or “house.”
- source_word: λοιπὸν
  chosen: beyond that
  alternatives:
  - besides that
  - for the rest
  lexicon: BDAG
  rationale: λοιπόν marks what remains beyond the exception just mentioned. “Beyond
    that” is clear modern English and fits Paul’s corrective tone.
- source_word: οὐκ οἶδα
  chosen: I do not know
  alternatives:
  - I do not remember
  lexicon: BDAG
  rationale: The Greek states lack of knowledge directly. While memory is implied
    by context, “I do not know” stays closer to the wording.
- source_word: εἴ τινα ἄλλον
  chosen: if I baptized anyone else
  alternatives:
  - whether I baptized anyone else
  lexicon: BDAG
  rationale: The clause expresses uncertainty about any additional person. “If ...
    anyone else” is idiomatic and preserves the sense cleanly.
