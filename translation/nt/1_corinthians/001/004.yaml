id: 1CO.1.4
reference: 1 Corinthians 1:4
source:
  edition: SBLGNT
  text: Εὐχαριστῶ τῷ θεῷ ⸀μου πάντοτε περὶ ὑμῶν ἐπὶ τῇ χάριτι τοῦ θεοῦ τῇ δοθείσῃ
    ὑμῖν ἐν Χριστῷ Ἰησοῦ,
translation:
  text: I thank my God always for you because of the grace of God given to you in
    Messiah Jesus,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “I give thanks to my God always concerning you.”
    reason: lexical_alternative
  - marker: b
    text: Or “in Christ Jesus.”
    reason: lexical_alternative
lexical_decisions:
- source_word: Εὐχαριστῶ
  chosen: I thank
  alternatives:
  - I give thanks
  lexicon: BDAG
  rationale: The present indicative is naturally rendered as a simple present in English.
    “I thank” is concise, idiomatic, and preserves Paul’s ongoing thanksgiving sense
    without sounding stiff.
- source_word: τῷ θεῷ μου
  chosen: my God
  alternatives:
  - to my God
  lexicon: BDAG
  rationale: English idiom prefers “I thank my God” rather than repeating the dative
    with “to.” The possessive pronoun is retained because it is explicit in the Greek
    and expresses Paul’s personal devotion.
- source_word: πάντοτε
  chosen: always
  alternatives:
  - continually
  lexicon: BDAG
  rationale: “Always” is the most direct and natural equivalent, preserving the adverb’s
    broad temporal force.
- source_word: περὶ ὑμῶν
  chosen: for you
  alternatives:
  - concerning you
  - about you
  lexicon: BDAG
  rationale: In thanksgiving formulas, περί with the genitive is commonly idiomatic
    for giving thanks on someone’s behalf or with reference to them. “For you” is
    the most natural English rendering here.
- source_word: ἐπὶ τῇ χάριτι
  chosen: because of the grace
  alternatives:
  - for the grace
  - on account of the grace
  lexicon: BDAG
  rationale: Here ἐπί with the dative gives the basis or occasion of Paul’s thanksgiving.
    “Because of the grace” makes that causal sense clear in natural English.
- source_word: χάριτι
  chosen: grace
  alternatives:
  - favor
  lexicon: BDAG
  rationale: “Grace” is the standard and theologically appropriate rendering for χάρις
    in Paul, especially where divine saving generosity is in view.
- source_word: τοῦ θεοῦ
  chosen: of God
  alternatives:
  - from God
  lexicon: BDAG
  rationale: The genitive is retained formally as “of God,” which is both natural
    in English and leaves open the full possessive/source nuance without over-specifying
    it.
- source_word: τῇ δοθείσῃ ὑμῖν
  chosen: given to you
  alternatives:
  - granted to you
  - bestowed on you
  lexicon: BDAG
  rationale: The participle from δίδωμι is straightforwardly rendered “given.” This
    preserves the passive sense and keeps the focus on God as the implied giver.
- source_word: ἐν Χριστῷ Ἰησοῦ
  chosen: in Messiah Jesus
  alternatives:
  - in Christ Jesus
  lexicon: BDAG
  rationale: Per project doctrine, Χριστός is translated as “Messiah” where its titular
    force is still meaningful. In this Pauline formula, the title remains semantically
    active, so “Messiah Jesus” best reflects the Greek.
