theological_decisions:
- issue: Rendering Χριστοῦ in the phrase Ἰησοῦ Χριστοῦ
  chosen_reading: Jesus Christ
  alternative_readings:
  - Jesus the Messiah
  rationale: The phrase functions as a fixed name-like designation in this context
    rather than foregrounding the messianic title by itself. This follows the stated
    policy to render Χριστός as 'Messiah' where title is emphasized, but 'Christ'
    where it is name-like.
