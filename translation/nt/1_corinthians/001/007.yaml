id: 1CO.1.7
reference: 1 Corinthians 1:7
source:
  edition: SBLGNT
  text: ὥστε ὑμᾶς μὴ ὑστερεῖσθαι ἐν μηδενὶ χαρίσματι, ἀπεκδεχομένους τὴν ἀποκάλυψιν
    τοῦ κυρίου ἡμῶν Ἰησοῦ Χριστοῦ·
translation:
  text: so that you do not lack any gift as you eagerly await the revelation of our
    Lord Jesus the Messiah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'any spiritual gift' or 'any grace-gift.'
    reason: lexical_alternative
  - marker: b
    text: Or, 'the appearing of our Lord Jesus Christ.'
    reason: lexical_alternative
  - marker: c
    text: Greek 'Jesus Christ'; alternatively, 'Jesus the Messiah' if the title is
      made more explicit.
    reason: alternative_reading
lexical_decisions:
- source_word: ὥστε
  chosen: so that
  alternatives:
  - with the result that
  - so then
  lexicon: BDAG
  rationale: Introduces the result of God's grace already described in the previous
    context. 'So that' is concise and natural in English while preserving the result
    sense.
- source_word: ὑστερεῖσθαι
  chosen: do not lack
  alternatives:
  - are not lacking
  - fall short
  lexicon: BDAG
  rationale: This infinitive expresses being without deficiency. 'Do not lack' is
    idiomatic modern English and communicates the sense clearly.
- source_word: ἐν μηδενὶ χαρίσματι
  chosen: any gift
  alternatives:
  - any spiritual gift
  - any grace-gift
  lexicon: BDAG
  rationale: χαρίσματι refers to a graciously given gift. 'Any gift' is the most natural
    rendering here, while the grace-derived nuance is contextually present in the
    surrounding passage. 'Spiritual gift' is possible but slightly more interpretive.
- source_word: ἀπεκδεχομένους
  chosen: as you eagerly await
  alternatives:
  - while you wait eagerly for
  - as you wait for
  lexicon: BDAG
  rationale: The participle conveys ongoing expectant waiting. 'Eagerly await' preserves
    the intensified expectant sense better than a simple 'wait.'
- source_word: ἀποκάλυψιν
  chosen: revelation
  alternatives:
  - revealing
  - appearing
  lexicon: BDAG
  rationale: '''Revelation'' is the most direct lexical equivalent and fits Paul''s
    eschatological language. ''Appearing'' is a valid contextual alternative but is
    less formally tied to the noun used here.'
- source_word: κυρίου
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Per doctrinal guidance, κύριος is normally rendered 'Lord' in New Testament
    usage.
- source_word: Ἰησοῦ Χριστοῦ
  chosen: Jesus Christ
  alternatives:
  - Jesus the Messiah
  lexicon: BDAG
  rationale: Here Χριστοῦ functions in the familiar name-like combination with Ἰησοῦ.
    Following the translation philosophy, 'Christ' is retained where the term functions
    name-like rather than as a freshly emphasized title.
