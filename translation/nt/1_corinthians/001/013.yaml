id: 1CO.1.13
reference: 1 Corinthians 1:13
source:
  edition: SBLGNT
  text: μεμέρισται ὁ Χριστός; μὴ Παῦλος ἐσταυρώθη ὑπὲρ ὑμῶν, ἢ εἰς τὸ ὄνομα Παύλου
    ἐβαπτίσθητε;
translation:
  text: Has the Messiah been divided? Was Paul crucified for you? Or were you baptized
    into the name of Paul?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Has Christ been divided?”
    reason: lexical_alternative
  - marker: b
    text: Or “were you baptized in the name of Paul?”
    reason: lexical_alternative
lexical_decisions:
- source_word: μεμέρισται
  chosen: has been divided
  alternatives:
  - has been split up
  - is divided
  lexicon: BDAG
  rationale: The perfect passive is best reflected by an English perfect, presenting
    division as an accomplished state. “Divided” is clear, idiomatic, and preserves
    Paul’s rebuke of factionalism without paraphrase.
- source_word: Χριστός
  chosen: the Messiah
  alternatives:
  - Christ
  lexicon: BDAG
  rationale: Per doctrine, Χριστός is rendered “Messiah” where it functions as a title
    rather than a name-like designation. With the article ὁ, the title sense is prominent
    here.
- source_word: μὴ
  chosen: '[implicit in the rhetorical question]'
  alternatives:
  - surely not
  lexicon: BDAG
  rationale: μή marks a rhetorical question expecting a negative answer. English naturally
    conveys this expectation by retaining the interrogative form without adding interpretive
    wording like “surely not.”
- source_word: ἐσταυρώθη
  chosen: was crucified
  lexicon: BDAG
  rationale: Standard, transparent rendering of the aorist passive; no expansion is
    needed.
- source_word: ὑπὲρ ὑμῶν
  chosen: for you
  alternatives:
  - on your behalf
  lexicon: BDAG
  rationale: “For you” is natural modern English and adequately conveys substitutionary/representative
    force here without over-specifying the nuance.
- source_word: εἰς τὸ ὄνομα
  chosen: into the name
  alternatives:
  - in the name
  lexicon: BDAG
  rationale: εἰς is more precisely “into” than “in.” In baptism contexts this wording
    preserves the directional/associative force of incorporation or allegiance without
    paraphrase.
- source_word: ἐβαπτίσθητε
  chosen: were you baptized
  lexicon: BDAG
  rationale: A straightforward passive rendering that preserves the Greek form and
    rhetorical force.
