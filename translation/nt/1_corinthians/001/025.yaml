id: 1CO.1.25
reference: 1 Corinthians 1:25
source:
  edition: SBLGNT
  text: ὅτι τὸ μωρὸν τοῦ θεοῦ σοφώτερον τῶν ἀνθρώπων ἐστίν, καὶ τὸ ἀσθενὲς τοῦ θεοῦ
    ἰσχυρότερον τῶν ⸀ἀνθρώπων.
translation:
  text: Because the foolishness of God is wiser than people, and the weakness of God
    is stronger than people.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “what is foolish of God” / “what people consider foolish in God.”
    reason: lexical_alternative
  - marker: b
    text: Or “humans” or “men”; the Greek is generic for humanity.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅτι
  chosen: Because
  alternatives:
  - For
  - since
  lexicon: BDAG
  rationale: Introduces the ground for the previous statement; “because” is the clearest
    natural connector in context.
- source_word: τὸ μωρὸν
  chosen: the foolishness
  alternatives:
  - the foolish thing
  - what is foolish
  lexicon: BDAG
  rationale: The substantivized neuter adjective is rendered idiomatically as an abstract
    noun in English. This preserves Paul’s paradoxical wording without awkwardness.
- source_word: τοῦ θεοῦ
  chosen: of God
  alternatives:
  - from God
  - belonging to God
  lexicon: BDAG
  rationale: Retains the Greek genitive and Paul’s rhetorical force. A paraphrase
    such as “what seems foolish in God’s way” is more interpretive than the text requires.
- source_word: σοφώτερον
  chosen: wiser
  alternatives:
  - more wise
  lexicon: BDAG
  rationale: Standard comparative rendering of σοφός in clear modern English.
- source_word: ἀνθρώπων
  chosen: people
  alternatives:
  - humans
  - men
  lexicon: BDAG
  rationale: The noun is generic here, contrasting God with humanity rather than males
    specifically. “People” best matches the sense in natural modern English.
- source_word: τὸ ἀσθενὲς
  chosen: the weakness
  alternatives:
  - the weak thing
  - what is weak
  lexicon: BDAG
  rationale: Like τὸ μωρόν, the substantivized adjective is best rendered idiomatically
    as an abstract noun to preserve the parallel structure.
- source_word: ἰσχυρότερον
  chosen: stronger
  alternatives:
  - more powerful
  lexicon: BDAG
  rationale: “Stronger” is the direct comparative and keeps the close lexical contrast
    with “weakness.”
