theological_decisions:
- issue: Whether to paraphrase Paul's expressions 'the foolishness of God' and 'the
    weakness of God' to avoid possible misunderstanding
  chosen_reading: Retain the paradoxical phrases as 'the foolishness of God' and 'the
    weakness of God'
  alternative_readings:
  - what seems foolish from God
  - what people consider foolish in God
  - what is weak in God's way of acting
  rationale: Paul intentionally uses shocking rhetorical language to emphasize God's
    superiority over human wisdom and strength. Preserving the wording keeps the theological
    tension without asserting that God is actually foolish or weak.
  doctrine_reference: Preserve theological tension rather than resolve it.
