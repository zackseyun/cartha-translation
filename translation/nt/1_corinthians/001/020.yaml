theological_decisions:
- issue: Distinguishing αἰών and κόσμος in the same verse
  chosen_reading: Translated αἰών as ‘age’ and κόσμος as ‘world’
  alternative_readings:
  - Translate both with ‘world’ for smoother English
  rationale: Paul uses two different Greek terms, and preserving the distinction better
    reflects the source text and his contrast between the present age and worldly
    wisdom.
  doctrine_reference: 'Translation philosophy #1 and #5'
