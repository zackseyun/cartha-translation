id: 1CO.1.20
reference: 1 Corinthians 1:20
source:
  edition: SBLGNT
  text: ποῦ σοφός; ποῦ γραμματεύς; ποῦ συζητητὴς τοῦ αἰῶνος τούτου; οὐχὶ ἐμώρανεν
    ὁ θεὸς τὴν σοφίαν τοῦ ⸀κόσμου;
translation:
  text: Where is the wise man? Where is the scribe? Where is the debater of this age?
    Has not God made the wisdom of the world foolish?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or ‘the wise person.’ The Greek is masculine singular and likely representative.
    reason: lexical_alternative
  - marker: b
    text: ‘Of this age’ translates a different Greek term than ‘of the world’ later
      in the verse.
    reason: cross_reference
  - marker: c
    text: Or ‘shown the wisdom of the world to be foolish.’
    reason: lexical_alternative
lexical_decisions:
- source_word: ποῦ
  chosen: Where is
  alternatives:
  - Where
  - What has become of
  lexicon: BDAG
  rationale: 'Used idiomatically with the following nominatives as a rhetorical challenge:
    ‘Where is ... ?’ rather than a bare locative ‘where.’'
- source_word: σοφός
  chosen: the wise man
  alternatives:
  - the wise person
  - the wise one
  lexicon: BDAG
  rationale: Rendered with the article implied in English for this rhetorical series.
    ‘Man’ preserves the masculine singular form while functioning representatively
    for the class of the ‘wise.’
- source_word: γραμματεύς
  chosen: the scribe
  alternatives:
  - the scholar
  - the expert in the law
  lexicon: BDAG
  rationale: ‘Scribe’ is the most direct rendering. ‘Scholar’ is possible in broader
    Greek usage, but ‘scribe’ better preserves the concrete historical and rhetorical
    force.
- source_word: συζητητής
  chosen: the debater
  alternatives:
  - the disputant
  - the reasoner
  lexicon: BDAG
  rationale: ‘Debater’ is clear modern English and fits Paul’s rhetorical contrast
    with worldly intellectual argumentation.
- source_word: τοῦ αἰῶνος τούτου
  chosen: of this age
  alternatives:
  - of this world
  - of the present age
  lexicon: BDAG
  rationale: Rendered as ‘of this age’ to preserve αἰών distinctly from κόσμος later
    in the verse; this avoids flattening Paul’s contrast by translating both with
    ‘world.’
- source_word: οὐχὶ
  chosen: Has not
  alternatives:
  - Did not
  - Surely
  lexicon: BDAG
  rationale: Captures the rhetorical question expecting an affirmative answer.
- source_word: ἐμώρανεν
  chosen: made ... foolish
  alternatives:
  - made ... folly
  - shown ... to be foolish
  lexicon: BDAG
  rationale: The verb means to make foolish or render folly. ‘Made ... foolish’ is
    natural English and keeps the causative force.
- source_word: σοφίαν
  chosen: wisdom
  alternatives:
  - cleverness
  lexicon: BDAG
  rationale: Standard rendering; here it refers to the world’s claimed wisdom in Paul’s
    contrast.
- source_word: κόσμου
  chosen: the world
  alternatives:
  - this world
  lexicon: BDAG
  rationale: Rendered distinctly from αἰών. ‘The world’ is the natural equivalent
    here and preserves Paul’s different term.
