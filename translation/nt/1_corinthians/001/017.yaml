theological_decisions:
- issue: Whether to render Χριστός as a translated title or retain the traditional
    transliteration 'Christ.'
  chosen_reading: Messiah
  alternative_readings:
  - Christ
  rationale: The verse still bears clear christological title force, and translating
    the term helps preserve Paul's meaning rather than merely echo English tradition.
