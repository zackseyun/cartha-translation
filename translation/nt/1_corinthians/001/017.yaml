id: 1CO.1.17
reference: 1 Corinthians 1:17
source:
  edition: SBLGNT
  text: οὐ γὰρ ἀπέστειλέν με Χριστὸς βαπτίζειν ἀλλὰ εὐαγγελίζεσθαι, οὐκ ἐν σοφίᾳ λόγου,
    ἵνα μὴ κενωθῇ ὁ σταυρὸς τοῦ Χριστοῦ.
translation:
  text: For the Messiah did not send me to baptize, but to proclaim the good news—not
    with wisdom of speech, so that the cross of the Messiah might not be emptied.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with eloquent wisdom' or more literally, 'with wisdom of word.'
    reason: lexical_alternative
  - marker: b
    text: Or 'might not be made void' or 'might not be emptied of its power.'
    reason: lexical_alternative
  - marker: c
    text: Greek Χριστός; traditionally 'Christ.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Χριστὸς
  chosen: the Messiah
  alternatives:
  - Christ
  lexicon: BDAG
  rationale: Treated here as a meaningful title rather than a mere name-like identifier,
    following the project's default preference to translate Χριστός as 'Messiah' where
    context supports title force.
- source_word: βαπτίζειν
  chosen: to baptize
  alternatives:
  - to immerse
  lexicon: BDAG
  rationale: The established ecclesial term 'baptize' is retained because it is precise,
    natural in context, and avoids importing a narrower interpretive gloss into Paul's
    contrast.
- source_word: εὐαγγελίζεσθαι
  chosen: to proclaim the good news
  alternatives:
  - to preach the gospel
  - to announce the good news
  lexicon: BDAG
  rationale: This rendering preserves the evangelistic sense of the verb while using
    accessible modern English instead of the more traditional but less transparent
    'preach the gospel.'
- source_word: σοφίᾳ λόγου
  chosen: with wisdom of speech
  alternatives:
  - with eloquent wisdom
  - with wisdom of word
  lexicon: BDAG
  rationale: A fairly literal rendering that captures rhetorical sophistication without
    overparaphrasing. 'Speech' best conveys λόγος here as spoken discourse or rhetoric.
- source_word: κενωθῇ
  chosen: might not be emptied
  alternatives:
  - might not be made void
  - might not be emptied of its power
  lexicon: BDAG
  rationale: The passive verb is kept concrete and close to the Greek. Adding 'of
    its power' explains the sense but goes beyond the explicit wording, so it is preserved
    as an alternative rather than placed in the main text.
- source_word: σταυρὸς
  chosen: the cross
  lexicon: BDAG
  rationale: The standard rendering is both literal and theologically appropriate
    in Pauline usage.
- source_word: τοῦ Χριστοῦ
  chosen: of the Messiah
  alternatives:
  - of Christ
  lexicon: BDAG
  rationale: For consistency with the earlier occurrence of Χριστός in the verse,
    the title is translated rather than transliterated.
