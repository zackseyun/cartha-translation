theological_decisions:
- issue: Rendering Χριστός as title or name-like form
  chosen_reading: the Messiah
  alternative_readings:
  - Christ
  rationale: The context emphasizes the content of apostolic proclamation and the
    messianic claim that becomes scandalous and foolish in the eyes of different audiences.
    This favors title-language rather than a name-like rendering.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; Χριστός
    default "Messiah" where title.'
