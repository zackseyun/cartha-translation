id: 1CO.1.23
reference: 1 Corinthians 1:23
source:
  edition: SBLGNT
  text: ἡμεῖς δὲ κηρύσσομεν Χριστὸν ἐσταυρωμένον, Ἰουδαίοις μὲν σκάνδαλον ⸀ἔθνεσιν
    δὲ μωρίαν,
translation:
  text: 'but we preach the Messiah crucified: to Jews a stumbling block, and to Gentiles
    foolishness,'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "Christ crucified."
    reason: alternative_reading
  - marker: b
    text: Greek "nations"; here likely meaning the Gentiles in contrast to Jews.
    reason: lexical_alternative
lexical_decisions:
- source_word: κηρύσσομεν
  chosen: preach
  alternatives:
  - proclaim
  lexicon: BDAG
  rationale: '"Preach" fits Pauline public proclamation language in natural English,
    while still preserving the force of heralding good news.'
- source_word: Χριστόν
  chosen: the Messiah
  alternatives:
  - Christ
  lexicon: BDAG
  rationale: Per doctrine, Χριστός is rendered "Messiah" where it functions clearly
    as a title. Here Paul is describing the proclaimed identity and status of Jesus,
    not merely using a name-like form.
- source_word: ἐσταυρωμένον
  chosen: crucified
  alternatives:
  - having been crucified
  lexicon: BDAG
  rationale: The perfect passive participle is most naturally and idiomatically carried
    into English as "crucified" after "the Messiah," preserving the central scandal
    of the message without overloading the English.
- source_word: Ἰουδαίοις
  chosen: Jews
  alternatives:
  - Judeans
  lexicon: BDAG
  rationale: In this rhetorical Jew/Gentile contrast, "Jews" is the clearest and most
    conventional sense; the ethnic-religious contrast is more prominent than a narrowly
    geographic one.
- source_word: σκάνδαλον
  chosen: stumbling block
  alternatives:
  - offense
  - scandal
  lexicon: BDAG
  rationale: '"Stumbling block" preserves the metaphor and is the standard sense in
    Pauline usage. "Offense" is possible but flattens the image.'
- source_word: ἔθνεσιν
  chosen: Gentiles
  alternatives:
  - nations
  lexicon: BDAG
  rationale: Because the verse contrasts Ἰουδαίοις with ἔθνεσιν, "Gentiles" best conveys
    the intended contrast in English, even though the broader lexical sense is "nations."
- source_word: μωρίαν
  chosen: foolishness
  alternatives:
  - folly
  lexicon: BDAG
  rationale: '"Foolishness" matches Paul''s repeated vocabulary in this chapter and
    preserves the conceptual link with the surrounding argument about what the world
    regards as foolish.'
