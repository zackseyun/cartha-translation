id: 1CO.1.14
reference: 1 Corinthians 1:14
source:
  edition: SBLGNT
  text: ⸀εὐχαριστῶ ὅτι οὐδένα ὑμῶν ἐβάπτισα εἰ μὴ Κρίσπον καὶ Γάϊον,
translation:
  text: I am thankful that I baptized none of you except Crispus and Gaius,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: εὐχαριστῶ
  chosen: I am thankful
  alternatives:
  - I give thanks
  - I thank
  lexicon: BDAG
  rationale: Rendered with natural modern English while preserving the present-tense
    expression of gratitude. 'I give thanks' is more formally literal, but 'I am thankful'
    communicates the same sense more idiomatically without adding content.
- source_word: ὅτι
  chosen: that
  alternatives:
  - because
  lexicon: BDAG
  rationale: Here it introduces the content of Paul's gratitude rather than a distinct
    causal clause in English, so 'that' is the clearest rendering.
- source_word: οὐδένα ὑμῶν
  chosen: none of you
  alternatives:
  - no one among you
  lexicon: BDAG
  rationale: This directly and clearly conveys the negated object phrase in idiomatic
    English.
- source_word: ἐβάπτισα
  chosen: baptized
  alternatives:
  - immersed
  lexicon: BDAG
  rationale: '''Baptized'' is the standard translational equivalent for βαπτίζω in
    New Testament contexts and avoids importing a sectarian interpretation of mode.'
- source_word: εἰ μὴ
  chosen: except
  alternatives:
  - unless
  lexicon: BDAG
  rationale: In this exclusion construction, 'except' best matches the Greek sense.
- source_word: Κρίσπον
  chosen: Crispus
  rationale: Personal name transliterated by standard English convention, following
    project policy.
- source_word: Γάϊον
  chosen: Gaius
  rationale: Personal name transliterated by standard English convention, following
    project policy.
