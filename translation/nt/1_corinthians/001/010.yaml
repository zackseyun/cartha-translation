theological_decisions:
- issue: Rendering of Christological title Χριστός
  chosen_reading: Messiah
  alternative_readings:
  - Christ
  rationale: The project default is to translate titles rather than merely preserve
    traditional transliterations when the title sense is active. In this verse, 'Jesus
    Messiah' preserves that force without changing the referent.
  doctrine_reference: 'DOCTRINE.md: Contested terms — Χριστός → Messiah (where title;
    Christ where name-like)'
- issue: Gendered address ἀδελφοί
  chosen_reading: brothers in the main text with an inclusive footnote
  alternative_readings:
  - brothers and sisters
  - siblings
  rationale: The translation philosophy requires gender-accurate rendering in the
    main text while noting broader representative force where context warrants. Paul
    addresses the whole congregation, so the inclusive sense is acknowledged in a
    footnote rather than replacing the masculine form.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §4 — Gender-accurate over
    gender-neutral'
