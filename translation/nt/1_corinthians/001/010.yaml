id: 1CO.1.10
reference: 1 Corinthians 1:10
source:
  edition: SBLGNT
  text: Παρακαλῶ δὲ ὑμᾶς, ἀδελφοί, διὰ τοῦ ὀνόματος τοῦ κυρίου ἡμῶν Ἰησοῦ Χριστοῦ
    ἵνα τὸ αὐτὸ λέγητε πάντες, καὶ μὴ ᾖ ἐν ὑμῖν σχίσματα, ἦτε δὲ κατηρτισμένοι ἐν
    τῷ αὐτῷ νοῒ καὶ ἐν τῇ αὐτῇ γνώμῃ.
translation:
  text: Now I urge you, brothers, by the name of our Lord Jesus Messiah, that you
    all speak the same thing, and that there be no divisions among you, but that you
    be joined together in the same mind and in the same purpose.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or brothers and sisters; the Greek masculine plural may address the whole
      believing community.
    reason: cultural_note
  - marker: b
    text: Messiah, traditionally 'Christ.'
    reason: lexical_alternative
  - marker: c
    text: Or 'there be no schisms among you.'
    reason: lexical_alternative
  - marker: d
    text: Or 'be restored' or 'be mended together.'
    reason: lexical_alternative
  - marker: e
    text: Or 'the same judgment' or 'the same conviction.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Παρακαλῶ
  chosen: I urge
  alternatives:
  - I appeal to
  - I exhort
  lexicon: BDAG
  rationale: παρακαλέω here introduces a pastoral appeal rather than a bare command.
    'I urge' is natural modern English and preserves the apostolic earnestness.
- source_word: ἀδελφοί
  chosen: brothers
  alternatives:
  - brothers and sisters
  - siblings
  lexicon: BDAG
  rationale: The Greek is grammatically masculine plural and should be rendered in
    a gender-accurate way per project philosophy. Because Paul addresses the congregation
    representatively, the broader inclusive force is preserved in a footnote rather
    than the main text.
- source_word: διὰ τοῦ ὀνόματος
  chosen: by the name of
  alternatives:
  - through the name of
  - in the name of
  lexicon: BDAG
  rationale: διά with the genitive can express means or basis. 'By the name of' is
    idiomatic in English and conveys appeal on the authority of Jesus.
- source_word: κυρίου
  chosen: Lord
  alternatives:
  - Master
  - LORD
  lexicon: BDAG
  rationale: This follows the doctrinal default for κύριος and fits the NT confession
    of Jesus' authority.
- source_word: Χριστοῦ
  chosen: Messiah
  alternatives:
  - Christ
  lexicon: BDAG
  rationale: Per doctrine, Χριστός is rendered 'Messiah' where its titular force is
    still felt. In 'our Lord Jesus Messiah,' the title remains meaningful, while the
    traditional alternative is preserved in a footnote.
- source_word: τὸ αὐτὸ λέγητε πάντες
  chosen: that you all speak the same thing
  alternatives:
  - that all of you agree
  - that you all say the same thing
  lexicon: BDAG
  rationale: The phrase is rendered fairly literally to preserve Paul's emphasis on
    shared confession and unity, without over-paraphrasing into abstract 'agreement'
    alone.
- source_word: σχίσματα
  chosen: divisions
  alternatives:
  - splits
  - schisms
  lexicon: BDAG
  rationale: '''Divisions'' is clear modern English and naturally communicates relational
    rupture within the church. ''Schisms'' is more technical and ecclesiastical.'
- source_word: κατηρτισμένοι
  chosen: be joined together
  alternatives:
  - be restored
  - be mended
  - be made complete
  lexicon: BDAG
  rationale: The participle from καταρτίζω carries the sense of being properly fitted
    or restored. In this context of factionalism, 'be joined together' best expresses
    repaired unity in idiomatic English while preserving the passive/resultative idea.
- source_word: νοῒ
  chosen: mind
  alternatives:
  - understanding
  - way of thinking
  lexicon: BDAG
  rationale: νοῦς commonly denotes mind or understanding. 'Mind' is concise and pairs
    well with γνώμη while keeping a distinction between the two terms.
- source_word: γνώμῃ
  chosen: purpose
  alternatives:
  - judgment
  - opinion
  - conviction
  lexicon: BDAG
  rationale: γνώμη here likely refers to shared resolve or practical outlook. 'Purpose'
    reads more naturally than 'judgment' in contemporary English while maintaining
    distinction from 'mind'.
