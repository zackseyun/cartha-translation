theological_decisions:
- issue: Rendering of the Isaiah quotation in a way that preserves Paul’s rhetorical
    contrast
  chosen_reading: Use straightforward future verbs ('I will destroy' / 'I will set
    aside') without intensifying beyond the Greek
  alternative_readings:
  - Use more interpretive renderings such as 'frustrate' or 'bring to nothing'
  rationale: The verse is a scriptural citation supporting God’s overthrow of human
    wisdom. A restrained rendering preserves the text’s force without importing extra
    doctrinal nuance.
