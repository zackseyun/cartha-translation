id: 1CO.1.19
reference: 1 Corinthians 1:19
source:
  edition: SBLGNT
  text: γέγραπται γάρ· Ἀπολῶ τὴν σοφίαν τῶν σοφῶν, καὶ τὴν σύνεσιν τῶν συνετῶν ἀθετήσω.
translation:
  text: 'For it is written: “I will destroy the wisdom of the wise, and I will set
    aside the understanding of the intelligent.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “I will reject / nullify the understanding of the discerning.”
    reason: lexical_alternative
lexical_decisions:
- source_word: γέγραπται
  chosen: it is written
  alternatives:
  - it has been written
  lexicon: BDAG
  rationale: Standard rendering of the perfect passive introductory formula for Scripture
    citation; English idiom favors the established present-result sense, 'it is written.'
- source_word: γάρ
  chosen: For
  alternatives:
  - because
  lexicon: BDAG
  rationale: Marks Paul’s explanation or grounding for the previous statement; 'For'
    best preserves the discourse connection in concise literary English.
- source_word: Ἀπολῶ
  chosen: I will destroy
  alternatives:
  - I will ruin
  - I will bring to nothing
  lexicon: BDAG
  rationale: Future active of ἀπόλλυμι here carries the sense of destroying or bringing
    to ruin. 'Destroy' is direct, clear, and fits the prophetic quotation.
- source_word: σοφίαν
  chosen: wisdom
  lexicon: BDAG
  rationale: '''Wisdom'' is the natural and consistent gloss for σοφία, especially
    in this chapter’s contrast between human wisdom and God’s action.'
- source_word: τῶν σοφῶν
  chosen: of the wise
  alternatives:
  - of wise people
  lexicon: BDAG
  rationale: Keeps the genitive construction and the rhetorical force of the repeated
    cognate wording without unnecessary expansion.
- source_word: σύνεσιν
  chosen: understanding
  alternatives:
  - insight
  - intelligence
  lexicon: BDAG
  rationale: '''Understanding'' best matches the noun’s sense of comprehension or
    discernment and pairs naturally with ''wisdom'' in English.'
- source_word: τῶν συνετῶν
  chosen: of the intelligent
  alternatives:
  - of the discerning
  - of the prudent
  lexicon: BDAG
  rationale: συνετός denotes one who is discerning or intelligent. 'The intelligent'
    preserves the parallelism with 'the wise' while remaining readable modern English.
- source_word: ἀθετήσω
  chosen: I will set aside
  alternatives:
  - I will reject
  - I will nullify
  - I will invalidate
  lexicon: BDAG
  rationale: ἀθετέω can mean reject, nullify, or set aside. 'Set aside' is accessible
    modern English and conveys God’s decisive dismissal of human pretension without
    sounding overly technical.
