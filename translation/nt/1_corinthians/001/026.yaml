id: 1CO.1.26
reference: 1 Corinthians 1:26
source:
  edition: SBLGNT
  text: Βλέπετε γὰρ τὴν κλῆσιν ὑμῶν, ἀδελφοί, ὅτι οὐ πολλοὶ σοφοὶ κατὰ σάρκα, οὐ πολλοὶ
    δυνατοί, οὐ πολλοὶ εὐγενεῖς·
translation:
  text: 'For consider your calling, brothers: not many of you were wise by human standards,
    not many were powerful, not many were of noble birth.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: “Brothers” here addresses the congregation collectively and includes believing
      women as well as men.
    reason: cultural_note
lexical_decisions:
- source_word: Βλέπετε
  chosen: consider
  alternatives:
  - look at
  - see
  lexicon: BDAG
  rationale: The form can be read as imperative or indicative, but in context Paul
    is exhorting the readers to reflect on their situation. “Consider” gives natural
    English and preserves the rhetorical force better than the more literal “see.”
- source_word: κλῆσιν
  chosen: calling
  alternatives:
  - summons
  - calling by God
  lexicon: BDAG
  rationale: “Calling” is the established and contextually fitting sense in Paul,
    referring to God’s call that defines the believers’ status, not merely their occupation
    or social position.
- source_word: ἀδελφοί
  chosen: brothers
  alternatives:
  - brothers and sisters
  - siblings
  lexicon: BDAG
  rationale: The Greek is grammatically masculine plural and is best represented by
    “brothers” under the project’s gender-accurate philosophy. Because Paul addresses
    the whole church, the inclusive force is preserved in a footnote rather than replacing
    the masculine form in the main text.
- source_word: οὐ πολλοὶ ... σοφοὶ
  chosen: not many of you were wise
  alternatives:
  - not many were wise
  - there were not many wise among you
  lexicon: BDAG
  rationale: English requires the implied reference to the Corinthians to be made
    explicit for clarity. “Of you” is not a doctrinal addition but an idiomatic completion
    of the ellipsis.
- source_word: κατὰ σάρκα
  chosen: by human standards
  alternatives:
  - according to the flesh
  - from a human point of view
  lexicon: BDAG
  rationale: Here the phrase is idiomatic, referring to merely human assessment rather
    than literal flesh or the Pauline ethical sense of “sinful nature.” “By human
    standards” communicates the sense clearly in modern English.
- source_word: δυνατοί
  chosen: powerful
  alternatives:
  - influential
  - mighty
  lexicon: BDAG
  rationale: “Powerful” best captures social or political strength in this context
    without over-specifying the kind of power.
- source_word: εὐγενεῖς
  chosen: of noble birth
  alternatives:
  - well-born
  - noble
  lexicon: BDAG
  rationale: The term refers specifically to high social lineage. “Of noble birth”
    is clearer and more idiomatic in contemporary English than “well-born.”
