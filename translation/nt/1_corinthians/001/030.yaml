theological_decisions:
- issue: Relation of 'wisdom from God' to the following three nouns
  chosen_reading: The translation treats 'righteousness and sanctification and redemption'
    as appositional elaboration of how Christ became 'wisdom from God' for believers.
  alternative_readings:
  - The phrase 'from God' modifies all four nouns equally.
  - The three nouns are a separate coordinate list alongside 'wisdom from God' rather
    than an explanation of it.
  rationale: The dash marks the close explanatory relation without forcing a highly
    technical restructuring. This preserves the Greek flow while helping modern readers
    follow Paul's syntax.
  doctrine_reference: Preserve theological tension rather than resolve it
