id: 1CO.1.30
reference: 1 Corinthians 1:30
source:
  edition: SBLGNT
  text: ἐξ αὐτοῦ δὲ ὑμεῖς ἐστε ἐν Χριστῷ Ἰησοῦ, ὃς ἐγενήθη ⸂σοφία ἡμῖν⸃ ἀπὸ θεοῦ,
    δικαιοσύνη τε καὶ ἁγιασμὸς καὶ ἀπολύτρωσις,
translation:
  text: And it is from him that you are in Messiah Jesus, who became for us wisdom
    from God—and righteousness and sanctification and redemption—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'justice.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξ αὐτοῦ
  chosen: from him
  alternatives:
  - because of him
  - by him
  lexicon: BDAG
  rationale: The preposition ἐκ/ἐξ naturally expresses source or origin here. 'From
    him' preserves Paul's emphasis that the believers' status in Messiah Jesus originates
    in God.
- source_word: ἐν
  chosen: in
  alternatives:
  - united to
  - in union with
  lexicon: BDAG
  rationale: '''In'' keeps the Pauline union-with-Christ wording without over-paraphrasing.
    More explanatory options interpret the phrase beyond the immediate wording.'
- source_word: Χριστῷ
  chosen: Messiah
  alternatives:
  - Christ
  lexicon: BDAG
  rationale: Per doctrine, Χριστός is rendered 'Messiah' where the title sense is
    active. Here the phrase still carries christological meaning rather than functioning
    as a mere surname.
- source_word: ἐγενήθη
  chosen: became
  alternatives:
  - was made
  - came to be
  lexicon: BDAG
  rationale: '''Became'' is the most direct and natural rendering of γίνομαι here,
    expressing what Christ Jesus came to be for believers by God''s action.'
- source_word: σοφία
  chosen: wisdom
  lexicon: BDAG
  rationale: A straightforward rendering that matches the immediate context of 1 Corinthians
    1, where Paul contrasts worldly wisdom with God's wisdom in Christ.
- source_word: ἀπὸ θεοῦ
  chosen: from God
  alternatives:
  - from God for us
  - given by God
  lexicon: BDAG
  rationale: '''From God'' preserves the genitival/source force of the phrase with
    minimal interpretation. In the draft it is attached most directly to ''wisdom,''
    while the following nouns are presented as appositional elaboration.'
- source_word: δικαιοσύνη
  chosen: righteousness
  alternatives:
  - justice
  lexicon: BDAG
  rationale: The doctrinal guidance sets 'righteousness' as the default rendering,
    while preserving 'justice' in a footnote for Pauline usage. Here 'righteousness'
    best fits Paul's soteriological argument.
- source_word: ἁγιασμός
  chosen: sanctification
  alternatives:
  - holiness
  - consecration
  lexicon: BDAG
  rationale: '''Sanctification'' is the most established and precise rendering in
    Pauline contexts, expressing being made holy without flattening the theological
    nuance.'
- source_word: ἀπολύτρωσις
  chosen: redemption
  alternatives:
  - release
  - deliverance
  lexicon: BDAG
  rationale: '''Redemption'' best captures the liberation-by-payment/background sense
    of the term and is standard, clear English in this theological context.'
