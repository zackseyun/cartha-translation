id: 1CO.1.8
reference: 1 Corinthians 1:8
source:
  edition: SBLGNT
  text: ὃς καὶ βεβαιώσει ὑμᾶς ἕως τέλους ἀνεγκλήτους ἐν τῇ ἡμέρᾳ τοῦ κυρίου ἡμῶν Ἰησοῦ
    Χριστοῦ.
translation:
  text: who will also establish you until the end, blameless in the day of our Lord
    Jesus Messiah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'confirm' or 'strengthen.'
    reason: lexical_alternative
  - marker: b
    text: Or 'beyond reproach' or 'free from accusation.'
    reason: lexical_alternative
  - marker: c
    text: Greek 'Christ'; translated 'Messiah' here to preserve the title's meaning.
    reason: lexical_alternative
lexical_decisions:
- source_word: βεβαιώσει
  chosen: will also establish
  alternatives:
  - will also confirm
  - will also strengthen
  lexicon: BDAG
  rationale: The future verb conveys making someone firm or secure. 'Establish' preserves
    the stabilizing sense in natural English without sounding overly formal; 'confirm'
    is possible but can sound evidential rather than strengthening.
- source_word: ἕως τέλους
  chosen: until the end
  alternatives:
  - to the end
  lexicon: BDAG
  rationale: This phrase naturally expresses duration up to the eschatological endpoint.
    'Until the end' is clear modern English and preserves the temporal force.
- source_word: ἀνεγκλήτους
  chosen: blameless
  alternatives:
  - beyond reproach
  - free from accusation
  lexicon: BDAG
  rationale: The adjective denotes being not open to charge or accusation. 'Blameless'
    is the most concise and idiomatic rendering in this context, while the legal nuance
    is preserved in a footnote.
- source_word: ἐν τῇ ἡμέρᾳ
  chosen: in the day
  alternatives:
  - on the day
  lexicon: BDAG
  rationale: A literal rendering is sufficiently natural here and preserves the biblical
    idiom for the eschatological day of reckoning.
- source_word: κυρίου
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: This follows the project's default rendering for κύριος and fits both
    NT usage and the confessional weight of the title.
- source_word: Χριστοῦ
  chosen: Messiah
  alternatives:
  - Christ
  lexicon: BDAG
  rationale: Per project guidance, Χριστός is translated as 'Messiah' where its titular
    sense is still active. In 'our Lord Jesus Messiah,' the messianic title remains
    meaningful rather than functioning as a mere surname.
