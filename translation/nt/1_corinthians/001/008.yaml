theological_decisions:
- issue: Referent of ὃς ('who')
  chosen_reading: The relative pronoun refers to 'our Lord Jesus Messiah' in verse
    7.
  alternative_readings:
  - The pronoun refers more broadly to God mentioned earlier in the context.
  rationale: The nearest and most natural antecedent is the masculine singular 'our
    Lord Jesus Messiah' at the end of verse 7, yielding the sense that Jesus is the
    one who will establish believers until the end. This reading best fits the immediate
    syntax.
  doctrine_reference: Preserve theological tension rather than resolve it; here the
    syntax is sufficiently clear to translate without ambiguity in the main text.
