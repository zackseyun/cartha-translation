id: 1CO.1.27
reference: 1 Corinthians 1:27
source:
  edition: SBLGNT
  text: ἀλλὰ τὰ μωρὰ τοῦ κόσμου ἐξελέξατο ὁ θεός, ἵνα ⸂καταισχύνῃ τοὺς σοφούς⸃, καὶ
    τὰ ἀσθενῆ τοῦ κόσμου ἐξελέξατο ὁ θεός, ἵνα καταισχύνῃ τὰ ἰσχυρά,
translation:
  text: But God chose the foolish things of the world so that he might shame the wise,
    and God chose the weak things of the world so that he might shame the strong.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "what is foolish in the world"; the Greek uses a neuter plural adjective
      substantively.
    reason: lexical_alternative
  - marker: b
    text: Or "put to shame" for the verb translated "shame."
    reason: lexical_alternative
  - marker: c
    text: Or "what is weak in the world"; the Greek again uses a neuter plural adjective
      substantively.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀλλὰ
  chosen: But
  alternatives:
  - Instead
  - Rather
  rationale: Marks a strong contrast with the preceding statement; 'But' is the most
    natural concise English adversative here.
- source_word: μωρὰ
  chosen: the foolish things
  alternatives:
  - the foolish
  - what is foolish
  lexicon: BDAG
  rationale: The adjective is neuter plural and used substantivally. 'Things' makes
    the implied neuter sense explicit in readable English without over-interpreting
    the referent as specifically people.
- source_word: τοῦ κόσμου
  chosen: of the world
  alternatives:
  - in the world
  - according to the world
  lexicon: BDAG
  rationale: The genitive is best taken as identifying the sphere or source as viewed
    within the present world order; 'of the world' preserves the Greek form and Pauline
    contrast.
- source_word: ἐξελέξατο
  chosen: chose
  alternatives:
  - selected
  - picked out
  lexicon: BDAG
  rationale: '''Chose'' is the standard, clear rendering of ἐκλέγομαι and preserves
    the deliberate divine action without sounding colloquial.'
- source_word: ἵνα
  chosen: so that
  alternatives:
  - in order that
  - that
  lexicon: BDAG
  rationale: Introduces purpose. 'So that' is natural modern English and preserves
    the purposive force.
- source_word: καταισχύνῃ
  chosen: he might shame
  alternatives:
  - he might put to shame
  - he might disgrace
  lexicon: BDAG
  rationale: The verb means to shame or put to shame. 'Shame' is concise and natural;
    the auxiliary 'might' reflects the subjunctive in a purpose clause.
- source_word: τοὺς σοφούς
  chosen: the wise
  alternatives:
  - the wise people
  - the wise ones
  lexicon: BDAG
  rationale: The substantive adjective is idiomatically rendered 'the wise' in English
    and matches Paul's rhetorical contrast.
- source_word: ἀσθενῆ
  chosen: the weak things
  alternatives:
  - the weak
  - what is weak
  lexicon: BDAG
  rationale: Like μωρά, this is a neuter plural substantive. 'Things' preserves the
    grammatical form and avoids narrowing the reference prematurely.
- source_word: τὰ ἰσχυρά
  chosen: the strong
  alternatives:
  - the strong things
  - the powerful
  lexicon: BDAG
  rationale: Although the Greek is neuter plural, English idiom strongly favors 'the
    strong' in this antithetical pairing. This keeps the rhetoric smooth while preserving
    the contrast with 'the weak things.'
