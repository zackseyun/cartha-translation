id: 1CO.1.2
reference: 1 Corinthians 1:2
source:
  edition: SBLGNT
  text: τῇ ἐκκλησίᾳ τοῦ θεοῦ, ⸂ἡγιασμένοις ἐν Χριστῷ Ἰησοῦ, τῇ οὔσῃ ἐν Κορίνθῳ,⸃ κλητοῖς
    ἁγίοις, σὺν πᾶσιν τοῖς ἐπικαλουμένοις τὸ ὄνομα τοῦ κυρίου ἡμῶν Ἰησοῦ Χριστοῦ ἐν
    παντὶ τόπῳ ⸀αὐτῶν καὶ ἡμῶν·
translation:
  text: 'To the church of God that is in Corinth, to those sanctified in Messiah Jesus,
    called saints, together with all those who call on the name of our Lord Jesus
    Messiah in every place—theirs and ours:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "in Christ Jesus."
    reason: lexical_alternative
  - marker: b
    text: Or "called holy ones"; traditionally, "called to be saints."
    reason: lexical_alternative
  - marker: c
    text: Or "Jesus Christ."
    reason: lexical_alternative
  - marker: d
    text: The phrase "in every place—theirs and ours" may mean every place where believers
      call on the Lord, or every place belonging both to them and to us.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐκκλησίᾳ
  chosen: church
  alternatives:
  - assembly
  - congregation
  lexicon: BDAG
  rationale: '"Church" is the most natural modern English rendering in this epistolary
    address and matches the communal identity Paul names here, while still allowing
    the underlying sense of an assembled people.'
- source_word: ἡγιασμένοις
  chosen: sanctified
  alternatives:
  - made holy
  - consecrated
  lexicon: BDAG
  rationale: The perfect passive participle points to a completed act with ongoing
    result. "Sanctified" preserves both the theological weight and the passive sense
    of God’s action in Christ.
- source_word: ἐν Χριστῷ Ἰησοῦ
  chosen: in Messiah Jesus
  alternatives:
  - in Christ Jesus
  lexicon: BDAG
  rationale: Per doctrine, Χριστός is rendered "Messiah" where the title sense is
    active. In this Pauline formula, the messianic force remains meaningful, so "Messiah
    Jesus" is preferred over the traditional untranslated "Christ Jesus."
- source_word: κλητοῖς ἁγίοις
  chosen: called saints
  alternatives:
  - called holy ones
  - saints by calling
  - called to be saints
  lexicon: BDAG
  rationale: The Greek literally gives two adjectival descriptions, not an infinitive
    construction. "Called saints" is concise, preserves the grammar better than "called
    to be saints," and retains familiar biblical diction.
- source_word: ἁγίοις
  chosen: saints
  alternatives:
  - holy ones
  lexicon: BDAG
  rationale: '"Saints" is an established English equivalent here and is more readable
    than "holy ones," while still conveying consecrated belonging to God.'
- source_word: ἐπικαλουμένοις τὸ ὄνομα
  chosen: who call on the name
  alternatives:
  - who invoke the name
  lexicon: BDAG
  rationale: '"Call on the name" is idiomatic biblical English and preserves the covenantal/worshipful
    nuance better than the more formal "invoke."'
- source_word: κυρίου
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: This follows the doctrinal default for κύριος and fits both early Christian
    confession and established New Testament usage.
- source_word: Ἰησοῦ Χριστοῦ
  chosen: Jesus Messiah
  alternatives:
  - Jesus Christ
  lexicon: BDAG
  rationale: Χριστοῦ is retained as the translated title "Messiah" rather than the
    inherited transliteration "Christ," since the titular sense is still present in
    this confessional phrase.
- source_word: ἐν παντὶ τόπῳ αὐτῶν καὶ ἡμῶν
  chosen: in every place—theirs and ours
  alternatives:
  - in every place, both theirs and ours
  - in every place belonging to them and to us
  lexicon: BDAG
  rationale: The phrase is syntactically compressed. The dash helps modern readers
    hear the appositional clarification while preserving the ambiguity of the genitives.
