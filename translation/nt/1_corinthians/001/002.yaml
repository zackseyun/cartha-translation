theological_decisions:
- issue: Rendering Χριστός
  chosen_reading: Messiah in both occurrences
  alternative_readings:
  - Christ
  rationale: The project’s doctrinal guidance prefers "Messiah" where the titular
    sense is active. In this greeting, Paul’s wording still bears messianic significance
    rather than functioning as a mere surname.
