id: 1CO.1.31
reference: 1 Corinthians 1:31
source:
  edition: SBLGNT
  text: ἵνα καθὼς γέγραπται· Ὁ καυχώμενος ἐν κυρίῳ καυχάσθω.
translation:
  text: 'so that, just as it is written: “The one who boasts must boast in the Lord.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “Whoever boasts, let him boast in the Lord.”
    reason: lexical_alternative
lexical_decisions:
- source_word: ἵνα
  chosen: so that
  alternatives:
  - in order that
  lexicon: BDAG
  rationale: Introduces purpose/result flowing from the previous verse; “so that”
    is natural modern English while preserving the clause’s purposive force.
- source_word: καθὼς
  chosen: just as
  alternatives:
  - as
  lexicon: BDAG
  rationale: Marks correspondence with the written citation; “just as” clearly signals
    scriptural comparison/confirmation.
- source_word: γέγραπται
  chosen: it is written
  alternatives:
  - it has been written
  lexicon: BDAG
  rationale: Standard English rendering of the Greek perfect passive citation formula,
    preserving the abiding authority of Scripture without sounding wooden.
- source_word: Ὁ καυχώμενος
  chosen: The one who boasts
  alternatives:
  - Whoever boasts
  - The one who glories
  lexicon: BDAG
  rationale: The articular participle is rendered with an English substantival construction.
    “Boasts” is clearer and more natural in modern English than “glories,” while retaining
    the sense of exulting or taking pride.
- source_word: ἐν
  chosen: in
  alternatives:
  - about
  lexicon: BDAG
  rationale: The preposition is best preserved as “in” here, matching the Greek expression
    and standard Pauline usage of boasting located in its proper sphere or object.
- source_word: κυρίῳ
  chosen: the Lord
  alternatives:
  - Lord
  lexicon: BDAG
  rationale: κύριος is a contested term in the project guidelines and defaults to
    “Lord.” Including the article in English yields the idiomatic phrase “in the Lord.”
- source_word: καυχάσθω
  chosen: must boast
  alternatives:
  - let him boast
  - should boast
  lexicon: BDAG
  rationale: The imperative calls for a norm or command. “Must boast” communicates
    the force directly in clear modern English and avoids the potentially archaic-sounding
    “let him boast.”
