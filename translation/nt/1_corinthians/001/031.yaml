theological_decisions:
- issue: Rendering the citation’s imperative force in contemporary English
  chosen_reading: must boast
  alternative_readings:
  - let him boast
  - should boast
  rationale: The verse redirects all legitimate boasting away from self and toward
    the Lord. “Must boast” preserves the exhortational force in readable modern English
    without adding doctrinal content.
  doctrine_reference: 'Translation philosophy: readable modern English, not archaic
    or academic'
- issue: Rendering κύριος in the quotation
  chosen_reading: the Lord
  alternative_readings:
  - Lord
  rationale: Following the doctrine’s contested-terms table, κύριος is rendered “Lord.”
    In this Pauline context the phrase naturally reads “in the Lord,” preserving both
    lexical consistency and the theological focus of the citation.
  doctrine_reference: 'Contested terms: κύριος → Lord'
