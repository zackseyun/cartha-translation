theological_decisions:
- issue: Aspect of salvation in σῳζομένοις
  chosen_reading: us who are being saved
  alternative_readings:
  - us who are saved
  rationale: The Greek present participle naturally expresses an ongoing process or
    present experience, and this preserves Pauline tension without collapsing salvation
    into only a past event.
  doctrine_reference: Preserve theological tension rather than resolve it.
