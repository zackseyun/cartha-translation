id: 1CO.1.18
reference: 1 Corinthians 1:18
source:
  edition: SBLGNT
  text: Ὁ λόγος γὰρ ὁ τοῦ σταυροῦ τοῖς μὲν ἀπολλυμένοις μωρία ἐστίν, τοῖς δὲ σῳζομένοις
    ἡμῖν δύναμις θεοῦ ἐστιν.
translation:
  text: For the message of the cross is foolishness to those who are perishing, but
    to us who are being saved it is the power of God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “word of the cross.”
    reason: lexical_alternative
  - marker: b
    text: Greek “us who are being saved”; the wording presents salvation here as an
      ongoing reality.
    reason: alternative_reading
lexical_decisions:
- source_word: λόγος
  chosen: message
  alternatives:
  - word
  lexicon: BDAG
  rationale: Rendered as “message” rather than “word” because Paul refers to the proclaimed
    content about the cross, not merely a single utterance; this is clearer in natural
    English while staying close to the Greek sense.
- source_word: σταυροῦ
  chosen: cross
  alternatives:
  - crucifixion
  lexicon: BDAG
  rationale: Translated literally as “cross.” Although it can metonymically refer
    to Christ’s crucifixion, “cross” preserves Paul’s compact expression and established
    theological force.
- source_word: ἀπολλυμένοις
  chosen: those who are perishing
  alternatives:
  - those who are lost
  - those who are being destroyed
  lexicon: BDAG
  rationale: 'The present middle/passive participle is best represented as an ongoing
    condition: “are perishing.” “Lost” is possible but weaker; “being destroyed” is
    more wooden and less idiomatic here.'
- source_word: μωρία
  chosen: foolishness
  alternatives:
  - folly
  lexicon: BDAG
  rationale: “Foolishness” is the clearest modern equivalent and matches Paul’s contrast
    with God’s power.
- source_word: σῳζομένοις
  chosen: us who are being saved
  alternatives:
  - us who are saved
  - us who are being rescued
  lexicon: BDAG
  rationale: The present participle indicates an ongoing saving reality, so “being
    saved” best preserves the aspect. Including “us” follows the explicit ἡμῖν and
    keeps Paul’s self-involving contrast.
- source_word: δύναμις θεοῦ
  chosen: the power of God
  alternatives:
  - God’s power
  lexicon: BDAG
  rationale: Rendered in a formally close way that preserves the emphatic predicate
    structure and theological weight.
