theological_decisions:
- issue: Rendering ἀδελφοί in a mixed-gender church context
  chosen_reading: my brothers
  alternative_readings:
  - my brothers and sisters
  rationale: The likely inclusive reference is acknowledged, but the translation policy
    calls for gender-accurate rendering where the Greek is grammatically masculine
    with representative force. The inclusive sense is preserved in a footnote rather
    than the main text.
  doctrine_reference: Translation philosophy §4 (Gender-accurate over gender-neutral)
