id: 1CO.1.11
reference: 1 Corinthians 1:11
source:
  edition: SBLGNT
  text: ἐδηλώθη γάρ μοι περὶ ὑμῶν, ἀδελφοί μου, ὑπὸ τῶν Χλόης ὅτι ἔριδες ἐν ὑμῖν εἰσιν.
translation:
  text: For it has been reported to me about you, my brothers, by Chloe’s people,
    that there are quarrels among you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my brothers and sisters.' The Greek says 'brothers' and may address
      the whole believing community inclusively.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐδηλώθη
  chosen: it has been reported
  alternatives:
  - it was made known
  - it was reported
  lexicon: BDAG
  entry: δηλόω
  rationale: The passive indicates information made known to Paul. 'It has been reported'
    is natural modern English and preserves the passive sense without unnecessary
    stiffness.
- source_word: γάρ
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: BDAG
  entry: γάρ
  rationale: Retains Paul's explanatory connection to the preceding exhortation.
- source_word: περὶ ὑμῶν
  chosen: about you
  alternatives:
  - concerning you
  lexicon: BDAG
  entry: περί
  rationale: '''About you'' is the most natural contemporary equivalent and accurately
    conveys the prepositional phrase.'
- source_word: ἀδελφοί μου
  chosen: my brothers
  alternatives:
  - my brothers and sisters
  - my brethren
  lexicon: BDAG
  entry: ἀδελφός
  rationale: The doctrine requires gender-accurate rendering over gender-neutral language.
    Although the referent likely includes the whole church, the Greek is masculine
    plural, so 'my brothers' is kept in the main text.
- source_word: ὑπὸ τῶν Χλόης
  chosen: by Chloe’s people
  alternatives:
  - by those of Chloe
  - by Chloe's household
  lexicon: BDAG
  entry: ὑπό; Χλόη
  rationale: The expression refers to persons associated with Chloe. 'Chloe’s people'
    is clear, natural, and avoids over-specifying 'household,' which may be right
    but is slightly more interpretive.
- source_word: ἔριδες
  chosen: quarrels
  alternatives:
  - strifes
  - contentions
  - divisions
  lexicon: BDAG
  entry: ἔρις
  rationale: The plural denotes interpersonal conflicts. 'Quarrels' is readable modern
    English and more precise here than the broader 'divisions,' which appears elsewhere
    in the context.
- source_word: ἐν ὑμῖν εἰσιν
  chosen: there are ... among you
  alternatives:
  - exist among you
  - are among you
  lexicon: BDAG
  entry: ἐν; εἰμί
  rationale: This construction is best expressed idiomatically in English as 'there
    are ... among you.'
