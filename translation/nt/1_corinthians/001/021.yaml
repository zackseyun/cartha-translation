theological_decisions:
- issue: Meaning of διὰ τῆς μωρίας τοῦ κηρύγματος
  chosen_reading: the phrase refers primarily to the proclaimed message as perceived
    to be foolish
  alternative_readings:
  - the foolish act/method of preaching
  - a deliberately ambiguous blend of message and act
  rationale: κήρυγμα commonly denotes what is proclaimed, though in context Paul may
    also evoke the public act of proclamation. The main text uses 'proclamation' to
    preserve both dimensions better than 'preaching' alone, while highlighting that
    the message is judged foolish by worldly standards, not by God.
  doctrine_reference: Preserve theological tension rather than resolve it.
