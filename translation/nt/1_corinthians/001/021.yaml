id: 1CO.1.21
reference: 1 Corinthians 1:21
source:
  edition: SBLGNT
  text: ἐπειδὴ γὰρ ἐν τῇ σοφίᾳ τοῦ θεοῦ οὐκ ἔγνω ὁ κόσμος διὰ τῆς σοφίας τὸν θεόν,
    εὐδόκησεν ὁ θεὸς διὰ τῆς μωρίας τοῦ κηρύγματος σῶσαι τοὺς πιστεύοντας.
translation:
  text: For since, in the wisdom of God, the world did not know God through wisdom,
    God was pleased through the foolishness of the proclamation to save those who
    believe.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “through the foolishness of preaching.”
    reason: alternative_reading
  - marker: b
    text: That is, what the world regards as foolish in the proclaimed message.
    reason: cultural_note
lexical_decisions:
- source_word: ἐπειδὴ γὰρ
  chosen: For since
  alternatives:
  - Since
  - For because
  lexicon: BDAG
  entry: ἐπειδή; γάρ
  rationale: 'Keeps the verse''s explanatory and causal flow: γάρ links back to the
    prior argument, while ἐπειδή introduces the circumstance.'
- source_word: ἐν τῇ σοφίᾳ τοῦ θεοῦ
  chosen: in the wisdom of God
  alternatives:
  - by the wisdom of God
  - within God's wisdom
  lexicon: BDAG
  entry: ἐν; σοφία
  rationale: 'A relatively formal rendering best preserves the ambiguity of ἐν here:
    the world''s failure occurs within the sphere or arrangement of God''s wisdom,
    without over-specifying instrumentality.'
- source_word: οὐκ ἔγνω
  chosen: did not know
  alternatives:
  - did not come to know
  - failed to know
  lexicon: BDAG
  entry: γινώσκω
  rationale: Simple past English fits the aorist and keeps the statement readable.
    'Know' preserves relational/cognitive breadth better than a narrower gloss.
- source_word: ὁ κόσμος
  chosen: the world
  alternatives:
  - the human world
  - the world system
  lexicon: BDAG
  entry: κόσμος
  rationale: Standard Pauline rendering that preserves the representative sense of
    humanity in its worldly order without interpretive expansion.
- source_word: διὰ τῆς σοφίας
  chosen: through wisdom
  alternatives:
  - by wisdom
  - through its wisdom
  lexicon: BDAG
  entry: διά; σοφία
  rationale: '''Through'' naturally renders διά with the genitive as means. The anarthrous
    English ''wisdom'' is idiomatic and captures the mode by which the world sought
    God.'
- source_word: εὐδόκησεν ὁ θεὸς
  chosen: God was pleased
  alternatives:
  - God decided
  - God delighted
  lexicon: BDAG
  entry: εὐδοκέω
  rationale: '''Was pleased'' preserves the sense of divine good pleasure better than
    the flatter ''decided'' and is more idiomatic here than ''delighted''.'
- source_word: διὰ τῆς μωρίας τοῦ κηρύγματος
  chosen: through the foolishness of the proclamation
  alternatives:
  - through the foolishness of preaching
  - through the foolishness of the message proclaimed
  lexicon: BDAG
  entry: μωρία; κήρυγμα
  rationale: The genitive construction most naturally points to the proclaimed message
    rather than the act of preaching alone. 'Proclamation' preserves κήρυγμα as the
    announced content while allowing the irony that it is regarded as foolish.
- source_word: σῶσαι
  chosen: to save
  alternatives:
  - to rescue
  lexicon: BDAG
  entry: σῴζω
  rationale: '''Save'' is the standard theological rendering and best preserves Paul''s
    soteriological language.'
- source_word: τοὺς πιστεύοντας
  chosen: those who believe
  alternatives:
  - the believers
  - those who are believing
  lexicon: BDAG
  entry: πιστεύω
  rationale: This renders the present participle in clear English while preserving
    its substantival sense. It avoids importing a stronger doctrinal nuance than the
    Greek itself states.
