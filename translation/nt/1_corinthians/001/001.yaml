theological_decisions:
- issue: Rendering Χριστός in a Pauline greeting
  chosen_reading: Messiah Jesus
  alternative_readings:
  - Christ Jesus
  rationale: The doctrinal guidelines direct that Χριστός be translated as 'Messiah'
    where it functions as a title. In this verse it identifies Jesus in his messianic
    office rather than serving merely as a fixed surname-like label.
