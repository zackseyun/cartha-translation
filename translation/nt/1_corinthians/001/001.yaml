id: 1CO.1.1
reference: 1 Corinthians 1:1
source:
  edition: SBLGNT
  text: Παῦλος κλητὸς ἀπόστολος ⸂Χριστοῦ Ἰησοῦ⸃ διὰ θελήματος θεοῦ καὶ Σωσθένης ὁ
    ἀδελφὸς
translation:
  text: Paul, called to be an apostle of Messiah Jesus by the will of God, and Sosthenes
    the brother,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or Christ Jesus.
    reason: lexical_alternative
lexical_decisions:
- source_word: Παῦλος
  chosen: Paul
  alternatives:
  - Paulos
  rationale: Standard English transliteration of the personal name.
- source_word: κλητὸς
  chosen: called to be
  alternatives:
  - called
  - a called
  lexicon: BDAG
  rationale: The adjective modifies Paul's apostolic status; English idiom typically
    supplies 'to be' to express the sense naturally without changing the meaning.
- source_word: ἀπόστολος
  chosen: apostle
  alternatives:
  - messenger
  - envoy
  lexicon: BDAG
  rationale: In Pauline self-identification this term carries the technical sense
    of an authorized apostolic office, so 'apostle' is the most accurate and established
    rendering.
- source_word: Χριστοῦ Ἰησοῦ
  chosen: Messiah Jesus
  alternatives:
  - Christ Jesus
  - Jesus Christ
  lexicon: BDAG
  rationale: Χριστός is a title here, not merely a name-like element, so the doctrinal
    default 'Messiah' is preferred; Ἰησοῦ is transliterated as the personal name 'Jesus.'
- source_word: διὰ θελήματος θεοῦ
  chosen: by the will of God
  alternatives:
  - through the will of God
  lexicon: BDAG
  rationale: With διά and the genitive, the phrase expresses means or agency; 'by
    the will of God' is the most natural English rendering in this epistolary context.
- source_word: Σωσθένης
  chosen: Sosthenes
  rationale: Standard English transliteration of the personal name.
- source_word: ὁ ἀδελφὸς
  chosen: the brother
  alternatives:
  - our brother
  - a brother
  lexicon: BDAG
  rationale: The Greek has the article and no possessive pronoun, so 'the brother'
    most closely reflects the source text. 'Brother' preserves the masculine familial
    term rather than neutralizing it.
