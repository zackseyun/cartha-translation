id: 1CO.1.22
reference: 1 Corinthians 1:22
source:
  edition: SBLGNT
  text: ἐπειδὴ καὶ Ἰουδαῖοι ⸀σημεῖα αἰτοῦσιν καὶ Ἕλληνες σοφίαν ζητοῦσιν·
translation:
  text: For Jews ask for signs, and Greeks seek wisdom.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'since Jews ask for signs, and Greeks seek wisdom.'
    reason: alternative_reading
  - marker: b
    text: '''Signs'' may also be understood as ''miraculous signs.'''
    reason: lexical_alternative
  - marker: c
    text: '''Greeks'' could be rendered more broadly as ''Gentiles,'' but Paul likely
      preserves the specific Greek cultural frame because of the reference to wisdom.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπειδή
  chosen: For
  alternatives:
  - since
  - because
  lexicon: BDAG
  rationale: Here it introduces Paul's explanatory ground for the contrast developed
    in the surrounding argument, so 'For' reads naturally in English while preserving
    the causal sense.
- source_word: Ἰουδαῖοι
  chosen: Jews
  alternatives:
  - Judeans
  lexicon: BDAG
  rationale: In this context the term contrasts a recognizable Jewish group with 'Greeks'
    as broad cultural-religious categories, so 'Jews' is the most natural English
    rendering.
- source_word: σημεῖα
  chosen: signs
  alternatives:
  - miraculous signs
  lexicon: BDAG
  rationale: '''Signs'' preserves the Greek term directly and fits Paul''s rhetoric;
    the miraculous nuance is contextually available without needing expansion in the
    main text.'
- source_word: αἰτοῦσιν
  chosen: ask for
  alternatives:
  - request
  - demand
  lexicon: BDAG
  rationale: '''Ask for'' is the most straightforward rendering of the present indicative
    here; ''demand'' is possible rhetorically but somewhat stronger than the verb
    itself requires.'
- source_word: Ἕλληνες
  chosen: Greeks
  alternatives:
  - Gentiles
  lexicon: BDAG
  rationale: Because σοφία immediately follows and the contrast is cultural as well
    as ethnic, 'Greeks' better preserves Paul's wording and rhetorical force than
    the broader 'Gentiles'.
- source_word: σοφίαν
  chosen: wisdom
  alternatives:
  - philosophical wisdom
  lexicon: BDAG
  rationale: '''Wisdom'' is the direct lexical equivalent and keeps the broader conceptual
    range Paul is invoking without narrowing it too quickly to philosophy alone.'
- source_word: ζητοῦσιν
  chosen: seek
  alternatives:
  - look for
  - pursue
  lexicon: BDAG
  rationale: '''Seek'' is both natural English and a close match to the Greek, preserving
    the ongoing present sense.'
