id: 1CO.1.24
reference: 1 Corinthians 1:24
source:
  edition: SBLGNT
  text: αὐτοῖς δὲ τοῖς κλητοῖς, Ἰουδαίοις τε καὶ Ἕλλησιν, Χριστὸν θεοῦ δύναμιν καὶ
    θεοῦ σοφίαν.
translation:
  text: But to those who are called, both Jews and Greeks, Messiah is God’s power
    and God’s wisdom.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or Christ.
    reason: lexical_alternative
lexical_decisions:
- source_word: κλητοῖς
  chosen: those who are called
  alternatives:
  - the called
  - those who have been called
  lexicon: BDAG
  rationale: The adjective functions substantivally for a group identified by God’s
    calling. 'Those who are called' is natural English and preserves the verbal sense
    better than the more static 'the called'.
- source_word: Ἰουδαίοις
  chosen: Jews
  alternatives:
  - Judeans
  lexicon: BDAG
  rationale: In this Pauline contrast with 'Greeks,' the ethnoreligious sense is primary,
    so 'Jews' is the clearest English rendering.
- source_word: Ἕλλησιν
  chosen: Greeks
  alternatives:
  - Gentiles
  lexicon: BDAG
  rationale: Paul explicitly says 'Greeks,' and the Jew/Greek pairing is a common
    Pauline way of describing the broad human divide. 'Greeks' preserves the source
    wording more closely than the broader interpretive gloss 'Gentiles'.
- source_word: Χριστόν
  chosen: Messiah
  alternatives:
  - Christ
  lexicon: BDAG
  rationale: Per project doctrine, Χριστός is translated as 'Messiah' where it functions
    as a title. Here it is titular and emphasizes Jesus’ messianic identity rather
    than serving merely as a name.
- source_word: θεοῦ δύναμιν
  chosen: God’s power
  alternatives:
  - the power of God
  lexicon: BDAG
  rationale: The genitive is rendered with the English possessive for readability.
    This preserves the sense while sounding more natural in contemporary English.
- source_word: θεοῦ σοφίαν
  chosen: God’s wisdom
  alternatives:
  - the wisdom of God
  lexicon: BDAG
  rationale: As with the prior phrase, the possessive construction is clearer and
    more natural in modern English while preserving the repeated genitive structure.
- source_word: implicit copula / verbless predicate relation
  chosen: Messiah is God’s power and God’s wisdom
  alternatives:
  - Messiah, God’s power and God’s wisdom
  - we proclaim Messiah as God’s power and God’s wisdom
  rationale: The Greek clause is elliptical and depends on the previous verse’s syntax,
    but in English a supplied 'is' makes the verse stand naturally and accurately
    expresses the predicative force for the called.
