theological_decisions:
- issue: Rendering σάρξ in a Pauline context
  chosen_reading: Translate σάρξ as 'flesh' rather than 'sinful nature' or 'human
    being.'
  alternative_readings:
  - human being
  - humanity
  - sinful nature
  rationale: In 1 Corinthians 1:29 the emphasis is not on an internal moral principle
    but on human creatureliness and weakness over against God. Retaining 'flesh' preserves
    Paul's rhetoric and aligns with the doctrine guideline for context-dependent rendering
    of σάρξ.
  doctrine_reference: 'DOCTRINE.md Contested terms: σάρξ → ''flesh'' (literal) / ''sinful
    nature'' (metaphorical)'
