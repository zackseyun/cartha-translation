id: 1CO.1.29
reference: 1 Corinthians 1:29
source:
  edition: SBLGNT
  text: ὅπως μὴ καυχήσηται πᾶσα σὰρξ ἐνώπιον τοῦ θεοῦ.
translation:
  text: so that no flesh may boast before God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'no human being may boast before God.' Literally, 'no flesh.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅπως
  chosen: so that
  alternatives:
  - in order that
  lexicon: BDAG
  rationale: Marks purpose/result; 'so that' is natural modern English and preserves
    the clause's telic force.
- source_word: μὴ
  chosen: 'no'
  alternatives:
  - not
  - no one
  lexicon: BDAG
  rationale: Combined with the subjunctive verb, it negates the purpose clause. In
    English, 'no flesh may boast' is smoother than 'flesh may not boast' while preserving
    the sense.
- source_word: καυχήσηται
  chosen: may boast
  alternatives:
  - might boast
  - may glory
  lexicon: BDAG
  rationale: Subjunctive middle in a purpose clause; 'may boast' best captures the
    intended prevention of boasting without archaic diction.
- source_word: πᾶσα σὰρξ
  chosen: no flesh
  alternatives:
  - no human being
  - no one
  lexicon: BDAG
  rationale: Literally 'all flesh,' but under negation the sense is universal exclusion.
    Because σάρξ is a contested term and here refers to humanity in creaturely weakness
    rather than 'sinful nature,' 'flesh' should be retained in the main text.
- source_word: σὰρξ
  chosen: flesh
  alternatives:
  - humanity
  - human being
  lexicon: BDAG
  rationale: The doctrine table defaults σάρξ to 'flesh' when literal or non-metaphorical.
    Here Paul speaks of mortal humanity before God, so 'flesh' preserves the biblical
    texture better than a flattened substitute.
- source_word: ἐνώπιον τοῦ θεοῦ
  chosen: before God
  alternatives:
  - in the presence of God
  - before the sight of God
  lexicon: BDAG
  rationale: A standard idiomatic rendering meaning in God's presence or before his
    face. 'Before God' is concise, clear, and faithful.
