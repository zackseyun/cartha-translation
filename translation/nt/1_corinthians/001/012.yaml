theological_decisions:
- issue: Rendering Χριστοῦ in a factional slogan
  chosen_reading: Messiah
  alternative_readings:
  - Christ
  rationale: The verse uses Χριστός as a title, not merely a name-like label, so the
    doctrinal guidance favors 'Messiah.' The traditional English form 'Christ' is
    preserved in a footnote.
