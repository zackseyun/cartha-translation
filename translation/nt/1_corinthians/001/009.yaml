id: 1CO.1.9
reference: 1 Corinthians 1:9
source:
  edition: SBLGNT
  text: πιστὸς ὁ θεὸς δι’ οὗ ἐκλήθητε εἰς κοινωνίαν τοῦ υἱοῦ αὐτοῦ Ἰησοῦ Χριστοῦ τοῦ
    κυρίου ἡμῶν.
translation:
  text: God is faithful, by whom you were called into fellowship with his Son, Jesus
    Messiah our Lord.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “through whom.”
    reason: lexical_alternative
  - marker: b
    text: Or “participation” or “sharing.”
    reason: lexical_alternative
  - marker: c
    text: Greek “Jesus Christ”; “Messiah” renders the title Χριστός.
    reason: alternative_reading
lexical_decisions:
- source_word: πιστὸς
  chosen: faithful
  alternatives:
  - trustworthy
  lexicon: BDAG
  rationale: Predicative adjective describing God’s dependable character and covenant
    reliability; “faithful” is the most natural and theologically weighty English
    rendering here.
- source_word: δι’ οὗ
  chosen: by whom
  alternatives:
  - through whom
  lexicon: BDAG
  rationale: διά with the genitive can mean either “through” or “by.” Here it marks
    God as the personal agent through whom the calling occurred. “By whom” is natural
    English and preserves the agency.
- source_word: ἐκλήθητε
  chosen: you were called
  alternatives:
  - you were invited
  - you were summoned
  lexicon: BDAG
  rationale: The aorist passive of καλέω is a standard Pauline expression for God’s
    effective call. “Called” preserves both the lexical form and Pauline theological
    resonance without over-paraphrase.
- source_word: κοινωνίαν
  chosen: fellowship
  alternatives:
  - participation
  - sharing
  - communion
  lexicon: BDAG
  rationale: κοινωνία denotes shared participation or relational fellowship. “Fellowship”
    best balances relational and participatory senses in accessible English, while
    avoiding overly sacramental narrowing.
- source_word: τοῦ υἱοῦ αὐτοῦ
  chosen: with his Son
  alternatives:
  - of his Son
  lexicon: BDAG
  rationale: Although the Greek genitive depends on κοινωνία, idiomatic English expresses
    the relationship as fellowship “with” someone rather than fellowship “of” someone.
- source_word: Χριστοῦ
  chosen: Messiah
  alternatives:
  - Christ
  lexicon: BDAG
  rationale: Per the stated doctrine, Χριστός is translated as “Messiah” where it
    functions as a title. In this appositional string after Jesus, the titular sense
    remains present and should be preserved.
- source_word: κυρίου
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: This follows the project’s default rendering for κύριος and preserves
    the christological title in standard, readable English.
