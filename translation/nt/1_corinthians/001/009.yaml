theological_decisions:
- issue: Whether Χριστοῦ should be rendered as the name-like “Christ” or the translated
    title “Messiah.”
  chosen_reading: Messiah
  alternative_readings:
  - Christ
  rationale: The doctrine excerpt directs that Χριστός be translated as “Messiah”
    where context supports a titular sense. Here, despite the familiar fixed expression
    “Jesus Christ,” the title remains semantically active in Paul’s christological
    wording.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; Contested
    terms table for Χριστός'
