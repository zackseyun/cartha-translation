theological_decisions:
- issue: Rendering εἰς τὸ ἐμὸν ὄνομα in a baptismal context
  chosen_reading: into my name
  alternative_readings:
  - in my name
  rationale: The Greek preposition εἰς naturally means 'into,' and retaining it preserves
    Paul’s wording and the relational force of baptismal identification. 'In my name'
    is idiomatic in English and interpretively plausible, so it is preserved in a
    footnote rather than replacing the more textually transparent rendering.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
