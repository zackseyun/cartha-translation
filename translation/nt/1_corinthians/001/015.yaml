id: 1CO.1.15
reference: 1 Corinthians 1:15
source:
  edition: SBLGNT
  text: ἵνα μή τις εἴπῃ ὅτι εἰς τὸ ἐμὸν ὄνομα ⸀ἐβαπτίσθητε·
translation:
  text: so that no one may say that you were baptized into my name.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “in my name.”
    reason: lexical_alternative
lexical_decisions:
- source_word: ἵνα
  chosen: so that
  alternatives:
  - lest
  - in order that
  lexicon: BDAG
  rationale: Marks purpose/result. 'So that' is natural modern English and preserves
    the clause’s function without sounding archaic.
- source_word: μή τις
  chosen: no one
  alternatives:
  - anyone
  lexicon: BDAG
  rationale: The combination idiomatically expresses a negated indefinite subject.
    'No one' is the clearest English rendering in this construction.
- source_word: εἴπῃ
  chosen: may say
  alternatives:
  - should say
  - would say
  lexicon: BDAG
  rationale: Aorist subjunctive after ἵνα is well represented by 'may say' in English,
    preserving the prospective sense.
- source_word: εἰς
  chosen: into
  alternatives:
  - in
  lexicon: BDAG
  rationale: The preposition is literally 'into.' Because Paul is speaking about baptism
    in relation to a name, retaining 'into' preserves the Greek wording and theological
    texture better than smoothing to 'in.'
- source_word: τὸ ἐμὸν ὄνομα
  chosen: my name
  alternatives:
  - the name that is mine
  lexicon: BDAG
  rationale: A straightforward possessive construction. 'My name' is both accurate
    and natural.
- source_word: ἐβαπτίσθητε
  chosen: you were baptized
  alternatives:
  - you were immersed
  lexicon: BDAG
  rationale: The passive form is explicit and should be preserved. 'Baptized' is the
    standard transparent rendering in this context and avoids importing a denominationally
    specific practice.
