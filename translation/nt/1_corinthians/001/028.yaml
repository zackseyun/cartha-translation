id: 1CO.1.28
reference: 1 Corinthians 1:28
source:
  edition: SBLGNT
  text: καὶ τὰ ἀγενῆ τοῦ κόσμου καὶ τὰ ἐξουθενημένα ἐξελέξατο ὁ θεός, ⸀τὰ μὴ ὄντα,
    ἵνα τὰ ὄντα καταργήσῃ,
translation:
  text: And God chose the lowborn things of the world and the despised things—the
    things that are not—to nullify the things that are,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “those regarded as nothing.”
    reason: lexical_alternative
  - marker: b
    text: Or “bring to nothing.”
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀγενῆ
  chosen: lowborn things
  alternatives:
  - base things
  - ignoble things
  - things of low status
  lexicon: BDAG
  rationale: The adjective refers to what is without noble birth or social standing.
    “Lowborn things” preserves the social-status sense more clearly than the traditional
    “base things.”
- source_word: ἐξουθενημένα
  chosen: despised things
  alternatives:
  - things treated with contempt
  - things looked down on
  lexicon: BDAG
  rationale: The perfect participle conveys those who have been treated as worthless
    or contemptible. “Despised things” is concise and natural while retaining the
    force of rejection.
- source_word: τὰ μὴ ὄντα
  chosen: the things that are not
  alternatives:
  - the things that do not exist
  - those regarded as nothing
  - the nonentities
  lexicon: BDAG
  rationale: This formally preserves Paul’s striking expression and leaves intact
    the rhetorical tension between literal non-being and social insignificance. The
    immediate context favors social insignificance, but the Greek wording is broader
    and more forceful than a paraphrase like “nobodies.”
- source_word: τὰ ὄντα
  chosen: the things that are
  alternatives:
  - the things that exist
  - those who are something
  lexicon: BDAG
  rationale: Rendering it closely maintains the contrast with “the things that are
    not.” A more idiomatic paraphrase would weaken Paul’s balanced antithesis.
- source_word: καταργήσῃ
  chosen: nullify
  alternatives:
  - bring to nothing
  - abolish
  - render powerless
  lexicon: BDAG
  rationale: The verb means to cause something to become ineffective or invalid. “Nullify”
    communicates that sense clearly in modern English without overcommitting to annihilation.
- source_word: ἐξελέξατο
  chosen: chose
  alternatives:
  - selected
  lexicon: BDAG
  rationale: “Chose” is the standard and natural rendering for God’s deliberate act
    here and fits Paul’s repeated wording in the immediate context.
