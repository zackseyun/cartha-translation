theological_decisions:
- issue: Whether τὰ μὴ ὄντα / τὰ ὄντα should be interpreted in the main text as social
    categories or as absolute ontological statements.
  chosen_reading: 'Preserve the literal contrast: “the things that are not” / “the
    things that are.”'
  alternative_readings:
  - Interpret dynamically as “those who count for nothing” / “those who count for
    something.”
  rationale: The context clearly concerns status before the world, but Paul intentionally
    states it in broader, more provocative language. Preserving the literal wording
    keeps both the rhetorical sharpness and the social force without importing a narrower
    interpretation into the main text.
  doctrine_reference: Preserve theological tension rather than resolve it.
