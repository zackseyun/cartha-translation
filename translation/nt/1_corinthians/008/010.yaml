theological_decisions:
- issue: Rendering οἰκοδομηθήσεται in a context of harmful imitation
  chosen_reading: be built up
  alternative_readings:
  - be emboldened
  - be encouraged
  rationale: Although many English versions render the verb idiomatically as 'be emboldened,'
    the Greek uses Paul's normal edification term, likely with irony. Preserving 'be
    built up' maintains the lexical and rhetorical tension rather than resolving it
    interpretively; the idiomatic sense is preserved in a footnote.
  doctrine_reference: Translation philosophy §3, §5
