id: 1CO.8.10
reference: 1 Corinthians 8:10
source:
  edition: SBLGNT
  text: ἐὰν γάρ τις ἴδῃ σὲ τὸν ἔχοντα γνῶσιν ἐν εἰδωλείῳ κατακείμενον, οὐχὶ ἡ συνείδησις
    αὐτοῦ ἀσθενοῦς ὄντος οἰκοδομηθήσεται εἰς τὸ τὰ εἰδωλόθυτα ἐσθίειν;
translation:
  text: For if someone sees you, the one having knowledge, reclining in an idol’s
    temple, will not his conscience, being weak, be built up to eat food sacrificed
    to idols?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'be emboldened.' The Greek literally says 'be built up,' using Paul's
      usual edification language with likely irony.
    reason: lexical_alternative
lexical_decisions:
- source_word: γάρ
  chosen: For
  alternatives:
  - Indeed
  - Because
  lexicon: BDAG
  rationale: Connects this verse to the prior warning by giving the reason or illustrative
    explanation; 'For' preserves the argumentative flow.
- source_word: τις
  chosen: someone
  alternatives:
  - anyone
  - a person
  lexicon: BDAG
  rationale: Indefinite singular; 'someone' is natural modern English and preserves
    the hypothetical force.
- source_word: ἴδῃ
  chosen: sees
  alternatives:
  - should see
  - might see
  lexicon: BDAG
  rationale: Aorist subjunctive with ἐὰν forms a future-more-vivid condition; English
    idiom is best represented by present 'sees' after 'if'.
- source_word: σὲ τὸν ἔχοντα γνῶσιν
  chosen: you, the one having knowledge
  alternatives:
  - you, who have knowledge
  - you, possessing knowledge
  lexicon: BDAG
  rationale: The articular participial construction identifies the addressee as the
    person characterized by knowledge. 'The one having knowledge' is slightly formal
    but keeps the pointed irony and close structure of the Greek.
- source_word: γνῶσιν
  chosen: knowledge
  alternatives:
  - understanding
  lexicon: BDAG
  rationale: This term is thematically important in 1 Corinthians 8; 'knowledge' preserves
    the lexical link with the surrounding discussion.
- source_word: ἐν εἰδωλείῳ
  chosen: in an idol’s temple
  alternatives:
  - in an idol temple
  - in a temple of idols
  lexicon: BDAG
  rationale: εἰδωλεῖον refers to a shrine or temple associated with an idol. 'Idol’s
    temple' is concise, natural, and communicates the cultic setting.
- source_word: κατακείμενον
  chosen: reclining
  alternatives:
  - sitting at table
  - dining
  lexicon: BDAG
  rationale: The verb literally refers to reclining at a meal, the customary dining
    posture. 'Reclining' preserves the concrete image without over-paraphrasing; the
    meal context is then clarified by the rest of the sentence.
- source_word: οὐχὶ
  chosen: will not
  alternatives:
  - will surely
  - will it not
  lexicon: BDAG
  rationale: Introduces a rhetorical question expecting a positive answer. 'Will not'
    preserves the interrogative force in idiomatic English.
- source_word: ἡ συνείδησις αὐτοῦ
  chosen: his conscience
  alternatives:
  - that person's conscience
  lexicon: BDAG
  rationale: Refers to the observer's moral awareness. 'His conscience' is the most
    direct rendering of the genitive construction.
- source_word: ἀσθενοῦς ὄντος
  chosen: being weak
  alternatives:
  - since he is weak
  - weak as it is
  lexicon: BDAG
  rationale: Genitive absolute-like modifier describing the person's condition. 'Being
    weak' is concise and preserves the participial nuance.
- source_word: οἰκοδομηθήσεται
  chosen: be built up
  alternatives:
  - be encouraged
  - be emboldened
  lexicon: BDAG
  rationale: Literally 'be built up'; Paul uses the term with deliberate irony here,
    since the resulting action is spiritually harmful. Retaining 'be built up' preserves
    the lexical connection to edification language and the rhetorical sting. A clarifying
    alternative is worth preserving in a footnote.
- source_word: εἰς τὸ ... ἐσθίειν
  chosen: to eat
  alternatives:
  - so as to eat
  - into eating
  lexicon: BDAG
  rationale: The construction expresses result or tendency. 'To eat' is the cleanest
    English rendering in this rhetorical question.
- source_word: τὰ εἰδωλόθυτα
  chosen: food sacrificed to idols
  alternatives:
  - idol-sacrifices
  - meat sacrificed to idols
  lexicon: BDAG
  rationale: Standard Pauline term for food associated with idol offerings. 'Food
    sacrificed to idols' is broader and more accurate than 'meat,' since the Greek
    does not specify meat alone.
