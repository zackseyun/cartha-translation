id: 1CO.8.9
reference: 1 Corinthians 8:9
source:
  edition: SBLGNT
  text: βλέπετε δὲ μή πως ἡ ἐξουσία ὑμῶν αὕτη πρόσκομμα γένηται τοῖς ⸀ἀσθενέσιν.
translation:
  text: But take care that this right of yours does not somehow become a stumbling
    block to the weak.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'this freedom of yours.' The Greek word can mean 'authority,' 'right,'
      or 'freedom'; here it refers to the liberty some believers claimed in eating
      food associated with idols.
    reason: lexical_alternative
  - marker: b
    text: '''The weak'' here means those whose conscience is weak in this matter.'
    reason: cultural_note
lexical_decisions:
- source_word: βλέπετε
  chosen: take care
  alternatives:
  - see to it
  - watch out
  - beware
  lexicon: BDAG
  rationale: Imperative calling for vigilance. 'Take care' is natural modern English
    and preserves the warning force without sounding overly abrupt.
- source_word: δὲ
  chosen: But
  alternatives:
  - Now
  - And
  lexicon: BDAG
  rationale: Marks a mild contrast/transition from the preceding discussion; 'But'
    best reflects the admonitory turn here.
- source_word: μή πως
  chosen: does not somehow
  alternatives:
  - lest somehow
  - that somehow not
  lexicon: BDAG
  rationale: This combination introduces a negative precaution. Rendering it with
    'does not somehow' preserves the sense of warning against a possible outcome in
    idiomatic English.
- source_word: ἡ ἐξουσία ὑμῶν αὕτη
  chosen: this right of yours
  alternatives:
  - this authority of yours
  - this freedom of yours
  - your right here
  lexicon: BDAG
  rationale: In context Paul refers to the Corinthians' perceived liberty to eat idol-food.
    'Right' communicates legitimate liberty in accessible English. 'Authority' is
    too formal here, while 'freedom' is possible but slightly broader than the concrete
    claim of entitlement in context.
- source_word: πρόσκομμα
  chosen: a stumbling block
  alternatives:
  - an obstacle
  - a cause for stumbling
  - an offense
  lexicon: BDAG
  rationale: Standard and contextually apt rendering for something that causes another
    to fall spiritually or morally. It preserves the metaphor familiar in Pauline
    usage.
- source_word: γένηται
  chosen: become
  alternatives:
  - come to be
  - turn into
  lexicon: BDAG
  rationale: Simple and direct rendering of the aorist middle subjunctive after a
    negative precaution clause.
- source_word: τοῖς ἀσθενέσιν
  chosen: to the weak
  alternatives:
  - for the weak
  - to those who are weak
  lexicon: BDAG
  rationale: In this chapter the phrase refers to believers with weak consciences.
    'The weak' is concise and idiomatic, while the surrounding context supplies the
    moral/spiritual sense.
