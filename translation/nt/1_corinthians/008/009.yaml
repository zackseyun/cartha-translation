theological_decisions:
- issue: Meaning of ἐξουσία in context
  chosen_reading: Refers to the Corinthians' claimed liberty/right regarding food
    offered to idols.
  alternative_readings:
  - Refers more broadly to authority or power.
  rationale: The immediate context (1 Cor 8) concerns whether knowledgeable believers
    may eat idol-food. Translating ἐξουσία as 'right' best captures the practical
    ethical issue without importing institutional authority.
  doctrine_reference: Translation philosophy §1, §6
- issue: Meaning of τοῖς ἀσθενέσιν
  chosen_reading: Refers to spiritually or conscientiously weak fellow believers,
    not merely physically weak people.
  alternative_readings:
  - Weak people in a general sense.
  rationale: The chapter repeatedly uses 'weak' for those whose conscience is vulnerable.
    The translation keeps the concise phrase 'the weak' in the main text and lets
    context define it, avoiding over-interpretation in the wording while preserving
    Paul's ethical concern.
  doctrine_reference: Translation philosophy §3
