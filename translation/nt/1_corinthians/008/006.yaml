theological_decisions:
- issue: Relation of 'one God' and 'one Lord' in a monotheistic confession
  chosen_reading: Retained the parallel wording 'one God, the Father ... and one Lord,
    Jesus Messiah' without weakening either side or collapsing the distinction.
  alternative_readings:
  - Render 'one Lord' in a way that reduces its theological weight
  - Paraphrase to make later Trinitarian doctrine more explicit than the verse itself
    states
  rationale: The verse presents a high christological reformulation of monotheistic
    confession while distinguishing the Father and Jesus Messiah by relational roles
    ('from whom' / 'through whom'). In keeping with orthodox bounds and the instruction
    to preserve theological tension, the translation leaves Paul's wording intact
    without importing extra-creedal explanation.
  doctrine_reference: 'Affirmations; Translation philosophy #3'
- issue: Prepositions describing Father and Son
  chosen_reading: Translated ἐξ as 'from,' εἰς as 'for,' and διά as 'through,' preserving
    distinct relations.
  alternative_readings:
  - Use 'by' for διά
  - Use 'to' for εἰς
  rationale: These prepositions contribute to Paul's theological differentiation of
    the Father as source and goal, and the Son as mediating agent. Preserving the
    distinctions is important for auditability and avoids flattening the text.
  doctrine_reference: 'Translation philosophy #1, #3'
