id: 1CO.8.6
reference: 1 Corinthians 8:6
source:
  edition: SBLGNT
  text: ἀλλ’ ἡμῖν εἷς θεὸς ὁ πατήρ, ἐξ οὗ τὰ πάντα καὶ ἡμεῖς εἰς αὐτόν, καὶ εἷς κύριος
    Ἰησοῦς Χριστός, δι’ οὗ τὰ πάντα καὶ ἡμεῖς δι’ αὐτοῦ.
translation:
  text: yet for us there is one God, the Father, from whom are all things and we for
    him, and one Lord, Jesus the Messiah, through whom are all things and we through
    him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Jesus Christ.' The Greek Χριστός can function as a title ('Messiah')
      or, in some contexts, as a name-like form ('Christ').
    reason: alternative_reading
  - marker: b
    text: Or 'and we to him.' The phrase can express direction, goal, or purpose;
      'for him' was chosen to convey that believers are oriented toward God as their
      end.
    reason: lexical_alternative
  - marker: c
    text: The paired phrases 'from whom are all things' and 'through whom are all
      things' preserve a distinction between the Father as source and Jesus Messiah
      as mediating agent.
    reason: cross_reference
lexical_decisions:
- source_word: ἀλλ’
  chosen: yet
  alternatives:
  - but
  lexicon: BDAG
  rationale: Marks a contrast with the preceding acknowledgment of so-called gods
    and lords. 'Yet' captures the adversative force in smooth modern English.
- source_word: ἡμῖν
  chosen: for us
  alternatives:
  - to us
  lexicon: BDAG
  rationale: Dative of reference; 'for us' naturally expresses Paul's confessional
    standpoint.
- source_word: εἷς θεὸς
  chosen: one God
  lexicon: BDAG
  rationale: Straightforward numerical and monotheistic assertion; preserves the creedal
    force of the phrase.
- source_word: ὁ πατήρ
  chosen: the Father
  alternatives:
  - the father
  lexicon: BDAG
  rationale: Definite titular identification of God within Paul's confession; capitalized
    as a divine title in English.
- source_word: ἐξ οὗ
  chosen: from whom
  alternatives:
  - out of whom
  lexicon: BDAG
  rationale: ἐκ/ἐξ with genitive here denotes source/origin. 'From whom' is idiomatic
    and preserves the Father's role as source.
- source_word: τὰ πάντα
  chosen: all things
  alternatives:
  - everything
  lexicon: BDAG
  rationale: A comprehensive expression for the totality of created reality or all
    that exists in context. 'All things' preserves the formal breadth and Pauline
    resonance.
- source_word: καὶ ἡμεῖς εἰς αὐτόν
  chosen: and we for him
  alternatives:
  - and we to him
  - and we for his sake
  lexicon: BDAG
  rationale: εἰς can denote direction, goal, or purpose. 'For him' best conveys that
    believers exist toward God as their end, without over-paraphrasing.
- source_word: καὶ εἷς κύριος
  chosen: and one Lord
  lexicon: BDAG
  rationale: Preserves the parallel structure with 'one God' and follows the doctrinal
    default rendering of κύριος as 'Lord'.
- source_word: κύριος
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Per DOCTRINE.md contested terms, κύριος defaults to 'Lord.' In this context
    it also carries strong christological weight in relation to the Shema-like formulation.
- source_word: Ἰησοῦς Χριστός
  chosen: Jesus Messiah
  alternatives:
  - Jesus Christ
  lexicon: BDAG
  rationale: Per DOCTRINE.md, Χριστός is rendered 'Messiah' where functioning as a
    title rather than a name-like fixed form. Here the confessional structure ('one
    Lord, Jesus Messiah') supports title force.
- source_word: δι’ οὗ
  chosen: through whom
  lexicon: BDAG
  rationale: διά with genitive denotes agency or instrumentality. 'Through whom' preserves
    the Son's mediating role.
- source_word: καὶ ἡμεῖς δι’ αὐτοῦ
  chosen: and we through him
  alternatives:
  - and we exist through him
  lexicon: BDAG
  rationale: The ellipsis mirrors the earlier clause and likely implies believers'
    existence, salvation, or life through Christ. 'And we through him' preserves the
    Greek brevity and theological openness rather than specifying more than the text
    states.
