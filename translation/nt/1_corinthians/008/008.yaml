theological_decisions:
- issue: Whether Paul's point is ritual acceptability before God or general spiritual
    advantage
  chosen_reading: The verse states that food does not improve or diminish a person's
    standing before God.
  alternative_readings:
  - The verse means only that food has no intrinsic religious value apart from conscience
    and love.
  rationale: The immediate context concerns food offered to idols and the conscience
    of believers, but the wording itself makes the broader point that eating or abstaining
    does not in itself alter one's standing with God. The translation 'bring us near
    to God' expresses this without overstating sacramental or covenantal categories.
  doctrine_reference: Preserve theological tension rather than resolve it.
