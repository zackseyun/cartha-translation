id: 1CO.8.8
reference: 1 Corinthians 8:8
source:
  edition: SBLGNT
  text: βρῶμα δὲ ἡμᾶς οὐ ⸀παραστήσει τῷ θεῷ· οὔτε ⸂γὰρ ἐὰν φάγωμεν, περισσεύομεν,
    οὔτε ἐὰν μὴ φάγωμεν, ὑστερούμεθα⸃.
translation:
  text: But food will not bring us near to God; for if we eat, we do not have more,
    and if we do not eat, we do not lack.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'food will not commend us to God.'
    reason: lexical_alternative
  - marker: b
    text: Or, 'if we eat, we are no better off; and if we do not eat, we are no worse
      off.'
    reason: lexical_alternative
lexical_decisions:
- source_word: βρῶμα
  chosen: food
  alternatives:
  - what we eat
  - food eaten
  lexicon: BDAG
  rationale: A broad term for food rather than a specific meal or meat. 'Food' is
    natural modern English and fits Paul's general principle in context.
- source_word: παραστήσει
  chosen: will bring us near
  alternatives:
  - will commend us
  - will present us
  - will place us before
  lexicon: BDAG
  rationale: In this context the sense is relational standing before God, not merely
    physical presentation. 'Bring us near to God' communicates that food does not
    improve our standing with him. 'Commend us' is traditional but less transparent
    in modern English.
- source_word: τῷ θεῷ
  chosen: to God
  alternatives:
  - before God
  lexicon: BDAG
  rationale: The dative with παραστήσει can be represented idiomatically as 'to God'
    in English after 'bring us near.' This preserves the relational sense without
    awkwardness.
- source_word: οὔτε γὰρ ἐὰν φάγωμεν, περισσεύομεν
  chosen: for if we eat, we do not have more
  alternatives:
  - for if we eat, we are no better off
  - for if we eat, we do not abound
  lexicon: BDAG
  rationale: περισσεύω here refers to having an advantage or surplus, not material
    abundance. 'Have more' keeps the contrast with 'lack' in the next clause and avoids
    importing a moral evaluation beyond the text.
- source_word: οὔτε ἐὰν μὴ φάγωμεν, ὑστερούμεθα
  chosen: and if we do not eat, we do not lack
  alternatives:
  - nor if we do not eat are we worse off
  - nor if we do not eat do we fall short
  lexicon: BDAG
  rationale: ὑστερέω here means to lack or be deficient. 'Do not lack' gives a clean
    antithesis to 'have more' and preserves Paul's point that abstaining does not
    diminish one's standing.
- source_word: δὲ
  chosen: But
  alternatives:
  - Now
  - And
  lexicon: BDAG
  rationale: Marks a mild contrast with the preceding discussion. 'But' is the clearest
    English connective here.
- source_word: γὰρ
  chosen: for
  alternatives:
  - indeed
  - because
  lexicon: BDAG
  rationale: Introduces the explanation for the preceding statement. 'For' preserves
    the logical connection succinctly.
