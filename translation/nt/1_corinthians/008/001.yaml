theological_decisions:
- issue: Whether πάντες ('all') should be rendered as an unqualified universal statement
    or as Paul's rhetorical inclusion of the Corinthian claim
  chosen_reading: Rendered as 'we all have knowledge' in the main text without added
    qualification
  alternative_readings:
  - everyone has knowledge
  - we all possess this knowledge
  rationale: The Greek text itself states the clause without explicit distancing markers.
    The translation preserves the wording and leaves the rhetorical force to context
    rather than importing an interpretive resolution into the main text.
  doctrine_reference: Preserve theological tension rather than resolve it.
