id: 1CO.8.1
reference: 1 Corinthians 8:1
source:
  edition: SBLGNT
  text: Περὶ δὲ τῶν εἰδωλοθύτων, οἴδαμεν ὅτι πάντες γνῶσιν ἔχομεν. ἡ γνῶσις φυσιοῖ,
    ἡ δὲ ἀγάπη οἰκοδομεῖ.
translation:
  text: 'Now concerning food sacrificed to idols: we know that we all have knowledge.
    Knowledge puffs up, but love builds up.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'meat offered to idols' or 'things sacrificed to idols.'
    reason: lexical_alternative
  - marker: b
    text: Paul may be echoing a Corinthian slogan in 'we all have knowledge.'
    reason: alternative_reading
lexical_decisions:
- source_word: Περὶ δὲ
  chosen: Now concerning
  alternatives:
  - Concerning
  - About
  lexicon: BDAG
  rationale: Standard epistolary transition introducing a new topic; 'Now concerning'
    reflects Paul's discourse marker naturally in English.
- source_word: τῶν εἰδωλοθύτων
  chosen: food sacrificed to idols
  alternatives:
  - idol sacrifices
  - things sacrificed to idols
  - meat offered to idols
  lexicon: BDAG
  rationale: The term refers to items offered in idol worship, especially food/meat
    in this context. 'Food sacrificed to idols' is clear modern English and avoids
    narrowing too quickly to meat alone while preserving the cultic sense.
- source_word: οἴδαμεν
  chosen: we know
  alternatives:
  - we understand
  lexicon: BDAG
  rationale: Direct rendering of the perfect-form verb functioning with present sense;
    'we know' is idiomatic and preserves Paul's assertion.
- source_word: ὅτι πάντες γνῶσιν ἔχομεν
  chosen: that we all have knowledge
  alternatives:
  - that all of us possess knowledge
  - that everyone has knowledge
  lexicon: BDAG
  rationale: Keeps the Greek word order emphasis reasonably well while sounding natural.
    'We all' best reflects πάντες in context, likely echoing a Corinthian claim Paul
    cites or engages.
- source_word: ἡ γνῶσις
  chosen: Knowledge
  alternatives:
  - This knowledge
  lexicon: BDAG
  rationale: The article is generic/anaphoric. English generic abstract nouns often
    omit the article; capitalized here only because it begins the sentence. 'Knowledge'
    preserves the lexical link with γνῶσιν earlier in the verse.
- source_word: φυσιοῖ
  chosen: puffs up
  alternatives:
  - makes arrogant
  - inflates with pride
  lexicon: BDAG
  rationale: Paul's metaphor is vivid and well established; 'puffs up' preserves the
    figurative image better than a flattened interpretive gloss.
- source_word: ἡ δὲ ἀγάπη
  chosen: but love
  alternatives:
  - but the love
  lexicon: BDAG
  rationale: ἀγάπη is rendered by the doctrinal default 'love.' The article is not
    naturally reproduced in English in this generic contrastive statement.
- source_word: οἰκοδομεῖ
  chosen: builds up
  alternatives:
  - edifies
  - strengthens
  lexicon: BDAG
  rationale: Retains Paul's building metaphor in accessible modern English. 'Edifies'
    is traditional but more ecclesiastical and less transparent for modern readers.
