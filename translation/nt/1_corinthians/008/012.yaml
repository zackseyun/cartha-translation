theological_decisions:
- issue: Rendering of ἀδελφοὺς in an ecclesial context
  chosen_reading: brothers
  alternative_readings:
  - brothers and sisters
  - siblings
  rationale: The Greek form is masculine plural and likely refers to fellow believers collectively, potentially including women. Per doctrine, the main text remains gender-accurate to the source, while inclusivity is preserved in a footnote where context warrants it.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Rendering of Χριστόν
  chosen_reading: Messiah
  alternative_readings:
  - Christ
  rationale: DOCTRINE.md directs that Χριστός be translated as 'Messiah' where the title sense is active. In this clause the title remains meaningful rather than functioning merely as a name, so 'Messiah' is preferred; the traditional 'Christ' is preserved in a footnote.
  doctrine_reference: DOCTRINE.md Translation philosophy §2; Contested terms table for Χριστός
revisions:
- timestamp: '2026-04-21T00:55:47Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/nt/1_corinthians/008/012.json
  category: awkward_english
  tier: 1
  from: And in this way, by sinning against the brothers
  to: And so, by sinning against the brothers in this way
  rationale: The adverb οὕτως ('in this way') modifies the participle ἁμαρτάνοντες ('sinning'). The current draft separates them by making 'in this way' a sentence-level introductory phrase, which creates a slightly awkward pile-up with the following participial phrase ('by sinning...'). Placing the adverbial phrase after the verb it modifies ('by sinning... in this way') creates a more natural English flow that better reflects the grammatical relationship in the source text. 'And so' for οὕτως δὲ also captures the inferential nuance well.
