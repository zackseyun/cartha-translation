theological_decisions:
- issue: Paul's rhetorical distance from pagan deities
  chosen_reading: Render λεγόμενοι θεοὶ as 'so-called gods'
  alternative_readings:
  - called gods
  - those who are called gods
  rationale: The context (vv. 4–6) denies that idols correspond to real gods in the
    same sense as the one God. 'So-called' preserves Paul's monotheistic stance without
    overstating the grammar beyond what the participle implies.
  doctrine_reference: 'Affirmations; Translation philosophy #3'
- issue: Rendering κύριοι in a context contrasting many claimants with the one true
    Lord
  chosen_reading: Use 'lords' in lowercase
  alternative_readings:
  - masters
  rationale: This keeps lexical consistency with κύριος → 'Lord' while signaling that
    these are not references to the one true Lord confessed in v. 6. Lowercase English
    appropriately marks the distinction without changing the underlying term.
  doctrine_reference: 'Contested terms: κύριος → Lord; Translation philosophy #5'
