theological_decisions:
- issue: Scope of σκανδαλίζω in ethical context
  chosen_reading: Rendered as 'cause ... to stumble' rather than 'offend'
  alternative_readings:
  - offend
  - cause ... to sin
  rationale: The context of 1 Corinthians 8 concerns harming a weaker believer's conscience
    and leading toward sin, not merely giving personal offense. 'Cause to stumble'
    preserves the biblical metaphor and theological seriousness without over-specifying
    beyond the Greek.
  doctrine_reference: Translation philosophy §§1, 5, 6
- issue: Gender rendering of ἀδελφόν μου
  chosen_reading: my brother
  alternative_readings:
  - my brother or sister
  - my fellow believer
  rationale: The source text is masculine singular, and the translation philosophy
    prefers gender-accurate renderings over neutralizing the form. Because the referent
    may function representatively within the church, an inclusive alternative is preserved
    in a footnote rather than moved into the main text.
  doctrine_reference: Translation philosophy §4
