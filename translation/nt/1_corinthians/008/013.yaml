id: 1CO.8.13
reference: 1 Corinthians 8:13
source:
  edition: SBLGNT
  text: διόπερ εἰ βρῶμα σκανδαλίζει τὸν ἀδελφόν μου, οὐ μὴ φάγω κρέα εἰς τὸν αἰῶνα,
    ἵνα μὴ τὸν ἀδελφόν μου σκανδαλίσω.
translation:
  text: Therefore, if food causes my brother to stumble, I will certainly never eat
    meat forever, so that I may not cause my brother to stumble.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'causes my brother or sister to stumble.' The Greek says 'my brother'
      (masculine singular), but the term can refer more broadly to a fellow believer
      depending on context.
    reason: lexical_alternative
  - marker: b
    text: Or 'I will never eat meat again.' Literally, 'I will certainly never eat
      meat forever.'
    reason: lexical_alternative
lexical_decisions:
- source_word: διόπερ
  chosen: Therefore
  alternatives:
  - For this reason
  - Therefore indeed
  lexicon: BDAG
  rationale: Marks an inferential conclusion from the preceding argument; 'Therefore'
    is natural modern English and preserves the logical force.
- source_word: βρῶμα
  chosen: food
  alternatives:
  - what is eaten
  - meal
  lexicon: BDAG
  rationale: A broad term for food rather than specifically meat; this distinction
    matters because κρέα appears later with a narrower sense.
- source_word: σκανδαλίζει / σκανδαλίσω
  chosen: causes ... to stumble
  alternatives:
  - offends
  - causes ... to sin
  lexicon: BDAG
  rationale: Retains the metaphorical force of causing spiritual downfall or moral
    stumbling without flattening it to mere emotional offense. In this context the
    issue is behavior that leads a fellow believer into sin or violation of conscience.
- source_word: ἀδελφόν μου
  chosen: my brother
  alternatives:
  - my brother or sister
  - my fellow believer
  lexicon: BDAG
  rationale: The Greek is grammatically masculine singular. Per gender-accurate philosophy,
    'my brother' best matches the source form and immediate singular reference, while
    a footnote can preserve the broader sibling sense if desired.
- source_word: οὐ μὴ φάγω
  chosen: I will certainly never eat
  alternatives:
  - I will never eat
  - I shall by no means eat
  lexicon: BDAG
  rationale: οὐ μὴ with the aorist subjunctive is an emphatic negation. 'Certainly
    never' conveys the strong resolve in idiomatic English.
- source_word: κρέα
  chosen: meat
  alternatives:
  - flesh
  - meat foods
  lexicon: BDAG
  rationale: More specific than βρῶμα; 'meat' preserves the contrast with the broader
    'food' earlier in the verse.
- source_word: εἰς τὸν αἰῶνα
  chosen: forever
  alternatives:
  - for ever
  - for all time
  - never again
  lexicon: BDAG
  rationale: Idiomatic expression for perpetual duration. 'Forever' is clear modern
    English, though in context it expresses an indefinite renunciation rather than
    a metaphysical absolute.
- source_word: ἵνα μὴ
  chosen: so that I may not
  alternatives:
  - lest I
  - in order that I might not
  lexicon: BDAG
  rationale: Expresses purpose clearly in contemporary English.
