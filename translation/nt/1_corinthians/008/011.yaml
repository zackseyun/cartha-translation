theological_decisions:
- issue: Whether ἀπόλλυται should be rendered in a way that implies final eternal
    perdition of a true believer
  chosen_reading: Rendered as 'is being ruined' rather than 'perishes' or 'is destroyed'
    in the main text
  alternative_readings:
  - perishes
  - is destroyed
  rationale: The verse is often drawn into debates about apostasy and perseverance.
    The Greek verb can denote destruction/ruin, but the immediate context emphasizes
    the severe spiritual harm done to a weak fellow believer through loveless exercise
    of knowledge. To preserve theological tension rather than resolve a debated doctrinal
    question, the main text uses 'is being ruined,' while stronger alternatives are
    preserved in a footnote.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Whether ἀδελφός should be made gender-neutral in the main text
  chosen_reading: Retained as 'brother' in the main text with inclusive sense noted
    in a footnote
  alternative_readings:
  - brother or sister
  - fellow believer
  rationale: The project specifies gender-accurate over gender-neutral renderings.
    The masculine singular form should be reflected in the main text, while a footnote
    can clarify that the referent is a fellow believer and may be inclusive in application.
  doctrine_reference: Gender-accurate over gender-neutral.
