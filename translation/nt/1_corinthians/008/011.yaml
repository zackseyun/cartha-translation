id: 1CO.8.11
reference: 1 Corinthians 8:11
source:
  edition: SBLGNT
  text: ⸂ἀπόλλυται γὰρ⸃ ὁ ἀσθενῶν ⸀ἐν τῇ σῇ γνώσει, ⸂ὁ ἀδελφὸς⸃ δι’ ὃν Χριστὸς ἀπέθανεν.
translation:
  text: For the weak one is being ruined by your knowledge—the brother for whom the
    Messiah died.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'is destroyed' or 'perishes.' The Greek can express severe ruin or destruction;
      the main text avoids over-resolving whether Paul means temporal spiritual devastation,
      eschatological destruction, or both.
    reason: alternative_reading
  - marker: b
    text: '''Brother'' here means a fellow believer; in context the application may
      include a brother or sister in the faith.'
    reason: lexical_alternative
  - marker: c
    text: Greek 'Christ'; rendered 'Messiah' here because Χριστός functions as a title.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπόλλυται
  chosen: is being ruined
  alternatives:
  - perishes
  - is destroyed
  lexicon: BDAG
  rationale: Present passive/middle indicative conveys an ongoing/resulting destruction
    rather than a simple punctiliar event. 'Is being ruined' preserves the seriousness
    without over-specifying final condemnation; in this context Paul speaks of the
    damaging effect of the strong person's conduct on the weak believer's conscience
    and life.
- source_word: γάρ
  chosen: For
  alternatives:
  - because
  lexicon: BDAG
  rationale: Marks explanation for the preceding warning; 'For' is the most natural
    concise connective in English here.
- source_word: ὁ ἀσθενῶν
  chosen: the weak one
  alternatives:
  - the one who is weak
  - the weak brother
  lexicon: BDAG
  rationale: Substantival participle meaning 'the one who is weak.' 'The weak one'
    is concise and preserves the singular focus. 'Brother' is expressed separately
    later in the verse and should not be imported here.
- source_word: ἐν τῇ σῇ γνώσει
  chosen: by your knowledge
  alternatives:
  - in your knowledge
  - through your knowledge
  lexicon: BDAG
  rationale: 'Although ἐν is literally ''in,'' the phrase here indicates means or
    causal sphere: the weak person is ruined in connection with, and effectively by
    means of, the knowledgeable person''s exercise of knowledge. ''By your knowledge''
    communicates the force idiomatically in English.'
- source_word: γνῶσις
  chosen: knowledge
  alternatives:
  - understanding
  lexicon: BDAG
  rationale: This matches Paul's terminology in the immediate context (8:1, 8:7, 8:10)
    and preserves the irony that claimed 'knowledge' harms a fellow believer.
- source_word: ὁ ἀδελφός
  chosen: the brother
  alternatives:
  - the fellow believer
  - the brother or sister
  lexicon: BDAG
  rationale: Gender-accurate translation is required by the project philosophy. The
    Greek is grammatically masculine singular and in this context refers to a fellow
    Christian. 'The brother' preserves the source form; an inclusive alternative is
    worth noting in a footnote because the referent may be any fellow believer.
- source_word: δι’ ὃν
  chosen: for whom
  alternatives:
  - because of whom
  - on whose behalf
  lexicon: BDAG
  rationale: 'With διά + accusative relative pronoun, the sense here is benefactive/reference:
    the brother is the one for whom Messiah died. ''For whom'' is the standard and
    natural rendering.'
- source_word: Χριστός
  chosen: the Messiah
  alternatives:
  - Christ
  lexicon: BDAG
  rationale: Per doctrine, Χριστός is translated as 'Messiah' where functioning as
    a title rather than a name-like form. Here it is titular and highlights the redemptive
    significance of his death.
- source_word: ἀπέθανεν
  chosen: died
  alternatives:
  - has died
  lexicon: BDAG
  rationale: Aorist indicative is best rendered with simple past in English. 'Died'
    is direct and sufficient.
