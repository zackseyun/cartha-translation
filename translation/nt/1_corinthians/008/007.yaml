id: 1CO.8.7
reference: 1 Corinthians 8:7
source:
  edition: SBLGNT
  text: Ἀλλ’ οὐκ ἐν πᾶσιν ἡ γνῶσις· τινὲς δὲ τῇ ⸀συνηθείᾳ ⸂ἕως ἄρτι τοῦ εἰδώλου⸃ ὡς
    εἰδωλόθυτον ἐσθίουσιν, καὶ ἡ συνείδησις αὐτῶν ἀσθενὴς οὖσα μολύνεται.
translation:
  text: But not everyone has this knowledge. Some, because of their former association
    with the idol, eat the food as idol-sacrificed, and their conscience, being weak,
    is defiled.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more literally, 'because of habit/custom until now with the idol.' The
      Greek phrase is difficult; the sense is that some still live under the influence
      of their former connection with idol worship.
    reason: lexical_alternative
  - marker: b
    text: Some manuscripts read 'conscience of the idol' or have related variation
      in this clause; the main text follows the SBLGNT reading.
    reason: textual_variant
lexical_decisions:
- source_word: γνῶσις
  chosen: knowledge
  alternatives:
  - understanding
  lexicon: BDAG
  rationale: Standard Pauline sense of cognitive recognition/understanding. 'Knowledge'
    also preserves the connection to the immediate context about those who claim to
    'know' that an idol is nothing.
- source_word: συνήθεια
  chosen: former association
  alternatives:
  - habit
  - custom
  - familiarity
  - conscience
  lexicon: BDAG
  rationale: In this context the term points to an ingrained prior connection with
    idol worship rather than mere generic 'habit.' 'Former association' makes explicit
    the contextual force without overparaphrasing. 'Conscience' reflects a textual
    variant/interpretive tradition, not the main SBLGNT reading.
- source_word: ἕως ἄρτι τοῦ εἰδώλου
  chosen: with the idol
  alternatives:
  - until now with the idol
  - with respect to the idol
  - of the idol
  lexicon: BDAG
  rationale: The phrase is textually and syntactically difficult. In context it modifies
    συνήθεια and refers to an ongoing or recent connection to idol worship. The English
    main text expresses the sense idiomatically as 'former association with the idol,'
    while preserving a more literal alternative in a footnote.
- source_word: εἰδωλόθυτον
  chosen: idol-sacrificed food
  alternatives:
  - food sacrificed to idols
  - idol offering
  lexicon: BDAG
  rationale: The adjective denotes meat/food associated with sacrifice to idols. 'Idol-sacrificed
    food' is concise and natural English while preserving the sacrificial reference.
- source_word: συνείδησις
  chosen: conscience
  lexicon: BDAG
  rationale: Standard rendering in Pauline ethics; refers to moral awareness rather
    than mere feeling.
- source_word: ἀσθενής
  chosen: weak
  alternatives:
  - feeble
  - sensitive
  lexicon: BDAG
  rationale: Paul's established term in this chapter for those whose conscience lacks
    strength or firmness in this matter.
- source_word: μολύνεται
  chosen: is defiled
  alternatives:
  - is polluted
  - is stained
  lexicon: BDAG
  rationale: The passive conveys moral contamination in conscience. 'Defiled' is the
    clearest idiomatic equivalent with appropriate ethical weight.
