theological_decisions:
- issue: How to express the status of idol meat without implying idols are real gods
  chosen_reading: eat the food as idol-sacrificed
  alternative_readings:
  - eat it as a sacrifice to an idol
  - eat idol-sacrificed meat
  rationale: 'The wording reflects the participants'' perception of the food''s cultic
    significance, not Paul''s endorsement of idols as genuine deities. This preserves
    Paul''s theological tension in the chapter: idols are nothing, yet participation
    can still wound conscience.'
  doctrine_reference: Preserve theological tension rather than resolve it.
