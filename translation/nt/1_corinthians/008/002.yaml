theological_decisions:
- issue: Generic masculine reference
  chosen_reading: he knows
  alternative_readings:
  - they know
  rationale: The Greek uses an indefinite singular τις with generic force. Following
    the project's gender-accurate principle, the translation preserves singular reference
    in idiomatic English. The masculine pronoun reflects traditional generic usage
    here rather than a male-only referent.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Nature of Paul's critique
  chosen_reading: epistemic humility rather than denial of all knowledge
  alternative_readings:
  - absolute rejection of human knowledge
  rationale: The verse rebukes presumptuous self-assessment, not knowledge itself.
    The wording 'does not yet know as he ought to know' preserves the text's tension
    by affirming deficient manner or measure of knowing rather than negating knowledge
    altogether.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
