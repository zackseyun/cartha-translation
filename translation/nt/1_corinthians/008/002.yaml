id: 1CO.8.2
reference: 1 Corinthians 8:2
source:
  edition: SBLGNT
  text: ⸀εἴ τις δοκεῖ ⸀ἐγνωκέναι τι, ⸀οὔπω ⸀ἔγνω καθὼς δεῖ γνῶναι·
translation:
  text: If anyone thinks he knows something, he does not yet know as he ought to know.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'If anyone thinks he has come to know anything, he does not yet know
      in the way he ought to know.'
    reason: lexical_alternative
lexical_decisions:
- source_word: εἴ
  chosen: If
  alternatives:
  - Suppose
  lexicon: BDAG
  rationale: Introduces a conditional statement. 'If' is the natural English equivalent
    and preserves the straightforward conditional force.
- source_word: τις
  chosen: anyone
  alternatives:
  - someone
  - a person
  lexicon: BDAG
  rationale: Indefinite pronoun with generic force. 'Anyone' communicates the representative
    sense in natural English without narrowing the reference.
- source_word: δοκεῖ
  chosen: thinks
  alternatives:
  - supposes
  - seems
  lexicon: BDAG
  rationale: Here the verb conveys subjective estimation or opinion rather than mere
    appearance. 'Thinks' best fits Paul's warning against self-assured knowledge.
- source_word: ἐγνωκέναι
  chosen: knows
  alternatives:
  - has come to know
  - has known
  lexicon: BDAG
  rationale: Perfect infinitive of γινώσκω, expressing a state of having attained
    knowledge. English idiom favors the simple present 'knows' after 'thinks' while
    still conveying claimed possession of knowledge.
- source_word: τι
  chosen: something
  alternatives:
  - anything
  lexicon: BDAG
  rationale: Indefinite object of knowledge. 'Something' is the most direct rendering
    and fits the rhetorical minimization in context.
- source_word: οὔπω
  chosen: not yet
  alternatives:
  - still not
  lexicon: BDAG
  rationale: Marks an incomplete state. 'Not yet' preserves the temporal nuance that
    the person's knowledge remains deficient.
- source_word: ἔγνω
  chosen: know
  alternatives:
  - has known
  - has come to know
  lexicon: BDAG
  rationale: Aorist of γινώσκω in this idiom is well rendered by English present 'know'
    in the clause 'does not yet know,' which is more natural than a rigid past tense
    and matches the ongoing evaluative sense.
- source_word: καθὼς
  chosen: as
  alternatives:
  - in the way that
  - just as
  lexicon: BDAG
  rationale: Introduces the standard or manner by which true knowledge should be measured.
    'As' is concise and idiomatic.
- source_word: δεῖ
  chosen: ought to
  alternatives:
  - must
  - it is necessary to
  lexicon: BDAG
  rationale: Expresses what is fitting or necessary. 'Ought to' captures the normative
    force without sounding overly mechanical.
- source_word: γνῶναι
  chosen: know
  alternatives:
  - come to know
  lexicon: BDAG
  rationale: Aorist infinitive complement to δεῖ. In English, 'ought to know' is the
    most natural rendering and adequately conveys the intended standard of proper
    knowledge.
