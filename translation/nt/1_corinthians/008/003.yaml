theological_decisions:
- issue: Meaning of divine knowing in Paul's statement
  chosen_reading: Relational divine recognition/covenantal knowing is left broad as
    'is known by him'
  alternative_readings:
  - is approved by him
  - is acknowledged by him
  - has come to be known by him in a saving sense
  rationale: γινώσκω with God as subject can imply more than bare cognition, including
    relational recognition or approval. The Greek here does not force a narrower doctrinal
    specification, so the translation preserves the theological breadth rather than
    resolving it.
  doctrine_reference: Preserve theological tension rather than resolve it.
