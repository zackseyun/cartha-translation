id: 1CO.8.3
reference: 1 Corinthians 8:3
source:
  edition: SBLGNT
  text: εἰ δέ τις ἀγαπᾷ τὸν θεόν, οὗτος ἔγνωσται ὑπ’ αὐτοῦ.
translation:
  text: But if anyone loves God, this one is known by him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'is recognized by him' or 'has been known by him.' The Greek perfect
      passive may suggest an abiding state of being known by God.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰ δέ
  chosen: But if
  alternatives:
  - Now if
  - But if indeed
  lexicon: BDAG
  rationale: εἰ introduces a conditional clause, and δέ adds mild contrast with the
    preceding discussion about knowledge puffing up and love building up. 'But if'
    preserves both the conditional force and the contrast in natural English.
- source_word: τις
  chosen: anyone
  alternatives:
  - someone
  - any man
  lexicon: BDAG
  rationale: Indefinite pronoun with generic force. 'Anyone' is natural modern English
    and preserves the inclusive generic sense without importing a specifically male
    reference.
- source_word: ἀγαπᾷ
  chosen: loves
  alternatives:
  - has love for
  lexicon: BDAG
  rationale: Present active indicative of ἀγαπάω. 'Loves' is the standard and most
    direct rendering, matching the doctrine's default treatment of ἀγάπη cognates
    as 'love'.
- source_word: τὸν θεόν
  chosen: God
  alternatives:
  - the God
  lexicon: BDAG
  rationale: With θεός as the object, English idiom normally omits the article. 'God'
    is the natural rendering and does not lose definiteness in context.
- source_word: οὗτος
  chosen: this one
  alternatives:
  - he
  - that person
  lexicon: BDAG
  rationale: 'The demonstrative is somewhat emphatic: ''this one'' highlights the
    person just described. It preserves the Greek emphasis better than a simple pronoun,
    while remaining understandable in English.'
- source_word: ἔγνωσται
  chosen: is known
  alternatives:
  - has been known
  - is recognized
  lexicon: BDAG
  rationale: Perfect passive indicative of γινώσκω. 'Is known' conveys the present
    state resulting from prior action. 'Has been known' is possible but less idiomatic
    here; 'is known' best balances aspect and readability.
- source_word: ὑπ’ αὐτοῦ
  chosen: by him
  alternatives:
  - by God
  lexicon: BDAG
  rationale: The pronoun most naturally refers back to God. 'By him' preserves the
    Greek pronominal cohesion; the antecedent is clear from the immediately preceding
    phrase.
