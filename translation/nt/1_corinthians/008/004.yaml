id: 1CO.8.4
reference: 1 Corinthians 8:4
source:
  edition: SBLGNT
  text: Περὶ τῆς βρώσεως οὖν τῶν εἰδωλοθύτων οἴδαμεν ὅτι οὐδὲν εἴδωλον ἐν κόσμῳ, καὶ
    ὅτι οὐδεὶς ⸀θεὸς εἰ μὴ εἷς.
translation:
  text: Therefore, concerning the eating of food sacrificed to idols, we know that
    an idol is nothing in the world, and that there is no God except one.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'an idol has no real existence in the world.'
    reason: lexical_alternative
  - marker: b
    text: Or, 'there is no god but one.'
    reason: lexical_alternative
lexical_decisions:
- source_word: βρώσεως
  chosen: the eating of
  alternatives:
  - eating
  - consumption
  - food
  lexicon: BDAG
  rationale: The noun denotes the act of eating rather than the food itself. Rendering
    it as 'the eating of' preserves the verbal sense in the genitive construction
    with περὶ while remaining natural in English.
- source_word: εἰδωλοθύτων
  chosen: food sacrificed to idols
  alternatives:
  - idol food
  - things sacrificed to idols
  - meat offered to idols
  lexicon: BDAG
  rationale: The term refers to food associated with pagan sacrificial offerings.
    'Food sacrificed to idols' is clear modern English and avoids narrowing the referent
    to meat only, since the Greek adjective/substantive can be broader.
- source_word: οἴδαμεν
  chosen: we know
  alternatives:
  - we understand
  lexicon: BDAG
  rationale: A straightforward rendering of the perfect-form verb with present sense.
    It also preserves Paul's rhetorical appeal to shared knowledge with the Corinthians.
- source_word: οὐδὲν εἴδωλον
  chosen: an idol is nothing
  alternatives:
  - an idol has no real existence
  - an idol is nothing at all
  lexicon: BDAG
  rationale: This keeps the compact force of the Greek predicate while remaining idiomatic.
    The phrase expresses the unreality or nullity of the idol, not merely its insignificance.
- source_word: ἐν κόσμῳ
  chosen: in the world
  alternatives:
  - in the cosmos
  lexicon: BDAG
  rationale: κόσμος here refers to the created/worldly sphere. 'In the world' is the
    natural English equivalent and fits Paul's argument about idols' status in reality.
- source_word: οὐδεὶς θεὸς εἰ μὴ εἷς
  chosen: there is no God except one
  alternatives:
  - there is no god but one
  - no God exists except one
  lexicon: BDAG
  rationale: This renders the exclusivist monotheistic claim clearly and idiomatically.
    Capitalizing 'God' reflects that θεός here refers to the true God in contrast
    to idols, while preserving the force of εἰ μὴ εἷς as 'except one'.
- source_word: οὖν
  chosen: Therefore
  alternatives:
  - So
  - Then
  - Now
  lexicon: BDAG
  rationale: οὖν marks an inferential transition from the preceding discussion. 'Therefore'
    preserves the logical connection more explicitly than a weaker discourse marker.
