theological_decisions:
- issue: Paul's statement about idols and monotheism
  chosen_reading: Render the verse as a strong monotheistic claim without softening
    or expanding it beyond the text.
  alternative_readings:
  - Render 'an idol has no real existence' to make the metaphysical nuance more explicit
  - Use lowercase 'god' in the second clause to emphasize contrast with pagan deities
  rationale: The verse asserts both the nullity of idols and the uniqueness of the
    one true God. The chosen wording preserves historic Christian monotheism in line
    with the doctrinal affirmations while avoiding importing later doctrinal formulations
    not stated in the verse itself.
  doctrine_reference: Affirmations; Translation philosophy §3
