id: 1CO.10.1
reference: 1 Corinthians 10:1
source:
  edition: SBLGNT
  text: Οὐ θέλω ⸀γὰρ ὑμᾶς ἀγνοεῖν, ἀδελφοί, ὅτι οἱ πατέρες ἡμῶν πάντες ὑπὸ τὴν νεφέλην
    ἦσαν καὶ πάντες διὰ τῆς θαλάσσης διῆλθον,
translation:
  text: For I do not want you to be unaware, brothers, that our fathers were all under
    the cloud, and all passed through the sea,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'brothers and sisters'; Greek 'brothers' can address a mixed congregation.
    reason: lexical_alternative
lexical_decisions:
- source_word: Οὐ θέλω ... ἀγνοεῖν
  chosen: I do not want you to be unaware
  alternatives:
  - I do not want you to be ignorant
  - I want you to know
  lexicon: BDAG
  rationale: This is a common Pauline idiom. 'Be unaware' preserves the negated infinitive
    structure and sense without the harsher or archaic feel of 'be ignorant.' 'I want
    you to know' is smoother English but loses the marked negative formulation present
    in Greek.
- source_word: γὰρ
  chosen: For
  alternatives:
  - Now
  - Indeed
  - ', for'
  lexicon: BDAG
  rationale: γάρ gives explanatory linkage to the preceding argument. 'For' best preserves
    the connective force in readable English.
- source_word: ἀδελφοί
  chosen: brothers
  alternatives:
  - brothers and sisters
  - brothers,
  lexicon: BDAG
  rationale: Per doctrine, gender-accurate over gender-neutral. The masculine plural
    here addresses the congregation in representative form; 'brothers' preserves the
    source form, while inclusivity can be noted in a footnote.
- source_word: οἱ πατέρες ἡμῶν
  chosen: our fathers
  alternatives:
  - our ancestors
  - our forefathers
  lexicon: BDAG
  rationale: Paul intentionally identifies the Corinthian believers with Israel's
    covenant history. 'Our fathers' preserves the familial and historical wording
    more closely than the more generic 'ancestors.'
- source_word: πάντες
  chosen: all
  alternatives:
  - every one of them
  lexicon: BDAG
  rationale: The repetition of πάντες is rhetorically important in this passage and
    is preserved both times as 'all.'
- source_word: ὑπὸ τὴν νεφέλην ἦσαν
  chosen: were all under the cloud
  alternatives:
  - were all beneath the cloud
  lexicon: BDAG
  rationale: This refers to the wilderness cloud of the exodus. 'Under the cloud'
    is the natural and sufficiently literal rendering, preserving the allusion to
    God's guiding presence.
- source_word: διὰ τῆς θαλάσσης διῆλθον
  chosen: all passed through the sea
  alternatives:
  - all went through the sea
  - all crossed through the sea
  lexicon: BDAG
  rationale: διέρχομαι with διά conveys movement through. 'Passed through the sea'
    is idiomatic and preserves the exodus imagery without over-specifying 'crossed'.
