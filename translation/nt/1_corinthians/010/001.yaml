theological_decisions:
- issue: Rendering the vocative ἀδελφοί in a mixed-gender ecclesial address
  chosen_reading: brothers
  alternative_readings:
  - brothers and sisters
  rationale: The translation follows the project's gender-accurate principle by preserving
    the masculine plural form in the main text. Because the address is to the whole
    church and inclusivity is contextually relevant, the broader representative sense
    is preserved in a footnote rather than neutralized in the main text.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over
    gender-neutral)
- issue: Corporate identification of Gentile-inclusive church with Israel in 'our
    fathers'
  chosen_reading: our fathers
  alternative_readings:
  - our ancestors
  rationale: Paul's wording intentionally draws the Corinthian believers into Israel's
    story. 'Our fathers' preserves the covenantal and rhetorical force without softening
    the familial language.
  doctrine_reference: DOCTRINE.md Translation philosophy §1 (Original-language primacy
    over translation tradition) and §5 (Consistency of key terms, or documented exception)
