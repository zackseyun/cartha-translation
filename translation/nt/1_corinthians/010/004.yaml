id: 1CO.10.4
reference: 1 Corinthians 10:4
source:
  edition: SBLGNT
  text: καὶ πάντες τὸ αὐτὸ ⸂πνευματικὸν ἔπιον πόμα⸃, ἔπινον γὰρ ἐκ πνευματικῆς ἀκολουθούσης
    πέτρας, ἡ ⸂πέτρα δὲ⸃ ἦν ὁ Χριστός·
translation:
  text: and all drank the same spiritual drink, for they were drinking from a spiritual
    rock that was following them, and the rock was the Messiah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from the spiritual rock that followed them.' The Greek participle can
      be rendered more simply as 'followed,' but 'was following' better reflects its
      ongoing aspect.
    reason: lexical_alternative
  - marker: b
    text: Greek 'Christ.' Here rendered 'Messiah' because Χριστός functions as a title
      rather than a name-like form.
    reason: alternative_reading
lexical_decisions:
- source_word: πνευματικὸν ... πόμα
  chosen: spiritual drink
  alternatives:
  - supernatural drink
  lexicon: BDAG
  rationale: πνευματικός here qualifies the drink as belonging to the sphere of the
    Spirit / divine provision rather than merely immaterial. 'Spiritual drink' preserves
    Paul's wording and his parallel with 'spiritual food' in the previous verse.
- source_word: ἔπιον
  chosen: drank
  alternatives:
  - drank of
  lexicon: BDAG
  rationale: Aorist indicative summarizing the wilderness generation's shared experience.
    Simple past 'drank' is natural and sufficiently formal.
- source_word: ἔπινον
  chosen: were drinking
  alternatives:
  - drank
  lexicon: BDAG
  rationale: Imperfect indicates ongoing/repeated action, best represented by English
    past progressive. This also distinguishes it from the earlier aorist ἔπιον.
- source_word: ἐκ πνευματικῆς ἀκολουθούσης πέτρας
  chosen: from a spiritual rock that was following them
  alternatives:
  - from the spiritual rock that followed them
  - from a spiritual accompanying rock
  lexicon: BDAG
  rationale: πέτρα is anarthrous in the genitive phrase, so 'a spiritual rock' is
    slightly preferable to 'the spiritual rock' here, while the later nominative with
    article identifies it. ἀκολουθούσης is a present participle, so 'that was following'
    preserves the durative sense better than a simple past. 'Spiritual' is retained
    rather than interpreted away.
- source_word: πέτρα
  chosen: rock
  alternatives:
  - stone
  lexicon: BDAG
  rationale: πέτρα denotes a rock/crag rather than a small stone. 'Rock' also preserves
    the typological force of the image.
- source_word: ἡ πέτρα δὲ ἦν
  chosen: and the rock was
  alternatives:
  - now the rock was
  - but the rock was
  lexicon: BDAG
  rationale: δέ here is mildly connective/adversative. 'And' fits smooth modern English
    without overstating contrast, while preserving the explanatory flow.
- source_word: ὁ Χριστός
  chosen: the Messiah
  alternatives:
  - Christ
  lexicon: BDAG
  rationale: Per doctrine, Χριστός is translated 'Messiah' where functioning as a
    title rather than a name-like form. Here the predication 'the rock was the Messiah'
    is titular and typological, so 'Messiah' best preserves meaning.
- source_word: πάντες τὸ αὐτὸ
  chosen: all ... the same
  alternatives:
  - every one ... the same
  lexicon: BDAG
  rationale: This preserves Paul's emphasis on the shared experience of the whole
    group.
