theological_decisions:
- issue: Identity statement 'the rock was the Messiah'
  chosen_reading: 'Typological identification: the wilderness rock is identified with
    the Messiah in a real theological sense within Paul''s argument, without flattening
    the metaphor into a mere equation of material object and person.'
  alternative_readings:
  - 'Purely symbolic: ''the rock represented the Messiah'''
  - Midrashic/traditional allusion to a miraculous rock without direct christological
    identification
  rationale: The Greek uses a straightforward equative clause, ἡ πέτρα δὲ ἦν ὁ Χριστός.
    The translation should preserve the force of Paul's christological claim while
    not importing a philosophical explanation beyond the text. Rendering it directly
    as 'the rock was the Messiah' keeps the theological tension intact, in line with
    the doctrine's instruction not to resolve ambiguity unnecessarily.
  doctrine_reference: Translation philosophy §3; Contested terms table for Χριστός
- issue: Meaning of 'spiritual' in relation to food/drink/rock
  chosen_reading: '''Spiritual'' is retained as Paul''s descriptor of divinely given,
    typologically significant provision, rather than reduced to ''symbolic'' or ''miraculous''
    in the main text.'
  alternative_readings:
  - symbolic
  - supernatural
  rationale: Paul's repeated use of πνευματικός in this context carries theological
    weight and links Israel's wilderness experience to Christian sacramental/typological
    realities. A more interpretive gloss would narrow the term beyond what the Greek
    states.
  doctrine_reference: Translation philosophy §1, §3, §5
