theological_decisions:
- issue: Referent of 'the Lord' (τὸν κύριον)
  chosen_reading: Rendered simply as 'the Lord' without specifying 'Christ' or 'God.'
  alternative_readings:
  - the Lord Jesus
  - the Lord God
  rationale: In the immediate context of 1 Corinthians 10, Paul speaks of 'the Lord's
    table,' which strongly suggests the Lord Jesus; however, the wording also intentionally
    echoes Deuteronomic language about provoking the Lord to jealousy. Leaving the
    title as 'the Lord' preserves the intertextual and theological tension rather
    than resolving it beyond what the Greek states.
  doctrine_reference: 'Preserve theological tension rather than resolve it; Contested
    terms: κύριος → Lord'
