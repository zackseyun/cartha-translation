id: 1CO.10.22
reference: 1 Corinthians 10:22
source:
  edition: SBLGNT
  text: ἢ παραζηλοῦμεν τὸν κύριον; μὴ ἰσχυρότεροι αὐτοῦ ἐσμεν;
translation:
  text: Or are we provoking the Lord to jealousy? Surely we are not stronger than
    he is, are we?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'do we arouse the Lord to jealousy?' The verb carries the sense of provoking
      jealous zeal.
    reason: lexical_alternative
  - marker: b
    text: '''The Lord'' may evoke both the Lord Jesus in the immediate context and
      the Old Testament language about provoking the Lord God to jealousy.'
    reason: cross_reference
lexical_decisions:
- source_word: ἢ
  chosen: Or
  alternatives:
  - Or else
  - Or do
  lexicon: BDAG
  rationale: Introduces an alternative rhetorical question tied to the preceding argument
    about idolatry and participation at the Lord's table.
- source_word: παραζηλοῦμεν
  chosen: are we provoking ... to jealousy
  alternatives:
  - do we provoke ... to jealousy
  - are we arousing ... to jealousy
  lexicon: BDAG
  rationale: The verb means to provoke to jealousy or arouse jealousy. The present
    tense in English is rendered idiomatically as a progressive rhetorical question.
    'To jealousy' is retained because the semantic force is important in the allusion
    to covenant jealousy language.
- source_word: τὸν κύριον
  chosen: the Lord
  alternatives:
  - the Master
  lexicon: BDAG
  rationale: κύριος is rendered by the doctrinal default 'Lord.' In this context it
    likely refers to the Lord Jesus within the immediate discussion of the Lord's
    table, while also echoing OT language about provoking the Lord/God to jealousy;
    'Lord' preserves that theological resonance without over-specifying.
- source_word: μὴ
  chosen: Surely ... not
  alternatives:
  - We are not ... , are we?
  - Are we not?
  lexicon: BDAG
  rationale: μή marks a question expecting a negative answer. English idiom is best
    captured by 'Surely we are not ... , are we?' rather than a flat interrogative.
- source_word: ἰσχυρότεροι
  chosen: stronger
  alternatives:
  - more powerful
  - mightier
  lexicon: BDAG
  rationale: Comparative adjective meaning stronger or more powerful. 'Stronger' is
    the most natural modern English rendering and preserves the comparative force.
- source_word: αὐτοῦ
  chosen: than he is
  alternatives:
  - than him
  lexicon: BDAG
  rationale: Genitive after the comparative is rendered idiomatically in English as
    'than he is.' This avoids awkwardness while preserving the comparison with the
    Lord.
- source_word: ἐσμεν
  chosen: we are
  lexicon: BDAG
  rationale: Explicitly represented in the English predicate question.
