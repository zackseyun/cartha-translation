theological_decisions:
- issue: Referent of the possessive contrast in the first clause
  chosen_reading: Paul clarifies that he means the conscience of the other person,
    not the reader's own conscience.
  alternative_readings:
  - Paul means not his own conscience, but the other person's conscience
  rationale: The Greek ἑαυτοῦ is third person singular in form, but in context Paul
    is addressing the Corinthians and clarifying the previous instruction about the
    weaker person's conscience. English naturally expresses the contrast as 'your
    own' versus 'the other person's.' This reflects the discourse context rather than
    introducing a doctrinally loaded distinction.
  doctrine_reference: Translation philosophy §1, §5
- issue: Rhetorical question in the second clause
  chosen_reading: The question is left as a rhetorical challenge without resolving
    whether Paul endorses or rejects the premise in a systematic way.
  alternative_readings:
  - The clause is taken as an objection voiced by a Corinthian interlocutor
  - The clause is taken as Paul's own rhetorical summary
  rationale: The verse can be read either as Paul's rhetorical question or as a slogan-like
    objection. The Greek text itself does not mark a speaker change, so the translation
    preserves the wording without importing an interpretive resolution into the main
    text.
  doctrine_reference: Translation philosophy §3
