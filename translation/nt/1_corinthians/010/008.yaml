id: 1CO.10.8
reference: 1 Corinthians 10:8
source:
  edition: SBLGNT
  text: μηδὲ πορνεύωμεν, καθώς τινες αὐτῶν ἐπόρνευσαν, καὶ ἔπεσαν μιᾷ ἡμέρᾳ εἴκοσι
    τρεῖς χιλιάδες.
translation:
  text: Nor should we commit sexual immorality, as some of them committed sexual immorality,
    and twenty-three thousand fell in one day.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'died' or 'were struck down'; the Greek says 'fell,' a common way of
      referring to death under judgment.
    reason: lexical_alternative
  - marker: b
    text: Numbers 25:9 reports twenty-four thousand. Paul here says twenty-three thousand
      fell 'in one day,' which may distinguish the number who died that day from the
      larger total, though the translation preserves Paul's wording without harmonization.
    reason: cross_reference
lexical_decisions:
- source_word: μηδὲ
  chosen: Nor should
  alternatives:
  - And let us not
  - Neither should
  lexicon: BDAG
  rationale: With the present hortatory subjunctive πορνεύωμεν, μηδέ introduces a
    continuing prohibition in a paraenetic series. 'Nor should' gives natural English
    while preserving the connective force with the preceding warnings.
- source_word: πορνεύωμεν
  chosen: we commit sexual immorality
  alternatives:
  - we be sexually immoral
  - we practice sexual immorality
  - we fornicate
  lexicon: BDAG
  rationale: The verb πορνεύω refers to engaging in sexually immoral behavior. 'Commit
    sexual immorality' is clear modern English, avoids archaic 'fornicate,' and preserves
    the moral force without narrowing the term beyond the Greek.
- source_word: καθώς
  chosen: as
  alternatives:
  - just as
  lexicon: BDAG
  rationale: καθώς introduces comparison with Israel's example. 'As' is sufficient
    and idiomatic here.
- source_word: τινες αὐτῶν
  chosen: some of them
  alternatives:
  - some among them
  lexicon: BDAG
  rationale: This straightforwardly refers to some members of Israel in the wilderness
    generation. 'Some of them' is the most natural English equivalent.
- source_word: ἐπόρνευσαν
  chosen: committed sexual immorality
  alternatives:
  - were sexually immoral
  - fornicated
  lexicon: BDAG
  rationale: Using the same English gloss as the cognate hortatory verb preserves
    lexical consistency and highlights Paul's warning by repetition.
- source_word: ἔπεσαν
  chosen: fell
  alternatives:
  - died
  - were struck down
  lexicon: BDAG
  rationale: πίπτω literally means 'fall.' In this judgment context it idiomatically
    refers to death, but 'fell' preserves the Greek wording and leaves the implied
    result to context. A more explicit alternative is worth preserving in a footnote.
- source_word: μιᾷ ἡμέρᾳ
  chosen: in one day
  alternatives:
  - on one day
  - within a single day
  lexicon: BDAG
  rationale: The dative phrase expresses time within which. 'In one day' is idiomatic
    and communicates the concentrated nature of the judgment.
- source_word: εἴκοσι τρεῖς χιλιάδες
  chosen: twenty-three thousand
  alternatives:
  - 23,000
  lexicon: BDAG
  rationale: This is the plain cardinal number in the Greek and should be rendered
    directly in words in running text.
