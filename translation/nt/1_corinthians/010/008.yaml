theological_decisions:
- issue: Relation to the Old Testament count in Numbers 25:9
  chosen_reading: Retain Paul's stated number 'twenty-three thousand' in the main
    text without harmonizing.
  alternative_readings:
  - Harmonize to 'twenty-four thousand'
  - Explain one figure as a subtotal and the other as a total
  rationale: The Greek text of 1 Corinthians plainly reads 'twenty-three thousand.'
    Translation should reflect Paul's wording rather than resolve the apparent numerical
    tension by harmonization. Any explanatory reconciliation belongs in a footnote,
    not the main text.
  doctrine_reference: Translation philosophy §§1, 3, 5
