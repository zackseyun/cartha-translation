id: 1CO.10.23
reference: 1 Corinthians 10:23
source:
  edition: SBLGNT
  text: ⸀Πάντα ἔξεστιν· ἀλλ’ οὐ πάντα συμφέρει. ⸁πάντα ἔξεστιν· ἀλλ’ οὐ πάντα οἰκοδομεῖ.
translation:
  text: “All things are permitted,” but not all things are beneficial. “All things
    are permitted,” but not all things build up.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “All things are lawful.” The Greek expression can denote what is permitted
      or lawful; quotation marks reflect the likely Corinthian slogan being qualified
      by Paul.
    reason: lexical_alternative
lexical_decisions:
- source_word: Πάντα
  chosen: All things
  alternatives:
  - Everything
  lexicon: BDAG
  rationale: Neuter plural adjective used substantivally. 'All things' preserves the
    broad, categorical scope and echoes the repeated slogan-like form. 'Everything'
    is possible but slightly less formal and may sound more idiomatic than the Greek's
    repeated neuter plural.
- source_word: ἔξεστιν
  chosen: are permitted
  alternatives:
  - are lawful
  - are allowed
  lexicon: BDAG
  rationale: The verb denotes what is permissible or allowed. 'Are permitted' communicates
    permission clearly in modern English without the potentially archaic or legalistic
    tone of 'are lawful.' Because the phrase is likely a Corinthian slogan, a concise
    present-tense rendering is appropriate.
- source_word: ἀλλ’
  chosen: but
  alternatives:
  - yet
  - however
  lexicon: BDAG
  rationale: Simple adversative conjunction; 'but' best matches the concise contrastive
    structure of the Greek.
- source_word: συμφέρει
  chosen: are beneficial
  alternatives:
  - are profitable
  - are helpful
  - are advantageous
  lexicon: BDAG
  rationale: The singular verb with neuter plural subject is idiomatic Greek. The
    sense is what is advantageous or beneficial. 'Beneficial' is natural modern English
    and fits Paul's ethical point better than the more commercial-sounding 'profitable.'
- source_word: οἰκοδομεῖ
  chosen: build up
  alternatives:
  - edify
  - builds up
  lexicon: BDAG
  rationale: Paul commonly uses οἰκοδομέω metaphorically for strengthening the community.
    'Build up' preserves the metaphor in accessible English. Pluralizing in English
    ('things build up') smooths the mismatch created by the Greek singular verb with
    neuter plural subject.
