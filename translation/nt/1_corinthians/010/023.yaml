theological_decisions:
- issue: Whether to mark Πάντα ἔξεστιν as a quoted Corinthian slogan
  chosen_reading: 'Render with quotation marks: “All things are permitted”'
  alternative_readings:
  - Render without quotation marks as Paul's own unmarked statement
  rationale: Many interpreters understand the repeated phrase as a Corinthian slogan
    that Paul qualifies. Greek manuscripts lacked modern quotation marks, so this
    is an interpretive punctuation decision rather than a textual variant. Quotation
    marks help modern readers follow the rhetorical structure without changing the
    wording.
  doctrine_reference: Preserve theological tension rather than resolve it; document
    interpretive ambiguity per verse.
