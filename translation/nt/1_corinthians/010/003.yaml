id: 1CO.10.3
reference: 1 Corinthians 10:3
source:
  edition: SBLGNT
  text: καὶ πάντες τὸ αὐτὸ ⸂πνευματικὸν βρῶμα⸃ ἔφαγον
translation:
  text: and all ate the same spiritual food
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'supernatural food'; the phrase likely alludes to the manna in the wilderness
      and may carry typological force in the context.
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ
  chosen: and
  alternatives:
  - also
  lexicon: BDAG
  rationale: Standard coordinating conjunction linking this verse with the preceding
    statement; 'and' is the natural English connective here.
- source_word: πάντες
  chosen: all
  alternatives:
  - they all
  - everyone
  lexicon: BDAG
  rationale: Nominative masculine plural referring to the whole group of Israel in
    Paul's example. 'All' preserves the emphatic universality without adding an explicit
    pronoun.
- source_word: τὸ αὐτὸ
  chosen: the same
  alternatives:
  - that same
  lexicon: BDAG
  rationale: The article with αὐτός functions idiomatically to mean identity/sameness.
    'The same' is the standard and clear rendering.
- source_word: πνευματικὸν
  chosen: spiritual
  alternatives:
  - supernatural
  - of the Spirit
  lexicon: BDAG
  rationale: In Pauline usage πνευματικός commonly means 'spiritual,' and here it
    characterizes the food in relation to God's spiritual provision in the wilderness
    context. 'Of the Spirit' is interpretively narrower, and 'supernatural' is too
    paraphrastic.
- source_word: βρῶμα
  chosen: food
  alternatives:
  - meal
  - nourishment
  lexicon: BDAG
  rationale: βρῶμα denotes food in a general sense. 'Food' is the most direct and
    natural English equivalent.
- source_word: ἔφαγον
  chosen: ate
  alternatives:
  - did eat
  lexicon: BDAG
  rationale: Aorist indicative of ἐσθίω, simply narrating the past action. 'Ate' is
    the straightforward English past tense.
