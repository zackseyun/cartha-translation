theological_decisions:
- issue: Meaning of 'spiritual food' in Paul's wilderness typology
  chosen_reading: Retain 'spiritual food' in the main text without specifying 'manna'
    or making the sacramental connection explicit.
  alternative_readings:
  - the manna provided by God
  - food given by the Spirit
  - typological reference to the Lord's Supper
  rationale: Paul alludes to Israel's wilderness provision, likely manna, while also
    using typological language in the surrounding context. Translating simply as 'spiritual
    food' preserves the theological tension and Paul's wording without importing a
    narrower identification into the text itself.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
