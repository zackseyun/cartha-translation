theological_decisions:
- issue: How explicitly to render the Exodus 32 allusion in the final infinitive παίζειν
  chosen_reading: Retain the lexical rendering 'to play' in the main text while preserving
    the likely sense of revelry in a footnote.
  alternative_readings:
  - to revel
  - to engage in revelry
  rationale: The verse quotes Exodus 32:6 and Paul's warning concerns idolatry. The
    Greek verb can denote play, but in this context likely implies celebratory revelry
    tied to idol worship. Preserving 'play' in the main text respects the citation
    and avoids over-interpreting, while a footnote exposes the contextual force.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather
    than resolve it
