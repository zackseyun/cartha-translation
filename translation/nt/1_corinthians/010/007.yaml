id: 1CO.10.7
reference: 1 Corinthians 10:7
source:
  edition: SBLGNT
  text: μηδὲ εἰδωλολάτραι γίνεσθε, καθώς τινες αὐτῶν· ὥσπερ γέγραπται· Ἐκάθισεν ὁ
    λαὸς φαγεῖν καὶ πεῖν, καὶ ἀνέστησαν παίζειν.
translation:
  text: Do not become idolaters, as some of them were; just as it is written, “The
    people sat down to eat and drink, and rose up to play.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “rose up to revel”; the quoted wording comes from Exodus 32:6, where
      the ‘play’ is associated with Israel’s idolatrous feast around the golden calf.
    reason: lexical_alternative
lexical_decisions:
- source_word: μηδὲ
  chosen: Do not
  alternatives:
  - and do not
  - nor
  lexicon: BDAG
  rationale: In context Paul continues a series of prohibitions, so English idiom
    is best served by a straightforward prohibitive 'Do not' rather than the more
    wooden 'nor' or 'and do not.'
- source_word: εἰδωλολάτραι
  chosen: idolaters
  alternatives:
  - worshipers of idols
  lexicon: BDAG
  rationale: '''Idolaters'' is the concise and standard rendering for the noun, accurately
    conveying those devoted to idol worship without unnecessary expansion.'
- source_word: γίνεσθε
  chosen: become
  alternatives:
  - be
  - turn into
  lexicon: BDAG
  rationale: The present middle imperative of γίνομαι naturally carries the sense
    of becoming or coming to be, not merely stative existence. 'Become' preserves
    the warning against entering into such conduct.
- source_word: καθώς
  chosen: as
  alternatives:
  - just as
  - like
  lexicon: BDAG
  rationale: Here καθώς introduces comparison with Israel's example. 'As' is concise
    and natural in the clause 'as some of them were.'
- source_word: τινες αὐτῶν
  chosen: some of them were
  alternatives:
  - some of them became
  - some among them
  lexicon: BDAG
  rationale: The phrase refers to some among Israel in the wilderness narrative. English
    supplies 'were' for smoothness after 'as some of them,' while the sense of becoming
    is already carried by the main imperative.
- source_word: ὥσπερ γέγραπται
  chosen: just as it is written
  alternatives:
  - as it is written
  lexicon: BDAG
  rationale: This is a standard citation formula. 'Just as it is written' preserves
    the comparative force and the perfect tense sense of the abiding written text.
- source_word: Ἐκάθισεν ὁ λαὸς
  chosen: The people sat down
  alternatives:
  - The people seated themselves
  lexicon: BDAG
  rationale: This follows the Exodus citation naturally in English. 'The people' reflects
    ὁ λαός collectively.
- source_word: φαγεῖν καὶ πεῖν
  chosen: to eat and drink
  lexicon: BDAG
  rationale: The paired infinitives are straightforward and should be rendered literally.
- source_word: ἀνέστησαν
  chosen: rose up
  alternatives:
  - got up
  - stood up
  lexicon: BDAG
  rationale: '''Rose up'' preserves the biblical cadence of the citation and matches
    the aorist narrative movement.'
- source_word: παίζειν
  chosen: to play
  alternatives:
  - to revel
  - to engage in revelry
  lexicon: BDAG
  rationale: The verb literally means 'to play,' echoing the Exodus wording. Because
    in this context it likely carries overtones of festal revelry associated with
    idolatry, the more interpretive alternatives are worth preserving in a footnote,
    but the main text should retain the lexical form.
