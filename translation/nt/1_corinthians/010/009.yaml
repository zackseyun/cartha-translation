theological_decisions:
- issue: Referent and textual reading of τὸν Χριστόν
  chosen_reading: the Messiah
  alternative_readings:
  - the Lord
  - Christ
  rationale: The SBLGNT text reads Χριστόν, which in context yields the strong Pauline
    identification of the preincarnate Son with the one Israel tested in the wilderness.
    In keeping with doctrine and translation policy, the title is translated as 'Messiah'
    rather than transliterated 'Christ.' Because a well-known textual variant reads
    'the Lord,' that alternative is preserved in a footnote rather than silently ignored.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names. Contested
    terms: Χριστός → Messiah where title; preserve significant alternatives in footnotes.'
