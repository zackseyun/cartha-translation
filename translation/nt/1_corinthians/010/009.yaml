id: 1CO.10.9
reference: 1 Corinthians 10:9
source:
  edition: SBLGNT
  text: μηδὲ ἐκπειράζωμεν τὸν ⸀Χριστόν, ⸀καθώς τινες αὐτῶν ἐπείρασαν, καὶ ὑπὸ τῶν
    ὄφεων ⸀ἀπώλλυντο.
translation:
  text: Nor should we put the Messiah to the test, as some of them tested him and
    were being destroyed by the snakes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Some manuscripts read 'the Lord' instead of 'the Messiah' (or 'Christ').
    reason: textual_variant
  - marker: b
    text: Or 'serpents.'
    reason: lexical_alternative
lexical_decisions:
- source_word: μηδὲ
  chosen: Nor should
  alternatives:
  - And let us not
  - Neither should
  lexicon: BDAG
  rationale: Carries forward the series of prohibitions in the paragraph. 'Nor should'
    gives natural English while preserving the hortatory force in context.
- source_word: ἐκπειράζωμεν
  chosen: put ... to the test
  alternatives:
  - test thoroughly
  - tempt
  lexicon: BDAG
  rationale: The verb means to test or try, often with a negative sense of putting
    someone to an improper test. 'Put ... to the test' is idiomatic and avoids the
    misleading English 'tempt' when the object is the Messiah.
- source_word: τὸν Χριστόν
  chosen: the Messiah
  alternatives:
  - Christ
  lexicon: BDAG
  rationale: Χριστός is a title here, not a name-like usage, so the default doctrinal
    policy favors 'Messiah.' The article supports title usage. The textual form 'Christ'
    is retained as an alternative in a footnote because some manuscripts read 'Lord'
    instead.
- source_word: καθώς
  chosen: as
  alternatives:
  - just as
  lexicon: BDAG
  rationale: Introduces the comparison with Israel's example. 'As' is concise and
    natural.
- source_word: τινες αὐτῶν
  chosen: some of them
  alternatives:
  - some among them
  lexicon: BDAG
  rationale: Refers to some among the Israelites in the wilderness generation. Standard,
    clear English.
- source_word: ἐπείρασαν
  chosen: tested him
  alternatives:
  - put him to the test
  - tried him
  lexicon: BDAG
  rationale: The aorist points to the historical act of testing in the wilderness.
    'Tested him' matches the comparison and keeps the implied object from the previous
    clause.
- source_word: ὑπὸ τῶν ὄφεων
  chosen: by the snakes
  alternatives:
  - by serpents
  lexicon: BDAG
  rationale: ὄφις denotes snake/serpent. 'Snakes' is more readable modern English;
    'serpents' is preserved as a possible alternative but is less natural for the
    target audience.
- source_word: ἀπώλλυντο
  chosen: were being destroyed
  alternatives:
  - perished
  - were perishing
  lexicon: BDAG
  rationale: The imperfect depicts ongoing destruction rather than a simple summary
    event. 'Were being destroyed' best reflects the aspect, though 'perished' is common
    in English translations.
