id: 1CO.10.19
reference: 1 Corinthians 10:19
source:
  edition: SBLGNT
  text: τί οὖν φημι; ὅτι ⸂εἰδωλόθυτόν τί ἐστιν, ἢ ὅτι εἴδωλόν⸃ τί ἐστιν;
translation:
  text: What then am I saying? That food sacrificed to idols is anything, or that
    an idol is anything?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'that an idol-offering amounts to anything.'
    reason: lexical_alternative
  - marker: b
    text: That is, Paul is not asserting that idols have real divine existence or
      that sacrificial food has intrinsic spiritual significance in itself.
    reason: cross_reference
lexical_decisions:
- source_word: τί οὖν φημι
  chosen: What then am I saying?
  alternatives:
  - What then do I mean?
  - What then am I asserting?
  lexicon: BDAG
  rationale: Renders the rhetorical question naturally in English while preserving
    the present tense and first-person force of φημί. 'Am I saying' fits Paul's argumentative
    style in context.
- source_word: ὅτι
  chosen: That
  alternatives:
  - that is,
  - namely that
  lexicon: BDAG
  rationale: Introduces the content of what Paul might be taken to mean. A simple
    'that' best preserves the Greek structure without over-interpreting.
- source_word: εἰδωλόθυτόν
  chosen: food sacrificed to idols
  alternatives:
  - idol sacrifice
  - what is sacrificed to idols
  - an idol-offering
  lexicon: BDAG
  rationale: The term denotes meat/food associated with pagan sacrificial practice.
    'Food sacrificed to idols' is clear modern English and fits the broader discussion
    of eating sacrificial food in 1 Corinthians 8–10.
- source_word: τί ἐστιν
  chosen: is anything
  alternatives:
  - amounts to anything
  - is something
  lexicon: BDAG
  rationale: In this idiom, τί with εἰμί asks whether something has any real significance
    or existence in the relevant sense. 'Is anything' preserves the terse rhetorical
    force.
- source_word: ἢ
  chosen: or
  alternatives:
  - or rather
  lexicon: BDAG
  rationale: Simple disjunctive conjunction linking the two parallel clauses.
- source_word: εἴδωλον
  chosen: an idol
  alternatives:
  - the idol-image
  - an image
  lexicon: BDAG
  rationale: In context the word refers to an idol, not merely an image in general.
    'An idol' is the standard and contextually precise rendering.
