theological_decisions:
- issue: Whether Paul's question should be rendered as affirming some real existence/significance
    to idols or idol-food
  chosen_reading: 'Render the questions straightforwardly and rhetorically: ''That
    food sacrificed to idols is anything, or that an idol is anything?'''
  alternative_readings:
  - That an idol-sacrifice has any real existence, or that an idol has any real existence
  rationale: The verse is part of Paul's argument clarifying that he is not claiming
    idols are real gods or that idol-food has intrinsic spiritual substance in itself.
    The translation preserves the rhetorical ambiguity of 'anything' without importing
    a philosophical explanation into the main text.
  doctrine_reference: Preserve theological tension rather than resolve it.
