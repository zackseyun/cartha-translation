theological_decisions:
- issue: Referent of 'conscience'
  chosen_reading: Render generically as 'conscience' without specifying whether it
    is the eater's conscience or another person's until the following context clarifies
    it.
  alternative_readings:
  - your conscience
  - the other person's conscience
  rationale: The Greek text here simply says 'the conscience.' Since the immediate
    verse does not explicitly identify the referent, the translation preserves the
    ambiguity/tension rather than resolving it prematurely.
  doctrine_reference: Preserve theological tension rather than resolve it.
