theological_decisions:
- issue: Rendering κοινωνία in a sacramental context
  chosen_reading: sharing in
  alternative_readings:
  - participation in
  - communion
  rationale: The verse speaks of a real relation to the Messiah's blood and body,
    but the translation should not prejudge denominational debates about the mode
    of Eucharistic presence. "Sharing in" preserves the participatory force of κοινωνία
    while avoiding both reduction to mere symbolism and importation of later technical
    sacramental language.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Rendering Χριστός
  chosen_reading: Messiah
  alternative_readings:
  - Christ
  rationale: DOCTRINE.md directs that Χριστός be translated as "Messiah" where title
    is in view. Here Paul is speaking of the blood and body belonging to the Anointed
    One, so the titular sense remains active.
  doctrine_reference: 'Contested terms table: Χριστός → Messiah (where title; Christ
    where name-like).'
