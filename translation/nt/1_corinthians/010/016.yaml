id: 1CO.10.16
reference: 1 Corinthians 10:16
source:
  edition: SBLGNT
  text: τὸ ποτήριον τῆς εὐλογίας ὃ εὐλογοῦμεν, οὐχὶ κοινωνία ⸂ἐστὶν τοῦ αἵματος τοῦ
    Χριστοῦ⸃; τὸν ἄρτον ὃν κλῶμεν, οὐχὶ κοινωνία τοῦ σώματος τοῦ Χριστοῦ ἐστιν;
translation:
  text: The cup of blessing that we bless—is it not a sharing in the blood of the
    Messiah? The bread that we break—is it not a sharing in the body of the Messiah?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "participation in"; also traditionally "communion of."
    reason: lexical_alternative
  - marker: b
    text: Greek "Christou"; rendered "Messiah" here because Χριστός functions as a
      title. Traditionally, "Christ."
    reason: alternative_reading
lexical_decisions:
- source_word: ποτήριον
  chosen: cup
  alternatives:
  - chalice
  lexicon: BDAG
  rationale: '"Cup" is the plain, natural rendering in modern English and fits both
    ordinary and liturgical context without importing later ecclesiastical register
    implied by "chalice."'
- source_word: τῆς εὐλογίας
  chosen: of blessing
  alternatives:
  - of thanksgiving
  - for blessing
  lexicon: BDAG
  rationale: The genitive is rendered straightforwardly as "of blessing." While the
    phrase may evoke a liturgical cup associated with thanksgiving/blessing, the Greek
    noun is εὐλογία, so "blessing" best preserves the wording and possible Jewish
    meal-background.
- source_word: ὃ εὐλογοῦμεν
  chosen: that we bless
  alternatives:
  - for which we give thanks over
  - which we bless
  lexicon: BDAG
  rationale: A direct rendering preserves the verbal repetition with εὐλογίας and
    avoids over-specifying the action as thanksgiving alone. English idiom allows
    "that we bless" naturally enough in this sacramental context.
- source_word: οὐχὶ
  chosen: is it not
  alternatives:
  - is it not indeed
  - surely it is
  lexicon: BDAG
  rationale: This particle introduces a rhetorical question expecting a positive answer.
    "Is it not" preserves both form and force.
- source_word: κοινωνία
  chosen: sharing in
  alternatives:
  - participation in
  - fellowship in
  - communion in
  lexicon: BDAG
  rationale: κοινωνία here denotes real participation/partaking rather than mere social
    fellowship. "Sharing in" is clear modern English and preserves the participatory
    sense without locking the translation into later technical sacramental terminology
    such as "communion." Alternative "participation in" is also strong and worth preserving
    in a footnote.
- source_word: τοῦ αἵματος
  chosen: the blood
  lexicon: BDAG
  rationale: A formal rendering is appropriate; "blood" carries the covenantal and
    sacrificial force of the Greek without interpretive expansion.
- source_word: τοῦ Χριστοῦ
  chosen: of the Messiah
  alternatives:
  - of Christ
  lexicon: BDAG
  rationale: Per doctrine, Χριστός is translated as "Messiah" where functioning as
    a title. In this context it is titular and theologically meaningful, so "Messiah"
    is preferred, with "Christ" preserved as an alternative.
- source_word: ἄρτον
  chosen: bread
  alternatives:
  - loaf
  lexicon: BDAG
  rationale: '"Bread" is the standard rendering. Although a communal loaf may be in
    view in the broader context, this verse does not require the more specific "loaf."'
- source_word: ὃν κλῶμεν
  chosen: that we break
  alternatives:
  - which we break
  lexicon: BDAG
  rationale: This is the natural English equivalent and preserves the concrete ritual
    action without interpretive embellishment.
- source_word: τοῦ σώματος
  chosen: the body
  lexicon: BDAG
  rationale: A direct rendering preserves the Eucharistic and christological weight
    of the phrase without doctrinal narrowing.
