id: 1CO.10.24
reference: 1 Corinthians 10:24
source:
  edition: SBLGNT
  text: μηδεὶς τὸ ἑαυτοῦ ζητείτω ἀλλὰ τὸ τοῦ ⸀ἑτέρου.
translation:
  text: Let no one seek his own good, but that of the other person.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'Let no one seek what is his own, but what is the other's.'
    reason: lexical_alternative
lexical_decisions:
- source_word: μηδεὶς
  chosen: Let no one
  alternatives:
  - No one should
  - Let nobody
  lexicon: BDAG
  rationale: Negative indefinite subject introducing a general prohibition. 'Let no
    one' naturally conveys the prohibitive force with the following imperative in
    clear English.
- source_word: ζητείτω
  chosen: seek
  alternatives:
  - seek after
  - pursue
  lexicon: BDAG
  rationale: ζητέω commonly means 'seek' or 'strive for.' 'Seek' preserves the verbal
    simplicity and broad semantic range without over-interpreting the object as merely
    emotional or material.
- source_word: τὸ ἑαυτοῦ
  chosen: his own good
  alternatives:
  - his own interests
  - what is his own
  - his own advantage
  lexicon: BDAG
  rationale: 'The neuter article with reflexive pronoun is elliptical: literally ''the
    thing of himself / what is his own.'' In this context of considering others in
    matters of conscience and conduct, English requires an implied object. ''His own
    good'' makes the ellipsis explicit while fitting Paul''s ethical point. ''Interests''
    is possible, but ''good'' better matches the moral thrust and keeps the wording
    broad.'
- source_word: ἀλλὰ
  chosen: but
  alternatives:
  - rather
  - instead
  lexicon: BDAG
  rationale: Simple adversative contrast between self-seeking and seeking another's
    good.
- source_word: τὸ τοῦ ἑτέρου
  chosen: that of the other person
  alternatives:
  - the good of the other
  - what belongs to the other
  - the other's good
  lexicon: BDAG
  rationale: This phrase is likewise elliptical. ἕτερος here means 'the other' in
    contrast to oneself. 'That of the other person' preserves the ellipsis and contrast
    while making clear that another person is in view, not merely an abstract 'other.'
