theological_decisions:
- issue: Supplying the implied object in the elliptical phrases τὸ ἑαυτοῦ / τὸ τοῦ
    ἑτέρου
  chosen_reading: Express the sense as 'his own good' and 'that of the other person'
  alternative_readings:
  - his own interests ... those of the other
  - what is his own ... what is the other's
  rationale: The Greek leaves the object implicit, but English normally requires it.
    The immediate context (10:23-33) concerns acting for another's benefit rather
    than one's own advantage. Rendering the ellipsis with 'good' communicates the
    ethical force without importing a narrower doctrinal claim.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve theological
    tension rather than resolve it'
