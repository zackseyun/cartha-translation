id: 1CO.10.31
reference: 1 Corinthians 10:31
source:
  edition: SBLGNT
  text: Εἴτε οὖν ἐσθίετε εἴτε πίνετε εἴτε τι ποιεῖτε, πάντα εἰς δόξαν θεοῦ ποιεῖτε.
translation:
  text: Therefore, whether you eat or drink, or whatever you do, do everything for
    the glory of God.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Εἴτε ... εἴτε ... εἴτε
  chosen: whether ... or ... or
  alternatives:
  - if ... or ... or
  - either ... or ... or
  lexicon: BDAG
  rationale: The correlative conjunctions set up alternative cases. 'Whether ... or
    ... or' is idiomatic English and preserves the rhetorical structure.
- source_word: οὖν
  chosen: Therefore
  alternatives:
  - So
  - Then
  lexicon: BDAG
  rationale: οὖν marks an inference from the preceding discussion. 'Therefore' clearly
    signals the logical conclusion in a way suitable to Paul's exhortation.
- source_word: ἐσθίετε
  chosen: you eat
  alternatives:
  - you are eating
  lexicon: BDAG
  rationale: Present indicative here functions generically for customary action, not
    specifically progressive action. 'You eat' fits the general principle Paul states.
- source_word: πίνετε
  chosen: drink
  alternatives:
  - are drinking
  lexicon: BDAG
  rationale: As with ἐσθίετε, the present indicative is generic. In English the auxiliary
    'you' is naturally carried over from the first verb in the coordinated clause.
- source_word: τι
  chosen: whatever
  alternatives:
  - anything
  - something
  lexicon: BDAG
  rationale: Indefinite τι in this construction broadens the scope beyond eating and
    drinking. 'Whatever' best conveys the comprehensive force in natural English.
- source_word: ποιεῖτε
  chosen: you do / do
  alternatives:
  - you are doing
  - practice
  lexicon: BDAG
  rationale: ποιέω is broad and contextually refers to any action. It appears both
    in the subordinate clause ('whatever you do') and the main imperative-like exhortation
    ('do everything'). English varies slightly for natural style while preserving
    the same semantic core.
- source_word: πάντα
  chosen: everything
  alternatives:
  - all things
  - all
  lexicon: BDAG
  rationale: The accusative neuter plural has comprehensive scope. 'Everything' is
    more natural modern English than 'all things' while preserving totality.
- source_word: εἰς δόξαν
  chosen: for the glory
  alternatives:
  - to the glory
  - for God's glory
  lexicon: BDAG
  rationale: εἰς with δόξαν expresses purpose or goal. 'For the glory' communicates
    intended aim in clear English; 'to the glory' is also possible but slightly less
    natural here.
- source_word: θεοῦ
  chosen: of God
  alternatives:
  - God's
  lexicon: BDAG
  rationale: The genitive is straightforwardly rendered 'of God.' This preserves the
    formal relation in the phrase 'the glory of God,' a familiar and theologically
    weighty expression.
