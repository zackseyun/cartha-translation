theological_decisions:
- issue: Scope of Paul's exhortation
  chosen_reading: 'A universal ethical principle: all ordinary actions are to be directed
    toward God''s glory.'
  alternative_readings:
  - A narrower instruction limited only to food and drink issues
  rationale: The sequence moves from specific examples (eat, drink) to the comprehensive
    'whatever you do' and 'everything,' indicating a general principle extending beyond
    the immediate controversy while still arising from it.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather
    than resolve it)
