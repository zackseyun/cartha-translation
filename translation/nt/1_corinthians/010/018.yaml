theological_decisions:
- issue: Meaning of 'Israel according to the flesh'
  chosen_reading: A reference to ethnic/natural Israel in contrast to a more spiritual
    or typological category, without making a broader doctrinal claim beyond this
    context.
  alternative_readings:
  - Israel in merely outward terms
  - the Jewish people as distinguished from the church
  rationale: Paul's phrase most naturally denotes Israel by physical descent here,
    serving as an analogy from sacrificial practice. The translation preserves the
    phrase's tension rather than resolving larger theological debates about Israel
    and the church.
  doctrine_reference: Translation philosophy §3; Contested terms table for σάρξ
revisions:
- timestamp: '2026-04-21T00:49:47Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/nt/1_corinthians/010/018.json
  category: awkward_english
  tier: 1
  from: participants in the altar
  to: participants with the altar
  rationale: The current rendering "participants in the altar" is slightly awkward
    in English, as one is not typically "in" an altar. While the intended meaning
    (participation in the sacrificial system represented by the altar) is understandable,
    the preposition is not idiomatic. The genitive after κοινωνοί can imply association
    or partnership. Using "with" ("participants with the altar") better reflects this
    sense of partnership, treating the altar as the locus of the fellowship. This
    change maintains the drafter's choice of "participants" while improving the naturalness
    of the English phrase.
