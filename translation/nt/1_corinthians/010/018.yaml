id: 1CO.10.18
reference: 1 Corinthians 10:18
source:
  edition: SBLGNT
  text: βλέπετε τὸν Ἰσραὴλ κατὰ σάρκα· ⸀οὐχ οἱ ἐσθίοντες τὰς θυσίας κοινωνοὶ τοῦ θυσιαστηρίου
    εἰσίν;
translation:
  text: 'Consider Israel according to the flesh: are not those who eat the sacrifices
    participants in the altar?'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'physical Israel' or 'Israel by natural descent.'
    reason: lexical_alternative
  - marker: b
    text: Or 'sharers with the altar' or 'partakers of the altar.'
    reason: lexical_alternative
  - marker: c
    text: Or 'participants in the altar'.
    reason: previous_rendering
lexical_decisions:
- source_word: βλέπετε
  chosen: Consider
  alternatives:
  - Look at
  - Observe
  lexicon: BDAG
  rationale: Imperative plural calling for reflective attention rather than merely
    physical sight. 'Consider' fits Paul's argumentative appeal in context better
    than the more visual 'look at.'
- source_word: Ἰσραὴλ κατὰ σάρκα
  chosen: Israel according to the flesh
  alternatives:
  - physical Israel
  - Israel by natural descent
  lexicon: BDAG
  rationale: Retains the Pauline phrase with its literal 'flesh' language rather than
    paraphrasing. Here σάρκα refers to ethnic/natural Israel, not 'sinful nature.'
    A more interpretive alternative is preserved in a footnote.
- source_word: οὐχ ... εἰσίν;
  chosen: are not ... ?
  alternatives:
  - are they not ... ?
  lexicon: BDAG
  rationale: Uses the expected rhetorical-question form introduced by οὐχ, which anticipates
    an affirmative answer.
- source_word: οἱ ἐσθίοντες
  chosen: those who eat
  alternatives:
  - the ones eating
  - those who partake
  lexicon: BDAG
  rationale: Natural English rendering of the substantival present participle, preserving
    the concrete act of eating rather than importing the more interpretive 'partake'
    at this point.
- source_word: τὰς θυσίας
  chosen: the sacrifices
  alternatives:
  - the sacrificial offerings
  lexicon: BDAG
  rationale: Straightforward rendering of θυσίας. 'Sacrifices' is clear and idiomatic
    in context.
- source_word: κοινωνοὶ
  chosen: participants
  alternatives:
  - sharers
  - partners
  - partakers
  lexicon: BDAG
  rationale: Conveys real participation/share in something, matching Paul's argument
    about cultic fellowship. 'Participants' is modern and clear without losing theological
    weight.
- source_word: τοῦ θυσιαστηρίου
  chosen: in the altar
  alternatives:
  - with the altar
  - of the altar
  lexicon: BDAG
  rationale: The genitive after κοινωνοὶ expresses participation in relation to the
    altar. 'In the altar' is idiomatic enough in English to convey involvement in
    the altar's sacrificial sphere; alternatives are possible, especially 'with the
    altar,' and are preserved in a footnote.
