id: 1CO.10.10
reference: 1 Corinthians 10:10
source:
  edition: SBLGNT
  text: μηδὲ γογγύζετε, ⸀καθάπερ τινὲς αὐτῶν ἐγόγγυσαν, καὶ ἀπώλοντο ὑπὸ τοῦ ὀλοθρευτοῦ.
translation:
  text: And do not grumble, just as some of them grumbled, and were destroyed by the
    destroyer.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'by the destroying angel.' The Greek says 'the destroyer,' which may
      allude to the destroying agent in Israel's wilderness judgments.
    reason: alternative_reading
lexical_decisions:
- source_word: μηδὲ
  chosen: And do not
  alternatives:
  - Nor
  - And neither
  lexicon: BDAG
  rationale: In this series of prohibitions, μηδέ links this command with the preceding
    warnings. 'And do not' preserves the connective force in natural English better
    than the more formal 'nor.'
- source_word: γογγύζετε
  chosen: grumble
  alternatives:
  - murmur
  - complain
  lexicon: BDAG
  rationale: '''Grumble'' best captures the sense of discontented complaining expressed
    by γογγύζω in biblical usage, especially in allusion to Israel in the wilderness.
    ''Murmur'' is traditional but archaic; ''complain'' is possible but weaker and
    less evocative.'
- source_word: καθάπερ
  chosen: just as
  alternatives:
  - as
  - even as
  lexicon: BDAG
  rationale: This comparative conjunction introduces Israel's example. 'Just as' clearly
    marks the analogy and warning force.
- source_word: τινὲς αὐτῶν
  chosen: some of them
  alternatives:
  - some among them
  lexicon: BDAG
  rationale: A straightforward rendering of the partitive expression, referring to
    some among the Israelites mentioned in the preceding context.
- source_word: ἐγόγγυσαν
  chosen: grumbled
  alternatives:
  - murmured
  - complained
  lexicon: BDAG
  rationale: For consistency with γογγύζετε, the same English gloss is used for the
    aorist narrative verb.
- source_word: ἀπώλοντο
  chosen: were destroyed
  alternatives:
  - perished
  - were killed
  lexicon: BDAG
  rationale: The passive/middle form here is best rendered 'were destroyed' in view
    of the following agent phrase ὑπὸ τοῦ ὀλοθρευτοῦ. 'Perished' is possible but less
    explicit about the external agent.
- source_word: ὑπὸ τοῦ ὀλοθρευτοῦ
  chosen: by the destroyer
  alternatives:
  - by the destroying angel
  lexicon: BDAG
  rationale: The Greek uses the substantive 'the destroyer.' This preserves the wording
    of the text and its likely allusion to the destroying agent in Israel's judgment
    traditions. 'Destroying angel' is interpretive and should be preserved, if at
    all, in a footnote rather than the main text.
