theological_decisions:
- issue: Identity of ὁ ὀλοθρευτής
  chosen_reading: the destroyer
  alternative_readings:
  - the destroying angel
  rationale: The text names an agent of destruction without explicitly identifying
    him beyond the title. To preserve theological tension and avoid importing a more
    specific identification than the Greek states, the main text keeps 'the destroyer,'
    while the more interpretive 'destroying angel' is preserved in a footnote.
  doctrine_reference: Preserve theological tension rather than resolve it.
