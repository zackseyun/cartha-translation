theological_decisions:
- issue: Sense of τύποι in relation to Israel's wilderness experiences
  chosen_reading: Rendered as 'examples' in an ethical-warning sense rather than as
    a technical typological term.
  alternative_readings:
  - types
  - patterns
  rationale: The immediate context emphasizes admonition and moral warning for the
    church (cf. the surrounding argument), not a developed typological scheme. 'Examples'
    preserves the instructional force without importing a narrower theological system.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Strength of ἐπιθυμία language
  chosen_reading: Rendered with 'desire' rather than 'lust' to avoid narrowing the
    term to sexual desire while retaining moral seriousness.
  alternative_readings:
  - lust after
  - crave
  rationale: In this context the reference is broad sinful craving, not specifically
    sexual lust. The translation should preserve the text's scope and not import a
    more specific doctrinal or moral category than the Greek warrants.
  doctrine_reference: Translation philosophy §§1, 6
