id: 1CO.10.6
reference: 1 Corinthians 10:6
source:
  edition: SBLGNT
  text: Ταῦτα δὲ τύποι ἡμῶν ἐγενήθησαν, εἰς τὸ μὴ εἶναι ἡμᾶς ἐπιθυμητὰς κακῶν, καθὼς
    κἀκεῖνοι ἐπεθύμησαν.
translation:
  text: Now these things became examples for us, so that we might not be people who
    desire evil things, just as they also desired them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'types for us' or 'patterns for us.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ταῦτα
  chosen: these things
  alternatives:
  - these events
  lexicon: BDAG
  rationale: Demonstrative neuter plural referring back to the wilderness incidents
    just recounted. 'These things' is a natural and sufficiently formal rendering;
    'these events' is possible but slightly more interpretive.
- source_word: δὲ
  chosen: Now
  alternatives:
  - And
  - But
  lexicon: BDAG
  rationale: Marks transition/explanation. 'Now' fits Paul's discourse flow in English
    without overstating contrast.
- source_word: τύποι
  chosen: examples
  alternatives:
  - types
  - warnings
  - patterns
  lexicon: BDAG
  rationale: τύποι can mean patterns, examples, or types. In this hortatory context
    Paul presents the prior events as instructive precedents for believers. 'Examples'
    communicates the paraenetic force most clearly in modern English. 'Types' is more
    literal but can sound technical or typological in a narrower sense than the context
    requires.
- source_word: ἡμῶν
  chosen: for us
  alternatives:
  - of us
  - as our
  lexicon: BDAG
  rationale: The genitive with τύποι is best expressed idiomatically in English as
    'examples for us' rather than the wooden 'types of us.' This preserves the sense
    of relevance/application to the Christian community.
- source_word: ἐγενήθησαν
  chosen: became
  alternatives:
  - came to be
  - were
  lexicon: BDAG
  rationale: Aorist middle/passive of γίνομαι here denotes coming to function as something.
    'Became' preserves that nuance better than simple 'were.'
- source_word: εἰς τὸ μὴ εἶναι
  chosen: so that we might not be
  alternatives:
  - for us not to be
  - with the result that we should not be
  lexicon: BDAG
  rationale: The construction expresses purpose/result. 'So that we might not be'
    is idiomatic and preserves the intended warning function.
- source_word: ἐπιθυμητὰς
  chosen: people who desire
  alternatives:
  - desirers
  - cravers
  - those who lust after
  lexicon: BDAG
  rationale: The noun means one who desires or craves. 'Desirers' is awkward in English;
    'lust after' is stronger and can sound overly sexualized. 'People who desire'
    communicates the sense clearly and naturally.
- source_word: κακῶν
  chosen: evil things
  alternatives:
  - evil
  - bad things
  lexicon: BDAG
  rationale: Genitive plural neuter after ἐπιθυμητάς indicates the objects desired.
    'Evil things' is the most direct rendering and matches the moral force of κακός
    here.
- source_word: καθὼς
  chosen: just as
  alternatives:
  - as
  lexicon: BDAG
  rationale: Introduces comparison between the Corinthians and the wilderness generation.
    'Just as' makes the comparison explicit and natural.
- source_word: κἀκεῖνοι
  chosen: they also
  alternatives:
  - those people
  - those also
  lexicon: BDAG
  rationale: Contraction of καὶ ἐκεῖνοι. 'They also' is concise and preserves the
    additive force.
- source_word: ἐπεθύμησαν
  chosen: desired them
  alternatives:
  - craved
  - lusted after them
  lexicon: BDAG
  rationale: Aorist of ἐπιθυμέω echoes ἐπιθυμητάς. 'Desired them' preserves the lexical
    connection with the previous phrase. The object 'them' is supplied in English
    from κακῶν for clarity.
