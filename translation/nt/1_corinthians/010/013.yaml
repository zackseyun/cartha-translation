theological_decisions:
- issue: Meaning of πειρασμός/πειρασθῆναι in relation to God's faithfulness
  chosen_reading: Rendered as 'temptation'/'to be tempted' while preserving 'testing'
    as an alternative.
  alternative_readings:
  - testing
  - trial
  rationale: The verse can be read in terms of either moral temptation or broader
    testing. Given the immediate context of warnings against sinful desire and idolatry
    in 1 Corinthians 10, the moral sense is primary here. At the same time, the translation
    avoids importing a doctrine that God himself morally solicits evil; rather, it
    states that God faithfully limits and accompanies the experience. The broader
    lexical range is preserved in alternatives.
  doctrine_reference: Preserve theological tension rather than resolve it; optimal
    equivalence.
- issue: Rendering ἀνθρώπινος with gender-accurate English
  chosen_reading: Used 'common to man' in the main text, with 'common to humanity'
    preserved as an alternative.
  alternative_readings:
  - common to humanity
  - human
  rationale: The Greek adjective is built on ἄνθρωπος and denotes what is human/common
    to human beings. Per the doctrine's gender-accurate policy, representative masculine
    language may be retained where it matches the source's intent. A footnote preserves
    the more explicitly inclusive English alternative for readers.
  doctrine_reference: Gender-accurate over gender-neutral.
