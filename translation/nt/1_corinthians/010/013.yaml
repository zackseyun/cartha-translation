id: 1CO.10.13
reference: 1 Corinthians 10:13
source:
  edition: SBLGNT
  text: πειρασμὸς ὑμᾶς οὐκ εἴληφεν εἰ μὴ ἀνθρώπινος· πιστὸς δὲ ὁ θεός, ὃς οὐκ ἐάσει
    ὑμᾶς πειρασθῆναι ὑπὲρ ὃ δύνασθε, ἀλλὰ ποιήσει σὺν τῷ πειρασμῷ καὶ τὴν ἔκβασιν
    τοῦ ⸀δύνασθαι ὑπενεγκεῖν.
translation:
  text: No temptation has overtaken you except what is common to man. But God is faithful,
    who will not allow you to be tempted beyond what you are able, but with the temptation
    will also provide the way out, so that you may be able to endure it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'except what is human' or 'except what is common to humanity.'
    reason: lexical_alternative
  - marker: b
    text: πειρασμός / πειρασθῆναι can also be rendered 'testing' / 'to be tested'
      in this verse.
    reason: lexical_alternative
  - marker: c
    text: Or 'the escape' or 'the outcome.' The phrase emphasizes God's provision
      that enables endurance.
    reason: lexical_alternative
lexical_decisions:
- source_word: πειρασμός
  chosen: temptation
  alternatives:
  - testing
  - trial
  lexicon: BDAG
  rationale: πειρασμός can denote temptation, testing, or trial. In this immediate
    context, with warnings against idolatry and sin in the preceding passage and the
    passive infinitive πειρασθῆναι ('to be tempted/tested'), 'temptation' best captures
    the moral dimension Paul emphasizes, while the broader sense is preserved in alternatives.
- source_word: εἴληφεν
  chosen: has overtaken
  alternatives:
  - has seized
  - has taken
  lexicon: BDAG
  rationale: The perfect of λαμβάνω here conveys that no temptation has 'taken hold
    of' or 'overtaken' the readers. 'Has overtaken' is idiomatic English and preserves
    the force of an experience that has come upon them.
- source_word: εἰ μὴ ἀνθρώπινος
  chosen: except what is common to man
  alternatives:
  - except what is human
  - except what is common to humanity
  lexicon: BDAG
  rationale: ἀνθρώπινος means 'human' or 'characteristic of human beings.' The phrase
    indicates that their temptation is not unique or superhuman. 'Common to man' preserves
    the representative/generic force of the masculine form in line with the gender-accurate
    policy, while alternatives are noted.
- source_word: πιστός
  chosen: faithful
  alternatives:
  - trustworthy
  lexicon: BDAG
  rationale: For God, πιστός is best rendered 'faithful,' emphasizing his reliability
    and covenantal dependability in keeping his people.
- source_word: ἐάσει
  chosen: will not allow
  alternatives:
  - will not permit
  - will not let
  lexicon: BDAG
  rationale: ἐάω means to allow or permit. 'Will not allow' is clear modern English
    and suitably formal for the promise stated.
- source_word: πειρασθῆναι
  chosen: to be tempted
  alternatives:
  - to be tested
  lexicon: BDAG
  rationale: The passive infinitive matches the noun πειρασμός. Because the context
    concerns enticement toward sin as well as pressure, 'to be tempted' is preferred
    in the main text, with 'tested' preserved as an alternative lexical possibility.
- source_word: ὑπὲρ ὃ δύνασθε
  chosen: beyond what you are able
  alternatives:
  - beyond what you can bear
  - beyond your ability
  lexicon: BDAG
  rationale: This phrase states the limit of what God permits. 'Beyond what you are
    able' stays close to the Greek δύνασθε while remaining natural English.
- source_word: ποιήσει
  chosen: will also provide
  alternatives:
  - will make
  - will bring about
  lexicon: BDAG
  rationale: ποιέω is semantically broad ('make/do'). In this collocation with ἔκβασις,
    English idiom favors 'provide' to express God's active furnishing of an outcome
    or means of escape.
- source_word: σὺν τῷ πειρασμῷ
  chosen: with the temptation
  alternatives:
  - along with the temptation
  - together with the testing
  lexicon: BDAG
  rationale: σύν indicates accompaniment. 'With the temptation' is concise and preserves
    the sense that God's provision accompanies, rather than necessarily removes, the
    temptation.
- source_word: ἔκβασιν
  chosen: the way out
  alternatives:
  - the escape
  - the outcome
  lexicon: BDAG
  rationale: ἔκβασις can mean exit, way out, or outcome. In this context, paired with
    endurance, it refers to God's provided means of coming through the temptation.
    'The way out' is idiomatic and avoids implying mere evasion; alternatives are
    preserved because 'outcome' is also lexically possible.
- source_word: τοῦ δύνασθαι ὑπενεγκεῖν
  chosen: so that you may be able to endure it
  alternatives:
  - for you to be able to bear it
  - so as to be able to endure
  lexicon: BDAG
  rationale: The articular infinitive expresses purpose/result. ὑποφέρω means to bear
    up under, endure. 'So that you may be able to endure it' makes explicit the implied
    object in English and shows that God's provision aims at perseverance, not necessarily
    immediate removal.
