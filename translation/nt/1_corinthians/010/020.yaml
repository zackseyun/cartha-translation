theological_decisions:
- issue: Nature of pagan sacrificial worship
  chosen_reading: Paul affirms that pagan sacrifices are directed to demons, not to
    God.
  alternative_readings:
  - Paul is speaking only rhetorically about the social meaning of idol feasts
  - Paul means false gods in a merely metaphorical sense
  rationale: The explicit contrast 'to demons and not to God' should be preserved
    without softening. This reflects Paul's theological claim in the verse itself
    while not adding further speculation beyond the text.
  doctrine_reference: Affirmations; Translation philosophy §1, §3
- issue: Force of κοινωνοὺς τῶν δαιμονίων
  chosen_reading: participatory association/fellowship with demons
  alternative_readings:
  - mere social association with idolaters
  - full worshipful allegiance to demons
  rationale: Paul's language of κοινωνία in the surrounding context concerns real
    participation, so the translation should preserve that gravity without overstating
    it as total allegiance. 'Sharers with demons' maintains the tension.
  doctrine_reference: Translation philosophy §3
