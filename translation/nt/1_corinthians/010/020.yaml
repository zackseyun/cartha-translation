id: 1CO.10.20
reference: 1 Corinthians 10:20
source:
  edition: SBLGNT
  text: ἀλλ’ ὅτι ἃ ⸀θύουσιν, δαιμονίοις ⸂καὶ οὐ θεῷ θύουσιν⸃, οὐ θέλω δὲ ὑμᾶς κοινωνοὺς
    τῶν δαιμονίων γίνεσθαι.
translation:
  text: No, but what they sacrifice, they sacrifice to demons and not to God, and
    I do not want you to become sharers with demons.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'participants with demons' or 'partakers with demons.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀλλ’ ὅτι
  chosen: No, but
  alternatives:
  - Rather, that
  - But, that
  lexicon: BDAG
  rationale: 'In context Paul is correcting a possible misunderstanding from the previous
    verse: not that an idol is anything in itself, but that pagan sacrifices are directed
    to demons. Rendering with an idiomatic corrective ''No, but'' captures the adversative
    force better than a wooden ''but that.'''
- source_word: ἃ θύουσιν
  chosen: what they sacrifice
  alternatives:
  - the things they sacrifice
  - what they are sacrificing
  lexicon: BDAG
  rationale: The neuter relative pronoun ἃ refers to the sacrificial offerings in
    a general sense. 'What they sacrifice' is natural English and preserves the object
    without over-specifying 'things.'
- source_word: θύουσιν
  chosen: they sacrifice
  alternatives:
  - they offer in sacrifice
  - they are sacrificing
  lexicon: BDAG
  rationale: θύω in cultic context means to sacrifice/offer as a sacrifice. 'Sacrifice'
    is concise and preserves the ritual sense.
- source_word: δαιμονίοις
  chosen: to demons
  alternatives:
  - to demonic beings
  lexicon: BDAG
  rationale: δαιμόνιον in the New Testament refers to demons, not neutral lesser deities.
    'Demons' is the standard and theologically accurate rendering in this context.
- source_word: καὶ οὐ θεῷ
  chosen: and not to God
  alternatives:
  - and not to a god
  lexicon: BDAG
  rationale: The anarthrous θεῷ here is qualitative/definite in context, contrasting
    the true God with demons. 'God' rightly reflects Paul's monotheistic contrast.
- source_word: οὐ θέλω δὲ
  chosen: and I do not want
  alternatives:
  - but I do not want
  - now I do not want
  lexicon: BDAG
  rationale: δέ here advances the statement with mild contrast or continuation. 'And
    I do not want' reads naturally in English while preserving the flow from the preceding
    clause.
- source_word: κοινωνοὺς
  chosen: sharers
  alternatives:
  - participants
  - partners
  - partakers
  lexicon: BDAG
  rationale: κοινωνός denotes one who shares in something or has fellowship/participation
    with it. 'Sharers' keeps the relational-participatory sense and echoes the nearby
    argument about participation in altar fellowship (vv. 16–18) without importing
    overly ecclesiastical jargon.
- source_word: τῶν δαιμονίων
  chosen: with demons
  alternatives:
  - in demons
  - of demons
  lexicon: BDAG
  rationale: The genitive after κοινωνούς is best expressed idiomatically in English
    as association/participation 'with demons.' This communicates relational participation
    rather than possession.
- source_word: γίνεσθαι
  chosen: to become
  alternatives:
  - to be
  - to come to be
  lexicon: BDAG
  rationale: γίνομαι emphasizes entering into a state, not merely existing in it.
    'Become' preserves Paul's warning against coming into such fellowship.
