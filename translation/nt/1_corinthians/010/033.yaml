id: 1CO.10.33
reference: 1 Corinthians 10:33
source:
  edition: SBLGNT
  text: καθὼς κἀγὼ πάντα πᾶσιν ἀρέσκω, μὴ ζητῶν τὸ ἐμαυτοῦ ⸀σύμφορον ἀλλὰ τὸ τῶν πολλῶν,
    ἵνα σωθῶσιν.
translation:
  text: just as I also please everyone in everything, not seeking my own advantage
    but that of the many, so that they may be saved.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all things to all people.' Here the Greek more literally says 'everyone
      in everything,' expressing broad accommodation for others' good.
    reason: lexical_alternative
  - marker: b
    text: Or 'my own benefit ... the benefit of the many.'
    reason: lexical_alternative
lexical_decisions:
- source_word: καθὼς
  chosen: just as
  alternatives:
  - as
  lexicon: BDAG
  rationale: Introduces comparison with the preceding exhortation; 'just as' is natural
    English and preserves the comparative force.
- source_word: κἀγὼ
  chosen: I also
  alternatives:
  - I too
  lexicon: BDAG
  rationale: The crasis means 'and I'/'I also'; 'I also' fits the comparative structure
    and keeps Paul's self-example in view.
- source_word: πάντα πᾶσιν
  chosen: everyone in everything
  alternatives:
  - all things to all people
  - everything for everyone
  lexicon: BDAG
  rationale: The idiom combines neuter plural and dative plural to express broad accommodation.
    'Everyone in everything' is the most direct rendering in this syntax, while avoiding
    importing the different wording of 9:22.
- source_word: ἀρέσκω
  chosen: please
  alternatives:
  - accommodate
  - seek to please
  lexicon: BDAG
  rationale: Standard sense is 'please' or 'be pleasing to.' Here it refers to accommodating
    others for their good, not flattery; the surrounding participial clause clarifies
    motive.
- source_word: μὴ ζητῶν
  chosen: not seeking
  alternatives:
  - not pursuing
  - not looking for
  lexicon: BDAG
  rationale: Present participle expressing attendant manner or motive; 'not seeking'
    is straightforward and idiomatic.
- source_word: τὸ ἐμαυτοῦ σύμφορον
  chosen: my own advantage
  alternatives:
  - what is beneficial for me
  - my own benefit
  lexicon: BDAG
  rationale: σύμφορον denotes what is advantageous or beneficial. 'My own advantage'
    preserves the contrast with the benefit of others and echoes the chapter's concern
    with what is profitable.
- source_word: ἀλλὰ τὸ τῶν πολλῶν
  chosen: but that of the many
  alternatives:
  - but the advantage of the many
  - but what benefits many people
  lexicon: BDAG
  rationale: Elliptical construction parallel to the previous phrase. 'The many' is
    retained rather than expanded to 'others' to preserve Paul's wording while remaining
    intelligible through 'that of the many.'
- source_word: ἵνα σωθῶσιν
  chosen: so that they may be saved
  alternatives:
  - in order that they may be saved
  lexicon: BDAG
  rationale: ἵνα with aorist passive subjunctive expresses purpose. The passive 'be
    saved' preserves the theological and verbal form of σῴζω without over-specifying
    agency beyond the context.
