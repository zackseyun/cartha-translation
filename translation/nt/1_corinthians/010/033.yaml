theological_decisions:
- issue: Scope and sense of σωθῶσιν
  chosen_reading: rendered as 'they may be saved' in its ordinary Pauline salvific
    sense
  alternative_readings:
  - they may be helped
  - they may be preserved
  rationale: In 1 Corinthians, σῴζω commonly carries eschatological/salvific force,
    and the evangelistic context of seeking others' good supports that sense. The
    translation preserves the passive and does not flatten it into mere social benefit.
  doctrine_reference: Affirmations; Translation philosophy §3
- issue: Meaning of Paul's 'pleasing' others
  chosen_reading: accommodating others for their good rather than people-pleasing
    compromise
  alternative_readings:
  - seeking human approval
  rationale: The immediate qualifier 'not seeking my own advantage but that of the
    many' governs the sense of ἀρέσκω. The wording 'please' is retained as the lexical
    equivalent, while the surrounding syntax prevents a misleading moral reading.
  doctrine_reference: Translation philosophy §1, §3
