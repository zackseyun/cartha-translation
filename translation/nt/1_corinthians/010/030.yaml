theological_decisions:
- issue: Sense of χάριτι in relation to eating and thanksgiving
  chosen_reading: thankfulness/gratitude rather than salvific grace
  alternative_readings:
  - by grace
  rationale: The immediate co-text ('for what I give thanks') strongly favors χάριτι
    as gratitude/thankfulness associated with the meal. Rendering it as salvific 'grace'
    would import a theological nuance not demanded by the verse.
  doctrine_reference: Translation philosophy §§1, 3, 6
