id: 1CO.10.30
reference: 1 Corinthians 10:30
source:
  edition: SBLGNT
  text: εἰ ἐγὼ χάριτι μετέχω, τί βλασφημοῦμαι ὑπὲρ οὗ ἐγὼ εὐχαριστῶ;
translation:
  text: If I partake with thankfulness, why am I denounced for what I give thanks
    for?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'If I partake by grace, why am I spoken against for what I give thanks
      for?' The Greek χάριτι can be rendered 'by grace,' but in this context many
      understand it as 'with thankfulness' because of the following 'I give thanks.'
    reason: lexical_alternative
lexical_decisions:
- source_word: χάριτι
  chosen: with thankfulness
  alternatives:
  - by grace
  - with grace
  - gratefully
  lexicon: BDAG
  rationale: Here χάρις is used adverbially/instrumentally with μετέχω in the context
    of food and thanksgiving (cf. the following εὐχαριστῶ). 'With thankfulness' best
    captures the sense that the participation is accompanied by gratitude, not that
    Paul participates 'by grace' in a soteriological sense.
- source_word: μετέχω
  chosen: partake
  alternatives:
  - share
  - participate
  lexicon: BDAG
  rationale: In the immediate context of eating food, 'partake' is idiomatic and suitably
    formal without being archaic. 'Participate' is possible but less natural in English
    for eating.
- source_word: βλασφημοῦμαι
  chosen: am denounced
  alternatives:
  - am slandered
  - am spoken against
  - am blasphemed
  lexicon: BDAG
  rationale: Although the verb can mean 'blaspheme,' here the object is Paul and the
    issue is hostile speech against him over his eating. 'Am denounced' communicates
    public reproach without implying literal blasphemy against God.
- source_word: ὑπὲρ οὗ
  chosen: for what
  alternatives:
  - because of that which
  - over what
  lexicon: BDAG
  rationale: The preposition and relative pronoun together indicate the basis or cause
    of the reproach. 'For what' is concise modern English and preserves the causal
    sense.
- source_word: εὐχαριστῶ
  chosen: I give thanks for
  alternatives:
  - I thank God for
  - I am thankful for
  lexicon: BDAG
  rationale: The verb means 'give thanks.' Supplying 'God' would be interpretively
    true in context but is not explicit in the Greek, so it is left implicit. Repeating
    'for' in English yields natural syntax with the relative clause.
- source_word: ἐγὼ ... ἐγὼ
  chosen: I ... I
  lexicon: Greek grammar
  rationale: The repeated explicit pronoun adds emphasis/contrast in Greek. English
    retains this naturally through the first-person phrasing without needing extra
    emphasis markers.
- source_word: τί
  chosen: why
  alternatives:
  - for what reason
  - why is it that
  lexicon: BDAG
  rationale: In this rhetorical question, τί functions idiomatically as 'why?' rather
    than a literal neuter 'what?'.
