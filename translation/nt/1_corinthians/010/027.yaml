theological_decisions:
- issue: Meaning of συνείδησις in context
  chosen_reading: The phrase refers generally to conscience as a moral consideration
    in the meal setting, with the fuller clarification supplied by the next verse
    rather than imported here.
  alternative_readings:
  - It refers specifically to the believer's own conscience
  - It anticipates the other person's conscience mentioned in the next verse
  rationale: Paul's wording here is intentionally brief, and the next verse clarifies
    whose conscience is especially in view if an issue is raised. The translation
    preserves the ambiguity in the main text rather than resolving it prematurely.
  doctrine_reference: Preserve theological tension rather than resolve it.
