id: 1CO.10.27
reference: 1 Corinthians 10:27
source:
  edition: SBLGNT
  text: ⸀εἴ τις καλεῖ ὑμᾶς τῶν ἀπίστων καὶ θέλετε πορεύεσθαι, πᾶν τὸ παρατιθέμενον
    ὑμῖν ἐσθίετε μηδὲν ἀνακρίνοντες διὰ τὴν συνείδησιν·
translation:
  text: If one of the unbelievers invites you and you want to go, eat everything set
    before you, asking no questions for the sake of conscience.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'without examining anything' or 'without making inquiries.' The sense
      is not to investigate the food's background.
    reason: lexical_alternative
  - marker: b
    text: '''Conscience'' is clarified in the following verse, where Paul distinguishes
      the other person''s conscience from your own.'
    reason: cross_reference
lexical_decisions:
- source_word: ἀπίστων
  chosen: unbelievers
  alternatives:
  - unbelieving people
  - nonbelievers
  lexicon: BDAG
  rationale: The genitive plural with τῶν refers to people characterized by unbelief,
    here likely non-Christian hosts. 'Unbelievers' is concise and idiomatic, preserving
    Paul's insider/outsider distinction without adding hostility.
- source_word: καλεῖ
  chosen: invites
  alternatives:
  - calls
  - summons
  lexicon: BDAG
  rationale: In the meal context, καλέω naturally means 'invite' rather than the more
    literal 'call.' This best fits the social setting of dining in a private home.
- source_word: θέλετε πορεύεσθαι
  chosen: you want to go
  alternatives:
  - you wish to go
  - you are willing to go
  lexicon: BDAG
  rationale: The combination expresses willingness or desire to accept the invitation.
    'Want to go' is natural modern English and preserves the conditional nature of
    the action.
- source_word: πᾶν τὸ παρατιθέμενον ὑμῖν
  chosen: everything set before you
  alternatives:
  - whatever is placed before you
  - all that is served to you
  lexicon: BDAG
  rationale: The articular participle refers to food being presented at the meal.
    'Everything set before you' is idiomatic, clear, and keeps the broad scope of
    πᾶν.
- source_word: ἐσθίετε
  chosen: eat
  alternatives:
  - keep eating
  lexicon: BDAG
  rationale: The present imperative gives a general instruction. English simple imperative
    'eat' communicates the command adequately without overtranslating aspect.
- source_word: μηδὲν ἀνακρίνοντες
  chosen: asking no questions
  alternatives:
  - without examining anything
  - without making inquiries
  - without raising questions
  lexicon: BDAG
  rationale: ἀνακρίνω can mean examine, investigate, or question. In this context
    of meat possibly associated with idol sacrifice, the sense is not to inquire into
    its source. 'Asking no questions' captures the practical force in natural English.
- source_word: διὰ τὴν συνείδησιν
  chosen: for the sake of conscience
  alternatives:
  - because of conscience
  - on account of conscience
  lexicon: BDAG
  rationale: διά with the accusative here expresses reason or consideration. 'For
    the sake of conscience' fits the immediate ethical context and anticipates the
    explanation in the following verse.
