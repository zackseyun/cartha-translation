id: 1CO.10.17
reference: 1 Corinthians 10:17
source:
  edition: SBLGNT
  text: ὅτι εἷς ἄρτος, ἓν σῶμα οἱ πολλοί ἐσμεν, οἱ γὰρ πάντες ἐκ τοῦ ἑνὸς ἄρτου μετέχομεν.
translation:
  text: Because there is one bread, we who are many are one body, for we all partake
    of the one bread.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'one loaf' in both occurrences of 'one bread.' The Greek ἄρτος can denote
      a loaf as a unit, which may sharpen the image of many sharing one source.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅτι
  chosen: Because
  alternatives:
  - For
  - since
  lexicon: BDAG
  rationale: Introduces the explanatory ground for the preceding statement. 'Because'
    clearly conveys causal force in modern English.
- source_word: εἷς ἄρτος
  chosen: one bread
  alternatives:
  - one loaf
  lexicon: BDAG
  rationale: ἄρτος can mean 'bread' or 'loaf.' 'Bread' is retained in the main text
    because it is natural English and preserves the Eucharistic resonance already
    established in context; 'one loaf' is a viable alternative that makes the singular
    object more concrete.
- source_word: ἓν σῶμα
  chosen: one body
  lexicon: BDAG
  rationale: Standard rendering of σῶμα. In this context it carries both communal
    and sacramental resonance, and 'body' preserves that theological density without
    over-interpreting.
- source_word: οἱ πολλοί
  chosen: we who are many
  alternatives:
  - the many
  - many of us
  lexicon: BDAG
  rationale: The phrase refers to the plurality of believers. 'We who are many' is
    idiomatic English and preserves the contrast between plurality and unity better
    than the more wooden 'the many.'
- source_word: ἐσμεν
  chosen: are
  lexicon: BDAG
  rationale: Simple copula linking the plural subject to 'one body.'
- source_word: γὰρ
  chosen: for
  alternatives:
  - because
  lexicon: BDAG
  rationale: Marks explanation. 'For' works naturally here to connect the second clause
    as the reason for the first.
- source_word: πάντες
  chosen: all
  lexicon: BDAG
  rationale: Emphasizes the shared participation of the whole group.
- source_word: ἐκ τοῦ ἑνὸς ἄρτου
  chosen: of the one bread
  alternatives:
  - from the one bread
  - of the one loaf
  - from the one loaf
  lexicon: BDAG
  rationale: With μετέχω, ἐκ commonly marks the source or object shared in. English
    idiom prefers 'partake of' rather than 'partake from,' so 'of the one bread' is
    the most natural rendering while preserving the singularity.
- source_word: μετέχομεν
  chosen: partake
  alternatives:
  - share in
  - participate in
  lexicon: BDAG
  rationale: Conveys actual shared participation. 'Partake' fits the meal/sacramental
    context well and is more idiomatic with 'of the one bread' than 'participate in'
    in this sentence.
