theological_decisions:
- issue: Relation between the one bread and the one body
  chosen_reading: The verse preserves Paul's linkage between the shared bread and
    the unity of believers without specifying a denominational doctrine of the Lord's
    Supper.
  alternative_readings:
  - A more memorialist reading emphasizing symbolic unity
  - A stronger sacramental reading emphasizing communion effected through the bread
  rationale: The Greek states that the many are one body because all partake of the
    one bread, but it does not require the translation to resolve later theological
    debates about Eucharistic ontology. The wording keeps the connection intact while
    avoiding imported doctrinal precision beyond the text.
  doctrine_reference: Preserve theological tension rather than resolve it.
