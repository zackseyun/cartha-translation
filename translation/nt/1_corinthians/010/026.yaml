theological_decisions:
- issue: Rendering κύριος in a scriptural citation with covenantal/theological weight
  chosen_reading: Lord
  alternative_readings:
  - LORD
  - Master
  rationale: Per doctrine, κύριος defaults to 'Lord.' Although the line quotes Psalm
    24:1, Paul’s Greek text uses κύριος, and 'Lord' preserves both the citation and
    New Testament usage without importing the small-caps convention reserved in this
    project for YHWH in Hebrew contexts.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
