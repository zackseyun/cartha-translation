id: 1CO.10.26
reference: 1 Corinthians 10:26
source:
  edition: SBLGNT
  text: τοῦ ⸂κυρίου γὰρ⸃ ἡ γῆ καὶ τὸ πλήρωμα αὐτῆς.
translation:
  text: For the earth is the Lord’s, and its fullness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Quoted from Psalm 24:1. Or, more dynamically, 'everything in it.'
    reason: cross_reference
lexical_decisions:
- source_word: κυρίου
  chosen: the Lord’s
  alternatives:
  - the Lord
  - the Lord belongs the earth
  - the earth belongs to the Lord
  lexicon: BDAG
  rationale: κύριος is rendered with the doctrinal default 'Lord.' The genitive construction
    τοῦ κυρίου is naturally expressed in English possession as 'the Lord’s' rather
    than a more wooden 'of the Lord.' This also preserves the citation-like force
    from Psalm 24:1.
- source_word: γάρ
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: BDAG
  rationale: γάρ introduces the scriptural ground for the preceding argument, so 'For'
    best preserves the explanatory connection in concise, natural English.
- source_word: γῆ
  chosen: earth
  alternatives:
  - land
  - world
  lexicon: BDAG
  rationale: γῆ can mean 'earth' or 'land.' Here, in the Psalm citation paired with
    'its fullness,' the cosmic sense is primary, so 'earth' is the best rendering.
- source_word: πλήρωμα
  chosen: fullness
  alternatives:
  - everything in it
  - all that fills it
  - contents
  lexicon: BDAG
  rationale: πλήρωμα here denotes that which fills the earth, echoing the established
    biblical idiom of Psalm 24:1. 'Fullness' is slightly more formal but remains readable
    and preserves the intertextual resonance better than a paraphrase.
- source_word: αὐτῆς
  chosen: its
  alternatives:
  - of it
  - thereof
  lexicon: BDAG
  rationale: The feminine pronoun refers back to γῆ ('earth'). English idiom requires
    'its' to express possession naturally.
