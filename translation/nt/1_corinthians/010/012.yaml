id: 1CO.10.12
reference: 1 Corinthians 10:12
source:
  edition: SBLGNT
  text: ὥστε ὁ δοκῶν ἑστάναι βλεπέτω μὴ πέσῃ,
translation:
  text: Therefore, let the one who thinks he stands watch out lest he fall.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'So then, whoever thinks he is standing should be careful not to fall.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὥστε
  chosen: Therefore
  alternatives:
  - So then
  - Therefore then
  lexicon: BDAG
  rationale: Inferential conjunction drawing a conclusion from the preceding warning
    examples; 'Therefore' is concise and natural in English while preserving the logical
    force.
- source_word: ὁ δοκῶν
  chosen: the one who thinks
  alternatives:
  - whoever thinks
  - the one supposing
  lexicon: BDAG
  rationale: Articular present participle functions substantivally. 'The one who thinks'
    preserves the singular representative force without over-paraphrasing. 'Whoever
    thinks' is possible but slightly more generalized.
- source_word: ἑστάναι
  chosen: he stands
  alternatives:
  - that he is standing
  - that he stands firm
  lexicon: BDAG
  rationale: Perfect infinitive of ἵστημι conveys a state of standing. 'He stands'
    is idiomatic and captures the settled sense. 'Stands firm' adds emphasis not explicit
    in the Greek.
- source_word: βλεπέτω
  chosen: watch out
  alternatives:
  - take heed
  - be careful
  - let him beware
  lexicon: BDAG
  rationale: Present active imperative calls for ongoing vigilance. 'Watch out' is
    clear modern English and preserves the warning force better than the more archaic
    'take heed.'
- source_word: μὴ πέσῃ
  chosen: lest he fall
  alternatives:
  - so that he may not fall
  - that he not fall
  lexicon: BDAG
  rationale: μή with aorist subjunctive after an imperative expresses negative purpose
    or warning. 'Lest he fall' is concise, natural, and preserves the admonitory tone.
