theological_decisions:
- issue: Nature of 'fall' in Paul's warning
  chosen_reading: Retain the general warning 'fall' without specifying whether it
    means apostasy, moral failure, or participation in idolatrous judgment.
  alternative_readings:
  - fall into sin
  - fall under judgment
  - fall away
  rationale: The immediate context warns against overconfidence in light of Israel's
    failures, but the Greek πέσῃ itself is not specific enough to justify narrowing
    the sense. Preserving the broader term maintains the theological tension rather
    than resolving a debated doctrinal implication.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
- issue: Representative masculine expression
  chosen_reading: Use 'he' in 'he stands ... he fall' to reflect the singular masculine
    Greek while intending a generic representative sense.
  alternative_readings:
  - they stand ... they fall
  - the person who thinks they stand
  rationale: The Greek is grammatically masculine singular and functions representatively.
    Per the doctrine statement, gender-accurate rendering is preferred over gender-neutral
    smoothing when it matches the source's intent.
  doctrine_reference: 'Translation philosophy §4: Gender-accurate over gender-neutral.'
