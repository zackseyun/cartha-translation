theological_decisions:
- issue: Whose conscience is meant by τὴν συνείδησιν
  chosen_reading: The conscience in view is the other person's, not the eater's own
    conscience.
  alternative_readings:
  - The eater's own conscience
  - A deliberately general reference to conscience without specifying whose
  rationale: The immediate context in the following verse explicitly clarifies, 'I
    do not mean your own conscience, but the other person's.' Therefore the verse's
    ethical force is regard for the informer and that person's conscience. The main
    text keeps the concise wording 'for conscience’ sake' rather than over-specifying,
    preserving Paul's flow while allowing the next verse to supply the clarification.
  doctrine_reference: 'Translation philosophy §3: preserve theological tension rather
    than resolve it; here the near-context resolves the ambiguity sufficiently.'
