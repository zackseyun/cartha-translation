id: 1CO.10.28
reference: 1 Corinthians 10:28
source:
  edition: SBLGNT
  text: ἐὰν δέ τις ὑμῖν εἴπῃ· Τοῦτο ⸀ἱερόθυτόν ἐστιν, μὴ ἐσθίετε δι’ ἐκεῖνον τὸν μηνύσαντα
    καὶ τὴν ⸀συνείδησιν·
translation:
  text: But if someone says to you, “This has been offered in sacrifice,” do not eat
    it, for the sake of the one who informed you and for conscience’ sake.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “This is sacrificial meat.” The Greek adjective refers to something
      offered in sacrifice.
    reason: lexical_alternative
  - marker: b
    text: That is, for the sake of the other person’s conscience, not your own; see
      the next verse.
    reason: cross_reference
lexical_decisions:
- source_word: ἐὰν δέ τις ὑμῖν εἴπῃ
  chosen: But if someone says to you
  alternatives:
  - But if anyone says to you
  lexicon: BDAG
  rationale: ἐὰν with the aorist subjunctive εἴπῃ introduces a conditional scenario.
    τις is indefinite, naturally rendered 'someone' or 'anyone'; 'someone' is slightly
    more idiomatic in modern English while preserving the indefinite force. δέ is
    carried by 'But' to mark contrast with the previous permissive scenario.
- source_word: Τοῦτο ἱερόθυτόν ἐστιν
  chosen: This has been offered in sacrifice
  alternatives:
  - This is sacrificial meat
  - This is offered to an idol
  - This is a sacred offering
  lexicon: BDAG
  rationale: ἱερόθυτος denotes something offered in sacrifice, especially meat from
    a cultic offering. The predicate adjective is rendered with an English verbal
    expression to make the sense clear and natural. 'Offered to an idol' is interpretive
    and imports 'idol' from the broader context rather than this word itself; 'sacrificial
    meat' is possible but less directly tied to the clause structure.
- source_word: μὴ ἐσθίετε
  chosen: do not eat it
  alternatives:
  - do not eat
  lexicon: BDAG
  rationale: Present imperative with μή gives a prohibition. English idiom prefers
    supplying the object 'it' from context, since the referent is the food just identified.
- source_word: δι’ ἐκεῖνον τὸν μηνύσαντα
  chosen: for the sake of the one who informed you
  alternatives:
  - because of the one who told you
  - for the sake of the one who made it known
  lexicon: BDAG
  rationale: 'διά with the accusative here expresses reason or consideration: abstain
    out of regard for that person. μηνύσαντα means ''having informed/reported/disclosed.''
    ''Informed you'' is natural and preserves the participle''s sense without unnecessary
    stiffness.'
- source_word: καὶ τὴν συνείδησιν
  chosen: and for conscience’ sake
  alternatives:
  - and because of conscience
  - and for the conscience
  lexicon: BDAG
  rationale: συνείδησις is 'conscience.' The phrase is elliptical in Greek; English
    supplies 'for ... sake' to match the preceding διά phrase and make the coordination
    clear. The immediate context indicates the conscience in view is that of the other
    person rather than the believer's own, but the noun itself is translated simply
    and the clarification is left to context/footnote rather than imported into the
    main text.
