id: 1CO.10.2
reference: 1 Corinthians 10:2
source:
  edition: SBLGNT
  text: καὶ πάντες εἰς τὸν Μωϋσῆν ⸀ἐβαπτίσαντο ἐν τῇ νεφέλῃ καὶ ἐν τῇ θαλάσσῃ,
translation:
  text: and all were baptized into Moses in the cloud and in the sea,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'identified with Moses' or 'into allegiance to Moses.' The Greek literally
      says 'into Moses,' preserving Paul's typological parallel with baptism.
    reason: alternative_reading
  - marker: b
    text: Paul says 'in the sea,' not 'through the sea,' preserving the parallel with
      'in the cloud.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πάντες
  chosen: all
  alternatives:
  - everyone
  lexicon: BDAG
  rationale: The nominative plural refers collectively to all the Israelites in view.
    'All' is concise and preserves Paul's repeated emphasis in the surrounding context.
- source_word: εἰς τὸν Μωϋσῆν
  chosen: into Moses
  alternatives:
  - in relation to Moses
  - into allegiance to Moses
  lexicon: BDAG
  rationale: A formal rendering best preserves the typological parallel with baptismal
    language. 'Into Moses' mirrors Paul's unusual construction and echoes covenantal/representative
    union language without over-interpreting it.
- source_word: ἐβαπτίσαντο
  chosen: were baptized
  alternatives:
  - were immersed
  - baptized themselves
  lexicon: BDAG
  rationale: The aorist middle is best rendered idiomatically in English as passive
    here. 'Were baptized' preserves the established lexical sense of βαπτίζω and fits
    Paul's typological use; 'immersed' is possible but too narrow and potentially
    misleading in this context, and 'baptized themselves' over-presses the middle
    voice.
- source_word: ἐν τῇ νεφέλῃ
  chosen: in the cloud
  alternatives:
  - by the cloud
  - with the cloud
  lexicon: BDAG
  rationale: '''In the cloud'' preserves the preposition ἐν and the Exodus imagery.
    It allows the phrase to retain the ambiguity of sphere/instrument/association
    present in Greek.'
- source_word: ἐν τῇ θαλάσσῃ
  chosen: in the sea
  alternatives:
  - by the sea
  - through the sea
  lexicon: BDAG
  rationale: Although the broader narrative involves passing through the sea, Paul
    here uses ἐν rather than διά. 'In the sea' preserves his wording and keeps the
    parallel with 'in the cloud'.
