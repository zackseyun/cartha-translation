theological_decisions:
- issue: Meaning of Israel being 'baptized into Moses'
  chosen_reading: Retain the typological and representative language without explicating
    it beyond the text.
  alternative_readings:
  - initiated into Moses' leadership
  - identified with Moses
  rationale: Paul draws an analogy between Israel's exodus experience and Christian
    baptism. The translation should preserve that theological tension rather than
    resolve it into a single doctrinal explanation.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
