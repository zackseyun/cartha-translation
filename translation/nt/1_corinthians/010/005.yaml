theological_decisions:
- issue: Nature of the judgment described by κατεστρώθησαν
  chosen_reading: A reference to God's judgment resulting in the Israelites being
    struck down during the wilderness wanderings.
  alternative_readings:
  - A more neutral image of their bodies being scattered or laid out in the wilderness
    without foregrounding the judicial aspect.
  rationale: In context Paul warns the Corinthians by recalling Israel's failures
    and consequent divine judgment. Rendering the verb as 'were struck down' preserves
    that warning force without adding details beyond the text.
  doctrine_reference: 'Translation philosophy: preserve the source text''s plain sense
    without importing extra doctrinal claims.'
