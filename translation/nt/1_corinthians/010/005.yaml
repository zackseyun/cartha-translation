id: 1CO.10.5
reference: 1 Corinthians 10:5
source:
  edition: SBLGNT
  text: ἀλλ’ οὐκ ἐν τοῖς πλείοσιν αὐτῶν ηὐδόκησεν ὁ θεός, κατεστρώθησαν γὰρ ἐν τῇ
    ἐρήμῳ.
translation:
  text: Nevertheless, God was not pleased with most of them, for they were struck
    down in the wilderness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'were laid low' or 'were overthrown' in the wilderness.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀλλ’
  chosen: Nevertheless
  alternatives:
  - But
  - Yet
  lexicon: BDAG
  rationale: Marks a strong contrast with the privileges listed in the preceding verses.
    'Nevertheless' captures the adversative force with natural English emphasis.
- source_word: οὐκ ἐν τοῖς πλείοσιν αὐτῶν
  chosen: with most of them
  alternatives:
  - in the majority of them
  - with the greater number of them
  lexicon: BDAG
  rationale: The idiom literally reads 'not in the majority of them,' but in context
    εὐδοκέω with ἐν is best rendered idiomatically as 'be pleased with.' 'Most of
    them' preserves the quantitative sense without awkwardness.
- source_word: ηὐδόκησεν
  chosen: was not pleased
  alternatives:
  - did not take pleasure
  - did not approve
  lexicon: BDAG
  rationale: εὐδοκέω commonly means 'to be pleased with, take delight in.' The passive-style
    English expression after negation is the most natural equivalent here.
- source_word: ὁ θεός
  chosen: God
  lexicon: BDAG
  rationale: Straightforward nominative subject; no contextual reason to expand or
    paraphrase.
- source_word: κατεστρώθησαν
  chosen: were struck down
  alternatives:
  - were laid low
  - were overthrown
  - were spread out
  lexicon: BDAG
  rationale: The passive of καταστρώννυμι here refers to the Israelites' bodies falling
    in judgment in the wilderness. 'Were struck down' communicates divine judgment
    clearly in idiomatic English. 'Were overthrown' is possible, but 'struck down'
    better fits the death/judgment context.
- source_word: γὰρ
  chosen: for
  alternatives:
  - because
  lexicon: BDAG
  rationale: Introduces the explanatory ground for God's displeasure; 'for' is concise
    and natural in this context.
- source_word: ἐν τῇ ἐρήμῳ
  chosen: in the wilderness
  alternatives:
  - in the desert
  lexicon: BDAG
  rationale: Standard biblical rendering for ἔρημος in the Exodus-wandering context;
    'wilderness' better preserves the scriptural resonance than 'desert.'
