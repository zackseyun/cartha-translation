theological_decisions:
- issue: Nature of Paul's negation in relation to pagan worship and the Lord's Supper
  chosen_reading: A categorical incompatibility of participation in the Lord's table
    with participation in demonic worship.
  alternative_readings:
  - A merely rhetorical discouragement rather than real incompatibility
  rationale: The repeated οὐ δύνασθε with parallel clauses presents an absolute incompatibility,
    not a mild preference. The translation preserves this force with 'cannot' in both
    clauses without adding doctrinal explanation beyond the text.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
