id: 1CO.10.21
reference: 1 Corinthians 10:21
source:
  edition: SBLGNT
  text: οὐ δύνασθε ποτήριον κυρίου πίνειν καὶ ποτήριον δαιμονίων· οὐ δύνασθε τραπέζης
    κυρίου μετέχειν καὶ τραπέζης δαιμονίων.
translation:
  text: You cannot drink the cup of the Lord and the cup of demons; you cannot share
    in the table of the Lord and the table of demons.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'participate in the table of the Lord and the table of demons.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐ δύνασθε
  chosen: you cannot
  alternatives:
  - you are not able to
  - you cannot possibly
  lexicon: BDAG
  rationale: Expresses present inability/impossibility in direct modern English. 'Cannot'
    preserves Paul's categorical prohibition/impossibility without unnecessary stiffness.
- source_word: ποτήριον
  chosen: cup
  alternatives:
  - drinking cup
  lexicon: BDAG
  rationale: '''Cup'' is the natural and established English equivalent and in this
    context carries sacramental/participatory overtones without needing expansion.'
- source_word: κυρίου
  chosen: the Lord
  alternatives:
  - Lord's
  lexicon: BDAG
  rationale: Follows the doctrinal default for κύριος as 'Lord.' The genitive is rendered
    with 'of the Lord' for parallel clarity with 'of demons' and to preserve the solemn
    cadence of the Greek.
- source_word: πίνειν
  chosen: drink
  alternatives:
  - be drinking
  lexicon: BDAG
  rationale: Simple infinitive after δύνασθε is best rendered idiomatically as 'drink.'
    No progressive nuance is required here.
- source_word: δαιμονίων
  chosen: demons
  alternatives:
  - evil spirits
  lexicon: BDAG
  rationale: '''Demons'' is the standard and most transparent rendering of δαιμόνια
    in the New Testament. It preserves the spiritual-personal force of the term better
    than a paraphrase.'
- source_word: τραπέζης
  chosen: table
  alternatives:
  - meal table
  - altar-table
  lexicon: BDAG
  rationale: '''Table'' is the direct lexical equivalent and preserves the cultic/communal
    imagery. More interpretive renderings like ''altar-table'' import explanatory
    nuance not explicit in the text.'
- source_word: μετέχειν
  chosen: share in
  alternatives:
  - partake of
  - participate in
  lexicon: BDAG
  rationale: The verb denotes participation or sharing. 'Share in' is readable modern
    English and conveys real participation without archaic phrasing like 'partake
    of.' 'Participate in' is possible but slightly more abstract.
- source_word: καὶ
  chosen: and
  alternatives:
  - both ... and
  lexicon: BDAG
  rationale: The repeated conjunction is preserved straightforwardly to maintain the
    parallel structure and rhetorical force of the verse.
