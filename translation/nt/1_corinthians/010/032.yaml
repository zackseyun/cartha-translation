id: 1CO.10.32
reference: 1 Corinthians 10:32
source:
  edition: SBLGNT
  text: ἀπρόσκοποι ⸂καὶ Ἰουδαίοις γίνεσθε⸃ καὶ Ἕλλησιν καὶ τῇ ἐκκλησίᾳ τοῦ θεοῦ,
translation:
  text: Be without causing offense to Jews and to Greeks and to the church of God,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'without giving offense' or 'inoffensive.'
    reason: lexical_alternative
  - marker: b
    text: '''Greeks'' here likely refers broadly to non-Jews in Paul''s setting; the
      Greek text specifically says ''Greeks.'''
    reason: cultural_note
lexical_decisions:
- source_word: ἀπρόσκοποι
  chosen: without causing offense
  alternatives:
  - blameless
  - inoffensive
  - without giving offense
  lexicon: BDAG
  rationale: The adjective denotes being free from causing stumbling or offense. In
    this context, with groups in the dative following and in light of the surrounding
    discussion about not seeking one's own advantage but that of others, an idiomatic
    rendering that makes the relational sense explicit is preferable to the less clear
    'blameless.'
- source_word: γίνεσθε
  chosen: Be
  alternatives:
  - become
  - prove to be
  lexicon: BDAG
  rationale: Present middle imperative of γίνομαι can mean 'be/become.' In English
    exhortation, 'Be' best conveys the ongoing imperative sense naturally without
    implying a one-time transition.
- source_word: Ἰουδαίοις
  chosen: Jews
  alternatives:
  - Jewish people
  - Judeans
  lexicon: BDAG
  rationale: In Pauline usage here the reference is to the Jewish people as a religious-ethnic
    group, contrasted with Greeks and the church of God, not specifically inhabitants
    of Judea. 'Jews' is the standard and clearest rendering.
- source_word: Ἕλλησιν
  chosen: Greeks
  alternatives:
  - Gentiles
  - Greeks/non-Jews
  lexicon: BDAG
  rationale: The lexical sense is 'Greeks.' In this context it functions broadly for
    non-Jews in the Greco-Roman setting, but the Greek text specifically says 'Greeks,'
    so that should be retained in the main text rather than generalized to 'Gentiles.'
- source_word: ἐκκλησίᾳ τοῦ θεοῦ
  chosen: the church of God
  alternatives:
  - God's assembly
  - the assembly of God
  lexicon: BDAG
  rationale: ἐκκλησία in Paul commonly refers to the gathered community of believers.
    'Church' is the established and accurate rendering here, and the genitive is best
    kept as 'of God' rather than recast.
