theological_decisions:
- issue: Referent grouping in Paul's ethical exhortation
  chosen_reading: Paul distinguishes three social-religious groups—Jews, Greeks, and
    the church of God—and commands conduct that does not cause offense to any of them.
  alternative_readings:
  - Paul uses 'Greeks' as a shorthand for all Gentiles.
  - Paul's concern is primarily missionary strategy rather than a universal ethical
    principle.
  rationale: The verse itself names three groups explicitly. The translation preserves
    those categories without expanding or narrowing them beyond the text. The wording
    'without causing offense' reflects the ethical thrust while avoiding importing
    a broader doctrinal claim not stated here.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
