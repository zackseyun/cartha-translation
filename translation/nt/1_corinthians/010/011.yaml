id: 1CO.10.11
reference: 1 Corinthians 10:11
source:
  edition: SBLGNT
  text: ταῦτα ⸀δὲ ⸂τυπικῶς συνέβαινεν⸃ ἐκείνοις, ἐγράφη δὲ πρὸς νουθεσίαν ἡμῶν, εἰς
    οὓς τὰ τέλη τῶν αἰώνων ⸀κατήντηκεν.
translation:
  text: Now these things happened to them as examples, but they were written for our
    instruction, on whom the ends of the ages have come.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "as types" or "typologically"; Paul presents these events as patterns
      with instructive significance for later believers.
    reason: lexical_alternative
  - marker: b
    text: Or "for our admonition" or "for our warning"; the Greek includes both corrective
      instruction and warning.
    reason: lexical_alternative
  - marker: c
    text: Or "the end of the ages has come"; the Greek is plural, "the ends of the
      ages," which preserves Paul's salvation-historical wording.
    reason: alternative_reading
lexical_decisions:
- source_word: τυπικῶς
  chosen: as examples
  alternatives:
  - typically
  - as types
  - typologically
  lexicon: BDAG
  rationale: The adverb denotes that the events functioned as patterns/examples. 'As
    examples' is clear modern English and fits Paul's paraenetic use in context (cf.
    v. 6), while more technical 'typologically' is less readable and 'typically' is
    misleading in contemporary English.
- source_word: συνέβαινεν
  chosen: happened
  alternatives:
  - were happening
  - took place
  - befell
  lexicon: BDAG
  rationale: Imperfect active indicates ongoing/past occurrence. In idiomatic English,
    'happened' best conveys the sense with sufficient simplicity; the iterative nuance
    is adequately carried by the plural subject 'these things.' 'Befell' is too archaic.
- source_word: ἐκείνοις
  chosen: to them
  alternatives:
  - to those people
  - for them
  lexicon: BDAG
  rationale: Dative pronoun refers to the wilderness generation just discussed. 'To
    them' is the most natural and sufficiently precise rendering.
- source_word: ἐγράφη
  chosen: they were written
  alternatives:
  - it was written
  - these things were written down
  lexicon: BDAG
  rationale: Although singular in Greek, the passive naturally refers to the preceding
    events/accounts as inscripturated. English plural agreement ('they were written')
    avoids awkwardness and reflects the sense. 'Written down' is possible but slightly
    more interpretive.
- source_word: πρὸς νουθεσίαν
  chosen: for our instruction
  alternatives:
  - for our admonition
  - for our warning
  lexicon: BDAG
  rationale: νουθεσία includes corrective instruction/warning. 'Instruction' preserves
    the formative sense without losing the paraenetic force in context; 'admonition'
    is accurate but less natural for modern readers, and 'warning' is somewhat narrower.
- source_word: εἰς οὓς
  chosen: on whom
  alternatives:
  - for whom
  - to whom
  lexicon: BDAG
  rationale: The phrase marks the people upon whom the eschatological reality has
    arrived. 'On whom' best captures the directional/resultative force in idiomatic
    English.
- source_word: τὰ τέλη τῶν αἰώνων
  chosen: the ends of the ages
  alternatives:
  - the end of the ages
  - the fulfillment of the ages
  lexicon: BDAG
  rationale: The plural τέλη and αἰώνων are both significant and are best preserved
    formally as 'the ends of the ages.' This keeps Paul's salvation-historical phrasing
    without collapsing it into the smoother but less literal singular 'the end of
    the ages.'
- source_word: κατήντηκεν
  chosen: have come
  alternatives:
  - have arrived
  - have reached
  lexicon: BDAG
  rationale: Perfect tense indicates a completed arrival with present relevance. 'Have
    come' is natural English and preserves that force. 'Have reached' would require
    a more explicit object and sounds less idiomatic here.
