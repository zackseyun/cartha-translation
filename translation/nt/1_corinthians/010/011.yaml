theological_decisions:
- issue: Paul's salvation-historical expression τὰ τέλη τῶν αἰώνων
  chosen_reading: the ends of the ages have come
  alternative_readings:
  - the end of the ages has come
  - the fulfillment of the ages has come
  rationale: The translation preserves the plural wording and eschatological tension
    of the Greek rather than smoothing it into a singular concept. This avoids over-resolving
    Paul's already/not-yet framework while remaining readable.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
