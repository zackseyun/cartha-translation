id: 1CO.10.15
reference: 1 Corinthians 10:15
source:
  edition: SBLGNT
  text: ὡς φρονίμοις λέγω· κρίνατε ὑμεῖς ὅ φημι.
translation:
  text: I speak as to sensible people; judge for yourselves what I say.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'wise people' or 'prudent people.'
    reason: lexical_alternative
  - marker: b
    text: Or 'you yourselves judge what I say.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὡς
  chosen: as to
  alternatives:
  - as
  - like
  lexicon: BDAG
  rationale: Introduces the manner in which Paul addresses the audience. 'As to' in
    English naturally conveys 'addressing you as' without awkwardness.
- source_word: φρονίμοις
  chosen: sensible people
  alternatives:
  - wise people
  - prudent people
  lexicon: BDAG
  rationale: φρόνιμος denotes practical wisdom, prudence, or good sense. 'Sensible'
    captures practical discernment in contemporary English better than the somewhat
    elevated 'prudent' and avoids overstating with 'wise.' 'People' makes explicit
    the dative plural addressees in natural English.
- source_word: λέγω
  chosen: I speak
  alternatives:
  - I say
  lexicon: BDAG
  rationale: λέγω can be 'say' or 'speak.' Here 'I speak as to...' is idiomatic and
    pairs well with the following direct appeal.
- source_word: κρίνατε
  chosen: judge
  alternatives:
  - decide
  - discern
  lexicon: BDAG
  rationale: Aorist imperative calling for evaluative judgment. 'Judge' preserves
    the force and lexical connection to κρίνω without unnecessary paraphrase.
- source_word: ὑμεῖς
  chosen: for yourselves
  alternatives:
  - you
  - you yourselves
  lexicon: BDAG
  rationale: The explicit pronoun is emphatic. English commonly conveys this emphasis
    with 'for yourselves,' highlighting Paul's appeal to their own discernment rather
    than merely repeating 'you.'
- source_word: ὅ
  chosen: what
  alternatives:
  - that which
  lexicon: BDAG
  rationale: Neuter relative pronoun functioning as the object of φημι. 'What' is
    the natural English equivalent.
- source_word: φημι
  chosen: I say
  alternatives:
  - I mean
  - I am saying
  lexicon: BDAG
  rationale: φημί overlaps with λέγω but often has the sense 'say/assert.' 'What I
    say' is concise and idiomatic in English.
