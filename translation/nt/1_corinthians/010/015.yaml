theological_decisions:
- issue: Rhetorical characterization of the audience
  chosen_reading: Paul addresses the Corinthians as capable of sound discernment without
    implying moral approval of all their behavior.
  alternative_readings:
  - Paul flatters them as 'wise' in an ironic sense
  - Paul straightforwardly commends them as wise
  rationale: The verse functions rhetorically to invite evaluation of his argument.
    The translation keeps the address positive but moderate ('sensible people') and
    does not force either irony or full commendation into the text.
  doctrine_reference: Preserve theological tension rather than resolve it.
