theological_decisions:
- issue: Nature of the prohibition
  chosen_reading: A direct imperative to avoid participation in idol worship and its
    associated practices
  alternative_readings:
  - A narrower warning only against inward devotion to idols
  rationale: In the immediate context Paul warns against participation in pagan cultic
    meals and practices. The lexical sense of εἰδωλολατρία supports the broader category
    of idolatry, not merely internal attitude, so the translation keeps the general
    term without narrowing it beyond the Greek.
