id: 1CO.10.14
reference: 1 Corinthians 10:14
source:
  edition: SBLGNT
  text: Διόπερ, ἀγαπητοί μου, φεύγετε ἀπὸ τῆς εἰδωλολατρίας.
translation:
  text: Therefore, my beloved, flee from idolatry.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “idol worship.”
    reason: lexical_alternative
lexical_decisions:
- source_word: Διόπερ
  chosen: Therefore
  alternatives:
  - For this reason
  - So then
  lexicon: BDAG
  rationale: Inferential conjunction drawing a conclusion from the preceding argument;
    'Therefore' is natural modern English and preserves the logical force.
- source_word: ἀγαπητοί μου
  chosen: my beloved
  alternatives:
  - my dear ones
  - my loved ones
  lexicon: BDAG
  rationale: Vocative of affectionate address. 'My beloved' preserves both the warmth
    and the familiar Pauline register better than flatter alternatives.
- source_word: φεύγετε
  chosen: flee
  alternatives:
  - run away
  - keep away
  lexicon: BDAG
  rationale: Present active imperative, second plural. 'Flee' best captures the urgent
    command to avoid danger, stronger and more precise than 'keep away.'
- source_word: ἀπὸ
  chosen: from
  alternatives:
  - away from
  lexicon: BDAG
  rationale: Standard preposition after φεύγω indicating separation from the object
    avoided; 'from' is sufficient in idiomatic English because 'flee' already carries
    motion away.
- source_word: τῆς εἰδωλολατρίας
  chosen: idolatry
  alternatives:
  - idol worship
  lexicon: BDAG
  rationale: εἰδωλολατρία denotes the worship/service of idols. 'Idolatry' is the
    standard concise English equivalent and is readily understood; 'idol worship'
    is a viable explanatory alternative but less idiomatic here.
