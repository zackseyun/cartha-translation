theological_decisions:
- issue: Rendering σάρξ-related language in σαρκικοί
  chosen_reading: fleshly
  alternative_readings:
  - sinful
  - worldly
  - controlled by the sinful nature
  rationale: The doctrine excerpt directs context-sensitive handling of σάρξ and cautions
    against importing doctrinal conclusions not explicit in the text. Here Paul rebukes
    believers for behavior marked by the flesh, but the adjective itself should remain
    tied to 'flesh' rather than be expanded into a full theological explanation in
    the main text.
  doctrine_reference: 'Contested terms table: σάρξ → flesh (literal) / sinful nature
    (metaphorical), context-dependent; per-verse documented.'
- issue: Rendering κατὰ ἄνθρωπον
  chosen_reading: according to man
  alternative_readings:
  - in a merely human way
  - according to human standards
  rationale: The phrase is ethically charged in context, contrasting merely human
    conduct with Spirit-shaped maturity. The main text keeps the formally transparent
    rendering, while a footnote preserves the more idiomatic interpretive alternative.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather
    than resolve it; readable modern English with documented exceptions.'
