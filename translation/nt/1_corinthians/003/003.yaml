id: 1CO.3.3
reference: 1 Corinthians 3:3
source:
  edition: SBLGNT
  text: ἔτι γὰρ σαρκικοί ἐστε. ὅπου γὰρ ἐν ὑμῖν ζῆλος καὶ ⸀ἔρις, οὐχὶ σαρκικοί ἐστε
    καὶ κατὰ ἄνθρωπον περιπατεῖτε;
translation:
  text: For you are still fleshly. For where there is jealousy and strife among you,
    are you not fleshly and walking according to man?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “in a merely human way.”
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔτι
  chosen: still
  alternatives:
  - yet
  lexicon: BDAG
  rationale: Marks continuing condition; 'still' is natural modern English and preserves
    Paul's rebuke of their ongoing state.
- source_word: γὰρ
  chosen: for
  alternatives:
  - because
  lexicon: BDAG
  rationale: Retains the explanatory force of the particle in both clauses without
    over-smoothing Paul's argumentative style.
- source_word: σαρκικοί
  chosen: fleshly
  alternatives:
  - worldly
  - people of the flesh
  - unspiritual
  lexicon: BDAG
  rationale: This adjective is related to σάρξ. Per doctrine, flesh-language should
    be preserved where possible rather than replaced with an interpretive gloss like
    'sinful nature.' 'Fleshly' keeps Paul's metaphor and moral contrast without importing
    a narrower doctrinal formulation.
- source_word: ὅπου
  chosen: where
  alternatives:
  - when
  - wherever
  lexicon: BDAG
  rationale: 'The basic locative sense fits the Greek naturally: the presence of jealousy
    and strife among them demonstrates the condition Paul names. ''When'' is possible
    in English, but ''where'' better preserves the source wording.'
- source_word: ζῆλος
  chosen: jealousy
  alternatives:
  - envy
  - zeal
  lexicon: BDAG
  rationale: In this negative context alongside ἔρις, the sense is not positive 'zeal'
    but sinful jealousy/envy. 'Jealousy' is idiomatic and fits the relational context.
- source_word: ἔρις
  chosen: strife
  alternatives:
  - quarreling
  - contention
  lexicon: BDAG
  rationale: '''Strife'' is concise and preserves the broad sense of discord. ''Quarreling''
    is slightly narrower and more interpretive.'
- source_word: οὐχὶ
  chosen: are you not
  alternatives:
  - surely you are not
  lexicon: BDAG
  rationale: Preserves the rhetorical question expecting an affirmative answer without
    adding emphasis beyond the Greek.
- source_word: κατὰ ἄνθρωπον
  chosen: according to man
  alternatives:
  - in a merely human way
  - according to human standards
  lexicon: BDAG
  rationale: This phrase contrasts life shaped by merely human fallen patterns with
    life shaped by the Spirit. 'According to man' is the most transparent rendering
    of the singular Greek, even if slightly formal in English; alternatives are clearer
    but more interpretive.
- source_word: περιπατεῖτε
  chosen: walking
  alternatives:
  - living
  - conducting yourselves
  lexicon: BDAG
  rationale: Paul's common metaphor of 'walking' should be retained where understandable.
    It preserves the verbal imagery and ethical nuance better than a flattened gloss
    like 'living'.
