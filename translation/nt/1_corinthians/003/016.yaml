theological_decisions:
- issue: Whether the verse speaks primarily to individual believers or to the church
    corporately
  chosen_reading: The main text keeps 'you' without narrowing it, while recognizing
    the plural address as primarily corporate in context.
  alternative_readings:
  - An explicitly individualizing rendering such as 'each of you is God's temple'
  - An explicitly corporate rendering such as 'you together are God's temple'
  rationale: The Greek second person plural indicates a collective audience, but the
    text itself does not add an explicit adverb like 'together.' A simple 'you are
    God's temple' preserves the source wording and allows the contextual corporate
    force to stand without over-interpretation.
  doctrine_reference: Preserve theological tension rather than resolve it.
