id: 1CO.3.16
reference: 1 Corinthians 3:16
source:
  edition: SBLGNT
  text: Οὐκ οἴδατε ὅτι ναὸς θεοῦ ἐστε καὶ τὸ πνεῦμα τοῦ θεοῦ ⸂οἰκεῖ ἐν ὑμῖν⸃;
translation:
  text: Do you not know that you are God’s temple and that God’s Spirit dwells in
    you?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'God’s sanctuary.'
    reason: lexical_alternative
  - marker: b
    text: The 'you' is plural; Paul addresses the community collectively.
    reason: cultural_note
  - marker: c
    text: Or 'among you.'
    reason: alternative_reading
lexical_decisions:
- source_word: ναὸς
  chosen: temple
  alternatives:
  - sanctuary
  lexicon: BDAG
  rationale: ναός refers specifically to a temple/sanctuary rather than a more general
    sacred precinct. 'Temple' is the clearest natural English rendering and preserves
    the corporate sacred-space imagery.
- source_word: θεοῦ
  chosen: God’s
  alternatives:
  - of God
  lexicon: BDAG
  rationale: 'The genitive is rendered with the English possessive for natural style:
    ''God’s temple'' and ''God’s Spirit.'' This preserves the same meaning in more
    readable English.'
- source_word: ἐστε
  chosen: you are
  lexicon: BDAG
  rationale: Second person plural verb, requiring 'you are.' The plural is important
    in context because Paul addresses the Corinthian community corporately.
- source_word: τὸ πνεῦμα τοῦ θεοῦ
  chosen: God’s Spirit
  alternatives:
  - the Spirit of God
  lexicon: BDAG
  rationale: Both are accurate. 'God’s Spirit' is slightly more natural in contemporary
    English while retaining the genitival relationship.
- source_word: οἰκεῖ
  chosen: dwells
  alternatives:
  - lives
  - resides
  lexicon: BDAG
  rationale: '''Dwells'' best conveys the ongoing indwelling sense of οἰκέω and fits
    the temple imagery better than the more ordinary ''lives.'''
- source_word: ἐν ὑμῖν
  chosen: in you
  alternatives:
  - among you
  lexicon: BDAG
  rationale: The phrase can be understood as 'in you' with a corporate plural referent.
    Since the addressees are plural, English 'you' preserves the wording while allowing
    the communal sense to remain visible from context.
- source_word: Οὐκ οἴδατε
  chosen: Do you not know
  alternatives:
  - Do you not realize
  - Don’t you know
  lexicon: BDAG
  rationale: This preserves the rhetorical force of Paul's question with a slightly
    formal but still natural English structure.
