theological_decisions:
- issue: Rendering Χριστός in Ἰησοῦς Χριστός
  chosen_reading: Jesus the Messiah
  alternative_readings:
  - Jesus Christ
  - Jesus Messiah
  rationale: The verse identifies the only true foundation as Jesus in his messianic
    office. Because Χριστός here still bears clear titular significance rather than
    functioning as a mere surname, the project's default preference is to translate
    it. The more traditional 'Jesus Christ' is preserved in a footnote as a familiar
    alternative.
