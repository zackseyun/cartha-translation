id: 1CO.3.11
reference: 1 Corinthians 3:11
source:
  edition: SBLGNT
  text: θεμέλιον γὰρ ἄλλον οὐδεὶς δύναται θεῖναι παρὰ τὸν κείμενον, ὅς ἐστιν Ἰησοῦς
    Χριστός·
translation:
  text: For no one can lay another foundation besides the one already laid, which
    is Jesus the Messiah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or: "Jesus Christ."'
    reason: alternative_reading
lexical_decisions:
- source_word: θεμέλιον
  chosen: foundation
  alternatives:
  - foundation stone
  - base
  lexicon: BDAG
  rationale: The noun refers to a building's foundation in a straightforward construction
    metaphor. 'Foundation' is the natural English equivalent and fits Paul's extended
    building imagery in the immediate context.
- source_word: γὰρ
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: BDAG
  rationale: γάρ introduces the ground or explanation for the preceding statement.
    'For' preserves the explanatory connection with minimal expansion.
- source_word: ἄλλον
  chosen: another
  alternatives:
  - a different
  lexicon: BDAG
  rationale: ἄλλον marks an additional or different foundation. 'Another' is the standard
    and sufficiently clear rendering here.
- source_word: οὐδεὶς
  chosen: no one
  alternatives:
  - nobody
  lexicon: BDAG
  rationale: The pronoun is singular and universal. 'No one' is formal enough for
    the context while remaining natural modern English.
- source_word: δύναται
  chosen: can
  alternatives:
  - is able to
  lexicon: BDAG
  rationale: The verb expresses ability or possibility. 'Can' is concise modern English
    and fully conveys the sense without loss.
- source_word: θεῖναι
  chosen: lay
  alternatives:
  - place
  - set
  lexicon: BDAG
  rationale: In construction imagery τίθημι commonly means 'lay' a foundation. This
    is the most idiomatic English collocation.
- source_word: παρὰ
  chosen: besides
  alternatives:
  - apart from
  - except for
  lexicon: BDAG
  rationale: With the accusative here, παρά carries the sense of 'besides' or 'apart
    from.' 'Besides' fits the exclusionary force in smooth English.
- source_word: τὸν κείμενον
  chosen: the one already laid
  alternatives:
  - the one laid
  - the one that has been laid
  lexicon: BDAG
  rationale: The participle from κεῖμαι denotes the foundation as already in place.
    'Already laid' brings out the stative/resultative force in idiomatic English.
- source_word: ὅς
  chosen: which
  alternatives:
  - that
  lexicon: BDAG
  rationale: The relative pronoun refers back to 'foundation,' not directly to a person
    grammatically in English. 'Which' best matches the antecedent while preserving
    the identification that follows.
- source_word: Ἰησοῦς Χριστός
  chosen: Jesus the Messiah
  alternatives:
  - Jesus Christ
  - Jesus Messiah
  lexicon: BDAG
  rationale: The referent is Jesus, and Χριστός retains titular force in this doctrinally
    weighty identification of the foundation. Per project guidance, the title is translated
    where context supports it; 'Jesus the Messiah' preserves that meaning while remaining
    readable.
