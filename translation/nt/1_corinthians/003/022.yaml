id: 1CO.3.22
reference: 1 Corinthians 3:22
source:
  edition: SBLGNT
  text: εἴτε Παῦλος εἴτε Ἀπολλῶς εἴτε Κηφᾶς εἴτε κόσμος εἴτε ζωὴ εἴτε θάνατος εἴτε
    ἐνεστῶτα εἴτε μέλλοντα, πάντα ⸀ὑμῶν,
translation:
  text: whether Paul or Apollos or Cephas or the world or life or death or things
    present or things to come—all are yours,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: εἴτε … εἴτε
  chosen: whether ... or
  alternatives:
  - either ... or
  lexicon: BDAG
  rationale: The repeated pairing marks a series of alternatives. 'Whether ... or'
    preserves the rhetorical structure naturally in English across the full list.
- source_word: Παῦλος
  chosen: Paul
  rationale: Standard English transliteration of the personal name, following the
    policy to transliterate names rather than translate them.
- source_word: Ἀπολλῶς
  chosen: Apollos
  rationale: Standard English transliteration of the personal name.
- source_word: Κηφᾶς
  chosen: Cephas
  alternatives:
  - Peter
  lexicon: BDAG
  rationale: The Greek text uses the Semitic-form name Κηφᾶς, so 'Cephas' best preserves
    the source wording rather than replacing it with the equivalent name 'Peter'.
- source_word: κόσμος
  chosen: the world
  alternatives:
  - the universe
  - the created order
  lexicon: BDAG
  rationale: '''World'' is the most natural and sufficiently broad rendering here,
    referring to the world-order or created realm available to believers in Paul''s
    argument.'
- source_word: ζωή
  chosen: life
  lexicon: BDAG
  rationale: A direct and natural rendering of the noun in this list of realities
    belonging to the Corinthians in Christ.
- source_word: θάνατος
  chosen: death
  lexicon: BDAG
  rationale: Straightforward lexical equivalent; Paul includes even death within the
    scope of what is subordinated to believers' good.
- source_word: ἐνεστῶτα
  chosen: things present
  alternatives:
  - present things
  - what is now
  lexicon: BDAG
  rationale: The perfective-present participial form functions substantivally here,
    referring to present realities. 'Things present' is concise and idiomatic.
- source_word: μέλλοντα
  chosen: things to come
  alternatives:
  - future things
  - what is to come
  lexicon: BDAG
  rationale: The participle functions substantivally for future realities. 'Things
    to come' is clear, readable, and pairs well with 'things present.'
- source_word: πάντα
  chosen: all
  alternatives:
  - all things
  lexicon: BDAG
  rationale: Although πάντα can be rendered 'all things,' English style is smoother
    with 'all are yours' after a list that includes both persons and things; the totalizing
    force is preserved.
- source_word: ὑμῶν
  chosen: are yours
  alternatives:
  - belong to you
  lexicon: BDAG
  rationale: The genitive after πάντα conveys possession. 'Are yours' is the most
    direct and idiomatic rendering in this context, matching Paul's climactic conclusion.
