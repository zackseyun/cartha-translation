id: 1CO.3.23
reference: 1 Corinthians 3:23
source:
  edition: SBLGNT
  text: ὑμεῖς δὲ Χριστοῦ, Χριστὸς δὲ θεοῦ.
translation:
  text: and you belong to the Messiah, and the Messiah belongs to God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'you are the Messiah's, and the Messiah is God's.'
    reason: lexical_alternative
  - marker: b
    text: Traditional English often has 'Christ' instead of 'Messiah.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὑμεῖς
  chosen: you
  alternatives:
  - you yourselves
  lexicon: BDAG
  rationale: Second-person plural pronoun; simple 'you' carries the plural addressees
    naturally in English without adding emphasis beyond the Greek context.
- source_word: δὲ
  chosen: and
  alternatives:
  - but
  - now
  lexicon: BDAG
  rationale: Here δέ marks continuation and contrastive development within Paul's
    chain of belonging, but a smooth coordinating 'and' best fits natural English
    while preserving the flow.
- source_word: Χριστοῦ
  chosen: the Messiah
  alternatives:
  - Christ
  lexicon: BDAG
  rationale: 'Genitive of possession/belonging: ''of the Messiah.'' Following the
    project''s default for Χριστός as a title, ''Messiah'' preserves the titular sense
    better than the traditional ''Christ'' in this context.'
- source_word: Χριστὸς
  chosen: the Messiah
  alternatives:
  - Christ
  lexicon: BDAG
  rationale: Nominative title repeated for rhetorical symmetry. 'Messiah' is retained
    consistently in both clauses because the term functions as a title here, not merely
    as a fixed name-like label.
- source_word: θεοῦ
  chosen: God
  alternatives:
  - God's
  lexicon: BDAG
  rationale: Genitive singular of θεός, expressing belonging/relationship. In the
    clause-level rendering, English conveys this most clearly with 'belongs to God'
    rather than the more elliptical 'is God's.'
