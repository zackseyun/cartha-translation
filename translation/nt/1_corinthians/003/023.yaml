theological_decisions:
- issue: How to render the two genitive constructions ('Χριστοῦ' and 'θεοῦ') in a
    way that is clear without softening Paul's relational hierarchy.
  chosen_reading: 'Render both clauses with explicit belonging language: ''you belong
    to the Messiah, and the Messiah belongs to God.'''
  alternative_readings:
  - you are Christ's, and Christ is God's
  - you are the Messiah's, and the Messiah is God's
  rationale: The Greek is terse and relational, not explanatory. Expanding the implied
    copula plus genitive to 'belong to' makes the sense transparent in modern English
    while preserving the parallelism and theological tension of the text rather than
    resolving it.
  doctrine_reference: Preserve theological tension rather than resolve it.
