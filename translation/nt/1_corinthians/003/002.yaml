id: 1CO.3.2
reference: 1 Corinthians 3:2
source:
  edition: SBLGNT
  text: γάλα ὑμᾶς ἐπότισα, ⸀οὐ βρῶμα, οὔπω γὰρ ἐδύνασθε. ἀλλ’ ⸀οὐδὲ ἔτι νῦν δύνασθε,
translation:
  text: I fed you milk, not solid food, for you were not yet able. But even now you
    are still not able,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "I gave you milk to drink, not food."
    reason: lexical_alternative
  - marker: b
    text: '"Solid food" renders a general word for food, chosen here because of the
      contrast with milk.'
    reason: lexical_alternative
lexical_decisions:
- source_word: γάλα
  chosen: milk
  alternatives:
  - milk only
  lexicon: BDAG
  rationale: Literal accusative object in a feeding metaphor; standard English equivalent
    preserves Paul's contrast with more substantial nourishment.
- source_word: ἐπότισα
  chosen: I fed
  alternatives:
  - I gave ... to drink
  - I gave you milk to drink
  lexicon: BDAG
  rationale: Although the verb literally means 'gave to drink,' English idiom in this
    metaphor is more natural as 'I fed you milk,' especially in contrast with 'solid
    food.' This preserves the sense without awkwardness.
- source_word: βρῶμα
  chosen: solid food
  alternatives:
  - food
  - meat
  lexicon: BDAG
  rationale: βρῶμα means food generally, but in contrast with 'milk' the intended
    sense is more substantial nourishment. 'Solid food' communicates the contrast
    clearly in modern English; 'meat' would be too narrow and tradition-bound.
- source_word: οὔπω
  chosen: not yet
  alternatives:
  - not as yet
  lexicon: BDAG
  rationale: Direct temporal negation best rendered with standard modern English.
- source_word: ἐδύνασθε
  chosen: you were able
  alternatives:
  - you could bear it
  - you had strength
  lexicon: BDAG
  rationale: δύναμαι denotes ability/capacity. 'Were able' is the most direct rendering
    in context.
- source_word: οὐδὲ ἔτι νῦν
  chosen: even now ... still not
  alternatives:
  - not even now yet
  - nor now still
  lexicon: BDAG
  rationale: This combination intensifies the continuing lack of capacity. Rendering
    with 'even now' and 'still not' brings out both the present-time reference and
    the ongoing state in natural English.
- source_word: δύνασθε
  chosen: you are able
  alternatives:
  - you can
  lexicon: BDAG
  rationale: Present tense indicates current capacity. 'Are able' matches the earlier
    imperfect more closely than the shorter 'can,' preserving the verbal parallel.
