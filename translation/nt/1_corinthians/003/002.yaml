theological_decisions:
- issue: Interpretation of Paul's nourishment metaphor
  chosen_reading: Maintain the metaphor of immature believers receiving milk rather
    than more advanced instruction, without expanding its theological application
    in translation.
  alternative_readings:
  - Render more interpretively as 'I taught you only basic things'
  rationale: The Greek uses a metaphor rather than an abstract paraphrase. Preserving
    that metaphor follows optimal equivalence and avoids importing explanatory interpretation
    into the text.
  doctrine_reference: Preserve theological tension rather than resolve it; never paraphrase
    beyond what the source text warrants.
