theological_decisions:
- issue: Whether θεοῦ συνεργοί means "God’s fellow workers" or "fellow workers with
    God"
  chosen_reading: God’s fellow workers
  alternative_readings:
  - fellow workers with God
  rationale: The Greek genitive permits debate, but in the immediate context Paul
    emphasizes that ministers belong to God and serve under him, while the Corinthians
    are God’s possession. Rendering it as "God’s fellow workers" preserves that emphasis
    without foreclosing the debated alternative.
  doctrine_reference: Preserve theological tension rather than resolve it
