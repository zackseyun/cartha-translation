id: 1CO.3.9
reference: 1 Corinthians 3:9
source:
  edition: SBLGNT
  text: θεοῦ γάρ ἐσμεν συνεργοί· θεοῦ γεώργιον, θεοῦ οἰκοδομή ἐστε.
translation:
  text: For we are God’s fellow workers; you are God’s field, God’s building.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "fellow workers with God."
    reason: alternative_reading
lexical_decisions:
- source_word: γάρ
  chosen: For
  alternatives:
  - because
  lexicon: BDAG
  rationale: Retains the explanatory force linking this statement to the prior argument.
- source_word: συνεργοί
  chosen: fellow workers
  alternatives:
  - coworkers
  - workers together
  lexicon: BDAG
  rationale: Natural modern English that preserves the plural noun’s sense of shared
    labor without over-paraphrase.
- source_word: θεοῦ (with συνεργοί)
  chosen: God’s
  alternatives:
  - with God
  - fellow workers with God
  lexicon: BDAG
  rationale: The genitive most naturally reads here as belonging to God or being in
    his service in context, avoiding the stronger interpretive claim that Paul and
    Apollos are presented as co-laborers alongside God in the same sense. The alternative
    is important enough to preserve in a footnote because the phrase is genuinely
    debated.
- source_word: γεώργιον
  chosen: field
  alternatives:
  - farm land
  - cultivated field
  lexicon: BDAG
  rationale: '"Field" is clear and idiomatic, while still conveying the agricultural
    metaphor. "Cultivated field" is more explicit but less concise in English.'
- source_word: οἰκοδομή
  chosen: building
  alternatives:
  - structure
  - edifice
  lexicon: BDAG
  rationale: '"Building" is the plain and natural rendering and prepares for the construction
    metaphor developed in the following verses.'
- source_word: ἐστε
  chosen: you are
  lexicon: BDAG
  rationale: The second-person plural is explicit in Greek and should be directly
    represented in English.
