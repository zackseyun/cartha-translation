theological_decisions:
- issue: Whether ἡ ἡμέρα should be rendered generically or as the eschatological Day
    of judgment/evaluation.
  chosen_reading: Rendered as 'the Day' with capitalization.
  alternative_readings:
  - the day
  rationale: In context Paul refers to the future day when each worker’s ministry
    is evaluated before God. Capitalization helps communicate that recognized eschatological
    sense without adding content beyond the text.
