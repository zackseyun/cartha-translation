id: 1CO.3.13
reference: 1 Corinthians 3:13
source:
  edition: SBLGNT
  text: ἑκάστου τὸ ἔργον φανερὸν γενήσεται, ἡ γὰρ ἡμέρα δηλώσει· ὅτι ἐν πυρὶ ἀποκαλύπτεται,
    καὶ ἑκάστου τὸ ἔργον ὁποῖόν ἐστιν τὸ πῦρ ⸀αὐτὸ δοκιμάσει.
translation:
  text: each one’s work will become evident, for the Day will disclose it, because
    it is revealed in fire, and the fire itself will test what sort of work each one
    has.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'because it is revealed by fire.' The Greek phrase ἐν πυρί may be understood
      as 'in fire' or instrumentally as 'by fire.'
    reason: lexical_alternative
  - marker: b
    text: '''The Day'' likely refers to the future day of divine evaluation or judgment.'
    reason: cross_reference
lexical_decisions:
- source_word: ἑκάστου
  chosen: each one’s
  alternatives:
  - each person's
  - everyone's
  lexicon: BDAG
  rationale: Genitive singular distributive construction; 'each one’s' preserves the
    individualizing force without adding gender.
- source_word: ἔργον
  chosen: work
  alternatives:
  - deed
  - labor
  lexicon: BDAG
  rationale: In this context Paul refers to each builder’s ministerial output or workmanship
    broadly; 'work' is the most natural and sufficiently broad English equivalent.
- source_word: φανερὸν γενήσεται
  chosen: will become evident
  alternatives:
  - will become manifest
  - will be made plain
  lexicon: BDAG
  rationale: This combines the adjective and future middle verb into natural English
    while preserving the future result of disclosure.
- source_word: ἡ ἡμέρα
  chosen: the Day
  alternatives:
  - the day
  lexicon: BDAG
  rationale: The article plus context point to the eschatological day of divine evaluation;
    capitalization signals that specific referent in readable English.
- source_word: δηλώσει
  chosen: will disclose
  alternatives:
  - will make clear
  - will reveal
  lexicon: BDAG
  rationale: '''Disclose'' fits the judicial/exposing context and distinguishes this
    verb from the following ἀποκαλύπτεται.'
- source_word: ἐν πυρὶ
  chosen: in fire
  alternatives:
  - by fire
  - with fire
  lexicon: BDAG
  rationale: A formally transparent rendering preserves the Greek preposition and
    leaves open the precise nuance, whether locative or instrumental.
- source_word: ἀποκαλύπτεται
  chosen: is revealed
  alternatives:
  - is disclosed
  - comes to light
  lexicon: BDAG
  rationale: A straightforward passive rendering preserves the connection with divine
    unveiling rather than paraphrasing the clause.
- source_word: ὁποῖόν ἐστιν
  chosen: what sort of work
  alternatives:
  - what kind of work
  - of what quality
  lexicon: BDAG
  rationale: This phrase focuses on the nature or quality of the work; 'what sort
    of work' is idiomatic and suitably close to the Greek.
- source_word: δοκιμάσει
  chosen: will test
  alternatives:
  - will examine
  - will prove
  lexicon: BDAG
  rationale: The verb denotes testing to determine genuineness or quality; 'test'
    is clear, modern, and contextually exact.
- source_word: αὐτὸ
  chosen: itself
  alternatives:
  - it
  lexicon: BDAG
  rationale: The intensive pronoun highlights that the fire itself performs the testing,
    so the emphasis should be retained in English.
