theological_decisions:
- issue: Representative masculine language in ἕκαστος
  chosen_reading: Render as 'each one' in the main text while retaining 'he' later
    in the sentence.
  alternative_readings:
  - Render fully masculine as 'each man ... how he builds'
  - Render fully non-gendered as 'each person ... how they build'
  rationale: The Greek singular masculine is generic rather than exclusively male.
    'Each one' captures the representative scope, while retaining singular 'he' keeps
    the sentence aligned with the Greek's singular construction and the project's
    gender-accurate policy.
  doctrine_reference: 'Translation philosophy #4 (Gender-accurate over gender-neutral)'
revisions:
- timestamp: '2026-04-21T00:31:47Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/nt/1_corinthians/003/010.json
  category: awkward_english
  tier: 1
  from: how he builds on it
  to: how he builds
  rationale: 'The Greek repeats the verb ἐποικοδομεῖ, which the draft correctly mirrors
    by repeating ''builds''. However, repeating the full phrase ''builds on it'' is
    slightly wooden in English. Since the object (''on it'', i.e., the foundation)
    is clear from the immediate context, omitting it in the second instance creates
    a more natural and punchy warning: ''...another builds on it. But let each one
    be careful how he builds.'' This small change improves the English flow without
    losing any of the original''s meaning or rhetorical force.'
