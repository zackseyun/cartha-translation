id: 1CO.3.10
reference: 1 Corinthians 3:10
source:
  edition: SBLGNT
  text: Κατὰ τὴν χάριν τοῦ θεοῦ τὴν δοθεῖσάν μοι ὡς σοφὸς ἀρχιτέκτων θεμέλιον ⸀ἔθηκα,
    ἄλλος δὲ ἐποικοδομεῖ. ἕκαστος δὲ βλεπέτω πῶς ἐποικοδομεῖ·
translation:
  text: According to the grace of God given to me, like a wise master builder I laid
    a foundation, and another builds on it. But let each one be careful how he builds.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'architect'; the Greek denotes a chief or master builder overseeing construction.
    reason: lexical_alternative
  - marker: b
    text: 'Greek uses a masculine singular form with representative force: ''each
      one ... how he builds.'''
    reason: cultural_note
  - marker: c
    text: Or 'how he builds on it'.
    reason: previous_rendering
lexical_decisions:
- source_word: Κατὰ
  chosen: According to
  alternatives:
  - By
  - In keeping with
  lexicon: BDAG
  rationale: The preposition signals conformity or correspondence with the grace given
    to Paul, not mere instrumentality. 'According to' best preserves that sense in
    natural English.
- source_word: χάριν
  chosen: grace
  alternatives:
  - favor
  lexicon: BDAG
  rationale: χάρις in Pauline usage commonly carries the sense of gracious divine
    enablement or favor. 'Grace' preserves the theological weight without over-expansion.
- source_word: τὴν δοθεῖσάν μοι
  chosen: given to me
  alternatives:
  - that was given to me
  - granted to me
  lexicon: BDAG
  rationale: The participial phrase identifies the grace as something bestowed on
    Paul. 'Given to me' is clear, direct, and idiomatic.
- source_word: ὡς
  chosen: like
  alternatives:
  - as
  lexicon: BDAG
  rationale: '''Like'' clearly marks comparison in English here: Paul speaks in the
    capacity or likeness of a wise builder. It avoids any slight awkwardness from
    repeating ''as'' after the earlier prepositional phrase.'
- source_word: σοφὸς
  chosen: wise
  alternatives:
  - skilled
  - expert
  lexicon: BDAG
  rationale: The adjective can imply both wisdom and skill, but 'wise' preserves the
    Greek term directly and fits Paul's evaluative tone.
- source_word: ἀρχιτέκτων
  chosen: master builder
  alternatives:
  - architect
  - chief builder
  lexicon: BDAG
  rationale: Although the Greek term is the source of English 'architect,' the ancient
    sense includes oversight of construction, not merely design. 'Master builder'
    better communicates the role to modern readers.
- source_word: θεμέλιον
  chosen: a foundation
  alternatives:
  - the foundation
  lexicon: BDAG
  rationale: The anarthrous noun is naturally rendered indefinitely here. The next
    verse specifies the foundation more fully, so 'a foundation' fits the immediate
    clause while preserving the flow.
- source_word: ἔθηκα
  chosen: I laid
  alternatives:
  - I set
  - I placed
  lexicon: BDAG
  rationale: With θεμέλιον, 'laid' is the standard and most natural English collocation.
- source_word: ἄλλος
  chosen: another
  alternatives:
  - someone else
  lexicon: BDAG
  rationale: The term introduces a different worker after Paul. 'Another' is concise
    and formally close.
- source_word: ἐποικοδομεῖ
  chosen: builds on it
  alternatives:
  - builds upon it
  - is building on it
  lexicon: BDAG
  rationale: The compound verb means to build upon an already-laid foundation. 'On
    it' is supplied in English because the object is implicit in Greek but necessary
    for clarity.
- source_word: ἕκαστος
  chosen: each one
  alternatives:
  - each man
  - each person
  lexicon: BDAG
  rationale: The masculine singular has representative force here. 'Each one' preserves
    the distributive sense in idiomatic English without implying only males are in
    view.
- source_word: βλεπέτω
  chosen: let each one be careful
  alternatives:
  - let each one watch
  - let each one take care
  lexicon: BDAG
  rationale: The imperative calls for vigilance and caution. 'Be careful' communicates
    the force naturally in modern English.
- source_word: πῶς
  chosen: how
  alternatives:
  - in what way
  lexicon: BDAG
  rationale: A straightforward rendering that preserves Paul's emphasis on the manner
    of building rather than merely the fact of it.
