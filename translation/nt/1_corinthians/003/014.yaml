id: 1CO.3.14
reference: 1 Corinthians 3:14
source:
  edition: SBLGNT
  text: εἴ τινος τὸ ἔργον μενεῖ ὃ ἐποικοδόμησεν, μισθὸν λήμψεται·
translation:
  text: If anyone’s work that he built on remains, he will receive a reward.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'endures' for 'remains.'
    reason: lexical_alternative
  - marker: b
    text: Or 'wages' or 'payment' for 'reward.'
    reason: lexical_alternative
lexical_decisions:
- source_word: εἴ
  chosen: If
  alternatives:
  - If indeed
  lexicon: BDAG
  rationale: Introduces a simple conditional clause; plain English 'If' is sufficient.
- source_word: τινος
  chosen: anyone’s
  alternatives:
  - someone’s
  - a person’s
  lexicon: BDAG
  rationale: 'The genitive indefinite pronoun marks possession: ''anyone’s'' naturally
    conveys ''of anyone'' in English.'
- source_word: ἔργον
  chosen: work
  alternatives:
  - deed
  - labor
  lexicon: BDAG
  rationale: '''Work'' best fits the building metaphor in context and remains broad
    enough not to over-specify moral action or ministry output.'
- source_word: μενεῖ
  chosen: remains
  alternatives:
  - endures
  - survives
  lexicon: BDAG
  rationale: The future verb means 'remain' or 'continue.' 'Remains' is the most transparent
    rendering; 'survives' is possible but slightly more interpretive in light of the
    testing-by-fire context.
- source_word: ὃ ἐποικοδόμησεν
  chosen: that he built on
  alternatives:
  - which he built upon
  - what he built on
  lexicon: BDAG
  rationale: The relative clause modifies 'work.' The compound verb ἐποικοδομέω includes
    the sense of building on a foundation, so 'built on' preserves that nuance without
    adding an explicit object not present in the Greek.
- source_word: μισθὸν
  chosen: a reward
  alternatives:
  - wages
  - payment
  lexicon: BDAG
  rationale: In this context of divine evaluation, 'reward' fits idiomatic English
    and avoids the narrower economic sense of 'wages,' while still preserving recompense
    language.
- source_word: λήμψεται
  chosen: he will receive
  alternatives:
  - he will get
  lexicon: BDAG
  rationale: Standard future middle of λαμβάνω; 'he will receive' is natural, dignified,
    and precise.
- source_word: he
  chosen: he
  alternatives:
  - that person
  - he or she
  rationale: The Greek uses masculine singular forms. Per the project’s gender-accurate
    philosophy, the representative masculine is preserved in the main text rather
    than neutralized.
