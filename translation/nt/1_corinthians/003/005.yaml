id: 1CO.3.5
reference: 1 Corinthians 3:5
source:
  edition: SBLGNT
  text: ⸀Τί οὖν ἐστιν ⸂Ἀπολλῶς; τί δέ ἐστιν Παῦλος⸃; ⸀διάκονοι δι’ ὧν ἐπιστεύσατε,
    καὶ ἑκάστῳ ὡς ὁ κύριος ἔδωκεν.
translation:
  text: What then is Apollos? And what is Paul? Servants through whom you believed,
    and each one as the Lord gave.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Who then is Apollos? And who is Paul?' The Greek uses 'what,' focusing
      on their role rather than their identity.
    reason: lexical_alternative
  - marker: b
    text: Or 'ministers.' The Greek word denotes servants or agents of service, not
      necessarily the church office of deacon.
    reason: lexical_alternative
  - marker: c
    text: The clause 'and each one as the Lord gave' is elliptical in Greek; some
      render 'as the Lord assigned to each.'
    reason: alternative_reading
lexical_decisions:
- source_word: Τί
  chosen: What
  alternatives:
  - Who
  lexicon: BDAG
  rationale: The neuter interrogative points to role or status rather than personal
    identity, so 'What' better reflects Paul's rhetorical question.
- source_word: οὖν
  chosen: then
  alternatives:
  - therefore
  - so
  lexicon: BDAG
  rationale: '''Then'' preserves the inferential and transitional force in natural
    English without overstating logical consequence.'
- source_word: δέ
  chosen: And
  alternatives:
  - but
  - now
  lexicon: BDAG
  rationale: Here δέ marks a mild contrast or continuation between Apollos and Paul;
    'And' is the most natural English connector in this rhetorical pairing.
- source_word: διάκονοι
  chosen: servants
  alternatives:
  - ministers
  - deacons
  lexicon: BDAG
  rationale: The word denotes agents of service here, not the formal office of deacon.
    'Servants' is clear, natural, and fits the context of Paul minimizing leader status.
- source_word: δι’ ὧν
  chosen: through whom
  alternatives:
  - by whom
  lexicon: BDAG
  rationale: διά with the genitive naturally expresses means or agency. 'Through whom'
    preserves that instrumental sense.
- source_word: ἐπιστεύσατε
  chosen: you believed
  alternatives:
  - you came to believe
  - you put your faith
  lexicon: BDAG
  rationale: The aorist indicates the decisive act of believing. 'You believed' is
    direct and avoids importing interpretive expansion.
- source_word: καὶ ἑκάστῳ ὡς ὁ κύριος ἔδωκεν
  chosen: and each one as the Lord gave
  alternatives:
  - and to each as the Lord gave
  - and each one received his part as the Lord gave
  lexicon: BDAG
  rationale: The Greek is elliptical, leaving the object of 'gave' unstated. This
    rendering preserves the compactness and ambiguity without adding a supplied object
    such as 'task' or 'role' to the main text.
- source_word: κύριος
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Per doctrine defaults, κύριος is rendered 'Lord.' In context it refers
    to the Lord Jesus as the one who apportions ministry.
