theological_decisions:
- issue: Referent of 'Lord' (κύριος)
  chosen_reading: The term refers to the Lord Jesus, who assigns ministry to his servants.
  alternative_readings:
  - A more general reference to God
  rationale: Within the immediate Pauline context, ministry is portrayed as belonging
    to and being assigned by the Lord Christ. The main translation leaves the referent
    as 'Lord' without over-specifying in the text.
  doctrine_reference: 'Contested terms table: κύριος → Lord'
- issue: Ellipsis in 'as the Lord gave'
  chosen_reading: The main text preserves the ellipsis rather than supplying 'task,'
    'role,' or 'gift.'
  alternative_readings:
  - as the Lord assigned to each
  - as the Lord gave to each one a role
  rationale: Supplying an object resolves an ambiguity the Greek leaves open. Preserving
    that tension better matches the source and the translation philosophy.
  doctrine_reference: 'Translation philosophy #3: Preserve theological tension rather
    than resolve it'
