id: 1CO.3.4
reference: 1 Corinthians 3:4
source:
  edition: SBLGNT
  text: ὅταν γὰρ λέγῃ τις· Ἐγὼ μέν εἰμι Παύλου, ἕτερος δέ· Ἐγὼ Ἀπολλῶ, ⸂οὐκ ἄνθρωποί⸃
    ἐστε;
translation:
  text: For whenever someone says, “I am of Paul,” and another, “I am of Apollos,”
    are you not human?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “are you not merely human?” or “are you not acting like men?”
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅταν
  chosen: whenever
  alternatives:
  - when
  lexicon: BDAG
  rationale: The particle marks an indefinite/repeated circumstance rather than a
    single event, so 'whenever' best reflects the force.
- source_word: γὰρ
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: BDAG
  rationale: Retains Paul's explanatory connection to the preceding argument.
- source_word: λέγῃ τις
  chosen: someone says
  alternatives:
  - anyone says
  - a person says
  lexicon: BDAG
  rationale: Natural English for the indefinite singular construction without losing
    the generic force.
- source_word: Ἐγὼ μέν εἰμι Παύλου
  chosen: I am of Paul
  alternatives:
  - I belong to Paul
  - I am Paul's
  lexicon: BDAG
  rationale: The genitive expresses partisan allegiance. 'Of Paul' preserves the compressed
    Greek form and avoids over-interpreting the relation.
- source_word: ἕτερος δέ
  chosen: and another
  alternatives:
  - but another
  - and someone else
  lexicon: BDAG
  rationale: Captures the paired contrast created by μέν ... δέ in smooth English.
- source_word: Ἐγὼ Ἀπολλῶ
  chosen: I am of Apollos
  alternatives:
  - I belong to Apollos
  - I am Apollos's
  lexicon: BDAG
  rationale: English supplies 'am of' to match the ellipsis from the previous clause
    and preserve the parallel allegiance formula.
- source_word: οὐκ ἄνθρωποί ἐστε;
  chosen: are you not human?
  alternatives:
  - are you not merely human?
  - are you not acting like men?
  lexicon: BDAG
  rationale: The rhetorical question rebukes the Corinthians for behaving in a merely
    human way. The main text keeps the explicit lexical content 'human' without adding
    interpretive words not present in Greek; the more interpretive alternatives are
    preserved in a footnote.
