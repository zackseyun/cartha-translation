id: 1CO.3.12
reference: 1 Corinthians 3:12
source:
  edition: SBLGNT
  text: εἰ δέ τις ἐποικοδομεῖ ἐπὶ τὸν ⸀θεμέλιον ⸂χρυσόν, ἄργυρον⸃, λίθους τιμίους,
    ξύλα, χόρτον, καλάμην,
translation:
  text: Now if anyone builds on the foundation with gold, silver, precious stones,
    wood, hay, straw,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: εἰ
  chosen: if
  alternatives:
  - now if
  lexicon: BDAG
  rationale: Introduces a conditional clause; simple English 'if' best matches the
    construction.
- source_word: δέ
  chosen: now
  alternatives:
  - but
  - and
  lexicon: BDAG
  rationale: Marks a mild development in the argument rather than a strong contrast;
    'now' carries the discourse shift naturally in English.
- source_word: τις
  chosen: anyone
  alternatives:
  - someone
  - a person
  lexicon: BDAG
  rationale: Indefinite singular with generic force; 'anyone' is natural modern English
    and preserves the open reference.
- source_word: ἐποικοδομεῖ
  chosen: builds
  alternatives:
  - builds upon
  - builds on
  lexicon: BDAG
  rationale: The verb means to build on or build upon. Since ἐπὶ with 'the foundation'
    already expresses the 'on' relation, 'builds' avoids unnecessary repetition.
- source_word: ἐπὶ τὸν θεμέλιον
  chosen: on the foundation
  alternatives:
  - upon the foundation
  lexicon: BDAG
  rationale: Standard spatial/metaphorical sense in this context; 'foundation' is
    the established construction metaphor in the passage.
- source_word: χρυσόν
  chosen: gold
  lexicon: BDAG
  rationale: Direct material term; no contextual reason to expand or paraphrase.
- source_word: ἄργυρον
  chosen: silver
  lexicon: BDAG
  rationale: Direct material term paired with gold in the building-material list.
- source_word: λίθους τιμίους
  chosen: precious stones
  alternatives:
  - costly stones
  - valuable stones
  lexicon: BDAG
  rationale: A natural English rendering for valuable building stones or gems; preserves
    the sense of costly, high-quality materials.
- source_word: ξύλα
  chosen: wood
  alternatives:
  - timber
  lexicon: BDAG
  rationale: Generic plural of building material; English idiom prefers the mass noun
    'wood' in a list like this.
- source_word: χόρτον
  chosen: hay
  alternatives:
  - grass
  lexicon: BDAG
  rationale: In this materials list, 'hay' best conveys dried vegetal matter used
    as a low-grade building material, fitting the contrast.
- source_word: καλάμην
  chosen: straw
  alternatives:
  - stubble
  - reed
  lexicon: BDAG
  rationale: In the construction metaphor, 'straw' is the clearest natural match and
    pairs idiomatically with 'wood, hay' in English.
