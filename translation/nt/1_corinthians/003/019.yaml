theological_decisions:
- issue: Rendering the quotation from Job 5:13 in idiomatic English while preserving
    divine opposition to worldly wisdom
  chosen_reading: He is the one who catches the wise in their craftiness
  alternative_readings:
  - He catches the wise in their cunning
  - the one catching the wise in their craftiness
  rationale: The Greek citation uses an articular participle for God; making the subject
    explicit in English improves readability without adding a new theological claim.
    The wording preserves the scriptural assertion that God overturns supposedly wise
    human schemes.
  doctrine_reference: Preserve theological tension rather than resolve it; readable
    modern English, not archaic or academic.
