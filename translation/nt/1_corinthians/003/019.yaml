id: 1CO.3.19
reference: 1 Corinthians 3:19
source:
  edition: SBLGNT
  text: ἡ γὰρ σοφία τοῦ κόσμου τούτου μωρία παρὰ τῷ θεῷ ἐστιν· γέγραπται γάρ· Ὁ δρασσόμενος
    τοὺς σοφοὺς ἐν τῇ πανουργίᾳ αὐτῶν·
translation:
  text: For the wisdom of this world is foolishness with God. For it is written, “He
    is the one who catches the wise in their craftiness.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “in their cunning.”
    reason: lexical_alternative
  - marker: b
    text: Literally “with God”; that is, in God’s sight or judgment.
    reason: lexical_alternative
lexical_decisions:
- source_word: σοφία
  chosen: wisdom
  alternatives:
  - cleverness
  lexicon: BDAG
  rationale: Standard rendering for σοφία; here it refers to the world’s claimed wisdom
    rather than mere intelligence.
- source_word: κόσμου τούτου
  chosen: of this world
  alternatives:
  - of this age
  lexicon: BDAG
  rationale: κόσμος naturally means 'world' here, and τούτου marks the present worldly
    order. 'Of this world' is the plain sense and fits Paul's contrast with God's
    evaluation.
- source_word: μωρία
  chosen: foolishness
  alternatives:
  - folly
  lexicon: BDAG
  rationale: '''Foolishness'' is the standard gloss and matches Paul''s recurring
    use of the term in this context.'
- source_word: παρὰ τῷ θεῷ
  chosen: with God
  alternatives:
  - before God
  - in God's sight
  lexicon: BDAG
  rationale: With παρά plus dative, the sense is evaluative from God's standpoint.
    'With God' is concise and idiomatic while preserving that sense.
- source_word: γέγραπται
  chosen: it is written
  alternatives:
  - it stands written
  lexicon: BDAG
  rationale: Conventional rendering of the perfect passive formula introducing Scripture
    citation.
- source_word: δρασσόμενος
  chosen: catches
  alternatives:
  - seizes
  - takes hold of
  lexicon: BDAG
  rationale: The participle conveys taking hold of or trapping. 'Catches' is natural
    English and fits the proverbial force of the quotation.
- source_word: σοφοὺς
  chosen: the wise
  alternatives:
  - wise men
  lexicon: BDAG
  rationale: The masculine plural here denotes wise persons in context; 'the wise'
    preserves the Greek without unnecessarily specifying gender.
- source_word: πανουργίᾳ
  chosen: craftiness
  alternatives:
  - cunning
  - shrewdness
  lexicon: BDAG
  rationale: πανουργία in this context is negative, referring to unscrupulous cleverness.
    'Craftiness' captures that moral shading well.
