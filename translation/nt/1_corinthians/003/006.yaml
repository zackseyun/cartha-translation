theological_decisions:
- issue: Divine agency in relation to human ministry
  chosen_reading: The main text emphasizes that Paul and Apollos performed ministerial
    tasks, but God alone was the one producing growth.
  alternative_readings:
  - '''God gave the increase'''
  rationale: This is not a doctrinal expansion but the plain force of the contrast
    in the Greek. The rendering preserves the text's theological tension between real
    human labor and decisive divine action.
  doctrine_reference: Preserve theological tension rather than resolve it.
