theological_decisions:
- issue: Meaning of αἰών in Paul's contrast
  chosen_reading: Rendered as 'age' rather than 'world.'
  alternative_readings:
  - Rendered as 'world'
  rationale: Paul's argument contrasts the present age's standards with God's wisdom,
    so 'age' preserves the theological-temporal nuance better than the broader 'world.'
- issue: Generic masculine reference
  chosen_reading: Used 'he/him/himself' in English.
  alternative_readings:
  - gender-neutral restructuring such as 'themselves' or 'that person'
  rationale: The Greek is grammatically masculine singular with representative force.
    Per doctrine, the translation remains gender-accurate rather than flattening to
    gender-neutral language.
  doctrine_reference: Translation philosophy §4
