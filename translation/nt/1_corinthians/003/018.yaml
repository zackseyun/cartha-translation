id: 1CO.3.18
reference: 1 Corinthians 3:18
source:
  edition: SBLGNT
  text: Μηδεὶς ἑαυτὸν ἐξαπατάτω· εἴ τις δοκεῖ σοφὸς εἶναι ἐν ὑμῖν ἐν τῷ αἰῶνι τούτῳ,
    μωρὸς γενέσθω, ἵνα γένηται σοφός,
translation:
  text: Let no one deceive himself. If anyone among you thinks he is wise in this
    age, let him become foolish, so that he may become wise.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'wise by the standards of this age.'
    reason: lexical_alternative
  - marker: b
    text: Or 'become a fool.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Μηδεὶς
  chosen: Let no one
  alternatives:
  - No one should
  - Let nobody
  lexicon: BDAG
  rationale: Uses a natural prohibitive opening in English that preserves the universal
    negative force of the imperative construction.
- source_word: ἑαυτὸν
  chosen: himself
  alternatives:
  - himself/herself
  - himself
  lexicon: BDAG
  rationale: Reflexive object is explicit in Greek. Masculine singular form is retained
    as gender-accurate generic English per project philosophy.
- source_word: ἐξαπατάτω
  chosen: deceive
  alternatives:
  - thoroughly deceive
  - mislead
  lexicon: BDAG
  rationale: The verb means to deceive or mislead; 'deceive' is the most direct and
    idiomatic rendering here without overtranslating the prefix.
- source_word: δοκεῖ
  chosen: thinks
  alternatives:
  - seems
  - supposes
  lexicon: BDAG
  rationale: In this context Paul refers to self-assessment or opinion, so 'thinks'
    communicates the sense more clearly than the more ambiguous 'seems'.
- source_word: σοφὸς
  chosen: wise
  alternatives:
  - learned
  lexicon: BDAG
  rationale: Standard rendering matching the semantic field of wisdom in Pauline argument.
- source_word: ἐν ὑμῖν
  chosen: among you
  alternatives:
  - in your midst
  - among yourselves
  lexicon: BDAG
  rationale: Idiomatic English for membership within the Corinthian community.
- source_word: ἐν τῷ αἰῶνι τούτῳ
  chosen: in this age
  alternatives:
  - in this world
  - by the standards of this age
  lexicon: BDAG
  rationale: αἰών is better rendered 'age' than 'world' here, preserving Paul's contrast
    between present-age wisdom and God's wisdom.
- source_word: μωρὸς
  chosen: foolish
  alternatives:
  - a fool
  lexicon: BDAG
  rationale: Predicate adjective is carried into natural English as 'foolish.' This
    avoids implying a fixed identity label while preserving the paradox Paul states.
- source_word: γενέσθω
  chosen: let him become
  alternatives:
  - he must become
  - let him be made
  lexicon: BDAG
  rationale: Aorist middle imperative is well represented by 'let him become,' preserving
    exhortation without unnecessary paraphrase.
- source_word: ἵνα γένηται σοφός
  chosen: so that he may become wise
  alternatives:
  - in order that he may become wise
  lexicon: BDAG
  rationale: Retains the purpose clause introduced by ἵνα and preserves the deliberate
    paradox of becoming foolish in order to become truly wise.
