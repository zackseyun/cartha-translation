id: 1CO.3.20
reference: 1 Corinthians 3:20
source:
  edition: SBLGNT
  text: καὶ πάλιν· Κύριος γινώσκει τοὺς διαλογισμοὺς τῶν σοφῶν ὅτι εἰσὶν μάταιοι.
translation:
  text: And again, “The Lord knows the thoughts of the wise, that they are futile.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “reasonings” for “thoughts.”
    reason: lexical_alternative
  - marker: b
    text: Quoted from Psalm 94:11 (93:11 LXX).
    reason: cross_reference
  - marker: c
    text: Or “vain” or “empty” for “futile.”
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ πάλιν
  chosen: And again
  alternatives:
  - And again,
  - And further
  lexicon: BDAG
  entry: πάλιν
  rationale: Introduces a second supporting citation; 'And again' is the most natural
    concise English equivalent.
- source_word: Κύριος
  chosen: The Lord
  alternatives:
  - Lord
  lexicon: BDAG
  entry: κύριος
  rationale: DOCTRINE.md specifies 'Lord' as the default rendering of κύριος. The
    article is natural in English when introducing the cited statement.
- source_word: γινώσκει
  chosen: knows
  alternatives:
  - understands
  - recognizes
  lexicon: BDAG
  entry: γινώσκω
  rationale: '''Knows'' is the plain and direct equivalent, preserving the statement''s
    force without interpretive expansion.'
- source_word: διαλογισμοὺς
  chosen: thoughts
  alternatives:
  - reasonings
  - plans
  lexicon: BDAG
  entry: διαλογισμός
  rationale: '''Thoughts'' is clear modern English and fits the context of internal
    intellectual activity; ''reasonings'' is possible but less natural here.'
- source_word: τῶν σοφῶν
  chosen: of the wise
  alternatives:
  - of the wise men
  - of the learned
  lexicon: BDAG
  entry: σοφός
  rationale: Substantival adjective rendered naturally as 'the wise,' matching Paul's
    ironic reference to worldly wisdom in context.
- source_word: ὅτι
  chosen: that
  alternatives:
  - because
  lexicon: BDAG
  entry: ὅτι
  rationale: Here it introduces the content of what the Lord knows rather than a causal
    clause.
- source_word: μάταιοι
  chosen: futile
  alternatives:
  - vain
  - empty
  lexicon: BDAG
  entry: μάταιος
  rationale: '''Futile'' communicates the sense of emptiness and uselessness in readable
    modern English better than the more traditional but potentially archaic ''vain''.'
