id: 1CO.3.21
reference: 1 Corinthians 3:21
source:
  edition: SBLGNT
  text: ὥστε μηδεὶς καυχάσθω ἐν ἀνθρώποις· πάντα γὰρ ὑμῶν ἐστιν,
translation:
  text: So then, let no one boast in people, for all things are yours.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'men'; the Greek term is generic and refers to human beings, not specifically
      males.
    reason: lexical_alternative
  - marker: b
    text: Or, in context, 'human leaders.'
    reason: alternative_reading
lexical_decisions:
- source_word: ὥστε
  chosen: So then
  alternatives:
  - Therefore
  - So
  lexicon: BDAG
  rationale: Marks an inferential conclusion from the preceding argument; 'So then'
    gives natural English while preserving the logical force.
- source_word: μηδεὶς
  chosen: no one
  alternatives:
  - nobody
  - not anyone
  lexicon: BDAG
  rationale: Indefinite prohibition addressed broadly; 'no one' is the clearest standard
    English rendering.
- source_word: καυχάσθω
  chosen: let no one boast
  alternatives:
  - let no one take pride
  - let no one glory
  lexicon: BDAG
  rationale: The present middle imperative expresses a general prohibition. 'Boast'
    preserves the verbal force without importing a more interpretive gloss.
- source_word: ἐν
  chosen: in
  alternatives:
  - about
  - with reference to
  lexicon: BDAG
  rationale: With καυχάομαι, the preposition can mark the basis or sphere of boasting.
    English 'boast in' preserves the Greek construction more transparently than a
    freer paraphrase.
- source_word: ἀνθρώποις
  chosen: people
  alternatives:
  - men
  - human beings
  - human leaders
  lexicon: BDAG
  rationale: The noun is plural and generic, not specifically male. 'People' is gender-accurate
    and readable; 'human leaders' is contextually possible but more interpretive than
    the Greek wording itself.
- source_word: πάντα
  chosen: all things
  alternatives:
  - everything
  lexicon: BDAG
  rationale: The neuter plural is comprehensive. 'All things' keeps the breadth and
    echoes Paul's rhetorical style.
- source_word: γὰρ
  chosen: for
  alternatives:
  - because
  lexicon: BDAG
  rationale: Introduces the ground for the prohibition; 'for' is concise and natural
    in this context.
- source_word: ὑμῶν
  chosen: are yours
  alternatives:
  - belong to you
  lexicon: BDAG
  rationale: The genitive pronoun with ἐστιν expresses possession. 'Are yours' is
    direct and idiomatic.
- source_word: ἐστιν
  chosen: are
  alternatives:
  - belong
  lexicon: BDAG
  rationale: 'Though singular in form with neuter plural subject, the sense in English
    is naturally plural: ''all things are yours.'''
