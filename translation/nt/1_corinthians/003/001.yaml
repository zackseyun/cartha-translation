id: 1CO.3.1
reference: 1 Corinthians 3:1
source:
  edition: SBLGNT
  text: Κἀγώ, ἀδελφοί, οὐκ ἠδυνήθην ⸂λαλῆσαι ὑμῖν⸃ ὡς πνευματικοῖς ἀλλ’ ὡς ⸀σαρκίνοις,
    ὡς νηπίοις ἐν Χριστῷ.
translation:
  text: And I, brothers, was not able to speak to you as spiritual people, but as
    fleshly, as infants in Messiah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'brothers and sisters'; the Greek says 'brothers.'
    reason: lexical_alternative
  - marker: b
    text: Or 'in Christ.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Κἀγώ
  chosen: And I
  alternatives:
  - And I myself
  - As for me
  lexicon: BDAG
  rationale: Keeps the connective force of καί with the explicit first-person pronoun,
    preserving Paul’s personal contrast with what precedes without overemphasis.
- source_word: ἀδελφοί
  chosen: brothers
  alternatives:
  - brothers and sisters
  - siblings
  lexicon: BDAG
  rationale: The vocative plural is formally masculine. Per the translation philosophy,
    the main text keeps the gender-accurate form, while inclusivity relevant to the
    Corinthian congregation is noted in a footnote.
- source_word: οὐκ ἠδυνήθην
  chosen: was not able
  alternatives:
  - could not
  lexicon: BDAG
  rationale: This preserves the sense of inability in the aorist without flattening
    it into a mere colloquial contraction.
- source_word: λαλῆσαι ὑμῖν
  chosen: to speak to you
  alternatives:
  - to talk to you
  - to address you
  lexicon: BDAG
  rationale: A straightforward rendering of the infinitive plus dative object, natural
    in English and close to the Greek.
- source_word: πνευματικοῖς
  chosen: spiritual people
  alternatives:
  - spiritual ones
  - spiritual
  lexicon: BDAG
  rationale: The adjective is substantival in context. Adding 'people' makes the English
    clear without adding interpretive content.
- source_word: σαρκίνοις
  chosen: fleshly
  alternatives:
  - made of flesh
  - people of the flesh
  - worldly
  lexicon: BDAG
  rationale: This adjective contrasts with 'spiritual' and is distinct from stronger
    moralized paraphrases. 'Fleshly' preserves the lexical link to flesh while avoiding
    an overinterpretive rendering like 'worldly' or 'sinful nature'.
- source_word: νηπίοις
  chosen: infants
  alternatives:
  - babies
  - children
  lexicon: BDAG
  rationale: '''Infants'' best preserves the metaphor of immaturity with suitable
    gravity and clarity.'
- source_word: ἐν Χριστῷ
  chosen: in Messiah
  alternatives:
  - in Christ
  lexicon: BDAG
  rationale: Χριστῷ is the title Χριστός, not merely a name-like form here. Per doctrine,
    the default rendering is 'Messiah' where title force is present.
