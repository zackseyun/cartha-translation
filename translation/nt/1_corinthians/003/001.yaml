theological_decisions:
- issue: Rendering Χριστῷ
  chosen_reading: in Messiah
  alternative_readings:
  - in Christ
  rationale: In this context Paul’s phrase retains title force, so the translation
    follows the project’s default for Χριστός as 'Messiah' where context supports
    it.
  doctrine_reference: 'Contested terms: Χριστός → Messiah (where title; Christ where
    name-like)'
