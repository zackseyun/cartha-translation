id: 1CO.3.8
reference: 1 Corinthians 3:8
source:
  edition: SBLGNT
  text: ὁ φυτεύων δὲ καὶ ὁ ποτίζων ἕν εἰσιν, ἕκαστος δὲ τὸν ἴδιον μισθὸν λήμψεται
    κατὰ τὸν ἴδιον κόπον,
translation:
  text: The one who plants and the one who waters are one, and each will receive his
    own reward according to his own labor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'are united' or 'have one purpose.'
    reason: lexical_alternative
lexical_decisions:
- source_word: φυτεύων
  chosen: the one who plants
  alternatives:
  - the planter
  - the one planting
  lexicon: BDAG
  rationale: The present participle with article is naturally rendered as a substantive
    phrase in English. 'The one who plants' is clear and preserves the ongoing worker
    sense.
- source_word: ποτίζων
  chosen: the one who waters
  alternatives:
  - the waterer
  - the one watering
  lexicon: BDAG
  rationale: Like φυτεύων, the articular participle functions substantivally. 'The
    one who waters' is idiomatic and keeps the agricultural metaphor.
- source_word: ἕν
  chosen: are one
  alternatives:
  - are united
  - have one purpose
  lexicon: BDAG
  rationale: The neuter singular stresses unity rather than personal identity. 'Are
    one' preserves the Greek compactly, while the footnote preserves the sense-based
    alternative.
- source_word: μισθὸν
  chosen: reward
  alternatives:
  - wages
  - pay
  lexicon: BDAG
  rationale: '''Reward'' fits the ministry context well and avoids narrowing the term
    to mere monetary payment, while still reflecting recompense.'
- source_word: λήμψεται
  chosen: will receive
  alternatives:
  - will get
  lexicon: BDAG
  rationale: Future middle is well represented by simple English future here. 'Will
    receive' is natural and suitably formal.
- source_word: κατὰ
  chosen: according to
  alternatives:
  - in proportion to
  - based on
  lexicon: BDAG
  rationale: This preserves the proportional sense of recompense in relation to labor.
- source_word: κόπον
  chosen: labor
  alternatives:
  - toil
  - work
  lexicon: BDAG
  rationale: '''Labor'' is readable modern English and retains the sense of effortful
    work without sounding overly harsh or colloquial.'
- source_word: ἴδιον
  chosen: his own
  alternatives:
  - one's own
  lexicon: BDAG
  rationale: The masculine singular ἕκαστος supports the singular English pronoun.
    This preserves the individualized emphasis of the repeated ἴδιον.
