theological_decisions:
- issue: Meaning of 'are one' (ἕν εἰσιν)
  chosen_reading: Paul means that the planter and the waterer are united in purpose
    and work, not that they are the same person or undifferentiated in role.
  alternative_readings:
  - They are one in the sense of equal status alone
  - They are simply one team without emphasis on unified purpose
  rationale: The neuter ἕν points to unity rather than personal identity. In context,
    Paul is minimizing factionalism by emphasizing that different ministers share
    one coordinated service under God.
