id: 1CO.3.7
reference: 1 Corinthians 3:7
source:
  edition: SBLGNT
  text: ὥστε οὔτε ὁ φυτεύων ἐστίν τι οὔτε ὁ ποτίζων, ἀλλ’ ὁ αὐξάνων θεός.
translation:
  text: So neither the one planting is anything, nor the one watering, but God, who
    causes growth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'but God, who gives the growth' or traditionally 'gives the increase.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὥστε
  chosen: So
  alternatives:
  - So then
  - Therefore
  lexicon: BDAG
  rationale: Marks an inferential result from the prior argument; 'So' is natural
    modern English and preserves the logical force without sounding overly formal.
- source_word: ὁ φυτεύων
  chosen: the one planting
  alternatives:
  - the planter
  - the one who plants
  lexicon: BDAG
  rationale: The substantival participle is best preserved transparently as 'the one
    planting,' matching Paul's parallel structure and keeping the ongoing verbal sense.
- source_word: ἐστίν τι
  chosen: is anything
  alternatives:
  - counts for anything
  - is something
  lexicon: BDAG
  rationale: This preserves the Greek idiom closely. 'Counts for anything' captures
    the sense interpretively, but 'is anything' is more text-transparent and still
    understandable in context.
- source_word: ὁ ποτίζων
  chosen: the one watering
  alternatives:
  - the waterer
  - the one who waters
  lexicon: BDAG
  rationale: Parallel to 'the one planting,' preserving the substantival participle
    and the rhetorical balance of the clause.
- source_word: ἀλλ’
  chosen: but
  alternatives:
  - rather
  - except
  lexicon: BDAG
  rationale: Standard adversative force; 'but' best preserves the contrast between
    human workers and God.
- source_word: ὁ αὐξάνων
  chosen: who causes growth
  alternatives:
  - who makes grow
  - who gives the growth
  - who gives the increase
  lexicon: BDAG
  rationale: The participle describes God as the one producing growth. 'Who causes
    growth' is clear, modern, and close to the Greek without importing an explicit
    object.
- source_word: θεός
  chosen: God
  lexicon: BDAG
  rationale: The noun is placed emphatically at the end; 'God' is retained plainly,
    with English punctuation used to clarify the appositional participial phrase.
