theological_decisions:
- issue: Whether the verse refers primarily to the individual believer or the church
    collectively as God's temple
  chosen_reading: 'The main sense is corporate: the plural "you" identifies the community
    collectively as God''s temple.'
  alternative_readings:
  - An individual-believer reading is sometimes inferred from broader biblical theology.
  rationale: The grammar joins singular "temple" with plural "you," which most naturally
    points to the church as a corporate dwelling of God in this context.
