id: 1CO.3.17
reference: 1 Corinthians 3:17
source:
  edition: SBLGNT
  text: εἴ τις τὸν ναὸν τοῦ θεοῦ φθείρει, φθερεῖ τοῦτον ὁ θεός· ὁ γὰρ ναὸς τοῦ θεοῦ
    ἅγιός ἐστιν, οἵτινές ἐστε ὑμεῖς.
translation:
  text: If anyone destroys God's temple, God will destroy him; for God's temple is
    holy, and you are that temple.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "corrupts" or "defiles" for both uses of the verb "destroy."
    reason: lexical_alternative
  - marker: b
    text: The "you" is plural; Paul identifies the congregation collectively as God's
      temple.
    reason: cultural_note
lexical_decisions:
- source_word: ναός
  chosen: temple
  alternatives:
  - sanctuary
  lexicon: BDAG
  rationale: Rendered as "temple" for natural English and because the term denotes
    the sacred dwelling place of God, not merely a general building. "Sanctuary" is
    possible but less idiomatic here.
- source_word: φθείρω / φθερεῖ
  chosen: destroys / will destroy
  alternatives:
  - corrupts / will corrupt
  - defiles / will defile
  lexicon: BDAG
  rationale: Used the stronger "destroy" in both clauses to preserve the verbal repetition
    and the warning's severity. In context Paul speaks of grave harm done to God's
    temple; softer alternatives are possible but understate the force.
- source_word: τοῦτον
  chosen: him
  alternatives:
  - that person
  lexicon: BDAG
  rationale: Rendered with singular personal reference matching the Greek accusative
    demonstrative referring back to the indefinite τις. "That person" is possible,
    but "him" is more direct and preserves the singular warning.
- source_word: ἅγιος
  chosen: holy
  alternatives:
  - set apart
  - sacred
  lexicon: BDAG
  rationale: '"Holy" is the standard and clearest rendering, preserving both sacredness
    and consecration without paraphrase.'
- source_word: οἵτινές ἐστε ὑμεῖς
  chosen: and you are that temple
  alternatives:
  - which you are
  - and you yourselves are that temple
  lexicon: BDAG
  rationale: Rendered idiomatically in English while preserving the identification
    of the readers with God's temple. "That temple" makes explicit the referent of
    the relative clause for clarity.
- source_word: ὑμεῖς
  chosen: you
  alternatives:
  - you all
  lexicon: BDAG
  rationale: 'Kept the normal English "you," but the plural force is important in
    context: Paul addresses the community collectively while using singular "temple."'
