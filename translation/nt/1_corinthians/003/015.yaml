id: 1CO.3.15
reference: 1 Corinthians 3:15
source:
  edition: SBLGNT
  text: εἴ τινος τὸ ἔργον κατακαήσεται, ζημιωθήσεται, αὐτὸς δὲ σωθήσεται, οὕτως δὲ
    ὡς διὰ πυρός.
translation:
  text: If anyone’s work is burned up, he will suffer loss, but he himself will be
    saved—yet as through fire.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'but only as through fire,' or 'but as one escaping through fire.'
    reason: lexical_alternative
lexical_decisions:
- source_word: εἴ
  chosen: If
  alternatives:
  - If ever
  - If indeed
  lexicon: BDAG
  rationale: Simple conditional particle introducing a real conditional scenario;
    plain English 'If' best matches the sense without adding emphasis.
- source_word: τινος
  chosen: anyone’s
  alternatives:
  - someone’s
  - a person’s
  lexicon: BDAG
  rationale: The indefinite genitive refers to any individual in view. 'Anyone’s'
    is natural English and preserves the indefinite force.
- source_word: τὸ ἔργον
  chosen: work
  alternatives:
  - deed
  - what he has built
  lexicon: BDAG
  rationale: ἔργον is broad enough for 'work' here, referring to the person's ministerial/labor
    result in context. 'Work' is concise and consistent with the surrounding building
    metaphor.
- source_word: κατακαήσεται
  chosen: is burned up
  alternatives:
  - is consumed
  - is burned down
  lexicon: BDAG
  rationale: The verb intensifies burning to the point of destruction. 'Is burned
    up' preserves that force in idiomatic English without overexpanding the metaphor.
- source_word: ζημιωθήσεται
  chosen: will suffer loss
  alternatives:
  - will be penalized
  - will forfeit reward
  lexicon: BDAG
  rationale: The verb denotes experiencing loss or forfeiture. 'Will suffer loss'
    is the standard transparent rendering and avoids importing a specific kind of
    penalty not explicit in the text.
- source_word: αὐτὸς δὲ
  chosen: but he himself
  alternatives:
  - but he
  - yet he himself
  lexicon: BDAG
  rationale: αὐτός is emphatic. 'He himself' preserves the contrast between the loss
    of the work and the salvation of the person.
- source_word: σωθήσεται
  chosen: will be saved
  alternatives:
  - will be delivered
  lexicon: BDAG
  rationale: σῴζω in this context is best rendered 'saved.' 'Delivered' is possible
    lexically, but 'saved' better matches Pauline usage and the theological weight
    of the clause.
- source_word: οὕτως δὲ ὡς διὰ πυρός
  chosen: yet as through fire
  alternatives:
  - but only as through fire
  - but as one passing through fire
  - but as one escaping through fire
  lexicon: BDAG
  rationale: This clause is metaphorical and should remain somewhat terse and vivid.
    'Yet as through fire' preserves the Greek imagery and ambiguity without resolving
    the exact nuance beyond the text.
