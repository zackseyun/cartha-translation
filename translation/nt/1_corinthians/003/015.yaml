theological_decisions:
- issue: Whether the final clause should be rendered in a way that supports a specific
    doctrinal reading (for example, purgatorial purification or mere narrow escape).
  chosen_reading: Kept the clause as 'yet as through fire' without interpretive expansion.
  alternative_readings:
  - yet only as through fire
  - but as one escaping through fire
  - but through a purifying fire
  rationale: The Greek image is metaphorical but not fully unpacked. The translation
    preserves the theological tension rather than resolving it into a denominationally
    specific doctrine.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
