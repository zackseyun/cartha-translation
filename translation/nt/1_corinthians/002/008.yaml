id: 1CO.2.8
reference: 1 Corinthians 2:8
source:
  edition: SBLGNT
  text: ἣν οὐδεὶς τῶν ἀρχόντων τοῦ αἰῶνος τούτου ἔγνωκεν, εἰ γὰρ ἔγνωσαν, οὐκ ἂν τὸν
    κύριον τῆς δόξης ἐσταύρωσαν·
translation:
  text: which none of the rulers of this age understood, for if they had understood
    it, they would not have crucified the Lord of glory.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: “Rulers of this age” may refer to human authorities, spiritual powers, or
      both.
    reason: alternative_reading
lexical_decisions:
- source_word: ἣν
  chosen: which
  alternatives:
  - that
  rationale: Feminine singular relative pronoun referring back to the previously mentioned
    wisdom; “which” is the most natural English connector here.
- source_word: ἀρχόντων
  chosen: rulers
  alternatives:
  - leaders
  - authorities
  lexicon: BDAG
  rationale: “Rulers” best captures ἄρχοντες as those exercising governing power,
    while preserving the possible breadth of reference.
- source_word: αἰῶνος τούτου
  chosen: this age
  alternatives:
  - this world
  lexicon: BDAG
  rationale: αἰών is more precisely “age” than “world,” and Paul often uses it in
    a temporal-order sense.
- source_word: ἔγνωκεν / ἔγνωσαν
  chosen: understood / had understood
  alternatives:
  - knew
  - recognized
  lexicon: BDAG
  rationale: In context, γινώσκω goes beyond bare awareness to grasping the significance
    of God’s wisdom; “understood” communicates that sense best. The pluperfect sense
    in English (“had understood”) fits the contrary-to-fact condition.
- source_word: κύριον
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Follows the project’s default rendering for κύριος and preserves the
    title’s theological weight.
- source_word: δόξης
  chosen: glory
  alternatives:
  - splendor
  lexicon: BDAG
  rationale: “Glory” is the standard and most theologically resonant rendering of
    δόξα here.
- source_word: κύριον τῆς δόξης
  chosen: the Lord of glory
  alternatives:
  - the glorious Lord
  lexicon: BDAG
  rationale: The genitival construction is best preserved as “Lord of glory,” an elevated
    but clear phrase that retains the source text’s force.
- source_word: ἐσταύρωσαν
  chosen: crucified
  alternatives:
  - executed on a cross
  lexicon: BDAG
  rationale: “Crucified” is the direct and established rendering of σταυρόω, matching
    both lexical sense and historical specificity.
