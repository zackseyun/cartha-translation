theological_decisions:
- issue: Identity of “the rulers of this age”
  chosen_reading: Rendered neutrally as “the rulers of this age” without specifying
    whether Paul means human authorities, spiritual powers, or both.
  alternative_readings:
  - human political/religious rulers
  - cosmic or demonic powers
  - a deliberately layered reference including both
  rationale: The Greek expression can naturally bear more than one interpretive possibility
    in Pauline usage. The main text preserves that ambiguity rather than resolving
    it beyond what the verse itself states.
  doctrine_reference: Preserve theological tension rather than resolve it.
