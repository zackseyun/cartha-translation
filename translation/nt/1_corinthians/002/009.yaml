id: 1CO.2.9
reference: 1 Corinthians 2:9
source:
  edition: SBLGNT
  text: ἀλλὰ καθὼς γέγραπται· Ἃ ὀφθαλμὸς οὐκ εἶδεν καὶ οὖς οὐκ ἤκουσεν καὶ ἐπὶ καρδίαν
    ἀνθρώπου οὐκ ἀνέβη, ⸀ὅσα ἡτοίμασεν ὁ θεὸς τοῖς ἀγαπῶσιν αὐτόν.
translation:
  text: But just as it is written, “What no eye has seen, and no ear has heard, and
    what has not arisen in man’s heart—what God has prepared for those who love him.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “has not entered the human heart” or “has not occurred to anyone.”
    reason: lexical_alternative
  - marker: b
    text: “Man’s heart” uses “man” in a generic sense, referring to humanity.
    reason: cultural_note
lexical_decisions:
- source_word: ἀλλὰ
  chosen: But
  alternatives:
  - Rather
  - Instead
  lexicon: BDAG
  rationale: Marks contrast with the preceding thought; 'But' is the most natural
    concise English adversative here.
- source_word: καθὼς γέγραπται
  chosen: just as it is written
  alternatives:
  - as it is written
  lexicon: BDAG
  rationale: Retains the scriptural citation formula and the perfect sense of γέγραπται
    while reading naturally in English.
- source_word: Ἃ ... ὅσα
  chosen: What ... what
  alternatives:
  - The things that ... the things that
  - What things ... what things
  lexicon: BDAG
  rationale: The correlative neuter plurals introduce and then resumptively identify
    the content; 'What ... what' preserves the poetic structure without sounding stiff.
- source_word: ὀφθαλμὸς
  chosen: eye
  lexicon: BDAG
  rationale: Straightforward singular generic, matching the Greek idiom.
- source_word: οὖς
  chosen: ear
  lexicon: BDAG
  rationale: Retains the singular generic parallel to 'eye' in the Greek.
- source_word: ἐπὶ καρδίαν ἀνθρώπου οὐκ ἀνέβη
  chosen: has not arisen in man’s heart
  alternatives:
  - has not entered man’s heart
  - has not come into a person’s heart
  - has not occurred to man
  lexicon: BDAG
  rationale: The Greek is literally 'did not go up upon the heart of man.' 'Has not
    arisen in man’s heart' preserves the metaphor more transparently than the traditional
    'entered the heart,' while remaining intelligible. 'Heart' is kept rather than
    'mind' to preserve the biblical anthropology. 'Man’s' reflects the singular generic
    ἀνθρώπου.
- source_word: ἡτοίμασεν
  chosen: has prepared
  alternatives:
  - prepared
  lexicon: BDAG
  rationale: English present perfect fits the completed action with abiding relevance
    in context.
- source_word: τοῖς ἀγαπῶσιν αὐτόν
  chosen: for those who love him
  alternatives:
  - for the ones loving him
  lexicon: BDAG
  rationale: The present participle is naturally rendered as an ongoing description;
    'those who love him' is idiomatic and faithful.
