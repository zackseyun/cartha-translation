theological_decisions:
- issue: Rendering the generic ἀνθρώπου
  chosen_reading: man’s heart
  alternative_readings:
  - human heart
  - a person’s heart
  rationale: The Greek singular generic is masculine in form and representative in
    force. Following the project's gender-accurate principle, 'man’s heart' preserves
    that form more closely, while the inclusive sense can be clarified in a footnote
    rather than flattened in the main text.
  doctrine_reference: Translation philosophy §4 (Gender-accurate over gender-neutral)
