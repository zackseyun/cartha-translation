id: 1CO.2.6
reference: 1 Corinthians 2:6
source:
  edition: SBLGNT
  text: Σοφίαν δὲ λαλοῦμεν ἐν τοῖς τελείοις, σοφίαν δὲ οὐ τοῦ αἰῶνος τούτου οὐδὲ τῶν
    ἀρχόντων τοῦ αἰῶνος τούτου τῶν καταργουμένων·
translation:
  text: Yet we do speak wisdom among the mature, but not a wisdom of this age or of
    the rulers of this age, who are being brought to nothing.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "the perfect"; here likely those who are spiritually mature.
    reason: lexical_alternative
  - marker: b
    text: Or "who are passing away," "who are being abolished," or "who are being
      nullified."
    reason: lexical_alternative
  - marker: c
    text: '"Rulers of this age" may refer to human authorities, spiritual powers,
      or both.'
    reason: alternative_reading
lexical_decisions:
- source_word: Σοφίαν
  chosen: wisdom
  alternatives:
  - a wise message
  - wisdom-message
  lexicon: BDAG
  rationale: Standard rendering of σοφία. Repeated in the verse for emphasis, so the
    same English gloss is retained both times.
- source_word: δὲ
  chosen: Yet
  alternatives:
  - But
  - Now
  lexicon: BDAG
  rationale: Marks contrast with the immediately preceding context. “Yet” preserves
    the adversative force in natural English.
- source_word: λαλοῦμεν
  chosen: we do speak
  alternatives:
  - we speak
  - we proclaim
  lexicon: BDAG
  rationale: λαλέω is more basically “speak” than “proclaim.” The auxiliary “do” brings
    out the emphatic contrast in context without overtranslating.
- source_word: ἐν τοῖς τελείοις
  chosen: among the mature
  alternatives:
  - among the perfect
  - among the full-grown
  lexicon: BDAG
  rationale: τέλειος here most naturally refers to spiritual maturity rather than
    sinless perfection. “Among” fits the idiom better than a rigidly literal “in.”
- source_word: οὐ τοῦ αἰῶνος τούτου
  chosen: not a wisdom of this age
  alternatives:
  - not the wisdom of this world
  - not of this era
  lexicon: BDAG
  rationale: αἰών is best rendered “age,” preserving the temporal-worldly sense without
    collapsing it into κόσμος (“world”). The supplied “a wisdom” reflects the repeated
    accusative σοφίαν in the Greek.
- source_word: ἀρχόντων
  chosen: rulers
  alternatives:
  - authorities
  - leaders
  lexicon: BDAG
  rationale: ἄρχων commonly denotes ruling authorities. “Rulers” is the most direct
    and contextually broad rendering, leaving open the debated question of whether
    Paul has human rulers, spiritual powers, or both in view.
- source_word: τῶν καταργουμένων
  chosen: who are being brought to nothing
  alternatives:
  - who are passing away
  - who are being abolished
  - who are being nullified
  lexicon: BDAG
  rationale: καταργέω often carries the sense of rendering powerless or bringing to
    nothing. This rendering preserves the present participle’s ongoing force and fits
    Paul’s rhetoric about the transience of this age’s powers.
