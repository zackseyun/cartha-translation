theological_decisions:
- issue: Reference of 'the rulers of this age'
  chosen_reading: Render broadly as 'rulers' without specifying human or demonic referent.
  alternative_readings:
  - human political/religious rulers
  - spiritual powers
  - both human and spiritual rulers
  rationale: The Greek phrase itself does not force a narrower interpretation. The
    translation preserves the ambiguity rather than resolving a debated theological
    question in the main text.
  doctrine_reference: Preserve theological tension rather than resolve it.
