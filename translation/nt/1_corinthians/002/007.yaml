id: 1CO.2.7
reference: 1 Corinthians 2:7
source:
  edition: SBLGNT
  text: ἀλλὰ λαλοῦμεν ⸂θεοῦ σοφίαν⸃ ἐν μυστηρίῳ, τὴν ἀποκεκρυμμένην, ἣν προώρισεν
    ὁ θεὸς πρὸ τῶν αἰώνων εἰς δόξαν ἡμῶν·
translation:
  text: But we speak God's wisdom in a mystery—the hidden wisdom that God predestined
    before the ages for our glory.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "in secret"; the Greek uses "mystery," a term Paul often uses for God's
      once-hidden plan now revealed.
    reason: lexical_alternative
  - marker: b
    text: Or "foreordained" or "decided beforehand."
    reason: lexical_alternative
  - marker: c
    text: Or "before all ages."
    reason: lexical_alternative
lexical_decisions:
- source_word: λαλοῦμεν
  chosen: we speak
  alternatives:
  - we proclaim
  - we say
  lexicon: BDAG
  rationale: '"Speak" is the plain sense of λαλέω and fits Paul''s contrastive statement
    without overstating it as formal proclamation.'
- source_word: θεοῦ σοφίαν
  chosen: God's wisdom
  alternatives:
  - the wisdom of God
  lexicon: BDAG
  rationale: The genitive is rendered possessively for natural English while preserving
    the sense that this wisdom belongs to and comes from God.
- source_word: ἐν μυστηρίῳ
  chosen: in a mystery
  alternatives:
  - in mystery
  - as a mystery
  - in secret
  lexicon: BDAG
  rationale: Pauline μυστήριον commonly refers to a divine purpose once hidden and
    now disclosed. "Mystery" preserves that theological nuance better than "secret."
    The article is absent in Greek, but English idiom prefers "a mystery" here.
- source_word: τὴν ἀποκεκρυμμένην
  chosen: the hidden wisdom
  alternatives:
  - the hidden one
  - the wisdom that has been hidden
  lexicon: BDAG
  rationale: The participle is feminine singular and refers back to "wisdom." Supplying
    "wisdom" in English makes the referent explicit and readable.
- source_word: προώρισεν
  chosen: predestined
  alternatives:
  - foreordained
  - decided beforehand
  - appointed beforehand
  lexicon: BDAG
  rationale: '"Predestined" is a direct and established rendering of προορίζω. It
    preserves the strength of God''s prior determination without paraphrase.'
- source_word: πρὸ τῶν αἰώνων
  chosen: before the ages
  alternatives:
  - before the world began
  - before all ages
  lexicon: BDAG
  rationale: Ages is the more literal rendering of αἰῶνες and preserves Paul's temporal-cosmic
    framing better than the more interpretive "before the world began."
- source_word: εἰς δόξαν ἡμῶν
  chosen: for our glory
  alternatives:
  - for our glorification
  - for our honor
  lexicon: BDAG
  rationale: '"For our glory" is the most direct rendering. "Glorification" would
    be more interpretive, while "honor" would weaken the theological weight of δόξα.'
