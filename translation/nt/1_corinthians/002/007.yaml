theological_decisions:
- issue: Rendering προώρισεν in a Pauline context with doctrinal significance
  chosen_reading: predestined
  alternative_readings:
  - foreordained
  - decided beforehand
  rationale: The verb itself denotes prior determination. "Predestined" preserves
    the lexical force of the Greek without importing a narrower denominational system
    beyond what the text states.
  doctrine_reference: Preserve theological tension rather than resolve it.
