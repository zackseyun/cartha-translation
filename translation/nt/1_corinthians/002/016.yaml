theological_decisions:
- issue: Rendering Χριστοῦ in the phrase νοῦν Χριστοῦ
  chosen_reading: the mind of the Messiah
  alternative_readings:
  - the mind of Christ
  rationale: The Greek uses Χριστοῦ as a title, and the project's default is to translate
    the title as "Messiah" where context supports it. This preserves the Hebrew-messianic
    force without changing the theological claim of the verse.
  doctrine_reference: 'Contested terms table: Χριστός → Messiah (where title; Christ
    where name-like)'
