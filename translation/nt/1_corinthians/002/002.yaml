theological_decisions:
- issue: Rendering Χριστός
  chosen_reading: the Messiah
  alternative_readings:
  - Christ
  rationale: The doctrinal guidelines direct that Christological titles be translated
    where context supports title force. In 1 Corinthians 2:2, Paul foregrounds Jesus
    in his messianic identity and saving work, so “Messiah” is preferred, while the
    traditional “Christ” is preserved in a footnote.
  doctrine_reference: 'DOCTRINE.md Contested terms: Χριστός → Messiah (where title;
    Christ where name-like)'
