id: 1CO.2.2
reference: 1 Corinthians 2:2
source:
  edition: SBLGNT
  text: οὐ γὰρ ἔκρινά ⸂τι εἰδέναι⸃ ἐν ὑμῖν εἰ μὴ Ἰησοῦν Χριστὸν καὶ τοῦτον ἐσταυρωμένον·
translation:
  text: For I decided to know nothing among you except Jesus the Messiah—and him crucified.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or “Jesus Christ.” Greek: “Jesus Messiah.”'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔκρινά
  chosen: decided
  alternatives:
  - resolved
  - judged
  lexicon: BDAG
  rationale: In this context κρίνω expresses a settled determination rather than judicial
    judgment. “Decided” is natural modern English and preserves Paul's intentional
    resolve.
- source_word: τι εἰδέναι
  chosen: to know nothing
  alternatives:
  - to know anything
  lexicon: BDAG
  rationale: 'With οὐ and εἰ μὴ, the clause is idiomatically restrictive: Paul determined
    to know nothing except the one stated object. “To know nothing” best reflects
    the force in English.'
- source_word: ἐν ὑμῖν
  chosen: among you
  alternatives:
  - in your midst
  - while with you
  lexicon: BDAG
  rationale: The phrase refers to Paul's presence and ministry context with the Corinthians.
    “Among you” is concise and natural while preserving the relational setting.
- source_word: εἰ μὴ
  chosen: except
  alternatives:
  - except for
  - if not
  lexicon: BDAG
  rationale: This is a standard exceptive construction. “Except” gives the clearest
    English sense.
- source_word: Χριστόν
  chosen: the Messiah
  alternatives:
  - Christ
  lexicon: BDAG
  rationale: Per project doctrine, Χριστός is rendered “Messiah” where it functions
    as a title. Here it identifies Jesus in his messianic office rather than serving
    merely as a name-like label.
- source_word: τοῦτον ἐσταυρωμένον
  chosen: him crucified
  alternatives:
  - him as crucified
  - him having been crucified
  lexicon: BDAG
  rationale: The demonstrative adds emphasis to Jesus himself, and the perfect passive
    participle highlights him in his crucified state. “Him crucified” is idiomatic,
    weighty, and faithful to Paul's compressed expression.
