id: 1CO.2.15
reference: 1 Corinthians 2:15
source:
  edition: SBLGNT
  text: ὁ δὲ πνευματικὸς ἀνακρίνει ⸀τὰ πάντα, αὐτὸς δὲ ὑπ’ οὐδενὸς ἀνακρίνεται.
translation:
  text: But the spiritual person evaluates all things, yet he himself is evaluated
    by no one.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “examines,” “discerns,” or “judges” for both occurrences of ἀνακρίνω.
    reason: lexical_alternative
  - marker: b
    text: “The spiritual person” translates a masculine singular adjective used substantivally,
      referring generically to a person characterized by the Spirit.
    reason: cultural_note
lexical_decisions:
- source_word: πνευματικὸς
  chosen: spiritual person
  alternatives:
  - spiritual one
  - spiritual man
  lexicon: BDAG
  rationale: The adjective is substantival and refers to a person characterized by
    the Spirit. “Spiritual person” communicates the personal referent in natural English
    without implying only a male individual.
- source_word: ἀνακρίνει
  chosen: evaluates
  alternatives:
  - examines
  - discerns
  - judges
  lexicon: BDAG
  rationale: In this context the verb carries the sense of careful assessment or discernment
    rather than final condemnation. “Evaluates” fits Paul’s contrast between the person
    led by the Spirit and the one unable to grasp spiritual things.
- source_word: τὰ πάντα
  chosen: all things
  alternatives:
  - everything
  lexicon: BDAG
  rationale: The phrase is comprehensive and should be preserved plainly. “All things”
    is slightly more formal and keeps closer contact with the Greek wording.
- source_word: αὐτὸς
  chosen: he himself
  alternatives:
  - that person himself
  - he
  lexicon: BDAG
  rationale: The pronoun is emphatic, so the translation preserves that emphasis with
    “himself.” The following masculine singular form is retained idiomatically in
    English while the antecedent remains generic in force.
- source_word: ὑπ’ οὐδενὸς
  chosen: by no one
  alternatives:
  - by nobody
  lexicon: BDAG
  rationale: This is the natural rendering of the prepositional phrase and preserves
    the absolute negation of the Greek.
- source_word: ἀνακρίνεται
  chosen: is evaluated
  alternatives:
  - is examined
  - is discerned
  - is judged
  lexicon: BDAG
  rationale: Using the same English gloss as in the first clause preserves the lexical
    repetition of ἀνακρίνω/ἀνακρίνεται. The passive indicates that the spiritual person
    is not properly subject to such evaluation by others in view here.
