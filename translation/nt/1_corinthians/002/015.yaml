theological_decisions:
- issue: Scope of Paul's claim about the spiritual person
  chosen_reading: Retain the unqualified wording “all things” and “by no one” without
    softening the statement.
  alternative_readings:
  - Limit the sense explicitly to spiritual matters in the main text
  rationale: The verse itself states the claim absolutely, and the immediate context
    supplies the interpretive frame. Adding an explicit limitation in the main text
    would resolve tension beyond what the Greek states.
  doctrine_reference: Preserve theological tension rather than resolve it.
