theological_decisions:
- issue: Referent of πνεύματος
  chosen_reading: the Holy Spirit
  alternative_readings:
  - a spiritual source generally
  rationale: The surrounding context in 1 Corinthians 2 repeatedly contrasts God's
    Spirit with human wisdom, so the definite personal referent is most coherent.
