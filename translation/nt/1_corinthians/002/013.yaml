id: 1CO.2.13
reference: 1 Corinthians 2:13
source:
  edition: SBLGNT
  text: ἃ καὶ λαλοῦμεν οὐκ ἐν διδακτοῖς ἀνθρωπίνης σοφίας λόγοις, ἀλλ’ ἐν διδακτοῖς
    ⸀πνεύματος, πνευματικοῖς πνευματικὰ συγκρίνοντες.
translation:
  text: These things we also speak, not in words taught by human wisdom, but in those
    taught by the Spirit, expressing spiritual things in spiritual words.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, "interpreting spiritual things to spiritual people." The Greek can also
      be taken that way because πνευματικοῖς may be read as masculine rather than
      as an implied reference to spiritual words.
    reason: alternative_reading
lexical_decisions:
- source_word: ἃ
  chosen: These things
  alternatives:
  - which things
  lexicon: BDAG
  rationale: The demonstrative sense is natural in English and refers back to the
    truths just mentioned without sounding wooden.
- source_word: λαλοῦμεν
  chosen: we speak
  alternatives:
  - we say
  lexicon: BDAG
  rationale: '"Speak" preserves the verbal and oral emphasis of λαλέω and fits Paul''s
    contrast about kinds of words.'
- source_word: διδακτοῖς ἀνθρωπίνης σοφίας λόγοις
  chosen: in words taught by human wisdom
  alternatives:
  - with words taught by human wisdom
  lexicon: BDAG
  rationale: This keeps the instrumental force of ἐν while making clear that the teaching
    source is merely human wisdom.
- source_word: διδακτοῖς πνεύματος
  chosen: in those taught by the Spirit
  alternatives:
  - in words taught by the Spirit
  lexicon: BDAG
  rationale: '"Those" avoids adding λόγοις too heavily in the main text while still
    carrying the ellipsis naturally from the previous phrase. "Spirit" is capitalized
    because the context contrasts human wisdom with divine revelation.'
- source_word: πνεύματος
  chosen: the Spirit
  alternatives:
  - spirit
  lexicon: BDAG
  rationale: In context Paul refers to the Holy Spirit, not a generic spirit, especially
    given the immediate broader argument in 1 Corinthians 2.
- source_word: πνευματικοῖς πνευματικὰ συγκρίνοντες
  chosen: expressing spiritual things in spiritual words
  alternatives:
  - interpreting spiritual things to spiritual people
  - combining spiritual things with spiritual things
  lexicon: BDAG
  rationale: The clause is syntactically difficult. This rendering best fits the immediate
    contrast about kinds of words and preserves the flow from the prior phrase about
    speech taught by the Spirit. Because πνευματικοῖς may also be taken as masculine
    ('to spiritual people') or as an implied dative of means ('with spiritual words'),
    the alternative is preserved in a footnote.
