id: 1CO.2.3
reference: 1 Corinthians 2:3
source:
  edition: SBLGNT
  text: κἀγὼ ἐν ἀσθενείᾳ καὶ ἐν φόβῳ καὶ ἐν τρόμῳ πολλῷ ἐγενόμην πρὸς ὑμᾶς,
translation:
  text: And I was with you in weakness, in fear, and in great trembling,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'I came to you in weakness, in fear, and in great trembling.'
    reason: alternative_reading
lexical_decisions:
- source_word: κἀγώ
  chosen: And I
  alternatives:
  - and I myself
  lexicon: BDAG
  rationale: Carries the connective force from the prior sentence and keeps Paul's
    self-reference explicit without adding emphasis the English does not need.
- source_word: ἐν ἀσθενείᾳ
  chosen: in weakness
  alternatives:
  - in frailty
  lexicon: BDAG
  rationale: ἀσθένεια commonly denotes weakness or frailty. 'Weakness' is the clearest
    and most natural English rendering and preserves the breadth of the term.
- source_word: ἐν φόβῳ
  chosen: in fear
  alternatives:
  - with fear
  lexicon: BDAG
  rationale: A straightforward rendering of the prepositional phrase that preserves
    Paul's stated state without softening it into mere reverence or caution.
- source_word: ἐν τρόμῳ πολλῷ
  chosen: in great trembling
  alternatives:
  - with much trembling
  - in much trembling
  lexicon: BDAG
  rationale: τρόμος is 'trembling,' and πολλῷ intensifies it. 'Great trembling' is
    idiomatic modern English while preserving the force of the Greek intensifier.
- source_word: ἐγενόμην πρὸς ὑμᾶς
  chosen: I was with you
  alternatives:
  - I came to you
  lexicon: BDAG
  rationale: Given the immediate context describing Paul's manner among the Corinthians,
    this idiomatic rendering best communicates his condition in their presence. The
    more arrival-focused alternative remains viable and is preserved in a footnote.
