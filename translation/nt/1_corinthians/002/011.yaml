id: 1CO.2.11
reference: 1 Corinthians 2:11
source:
  edition: SBLGNT
  text: τίς γὰρ οἶδεν ἀνθρώπων τὰ τοῦ ἀνθρώπου εἰ μὴ τὸ πνεῦμα τοῦ ἀνθρώπου τὸ ἐν αὐτῷ; οὕτως καὶ τὰ τοῦ θεοῦ οὐδεὶς ⸀ἔγνωκεν εἰ μὴ τὸ πνεῦμα τοῦ θεοῦ.
translation:
  text: For who among people knows the things of a person except that person’s indwelling spirit? In the same way, no one knows the things of God except the Spirit of God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “a person’s thoughts” for “the things of a person.”
    reason: lexical_alternative
  - marker: b
    text: Or 'that person’s spirit within them'.
    reason: previous_rendering
lexical_decisions:
- source_word: ἀνθρώπων / ἀνθρώπου
  chosen: people / a person
  alternatives:
  - men / a man
  - human beings / a human being
  rationale: The noun has generic human reference here rather than male-specific force. 'People' and 'a person' preserve the sense in natural modern English while remaining faithful to the source.
- source_word: τὰ τοῦ ἀνθρώπου
  chosen: the things of a person
  alternatives:
  - a person's thoughts
  - a person's inner things
  - what belongs to a person
  lexicon: BDAG
  rationale: The expression is broad and refers to a person's inner matters, not merely isolated thoughts. 'The things of a person' keeps the scope broad and preserves the parallel with 'the things of God,' though a smoother alternative is noted in a footnote.
- source_word: πνεῦμα τοῦ ἀνθρώπου
  chosen: that person’s spirit
  alternatives:
  - the human spirit
  - the spirit of the person
  lexicon: BDAG
  rationale: A straightforward rendering preserves the anthropological contrast with 'the Spirit of God.' 'That person's spirit' reads naturally in English and keeps the possessive force clear.
- source_word: τὸ ἐν αὐτῷ
  chosen: within them
  alternatives:
  - in him
  - within him
  - that is in him
  lexicon: BDAG
  rationale: The phrase indicates inward indwelling. 'Within them' is natural modern English for a generic singular antecedent without changing the sense.
- source_word: οὕτως καὶ
  chosen: In the same way
  alternatives:
  - So also
  - Likewise
  lexicon: BDAG
  rationale: This idiom marks a close analogy between the human and divine clauses. 'In the same way' is clear, idiomatic, and preserves the comparison.
- source_word: ἔγνωκεν
  chosen: knows
  alternatives:
  - has known
  - has come to know
  lexicon: BDAG
  rationale: The perfect here carries a present-result force in context. 'Knows' gives the sense in natural English and matches the analogous first clause.
- source_word: τὰ τοῦ θεοῦ
  chosen: the things of God
  alternatives:
  - the thoughts of God
  - what belongs to God
  lexicon: BDAG
  rationale: The phrase is intentionally broad and should not be narrowed to 'thoughts' alone. Retaining 'the things of God' preserves the scope and the verbal parallel with the first half of the verse.
- source_word: πνεῦμα τοῦ θεοῦ
  chosen: the Spirit of God
  alternatives:
  - the spirit of God
  lexicon: BDAG
  rationale: In this Pauline context the phrase refers to God's own Spirit, so capitalization in English appropriately signals personal reference without adding content beyond the context.
