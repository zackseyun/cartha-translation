theological_decisions:
- issue: Whether πνεῦμα τοῦ θεοῦ should be rendered as a personal divine title ('Spirit of God') or as a non-titular 'spirit of God.'
  chosen_reading: the Spirit of God
  alternative_readings:
  - the spirit of God
  rationale: Within the immediate context of 1 Corinthians 2, Paul is speaking of the divine Spirit who searches and reveals the deep things of God. Capitalization reflects that referent in standard English usage, while the Greek itself remains unchanged.
  doctrine_reference: Historic ecumenical orthodoxy affirmed in DOCTRINE.md; preserve the text's meaning without importing extra doctrinal detail.
