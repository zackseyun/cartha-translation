id: 1CO.2.10
reference: 1 Corinthians 2:10
source:
  edition: SBLGNT
  text: ἡμῖν ⸀γὰρ ⸂ἀπεκάλυψεν ὁ θεὸς⸃ διὰ τοῦ ⸀πνεύματος, τὸ γὰρ πνεῦμα πάντα ἐραυνᾷ,
    καὶ τὰ βάθη τοῦ θεοῦ.
translation:
  text: For God has revealed these things to us through the Spirit, for the Spirit
    searches all things, even the depths of God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "revealed them to us"; the direct object is implicit in Greek and comes
      from the preceding context.
    reason: alternative_reading
  - marker: b
    text: Or "the deep things of God."
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπεκάλυψεν
  chosen: has revealed
  alternatives:
  - revealed
  lexicon: BDAG
  rationale: Rendered with present relevance in English ('has revealed') to communicate
    the completed divine disclosure now possessed by believers; simple past ('revealed')
    is also possible from the aorist.
- source_word: ἡμῖν
  chosen: to us
  alternatives:
  - for us
  lexicon: BDAG
  rationale: Dative is best expressed here as indirect object, indicating the recipients
    of the revelation.
- source_word: '[implicit object of ἀπεκάλυψεν]'
  chosen: these things
  alternatives:
  - them
  - it
  rationale: The Greek leaves the direct object implicit, but the immediate context
    supplies it from the preceding discussion of what God has prepared. 'These things'
    makes the connection clear without over-paraphrasing.
- source_word: διὰ τοῦ πνεύματος
  chosen: through the Spirit
  alternatives:
  - by the Spirit
  lexicon: BDAG
  rationale: διά with the genitive marks means or agency. 'Through the Spirit' is
    natural English and preserves the mediating sense.
- source_word: πνεῦμα
  chosen: Spirit
  alternatives:
  - spirit
  lexicon: BDAG
  rationale: Capitalized as a reference to the Holy Spirit in context, since the verse
    speaks of divine revelation and of knowing the depths of God.
- source_word: ἐραυνᾷ
  chosen: searches
  alternatives:
  - examines
  - explores
  lexicon: BDAG
  rationale: '''Searches'' is the most direct equivalent and preserves the active,
    probing force of the verb.'
- source_word: πάντα
  chosen: all things
  alternatives:
  - everything
  lexicon: BDAG
  rationale: '''All things'' keeps the broad scope and slightly more formal cadence
    suitable to the argument.'
- source_word: καὶ
  chosen: even
  alternatives:
  - and
  lexicon: BDAG
  rationale: 'Here καί is intensive, highlighting the climactic phrase that follows:
    not only all things generally, but even God''s depths.'
- source_word: τὰ βάθη τοῦ θεοῦ
  chosen: the depths of God
  alternatives:
  - the deep things of God
  lexicon: BDAG
  rationale: A formally close rendering that preserves the metaphor of depth without
    interpreting it away.
