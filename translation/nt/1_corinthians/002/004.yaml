id: 1CO.2.4
reference: 1 Corinthians 2:4
source:
  edition: SBLGNT
  text: καὶ ὁ λόγος μου καὶ τὸ κήρυγμά μου οὐκ ἐν ⸂πειθοῖ σοφίας⸃ ἀλλ’ ἐν ἀποδείξει
    πνεύματος καὶ δυνάμεως,
translation:
  text: And my speech and my proclamation were not with persuasive wisdom, but with
    a demonstration of the Spirit and of power,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “spirit.”
    reason: alternative_reading
  - marker: b
    text: Or “in persuasive words of wisdom.”
    reason: lexical_alternative
lexical_decisions:
- source_word: λόγος
  chosen: speech
  alternatives:
  - word
  - message
  lexicon: BDAG
  rationale: In this context Paul refers to his manner of speaking, not merely the
    content of a single word or message. “Speech” fits the rhetorical contrast with
    persuasive wisdom and distinguishes λόγος from κήρυγμα.
- source_word: κήρυγμα
  chosen: proclamation
  alternatives:
  - preaching
  - message
  lexicon: BDAG
  rationale: “Proclamation” preserves the heraldic sense of κήρυγμα while remaining
    readable modern English. It also avoids collapsing it into λόγος, which is rendered
    separately as “speech.”
- source_word: πειθοῖ σοφίας
  chosen: with persuasive wisdom
  alternatives:
  - in persuasive words of wisdom
  - with persuasive rhetoric of wisdom
  lexicon: BDAG
  rationale: The Greek does not explicitly include “words,” so the rendering avoids
    adding that noun in the main text. “Persuasive wisdom” captures the idea of clever,
    rhetorically convincing human wisdom in contrast to divine demonstration.
- source_word: ἀπόδειξει
  chosen: demonstration
  alternatives:
  - proof
  - display
  lexicon: BDAG
  rationale: “Demonstration” best reflects a showing or evidencing that stands opposite
    mere rhetorical persuasion.
- source_word: πνεύματος
  chosen: the Spirit
  alternatives:
  - spirit
  lexicon: BDAG
  rationale: In this immediate context Paul contrasts human wisdom with divine agency,
    and the wider passage emphasizes revelation and work from God’s Spirit. Capitalizing
    as “the Spirit” best fits the sense, while the lowercase alternative is preserved
    in a footnote.
- source_word: δυνάμεως
  chosen: power
  alternatives:
  - might
  lexicon: BDAG
  rationale: “Power” is the standard, clear rendering and pairs naturally with “the
    Spirit” in Pauline usage.
