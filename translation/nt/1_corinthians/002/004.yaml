theological_decisions:
- issue: Whether πνεύματος refers to the Holy Spirit or to a human/spiritual disposition
  chosen_reading: the Spirit
  alternative_readings:
  - spirit
  rationale: The broader argument in 1 Corinthians 2 contrasts human wisdom with what
    comes from God and is later made explicit in references to God’s Spirit. Rendering
    it as “the Spirit” preserves that theological flow without overstating beyond
    context; the lowercase option remains viable enough to note in a footnote.
  doctrine_reference: Preserve theological tension rather than resolve it; document
    ambiguous readings and preserve alternatives in footnotes.
