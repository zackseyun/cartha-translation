theological_decisions:
- issue: Rendering ψυχικὸς ἄνθρωπος in contrast with spiritual discernment
  chosen_reading: the natural person
  alternative_readings:
  - the unspiritual person
  - the person without the Spirit
  rationale: The verse contrasts the merely natural human condition with Spirit-enabled
    discernment. “Natural person” preserves that tension without making the phrase
    more explicit than the Greek itself.
  doctrine_reference: Preserve theological tension rather than resolve it; gender-accurate
    over gender-neutral.
