id: 1CO.2.14
reference: 1 Corinthians 2:14
source:
  edition: SBLGNT
  text: Ψυχικὸς δὲ ἄνθρωπος οὐ δέχεται τὰ τοῦ πνεύματος τοῦ θεοῦ, μωρία γὰρ αὐτῷ ἐστίν,
    καὶ οὐ δύναται γνῶναι, ὅτι πνευματικῶς ἀνακρίνεται·
translation:
  text: But the natural person does not accept the things of the Spirit of God, for
    they are foolishness to him, and he is not able to understand them, because they
    are spiritually discerned.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the unspiritual person.”
    reason: lexical_alternative
  - marker: b
    text: Or “are evaluated” or “are examined.”
    reason: lexical_alternative
lexical_decisions:
- source_word: Ψυχικὸς
  chosen: natural
  alternatives:
  - unspiritual
  - soulish
  lexicon: BDAG
  rationale: ψυχικός contrasts with πνευματικός in this context. “Natural” best captures
    a person limited to merely human life apart from the Spirit, without importing
    more doctrinal interpretation than the term itself warrants.
- source_word: ἄνθρωπος
  chosen: person
  alternatives:
  - man
  lexicon: BDAG
  rationale: Although grammatically masculine singular, the sense is representative
    rather than specifically male. “Person” preserves the generic force in natural
    English.
- source_word: δέχεται
  chosen: accept
  alternatives:
  - receive
  - welcome
  lexicon: BDAG
  rationale: “Accept” communicates not merely receiving information but embracing
    it as valid, which fits the argument of refusal and inability in the verse.
- source_word: τὰ τοῦ πνεύματος τοῦ θεοῦ
  chosen: the things of the Spirit of God
  alternatives:
  - the things from the Spirit of God
  - what belongs to the Spirit of God
  lexicon: BDAG
  rationale: This phrasing preserves the Greek construction and leaves the expression
    broad, referring to realities disclosed by God's Spirit.
- source_word: μωρία
  chosen: foolishness
  alternatives:
  - folly
  - nonsense
  lexicon: BDAG
  rationale: “Foolishness” is the standard and most fitting rendering in 1 Corinthians,
    preserving Paul's repeated contrast between God's wisdom and human judgment.
- source_word: γνῶναι
  chosen: understand
  alternatives:
  - know
  lexicon: BDAG
  rationale: In this context the infinitive refers to grasping or recognizing the
    truth of these things, not mere factual acquaintance. “Understand” communicates
    that force more clearly in English.
- source_word: πνευματικῶς
  chosen: spiritually
  alternatives:
  - by the Spirit
  lexicon: BDAG
  rationale: The adverb indicates the mode or sphere of discernment. “Spiritually”
    is the most direct and natural equivalent.
- source_word: ἀνακρίνεται
  chosen: are discerned
  alternatives:
  - are evaluated
  - are examined
  lexicon: BDAG
  rationale: ἀνακρίνω can mean examine, evaluate, or discern. Here “are discerned”
    best fits Paul's emphasis that these realities are rightly grasped only through
    spiritual perception.
