theological_decisions:
- issue: Whether πνεῦμα τὸ ἐκ τοῦ θεοῦ refers specifically to the Holy Spirit
  chosen_reading: Render as "the Spirit from God" with capitalization
  alternative_readings:
  - the spirit from God
  rationale: In the immediate contrast with "the spirit of the world," Paul most naturally
    refers to the Holy Spirit given by God to believers; capitalization signals this
    while keeping the wording close to the Greek.
