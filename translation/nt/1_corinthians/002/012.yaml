id: 1CO.2.12
reference: 1 Corinthians 2:12
source:
  edition: SBLGNT
  text: ἡμεῖς δὲ οὐ τὸ πνεῦμα τοῦ κόσμου ἐλάβομεν ἀλλὰ τὸ πνεῦμα τὸ ἐκ τοῦ θεοῦ, ἵνα
    εἰδῶμεν τὰ ὑπὸ τοῦ θεοῦ χαρισθέντα ἡμῖν·
translation:
  text: But we have not received the spirit of the world, but the Spirit from God,
    so that we may know the things graciously given to us by God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "so that we may understand."
    reason: lexical_alternative
  - marker: b
    text: Or "freely given to us by God" or "given to us as a gift by God."
    reason: lexical_alternative
lexical_decisions:
- source_word: πνεῦμα
  chosen: spirit / Spirit
  alternatives:
  - spirit
  - Spirit
  lexicon: BDAG
  rationale: Rendered the first occurrence as "spirit" in the sense of the world's
    animating influence, and the second as "Spirit" because in context Paul contrasts
    the world's spirit with the divine Spirit given by God.
- source_word: κόσμου
  chosen: world
  alternatives:
  - age
  - world-order
  lexicon: BDAG
  rationale: '"World" is the plain and standard sense here, referring to the present
    fallen human order in contrast with God.'
- source_word: ἐλάβομεν
  chosen: have received
  alternatives:
  - received
  lexicon: BDAG
  rationale: English present perfect best conveys the past action with present relevance
    in Paul's argument.
- source_word: τὸ ἐκ τοῦ θεοῦ
  chosen: from God
  alternatives:
  - who is from God
  - out of God
  lexicon: BDAG
  rationale: '"From God" is natural English for ἐκ and preserves the source relationship
    without over-expanding the phrase.'
- source_word: ἵνα εἰδῶμεν
  chosen: so that we may know
  alternatives:
  - so that we may understand
  lexicon: BDAG
  rationale: This keeps the purpose clause explicit and preserves the cognitive sense
    of οἶδα without unnecessary paraphrase.
- source_word: χαρισθέντα
  chosen: graciously given
  alternatives:
  - freely given
  - given as a gift
  lexicon: BDAG
  rationale: This passive participle comes from χαρίζομαι and carries the sense of
    giving as grace or gift; "graciously given" preserves that theological nuance
    better than the flatter "given."
- source_word: τὰ ... χαρισθέντα ἡμῖν
  chosen: the things graciously given to us
  alternatives:
  - what has been graciously given to us
  - the gifts given to us
  lexicon: BDAG
  rationale: The neuter plural is broad rather than limited to specific spiritual
    gifts, so "the things" preserves the scope of what God has granted.
