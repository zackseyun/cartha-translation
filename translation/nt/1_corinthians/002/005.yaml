id: 1CO.2.5
reference: 1 Corinthians 2:5
source:
  edition: SBLGNT
  text: ἵνα ἡ πίστις ὑμῶν μὴ ᾖ ἐν σοφίᾳ ἀνθρώπων ἀλλ’ ἐν δυνάμει θεοῦ.
translation:
  text: so that your faith might not be in the wisdom of men, but in the power of
    God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'human wisdom.' 'Men' here means human beings generally.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἵνα
  chosen: so that
  alternatives:
  - in order that
  lexicon: BDAG
  rationale: Introduces Paul's purpose clause. 'So that' is natural modern English
    and preserves the clause's telic force.
- source_word: πίστις
  chosen: faith
  alternatives:
  - trust
  - faithfulness
  lexicon: BDAG
  rationale: The doctrine table gives 'faith' as the default rendering for πίστις.
    Here it refers to the Corinthians' believing response, not Christ's faithfulness,
    so 'faith' fits best.
- source_word: μὴ ᾖ
  chosen: might not be
  alternatives:
  - may not be
  - would not be
  lexicon: BDAG
  rationale: The present subjunctive under ἵνα is well represented by 'might not be'
    in English, preserving purpose without sounding wooden.
- source_word: ἐν σοφίᾳ ἀνθρώπων
  chosen: in the wisdom of men
  alternatives:
  - in human wisdom
  - in the wisdom of people
  lexicon: BDAG
  rationale: A literal rendering preserves the contrast and follows the gender-accurate-over-gender-neutral
    principle. ἀνθρώπων here means human beings generically; 'men' matches the traditional
    representative sense, while a footnote can clarify the inclusive meaning.
- source_word: δυνάμει θεοῦ
  chosen: in the power of God
  alternatives:
  - in God's power
  lexicon: BDAG
  rationale: This preserves the parallel with 'in the wisdom of men' and keeps the
    emphasis on the sphere or basis in which faith rests.
