theological_decisions:
- issue: Gendered rendering of ἀνθρώπων
  chosen_reading: Rendered as 'men' in the main text
  alternative_readings:
  - human
  - people
  - human beings
  rationale: Per the doctrine excerpt, gender-accurate renderings are preferred over
    flattening to gender-neutral language when the Greek uses ἄνθρωπος in a representative
    sense. Here the meaning is generic humanity, so the inclusive sense is preserved
    in a footnote rather than in the main text.
  doctrine_reference: Translation philosophy §4
