theological_decisions:
- issue: Textual variant at μαρτύριον
  chosen_reading: the testimony of God
  alternative_readings:
  - the mystery of God
  rationale: The SBLGNT base text reads μαρτύριον ('testimony'). Because the variant
    μυστήριον ('mystery') is well known and affects translation, it is preserved in
    a footnote rather than ignored.
