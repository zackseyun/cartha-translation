id: 1CO.2.1
reference: 1 Corinthians 2:1
source:
  edition: SBLGNT
  text: Κἀγὼ ἐλθὼν πρὸς ὑμᾶς, ἀδελφοί, ἦλθον οὐ καθ’ ὑπεροχὴν λόγου ἢ σοφίας καταγγέλλων
    ὑμῖν τὸ ⸀μαρτύριον τοῦ θεοῦ.
translation:
  text: And I, when I came to you, brothers, did not come with lofty speech or wisdom
    as I proclaimed to you the testimony of God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Brothers may refer to fellow believers generally, including women in the
      congregation.
    reason: cultural_note
  - marker: b
    text: Some manuscripts read mystery of God.
    reason: textual_variant
lexical_decisions:
- source_word: Κἀγὼ
  chosen: And I
  alternatives:
  - And I myself
  - As for me
  rationale: Keeps the connective force of καί and the emphatic first-person subject
    without overstating the emphasis.
- source_word: ἐλθὼν … ἦλθον
  chosen: when I came … did not come
  alternatives:
  - having come … came
  - on coming to you … I did not come
  rationale: The participle plus main verb is naturally rendered in English as a temporal
    clause followed by the main assertion.
- source_word: ἀδελφοί
  chosen: brothers
  alternatives:
  - brothers and sisters
  - siblings
  rationale: Follows the project's gender-accurate policy by preserving the masculine
    vocative form in the main text; inclusivity relevant to the mixed congregation
    is noted in a footnote.
- source_word: καθ’ ὑπεροχὴν λόγου ἢ σοφίας
  chosen: with lofty speech or wisdom
  alternatives:
  - with superiority of speech or wisdom
  - with excellence of speech or wisdom
  lexicon: BDAG
  rationale: '''Lofty'' communicates rhetorical elevation or impressiveness in natural
    English while preserving Paul''s contrast with worldly eloquence and wisdom.'
- source_word: καταγγέλλων
  chosen: as I proclaimed
  alternatives:
  - proclaiming
  - announcing
  - declaring
  lexicon: BDAG
  rationale: Pairs smoothly with the main clause in English and preserves the public,
    declarative sense of the participle.
- source_word: μαρτύριον
  chosen: the testimony
  alternatives:
  - the witness
  - the testimony from God
  lexicon: BDAG
  rationale: Matches the printed SBLGNT reading and preserves the formal theological
    weight of the noun without importing a narrower interpretation of the genitive.
- source_word: τοῦ θεοῦ
  chosen: of God
  alternatives:
  - from God
  - about God
  rationale: The genitive may be understood in more than one way; 'of God' preserves
    that ambiguity rather than resolving it interpretively.
