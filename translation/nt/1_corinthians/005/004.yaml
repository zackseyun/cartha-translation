theological_decisions:
- issue: Nature of Paul's presence in the assembly
  chosen_reading: Paul speaks of his spirit as present with the congregation in a
    real but non-physical sense, rendered explicitly as 'my spirit is with you.'
  alternative_readings:
  - Paul refers only to his attitude or intention
  - Paul claims a stronger mystical/spiritual presence
  rationale: The text itself affirms Paul's non-bodily participation but does not
    define its metaphysical mechanism. The translation preserves that claim without
    importing a specific doctrinal explanation.
  doctrine_reference: Preserve theological tension rather than resolve it.
