id: 1CO.5.4
reference: 1 Corinthians 5:4
source:
  edition: SBLGNT
  text: ἐν τῷ ὀνόματι τοῦ κυρίου ἡμῶν ⸀Ἰησοῦ, συναχθέντων ὑμῶν καὶ τοῦ ἐμοῦ πνεύματος
    σὺν τῇ δυνάμει τοῦ κυρίου ἡμῶν ⸁Ἰησοῦ,
translation:
  text: In the name of our Lord Jesus, when you are assembled—and my spirit is with
    you—with the power of our Lord Jesus,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'when you have assembled, and my spirit [being present] with you.' The
      Greek uses a genitive absolute construction that is somewhat compressed in English.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν τῷ ὀνόματι
  chosen: In the name
  alternatives:
  - by the name
  - in the authority of
  lexicon: BDAG
  rationale: A standard idiom that can denote agency or authority. 'In the name' preserves
    the Greek wording while naturally carrying the sense of acting under Jesus's authority.
- source_word: κυρίου
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Per doctrine default for κύριος, 'Lord' best reflects the title's NT
    usage and christological weight.
- source_word: Ἰησοῦ
  chosen: Jesus
  rationale: Personal name is transliterated by standard English convention, following
    the translation philosophy to transliterate names.
- source_word: συναχθέντων ὑμῶν
  chosen: when you are assembled
  alternatives:
  - when you have assembled
  - after you have assembled
  - with you gathered together
  lexicon: BDAG
  rationale: The genitive absolute with aorist passive participle is rendered as a
    temporal clause. 'When you are assembled' is idiomatic English and fits the procedural
    sense of the sentence.
- source_word: τοῦ ἐμοῦ πνεύματος
  chosen: my spirit is with you
  alternatives:
  - my spirit
  - my spirit being present
  lexicon: BDAG
  rationale: The Greek is elliptical within the genitive absolute construction. Supplying
    'is with you' makes the sense explicit in natural English without over-paraphrasing,
    reflecting Paul's claimed spiritual participation in the assembly.
- source_word: σὺν
  chosen: with
  alternatives:
  - together with
  lexicon: BDAG
  rationale: Simple accompaniment/instrumental sense; 'with' is the most natural rendering
    here.
- source_word: δυνάμει
  chosen: power
  alternatives:
  - authority
  - might
  lexicon: BDAG
  rationale: δύναμις here most naturally denotes effective power operative in the
    disciplinary action, not merely formal authority.
- source_word: τοῦ κυρίου ἡμῶν Ἰησοῦ
  chosen: of our Lord Jesus
  alternatives:
  - from our Lord Jesus
  lexicon: BDAG
  rationale: The genitive is retained straightforwardly after 'power.' 'Of our Lord
    Jesus' preserves the Greek construction and leaves the exact nuance of source/possession
    appropriately broad.
