theological_decisions:
- issue: Whether to render ἔθνεσιν as 'Gentiles' or a more culturally evaluative term
    like 'pagans'
  chosen_reading: Gentiles
  alternative_readings:
  - pagans
  - the nations
  rationale: The Greek term is ethnically/religiously descriptive, not inherently
    pejorative. 'Gentiles' preserves Paul's Jewish-Christian contrast without importing
    extra rhetorical hostility. 'Pagans' is interpretive and more evaluative than
    the source requires.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; readable modern English, not archaic or academic.'
- issue: Whether to specify the woman as 'stepmother' in the main text
  chosen_reading: his father’s wife
  alternative_readings:
  - his stepmother
  rationale: Although the relationship likely corresponds to what English speakers
    call a stepmother, the Greek does not use a specialized kinship term. Preserving
    'his father's wife' avoids adding precision not explicit in the text while still
    making the incestuous nature clear.
  doctrine_reference: 'Translation philosophy: Never paraphrase beyond what the source
    text warrants; optimal equivalence.'
