id: 1CO.5.1
reference: 1 Corinthians 5:1
source:
  edition: SBLGNT
  text: Ὅλως ἀκούεται ἐν ὑμῖν πορνεία, καὶ τοιαύτη πορνεία ἥτις οὐδὲ ἐν τοῖς ⸀ἔθνεσιν,
    ὥστε γυναῖκά τινα τοῦ πατρὸς ἔχειν.
translation:
  text: 'It is actually reported that there is sexual immorality among you, and sexual
    immorality of such a kind as is not even found among the Gentiles: a man has his
    father’s wife.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'not even among the nations'; some translations render 'not even among
      the pagans.'
    reason: lexical_alternative
  - marker: b
    text: Literally, 'to have his father’s wife'; that is, to be in a sexual relationship
      with his father’s wife. Possibly his stepmother.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ὅλως
  chosen: actually
  alternatives:
  - altogether
  - generally
  - commonly
  lexicon: BDAG
  rationale: Here ὅλως functions idiomatically to express astonishment/emphasis ('actually,'
    'in fact') rather than a quantitative sense like 'altogether.' 'Actually' best
    captures Paul's shocked tone in natural English.
- source_word: ἀκούεται
  chosen: is reported
  alternatives:
  - is heard
  - is said
  lexicon: BDAG
  rationale: The passive of ἀκούω here refers to something being heard about or publicly
    reported. 'Is reported' communicates the sense more idiomatically in English than
    the more literal 'is heard.'
- source_word: ἐν ὑμῖν
  chosen: among you
  alternatives:
  - in your midst
  - among you all
  lexicon: BDAG
  rationale: The phrase indicates occurrence within the Corinthian community. 'Among
    you' is concise and natural while preserving the communal force.
- source_word: πορνεία
  chosen: sexual immorality
  alternatives:
  - fornication
  - sexual sin
  lexicon: BDAG
  rationale: πορνεία is a broad term for illicit sexual conduct. 'Sexual immorality'
    is standard, accurate modern English and avoids the narrower or archaic feel of
    'fornication.'
- source_word: τοιαύτη πορνεία
  chosen: sexual immorality of such a kind
  alternatives:
  - such sexual immorality
  - a kind of sexual immorality
  lexicon: BDAG
  rationale: The construction heightens the shocking character of the offense. 'Of
    such a kind' preserves the emphatic qualitative force of τοιαύτη.
- source_word: ἥτις
  chosen: as is
  alternatives:
  - which is
  - such as is
  lexicon: BDAG
  rationale: ἥτις here introduces a qualitative relative clause explaining the kind
    of immorality in view. 'As is' fits the English construction 'of such a kind as
    is not even…'.
- source_word: οὐδὲ ἐν τοῖς ἔθνεσιν
  chosen: is not even found among the Gentiles
  alternatives:
  - not even among the nations
  - not even among the pagans
  lexicon: BDAG
  rationale: ἔθνη in Paul's Jewish-Christian frame commonly means Gentiles/non-Jews.
    'Gentiles' is the most direct lexical equivalent. 'Found' is supplied idiomatically
    to complete the English sense from the ellipsis after 'not even among the Gentiles.'
- source_word: ὥστε
  chosen: ':'
  alternatives:
  - namely
  - so that
  lexicon: BDAG
  rationale: Here ὥστε introduces the content/result that specifies the scandalous
    report. In English, a colon naturally introduces the explanation. 'So that' would
    sound awkward and potentially over-literal.
- source_word: γυναῖκά τινα τοῦ πατρὸς
  chosen: his father’s wife
  alternatives:
  - the wife of his father
  - his stepmother
  lexicon: BDAG
  rationale: The Greek literally says 'a certain wife/woman of the father,' an idiom
    for the father's wife. 'His father's wife' is both clear and closer to the source
    than 'stepmother,' which is interpretive and could imply more than the text states
    about family structure.
- source_word: ἔχειν
  chosen: has
  alternatives:
  - is having
  - is living with
  lexicon: BDAG
  rationale: In this context ἔχω is a euphemistic idiom for having a sexual relationship
    or taking as a partner. 'Has' preserves the idiomatic terseness of the Greek without
    over-paraphrasing to 'is sleeping with' or 'is living with.'
