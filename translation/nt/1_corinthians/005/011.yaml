theological_decisions:
- issue: Reference of ἔγραψα in context
  chosen_reading: Rendered simply as past 'I wrote' without specifying whether Paul
    means this present letter or an earlier letter.
  alternative_readings:
  - epistolary aorist referring to the present letter
  - reference to a previous letter now lost
  rationale: The verse itself does not unambiguously resolve the referent. To preserve
    interpretive tension, the translation keeps the plain past form and avoids importing
    a decision into the main text.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
- issue: Force of ἀδελφὸς ὀνομαζόμενος
  chosen_reading: A professing fellow believer, rendered 'who is called a brother.'
  alternative_readings:
  - '''so-called brother'' to stress doubtful profession'
  rationale: The phrase indicates someone bearing the name/status of a Christian brother
    within the community. The chosen rendering preserves that claim without adding
    extra rhetorical sharpness beyond the Greek.
  doctrine_reference: 'Translation philosophy §4: Gender-accurate over gender-neutral.'
