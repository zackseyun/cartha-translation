id: 1CO.5.11
reference: 1 Corinthians 5:11
source:
  edition: SBLGNT
  text: νῦν δὲ ἔγραψα ὑμῖν μὴ συναναμίγνυσθαι ἐάν τις ἀδελφὸς ὀνομαζόμενος ᾖ πόρνος
    ἢ πλεονέκτης ἢ εἰδωλολάτρης ἢ λοίδορος ἢ μέθυσος ἢ ἅρπαξ, τῷ τοιούτῳ μηδὲ συνεσθίειν.
translation:
  text: But now I wrote to you not to associate with anyone who is called a brother
    if he is sexually immoral or greedy or an idolater or abusive or a drunkard or
    a swindler—not even to eat with such a person.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'a so-called brother.' The Greek expression can carry the sense of someone
      who bears the name of a brother, that is, a professing believer.
    reason: lexical_alternative
  - marker: b
    text: '''I wrote'' may refer either to Paul''s present letter in epistolary style
      or to an earlier letter; the Greek itself does not specify.'
    reason: alternative_reading
  - marker: c
    text: Or, 'reviler' for 'abusive,' emphasizing insulting or verbally abusive speech.
    reason: lexical_alternative
  - marker: d
    text: Or, 'extortioner' for 'swindler.' The Greek term refers to one who seizes
      or exploits what belongs to others.
    reason: lexical_alternative
lexical_decisions:
- source_word: νῦν δὲ
  chosen: But now
  alternatives:
  - But as it is
  - But now indeed
  lexicon: BDAG
  rationale: Marks a contrast with the previous clarification in context; 'But now'
    is natural English and preserves the adversative force of δέ with the temporal/discourse
    force of νῦν.
- source_word: ἔγραψα
  chosen: I wrote
  alternatives:
  - I am writing
  - I wrote previously
  lexicon: BDAG
  rationale: Aorist is most straightforwardly rendered as past 'I wrote.' In context
    it may refer to the present letter in epistolary aorist style or to a previous
    letter, but the Greek form itself is simply past; the contextual issue is noted
    separately.
- source_word: μὴ συναναμίγνυσθαι
  chosen: not to associate
  alternatives:
  - not to mix with
  - not to keep company with
  lexicon: BDAG
  rationale: Conveys social association without sounding archaic. 'Mix with' is more
    literal but less idiomatic in contemporary English; 'associate' preserves the
    prohibition of close fellowship.
- source_word: ἐάν τις
  chosen: if anyone
  alternatives:
  - if someone
  lexicon: BDAG
  rationale: Standard conditional indefinite expression.
- source_word: ἀδελφὸς ὀνομαζόμενος
  chosen: who is called a brother
  alternatives:
  - a so-called brother
  - someone named a brother
  lexicon: BDAG
  rationale: Preserves the passive participle ὀνομαζόμενος and the familial term ἀδελφός.
    'Called a brother' communicates professed Christian identity without overinterpreting.
    'So-called brother' is possible but slightly more interpretive and pejorative.
- source_word: πόρνος
  chosen: sexually immoral
  alternatives:
  - fornicator
  - sexually immoral person
  lexicon: BDAG
  rationale: Readable modern English that captures the broad sexual-immorality sense
    of the term. 'Fornicator' is traditional but narrower and archaic for many readers.
- source_word: πλεονέκτης
  chosen: greedy
  alternatives:
  - covetous
  - an extortionate person
  lexicon: BDAG
  rationale: The term denotes one characterized by greed/covetousness. 'Greedy' is
    clear and contemporary; 'covetous' is more traditional but less common.
- source_word: εἰδωλολάτρης
  chosen: an idolater
  alternatives:
  - one who worships idols
  lexicon: BDAG
  rationale: Standard concise rendering with clear meaning in English.
- source_word: λοίδορος
  chosen: abusive
  alternatives:
  - reviler
  - slanderer
  - verbally abusive person
  lexicon: BDAG
  rationale: Denotes one who is verbally abusive or reviling. 'Abusive' is contemporary
    and broad enough to include reviling speech; 'reviler' is more formal but less
    natural.
- source_word: μέθυσος
  chosen: a drunkard
  alternatives:
  - one given to drunkenness
  - drunk
  lexicon: BDAG
  rationale: Refers to a person characterized by drunkenness, not merely someone momentarily
    drunk. 'Drunkard' preserves the habitual sense.
- source_word: ἅρπαξ
  chosen: a swindler
  alternatives:
  - robber
  - extortioner
  - predator
  lexicon: BDAG
  rationale: In vice lists and social context, the term often refers to one who seizes
    what belongs to others by exploitation or extortion. 'Swindler' communicates exploitative
    acquisitiveness in contemporary English better than the narrower 'robber.'
- source_word: τῷ τοιούτῳ
  chosen: such a person
  alternatives:
  - such a one
  lexicon: BDAG
  rationale: Natural English equivalent for the demonstrative phrase.
- source_word: μηδὲ συνεσθίειν
  chosen: not even to eat with
  alternatives:
  - not even to share a meal with
  lexicon: BDAG
  rationale: Keeps the concrete imagery of eating together while preserving the force
    of μηδέ. 'Share a meal' is slightly more dynamic; 'eat with' is closer to the
    Greek.
