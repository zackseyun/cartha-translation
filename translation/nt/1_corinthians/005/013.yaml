theological_decisions:
- issue: Nature of the command regarding church discipline
  chosen_reading: The verse commands the congregation to exclude the offending man
    from their fellowship, while leaving judgment of outsiders to God.
  alternative_readings:
  - The command could be read more generally as removing evil from the community without
    explicit formal exclusion.
  rationale: In context (1 Cor 5), Paul addresses a specific case of sexual immorality
    within the church and contrasts insiders, whom the church must judge, with outsiders,
    whom God judges. The imperative therefore concerns communal discipline, but the
    translation avoids importing later ecclesiastical terminology not present in the
    Greek.
  doctrine_reference: Translation philosophy §§1, 3, 4, 6
