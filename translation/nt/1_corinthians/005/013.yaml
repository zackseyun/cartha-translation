id: 1CO.5.13
reference: 1 Corinthians 5:13
source:
  edition: SBLGNT
  text: τοὺς δὲ ἔξω ὁ θεὸς ⸀κρίνει; ⸀ἐξάρατε τὸν πονηρὸν ἐξ ὑμῶν αὐτῶν.
translation:
  text: But God judges those outside. Remove the evil man from among yourselves.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'outsiders.'
    reason: lexical_alternative
  - marker: b
    text: The Greek verb is present ('judges'), though some translations render it
      'will judge' from the context.
    reason: lexical_alternative
  - marker: c
    text: Or 'Drive out the wicked man from your midst.' The wording echoes Deuteronomic
      covenant-purge formulas.
    reason: cross_reference
lexical_decisions:
- source_word: τοὺς ... ἔξω
  chosen: those outside
  alternatives:
  - outsiders
  - those who are outside
  lexicon: BDAG
  rationale: The articular adverb functions substantivally, referring to people outside
    the church community. 'Those outside' is natural English and preserves the relational
    sense without over-specifying.
- source_word: δὲ
  chosen: But
  alternatives:
  - Now
  - And
  lexicon: BDAG
  rationale: δέ marks a mild contrast with the previous verse's concern for judging
    those inside the church. 'But' best captures the contrast in context.
- source_word: κρίνει
  chosen: judges
  alternatives:
  - will judge
  lexicon: BDAG
  rationale: 'The present indicative is best rendered as a present gnomic statement:
    God judges those outside. Some English versions use a future sense from context,
    but the Greek form is present and should be preserved unless context compels otherwise.'
- source_word: ἐξάρατε
  chosen: Remove
  alternatives:
  - Drive out
  - Expel
  lexicon: BDAG
  rationale: The aorist imperative calls for decisive action. 'Remove' is direct,
    idiomatic, and broad enough to reflect exclusion from the community without adding
    procedural detail.
- source_word: τὸν πονηρὸν
  chosen: the evil man
  alternatives:
  - the wicked man
  - the evil person
  - the wicked person
  lexicon: BDAG
  rationale: The singular masculine with article likely refers concretely to the offending
    man in the immediate context, echoing the Deuteronomic formula. 'The evil man'
    preserves the masculine reference and the moral characterization. 'Person' would
    flatten the gender-specific reference present here.
- source_word: ἐξ ὑμῶν αὐτῶν
  chosen: from among yourselves
  alternatives:
  - from yourselves
  - from your midst
  lexicon: BDAG
  rationale: This idiom denotes removal from within the community. 'From among yourselves'
    is clear modern English and preserves the communal sense better than the more
    literal but less idiomatic 'from yourselves.'
