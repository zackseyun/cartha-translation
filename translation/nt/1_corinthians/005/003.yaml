id: 1CO.5.3
reference: 1 Corinthians 5:3
source:
  edition: SBLGNT
  text: Ἐγὼ μὲν γάρ, ⸀ἀπὼν τῷ σώματι παρὼν δὲ τῷ πνεύματι, ἤδη κέκρικα ὡς παρὼν τὸν
    οὕτως τοῦτο κατεργασάμενον
translation:
  text: For I, though absent in body but present in spirit, have already judged, as
    though present, the one who has done this in such a way.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'have already passed judgment.'
    reason: lexical_alternative
  - marker: b
    text: '''Present in spirit'' most likely refers to Paul''s own spirit rather than
      to the Holy Spirit.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπὼν τῷ σώματι
  chosen: absent in body
  alternatives:
  - absent from the body
  - not present bodily
  lexicon: BDAG
  rationale: A natural English rendering of the dative of respect/instrumental idea;
    'in body' preserves the concise contrast with 'in spirit' without implying death
    or metaphysical separation.
- source_word: παρὼν δὲ τῷ πνεύματι
  chosen: but present in spirit
  alternatives:
  - yet present in spirit
  - present in the spirit
  lexicon: BDAG
  rationale: The anarthrous πνεύματι here most naturally refers to Paul's own spirit
    rather than the Holy Spirit. 'Present in spirit' preserves the idiom and the rhetorical
    contrast with bodily absence.
- source_word: ἤδη κέκρικα
  chosen: have already judged
  alternatives:
  - have already decided
  - have already passed judgment
  lexicon: BDAG
  rationale: The perfect tense indicates a judgment already reached with continuing
    force. 'Judged' keeps close to κρίνω and fits the disciplinary context; 'passed
    judgment' is possible but slightly more interpretive.
- source_word: ὡς παρὼν
  chosen: as though present
  alternatives:
  - as if present
  - as one present
  lexicon: BDAG
  rationale: This captures Paul's claim that his judgment stands as if he were physically
    there. 'As though present' is idiomatic and preserves the comparative force of
    ὡς.
- source_word: τὸν ... κατεργασάμενον
  chosen: the one who has done
  alternatives:
  - the man who has done
  - the one who has committed
  lexicon: BDAG
  rationale: The participle functions substantivally. 'The one who has done' is sufficiently
    literal and avoids adding 'man' where the Greek participle itself already identifies
    the offender without needing an explicit noun.
- source_word: οὕτως τοῦτο
  chosen: this in such a way
  alternatives:
  - such a thing
  - this thing in this way
  lexicon: BDAG
  rationale: The adverb οὕτως intensifies the shocking manner of the act, while τοῦτο
    points to the deed itself. Rendering both elements avoids flattening the expression
    into merely 'such a thing.'
- source_word: γάρ
  chosen: For
  alternatives:
  - Indeed
  - Now
  lexicon: BDAG
  rationale: '''For'' best preserves the explanatory connection to the preceding context.'
- source_word: μὲν ... δὲ
  chosen: though ... but
  alternatives:
  - on the one hand ... on the other
  - indeed ... but
  lexicon: BDAG
  rationale: English usually does not preserve the particles mechanically. 'Though
    ... but' communicates the contrast naturally.
