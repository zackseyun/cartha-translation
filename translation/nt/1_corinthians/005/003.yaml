theological_decisions:
- issue: Meaning of 'present in spirit'
  chosen_reading: Paul means he is not physically present but is nevertheless spiritually
    present with the congregation in concern and judgment.
  alternative_readings:
  - Paul speaks by the Holy Spirit's presence or revelatory insight
  - Paul claims a stronger mystical presence among them
  rationale: The immediate contrast is between σώματι and πνεύματι, which most naturally
    refers to Paul's own bodily absence and non-bodily solidarity/attention. The translation
    preserves the phrase without importing a specific theory of spiritual presence.
  doctrine_reference: Preserve theological tension rather than resolve it.
