theological_decisions:
- issue: Passover/festival imagery in Paul's exhortation
  chosen_reading: Render ἑορτάζωμεν as 'let us keep the feast' and ἀζύμοις as 'the
    unleavened bread' to preserve the explicit Passover metaphor rather than flattening
    it to a generic moral exhortation.
  alternative_readings:
  - let us celebrate
  - let us observe the festival
  - but with unleavened sincerity and truth
  rationale: The immediate context identifies Messiah as the Passover lamb (v. 7),
    so preserving feast/unleavened imagery best reflects Paul's argument. Supplying
    'bread' is an interpretive but contextually warranted clarification, not a doctrinal
    expansion.
  doctrine_reference: Translation philosophy §§1, 5, 6
