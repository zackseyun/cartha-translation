id: 1CO.5.8
reference: 1 Corinthians 5:8
source:
  edition: SBLGNT
  text: ὥστε ἑορτάζωμεν, μὴ ἐν ζύμῃ παλαιᾷ μηδὲ ἐν ζύμῃ κακίας καὶ πονηρίας, ἀλλ’
    ἐν ἀζύμοις εἰλικρινείας καὶ ἀληθείας.
translation:
  text: Therefore let us keep the feast, not with old leaven, nor with the leaven
    of malice and wickedness, but with the unleavened bread of sincerity and truth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'let us celebrate' or 'let us observe the festival.' The Greek keeps
      Passover-festival imagery from the previous verse.
    reason: lexical_alternative
  - marker: b
    text: Greek 'with the unleavened [things] of sincerity and truth'; 'bread' is
      supplied in English to make the Passover image clear.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὥστε
  chosen: Therefore
  alternatives:
  - So then
  - Therefore then
  lexicon: BDAG
  rationale: Marks an inferential conclusion from the preceding argument; 'Therefore'
    is natural English and preserves the logical force.
- source_word: ἑορτάζωμεν
  chosen: let us keep the feast
  alternatives:
  - let us celebrate
  - let us observe the festival
  lexicon: BDAG
  rationale: 'Present subjunctive hortatory: ''let us ...''. The verb means to celebrate/keep
    a festival. ''Keep the feast'' preserves the Passover imagery developed in the
    context (vv. 7–8) more clearly than the more generic ''celebrate''.'
- source_word: ζύμῃ παλαιᾷ
  chosen: with old leaven
  alternatives:
  - in old leaven
  - with the old yeast
  lexicon: BDAG
  rationale: ζύμη is literally leaven/yeast. 'Leaven' better preserves the Passover/exodus
    metaphor and its biblical resonance. Although ἐν is literally 'in,' English idiom
    with this metaphor is better conveyed by 'with' here.
- source_word: μηδὲ ἐν ζύμῃ κακίας καὶ πονηρίας
  chosen: nor with the leaven of malice and wickedness
  alternatives:
  - nor with leaven of evil and wickedness
  - nor with the yeast of malice and evil
  lexicon: BDAG
  rationale: Maintains the repeated metaphor of leaven. κακία commonly denotes malice/badness
    of character; πονηρία denotes wickedness/evil. 'Malice and wickedness' gives a
    natural but distinct pairing in English without collapsing the two nouns.
- source_word: κακίας
  chosen: malice
  alternatives:
  - evil
  - badness
  lexicon: BDAG
  rationale: In vice contexts κακία often carries the sense of ill will or moral depravity;
    'malice' is a strong, idiomatic rendering that distinguishes it from πονηρία.
- source_word: πονηρίας
  chosen: wickedness
  alternatives:
  - evil
  - depravity
  lexicon: BDAG
  rationale: Chosen to preserve semantic distinction from κακία while keeping accessible
    modern English.
- source_word: ἀλλ’ ἐν ἀζύμοις
  chosen: but with the unleavened bread
  alternatives:
  - but in unleavened things
  - but with unleavened bread
  lexicon: BDAG
  rationale: Though ἀζύμοις is adjectival/substantival ('unleavened [things]'), in
    this Passover context English naturally supplies 'bread.' This makes the metaphor
    intelligible while staying close to the source imagery.
- source_word: εἰλικρινείας
  chosen: sincerity
  alternatives:
  - purity
  - integrity
  lexicon: BDAG
  rationale: A standard rendering in Pauline usage, conveying unmixed genuineness
    in contrast to corrupting leaven.
- source_word: ἀληθείας
  chosen: truth
  alternatives:
  - truthfulness
  lexicon: BDAG
  rationale: Direct and natural rendering; pairs well with 'sincerity' and preserves
    the genitival construction.
