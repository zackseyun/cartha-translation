theological_decisions:
- issue: Rendering πάσχα in relation to Christ
  chosen_reading: our Passover lamb
  alternative_readings:
  - our Passover
  - our Passover sacrifice
  rationale: The Greek says literally 'our Passover,' but in this context Paul is
    invoking sacrificial Passover imagery, reinforced by 'has been sacrificed.' Supplying
    'lamb' in English makes explicit what is contextually implicit and avoids an opaque
    rendering, while preserving the typological identification of Messiah with the
    Passover sacrifice.
  doctrine_reference: 'Translation philosophy: optimal equivalence; original-language
    primacy over translation tradition'
- issue: Rendering Χριστός
  chosen_reading: the Messiah
  alternative_readings:
  - Christ
  rationale: The project default is 'Messiah' where Χριστός functions as a title.
    In this verse the Passover framework foregrounds Jewish messianic and redemptive
    context, so 'the Messiah' best preserves meaning.
  doctrine_reference: 'DOCTRINE.md Contested terms: Χριστός → Messiah (where title;
    Christ where name-like)'
