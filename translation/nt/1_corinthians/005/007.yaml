id: 1CO.5.7
reference: 1 Corinthians 5:7
source:
  edition: SBLGNT
  text: ἐκκαθάρατε τὴν παλαιὰν ζύμην, ἵνα ἦτε νέον φύραμα, καθώς ἐστε ἄζυμοι. καὶ
    γὰρ τὸ πάσχα ⸀ἡμῶν ἐτύθη Χριστός·
translation:
  text: Clean out the old leaven, so that you may be a new batch, just as you are
    unleavened. For our Passover lamb, the Messiah, has been sacrificed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or simply, ''our Passover has been sacrificed: Christ.'' The Greek says
      ''our Passover,'' which may be understood as shorthand for the Passover lamb
      or Passover sacrifice.'
    reason: lexical_alternative
  - marker: b
    text: Greek 'Christos'; rendered 'the Messiah' here because the title sense is
      prominent in the Passover context.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐκκαθάρατε
  chosen: Clean out
  alternatives:
  - Purge out
  - Clear out
  lexicon: BDAG
  rationale: Aorist active imperative, second person plural; an urgent command to
    remove thoroughly. 'Clean out' is natural modern English and preserves the force
    without archaic tone. 'Purge out' is more traditional but less idiomatic.
- source_word: παλαιὰν ζύμην
  chosen: the old leaven
  alternatives:
  - the old yeast
  lexicon: BDAG
  rationale: ζύμη literally denotes leaven/yeast, but 'leaven' better preserves the
    Passover imagery and Paul's metaphorical continuity with unleavened bread. 'Old'
    reflects παλαιὰν and suggests the former corrupting influence.
- source_word: ἵνα ἦτε
  chosen: so that you may be
  alternatives:
  - that you may become
  lexicon: BDAG
  rationale: ἵνα with present subjunctive here expresses intended result/purpose.
    'So that you may be' is straightforward and fits the tension between ethical exhortation
    and existing identity in the next clause.
- source_word: νέον φύραμα
  chosen: a new batch
  alternatives:
  - a new lump
  - new dough
  lexicon: BDAG
  rationale: φύραμα refers to a mass of dough or batch. 'New batch' is idiomatic and
    understandable while retaining the baking metaphor. 'New lump' is overly literal
    in English.
- source_word: καθώς ἐστε ἄζυμοι
  chosen: just as you are unleavened
  alternatives:
  - since you are unleavened
  lexicon: BDAG
  rationale: καθώς most naturally means 'just as,' linking the exhortation to their
    present status. 'Unleavened' preserves the Passover imagery better than explanatory
    paraphrase.
- source_word: τὸ πάσχα ἡμῶν
  chosen: our Passover lamb
  alternatives:
  - our Passover
  - our Passover sacrifice
  lexicon: BDAG
  rationale: πάσχα can denote Passover, the Passover meal, or the Passover sacrifice/lamb.
    In context with ἐτύθη ('was sacrificed') and the unleavened imagery, English needs
    the sacrificial referent made explicit; 'our Passover lamb' best conveys Paul's
    meaning.
- source_word: ἐτύθη
  chosen: has been sacrificed
  alternatives:
  - was sacrificed
  - has been slain
  lexicon: BDAG
  rationale: Aorist passive of θύω, used for sacrificial slaughter. 'Has been sacrificed'
    communicates the sacrificial sense clearly and reads naturally in English; the
    perfect in English highlights abiding significance without distorting the event.
- source_word: Χριστός
  chosen: the Messiah
  alternatives:
  - Christ
  lexicon: BDAG
  rationale: Per project doctrine, Χριστός is rendered 'Messiah' where functioning
    as a title rather than a name-like form. Here it identifies Jesus in relation
    to Passover typology, so the titular sense is prominent.
