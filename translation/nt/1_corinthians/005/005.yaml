theological_decisions:
- issue: Meaning of 'destruction of the flesh'
  chosen_reading: Retain the ambiguous phrase 'destruction of the flesh' in the main
    text.
  alternative_readings:
  - physical affliction or death
  - destruction of the man's sinful/fleshly orientation
  rationale: The phrase likely refers to severe disciplinary consequences, but the
    Greek itself does not force a single interpretive resolution. In keeping with
    the translation philosophy, the main text preserves the tension rather than deciding
    between bodily judgment and mortification of sinful impulses.
  doctrine_reference: Translation philosophy §3; Contested terms table for σάρξ
- issue: Referent of 'the spirit'
  chosen_reading: Translate as 'the spirit' without adding 'his.'
  alternative_readings:
  - his spirit
  rationale: Although the context strongly suggests the offender's ultimate salvation,
    the Greek does not explicitly include a possessive pronoun. The translation preserves
    that restraint.
  doctrine_reference: Translation philosophy §1, §3
- issue: Eschatological phrase 'the day of the Lord'
  chosen_reading: Render τοῦ κυρίου as 'of the Lord' exactly as attested.
  alternative_readings:
  - of our Lord Jesus
  - of the Lord Jesus
  rationale: Some manuscripts expand the phrase, but the provided source text reads
    only 'of the Lord.' The translation follows the base text and avoids harmonizing
    or doctrinally motivated expansion.
  doctrine_reference: Translation philosophy §1
