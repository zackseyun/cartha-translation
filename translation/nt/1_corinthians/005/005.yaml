id: 1CO.5.5
reference: 1 Corinthians 5:5
source:
  edition: SBLGNT
  text: παραδοῦναι τὸν τοιοῦτον τῷ Σατανᾷ εἰς ὄλεθρον τῆς σαρκός, ἵνα τὸ πνεῦμα σωθῇ
    ἐν τῇ ἡμέρᾳ τοῦ ⸀κυρίου.
translation:
  text: to hand such a man over to Satan for the destruction of the flesh, so that
    the spirit may be saved in the day of the Lord.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for the ruin of the flesh.' The phrase may refer to severe bodily judgment,
      or more figuratively to the destruction of the man's fleshly/sinful orientation.
    reason: lexical_alternative
  - marker: b
    text: Some manuscripts read 'of our Lord Jesus' or 'of the Lord Jesus' instead
      of simply 'of the Lord.'
    reason: textual_variant
lexical_decisions:
- source_word: παραδοῦναι
  chosen: to hand ... over
  alternatives:
  - to deliver
  - to turn over
  lexicon: BDAG
  rationale: The aorist infinitive denotes the action Paul directs the assembly to
    take. 'Hand over' is idiomatic modern English and preserves the force of παραδίδωμι
    without sounding overly formal.
- source_word: τὸν τοιοῦτον
  chosen: such a man
  alternatives:
  - such a one
  - this man
  lexicon: BDAG
  rationale: The expression refers to the specific offender while retaining a somewhat
    categorical tone. 'Such a man' is natural English and keeps the masculine singular
    reference present in the Greek.
- source_word: Σατανᾷ
  chosen: Satan
  lexicon: BDAG
  rationale: Proper name transliterated by standard convention, in keeping with the
    translation philosophy for names.
- source_word: εἰς ὄλεθρον
  chosen: for the destruction
  alternatives:
  - for ruin
  - for destruction
  lexicon: BDAG
  rationale: ὄλεθρος can denote ruin or destruction. 'For the destruction' best matches
    the gravity of the disciplinary action while leaving open whether the effect is
    physical, social, or existential rather than specifying more than the Greek does.
- source_word: τῆς σαρκός
  chosen: of the flesh
  alternatives:
  - of his flesh
  - of the sinful nature
  lexicon: BDAG
  rationale: Per doctrine, σάρξ is rendered 'flesh' when possible and 'sinful nature'
    only when the metaphorical sense is clear. Here the phrase is debated between
    bodily affliction and destruction of fleshly/sinful orientation. The main text
    preserves the Greek's ambiguity with 'flesh'; alternatives are noted in a footnote.
- source_word: ἵνα
  chosen: so that
  alternatives:
  - in order that
  lexicon: BDAG
  rationale: Introduces purpose/result. 'So that' is clear modern English and preserves
    the clause's telic force.
- source_word: τὸ πνεῦμα
  chosen: the spirit
  alternatives:
  - his spirit
  lexicon: BDAG
  rationale: The Greek has the article with πνεῦμα but no explicit possessive pronoun.
    'The spirit' preserves the wording and leaves open whether Paul means the man's
    spirit specifically or speaks more generally of his inner person.
- source_word: σωθῇ
  chosen: may be saved
  alternatives:
  - might be saved
  lexicon: BDAG
  rationale: Aorist passive subjunctive after ἵνα, expressing intended outcome. 'May
    be saved' is natural and preserves the salvation language without overinterpreting
    the means.
- source_word: ἐν τῇ ἡμέρᾳ
  chosen: in the day
  alternatives:
  - on the day
  lexicon: BDAG
  rationale: A straightforward temporal phrase. 'In the day' is slightly more literal
    and idiomatic enough in eschatological context.
- source_word: τοῦ κυρίου
  chosen: of the Lord
  alternatives:
  - of our Lord
  - of the Lord Jesus
  lexicon: BDAG
  rationale: The SBLGNT text here reads simply κυρίου. Following the contested-terms
    guidance, κύριος is rendered 'Lord.' No expansion beyond the attested text is
    introduced.
