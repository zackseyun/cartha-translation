theological_decisions:
- issue: Nature of the requested action toward the offender
  chosen_reading: removed from among you
  alternative_readings:
  - excommunicated
  - taken away by God
  rationale: The passive ἀρθῇ could be read more generally, but in the immediate context
    of communal discipline (vv. 3–5, 13) the sense is removal from the congregation
    rather than a specifically divine act of death. The translation keeps the wording
    broad enough to reflect the Greek while fitting the context.
  doctrine_reference: Preserve theological tension rather than resolve it; optimal
    equivalence
