id: 1CO.5.2
reference: 1 Corinthians 5:2
source:
  edition: SBLGNT
  text: καὶ ὑμεῖς πεφυσιωμένοι ἐστέ, καὶ οὐχὶ μᾶλλον ἐπενθήσατε, ἵνα ⸀ἀρθῇ ἐκ μέσου
    ὑμῶν ὁ τὸ ἔργον τοῦτο ⸀ποιήσας;
translation:
  text: And you are puffed up, and should you not rather have mourned, so that the
    one who did this deed might be removed from among you?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'taken away from your midst.' In context this likely refers to removal
      from the congregation through discipline.
    reason: lexical_alternative
lexical_decisions:
- source_word: πεφυσιωμένοι
  chosen: puffed up
  alternatives:
  - arrogant
  - inflated with pride
  lexicon: BDAG
  rationale: The perfect passive participle conveys a settled state of being inflated
    with pride. 'Puffed up' preserves Paul's metaphor and matches his repeated usage
    in this letter better than the more interpretive 'arrogant.'
- source_word: οὐχὶ μᾶλλον
  chosen: should you not rather
  alternatives:
  - ought you not rather
  - rather than
  lexicon: BDAG
  rationale: This combination introduces a rebuking rhetorical question contrasting
    their actual attitude with the proper one. 'Should you not rather' communicates
    the expected response in natural English while preserving the rhetorical force.
- source_word: ἐπενθήσατε
  chosen: have mourned
  alternatives:
  - grieved
  - lamented
  lexicon: BDAG
  rationale: The aorist points to the response they should have made. 'Mourned' preserves
    the strong grief language, likely communal and penitential, stronger than the
    more general 'grieved.'
- source_word: ἵνα ἀρθῇ
  chosen: so that ... might be removed
  alternatives:
  - in order that ... may be taken away
  - so that ... might be taken out
  lexicon: BDAG
  rationale: ἵνα with the aorist passive subjunctive expresses intended result/purpose.
    'Removed' fits the disciplinary context and idiomatic English, while still reflecting
    the passive of αἴρω ('take away/remove').
- source_word: ἐκ μέσου ὑμῶν
  chosen: from among you
  alternatives:
  - out of your midst
  lexicon: BDAG
  rationale: This idiom refers to exclusion from the community. 'From among you' is
    clear modern English and preserves the communal sense.
- source_word: ὁ τὸ ἔργον τοῦτο ποιήσας
  chosen: the one who did this deed
  alternatives:
  - the man who did this act
  - the one who has done this thing
  lexicon: BDAG
  rationale: The substantival participle identifies the offender without repeating
    his name. 'The one who did this deed' is natural and retains the gravity of ἔργον
    without over-specifying gender in English beyond what the Greek construction itself
    requires in context.
