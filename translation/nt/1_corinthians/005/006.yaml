id: 1CO.5.6
reference: 1 Corinthians 5:6
source:
  edition: SBLGNT
  text: Οὐ καλὸν τὸ καύχημα ὑμῶν. οὐκ οἴδατε ὅτι μικρὰ ζύμη ὅλον τὸ φύραμα ζυμοῖ;
translation:
  text: Your boasting is not good. Do you not know that a little leaven leavens the
    whole batch of dough?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the whole lump.'
    reason: lexical_alternative
lexical_decisions:
- source_word: καλὸν
  chosen: good
  alternatives:
  - commendable
  - proper
  lexicon: BDAG
  rationale: καλός here evaluates the Corinthians' boasting morally/practically. 'Good'
    is the most natural and direct English equivalent in context.
- source_word: καύχημα
  chosen: boasting
  alternatives:
  - boast
  - ground for boasting
  lexicon: BDAG
  rationale: The noun denotes the act or matter of boasting. 'Boasting' fits the rebuking
    tone and reads naturally in English. 'Boast' is possible but slightly less idiomatic
    here.
- source_word: οὐκ οἴδατε
  chosen: Do you not know
  alternatives:
  - Do you not understand
  - Do you not realize
  lexicon: BDAG
  rationale: Although οἶδα can shade toward understanding, Paul commonly uses this
    formula rhetorically as 'Do you not know...?' Preserving that familiar form reflects
    the Greek and Paul's style.
- source_word: μικρὰ
  chosen: a little
  alternatives:
  - a small amount of
  - a little bit of
  lexicon: BDAG
  rationale: The idiomatic English expression with ζύμη is 'a little leaven.' This
    preserves the proverbial force without over-expansion.
- source_word: ζύμη
  chosen: leaven
  alternatives:
  - yeast
  lexicon: BDAG
  rationale: '''Leaven'' is more precise to the ancient baking image and preserves
    the biblical metaphorical resonance. ''Yeast'' is understandable but slightly
    modernizes the image.'
- source_word: ὅλον
  chosen: the whole
  alternatives:
  - all of the
  lexicon: BDAG
  rationale: ὅλος emphasizes totality. 'The whole' is concise and idiomatic with 'batch
    of dough.'
- source_word: φύραμα
  chosen: batch of dough
  alternatives:
  - lump
  - whole lump of dough
  lexicon: BDAG
  rationale: φύραμα refers to mixed dough. 'Batch of dough' communicates the sense
    clearly in modern English. 'Lump' is traditional and possible, but less transparent
    to contemporary readers.
- source_word: ζυμοῖ
  chosen: leavens
  alternatives:
  - works through
  - ferments
  lexicon: BDAG
  rationale: The verb is cognate with ζύμη and means to cause to be leavened. 'Leavens'
    preserves the lexical connection and the proverbial wording.
