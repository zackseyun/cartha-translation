theological_decisions:
- issue: Metaphorical image of leaven
  chosen_reading: Retain the leaven metaphor without explicating its moral referent
    in the translation.
  alternative_readings:
  - Interpretively expand to 'a little sin corrupts the whole church'
  rationale: Paul uses a proverbial statement whose application is clear from context,
    but the verse itself states the metaphor rather than its full interpretation.
    Optimal equivalence preserves the image and lets the context supply the referent.
  doctrine_reference: Translation philosophy items 1 and 3
