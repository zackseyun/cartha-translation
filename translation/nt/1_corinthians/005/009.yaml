id: 1CO.5.9
reference: 1 Corinthians 5:9
source:
  edition: SBLGNT
  text: Ἔγραψα ὑμῖν ἐν τῇ ἐπιστολῇ μὴ συναναμίγνυσθαι πόρνοις,
translation:
  text: I wrote to you in the letter not to associate with sexually immoral people,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in my letter.' The Greek can refer either to a previous letter Paul
      had sent or to this letter itself at an earlier point.
    reason: alternative_reading
  - marker: b
    text: Or 'not to keep company with' or 'not to mix with.'
    reason: lexical_alternative
  - marker: c
    text: Or 'the sexually immoral.' The Greek πόρνοις refers to people characterized
      by sexual immorality.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἔγραψα
  chosen: I wrote
  alternatives:
  - I have written
  lexicon: BDAG
  rationale: Aorist indicative naturally renders as simple past in English. Although
    some take it as epistolary or referential to a previous letter, the form itself
    is best translated straightforwardly as 'I wrote.'
- source_word: ὑμῖν
  chosen: to you
  lexicon: BDAG
  rationale: Dative pronoun marking the indirect object of the writing.
- source_word: ἐν τῇ ἐπιστολῇ
  chosen: in the letter
  alternatives:
  - in my letter
  - in the epistle
  lexicon: BDAG
  rationale: The phrase most naturally refers to a specific letter known to the Corinthians.
    'The letter' preserves the article and leaves open whether Paul means a previous
    letter or this correspondence at an earlier point. 'Epistle' is too archaic for
    the stated style goals.
- source_word: μὴ συναναμίγνυσθαι
  chosen: not to associate with
  alternatives:
  - not to mix with
  - not to keep company with
  lexicon: BDAG
  rationale: The present middle infinitive with μή expresses the content of Paul's
    instruction. 'Associate with' is natural modern English and captures the sense
    of social mixing/close company without sounding archaic.
- source_word: πόρνοις
  chosen: sexually immoral people
  alternatives:
  - fornicators
  - the sexually immoral
  - sexually immoral persons
  lexicon: BDAG
  rationale: πόρνος denotes one engaged in sexual immorality. 'Sexually immoral people'
    communicates the meaning in clear modern English. 'Fornicators' is traditional
    but narrower and archaic in contemporary usage. 'People' makes explicit the plural
    personal reference.
