theological_decisions:
- issue: Reference of 'the letter'
  chosen_reading: Paul refers to a specific letter known to the Corinthians, without
    specifying in translation whether it is a previous letter or this present correspondence.
  alternative_readings:
  - Paul refers to an earlier, now-lost letter
  - Paul refers to an earlier section of 1 Corinthians itself
  rationale: The Greek phrase ἐν τῇ ἐπιστολῇ is definite but does not by itself settle
    the historical question. The translation preserves the ambiguity rather than resolving
    it.
  doctrine_reference: Preserve theological tension rather than resolve it.
