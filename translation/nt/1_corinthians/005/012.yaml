theological_decisions:
- issue: Whether Paul's contrast is between the church and the world in matters of
    disciplinary judgment
  chosen_reading: The verse distinguishes those outside the church from those inside
    it, limiting the church's disciplinary judgment to its own community.
  alternative_readings:
  - A broader prohibition or permission regarding all moral judgment
  rationale: In context (1 Cor 5:9–13), Paul is addressing ecclesial discipline, not
    denying all forms of moral discernment regarding nonbelievers. The translation
    preserves the inside/outside contrast without importing a wider doctrinal claim
    than the text makes.
  doctrine_reference: Preserve theological tension rather than resolve it; do not
    import doctrinal claims the text does not make.
