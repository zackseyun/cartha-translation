id: 1CO.5.12
reference: 1 Corinthians 5:12
source:
  edition: SBLGNT
  text: τί γάρ ⸀μοι τοὺς ἔξω κρίνειν; οὐχὶ τοὺς ἔσω ὑμεῖς κρίνετε,
translation:
  text: For what is it to me to judge outsiders? Is it not those inside that you are
    to judge?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'For what have I to do with judging those outside?'
    reason: lexical_alternative
  - marker: b
    text: That is, those inside the church community.
    reason: cultural_note
lexical_decisions:
- source_word: τί γάρ μοι
  chosen: For what is it to me
  alternatives:
  - For what have I to do with
  - Why should I
  lexicon: BDAG
  rationale: The idiom τί ... μοι asks what something has to do with the speaker or
    what concern it is of his. 'For what is it to me' preserves the rhetorical force
    and the explanatory γάρ, while remaining natural English. Alternatives are possible,
    but this wording stays closer to the Greek structure without becoming wooden.
- source_word: τοὺς ἔξω
  chosen: outsiders
  alternatives:
  - those outside
  - the ones outside
  lexicon: BDAG
  rationale: ἔξω with the article functions substantivally for people outside the
    Christian community. 'Outsiders' is concise, idiomatic, and accurately conveys
    social/community location rather than mere physical position.
- source_word: κρίνειν
  chosen: to judge
  alternatives:
  - to evaluate
  - to pass judgment on
  lexicon: BDAG
  rationale: κρίνω here refers to rendering judgment in the disciplinary sense developed
    in the surrounding context. 'Judge' is the standard and sufficiently broad rendering;
    'pass judgment on' is more explicit but heavier.
- source_word: οὐχὶ
  chosen: Is it not
  alternatives:
  - Isn't it
  - Surely
  lexicon: BDAG
  rationale: οὐχί introduces a question expecting a positive answer. 'Is it not' preserves
    the rhetorical form with a slightly elevated but still readable tone appropriate
    to Paul's argument.
- source_word: τοὺς ἔσω
  chosen: those inside
  alternatives:
  - insiders
  - the ones inside
  lexicon: BDAG
  rationale: As the counterpart to τοὺς ἔξω, this refers to those inside the church
    community. 'Those inside' preserves the relational/community contrast clearly
    and pairs naturally with 'outsiders' in the previous clause.
- source_word: ὑμεῖς κρίνετε
  chosen: you are to judge
  alternatives:
  - you judge
  - you should judge
  lexicon: BDAG
  rationale: The present indicative in this rhetorical question can be heard either
    descriptively ('you judge') or with imperatival/obligational force in context.
    Because the surrounding passage concerns the church's responsibility in discipline,
    'you are to judge' best captures the expected duty while remaining faithful to
    the rhetorical question.
