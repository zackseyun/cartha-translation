id: 1CO.5.10
reference: 1 Corinthians 5:10
source:
  edition: SBLGNT
  text: ⸀οὐ πάντως τοῖς πόρνοις τοῦ κόσμου τούτου ἢ τοῖς πλεονέκταις ⸀καὶ ἅρπαξιν
    ἢ εἰδωλολάτραις, ἐπεὶ ⸀ὠφείλετε ἄρα ἐκ τοῦ κόσμου ἐξελθεῖν.
translation:
  text: not at all meaning the sexually immoral of this world, or the greedy and swindlers,
    or idolaters, since then you would have to go out of the world.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'robbers' or 'extortioners' for 'swindlers' (ἅρπαξιν); the term can denote
      those who seize from others by force or exploitation.
    reason: lexical_alternative
  - marker: b
    text: Paul is clarifying that he did not mean believers must avoid all immoral
      people outside the church; compare the application in 1 Corinthians 5:11.
    reason: cross_reference
lexical_decisions:
- source_word: οὐ πάντως
  chosen: not at all meaning
  alternatives:
  - not altogether
  - certainly not
  - not meaning absolutely
  lexicon: BDAG
  rationale: 'In context Paul clarifies a previous statement, not issuing an absolute
    exclusion from contact with all immoral people. The idiom here is best carried
    by an emphatic clarification: ''not at all meaning.'''
- source_word: πόρνοις
  chosen: the sexually immoral
  alternatives:
  - fornicators
  - the immoral
  lexicon: BDAG
  rationale: πόρνος refers to those engaged in sexual immorality. 'Sexually immoral'
    is clear modern English and preserves the sexual specificity better than the broader
    'immoral.'
- source_word: τοῦ κόσμου τούτου
  chosen: of this world
  alternatives:
  - of this age
  - worldly
  lexicon: BDAG
  rationale: κόσμος here denotes the human world-order/society outside the church.
    'Of this world' is the most natural and sufficiently literal rendering.
- source_word: πλεονέκταις
  chosen: the greedy
  alternatives:
  - the covetous
  - the grasping
  lexicon: BDAG
  rationale: πλεονέκτης denotes one who wants more, often with exploitative overtones.
    'Greedy' is idiomatic and accessible, while 'covetous' is more traditional but
    less natural in contemporary English.
- source_word: καὶ ἅρπαξιν
  chosen: and swindlers
  alternatives:
  - and robbers
  - and extortioners
  - and the greedy and swindlers
  lexicon: BDAG
  rationale: ἅρπαξ can denote a ravenous, grasping person, often one who seizes by
    force or exploitation. In this vice-list context, 'swindlers' captures exploitative
    acquisition in readable English better than the narrower 'robbers.'
- source_word: εἰδωλολάτραις
  chosen: idolaters
  alternatives:
  - those who worship idols
  lexicon: BDAG
  rationale: The standard rendering 'idolaters' is accurate, concise, and readily
    understood.
- source_word: ἐπεὶ
  chosen: since then
  alternatives:
  - otherwise
  - for then
  lexicon: BDAG
  rationale: ἐπεί introduces the consequence that would follow if his statement were
    taken absolutely. 'Since then' preserves the inferential force in natural English.
- source_word: ὠφείλετε
  chosen: you would have to
  alternatives:
  - you would be obligated to
  - you would owe it to
  lexicon: BDAG
  rationale: Though morphologically imperfect indicative, in this conditional-like
    argument it expresses practical necessity. 'Would have to' communicates the implied
    obligation naturally.
- source_word: ἐκ τοῦ κόσμου ἐξελθεῖν
  chosen: go out of the world
  alternatives:
  - leave the world
  - depart from the world
  lexicon: BDAG
  rationale: 'The phrase is intentionally stark and somewhat hyperbolic: to avoid
    all such people in society would require exiting the world itself. ''Go out of
    the world'' preserves the vividness and wording.'
