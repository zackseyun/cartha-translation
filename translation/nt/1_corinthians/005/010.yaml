theological_decisions:
- issue: Scope of separation commanded in the surrounding context
  chosen_reading: Paul denies that his earlier instruction meant total separation
    from immoral unbelievers in society.
  alternative_readings:
  - Paul commands complete social withdrawal from all immoral people
  rationale: The verse itself explicitly limits the prior instruction by saying that
    otherwise believers would need to leave the world. The translation therefore preserves
    the clarifying force and avoids implying sectarian withdrawal beyond what the
    text states.
  doctrine_reference: Translation philosophy §1, §3
