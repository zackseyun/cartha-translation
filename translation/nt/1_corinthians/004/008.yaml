id: 1CO.4.8
reference: 1 Corinthians 4:8
source:
  edition: SBLGNT
  text: Ἤδη κεκορεσμένοι ἐστέ, ἤδη ἐπλουτήσατε, χωρὶς ἡμῶν ἐβασιλεύσατε· καὶ ὄφελόν
    γε ἐβασιλεύσατε, ἵνα καὶ ἡμεῖς ὑμῖν συμβασιλεύσωμεν.
translation:
  text: Already you have had your fill; already you have become rich; apart from us
    you have begun to reign as kings. And I wish indeed that you had begun to reign,
    so that we also might reign with you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'without us.'
    reason: lexical_alternative
  - marker: b
    text: 'Paul speaks ironically: the Corinthians act as though they are already
      fully satisfied, rich, and reigning.'
    reason: cultural_note
  - marker: c
    text: Or 'Would that indeed you had reigned,' preserving the wish more formally.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἤδη
  chosen: Already
  alternatives:
  - Already now
  - By now
  lexicon: BDAG
  rationale: Retains Paul's ironic temporal emphasis at the head of the clauses; repeated
    in English for rhetorical force.
- source_word: κεκορεσμένοι ἐστέ
  chosen: you have had your fill
  alternatives:
  - you are filled
  - you are satisfied
  - you are already full
  lexicon: BDAG
  rationale: Perfect participle with εἰμί conveys a present state resulting from completion.
    'Have had your fill' communicates satiety idiomatically in modern English while
    preserving the irony better than the wooden 'are filled'.
- source_word: ἐπλουτήσατε
  chosen: you have become rich
  alternatives:
  - you became rich
  - you are rich
  lexicon: BDAG
  rationale: Aorist rendered with present-result nuance in context, matching the sequence
    of ironic claims. 'Become rich' preserves the verbal force better than a stative
    adjective alone.
- source_word: χωρὶς ἡμῶν
  chosen: apart from us
  alternatives:
  - without us
  lexicon: BDAG
  rationale: Both are viable; 'apart from us' sounds slightly more relational and
    rhetorical in English, matching Paul's rebuke that the Corinthians imagine themselves
    elevated independently of the apostles.
- source_word: ἐβασιλεύσατε
  chosen: you have begun to reign as kings
  alternatives:
  - you reigned
  - you have become kings
  - you have come to rule
  lexicon: BDAG
  rationale: The verb means 'to reign, rule as king.' English often needs an explicit
    royal phrase to convey the force of βασιλεύω. The perfect-like English rendering
    fits the ironic sequence and present situation Paul critiques.
- source_word: ὄφελόν γε
  chosen: And I wish indeed
  alternatives:
  - Would that indeed
  - If only
  lexicon: BDAG
  rationale: Idiomatic optative wish particle expressing earnest desire, here with
    irony shading into genuine longing. 'I wish indeed' is readable modern English
    and preserves the force of γε.
- source_word: ἐβασιλεύσατε
  chosen: you had begun to reign
  alternatives:
  - you were reigning
  - you had reigned
  lexicon: BDAG
  rationale: In the wish clause, English pluperfect-style wording naturally represents
    the unreal wish about a state Paul desires were truly present.
- source_word: ἵνα
  chosen: so that
  alternatives:
  - in order that
  lexicon: BDAG
  rationale: Introduces purpose/result of the wished-for reign; 'so that' is natural
    and sufficiently explicit.
- source_word: συμβασιλεύσωμεν
  chosen: we also might reign with you
  alternatives:
  - we also might rule with you
  - we also might become fellow-kings with you
  lexicon: BDAG
  rationale: The compound verb explicitly includes shared reign. 'Reign with you'
    is clear, natural, and preserves the συν- prefix.
