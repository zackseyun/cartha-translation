theological_decisions:
- issue: Tone of Paul's statements in the first three clauses
  chosen_reading: Render them as ironic assertions rather than straightforward commendation.
  alternative_readings:
  - Treat them as literal descriptions without marked irony
  rationale: The immediate context (4:7–13) strongly indicates sarcasm contrasting
    Corinthian self-perception with apostolic suffering. The English wording preserves
    that rhetorical tension without overexplaining it in the main text.
- issue: Sense of reigning language
  chosen_reading: Retain royal/reigning imagery rather than flattening to general
    success or status.
  alternative_readings:
  - Render more loosely as 'you have taken power' or 'you are on top'
  rationale: βασιλεύω and συμβασιλεύω carry explicit royal imagery, and the theological-rhetorical
    contrast depends on that imagery, likely with eschatological overtones. A looser
    idiom would undertranslate the text.
