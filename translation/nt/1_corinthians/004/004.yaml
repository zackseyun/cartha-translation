theological_decisions:
- issue: Forensic nuance of δεδικαίωμαι in relation to Paul's self-assessment
  chosen_reading: Rendered as 'I am not justified by this' to preserve the legal/forensic
    sense without turning the verse into a broader doctrinal statement about justification
    apart from works.
  alternative_readings:
  - I am not acquitted by this
  - I am not vindicated by this
  rationale: The immediate context concerns apostolic evaluation and judgment, so
    the term should retain legal weight while not importing later systematic categories
    beyond the verse's scope.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather
    than resolve it; consistency of key terms documented per verse.'
- issue: Identity of κύριος
  chosen_reading: Rendered as 'the Lord' without expanding to 'the Lord Jesus' in
    the main text.
  alternative_readings:
  - the Lord Jesus
  rationale: The Greek text says κύριος; while context in Paul may imply Christ, the
    translation should not import an explicit identification not stated in this verse.
  doctrine_reference: Never import doctrinal claims the text does not make.
