id: 1CO.4.4
reference: 1 Corinthians 4:4
source:
  edition: SBLGNT
  text: οὐδὲν γὰρ ἐμαυτῷ σύνοιδα, ἀλλ’ οὐκ ἐν τούτῳ δεδικαίωμαι, ὁ δὲ ἀνακρίνων με
    κύριός ἐστιν.
translation:
  text: For I am aware of nothing against myself, but I am not justified by this;
    the one who examines me is the Lord.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I am conscious of nothing in myself' or 'I know nothing against myself.'
    reason: lexical_alternative
  - marker: b
    text: Or 'I am not acquitted by this' or 'I am not vindicated by this.' The Greek
      uses a forensic term also used elsewhere in Paul for being justified.
    reason: lexical_alternative
  - marker: c
    text: Or 'the one who judges me'; the verb can mean examine, investigate, or evaluate
      in a judicial setting.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐδὲν
  chosen: nothing
  alternatives:
  - no thing
  - nothing at all
  lexicon: BDAG
  rationale: Accusative object of σύνοιδα; rendered simply as 'nothing' in idiomatic
    English while preserving the total negation.
- source_word: γὰρ
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: BDAG
  rationale: Marks explanation of the preceding statement; 'For' preserves the argumentative
    flow in Paul.
- source_word: ἐμαυτῷ
  chosen: against myself
  alternatives:
  - in myself
  - to myself
  - of myself
  lexicon: BDAG
  rationale: With σύνοιδα, the dative has the idiomatic sense 'be conscious to oneself'
    often in the sense of having something on one's conscience. 'Against myself' brings
    out the implied forensic/moral sense in context.
- source_word: σύνοιδα
  chosen: I am aware of
  alternatives:
  - I know
  - I am conscious of
  lexicon: BDAG
  rationale: Perfect with present sense. 'I am aware of' is natural modern English
    and captures the idiom 'be conscious of' without sounding wooden.
- source_word: ἀλλ’
  chosen: but
  alternatives:
  - yet
  - however
  lexicon: BDAG
  rationale: Simple adversative conjunction; 'but' best reflects the contrast.
- source_word: οὐκ ἐν τούτῳ
  chosen: not by this
  alternatives:
  - not in this
  - not because of this
  lexicon: BDAG
  rationale: The phrase indicates that Paul's lack of self-accusation is not the basis
    of the verdict. 'By this' conveys instrumental sense more clearly in English.
- source_word: δεδικαίωμαι
  chosen: I am not justified
  alternatives:
  - I am not acquitted
  - I am not vindicated
  - I am not declared righteous
  lexicon: BDAG
  rationale: Perfect passive of δικαιόω in a forensic context. 'Justified' preserves
    Paul's legal/theological diction and should not be flattened, though acquittal/vindication
    is contextually related.
- source_word: ὁ ... ἀνακρίνων με
  chosen: the one who examines me
  alternatives:
  - the one who judges me
  - the one who investigates me
  lexicon: BDAG
  rationale: ἀνακρίνω often means examine, question, or evaluate. Since Paul uses
    judicial-evaluative language in the context, 'examines' preserves the process
    of scrutiny without overstating final condemnation.
- source_word: κύριός
  chosen: the Lord
  alternatives:
  - Lord
  lexicon: BDAG
  rationale: Per doctrine, κύριος is rendered 'Lord.' The article in English is appropriate
    here because the referent is definite and identifiable.
