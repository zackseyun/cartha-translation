id: 1CO.4.9
reference: 1 Corinthians 4:9
source:
  edition: SBLGNT
  text: δοκῶ ⸀γάρ, ὁ θεὸς ἡμᾶς τοὺς ἀποστόλους ἐσχάτους ἀπέδειξεν ὡς ἐπιθανατίους,
    ὅτι θέατρον ἐγενήθημεν τῷ κόσμῳ καὶ ἀγγέλοις καὶ ἀνθρώποις.
translation:
  text: For it seems to me that God has displayed us apostles last of all, like men
    sentenced to death, because we have become a spectacle to the world, both to angels
    and to men.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'those doomed to die' for 'men sentenced to death.' The Greek ἐπιθανατίους
      refers to persons appointed for death, likely with arena imagery.
    reason: lexical_alternative
  - marker: b
    text: Or 'a theater' more literally; the sense is 'a public spectacle.'
    reason: lexical_alternative
  - marker: c
    text: '''Men'' here translates ἀνθρώποις in contrast with ''angels,'' meaning
      human beings generally.'
    reason: lexical_alternative
lexical_decisions:
- source_word: δοκῶ γάρ
  chosen: For it seems to me
  alternatives:
  - For I think
  - For I consider
  lexicon: BDAG
  rationale: Renders the first-person verb with natural English while preserving Paul's
    personal assessment; γάρ is represented by 'For' to maintain the explanatory connection.
- source_word: ὁ θεὸς
  chosen: God
  lexicon: BDAG
  rationale: Straightforward nominative subject; no article is needed in English.
- source_word: ἡμᾶς τοὺς ἀποστόλους
  chosen: us apostles
  alternatives:
  - us, the apostles
  - we apostles
  lexicon: BDAG
  rationale: Keeps the appositional force of the accusative phrase and preserves Paul's
    identification of his group specifically as apostles.
- source_word: ἐσχάτους
  chosen: last of all
  alternatives:
  - last
  - at the end
  lexicon: BDAG
  rationale: Expresses both the superlative/comparative force and the rhetorical emphasis
    that the apostles are put in the lowest, final place.
- source_word: ἀπέδειξεν
  chosen: has displayed
  alternatives:
  - has exhibited
  - has presented
  lexicon: BDAG
  rationale: Conveys public presentation or exhibition in a way that fits the following
    imagery of spectacle and theater. The perfect-like English present perfect reads
    naturally with ongoing rhetorical effect, though the Greek is aorist.
- source_word: ὡς ἐπιθανατίους
  chosen: like men sentenced to death
  alternatives:
  - as those doomed to die
  - as death-marked men
  lexicon: BDAG
  rationale: Captures the idiomatic sense of people appointed for death, likely evoking
    condemned persons in a public arena. 'Men' is retained because the referent is
    the masculine group 'apostles' rather than generic humanity.
- source_word: ὅτι
  chosen: because
  alternatives:
  - for
  - since
  lexicon: BDAG
  rationale: Introduces the explanatory ground for the preceding claim in clear English.
- source_word: θέατρον ἐγενήθημεν
  chosen: we have become a spectacle
  alternatives:
  - we have become a theater
  - we were made a spectacle
  lexicon: BDAG
  rationale: 'Translates the metaphor idiomatically: not literally ''theater'' as
    a building, but a public spectacle exposed for viewing.'
- source_word: τῷ κόσμῳ
  chosen: to the world
  alternatives:
  - for the world
  lexicon: BDAG
  rationale: 'Dative of reference/audience: the apostles are a spectacle before the
    world.'
- source_word: καὶ ἀγγέλοις καὶ ἀνθρώποις
  chosen: both to angels and to men
  alternatives:
  - and to angels and to people
  - and to angels and to human beings
  lexicon: BDAG
  rationale: Preserves the threefold audience structure. 'Men' is retained as a conventional
    rendering of ἀνθρώποις here in contrast with angels; the contrast is between heavenly
    and human observers, not male humans specifically.
