theological_decisions:
- issue: Meaning of ἀγγέλοις
  chosen_reading: angels refers to heavenly beings observing the apostles' public
    humiliation
  alternative_readings:
  - angels could be understood more generally as messengers
  rationale: In Paul's usage and in the collocation with 'world' and 'men,' the natural
    reading is supernatural angelic beings as part of the cosmic audience. No doctrinally
    tendentious expansion is added beyond the text.
