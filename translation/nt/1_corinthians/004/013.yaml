theological_decisions:
- issue: How to render the paired degradation terms περικαθάρματα / περίψημα
  chosen_reading: Render as vivid social-abjection language ('refuse' / 'scum') without
    importing the debated technical idea of sacrificial expiatory victims into the
    main text.
  alternative_readings:
  - Translate more literally/traditionally as 'filth' and 'offscouring'
  - Interpret as alluding to ritual scapegoat or expiatory refuse and reflect that
    in the main text
  rationale: The verse emphasizes the apostles' humiliation and contempt in the eyes
    of the world. While these rare terms may have background associations with that
    which is removed in purification or even with scapegoat-like usage, the immediate
    rhetorical point is social worthlessness, not a doctrinal statement about atonement.
    Therefore the main text should preserve the vivid abasement while any possible
    technical nuance belongs in a footnote.
