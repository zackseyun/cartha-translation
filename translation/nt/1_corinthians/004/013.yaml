id: 1CO.4.13
reference: 1 Corinthians 4:13
source:
  edition: SBLGNT
  text: ⸀δυσφημούμενοι παρακαλοῦμεν· ὡς περικαθάρματα τοῦ κόσμου ἐγενήθημεν, πάντων
    περίψημα ἕως ἄρτι.
translation:
  text: When slandered, we appeal gently; we have become like the world's refuse,
    the scum of all things, until now.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'when defamed, we entreat.' The Greek verb can mean 'appeal,' 'urge,'
      or 'encourage'; here it likely describes a gentle, non-retaliatory response
      to abuse.
    reason: lexical_alternative
  - marker: b
    text: The paired terms translated 'refuse' and 'scum' are rare and very strong,
      traditionally rendered 'filth' and 'offscouring.' They may also echo what is
      scraped off in cleansing, underscoring extreme social contempt.
    reason: cultural_note
lexical_decisions:
- source_word: δυσφημούμενοι
  chosen: When slandered
  alternatives:
  - when defamed
  - when reviled
  lexicon: BDAG
  rationale: Passive participle indicating being spoken against abusively or maliciously.
    'Slandered' captures hostile speech with reputational injury more precisely than
    the broader 'reviled.' Rendering the participle temporally with 'When ...' is
    natural English and preserves the adverbial force.
- source_word: παρακαλοῦμεν
  chosen: we appeal gently
  alternatives:
  - we encourage
  - we entreat
  - we plead
  lexicon: BDAG
  rationale: In this contrast sequence Paul describes his response to mistreatment.
    Here παρακαλέω is best taken as conciliatory address rather than comfort given
    to others. 'Appeal gently' conveys earnest, non-retaliatory speech in context
    better than the more generic 'encourage.' The adverb 'gently' is implicit in the
    conciliatory sense and helps readable English without substantially expanding
    the meaning.
- source_word: ὡς
  chosen: like
  alternatives:
  - as
  lexicon: BDAG
  rationale: Introduces comparison rather than strict identity. 'Like' makes the simile
    clearer in English, though the clause still communicates the depth of their social
    degradation.
- source_word: περικαθάρματα
  chosen: refuse
  alternatives:
  - filth
  - offscouring
  - sweepings
  lexicon: BDAG
  rationale: The noun denotes what is removed by cleansing, something like scrapings
    or refuse, and in context carries the sense of something socially abject. 'Refuse'
    is modern and accessible while retaining the force of worthlessness.
- source_word: τοῦ κόσμου
  chosen: the world's
  alternatives:
  - of the world
  lexicon: BDAG
  rationale: Genitive of relation/possession. The contracted English form is idiomatic
    and preserves the sense.
- source_word: ἐγενήθημεν
  chosen: we have become
  alternatives:
  - we became
  lexicon: BDAG
  rationale: Aorist middle in context summarizes the result of apostolic suffering
    up to the present. English present perfect expresses the resultant state naturally,
    especially with ἕως ἄρτι later in the sentence.
- source_word: πάντων
  chosen: of all things
  alternatives:
  - of everyone
  - of all people
  lexicon: BDAG
  rationale: The genitive plural of πᾶς is formally broad and likely neuter by sense
    in the paired expression, intensifying universality. 'Of all things' preserves
    the sweeping scope without narrowing it to persons alone.
- source_word: περίψημα
  chosen: the scum
  alternatives:
  - dregs
  - scrapings
  - offscouring
  lexicon: BDAG
  rationale: This rare term is near-synonymous with περικάθαρμα and denotes what is
    wiped off or regarded as vile residue. 'Scum' is strong, vivid, and understandable
    in contemporary English, preserving the rhetorical sting.
- source_word: ἕως ἄρτι
  chosen: until now
  alternatives:
  - up to this moment
  lexicon: BDAG
  rationale: Standard temporal expression indicating continuation to the present moment
    of writing. 'Until now' is idiomatic and concise.
