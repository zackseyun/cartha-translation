id: 1CO.4.6
reference: 1 Corinthians 4:6
source:
  edition: SBLGNT
  text: Ταῦτα δέ, ἀδελφοί, μετεσχημάτισα εἰς ἐμαυτὸν καὶ ⸀Ἀπολλῶν δι’ ὑμᾶς, ἵνα ἐν
    ἡμῖν μάθητε τό· Μὴ ὑπὲρ ⸀ἃ ⸀γέγραπται, ἵνα μὴ εἷς ὑπὲρ τοῦ ἑνὸς φυσιοῦσθε κατὰ
    τοῦ ἑτέρου.
translation:
  text: 'Now these things, brothers, I have applied to myself and Apollos for your
    sake, so that in us you may learn this: “Do not go beyond what is written,” so
    that none of you may be puffed up in favor of one against another.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'brothers and sisters'; Greek 'brothers' can address a mixed group.
    reason: cultural_note
  - marker: b
    text: 'Greek is elliptical: literally, ''the “not beyond what is written.”'' It
      may reflect a slogan or maxim.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ταῦτα
  chosen: these things
  alternatives:
  - this
  lexicon: BDAG
  rationale: Plural demonstrative referring back to the preceding discussion; 'these
    things' preserves the anaphoric breadth better than a singular summary.
- source_word: ἀδελφοί
  chosen: brothers
  alternatives:
  - brothers and sisters
  lexicon: BDAG
  rationale: Gender-accurate per project philosophy. The vocative plural addresses
    the Corinthian believers, likely mixed, but the Greek form is masculine; 'brothers'
    keeps the source form, with inclusivity explainable in a footnote.
- source_word: μετεσχημάτισα
  chosen: have applied
  alternatives:
  - have transferred
  - have adapted figuratively
  - have used by way of illustration
  lexicon: BDAG
  rationale: In context Paul says he has recast the preceding discussion with reference
    to himself and Apollos. 'Have applied' communicates this rhetorical transfer clearly
    in modern English without over-paraphrasing.
- source_word: εἰς ἐμαυτὸν καὶ Ἀπολλῶν
  chosen: to myself and Apollos
  alternatives:
  - to myself and Apollos by way of figure
  - with reference to myself and Apollos
  lexicon: BDAG
  rationale: The preposition with the verb indicates the figurative application concerns
    Paul and Apollos. 'To myself and Apollos' is concise and natural in English.
- source_word: δι’ ὑμᾶς
  chosen: for your sake
  alternatives:
  - for you
  - because of you
  lexicon: BDAG
  rationale: διά with accusative here expresses benefit/purpose in context; 'for your
    sake' makes the pastoral intent explicit and idiomatic.
- source_word: ἵνα ἐν ἡμῖν μάθητε
  chosen: so that in us you may learn
  alternatives:
  - so that by us you may learn
  - so that from our example you may learn
  lexicon: BDAG
  rationale: Retains the purpose clause and preserves the somewhat compressed Greek
    sense that Paul and Apollos serve as the sphere/example in which the lesson is
    learned.
- source_word: τό· Μὴ ὑπὲρ ἃ γέγραπται
  chosen: 'this: “Do not go beyond what is written,”'
  alternatives:
  - the saying, 'Nothing beyond what is written'
  - this, 'Not beyond what is written'
  lexicon: BDAG
  rationale: The article τό introduces the content of what they are to learn. Rendering
    it with a colon and quotation gives intelligible English. 'Do not go beyond what
    is written' supplies the implied verbal force commonly understood in this elliptical
    construction while preserving the admonitory force.
- source_word: γέγραπται
  chosen: is written
  alternatives:
  - has been written
  lexicon: BDAG
  rationale: Perfect passive commonly functions as a scriptural formula. 'Is written'
    is standard and natural in English for this idiom.
- source_word: φυσιοῦσθε
  chosen: be puffed up
  alternatives:
  - be arrogant
  - become conceited
  lexicon: BDAG
  rationale: Paul uses this verb repeatedly in Corinthians with the metaphor of inflation;
    'puffed up' preserves both lexical consistency and Pauline imagery better than
    the flatter 'arrogant'.
- source_word: ὑπὲρ τοῦ ἑνὸς
  chosen: in favor of one
  alternatives:
  - for the one
  - on behalf of one
  lexicon: BDAG
  rationale: In the factional context, the sense is partisan preference. 'In favor
    of one' makes the relational force clear.
- source_word: κατὰ τοῦ ἑτέρου
  chosen: against another
  alternatives:
  - against the other
  lexicon: BDAG
  rationale: The contrast is between one party and another in the community. 'Another'
    reads naturally in English while preserving the adversative sense.
