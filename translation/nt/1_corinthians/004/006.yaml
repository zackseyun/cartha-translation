theological_decisions:
- issue: Meaning of the elliptical clause τό· Μὴ ὑπὲρ ἃ γέγραπται
  chosen_reading: 'Render as an admonition: ''Do not go beyond what is written.'''
  alternative_readings:
  - Render more literally as 'the not beyond what is written'
  - 'Treat as a slogan: ''Nothing beyond what is written'''
  rationale: 'The Greek is compressed and debated, but the clause most naturally functions
    as the lesson Paul wants them to learn from his example: not to exceed scriptural
    bounds. The imperative-like English makes the sense clear without importing extra
    doctrinal content.'
