id: 1CO.4.17
reference: 1 Corinthians 4:17
source:
  edition: SBLGNT
  text: διὰ τοῦτο ἔπεμψα ὑμῖν Τιμόθεον, ὅς ἐστίν ⸂μου τέκνον⸃ ἀγαπητὸν καὶ πιστὸν
    ἐν κυρίῳ, ὃς ὑμᾶς ἀναμνήσει τὰς ὁδούς μου τὰς ἐν Χριστῷ ⸀Ἰησοῦ, καθὼς πανταχοῦ
    ἐν πάσῃ ἐκκλησίᾳ διδάσκω.
translation:
  text: For this reason I sent Timothy to you, who is my beloved and faithful child
    in the Lord. He will remind you of my ways in Messiah Jesus, just as I teach everywhere
    in every church.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my beloved and faithful son in the Lord.' The Greek τέκνον more literally
      means 'child,' though in context it can be rendered 'son.'
    reason: lexical_alternative
  - marker: b
    text: Or 'in Christ Jesus.' The Greek title Χριστός is rendered 'Messiah' here
      to preserve its meaning.
    reason: lexical_alternative
lexical_decisions:
- source_word: διὰ τοῦτο
  chosen: For this reason
  alternatives:
  - Because of this
  - Therefore
  lexicon: BDAG
  rationale: A natural causal connector that preserves the backward reference to the
    preceding argument without sounding wooden.
- source_word: ἔπεμψα
  chosen: I sent
  alternatives:
  - I have sent
  lexicon: BDAG
  rationale: Aorist is best rendered as simple past here in straightforward narrative/epistolary
    reference.
- source_word: Τιμόθεον
  chosen: Timothy
  rationale: Standard English transliteration of the personal name.
- source_word: τέκνον
  chosen: child
  alternatives:
  - son
  lexicon: BDAG
  rationale: τέκνον denotes child rather than specifically son. Although Timothy is
    male, 'child' preserves Paul's familial metaphor without importing the more specific
    υἱός sense.
- source_word: ἀγαπητὸν
  chosen: beloved
  alternatives:
  - dear
  - loved
  lexicon: BDAG
  rationale: Beloved retains both affection and the elevated relational tone common
    in Pauline usage.
- source_word: πιστὸν
  chosen: faithful
  alternatives:
  - trustworthy
  lexicon: BDAG
  rationale: Faithful fits the ministry context and pairs naturally with 'beloved'
    in describing Timothy's reliability in the Lord.
- source_word: ἐν κυρίῳ
  chosen: in the Lord
  lexicon: BDAG
  rationale: Standard Pauline locution indicating Timothy's relationship and sphere
    of life/service under the Lord.
- source_word: ἀναμνήσει
  chosen: will remind
  alternatives:
  - will call to mind for you
  - will remind you again
  lexicon: BDAG
  rationale: Future active indicates Timothy's intended action on arrival; 'remind'
    is the most direct idiomatic equivalent.
- source_word: τὰς ὁδούς μου
  chosen: my ways
  alternatives:
  - my manner of life
  - my conduct
  lexicon: BDAG
  rationale: Literal 'ways' is clear in English and preserves the metaphorical breadth
    of Paul's patterns of life and ministry.
- source_word: τὰς ἐν Χριστῷ Ἰησοῦ
  chosen: in Messiah Jesus
  alternatives:
  - in Christ Jesus
  lexicon: BDAG
  rationale: Χριστῷ is titular here, so per project guidance it is translated 'Messiah'
    rather than transliterated 'Christ.' The phrase modifies Paul's ways as defined
    by union with and service to Messiah Jesus.
- source_word: καθὼς
  chosen: just as
  alternatives:
  - as
  - in the way that
  lexicon: BDAG
  rationale: Marks correspondence between Timothy's reminder and Paul's universal
    teaching practice.
- source_word: πανταχοῦ
  chosen: everywhere
  alternatives:
  - in every place
  lexicon: BDAG
  rationale: Straightforward idiomatic equivalent preserving the universal scope.
- source_word: ἐν πάσῃ ἐκκλησίᾳ
  chosen: in every church
  alternatives:
  - in each church
  - in every assembly
  lexicon: BDAG
  rationale: ἐκκλησία in Pauline usage ordinarily refers to the gathered church/community;
    'church' is the clearest modern rendering here.
- source_word: διδάσκω
  chosen: I teach
  alternatives:
  - I am teaching
  lexicon: BDAG
  rationale: Present tense expresses Paul's customary practice; English simple present
    communicates this well.
