theological_decisions:
- issue: Rendering Χριστός in the phrase ἐν Χριστῷ Ἰησοῦ
  chosen_reading: Messiah Jesus
  alternative_readings:
  - Christ Jesus
  rationale: The project's default is to translate Χριστός as 'Messiah' where it functions
    as a title rather than a name-like form. In this verse the phrase still carries
    titular force, identifying the sphere and source of Paul's apostolic pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: Χριστός → Messiah (where title;
    Christ where name-like)'
- issue: Meaning of 'my ways'
  chosen_reading: Paul's patterns of life and teaching in union with Messiah, not
    merely travel routes or private habits
  alternative_readings:
  - my conduct
  - my manner of life
  rationale: ὁδοί is metaphorical in context, referring to Paul's established apostolic
    practice and instruction. The translation preserves the metaphor while the rationale
    clarifies the sense.
