theological_decisions:
- issue: Representative singular and gender accuracy
  chosen_reading: that one be found faithful
  alternative_readings:
  - that a man be found faithful
  - that they be found faithful
  rationale: The Greek uses an indefinite singular with a masculine adjective, but the referent is generic rather than specifically male. Following the gender-accurate philosophy, 'one' preserves the singular representative force without incorrectly restricting the statement to males or flattening it into a plural.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
revisions:
- timestamp: '2026-04-21T00:35:47Z'
  adjudicator: auto_apply_tier1
