id: 1CO.4.2
reference: 1 Corinthians 4:2
source:
  edition: SBLGNT
  text: ⸀ὧδε λοιπὸν ζητεῖται ἐν τοῖς οἰκονόμοις ἵνα πιστός τις εὑρεθῇ.
translation:
  text: Furthermore, in this case, it is required of stewards that one be found faithful.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Here, moreover,” or “In this matter, then.”
    reason: lexical_alternative
  - marker: b
    text: Lit. “it is sought among stewards”; that is, this is what is expected or required of them.
    reason: lexical_alternative
  - marker: c
    text: Or 'In this case, moreover,'.
    reason: previous_rendering
lexical_decisions:
- source_word: ὧδε
  chosen: In this case
  alternatives:
  - here
  - in this matter
  lexicon: BDAG
  rationale: In context Paul is drawing an inference from the preceding discussion about apostles as servants of Messiah and stewards of God's mysteries. ὧδε can mean 'here' or 'in this matter/way'; 'In this case' conveys the contextual, discourse-level sense more naturally in modern English than a purely spatial 'here'.
- source_word: λοιπὸν
  chosen: moreover
  alternatives:
  - furthermore
  - as for the rest
  - now
  lexicon: BDAG
  rationale: λοιπὸν here functions adverbially to advance the argument rather than merely mark time. 'Moreover' preserves the connective force without awkwardness.
- source_word: ζητεῖται
  chosen: it is required
  alternatives:
  - it is sought
  - one seeks
  - it is looked for
  lexicon: BDAG
  rationale: Although ζητέω literally means 'seek,' in this idiom it denotes what is expected or demanded of stewards. 'It is required' best captures the idiomatic sense in clear English.
- source_word: ἐν τοῖς οἰκονόμοις
  chosen: of stewards
  alternatives:
  - among stewards
  - in stewards
  lexicon: BDAG
  rationale: The preposition ἐν with this passive construction can indicate the sphere or class in which the requirement applies. English idiom favors 'required of stewards' rather than a more literal but less natural 'sought among stewards.' 'Stewards' preserves the household-management metaphor.
- source_word: οἰκονόμοις
  chosen: stewards
  alternatives:
  - managers
  - household managers
  lexicon: BDAG
  rationale: '''Stewards'' is the established and still understandable term that preserves the metaphor of entrusted management, fitting the immediate context of entrusted mysteries.'
- source_word: ἵνα
  chosen: that
  alternatives:
  - so that
  lexicon: BDAG
  rationale: After ζητεῖται, ἵνα introduces the content of what is required. 'That' is the most natural English complementizer here.
- source_word: πιστός
  chosen: faithful
  alternatives:
  - trustworthy
  - reliable
  lexicon: BDAG
  rationale: πιστός in this context emphasizes reliability in fulfilling a trust. 'Faithful' is the standard rendering and carries the covenantal and moral weight appropriately. While related to the contested term πίστις, this adjective is not itself part of the doctrine table's preserved-footnote requirement here.
- source_word: τις
  chosen: one
  alternatives:
  - a person
  - someone
  - anyone
  lexicon: BDAG
  rationale: τις is indefinite singular. 'One' preserves the generic singular form of the Greek and avoids introducing unnecessary pluralization.
- source_word: εὑρεθῇ
  chosen: be found
  alternatives:
  - be shown to be
  - be discovered to be
  lexicon: BDAG
  rationale: The passive subjunctive naturally yields 'be found,' conveying the idea of being found upon examination or evaluation.
