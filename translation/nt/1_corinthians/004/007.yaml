theological_decisions:
- issue: Nature of Paul's rebuke concerning human superiority and gifts
  chosen_reading: The verse is rendered to stress that any distinction, possession,
    or status is received rather than self-originated, without specifying whether
    Paul means spiritual gifts alone or all advantages more broadly.
  alternative_readings:
  - Restrict the sense to spiritual gifts or ministry roles
  - Broaden the sense to every ability, status, and blessing
  rationale: The immediate context concerns apostolic ministry, boasting, and factional
    pride, but Paul's wording is general. The translation preserves that breadth and
    does not narrow the theology beyond the text.
