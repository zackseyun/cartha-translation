id: 1CO.4.7
reference: 1 Corinthians 4:7
source:
  edition: SBLGNT
  text: τίς γάρ σε διακρίνει; τί δὲ ἔχεις ὃ οὐκ ἔλαβες; εἰ δὲ καὶ ἔλαβες, τί καυχᾶσαι
    ὡς μὴ λαβών;
translation:
  text: For who makes you different? And what do you have that you did not receive?
    And if you did receive it, why do you boast as if you had not received it?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'For who distinguishes you?' The Greek verb can mean 'distinguishes,'
      'differentiates,' or 'makes distinct.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τίς γάρ σε διακρίνει
  chosen: For who makes you different?
  alternatives:
  - For who distinguishes you?
  - For who sets you apart?
  lexicon: BDAG
  rationale: διακρίνω here is transitive with σε and in context asks what basis the
    Corinthian has for superiority over others. 'Makes you different' communicates
    the comparative sense in natural English, while preserving the rhetorical force.
    'For' reflects γάρ as grounding the preceding rebuke.
- source_word: τί δὲ ἔχεις
  chosen: And what do you have
  alternatives:
  - But what do you have
  lexicon: BDAG
  rationale: δὲ is lightly connective here; 'And' fits English rhetorical flow better
    than an adversative 'But' while still preserving the sequence of questions.
- source_word: ὃ οὐκ ἔλαβες
  chosen: that you did not receive
  alternatives:
  - that you have not received
  lexicon: BDAG
  rationale: Aorist ἔλαβες points to reception as a completed act; English idiom prefers
    simple past here. The relative clause underscores that all possessions or endowments
    are received, not self-generated.
- source_word: εἰ δὲ καὶ ἔλαβες
  chosen: And if you did receive it
  alternatives:
  - But if indeed you received it
  - And if in fact you received it
  lexicon: BDAG
  rationale: καὶ with εἰ adds emphasis rather than mere addition; 'did receive' brings
    out the emphatic concessive force in idiomatic English. 'It' is supplied for smooth
    English, referring back to the implied thing possessed.
- source_word: τί καυχᾶσαι
  chosen: why do you boast
  alternatives:
  - why are you boasting
  lexicon: BDAG
  rationale: καυχᾶσαι is present middle/deponent; 'boast' is the standard Pauline
    rendering and captures the ongoing attitude being rebuked.
- source_word: ὡς μὴ λαβών
  chosen: as if you had not received it
  alternatives:
  - as though not having received it
  lexicon: BDAG
  rationale: 'The participial phrase expresses contrary-to-fact manner: they boast
    as though they were not recipients. English pluperfect best conveys the sense.
    ''It'' is again supplied from context for naturalness.'
