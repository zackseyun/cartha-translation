theological_decisions:
- issue: Scope and timing of judgment
  chosen_reading: Paul prohibits premature human judgment in view of the Lord’s future
    coming and disclosure, without denying all forms of discernment elsewhere.
  alternative_readings:
  - Paul forbids every kind of judgment absolutely
  - Paul refers only to apostolic evaluation
  rationale: The immediate context concerns evaluation before the eschatological unveiling.
    The translation keeps the wording broad ('do not judge anything before the appointed
    time') while anchoring the limitation in the temporal clause 'until the Lord comes.'
- issue: Identity of 'the Lord'
  chosen_reading: '''The Lord'' refers to Jesus in his future coming as judge.'
  alternative_readings:
  - A more general reference to God
  rationale: In Pauline usage and the immediate eschatological context, ὁ κύριος here
    most naturally refers to the Lord Jesus. The title is translated rather than expanded,
    preserving the text's wording and christological force.
  doctrine_reference: Nicene Creed (381 AD), Chalcedon (451 AD)
