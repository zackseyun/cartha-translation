id: 1CO.4.5
reference: 1 Corinthians 4:5
source:
  edition: SBLGNT
  text: ὥστε μὴ πρὸ καιροῦ τι κρίνετε, ἕως ἂν ἔλθῃ ὁ κύριος, ὃς καὶ φωτίσει τὰ κρυπτὰ
    τοῦ σκότους καὶ φανερώσει τὰς βουλὰς τῶν καρδιῶν, καὶ τότε ὁ ἔπαινος γενήσεται
    ἑκάστῳ ἀπὸ τοῦ θεοῦ.
translation:
  text: Therefore, do not judge anything before the appointed time, until the Lord
    comes, who will also bring to light the hidden things of darkness and reveal the
    purposes of the hearts. Then each one’s praise will come from God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'before the time' or 'prematurely'; the Greek phrase can denote acting
      before the proper or appointed time.
    reason: lexical_alternative
  - marker: b
    text: Or 'the intentions of the hearts' or 'the motives of the hearts.'
    reason: lexical_alternative
  - marker: c
    text: That is, from the Lord’s final evaluation when he comes and reveals what
      is hidden.
    reason: cross_reference
lexical_decisions:
- source_word: ὥστε
  chosen: Therefore
  alternatives:
  - So then
  - Accordingly
  lexicon: BDAG
  rationale: Signals an inferential conclusion from the preceding argument; 'Therefore'
    is natural English and preserves the logical connection.
- source_word: μὴ πρὸ καιροῦ
  chosen: do not ... before the appointed time
  alternatives:
  - do not ... before the time
  - do not ... prematurely
  lexicon: BDAG
  rationale: πρὸ καιροῦ is more specific than merely 'too soon'; καιρός often denotes
    a fitting or appointed time. 'Appointed time' captures the eschatological/judicial
    nuance without over-paraphrasing.
- source_word: τι κρίνετε
  chosen: judge anything
  alternatives:
  - pass judgment on anything
  - judge at all
  lexicon: BDAG
  rationale: τι with the imperative broadens the prohibition. 'Judge anything' is
    concise and natural; 'pass judgment' is possible but heavier in English.
- source_word: ἕως ἂν ἔλθῃ ὁ κύριος
  chosen: until the Lord comes
  alternatives:
  - until the Lord should come
  - until the Lord arrives
  lexicon: BDAG
  rationale: The clause marks the temporal limit of the prohibition. κύριος is rendered
    'Lord' per doctrinal default. 'Comes' is idiomatic for the eschatological coming
    of Christ.
- source_word: ὁ κύριος
  chosen: the Lord
  alternatives:
  - the Master
  lexicon: BDAG
  rationale: Per the contested terms table, κύριος defaults to 'Lord.' In this Pauline
    context it refers to Jesus and carries established titular force.
- source_word: φωτίσει
  chosen: will also bring to light
  alternatives:
  - will illuminate
  - will bring into the light
  lexicon: BDAG
  rationale: The verb is metaphorical here, referring to disclosure rather than physical
    illumination. 'Bring to light' is idiomatic and preserves the revealing sense.
- source_word: τὰ κρυπτὰ τοῦ σκότους
  chosen: the hidden things of darkness
  alternatives:
  - the hidden things in the darkness
  - the secrets of darkness
  lexicon: BDAG
  rationale: A fairly formal rendering preserves both κρυπτά ('hidden things') and
    σκότους ('of darkness'). 'Secrets' is possible, but 'hidden things' tracks the
    Greek more transparently.
- source_word: φανερώσει
  chosen: reveal
  alternatives:
  - make known
  - disclose
  lexicon: BDAG
  rationale: A standard and transparent gloss in parallel with 'bring to light.'
- source_word: τὰς βουλὰς τῶν καρδιῶν
  chosen: the purposes of the hearts
  alternatives:
  - the intentions of the hearts
  - the motives of the hearts
  lexicon: BDAG
  rationale: βουλαί can denote plans, purposes, or intentions. 'Purposes' is broad
    and does not over-psychologize the term. The plural 'hearts' is retained to match
    the Greek genitive plural and idiom of inner human deliberation.
- source_word: τότε
  chosen: Then
  alternatives:
  - And then
  lexicon: BDAG
  rationale: Marks the temporal consequence following the Lord's revealing work.
- source_word: ὁ ἔπαινος γενήσεται ἑκάστῳ
  chosen: each one’s praise will come
  alternatives:
  - praise will be given to each one
  - each one will receive praise
  lexicon: BDAG
  rationale: The Greek literally speaks of 'the praise' coming/becoming to each one.
    'Will come' preserves the future-middle wording more closely while remaining natural
    English.
- source_word: ἑκάστῳ
  chosen: each one
  alternatives:
  - each person
  - each
  lexicon: BDAG
  rationale: Gender-accurate and individualizing; avoids unnecessary generic masculine
    while fitting the distributive singular.
- source_word: ἀπὸ τοῦ θεοῦ
  chosen: from God
  alternatives:
  - from God himself
  lexicon: BDAG
  rationale: Straightforward source-based rendering of agency/origin without adding
    emphasis absent from the Greek.
