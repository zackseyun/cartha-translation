- issue: Rendering Χριστός
  chosen_reading: Messiah in both διὰ Χριστόν and ἐν Χριστῷ
  alternative_readings:
  - Christ
  rationale: The noun functions as a title and project guidance prefers 'Messiah'
    where title is active. In this verse the contrast is theological and rhetorical,
    not merely name-like.
