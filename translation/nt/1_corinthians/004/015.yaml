theological_decisions:
- issue: Rendering Paul's parental metaphor without overstating sacramental or clerical
    implications
  chosen_reading: 'Maintain the metaphor of fatherhood as Paul''s claim to unique
    apostolic/evangelistic role in the Corinthians'' conversion: ''I became your father.'''
  alternative_readings:
  - Use a more literal 'I begot you'
  - Use an explicitly interpretive 'I became your spiritual father'
  rationale: The Greek presents metaphorical paternal language grounded in Paul's
    role in bringing them to faith through the gospel. The chosen wording preserves
    the metaphor while avoiding archaic diction and avoiding denominationally loaded
    language about spiritual fatherhood beyond the text itself.
  doctrine_reference: Preserve theological tension rather than resolve it; readable
    modern English, not archaic or academic.
