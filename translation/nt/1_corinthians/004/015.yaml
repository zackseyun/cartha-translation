id: 1CO.4.15
reference: 1 Corinthians 4:15
source:
  edition: SBLGNT
  text: ἐὰν γὰρ μυρίους παιδαγωγοὺς ἔχητε ἐν Χριστῷ, ἀλλ’ οὐ πολλοὺς πατέρας, ἐν γὰρ
    Χριστῷ Ἰησοῦ διὰ τοῦ εὐαγγελίου ἐγὼ ὑμᾶς ἐγέννησα.
translation:
  text: For even if you have countless guardians in the Messiah, yet not many fathers;
    for in Messiah Jesus, through the gospel, I became your father.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'ten thousand'; Greek μυρίους often functions idiomatically for a very
      large number.
    reason: lexical_alternative
  - marker: b
    text: Or 'tutors' or 'guides'; the Greek refers to a guardian or supervisor of
      a child rather than primarily a classroom teacher.
    reason: cultural_note
  - marker: c
    text: Greek 'I begot you' or 'I fathered you'; the expression is metaphorical,
      referring to Paul's role in bringing them to faith through the gospel.
    reason: lexical_alternative
  - marker: d
    text: Or 'in Christ' and 'in Christ Jesus'; the title Χριστός is translated here
      as 'Messiah.'
    reason: alternative_reading
lexical_decisions:
- source_word: μυρίους
  chosen: countless
  alternatives:
  - ten thousand
  - myriads
  lexicon: BDAG
  rationale: Although literally 'ten thousand,' the term often functions idiomatically
    for an extremely large number. 'Countless' conveys the rhetorical force in natural
    English while preserving the contrast with 'not many fathers'.
- source_word: παιδαγωγοὺς
  chosen: guardians
  alternatives:
  - tutors
  - disciplinarians
  - guides
  lexicon: BDAG
  rationale: In Greco-Roman usage a παιδαγωγός was not primarily a classroom teacher
    but a guardian/supervisor responsible for a child's oversight and discipline.
    'Guardians' best captures the social role without importing the narrower sense
    of modern 'teacher.'
- source_word: ἐν Χριστῷ
  chosen: in the Messiah
  alternatives:
  - in Christ
  lexicon: BDAG
  rationale: Χριστός is a title here, not merely a name-like form, so per doctrine
    the title is translated as 'Messiah.' 'In' is retained as the standard Pauline
    locative/union expression.
- source_word: πατέρας
  chosen: fathers
  alternatives:
  - spiritual fathers
  lexicon: BDAG
  rationale: The metaphor is explicit in the Greek and should remain untranslated
    as 'fathers' rather than interpretively expanded in the main text. The spiritual
    sense is clear from context.
- source_word: ἐν γὰρ Χριστῷ Ἰησοῦ
  chosen: for in Messiah Jesus
  alternatives:
  - for in Christ Jesus
  lexicon: BDAG
  rationale: Again, Χριστῷ is rendered 'Messiah' because the title sense is still
    present. Word order is kept close to the Greek while remaining idiomatic in English.
- source_word: διὰ τοῦ εὐαγγελίου
  chosen: through the gospel
  alternatives:
  - by means of the good news
  lexicon: BDAG
  rationale: διά with the genitive expresses means or instrument. 'Through the gospel'
    is concise, idiomatic, and preserves Paul's claim that the gospel message was
    the means of their begetting.
- source_word: ἐγέννησα
  chosen: I became your father
  alternatives:
  - I fathered you
  - I begot you
  lexicon: BDAG
  rationale: The verb γεννάω literally means 'beget/give birth,' but in English 'I
    became your father' communicates the paternal metaphor naturally and clearly.
    'Begot' is archaic, while 'fathered you' can sound either biological or awkwardly
    colloquial.
