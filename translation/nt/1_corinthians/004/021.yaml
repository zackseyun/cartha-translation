id: 1CO.4.21
reference: 1 Corinthians 4:21
source:
  edition: SBLGNT
  text: τί θέλετε; ἐν ῥάβδῳ ἔλθω πρὸς ὑμᾶς, ἢ ἐν ἀγάπῃ πνεύματί τε πραΰτητος;
translation:
  text: What do you want? Should I come to you with a rod, or with love and a spirit
    of gentleness?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'with love and gentleness of spirit.'
    reason: lexical_alternative
  - marker: b
    text: The phrase 'a spirit of gentleness' may refer to Paul's gentle disposition;
      some understand 'Spirit' here as an implicit reference to the Holy Spirit's
      work.
    reason: alternative_reading
lexical_decisions:
- source_word: τί θέλετε
  chosen: What do you want?
  alternatives:
  - What do you wish?
  - What do you desire?
  lexicon: BDAG
  rationale: A direct rhetorical question best matches the Greek. 'Want' is natural
    modern English and preserves the force of Paul's challenge without sounding archaic.
- source_word: ἐν ῥάβδῳ
  chosen: with a rod
  alternatives:
  - with a staff
  - with discipline
  lexicon: BDAG
  rationale: ῥάβδος literally denotes a rod or staff. 'Rod' preserves the disciplinary
    metaphor and its sharpness; 'discipline' would over-interpret the image.
- source_word: ἔλθω πρὸς ὑμᾶς
  chosen: Should I come to you
  alternatives:
  - Am I to come to you
  - Shall I come to you
  lexicon: BDAG
  rationale: The aorist subjunctive in this deliberative question is well represented
    by 'Should I come,' which sounds idiomatic in modern English while preserving
    the rhetorical force.
- source_word: ἢ
  chosen: or
  lexicon: BDAG
  rationale: Simple disjunctive contrast between two manners of Paul's coming.
- source_word: ἐν ἀγάπῃ
  chosen: with love
  alternatives:
  - in love
  lexicon: BDAG
  rationale: Given the parallel with 'with a rod,' rendering ἐν instrumentally as
    'with' gives the best English balance. 'Love' follows the project's default for
    ἀγάπη.
- source_word: πνεύματί τε πραΰτητος
  chosen: and a spirit of gentleness
  alternatives:
  - and gentleness of spirit
  - and a gentle spirit
  lexicon: BDAG
  rationale: The phrase is naturally rendered as a hendiadys-like expression describing
    the disposition accompanying love. 'A spirit of gentleness' preserves the lexical
    presence of πνεῦμα and the genitival quality of πραΰτης while remaining readable.
