theological_decisions:
- issue: Nature of the contrast between 'word' and 'power'
  chosen_reading: The verse contrasts mere speech or rhetoric with effective power
    as the mark of God's kingdom, without specifying here whether that power is miraculous,
    moral, apostolic, or the Spirit's work in a narrower sense.
  alternative_readings:
  - The power refers specifically to miraculous signs
  - The power refers specifically to transformed living and church discipline
  - The power refers specifically to apostolic authority
  rationale: The Greek itself states only the broad contrast. A translation should
    preserve this theological openness rather than narrowing the referent beyond the
    text.
  doctrine_reference: Preserve theological tension rather than resolve it.
