id: 1CO.4.20
reference: 1 Corinthians 4:20
source:
  edition: SBLGNT
  text: οὐ γὰρ ἐν λόγῳ ἡ βασιλεία τοῦ θεοῦ ἀλλ’ ἐν δυνάμει.
translation:
  text: For the kingdom of God is not in word, but in power.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in speech' or 'in mere words'; the contrast is with effective power
      rather than empty rhetoric.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐ γὰρ
  chosen: For ... not
  alternatives:
  - because ... not
  - indeed ... not
  lexicon: BDAG
  rationale: γάρ gives the reason for the preceding statement, and 'for' is the most
    natural concise English connector here. οὐ straightforwardly negates the clause.
- source_word: ἐν λόγῳ
  chosen: in word
  alternatives:
  - in speech
  - in talk
  - in mere words
  lexicon: BDAG
  rationale: λόγος can mean 'word,' 'speech,' or 'message.' In this contrast with
    'in power,' Paul is speaking of mere verbal profession or rhetoric. 'In word'
    preserves the Greek form and the pointed contrast, while remaining understandable
    in context.
- source_word: ἡ βασιλεία τοῦ θεοῦ
  chosen: the kingdom of God
  alternatives:
  - God's kingdom
  - the reign of God
  lexicon: BDAG
  rationale: This is the standard and accurate rendering of βασιλεία τοῦ θεοῦ. 'Kingdom'
    preserves both the domain and reign sense without over-specifying one nuance;
    'reign of God' is possible but less idiomatic here.
- source_word: ἀλλ’ ἐν δυνάμει
  chosen: but in power
  alternatives:
  - but in strength
  - but in powerful reality
  lexicon: BDAG
  rationale: δύναμις commonly means 'power' and forms a sharp antithesis to λόγος.
    'Power' best preserves both lexical consistency and Paul's emphasis on effective
    divine reality rather than rhetoric.
