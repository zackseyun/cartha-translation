id: 1CO.4.12
reference: 1 Corinthians 4:12
source:
  edition: SBLGNT
  text: καὶ κοπιῶμεν ἐργαζόμενοι ταῖς ἰδίαις χερσίν· λοιδορούμενοι εὐλογοῦμεν, διωκόμενοι
    ἀνεχόμεθα,
translation:
  text: and we labor, working with our own hands. When insulted, we bless; when persecuted,
    we endure it;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'when reviled, we bless.'
    reason: lexical_alternative
lexical_decisions:
- source_word: κοπιῶμεν
  chosen: we labor
  alternatives:
  - we toil
  - we work hard
  lexicon: BDAG
  rationale: Conveys strenuous effort and fatigue, not mere employment. 'Labor' is
    natural English and preserves the sense of wearisome work.
- source_word: ἐργαζόμενοι
  chosen: working
  alternatives:
  - laboring
  - earning our living
  lexicon: BDAG
  rationale: A participle explaining the manner of Paul's labor. 'Working' fits the
    immediate elaboration of manual work without overinterpreting the purpose.
- source_word: ταῖς ἰδίαις χερσίν
  chosen: with our own hands
  alternatives:
  - with our hands
  - by our own hands
  lexicon: BDAG
  rationale: The adjective ἰδίαις is significant and stresses self-support/manual
    labor. 'With our own hands' is the idiomatic and emphatic rendering.
- source_word: λοιδορούμενοι
  chosen: when insulted
  alternatives:
  - when reviled
  - being slandered
  lexicon: BDAG
  rationale: The participle is passive and concessive/temporal in force within the
    series. 'Insulted' is clear modern English; 'reviled' is more traditional but
    less accessible.
- source_word: εὐλογοῦμεν
  chosen: we bless
  alternatives:
  - we speak well of
  - we respond with blessing
  lexicon: BDAG
  rationale: A key biblical term that should be retained where natural. Here it means
    responding to abuse with blessing rather than retaliation.
- source_word: διωκόμενοι
  chosen: when persecuted
  alternatives:
  - being persecuted
  - when pursued
  lexicon: BDAG
  rationale: In Pauline usage the hostile sense 'persecuted' is contextually clear,
    not merely 'pursued.' The participle matches the pattern of situational response.
- source_word: ἀνεχόμεθα
  chosen: we endure it
  alternatives:
  - we endure
  - we bear up
  lexicon: BDAG
  rationale: ἀνέχομαι here means to put up with or endure hostile treatment. Supplying
    'it' makes natural English sense from the passive participle's implied object.
