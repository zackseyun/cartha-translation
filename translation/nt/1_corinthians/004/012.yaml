theological_decisions:
- issue: Ethical response to mistreatment
  chosen_reading: The verse is rendered as describing apostolic conduct under abuse—blessing
    in response to insults and enduring persecution—without expanding it into a formal
    command beyond what the text states.
  rationale: The text narrates apostolic practice in compact antitheses. The translation
    preserves the ethical force while not importing additional doctrinal claims.
