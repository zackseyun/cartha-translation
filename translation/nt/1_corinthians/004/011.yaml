id: 1CO.4.11
reference: 1 Corinthians 4:11
source:
  edition: SBLGNT
  text: ἄχρι τῆς ἄρτι ὥρας καὶ πεινῶμεν καὶ διψῶμεν καὶ γυμνιτεύομεν καὶ κολαφιζόμεθα
    καὶ ἀστατοῦμεν
translation:
  text: Up to this present hour we are hungry and thirsty, and poorly clothed, and
    beaten, and homeless.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Until this very hour.'
    reason: lexical_alternative
  - marker: b
    text: Or 'naked'; the Greek can denote being insufficiently clothed rather than
      completely unclothed.
    reason: lexical_alternative
  - marker: c
    text: Or 'without a settled home' or 'wandering.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄχρι τῆς ἄρτι ὥρας
  chosen: Up to this present hour
  alternatives:
  - Until this very hour
  - To this very hour
  lexicon: BDAG
  rationale: Idiomatic temporal expression meaning 'until/up to the present time.'
    'Up to this present hour' preserves the emphasis of ἄρτι ('now, present') and
    the concrete ὥρα while sounding natural in English.
- source_word: πεινῶμεν
  chosen: we are hungry
  alternatives:
  - we hunger
  - we go hungry
  lexicon: BDAG
  rationale: Present indicative plural describing ongoing condition. 'We are hungry'
    is clear modern English; 'we hunger' is more formal/literary, and 'we go hungry'
    slightly intensifies beyond the bare verb.
- source_word: διψῶμεν
  chosen: thirsty
  alternatives:
  - we thirst
  - we are thirsty
  lexicon: BDAG
  rationale: 'Paired with πεινῶμεν as a condition of deprivation. In English, ellipsis
    after ''we are hungry'' yields smooth coordination: ''hungry and thirsty.'''
- source_word: γυμνιτεύομεν
  chosen: poorly clothed
  alternatives:
  - naked
  - in rags
  - badly clothed
  lexicon: BDAG
  rationale: The verb often means to be inadequately clothed rather than absolutely
    naked. 'Poorly clothed' avoids overstating the sense while preserving material
    deprivation.
- source_word: κολαφιζόμεθα
  chosen: beaten
  alternatives:
  - struck
  - buffeted
  - punched
  lexicon: BDAG
  rationale: Passive present indicating repeated physical mistreatment. 'Beaten' communicates
    ongoing abuse in natural English; 'buffeted' is traditional but archaic, while
    'punched' is too narrow/colloquial.
- source_word: ἀστατοῦμεν
  chosen: homeless
  alternatives:
  - without a settled home
  - wandering
  - unsettled
  lexicon: BDAG
  rationale: Conveys instability and lack of a fixed dwelling/place. 'Homeless' is
    concise and communicates the social reality; alternatives are possible but less
    direct.
- source_word: καὶ ... καὶ ... καὶ ...
  chosen: and ... and ... and ...
  alternatives:
  - comma-separated asyndetic English list
  lexicon: Greek grammar
  rationale: The repeated καί creates a cumulative, relentless catalog of hardships.
    Retaining repeated 'and' reflects the Greek rhythm and rhetorical force.
