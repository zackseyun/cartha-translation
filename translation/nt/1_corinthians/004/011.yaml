theological_decisions:
- issue: Nature of Paul's self-description
  chosen_reading: A literal catalog of apostolic deprivation and abuse
  alternative_readings:
  - A mainly rhetorical or hyperbolic description
  rationale: The verse presents concrete ongoing hardships in straightforward present
    indicatives. The translation keeps the language plain and does not heighten or
    soften the suffering.
