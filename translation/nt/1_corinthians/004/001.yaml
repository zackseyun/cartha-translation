id: 1CO.4.1
reference: 1 Corinthians 4:1
source:
  edition: SBLGNT
  text: Οὕτως ἡμᾶς λογιζέσθω ἄνθρωπος ὡς ὑπηρέτας Χριστοῦ καὶ οἰκονόμους μυστηρίων
    θεοῦ.
translation:
  text: 'This is how a man should regard us: as servants of the Messiah and stewards
    of the mysteries of God.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Christ.' The Greek title Χριστός is rendered 'Messiah' here because
      it functions as a title.
    reason: lexical_alternative
  - marker: b
    text: '''A man'' here has generic force, meaning any person in general.'
    reason: cultural_note
lexical_decisions:
- source_word: Οὕτως
  chosen: This is how
  alternatives:
  - Thus
  - In this way
  - So
  lexicon: BDAG
  rationale: Introduces the manner in which Paul and his coworkers are to be reckoned.
    'This is how' is natural modern English and preserves the demonstrative force
    better than the more formal 'thus.'
- source_word: ἡμᾶς
  chosen: us
  lexicon: BDAG
  rationale: Direct object of λογιζέσθω, referring to Paul and associated ministers/apostles
    in context.
- source_word: λογιζέσθω
  chosen: should regard
  alternatives:
  - should consider
  - should reckon
  - must regard
  lexicon: BDAG
  rationale: The present middle imperative calls for a normative assessment. 'Should
    regard' preserves imperative force in idiomatic English without sounding archaic
    like 'reckon.'
- source_word: ἄνθρωπος
  chosen: a man
  alternatives:
  - a person
  - one
  - anyone
  lexicon: BDAG
  rationale: Following the project's gender-accurate principle, the grammatically
    masculine singular generic is rendered with an English masculine representative
    form. In context it functions generically, but 'a man' best reflects the source
    form; inclusivity can be clarified in a footnote.
- source_word: ὡς
  chosen: as
  alternatives:
  - like
  lexicon: BDAG
  rationale: Marks the capacity in which Paul and others are to be regarded.
- source_word: ὑπηρέτας
  chosen: servants
  alternatives:
  - attendants
  - assistants
  - officers
  lexicon: BDAG
  rationale: ὑπηρέτης does not carry the bonded-status force of δοῦλος; therefore
    'servants' is preferable to 'slaves.' It conveys subordinate service under Christ.
- source_word: Χριστοῦ
  chosen: the Messiah
  alternatives:
  - Christ
  lexicon: BDAG
  rationale: Per doctrine, Χριστός is translated 'Messiah' where it functions as a
    title. Here it denotes the one whom they serve, and the titular sense is still
    active.
- source_word: οἰκονόμους
  chosen: stewards
  alternatives:
  - household managers
  - managers
  lexicon: BDAG
  rationale: '''Stewards'' is the established and accurate rendering for entrusted
    managers over a household or estate, fitting the metaphor of delegated responsibility.'
- source_word: μυστηρίων
  chosen: the mysteries
  alternatives:
  - secret things
  - revealed mysteries
  lexicon: BDAG
  rationale: Retains Paul's technical term for divine truths once hidden and now revealed,
    without overexplaining in the main text.
- source_word: θεοῦ
  chosen: of God
  lexicon: BDAG
  rationale: 'Genitive most naturally taken as possessive/source: the mysteries belong
    to and come from God.'
