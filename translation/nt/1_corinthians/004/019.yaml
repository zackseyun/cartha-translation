theological_decisions:
- issue: Reference of 'the Lord' in the conditional clause
  chosen_reading: Render generically as 'the Lord' without specifying whether Paul
    refers explicitly to Jesus or to God the Father.
  alternative_readings:
  - the Lord Jesus
  - God
  rationale: The Greek text simply says ὁ κύριος. Within Pauline usage this title
    can function christologically, but the verse itself does not require a more specific
    identification. Preserving the textual wording avoids importing a doctrinal specificity
    not explicit in the text.
  doctrine_reference: Affirmations; Preserve theological tension rather than resolve
    it
- issue: Force of the contrast between λόγος and δύναμις
  chosen_reading: Translate as contrast between mere speech and actual power.
  alternative_readings:
  - contrast between teaching content and miraculous power
  - contrast between rhetoric and apostolic authority
  rationale: The immediate context concerns inflated persons and the nature of God's
    kingdom in the next verse. 'Talk' versus 'power' preserves the broad contrast
    without narrowing it to one specific manifestation.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    theological tension rather than resolve it'
