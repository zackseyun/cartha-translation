id: 1CO.4.19
reference: 1 Corinthians 4:19
source:
  edition: SBLGNT
  text: ἐλεύσομαι δὲ ταχέως πρὸς ὑμᾶς, ἐὰν ὁ κύριος θελήσῃ, καὶ γνώσομαι οὐ τὸν λόγον
    τῶν πεφυσιωμένων ἀλλὰ τὴν δύναμιν,
translation:
  text: But I will come to you soon, if the Lord wills, and I will find out not the
    talk of those who are puffed up, but the power.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I will know not the word/speech of those who are puffed up, but the
      power.'
    reason: lexical_alternative
  - marker: b
    text: '''Those who are puffed up'' translates a term Paul uses repeatedly in this
      letter for people inflated with pride or conceit.'
    reason: cross_reference
lexical_decisions:
- source_word: ἐλεύσομαι
  chosen: I will come
  alternatives:
  - I am coming
  - I will go
  lexicon: BDAG
  rationale: Future middle of ἔρχομαι is best rendered as a simple future in English.
    'Come' fits Paul's movement toward the Corinthians from their perspective.
- source_word: δὲ
  chosen: But
  alternatives:
  - Now
  - And
  lexicon: BDAG
  rationale: δέ marks mild contrast with the preceding statement; 'But' captures the
    adversative force in context.
- source_word: ταχέως
  chosen: soon
  alternatives:
  - quickly
  - before long
  lexicon: BDAG
  rationale: The adverb indicates near future timing rather than manner alone; 'soon'
    is idiomatic modern English here.
- source_word: πρὸς ὑμᾶς
  chosen: to you
  alternatives:
  - with you
  - toward you
  lexicon: BDAG
  rationale: With a verb of motion, πρὸς + accusative naturally means movement toward
    persons; 'to you' is the clearest English rendering.
- source_word: ἐὰν ὁ κύριος θελήσῃ
  chosen: if the Lord wills
  alternatives:
  - if the Lord should will
  - if the Lord is willing
  lexicon: BDAG
  rationale: This conditional clause expresses dependence on the Lord's will. 'If
    the Lord wills' is both accurate and natural, and preserves the explicit reference
    to divine sovereignty.
- source_word: κύριος
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Per doctrinal guideline, κύριος is rendered 'Lord.' In Pauline usage
    here it most naturally refers to the Lord Jesus or the Lord in Christian confession
    without needing further specification in translation.
- source_word: γνώσομαι
  chosen: I will find out
  alternatives:
  - I will know
  - I will learn
  lexicon: BDAG
  rationale: Although formally 'I will know,' in context Paul means he will ascertain
    by personal visit the real condition of matters. 'Find out' conveys this investigative
    nuance in natural English.
- source_word: οὐ τὸν λόγον
  chosen: not the talk
  alternatives:
  - not the word
  - not the speech
  - not what they say
  lexicon: BDAG
  rationale: λόγος can mean word, message, or speech. In contrast with δύναμις, Paul
    is distinguishing mere verbal profession from actual effectiveness; 'talk' captures
    this contrast idiomatically without overparaphrasing.
- source_word: τῶν πεφυσιωμένων
  chosen: of those who are puffed up
  alternatives:
  - of the arrogant
  - of those who are inflated with pride
  lexicon: BDAG
  rationale: Perfect passive participle of φυσιόω describes an ongoing state of conceit.
    'Those who are puffed up' preserves Paul's metaphor and his recurring usage in
    this letter.
- source_word: ἀλλὰ τὴν δύναμιν
  chosen: but the power
  alternatives:
  - but the power they have
  - but their power
  lexicon: BDAG
  rationale: δύναμις is left as 'power,' preserving the compact contrast with 'talk.'
    Adding 'they have' would interpret rather than translate.
