id: 1CO.4.18
reference: 1 Corinthians 4:18
source:
  edition: SBLGNT
  text: ὡς μὴ ἐρχομένου δέ μου πρὸς ὑμᾶς ἐφυσιώθησάν τινες·
translation:
  text: Some have become puffed up, as though I were not coming to you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Some are arrogant, as if I were not coming to you.'
    reason: lexical_alternative
  - marker: b
    text: Paul repeatedly uses the image 'puffed up' in 1 Corinthians for self-important
      pride; compare 1 Cor 4:6, 4:19, 5:2, 8:1, 13:4.
    reason: cross_reference
lexical_decisions:
- source_word: ὡς
  chosen: as though
  alternatives:
  - as if
  - under the impression that
  lexicon: BDAG
  rationale: Introduces the mistaken assumption underlying the Corinthians' attitude.
    'As though' gives natural English while preserving the comparative/suppositional
    force.
- source_word: μὴ ἐρχομένου ... μου πρὸς ὑμᾶς
  chosen: I were not coming to you
  alternatives:
  - I am not coming to you
  - my not coming to you
  lexicon: BDAG
  rationale: The genitive participial construction with μή depends on ὡς and expresses
    a supposed situation, not a direct assertion. English idiom is best captured by
    a finite clause in the subjunctive-like form 'I were not coming to you,' indicating
    their false assumption.
- source_word: δέ
  chosen: —
  alternatives:
  - but
  - now
  lexicon: BDAG
  rationale: δέ is mildly connective here and need not be represented explicitly in
    smooth English. Its discourse function is adequately carried by the sentence flow
    from the prior verse.
- source_word: ἐφυσιώθησάν
  chosen: have become puffed up
  alternatives:
  - are arrogant
  - have become arrogant
  - have been inflated with pride
  lexicon: BDAG
  rationale: Paul's recurring metaphor in 1 Corinthians uses φυσιόω ('to puff up').
    Retaining 'puffed up' preserves the verbal imagery and intertextual consistency
    better than the flatter 'arrogant.' The perfect-like English 'have become' reflects
    the resultant state from the aorist in context.
- source_word: τινες
  chosen: Some
  alternatives:
  - certain ones
  - some people
  lexicon: BDAG
  rationale: Indefinite plural referring to a subset within the church. 'Some' is
    concise, natural, and sufficiently specific.
