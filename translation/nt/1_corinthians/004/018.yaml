theological_decisions:
- issue: Rendering Paul's critique of Corinthian pride
  chosen_reading: Use the metaphor 'puffed up' rather than interpretive 'arrogant.'
  alternative_readings:
  - Some are arrogant, as if I were not coming to you.
  rationale: This is not a doctrinally contested term in the DOCTRINE table, but preserving
    Paul's metaphor better reflects the source text and his repeated language in this
    letter, allowing readers to see the rhetorical continuity.
