id: 1CO.4.3
reference: 1 Corinthians 4:3
source:
  edition: SBLGNT
  text: ἐμοὶ δὲ εἰς ἐλάχιστόν ἐστιν, ἵνα ὑφ’ ὑμῶν ἀνακριθῶ ἢ ὑπὸ ἀνθρωπίνης ἡμέρας·
    ἀλλ’ οὐδὲ ἐμαυτὸν ἀνακρίνω·
translation:
  text: But to me it is a very small thing that I should be examined by you or by
    any human court; in fact, I do not even examine myself.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek literally, 'by a human day,' an idiom for human judgment or evaluation.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐμοὶ
  chosen: to me
  alternatives:
  - for me
  - in my case
  lexicon: BDAG
  rationale: Dative of reference; 'to me' is natural English and preserves Paul's
    personal standpoint.
- source_word: εἰς ἐλάχιστόν ἐστιν
  chosen: it is a very small thing
  alternatives:
  - it amounts to very little
  - it is of least importance
  lexicon: BDAG
  rationale: Idiomatic expression meaning something is of minimal significance. 'Very
    small thing' preserves the comparative force without sounding wooden.
- source_word: ἵνα
  chosen: that
  alternatives:
  - if
  - for
  lexicon: BDAG
  rationale: Here it introduces the content/result of what is considered insignificant
    in idiomatic Greek. In English, 'that I should be examined' best conveys the sense.
- source_word: ἀνακριθῶ
  chosen: be examined
  alternatives:
  - be judged
  - be questioned
  - be investigated
  lexicon: BDAG
  rationale: ἀνακρίνω often carries the sense of careful examination or scrutiny rather
    than final condemnation. 'Examined' fits both occurrences in the verse and distinguishes
    it from κρίνω language nearby in context.
- source_word: ὑφ’ ὑμῶν
  chosen: by you
  alternatives:
  - by any of you
  lexicon: BDAG
  rationale: Straightforward agency with ὑπό + genitive; no distributive nuance is
    explicit.
- source_word: ἢ ὑπὸ ἀνθρωπίνης ἡμέρας
  chosen: or by any human court
  alternatives:
  - or by a human day
  - or by any human tribunal
  lexicon: BDAG
  rationale: The literal 'human day' is an idiom contrasting with the Lord's day of
    judgment in context and refers to merely human assessment. 'Human court' communicates
    the idiomatic meaning clearly in modern English; 'any' smooths the generic sense.
- source_word: ἀλλ’ οὐδὲ
  chosen: in fact, ... not even
  alternatives:
  - but not even
  - but neither
  lexicon: BDAG
  rationale: Marks strong adversative progression. 'In fact' brings out the rhetorical
    force in readable English, while 'not even' preserves οὐδέ.
- source_word: ἐμαυτὸν
  chosen: myself
  lexicon: BDAG
  rationale: Reflexive object of ἀνακρίνω; standard rendering.
- source_word: ἀνακρίνω
  chosen: examine
  alternatives:
  - judge
  - scrutinize
  lexicon: BDAG
  rationale: Kept consistent with the earlier ἀνακριθῶ in the same verse to preserve
    lexical cohesion; 'examine' avoids overstating the term as final judgment.
