theological_decisions:
- issue: Meaning of ἀνθρωπίνης ἡμέρας
  chosen_reading: Render idiomatically as 'human court' rather than literally 'human
    day.'
  alternative_readings:
  - human day
  - human judgment
  rationale: The phrase is not making a doctrinal statement about calendrical time
    but contrasting human evaluation with divine judgment in the surrounding context.
    An idiomatic rendering best preserves meaning for modern readers while avoiding
    interpretive overreach.
