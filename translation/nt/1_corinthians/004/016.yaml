theological_decisions:
- issue: Paul's exhortation to imitate himself could be overstated if detached from
    its wider Christ-centered context (cf. 1 Cor 11:1), but this verse itself explicitly
    names Paul as the model.
  chosen_reading: Translate the statement directly as 'become imitators of me' without
    softening it.
  alternative_readings:
  - become followers of my example
  - follow my example
  rationale: The Greek is unambiguous in presenting Paul as the immediate exemplar
    here. Softening to 'follow my example' is interpretively acceptable but less lexically
    transparent. The translation should preserve the force of the text without importing
    broader theological qualifications into the main line.
  doctrine_reference: Preserve theological tension rather than resolve it.
