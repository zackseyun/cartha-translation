theological_decisions:
- issue: Pastoral tone of Paul's corrective language
  chosen_reading: 'The verse is rendered to show loving correction rather than harsh
    condemnation: ''to admonish you as my beloved children.'''
  alternative_readings:
  - to warn you as my dear children
  - to counsel you as my beloved children
  rationale: The combination of ἐντρέπων negated and νουθετῶν positive frames Paul's
    rebuke within affectionate spiritual fatherhood. 'Admonish' keeps the corrective
    force while preserving the relational tenderness of the context.
