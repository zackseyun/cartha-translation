id: 1CO.4.14
reference: 1 Corinthians 4:14
source:
  edition: SBLGNT
  text: Οὐκ ἐντρέπων ὑμᾶς γράφω ταῦτα, ἀλλ’ ὡς τέκνα μου ἀγαπητὰ ⸀νουθετῶν·
translation:
  text: I am not writing these things to shame you, but to admonish you as my beloved
    children.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to make you ashamed.'
    reason: lexical_alternative
  - marker: b
    text: Or 'to warn you as my beloved children.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐντρέπων
  chosen: to shame
  alternatives:
  - to embarrass
  - to put to shame
  - to make ashamed
  lexicon: BDAG
  rationale: 'The participle with οὐκ gives Paul''s negative purpose or manner: he
    is not writing with the aim of shaming them. ''Shame'' is concise, natural English
    and preserves the honor-shame force better than the weaker ''embarrass.'''
- source_word: γράφω ταῦτα
  chosen: I am writing these things
  alternatives:
  - I write these things
  - I am writing this
  lexicon: BDAG
  rationale: The present γράφω is naturally rendered as an epistolary present in English,
    'I am writing.' ταῦτα is plural, so 'these things' should be preserved rather
    than singular 'this.'
- source_word: ἀλλ’
  chosen: but
  alternatives:
  - rather
  - instead
  lexicon: BDAG
  rationale: Marks clear contrast between negative and positive intent; 'but' is the
    most natural connective in English.
- source_word: ὡς
  chosen: as
  alternatives:
  - as though they were
  - like
  lexicon: BDAG
  rationale: Introduces the relational basis for Paul's admonition. Simple 'as' best
    preserves the Greek construction without overinterpreting.
- source_word: τέκνα
  chosen: children
  alternatives:
  - sons
  - offspring
  lexicon: BDAG
  rationale: τέκνα is gender-inclusive and refers to filial relationship rather than
    specifically male children. 'Children' is therefore the gender-accurate rendering.
- source_word: μου
  chosen: my
  lexicon: BDAG
  rationale: Expresses Paul's personal, pastoral relationship to the Corinthians;
    straightforward possessive retained.
- source_word: ἀγαπητὰ
  chosen: beloved
  alternatives:
  - dear
  - loved
  lexicon: BDAG
  rationale: '''Beloved'' preserves both the warmth and the covenantal/christian register
    of ἀγαπητά better than the flatter ''dear.'''
- source_word: νουθετῶν
  chosen: to admonish you
  alternatives:
  - warning you
  - instructing you
  - correcting you
  lexicon: BDAG
  rationale: 'The participle conveys Paul''s positive pastoral purpose: giving corrective
    instruction. ''Admonish'' best captures warning plus moral guidance without sounding
    merely punitive. The object ''you'' is supplied in English from context for clarity,
    corresponding to ὑμᾶς earlier in the sentence.'
