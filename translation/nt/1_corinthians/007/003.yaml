theological_decisions:
- issue: How explicitly to render the marital obligation denoted by ὀφειλή
  chosen_reading: Use 'marital duty' in the main text.
  alternative_readings:
  - her due
  - the duty owed to her
  - her conjugal rights
  rationale: The verse concerns mutual sexual obligations within marriage, but the
    noun itself is broader than an anatomical or legalistic expression. 'Marital duty'
    preserves the contextual meaning while avoiding unnecessary euphemism or over-interpretation.
    It also maintains the reciprocal ethical emphasis of the passage.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve theological
    tension rather than resolve it'
