id: 1CO.7.3
reference: 1 Corinthians 7:3
source:
  edition: SBLGNT
  text: τῇ γυναικὶ ὁ ἀνὴρ τὴν ⸀ὀφειλὴν ἀποδιδότω, ὁμοίως δὲ καὶ ἡ γυνὴ τῷ ἀνδρί.
translation:
  text: The husband must give to his wife her marital duty, and likewise the wife
    to her husband.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the duty owed to her'; more literally, 'the debt/obligation.' In context
      this refers to the spouses' conjugal obligation to one another.
    reason: lexical_alternative
lexical_decisions:
- source_word: γυναικί
  chosen: wife
  alternatives:
  - woman
  lexicon: BDAG
  rationale: In the immediate context of marriage instructions, γυνή refers specifically
    to a wife rather than a woman in general.
- source_word: ἀνήρ
  chosen: husband
  alternatives:
  - man
  lexicon: BDAG
  rationale: In parallel with γυνή in a marital context, ἀνήρ is best rendered 'husband'
    rather than the broader 'man'.
- source_word: ὀφειλήν
  chosen: marital duty
  alternatives:
  - debt
  - obligation
  - conjugal rights
  lexicon: BDAG
  rationale: ὀφειλή literally denotes what is owed, but here refers to the obligation
    spouses owe one another in marriage, specifically in the sexual/conjugal sense
    established by the surrounding context (vv. 2, 4–5). 'Marital duty' is clear modern
    English that preserves the sense without over-specifying beyond the text.
- source_word: ἀποδιδότω
  chosen: must give
  alternatives:
  - must render
  - must pay
  - is to give
  lexicon: BDAG
  rationale: The present active imperative calls for an ongoing obligation. 'Must
    give' communicates the imperative force in natural English; 'render' is more traditional
    but less idiomatic for modern readers.
- source_word: ὁμοίως
  chosen: likewise
  alternatives:
  - in the same way
  - similarly
  lexicon: BDAG
  rationale: ὁμοίως marks reciprocal symmetry between husband and wife; 'likewise'
    is concise and natural.
- source_word: δὲ καὶ
  chosen: and likewise
  alternatives:
  - and also likewise
  - likewise also
  - but also
  lexicon: BDAG
  rationale: The combination links the second clause additively and emphatically.
    In English, 'and likewise' captures the sense smoothly without woodenly reproducing
    both particles.
