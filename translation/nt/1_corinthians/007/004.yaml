theological_decisions:
- issue: Nature of marital authority in the verse
  chosen_reading: Render the statement in terms of mutual authority without importing
    hierarchical or coercive implications beyond the text.
  alternative_readings:
  - Render more weakly as 'does not belong to herself/himself'
  - Render more strongly as 'the spouse has control over the other's body'
  rationale: 'Paul''s wording stresses reciprocity: each spouse does not exercise
    authority over his or her own body, but the other spouse does. The translation
    should preserve this mutuality and not tilt toward either unilateral hierarchy
    or a paraphrase about mere belonging. ''Have authority over'' reflects the Greek
    verb while allowing the verse''s balanced structure to speak for itself.'
  doctrine_reference: Translation philosophy §§1, 3, 6
