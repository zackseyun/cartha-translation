id: 1CO.7.4
reference: 1 Corinthians 7:4
source:
  edition: SBLGNT
  text: ἡ γυνὴ τοῦ ἰδίου σώματος οὐκ ἐξουσιάζει ἀλλὰ ὁ ἀνήρ· ὁμοίως δὲ καὶ ὁ ἀνὴρ
    τοῦ ἰδίου σώματος οὐκ ἐξουσιάζει ἀλλὰ ἡ γυνή.
translation:
  text: The wife does not have authority over her own body, but the husband does;
    likewise also the husband does not have authority over his own body, but the wife
    does.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'exercise authority over.' The Greek verb can denote the exercise or
      possession of authority; here the sense is reciprocal marital authority.
    reason: lexical_alternative
lexical_decisions:
- source_word: γυνή
  chosen: wife
  alternatives:
  - woman
  lexicon: BDAG
  rationale: In the immediate context of marriage and mutual conjugal obligations
    (1 Cor 7), γυνή refers specifically to a married woman, so 'wife' is more precise
    than the broader 'woman'.
- source_word: ἀνήρ
  chosen: husband
  alternatives:
  - man
  lexicon: BDAG
  rationale: Paired with γυνή in a marital context, ἀνήρ is best rendered 'husband'
    rather than the broader 'man'.
- source_word: ἰδίου σώματος
  chosen: her own body / his own body
  alternatives:
  - the body that belongs to her / him
  lexicon: BDAG
  rationale: ἴδιος emphasizes what is one's own or belonging to oneself. 'Own body'
    is the natural English equivalent and preserves the possessive emphasis.
- source_word: ἐξουσιάζει
  chosen: have authority over
  alternatives:
  - exercise authority over
  - have rights over
  lexicon: BDAG
  rationale: The verb denotes having authority or control. 'Have authority over' is
    the most direct and idiomatic rendering here, preserving the reciprocal legal-relational
    force without overstating domination.
- source_word: ἀλλά
  chosen: but
  alternatives:
  - rather
  lexicon: BDAG
  rationale: ἀλλά marks contrast between the spouse and the other partner as the one
    holding authority. 'But' is the clearest natural English rendering.
- source_word: ὁμοίως δὲ καὶ
  chosen: likewise also
  alternatives:
  - in the same way also
  - likewise
  lexicon: BDAG
  rationale: The combination underscores the reciprocal parallelism of the second
    clause. 'Likewise also' preserves the emphatic symmetry of Paul's statement.
