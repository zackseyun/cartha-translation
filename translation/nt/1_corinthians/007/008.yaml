id: 1CO.7.8
reference: 1 Corinthians 7:8
source:
  edition: SBLGNT
  text: Λέγω δὲ τοῖς ἀγάμοις καὶ ταῖς χήραις, καλὸν ⸀αὐτοῖς ἐὰν μείνωσιν ὡς κἀγώ·
translation:
  text: 'Now I say to the unmarried and to the widows: it is good for them if they
    remain as I am.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to the unmarried men,' since the Greek form is masculine plural; context
      may use the masculine representatively.
    reason: lexical_alternative
  - marker: b
    text: Literally 'as I also am.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Λέγω δὲ
  chosen: Now I say
  alternatives:
  - But I say
  - And I say
  lexicon: BDAG
  rationale: δέ is mildly connective/adversative here. 'Now' gives a natural transition
    in modern English without overstating contrast.
- source_word: τοῖς ἀγάμοις
  chosen: to the unmarried
  alternatives:
  - to the unmarried men
  - to the single
  lexicon: BDAG
  rationale: ἄγαμος means unmarried. Although the form here is masculine plural, the
    following separate mention of widows suggests a category broader than only never-married
    males; 'the unmarried' is the most natural and sufficiently inclusive rendering
    in context.
- source_word: ταῖς χήραις
  chosen: to the widows
  alternatives:
  - to widows
  lexicon: BDAG
  rationale: χήραις specifically denotes widows, not unmarried women generally. The
    article is naturally represented in English with 'the' in this construction.
- source_word: καλὸν
  chosen: it is good
  alternatives:
  - it is better
  - it is fitting
  - it is commendable
  lexicon: BDAG
  rationale: καλός here expresses what is good/fitting/commendable, not necessarily
    morally absolute or comparatively better. 'It is good' preserves Paul's wording
    and leaves the nuance broad.
- source_word: αὐτοῖς
  chosen: for them
  alternatives:
  - for these
  - for such people
  lexicon: BDAG
  rationale: Dative pronoun after καλόν is idiomatically rendered 'for them.'
- source_word: ἐὰν μείνωσιν
  chosen: if they remain
  alternatives:
  - if they stay
  - if they continue
  lexicon: BDAG
  rationale: μένω commonly means remain/stay. 'Remain' fits the context of continuing
    in an unmarried state and aligns with Paul's repeated usage in this chapter.
- source_word: ὡς κἀγώ
  chosen: as I am
  alternatives:
  - as I also am
  - like me
  lexicon: BDAG
  rationale: κἀγώ = καὶ ἐγώ, literally 'I also.' In idiomatic English, 'as I am' best
    conveys Paul's self-reference to his present unmarried state without awkwardness;
    the additive force is not crucial to preserve explicitly in the main text.
