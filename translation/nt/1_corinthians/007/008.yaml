theological_decisions:
- issue: Scope of 'the unmarried' (ἀγάμοις) in relation to 'widows'
  chosen_reading: Render ἀγάμοις as the broader category 'the unmarried,' while keeping
    'widows' as a distinct subgroup explicitly named.
  alternative_readings:
  - Render ἀγάμοις as 'unmarried men' to mirror the masculine form
  rationale: The masculine plural could be taken specifically, but in context Paul
    distinguishes categories pastorally rather than making a gender-restrictive statement.
    Translating 'the unmarried' preserves the likely functional sense without erasing
    the explicit mention of widows.
  doctrine_reference: Translation philosophy §4 (Gender-accurate over gender-neutral)
- issue: Force of καλὸν in Paul's counsel
  chosen_reading: Translate as 'it is good' rather than a stronger comparative such
    as 'it is better.'
  alternative_readings:
  - it is better
  - it is proper
  rationale: The Greek adjective itself does not encode comparison here. A comparative
    would import a stronger evaluative claim than the text states.
  doctrine_reference: Translation philosophy §1 (Original-language primacy over translation
    tradition)
