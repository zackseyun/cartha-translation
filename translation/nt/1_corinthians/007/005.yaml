theological_decisions:
- issue: Whether πάλιν ἐπὶ τὸ αὐτὸ ἦτε should be rendered explicitly as resuming sexual
    relations or more generally as coming together again
  chosen_reading: Rendered as 'come together again' with the marital/sexual implication
    left implicit in context
  alternative_readings:
  - '''come together sexually again'''
  - '''be together again'''
  rationale: The Greek idiom points to reunion in the marital relationship and likely
    sexual union specifically, but Paul expresses it with modest indirectness. Preserving
    that modesty reflects the source text without importing more explicit wording
    than necessary.
  doctrine_reference: 'Translation philosophy: optimal equivalence; never paraphrase
    beyond what the source text warrants.'
- issue: Whether ὁ Σατανᾶς should be treated as a personal evil being or generalized
    as 'the adversary'
  chosen_reading: Rendered as the proper name 'Satan'
  alternative_readings:
  - the adversary
  rationale: In Pauline usage here the article with Σατανᾶς still refers to the personal
    being Satan, not merely an abstract adversarial force. Transliteration preserves
    the personal reference and aligns with orthodox Christian doctrine without adding
    claims beyond the text.
  doctrine_reference: 'Affirmations: historic ecumenical Christian orthodoxy; Translate
    titles; transliterate names.'
