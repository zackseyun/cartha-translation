id: 1CO.7.5
reference: 1 Corinthians 7:5
source:
  edition: SBLGNT
  text: μὴ ἀποστερεῖτε ἀλλήλους, εἰ μήτι ἂν ἐκ συμφώνου πρὸς καιρὸν ἵνα ⸀σχολάσητε
    ⸀τῇ προσευχῇ καὶ πάλιν ἐπὶ τὸ αὐτὸ ⸀ἦτε, ἵνα μὴ πειράζῃ ὑμᾶς ὁ Σατανᾶς διὰ τὴν
    ἀκρασίαν ὑμῶν.
translation:
  text: Do not deprive one another, except perhaps by mutual agreement for a time,
    so that you may devote yourselves to prayer, and then come together again, so
    that Satan may not tempt you because of your lack of self-control.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'unless perhaps by consent.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'be together again'; the phrase refers to resuming life together
      as husband and wife.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀποστερεῖτε
  chosen: deprive
  alternatives:
  - defraud
  - withhold from
  lexicon: BDAG
  rationale: In this marital context, the verb refers to withholding what is due from
    one's spouse. 'Deprive' is idiomatic modern English and preserves the ethical
    force without the misleading commercial overtone of 'defraud.'
- source_word: ἀλλήλους
  chosen: one another
  alternatives:
  - each other
  lexicon: BDAG
  rationale: Standard reciprocal rendering; 'one another' fits the formal tone and
    mutuality of Paul's instruction.
- source_word: εἰ μήτι ἂν
  chosen: except perhaps
  alternatives:
  - unless perhaps
  - except possibly
  lexicon: BDAG
  rationale: This combination introduces a qualified exception rather than an absolute
    prohibition. 'Except perhaps' captures the concessive and tentative force naturally
    in English.
- source_word: ἐκ συμφώνου
  chosen: by mutual agreement
  alternatives:
  - by consent
  - from agreement
  lexicon: BDAG
  rationale: The phrase denotes shared consent between spouses. 'By mutual agreement'
    is clear, contemporary, and preserves the bilateral nature of the decision.
- source_word: πρὸς καιρόν
  chosen: for a time
  alternatives:
  - for a season
  - temporarily
  lexicon: BDAG
  rationale: The phrase indicates a limited duration. 'For a time' is natural English
    and avoids archaic tone while preserving temporariness.
- source_word: σχολάσητε
  chosen: devote yourselves
  alternatives:
  - give yourselves
  - have leisure
  lexicon: BDAG
  rationale: Here the verb means to be free for or occupied with something. 'Devote
    yourselves' communicates intentional dedication to prayer better than the overly
    literal 'have leisure for.'
- source_word: τῇ προσευχῇ
  chosen: to prayer
  alternatives:
  - for prayer
  lexicon: BDAG
  rationale: Dative complement after σχολάζω is naturally rendered 'to prayer' with
    'devote yourselves.' The singular 'prayer' matches the Greek and refers to the
    practice generally.
- source_word: πάλιν ἐπὶ τὸ αὐτὸ ἦτε
  chosen: come together again
  alternatives:
  - be together again
  - return to the same place together
  lexicon: BDAG
  rationale: This idiom in context refers to resuming marital union/cohabitation,
    likely including sexual relations. 'Come together again' is both faithful and
    appropriately modest, matching established English idiom without over-explicitness.
- source_word: πειράζῃ
  chosen: tempt
  alternatives:
  - test
  lexicon: BDAG
  rationale: In context with Satan and sexual abstinence, the sense is clearly enticement
    to sin rather than neutral testing. 'Tempt' is therefore the best rendering.
- source_word: Σατανᾶς
  chosen: Satan
  lexicon: BDAG
  rationale: Standard transliteration of the personal name, in keeping with the translation
    principle to transliterate names.
- source_word: ἀκρασίαν
  chosen: lack of self-control
  alternatives:
  - incontinence
  - self-indulgence
  - weakness of self-control
  lexicon: BDAG
  rationale: The noun denotes inability to exercise self-restraint, especially in
    this sexual context. 'Lack of self-control' is clear modern English; 'incontinence'
    is archaic and misleading in contemporary usage.
