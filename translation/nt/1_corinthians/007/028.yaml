theological_decisions:
- issue: Meaning of σάρξ in τῇ σαρκί
  chosen_reading: non-metaphorical 'in the flesh' referring to earthly/embodied circumstances
  alternative_readings:
  - sinful nature
  - worldly existence in a broader theological sense
  rationale: The doctrine guidance defaults σάρξ to 'flesh' when literal and 'sinful
    nature' when metaphorical. Here Paul is not making an anthropological statement
    about depravity but warning of practical hardship connected with marriage. Therefore
    'in the flesh' is retained in the main text, with a footnote clarifying the sense.
