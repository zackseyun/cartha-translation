id: 1CO.7.28
reference: 1 Corinthians 7:28
source:
  edition: SBLGNT
  text: ἐὰν δὲ καὶ ⸀γαμήσῃς, οὐχ ἥμαρτες. καὶ ἐὰν γήμῃ ἡ παρθένος, οὐχ ἥμαρτεν. θλῖψιν
    δὲ τῇ σαρκὶ ἕξουσιν οἱ τοιοῦτοι, ἐγὼ δὲ ὑμῶν φείδομαι.
translation:
  text: But even if you marry, you have not sinned; and if the virgin marries, she
    has not sinned. Yet such people will have trouble in the flesh, and I am trying
    to spare you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'will have affliction/distress in the flesh.' The phrase likely refers
      to earthly or bodily hardships associated with marriage, not specifically to
      the 'sinful nature.'
    reason: lexical_alternative
  - marker: b
    text: Or 'I spare you' or 'I want to spare you.' Paul states his pastoral aim
      in warning them about such trouble.
    reason: lexical_alternative
lexical_decisions:
- source_word: γαμήσῃς
  chosen: you marry
  alternatives:
  - you should marry
  - you get married
  lexicon: BDAG
  rationale: Aorist subjunctive with ἐάν in a conditional clause is best rendered
    as a simple future-oriented condition, 'if you marry.' 'Get married' is possible
    in idiomatic English, but 'marry' is slightly more formal and closer to the Greek.
- source_word: ἥμαρτες
  chosen: you have not sinned
  alternatives:
  - you did not sin
  lexicon: BDAG
  rationale: 'The aorist indicative denies that the act constitutes sin. English present
    perfect communicates the resulting moral assessment naturally: entering marriage
    is not sinful.'
- source_word: ἡ παρθένος
  chosen: the virgin
  alternatives:
  - the unmarried woman
  - the betrothed virgin
  lexicon: BDAG
  rationale: παρθένος literally means 'virgin.' Because the immediate context concerns
    marriageability and sexual status, the literal term should be preserved rather
    than generalized to 'unmarried woman.' The article is retained as 'the virgin,'
    likely referring to the woman under discussion in the surrounding argument.
- source_word: γήμῃ
  chosen: marries
  alternatives:
  - gets married
  lexicon: BDAG
  rationale: Same verb as earlier clause, here third person singular. 'Marries' keeps
    the parallelism and conditional force.
- source_word: θλῖψιν
  chosen: trouble
  alternatives:
  - affliction
  - distress
  - tribulation
  lexicon: BDAG
  rationale: θλῖψις can denote pressure, affliction, or distress. In this pastoral
    context Paul warns of the practical hardships associated with marriage in the
    present situation, so 'trouble' is clear modern English without overstating it
    into eschatological 'tribulation.'
- source_word: τῇ σαρκὶ
  chosen: in the flesh
  alternatives:
  - in this life
  - in bodily life
  lexicon: BDAG
  rationale: σάρξ is rendered by the default 'flesh' when literal or non-metaphorical.
    Here the phrase likely refers to earthly, embodied, worldly circumstances rather
    than the Pauline ethical sense 'sinful nature.' Retaining 'in the flesh' preserves
    Paul's wording and avoids interpretive overreach.
- source_word: οἱ τοιοῦτοι
  chosen: such people
  alternatives:
  - such ones
  - those who marry
  lexicon: BDAG
  rationale: The phrase refers to people of the kind just mentioned, namely those
    who marry. 'Such people' is natural English and preserves the general reference
    without narrowing beyond the context.
- source_word: φείδομαι
  chosen: I am trying to spare you
  alternatives:
  - I spare you
  - I want to spare you
  lexicon: BDAG
  rationale: The middle/passive form conveys sparing or refraining for someone's benefit.
    In context Paul explains his pastoral motive in warning them. 'I am trying to
    spare you' makes the benefactive intent explicit in natural English, though 'I
    spare you' is more formally literal.
