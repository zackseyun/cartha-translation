id: 1CO.7.6
reference: 1 Corinthians 7:6
source:
  edition: SBLGNT
  text: τοῦτο δὲ λέγω κατὰ συγγνώμην, οὐ κατ’ ἐπιταγήν.
translation:
  text: But I say this as a concession, not as a command.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'by way of concession' or 'as an allowance.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τοῦτο
  chosen: this
  alternatives:
  - what follows
  - this matter
  lexicon: BDAG
  rationale: The demonstrative points to the immediately relevant statement in context.
    'This' is the most natural and sufficiently precise English rendering without
    over-specifying whether Paul refers backward or forward.
- source_word: δὲ
  chosen: But
  alternatives:
  - Now
  - And
  lexicon: BDAG
  rationale: δέ marks a mild contrast or transition. 'But' best reflects the adversative
    nuance here, since Paul distinguishes what he is about to say from a command.
- source_word: λέγω
  chosen: I say
  alternatives:
  - I am saying
  - I speak
  lexicon: BDAG
  rationale: Simple present is the natural English equivalent of the Greek present
    indicative here.
- source_word: κατὰ συγγνώμην
  chosen: as a concession
  alternatives:
  - by way of concession
  - with allowance
  - according to permission
  lexicon: BDAG
  rationale: The phrase indicates that Paul's statement is permissive rather than
    mandatory. 'As a concession' is idiomatic modern English and captures the contrast
    with 'not as a command.'
- source_word: συγγνώμην
  chosen: concession
  alternatives:
  - allowance
  - permission
  - indulgence
  lexicon: BDAG
  rationale: In this context the noun denotes a permitted allowance or concession,
    not 'forgiveness' in the common English sense. 'Concession' best fits the contextual
    contrast with ἐπιταγή.
- source_word: οὐ
  chosen: not
  lexicon: BDAG
  rationale: Standard negation.
- source_word: κατ’ ἐπιταγήν
  chosen: as a command
  alternatives:
  - by command
  - as an order
  lexicon: BDAG
  rationale: The phrase denotes authoritative injunction. 'As a command' is clear,
    natural, and preserves the contrast with 'as a concession.'
- source_word: ἐπιταγήν
  chosen: command
  alternatives:
  - order
  - injunction
  lexicon: BDAG
  rationale: '''Command'' is the most straightforward rendering in context and aligns
    with common Pauline usage for authoritative instruction.'
