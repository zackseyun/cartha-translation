theological_decisions:
- issue: Whether Paul's statement should be rendered as a personal permission versus
    a lesser divine command
  chosen_reading: Paul explicitly frames this statement as a concession, not a binding
    command.
  alternative_readings:
  - Paul gives advice that may still carry indirect apostolic authority
  rationale: The verse itself draws a clear distinction between concessive allowance
    and command. The translation should preserve that distinction without diminishing
    Paul's apostolic role beyond what the text states.
  doctrine_reference: Preserve theological tension rather than resolve it.
