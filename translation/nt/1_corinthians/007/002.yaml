theological_decisions:
- issue: Whether the verse should be rendered as a concession to marriage for avoiding
    sexual sin or as a command about marital relations
  chosen_reading: Render the imperative straightforwardly as an instruction about
    each man and woman having their own spouse because of sexual immoralities, without
    importing broader doctrinal claims about marriage beyond the text.
  alternative_readings:
  - Render more interpretively as 'should marry'
  - Render more euphemistically as 'fulfill marital duties'
  rationale: The Greek uses ἐχέτω ('let ... have'), not an explicit verb for marrying
    or for conjugal relations. The translation should preserve the wording's directness
    and leave broader interpretive conclusions to readers and context.
  doctrine_reference: Preserve theological tension rather than resolve it.
