id: 1CO.7.2
reference: 1 Corinthians 7:2
source:
  edition: SBLGNT
  text: διὰ δὲ τὰς πορνείας ἕκαστος τὴν ἑαυτοῦ γυναῖκα ἐχέτω, καὶ ἑκάστη τὸν ἴδιον
    ἄνδρα ἐχέτω.
translation:
  text: But because of sexual immoralities, let each man have his own wife, and let
    each woman have her own husband.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'sexual immorality' (singular). The Greek has the plural, 'sexual immoralities.'
    reason: lexical_alternative
lexical_decisions:
- source_word: διὰ δὲ
  chosen: But because of
  alternatives:
  - Now because of
  - However, because of
  lexicon: BDAG
  rationale: διά with the accusative commonly expresses cause ('because of'), and
    δέ marks a mild contrast or development from the previous statement. 'But because
    of' preserves both the causal force and the discourse shift.
- source_word: τὰς πορνείας
  chosen: sexual immoralities
  alternatives:
  - sexual immorality
  - fornications
  lexicon: BDAG
  rationale: πορνεία denotes sexually immoral behavior. The plural form is present
    in Greek, so 'sexual immoralities' preserves the plurality more closely than the
    idiomatic singular 'sexual immorality.' 'Fornications' is too archaic and narrow
    for modern English.
- source_word: ἕκαστος
  chosen: each man
  alternatives:
  - each one
  - each husband
  lexicon: BDAG
  rationale: 'The masculine singular in parallel with ἑκάστη and with γυναῖκα/ἄνδρα
    indicates a male referent here, not a generic ''each one.'' ''Each husband'' would
    over-specify the state prior to the imperative; the sense is distributive: each
    man.'
- source_word: τὴν ἑαυτοῦ γυναῖκα
  chosen: his own wife
  alternatives:
  - his own woman
  lexicon: BDAG
  rationale: γυνή can mean 'woman' or 'wife'; in this marital pairing with ἄνδρα and
    in the context of regulating sexual relations, 'wife' is the natural sense. ἑαυτοῦ
    adds reflexive possession, well rendered by 'his own.'
- source_word: ἐχέτω
  chosen: let ... have
  alternatives:
  - should have
  - must have
  lexicon: BDAG
  rationale: The present active imperative, third singular, is naturally rendered
    in English with 'let ... have.' This preserves the imperative force without overstating
    it as an absolute necessity ('must').
- source_word: καὶ ἑκάστη
  chosen: and let each woman
  alternatives:
  - and each woman
  - and let each wife
  lexicon: BDAG
  rationale: The feminine singular distributive matches the first clause. 'Each woman'
    best reflects the Greek form while allowing the following object 'her own husband'
    to specify the marital relation.
- source_word: τὸν ἴδιον ἄνδρα
  chosen: her own husband
  alternatives:
  - her own man
  lexicon: BDAG
  rationale: ἀνήρ can mean 'man' or 'husband'; here, in parallel with γυναῖκα and
    in the marriage context, 'husband' is clearly intended. ἴδιον emphasizes one's
    own, appropriately rendered 'her own.'
