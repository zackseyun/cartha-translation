theological_decisions:
- issue: Nature of Paul's statement
  chosen_reading: Paul is giving a situational judgment, not a universal moral prohibition
    of marriage.
  alternative_readings:
  - Paul is issuing a timeless preference against marriage
  rationale: The wording 'I think' and the grounding 'because of the present distress'
    indicate context-specific pastoral counsel rather than an absolute doctrinal ban
    on marriage.
  doctrine_reference: Preserve theological tension rather than resolve it; do not
    import doctrinal claims the text does not make.
