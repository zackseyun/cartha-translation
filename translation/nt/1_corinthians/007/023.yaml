id: 1CO.7.23
reference: 1 Corinthians 7:23
source:
  edition: SBLGNT
  text: τιμῆς ἠγοράσθητε· μὴ γίνεσθε δοῦλοι ἀνθρώπων.
translation:
  text: You were bought with a price; do not become slaves of men.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'slaves of people' or 'slaves of human beings.' The Greek says 'men'
      in a representative sense, contrasting human masters with the Lord.
    reason: lexical_alternative
lexical_decisions:
- source_word: τιμῆς
  chosen: with a price
  alternatives:
  - for a price
  - at a price
  lexicon: BDAG
  rationale: The genitive with ἀγοράζω expresses price/cost. 'With a price' is idiomatic
    English and preserves the sense that a costly purchase has been made without specifying
    the amount.
- source_word: ἠγοράσθητε
  chosen: you were bought
  alternatives:
  - you were purchased
  lexicon: BDAG
  rationale: Aorist passive indicative, second person plural. 'Bought' is the most
    natural rendering and preserves the commercial-redemptive metaphor Paul uses here
    and in the immediate context.
- source_word: μὴ γίνεσθε
  chosen: do not become
  alternatives:
  - do not be
  - stop becoming
  lexicon: BDAG
  rationale: γίνομαι normally means 'become' rather than simple stative 'be.' With
    μή and the present middle imperative, Paul prohibits entering into or continuing
    in a state; 'do not become' best preserves that force in clear English.
- source_word: δοῦλοι
  chosen: slaves
  alternatives:
  - servants
  - bondservants
  lexicon: BDAG
  rationale: Per project guidance, δοῦλος should be rendered 'slave' where bonded
    status is salient. Here Paul contrasts believers' having been bought by another
    master with subjection to human masters, so the bonded nature is central.
- source_word: ἀνθρώπων
  chosen: of men
  alternatives:
  - of people
  - to human beings
  lexicon: BDAG
  rationale: 'The genitive depends on δοῦλοι: ''slaves of men/humans.'' ''Men'' preserves
    the traditional representative sense and matches the Greek form without over-interpreting;
    the referent is human beings in contrast to the Lord, not specifically males only.'
