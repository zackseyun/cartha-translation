theological_decisions:
- issue: Rendering δοῦλοι ἀνθρώπων in light of the project's contested-terms policy
    and the social metaphor in context
  chosen_reading: slaves of men
  alternative_readings:
  - servants of men
  - slaves of people
  rationale: 'The verse''s theological point depends on ownership and allegiance:
    believers have been bought by God/Christ and therefore must not place themselves
    under ultimate human mastery. ''Slaves'' preserves this force better than ''servants.''
    ''Men'' is retained as a representative human term in contrast with divine ownership,
    with an inclusive clarification preserved in a footnote.'
  doctrine_reference: 'DOCTRINE.md: Contested terms (δοῦλος); Gender-accurate over
    gender-neutral'
