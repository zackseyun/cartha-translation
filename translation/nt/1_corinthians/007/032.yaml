theological_decisions:
- issue: Gendered singular reference in Paul's contrast between unmarried and married
    states
  chosen_reading: 'Retain masculine singular in the main text: ''The unmarried man'''
  alternative_readings:
  - The unmarried person
  - An unmarried person
  rationale: The Greek form is masculine singular and the surrounding context distinguishes
    male and female cases in adjacent verses. Following the translation philosophy's
    gender-accurate principle, the masculine form is preserved rather than neutralized.
    Because English readers may hear this as excluding women, the broader contextual
    application can be noted in a footnote rather than altering the main text.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over
    gender-neutral)
