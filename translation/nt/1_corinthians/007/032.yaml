id: 1CO.7.32
reference: 1 Corinthians 7:32
source:
  edition: SBLGNT
  text: Θέλω δὲ ὑμᾶς ἀμερίμνους εἶναι. ὁ ἄγαμος μεριμνᾷ τὰ τοῦ κυρίου, πῶς ⸀ἀρέσῃ
    τῷ κυρίῳ·
translation:
  text: But I want you to be free from anxieties. The unmarried man is concerned with
    the things of the Lord, how he may please the Lord;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'The unmarried person.' The Greek is masculine singular ('the unmarried
      man'), though Paul addresses unmarried and married states more broadly in the
      surrounding context.
    reason: lexical_alternative
lexical_decisions:
- source_word: Θέλω δὲ
  chosen: But I want
  alternatives:
  - Now I want
  - And I want
  lexicon: BDAG
  rationale: θέλω is straightforwardly volitional ('want, desire'). δέ is mildly adversative
    or transitional; 'But' fits the contrast with the preceding discussion while remaining
    natural English.
- source_word: ὑμᾶς ἀμερίμνους εἶναι
  chosen: you to be free from anxieties
  alternatives:
  - you to be without concern
  - you to be free from cares
  lexicon: BDAG
  rationale: ἀμέριμνος denotes being without anxiety or undue care. 'Free from anxieties'
    communicates the sense idiomatically in modern English without implying total
    indifference.
- source_word: ὁ ἄγαμος
  chosen: The unmarried man
  alternatives:
  - The unmarried person
  - The unmarried one
  lexicon: BDAG
  rationale: The article plus masculine singular adjective/substantive is grammatically
    masculine. In this immediate context Paul contrasts ἄγαμος with γαμήσας/γυνή in
    surrounding verses; 'man' preserves the gendered singular form. A more inclusive
    rendering is possible contextually, but the translation philosophy prefers gender-accurate
    renderings matching the source form.
- source_word: μεριμνᾷ
  chosen: is concerned with
  alternatives:
  - is anxious about
  - cares about
  lexicon: BDAG
  rationale: The verb can mean 'be anxious/concerned about.' Since ἀμερίμνους has
    just been rendered with 'anxieties,' using 'is concerned with' avoids awkward
    repetition while preserving the semantic link.
- source_word: τὰ τοῦ κυρίου
  chosen: the things of the Lord
  alternatives:
  - the Lord's affairs
  - what belongs to the Lord
  lexicon: BDAG
  rationale: This idiom refers broadly to matters pertaining to the Lord. 'The things
    of the Lord' is a transparent and sufficiently natural rendering that preserves
    the breadth of the Greek.
- source_word: κυρίου / κυρίῳ
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Per doctrine guidelines, κύριος is rendered 'Lord' as the default NT
    title. Here the referent is the Lord in a Christian devotional sense, and 'Lord'
    preserves that theological and lexical force.
- source_word: πῶς ἀρέσῃ τῷ κυρίῳ
  chosen: how he may please the Lord
  alternatives:
  - how he might please the Lord
  - how he is to please the Lord
  lexicon: BDAG
  rationale: πῶς introduces the manner/aim under consideration. The aorist subjunctive
    ἀρέσῃ after πῶς is well represented by 'may please,' expressing contemplated action
    rather than certainty.
