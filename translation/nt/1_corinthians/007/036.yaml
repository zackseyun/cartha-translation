id: 1CO.7.36
reference: 1 Corinthians 7:36
source:
  edition: SBLGNT
  text: Εἰ δέ τις ἀσχημονεῖν ἐπὶ τὴν παρθένον αὐτοῦ νομίζει ἐὰν ᾖ ὑπέρακμος, καὶ οὕτως
    ὀφείλει γίνεσθαι, ὃ θέλει ποιείτω· οὐχ ἁμαρτάνει· γαμείτωσαν.
translation:
  text: But if anyone thinks he is acting improperly toward his virgin, if she is
    past the bloom of youth and it ought to be so, let him do what he wants; he is
    not sinning. Let them marry.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'toward his fiancée/betrothed virgin'; traditionally also understood
      as 'toward his virgin daughter.' The Greek is ambiguous.
    reason: alternative_reading
lexical_decisions:
- source_word: ἀσχημονεῖν
  chosen: acting improperly
  alternatives:
  - behaving indecently
  - acting dishonorably
  lexicon: BDAG
  rationale: The verb denotes behaving in an unbecoming or improper way. 'Acting improperly'
    is natural modern English and preserves the moral/social impropriety without overstating
    it.
- source_word: ἐπὶ τὴν παρθένον αὐτοῦ
  chosen: toward his virgin
  alternatives:
  - toward his betrothed virgin
  - toward his fiancée
  - toward his virgin daughter
  lexicon: BDAG
  rationale: 'παρθένος means ''virgin.'' The genitive αὐτοῦ is ambiguous in this context
    and has generated two major interpretations: a man and his fiancée/betrothed,
    or a father/guardian and his virgin daughter. To preserve the Greek''s ambiguity
    in the main text, ''his virgin'' is retained, with clarifying alternatives in
    a footnote.'
- source_word: ὑπέρακμος
  chosen: past the bloom of youth
  alternatives:
  - past marriageable age
  - beyond the flower of her age
  lexicon: BDAG
  rationale: The adjective refers to being beyond the prime or flower of youth. 'Past
    the bloom of youth' is idiomatic and reflects the age-related nuance without importing
    a precise modern age category.
- source_word: καὶ οὕτως ὀφείλει γίνεσθαι
  chosen: and it ought to be so
  alternatives:
  - and so it must happen
  - and the situation requires it
  lexicon: BDAG
  rationale: ὀφείλει conveys necessity or obligation; γίνεσθαι is broad ('to happen/become').
    The phrase is intentionally somewhat general in Greek, so the translation keeps
    that generality rather than specifying sexual passion or social pressure.
- source_word: ὃ θέλει ποιείτω
  chosen: let him do what he wants
  alternatives:
  - let him do what he wishes
  - let him do as he desires
  lexicon: BDAG
  rationale: A straightforward permissive imperative. 'What he wants' is clear modern
    English and does not weaken the force.
- source_word: οὐχ ἁμαρτάνει
  chosen: he is not sinning
  alternatives:
  - he does not sin
  lexicon: BDAG
  rationale: 'Present tense rendered naturally in English. The point is moral permission:
    such action is not sinful.'
- source_word: γαμείτωσαν
  chosen: Let them marry
  alternatives:
  - they should marry
  lexicon: BDAG
  rationale: Third person plural imperative naturally refers to the two parties entering
    marriage. 'Let them marry' preserves the imperative force better than the weaker
    'they should marry.'
