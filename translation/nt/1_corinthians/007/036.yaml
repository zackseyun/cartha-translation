theological_decisions:
- issue: Identity of 'his virgin' (παρθένον αὐτοῦ)
  chosen_reading: Main text preserves the ambiguity with 'his virgin' while allowing
    the verse to be read either of a man and his betrothed/fiancée or of a father/guardian
    and his virgin daughter.
  alternative_readings:
  - his fiancée/betrothed
  - his virgin daughter under his care
  rationale: The Greek expression is genuinely ambiguous, and the surrounding passage
    has been interpreted both ways in Christian tradition. In keeping with the translation
    philosophy of preserving theological and interpretive tension rather than resolving
    it where the source is ambiguous, the main text keeps the ambiguity and the footnote
    records the principal alternatives.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
