theological_decisions:
- issue: Rendering Paul's instruction about ἀφιέτω in a mixed-belief marriage
  chosen_reading: Translate as 'she must not divorce her husband'
  alternative_readings:
  - she must not leave her husband
  - let her not send away her husband
  rationale: The verse gives ethical instruction about maintaining a marriage when
    the unbelieving spouse is willing to remain. Rendering ἀφιέτω as 'divorce' expresses
    the marital-legal force in contemporary English without importing a denominational
    stance beyond the text. A more literal 'leave' is possible but can understate
    the covenantal/marital sense in this chapter.
  doctrine_reference: Translation philosophy §1, §6
