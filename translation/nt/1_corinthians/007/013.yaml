id: 1CO.7.13
reference: 1 Corinthians 7:13
source:
  edition: SBLGNT
  text: καὶ γυνὴ ⸂εἴ τις⸃ ἔχει ἄνδρα ἄπιστον, καὶ ⸀οὗτος συνευδοκεῖ οἰκεῖν μετ’ αὐτῆς,
    μὴ ἀφιέτω ⸂τὸν ἄνδρα⸃.
translation:
  text: And if a woman has an unbelieving husband, and he consents to live with her,
    she must not divorce her husband.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'she must not leave her husband.' The Greek verb can be rendered more
      literally as 'leave' or 'send away'; here it refers to ending the marriage relationship.
    reason: lexical_alternative
lexical_decisions:
- source_word: γυνή
  chosen: woman
  alternatives:
  - wife
  lexicon: BDAG
  rationale: γυνή can mean either 'woman' or 'wife.' Here the possessive marital context
    created by ἔχει ἄνδρα and the parallel with v. 12 clearly concerns a married woman.
    English idiom works best with 'a woman has ... husband' rather than 'a wife has
    ... husband,' while 'husband' makes the marital sense explicit.
- source_word: εἴ τις
  chosen: if a woman has
  alternatives:
  - if any woman has
  - if someone has
  lexicon: BDAG
  rationale: The indefinite conditional introduces a general case. 'If a woman has'
    is natural modern English and preserves the generic force without awkwardness.
- source_word: ἄνδρα
  chosen: husband
  alternatives:
  - man
  lexicon: BDAG
  rationale: Although ἀνήρ can mean 'man,' in this marital context it specifically
    means 'husband.' This is reinforced by the later repetition τὸν ἄνδρα.
- source_word: ἄπιστον
  chosen: unbelieving
  alternatives:
  - unbeliever
  - faithless
  lexicon: BDAG
  rationale: In context Paul contrasts a believing spouse with one who does not share
    the Christian faith. 'Unbelieving husband' is more adjectivally natural than 'husband
    who is an unbeliever,' and 'faithless' could misleadingly suggest marital unfaithfulness.
- source_word: οὗτος
  chosen: he
  alternatives:
  - this man
  - he himself
  lexicon: BDAG
  rationale: The demonstrative refers back to the husband. English normally uses the
    pronoun 'he' here; 'this man' would sound overly emphatic.
- source_word: συνευδοκεῖ
  chosen: consents
  alternatives:
  - agrees
  - is willing
  - approves
  lexicon: BDAG
  rationale: The verb conveys willing agreement. 'Consents' preserves the sense of
    deliberate willingness without sounding too formal; it fits the conditional marital
    setting well.
- source_word: οἰκεῖν μετ’ αὐτῆς
  chosen: to live with her
  alternatives:
  - to dwell with her
  lexicon: BDAG
  rationale: This infinitival phrase refers to continuing shared domestic life. 'Live
    with her' is clear, natural, and sufficiently formal.
- source_word: μὴ ἀφιέτω
  chosen: she must not divorce
  alternatives:
  - let her not leave
  - she must not send away
  - she must not separate from
  lexicon: BDAG
  rationale: In this chapter ἀφίημι in marital context refers to ending the marriage
    relationship. 'Divorce' communicates the practical force for modern readers better
    than the more literal 'leave' or 'send away,' which could be misunderstood as
    merely physical departure.
- source_word: τὸν ἄνδρα
  chosen: her husband
  alternatives:
  - the husband
  - the man
  lexicon: BDAG
  rationale: English requires the possessive for naturalness and clarity. The Greek
    article marks the known marital partner; 'her husband' best conveys that referent.
