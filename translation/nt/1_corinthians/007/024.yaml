theological_decisions:
- issue: Whether to make God's agency explicit in 'was called'
  chosen_reading: retain the passive 'was called' without adding 'by God'
  alternative_readings:
  - was called by God
  rationale: Pauline context strongly implies divine calling, but the Greek leaves
    the agent implicit. To avoid importing wording not present in the text, the translation
    preserves the passive while allowing readers to infer the divine agent from context.
  doctrine_reference: Translation philosophy §1, §3
- issue: Rendering ἀδελφοί in a mixed-gender congregational address
  chosen_reading: Brothers
  alternative_readings:
  - brothers and sisters
  rationale: The doctrine excerpt directs gender-accurate rather than gender-neutral
    rendering where the Greek is grammatically masculine with representative force.
    A footnote can preserve the inclusive sense for modern readers without altering
    the main text.
  doctrine_reference: Translation philosophy §4
