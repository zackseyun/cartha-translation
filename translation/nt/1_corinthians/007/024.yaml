id: 1CO.7.24
reference: 1 Corinthians 7:24
source:
  edition: SBLGNT
  text: ἕκαστος ἐν ᾧ ἐκλήθη, ἀδελφοί, ἐν τούτῳ μενέτω παρὰ θεῷ.
translation:
  text: Brothers, let each one remain with God in the condition in which he was called.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'before God' or 'in God's presence.'
    reason: lexical_alternative
  - marker: b
    text: '''Brothers'' here addresses the congregation as a whole, including women.'
    reason: cultural_note
lexical_decisions:
- source_word: ἕκαστος
  chosen: each one
  alternatives:
  - each
  - every person
  lexicon: BDAG
  rationale: Distributive singular; 'each one' preserves the individual application
    of Paul's instruction more clearly than bare 'each.'
- source_word: ἐν ᾧ ... ἐν τούτῳ
  chosen: in the condition in which ...
  alternatives:
  - in that state in which ...
  - in what situation ...
  lexicon: BDAG
  rationale: The repeated ἐν + relative/demonstrative points to the circumstance or
    condition in which one was called, not merely a physical location. 'Condition'
    is idiomatic and fits the surrounding discussion of social status and life situation.
- source_word: ἐκλήθη
  chosen: was called
  alternatives:
  - was called by God
  - was summoned
  lexicon: BDAG
  rationale: In Pauline usage here the passive most naturally refers to God's effectual
    call into the Christian life, but the text does not explicitly state 'by God,'
    so the translation keeps the passive without adding an agent.
- source_word: ἀδελφοί
  chosen: Brothers
  alternatives:
  - brothers and sisters
  - brothers, sisters
  lexicon: BDAG
  rationale: Vocative plural addressing the congregation. Per doctrine, gender-accurate
    rendering is preferred over gender-neutral; 'Brothers' preserves the source form
    while functioning representatively in context.
- source_word: μενέτω
  chosen: let ... remain
  alternatives:
  - let ... stay
  - let ... continue
  lexicon: BDAG
  rationale: Imperative of μένω; 'remain' best preserves the sense of continuing in
    one's present condition, matching the repeated theme in this passage.
- source_word: παρὰ θεῷ
  chosen: with God
  alternatives:
  - before God
  - in God's presence
  lexicon: BDAG
  rationale: παρά with the dative can denote proximity or relation. Here 'with God'
    is the most natural concise rendering, expressing that one's remaining in that
    condition is lived in relation to God. The alternatives are possible and worth
    preserving in a footnote because the phrase is somewhat compressed and interpretively
    significant.
