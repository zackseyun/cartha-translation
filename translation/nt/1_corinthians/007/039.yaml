id: 1CO.7.39
reference: 1 Corinthians 7:39
source:
  edition: SBLGNT
  text: Γυνὴ ⸀δέδεται ἐφ’ ὅσον χρόνον ζῇ ὁ ἀνὴρ αὐτῆς· ἐὰν ⸀δὲ κοιμηθῇ ὁ ἀνήρ, ἐλευθέρα
    ἐστὶν ᾧ θέλει γαμηθῆναι, μόνον ἐν κυρίῳ·
translation:
  text: A wife is bound for as long as her husband lives; but if her husband falls
    asleep, she is free to be married to whom she wishes, only in the Lord.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or: ''dies.'' The Greek uses ''falls asleep'' as a common euphemism for
      death.'
    reason: lexical_alternative
  - marker: b
    text: '''Only in the Lord'' is commonly understood to mean only to someone who
      belongs to the Lord, that is, a fellow believer.'
    reason: alternative_reading
lexical_decisions:
- source_word: Γυνή
  chosen: A wife
  alternatives:
  - A woman
  lexicon: BDAG
  rationale: In this marital-law context, γυνή is best rendered 'wife' rather than
    the more general 'woman,' since the verse explicitly concerns relation to 'her
    husband.'
- source_word: δέδεται
  chosen: is bound
  alternatives:
  - is bound by law
  - is tied
  lexicon: BDAG
  rationale: δέω in the perfect/passive conveys a continuing state of being bound.
    'Is bound' preserves the legal-relational force without adding words not present
    in the Greek.
- source_word: ἐφ’ ὅσον χρόνον
  chosen: for as long as
  alternatives:
  - as long as
  - for whatever time
  lexicon: BDAG
  rationale: This idiom expresses duration. 'For as long as' is natural English and
    accurately reflects the temporal force.
- source_word: ζῇ
  chosen: lives
  alternatives:
  - is alive
  lexicon: BDAG
  rationale: Simple present 'lives' is the most direct rendering of ζάω here.
- source_word: ἀνήρ
  chosen: husband
  alternatives:
  - man
  lexicon: BDAG
  rationale: Within the marriage context, ἀνήρ clearly means 'husband,' not merely
    'man.'
- source_word: κοιμηθῇ
  chosen: falls asleep
  alternatives:
  - dies
  lexicon: BDAG
  rationale: κοιμάομαι is a common euphemism for death. To preserve the source metaphor
    and theological texture, the main text keeps 'falls asleep,' while the idiomatic
    sense 'dies' is preserved in a footnote.
- source_word: ἐλευθέρα ἐστίν
  chosen: she is free
  alternatives:
  - she is released
  - she is at liberty
  lexicon: BDAG
  rationale: This phrase indicates release from the prior marital bond. 'She is free'
    is clear, natural, and sufficiently formal.
- source_word: ᾧ θέλει
  chosen: to whom she wishes
  alternatives:
  - to whomever she wants
  - to anyone she desires
  lexicon: BDAG
  rationale: The dative relative with θέλω expresses freedom of choice regarding a
    new spouse. 'To whom she wishes' is idiomatic and preserves the register of the
    sentence.
- source_word: γαμηθῆναι
  chosen: to be married
  alternatives:
  - to marry
  lexicon: BDAG
  rationale: The passive infinitive is more precisely reflected by 'to be married,'
    though in English this still naturally conveys remarriage.
- source_word: μόνον
  chosen: only
  alternatives:
  - provided only that
  - but only
  lexicon: BDAG
  rationale: μόνον restricts the freedom just stated. 'Only' is concise and preserves
    the limiting force.
- source_word: ἐν κυρίῳ
  chosen: in the Lord
  alternatives:
  - in the Lord Messiah
  - as one belonging to the Lord
  lexicon: BDAG
  rationale: κύριος defaults to 'Lord' per doctrine guidance. The phrase likely means
    within the sphere of allegiance to the Lord, commonly understood as marriage to
    a fellow believer; 'in the Lord' preserves the Pauline wording without over-interpreting
    in the main text.
