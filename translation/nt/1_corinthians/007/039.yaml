theological_decisions:
- issue: Meaning of 'in the Lord' in remarriage instruction
  chosen_reading: Rendered literally as 'only in the Lord' without expanding it in
    the main text.
  alternative_readings:
  - only to a fellow believer
  - only in a manner consistent with devotion to the Lord
  rationale: The phrase ἐν κυρίῳ is theologically significant and somewhat interpretively
    compressed. Expanding it to 'only to a fellow believer' may capture a common interpretation,
    but the Greek itself is more concise. Preserving the literal phrase maintains
    the text's theological tension and avoids importing a denominationally sharpened
    reading into the main text.
  doctrine_reference: 'Translation philosophy §3; Contested terms: κύριος → Lord'
- issue: Use of death euphemism
  chosen_reading: Preserved the metaphor 'falls asleep' in the main text.
  alternative_readings:
  - dies
  rationale: Paul uses κοιμηθῇ rather than a more direct verb for dying. Retaining
    the euphemism preserves the source wording and its resonance with early Christian
    speech about death, while a footnote supplies the plain sense for clarity.
  doctrine_reference: Translation philosophy §1, §6
