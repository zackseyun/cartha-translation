id: 1CO.7.20
reference: 1 Corinthians 7:20
source:
  edition: SBLGNT
  text: ἕκαστος ἐν τῇ κλήσει ᾗ ἐκλήθη ἐν ταύτῃ μενέτω.
translation:
  text: Each one should remain in the calling in which he was called.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'condition,' 'situation,' or 'station in life.' The Greek says 'calling,'
      echoing 'was called' in the same verse.
    reason: lexical_alternative
  - marker: b
    text: The Greek uses a masculine singular form ('he') representatively, applying
      the instruction to each believer.
    reason: cultural_note
lexical_decisions:
- source_word: ἕκαστος
  chosen: Each one
  alternatives:
  - Each person
  - Everyone
  lexicon: BDAG
  rationale: Distributive singular is preserved. 'Each one' reflects the individual
    application of Paul's instruction more closely than the more generalized 'everyone'.
- source_word: κλήσει
  chosen: calling
  alternatives:
  - condition
  - situation
  - station
  lexicon: BDAG
  rationale: Although in context Paul is speaking about one's social/marital/circumstantial
    state, κλῆσις is literally 'calling.' Retaining 'calling' preserves Paul's wordplay
    with ἐκλήθη ('was called') and leaves intact the theological-circumstantial tension
    of the term rather than resolving it into merely social status.
- source_word: ᾗ ἐκλήθη
  chosen: in which he was called
  alternatives:
  - when he was called
  - to which he was called
  lexicon: BDAG
  rationale: The relative construction with ἐν favors 'in which,' matching the repeated
    prepositional phrasing. 'When he was called' is possible idiomatic English, but
    it weakens the structural parallel with the opening and closing ἐν-phrases. 'He
    was called' reflects the divine passive naturally without over-specifying the
    agent in translation.
- source_word: ἐν ταύτῃ
  chosen: in [that calling]
  alternatives:
  - in it
  - therein
  lexicon: BDAG
  rationale: Rendered in the full sentence as 'in the calling ...' rather than repeating
    an awkward 'in this.' The demonstrative points back to the calling/state just
    mentioned; English smooths the repetition while preserving the referent.
- source_word: μενέτω
  chosen: should remain
  alternatives:
  - let him remain
  - must remain
  lexicon: BDAG
  rationale: Present imperative calls for continuing in one's present state. 'Should
    remain' gives clear contemporary English with imperatival force without sounding
    either archaic ('let him remain') or overly absolute ('must remain').
