theological_decisions:
- issue: Meaning of κλῆσις in context
  chosen_reading: Retain 'calling' in the main text while allowing the contextual
    sense of one's present life situation/social condition to remain implicit.
  alternative_readings:
  - condition
  - station in life
  - situation
  rationale: Paul's immediate context concerns circumcision, slavery, and other life
    circumstances, so some translations render κλῆσις as 'condition.' However, the
    Greek deliberately pairs κλήσει with ἐκλήθη, creating a rhetorical and theological
    connection between God's call and the state in which one was called. Preserving
    'calling' best maintains that tension rather than collapsing the verse into a
    purely sociological statement.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather
    than resolve it; §5, Consistency of key terms, or documented exception.
- issue: Gender rendering of singular masculine forms
  chosen_reading: Use 'he' in the main text.
  alternative_readings:
  - they
  - the person was called
  rationale: The Greek forms are grammatically masculine singular and function representatively.
    Per doctrine, gender-accurate rendering is preferred over gender-neutral smoothing.
    The representative force can be noted in a footnote for English readers.
  doctrine_reference: Translation philosophy §4, Gender-accurate over gender-neutral.
