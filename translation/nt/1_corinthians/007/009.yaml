theological_decisions:
- issue: Meaning of πυροῦσθαι in context
  chosen_reading: burn with sexual passion/desire
  alternative_readings:
  - burn in judgment
  - burn generally
  rationale: Within 1 Corinthians 7, Paul is discussing celibacy, marriage, and self-control.
    The immediate contrast between inability to exercise self-control and marrying
    strongly favors the sense of sexual desire rather than final judgment. The translation
    therefore makes the contextual sense explicit in the main text.
  doctrine_reference: 'Preserve theological tension rather than resolve it: ambiguity
    is limited here by immediate context, so no doctrinally driven alternative is
    required in the main text; a lexical alternative is preserved in a footnote.'
