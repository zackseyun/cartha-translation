id: 1CO.7.9
reference: 1 Corinthians 7:9
source:
  edition: SBLGNT
  text: εἰ δὲ οὐκ ἐγκρατεύονται, γαμησάτωσαν, κρεῖττον γάρ ἐστιν ⸀γαμῆσαι ἢ πυροῦσθαι.
translation:
  text: But if they do not have self-control, let them marry; for it is better to
    marry than to burn with passion.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or simply, 'than to burn.' The Greek expression may be left more implicit,
      but in this context it most likely refers to burning with sexual desire.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγκρατεύονται
  chosen: have self-control
  alternatives:
  - exercise self-control
  - control themselves
  lexicon: BDAG
  rationale: The middle/passive form here denotes the exercise of self-restraint,
    especially in the sexual context of the surrounding passage. 'Have self-control'
    is idiomatic modern English and preserves the sense without over-paraphrase.
- source_word: γαμησάτωσαν
  chosen: let them marry
  alternatives:
  - they should marry
  lexicon: BDAG
  rationale: Aorist imperative third plural. 'Let them marry' preserves the imperative
    force while fitting Paul's concessive instruction. 'They should marry' is possible
    but slightly more interpretive in tone.
- source_word: κρεῖττον
  chosen: better
  alternatives:
  - preferable
  lexicon: BDAG
  rationale: Comparative adjective used predicatively with ἐστιν. 'Better' is the
    natural and sufficiently formal English equivalent.
- source_word: γαμῆσαι
  chosen: to marry
  lexicon: BDAG
  rationale: Aorist infinitive parallel to πυροῦσθαι. The simple infinitive 'to marry'
    is the direct and natural rendering.
- source_word: πυροῦσθαι
  chosen: to burn with passion
  alternatives:
  - to burn
  - to be inflamed
  - to burn sexually
  lexicon: BDAG
  rationale: In this context of marriage and sexual self-control, the metaphor refers
    most naturally to being inflamed with sexual desire rather than to eschatological
    burning. Adding 'with passion' makes explicit in English what the context strongly
    implies, while preserving the metaphorical force.
- source_word: δὲ
  chosen: But
  alternatives:
  - Now
  - And
  lexicon: BDAG
  rationale: δέ marks a mild contrast or transition from the previous statement. 'But'
    best captures the contrastive movement here.
