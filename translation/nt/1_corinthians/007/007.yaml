id: 1CO.7.7
reference: 1 Corinthians 7:7
source:
  edition: SBLGNT
  text: θέλω ⸀δὲ πάντας ἀνθρώπους εἶναι ὡς καὶ ἐμαυτόν· ἀλλὰ ἕκαστος ἴδιον ⸂ἔχει χάρισμα⸃
    ἐκ θεοῦ, ⸀ὁ μὲν οὕτως, ⸁ὁ δὲ οὕτως.
translation:
  text: But I want all men to be as I myself am. Yet each has his own gift from God,
    one in this way and another in that way.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all people.' Greek 'all men' uses a masculine plural with representative
      force.
    reason: lexical_alternative
  - marker: b
    text: That is, as unmarried as Paul was; or more broadly, 'as I am.'
    reason: alternative_reading
lexical_decisions:
- source_word: θέλω
  chosen: I want
  alternatives:
  - I wish
  - I desire
  lexicon: BDAG
  rationale: Present indicative expressing Paul's personal desire or preference. 'I
    want' is natural modern English and preserves the directness without overstating
    it.
- source_word: δὲ
  chosen: But
  alternatives:
  - Now
  - And
  lexicon: BDAG
  rationale: Marks a mild contrast with the preceding context. 'But' best captures
    the adversative turn here.
- source_word: πάντας ἀνθρώπους
  chosen: all men
  alternatives:
  - everyone
  - all people
  lexicon: BDAG
  rationale: Literally 'all men/people.' In keeping with the gender-accurate philosophy,
    the masculine form is preserved as representative/generic rather than neutralized.
    Contextually Paul is speaking broadly of human persons, but the Greek is masculine
    plural, so 'all men' best matches the source form and intent.
- source_word: εἶναι ὡς καὶ ἐμαυτόν
  chosen: to be as I myself am
  alternatives:
  - to be like me
  - to be as even I am
  lexicon: BDAG
  rationale: The infinitive phrase expresses the content of Paul's desire. 'As I myself
    am' preserves the emphatic reflexive force of ἐμαυτόν better than the flatter
    'like me.'
- source_word: ἀλλὰ
  chosen: Yet
  alternatives:
  - But
  - However
  lexicon: BDAG
  rationale: Introduces an important qualification to Paul's preference. 'Yet' reads
    smoothly in English while preserving the contrast.
- source_word: ἕκαστος
  chosen: each
  alternatives:
  - each person
  - each one
  lexicon: BDAG
  rationale: Distributive singular emphasizing individual differentiation. 'Each'
    is concise and natural.
- source_word: ἴδιον
  chosen: his own
  alternatives:
  - one's own
  - personal
  lexicon: BDAG
  rationale: Stresses what is proper or particular to each individual. 'His own' matches
    the singular masculine grammatical form and keeps the distributive sense.
- source_word: ἔχει χάρισμα
  chosen: has his own gift
  alternatives:
  - has a gracious gift
  - has a gift of grace
  lexicon: BDAG
  rationale: χάρισμα in Pauline usage commonly denotes a graciously given endowment
    from God. 'Gift' is the clearest English equivalent here; 'his own' is brought
    forward to reflect ἴδιον modifying χάρισμα.
- source_word: ἐκ θεοῦ
  chosen: from God
  alternatives:
  - from God himself
  - out of God
  lexicon: BDAG
  rationale: Standard source language indicating divine origin. 'From God' is straightforward
    and sufficient.
- source_word: ὁ μὲν οὕτως, ὁ δὲ οὕτως
  chosen: one in this way and another in that way
  alternatives:
  - one this way, another that way
  - one in one way, another in another
  lexicon: BDAG
  rationale: A balanced correlative construction contrasting differing divine gifts
    or callings. The chosen rendering is idiomatic while preserving the parallelism
    and open-endedness of the Greek.
