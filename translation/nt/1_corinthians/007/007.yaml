theological_decisions:
- issue: Meaning of Paul's state in 'as I myself am'
  chosen_reading: Paul refers to his unmarried/celibate state in the immediate context,
    without making celibacy universally normative.
  alternative_readings:
  - Paul refers more broadly to his manner of life or freedom from marital obligations
  rationale: The surrounding context in 1 Corinthians 7 concerns marriage and singleness,
    so the most natural reading is that Paul wishes others were unmarried as he is.
    However, the verse immediately qualifies this by grounding differing states in
    God's gifts, so the translation should not imply a universal command or superior
    spiritual status beyond what the text states.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Rendering of χάρισμα
  chosen_reading: gift
  alternative_readings:
  - gracious gift
  - spiritual gift
  rationale: The term denotes a gift from God, but translating it as 'spiritual gift'
    could import later technical associations not explicit in this verse. 'Gift' preserves
    the theological point of divine enablement without over-specification.
