theological_decisions:
- issue: Whether the verse should be rendered with explicit marital terminology ('married/divorced')
    or with Paul's binding/release imagery.
  chosen_reading: Retain the imagery of being 'bound' and 'released' in the main text.
  alternative_readings:
  - Are you married? Do not seek a divorce. Are you divorced? Do not seek a wife.
  rationale: The Greek uses δέω/λύω language rather than the more explicit vocabulary
    for marrying/divorcing. Preserving that imagery is more textually transparent
    and avoids importing a narrower legal category than the verse itself states, while
    the marital sense remains clear from γυνή in context.
  doctrine_reference: Translation philosophy §§1, 3, 5
