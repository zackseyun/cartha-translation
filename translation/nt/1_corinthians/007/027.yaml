id: 1CO.7.27
reference: 1 Corinthians 7:27
source:
  edition: SBLGNT
  text: δέδεσαι γυναικί; μὴ ζήτει λύσιν· λέλυσαι ἀπὸ γυναικός; μὴ ζήτει γυναῖκα·
translation:
  text: Are you bound to a wife? Do not seek release. Are you released from a wife?
    Do not seek a wife.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or, more interpretively: ''Are you married? Do not seek a divorce. Are
      you divorced? Do not seek a wife.'' The Greek more literally speaks of being
      ''bound'' and ''released.'''
    reason: alternative_reading
lexical_decisions:
- source_word: δέδεσαι
  chosen: are you bound
  alternatives:
  - are you married
  - are you tied
  lexicon: BDAG
  rationale: Perfect passive/middle of δέω, literally 'have you been bound/are you
    bound.' 'Bound' preserves the metaphor Paul uses and matches the parallel with
    λύσις/λέλυσαι. 'Married' is interpretive and smoother, but it weakens the lexical
    contrast with 'release' in the same verse.
- source_word: γυναικί
  chosen: to a wife
  alternatives:
  - to a woman
  lexicon: BDAG
  rationale: In this marital context γυνή clearly refers to 'wife,' not merely 'woman.'
    The dative with δέδεσαι is naturally rendered 'bound to a wife.'
- source_word: ζήτει
  chosen: seek
  alternatives:
  - look for
  - pursue
  lexicon: BDAG
  rationale: '''Seek'' is the standard and sufficiently natural rendering of ζητέω
    here, preserving the imperative force without over-paraphrase.'
- source_word: λύσιν
  chosen: release
  alternatives:
  - freedom
  - separation
  lexicon: BDAG
  rationale: λύσις denotes loosening/release. 'Release' preserves the lexical tie
    to λέλυσαι ('released') in the second clause. 'Divorce' would be too narrow and
    more explicit than the Greek wording itself.
- source_word: λέλυσαι
  chosen: are you released
  alternatives:
  - are you loosed
  - are you unmarried
  - have you been separated
  lexicon: BDAG
  rationale: Perfect passive/middle of λύω, paired with δέδεσαι. 'Released' keeps
    the verbal correspondence with λύσιν and avoids prematurely deciding whether Paul
    refers specifically to divorce, widowhood, or a broader unmarried state.
- source_word: ἀπὸ γυναικός
  chosen: from a wife
  alternatives:
  - from a woman
  lexicon: BDAG
  rationale: Given the marriage context, γυνή is best rendered 'wife.' The preposition
    ἀπό is straightforwardly 'from.'
- source_word: γυναῖκα
  chosen: a wife
  alternatives:
  - a woman
  lexicon: BDAG
  rationale: In the concluding prohibition, the context is clearly marriage, so 'wife'
    is more precise than 'woman' in English.
