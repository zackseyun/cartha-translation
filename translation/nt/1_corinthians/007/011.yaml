id: 1CO.7.11
reference: 1 Corinthians 7:11
source:
  edition: SBLGNT
  text: ἐὰν δὲ καὶ χωρισθῇ, μενέτω ἄγαμος ἢ τῷ ἀνδρὶ καταλλαγήτω— καὶ ἄνδρα γυναῖκα
    μὴ ἀφιέναι.
translation:
  text: But if she does separate, let her remain unmarried, or else be reconciled
    to her husband—and a husband must not divorce his wife.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'But even if she does separate.' The Greek can carry a slightly concessive
      force here.
    reason: lexical_alternative
  - marker: b
    text: Or 'must not send away his wife.' The verb can be rendered more literally
      as 'send away,' though in this marital context it commonly refers to divorce.
    reason: lexical_alternative
lexical_decisions:
- source_word: χωρισθῇ
  chosen: does separate
  alternatives:
  - is separated
  - leaves
  lexicon: BDAG
  rationale: χωρίζω can mean separate or depart. In this marital context it refers
    to separation between spouses. 'Does separate' preserves the active sense of the
    Greek without over-specifying legal divorce; 'is separated' would tilt passive,
    and 'leaves' is possible but narrower.
- source_word: μενέτω
  chosen: let her remain
  alternatives:
  - let her stay
  lexicon: BDAG
  rationale: μένω commonly means remain, stay, continue. 'Remain' fits the imperative
    and pairs naturally with 'unmarried' in English.
- source_word: ἄγαμος
  chosen: unmarried
  alternatives:
  - single
  lexicon: BDAG
  rationale: ἄγαμος means unmarried. 'Single' is more idiomatic but broader and more
    modern-social in nuance; 'unmarried' is more precise to Paul's marital-status
    instruction.
- source_word: καταλλαγήτω
  chosen: be reconciled
  alternatives:
  - be restored
  lexicon: BDAG
  rationale: καταλλάσσω in passive imperative means be reconciled. 'Be restored' is
    interpretive; 'be reconciled' preserves the relational and covenantal sense without
    paraphrase.
- source_word: ἀνδρί
  chosen: husband
  alternatives:
  - man
  lexicon: BDAG
  rationale: ἀνήρ can mean man or husband. Here the marital context requires 'husband'.
- source_word: ἄνδρα
  chosen: a husband
  alternatives:
  - a man
  lexicon: BDAG
  rationale: Again ἀνήρ in context means husband. The anarthrous form is naturally
    rendered generically in English as 'a husband'.
- source_word: γυναῖκα
  chosen: his wife
  alternatives:
  - woman
  lexicon: BDAG
  rationale: γυνή can mean woman or wife. In this context it clearly means wife; adding
    'his' makes the marital relation explicit in idiomatic English.
- source_word: ἀφιέναι
  chosen: divorce
  alternatives:
  - send away
  - leave
  lexicon: BDAG
  rationale: ἀφίημι literally means send away, release, leave, forgive depending on
    context. In marriage contexts it commonly refers to divorcing or dismissing a
    spouse. 'Divorce' communicates the marital-legal force most clearly for modern
    readers, while 'send away' is preserved as an alternative.
- source_word: μὴ ἀφιέναι
  chosen: must not divorce
  alternatives:
  - is not to divorce
  - not to leave
  lexicon: BDAG
  rationale: The construction expresses prohibition/instruction. Rendering it as 'must
    not divorce' gives clear imperative force in natural English, while staying within
    the sense of the Greek.
- source_word: ἐὰν δὲ καὶ
  chosen: But if
  alternatives:
  - But even if
  - Now if
  lexicon: BDAG
  rationale: The phrase introduces a conditional concession. 'But if' is the cleanest
    English. The καί may have a concessive nuance ('even if'), but that is not required
    to be made explicit in the main text.
