theological_decisions:
- issue: Whether χωρισθῇ and ἀφιέναι should both be rendered with the same English
    term ('divorce')
  chosen_reading: Render χωρισθῇ as 'separate' and ἀφιέναι as 'divorce'
  alternative_readings:
  - Render both as 'divorce'
  - Render both more generally as 'separate/leave'
  rationale: Paul uses two different verbs. Preserving that distinction avoids collapsing
    a possible difference between separation and formal divorce. This also avoids
    importing a more precise legal category into χωρισθῇ than the Greek itself demands,
    while still recognizing that ἀφιέναι in this context carries divorce/dismissal
    force.
  doctrine_reference: Translation philosophy §1, §5
- issue: Whether to make the female subject explicit in English
  chosen_reading: Use 'she' and 'her' in the first clause
  alternative_readings:
  - Use a gender-neutral paraphrase such as 'the wife' throughout
  rationale: The immediate context addresses the wife first, and the verb is third-person
    singular without an explicit noun in this clause. English requires an explicit
    subject; 'she' accurately reflects the discourse context and preserves the gendered
    structure of Paul's paired instructions.
  doctrine_reference: Translation philosophy §4
