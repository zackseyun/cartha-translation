id: 1CO.7.1
reference: 1 Corinthians 7:1
source:
  edition: SBLGNT
  text: Περὶ δὲ ὧν ⸀ἐγράψατε, καλὸν ἀνθρώπῳ γυναικὸς μὴ ἅπτεσθαι·
translation:
  text: 'Now concerning the matters about which you wrote: it is good for a man not
    to touch a woman.[a]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: 'a'
    text: Or, more idiomatically, 'not to have sexual relations with a woman.' The
      Greek says 'not to touch a woman'; 'woman' may also be understood as 'wife.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Περὶ δὲ
  chosen: Now concerning
  alternatives:
  - Concerning now
  - As for
  lexicon: BDAG
  rationale: Introduces a new topic in response to the Corinthians' letter. 'Now concerning'
    is a natural English discourse marker that preserves Paul's transition.
- source_word: ὧν ἐγράψατε
  chosen: the matters you wrote about
  alternatives:
  - what you wrote
  - the things about which you wrote
  lexicon: BDAG
  rationale: The relative pronoun with γράφω refers to matters raised in the Corinthians'
    correspondence. This rendering is idiomatic while retaining the plural sense of
    issues/topics.
- source_word: καλὸν
  chosen: it is good
  alternatives:
  - it is proper
  - it is commendable
  lexicon: BDAG
  rationale: καλός here expresses what is good/fitting/commendable. 'It is good' preserves
    the broad evaluative sense without overstating it as a command.
- source_word: ἀνθρώπῳ
  chosen: for a man
  alternatives:
  - for a person
  - for a husband
  lexicon: BDAG
  rationale: Although ἄνθρωπος can be generic, the immediate pairing with γυνή in
    this context of male-female sexual relations favors 'man.' This follows the project's
    gender-accurate principle rather than neutralizing the expression.
- source_word: γυναικὸς
  chosen: a woman
  alternatives:
  - a wife
  lexicon: BDAG
  rationale: γυνή can mean 'woman' or 'wife.' In this opening summary statement, 'woman'
    is the broader and less interpretively restrictive choice; the marital-specific
    alternative is preserved in a footnote because the verse is debated in relation
    to marriage and celibacy.
- source_word: μὴ ἅπτεσθαι
  chosen: not to touch
  alternatives:
  - not to have sexual relations with
  - not to marry
  lexicon: BDAG
  rationale: Literally the phrase means 'not to touch,' but in this context it is
    widely understood as a euphemism for sexual contact. The main text keeps the metaphorically
    literal wording for transparency, while a footnote preserves the sexual-relations
    sense as the likely idiomatic force. 'Not to marry' is too interpretive for the
    main text.
