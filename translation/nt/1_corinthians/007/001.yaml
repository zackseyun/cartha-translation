theological_decisions:
- issue: Whether Paul's statement is rendered as a general commendation of celibacy
    or as a quotation/slogan from the Corinthians
  chosen_reading: 'Render as Paul''s reported topic statement without quotation marks:
    ''it is good for a man not to touch a woman.'''
  alternative_readings:
  - 'Render in quotation marks as a Corinthian slogan: ''It is good for a man not
    to touch a woman'''
  rationale: The Greek text itself does not mark quotation, and punctuation/quotation
    are interpretive. Leaving it unquoted preserves the ambiguity and avoids resolving
    a debated interpretive issue in translation. The following context can be read
    either as Paul's qualified agreement or his response to a Corinthian position.
  doctrine_reference: Preserve theological tension rather than resolve it.
