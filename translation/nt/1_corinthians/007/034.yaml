theological_decisions:
- issue: Whether Paul's statement about the unmarried woman and the virgin should
    be rendered as two separate categories or as an appositional clarification
  chosen_reading: 'Rendered appositionally: ''the unmarried woman, that is, the virgin'''
  alternative_readings:
  - 'Rendered coordinately: ''the unmarried woman and the virgin'''
  rationale: The Greek wording is syntactically compressed and the singular verb favors
    taking the phrase as a unified subject. The appositional rendering yields clear
    English while preserving Paul's contrast between unmarried and married states.
    Because the coordinated reading remains viable, it is preserved in a footnote
    rather than being erased.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
