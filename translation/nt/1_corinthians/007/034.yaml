id: 1CO.7.34
reference: 1 Corinthians 7:34
source:
  edition: SBLGNT
  text: ⸀καὶ μεμέρισται. καὶ ἡ γυνὴ ⸂ἡ ἄγαμος⸃ καὶ ἡ ⸀παρθένος μεριμνᾷ τὰ τοῦ κυρίου,
    ἵνα ᾖ ἁγία καὶ ⸀τῷ σώματι καὶ ⸁τῷ πνεύματι· ἡ δὲ γαμήσασα μεριμνᾷ τὰ τοῦ κόσμου,
    πῶς ⸀ἀρέσῃ τῷ ἀνδρί.
translation:
  text: And she is divided. And the unmarried woman, that is, the virgin, is concerned
    about the things of the Lord, so that she may be holy both in body and in spirit.
    But the married woman is concerned about the things of the world, how she may
    please her husband.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'And the unmarried woman and the virgin are concerned about the things
      of the Lord.' The Greek can be read as listing two categories rather than identifying
      the unmarried woman with the virgin.
    reason: alternative_reading
lexical_decisions:
- source_word: μεμέρισται
  chosen: is divided
  alternatives:
  - has been divided
  - is distracted
  lexicon: BDAG
  rationale: Perfect passive indicative of μερίζω, continuing the thought from the
    previous verse. 'Is divided' preserves the passive/resultative sense and the metaphor
    of divided interests better than the more interpretive 'is distracted.'
- source_word: γυνὴ ἡ ἄγαμος
  chosen: the unmarried woman
  alternatives:
  - the unmarried wife
  - the unmarried woman/wife
  lexicon: BDAG
  rationale: γυνή can mean 'woman' or 'wife'; here with ἄγαμος the sense is a woman
    not married. 'Unmarried woman' is the clearest English rendering in this contrast
    with the married woman.
- source_word: παρθένος
  chosen: the virgin
  alternatives:
  - the virgin woman
  - the maiden
  lexicon: BDAG
  rationale: παρθένος most directly means 'virgin.' Retaining 'virgin' preserves the
    lexical specificity of the Greek rather than flattening it to a more general term
    like 'maiden.'
- source_word: γυνὴ ἡ ἄγαμος καὶ ἡ παρθένος
  chosen: the unmarried woman, that is, the virgin
  alternatives:
  - the unmarried woman and the virgin
  - the unmarried wife and the virgin
  lexicon: BDAG
  rationale: The syntax is compressed and has been understood either as two coordinated
    categories or as apposition/epexegetical clarification. Rendering with 'that is'
    makes good sense of the singular verb μεριμνᾷ and avoids awkward English, while
    preserving the likely sense that Paul is speaking of the unmarried female state
    represented by the virgin. The alternative is preserved in a footnote because
    the Greek can be read coordinately.
- source_word: μεριμνᾷ
  chosen: is concerned about
  alternatives:
  - cares about
  - is anxious about
  lexicon: BDAG
  rationale: In this chapter the term denotes focused concern or preoccupation, not
    necessarily sinful anxiety. 'Is concerned about' fits the context and reads naturally
    in English.
- source_word: τὰ τοῦ κυρίου
  chosen: the things of the Lord
  alternatives:
  - the Lord's interests
  - what belongs to the Lord
  lexicon: BDAG
  rationale: A fairly literal rendering preserves Paul's repeated contrast between
    'the things of the Lord' and 'the things of the world.' κύριος is rendered 'Lord'
    per doctrine defaults.
- source_word: ἵνα ᾖ ἁγία
  chosen: so that she may be holy
  alternatives:
  - in order that she may be holy
  - that she may be devoted
  lexicon: BDAG
  rationale: ἵνα with subjunctive expresses purpose/result. 'So that she may be holy'
    preserves the explicit holiness language rather than paraphrasing it as mere devotion.
- source_word: ἁγία
  chosen: holy
  alternatives:
  - set apart
  - consecrated
  lexicon: BDAG
  rationale: '''Holy'' is the standard and theologically weighty rendering; alternatives
    are interpretive expansions.'
- source_word: τῷ σώματι καὶ τῷ πνεύματι
  chosen: both in body and in spirit
  alternatives:
  - in body and spirit
  lexicon: BDAG
  rationale: The dative phrases indicate the spheres/respects in which holiness is
    in view. 'Both ... and ...' brings out καὶ ... καὶ naturally in English without
    overstating an anthropological distinction.
- source_word: ἡ δὲ γαμήσασα
  chosen: the married woman
  alternatives:
  - the woman who has married
  - she who married
  lexicon: BDAG
  rationale: The aorist participle functions substantivally for the woman in the married
    state. 'The married woman' is idiomatic and matches the contrast with 'the unmarried
    woman.'
- source_word: τὰ τοῦ κόσμου
  chosen: the things of the world
  alternatives:
  - worldly matters
  - the world's interests
  lexicon: BDAG
  rationale: This mirrors the prior phrase structurally and avoids importing a pejorative
    sense stronger than the context requires.
- source_word: πῶς ἀρέσῃ τῷ ἀνδρί
  chosen: how she may please her husband
  alternatives:
  - how she might please her husband
  - how she may please the man
  lexicon: BDAG
  rationale: ἀνήρ here clearly means 'husband' in the marital context. 'How she may
    please her husband' is the natural English equivalent of the deliberative/concern
    sense.
