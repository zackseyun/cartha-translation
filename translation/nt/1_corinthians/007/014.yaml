theological_decisions:
- issue: Meaning of the unbelieving spouse being 'made holy'
  chosen_reading: The phrase denotes a relational/covenantal holiness or set-apart
    status within the marriage, not automatic salvation of the unbelieving spouse.
  alternative_readings:
  - The unbelieving spouse is saved by marriage to a believer
  - The phrase refers only to sexual legitimacy of the marriage
  rationale: Paul's argument concerns the status of the marriage and the children,
    not regeneration apart from personal faith. Rendering ἡγίασται as 'has been made
    holy' preserves the text's language while avoiding a doctrinal overstatement.
    The verse itself grounds the claim in the holiness/cleanness contrast regarding
    the children.
  doctrine_reference: Preserve theological tension rather than resolve it; do not
    import doctrinal claims the text does not make.
- issue: Referent of ἀδελφῷ
  chosen_reading: Retain 'the brother' in the main text, understood as the believing
    husband.
  alternative_readings:
  - Translate directly as 'the husband' for symmetry
  - Translate as 'the believing spouse'
  rationale: The Greek specifically uses ἀδελφός rather than ἀνήρ in the second clause.
    Preserving 'the brother' maintains transparency to the source and reflects Paul's
    Christian-family language, while a footnote explains the likely referent for readability.
  doctrine_reference: Gender-accurate over gender-neutral; original-language primacy
    over translation tradition.
