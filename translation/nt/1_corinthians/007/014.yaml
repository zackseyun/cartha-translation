id: 1CO.7.14
reference: 1 Corinthians 7:14
source:
  edition: SBLGNT
  text: ἡγίασται γὰρ ὁ ἀνὴρ ὁ ἄπιστος ἐν τῇ γυναικί, καὶ ἡγίασται ἡ γυνὴ ἡ ἄπιστος
    ἐν τῷ ⸀ἀδελφῷ· ἐπεὶ ἄρα τὰ τέκνα ὑμῶν ἀκάθαρτά ἐστιν, νῦν δὲ ἅγιά ἐστιν.
translation:
  text: For the unbelieving husband has been made holy through his wife, and the unbelieving
    wife has been made holy through the brother; otherwise your children would be
    unclean, but as it is, they are holy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or, ''through the believing husband.'' Greek: ''through the brother,''
      likely using ''brother'' in Paul''s customary sense for a fellow believer.'
    reason: lexical_alternative
  - marker: b
    text: '''Has been made holy'' here refers to a set-apart or consecrated status
      in relation to the believing spouse and the family, not necessarily to personal
      salvation.'
    reason: cultural_note
lexical_decisions:
- source_word: ἡγίασται
  chosen: has been made holy
  alternatives:
  - has been sanctified
  - is sanctified
  lexicon: BDAG
  rationale: Perfect passive indicates a resulting state from prior action. 'Has been
    made holy' is clear modern English and avoids importing a full doctrine of personal
    salvation; 'sanctified' is a traditional alternative but more ecclesiastical and
    potentially misleading here.
- source_word: ἄπιστος
  chosen: unbelieving
  alternatives:
  - unbeliever
  - faithless
  lexicon: BDAG
  rationale: In this marital context the adjective describes one who does not believe,
    not necessarily one who is unreliable. 'Unbelieving' works naturally attributively
    with husband/wife.
- source_word: ἐν
  chosen: through
  alternatives:
  - in
  - by means of
  lexicon: BDAG
  rationale: 'Although literally ''in,'' here the relational/instrumental sense is
    most natural in English: the unbelieving spouse is made holy in relation to or
    by virtue of union with the believing spouse. ''Through'' communicates this without
    wooden awkwardness.'
- source_word: γυνή
  chosen: wife
  alternatives:
  - woman
  lexicon: BDAG
  rationale: The immediate context is marriage, so 'wife' is the contextually specific
    sense.
- source_word: ἀνήρ
  chosen: husband
  alternatives:
  - man
  lexicon: BDAG
  rationale: The immediate context is marriage, so 'husband' is the contextually specific
    sense.
- source_word: ἀδελφῷ
  chosen: the brother
  alternatives:
  - the believing husband
  - the brother [i.e., Christian husband]
  lexicon: BDAG
  rationale: Paul commonly uses 'brother' for a fellow believer. The Greek text here
    reads 'the brother,' likely meaning the Christian husband in contrast to the unbelieving
    wife. The main text preserves the source wording rather than smoothing it fully
    to 'husband,' while a footnote preserves the explanatory alternative.
- source_word: ἐπεὶ ἄρα
  chosen: otherwise
  alternatives:
  - for then
  - since otherwise
  lexicon: BDAG
  rationale: This combination introduces the consequence if the prior statement were
    not true. 'Otherwise' is idiomatic and captures the inferential force.
- source_word: ἀκάθαρτά
  chosen: unclean
  alternatives:
  - impure
  lexicon: BDAG
  rationale: '''Unclean'' preserves the cultic and covenantal resonance of the term
    better than the more generalized ''impure.'''
- source_word: νῦν δὲ
  chosen: but as it is
  alternatives:
  - but now
  - but in fact now
  lexicon: BDAG
  rationale: The phrase marks the actual state in contrast to the hypothetical. 'But
    as it is' is natural English and preserves the contrast.
- source_word: ἅγιά
  chosen: holy
  alternatives:
  - set apart
  - consecrated
  lexicon: BDAG
  rationale: '''Holy'' keeps lexical continuity with ἡγίασται/ἅγιος and preserves
    the theological register. ''Set apart'' is interpretive and may flatten the connection.'
