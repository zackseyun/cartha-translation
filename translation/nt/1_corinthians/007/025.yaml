theological_decisions:
- issue: Nature of Paul's authority in contrast to a dominical saying
  chosen_reading: Paul distinguishes between lacking a direct command from the Lord
    and still offering an authoritative apostolic judgment.
  alternative_readings:
  - Paul's words here are merely private opinion with no authority
  - Paul is citing an otherwise unknown command of Jesus indirectly
  rationale: The contrast between ἐπιταγή and γνώμη indicates no explicit command
    from Jesus on this matter, yet Paul still speaks as one made trustworthy by the
    Lord's mercy. The translation preserves this distinction without diminishing apostolic
    authority or overstating it as a direct dominical command.
  doctrine_reference: Translation philosophy §3 Preserve theological tension rather
    than resolve it.
