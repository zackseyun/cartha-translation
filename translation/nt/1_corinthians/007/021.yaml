theological_decisions:
- issue: Interpretive ambiguity of μᾶλλον χρῆσαι
  chosen_reading: 'Paul encourages taking freedom if it is available: ''rather make
    use of it.'''
  alternative_readings:
  - Paul tells the slave to make use of his present condition instead, i.e., remain
    as he is.
  rationale: 'The immediate syntax most readily points to the opportunity implied
    by ''if you are able to become free'' as the understood object of χρῆσαι. This
    yields a coherent sense: slavery should not cause distress, yet freedom may be
    accepted if available. Because the Greek leaves the object implicit and the alternative
    has longstanding support, the tension is preserved with a footnote rather than
    erased.'
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it); Contested terms table for δοῦλος
