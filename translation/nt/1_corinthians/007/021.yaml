id: 1CO.7.21
reference: 1 Corinthians 7:21
source:
  edition: SBLGNT
  text: Δοῦλος ἐκλήθης; μή σοι μελέτω· ἀλλ’ εἰ καὶ δύνασαι ἐλεύθερος γενέσθαι, μᾶλλον
    χρῆσαι.
translation:
  text: Were you called as a slave? Do not let it trouble you. But if you are indeed
    able to become free, rather make use of it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'rather make use of your present condition,' that is, remain as you
      are. The Greek 'rather make use' leaves the object unstated and has been understood
      in both ways.
    reason: alternative_reading
lexical_decisions:
- source_word: Δοῦλος
  chosen: slave
  alternatives:
  - servant
  - bondservant
  lexicon: BDAG
  rationale: Rendered 'slave' rather than 'servant' because δοῦλος denotes a bonded
    status, and in this context Paul is explicitly speaking about social condition
    and possible manumission ('become free'). This matches the doctrine guideline
    that 'slave' should be used where the bonded nature is salient.
- source_word: ἐκλήθης
  chosen: were you called
  alternatives:
  - were you called by God
  - were you called to faith
  lexicon: BDAG
  rationale: Kept the conventional Pauline sense of divine calling but translated
    simply as 'were you called' to preserve the Greek wording and avoid importing
    an explanatory phrase not present in the text. In context, it refers to one's
    condition at the time of God's call.
- source_word: μή σοι μελέτω
  chosen: do not let it trouble you
  alternatives:
  - do not be concerned about it
  - let it not matter to you
  lexicon: BDAG
  rationale: This idiom expresses concern or anxiety rather than mere cognitive notice.
    'Do not let it trouble you' is natural modern English and preserves the pastoral
    force.
- source_word: ἐλεύθερος γενέσθαι
  chosen: to become free
  alternatives:
  - to gain your freedom
  - to be made free
  lexicon: BDAG
  rationale: Rendered straightforwardly to reflect change of social status from slavery
    to freedom. 'Become free' stays close to the Greek infinitive construction while
    remaining idiomatic.
- source_word: μᾶλλον χρῆσαι
  chosen: rather make use of it
  alternatives:
  - rather make use of your present condition
  - rather avail yourself of the opportunity
  - rather remain in slavery
  lexicon: BDAG
  rationale: 'The phrase is famously ambiguous: χράομαι means ''make use of,'' but
    the object is unstated. The most natural antecedent in the immediate clause is
    the opportunity for freedom, yielding ''make use of it.'' Because the alternative
    reading (''rather make use of your present condition,'' i.e., remain enslaved)
    has substantial history, it is preserved in a footnote rather than resolved silently.'
