id: 1CO.7.38
reference: 1 Corinthians 7:38
source:
  edition: SBLGNT
  text: ὥστε καὶ ὁ ⸀γαμίζων ⸂τὴν παρθένον ἑαυτοῦ⸃ καλῶς ποιεῖ, ⸂καὶ ὁ⸃ μὴ ⸁γαμίζων
    κρεῖσσον ⸀ποιήσει.
translation:
  text: So then, the one who gives his own virgin in marriage does well, and the one
    who does not give her in marriage will do better.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the one who marries his virgin fiancée does well, and the one who does
      not marry her will do better.' Another common interpretation is 'his virgin
      daughter.' The Greek verb here more naturally means 'give in marriage,' so the
      main text preserves that sense while leaving the exact relationship less specific.
    reason: alternative_reading
lexical_decisions:
- source_word: ὥστε
  chosen: So then
  alternatives:
  - therefore
  - thus
  lexicon: BDAG
  rationale: Draws an inferential conclusion from the preceding argument. 'So then'
    is natural modern English and preserves the logical force.
- source_word: γαμίζων
  chosen: gives ... in marriage
  alternatives:
  - marries
  - betroths
  lexicon: BDAG
  rationale: The causative verb γαμίζω commonly means 'give in marriage' rather than
    simply 'marry.' In this context, retaining the causative sense best fits the Greek
    form and avoids collapsing it into γαμέω. Because the object is 'his own virgin,'
    this likely refers to a father/guardian giving a virgin daughter/ward in marriage,
    though the exact social relation remains debated.
- source_word: τὴν παρθένον ἑαυτοῦ
  chosen: his own virgin
  alternatives:
  - his virgin daughter
  - his fiancée/virgin betrothed
  lexicon: BDAG
  rationale: παρθένος means 'virgin,' and ἑαυτοῦ marks possession/reflexive relation.
    The literal phrase is preserved in the main text to avoid over-resolving the debated
    referent. English requires some smoothing, but 'his own virgin' keeps the ambiguity
    better than specifying 'daughter' in the text.
- source_word: καλῶς ποιεῖ
  chosen: does well
  alternatives:
  - does rightly
  - does a good thing
  lexicon: BDAG
  rationale: A standard idiomatic rendering that preserves the evaluative but not
    absolute force of the Greek.
- source_word: μὴ γαμίζων
  chosen: does not give her in marriage
  alternatives:
  - does not marry
  - does not betroth her
  lexicon: BDAG
  rationale: For consistency with the earlier participle, the same causative sense
    is maintained. The supplied object 'her' is implicit from the prior clause and
    necessary in English.
- source_word: κρεῖσσον ποιήσει
  chosen: will do better
  alternatives:
  - will do what is better
  - will do best
  lexicon: BDAG
  rationale: κρεῖσσον is comparative, not superlative. 'Will do better' preserves
    Paul's comparative judgment without overstating it.
