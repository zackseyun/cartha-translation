theological_decisions:
- issue: Referent of 'his own virgin' and the sense of γαμίζω in 1 Corinthians 7:38
  chosen_reading: Main text preserves the causative sense ('gives ... in marriage')
    and leaves the referent somewhat open rather than specifying 'daughter' in the
    translation.
  alternative_readings:
  - '''the one who marries his virgin fiancée does well, and the one who does not
    marry her will do better'''
  - '''the one who gives his virgin daughter in marriage does well, and the one who
    does not give her in marriage will do better'''
  rationale: This verse is part of a well-known interpretive crux in 1 Corinthians
    7:36–38. The Greek verb γαμίζω favors a causative sense ('give in marriage'),
    but the social identity of the virgin (daughter, ward, or fiancée in a less common
    construal) is debated. In keeping with the translation philosophy, the main text
    avoids importing a specific social reconstruction beyond what the Greek most directly
    supports, while preserving major alternatives in a footnote.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
