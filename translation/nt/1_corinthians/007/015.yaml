id: 1CO.7.15
reference: 1 Corinthians 7:15
source:
  edition: SBLGNT
  text: εἰ δὲ ὁ ἄπιστος χωρίζεται, χωριζέσθω· οὐ δεδούλωται ὁ ἀδελφὸς ἢ ἡ ἀδελφὴ ἐν
    τοῖς τοιούτοις, ἐν δὲ εἰρήνῃ κέκληκεν ⸀ἡμᾶς ὁ θεός.
translation:
  text: But if the unbelieving one separates, let him separate. The brother or the
    sister is not enslaved in such cases, but God has called us in peace.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the unbeliever' or, contextually, 'the unbelieving spouse.'
    reason: lexical_alternative
  - marker: b
    text: Or 'is not bound.' The Greek verb is from δουλόω ('to enslave'), not the
      more usual verb for 'bind.'
    reason: lexical_alternative
  - marker: c
    text: Some manuscripts read 'you' instead of 'us.'
    reason: textual_variant
lexical_decisions:
- source_word: ὁ ἄπιστος
  chosen: the unbelieving one
  alternatives:
  - the unbeliever
  - the unbelieving spouse
  lexicon: BDAG
  rationale: ἄπιστος here refers to the non-Christian spouse in context, but the Greek
    expression itself is simply substantival ('the unbelieving one'). 'The unbelieving
    one' preserves the wording while remaining natural enough in English; 'spouse'
    is interpretive and therefore left as an alternative.
- source_word: χωρίζεται
  chosen: separates
  alternatives:
  - leaves
  - departs
  lexicon: BDAG
  rationale: χωρίζω in this marital context denotes separation/departure. 'Separates'
    best preserves the verbal link with the following imperative χωριζέσθω and avoids
    over-specifying whether this is legal divorce or physical departure.
- source_word: χωριζέσθω
  chosen: let him separate
  alternatives:
  - let him leave
  - let it be so
  lexicon: BDAG
  rationale: The present imperative permits/accepts the separation rather than commanding
    divorce. 'Let him separate' keeps the lexical repetition with χωρίζεται and reflects
    Paul's concessive instruction.
- source_word: οὐ δεδούλωται
  chosen: is not enslaved
  alternatives:
  - is not bound
  - is not under bondage
  lexicon: BDAG
  rationale: The verb is δουλόω ('to enslave, make a slave'), not δέω ('bind'). In
    keeping with source-language primacy and the doctrine's preference to preserve
    bonded/slave language where salient, 'is not enslaved' is preferred. 'Is not bound'
    is traditional but less lexically precise and may import later doctrinal conclusions.
- source_word: ὁ ἀδελφὸς ἢ ἡ ἀδελφὴ
  chosen: The brother or the sister
  alternatives:
  - the brother or sister
  - the believing husband or wife
  lexicon: BDAG
  rationale: Paul uses sibling language for fellow believers, here applied to either
    sex. The translation keeps both nouns explicitly for gender accuracy and to mirror
    the Greek. 'Husband or wife' is contextually explanatory but not the actual wording.
- source_word: ἐν τοῖς τοιούτοις
  chosen: in such cases
  alternatives:
  - in such circumstances
  - in these things
  lexicon: BDAG
  rationale: The phrase is idiomatic and refers to situations like the one just described.
    'In such cases' is clear modern English and captures the plural demonstrative
    force without wooden literalism.
- source_word: ἐν δὲ εἰρήνῃ
  chosen: in peace
  alternatives:
  - to peace
  - for peace
  lexicon: BDAG
  rationale: The prepositional phrase most naturally expresses the sphere or manner
    of God's calling. 'In peace' is the most direct rendering and fits Paul's contrast
    with marital strife.
- source_word: κέκληκεν ἡμᾶς ὁ θεός
  chosen: God has called us
  alternatives:
  - God called us
  - God has called you
  lexicon: BDAG
  rationale: The perfect κέκληκεν suggests a completed act with abiding result, well
    represented by 'has called.' The SBLGNT reading is ἡμᾶς ('us'), which is followed
    here.
