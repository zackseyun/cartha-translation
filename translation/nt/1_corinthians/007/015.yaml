theological_decisions:
- issue: Meaning of οὐ δεδούλωται in relation to marriage dissolution/remarriage
  chosen_reading: Rendered lexically as 'is not enslaved' without specifying a full
    doctrine of remarriage.
  alternative_readings:
  - '''is not bound'' as a technical statement permitting remarriage'
  - '''is not enslaved'' as referring only to freedom from coercive pursuit of the
    departing spouse'
  rationale: The verse states that the believing spouse is not 'enslaved' in such
    circumstances, but it does not explicitly define the full scope of that freedom.
    To preserve theological tension and avoid importing denominational conclusions,
    the translation stays close to δουλόω and leaves broader inferences to interpretation.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Referent of ὁ ἄπιστος
  chosen_reading: Generic 'the unbelieving one' in the main text, understood from
    context as the unbelieving spouse.
  alternative_readings:
  - the unbeliever
  - the unbelieving spouse
  rationale: The immediate context is marriage, so the referent is the unbelieving
    spouse; however, adding 'spouse' in the main text would make explicit what the
    Greek leaves implicit. The chosen rendering preserves the source wording while
    remaining intelligible.
  doctrine_reference: Original-language primacy over translation tradition.
