id: 1CO.7.30
reference: 1 Corinthians 7:30
source:
  edition: SBLGNT
  text: καὶ οἱ κλαίοντες ὡς μὴ κλαίοντες, καὶ οἱ χαίροντες ὡς μὴ χαίροντες, καὶ οἱ
    ἀγοράζοντες ὡς μὴ κατέχοντες,
translation:
  text: and those who weep as not weeping, and those who rejoice as not rejoicing,
    and those who buy as not possessing,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'as though not weeping ... as though not rejoicing ... as though not
      possessing.' The Greek uses repeated 'as not' phrasing to express a manner of
      living, not a denial that these experiences occur.
    reason: lexical_alternative
lexical_decisions:
- source_word: κλαίοντες
  chosen: those who weep
  alternatives:
  - those who mourn
  - the ones weeping
  lexicon: BDAG
  rationale: 'Present participle with article functions substantivally: ''those who
    are weeping.'' ''Weep'' is the most direct English equivalent and preserves the
    concrete emotional action better than the more interpretive ''mourn.'''
- source_word: ὡς μὴ κλαίοντες
  chosen: as not weeping
  alternatives:
  - as though not weeping
  - as if not weeping
  lexicon: BDAG
  rationale: ὡς with μή and participle expresses manner/attitude rather than denial
    of the reality. 'As not weeping' is slightly more formal but preserves the compressed
    Greek structure and Paul's rhetorical parallelism. The more idiomatic 'as though
    not weeping' is a viable alternative but not necessary in the main text.
- source_word: χαίροντες
  chosen: those who rejoice
  alternatives:
  - those who are glad
  - the ones rejoicing
  lexicon: BDAG
  rationale: χαίρω commonly means 'rejoice' in Pauline usage. 'Rejoice' preserves
    the elevated but still readable register and matches the verbal parallel with
    'weep.'
- source_word: ὡς μὴ χαίροντες
  chosen: as not rejoicing
  alternatives:
  - as though not rejoicing
  - as if not rejoicing
  lexicon: BDAG
  rationale: Same construction as the previous clause. The translation keeps the rhetorical
    symmetry and avoids over-paraphrasing Paul's exhortational style.
- source_word: ἀγοράζοντες
  chosen: those who buy
  alternatives:
  - those who purchase
  - those who are buying
  lexicon: BDAG
  rationale: The participle refers broadly to engaging in ordinary commercial acquisition.
    'Buy' is the most natural and direct modern English rendering.
- source_word: κατέχοντες
  chosen: possessing
  alternatives:
  - holding
  - retaining
  - owning
  lexicon: BDAG
  rationale: κατέχω can mean hold, possess, keep, or retain depending on context.
    Here, in contrast with buying, the sense is not merely making a purchase but treating
    what is bought as something firmly possessed. 'Possessing' best captures that
    nuance while preserving the participial parallelism.
- source_word: καὶ
  chosen: and
  lexicon: BDAG
  rationale: Repeated καὶ links each parallel group in a rhythmic series. Retaining
    'and' each time preserves Paul's cumulative rhetorical structure.
