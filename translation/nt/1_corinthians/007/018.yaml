id: 1CO.7.18
reference: 1 Corinthians 7:18
source:
  edition: SBLGNT
  text: περιτετμημένος τις ἐκλήθη; μὴ ἐπισπάσθω· ἐν ἀκροβυστίᾳ ⸂κέκληταί τις⸃; μὴ
    περιτεμνέσθω.
translation:
  text: Was anyone called after being circumcised? He should not try to reverse it.
    Was anyone called while uncircumcised? He should not be circumcised.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more literally, 'He should not become uncircumcised'—that is, he should
      not attempt to conceal or reverse the marks of circumcision.
    reason: lexical_alternative
lexical_decisions:
- source_word: περιτετμημένος
  chosen: after being circumcised
  alternatives:
  - circumcised
  - in circumcision
  lexicon: BDAG
  rationale: Perfect participle indicates a completed state resulting from circumcision.
    Rendering with 'after being circumcised' makes the temporal relation to 'was called'
    clear in natural English while preserving the state implied by the perfect.
- source_word: ἐκλήθη / κέκληταί
  chosen: was called
  alternatives:
  - has been called
  lexicon: BDAG
  rationale: In Paul's usage, καλέω here refers to one's calling by God into the Christian
    life, not merely being summoned. English 'was called' is idiomatic and fits both
    clauses, even though the second verb is perfect; the variation is not weighty
    enough here to force awkward English tense distinction.
- source_word: ἐπισπάσθω
  chosen: should not try to reverse it
  alternatives:
  - should not become uncircumcised
  - should not draw over the foreskin
  lexicon: BDAG
  rationale: The verb refers to undoing the visible marks of circumcision, likely
    by surgical or cosmetic means. 'Try to reverse it' communicates the sense clearly
    in modern English without requiring readers to know the ancient practice; a more
    literal alternative is preserved in a footnote.
- source_word: ἐν ἀκροβυστίᾳ
  chosen: while uncircumcised
  alternatives:
  - in uncircumcision
  - in foreskin
  lexicon: BDAG
  rationale: This dative phrase denotes the state in which one was called. 'While
    uncircumcised' is idiomatic English and avoids the opaque literalism of 'in uncircumcision.'
- source_word: περιτεμνέσθω
  chosen: should not be circumcised
  alternatives:
  - must not get circumcised
  lexicon: BDAG
  rationale: Present imperative with μή gives a prohibition. 'Should not be circumcised'
    preserves the directive force in readable English without overstating it.
