theological_decisions:
- issue: Meaning of 'called' in both clauses
  chosen_reading: Called by God into the Christian life while in a given social-religious
    condition
  alternative_readings:
  - Called in a merely general sense
  rationale: In the immediate context (1 Cor 7), Paul uses calling language to speak
    of the believer's condition at the time of divine calling and conversion. The
    translation keeps 'called' rather than paraphrasing as 'converted' so as not to
    over-interpret, while the rationale clarifies the likely Pauline sense.
  doctrine_reference: Translation philosophy §1, §3
