id: 1CO.7.37
reference: 1 Corinthians 7:37
source:
  edition: SBLGNT
  text: ὃς δὲ ἕστηκεν ⸂ἐν τῇ καρδίᾳ αὐτοῦ ἑδραῖος⸃ μὴ ἔχων ἀνάγκην, ἐξουσίαν δὲ ἔχει
    περὶ τοῦ ἰδίου θελήματος, καὶ τοῦτο κέκρικεν ἐν τῇ ⸂ἰδίᾳ καρδίᾳ⸃, ⸀τηρεῖν τὴν
    ἑαυτοῦ παρθένον, καλῶς ⸀ποιήσει·
translation:
  text: But whoever stands firm in his heart, having no necessity, but has authority
    over his own will, and has decided this in his own heart—to keep his own virgin
    unmarried—he will do well.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'under no compulsion.'
    reason: lexical_alternative
  - marker: b
    text: '''His own virgin'' may refer either to his virgin daughter or to his fiancée/betrothed
      virgin; the Greek is debated.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἕστηκεν ... ἑδραῖος
  chosen: stands firm
  alternatives:
  - is steadfast
  - stands steadfast
  lexicon: BDAG
  rationale: The perfect of ἵστημι with ἑδραῖος conveys a settled, stable resolve.
    'Stands firm' is idiomatic modern English and preserves the sense of established
    inner determination.
- source_word: ἐν τῇ καρδίᾳ αὐτοῦ
  chosen: in his heart
  alternatives:
  - within himself
  lexicon: BDAG
  rationale: καρδία here denotes the inner self, seat of resolve and decision. 'In
    his heart' preserves the biblical idiom and matches Paul's repeated phrasing in
    the verse.
- source_word: μὴ ἔχων ἀνάγκην
  chosen: having no necessity
  alternatives:
  - under no compulsion
  - having no constraint
  lexicon: BDAG
  rationale: ἀνάγκη can mean necessity, compulsion, or pressure. 'Having no necessity'
    stays close to the Greek while allowing the context to imply absence of external
    pressure. A more interpretive 'under no compulsion' is preserved in a footnote.
- source_word: ἐξουσίαν ... ἔχει περὶ τοῦ ἰδίου θελήματος
  chosen: has authority over his own will
  alternatives:
  - has control over his own desire
  - has the right regarding his own intention
  lexicon: BDAG
  rationale: ἐξουσία denotes authority/right; θέλημα can mean will, desire, or intention.
    'Has authority over his own will' best captures self-mastery without oversexualizing
    the phrase. It also fits the contrast with external necessity.
- source_word: κέκρικεν
  chosen: has decided
  alternatives:
  - has resolved
  - has judged
  lexicon: BDAG
  rationale: The perfect indicates a settled decision already reached. 'Has decided'
    is clear modern English and fits the context of personal resolve.
- source_word: τηρεῖν
  chosen: to keep
  alternatives:
  - to preserve
  - to keep unmarried
  lexicon: BDAG
  rationale: τηρέω literally means keep, preserve, maintain. In this context it refers
    to maintaining the unmarried state of the παρθένος. The more explicit interpretive
    sense is preserved in the translation by adding 'unmarried' after 'virgin' for
    clarity.
- source_word: τὴν ἑαυτοῦ παρθένον
  chosen: his own virgin unmarried
  alternatives:
  - his own virgin
  - his fiancée
  - his virgin daughter
  lexicon: BDAG
  rationale: παρθένος literally means virgin, and in this debated context may refer
    either to a man's betrothed virgin or his virgin daughter. To avoid prematurely
    resolving the referent while still making sense in English, the main text keeps
    the literal 'his own virgin' and adds 'unmarried' to clarify the state being maintained.
    Alternatives are preserved in a footnote because the referent is genuinely disputed.
- source_word: καλῶς ποιήσει
  chosen: he will do well
  alternatives:
  - he will do rightly
  - he will act well
  lexicon: BDAG
  rationale: A common idiom meaning to act commendably. 'He will do well' is natural
    and sufficiently formal.
