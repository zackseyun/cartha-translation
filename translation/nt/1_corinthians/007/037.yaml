theological_decisions:
- issue: Referent of 'his own virgin' (τὴν ἑαυτοῦ παρθένον)
  chosen_reading: Retain the more literal and ambiguous expression in the main text
    rather than specifying 'daughter' or 'fiancée.'
  alternative_readings:
  - his virgin daughter
  - his fiancée / betrothed virgin
  rationale: The Greek expression is debated, and the verse itself does not unambiguously
    settle whether Paul speaks of a father/guardian deciding about his daughter or
    a man deciding about his betrothed. Following the translation philosophy to preserve
    theological and interpretive tension rather than resolve it, the main text keeps
    the ambiguity as much as readable English allows, with alternatives preserved
    in a footnote.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
