theological_decisions:
- issue: Whether κόσμος here should be rendered with a morally negative sense
  chosen_reading: Rendered neutrally as 'the world' / 'the things of the world'
  alternative_readings:
  - Rendered negatively as 'worldly things' in a pejorative sense
  rationale: Paul's point in context is the practical obligations of married life
    in contrast to undivided devotion to the Lord, not a blanket condemnation of marriage
    or ordinary responsibilities. A neutral rendering preserves the tension without
    importing an ascetic judgment.
  doctrine_reference: Preserve theological tension rather than resolve it.
