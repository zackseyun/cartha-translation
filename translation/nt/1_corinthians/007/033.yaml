id: 1CO.7.33
reference: 1 Corinthians 7:33
source:
  edition: SBLGNT
  text: ὁ δὲ γαμήσας μεριμνᾷ τὰ τοῦ κόσμου, πῶς ⸀ἀρέσῃ τῇ γυναικί,
translation:
  text: But the married man is concerned with the things of the world, how he may
    please his wife,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'worldly matters' or 'the affairs of the world.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ δὲ γαμήσας
  chosen: the married man
  alternatives:
  - the one who has married
  - the man who has married
  lexicon: BDAG
  rationale: The articular aorist participle functions substantivally, referring to
    the married male in contrast with the unmarried man in the surrounding context.
    'The married man' is idiomatic English and preserves the masculine singular force
    of the Greek.
- source_word: μεριμνᾷ
  chosen: is concerned with
  alternatives:
  - is anxious about
  - cares about
  lexicon: BDAG
  rationale: The verb can denote anxiety, concern, or care. In this context Paul is
    describing divided worldly concerns associated with marriage, not necessarily
    sinful worry in every instance. 'Is concerned with' fits modern English while
    preserving the semantic range without overstating emotional distress.
- source_word: τὰ τοῦ κόσμου
  chosen: the things of the world
  alternatives:
  - worldly matters
  - the affairs of the world
  lexicon: BDAG
  rationale: This genitival construction refers to matters belonging to ordinary worldly
    life. 'The things of the world' is a relatively formal but clear rendering that
    preserves the concrete plural article and avoids over-interpreting κόσμος as morally
    evil.
- source_word: πῶς ἀρέσῃ
  chosen: how he may please
  alternatives:
  - how he might please
  - how to please
  lexicon: BDAG
  rationale: 'The interrogative with aorist subjunctive expresses the content of his
    concern: the manner or possibility of pleasing his wife. ''How he may please''
    is natural English and reflects the deliberative/result-oriented nuance.'
- source_word: τῇ γυναικί
  chosen: his wife
  alternatives:
  - the wife
  - his woman
  lexicon: BDAG
  rationale: In this marital context γυνή clearly means 'wife,' not 'woman.' Adding
    'his' is required by natural English though the possessive is implicit rather
    than explicit in Greek.
