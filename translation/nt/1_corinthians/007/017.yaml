id: 1CO.7.17
reference: 1 Corinthians 7:17
source:
  edition: SBLGNT
  text: Εἰ μὴ ἑκάστῳ ὡς ⸀ἐμέρισεν ὁ ⸀κύριος, ἕκαστον ὡς κέκληκεν ὁ ⸀θεός, οὕτως περιπατείτω·
    καὶ οὕτως ἐν ταῖς ἐκκλησίαις πάσαις διατάσσομαι.
translation:
  text: Only, as the Lord has assigned to each one, as God has called each one, so
    let him walk. And this is what I direct in all the churches.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'has apportioned' or 'has allotted.' The Greek verb can refer to what
      the Lord has distributed or assigned to each person.
    reason: lexical_alternative
  - marker: b
    text: '''Walk'' is a common biblical metaphor for one''s manner of life; alternatively,
      ''live'' or ''conduct his life.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: Εἰ μὴ
  chosen: Only
  alternatives:
  - Except
  - Nevertheless
  - But
  lexicon: BDAG
  rationale: Here εἰ μὴ functions idiomatically, not as a strict conditional ('if
    not'), but as an exceptive/adversative transition introducing Paul's governing
    principle after the preceding case discussion. 'Only' is concise modern English
    and fits the discourse flow.
- source_word: ἑκάστῳ / ἕκαστον
  chosen: each one
  alternatives:
  - each person
  - each
  lexicon: BDAG
  rationale: The repeated ἕκαστος emphasizes individual application. 'Each one' preserves
    the repetition and distributive force better than smoothing to a single generic
    term.
- source_word: ἐμέρισεν
  chosen: has assigned
  alternatives:
  - has apportioned
  - has distributed
  - has allotted
  lexicon: BDAG
  rationale: μερίζω here refers to the Lord's apportioning of one's life situation
    or station. 'Has assigned' is natural English and captures the sense of a divinely
    allotted circumstance without sounding overly technical.
- source_word: ὁ κύριος
  chosen: the Lord
  alternatives:
  - Lord
  lexicon: BDAG
  rationale: κύριος is rendered 'Lord' per doctrine defaults. The article is retained
    in English because the phrase is referential and natural as 'the Lord' in Pauline
    usage.
- source_word: κέκληκεν
  chosen: has called
  alternatives:
  - called
  lexicon: BDAG
  rationale: The perfect tense indicates a completed call with ongoing effect. 'Has
    called' preserves that aspect better than a simple past.
- source_word: ὁ θεός
  chosen: God
  lexicon: BDAG
  rationale: Standard rendering of θεός. The article is not normally carried over
    into English in this construction.
- source_word: οὕτως
  chosen: so
  alternatives:
  - thus
  - in this way
  lexicon: BDAG
  rationale: '''So'' is idiomatic modern English and preserves the inferential/adverbial
    force. The repetition is maintained in the verse structure.'
- source_word: περιπατείτω
  chosen: let him walk
  alternatives:
  - let him live
  - let him conduct his life
  lexicon: BDAG
  rationale: περιπατέω is a common Pauline metaphor for manner of life. 'Walk' preserves
    the metaphor and formal texture of the Greek; 'live' is possible but would flatten
    the imagery. The masculine singular is retained as representative/generic in line
    with the gender-accurate policy.
- source_word: διατάσσομαι
  chosen: I direct
  alternatives:
  - I command
  - I prescribe
  - I give instructions
  lexicon: BDAG
  rationale: The middle/passive form here conveys Paul's authoritative ordering of
    practice. 'I direct' preserves authority without overstating the tone as a harsh
    command.
- source_word: ἐν ταῖς ἐκκλησίαις πάσαις
  chosen: in all the churches
  alternatives:
  - in all the assemblies
  lexicon: BDAG
  rationale: ἐκκλησία in Pauline context commonly refers to local church communities.
    'Churches' is the clearest and most established contextual rendering here.
