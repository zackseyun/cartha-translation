theological_decisions:
- issue: Referent distinction between 'the Lord' and 'God'
  chosen_reading: 'Retain both titles distinctly: ''as the Lord has assigned ... as
    God has called'''
  alternative_readings:
  - Treat both as stylistic variation for the same divine referent
  rationale: Paul uses two different divine designations in parallel clauses. The
    translation preserves the distinction rather than collapsing it, since the Greek
    itself presents both terms and does not require interpretive harmonization.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Ethical metaphor in περιπατείτω
  chosen_reading: Preserve the metaphor with 'let him walk'
  alternative_readings:
  - Interpret dynamically as 'let him live'
  rationale: The metaphor is common and intelligible in English Bible style, and preserving
    it avoids importing a narrower interpretation of Paul's exhortation while maintaining
    readability.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve source
    meaning where possible.'
