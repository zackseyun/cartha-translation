theological_decisions:
- issue: Nature of Paul's counsel regarding marriage and singleness
  chosen_reading: Paul presents his instruction as pastoral guidance for the Corinthians'
    good, not as a restrictive rule.
  alternative_readings:
  - Paul is imposing a binding ascetic restriction.
  rationale: The explicit contrast οὐχ ἵνα βρόχον ὑμῖν ἐπιβάλω, ἀλλὰ ... shows that
    his purpose is not coercive restriction but promoting fitting conduct and focused
    devotion to the Lord. The translation preserves that contrast without importing
    a broader doctrinal stance on marriage.
  doctrine_reference: Translation philosophy §1, §3
