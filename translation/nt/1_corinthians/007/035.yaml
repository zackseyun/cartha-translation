id: 1CO.7.35
reference: 1 Corinthians 7:35
source:
  edition: SBLGNT
  text: τοῦτο δὲ πρὸς τὸ ὑμῶν αὐτῶν ⸀σύμφορον λέγω, οὐχ ἵνα βρόχον ὑμῖν ἐπιβάλω, ἀλλὰ
    πρὸς τὸ εὔσχημον καὶ ⸀εὐπάρεδρον τῷ κυρίῳ ἀπερισπάστως.
translation:
  text: Now I say this for your own benefit, not to put a noose on you, but for what
    is proper and for undistracted devotion to the Lord.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'not to impose a restraint on you.' The Greek literally says 'not to
      put a noose on you,' using a vivid metaphor for restriction.
    reason: lexical_alternative
  - marker: b
    text: Or 'for what is fitting and for constant attendance on the Lord without
      distraction.'
    reason: lexical_alternative
lexical_decisions:
- source_word: σύμφορον
  chosen: benefit
  alternatives:
  - advantage
  - good
  - what is beneficial
  lexicon: BDAG
  rationale: The phrase πρὸς τὸ ὑμῶν αὐτῶν σύμφορον expresses what is advantageous
    or beneficial for the Corinthians themselves. 'Benefit' is natural modern English
    and preserves Paul's pastoral concern without sounding overly commercial ('advantage').
- source_word: βρόχον
  chosen: noose
  alternatives:
  - restraint
  - snare
  - loop
  lexicon: BDAG
  rationale: βρόχος literally denotes a noose or loop and is used metaphorically for
    constraint. 'Noose' preserves the vivid metaphor better than flattening it to
    'restraint,' while the context makes clear Paul means restrictive control, not
    physical harm.
- source_word: ἐπιβάλω
  chosen: put ... on
  alternatives:
  - lay ... on
  - impose ... on
  lexicon: BDAG
  rationale: With βρόχον, ἐπιβάλλω naturally yields 'put/lay a noose on.' 'Put ...
    on' is idiomatic and readable in contemporary English.
- source_word: εὔσχημον
  chosen: what is proper
  alternatives:
  - propriety
  - what is fitting
  - what is honorable
  lexicon: BDAG
  rationale: The articular infinitive construction πρὸς τὸ εὔσχημον points to what
    is fitting or proper. 'What is proper' communicates orderly, fitting conduct in
    context without sounding archaic.
- source_word: εὐπάρεδρον
  chosen: devotion
  alternatives:
  - attendance
  - constant service
  - close attention
  lexicon: BDAG
  rationale: This rare term conveys being well-seated beside, hence steadfast attendance
    or devoted attachment. In context with τῷ κυρίῳ and ἀπερισπάστως, 'devotion' best
    captures the sense of sustained dedication to the Lord in natural English.
- source_word: ἀπερισπάστως
  chosen: undistracted
  alternatives:
  - without distraction
  - free from distractions
  lexicon: BDAG
  rationale: The adverb describes freedom from being pulled away by competing concerns.
    Rendering it adjectivally in the phrase 'undistracted devotion' is a concise and
    natural English restructuring that preserves the meaning.
- source_word: τῷ κυρίῳ
  chosen: to the Lord
  alternatives:
  - for the Lord
  lexicon: BDAG
  rationale: κύριος is rendered 'Lord' per doctrine defaults. With εὐπάρεδρον, English
    idiom allows either 'to the Lord' or 'for the Lord'; 'devotion to the Lord' better
    expresses personal orientation and attachment.
- source_word: τοῦτο δὲ ... λέγω
  chosen: Now I say this
  alternatives:
  - But I say this
  - I am saying this
  lexicon: BDAG
  rationale: δέ here is mildly transitional. 'Now I say this' fits Paul's explanatory
    flow and reads naturally in English.
