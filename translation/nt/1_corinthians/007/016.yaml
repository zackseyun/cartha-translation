theological_decisions:
- issue: Meaning of 'save' in the marital context
  chosen_reading: Retain 'save' as the text's wording, allowing its evangelistic/salvific
    force to stand without reduction.
  alternative_readings:
  - bring to faith
  - preserve the marriage
  - save in a broader spiritual sense
  rationale: σῴζω in Pauline usage commonly bears salvific weight, and the immediate
    context concerns the believing spouse's possible effect on the unbelieving spouse.
    The translation should not narrow the term to marital preservation or paraphrase
    it into an interpretive gloss. Preserving 'save' maintains the theological tension
    and leaves interpretation to context.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
