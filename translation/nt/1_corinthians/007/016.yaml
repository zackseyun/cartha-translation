id: 1CO.7.16
reference: 1 Corinthians 7:16
source:
  edition: SBLGNT
  text: τί γὰρ οἶδας, γύναι, εἰ τὸν ἄνδρα σώσεις; ἢ τί οἶδας, ἄνερ, εἰ τὴν γυναῖκα
    σώσεις;
translation:
  text: For how do you know, wife, whether you will save your husband? Or how do you
    know, husband, whether you will save your wife?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, 'how can you know ... whether you may save ... ?'
      The Greek uses a future verb ('will save') in an indirect question.
    reason: lexical_alternative
lexical_decisions:
- source_word: τί γὰρ οἶδας
  chosen: For how do you know
  alternatives:
  - For what do you know
  - For how can you know
  lexicon: BDAG
  rationale: The idiom τί + οἶδα in this rhetorical question is more natural in English
    as 'how do you know' rather than the overly literal 'what do you know.' 'For'
    preserves γάρ's explanatory/grounding force from the preceding context.
- source_word: γύναι
  chosen: wife
  alternatives:
  - woman
  lexicon: BDAG
  rationale: Although γυνή can mean either 'woman' or 'wife,' the marriage context
    of 1 Corinthians 7 requires 'wife.' This is gender-accurate and contextually specific.
- source_word: ἄνερ
  chosen: husband
  alternatives:
  - man
  lexicon: BDAG
  rationale: Vocative ἄνερ from ἀνήρ can mean 'man' or 'husband,' but in this marital
    context 'husband' is clearly intended.
- source_word: σώσεις
  chosen: you will save
  alternatives:
  - you may save
  - you will bring to salvation
  lexicon: BDAG
  rationale: Future indicative is best represented straightforwardly as 'you will
    save.' The clause is governed by εἰ in an indirect-question sense ('whether'),
    so the meaning is not a prediction but a possibility under consideration; English
    'whether you will save' preserves the Greek form without over-paraphrasing.
- source_word: τὸν ἄνδρα
  chosen: your husband
  alternatives:
  - the husband
  lexicon: BDAG
  rationale: The article with ἀνήρ in this direct address context refers to the spouse
    in view; idiomatic English requires the possessive 'your husband' rather than
    the wooden 'the husband.'
- source_word: τὴν γυναῖκα
  chosen: your wife
  alternatives:
  - the wife
  lexicon: BDAG
  rationale: As in the first clause, idiomatic English uses the possessive to express
    the marital relationship explicitly.
- source_word: ἢ
  chosen: Or
  alternatives:
  - Or else
  - Or again
  lexicon: BDAG
  rationale: Simple 'Or' best carries the disjunctive repetition between the two parallel
    rhetorical questions.
