id: 1CO.7.12
reference: 1 Corinthians 7:12
source:
  edition: SBLGNT
  text: Τοῖς δὲ λοιποῖς ⸂λέγω ἐγώ⸃, οὐχ ὁ κύριος· εἴ τις ἀδελφὸς γυναῖκα ἔχει ἄπιστον,
    καὶ αὕτη συνευδοκεῖ οἰκεῖν μετ’ αὐτοῦ, μὴ ἀφιέτω αὐτήν·
translation:
  text: But to the rest I say—I, not the Lord—if any brother has an unbelieving wife,
    and she consents to live with him, he must not divorce her.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'he must not leave her' or 'he must not send her away.' The Greek verb
      can be rendered more literally as 'leave' or 'dismiss,' but here it refers to
      ending the marriage.
    reason: lexical_alternative
lexical_decisions:
- source_word: Τοῖς δὲ λοιποῖς
  chosen: But to the rest
  alternatives:
  - Now to the rest
  - To the others
  lexicon: BDAG
  rationale: λοιποί refers to the remaining group not addressed in the previous instruction.
    'But' reflects δέ as a mild transition/contrast, and 'the rest' is idiomatic and
    sufficiently formal.
- source_word: λέγω ἐγώ, οὐχ ὁ κύριος
  chosen: I say—I, not the Lord—
  alternatives:
  - I, not the Lord, say
  - I say this, not the Lord
  lexicon: BDAG
  rationale: The emphatic ἐγώ is preserved by placing 'I' explicitly in apposition.
    The clause distinguishes Paul's apostolic instruction from a dominical saying
    already given, without denying inspiration. Em dashes preserve the parenthetical
    force.
- source_word: ἀδελφὸς
  chosen: brother
  alternatives:
  - a believer
  - a Christian man
  lexicon: BDAG
  rationale: Gender-accurate translation is required by project philosophy. Here the
    singular masculine refers specifically to a male believer in contrast with 'wife,'
    so 'brother' is preferable to a neutral paraphrase.
- source_word: γυναῖκα ἔχει ἄπιστον
  chosen: has an unbelieving wife
  alternatives:
  - has a wife who is an unbeliever
  - is married to an unbelieving wife
  lexicon: BDAG
  rationale: ἔχει γυναῖκα is a standard marital expression. 'Has an unbelieving wife'
    is concise and natural, while preserving ἄπιστον as 'unbelieving' rather than
    broadening it to irreligious or unfaithful.
- source_word: ἄπιστον
  chosen: unbelieving
  alternatives:
  - unbeliever
  - not believing
  lexicon: BDAG
  rationale: In this context ἄπιστος denotes one who does not share Christian faith,
    not marital unfaithfulness. 'Unbelieving' works adjectivally with 'wife' and matches
    Pauline usage.
- source_word: καὶ αὕτη συνευδοκεῖ
  chosen: and she consents
  alternatives:
  - and she agrees
  - and she is willing
  lexicon: BDAG
  rationale: συνευδοκέω conveys approving or consenting together with a proposed arrangement.
    'Consents' captures volitional agreement in a marital context without sounding
    overly colloquial.
- source_word: οἰκεῖν μετ’ αὐτοῦ
  chosen: to live with him
  alternatives:
  - to dwell with him
  - to continue living with him
  lexicon: BDAG
  rationale: οἰκέω with μετά here refers to shared domestic life. 'Live with him'
    is natural modern English and adequately reflects the infinitive construction.
- source_word: μὴ ἀφιέτω αὐτήν
  chosen: he must not divorce her
  alternatives:
  - let him not leave her
  - he must not send her away
  lexicon: BDAG
  rationale: In this marital context ἀφίημι means to leave or dismiss a spouse, effectively
    divorce. 'Divorce' makes the legal-relational sense explicit for modern readers;
    the more literal 'leave' could sound merely spatial or temporary.
