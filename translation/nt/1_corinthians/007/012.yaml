theological_decisions:
- issue: Paul's statement 'I, not the Lord'
  chosen_reading: A distinction between Paul's instruction and a direct saying of
    Jesus during his earthly ministry, not a denial of apostolic authority or inspiration.
  alternative_readings:
  - A merely personal opinion lacking authority
  rationale: The immediate context contrasts prior dominical teaching with apostolic
    application to a case Jesus did not explicitly address. The translation preserves
    the distinction without wording that implies lesser inspiration.
  doctrine_reference: Preserve theological tension rather than resolve it; historic
    ecumenical orthodoxy affirmed.
