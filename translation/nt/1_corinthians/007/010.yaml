id: 1CO.7.10
reference: 1 Corinthians 7:10
source:
  edition: SBLGNT
  text: Τοῖς δὲ γεγαμηκόσιν παραγγέλλω, οὐκ ἐγὼ ἀλλὰ ὁ κύριος, γυναῖκα ἀπὸ ἀνδρὸς
    μὴ χωρισθῆναι—
translation:
  text: 'Now to the married I give this command—not I, but the Lord: a wife must not
    separate from her husband—'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'must not divorce her husband.' The Greek verb can be understood in the
      sense of marital separation, which in context may include divorce.
    reason: lexical_alternative
lexical_decisions:
- source_word: Τοῖς ... γεγαμηκόσιν
  chosen: to the married
  alternatives:
  - to married people
  - to those who are married
  lexicon: BDAG
  rationale: The perfect participle of γαμέω denotes those in the state of being married.
    'The married' is concise and natural in English while preserving the dative addressee
    sense with 'to.'
- source_word: δὲ
  chosen: Now
  alternatives:
  - But
  - And
  lexicon: BDAG
  rationale: δέ marks a transition to a new but related instruction. 'Now' fits Paul's
    discourse flow in English better than a stronger adversative 'But.'
- source_word: παραγγέλλω
  chosen: I give this command
  alternatives:
  - I command
  - I instruct
  lexicon: BDAG
  rationale: παραγγέλλω carries authoritative instruction. 'I give this command' preserves
    the force while sounding idiomatic in modern English.
- source_word: οὐκ ἐγὼ ἀλλὰ ὁ κύριος
  chosen: not I, but the Lord
  alternatives:
  - not I but the Lord
  - I, not the Lord
  lexicon: BDAG
  rationale: The clause contrasts Paul's own situational judgment with a command already
    grounded in the Lord's teaching. 'Not I, but the Lord' preserves the emphatic
    contrast without importing a denial of Pauline authority.
- source_word: ὁ κύριος
  chosen: the Lord
  alternatives:
  - the Master
  lexicon: BDAG
  rationale: Per doctrine defaults, κύριος is rendered 'Lord.' In this context it
    most naturally refers to the Lord Jesus and likely alludes to his teaching on
    divorce.
- source_word: γυναῖκα
  chosen: a wife
  alternatives:
  - a woman
  lexicon: BDAG
  rationale: Though γυνή can mean 'woman' or 'wife,' the marriage context and pairing
    with ἀνήρ make 'wife' the clear contextual sense.
- source_word: ἀπὸ ἀνδρὸς
  chosen: from her husband
  alternatives:
  - from a husband
  - from the husband
  lexicon: BDAG
  rationale: ἀνήρ can mean 'man' or 'husband'; here the marital context requires 'husband.'
    Adding 'her' makes the relational sense explicit and idiomatic in English.
- source_word: μὴ χωρισθῆναι
  chosen: must not separate
  alternatives:
  - should not separate
  - must not be separated
  - must not divorce
  lexicon: BDAG
  rationale: The aorist passive infinitive after παραγγέλλω expresses the content
    of the command. χωρίζω in this context refers to marital separation; 'must not
    separate' preserves the lexical sense without prematurely narrowing it to legal
    divorce, especially since v.11 continues the distinction.
