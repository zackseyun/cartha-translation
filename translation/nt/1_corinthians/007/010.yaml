theological_decisions:
- issue: Meaning of 'not I, but the Lord'
  chosen_reading: Paul distinguishes a command already given by the Lord Jesus from
    his own apostolic application in the following verse, not a contrast between inspired
    and uninspired speech.
  alternative_readings:
  - Paul is disclaiming authority for his own words
  rationale: The immediate context (vv. 10–12) contrasts dominical teaching with Paul's
    application to cases not directly addressed in Jesus' recorded teaching. Rendering
    remains literal while documenting that the phrase should not be read as denying
    apostolic authority.
  doctrine_reference: Affirmations; Preserve theological tension rather than resolve
    it
- issue: Scope of χωρισθῆναι in marriage
  chosen_reading: The term is rendered 'separate' rather than 'divorce' to preserve
    the text's wording and leave the exact legal/social nuance open within the immediate
    context.
  alternative_readings:
  - divorce
  rationale: Paul's wording in vv. 10–11 uses separation language and then addresses
    the state of being unmarried or reconciled. 'Separate' best preserves the textual
    nuance without importing a narrower modern legal category.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; preserve theological tension rather than resolve it'
