id: 1CO.7.22
reference: 1 Corinthians 7:22
source:
  edition: SBLGNT
  text: ὁ γὰρ ἐν κυρίῳ κληθεὶς δοῦλος ἀπελεύθερος κυρίου ἐστίν· ⸀ὁμοίως ὁ ἐλεύθερος
    κληθεὶς δοῦλός ἐστιν Χριστοῦ.
translation:
  text: For the slave who was called in the Lord is the Lord’s freedman; likewise,
    the free man who was called is Messiah’s slave.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Lord’s free person.' The Greek term refers specifically to someone
      freed from slavery, hence 'freedman.'
    reason: lexical_alternative
  - marker: b
    text: Or 'Christ’s slave.' Greek Χριστοῦ is the title 'Messiah' here.
    reason: alternative_reading
lexical_decisions:
- source_word: δοῦλος
  chosen: slave
  alternatives:
  - servant
  - bondservant
  lexicon: BDAG
  rationale: 'Rendered as ''slave'' rather than ''servant'' because the bonded status
    is central to Paul''s paradox in this verse: the socially enslaved believer is
    spiritually free, and the socially free believer is bound to Messiah. This follows
    the doctrine guideline to use ''slave'' where the bonded nature is theologically
    salient.'
- source_word: ἐν κυρίῳ
  chosen: in the Lord
  alternatives:
  - by the Lord
  - belonging to the Lord
  lexicon: BDAG
  rationale: Kept the prepositional phrase formally as 'in the Lord,' which in Pauline
    usage commonly denotes sphere or union. This preserves the theological nuance
    without over-interpreting it.
- source_word: κληθεὶς
  chosen: was called
  alternatives:
  - having been called
  - called
  lexicon: BDAG
  rationale: Rendered with a passive verbal sense, 'was called,' reflecting the aorist
    passive participle and Paul's recurring language of divine calling. The smoother
    English also fits the verse's parallel structure.
- source_word: ἀπελεύθερος
  chosen: freedman
  alternatives:
  - freed person
  - one set free
  lexicon: BDAG
  rationale: Chose 'freedman' because the term refers specifically to a person released
    from slavery, not merely someone generally free. This preserves the social-legal
    contrast with δοῦλος. Although masculine in form, the verse addresses a representative
    male singular in Greek.
- source_word: κυρίου
  chosen: the Lord’s
  alternatives:
  - of the Lord
  lexicon: BDAG
  rationale: 'Used the possessive English form for natural readability while preserving
    the genitive relationship: the called slave is now characterized as belonging
    to the Lord as his freedman.'
- source_word: ὁμοίως
  chosen: likewise
  alternatives:
  - in the same way
  - similarly
  lexicon: BDAG
  rationale: '''Likewise'' preserves the concise rhetorical balance between the two
    halves of the verse.'
- source_word: ἐλεύθερος
  chosen: free man
  alternatives:
  - free person
  - one who is free
  lexicon: BDAG
  rationale: Rendered as 'free man' to match the grammatically masculine singular
    and the social status contrast with 'slave.' This is gender-accurate rather than
    gender-neutral, per doctrine guidelines, while functioning representatively in
    context.
- source_word: Χριστοῦ
  chosen: Messiah’s
  alternatives:
  - Christ’s
  lexicon: BDAG
  rationale: Rendered Χριστός as 'Messiah' because it functions as a title here rather
    than a name-like form, in keeping with the doctrine's default rendering for Christological
    titles.
- source_word: κύριος
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Rendered κύριος as 'Lord' per the project's default for this theologically
    weighty title. 'Master' was not chosen because in Pauline usage κύριος here carries
    more than a mere master-slave social relation; it is a title for the exalted Jesus.
