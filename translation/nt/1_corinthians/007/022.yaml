theological_decisions:
- issue: Rendering the social-status paradox in Paul's metaphor
  chosen_reading: 'Maintain the sharp reversal: the called slave is the Lord''s freedman,
    and the called free man is Messiah''s slave.'
  alternative_readings:
  - Soften δοῦλος to 'servant' on one or both sides
  - Generalize ἀπελεύθερος as 'free person'
  rationale: Paul intentionally juxtaposes social and theological statuses. Softening
    either term would reduce the force of his argument that earthly status is relativized
    by belonging to the Lord/Messiah.
  doctrine_reference: Translation philosophy §1, §5; Contested terms table for δοῦλος
    and Χριστός
- issue: Title rendering for Χριστοῦ
  chosen_reading: Messiah’s
  alternative_readings:
  - Christ’s
  rationale: The project default is to translate Χριστός as 'Messiah' where it functions
    as a title. Here the genitive denotes belonging to the anointed king, and the
    title sense remains active.
  doctrine_reference: Translation philosophy §2; Contested terms table for Χριστός
