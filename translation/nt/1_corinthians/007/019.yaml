id: 1CO.7.19
reference: 1 Corinthians 7:19
source:
  edition: SBLGNT
  text: ἡ περιτομὴ οὐδέν ἐστιν, καὶ ἡ ἀκροβυστία οὐδέν ἐστιν, ἀλλὰ τήρησις ἐντολῶν
    θεοῦ.
translation:
  text: Circumcision is nothing, and uncircumcision is nothing, but keeping God's
    commandments.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'counts for nothing' for both occurrences of 'is nothing.'
    reason: lexical_alternative
lexical_decisions:
- source_word: περιτομή
  chosen: Circumcision
  alternatives:
  - being circumcised
  lexicon: BDAG
  rationale: Rendered with the standard nominal gloss 'circumcision.' The abstract
    noun fits Paul's contrast of covenant-status markers rather than focusing on the
    act itself.
- source_word: οὐδέν ἐστιν
  chosen: is nothing
  alternatives:
  - counts for nothing
  - means nothing
  lexicon: BDAG
  rationale: A fairly formal rendering preserves Paul's blunt evaluative statement.
    'Counts for nothing' is idiomatic but slightly more interpretive; 'is nothing'
    better reflects the repeated Greek structure.
- source_word: ἀκροβυστία
  chosen: uncircumcision
  alternatives:
  - being uncircumcised
  lexicon: BDAG
  rationale: Kept as the direct antonym to 'circumcision' to preserve the rhetorical
    symmetry of the verse and Paul's concern with covenant identity markers.
- source_word: ἀλλά
  chosen: but
  alternatives:
  - rather
  - except
  lexicon: BDAG
  rationale: 'Simple adversative contrast best fits the sentence: external status
    markers are set over against what truly matters.'
- source_word: τήρησις
  chosen: keeping
  alternatives:
  - observance
  - obedience
  lexicon: BDAG
  rationale: '''Keeping'' is the most natural rendering with ''commandments'' in English
    and closely reflects the noun''s sense of observance. ''Obedience'' is possible
    but less formally tied to the object ἐντολῶν.'
- source_word: ἐντολῶν θεοῦ
  chosen: God's commandments
  alternatives:
  - the commandments of God
  lexicon: BDAG
  rationale: The possessive form is natural modern English while preserving the genitival
    relationship. It retains the concrete plural 'commandments' rather than generalizing
    to 'what God commands.'
