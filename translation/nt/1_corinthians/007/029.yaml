theological_decisions:
- issue: Pastoral/theological force of Paul's instruction regarding marriage
  chosen_reading: Render the clause straightforwardly without softening it into emotional
    detachment or abolishing marital obligations.
  alternative_readings:
  - Translate more interpretively as 'live with detachment from marriage'
  - Paraphrase to avoid apparent tension with Paul's positive view of marriage elsewhere
  rationale: The verse states an urgent, eschatologically conditioned relativizing
    of ordinary social conditions. The translation should preserve that tension rather
    than resolve it by paraphrase. Broader canonical balance belongs in interpretation,
    not in the wording of this verse.
  doctrine_reference: Preserve theological tension rather than resolve it.
