id: 1CO.7.29
reference: 1 Corinthians 7:29
source:
  edition: SBLGNT
  text: τοῦτο δέ φημι, ἀδελφοί, ὁ καιρὸς συνεσταλμένος ⸂ἐστίν· τὸ λοιπὸν⸃ ἵνα καὶ
    οἱ ἔχοντες γυναῖκας ὡς μὴ ἔχοντες ὦσιν,
translation:
  text: 'This is what I mean, brothers: the time has been shortened, so that from
    now on even those who have wives should be as though they had none,'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the appointed time has grown short.'
    reason: lexical_alternative
  - marker: b
    text: '''Brothers'' translates the masculine plural ἀδελφοί, which can address
      a mixed group of fellow believers.'
    reason: cultural_note
lexical_decisions:
- source_word: τοῦτο δέ φημι
  chosen: This is what I mean
  alternatives:
  - This I say
  - What I mean is this
  lexicon: BDAG
  rationale: Idiomatic rendering of Paul's discourse formula that preserves the sense
    of introducing an explanation rather than a bare speech act.
- source_word: ἀδελφοί
  chosen: brothers
  alternatives:
  - brothers and sisters
  - siblings
  lexicon: BDAG
  rationale: 'Rendered gender-accurately per doctrine: the Greek masculine plural
    form is retained as ''brothers'' while acknowledging its likely mixed audience
    in context.'
- source_word: ὁ καιρός
  chosen: the time
  alternatives:
  - the appointed time
  - the season
  lexicon: BDAG
  rationale: καιρός here denotes a decisive or appointed time rather than mere chronological
    duration; 'the time' is concise and natural, with the qualitative force carried
    by context.
- source_word: συνεσταλμένος ἐστίν
  chosen: has been shortened
  alternatives:
  - is shortened
  - has grown short
  - has been compressed
  lexicon: BDAG
  rationale: Perfect periphrastic construction indicates a present state resulting
    from contraction/shortening. 'Has been shortened' preserves that aspect better
    than a simple present.
- source_word: τὸ λοιπὸν
  chosen: from now on
  alternatives:
  - for the rest
  - henceforth
  lexicon: BDAG
  rationale: In this context the phrase marks what follows as the practical implication
    for the remaining time; 'from now on' communicates the temporal force clearly
    in modern English.
- source_word: ἵνα
  chosen: so that
  alternatives:
  - that
  - in order that
  lexicon: BDAG
  rationale: Retains the connective force linking the shortened time to the ensuing
    manner of life, without over-specifying purpose versus result.
- source_word: οἱ ἔχοντες γυναῖκας
  chosen: those who have wives
  alternatives:
  - those who are married
  - those having wives
  lexicon: BDAG
  rationale: More formally tied to the Greek wording than 'the married,' and γυναῖκας
    in this context specifically refers to wives rather than women generally.
- source_word: ὡς μὴ ἔχοντες
  chosen: as though they had none
  alternatives:
  - as not having
  - as though not having wives
  lexicon: BDAG
  rationale: Natural English rendering of the comparative expression; 'none' refers
    back to wives and avoids awkward repetition while preserving the rhetorical sharpness.
