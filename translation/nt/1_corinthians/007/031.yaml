theological_decisions:
- issue: Sense of καταχρώμενοι in relation to χρώμενοι
  chosen_reading: Paul instructs believers to engage the world without becoming fully
    absorbed in or overusing it, rather than primarily condemning immoral abuse.
  alternative_readings:
  - Paul warns against abusing the world
  - Paul means simply 'as though not using it'
  rationale: The paired participles χρώμενοι / καταχρώμενοι create a wordplay between
    'using' and 'using to the full.' Rendering the second as 'making full use of it'
    preserves the tension and avoids importing a narrower moralistic sense not demanded
    by the context.
  doctrine_reference: Translation philosophy §3, preserve theological tension rather
    than resolve it.
- issue: Meaning of σχῆμα
  chosen_reading: The phrase refers to the transient present mode or outward form
    of the world order.
  alternative_readings:
  - the world's appearance only
  - the world's essential nature
  rationale: σχῆμα in context points to the world's present configuration, not its
    essence. This supports Paul's exhortation to live with eschatological detachment
    without denying the goodness of creation.
