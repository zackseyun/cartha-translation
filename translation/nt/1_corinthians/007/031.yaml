id: 1CO.7.31
reference: 1 Corinthians 7:31
source:
  edition: SBLGNT
  text: καὶ οἱ χρώμενοι ⸂τὸν κόσμον⸃ ὡς μὴ καταχρώμενοι· παράγει γὰρ τὸ σχῆμα τοῦ
    κόσμου τούτου.
translation:
  text: and those who use the world as not making full use of it; for the present
    form of this world is passing away.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'as not using it to the full'; the verb can also carry the sense 'as
      not abusing it.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the outward form' or 'the fashion' of this world.
    reason: lexical_alternative
lexical_decisions:
- source_word: χρώμενοι
  chosen: use
  alternatives:
  - make use of
  - deal with
  lexicon: BDAG
  rationale: The participle from χράομαι commonly means 'use' or 'make use of.' 'Use'
    is concise and natural in English while preserving the sense of engaging with
    worldly things.
- source_word: κόσμον
  chosen: the world
  alternatives:
  - the present world order
  lexicon: BDAG
  rationale: κόσμος here refers to the world in its present social and material order,
    not the created universe in abstraction. 'The world' is the most direct rendering
    and fits Paul's contrast with its transient form.
- source_word: ὡς μὴ καταχρώμενοι
  chosen: as not making full use of it
  alternatives:
  - as not engrossed in it
  - as not abusing it
  - as not using it to the full
  lexicon: BDAG
  rationale: καταχράομαι intensifies χράομαι and can mean 'use fully,' 'make full
    use of,' or in some contexts 'exploit/abuse.' Here the contrast is not primarily
    moral abuse but overinvestment in worldly use. 'Making full use of it' preserves
    the lexical intensification without overinterpreting.
- source_word: παράγει
  chosen: is passing away
  alternatives:
  - passes away
  - is passing by
  lexicon: BDAG
  rationale: The present tense conveys an ongoing process. 'Is passing away' communicates
    the durative sense and the transient character Paul emphasizes.
- source_word: σχῆμα
  chosen: present form
  alternatives:
  - form
  - outward form
  - fashion
  lexicon: BDAG
  rationale: σχῆμα denotes outward form, appearance, or present mode. 'Present form'
    makes explicit the temporary, situational sense in context and avoids the archaic
    feel of 'fashion.'
- source_word: τοῦ κόσμου τούτου
  chosen: of this world
  alternatives:
  - of the world
  - of this age's world
  lexicon: BDAG
  rationale: The demonstrative τούτου is significant and is retained with 'this world,'
    underscoring the present order that is transient.
