id: MRK.1.33
reference: Mark 1:33
source:
  edition: SBLGNT
  text: καὶ ⸂ἦν ὅλη ἡ πόλις ἐπισυνηγμένη⸃ πρὸς τὴν θύραν.
translation:
  text: And the whole city was gathered at the door.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to the door.' The Greek preposition can be rendered more literally this
      way, but in context it refers to the crowd gathered at the house entrance.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἦν
  chosen: was
  alternatives:
  - had been
  lexicon: BDAG
  rationale: 'Imperfect of εἰμί functioning with the participle ἐπισυνηγμένη to describe
    the scene in progress: ''was ... gathered.'' English ''was'' best preserves the
    stative/imperfect sense without overcomplicating the clause.'
- source_word: ὅλη ἡ πόλις
  chosen: the whole city
  alternatives:
  - the entire city
  - all the city
  lexicon: BDAG
  rationale: ὅλη with the article and noun naturally means 'the whole city' or 'the
    entire city.' This is likely a vivid generalization rather than a mathematically
    exhaustive claim, but the translation should preserve the Greek expression rather
    than weaken it.
- source_word: ἐπισυνηγμένη
  chosen: gathered
  alternatives:
  - assembled
  - crowded together
  lexicon: BDAG
  rationale: Perfect passive participle of ἐπισυνάγω, 'to gather together.' 'Gathered'
    is the most natural English rendering and works smoothly with ἦν ('was gathered').
    'Assembled' is possible but slightly more formal; 'crowded together' adds nuance
    not explicit in the verb.
- source_word: πρὸς τὴν θύραν
  chosen: at the door
  alternatives:
  - to the door
  - by the door
  - at the doorway
  lexicon: BDAG
  rationale: πρός with the accusative can indicate movement toward or location in
    relation to something depending on context. Here, with the stative sense of the
    clause, idiomatic English is 'at the door,' meaning at the entrance of the house.
    'To the door' is more literal but sounds less natural in English for the resulting
    location.
- source_word: θύραν
  chosen: door
  alternatives:
  - doorway
  - entrance
  lexicon: BDAG
  rationale: θύρα literally means 'door,' and in context refers to the house entrance.
    'Door' is the simplest and most direct rendering; 'doorway' is a viable contextual
    alternative but not necessary in the main text.
