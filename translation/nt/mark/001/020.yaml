theological_decisions:
- issue: Discipleship nuance in ὀπίσω αὐτοῦ
  chosen_reading: after him
  alternative_readings:
  - behind him
  - following him
  rationale: The phrase can carry both literal and discipleship force. The chosen
    rendering preserves the narrative action while allowing the theological resonance
    of following Jesus to remain implicit rather than over-interpreted.
  doctrine_reference: Preserve theological tension rather than resolve it.
