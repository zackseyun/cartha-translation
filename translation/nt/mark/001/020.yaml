id: MRK.1.20
reference: Mark 1:20
source:
  edition: SBLGNT
  text: καὶ ⸀εὐθὺς ἐκάλεσεν αὐτούς. καὶ ἀφέντες τὸν πατέρα αὐτῶν Ζεβεδαῖον ἐν τῷ πλοίῳ
    μετὰ τῶν μισθωτῶν ἀπῆλθον ὀπίσω αὐτοῦ.
translation:
  text: And immediately he called them, and leaving their father Zebedee in the boat
    with the hired workers, they went away after him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'behind him' or 'following him.' The Greek can denote both physical movement
      and the beginning of discipleship.
    reason: lexical_alternative
lexical_decisions:
- source_word: εὐθὺς
  chosen: immediately
  alternatives:
  - at once
  - straightway
  lexicon: BDAG
  rationale: Marks one of Mark's characteristic urgency markers. 'Immediately' is
    natural modern English and preserves the temporal force better than the archaic
    'straightway.'
- source_word: ἐκάλεσεν
  chosen: called
  alternatives:
  - summoned
  - invited
  lexicon: BDAG
  rationale: '''Called'' is the straightforward sense of καλέω here and fits the discipleship
    context without over-specifying authority implied by ''summoned'' or softness
    implied by ''invited.'''
- source_word: ἀφέντες
  chosen: leaving
  alternatives:
  - having left
  - abandoning
  lexicon: BDAG
  rationale: Aorist participle indicating attendant action prior to the main verb.
    'Leaving' is idiomatic in English and avoids the harsher connotation of 'abandoning,'
    which the text itself does not require.
- source_word: πατέρα αὐτῶν
  chosen: their father
  alternatives:
  - their own father
  lexicon: BDAG
  rationale: Direct and natural rendering of the possessive phrase; no added emphasis
    beyond the Greek is needed.
- source_word: Ζεβεδαῖον
  chosen: Zebedee
  rationale: Personal names are transliterated by standard convention per translation
    philosophy.
- source_word: πλοίῳ
  chosen: boat
  alternatives:
  - ship
  lexicon: BDAG
  rationale: In this Galilean fishing context, 'boat' is the natural English equivalent;
    'ship' would sound too large and formal.
- source_word: μισθωτῶν
  chosen: hired workers
  alternatives:
  - hired men
  - day laborers
  - employees
  lexicon: BDAG
  rationale: μισθωτός denotes one who works for pay. 'Hired workers' is gender-accurate
    to the likely referents without importing unnecessary male-specific wording, and
    it avoids the modern corporate feel of 'employees.'
- source_word: ἀπῆλθον
  chosen: went away
  alternatives:
  - went
  - departed
  lexicon: BDAG
  rationale: ἀπέρχομαι includes the sense of going off/departing. 'Went away' preserves
    that movement from their prior location more clearly than the bare 'went,' while
    remaining readable.
- source_word: ὀπίσω αὐτοῦ
  chosen: after him
  alternatives:
  - behind him
  - following him
  lexicon: BDAG
  rationale: ὀπίσω with a genitive can mean spatially 'behind' or in discipleship
    context 'after.' Here 'after him' preserves both the literal movement and the
    emerging discipleship nuance without making the participial idea more explicit
    than the Greek does.
