id: MRK.1.18
reference: Mark 1:18
source:
  edition: SBLGNT
  text: καὶ ⸀εὐθὺς ἀφέντες τὰ ⸀δίκτυα ἠκολούθησαν αὐτῷ.
translation:
  text: And immediately they left the nets and followed him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'at once.'
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ
  chosen: And
  alternatives:
  - Then
  lexicon: BDAG
  rationale: Standard connective; retained as simple coordination to reflect Mark's
    narrative flow without adding interpretive nuance.
- source_word: εὐθὺς
  chosen: immediately
  alternatives:
  - at once
  - straightway
  lexicon: BDAG
  rationale: Mark characteristically uses εὐθύς to convey promptness and urgency.
    'Immediately' is clear modern English and preserves the adverb's force better
    than the archaic 'straightway.'
- source_word: ἀφέντες
  chosen: left
  alternatives:
  - having left
  - abandoned
  lexicon: BDAG
  rationale: 'Aorist participle of ἀφίημι, here indicating action prior to the main
    verb. English idiom naturally renders the participle with a finite verb coordinated
    to the main action: ''they left ... and followed.'' ''Abandoned'' overstates the
    emotional force.'
- source_word: τὰ δίκτυα
  chosen: the nets
  alternatives:
  - their nets
  lexicon: BDAG
  rationale: The Greek has the article with 'nets.' English naturally renders this
    as 'the nets.' Although 'their nets' is contextually implied, it is not explicit
    in the Greek and is therefore not supplied in the main text.
- source_word: ἠκολούθησαν
  chosen: followed
  alternatives:
  - went after
  lexicon: BDAG
  rationale: Standard rendering of ἀκολουθέω in discipleship contexts. 'Followed'
    preserves both the literal movement and the emerging discipleship sense without
    importing later theological elaboration.
- source_word: αὐτῷ
  chosen: him
  alternatives:
  - Jesus
  lexicon: BDAG
  rationale: The pronoun refers to Jesus from the immediate context. The Greek uses
    a pronoun, so English should do the same rather than replacing it with the name.
