theological_decisions:
- issue: Discipleship nuance in ἠκολούθησαν
  chosen_reading: Render as 'followed him' without expanding to 'became his disciples'
    or similar.
  alternative_readings:
  - went with him
  - became his followers
  rationale: The verb already carries the narrative and theological sense appropriate
    to the context. Expanding it would import interpretation beyond the wording of
    the text. This preserves the text's simplicity while allowing the discipleship
    significance to emerge from context.
  doctrine_reference: 'Translation philosophy: Never paraphrase beyond what the source
    text warrants; preserve theological tension rather than resolve it.'
