theological_decisions:
- issue: Description of John's clothing and diet in relation to prophetic imagery
  chosen_reading: Translate the verse descriptively without importing an explicit
    identification with Elijah into the main text.
  alternative_readings:
  - Render more literally and leave readers to infer the Elijah connection
  rationale: The wording evokes Elijah's appearance (cf. 2 Kgs 1:8), but Mark 1:6
    itself does not explicitly state that connection. To avoid importing interpretive
    content into the translation, the main text remains strictly descriptive. The
    intertextual significance may be noted in a footnote.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Never import doctrinal claims the text does not make.'
