id: MRK.1.6
reference: Mark 1:6
source:
  edition: SBLGNT
  text: ⸂καὶ ἦν⸃ ὁ Ἰωάννης ἐνδεδυμένος τρίχας καμήλου καὶ ζώνην δερματίνην περὶ τὴν
    ὀσφὺν αὐτοῦ, καὶ ἔσθων ἀκρίδας καὶ μέλι ἄγριον.
translation:
  text: Now John was clothed with camel’s hair and a leather belt around his waist,
    and he was eating locusts and wild honey.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: John’s clothing recalls the description of Elijah in 2 Kings 1:8, contributing
      to Mark’s presentation of John as a prophetic forerunner.
    reason: cross_reference
lexical_decisions:
- source_word: ἐνδεδυμένος
  chosen: was clothed with
  alternatives:
  - was dressed in
  - wore
  lexicon: BDAG
  rationale: The perfect participle conveys a state of being dressed/clothed. 'Was
    clothed with' preserves the stative sense more clearly than the simpler 'wore,'
    while remaining natural English.
- source_word: τρίχας καμήλου
  chosen: camel’s hair
  alternatives:
  - camel hair
  - hair of a camel
  lexicon: BDAG
  rationale: The phrase refers to material made from camel hair, not necessarily the
    hide itself. 'Camel’s hair' is idiomatic and preserves the lexical sense of τρίχας
    ('hair').
- source_word: ζώνην δερματίνην
  chosen: a leather belt
  alternatives:
  - a leather waistband
  - a belt of leather
  lexicon: BDAG
  rationale: ζώνη is a belt or waistband; 'belt' is the most natural modern equivalent.
    δερματίνην specifies the material as leather.
- source_word: περὶ τὴν ὀσφὺν αὐτοῦ
  chosen: around his waist
  alternatives:
  - around his loins
  - around his middle
  lexicon: BDAG
  rationale: ὀσφύς literally refers to the loins/waist area. 'Around his waist' is
    clear modern English; 'loins' is more formal/literal but less natural for contemporary
    readers.
- source_word: ἔσθων
  chosen: he was eating
  alternatives:
  - eating
  - he ate
  lexicon: BDAG
  rationale: The present participle depicts customary or ongoing action in the descriptive
    portrait of John. 'He was eating' fits the narrative description better than a
    simple past 'he ate.'
- source_word: ἀκρίδας
  chosen: locusts
  lexicon: BDAG
  rationale: The standard lexical meaning is the insect 'locusts.' No contextual reason
    warrants a figurative or alternative rendering.
- source_word: μέλι ἄγριον
  chosen: wild honey
  alternatives:
  - honey from the wild
  lexicon: BDAG
  rationale: A straightforward adjectival construction meaning honey found in the
    wild. 'Wild honey' is the standard and natural English rendering.
- source_word: καὶ ἦν
  chosen: Now ... was
  alternatives:
  - And ... was
  lexicon: BDAG
  rationale: καί here continues the narrative. Rendering it as 'Now' gives smooth
    English discourse flow while preserving the connective force, avoiding overly
    wooden repetition of 'And' at the start of the sentence.
