id: MRK.1.37
reference: Mark 1:37
source:
  edition: SBLGNT
  text: καὶ ⸂εὗρον αὐτὸν καὶ⸃ λέγουσιν αὐτῷ ὅτι Πάντες ⸂ζητοῦσίν σε⸃.
translation:
  text: And they found him and said to him, “Everyone is looking for you.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'All are seeking you.' The Greek ζητοῦσίν can also be rendered 'are seeking,'
      but in this context it likely refers to people trying to find Jesus physically.
    reason: lexical_alternative
lexical_decisions:
- source_word: εὗρον
  chosen: found
  alternatives:
  - came upon
  - located
  lexicon: BDAG
  rationale: Aorist of εὑρίσκω here narrates the successful result of the search.
    'Found' is the most natural and direct English equivalent in narrative context.
- source_word: λέγουσιν
  chosen: said
  alternatives:
  - are saying
  - tell
  lexicon: BDAG
  rationale: Although present tense in Greek (historical present), idiomatic English
    narrative commonly renders it as simple past. This preserves the flow without
    awkwardness while reflecting the narrative function.
- source_word: ὅτι
  chosen: “
  alternatives:
  - that
  lexicon: BDAG
  rationale: Introduces direct discourse content. In English, quotation punctuation
    communicates this more naturally than an explicit 'that' clause.
- source_word: Πάντες
  chosen: Everyone
  alternatives:
  - all
  - everyone
  lexicon: BDAG
  rationale: The nominative plural 'all' refers idiomatically to the people seeking
    Jesus. 'Everyone' is natural modern English and conveys the collective sense without
    implying absolute universality beyond the immediate context.
- source_word: ζητοῦσίν σε
  chosen: is looking for you
  alternatives:
  - is seeking you
  - is searching for you
  lexicon: BDAG
  rationale: ζητέω can mean seek, look for, or search for. In this immediate narrative
    setting, the sense is that people are trying to find Jesus physically, so 'is
    looking for you' best fits contemporary English. Singular verb with 'everyone'
    is standard English agreement.
- source_word: καὶ
  chosen: And
  alternatives:
  - Then
  - So
  lexicon: BDAG
  rationale: Retains the straightforward connective force of καί in Mark's rapid narrative
    style without adding interpretive nuance.
- source_word: αὐτὸν / αὐτῷ / σε
  chosen: him / him / you
  lexicon: BDAG
  rationale: 'These pronouns are rendered directly according to their case functions:
    object of finding, indirect object of speaking, and object of seeking.'
