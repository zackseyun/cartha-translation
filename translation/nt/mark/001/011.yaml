theological_decisions:
- issue: Rendering the divine declaration to Jesus without diminishing its christological
    force
  chosen_reading: my beloved Son
  alternative_readings:
  - my Son, the Beloved
  - my dearly loved Son
  rationale: The wording preserves both filial identity and divine affection without
    importing later doctrinal terminology not present in the verse. Capitalization
    of 'Son' signals the referent's unique christological significance in context
    while remaining a translation-level convention rather than an added doctrinal
    claim.
  doctrine_reference: Affirmations; Translation philosophy §§1, 6
- issue: Whether to smooth the plural οὐρανῶν to singular English 'heaven'
  chosen_reading: from the heavens
  alternative_readings:
  - from heaven
  rationale: The Greek plural is retained because it is semantically transparent in
    English and reflects original-language primacy. The traditional singular is preserved
    in a footnote as a familiar alternative.
  doctrine_reference: Translation philosophy §1
