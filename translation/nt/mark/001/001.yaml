theological_decisions:
- issue: Whether Χριστοῦ should be rendered as a translated title or retained as the
    traditional name-like 'Christ'
  chosen_reading: Messiah
  alternative_readings:
  - Christ
  rationale: The doctrine excerpt directs that Χριστός be rendered 'Messiah' where
    it functions as a title, and 'Christ' where it is name-like. In Mark 1:1, the
    genitive construction 'of Jesus Christos' is best understood as identifying Jesus
    by his messianic office, not merely preserving a fixed proper-name form. Translating
    the title preserves the Hebraic and theological force of the opening line.
  doctrine_reference: 'DOCTRINE.md: ''Translate titles; transliterate names'' and
    Contested terms table for Χριστός'
