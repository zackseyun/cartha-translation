id: MRK.1.1
reference: Mark 1:1
source:
  edition: SBLGNT
  text: Ἀρχὴ τοῦ εὐαγγελίου Ἰησοῦ ⸀χριστοῦ.
translation:
  text: The beginning of the good news of Jesus the Messiah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'gospel.' The Greek word εὐαγγέλιον can be rendered either 'good news'
      or, traditionally, 'gospel.'
    reason: lexical_alternative
  - marker: b
    text: Or 'Jesus Christ.' The Greek Χριστός means 'Messiah' when used as a title.
    reason: alternative_reading
lexical_decisions:
- source_word: Ἀρχὴ
  chosen: The beginning
  alternatives:
  - Beginning
  lexicon: BDAG
  rationale: Rendered with the article in English for natural style, though the Greek
    noun is anarthrous. The sense is either a title-like incipit or the start/origin
    of the narrative/proclamation; 'The beginning' best captures the nominal opening
    without overinterpreting it as a full clause.
- source_word: εὐαγγελίου
  chosen: good news
  alternatives:
  - gospel
  lexicon: BDAG
  rationale: Translated rather than transliterated to preserve the lexical meaning
    for modern readers. 'Gospel' is traditional, but 'good news' more transparently
    reflects εὐαγγέλιον and fits the project's preference for readable modern English.
- source_word: Ἰησοῦ
  chosen: Jesus
  lexicon: BDAG
  rationale: Personal names are transliterated by standard convention per project
    philosophy.
- source_word: χριστοῦ
  chosen: the Messiah
  alternatives:
  - Christ
  lexicon: BDAG
  rationale: Here Χριστός functions as a title rather than a fixed surname, so it
    is translated as 'Messiah' in keeping with the doctrine's contested-terms guidance.
    The article is supplied in English because titles in English idiom normally take
    it in this construction.
