theological_decisions:
- issue: Narrative emphasis on Jesus' prayer
  chosen_reading: Render the verse straightforwardly as describing Jesus withdrawing
    for prayer without importing additional doctrinal interpretation.
  alternative_readings:
  - Emphasize solitude as a model for discipleship
  - Emphasize Christological implications of Jesus' dependence in prayer
  rationale: The verse plainly narrates Jesus' early withdrawal to pray. The translation
    should not build theological conclusions into the wording beyond what the Greek
    states.
  doctrine_reference: Translation philosophy items 1 and 3
