id: MRK.1.35
reference: Mark 1:35
source:
  edition: SBLGNT
  text: Καὶ πρωῒ ἔννυχα λίαν ἀναστὰς ἐξῆλθεν καὶ ἀπῆλθεν εἰς ἔρημον τόπον κἀκεῖ προσηύχετο.
translation:
  text: And very early, while it was still dark, he got up, went out, and went away
    to a desolate place, and there he was praying.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to a deserted place' or 'to a solitary place.' The Greek can describe
      an uninhabited, desolate, or wilderness-like location.
    reason: lexical_alternative
lexical_decisions:
- source_word: πρωῒ
  chosen: very early
  alternatives:
  - early in the morning
  - in the morning
  lexicon: BDAG
  rationale: Refers to the early morning period. Rendered together with λίαν and informed
    by ἔννυχα to express the time naturally in English without losing the emphasis
    on earliness.
- source_word: ἔννυχα
  chosen: while it was still dark
  alternatives:
  - at night
  - in the night watches
  - before dawn
  lexicon: BDAG
  rationale: This rare adverbial expression intensifies the time reference, indicating
    the night was still in effect. 'While it was still dark' communicates the sense
    more clearly in modern English than a wooden 'at night' in this context.
- source_word: λίαν
  chosen: very
  alternatives:
  - quite
  - exceedingly
  lexicon: BDAG
  rationale: Functions as an intensifier modifying the early time reference. 'Very'
    is the most natural concise English equivalent.
- source_word: ἀναστὰς
  chosen: he got up
  alternatives:
  - having risen
  - rising
  lexicon: BDAG
  rationale: Aorist participle preceding the main verbs, indicating attendant action.
    'He got up' is idiomatic English and preserves the sequence without awkwardness.
- source_word: ἐξῆλθεν
  chosen: went out
  alternatives:
  - left
  - came out
  lexicon: BDAG
  rationale: Keeps the concrete movement from his lodging or current location. 'Went
    out' preserves the verbal distinction before the next verb ἀπῆλθεν.
- source_word: ἀπῆλθεν
  chosen: went away
  alternatives:
  - departed
  - went off
  lexicon: BDAG
  rationale: Distinct from ἐξῆλθεν; it adds movement away toward another location.
    Rendering it separately avoids collapsing Mark's two-step narration.
- source_word: εἰς ἔρημον τόπον
  chosen: to a desolate place
  alternatives:
  - to a deserted place
  - to a wilderness place
  - to a solitary place
  lexicon: BDAG
  rationale: ἔρημος can denote deserted, desolate, or wilderness-like. 'Desolate place'
    preserves the sparse, uninhabited sense without implying a formal geographic wilderness
    in every case. 'Solitary place' is possible but can shift focus from the place's
    character to Jesus' intention.
- source_word: κἀκεῖ
  chosen: and there
  alternatives:
  - and thereupon there
  - and in that place
  lexicon: BDAG
  rationale: A contraction of καὶ ἐκεῖ, naturally rendered 'and there,' preserving
    the narrative linkage and location.
- source_word: προσηύχετο
  chosen: he was praying
  alternatives:
  - he prayed
  - he was praying there
  lexicon: BDAG
  rationale: Imperfect middle indicates ongoing or durative action in past time. 'He
    was praying' better reflects the aspect than the simple past 'he prayed'.
