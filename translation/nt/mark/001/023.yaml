theological_decisions:
- issue: Rendering of demonic affliction language in ἐν πνεύματι ἀκαθάρτῳ
  chosen_reading: with an unclean spirit
  alternative_readings:
  - in an unclean spirit
  - possessed by an unclean spirit
  rationale: The Greek construction is somewhat idiomatic. 'With an unclean spirit'
    communicates the text clearly while avoiding the more interpretive 'possessed
    by,' which is conceptually related but not the exact wording of this verse. This
    preserves the text's theological claim about demonic presence without expanding
    it beyond the source wording.
  doctrine_reference: Translation philosophy §§1, 3, 6
