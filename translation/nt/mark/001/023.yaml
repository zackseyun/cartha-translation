id: MRK.1.23
reference: Mark 1:23
source:
  edition: SBLGNT
  text: καὶ ⸀εὐθὺς ἦν ἐν τῇ συναγωγῇ αὐτῶν ἄνθρωπος ἐν πνεύματι ἀκαθάρτῳ καὶ ἀνέκραξεν
translation:
  text: And immediately there was in their synagogue a man with an unclean spirit,
    and he cried out,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'in an unclean spirit.'
    reason: lexical_alternative
  - marker: b
    text: Some translations render this as 'possessed by an unclean spirit,' an interpretive
      expansion of the Greek expression.
    reason: alternative_reading
lexical_decisions:
- source_word: εὐθὺς
  chosen: immediately
  alternatives:
  - at once
  - right away
  lexicon: BDAG
  rationale: Mark characteristically uses εὐθύς to convey rapid narrative movement.
    'Immediately' preserves this recurring Markan feature in a natural but still fairly
    formal way.
- source_word: ἦν
  chosen: there was
  alternatives:
  - was
  lexicon: BDAG
  rationale: The existential use of εἰμί with an indefinite subject is best represented
    in English as 'there was,' which reads naturally and reflects the Greek sense
    of presence/existence in the setting.
- source_word: συναγωγῇ αὐτῶν
  chosen: their synagogue
  alternatives:
  - the synagogue
  - their assembly
  lexicon: BDAG
  rationale: συναγωγή in this narrative context refers to the Jewish synagogue. Retaining
    'synagogue' is the standard and clearest rendering. αὐτῶν is preserved as 'their,'
    likely referring to the local community just mentioned.
- source_word: ἄνθρωπος
  chosen: a man
  alternatives:
  - a person
  - a human being
  lexicon: BDAG
  rationale: The noun is singular masculine and here refers to a specific male individual
    in the narrative, so 'a man' is gender-accurate and preferable to a neutral rendering.
- source_word: ἐν πνεύματι ἀκαθάρτῳ
  chosen: with an unclean spirit
  alternatives:
  - in an unclean spirit
  - possessed by an unclean spirit
  lexicon: BDAG
  rationale: Although the Greek literally says 'in an unclean spirit,' idiomatic English
    in this context is 'with an unclean spirit.' This preserves the association without
    importing the fuller interpretive wording 'possessed by,' which goes beyond the
    exact expression used here.
- source_word: ἀκαθάρτῳ
  chosen: unclean
  alternatives:
  - impure
  lexicon: BDAG
  rationale: '''Unclean'' is the established and contextually appropriate rendering,
    preserving the ritual/moral connotations present in the term and in Gospel demonology.'
- source_word: ἀνέκραξεν
  chosen: he cried out
  alternatives:
  - he shouted
  - he screamed out
  lexicon: BDAG
  rationale: ἀνακράζω denotes a loud outcry. 'Cried out' is natural, sufficiently
    vivid, and does not over-specify the emotional tone.
