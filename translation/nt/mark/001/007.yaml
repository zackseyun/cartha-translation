theological_decisions:
- issue: Degree of humility in John's statement
  chosen_reading: I am not worthy ... to untie the strap of his sandals
  alternative_readings:
  - I am not fit/able ... to untie the strap of his sandals
  rationale: The idiom emphasizes John's unworthiness before the coming one rather than mere incapacity. This preserves the theological contrast in status without overstating beyond the text.
  doctrine_reference: 'Translation philosophy: preserve source-text sense without importing doctrinal claims.'
revisions:
- timestamp: '2026-04-21T17:06:51Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/high_scrutiny/nt/mark/001/007.job-4959.json
  category: awkward_english
  tier: 1
  from: worthy, having stooped down, to untie
  to: worthy to stoop down and untie
  rationale: The current word order is unnatural in English. It separates the governing adjective 'worthy' from the infinitive 'to untie' with the participial phrase 'having stooped down'. This makes the sentence clunky and harder to parse. Translating the aorist participle (κύψας) and the infinitive (λῦσαι) as a coordinated pair of infinitives ('to stoop down and untie') is a standard and much more fluid English rendering for this Greek construction, correctly showing that stooping is the manner in which the untying would occur.
