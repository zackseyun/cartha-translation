id: MRK.1.7
reference: Mark 1:7
source:
  edition: SBLGNT
  text: καὶ ἐκήρυσσεν λέγων· Ἔρχεται ὁ ἰσχυρότερός μου ὀπίσω μου, οὗ οὐκ εἰμὶ ἱκανὸς κύψας λῦσαι τὸν ἱμάντα τῶν ὑποδημάτων αὐτοῦ·
translation:
  text: And he was proclaiming, saying, “The one stronger than I is coming after me, of whom I am not worthy to stoop down and untie the strap of his sandals.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more traditionally, “The one mightier than I is coming after me.”
    reason: lexical_alternative
  - marker: b
    text: Or “I am not fit” or “I am not sufficient”; the expression conveys profound unworthiness before the coming one.
    reason: lexical_alternative
  - marker: c
    text: Or 'worthy, having stooped down, to untie'.
    reason: previous_rendering
lexical_decisions:
- source_word: ἐκήρυσσεν
  chosen: was proclaiming
  alternatives:
  - preached
  - was preaching
  lexicon: BDAG
  rationale: Imperfect tense suggests ongoing/repeated action. 'Proclaim' preserves the heraldic force of κηρύσσω without sounding overly ecclesiastical.
- source_word: λέγων
  chosen: saying
  alternatives:
  - and saying
  lexicon: BDAG
  rationale: Standard participial complement to ἐκήρυσσεν, naturally rendered with 'saying' to introduce the quoted content.
- source_word: Ἔρχεται
  chosen: is coming
  alternatives:
  - comes
  - is on his way
  lexicon: BDAG
  rationale: Present middle/passive indicative used as a vivid present. 'Is coming' is natural English and preserves the immediacy.
- source_word: ὁ ἰσχυρότερός μου
  chosen: the one stronger than I
  alternatives:
  - the one mightier than I
  - the stronger one than I am
  lexicon: BDAG
  rationale: Comparative adjective with article functions substantivally. 'Stronger' is the plain lexical sense of ἰσχυρός; 'mightier' is traditional but slightly elevated. 'Than I' is concise and idiomatic.
- source_word: ὀπίσω μου
  chosen: after me
  alternatives:
  - behind me
  lexicon: BDAG
  rationale: In this context of succession/coming after John, 'after me' best captures both spatial and temporal nuance.
- source_word: οὗ
  chosen: of whom
  alternatives:
  - whose
  lexicon: BDAG
  rationale: Genitive relative pronoun introducing relation to the following infinitive clause. 'Of whom' closely reflects the Greek construction; 'whose' would be smoother but less formally transparent here.
- source_word: ἱκανὸς
  chosen: worthy
  alternatives:
  - fit
  - adequate
  - sufficient
  lexicon: BDAG
  rationale: Although ἱκανός can mean 'able/sufficient,' in this idiom of personal unworthiness before a superior, 'worthy' best conveys the humility expressed.
- source_word: κύψας
  chosen: having stooped down
  alternatives:
  - stooping down
  - bending down
  lexicon: BDAG
  rationale: Aorist participle denotes the attendant action prior to untying. 'Having stooped down' preserves the sequence and the physical lowering implied.
- source_word: λῦσαι
  chosen: to untie
  alternatives:
  - to loosen
  lexicon: BDAG
  rationale: In context of sandal straps, 'untie' is the natural English expression for λύω.
- source_word: ἱμάντα
  chosen: strap
  alternatives:
  - thong
  - lace
  lexicon: BDAG
  rationale: Refers to the leather strap fastening the sandal. 'Strap' is clear modern English; 'thong' is traditional but misleading in contemporary usage.
- source_word: τῶν ὑποδημάτων αὐτοῦ
  chosen: of his sandals
  alternatives:
  - of his shoes
  lexicon: BDAG
  rationale: ὑποδήματα refers to footwear, here specifically sandals in the ancient setting. 'Sandals' is culturally and historically precise.
