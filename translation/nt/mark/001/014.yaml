theological_decisions:
- issue: Rendering παραδοθῆναι in relation to Mark's recurring passion vocabulary
  chosen_reading: was handed over
  alternative_readings:
  - was arrested
  rationale: Mark repeatedly uses παραδίδωμι for hostile handing over, including Jesus'
    own passion. Retaining 'handed over' preserves this narrative and theological
    resonance without importing more detail than the text states.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
- issue: Force of the genitive in τὸ εὐαγγέλιον τοῦ θεοῦ
  chosen_reading: the good news of God
  alternative_readings:
  - the good news from God
  - the good news about God
  rationale: The genitive can plausibly be understood in more than one related way.
    The main text preserves the ambiguity rather than selecting one interpretive option.
  doctrine_reference: Preserve theological tension rather than resolve it.
