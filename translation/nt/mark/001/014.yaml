id: MRK.1.14
reference: Mark 1:14
source:
  edition: SBLGNT
  text: ⸂Καὶ μετὰ⸃ τὸ παραδοθῆναι τὸν Ἰωάννην ἦλθεν ὁ Ἰησοῦς εἰς τὴν Γαλιλαίαν κηρύσσων
    τὸ ⸀εὐαγγέλιον τοῦ θεοῦ
translation:
  text: And after John was handed over, Jesus came into Galilee, proclaiming the good
    news of God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'after John was arrested.' The Greek more literally says 'after John
      was handed over,' a wording that also echoes Mark's later passion language.
    reason: lexical_alternative
  - marker: b
    text: Or 'the gospel of God.'
    reason: lexical_alternative
  - marker: c
    text: The phrase 'of God' may mean the good news that comes from God, belongs
      to God, or is centered on God.
    reason: alternative_reading
lexical_decisions:
- source_word: μετὰ τὸ παραδοθῆναι
  chosen: after ... was handed over
  alternatives:
  - after ... was arrested
  - after ... was delivered up
  lexicon: BDAG
  rationale: The articular infinitive with μετά is temporal, meaning 'after.' παραδίδωμι
    in Mark often carries the broader sense 'hand over/deliver up,' including judicial
    or hostile transfer, and this wording preserves Mark's verbal linkage with later
    passion language better than the more interpretive 'arrested.'
- source_word: Ἰωάννην
  chosen: John
  rationale: Standard transliteration of the personal name Ἰωάννης, following the
    translation policy to transliterate names.
- source_word: ἦλθεν
  chosen: came
  alternatives:
  - went
  - arrived
  lexicon: BDAG
  rationale: Aorist of ἔρχομαι is naturally rendered 'came.' 'Went' would shift the
    deictic perspective, and 'arrived' is narrower than the Greek.
- source_word: εἰς τὴν Γαλιλαίαν
  chosen: into Galilee
  alternatives:
  - to Galilee
  - in Galilee
  lexicon: BDAG
  rationale: εἰς most basically indicates movement into/toward. 'Into Galilee' preserves
    the directional force, though 'to Galilee' is also idiomatic English.
- source_word: κηρύσσων
  chosen: proclaiming
  alternatives:
  - preaching
  - announcing
  lexicon: BDAG
  rationale: κηρύσσω denotes heralding or public proclamation. 'Proclaiming' preserves
    that sense in accessible modern English without narrowing it to sermonic 'preaching.'
- source_word: εὐαγγέλιον
  chosen: good news
  alternatives:
  - gospel
  lexicon: BDAG
  rationale: Although 'gospel' is traditional, 'good news' more transparently conveys
    the lexical sense of εὐαγγέλιον for modern readers. The phrase remains theologically
    weighty without relying on ecclesiastical jargon.
- source_word: τοῦ θεοῦ
  chosen: of God
  alternatives:
  - from God
  - about God
  lexicon: BDAG
  rationale: 'The genitive is left formally broad as ''of God,'' preserving the likely
    intended richness: the good news belonging to, originating from, and centered
    in God. Rendering it more specifically as ''from God'' or ''about God'' would
    resolve an ambiguity the Greek does not force.'
