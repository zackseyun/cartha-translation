id: MRK.1.4
reference: Mark 1:4
source:
  edition: SBLGNT
  text: ἐγένετο Ἰωάννης ⸀ὁ βαπτίζων ἐν τῇ ⸀ἐρήμῳ κηρύσσων βάπτισμα μετανοίας εἰς ἄφεσιν
    ἁμαρτιῶν.
translation:
  text: John appeared in the wilderness, proclaiming a baptism of repentance for the
    forgiveness of sins.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'John the Baptizer appeared in the wilderness, proclaiming...' The Greek
      participle can be represented more explicitly as a title.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγένετο
  chosen: appeared
  alternatives:
  - came
  - appeared on the scene
  - was
  lexicon: BDAG
  rationale: In Markan narrative, ἐγένετο with a named subject can function idiomatically
    to introduce a figure onto the scene. 'Appeared' communicates this narrative force
    more naturally than the overly wooden 'came to be' or the potentially misleading
    bare 'was.'
- source_word: Ἰωάννης
  chosen: John
  alternatives:
  - Johanan
  rationale: Personal names are transliterated by standard English convention per
    project philosophy.
- source_word: ὁ βαπτίζων
  chosen: a baptism
  alternatives:
  - the baptizer
  - the one baptizing
  lexicon: BDAG
  rationale: The participle identifies John as the baptizing figure, but in English
    the sense is adequately carried by the clause 'proclaiming a baptism...' together
    with the known subject 'John.' To avoid awkwardness, the participial force is
    represented in the overall sentence rather than by a separate title in the main
    text.
- source_word: ἐν τῇ ἐρήμῳ
  chosen: in the wilderness
  alternatives:
  - in the desert
  - in the deserted region
  lexicon: BDAG
  rationale: '''Wilderness'' is the standard and contextually appropriate rendering
    for ἔρημος here, preserving both geographical and biblical-theological resonance
    without over-specifying a sandy desert.'
- source_word: κηρύσσων
  chosen: proclaiming
  alternatives:
  - preaching
  - announcing
  lexicon: BDAG
  rationale: '''Proclaiming'' preserves the heraldic force of κηρύσσω and is slightly
    broader and less church-coded than ''preaching,'' while still fitting the context.'
- source_word: βάπτισμα
  chosen: baptism
  alternatives:
  - washing
  - immersion
  lexicon: BDAG
  rationale: The established Christian rite-language is already present in the Greek
    term here, and 'baptism' is the most accurate and recognizable rendering.
- source_word: μετανοίας
  chosen: of repentance
  alternatives:
  - of turning
  - of a change of mind
  lexicon: BDAG
  rationale: 'The genitive is best taken as descriptive or attributive: a baptism
    characterized by repentance. ''Repentance'' preserves the moral and spiritual
    force better than narrower paraphrases.'
- source_word: εἰς ἄφεσιν ἁμαρτιῶν
  chosen: for the forgiveness of sins
  alternatives:
  - unto forgiveness of sins
  - resulting in the forgiveness of sins
  - for release from sins
  lexicon: BDAG
  rationale: εἰς here is rendered with the natural English 'for,' expressing purpose/result
    without forcing a sacramental or merely symbolic interpretation. ἄφεσις is well
    rendered as 'forgiveness' in this context.
- source_word: ἁμαρτιῶν
  chosen: sins
  alternatives:
  - sin
  lexicon: BDAG
  rationale: The plural is explicit in Greek and should be preserved.
