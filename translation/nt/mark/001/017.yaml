theological_decisions:
- issue: Gender rendering of ἀνθρώπων in the metaphor ἁλιεῖς ἀνθρώπων
  chosen_reading: of men
  alternative_readings:
  - of people
  rationale: The Greek uses ἄνθρωπος in a generic human sense, but the project's policy
    prefers gender-accurate renderings that match the source's form and intent. 'Fishers
    of men' also preserves the established metaphor and cadence, while a footnote
    can clarify the inclusive reference to human beings generally.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over
    gender-neutral)
