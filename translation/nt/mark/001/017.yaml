id: MRK.1.17
reference: Mark 1:17
source:
  edition: SBLGNT
  text: καὶ εἶπεν αὐτοῖς ὁ Ἰησοῦς· Δεῦτε ὀπίσω μου, καὶ ποιήσω ὑμᾶς γενέσθαι ἁλιεῖς
    ἀνθρώπων.
translation:
  text: And Jesus said to them, “Come after me, and I will make you become fishers
    of men.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Follow me.” Literally, “Come after me.”
    reason: lexical_alternative
  - marker: b
    text: Greek “fishers of men,” that is, those who gather human beings.
    reason: lexical_alternative
lexical_decisions:
- source_word: Δεῦτε
  chosen: Come
  alternatives:
  - Come here
  - Follow
  lexicon: BDAG
  rationale: Imperatival summons meaning 'come' or 'come now.' 'Come' preserves the
    direct call, while the following phrase ὀπίσω μου supplies the discipleship sense
    ('after me'). Rendering the whole as 'Follow me' is possible but less transparent
    to the Greek wording.
- source_word: ὀπίσω μου
  chosen: after me
  alternatives:
  - behind me
  - follow me
  lexicon: BDAG
  rationale: Literally 'behind/after me.' In discipleship context it conveys following
    Jesus. 'After me' keeps the spatial-metaphorical force and pairs naturally with
    Δεῦτε.
- source_word: ποιήσω
  chosen: I will make
  alternatives:
  - I will cause
  - I will appoint
  lexicon: BDAG
  rationale: Future active of ποιέω here expresses Jesus' effective action in transforming
    the disciples. 'I will make' is idiomatic and close to the Greek.
- source_word: γενέσθαι
  chosen: become
  alternatives:
  - to be
  - to come to be
  lexicon: BDAG
  rationale: Aorist middle infinitive of γίνομαι emphasizes coming into a new state.
    'Become' better reflects transformation than a simple 'be.'
- source_word: ἁλιεῖς
  chosen: fishers
  alternatives:
  - fishermen
  - catchers
  lexicon: BDAG
  rationale: '''Fishers'' is the most direct lexical equivalent and avoids adding
    the occupational nuance of ''fishermen'' beyond the noun itself. It also preserves
    the metaphorical force.'
- source_word: ἀνθρώπων
  chosen: of men
  alternatives:
  - of people
  - for people
  lexicon: BDAG
  rationale: Genitive plural of ἄνθρωπος. In this idiom it refers to human beings
    generally, but the source uses the masculine/generic form. Per the project's gender-accurate
    policy, 'men' is retained in the main text as matching the source form and traditional
    idiom, with an inclusive sense noted in a footnote.
- source_word: καὶ εἶπεν αὐτοῖς ὁ Ἰησοῦς
  chosen: And Jesus said to them
  alternatives:
  - And Jesus said to them all
  lexicon: BDAG
  rationale: Straightforward narrative introduction. English reorders the subject
    naturally while preserving all elements of the clause.
