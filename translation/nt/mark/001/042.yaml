theological_decisions:
- issue: Relation between physical healing and ritual purity in καθαρίζω
  chosen_reading: Render ἐκαθαρίσθη as 'he was cleansed' rather than 'he was healed.'
  alternative_readings:
  - he was healed
  - he was made clean
  rationale: The text presents more than symptom relief; in the biblical context of
    leprosy, cleansing includes restoration from impurity. 'Cleansed' preserves the
    theological and cultic dimension without importing extra doctrinal claims.
  doctrine_reference: Translation philosophy §1, §3, §6
