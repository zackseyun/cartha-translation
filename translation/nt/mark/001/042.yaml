id: MRK.1.42
reference: Mark 1:42
source:
  edition: SBLGNT
  text: καὶ ⸀εὐθὺς ἀπῆλθεν ἀπ’ αὐτοῦ ἡ λέπρα, καὶ ἐκαθαρίσθη.
translation:
  text: And immediately the leprosy left him, and he was cleansed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'was made clean.' The verb also carries the sense of ritual cleansing,
      not merely physical recovery.
    reason: lexical_alternative
lexical_decisions:
- source_word: εὐθὺς
  chosen: immediately
  alternatives:
  - at once
  - straightway
  lexicon: BDAG
  rationale: In Mark, εὐθύς regularly conveys promptness or immediacy. 'Immediately'
    is clear modern English and preserves Mark's characteristic urgency better than
    the archaic 'straightway.'
- source_word: ἀπῆλθεν
  chosen: left
  alternatives:
  - went away
  - departed
  lexicon: BDAG
  rationale: The verb ἀπέρχομαι literally means 'go away/depart.' With λέπρα as the
    subject and ἀπ’ αὐτοῦ ('from him'), idiomatic English is 'left him,' which preserves
    the sense without awkwardness.
- source_word: ἀπ’ αὐτοῦ
  chosen: him
  alternatives:
  - from him
  lexicon: BDAG
  rationale: English idiom with 'left' naturally incorporates the prepositional phrase
    as 'left him.' The underlying sense 'from him' is preserved semantically.
- source_word: λέπρα
  chosen: the leprosy
  alternatives:
  - the skin disease
  - the defiling skin disease
  lexicon: BDAG
  rationale: λέπρα in biblical usage can refer more broadly than modern Hansen's disease,
    but 'leprosy' remains the standard concise rendering and fits the narrative context.
    A more expansive paraphrase would go beyond the source text; the article is retained
    as in Greek.
- source_word: ἐκαθαρίσθη
  chosen: he was cleansed
  alternatives:
  - he was made clean
  - he was purified
  lexicon: BDAG
  rationale: The passive of καθαρίζω here carries both physical and ritual-cleansing
    force in the context of leprosy. 'He was cleansed' preserves that dual resonance
    better than the flatter 'he was healed' or the less natural 'he was made clean.'
