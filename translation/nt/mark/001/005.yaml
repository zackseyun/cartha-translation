theological_decisions:
- issue: Scope of 'all' in the descriptions of Judea and Jerusalem
  chosen_reading: Render with 'all' while allowing the idiomatic collective sense
    rather than mathematical universality
  alternative_readings:
  - Translate more loosely as 'many from Judea and Jerusalem'
  rationale: The Greek uses πᾶσα and πάντες, and the translation should preserve that
    rhetoric. At the same time, the phrase is a common narrative generalization, so
    'all the Judean countryside and all the people of Jerusalem' communicates the
    text's force without forcing an absolute claim beyond the idiom.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Nature of baptism language
  chosen_reading: Retain 'baptized' rather than interpretively rendering mode or theological
    significance
  alternative_readings:
  - immersed
  - washed
  rationale: The verse reports the act without specifying mode or importing later
    denominational theology. 'Baptized' preserves the established lexical sense in
    context and avoids sectarian over-interpretation.
  doctrine_reference: Affirmations paragraph on not advocating denominational distinctives
    unless the Greek unambiguously supports one reading
