id: MRK.1.5
reference: Mark 1:5
source:
  edition: SBLGNT
  text: καὶ ἐξεπορεύετο πρὸς αὐτὸν πᾶσα ἡ Ἰουδαία χώρα καὶ οἱ Ἱεροσολυμῖται ⸂πάντες,
    καὶ ἐβαπτίζοντο⸃ ⸂ὑπ’ αὐτοῦ ἐν τῷ Ἰορδάνῃ ποταμῷ⸃ ἐξομολογούμενοι τὰς ἁμαρτίας
    αὐτῶν.
translation:
  text: And all the Judean countryside and all the people of Jerusalem were going
    out to him, and they were being baptized by him in the Jordan River, confessing
    their sins.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐξεπορεύετο
  chosen: were going out
  alternatives:
  - went out
  - kept going out
  lexicon: BDAG
  rationale: Imperfect middle/passive conveys ongoing or repeated action in past time.
    'Were going out' preserves the durative sense better than simple past, while remaining
    natural English.
- source_word: πᾶσα ἡ Ἰουδαία χώρα
  chosen: all the Judean countryside
  alternatives:
  - the whole Judean region
  - all the land of Judea
  lexicon: BDAG
  rationale: χώρα commonly denotes region, district, or countryside. 'Judean countryside'
    fits the geographic sense here and avoids implying every individual without exception
    while still reflecting πᾶσα idiomatically.
- source_word: οἱ Ἱεροσολυμῖται πάντες
  chosen: all the people of Jerusalem
  alternatives:
  - all the Jerusalemites
  - the people of Jerusalem, all of them
  lexicon: BDAG
  rationale: Ἱεροσολυμῖται means inhabitants of Jerusalem. 'All the people of Jerusalem'
    is more natural modern English than 'Jerusalemites' while preserving the collective
    force of πάντες.
- source_word: ἐβαπτίζοντο
  chosen: were being baptized
  alternatives:
  - were baptized
  lexicon: BDAG
  rationale: The imperfect passive indicates ongoing repeated action. 'Were being
    baptized' preserves both the passive voice and the imperfect aspect more clearly
    than simple past.
- source_word: ὑπ’ αὐτοῦ
  chosen: by him
  alternatives:
  - by John
  lexicon: BDAG
  rationale: The pronoun refers to John the Baptizer from context. 'By him' preserves
    the Greek wording without adding the explicit name.
- source_word: ἐν τῷ Ἰορδάνῃ ποταμῷ
  chosen: in the Jordan River
  alternatives:
  - in the Jordan
  - in the river Jordan
  lexicon: BDAG
  rationale: ποταμός explicitly means 'river,' so including 'River' reflects the full
    phrase. 'Jordan River' is standard English order.
- source_word: ἐξομολογούμενοι
  chosen: confessing
  alternatives:
  - openly confessing
  - acknowledging
  lexicon: BDAG
  rationale: The participle expresses attendant action accompanying baptism. 'Confessing'
    is the most direct and idiomatic rendering, with the object supplied by the next
    phrase.
- source_word: τὰς ἁμαρτίας αὐτῶν
  chosen: their sins
  alternatives:
  - the sins of theirs
  lexicon: BDAG
  rationale: Straightforward possessive rendering of the accusative object plus genitive
    pronoun; natural English requires 'their sins'.
