theological_decisions:
- issue: Referent of Jesus' rebuke
  chosen_reading: Jesus addresses the unclean spirit directly, not the man himself.
  alternative_readings:
  - Jesus rebukes the man as the immediate grammatical referent
  rationale: The immediate literary context identifies the speaker as a man with an
    unclean spirit, and Jesus' command 'come out of him' shows that the addressed
    referent is the spirit. This preserves the narrative's distinction between the
    afflicted man and the possessing spirit without importing extra doctrinal claims.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
