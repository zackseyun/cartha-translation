id: MRK.1.25
reference: Mark 1:25
source:
  edition: SBLGNT
  text: καὶ ἐπετίμησεν αὐτῷ ὁ Ἰησοῦς λέγων· Φιμώθητι καὶ ἔξελθε ἐξ αὐτοῦ.
translation:
  text: And Jesus rebuked him, saying, “Be silent, and come out of him!”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more literally, “Be muzzled.”
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπετίμησεν
  chosen: rebuked
  alternatives:
  - commanded sternly
  - censured
  lexicon: BDAG
  rationale: ἐπιτιμάω commonly means to rebuke, reprove, or speak sharply to. In Mark,
    it often carries authoritative reprimand, including toward demons and forces opposed
    to God's will. 'Rebuked' preserves both the verbal sharpness and Jesus' authority
    better than a softer 'spoke to' or a more interpretive 'commanded.'
- source_word: αὐτῷ
  chosen: him
  alternatives:
  - it
  lexicon: BDAG
  rationale: The pronoun is masculine singular and refers to the unclean spirit speaking
    through the man in the preceding context. 'Him' follows the Greek grammatical
    gender and the narrative's personal address to the demonized agent, while English
    'it' would depersonalize the referent beyond what the Greek does.
- source_word: λέγων
  chosen: saying
  alternatives:
  - and said
  lexicon: BDAG
  rationale: The present participle introduces the content of Jesus' rebuke. 'Saying'
    is a natural and sufficiently formal rendering that preserves the participial
    linkage without overcomplicating the English.
- source_word: Φιμώθητι
  chosen: Be silent
  alternatives:
  - Be muzzled
  - Be quiet
  lexicon: BDAG
  rationale: φιμόω literally refers to muzzling, especially an animal, but in imperative
    usage it idiomatically means to silence someone forcefully. 'Be silent' communicates
    the command clearly in modern English while retaining the abruptness. The more
    literal 'Be muzzled' is vivid and worth preserving in a footnote, but it is less
    idiomatic in the main text.
- source_word: ἔξελθε
  chosen: come out
  alternatives:
  - go out
  - depart
  lexicon: BDAG
  rationale: ἐξέρχομαι in this exorcism context means to come/go out from within the
    possessed man. 'Come out' is the standard idiomatic English command in exorcism
    contexts and fits the deictic force of direct speech better than 'go out.'
- source_word: ἐξ αὐτοῦ
  chosen: out of him
  alternatives:
  - from him
  lexicon: BDAG
  rationale: The preposition ἐκ/ἐξ marks movement out from within. 'Out of him' is
    the most natural English rendering and makes explicit the expulsion from the man.
    'From him' is possible but less vivid and slightly less precise spatially.
