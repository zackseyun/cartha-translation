id: MRK.1.10
reference: Mark 1:10
source:
  edition: SBLGNT
  text: καὶ ⸀εὐθὺς ἀναβαίνων ⸀ἐκ τοῦ ὕδατος εἶδεν σχιζομένους τοὺς οὐρανοὺς καὶ τὸ
    πνεῦμα ⸀ὡς περιστερὰν καταβαῖνον ⸀εἰς αὐτόν·
translation:
  text: And immediately, as he was coming up out of the water, he saw the heavens
    being torn open and the Spirit descending like a dove upon him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the heavens being split apart.' The verb is stronger than simply 'opened.'
    reason: lexical_alternative
  - marker: b
    text: Or 'into him.' Greek εἰς can mean 'into,' but here 'upon him' best fits
      the idiom of the Spirit's descent.
    reason: lexical_alternative
lexical_decisions:
- source_word: εὐθὺς
  chosen: immediately
  alternatives:
  - at once
  - straightway
  lexicon: BDAG
  rationale: Mark characteristically uses εὐθύς for vivid narrative urgency. 'Immediately'
    is standard modern English and preserves the temporal force without archaic tone.
- source_word: ἀναβαίνων ἐκ τοῦ ὕδατος
  chosen: as he was coming up out of the water
  alternatives:
  - coming up from the water
  - going up out of the water
  lexicon: BDAG
  rationale: The present participle is contemporaneous with the main verb and is naturally
    rendered with 'as he was coming up.' 'Out of the water' reflects ἐκ more precisely
    than a looser 'from the water.'
- source_word: εἶδεν
  chosen: he saw
  alternatives:
  - he looked and saw
  lexicon: BDAG
  rationale: Simple aorist of perception; 'he saw' is the direct and sufficient rendering.
- source_word: σχιζομένους τοὺς οὐρανούς
  chosen: the heavens being torn open
  alternatives:
  - the heavens being split apart
  - the heavens opening
  lexicon: BDAG
  rationale: σχίζω is stronger than merely 'open'; 'being torn open' preserves the
    vivid, dramatic imagery and echoes Mark's later use of the same verb. 'Heavens'
    reflects the plural οὐρανούς.
- source_word: τοὺς οὐρανούς
  chosen: the heavens
  alternatives:
  - the sky
  - heaven
  lexicon: BDAG
  rationale: The plural is explicit in Greek and carries biblical resonance. 'Sky'
    is too naturalistic and loses the theological register.
- source_word: τὸ πνεῦμα
  chosen: the Spirit
  alternatives:
  - the Holy Spirit
  - the spirit
  lexicon: BDAG
  rationale: In this baptismal context, the referent is the divine Spirit. The Greek
    reads 'the Spirit' rather than explicitly 'the Holy Spirit,' so the translation
    preserves the wording without over-specification.
- source_word: ὡς περιστερὰν
  chosen: like a dove
  alternatives:
  - as a dove
  lexicon: BDAG
  rationale: ὡς marks comparison. 'Like a dove' is idiomatic and leaves open whether
    the comparison is to manner, appearance, or both, preserving the text's restraint.
- source_word: καταβαῖνον
  chosen: descending
  alternatives:
  - coming down
  lexicon: BDAG
  rationale: '''Descending'' matches the elevated narrative register and corresponds
    closely to καταβαίνω.'
- source_word: εἰς αὐτόν
  chosen: upon him
  alternatives:
  - into him
  - on him
  lexicon: BDAG
  rationale: Although εἰς often means 'into,' in this context with the Spirit's descent,
    idiomatic English and the likely sense favor 'upon him.' This avoids an overly
    wooden rendering while preserving the event of the Spirit's coming to rest on
    Jesus.
