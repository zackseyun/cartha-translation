theological_decisions:
- issue: Reference of 'the Spirit'
  chosen_reading: the divine Spirit, rendered 'the Spirit'
  alternative_readings:
  - the Holy Spirit
  rationale: The context clearly identifies God's Spirit at Jesus' baptism, but the
    Greek text itself says τὸ πνεῦμα, not 'Holy Spirit.' The translation preserves
    the source wording while recognizing the theological referent.
  doctrine_reference: Affirmations; Translation philosophy §§1, 6
- issue: Force of the dove comparison
  chosen_reading: comparison preserved as 'like a dove' without specifying whether
    it describes form, motion, or gentleness
  alternative_readings:
  - the Spirit took the form of a dove
  - the Spirit descended in a dove-like manner
  rationale: The Greek ὡς περιστερὰν signals comparison but does not explicitly define
    the exact point of likeness. Preserving that ambiguity follows the instruction
    to preserve theological tension rather than resolve it.
  doctrine_reference: Translation philosophy §3
