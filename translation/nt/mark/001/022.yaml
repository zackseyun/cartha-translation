id: MRK.1.22
reference: Mark 1:22
source:
  edition: SBLGNT
  text: καὶ ἐξεπλήσσοντο ἐπὶ τῇ διδαχῇ αὐτοῦ, ἦν γὰρ διδάσκων αὐτοὺς ὡς ἐξουσίαν ἔχων
    καὶ οὐχ ὡς οἱ γραμματεῖς.
translation:
  text: And they were astonished at his teaching, for he was teaching them as one
    having authority, and not as the scribes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'as one who had authority'; more idiomatically, 'with authority.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξεπλήσσοντο
  chosen: were astonished
  alternatives:
  - were amazed
  - were astounded
  lexicon: BDAG
  rationale: Imperfect middle/passive indicates an ongoing or repeated reaction of
    strong amazement. 'Were astonished' preserves the intensity and fits natural English
    narrative style better than a more wooden 'were being amazed.'
- source_word: ἐπὶ τῇ διδαχῇ αὐτοῦ
  chosen: at his teaching
  alternatives:
  - at his doctrine
  - because of his teaching
  lexicon: BDAG
  rationale: διδαχή here refers to the content or manner of what Jesus taught. 'Teaching'
    is clearer and more natural in modern English than 'doctrine,' while still accurately
    reflecting the noun.
- source_word: ἦν γὰρ διδάσκων
  chosen: for he was teaching
  alternatives:
  - for he taught
  - because he was teaching
  lexicon: BDAG
  rationale: The periphrastic construction with ἦν + participle conveys ongoing action.
    'Was teaching' preserves that aspect better than the simple past 'taught.'
- source_word: ὡς ἐξουσίαν ἔχων
  chosen: as one having authority
  alternatives:
  - as one who had authority
  - with authority
  lexicon: BDAG
  rationale: ἐξουσία denotes authority, right, or delegated power. 'As one having
    authority' closely reflects the Greek structure and highlights the comparison
    introduced by ὡς. 'With authority' is idiomatic but slightly less explicit structurally.
- source_word: γραμματεῖς
  chosen: the scribes
  alternatives:
  - the teachers of the law
  lexicon: BDAG
  rationale: γραμματεῖς is the standard term for Jewish scribal experts in the law.
    'Scribes' is the most direct rendering; the explanatory alternative is interpretive
    and therefore better left out of the main text.
