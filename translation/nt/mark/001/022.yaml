theological_decisions:
- issue: Nature of Jesus' authority in contrast with the scribes
  chosen_reading: Render the statement descriptively without expanding the source
    into a doctrinal explanation of divine authority.
  alternative_readings:
  - Translate more interpretively as 'with divine authority'
  rationale: The verse clearly contrasts Jesus' manner of teaching with that of the
    scribes, but it does not explicitly define the source or ontology of that authority
    in this sentence. The translation preserves the text's claim without importing
    a fuller theological conclusion not stated here.
  doctrine_reference: Preserve theological tension rather than resolve it.
