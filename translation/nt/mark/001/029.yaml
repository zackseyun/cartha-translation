id: MRK.1.29
reference: Mark 1:29
source:
  edition: SBLGNT
  text: Καὶ ⸀εὐθὺς ἐκ τῆς συναγωγῆς ⸂ἐξελθόντες ἦλθον⸃ εἰς τὴν οἰκίαν Σίμωνος καὶ
    Ἀνδρέου μετὰ Ἰακώβου καὶ Ἰωάννου.
translation:
  text: And immediately, after leaving the synagogue, they came into the house of
    Simon and Andrew, with James and John.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: εὐθὺς
  chosen: immediately
  alternatives:
  - at once
  - straightway
  lexicon: BDAG
  rationale: In Mark, εὐθύς is a characteristic adverb marking rapid narrative movement.
    'Immediately' is natural modern English and preserves the urgency better than
    the archaic 'straightway.'
- source_word: ἐκ τῆς συναγωγῆς
  chosen: after leaving the synagogue
  alternatives:
  - out of the synagogue
  - from the synagogue
  lexicon: BDAG
  rationale: The preposition ἐκ with συναγωγή literally means 'out of/from the synagogue.'
    Because the participle ἐξελθόντες already expresses the act of exiting, English
    reads more smoothly with 'after leaving the synagogue' while preserving the sequence.
- source_word: ἐξελθόντες ἦλθον
  chosen: after leaving ... they came
  alternatives:
  - having gone out ... they came
  - when they had left ... they went
  lexicon: BDAG
  rationale: 'The aorist participle followed by aorist main verb indicates antecedent
    action: first they exited, then they came/went. ''After leaving ... they came''
    reflects this temporal relationship in idiomatic English without flattening the
    two verbal actions into one.'
- source_word: ἦλθον
  chosen: they came
  alternatives:
  - they went
  lexicon: BDAG
  rationale: ἔρχομαι commonly means 'come' or 'go' depending on viewpoint. Since the
    destination is specified ('into the house'), 'came' is a standard narrative rendering
    and matches common English idiom here.
- source_word: εἰς τὴν οἰκίαν
  chosen: into the house
  alternatives:
  - to the house
  - into the home
  lexicon: BDAG
  rationale: εἰς marks movement into, and οἰκία here denotes the dwelling/household
    residence. 'Into the house' preserves the directional force more precisely than
    simply 'to the house.'
- source_word: Σίμωνος καὶ Ἀνδρέου
  chosen: of Simon and Andrew
  alternatives:
  - belonging to Simon and Andrew
  - Simon and Andrew's
  lexicon: BDAG
  rationale: The genitives identify whose house it was. 'Of Simon and Andrew' is transparent
    and fits the syntax of the English clause.
- source_word: μετὰ Ἰακώβου καὶ Ἰωάννου
  chosen: with James and John
  alternatives:
  - accompanied by James and John
  lexicon: BDAG
  rationale: μετά with the genitive indicates accompaniment. 'With James and John'
    is the most direct and natural rendering.
- source_word: Σίμωνος / Ἀνδρέου / Ἰακώβου / Ἰωάννου
  chosen: Simon / Andrew / James / John
  lexicon: standard transliteration practice
  rationale: Following the translation philosophy, personal names are transliterated
    by standard English conventions rather than translated.
