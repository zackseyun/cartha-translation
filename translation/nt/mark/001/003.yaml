theological_decisions:
- issue: Rendering κύριος in an Isaianic citation that in Hebrew refers to YHWH
  chosen_reading: Lord
  alternative_readings:
  - the LORD
  rationale: The project's contested-terms guidance sets κύριος to 'Lord' by default.
    In this context the citation echoes Isaiah's reference to YHWH, and within Mark's
    narrative it contributes to the identification of Jesus with the Lord whose way
    is prepared. The main text keeps the Greek title 'Lord'; the covenantal background
    is preserved in a footnote rather than importing 'the LORD' into the Greek citation.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord; יְהוָה YHWH → the
    LORD'
- issue: Attachment of 'in the wilderness'
  chosen_reading: attached to 'one crying out'
  alternative_readings:
  - attached to 'Prepare the way of the Lord'
  rationale: The Greek wording in Mark most naturally reads 'a voice of one crying
    out in the wilderness,' matching the immediate syntax. Because the underlying
    Isaiah text can be punctuated differently in translation tradition, the alternative
    is preserved in a footnote rather than resolved silently.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: preserve theological
    tension rather than resolve it'
