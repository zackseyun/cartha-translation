id: MRK.1.3
reference: Mark 1:3
source:
  edition: SBLGNT
  text: φωνὴ βοῶντος ἐν τῇ ἐρήμῳ· Ἑτοιμάσατε τὴν ὁδὸν κυρίου, εὐθείας ποιεῖτε τὰς
    τρίβους αὐτοῦ,
translation:
  text: 'A voice of one crying out in the wilderness: ‘Prepare the way of the Lord;
    make his paths straight,’'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or, following another punctuation of the Isaiah citation: ''A voice of
      one crying out: “In the wilderness prepare the way of the Lord …”'''
    reason: alternative_reading
  - marker: b
    text: '''Lord'' renders Greek kyriou; the quotation echoes Isaiah 40:3, where
      the Hebrew refers to the LORD (YHWH).'
    reason: cross_reference
lexical_decisions:
- source_word: φωνὴ
  chosen: A voice
  alternatives:
  - The voice
  - A sound
  lexicon: BDAG
  rationale: φωνή commonly means 'voice' here, introducing the quotation. The anarthrous
    noun is naturally rendered 'A voice' rather than 'The voice' in English.
- source_word: βοῶντος
  chosen: of one crying out
  alternatives:
  - crying
  - calling out
  lexicon: BDAG
  rationale: The genitive participle depends on φωνή, yielding the idiom 'a voice
    of one crying out.' 'Crying out' preserves the forceful heraldic sense better
    than the flatter 'calling.'
- source_word: ἐν τῇ ἐρήμῳ
  chosen: in the wilderness
  alternatives:
  - in the desert
  lexicon: BDAG
  rationale: ἔρημος can denote desert or wilderness; 'wilderness' best matches both
    the Isaianic citation tradition and the broader Markan setting of John in the
    wilderness.
- source_word: Ἑτοιμάσατε
  chosen: Prepare
  alternatives:
  - Make ready
  lexicon: BDAG
  rationale: Aorist imperative plural calling for decisive preparation. 'Prepare'
    is direct, idiomatic, and traditional without being archaic.
- source_word: τὴν ὁδὸν
  chosen: the way
  alternatives:
  - the road
  lexicon: BDAG
  rationale: ὁδός can mean road or way; 'way' preserves both the literal image of
    route preparation and the prophetic-metaphorical resonance.
- source_word: κυρίου
  chosen: of the Lord
  alternatives:
  - for the Lord
  lexicon: BDAG
  rationale: κύριος is rendered by the doctrinal default 'Lord.' The genitive is formally
    'of the Lord'; English idiom could also support 'for the Lord,' but 'of the Lord'
    stays closer to the Greek and the citation form.
- source_word: εὐθείας
  chosen: straight
  alternatives:
  - level
  - direct
  lexicon: BDAG
  rationale: εὐθύς here means straight rather than morally upright. 'Straight' is
    the natural collocation with paths.
- source_word: ποιεῖτε
  chosen: make
  alternatives:
  - keep
  - make ready
  lexicon: BDAG
  rationale: Present imperative plural, paired with εὐθείας and τρίβους, is well rendered
    'make.' The present may suggest ongoing action, but English imperative style does
    not require explicit aspect marking here.
- source_word: τὰς τρίβους αὐτοῦ
  chosen: his paths
  alternatives:
  - his roads
  - his tracks
  lexicon: BDAG
  rationale: τρίβος denotes path or roadway. 'Paths' is idiomatic in English biblical
    style and preserves the plural image. αὐτοῦ is retained as 'his,' referring to
    the Lord.
