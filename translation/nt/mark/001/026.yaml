theological_decisions:
- issue: Nature of the possessing entity
  chosen_reading: the phrase refers to a personal demonic spirit
  alternative_readings:
  - an impersonal evil force
  rationale: In Mark's narrative world, 'unclean spirit' functions as a personal agent
    that convulses, cries out, and exits the man. The translation preserves that personal
    agency without adding doctrinal elaboration beyond the text.
  doctrine_reference: Affirmations; Preserve theological tension rather than resolve
    it
