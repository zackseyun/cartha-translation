id: MRK.1.26
reference: Mark 1:26
source:
  edition: SBLGNT
  text: καὶ σπαράξαν αὐτὸν τὸ πνεῦμα τὸ ἀκάθαρτον καὶ ⸀φωνῆσαν φωνῇ μεγάλῃ ἐξῆλθεν
    ἐξ αὐτοῦ.
translation:
  text: And the unclean spirit, after convulsing him and crying out with a loud voice,
    came out of him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'having convulsed him'; the Greek participle can be rendered more formally,
      but 'after convulsing him' makes the sequence clearer in English.
    reason: lexical_alternative
  - marker: b
    text: Or 'with a great cry.'
    reason: lexical_alternative
lexical_decisions:
- source_word: σπαράξαν
  chosen: after convulsing
  alternatives:
  - having convulsed
  - throwing into convulsions
  - tearing
  lexicon: BDAG
  rationale: Aorist participle preceding the main verb, indicating action prior to
    the spirit's departure. 'Convulsing' fits the demonic-expulsion context in idiomatic
    modern English better than the more wooden 'having convulsed' and avoids the potentially
    misleadingly violent literalism of 'tearing' in English.
- source_word: τὸ πνεῦμα τὸ ἀκάθαρτον
  chosen: the unclean spirit
  alternatives:
  - the impure spirit
  lexicon: BDAG
  rationale: Standard NT expression for a demonic spirit. 'Unclean' preserves the
    ritual/moral impurity nuance present in ἀκάθαρτος and matches established Gospel
    usage better than 'impure.'
- source_word: φωνῆσαν
  chosen: crying out
  alternatives:
  - having cried out
  - shouting
  - uttering a cry
  lexicon: BDAG
  rationale: The participle denotes vocal utterance accompanying the departure. 'Crying
    out' is natural English and preserves the force of a loud, dramatic vocalization
    without over-specifying its emotional tone.
- source_word: φωνῇ μεγάλῃ
  chosen: with a loud voice
  alternatives:
  - in a loud voice
  - with a great cry
  lexicon: BDAG
  rationale: This dative phrase expresses manner. 'With a loud voice' is a transparent
    rendering and keeps the concrete wording of the Greek. 'With a great cry' is possible,
    but the Greek explicitly uses 'voice' rather than only 'cry.'
- source_word: ἐξῆλθεν ἐξ αὐτοῦ
  chosen: came out of him
  alternatives:
  - went out from him
  - departed from him
  lexicon: BDAG
  rationale: A straightforward rendering of the exorcism formula. 'Came out of him'
    is idiomatic in English and preserves the personal, spatial sense of the spirit
    leaving the man.
- source_word: καὶ ... καὶ
  chosen: And ... and
  alternatives:
  - Then ... and
  - And ...
  - with participial compression
  lexicon: BDAG
  rationale: The verse uses simple coordination. The English keeps the initial 'And'
    to reflect Mark's narrative flow, while compressing the participles into a smoother
    English clause without losing the sequence of actions.
