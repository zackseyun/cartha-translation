id: MRK.1.12
reference: Mark 1:12
source:
  edition: SBLGNT
  text: Καὶ εὐθὺς τὸ πνεῦμα αὐτὸν ἐκβάλλει εἰς τὴν ἔρημον.
translation:
  text: And immediately the Spirit drives him out into the wilderness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'casts him out' or 'sends him out.' The Greek verb is forceful; compare
      Mark's frequent use of the same verb for driving out demons.
    reason: lexical_alternative
lexical_decisions:
- source_word: Καὶ
  chosen: And
  alternatives:
  - Then
  lexicon: BDAG
  rationale: Standard connective; retained as simple coordination to reflect Mark's
    narrative flow without overinterpreting sequence.
- source_word: εὐθὺς
  chosen: immediately
  alternatives:
  - at once
  - straightway
  lexicon: BDAG
  rationale: Mark characteristically uses εὐθύς for rapid narrative movement. 'Immediately'
    is natural modern English and preserves the urgency better than the archaic 'straightway.'
- source_word: τὸ πνεῦμα
  chosen: the Spirit
  alternatives:
  - the Holy Spirit
  lexicon: BDAG
  rationale: In context, this refers to the Spirit just mentioned at Jesus' baptism
    (Mark 1:10). 'The Spirit' is sufficiently definite and closer to the Greek, while
    English readers can infer the Holy Spirit from context. The article is preserved.
- source_word: αὐτὸν
  chosen: him
  lexicon: BDAG
  rationale: Direct object pronoun referring to Jesus; straightforwardly rendered
    'him.'
- source_word: ἐκβάλλει
  chosen: drives ... out
  alternatives:
  - casts out
  - sends out
  - compels
  lexicon: BDAG
  rationale: ἐκβάλλω is a forceful verb, often 'cast out' or 'drive out.' Here the
    force should be preserved rather than softened to 'leads' or 'sends.' 'Drives
    ... out' captures both the verbal intensity and the ἐκ- prefix. Because English
    idiom prefers the particle after the object, 'drives him out' is natural while
    remaining faithful.
- source_word: εἰς τὴν ἔρημον
  chosen: into the wilderness
  alternatives:
  - into the desert
  lexicon: BDAG
  rationale: ἔρημος denotes an uninhabited, desolate place. 'Wilderness' is the best
    established and contextually rich rendering in biblical English, evoking Israel's
    wilderness testing without requiring a sandy-desert image.
