theological_decisions:
- issue: Force of the Spirit's action toward Jesus
  chosen_reading: Rendered ἐκβάλλει with strong force as 'drives ... out' rather than
    a softer expression such as 'leads.'
  alternative_readings:
  - the Spirit leads him into the wilderness
  - the Spirit sends him out into the wilderness
  rationale: 'The Greek verb ἐκβάλλω is notably forceful. Preserving that force maintains
    the text''s theological tension: Jesus'' wilderness testing follows divine initiative,
    yet the wording should not be softened to harmonize with other Gospel accounts.
    This follows the translation philosophy of preserving tension rather than resolving
    it.'
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
