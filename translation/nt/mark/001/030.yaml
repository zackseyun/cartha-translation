  from: they speak
  to: they told
  rationale: The shift from a past continuous tense ('was lying') to a historical present ('they speak') within the same short sentence is jarring in English. While the drafter's choice to preserve the Greek historical present is noted and defensible, the result is less natural than it could be. For 'optimal-equivalence', using the more idiomatic simple past ('they told') in the main text would improve narrative flow. The excellent footnote already explains the Greek form, so no information would be lost; in fact, swapping the main text and footnote rendering might strike a better balance.
