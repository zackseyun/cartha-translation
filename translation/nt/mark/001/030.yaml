id: MRK.1.30
reference: Mark 1:30
source:
  edition: SBLGNT
  text: ἡ δὲ πενθερὰ Σίμωνος κατέκειτο πυρέσσουσα, καὶ ⸀εὐθὺς λέγουσιν αὐτῷ περὶ αὐτῆς.
translation:
  text: Now Simon’s mother-in-law was lying sick with a fever, and immediately they told to him about her.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, 'they told him about her.' The Greek uses a historical present ('they speak') for vivid narration.
    reason: lexical_alternative
  - marker: b
    text: Or 'they speak'.
    reason: previous_rendering
lexical_decisions:
- source_word: πενθερὰ
  chosen: mother-in-law
  alternatives:
  - wife's mother
  lexicon: BDAG
  rationale: The standard kinship term here refers to a mother-in-law. In context, 'Simon’s mother-in-law' is the natural and idiomatic English rendering.
- source_word: κατέκειτο
  chosen: was lying
  alternatives:
  - was lying down
  - was bedridden
  lexicon: BDAG
  rationale: The imperfect middle/passive form of κατάκειμαι denotes a continuing state of lying down/reclining. 'Was lying' preserves the durative sense without overstating her condition as permanently bedridden.
- source_word: πυρέσσουσα
  chosen: sick with a fever
  alternatives:
  - feverish
  - having a fever
  lexicon: BDAG
  rationale: The participle from πυρέσσω means to be feverish or suffer from fever. 'Sick with a fever' is natural modern English and makes explicit the illness implied by the participle.
- source_word: εὐθὺς
  chosen: immediately
  alternatives:
  - at once
  - right away
  lexicon: BDAG
  rationale: Mark frequently uses εὐθύς as a narrative marker of promptness. 'Immediately' preserves both the lexical sense and Markan style.
- source_word: λέγουσιν
  chosen: they speak
  alternatives:
  - they tell
  - they say
  lexicon: BDAG
  rationale: The present tense is retained as a historical present, a common Markan feature. 'They speak' preserves the vividness of the Greek better than shifting to a simple past, though English could also idiomatically use 'they told him'.
- source_word: περὶ αὐτῆς
  chosen: about her
  alternatives:
  - concerning her
  lexicon: BDAG
  rationale: περί with the genitive here means 'about' or 'concerning.' 'About her' is the most natural modern English expression.
- source_word: δὲ
  chosen: Now
  alternatives:
  - and
  - but
  lexicon: BDAG
  rationale: δέ here functions as a mild connective advancing the narrative. 'Now' signals the transition smoothly in English without implying strong contrast.
