id: MRK.1.16
reference: Mark 1:16
source:
  edition: SBLGNT
  text: ⸂Καὶ παράγων⸃ παρὰ τὴν θάλασσαν τῆς Γαλιλαίας εἶδεν Σίμωνα καὶ Ἀνδρέαν τὸν
    ⸀ἀδελφὸν Σίμωνος ⸀ἀμφιβάλλοντας ἐν τῇ θαλάσσῃ, ἦσαν γὰρ ἁλιεῖς·
translation:
  text: And as he was passing along beside the Sea of Galilee, he saw Simon and Andrew,
    Simon’s brother, casting a net into the sea, for they were fishermen.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: παράγων
  chosen: as he was passing along
  alternatives:
  - passing by
  - going along
  lexicon: BDAG
  rationale: Present participle modifying the main verb εἶδεν, conveying contemporaneous
    action. 'As he was passing along' preserves the ongoing sense more naturally than
    a simple finite 'he passed by' while remaining readable.
- source_word: παρὰ τὴν θάλασσαν
  chosen: beside the sea
  alternatives:
  - along the sea
  - by the sea
  lexicon: BDAG
  rationale: παρά with the accusative here indicates movement along or beside. 'Beside
    the sea' fits the immediate scene and pairs naturally with the participle.
- source_word: τὴν θάλασσαν τῆς Γαλιλαίας
  chosen: the Sea of Galilee
  alternatives:
  - the sea of Galilee
  - Lake Galilee
  lexicon: BDAG
  rationale: Standard geographic designation in English. Although it is a lake, the
    Greek uses θάλασσα and the established English equivalent is 'Sea of Galilee.'
- source_word: εἶδεν
  chosen: he saw
  alternatives:
  - he noticed
  lexicon: BDAG
  rationale: Simple aorist of ὁράω; 'he saw' is the direct and sufficient rendering
    without adding interpretive nuance.
- source_word: Σίμωνα καὶ Ἀνδρέαν
  chosen: Simon and Andrew
  rationale: Personal names are transliterated by standard English conventions per
    project philosophy.
- source_word: τὸν ἀδελφὸν Σίμωνος
  chosen: Simon’s brother
  alternatives:
  - the brother of Simon
  - Andrew, the brother of Simon
  lexicon: BDAG
  rationale: Genitive construction identifying Andrew in apposition. 'Simon’s brother'
    is concise, natural English and preserves the familial identification.
- source_word: ἀμφιβάλλοντας
  chosen: casting a net
  alternatives:
  - casting
  - throwing a net
  lexicon: BDAG
  rationale: The verb specifically refers to casting a net, not merely throwing in
    a general sense. Supplying 'a net' is warranted by the lexical meaning and avoids
    an unnaturally bare English participle.
- source_word: ἐν τῇ θαλάσσῃ
  chosen: into the sea
  alternatives:
  - in the sea
  lexicon: BDAG
  rationale: Although ἐν is formally 'in,' with a verb of casting English idiom normally
    uses 'into.' This reflects the action accurately and naturally.
- source_word: ἦσαν γὰρ ἁλιεῖς
  chosen: for they were fishermen
  alternatives:
  - because they were fishermen
  lexicon: BDAG
  rationale: γάρ gives explanatory background for their action. 'For they were fishermen'
    preserves the explanatory force with a slightly more formal narrative cadence
    suitable to the Gospel.
