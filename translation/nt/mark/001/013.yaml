theological_decisions:
- issue: Semantic force of πειραζόμενος in relation to Satan
  chosen_reading: being tempted
  alternative_readings:
  - being tested
  rationale: The verb can denote testing or tempting, but with Satan explicitly named
    as the agent, the hostile sense "tempted" is most likely. This preserves the narrative's
    moral-spiritual conflict without denying the broader biblical theme that such
    events also function as testing.
  doctrine_reference: Translation philosophy §3 (preserve theological tension where
    genuine ambiguity exists)
