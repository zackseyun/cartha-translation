id: MRK.1.13
reference: Mark 1:13
source:
  edition: SBLGNT
  text: καὶ ⸀ἦν ἐν τῇ ἐρήμῳ ⸂τεσσεράκοντα ἡμέρας⸃ πειραζόμενος ὑπὸ τοῦ Σατανᾶ, καὶ
    ἦν μετὰ τῶν θηρίων, καὶ οἱ ἄγγελοι διηκόνουν αὐτῷ.
translation:
  text: And he was in the wilderness forty days, being tempted by Satan; and he was
    with the wild animals, and the angels were ministering to him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "being tested by Satan." The Greek verb can mean either "tempt" or "test,"
      though "tempted" best fits the explicit agency of Satan here.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐρήμῳ
  chosen: wilderness
  alternatives:
  - desert
  - desolate place
  lexicon: BDAG
  rationale: '"Wilderness" is the standard and most contextually fitting rendering
    in Gospel narrative, preserving both the geographic and theological resonance
    of Israel''s wilderness testing without over-specifying a sandy desert.'
- source_word: τεσσεράκοντα ἡμέρας
  chosen: forty days
  lexicon: BDAG
  rationale: Directly renders the accusative duration of time. The phrase carries
    biblical resonance of testing periods, but the translation leaves that resonance
    implicit rather than interpretively expanding it.
- source_word: πειραζόμενος
  chosen: being tempted
  alternatives:
  - being tested
  lexicon: BDAG
  rationale: πειράζω can mean either tempt or test. In this context, with Satan as
    the agent, "being tempted" is the most natural English rendering and best reflects
    hostile solicitation, while "tested" remains a viable lexical alternative worth
    preserving.
- source_word: ὑπὸ τοῦ Σατανᾶ
  chosen: by Satan
  alternatives:
  - by the Adversary
  lexicon: BDAG
  rationale: Σατανᾶς is a proper name/title already conventional in English as "Satan."
    Transliteration is appropriate for a personal supernatural adversary. "The Adversary"
    reflects the underlying sense but is less natural here.
- source_word: μετὰ τῶν θηρίων
  chosen: with the wild animals
  alternatives:
  - with the beasts
  - among the wild animals
  lexicon: BDAG
  rationale: θηρίον refers to wild animals/beasts. "Wild animals" is clear modern
    English and avoids archaic tone, while preserving the untamed and potentially
    threatening setting.
- source_word: ἄγγελοι
  chosen: angels
  alternatives:
  - messengers
  lexicon: BDAG
  rationale: Although ἄγγελος can mean messenger, the context of Satan, wilderness
    temptation, and supernatural service strongly indicates heavenly beings, so "angels"
    is the best rendering.
- source_word: διηκόνουν αὐτῷ
  chosen: were ministering to him
  alternatives:
  - were serving him
  lexicon: BDAG
  rationale: διακονέω means to serve or minister. "Were ministering to him" preserves
    the imperfect's ongoing sense and the solemn tone of divine care in context. "Were
    serving him" is possible but slightly flatter.
- source_word: καὶ ἦν ... καὶ ἦν ... καὶ
  chosen: And he was ...; and he was ...; and ...
  alternatives:
  - He was ... and was ... and ...
  lexicon: BDAG
  rationale: Mark's paratactic style is preserved by retaining the repeated "and"
    structure rather than smoothing it away. A semicolon helps readability in English
    while maintaining the sequence.
