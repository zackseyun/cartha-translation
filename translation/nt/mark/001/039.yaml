theological_decisions:
- issue: Nature of δαιμόνια
  chosen_reading: Rendered as 'demons' in the ordinary personal-spiritual sense.
  alternative_readings:
  - evil spirits
  rationale: The text presents Jesus exercising authority over personal demonic beings.
    'Demons' is the most direct lexical equivalent and does not import additional
    doctrinal claims beyond the text.
  doctrine_reference: Affirmations; preserve theological tension rather than resolve
    it
