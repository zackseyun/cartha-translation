id: MRK.1.39
reference: Mark 1:39
source:
  edition: SBLGNT
  text: καὶ ⸀ἦλθεν κηρύσσων ⸂εἰς τὰς συναγωγὰς⸃ αὐτῶν εἰς ὅλην τὴν Γαλιλαίαν καὶ τὰ
    δαιμόνια ἐκβάλλων.
translation:
  text: And he went throughout all Galilee, preaching in their synagogues and casting
    out the demons.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'he came, preaching in their synagogues throughout all Galilee and casting
      out demons.' The Greek verb can be rendered 'came,' but in context it likely
      describes itinerant movement through the region.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἦλθεν
  chosen: he went throughout
  alternatives:
  - he came
  - he went
  lexicon: BDAG
  rationale: Although the aorist of ἔρχομαι often means 'came,' in this context with
    the following regional phrase and participles it idiomatically describes Jesus'
    itinerant movement through Galilee. 'Went throughout' brings out the sense of
    travel across the region in natural English without adding more than the context
    warrants.
- source_word: κηρύσσων
  chosen: preaching
  alternatives:
  - proclaiming
  - heralding
  lexicon: BDAG
  rationale: κηρύσσω denotes public proclamation. 'Preaching' is the most natural
    and contextually fitting English rendering here, especially in synagogue settings,
    while still preserving the formal sense of proclamation.
- source_word: εἰς τὰς συναγωγὰς αὐτῶν
  chosen: in their synagogues
  alternatives:
  - into their synagogues
  - to their synagogues
  lexicon: BDAG
  rationale: Although εἰς is literally 'into,' with verbs of activity it can function
    effectively as a marker of location or sphere. English idiom strongly prefers
    'preaching in their synagogues.' The pronoun αὐτῶν is retained as 'their,' likely
    referring to the people of Galilee.
- source_word: εἰς ὅλην τὴν Γαλιλαίαν
  chosen: throughout all Galilee
  alternatives:
  - into all Galilee
  - through all Galilee
  - throughout Galilee
  lexicon: BDAG
  rationale: A second εἰς with the whole region indicates extent of movement. 'Throughout
    all Galilee' best captures the distributive geographic sense in idiomatic English
    and preserves ὅλην with 'all.'
- source_word: τὰ δαιμόνια
  chosen: the demons
  alternatives:
  - demons
  - unclean spirits
  lexicon: BDAG
  rationale: δαιμόνια is specifically 'demons,' not the broader expression 'unclean
    spirits.' The article is naturally represented in English as 'the demons,' referring
    to the demonic beings being expelled in Jesus' ministry.
- source_word: ἐκβάλλων
  chosen: casting out
  alternatives:
  - driving out
  - expelling
  lexicon: BDAG
  rationale: ἐκβάλλω in exorcism contexts commonly means 'cast out' or 'drive out.'
    'Casting out' is both idiomatic and consistent with established exorcism language
    in English Bible translation without being archaic.
