theological_decisions:
- issue: Whether to expand the demons' knowledge into an explicit christological confession
  chosen_reading: they knew him
  alternative_readings:
  - they knew who he was
  - they knew him to be the Messiah/Son of God
  rationale: The text states only that the demons knew him. Expanding this into a
    fuller confession would import information from nearby passages rather than translate
    this verse itself. Preserving the concise wording maintains the text's theological
    tension without over-specification.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
