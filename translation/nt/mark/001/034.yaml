id: MRK.1.34
reference: Mark 1:34
source:
  edition: SBLGNT
  text: καὶ ἐθεράπευσεν πολλοὺς κακῶς ἔχοντας ποικίλαις νόσοις, καὶ δαιμόνια πολλὰ
    ἐξέβαλεν, καὶ οὐκ ἤφιεν λαλεῖν τὰ δαιμόνια, ὅτι ᾔδεισαν ⸀αὐτόν.
translation:
  text: And he healed many who were sick with various diseases, and he cast out many
    demons, and he would not allow the demons to speak, because they knew him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'they knew who he was.' The Greek reads simply, 'they knew him.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐθεράπευσεν
  chosen: he healed
  alternatives:
  - he cured
  lexicon: BDAG
  rationale: θεραπεύω commonly means to heal or cure; 'healed' is the more natural
    and biblically established English rendering and fits the narrative context of
    Jesus' restorative acts.
- source_word: πολλοὺς κακῶς ἔχοντας
  chosen: many who were sick
  alternatives:
  - many who were ill
  - many who were badly afflicted
  lexicon: BDAG
  rationale: The idiom κακῶς ἔχω means 'to be ill/sick.' Rendering it idiomatically
    avoids a wooden 'having badly' while preserving the sense.
- source_word: ποικίλαις νόσοις
  chosen: with various diseases
  alternatives:
  - with many kinds of diseases
  - with diverse sicknesses
  lexicon: BDAG
  rationale: ποικίλος conveys variety or diversity; νόσος is disease/sickness. 'With
    various diseases' is clear, natural, and close to the Greek dative expression.
- source_word: δαιμόνια πολλὰ ἐξέβαλεν
  chosen: he cast out many demons
  alternatives:
  - he drove out many demons
  lexicon: BDAG
  rationale: ἐκβάλλω in exorcism contexts is well rendered 'cast out'; this preserves
    the force of expulsion and matches common NT usage.
- source_word: οὐκ ἤφιεν
  chosen: he would not allow
  alternatives:
  - he did not permit
  - he was not allowing
  lexicon: BDAG
  rationale: The imperfect ἤφιεν suggests ongoing or customary action in the scene.
    'Would not allow' captures both the past narrative setting and the imperfective
    nuance better than a simple past.
- source_word: λαλεῖν
  chosen: to speak
  alternatives:
  - to talk
  lexicon: BDAG
  rationale: λαλέω is the ordinary verb 'to speak.' 'Speak' is more appropriate than
    'talk' in this solemn narrative context.
- source_word: ὅτι
  chosen: because
  alternatives:
  - for
  - that
  lexicon: BDAG
  rationale: 'Here ὅτι most naturally gives the reason Jesus silenced the demons:
    because they knew him. ''Because'' makes the causal sense explicit in contemporary
    English.'
- source_word: ᾔδεισαν αὐτόν
  chosen: they knew him
  alternatives:
  - they knew who he was
  lexicon: BDAG
  rationale: The Greek object is simply 'him,' not an expanded clause. 'They knew
    him' preserves the concise wording while allowing the context to imply recognition
    of his identity.
