id: MRK.1.43
reference: Mark 1:43
source:
  edition: SBLGNT
  text: καὶ ἐμβριμησάμενος αὐτῷ ⸀εὐθὺς ἐξέβαλεν αὐτόν,
translation:
  text: And after sternly warning him, he immediately sent him away,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'after strictly charging him'; the Greek verb can also carry the sense
      of strong indignation or stern rebuke.
    reason: lexical_alternative
  - marker: b
    text: Or 'drove him out' / 'cast him out'; the Greek verb is stronger than a neutral
      'sent away.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐμβριμησάμενος
  chosen: after sternly warning
  alternatives:
  - after strictly charging
  - after rebuking
  - after snorting with indignation
  lexicon: BDAG
  rationale: The participle ἐμβριμάομαι can convey strong emotional intensity expressed
    in stern admonition or indignation. In this context, followed by Jesus' command
    in the next verse and the dismissal of the healed man, the sense is best captured
    as a forceful warning rather than mere emotion alone. 'Sternly warning' preserves
    both the intensity and the directive force in readable English. More literal options
    like 'strictly charging' are possible but less natural; 'rebuking' may suggest
    disapproval of the man rather than forcefulness of instruction.
- source_word: αὐτῷ
  chosen: him
  lexicon: BDAG
  rationale: Dative pronoun referring to the healed man; in English the indirect object
    is naturally represented within 'warning him.'
- source_word: εὐθύς
  chosen: immediately
  alternatives:
  - at once
  - straightway
  lexicon: BDAG
  rationale: Mark frequently uses εὐθύς as a narrative marker of immediacy. 'Immediately'
    is clear modern English and preserves Mark's pace.
- source_word: ἐξέβαλεν
  chosen: sent ... away
  alternatives:
  - drove ... out
  - cast ... out
  - dismissed
  lexicon: BDAG
  rationale: ἐκβάλλω often means 'cast out' or 'drive out,' and Mark uses it strongly
    elsewhere. Here the object is the healed man, not a demon, so 'sent away' communicates
    the action idiomatically while fitting the context. Because the verb is unusually
    forceful, the stronger nuance is preserved by pairing it with 'sternly warning'
    and noting alternatives in a footnote.
- source_word: αὐτόν
  chosen: him
  lexicon: BDAG
  rationale: Accusative pronoun referring to the same man; rendered directly as 'him'.
- source_word: καὶ
  chosen: And
  alternatives:
  - Then
  lexicon: BDAG
  rationale: Simple connective continuing the narrative. 'And' is formally closer
    and suits Mark's style.
