id: MRK.1.21
reference: Mark 1:21
source:
  edition: SBLGNT
  text: Καὶ εἰσπορεύονται εἰς Καφαρναούμ. καὶ ⸀εὐθὺς τοῖς σάββασιν ⸂ἐδίδασκεν εἰς
    τὴν συναγωγήν⸃.
translation:
  text: And they went into Capernaum, and immediately on the Sabbath he began teaching
    in the synagogue.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'they enter into Capernaum'—Mark frequently uses the historical present
      in vivid narration.
    reason: lexical_alternative
  - marker: b
    text: Greek 'on the Sabbaths,' an idiomatic expression meaning 'on the Sabbath.'
    reason: lexical_alternative
  - marker: c
    text: Or, 'he was teaching' or 'he taught'; the Greek imperfect may emphasize
      ongoing action or the beginning of the action.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰσπορεύονται
  chosen: they went into
  alternatives:
  - they enter
  - they came into
  lexicon: BDAG
  rationale: The Greek present is a historical present, common in Mark. English normally
    renders this with a past tense for natural narrative flow. 'Went into' preserves
    the motion sense of εἰσπορεύομαι with εἰς.
- source_word: Καφαρναούμ
  chosen: Capernaum
  alternatives:
  - Kapharnaoum
  rationale: Personal and place names are transliterated by standard English convention.
    'Capernaum' is the established English form.
- source_word: εὐθύς
  chosen: immediately
  alternatives:
  - at once
  - straightway
  lexicon: BDAG
  rationale: Mark frequently uses εὐθύς to convey promptness. 'Immediately' is clear
    modern English and preserves the narrative urgency better than the archaic 'straightway.'
- source_word: τοῖς σάββασιν
  chosen: on the Sabbath
  alternatives:
  - on the Sabbaths
  - on the Sabbath day
  lexicon: BDAG
  rationale: Although σάββασιν is plural in form, this idiom commonly functions as
    a singular temporal expression meaning 'on the Sabbath.' The singular is the most
    natural and contextually likely rendering here.
- source_word: ἐδίδασκεν
  chosen: he began teaching
  alternatives:
  - he was teaching
  - he taught
  lexicon: BDAG
  rationale: 'The imperfect indicates ongoing or inceptive action. In this context,
    after arrival and with the temporal marker ''immediately on the Sabbath,'' the
    inceptive nuance is plausible: he commenced teaching. This preserves aspect better
    than a simple past while remaining idiomatic.'
- source_word: συναγωγήν
  chosen: the synagogue
  alternatives:
  - the assembly
  lexicon: BDAG
  rationale: In this Jewish setting, συναγωγή refers to the local synagogue rather
    than a generic assembly. The conventional rendering is both accurate and contextually
    specific.
