id: MRK.1.38
reference: Mark 1:38
source:
  edition: SBLGNT
  text: καὶ λέγει αὐτοῖς· Ἄγωμεν ⸀ἀλλαχοῦ εἰς τὰς ἐχομένας κωμοπόλεις, ἵνα καὶ ἐκεῖ
    κηρύξω, εἰς τοῦτο γὰρ ⸀ἐξῆλθον.
translation:
  text: And he said to them, “Let us go elsewhere, into the neighboring towns, so
    that I may preach there also, for that is why I came out.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for this purpose I came out.' The phrase may refer simply to Jesus'
      leaving the present place, or more broadly to his purpose in going out to preach.
    reason: alternative_reading
  - marker: b
    text: The Greek term rendered 'towns' can denote smaller settlements, something
      between villages and towns.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἄγωμεν
  chosen: Let us go
  alternatives:
  - Let us go on
  - Let us depart
  lexicon: BDAG
  rationale: First person plural hortatory subjunctive; 'Let us go' is natural English
    and preserves the invitational force without adding nuance beyond the Greek.
- source_word: ἀλλαχοῦ
  chosen: elsewhere
  alternatives:
  - to another place
  - somewhere else
  lexicon: BDAG
  rationale: Adverb meaning 'elsewhere' or 'to another place.' 'Elsewhere' is concise
    and idiomatic, matching the movement away from the current location.
- source_word: ἐχομένας
  chosen: neighboring
  alternatives:
  - nearby
  - adjacent
  lexicon: BDAG
  rationale: Participle from ἔχω used idiomatically for places that are next in sequence
    or nearby. 'Neighboring' fits the geographic sense well in modern English.
- source_word: κωμοπόλεις
  chosen: towns
  alternatives:
  - villages
  - village-towns
  lexicon: BDAG
  rationale: The term denotes smaller populated places, something between villages
    and towns. 'Towns' is the clearest natural English rendering in context; 'village-towns'
    is too awkward for main text, while 'villages' may understate the urban nuance.
- source_word: ἵνα καὶ ἐκεῖ κηρύξω
  chosen: so that I may preach there also
  alternatives:
  - so that I may proclaim there also
  - that I may preach there too
  lexicon: BDAG
  rationale: ἵνα introduces purpose; κηρύσσω is 'preach/proclaim.' 'Preach' is standard
    and clear here, while 'there also' preserves the καὶ ἐκεῖ emphasis.
- source_word: εἰς τοῦτο
  chosen: for that is why
  alternatives:
  - for this purpose
  - for this
  lexicon: BDAG
  rationale: This idiom expresses purpose or reason. 'For that is why' communicates
    the sense naturally in English while preserving the explanatory force.
- source_word: ἐξῆλθον
  chosen: I came out
  alternatives:
  - I went out
  - I have come forth
  lexicon: BDAG
  rationale: Aorist of ἐξέρχομαι, literally 'went out/came out.' In this context,
    'came out' best fits English perspective and can naturally refer either to leaving
    the house/current place or, more broadly, to coming out for public ministry without
    over-interpreting.
- source_word: λέγει αὐτοῖς
  chosen: he said to them
  alternatives:
  - he says to them
  lexicon: BDAG
  rationale: Although the Greek uses the historical present ('says'), English narrative
    style commonly renders it as simple past. This is an optimal-equivalence smoothing
    rather than a change in meaning.
