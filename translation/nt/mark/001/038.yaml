theological_decisions:
- issue: Scope of ἐξῆλθον
  chosen_reading: Rendered generally as 'I came out' without specifying whether Jesus
    means leaving the house/current location or his broader mission.
  alternative_readings:
  - I went out (from the house/place of prayer)
  - I have come forth (for this mission/ministry)
  rationale: The Greek permits a local sense and may also carry a broader missional
    nuance in context. The translation preserves the ambiguity rather than resolving
    it into a more doctrinally loaded statement about origin or mission.
  doctrine_reference: Preserve theological tension rather than resolve it.
