id: MRK.1.44
reference: Mark 1:44
source:
  edition: SBLGNT
  text: καὶ λέγει αὐτῷ· Ὅρα μηδενὶ μηδὲν εἴπῃς, ἀλλὰ ὕπαγε σεαυτὸν δεῖξον τῷ ἱερεῖ
    καὶ προσένεγκε περὶ τοῦ καθαρισμοῦ σου ἃ προσέταξεν Μωϋσῆς εἰς μαρτύριον αὐτοῖς.
translation:
  text: And he says to him, “See that you say nothing to anyone; rather, go, show
    yourself to the priest, and offer for your cleansing what Moses commanded, as
    a testimony to them.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for a testimony to them'; the phrase may mean evidence presented to
      the priests or others, and some understand it more sharply as testimony against
      them.
    reason: alternative_reading
lexical_decisions:
- source_word: Ὅρα
  chosen: See that
  alternatives:
  - Take care
  - Beware
  - See
  lexicon: BDAG
  rationale: Imperative of warning/exhortation introducing the prohibition. 'See that'
    is idiomatic modern English that preserves the force better than a bare 'See'
    and is less harsh than 'Beware.'
- source_word: μηδενὶ μηδὲν εἴπῃς
  chosen: you say nothing to anyone
  alternatives:
  - tell no one anything
  - say nothing to anybody
  lexicon: BDAG
  rationale: The double μηδείς construction intensifies the prohibition comprehensively.
    'Say nothing to anyone' is natural English and preserves both the content ('nothing')
    and recipient ('to anyone').
- source_word: ἀλλὰ
  chosen: rather
  alternatives:
  - but
  - instead
  lexicon: BDAG
  rationale: Marks contrast between what the man must not do and what he must do.
    'Rather' captures the corrective force smoothly in English.
- source_word: ὕπαγε
  chosen: go
  alternatives:
  - be on your way
  - depart
  lexicon: BDAG
  rationale: Simple imperative of movement. 'Go' is the most direct and natural rendering.
- source_word: σεαυτὸν δεῖξον τῷ ἱερεῖ
  chosen: show yourself to the priest
  alternatives:
  - present yourself to the priest
  lexicon: BDAG
  rationale: Reflects the reflexive object and the priestly inspection required by
    Torah for a cleansed leper. 'Show yourself' is close to the Greek and clear in
    context.
- source_word: ἱερεῖ
  chosen: the priest
  alternatives:
  - a priest
  lexicon: BDAG
  rationale: The article likely points to the appropriate priestly authority for examination
    under the law, not merely any priest in abstraction. English idiom naturally uses
    'the priest' here.
- source_word: προσένεγκε
  chosen: offer
  alternatives:
  - bring
  - present
  lexicon: BDAG
  rationale: Cultic/sacrificial context favors 'offer' over the more generic 'bring,'
    especially with reference to Mosaic prescriptions for cleansing.
- source_word: περὶ τοῦ καθαρισμοῦ σου
  chosen: for your cleansing
  alternatives:
  - concerning your cleansing
  - for your purification
  lexicon: BDAG
  rationale: In sacrificial contexts περί with this noun can denote relation/purpose.
    'For your cleansing' is concise and fits the Levitical background. 'Purification'
    is possible but 'cleansing' better matches the healing context and the noun's
    semantic range.
- source_word: ἃ προσέταξεν Μωϋσῆς
  chosen: what Moses commanded
  alternatives:
  - the things Moses commanded
  lexicon: BDAG
  rationale: The neuter plural relative is naturally rendered as a collective singular
    in English. This preserves reference to the Mosaic prescriptions without awkwardness.
- source_word: εἰς μαρτύριον αὐτοῖς
  chosen: as a testimony to them
  alternatives:
  - for a testimony to them
  - as evidence to them
  lexicon: BDAG
  rationale: εἰς + accusative here expresses purpose/result. 'As a testimony to them'
    is idiomatic and preserves the evidentiary/witness sense of μαρτύριον without
    over-interpreting whether the testimony is positive or confrontational.
