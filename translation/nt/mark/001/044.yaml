theological_decisions:
- issue: Referent and force of 'as a testimony to them'
  chosen_reading: 'Kept intentionally broad: the prescribed offering and priestly
    verification function as testimony to the relevant observers, likely the priests
    and/or the community, without specifying whether the testimony is merely evidentiary
    or implicitly confrontational.'
  alternative_readings:
  - as proof to the priests
  - as a testimony against them
  rationale: The Greek phrase itself does not explicitly include 'against,' and the
    verse does not require a hostile nuance. Preserving the broader 'to them' maintains
    the textual ambiguity and avoids importing a sharper polemical sense than the
    wording demands.
  doctrine_reference: Preserve theological tension rather than resolve it.
