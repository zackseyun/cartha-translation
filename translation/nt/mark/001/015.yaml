theological_decisions:
- issue: Rendering of βασιλεία τοῦ θεοῦ
  chosen_reading: the kingdom of God
  alternative_readings:
  - the reign of God
  rationale: This preserves the familiar and textually broad expression without collapsing
    it into only dynamic rule or only spatial realm. It maintains theological tension
    inherent in the phrase.
  doctrine_reference: Translation philosophy §3, §5
- issue: Rendering of εὐαγγέλιον
  chosen_reading: good news
  alternative_readings:
  - gospel
  rationale: The source term means 'good news,' and the project prefers accessible
    modern English where tradition has become jargon-like. The traditional term is
    preserved in a footnote as a lexical alternative.
  doctrine_reference: Translation philosophy §1, §6
- issue: Force of μετανοεῖτε καὶ πιστεύετε
  chosen_reading: Repent and believe
  alternative_readings:
  - Keep repenting and believing
  rationale: The present imperatives can carry imperfective force, but in proclamation
    contexts English idiom normally uses simple imperatives. This avoids over-interpreting
    aspect while preserving the summons' urgency.
  doctrine_reference: Translation philosophy §1, §6
