id: MRK.1.15
reference: Mark 1:15
source:
  edition: SBLGNT
  text: καὶ λέγων ὅτι Πεπλήρωται ὁ καιρὸς καὶ ἤγγικεν ἡ βασιλεία τοῦ θεοῦ· μετανοεῖτε
    καὶ πιστεύετε ἐν τῷ εὐαγγελίῳ.
translation:
  text: and saying, “The time has been fulfilled, and the kingdom of God has drawn
    near. Repent and believe in the good news.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “the reign of God has drawn near.”
    reason: lexical_alternative
  - marker: b
    text: Or, “believe in the gospel.”
    reason: lexical_alternative
lexical_decisions:
- source_word: Πεπλήρωται
  chosen: has been fulfilled
  alternatives:
  - is fulfilled
  - has come to fulfillment
  lexicon: BDAG
  rationale: Perfect tense indicates a completed action with present result; 'has
    been fulfilled' preserves that aspect better than a simple present.
- source_word: καιρὸς
  chosen: time
  alternatives:
  - appointed time
  - season
  lexicon: BDAG
  rationale: καιρός here refers not to time in general but to the decisive or appointed
    moment. 'Time' is natural English; the eschatological nuance is carried by context
    rather than expanded paraphrase.
- source_word: ἤγγικεν
  chosen: has drawn near
  alternatives:
  - is near
  - has come near
  lexicon: BDAG
  rationale: The perfect tense again suggests present nearness resulting from arrival/approach.
    'Has drawn near' is a standard, transparent rendering that preserves the verbal
    aspect.
- source_word: βασιλεία τοῦ θεοῦ
  chosen: the kingdom of God
  alternatives:
  - the reign of God
  - the kingship of God
  lexicon: BDAG
  rationale: '''Kingdom of God'' is the established and accurate rendering. While
    ''reign'' can highlight dynamic rule, ''kingdom'' better preserves the breadth
    of the term and its canonical resonance without over-narrowing.'
- source_word: μετανοεῖτε
  chosen: Repent
  alternatives:
  - change your mind
  - turn back
  lexicon: BDAG
  rationale: The imperative calls for a decisive turning of mind and life. 'Repent'
    is concise, standard, and theologically weighty without being misleading here.
- source_word: πιστεύετε
  chosen: believe
  alternatives:
  - have faith
  - trust
  lexicon: BDAG
  rationale: The default rendering for πιστ- terms is 'faith'/'believe' unless context
    requires otherwise. 'Believe' fits the imperative form and avoids importing a
    narrower psychological sense than the Greek warrants.
- source_word: ἐν τῷ εὐαγγελίῳ
  chosen: in the good news
  alternatives:
  - in the gospel
  - the good news
  lexicon: BDAG
  rationale: εὐαγγέλιον literally means 'good news.' Given the translation philosophy's
    preference for readable modern English over inherited ecclesiastical jargon, 'good
    news' is preferred in the main text. The preposition ἐν after πιστεύω is naturally
    rendered 'believe in' here.
- source_word: λέγων
  chosen: and saying
  alternatives:
  - saying
  lexicon: BDAG
  rationale: The participle continues the narrative from the previous verse and is
    best represented with a coordinate English participial phrase.
