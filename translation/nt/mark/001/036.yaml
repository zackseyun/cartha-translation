id: MRK.1.36
reference: Mark 1:36
source:
  edition: SBLGNT
  text: καὶ ⸀κατεδίωξεν αὐτὸν ⸀Σίμων καὶ οἱ μετ’ αὐτοῦ,
translation:
  text: And Simon and those with him pursued him,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'searched for him.' The Greek verb can suggest energetic pursuit, which
      some translations express more idiomatically this way.
    reason: lexical_alternative
lexical_decisions:
- source_word: κατεδίωξεν
  chosen: pursued
  alternatives:
  - searched for
  - followed after
  - hunted for
  lexicon: BDAG
  rationale: καταδιώκω literally conveys pursuing or chasing after. 'Pursued' preserves
    the verb's stronger force better than the smoother but weaker 'searched for,'
    while still sounding natural in English narrative.
- source_word: αὐτὸν
  chosen: him
  lexicon: BDAG
  rationale: The pronoun refers back to Jesus in the immediate context and is straightforwardly
    rendered 'him.'
- source_word: Σίμων
  chosen: Simon
  rationale: Personal names are transliterated by standard English convention per
    project philosophy.
- source_word: οἱ μετ’ αὐτοῦ
  chosen: those with him
  alternatives:
  - his companions
  - those who were with him
  lexicon: BDAG
  rationale: The phrase is literally 'those with him.' 'Those with him' is clear,
    close to the Greek, and avoids adding interpretive specificity beyond the text.
- source_word: καὶ
  chosen: And
  alternatives:
  - Then
  lexicon: BDAG
  rationale: The conjunction simply links this verse to the preceding narrative. 'And'
    is the most direct rendering and preserves Mark's paratactic style.
