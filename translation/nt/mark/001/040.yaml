theological_decisions:
- issue: Nature of cleansing in leprosy context
  chosen_reading: make me clean
  alternative_readings:
  - cleanse me
  - heal me
  rationale: The text speaks of cleansing rather than using a standard healing verb. This preserves the overlap of physical restoration and restoration from ritual impurity without collapsing the meaning into only 'heal me.'
  doctrine_reference: Translation philosophy §1, §3, §6
revisions:
- timestamp: '2026-04-21T17:20:14Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/high_scrutiny/nt/mark/001/040.job-4992.json
  category: awkward_english
  tier: 1
  from: pleading with him and kneeling, and saying to him
  to: pleading with him, kneeling, and saying to him
  rationale: The current rendering of the three Greek participles (παρακαλῶν... καὶ γονυπετῶν λέγων...) as "pleading... and kneeling, and saying..." is stylistically awkward. The structure "(A and B), and C" creates a slightly jarring rhythm. Rewriting it as a standard English series "A, B, and C" improves the flow and naturalness of the sentence without altering the meaning. This better represents the sequence of actions for an English reader.
