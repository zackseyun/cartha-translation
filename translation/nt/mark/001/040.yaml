id: MRK.1.40
reference: Mark 1:40
source:
  edition: SBLGNT
  text: Καὶ ἔρχεται πρὸς αὐτὸν λεπρὸς παρακαλῶν αὐτὸν καὶ ⸀γονυπετῶν λέγων αὐτῷ ὅτι Ἐὰν θέλῃς δύνασαί με καθαρίσαι.
translation:
  text: And a man with leprosy comes to him, pleading with him, kneeling, and saying to him, “If you are willing, you are able to make me clean.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “a leper.”
    reason: lexical_alternative
  - marker: b
    text: Or “begging him.”
    reason: lexical_alternative
  - marker: c
    text: Or “cleanse me.” The Greek verb can refer to cleansing from impurity as well as physical restoration.
    reason: lexical_alternative
  - marker: d
    text: Or 'pleading with him and kneeling, and saying to him'.
    reason: previous_rendering
lexical_decisions:
- source_word: λεπρὸς
  chosen: a man with leprosy
  alternatives:
  - a leper
  - a leprous man
  lexicon: BDAG
  rationale: 'Rendered with person-first language for readable modern English while preserving the referent: a person afflicted with leprosy/skin disease. ''Leper'' is traditional but can sound dehumanizing in contemporary English. The Greek adjective used substantivally denotes a leprous person.'
- source_word: παρακαλῶν
  chosen: pleading with him
  alternatives:
  - begging him
  - imploring him
  - appealing to him
  lexicon: BDAG
  rationale: παρακαλέω has a broad range including urge, appeal to, exhort, entreat. In this healing context, 'pleading' best conveys earnest personal appeal without overstating desperation beyond the text.
- source_word: γονυπετῶν
  chosen: kneeling
  alternatives:
  - falling on his knees
  - kneeling before him
  lexicon: BDAG
  rationale: The participle denotes taking a kneeling posture. 'Kneeling' is concise and natural English. A fuller expression like 'falling on his knees' is possible, but the simple participle matches the Greek flow.
- source_word: Ἐὰν θέλῃς
  chosen: If you are willing
  alternatives:
  - If you will
  - If you want to
  lexicon: BDAG
  rationale: θέλω here expresses willingness rather than mere future action. 'If you are willing' is idiomatic modern English and preserves the conditional appeal.
- source_word: δύνασαί
  chosen: you are able
  alternatives:
  - you can
  lexicon: BDAG
  rationale: Rendered more explicitly than 'you can' to preserve the sense of ability/power in δύναμαι, while remaining natural English.
- source_word: καθαρίσαι
  chosen: make me clean
  alternatives:
  - cleanse me
  - purify me
  lexicon: BDAG
  rationale: In the context of leprosy, καθαρίζω carries ritual and physical cleansing connotations. 'Make me clean' preserves the directness of the Greek and keeps both dimensions available without importing a narrower purely ceremonial or purely hygienic sense.
- source_word: ἔρχεται
  chosen: comes
  alternatives:
  - came
  - is coming
  lexicon: BDAG
  rationale: The present tense is a historical present, common in Mark. 'Comes' preserves Mark's vivid narrative style better than smoothing to the English past tense.
