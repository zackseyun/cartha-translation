theological_decisions:
- issue: Textual variant at the participle describing Jesus' emotional state
  chosen_reading: Translate the printed SBLGNT reading ὀργισθείς as 'being angry'
    in the main text
  alternative_readings:
  - moved with compassion
  rationale: The translation follows the provided source text as primary. Because
    this variant materially affects the portrayal of Jesus' emotion and is well known
    in translation tradition, the alternative is preserved in a footnote rather than
    silently ignored. This preserves textual transparency without importing a harmonized
    or traditional reading into the main text.
  doctrine_reference: Translation philosophy §1 (Original-language primacy) and §3
    (Preserve theological tension rather than resolve it)
