id: MRK.1.41
reference: Mark 1:41
source:
  edition: SBLGNT
  text: ⸀καὶ ⸀ὀργισθεὶς ἐκτείνας τὴν χεῖρα ⸂αὐτοῦ ἥψατο⸃ καὶ λέγει αὐτῷ· Θέλω, καθαρίσθητι·
translation:
  text: And being angry, he stretched out his hand, touched him, and said to him,
    “I am willing; be cleansed.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Some manuscripts read “moved with compassion” instead of “being angry.”
    reason: textual_variant
lexical_decisions:
- source_word: ὀργισθεὶς
  chosen: being angry
  alternatives:
  - moved with compassion
  - indignant
  lexicon: BDAG
  rationale: The SBLGNT text reads ὀργισθείς, an aorist passive participle from ὀργίζομαι,
    whose plain sense is 'becoming angry' or 'being angry.' The main text should reflect
    the printed Greek rather than harmonize to the better-known variant 'moved with
    compassion.' 'Being angry' is more transparent than the more interpretive 'indignant,'
    though the latter is preserved as a lexical alternative nuance.
- source_word: ἐκτείνας τὴν χεῖρα
  chosen: he stretched out his hand
  alternatives:
  - stretching out his hand
  lexicon: BDAG
  rationale: This participial clause is naturally rendered in English as a finite
    verb in sequence with the main actions. 'Stretched out his hand' preserves the
    concrete bodily action and reads naturally.
- source_word: ἥψατο
  chosen: touched him
  alternatives:
  - took hold of him
  lexicon: BDAG
  rationale: Middle of ἅπτω in this construction commonly means 'touch' or 'take hold
    of.' In this healing context, 'touched him' is the standard and clearest rendering,
    preserving the significance of physical contact with the leper.
- source_word: λέγει αὐτῷ
  chosen: said to him
  alternatives:
  - says to him
  lexicon: BDAG
  rationale: Although λέγει is present tense (historical present), English narrative
    style commonly renders it as simple past for readability. This is an optimal-equivalence
    choice rather than a strictly formal one.
- source_word: Θέλω
  chosen: I am willing
  alternatives:
  - I will
  - I want to
  lexicon: BDAG
  rationale: In this context θέλω expresses willingness rather than mere futurity.
    'I am willing' best communicates Jesus' readiness to heal and matches the leper's
    implied request. 'I will' in modern English can sound merely future-oriented.
- source_word: καθαρίσθητι
  chosen: be cleansed
  alternatives:
  - be made clean
  - be purified
  lexicon: BDAG
  rationale: The passive imperative from καθαρίζω refers to cleansing from leprosy
    in both ritual and physical senses. 'Be cleansed' preserves that fuller sense
    better than the more idiomatic but slightly narrower 'be made clean.'
