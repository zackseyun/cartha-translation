theological_decisions:
- issue: Christological title in demonic recognition
  chosen_reading: the Holy One of God
  alternative_readings:
  - God's Holy One
  rationale: The phrase is rendered as a title of recognition without expanding it
    into a fuller doctrinal confession. This preserves the text's high christological
    force while avoiding imported theological explanation beyond the Greek.
  doctrine_reference: 'Affirmations; Translation philosophy #3'
