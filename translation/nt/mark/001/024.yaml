id: MRK.1.24
reference: Mark 1:24
source:
  edition: SBLGNT
  text: λέγων· ⸀Τί ἡμῖν καὶ σοί, Ἰησοῦ Ναζαρηνέ; ἦλθες ἀπολέσαι ἡμᾶς; οἶδά σε τίς
    εἶ, ὁ ἅγιος τοῦ θεοῦ.
translation:
  text: saying, “What do you have to do with us, Jesus the Nazarene? Have you come
    to destroy us? I know who you are—the Holy One of God.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “What have we to do with each other?” The Greek expression is an idiom
      of separation or hostility.
    reason: lexical_alternative
  - marker: b
    text: 'Or, “Jesus of Nazareth.” Greek: “Jesus the Nazarene.”'
    reason: lexical_alternative
lexical_decisions:
- source_word: Τί ἡμῖν καὶ σοί
  chosen: What do you have to do with us
  alternatives:
  - What have we to do with each other
  - What is there between us and you
  - What do we have in common with you
  lexicon: BDAG
  rationale: This idiomatic expression literally reads 'what to us and to you,' a
    Semitic-influenced Greek formula expressing dissociation or confrontation. 'What
    do you have to do with us' is natural modern English that preserves the adversarial
    force without over-paraphrasing.
- source_word: Ἰησοῦ Ναζαρηνέ
  chosen: Jesus the Nazarene
  alternatives:
  - Jesus of Nazareth
  - Jesus, Nazarene
  lexicon: BDAG
  rationale: Ἰησοῦ is transliterated as the personal name 'Jesus' per translation
    philosophy. Ναζαρηνέ is an adjectival/vocative title meaning 'Nazarene.' 'Jesus
    the Nazarene' closely reflects the Greek form better than the more interpretive
    geographic phrase 'Jesus of Nazareth,' though that sense is preserved as an alternative.
- source_word: ἦλθες
  chosen: Have you come
  alternatives:
  - Did you come
  - You came
  lexicon: BDAG
  rationale: The aorist in this direct question is well represented in English by
    the present perfect 'Have you come,' which idiomatically conveys arrival with
    present relevance.
- source_word: ἀπολέσαι
  chosen: to destroy
  alternatives:
  - to ruin
  - to wipe out
  lexicon: BDAG
  rationale: The infinitive from ἀπόλλυμι here denotes destruction or ruin. 'Destroy'
    is the most direct and idiomatic rendering in this exorcism context.
- source_word: ἡμᾶς
  chosen: us
  lexicon: BDAG
  rationale: Straightforward first person plural object. The plural is important because
    the speaker identifies with a plurality, likely the demon(s), and should be preserved.
- source_word: οἶδά σε τίς εἶ
  chosen: I know who you are
  alternatives:
  - I know you—who you are
  - I know what sort of person you are
  lexicon: BDAG
  rationale: This clause is a direct declaration of recognition. 'I know who you are'
    is the plain and natural English equivalent.
- source_word: ὁ ἅγιος τοῦ θεοῦ
  chosen: the Holy One of God
  alternatives:
  - God's Holy One
  - the holy one of God
  lexicon: BDAG
  rationale: The articular phrase functions as a title. Capitalizing 'Holy One' reflects
    its titular force in context, while 'of God' preserves the genitive relation without
    importing a more interpretive paraphrase.
