theological_decisions:
- issue: Rendering βαπτίζω in a context with denominational sensitivity
  chosen_reading: was baptized
  alternative_readings:
  - was immersed
  rationale: The verse reports the event without specifying mode in a way that requires
    an English rendering narrower than 'baptized.' This preserves ecclesial breadth
    while remaining faithful to the Greek narrative.
  doctrine_reference: Affirmations; Translation philosophy §1, §6
