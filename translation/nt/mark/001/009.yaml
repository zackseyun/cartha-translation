id: MRK.1.9
reference: Mark 1:9
source:
  edition: SBLGNT
  text: Καὶ ἐγένετο ἐν ἐκείναις ταῖς ἡμέραις ἦλθεν Ἰησοῦς ἀπὸ Ναζαρὲτ τῆς Γαλιλαίας
    καὶ ἐβαπτίσθη ⸂εἰς τὸν Ἰορδάνην ὑπὸ Ἰωάννου⸃.
translation:
  text: And it happened in those days that Jesus came from Nazareth of Galilee and
    was baptized in the Jordan by John.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "into the Jordan." The Greek preposition can be rendered more literally
      this way.
    reason: lexical_alternative
lexical_decisions:
- source_word: Καὶ ἐγένετο
  chosen: And it happened
  alternatives:
  - And it came to pass
  - Now it happened
  lexicon: BDAG
  rationale: Renders the common narrative transition idiom naturally in modern English
    while preserving its event-introducing force. 'Came to pass' is more traditional
    but archaic; 'it happened' is clearer and fits the project's readable-modern-English
    aim.
- source_word: ἐν ἐκείναις ταῖς ἡμέραις
  chosen: in those days
  alternatives:
  - during those days
  lexicon: BDAG
  rationale: A straightforward temporal phrase. 'In those days' preserves the narrative
    and slightly solemn register of the Greek without sounding archaic.
- source_word: ἦλθεν
  chosen: came
  alternatives:
  - arrived
  lexicon: BDAG
  rationale: The basic motion verb is best rendered 'came.' 'Arrived' is possible
    but adds a nuance of endpoint emphasis not explicit in the Greek.
- source_word: Ἰησοῦς
  chosen: Jesus
  rationale: Standard English transliteration of the personal name Ἰησοῦς, in keeping
    with the policy to transliterate names.
- source_word: ἀπὸ Ναζαρὲτ τῆς Γαλιλαίας
  chosen: from Nazareth of Galilee
  alternatives:
  - from Nazareth in Galilee
  lexicon: BDAG
  rationale: Both are viable. 'Of Galilee' more closely follows the genitive construction
    and preserves the place-identification formula common in the Gospels.
- source_word: ἐβαπτίσθη
  chosen: was baptized
  alternatives:
  - was immersed
  lexicon: BDAG
  rationale: The passive aorist is naturally rendered 'was baptized.' Although immersion
    may reflect the practice in some contexts, translating βαπτίζω here as 'immersed'
    would move from lexical meaning into denominationally freighted specificity beyond
    what the verse itself requires.
- source_word: εἰς τὸν Ἰορδάνην
  chosen: in the Jordan
  alternatives:
  - into the Jordan
  - in the Jordan River
  lexicon: BDAG
  rationale: While εἰς often means 'into,' in baptismal contexts English idiom commonly
    uses 'in' for location of the act. 'Into the Jordan' is more literal but can sound
    awkward in English and may overemphasize motion rather than the setting of the
    baptism. 'Jordan River' is interpretive expansion beyond the Greek, which simply
    says 'the Jordan.'
- source_word: ὑπὸ Ἰωάννου
  chosen: by John
  lexicon: BDAG
  rationale: ὑπό with the genitive marks personal agency in a passive construction;
    'by John' is the direct and natural rendering.
