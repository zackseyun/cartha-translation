theological_decisions:
- issue: Citation formula names Isaiah alone though the composite quotation includes
    material associated with Malachi as well as Isaiah.
  chosen_reading: Retain the text as 'in Isaiah the prophet' in the main text.
  alternative_readings:
  - in the prophets
  rationale: The SBLGNT reading is ἐν τῷ Ἠσαΐᾳ τῷ προφήτῃ. Translation should reflect
    the source text rather than harmonize the citation. Because some manuscripts read
    'in the prophets' and because readers may notice the composite source, the alternative
    is preserved in a footnote as a textual variant rather than resolved in translation.
  doctrine_reference: Translation philosophy §1 (original-language primacy) and §3
    (preserve tension rather than resolve it)
