theological_decisions:
- issue: Potential resonance of ἐγείρω with resurrection language
  chosen_reading: raised her up
  alternative_readings:
  - helped her up
  - lifted her up
  rationale: The verb can simply describe physical raising here, but retaining 'raised'
    preserves Mark's diction without importing explicit resurrection theology into
    the verse. The context is a healing, not a resurrection account.
  doctrine_reference: Preserve theological tension rather than resolve it.
