theological_decisions:
- issue: Whether πνεύματι ἁγίῳ refers to the divine person of the Holy Spirit or an
    impersonal holy power
  chosen_reading: the Holy Spirit
  alternative_readings:
  - a holy spirit
  - holy spirit
  rationale: In the Markan context of John's contrast between his water baptism and
    the stronger coming one's baptism, the phrase most naturally refers to the divine
    Holy Spirit rather than an indefinite holy power. This aligns with the Gospel's
    broader pneumatology without importing more than the text states.
  doctrine_reference: 'Affirmations; Translation philosophy #6'
- issue: How to render ἐν in the phrase ἐν πνεύματι ἁγίῳ
  chosen_reading: with the Holy Spirit
  alternative_readings:
  - in the Holy Spirit
  rationale: The Greek preposition permits either rendering. The main text uses 'with'
    for natural English and to preserve the parallel with 'with water,' while the
    alternative is preserved in a footnote to maintain the interpretive tension rather
    than over-resolve it.
  doctrine_reference: 'Translation philosophy #3'
