id: MRK.1.8
reference: Mark 1:8
source:
  edition: SBLGNT
  text: ⸀ἐγὼ ἐβάπτισα ⸀ὑμᾶς ὕδατι, αὐτὸς δὲ βαπτίσει ὑμᾶς ⸀ἐν πνεύματι ἁγίῳ.
translation:
  text: I baptized you with water, but he will baptize you with the Holy Spirit.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “in the Holy Spirit.” The Greek preposition can be rendered either way.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐγὼ
  chosen: I
  lexicon: BDAG
  rationale: Explicit pronoun retained in English to preserve the emphatic contrast
    with αὐτός later in the verse.
- source_word: ἐβάπτισα
  chosen: baptized
  alternatives:
  - immersed
  lexicon: BDAG
  rationale: Standard rendering of βαπτίζω in this Gospel context; 'immersed' is lexically
    possible but 'baptized' best preserves both the ritual and intertextual force
    without over-specifying mode.
- source_word: ὑμᾶς
  chosen: you
  lexicon: BDAG
  rationale: Direct object pronoun rendered straightforwardly; English does not mark
    plural here.
- source_word: ὕδατι
  chosen: with water
  alternatives:
  - in water
  lexicon: BDAG
  rationale: The dative/instrumental sense is naturally conveyed by 'with water' in
    English. 'In water' is possible, but 'with' better matches the contrast with the
    following phrase in readable modern English.
- source_word: αὐτὸς
  chosen: he
  alternatives:
  - he himself
  lexicon: BDAG
  rationale: Rendered as 'he' while preserving the contrastive force through the clause
    structure ('but he'). 'He himself' would be more explicit but less natural in
    English.
- source_word: δὲ
  chosen: but
  alternatives:
  - and
  - now
  lexicon: BDAG
  rationale: Here δέ marks a clear contrast between John's baptism and the coming
    one's baptism, so 'but' is the best English connector.
- source_word: βαπτίσει
  chosen: will baptize
  alternatives:
  - will immerse
  lexicon: BDAG
  rationale: Future tense preserved. 'Will baptize' maintains lexical continuity with
    ἐβάπτισα and avoids narrowing the meaning to mode alone.
- source_word: ἐν
  chosen: with
  alternatives:
  - in
  lexicon: BDAG
  rationale: In this construction, ἐν plus dative can be rendered 'with' or 'in.'
    'With the Holy Spirit' is the most idiomatic English and fits the parallel with
    'with water,' while preserving the sense of means/sphere. The alternative is worth
    preserving in a footnote because of interpretive significance.
- source_word: πνεύματι ἁγίῳ
  chosen: the Holy Spirit
  alternatives:
  - the Holy Ghost
  - holy spirit
  lexicon: BDAG
  rationale: Capitalized as a reference to the divine Holy Spirit in this prophetic
    and messianic context, consistent with historic Christian orthodoxy and standard
    NT usage. 'Holy Ghost' is archaic; lowercase 'holy spirit' would understate the
    likely personal referent here.
