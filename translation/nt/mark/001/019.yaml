id: MRK.1.19
reference: Mark 1:19
source:
  edition: SBLGNT
  text: καὶ ⸀προβὰς ὀλίγον εἶδεν Ἰάκωβον τὸν τοῦ Ζεβεδαίου καὶ Ἰωάννην τὸν ἀδελφὸν
    αὐτοῦ, καὶ αὐτοὺς ἐν τῷ πλοίῳ καταρτίζοντας τὰ δίκτυα,
translation:
  text: And going on a little farther, he saw James the son of Zebedee and John his
    brother, and they were in the boat mending the nets,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "repairing" or "preparing" the nets; the Greek verb can mean to put something
      in order or restore it to proper condition.
    reason: lexical_alternative
lexical_decisions:
- source_word: προβὰς ὀλίγον
  chosen: going on a little farther
  alternatives:
  - having gone on a little
  - after going on a little farther
  lexicon: BDAG
  rationale: The aorist participle with ὀλίγον is temporal/circumstantial, indicating
    movement onward for a short distance. 'Going on a little farther' is idiomatic
    modern English and preserves the sense of brief continued movement better than
    a more wooden 'having gone on a little.'
- source_word: εἶδεν
  chosen: he saw
  alternatives:
  - he saw there
  - he noticed
  lexicon: BDAG
  rationale: Simple narrative aorist of ὁράω. 'He saw' is the plain sense and avoids
    adding emphasis not present in the Greek.
- source_word: Ἰάκωβον τὸν τοῦ Ζεβεδαίου
  chosen: James the son of Zebedee
  alternatives:
  - James, the son of Zebedee
  lexicon: BDAG
  rationale: The article plus genitive construction identifies James by parentage.
    'The son of Zebedee' is the natural English equivalent.
- source_word: Ἰωάννην τὸν ἀδελφὸν αὐτοῦ
  chosen: John his brother
  alternatives:
  - John, his brother
  - John the brother of James
  lexicon: BDAG
  rationale: αὐτοῦ most naturally refers back to James in this coordination, so 'John
    his brother' is concise and clear.
- source_word: ἐν τῷ πλοίῳ
  chosen: in the boat
  alternatives:
  - in a boat
  lexicon: BDAG
  rationale: The article likely refers to the particular boat associated with them
    in the scene. 'In the boat' fits the narrative specificity better than the indefinite.
- source_word: καταρτίζοντας
  chosen: mending
  alternatives:
  - repairing
  - preparing
  - putting in order
  lexicon: BDAG
  rationale: καταρτίζω has a broad semantic range including restore, prepare, put
    in order. In the fishing context with nets, 'mending' is the most idiomatic and
    contextually precise English rendering.
- source_word: τὰ δίκτυα
  chosen: the nets
  alternatives:
  - their nets
  lexicon: BDAG
  rationale: δίκτυα refers to fishing nets. The Greek has the article, not an explicit
    possessive; 'the nets' is sufficiently natural and formally closer than 'their
    nets.'
- source_word: καὶ αὐτούς
  chosen: and they were
  alternatives:
  - and them
  - and he saw them
  lexicon: BDAG
  rationale: After εἶδεν, the accusative αὐτούς functions as the object of perception,
    with the participle describing what he saw them doing. English commonly recasts
    this as 'and they were ...' to avoid awkwardness while preserving the sense.
