id: MRK.1.28
reference: Mark 1:28
source:
  edition: SBLGNT
  text: ⸂καὶ ἐξῆλθεν⸃ ἡ ἀκοὴ αὐτοῦ εὐθὺς ⸀πανταχοῦ εἰς ὅλην τὴν περίχωρον τῆς Γαλιλαίας.
translation:
  text: And the news about him went out at once everywhere throughout the whole surrounding region of Galilee.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the report about him' or 'his fame.'
    reason: lexical_alternative
  - marker: b
    text: Or 'everywhere into the whole surrounding region'.
    reason: previous_rendering
lexical_decisions:
- source_word: ἐξῆλθεν
  chosen: went out
  alternatives:
  - spread
  - went forth
  lexicon: BDAG
  rationale: Aorist of ἐξέρχομαι is naturally rendered 'went out.' In context it describes the outward movement of report/news. 'Spread' is idiomatic English but slightly more interpretive; 'went out' preserves the verbal image while remaining readable.
- source_word: ἀκοὴ
  chosen: news
  alternatives:
  - report
  - hearing
  - fame
  lexicon: BDAG
  rationale: ἀκοή can denote what is heard, i.e., 'report' or 'news.' Here it refers to what people were hearing about Jesus after the exorcism. 'News' is natural modern English; 'fame' is too interpretive and focuses on reputation rather than the circulating report.
- source_word: αὐτοῦ
  chosen: about him
  alternatives:
  - of him
  - concerning him
  lexicon: BDAG
  rationale: The genitive with ἀκοή is best expressed idiomatically in English as 'about him' or 'concerning him,' indicating the content of the report rather than possession.
- source_word: εὐθὺς
  chosen: at once
  alternatives:
  - immediately
  - right away
  lexicon: BDAG
  rationale: Mark frequently uses εὐθύς. 'At once' preserves the immediacy in clear modern English without sounding repetitive or wooden.
- source_word: πανταχοῦ
  chosen: everywhere
  alternatives:
  - in every place
  - all around
  lexicon: BDAG
  rationale: πανταχοῦ is an adverb meaning 'everywhere.' This straightforward rendering fits the syntax and emphasizes the breadth of dissemination.
- source_word: περίχωρον
  chosen: surrounding region
  alternatives:
  - district
  - countryside
  - region around
  lexicon: BDAG
  rationale: περίχωρος refers to the surrounding area or district. 'Surrounding region' is a natural equivalent that preserves the geographic sense without over-specifying rural connotations.
- source_word: εἰς ὅλην τὴν περίχωρον τῆς Γαλιλαίας
  chosen: into the whole surrounding region of Galilee
  alternatives:
  - throughout the whole region around Galilee
  - into all the surrounding district of Galilee
  lexicon: BDAG
  rationale: The phrase combines movement/result ('into') with comprehensive scope ('whole'). 'Of Galilee' is taken as a genitive specifying the region belonging to/around Galilee, not a region outside it. The rendering keeps the Greek structure while reading naturally.
