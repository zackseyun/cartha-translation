id: MRK.1.27
reference: Mark 1:27
source:
  edition: SBLGNT
  text: καὶ ἐθαμβήθησαν ⸀ἅπαντες, ὥστε συζητεῖν ⸂πρὸς ἑαυτοὺς⸃ λέγοντας· Τί ἐστιν
    τοῦτο; ⸂διδαχὴ καινή⸃· κατ’ ἐξουσίαν καὶ τοῖς πνεύμασι τοῖς ἀκαθάρτοις ἐπιτάσσει,
    καὶ ὑπακούουσιν αὐτῷ.
translation:
  text: And they were all amazed, so that they began discussing it among themselves,
    saying, “What is this? A new teaching—with authority! He even commands the unclean
    spirits, and they obey him.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'What is this? What is this new teaching with authority?' The Greek
      can be punctuated so that 'new teaching' is taken more directly with the question.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐθαμβήθησαν
  chosen: were amazed
  alternatives:
  - were astonished
  - were utterly amazed
  lexicon: BDAG
  rationale: The passive form conveys being struck with amazement. 'Were amazed' is
    natural modern English and preserves the reaction without over-intensifying beyond
    the context.
- source_word: ἅπαντες
  chosen: all
  alternatives:
  - everyone
  - all of them
  lexicon: BDAG
  rationale: ἅπαντες emphasizes the totality of the crowd's reaction. 'All' is concise
    and idiomatic with 'they were all amazed.'
- source_word: ὥστε συζητεῖν
  chosen: so that they began discussing it
  alternatives:
  - so that they discussed
  - with the result that they debated
  lexicon: BDAG
  rationale: ὥστε with the infinitive expresses result. συζητέω can mean discuss,
    debate, or reason together. 'Began discussing it' captures the emergent collective
    reaction in readable English without making the exchange sound hostile.
- source_word: πρὸς ἑαυτούς
  chosen: among themselves
  alternatives:
  - with one another
  - to one another
  lexicon: BDAG
  rationale: The phrase indicates mutual conversation within the group. 'Among themselves'
    is idiomatic and fits the scene.
- source_word: Τί ἐστιν τοῦτο;
  chosen: What is this?
  alternatives:
  - What is this thing?
  - What does this mean?
  lexicon: BDAG
  rationale: A direct, startled question is most natural here. 'What does this mean?'
    interprets beyond the wording, while 'What is this?' preserves the Greek more
    closely.
- source_word: διδαχὴ καινή
  chosen: A new teaching
  alternatives:
  - What is this new teaching?
  - A new doctrine
  lexicon: BDAG
  rationale: διδαχή is best rendered 'teaching' in contemporary English; 'doctrine'
    sounds more technical than the scene requires. The anarthrous phrase works well
    as an exclamatory fragment after the question.
- source_word: κατ’ ἐξουσίαν
  chosen: with authority
  alternatives:
  - according to authority
  - authoritatively
  lexicon: BDAG
  rationale: This phrase describes the manner or quality of the teaching/command.
    'With authority' is the standard and clearest English rendering, preserving the
    emphasis on Jesus' inherent commanding authority.
- source_word: τοῖς πνεύμασι τοῖς ἀκαθάρτοις
  chosen: the unclean spirits
  alternatives:
  - unclean spirits
  - impure spirits
  lexicon: BDAG
  rationale: The article is not required in English in every instance, but 'the unclean
    spirits' fits the specific class in view. 'Unclean' preserves the ritual/moral
    force of ἀκάθαρτος better than the softer 'impure.'
- source_word: ἐπιτάσσει
  chosen: he commands
  alternatives:
  - he orders
  - he gives orders to
  lexicon: BDAG
  rationale: ἐπιτάσσω denotes authoritative command. 'Commands' is direct and matches
    the authority theme of the verse.
- source_word: ὑπακούουσιν αὐτῷ
  chosen: they obey him
  alternatives:
  - they listen to him
  - they submit to him
  lexicon: BDAG
  rationale: ὑπακούω here means obedient response to command. 'They obey him' is the
    clearest and strongest fit in context.
