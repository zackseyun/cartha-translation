theological_decisions:
- issue: Relation of 'with authority' to the sentence structure
  chosen_reading: Render 'A new teaching—with authority!' as an exclamatory assessment
    that highlights both the novelty of the teaching and the authoritative manner
    in which Jesus speaks and acts.
  alternative_readings:
  - 'Render as a question: ''What is this? A new teaching with authority?'''
  - 'Attach the phrase primarily to the following verb: ''He commands even the unclean
    spirits with authority'''
  rationale: The Greek punctuation tradition and syntax allow some flexibility. The
    chosen rendering preserves the crowd's astonishment and keeps the authority theme
    connected to both Jesus' teaching and his command over spirits, without over-resolving
    the ambiguity.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
