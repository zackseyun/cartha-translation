id: MRK.9.7
reference: Mark 9:7
source:
  edition: SBLGNT
  text: καὶ ἐγένετο νεφέλη ἐπισκιάζουσα αὐτοῖς, καὶ ⸀ἐγένετο φωνὴ ἐκ τῆς νεφέλης·
    Οὗτός ἐστιν ὁ υἱός μου ὁ ἀγαπητός, ⸂ἀκούετε αὐτοῦ⸃.
translation:
  text: 'And a cloud came, overshadowing them, and a voice came out of the cloud:
    “This is my beloved Son; listen to him.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'hear him.' The command carries the sense of attentive heed, not merely
      auditory perception.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγένετο
  chosen: came
  alternatives:
  - appeared
  - formed
  - came about
  lexicon: BDAG
  rationale: With νεφέλη and later φωνή as subjects, γίνομαι here functions idiomatically
    to mark sudden occurrence or arrival. 'Came' is natural English and preserves
    the eventive force better than the wooden 'there was' while avoiding over-interpretive
    wording.
- source_word: νεφέλη
  chosen: cloud
  lexicon: BDAG
  rationale: Standard lexical sense. In context it evokes divine presence, but the
    noun itself should be translated straightforwardly as 'cloud' rather than expanded
    interpretively.
- source_word: ἐπισκιάζουσα
  chosen: overshadowing
  alternatives:
  - covering
  - enveloping
  lexicon: BDAG
  rationale: The participle denotes casting a shadow over or enveloping. 'Overshadowing'
    preserves the verbal imagery and intertextual resonance with divine-presence scenes
    without paraphrase.
- source_word: αὐτοῖς
  chosen: them
  alternatives:
  - over them
  lexicon: BDAG
  rationale: The dative with ἐπισκιάζω can be represented naturally in English as
    the object 'them.' The sense 'over them' is implicit in 'overshadowing them' and
    need not be separately expressed.
- source_word: φωνή
  chosen: a voice
  alternatives:
  - a sound
  - a voice spoke
  lexicon: BDAG
  rationale: φωνή here clearly refers to an articulate heavenly utterance, so 'voice'
    is preferable to the broader 'sound.' The verb of speaking is not explicit and
    should not be imported into the noun.
- source_word: ἐκ τῆς νεφέλης
  chosen: out of the cloud
  alternatives:
  - from the cloud
  lexicon: BDAG
  rationale: '''Out of'' gives the concrete spatial force of ἐκ and reads naturally
    in English.'
- source_word: ὁ υἱός μου
  chosen: my Son
  lexicon: BDAG
  rationale: Direct and standard rendering. Capitalizing 'Son' reflects that the referent
    is Jesus in a divine declaration, not a lexical distinction in Greek.
- source_word: ὁ ἀγαπητός
  chosen: beloved
  alternatives:
  - dearly loved
  - the beloved one
  lexicon: BDAG
  rationale: '''Beloved'' is concise, natural, and preserves the covenantal and filial
    weight of ἀγαπητός better than more paraphrastic alternatives.'
- source_word: ἀκούετε αὐτοῦ
  chosen: listen to him
  alternatives:
  - hear him
  - obey him
  lexicon: BDAG
  rationale: The present imperative calls for attentive heed. 'Listen to him' is idiomatic
    modern English and preserves both auditory and responsive force without narrowing
    it to mere obedience or flattening it to simple hearing.
