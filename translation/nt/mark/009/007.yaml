theological_decisions:
- issue: Divine declaration of Jesus' identity
  chosen_reading: 'This is rendered as a direct heavenly affirmation: ''This is my
    beloved Son.'''
  rationale: The Greek unambiguously presents Jesus as God's Son in a revelatory declaration.
    The translation preserves the christological force without adding doctrinal explanation
    beyond the text itself.
  doctrine_reference: 'Affirmations; Translation philosophy #1 and #3'
- issue: Force of ἀκούετε αὐτοῦ
  chosen_reading: Rendered 'listen to him' rather than 'hear him' or 'obey him.'
  alternative_readings:
  - hear him
  - obey him
  rationale: The command includes hearing with heed, but the text does not explicitly
    use a verb meaning 'obey.' 'Listen to him' preserves the imperative's force while
    avoiding interpretive overstatement.
  doctrine_reference: 'Translation philosophy #3 and #6'
