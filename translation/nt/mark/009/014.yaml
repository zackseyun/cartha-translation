id: MRK.9.14
reference: Mark 9:14
source:
  edition: SBLGNT
  text: Καὶ ⸂ἐλθόντες πρὸς τοὺς μαθητὰς εἶδον⸃ ὄχλον πολὺν περὶ αὐτοὺς καὶ γραμματεῖς
    συζητοῦντας ⸂πρὸς αὐτούς⸃.
translation:
  text: And when they came to the disciples, they saw a large crowd around them, and
    scribes arguing with them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'disputing with them.' The Greek verb can denote discussion or debate,
      but in this context it likely implies argument.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐλθόντες
  chosen: when they came
  alternatives:
  - having come
  - after coming
  lexicon: BDAG
  rationale: Aorist participle of ἔρχομαι, coordinated with the main verb εἶδον. English
    idiom is smoother with a temporal clause ('when they came') rather than the more
    wooden 'having come,' while preserving the sequence of action.
- source_word: πρὸς τοὺς μαθητάς
  chosen: to the disciples
  alternatives:
  - toward the disciples
  - up to the disciples
  lexicon: BDAG
  rationale: πρός with the accusative here marks movement toward persons. 'To the
    disciples' is the most natural English rendering in narrative context.
- source_word: εἶδον
  chosen: they saw
  alternatives:
  - they looked and saw
  lexicon: BDAG
  rationale: 'Simple aorist of ὁράω in narrative: ''they saw.'' No need to expand
    beyond the plain sense.'
- source_word: ὄχλον πολύν
  chosen: a large crowd
  alternatives:
  - a great crowd
  - a big crowd
  lexicon: BDAG
  rationale: ὄχλος is 'crowd' and πολύς intensifies size. 'Large crowd' is clear modern
    English; 'great crowd' is possible but can sound archaic or qualitative rather
    than quantitative.
- source_word: περὶ αὐτούς
  chosen: around them
  alternatives:
  - surrounding them
  - about them
  lexicon: BDAG
  rationale: περί with the accusative here is spatial, indicating the crowd's position
    around the disciples. 'Around them' is the most direct rendering.
- source_word: γραμματεῖς
  chosen: scribes
  alternatives:
  - teachers of the law
  lexicon: BDAG
  rationale: γραμματεῖς is the standard Gospel term for Jewish legal experts/scribes.
    'Scribes' preserves the lexical identity of the group; a cultural explanation
    can be supplied elsewhere if needed.
- source_word: συζητοῦντας
  chosen: arguing
  alternatives:
  - disputing
  - discussing
  - debating
  lexicon: BDAG
  rationale: In this conflict setting, συζητέω likely carries a disputational sense
    rather than neutral discussion. 'Arguing' best fits the narrative tension and
    the immediate context of controversy.
- source_word: πρὸς αὐτούς
  chosen: with them
  alternatives:
  - against them
  - with the disciples
  lexicon: BDAG
  rationale: πρός with persons after συζητέω can indicate engagement directed toward
    them. 'With them' is the most idiomatic English for an argument. The antecedent
    of αὐτούς is the disciples, not the crowd, given the immediately preceding reference
    and narrative flow.
