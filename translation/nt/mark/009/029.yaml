theological_decisions:
- issue: Whether to include 'and fasting'
  chosen_reading: prayer
  alternative_readings:
  - prayer and fasting
  rationale: The SBLGNT text reads only προσευχῇ ('prayer'). A longer reading adding
    'and fasting' appears in later manuscript tradition and is well known from the
    Textus Receptus/KJV tradition. Following the provided Greek text and original-language
    primacy, the main text includes only 'prayer,' while the longer traditional reading
    is preserved in a footnote as a textual variant.
  doctrine_reference: Translation philosophy §1 (Original-language primacy over translation
    tradition) and §3 (Preserve theological tension rather than resolve it)
