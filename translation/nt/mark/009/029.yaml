id: MRK.9.29
reference: Mark 9:29
source:
  edition: SBLGNT
  text: καὶ εἶπεν αὐτοῖς· Τοῦτο τὸ γένος ἐν οὐδενὶ δύναται ἐξελθεῖν εἰ μὴ ἐν ⸀προσευχῇ.
translation:
  text: And he said to them, “This kind cannot come out by anything except prayer.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Some later manuscripts read, “prayer and fasting.”
    reason: textual_variant
lexical_decisions:
- source_word: Τοῦτο τὸ γένος
  chosen: This kind
  alternatives:
  - This kind of spirit
  - This sort
  lexicon: BDAG
  rationale: γένος here refers to a class or kind. The immediate context is an unclean
    spirit/demon, but the Greek does not explicitly repeat 'spirit,' so 'This kind'
    preserves the concise wording without adding an explicit noun not present in the
    text.
- source_word: ἐν οὐδενὶ
  chosen: by anything
  alternatives:
  - by no means
  - in no way
  - by nothing
  lexicon: BDAG
  rationale: 'The preposition ἐν with οὐδενί is idiomatic here, expressing means or
    instrument: ''by anything'' or ''by any means.'' ''By anything'' fits natural
    English while preserving the sense that no other means is effective.'
- source_word: δύναται ἐξελθεῖν
  chosen: cannot come out
  alternatives:
  - is not able to come out
  - cannot go out
  lexicon: BDAG
  rationale: The middle/passive-form δύναται with infinitive ἐξελθεῖν expresses inability.
    'Come out' is idiomatic in English for expulsion of a demon and matches the narrative
    context better than the more wooden 'go out.'
- source_word: εἰ μὴ
  chosen: except
  alternatives:
  - unless
  lexicon: BDAG
  rationale: 'εἰ μὴ introduces the sole exception. ''Except'' works smoothly with
    the preceding negative construction in English: ''cannot come out by anything
    except…''.'
- source_word: ἐν προσευχῇ
  chosen: prayer
  alternatives:
  - by prayer
  - through prayer
  lexicon: BDAG
  rationale: 'The phrase denotes means: the expulsion is possible only in connection
    with prayer. English idiom can omit the repeated preposition after ''except,''
    yielding ''except prayer,'' but ''except prayer'' sounds abrupt; ''except prayer''
    also risks awkwardness. Rendering the whole clause as ''by anything except prayer''
    preserves the instrumental sense naturally.'
