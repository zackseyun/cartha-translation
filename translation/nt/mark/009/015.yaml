id: MRK.9.15
reference: Mark 9:15
source:
  edition: SBLGNT
  text: καὶ ⸀εὐθὺς πᾶς ὁ ὄχλος ⸂ἰδόντες αὐτὸν ἐξεθαμβήθησαν⸃, καὶ προστρέχοντες ἠσπάζοντο
    αὐτόν.
translation:
  text: And immediately, when the whole crowd saw him, they were greatly amazed, and
    running up to him, they greeted him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they were astonished' or 'they were alarmed.' The Greek verb can express
      intense amazement, astonishment, or alarm depending on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: εὐθὺς
  chosen: immediately
  alternatives:
  - at once
  - right away
  lexicon: BDAG
  rationale: In Mark, εὐθύς is a frequent discourse marker conveying immediacy. 'Immediately'
    preserves that Markan urgency in standard English.
- source_word: πᾶς ὁ ὄχλος
  chosen: the whole crowd
  alternatives:
  - all the crowd
  - the entire crowd
  lexicon: BDAG
  rationale: The singular collective noun with πᾶς is best rendered as a collective
    whole. 'The whole crowd' is natural English and preserves the comprehensiveness.
- source_word: ἰδόντες αὐτόν
  chosen: when ... saw him
  alternatives:
  - seeing him
  - after seeing him
  lexicon: BDAG
  rationale: The aorist participle is most naturally temporal here, indicating the
    circumstance that triggered the main action. 'When ... saw him' reads clearly
    in English while preserving the participial relationship.
- source_word: ἐξεθαμβήθησαν
  chosen: were greatly amazed
  alternatives:
  - were astonished
  - were utterly amazed
  - were alarmed
  lexicon: BDAG
  rationale: ἐκθαμβέομαι can denote strong astonishment, even alarm or awe depending
    on context. Here the crowd's subsequent running and greeting suggests startled
    amazement rather than fear alone. 'Were greatly amazed' captures the intensity
    without over-specifying the cause.
- source_word: προστρέχοντες
  chosen: running up to him
  alternatives:
  - running to him
  - hurrying toward him
  lexicon: BDAG
  rationale: The participle indicates eager movement toward Jesus. 'Running up to
    him' is vivid, idiomatic, and fits the narrative sequence.
- source_word: ἠσπάζοντο αὐτόν
  chosen: they greeted him
  alternatives:
  - they welcomed him
  - they saluted him
  lexicon: BDAG
  rationale: ἀσπάζομαι commonly means to greet or welcome. 'Greeted him' is the most
    neutral and broadly accurate rendering in this narrative context.
