theological_decisions:
- issue: Nuance of the crowd's reaction to Jesus in ἐξεθαμβήθησαν
  chosen_reading: A strong amazement/awe response rather than explicitly fear or a
    supernatural radiance explanation
  alternative_readings:
  - they were alarmed
  - they were astonished because of a radiant appearance reminiscent of Moses
  rationale: The verse itself states only that the crowd, upon seeing Jesus, reacted
    intensely and then ran to greet him. The translation preserves the emotional intensity
    without importing a speculative explanation not stated in the text. This follows
    the principle of not importing doctrinal or interpretive claims beyond the source
    text.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Never import doctrinal claims the text does not make.'
