theological_decisions:
- issue: Rendering of γέεννα in a judgment context
  chosen_reading: Gehenna
  alternative_readings:
  - hell
  rationale: The verse uses the specific term γέεννα rather than a generic term for
    the underworld or final punishment. Rendering it 'Gehenna' avoids collapsing distinct
    biblical judgment vocabulary into later generalized English categories. Because
    many readers expect 'hell,' that alternative is preserved in a footnote rather
    than adopted in the main text.
  doctrine_reference: Translation philosophy §1 (Original-language primacy over translation
    tradition); §6 (Readable modern English, not archaic or academic)
