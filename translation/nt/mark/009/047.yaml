id: MRK.9.47
reference: Mark 9:47
source:
  edition: SBLGNT
  text: καὶ ἐὰν ὁ ὀφθαλμός σου σκανδαλίζῃ σε, ἔκβαλε αὐτόν· καλόν ⸀σέ ἐστιν μονόφθαλμον
    εἰσελθεῖν εἰς τὴν βασιλείαν τοῦ θεοῦ ἢ δύο ὀφθαλμοὺς ἔχοντα βληθῆναι εἰς ⸀τὴν
    ⸀γέενναν,
translation:
  text: And if your eye causes you to stumble, throw it out. It is better for you
    to enter the kingdom of God with one eye than, having two eyes, to be thrown into
    Gehenna,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'hell.' The Greek reads 'Gehenna,' a term rooted in the Valley of Hinnom
      and used for eschatological judgment.
    reason: alternative_reading
lexical_decisions:
- source_word: σκανδαλίζῃ
  chosen: causes you to stumble
  alternatives:
  - causes you to sin
  - offends you
  - trips you up
  lexicon: BDAG
  rationale: The verb σκανδαλίζω literally carries the sense of causing someone to
    stumble or fall into offense/sin. 'Causes you to stumble' preserves the metaphor
    present in the Greek and avoids over-interpreting it as only moral transgression,
    while still fitting the warning context.
- source_word: ἔκβαλε
  chosen: throw it out
  alternatives:
  - cast it out
  - tear it out
  - pluck it out
  lexicon: BDAG
  rationale: ἐκβάλλω commonly means 'throw out' or 'cast out.' 'Throw it out' is vivid,
    natural modern English, and closely reflects the force of the imperative without
    importing the more specific 'pluck' or 'tear,' which are interpretive expansions
    not explicit in the verb itself.
- source_word: καλόν
  chosen: better
  alternatives:
  - good
  - advantageous
  lexicon: BDAG
  rationale: Although καλόν is literally 'good,' in this comparative construction
    ('good for you ... than ...') idiomatic English is 'better for you.' This preserves
    the comparative force of the saying.
- source_word: μονόφθαλμον
  chosen: with one eye
  alternatives:
  - one-eyed
  lexicon: BDAG
  rationale: μονόφθαλμος means 'one-eyed.' Rendering it as 'with one eye' is more
    natural in contemporary English in this sentence while preserving the concrete
    image.
- source_word: βασιλείαν τοῦ θεοῦ
  chosen: the kingdom of God
  alternatives:
  - God's kingdom
  lexicon: BDAG
  rationale: This is the standard and transparent rendering of the phrase, preserving
    both its theological weight and its familiar NT usage.
- source_word: βληθῆναι
  chosen: to be thrown
  alternatives:
  - to be cast
  lexicon: BDAG
  rationale: The passive infinitive of βάλλω is straightforwardly 'to be thrown.'
    This matches the force of the Greek and keeps verbal consistency with ἔκβαλε while
    remaining idiomatic.
- source_word: γέενναν
  chosen: Gehenna
  alternatives:
  - hell
  lexicon: BDAG
  rationale: The Greek term γέεννα refers specifically to Gehenna, drawing on the
    Valley of Hinnom imagery and Jewish eschatological judgment language. Per original-language
    primacy, transliterating as 'Gehenna' preserves the historical and theological
    specificity better than the more generalized 'hell.' A footnote preserves the
    common English alternative.
