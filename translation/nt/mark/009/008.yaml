theological_decisions:
- issue: Narrative emphasis after the transfiguration
  chosen_reading: The verse is rendered to emphasize that Moses and Elijah were no
    longer visible and that Jesus alone remained with the disciples, without importing
    additional theological interpretation into the translation itself.
  alternative_readings:
  - A more interpretive rendering could foreground the theological significance of
    Jesus' supremacy over the other figures.
  rationale: The Greek states the visual fact plainly. The translation preserves that
    fact and its exclusivity ('except Jesus alone with them') without expanding it
    into commentary.
  doctrine_reference: Preserve theological tension rather than resolve it.
