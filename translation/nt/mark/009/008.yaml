id: MRK.9.8
reference: Mark 9:8
source:
  edition: SBLGNT
  text: καὶ ἐξάπινα περιβλεψάμενοι οὐκέτι οὐδένα εἶδον ⸂ἀλλὰ τὸν Ἰησοῦν μόνον μεθ’
    ἑαυτῶν⸃.
translation:
  text: And suddenly, looking around, they no longer saw anyone except Jesus alone
    with them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'but only Jesus with them.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξάπινα
  chosen: suddenly
  alternatives:
  - all at once
  - immediately
  lexicon: BDAG
  rationale: Adverb indicating abruptness. 'Suddenly' is natural modern English and
    preserves the sense of an unexpected, immediate change in the scene.
- source_word: περιβλεψάμενοι
  chosen: looking around
  alternatives:
  - glancing around
  - looking about
  lexicon: BDAG
  rationale: Aorist middle participle from περιβλέπομαι, describing the disciples'
    action of surveying their surroundings. 'Looking around' is idiomatic and sufficiently
    literal.
- source_word: οὐκέτι
  chosen: no longer
  alternatives:
  - not anymore
  lexicon: BDAG
  rationale: Marks cessation from a prior state. 'No longer' is the most standard
    and clear rendering in narrative English.
- source_word: οὐδένα
  chosen: anyone
  alternatives:
  - no one
  - nobody
  lexicon: BDAG
  rationale: Indefinite negative object after εἶδον. 'Anyone' works smoothly with
    'no longer saw' in English.
- source_word: εἶδον
  chosen: saw
  alternatives:
  - caught sight of
  lexicon: BDAG
  rationale: Simple narrative aorist of ὁράω. 'Saw' is the straightforward rendering.
- source_word: ἀλλὰ
  chosen: except
  alternatives:
  - but
  - but only
  lexicon: BDAG
  rationale: Here ἀλλά functions adversatively with an exceptive force after a negated
    clause. 'Except' best captures the sense in idiomatic English.
- source_word: μόνον
  chosen: alone
  alternatives:
  - only
  lexicon: BDAG
  rationale: Placed with τὸν Ἰησοῦν to emphasize that Jesus was the sole person visible.
    'Alone' avoids awkward repetition if 'except' is already used, while preserving
    exclusivity.
- source_word: μεθ’ ἑαυτῶν
  chosen: with them
  alternatives:
  - by themselves with Jesus
  - in their company
  lexicon: BDAG
  rationale: μετά with the reflexive pronoun here means Jesus remained with the disciples
    themselves. 'With them' is the clearest idiomatic rendering; the reflexive nuance
    is implicit in context.
- source_word: τὸν Ἰησοῦν
  chosen: Jesus
  lexicon: BDAG
  rationale: Personal name is transliterated per project philosophy.
