id: MRK.9.45
reference: Mark 9:45
source:
  edition: SBLGNT
  text: καὶ ἐὰν ὁ πούς σου σκανδαλίζῃ σε, ἀπόκοψον αὐτόν· καλόν ἐστίν ⸀σε εἰσελθεῖν
    εἰς τὴν ζωὴν χωλὸν ἢ τοὺς δύο πόδας ἔχοντα βληθῆναι εἰς τὴν ⸀γέενναν.
translation:
  text: And if your foot causes you to stumble, cut it off. It is better for you to
    enter into life lame than, having both feet, to be thrown into Gehenna.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or: “hell.” The Greek term is Gehenna, evoking the Valley of Hinnom and
      its associations with divine judgment.'
    reason: alternative_reading
lexical_decisions:
- source_word: σκανδαλίζῃ
  chosen: causes you to stumble
  alternatives:
  - causes you to sin
  - makes you fall away
  lexicon: BDAG
  rationale: The verb literally carries the sense of causing offense, stumbling, or
    falling into sin. 'Causes you to stumble' preserves the metaphor present in the
    Greek while remaining intelligible in modern English. 'Causes you to sin' is interpretive
    and common in English tradition, but it narrows the image more than the source
    requires.
- source_word: ἀπόκοψον
  chosen: cut it off
  alternatives:
  - cut it away
  - remove it
  lexicon: BDAG
  rationale: The aorist imperative is forceful and concrete. 'Cut it off' best reflects
    the vivid, hyperbolic command without softening it.
- source_word: καλόν ἐστίν
  chosen: It is better
  alternatives:
  - It is good
  - It is preferable
  lexicon: BDAG
  rationale: In this comparative construction with ἢ, καλόν functions idiomatically
    as 'better' rather than the more wooden 'good.' This yields natural English and
    matches the sense of the comparison.
- source_word: εἰσελθεῖν εἰς τὴν ζωὴν
  chosen: to enter into life
  alternatives:
  - to enter life
  lexicon: BDAG
  rationale: The phrase is a known idiom for entering eschatological life. 'Enter
    into life' preserves the metaphor and solemnity. 'Life' is retained rather than
    expanded to 'eternal life,' since the Greek here simply says ζωή.
- source_word: χωλὸν
  chosen: lame
  alternatives:
  - crippled
  - maimed
  lexicon: BDAG
  rationale: χωλός specifically denotes lameness, especially in relation to walking.
    Since the body part in view is the foot, 'lame' is the most precise and least
    overgeneralized rendering.
- source_word: βληθῆναι
  chosen: to be thrown
  alternatives:
  - to be cast
  lexicon: BDAG
  rationale: The passive infinitive of βάλλω is straightforwardly 'to be thrown.'
    'Cast' is traditional but less natural in contemporary English.
- source_word: γέενναν
  chosen: Gehenna
  alternatives:
  - hell
  lexicon: BDAG
  rationale: The translation philosophy prefers original-language primacy over inherited
    tradition. γέεννα refers specifically to Gehenna, a term with Jewish historical
    and eschatological associations. Rendering it 'Gehenna' preserves the source term's
    specificity; 'hell' is preserved in a footnote as a familiar interpretive equivalent.
- source_word: τοὺς δύο πόδας ἔχοντα
  chosen: having both feet
  alternatives:
  - with two feet
  - having the two feet
  lexicon: BDAG
  rationale: This participial phrase is naturally rendered in English as 'having both
    feet.' It preserves the contrast with entering life lame while avoiding awkward
    literalism.
