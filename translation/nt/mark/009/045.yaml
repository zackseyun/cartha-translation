theological_decisions:
- issue: Rendering of γέεννα in a judgment context
  chosen_reading: Gehenna
  alternative_readings:
  - hell
  rationale: The verse speaks of final judgment imagery, but the Greek term is specifically
    γέεννα, not a generic term for the afterlife. Following the translation philosophy's
    emphasis on source-language specificity, the main text keeps 'Gehenna' and preserves
    'hell' in a footnote as the familiar traditional rendering.
  doctrine_reference: Translation philosophy §1 (Original-language primacy over translation
    tradition)
