id: MRK.9.23
reference: Mark 9:23
source:
  edition: SBLGNT
  text: ὁ δὲ Ἰησοῦς εἶπεν αὐτῷ· Τὸ Εἰ ⸀δύνῃ, πάντα δυνατὰ τῷ πιστεύοντι.
translation:
  text: But Jesus said to him, “ ‘If you can’? All things are possible for the one
    who believes.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, “The ‘if you can’?” Jesus echoes and challenges the
      father's wording from the previous verse.
    reason: lexical_alternative
  - marker: b
    text: The phrase “the one who believes” could also be rendered “the one who has
      faith” or “the one who trusts.”
    reason: alternative_reading
lexical_decisions:
- source_word: Τὸ Εἰ δύνῃ
  chosen: ‘If you can’?
  alternatives:
  - As for ‘If you can’
  - The ‘if you can’
  lexicon: BDAG
  rationale: The neuter article Τὸ before the quoted phrase marks Jesus' pointed repetition
    of the father's words from the previous verse. Rendering it as a quoted fragment
    with an incredulous question best captures the idiomatic force in natural English
    while preserving the emphasis. A more wooden rendering ('The if you can') is possible
    but unnatural.
- source_word: δύνῃ
  chosen: you can
  alternatives:
  - you are able
  lexicon: BDAG
  rationale: δύναμαι commonly means 'be able, can.' In direct speech, 'you can' is
    the most natural modern English equivalent.
- source_word: πάντα
  chosen: all things
  alternatives:
  - everything
  lexicon: BDAG
  rationale: The plural neuter with δυνατά is well represented by 'all things.' 'Everything'
    is possible, but 'all things' preserves the form and rhetorical weight of the
    Greek.
- source_word: δυνατὰ
  chosen: are possible
  alternatives:
  - are able to be done
  lexicon: BDAG
  rationale: δυνατός in this predicate construction means 'possible.' This is standard
    and idiomatic in English.
- source_word: τῷ πιστεύοντι
  chosen: for the one who believes
  alternatives:
  - to the one who believes
  - for the believer
  lexicon: BDAG
  rationale: The present participle πιστεύοντι denotes the believing person in a general
    sense. 'The one who believes' preserves the participial force better than the
    more label-like 'the believer.' 'For' fits the sense of possibility in English
    ('possible for...').
- source_word: πιστεύοντι
  chosen: believes
  alternatives:
  - has faith
  - trusts
  lexicon: BDAG
  rationale: The default rendering of πιστις-family terms is 'faith.' Here the verbal
    form πιστεύω is best rendered 'believes' in the main text. 'Trusts' is a legitimate
    nuance but is not required by the context.
