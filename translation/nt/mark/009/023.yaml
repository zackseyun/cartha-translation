theological_decisions:
- issue: Scope of 'all things are possible'
  chosen_reading: Retain the absolute-sounding statement without adding qualifiers
    in the main text.
  alternative_readings:
  - All things are possible with God for the one who believes
  - All things are possible to the believer in the context of God's power
  rationale: The Greek text states the saying tersely and does not explicitly insert
    'with God' here, though the broader biblical context guards against reading this
    as autonomous human power. To preserve the text's rhetorical force and theological
    tension, no interpretive qualifier is added to the main text.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
