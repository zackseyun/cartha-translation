id: MRK.9.28
reference: Mark 9:28
source:
  edition: SBLGNT
  text: καὶ ⸂εἰσελθόντος αὐτοῦ⸃ εἰς οἶκον οἱ μαθηταὶ αὐτοῦ ⸂κατ’ ἰδίαν ἐπηρώτων αὐτόν⸃·
    Ὅτι ἡμεῖς οὐκ ἠδυνήθημεν ἐκβαλεῖν αὐτό;
translation:
  text: And when he had entered the house, his disciples were asking him privately,
    “Why were we not able to cast it out?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'him,' if the pronoun is taken to refer to the boy rather than the spirit;
      the Greek pronoun is neuter, which more naturally points to the spirit.
    reason: alternative_reading
lexical_decisions:
- source_word: εἰσελθόντος αὐτοῦ
  chosen: when he had entered
  alternatives:
  - after he entered
  - when he came in
  lexicon: BDAG
  rationale: Aorist participle with genitive absolute gives temporal background. 'When
    he had entered' preserves the completed action prior to the main verb while remaining
    natural English.
- source_word: εἰς οἶκον
  chosen: the house
  alternatives:
  - a house
  - home
  lexicon: BDAG
  rationale: Although the noun lacks the article in Greek, English idiom commonly
    uses 'the house' for a known location in narrative context. This fits the scene
    better than the more indefinite 'a house.'
- source_word: μαθηταὶ αὐτοῦ
  chosen: his disciples
  alternatives:
  - his students
  - the disciples
  lexicon: BDAG
  rationale: '''Disciples'' is the established and accurate rendering for μαθηταί
    in Gospel contexts, preserving the relational and apprenticeship sense.'
- source_word: κατ’ ἰδίαν
  chosen: privately
  alternatives:
  - in private
  - by themselves
  lexicon: BDAG
  rationale: The phrase means apart from others, in a private setting. 'Privately'
    is concise and natural, and it captures the adverbial force.
- source_word: ἐπηρώτων
  chosen: were asking
  alternatives:
  - asked
  - kept asking
  - questioned
  lexicon: BDAG
  rationale: Imperfect tense suggests ongoing or repeated action. 'Were asking' preserves
    that aspect without overtranslating.
- source_word: Ὅτι
  chosen: Why
  alternatives:
  - For what reason
  - How is it that
  lexicon: BDAG
  rationale: In this interrogative context, ὅτι functions idiomatically as 'why.'
    This is the standard sense here and avoids a wooden rendering.
- source_word: ἠδυνήθημεν
  chosen: were ... able
  alternatives:
  - could
  - did not have power
  lexicon: BDAG
  rationale: The verb denotes ability or capability. 'Were not able' is slightly more
    formal than 'could' and pairs well with the infinitive that follows.
- source_word: ἐκβαλεῖν
  chosen: to cast ... out
  alternatives:
  - to drive ... out
  - to expel
  lexicon: BDAG
  rationale: In exorcism contexts, 'cast out' is the standard and semantically precise
    rendering for ἐκβάλλω.
- source_word: αὐτό
  chosen: it
  alternatives:
  - him
  lexicon: BDAG
  rationale: The pronoun is neuter singular, referring to the unclean spirit/demon
    rather than the boy. English 'it' best reflects the Greek form and immediate exorcism
    context.
