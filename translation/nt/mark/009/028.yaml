theological_decisions:
- issue: Referent of the final pronoun αὐτό
  chosen_reading: The disciples ask why they could not cast out the spirit/demon,
    rendered 'it.'
  alternative_readings:
  - The pronoun refers to the afflicted boy, yielding 'him.'
  rationale: The neuter pronoun naturally points to the demon/unclean spirit as the
    object of exorcism, not the male child. Rendering 'it' avoids obscuring the Greek
    distinction and does not import extra doctrinal claims.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; preserve the source text''s plain sense.'
