id: MRK.9.38
reference: Mark 9:38
source:
  edition: SBLGNT
  text: ⸂Ἔφη αὐτῷ ὁ Ἰωάννης⸃· Διδάσκαλε, εἴδομέν τινα ⸀ἐν τῷ ὀνόματί σου ἐκβάλλοντα
    δαιμόνια, ⸂καὶ ἐκωλύομεν αὐτόν, ὅτι οὐκ ἠκολούθει ἡμῖν⸃.
translation:
  text: John said to him, “Teacher, we saw someone casting out demons in your name,
    and we tried to stop him because he was not following us.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'we were forbidding him.' The Greek imperfect may describe repeated or
      attempted action; hence 'we tried to stop him.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἔφη αὐτῷ ὁ Ἰωάννης
  chosen: John said to him
  alternatives:
  - John was saying to him
  - John answered him
  lexicon: BDAG
  rationale: ἔφη is a common narrative verb of speech; simple past 'said' is natural
    English. The explicit subject ὁ Ἰωάννης is retained as 'John,' and αὐτῷ is rendered
    'to him.'
- source_word: Διδάσκαλε
  chosen: Teacher
  alternatives:
  - Master
  - Rabbi
  lexicon: BDAG
  rationale: διδάσκαλε directly means 'Teacher.' 'Master' is less precise in modern
    English, and 'Rabbi' would be more interpretive since the Greek gives the translated
    title rather than a transliteration.
- source_word: εἴδομέν τινα
  chosen: we saw someone
  alternatives:
  - we saw a man
  - we noticed someone
  lexicon: BDAG
  rationale: τινα is indefinite, 'someone' or 'a certain person,' without specifying
    gender in English. 'Saw someone' best reflects the aorist narrative report without
    overinterpreting.
- source_word: ἐν τῷ ὀνόματί σου
  chosen: in your name
  alternatives:
  - by your name
  - using your name
  lexicon: BDAG
  rationale: The idiom ἐν τῷ ὀνόματί σου is standardly rendered 'in your name,' conveying
    action done under Jesus' authority. This preserves the biblical idiom without
    unnecessary paraphrase.
- source_word: ἐκβάλλοντα δαιμόνια
  chosen: casting out demons
  alternatives:
  - driving out demons
  - expelling demons
  lexicon: BDAG
  rationale: The participle ἐκβάλλοντα with δαιμόνια denotes exorcistic activity.
    'Casting out demons' is both accurate and idiomatic in Gospel context; 'driving
    out' is possible but less consistent with common NT phrasing.
- source_word: καὶ ἐκωλύομεν αὐτόν
  chosen: and we tried to stop him
  alternatives:
  - and we were forbidding him
  - and we stopped him
  lexicon: BDAG
  rationale: The imperfect ἐκωλύομεν suggests attempted or ongoing action in past
    time. 'We tried to stop him' captures the imperfect nuance better than a simple
    past 'we stopped him,' and is more idiomatic than 'we were forbidding him.'
- source_word: ὅτι οὐκ ἠκολούθει ἡμῖν
  chosen: because he was not following us
  alternatives:
  - because he was not accompanying us
  - because he was not following with us
  lexicon: BDAG
  rationale: ἀκολουθέω means 'follow.' The dative ἡμῖν naturally yields 'us.' The
    clause explains the disciples' reason for trying to stop the man. 'Following us'
    preserves the somewhat ironic focus on allegiance to the disciple group rather
    than explicitly to Jesus.
