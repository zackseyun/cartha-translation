theological_decisions:
- issue: Referent of the man's allegiance in the final clause
  chosen_reading: Render ἡμῖν straightforwardly as 'us' rather than smoothing to 'you/us'
    or 'our group.'
  alternative_readings:
  - because he was not following you
  - because he was not one of us
  rationale: 'The Greek explicitly says ἡμῖν (''us''). Preserving this wording maintains
    the narrative tension: John frames the issue around the disciples'' group identity,
    which Jesus will correct in the following context. Altering it to ''you'' would
    import interpretation not present in the text.'
  doctrine_reference: Translation philosophy items 1 and 3
