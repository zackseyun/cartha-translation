theological_decisions:
- issue: Interpretation of the timing and referent of 'the kingdom of God having come
    in power'
  chosen_reading: Render the phrase without specifying whether it refers to the transfiguration,
    resurrection, Pentecost, Jerusalem's fall, or the consummation.
  alternative_readings:
  - the transfiguration
  - the resurrection/exaltation
  - Pentecost
  - the destruction of Jerusalem
  - the final coming of the kingdom
  rationale: The verse has multiple major interpretive proposals, but the Greek itself
    does not identify the event explicitly. Per doctrine, theological tension should
    be preserved rather than resolved in translation.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
revisions:
- timestamp: '2026-04-21T12:46:23Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/nt/mark/009/001.json
  category: awkward_english
  tier: 1
  from: the kingdom of God having come in power
  to: that the kingdom of God has come in power
  rationale: 'The current rendering of the accusative with participle construction
    (ἴδωσιν τὴν βασιλείαν... ἐληλυθυῖαν) is a direct translation that results in slightly
    awkward English. While ''see something having done something'' is grammatically
    possible, it is not idiomatic. A more natural English rendering that preserves
    the perfect aspect of the participle is to use a ''that''-clause: ''see that the
    kingdom of God has come...''. This improves fluency while maintaining the intended
    temporal nuance.'
