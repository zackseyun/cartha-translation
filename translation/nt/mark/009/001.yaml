id: MRK.9.1
reference: Mark 9:1
source:
  edition: SBLGNT
  text: καὶ ἔλεγεν αὐτοῖς· Ἀμὴν λέγω ὑμῖν ὅτι εἰσίν τινες ⸂τῶν ὧδε⸃ ἑστηκότων οἵτινες
    οὐ μὴ γεύσωνται θανάτου ἕως ἂν ἴδωσιν τὴν βασιλείαν τοῦ θεοῦ ἐληλυθυῖαν ἐν δυνάμει.
translation:
  text: And he was saying to them, “Truly I say to you, there are some standing here
    who will certainly not taste death until they see the kingdom of God having come
    in power.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'some of those standing here.'
    reason: lexical_alternative
  - marker: b
    text: The expression 'taste death' is an idiom meaning 'experience death' or 'die.'
    reason: lexical_alternative
  - marker: c
    text: '''Having come in power'' may be understood in connection with the transfiguration,
      resurrection, Pentecost, Jerusalem''s judgment, or the kingdom''s future consummation;
      the text itself does not specify which event is in view.'
    reason: alternative_reading
  - marker: d
    text: Or 'the kingdom of God having come in power'.
    reason: previous_rendering
lexical_decisions:
- source_word: ἔλεγεν
  chosen: he was saying
  alternatives:
  - he said
  lexicon: BDAG
  rationale: Imperfect indicative suggests ongoing or repeated speech in narrative;
    'was saying' preserves the aspect better than the simple past, while remaining
    natural English.
- source_word: Ἀμὴν
  chosen: Truly
  alternatives:
  - Amen
  - Truly, truly
  lexicon: BDAG
  rationale: In the Synoptics, ἀμήν introducing a solemn saying is idiomatically rendered
    'Truly.' 'Amen' is more transliterative but less natural in this discourse formula.
- source_word: τινες τῶν ὧδε ἑστηκότων
  chosen: some standing here
  alternatives:
  - some of those standing here
  - some here who are standing
  lexicon: BDAG
  rationale: The phrase refers to a subset of those present. 'Some standing here'
    is concise and natural, while preserving the partitive sense and the perfect participle's
    stative force.
- source_word: οὐ μὴ γεύσωνται θανάτου
  chosen: will certainly not taste death
  alternatives:
  - will never taste death
  - will certainly not die
  lexicon: BDAG
  rationale: οὐ μὴ with the aorist subjunctive is a strong negation; 'will certainly
    not' reflects the emphasis. 'Taste death' is a well-established idiom in English
    and preserves the metaphor of the Greek better than flattening it to 'die'.
- source_word: ἕως ἂν ἴδωσιν
  chosen: until they see
  alternatives:
  - before they see
  lexicon: BDAG
  rationale: Standard temporal construction with ἕως ἄν and subjunctive indicating
    a future contingency; 'until they see' is the straightforward rendering.
- source_word: βασιλείαν τοῦ θεοῦ
  chosen: the kingdom of God
  alternatives:
  - the reign of God
  - the kingship of God
  lexicon: BDAG
  rationale: '''Kingdom of God'' is the standard and contextually appropriate rendering.
    While βασιλεία can denote reign/rule, ''kingdom'' best preserves both the dynamic
    and eschatological dimensions in Gospel usage.'
- source_word: ἐληλυθυῖαν
  chosen: having come
  alternatives:
  - come
  - having arrived
  lexicon: BDAG
  rationale: Perfect active participle modifying 'kingdom' indicates a state resulting
    from arrival. 'Having come' preserves the completed-action nuance better than
    a bare 'come,' though English cannot fully mirror the Greek aspect.
- source_word: ἐν δυνάμει
  chosen: in power
  alternatives:
  - with power
  - powerfully
  lexicon: BDAG
  rationale: The prepositional phrase is most naturally rendered 'in power' here,
    preserving the Greek wording and the sense of manifested divine power without
    overinterpreting the mode.
