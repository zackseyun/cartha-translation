id: MRK.9.27
reference: Mark 9:27
source:
  edition: SBLGNT
  text: ὁ δὲ Ἰησοῦς κρατήσας ⸂τῆς χειρὸς αὐτοῦ⸃ ἤγειρεν αὐτόν, καὶ ἀνέστη.
translation:
  text: But Jesus, taking hold of his hand, raised him up, and he stood up.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'lifted him up'; the Greek verb can also be used in contexts of raising
      from sleep or from death.
    reason: lexical_alternative
  - marker: b
    text: Or 'he arose' or 'he got up.'
    reason: lexical_alternative
lexical_decisions:
- source_word: δὲ
  chosen: But
  alternatives:
  - And
  - Now
  lexicon: BDAG
  rationale: Marks a mild contrast or narrative transition from the crowd's assumption
    that the boy was dead to Jesus' action. 'But' best preserves the adversative nuance
    in natural English.
- source_word: κρατήσας
  chosen: taking hold of
  alternatives:
  - grasping
  - seizing
  - taking
  lexicon: BDAG
  rationale: The aorist participle denotes Jesus physically taking hold of the boy.
    'Taking hold of' is idiomatic and preserves the concrete tactile action without
    the harshness 'seizing' can suggest in English.
- source_word: τῆς χειρὸς αὐτοῦ
  chosen: his hand
  alternatives:
  - the hand of him
  - his arm
  lexicon: BDAG
  rationale: The genitive construction with κρατέω is naturally rendered in English
    as 'take hold of his hand.' This preserves the specific body part χείρ ('hand')
    rather than broadening to 'arm.'
- source_word: ἤγειρεν
  chosen: raised him up
  alternatives:
  - lifted him up
  - helped him up
  lexicon: BDAG
  rationale: ἐγείρω commonly means 'raise' or 'awaken.' Here it refers to Jesus causing
    the boy to rise from the ground. 'Raised him up' preserves the verbal link with
    resurrection language without overstating it as a miracle of resurrection in this
    context.
- source_word: ἀνέστη
  chosen: he stood up
  alternatives:
  - he arose
  - he got up
  lexicon: BDAG
  rationale: ἀνίστημι here describes the boy's resulting action after Jesus raised
    him. 'He stood up' is clear modern English and reflects the completed movement
    to an upright position more precisely than the somewhat archaic 'he arose.'
