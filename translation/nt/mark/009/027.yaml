theological_decisions:
- issue: Potential resonance of resurrection language in ἤγειρεν / ἀνέστη
  chosen_reading: Use ordinary physical-rise language in context while preserving
    the lexical resonance of 'raised' in English.
  alternative_readings:
  - Use fully ordinary language such as 'helped him up, and he got up' to avoid resurrection
    overtones
  - Use more formal language such as 'raised him, and he arose' to foreground verbal
    resonance
  rationale: The immediate context is Jesus restoring the boy after the exorcism,
    not narrating resurrection from death. Still, Mark's choice of verbs can echo
    resurrection vocabulary elsewhere. 'Raised him up, and he stood up' keeps the
    contextual sense primary while allowing readers to hear the possible narrative
    resonance without forcing a doctrinal conclusion the text does not explicitly
    make.
  doctrine_reference: Preserve theological tension rather than resolve it.
