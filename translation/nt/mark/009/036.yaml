id: MRK.9.36
reference: Mark 9:36
source:
  edition: SBLGNT
  text: καὶ λαβὼν παιδίον ἔστησεν αὐτὸ ἐν μέσῳ αὐτῶν καὶ ἐναγκαλισάμενος αὐτὸ εἶπεν
    αὐτοῖς·
translation:
  text: 'And taking a child, he stood him in their midst, and taking him in his arms,
    he said to them:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'he placed him among them.' The Greek verb means 'caused him to stand,'
      which may be rendered more smoothly in English as 'placed' or 'set.'
    reason: lexical_alternative
  - marker: b
    text: Or 'embracing him.' The Greek verb can denote taking someone into one's
      arms or embracing.
    reason: lexical_alternative
lexical_decisions:
- source_word: λαβὼν
  chosen: taking
  alternatives:
  - having taken
  - after taking
  lexicon: BDAG
  rationale: Aorist participle of λαμβάνω, introducing the first action prior to the
    main verb. 'Taking' is natural English and preserves the participial sequence
    without over-paraphrasing.
- source_word: παιδίον
  chosen: a child
  alternatives:
  - a little child
  - a young child
  lexicon: BDAG
  rationale: παιδίον denotes a child, often young, but the diminutive nuance need
    not be forced in English here. 'A child' is clear and natural; 'little child'
    is possible but slightly interpretive.
- source_word: ἔστησεν
  chosen: he stood him
  alternatives:
  - he set him
  - he placed him
  lexicon: BDAG
  rationale: 'From ἵστημι, here causative: ''cause to stand.'' ''He stood him'' preserves
    the concrete action more closely than the smoother but less specific ''placed
    him.'' The masculine pronoun reflects the grammatical gender and likely referent
    of παιδίον in context.'
- source_word: ἐν μέσῳ αὐτῶν
  chosen: in their midst
  alternatives:
  - among them
  - in the middle of them
  lexicon: BDAG
  rationale: This idiom means being in the center among a group. 'In their midst'
    is idiomatic, readable, and slightly more formal than 'among them,' while preserving
    the spatial emphasis.
- source_word: ἐναγκαλισάμενος
  chosen: taking him in his arms
  alternatives:
  - embracing him
  - holding him in his arms
  lexicon: BDAG
  rationale: The verb denotes taking into one's arms or embracing. 'Taking him in
    his arms' captures the physical gesture explicitly and aligns well with the participial
    structure. 'Embracing him' is possible but slightly less concrete.
- source_word: εἶπεν αὐτοῖς
  chosen: he said to them
  alternatives:
  - he told them
  lexicon: BDAG
  rationale: Standard rendering of λέγω with indirect object. 'Said to them' is the
    most direct and neutral translation.
