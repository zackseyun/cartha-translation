id: MRK.9.30
reference: Mark 9:30
source:
  edition: SBLGNT
  text: Κἀκεῖθεν ἐξελθόντες ⸀παρεπορεύοντο διὰ τῆς Γαλιλαίας, καὶ οὐκ ἤθελεν ἵνα τις
    γνοῖ·
translation:
  text: And from there they went on through Galilee, and he did not want anyone to
    know.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they were passing through Galilee.' The Greek imperfect verb can emphasize
      ongoing movement.
    reason: lexical_alternative
  - marker: b
    text: The Greek leaves unstated what he did not want anyone to know; in context,
      it refers to his presence or route through Galilee.
    reason: lexical_alternative
lexical_decisions:
- source_word: Κἀκεῖθεν
  chosen: And from there
  alternatives:
  - And thereupon
  - And from that place
  lexicon: BDAG
  rationale: κἀκεῖθεν combines καί + ἐκεῖθεν, marking continuity with the previous
    scene and movement away from that location. 'And from there' preserves both the
    connective and the spatial sense in natural English.
- source_word: ἐξελθόντες
  chosen: from there they went on
  alternatives:
  - having gone out
  - after leaving
  lexicon: BDAG
  rationale: The aorist participle of ἐξέρχομαι denotes departure from the prior location.
    In English, its sense is naturally absorbed into the main movement clause rather
    than rendered woodenly as a separate participial phrase. The departure nuance
    is preserved by 'from there' and the motion verb.
- source_word: παρεπορεύοντο
  chosen: they went on through
  alternatives:
  - they were passing through
  - they traveled through
  lexicon: BDAG
  rationale: The imperfect middle/passive form of παραπορεύομαι conveys ongoing movement
    through the region. 'Went on through' captures both the travel sense and the narrative
    progression, while remaining idiomatic. 'Were passing through' is possible but
    slightly more wooden.
- source_word: διὰ τῆς Γαλιλαίας
  chosen: through Galilee
  alternatives:
  - through the Galilee
  - by way of Galilee
  lexicon: BDAG
  rationale: 'διά with the genitive indicates movement through a region. English idiom
    omits the article with the place name: ''through Galilee.'''
- source_word: οὐκ ἤθελεν
  chosen: he did not want
  alternatives:
  - he was not willing
  - he did not wish
  lexicon: BDAG
  rationale: θέλω here expresses volition or desire. 'Did not want' is clear modern
    English and fits the narrative context without sounding overly formal.
- source_word: ἵνα τις γνοῖ
  chosen: anyone to know
  alternatives:
  - that anyone should know
  - for anyone to find out
  lexicon: BDAG
  rationale: 'The ἵνα clause with aorist subjunctive expresses intended prevention:
    he did not want anyone to know. ''Anyone to know'' is concise and idiomatic. The
    object of ''know'' is left implicit, as in Greek, referring to his presence/journey
    in context.'
