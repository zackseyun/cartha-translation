theological_decisions:
- issue: Implicit subject of ἤθελεν
  chosen_reading: The subject is rendered as 'he,' referring to Jesus.
  alternative_readings:
  - An impersonal or collective subject is grammatically less likely in context.
  rationale: The singular verb naturally refers back to Jesus as the narrative subject.
    Rendering the pronoun explicitly in English is required for clarity and does not
    add theological content beyond the syntax of the passage.
