id: MRK.9.6
reference: Mark 9:6
source:
  edition: SBLGNT
  text: οὐ γὰρ ᾔδει τί ⸀ἀποκριθῇ, ⸂ἔκφοβοι γὰρ ἐγένοντο⸃.
translation:
  text: For he did not know what he should answer, for they became terrified.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'what he should say in reply.'
    reason: lexical_alternative
  - marker: b
    text: Some translations smooth the final clause as 'for they were terrified';
      the Greek more literally says 'for they became terrified.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ᾔδει
  chosen: did not know
  alternatives:
  - did not understand
  - was not knowing
  lexicon: BDAG
  rationale: οἶδα commonly expresses knowledge or awareness; in idiomatic English
    with οὐ it is best rendered 'did not know.'
- source_word: τί ἀποκριθῇ
  chosen: what he should answer
  alternatives:
  - what he should say in reply
  - what to answer
  lexicon: BDAG
  rationale: ἀποκρίνομαι is specifically 'answer, reply,' not merely 'say.' The deliberative
    sense after τί is naturally conveyed by 'what he should answer.'
- source_word: ἔκφοβοι
  chosen: terrified
  alternatives:
  - greatly afraid
  - very frightened
  lexicon: BDAG
  rationale: ἔκφοβος intensifies fear beyond a simple 'afraid'; 'terrified' captures
    the heightened force in clear modern English.
- source_word: ἐγένοντο
  chosen: they became
  alternatives:
  - they were
  - they came to be
  lexicon: BDAG
  rationale: γίνομαι here marks entry into a state, so 'became' better reflects the
    verbal force than the stative 'were'.
- source_word: γὰρ ... γὰρ
  chosen: for ... for
  alternatives:
  - because ... because
  - indeed ... for
  lexicon: BDAG
  rationale: The repeated γάρ gives explanatory grounding in both clauses. Retaining
    'for' in both places preserves the Greek discourse structure more closely than
    smoothing one away.
