id: MRK.9.42
reference: Mark 9:42
source:
  edition: SBLGNT
  text: Καὶ ὃς ⸀ἂν σκανδαλίσῃ ἕνα τῶν μικρῶν ⸀τούτων τῶν πιστευόντων ⸂εἰς ἐμέ⸃, καλόν
    ἐστιν αὐτῷ μᾶλλον εἰ περίκειται ⸂μύλος ὀνικὸς⸃ περὶ τὸν τράχηλον αὐτοῦ καὶ βέβληται
    εἰς τὴν θάλασσαν.
translation:
  text: And whoever causes one of these little ones who believe in me to stumble,
    it is better for him if a donkey-turned millstone is put around his neck and he
    is thrown into the sea.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a large millstone,' specifically one turned by a donkey.
    reason: lexical_alternative
lexical_decisions:
- source_word: σκανδαλίσῃ
  chosen: causes ... to stumble
  alternatives:
  - causes ... to sin
  - offends
  lexicon: BDAG
  rationale: The verb σκανδαλίζω can denote causing someone to stumble, fall away,
    or sin. 'Causes ... to stumble' preserves the metaphor present in the Greek while
    remaining natural English. 'Causes ... to sin' is interpretive and narrower; 'offends'
    is too weak in modern English.
- source_word: μικρῶν τούτων
  chosen: these little ones
  alternatives:
  - these little children
  - these insignificant ones
  lexicon: BDAG
  rationale: μικρός here likely refers to those regarded as small or vulnerable, not
    merely physically young. 'Little ones' preserves the breadth of the expression
    and fits the immediate context.
- source_word: τῶν πιστευόντων εἰς ἐμέ
  chosen: who believe in me
  alternatives:
  - who trust in me
  lexicon: BDAG
  rationale: The participial phrase identifies the 'little ones' as believers in Jesus.
    'Believe in me' is the most direct and standard rendering of πιστεύω εἰς with
    a personal object; 'trust in me' is possible but less literal here.
- source_word: καλόν ἐστιν αὐτῷ μᾶλλον
  chosen: it is better for him
  alternatives:
  - it is good for him rather
  - it would be better for him
  lexicon: BDAG
  rationale: This idiom expresses comparative advantage in a severe warning context.
    English idiom favors 'it is better for him' (or 'it would be better for him').
    The comparative force of μᾶλλον is carried by 'better'.
- source_word: μύλος ὀνικός
  chosen: a donkey-turned millstone
  alternatives:
  - a large millstone
  - a millstone turned by a donkey
  lexicon: BDAG
  rationale: The phrase refers to the larger millstone driven by a donkey, distinguishing
    it from a smaller hand millstone. 'Donkey-turned millstone' is concise and communicates
    the sense; a footnote preserves the more explicit alternative wording.
- source_word: περίκειται ... περὶ τὸν τράχηλον
  chosen: is put around his neck
  alternatives:
  - is hung around his neck
  - lies around his neck
  lexicon: BDAG
  rationale: περίκειμαι with περὶ τὸν τράχηλον describes something being placed around
    the neck. 'Is put around his neck' is clear modern English; 'is hung around his
    neck' is also possible.
- source_word: βέβληται εἰς τὴν θάλασσαν
  chosen: he is thrown into the sea
  alternatives:
  - he has been cast into the sea
  lexicon: BDAG
  rationale: The perfect form βέβληται can be rendered with present-result force,
    but in English a simple passive 'is thrown' best conveys the vivid outcome in
    a natural way.
