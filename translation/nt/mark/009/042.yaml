theological_decisions:
- issue: Referent of 'these little ones'
  chosen_reading: The phrase is rendered broadly enough to include vulnerable believers,
    not restricted in translation to children alone.
  alternative_readings:
  - children specifically
  - humble disciples generally
  rationale: The immediate phrase 'who believe in me' points beyond mere age category,
    though children may be included. The translation preserves the broader referent
    without forcing a narrower interpretation.
  doctrine_reference: Preserve theological tension rather than resolve it.
