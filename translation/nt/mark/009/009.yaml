id: MRK.9.9
reference: Mark 9:9
source:
  edition: SBLGNT
  text: ⸂Καὶ καταβαινόντων⸃ αὐτῶν ⸀ἐκ τοῦ ὄρους διεστείλατο αὐτοῖς ἵνα μηδενὶ ⸂ἃ εἶδον
    διηγήσωνται⸃, εἰ μὴ ὅταν ὁ υἱὸς τοῦ ἀνθρώπου ἐκ νεκρῶν ἀναστῇ.
translation:
  text: And as they were coming down from the mountain, he ordered them to tell no
    one what they had seen, except when the Son of Man had risen from among the dead.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, “until the Son of Man had risen from the dead.”
    reason: alternative_reading
  - marker: b
    text: 'Greek: “from among the dead.”'
    reason: lexical_alternative
lexical_decisions:
- source_word: καταβαινόντων
  chosen: as they were coming down
  alternatives:
  - while they were descending
  - as they were descending
  lexicon: BDAG
  rationale: Present participle in a genitive absolute gives contemporaneous action;
    'as they were coming down' is natural modern English while preserving the ongoing
    sense.
- source_word: ὄρους
  chosen: mountain
  alternatives:
  - hill
  lexicon: BDAG
  rationale: ὄρος normally denotes a mountain; 'mountain' fits the narrative setting
    of the transfiguration.
- source_word: διεστείλατο
  chosen: he ordered
  alternatives:
  - he instructed
  - he strictly charged
  - he commanded
  lexicon: BDAG
  rationale: The verb conveys giving a directive or charge. 'Ordered' preserves the
    force without sounding archaic; 'strictly charged' is possible but less natural
    in contemporary English.
- source_word: ἵνα μηδενὶ
  chosen: to tell no one
  alternatives:
  - that they should tell no one
  - to report to no one
  lexicon: BDAG
  rationale: This renders the purpose/content of the command idiomatically in English
    while preserving the negative dative 'to no one'.
- source_word: ἃ εἶδον
  chosen: what they had seen
  alternatives:
  - the things they saw
  - what they saw
  lexicon: BDAG
  rationale: The neuter plural relative is naturally rendered as 'what.' Pluperfect-like
    English 'had seen' fits the prior completed vision relative to the command.
- source_word: διηγήσωνται
  chosen: tell
  alternatives:
  - report
  - recount
  - describe in detail
  lexicon: BDAG
  rationale: The verb can mean narrate or relate in detail. In context, 'tell' is
    concise and natural, with the object 'what they had seen' carrying the content.
- source_word: εἰ μὴ ὅταν
  chosen: except when
  alternatives:
  - until
  - except after the time when
  lexicon: BDAG
  rationale: The construction literally means 'except when,' expressing an exception
    tied to a future time. Many English versions use 'until,' which captures the sense,
    but 'except when' stays closer to the Greek wording.
- source_word: ὁ υἱὸς τοῦ ἀνθρώπου
  chosen: the Son of Man
  lexicon: BDAG
  rationale: This is Jesus' self-designation and should be translated, not paraphrased,
    preserving its titular and allusive force.
- source_word: ἐκ νεκρῶν
  chosen: from among the dead
  alternatives:
  - from the dead
  lexicon: BDAG
  rationale: The phrase more precisely means emergence from among dead people, not
    merely from a state of death. 'From among the dead' preserves that nuance.
- source_word: ἀναστῇ
  chosen: had risen
  alternatives:
  - has risen
  - should rise
  - rose
  lexicon: BDAG
  rationale: Aorist subjunctive after ὅταν refers to a future event relative to the
    command. In English with 'except when,' past perfect 'had risen' is the most natural
    way to express the event as completed by that future point.
