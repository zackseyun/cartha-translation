theological_decisions:
- issue: Rendering of ὁ υἱὸς τοῦ ἀνθρώπου
  chosen_reading: the Son of Man
  alternative_readings:
  - the Human One
  rationale: The traditional but still transparent rendering preserves the Greek expression
    and its likely Danielic resonance without flattening it into a generic anthropological
    phrase.
  doctrine_reference: Translation philosophy §2 (translate titles; transliterate names)
    and Affirmations (Chalcedonian Christology preserved without over-specification).
- issue: Temporal force of εἰ μὴ ὅταν
  chosen_reading: except when the Son of Man had risen from among the dead
  alternative_readings:
  - until the Son of Man had risen from among the dead
  rationale: The Greek wording is more literally 'except when,' though the practical
    sense overlaps with 'until.' The chosen rendering preserves the source-text form
    while leaving the command's temporal restriction clear.
  doctrine_reference: Translation philosophy §1 (original-language primacy over translation
    tradition) and §3 (preserve tension rather than over-resolve).
