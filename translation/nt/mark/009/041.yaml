theological_decisions:
- issue: Rendering Χριστός in a possessive/title construction
  chosen_reading: the Messiah
  alternative_readings:
  - Christ
  rationale: The phrase χριστοῦ ἐστε uses Χριστός as a title referring to Jesus. Per
    doctrine guidance, titles are translated where context supports it. 'Because you
    belong to the Messiah' preserves the messianic sense better than the traditional
    'Christ.' The traditional form is preserved in a footnote.
  doctrine_reference: 'DOCTRINE.md: Contested terms table — Χριστός default ''Messiah''
    where title; ''Christ'' where name-like'
