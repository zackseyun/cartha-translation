id: MRK.9.41
reference: Mark 9:41
source:
  edition: SBLGNT
  text: Ὃς γὰρ ἂν ποτίσῃ ὑμᾶς ποτήριον ὕδατος ἐν ⸀ὀνόματι ὅτι χριστοῦ ἐστε, ἀμὴν λέγω
    ὑμῖν ⸀ὅτι οὐ μὴ ⸀ἀπολέσῃ τὸν μισθὸν αὐτοῦ.
translation:
  text: For whoever gives you a cup of water to drink in my name, because you belong
    to the Messiah, truly I say to you, he will certainly not lose his reward.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'because you are Christ's.'
    reason: alternative_reading
lexical_decisions:
- source_word: Ὃς γὰρ ἂν
  chosen: For whoever
  alternatives:
  - For anyone who
  - Whoever indeed
  lexicon: BDAG
  rationale: Renders the indefinite relative construction naturally in English, with
    γάρ retained as 'For' to show connection to the preceding teaching.
- source_word: ποτίσῃ ὑμᾶς
  chosen: gives you ... to drink
  alternatives:
  - gives you a drink
  - causes you to drink
  lexicon: BDAG
  rationale: ποτίζω literally means 'give to drink' or 'cause to drink.' In idiomatic
    English with the direct object 'cup of water,' 'gives you ... to drink' preserves
    the sense without awkwardness.
- source_word: ποτήριον ὕδατος
  chosen: a cup of water
  alternatives:
  - a drinking cup of water
  - a cupful of water
  lexicon: BDAG
  rationale: A straightforward, natural rendering of the object phrase; no need to
    paraphrase beyond the simple act of giving water.
- source_word: ἐν ὀνόματι
  chosen: in my name
  alternatives:
  - in the name
  - on account of my name
  lexicon: BDAG
  rationale: The phrase denotes action done on the basis of allegiance to or identification
    with Jesus. Because the following clause explains the basis ('because you belong
    to the Messiah'), 'in my name' is retained as the familiar and sufficiently precise
    expression. 'My' is supplied from the discourse context, since Jesus is speaking
    and the parallel sense is explicit in context.
- source_word: ὅτι χριστοῦ ἐστε
  chosen: because you belong to the Messiah
  alternatives:
  - because you are Christ's
  - because you belong to Christ
  lexicon: BDAG
  rationale: 'ὅτι is best taken causally here: the act is done because the recipients
    belong to Jesus. χριστοῦ is rendered ''the Messiah'' per the project''s default
    for Χριστός as a title rather than a name-like form. ''Belong to'' expresses the
    genitive relation clearly in modern English.'
- source_word: ἀμὴν λέγω ὑμῖν
  chosen: truly I say to you
  alternatives:
  - amen, I say to you
  - truly I tell you
  lexicon: BDAG
  rationale: A standard solemn formula in the Gospels. 'Truly I say to you' preserves
    the weight of ἀμήν while remaining readable modern English.
- source_word: οὐ μὴ ἀπολέσῃ
  chosen: will certainly not lose
  alternatives:
  - will by no means lose
  - will never lose
  lexicon: BDAG
  rationale: οὐ μὴ with the aorist subjunctive is an emphatic negation. 'Will certainly
    not lose' conveys the force clearly in contemporary English without sounding archaic.
- source_word: τὸν μισθὸν αὐτοῦ
  chosen: his reward
  alternatives:
  - the reward due him
  - his wages
  lexicon: BDAG
  rationale: μισθός can mean wages, recompense, or reward. In this moral and eschatological
    context, 'reward' is the most natural English equivalent.
