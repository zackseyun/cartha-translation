theological_decisions:
- issue: Interpretation of the metaphor 'salted with fire'
  chosen_reading: Retain the literal-metaphorical wording without resolving whether
    it refers primarily to judgment, purification, sacrifice, or discipleship testing.
  alternative_readings:
  - everyone will undergo judgment by fire
  - everyone will be purified by fire
  - everyone will be consecrated like a sacrifice seasoned with salt
  rationale: The Greek text is terse and allusive, and the immediate context plausibly
    supports multiple interrelated interpretations. In keeping with the translation
    philosophy, the main text preserves the metaphorical tension rather than importing
    one theological explanation into the translation itself.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
