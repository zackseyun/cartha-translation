id: MRK.9.49
reference: Mark 9:49
source:
  edition: SBLGNT
  text: Πᾶς γὰρ πυρὶ ⸀ἁλισθήσεται.
translation:
  text: For everyone will be salted with fire.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'everyone will be seasoned with fire.' The image may evoke judgment,
      purification, or sacrificial language; compare Lev 2:13.
    reason: lexical_alternative
  - marker: b
    text: Some manuscripts add, 'and every sacrifice will be salted with salt.'
    reason: textual_variant
lexical_decisions:
- source_word: Πᾶς
  chosen: everyone
  alternatives:
  - everyone/everything
  - everyone
  lexicon: BDAG
  rationale: The adjective is singular masculine nominative used substantivally, most
    naturally meaning 'everyone' or 'each person' in context. Although πᾶς can sometimes
    be broader ('everything'), the surrounding discourse in Mark 9 addresses persons
    under judgment/discipleship, so 'everyone' best reflects the likely referent in
    readable English.
- source_word: γὰρ
  chosen: For
  alternatives:
  - for
  - indeed
  lexicon: BDAG
  rationale: γάρ gives explanatory support for the preceding warning. 'For' preserves
    the logical connection more transparently than a looser rendering.
- source_word: πυρὶ
  chosen: with fire
  alternatives:
  - by fire
  - in fire
  lexicon: BDAG
  rationale: The dative can be rendered instrumentally or associatively. 'With fire'
    is idiomatic in English and preserves the ambiguity of means/element better than
    forcing either 'by' or 'in'.
- source_word: ἁλισθήσεται
  chosen: will be salted
  alternatives:
  - will be seasoned
  - will be preserved with salt
  lexicon: BDAG
  rationale: The future passive of ἁλίζω literally means 'to salt, season with salt.'
    Even though the combination 'salted with fire' is metaphorical and difficult,
    the translation should preserve the striking imagery rather than paraphrase it
    away. 'Will be salted' is the most direct and auditable rendering.
