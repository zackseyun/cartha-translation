theological_decisions:
- issue: Metaphorical force of 'salt' in the imperative
  chosen_reading: 'Retain the metaphor literally: ''Have salt in yourselves'''
  alternative_readings:
  - Interpret the metaphor in the main text as 'Have purity in yourselves'
  - Interpret the metaphor in the main text as 'Have wisdom in yourselves'
  rationale: The verse does not explicitly define the metaphor, and the translation
    philosophy requires preserving theological tension rather than resolving ambiguity.
    A literal rendering lets readers see the connection to the surrounding sayings
    and sacrificial/discipleship imagery without importing a single interpretive conclusion
    into the text.
  doctrine_reference: Translation philosophy §3
- issue: Rendering of the final peace command
  chosen_reading: 'Translate as an ethical imperative: ''live at peace with one another'''
  alternative_readings:
  - '''be at peace with one another'''
  rationale: Both are viable, but 'live at peace' better conveys the present imperative
    as an ongoing pattern of conduct in readable modern English, without changing
    the substance of the command.
  doctrine_reference: Translation philosophy §6
