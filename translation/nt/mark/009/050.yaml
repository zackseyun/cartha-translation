id: MRK.9.50
reference: Mark 9:50
source:
  edition: SBLGNT
  text: καλὸν τὸ ἅλας· ἐὰν δὲ τὸ ἅλας ἄναλον γένηται, ἐν τίνι αὐτὸ ἀρτύσετε; ἔχετε
    ἐν ἑαυτοῖς ⸀ἅλα, καὶ εἰρηνεύετε ἐν ἀλλήλοις.
translation:
  text: Salt is good; but if the salt becomes unsalty, with what will you season it?
    Have salt in yourselves, and live at peace with one another.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'if the salt loses its saltiness' or 'becomes tasteless.'
    reason: lexical_alternative
  - marker: b
    text: The command 'Have salt in yourselves' preserves the metaphor of the Greek;
      possible interpretations include maintaining purity, wisdom, covenant faithfulness,
      or preserving influence, but the text does not specify one meaning explicitly.
    reason: lexical_alternative
  - marker: c
    text: Or 'be at peace with one another.'
    reason: lexical_alternative
lexical_decisions:
- source_word: καλὸν
  chosen: good
  alternatives:
  - useful
  - beneficial
  lexicon: BDAG
  rationale: καλός here evaluates salt positively in a broad sense. 'Good' is the
    most natural and sufficiently general English equivalent, preserving the aphoristic
    force without over-specifying utility.
- source_word: ἅλας / ἅλα
  chosen: salt
  lexicon: BDAG
  rationale: The noun is rendered consistently as 'salt.' In the final clause, ἅλα
    is accusative singular, so 'have salt in yourselves' is retained rather than paraphrasing
    the metaphor away.
- source_word: ἄναλον
  chosen: unsalty
  alternatives:
  - loses its saltiness
  - becomes tasteless
  lexicon: BDAG
  rationale: ἄναλος means 'without salt' or 'insipid.' 'Unsalty' closely reflects
    the Greek adjective and keeps the wordplay with 'salt,' while remaining understandable
    in context.
- source_word: γένηται
  chosen: becomes
  alternatives:
  - comes to be
  - turns out to be
  lexicon: BDAG
  rationale: γίνομαι here marks a change of state. 'Becomes' best captures that sense
    in idiomatic English.
- source_word: ἐν τίνι
  chosen: with what
  alternatives:
  - by what means
  - in what
  lexicon: BDAG
  rationale: Although literally 'in what,' the idiom in this context asks about the
    means or instrument by which seasoning could occur. 'With what' is idiomatic and
    semantically accurate.
- source_word: ἀρτύσετε
  chosen: will you season
  alternatives:
  - will you make it salty
  - will you restore its flavor
  lexicon: BDAG
  rationale: ἀρτύω means to season or make ready with seasoning. 'Season' preserves
    the culinary metaphor and avoids interpretive expansion.
- source_word: ἔχετε
  chosen: have
  alternatives:
  - keep
  - possess
  lexicon: BDAG
  rationale: The present imperative calls for an ongoing state. 'Have' is direct and
    natural; the durative force is adequately conveyed in English imperative style.
- source_word: ἐν ἑαυτοῖς
  chosen: in yourselves
  alternatives:
  - among yourselves
  - within yourselves
  lexicon: BDAG
  rationale: The reflexive phrase is rendered 'in yourselves' to preserve the internalized
    metaphor. 'Among yourselves' is possible, but the reflexive wording more naturally
    points to an inward quality possessed by the disciples.
- source_word: εἰρηνεύετε
  chosen: live at peace
  alternatives:
  - be at peace
  - keep peace
  lexicon: BDAG
  rationale: The verb means to be/live in peace. 'Live at peace' expresses the ongoing
    imperative naturally in modern English and avoids a wooden rendering.
- source_word: ἐν ἀλλήλοις
  chosen: with one another
  alternatives:
  - among one another
  - with each other
  lexicon: BDAG
  rationale: In English, the relational sense is best conveyed by 'with one another.'
    This is idiomatic for reciprocal peace.
