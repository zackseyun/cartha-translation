theological_decisions:
- issue: Identification of πνεῦμα
  chosen_reading: Rendered as 'the spirit' in the main text without adding 'unclean'
    or 'demon.'
  alternative_readings:
  - the unclean spirit
  - the demon
  rationale: The broader passage identifies the possessing entity as an unclean spirit,
    but this verse itself says only τὸ πνεῦμα. Following original-language primacy,
    the translation preserves the wording of this verse and does not expand it interpretively.
  doctrine_reference: Translation philosophy §1 (Original-language primacy over translation
    tradition)
