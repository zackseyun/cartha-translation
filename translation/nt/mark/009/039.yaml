theological_decisions:
- issue: Nature of the deed done in Jesus' name
  chosen_reading: Rendered δύναμιν as 'a work of power' rather than 'a miracle.'
  alternative_readings:
  - a miracle
  - a mighty work
  rationale: The text states that the person performs a δύναμις in Jesus' name. Translating
    as 'a work of power' preserves the source term's semantic range and avoids importing
    a narrower modern concept of miracle while still indicating an extraordinary deed.
  doctrine_reference: Translation philosophy §1, §5
- issue: Implication of association with Jesus
  chosen_reading: The verse is rendered descriptively without implying full discipleship
    or doctrinal approval beyond the text.
  alternative_readings:
  - A stronger paraphrase implying true discipleship
  - A stronger paraphrase implying mere opportunism
  rationale: Jesus' statement concerns the improbability that someone acting powerfully
    in his name would soon speak evil of him. The translation preserves that limited
    claim and does not import broader theological judgments not explicit in the verse.
  doctrine_reference: Affirmations; Translation philosophy §3
