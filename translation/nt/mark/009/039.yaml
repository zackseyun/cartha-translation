id: MRK.9.39
reference: Mark 9:39
source:
  edition: SBLGNT
  text: ὁ δὲ Ἰησοῦς εἶπεν· Μὴ κωλύετε αὐτόν, οὐδεὶς γάρ ἐστιν ὃς ποιήσει δύναμιν ἐπὶ
    τῷ ὀνόματί μου καὶ δυνήσεται ταχὺ κακολογῆσαί με·
translation:
  text: But Jesus said, “Do not stop him, for there is no one who will do a work of
    power in my name and then soon be able to speak evil of me.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “a miracle” or “a mighty work”; Greek “a work/power” (δύναμιν).
    reason: lexical_alternative
  - marker: b
    text: Or “revile me” or “slander me”; Greek “speak evil of me.”
    reason: lexical_alternative
lexical_decisions:
- source_word: κωλύετε
  chosen: stop
  alternatives:
  - forbid
  - prevent
  - hinder
  lexicon: BDAG
  rationale: Present imperative with μή in context is naturally rendered as a prohibition,
    'do not stop him.' 'Stop' is idiomatic modern English and fits the immediate context
    of trying to prevent the man from acting.
- source_word: δύναμιν
  chosen: a work of power
  alternatives:
  - a miracle
  - a mighty work
  lexicon: BDAG
  rationale: The noun literally denotes power, and in Gospel usage often refers to
    a mighty deed. 'A work of power' preserves the lexical link to δύναμις without
    flattening it entirely into the interpretive term 'miracle,' while still sounding
    natural enough in English.
- source_word: ἐπὶ τῷ ὀνόματί μου
  chosen: in my name
  alternatives:
  - on the basis of my name
  - upon my name
  lexicon: BDAG
  rationale: This prepositional phrase in exorcism/ministry context conveys action
    done under the authority or invocation of Jesus' name. 'In my name' is the standard
    and clear English equivalent.
- source_word: ταχὺ
  chosen: soon
  alternatives:
  - quickly
  - immediately
  lexicon: BDAG
  rationale: The adverb modifies the future ability to revile Jesus. 'Soon' best captures
    temporal nearness in natural English; 'quickly' could suggest manner rather than
    time.
- source_word: κακολογῆσαί
  chosen: to speak evil of
  alternatives:
  - to revile
  - to slander
  - to curse
  lexicon: BDAG
  rationale: The verb means to speak badly of, revile, or abuse verbally. 'Speak evil
    of' is clear, sufficiently strong, and avoids over-specifying legal slander or
    formal cursing.
- source_word: οὐδεὶς γάρ ἐστιν ὃς
  chosen: for there is no one who
  alternatives:
  - for no one
  - for nobody
  lexicon: BDAG
  rationale: This preserves the Greek structure and emphasis while remaining idiomatic
    English.
- source_word: δυνήσεται
  chosen: be able to
  alternatives:
  - can
  - will be able to
  lexicon: BDAG
  rationale: Future middle of δύναμαι is best represented with explicit future ability.
    'Be able to' preserves the modal nuance more clearly than a simple 'can'.
