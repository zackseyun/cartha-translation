id: MRK.9.37
reference: Mark 9:37
source:
  edition: SBLGNT
  text: Ὃς ⸀ἂν ἓν τῶν τοιούτων παιδίων δέξηται ἐπὶ τῷ ὀνόματί μου, ἐμὲ δέχεται· καὶ
    ὃς ⸁ἂν ἐμὲ ⸀δέχηται, οὐκ ἐμὲ δέχεται ἀλλὰ τὸν ἀποστείλαντά με.
translation:
  text: Whoever receives one of such children in my name receives me; and whoever
    receives me receives not me, but the one who sent me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'one such child.' The Greek literally says 'one of such children,' emphasizing
      a child of this kind rather than pointing specifically to 'these' children.
    reason: lexical_alternative
  - marker: b
    text: Or 'welcomes' for 'receives' throughout the verse; the same Greek verb is
      repeated in each clause.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ὃς ἂν
  chosen: Whoever
  alternatives:
  - If anyone
  - Who
  lexicon: BDAG
  rationale: The relative pronoun with ἄν forms an indefinite general condition, best
    rendered idiomatically in English as 'whoever.'
- source_word: ἓν τῶν τοιούτων παιδίων
  chosen: one of such children
  alternatives:
  - one such child
  - one of these children
  lexicon: BDAG
  rationale: ἓν is singular ('one'), παιδίων is plural genitive ('of children'), and
    τοιούτων means 'such, of this kind.' 'One of such children' preserves the partitive
    construction and the qualitative force of τοιούτων. 'One such child' is smoother
    English but slightly less explicit about the plural genitive. 'These children'
    would over-specify deixis not present in τοιούτων.
- source_word: δέξηται / δέχεται / δέχηται
  chosen: receives
  alternatives:
  - welcomes
  - accepts
  lexicon: BDAG
  rationale: δέχομαι can mean receive, welcome, or accept. 'Receives' preserves the
    repeated lexical link across the verse and allows the theological identification
    between receiving the child, Jesus, and the Sender to remain explicit. 'Welcomes'
    is possible and idiomatic, but 'receives' better matches the direct object chain
    and keeps the repetition audible.
- source_word: ἐπὶ τῷ ὀνόματί μου
  chosen: in my name
  alternatives:
  - on the basis of my name
  - because of my name
  lexicon: BDAG
  rationale: The idiom ἐπὶ + dative with ὄνομα here indicates reception on account
    of or in relation to Jesus' name/authority. 'In my name' is the standard concise
    English equivalent and preserves the theological resonance of acting with reference
    to Jesus' person and authority.
- source_word: ἐμὲ
  chosen: me
  lexicon: BDAG
  rationale: The emphatic accusative pronoun is naturally rendered 'me.' The repetition
    is retained to preserve the rhetorical structure.
- source_word: οὐκ ἐμὲ δέχεται ἀλλὰ
  chosen: receives not me, but
  alternatives:
  - does not receive me but
  - is not receiving me but
  lexicon: BDAG
  rationale: The negation with ἀλλά sets up a contrast that is theological rather
    than absolute denial of Jesus. The wording 'receives not me, but' preserves the
    Greek order and emphasis while remaining intelligible. The sense is that receiving
    Jesus is inseparable from receiving the Father who sent him.
- source_word: τὸν ἀποστείλαντά με
  chosen: the one who sent me
  alternatives:
  - him who sent me
  - my sender
  lexicon: BDAG
  rationale: The articular participle is best rendered as a substantive phrase, 'the
    one who sent me.' This is natural English and preserves the relational and mission-oriented
    language of the Greek.
