theological_decisions:
- issue: Force of the final contrast 'not me, but the one who sent me'
  chosen_reading: Rendered as a relational/theological contrast without implying exclusion
    of Jesus' identity or significance.
  alternative_readings:
  - A looser paraphrase such as 'receives not only me but also the one who sent me'
  - A more literal but potentially misleading exclusionary reading
  rationale: The Greek says 'receives not me, but the one who sent me.' In context,
    this does not deny that receiving Jesus is truly receiving Jesus; rather, it emphasizes
    that receiving Jesus reaches beyond him to the Father who sent him. The translation
    keeps the literal contrast while avoiding explanatory paraphrase in the main text,
    preserving the text's theological depth and its harmony with orthodox Christology.
  doctrine_reference: 'Affirmations: Nicene Creed (381 AD), Definition of Chalcedon
    (451 AD); Translation philosophy #3 Preserve theological tension rather than resolve
    it.'
