theological_decisions:
- issue: Nature of the judgment imagery
  chosen_reading: Retain the concrete imagery of worm and fire without interpreting
    it in the translation as annihilation, torment, or metaphor only.
  alternative_readings:
  - Read as emphasizing ongoing conscious punishment
  - Read as emphasizing irreversible destruction
  - Read as primarily metaphorical shame and defilement
  rationale: The verse presents vivid judgment imagery and alludes to Isaiah 66:24,
    but does not itself require the translator to resolve broader doctrinal debates
    about hell. Following the translation philosophy, the wording preserves the text's
    tension rather than importing a specific theological system.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
