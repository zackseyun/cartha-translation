id: MRK.9.48
reference: Mark 9:48
source:
  edition: SBLGNT
  text: ὅπου ὁ σκώληξ αὐτῶν οὐ τελευτᾷ καὶ τὸ πῦρ οὐ σβέννυται.
translation:
  text: where their worm does not die, and the fire is not quenched.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their maggot does not come to an end, and the fire is not put out.'
    reason: lexical_alternative
  - marker: b
    text: This line echoes Isaiah 66:24.
    reason: cross_reference
lexical_decisions:
- source_word: ὅπου
  chosen: where
  alternatives:
  - in the place where
  lexicon: BDAG
  rationale: Relative adverb introducing the location/condition described; simple
    'where' is natural and sufficiently formal.
- source_word: σκώληξ
  chosen: worm
  alternatives:
  - maggot
  lexicon: BDAG
  rationale: '''Worm'' is the standard and broad rendering, matching both the Greek
    term and the Isaiah 66:24 allusion behind this saying. ''Maggot'' is possible
    in context of corpse-consumption, but ''worm'' better preserves the traditional
    imagery without over-specifying the species.'
- source_word: αὐτῶν
  chosen: their
  alternatives:
  - of them
  lexicon: BDAG
  rationale: 'Genitive pronoun naturally rendered as possessive in English: ''their
    worm.'' This preserves the Greek construction and the personal association of
    the judgment image.'
- source_word: οὐ τελευτᾷ
  chosen: does not die
  alternatives:
  - does not come to an end
  - does not perish
  - does not cease
  lexicon: BDAG
  rationale: Although τελευτάω can mean 'come to an end' or 'die,' with σκώληξ as
    subject the idiomatic English rendering is 'does not die.' This also aligns with
    the underlying Isaiah wording and preserves the starkness of the image.
- source_word: πῦρ
  chosen: fire
  lexicon: BDAG
  rationale: Direct, literal rendering of the noun; no contextual reason to paraphrase.
- source_word: οὐ σβέννυται
  chosen: is not quenched
  alternatives:
  - is not put out
  - is not extinguished
  lexicon: BDAG
  rationale: Passive present is best represented by 'is not quenched,' a natural English
    equivalent that preserves the ongoing, unextinguished state. It also echoes established
    biblical diction and the Isaiah allusion.
