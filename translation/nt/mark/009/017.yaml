theological_decisions:
- issue: Meaning of πνεῦμα in this exorcism context
  chosen_reading: spirit, specifically an evil/demonic spirit implied by context
  alternative_readings:
  - spirit in a more general sense
  rationale: In Mark's narrative context, the father is describing a possessing spirit
    afflicting his son. The Greek text here says only 'spirit,' so the main text preserves
    that wording rather than adding 'evil' or 'demon.'
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
