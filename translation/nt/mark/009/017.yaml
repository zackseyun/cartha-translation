id: MRK.9.17
reference: Mark 9:17
source:
  edition: SBLGNT
  text: καὶ ⸂ἀπεκρίθη αὐτῷ εἷς ἐκ τοῦ ὄχλου⸃· Διδάσκαλε, ἤνεγκα τὸν υἱόν μου πρὸς
    σέ, ἔχοντα πνεῦμα ἄλαλον·
translation:
  text: And one from the crowd answered him, “Teacher, I brought my son to you, because
    he has a mute spirit.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “who has a mute spirit.”
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπεκρίθη
  chosen: answered
  alternatives:
  - replied
  lexicon: BDAG
  rationale: Standard narrative verb for responding. 'Answered' preserves the common
    Gospel idiom without unnecessary expansion.
- source_word: εἷς ἐκ τοῦ ὄχλου
  chosen: one from the crowd
  alternatives:
  - one of the crowd
  - a man from the crowd
  lexicon: BDAG
  rationale: This renders the partitive expression naturally in English while preserving
    the indefinite singular sense. 'A man' is possible by implication, but the Greek
    states only 'one'.
- source_word: Διδάσκαλε
  chosen: Teacher
  alternatives:
  - Master
  lexicon: BDAG
  rationale: The vocative of διδάσκαλος is best rendered 'Teacher' in modern English.
    'Master' can suggest authority more than instruction and is less precise here.
- source_word: ἤνεγκα
  chosen: I brought
  alternatives:
  - I have brought
  lexicon: BDAG
  rationale: The aorist is well represented by simple past in English narrative. Present
    perfect is possible but less natural in this context.
- source_word: υἱόν
  chosen: son
  alternatives:
  - boy
  - child
  lexicon: BDAG
  rationale: The lexical sense is 'son.' Although the referent is a youth, the familial
    relationship is foregrounded, so 'son' is preferable.
- source_word: πρὸς σέ
  chosen: to you
  alternatives:
  - before you
  lexicon: BDAG
  rationale: In this context πρός with accusative after 'brought' is naturally rendered
    'to you.'
- source_word: ἔχοντα
  chosen: because he has
  alternatives:
  - having
  - who has
  lexicon: BDAG
  rationale: The participle modifies 'my son' and explains his condition. English
    idiom prefers an explicit finite clause here. 'Because he has' makes the explanatory
    force clear and readable.
- source_word: πνεῦμα ἄλαλον
  chosen: a mute spirit
  alternatives:
  - a spirit that makes him unable to speak
  - a speechless spirit
  lexicon: BDAG
  rationale: This is the most direct and idiomatic rendering. 'Mute' preserves the
    adjectival force of ἄλαλον and the likely demonic sense of πνεῦμα in context without
    over-paraphrase.
