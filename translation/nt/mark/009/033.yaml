theological_decisions:
- issue: Narrative subject of ἦλθον and subsequent singular participle/verb
  chosen_reading: 'Translate the plural arrival as ''they came'' and the singular
    subsequent action as Jesus speaking: ''when he was in the house, he was asking
    them.'''
  alternative_readings:
  - 'Translate more explicitly: ''they came... and after he entered the house, he
    asked them'''
  rationale: The Greek shifts from plural to singular naturally in context, with Jesus
    as the implied singular subject. This is a narrative/grammatical decision rather
    than a doctrinally contested one, but making the subject clear in English avoids
    ambiguity.
