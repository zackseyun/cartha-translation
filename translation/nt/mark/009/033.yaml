id: MRK.9.33
reference: Mark 9:33
source:
  edition: SBLGNT
  text: Καὶ ⸀ἦλθον εἰς Καφαρναούμ. καὶ ἐν τῇ οἰκίᾳ γενόμενος ἐπηρώτα αὐτούς· Τί ἐν
    τῇ ⸀ὁδῷ διελογίζεσθε;
translation:
  text: And they came to Capernaum. And when he was in the house, he was asking them,
    “What were you discussing on the way?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “were you arguing on the way?” The verb can refer to discussion, debate,
      or dispute; the following verse shows the topic was which of them was greatest.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἦλθον
  chosen: they came
  alternatives:
  - they went
  - they arrived
  lexicon: BDAG
  rationale: Aorist of ἔρχομαι here narrates arrival at Capernaum. English 'came'
    is the most natural narrative equivalent with εἰς + place. 'Arrived' is possible
    but less direct.
- source_word: Καφαρναούμ
  chosen: Capernaum
  rationale: Personal/place names are transliterated by standard English convention
    per project philosophy.
- source_word: ἐν τῇ οἰκίᾳ
  chosen: in the house
  alternatives:
  - at home
  - in the home
  lexicon: BDAG
  rationale: The article is present and should be reflected. 'In the house' preserves
    the concrete setting better than the more interpretive 'at home.'
- source_word: γενόμενος
  chosen: when he was
  alternatives:
  - after he came
  - once he was there
  - having come
  lexicon: BDAG
  rationale: The participle of γίνομαι here functions temporally with the following
    finite verb. 'When he was' gives clear English while preserving the temporal sense
    without overtranslating the participle.
- source_word: ἐπηρώτα
  chosen: he was asking
  alternatives:
  - he asked
  - he questioned
  lexicon: BDAG
  rationale: Imperfect tense suggests ongoing or attempted action in narrative. 'He
    was asking' preserves that aspect better than simple past 'he asked.'
- source_word: Τί
  chosen: What
  alternatives:
  - About what
  lexicon: BDAG
  rationale: Direct interrogative neuter singular used adverbially/objectively in
    the question. Simple 'What' is idiomatic and sufficiently precise.
- source_word: ἐν τῇ ὁδῷ
  chosen: on the way
  alternatives:
  - on the road
  - along the way
  lexicon: BDAG
  rationale: Although literally 'in the way/road,' the idiomatic English equivalent
    in travel context is 'on the way.' This also fits Markan usage naturally.
- source_word: διελογίζεσθε
  chosen: were you discussing
  alternatives:
  - were you arguing
  - were you reasoning among yourselves
  - were you debating
  lexicon: BDAG
  rationale: διαλογίζομαι can denote discussion, deliberation, or dispute depending
    on context. In light of the next verse revealing a dispute about greatness, 'arguing'
    is contextually possible, but this verse itself does not yet specify the tone.
    'Discussing' preserves the lexical breadth without importing the sharper nuance
    too early.
