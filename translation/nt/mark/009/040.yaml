theological_decisions:
- issue: Scope of alignment expressed by 'for us'/'against us'
  chosen_reading: Retain the relational language 'against us' and 'for us' without
    expanding it to 'against God' or 'for the kingdom.'
  alternative_readings:
  - Whoever is not opposed to our mission is on our side
  - Whoever is not against God is for God
  rationale: The Greek explicitly speaks in first-person plural terms. The translation
    preserves Jesus' wording and leaves the interpretive scope to context rather than
    importing a broader doctrinal paraphrase.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
