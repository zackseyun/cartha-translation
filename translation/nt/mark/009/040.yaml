id: MRK.9.40
reference: Mark 9:40
source:
  edition: SBLGNT
  text: ὃς γὰρ οὐκ ἔστιν καθ’ ⸂ἡμῶν, ὑπὲρ ἡμῶν⸃ ἐστιν.
translation:
  text: For whoever is not against us is for us.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'on our side.' The Greek phrase ὑπὲρ ἡμῶν can also carry the sense 'on
      our behalf' or 'on our side.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὃς
  chosen: whoever
  alternatives:
  - he who
  - the one who
  lexicon: BDAG
  rationale: The relative pronoun is used generically and substantivally. 'Whoever'
    gives natural modern English while preserving the indefinite/general force better
    than the more wooden 'he who.'
- source_word: γὰρ
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: BDAG
  rationale: γάρ introduces an explanation for the preceding statement. 'For' is concise
    and idiomatic in English for explanatory linkage.
- source_word: οὐκ ἔστιν
  chosen: is not
  alternatives:
  - is not found to be
  lexicon: BDAG
  rationale: A straightforward negated copula; simple present 'is not' best matches
    the Greek without unnecessary expansion.
- source_word: καθ’ ἡμῶν
  chosen: against us
  alternatives:
  - opposed to us
  - on our side against us
  lexicon: BDAG
  rationale: κατά with the genitive here expresses opposition. 'Against us' is the
    standard and clearest rendering in context.
- source_word: ὑπὲρ ἡμῶν
  chosen: for us
  alternatives:
  - on our behalf
  - on our side
  lexicon: BDAG
  rationale: ὑπέρ with the genitive can mean 'for, on behalf of.' In this antithetical
    saying, 'for us' is the most natural counterpart to 'against us' and preserves
    the concise parallelism.
- source_word: ἐστιν
  chosen: is
  lexicon: BDAG
  rationale: Simple copula completing the antithesis; rendered directly as 'is.'
