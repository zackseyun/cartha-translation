id: MRK.9.25
reference: Mark 9:25
source:
  edition: SBLGNT
  text: ἰδὼν δὲ ὁ Ἰησοῦς ὅτι ἐπισυντρέχει ὄχλος ἐπετίμησεν τῷ πνεύματι τῷ ἀκαθάρτῳ
    λέγων αὐτῷ· Τὸ ⸂ἄλαλον καὶ κωφὸν πνεῦμα⸃, ἐγὼ ⸂ἐπιτάσσω σοι⸃, ἔξελθε ἐξ αὐτοῦ
    καὶ μηκέτι εἰσέλθῃς εἰς αὐτόν.
translation:
  text: But when Jesus saw that a crowd was quickly gathering, he rebuked the unclean
    spirit, saying to it, “You mute and deaf spirit, I command you, come out of him
    and never enter him again.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a crowd was running together.' The Greek verb suggests people converging
      rapidly.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἰδὼν δὲ
  chosen: But when ... saw
  alternatives:
  - And when ... saw
  - Now when ... saw
  lexicon: BDAG
  rationale: ἰδών is an aorist participle introducing the circumstance for the main
    verb; δέ is a mild connective. 'But when' gives natural English flow while preserving
    the narrative transition and temporal force.
- source_word: ἐπισυντρέχει ὄχλος
  chosen: a crowd was quickly gathering
  alternatives:
  - a crowd was running together
  - a crowd was gathering
  lexicon: BDAG
  rationale: ἐπισυντρέχω conveys people converging or running together. 'Was quickly
    gathering' captures the inceptive/imperfective sense in context and reads naturally
    in English without losing the urgency.
- source_word: ἐπετίμησεν
  chosen: rebuked
  alternatives:
  - warned sternly
  - censured
  lexicon: BDAG
  rationale: ἐπιτιμάω is the standard Gospel verb for Jesus' authoritative rebuke
    of demons, winds, and persons. 'Rebuked' preserves that authoritative force and
    intertextual consistency.
- source_word: τῷ πνεύματι τῷ ἀκαθάρτῳ
  chosen: the unclean spirit
  alternatives:
  - the impure spirit
  lexicon: BDAG
  rationale: ἀκάθαρτος in exorcism contexts is conventionally and accurately rendered
    'unclean,' preserving the ritual/moral impurity connotations present in the Gospel
    idiom.
- source_word: Τὸ ἄλαλον καὶ κωφὸν πνεῦμα
  chosen: You mute and deaf spirit
  alternatives:
  - You speechless and deaf spirit
  - O mute and deaf spirit
  lexicon: BDAG
  rationale: Though the Greek has the article with nominative address, English direct
    address is best rendered with 'You ... spirit.' ἄλαλος is 'mute'/'unable to speak';
    κωφός is 'deaf' and can in some contexts overlap with speech impairment, but here
    the pair is best kept distinct as 'mute and deaf.'
- source_word: ἐγὼ ἐπιτάσσω σοι
  chosen: I command you
  alternatives:
  - I myself command you
  - I order you
  lexicon: BDAG
  rationale: ἐπιτάσσω denotes authoritative command. The explicit ἐγώ adds emphasis,
    but English can convey this sufficiently with 'I command you' in this context
    without over-weighting the pronoun.
- source_word: ἔξελθε ἐξ αὐτοῦ
  chosen: come out of him
  alternatives:
  - go out of him
  lexicon: BDAG
  rationale: For exorcism language, 'come out' is idiomatic English and preserves
    the imperative force of ἔξελθε.
- source_word: μηκέτι εἰσέλθῃς εἰς αὐτόν
  chosen: never enter him again
  alternatives:
  - do not enter him again any longer
  - never go into him again
  lexicon: BDAG
  rationale: μηκέτι means 'no longer'/'no more,' and with the aorist subjunctive in
    prohibition here the sense is a decisive ban on future reentry. 'Never enter him
    again' is concise and forceful in natural English.
