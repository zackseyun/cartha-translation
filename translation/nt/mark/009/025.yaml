theological_decisions:
- issue: Rendering of demonic terminology and Jesus' authority
  chosen_reading: Translate πνεῦμα ἀκάθαρτον straightforwardly as 'unclean spirit'
    and ἐπιτάσσω/ἐπετίμησεν with strong authority language ('rebuked,' 'I command
    you')
  alternative_readings:
  - evil spirit
  - impure spirit
  - he spoke harshly to the spirit
  rationale: The verse presents a personal demonic entity addressed directly by Jesus
    and subject to his command. The translation should neither soften this into vague
    illness language nor embellish beyond the text. 'Unclean spirit' preserves the
    Gospel's category, and the command language reflects Jesus' direct authority without
    importing extra doctrinal explanation.
  doctrine_reference: Affirmations; Translation philosophy §§1, 3, 6
