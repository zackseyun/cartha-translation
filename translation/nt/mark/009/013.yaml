theological_decisions:
- issue: Identity of Elijah in this saying
  chosen_reading: Retain 'Elijah' in the main text without interpretive expansion.
  alternative_readings:
  - Elijah refers typologically to John the Baptist
  rationale: The verse names Elijah explicitly. Although in context Jesus is understood
    to refer to John the Baptist as the Elijah who was to come, the translation should
    not import that identification into the wording of the verse itself. The theological
    connection is interpretive and belongs in a footnote rather than the main text.
  doctrine_reference: Preserve theological tension rather than resolve it.
