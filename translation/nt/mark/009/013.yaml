id: MRK.9.13
reference: Mark 9:13
source:
  edition: SBLGNT
  text: ἀλλὰ λέγω ὑμῖν ὅτι καὶ Ἠλίας ἐλήλυθεν, καὶ ἐποίησαν αὐτῷ ὅσα ⸀ἤθελον, καθὼς
    γέγραπται ἐπ’ αὐτόν.
translation:
  text: But I tell you that Elijah also has come, and they did to him whatever they
    wanted, just as it is written about him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: That is, Elijah has already come in the person and ministry of John the
      Baptist; see Mark 9:11–12 and compare Matthew 11:14; 17:12–13.
    reason: cross_reference
lexical_decisions:
- source_word: ἀλλὰ
  chosen: But
  alternatives:
  - Yet
  - However
  lexicon: BDAG
  rationale: Marks contrast with the disciples’ expectation about Elijah; 'But' is
    natural and sufficiently direct in English.
- source_word: λέγω ὑμῖν
  chosen: I tell you
  alternatives:
  - I say to you
  lexicon: BDAG
  rationale: A common direct-speech formula. 'I tell you' is idiomatic modern English
    while preserving the personal address.
- source_word: ὅτι καὶ Ἠλίας ἐλήλυθεν
  chosen: that Elijah also has come
  alternatives:
  - that even Elijah has come
  - that Elijah indeed has come
  lexicon: BDAG
  rationale: The perfect ἐλήλυθεν is best represented by 'has come,' emphasizing completed
    arrival with present relevance. καὶ is rendered 'also' to reflect that Elijah
    too has already come, in line with the preceding discussion.
- source_word: ἐποίησαν αὐτῷ
  chosen: they did to him
  alternatives:
  - they treated him
  - they did for/to him
  lexicon: BDAG
  rationale: A literal but clear rendering of ποιέω with dative pronoun. 'Did to him'
    preserves the open-ended, forceful sense before the following object clause specifies
    extent.
- source_word: ὅσα ἤθελον
  chosen: whatever they wanted
  alternatives:
  - whatever they wished
  - as much as they wanted
  lexicon: BDAG
  rationale: 'ὅσα with ἤθελον conveys unrestricted extent: ''whatever they wanted.''
    This is natural English and preserves the severity of the statement.'
- source_word: καθὼς γέγραπται
  chosen: just as it is written
  alternatives:
  - as it is written
  - just as has been written
  lexicon: BDAG
  rationale: γέγραπται is the standard scriptural citation formula. 'It is written'
    is the established and accurate English equivalent.
- source_word: ἐπ’ αὐτόν
  chosen: about him
  alternatives:
  - concerning him
  - against him
  lexicon: BDAG
  rationale: With γράφω in citation contexts, ἐπί + accusative commonly means 'about/concerning.'
    'About him' is the most natural English here. 'Against him' is possible in some
    contexts but less likely with γέγραπται in this construction.
