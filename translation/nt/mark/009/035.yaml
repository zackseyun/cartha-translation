theological_decisions:
- issue: Generic masculine reference in the conditional saying
  chosen_reading: Render τις with 'anyone' but retain the subsequent singular 'he'
    to reflect the Greek's grammatically masculine representative force.
  alternative_readings:
  - 'Render entirely gender-neutral: ''If anyone wants to be first, they will be last
    of all and servant of all.'''
  rationale: This follows the project's gender-accurate-over-gender-neutral policy.
    The Greek uses an indefinite singular with masculine predicates; 'anyone' communicates
    the generic scope, while 'he' preserves the singular representative form rather
    than flattening it into plural or singular 'they.'
  doctrine_reference: DOCTRINE.md § Translation philosophy, point 4
