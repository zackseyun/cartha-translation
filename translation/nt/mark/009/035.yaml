id: MRK.9.35
reference: Mark 9:35
source:
  edition: SBLGNT
  text: καὶ καθίσας ἐφώνησεν τοὺς δώδεκα καὶ λέγει αὐτοῖς· Εἴ τις θέλει πρῶτος εἶναι
    ἔσται πάντων ἔσχατος καὶ πάντων διάκονος.
translation:
  text: And sitting down, he called the twelve and says to them, “If anyone wants
    to be first, he will be last of all and servant of all.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Twelve.'
    reason: lexical_alternative
lexical_decisions:
- source_word: καθίσας
  chosen: sitting down
  alternatives:
  - having sat down
  - after sitting down
  lexicon: BDAG
  rationale: Aorist participle indicating the action of taking a seated posture before
    speaking. 'Sitting down' is natural English and preserves the narrative detail
    without overformal stiffness.
- source_word: ἐφώνησεν
  chosen: called
  alternatives:
  - summoned
  lexicon: BDAG
  rationale: φωνέω here means to call or summon the disciples to himself. 'Called'
    is the most natural rendering in context.
- source_word: τοὺς δώδεκα
  chosen: the twelve
  alternatives:
  - the Twelve
  lexicon: BDAG
  rationale: Refers to Jesus' inner apostolic group. Lowercase in the main text keeps
    the translation readable; the referent remains clear from context.
- source_word: λέγει
  chosen: says
  alternatives:
  - said
  - is saying
  lexicon: BDAG
  rationale: Present tense in Mark often functions as the historical present. Rendering
    it as 'says' preserves Mark's vivid narrative style better than smoothing it to
    the past tense.
- source_word: Εἴ τις θέλει
  chosen: If anyone wants
  alternatives:
  - If anyone desires
  - If someone wants
  lexicon: BDAG
  rationale: θέλω expresses desire or intention. 'If anyone wants' is idiomatic modern
    English and preserves the conditional force.
- source_word: πρῶτος εἶναι
  chosen: to be first
  alternatives:
  - to be foremost
  lexicon: BDAG
  rationale: Straightforward infinitival construction. 'First' best preserves the
    comparative status sense in context.
- source_word: ἔσται
  chosen: he will be
  alternatives:
  - let him be
  lexicon: BDAG
  rationale: Future middle indicative is best rendered as a future statement, not
    an imperative. The saying expresses the paradoxical condition attached to aspiring
    to first place.
- source_word: πάντων ἔσχατος
  chosen: last of all
  alternatives:
  - last of everyone
  - the last of all
  lexicon: BDAG
  rationale: Genitive πάντων is naturally rendered with an inclusive phrase. 'Last
    of all' is idiomatic and captures the superlative reversal.
- source_word: πάντων διάκονος
  chosen: servant of all
  alternatives:
  - minister of all
  - one who serves all
  lexicon: BDAG
  rationale: διάκονος denotes one who serves. 'Servant' is the clearest and most natural
    English equivalent here; 'minister' would sound ecclesiastical and misleading
    in this context.
