id: MRK.9.11
reference: Mark 9:11
source:
  edition: SBLGNT
  text: καὶ ἐπηρώτων αὐτὸν λέγοντες· Ὅτι λέγουσιν οἱ γραμματεῖς ὅτι Ἠλίαν δεῖ ἐλθεῖν
    πρῶτον;
translation:
  text: And they were asking him, saying, “Why do the scribes say that Elijah must
    come first?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “How is it that the scribes say that Elijah must come first?”
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπηρώτων
  chosen: were asking
  alternatives:
  - asked
  - questioned
  lexicon: BDAG
  rationale: Imperfect tense indicates ongoing or repeated action in narrative, best
    reflected by 'were asking' rather than simple past 'asked.'
- source_word: λέγοντες
  chosen: saying
  alternatives:
  - and said
  - asking
  lexicon: BDAG
  rationale: The participle introduces the content of their question. 'Saying' preserves
    the Greek structure naturally in English without collapsing it entirely into a
    finite verb.
- source_word: Ὅτι
  chosen: Why
  alternatives:
  - How is it that
  - Why is it that
  lexicon: BDAG
  rationale: Although literally 'that,' in this interrogative context it functions
    idiomatically to introduce a 'why/how is it that' question. 'Why' gives the plain
    sense in natural English.
- source_word: γραμματεῖς
  chosen: scribes
  alternatives:
  - teachers of the law
  lexicon: BDAG
  rationale: '''Scribes'' is the standard and sufficiently transparent rendering for
    γραμματεῖς in the Gospel context; it preserves the historical role without over-interpreting.'
- source_word: Ἠλίαν
  chosen: Elijah
  lexicon: BDAG
  rationale: Proper name transliterated according to standard English convention,
    in keeping with the translation philosophy to transliterate names.
- source_word: δεῖ
  chosen: must
  alternatives:
  - is necessary to
  - has to
  lexicon: BDAG
  rationale: δεῖ expresses necessity. 'Must' is concise and preserves the force of
    expected divine or scriptural necessity in context.
- source_word: ἐλθεῖν
  chosen: come
  alternatives:
  - arrive
  lexicon: BDAG
  rationale: The aorist infinitive after δεῖ is naturally rendered 'come.' 'Arrive'
    is possible but less idiomatic in this prophetic context.
- source_word: πρῶτον
  chosen: first
  lexicon: BDAG
  rationale: Adverbial accusative indicating temporal priority; 'first' is the direct
    and natural rendering.
