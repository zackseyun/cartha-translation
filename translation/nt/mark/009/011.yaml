theological_decisions:
- issue: Force of the disciples' question introduced by Ὅτι
  chosen_reading: Rendered as a direct 'Why' question about scribal teaching
  alternative_readings:
  - Rendered more literally as 'How is it that the scribes say...'
  rationale: The verse records a question about the scribes' teaching concerning Elijah's
    prior coming. Rendering Ὅτι as 'Why' communicates the interrogative force clearly
    in English without adding doctrinal interpretation.
  doctrine_reference: Translation philosophy §1, §6
- issue: Nature of Elijah's coming
  chosen_reading: Left as 'Elijah must come first' without interpretive expansion
  alternative_readings:
  - '''Elijah must first come again'''
  - '''Elijah must come before the Messiah'''
  rationale: The Greek text states only that Elijah must come first. Adding 'again'
    or specifying 'before the Messiah' would import interpretive content not explicit
    in this verse, even if contextually related.
  doctrine_reference: Affirmations; Translation philosophy §3
