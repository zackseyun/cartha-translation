theological_decisions:
- issue: Potential cultic or festival connotations of σκηνάς
  chosen_reading: Use the neutral main-text rendering 'shelters'
  alternative_readings:
  - booths
  - tabernacles
  rationale: The verse itself does not explicitly identify these structures with the
    Feast of Booths or with sanctuary/tabernacle theology. To avoid importing a stronger
    theological association than the text states, the main text uses a clear, non-technical
    term while preserving more traditional alternatives in a footnote.
  doctrine_reference: Translation philosophy §§1, 3, 6
