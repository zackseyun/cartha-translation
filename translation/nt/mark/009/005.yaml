id: MRK.9.5
reference: Mark 9:5
source:
  edition: SBLGNT
  text: καὶ ἀποκριθεὶς ὁ Πέτρος λέγει τῷ Ἰησοῦ· Ῥαββί, καλόν ἐστιν ἡμᾶς ὧδε εἶναι,
    καὶ ποιήσωμεν ⸂τρεῖς σκηνάς⸃, σοὶ μίαν καὶ Μωϋσεῖ μίαν καὶ Ἠλίᾳ μίαν.
translation:
  text: 'And Peter answered and said to Jesus, “Rabbi, it is good for us to be here,
    and let us make three shelters: one for you, one for Moses, and one for Elijah.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “booths” or “tabernacles.” The Greek σκηνάς refers to temporary shelters
      and may carry associations with booths/tents, but the verse does not make those
      associations explicit.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀποκριθεὶς
  chosen: answered
  alternatives:
  - responded
  lexicon: BDAG
  rationale: A conventional participial idiom in narrative Greek; 'answered' preserves
    the formal link with the source even though no explicit question precedes.
- source_word: λέγει
  chosen: said
  alternatives:
  - says
  lexicon: BDAG
  rationale: Although the Greek uses the historical present ('says'), English narrative
    style more naturally uses past tense here. This is a standard optimal-equivalence
    adjustment without loss of meaning.
- source_word: Ῥαββί
  chosen: Rabbi
  alternatives:
  - Teacher
  lexicon: BDAG
  rationale: This is a title/form of address rather than a personal name. Retaining
    'Rabbi' preserves the Semitic setting and the specific nuance of respectful address;
    'Teacher' is a possible sense but is less textually transparent here.
- source_word: καλόν ἐστιν ἡμᾶς ὧδε εἶναι
  chosen: it is good for us to be here
  alternatives:
  - it is good that we are here
  - it is good for us to be here
  lexicon: BDAG
  rationale: This rendering preserves the impersonal construction and Peter's evaluative
    statement. 'Good' is preferable to interpretive expansions such as 'wonderful'
    or 'right'.
- source_word: ποιήσωμεν
  chosen: let us make
  alternatives:
  - let us build
  - we should make
  lexicon: BDAG
  rationale: The first person aorist subjunctive is hortatory. 'Let us make' reflects
    the form directly; 'build' is possible by context but slightly more interpretive
    than the basic verb ποιέω.
- source_word: σκηνάς
  chosen: shelters
  alternatives:
  - tabernacles
  - tents
  - booths
  lexicon: BDAG
  rationale: σκηνή can denote a tent, booth, or temporary shelter. 'Shelters' communicates
    the basic sense in clear modern English without importing the more archaic 'tabernacles.'
    Because 'booths' and 'tabernacles' may evoke the Feast of Booths or sanctuary
    imagery, those alternatives are preserved in a footnote.
- source_word: σοὶ μίαν καὶ Μωϋσεῖ μίαν καὶ Ἠλίᾳ μίαν
  chosen: one for you, one for Moses, and one for Elijah
  lexicon: BDAG
  rationale: This preserves the distributive repetition of μίαν and the parallel structure
    of the Greek.
