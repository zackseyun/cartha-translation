id: MRK.9.21
reference: Mark 9:21
source:
  edition: SBLGNT
  text: καὶ ἐπηρώτησεν τὸν πατέρα αὐτοῦ· Πόσος χρόνος ἐστὶν ὡς τοῦτο γέγονεν αὐτῷ;
    ὁ δὲ εἶπεν· ⸀Ἐκ παιδιόθεν·
translation:
  text: And he asked his father, “How long has this been happening to him?” And he
    said, “From childhood.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Since childhood.”
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπηρώτησεν
  chosen: asked
  alternatives:
  - questioned
  - inquired of
  lexicon: BDAG
  rationale: Aorist of ἐπερωτάω here introduces straightforward speech. 'Asked' is
    natural modern English and adequately reflects the verb without adding formality
    or intensity not required by context.
- source_word: τὸν πατέρα αὐτοῦ
  chosen: his father
  alternatives:
  - the boy's father
  - the father of him
  lexicon: BDAG
  rationale: The pronoun αὐτοῦ most naturally refers to the afflicted boy in context.
    'His father' is concise and idiomatic; 'the boy's father' is interpretive clarification
    but unnecessary in the main text.
- source_word: Πόσος χρόνος ἐστὶν ὡς
  chosen: How long has
  alternatives:
  - How much time is it since
  - How long is it that
  lexicon: BDAG
  rationale: This idiom asks duration from a starting point until now. Rendering it
    as 'How long has' captures the sense in clear contemporary English rather than
    reproducing a wooden Greek structure.
- source_word: τοῦτο γέγονεν αὐτῷ
  chosen: this been happening to him
  alternatives:
  - this happened to him
  - this come upon him
  lexicon: BDAG
  rationale: γέγονεν is perfect of γίνομαι, indicating a state or condition extending
    into the present. 'Been happening to him' best conveys the ongoing condition implied
    by the question in context, better than the overly punctiliar 'happened to him.'
- source_word: ὁ δὲ εἶπεν
  chosen: And he said
  alternatives:
  - But he said
  - Then he said
  lexicon: BDAG
  rationale: δέ here marks simple narrative progression/contrast. 'And he said' is
    smooth English in this context and avoids overstating contrast.
- source_word: Ἐκ παιδιόθεν
  chosen: From childhood
  alternatives:
  - Since childhood
  - From when he was a child
  lexicon: BDAG
  rationale: The preposition ἐκ with παιδιόθεν expresses origin from early childhood.
    'From childhood' is concise and idiomatic; 'since childhood' is also possible
    but slightly shifts the prepositional nuance.
