id: MRK.9.43
reference: Mark 9:43
source:
  edition: SBLGNT
  text: Καὶ ἐὰν ⸀σκανδαλίζῃ σε ἡ χείρ σου, ἀπόκοψον αὐτήν· καλόν ⸂ἐστίν σε⸃ κυλλὸν
    ⸂εἰσελθεῖν εἰς τὴν ζωὴν⸃ ἢ τὰς δύο χεῖρας ἔχοντα ἀπελθεῖν εἰς τὴν γέενναν, εἰς
    τὸ πῦρ τὸ ⸀ἄσβεστον.
translation:
  text: And if your hand causes you to stumble, cut it off. It is better for you to
    enter into life crippled than, having two hands, to go away into Gehenna, into
    the unquenchable fire.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or: ''causes you to sin.'' The Greek verb can mean to cause someone to
      stumble, fall, or sin.'
    reason: lexical_alternative
  - marker: b
    text: Gehenna is the Greek form of a place-name associated with divine judgment;
      traditionally rendered 'hell.'
    reason: alternative_reading
lexical_decisions:
- source_word: σκανδαλίζῃ
  chosen: causes you to stumble
  alternatives:
  - causes you to sin
  - makes you fall away
  lexicon: BDAG
  rationale: The verb literally carries the sense of causing someone to stumble or
    be ensnared. 'Causes you to stumble' preserves the metaphor present in the Greek
    and avoids prematurely narrowing it to only moral transgression, while still fitting
    the warning context.
- source_word: ἀπόκοψον
  chosen: cut it off
  alternatives:
  - cut it away
  - remove it
  lexicon: BDAG
  rationale: The aorist imperative is forceful and concrete. 'Cut it off' is the most
    direct natural English equivalent and preserves the severity of the saying.
- source_word: καλόν
  chosen: better
  alternatives:
  - good
  - advantageous
  lexicon: BDAG
  rationale: Although καλόν is literally 'good,' in this comparative construction
    with ἢ it idiomatically means 'better.' This is standard English for the Greek
    comparison.
- source_word: κυλλόν
  chosen: crippled
  alternatives:
  - maimed
  - disabled
  lexicon: BDAG
  rationale: κυλλός refers to being mutilated or deprived of a limb. 'Crippled' is
    concise and idiomatic in this context, matching the image of entering without
    a hand. 'Maimed' is possible, but 'crippled' reads more naturally here.
- source_word: εἰσελθεῖν εἰς τὴν ζωὴν
  chosen: to enter into life
  alternatives:
  - to enter life
  lexicon: BDAG
  rationale: The phrase is a standard eschatological expression. 'Enter into life'
    preserves the preposition and the solemnity of the expression, referring to participation
    in true life rather than mere biological existence.
- source_word: ἀπελθεῖν
  chosen: to go away
  alternatives:
  - to depart
  - to go
  lexicon: BDAG
  rationale: The verb is more specific than a simple 'go.' 'Go away' preserves the
    directional nuance and the contrast with 'enter into life.'
- source_word: γέενναν
  chosen: Gehenna
  alternatives:
  - hell
  lexicon: BDAG
  rationale: The Greek term names Gehenna specifically, rooted in Jewish imagery and
    judgment language. Translating it as 'Gehenna' preserves the source term and avoids
    importing later English associations tied to 'hell.' The more familiar alternative
    is preserved in a footnote.
- source_word: ἄσβεστον
  chosen: unquenchable
  alternatives:
  - that cannot be put out
  - inextinguishable
  lexicon: BDAG
  rationale: ἄσβεστος means not extinguished or not able to be extinguished. 'Unquenchable'
    is the established and precise English equivalent in judgment contexts.
- source_word: χεὶρ σου
  chosen: your hand
  lexicon: BDAG
  rationale: A straightforward literal rendering is appropriate; the body-part imagery
    is central to the warning and should not be softened.
- source_word: τὰς δύο χεῖρας ἔχοντα
  chosen: having two hands
  alternatives:
  - with both hands
  lexicon: BDAG
  rationale: The participial phrase is rendered explicitly to preserve the contrast
    between self-denial now and full bodily possession leading to judgment. 'Having
    two hands' closely follows the Greek structure.
