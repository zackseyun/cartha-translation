theological_decisions:
- issue: Rendering of γέεννα in a judgment saying
  chosen_reading: Gehenna
  alternative_readings:
  - hell
  rationale: The translation follows original-language primacy by preserving the specific
    Jewish term γέεννα rather than collapsing it into the broader English theological
    term 'hell.' This keeps the imagery anchored in the text itself while allowing
    the common interpretive equivalent to be noted in a footnote.
  doctrine_reference: Translation philosophy §1; Preserve theological tension rather
    than resolve it where needed
- issue: Force of the warning imagery about cutting off the hand
  chosen_reading: Retain the concrete bodily language without interpretive softening
  alternative_readings:
  - Paraphrastic moralized renderings that reduce it to general avoidance of sin
  rationale: The verse uses shocking embodied imagery to stress the seriousness of
    sin and judgment. The translation preserves that rhetoric rather than explaining
    it away in the main text.
  doctrine_reference: 'Translation philosophy: Never paraphrase beyond what the source
    text warrants'
