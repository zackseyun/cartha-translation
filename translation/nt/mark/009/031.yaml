id: MRK.9.31
reference: Mark 9:31
source:
  edition: SBLGNT
  text: ἐδίδασκεν γὰρ τοὺς μαθητὰς αὐτοῦ καὶ ἔλεγεν αὐτοῖς ὅτι Ὁ υἱὸς τοῦ ἀνθρώπου
    παραδίδοται εἰς χεῖρας ἀνθρώπων, καὶ ἀποκτενοῦσιν αὐτόν, καὶ ἀποκτανθεὶς ⸂μετὰ
    τρεῖς ἡμέρας⸃ ἀναστήσεται.
translation:
  text: For he was teaching his disciples and telling them, “The Son of Man is being
    handed over into the hands of men, and they will kill him, and after three days,
    having been killed, he will rise.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “into human hands.” The Greek literally says “into the hands of men.”
    reason: lexical_alternative
  - marker: b
    text: Or “in three days.” Here the Greek reads “after three days,” a phrasing
      also used elsewhere alongside “on the third day.”
    reason: alternative_reading
lexical_decisions:
- source_word: ἐδίδασκεν
  chosen: was teaching
  alternatives:
  - taught
  lexicon: BDAG
  rationale: Imperfect tense conveys ongoing or repeated action in the narrative background,
    so the progressive English form best reflects the aspect.
- source_word: γὰρ
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: BDAG
  rationale: Marks explanation for the preceding context; 'For' preserves the connective
    force without overinterpreting.
- source_word: μαθητὰς
  chosen: disciples
  alternatives:
  - students
  - learners
  lexicon: BDAG
  rationale: Standard Gospel rendering that preserves the relational and apprenticeship
    sense of the term.
- source_word: ἔλεγεν
  chosen: telling
  alternatives:
  - was saying
  - said
  lexicon: BDAG
  rationale: Another imperfect; paired with 'was teaching' to reflect continued instruction.
    'Telling' is natural English with a personal indirect object ('them').
- source_word: Ὁ υἱὸς τοῦ ἀνθρώπου
  chosen: The Son of Man
  lexicon: BDAG
  rationale: Established translation of the self-designation, preserving both its
    idiomatic force and its possible Danielic resonance without paraphrase.
- source_word: παραδίδοται
  chosen: is being handed over
  alternatives:
  - is delivered over
  - is betrayed
  lexicon: BDAG
  rationale: Present passive indicates an impending or unfolding handing over. 'Handed
    over' preserves the broad semantic range, whereas 'betrayed' would narrow the
    agency too quickly and 'delivered over' is less natural in modern English.
- source_word: εἰς χεῖρας ἀνθρώπων
  chosen: into the hands of men
  alternatives:
  - into human hands
  - to men
  lexicon: BDAG
  rationale: Retains the concrete idiom 'into the hands of' for power/control. 'Men'
    matches the Greek ἀνθρώπων here as human agents in contrast with the Son of Man;
    'human hands' is possible but less direct. This follows the project's gender-accurate
    principle rather than flattening to a neutral abstraction.
- source_word: ἀποκτενοῦσιν
  chosen: they will kill
  alternatives:
  - they will put to death
  lexicon: BDAG
  rationale: Future active plural with unspecified human agents. 'Kill' is the plain
    and direct sense in readable modern English.
- source_word: ἀποκτανθεὶς
  chosen: having been killed
  alternatives:
  - when he has been killed
  - after being killed
  lexicon: BDAG
  rationale: Aorist passive participle denotes action prior to the main future verb.
    'Having been killed' preserves that sequence explicitly, even though it is slightly
    formal.
- source_word: μετὰ τρεῖς ἡμέρας
  chosen: after three days
  alternatives:
  - in three days
  lexicon: BDAG
  rationale: The preposition μετά with the accusative normally means 'after.' This
    should be translated according to the Greek here rather than harmonized to other
    resurrection-prediction phrasings.
- source_word: ἀναστήσεται
  chosen: he will rise
  alternatives:
  - he will be raised
  - he will arise
  lexicon: BDAG
  rationale: Future middle naturally supports the intransitive 'rise.' This preserves
    the Greek wording here without importing the passive form found in some other
    resurrection statements.
