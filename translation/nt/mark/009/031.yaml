theological_decisions:
- issue: Rendering ἀνθρώπων in contrast with Ὁ υἱὸς τοῦ ἀνθρώπου
  chosen_reading: men
  alternative_readings:
  - people
  - human beings
  - human hands
  rationale: The verse juxtaposes 'the Son of Man' with ordinary human agents. Rendering
    ἀνθρώπων as 'men' preserves the lexical and rhetorical contrast more transparently
    than a neutral abstraction, while not making a doctrinal claim beyond the text.
  doctrine_reference: Translation philosophy §4 (Gender-accurate over gender-neutral)
- issue: Voice and nuance of παραδίδοται
  chosen_reading: is being handed over
  alternative_readings:
  - is betrayed
  - is delivered over
  rationale: The Greek passive does not specify the agent and can encompass betrayal,
    arrest, and divine permission without collapsing them into one. The chosen rendering
    preserves that theological tension rather than resolving it prematurely.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
