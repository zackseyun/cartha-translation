id: MRK.9.24
reference: Mark 9:24
source:
  edition: SBLGNT
  text: ⸀εὐθὺς κράξας ὁ πατὴρ τοῦ ⸀παιδίου ἔλεγεν· ⸀Πιστεύω· βοήθει μου τῇ ἀπιστίᾳ.
translation:
  text: Immediately the father of the child cried out and said, “I believe; help my
    unbelief!”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the child's father.” The Greek παιδίον can mean “child” or “boy” depending
      on context.
    reason: lexical_alternative
  - marker: b
    text: Or “help my lack of faith.” The Greek ἀπιστία can denote unbelief or deficiency
      of faith.
    reason: alternative_reading
lexical_decisions:
- source_word: εὐθύς
  chosen: Immediately
  alternatives:
  - At once
  - Straightway
  lexicon: BDAG
  rationale: Marks the promptness of the father's response. 'Immediately' is natural
    modern English and preserves Mark's characteristic sense of urgency better than
    the archaic 'straightway.'
- source_word: κράξας
  chosen: cried out
  alternatives:
  - shouted
  - cried
  lexicon: BDAG
  rationale: The aorist participle conveys a loud, urgent vocal response. 'Cried out'
    preserves both the emotional intensity and the audible force without over-specifying
    volume.
- source_word: ὁ πατὴρ τοῦ παιδίου
  chosen: the father of the child
  alternatives:
  - the child's father
  - the father of the boy
  lexicon: BDAG
  rationale: παιδίον can mean 'child' or 'boy.' 'Child' stays closest to the lexical
    range without unnecessarily narrowing to male reference in English, even though
    the broader context identifies the child as a son. The genitival phrase is rendered
    transparently.
- source_word: ἔλεγεν
  chosen: said
  alternatives:
  - was saying
  - kept saying
  lexicon: BDAG
  rationale: The imperfect can suggest ongoing or inceptive speech, but in idiomatic
    English introducing direct discourse, 'said' is the most natural rendering. The
    preceding participle already carries the vividness of the scene.
- source_word: Πιστεύω
  chosen: I believe
  alternatives:
  - I have faith
  - I trust
  lexicon: BDAG
  rationale: πιστεύω is best rendered here as 'believe,' matching the immediate context
    of faith and doubt. This aligns with the project's default handling of the πίστις
    word group as 'faith'/'believe' unless context strongly favors another nuance.
- source_word: βοήθει
  chosen: help
  alternatives:
  - come to the aid of
  - assist
  lexicon: BDAG
  rationale: The present imperative is a direct plea for aid. 'Help' is concise, natural,
    and preserves the urgency of the petition.
- source_word: μου τῇ ἀπιστίᾳ
  chosen: my unbelief
  alternatives:
  - my lack of faith
  - my faithlessness
  lexicon: BDAG
  rationale: ἀπιστία denotes unbelief or lack of faith. 'My unbelief' is the most
    direct and traditional rendering, preserving the paradox of simultaneous belief
    and deficient faith. 'Faithlessness' could imply disloyalty more than doubt here,
    so it is not preferred.
