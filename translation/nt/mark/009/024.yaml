theological_decisions:
- issue: Rendering the tension between Πιστεύω and ἀπιστίᾳ
  chosen_reading: 'Retain the paradox in the main text: ''I believe; help my unbelief!'''
  alternative_readings:
  - I do believe; help my lack of faith!
  - I believe; help my faithlessness!
  rationale: The verse intentionally preserves a tension between genuine belief and
    remaining unbelief. Following the translation philosophy, the rendering should
    not smooth out or resolve that tension into a more systematic theological statement.
    The direct paradox is central to the father's plea and should remain audible in
    English.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
