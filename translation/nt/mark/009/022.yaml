id: MRK.9.22
reference: Mark 9:22
source:
  edition: SBLGNT
  text: καὶ πολλάκις ⸂καὶ εἰς πῦρ αὐτὸν⸃ ἔβαλεν καὶ εἰς ὕδατα ἵνα ἀπολέσῃ αὐτόν· ἀλλ’
    εἴ τι ⸀δύνῃ, βοήθησον ἡμῖν σπλαγχνισθεὶς ἐφ’ ἡμᾶς.
translation:
  text: And many times it has thrown him both into fire and into waters to destroy
    him. But if you can do anything, help us, having compassion on us.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'into the water.' Greek has the plural 'into waters.'
    reason: lexical_alternative
  - marker: b
    text: Or 'moved with compassion toward us' or 'having mercy on us.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πολλάκις
  chosen: many times
  alternatives:
  - often
  - frequently
  lexicon: BDAG
  rationale: Adverb indicating repeated occurrence. 'Many times' is natural English
    and preserves the sense of repeated episodes without sounding overly formal.
- source_word: ἔβαλεν
  chosen: has thrown
  alternatives:
  - threw
  - casts
  lexicon: BDAG
  rationale: Aorist here summarizes repeated past action. English present perfect
    ('has thrown') fits the father's report of what has repeatedly happened up to
    the present better than a simple past in this context.
- source_word: εἰς πῦρ ... καὶ εἰς ὕδατα
  chosen: into fire and into waters
  alternatives:
  - into the fire and into the water
  - into fire and into water
  lexicon: BDAG
  rationale: The repeated preposition is preserved for emphasis. 'Waters' reflects
    the Greek plural ὕδατα more closely than singular 'water,' while remaining understandable
    in English.
- source_word: ἵνα ἀπολέσῃ αὐτόν
  chosen: to destroy him
  alternatives:
  - so that it might destroy him
  - to kill him
  lexicon: BDAG
  rationale: ἵνα with subjunctive expresses purpose. 'To destroy him' is a clear infinitival
    rendering that preserves the destructive intent without narrowing ἀπόλλυμι to
    only physical killing.
- source_word: ἀλλ’ εἴ τι δύνῃ
  chosen: But if you can do anything
  alternatives:
  - But if you are able to do anything
  - But if you can
  lexicon: BDAG
  rationale: The indefinite τι is significant and should be represented as 'anything.'
    The clause expresses the father's tentative appeal and uncertainty.
- source_word: βοήθησον ἡμῖν
  chosen: help us
  alternatives:
  - come to our aid
  - help us out
  lexicon: BDAG
  rationale: Aorist imperative ζητά immediate assistance. 'Help us' is direct, natural,
    and faithful.
- source_word: σπλαγχνισθεὶς ἐφ’ ἡμᾶς
  chosen: having compassion on us
  alternatives:
  - moved with compassion toward us
  - taking pity on us
  - having mercy on us
  lexicon: BDAG
  rationale: σπλαγχνίζομαι denotes deep compassion. 'Having compassion on us' preserves
    the participial form and emotional force without archaic diction. ἐπί with accusative
    is rendered naturally as 'on us.'
