theological_decisions:
- issue: Tone of the father's appeal and implied uncertainty about Jesus' ability
  chosen_reading: Render the clause straightforwardly as 'if you can do anything'
    without softening or resolving the tension.
  alternative_readings:
  - if you are able to do anything
  - if somehow you can do anything
  rationale: The Greek plainly expresses hesitation on the father's part. In keeping
    with the translation philosophy, the wording preserves that tension rather than
    smoothing it into a more confident confession.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
