id: MRK.9.10
reference: Mark 9:10
source:
  edition: SBLGNT
  text: καὶ τὸν λόγον ἐκράτησαν πρὸς ἑαυτοὺς συζητοῦντες τί ἐστιν τὸ ἐκ νεκρῶν ἀναστῆναι.
translation:
  text: And they kept the matter to themselves, discussing what it meant to rise from
    the dead.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the saying' or 'the word.'
    reason: lexical_alternative
  - marker: b
    text: More literally, 'the rising from among the dead.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τὸν λόγον
  chosen: the matter
  alternatives:
  - the word
  - the saying
  - this statement
  lexicon: BDAG
  rationale: λόγος here refers not to a single lexical 'word' but to the statement
    Jesus had just given (v. 9). 'The matter' is natural English that captures the
    referential sense, while avoiding an overly wooden rendering. 'The saying' is
    also possible and is preserved as an alternative.
- source_word: ἐκράτησαν
  chosen: kept
  alternatives:
  - held fast
  - kept hold of
  - observed
  lexicon: BDAG
  rationale: κρατέω commonly means 'to seize/hold/keep.' In this context, with πρὸς
    ἑαυτούς, it means they retained or kept the statement among themselves. 'Kept'
    best fits idiomatic English and the narrative sense.
- source_word: πρὸς ἑαυτοὺς
  chosen: to themselves
  alternatives:
  - among themselves
  - within themselves
  lexicon: BDAG
  rationale: The phrase indicates that they did not spread the matter beyond their
    own circle. 'To themselves' is concise and idiomatic; 'among themselves' is a
    close alternative.
- source_word: συζητοῦντες
  chosen: discussing
  alternatives:
  - debating
  - questioning
  - arguing
  lexicon: BDAG
  rationale: The participle denotes active conversation or deliberation. 'Discussing'
    fits the context of puzzled private conversation without overstating conflict,
    whereas 'arguing' or 'debating' may suggest sharper disagreement than the text
    requires.
- source_word: τί ἐστιν
  chosen: what it meant
  alternatives:
  - what it is
  - what this means
  lexicon: BDAG
  rationale: Although literally 'what it is,' English idiom in this context calls
    for an interpretive expression. The disciples are trying to understand the significance
    of Jesus' phrase, so 'what it meant' communicates the sense naturally.
- source_word: τὸ ἐκ νεκρῶν ἀναστῆναι
  chosen: to rise from the dead
  alternatives:
  - the rising from the dead
  - to rise from among the dead
  lexicon: BDAG
  rationale: The articular infinitive functions as the content of their discussion.
    'To rise from the dead' is clear modern English and preserves the resurrection
    sense. 'From among the dead' is more literal to ἐκ νεκρῶν but less idiomatic in
    English.
