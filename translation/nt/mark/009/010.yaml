theological_decisions:
- issue: Resurrection language in the disciples' discussion
  chosen_reading: to rise from the dead
  alternative_readings:
  - to rise from among the dead
  rationale: The verse presents the disciples puzzling over Jesus' statement about
    resurrection without explaining it away or importing later doctrinal clarification
    into their speech. The chosen rendering preserves the plain resurrection sense
    in accessible English while leaving the disciples' uncertainty intact.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
