theological_decisions:
- issue: Rendering of μετεμορφώθη in a christological context
  chosen_reading: was transfigured
  alternative_readings:
  - was transformed
  rationale: The verse describes the unique revelatory event traditionally called
    the Transfiguration. 'Was transfigured' best conveys a visible manifestation of
    glory without importing speculative explanation beyond the text. This aligns with
    historic orthodox Christology while remaining text-driven.
  doctrine_reference: 'Affirmations: Nicene Creed (381 AD); Definition of Chalcedon
    (451 AD)'
