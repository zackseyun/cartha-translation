id: MRK.9.16
reference: Mark 9:16
source:
  edition: SBLGNT
  text: καὶ ἐπηρώτησεν ⸀αὐτούς· Τί συζητεῖτε πρὸς ⸀αὑτούς;
translation:
  text: And he asked them, “What are you discussing with one another?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “What are you arguing about with one another?” The verb can carry the
      sense of dispute or debate depending on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπηρώτησεν
  chosen: asked
  alternatives:
  - questioned
  - inquired of
  lexicon: BDAG
  rationale: The aorist of ἐπερωτάω here introduces direct speech in a straightforward
    narrative setting. 'Asked' is the most natural modern English equivalent and adequately
    reflects the verb without overstating formality or intensity.
- source_word: αὐτούς
  chosen: them
  alternatives:
  - the crowd
  - the disciples and scribes
  lexicon: BDAG
  rationale: The pronoun's immediate referent in context is plural and not explicitly
    specified in the verse itself. 'Them' preserves the Greek's lack of specificity
    rather than importing a narrower identification into the translation.
- source_word: Τί
  chosen: What
  alternatives:
  - Why
  lexicon: BDAG
  rationale: τί in this construction asks about the content or subject of the discussion,
    not primarily the reason for it. 'What' best matches the plain sense.
- source_word: συζητεῖτε
  chosen: are you discussing
  alternatives:
  - are you arguing about
  - are you debating
  lexicon: BDAG
  rationale: συζητέω can denote discussion, debate, or argument depending on context.
    Because the immediate verse does not itself specify a hostile tone, 'are you discussing'
    preserves the broader sense while remaining natural English. The more adversarial
    nuance is possible from the wider context and is preserved as an alternative in
    a footnote.
- source_word: πρὸς ἑαυτούς
  chosen: with one another
  alternatives:
  - among yourselves
  - with yourselves
  lexicon: BDAG
  rationale: The idiom πρὸς ἑαυτούς here expresses reciprocal interaction among the
    group. 'With one another' is idiomatic English and clearly conveys the reciprocal
    sense better than the overly literal 'with yourselves.'
- source_word: καὶ
  chosen: And
  alternatives:
  - Then
  lexicon: BDAG
  rationale: καί simply links this action to the preceding narrative. 'And' preserves
    the connective force without adding temporal nuance beyond what the Greek states.
