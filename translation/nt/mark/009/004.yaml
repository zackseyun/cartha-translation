id: MRK.9.4
reference: Mark 9:4
source:
  edition: SBLGNT
  text: καὶ ὤφθη αὐτοῖς Ἠλίας σὺν Μωϋσεῖ, καὶ ἦσαν συλλαλοῦντες τῷ Ἰησοῦ.
translation:
  text: And Elijah appeared to them with Moses, and they were talking with Jesus.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'were conversing with Jesus.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὤφθη
  chosen: appeared
  alternatives:
  - was seen
  - became visible
  lexicon: BDAG
  rationale: Aorist passive of ὁράω used in an intransitive/passive sense meaning
    'appeared' or 'was seen.' 'Appeared' is the most natural modern English rendering
    and fits the narrative context of sudden manifestation.
- source_word: αὐτοῖς
  chosen: to them
  alternatives:
  - before them
  lexicon: BDAG
  rationale: Dative pronoun indicating the persons to whom Elijah appeared. 'To them'
    is the most direct rendering; 'before them' is possible idiomatically but less
    literal.
- source_word: Ἠλίας
  chosen: Elijah
  rationale: Standard English transliteration of the personal name, following the
    policy to transliterate names rather than translate them.
- source_word: σὺν
  chosen: with
  alternatives:
  - together with
  lexicon: BDAG
  rationale: The preposition straightforwardly expresses accompaniment. 'With' is
    clear and idiomatic; 'together with' would be more explicit but unnecessarily
    heavy.
- source_word: Μωϋσεῖ
  chosen: Moses
  rationale: Standard English transliteration of the personal name.
- source_word: συλλαλοῦντες
  chosen: talking
  alternatives:
  - speaking
  - conversing
  lexicon: BDAG
  rationale: The participle denotes speaking together or conversing. 'Talking' is
    natural modern English and preserves the mutual conversational sense without sounding
    overly formal.
- source_word: τῷ Ἰησοῦ
  chosen: with Jesus
  alternatives:
  - to Jesus
  lexicon: BDAG
  rationale: Although the dative could be rendered woodenly as 'to Jesus,' the compound
    verb συλλαλέω implies conversation with someone. 'With Jesus' best conveys the
    reciprocal sense in idiomatic English.
