theological_decisions:
- issue: Identity and reality of Elijah and Moses in the transfiguration scene
  chosen_reading: Render the verse straightforwardly as the appearance of Elijah with
    Moses speaking with Jesus, without interpretive qualification.
  alternative_readings:
  - visionary-only appearance
  - symbolic representation rather than personal appearance
  rationale: The Greek narrative presents Elijah and Moses as appearing and conversing
    with Jesus. The translation should not weaken this into a merely symbolic or subjective
    event, nor should it add doctrinal explanation beyond the text.
  doctrine_reference: Preserve theological tension rather than resolve it.
