id: MRK.9.19
reference: Mark 9:19
source:
  edition: SBLGNT
  text: ὁ δὲ ἀποκριθεὶς ⸀αὐτοῖς λέγει· Ὦ γενεὰ ἄπιστος, ἕως πότε πρὸς ὑμᾶς ἔσομαι;
    ἕως πότε ἀνέξομαι ὑμῶν; φέρετε αὐτὸν πρός με.
translation:
  text: And answering them, he says, “O unbelieving generation, how long will I be
    with you? How long will I put up with you? Bring him to me.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “faithless generation.” The Greek ἄπιστος can denote lack of belief or
      lack of faithfulness.
    reason: lexical_alternative
  - marker: b
    text: Or “How long will I endure/bear with you?”
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀποκριθεὶς
  chosen: answering
  alternatives:
  - in reply
  - responding
  lexicon: BDAG
  rationale: A participial form introducing Jesus' response. 'Answering' preserves
    the Greek structure and common narrative idiom without over-paraphrasing.
- source_word: αὐτοῖς
  chosen: them
  alternatives:
  - to them
  lexicon: BDAG
  rationale: 'Dative indirect object of the participle/speech introduction. English
    naturally absorbs the preposition: ''answering them'' rather than the more wooden
    ''answering to them.'''
- source_word: λέγει
  chosen: he says
  alternatives:
  - he said
  lexicon: BDAG
  rationale: The present tense is the historical present, common in Mark. Rendering
    it as 'he says' preserves Mark's vivid narrative style.
- source_word: γενεὰ ἄπιστος
  chosen: unbelieving generation
  alternatives:
  - faithless generation
  - unfaithful generation
  lexicon: BDAG
  rationale: ἄπιστος can mean 'unbelieving' or 'faithless.' In this context of failure
    to trust God's power, 'unbelieving' best captures the sense for modern readers.
    'Faithless' is a viable alternative and is preserved in a footnote because it
    can also suggest covenantal unresponsiveness.
- source_word: ἕως πότε
  chosen: how long
  alternatives:
  - until when
  lexicon: BDAG
  rationale: Idiomatic temporal expression best rendered 'how long' in English.
- source_word: πρὸς ὑμᾶς ἔσομαι
  chosen: will I be with you
  alternatives:
  - shall I remain with you
  - will I be among you
  lexicon: BDAG
  rationale: Though πρός literally means 'toward/with,' the idiom here expresses continued
    presence in relation to them. 'Be with you' is the most natural and faithful English
    rendering.
- source_word: ἀνέξομαι ὑμῶν
  chosen: will I put up with you
  alternatives:
  - will I endure you
  - will I bear with you
  lexicon: BDAG
  rationale: ἀνέχομαι here conveys enduring or tolerating. 'Put up with you' communicates
    the force clearly in contemporary English, while retaining Jesus' exasperation.
    A more formal alternative is preserved in a footnote.
- source_word: φέρετε
  chosen: Bring
  alternatives:
  - carry
  - lead
  lexicon: BDAG
  rationale: Imperative calling for the boy to be brought to Jesus. 'Bring' is the
    natural English command in context.
- source_word: αὐτὸν πρός με
  chosen: him to me
  alternatives:
  - him here to me
  lexicon: BDAG
  rationale: Direct and natural rendering of the object plus directional phrase.
