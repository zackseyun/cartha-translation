theological_decisions:
- issue: Force of ἄπιστος in Jesus' address
  chosen_reading: unbelieving
  alternative_readings:
  - faithless
  - unfaithful
  rationale: The verse rebukes a lack of trust and responsiveness without requiring
    a narrower doctrinal conclusion about apostasy or covenant breach. 'Unbelieving'
    communicates the immediate sense while preserving the broader alternative in a
    footnote.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it.'
