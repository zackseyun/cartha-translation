id: MRK.9.32
reference: Mark 9:32
source:
  edition: SBLGNT
  text: οἱ δὲ ἠγνόουν τὸ ῥῆμα, καὶ ἐφοβοῦντο αὐτὸν ἐπερωτῆσαι.
translation:
  text: But they did not understand the statement, and they were afraid to ask him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the saying.' The Greek ῥῆμα can refer to a spoken word, saying, or statement.
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ δὲ
  chosen: But they
  alternatives:
  - And they
  - Now they
  lexicon: BDAG
  rationale: δέ is a mild connective often rendered 'but' here to mark contrast with
    Jesus' preceding prediction; the article with implied disciples is naturally represented
    by 'they' in English.
- source_word: ἠγνόουν
  chosen: did not understand
  alternatives:
  - were not understanding
  - were ignorant of
  lexicon: BDAG
  rationale: ἀγνοέω can mean 'not know' or 'fail to understand.' In this context of
    Jesus' saying, 'did not understand' best captures cognitive incomprehension in
    idiomatic English. The imperfect is conveyed naturally as ongoing past state without
    over-literal English aspect.
- source_word: τὸ ῥῆμα
  chosen: the statement
  alternatives:
  - the saying
  - the word
  - this matter
  lexicon: BDAG
  rationale: ῥῆμα here refers to the spoken message Jesus had just uttered. 'Statement'
    is clear modern English and avoids the potentially misleadingly narrow 'word.'
    'Saying' is also possible, but 'statement' better fits the content of a prediction.
- source_word: ἐφοβοῦντο
  chosen: they were afraid
  alternatives:
  - they feared
  lexicon: BDAG
  rationale: φοβέομαι in the imperfect denotes an ongoing state of fear. 'They were
    afraid' is natural English and preserves the sense better than the more formal
    'they feared.'
- source_word: αὐτὸν
  chosen: him
  lexicon: BDAG
  rationale: Direct object referring to Jesus; straightforward pronominal rendering.
- source_word: ἐπερωτῆσαι
  chosen: to ask
  alternatives:
  - to question
  - to inquire of
  lexicon: BDAG
  rationale: ἐπερωτάω means to ask or question. 'To ask' is the most natural English
    complement after 'were afraid,' while still accurately reflecting the verb.
