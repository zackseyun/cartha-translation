id: MRK.9.18
reference: Mark 9:18
source:
  edition: SBLGNT
  text: καὶ ὅπου ⸀ἐὰν αὐτὸν καταλάβῃ ῥήσσει αὐτόν, καὶ ἀφρίζει καὶ τρίζει τοὺς ⸀ὀδόντας
    καὶ ξηραίνεται· καὶ εἶπα τοῖς μαθηταῖς σου ἵνα αὐτὸ ἐκβάλωσιν, καὶ οὐκ ἴσχυσαν.
translation:
  text: And wherever it seizes him, it throws him down, and he foams and grinds his
    teeth and becomes rigid. And I told your disciples to cast it out, but they were
    not able.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'becomes withered,' 'wastes away,' or more literally 'dries up.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅπου ἐὰν
  chosen: wherever
  alternatives:
  - wherever it may
  - wherever
  lexicon: BDAG
  rationale: The combination expresses an indefinite relative sense, 'wherever' or
    'wherever it may be.' In natural English, 'wherever' captures the force without
    awkwardness.
- source_word: καταλάβῃ
  chosen: seizes
  alternatives:
  - takes hold of
  - catches
  lexicon: BDAG
  rationale: 'The aorist subjunctive after ὅπου ἐὰν indicates repeated contingency:
    whenever the spirit gets hold of him. ''Seizes'' is vivid and idiomatic, fitting
    the hostile action described.'
- source_word: ῥήσσει
  chosen: throws him down
  alternatives:
  - dashes him down
  - tears him
  - throws him to the ground
  lexicon: BDAG
  rationale: Although the verb can denote violent tearing/shattering, in this exorcism
    context it refers to the spirit violently casting the boy down. 'Throws him down'
    communicates the physical effect clearly in modern English. A more literal 'tears
    him' could mislead readers into thinking bodily laceration is meant.
- source_word: ἀφρίζει
  chosen: foams
  alternatives:
  - foams at the mouth
  lexicon: BDAG
  rationale: The verb means 'to foam.' English readers naturally understand the symptom;
    adding 'at the mouth' is interpretive expansion not explicit in the Greek.
- source_word: τρίζει τοὺς ὀδόντας
  chosen: grinds his teeth
  alternatives:
  - gnashes his teeth
  lexicon: BDAG
  rationale: The phrase literally refers to grinding or gnashing the teeth. 'Grinds
    his teeth' is more natural in contemporary English and fits the physical symptom
    context better than the more idiomatic but sometimes metaphorical 'gnashes his
    teeth.'
- source_word: ξηραίνεται
  chosen: becomes rigid
  alternatives:
  - wastes away
  - dries up
  - becomes withered
  lexicon: BDAG
  rationale: In context this describes the boy's bodily condition during seizures.
    While the verb literally means 'dries up' or 'withers,' many interpreters understand
    it here as becoming stiff or rigid. 'Becomes rigid' best fits the symptom sequence
    in readable English, while the more literal alternatives are preserved in a footnote
    because the exact nuance is debated.
- source_word: εἶπα
  chosen: I told
  alternatives:
  - I said to
  lexicon: BDAG
  rationale: Direct speech to the disciples is naturally rendered 'I told your disciples'
    in English; it preserves the sense without stiffness.
- source_word: ἐκβάλωσιν
  chosen: to cast it out
  alternatives:
  - to drive it out
  lexicon: BDAG
  rationale: In exorcism contexts ἐκβάλλω commonly means expel/cast out a demon or
    spirit. 'Cast it out' preserves the established exorcistic sense and matches the
    neuter pronoun αὐτό referring to the spirit.
- source_word: οὐκ ἴσχυσαν
  chosen: they were not able
  alternatives:
  - they could not
  - they did not have strength
  lexicon: BDAG
  rationale: The verb denotes inability or lack of power. 'They were not able' is
    slightly more formal than 'they could not' and preserves the sense of incapacity
    without overinterpreting why they failed.
