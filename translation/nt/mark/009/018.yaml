theological_decisions:
- issue: Referent of αὐτό in 'cast it out'
  chosen_reading: The pronoun refers to the unclean spirit/demon afflicting the boy,
    not to the sickness abstractly.
  alternative_readings:
  - The pronoun could be taken more generically as the affliction.
  rationale: The immediate narrative context concerns an indwelling hostile spirit
    that seizes the boy and that the disciples attempt to expel. Rendering 'it' preserves
    the Greek pronoun while the lexical choice 'cast it out' signals exorcism rather
    than mere healing.
  doctrine_reference: Affirmations; Translation philosophy §1, §3
