id: MRK.9.12
reference: Mark 9:12
source:
  edition: SBLGNT
  text: ὁ δὲ ⸀ἔφη αὐτοῖς· Ἠλίας μὲν ἐλθὼν πρῶτον ⸀ἀποκαθιστάνει πάντα, καὶ πῶς γέγραπται
    ἐπὶ τὸν υἱὸν τοῦ ἀνθρώπου ἵνα πολλὰ πάθῃ καὶ ⸀ἐξουδενηθῇ;
translation:
  text: He said to them, “Elijah indeed, having come first, restores all things. And
    how is it written about the Son of Man that he should suffer many things and be
    treated with contempt?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'be despised' / 'be regarded as nothing.' The Greek verb carries the
      sense of being treated as of no account.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔφη
  chosen: He said
  alternatives:
  - he told
  lexicon: BDAG
  rationale: Standard narrative speech verb; 'said' is the natural and sufficiently
    formal English rendering.
- source_word: Ἠλίας
  chosen: Elijah
  rationale: Personal name is transliterated by standard convention per translation
    philosophy.
- source_word: ἐλθὼν πρῶτον
  chosen: having come first
  alternatives:
  - coming first
  - first comes
  lexicon: BDAG
  rationale: The aorist participle with πρῶτον is rendered as prior action relative
    to the main verb. 'Having come first' preserves the participial structure while
    remaining readable. An English finite-verb smoothing ('first comes') is possible
    but less transparent to the Greek syntax.
- source_word: ἀποκαθιστάνει
  chosen: restores
  alternatives:
  - restores to its proper state
  - sets right again
  lexicon: BDAG
  rationale: Present tense is kept as a vivid/general statement. 'Restores' best captures
    the sense of bringing back or reestablishing.
- source_word: πάντα
  chosen: all things
  alternatives:
  - everything
  lexicon: BDAG
  rationale: '''All things'' preserves the broad neuter plural and echoes biblical
    diction without becoming archaic.'
- source_word: πῶς γέγραπται ἐπὶ τὸν υἱὸν τοῦ ἀνθρώπου
  chosen: how is it written about the Son of Man
  alternatives:
  - how has it been written concerning the Son of Man
  - how is it written of the Son of Man
  lexicon: BDAG
  rationale: γέγραπται is a scriptural formula best rendered 'is written.' ἐπί here
    is taken in the sense 'about/concerning' with reference to what Scripture says
    regarding the Son of Man.
- source_word: υἱὸν τοῦ ἀνθρώπου
  chosen: the Son of Man
  lexicon: BDAG
  rationale: This is the established and semantically important title in the Gospels;
    it should be translated, not paraphrased.
- source_word: ἵνα
  chosen: that he should
  alternatives:
  - that
  - so that he would
  lexicon: BDAG
  rationale: Here ἵνα introduces the content/result of what is written, not merely
    purpose in a narrow sense. 'That he should' communicates the scriptural expectation
    naturally in English.
- source_word: πολλὰ πάθῃ
  chosen: suffer many things
  alternatives:
  - suffer much
  lexicon: BDAG
  rationale: A literal rendering of the neuter plural object with πάσχω. 'Suffer many
    things' preserves the form and emphasis of multiple sufferings.
- source_word: ἐξουδενηθῇ
  chosen: be treated with contempt
  alternatives:
  - be despised
  - be rejected as nothing
  lexicon: BDAG
  rationale: The verb carries the sense of being regarded as nothing, despised, or
    treated as of no account. 'Be treated with contempt' communicates both the passive
    force and the evaluative nuance clearly in modern English; 'be despised' is a
    viable tighter alternative preserved in a footnote.
