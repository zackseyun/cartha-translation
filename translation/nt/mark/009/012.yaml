theological_decisions:
- issue: Force of Jesus' question linking Elijah's restorative role with the Son of
    Man's suffering
  chosen_reading: Render the second clause as a genuine rhetorical question without
    harmonizing or resolving the tension.
  alternative_readings:
  - 'Translate more loosely to imply contrast: ''Yet how then is it written...?'''
  - Translate to smooth the logic into a doctrinal explanation rather than a question
  rationale: The Greek presents a question (πῶς ... γέγραπται ... ἵνα ...;). Per the
    doctrine's principle of preserving theological tension, the translation should
    retain Jesus' juxtaposition of restoration and suffering rather than explain it
    away.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
- issue: Reference of 'the Son of Man'
  chosen_reading: Retain the title 'the Son of Man' without interpretive expansion.
  alternative_readings:
  - the Human One
  - the Messiah
  rationale: Although the title refers to Jesus and carries messianic/apocalyptic
    significance, the Greek expression itself should stand in translation. Expanding
    it would import interpretation beyond the wording.
  doctrine_reference: DOCTRINE.md §Translation philosophy 2, 3
