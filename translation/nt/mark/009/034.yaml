theological_decisions:
- issue: Comparative μείζων versus idiomatic superlative rendering
  chosen_reading: who was greater
  alternative_readings:
  - who was the greatest
  rationale: The verse concerns the disciples' status rivalry, but the Greek uses
    a comparative form. Preserving 'greater' follows original-language primacy and
    avoids importing a more polished traditional phrasing where the source text is
    straightforward.
  doctrine_reference: Translation philosophy §1, §5
