id: MRK.9.34
reference: Mark 9:34
source:
  edition: SBLGNT
  text: οἱ δὲ ἐσιώπων, πρὸς ἀλλήλους γὰρ διελέχθησαν ἐν τῇ ὁδῷ τίς μείζων.
translation:
  text: But they kept silent, because on the road they had argued with one another
    about who was greater.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or, ''who was the greatest.'' Many English translations use the superlative
      idiomatically, but the Greek adjective is comparative: ''greater.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐσιώπων
  chosen: kept silent
  alternatives:
  - were silent
  - said nothing
  lexicon: BDAG
  rationale: Imperfect tense indicates continued or sustained silence in response
    to Jesus' question; 'kept silent' captures the ongoing aspect better than a simple
    past.
- source_word: διελέχθησαν
  chosen: had argued
  alternatives:
  - had discussed
  - had debated
  lexicon: BDAG
  rationale: In context the content of the conversation was competitive status ('who
    was greater'), so 'argued' better conveys the contentious force than the more
    neutral 'discussed.' The aorist is rendered as pluperfect in English because it
    explains their prior action relative to their present silence.
- source_word: πρὸς ἀλλήλους
  chosen: with one another
  alternatives:
  - among themselves
  lexicon: BDAG
  rationale: This idiom indicates reciprocal interaction. 'With one another' is natural
    English and preserves the mutual sense.
- source_word: ἐν τῇ ὁδῷ
  chosen: on the road
  alternatives:
  - on the way
  - along the road
  lexicon: BDAG
  rationale: Literally 'in the road/way,' but idiomatically 'on the road' in English.
    'On the way' is also possible and common in Mark, but 'on the road' fits the immediate
    travel setting clearly.
- source_word: τίς μείζων
  chosen: who was greater
  alternatives:
  - who was the greatest
  - which one was greater
  lexicon: BDAG
  rationale: The comparative adjective μείζων is most directly 'greater,' not the
    superlative 'greatest.' The translation preserves the Greek comparative rather
    than smoothing it into a familiar English idiom.
- source_word: οἱ δὲ
  chosen: But they
  alternatives:
  - And they
  - But those men
  lexicon: BDAG
  rationale: δέ marks a mild contrast with the preceding question from Jesus. 'But
    they' is concise and natural, with the pronoun supplied from the article functioning
    substantivally.
- source_word: γὰρ
  chosen: because
  alternatives:
  - for
  lexicon: BDAG
  rationale: γάρ gives the reason for their silence. 'Because' communicates the causal
    relationship more clearly in contemporary English than the more formal 'for'.
