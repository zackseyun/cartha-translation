id: MRK.11.29
reference: Mark 11:29
source:
  edition: SBLGNT
  text: ὁ δὲ ⸀Ἰησοῦς εἶπεν αὐτοῖς· Ἐπερωτήσω ⸀ὑμᾶς ἕνα λόγον, καὶ ἀποκρίθητέ μοι, καὶ ἐρῶ ὑμῖν ἐν ποίᾳ ἐξουσίᾳ ταῦτα ποιῶ·
translation:
  text: But Jesus said to them, “I will ask you one question. Answer me, and I will tell you by what authority I do these things.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “one matter” or more literally “one word.”
    reason: lexical_alternative
  - marker: b
    text: Or 'question, and answer me, and I will tell you'.
    reason: previous_rendering
lexical_decisions:
- source_word: δὲ
  chosen: But
  alternatives:
  - And
  - Now
  lexicon: BDAG
  rationale: Marks a mild contrast or narrative transition from the leaders' question in the previous verse. 'But' fits the responsive turn in English better than a bare 'And.'
- source_word: Ἰησοῦς
  chosen: Jesus
  rationale: Personal name is transliterated by standard English convention, in keeping with the translation philosophy to transliterate names.
- source_word: εἶπεν αὐτοῖς
  chosen: said to them
  alternatives:
  - told them
  lexicon: BDAG
  rationale: Standard narrative rendering of λέγω with indirect object; 'said to them' is more formally aligned than 'told them.'
- source_word: Ἐπερωτήσω ὑμᾶς
  chosen: I will ask you
  alternatives:
  - I will question you
  - I will ask of you
  lexicon: BDAG
  rationale: Future of ἐπερωτάω here introduces a counter-question. 'Ask you' is natural modern English and preserves the straightforward force without overformalizing to 'question you.'
- source_word: ἕνα λόγον
  chosen: one question
  alternatives:
  - one thing
  - one word
  - one matter
  lexicon: BDAG
  rationale: Although λόγος is literally 'word,' in this idiom it refers to a matter or question to be answered. 'One question' best matches the immediate context, since Jesus immediately demands a reply.
- source_word: ἀποκρίθητέ μοι
  chosen: answer me
  alternatives:
  - reply to me
  - give me an answer
  lexicon: BDAG
  rationale: Aorist imperative calling for a direct response. 'Answer me' is concise, natural, and preserves the imperative force.
- source_word: ἐρῶ ὑμῖν
  chosen: I will tell you
  alternatives:
  - I will say to you
  lexicon: BDAG
  rationale: Future of λέγω in English is more idiomatically rendered 'tell you' in this context, since Jesus promises to disclose information in response to their answer.
- source_word: ἐν ποίᾳ ἐξουσίᾳ
  chosen: by what authority
  alternatives:
  - in what authority
  - with what authority
  lexicon: BDAG
  rationale: This prepositional phrase asks about the basis or warrant for Jesus' actions. 'By what authority' is standard and idiomatic English for this construction in context.
- source_word: ταῦτα ποιῶ
  chosen: I do these things
  alternatives:
  - I am doing these things
  lexicon: BDAG
  rationale: Present tense here refers to Jesus' actions under dispute. English simple present is idiomatic in this reported challenge-response setting and matches common usage without losing aspectual sense.
