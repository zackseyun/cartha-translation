id: MRK.11.6
reference: Mark 11:6
source:
  edition: SBLGNT
  text: οἱ δὲ εἶπαν αὐτοῖς καθὼς ⸀εἶπεν ὁ Ἰησοῦς· καὶ ἀφῆκαν αὐτούς.
translation:
  text: And they said to them just as Jesus had said, and they let them go.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they allowed them' or 'they released them.' The Greek verb can mean
      to permit, release, or let go; here it refers to the bystanders no longer preventing
      the disciples from taking the colt.
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ δὲ
  chosen: And they
  alternatives:
  - Now they
  - So they
  lexicon: BDAG
  rationale: The article functions substantivally, referring back to the disciples
    in context. δέ is rendered with a simple connective 'And' to maintain narrative
    flow in natural English without overemphasizing contrast.
- source_word: εἶπαν αὐτοῖς
  chosen: said to them
  alternatives:
  - answered them
  - told them
  lexicon: BDAG
  rationale: λέγω here is the ordinary verb of speaking. 'Said to them' is the most
    direct rendering and fits the dative αὐτοῖς.
- source_word: καθὼς εἶπεν ὁ Ἰησοῦς
  chosen: just as Jesus had said
  alternatives:
  - as Jesus said
  - just as Jesus told them
  lexicon: BDAG
  rationale: καθώς indicates correspondence, so 'just as' preserves the sense of exact
    conformity. The aorist εἶπεν is rendered with English past perfect 'had said'
    because it refers to speech prior to the disciples' reply in the narrative sequence.
- source_word: ἀφῆκαν αὐτούς
  chosen: they let them go
  alternatives:
  - they allowed them
  - they released them
  lexicon: BDAG
  rationale: ἀφίημι has a broad semantic range including leave, permit, release, forgive.
    In this context, where the bystanders cease hindering the disciples, 'let them
    go' best captures the idiomatic sense in clear English.
