id: MRK.11.1
reference: Mark 11:1
source:
  edition: SBLGNT
  text: Καὶ ὅτε ἐγγίζουσιν εἰς Ἱεροσόλυμα εἰς Βηθφαγὴ καὶ Βηθανίαν πρὸς τὸ Ὄρος τῶν
    Ἐλαιῶν, ἀποστέλλει δύο τῶν μαθητῶν αὐτοῦ
translation:
  text: And when they were approaching Jerusalem, at Bethphage and Bethany, near the
    Mount of Olives, he sends two of his disciples
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'draw near Jerusalem ... toward the Mount of Olives.' The Greek uses
      spatial prepositions that can be rendered more literally, but the main text
      gives the sense in natural English.
    reason: lexical_alternative
  - marker: b
    text: Mark often uses the historical present in narration; thus 'he sends' may
      also be translated 'he sent.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγγίζουσιν
  chosen: were approaching
  alternatives:
  - approach
  - draw near
  lexicon: BDAG
  rationale: Although the Greek is present tense, Mark frequently uses the historical
    present. Rendering it as past-progressive in English fits the narrative flow while
    preserving the sense of movement toward Jerusalem.
- source_word: εἰς Ἱεροσόλυμα
  chosen: Jerusalem
  alternatives:
  - to Jerusalem
  lexicon: BDAG
  rationale: With ἐγγίζω, the prepositional phrase marks the destination being approached.
    English idiom prefers 'approaching Jerusalem' rather than the more wooden 'approaching
    to Jerusalem.'
- source_word: εἰς Βηθφαγὴ καὶ Βηθανίαν
  chosen: at Bethphage and Bethany
  alternatives:
  - to Bethphage and Bethany
  - toward Bethphage and Bethany
  lexicon: BDAG
  rationale: The repeated εἰς after Jerusalem likely specifies the vicinity reached
    on the way in. 'At Bethphage and Bethany' communicates location in natural English
    better than a strictly literal repetition of 'to.'
- source_word: πρὸς τὸ Ὄρος τῶν Ἐλαιῶν
  chosen: near the Mount of Olives
  alternatives:
  - toward the Mount of Olives
  - by the Mount of Olives
  lexicon: BDAG
  rationale: πρός here is spatial, indicating proximity/orientation. 'Near' best captures
    the relation in smooth English without overstating motion.
- source_word: ἀποστέλλει
  chosen: he sends
  alternatives:
  - he sent
  - he dispatches
  lexicon: BDAG
  rationale: The Greek uses the historical present, and retaining it here reflects
    Mark's vivid narrative style. English can naturally preserve this present-tense
    shift.
- source_word: δύο τῶν μαθητῶν αὐτοῦ
  chosen: two of his disciples
  alternatives:
  - two disciples of his
  lexicon: BDAG
  rationale: This is the most natural English rendering of the partitive construction
    while preserving possession and group membership.
- source_word: Βηθφαγὴ
  chosen: Bethphage
  rationale: Personal and place names are transliterated by standard convention per
    project philosophy.
- source_word: Βηθανίαν
  chosen: Bethany
  rationale: Personal and place names are transliterated by standard convention per
    project philosophy.
- source_word: Ὄρος τῶν Ἐλαιῶν
  chosen: Mount of Olives
  alternatives:
  - mountain of olives
  - Olive Mount
  lexicon: BDAG
  rationale: This is the standard and clear English rendering of the toponym, preserving
    the genitival sense.
