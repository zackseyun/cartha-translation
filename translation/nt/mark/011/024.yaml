id: MRK.11.24
reference: Mark 11:24
source:
  edition: SBLGNT
  text: διὰ τοῦτο λέγω ὑμῖν, πάντα ὅσα ⸂προσεύχεσθε καὶ αἰτεῖσθε⸃, πιστεύετε ὅτι ⸀ἐλάβετε, καὶ ἔσται ὑμῖν.
translation:
  text: For this reason I tell you, whatever you ask for in prayer, believe that you have received them, and they will be yours.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Some manuscripts/readings are understood or rendered as 'believe that you receive them' rather than 'believe that you have received them.' The Greek text used here reads 'have received,' preserving the completed-action sense.
    reason: alternative_reading
  - marker: b
    text: Or 'whatever things you pray and ask for'.
    reason: previous_rendering
lexical_decisions:
- source_word: διὰ τοῦτο
  chosen: For this reason
  alternatives:
  - Therefore
  - Because of this
  lexicon: BDAG
  rationale: Idiomatic causal/inferential expression linking this saying to the preceding teaching about faith and prayer. 'For this reason' preserves the explanatory force clearly in modern English.
- source_word: λέγω ὑμῖν
  chosen: I tell you
  alternatives:
  - I say to you
  lexicon: BDAG
  rationale: A standard direct-address formula. 'I tell you' is natural modern English while preserving the personal and authoritative address.
- source_word: πάντα ὅσα
  chosen: whatever things
  alternatives:
  - whatever
  - all that
  lexicon: BDAG
  rationale: The combination is expansive and comprehensive. 'Whatever things' keeps the breadth of the Greek more explicitly than a bare 'whatever,' while remaining readable.
- source_word: προσεύχεσθε
  chosen: you pray
  alternatives:
  - you are praying
  lexicon: BDAG
  rationale: The verb denotes praying generally; the present form here is best rendered in English as a general present rather than a progressive.
- source_word: καὶ αἰτεῖσθε
  chosen: and ask for
  alternatives:
  - and request
  - and ask
  lexicon: BDAG
  rationale: αἰτέω adds the nuance of petition/request within prayer. 'Ask for' distinguishes it from the broader 'pray' and preserves the paired verbal idea.
- source_word: πιστεύετε
  chosen: believe
  alternatives:
  - have faith
  - trust
  lexicon: BDAG
  rationale: Default rendering of πιστεύω in this context is 'believe.' 'Have faith' is possible, but 'believe' fits the following content clause more directly.
- source_word: ὅτι
  chosen: that
  alternatives:
  - because
  lexicon: BDAG
  rationale: Introduces the content of what is to be believed, not a causal clause.
- source_word: ἐλάβετε
  chosen: you have received
  alternatives:
  - you received
  - you did receive
  lexicon: BDAG
  rationale: The Greek uses an aorist where English idiom often prefers a present perfect to express a completed action with present relevance. This preserves the striking temporal force of believing the request as already received.
- source_word: ἔσται ὑμῖν
  chosen: they will be yours
  alternatives:
  - it will be yours
  - it will happen for you
  - you will have them
  lexicon: BDAG
  rationale: The future clause promises the requested things as belonging to the disciples. Because the antecedent is plural ('whatever things' / 'them'), 'they will be yours' makes the number explicit and reads naturally.
