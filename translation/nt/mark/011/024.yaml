theological_decisions:
- issue: Temporal force of answered prayer in relation to faith
  chosen_reading: 'Retain the paradoxical sequence: believe that you have received them, and they will be yours.'
  alternative_readings:
  - believe that you receive them, and they will be yours
  rationale: The Greek text here reads ἐλάβετε (aorist), not a present form. The translation preserves the theological tension rather than smoothing it into a less paradoxical statement. This avoids importing a particular doctrinal system about prayer while remaining faithful to the wording.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
revisions:
- timestamp: '2026-04-21T05:23:38Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/nt/mark/011/024.json
  category: awkward_english
  tier: 1
  from: whatever things you pray and ask for
  to: whatever you ask for in prayer
  rationale: The current rendering, which coordinates two verbs ('pray and ask for'), is a formally accurate reflection of the Greek. However, it is slightly awkward in English, as one typically 'prays *for*' things, and the single preposition at the end feels slightly forced. A more idiomatic and smoother English solution is to subordinate the act of prayer, as in 'whatever you ask for in prayer.' This preserves the meaning of both Greek verbs (`προσεύχεσθε` and `αἰτεῖσθε`) while improving the sentence's natural flow, consistent with an optimal-equivalence approach.
