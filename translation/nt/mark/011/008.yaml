id: MRK.11.8
reference: Mark 11:8
source:
  edition: SBLGNT
  text: ⸂καὶ πολλοὶ⸃ τὰ ἱμάτια αὐτῶν ἔστρωσαν εἰς τὴν ὁδόν, ἄλλοι δὲ στιβάδας ⸂κόψαντες
    ἐκ τῶν ἀγρῶν⸃.
translation:
  text: And many spread their cloaks on the road, and others spread leafy branches
    cut from the fields.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or simply 'branches'; the Greek στιβάδας refers more broadly to masses of
      cut foliage or leafy branches, not specifically palm branches.
    reason: lexical_alternative
lexical_decisions:
- source_word: πολλοὶ
  chosen: many
  alternatives:
  - a great many
  - many people
  lexicon: BDAG
  rationale: A straightforward quantitative adjective; 'many' is natural and sufficiently
    precise without adding emphasis not explicit in the Greek.
- source_word: ἱμάτια
  chosen: cloaks
  alternatives:
  - garments
  - outer garments
  - robes
  lexicon: BDAG
  rationale: In this narrative setting, ἱμάτια refers to outer garments laid on the
    road. 'Cloaks' is idiomatic modern English and more specific than the overly broad
    'garments.'
- source_word: ἔστρωσαν
  chosen: spread
  alternatives:
  - laid
  - spread out
  lexicon: BDAG
  rationale: The verb means to spread or strew. 'Spread' fits both the garments and
    the implied action with branches in smooth English.
- source_word: εἰς τὴν ὁδόν
  chosen: on the road
  alternatives:
  - in the road
  - on the way
  lexicon: BDAG
  rationale: Although εἰς is literally 'into,' with στρώννυμι the idiomatic sense
    is placement onto the surface of the road. 'On the road' is the clearest natural
    rendering.
- source_word: ἄλλοι δὲ
  chosen: and others
  alternatives:
  - but others
  - while others
  lexicon: BDAG
  rationale: δέ here marks a mild contrast/addition. 'And others' reads naturally
    in English narrative without overstating contrast.
- source_word: στιβάδας
  chosen: leafy branches
  alternatives:
  - branches
  - bundles of leaves
  - rushes
  lexicon: BDAG
  rationale: στιβάς denotes litter, bedding, or a mass of foliage/reeds/branches.
    In this triumphal-entry context, the sense is cut vegetation spread on the road.
    'Leafy branches' communicates the likely referent without importing the specific
    'palm branches' wording from John.
- source_word: κόψαντες
  chosen: cut
  alternatives:
  - having cut
  - cut down
  lexicon: BDAG
  rationale: The aorist participle is antecedent to the main action, but English can
    express this naturally with the reduced participial idea 'cut from the fields'
    rather than the more wooden 'having cut.'
- source_word: ἐκ τῶν ἀγρῶν
  chosen: from the fields
  alternatives:
  - from the countryside
  - from the farms
  lexicon: BDAG
  rationale: ἀγροί are fields/open country. 'From the fields' is the most direct rendering
    and matches the image of people cutting vegetation nearby.
