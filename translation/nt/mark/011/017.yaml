theological_decisions:
- issue: Rendering the prophetic citation's universal scope
  chosen_reading: for all the nations
  alternative_readings:
  - for all peoples
  - by all the nations
  rationale: The wording preserves the Isaianic emphasis that God's house is intended
    beyond Israel, without importing later theological systems. 'Nations' is the most
    direct rendering of ἔθνη and keeps the intertextual force intact.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    theological tension rather than resolve it.'
- issue: Force of λῃστῶν in Jesus' accusation
  chosen_reading: robbers
  alternative_readings:
  - bandits
  - insurrectionists
  rationale: Although λῃστής can carry the sense of brigand or rebel in some contexts,
    here the Jeremiah 7:11 allusion governs the sense. 'Robbers' preserves the scriptural
    echo without over-specifying a political nuance the verse itself does not require.
  doctrine_reference: 'Translation philosophy: optimal equivalence; do not import
    doctrinal claims the text does not make.'
