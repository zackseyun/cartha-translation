id: MRK.11.17
reference: Mark 11:17
source:
  edition: SBLGNT
  text: καὶ ἐδίδασκεν ⸂καὶ ἔλεγεν⸃ ⸀αὐτοῖς· Οὐ γέγραπται ὅτι Ὁ οἶκός μου οἶκος προσευχῆς
    κληθήσεται πᾶσιν τοῖς ἔθνεσιν; ὑμεῖς δὲ ⸀πεποιήκατε αὐτὸν σπήλαιον λῃστῶν.
translation:
  text: And he was teaching and saying to them, “Is it not written, ‘My house will
    be called a house of prayer for all the nations’? But you have made it a den of
    robbers.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “for all peoples.” The Greek says “for all the nations,” echoing Isaiah
      56:7 and emphasizing the temple’s intended welcome beyond Israel.
    reason: lexical_alternative
  - marker: b
    text: “Den of robbers” echoes Jeremiah 7:11. The Greek word can also mean “bandits”
      or “brigands” in some contexts.
    reason: cross_reference
lexical_decisions:
- source_word: ἐδίδασκεν
  chosen: was teaching
  alternatives:
  - taught
  lexicon: BDAG
  rationale: Imperfect verb, best reflected with progressive aspect in English to
    show ongoing action in the temple scene.
- source_word: καὶ ἔλεγεν
  chosen: and saying
  alternatives:
  - and said
  lexicon: BDAG
  rationale: Also imperfect; rendered progressively to match ἐδίδασκεν and preserve
    the narrative sense of repeated or continued speech.
- source_word: αὐτοῖς
  chosen: to them
  lexicon: BDAG
  rationale: Dative indirect object referring to those present in the temple precincts.
- source_word: Οὐ γέγραπται
  chosen: Is it not written
  alternatives:
  - Has it not been written
  lexicon: BDAG
  rationale: Conventional but accurate rendering of the perfect passive formula introducing
    Scripture citation; idiomatic English preserves the force of appeal to written
    authority.
- source_word: Ὁ οἶκός μου
  chosen: My house
  alternatives:
  - My temple
  lexicon: BDAG
  rationale: Retains the scriptural quotation's wording and metaphorical-sacral resonance;
    'house' is the direct lexical equivalent and echoes Isaiah 56:7.
- source_word: οἶκος προσευχῆς
  chosen: a house of prayer
  alternatives:
  - a prayer house
  lexicon: BDAG
  rationale: Standard and natural rendering of the genitive construction, preserving
    the recognized biblical phrase.
- source_word: κληθήσεται
  chosen: will be called
  alternatives:
  - shall be called
  lexicon: BDAG
  rationale: Future passive rendered in contemporary English without archaic 'shall.'
- source_word: πᾶσιν τοῖς ἔθνεσιν
  chosen: for all the nations
  alternatives:
  - for all peoples
  - by all the nations
  lexicon: BDAG
  rationale: Dative phrase in the Isaiah citation is best rendered here as 'for all
    the nations,' expressing the temple's intended scope and preserving ἔθνη as 'nations'
    rather than flattening to 'people'.
- source_word: ὑμεῖς δὲ
  chosen: But you
  alternatives:
  - Yet you
  lexicon: BDAG
  rationale: Marks strong contrast between God's stated purpose and the audience's
    action; explicit 'you' preserves the emphatic pronoun.
- source_word: πεποιήκατε
  chosen: have made
  alternatives:
  - made
  lexicon: BDAG
  rationale: Perfect tense suggests a present state resulting from prior action; 'have
    made' preserves that force.
- source_word: σπήλαιον
  chosen: den
  alternatives:
  - cave
  lexicon: BDAG
  rationale: In the Jeremiah allusion, 'den' is the established and contextually apt
    sense for a hideout or lair.
- source_word: λῃστῶν
  chosen: robbers
  alternatives:
  - bandits
  - insurrectionists
  lexicon: BDAG
  rationale: λῃστής can denote robbers or brigands; 'robbers' fits the prophetic citation
    tradition (Jer 7:11) and is the most recognizable English rendering here, while
    broader socio-political nuances are possible but not required by this context.
