id: MRK.11.22
reference: Mark 11:22
source:
  edition: SBLGNT
  text: καὶ ἀποκριθεὶς ὁ Ἰησοῦς λέγει αὐτοῖς· Ἔχετε πίστιν θεοῦ·
translation:
  text: And Jesus answered them, “Have faith in God.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more literally, “Have the faith of God,” which may also be understood
      as “Have God’s faithfulness” or “Have faith from God.”
    reason: alternative_reading
lexical_decisions:
- source_word: ἀποκριθεὶς
  chosen: answered
  alternatives:
  - responded
  lexicon: BDAG
  rationale: The participle commonly introduces a spoken reply. English idiom prefers
    a finite verb here rather than a wooden participial construction ('answering').
    'Answered' fits the narrative flow and reflects the discourse function.
- source_word: λέγει
  chosen: Jesus answered them
  alternatives:
  - says to them
  - said to them
  lexicon: BDAG
  rationale: The Greek uses the historical present 'λέγει.' In natural English narrative,
    past tense is usually preferred. Its force is carried by the overall narrative
    rather than by preserving a present tense in translation. Combined with ἀποκριθεὶς,
    it yields the idiomatic clause 'Jesus answered them.'
- source_word: Ἔχετε
  chosen: Have
  alternatives:
  - Keep
  - Hold
  lexicon: BDAG
  rationale: The present imperative calls for an ongoing disposition. 'Have' is the
    standard concise rendering in this idiom and avoids over-interpreting aspect with
    'keep' or 'hold.'
- source_word: πίστιν
  chosen: faith
  alternatives:
  - trust
  - faithfulness
  lexicon: BDAG
  rationale: Per doctrine defaults, πίστις is rendered 'faith' in the main text. In
    this context, 'faith' is the most natural object of the imperative. 'Trust' is
    possible in English style, and 'faithfulness' is less likely here, but the genitival
    construction is contested enough to preserve alternatives in a footnote.
- source_word: θεοῦ
  chosen: in God
  alternatives:
  - of God
  - God's
  lexicon: BDAG
  rationale: The genitive θεοῦ after πίστιν is syntactically ambiguous. In context,
    Jesus is exhorting the disciples to place their faith in God, so an objective
    sense ('faith in God') best fits the immediate discourse and standard idiom. Because
    the Greek could also be read more literally as 'faith of God' or 'God's faith/faithfulness,'
    the alternative is preserved in a footnote rather than resolved silently.
