theological_decisions:
- issue: Ambiguous genitive in πίστιν θεοῦ
  chosen_reading: 'objective genitive: ''faith in God'''
  alternative_readings:
  - '''faith of God'''
  - '''God''s faithfulness'''
  rationale: The immediate context is Jesus' exhortation following the withered fig
    tree and leading into teaching about prayer and believing (11:23–24). An exhortation
    to the disciples to exercise faith directed toward God is the most contextually
    coherent reading. However, because the Greek construction itself is ambiguous
    and the translation philosophy requires preserving genuine tension, the more literal
    alternative is retained in a footnote.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §3; Contested terms table
    for πίστις'
