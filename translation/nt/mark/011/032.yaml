id: MRK.11.32
reference: Mark 11:32
source:
  edition: SBLGNT
  text: ἀλλὰ εἴπωμεν· Ἐξ ἀνθρώπων;— ἐφοβοῦντο τὸν ⸀ὄχλον, ἅπαντες γὰρ εἶχον τὸν Ἰωάννην
    ⸂ὄντως ὅτι⸃ προφήτης ἦν.
translation:
  text: But if we say, ‘From men’?”—they were afraid of the crowd, for everyone held
    that John truly was a prophet.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “From human beings,” or more interpretively, “Of human origin.”
    reason: lexical_alternative
  - marker: b
    text: The Greek can also be rendered, “everyone held John to be a prophet indeed.”
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀλλὰ
  chosen: But
  alternatives:
  - But what if
  - But
  lexicon: BDAG
  rationale: Adversative conjunction marking the alternative branch of their deliberation.
    Simple 'But' preserves the Greek contrast without adding explanatory words not
    in the text.
- source_word: εἴπωμεν
  chosen: if we say
  alternatives:
  - shall we say
  - were we to say
  lexicon: BDAG
  rationale: Aorist subjunctive in a deliberative context. English idiom is best captured
    by 'if we say' after the preceding adversative, reflecting the implied conditional
    alternative in their internal reasoning.
- source_word: Ἐξ ἀνθρώπων
  chosen: From men
  alternatives:
  - From human beings
  - Of human origin
  lexicon: BDAG
  rationale: Literally 'from men/people.' Here it refers to the source of John's baptism/authority
    as merely human. 'From men' is concise and mirrors the Greek wording; 'of human
    origin' is interpretive and smoother but less formally transparent.
- source_word: ἐφοβοῦντο
  chosen: they were afraid of
  alternatives:
  - they feared
  - they were fearing
  lexicon: BDAG
  rationale: Imperfect middle/passive conveys ongoing or situational fear. 'They were
    afraid of' is natural English and preserves the sense without overemphasizing
    aspect.
- source_word: τὸν ὄχλον
  chosen: the crowd
  alternatives:
  - the multitude
  - the people
  lexicon: BDAG
  rationale: ὄχλος in Mark commonly denotes the gathered crowd. 'Crowd' is readable
    modern English and fits the narrative setting better than the more formal 'multitude.'
- source_word: ἅπαντες
  chosen: everyone
  alternatives:
  - all
  - all the people
  lexicon: BDAG
  rationale: The term means 'all' or 'everyone.' 'Everyone' makes explicit the distributive
    sense in idiomatic English. 'All the people' would add a noun not present in the
    Greek.
- source_word: γὰρ
  chosen: for
  alternatives:
  - because
  lexicon: BDAG
  rationale: Introduces the reason for their fear. 'For' preserves the explanatory
    connection in a slightly more formal but still natural way.
- source_word: εἶχον
  chosen: held
  alternatives:
  - considered
  - regarded
  - had
  lexicon: BDAG
  rationale: Here ἔχω with an object and predicate clause conveys holding an opinion
    about someone. 'Held that' is idiomatic English for this construction and avoids
    the wooden 'had John that...'
- source_word: ὄντως ὅτι
  chosen: truly was
  alternatives:
  - really was
  - indeed was
  lexicon: BDAG
  rationale: The textual reading includes both ὄντως and ὅτι, yielding the sense that
    the crowd regarded John as genuinely a prophet. 'Truly was' captures the adverb's
    force in natural English. Because the exact syntactic relation can be represented
    in more than one way, an alternative is preserved in a footnote.
- source_word: προφήτης
  chosen: a prophet
  alternatives:
  - prophet
  lexicon: BDAG
  rationale: Anarthrous predicate nominative after ἦν; English idiom normally requires
    the indefinite article here. The phrase expresses the crowd's view of John's prophetic
    status.
