theological_decisions:
- issue: Rendering ἀνθρώπων in the contrast about the source of John's baptism/authority
  chosen_reading: From men
  alternative_readings:
  - From human beings
  - Of human origin
  rationale: The phrase contrasts human versus divine source. 'From men' is gender-accurate
    to the Greek plural and idiomatic in this stock contrast, while still naturally
    encompassing humanity in context. 'Of human origin' is interpretive and therefore
    left as an alternative rather than the main text.
  doctrine_reference: DOCTRINE.md §Translation philosophy, item 4
- issue: Force of the crowd's assessment of John in ὄντως ὅτι προφήτης ἦν
  chosen_reading: everyone held that John truly was a prophet
  alternative_readings:
  - everyone considered John to be truly a prophet
  - everyone held John to be a prophet indeed
  rationale: The text reports popular recognition of John's prophetic status without
    making a fresh narrator-level theological assertion beyond that report. The chosen
    wording preserves the people's conviction and the emphatic force of ὄντως while
    keeping the statement embedded in their perspective.
  doctrine_reference: DOCTRINE.md §Translation philosophy, item 3
