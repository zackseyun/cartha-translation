id: MRK.11.25
reference: Mark 11:25
source:
  edition: SBLGNT
  text: καὶ ὅταν ⸀στήκετε προσευχόμενοι, ἀφίετε εἴ τι ἔχετε κατά τινος, ἵνα καὶ ὁ
    πατὴρ ὑμῶν ὁ ἐν τοῖς οὐρανοῖς ἀφῇ ὑμῖν τὰ παραπτώματα ⸀ὑμῶν.
translation:
  text: And whenever you stand praying, forgive, if you have anything against anyone,
    so that your Father who is in the heavens may also forgive you your trespasses.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your Father in heaven.' The Greek reads 'in the heavens' (plural).
    reason: lexical_alternative
  - marker: b
    text: Or 'transgressions' or 'offenses' for 'trespasses.'
    reason: lexical_alternative
lexical_decisions:
- source_word: στήκετε
  chosen: stand
  alternatives:
  - are standing
  lexicon: BDAG
  rationale: 'Present indicative plural with ὅταν can be rendered as a customary action:
    ''whenever you stand.'' This preserves the concrete posture imagery without overinterpreting
    it as merely ''when you pray.'''
- source_word: προσευχόμενοι
  chosen: praying
  alternatives:
  - while praying
  - as you pray
  lexicon: BDAG
  rationale: 'The participle is contemporaneous with στήκετε and naturally modifies
    it: ''stand praying.'' ''Praying'' keeps the Greek structure and avoids smoothing
    away the participial nuance.'
- source_word: ἀφίετε
  chosen: forgive
  alternatives:
  - release
  - let go
  lexicon: BDAG
  rationale: In this interpersonal context, ἀφίημι means to forgive or remit offense.
    'Forgive' is the clear and idiomatic English equivalent and matches the later
    divine action in the verse.
- source_word: εἴ τι ἔχετε κατά τινος
  chosen: if you have anything against anyone
  alternatives:
  - if you have anything against someone
  - if anything is held by you against anyone
  lexicon: BDAG
  rationale: κατά with the genitive here expresses hostility or grievance against
    a person. 'Anything against anyone' is natural English and preserves the broad,
    indefinite force of τι / τινος.
- source_word: ὁ πατὴρ ὑμῶν ὁ ἐν τοῖς οὐρανοῖς
  chosen: your Father who is in the heavens
  alternatives:
  - your Father in heaven
  - your heavenly Father
  lexicon: BDAG
  rationale: The plural οὐρανοῖς is explicit in Greek. 'In the heavens' preserves
    the source form more closely than the traditional singular 'in heaven,' while
    remaining understandable.
- source_word: ἀφῇ
  chosen: may also forgive
  alternatives:
  - may forgive also
  - might also forgive
  lexicon: BDAG
  rationale: Aorist subjunctive after ἵνα expresses purpose/result. 'May also forgive'
    is idiomatic English and preserves the καί, which links the Father's forgiveness
    to the disciples' forgiveness.
- source_word: παραπτώματα
  chosen: trespasses
  alternatives:
  - transgressions
  - offenses
  - sins
  lexicon: BDAG
  rationale: παράπτωμα denotes a false step, offense, or transgression. 'Trespasses'
    fits the relational and prayer context well and preserves a distinction from the
    more general ἁμαρτίαι ('sins'), though 'transgressions' is also possible.
