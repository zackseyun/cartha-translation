theological_decisions:
- issue: Conditional relationship between human forgiveness and divine forgiveness
  chosen_reading: 'Rendered the clause straightforwardly as a purpose statement without
    softening the condition: believers are commanded to forgive so that the Father
    may forgive them.'
  alternative_readings:
  - A weaker consequential sense that minimizes the conditional force
  - An interpretive paraphrase that makes forgiveness merely evidential rather than
    stated as linked in the text
  rationale: The Greek ἵνα ... ἀφῇ presents a real textual linkage between forgiving
    others and the Father's forgiveness. The translation preserves that tension without
    importing a broader doctrinal system to explain it away.
  doctrine_reference: Preserve theological tension rather than resolve it.
