id: MRK.11.21
reference: Mark 11:21
source:
  edition: SBLGNT
  text: καὶ ἀναμνησθεὶς ὁ Πέτρος λέγει αὐτῷ· Ῥαββί, ἴδε ἡ συκῆ ἣν κατηράσω ἐξήρανται.
translation:
  text: And Peter, remembering, says to him, “Rabbi, look—the fig tree that you cursed
    has withered.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “has dried up.” The Greek verb can denote drying up or withering; the
      perfect tense emphasizes the present result.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀναμνησθεὶς
  chosen: remembering
  alternatives:
  - having remembered
  - calling to mind
  lexicon: BDAG
  rationale: Aorist passive participle from ἀναμιμνῄσκω used in an intransitive/passive
    sense, 'having remembered' or 'being reminded.' 'Remembering' is natural modern
    English and preserves the participial connection to Peter's speech without overformal
    stiffness.
- source_word: λέγει
  chosen: says
  alternatives:
  - said
  - is saying
  lexicon: BDAG
  rationale: Mark frequently uses the historical present. Rendering it as 'says' preserves
    the vivid narrative style better than flattening it to past tense.
- source_word: αὐτῷ
  chosen: to him
  alternatives:
  - to Jesus
  lexicon: BDAG
  rationale: The pronoun's referent is Jesus from context, but the Greek uses a pronoun,
    so 'to him' preserves the source wording without unnecessary explicitation.
- source_word: Ῥαββί
  chosen: Rabbi
  alternatives:
  - Teacher
  lexicon: BDAG
  rationale: This is a transliterated address/title in the Greek text. Retaining 'Rabbi'
    preserves the Jewish setting and direct form of address; 'Teacher' is a possible
    sense but less textually transparent here.
- source_word: ἴδε
  chosen: look
  alternatives:
  - behold
  - see
  lexicon: BDAG
  rationale: '''Look'' is clear, natural modern English for the deictic imperative.
    ''Behold'' is too archaic; ''see'' is possible but slightly less idiomatic in
    direct exclamation.'
- source_word: συκῆ
  chosen: fig tree
  alternatives:
  - fig
  lexicon: BDAG
  rationale: In context the noun refers to the tree, not merely its fruit. 'Fig tree'
    is the standard and clearest English rendering.
- source_word: κατηράσω
  chosen: you cursed
  alternatives:
  - you pronounced a curse on
  lexicon: BDAG
  rationale: Second person singular aorist middle indicative of καταράομαι. 'You cursed'
    is direct, idiomatic, and accurately reflects Peter addressing Jesus about his
    prior action.
- source_word: ἐξήρανται
  chosen: has withered
  alternatives:
  - has dried up
  - is withered
  lexicon: BDAG
  rationale: Perfect tense indicates a completed action with present result. 'Has
    withered' communicates both the event and its abiding state. 'Has dried up' is
    also possible and appears in some translations, but 'withered' fits a tree naturally
    in English.
