id: MRK.11.4
reference: Mark 11:4
source:
  edition: SBLGNT
  text: ⸂καὶ ἀπῆλθον⸃ καὶ εὗρον πῶλον δεδεμένον ⸀πρὸς θύραν ἔξω ἐπὶ τοῦ ἀμφόδου, καὶ
    λύουσιν αὐτόν.
translation:
  text: And they went away and found a colt tied at a door outside on the street,
    and they untied it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "by a door outside in the street." The Greek phrase can be understood
      with slightly different spatial emphasis.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπῆλθον
  chosen: went away
  alternatives:
  - went
  - departed
  lexicon: BDAG
  rationale: Aorist of ἀπέρχομαι denotes departure from the place where Jesus gave
    instructions. 'Went away' preserves the directional nuance better than the flatter
    'went,' while remaining natural English.
- source_word: εὗρον
  chosen: found
  alternatives:
  - came upon
  lexicon: BDAG
  rationale: Standard rendering of εὑρίσκω in narrative context; straightforward and
    idiomatic.
- source_word: πῶλον
  chosen: colt
  alternatives:
  - young donkey
  - foal
  lexicon: BDAG
  rationale: πῶλος denotes a young animal, and in this context the broader passage
    identifies it as the animal Jesus will ride. 'Colt' is concise and traditional
    without over-specifying in this verse itself; 'young donkey' is possible but more
    interpretive here.
- source_word: δεδεμένον
  chosen: tied
  alternatives:
  - bound
  lexicon: BDAG
  rationale: Perfect passive participle of δέω describes the colt's existing state.
    'Tied' is the most natural English equivalent in this concrete setting; 'bound'
    is more formal and less idiomatic.
- source_word: πρὸς θύραν
  chosen: at a door
  alternatives:
  - by a door
  - near a door
  lexicon: BDAG
  rationale: πρός with the accusative here indicates proximity/location. 'At a door'
    is idiomatic and fits the scene of the animal being tied near an entrance.
- source_word: ἔξω
  chosen: outside
  alternatives:
  - outdoors
  lexicon: BDAG
  rationale: ἔξω marks the location as outside rather than indoors; 'outside' is the
    plainest rendering.
- source_word: ἐπὶ τοῦ ἀμφόδου
  chosen: on the street
  alternatives:
  - in the street
  - at the street
  - by the road
  lexicon: BDAG
  rationale: ἄμφοδον refers to a street, lane, or open passageway. With ἐπί plus genitive,
    the phrase locates the doorway along the street. 'On the street' is natural English
    for a door opening onto a street or lane.
- source_word: λύουσιν αὐτόν
  chosen: they untied it
  alternatives:
  - they are untying it
  - they loosed it
  lexicon: BDAG
  rationale: Historical present λύουσιν is best rendered with simple past in English
    narrative for readability. 'Untied' captures the concrete action more naturally
    than the archaic 'loosed.'
