id: MRK.11.19
reference: Mark 11:19
source:
  edition: SBLGNT
  text: Καὶ ⸀ὅταν ὀψὲ ἐγένετο, ⸀ἐξεπορεύοντο ἔξω τῆς πόλεως.
translation:
  text: And whenever evening came, they would go out of the city.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ὅταν
  chosen: whenever
  alternatives:
  - when
  lexicon: BDAG
  rationale: Combined with the imperfect verb that follows, this conjunction naturally
    conveys repeated or customary action rather than a single occurrence. 'Whenever'
    better reflects the iterative sense in context.
- source_word: ὀψὲ ἐγένετο
  chosen: evening came
  alternatives:
  - it became late
  - it was evening
  lexicon: BDAG
  rationale: The idiom literally means 'it became late/evening.' 'Evening came' is
    natural modern English and preserves the temporal sense without awkwardness.
- source_word: ἐξεπορεύοντο
  chosen: they would go out
  alternatives:
  - they went out
  - they were going out
  lexicon: BDAG
  rationale: The imperfect middle indicative here most likely expresses customary
    repeated action in narrative sequence. 'They would go out' captures that habitual
    nuance better than a simple past.
- source_word: ἔξω τῆς πόλεως
  chosen: out of the city
  alternatives:
  - outside the city
  lexicon: BDAG
  rationale: Both are possible, but 'out of the city' matches the motion inherent
    in ἐξεπορεύοντο and the prepositional force of ἔξω with the genitive.
- source_word: πόλεως
  chosen: the city
  alternatives:
  - Jerusalem
  lexicon: BDAG
  rationale: The Greek says 'the city' without naming it. Since Jerusalem is contextually
    obvious but not explicit, the translation preserves the wording of the source
    text rather than importing the proper name.
