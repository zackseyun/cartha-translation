theological_decisions:
- issue: Rendering of ἱερόν
  chosen_reading: temple courts
  alternative_readings:
  - temple
  - temple precincts
  rationale: This choice avoids implying the inner sanctuary and better reflects the
    broader temple complex where public encounters occurred. It is a lexical-spatial
    decision rather than a doctrinal one, but it affects how readers imagine the setting.
  doctrine_reference: Translation philosophy §1, §6
