id: MRK.11.27
reference: Mark 11:27
source:
  edition: SBLGNT
  text: Καὶ ἔρχονται πάλιν εἰς Ἱεροσόλυμα. καὶ ἐν τῷ ἱερῷ περιπατοῦντος αὐτοῦ ἔρχονται
    πρὸς αὐτὸν οἱ ἀρχιερεῖς καὶ οἱ γραμματεῖς καὶ οἱ πρεσβύτεροι
translation:
  text: And they came again to Jerusalem. And as he was walking in the temple courts,
    the chief priests and the scribes and the elders came to him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the temple' or 'in the temple precincts'; the Greek refers to the
      broader temple complex, not specifically the inner sanctuary.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔρχονται
  chosen: they came
  alternatives:
  - they come
  - they are coming
  lexicon: BDAG
  rationale: Although the Greek present is historical present, natural English narrative
    normally renders it as a simple past. This preserves the narrative flow without
    woodenly retaining the present.
- source_word: πάλιν
  chosen: again
  alternatives:
  - once more
  lexicon: BDAG
  rationale: The adverb marks repeated arrival in Jerusalem and is straightforwardly
    rendered 'again'.
- source_word: Ἱεροσόλυμα
  chosen: Jerusalem
  lexicon: BDAG
  rationale: Standard English transliteration of the place name.
- source_word: ἐν τῷ ἱερῷ
  chosen: in the temple courts
  alternatives:
  - in the temple
  - in the temple precincts
  lexicon: BDAG
  rationale: ἱερόν refers to the temple complex rather than the inner sanctuary (ναός).
    'Temple courts' communicates the broader precinct clearly in modern English.
- source_word: περιπατοῦντος αὐτοῦ
  chosen: as he was walking
  alternatives:
  - while he was walking
  - as he walked
  lexicon: BDAG
  rationale: The genitive absolute gives circumstantial background. 'As he was walking'
    is natural English and preserves the ongoing action.
- source_word: ἀρχιερεῖς
  chosen: the chief priests
  alternatives:
  - the high priests
  lexicon: BDAG
  rationale: In plural, the term refers to the leading priestly authorities, conventionally
    and accurately rendered 'chief priests' in this context.
- source_word: γραμματεῖς
  chosen: the scribes
  alternatives:
  - the teachers of the law
  lexicon: BDAG
  rationale: '''Scribes'' is the direct lexical equivalent and remains understandable
    in Gospel narrative. The more interpretive ''teachers of the law'' narrows the
    term beyond the Greek.'
- source_word: πρεσβύτεροι
  chosen: the elders
  alternatives:
  - the older men
  - the leaders
  lexicon: BDAG
  rationale: In this institutional context the term denotes recognized Jewish leaders,
    not merely older males, so 'elders' is the established and accurate rendering.
- source_word: πρὸς αὐτόν
  chosen: to him
  alternatives:
  - up to him
  lexicon: BDAG
  rationale: The preposition here indicates movement toward Jesus; 'to him' is idiomatic
    and sufficient.
