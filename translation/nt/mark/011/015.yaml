theological_decisions:
- issue: Scope of ἱερόν in the cleansing narrative
  chosen_reading: Rendered as 'temple' in the main text, referring to the temple complex
    rather than the inner sanctuary.
  alternative_readings:
  - temple courts
  - temple precincts
  rationale: The Greek term ἱερόν denotes the broader temple area. The main text keeps
    the familiar 'temple' for readability, while a footnote preserves the more precise
    spatial nuance so readers do not imagine the inner sanctuary specifically.
  doctrine_reference: 'Translation philosophy: optimal equivalence; original-language
    primacy over translation tradition.'
