id: MRK.11.15
reference: Mark 11:15
source:
  edition: SBLGNT
  text: Καὶ ἔρχονται εἰς Ἱεροσόλυμα. καὶ ⸀εἰσελθὼν εἰς τὸ ἱερὸν ἤρξατο ἐκβάλλειν τοὺς
    πωλοῦντας καὶ ⸀τοὺς ἀγοράζοντας ἐν τῷ ἱερῷ, καὶ τὰς τραπέζας τῶν κολλυβιστῶν καὶ
    τὰς καθέδρας τῶν πωλούντων τὰς περιστερὰς κατέστρεψεν
translation:
  text: And they came to Jerusalem. And after entering the temple, he began to drive
    out those who were selling and those who were buying in the temple, and he overturned
    the tables of the money changers and the seats of those who were selling doves.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the temple courts' or 'the temple precincts'; the Greek term refers
      to the broader temple complex, not specifically the inner sanctuary.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔρχονται
  chosen: they came
  alternatives:
  - they come
  - they arrive
  lexicon: BDAG
  rationale: Although the Greek uses the historical present, natural English narrative
    style commonly renders it as a past tense here. 'Came' preserves the event sequence
    without sounding wooden.
- source_word: Ἱεροσόλυμα
  chosen: Jerusalem
  lexicon: BDAG
  rationale: Standard English transliteration of the place name.
- source_word: εἰσελθὼν
  chosen: after entering
  alternatives:
  - entering
  - having entered
  lexicon: BDAG
  rationale: The aorist participle is antecedent to the main action. 'After entering'
    makes the temporal relationship clear in idiomatic English.
- source_word: τὸ ἱερὸν / ἐν τῷ ἱερῷ
  chosen: the temple
  alternatives:
  - the temple courts
  - the temple precincts
  lexicon: BDAG
  rationale: ἱερόν refers to the temple complex rather than the inner sanctuary. 'Temple'
    is the standard concise rendering; the broader sense is important but can be preserved
    in a footnote.
- source_word: ἤρξατο ἐκβάλλειν
  chosen: he began to drive out
  alternatives:
  - he began to cast out
  - he started driving out
  lexicon: BDAG
  rationale: The construction explicitly marks the inception of the action. 'Drive
    out' is forceful and idiomatic, fitting ἐκβάλλω in this context better than the
    more wooden 'cast out.'
- source_word: τοὺς πωλοῦντας
  chosen: those who were selling
  alternatives:
  - the sellers
  - those selling
  lexicon: BDAG
  rationale: The participle is substantival and ongoing in sense. This rendering preserves
    the verbal force and the group reference.
- source_word: τοὺς ἀγοράζοντας
  chosen: those who were buying
  alternatives:
  - the buyers
  - those buying
  lexicon: BDAG
  rationale: Parallel to 'those who were selling'; keeps the symmetry of the Greek.
- source_word: κολλυβιστῶν
  chosen: money changers
  alternatives:
  - coin exchangers
  lexicon: BDAG
  rationale: Standard and clear rendering for those exchanging currency in the temple
    area.
- source_word: καθέδρας
  chosen: seats
  alternatives:
  - chairs
  - benches
  lexicon: BDAG
  rationale: '''Seats'' is broad and natural, avoiding over-specification not demanded
    by the Greek.'
- source_word: περιστερὰς
  chosen: doves
  alternatives:
  - pigeons
  lexicon: BDAG
  rationale: '''Doves'' is the conventional and likely cultic-context rendering in
    English, especially given sacrificial associations.'
- source_word: κατέστρεψεν
  chosen: he overturned
  alternatives:
  - he turned over
  - he upset
  lexicon: BDAG
  rationale: In context of tables and seats, 'overturned' is vivid, idiomatic, and
    appropriately forceful.
