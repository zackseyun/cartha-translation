theological_decisions:
- issue: Meaning of 'from heaven' in reference to John's baptism/authority
  chosen_reading: Retain the idiom 'From heaven' in the main text
  alternative_readings:
  - From God
  rationale: The phrase is a standard Jewish reverential expression implying divine
    origin or authorization. Keeping 'heaven' preserves the source wording and the
    narrative's rhetorical force without flattening the idiom into an interpretive
    gloss.
  doctrine_reference: Translation philosophy §1, §3
