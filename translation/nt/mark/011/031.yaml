id: MRK.11.31
reference: Mark 11:31
source:
  edition: SBLGNT
  text: καὶ ⸀διελογίζοντο πρὸς ἑαυτοὺς λέγοντες· ⸂Τί εἴπωμεν;⸃ ἐὰν εἴπωμεν· Ἐξ οὐρανοῦ,
    ἐρεῖ· Διὰ τί ⸀οὖν οὐκ ἐπιστεύσατε αὐτῷ;
translation:
  text: And they were reasoning among themselves, saying, “What should we say? If
    we say, ‘From heaven,’ he will say, ‘Why then did you not believe him?’”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: “From heaven” is a Jewish reverential way of saying “from God” or “of divine
      origin.”
    reason: cultural_note
lexical_decisions:
- source_word: διελογίζοντο
  chosen: were reasoning
  alternatives:
  - were discussing
  - were debating
  - were deliberating
  lexicon: BDAG
  rationale: Imperfect middle indicates an ongoing internal deliberation. 'Were reasoning'
    preserves the cognitive sense of διαλογίζομαι better than the more generic 'were
    discussing,' while still sounding natural in English.
- source_word: πρὸς ἑαυτοὺς
  chosen: among themselves
  alternatives:
  - to themselves
  - with one another
  lexicon: BDAG
  rationale: The phrase refers to mutual discussion within the group, not merely private
    inner thought. 'Among themselves' captures the reciprocal force naturally in English.
- source_word: λέγοντες
  chosen: saying
  alternatives:
  - and saying
  - as they said
  lexicon: BDAG
  rationale: The participle introduces the content of their deliberation. 'Saying'
    is a straightforward and readable rendering that preserves the discourse flow.
- source_word: Τί εἴπωμεν;
  chosen: What should we say?
  alternatives:
  - What are we to say?
  - What shall we say?
  lexicon: BDAG
  rationale: The deliberative aorist subjunctive asks what response they ought to
    give. 'What should we say?' conveys the deliberative nuance in contemporary English
    without sounding archaic.
- source_word: ἐὰν εἴπωμεν
  chosen: If we say
  alternatives:
  - If we should say
  lexicon: BDAG
  rationale: A simple conditional protasis. 'If we say' is idiomatic and sufficient
    in English.
- source_word: Ἐξ οὐρανοῦ
  chosen: From heaven
  alternatives:
  - From God
  - Of heavenly origin
  lexicon: BDAG
  rationale: The Greek literally says 'from heaven.' This preserves the Jewish reverential
    idiom without over-interpreting it as an explicit substitution of 'God' in the
    main text.
- source_word: ἐρεῖ
  chosen: he will say
  alternatives:
  - he will ask
  - he will reply
  lexicon: BDAG
  rationale: Future of λέγω here introduces Jesus' expected response. 'He will say'
    is the most direct rendering; the following quotation supplies the interrogative
    force.
- source_word: Διὰ τί οὖν
  chosen: Why then
  alternatives:
  - Why, then
  - Why therefore
  lexicon: BDAG
  rationale: This combination draws an inference from their hypothetical answer. 'Why
    then' is natural and preserves the logical connection.
- source_word: οὐκ ἐπιστεύσατε αὐτῷ
  chosen: did you not believe him
  alternatives:
  - did you not trust him
  - did you not believe in him
  lexicon: BDAG
  rationale: πιστεύω with the dative commonly means to believe or trust a person.
    'Believe him' best fits John's testimony as something they should have accepted;
    'believe in him' would suggest a different construction and stronger personal-reliance
    nuance.
