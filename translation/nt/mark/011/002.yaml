id: MRK.11.2
reference: Mark 11:2
source:
  edition: SBLGNT
  text: καὶ λέγει αὐτοῖς· Ὑπάγετε εἰς τὴν κώμην τὴν κατέναντι ὑμῶν, καὶ ⸀εὐθὺς εἰσπορευόμενοι
    εἰς αὐτὴν εὑρήσετε πῶλον δεδεμένον ἐφ’ ὃν οὐδεὶς ⸀οὔπω ἀνθρώπων ⸀ἐκάθισεν· ⸂λύσατε
    αὐτὸν καὶ φέρετε⸃.
translation:
  text: And he says to them, “Go into the village opposite you, and as soon as you
    enter it, you will find a colt tied there, on which no one among men has yet sat.
    Untie it and bring it.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “a young donkey.” The Greek πῶλον can denote a young animal; in this
      context it refers to the animal Jesus will ride.
    reason: lexical_alternative
  - marker: b
    text: Literally, “on which no one of men has yet sat.” The wording explicitly
      refers to no human having ridden it.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ὑπάγετε
  chosen: Go
  alternatives:
  - Go away
  - Proceed
  lexicon: BDAG
  rationale: Imperative of movement; simple 'Go' is natural modern English and fits
    the commissioning context without adding nuance beyond the Greek.
- source_word: κώμην
  chosen: village
  alternatives:
  - hamlet
  - settlement
  lexicon: BDAG
  rationale: κώμη commonly denotes a village rather than a city; 'village' is the
    standard clear rendering.
- source_word: τὴν κατέναντι ὑμῶν
  chosen: opposite you
  alternatives:
  - facing you
  - across from you
  lexicon: BDAG
  rationale: The phrase identifies the village as the one opposite the disciples'
    present location. 'Opposite you' is slightly formal but direct and close to the
    Greek.
- source_word: εὐθὺς
  chosen: as soon as
  alternatives:
  - immediately
  lexicon: BDAG
  rationale: Here εὐθύς modifies the circumstance of entering and finding; 'as soon
    as you enter it' communicates the temporal force more idiomatically than a bare
    'immediately' in English.
- source_word: εἰσπορευόμενοι εἰς αὐτὴν
  chosen: you enter it
  alternatives:
  - entering into it
  - going into it
  lexicon: BDAG
  rationale: The participial construction is naturally rendered with a finite clause
    in English. 'Enter it' is concise and preserves the sense.
- source_word: εὑρήσετε
  chosen: you will find
  alternatives:
  - you will come upon
  lexicon: BDAG
  rationale: Future indicative with straightforward predictive force.
- source_word: πῶλον
  chosen: colt
  alternatives:
  - young donkey
  - foal
  lexicon: BDAG
  rationale: πῶλος denotes a young animal, and in this context of the triumphal entry
    tradition it refers to a donkey's colt. 'Colt' is concise and traditional, while
    the species is clarified by context and parallels.
- source_word: δεδεμένον
  chosen: tied there
  alternatives:
  - tied
  - bound
  lexicon: BDAG
  rationale: Perfect passive participle indicates the colt is in a tied state. 'Tied
    there' makes the scene natural in English without changing meaning.
- source_word: ἐφ’ ὃν
  chosen: on which
  alternatives:
  - upon which
  lexicon: BDAG
  rationale: Standard relative-prepositional construction referring to the colt.
- source_word: οὐδεὶς οὔπω ἀνθρώπων ἐκάθισεν
  chosen: no one among men has yet sat
  alternatives:
  - no person has yet sat
  - no one has ever sat
  lexicon: BDAG
  rationale: The Greek explicitly includes ἀνθρώπων, so the translation preserves
    that human reference rather than smoothing it away entirely. 'Has yet sat' reflects
    οὔπω better than 'has ever sat,' which would overstate the temporal nuance.
- source_word: λύσατε
  chosen: Untie
  alternatives:
  - Loose
  - Release
  lexicon: BDAG
  rationale: Aorist imperative in context of an animal fastened in place; 'Untie'
    is the clearest idiomatic English.
- source_word: φέρετε
  chosen: bring
  alternatives:
  - lead
  - carry
  lexicon: BDAG
  rationale: φέρω broadly means 'bring.' Although with an animal 'lead' is possible
    in English, the Greek does not require that narrower specification, so 'bring'
    best preserves the wording.
