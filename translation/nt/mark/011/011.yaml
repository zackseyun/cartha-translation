id: MRK.11.11
reference: Mark 11:11
source:
  edition: SBLGNT
  text: Καὶ εἰσῆλθεν εἰς ⸀Ἱεροσόλυμα εἰς τὸ ἱερόν· καὶ περιβλεψάμενος πάντα ⸀ὀψὲ ἤδη
    οὔσης τῆς ὥρας ἐξῆλθεν εἰς Βηθανίαν μετὰ τῶν δώδεκα.
translation:
  text: And he entered Jerusalem, into the temple courts; and after looking around
    at everything, since it was already late, he went out to Bethany with the twelve.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the temple precincts' or simply 'the temple'; the Greek term refers
      to the broader temple complex, not specifically the inner sanctuary.
    reason: lexical_alternative
  - marker: b
    text: Or 'because the hour was already late' or 'as it was already late in the
      day.'
    reason: lexical_alternative
  - marker: c
    text: That is, Jesus' twelve disciples.
    reason: cross_reference
lexical_decisions:
- source_word: εἰσῆλθεν
  chosen: entered
  alternatives:
  - went into
  lexicon: BDAG
  rationale: Aorist indicative of εἰσέρχομαι, straightforwardly denoting entry. 'Entered'
    is natural modern English and preserves the narrative movement.
- source_word: Ἱεροσόλυμα
  chosen: Jerusalem
  lexicon: BDAG
  rationale: Standard English transliteration for the place name.
- source_word: τὸ ἱερόν
  chosen: the temple courts
  alternatives:
  - the temple
  - the temple precincts
  lexicon: BDAG
  rationale: ἱερόν refers to the temple complex/precincts rather than the inner sanctuary
    (ναός). 'Temple courts' communicates the broader public area Jesus could enter
    and survey.
- source_word: περιβλεψάμενος
  chosen: after looking around
  alternatives:
  - looking around
  - having looked around
  lexicon: BDAG
  rationale: The participle conveys a surveying glance around the surroundings. 'After
    looking around' captures the attendant action in idiomatic English while preserving
    sequence.
- source_word: πάντα
  chosen: everything
  alternatives:
  - all things
  - everything there
  lexicon: BDAG
  rationale: Neuter plural object of the participle, naturally rendered 'everything.'
    This preserves the comprehensiveness of Jesus' observation without over-specifying.
- source_word: ὀψὲ ἤδη οὔσης τῆς ὥρας
  chosen: since it was already late
  alternatives:
  - because the hour was already late
  - as it was already late in the day
  lexicon: BDAG
  rationale: Genitive absolute indicating the time circumstance. 'Since it was already
    late' is concise, natural, and preserves the causal-temporal force behind his
    departure.
- source_word: ἐξῆλθεν
  chosen: he went out
  alternatives:
  - he departed
  - he left
  lexicon: BDAG
  rationale: Aorist indicative of ἐξέρχομαι, denoting exit/departure. 'Went out' preserves
    the directional sense from Jerusalem/the temple area.
- source_word: Βηθανίαν
  chosen: Bethany
  lexicon: BDAG
  rationale: Standard English transliteration for the village name.
- source_word: μετὰ τῶν δώδεκα
  chosen: with the twelve
  alternatives:
  - with the Twelve
  lexicon: BDAG
  rationale: The phrase refers to Jesus' twelve disciples/apostles. Lowercase in the
    main text avoids importing a formalized title where the Greek itself simply gives
    the number, though the referent is clear.
