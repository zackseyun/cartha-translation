theological_decisions:
- issue: Reference of τὸ ἱερόν
  chosen_reading: the temple courts / temple precincts rather than the inner sanctuary
  alternative_readings:
  - the temple
  rationale: This is not a doctrinal dispute but a significant interpretive choice
    affecting spatial sense. Rendering ἱερόν as the broader temple complex avoids
    conflating it with ναός and better fits the narrative of Jesus entering and surveying
    the public area.
  doctrine_reference: Translation philosophy §1, §5
- issue: Stylistic capitalization of 'the twelve'
  chosen_reading: with the twelve
  alternative_readings:
  - with the Twelve
  rationale: The Greek does not mark capitalization. Lowercase preserves the wording
    without denying the recognized group identity; English capitalization here is
    stylistic rather than theological.
  doctrine_reference: Translation philosophy §6
