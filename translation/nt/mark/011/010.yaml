id: MRK.11.10
reference: Mark 11:10
source:
  edition: SBLGNT
  text: Εὐλογημένη ἡ ἐρχομένη ⸀βασιλεία τοῦ πατρὸς ἡμῶν Δαυίδ· Ὡσαννὰ ἐν τοῖς ὑψίστοις.
translation:
  text: Blessed is the coming kingdom of our father David! Hosanna in the highest!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Hosanna' may reflect the plea 'Save, please' or 'Save now,' though here
      it functions as a liturgical shout of praise.
    reason: lexical_alternative
lexical_decisions:
- source_word: Εὐλογημένη
  chosen: Blessed
  alternatives:
  - Praised
  lexicon: BDAG
  rationale: Predicate adjective introducing an acclamation. 'Blessed' is the standard
    and most natural rendering in this liturgical/exclamatory context, preserving
    the beatitude-like tone better than 'praised.'
- source_word: ἡ ἐρχομένη βασιλεία
  chosen: the coming kingdom
  alternatives:
  - the kingdom that is coming
  - the kingdom to come
  lexicon: BDAG
  rationale: The article + participle + noun construction is naturally rendered attributively
    in English. 'Coming' preserves the present participle's force without awkwardness.
    'Kingdom to come' could sound more eschatologically fixed than the Greek requires.
- source_word: βασιλεία
  chosen: kingdom
  alternatives:
  - reign
  - royal rule
  lexicon: BDAG
  rationale: '''Kingdom'' is the most idiomatic rendering here and fits the Davidic
    dynastic context. While ''reign'' can capture abstract rule, the crowd''s acclamation
    evokes the arrival of David''s royal dominion in a concrete messianic sense.'
- source_word: τοῦ πατρὸς ἡμῶν Δαυίδ
  chosen: of our father David
  alternatives:
  - of David our father
  lexicon: BDAG
  rationale: The genitival phrase modifies 'kingdom.' 'Our father David' is a natural
    English rendering that preserves the ancestral honorific sense. 'Of David our
    father' is also possible and slightly more formal, but less smooth in contemporary
    English.
- source_word: Ὡσαννὰ
  chosen: Hosanna
  alternatives:
  - Save, please
  - Save now
  lexicon: BDAG
  rationale: By NT usage this is a fixed liturgical acclamation, so transliteration
    is preferable in the main text. Its underlying plea for salvation is worth preserving
    in a footnote as a lexical alternative.
- source_word: ἐν τοῖς ὑψίστοις
  chosen: in the highest
  alternatives:
  - in the highest places
  - in the highest heavens
  lexicon: BDAG
  rationale: This idiom is traditionally and accurately rendered 'in the highest,'
    likely referring to the highest heavenly realm. The fuller paraphrases are interpretive
    and less concise than the Greek.
