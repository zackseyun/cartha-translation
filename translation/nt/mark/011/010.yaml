theological_decisions:
- issue: Nature of the Davidic kingdom acclamation
  chosen_reading: Render the phrase straightforwardly as a blessing on the coming
    kingdom associated with David, without importing an explicit interpretive gloss
    such as 'messianic kingdom.'
  alternative_readings:
  - Blessed is the coming messianic kingdom of our father David
  rationale: The context strongly suggests messianic expectation, but the Greek text
    itself says 'the coming kingdom of our father David.' To preserve theological
    tension and avoid importing a fuller doctrinal explanation into the text, the
    translation keeps the wording direct and lets the allusion stand.
  doctrine_reference: Preserve theological tension rather than resolve it.
