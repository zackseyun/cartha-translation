theological_decisions:
- issue: Referent and force of κύριος
  chosen_reading: '''The Lord'' refers to Jesus and is translated as a title, not
    reduced to ''master.'''
  alternative_readings:
  - '''the master'' in a more ordinary owner/master sense'
  rationale: The project's contested-terms guidance sets κύριος to 'Lord' by default.
    In Mark's narrative context, Jesus is the speaker giving instructions, and the
    phrase carries more than a merely secular sense. The translation preserves the
    title without importing additional doctrinal claims beyond the text.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
