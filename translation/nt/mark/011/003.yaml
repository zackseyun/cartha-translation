id: MRK.11.3
reference: Mark 11:3
source:
  edition: SBLGNT
  text: καὶ ἐάν τις ὑμῖν εἴπῃ· Τί ποιεῖτε τοῦτο; εἴπατε ⸀ὅτι Ὁ κύριος αὐτοῦ χρείαν
    ἔχει· καὶ ⸀εὐθὺς αὐτὸν ἀποστέλλει ⸀πάλιν ὧδε.
translation:
  text: And if anyone says to you, ‘Why are you doing this?’ say, ‘The Lord has need
    of it,’ and he will send it back here immediately.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'The master has need of it.' Greek κύριος can mean 'lord' or 'master,'
      but here it is rendered 'Lord' in keeping with the Gospel context and the project's
      default for κύριος.
    reason: alternative_reading
  - marker: b
    text: Or, 'and he sends it back here immediately.' The Greek present tense ἀποστέλλει
      may be understood as a vivid present; the translation renders the sense as future
      in English.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐάν τις ὑμῖν εἴπῃ
  chosen: if anyone says to you
  alternatives:
  - if someone says to you
  lexicon: BDAG
  rationale: ἐάν with the aorist subjunctive εἴπῃ introduces a future-more-vivid conditional;
    'if anyone says to you' is natural English and preserves the open condition.
- source_word: Τί ποιεῖτε τοῦτο;
  chosen: Why are you doing this?
  alternatives:
  - What are you doing with this?
  - Why are you doing this thing?
  lexicon: BDAG
  rationale: 'Although τί can be rendered ''what,'' in this idiom τί ποιεῖτε τοῦτο
    is best represented as a challenge to the action: ''Why are you doing this?''
    This is standard, idiomatic English for the Greek question.'
- source_word: εἴπατε
  chosen: say
  alternatives:
  - tell them
  lexicon: BDAG
  rationale: Aorist imperative plural; 'say' is the direct and sufficiently natural
    rendering in context.
- source_word: ὅτι
  chosen: that
  alternatives:
  - ''
  lexicon: BDAG
  rationale: Introduces the content of what the disciples are to say. In English dialogue,
    the conjunction may be omitted without loss, but the sense is retained in the
    quotation structure.
- source_word: Ὁ κύριος
  chosen: The Lord
  alternatives:
  - the master
  lexicon: BDAG
  rationale: κύριος is rendered by the project's default as 'Lord.' In Mark's narrative
    this most naturally refers to Jesus with authoritative force; 'master' is possible
    in a purely secular sense but weaker and less consistent with the Gospel's usage.
- source_word: αὐτοῦ
  chosen: of it
  alternatives:
  - of him
  lexicon: BDAG
  rationale: The pronoun refers to the colt mentioned in the previous verse. English
    idiom prefers 'need of it' rather than 'need of him' for an animal in this context.
- source_word: χρείαν ἔχει
  chosen: has need of it
  alternatives:
  - needs it
  lexicon: BDAG
  rationale: The phrase literally means 'has need.' This slightly more formal wording
    preserves the expression's tone while remaining clear. 'Needs it' is possible
    but flattens the diction somewhat.
- source_word: εὐθὺς
  chosen: immediately
  alternatives:
  - at once
  - soon
  lexicon: BDAG
  rationale: εὐθύς commonly means 'immediately/at once' in Mark. 'Immediately' preserves
    Markan urgency.
- source_word: ἀποστέλλει
  chosen: will send
  alternatives:
  - sends
  lexicon: BDAG
  rationale: Although formally present tense, this is naturally understood in context
    as a futuristic present after the quoted explanation. English future 'will send'
    best conveys the sense.
- source_word: πάλιν
  chosen: back
  alternatives:
  - again
  lexicon: BDAG
  rationale: With ἀποστέλλει and the context of returning the colt, πάλιν is best
    rendered idiomatically as 'back' rather than the more wooden 'again.'
- source_word: ὧδε
  chosen: here
  alternatives:
  - to this place
  lexicon: BDAG
  rationale: ὧδε is a deictic adverb meaning 'here'; 'here' is the natural English
    equivalent.
