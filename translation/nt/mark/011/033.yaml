id: MRK.11.33
reference: Mark 11:33
source:
  edition: SBLGNT
  text: καὶ ἀποκριθέντες ⸂τῷ Ἰησοῦ λέγουσιν⸃· Οὐκ οἴδαμεν. καὶ ὁ ⸀Ἰησοῦς λέγει αὐτοῖς·
    Οὐδὲ ἐγὼ λέγω ὑμῖν ἐν ποίᾳ ἐξουσίᾳ ταῦτα ποιῶ.
translation:
  text: And answering Jesus, they say, “We do not know.” And Jesus says to them, “Neither
    do I tell you by what authority I do these things.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “with what authority.”
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀποκριθέντες
  chosen: answering
  alternatives:
  - in reply
  - having answered
  lexicon: BDAG
  rationale: A participial form introducing their response. 'Answering' preserves
    the Greek participial linkage and is natural enough in English when followed by
    direct speech.
- source_word: λέγουσιν / λέγει / λέγω
  chosen: say / says / tell
  alternatives:
  - speak
  - said
  lexicon: BDAG
  rationale: Present-tense historical narration is retained with 'say/says' for vividness.
    In the final clause, English idiom prefers 'tell you' rather than 'say to you'
    before an indirect question, while still representing λέγω faithfully.
- source_word: Οὐκ οἴδαμεν
  chosen: We do not know
  alternatives:
  - We don't know
  lexicon: BDAG
  rationale: A straightforward negated perfect with present sense. The full form avoids
    unnecessary contraction in a formal narrative setting.
- source_word: Οὐδὲ ἐγὼ
  chosen: Neither do I
  alternatives:
  - Nor do I
  - And neither do I
  lexicon: BDAG
  rationale: This directly mirrors the adversative-negative response to their refusal
    to answer. 'Neither do I' is idiomatic and preserves the rhetorical symmetry.
- source_word: ἐν ποίᾳ ἐξουσίᾳ
  chosen: by what authority
  alternatives:
  - in what authority
  - with what authority
  lexicon: BDAG
  rationale: The prepositional phrase is idiomatically rendered in English as 'by
    what authority,' expressing the basis or warrant for Jesus' actions. 'With what
    authority' is also possible, but 'by' better conveys agency/grounds here.
- source_word: ταῦτα
  chosen: these things
  alternatives:
  - this
  lexicon: BDAG
  rationale: The neuter plural demonstrative points back to Jesus' recent actions
    and teaching in the temple. 'These things' preserves the plural reference.
- source_word: ποιῶ
  chosen: I do
  alternatives:
  - I am doing
  lexicon: BDAG
  rationale: Simple present best matches the Greek present in this context and reads
    naturally in English.
