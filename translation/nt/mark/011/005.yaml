id: MRK.11.5
reference: Mark 11:5
source:
  edition: SBLGNT
  text: καί τινες τῶν ἐκεῖ ἑστηκότων ἔλεγον αὐτοῖς· Τί ποιεῖτε λύοντες τὸν πῶλον;
translation:
  text: And some of those standing there were saying to them, “What are you doing,
    untying the colt?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the young donkey.” The Greek πῶλος can mean a young animal; in this
      context it refers to a donkey.
    reason: lexical_alternative
lexical_decisions:
- source_word: τινες
  chosen: some
  alternatives:
  - certain ones
  lexicon: BDAG
  rationale: Indefinite plural referring to an unspecified subset of people present.
    'Some' is natural modern English and preserves the indefiniteness.
- source_word: τῶν ἐκεῖ ἑστηκότων
  chosen: of those standing there
  alternatives:
  - of those who were standing there
  - of the bystanders there
  lexicon: BDAG
  rationale: The perfect active participle of ἵστημι functions substantivally with
    τῶν and is modified by ἐκεῖ. 'Those standing there' closely reflects the Greek
    while remaining idiomatic. 'Bystanders' is possible but slightly more interpretive
    than the source wording.
- source_word: ἔλεγον
  chosen: were saying
  alternatives:
  - said
  - kept saying
  lexicon: BDAG
  rationale: Imperfect tense suggests ongoing or inceptive past speech. 'Were saying'
    preserves the imperfect aspect without overinterpreting repetition. 'Said' would
    flatten the aspect; 'kept saying' may overstate iterative force.
- source_word: αὐτοῖς
  chosen: to them
  lexicon: BDAG
  rationale: Dative plural pronoun referring to the disciples addressed by the speakers.
    Standard indirect-object rendering.
- source_word: Τί ποιεῖτε
  chosen: What are you doing
  alternatives:
  - Why are you doing this
  - What are you doing here
  lexicon: BDAG
  rationale: A direct question about their action. The present tense is naturally
    rendered in English as 'are you doing.' Adding 'why' or 'here' would import nuance
    not explicit in the Greek.
- source_word: λύοντες
  chosen: untying
  alternatives:
  - loosening
  - releasing
  lexicon: BDAG
  rationale: Present participle describing the action in question. In context of an
    animal tied up, 'untying' is the clearest and most idiomatic English equivalent.
    'Loosening' is more literal but less natural; 'releasing' is too broad.
- source_word: τὸν πῶλον
  chosen: the colt
  alternatives:
  - the young donkey
  - the foal
  lexicon: BDAG
  rationale: πῶλος denotes a young animal, and in this context the parallel accounts
    clarify it is a donkey. However, Mark's wording itself uses the more general 'colt,'
    so 'the colt' best preserves the source text while remaining understandable. 'Young
    donkey' is interpretive; 'foal' is possible but less common in this context.
