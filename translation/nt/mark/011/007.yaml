id: MRK.11.7
reference: Mark 11:7
source:
  edition: SBLGNT
  text: καὶ ⸀φέρουσιν τὸν πῶλον πρὸς τὸν Ἰησοῦν, καὶ ⸀ἐπιβάλλουσιν αὐτῷ τὰ ἱμάτια
    αὐτῶν, καὶ ἐκάθισεν ἐπ’ ⸀αὐτόν.
translation:
  text: And they brought the colt to Jesus, and they threw their cloaks on it, and
    he sat on it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'young donkey.' The Greek πῶλον means 'colt' or 'young animal'; in this
      context it refers to a donkey.
    reason: lexical_alternative
lexical_decisions:
- source_word: φέρουσιν
  chosen: brought
  alternatives:
  - bring
  - are bringing
  - led
  lexicon: BDAG
  rationale: Although the Greek is present tense in narrative, English idiom normally
    renders this historical present as simple past. 'Brought' is the most natural
    equivalent here. 'Led' is possible in context with an animal, but φέρω primarily
    means 'bring/carry,' and the text does not explicitly emphasize leading.
- source_word: πῶλον
  chosen: colt
  alternatives:
  - young donkey
  - foal
  lexicon: BDAG
  rationale: πῶλος denotes a young animal, and in this context the parallel accounts
    and surrounding narrative identify it as a donkey. 'Colt' is concise and idiomatic,
    while preserving the sense of a young riding animal. The more explicit 'young
    donkey' is interpretive and better preserved as an alternative.
- source_word: ἐπιβάλλουσιν
  chosen: threw
  alternatives:
  - placed
  - put on
  lexicon: BDAG
  rationale: ἐπιβάλλω can mean 'throw on' or 'place on.' Here the action of putting
    garments onto the colt is vivid and preparatory for riding. 'Threw' preserves
    the narrative energy without overstating the action.
- source_word: αὐτῷ
  chosen: on it
  alternatives:
  - on him
  lexicon: BDAG
  rationale: The dative pronoun refers to the colt, not to Jesus, since the garments
    are being placed on the animal for Jesus to ride. English uses 'it' naturally
    for an animal in this setting.
- source_word: ἱμάτια
  chosen: cloaks
  alternatives:
  - garments
  - outer garments
  - robes
  lexicon: BDAG
  rationale: ἱμάτια refers broadly to garments, often outer garments. 'Cloaks' is
    natural modern English and fits the action of spreading them on the colt. 'Garments'
    is more formal but less vivid.
- source_word: ἐκάθισεν
  chosen: sat
  alternatives:
  - sat down
  - mounted and sat
  lexicon: BDAG
  rationale: The aorist simply states that Jesus sat on the colt. 'Sat' is sufficient
    and avoids adding the more specific action 'mounted,' which the Greek does not
    explicitly state.
- source_word: ἐπ’ αὐτόν
  chosen: on it
  alternatives:
  - on him
  lexicon: BDAG
  rationale: 'The prepositional phrase refers to the colt. Rendering with ''it'' reflects
    normal English reference to the animal and keeps the sequence clear: garments
    on the colt, then Jesus sat on the colt.'
