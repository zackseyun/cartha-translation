theological_decisions:
- issue: Interpretive force of the explanatory clause about the fig season
  chosen_reading: 'Render the clause directly as an explanatory narrator comment:
    ''for it was not the season for figs.'''
  alternative_readings:
  - Render more literally as 'for it was not the time of figs'
  - Interpret the clause more expansively to explain agricultural expectations
  rationale: The verse has generated interpretive discussion because Jesus seeks fruit
    when Mark notes it was not fig season. The translation should preserve the tension
    rather than soften it or resolve it by paraphrase. A direct rendering best fits
    the stated philosophy of preserving theological tension rather than resolving
    it.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
