theological_decisions:
- issue: Nature of Jesus' pronouncement to the fig tree
  chosen_reading: 'Render the statement as an imprecatory wish: ''May no one ever
    eat fruit from you again.'''
  alternative_readings:
  - 'Render more flatly as a predictive statement: ''No one will ever eat fruit from
    you again.'''
  rationale: The optative φάγοι is volitive rather than a simple future indicative.
    The translation should preserve that Jesus is pronouncing a curse/judgment on
    the tree, not merely predicting its future condition.
  doctrine_reference: Preserve theological tension rather than resolve it; follow
    the Greek's plain sense.
