id: MRK.11.14
reference: Mark 11:14
source:
  edition: SBLGNT
  text: καὶ ⸀ἀποκριθεὶς εἶπεν αὐτῇ· Μηκέτι ⸂εἰς τὸν αἰῶνα ἐκ σοῦ⸃ μηδεὶς καρπὸν φάγοι.
    καὶ ἤκουον οἱ μαθηταὶ αὐτοῦ.
translation:
  text: And answering, he said to it, “May no one ever eat fruit from you again.”
    And his disciples were listening.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'And answering, he said to it.' The verb 'answering'
      is a common narrative idiom in Greek even when no explicit prior speech is recorded.
    reason: lexical_alternative
  - marker: b
    text: 'Or ''May no one eat fruit from you forever.'' Greek: ''into the age.'''
    reason: alternative_reading
  - marker: c
    text: 'The Greek imperfect can also be rendered ''heard'': ''And his disciples
      heard it.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀποκριθεὶς
  chosen: answering
  alternatives:
  - in response
  - answered
  lexicon: BDAG
  rationale: Although no prior spoken prompt from the tree is recorded, ἀποκρίνομαι
    is a common Semitic-influenced narrative idiom meaning 'answer/respond.' Rendering
    it as 'answering' preserves the Greek form and the slightly formal narrative texture
    better than smoothing it away.
- source_word: αὐτῇ
  chosen: to it
  alternatives:
  - to her
  lexicon: BDAG
  rationale: The pronoun is grammatically feminine because 'fig tree' is feminine
    in Greek, but English refers to a tree as 'it.' This is a gender-accurate adjustment
    to match English usage without implying personhood.
- source_word: Μηκέτι
  chosen: no longer ... again
  alternatives:
  - never again
  - no more
  lexicon: BDAG
  rationale: Μηκέτι means 'no longer' or 'no more.' In combination with the following
    phrase εἰς τὸν αἰῶνα, the sense is an emphatic prohibition extending indefinitely.
    English idiom is best captured by 'ever ... again' in the full clause.
- source_word: εἰς τὸν αἰῶνα
  chosen: ever
  alternatives:
  - forever
  - for eternity
  - to the age
  lexicon: BDAG
  rationale: Literally 'into the age,' this idiom commonly means 'forever' or 'ever.'
    Here, with the optative curse formula, 'ever' produces natural English in the
    phrase 'May no one ever eat...again' while preserving the force of permanent cessation.
- source_word: ἐκ σοῦ
  chosen: from you
  alternatives:
  - from it
  - of yours
  lexicon: BDAG
  rationale: The Greek directly addresses the tree in the second person singular.
    'From you' preserves the vivid direct address better than flattening to third
    person 'from it.'
- source_word: μηδεὶς
  chosen: no one
  alternatives:
  - nobody
  - not anyone
  lexicon: BDAG
  rationale: Indefinite negative subject in a curse/wish formula; 'no one' is the
    clearest standard English rendering.
- source_word: καρπὸν
  chosen: fruit
  alternatives:
  - a fruit
  - any fruit
  lexicon: BDAG
  rationale: The singular is generic/objective in English; 'fruit' naturally conveys
    the intended sense without awkwardness.
- source_word: φάγοι
  chosen: may ... eat
  alternatives:
  - let ... eat
  - should ... eat
  lexicon: BDAG
  rationale: Aorist optative here expresses a wish/imprecation. 'May no one ... eat'
    best represents the volitive force in idiomatic English.
- source_word: ἤκουον
  chosen: were listening
  alternatives:
  - heard
  - were hearing
  lexicon: BDAG
  rationale: The imperfect indicates ongoing action. 'Were listening' preserves the
    durative aspect more clearly than the simple past 'heard,' which can sound punctiliar.
- source_word: μαθηταὶ αὐτοῦ
  chosen: his disciples
  alternatives:
  - the disciples of him
  lexicon: BDAG
  rationale: Standard idiomatic rendering of the possessive phrase.
