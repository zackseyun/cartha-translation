id: MRK.11.18
reference: Mark 11:18
source:
  edition: SBLGNT
  text: καὶ ἤκουσαν οἱ ⸂ἀρχιερεῖς καὶ οἱ γραμματεῖς⸃, καὶ ἐζήτουν πῶς αὐτὸν ἀπολέσωσιν·
    ἐφοβοῦντο γὰρ αὐτόν, ⸂πᾶς γὰρ⸃ ὁ ὄχλος ἐξεπλήσσετο ἐπὶ τῇ διδαχῇ αὐτοῦ.
translation:
  text: And the chief priests and the scribes heard it, and they were seeking how
    they might destroy him, for they feared him, because the whole crowd was astonished
    at his teaching.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'kill him' or 'put him to death.' The Greek verb can mean 'destroy' more
      broadly, though the context suggests a lethal intent.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἤκουσαν
  chosen: heard it
  alternatives:
  - heard
  - came to hear of it
  lexicon: BDAG
  rationale: The verb means 'heard' or 'learned of.' English idiom benefits from supplying
    the object 'it,' referring back to Jesus' actions/words in the temple context,
    without over-specifying the content.
- source_word: ἀρχιερεῖς
  chosen: chief priests
  alternatives:
  - high priests
  - leading priests
  lexicon: BDAG
  rationale: Standard plural rendering for the Jerusalem priestly leadership. 'High
    priests' can mislead English readers into thinking of multiple holders of the
    singular office; 'chief priests' better reflects the group designation.
- source_word: γραμματεῖς
  chosen: scribes
  alternatives:
  - teachers of the law
  - legal experts
  lexicon: BDAG
  rationale: '''Scribes'' is the established and sufficiently transparent rendering
    for the Jewish scholarly class in the Gospels. More interpretive alternatives
    narrow the term beyond the Greek.'
- source_word: ἐζήτουν
  chosen: were seeking
  alternatives:
  - were looking for
  - kept trying
  lexicon: BDAG
  rationale: Imperfect tense indicates ongoing or attempted action. 'Were seeking'
    preserves that durative sense better than a simple past.
- source_word: πῶς
  chosen: how they might
  alternatives:
  - how to
  - in what way they could
  lexicon: BDAG
  rationale: Introduces the manner or means by which they intended to act. 'How they
    might' fits natural English while preserving the deliberative nuance.
- source_word: ἀπολέσωσιν
  chosen: destroy him
  alternatives:
  - kill him
  - put him to death
  lexicon: BDAG
  rationale: ἀπόλλυμι can mean 'destroy' or 'kill.' 'Destroy him' preserves the broader
    lexical force and matches the Greek wording without prematurely narrowing it to
    the method, though in context lethal intent is clearly implied.
- source_word: ἐφοβοῦντο
  chosen: they feared him
  alternatives:
  - they were afraid of him
  - they stood in fear of him
  lexicon: BDAG
  rationale: The imperfect middle/passive conveys continuing fear. 'They feared him'
    is concise and natural, and in context refers to fear of Jesus' influence and
    the crowd's response.
- source_word: πᾶς ὁ ὄχλος
  chosen: the whole crowd
  alternatives:
  - all the crowd
  - the entire crowd
  lexicon: BDAG
  rationale: The construction is collective and emphatic. 'The whole crowd' is idiomatic
    English and preserves the sense that the crowd broadly, not merely some individuals,
    was affected.
- source_word: ἐξεπλήσσετο
  chosen: was astonished
  alternatives:
  - was amazed
  - was overwhelmed with amazement
  lexicon: BDAG
  rationale: The imperfect indicates an ongoing state of astonishment. 'Was astonished'
    preserves the strength of the reaction without becoming overly expansive.
- source_word: ἐπὶ τῇ διδαχῇ αὐτοῦ
  chosen: at his teaching
  alternatives:
  - because of his teaching
  - over his teaching
  lexicon: BDAG
  rationale: ἐπί with the dative here marks the basis or occasion of astonishment.
    'At his teaching' is the most natural English rendering.
