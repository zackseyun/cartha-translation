theological_decisions:
- issue: Scope of the leaders' intent in ἀπολέσωσιν
  chosen_reading: Rendered as 'destroy him' rather than explicitly 'kill him.'
  alternative_readings:
  - kill him
  - put him to death
  rationale: The immediate context points toward a lethal plot, but the Greek verb
    itself is broader. To avoid importing a narrower claim than the wording itself
    makes, the main text keeps 'destroy him,' while recognizing that many translations
    render the implied sense more explicitly.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; preserve what the source text plainly says without paraphrasing beyond
    warrant.'
