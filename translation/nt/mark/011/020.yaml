id: MRK.11.20
reference: Mark 11:20
source:
  edition: SBLGNT
  text: Καὶ ⸂παραπορευόμενοι πρωῒ⸃ εἶδον τὴν συκῆν ἐξηραμμένην ἐκ ῥιζῶν.
translation:
  text: And as they were passing by early in the morning, they saw the fig tree withered
    from the roots.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'dried up from the roots.'
    reason: lexical_alternative
lexical_decisions:
- source_word: παραπορευόμενοι
  chosen: as they were passing by
  alternatives:
  - passing by
  - going along
  lexicon: BDAG
  rationale: The present participle is contemporaneous with the main verb and naturally
    gives background action. 'As they were passing by' preserves the participial sense
    in readable English better than a bare coordinate 'they passed by.'
- source_word: πρωῒ
  chosen: early in the morning
  alternatives:
  - in the morning
  - early
  lexicon: BDAG
  rationale: The adverb denotes the early morning time. 'Early in the morning' captures
    both the temporal reference and the emphasis on earliness more fully than simply
    'in the morning.'
- source_word: εἶδον
  chosen: they saw
  alternatives:
  - they noticed
  lexicon: BDAG
  rationale: A straightforward aorist of perception; 'they saw' is the most direct
    and least interpretive rendering.
- source_word: συκῆν
  chosen: the fig tree
  alternatives:
  - the fig tree plant
  lexicon: BDAG
  rationale: Standard rendering for συκῆ in this narrative context.
- source_word: ἐξηραμμένην
  chosen: withered
  alternatives:
  - dried up
  - shrivelled
  lexicon: BDAG
  rationale: The perfect passive participle describes the resulting state of the tree
    after Jesus' curse. 'Withered' is idiomatic for a tree and preserves the state
    resulting from prior action. 'Dried up' is possible and traditional, but 'withered'
    reads more naturally with 'fig tree' in contemporary English.
- source_word: ἐκ ῥιζῶν
  chosen: from the roots
  alternatives:
  - from its roots
  - up from the roots
  lexicon: BDAG
  rationale: The phrase indicates the extent/source of the withering beginning at
    the roots. 'From the roots' is concise and faithful. Adding 'its' is interpretive
    but possible; 'up from the roots' slightly over-specifies the imagery.
