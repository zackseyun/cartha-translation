theological_decisions:
- issue: Nature of Jesus' claimed authorization
  chosen_reading: Render the leaders' question neutrally as a challenge to Jesus'
    authority without importing an explicit divine-source answer into the translation.
  alternative_readings:
  - A more interpretive rendering could imply 'divine authority' from context.
  rationale: The verse records the opponents' question, not the narrator's answer.
    The translation should preserve the challenge without resolving it doctrinally
    in the wording.
  doctrine_reference: Preserve theological tension rather than resolve it.
