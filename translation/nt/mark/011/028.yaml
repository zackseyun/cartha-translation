id: MRK.11.28
reference: Mark 11:28
source:
  edition: SBLGNT
  text: καὶ ⸀ἔλεγον αὐτῷ· Ἐν ποίᾳ ἐξουσίᾳ ταῦτα ποιεῖς; ⸀ἢ τίς σοι ⸂ἔδωκεν τὴν ἐξουσίαν
    ταύτην⸃ ἵνα ταῦτα ποιῇς;
translation:
  text: And they were saying to him, “By what authority are you doing these things?
    Or who gave you this authority to do these things?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, “In what authority are you doing these things?”
    reason: lexical_alternative
  - marker: b
    text: Or, “so that you may do these things.”
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔλεγον
  chosen: they were saying
  alternatives:
  - they said
  lexicon: BDAG
  rationale: Imperfect tense suggests ongoing or repeated speech, so 'were saying'
    better reflects the aspect than simple past 'said'.
- source_word: Ἐν ποίᾳ ἐξουσίᾳ
  chosen: By what authority
  alternatives:
  - In what authority
  - By what right
  lexicon: BDAG
  rationale: The idiom ἐν + dative here asks the basis or sphere of authorization.
    'By what authority' is natural English and preserves the sense of delegated right/power.
- source_word: ἐξουσίᾳ / ἐξουσίαν
  chosen: authority
  alternatives:
  - right
  - power
  lexicon: BDAG
  rationale: ἐξουσία commonly denotes authority, delegated right, or jurisdiction.
    'Authority' best fits the leaders' challenge to Jesus' legitimacy in the temple
    context.
- source_word: ταῦτα ποιεῖς / ταῦτα ποιῇς
  chosen: are you doing these things / to do these things
  alternatives:
  - do these things
  - are you doing this
  lexicon: BDAG
  rationale: Plural ταῦτα is retained as 'these things,' referring broadly to Jesus'
    recent actions and teaching. The present indicative/subjunctive is represented
    idiomatically in English.
- source_word: ἢ
  chosen: Or
  alternatives:
  - And
  - Or else
  lexicon: BDAG
  rationale: 'ἢ introduces the second, closely related question as an alternative
    formulation: either by what authority, or who granted it.'
- source_word: τίς σοι ἔδωκεν
  chosen: who gave you
  alternatives:
  - who has given you
  lexicon: BDAG
  rationale: Aorist ἔδωκεν is best rendered as simple past in English in this direct
    question.
- source_word: ἵνα ταῦτα ποιῇς
  chosen: to do these things
  alternatives:
  - so that you may do these things
  - that you should do these things
  lexicon: BDAG
  rationale: ἵνα with subjunctive can express purpose or intended result. In English
    after 'gave you this authority,' infinitival 'to do these things' is the most
    natural equivalent without losing meaning.
