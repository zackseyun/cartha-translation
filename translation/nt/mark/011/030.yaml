theological_decisions:
- issue: Meaning of 'from heaven' in Jesus' question
  chosen_reading: Retain the idiom 'from heaven' in the main text as a statement of
    divine origin/authority without paraphrasing it.
  alternative_readings:
  - from God
  rationale: The phrase invokes a standard Jewish circumlocution for God while preserving
    the rhetorical force of Jesus' challenge. Translating it directly avoids importing
    interpretation into the main text while leaving the theological implication clear.
  doctrine_reference: Translation philosophy §1, §3
