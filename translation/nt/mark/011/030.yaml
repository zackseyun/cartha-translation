id: MRK.11.30
reference: Mark 11:30
source:
  edition: SBLGNT
  text: τὸ βάπτισμα ⸀τὸ Ἰωάννου ἐξ οὐρανοῦ ἦν ἢ ἐξ ἀνθρώπων; ἀποκρίθητέ μοι.
translation:
  text: Was John's baptism from heaven or from men? Answer me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from God.' The Greek reads 'from heaven,' preserving the Jewish idiom
      for divine origin or authority.
    reason: lexical_alternative
  - marker: b
    text: '''From men'' means ''from human beings,'' that is, of merely human origin
      or authority.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τὸ βάπτισμα τὸ Ἰωάννου
  chosen: John's baptism
  alternatives:
  - the baptism of John
  lexicon: BDAG
  rationale: The genitive Ἰωάννου is most naturally rendered as a possessive in English.
    'John's baptism' is idiomatic and preserves the reference to the baptism associated
    with John without unnecessary stiffness.
- source_word: ἐξ οὐρανοῦ
  chosen: from heaven
  alternatives:
  - from God
  lexicon: BDAG
  rationale: The Greek says literally 'from heaven,' a common Jewish reverential way
    of speaking about divine origin or authority. The main text preserves the source
    expression rather than interpreting it as 'from God.'
- source_word: ἐξ ἀνθρώπων
  chosen: from men
  alternatives:
  - from human beings
  - of human origin
  lexicon: BDAG
  rationale: This contrasts with 'from heaven' and denotes merely human source or
    authority. 'From men' is concise and mirrors the Greek contrast well. Although
    ἀνθρώπων can be generic, here the idiomatic contrast is best preserved with 'men';
    a more explicitly inclusive alternative is noted.
- source_word: ἀποκρίθητέ μοι
  chosen: Answer me
  alternatives:
  - Reply to me
  - Tell me
  lexicon: BDAG
  rationale: The aorist imperative calls for a direct response. 'Answer me' is natural
    modern English and preserves the force of Jesus' demand.
- source_word: ἦν ἢ
  chosen: Was ... or ...?
  alternatives:
  - Did it come ... or ...?
  lexicon: BDAG
  rationale: Although English can idiomatically express source with 'Did it come from...?',
    the Greek uses ἦν with a predicate of origin. 'Was ... from ... or ...?' stays
    closer to the form while remaining clear.
