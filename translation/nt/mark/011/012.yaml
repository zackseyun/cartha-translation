theological_decisions:
- issue: Implicit subject of ἐπείνασεν
  chosen_reading: The singular verb refers to Jesus, rendered as 'he' without adding
    the name 'Jesus' to the text.
  alternative_readings:
  - Explicitly supplying 'Jesus' for clarity
  rationale: The Greek leaves the subject implicit but contextually clear from the
    narrative. Using 'he' preserves the source text's economy while still being intelligible
    in English. The statement also straightforwardly affirms Jesus' genuine human
    hunger, consistent with Chalcedonian orthodoxy, without requiring expansion in
    the translation.
  doctrine_reference: 'Affirmations: Definition of Chalcedon (451 AD, on the two natures
    of Christ)'
