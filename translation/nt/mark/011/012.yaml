id: MRK.11.12
reference: Mark 11:12
source:
  edition: SBLGNT
  text: Καὶ τῇ ἐπαύριον ἐξελθόντων αὐτῶν ἀπὸ Βηθανίας ἐπείνασεν.
translation:
  text: And on the next day, when they had gone out from Bethany, he was hungry.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: τῇ ἐπαύριον
  chosen: on the next day
  alternatives:
  - the next day
  - on the following day
  - on the morrow
  lexicon: BDAG
  rationale: The article with ἐπαύριον functions adverbially/temporally. 'On the next
    day' is natural modern English and preserves the temporal sequence without archaic
    phrasing.
- source_word: ἐξελθόντων αὐτῶν
  chosen: when they had gone out
  alternatives:
  - after they went out
  - as they were leaving
  - when they came out
  lexicon: BDAG
  rationale: The aorist participle genitive plural with αὐτῶν forms a genitive absolute,
    indicating attendant prior action relative to the main verb. 'When they had gone
    out' captures the temporal relationship clearly in English. The plural 'they'
    reflects the Greek, even though the main subject of the sentence is singular.
- source_word: ἀπὸ Βηθανίας
  chosen: from Bethany
  alternatives:
  - away from Bethany
  lexicon: BDAG
  rationale: ἀπό regularly denotes movement away from a place. 'From Bethany' is the
    straightforward geographic rendering; 'Bethany' is transliterated as a place name
    per translation philosophy.
- source_word: ἐπείνασεν
  chosen: he was hungry
  alternatives:
  - he became hungry
  - he felt hungry
  - he hungered
  lexicon: BDAG
  rationale: The aorist of πεινάω here idiomatically reports the onset/state of hunger.
    'He was hungry' is the most natural modern English rendering. 'He became hungry'
    is more wooden, and 'he hungered' is archaic. The singular verb indicates Jesus
    as the subject, even though he is not named explicitly in this clause.
- source_word: Καὶ
  chosen: And
  alternatives:
  - Now
  - Then
  lexicon: BDAG
  rationale: Καί here continues the narrative. 'And' preserves the connective force
    and Mark's paratactic style better than smoothing it away.
