id: MRK.11.16
reference: Mark 11:16
source:
  edition: SBLGNT
  text: καὶ οὐκ ἤφιεν ἵνα τις διενέγκῃ σκεῦος διὰ τοῦ ἱεροῦ,
translation:
  text: And he would not allow anyone to carry a vessel through the temple courts.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'through the temple precincts.' The Greek term refers to the temple complex
      broadly, not specifically the inner sanctuary.
    reason: lexical_alternative
  - marker: b
    text: Or 'carry an object' or 'carry a container.' The Greek word is broad and
      does not specify the kind of item.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἤφιεν
  chosen: would not allow
  alternatives:
  - did not permit
  - was not allowing
  lexicon: BDAG
  rationale: Imperfect of ἀφίημι here conveys ongoing/repeated prevention during the
    action in the temple; 'would not allow' captures the durative sense in natural
    English better than a simple past.
- source_word: ἵνα τις διενέγκῃ
  chosen: anyone to carry
  alternatives:
  - that anyone might carry
  - anyone to bring through
  lexicon: BDAG
  rationale: 'After ἤφιεν, ἵνα with subjunctive expresses what he did not permit to
    happen. English idiom is best represented by an infinitival construction: ''allow
    anyone to carry.'''
- source_word: διενέγκῃ
  chosen: carry
  alternatives:
  - bring through
  - transport
  lexicon: BDAG
  rationale: The verb from διαφέρω in this context means to carry or transport from
    one place to another, especially through an area. 'Carry' is the clearest modern
    English rendering; the directional nuance is preserved by 'through.'
- source_word: σκεῦος
  chosen: a vessel
  alternatives:
  - an object
  - a container
  - a utensil
  lexicon: BDAG
  rationale: σκεῦος is a broad term for an item, implement, or vessel. 'Vessel' preserves
    the lexical breadth and avoids over-specifying the object, while fitting the temple
    context.
- source_word: διὰ τοῦ ἱεροῦ
  chosen: through the temple courts
  alternatives:
  - through the temple
  - through the temple precincts
  lexicon: BDAG
  rationale: ἱερόν refers to the temple complex/precincts rather than the inner sanctuary
    (ναός). 'Temple courts' communicates the broader public area in idiomatic English
    and avoids implying the sanctuary proper.
