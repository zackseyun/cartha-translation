theological_decisions:
- issue: Meaning of ἱερόν in relation to the Jerusalem temple
  chosen_reading: the broader temple complex, rendered 'temple courts'
  alternative_readings:
  - the temple
  - the temple precincts
  rationale: This is not a doctrinal dispute but a contextually important distinction.
    Rendering ἱερόν as 'temple courts' helps readers understand that Jesus' action
    concerns movement through the outer temple area, not entry into the inner sanctuary.
