theological_decisions:
- issue: Whether to make the messianic identification in the acclamation explicit
    in translation
  chosen_reading: Retain the citation-like wording 'Blessed is the one who comes in
    the name of the Lord' without adding 'Messiah' or 'king.'
  alternative_readings:
  - Blessed is the Messiah who comes in the name of the Lord
  - Blessed is he who comes
  rationale: The crowd's words echo Psalm 118:26 and are messianically significant
    in context, but the Greek text itself does not insert an explicit title here.
    Preserving the scriptural wording maintains the theological force without importing
    an interpretive expansion.
  doctrine_reference: 'Translation philosophy: Preserve theological tension rather
    than resolve it; Original-language primacy over translation tradition.'
