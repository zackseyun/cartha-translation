id: MRK.11.9
reference: Mark 11:9
source:
  edition: SBLGNT
  text: καὶ οἱ προάγοντες καὶ οἱ ἀκολουθοῦντες ⸀ἔκραζον· Ὡσαννά· Εὐλογημένος ὁ ἐρχόμενος
    ἐν ὀνόματι κυρίου·
translation:
  text: And those going ahead and those following were crying out, “Hosanna! Blessed
    is the one who comes in the name of the Lord!”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: “Hosanna” is a Hebrew/Aramaic liturgical cry meaning something like “save,
      please” or “save now,” though here it functions as a shout of praise.
    reason: lexical_alternative
  - marker: b
    text: This acclamation echoes Psalm 118:26.
    reason: cross_reference
lexical_decisions:
- source_word: οἱ προάγοντες
  chosen: those going ahead
  alternatives:
  - those who went before
  - those leading the way
  lexicon: BDAG
  rationale: Present participle used substantivally for the group in front of Jesus/procession.
    'Going ahead' is natural modern English and preserves the ongoing action better
    than a simple past.
- source_word: οἱ ἀκολουθοῦντες
  chosen: those following
  alternatives:
  - those who followed
  - the ones coming behind
  lexicon: BDAG
  rationale: Substantival present participle parallel to προάγοντες. 'Those following'
    keeps the participial symmetry and depicts the crowd behind him.
- source_word: ἔκραζον
  chosen: were crying out
  alternatives:
  - were shouting
  - kept crying out
  lexicon: BDAG
  rationale: Imperfect verb indicates ongoing/repeated acclamation. 'Were crying out'
    preserves the durative sense and the elevated, public nature of the shout.
- source_word: Ὡσαννά
  chosen: Hosanna
  alternatives:
  - Save us, please
  - Please save
  lexicon: BDAG
  rationale: By the first century the Hebrew/Aramaic-derived liturgical expression
    functions as an acclamation as well as a plea. Transliteration preserves its recognized
    festal and scriptural resonance; the semantic alternative is worth preserving
    in a footnote.
- source_word: Εὐλογημένος
  chosen: Blessed
  alternatives:
  - Praised
  - Favored
  lexicon: BDAG
  rationale: Conventional and accurate rendering of the passive participle in this
    benedictory formula, echoing Psalm 118:26. 'Blessed' best preserves the scriptural
    allusion.
- source_word: ὁ ἐρχόμενος
  chosen: the one who comes
  alternatives:
  - he who comes
  - the coming one
  lexicon: BDAG
  rationale: Articular present participle functioning substantivally. 'The one who
    comes' is idiomatic modern English and preserves the direct allusion without overinterpreting
    it messianically in the wording itself.
- source_word: ἐν ὀνόματι κυρίου
  chosen: in the name of the Lord
  alternatives:
  - with the authority of the Lord
  - on behalf of the Lord
  lexicon: BDAG
  rationale: Standard biblical idiom meaning to come under the authority/representation
    of the Lord. The more formal wording is retained because it is clear in English
    and preserves the Psalm citation.
- source_word: κυρίου
  chosen: the Lord
  alternatives:
  - Lord
  lexicon: BDAG
  rationale: 'Follows the project''s default rendering for κύριος as ''Lord.'' The
    article is included in English because the phrase is a fixed biblical idiom: ''in
    the name of the Lord.'''
