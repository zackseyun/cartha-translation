id: MRK.3.15
reference: Mark 3:15
source:
  edition: SBLGNT
  text: καὶ ἔχειν ⸀ἐξουσίαν ἐκβάλλειν τὰ δαιμόνια·
translation:
  text: and to have authority to cast out demons.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to drive out demons.'
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ
  chosen: and
  lexicon: BDAG
  rationale: Standard coordinating conjunction linking this infinitival purpose/complement
    clause with the preceding commission statements.
- source_word: ἔχειν
  chosen: to have
  alternatives:
  - to possess
  lexicon: BDAG
  rationale: Present active infinitive of ἔχω; 'to have' is the most natural and direct
    English equivalent in this infinitival sequence.
- source_word: ἐξουσίαν
  chosen: authority
  alternatives:
  - power
  - right
  lexicon: BDAG
  rationale: ἐξουσία commonly denotes delegated authority or the right to act, not
    merely raw power. 'Authority' best fits the context of Jesus appointing the Twelve
    with commissioned prerogative.
- source_word: ἐκβάλλειν
  chosen: to cast out
  alternatives:
  - to drive out
  lexicon: BDAG
  rationale: Present active infinitive; 'cast out' is a standard and accurate rendering
    in exorcism contexts, preserving the force of expulsion without unnecessary paraphrase.
- source_word: τὰ δαιμόνια
  chosen: demons
  alternatives:
  - unclean spirits
  lexicon: BDAG
  rationale: The direct object here is specifically δαιμόνια, not πνεύματα ἀκάθαρτα.
    'Demons' is the precise lexical equivalent; 'unclean spirits' would import wording
    from nearby passages rather than this verse.
