theological_decisions:
- issue: Nature of ἐξουσία in the disciples' commission
  chosen_reading: authority
  alternative_readings:
  - power
  rationale: The verse speaks of a granted commission from Jesus, emphasizing authorized
    capacity rather than abstract miraculous power. This preserves the text's emphasis
    without diminishing the supernatural act involved.
