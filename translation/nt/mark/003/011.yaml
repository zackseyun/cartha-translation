id: MRK.3.11
reference: Mark 3:11
source:
  edition: SBLGNT
  text: καὶ τὰ πνεύματα τὰ ἀκάθαρτα, ὅταν αὐτὸν ⸂ἐθεώρουν, προσέπιπτον⸃ αὐτῷ καὶ ⸀ἔκραζον
    ⸀λέγοντα ὅτι Σὺ εἶ ὁ υἱὸς τοῦ θεοῦ.
translation:
  text: And whenever the unclean spirits saw him, they fell down before him and cried
    out, saying, “You are the Son of God.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'threw themselves down before him.' The Greek verb can denote falling
      before someone in submission or supplication.
    reason: lexical_alternative
lexical_decisions:
- source_word: πνεύματα τὰ ἀκάθαρτα
  chosen: the unclean spirits
  alternatives:
  - the impure spirits
  - the evil spirits
  lexicon: BDAG
  rationale: A direct rendering preserves the established Gospel terminology and the
    ritual/moral sense of ἀκάθαρτα better than the more interpretive 'evil.'
- source_word: ὅταν
  chosen: whenever
  alternatives:
  - when
  lexicon: BDAG
  rationale: 'With the imperfect verbs that follow, ὅταν conveys repeated occurrence:
    each time this happened, the same response followed. ''Whenever'' captures the
    iterative sense better than simple ''when.'''
- source_word: ἐθεώρουν
  chosen: saw
  alternatives:
  - caught sight of
  - beheld
  lexicon: BDAG
  rationale: Though θεωρέω can suggest observing or beholding, in this narrative context
    'saw' is natural English and sufficient. The iterative force is already carried
    by 'whenever.'
- source_word: προσέπιπτον αὐτῷ
  chosen: fell down before him
  alternatives:
  - fell before him
  - threw themselves down before him
  lexicon: BDAG
  rationale: προσπίπτω here denotes prostration or falling before someone. 'Fell down
    before him' is clear, idiomatic, and preserves the physical act without overinterpreting
    motive as worship.
- source_word: ἔκραζον
  chosen: cried out
  alternatives:
  - shouted
  - screamed
  lexicon: BDAG
  rationale: '''Cried out'' is the standard narrative rendering for κράζω and preserves
    intensity without becoming overly colloquial or sensational.'
- source_word: λέγοντα
  chosen: saying
  alternatives:
  - and saying
  lexicon: BDAG
  rationale: The participle is attendant to ἔκραζον and is naturally rendered in English
    as 'saying' after 'cried out.'
- source_word: Σὺ εἶ
  chosen: You are
  alternatives:
  - You yourself are
  lexicon: BDAG
  rationale: The explicit pronoun adds emphasis in Greek, but standard English can
    convey the statement naturally as 'You are' without awkward overemphasis.
- source_word: ὁ υἱὸς τοῦ θεοῦ
  chosen: the Son of God
  alternatives:
  - God's Son
  lexicon: BDAG
  rationale: This preserves the titular force and christological weight of the Greek
    expression in its most recognizable and precise English form.
