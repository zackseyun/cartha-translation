theological_decisions:
- issue: Whether the demons' act of falling before Jesus should be rendered as worship
    or simple prostration
  chosen_reading: Rendered as 'fell down before him' without using 'worshiped.'
  alternative_readings:
  - worshiped him
  - bowed down to him
  rationale: The verb προσπίπτω can describe falling before someone in reverence,
    supplication, or compelled submission. The text itself does not explicitly state
    that the unclean spirits offered worship, so the translation preserves the physical
    action and leaves the theological significance to context rather than importing
    a stronger claim than the verse states.
  doctrine_reference: 'Translation philosophy: Preserve theological tension rather
    than resolve it.'
