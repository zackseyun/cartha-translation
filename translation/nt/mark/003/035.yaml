theological_decisions:
- issue: Gender representation in the singular subject with mixed-gender kinship terms
  chosen_reading: this one
  alternative_readings:
  - he
  - that person
  rationale: The Greek subject is grammatically masculine singular because it is introduced
    by ὃς, but the predicate includes both masculine and feminine family roles ('brother
    and sister and mother'). Following the project's gender-accurate philosophy, the
    translation avoids flattening the masculine grammar into a generic plural while
    also avoiding an English 'he' that would sound misleadingly male-exclusive in
    this context.
  doctrine_reference: DOCTRINE.md §Translation philosophy, item 4
- issue: Nature of Jesus' family language
  chosen_reading: literal kinship terms retained metaphorically
  alternative_readings:
  - family member
  - relative
  rationale: The verse uses concrete kinship nouns to redefine covenantal/familial
    belonging around obedience to God. Retaining 'brother and sister and mother' preserves
    the theological and rhetorical force better than a generalized 'family member.'
  doctrine_reference: DOCTRINE.md §Translation philosophy, items 1 and 6
