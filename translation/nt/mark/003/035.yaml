id: MRK.3.35
reference: Mark 3:35
source:
  edition: SBLGNT
  text: ὃς ⸀γὰρ ἂν ποιήσῃ τὸ θέλημα τοῦ θεοῦ, οὗτος ἀδελφός μου καὶ ⸀ἀδελφὴ καὶ μήτηρ
    ἐστίν.
translation:
  text: For whoever does the will of God, this one is my brother and sister and mother.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'that person is my brother and sister and mother.' The Greek has an emphatic
      demonstrative, literally 'this one.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὃς ... ἂν ποιήσῃ
  chosen: whoever does
  alternatives:
  - whoever should do
  - whoever may do
  - anyone who does
  lexicon: BDAG
  rationale: 'The relative pronoun with ἄν and the aorist subjunctive expresses an
    indefinite general condition: ''whoever'' or ''anyone who.'' English idiom favors
    the present ''does'' for a general timeless statement rather than a more wooden
    ''should do'' or ''may do''.'
- source_word: γὰρ
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: BDAG
  rationale: γάρ gives the reason or explanation for the preceding statement. 'For'
    preserves the connective force concisely and naturally in English.
- source_word: ποιήσῃ
  chosen: does
  alternatives:
  - does do
  - carries out
  - practices
  lexicon: BDAG
  rationale: ποιέω here means to do or carry out. 'Does' is the most direct and natural
    rendering with 'the will of God.' 'Carries out' is possible but slightly more
    interpretive.
- source_word: τὸ θέλημα τοῦ θεοῦ
  chosen: the will of God
  alternatives:
  - God's will
  lexicon: BDAG
  rationale: Both are accurate. 'The will of God' stays closer to the Greek structure
    and has familiar biblical cadence without sounding archaic.
- source_word: οὗτος
  chosen: this one
  alternatives:
  - he
  - that person
  - this person
  lexicon: BDAG
  rationale: 'οὗτος is demonstrative and emphatic: ''this one'' or ''this person.''
    Because the Greek then names both male and female family roles, ''this one'' preserves
    the demonstrative force without introducing an exclusively masculine pronoun.'
- source_word: ἀδελφός μου
  chosen: my brother
  alternatives:
  - my brother of mine
  lexicon: BDAG
  rationale: Standard rendering of the kinship term. The possessive μου is naturally
    expressed as 'my.'
- source_word: ἀδελφὴ
  chosen: sister
  lexicon: BDAG
  rationale: Direct rendering of the feminine kinship term. It should be preserved
    explicitly rather than absorbed into a generic collective, since Jesus names female
    kinship directly.
- source_word: μήτηρ
  chosen: mother
  lexicon: BDAG
  rationale: Direct rendering of the feminine kinship term. The explicit mention is
    important in context because Jesus redefines family around doing God's will.
- source_word: καὶ ... καὶ
  chosen: and ... and
  alternatives:
  - both ... and
  lexicon: BDAG
  rationale: The repeated καί coordinates each kinship term distinctly. Rendering
    each with 'and' preserves the cumulative force of the list.
- source_word: ἐστίν
  chosen: is
  alternatives:
  - are regarded as
  lexicon: BDAG
  rationale: Simple copula. Singular 'is' matches the singular demonstrative subject
    οὗτος.
