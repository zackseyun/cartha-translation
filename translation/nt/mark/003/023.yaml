id: MRK.3.23
reference: Mark 3:23
source:
  edition: SBLGNT
  text: καὶ προσκαλεσάμενος αὐτοὺς ἐν παραβολαῖς ἔλεγεν αὐτοῖς· Πῶς δύναται Σατανᾶς
    Σατανᾶν ἐκβάλλειν;
translation:
  text: 'And after calling them to himself, he was speaking to them in parables: “How
    can Satan cast out Satan?”'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: προσκαλεσάμενος
  chosen: after calling them to himself
  alternatives:
  - calling them over
  - summoning them
  lexicon: BDAG
  rationale: Aorist middle participle of προσκαλέομαι indicates Jesus first summoned/called
    them to himself before speaking. 'After calling them to himself' makes the sequence
    explicit and reflects the middle nuance naturally in English.
- source_word: ἐν παραβολαῖς
  chosen: in parables
  alternatives:
  - with parables
  - figuratively
  lexicon: BDAG
  rationale: παραβολή in the Synoptics commonly refers to illustrative sayings/comparisons.
    The plural is retained. 'In parables' is the most direct and idiomatic rendering,
    without over-specifying the exact literary form.
- source_word: ἔλεγεν
  chosen: he was speaking
  alternatives:
  - he said
  - he kept saying
  lexicon: BDAG
  rationale: Imperfect tense suggests ongoing or iterative speech. 'He was speaking'
    preserves the imperfect aspect better than simple 'he said,' while remaining natural
    in English narrative.
- source_word: Πῶς
  chosen: How can
  alternatives:
  - How is it possible that
  - In what way can
  lexicon: BDAG
  rationale: Introduces a rhetorical question about possibility. 'How can' is concise,
    natural, and preserves the force of the challenge.
- source_word: δύναται
  chosen: can
  alternatives:
  - is able to
  lexicon: BDAG
  rationale: δύναμαι denotes ability/possibility. 'Can' is the most natural modern
    English equivalent in this rhetorical question.
- source_word: Σατανᾶς
  chosen: Satan
  lexicon: BDAG
  rationale: Proper name/title is transliterated per translation philosophy for names.
    The nominative and accusative forms are both rendered 'Satan' in English.
- source_word: ἐκβάλλειν
  chosen: cast out
  alternatives:
  - drive out
  - expel
  lexicon: BDAG
  rationale: ἐκβάλλω is a standard exorcism verb in Mark. 'Cast out' preserves the
    established sense and fits the immediate context of demon expulsion without unnecessary
    paraphrase.
