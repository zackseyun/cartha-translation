theological_decisions:
- issue: Force of Jesus' question about Satan acting against himself
  chosen_reading: 'Rendered as a rhetorical question of impossibility: ''How can Satan
    cast out Satan?'''
  alternative_readings:
  - How is Satan able to cast out Satan?
  rationale: The Greek asks about possibility, and in context Jesus is exposing the
    incoherence of the accusation that he casts out demons by Satan's power. The translation
    preserves the rhetorical force without adding interpretive explanation to the
    main text.
  doctrine_reference: Preserve theological tension rather than resolve it; do not
    import doctrinal claims the text does not make.
