  from: were not even able
  to: are not even able
  rationale: The main verbs ('comes', 'gathers') are rendered as historical presents, which is a good choice for Mark's style. However, the result clause then shifts to the past tense ('were not able'), creating a slight grammatical inconsistency in the English sentence. Maintaining the present tense ('are not able') would create a smoother and more consistent rendering.
