id: MRK.3.20
reference: Mark 3:20
source:
  edition: SBLGNT
  text: Καὶ ⸀ἔρχεται εἰς οἶκον· καὶ συνέρχεται πάλιν ⸀ὁ ὄχλος, ὥστε μὴ δύνασθαι αὐτοὺς ⸀μηδὲ ἄρτον φαγεῖν.
translation:
  text: And he comes into a house, and the crowd gathers again, so that they are not even able to eat bread.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'home.' The Greek says literally 'into a house,' but the phrase can function idiomatically for returning home.
    reason: lexical_alternative
  - marker: b
    text: Literally 'eat bread'; that is, eat a meal.
    reason: lexical_alternative
  - marker: c
    text: Or 'were not even able'.
    reason: previous_rendering
lexical_decisions:
- source_word: ἔρχεται
  chosen: comes
  alternatives:
  - went
  - comes home
  lexicon: BDAG
  rationale: Present-tense narrative verb is naturally rendered as a historical present in English for Mark's vivid style. 'Comes' preserves the aspect better than smoothing to 'went.' 'Comes home' would over-specify, since οἶκον lacks an explicit possessive.
- source_word: εἰς οἶκον
  chosen: into a house
  alternatives:
  - home
  - into the house
  lexicon: BDAG
  rationale: The phrase is anarthrous and does not explicitly identify whose house it is. 'Into a house' preserves the Greek wording without importing 'home' or a definite article. An alternative is worth preserving because idiomatically it may mean 'home.'
- source_word: συνέρχεται
  chosen: gathers
  alternatives:
  - comes together
  - assembles
  lexicon: BDAG
  rationale: With ὁ ὄχλος as subject, 'gathers' is natural modern English and reflects the intransitive sense of the crowd assembling.
- source_word: πάλιν
  chosen: again
  alternatives:
  - once more
  lexicon: BDAG
  rationale: Marks repetition of the crowd's gathering and is straightforwardly rendered 'again.'
- source_word: ὁ ὄχλος
  chosen: the crowd
  alternatives:
  - the multitude
  lexicon: BDAG
  rationale: '''The crowd'' is clear, contemporary English and fits the collective singular sense.'
- source_word: ὥστε μὴ δύνασθαι αὐτοὺς
  chosen: so that they were not able
  alternatives:
  - with the result that they could not
  - so that they could not
  lexicon: BDAG
  rationale: ὥστε with infinitive expresses result. English past phrasing fits the narrative context. 'They' refers to Jesus and those with him, as indicated by αὐτούς.
- source_word: μηδὲ ἄρτον φαγεῖν
  chosen: not even to eat bread
  alternatives:
  - not even to eat
  - not even to have a meal
  lexicon: BDAG
  rationale: ἄρτον is literally 'bread,' but in context functions idiomatically for taking food/a meal. The main text keeps 'bread' for transparency to the Greek, while preserving the idiomatic alternative in a footnote.
