id: MRK.3.24
reference: Mark 3:24
source:
  edition: SBLGNT
  text: καὶ ἐὰν βασιλεία ἐφ’ ἑαυτὴν μερισθῇ, οὐ δύναται σταθῆναι ἡ βασιλεία ἐκείνη·
translation:
  text: And if a kingdom is divided against itself, that kingdom cannot stand.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: καὶ
  chosen: And
  alternatives:
  - Now
  - Also
  lexicon: BDAG
  rationale: Standard connective; 'And' preserves the straightforward coordination
    with the preceding argument.
- source_word: ἐὰν
  chosen: if
  alternatives:
  - whenever
  lexicon: BDAG
  rationale: Introduces a conditional clause with the subjunctive; 'if' is the most
    natural English equivalent in this proverbial statement.
- source_word: βασιλεία
  chosen: kingdom
  alternatives:
  - realm
  - reign
  lexicon: BDAG
  rationale: '''Kingdom'' best fits the political-social image in Jesus''s analogy.
    ''Reign'' would stress rule abstractly, but here the saying concerns a kingdom
    as a corporate entity.'
- source_word: ἐφ’ ἑαυτὴν
  chosen: against itself
  alternatives:
  - over itself
  - in relation to itself
  lexicon: BDAG
  rationale: The idiom ἐπὶ + reflexive in this context means internal opposition or
    hostility. 'Against itself' is the established and accurate English expression.
- source_word: μερισθῇ
  chosen: is divided
  alternatives:
  - is split
  - is partitioned
  lexicon: BDAG
  rationale: Aorist passive subjunctive from μερίζω. 'Is divided' is clear, idiomatic,
    and preserves the passive sense without overinterpreting the cause of the division.
- source_word: οὐ δύναται
  chosen: cannot
  alternatives:
  - is not able to
  - is unable to
  lexicon: BDAG
  rationale: '''Cannot'' is concise modern English and accurately conveys inability.'
- source_word: σταθῆναι
  chosen: stand
  alternatives:
  - remain standing
  - endure
  lexicon: BDAG
  rationale: Infinitive of ἵστημι here means to remain standing or continue established.
    'Stand' preserves the metaphor and matches natural English usage in this proverbial
    form.
- source_word: ἡ βασιλεία ἐκείνη
  chosen: that kingdom
  alternatives:
  - that very kingdom
  - the kingdom in question
  lexicon: BDAG
  rationale: The repeated noun with demonstrative gives emphasis. 'That kingdom' preserves
    the Greek structure and rhetorical force without sounding wooden.
