theological_decisions:
- issue: Nature of the saying
  chosen_reading: Render as a general principle within Jesus's argument, without importing
    a broader doctrinal claim about political entities or Satan beyond the immediate
    context.
  alternative_readings:
  - Treat as a maxim with broader sociopolitical application
  rationale: The verse functions as an analogy in Jesus's rebuttal. The translation
    should preserve the proverb-like force while not expanding its theological scope
    beyond what the text states.
  doctrine_reference: Preserve theological tension rather than resolve it; do not
    import doctrinal claims the text does not make.
