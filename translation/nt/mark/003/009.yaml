id: MRK.3.9
reference: Mark 3:9
source:
  edition: SBLGNT
  text: καὶ εἶπεν τοῖς μαθηταῖς αὐτοῦ ἵνα πλοιάριον προσκαρτερῇ αὐτῷ διὰ τὸν ὄχλον
    ἵνα μὴ θλίβωσιν αὐτόν·
translation:
  text: And he told his disciples that a small boat should stay ready for him because
    of the crowd, so that they might not crush him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'might not press upon him.' The Greek verb can denote pressing, crowding,
      or crushing under pressure.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἶπεν
  chosen: told
  alternatives:
  - said
  lexicon: BDAG
  rationale: In English, 'told his disciples that...' is more natural with an indirect-content
    clause than 'said to his disciples that...,' while still accurately reflecting
    λέγω.
- source_word: μαθηταῖς
  chosen: disciples
  alternatives:
  - students
  - followers
  lexicon: BDAG
  rationale: '''Disciples'' is the standard and contextually appropriate rendering
    for μαθητής in the Gospels, preserving the teacher-follower relationship without
    flattening it to mere studentship.'
- source_word: πλοιάριον
  chosen: small boat
  alternatives:
  - boat
  - little boat
  lexicon: BDAG
  rationale: The diminutive sense of πλοιάριον is worth preserving. 'Small boat' is
    natural modern English and reflects the likely practical nuance better than simply
    'boat'.
- source_word: προσκαρτερῇ
  chosen: should stay ready
  alternatives:
  - should be kept ready
  - should remain available
  - should wait on him
  lexicon: BDAG
  rationale: Here προσκαρτερέω carries the sense of being constantly ready/available
    in attendance. 'Should stay ready' communicates ongoing readiness in idiomatic
    English without over-literal awkwardness.
- source_word: αὐτῷ
  chosen: for him
  alternatives:
  - to him
  - at his disposal
  lexicon: BDAG
  rationale: With προσκαρτερῇ in this context, the dative indicates availability in
    relation to Jesus. 'For him' is the most natural English expression.
- source_word: διὰ τὸν ὄχλον
  chosen: because of the crowd
  alternatives:
  - on account of the crowd
  lexicon: BDAG
  rationale: διά with the accusative here expresses cause or reason. 'Because of the
    crowd' is clear, natural, and accurate.
- source_word: θλίβωσιν
  chosen: might not crush
  alternatives:
  - might not press upon
  - might not crowd
  - might not crush against
  lexicon: BDAG
  rationale: θλίβω literally conveys pressing, compressing, or crushing. In this scene
    the concern is physical pressure from the crowd. 'Crush' preserves the force better
    than the weaker 'crowd,' while 'press upon' is possible but less vivid in contemporary
    English.
