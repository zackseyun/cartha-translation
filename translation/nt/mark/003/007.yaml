id: MRK.3.7
reference: Mark 3:7
source:
  edition: SBLGNT
  text: Καὶ ὁ Ἰησοῦς ⸂μετὰ τῶν μαθητῶν αὐτοῦ ἀνεχώρησεν⸃ πρὸς τὴν θάλασσαν· καὶ πολὺ
    πλῆθος ἀπὸ τῆς Γαλιλαίας ⸀ἠκολούθησεν, καὶ ἀπὸ τῆς Ἰουδαίας
translation:
  text: And Jesus withdrew with his disciples to the sea, and a great crowd from Galilee
    followed, and from Judea,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'toward the sea.' The Greek preposition can indicate movement in the
      direction of the sea.
    reason: lexical_alternative
  - marker: b
    text: That is, the Sea of Galilee. The Greek text says simply 'the sea.'
    reason: cultural_note
lexical_decisions:
- source_word: ἀνεχώρησεν
  chosen: withdrew
  alternatives:
  - departed
  - retreated
  - went away
  lexicon: BDAG
  rationale: The verb commonly means to withdraw or depart, often with the nuance
    of pulling back from opposition or pressure. 'Withdrew' preserves that nuance
    better than the flatter 'went away' while remaining natural English.
- source_word: μετὰ τῶν μαθητῶν αὐτοῦ
  chosen: with his disciples
  alternatives:
  - with his students
  lexicon: BDAG
  rationale: μαθηταί are learners/followers, but 'disciples' is the established and
    accurate rendering in Gospel context, preserving the relational and vocational
    sense beyond mere classroom instruction.
- source_word: πρὸς τὴν θάλασσαν
  chosen: to the sea
  alternatives:
  - toward the sea
  - to the lake
  lexicon: BDAG
  rationale: θάλασσα is literally 'sea.' In Mark this refers to the Sea of Galilee,
    but the text itself says 'sea,' so the main text keeps the literal term rather
    than interpreting it as 'lake.'
- source_word: πολὺ πλῆθος
  chosen: a great crowd
  alternatives:
  - a large crowd
  - a great multitude
  lexicon: BDAG
  rationale: The phrase denotes a very large gathering. 'A great crowd' is idiomatic
    modern English and preserves the emphasis of πολὺ without sounding archaic like
    'multitude.'
- source_word: ἠκολούθησεν
  chosen: followed
  alternatives:
  - went after
  lexicon: BDAG
  rationale: 'Standard contextual meaning for ἀκολουθέω here: the crowd followed Jesus
    geographically. ''Followed'' is both accurate and natural.'
- source_word: ἀπὸ τῆς Γαλιλαίας
  chosen: from Galilee
  lexicon: BDAG
  rationale: Straightforward source-to-target rendering of provenance/origin.
- source_word: ἀπὸ τῆς Ἰουδαίας
  chosen: and from Judea,
  lexicon: BDAG
  rationale: The verse continues the list into the next verse, so the translation
    preserves the trailing phrase and comma to reflect the incomplete sentence structure
    in context.
