theological_decisions:
- issue: Rendering of the explanatory nickname for James and John
  chosen_reading: Retain the transliterated Semitic form 'Boanerges' and explain it
    as 'Sons of Thunder'
  alternative_readings:
  - Translate only the meaning without the transliteration
  - Render with lower-case 'sons of thunder'
  rationale: The text itself preserves both the foreign form and its explanation.
    Keeping both respects the narrative detail and avoids flattening the nickname
    into mere paraphrase. No doctrinal controversy is at stake, but the translation
    philosophy favors preserving source-language texture where the text itself does
    so.
  doctrine_reference: 'Translation philosophy: Translate titles; transliterate names.'
