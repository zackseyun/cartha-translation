id: MRK.3.17
reference: Mark 3:17
source:
  edition: SBLGNT
  text: καὶ Ἰάκωβον τὸν τοῦ Ζεβεδαίου καὶ Ἰωάννην τὸν ἀδελφὸν τοῦ Ἰακώβου (καὶ ἐπέθηκεν
    αὐτοῖς ⸀ὀνόματα Βοανηργές, ὅ ἐστιν Υἱοὶ Βροντῆς),
translation:
  text: and James the son of Zebedee, and John the brother of James (he gave them
    the name Boanerges, which means Sons of Thunder),
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek 'names' (plural); the plural likely functions collectively for one
      shared nickname given to the two brothers.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἰάκωβον
  chosen: James
  alternatives:
  - Jacob
  lexicon: BDAG
  rationale: Standard English transliteration/traditional form for the personal name
    Ἰάκωβος in the New Testament. Although etymologically related to 'Jacob,' English
    convention distinguishes the NT apostle as 'James.'
- source_word: τὸν τοῦ Ζεβεδαίου
  chosen: the son of Zebedee
  alternatives:
  - the one of Zebedee
  lexicon: BDAG
  rationale: The article + genitive construction idiomatically identifies James by
    paternal relation. 'The son of Zebedee' is natural English and accurately conveys
    the Greek sense.
- source_word: Ἰωάννην
  chosen: John
  lexicon: BDAG
  rationale: Standard English transliteration of the personal name Ἰωάννης.
- source_word: τὸν ἀδελφὸν τοῦ Ἰακώβου
  chosen: the brother of James
  lexicon: BDAG
  rationale: ἀδελφός here denotes literal familial brotherhood, not a broader kinship
    or spiritual sense.
- source_word: ἐπέθηκεν
  chosen: he gave
  alternatives:
  - he placed on
  - he assigned
  lexicon: BDAG
  rationale: Although ἐπιτίθημι literally means 'to place upon,' with ὀνόματα and
    indirect object it idiomatically means to give or assign a name. 'He gave' is
    the clearest natural English equivalent.
- source_word: αὐτοῖς
  chosen: them
  alternatives:
  - to them
  lexicon: BDAG
  rationale: English idiom with 'gave' naturally incorporates the indirect object
    as 'gave them the name,' though the dative force is preserved.
- source_word: ὀνόματα
  chosen: the name
  alternatives:
  - names
  lexicon: BDAG
  rationale: The Greek has plural ὀνόματα, but in this idiom it can function collectively
    for a single epithet applied to more than one person. Since the following singular
    transliterated nickname Boanerges is one shared designation, English singular
    'the name' is more idiomatic while preserving the sense. The plural form is worth
    preserving in a footnote.
- source_word: Βοανηργές
  chosen: Boanerges
  lexicon: BDAG
  rationale: Personal/nickname form is transliterated rather than translated, in keeping
    with the philosophy of transliterating names while preserving the explanatory
    gloss that follows.
- source_word: ὅ ἐστιν
  chosen: which means
  alternatives:
  - that is
  - which is
  lexicon: BDAG
  rationale: This explanatory formula introduces an interpretation/translation of
    the Semitic nickname. 'Which means' communicates the function more clearly in
    contemporary English than the more wooden 'that is.'
- source_word: Υἱοὶ Βροντῆς
  chosen: Sons of Thunder
  alternatives:
  - sons of thunder
  lexicon: BDAG
  rationale: A literal rendering preserves the vivid epithet. Capitalization reflects
    its function as the explanatory gloss of a nickname/title-like designation in
    this context.
