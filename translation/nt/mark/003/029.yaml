id: MRK.3.29
reference: Mark 3:29
source:
  edition: SBLGNT
  text: ὃς δ’ ἂν βλασφημήσῃ εἰς τὸ πνεῦμα τὸ ἅγιον, οὐκ ἔχει ἄφεσιν εἰς τὸν αἰῶνα,
    ἀλλὰ ἔνοχός ἐστιν αἰωνίου ⸀ἁμαρτήματος.
translation:
  text: but whoever blasphemes against the Holy Spirit never has forgiveness, but
    is guilty of an eternal sin.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'does not have forgiveness into the age,' that is, 'never has
      forgiveness' or 'has no forgiveness forever.'
    reason: lexical_alternative
  - marker: b
    text: Or, 'is liable to an eternal sin.'
    reason: lexical_alternative
  - marker: c
    text: Some manuscripts read 'eternal judgment' or 'eternal condemnation' instead
      of 'eternal sin.'
    reason: textual_variant
lexical_decisions:
- source_word: ὃς δ’ ἂν
  chosen: but whoever
  alternatives:
  - but whoever may
  - and whoever
  lexicon: BDAG
  rationale: ὃς with ἄν introduces an indefinite relative clause, best rendered idiomatically
    as 'whoever.' δέ is mildly adversative here, so 'but' fits the contrast with the
    previous statement.
- source_word: βλασφημήσῃ
  chosen: blasphemes
  alternatives:
  - speaks abusively
  - reviles
  lexicon: BDAG
  rationale: The aorist subjunctive after ἄν gives a general condition; English present
    'blasphemes' communicates the generic force naturally. 'Blasphemes' preserves
    the religious and theological weight of βλασφημέω better than a flatter paraphrase.
- source_word: εἰς τὸ πνεῦμα τὸ ἅγιον
  chosen: against the Holy Spirit
  alternatives:
  - into the Holy Spirit
  - with reference to the Holy Spirit
  lexicon: BDAG
  rationale: Although εἰς is literally 'into,' with verbs like βλασφημέω it functions
    idiomatically to mark the object or target of the offense. 'Against the Holy Spirit'
    is the clearest natural English rendering.
- source_word: οὐκ ἔχει ἄφεσιν
  chosen: never has forgiveness
  alternatives:
  - does not have forgiveness
  - has no forgiveness
  lexicon: BDAG
  rationale: ἄφεσις is 'forgiveness' or 'release/remission.' 'Never has forgiveness'
    brings out the force of the following temporal phrase εἰς τὸν αἰῶνα in idiomatic
    English while preserving the verbal structure.
- source_word: εἰς τὸν αἰῶνα
  chosen: never
  alternatives:
  - forever
  - for the age
  - to eternity
  lexicon: BDAG
  rationale: Literally 'into the age,' this idiom commonly means 'forever' or 'never'
    in negative contexts. Here 'never' is the most natural English equivalent attached
    to 'has forgiveness.' The more literal sense is preserved in a footnote.
- source_word: ἀλλὰ
  chosen: but
  alternatives:
  - rather
  - instead
  lexicon: BDAG
  rationale: ἀλλά marks a strong contrast. 'But' is straightforward and natural in
    English.
- source_word: ἔνοχός ἐστιν
  chosen: is guilty
  alternatives:
  - is liable
  - is answerable
  lexicon: BDAG
  rationale: ἔνοχος can mean 'liable' or 'guilty/subject to.' In this construction
    with a genitive ('of an eternal sin'), 'is guilty' is the clearest idiomatic English,
    though 'liable to' is a viable alternative preserved in a footnote.
- source_word: αἰωνίου ἁμαρτήματος
  chosen: of an eternal sin
  alternatives:
  - of an age-long sin
  - liable to eternal judgment
  lexicon: BDAG
  rationale: The SBLGNT reading is ἁμαρτήματος ('sin'), not κρίσεως ('judgment').
    The translation should therefore reflect the printed text directly as 'eternal
    sin.' Because many manuscripts/readers know the variant 'eternal judgment/condemnation,'
    that textual variant is preserved in a footnote.
