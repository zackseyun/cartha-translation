theological_decisions:
- issue: Nature of the unforgivable offense
  chosen_reading: Retain the text's direct wording about blasphemy against the Holy
    Spirit without adding interpretive qualifiers.
  alternative_readings:
  - Deliberate persistent rejection of the Spirit's witness
  - attributing the Spirit's work to demonic power
  rationale: The immediate context strongly informs the saying, but this verse itself
    states the offense as 'blasphemes against the Holy Spirit.' To preserve theological
    tension and avoid importing a full doctrinal explanation into the translation,
    the main text remains close to the Greek wording.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Text-critical variant at the end of the verse
  chosen_reading: Translate the SBLGNT reading 'eternal sin.'
  alternative_readings:
  - eternal judgment
  - eternal condemnation
  rationale: The provided source text reads αἰωνίου ἁμαρτήματος. Since the project
    prioritizes the given Greek text, the main translation follows it, while the well-known
    variant is preserved in a footnote for auditability.
