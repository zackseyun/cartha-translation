id: MRK.3.3
reference: Mark 3:3
source:
  edition: SBLGNT
  text: καὶ λέγει τῷ ἀνθρώπῳ τῷ ⸂τὴν χεῖρα ἔχοντι ξηράν⸃· ⸀Ἔγειρε εἰς τὸ μέσον.
translation:
  text: And he says to the man with the withered hand, “Rise into the middle.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Stand up in the middle,” or more idiomatically, “Come forward.”
    reason: lexical_alternative
lexical_decisions:
- source_word: λέγει
  chosen: he says
  alternatives:
  - he said
  lexicon: BDAG
  rationale: The Greek present is a historical present, common in Mark. Rendering
    it as present preserves Mark’s vivid narrative style more directly than smoothing
    to the English past.
- source_word: ἀνθρώπῳ
  chosen: man
  alternatives:
  - person
  lexicon: BDAG
  rationale: The referent is an individual male in context, so 'man' is gender-accurate
    and aligns with the translation philosophy’s preference for matching the source’s
    intent rather than neutralizing gender.
- source_word: τὴν χεῖρα ἔχοντι ξηράν
  chosen: with the withered hand
  alternatives:
  - who had a shriveled hand
  - whose hand was withered
  lexicon: BDAG
  rationale: This participial phrase is naturally rendered attributively in English.
    'Withered' is the standard and sufficiently literal rendering of ξηράν here, preserving
    the physical condition without overinterpreting it.
- source_word: ξηράν
  chosen: withered
  alternatives:
  - dry
  - shriveled
  lexicon: BDAG
  rationale: '''Withered'' best fits idiomatic English for a disabled hand while remaining
    close to the Greek adjective''s basic sense of dried up/dry.'
- source_word: Ἔγειρε
  chosen: Rise
  alternatives:
  - Get up
  - Stand up
  lexicon: BDAG
  rationale: The imperative of ἐγείρω can mean 'rise' or 'get up.' 'Rise' is concise
    and preserves the directness of the command without adding explanatory wording
    not explicit in the Greek.
- source_word: εἰς τὸ μέσον
  chosen: into the middle
  alternatives:
  - to the center
  - come forward
  lexicon: BDAG
  rationale: The phrase literally means 'into the middle/midst.' 'Into the middle'
    preserves the spatial force of εἰς and avoids the more interpretive idiom 'come
    forward,' which is smoother but less transparent to the Greek.
