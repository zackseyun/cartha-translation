id: MRK.3.25
reference: Mark 3:25
source:
  edition: SBLGNT
  text: καὶ ἐὰν οἰκία ἐφ’ ἑαυτὴν μερισθῇ, οὐ ⸀δυνήσεται ⸂ἡ οἰκία ἐκείνη σταθῆναι⸃·
translation:
  text: And if a house is divided against itself, that house will not be able to stand.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'household' for 'house' (οἰκία), though the immediate metaphor with 'stand'
      favors 'house.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οἰκία
  chosen: house
  alternatives:
  - household
  lexicon: BDAG
  rationale: The primary sense is 'house,' and in this saying the image is architectural/social.
    'Household' is possible idiomatically, but the parallel with 'stand' favors the
    concrete metaphor preserved in English as 'house.'
- source_word: ἐφ’ ἑαυτὴν
  chosen: against itself
  alternatives:
  - over itself
  - in relation to itself
  lexicon: BDAG
  rationale: In this idiom, ἐπί with reflexive pronoun conveys internal opposition.
    'Against itself' is the natural English equivalent and matches the sense of internal
    division.
- source_word: μερισθῇ
  chosen: is divided
  alternatives:
  - is split
  - is partitioned
  lexicon: BDAG
  rationale: Aorist passive subjunctive after ἐὰν expresses a general condition. 'Is
    divided' is the standard and clearest rendering, preserving both the passive form
    and the idea of internal fracture.
- source_word: δυνήσεται
  chosen: will be able
  alternatives:
  - can
  - will have power
  lexicon: BDAG
  rationale: Future middle of δύναμαι indicates future capability. 'Will be able'
    is more precise than the simpler 'can' in this conditional statement.
- source_word: σταθῆναι
  chosen: to stand
  alternatives:
  - to remain standing
  - to endure
  lexicon: BDAG
  rationale: The infinitive from ἵστημι here is idiomatic for remaining intact or
    enduring. 'To stand' preserves the metaphor succinctly; the endurance nuance is
    implicit.
- source_word: ἡ οἰκία ἐκείνη
  chosen: that house
  alternatives:
  - that household
  - the house
  lexicon: BDAG
  rationale: 'The demonstrative ἐκείνη adds emphasis: not merely ''the house'' but
    ''that house.'' English naturally places the demonstrative before the noun.'
- source_word: καὶ ἐὰν
  chosen: And if
  alternatives:
  - And whenever
  - If
  lexicon: BDAG
  rationale: This continues the argument from the previous verse and introduces a
    conditional example. 'And if' preserves both the connective καί and the conditional
    force of ἐὰν.
