theological_decisions:
- issue: Emphasis on Jesus' personal choice in calling the group
  chosen_reading: Retained the emphatic force with 'he himself wanted' without importing
    a doctrinal claim about election beyond the verse's wording.
  alternative_readings:
  - those he wanted
  rationale: The verse clearly emphasizes Jesus' own initiative through αὐτός, but
    the translation should not overinterpret this into a broader theological system
    not stated in the text.
  doctrine_reference: Preserve theological tension rather than resolve it; do not
    advocate denominational distinctives unless unambiguously supported.
