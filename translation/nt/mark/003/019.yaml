id: MRK.3.19
reference: Mark 3:19
source:
  edition: SBLGNT
  text: καὶ Ἰούδαν ⸀Ἰσκαριώθ, ὃς καὶ παρέδωκεν αὐτόν.
translation:
  text: and Judas Iscariot, who also betrayed him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'who also handed him over' or 'who also delivered him over.' The Greek
      verb can mean 'hand over'; here 'betrayed' is chosen because Judas's action
      toward Jesus carries that contextual sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ
  chosen: and
  alternatives:
  - also
  - even
  lexicon: BDAG
  rationale: Standard connective linking the final name in the list to the preceding
    apostles. Here simple coordination is most natural in English.
- source_word: Ἰούδαν
  chosen: Judas
  rationale: Personal name transliterated by standard English convention, following
    the translation philosophy to transliterate names rather than translate them.
- source_word: Ἰσκαριώθ
  chosen: Iscariot
  lexicon: BDAG
  rationale: Proper designation attached to Judas, conventionally transliterated as
    'Iscariot.' Since it functions as a name/epithet and its etymology is uncertain
    in context, transliteration is preferable to speculative translation.
- source_word: ὃς
  chosen: who
  alternatives:
  - the one who
  lexicon: BDAG
  rationale: Relative pronoun introducing a descriptive clause about Judas. Simple
    'who' is natural and sufficiently precise.
- source_word: καὶ
  chosen: also
  alternatives:
  - even
  - indeed
  lexicon: BDAG
  rationale: In the relative clause, καί has an adverbial force emphasizing the identifying
    action of Judas. 'Also' preserves the Greek particle without overtranslating;
    it marks this further characterization of Judas.
- source_word: παρέδωκεν
  chosen: betrayed
  alternatives:
  - handed over
  - delivered over
  lexicon: BDAG
  rationale: Although παραδίδωμι can more literally mean 'hand over' or 'deliver over,'
    in this context referring to Judas and Jesus the idiomatic and contextually established
    sense is 'betrayed.' This best communicates the act's moral force in natural English
    while remaining faithful to the narrative meaning.
- source_word: αὐτόν
  chosen: him
  lexicon: BDAG
  rationale: Direct object pronoun referring to Jesus. 'Him' is the straightforward
    English equivalent.
