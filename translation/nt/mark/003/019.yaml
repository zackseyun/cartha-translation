theological_decisions:
- issue: Rendering παραδίδωμι in reference to Judas's action toward Jesus
  chosen_reading: betrayed
  alternative_readings:
  - handed over
  - delivered over
  rationale: The verb itself can denote handing someone over without always specifying
    treachery, but in Gospel usage with Judas as subject it conventionally and contextually
    denotes betrayal. Using 'betrayed' communicates the narrative and moral sense
    recognized in this context, while preserving more literal alternatives in a footnote
    for auditability.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve source
    sense without flattening theological weight.'
