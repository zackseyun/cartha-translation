id: MRK.3.28
reference: Mark 3:28
source:
  edition: SBLGNT
  text: Ἀμὴν λέγω ὑμῖν ὅτι πάντα ἀφεθήσεται ⸂τοῖς υἱοῖς τῶν ἀνθρώπων, τὰ ἁμαρτήματα⸃
    καὶ ⸂αἱ βλασφημίαι ὅσα ἐὰν⸃ βλασφημήσωσιν·
translation:
  text: Truly I tell you that all sins will be forgiven the sons of men, and whatever
    blasphemies they may utter;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'human beings' / 'people.' The Greek expression 'the sons of men' is
      a generic way of referring to humanity.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀμὴν
  chosen: Truly
  alternatives:
  - Amen
  - Truly, truly
  lexicon: BDAG
  rationale: In the Synoptic formula Ἀμὴν λέγω ὑμῖν, English idiom is best served
    by rendering the discourse marker as 'Truly' rather than transliterating 'Amen.'
    'Truly, truly' is Johannine, not appropriate here.
- source_word: λέγω ὑμῖν
  chosen: I tell you
  alternatives:
  - I say to you
  lexicon: BDAG
  rationale: '''I tell you'' is a natural modern-English rendering of the present
    formula while preserving direct address and solemnity.'
- source_word: πάντα
  chosen: all
  alternatives:
  - all things
  lexicon: BDAG
  rationale: Neuter plural πάντα here functions comprehensively over the following
    appositional nouns; 'all' is idiomatic and avoids the misleadingly broad 'all
    things'.
- source_word: ἀφεθήσεται
  chosen: will be forgiven
  alternatives:
  - will be pardoned
  - will be released
  lexicon: BDAG
  rationale: Future passive of ἀφίημι in a sin-context regularly means 'forgive.'
    This preserves the theological sense without paraphrase.
- source_word: τοῖς υἱοῖς τῶν ἀνθρώπων
  chosen: the sons of men
  alternatives:
  - the children of men
  - human beings
  - people
  lexicon: BDAG
  rationale: The phrase is a Semitic-style generic expression for humanity. Per the
    gender-accurate policy, the masculine form is retained because the source uses
    'sons' and the phrase is representative rather than specifically male. A footnote
    preserves the more idiomatic inclusive sense.
- source_word: τὰ ἁμαρτήματα
  chosen: sins
  alternatives:
  - the sins
  lexicon: BDAG
  rationale: English idiom omits the article in this generic plural. The noun denotes
    acts of sin here, not abstract sinfulness.
- source_word: βλασφημίαι
  chosen: blasphemies
  alternatives:
  - slanders
  - revilings
  lexicon: BDAG
  rationale: Given the immediate context about speaking against the Holy Spirit, 'blasphemies'
    preserves the religious and theological force better than the broader 'slanders'.
- source_word: ὅσα ἐὰν βλασφημήσωσιν
  chosen: whatever blasphemies they may utter
  alternatives:
  - whatever they may blaspheme
  - however many blasphemies they may speak
  lexicon: BDAG
  rationale: The relative clause qualifies 'blasphemies' and expresses indefiniteness
    with ἐάν plus aorist subjunctive. 'Whatever blasphemies they may utter' is clear
    English and keeps the open-ended scope.
