theological_decisions:
- issue: Scope of forgiveness statement in relation to the following warning about
    blasphemy against the Holy Spirit
  chosen_reading: Render the verse as a sweeping declaration of forgiveness in its
    own terms, without importing the exception from the next verse into this verse's
    wording.
  alternative_readings:
  - Translate with an implicit limitation already built into the sentence
  rationale: The immediate literary context creates theological tension, but this
    verse itself states the breadth of forgiveness before the next verse states the
    exception. Per doctrine, the translation should preserve that tension rather than
    resolve it prematurely.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
- issue: Generic masculine expression τοῖς υἱοῖς τῶν ἀνθρώπων
  chosen_reading: Retain 'the sons of men' in the main text with an inclusive footnote.
  alternative_readings:
  - human beings
  - people
  - the children of humanity
  rationale: The phrase is generic, but the source expression is grammatically masculine
    and semitic in flavor. Per doctrine, the main text should match the source's gendered
    form where representative, while a footnote can clarify inclusive sense for modern
    readers.
  doctrine_reference: 'Translation philosophy §4: Gender-accurate over gender-neutral.'
