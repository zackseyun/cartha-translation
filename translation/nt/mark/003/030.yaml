theological_decisions:
- issue: Nature of the accusation against Jesus
  chosen_reading: Retain the direct accusation 'He has an unclean spirit' without
    interpretive expansion.
  alternative_readings:
  - He is possessed by an unclean spirit
  rationale: The text reports the opponents' charge in stark terms. Translating ἔχει
    as 'has' preserves the wording and theological offense of the accusation without
    softening or over-interpreting it. An explanatory alternative is worth preserving
    because English readers may hear 'has' less idiomatically than ancient audiences
    would have.
  doctrine_reference: Translation philosophy §§1, 3, 6
