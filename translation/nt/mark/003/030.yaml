id: MRK.3.30
reference: Mark 3:30
source:
  edition: SBLGNT
  text: ὅτι ἔλεγον· Πνεῦμα ἀκάθαρτον ἔχει.
translation:
  text: because they were saying, “He has an unclean spirit.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, “He is possessed by an unclean spirit.”
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅτι
  chosen: because
  alternatives:
  - for
  lexicon: BDAG
  rationale: In context this gives the reason for Jesus' preceding statement about
    their guilt, so the causal sense 'because' is clearer than the more formal but
    potentially ambiguous 'for'.
- source_word: ἔλεγον
  chosen: they were saying
  alternatives:
  - they said
  lexicon: BDAG
  rationale: The imperfect indicates ongoing or repeated speech, not merely a single
    utterance. 'They were saying' preserves that aspect better than simple past 'they
    said'.
- source_word: Πνεῦμα ἀκάθαρτον
  chosen: an unclean spirit
  alternatives:
  - an impure spirit
  lexicon: BDAG
  rationale: This is the standard Gospel expression for a demonic spirit. 'Unclean
    spirit' preserves the lexical link with ἀκάθαρτος and matches established New
    Testament usage without unnecessary paraphrase.
- source_word: ἔχει
  chosen: he has
  alternatives:
  - he is possessed by
  lexicon: BDAG
  rationale: The Greek verb is simply 'has.' While idiomatically it implies demonic
    possession or influence, the translation should not expand beyond the source text
    in the main line. The more interpretive alternative can be preserved in a footnote.
