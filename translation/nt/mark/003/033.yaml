theological_decisions:
- issue: Familial terminology for ἀδελφοί
  chosen_reading: brothers
  alternative_readings:
  - brothers and sisters
  - siblings
  rationale: The verse presents Jesus' reported natural family members in concrete
    terms, not a generic mixed group. The translation preserves the masculine plural
    rather than broadening it interpretively. This avoids importing a denominational
    reading regarding Jesus' family while staying close to the Greek wording.
  doctrine_reference: DOCTRINE.md § Translation philosophy, point 4 (Gender-accurate
    over gender-neutral)
