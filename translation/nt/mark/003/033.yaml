id: MRK.3.33
reference: Mark 3:33
source:
  edition: SBLGNT
  text: καὶ ⸂ἀποκριθεὶς αὐτοῖς λέγει⸃· Τίς ἐστιν ἡ μήτηρ μου ⸀ἢ οἱ ἀδελφοί ⸀μου;
translation:
  text: And answering them, he says, “Who is my mother, or my brothers?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or, more idiomatically, “He answered them, ‘Who are my mother and my brothers?’”
      The Greek uses a participle plus historical present: “answering … he says.”'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀποκριθεὶς
  chosen: answering
  alternatives:
  - in reply
  - answered
  lexicon: BDAG
  rationale: A participial form of ἀποκρίνομαι. 'Answering' preserves the Greek participle
    and Mark's vivid narrative style, while remaining natural in English when followed
    by 'he says.'
- source_word: αὐτοῖς
  chosen: them
  alternatives:
  - to them
  lexicon: BDAG
  rationale: The dative pronoun marks the addressees of Jesus' response. English idiom
    allows this to be absorbed into 'answering them' without loss of meaning.
- source_word: λέγει
  chosen: he says
  alternatives:
  - he said
  lexicon: BDAG
  rationale: The present tense is the historical present, common in Mark. Rendering
    it as 'he says' preserves the narrative immediacy of the Greek.
- source_word: Τίς
  chosen: Who
  alternatives:
  - What person
  lexicon: BDAG
  rationale: An interrogative pronoun asking for identity. 'Who' is the direct and
    natural English equivalent.
- source_word: μήτηρ
  chosen: mother
  alternatives:
  - mom
  lexicon: BDAG
  rationale: '''Mother'' is the standard, dignified rendering and matches the familial
    term in the Greek.'
- source_word: ἢ
  chosen: or
  alternatives:
  - and
  lexicon: BDAG
  rationale: 'The conjunction here introduces the second member of the question: ''Who
    is my mother, or my brothers?'' It should be rendered straightforwardly as ''or.'''
- source_word: ἀδελφοί
  chosen: brothers
  alternatives:
  - brothers and sisters
  - siblings
  lexicon: BDAG
  rationale: The Greek is grammatically masculine plural and in this immediate context
    refers to Jesus' male siblings as reported by the messenger. Per the gender-accurate
    philosophy, 'brothers' is preferred over gender-neutral expansions not explicit
    in the text.
