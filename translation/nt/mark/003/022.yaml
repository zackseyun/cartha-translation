id: MRK.3.22
reference: Mark 3:22
source:
  edition: SBLGNT
  text: καὶ οἱ γραμματεῖς οἱ ἀπὸ Ἱεροσολύμων καταβάντες ἔλεγον ὅτι Βεελζεβοὺλ ἔχει
    καὶ ὅτι ἐν τῷ ἄρχοντι τῶν δαιμονίων ἐκβάλλει τὰ δαιμόνια.
translation:
  text: And the scribes who had come down from Jerusalem were saying, “He has Beelzebul,”
    and, “By the ruler of the demons he casts out the demons.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more explicitly, “He is possessed by Beelzebul.”
    reason: lexical_alternative
  - marker: b
    text: Greek Βεελζεβούλ; traditionally rendered “Beelzebub.”
    reason: alternative_reading
  - marker: c
    text: Or “By the prince of demons.”
    reason: lexical_alternative
lexical_decisions:
- source_word: γραμματεῖς
  chosen: scribes
  alternatives:
  - teachers of the law
  - experts in the law
  lexicon: BDAG
  rationale: '''Scribes'' is the standard and sufficiently transparent rendering for
    γραμματεῖς in the Gospel context, referring to recognized Jewish legal scholars
    rather than mere copyists.'
- source_word: ἀπὸ Ἱεροσολύμων καταβάντες
  chosen: who had come down from Jerusalem
  alternatives:
  - having come down from Jerusalem
  - who came down from Jerusalem
  lexicon: BDAG
  rationale: The participle καταβάντες is naturally rendered with a relative clause
    in English for readability. 'Come down' preserves the literal directional sense
    from Jerusalem without awkwardness.
- source_word: ἔλεγον
  chosen: were saying
  alternatives:
  - said
  - kept saying
  lexicon: BDAG
  rationale: The imperfect indicates ongoing or repeated speech. 'Were saying' preserves
    that aspect better than simple past 'said' while remaining natural English.
- source_word: Βεελζεβοὺλ
  chosen: Beelzebul
  alternatives:
  - Beelzebub
  lexicon: BDAG
  rationale: The Greek form in the source text is Βεελζεβούλ, so 'Beelzebul' is the
    most direct transliteration. The familiar traditional form 'Beelzebub' is preserved
    in a footnote as an alternative form.
- source_word: ἔχει
  chosen: has
  alternatives:
  - is possessed by
  lexicon: BDAG
  rationale: The Greek literally says 'has [Beelzebul].' In context this idiom means
    he is under demonic possession or influence, but the more literal 'has' best preserves
    the accusation's wording without over-interpreting in the main text.
- source_word: ἐν τῷ ἄρχοντι τῶν δαιμονίων
  chosen: By the ruler of the demons
  alternatives:
  - By the prince of demons
  - In the ruler of the demons
  lexicon: BDAG
  rationale: Although ἐν is literally 'in,' here it is instrumental or associative
    in sense; 'by' communicates the intended accusation that Jesus acts through the
    authority/power of the demonic ruler. 'Ruler' is clearer modern English than 'prince,'
    though the latter is traditional and worth preserving in a footnote.
- source_word: δαιμονίων / δαιμόνια
  chosen: demons
  alternatives:
  - unclean spirits
  lexicon: BDAG
  rationale: The noun here is δαιμόνιον, which is best rendered 'demon.' 'Unclean
    spirits' would import wording from related but different expressions used elsewhere.
- source_word: ἐκβάλλει
  chosen: casts out
  alternatives:
  - drives out
  lexicon: BDAG
  rationale: '''Casts out'' is the established and accurate rendering for exorcistic
    contexts, preserving the force of expulsion without unnecessary paraphrase.'
