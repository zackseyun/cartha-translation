theological_decisions:
- issue: Rendering the accusation 'Βεελζεβοὺλ ἔχει'
  chosen_reading: He has Beelzebul
  alternative_readings:
  - He is possessed by Beelzebul
  rationale: The main text preserves the Greek idiom as closely as readable English
    allows, avoiding interpretive expansion. Because the idiom clearly implies demonic
    possession or control, that fuller sense is preserved as an alternative in a footnote
    rather than imported into the main text.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Rendering ἄρχοντι as 'ruler' rather than 'prince'
  chosen_reading: ruler of the demons
  alternative_readings:
  - prince of demons
  rationale: Both are viable. 'Ruler' is more accessible modern English and accurately
    conveys authority. The traditional 'prince' is preserved in a footnote because
    of its familiarity in English Bible tradition.
  doctrine_reference: Readable modern English, not archaic or academic.
