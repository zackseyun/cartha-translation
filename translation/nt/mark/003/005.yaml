theological_decisions:
- issue: Jesus' emotional response of anger and grief
  chosen_reading: 'Render both emotions straightforwardly: ''with anger'' and ''grieved,''
    without softening either.'
  alternative_readings:
  - Render ὀργή as 'indignation' to soften the force
  - Render συλλυπούμενος more expansively as 'deeply saddened'
  rationale: The verse explicitly presents Jesus as both angry and grieved. Historic
    orthodoxy does not require suppressing either emotion; the translation should
    preserve the text's tension and moral seriousness without doctrinal smoothing.
  doctrine_reference: Preserve theological tension rather than resolve it.
