id: MRK.3.5
reference: Mark 3:5
source:
  edition: SBLGNT
  text: καὶ περιβλεψάμενος αὐτοὺς μετ’ ὀργῆς, συλλυπούμενος ἐπὶ τῇ πωρώσει τῆς καρδίας
    αὐτῶν, λέγει τῷ ἀνθρώπῳ· Ἔκτεινον τὴν ⸀χεῖρα· καὶ ἐξέτεινεν, καὶ ἀπεκατεστάθη
    ἡ χεὶρ ⸀αὐτοῦ.
translation:
  text: And after looking around at them with anger, grieved at the hardness of their
    heart, he says to the man, “Stretch out your hand.” And he stretched it out, and
    his hand was restored.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'of their hearts.' The Greek reads singular 'heart,' likely as a collective
      expression.
    reason: lexical_alternative
lexical_decisions:
- source_word: περιβλεψάμενος
  chosen: after looking around
  alternatives:
  - looking around
  - having looked around
  lexicon: BDAG
  rationale: Aorist middle participle indicating a completed action prior to the main
    verb λέγει. 'After looking around' preserves the participial sequence in natural
    English and conveys the surveying glance directed at the group.
- source_word: μετ’ ὀργῆς
  chosen: with anger
  alternatives:
  - in anger
  - with غضب / wrath
  lexicon: BDAG
  rationale: μετά with the genitive expresses accompanying manner. 'With anger' is
    direct and natural; 'wrath' would sound elevated and potentially overstate the
    emotional register in this narrative context.
- source_word: συλλυπούμενος
  chosen: grieved
  alternatives:
  - deeply grieved
  - sorrowing together
  lexicon: BDAG
  rationale: The participle conveys being pained or grieved. 'Grieved' is concise
    and idiomatic. The compound nuance ('grieved together/at the same time') is not
    naturally reproducible in English and is sufficiently represented by the coordination
    with Jesus' anger.
- source_word: ἐπὶ τῇ πωρώσει
  chosen: at the hardness
  alternatives:
  - because of the hardness
  - at the callousness
  lexicon: BDAG
  rationale: ἐπί with the dative here marks the basis/cause of grief. πώρωσις denotes
    hardness, dullness, or callousness. 'Hardness' is the most established and transparent
    rendering, while preserving the metaphor.
- source_word: τῆς καρδίας αὐτῶν
  chosen: of their heart
  alternatives:
  - of their hearts
  lexicon: BDAG
  rationale: The Greek has singular καρδίας with plural αὐτῶν. The singular may be
    collective, and rendering it as 'their heart' preserves the source form more closely
    while remaining intelligible. The plural is a viable idiomatic English alternative
    and is preserved in a footnote.
- source_word: λέγει
  chosen: he says
  alternatives:
  - he said
  lexicon: BDAG
  rationale: The present tense is the historical present, common in Mark. Rendering
    it as 'he says' preserves Mark's vivid narrative style rather than flattening
    it to a simple past.
- source_word: τῷ ἀνθρώπῳ
  chosen: to the man
  alternatives:
  - to the person
  lexicon: BDAG
  rationale: ἄνθρωπος here refers to the specific male individual in the scene. 'The
    man' is both accurate and natural; gender-neutral rendering would obscure the
    concrete referent.
- source_word: Ἔκτεινον τὴν χεῖρα
  chosen: Stretch out your hand
  alternatives:
  - Hold out your hand
  - Extend your hand
  lexicon: BDAG
  rationale: The aorist imperative calls for a decisive act. 'Stretch out' is the
    most natural equivalent for ἐκτείνω in this healing context and matches the following
    narrative repetition.
- source_word: ἐξέτεινεν
  chosen: he stretched it out
  alternatives:
  - he stretched out his hand
  lexicon: BDAG
  rationale: The verb echoes the command and the object is readily supplied from context.
    'He stretched it out' preserves the verbal repetition while avoiding unnecessary
    redundancy.
- source_word: ἀπεκατεστάθη
  chosen: was restored
  alternatives:
  - was healed
  - was made whole
  lexicon: BDAG
  rationale: The passive indicates restoration to a former proper condition. 'Was
    restored' is more lexically precise than 'was healed' and avoids importing a narrower
    medical gloss than the Greek requires.
