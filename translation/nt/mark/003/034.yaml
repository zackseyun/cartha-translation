theological_decisions:
- issue: Gendered familial term ἀδελφοί in a context that may include women among
    Jesus' followers
  chosen_reading: brothers
  alternative_readings:
  - siblings
  rationale: Following the stated philosophy of gender-accurate over gender-neutral,
    the masculine plural is retained in the main text. Because the surrounding group
    likely included both men and women, the broader relational implication is worth
    preserving in a footnote without altering the source-shaped wording.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
