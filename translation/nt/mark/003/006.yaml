theological_decisions:
- issue: Whether to make the leaders' intent explicitly homicidal in the main text
  chosen_reading: Retain the broader wording 'destroy him' in the main text.
  alternative_readings:
  - kill him
  - put him to death
  rationale: The Greek verb ἀπόλλυμι is broader than a single English verb for killing,
    though in this context it clearly points toward eliminating Jesus. Keeping 'destroy
    him' preserves the lexical range and avoids importing a narrower wording than
    the Greek itself requires, while a footnote can preserve the more explicit alternative.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; preserve theological tension rather than resolve it.'
