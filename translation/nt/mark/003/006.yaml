id: MRK.3.6
reference: Mark 3:6
source:
  edition: SBLGNT
  text: καὶ ἐξελθόντες οἱ Φαρισαῖοι ⸀εὐθὺς μετὰ τῶν Ἡρῳδιανῶν συμβούλιον ⸀ἐδίδουν
    κατ’ αὐτοῦ ὅπως αὐτὸν ἀπολέσωσιν.
translation:
  text: And the Pharisees went out and immediately began plotting with the Herodians
    against him, how they might destroy him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more explicitly in context, 'kill him' or 'put him to death.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξελθόντες
  chosen: went out
  alternatives:
  - having gone out
  - after going out
  lexicon: BDAG
  rationale: Aorist participle of ἐξέρχομαι, naturally rendered as attendant action
    in English narrative. 'Went out' is idiomatic and preserves the movement away
    from the synagogue context without over-formalizing the participle.
- source_word: εὐθὺς
  chosen: immediately
  alternatives:
  - at once
  - right away
  lexicon: BDAG
  rationale: Mark frequently uses εὐθύς for narrative urgency. 'Immediately' preserves
    that characteristic Markan force in standard English.
- source_word: μετὰ τῶν Ἡρῳδιανῶν
  chosen: with the Herodians
  alternatives:
  - together with the Herodians
  lexicon: BDAG
  rationale: μετά with the genitive denotes association. 'With the Herodians' is the
    most natural concise rendering. 'Herodians' is a standard transliteration for
    the group aligned with Herodian interests.
- source_word: συμβούλιον ἐδίδουν
  chosen: began plotting
  alternatives:
  - were giving counsel
  - were taking counsel
  - were making plans
  lexicon: BDAG
  rationale: The idiom συμβούλιον διδόναι means to hold a consultation or take counsel.
    In context, the hostile purpose clause shows the consultation is conspiratorial,
    so 'began plotting' captures the sense clearly in modern English. 'Began' reflects
    the imperfect ἐδίδουν as inceptive/progressive action.
- source_word: κατ’ αὐτοῦ
  chosen: against him
  alternatives:
  - concerning him
  lexicon: BDAG
  rationale: κατά with the genitive here carries adversative force, not merely reference.
    'Against him' best reflects the hostile intent.
- source_word: ὅπως
  chosen: how
  alternatives:
  - so that
  - in order that
  lexicon: BDAG
  rationale: With the following subjunctive, ὅπως introduces intended result/purpose.
    Rendering it as 'how' fits the English idiom 'plotting ... how they might...'
    while preserving the deliberative nuance. A more formal alternative would be 'so
    that' or 'in order that.'
- source_word: ἀπολέσωσιν
  chosen: destroy him
  alternatives:
  - kill him
  - put him to death
  lexicon: BDAG
  rationale: ἀπόλλυμι can mean destroy, ruin, or kill depending on context. Here the
    hostile plot against Jesus points toward lethal intent, but 'destroy him' preserves
    the broader lexical force and echoes the Greek without narrowing it too quickly.
    The likely practical implication of death is preserved by context and noted in
    a footnote.
