id: MRK.3.18
reference: Mark 3:18
source:
  edition: SBLGNT
  text: καὶ Ἀνδρέαν καὶ Φίλιππον καὶ Βαρθολομαῖον καὶ Μαθθαῖον καὶ Θωμᾶν καὶ Ἰάκωβον
    τὸν τοῦ Ἁλφαίου καὶ Θαδδαῖον καὶ Σίμωνα τὸν ⸀Καναναῖον
translation:
  text: and Andrew, and Philip, and Bartholomew, and Matthew, and Thomas, and James
    the son of Alphaeus, and Thaddaeus, and Simon the Zealot.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek Cananaean; likely meaning "Zealot," as in Luke 6:15. Traditionally
      rendered "Canaanite" in older English versions, but that is likely misleading
      here.
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ
  chosen: and
  alternatives:
  - also
  lexicon: BDAG
  rationale: Rendered consistently as "and" to preserve the paratactic list structure
    of the Greek.
- source_word: Ἀνδρέαν
  chosen: Andrew
  lexicon: BDAG
  rationale: Personal name transliterated by standard English convention, following
    the translation philosophy to transliterate names.
- source_word: Φίλιππον
  chosen: Philip
  lexicon: BDAG
  rationale: Personal name transliterated by standard English convention.
- source_word: Βαρθολομαῖον
  chosen: Bartholomew
  lexicon: BDAG
  rationale: Personal name transliterated by standard English convention.
- source_word: Μαθθαῖον
  chosen: Matthew
  alternatives:
  - Matthaeus
  lexicon: BDAG
  rationale: Standard English transliteration of the personal name.
- source_word: Θωμᾶν
  chosen: Thomas
  lexicon: BDAG
  rationale: Standard English transliteration of the personal name.
- source_word: Ἰάκωβον τὸν τοῦ Ἁλφαίου
  chosen: James the son of Alphaeus
  alternatives:
  - James of Alphaeus
  lexicon: BDAG
  rationale: The article + genitive construction identifies this James by paternal
    relation. "The son of Alphaeus" is the clearest natural English rendering and
    matches the sense of the Greek.
- source_word: Θαδδαῖον
  chosen: Thaddaeus
  lexicon: BDAG
  rationale: Standard English transliteration of the personal name.
- source_word: Σίμωνα τὸν Καναναῖον
  chosen: Simon the Zealot
  alternatives:
  - Simon the Cananaean
  - Simon the Canaanite
  lexicon: BDAG
  rationale: Καναναῖος here is not an ethnic reference to Canaan, but a Greek form
    reflecting an Aramaic term for a zealot/enthusiast, as shown by the parallel in
    Luke 6:15 (ζηλωτής). "Simon the Zealot" best conveys the intended designation
    in clear English and avoids the misleading "Canaanite."
