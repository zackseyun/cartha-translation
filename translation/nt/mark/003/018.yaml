theological_decisions:
- issue: Meaning of the epithet Καναναῖος for Simon
  chosen_reading: Simon is identified by the nickname/title "the Zealot," not as an
    ethnic "Canaanite."
  alternative_readings:
  - Simon the Cananaean
  - Simon the Canaanite
  rationale: This is primarily a lexical-historical decision rather than a doctrinal
    one, but it affects interpretation. The Markan form likely reflects an Aramaic
    background and is clarified by Luke's explicit ζηλωτής. Rendering it as "Canaanite"
    would wrongly suggest geography or ethnicity.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; readable modern English, not archaic or academic.'
