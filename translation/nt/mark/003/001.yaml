id: MRK.3.1
reference: Mark 3:1
source:
  edition: SBLGNT
  text: Καὶ εἰσῆλθεν πάλιν ⸀εἰς συναγωγήν, καὶ ἦν ἐκεῖ ἄνθρωπος ἐξηραμμένην ἔχων τὴν
    χεῖρα.
translation:
  text: And he entered a synagogue again, and a man was there with a withered hand.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'into the synagogue,' if Mark intends a specific synagogue already known
      from the immediate context.
    reason: alternative_reading
  - marker: b
    text: Or, 'a shriveled hand' or 'a hand that had dried up.'
    reason: lexical_alternative
  - marker: c
    text: Or 'there was a man there'.
    reason: previous_rendering
lexical_decisions:
- source_word: εἰσῆλθεν
  chosen: entered
  alternatives:
  - went in
  lexicon: BDAG
  rationale: Aorist of εἰσέρχομαι is naturally rendered 'entered' in narrative English.
    This preserves the simple movement sense without unnecessary expansion.
- source_word: πάλιν
  chosen: again
  alternatives:
  - once more
  lexicon: BDAG
  rationale: πάλιν marks repeated action. 'Again' is the most direct and idiomatic
    rendering in this narrative context.
- source_word: εἰς συναγωγήν
  chosen: into a synagogue
  alternatives:
  - into the synagogue
  - in a synagogue
  lexicon: BDAG
  rationale: The noun lacks the article in Greek, so 'a synagogue' best reflects the
    form without over-specifying a previously identified building. 'Into' preserves
    the force of εἰς with the verb of motion.
- source_word: ἦν ἐκεῖ
  chosen: there was ... there
  alternatives:
  - was there
  - there was
  lexicon: BDAG
  rationale: The clause introduces a person present at the location. Rendering both
    elements gives the full sense of the Greek, though English style could omit one
    'there'; here the repetition is retained for auditability and to reflect ἐκεῖ
    explicitly.
- source_word: ἄνθρωπος
  chosen: a man
  alternatives:
  - a person
  lexicon: BDAG
  rationale: Although ἄνθρωπος can mean 'person' generically, here the singular narrative
    reference is to an individual male, and the traditional and contextually natural
    rendering is 'a man.' This follows the gender-accurate principle.
- source_word: ἐξηραμμένην
  chosen: withered
  alternatives:
  - shriveled
  - dried up
  lexicon: BDAG
  rationale: The perfect participle of ξηραίνω describes a hand that has become dried
    up/atrophied. 'Withered' is concise, idiomatic, and standard in healing contexts
    without sounding archaic here.
- source_word: ἔχων τὴν χεῖρα
  chosen: with a withered hand
  alternatives:
  - having his hand withered
  - having the hand withered
  lexicon: BDAG
  rationale: The participial construction is idiomatically rendered in English with
    'with.' This avoids wooden phrasing while preserving the descriptive force of
    the Greek.
- source_word: τὴν χεῖρα
  chosen: hand
  alternatives:
  - the hand
  lexicon: BDAG
  rationale: English idiom normally says 'with a withered hand' rather than 'with
    the hand withered.' The article is absorbed into natural English expression.
