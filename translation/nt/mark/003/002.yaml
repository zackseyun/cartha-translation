theological_decisions:
- issue: Portrayal of the observers' intent
  chosen_reading: The verse presents hostile surveillance aimed at finding grounds
    for accusation, without specifying a formal legal proceeding.
  alternative_readings:
  - A more strongly juridical sense such as 'prosecute him'
  rationale: The context is conflict over Sabbath healing, and κατηγορέω can be forensic,
    but the text itself only states their purpose to accuse. The translation avoids
    importing a more developed legal scenario than the Greek requires.
  doctrine_reference: 'Translation philosophy: Preserve theological tension rather
    than resolve it; Never import doctrinal claims the text does not make.'
