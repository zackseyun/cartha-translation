id: MRK.3.2
reference: Mark 3:2
source:
  edition: SBLGNT
  text: καὶ παρετήρουν αὐτὸν εἰ τοῖς σάββασιν θεραπεύσει αὐτόν, ἵνα ⸀κατηγορήσωσιν
    αὐτοῦ.
translation:
  text: And they were watching him closely to see whether he would heal him on the
    Sabbaths, so that they might accuse him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'on the Sabbath.' The Greek uses the plural form 'the Sabbaths,' which
      can function idiomatically for the Sabbath day.
    reason: lexical_alternative
lexical_decisions:
- source_word: παρετήρουν
  chosen: were watching ... closely
  alternatives:
  - were watching
  - were observing carefully
  - were keeping close watch on
  lexicon: BDAG
  rationale: Imperfect tense indicates ongoing action, and παρατηρέω often carries
    the sense of careful or hostile observation. 'Were watching him closely' captures
    both the progressive aspect and the suspicious scrutiny in context.
- source_word: εἰ
  chosen: to see whether
  alternatives:
  - whether
  - if
  lexicon: BDAG
  rationale: After a verb of watching/observing, English idiom is smoother with 'to
    see whether' rather than a bare 'if,' while preserving the indirect-question force.
- source_word: τοῖς σάββασιν
  chosen: on the Sabbaths
  alternatives:
  - on the Sabbath
  - during the Sabbath
  lexicon: BDAG
  rationale: The Greek is dative plural ('on the Sabbaths'). In Koine this plural
    form can function idiomatically for the Sabbath day, but retaining 'the Sabbaths'
    is a more transparent rendering of the form and is still intelligible in English.
    The singular alternative is preserved in a footnote because it reflects common
    English idiom and possible semantic force.
- source_word: θεραπεύσει
  chosen: would heal
  alternatives:
  - will heal
  - might heal
  - was going to heal
  lexicon: BDAG
  rationale: Future indicative in an indirect-question setting after a past-tense
    main verb is naturally rendered in English as 'would heal.' 'Heal' is the standard
    sense of θεραπεύω here.
- source_word: κατηγορήσωσιν αὐτοῦ
  chosen: might accuse him
  alternatives:
  - might bring charges against him
  - might prosecute him
  lexicon: BDAG
  rationale: 'The aorist subjunctive after ἵνα expresses purpose: they were watching
    in order to accuse him. The genitive after κατηγορέω is standard (''accuse someone'').
    ''Accuse him'' is the clearest natural English rendering; more juridical alternatives
    are possible but too strong for the immediate context.'
- source_word: ἵνα
  chosen: so that
  alternatives:
  - in order that
  - so they could
  lexicon: BDAG
  rationale: This conjunction marks purpose. 'So that' preserves the purposive force
    without sounding overly formal.
