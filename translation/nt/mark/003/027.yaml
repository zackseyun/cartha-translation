id: MRK.3.27
reference: Mark 3:27
source:
  edition: SBLGNT
  text: ⸂ἀλλ’ οὐδεὶς δύναται⸃ ⸂εἰς τὴν οἰκίαν τοῦ ἰσχυροῦ εἰσελθὼν τὰ σκεύη⸃ αὐτοῦ
    διαρπάσαι ἐὰν μὴ πρῶτον τὸν ἰσχυρὸν δήσῃ, καὶ τότε τὴν οἰκίαν αὐτοῦ ⸀διαρπάσει.
translation:
  text: But no one can enter the house of the strong man and plunder his goods unless
    he first ties up the strong man; then indeed he will plunder his house.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his possessions' or more literally 'his vessels/things.'
    reason: lexical_alternative
  - marker: b
    text: The 'strong man' is part of Jesus' metaphor for overpowering Satan; the
      translation keeps the image rather than making the interpretation explicit in
      the main text.
    reason: cross_reference
lexical_decisions:
- source_word: ἀλλ’
  chosen: But
  alternatives:
  - Rather
  - Yet
  lexicon: BDAG
  rationale: Marks contrast with the preceding accusation and Jesus' rebuttal. 'But'
    is the most natural English adversative here.
- source_word: οὐδεὶς δύναται
  chosen: no one can
  alternatives:
  - nobody is able to
  - no one is able
  lexicon: BDAG
  rationale: Combines the indefinite negative subject with δύναμαι idiomatically in
    English while preserving the statement of impossibility.
- source_word: εἰς τὴν οἰκίαν
  chosen: enter the house
  alternatives:
  - go into the house
  - enter into the house
  lexicon: BDAG
  rationale: The participle εἰσελθών with εἰς + accusative is naturally rendered 'enter
    the house.' English does not require repeating 'into' after 'enter.'
- source_word: τοῦ ἰσχυροῦ / τὸν ἰσχυρόν
  chosen: the strong man
  alternatives:
  - the strong one
  - the mighty man
  lexicon: BDAG
  rationale: The adjective is substantival. 'Strong man' is the clearest and most
    idiomatic rendering in this metaphorical saying and preserves the repeated expression.
- source_word: εἰσελθὼν
  chosen: enter
  alternatives:
  - having entered
  - after entering
  lexicon: BDAG
  rationale: Although formally an aorist participle, English smooths the construction
    by using an infinitival/complement structure with 'can enter ... and plunder.'
    This preserves the sequence without awkwardness.
- source_word: τὰ σκεύη αὐτοῦ
  chosen: his goods
  alternatives:
  - his possessions
  - his property
  - his vessels
  lexicon: BDAG
  rationale: σκεύη literally means 'vessels/objects/gear,' but in this house-plundering
    context it refers broadly to belongings or property. 'Goods' is concise, natural,
    and fits the robbery metaphor better than the overly literal 'vessels.'
- source_word: διαρπάσαι
  chosen: plunder
  alternatives:
  - rob
  - carry off by force
  lexicon: BDAG
  rationale: The verb denotes seizing or plundering thoroughly. 'Plunder' preserves
    the force better than the flatter 'rob.'
- source_word: ἐὰν μὴ
  chosen: unless
  alternatives:
  - if not
  lexicon: BDAG
  rationale: Standard conditional idiom in English for a necessary prior condition.
- source_word: πρῶτον
  chosen: first
  alternatives:
  - first of all
  - beforehand
  lexicon: BDAG
  rationale: Preserves the temporal priority of binding the strong man before the
    plundering.
- source_word: δήσῃ
  chosen: ties up
  alternatives:
  - binds
  - restrains
  lexicon: BDAG
  rationale: δέω means 'bind, tie.' 'Ties up' is vivid, idiomatic, and fits the burglary
    image in contemporary English; 'binds' is possible but less natural.
- source_word: καὶ τότε
  chosen: then indeed
  alternatives:
  - and then
  - then
  lexicon: BDAG
  rationale: τότε marks the consequent action after the prior condition is met. 'Then
    indeed' slightly brings out the emphatic progression without overtranslation.
- source_word: τὴν οἰκίαν αὐτοῦ διαρπάσει
  chosen: he will plunder his house
  alternatives:
  - he will plunder his household
  - he will rob his house
  lexicon: BDAG
  rationale: Retains the future verb and the repeated 'house' imagery. Here 'house'
    can imply the whole domain/estate, but the concrete image should be preserved
    in the main text.
