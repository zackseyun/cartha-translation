theological_decisions:
- issue: Metaphorical force of 'the strong man' in Jesus' argument about Satan
  chosen_reading: Retain the metaphor without interpretive expansion in the main text.
  alternative_readings:
  - Explicitly interpret the strong man as Satan in translation
  - Render more abstractly as 'the powerful one'
  rationale: In context the saying refers to Jesus' overpowering of Satan, but the
    Greek presents it as a metaphorical illustration. The translation should preserve
    the image and not import the interpretation into the wording itself.
  doctrine_reference: Preserve theological tension rather than resolve it.
