id: MRK.3.31
reference: Mark 3:31
source:
  edition: SBLGNT
  text: ⸂Καὶ ἔρχονται⸃ ⸂ἡ μήτηρ αὐτοῦ καὶ οἱ ἀδελφοὶ αὐτοῦ⸃ καὶ ἔξω ⸀στήκοντες ἀπέστειλαν
    πρὸς αὐτὸν ⸀καλοῦντες αὐτόν.
translation:
  text: Then his mother and his brothers came, and standing outside they sent word
    to him, calling for him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they sent a message to him.'
    reason: lexical_alternative
  - marker: b
    text: Or 'calling him' or 'summoning him.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Καὶ
  chosen: Then
  alternatives:
  - And
  lexicon: BDAG
  rationale: Clause-initial καί here advances the narrative. 'Then' gives natural
    English narrative flow while preserving the connective force better than a bare
    'And' in modern style.
- source_word: ἔρχονται
  chosen: came
  alternatives:
  - come
  - arrive
  lexicon: BDAG
  rationale: Greek present is a historical present in narrative. English simple past
    'came' is the most natural equivalent.
- source_word: μήτηρ αὐτοῦ
  chosen: his mother
  lexicon: BDAG
  rationale: Straightforward possessive construction; no reason to expand or paraphrase.
- source_word: οἱ ἀδελφοὶ αὐτοῦ
  chosen: his brothers
  alternatives:
  - his brothers and sisters
  - his siblings
  lexicon: BDAG
  rationale: ἀδελφοί is grammatically masculine plural and in this context refers
    to Jesus's male family members as presented by the text. Per gender-accurate policy,
    'brothers' is preferred over gender-neutral renderings.
- source_word: ἔξω
  chosen: outside
  alternatives:
  - outdoors
  - on the outside
  lexicon: BDAG
  rationale: Simple spatial adverb indicating their position relative to the house/crowd
    scene.
- source_word: στήκοντες
  chosen: standing
  alternatives:
  - having stood
  - remaining standing
  lexicon: BDAG
  rationale: Present participle describing attendant circumstance/state. 'Standing'
    is concise and natural in English.
- source_word: ἀπέστειλαν πρὸς αὐτὸν
  chosen: they sent word to him
  alternatives:
  - they sent to him
  - they sent a message to him
  lexicon: BDAG
  rationale: The idiom with ἀποστέλλω plus πρὸς a person implies sending a message
    or messenger to someone, not merely dispatching something in an unspecified way.
    'Sent word to him' is idiomatic and fits the context.
- source_word: καλοῦντες αὐτόν
  chosen: calling for him
  alternatives:
  - calling him
  - summoning him
  lexicon: BDAG
  rationale: 'The participle explains the purpose/content of the message: they were
    seeking to have him come out to them. ''Calling for him'' communicates this better
    than the more ambiguous ''calling him.'''
