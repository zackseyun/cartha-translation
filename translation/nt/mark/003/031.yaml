theological_decisions:
- issue: Reference of 'his brothers'
  chosen_reading: Translate literally as 'his brothers' without interpretive qualification.
  alternative_readings:
  - understood as biological brothers
  - understood as broader kin/relatives in some traditions
  rationale: The verse itself uses ἀδελφοί, whose plain sense is 'brothers.' The translation
    should not import a denominationally charged interpretation about the exact familial
    relationship beyond what the Greek states.
  doctrine_reference: Affirmations; Translation philosophy §§1, 3, 4
