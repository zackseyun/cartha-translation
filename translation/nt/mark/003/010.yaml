theological_decisions:
- issue: Nature of μάστιγας in healing context
  chosen_reading: Rendered as 'afflictions' rather than a more specific medical term.
  alternative_readings:
  - diseases
  - plagues
  - scourges
  rationale: The text emphasizes sufferers pressing toward Jesus for healing, but
    μάστιξ is broader and more vivid than a strictly clinical term. 'Afflictions'
    preserves the experiential weight of suffering without importing a narrower diagnosis.
  doctrine_reference: Translation philosophy §1, §5
