id: MRK.3.10
reference: Mark 3:10
source:
  edition: SBLGNT
  text: πολλοὺς γὰρ ἐθεράπευσεν, ὥστε ἐπιπίπτειν αὐτῷ ἵνα αὐτοῦ ἅψωνται ὅσοι εἶχον
    μάστιγας.
translation:
  text: For he had healed many, so that all who had afflictions were pressing in on
    him in order to touch him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'were falling upon him'—the Greek is more literally forceful, describing
      people surging toward him.
    reason: lexical_alternative
  - marker: b
    text: Or 'had diseases' or 'had plagues'; the Greek word can mean severe afflictions
      and is literally 'scourges.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πολλοὺς
  chosen: many
  alternatives:
  - many people
  - a great many
  lexicon: BDAG
  rationale: Accusative plural functioning as the object of ἐθεράπευσεν. 'Many' is
    natural and sufficiently precise in English without adding 'people,' though that
    sense is implied.
- source_word: γὰρ
  chosen: For
  alternatives:
  - because
  - since
  lexicon: BDAG
  rationale: Marks explanation for the surrounding narrative situation. 'For' preserves
    the connective force in a concise, readable way.
- source_word: ἐθεράπευσεν
  chosen: had healed
  alternatives:
  - healed
  - cured
  lexicon: BDAG
  rationale: Aorist indicative of θεραπεύω, referring to prior healing activity that
    explains the crowd's present behavior. English past perfect ('had healed') brings
    out that explanatory anterior sense in context better than a simple past, without
    overtranslating.
- source_word: ὥστε
  chosen: so that
  alternatives:
  - with the result that
  - therefore
  lexicon: BDAG
  rationale: Introduces the result of Jesus' healing many. 'So that' is idiomatic
    and preserves the result clause.
- source_word: ἐπιπίπτειν αὐτῷ
  chosen: were pressing in on him
  alternatives:
  - were falling upon him
  - were crowding around him
  - were rushing at him
  lexicon: BDAG
  rationale: ἐπιπίπτω literally means 'fall upon,' but here in crowd context it describes
    people surging toward Jesus physically. 'Were pressing in on him' communicates
    the force and danger of the crowd without sounding wooden.
- source_word: ἵνα
  chosen: in order to
  alternatives:
  - so that
  - to
  lexicon: BDAG
  rationale: 'Expresses purpose: the crowd pressed in on him with the aim of touching
    him.'
- source_word: αὐτοῦ ἅψωνται
  chosen: touch him
  alternatives:
  - lay hold of him
  - touch him physically
  lexicon: BDAG
  rationale: ἅπτομαι with genitive commonly means 'touch.' In this healing context,
    the physical sense is primary. English does not need to mark the genitive construction
    explicitly.
- source_word: ὅσοι
  chosen: all who
  alternatives:
  - those who
  - as many as
  lexicon: BDAG
  rationale: Relative term referring to the afflicted members of the crowd. 'All who'
    best captures the comprehensive force in natural English.
- source_word: εἶχον μάστιγας
  chosen: had afflictions
  alternatives:
  - had diseases
  - had plagues
  - were suffering from scourges
  lexicon: BDAG
  rationale: μάστιξ literally denotes a whip/scourge, but in Mark it is used figuratively
    for severe afflictions or maladies. 'Afflictions' preserves the broader suffering
    sense without narrowing it only to disease, and avoids the misleadingly literal
    'scourges' in English main text.
