theological_decisions:
- issue: Reference of 'brothers'
  chosen_reading: Render ἀδελφοί as 'brothers' without interpretive expansion.
  alternative_readings:
  - brothers/close relatives
  - siblings
  rationale: The verse itself uses the ordinary kinship term and does not specify
    a theological explanation of Jesus's family relationships. To avoid importing
    denominational conclusions, the translation keeps the direct lexical sense and
    leaves broader interpretive debates unresolved.
  doctrine_reference: Affirmations; Translation philosophy §3, §4
