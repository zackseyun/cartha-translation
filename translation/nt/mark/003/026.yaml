theological_decisions:
- issue: Nature of the statement about Satan's downfall
  chosen_reading: Render the clause as a logical consequence within Jesus' argument,
    not as a full doctrinal declaration of final eschatological defeat in this verse
    alone.
  alternative_readings:
  - Translate more absolutely as 'but has come to an end' or 'but is finished'
  rationale: The verse is part of Jesus' reductio argument against the accusation
    that he casts out demons by Satan's power. The Greek states the impossibility
    of a divided Satanic kingdom enduring; it need not be expanded into a more developed
    doctrinal claim than the immediate context supports.
  doctrine_reference: Preserve theological tension rather than resolve it.
