id: MRK.3.26
reference: Mark 3:26
source:
  edition: SBLGNT
  text: καὶ εἰ ὁ Σατανᾶς ἀνέστη ἐφ’ ἑαυτὸν καὶ ⸀ἐμερίσθη, οὐ δύναται ⸀στῆναι ἀλλὰ
    τέλος ἔχει.
translation:
  text: And if Satan has risen up against himself and is divided, he cannot stand,
    but is coming to an end.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'but has an end.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Σατανᾶς
  chosen: Satan
  lexicon: BDAG
  rationale: Standard transliteration of the personal name, following the policy to
    transliterate names rather than translate them.
- source_word: ἀνέστη
  chosen: has risen up
  alternatives:
  - has stood up
  - rose up
  lexicon: BDAG
  rationale: Aorist of ἀνίστημι here carries the sense of rising up in opposition.
    'Has risen up' preserves the ingressive/oppositional force in idiomatic English
    and fits the conditional argument.
- source_word: ἐφ’ ἑαυτὸν
  chosen: against himself
  alternatives:
  - upon himself
  lexicon: BDAG
  rationale: With ἐπί plus reflexive pronoun in this context, the idiomatic sense
    is hostile action directed against oneself, hence 'against himself' rather than
    the more literal but less natural 'upon himself.'
- source_word: ἐμερίσθη
  chosen: is divided
  alternatives:
  - has been divided
  - is split
  lexicon: BDAG
  rationale: Passive of μερίζω in this context denotes internal division. Present
    English 'is divided' communicates the resulting state clearly and naturally in
    the conditional statement.
- source_word: οὐ δύναται στῆναι
  chosen: he cannot stand
  alternatives:
  - he is not able to stand
  - he cannot remain standing
  lexicon: BDAG
  rationale: This is a natural English rendering of the idiom expressing inability
    to continue or endure. 'Stand' also preserves the rhetorical parallel with the
    surrounding context.
- source_word: ἀλλὰ τέλος ἔχει
  chosen: but is coming to an end
  alternatives:
  - but has an end
  - but is finished
  - but comes to an end
  lexicon: BDAG
  rationale: Literally 'but has an end.' In English, 'is coming to an end' best conveys
    the idiomatic force that Satan's divided rule cannot continue and is reaching
    its termination, without overstating the timing.
