id: MRK.3.14
reference: Mark 3:14
source:
  edition: SBLGNT
  text: καὶ ἐποίησεν ⸀δώδεκα, ἵνα ὦσιν μετ’ αὐτοῦ καὶ ἵνα ἀποστέλλῃ αὐτοὺς κηρύσσειν
translation:
  text: And he appointed twelve, so that they might be with him and so that he might
    send them out to preach,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Some manuscripts add, 'whom he also named apostles.'
    reason: textual_variant
  - marker: b
    text: Or 'to proclaim.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐποίησεν
  chosen: appointed
  alternatives:
  - made
  - appointed
  - designated
  lexicon: BDAG
  rationale: Although the verb is literally 'made,' in this context with 'twelve'
    as the object it refers to constituting or appointing a group rather than creating
    them. 'Appointed' is idiomatic English and fits the institutional sense without
    over-paraphrasing.
- source_word: δώδεκα
  chosen: twelve
  alternatives:
  - the twelve
  lexicon: BDAG
  rationale: The Greek text here lacks an explicit noun, using simply 'twelve.' English
    can preserve this ellipsis naturally. 'The twelve' is possible, but the anarthrous
    Greek does not require the article here.
- source_word: ἵνα ὦσιν μετ’ αὐτοῦ
  chosen: so that they might be with him
  alternatives:
  - that they might be with him
  lexicon: BDAG
  rationale: ἵνα with the subjunctive expresses purpose. 'So that they might be with
    him' clearly conveys the intended purpose while preserving the subjunctive nuance.
- source_word: ἀποστέλλῃ
  chosen: he might send them out
  alternatives:
  - he might send them
  - he might commission them
  lexicon: BDAG
  rationale: ἀποστέλλω means 'send' and often carries commissioning force. 'Send them
    out' reflects the missional sense in context and anticipates their public ministry,
    while avoiding importing the technical title 'apostles' into this clause where
    it is not present in the SBLGNT text of this verse.
- source_word: κηρύσσειν
  chosen: to preach
  alternatives:
  - to proclaim
  lexicon: BDAG
  rationale: κηρύσσω commonly means to proclaim publicly or preach. 'Preach' is the
    most natural concise rendering in this Gospel context, while 'proclaim' remains
    a viable alternative.
