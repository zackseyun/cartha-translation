theological_decisions:
- issue: Whether to render an implicit apostolic title in the main text
  chosen_reading: Do not add 'apostles' to the translation of this verse.
  alternative_readings:
  - And he appointed twelve [whom he also named apostles]...
  - And he made twelve, appointing them as apostles...
  rationale: The SBLGNT text provided reads simply 'he appointed twelve' and does
    not include the longer reading found in some textual traditions ('whom he also
    named apostles'). To remain transparent to the source text, the main text should
    not import the title. The textual alternative is worth preserving in a footnote
    because of its familiarity and relevance to interpretation.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; preserve alternatives in footnotes where warranted.'
