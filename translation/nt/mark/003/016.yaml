theological_decisions:
- issue: Rendering of Jesus' act toward the Twelve
  chosen_reading: appointed the twelve
  alternative_readings:
  - made the twelve
  - designated the twelve
  rationale: The verse describes Jesus constituting this group in an official sense,
    not merely creating them in a generic way. 'Appointed' preserves that force without
    importing later ecclesiastical terminology not present in the Greek.
  doctrine_reference: Translation philosophy §1, §5
- issue: Treatment of Πέτρος
  chosen_reading: Peter
  alternative_readings:
  - Rock
  rationale: Because Πέτρος is functioning as Simon's personal name, the translation
    follows the policy to transliterate names. The semantic content of the name can
    be preserved in a footnote rather than replacing the name in the text.
  doctrine_reference: Translation philosophy §2
