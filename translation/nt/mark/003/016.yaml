id: MRK.3.16
reference: Mark 3:16
source:
  edition: SBLGNT
  text: καὶ ⸂ἐποίησεν τοὺς δώδεκα, καὶ⸃ ἐπέθηκεν ⸂ὄνομα τῷ Σίμωνι⸃ Πέτρον,
translation:
  text: And he appointed the twelve, and he gave Simon the name Peter,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Peter means 'Rock.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐποίησεν
  chosen: appointed
  alternatives:
  - made
  - designated
  lexicon: BDAG
  rationale: Although the verb is literally 'made,' in this context of selecting and
    constituting the group of twelve disciples, 'appointed' best conveys the institutional
    sense in natural English without over-paraphrasing. It reflects the force of establishing
    them as the Twelve.
- source_word: τοὺς δώδεκα
  chosen: the twelve
  alternatives:
  - the Twelve
  lexicon: BDAG
  rationale: The phrase refers to the recognized group of Jesus' twelve disciples/apostles.
    Lowercase 'the twelve' is a transparent rendering of the Greek form here; capitalization
    is an English stylistic choice rather than a lexical necessity.
- source_word: ἐπέθηκεν ὄνομα
  chosen: gave ... the name
  alternatives:
  - named
  - put upon ... the name
  lexicon: BDAG
  rationale: The idiom literally means 'placed a name on' someone. 'Gave Simon the
    name Peter' preserves the naming action more explicitly than the compressed English
    'named,' while remaining idiomatic.
- source_word: Σίμωνι
  chosen: Simon
  rationale: Personal name transliterated according to standard English convention,
    following the translation philosophy to transliterate names rather than translate
    them.
- source_word: Πέτρον
  chosen: Peter
  alternatives:
  - Rock
  lexicon: BDAG
  rationale: As a personal name, Πέτρος is transliterated as 'Peter' rather than translated,
    in keeping with the project's policy on names. The underlying meaning 'rock' is
    relevant intertextually but not rendered in the main text because here it functions
    as a bestowed name.
