theological_decisions:
- issue: Identity of οἱ παρ’ αὐτοῦ
  chosen_reading: Rendered generically as 'those close to him' rather than specifying
    'his family' in the main text.
  alternative_readings:
  - his family
  - his own people
  - his associates
  rationale: The phrase likely points to Jesus' family in context, especially given
    the following verses, but the Greek expression itself is less explicit than a
    direct kinship term. To avoid importing a stronger claim than the text states,
    the main text preserves the ambiguity, with the more specific option noted in
    a footnote.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Preserve theological tension rather than resolve it.'
