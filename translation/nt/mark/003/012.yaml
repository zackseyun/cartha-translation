id: MRK.3.12
reference: Mark 3:12
source:
  edition: SBLGNT
  text: καὶ πολλὰ ἐπετίμα αὐτοῖς ἵνα μὴ ⸂αὐτὸν φανερὸν⸃ ⸀ποιήσωσιν.
translation:
  text: And he sternly warned them many times not to make him known.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'reveal him,' 'make him public,' or more formally, 'make him manifest.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πολλὰ
  chosen: many times
  alternatives:
  - much
  - often
  - strictly
  lexicon: BDAG
  rationale: Used adverbially with ἐπετίμα to indicate repeated/intense action. 'Many
    times' captures the plural neuter adverbial force more naturally in English than
    'much.'
- source_word: ἐπετίμα
  chosen: sternly warned
  alternatives:
  - rebuked
  - strictly ordered
  - charged
  lexicon: BDAG
  rationale: In this context Jesus addresses unclean spirits and seeks to prevent
    disclosure. 'Sternly warned' preserves the forceful sense of ἐπιτιμάω without
    sounding unnatural in English. 'Rebuked' is possible but can sound narrower or
    more confrontational than the context's prohibitive command.
- source_word: αὐτοῖς
  chosen: them
  lexicon: BDAG
  rationale: Straightforward dative plural pronoun referring to the unclean spirits
    from the immediate context.
- source_word: ἵνα μὴ
  chosen: not to
  alternatives:
  - so that they might not
  - that they should not
  lexicon: BDAG
  rationale: This construction expresses the content/purpose of the warning. 'Not
    to' is concise modern English that preserves the prohibitive sense.
- source_word: αὐτὸν φανερὸν ποιήσωσιν
  chosen: make him known
  alternatives:
  - make him manifest
  - reveal him
  - make him public
  lexicon: BDAG
  rationale: The idiom φανερὸν ποιέω means to make someone/something known or manifest.
    'Make him known' is clear, natural, and preserves the sense of public disclosure.
    'Make him manifest' is more formal but less idiomatic in contemporary English.
