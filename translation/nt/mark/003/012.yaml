theological_decisions:
- issue: Nature of Jesus' command to the unclean spirits
  chosen_reading: The verse is rendered as a prohibition against publicly disclosing
    Jesus' identity, without specifying more than the text states.
  alternative_readings:
  - The command specifically forbids them from revealing him as the Son of God.
  - The command is a general silencing without emphasis on messianic secrecy.
  rationale: The immediate context implies disclosure of Jesus' identity, but this
    verse itself says only 'make him known.' The translation preserves that wording
    and does not import a fuller christological confession into the verse.
  doctrine_reference: Preserve theological tension rather than resolve it.
