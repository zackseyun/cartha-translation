theological_decisions:
- issue: Rendering of Sabbath idiom in a legal controversy
  chosen_reading: Retain the plural form 'on the Sabbaths' in the main text
  alternative_readings:
  - on the Sabbath
  rationale: The Greek plural is explicit and preserving it increases transparency
    to the source text. Because English readers may expect the singular idiom, the
    alternative is preserved in a footnote rather than replacing the source-oriented
    rendering.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; consistency/documented exception'
revisions:
- timestamp: '2026-04-21T12:46:23Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/nt/mark/003/004.json
  category: awkward_english
  tier: 1
  from: on the Sabbaths
  to: on the Sabbath
  rationale: The Greek plural 'τοῖς σάββασιν' is a common idiom that, in this context,
    refers to a single Sabbath day. While the draft's rendering 'on the Sabbaths'
    is formally literal, it is unnatural in English and introduces potential ambiguity,
    suggesting the question might apply to a series of Sabbaths rather than the specific
    one on which the event occurs. This slightly obscures the immediate context. Adopting
    the standard English idiom 'on the Sabbath' would improve clarity and naturalness
    without sacrificing meaning. The footnote could then be adjusted to note that
    the Greek text uses a plural form idiomatically.
