id: MRK.3.4
reference: Mark 3:4
source:
  edition: SBLGNT
  text: καὶ λέγει αὐτοῖς· Ἔξεστιν τοῖς σάββασιν ⸀ἀγαθοποιῆσαι ἢ κακοποιῆσαι, ψυχὴν
    σῶσαι ἢ ἀποκτεῖναι; οἱ δὲ ἐσιώπων.
translation:
  text: And he said to them, “Is it lawful on the Sabbath to do good or to do harm,
    to save a life or to kill?” But they were silent.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek 'on the Sabbaths,' a common idiom meaning 'on the Sabbath.'
    reason: lexical_alternative
  - marker: b
    text: Or 'on the Sabbaths'.
    reason: previous_rendering
lexical_decisions:
- source_word: Ἔξεστιν
  chosen: Is it lawful
  alternatives:
  - Is it permitted
  - Is it allowed
  lexicon: BDAG
  rationale: In this legal-ethical dispute over Sabbath observance, ἔξεστιν asks what
    is permitted under the law/custom, so 'lawful' best captures the juridical force
    in natural English.
- source_word: τοῖς σάββασιν
  chosen: on the Sabbaths
  alternatives:
  - on the Sabbath
  - during the Sabbath
  lexicon: BDAG
  rationale: The Greek is plural ('Sabbaths'), a common idiom in Koine for Sabbath
    observance. Retaining the plural is more formally transparent, though English
    often idiomatically uses the singular.
- source_word: ἀγαθοποιῆσαι
  chosen: to do good
  alternatives:
  - to do what is good
  - to benefit
  lexicon: BDAG
  rationale: The infinitive straightforwardly denotes doing good/beneficial action.
    'To do good' is concise and idiomatic while preserving the verbal form.
- source_word: κακοποιῆσαι
  chosen: to do harm
  alternatives:
  - to do evil
  - to do what is wrong
  lexicon: BDAG
  rationale: Although the verb can mean 'do evil' or 'mistreat,' 'do harm' fits the
    immediate contrast with healing and with 'save a life or kill,' making the practical
    ethical contrast clear without overmoralizing beyond the context.
- source_word: ψυχὴν
  chosen: a life
  alternatives:
  - a soul
  - a person
  - life
  lexicon: BDAG
  rationale: Here ψυχή in contrast with killing refers to preserving someone's life,
    not specifically the immaterial soul. 'A life' is the most natural contextual
    rendering.
- source_word: σῶσαι
  chosen: to save
  alternatives:
  - to preserve
  - to rescue
  lexicon: BDAG
  rationale: '''To save'' preserves the lexical connection with σῴζω while fitting
    the immediate sense of preserving life/healing.'
- source_word: ἀποκτεῖναι
  chosen: to kill
  alternatives:
  - to put to death
  - to murder
  lexicon: BDAG
  rationale: The basic sense is 'to kill.' 'Murder' would add a legal/moral nuance
    not explicit in the verb itself, and 'put to death' sounds too formal for the
    immediate contrast.
- source_word: ἐσιώπων
  chosen: they were silent
  alternatives:
  - they kept silent
  - they said nothing
  lexicon: BDAG
  rationale: The imperfect conveys continued silence in response to Jesus' question.
    'They were silent' is natural English and adequately reflects the narrative force.
