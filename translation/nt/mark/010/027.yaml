id: MRK.10.27
reference: Mark 10:27
source:
  edition: SBLGNT
  text: ⸀ἐμβλέψας αὐτοῖς ὁ Ἰησοῦς λέγει· Παρὰ ἀνθρώποις ἀδύνατον ἀλλ’ οὐ παρὰ θεῷ,
    πάντα γὰρ ⸀δυνατὰ παρὰ τῷ θεῷ.
translation:
  text: Jesus looked at them and said, “With men it is impossible, but not with God,
    because all things are possible with God.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'With human beings it is impossible … all things are possible with God.'
      The Greek ἄνθρωποι is masculine plural with generic force, referring to humanity
      rather than males specifically.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐμβλέψας
  chosen: looked at
  alternatives:
  - looking at
  - fixed his gaze on
  lexicon: BDAG
  rationale: Aorist participle preceding the main verb, conveying a deliberate look
    directed toward them. 'Looked at' is natural English and preserves the narrative
    action without over-translating the intensity.
- source_word: λέγει
  chosen: said
  alternatives:
  - says
  lexicon: BDAG
  rationale: Although the Greek uses the historical present ('says'), English narrative
    style commonly renders this as simple past for readability. This is a standard
    optimal-equivalence adjustment.
- source_word: παρὰ ἀνθρώποις
  chosen: With men
  alternatives:
  - For men
  - With human beings
  - From a human standpoint
  lexicon: BDAG
  rationale: 'Here παρά with the dative expresses perspective or sphere: ''with''
    or ''for'' humans. ''With men'' preserves the concise parallelism with ''with
    God'' and reflects the generic sense of ἄνθρωποι as human beings. The masculine
    form is representative/generic, so ''men'' is retained per gender-accurate philosophy.'
- source_word: ἀδύνατον
  chosen: it is impossible
  alternatives:
  - impossible
  lexicon: BDAG
  rationale: The adjective functions predicatively with an implied subject. Supplying
    'it is' is required for idiomatic English.
- source_word: ἀλλ’ οὐ παρὰ θεῷ
  chosen: but not with God
  alternatives:
  - but not for God
  - but not from God's side
  lexicon: BDAG
  rationale: Maintains the exact contrastive structure of the Greek and the repeated
    παρά phrase. 'With God' is idiomatic and matches the following clause.
- source_word: πάντα
  chosen: all things
  alternatives:
  - everything
  lexicon: BDAG
  rationale: Neuter plural adjective used substantivally. 'All things' preserves the
    breadth and traditional force of the statement slightly more formally than 'everything'.
- source_word: δυνατὰ
  chosen: are possible
  alternatives:
  - are able to be done
  - are possible to do
  lexicon: BDAG
  rationale: Predicate adjective paired with πάντα. 'Are possible' is the most direct
    and idiomatic rendering.
- source_word: γὰρ
  chosen: because
  alternatives:
  - for
  lexicon: BDAG
  rationale: Introduces the ground for the preceding statement. 'Because' communicates
    the explanatory force in contemporary English more clearly than the more formal
    'for'.
