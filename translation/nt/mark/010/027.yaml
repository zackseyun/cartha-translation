theological_decisions:
- issue: Generic ἄνθρωποι in contrast with θεῷ
  chosen_reading: Rendered 'men' as a representative term for humanity in the main
    text.
  alternative_readings:
  - human beings
  - people
  rationale: The Greek is grammatically masculine plural but generic in sense. Per
    the translation philosophy, gender-accurate rendering is preferred over flattening
    to gender-neutral language when the source uses a representative masculine form.
    The contrast is between human limitation and divine ability, not between males
    and God.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
