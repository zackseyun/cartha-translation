theological_decisions:
- issue: Whether to make Moses explicit as the subject of 'wrote'
  chosen_reading: Retain the implicit subject as 'he,' referring to Moses from the
    previous verse
  alternative_readings:
  - 'Make the subject explicit: ''Moses wrote'''
  rationale: The Greek does not repeat 'Moses' in this verse, and preserving the pronoun
    keeps the discourse flow and avoids adding emphasis not present in the source.
    The referent remains clear from context.
  doctrine_reference: Translation philosophy §1, §5
- issue: How to render σκληροκαρδία without reducing its biblical-theological force
  chosen_reading: Render as 'hardness of heart'
  alternative_readings:
  - hard-heartedness
  - stubbornness
  rationale: The phrase preserves the anthropological and moral imagery of the Greek
    and aligns with biblical idiom, without importing extra doctrinal interpretation.
  doctrine_reference: Translation philosophy §1, §6
