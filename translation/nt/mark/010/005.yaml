id: MRK.10.5
reference: Mark 10:5
source:
  edition: SBLGNT
  text: ⸂ὁ δὲ⸃ Ἰησοῦς εἶπεν αὐτοῖς· Πρὸς τὴν σκληροκαρδίαν ὑμῶν ἔγραψεν ὑμῖν τὴν ἐντολὴν
    ταύτην·
translation:
  text: But Jesus said to them, “Because of your hardness of heart he wrote this commandment
    for you.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: That is, Moses, mentioned in the previous verse.
    reason: cross_reference
  - marker: b
    text: Or 'hard-heartedness.'
    reason: lexical_alternative
  - marker: c
    text: Or 'command.'
    reason: lexical_alternative
lexical_decisions:
- source_word: δὲ
  chosen: But
  alternatives:
  - And
  - Now
  lexicon: BDAG
  rationale: Marks a mild contrast or development in the dialogue. 'But' best reflects
    the adversative force here as Jesus responds to the Pharisees' appeal to Moses.
- source_word: Πρὸς
  chosen: Because of
  alternatives:
  - With reference to
  - In view of
  - For
  lexicon: BDAG
  rationale: 'With the accusative here, πρός expresses relation/cause: Moses wrote
    the command in response to their condition. ''Because of'' communicates the causal
    nuance naturally in English.'
- source_word: σκληροκαρδίαν
  chosen: hardness of heart
  alternatives:
  - hard-heartedness
  - stubbornness
  lexicon: BDAG
  rationale: A compound meaning hardness or obstinacy of heart. 'Hardness of heart'
    is both transparent and idiomatic, preserving the biblical metaphor rather than
    flattening it to mere 'stubbornness.'
- source_word: ἔγραψεν
  chosen: he wrote
  alternatives:
  - Moses wrote
  lexicon: BDAG
  rationale: The Greek subject is implicit singular, referring back to Moses from
    the prior verse. The main text preserves the pronoun-level explicitness of the
    Greek with 'he wrote' rather than importing the name into this verse.
- source_word: ἐντολήν
  chosen: commandment
  alternatives:
  - command
  - instruction
  lexicon: BDAG
  rationale: ἐντολή commonly denotes an authoritative command. 'Commandment' preserves
    the formal, legal tone appropriate to discussion of Mosaic legislation, though
    'command' is possible.
- source_word: ταύτην
  chosen: this
  alternatives:
  - this very
  lexicon: BDAG
  rationale: Demonstrative pointing to the specific regulation under discussion. Simple
    'this' is sufficient and natural.
