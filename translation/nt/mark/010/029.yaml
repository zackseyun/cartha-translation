theological_decisions:
- issue: Rendering the renunciation list without overstating abandonment of family
    obligations
  chosen_reading: left house or brothers or sisters or mother or father or children
    or fields
  alternative_readings:
  - forsaken house ...
  - abandoned house ...
  rationale: The verse speaks of leaving these relations or possessions for Jesus
    and the gospel, not necessarily repudiating moral responsibility toward family.
    'Left' preserves the text's cost-of-discipleship emphasis without importing a
    harsher theological claim.
  doctrine_reference: Preserve theological tension rather than resolve it.
