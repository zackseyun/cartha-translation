id: MRK.10.29
reference: Mark 10:29
source:
  edition: SBLGNT
  text: ⸂ἔφη ὁ Ἰησοῦς⸃· Ἀμὴν λέγω ὑμῖν, οὐδείς ἐστιν ὃς ἀφῆκεν οἰκίαν ἢ ἀδελφοὺς ἢ
    ἀδελφὰς ἢ ⸂μητέρα ἢ πατέρα⸃ ἢ τέκνα ἢ ἀγροὺς ἕνεκεν ἐμοῦ καὶ ἕνεκεν τοῦ εὐαγγελίου,
translation:
  text: Jesus said, “Truly I say to you, there is no one who has left house or brothers
    or sisters or mother or father or children or fields for my sake and for the sake
    of the gospel,”
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἔφη
  chosen: said
  alternatives:
  - answered
  - declared
  lexicon: BDAG
  rationale: Aorist of φημί here introduces Jesus' speech simply and naturally. 'Said'
    is the clearest modern English equivalent without adding nuance not explicit in
    the verb.
- source_word: Ἀμὴν
  chosen: Truly
  alternatives:
  - Amen
  - Truly, truly
  lexicon: BDAG
  rationale: In the Synoptics ἀμήν introducing a saying is idiomatically rendered
    'Truly.' Retaining 'Amen' in English is possible but less natural here; 'Truly,
    truly' belongs to Johannine double ἀμήν sayings, not this text.
- source_word: λέγω ὑμῖν
  chosen: I say to you
  alternatives:
  - I tell you
  lexicon: BDAG
  rationale: This preserves the directness and formulaic solemnity of the Greek while
    remaining readable. 'I tell you' is possible, but 'I say to you' better reflects
    the source phrasing in a solemn pronouncement.
- source_word: οὐδείς ἐστιν ὃς
  chosen: there is no one who
  alternatives:
  - no one is who
  - no one who
  lexicon: BDAG
  rationale: This is idiomatic English for the Greek existential construction and
    preserves the universal negative force.
- source_word: ἀφῆκεν
  chosen: has left
  alternatives:
  - left
  - forsaken
  lexicon: BDAG
  rationale: English present perfect fits the force of the Greek aorist in this generalizing
    statement about anyone who has undertaken such renunciation. 'Forsaken' is too
    strong and potentially misleading in this context.
- source_word: οἰκίαν
  chosen: house
  alternatives:
  - home
  - household
  lexicon: BDAG
  rationale: '''House'' is the most direct lexical equivalent. ''Home'' is more interpretive
    and emotive; ''household'' would shift the sense from dwelling/property to family
    unit.'
- source_word: ἀδελφοὺς
  chosen: brothers
  alternatives:
  - siblings
  - brothers and sisters
  lexicon: BDAG
  rationale: The Greek specifically uses the masculine plural for male siblings here,
    followed separately by ἀδελφάς for female siblings. Gender-accurate translation
    therefore requires 'brothers,' not an inclusive collective.
- source_word: ἀδελφὰς
  chosen: sisters
  lexicon: BDAG
  rationale: Direct lexical equivalent; the separate mention reinforces that the list
    names family relations explicitly by sex.
- source_word: μητέρα
  chosen: mother
  lexicon: BDAG
  rationale: Direct lexical equivalent.
- source_word: πατέρα
  chosen: father
  lexicon: BDAG
  rationale: Direct lexical equivalent.
- source_word: τέκνα
  chosen: children
  alternatives:
  - sons and daughters
  lexicon: BDAG
  rationale: τέκνα is the broad term for offspring/children without specifying sex.
    'Children' is the most accurate and natural rendering.
- source_word: ἀγρούς
  chosen: fields
  alternatives:
  - farms
  - lands
  lexicon: BDAG
  rationale: ἀγρός commonly denotes a field or tract of cultivated land. 'Fields'
    is concrete and close to the Greek; 'farms' is more interpretive, and 'lands'
    is broader than the term itself.
- source_word: ἕνεκεν ἐμοῦ
  chosen: for my sake
  alternatives:
  - because of me
  - on account of me
  lexicon: BDAG
  rationale: This idiom expresses motive or cause in a concise, natural way and preserves
    the personal allegiance to Jesus emphasized by the Greek genitive with ἕνεκεν.
- source_word: καὶ ἕνεκεν τοῦ εὐαγγελίου
  chosen: and for the sake of the gospel
  alternatives:
  - and because of the gospel
  - and for the gospel
  lexicon: BDAG
  rationale: Repeating 'for the sake of' mirrors the Greek repetition of ἕνεκεν and
    preserves the rhetorical balance between devotion to Jesus and commitment to the
    gospel message.
- source_word: εὐαγγελίου
  chosen: gospel
  alternatives:
  - good news
  lexicon: BDAG
  rationale: While 'good news' is a valid gloss, 'gospel' is standard, clear, and
    carries the established NT sense without becoming opaque in modern English.
