id: MRK.10.21
reference: Mark 10:21
source:
  edition: SBLGNT
  text: ὁ δὲ Ἰησοῦς ἐμβλέψας αὐτῷ ἠγάπησεν αὐτὸν καὶ εἶπεν αὐτῷ· Ἕν ⸀σε ὑστερεῖ· ὕπαγε
    ὅσα ἔχεις πώλησον καὶ δὸς ⸀τοῖς πτωχοῖς, καὶ ἕξεις θησαυρὸν ἐν οὐρανῷ, καὶ δεῦρο
    ἀκολούθει ⸀μοι.
translation:
  text: 'And Jesus, looking at him, loved him and said to him, “One thing you lack:
    go, sell whatever you have and give to the poor, and you will have treasure in
    heaven; and come, follow me.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'all that you have.' The Greek expression ὅσα ἔχεις can be rendered
      either 'whatever you have' or 'all that you have'; the context indicates the
      full scope of his possessions.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐμβλέψας
  chosen: looking at him
  alternatives:
  - fixing his gaze on him
  - looking intently at him
  lexicon: BDAG
  rationale: Aorist participle indicating a directed, attentive look. 'Looking at
    him' is natural English and preserves the narrative force without over-intensifying
    beyond the context.
- source_word: ἠγάπησεν
  chosen: loved him
  alternatives:
  - showed love to him
  - had love for him
  lexicon: BDAG
  rationale: Cognate with ἀγάπη, whose default rendering is 'love' per doctrine. 'Loved
    him' is the plain and direct sense of the aorist verb here.
- source_word: Ἕν
  chosen: One thing
  alternatives:
  - One
  - One matter
  lexicon: BDAG
  rationale: 'Neuter singular used substantivally. English idiom naturally supplies
    ''thing'' to make the statement clear: ''One thing you lack.'''
- source_word: ὑστερεῖ
  chosen: you lack
  alternatives:
  - is lacking to you
  - you are lacking
  lexicon: BDAG
  rationale: Present indicative expressing present deficiency. 'You lack' is idiomatic
    English and best reflects the direct address.
- source_word: ὕπαγε
  chosen: go
  alternatives:
  - go away
  - be on your way
  lexicon: BDAG
  rationale: Common imperative of departure. 'Go' is sufficient and avoids adding
    nuance not required by the context.
- source_word: ὅσα ἔχεις
  chosen: whatever you have
  alternatives:
  - all that you have
  - what you possess
  lexicon: BDAG
  rationale: The relative expression can mean 'whatever/all that you have.' 'Whatever
    you have' closely follows the Greek wording while remaining natural. The command
    still clearly encompasses his possessions in full context.
- source_word: πώλησον
  chosen: sell
  alternatives:
  - sell off
  lexicon: BDAG
  rationale: Aorist imperative with straightforward commercial sense. 'Sell' is the
    plain equivalent.
- source_word: δὸς τοῖς πτωχοῖς
  chosen: give to the poor
  alternatives:
  - give to poor people
  - give to the needy
  lexicon: BDAG
  rationale: πτωχοῖς refers to poor persons. 'The poor' is standard English for this
    substantival adjective and preserves the social category in view.
- source_word: θησαυρὸν ἐν οὐρανῷ
  chosen: treasure in heaven
  alternatives:
  - treasure in the heavens
  - a treasure in heaven
  lexicon: BDAG
  rationale: Traditional and accurate rendering. The anarthrous noun in English need
    not be marked with 'a' in this construction; 'have treasure in heaven' is idiomatic
    and matches the sense of heavenly reward.
- source_word: δεῦρο
  chosen: come
  alternatives:
  - come here
  lexicon: BDAG
  rationale: Imperatival adverb inviting movement toward the speaker. 'Come' is idiomatic
    in English; 'here' is implied and need not be made explicit.
- source_word: ἀκολούθει μοι
  chosen: follow me
  alternatives:
  - come after me
  - be following me
  lexicon: BDAG
  rationale: Present imperative likely carries ongoing discipleship force, but standard
    English 'follow me' adequately conveys the summons without awkwardness. The durative
    nuance is inherent in the discipleship context.
