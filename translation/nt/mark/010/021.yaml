theological_decisions:
- issue: Meaning of Jesus' love toward the man
  chosen_reading: 'Rendered straightforwardly as a genuine expression of love: ''loved
    him.'''
  alternative_readings:
  - understood merely as outward kindness
  - understood as covenantal/electing love in a technical theological sense
  rationale: The verse explicitly states ἠγάπησεν αὐτόν. The translation should neither
    weaken this to mere politeness nor load it with a later doctrinal system beyond
    what the text itself says. This preserves the text's emotional and theological
    tension.
  doctrine_reference: Affirmations; Translation philosophy §3
- issue: Scope of the command regarding possessions
  chosen_reading: The wording preserves the comprehensive force of Jesus' command
    without paraphrastic expansion.
  alternative_readings:
  - explicitly interpret as 'sell all you own'
  - soften to a general call to generosity
  rationale: ὅσα ἔχεις naturally points to the man's possessions comprehensively in
    context. The translation keeps the command strong while staying close to the Greek
    wording.
  doctrine_reference: Translation philosophy §1, §3
