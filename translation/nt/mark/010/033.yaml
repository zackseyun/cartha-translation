theological_decisions:
- issue: Rendering of ὁ υἱὸς τοῦ ἀνθρώπου
  chosen_reading: the Son of Man
  alternative_readings:
  - the Human One
  rationale: The traditional literal rendering best preserves the Greek wording, its
    Danielic resonance, and the christological self-designation without interpretive
    flattening.
  doctrine_reference: Affirmations; Translation philosophy §§2–3
- issue: Rendering of τοῖς ἔθνεσιν
  chosen_reading: the Gentiles
  alternative_readings:
  - the nations
  rationale: The immediate passion context points to Jesus being transferred from
    Jewish leaders to non-Jewish rulers. This preserves the historical distinction
    without importing broader theological claims.
  doctrine_reference: Translation philosophy §§1, 5
