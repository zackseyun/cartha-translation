id: MRK.10.33
reference: Mark 10:33
source:
  edition: SBLGNT
  text: ὅτι Ἰδοὺ ἀναβαίνομεν εἰς Ἱεροσόλυμα, καὶ ὁ υἱὸς τοῦ ἀνθρώπου παραδοθήσεται
    τοῖς ἀρχιερεῦσιν καὶ ⸀τοῖς γραμματεῦσιν, καὶ κατακρινοῦσιν αὐτὸν θανάτῳ καὶ παραδώσουσιν
    αὐτὸν τοῖς ἔθνεσιν
translation:
  text: that, ‘Look, we are going up to Jerusalem, and the Son of Man will be handed
    over to the chief priests and the scribes, and they will condemn him to death
    and hand him over to the Gentiles.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "delivered over" in both occurrences of the verb παραδίδωμι.
    reason: lexical_alternative
  - marker: b
    text: Or "to the nations" for "to the Gentiles."
    reason: alternative_reading
lexical_decisions:
- source_word: ὅτι
  chosen: that
  alternatives:
  - for
  - because
  lexicon: BDAG
  rationale: Introduces the content of Jesus' statement in continuation from the previous
    verse. 'That' best fits English reported speech here without adding causal force.
- source_word: Ἰδοὺ
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: BDAG
  rationale: A discourse marker drawing attention. 'Look' is natural modern English
    and preserves the emphatic alerting force better than the archaic 'Behold.'
- source_word: ἀναβαίνομεν
  chosen: we are going up
  alternatives:
  - we go up
  - we are ascending
  lexicon: BDAG
  rationale: Present tense with movement toward Jerusalem; 'going up' is the idiomatic
    and geographically appropriate rendering in context.
- source_word: εἰς Ἱεροσόλυμα
  chosen: to Jerusalem
  alternatives:
  - into Jerusalem
  lexicon: BDAG
  rationale: Standard destination sense of εἰς with a city name; 'to Jerusalem' is
    idiomatic English.
- source_word: ὁ υἱὸς τοῦ ἀνθρώπου
  chosen: the Son of Man
  lexicon: BDAG
  rationale: Established translation of the self-designation, preserving both the
    literal wording and its theological resonance. It should be translated, not paraphrased.
- source_word: παραδοθήσεται
  chosen: will be handed over
  alternatives:
  - will be delivered over
  - will be betrayed
  lexicon: BDAG
  rationale: The passive of παραδίδωμι here denotes being given into others' power.
    'Handed over' is broad enough to preserve the judicial sequence without prematurely
    narrowing to 'betrayed,' which would over-specify the agent.
- source_word: τοῖς ἀρχιερεῦσιν
  chosen: to the chief priests
  alternatives:
  - to the high priests
  lexicon: BDAG
  rationale: Conventional and accurate rendering for the leading priestly authorities
    as a group, not a single high priest.
- source_word: τοῖς γραμματεῦσιν
  chosen: the scribes
  alternatives:
  - the teachers of the law
  lexicon: BDAG
  rationale: '''Scribes'' is the direct lexical equivalent and remains understandable
    in modern English. The alternative is interpretive and more expansive than the
    Greek term itself.'
- source_word: κατακρινοῦσιν
  chosen: they will condemn
  alternatives:
  - they will sentence
  lexicon: BDAG
  rationale: Expresses formal adverse judgment. 'Condemn' preserves the judicial and
    moral weight of the verb.
- source_word: θανάτῳ
  chosen: to death
  alternatives:
  - with death
  lexicon: BDAG
  rationale: Dative complement after κατακρίνω is idiomatically rendered 'condemn
    to death' in English.
- source_word: παραδώσουσιν
  chosen: hand ... over
  alternatives:
  - deliver ... over
  lexicon: BDAG
  rationale: Using the same English gloss as the earlier παραδοθήσεται preserves the
    repeated Greek verb and the narrative chain of transfer.
- source_word: τοῖς ἔθνεσιν
  chosen: to the Gentiles
  alternatives:
  - to the nations
  lexicon: BDAG
  rationale: In this context the reference is to non-Jewish authorities, not nations
    in the abstract. 'Gentiles' best captures the historical and covenantal distinction.
