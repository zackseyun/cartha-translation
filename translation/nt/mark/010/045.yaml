id: MRK.10.45
reference: Mark 10:45
source:
  edition: SBLGNT
  text: καὶ γὰρ ὁ υἱὸς τοῦ ἀνθρώπου οὐκ ἦλθεν διακονηθῆναι ἀλλὰ διακονῆσαι καὶ δοῦναι
    τὴν ψυχὴν αὐτοῦ λύτρον ἀντὶ πολλῶν.
translation:
  text: For even the Son of Man did not come to be served, but to serve, and to give
    his life as a ransom for many.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "as a ransom in place of many." The preposition behind "for" can carry
      the sense of substitution or exchange.
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ γὰρ
  chosen: For even
  alternatives:
  - For
  - Indeed even
  - Because even
  lexicon: BDAG
  rationale: The combination is explanatory and emphatic, grounding the preceding
    teaching. 'For even' preserves both the inferential force of γάρ and the emphasis
    of καί in natural English.
- source_word: ὁ υἱὸς τοῦ ἀνθρώπου
  chosen: the Son of Man
  alternatives:
  - the Human One
  lexicon: BDAG
  rationale: This is Jesus' established self-designation with strong Danielic resonance.
    'The Son of Man' preserves the title's traditional and intertextual force better
    than a more interpretive rendering.
- source_word: οὐκ ἦλθεν
  chosen: did not come
  alternatives:
  - did not come here
  - did not arrive
  lexicon: BDAG
  rationale: A straightforward rendering of the aorist verb of coming, expressing
    purpose in relation to the following infinitives.
- source_word: διακονηθῆναι
  chosen: to be served
  alternatives:
  - to be ministered to
  lexicon: BDAG
  rationale: '''Served'' is clear modern English and matches the active infinitive
    διακονῆσαι later in the verse. ''Ministered to'' is more ecclesiastical and less
    natural here.'
- source_word: ἀλλὰ διακονῆσαι
  chosen: but to serve
  alternatives:
  - but to minister
  lexicon: BDAG
  rationale: The contrast with 'to be served' is best preserved by repeating the same
    English root. This keeps the rhetorical reversal clear.
- source_word: δοῦναι
  chosen: to give
  alternatives:
  - to hand over
  lexicon: BDAG
  rationale: The basic sense 'to give' fits the idiom and avoids importing a narrower
    nuance not explicit in the verb itself.
- source_word: τὴν ψυχὴν αὐτοῦ
  chosen: his life
  alternatives:
  - his soul
  - his self
  lexicon: BDAG
  rationale: In this context ψυχή refers to one's life given up unto death, not merely
    the immaterial soul. 'His life' is the most natural and contextually accurate
    English rendering.
- source_word: λύτρον
  chosen: a ransom
  alternatives:
  - the price of release
  - redemption price
  lexicon: BDAG
  rationale: '''Ransom'' is the standard and most concise rendering for λύτρον, conveying
    the idea of a price paid for release. It preserves the term''s theological weight
    without over-paraphrase.'
- source_word: ἀντὶ πολλῶν
  chosen: for many
  alternatives:
  - in place of many
  - instead of many
  - on behalf of many
  lexicon: BDAG
  rationale: ἀντί carries a substitutionary sense, but 'for many' is idiomatic English
    and traditional. Because English 'for' can underrepresent the force of ἀντί, the
    stronger alternative is preserved in a footnote.
