theological_decisions:
- issue: Force of ἀντί in the ransom saying
  chosen_reading: Render idiomatically as 'for many' in the main text while preserving
    the more explicit substitutional nuance in a footnote.
  alternative_readings:
  - in place of many
  - instead of many
  - on behalf of many
  rationale: The preposition ἀντί most naturally signals exchange or substitution.
    The main text keeps readable English and familiar phrasing, while the footnote
    makes the stronger lexical force auditable without overloading the line.
  doctrine_reference: Preserve theological tension rather than resolve it.
