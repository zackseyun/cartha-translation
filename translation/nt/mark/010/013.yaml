theological_decisions:
- issue: Referent of the disciples' rebuke
  chosen_reading: The disciples rebuked the people who were bringing the children.
  alternative_readings:
  - The disciples rebuked the children.
  rationale: The nearest and most coherent antecedent in context is the implied subject
    of προσέφερον ('they were bringing'), not παιδία. This also aligns with the narrative
    flow and the following verse, where Jesus responds to the disciples' hindering
    behavior.
