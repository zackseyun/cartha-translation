id: MRK.10.13
reference: Mark 10:13
source:
  edition: SBLGNT
  text: Καὶ προσέφερον αὐτῷ παιδία ἵνα ⸂αὐτῶν ἅψηται⸃· οἱ δὲ μαθηταὶ ⸂ἐπετίμησαν αὐτοῖς⸃.
translation:
  text: And they were bringing children to him so that he might touch them, but the
    disciples rebuked them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'little children.' The Greek παιδία can refer to children broadly, including
      young children.
    reason: lexical_alternative
lexical_decisions:
- source_word: προσέφερον
  chosen: were bringing
  alternatives:
  - brought
  - were bringing to
  lexicon: BDAG
  rationale: Imperfect tense indicates ongoing or repeated action in past time; 'were
    bringing' preserves the aspect better than simple 'brought.' The sense of προσφέρω
    here is to bring or present someone to another person.
- source_word: παιδία
  chosen: children
  alternatives:
  - little children
  - infants
  - young children
  lexicon: BDAG
  rationale: παιδία broadly denotes children. 'Children' is the most natural and sufficiently
    broad rendering here. 'Little children' is possible from context, but the diminutive
    nuance is not explicit in the noun itself in this verse and can be overstated
    if made primary.
- source_word: ἵνα αὐτῶν ἅψηται
  chosen: so that he might touch them
  alternatives:
  - that he might touch them
  - so that he might lay his hands on them
  lexicon: BDAG
  rationale: ἵνα with the subjunctive expresses purpose. ἅπτομαι means 'touch' or
    'take hold of.' 'Touch them' is the direct lexical sense and avoids importing
    the fuller gesture of hand-laying from parallel passages into this verse.
- source_word: ἐπετίμησαν
  chosen: rebuked
  alternatives:
  - scolded
  - warned sternly
  - censured
  lexicon: BDAG
  rationale: ἐπιτιμάω commonly means to rebuke or reprove sharply. 'Rebuked' is the
    standard, clear English equivalent and preserves the force without colloquial
    flattening.
- source_word: αὐτοῖς
  chosen: them
  alternatives:
  - the people bringing them
  - those who were bringing them
  lexicon: BDAG
  rationale: The dative pronoun most naturally refers to the people who were bringing
    the children, not the children themselves. English 'them' preserves the pronoun
    while allowing the antecedent to be inferred from context.
- source_word: δὲ
  chosen: but
  alternatives:
  - and
  - now
  lexicon: BDAG
  rationale: δέ marks a mild contrast between the action of those bringing the children
    and the disciples' response. 'But' communicates that contrast naturally in English.
