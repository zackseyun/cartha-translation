theological_decisions:
- issue: Whether to include the longer reading 'for those who trust in riches' after
    'how difficult it is'
  chosen_reading: 'Follow the SBLGNT shorter reading: ''how difficult it is to enter
    the kingdom of God'''
  alternative_readings:
  - '''Children, how difficult it is for those who trust in riches to enter the kingdom
    of God'''
  rationale: The provided source text is the shorter reading, which is well attested
    and avoids importing an explanatory expansion into the main text. Because the
    longer reading is familiar from the Byzantine/Textus Receptus tradition and affects
    interpretation by narrowing the statement, it should be preserved in a footnote
    as a textual variant.
  doctrine_reference: Translation philosophy §1 (original-language primacy) and §3
    (preserve tension rather than resolve it)
