id: MRK.10.24
reference: Mark 10:24
source:
  edition: SBLGNT
  text: οἱ δὲ μαθηταὶ ἐθαμβοῦντο ἐπὶ τοῖς λόγοις αὐτοῦ. ὁ δὲ Ἰησοῦς πάλιν ἀποκριθεὶς
    λέγει αὐτοῖς· Τέκνα, πῶς δύσκολόν ⸀ἐστιν εἰς τὴν βασιλείαν τοῦ θεοῦ εἰσελθεῖν·
translation:
  text: But the disciples were astonished at his words. Jesus answered again and said
    to them, “Children, how difficult it is to enter the kingdom of God!”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Some manuscripts read, 'Children, how difficult it is for those who trust
      in riches to enter the kingdom of God.'
    reason: textual_variant
lexical_decisions:
- source_word: ἐθαμβοῦντο
  chosen: were astonished
  alternatives:
  - were amazed
  - were shocked
  lexicon: BDAG
  rationale: Imperfect middle/passive indicates an ongoing reaction of astonishment.
    'Were astonished' is natural modern English and preserves the strength of the
    verb without overstating it.
- source_word: ἐπὶ τοῖς λόγοις αὐτοῦ
  chosen: at his words
  alternatives:
  - at what he said
  - because of his words
  lexicon: BDAG
  rationale: The preposition ἐπί with the dative here marks the basis/object of their
    astonishment. 'At his words' is concise and close to the Greek; 'what he said'
    is possible but slightly more interpretive.
- source_word: πάλιν
  chosen: again
  alternatives:
  - in reply again
  - once more
  lexicon: BDAG
  rationale: πάλιν signals repetition or renewed speech. 'Again' preserves the discourse
    flow simply and accurately.
- source_word: ἀποκριθεὶς λέγει
  chosen: answered again and said
  alternatives:
  - answered and said
  - responded and said
  lexicon: BDAG
  rationale: This is a common Semitic-influenced narrative expression. Retaining both
    verbs reflects the Greek without becoming too wooden. 'Answered again and said'
    also preserves πάλιν in natural English order.
- source_word: Τέκνα
  chosen: Children
  alternatives:
  - Childen, dear children
  - my children
  lexicon: BDAG
  rationale: τέκνα is a warm direct address meaning 'children.' 'Children' preserves
    the familial tenderness without adding possessive language not present in the
    Greek. This is preferable to 'sons' or 'little children' here.
- source_word: πῶς δύσκολόν ἐστιν
  chosen: how difficult it is
  alternatives:
  - how hard it is
  - it is difficult
  lexicon: BDAG
  rationale: The exclamatory πῶς intensifies the statement. 'How difficult it is'
    captures both the exclamation and the predicate adjective δύσκολον in readable
    English.
- source_word: εἰς τὴν βασιλείαν τοῦ θεοῦ εἰσελθεῖν
  chosen: to enter the kingdom of God
  alternatives:
  - to enter into the kingdom of God
  lexicon: BDAG
  rationale: This infinitival clause expresses the content of what is difficult. 'Enter
    the kingdom of God' is standard, clear English; adding 'into' is unnecessary in
    modern style.
