id: MRK.10.28
reference: Mark 10:28
source:
  edition: SBLGNT
  text: Ἤρξατο ⸂λέγειν ὁ Πέτρος⸃ αὐτῷ· Ἰδοὺ ἡμεῖς ἀφήκαμεν πάντα καὶ ⸀ἠκολουθήκαμέν
    σοι.
translation:
  text: Peter began to say to him, “Look, we have left everything and followed you.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “See” or “Behold.”
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἤρξατο
  chosen: began
  alternatives:
  - started
  lexicon: BDAG
  rationale: Aorist middle of ἄρχω with complementary infinitive λέγειν idiomatically
    means 'began.' 'Started' is possible but less natural in this narrative register.
- source_word: λέγειν
  chosen: to say
  alternatives:
  - to speak
  lexicon: BDAG
  rationale: With Ἤρξατο, the infinitive is best rendered 'to say.' 'To speak' is
    broader and less fitting for the direct quotation that follows.
- source_word: ὁ Πέτρος
  chosen: Peter
  rationale: Personal name is transliterated by standard convention per translation
    philosophy.
- source_word: αὐτῷ
  chosen: to him
  alternatives:
  - to Jesus
  lexicon: BDAG
  rationale: The dative pronoun refers to Jesus from context. The translation keeps
    the pronoun rather than supplying 'Jesus,' since the Greek does not repeat the
    name here.
- source_word: Ἰδοὺ
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: BDAG
  rationale: ἰδού is a discourse marker drawing attention. 'Look' preserves the force
    in readable modern English; 'Behold' is too archaic, while 'See' is slightly less
    idiomatic here.
- source_word: ἡμεῖς
  chosen: we
  alternatives:
  - we ourselves
  lexicon: BDAG
  rationale: The explicit pronoun adds emphasis, but English can convey this naturally
    without an overly heavy 'we ourselves.' The emphasis is sufficiently carried by
    word order and context with 'Look, we...'.
- source_word: ἀφήκαμεν
  chosen: have left
  alternatives:
  - left
  - forsaken
  lexicon: BDAG
  rationale: The aorist is rendered with English present perfect for natural idiom
    in a statement about a past action with present relevance. 'Forsaken' overstates
    the tone in contemporary English.
- source_word: πάντα
  chosen: everything
  alternatives:
  - all things
  - all
  lexicon: BDAG
  rationale: Neuter plural πάντα here refers comprehensively to possessions and prior
    attachments. 'Everything' is idiomatic and clear in modern English.
- source_word: ἠκολουθήκαμέν
  chosen: followed
  alternatives:
  - have followed
  lexicon: BDAG
  rationale: The perfect of ἀκολουθέω denotes an action undertaken with continuing
    significance. English simple past after 'have left' yields a natural coordinated
    expression ('have left everything and followed you') without obscuring the sense.
    'Have followed' is also possible but sounds slightly heavier in English style
    here.
- source_word: σοι
  chosen: you
  alternatives:
  - you personally
  lexicon: BDAG
  rationale: Dative object of ἀκολουθέω is straightforwardly rendered 'you.' No additional
    emphasis is required in English.
