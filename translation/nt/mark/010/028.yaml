theological_decisions:
- issue: Rendering of Peter's claim about discipleship sacrifice
  chosen_reading: Translate the statement straightforwardly as Peter's own claim without
    endorsing or softening it.
  alternative_readings:
  - Render with added nuance such as 'we have given up everything'
  - Paraphrase to anticipate Jesus' response
  rationale: The verse records Peter's emphatic statement, not a narrator's theological
    evaluation. The translation preserves the claim as spoken and does not import
    interpretive commentary.
  doctrine_reference: Preserve theological tension rather than resolve it.
