theological_decisions:
- issue: Nature of Moses' instruction in the divorce law
  chosen_reading: Moses permitted divorce rather than positively commanding it
  alternative_readings:
  - Moses commanded a man to write a certificate of divorce
  rationale: The verb Ἐπέτρεψεν explicitly states permission. This is important in
    the immediate context, where Jesus distinguishes concession due to hardness of
    heart from God's creational intention. The translation therefore preserves 'permitted'
    and does not flatten it into 'commanded.'
  doctrine_reference: Translation philosophy §1, §3
