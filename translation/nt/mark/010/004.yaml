id: MRK.10.4
reference: Mark 10:4
source:
  edition: SBLGNT
  text: οἱ δὲ εἶπαν· ⸂Ἐπέτρεψεν Μωϋσῆς⸃ βιβλίον ἀποστασίου γράψαι καὶ ἀπολῦσαι.
translation:
  text: They said, “Moses permitted us to write a certificate of divorce and send
    her away.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a bill of divorce.' The Greek phrase refers to a written legal document
      of divorce.
    reason: lexical_alternative
  - marker: b
    text: Or 'and divorce her.' Literally, 'and send away,' used here in the context
      of divorce.
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ δὲ εἶπαν
  chosen: They said
  alternatives:
  - And they said
  - But they said
  lexicon: BDAG
  rationale: The nominative article functions substantivally for the previously mentioned
    interlocutors (the Pharisees). δέ marks continuation or mild contrast; in natural
    English the sense is adequately conveyed by simply introducing their reply as
    'They said,' though 'And' or 'But' are possible.
- source_word: Ἐπέτρεψεν
  chosen: permitted
  alternatives:
  - allowed
  - authorized
  lexicon: BDAG
  rationale: ἐπιτρέπω means to permit or allow. 'Permitted' preserves the legal nuance
    and matches the contrast in the context between concession and command better
    than a looser rendering.
- source_word: Μωϋσῆς
  chosen: Moses
  lexicon: BDAG
  rationale: Standard English transliteration of the personal name.
- source_word: βιβλίον ἀποστασίου
  chosen: a certificate of divorce
  alternatives:
  - a bill of divorce
  - a document of divorce
  - a certificate of dismissal
  lexicon: BDAG
  rationale: This phrase refers to the written legal document specified in Deuteronomy
    24:1. 'Certificate of divorce' is clear modern English and preserves the formal
    legal sense better than the archaic 'bill of divorce.'
- source_word: γράψαι
  chosen: to write
  alternatives:
  - to draft
  lexicon: BDAG
  rationale: γράψαι is the aorist infinitive of γράφω, straightforwardly meaning 'to
    write.' 'Draft' would over-specify the action.
- source_word: καὶ ἀπολῦσαι
  chosen: and send her away
  alternatives:
  - and divorce her
  - and dismiss her
  lexicon: BDAG
  rationale: ἀπολύω in this marital context means to dismiss or divorce a wife. 'Send
    her away' preserves the verbal imagery and reflects the idiom behind the legal
    act, while the preceding 'certificate of divorce' already makes the marital context
    explicit. The object 'her' is supplied in English because the context is divorce
    of a wife, though it is not repeated explicitly in Greek.
