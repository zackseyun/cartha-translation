id: MRK.10.19
reference: Mark 10:19
source:
  edition: SBLGNT
  text: τὰς ἐντολὰς οἶδας· Μὴ ⸂φονεύσῃς, Μὴ μοιχεύσῃς⸃, Μὴ κλέψῃς, Μὴ ψευδομαρτυρήσῃς,
    Μὴ ἀποστερήσῃς, Τίμα τὸν πατέρα σου καὶ τὴν μητέρα.
translation:
  text: 'You know the commandments: Do not murder, do not commit adultery, do not
    steal, do not bear false witness, do not defraud, honor your father and mother.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Do not kill.' The Greek verb here more specifically denotes murder or
      unlawful killing, so 'murder' is preferred.
    reason: lexical_alternative
  - marker: b
    text: '''Do not defraud'' may also be rendered ''Do not deprive'' or ''Do not
      rob.'' The term refers to withholding what is rightfully another''s, often by
      exploitation.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐντολάς
  chosen: commandments
  alternatives:
  - commands
  lexicon: BDAG
  rationale: '''Commandments'' best fits the clear allusion to the Decalogue and matches
    standard English for covenantal moral injunctions.'
- source_word: οἶδας
  chosen: you know
  alternatives:
  - you have known
  - you are acquainted with
  lexicon: BDAG
  rationale: Perfect-form οἶδα functions with present sense in Koine; 'you know' is
    the natural English equivalent.
- source_word: Μὴ φονεύσῃς
  chosen: Do not murder
  alternatives:
  - Do not kill
  lexicon: BDAG
  rationale: φονεύω refers more specifically to unlawful killing or murder, not killing
    in the broadest sense. 'Murder' is more precise and better reflects the commandment's
    sense.
- source_word: Μὴ μοιχεύσῃς
  chosen: do not commit adultery
  alternatives:
  - do not adulterate marriage
  - do not be unfaithful sexually
  lexicon: BDAG
  rationale: The idiomatic English rendering of μοιχεύω in legal-moral contexts is
    'commit adultery.'
- source_word: Μὴ κλέψῃς
  chosen: do not steal
  lexicon: BDAG
  rationale: Standard and precise rendering of κλέπτω in a commandment list.
- source_word: Μὴ ψευδομαρτυρήσῃς
  chosen: do not bear false witness
  alternatives:
  - do not testify falsely
  - do not lie in testimony
  lexicon: BDAG
  rationale: This preserves the legal-testimonial nuance of ψευδομαρτυρέω and echoes
    the Decalogue wording more closely than the broader 'do not lie.'
- source_word: Μὴ ἀποστερήσῃς
  chosen: do not defraud
  alternatives:
  - do not deprive
  - do not rob
  lexicon: BDAG
  rationale: ἀποστερέω commonly means to deprive someone of what is rightfully theirs,
    often by exploitation or fraud. 'Defraud' captures the economic-ethical nuance
    better than the broader 'deprive.'
- source_word: Τίμα
  chosen: honor
  alternatives:
  - respect
  lexicon: BDAG
  rationale: τιμάω in this commandment context carries the stronger covenantal sense
    'honor,' not merely 'respect.'
- source_word: τὸν πατέρα σου καὶ τὴν μητέρα
  chosen: your father and mother
  alternatives:
  - your father and your mother
  lexicon: BDAG
  rationale: Natural English preserves the paired parental reference without unnecessary
    repetition, while retaining the direct allusion to the commandment.
