theological_decisions:
- issue: Rendering of Decalogue citations/allusions
  chosen_reading: Use familiar commandment-style English while following the Greek's
    lexical specificity
  alternative_readings:
  - Use more traditional but less precise 'Do not kill'
  - Use freer contemporary paraphrase
  rationale: The verse is a list of commandments, so recognizable commandment diction
    should be preserved. At the same time, optimal equivalence favors lexical precision
    where traditional English can mislead, especially φονεύω as 'murder' and ἀποστερέω
    as 'defraud.'
  doctrine_reference: Translation philosophy §§1, 5, 6
