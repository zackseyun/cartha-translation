theological_decisions:
- issue: Nature of the promised recompense in the present age
  chosen_reading: Render the list of houses, family relations, and fields straightforwardly
    as real present-age recompense, while retaining 'with persecutions' to preserve
    the tension of blessing amid suffering.
  alternative_readings:
  - Soften the promise into purely spiritual blessings
  - Emphasize material prosperity apart from suffering
  rationale: The Greek presents both abundant present recompense and ongoing persecution.
    The translation should not resolve this tension toward either prosperity teaching
    or purely metaphorical reduction.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
- issue: Gender rendering of familial terms
  chosen_reading: Translate ἀδελφοὺς and ἀδελφὰς separately as 'brothers and sisters.'
  alternative_readings:
  - Render ἀδελφοὺς generically as 'siblings'
  rationale: The Greek explicitly distinguishes male and female siblings here, so
    English should preserve that distinction rather than collapse it into a gender-neutral
    collective.
  doctrine_reference: 'Translation philosophy §4: Gender-accurate over gender-neutral.'
