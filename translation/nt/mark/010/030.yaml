id: MRK.10.30
reference: Mark 10:30
source:
  edition: SBLGNT
  text: ἐὰν μὴ λάβῃ ἑκατονταπλασίονα νῦν ἐν τῷ καιρῷ τούτῳ οἰκίας καὶ ἀδελφοὺς καὶ
    ἀδελφὰς καὶ ⸀μητέρας καὶ τέκνα καὶ ἀγροὺς μετὰ διωγμῶν, καὶ ἐν τῷ αἰῶνι τῷ ἐρχομένῳ
    ζωὴν αἰώνιον.
translation:
  text: who will not receive a hundred times as much now in this time—houses and brothers
    and sisters and mothers and children and fields, with persecutions—and in the
    age to come, eternal life.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a hundredfold.'
    reason: lexical_alternative
  - marker: b
    text: Or 'in the coming age.'
    reason: lexical_alternative
lexical_decisions:
- source_word: λάβῃ
  chosen: receive
  alternatives:
  - take
  - get
  lexicon: BDAG
  rationale: In this promise context, 'receive' best conveys what is given in return,
    rather than an act of taking. It fits the future-reward sense in English while
    remaining close to λαμβάνω.
- source_word: ἑκατονταπλασίονα
  chosen: a hundred times as much
  alternatives:
  - a hundredfold
  - a hundred times more
  lexicon: BDAG
  rationale: The adjective denotes a hundredfold return. 'A hundred times as much'
    is clear modern English and preserves the quantitative force without archaic phrasing.
- source_word: νῦν ἐν τῷ καιρῷ τούτῳ
  chosen: now in this time
  alternatives:
  - now in this present time
  - now at this time
  lexicon: BDAG
  rationale: This phrase emphasizes present-era recompense, contrasted with 'the age
    to come.' 'Now in this time' keeps the temporal contrast explicit and fairly literal.
- source_word: οἰκίας
  chosen: houses
  alternatives:
  - homes
  lexicon: BDAG
  rationale: '''Houses'' is the more direct lexical equivalent and preserves the concrete
    plural imagery of material and communal provision.'
- source_word: ἀδελφοὺς
  chosen: brothers
  alternatives:
  - brothers and sisters
  - siblings
  lexicon: BDAG
  rationale: Because ἀδελφὰς follows separately, ἀδελφοὺς here should be rendered
    specifically as 'brothers,' not inclusively. This preserves the source's gender
    distinction.
- source_word: ἀδελφὰς
  chosen: sisters
  lexicon: BDAG
  rationale: Direct lexical equivalent; paired with 'brothers' to reflect the explicit
    listing in Greek.
- source_word: μητέρας
  chosen: mothers
  lexicon: BDAG
  rationale: Direct lexical equivalent. The plural is retained as part of the communal/familial
    recompense imagery.
- source_word: τέκνα
  chosen: children
  alternatives:
  - sons and daughters
  lexicon: BDAG
  rationale: τέκνα is the broad term 'children,' not specifically sons. 'Children'
    preserves the inclusive sense without over-specification.
- source_word: ἀγρούς
  chosen: fields
  alternatives:
  - lands
  - farms
  lexicon: BDAG
  rationale: ἀγρός commonly denotes a field or piece of cultivated land. 'Fields'
    is concrete and natural; 'lands' is possible but less precise here.
- source_word: μετὰ διωγμῶν
  chosen: with persecutions
  alternatives:
  - along with persecutions
  lexicon: BDAG
  rationale: 'This phrase is important and should remain explicit: present blessings
    do not exclude suffering. ''With persecutions'' is concise and preserves the force
    of μετά with the genitive.'
- source_word: ἐν τῷ αἰῶνι τῷ ἐρχομένῳ
  chosen: in the age to come
  alternatives:
  - in the coming age
  - in the world to come
  lexicon: BDAG
  rationale: αἰών here refers to an age or era, not merely the physical world. 'The
    age to come' is a standard, accurate rendering that preserves Jewish eschatological
    contrast with 'this time.'
- source_word: ζωὴν αἰώνιον
  chosen: eternal life
  alternatives:
  - life of the age
  lexicon: BDAG
  rationale: This is the established and accurate rendering in context. While literally
    connected to αἰών, 'eternal life' best communicates the idiomatic eschatological
    sense in English.
