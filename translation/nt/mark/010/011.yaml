theological_decisions:
- issue: Whether to preserve the force of ἐπ’ αὐτήν as indicating wrong done to the
    wife
  chosen_reading: Rendered 'commits adultery against her'
  alternative_readings:
  - commits adultery
  - commits adultery with another
  rationale: The phrase ἐπ’ αὐτήν is present in the Greek and should not be flattened
    away. Retaining 'against her' preserves the text's emphasis that the husband's
    action is an offense against his wife.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Generic masculine formulation
  chosen_reading: Rendered 'Whoever' rather than 'Any man who'
  alternative_readings:
  - Any man who
  rationale: Although the grammar is masculine singular, the English indefinite 'whoever'
    accurately conveys the generic conditional construction without unnecessary narrowing.
    The immediate referent in context is a husband, which remains explicit in 'his
    wife.'
  doctrine_reference: Translation philosophy §4
