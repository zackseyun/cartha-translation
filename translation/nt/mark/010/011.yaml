id: MRK.10.11
reference: Mark 10:11
source:
  edition: SBLGNT
  text: καὶ λέγει αὐτοῖς· Ὃς ⸀ἂν ἀπολύσῃ τὴν γυναῖκα αὐτοῦ καὶ γαμήσῃ ἄλλην μοιχᾶται
    ἐπ’ αὐτήν,
translation:
  text: And he says to them, “Whoever divorces his wife and marries another commits
    adultery against her.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more explicitly, “marries another woman.”
    reason: lexical_alternative
lexical_decisions:
- source_word: λέγει
  chosen: says
  alternatives:
  - said
  lexicon: BDAG
  rationale: Rendered as present-tense 'says' to reflect the Greek historical present,
    a common Markan narrative feature, while remaining natural in English.
- source_word: αὐτοῖς
  chosen: to them
  lexicon: BDAG
  rationale: Dative pronoun naturally rendered as indirect object 'to them.'
- source_word: Ὃς ἂν
  chosen: Whoever
  alternatives:
  - Anyone who
  - Who if ever
  lexicon: BDAG
  rationale: The relative pronoun with ἄν introduces an indefinite general condition;
    'Whoever' is concise and idiomatic English.
- source_word: ἀπολύσῃ
  chosen: divorces
  alternatives:
  - sends away
  - dismisses
  lexicon: BDAG
  rationale: In this marital context, ἀπολύω refers specifically to divorce rather
    than a generic sending away. 'Divorces' makes the legal-relational sense explicit
    in contemporary English.
- source_word: τὴν γυναῖκα αὐτοῦ
  chosen: his wife
  alternatives:
  - his woman
  lexicon: BDAG
  rationale: γυνή can mean 'woman' or 'wife'; the possessive and divorce context require
    'wife.'
- source_word: γαμήσῃ ἄλλην
  chosen: marries another
  alternatives:
  - marries another woman
  lexicon: BDAG
  rationale: ἄλλην is feminine and implies another woman/wife. English idiom allows
    'another' after 'marries'; this is natural without losing meaning.
- source_word: μοιχᾶται
  chosen: commits adultery
  alternatives:
  - is committing adultery
  - adulterates
  lexicon: BDAG
  rationale: Standard and clear rendering of the middle/passive-form verb in this
    context. English uses the active idiom 'commits adultery.'
- source_word: ἐπ’ αὐτήν
  chosen: against her
  alternatives:
  - with respect to her
  - against the first wife
  lexicon: BDAG
  rationale: ἐπί with the accusative here conveys direction/reference against the
    woman divorced. 'Against her' preserves the force that the act wrongs her, not
    merely that adultery occurs in general.
