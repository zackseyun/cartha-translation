id: MRK.10.36
reference: Mark 10:36
source:
  edition: SBLGNT
  text: ὁ δὲ εἶπεν αὐτοῖς· Τί θέλετε ⸀ποιήσω ὑμῖν;
translation:
  text: And he said to them, “What do you want me to do for you?”
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ὁ δὲ
  chosen: And he
  alternatives:
  - But he
  - Then he
  lexicon: BDAG
  rationale: The article with δέ functions idiomatically to continue the narrative
    with the subject understood. 'And he' gives natural English narrative flow while
    preserving the connective force without overemphasizing contrast.
- source_word: εἶπεν
  chosen: said
  alternatives:
  - asked
  lexicon: BDAG
  rationale: λέγω here is the standard verb of speaking. Although the content is a
    question, 'said' is the more direct lexical equivalent; the interrogative content
    itself conveys that he is asking.
- source_word: αὐτοῖς
  chosen: to them
  alternatives:
  - to them both
  lexicon: BDAG
  rationale: The dative plural pronoun is straightforwardly rendered 'to them.' Although
    the immediate context identifies James and John, the Greek does not explicitly
    add 'both,' so it is not supplied in the main text.
- source_word: Τί
  chosen: What
  alternatives:
  - What is it that
  lexicon: BDAG
  rationale: The neuter interrogative introduces the content question directly. 'What'
    is the plain and natural equivalent.
- source_word: θέλετε
  chosen: do you want
  alternatives:
  - do you wish
  - are you wanting
  lexicon: BDAG
  rationale: θέλω commonly denotes desire or wish. 'Do you want' is idiomatic modern
    English and fits the directness of the exchange.
- source_word: ποιήσω
  chosen: me to do
  alternatives:
  - that I should do
  - me to make
  lexicon: BDAG
  rationale: 'The aorist subjunctive after θέλετε expresses the action desired: ''what
    do you want me to do.'' English commonly supplies ''me to'' to represent the infinitival
    sense required by idiom. ''Do'' fits ποιέω in this context better than ''make.'''
- source_word: ὑμῖν
  chosen: for you
  alternatives:
  - to you
  lexicon: BDAG
  rationale: The dative here is best rendered as benefactive, 'for you,' since Jesus
    is asking what action they want him to perform on their behalf.
