id: MRK.10.18
reference: Mark 10:18
source:
  edition: SBLGNT
  text: ὁ δὲ Ἰησοῦς εἶπεν αὐτῷ· Τί με λέγεις ἀγαθόν; οὐδεὶς ἀγαθὸς εἰ μὴ εἷς ὁ θεός.
translation:
  text: But Jesus said to him, “Why do you call me good? No one is good except one—God.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, “What do you call me good for?”
    reason: lexical_alternative
lexical_decisions:
- source_word: δὲ
  chosen: But
  alternatives:
  - And
  - Now
  lexicon: BDAG
  rationale: Rendered as “But” to mark the mild discourse contrast/resumption after
    the man's address to Jesus. “And” is possible, but “But” better reflects the responsive
    turn in English.
- source_word: εἶπεν αὐτῷ
  chosen: said to him
  alternatives:
  - told him
  lexicon: BDAG
  rationale: Standard rendering of λέγω with indirect object; “said to him” is more
    transparent and less interpretive than “told him.”
- source_word: Τί
  chosen: Why
  alternatives:
  - What
  lexicon: BDAG
  rationale: Although τί is formally “what,” in this idiom τί + verb can function
    adverbially as “why.” English idiom strongly prefers “Why do you call me good?”
    over the wooden “What do you call me good for?”.
- source_word: με λέγεις ἀγαθόν
  chosen: do you call me good
  alternatives:
  - are you calling me good
  - do you say I am good
  lexicon: BDAG
  rationale: This preserves the direct predicative force of λέγω with object and complement.
    “Call me good” is the most natural and precise English equivalent.
- source_word: ἀγαθόν / ἀγαθὸς
  chosen: good
  alternatives:
  - morally good
  lexicon: BDAG
  rationale: Rendered consistently as “good” in both occurrences to preserve the lexical
    repetition and rhetorical force. Adding “morally” would over-interpret the statement.
- source_word: οὐδεὶς
  chosen: No one
  alternatives:
  - Nobody
  - No person
  lexicon: BDAG
  rationale: “No one” is clear, natural modern English and preserves the universal
    negation.
- source_word: εἰ μὴ εἷς
  chosen: except one
  alternatives:
  - except only one
  - unless one
  lexicon: BDAG
  rationale: This reflects the exceptive construction straightforwardly. “Except one”
    preserves the emphasis on uniqueness before identifying that one as God.
- source_word: ὁ θεός
  chosen: God
  alternatives:
  - the God
  lexicon: BDAG
  rationale: Anarthrous English proper-noun usage is most natural here. Although Greek
    has the article, English idiom does not require “the God.”
