theological_decisions:
- issue: Potential implication for Christology in Jesus' statement about goodness
  chosen_reading: Translate the saying straightforwardly without adding interpretive
    qualifiers that would suggest either a denial of Jesus' divinity or an explicit
    claim to it.
  alternative_readings:
  - A rendering that implies Jesus denies being divine
  - A rendering that implies Jesus is overtly asserting his divinity in this sentence
  rationale: In keeping with historic orthodoxy and the instruction to preserve theological
    tension rather than resolve it, the translation leaves the statement as spoken.
    The verse presents Jesus challenging the man's use of “good,” but the wording
    should not import a doctrinal conclusion beyond the text itself.
  doctrine_reference: Affirmations; Translation philosophy §3
