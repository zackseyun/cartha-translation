id: MRK.10.34
reference: Mark 10:34
source:
  edition: SBLGNT
  text: καὶ ἐμπαίξουσιν αὐτῷ καὶ ⸂ἐμπτύσουσιν αὐτῷ καὶ μαστιγώσουσιν αὐτὸν⸃ καὶ ⸀ἀποκτενοῦσιν,
    καὶ ⸂μετὰ τρεῖς ἡμέρας⸃ ἀναστήσεται.
translation:
  text: And they will mock him, and spit on him, and flog him, and kill him, and after
    three days he will rise.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'in three days.' Mark's Greek reads 'after three days,' while other
      passages phrase the timing as 'on the third day.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἐμπαίξουσιν
  chosen: will mock
  alternatives:
  - will ridicule
  - will make fun of
  lexicon: BDAG
  rationale: The verb denotes mocking or treating with contempt. 'Mock' is concise,
    natural English and preserves the hostile derision better than the weaker 'make
    fun of.'
- source_word: ἐμπτύσουσιν αὐτῷ
  chosen: will spit on him
  alternatives:
  - will spit at him
  lexicon: BDAG
  rationale: The construction indicates spitting directed toward him as an act of
    humiliation. 'Spit on him' is the most idiomatic and forceful English rendering.
- source_word: μαστιγώσουσιν
  chosen: will flog
  alternatives:
  - will scourge
  - will whip
  lexicon: BDAG
  rationale: '''Flog'' is clear modern English and accurately conveys judicial beating.
    ''Scourge'' is traditional but less accessible; ''whip'' can sound less formal
    and less specific.'
- source_word: ἀποκτενοῦσιν
  chosen: will kill
  alternatives:
  - will put to death
  - will murder
  lexicon: BDAG
  rationale: The verb straightforwardly means 'kill' or 'put to death.' 'Kill' best
    matches the plain sense without adding legal nuance ('put to death') or moral
    coloring ('murder') not explicit in the verb itself.
- source_word: μετὰ τρεῖς ἡμέρας
  chosen: after three days
  alternatives:
  - in three days
  lexicon: BDAG
  rationale: μετά with the accusative normally means 'after.' Mark's wording is best
    represented directly as 'after three days.' Because parallel Gospel expressions
    sometimes use 'on the third day,' the more interpretive harmonization is avoided
    in the main text.
- source_word: ἀναστήσεται
  chosen: he will rise
  alternatives:
  - he will be raised
  - he will rise again
  lexicon: BDAG
  rationale: The future middle here naturally renders as intransitive 'he will rise.'
    'He will be raised' would shift to a passive nuance not present in this form,
    and 'again' is implied by context but not explicit in the Greek.
