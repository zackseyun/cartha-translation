theological_decisions:
- issue: Resurrection wording
  chosen_reading: he will rise
  alternative_readings:
  - he will be raised
  - he will rise again
  rationale: The Greek form ἀναστήσεται is future middle, supporting the intransitive
    'he will rise.' This preserves the text's wording without diminishing the broader
    New Testament witness that also speaks of the Father raising Jesus. 'Again' is
    not explicit and is therefore omitted from the main text.
  doctrine_reference: Preserve theological tension rather than resolve it.
