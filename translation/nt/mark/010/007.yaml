id: MRK.10.7
reference: Mark 10:7
source:
  edition: SBLGNT
  text: ἕνεκεν τούτου καταλείψει ἄνθρωπος τὸν πατέρα αὐτοῦ καὶ τὴν μητέρα ⸂καὶ προσκολληθήσεται
    πρὸς τὴν γυναῖκα αὐτοῦ⸃,
translation:
  text: For this reason a man will leave his father and mother and be joined to his
    wife,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'cling to his wife.' The Greek verb can emphasize close attachment.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἕνεκεν τούτου
  chosen: For this reason
  alternatives:
  - Because of this
  - For this cause
  lexicon: BDAG
  rationale: Standard causal expression introducing the ground for the statement.
    'For this reason' is natural modern English and preserves the explanatory force.
- source_word: καταλείψει
  chosen: will leave
  alternatives:
  - will depart from
  - will forsake
  lexicon: BDAG
  rationale: Future indicative with straightforward sense of leaving behind one's
    parental household. 'Will leave' is idiomatic and sufficiently formal.
- source_word: ἄνθρωπος
  chosen: a man
  alternatives:
  - a person
  - a human being
  lexicon: BDAG
  rationale: Though ἄνθρωπος can be generic, here the immediate marital context and
    the paired reference to 'his wife' specify the male party in the Genesis citation.
    This follows the gender-accurate principle rather than neutralizing the term.
- source_word: πατέρα ... καὶ τὴν μητέρα
  chosen: his father and mother
  alternatives:
  - his father and his mother
  lexicon: BDAG
  rationale: Direct rendering of the coordinated objects. English normally omits the
    repeated possessive before 'mother' without loss of meaning.
- source_word: προσκολληθήσεται
  chosen: be joined to
  alternatives:
  - be united to
  - cling to
  lexicon: BDAG
  rationale: The future passive conveys close attachment in marriage. 'Be joined to'
    preserves the covenantal/marital sense and matches readable modern English. 'Cling
    to' is more literal but less idiomatic in this context.
- source_word: πρὸς τὴν γυναῖκα αὐτοῦ
  chosen: to his wife
  alternatives:
  - to his woman
  lexicon: BDAG
  rationale: γυνή in this context clearly means 'wife,' not merely 'woman,' because
    the verse concerns marriage. 'To his wife' is the natural English complement after
    'be joined.'
