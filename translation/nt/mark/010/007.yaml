theological_decisions:
- issue: Gendered representative language in a marriage citation
  chosen_reading: a man ... his wife
  alternative_readings:
  - a person ... spouse
  rationale: The verse quotes Genesis in a form that presents the male-female marital
    pair. Per the doctrine's gender-accurate principle, the masculine singular should
    be retained where context specifies sex rather than generalized away.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
