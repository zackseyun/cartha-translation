id: MRK.10.12
reference: Mark 10:12
source:
  edition: SBLGNT
  text: καὶ ἐὰν ⸂αὐτὴ ἀπολύσασα τὸν ἄνδρα αὐτῆς γαμήσῃ ἄλλον⸃ μοιχᾶται.
translation:
  text: and if she divorces her husband and marries another man, she commits adultery.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'sends away her husband.' In this marital context, the
      sense is 'divorces.'
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ
  chosen: and
  alternatives:
  - also
  - even
  lexicon: BDAG
  rationale: Standard connective; here it links this statement with the preceding
    parallel case in v. 11.
- source_word: ἐὰν
  chosen: if
  alternatives:
  - whenever
  lexicon: BDAG
  rationale: Introduces a conditional clause. 'If' is the most natural English rendering
    in this legal/moral saying.
- source_word: αὐτὴ
  chosen: she
  alternatives:
  - the woman herself
  lexicon: BDAG
  rationale: Explicit feminine pronoun is retained as 'she.' The pronoun is somewhat
    emphatic in Greek, but normal English does not require 'she herself' here.
- source_word: ἀπολύσασα
  chosen: divorces
  alternatives:
  - sends away
  - dismisses
  lexicon: BDAG
  rationale: Although literally 'having sent away/released,' in marital context ἀπολύω
    commonly means 'divorce.' This is clearer and more idiomatic in modern English
    than 'send away.'
- source_word: τὸν ἄνδρα αὐτῆς
  chosen: her husband
  alternatives:
  - her man
  lexicon: BDAG
  rationale: ἀνήρ can mean 'man' or 'husband'; the marital context requires 'husband.'
- source_word: γαμήσῃ ἄλλον
  chosen: marries another man
  alternatives:
  - marries another
  - weds another man
  lexicon: BDAG
  rationale: The object ἄλλον is masculine, so 'another man' makes the referent explicit
    in English and preserves the gendered specificity of the Greek.
- source_word: μοιχᾶται
  chosen: commits adultery
  alternatives:
  - is committing adultery
  - becomes an adulteress
  lexicon: BDAG
  rationale: Present middle/passive form is best rendered idiomatically as 'commits
    adultery.' 'Becomes an adulteress' is less direct and less natural here.
