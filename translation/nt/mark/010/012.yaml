theological_decisions:
- issue: Whether to preserve the gender-specific wording of the saying
  chosen_reading: 'Use explicit feminine subject and masculine object: ''if she divorces
    her husband and marries another man'''
  alternative_readings:
  - if a wife divorces her husband and marries another
  - if she leaves her husband and marries another
  rationale: The Greek is specifically gendered in this verse (αὐτὴ ... τὸν ἄνδρα
    αὐτῆς ... ἄλλον). Per the translation philosophy, gender-accurate rendering is
    preferred over neutralization. This also preserves the deliberate parallel with
    the preceding verse about a man divorcing his wife.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
- issue: Whether ἀπολύω should be rendered literally or as a marital legal term
  chosen_reading: Render as 'divorces'
  alternative_readings:
  - sends away
  - dismisses
  rationale: In this context Jesus is speaking about dissolution of marriage, not
    merely separation. 'Divorces' communicates the legal-marital force without paraphrasing
    beyond the source text.
  doctrine_reference: DOCTRINE.md §Translation philosophy, points 1 and 6
