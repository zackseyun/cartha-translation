id: MRK.10.51
reference: Mark 10:51
source:
  edition: SBLGNT
  text: καὶ ἀποκριθεὶς ⸂αὐτῷ ὁ Ἰησοῦς εἶπεν⸃· Τί ⸂σοι θέλεις ποιήσω⸃; ὁ δὲ τυφλὸς
    εἶπεν αὐτῷ· Ραββουνι, ἵνα ἀναβλέψω.
translation:
  text: And answering him, Jesus said, “What do you want me to do for you?” And the
    blind man said to him, “Rabboni, that I may see again.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Rabboni is an Aramaic form of address meaning 'my teacher' or 'my master.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀποκριθεὶς
  chosen: answering
  alternatives:
  - in reply
  - answered
  lexicon: BDAG
  rationale: A participial form is present in Greek, so 'answering' preserves the
    structure more closely than converting immediately to a finite verb. It remains
    natural in English when followed by 'said.'
- source_word: Τί σοι θέλεις ποιήσω
  chosen: What do you want me to do for you?
  alternatives:
  - What do you want me to do?
  - What do you wish that I should do for you?
  lexicon: BDAG
  rationale: This rendering captures the dative σοι with 'for you' and expresses the
    volitional force of θέλεις in idiomatic modern English. It balances formal accuracy
    with readability.
- source_word: τυφλὸς
  chosen: the blind man
  alternatives:
  - the blind one
  lexicon: BDAG
  rationale: Although the adjective is substantival ('the blind [man]'), English normally
    requires an explicit noun here. 'The blind man' is natural and preserves the individual
    reference without sounding impersonal.
- source_word: Ραββουνι
  chosen: Rabboni
  alternatives:
  - my teacher
  - Master
  lexicon: BDAG
  rationale: This is a Semitic form of address, and transliteration preserves its
    distinctive historical and emotional force. Because it functions as a title of
    address rather than a personal name, an explanatory footnote preserves its sense.
- source_word: ἵνα ἀναβλέψω
  chosen: that I may see again
  alternatives:
  - that I may regain my sight
  - that I may look up
  lexicon: BDAG
  rationale: ἀναβλέπω in healing contexts commonly means 'regain sight' or 'see again.'
    'That I may see again' is concise, natural, and preserves the purpose nuance introduced
    by ἵνα.
