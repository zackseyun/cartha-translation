id: MRK.10.52
reference: Mark 10:52
source:
  edition: SBLGNT
  text: ⸂καὶ ὁ⸃ Ἰησοῦς εἶπεν αὐτῷ· Ὕπαγε, ἡ πίστις σου σέσωκέν σε. καὶ ⸀εὐθὺς ἀνέβλεψεν,
    καὶ ἠκολούθει ⸀αὐτῷ ἐν τῇ ὁδῷ.
translation:
  text: And Jesus said to him, “Go; your faith has saved you.” And immediately he
    regained his sight and was following him on the road.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'has made you well' or 'has healed you.' The Greek verb can refer to
      healing as well as salvation.
    reason: lexical_alternative
  - marker: b
    text: Or 'on the way.'
    reason: lexical_alternative
  - marker: c
    text: '''Faith'' could also be expressed as ''trust'' here.'
    reason: alternative_reading
lexical_decisions:
- source_word: Ὕπαγε
  chosen: Go
  alternatives:
  - Be on your way
  - Go your way
  lexicon: BDAG
  rationale: A straightforward imperative of departure. 'Go' is the clearest modern
    English equivalent and avoids adding possessive nuance not explicit in the Greek.
- source_word: πίστις
  chosen: faith
  alternatives:
  - trust
  - faithfulness
  lexicon: BDAG
  rationale: Per doctrine default, πίστις is rendered 'faith' in the main text. In
    this healing context it denotes the man's trusting reliance on Jesus. 'Trust'
    is possible but less consistent with the project's key-term policy; 'faithfulness'
    is less likely here.
- source_word: σέσωκέν
  chosen: has saved
  alternatives:
  - has made you well
  - has healed you
  lexicon: BDAG
  rationale: The perfect of σῴζω can mean save, heal, or make well. 'Has saved you'
    preserves the broader semantic range and theological tension between physical
    healing and fuller salvation, rather than collapsing it to bodily cure alone.
    The immediate context shows physical restoration, but the wording supports more
    than that.
- source_word: εὐθύς
  chosen: immediately
  alternatives:
  - at once
  - right away
  lexicon: BDAG
  rationale: Mark frequently uses εὐθύς; 'immediately' preserves the narrative briskness
    and is a standard, natural rendering.
- source_word: ἀνέβλεψεν
  chosen: regained his sight
  alternatives:
  - received his sight
  - looked up
  lexicon: BDAG
  rationale: In this context of a blind man being healed, the idiomatic sense is restoration
    of sight. 'Looked up' would be too literal and misleading in English. 'Regained
    his sight' communicates the event naturally.
- source_word: ἠκολούθει
  chosen: was following
  alternatives:
  - followed
  - began to follow
  lexicon: BDAG
  rationale: The imperfect suggests ongoing action. 'Was following' preserves the
    durative aspect better than the simple past 'followed,' while remaining readable.
- source_word: ἐν τῇ ὁδῷ
  chosen: on the road
  alternatives:
  - on the way
  - along the road
  lexicon: BDAG
  rationale: Literally 'in the road/way.' 'On the road' is natural English and preserves
    the concrete travel setting. 'On the way' is also possible and in Mark can carry
    discipleship resonance, but here 'road' keeps the physical image primary without
    excluding that resonance.
- source_word: καὶ ὁ Ἰησοῦς
  chosen: And Jesus
  alternatives:
  - Then Jesus
  lexicon: BDAG
  rationale: The connective καί is retained as 'And' to reflect the narrative flow
    without overinterpreting sequence.
