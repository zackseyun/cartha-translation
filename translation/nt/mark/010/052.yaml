theological_decisions:
- issue: Meaning of σῴζω in Jesus' declaration
  chosen_reading: Rendered broadly as 'has saved you' rather than narrowly as physical
    healing only.
  alternative_readings:
  - has made you well
  - has healed you
  rationale: The Greek verb naturally spans rescue, healing, and salvation. Since
    the verse immediately narrates restored sight yet Jesus' wording is broader, the
    translation preserves that theological and lexical breadth rather than resolving
    it reductively. This aligns with the doctrine's instruction to preserve theological
    tension where the source supports it.
  doctrine_reference: 'Translation philosophy §3; Contested terms: πίστις'
