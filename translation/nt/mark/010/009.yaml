id: MRK.10.9
reference: Mark 10:9
source:
  edition: SBLGNT
  text: ὃ οὖν ὁ θεὸς συνέζευξεν ἄνθρωπος μὴ χωριζέτω.
translation:
  text: Therefore, what God has joined together, man must not separate.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'no human being' / 'a person.' The Greek has singular 'man' used generically.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὃ
  chosen: what
  alternatives:
  - that which
  - whatever
  lexicon: BDAG
  rationale: Neuter singular relative pronoun referring collectively to the marital
    union just described. 'What' is idiomatic English and preserves the impersonal/collective
    sense better than 'who' or a more wooden 'that which.'
- source_word: οὖν
  chosen: Therefore
  alternatives:
  - then
  - so
  lexicon: BDAG
  rationale: Marks an inference from the preceding argument about God's design in
    marriage. 'Therefore' best conveys the logical conclusion in clear modern English.
- source_word: ὁ θεὸς
  chosen: God
  lexicon: BDAG
  rationale: Straightforward nominative subject with article. English normally omits
    the article before 'God' in this usage.
- source_word: συνέζευξεν
  chosen: has joined together
  alternatives:
  - joined
  - yoked together
  - has yoked together
  lexicon: BDAG
  rationale: Aorist active indicative of συζεύγνυμι, literally involving joining or
    yoking together. 'Has joined together' is natural English and preserves the completed
    divine action with present relevance. 'Yoked together' is lexically vivid but
    less idiomatic here and may overemphasize the metaphor.
- source_word: ἄνθρωπος
  chosen: man
  alternatives:
  - a person
  - human being
  lexicon: BDAG
  rationale: 'Anarthrous singular used generically: no human being is to separate
    what God joined. Per doctrine, gender-accurate rendering is preferred where the
    Greek uses masculine representative language. ''Man'' preserves the generic singular
    force; the inclusive sense can be clarified in a footnote.'
- source_word: μὴ χωριζέτω
  chosen: must not separate
  alternatives:
  - let not ... separate
  - must not divide
  lexicon: BDAG
  rationale: Present active imperative with μή expresses prohibition. 'Must not separate'
    communicates the force clearly in contemporary English, while 'let not' is more
    formal/liturgical. 'Separate' matches the lexical sense better than 'divide' in
    this marital context.
