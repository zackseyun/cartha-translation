theological_decisions:
- issue: Generic force of ἄνθρωπος in a marriage saying
  chosen_reading: Rendered as 'man' in the main text with inclusive force understood
  alternative_readings:
  - a person
  - human being
  rationale: The Greek uses masculine singular representative language. Following
    the stated gender-accurate philosophy, the main text keeps 'man' rather than neutralizing
    it, while a footnote preserves the broader human reference so readers do not mistake
    it for male-only application.
