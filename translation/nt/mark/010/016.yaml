theological_decisions:
- issue: Nature of Jesus' action toward the children
  chosen_reading: Retain the concrete physical and verbal actions ('took them in his
    arms,' 'blessed them,' 'laying his hands on them') without importing sacramental
    or ceremonial terminology.
  alternative_readings:
  - He embraced them and pronounced a blessing over them
  - He blessed them with the laying on of hands
  rationale: The verse depicts Jesus' affectionate reception and blessing of the children.
    The translation should preserve the action plainly without resolving it into later
    doctrinal categories not explicit in the text.
  doctrine_reference: Preserve theological tension rather than resolve it.
