id: MRK.10.16
reference: Mark 10:16
source:
  edition: SBLGNT
  text: καὶ ἐναγκαλισάμενος αὐτὰ ⸂κατευλόγει τιθεὶς τὰς χεῖρας ἐπ’ αὐτά⸃.
translation:
  text: And he took them in his arms and blessed them, laying his hands on them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'embraced them' / 'took them into his arms.' The Greek verb specifically
      refers to taking someone into one's arms.
    reason: lexical_alternative
  - marker: b
    text: 'The Greek verb is imperfect and intensified, suggesting that he was blessing
      them repeatedly or warmly: ''kept blessing them.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐναγκαλισάμενος
  chosen: took them in his arms
  alternatives:
  - embraced them
  - took them into his arms
  lexicon: BDAG
  rationale: The participle denotes taking someone into one's arms, more specific
    than a generic 'embraced.' 'Took them in his arms' is natural modern English and
    preserves the physical tenderness of the action.
- source_word: κατευλόγει
  chosen: blessed
  alternatives:
  - kept blessing
  - blessed fervently
  lexicon: BDAG
  rationale: The imperfect indicates ongoing or repeated action, but in English the
    surrounding participles already create a flowing narrative. 'Blessed' is the clearest
    main-text rendering; the intensified compound sense and imperfect nuance are worth
    preserving in a footnote rather than overloading the line.
- source_word: τιθεὶς τὰς χεῖρας ἐπ’ αὐτά
  chosen: laying his hands on them
  alternatives:
  - placing his hands on them
  lexicon: BDAG
  rationale: This participial phrase describes the manner accompanying the blessing.
    'Laying his hands on them' is idiomatic English and preserves the recognizable
    biblical gesture without unnecessary paraphrase.
- source_word: αὐτὰ ... αὐτά
  chosen: them
  alternatives:
  - the children
  lexicon: BDAG
  rationale: The pronoun refers back to the children from the immediate context. English
    naturally uses 'them' here; repeating 'the children' would be more explicit but
    less elegant and is not required by the Greek.
- source_word: καὶ
  chosen: And
  alternatives:
  - Then
  - So
  lexicon: BDAG
  rationale: A simple connective best reflects Mark's narrative style without adding
    temporal or inferential force beyond the Greek.
