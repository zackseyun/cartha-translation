theological_decisions:
- issue: Messianic force of 'Son of David'
  chosen_reading: Retain 'Son of David' in the main text as a title addressed to Jesus.
  alternative_readings:
  - Render more generically as 'descendant of David'
  rationale: In Mark's narrative this address carries royal-messianic significance,
    and the literal title should be preserved rather than flattened into a merely
    genealogical description.
  doctrine_reference: DOCTRINE.md Affirmations; Translation philosophy §§2–3
- issue: Rendering Ναζαρηνός
  chosen_reading: Translate as 'the Nazarene' rather than 'of Nazareth.'
  alternative_readings:
  - Jesus of Nazareth
  rationale: The Greek uses the epithet Ναζαρηνός, and the translation aims to preserve
    source-text form where possible. 'Jesus of Nazareth' is understandable but less
    exact to this wording.
  doctrine_reference: DOCTRINE.md Translation philosophy §1
