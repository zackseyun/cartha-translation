id: MRK.10.47
reference: Mark 10:47
source:
  edition: SBLGNT
  text: καὶ ἀκούσας ὅτι Ἰησοῦς ὁ ⸀Ναζαρηνός ἐστιν ἤρξατο κράζειν καὶ λέγειν· ⸀Υἱὲ
    Δαυὶδ Ἰησοῦ, ἐλέησόν με.
translation:
  text: And when he heard that it was Jesus the Nazarene, he began to cry out and
    say, “Jesus, Son of David, have mercy on me!”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Jesus of Nazareth.” The Greek reads “Jesus the Nazarene,” preserving
      an epithet rather than using the more explicit geographical expression.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀκούσας
  chosen: when he heard
  alternatives:
  - having heard
  - after hearing
  lexicon: BDAG
  rationale: Aorist participle preceding the main verb is rendered with a temporal
    sense in natural English. 'When he heard' preserves the sequence without sounding
    wooden.
- source_word: Ναζαρηνός
  chosen: the Nazarene
  alternatives:
  - of Nazareth
  - the Nazarean
  lexicon: BDAG
  rationale: This is an adjectival/title-like designation, not the gentilic construction
    'from Nazareth.' 'The Nazarene' closely reflects the Greek form and preserves
    its recognizable epithet function.
- source_word: ἤρξατο κράζειν καὶ λέγειν
  chosen: he began to cry out and say
  alternatives:
  - he began to shout and say
  - he began crying out and saying
  lexicon: BDAG
  rationale: The construction with ἄρχομαι + infinitives is represented straightforwardly
    as inception. 'Cry out' fits κράζω well in a public, urgent appeal; retaining
    both infinitives reflects Mark's style rather than collapsing them into one verb.
- source_word: κράζειν
  chosen: to cry out
  alternatives:
  - to shout
  - to call out
  lexicon: BDAG
  rationale: Conveys loud, urgent vocal appeal without implying anger. It suits Bartimaeus's
    persistent public plea.
- source_word: Υἱὲ Δαυὶδ
  chosen: Son of David
  alternatives:
  - descendant of David
  lexicon: BDAG
  rationale: This is a recognized messianic title in the Gospel context. The traditional
    rendering best preserves both literal form and theological resonance.
- source_word: ἐλέησόν με
  chosen: have mercy on me
  alternatives:
  - show me mercy
  - take pity on me
  lexicon: BDAG
  rationale: '''Have mercy on me'' is the standard and most transparent rendering
    for the aorist imperative, preserving the plea''s gravity and biblical resonance.'
- source_word: Ἰησοῦ
  chosen: Jesus
  lexicon: BDAG
  rationale: Personal name is transliterated by standard convention, in keeping with
    the translation philosophy to transliterate names.
