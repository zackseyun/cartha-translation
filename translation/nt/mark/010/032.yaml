id: MRK.10.32
reference: Mark 10:32
source:
  edition: SBLGNT
  text: Ἦσαν δὲ ἐν τῇ ὁδῷ ἀναβαίνοντες εἰς Ἱεροσόλυμα, καὶ ἦν προάγων αὐτοὺς ὁ Ἰησοῦς,
    καὶ ἐθαμβοῦντο, ⸂οἱ δὲ⸃ ἀκολουθοῦντες ἐφοβοῦντο. καὶ παραλαβὼν πάλιν τοὺς δώδεκα
    ἤρξατο αὐτοῖς λέγειν τὰ μέλλοντα αὐτῷ συμβαίνειν
translation:
  text: Now they were on the road, going up to Jerusalem, and Jesus was going ahead
    of them; and they were astonished, while those who were following were afraid.
    And taking the Twelve aside again, he began to tell them the things that were
    about to happen to him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'on the way.'
    reason: lexical_alternative
  - marker: b
    text: Or 'going before them.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν τῇ ὁδῷ
  chosen: on the road
  alternatives:
  - on the way
  lexicon: BDAG
  rationale: A natural English rendering of the idiom that preserves the concrete
    travel setting. 'On the way' is also possible, but 'on the road' keeps the physical
    scene vivid.
- source_word: ἀναβαίνοντες εἰς Ἱεροσόλυμα
  chosen: going up to Jerusalem
  alternatives:
  - ascending to Jerusalem
  lexicon: BDAG
  rationale: Retains the conventional biblical idiom 'going up' for travel to Jerusalem,
    reflecting both elevation and pilgrimage language, while remaining readable.
- source_word: προάγων αὐτούς
  chosen: going ahead of them
  alternatives:
  - leading them
  - going before them
  lexicon: BDAG
  rationale: The participle here most directly describes Jesus' position in front
    of the group. 'Leading them' is interpretive; 'going ahead of them' is more textually
    transparent.
- source_word: ἐθαμβοῦντο
  chosen: they were astonished
  alternatives:
  - they were amazed
  - they were appalled
  lexicon: BDAG
  rationale: Conveys strong amazement or bewilderment without overstating to horror.
    The imperfect suggests an ongoing state, reflected by 'were astonished.'
- source_word: οἱ δὲ ἀκολουθοῦντες
  chosen: those who were following
  alternatives:
  - the ones following
  - his followers
  lexicon: BDAG
  rationale: Keeps the participial construction and avoids over-specifying the group.
    'His followers' is possible but slightly more interpretive than the Greek.
- source_word: ἐφοβοῦντο
  chosen: were afraid
  alternatives:
  - were fearful
  - were frightened
  lexicon: BDAG
  rationale: A straightforward rendering of the imperfect middle/passive form in context,
    preserving the emotional response without embellishment.
- source_word: παραλαβὼν ... τοὺς δώδεκα
  chosen: taking the Twelve aside
  alternatives:
  - taking the Twelve with him
  - taking aside the Twelve
  lexicon: BDAG
  rationale: In context, Jesus separates the Twelve for private instruction. 'Aside'
    makes the contextual force explicit in idiomatic English.
- source_word: πάλιν
  chosen: again
  alternatives:
  - once more
  lexicon: BDAG
  rationale: Simple and natural; it indicates a repeated action of private instruction.
- source_word: ἤρξατο ... λέγειν
  chosen: he began to tell
  alternatives:
  - he began to say
  - he started telling
  lexicon: BDAG
  rationale: English idiom prefers 'began to tell' with an indirect object and content
    clause. This preserves the inceptive force of ἤρξατο.
- source_word: τὰ μέλλοντα αὐτῷ συμβαίνειν
  chosen: the things that were about to happen to him
  alternatives:
  - what was going to happen to him
  - the things destined to happen to him
  lexicon: BDAG
  rationale: 'This closely reflects the articular participle plus infinitive construction:
    impending events concerning Jesus. ''About to happen'' preserves imminence without
    importing a stronger notion of fate than the Greek requires.'
