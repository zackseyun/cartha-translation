theological_decisions:
- issue: Emotional distinction between the two groups in the narrative
  chosen_reading: Render ἐθαμβοῦντο and ἐφοβοῦντο distinctly as 'were astonished'
    and 'were afraid.'
  alternative_readings:
  - Render both more generally as forms of amazement or fear
  rationale: The Greek uses two different verbs and appears to distinguish the reaction
    of the main group from that of those following. Preserving the distinction maintains
    the narrative tension without harmonizing the emotions.
  doctrine_reference: Preserve theological tension rather than resolve it.
