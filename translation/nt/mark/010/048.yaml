theological_decisions:
- issue: Messianic significance of 'Son of David'
  chosen_reading: Retain the title as 'Son of David' without paraphrasing it as 'Messiah.'
  alternative_readings:
  - Messiah, have mercy on me
  rationale: The Greek uses the title Υἱὲ Δαυίδ directly. Translating the title rather
    than substituting its interpretation preserves the text's wording while allowing
    readers to perceive its messianic significance.
  doctrine_reference: 'Translation philosophy: translate titles; preserve theological
    tension rather than resolve it.'
