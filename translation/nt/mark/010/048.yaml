id: MRK.10.48
reference: Mark 10:48
source:
  edition: SBLGNT
  text: καὶ ἐπετίμων αὐτῷ πολλοὶ ἵνα σιωπήσῃ· ὁ δὲ πολλῷ μᾶλλον ἔκραζεν· Υἱὲ Δαυίδ,
    ἐλέησόν με.
translation:
  text: And many were rebuking him so that he would be silent, but he was crying out
    all the more, “Son of David, have mercy on me!”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '"Son of David" is a royal-messianic title; alternatively, its sense could
      be expressed as "Messiah," but the Greek wording is preserved here.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπετίμων
  chosen: were rebuking
  alternatives:
  - were warning
  - were scolding
  - were sternly telling
  lexicon: BDAG
  rationale: The imperfect indicates repeated or ongoing action. 'Rebuking' preserves
    the force of ἐπιτιμάω more closely than the softer 'warning,' while fitting the
    crowd's attempt to silence him.
- source_word: πολλοὶ
  chosen: many
  alternatives:
  - the crowd
  - many people
  lexicon: BDAG
  rationale: The adjective functions substantivally. 'Many' is the most direct rendering
    and avoids importing a more specific collective noun not present in the Greek.
- source_word: ἵνα σιωπήσῃ
  chosen: so that he would be silent
  alternatives:
  - to make him be quiet
  - that he should keep silent
  lexicon: BDAG
  rationale: This expresses the purpose of the rebuking. 'Would be silent' is natural
    English and preserves the purposive sense without over-paraphrase.
- source_word: πολλῷ μᾶλλον
  chosen: all the more
  alternatives:
  - much more
  - even more loudly
  lexicon: BDAG
  rationale: '''All the more'' is a natural rendering of the comparative idiom. ''Even
    more loudly'' over-interprets by adding volume, which the Greek does not explicitly
    state.'
- source_word: ἔκραζεν
  chosen: was crying out
  alternatives:
  - kept shouting
  - was calling out
  lexicon: BDAG
  rationale: The imperfect again suggests continued action. 'Crying out' preserves
    the urgency of κράζω without becoming too colloquial.
- source_word: Υἱὲ Δαυίδ
  chosen: Son of David
  alternatives:
  - David's Son
  lexicon: BDAG
  rationale: This is a recognized messianic title. Translating it literally preserves
    both the wording and its theological resonance.
- source_word: ἐλέησόν με
  chosen: have mercy on me
  alternatives:
  - show me mercy
  - take pity on me
  lexicon: BDAG
  rationale: The aorist imperative is well represented by the idiomatic plea 'have
    mercy on me.' 'Take pity' is weaker and less theologically resonant.
