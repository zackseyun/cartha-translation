id: MRK.10.6
reference: Mark 10:6
source:
  edition: SBLGNT
  text: ἀπὸ δὲ ἀρχῆς κτίσεως ἄρσεν καὶ θῆλυ ἐποίησεν ⸀αὐτούς·
translation:
  text: But from the beginning of creation, he made them male and female.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'he created them male and female.' The Greek verb here is 'made,' though
      'created' reflects the Genesis background.
    reason: lexical_alternative
  - marker: b
    text: Or, 'male and female he made them.' This more closely follows the Greek
      word order.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπὸ
  chosen: from
  alternatives:
  - since
  lexicon: BDAG
  rationale: 'The preposition marks point of origin in time here: ''from the beginning.''
    ''Since'' is possible in English but less direct and slightly more interpretive.'
- source_word: δὲ
  chosen: But
  alternatives:
  - and
  - now
  lexicon: BDAG
  rationale: δέ here marks contrast with the preceding concession about divorce, so
    'But' best reflects the adversative force in context.
- source_word: ἀρχῆς
  chosen: the beginning
  alternatives:
  - beginning
  lexicon: BDAG
  rationale: With ἀπό and followed by the genitive κτίσεως, the phrase is idiomatically
    rendered 'from the beginning.' Including the article in English improves naturalness
    and reflects the definite sense.
- source_word: κτίσεως
  chosen: of creation
  alternatives:
  - of the creation
  - of the created order
  lexicon: BDAG
  rationale: 'The genitive depends on ἀρχῆς: ''beginning of creation.'' ''Of creation''
    is natural English and preserves the broad creational reference without over-expanding
    to ''created order.'''
- source_word: ἄρσεν
  chosen: male
  alternatives:
  - a male
  - man
  lexicon: BDAG
  rationale: In the Genesis citation, ἄρσεν is an adjective/substantive meaning 'male.'
    'Male' preserves the biological/creational pairing with θῆλυ better than 'man,'
    which could blur the citation's wording.
- source_word: θῆλυ
  chosen: female
  alternatives:
  - a female
  - woman
  lexicon: BDAG
  rationale: Paired with ἄρσεν, this is best rendered 'female.' 'Woman' would shift
    from the creational-sex distinction in the citation to a social role term.
- source_word: ἐποίησεν
  chosen: he made
  alternatives:
  - he created
  lexicon: BDAG
  rationale: ποιέω commonly means 'make/do.' Although 'created' would fit the Genesis
    context, the Greek here uses ποιέω rather than κτίζω, so 'made' is the more textually
    transparent choice.
- source_word: αὐτούς
  chosen: them
  alternatives:
  - them both
  lexicon: BDAG
  rationale: The pronoun refers to humanity as the male-female pair in the cited creation
    text. 'Them' is sufficient and avoids adding emphasis not explicit in the Greek.
