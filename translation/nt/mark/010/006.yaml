theological_decisions:
- issue: Rendering the Genesis citation's sex terms
  chosen_reading: male and female
  alternative_readings:
  - man and woman
  rationale: The verse quotes creation language emphasizing the male-female pair.
    Following the source wording preserves the creational and biological framing without
    importing later relational categories. This aligns with the project's gender-accurate
    philosophy.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §4 (Gender-accurate over
    gender-neutral)'
- issue: Divine subject left implicit in English as 'he'
  chosen_reading: he made them
  alternative_readings:
  - God made them
  rationale: The Greek verb is third person singular with the subject understood from
    the Genesis citation and context. Supplying 'he' preserves the Greek's form while
    remaining clear in context; explicitly naming 'God' would be interpretive expansion
    beyond the wording of this verse.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §1 (Original-language primacy
    over translation tradition)'
