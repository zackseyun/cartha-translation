id: MRK.10.15
reference: Mark 10:15
source:
  edition: SBLGNT
  text: ἀμὴν λέγω ὑμῖν, ὃς ⸀ἂν μὴ δέξηται τὴν βασιλείαν τοῦ θεοῦ ὡς παιδίον, οὐ μὴ
    εἰσέλθῃ εἰς αὐτήν.
translation:
  text: Truly I say to you, whoever does not receive the kingdom of God like a child
    will certainly not enter it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'as a child.' The phrase may point to childlike humility, trust, or dependence,
      but the Greek does not specify which nuance.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀμὴν
  chosen: Truly
  alternatives:
  - Amen
  - Truly, truly
  lexicon: BDAG
  rationale: Introduces a solemn, authoritative saying. 'Truly' communicates the force
    idiomatically in English without leaving the Hebrew/Aramaic form untranslated.
    'Truly, truly' is not appropriate here because the text has a single ἀμήν.
- source_word: λέγω ὑμῖν
  chosen: I say to you
  alternatives:
  - I tell you
  lexicon: BDAG
  rationale: A direct and transparent rendering of the present indicative plus dative
    pronoun. 'I tell you' is idiomatic, but 'I say to you' stays slightly closer to
    the Greek while remaining natural.
- source_word: ὃς ἂν
  chosen: whoever
  alternatives:
  - who
  lexicon: BDAG
  rationale: The relative pronoun with ἄν gives an indefinite/generalizing sense.
    'Whoever' best captures the open, generic force in natural English.
- source_word: μὴ δέξηται
  chosen: does not receive
  alternatives:
  - does not accept
  - does not welcome
  lexicon: BDAG
  rationale: δέχομαι can mean receive, accept, or welcome. 'Receive' fits the object
    'the kingdom of God' well and preserves the metaphor of receptive dependence rather
    than active achievement.
- source_word: βασιλείαν τοῦ θεοῦ
  chosen: the kingdom of God
  alternatives:
  - the reign of God
  - God's kingdom
  lexicon: BDAG
  rationale: This is the standard and contextually appropriate rendering in the Synoptics.
    'Kingdom' preserves both the domain and reign dimensions without over-specifying
    one aspect.
- source_word: ὡς παιδίον
  chosen: like a child
  alternatives:
  - as a child
  - like a little child
  lexicon: BDAG
  rationale: ὡς marks comparison, and παιδίον denotes a child. 'Like a child' is clear
    and natural. 'As a child' is possible but can sound more role-based in English;
    'little child' adds emphasis not explicit in the noun here.
- source_word: οὐ μὴ εἰσέλθῃ
  chosen: will certainly not enter
  alternatives:
  - will never enter
  - shall by no means enter
  lexicon: BDAG
  rationale: οὐ μή with the aorist subjunctive is a strong negation. 'Will certainly
    not enter' conveys the emphatic force in readable modern English without archaic
    phrasing.
- source_word: εἰς αὐτήν
  chosen: it
  alternatives:
  - into it
  lexicon: BDAG
  rationale: The pronoun refers back to 'the kingdom.' English normally omits repeating
    'into' after 'enter,' so 'enter it' is idiomatic and accurate.
