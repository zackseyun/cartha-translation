theological_decisions:
- issue: Meaning of receiving the kingdom 'like a child'
  chosen_reading: Retain the simile without specifying which childlike quality is
    intended.
  alternative_readings:
  - like a child in humility
  - like a child in trust
  - like a child in dependence
  rationale: The Greek states the comparison but does not define the precise quality
    in view. To preserve theological tension and avoid importing a specific interpretive
    tradition, the translation leaves the phrase open as in the source.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
