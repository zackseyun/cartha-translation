theological_decisions:
- issue: Reference to Mosaic authority in Jesus' reply
  chosen_reading: Retain 'Moses' as the named human mediator of the command without
    expanding to 'the Law' or 'God through Moses.'
  alternative_readings:
  - What does the law of Moses command you?
  - What did God command you through Moses?
  rationale: The Greek text explicitly names Moses and does not itself expand the
    reference. Preserving 'Moses' maintains the wording of Jesus' question and avoids
    importing explanatory theological phrasing not present in the verse.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Never import doctrinal claims the text does not make.'
