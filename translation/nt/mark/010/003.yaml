id: MRK.10.3
reference: Mark 10:3
source:
  edition: SBLGNT
  text: ὁ δὲ ἀποκριθεὶς εἶπεν αὐτοῖς· Τί ὑμῖν ἐνετείλατο Μωϋσῆς;
translation:
  text: But he answered them, “What did Moses command you?”
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: δὲ
  chosen: But
  alternatives:
  - And
  - Now
  lexicon: BDAG
  rationale: δέ is a mild connective; 'But' fits the dialogical turn and slight contrast
    with the Pharisees' testing question in the preceding context better than a simple
    'And.'
- source_word: ἀποκριθεὶς εἶπεν
  chosen: he answered
  alternatives:
  - answering, he said
  - he replied and said
  lexicon: BDAG
  rationale: This common Semitic-influenced Greek expression is naturally rendered
    in English as a single verbal idea, 'he answered,' avoiding unnecessary redundancy
    while preserving the responsive force.
- source_word: αὐτοῖς
  chosen: them
  alternatives:
  - to them
  lexicon: BDAG
  rationale: The indirect object is naturally incorporated in English as 'answered
    them'; 'to them' would also be possible but is less idiomatic here.
- source_word: Τί
  chosen: What
  alternatives:
  - What thing
  - Which thing
  lexicon: BDAG
  rationale: τί introduces a direct question asking for the content of Moses' instruction;
    simple 'What' is the clear and natural rendering.
- source_word: ὑμῖν
  chosen: you
  alternatives:
  - to you
  lexicon: BDAG
  rationale: The dative pronoun marks the recipients of the command. English expresses
    this naturally as 'command you,' though 'command to you' would be overly literal
    and awkward.
- source_word: ἐνετείλατο
  chosen: command
  alternatives:
  - order
  - instruct
  - prescribe
  lexicon: BDAG
  rationale: ἐντέλλομαι denotes giving an authoritative command or instruction. 'Command'
    best preserves the legal-authoritative sense in this discussion about Mosaic legislation.
- source_word: Μωϋσῆς
  chosen: Moses
  lexicon: BDAG
  rationale: Proper name transliterated according to standard English convention,
    in keeping with the translation philosophy to transliterate names.
