id: MRK.10.41
reference: Mark 10:41
source:
  edition: SBLGNT
  text: Καὶ ἀκούσαντες οἱ δέκα ἤρξαντο ἀγανακτεῖν περὶ Ἰακώβου καὶ Ἰωάννου.
translation:
  text: And when the ten heard it, they began to be indignant with James and John.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'about James and John' / 'because of James and John.' The Greek preposition
      can mark the object or occasion of their indignation.
    reason: lexical_alternative
lexical_decisions:
- source_word: Καὶ
  chosen: And
  alternatives:
  - Now
  - Then
  lexicon: BDAG
  rationale: Standard connective; retained as 'And' to preserve the narrative flow
    without adding temporal nuance beyond the Greek.
- source_word: ἀκούσαντες
  chosen: when ... heard it
  alternatives:
  - having heard
  - after hearing
  lexicon: BDAG
  rationale: Aorist participle indicating antecedent action relative to the main verb.
    English idiom is smoother with a temporal clause, 'when ... heard it.' The object
    'it' is implied from context and naturally supplied in English.
- source_word: οἱ δέκα
  chosen: the ten
  alternatives:
  - the other ten
  - the ten disciples
  lexicon: BDAG
  rationale: Literally 'the ten.' Although context implies the other ten disciples
    besides James and John, the Greek text itself says only 'the ten,' so that is
    preserved in the main text.
- source_word: ἤρξαντο
  chosen: began
  alternatives:
  - started
  lexicon: BDAG
  rationale: The ingressive sense of ἄρχομαι with an infinitive is best represented
    by 'began,' preserving the onset of the reaction.
- source_word: ἀγανακτεῖν
  chosen: to be indignant
  alternatives:
  - to be angry
  - to be resentful
  - to be upset
  lexicon: BDAG
  rationale: ἀγανακτέω conveys strong displeasure or indignation. 'Indignant' best
    captures the moralized irritation without flattening it into mere anger.
- source_word: περὶ Ἰακώβου καὶ Ἰωάννου
  chosen: with James and John
  alternatives:
  - about James and John
  - at James and John
  - because of James and John
  lexicon: BDAG
  rationale: With verbs of emotional reaction, περί can indicate the object or occasion
    of indignation. 'With James and John' is idiomatic English that conveys directed
    displeasure toward them, fitting the context.
- source_word: Ἰακώβου
  chosen: James
  rationale: Standard English transliteration of the personal name Ἰάκωβος.
- source_word: Ἰωάννου
  chosen: John
  rationale: Standard English transliteration of the personal name Ἰωάννης.
