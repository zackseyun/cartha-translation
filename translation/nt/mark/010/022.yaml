id: MRK.10.22
reference: Mark 10:22
source:
  edition: SBLGNT
  text: ὁ δὲ στυγνάσας ἐπὶ τῷ λόγῳ ἀπῆλθεν λυπούμενος, ἦν γὰρ ἔχων κτήματα πολλά.
translation:
  text: But he, becoming gloomy at the word, went away grieving, for he had many possessions.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'disheartened' or 'crestfallen'; the Greek suggests a visibly darkened
      expression.
    reason: lexical_alternative
  - marker: b
    text: Or 'at this saying' or 'because of this statement.'
    reason: lexical_alternative
  - marker: c
    text: Or 'great possessions.'
    reason: lexical_alternative
lexical_decisions:
- source_word: στυγνάσας
  chosen: becoming gloomy
  alternatives:
  - disheartened
  - crestfallen
  - his face fell
  lexicon: BDAG
  rationale: The aorist participle denotes a visible darkening or somber reaction.
    'Becoming gloomy' preserves the image without over-paraphrasing. 'His face fell'
    is vivid but more interpretive; 'disheartened' captures emotion but loses the
    facial/visible nuance.
- source_word: ἐπὶ τῷ λόγῳ
  chosen: at the word
  alternatives:
  - because of this statement
  - at this saying
  lexicon: BDAG
  rationale: The phrase indicates the cause or occasion of his reaction. 'At the word'
    is fairly literal and readable, preserving the singular λόγῳ. 'Because of this
    statement' is smoother but slightly more expansive than the Greek.
- source_word: ἀπῆλθεν
  chosen: went away
  alternatives:
  - departed
  - went off
  lexicon: BDAG
  rationale: '''Went away'' is natural modern English and reflects the narrative movement.
    ''Departed'' is more formal; ''went off'' is too colloquial.'
- source_word: λυπούμενος
  chosen: grieving
  alternatives:
  - sorrowful
  - sad
  lexicon: BDAG
  rationale: The present participle conveys continuing sorrow as he leaves. 'Grieving'
    preserves the durative sense better than the adjectival 'sorrowful' and carries
    more weight than simply 'sad'.
- source_word: κτήματα πολλά
  chosen: many possessions
  alternatives:
  - great possessions
  - much property
  lexicon: BDAG
  rationale: κτήματα refers to property or possessions. 'Many possessions' closely
    matches πολλά and is idiomatic. 'Great possessions' is traditional but can suggest
    magnitude or status rather than number/extent; 'much property' is possible but
    less natural in this context.
- source_word: ἦν γὰρ ἔχων
  chosen: for he had
  alternatives:
  - for he was having
  - for he possessed
  lexicon: BDAG
  rationale: The periphrastic construction expresses his ongoing state of possessing
    wealth. English normally compresses this to 'he had.' 'He possessed' is acceptable
    but slightly stiffer.
