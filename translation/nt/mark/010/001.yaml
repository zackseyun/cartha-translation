theological_decisions:
- issue: Narrative historical present
  chosen_reading: Retained present 'he comes' in English
  alternative_readings:
  - Shift to past tense 'he went/came' for smoother English narrative
  rationale: This is not a doctrinal issue but affects transparency to the Greek text.
    Retaining the historical present preserves Mark's vivid narrative style while
    remaining readable.
  doctrine_reference: Translation philosophy §1, §6
- issue: Geographical phrase καὶ πέραν τοῦ Ἰορδάνου
  chosen_reading: Included as 'and beyond the Jordan' in the main text
  alternative_readings:
  - '''into the region of Judea beyond the Jordan'' as a single combined destination'
  rationale: The Greek wording is syntactically compressed and has prompted discussion
    about whether the phrase modifies Judea or adds a second geographic descriptor.
    The chosen rendering stays close to the Greek sequence and preserves the tension
    without over-resolving it.
  doctrine_reference: Translation philosophy §3
