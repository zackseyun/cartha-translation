- issue: Sense of salvation language in context
  chosen_reading: '''be saved'' retains the broader theological sense of entering
    God''s saving deliverance, not merely temporal rescue.'
  alternative_readings:
  - be rescued
  - be delivered
  rationale: Given the surrounding discussion of entering the kingdom of God and the
    difficulty for the rich, σωθῆναι should be rendered with salvation language rather
    than reduced to generic rescue terminology.
  doctrine_reference: 'Translation philosophy: preserve theological weight without
