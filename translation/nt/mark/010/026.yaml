id: MRK.10.26
reference: Mark 10:26
source:
  edition: SBLGNT
  text: οἱ δὲ περισσῶς ἐξεπλήσσοντο λέγοντες πρὸς ⸀ἑαυτούς· Καὶ τίς δύναται σωθῆναι;
translation:
  text: And they were exceedingly astonished, saying to one another, “Then who can
    be saved?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'among themselves' or more literally, 'to themselves.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ δὲ
  chosen: And they
  alternatives:
  - But they
  - And they
  lexicon: BDAG
  rationale: The article with δέ refers back to the disciples/listeners in context.
    'And they' gives natural English continuity while preserving the discourse progression
    signaled by δέ; 'But they' is possible but less necessary here.
- source_word: περισσῶς
  chosen: exceedingly
  alternatives:
  - greatly
  - all the more
  - beyond measure
  lexicon: BDAG
  rationale: The adverb intensifies the reaction. 'Exceedingly' preserves the strong
    degree without sounding overly paraphrastic; 'all the more' is possible in context
    but is less direct as a modifier of astonishment in English.
- source_word: ἐξεπλήσσοντο
  chosen: were ... astonished
  alternatives:
  - were amazed
  - were utterly astounded
  lexicon: BDAG
  rationale: The imperfect middle/passive indicates an ongoing or unfolding state
    of strong amazement. 'Were astonished' is a clear, natural rendering that preserves
    the force of the verb; the imperfect is reflected by 'were' rather than a simple
    punctiliar form.
- source_word: λέγοντες
  chosen: saying
  alternatives:
  - and saying
  - as they said
  lexicon: BDAG
  rationale: The participle is contemporaneous with the main verb and is naturally
    rendered with an English participial clause, linking their astonishment with their
    spoken response.
- source_word: πρὸς ἑαυτούς
  chosen: to one another
  alternatives:
  - among themselves
  - to themselves
  lexicon: BDAG
  rationale: 'Although literally ''to themselves,'' in this plural conversational
    context the idiomatic sense is reciprocal: they are speaking among themselves.
    ''To one another'' communicates the interpersonal force more clearly in modern
    English.'
- source_word: Καὶ
  chosen: Then
  alternatives:
  - And
  - So
  lexicon: BDAG
  rationale: Here καί introduces the content of their response with an inferential
    or consequential nuance in context after Jesus' teaching. 'Then' captures that
    rhetorical sense better than a bare 'And' in English dialogue.
- source_word: τίς
  chosen: who
  alternatives:
  - who then
  lexicon: BDAG
  rationale: The interrogative asks about any possible person. The added sense of
    consequence is already carried by 'Then,' so 'who' is sufficient here.
- source_word: δύναται
  chosen: can
  alternatives:
  - is able to
  lexicon: BDAG
  rationale: The verb denotes ability or possibility. 'Can' is the most natural modern
    English equivalent and fits the rhetorical question.
- source_word: σωθῆναι
  chosen: be saved
  alternatives:
  - be rescued
  - be delivered
  lexicon: BDAG
  rationale: In this salvation-context, the passive infinitive of σῴζω is best rendered
    'be saved.' Alternatives like 'be rescued' are lexically possible but would understate
    the theological and eschatological force of the saying in context.
