id: MRK.10.35
reference: Mark 10:35
source:
  edition: SBLGNT
  text: Καὶ προσπορεύονται αὐτῷ Ἰάκωβος καὶ Ἰωάννης ⸀οἱ υἱοὶ Ζεβεδαίου λέγοντες ⸀αὐτῷ·
    Διδάσκαλε, θέλομεν ἵνα ὃ ἐὰν αἰτήσωμέν ⸀σε ποιήσῃς ἡμῖν.
translation:
  text: And James and John, the sons of Zebedee, came to him and said to him, “Teacher,
    we want you to do for us whatever we ask of you.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “approached him.” The Greek verb can be rendered more literally as movement
      toward Jesus.
    reason: lexical_alternative
lexical_decisions:
- source_word: προσπορεύονται
  chosen: came to him
  alternatives:
  - approached him
  - went up to him
  lexicon: BDAG
  rationale: The present middle is narrative/historical present. 'Came to him' is
    natural modern English and captures movement toward Jesus without the slightly
    stiffer 'approached.'
- source_word: οἱ υἱοὶ Ζεβεδαίου
  chosen: the sons of Zebedee
  alternatives:
  - Zebedee's sons
  lexicon: BDAG
  rationale: A straightforward genitival identification. The fuller phrase preserves
    the appositional identification present in Greek.
- source_word: λέγοντες αὐτῷ
  chosen: said to him
  alternatives:
  - saying to him
  lexicon: BDAG
  rationale: English normally converts the participle plus indirect object into a
    finite verb in narrative. This preserves the sense without awkwardness.
- source_word: Διδάσκαλε
  chosen: Teacher
  alternatives:
  - Master
  lexicon: BDAG
  rationale: The vocative means 'Teacher.' 'Master' can suggest authority more than
    instruction and is less precise here. This also follows the philosophy of translating
    titles rather than preserving traditional but less exact renderings.
- source_word: θέλομεν
  chosen: we want
  alternatives:
  - we wish
  - we desire
  lexicon: BDAG
  rationale: '''Want'' is the plain sense in contemporary English and fits the directness
    of the request. ''Wish'' sounds too polite or formal.'
- source_word: ἵνα
  chosen: to
  alternatives:
  - that
  lexicon: BDAG
  rationale: After verbs of wanting in English, an infinitival construction is more
    idiomatic than 'we want that you should...' while preserving the intended result/purpose
    nuance.
- source_word: ὃ ἐὰν αἰτήσωμέν σε
  chosen: whatever we ask of you
  alternatives:
  - whatever we ask you
  - whatever we may ask of you
  lexicon: BDAG
  rationale: 'The combination of relative pronoun with ἐάν conveys indefiniteness:
    ''whatever.'' ''Ask of you'' makes the object relationship clear in natural English.'
- source_word: ποιήσῃς ἡμῖν
  chosen: to do for us
  alternatives:
  - to do for us what we ask
  - to grant to us
  lexicon: BDAG
  rationale: ποιέω is broadly 'do/make'; here 'do for us' best reflects the Greek
    without over-interpreting it as 'grant,' though that is the implied sense.
