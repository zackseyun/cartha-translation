theological_decisions:
- issue: Interpretation of the camel/needle image
  chosen_reading: Retain the literal hyperbolic image of a camel and a needle rather
    than interpreting it as a reference to a small gate or softening it into a mere
    proverb about difficulty.
  alternative_readings:
  - A supposed 'Needle Gate' in Jerusalem
  - '''rope'' instead of ''camel'' to reduce the extremity of the image'
  rationale: The Greek text itself presents a stark impossibility image. The translation
    should preserve the force of Jesus' saying rather than importing later explanatory
    traditions not warranted by the wording.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Preserve theological tension rather than resolve it.'
