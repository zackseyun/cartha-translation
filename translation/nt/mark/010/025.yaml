id: MRK.10.25
reference: Mark 10:25
source:
  edition: SBLGNT
  text: εὐκοπώτερόν ἐστιν κάμηλον διὰ ⸂τῆς τρυμαλιᾶς τῆς⸃ ῥαφίδος ⸀διελθεῖν ἢ πλούσιον
    εἰς τὴν βασιλείαν τοῦ θεοῦ εἰσελθεῖν.
translation:
  text: It is easier for a camel to go through the eye of a needle than for a rich
    man to enter the kingdom of God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'through a needle's eye.'
    reason: lexical_alternative
  - marker: b
    text: Some have proposed 'rope' instead of 'camel,' but the Greek text here reads
      'camel.'
    reason: alternative_reading
  - marker: c
    text: '''Rich man'' reflects the masculine singular form in Greek; the saying
      has representative force.'
    reason: cultural_note
lexical_decisions:
- source_word: εὐκοπώτερόν
  chosen: easier
  alternatives:
  - more possible
  - less difficult
  lexicon: BDAG
  rationale: Comparative adjective meaning 'easier' or 'more readily possible.' 'Easier'
    is the natural English comparative and preserves the hyperbolic comparison.
- source_word: κάμηλον
  chosen: camel
  alternatives:
  - rope
  lexicon: BDAG
  rationale: The attested word is κάμηλος, 'camel.' Although some have suggested a
    variant sense 'rope/cable' by confusion with κάμιλος, the source text here supports
    'camel,' and the vivid hyperbole is well established.
- source_word: διὰ τῆς τρυμαλιᾶς τῆς ῥαφίδος
  chosen: through the eye of a needle
  alternatives:
  - through a needle's eye
  lexicon: BDAG
  rationale: The genitive construction literally refers to the opening of a sewing
    needle. 'The eye of a needle' is standard, clear English and accurately conveys
    the image.
- source_word: διελθεῖν
  chosen: to go through
  alternatives:
  - to pass through
  lexicon: BDAG
  rationale: Aorist infinitive of διέρχομαι, 'to go through' or 'pass through.' 'Go
    through' is idiomatic and fits the concrete image.
- source_word: πλούσιον
  chosen: a rich man
  alternatives:
  - a rich person
  lexicon: BDAG
  rationale: The Greek adjective is masculine singular and functions substantivally.
    Per the translation philosophy, gender-accurate rendering is preferred; 'rich
    man' matches the grammatical form and the representative force of the saying.
- source_word: εἰς τὴν βασιλείαν τοῦ θεοῦ
  chosen: enter the kingdom of God
  alternatives:
  - enter into the kingdom of God
  lexicon: BDAG
  rationale: βασιλεία τοῦ θεοῦ is a central Gospel phrase. 'Kingdom of God' is the
    established and accurate rendering, and with εἰσελθεῖν naturally yields 'enter
    the kingdom of God.'
- source_word: εἰσελθεῖν
  chosen: to enter
  alternatives:
  - to go into
  lexicon: BDAG
  rationale: Aorist infinitive of εἰσέρχομαι. 'Enter' is concise and idiomatic in
    English, especially with 'kingdom of God.'
