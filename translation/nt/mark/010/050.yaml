id: MRK.10.50
reference: Mark 10:50
source:
  edition: SBLGNT
  text: ὁ δὲ ἀποβαλὼν τὸ ἱμάτιον αὐτοῦ ⸀ἀναπηδήσας ἦλθεν πρὸς τὸν Ἰησοῦν.
translation:
  text: And throwing off his cloak, he sprang up and came to Jesus.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'casting aside his garment.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀποβαλών
  chosen: throwing off
  alternatives:
  - casting aside
  - taking off
  lexicon: BDAG
  rationale: Aorist participle of ἀποβάλλω denotes a decisive act of discarding or
    throwing away. 'Throwing off' is vivid and natural English, preserving the abruptness
    better than the milder 'taking off.'
- source_word: ἱμάτιον
  chosen: cloak
  alternatives:
  - garment
  - outer garment
  - robe
  lexicon: BDAG
  rationale: ἱμάτιον commonly refers to an outer garment or cloak. 'Cloak' is concise,
    idiomatic, and fits the narrative setting better than the broader 'garment.'
- source_word: ἀναπηδήσας
  chosen: sprang up
  alternatives:
  - jumped up
  - leaped up
  lexicon: BDAG
  rationale: The participle conveys sudden energetic movement. 'Sprang up' preserves
    the immediacy and eagerness while sounding natural in modern English.
- source_word: ἦλθεν πρὸς τὸν Ἰησοῦν
  chosen: came to Jesus
  alternatives:
  - went to Jesus
  - came toward Jesus
  lexicon: BDAG
  rationale: ἔρχομαι with πρός here indicates movement toward and arrival at Jesus.
    'Came to Jesus' is the most idiomatic English rendering in this narrative context.
- source_word: δὲ
  chosen: And
  alternatives:
  - Now
  - Then
  - But
  lexicon: BDAG
  rationale: δέ here functions as a mild connective advancing the narrative. 'And'
    is smooth in English and avoids implying a stronger contrast than the Greek requires.
