theological_decisions:
- issue: Metaphorical language of 'cup' and 'baptism'
  chosen_reading: Retain both metaphors literally in the main text without explicating
    them as suffering, death, or divine wrath.
  alternative_readings:
  - Render interpretively as 'suffer the suffering I suffer' or similar
  rationale: The verse uses established biblical metaphors that point toward Jesus'
    coming suffering, but the text itself does not unpack them fully here. Preserving
    the metaphors maintains theological tension and avoids importing a narrower doctrinal
    explanation into the translation.
  doctrine_reference: Translation philosophy §3 Preserve theological tension rather
    than resolve it.
