id: MRK.10.38
reference: Mark 10:38
source:
  edition: SBLGNT
  text: ὁ δὲ Ἰησοῦς εἶπεν αὐτοῖς· Οὐκ οἴδατε τί αἰτεῖσθε· δύνασθε πιεῖν τὸ ποτήριον
    ὃ ἐγὼ πίνω, ⸀ἢ τὸ βάπτισμα ὃ ἐγὼ βαπτίζομαι βαπτισθῆναι;
translation:
  text: But Jesus said to them, “You do not know what you are asking. Are you able
    to drink the cup that I drink, or to be baptized with the baptism with which I
    am baptized?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The 'cup' is a biblical metaphor for the portion appointed to someone, here
      especially Jesus' coming suffering.
    reason: cross_reference
  - marker: b
    text: Or, more interpretively, 'to undergo the baptism that I undergo.' The Greek
      repeats the baptism word-group for emphasis.
    reason: lexical_alternative
lexical_decisions:
- source_word: Οὐκ οἴδατε
  chosen: You do not know
  alternatives:
  - You do not understand
  lexicon: BDAG
  rationale: The verb οἶδα primarily denotes knowing, though in context it can shade
    toward understanding. 'You do not know' stays closer to the Greek while remaining
    natural in English.
- source_word: τί αἰτεῖσθε
  chosen: what you are asking
  alternatives:
  - what you are requesting
  lexicon: BDAG
  rationale: αἰτέω commonly means ask/request. 'Asking' is the most idiomatic modern
    English here and preserves the directness of Jesus' rebuke.
- source_word: δύνασθε
  chosen: Are you able
  alternatives:
  - Can you
  lexicon: BDAG
  rationale: δύναμαι concerns ability or capability. 'Are you able' better preserves
    the sense of capacity than the more colloquial 'Can you.'
- source_word: πιεῖν τὸ ποτήριον ὃ ἐγὼ πίνω
  chosen: to drink the cup that I drink
  alternatives:
  - to drink the cup I drink
  lexicon: BDAG
  rationale: A relatively formal rendering preserves the metaphor of 'cup' as an appointed
    experience, especially suffering, without prematurely interpreting it in the main
    text.
- source_word: ποτήριον
  chosen: cup
  lexicon: BDAG
  rationale: The literal term 'cup' is retained because the metaphor is biblically
    significant and transparent enough in context; interpretive expansion such as
    'cup of suffering' would go beyond the Greek.
- source_word: ἢ
  chosen: or
  alternatives:
  - and
  lexicon: BDAG
  rationale: The conjunction is disjunctive in the Greek text here. Although some
    manuscript traditions read a fuller form reflected in parallels, the SBLGNT text
    supports 'or' without importing harmonization.
- source_word: τὸ βάπτισμα ὃ ἐγὼ βαπτίζομαι βαπτισθῆναι
  chosen: to be baptized with the baptism with which I am baptized
  alternatives:
  - to undergo the baptism that I undergo
  - to be baptized with the baptism I am baptized with
  lexicon: BDAG
  rationale: The Greek is rhetorically repetitive, using cognate noun and verb. This
    translation preserves that repetition and the metaphorical force. 'Undergo' is
    smoother but less transparent to the lexical connection with baptism.
- source_word: βαπτίζομαι ... βαπτισθῆναι
  chosen: be baptized ... I am baptized
  alternatives:
  - undergo ... I undergo
  lexicon: BDAG
  rationale: βάπτισμα/βαπτίζω is rendered with 'baptism/baptized' rather than a paraphrase
    to preserve the metaphor and intertextual resonance. The passive forms are maintained
    rather than converted into an abstract experience.
- source_word: ὁ δὲ Ἰησοῦς εἶπεν αὐτοῖς
  chosen: But Jesus said to them
  alternatives:
  - And Jesus said to them
  lexicon: BDAG
  rationale: δέ often marks mild contrast or continuation. 'But' fits the corrective
    turn in Jesus' response to their request.
