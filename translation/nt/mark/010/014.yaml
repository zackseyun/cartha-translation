id: MRK.10.14
reference: Mark 10:14
source:
  edition: SBLGNT
  text: ἰδὼν δὲ ὁ Ἰησοῦς ἠγανάκτησεν καὶ εἶπεν αὐτοῖς· Ἄφετε τὰ παιδία ἔρχεσθαι πρός
    με, μὴ κωλύετε αὐτά, τῶν γὰρ τοιούτων ἐστὶν ἡ βασιλεία τοῦ θεοῦ.
translation:
  text: But when Jesus saw it, he was indignant and said to them, “Let the children
    come to me; do not hinder them, for the kingdom of God belongs to such as these.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, “for of such is the kingdom of God.”
    reason: lexical_alternative
lexical_decisions:
- source_word: ἰδὼν
  chosen: when Jesus saw it
  alternatives:
  - seeing this
  - when he saw
  lexicon: BDAG
  rationale: Aorist participle introducing the circumstance for Jesus' reaction. English
    supplies 'it/this' from context because the participle is absolute in Greek but
    naturally requires an object in English.
- source_word: δὲ
  chosen: But
  alternatives:
  - and
  - now
  lexicon: BDAG
  rationale: Marks a mild contrast with the disciples' rebuking in the previous verse;
    'But' best carries the adversative force in context.
- source_word: ἠγανάκτησεν
  chosen: was indignant
  alternatives:
  - was displeased
  - became angry
  lexicon: BDAG
  rationale: Conveys strong displeasure or indignation. 'Was indignant' preserves
    the moral force without overstating it as uncontrolled anger.
- source_word: εἶπεν αὐτοῖς
  chosen: said to them
  alternatives:
  - told them
  lexicon: BDAG
  rationale: Standard speech formula; 'said to them' is straightforward and sufficiently
    formal.
- source_word: Ἄφετε
  chosen: Let
  alternatives:
  - Allow
  - Permit
  lexicon: BDAG
  rationale: Imperative of ἀφίημι here means to allow or permit. 'Let' is idiomatic
    in the fixed expression 'Let the children come to me.'
- source_word: τὰ παιδία
  chosen: the children
  alternatives:
  - the little children
  - the young children
  lexicon: BDAG
  rationale: παιδία refers to children; 'the children' is accurate and avoids importing
    a diminutive not explicit in the noun itself, though the context involves young
    ones.
- source_word: ἔρχεσθαι πρός με
  chosen: come to me
  alternatives:
  - come toward me
  lexicon: BDAG
  rationale: Natural English rendering of the infinitive with πρός + accusative expressing
    movement toward Jesus.
- source_word: μὴ κωλύετε αὐτά
  chosen: do not hinder them
  alternatives:
  - do not stop them
  - do not prevent them
  lexicon: BDAG
  rationale: Present imperative with μή commonly forbids an action or commands cessation.
    'Do not hinder them' is concise and preserves the sense of obstructing access.
- source_word: τῶν γὰρ τοιούτων
  chosen: for ... belongs to such as these
  alternatives:
  - for of such is
  - for to such belongs
  lexicon: BDAG
  rationale: τοιοῦτος denotes those of this kind. The phrase points not merely to
    these individual children but to people like them. 'Such as these' communicates
    the representative force in idiomatic English.
- source_word: ἡ βασιλεία τοῦ θεοῦ
  chosen: the kingdom of God
  alternatives:
  - God's kingdom
  - the reign of God
  lexicon: BDAG
  rationale: Standard and transparent rendering. 'Kingdom of God' preserves the established
    biblical phrase while still being natural English.
- source_word: ἐστὶν
  chosen: belongs to
  alternatives:
  - is
  - is for
  lexicon: BDAG
  rationale: Although the Greek simply says 'is,' English idiom with a genitive phrase
    like 'of such is the kingdom' is best expressed as 'belongs to such as these'
    to preserve the meaning without wooden wording.
