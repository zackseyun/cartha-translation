theological_decisions:
- issue: Meaning of 'of such is the kingdom of God'
  chosen_reading: The statement refers representatively to people like these children,
    not exclusively to the specific children present.
  alternative_readings:
  - The kingdom consists only of literal children
  - The phrase should be left as a more wooden 'of such is the kingdom of God' without
    clarifying representative force
  rationale: τοιούτων naturally means 'such ones' or 'people of this kind.' The translation
    should preserve Jesus' broader point while avoiding doctrinal overreach about
    innocence or automatic salvation of children, which the text itself does not state.
  doctrine_reference: Preserve theological tension rather than resolve it; do not
    import doctrinal claims the text does not make.
