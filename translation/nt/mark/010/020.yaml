id: MRK.10.20
reference: Mark 10:20
source:
  edition: SBLGNT
  text: ὁ δὲ ⸀ἔφη αὐτῷ· Διδάσκαλε, ταῦτα πάντα ἐφυλαξάμην ἐκ νεότητός μου.
translation:
  text: And he said to him, “Teacher, I have kept all these things from my youth.”
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἔφη
  chosen: said
  alternatives:
  - answered
  - told
  lexicon: BDAG
  rationale: A standard narrative speech verb. 'Said' is the most natural and sufficiently
    formal rendering in context.
- source_word: Διδάσκαλε
  chosen: Teacher
  alternatives:
  - Master
  lexicon: BDAG
  rationale: The vocative of διδάσκαλος refers to one who teaches. 'Teacher' reflects
    the plain sense better than the more traditional 'Master,' which can suggest authority
    beyond the lexical meaning here.
- source_word: ταῦτα πάντα
  chosen: all these things
  alternatives:
  - all these
  - all this
  lexicon: BDAG
  rationale: The combination of demonstrative plus πᾶς is naturally rendered 'all
    these things.' Including 'things' makes the English idiomatic while preserving
    the object of what has been kept, namely the commandments just mentioned.
- source_word: ἐφυλαξάμην
  chosen: have kept
  alternatives:
  - have observed
  - have obeyed
  - guarded
  lexicon: BDAG
  rationale: φυλάσσω can mean keep, guard, observe. In the context of commandments,
    'have kept' is both idiomatic and close to the Greek. The aorist is best rendered
    in English here as a present perfect summarizing his past conduct up to the present.
- source_word: ἐκ νεότητός μου
  chosen: from my youth
  alternatives:
  - since my youth
  - from my childhood
  lexicon: BDAG
  rationale: ἐκ with a temporal genitive marks the starting point. 'From my youth'
    is a natural English rendering and preserves the sense without overstating the
    age range as 'childhood' might.
- source_word: ὁ δὲ
  chosen: And he
  alternatives:
  - But he
  - Then he
  lexicon: BDAG
  rationale: δέ here functions as a mild connective in narrative. 'And he' fits smooth
    modern English while preserving the flow better than the more contrastive 'But
    he.'
