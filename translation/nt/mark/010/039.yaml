id: MRK.10.39
reference: Mark 10:39
source:
  edition: SBLGNT
  text: οἱ δὲ εἶπαν αὐτῷ· Δυνάμεθα. ὁ δὲ Ἰησοῦς εἶπεν αὐτοῖς· ⸀Τὸ ποτήριον ὃ ἐγὼ πίνω
    πίεσθε καὶ τὸ βάπτισμα ὃ ἐγὼ βαπτίζομαι βαπτισθήσεσθε,
translation:
  text: And they said to him, “We are able.” But Jesus said to them, “The cup that
    I drink, you will drink; and the baptism with which I am baptized, you will be
    baptized,”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “We can.”
    reason: lexical_alternative
  - marker: b
    text: “Cup” and “baptism” are metaphors for the suffering and destiny Jesus is
      about to undergo, which his disciples will also share.
    reason: cross_reference
lexical_decisions:
- source_word: Δυνάμεθα
  chosen: We are able
  alternatives:
  - We can
  lexicon: BDAG
  rationale: Rendered more formally as “We are able” to reflect the present middle/passive
    indicative of δύναμαι and the solemnity of the exchange; “We can” is a natural
    English alternative but slightly less weighty.
- source_word: ποτήριον
  chosen: cup
  lexicon: BDAG
  rationale: Kept as “cup,” preserving the metaphorical image used in biblical literature
    for an allotted experience, especially suffering or destiny, without over-interpreting
    it in the main text.
- source_word: πίνω / πίεσθε
  chosen: I drink / you will drink
  alternatives:
  - am drinking / will drink
  lexicon: BDAG
  rationale: Translated with simple present and future to preserve the verbal parallel
    and natural English style. The wording retains the metaphor of sharing in Jesus’s
    suffering.
- source_word: βάπτισμα
  chosen: baptism
  alternatives:
  - immersion
  lexicon: BDAG
  rationale: Rendered as “baptism,” the standard gloss, while preserving the metaphorical
    force of an overwhelming experience. “Immersion” is possible lexically but less
    idiomatic here and would obscure the intertextual resonance.
- source_word: βαπτίζομαι / βαπτισθήσεσθε
  chosen: I am baptized / you will be baptized
  alternatives:
  - I undergo / you will undergo
  lexicon: BDAG
  rationale: Maintains the verbal connection to βάπτισμα and preserves the metaphor
    rather than flattening it into interpretation. The passive forms are reflected
    directly in English.
- source_word: ὁ δὲ Ἰησοῦς εἶπεν αὐτοῖς
  chosen: But Jesus said to them
  alternatives:
  - And Jesus said to them
  lexicon: BDAG
  rationale: δέ is rendered “But” to mark the mild contrast between the disciples’
    confident claim and Jesus’s corrective response.
- source_word: τὸ βάπτισμα ὃ ἐγὼ βαπτίζομαι
  chosen: the baptism with which I am baptized
  alternatives:
  - the baptism that I undergo
  lexicon: BDAG
  rationale: Used “with which” to express the instrumental sense naturally in English
    while preserving the repeated baptism language of the Greek.
