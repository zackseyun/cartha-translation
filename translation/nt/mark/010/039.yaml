theological_decisions:
- issue: Metaphorical language of cup and baptism
  chosen_reading: Preserve both metaphors in the main text as references to the suffering
    and destiny Jesus will share with his disciples, without making the interpretation
    explicit in translation.
  alternative_readings:
  - Interpret “cup” and “baptism” directly as suffering, death, or martyrdom in the
    main text
  rationale: The verse uses established biblical metaphors that carry theological
    weight. Optimal equivalence favors retaining the imagery and letting context supply
    the meaning rather than replacing the metaphors with an interpretive paraphrase.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Relation of the saying to sacramental baptism
  chosen_reading: Translate βάπτισμα as “baptism” while allowing the context to indicate
    metaphorical suffering rather than explicitly sacramental baptism.
  alternative_readings:
  - Render as “ordeal” or “immersion” to avoid sacramental misunderstanding
  rationale: The Greek term is βάπτισμα, and the translation should preserve the lexical
    form unless context plainly demands otherwise. The immediate context points to
    suffering, but the text itself retains the baptism metaphor.
  doctrine_reference: Translation philosophy §§1, 5, 6
