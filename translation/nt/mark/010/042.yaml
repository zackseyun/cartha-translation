id: MRK.10.42
reference: Mark 10:42
source:
  edition: SBLGNT
  text: ⸂καὶ προσκαλεσάμενος αὐτοὺς ὁ Ἰησοῦς⸃ λέγει αὐτοῖς· Οἴδατε ὅτι οἱ δοκοῦντες
    ἄρχειν τῶν ἐθνῶν κατακυριεύουσιν αὐτῶν καὶ οἱ μεγάλοι αὐτῶν κατεξουσιάζουσιν αὐτῶν.
translation:
  text: And Jesus called them to himself and said to them, “You know that those who
    are considered rulers of the Gentiles lord it over them, and their great ones
    exercise authority over them.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “of the nations.”
    reason: lexical_alternative
  - marker: b
    text: Or “those who seem to rule the Gentiles.”
    reason: alternative_reading
lexical_decisions:
- source_word: προσκαλεσάμενος
  chosen: called ... to himself
  alternatives:
  - called ... over
  - summoned
  lexicon: BDAG
  rationale: The middle voice of προσκαλέομαι commonly carries the sense of calling
    someone to oneself. 'Called them to himself' is natural English and preserves
    the relational nuance better than the flatter 'summoned,' while still reflecting
    the participial action preceding Jesus' speech.
- source_word: λέγει
  chosen: said
  alternatives:
  - says
  lexicon: BDAG
  rationale: Although the Greek uses the historical present ('says'), English narrative
    style commonly shifts this to the simple past for readability. This is a standard
    optimal-equivalence adjustment that preserves the discourse function without sounding
    awkward.
- source_word: Οἴδατε
  chosen: You know
  alternatives:
  - You understand
  - You are aware
  lexicon: BDAG
  rationale: The perfect-form verb οἶδα functions with present meaning, expressing
    settled knowledge. 'You know' is the most direct and idiomatic rendering.
- source_word: οἱ δοκοῦντες ἄρχειν
  chosen: those who are considered rulers
  alternatives:
  - those who seem to rule
  - those who are thought to rule
  - those recognized as rulers
  lexicon: BDAG
  rationale: δοκοῦντες can mean 'seeming' or 'being regarded as.' In this context
    Jesus refers to those acknowledged as rulers among the nations, not merely apparent
    rulers. Rendering the infinitive ἄρχειν with the noun idea 'rulers' produces clear
    English while preserving the sense.
- source_word: τῶν ἐθνῶν
  chosen: of the Gentiles
  alternatives:
  - of the nations
  lexicon: BDAG
  rationale: In this Jewish-context saying, ἔθνη naturally refers to the non-Jewish
    nations, i.e., the Gentiles. 'Gentiles' preserves the contrast implicit in the
    Gospel setting better than the more generic 'nations.'
- source_word: κατακυριεύουσιν
  chosen: lord it over
  alternatives:
  - dominate
  - rule over harshly
  - exercise lordship over
  lexicon: BDAG
  rationale: '''Lord it over'' captures the abusive or domineering force of the compound
    verb better than the neutral ''rule over.'' It is also a well-established English
    equivalent that preserves the negative connotation.'
- source_word: οἱ μεγάλοι αὐτῶν
  chosen: their great ones
  alternatives:
  - their great men
  - their high officials
  - their important ones
  lexicon: BDAG
  rationale: μέγαλοι here refers to socially prominent or powerful persons. 'Their
    great ones' is slightly formal but transparent and avoids over-specifying an office
    not stated in the Greek. It also preserves the parallelism with the previous clause.
- source_word: κατεξουσιάζουσιν
  chosen: exercise authority over
  alternatives:
  - domineer over
  - wield power over
  lexicon: BDAG
  rationale: The verb denotes exercising authority, often in an overbearing way. 'Exercise
    authority over' is a clear base rendering; the oppressive nuance is already strongly
    conveyed by the parallel 'lord it over,' and over-translating both verbs with
    equally harsh English risks flattening their distinction.
