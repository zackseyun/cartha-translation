theological_decisions:
- issue: Referent of τῶν ἐθνῶν
  chosen_reading: Gentiles
  alternative_readings:
  - nations
  rationale: The saying contrasts the power structures typical of non-Jewish rulers
    with the pattern Jesus sets for his disciples. 'Gentiles' best reflects the contextual
    force in Mark's Jewish-Gospel setting while remaining lexically defensible.
  doctrine_reference: Translation philosophy §1, §5
- issue: Force of δοκοῦντες
  chosen_reading: those who are considered rulers
  alternative_readings:
  - those who seem to rule
  rationale: The phrase is not used to deny their actual authority but to characterize
    those recognized as rulers in the Gentile world. This avoids importing cynicism
    into Jesus' statement while preserving the Greek participle's nuance of public
    estimation.
  doctrine_reference: Translation philosophy §1, §3
