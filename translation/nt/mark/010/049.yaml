id: MRK.10.49
reference: Mark 10:49
source:
  edition: SBLGNT
  text: καὶ στὰς ὁ Ἰησοῦς εἶπεν· ⸂Φωνήσατε αὐτόν⸃. καὶ φωνοῦσι τὸν τυφλὸν λέγοντες
    αὐτῷ· Θάρσει, ⸀ἔγειρε, φωνεῖ σε.
translation:
  text: And Jesus stopped and said, “Call him.” So they called the blind man, saying
    to him, “Take courage; get up, he is calling you.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Take heart.”
    reason: lexical_alternative
  - marker: b
    text: Literally “having stood”; idiomatically, “stopped” or “stood still.”
    reason: lexical_alternative
lexical_decisions:
- source_word: στὰς
  chosen: stopped
  alternatives:
  - stood still
  - having stood
  lexicon: BDAG
  rationale: Although the participle from ἵστημι is formally 'having stood,' in this
    narrative context it idiomatically conveys that Jesus halted his movement. 'Stopped'
    is natural modern English and preserves the action without wooden phrasing.
- source_word: Φωνήσατε αὐτόν
  chosen: Call him
  alternatives:
  - Summon him
  lexicon: BDAG
  rationale: φωνέω here means to call for or summon someone. 'Call him' is direct,
    idiomatic, and matches the repetition of the same verb later in the verse.
- source_word: φωνοῦσι
  chosen: they called
  alternatives:
  - they summoned
  lexicon: BDAG
  rationale: Using 'called' maintains lexical consistency with Jesus' command Φωνήσατε
    while fitting the narrative flow.
- source_word: τὸν τυφλὸν
  chosen: the blind man
  alternatives:
  - the blind one
  lexicon: BDAG
  rationale: The adjective τυφλός is substantival here. 'The blind man' is natural
    English and accurately reflects a male individual in context.
- source_word: Θάρσει
  chosen: Take courage
  alternatives:
  - Be encouraged
  - Take heart
  lexicon: BDAG
  rationale: The imperative conveys encouragement and reassurance. 'Take courage'
    is clear modern English and preserves the force without sounding overly colloquial.
- source_word: ἔγειρε
  chosen: get up
  alternatives:
  - rise
  - stand up
  lexicon: BDAG
  rationale: The imperative is a call to rise. 'Get up' is idiomatic and fits the
    immediate action expected of Bartimaeus.
- source_word: φωνεῖ σε
  chosen: he is calling you
  alternatives:
  - he calls you
  - he is summoning you
  lexicon: BDAG
  rationale: The present tense naturally carries progressive force in English in this
    context. 'He is calling you' communicates the immediacy of Jesus' summons.
