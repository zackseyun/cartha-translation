theological_decisions:
- issue: Narrative identification of Bartimaeus
  chosen_reading: Retain both the Semitic personal name and Mark's explanatory phrase
    'the son of Timaeus' in the main text.
  alternative_readings:
  - Translate only 'son of Timaeus' and omit the explanatory apposition
  - Retain 'Bartimaeus' without the explanation
  rationale: The verse itself supplies both the name and its explanation; preserving
    both avoids unnecessary reduction and keeps the narrative detail auditable. This
    is not a doctrinally contested issue, but it reflects the source-text-first philosophy.
  doctrine_reference: Translation philosophy §1, §2
