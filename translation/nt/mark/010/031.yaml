theological_decisions:
- issue: Nature of the reversal saying
  chosen_reading: Render the statement as a general principle of eschatological reversal
    without specifying social, moral, or salvific categories beyond the text.
  alternative_readings:
  - Interpret 'first' and 'last' specifically as rich and poor
  - Interpret it specifically as disciples and outsiders
  - Interpret it as an absolute rule applying to every individual case
  rationale: The verse states a broad paradoxical principle in context, but it does
    not itself define the categories exhaustively. The translation therefore preserves
    the terse, open formulation rather than narrowing it to one theological application.
  doctrine_reference: Preserve theological tension rather than resolve it.
