id: MRK.10.43
reference: Mark 10:43
source:
  edition: SBLGNT
  text: οὐχ οὕτως δέ ⸀ἐστιν ἐν ὑμῖν· ἀλλ’ ὃς ⸀ἂν θέλῃ ⸂μέγας γενέσθαι⸃ ἐν ὑμῖν, ἔσται
    ὑμῶν διάκονος,
translation:
  text: But it is not so among you. Instead, whoever wants to become great among you
    will be your servant,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'But it is not this way among you.'
    reason: lexical_alternative
  - marker: b
    text: 'The future verb ''will be'' can also carry the sense ''must be'' in context:
      whoever wants to become great among you must be your servant.'
    reason: alternative_reading
lexical_decisions:
- source_word: οὐχ οὕτως δέ ἐστιν ἐν ὑμῖν
  chosen: But it is not so among you
  alternatives:
  - But it is not this way among you
  - Yet it is not so among you
  lexicon: BDAG
  rationale: Renders the negated manner expression naturally in English while preserving
    the contrast with the surrounding discussion of Gentile rulers. 'But' reflects
    δέ as adversative/contrastive in context; 'it is not so' is concise and idiomatic
    for οὐχ οὕτως ... ἐστιν.
- source_word: ἀλλ’
  chosen: Instead
  alternatives:
  - But
  - Rather
  lexicon: BDAG
  rationale: Marks the strong contrast between worldly patterns of greatness and Jesus'
    kingdom pattern. 'Instead' makes the corrective force clear in modern English.
- source_word: ὃς ἂν θέλῃ
  chosen: whoever wants
  alternatives:
  - whoever desires
  - whoever wishes
  lexicon: BDAG
  rationale: The relative clause with ἄν and subjunctive expresses an indefinite/general
    condition. 'Whoever wants' is natural English and preserves the volitional sense
    of θέλω.
- source_word: μέγας γενέσθαι
  chosen: to become great
  alternatives:
  - to be great
  - to become important
  lexicon: BDAG
  rationale: γενέσθαι is ingressive ('become'), not merely stative ('be'). 'Great'
    preserves the comparative-status language of μέγας without importing modern notions
    of fame only.
- source_word: ἐν ὑμῖν
  chosen: among you
  alternatives:
  - in your midst
  - among yourselves
  lexicon: BDAG
  rationale: This phrase occurs twice and is rendered consistently. 'Among you' best
    fits the communal/social sense in context.
- source_word: ἔσται ὑμῶν διάκονος
  chosen: will be your servant
  alternatives:
  - must be your servant
  - will be servant of you
  lexicon: BDAG
  rationale: διάκονος commonly denotes one who serves, minister/servant, rather than
    δοῦλος. 'Servant' is therefore preferable to 'slave' here. The future ἔσται can
    function imperativally in context, but 'will be' preserves the Greek form while
    still conveying Jesus' normative instruction.
