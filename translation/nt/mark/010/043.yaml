theological_decisions:
- issue: Force of the future verb ἔσται in Jesus' instruction
  chosen_reading: Rendered as 'will be your servant' rather than an explicit imperative
    such as 'must be your servant'
  alternative_readings:
  - must be your servant
  - shall be your servant
  rationale: The future indicative in this context carries instructional force, but
    the translation preserves the Greek verbal form rather than heightening it into
    a direct command. This maintains the saying's paradoxical kingdom pattern without
    over-interpreting the syntax.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve the source
    text''s sense without paraphrastic expansion.'
- issue: Rendering διάκονος
  chosen_reading: servant
  alternative_readings:
  - minister
  rationale: The term here refers to humble service within the community, not an ecclesiastical
    office. 'Servant' communicates the social and ethical force clearly and avoids
    importing later church-office connotations.
  doctrine_reference: 'Contested terms table: δοῦλος servant/slave context-dependent;
    consistency of key terms with documented exception. Although διάκονος is not δοῦλος,
    the same sensitivity to bonded vs. service language applies.'
