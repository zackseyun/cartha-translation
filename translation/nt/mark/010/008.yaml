theological_decisions:
- issue: Meaning of 'one flesh' in Jesus' citation of Genesis
  chosen_reading: Retain the covenantal-marital expression 'one flesh' without interpretive
    expansion.
  alternative_readings:
  - one body
  - one person
  - sexually united
  rationale: The phrase carries rich theological and anthropological significance
    in the biblical canon, but the verse itself does not narrowly define it. Preserving
    the source expression maintains the text's intended breadth and avoids importing
    a reductionistic doctrinal explanation.
  doctrine_reference: Preserve theological tension rather than resolve it; σάρξ default
    guidance
