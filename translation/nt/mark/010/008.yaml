id: MRK.10.8
reference: Mark 10:8
source:
  edition: SBLGNT
  text: καὶ ἔσονται οἱ δύο εἰς σάρκα μίαν· ὥστε οὐκέτι εἰσὶν δύο ἀλλὰ μία σάρξ·
translation:
  text: and the two will become one flesh. So they are no longer two, but one flesh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'and the two will be into one flesh.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔσονται
  chosen: will become
  alternatives:
  - will be
  lexicon: BDAG
  rationale: Although the verb is from εἰμί ('to be'), in this citation formula with
    εἰς plus predicate accusative ('into one flesh'), idiomatic English is better
    expressed as 'will become,' reflecting resultant union rather than static existence.
- source_word: οἱ δύο
  chosen: the two
  alternatives:
  - both
  lexicon: BDAG
  rationale: The article plus numeral is naturally rendered 'the two,' preserving
    the explicit duality emphasized in the quotation from Genesis and in the following
    contrast with 'no longer two.'
- source_word: εἰς σάρκα μίαν
  chosen: one flesh
  alternatives:
  - into one flesh
  lexicon: BDAG
  rationale: This is a fixed biblical expression for marital union. English normally
    omits 'into' here, while retaining the sense of movement toward union through
    'will become one flesh.'
- source_word: σάρκα / σάρξ
  chosen: flesh
  alternatives:
  - body
  lexicon: BDAG
  rationale: Per the doctrine guidance on σάρξ, the literal sense is appropriate here,
    not the metaphorical 'sinful nature.' 'Flesh' preserves the intertextual link
    to Genesis and the covenantal-marital idiom.
- source_word: ὥστε
  chosen: So
  alternatives:
  - therefore
  - therefore then
  - so that
  lexicon: BDAG
  rationale: Here ὥστε introduces the result or inference drawn from the preceding
    statement. 'So' is natural modern English and preserves the logical connection
    without sounding overly formal.
- source_word: οὐκέτι
  chosen: no longer
  alternatives:
  - not anymore
  lexicon: BDAG
  rationale: '''No longer'' is the standard concise rendering for cessation from a
    previous state and fits the solemn tone.'
- source_word: ἀλλὰ μία σάρξ
  chosen: but one flesh
  alternatives:
  - but one body
  lexicon: BDAG
  rationale: The adversative contrast is central to Jesus' argument about marriage.
    'One flesh' preserves the exact conceptual and scriptural wording rather than
    substituting a looser expression.
