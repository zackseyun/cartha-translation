theological_decisions:
- issue: Meaning of 'in your glory'
  chosen_reading: A reference to Jesus' future exaltation/royal glory, left somewhat
    open rather than specifying a detailed eschatological scene.
  alternative_readings:
  - in your kingdom
  - when you are glorified
  rationale: The Greek text says 'in your glory,' not explicitly 'in your kingdom,'
    though the request concerns places of honor in Jesus' coming reign. The translation
    preserves the wording and theological tension without importing a fuller interpretive
    paraphrase.
  doctrine_reference: Preserve theological tension rather than resolve it.
