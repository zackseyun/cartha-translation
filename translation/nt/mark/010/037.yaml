id: MRK.10.37
reference: Mark 10:37
source:
  edition: SBLGNT
  text: οἱ δὲ εἶπαν αὐτῷ· Δὸς ἡμῖν ἵνα εἷς ⸂σου ἐκ δεξιῶν⸃ καὶ εἷς ἐξ ⸀ἀριστερῶν καθίσωμεν
    ἐν τῇ δόξῃ σου.
translation:
  text: They said to him, “Grant to us that one of us may sit at your right and one
    at your left in your glory.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Grant us that we may sit, one at your right and one at your left, in
      your glory.”
    reason: lexical_alternative
lexical_decisions:
- source_word: Δὸς
  chosen: Grant
  alternatives:
  - Give
  lexicon: BDAG
  rationale: Although the verb is literally 'give,' in this request formula idiomatic
    English prefers 'grant' to convey a petition for permission or favor rather than
    a transfer of an object.
- source_word: ἡμῖν
  chosen: to us
  alternatives:
  - us
  lexicon: BDAG
  rationale: Rendered explicitly with the preposition in English after 'grant' for
    natural syntax while preserving the dative sense.
- source_word: ἵνα ... καθίσωμεν
  chosen: that ... may sit
  alternatives:
  - that ... might sit
  - to let ... sit
  lexicon: BDAG
  rationale: The ἵνα clause with aorist subjunctive expresses the content of the request.
    'May sit' is natural English and preserves the requested outcome without over-paraphrase.
- source_word: εἷς ... καὶ εἷς
  chosen: one of us ... and one
  alternatives:
  - one ... and one
  - one person ... and one person
  lexicon: BDAG
  rationale: The Greek says literally 'one ... and one,' but the speakers are two
    brothers asking for the two places. 'One of us ... and one' makes the implied
    reference explicit in idiomatic English without changing the sense.
- source_word: ἐκ δεξιῶν / ἐξ ἀριστερῶν
  chosen: at your right / at your left
  alternatives:
  - on your right / on your left
  - from your right / from your left
  lexicon: BDAG
  rationale: These prepositional phrases are idiomatically locative in context, referring
    to positions of honor beside Jesus. 'At your right ... at your left' is clear
    modern English.
- source_word: δόξῃ
  chosen: glory
  alternatives:
  - glorious splendor
  - honor
  lexicon: BDAG
  rationale: '''Glory'' is the standard and theologically weighty rendering of δόξα
    here, referring to Jesus'' exalted state or royal manifestation. Alternatives
    either over-interpret or weaken the term.'
