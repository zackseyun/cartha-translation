theological_decisions:
- issue: Rendering the generic masculine ἀνδρὶ in a legal-marital question
  chosen_reading: for a man
  alternative_readings:
  - for a husband
  rationale: Following the gender-accurate principle, the Greek singular masculine
    generic is preserved as 'man.' The marital context is still clear through 'divorce
    his wife.' This avoids flattening the source's form while remaining natural English.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §4 (Gender-accurate over
    gender-neutral)'
