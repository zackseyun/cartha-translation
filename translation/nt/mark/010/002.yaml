id: MRK.10.2
reference: Mark 10:2
source:
  edition: SBLGNT
  text: ⸀Καὶ ⸀ἐπηρώτων αὐτὸν εἰ ἔξεστιν ἀνδρὶ γυναῖκα ἀπολῦσαι, πειράζοντες αὐτόν.
translation:
  text: And they were asking him whether it is lawful for a man to divorce his wife,
    testing him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'whether it is lawful for a husband to divorce his wife.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπηρώτων
  chosen: were asking
  alternatives:
  - asked
  - questioned
  lexicon: BDAG
  rationale: Imperfect tense indicates ongoing or repeated action, best reflected
    by 'were asking' rather than simple past 'asked.' 'Questioned' is possible, but
    'asking' is more natural here.
- source_word: ἔξεστιν
  chosen: it is lawful
  alternatives:
  - it is permitted
  - it is allowed
  lexicon: BDAG
  rationale: In this dispute context about divorce, the issue is not mere possibility
    but permissibility under law/custom. 'Lawful' captures the juridical nuance better
    than the more generic 'allowed.'
- source_word: ἀνδρὶ
  chosen: for a man
  alternatives:
  - for a husband
  lexicon: BDAG
  rationale: The noun can mean 'man' or 'husband.' Because γυναῖκα lacks an explicit
    possessive and the construction is generic, 'for a man' preserves the representative/generic
    force. The marital context is then made explicit by rendering γυναῖκα as 'his
    wife.'
- source_word: γυναῖκα
  chosen: his wife
  alternatives:
  - a wife
  - woman
  lexicon: BDAG
  rationale: 'In context with ἀπολῦσαι and the legal question of divorce, γυνή clearly
    refers to a wife rather than a generic woman. English idiom normally supplies
    the possessive in this construction: ''divorce his wife.'''
- source_word: ἀπολῦσαι
  chosen: to divorce
  alternatives:
  - to send away
  - to dismiss
  lexicon: BDAG
  rationale: Although the verb literally can mean 'to release' or 'send away,' in
    this marital-legal context it idiomatically means 'to divorce.' This avoids obscuring
    the issue under discussion.
- source_word: πειράζοντες
  chosen: testing
  alternatives:
  - tempting
  - trying to trap
  lexicon: BDAG
  rationale: The participle indicates hostile probing of Jesus. 'Testing' is the most
    direct rendering and avoids over-paraphrase. 'Tempting' is traditional but can
    mislead modern readers; 'trying to trap' is interpretive expansion.
- source_word: Καὶ
  chosen: And
  alternatives:
  - Now
  - Then
  lexicon: BDAG
  rationale: A simple connective is sufficient. 'And' preserves the narrative flow
    without adding temporal nuance not explicit in the conjunction.
