id: MRK.10.44
reference: Mark 10:44
source:
  edition: SBLGNT
  text: καὶ ὃς ⸀ἂν θέλῃ ⸂ἐν ὑμῖν εἶναι⸃ πρῶτος, ἔσται πάντων δοῦλος·
translation:
  text: And whoever wants to be first among you will be slave of all.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "servant of all." The Greek word is doulos, a stronger term than the
      word for "servant" in the previous verse, so "slave" is used here to preserve
      the contrast.
    reason: alternative_reading
lexical_decisions:
- source_word: ὃς ἂν θέλῃ
  chosen: whoever wants
  alternatives:
  - whoever desires
  - whoever wishes
  lexicon: BDAG
  rationale: 'The relative pronoun with ἄν and the subjunctive expresses an indefinite/general
    condition: ''whoever'' or ''anyone who.'' ''Wants'' is natural modern English
    for θέλω and preserves the volitional sense without sounding overly formal.'
- source_word: ἐν ὑμῖν
  chosen: among you
  alternatives:
  - in your midst
  - among yourselves
  lexicon: BDAG
  rationale: In this social-ranking context, ἐν ὑμῖν idiomatically means 'among you,'
    referring to status within the disciple group rather than mere spatial location.
- source_word: πρῶτος
  chosen: first
  alternatives:
  - foremost
  - greatest
  lexicon: BDAG
  rationale: πρῶτος denotes being first in rank or prominence. 'First' is the most
    direct rendering and also preserves the verbal parallel with the surrounding teaching
    on greatness and precedence.
- source_word: ἔσται
  chosen: will be
  alternatives:
  - must be
  - shall be
  lexicon: BDAG
  rationale: The future middle of εἰμί is best rendered straightforwardly as 'will
    be.' In context it carries an imperative-like force as part of Jesus' instruction,
    but English can preserve that force without replacing the form with 'must be.'
- source_word: πάντων
  chosen: of all
  alternatives:
  - of everyone
  - of all people
  lexicon: BDAG
  rationale: The genitive plural with δοῦλος indicates relation/subordination to all.
    'Of all' is concise and preserves the universal scope.
- source_word: δοῦλος
  chosen: slave
  alternatives:
  - servant
  - bondservant
  lexicon: BDAG
  rationale: Per the project's contested-terms guidance, δοῦλος is rendered according
    to context as 'servant' or 'slave.' Here the saying intensifies the prior verse's
    διάκονος ('servant') by using the stronger δοῦλος. Rendering it 'slave' preserves
    that escalation and the bonded, low-status force of the term.
