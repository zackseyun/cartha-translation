theological_decisions:
- issue: Rendering of δοῦλος in a discipleship saying
  chosen_reading: slave
  alternative_readings:
  - servant
  - bondservant
  rationale: The immediate context contrasts social ambition with radical self-lowering.
    Since v.43 uses διάκονος ('servant') and v.44 uses δοῦλος, the English should
    preserve the stronger term here rather than flatten both to 'servant.' This follows
    the doctrine guidance to use 'slave' where the bonded nature is salient.
