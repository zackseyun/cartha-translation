theological_decisions:
- issue: Whether Jesus' statement should be rendered in a way that denies his authority
    absolutely or only in the immediate narrative context
  chosen_reading: Render the clause straightforwardly as 'is not mine to give' without
    adding explanatory qualifiers.
  alternative_readings:
  - is not for me to grant
  - is not mine to give apart from the Father's will
  rationale: The Greek itself states the limitation without explicit explanation.
    Adding 'apart from the Father's will' would import a theological harmonization
    not stated in the verse. The translation should preserve the text's tension while
    remaining within orthodox Christology.
  doctrine_reference: Preserve theological tension rather than resolve it.
