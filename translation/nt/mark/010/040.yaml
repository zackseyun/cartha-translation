id: MRK.10.40
reference: Mark 10:40
source:
  edition: SBLGNT
  text: τὸ δὲ καθίσαι ἐκ δεξιῶν μου ⸀ἢ ἐξ εὐωνύμων οὐκ ἔστιν ἐμὸν δοῦναι, ἀλλ’ οἷς
    ἡτοίμασται.
translation:
  text: But to sit at my right or at my left is not mine to give, but for those for
    whom it has been prepared.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'is not for me to give.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τὸ ... καθίσαι
  chosen: to sit
  alternatives:
  - the sitting
  - to take a seat
  lexicon: BDAG
  rationale: 'The articular infinitive functions substantivally, but idiomatic English
    is best expressed with an infinitive: ''to sit.'' This preserves the verbal force
    without awkward nominalization.'
- source_word: ἐκ δεξιῶν μου
  chosen: at my right
  alternatives:
  - on my right
  - at my right hand
  lexicon: BDAG
  rationale: The idiom denotes position at one's right side. 'At my right' is natural
    English and preserves the spatial sense without adding 'hand,' which is not explicit
    here though often implied idiomatically.
- source_word: ἢ ἐξ εὐωνύμων
  chosen: or at my left
  alternatives:
  - or on my left
  - or at the left
  lexicon: BDAG
  rationale: εὐώνυμος in this plural idiom means 'left side.' Rendering it in parallel
    with 'at my right' preserves the balanced expression.
- source_word: οὐκ ἔστιν ἐμὸν δοῦναι
  chosen: is not mine to give
  alternatives:
  - is not for me to give
  - is not my place to give
  lexicon: BDAG
  rationale: This construction expresses that the granting of these places does not
    belong to Jesus' prerogative in this context. 'Is not mine to give' is a close,
    idiomatic rendering that avoids over-interpreting the nuance.
- source_word: ἀλλ’ οἷς
  chosen: but for those for whom
  alternatives:
  - but to those for whom
  - except for those for whom
  lexicon: BDAG
  rationale: The Greek is elliptical after ἀλλά, with the sense supplied from the
    previous clause. 'But for those for whom' makes the ellipsis clear in English
    while preserving the contrast.
- source_word: ἡτοίμασται
  chosen: it has been prepared
  alternatives:
  - it is prepared
  - it has been made ready
  lexicon: BDAG
  rationale: The perfect passive indicates a completed preparation with continuing
    result. 'Has been prepared' best reflects that aspect in natural English.
