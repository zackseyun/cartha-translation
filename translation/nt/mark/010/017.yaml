id: MRK.10.17
reference: Mark 10:17
source:
  edition: SBLGNT
  text: Καὶ ἐκπορευομένου αὐτοῦ εἰς ὁδὸν προσδραμὼν εἷς καὶ γονυπετήσας αὐτὸν ἐπηρώτα
    αὐτόν· Διδάσκαλε ἀγαθέ, τί ποιήσω ἵνα ζωὴν αἰώνιον κληρονομήσω;
translation:
  text: And as he was going out onto the road, one man ran up and knelt before him
    and asked him, “Good Teacher, what must I do so that I may inherit eternal life?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “as he was setting out on the way.” The Greek expression can refer to
      going out onto the road or beginning a journey.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκπορευομένου αὐτοῦ εἰς ὁδόν
  chosen: as he was going out onto the road
  alternatives:
  - as he was setting out on the way
  - as he was going out into the road
  lexicon: BDAG
  rationale: The genitive absolute marks background action contemporaneous with the
    main verb. εἰς ὁδόν is idiomatic for setting out on a journey or going onto the
    road. 'As he was going out onto the road' preserves the motion and scene naturally
    in English without over-paraphrasing.
- source_word: προσδραμὼν
  chosen: ran up
  alternatives:
  - came running
  - ran to him
  lexicon: BDAG
  rationale: The aorist participle conveys the man's urgent approach. 'Ran up' is
    concise and natural, preserving the vividness of the action.
- source_word: εἷς
  chosen: one man
  alternatives:
  - a man
  - one person
  lexicon: BDAG
  rationale: εἷς here functions substantivally, introducing an individual. 'One man'
    preserves the specificity better than a bare 'someone,' while 'man' fits the masculine
    form and narrative context.
- source_word: γονυπετήσας αὐτόν
  chosen: knelt before him
  alternatives:
  - fell on his knees before him
  - kneeling before him
  lexicon: BDAG
  rationale: The verb denotes kneeling, often in a posture of earnest respect or supplication.
    'Knelt before him' is clear modern English; 'fell on his knees' is possible but
    slightly more interpretive in intensity.
- source_word: ἐπηρώτα αὐτόν
  chosen: asked him
  alternatives:
  - was asking him
  - questioned him
  lexicon: BDAG
  rationale: The imperfect can suggest ongoing or attempted action, but in narrative
    English 'asked him' is the most natural rendering here. 'Was asking' is possible
    but awkward in this context.
- source_word: Διδάσκαλε ἀγαθέ
  chosen: Good Teacher
  alternatives:
  - Good Master
  lexicon: BDAG
  rationale: διδάσκαλος is best rendered 'Teacher' in Gospel address contexts. ἀγαθέ
    is a direct adjective of address, so 'Good Teacher' preserves the wording that
    is important for the following exchange.
- source_word: τί ποιήσω
  chosen: what must I do
  alternatives:
  - what shall I do
  - what should I do
  lexicon: BDAG
  rationale: The aorist subjunctive in deliberative-style direct question asks what
    action is required. 'Must' brings out the practical force in idiomatic English
    without adding theology; 'shall' is more formal and less natural for the target
    style.
- source_word: ἵνα
  chosen: so that
  alternatives:
  - that
  - in order that
  lexicon: BDAG
  rationale: ἵνα introduces purpose/result. 'So that' keeps the connection explicit
    and readable.
- source_word: ζωὴν αἰώνιον
  chosen: eternal life
  alternatives:
  - everlasting life
  lexicon: BDAG
  rationale: This is the standard and clearest rendering in Johannine and Synoptic
    usage. 'Eternal life' preserves both duration and theological resonance.
- source_word: κληρονομήσω
  chosen: I may inherit
  alternatives:
  - I may receive as an inheritance
  - I may obtain
  lexicon: BDAG
  rationale: κληρονομέω means to inherit or receive as an heir. 'Inherit' should be
    preserved because it is theologically and lexically more precise than the flatter
    'obtain.'
