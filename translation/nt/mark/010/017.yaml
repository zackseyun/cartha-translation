theological_decisions:
- issue: Rendering the man's address to Jesus
  chosen_reading: Good Teacher
  alternative_readings:
  - Good Master
  rationale: The Greek uses διδάσκαλε, not κύριε. Rendering it as 'Teacher' avoids
    importing a stronger title than the text states while preserving the significance
    of 'good' for Jesus' reply in the next verse.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; do not import doctrinal claims the text does not make.'
- issue: Gender rendering of εἷς
  chosen_reading: one man
  alternative_readings:
  - someone
  - one person
  rationale: The masculine singular form supports 'man' in this narrative setting.
    This follows the gender-accurate principle rather than flattening to an abstract
    or gender-neutral expression.
  doctrine_reference: 'Translation philosophy: gender-accurate over gender-neutral.'
