id: MRK.5.26
reference: Mark 5:26
source:
  edition: SBLGNT
  text: καὶ πολλὰ παθοῦσα ὑπὸ πολλῶν ἰατρῶν καὶ δαπανήσασα τὰ παρ’ αὐτῆς πάντα καὶ
    μηδὲν ὠφεληθεῖσα ἀλλὰ μᾶλλον εἰς τὸ χεῖρον ἐλθοῦσα,
translation:
  text: and after suffering much under many physicians, and after spending all that
    she had and benefiting nothing, but rather becoming worse,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from many physicians' or 'at the hands of many physicians.' The Greek
      can emphasize either the agency of the physicians or her subjection to their
      treatments.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'all the things from her,' that is, everything she had.
    reason: lexical_alternative
lexical_decisions:
- source_word: πολλὰ παθοῦσα
  chosen: after suffering much
  alternatives:
  - having suffered much
  - after enduring much
  lexicon: BDAG
  rationale: Aorist participle describing prior circumstance in a chain leading into
    the main action of the sentence. 'Suffering much' preserves both the experiential
    force of πάσχω and the adverbial relation without over-paraphrasing.
- source_word: ὑπὸ πολλῶν ἰατρῶν
  chosen: under many physicians
  alternatives:
  - from many physicians
  - at the hands of many physicians
  lexicon: BDAG
  rationale: ὑπό with the genitive marks agency/source. 'Under many physicians' is
    concise and idiomatic in English for being subjected to their treatment, while
    retaining the implication that her suffering occurred in connection with their
    care.
- source_word: δαπανήσασα
  chosen: after spending
  alternatives:
  - having spent
  - after exhausting
  lexicon: BDAG
  rationale: Aorist participle parallel to the preceding and following participles.
    'After spending' keeps the temporal/sequential force and avoids adding the stronger
    nuance 'exhausting' unless supplied by context.
- source_word: τὰ παρ’ αὐτῆς πάντα
  chosen: all that she had
  alternatives:
  - everything belonging to her
  - all her possessions
  lexicon: BDAG
  rationale: Idiomatic rendering of the articular phrase with παρά expressing what
    was at her disposal or belonged to her. 'All that she had' is natural English
    and accurately conveys total expenditure.
- source_word: μηδὲν ὠφεληθεῖσα
  chosen: benefiting nothing
  alternatives:
  - having gained nothing
  - not being helped at all
  lexicon: BDAG
  rationale: The passive participle of ὠφελέω indicates receiving no benefit. 'Benefiting
    nothing' is compact and close to the Greek; it preserves the sense that the treatments
    did her no good.
- source_word: ἀλλὰ μᾶλλον
  chosen: but rather
  alternatives:
  - but instead
  - but on the contrary
  lexicon: BDAG
  rationale: 'This adversative-plus-comparative construction heightens the contrast:
    not only no benefit, but the opposite. ''But rather'' preserves that escalation.'
- source_word: εἰς τὸ χεῖρον ἐλθοῦσα
  chosen: becoming worse
  alternatives:
  - having come to a worse state
  - growing worse
  lexicon: BDAG
  rationale: Idiomatic expression meaning to move into a worse condition. 'Becoming
    worse' is clear modern English and captures the resultant deterioration without
    unnecessary literalism.
