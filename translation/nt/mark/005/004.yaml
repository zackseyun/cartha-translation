theological_decisions:
- issue: Nature of the man's condition and strength
  chosen_reading: The verse is translated descriptively, emphasizing extraordinary
    inability to restrain him without specifying the cause beyond the narrative context.
  alternative_readings:
  - A rendering that heightens the sense of demonic power by using more dramatic language
    such as 'no one could tame him'
  rationale: The Greek here describes repeated failed restraint and unusual strength.
    The translation avoids importing additional theological explanation into this
    verse while remaining fully compatible with the surrounding account of demonic
    oppression.
  doctrine_reference: Preserve theological tension rather than resolve it.
