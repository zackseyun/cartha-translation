id: MRK.5.4
reference: Mark 5:4
source:
  edition: SBLGNT
  text: διὰ τὸ αὐτὸν πολλάκις πέδαις καὶ ἁλύσεσι δεδέσθαι καὶ διεσπάσθαι ὑπ’ αὐτοῦ
    τὰς ἁλύσεις καὶ τὰς πέδας συντετρῖφθαι, καὶ οὐδεὶς ⸂ἴσχυεν αὐτὸν⸃ δαμάσαι·
translation:
  text: because he had often been bound with shackles and chains, and the chains had
    been torn apart by him and the shackles smashed to pieces, and no one was strong
    enough to subdue him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'tame him.' The Greek verb can mean 'to tame' or more broadly 'to subdue,
      bring under control.'
    reason: lexical_alternative
lexical_decisions:
- source_word: διὰ τὸ αὐτὸν
  chosen: because he had
  alternatives:
  - for he had
  - because he was
  lexicon: BDAG
  rationale: διά with the articular infinitive introduces the reason/cause for the
    preceding statement. Rendering 'because he had' brings the causal force into natural
    English while preparing for the infinitive sequence that follows.
- source_word: πολλάκις
  chosen: often
  alternatives:
  - frequently
  - many times
  lexicon: BDAG
  rationale: A straightforward adverb of repeated occurrence; 'often' is idiomatic
    and concise.
- source_word: πέδαις
  chosen: shackles
  alternatives:
  - fetters
  - chains
  lexicon: BDAG
  rationale: πέδη refers specifically to fetters for the feet rather than chains in
    general. 'Shackles' is modern and precise; 'fetters' is accurate but less accessible.
- source_word: ἁλύσεσι / τὰς ἁλύσεις
  chosen: chains
  alternatives:
  - bonds
  lexicon: BDAG
  rationale: ἅλυσις denotes chains. Using 'chains' distinguishes it from πέδαι, preserving
    the two restraint terms in the Greek.
- source_word: δεδέσθαι
  chosen: been bound
  alternatives:
  - been tied
  - been restrained
  lexicon: BDAG
  rationale: Perfect infinitive of δέω indicates a state resulting from repeated acts
    of binding. 'Been bound' is the most direct English equivalent.
- source_word: διεσπάσθαι
  chosen: had been torn apart
  alternatives:
  - had been pulled apart
  - had been broken apart
  lexicon: BDAG
  rationale: διασπάω conveys violent tearing apart. The perfect infinitive is rendered
    with English pluperfect to fit the causal construction and narrative background.
- source_word: ὑπ’ αὐτοῦ
  chosen: by him
  alternatives:
  - through him
  lexicon: BDAG
  rationale: ὑπό with genitive marks personal agency. 'By him' is the natural rendering.
- source_word: συντετρῖφθαι
  chosen: smashed to pieces
  alternatives:
  - broken in pieces
  - shattered
  lexicon: BDAG
  rationale: συντρίβω intensifies the idea of breaking/crushing. 'Smashed to pieces'
    conveys the force vividly in readable modern English.
- source_word: οὐδεὶς
  chosen: no one
  alternatives:
  - nobody
  lexicon: BDAG
  rationale: Standard negative indefinite pronoun; 'no one' is slightly more formal
    and fits the narrative tone.
- source_word: ἴσχυεν
  chosen: was strong enough
  alternatives:
  - was able
  - had the strength
  lexicon: BDAG
  rationale: ἰσχύω emphasizes strength or capability. 'Was strong enough' preserves
    the nuance of strength better than the flatter 'was able.'
- source_word: δαμάσαι
  chosen: to subdue
  alternatives:
  - to tame
  - to overpower
  lexicon: BDAG
  rationale: δαμάζω can mean tame, subdue, or bring under control. In this context
    of a violent demoniac, 'subdue' best captures forceful restraint without the potentially
    misleading animal-training connotation of 'tame'.
