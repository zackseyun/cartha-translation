theological_decisions:
- issue: Narrative posture toward Jesus
  chosen_reading: Rendered the action as 'he fell at his feet' without expanding it to explicit worship.
  alternative_readings:
  - he worshiped him
  - he knelt before him
  rationale: The Greek describes a physical act of falling before Jesus, which can express reverence, desperation, or supplication. The text here does not explicitly use a worship term, so the translation preserves the action without importing a stronger theological conclusion than the wording warrants.
  doctrine_reference: Preserve theological tension rather than resolve it.
revisions:
- timestamp: '2026-04-21T19:52:20Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/high_scrutiny/nt/mark/005/022.job-5123.json
  category: awkward_english
  tier: 1
  from: one of the synagogue rulers came, named Jairus
  to: one of the synagogue rulers, named Jairus, came
  rationale: The current word order places the verb 'came' between the subject ('one of the synagogue rulers') and its appositive ('named Jairus'). This is grammatically acceptable but stylistically awkward, making the name feel like an afterthought. Reordering to 'one of the synagogue rulers, named Jairus, came' keeps the complete subject phrase together, resulting in a smoother and more natural English sentence structure that better reflects the unity of the Greek subject phrase 'εἷς τῶν ἀρχισυναγώγων, ὀνόματι Ἰάϊρος'.
