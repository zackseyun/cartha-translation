id: MRK.5.22
reference: Mark 5:22
source:
  edition: SBLGNT
  text: ⸀καὶ ἔρχεται εἷς τῶν ἀρχισυναγώγων, ὀνόματι Ἰάϊρος, καὶ ἰδὼν αὐτὸν πίπτει πρὸς τοὺς πόδας αὐτοῦ
translation:
  text: And one of the synagogue rulers, named Jairus, came, and when he saw him, he fell at his feet.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'comes ... falls,' preserving Mark's historical present for vividness.
    reason: lexical_alternative
  - marker: b
    text: Or 'one of the synagogue rulers came, named Jairus'.
    reason: previous_rendering
lexical_decisions:
- source_word: ἔρχεται
  chosen: came
  alternatives:
  - comes
  lexicon: BDAG
  rationale: Greek uses the historical present ('comes') for vivid narrative, but English commonly renders this idiom with a simple past in flowing narrative. 'Came' preserves the event sense in natural modern English.
- source_word: εἷς τῶν ἀρχισυναγώγων
  chosen: one of the synagogue rulers
  alternatives:
  - one of the synagogue leaders
  - one of the rulers of the synagogue
  lexicon: BDAG
  rationale: The partitive construction means 'one of the ...'. ἀρχισυνάγωγος denotes a leader/ruler associated with synagogue administration. 'Synagogue rulers' is a clear, fairly formal rendering that preserves the plural genitive construction.
- source_word: ὀνόματι Ἰάϊρος
  chosen: named Jairus
  alternatives:
  - by name Jairus
  - whose name was Jairus
  lexicon: BDAG
  rationale: The dative ὀνόματι is an idiomatic naming expression. 'Named Jairus' is concise, natural English and preserves the identification function.
- source_word: Ἰάϊρος
  chosen: Jairus
  rationale: Personal names are transliterated by standard conventions per translation philosophy.
- source_word: ἰδὼν αὐτὸν
  chosen: when he saw him
  alternatives:
  - seeing him
  - after seeing him
  lexicon: BDAG
  rationale: The aorist participle is most naturally rendered as a temporal participial clause in English. 'When he saw him' communicates the sequence clearly without overinterpreting the nuance.
- source_word: πίπτει πρὸς τοὺς πόδας αὐτοῦ
  chosen: he fell at his feet
  alternatives:
  - he falls at his feet
  - he fell before his feet
  lexicon: BDAG
  rationale: πίπτει is another historical present, rendered as past for natural English narrative consistency. The phrase πρὸς τοὺς πόδας αὐτοῦ idiomatically indicates falling before someone in supplication; 'at his feet' is the standard natural equivalent.
