id: MRK.5.21
reference: Mark 5:21
source:
  edition: SBLGNT
  text: Καὶ διαπεράσαντος τοῦ Ἰησοῦ ἐν τῷ πλοίῳ πάλιν εἰς τὸ πέραν συνήχθη ὄχλος πολὺς
    ἐπ’ αὐτόν, καὶ ἦν παρὰ τὴν θάλασσαν.
translation:
  text: And after Jesus had crossed over again in the boat to the other side, a large
    crowd gathered around him, and he was beside the sea.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: That is, the Sea of Galilee, a lake customarily called a 'sea' in the Gospels.
    reason: cultural_note
lexical_decisions:
- source_word: διαπεράσαντος
  chosen: after ... had crossed over
  alternatives:
  - when ... crossed over
  - having crossed over
  lexicon: BDAG
  rationale: Aorist participle in the genitive absolute is best rendered as a prior-time
    circumstance in English. 'After ... had crossed over' is natural English and preserves
    the temporal sequence without flattening the participial construction.
- source_word: ἐν τῷ πλοίῳ
  chosen: in the boat
  alternatives:
  - by boat
  - in the ship
  lexicon: BDAG
  rationale: The prepositional phrase is retained explicitly. 'Boat' fits Mark's narrative
    setting better in modern English than 'ship,' while 'by boat' is slightly more
    idiomatic but less formally tied to the Greek wording.
- source_word: πάλιν
  chosen: again
  alternatives:
  - once more
  lexicon: BDAG
  rationale: The adverb marks repeated action and is straightforwardly rendered 'again.'
- source_word: εἰς τὸ πέραν
  chosen: to the other side
  alternatives:
  - to the far side
  - across
  lexicon: BDAG
  rationale: In Mark's lake-crossing context, this idiom refers to the opposite shore.
    'To the other side' is the clearest natural equivalent.
- source_word: συνήχθη
  chosen: gathered
  alternatives:
  - was gathered
  - assembled
  lexicon: BDAG
  rationale: 'Although the verb is passive in form, English commonly expresses this
    event naturally as an intransitive middle-like action: ''a crowd gathered.'' This
    preserves the sense without awkwardness.'
- source_word: ὄχλος πολὺς
  chosen: a large crowd
  alternatives:
  - a great crowd
  - a big crowd
  lexicon: BDAG
  rationale: '''Large crowd'' is readable modern English. ''Great crowd'' is possible
    but can sound archaic or imply qualitative greatness rather than size.'
- source_word: ἐπ’ αὐτόν
  chosen: around him
  alternatives:
  - to him
  - upon him
  - near him
  lexicon: BDAG
  rationale: With συνάγω in this context, ἐπί + accusative conveys movement/convergence
    toward Jesus. 'Around him' best captures the spatial sense of the crowd pressing
    in his vicinity in idiomatic English.
- source_word: παρὰ τὴν θάλασσαν
  chosen: beside the sea
  alternatives:
  - by the sea
  - along the sea
  lexicon: BDAG
  rationale: παρά with the accusative here indicates location alongside the shoreline.
    'Beside the sea' is clear and slightly more literal than 'by the sea.'
- source_word: θάλασσαν
  chosen: sea
  alternatives:
  - lake
  lexicon: BDAG
  rationale: Although the body of water is the Sea of Galilee, the Greek term is 'sea.'
    Following original-language primacy, the main text keeps 'sea'; the geographic
    clarification can be preserved in a footnote.
