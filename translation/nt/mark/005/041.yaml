id: MRK.5.41
reference: Mark 5:41
source:
  edition: SBLGNT
  text: καὶ κρατήσας τῆς χειρὸς τοῦ παιδίου λέγει αὐτῇ· Ταλιθα ⸀κουμ, ὅ ἐστιν μεθερμηνευόμενον·
    Τὸ κοράσιον, σοὶ λέγω, ⸀ἔγειρε.
translation:
  text: And taking the child's hand, he says to her, “Talitha koum,” which is translated,
    “Little girl, I say to you, get up.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Some English versions spell the Aramaic phrase 'Talitha cum,' following
      a traditional transliteration. The Greek text here reads κουμ, supporting 'koum.'
    reason: lexical_alternative
lexical_decisions:
- source_word: κρατήσας
  chosen: taking
  alternatives:
  - grasping
  - taking hold of
  - seizing
  lexicon: BDAG
  rationale: Aorist participle of κρατέω here introduces the accompanying action before
    Jesus speaks. 'Taking' is natural modern English and fits the gentle context better
    than the stronger 'seizing,' while still reflecting physical contact.
- source_word: τῆς χειρὸς
  chosen: the hand
  alternatives:
  - by the hand
  - her hand
  lexicon: BDAG
  rationale: The genitive construction with κρατέω commonly conveys taking hold of
    the hand. 'Taking the child's hand' is idiomatic English and preserves the concrete
    action.
- source_word: τοῦ παιδίου
  chosen: the child’s
  alternatives:
  - the little child’s
  - the girl’s
  lexicon: BDAG
  rationale: παιδίον is a diminutive term for child, but the verse itself later specifies
    κοράσιον ('girl'). Rendering παιδίου as 'child’s' avoids redundancy and lets the
    explicit vocative interpretation carry the gendered nuance.
- source_word: λέγει αὐτῇ
  chosen: he says to her
  alternatives:
  - he said to her
  - he tells her
  lexicon: BDAG
  rationale: The historical present λέγει is common in Mark. Rendering it as present
    ('he says') preserves Mark's vivid narrative style better than smoothing to past
    tense.
- source_word: Ταλιθα κουμ
  chosen: Talitha koum
  alternatives:
  - Talitha cum
  - Little girl, get up
  lexicon: BDAG
  rationale: This is an Aramaic expression preserved in the Greek text and then translated
    by Mark. Following the philosophy to transliterate non-Greek forms when preserved
    by the source, the main text keeps the transliteration and allows Mark's own translation
    to explain it.
- source_word: μεθερμηνευόμενον
  chosen: which is translated
  alternatives:
  - which means
  - which is interpreted
  lexicon: BDAG
  rationale: The participle explicitly signals translation/interpretation of the Aramaic
    phrase. 'Which is translated' is straightforward and mirrors Mark's explanatory
    style.
- source_word: Τὸ κοράσιον
  chosen: Little girl
  alternatives:
  - Girl
  - Young girl
  - Child
  lexicon: BDAG
  rationale: κοράσιον refers to a girl, often a young girl. 'Little girl' best captures
    the diminutive and the tenderness of the address without becoming childish.
- source_word: σοὶ λέγω
  chosen: I say to you
  alternatives:
  - I tell you
  - I say to you personally
  lexicon: BDAG
  rationale: This phrase is explicit in the Greek and should be retained rather than
    omitted as redundant. 'I say to you' is slightly more formal than 'I tell you'
    and fits the solemn direct command.
- source_word: ἔγειρε
  chosen: get up
  alternatives:
  - arise
  - rise
  lexicon: BDAG
  rationale: Imperative of ἐγείρω here is a command to stand up or awaken. 'Get up'
    is clear, natural modern English and suits the immediate narrative context better
    than the more archaic 'arise.'
