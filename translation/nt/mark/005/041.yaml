theological_decisions:
- issue: Retention of Jesus' Aramaic words in the main text
  chosen_reading: Preserve the transliterated Aramaic 'Talitha koum' and include Mark's
    own translation immediately after.
  alternative_readings:
  - 'Translate only: ''Little girl, I say to you, get up'''
  - Use traditional spelling 'Talitha cum'
  rationale: The source text itself preserves Jesus' Semitic utterance and then explains
    it. Keeping both respects the narrative texture and eyewitness-like vividness
    without obscuring meaning. 'Koum' follows the critical Greek spelling κουμ more
    directly than the traditional 'cum.'
  doctrine_reference: 'Translation philosophy: Translate titles; transliterate names;
    original-language primacy over translation tradition.'
