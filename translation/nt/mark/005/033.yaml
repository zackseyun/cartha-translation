theological_decisions:
- issue: Posture before Jesus in προσέπεσεν αὐτῷ
  chosen_reading: fell down before him
  alternative_readings:
  - fell at his feet
  - prostrated herself before him
  rationale: The verb can denote falling before someone in reverence, desperation,
    or supplication. The translation preserves the action without importing a stronger
    theological claim about worship than the verse itself explicitly states.
  doctrine_reference: Preserve theological tension rather than resolve it.
