id: MRK.5.33
reference: Mark 5:33
source:
  edition: SBLGNT
  text: ἡ δὲ γυνὴ φοβηθεῖσα καὶ τρέμουσα, εἰδυῖα ὃ γέγονεν ⸀αὐτῇ, ἦλθεν καὶ προσέπεσεν
    αὐτῷ καὶ εἶπεν αὐτῷ πᾶσαν τὴν ἀλήθειαν.
translation:
  text: But the woman, fearing and trembling, knowing what had happened to her, came
    and fell down before him and told him the whole truth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'afraid and trembling.'
    reason: lexical_alternative
  - marker: b
    text: Or 'fell before him' or 'prostrated herself before him.'
    reason: lexical_alternative
lexical_decisions:
- source_word: δὲ
  chosen: But
  alternatives:
  - Now
  - And
  lexicon: BDAG
  rationale: Marks a mild contrast or narrative development from the preceding verse;
    'But' fits the woman's response in contrast to Jesus' question and the crowd.
- source_word: γυνή
  chosen: the woman
  alternatives:
  - the wife
  - woman
  lexicon: BDAG
  rationale: Context clearly refers to the woman previously introduced in the narrative,
    so the definite expression 'the woman' is appropriate.
- source_word: φοβηθεῖσα καὶ τρέμουσα
  chosen: fearing and trembling
  alternatives:
  - afraid and trembling
  - fearful and trembling
  lexicon: BDAG
  rationale: The paired participles portray her emotional state vividly. 'Fearing
    and trembling' preserves the verbal force and close connection of the Greek participles
    better than flattening to adjectives.
- source_word: εἰδυῖα
  chosen: knowing
  alternatives:
  - because she knew
  - aware
  lexicon: BDAG
  rationale: A participial form best carried by 'knowing,' preserving the circumstantial
    relation without over-interpreting it as explicitly causal, though causality is
    implied.
- source_word: ὃ γέγονεν αὐτῇ
  chosen: what had happened to her
  alternatives:
  - what had happened in her
  - what had been done for her
  lexicon: BDAG
  rationale: Idiomatic English for the neuter relative clause with dative pronoun.
    'To her' is the most natural rendering of αὐτῇ here, referring to the healing
    event she experienced.
- source_word: ἦλθεν
  chosen: came
  alternatives:
  - approached
  lexicon: BDAG
  rationale: Simple narrative aorist; 'came' preserves the straightforward movement
    without adding interpretive nuance.
- source_word: προσέπεσεν αὐτῷ
  chosen: fell down before him
  alternatives:
  - fell before him
  - prostrated herself before him
  lexicon: BDAG
  rationale: Conveys physical falling at Jesus' feet or in his presence. 'Fell down
    before him' is natural English and preserves the reverential posture without overstating
    the exact bodily form.
- source_word: πᾶσαν τὴν ἀλήθειαν
  chosen: the whole truth
  alternatives:
  - all the truth
  - everything that was true
  lexicon: BDAG
  rationale: An idiomatic English rendering of the accusative phrase meaning she told
    the full account without concealment. 'The whole truth' is both natural and faithful
    to the emphasis of πᾶσαν.
- source_word: εἶπεν αὐτῷ
  chosen: told him
  alternatives:
  - said to him
  lexicon: BDAG
  rationale: '''Told him'' is more idiomatic in English when followed by the content
    phrase ''the whole truth,'' while still accurately representing λέγω with indirect
    object.'
