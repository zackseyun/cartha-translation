theological_decisions:
- issue: Rendering of πίστις
  chosen_reading: faith
  alternative_readings:
  - trust
  - faithfulness
  rationale: The doctrine excerpt specifies 'faith' as the default rendering for πίστις,
    with alternatives preserved where relevant. Here 'faith' best fits the woman's
    believing approach to Jesus.
  doctrine_reference: 'DOCTRINE.md Contested terms: πίστις → faith'
- issue: Rendering of σῴζω in relation to healing
  chosen_reading: has saved you
  alternative_readings:
  - has made you well
  - has healed you
  rationale: Using 'saved' preserves the lexical force of σῴζω and the theological
    tension between salvation and healing, especially since the next clause explicitly
    addresses bodily healing. This avoids collapsing two distinct Greek expressions
    into one English idea.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3, preserve theological
    tension rather than resolve it'
