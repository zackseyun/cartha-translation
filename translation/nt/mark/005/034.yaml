id: MRK.5.34
reference: Mark 5:34
source:
  edition: SBLGNT
  text: ὁ δὲ εἶπεν αὐτῇ· ⸀Θυγάτηρ, ἡ πίστις σου σέσωκέν σε· ὕπαγε εἰς εἰρήνην, καὶ
    ἴσθι ὑγιὴς ἀπὸ τῆς μάστιγός σου.
translation:
  text: But he said to her, “Daughter, your faith has saved you. Go in peace, and
    be healed from your affliction.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your faith has made you well' or 'your faith has healed you.' The Greek
      verb can refer to rescue, salvation, or healing.
    reason: alternative_reading
  - marker: b
    text: Or 'be well' or 'be whole.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Θυγάτηρ
  chosen: Daughter
  alternatives:
  - My daughter
  - Dear woman
  lexicon: BDAG
  rationale: Vocative address retained literally as 'Daughter' to preserve both tenderness
    and familial nuance without adding possessive wording not present in the Greek.
- source_word: πίστις
  chosen: faith
  alternatives:
  - trust
  - faithfulness
  lexicon: BDAG
  rationale: Per doctrine default, πίστις is rendered 'faith.' In this context it
    refers to the woman's trusting response to Jesus rather than her faithfulness
    over time. Alternative 'trust' is possible in English but 'faith' better preserves
    the key term's consistency.
- source_word: σέσωκέν
  chosen: has saved
  alternatives:
  - has made well
  - has healed
  lexicon: BDAG
  rationale: Perfect tense of σῴζω is broader than physical healing and commonly means
    'save.' Because the verse immediately adds a separate clause about being healed,
    rendering this as 'has saved' preserves the distinction between salvation/wholeness
    and bodily healing. The perfect is reflected with 'has saved.'
- source_word: ὕπαγε
  chosen: Go
  alternatives:
  - Go away
  - Be on your way
  lexicon: BDAG
  rationale: Simple imperative best represented by 'Go.' Expanded idioms are unnecessary.
- source_word: εἰς εἰρήνην
  chosen: in peace
  alternatives:
  - into peace
  - with peace
  lexicon: BDAG
  rationale: Idiomatic expression naturally rendered 'in peace' in English, conveying
    departure in a state of peace and well-being.
- source_word: ἴσθι ὑγιὴς
  chosen: be healed
  alternatives:
  - be well
  - be healthy
  - be whole
  lexicon: BDAG
  rationale: The expression denotes being sound or healthy. 'Be healed' fits the immediate
    context of recovery from disease and avoids awkward English like 'be healthy'
    as an imperative. It also distinguishes this clause from the prior 'has saved
    you'.
- source_word: μάστιγός
  chosen: affliction
  alternatives:
  - plague
  - scourge
  - disease
  lexicon: BDAG
  rationale: μάστιξ literally can mean 'whip/scourge,' but in this context refers
    metaphorically to the woman's debilitating condition. 'Affliction' is natural
    modern English and preserves the sense of a grievous suffering without sounding
    archaic like 'plague' or overly narrow like 'disease'.
