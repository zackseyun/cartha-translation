id: MRK.5.28
reference: Mark 5:28
source:
  edition: SBLGNT
  text: ἔλεγεν γὰρ ὅτι ⸂Ἐὰν ἅψωμαι κἂν τῶν ἱματίων αὐτοῦ⸃ σωθήσομαι.
translation:
  text: For she was saying, "If I touch even his clothes, I will be healed."
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''I will be saved.'' The verb can mean ''be saved,'' ''be healed,''
      or ''be made well''; here the context points to physical healing.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔλεγεν
  chosen: she was saying
  alternatives:
  - she said
  - she kept saying
  lexicon: BDAG
  rationale: Imperfect tense indicates ongoing or repeated speech/thought in past
    time. 'She was saying' preserves the imperfect aspect without overinterpreting
    whether it was repeated aloud or internalized.
- source_word: γὰρ
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: BDAG
  rationale: Marks explanation for the preceding action; 'For' is a natural and sufficiently
    formal connective in narrative English.
- source_word: ὅτι
  chosen: quotation marker rendered with opening quotation
  alternatives:
  - that
  lexicon: BDAG
  rationale: Introduces the content of what she was saying. In English, direct quotation
    is the most natural rendering here.
- source_word: ἐὰν
  chosen: If
  alternatives:
  - if ever
  - whenever
  lexicon: BDAG
  rationale: Introduces a conditional clause with the subjunctive. Simple 'If' best
    fits the woman's anticipated action.
- source_word: ἅψωμαι
  chosen: I touch
  alternatives:
  - I may touch
  - I lay hold of
  lexicon: BDAG
  rationale: From ἅπτω in the middle, commonly 'touch' in this context. English present
    in the conditional clause is idiomatic for a future-more-vivid sense.
- source_word: κἂν
  chosen: even
  alternatives:
  - even if only
  - at least
  lexicon: BDAG
  rationale: 'Contraction of καὶ ἐάν functioning here adverbially with a minimization
    sense: even if only/even just. ''Even'' captures the emphasis concisely in natural
    English.'
- source_word: τῶν ἱματίων αὐτοῦ
  chosen: his clothes
  alternatives:
  - his garments
  - his cloak
  lexicon: BDAG
  rationale: ἱμάτια is plural and broadly denotes garments/clothes. 'Clothes' is more
    readable modern English than 'garments' while remaining accurate; 'cloak' would
    be too specific.
- source_word: σωθήσομαι
  chosen: I will be healed
  alternatives:
  - I will be saved
  - I will be made well
  lexicon: BDAG
  rationale: Though σῴζω often means 'save,' in this immediate healing context it
    refers to physical restoration. 'I will be healed' makes the contextual sense
    explicit for modern readers. The broader semantic overlap with 'saved' is preserved
    in a footnote because the Greek term can carry both senses.
