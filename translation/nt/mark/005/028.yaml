theological_decisions:
- issue: Rendering of σωθήσομαι from σῴζω in a healing narrative
  chosen_reading: I will be healed
  alternative_readings:
  - I will be saved
  - I will be made well
  rationale: The immediate context is the woman's expectation of bodily healing from
    her hemorrhage, so 'healed' best communicates the plain sense. However, because
    σῴζω can also mean 'save' and Mark sometimes exploits the overlap between healing
    and salvation, the alternative is preserved in a footnote rather than imported
    into the main text.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
