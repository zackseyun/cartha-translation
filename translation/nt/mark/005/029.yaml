theological_decisions:
- issue: Nature of the healing statement
  chosen_reading: Render the verse as describing an immediate, real bodily healing
    without adding interpretive explanation about mechanism or source beyond the text.
  alternative_readings:
  - A more paraphrastic rendering emphasizing subjective sensation rather than actual
    healing
  rationale: The Greek presents both objective cessation of bleeding and the woman's
    embodied recognition of healing. The translation preserves that dual emphasis
    without importing extra doctrinal claims.
  doctrine_reference: Translation philosophy §§1, 3, 6
