id: MRK.5.25
reference: Mark 5:25
source:
  edition: SBLGNT
  text: καὶ ⸀γυνὴ οὖσα ἐν ῥύσει αἵματος ⸂δώδεκα ἔτη⸃
translation:
  text: And there was a woman who had been suffering from a flow of blood for twelve
    years,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with a hemorrhage' or 'with bleeding.'
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ
  chosen: And
  alternatives:
  - Now
  - Then
  lexicon: BDAG
  rationale: Standard connective introducing the next element in the narrative. 'And'
    preserves Mark's paratactic style better than a more interpretive transition.
- source_word: γυνὴ
  chosen: a woman
  alternatives:
  - woman
  lexicon: BDAG
  rationale: Anarthrous noun introducing a new participant in the scene; English idiom
    naturally uses the indefinite article.
- source_word: οὖσα
  chosen: who had been suffering
  alternatives:
  - being
  - who was
  - having
  lexicon: BDAG
  rationale: Literally 'being,' but in this compressed participial construction with
    ἐν ῥύσει αἵματος it describes her ongoing condition. 'Who had been suffering'
    makes the sense natural in English and captures the durative force implied by
    the participle plus the time expression.
- source_word: ἐν ῥύσει αἵματος
  chosen: from a flow of blood
  alternatives:
  - with a flow of blood
  - with a hemorrhage
  - with bleeding
  lexicon: BDAG
  rationale: The preposition ἐν with the dative here expresses condition/state. 'A
    flow of blood' is a relatively formal but clear rendering of the idiom; 'hemorrhage'
    is medically precise but less natural, while 'bleeding' is simpler but slightly
    less tied to the nominal expression in Greek.
- source_word: ῥύσει
  chosen: flow
  alternatives:
  - discharge
  - hemorrhage
  lexicon: BDAG
  rationale: ῥύσις denotes a flowing/discharge. 'Flow' preserves the concrete imagery
    and works well with the genitive 'of blood.'
- source_word: αἵματος
  chosen: blood
  lexicon: BDAG
  rationale: Straightforward genitive complement to ῥύσει.
- source_word: δώδεκα ἔτη
  chosen: for twelve years
  alternatives:
  - twelve years
  lexicon: BDAG
  rationale: Accusative of extent of time. English normally expresses this with 'for'
    to make the duration explicit.
