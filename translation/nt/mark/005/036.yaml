id: MRK.5.36
reference: Mark 5:36
source:
  edition: SBLGNT
  text: ὁ δὲ Ἰησοῦς ⸀παρακούσας τὸν λόγον λαλούμενον λέγει τῷ ἀρχισυναγώγῳ· Μὴ φοβοῦ,
    μόνον πίστευε.
translation:
  text: But Jesus, overhearing the word being spoken, says to the synagogue leader,
    “Do not be afraid; only believe.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “ignoring/disregarding what was said,” taking παρακούσας in the sense
      of refusing to heed the report rather than overhearing it.
    reason: alternative_reading
  - marker: b
    text: Or “only have faith” or “only trust.” The Greek verb is πιστεύω.
    reason: lexical_alternative
lexical_decisions:
- source_word: παρακούσας
  chosen: overhearing
  alternatives:
  - ignoring
  - hearing
  lexicon: BDAG
  rationale: The participle can mean either 'to overhear' or 'to disregard/ignore'
    depending on context. Here Jesus responds to the report just spoken to Jairus,
    so 'overhearing' best fits the narrative flow and the immediately following direct
    address. The alternative 'ignoring' is worth preserving in a footnote because
    it is a known interpretive option.
- source_word: τὸν λόγον λαλούμενον
  chosen: the word being spoken
  alternatives:
  - what was being said
  - the message being spoken
  lexicon: BDAG
  rationale: A relatively formal rendering preserves the Greek expression while remaining
    intelligible. In context it refers to the report just delivered, but 'the word
    being spoken' keeps the participial construction visible without over-paraphrasing.
- source_word: λέγει
  chosen: says
  alternatives:
  - said
  lexicon: BDAG
  rationale: The Greek present is a historical present, common in Mark. Rendering
    it as 'says' preserves Mark's vivid narrative style better than flattening it
    to a simple past.
- source_word: ἀρχισυναγώγῳ
  chosen: the synagogue leader
  alternatives:
  - the ruler of the synagogue
  - the synagogue official
  lexicon: BDAG
  rationale: This title denotes the leader/presiding official of the synagogue. 'Synagogue
    leader' is clear modern English and avoids archaic phrasing while preserving the
    role.
- source_word: Μὴ φοβοῦ
  chosen: Do not be afraid
  alternatives:
  - Do not fear
  lexicon: BDAG
  rationale: This is natural contemporary English for the present middle/passive imperative
    and preserves the force of Jesus' exhortation.
- source_word: μόνον
  chosen: only
  alternatives:
  - just
  - merely
  lexicon: BDAG
  rationale: μόνον restricts the response Jesus calls for. 'Only' is the most direct
    and idiomatic rendering in this exhortation.
- source_word: πίστευε
  chosen: believe
  alternatives:
  - keep believing
  - have faith
  - trust
  lexicon: BDAG
  rationale: The present imperative likely carries a durative nuance, but in English
    'only believe' is both natural and faithful. Because πίστις/πιστεύω belongs to
    a contested semantic field, alternatives such as 'have faith' and 'trust' are
    preserved in a footnote rather than imported into the main text.
