theological_decisions:
- issue: Semantic force of παρακούσας
  chosen_reading: Jesus overheard the report and then addressed the synagogue leader.
  alternative_readings:
  - Jesus disregarded the report and addressed the synagogue leader anyway.
  rationale: Both senses are lexically possible, but the immediate syntax with 'the
    word being spoken' naturally supports hearing what was said. The alternative does
    not materially alter doctrine, but it affects the narrative nuance and is therefore
    preserved in a footnote for transparency.
  doctrine_reference: Translation philosophy §3 (preserve theological/interpretive
    tension where genuine ambiguity exists)
- issue: Rendering of πιστεύω in Jesus' command
  chosen_reading: believe
  alternative_readings:
  - have faith
  - trust
  rationale: The doctrine table gives πίστις the default rendering 'faith,' with alternatives
    preserved where contested. For the verbal form πιστεύω, 'believe' is the most
    direct English equivalent here. 'Trust' is a legitimate contextual alternative
    but is not required in the main text; it is preserved in a footnote to avoid over-resolving
    the nuance.
  doctrine_reference: 'DOCTRINE.md Contested terms: πίστις → faith; alternatives faithfulness,
    trust preserved where contested'
