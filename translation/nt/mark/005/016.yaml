id: MRK.5.16
reference: Mark 5:16
source:
  edition: SBLGNT
  text: ⸂καὶ διηγήσαντο⸃ αὐτοῖς οἱ ἰδόντες πῶς ἐγένετο τῷ δαιμονιζομένῳ καὶ περὶ τῶν
    χοίρων.
translation:
  text: And those who had seen it told them how it had happened to the demon-possessed
    man, and about the pigs.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the demoniac' or 'the man possessed by a demon.'
    reason: lexical_alternative
lexical_decisions:
- source_word: διηγήσαντο
  chosen: told
  alternatives:
  - related
  - recounted
  - described
  lexicon: BDAG
  rationale: The verb means to relate or recount in detail. 'Told' is slightly less
    formal but natural modern English and adequately conveys reported narration in
    context. The surrounding clause supplies the content of the report.
- source_word: οἱ ἰδόντες
  chosen: those who had seen it
  alternatives:
  - the ones who saw
  - the eyewitnesses
  lexicon: BDAG
  rationale: The articular participle refers to the people who witnessed the event.
    'Those who had seen it' preserves the participial force and makes explicit that
    they were eyewitnesses without importing the more interpretive noun 'eyewitnesses'
    into the main text.
- source_word: πῶς ἐγένετο
  chosen: how it had happened
  alternatives:
  - how it happened
  - what had happened
  - how it came about
  lexicon: BDAG
  rationale: This phrase introduces the manner or course of what occurred. 'How it
    had happened' fits the narrative sequence after the witnesses' observation and
    report. It preserves the explanatory sense better than the more compressed 'what
    had happened,' though that is a viable alternative.
- source_word: τῷ δαιμονιζομένῳ
  chosen: the demon-possessed man
  alternatives:
  - the demoniac
  - the man possessed by a demon
  - the demonized man
  lexicon: BDAG
  rationale: The participle denotes a person under demonic influence or possession.
    'The demon-possessed man' is clear, idiomatic, and contextually specific. 'Demoniac'
    is traditional but less accessible; 'demonized' is too specialized for the target
    readership.
- source_word: περὶ τῶν χοίρων
  chosen: about the pigs
  alternatives:
  - concerning the pigs
  - about the swine
  lexicon: BDAG
  rationale: περί with the genitive means 'about' or 'concerning.' 'Pigs' is the most
    natural modern English rendering of χοῖροι; 'swine' is more formal or archaic
    in this context.
