theological_decisions:
- issue: Rendering of δαιμονιζομένῳ in a narrative involving demonic activity
  chosen_reading: the demon-possessed man
  alternative_readings:
  - the man possessed by a demon
  - the demoniac
  rationale: The text presents real demonic affliction in keeping with the narrative
    world of Mark. 'Demon-possessed' is the clearest natural English expression and
    does not reduce the phenomenon to merely psychological categories or obscure the
    personal referent by using only a label.
