theological_decisions:
- issue: Narrative tense and vividness
  chosen_reading: Retain the historical presents ('takes,' 'goes in') in English
  alternative_readings:
  - Convert to simple past throughout ('took,' 'went in')
  rationale: Mark frequently uses historical presents for vivid narrative effect.
    Preserving them here is readable in modern English and reflects the discourse
    texture of the Greek.
  doctrine_reference: Translation philosophy §5, §6
