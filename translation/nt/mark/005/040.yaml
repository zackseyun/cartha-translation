id: MRK.5.40
reference: Mark 5:40
source:
  edition: SBLGNT
  text: καὶ κατεγέλων αὐτοῦ. ⸀αὐτὸς δὲ ἐκβαλὼν πάντας παραλαμβάνει τὸν πατέρα τοῦ
    παιδίου καὶ τὴν μητέρα καὶ τοὺς μετ’ αὐτοῦ, καὶ εἰσπορεύεται ὅπου ἦν τὸ ⸀παιδίον·
translation:
  text: And they were laughing at him. But he, after putting them all outside, takes
    the child's father and mother and those with him, and goes in where the child
    was.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'mocked him.' The Greek verb can denote derisive laughter.
    reason: lexical_alternative
  - marker: b
    text: That is, the disciples who were accompanying him.
    reason: cross_reference
lexical_decisions:
- source_word: κατεγέλων
  chosen: were laughing at
  alternatives:
  - laughed at
  - mocked
  lexicon: BDAG
  rationale: Imperfect tense suggests ongoing or repeated action, so 'were laughing
    at' captures the durative sense better than simple past 'laughed at.' 'Mocked'
    is possible but slightly stronger and less directly tied to the lexical sense
    of laughing derisively.
- source_word: αὐτοῦ
  chosen: him
  alternatives:
  - himself
  lexicon: BDAG
  rationale: 'Genitive after καταγελάω is idiomatic: ''laugh at him.'''
- source_word: ἐκβαλὼν πάντας
  chosen: after putting them all outside
  alternatives:
  - having cast them all out
  - after sending them all out
  lexicon: BDAG
  rationale: The participle is antecedent to the main verbs and refers to removing
    the crowd from the room/house area. 'Putting them all outside' is natural modern
    English and preserves the force without sounding overly harsh; 'cast out' could
    misleadingly evoke exorcism language in English.
- source_word: παραλαμβάνει
  chosen: takes
  alternatives:
  - takes along
  - brings with him
  lexicon: BDAG
  rationale: Historical present in narrative. 'Takes' is concise and natural; context
    implies taking along selected witnesses.
- source_word: παιδίου / παιδίον
  chosen: child
  alternatives:
  - little girl
  - girl
  lexicon: BDAG
  rationale: παιδίον denotes a child; while the broader context identifies the child
    as Jairus's daughter, this verse itself uses the neutral term. 'Child' preserves
    the Greek wording without importing more specificity than the text states here.
- source_word: τοὺς μετ’ αὐτοῦ
  chosen: those with him
  alternatives:
  - the ones with him
  - his companions
  lexicon: BDAG
  rationale: Refers to the disciples accompanying Jesus. 'Those with him' is a transparent
    rendering that preserves the Greek expression without over-specifying identities
    in the main text.
- source_word: εἰσπορεύεται
  chosen: goes in
  alternatives:
  - enters
  lexicon: BDAG
  rationale: Historical present. 'Goes in' is idiomatic and fits the movement into
    the room where the child lay.
- source_word: ὅπου ἦν τὸ παιδίον
  chosen: where the child was
  alternatives:
  - where the child was lying
  - where the child was located
  lexicon: BDAG
  rationale: The Greek states location simply. 'Was lying' is contextually plausible
    but not explicit in this clause, so 'where the child was' is more textually restrained.
