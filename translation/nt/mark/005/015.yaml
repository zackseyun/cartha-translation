id: MRK.5.15
reference: Mark 5:15
source:
  edition: SBLGNT
  text: καὶ ἔρχονται πρὸς τὸν Ἰησοῦν, καὶ θεωροῦσιν τὸν δαιμονιζόμενον ⸀καθήμενον
    ἱματισμένον καὶ σωφρονοῦντα, τὸν ἐσχηκότα τὸν ⸀λεγιῶνα, καὶ ἐφοβήθησαν.
translation:
  text: And they came to Jesus and saw the demon-possessed man sitting there, clothed
    and in his right mind—the one who had the legion—and they were afraid.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "Legion." Many translations capitalize the term because it echoes the
      demons' earlier self-designation as a name.
    reason: alternative_reading
  - marker: b
    text: Or 'who had had'.
    reason: previous_rendering
lexical_decisions:
- source_word: ἔρχονται
  chosen: they came
  alternatives:
  - they come
  - they are coming
  lexicon: BDAG
  rationale: Although the Greek uses a historical present, natural English narrative
    style commonly renders it as a simple past. This preserves the narrative flow
    without awkwardness.
- source_word: θεωροῦσιν
  chosen: saw
  alternatives:
  - see
  - observe
  - behold
  lexicon: BDAG
  rationale: Another historical present. 'Saw' fits idiomatic English narrative. 'Observe'
    is too clinical and 'behold' too elevated for the translation philosophy.
- source_word: δαιμονιζόμενον
  chosen: the demon-possessed man
  alternatives:
  - the man possessed by a demon
  - the demoniac
  lexicon: BDAG
  rationale: This participle functions substantivally and refers to the known man
    from the context. 'Demon-possessed man' is clear, natural, and preserves the force
    of demonic affliction better than the archaic 'demoniac.'
- source_word: καθήμενον
  chosen: sitting there
  alternatives:
  - sitting
  - seated
  lexicon: BDAG
  rationale: The participle describes his visible condition. 'Sitting there' slightly
    reflects the scene-setting force in natural English; 'seated' is possible but
    less vivid.
- source_word: ἱματισμένον
  chosen: clothed
  alternatives:
  - dressed
  - wearing clothes
  lexicon: BDAG
  rationale: This perfect/passive participial idea highlights his restored state in
    contrast to his earlier condition. 'Clothed' is concise and preserves that contrast
    well.
- source_word: σωφρονοῦντα
  chosen: in his right mind
  alternatives:
  - thinking clearly
  - of sound mind
  - sane
  lexicon: BDAG
  rationale: The idiom conveys restored mental soundness and self-control. 'In his
    right mind' is natural modern English and captures the sense without sounding
    clinical or reductionistic.
- source_word: ἐσχηκότα
  chosen: who had had
  alternatives:
  - who had
  - the one having had
  lexicon: BDAG
  rationale: 'The perfect participle of ἔχω points to a prior state with continuing
    relevance: this is the man formerly characterized by possession by ''Legion.''
    English past perfect best conveys the retrospective identification in context.'
- source_word: λεγιῶνα
  chosen: the legion
  alternatives:
  - Legion
  lexicon: BDAG
  rationale: Here the term refers to the named multitude of demons from the immediate
    context. Lowercase 'legion' in the main text treats it as a descriptive designation
    rather than forcing a proper-name styling; the capitalized alternative is worth
    preserving because many translations treat it as a name.
- source_word: ἐφοβήθησαν
  chosen: they were afraid
  alternatives:
  - they became afraid
  - they were filled with fear
  - they feared
  lexicon: BDAG
  rationale: The aorist passive/deponent is naturally rendered as an ingressive or
    simple past. 'They were afraid' is straightforward and idiomatic, preserving the
    reaction without overinterpreting intensity.
