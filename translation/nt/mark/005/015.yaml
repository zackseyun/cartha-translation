theological_decisions:
- issue: Description of demonic affliction
  chosen_reading: the demon-possessed man
  alternative_readings:
  - the man possessed by a demon
  - the demoniac
  rationale: The text presents real demonic possession, and the translation should
    neither soften this into mere illness nor use archaic terminology. The chosen
    rendering is clear and faithful to the narrative's supernatural claim.
  doctrine_reference: Affirmations; Translation philosophy §1, §6
- issue: Rendering of λεγιών as designation or proper name
  chosen_reading: the legion
  alternative_readings:
  - Legion
  rationale: The Greek has the article with λεγιῶνα and refers back to the earlier
    self-designation of the demons. English can represent this either as a title-like
    designation or a proper name. The main text uses lowercase for readability while
    preserving the capitalized alternative in a footnote for auditability.
  doctrine_reference: Translation philosophy §3, §5
revisions:
- timestamp: '2026-04-21T19:50:02Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/high_scrutiny/nt/mark/005/015.job-5116.json
  category: awkward_english
  tier: 1
  from: who had had
  to: who had
  rationale: The Greek perfect participle (ἐσχηκότα) identifies the man by his now-past
    condition. While the English past perfect ('had had') is technically correct to
    place this possession before the main action ('saw'), it is stylistically heavy.
    A simple past ('who had') is more natural in English for this kind of identifying
    clause and sufficiently conveys that the possession is no longer current.
