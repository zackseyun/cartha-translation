id: MRK.5.39
reference: Mark 5:39
source:
  edition: SBLGNT
  text: καὶ εἰσελθὼν λέγει αὐτοῖς· Τί θορυβεῖσθε καὶ κλαίετε; τὸ παιδίον οὐκ ἀπέθανεν
    ἀλλὰ καθεύδει.
translation:
  text: And after entering, he says to them, “Why are you making a commotion and weeping?
    The child has not died, but is sleeping.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “The child did not die, but sleeps.” Jesus' wording may use sleep metaphorically
      for death in light of the coming raising.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰσελθὼν
  chosen: after entering
  alternatives:
  - having entered
  - when he entered
  lexicon: BDAG
  rationale: Aorist participle preceding the main verb, naturally rendered as an action
    prior to 'he says.' 'After entering' is clear modern English while preserving
    the participial relationship.
- source_word: λέγει
  chosen: he says
  alternatives:
  - he said
  lexicon: BDAG
  rationale: The Greek uses the historical present, common in Mark. Rendering it as
    present preserves Mark's vivid narrative style better than smoothing to past tense.
- source_word: Τί
  chosen: Why
  alternatives:
  - What
  lexicon: BDAG
  rationale: In this idiom introducing a rebuke/question with present verbs, 'Why'
    best conveys the force in English rather than a more wooden 'What are you...?'.
- source_word: θορυβεῖσθε
  chosen: are you making a commotion
  alternatives:
  - are you causing an uproar
  - are you in turmoil
  - are you making a disturbance
  lexicon: BDAG
  rationale: The verb denotes causing or engaging in noisy disturbance. 'Making a
    commotion' captures the audible, public uproar in idiomatic English and fits the
    mourning scene.
- source_word: κλαίετε
  chosen: weeping
  alternatives:
  - crying
  - wailing
  lexicon: BDAG
  rationale: '''Weeping'' is natural and dignified. ''Wailing'' may over-specify ritual
    lament, while ''crying'' is slightly flatter in tone.'
- source_word: παιδίον
  chosen: the child
  alternatives:
  - the little girl
  - the girl
  lexicon: BDAG
  rationale: The noun means 'child' and is neuter; 'the child' follows the Greek directly.
    Although context identifies the child as a girl, the verse itself uses the more
    general term.
- source_word: οὐκ ἀπέθανεν
  chosen: has not died
  alternatives:
  - did not die
  - is not dead
  lexicon: BDAG
  rationale: English present perfect communicates the present relevance of the completed
    event in this immediate context. 'Is not dead' would shift from the verbal event
    to a stative expression not used in Greek.
- source_word: καθεύδει
  chosen: is sleeping
  alternatives:
  - sleeps
  - is asleep
  lexicon: BDAG
  rationale: Present progressive is the most natural English rendering here. 'Sleeping'
    preserves the metaphorical language Jesus uses rather than interpreting it away.
