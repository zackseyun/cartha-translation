theological_decisions:
- issue: Whether Jesus' statement should be rendered as a literal denial of death
    or as metaphorical sleep language
  chosen_reading: Retain the wording 'has not died, but is sleeping' in the main text
    without interpretive expansion.
  alternative_readings:
  - The child is not permanently dead, but only asleep
  - The child is not dead from Jesus' perspective because he will raise her
  rationale: The Greek presents Jesus' statement starkly and metaphorically. In keeping
    with the translation philosophy, the rendering preserves the theological tension
    rather than resolving whether this is phenomenological, metaphorical, or anticipatory
    speech.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
