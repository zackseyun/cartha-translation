theological_decisions:
- issue: Singular-to-plural shift in the speaker's self-reference
  chosen_reading: Retain both the singular 'My name is Legion' and the plural 'we
    are many' without harmonizing them.
  alternative_readings:
  - Smooth the English to reduce the tension, e.g., 'Our name is Legion'
  rationale: The Greek intentionally preserves the dramatic shift from singular self-identification
    to plural explanation, reflecting the demonic plurality speaking through one possessed
    man. The translation should preserve this tension rather than resolve it.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
