id: MRK.5.9
reference: Mark 5:9
source:
  edition: SBLGNT
  text: καὶ ἐπηρώτα αὐτόν· Τί ⸂ὄνομά σοι⸃; καὶ ⸂λέγει αὐτῷ⸃· ⸀Λεγιὼν ὄνομά μοι, ὅτι
    πολλοί ἐσμεν·
translation:
  text: And he was asking him, “What is your name?” And he says to him, “My name is
    Legion,[a] because we are many.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: '[a]'
    text: “Legion” is a Latin military term adopted into Greek, referring to a large
      Roman unit; here it functions as the demon’s stated name and implies a multitude.
    reason: cultural_note
lexical_decisions:
- source_word: ἐπηρώτα
  chosen: was asking
  alternatives:
  - asked
  - questioned
  lexicon: BDAG
  rationale: Imperfect tense is best reflected with progressive aspect in English
    to preserve the ongoing or repeated sense, rather than flattening it to simple
    past 'asked.'
- source_word: Τί ὄνομά σοι
  chosen: What is your name?
  alternatives:
  - What is your name called?
  - What name do you have?
  lexicon: BDAG
  rationale: This is the natural English rendering of the idiomatic Greek expression
    with ὄνομα + dative pronoun. It preserves the directness of the question without
    wooden phrasing.
- source_word: λέγει αὐτῷ
  chosen: he says to him
  alternatives:
  - he said to him
  - he tells him
  lexicon: BDAG
  rationale: The present tense λέγει is a historical present. Rendering it as 'says'
    preserves Mark's vivid narrative style; 'said' is possible but loses that feature.
- source_word: Λεγιών
  chosen: Legion
  alternatives:
  - a legion
  lexicon: BDAG
  rationale: This is a transliterated name/designation in the text, not a common noun
    to be translated here. Capitalization reflects its use as the stated name.
- source_word: ὄνομά μοι
  chosen: My name is
  alternatives:
  - My name is called
  - The name for me is
  lexicon: BDAG
  rationale: Natural English equivalent of the Greek nominal expression with dative
    pronoun; preserves the self-identification formula.
- source_word: ὅτι πολλοί ἐσμεν
  chosen: because we are many
  alternatives:
  - for we are many
  - since we are many
  lexicon: BDAG
  rationale: ὅτι here gives the reason for the name. 'Because' is clear modern English,
    and the first person plural 'we are' should be preserved because it is significant
    to the sense of multiple demons speaking through one man.
