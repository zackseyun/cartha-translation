id: MRK.5.31
reference: Mark 5:31
source:
  edition: SBLGNT
  text: καὶ ἔλεγον αὐτῷ οἱ μαθηταὶ αὐτοῦ· Βλέπεις τὸν ὄχλον συνθλίβοντά σε, καὶ λέγεις·
    Τίς μου ἥψατο;
translation:
  text: And his disciples were saying to him, “You see the crowd pressing in on you,
    and you say, ‘Who touched me?’”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “pressing against you.” The Greek participle conveys the crowd compressing
      around Jesus physically.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔλεγον
  chosen: were saying
  alternatives:
  - said
  - kept saying
  lexicon: BDAG
  rationale: Imperfect tense indicates ongoing or repeated speech in narrative; 'were
    saying' preserves that aspect better than simple past 'said' while remaining natural
    English.
- source_word: μαθηταὶ
  chosen: disciples
  alternatives:
  - learners
  - followers
  lexicon: BDAG
  rationale: Standard and contextually appropriate rendering for Jesus' μαθηταί; it
    preserves the relational and instructional sense without unnecessary paraphrase.
- source_word: Βλέπεις
  chosen: You see
  alternatives:
  - You are looking at
  - Look
  lexicon: BDAG
  rationale: Present indicative is best rendered as a direct statement, 'You see,'
    matching the disciples' appeal to what is obvious in the immediate situation.
- source_word: ὄχλον
  chosen: the crowd
  alternatives:
  - the multitude
  - the throng
  lexicon: BDAG
  rationale: '''Crowd'' is clear modern English and fits the narrative setting without
    archaic tone.'
- source_word: συνθλίβοντά
  chosen: pressing in on
  alternatives:
  - crushing
  - pressing against
  - crowding around
  lexicon: BDAG
  rationale: The participle conveys physical compression by the surrounding crowd.
    'Pressing in on' communicates the force and proximity naturally in English without
    overstating to 'crushing.'
- source_word: λέγεις
  chosen: you say
  alternatives:
  - you are saying
  lexicon: BDAG
  rationale: Simple present works idiomatically in English for direct discourse and
    reflects the disciples' incredulous response.
- source_word: Τίς μου ἥψατο
  chosen: Who touched me?
  alternatives:
  - Who touched me on purpose?
  - Who took hold of me?
  lexicon: BDAG
  rationale: ἅπτομαι commonly means 'touch' in this context. The aorist asks about
    the specific act just performed. 'Touched' is the most natural and contextually
    precise rendering.
- source_word: μου
  chosen: me
  alternatives:
  - of me
  lexicon: BDAG
  rationale: The genitive with ἅπτομαι is idiomatically rendered in English as the
    direct object 'me,' not a wooden 'of me.'
