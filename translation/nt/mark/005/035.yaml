theological_decisions:
- issue: Reference of 'the Teacher'
  chosen_reading: Render διδάσκαλον as 'the Teacher,' referring to Jesus without expanding
    the title.
  alternative_readings:
  - the master
  - Jesus
  rationale: The Greek uses the title rather than the name. The translation preserves
    the speakers' perspective and avoids importing a fuller christological confession
    than the text itself states.
  doctrine_reference: Preserve theological tension rather than resolve it; translate
    titles.
