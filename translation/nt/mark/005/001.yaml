id: MRK.5.1
reference: Mark 5:1
source:
  edition: SBLGNT
  text: Καὶ ἦλθον εἰς τὸ πέραν τῆς θαλάσσης εἰς τὴν χώραν τῶν ⸀Γερασηνῶν.
translation:
  text: And they came to the other side of the sea, to the region of the Gerasenes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Some manuscripts read 'Gadarenes'; others read 'Gergesenes.'
    reason: textual_variant
lexical_decisions:
- source_word: Καὶ
  chosen: And
  alternatives:
  - Then
  lexicon: BDAG
  rationale: Standard connective; 'And' preserves Mark's paratactic narrative flow
    more transparently than smoothing to 'Then.'
- source_word: ἦλθον
  chosen: they came
  alternatives:
  - they arrived
  - he and his companions came
  lexicon: BDAG
  rationale: Aorist indicative plural of ἔρχομαι is best rendered simply as 'they
    came.' The plural reflects Jesus and those with him from the prior context.
- source_word: εἰς τὸ πέραν
  chosen: to the other side
  alternatives:
  - across
  - to the far side
  lexicon: BDAG
  rationale: This idiom refers to crossing to the opposite side of the lake. 'To the
    other side' is natural English and preserves the directional sense without over-paraphrase.
- source_word: τῆς θαλάσσης
  chosen: of the sea
  alternatives:
  - of the lake
  lexicon: BDAG
  rationale: Though the referent is the Sea of Galilee (a lake), the Greek says 'sea,'
    and retaining 'sea' respects the source wording and common Gospel usage.
- source_word: εἰς τὴν χώραν
  chosen: to the region
  alternatives:
  - to the country
  - to the territory
  lexicon: BDAG
  rationale: χώρα here denotes a district or region rather than 'country' in the modern
    nation-state sense. 'Region' is clear modern English.
- source_word: Γερασηνῶν
  chosen: of the Gerasenes
  alternatives:
  - of the people of Gerasa
  lexicon: BDAG
  rationale: The gentilic plural is most naturally rendered 'Gerasenes.' This follows
    the SBLGNT reading and transliterates the place-derived people name rather than
    translating it.
