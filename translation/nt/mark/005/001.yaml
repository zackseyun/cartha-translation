theological_decisions:
- issue: Place-name textual/geographical variation in the demoniac narrative
  chosen_reading: Gerasenes
  alternative_readings:
  - Gadarenes
  - Gergesenes
  rationale: The SBLGNT text reads Γερασηνῶν. Because the place-name varies across
    manuscripts and has generated longstanding discussion, the main text follows the
    base Greek text while preserving major alternatives in a footnote for auditability.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; preserve alternatives in footnotes where ambiguity or contested readings
    are significant.'
