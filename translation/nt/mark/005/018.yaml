theological_decisions:
- issue: Rendering of δαιμονισθείς in a way that reflects personal demonic affliction
    without importing later clinical or metaphorical categories
  chosen_reading: demon-possessed
  alternative_readings:
  - demonized
  - under the power of demons
  rationale: The term in Gospel narrative denotes real demonic domination of a person.
    'Demon-possessed' is the clearest established English expression and best fits
    historic Christian reading, while avoiding reduction to mere illness. 'Demonized'
    is possible but less idiomatic for general readers.
  doctrine_reference: Affirmations; Translation philosophy §§1, 6
