id: MRK.5.11
reference: Mark 5:11
source:
  edition: SBLGNT
  text: ἦν δὲ ἐκεῖ πρὸς τῷ ὄρει ἀγέλη χοίρων μεγάλη βοσκομένη·
translation:
  text: Now there was there near the mountain a large herd of pigs feeding.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'by the mountain.' The Greek phrase πρὸς τῷ ὄρει indicates location near
      or beside the mountain.
    reason: lexical_alternative
  - marker: b
    text: Or 'swine.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἦν δὲ
  chosen: Now there was
  alternatives:
  - And there was
  - Now there was
  lexicon: BDAG
  rationale: ἦν gives the existential 'there was.' δέ is a mild connective; 'now'
    preserves the narrative transition in readable English better than a bare 'and,'
    while not overstating contrast.
- source_word: ἐκεῖ
  chosen: there
  alternatives:
  - in that place
  lexicon: BDAG
  rationale: Simple locative adverb; 'there' is the natural direct equivalent.
- source_word: πρὸς τῷ ὄρει
  chosen: near the mountain
  alternatives:
  - by the mountain
  - at the mountain
  lexicon: BDAG
  rationale: With the dative, πρός here indicates proximity/location. 'Near the mountain'
    is idiomatic English and preserves the spatial sense without overprecision.
- source_word: ἀγέλη
  chosen: herd
  alternatives:
  - drove
  lexicon: BDAG
  rationale: ἀγέλη denotes a herd or drove of animals. 'Herd' is the most common and
    natural English term here.
- source_word: χοίρων
  chosen: of pigs
  alternatives:
  - of swine
  lexicon: BDAG
  rationale: χοῖρος refers to pigs/swine. 'Pigs' is preferred for readable modern
    English; 'swine' is a valid but more formal alternative.
- source_word: μεγάλη
  chosen: large
  alternatives:
  - great
  - big
  lexicon: BDAG
  rationale: μέγας here describes size/number of the herd. 'Large' is the most natural
    attributive rendering in contemporary English.
- source_word: βοσκομένη
  chosen: feeding
  alternatives:
  - grazing
  - being fed
  - pasturing
  lexicon: BDAG
  rationale: The present participle describes the herd in the act/state of feeding.
    'Feeding' is concise and natural. 'Grazing' is possible, but 'feeding' is broader
    and avoids implying only grass-eating.
