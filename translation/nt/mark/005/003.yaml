id: MRK.5.3
reference: Mark 5:3
source:
  edition: SBLGNT
  text: ὃς τὴν κατοίκησιν εἶχεν ἐν τοῖς μνήμασιν, καὶ ⸂οὐδὲ ἁλύσει οὐκέτι⸃ οὐδεὶς
    ἐδύνατο αὐτὸν δῆσαι
translation:
  text: who had his dwelling among the tombs, and no one could bind him anymore, not
    even with a chain.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'who had his dwelling in the tombs.'
    reason: lexical_alternative
lexical_decisions:
- source_word: κατοίκησιν
  chosen: dwelling
  alternatives:
  - home
  - dwelling place
  lexicon: BDAG
  rationale: The noun denotes a place of habitation or dwelling. 'Dwelling' is natural
    English and preserves the concrete sense without over-specifying permanence. 'Home'
    could sound too domestic; 'dwelling place' is more wooden.
- source_word: εἶχεν
  chosen: had
  alternatives:
  - kept
  - was having
  lexicon: BDAG
  rationale: 'The imperfect of ἔχω here idiomatically expresses where he lived: ''had
    his dwelling.'' This preserves the Greek construction better than recasting entirely
    as ''lived,'' while remaining readable.'
- source_word: ἐν τοῖς μνήμασιν
  chosen: among the tombs
  alternatives:
  - in the tombs
  - among the graves
  lexicon: BDAG
  rationale: μνῆμα refers to a tomb or burial place. 'Tombs' is more precise than
    'graves' in this setting. 'Among the tombs' fits the scene naturally in English
    and avoids implying he was literally inside a single tomb at all times.
- source_word: οὐδὲ ἁλύσει
  chosen: not even with a chain
  alternatives:
  - not even by a chain
  - not even with chains
  lexicon: BDAG
  rationale: 'ἅλυσις is singular, so ''with a chain'' reflects the form. The construction
    with οὐδέ intensifies the impossibility: no one could bind him anymore, not even
    with a chain.'
- source_word: οὐκέτι
  chosen: anymore
  alternatives:
  - no longer
  lexicon: BDAG
  rationale: οὐκέτι marks cessation from a prior state. 'Anymore' is idiomatic in
    this narrative context; 'no longer' would also be valid but slightly stiffer.
- source_word: ἐδύνατο
  chosen: could
  alternatives:
  - was able to
  lexicon: BDAG
  rationale: The imperfect middle/passive of δύναμαι expresses ongoing inability in
    past time. 'Could' is the most natural English equivalent here.
- source_word: δῆσαι
  chosen: bind
  alternatives:
  - tie up
  - restrain
  lexicon: BDAG
  rationale: δέω means to bind or tie. 'Bind' preserves the force and matches the
    context of physical restraint with chains better than the more interpretive 'restrain'.
