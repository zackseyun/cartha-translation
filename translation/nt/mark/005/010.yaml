theological_decisions:
- issue: Subject reference of the singular verbs and plural pronoun in the demonic
    speech context
  chosen_reading: Render the singular speaker as 'he' and the plural object as 'them,'
    reflecting the narrative's oscillation between the spokesman and the many demons.
  alternative_readings:
  - Render more collectively to smooth the number shift
  rationale: 'The Greek text itself preserves the tension: a singular spokesman (''he
    begged him'') speaks on behalf of a plurality (''not to send them''). The translation
    keeps this rather than harmonizing it away.'
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
