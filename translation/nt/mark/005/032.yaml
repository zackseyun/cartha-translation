id: MRK.5.32
reference: Mark 5:32
source:
  edition: SBLGNT
  text: καὶ περιεβλέπετο ἰδεῖν τὴν τοῦτο ποιήσασαν.
translation:
  text: And he kept looking around to see the woman who had done this.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''the one who had done this'' is feminine, indicating specifically
      a woman.'
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ
  chosen: And
  alternatives:
  - Then
  - So
  lexicon: BDAG
  rationale: Standard connective; 'And' preserves the narrative flow without adding
    inferential force not explicit in the Greek.
- source_word: περιεβλέπετο
  chosen: he kept looking around
  alternatives:
  - he was looking around
  - he looked around
  lexicon: BDAG
  rationale: Imperfect middle indicates ongoing or repeated action in past time. 'Kept
    looking around' best captures the durative force and the sense of scanning the
    surroundings.
- source_word: ἰδεῖν
  chosen: to see
  alternatives:
  - to catch sight of
  - to find
  lexicon: BDAG
  rationale: Aorist infinitive of purpose/complement after the verb of looking; 'to
    see' is the most direct and idiomatic rendering without overinterpreting.
- source_word: τὴν ... ποιήσασαν
  chosen: the woman who had done
  alternatives:
  - the one who had done
  - her who had done
  lexicon: BDAG
  rationale: The article with feminine accusative participle refers specifically to
    a female person. English requires making the implied referent explicit; 'the woman
    who had done' naturally conveys the substantival participle.
- source_word: τοῦτο
  chosen: this
  alternatives:
  - this thing
  lexicon: BDAG
  rationale: Demonstrative pronoun referring to the immediately preceding act; 'this'
    is sufficiently clear and idiomatic in English.
