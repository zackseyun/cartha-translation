theological_decisions:
- issue: Description of Jesus sensing δύναμις going out from him
  chosen_reading: Retained the text's straightforward statement that Jesus perceived
    power had gone out from him, without reducing it to mere metaphor or expanding
    it into a doctrinal explanation.
  alternative_readings:
  - Rendered more interpretively as 'he knew that healing power had gone out from
    him'
  - Rendered more skeptically as subjective feeling rather than actual power
  rationale: The verse presents a real effect associated with Jesus' healing ministry.
    In keeping with orthodox Christology and the translation philosophy, the wording
    preserves the narrative claim without speculative explanation about the mechanics
    of the miracle.
  doctrine_reference: Affirmations; Translation philosophy §1, §3
