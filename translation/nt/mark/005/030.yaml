id: MRK.5.30
reference: Mark 5:30
source:
  edition: SBLGNT
  text: καὶ ⸀εὐθὺς ὁ Ἰησοῦς ἐπιγνοὺς ἐν ἑαυτῷ τὴν ἐξ αὐτοῦ δύναμιν ἐξελθοῦσαν ἐπιστραφεὶς
    ἐν τῷ ὄχλῳ ἔλεγεν· Τίς μου ἥψατο τῶν ἱματίων;
translation:
  text: And immediately Jesus, perceiving in himself that power had gone out from
    him, turned around in the crowd and said, “Who touched my clothes?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “my garments.”
    reason: lexical_alternative
lexical_decisions:
- source_word: εὐθὺς
  chosen: immediately
  alternatives:
  - at once
  - straightway
  lexicon: BDAG
  rationale: Standard temporal adverb in Mark, often conveying rapid narrative movement.
    'Immediately' is natural modern English and preserves Mark's urgency better than
    the archaic 'straightway'.
- source_word: ἐπιγνοὺς
  chosen: perceiving
  alternatives:
  - recognizing
  - becoming aware
  lexicon: BDAG
  rationale: Aorist participle of ἐπιγινώσκω indicates full or clear awareness. 'Perceiving'
    fits the inward recognition described by the following phrase ἐν ἑαυτῷ and reads
    naturally in English.
- source_word: ἐν ἑαυτῷ
  chosen: in himself
  alternatives:
  - within himself
  lexicon: BDAG
  rationale: The phrase marks internal awareness rather than external observation.
    'In himself' is a close and idiomatic rendering.
- source_word: δύναμιν
  chosen: power
  alternatives:
  - strength
  - miraculous power
  lexicon: BDAG
  rationale: δύναμις here refers to effective power proceeding from Jesus in connection
    with healing. 'Power' is the most direct and sufficiently broad rendering; 'miraculous
    power' would over-specify beyond the immediate wording.
- source_word: ἐξελθοῦσαν
  chosen: had gone out
  alternatives:
  - going out
  - had proceeded out
  lexicon: BDAG
  rationale: 'The participle modifies δύναμιν and denotes completed action relative
    to Jesus'' perception. English past perfect best captures the sense in context:
    he perceived that power had already gone out from him.'
- source_word: ἐπιστραφεὶς
  chosen: turned around
  alternatives:
  - turning
  - turned
  lexicon: BDAG
  rationale: The participle indicates physical turning in response to the event. 'Turned
    around' is vivid, idiomatic, and fits the crowded setting.
- source_word: ἐν τῷ ὄχλῳ
  chosen: in the crowd
  alternatives:
  - among the crowd
  - in the midst of the crowd
  lexicon: BDAG
  rationale: The prepositional phrase situates Jesus within the pressing crowd. 'In
    the crowd' is concise and natural.
- source_word: ἔλεγεν
  chosen: said
  alternatives:
  - was saying
  - kept saying
  lexicon: BDAG
  rationale: Imperfect can suggest ongoing or inceptive action, but in English dialogue
    introduction 'said' is the most natural default. The context does not require
    emphasis on repeated speech.
- source_word: ἥψατο
  chosen: touched
  alternatives:
  - laid hold of
  - took hold of
  lexicon: BDAG
  rationale: Middle form of ἅπτω in this idiom means 'touch.' This matches the narrative
    context of the woman's contact with Jesus' garment.
- source_word: τῶν ἱματίων
  chosen: my clothes
  alternatives:
  - my garments
  - my cloak
  lexicon: BDAG
  rationale: ἱμάτια is plural and broadly refers to garments/clothing. 'My clothes'
    is clear modern English; 'garments' is more formal but less natural, and 'cloak'
    is too specific.
