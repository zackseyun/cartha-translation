id: MRK.5.37
reference: Mark 5:37
source:
  edition: SBLGNT
  text: καὶ οὐκ ἀφῆκεν οὐδένα ⸂μετ’ αὐτοῦ⸃ συνακολουθῆσαι εἰ μὴ ⸀τὸν Πέτρον καὶ Ἰάκωβον
    καὶ Ἰωάννην τὸν ἀδελφὸν Ἰακώβου.
translation:
  text: And he allowed no one to accompany him except Peter and James and John, the
    brother of James.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἀφῆκεν
  chosen: allowed
  alternatives:
  - permitted
  - let
  lexicon: BDAG
  rationale: In this construction with an infinitive ('to accompany'), ἀφίημι means
    to permit or allow. 'Allowed' is natural modern English and preserves the sense
    that Jesus did not permit others to go with him.
- source_word: οὐδένα
  chosen: no one
  alternatives:
  - nobody
  - anyone
  lexicon: BDAG
  rationale: The accusative object with negation is best rendered 'no one,' preserving
    the total exclusion in straightforward English.
- source_word: μετ’ αὐτοῦ
  chosen: him
  alternatives:
  - with him
  lexicon: BDAG
  rationale: The sense of accompaniment is already carried by 'accompany,' so rendering
    the phrase as the object 'him' avoids redundancy while preserving meaning.
- source_word: συνακολουθῆσαι
  chosen: to accompany
  alternatives:
  - to follow along with
  - to go with
  lexicon: BDAG
  rationale: The compound verb means to follow together with or accompany. 'Accompany'
    is concise, idiomatic, and captures the idea of going along with Jesus in this
    specific setting better than the more wooden 'follow along with.'
- source_word: εἰ μὴ
  chosen: except
  alternatives:
  - unless
  - if not
  lexicon: BDAG
  rationale: Here εἰ μὴ introduces an exception, not a condition. 'Except' is the
    clearest English equivalent.
- source_word: τὸν Πέτρον καὶ Ἰάκωβον καὶ Ἰωάννην
  chosen: Peter and James and John
  alternatives:
  - Peter, James, and John
  lexicon: N/A
  rationale: The names are transliterated per translation philosophy. The repeated
    'and' reflects the Greek coordination; English style could also use commas, but
    the chosen form stays slightly closer to the source without sounding unnatural.
- source_word: τὸν ἀδελφὸν Ἰακώβου
  chosen: the brother of James
  alternatives:
  - James's brother
  lexicon: BDAG
  rationale: This appositional phrase identifies which John is meant. 'The brother
    of James' is the most transparent and formally aligned rendering.
