id: MRK.5.19
reference: Mark 5:19
source:
  edition: SBLGNT
  text: ⸀καὶ οὐκ ἀφῆκεν αὐτόν, ἀλλὰ λέγει αὐτῷ· Ὕπαγε εἰς τὸν οἶκόν σου πρὸς τοὺς
    σούς, καὶ ⸀ἀπάγγειλον αὐτοῖς ὅσα ⸂ὁ κύριός σοι⸃ πεποίηκεν καὶ ἠλέησέν σε.
translation:
  text: And he did not permit him, but said to him, “Go to your home, to your own
    people, and report to them how much the Lord has done for you and has shown mercy
    to you.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'all that the Lord has done for you.'
    reason: lexical_alternative
  - marker: b
    text: Greek literally, 'to your own.' The phrase may refer broadly to his own
      people, including family and close associates.
    reason: lexical_alternative
  - marker: c
    text: Some interpreters understand 'the Lord' here specifically as God; others
      see Mark intentionally preserving a link between God's mercy and Jesus' own
      authority and action.
    reason: alternative_reading
lexical_decisions:
- source_word: ἀφῆκεν
  chosen: did not permit
  alternatives:
  - did not allow
  - did not let
  lexicon: BDAG
  rationale: ἀφίημι here means to allow or permit rather than its other common senses
    such as forgive or leave. 'Did not permit' is clear, idiomatic, and slightly more
    formal than 'did not let.'
- source_word: λέγει
  chosen: said
  alternatives:
  - says
  lexicon: BDAG
  rationale: The Greek uses the historical present ('says'), but standard English
    narrative style commonly renders it as past tense. This is an optimal-equivalence
    smoothing rather than a change in meaning.
- source_word: Ὕπαγε
  chosen: Go
  alternatives:
  - Go away
  - Depart
  lexicon: BDAG
  rationale: The imperative calls for departure to a destination. 'Go' is the most
    natural English rendering in context.
- source_word: εἰς τὸν οἶκόν σου
  chosen: to your home
  alternatives:
  - into your house
  - to your house
  lexicon: BDAG
  rationale: οἶκος can mean house or household/home. Here the sense is returning to
    one's domestic sphere; 'home' communicates that naturally in English.
- source_word: πρὸς τοὺς σούς
  chosen: to your own people
  alternatives:
  - to your own
  - to your family
  - to your relatives
  lexicon: BDAG
  rationale: The phrase literally means 'to your own [people].' Because English normally
    requires an explicit referent, 'your own people' preserves the breadth better
    than the narrower 'family,' while remaining idiomatic.
- source_word: ἀπάγγειλον
  chosen: report
  alternatives:
  - tell
  - announce
  - declare
  lexicon: BDAG
  rationale: ἀπαγγέλλω means to report or tell back. 'Report' preserves the sense
    of giving an account without sounding overly formal like 'declare.'
- source_word: ὅσα
  chosen: how much
  alternatives:
  - what things
  - all that
  lexicon: BDAG
  rationale: In this construction, ὅσα introduces the extent/content of what was done.
    'How much' is idiomatic English and fits the sense of recounting the magnitude
    of the Lord's action. 'All that' is also possible but slightly less natural here.
- source_word: ὁ κύριός σοι
  chosen: the Lord has done for you
  alternatives:
  - your Lord has done
  - the master has done for you
  lexicon: BDAG
  rationale: κύριος is a contested term with default rendering 'Lord' per doctrine.
    The dative σοι is best taken with the verb ('for you') rather than attributively
    ('your Lord'), yielding more natural English and matching the likely sense of
    benefaction.
- source_word: ἠλέησέν σε
  chosen: has shown mercy to you
  alternatives:
  - has had mercy on you
  - has been merciful to you
  lexicon: BDAG
  rationale: ἐλεάω denotes showing mercy or compassion. 'Has shown mercy to you' preserves
    the verbal force and theological weight of mercy language.
