theological_decisions:
- issue: Rendering of κύριος in a context where Jesus speaks of what 'the Lord' has
    done
  chosen_reading: the Lord
  alternative_readings:
  - God
  - the master
  rationale: Per doctrine, κύριος defaults to 'Lord.' In context, Jesus refers the
    healed man to proclaim what 'the Lord' has done and how mercy was shown. This
    may invite readers to consider the relationship between Jesus' own action and
    divine action, and the translation should preserve that theological tension rather
    than resolve it by substituting 'God' in the main text. 'Master' is lexically
    possible in some contexts but is not the doctrinal default and is less fitting
    here.
  doctrine_reference: 'DOCTRINE.md: Contested terms table (κύριος → ''Lord''); Translation
    philosophy #3 preserve theological tension rather than resolve it.'
