theological_decisions:
- issue: Rendering of πνεῦμα ἀκάθαρτον in an exorcism context
  chosen_reading: unclean spirit
  alternative_readings:
  - evil spirit
  rationale: The Greek explicitly says 'unclean spirit,' a standard Gospel expression
    that carries ritual and moral impurity connotations. 'Evil spirit' is interpretive
    and less precise, so it is not used in the main text.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; preserve the source text''s plain sense.'
