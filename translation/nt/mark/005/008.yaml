id: MRK.5.8
reference: Mark 5:8
source:
  edition: SBLGNT
  text: ἔλεγεν γὰρ αὐτῷ· Ἔξελθε τὸ πνεῦμα τὸ ἀκάθαρτον ἐκ τοῦ ἀνθρώπου.
translation:
  text: For he was saying to him, “Come out of the man, you unclean spirit.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or: “Go out of the man, unclean spirit.” The Greek can be rendered with
      ''the unclean spirit,'' but the construction functions as direct address.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔλεγεν
  chosen: he was saying
  alternatives:
  - he said
  - he kept saying
  lexicon: BDAG
  rationale: Imperfect tense indicates ongoing or repeated action in past time. 'He
    was saying' preserves the narrative background sense better than the simple past
    'he said,' while remaining natural English.
- source_word: γὰρ
  chosen: For
  alternatives:
  - because
  - since
  lexicon: BDAG
  rationale: γάρ gives explanatory background for the preceding verse. 'For' is concise
    and preserves the connective force without overinterpreting the relation.
- source_word: αὐτῷ
  chosen: to him
  alternatives:
  - to it
  lexicon: BDAG
  rationale: The dative pronoun refers to the demonized man as the immediate addressee
    in the narrative frame, though the command targets the unclean spirit within him.
    'To him' follows the Greek wording and the narrative setup.
- source_word: Ἔξελθε
  chosen: Come out
  alternatives:
  - Go out
  - Exit
  lexicon: BDAG
  rationale: Aorist imperative gives a direct command. 'Come out' is idiomatic English
    in exorcism contexts and fits the perspective of expulsion from the man. 'Go out'
    is possible but less natural here.
- source_word: τὸ πνεῦμα τὸ ἀκάθαρτον
  chosen: you unclean spirit
  alternatives:
  - the unclean spirit
  - unclean spirit
  lexicon: BDAG
  rationale: Although formally nominative with article, this construction functions
    as a vocative in direct address after the imperative. Rendering it as 'you unclean
    spirit' makes the address explicit and natural in English while preserving the
    force of the command.
- source_word: ἐκ
  chosen: out of
  alternatives:
  - from
  lexicon: BDAG
  rationale: With the verb of exiting, ἐκ naturally expresses movement out from within.
    'Out of' is the most idiomatic pairing with 'come out.'
- source_word: τοῦ ἀνθρώπου
  chosen: the man
  alternatives:
  - this man
  - the person
  lexicon: BDAG
  rationale: ἄνθρωπος here refers to the specific male individual in the story, not
    humanity in general. 'The man' is both accurate and natural, and it preserves
    the gendered reference present in context.
