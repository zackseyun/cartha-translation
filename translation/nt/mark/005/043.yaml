theological_decisions:
- issue: Messianic secrecy motif / scope of Jesus' command
  chosen_reading: Render the statement as a strong instruction that the event not become known, without expanding it into a broader theological explanation.
  alternative_readings:
  - Interpret as a command only to the immediate family and witnesses
  - Interpret as part of Mark's larger secrecy theme with explanatory wording
  rationale: The verse itself states only that Jesus strongly ordered those present that no one should know this. The translation preserves that plain sense and does not import a fuller theological explanation into the text.
  doctrine_reference: Preserve theological tension rather than resolve it.
revisions:
- timestamp: '2026-04-21T19:54:40Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/high_scrutiny/nt/mark/005/043.job-5144.json
  category: awkward_english
  tier: 1
  from: he said that something should be given to her to eat
  to: he directed that she be given something to eat
  rationale: The current rendering of the second clause is grammatically sound but slightly stilted ('something should be given to her to eat'). Recasting the clause to make the recipient ('she') the subject of the passive construction ('she be given something to eat') is more idiomatic in English, while still faithfully representing the passive voice of the Greek 'δοθῆναι'. 'Directed' is also a strong choice for 'εἶπεν' in this imperatival context.
