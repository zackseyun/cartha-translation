id: MRK.5.5
reference: Mark 5:5
source:
  edition: SBLGNT
  text: καὶ διὰ παντὸς νυκτὸς καὶ ἡμέρας ἐν τοῖς ⸂μνήμασιν καὶ ἐν τοῖς ὄρεσιν⸃ ἦν
    κράζων καὶ κατακόπτων ἑαυτὸν λίθοις.
translation:
  text: And continually, night and day, among the tombs and on the mountains, he was
    crying out and cutting himself with stones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'he kept crying out and gashing himself with stones.'
    reason: lexical_alternative
lexical_decisions:
- source_word: διὰ παντὸς νυκτὸς καὶ ἡμέρας
  chosen: continually, night and day
  alternatives:
  - throughout every night and day
  - all night and day
  lexicon: BDAG
  rationale: The idiom with διά + genitive conveys continuance over the whole span
    of time. 'Continually, night and day' captures both the temporal expression and
    the ongoing force in natural English.
- source_word: μνήμασιν
  chosen: tombs
  alternatives:
  - graves
  lexicon: BDAG
  rationale: μνῆμα commonly refers to a burial place or tomb. 'Tombs' fits the likely
    rock-cut burial context better than the more general 'graves'.
- source_word: ὄρεσιν
  chosen: mountains
  alternatives:
  - hills
  lexicon: BDAG
  rationale: ὄρος normally means 'mountain.' Although the terrain could be rendered
    'hills' idiomatically, 'mountains' is the more direct and consistent gloss.
- source_word: ἦν κράζων
  chosen: he was crying out
  alternatives:
  - he kept crying out
  - he was shouting
  lexicon: BDAG
  rationale: The imperfect of εἰμί with a present participle expresses ongoing action
    in past time. 'He was crying out' preserves the durative sense without over-paraphrasing.
- source_word: κατακόπτων ἑαυτὸν
  chosen: cutting himself
  alternatives:
  - gashing himself
  - mutilating himself
  lexicon: BDAG
  rationale: κατακόπτω denotes striking or cutting severely. 'Cutting himself' is
    clear and restrained, while still conveying self-harm; stronger options like 'gashing'
    are possible but slightly more interpretive.
- source_word: λίθοις
  chosen: with stones
  alternatives:
  - using stones
  lexicon: BDAG
  rationale: The dative is instrumental here. 'With stones' is the natural English
    rendering.
