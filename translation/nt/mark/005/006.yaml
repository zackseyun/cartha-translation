theological_decisions:
- issue: Whether προσεκύνησεν should be rendered as an explicit act of worship toward
    Jesus
  chosen_reading: Rendered as 'bowed down before him' in the main text
  alternative_readings:
  - worshiped him
  - paid homage to him
  rationale: The verb προσκυνέω can refer to worship or to an act of obeisance/homage.
    In this narrative setting, translating it as 'worshiped' could prematurely resolve
    a debated nuance, while 'bowed down before him' preserves the visible action and
    leaves the theological force available from context. This follows the doctrine
    principle of preserving theological tension rather than resolving it where the
    source allows more than one nuance.
  doctrine_reference: DOCTRINE.md Translation philosophy §3
