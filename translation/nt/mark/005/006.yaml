id: MRK.5.6
reference: Mark 5:6
source:
  edition: SBLGNT
  text: ⸂καὶ ἰδὼν⸃ τὸν Ἰησοῦν ἀπὸ μακρόθεν ἔδραμεν καὶ προσεκύνησεν ⸀αὐτόν,
translation:
  text: And seeing Jesus from a distance, he ran and bowed down before him,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'worshiped him' or 'paid homage to him.' The Greek verb can denote worship
      or an act of obeisance/prostration, depending on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἰδὼν
  chosen: seeing
  alternatives:
  - when he saw
  - after seeing
  lexicon: BDAG
  rationale: Aorist participle of ὁράω, rendered as a participial clause to preserve
    the Greek sequence and narrative flow. 'Seeing' is concise and natural in English;
    temporal alternatives are possible but more interpretive.
- source_word: ἀπὸ μακρόθεν
  chosen: from a distance
  alternatives:
  - from far away
  - from afar
  lexicon: BDAG
  rationale: The preposition with adverb conveys spatial distance. 'From a distance'
    is clear modern English and avoids the slightly literary tone of 'from afar'.
- source_word: ἔδραμεν
  chosen: he ran
  alternatives:
  - he rushed
  lexicon: BDAG
  rationale: Aorist indicative of τρέχω, straightforwardly denoting running. 'He ran'
    is the plain sense and avoids adding intensity beyond the verb itself.
- source_word: προσεκύνησεν αὐτόν
  chosen: bowed down before him
  alternatives:
  - worshiped him
  - paid homage to him
  - prostrated himself before him
  lexicon: BDAG
  rationale: προσκυνέω can denote worship, prostration, or homage depending on context.
    Here, because the act is performed by a demon-possessed man and the immediate
    context does not require the translator to resolve whether this is full religious
    worship or an act of obeisance, 'bowed down before him' preserves the physical
    act without flattening the term. The stronger alternatives are preserved in a
    footnote to maintain theological and lexical transparency.
- source_word: καὶ
  chosen: And
  alternatives:
  - Then
  - Now
  lexicon: BDAG
  rationale: Retained as simple narrative coordination at the start of the verse.
    'And' best reflects Mark's paratactic style.
- source_word: τὸν Ἰησοῦν
  chosen: Jesus
  lexicon: BDAG
  rationale: Direct object with article before the proper name; standard English omits
    the article with personal names.
