id: MRK.5.27
reference: Mark 5:27
source:
  edition: SBLGNT
  text: ⸀ἀκούσασα περὶ τοῦ Ἰησοῦ, ἐλθοῦσα ἐν τῷ ὄχλῳ ὄπισθεν ἥψατο τοῦ ἱματίου αὐτοῦ·
translation:
  text: having heard about Jesus, she came up behind him in the crowd and touched
    his garment.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his cloak' or 'his clothing.' The Greek ἱμάτιον refers broadly to a
      garment, often an outer garment.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀκούσασα
  chosen: having heard
  alternatives:
  - after hearing
  - when she heard
  lexicon: BDAG
  rationale: Aorist participle, feminine singular, indicating prior action relative
    to the main verb. 'Having heard' preserves the participial sequence without over-paraphrasing
    into a full temporal clause.
- source_word: περὶ τοῦ Ἰησοῦ
  chosen: about Jesus
  alternatives:
  - concerning Jesus
  - about Yeshua
  lexicon: BDAG
  rationale: περί with the genitive commonly means 'about' or 'concerning.' 'About
    Jesus' is natural modern English and preserves the informational sense. The personal
    name is transliterated by standard convention per translation philosophy.
- source_word: ἐλθοῦσα
  chosen: she came up
  alternatives:
  - having come
  - she came
  lexicon: BDAG
  rationale: Aorist participle from ἔρχομαι, coordinated with the previous participle
    and leading into the main action. 'She came up' fits the narrative movement toward
    Jesus more idiomatically than the more wooden 'having come.'
- source_word: ἐν τῷ ὄχλῳ
  chosen: in the crowd
  alternatives:
  - among the crowd
  - within the crowd
  lexicon: BDAG
  rationale: ἐν with dative here expresses location/surrounding circumstance. 'In
    the crowd' is the most natural English rendering.
- source_word: ὄπισθεν
  chosen: behind him
  alternatives:
  - from behind
  - behind
  lexicon: BDAG
  rationale: ὄπισθεν indicates position to the rear. English normally supplies the
    object for clarity from context; 'behind him' makes explicit that she approached
    Jesus from the rear.
- source_word: ἥψατο
  chosen: touched
  alternatives:
  - took hold of
  - clung to
  lexicon: BDAG
  rationale: Middle aorist of ἅπτω in this construction means 'touch' or 'take hold
    of.' In this healing narrative, 'touched' is the standard and contextually appropriate
    rendering without overstating duration or force.
- source_word: τοῦ ἱματίου αὐτοῦ
  chosen: his garment
  alternatives:
  - his cloak
  - his clothing
  lexicon: BDAG
  rationale: ἱμάτιον denotes an outer garment or cloak. 'Garment' is broad enough
    to remain accurate without specifying a modern clothing type; singular matches
    the Greek.
