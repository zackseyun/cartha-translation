  from: What do you have to do with me, and I with you
  to: What have I to do with you
  rationale: The Greek phrase 'Τί ἐμοὶ καὶ σοί' is a common Semitic idiom of dissociation. The current rendering is an over-translation that becomes slightly awkward and loses the concise, sharp force of the demon's cry. A more standard and forceful rendering like 'What have I to do with you?' (already present in footnote 'a') better captures the sense of protest found in the source text and in other uses of this idiom in the Bible.
