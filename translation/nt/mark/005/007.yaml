theological_decisions:
- issue: Rendering the demon's recognition of Jesus' identity
  chosen_reading: Son of the Most High God
  alternative_readings:
  - Son of God Most High
  rationale: The translation preserves the explicit christological confession in the text without weakening or expanding it. This aligns with historic orthodoxy while not importing later doctrinal formulations beyond the verse itself.
  doctrine_reference: Affirmations; Preserve theological tension rather than resolve it
- issue: Force of ὁρκίζω in a demonic plea to Jesus
  chosen_reading: I adjure you by God
  alternative_readings:
  - I implore you by God
  - I put you under oath before God
  rationale: The wording should preserve the striking solemn appeal without smoothing away the tension of a demon invoking God in speech to Jesus. 'Adjure' keeps that tension visible rather than resolving it into a mere request.
  doctrine_reference: 'Translation philosophy #3; #6'
revisions:
- timestamp: '2026-04-21T18:05:30Z'
  adjudicator: auto_apply_tier1
