id: MRK.5.13
reference: Mark 5:13
source:
  edition: SBLGNT
  text: καὶ ἐπέτρεψεν ⸀αὐτοῖς. καὶ ἐξελθόντα τὰ πνεύματα τὰ ἀκάθαρτα εἰσῆλθον εἰς
    τοὺς χοίρους, καὶ ὥρμησεν ἡ ἀγέλη κατὰ τοῦ κρημνοῦ εἰς τὴν θάλασσαν, ⸀ὡς δισχίλιοι,
    καὶ ἐπνίγοντο ἐν τῇ θαλάσσῃ.
translation:
  text: And he permitted them. Then the unclean spirits came out and entered the pigs,
    and the herd—about two thousand—rushed down the steep bank into the sea, and they
    were drowned in the sea.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'down the cliff' or 'down the precipice'; the Greek term can denote a
      steep slope or precipice.
    reason: lexical_alternative
  - marker: b
    text: Greek 'the sea.' This refers to the Sea of Galilee.
    reason: cultural_note
lexical_decisions:
- source_word: ἐπέτρεψεν αὐτοῖς
  chosen: he permitted them
  alternatives:
  - he allowed them
  - he gave them permission
  lexicon: BDAG
  rationale: ἐπιτρέπω means to permit or allow. 'Permitted' is slightly more formal
    and concise, fitting the narrative tone while preserving the sense of granted
    permission.
- source_word: τὰ πνεύματα τὰ ἀκάθαρτα
  chosen: the unclean spirits
  alternatives:
  - the impure spirits
  lexicon: BDAG
  rationale: Standard rendering of the Markan expression; 'unclean' preserves both
    ritual/moral connotations better than 'impure' and matches established NT usage
    without obscuring meaning.
- source_word: ἐξελθόντα
  chosen: came out
  alternatives:
  - went out
  lexicon: BDAG
  rationale: Aorist participle of ἐξέρχομαι, referring to the spirits leaving the
    man. 'Came out' is idiomatic in English for expulsion and fits the narrative sequence.
- source_word: εἰσῆλθον εἰς τοὺς χοίρους
  chosen: entered the pigs
  alternatives:
  - went into the pigs
  - entered into the pigs
  lexicon: BDAG
  rationale: '''Entered the pigs'' is natural English and accurately reflects εἰσέρχομαι
    with εἰς. ''Pigs'' is more natural contemporary English than ''swine'' while remaining
    precise.'
- source_word: χοίρους
  chosen: pigs
  alternatives:
  - swine
  - hogs
  lexicon: BDAG
  rationale: χοῖρος denotes pigs/swine. 'Pigs' is the clearest modern English choice
    per readability goals.
- source_word: ὥρμησεν ἡ ἀγέλη
  chosen: the herd ... rushed
  alternatives:
  - the herd ... charged
  - the herd ... stampeded
  lexicon: BDAG
  rationale: Although the Greek verb is singular with collective subject ἡ ἀγέλη,
    English naturally renders the collective as singular 'the herd rushed.' 'Rushed'
    preserves the sudden violent movement without overinterpreting.
- source_word: κατὰ τοῦ κρημνοῦ
  chosen: down the steep bank
  alternatives:
  - down the cliff
  - down the precipice
  lexicon: BDAG
  rationale: κρημνός denotes a steep slope, bank, or precipice. 'Steep bank' avoids
    implying a sheer vertical cliff while still conveying dangerous descent; this
    is a balanced rendering.
- source_word: εἰς τὴν θάλασσαν
  chosen: into the sea
  alternatives:
  - into the lake
  lexicon: BDAG
  rationale: θάλασσα is literally 'sea.' Although the body of water is the Sea of
    Galilee (a lake), the Greek says 'sea,' and original-language primacy favors retaining
    that wording.
- source_word: ὡς δισχίλιοι
  chosen: about two thousand
  alternatives:
  - approximately two thousand
  - some two thousand
  lexicon: BDAG
  rationale: ὡς with a number indicates approximation. 'About two thousand' is clear,
    idiomatic, and preserves the approximate force.
- source_word: ἐπνίγοντο
  chosen: they were drowned
  alternatives:
  - they were drowning
  - they drowned
  lexicon: BDAG
  rationale: Imperfect passive/middle here presents the result/process as the herd
    perished in the water. 'They were drowned' communicates the outcome naturally
    in English narrative; 'were drowning' overemphasizes process, while 'drowned'
    loses the verbal aspect nuance.
