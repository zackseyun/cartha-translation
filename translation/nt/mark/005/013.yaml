theological_decisions:
- issue: Referent of 'them' in 'he permitted them'
  chosen_reading: '''them'' refers to the unclean spirits requesting permission to
    enter the pigs'
  rationale: The immediate context makes the dative pronoun refer to the demons/unclean
    spirits. This is a contextual referent decision, not a doctrinal expansion.
- issue: Rendering of 'unclean spirits'
  chosen_reading: Retain the personal-spiritual language rather than reducing it to
    impersonal evil forces
  alternative_readings:
  - evil forces
  rationale: The Greek πνεύματα presents personal spiritual beings in the narrative.
    Rendering it as 'spirits' preserves the text's ontology without adding speculative
    demonology beyond the verse.
  doctrine_reference: Affirmations; Preserve theological tension rather than resolve
    it
