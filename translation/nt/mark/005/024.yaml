id: MRK.5.24
reference: Mark 5:24
source:
  edition: SBLGNT
  text: καὶ ἀπῆλθεν μετ’ αὐτοῦ. Καὶ ἠκολούθει αὐτῷ ὄχλος πολύς, καὶ συνέθλιβον αὐτόν.
translation:
  text: And he went with him. And a large crowd was following him and pressing in
    on him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'pressing against him' or 'crowding around him.' The Greek verb conveys
      the crowd's physical compression around Jesus.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπῆλθεν
  chosen: went
  alternatives:
  - went away
  - departed
  lexicon: BDAG
  rationale: Aorist of ἀπέρχομαι here narrates Jesus' movement in response to Jairus.
    'Went' is natural modern English and fits the context better than the more wooden
    'departed' or potentially misleading 'went away.'
- source_word: μετ’ αὐτοῦ
  chosen: with him
  alternatives:
  - along with him
  lexicon: BDAG
  rationale: μετά with the genitive denotes accompaniment. 'With him' is the clearest
    and most idiomatic rendering.
- source_word: ἠκολούθει
  chosen: was following
  alternatives:
  - followed
  - kept following
  lexicon: BDAG
  rationale: The imperfect indicates ongoing action. 'Was following' preserves the
    progressive sense in readable English better than the simple past 'followed.'
- source_word: ὄχλος πολύς
  chosen: a large crowd
  alternatives:
  - a great crowd
  - a big crowd
  lexicon: BDAG
  rationale: ὄχλος is 'crowd' and πολύς here intensifies size. 'A large crowd' is
    natural modern English; 'great crowd' is possible but slightly less idiomatic
    today.
- source_word: συνέθλιβον
  chosen: pressing in on
  alternatives:
  - crowding around
  - pressing against
  - thronging
  lexicon: BDAG
  rationale: συνθλίβω literally conveys pressing together or crushing. In this narrative
    setting the sense is that the crowd was tightly pressing upon Jesus. 'Pressing
    in on' preserves the physical force without overstating it as actual injury.
- source_word: αὐτόν
  chosen: him
  lexicon: BDAG
  rationale: The pronoun refers to Jesus as the object of the crowd's pressing. Rendering
    simply as 'him' is straightforward and contextually clear.
