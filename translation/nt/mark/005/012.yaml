id: MRK.5.12
reference: Mark 5:12
source:
  edition: SBLGNT
  text: καὶ παρεκάλεσαν ⸀αὐτὸν λέγοντες· Πέμψον ἡμᾶς εἰς τοὺς χοίρους, ἵνα εἰς αὐτοὺς
    εἰσέλθωμεν.
translation:
  text: And they begged him, saying, “Send us into the pigs, so that we may enter
    them.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “into the swine.”
    reason: lexical_alternative
lexical_decisions:
- source_word: παρεκάλεσαν
  chosen: begged
  alternatives:
  - implored
  - pleaded with
  - urged
  lexicon: BDAG
  rationale: παρακαλέω in this context of demons addressing Jesus carries a strong
    sense of urgent entreaty, stronger than the flatter 'asked.' 'Begged' is natural
    English and fits the narrative intensity.
- source_word: αὐτὸν
  chosen: him
  rationale: Direct object pronoun referring to Jesus; standard English object pronoun.
- source_word: λέγοντες
  chosen: saying
  alternatives:
  - and said
  lexicon: BDAG
  rationale: The participle introduces the content of their plea. 'Saying' preserves
    the Greek participial structure smoothly in English.
- source_word: Πέμψον
  chosen: Send
  alternatives:
  - permit us to go
  - dispatch
  lexicon: BDAG
  rationale: πέμπω means 'send.' Although the broader context implies permission,
    the explicit lexical sense here is sending, so 'Send' best reflects the Greek
    without paraphrase.
- source_word: ἡμᾶς
  chosen: us
  rationale: Straightforward first person plural object pronoun.
- source_word: εἰς τοὺς χοίρους
  chosen: into the pigs
  alternatives:
  - into the swine
  lexicon: BDAG
  rationale: χοῖρος denotes pigs/swine. 'Pigs' is more readable modern English; 'swine'
    is a valid but less natural alternative.
- source_word: ἵνα
  chosen: so that
  alternatives:
  - in order that
  lexicon: BDAG
  rationale: Introduces purpose/result. 'So that' is idiomatic and preserves the clause
    relationship.
- source_word: εἰς αὐτοὺς εἰσέλθωμεν
  chosen: we may enter them
  alternatives:
  - we may go into them
  lexicon: BDAG
  rationale: εἰσέρχομαι literally means 'enter' or 'go into.' 'Enter them' is slightly
    more vivid and concise in English while preserving the sense of demonic entry
    into the animals.
