theological_decisions:
- issue: Nature of the speakers' request to Jesus
  chosen_reading: The speakers are presented as subject to Jesus' authority and pleading
    for permission to enter the pigs.
  alternative_readings:
  - A weaker reading that they merely requested relocation without emphasis on Jesus'
    authority
  rationale: The wording 'begged him' and 'Send us' reflects the narrative's portrayal
    of Jesus' authority over unclean spirits without adding doctrinal claims beyond
    the text.
  doctrine_reference: Affirmations; Translation philosophy §§1, 3
