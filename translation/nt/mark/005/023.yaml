theological_decisions:
- issue: Rendering of σωθῇ in a healing context
  chosen_reading: be saved
  alternative_readings:
  - be healed
  - be made well
  rationale: The verse uses σῴζω, which can denote physical healing as well as rescue/salvation.
    To preserve theological and lexical tension rather than collapsing it into only
    a medical sense, the main text keeps 'be saved,' while a footnote preserves the
    contextually plausible 'be healed.' This follows the stated philosophy of preserving
    ambiguity where the source supports it.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3'
