id: MRK.5.23
reference: Mark 5:23
source:
  edition: SBLGNT
  text: καὶ ⸀παρακαλεῖ αὐτὸν πολλὰ λέγων ὅτι Τὸ θυγάτριόν μου ἐσχάτως ἔχει, ἵνα ἐλθὼν
    ἐπιθῇς ⸂τὰς χεῖρας αὐτῇ⸃ ⸀ἵνα σωθῇ καὶ ⸀ζήσῃ.
translation:
  text: And he begged him earnestly, saying, “My little daughter is at the point of
    death. Come and lay your hands on her, so that she may be saved and live.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “be healed” or “be made well.” The Greek verb can mean save, rescue,
      or heal; here the immediate context is physical healing.
    reason: alternative_reading
lexical_decisions:
- source_word: παρακαλεῖ
  chosen: begged
  alternatives:
  - implored
  - urged
  - pleaded with
  lexicon: BDAG
  rationale: In this healing-request context, παρακαλέω carries the sense of urgent
    appeal rather than mere request or encouragement. 'Begged' conveys the desperation
    of Jairus appropriately in natural English.
- source_word: πολλὰ
  chosen: earnestly
  alternatives:
  - much
  - repeatedly
  - many times
  lexicon: BDAG
  rationale: Literally 'many things/much,' but idiomatically with παρακαλεῖ it intensifies
    the appeal. 'Earnestly' captures the force in smooth English; 'repeatedly' is
    possible but less certain than a general intensifier.
- source_word: θυγάτριόν
  chosen: little daughter
  alternatives:
  - daughter
  - dear daughter
  lexicon: BDAG
  rationale: The diminutive θυγάτριον naturally suggests affection and/or youth. 'Little
    daughter' preserves both the diminutive form and the emotional tone without over-paraphrasing.
- source_word: ἐσχάτως ἔχει
  chosen: is at the point of death
  alternatives:
  - is in her last moments
  - is critically ill
  - is near death
  lexicon: BDAG
  rationale: This idiom means to be in an extreme or final condition, here clearly
    near death. 'At the point of death' is a standard, accurate English rendering
    that preserves the urgency.
- source_word: ἐλθὼν
  chosen: Come
  alternatives:
  - after coming
  - come here
  lexicon: BDAG
  rationale: Although formally an aorist participle ('having come'), English idiom
    in a request naturally uses the imperative-like 'Come' coordinated with the following
    verb.
- source_word: ἐπιθῇς τὰς χεῖρας αὐτῇ
  chosen: lay your hands on her
  alternatives:
  - place your hands on her
  - lay hands on her
  lexicon: BDAG
  rationale: This is the natural English equivalent of the healing gesture. 'Lay your
    hands on her' preserves the plural χεῖρας and avoids the slightly more idiomatic
    but less explicit 'lay hands on her.'
- source_word: σωθῇ
  chosen: be saved
  alternatives:
  - be healed
  - be made well
  lexicon: BDAG
  rationale: σῴζω can mean save, rescue, heal, or make well depending on context.
    Because the immediate context is physical healing, 'be healed' is possible; however,
    the text's wording is broader, and preserving 'be saved' maintains the lexical
    connection while allowing the physical sense to be inferred from context. The
    alternative is preserved in a footnote.
- source_word: ζήσῃ
  chosen: live
  alternatives:
  - recover
  - remain alive
  lexicon: BDAG
  rationale: 'The verb straightforwardly means ''live.'' In context it complements
    σωθῇ by expressing the result of rescue/healing: that she may live.'
