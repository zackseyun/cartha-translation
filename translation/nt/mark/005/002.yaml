theological_decisions:
- issue: Rendering of demonic affliction language
  chosen_reading: with an unclean spirit
  alternative_readings:
  - possessed by an unclean spirit
  rationale: The Greek says literally 'in/with an unclean spirit.' Rendering it 'with
    an unclean spirit' preserves the text's wording without adding a more systematized
    demonological expression not explicitly present in this verse alone.
  doctrine_reference: Preserve theological tension rather than resolve it.
