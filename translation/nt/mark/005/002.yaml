id: MRK.5.2
reference: Mark 5:2
source:
  edition: SBLGNT
  text: καὶ ⸂ἐξελθόντος αὐτοῦ⸃ ἐκ τοῦ πλοίου ⸂εὐθὺς ὑπήντησεν⸃ αὐτῷ ἐκ τῶν μνημείων
    ἄνθρωπος ἐν πνεύματι ἀκαθάρτῳ,
translation:
  text: And when he got out of the boat, immediately a man with an unclean spirit
    came out from the tombs to meet him,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'possessed by an unclean spirit.' The Greek is more literally 'with
      an unclean spirit.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξελθόντος αὐτοῦ
  chosen: when he got out
  alternatives:
  - as he was getting out
  - after he got out
  - when he came out
  lexicon: BDAG
  rationale: Genitive absolute with aorist participle, naturally rendered as a temporal
    clause in English. 'Got out' is idiomatic with 'boat' and preserves the action
    of exiting without unnecessary stiffness.
- source_word: πλοίου
  chosen: boat
  alternatives:
  - ship
  lexicon: BDAG
  rationale: πλοῖον can mean boat or ship; in this narrative setting on the Sea of
    Galilee, 'boat' is the more natural modern English rendering.
- source_word: εὐθὺς
  chosen: immediately
  alternatives:
  - at once
  - right away
  lexicon: BDAG
  rationale: Mark frequently uses εὐθύς as a vivid narrative marker. 'Immediately'
    preserves the urgency and is a standard, clear rendering.
- source_word: ὑπήντησεν αὐτῷ
  chosen: came out from the tombs to meet him
  alternatives:
  - met him
  - encountered him
  lexicon: BDAG
  rationale: 'ὑπαντάω means ''to meet.'' Because ἐκ τῶν μνημείων is placed before
    ἄνθρωπος and modifies the man''s movement toward Jesus, English reads more naturally
    by expressing both ideas together: he came out from the tombs to meet him.'
- source_word: ἐκ τῶν μνημείων
  chosen: from the tombs
  alternatives:
  - out of the tombs
  - from the burial places
  lexicon: BDAG
  rationale: μνημεῖον refers to a tomb or grave monument. 'Tombs' is the most natural
    and contextually precise rendering.
- source_word: ἄνθρωπος
  chosen: a man
  alternatives:
  - a person
  lexicon: BDAG
  rationale: The noun is grammatically masculine singular and contextually refers
    to a specific male individual. Per translation philosophy, gender-accurate rendering
    is preferred.
- source_word: ἐν πνεύματι ἀκαθάρτῳ
  chosen: with an unclean spirit
  alternatives:
  - in an unclean spirit
  - possessed by an unclean spirit
  lexicon: BDAG
  rationale: The construction denotes the man's condition or association. 'With an
    unclean spirit' is close to the Greek and avoids importing the more interpretive
    term 'possessed,' though that idea is contextually related.
