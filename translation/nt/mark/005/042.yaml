id: MRK.5.42
reference: Mark 5:42
source:
  edition: SBLGNT
  text: καὶ ⸀εὐθὺς ἀνέστη τὸ κοράσιον καὶ περιεπάτει, ἦν γὰρ ἐτῶν δώδεκα. καὶ ἐξέστησαν
    ⸁εὐθὺς ἐκστάσει μεγάλῃ.
translation:
  text: And immediately the girl stood up and began walking, for she was twelve years
    old. And immediately they were overcome with great amazement.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'rose.' The Greek verb can also be rendered 'got up' or 'rose.'
    reason: lexical_alternative
  - marker: b
    text: Or 'they were astonished with great astonishment.' The Greek uses a cognate
      expression for intense amazement.
    reason: lexical_alternative
lexical_decisions:
- source_word: εὐθὺς
  chosen: immediately
  alternatives:
  - at once
  - right away
  lexicon: BDAG
  rationale: Mark characteristically uses εὐθύς for vivid immediacy. 'Immediately'
    preserves the narrative tempo and is standard, clear English.
- source_word: ἀνέστη
  chosen: stood up
  alternatives:
  - rose
  - got up
  lexicon: BDAG
  rationale: From ἀνίστημι, here describing the girl's physical rising after Jesus'
    command. 'Stood up' is natural English and avoids importing resurrection terminology
    too strongly into the main clause, though the context is a restoration to life.
- source_word: κοράσιον
  chosen: the girl
  alternatives:
  - the little girl
  - the young girl
  lexicon: BDAG
  rationale: κοράσιον denotes a girl/young girl. Since the verse itself states she
    was twelve years old, 'the girl' is sufficient and avoids over-specifying age
    or diminutive force beyond the Greek.
- source_word: περιεπάτει
  chosen: began walking
  alternatives:
  - was walking
  - walked around
  lexicon: BDAG
  rationale: The imperfect verb presents ongoing action following her rising. 'Began
    walking' captures the inception and visible continuation in idiomatic English
    better than a flat simple past.
- source_word: ἦν γὰρ ἐτῶν δώδεκα
  chosen: for she was twelve years old
  alternatives:
  - for she was twelve years of age
  lexicon: BDAG
  rationale: This is the standard idiom for stating age. 'For' reflects γάρ as explanatory,
    and 'twelve years old' is natural modern English.
- source_word: ἐξέστησαν
  chosen: they were overcome
  alternatives:
  - they were beside themselves
  - they were astonished
  lexicon: BDAG
  rationale: ἐξίστημι here conveys being thrown into astonishment. 'They were overcome'
    prepares for the cognate noun ἐκστάσει and avoids a wooden repetition like 'they
    were amazed with amazement.'
- source_word: ἐκστάσει μεγάλῃ
  chosen: with great amazement
  alternatives:
  - with great astonishment
  - in great ecstasy
  lexicon: BDAG
  rationale: The dative phrase expresses the state/result of astonishment. 'Great
    amazement' is idiomatic and communicates the force without using 'ecstasy,' which
    would mislead modern readers.
