theological_decisions:
- issue: Potential resurrection nuance in ἀνέστη
  chosen_reading: Translate as physical rising ('stood up') within the miracle narrative
    without making the wording more explicitly resurrection-laden than the Greek requires.
  alternative_readings:
  - rose
  rationale: The context clearly involves restoration to life, but the verb itself
    can simply denote standing up. The translation preserves the event's force while
    avoiding doctrinal over-interpretation in the wording.
  doctrine_reference: 'Translation philosophy: Never import doctrinal claims the text
    does not make; preserve the source text''s plain sense.'
