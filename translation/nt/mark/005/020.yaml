theological_decisions:
- issue: Scope of the man's proclamation in relation to Jesus' identity
  chosen_reading: The text is rendered straightforwardly as the man proclaiming what
    Jesus had done for him, without adding interpretive explanation.
  alternative_readings:
  - An explicitly theological paraphrase highlighting Jesus' divine authority
  rationale: The verse itself reports the man's testimony and the crowd's amazement.
    It implies Jesus' extraordinary power but does not itself state a doctrinal conclusion,
    so the translation preserves the narrative claim without expansion.
  doctrine_reference: Preserve theological tension rather than resolve it.
