id: MRK.5.20
reference: Mark 5:20
source:
  edition: SBLGNT
  text: καὶ ἀπῆλθεν καὶ ἤρξατο κηρύσσειν ἐν τῇ Δεκαπόλει ὅσα ἐποίησεν αὐτῷ ὁ Ἰησοῦς,
    καὶ πάντες ἐθαύμαζον.
translation:
  text: And he went away and began to proclaim in the Decapolis how much Jesus had
    done for him, and everyone was amazed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "all that Jesus had done for him."
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπῆλθεν
  chosen: went away
  alternatives:
  - departed
  - went off
  lexicon: BDAG
  rationale: Aorist of ἀπέρχομαι denotes departure from the scene. 'Went away' is
    natural modern English and preserves the movement sense without sounding overly
    formal like 'departed'.
- source_word: ἤρξατο κηρύσσειν
  chosen: began to proclaim
  alternatives:
  - began to preach
  - started proclaiming
  lexicon: BDAG
  rationale: The construction with ἄρχω + infinitive is ingressive ('began to'). κηρύσσω
    can mean 'preach' or 'proclaim'; 'proclaim' is broader and fits the man's public
    testimony without importing a formal sermonic setting.
- source_word: ἐν τῇ Δεκαπόλει
  chosen: in the Decapolis
  alternatives:
  - throughout the Decapolis
  lexicon: BDAG
  rationale: The preposition ἐν most directly means 'in.' While the context implies
    activity across the region, 'in the Decapolis' is the more textually direct rendering.
- source_word: ὅσα
  chosen: how much
  alternatives:
  - all that
  - what great things
  lexicon: BDAG
  rationale: ὅσα with ἐποίησεν can denote the extent or amount of what was done. 'How
    much' communicates the sense idiomatically in English. 'All that' is possible
    but slightly flatter; 'what great things' adds evaluative force not explicit in
    the Greek.
- source_word: ἐποίησεν αὐτῷ
  chosen: had done for him
  alternatives:
  - did for him
  - had done to him
  lexicon: BDAG
  rationale: ποιέω with dative αὐτῷ here means what Jesus did on his behalf, not to
    him in a harmful sense. English idiom prefers 'for him.' The pluperfect nuance
    is not grammatical in Greek, but 'had done' fits the prior action relative to
    his proclaiming.
- source_word: πάντες
  chosen: everyone
  alternatives:
  - all
  - all the people
  lexicon: BDAG
  rationale: πάντες is literally 'all,' but in idiomatic English 'everyone' best conveys
    the collective human subject. 'All the people' adds a noun not present in the
    text.
- source_word: ἐθαύμαζον
  chosen: was amazed
  alternatives:
  - marveled
  - were amazed
  lexicon: BDAG
  rationale: 'The imperfect indicates ongoing or repeated amazement. Because πάντες
    is rendered idiomatically as singular ''everyone,'' the verb is correspondingly
    singular in English: ''was amazed.'' ''Marveled'' is possible but slightly less
    natural for contemporary readers.'
- source_word: ὁ Ἰησοῦς
  chosen: Jesus
  lexicon: BDAG
  rationale: Personal names are transliterated by standard convention per translation
    philosophy.
