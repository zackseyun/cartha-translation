id: MRK.6.30
reference: Mark 6:30
source:
  edition: SBLGNT
  text: Καὶ συνάγονται οἱ ἀπόστολοι πρὸς τὸν Ἰησοῦν, καὶ ἀπήγγειλαν αὐτῷ ⸀πάντα ὅσα ἐποίησαν καὶ ὅσα ἐδίδαξαν.
translation:
  text: And the apostles gathered to Jesus, and they reported to him everything they had done and taught.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'everything they had done and what they had taught'.
    reason: previous_rendering
lexical_decisions:
- source_word: συνάγονται
  chosen: gathered
  alternatives:
  - came together
  - assembled
  lexicon: BDAG
  rationale: Present tense in narrative can function as a historical present. English simple past is more natural here. 'Gathered' preserves the collective sense of συνάγω without overformal 'assembled.'
- source_word: ἀπόστολοι
  chosen: apostles
  alternatives:
  - messengers
  - sent ones
  lexicon: BDAG
  rationale: In Mark this is a recognized designation for the Twelve in their commissioned role, so 'apostles' is the most accurate and conventional rendering, not merely a generic 'messengers.'
- source_word: πρὸς τὸν Ἰησοῦν
  chosen: to Jesus
  alternatives:
  - with Jesus
  - before Jesus
  lexicon: BDAG
  rationale: πρός with the accusative here indicates movement toward a person. 'To Jesus' is the most direct and natural rendering.
- source_word: ἀπήγγειλαν
  chosen: reported
  alternatives:
  - told
  - announced
  lexicon: BDAG
  rationale: The verb conveys giving a report back. 'Reported' fits the context of the apostles returning from mission and recounting their activity.
- source_word: πάντα
  chosen: everything
  alternatives:
  - all things
  - all
  lexicon: BDAG
  rationale: Idiomatic English prefers 'everything' here while fully preserving the comprehensive force of πάντα.
- source_word: ὅσα ἐποίησαν
  chosen: they had done
  alternatives:
  - what they did
  - all that they did
  lexicon: BDAG
  rationale: This relative construction specifies the content of 'everything.' 'They had done' reads naturally in English as prior action being reported.
- source_word: ὅσα ἐδίδαξαν
  chosen: what they had taught
  alternatives:
  - what they taught
  - all that they taught
  lexicon: BDAG
  rationale: Parallel to the previous clause. 'What they had taught' preserves the sense of their completed teaching activity during the mission.
