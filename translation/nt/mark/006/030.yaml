theological_decisions:
- issue: Narrative designation of the disciples as ἀπόστολοι
  chosen_reading: Render as 'apostles' as a role/title in context
  alternative_readings:
  - messengers
  - sent ones
  rationale: The text identifies the returning commissioned group with the established term ἀπόστολοι. Translating it away from 'apostles' would obscure Mark's presentation of their commissioned ministry.
revisions:
- timestamp: '2026-04-21T19:57:00Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/high_scrutiny/nt/mark/006/030.job-5174.json
  category: awkward_english
  tier: 1
  from: everything they had done and what they had taught
  to: everything they had done and taught
  rationale: The Greek presents two parallel relative clauses (`ὅσα ἐποίησαν καὶ ὅσα ἐδίδαξαν`) that both specify the content of `πάντα` ('everything'). The current rendering breaks this parallelism ('everything... and what...'), which is slightly awkward. The suggested rewrite ('everything they had done and taught') is more concise and better reflects the parallel structure of the source text in natural English.
