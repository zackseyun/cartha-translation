id: MRK.6.48
reference: Mark 6:48
source:
  edition: SBLGNT
  text: καὶ ⸀ἰδὼν αὐτοὺς βασανιζομένους ἐν τῷ ἐλαύνειν, ἦν γὰρ ὁ ἄνεμος ἐναντίος ⸀αὐτοῖς, περὶ τετάρτην φυλακὴν τῆς νυκτὸς ἔρχεται πρὸς αὐτοὺς περιπατῶν ἐπὶ τῆς θαλάσσης· καὶ ἤθελεν παρελθεῖν αὐτούς.
translation:
  text: And seeing them tormented while rowing, because the wind was against them, about the fourth watch of the night he comes to them, walking on the sea; and he intended to pass by them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The 'fourth watch of the night' is the late-night period roughly between 3:00 and 6:00 a.m. in Roman reckoning.
    reason: cultural_note
  - marker: b
    text: Or 'walking on the water.' The Greek says 'on the sea.'
    reason: lexical_alternative
  - marker: c
    text: '''He intended to pass by them'' may mean simply that he meant to go past them, but it may also echo Old Testament scenes where God ''passes by'' in self-revelation (for example, Exod 33:19, 22; 34:6; 1 Kgs 19:11).'
    reason: alternative_reading
  - marker: d
    text: Or 'being tormented in rowing'.
    reason: previous_rendering
lexical_decisions:
- source_word: ἰδὼν
  chosen: seeing
  alternatives:
  - when he saw
  - after he saw
  lexicon: BDAG
  rationale: Aorist participle of ὁράω is rendered with a participial sense to preserve the Greek flow and temporal linkage without over-specifying sequence.
- source_word: βασανιζομένους
  chosen: being tormented
  alternatives:
  - straining
  - being distressed
  lexicon: BDAG
  rationale: The participle literally denotes being tormented or severely distressed. Although many English versions smooth this to 'straining,' the stronger wording better reflects the lexical force and the severity of their struggle.
- source_word: ἐν τῷ ἐλαύνειν
  chosen: in rowing
  alternatives:
  - while rowing
  - at the oars
  lexicon: BDAG
  rationale: The articular infinitive with ἐν expresses contemporaneous activity. 'In rowing' is slightly formal but transparent and close to the Greek; the sense is their struggle while they were rowing.
- source_word: ἐναντίος
  chosen: against
  alternatives:
  - contrary to
  - opposed to
  lexicon: BDAG
  rationale: In context of wind, 'against' is the most natural modern English rendering and preserves the adversative force.
- source_word: περὶ τετάρτην φυλακὴν τῆς νυκτός
  chosen: about the fourth watch of the night
  alternatives:
  - about the fourth watch
  - around the fourth watch of the night
  lexicon: BDAG
  rationale: This preserves the ancient timekeeping expression rather than converting it in the main text. 'About' reflects περὶ.
- source_word: ἔρχεται
  chosen: he comes
  alternatives:
  - he came
  - he is coming
  lexicon: BDAG
  rationale: The present tense is a historical present. Rendering it as 'he comes' preserves Mark's vivid narrative style better than flattening it to a simple past.
- source_word: περιπατῶν ἐπὶ τῆς θαλάσσης
  chosen: walking on the sea
  alternatives:
  - walking on the water
  - walking upon the sea
  lexicon: BDAG
  rationale: θάλασσα is 'sea,' and ἐπί here naturally yields 'on.' 'Sea' preserves the source wording; 'water' is interpretive smoothing.
- source_word: ἤθελεν
  chosen: he intended
  alternatives:
  - he wanted
  - he was intending
  lexicon: BDAG
  rationale: Imperfect of θέλω here conveys intention rather than mere desire. 'Intended' best fits the infinitive construction and avoids implying uncertainty about his purpose.
- source_word: παρελθεῖν αὐτούς
  chosen: to pass by them
  alternatives:
  - to pass them by
  - to go past them
  lexicon: BDAG
  rationale: The phrase is rendered straightforwardly and left semantically open. 'Pass by' preserves the wording without prematurely resolving whether the sense is simple movement past them or a theologically charged manifestation motif.
