theological_decisions:
- issue: Meaning of 'he intended to pass by them'
  chosen_reading: Retain the literal wording 'he intended to pass by them' in the main text without interpretive expansion.
  alternative_readings:
  - He meant to go past them
  - He intended to reveal himself in a divine 'passing by' motif
  rationale: This clause is interpretively significant in light of possible Old Testament theophany echoes, but the Greek itself does not explicitly explain the intent. Following the translation philosophy, the draft preserves the tension rather than resolving it in the main text. A footnote records the possible theological resonance.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
revisions:
- timestamp: '2026-04-21T19:57:00Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/high_scrutiny/nt/mark/006/048.job-5192.json
  category: awkward_english
  tier: 1
  from: being tormented in rowing
  to: tormented while rowing
  rationale: The phrase 'being tormented in rowing' is a very literal but slightly unnatural English construction. The combination of the passive participle with the prepositional phrase 'in rowing' (a direct rendering of ἐν τῷ ἐλαύνειν) is stylistically rough. A smoother rendering like 'tormented while rowing' would preserve the key lexical choice ('tormented') and the temporal sense of the Greek, but in a more idiomatic English phrase.
