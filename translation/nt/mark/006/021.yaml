id: MRK.6.21
reference: Mark 6:21
source:
  edition: SBLGNT
  text: Καὶ γενομένης ἡμέρας εὐκαίρου ὅτε Ἡρῴδης τοῖς γενεσίοις αὐτοῦ δεῖπνον ⸀ἐποίησεν τοῖς μεγιστᾶσιν αὐτοῦ καὶ τοῖς χιλιάρχοις καὶ τοῖς πρώτοις τῆς Γαλιλαίας,
translation:
  text: And an opportune day came when Herod gave a banquet on his birthday for his nobles and military commanders and the leading men of Galilee,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'when a convenient day came' or 'when a favorable day came.' The Greek suggests a suitable or strategic opportunity.
    reason: lexical_alternative
  - marker: b
    text: Or 'held a dinner feast.' The Greek literally says 'made a dinner.'
    reason: lexical_alternative
  - marker: c
    text: Or 'the foremost men of Galilee.' The phrase refers to the prominent male leaders of the region.
    reason: lexical_alternative
  - marker: d
    text: Or 'when an opportune day came, when'.
    reason: previous_rendering
lexical_decisions:
- source_word: γενομένης ἡμέρας εὐκαίρου
  chosen: when an opportune day came
  alternatives:
  - when a convenient day came
  - when a favorable day came
  lexicon: BDAG
  rationale: The genitive absolute introduces the circumstance. εὔκαιρος here means suitable or opportune, with the narrative sense that the awaited chance had arrived. 'Opportune day' preserves the ominous narrative setup better than the flatter 'convenient day.'
- source_word: ὅτε
  chosen: when
  alternatives:
  - at the time when
  lexicon: BDAG
  rationale: Standard temporal conjunction introducing the specific occasion that explains the 'opportune day.'
- source_word: τοῖς γενεσίοις αὐτοῦ
  chosen: on his birthday
  alternatives:
  - for his birthday celebration
  - on the occasion of his birthday
  lexicon: BDAG
  rationale: γενέσια refers to a birthday observance or celebration. Rendering with the idiomatic English 'on his birthday' is natural and accurately conveys the occasion.
- source_word: δεῖπνον ἐποίησεν
  chosen: gave a banquet
  alternatives:
  - made a dinner
  - held a dinner feast
  - gave a dinner
  lexicon: BDAG
  rationale: The idiom literally means 'made a dinner,' but in English 'gave a banquet' best captures a formal hosted feast without wooden phrasing. 'Banquet' fits the elite guest list that follows.
- source_word: τοῖς μεγιστᾶσιν αὐτοῦ
  chosen: for his nobles
  alternatives:
  - for his great men
  - for his courtiers
  - for his officials
  lexicon: BDAG
  rationale: μεγιστᾶνες denotes high-ranking persons or magnates. 'Nobles' is concise, natural English for elite court figures attached to Herod.
- source_word: τοῖς χιλιάρχοις
  chosen: military commanders
  alternatives:
  - commanders of thousands
  - tribunes
  lexicon: BDAG
  rationale: Although literally associated with command over a thousand, in this Herodian context the term refers to senior military officers. 'Military commanders' communicates the function clearly without importing a specifically Roman technical title too strongly.
- source_word: τοῖς πρώτοις τῆς Γαλιλαίας
  chosen: the leading men of Galilee
  alternatives:
  - the foremost men of Galilee
  - the principal men of Galilee
  - the leaders of Galilee
  lexicon: BDAG
  rationale: πρῶτοι here means the prominent or first-ranking people. 'Leading men' preserves both status and the masculine reference in keeping with the gender-accurate policy.
- source_word: Καὶ
  chosen: And
  alternatives:
  - Now
  lexicon: BDAG
  rationale: Retained as a narrative connective. 'And' reflects Mark's paratactic style more directly than smoothing it away.
- source_word: Ἡρῴδης
  chosen: Herod
  lexicon: BDAG
  rationale: Standard transliteration of the personal name, in line with the policy to transliterate names rather than translate them.
