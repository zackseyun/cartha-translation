  from: when an opportune day came, when
  to: an opportune day came when
  rationale: The Greek structure uses a genitive absolute (γενομένης ἡμέρας εὐκαίρου) followed by a temporal clause (ὅτε...) that specifies the event of that day. The draft's 'when..., when...' is a hyper-literal rendering of these two temporal markers that results in a stylistically awkward repetition in English. A more natural and equally faithful rendering is 'an opportune day came when...', which subordinates the second clause without the redundant conjunction, reflecting how the 'ὅτε' clause defines the 'opportune day'.
