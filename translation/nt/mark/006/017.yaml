id: MRK.6.17
reference: Mark 6:17
source:
  edition: SBLGNT
  text: Αὐτὸς γὰρ ὁ Ἡρῴδης ἀποστείλας ἐκράτησεν τὸν Ἰωάννην καὶ ἔδησεν αὐτὸν ἐν φυλακῇ διὰ Ἡρῳδιάδα τὴν γυναῖκα Φιλίππου τοῦ ἀδελφοῦ αὐτοῦ, ὅτι αὐτὴν ἐγάμησεν·
translation:
  text: For Herod himself had sent for and seized John, and bound him in prison because of Herodias, the wife of Philip his brother, because he had married her.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'had sent men and arrested John.' The Greek uses an aorist participle followed by main verbs, indicating that Herod initiated the action before John was seized.
    reason: lexical_alternative
  - marker: b
    text: Or 'had sent and seized John'.
    reason: previous_rendering
lexical_decisions:
- source_word: Αὐτὸς
  chosen: himself
  alternatives:
  - personally
  - indeed
  lexicon: BDAG
  rationale: Used emphatically with ὁ Ἡρῴδης to stress that Herod himself was responsible for the action. 'Himself' preserves the emphatic force naturally in English.
- source_word: γὰρ
  chosen: For
  alternatives:
  - because
  - now
  lexicon: BDAG
  rationale: Marks explanatory connection to the previous statement. 'For' best preserves the narrative-explanatory force without over-paraphrasing.
- source_word: ἀποστείλας
  chosen: had sent
  alternatives:
  - having sent
  - sent
  lexicon: BDAG
  rationale: Aorist participle preceding the main verbs, indicating prior action. 'Had sent' renders the antecedent action idiomatically in English better than the more wooden 'having sent.'
- source_word: ἐκράτησεν
  chosen: seized
  alternatives:
  - arrested
  - took hold of
  lexicon: BDAG
  rationale: κρατέω here means to take into custody. 'Seized' is slightly more literal and forceful than 'arrested,' while fitting the narrative sequence with the prior sending of agents.
- source_word: ἔδησεν
  chosen: bound
  alternatives:
  - tied up
  - put in chains
  lexicon: BDAG
  rationale: δέω literally means to bind. 'Bound' preserves the concrete verbal sense without importing details such as chains that the text does not specify.
- source_word: ἐν φυλακῇ
  chosen: in prison
  alternatives:
  - in a prison
  - in custody
  lexicon: BDAG
  rationale: φυλακή in this context denotes imprisonment/place of confinement. 'In prison' is idiomatic English and sufficiently specific.
- source_word: διὰ Ἡρῳδιάδα
  chosen: because of Herodias
  alternatives:
  - on account of Herodias
  - for the sake of Herodias
  lexicon: BDAG
  rationale: διά with the accusative commonly indicates cause or reason. 'Because of Herodias' is the clearest causal rendering in modern English.
- source_word: γυναῖκα
  chosen: wife
  alternatives:
  - woman
  lexicon: BDAG
  rationale: In this genitival relationship with Philip, γυνή clearly means 'wife,' not merely 'woman.'
- source_word: τοῦ ἀδελφοῦ αὐτοῦ
  chosen: his brother
  alternatives:
  - his own brother
  lexicon: BDAG
  rationale: Straightforward possessive construction referring to Philip as Herod's brother. 'His brother' is accurate and natural; the reflexive emphasis of 'own' is not required.
- source_word: ὅτι
  chosen: because
  alternatives:
  - for
  - since
  lexicon: BDAG
  rationale: Introduces the reason for Herod's action. 'Because' makes the causal relation explicit and clear in English.
- source_word: ἐγάμησεν
  chosen: had married
  alternatives:
  - married
  - had taken as wife
  lexicon: BDAG
  rationale: γαμέω means 'to marry.' The pluperfect-like English 'had married' fits the prior state that explains the imprisonment, though the Greek is aorist.
