theological_decisions:
- issue: Historical-moral framing of Herod's action toward John
  chosen_reading: The verse is translated descriptively, preserving the causal statement that Herod imprisoned John because of Herodias, whom he had married, without adding explicit moral commentary in the translation itself.
  alternative_readings:
  - A more interpretive rendering could foreground the illegitimacy of the marriage in the main text.
  rationale: The surrounding context supplies the moral and legal issue; this verse itself states the historical cause. The translation avoids importing explanatory judgment not explicitly present in this sentence.
  doctrine_reference: 'Translation philosophy: Never import doctrinal claims the text does not make; preserve what the source text states.'
revisions:
- timestamp: '2026-04-21T19:57:00Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/high_scrutiny/nt/mark/006/017.job-5161.json
  category: awkward_english
  tier: 1
  from: had sent and seized John
  to: had sent for and seized John
  rationale: The current rendering 'had sent and seized' is ambiguous. It could imply that Herod sent a message and then personally seized John. The Greek construction (aorist participle ἀποστείλας + main verb ἐκράτησεν) indicates that Herod, as the principal, accomplished the seizing *by means of* sending agents. The suggested rewrite 'had sent for and seized John' uses a natural English idiom ('to send for someone') that clearly conveys this sense of summoning via intermediaries, resolving the ambiguity while maintaining a concise, parallel structure.
