  from: And the king, becoming deeply grieved, because of his oaths and those reclining at the table,
  to: And the king was deeply grieved, but because of his oaths and those reclining at the table,
  rationale: The current phrasing, which closely follows the Greek word order, is awkward in English. It separates the subject ('king') from the main verb ('did not want') with two modifying phrases. Furthermore, the participle 'γενόμενος' (becoming) likely carries a concessive force ('although he was grieved'), which is lost. Recasting the first clause as 'And the king was deeply grieved, but...' makes the sentence more natural and restores the implied contrast between his sorrow and his perceived obligation.
