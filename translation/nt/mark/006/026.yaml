id: MRK.6.26
reference: Mark 6:26
source:
  edition: SBLGNT
  text: καὶ περίλυπος γενόμενος ὁ βασιλεὺς διὰ τοὺς ὅρκους καὶ τοὺς ⸀ἀνακειμένους οὐκ ἠθέλησεν ⸂ἀθετῆσαι αὐτήν⸃·
translation:
  text: And the king was deeply grieved, but because of his oaths and those reclining at the table, did not want to refuse her.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the dinner guests' for 'those reclining at the table.' The Greek more literally refers to those present at the meal in the formal reclining posture.
    reason: lexical_alternative
  - marker: b
    text: Or 'deny her' or 'reject her.' The sense is that he did not want to set aside what he had promised her.
    reason: lexical_alternative
  - marker: c
    text: Or 'And the king, becoming deeply grieved, because of his oaths and those reclining at the table,'.
    reason: previous_rendering
lexical_decisions:
- source_word: περίλυπος
  chosen: deeply grieved
  alternatives:
  - very sorrowful
  - deeply distressed
  lexicon: BDAG
  rationale: Conveys intense sorrow in natural modern English. 'Deeply grieved' preserves the emotional weight without sounding archaic.
- source_word: γενόμενος
  chosen: becoming
  alternatives:
  - being
  - having become
  lexicon: BDAG
  rationale: The participle marks a change of state; in English the sense is carried idiomatically by 'the king, becoming deeply grieved,' though the whole clause is rendered smoothly.
- source_word: βασιλεὺς
  chosen: king
  alternatives:
  - ruler
  lexicon: BDAG
  rationale: Standard and contextually appropriate rendering for Herod in Mark's narrative style, matching the Greek term used in the text.
- source_word: διὰ τοὺς ὅρκους
  chosen: because of his oaths
  alternatives:
  - on account of the oaths
  - because of the vows
  lexicon: BDAG
  rationale: διά with the accusative indicates reason/cause. 'Oaths' is more precise than 'vows' for ὅρκους, and 'his' is supplied naturally from context since they are the king's oaths.
- source_word: ἀνακειμένους
  chosen: those reclining at the table
  alternatives:
  - the dinner guests
  - those present at the meal
  lexicon: BDAG
  rationale: Literally refers to those reclining for a meal. The chosen rendering preserves the meal-setting more transparently than the more interpretive 'dinner guests.'
- source_word: οὐκ ἠθέλησεν
  chosen: did not want to
  alternatives:
  - was unwilling to
  - did not wish to
  lexicon: BDAG
  rationale: Captures θέλω as volition rather than inability. 'Did not want to' is clear, idiomatic, and preserves the force of unwillingness.
- source_word: ἀθετῆσαι αὐτήν
  chosen: refuse her
  alternatives:
  - reject her
  - break faith with her
  - deny her
  lexicon: BDAG
  rationale: In this context ἀθετέω means to set aside or refuse a request/promise made to her. 'Refuse her' fits the immediate narrative context better than the more abstract 'reject her.'
