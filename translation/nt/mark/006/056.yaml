theological_decisions:
- issue: Rendering of ἐσῴζοντο from σῴζω
  chosen_reading: were being healed
  alternative_readings:
  - were saved
  - were made well
  rationale: Although σῴζω often bears theological weight as 'save,' the immediate context is physical healing of the sick. Rendering it as 'were being healed' avoids importing soteriological claims the verse itself does not foreground, while still reflecting the verb's contextual meaning.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation tradition; preserve theological tension rather than import doctrinal claims the text does not make.'
revisions:
- timestamp: '2026-04-21T12:46:23Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/nt/mark/006/056.json
  category: awkward_english
  tier: 1
  from: that they might touch even the fringe
  to: that they might even touch the fringe
  rationale: The Greek 'ἵνα κἂν...ἅψωνται' conveys a minimal request. In English, the placement of 'even' is flexible but affects nuance. 'touch even the fringe' can subtly imply the fringe itself is an unlikely thing to touch. 'even touch the fringe' more clearly and idiomatically conveys that the mere act of touching was considered a great thing to ask for, which fits the context of their begging.
