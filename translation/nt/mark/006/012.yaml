id: MRK.6.12
reference: Mark 6:12
source:
  edition: SBLGNT
  text: Καὶ ἐξελθόντες ⸀ἐκήρυξαν ἵνα ⸀μετανοῶσιν,
translation:
  text: And they went out and proclaimed that people should change their thinking.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'that they should repent,' with 'they' referring to
      those who heard their proclamation.
    reason: lexical_alternative
lexical_decisions:
- source_word: Καὶ
  chosen: And
  alternatives:
  - Then
  lexicon: BDAG
  rationale: Standard connective coordinating this verse with the preceding commissioning
    narrative. 'And' preserves the simple narrative flow without adding temporal nuance
    beyond the Greek.
- source_word: ἐξελθόντες
  chosen: they went out
  alternatives:
  - having gone out
  - after going out
  lexicon: BDAG
  rationale: Aorist active participle of ἐξέρχομαι, nominative plural, referring to
    the disciples. Rendered with a finite English verb for natural narrative style
    while preserving the action antecedent to or accompanying the main verb.
- source_word: ἐκήρυξαν
  chosen: proclaimed
  alternatives:
  - preached
  - announced
  - heralded
  lexicon: BDAG
  rationale: κηρύσσω denotes public proclamation. 'Proclaimed' preserves the heraldic
    force without sounding overly ecclesiastical; 'preached' is possible but may import
    later church associations not explicit in the immediate context.
- source_word: ἵνα
  chosen: that
  alternatives:
  - so that
  - in order that
  lexicon: BDAG
  rationale: Introduces the content/purpose of the proclamation. In this context English
    idiom is best served by 'proclaimed that people should…,' which captures the intended
    response without awkwardness.
- source_word: μετανοῶσιν
  chosen: should change their thinking
  alternatives:
  - should change their minds
  - should turn back
  lexicon: BDAG
  rationale: μετανοέω in the Gospel context denotes repentance—a turning of mind and
    life toward God. 'Repent' is the most accurate concise rendering and retains the
    theological weight of the term better than more reductionistic paraphrases.
