theological_decisions:
- issue: Whether to make the implied subject/object of repentance explicit in English
  chosen_reading: that people should repent
  alternative_readings:
  - that they should repent
  rationale: The Greek plural verb has an implicit subject understood from the preaching
    audience, not the preachers themselves. English can render this literally as 'they
    should repent,' but that risks ambiguity by seeming to refer to the disciples.
    'People' clarifies the intended audience without adding doctrinal content.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve source
    sense in readable modern English.'
