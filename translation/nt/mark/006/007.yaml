id: MRK.6.7
reference: Mark 6:7
source:
  edition: SBLGNT
  text: καὶ προσκαλεῖται τοὺς δώδεκα, καὶ ἤρξατο αὐτοὺς ἀποστέλλειν δύο δύο, καὶ ἐδίδου αὐτοῖς ἐξουσίαν τῶν πνευμάτων τῶν ἀκαθάρτων,
translation:
  text: And he called the Twelve and began to send them out two by two, and he was giving them authority over the unclean spirits.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in pairs.'
    reason: lexical_alternative
  - marker: b
    text: Or 'power over the unclean spirits.'
    reason: alternative_reading
  - marker: c
    text: Or 'And he calls the Twelve and began'.
    reason: previous_rendering
lexical_decisions:
- source_word: προσκαλεῖται
  chosen: calls
  alternatives:
  - summons
  - calls to himself
  lexicon: BDAG
  rationale: 'Present middle is naturally rendered as a historical present in Mark, giving vividness: ''he calls.'' The middle nuance can suggest calling to himself, but standard English ''calls'' communicates the action without overtranslating.'
- source_word: τοὺς δώδεκα
  chosen: the Twelve
  alternatives:
  - the twelve disciples
  - the twelve
  lexicon: BDAG
  rationale: This is a recognized designation for Jesus' apostolic group. Capitalizing 'Twelve' reflects its titular force in context.
- source_word: ἤρξατο ... ἀποστέλλειν
  chosen: began to send ... out
  alternatives:
  - started sending
  - began sending
  lexicon: BDAG
  rationale: The construction with ἄρχομαι + infinitive is idiomatically 'began to.' 'Send ... out' captures the force of ἀποστέλλω in mission context without importing the noun 'apostles' into the verse.
- source_word: δύο δύο
  chosen: two by two
  alternatives:
  - in pairs
  - two and two
  lexicon: BDAG
  rationale: The distributive repetition is best represented by the idiomatic English 'two by two,' preserving both sense and rhythm.
- source_word: ἐδίδου
  chosen: he was giving
  alternatives:
  - he gave
  - he kept giving
  lexicon: BDAG
  rationale: The imperfect indicates ongoing or contemporaneous action. 'He was giving' preserves the aspect better than a simple past.
- source_word: ἐξουσίαν
  chosen: authority
  alternatives:
  - power
  - right
  lexicon: BDAG
  rationale: ἐξουσία commonly denotes delegated authority or the right to exercise power. 'Authority' is preferable here because the verse emphasizes Jesus' authorization over spirits, not merely raw power.
- source_word: τῶν πνευμάτων τῶν ἀκαθάρτων
  chosen: the unclean spirits
  alternatives:
  - unclean demons
  - impure spirits
  lexicon: BDAG
  rationale: A literal rendering preserves Mark's terminology. 'Unclean spirits' is standard and avoids collapsing the expression into a narrower interpretive gloss, though in context it refers to demonic spirits.
