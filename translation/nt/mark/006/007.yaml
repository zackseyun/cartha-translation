  category: awkward_english
  tier: 1
  from: And he calls the Twelve and began
  to: And he called the Twelve and began
  rationale: The draft correctly identifies προσκαλεῖται as a historical present but creates an awkward tense shift in English by rendering it as a present ('calls') immediately followed by a past tense ('began'). While preserving the historical present is a valid stylistic choice for vividness, most English translations harmonize the tenses to the past for smoother narrative flow (e.g., 'He called... and began...'). This change would improve readability without losing significant meaning.
