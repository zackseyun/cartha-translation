theological_decisions:
- issue: Nature of Jesus' grant to the Twelve in ἐξουσίαν τῶν πνευμάτων τῶν ἀκαθάρτων
  chosen_reading: delegated authority over the unclean spirits
  alternative_readings:
  - power over unclean spirits
  rationale: The wording should reflect that Jesus grants the Twelve authority to act against unclean spirits. 'Authority' better preserves the relational and delegated sense of ἐξουσία than 'power' alone.
  doctrine_reference: Translation philosophy §5; Contested terms table (general principle of preserving lexical meaning)
revisions:
- timestamp: '2026-04-21T19:57:00Z'
