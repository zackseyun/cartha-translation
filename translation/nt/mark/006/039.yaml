  from: them all to recline
  to: to have everyone recline
  rationale: 'The current rendering conflates the indirect object ''them'' (αὐτοῖς,
    the disciples who receive the command) with the subject of the infinitive ''all''
    (πάντας, the crowd who are to be seated). The Greek syntax is clear: Jesus commanded
    *them* (dative) *to make all* (accusative) recline. The draft incorrectly implies
    Jesus commanded the entire group (''them all'') directly, which alters the narrative
    action.'
