id: MRK.6.39
reference: Mark 6:39
source:
  edition: SBLGNT
  text: καὶ ἐπέταξεν αὐτοῖς ⸀ἀνακλῖναι πάντας συμπόσια συμπόσια ἐπὶ τῷ χλωρῷ χόρτῳ.
translation:
  text: And he commanded them all to recline in groups on the green grass.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "group by group"; the repeated Greek expression has a distributive sense,
      emphasizing organized clusters for the meal.
    reason: lexical_alternative
  - marker: b
    text: Or 'them all to recline'.
    reason: previous_rendering
lexical_decisions:
- source_word: ἐπέταξεν
  chosen: commanded
  alternatives:
  - ordered
  - directed
  lexicon: BDAG
  rationale: The verb ἐπιτάσσω denotes giving an authoritative order. 'Commanded'
    preserves the force better than the softer 'told' or 'directed.'
- source_word: αὐτοῖς
  chosen: them
  alternatives:
  - his disciples
  - them all
  lexicon: BDAG
  rationale: The dative pronoun refers to those Jesus is addressing in context, namely
    the disciples, but the pronoun itself is not explicit. 'Them' preserves the Greek
    wording without importing the antecedent into the translation.
- source_word: ἀνακλῖναι
  chosen: to recline
  alternatives:
  - to sit down
  - to have a seat
  lexicon: BDAG
  rationale: ἀνακλίνω commonly refers to reclining for a meal. 'Recline' preserves
    the meal-setting nuance better than the more generic 'sit down,' though modern
    readers may find it slightly less familiar.
- source_word: πάντας
  chosen: them all
  alternatives:
  - everyone
  - all
  lexicon: BDAG
  rationale: πάντας indicates the entirety of the crowd. In English, 'commanded them
    all to recline' naturally conveys that all were to do so.
- source_word: συμπόσια συμπόσια
  chosen: in groups
  alternatives:
  - group by group
  - in dining groups
  - in companies
  lexicon: BDAG
  rationale: The repeated accusative plural has a distributive sense, indicating arrangement
    into distinct groups. 'In groups' is clear modern English; the distributive nuance
    is preserved in a footnote with the alternative 'group by group.'
- source_word: ἐπὶ τῷ χλωρῷ χόρτῳ
  chosen: on the green grass
  alternatives:
  - on the green meadow
  - on the fresh grass
  lexicon: BDAG
  rationale: χλωρός means 'green, fresh,' and χόρτος here refers to grass. 'On the
    green grass' is the most direct and natural rendering.
