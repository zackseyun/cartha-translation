id: MRK.6.27
reference: Mark 6:27
source:
  edition: SBLGNT
  text: καὶ ⸀εὐθὺς ἀποστείλας ὁ βασιλεὺς σπεκουλάτορα ἐπέταξεν ⸀ἐνέγκαι τὴν κεφαλὴν
    αὐτοῦ. ⸀καὶ ἀπελθὼν ἀπεκεφάλισεν αὐτὸν ἐν τῇ φυλακῇ
translation:
  text: And immediately the king sent an executioner and ordered him to bring his
    head. And he went and beheaded him in the prison.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a guardsman' or 'a bodyguard'; the Greek uses a Latin loanword (spekoulatōr)
      for a member of the ruler's guard, here functioning as an executioner.
    reason: lexical_alternative
lexical_decisions:
- source_word: εὐθὺς
  chosen: immediately
  alternatives:
  - at once
  - straightway
  lexicon: BDAG
  rationale: Conveys Mark's characteristic sense of promptness in natural modern English.
    'Immediately' is more readable than the archaic 'straightway' and slightly more
    formal than 'at once'.
- source_word: βασιλεὺς
  chosen: the king
  alternatives:
  - Herod
  - the ruler
  lexicon: BDAG
  rationale: Although Herod Antipas was technically a tetrarch historically, Mark's
    Greek uses βασιλεύς, so the translation preserves the narrative designation 'the
    king' rather than harmonizing to historical precision.
- source_word: σπεκουλάτορα
  chosen: executioner
  alternatives:
  - guardsman
  - soldier of the guard
  - bodyguard
  lexicon: BDAG
  rationale: The Latin loanword refers to a member of the ruler's guard with execution
    duties in this context. 'Executioner' best communicates the role implied by the
    command to bring John's head, while alternatives are more literal but less clear
    in English.
- source_word: ἐπέταξεν ἐνέγκαι
  chosen: ordered him to bring
  alternatives:
  - commanded him to bring
  - gave orders to bring
  lexicon: BDAG
  rationale: This infinitival construction is naturally rendered in English as 'ordered
    him to bring.' It preserves the force of command without sounding stiff.
- source_word: τὴν κεφαλὴν αὐτοῦ
  chosen: his head
  alternatives:
  - the head of him
  lexicon: BDAG
  rationale: Idiomatic English requires 'his head.' The possessive pronoun clearly
    refers to John in context.
- source_word: ἀπεκεφάλισεν
  chosen: beheaded
  alternatives:
  - decapitated
  lexicon: BDAG
  rationale: '''Beheaded'' is the standard, clear English equivalent for ἀποκεφαλίζω
    and fits the narrative register better than the more clinical ''decapitated.'''
- source_word: ἐν τῇ φυλακῇ
  chosen: in the prison
  alternatives:
  - in prison
  - in the jail
  lexicon: BDAG
  rationale: The article is present in Greek, and 'the prison' preserves the concrete
    location already established in the narrative. 'In prison' is possible idiomatic
    English, but slightly less specific.
