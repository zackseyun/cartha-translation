theological_decisions:
- issue: Reference of συνέδριον
  chosen_reading: Rendered as 'the whole council' rather than the transliteration
    'the whole Sanhedrin.'
  alternative_readings:
  - the whole Sanhedrin
  rationale: This is primarily an institutional-historical term, not a doctrinally
    contested one. Translating it preserves meaning for modern readers while avoiding
    unnecessary dependence on traditional transliteration. Because 'Sanhedrin' is
    widely recognized and more specific historically, it is preserved in a footnote.
  doctrine_reference: Translation philosophy §2, §6
- issue: Force of παρέδωκαν in the passion narrative
  chosen_reading: Rendered as 'handed him over' with judicial/custodial force.
  alternative_readings:
  - delivered him
  rationale: The verb can carry significant narrative and theological weight in the
    passion accounts, but this verse itself does not require importing broader doctrinal
    implications beyond the transfer to Roman authority. 'Handed him over' preserves
    the action without interpretive overreach.
  doctrine_reference: Affirmations; Translation philosophy §1, §3
