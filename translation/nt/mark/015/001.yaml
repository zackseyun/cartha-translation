id: MRK.15.1
reference: Mark 15:1
source:
  edition: SBLGNT
  text: Καὶ ⸀εὐθὺς πρωῒ συμβούλιον ποιήσαντες οἱ ἀρχιερεῖς μετὰ τῶν πρεσβυτέρων καὶ
    γραμματέων καὶ ὅλον τὸ συνέδριον δήσαντες τὸν Ἰησοῦν ἀπήνεγκαν καὶ ⸀παρέδωκαν
    Πιλάτῳ.
translation:
  text: And immediately, early in the morning, the chief priests held a consultation
    with the elders and scribes and the whole council; then they bound Jesus, led
    him away, and handed him over to Pilate.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the whole Sanhedrin.' The Greek συνέδριον refers to the Jewish ruling
      council.
    reason: alternative_reading
lexical_decisions:
- source_word: εὐθὺς
  chosen: immediately
  alternatives:
  - at once
  - straightway
  lexicon: BDAG
  rationale: Marks Mark's characteristic sense of prompt action. 'Immediately' is
    natural modern English and preserves the narrative urgency better than the archaic
    'straightway'.
- source_word: πρωῒ
  chosen: early in the morning
  alternatives:
  - in the morning
  - at daybreak
  lexicon: BDAG
  rationale: The adverb specifies the early morning timing. 'Early in the morning'
    makes the temporal nuance explicit in idiomatic English.
- source_word: συμβούλιον ποιήσαντες
  chosen: held a consultation
  alternatives:
  - having made a plan
  - having taken counsel
  - having convened a council
  lexicon: BDAG
  rationale: The idiom literally means 'having made/held a council/consultation.'
    'Held a consultation' best captures the deliberative action without awkward literalism.
    It likely refers to formal consultation rather than merely devising a plan.
- source_word: ἀρχιερεῖς
  chosen: chief priests
  alternatives:
  - high priests
  lexicon: BDAG
  rationale: Standard rendering for the plural referring to the leading priestly authorities,
    not a plurality of high priests in office.
- source_word: πρεσβυτέρων
  chosen: elders
  alternatives:
  - older men
  lexicon: BDAG
  rationale: In this governing context the term refers to recognized leaders, so 'elders'
    is the established and contextually accurate rendering.
- source_word: γραμματέων
  chosen: scribes
  alternatives:
  - teachers of the law
  - legal experts
  lexicon: BDAG
  rationale: '''Scribes'' is concise and sufficiently transparent here; broader explanatory
    renderings are possible but not necessary in the main text.'
- source_word: ὅλον τὸ συνέδριον
  chosen: the whole council
  alternatives:
  - the whole Sanhedrin
  - the entire council
  lexicon: BDAG
  rationale: συνέδριον denotes the ruling council. 'The whole council' translates
    the term rather than transliterating it, in keeping with the philosophy of preserving
    meaning in titles/institutions where possible. 'Sanhedrin' is preserved as an
    alternative in a footnote because it is a familiar historical designation.
- source_word: δήσαντες
  chosen: bound
  alternatives:
  - tied up
  lexicon: BDAG
  rationale: Aorist participle indicating that Jesus was tied/bound before being taken
    away. 'Bound' is direct and appropriately solemn.
- source_word: ἀπήνεγκαν
  chosen: led him away
  alternatives:
  - took him away
  - brought him away
  lexicon: BDAG
  rationale: Although the verb can mean 'carry/bring away,' in this custody context
    idiomatic English is 'led him away.' This avoids an overly physical sense of carrying
    while preserving removal under guard.
- source_word: παρέδωκαν
  chosen: handed him over
  alternatives:
  - delivered him
  - turned him over
  lexicon: BDAG
  rationale: A key judicial/custodial verb in the passion narrative. 'Handed him over'
    is clear, idiomatic, and preserves the formal transfer of custody better than
    the more traditional but less transparent 'delivered him.'
- source_word: Πιλάτῳ
  chosen: Pilate
  lexicon: BDAG
  rationale: Standard English transliteration of the personal name Πιλᾶτος.
