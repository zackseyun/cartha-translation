id: MRK.15.15
reference: Mark 15:15
source:
  edition: SBLGNT
  text: ὁ δὲ Πιλᾶτος βουλόμενος τῷ ὄχλῳ τὸ ἱκανὸν ποιῆσαι ἀπέλυσεν αὐτοῖς τὸν Βαραββᾶν,
    καὶ παρέδωκεν τὸν Ἰησοῦν φραγελλώσας ἵνα σταυρωθῇ.
translation:
  text: So Pilate, wanting to satisfy the crowd, released Barabbas to them; and after
    having Jesus flogged, he handed him over to be crucified.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to please the crowd.' Literally, 'to do what was sufficient for the
      crowd.'
    reason: lexical_alternative
lexical_decisions:
- source_word: βουλόμενος
  chosen: wanting
  alternatives:
  - wishing
  - desiring
  - intending
  lexicon: BDAG
  rationale: The participle expresses Pilate’s volition or intention. 'Wanting' is
    natural modern English and fits the motive clause without overstating deliberation.
- source_word: τῷ ὄχλῳ τὸ ἱκανὸν ποιῆσαι
  chosen: to satisfy the crowd
  alternatives:
  - to do what was enough for the crowd
  - to content the crowd
  - to please the crowd
  lexicon: BDAG
  rationale: The idiom literally means 'to do the sufficient thing for the crowd,'
    but in context it denotes meeting their demand or satisfying them. 'Satisfy the
    crowd' is the clearest optimal-equivalence rendering. 'Please the crowd' is possible
    but can sound too mild or morally neutral.
- source_word: ἀπέλυσεν
  chosen: released
  alternatives:
  - set free
  lexicon: BDAG
  rationale: In this judicial context the verb means to release a prisoner. 'Released'
    is concise and idiomatic.
- source_word: αὐτοῖς
  chosen: to them
  alternatives:
  - for them
  lexicon: BDAG
  rationale: The dative refers to the crowd as the recipients of the release decision.
    'To them' is the most straightforward English equivalent.
- source_word: παρέδωκεν
  chosen: handed him over
  alternatives:
  - delivered him over
  - turned him over
  lexicon: BDAG
  rationale: παραδίδωμι is a significant passion verb meaning to hand over into another’s
    power. 'Handed him over' preserves that force in clear English better than the
    more wooden 'delivered him over.'
- source_word: φραγελλώσας
  chosen: after having Jesus flogged
  alternatives:
  - having scourged Jesus
  - after flogging Jesus
  lexicon: BDAG
  rationale: 'The aorist participle denotes action antecedent to the main verb. ''After
    having Jesus flogged'' makes the sequence explicit and reflects the causative
    sense in context: Pilate ordered the flogging. ''Flogged'' is more accessible
    than ''scourged.'''
- source_word: ἵνα σταυρωθῇ
  chosen: to be crucified
  alternatives:
  - so that he might be crucified
  lexicon: BDAG
  rationale: The ἵνα clause expresses purpose/result in this narrative context. 'To
    be crucified' is idiomatic after 'handed him over' and preserves the intended
    outcome without awkwardness.
- source_word: Βαραββᾶν
  chosen: Barabbas
  rationale: Personal names are transliterated by standard convention per translation
    philosophy.
- source_word: Ἰησοῦν
  chosen: Jesus
  rationale: Personal names are transliterated by standard convention per translation
    philosophy.
