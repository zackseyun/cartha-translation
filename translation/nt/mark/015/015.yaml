theological_decisions:
- issue: Rendering Pilate’s motive in τῷ ὄχλῳ τὸ ἱκανὸν ποιῆσαι
  chosen_reading: Pilate acted to satisfy the crowd’s demand
  alternative_readings:
  - Pilate acted merely to do what was expedient for the crowd
  - Pilate acted to please the crowd
  rationale: The phrase concerns political appeasement rather than benevolent service.
    'Satisfy the crowd' preserves the narrative’s moral tension without adding interpretive
    commentary beyond the Greek idiom.
  doctrine_reference: 'Translation philosophy: preserve the source text''s plain sense;
    readable modern English.'
