theological_decisions:
- issue: Force of υἱὸς θεοῦ in the centurion's confession
  chosen_reading: the Son of God
  alternative_readings:
  - a son of God
  rationale: Within Mark's narrative, 'Son of God' functions as a significant christological
    title (cf. Mark 1:1; 1:11; 9:7). Rendering it as 'the Son of God' best preserves
    the likely narrative force without denying that the Greek form has prompted debate.
    The alternative is preserved in a footnote rather than adopted in the main text,
    in keeping with the principle of preserving tension where ambiguity exists.
  doctrine_reference: Translation philosophy §3; Affirmations (Nicene/Chalcedonian
    orthodoxy without importing claims beyond the text)
