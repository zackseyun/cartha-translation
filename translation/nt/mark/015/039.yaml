id: MRK.15.39
reference: Mark 15:39
source:
  edition: SBLGNT
  text: ἰδὼν δὲ ὁ κεντυρίων ὁ παρεστηκὼς ἐξ ἐναντίας αὐτοῦ ὅτι ⸀οὕτως ἐξέπνευσεν εἶπεν·
    Ἀληθῶς ⸂οὗτος ὁ ἄνθρωπος⸃ υἱὸς ⸂θεοῦ ἦν⸃.
translation:
  text: Now when the centurion, who was standing opposite him, saw that he breathed
    his last in this way, he said, “Truly this man was the Son of God.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Truly this man was a son of God.” The Greek expression can be read qualitatively
      or indefinitely, but in Mark’s context it likely carries the force of the title
      “Son of God.”
    reason: alternative_reading
lexical_decisions:
- source_word: ἰδὼν δὲ
  chosen: Now when ... saw
  alternatives:
  - And when ... saw
  - But when ... saw
  lexicon: BDAG
  rationale: The aorist participle ἰδών is best rendered temporally here ('when ...
    saw'). δέ is lightly connective; 'Now' gives natural English discourse flow without
    overstating contrast.
- source_word: κεντυρίων
  chosen: centurion
  alternatives:
  - Roman officer
  lexicon: BDAG
  rationale: '''Centurion'' is the standard and precise rendering for the Roman military
    rank denoted by κεντυρίων.'
- source_word: ὁ παρεστηκὼς ἐξ ἐναντίας αὐτοῦ
  chosen: who was standing opposite him
  alternatives:
  - who stood facing him
  - who was standing in front of him
  lexicon: BDAG
  rationale: The perfect participle παρεστηκώς conveys a standing position already
    assumed; 'was standing' is idiomatic. ἐξ ἐναντίας αὐτοῦ indicates position opposite/facing
    him. 'Opposite him' preserves the spatial sense without overinterpreting.
- source_word: ὅτι οὕτως ἐξέπνευσεν
  chosen: that he breathed his last in this way
  alternatives:
  - that he died in this way
  - that he expired like this
  lexicon: BDAG
  rationale: ἐκπνέω literally refers to breathing out and idiomatically to dying.
    'Breathed his last' preserves the vividness of the Greek while remaining natural
    English. οὕτως is retained as 'in this way' to reflect that the centurion's statement
    responds to the manner of Jesus' death.
- source_word: Ἀληθῶς
  chosen: Truly
  alternatives:
  - Certainly
  - Surely
  lexicon: BDAG
  rationale: '''Truly'' preserves the solemn, declarative force of ἀληθῶς and fits
    the narrative register.'
- source_word: οὗτος ὁ ἄνθρωπος
  chosen: this man
  alternatives:
  - this human being
  lexicon: BDAG
  rationale: ἄνθρωπος here refers specifically to Jesus as a male human individual.
    'This man' is the natural and gender-accurate rendering.
- source_word: υἱὸς θεοῦ
  chosen: the Son of God
  alternatives:
  - a son of God
  - God's Son
  lexicon: BDAG
  rationale: Although the Greek lacks the article before θεοῦ, the predicate construction
    in context naturally yields a qualitative/definite sense. In Mark's Gospel, 'Son
    of God' is a loaded christological designation, and the English idiom 'the Son
    of God' best conveys that force. The anarthrous alternative is preserved in a
    footnote because the phrase is discussed in scholarship.
- source_word: ἦν
  chosen: was
  alternatives:
  - is
  lexicon: BDAG
  rationale: The imperfect of εἰμί is straightforwardly past tense in the centurion's
    declaration and should be rendered 'was.'
