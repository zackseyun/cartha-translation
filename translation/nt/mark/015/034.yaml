theological_decisions:
- issue: Relation of Jesus's cry to Psalm 22:1
  chosen_reading: Retain the wording as a direct cry of dereliction while preserving
    its scriptural resonance without adding interpretive explanation in the main text.
  alternative_readings:
  - Explicitly signal quotation with wording such as 'that is, from Psalm 22'
  - Soften the sense to avoid implying real abandonment
  rationale: The verse itself presents both the Semitic cry and its translation, strongly
    evoking Psalm 22:1. The translation should preserve that tension and resonance
    without importing a doctrinal explanation of how the Son relates to the Father
    in the crucifixion. This aligns with the instruction to preserve theological tension
    rather than resolve it.
  doctrine_reference: Translation philosophy §3; Affirmations (Nicene Creed, Chalcedon)
- issue: Rendering of Jesus's Semitic words
  chosen_reading: Preserve the transliterated form in the main text and provide the
    translation immediately after, following Mark's own pattern.
  alternative_readings:
  - Translate only the meaning and omit the Semitic words
  - Normalize to the more familiar Matthew-like 'Eli, Eli'
  rationale: Mark intentionally preserves the utterance as spoken and then interprets
    it. Keeping both respects the source text and avoids harmonizing Mark to Matthew.
  doctrine_reference: Translation philosophy §1
