id: MRK.15.34
reference: Mark 15:34
source:
  edition: SBLGNT
  text: καὶ τῇ ⸂ἐνάτῃ ὥρᾳ⸃ ἐβόησεν ὁ Ἰησοῦς φωνῇ ⸀μεγάλῃ· Ἐλωῒ ἐλωῒ ⸀λεμὰ σαβαχθάνι;
    ὅ ἐστιν μεθερμηνευόμενον Ὁ θεός μου ὁ θεός μου, εἰς τί ⸂ἐγκατέλιπές με⸃;
translation:
  text: And at the ninth hour Jesus cried out with a loud voice, “Eloi, Eloi, lema
    sabachthani?” which is translated, “My God, my God, why have you forsaken me?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Some manuscripts and many English traditions reflect the Semitic phrase
      as 'lama sabachthani' rather than 'lema sabachthani.'
    reason: textual_variant
  - marker: b
    text: Jesus's words echo Psalm 22:1.
    reason: cross_reference
  - marker: c
    text: Or 'why did you forsake me?'
    reason: lexical_alternative
lexical_decisions:
- source_word: τῇ ἐνάτῃ ὥρᾳ
  chosen: at the ninth hour
  alternatives:
  - at the ninth hour of the day
  - at three in the afternoon
  lexicon: BDAG
  rationale: A formally close rendering preserves the Jewish/Roman time expression
    used by Mark. 'Three in the afternoon' is interpretive and suitable for a note
    or paraphrase, but the main text keeps the source idiom.
- source_word: ἐβόησεν
  chosen: cried out
  alternatives:
  - shouted
  - cried
  lexicon: BDAG
  rationale: The verb denotes a loud cry or shout. 'Cried out' is natural English
    and preserves the force without sounding overly colloquial.
- source_word: φωνῇ μεγάλῃ
  chosen: with a loud voice
  alternatives:
  - in a loud voice
  - with a great voice
  lexicon: BDAG
  rationale: This instrumental phrase intensifies the manner of Jesus's cry. 'With
    a loud voice' is idiomatic and retains the solemn force of the Greek.
- source_word: Ἐλωῒ ἐλωῒ λεμὰ σαβαχθάνι
  chosen: Eloi, Eloi, lema sabachthani?
  alternatives:
  - Eloi, Eloi, lama sabachthani?
  - My God, my God, why have you forsaken me?
  lexicon: BDAG
  rationale: Mark preserves Jesus's Semitic words and then supplies a Greek translation.
    The main text should likewise preserve the transliterated cry before giving the
    translation. 'Lema' follows the SBLGNT form λεμά; 'lama' is a familiar variant
    reflected in some traditions and manuscripts.
- source_word: μεθερμηνευόμενον
  chosen: which is translated
  alternatives:
  - which means
  - which is interpreted
  lexicon: BDAG
  rationale: The participle indicates explanatory translation of the Semitic phrase
    into Greek. 'Which is translated' is straightforward and accurate.
- source_word: εἰς τί
  chosen: why
  alternatives:
  - for what purpose
  - for what reason
  lexicon: BDAG
  rationale: In this idiom the phrase asks the reason for the action. 'Why' is the
    most natural English equivalent.
- source_word: ἐγκατέλιπές με
  chosen: have you forsaken me
  alternatives:
  - did you forsake me
  - have you abandoned me
  lexicon: BDAG
  rationale: The wording echoes Psalm 22:1 in traditional English and accurately conveys
    abandonment. 'Forsaken' preserves the biblical resonance and gravity better than
    the more colloquial 'abandoned.' The English present perfect is idiomatic in direct
    address here, even though the Greek is aorist.
