theological_decisions:
- issue: Rendering the mock acclamation to Jesus without muting its irony or royal
    significance
  chosen_reading: Use 'Hail, King of the Jews!' as a mocking royal salute
  alternative_readings:
  - Greetings, King of the Jews!
  rationale: The verse depicts soldiers parodying Jesus' kingship. 'Hail' preserves
    both the formal salutation and the ironic royal tone without adding doctrinal
    interpretation beyond the text.
  doctrine_reference: 'Translation philosophy: preserve the source text''s plain sense;
