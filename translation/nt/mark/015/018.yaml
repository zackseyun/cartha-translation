id: MRK.15.18
reference: Mark 15:18
source:
  edition: SBLGNT
  text: καὶ ἤρξαντο ἀσπάζεσθαι αὐτόν· Χαῖρε, ⸀βασιλεῦ τῶν Ἰουδαίων·
translation:
  text: 'And they began to salute him: “Hail, King of the Jews!”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “greet him.” The Greek verb can denote an ordinary greeting, but here
      it carries the sense of a formal salute in mockery.
    reason: lexical_alternative
  - marker: b
    text: Or “King of the Judeans.” The term can refer either to Jews or to Judeans;
      “Jews” is retained here because it is the standard sense in this passion-context
      title.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἤρξαντο
  chosen: began
  alternatives:
  - started
  lexicon: BDAG
  rationale: The ingressive sense of ἄρχομαι with an infinitive is naturally rendered
    'began to' in English, preserving the narrative progression without unnecessary
    stiffness.
- source_word: ἀσπάζεσθαι
  chosen: to salute
  alternatives:
  - to greet
  - to hail
  lexicon: BDAG
  rationale: ἀσπάζομαι commonly means 'greet' or 'welcome,' but in this mocking royal
    acclamation context 'salute' best captures the formal, performative nature of
    the soldiers' derision. 'Hail' is reserved for the direct speech Χαῖρε.
- source_word: Χαῖρε
  chosen: Hail
  alternatives:
  - Greetings
  - Rejoice
  lexicon: BDAG
  rationale: As an imperative used as a greeting/acclamation, Χαῖρε is best rendered
    'Hail' here because the scene is a mock royal salute. 'Greetings' is possible
    but too ordinary; 'Rejoice' is too literal for this idiomatic use.
- source_word: βασιλεῦ τῶν Ἰουδαίων
  chosen: King of the Jews
  alternatives:
  - king of the Judeans
  lexicon: BDAG
  rationale: βασιλεύς is straightforwardly 'king.' Ἰουδαῖος can mean 'Jew' or 'Judean';
    in this Gospel passion context the established and contextually appropriate sense
    is 'Jews,' referring to the people as understood by the Roman mockery of Jesus'
    messianic kingship claim.
- source_word: καὶ
  chosen: And
  alternatives:
  - Then
  lexicon: BDAG
  rationale: A simple connective is sufficient. 'And' preserves Mark's paratactic
    style more closely than the more interpretive 'Then'.
