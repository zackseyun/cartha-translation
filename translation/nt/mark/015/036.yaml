id: MRK.15.36
reference: Mark 15:36
source:
  edition: SBLGNT
  text: δραμὼν δέ ⸂τις καὶ⸃ γεμίσας σπόγγον ὄξους ⸀περιθεὶς καλάμῳ ἐπότιζεν αὐτόν,
    λέγων· Ἄφετε ἴδωμεν εἰ ἔρχεται Ἠλίας καθελεῖν αὐτόν.
translation:
  text: Then someone ran, filled a sponge with sour wine, put it on a reed, and was
    giving him a drink, saying, “Leave him alone. Let us see whether Elijah is coming
    to take him down.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “Wait. Let us see whether Elijah comes to take him down.”
    reason: lexical_alternative
  - marker: b
    text: “Sour wine” refers to a cheap acidic wine drink, not necessarily distilled
      vinegar in the modern sense.
    reason: cultural_note
lexical_decisions:
- source_word: δραμὼν
  chosen: ran
  alternatives:
  - having run
  lexicon: BDAG
  rationale: Aorist participle indicating the initial action; idiomatic English coordinates
    it with the following verbs as narrative sequence.
- source_word: τις καὶ
  chosen: someone
  alternatives:
  - a certain one
  - someone also
  lexicon: BDAG
  rationale: Indefinite pronoun τις identifies an unspecified individual. The accompanying
    καί is textually bound here but not naturally represented with a separate 'also'
    in English; 'someone' best captures the sense.
- source_word: γεμίσας σπόγγον ὄξους
  chosen: filled a sponge with sour wine
  alternatives:
  - filled a sponge with vinegar
  lexicon: BDAG
  rationale: ὄξος refers to sour wine/wine vinegar, commonly a cheap drink. 'Sour
    wine' is more natural and culturally precise in context than the household-condiment
    sense often evoked by 'vinegar' in modern English.
- source_word: περιθεὶς καλάμῳ
  chosen: put it on a reed
  alternatives:
  - placed it on a stick
  - fixed it to a reed
  lexicon: BDAG
  rationale: The participle describes placing the sponge onto/around a reed for lifting
    to Jesus. 'Reed' preserves the lexical value of κάλαμος better than the more generic
    'stick'.
- source_word: ἐπότιζεν αὐτόν
  chosen: was giving him a drink
  alternatives:
  - gave him a drink
  - offered him a drink
  - was giving him to drink
  lexicon: BDAG
  rationale: Imperfect tense suggests ongoing or attempted action. 'Was giving him
    a drink' preserves the imperfective aspect more clearly than a simple past.
- source_word: Ἄφετε
  chosen: Leave him alone
  alternatives:
  - Wait
  - Let be
  lexicon: BDAG
  rationale: ἀφίημι here is an imperative to desist/leave off. In this context it
    most naturally means telling others to leave Jesus alone for the moment. Because
    the expression can also function idiomatically as 'Wait,' that alternative is
    preserved in a footnote.
- source_word: ἴδωμεν εἰ ἔρχεται Ἠλίας
  chosen: Let us see whether Elijah is coming
  alternatives:
  - Let us see if Elijah comes
  lexicon: BDAG
  rationale: Subjunctive plus εἰ introduces the content to be seen/tested. 'Whether
    Elijah is coming' is natural English and preserves the immediacy of the present
    tense ἔρχεται.
- source_word: καθελεῖν αὐτόν
  chosen: to take him down
  alternatives:
  - to bring him down
  - to remove him
  lexicon: BDAG
  rationale: καθαιρέω in crucifixion context refers to taking someone down from an
    elevated place, here from the cross. 'Take him down' is the clearest idiomatic
    rendering.
