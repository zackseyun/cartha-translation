theological_decisions:
- issue: Speaker's intent in saying Ἄφετε
  chosen_reading: The line is rendered as a command to leave Jesus alone temporarily
    so they can see whether Elijah will intervene.
  alternative_readings:
  - The line could be rendered more idiomatically as 'Wait'.
  rationale: This is not a doctrinally weighty variant but an interpretive one. The
    more literal sense of ἀφίημι is preserved in the main text, while the idiomatic
    alternative is footnoted to preserve ambiguity rather than over-resolve it.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
