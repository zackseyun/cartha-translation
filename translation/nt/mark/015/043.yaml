theological_decisions:
- issue: Identity and status of Joseph as βουλευτής
  chosen_reading: Rendered as 'council member' without specifying 'Sanhedrin' in the main text.
  alternative_readings:
  - member of the Sanhedrin
  rationale: The term denotes a council member, and in context likely refers to the Jewish council, but the Greek word itself does not name the Sanhedrin explicitly. The translation avoids importing a historical specification into the main text beyond what the verse states.
  doctrine_reference: Original-language primacy over translation tradition; never import doctrinal claims the text does not make.
- issue: Force of τολμήσας
  chosen_reading: Expressed as Joseph acting 'boldly' in approaching Pilate.
  alternative_readings:
  - having dared to go to Pilate
  - taking courage and going to Pilate
  rationale: The verse emphasizes courage in a politically and socially risky act. 'Boldly' preserves that force without cumbersome participial structure.
  doctrine_reference: Optimal equivalence; preserve the source's force in readable modern English.
revisions:
- timestamp: '2026-04-21T05:23:38Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/nt/mark/015/043.json
  category: awkward_english
  tier: 1
  from: Joseph, who was from Arimathea, a respected council member, who was himself also waiting for the kingdom of God,
  to: Joseph of Arimathea, a respected council member who was himself also waiting for the kingdom of God,
  rationale: The current rendering strings together descriptive elements ('who was...', 'a...', 'who was...') in a way that is grammatically correct but stylistically cumbersome. Using the standard English idiom 'Joseph of Arimathea' is more concise than the relative clause. Combining the subsequent descriptors into a single, smoother appositive phrase improves the flow of the sentence significantly.
- timestamp: '2026-04-21T05:23:38Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/nt/mark/015/043.json
  category: awkward_english
  tier: 1
  from: came and boldly went in
  to: boldly went in
  rationale: The Greek has two participles (ἐλθὼν, τολμήσας) before the main verb (εἰσῆλθεν). While translating the first participle as a coordinated verb ('came and...') is a common strategy, here it creates a slight redundancy with 'went in'. The act of 'coming' is implied by 'going in to Pilate'. Removing 'came and' makes the action more direct and fluid in English, reflecting a common rendering in modern translations that subsumes the sense of ἐλθὼν into the main verb of motion.
