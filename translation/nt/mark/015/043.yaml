id: MRK.15.43
reference: Mark 15:43
source:
  edition: SBLGNT
  text: ⸀ἐλθὼν Ἰωσὴφ ⸀ὁ ἀπὸ Ἁριμαθαίας εὐσχήμων βουλευτής, ὃς καὶ αὐτὸς ἦν προσδεχόμενος
    τὴν βασιλείαν τοῦ θεοῦ, τολμήσας εἰσῆλθεν πρὸς ⸀τὸν Πιλᾶτον καὶ ᾐτήσατο τὸ σῶμα
    τοῦ Ἰησοῦ.
translation:
  text: Joseph, who was from Arimathea, a respected council member, who was himself
    also waiting for the kingdom of God, came and boldly went in to Pilate and asked
    for the body of Jesus.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'prominent' or 'honorable council member.'
    reason: lexical_alternative
  - marker: b
    text: Or 'having dared, he went in to Pilate'; the Greek highlights Joseph's courage
      in approaching Pilate.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐλθὼν
  chosen: came
  alternatives:
  - having come
  - arrived
  lexicon: BDAG
  rationale: Aorist participle preceding the main verbs; in natural English, 'came'
    smoothly introduces Joseph's action without over-literal participial awkwardness.
- source_word: ὁ ἀπὸ Ἁριμαθαίας
  chosen: who was from Arimathea
  alternatives:
  - the one from Arimathea
  - of Arimathea
  lexicon: BDAG
  rationale: Uses a natural relative clause to identify Joseph's origin. 'From Arimathea'
    reflects ἀπό directly while reading idiomatically in English.
- source_word: εὐσχήμων
  chosen: respected
  alternatives:
  - prominent
  - honorable
  - distinguished
  lexicon: BDAG
  rationale: Conveys social standing and esteem in accessible modern English. 'Honorable'
    is possible but can sound archaic or title-like; 'respected' best fits readable
    modern style.
- source_word: βουλευτής
  chosen: council member
  alternatives:
  - member of the council
  - councilor
  - senator
  lexicon: BDAG
  rationale: Refers to a member of the governing council, likely the Sanhedrin. 'Council
    member' is clear and avoids the less familiar 'councilor' and the overly specific
    'senator'.
- source_word: ὃς καὶ αὐτὸς
  chosen: who was himself also
  alternatives:
  - who also himself was
  - who himself too was
  - who also was
  lexicon: BDAG
  rationale: Preserves the emphatic force of καὶ αὐτός, indicating Joseph personally
    shared this expectation. The wording is slightly fuller to retain the Greek emphasis.
- source_word: ἦν προσδεχόμενος
  chosen: was waiting for
  alternatives:
  - was expecting
  - was looking for
  - was awaiting
  lexicon: BDAG
  rationale: The periphrastic construction indicates an ongoing posture or expectation.
    'Was waiting for' is natural and captures sustained anticipation.
- source_word: τὴν βασιλείαν τοῦ θεοῦ
  chosen: the kingdom of God
  lexicon: BDAG
  rationale: Standard and direct rendering of a central Gospel phrase; no contextual
    reason to vary.
- source_word: τολμήσας
  chosen: boldly
  alternatives:
  - having dared
  - taking courage
  - daring
  lexicon: BDAG
  rationale: The participle highlights Joseph's courage in approaching Pilate. Rendering
    adverbially as 'boldly' communicates the force naturally in English while linking
    it to the following action.
- source_word: εἰσῆλθεν πρὸς τὸν Πιλᾶτον
  chosen: went in to Pilate
  alternatives:
  - went to Pilate
  - entered and went to Pilate
  - went before Pilate
  lexicon: BDAG
  rationale: Retains the directional nuance of εἰσῆλθεν ('went in/entered') and πρὸς
    ('to, before'). This likely implies entering Pilate's presence.
- source_word: ᾐτήσατο
  chosen: asked for
  alternatives:
  - requested
  - petitioned for
  lexicon: BDAG
  rationale: Middle voice here is well represented by simple English 'asked for.'
    'Requested' is possible but slightly more formal than needed.
- source_word: τὸ σῶμα τοῦ Ἰησοῦ
  chosen: the body of Jesus
  alternatives:
  - Jesus' body
  lexicon: BDAG
  rationale: A transparent formal rendering that preserves the genitival structure
    and solemn tone.
