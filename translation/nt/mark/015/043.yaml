theological_decisions:
- issue: Identity and status of Joseph as βουλευτής
  chosen_reading: Rendered as 'council member' without specifying 'Sanhedrin' in the
    main text.
  alternative_readings:
  - member of the Sanhedrin
  rationale: The term denotes a council member, and in context likely refers to the
    Jewish council, but the Greek word itself does not name the Sanhedrin explicitly.
    The translation avoids importing a historical specification into the main text
    beyond what the verse states.
  doctrine_reference: Original-language primacy over translation tradition; never
    import doctrinal claims the text does not make.
- issue: Force of τολμήσας
  chosen_reading: Expressed as Joseph acting 'boldly' in approaching Pilate.
  alternative_readings:
  - having dared to go to Pilate
  - taking courage and going to Pilate
  rationale: The verse emphasizes courage in a politically and socially risky act.
    'Boldly' preserves that force without cumbersome participial structure.
  doctrine_reference: Optimal equivalence; preserve the source's force in readable
    modern English.
