id: MRK.15.47
reference: Mark 15:47
source:
  edition: SBLGNT
  text: ἡ δὲ Μαρία ἡ Μαγδαληνὴ καὶ Μαρία ⸂ἡ Ἰωσῆτος⸃ ἐθεώρουν ποῦ ⸀τέθειται.
translation:
  text: And Mary Magdalene and Mary the mother of Joses were watching where he had
    been laid.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'Mary of Joses.' The Greek identifies this Mary by relation
      to Joses.
    reason: lexical_alternative
lexical_decisions:
- source_word: δὲ
  chosen: And
  alternatives:
  - Now
  - But
  lexicon: BDAG
  rationale: Here δέ functions as a mild connective continuing the burial narrative
    rather than marking a strong contrast. 'And' gives natural English continuity.
- source_word: Μαρία ἡ Μαγδαληνή
  chosen: Mary Magdalene
  alternatives:
  - Maria Magdalene
  lexicon: BDAG
  rationale: Standard English transliteration of the personal name and epithet. The
    article with the epithet identifies which Mary is meant.
- source_word: Μαρία ἡ Ἰωσῆτος
  chosen: Mary the mother of Joses
  alternatives:
  - Mary of Joses
  - Mary, mother of Joses
  lexicon: BDAG
  rationale: The genitive Ἰωσῆτος is most naturally relational, identifying this Mary
    by her son Joses, as in Markan usage. English idiom commonly makes the relationship
    explicit with 'the mother of.'
- source_word: ἐθεώρουν
  chosen: were watching
  alternatives:
  - were observing
  - saw
  - kept looking at
  lexicon: BDAG
  rationale: Imperfect tense indicates ongoing action in past time. 'Were watching'
    preserves the durative sense better than simple 'saw.'
- source_word: ποῦ
  chosen: where
  alternatives:
  - the place where
  lexicon: BDAG
  rationale: Direct interrogative/adverbial sense fits the clause naturally in English.
- source_word: τέθειται
  chosen: he had been laid
  alternatives:
  - he has been laid
  - he was laid
  - it had been placed
  lexicon: BDAG
  rationale: The perfect passive of τίθημι emphasizes the resultant state after the
    burial action. In English narrative sequence, 'had been laid' communicates that
    completed action with continuing result and makes explicit the implied masculine
    object, Jesus.
