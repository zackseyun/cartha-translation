theological_decisions:
- issue: Implied object of the passive verb
  chosen_reading: Explicitly supplied 'he' in English
  alternative_readings:
  - 'left the object implicit: ''where had been laid'''
  - supplied 'it' referring to the body
  rationale: The Greek leaves the object implicit because it is clear from context
    that Jesus is in view. English requires an expressed subject/object for natural
    clarity. 'He' is preferable to 'it' because the referent is Jesus, not merely
    a corpse as an object.
  doctrine_reference: Translation philosophy §6 (readable modern English)
