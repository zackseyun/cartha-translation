id: MRK.15.44
reference: Mark 15:44
source:
  edition: SBLGNT
  text: ὁ δὲ Πιλᾶτος ἐθαύμασεν εἰ ἤδη τέθνηκεν, καὶ προσκαλεσάμενος τὸν κεντυρίωνα
    ἐπηρώτησεν αὐτὸν εἰ ⸀πάλαι ἀπέθανεν·
translation:
  text: But Pilate was amazed that he had already died, and summoning the centurion,
    he asked him whether he had died some time ago.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, “whether he had been dead for some time.”
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐθαύμασεν
  chosen: was amazed
  alternatives:
  - marveled
  - was surprised
  lexicon: BDAG
  rationale: The verb θαυμάζω here expresses Pilate's astonishment at the reported
    speed of Jesus' death. 'Was amazed' is natural modern English and preserves the
    force without sounding archaic like 'marveled.'
- source_word: εἰ ἤδη τέθνηκεν
  chosen: that he had already died
  alternatives:
  - whether he was already dead
  - if he had already died
  lexicon: BDAG
  rationale: Although εἰ can introduce an indirect question ('whether/if'), in English
    after a verb of amazement the idiom 'amazed that...' reads more naturally while
    preserving the sense. The perfect τέθνηκεν highlights the resulting state from
    death; 'had already died' communicates the completed event and present implication.
- source_word: προσκαλεσάμενος
  chosen: summoning
  alternatives:
  - calling for
  - having summoned
  lexicon: BDAG
  rationale: The participle is attendant to the main verb and indicates the action
    Pilate took before questioning the centurion. 'Summoning' is concise and suitably
    formal without being stiff.
- source_word: κεντυρίωνα
  chosen: centurion
  alternatives:
  - Roman officer
  lexicon: BDAG
  rationale: '''Centurion'' is the standard and precise rendering of the Roman military
    rank κεντυρίων. It is familiar enough in English and preserves historical specificity.'
- source_word: ἐπηρώτησεν
  chosen: he asked him
  alternatives:
  - he questioned him
  - he inquired of him
  lexicon: BDAG
  rationale: The verb means to ask or inquire. 'He asked him' is straightforward modern
    English and fits the narrative style.
- source_word: εἰ πάλαι ἀπέθανεν
  chosen: whether he had died some time ago
  alternatives:
  - whether he had died already
  - whether he had been dead for some time
  - whether he died long ago
  lexicon: BDAG
  rationale: πάλαι here does not mean 'long ago' in an absolute sense, but 'for some
    time already' relative to the recent crucifixion. 'Whether he had died some time
    ago' best captures Pilate's inquiry about how long Jesus had been dead. A footnote
    preserves the more literal alternative 'had been dead for some time.'
