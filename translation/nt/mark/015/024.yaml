theological_decisions:
- issue: Narrative present tense in passion account
  chosen_reading: Retain the historical present ('they crucify') rather than converting
    to simple past.
  alternative_readings:
  - they crucified him
  rationale: This is a translational rather than doctrinal decision, but it affects
    the force of the narrative. Mark frequently uses the historical present for vividness;
    preserving it here reflects the Greek discourse texture without adding theological
    content.
  doctrine_reference: Translation philosophy §1, §6
