id: MRK.15.24
reference: Mark 15:24
source:
  edition: SBLGNT
  text: καὶ ⸂σταυροῦσιν αὐτὸν καὶ⸃ διαμερίζονται τὰ ἱμάτια αὐτοῦ, βάλλοντες κλῆρον
    ἐπ’ αὐτὰ τίς τί ἄρῃ.
translation:
  text: And they crucify him and divide his garments among themselves, casting lots
    for them to decide what each would take.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'casting lots over them, to see who would take what.'
    reason: lexical_alternative
lexical_decisions:
- source_word: σταυροῦσιν
  chosen: crucify
  alternatives:
  - are crucifying
  - crucified
  lexicon: BDAG
  rationale: Present tense in Mark's narrative is naturally rendered as a historical
    present in English. 'Crucify' preserves the vividness of the Greek better than
    flattening to a simple past, while still reading naturally in context.
- source_word: διαμερίζονται
  chosen: divide
  alternatives:
  - distribute
  - apportion
  lexicon: BDAG
  rationale: The verb denotes dividing or distributing portions. 'Divide' is the most
    direct and idiomatic rendering here, especially with clothing as the object.
- source_word: ἱμάτια
  chosen: garments
  alternatives:
  - clothes
  - clothing
  lexicon: BDAG
  rationale: '''Garments'' preserves the concrete sense of articles of clothing without
    sounding overly colloquial. It also fits the solemn narrative register better
    than ''clothes.'''
- source_word: βάλλοντες κλῆρον
  chosen: casting lots
  alternatives:
  - throwing a lot
  - drawing lots
  lexicon: BDAG
  rationale: This is a standard idiom for determining allocation by lot. 'Casting
    lots' is both accurate and familiar in English biblical style.
- source_word: ἐπ’ αὐτὰ
  chosen: for them
  alternatives:
  - over them
  - for these garments
  lexicon: BDAG
  rationale: With κλῆρον in this context, ἐπί plus the accusative refers to the objects
    over which the lots are cast. 'For them' is concise and idiomatic, referring back
    to the garments.
- source_word: τίς τί ἄρῃ
  chosen: to decide what each would take
  alternatives:
  - who should take what
  - what each might take
  lexicon: BDAG
  rationale: 'The clause expresses the outcome determined by the lot: which person
    would take which item. ''To decide what each would take'' makes the sense explicit
    in natural English while preserving the distributive force of τίς τί.'
