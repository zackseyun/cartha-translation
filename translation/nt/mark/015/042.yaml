id: MRK.15.42
reference: Mark 15:42
source:
  edition: SBLGNT
  text: Καὶ ἤδη ὀψίας γενομένης, ἐπεὶ ἦν παρασκευή, ὅ ἐστιν ⸀προσάββατον,
translation:
  text: And when evening had already come, since it was the Preparation Day—that is,
    the day before the Sabbath—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'when it had already become evening.'
    reason: lexical_alternative
  - marker: b
    text: Greek 'Preparation,' a term for the day of preparation before the Sabbath.
    reason: cultural_note
  - marker: c
    text: Or 'the eve of the Sabbath'; the term refers to the day before the Sabbath,
      traditionally Friday.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὀψίας γενομένης
  chosen: when evening had already come
  alternatives:
  - when it had already become evening
  - when evening had fallen
  lexicon: BDAG
  rationale: The genitive absolute marks a temporal circumstance. 'Had already come'
    is natural modern English and preserves the sense of ἤδη with the aorist participle
    γενομένης.
- source_word: παρασκευή
  chosen: Preparation Day
  alternatives:
  - preparation
  - day of preparation
  lexicon: BDAG
  rationale: In this context the noun refers not to preparation in general but to
    the recognized day of preparation before the Sabbath. Capitalizing 'Preparation
    Day' signals the idiomatic calendrical sense without over-paraphrasing.
- source_word: προσάββατον
  chosen: the day before the Sabbath
  alternatives:
  - Friday
  - fore-Sabbath
  - the eve of the Sabbath
  lexicon: BDAG
  rationale: The explanatory gloss ὅ ἐστιν indicates Mark is clarifying παρασκευή
    for readers. 'The day before the Sabbath' gives the plain sense of προσάββατον
    in accessible English. 'Friday' is interpretive and too specific for the lexical
    form, while 'fore-Sabbath' is unnatural.
- source_word: ἐπεὶ
  chosen: since
  alternatives:
  - because
  - for
  lexicon: BDAG
  rationale: Here ἐπεὶ introduces an explanatory clause. 'Since' fits the narrative
    flow and preserves the causal-explanatory force without sounding overly formal.
- source_word: ὅ ἐστιν
  chosen: that is
  alternatives:
  - which is
  - that means
  lexicon: BDAG
  rationale: This is a standard explanatory formula. 'That is' is idiomatic and clear
    in modern English.
- source_word: Καὶ
  chosen: And
  alternatives:
  - Now
  - So
  lexicon: BDAG
  rationale: Retaining 'And' preserves Mark's paratactic narrative style without obscuring
    meaning.
