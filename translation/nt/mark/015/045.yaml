id: MRK.15.45
reference: Mark 15:45
source:
  edition: SBLGNT
  text: καὶ γνοὺς ἀπὸ τοῦ κεντυρίωνος ἐδωρήσατο τὸ ⸀πτῶμα τῷ Ἰωσήφ.
translation:
  text: And after learning it from the centurion, he granted the body to Joseph.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "the corpse" or "the dead body."
    reason: lexical_alternative
lexical_decisions:
- source_word: γνοὺς
  chosen: after learning
  alternatives:
  - having learned
  - when he learned
  - after finding out
  lexicon: BDAG
  rationale: Aorist participle of γινώσκω here is temporal/circumstantial, indicating
    Pilate's action after receiving the information. 'After learning' is natural modern
    English and preserves the sequence.
- source_word: ἀπὸ τοῦ κεντυρίωνος
  chosen: from the centurion
  alternatives:
  - by the centurion
  - from the army officer
  lexicon: BDAG
  rationale: 'ἀπό with the genitive marks source: Pilate learned the information from
    the centurion. ''Centurion'' is retained because it is a standard, recognizable
    historical term and more precise than the broader ''army officer''.'
- source_word: ἐδωρήσατο
  chosen: granted
  alternatives:
  - gave
  - presented
  - bestowed
  lexicon: BDAG
  rationale: δωρέομαι can carry the sense of granting or giving as a favor. 'Granted'
    fits the legal/official context of Pilate authorizing release of the corpse to
    Joseph better than the flatter 'gave.'
- source_word: πτῶμα
  chosen: body
  alternatives:
  - corpse
  - dead body
  lexicon: BDAG
  rationale: πτῶμα literally denotes a fallen body, hence corpse. In English narrative,
    'body' is the most natural main-text rendering here, while avoiding unnecessary
    harshness; the more explicit sense is preserved in a footnote for auditability.
- source_word: τῷ Ἰωσήφ
  chosen: to Joseph
  lexicon: BDAG
  rationale: Simple dative indirect object indicating the recipient of Pilate's grant.
