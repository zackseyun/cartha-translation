id: MRK.15.23
reference: Mark 15:23
source:
  edition: SBLGNT
  text: καὶ ἐδίδουν ⸀αὐτῷ ἐσμυρνισμένον οἶνον, ⸀ὃς δὲ οὐκ ἔλαβεν.
translation:
  text: And they were giving him wine mixed with myrrh, but he did not take it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they offered him wine mixed with myrrh.'
    reason: lexical_alternative
  - marker: b
    text: 'The Greek literally uses ''who/but he'' as a resumptive expression: ''but
      he did not take it.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐδίδουν
  chosen: they were giving
  alternatives:
  - they gave
  - they offered
  lexicon: BDAG
  rationale: Imperfect tense indicates ongoing or attempted action in narrative context;
    'were giving' preserves the aspect better than simple past. 'Offered' is idiomatic
    but less directly tied to δίδωμι ('give').
- source_word: ἐσμυρνισμένον οἶνον
  chosen: wine mixed with myrrh
  alternatives:
  - myrrhed wine
  - wine flavored with myrrh
  - wine mingled with myrrh
  lexicon: BDAG
  rationale: The participle from σμυρνίζω means to prepare or flavor with myrrh. 'Wine
    mixed with myrrh' is clear modern English and preserves the substance involved
    without archaic phrasing.
- source_word: ὃς δὲ
  chosen: but he
  alternatives:
  - and he
  - yet he
  lexicon: BDAG
  rationale: Although ὃς is formally a relative pronoun ('who'), in this construction
    it functions resumptively, referring back to Jesus. 'But he' gives natural English
    and reflects the mild adversative force of δέ in context.
- source_word: ἔλαβεν
  chosen: did not take it
  alternatives:
  - did not receive it
  - did not accept it
  lexicon: BDAG
  rationale: λαμβάνω commonly means 'take' or 'receive.' 'Did not take it' is the
    most straightforward rendering here; the object is implicit from context and naturally
    supplied in English.
