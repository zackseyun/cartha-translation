theological_decisions:
- issue: Nature of Jesus' refusal of the drink
  chosen_reading: Render the action descriptively without importing an explanation
    for why he refused it.
  alternative_readings:
  - He refused a narcotic intended to dull pain
  - He declined a customary drink for other reasons
  rationale: The verse states only that wine mixed with myrrh was being given to him
    and that he did not take it. The translation should not embed an interpretive
    explanation not explicit in the Greek.
  doctrine_reference: Preserve theological tension rather than resolve it.
