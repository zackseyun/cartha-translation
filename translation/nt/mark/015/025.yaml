id: MRK.15.25
reference: Mark 15:25
source:
  edition: SBLGNT
  text: Ἦν δὲ ὥρα τρίτη καὶ ἐσταύρωσαν αὐτόν.
translation:
  text: Now it was the third hour, and they crucified him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: That is, about nine in the morning, according to common Jewish reckoning.
    reason: cultural_note
lexical_decisions:
- source_word: Ἦν
  chosen: it was
  alternatives:
  - it was then
  - there was
  lexicon: BDAG
  rationale: Imperfect of εἰμί used idiomatically to set the scene or indicate time.
    English naturally supplies the impersonal 'it was' with a time expression.
- source_word: δὲ
  chosen: Now
  alternatives:
  - and
  - then
  - but
  lexicon: BDAG
  rationale: δέ here is a mild connective marking narrative progression rather than
    strong contrast. 'Now' preserves the discourse movement in readable English better
    than leaving it untranslated or using the overly flat 'and.'
- source_word: ὥρα τρίτη
  chosen: the third hour
  alternatives:
  - the third hour of the day
  - nine in the morning
  lexicon: BDAG
  rationale: A relatively formal rendering best preserves the source expression and
    its cultural setting. 'Nine in the morning' is interpretive and reflects likely
    Roman/ Jewish time reckoning assumptions; it is better preserved in a footnote
    rather than moved into the main text.
- source_word: ἐσταύρωσαν
  chosen: they crucified
  alternatives:
  - they nailed to a cross
  - they executed by crucifixion
  lexicon: BDAG
  rationale: The aorist active straightforwardly denotes the act of crucifixion. 'They
    crucified' is the standard, accurate English equivalent and avoids unnecessary
    paraphrase.
- source_word: αὐτόν
  chosen: him
  lexicon: BDAG
  rationale: Direct object pronoun referring to Jesus; simple English pronoun is fully
    adequate.
