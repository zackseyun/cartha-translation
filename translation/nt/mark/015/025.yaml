theological_decisions:
- issue: Rendering of the time expression in relation to chronology
  chosen_reading: Retain the literal expression 'the third hour' in the main text.
  alternative_readings:
  - Render as 'nine in the morning'
  rationale: The verse itself gives an ancient time designation without explaining
    its conversion into modern clock time. Preserving the literal wording avoids importing
    a harmonization strategy or a specific explanatory framework into the translation
    while still allowing clarification in a footnote.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    theological tension rather than resolve it.'
