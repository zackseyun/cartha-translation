id: MRK.15.10
reference: Mark 15:10
source:
  edition: SBLGNT
  text: ἐγίνωσκεν γὰρ ὅτι διὰ φθόνον παραδεδώκεισαν αὐτὸν οἱ ἀρχιερεῖς.
translation:
  text: For he knew that the chief priests had handed him over because of envy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'out of envy' or 'because of jealousy.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγίνωσκεν
  chosen: he knew
  alternatives:
  - he was knowing
  - he recognized
  - he understood
  lexicon: BDAG
  rationale: Imperfect of γινώσκω here expresses Pilate's ongoing or settled awareness.
    In idiomatic English, simple past 'he knew' best conveys the sense without awkwardness.
- source_word: γὰρ
  chosen: For
  alternatives:
  - because
  - indeed
  - now
  lexicon: BDAG
  rationale: γάρ gives the explanatory ground for the preceding statement. 'For' preserves
    the discourse connection in a concise, natural way.
- source_word: ὅτι
  chosen: that
  alternatives:
  - because
  lexicon: BDAG
  rationale: Introduces the content of what he knew. 'That' is the most straightforward
    complementizer here.
- source_word: διὰ φθόνον
  chosen: because of envy
  alternatives:
  - out of envy
  - because of jealousy
  lexicon: BDAG
  rationale: διά with the accusative indicates reason or cause. φθόνος denotes envy/jealousy;
    'envy' is the more standard rendering here and fits the motive attributed to the
    chief priests.
- source_word: παραδεδώκεισαν
  chosen: had handed ... over
  alternatives:
  - had delivered ... over
  - had betrayed
  lexicon: BDAG
  rationale: Pluperfect of παραδίδωμι indicates action completed prior to Pilate's
    knowing. 'Had handed over' preserves both the temporal force and the judicial
    context. 'Betrayed' would over-specify the nuance here, since the subject is the
    chief priests in a legal handover context.
- source_word: αὐτὸν
  chosen: him
  lexicon: BDAG
  rationale: Direct object pronoun referring to Jesus; 'him' is the natural English
    equivalent.
- source_word: οἱ ἀρχιερεῖς
  chosen: the chief priests
  alternatives:
  - the high priests
  - the ruling priests
  lexicon: BDAG
  rationale: Standard rendering for ἀρχιερεῖς in the plural in Gospel passion contexts,
    referring to the leading priestly authorities rather than a single high priest.
