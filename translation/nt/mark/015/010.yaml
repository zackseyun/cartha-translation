theological_decisions:
- issue: Motive attributed to the chief priests
  chosen_reading: The verse states that their motive in handing Jesus over was envy.
  alternative_readings:
  - jealousy
  rationale: The text presents Pilate's assessment of the chief priests' motive without
    further theological elaboration. The translation preserves that claim plainly
    and does not intensify it beyond the lexical sense of φθόνος.
  doctrine_reference: Preserve theological tension rather than resolve it.
