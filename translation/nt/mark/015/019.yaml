id: MRK.15.19
reference: Mark 15:19
source:
  edition: SBLGNT
  text: καὶ ἔτυπτον αὐτοῦ τὴν κεφαλὴν καλάμῳ καὶ ἐνέπτυον αὐτῷ, καὶ τιθέντες τὰ γόνατα
    προσεκύνουν αὐτῷ.
translation:
  text: And they were striking his head with a reed and spitting on him, and kneeling
    down they were paying homage to him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'were worshiping him.' The Greek verb can mean 'bow down before,' 'pay
      homage to,' or 'worship,' but here it describes the soldiers' mocking imitation
      of royal honor.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔτυπτον
  chosen: were striking
  alternatives:
  - kept striking
  - beat
  lexicon: BDAG
  rationale: Imperfect tense indicates repeated or ongoing action in narrative. 'Were
    striking' preserves the durative force without overinterpreting intensity. 'Beat'
    is possible but less directly tied to the simple verb and can sound more interpretive.
- source_word: αὐτοῦ τὴν κεφαλήν
  chosen: his head
  alternatives:
  - the head of him
  lexicon: BDAG
  rationale: The genitive pronoun with the accusative noun is idiomatic for possession.
    Natural English requires 'his head'.
- source_word: καλάμῳ
  chosen: with a reed
  alternatives:
  - with a staff
  - with a cane
  lexicon: BDAG
  rationale: κάλαμος commonly denotes a reed or reed-like staff. In this passion context
    it refers to the mock scepter already placed in Jesus' hand, so 'reed' preserves
    the narrative linkage and the likely physical object.
- source_word: ἐνέπτυον αὐτῷ
  chosen: spitting on him
  alternatives:
  - were spitting on him
  - spat on him
  lexicon: BDAG
  rationale: The imperfect again suggests repeated action. To avoid cumbersome repetition
    of 'were' in every clause, the participial-style English 'spitting on him' conveys
    the ongoing abuse while fitting the sentence flow.
- source_word: τιθέντες τὰ γόνατα
  chosen: kneeling down
  alternatives:
  - bending the knees
  - placing their knees
  lexicon: BDAG
  rationale: Literally 'placing the knees,' an idiom for kneeling. 'Kneeling down'
    gives the plain sense in natural English.
- source_word: προσεκύνουν
  chosen: were paying homage
  alternatives:
  - were bowing down before
  - were worshiping
  lexicon: BDAG
  rationale: προσκυνέω can mean prostrate oneself, pay homage, or worship depending
    on context. Here the soldiers are mockingly imitating royal reverence, not offering
    sincere worship. 'Paying homage' preserves the gesture of obeisance without implying
    genuine devotion.
- source_word: αὐτῷ
  chosen: to him
  alternatives:
  - before him
  lexicon: BDAG
  rationale: The dative after προσκυνέω is naturally rendered 'to him' in English,
    though the action implies bowing before him.
