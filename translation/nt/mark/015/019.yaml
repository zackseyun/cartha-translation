theological_decisions:
- issue: Rendering προσκυνέω in a mockery context
  chosen_reading: paying homage
  alternative_readings:
  - worshiping
  - bowing down before him
  rationale: Given the soldiers' derision in the immediate context, the verb denotes
    mock obeisance rather than sincere worship. This preserves the narrative irony
    without importing a theological claim that the soldiers were consciously worshiping
    Jesus. The alternative 'worshiping' is lexically possible in other contexts and
    is preserved in a footnote.
  doctrine_reference: Preserve theological tension rather than resolve it; consistency
    of key terms, or documented exception.
