theological_decisions:
- issue: Nature of the women's service expressed by διηκόνουν
  chosen_reading: minister to him
  alternative_readings:
  - served him
  rationale: The verse describes the women as active supporters of Jesus during his
    Galilean ministry. 'Minister to him' preserves the dignity and breadth of διακονέω
    without importing later ecclesial office language or narrowing the action to menial
    service alone.
  doctrine_reference: Translation philosophy §§1, 6
