id: MRK.15.41
reference: Mark 15:41
source:
  edition: SBLGNT
  text: ⸀αἳ ὅτε ἦν ἐν τῇ Γαλιλαίᾳ ἠκολούθουν αὐτῷ καὶ διηκόνουν αὐτῷ, καὶ ἄλλαι πολλαὶ
    αἱ συναναβᾶσαι αὐτῷ εἰς Ἱεροσόλυμα.
translation:
  text: These women, when he was in Galilee, used to follow him and minister to him;
    and there were many other women who had gone up with him to Jerusalem.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'served him.' The Greek verb can denote practical service or support.
    reason: lexical_alternative
  - marker: b
    text: Literally 'gone up with him to Jerusalem,' reflecting the customary biblical
      idiom of going up to Jerusalem.
    reason: cultural_note
lexical_decisions:
- source_word: αἳ
  chosen: These women
  alternatives:
  - who
  - the women who
  lexicon: BDAG
  rationale: The relative pronoun refers back to the women named in the previous verse.
    Rendering it as 'These women' makes the English sentence stand naturally while
    preserving the anaphoric reference.
- source_word: ὅτε ἦν ἐν τῇ Γαλιλαίᾳ
  chosen: when he was in Galilee
  alternatives:
  - while he was in Galilee
  lexicon: BDAG
  rationale: A straightforward temporal clause. 'In Galilee' preserves the prepositional
    phrase without unnecessary expansion.
- source_word: ἠκολούθουν
  chosen: used to follow
  alternatives:
  - were following
  - followed
  lexicon: BDAG
  rationale: The imperfect indicates customary past action rather than a single event.
    'Used to follow' communicates habitual discipleship more clearly than a simple
    past.
- source_word: διηκόνουν
  chosen: minister to
  alternatives:
  - serve
  - care for
  lexicon: BDAG
  rationale: διακονέω can mean serve in practical support. 'Minister to' preserves
    the sense of personal attendance/support without reducing it merely to domestic
    service; 'serve' remains a viable alternative.
- source_word: ἄλλαι πολλαὶ
  chosen: many other women
  alternatives:
  - many others
  - many other ones
  lexicon: BDAG
  rationale: The feminine plural context is explicit from the preceding referent,
    so 'women' is supplied in English for clarity.
- source_word: αἱ συναναβᾶσαι αὐτῷ
  chosen: who had gone up with him
  alternatives:
  - who had come up with him
  - who went up with him
  lexicon: BDAG
  rationale: The aorist participle is best rendered as prior action relative to the
    main clause. 'Gone up' preserves the conventional biblical idiom of ascent to
    Jerusalem while remaining natural English.
- source_word: εἰς Ἱεροσόλυμα
  chosen: to Jerusalem
  alternatives:
  - into Jerusalem
  lexicon: BDAG
  rationale: Standard destination sense of εἰς with a city name. 'To Jerusalem' is
    idiomatic English.
