id: MRK.15.20
reference: Mark 15:20
source:
  edition: SBLGNT
  text: καὶ ὅτε ἐνέπαιξαν αὐτῷ, ἐξέδυσαν αὐτὸν τὴν πορφύραν καὶ ἐνέδυσαν αὐτὸν τὰ
    ἱμάτια ⸂τὰ ἴδια⸃. καὶ ἐξάγουσιν αὐτὸν ἵνα ⸀σταυρώσωσιν αὐτόν.
translation:
  text: And when they had mocked him, they stripped the purple robe off him and put
    his own clothes on him. And they lead him out to crucify him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the purple garment' or 'the purple cloak.' The Greek says simply 'the
      purple,' with the clothing item understood from the context.
    reason: lexical_alternative
  - marker: b
    text: Or 'so that they might crucify him.' The Greek uses a purpose clause.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐνέπαιξαν
  chosen: had mocked
  alternatives:
  - made fun of
  - ridiculed
  lexicon: BDAG
  rationale: The verb denotes derisive treatment or mockery. 'Mocked' is the standard
    concise rendering and fits the solemn narrative tone better than the more colloquial
    'made fun of.' The pluperfect-like English 'had mocked' reflects the aorist within
    the temporal clause introduced by ὅτε in natural English sequence.
- source_word: ἐξέδυσαν
  chosen: stripped ... off
  alternatives:
  - took off
  - undressed
  lexicon: BDAG
  rationale: The verb means to strip or remove clothing from someone. 'Stripped ...
    off' preserves the force of the action more clearly than the milder 'took off,'
    while remaining idiomatic in English.
- source_word: πορφύραν
  chosen: the purple robe
  alternatives:
  - the purple garment
  - the purple cloak
  lexicon: BDAG
  rationale: Although the noun literally refers to 'purple' and can imply purple clothing,
    in this context it denotes the mock royal garment placed on Jesus earlier in the
    scene. 'Purple robe' makes the implied garment explicit for English readers and
    matches the narrative context.
- source_word: ἐνέδυσαν
  chosen: put ... on
  alternatives:
  - clothed
  lexicon: BDAG
  rationale: The verb means to dress or clothe someone. 'Put ... on' is natural modern
    English and clearly pairs with the previous stripping action.
- source_word: τὰ ἱμάτια τὰ ἴδια
  chosen: his own clothes
  alternatives:
  - his garments
  - his own garments
  lexicon: BDAG
  rationale: ἱμάτια refers broadly to garments/clothes. 'His own clothes' is more
    readable modern English than 'garments,' and τὰ ἴδια is preserved by 'own,' emphasizing
    that they restored his personal clothing after the mock regalia was removed.
- source_word: ἐξάγουσιν
  chosen: they lead him out
  alternatives:
  - they bring him out
  - they take him out
  lexicon: BDAG
  rationale: The present tense is a historical present in narrative. Rendering it
    as 'they lead him out' preserves some of the vividness without sounding unnatural.
    'Lead' also suits the custodial force of the action.
- source_word: ἵνα σταυρώσωσιν αὐτόν
  chosen: to crucify him
  alternatives:
  - so that they might crucify him
  lexicon: BDAG
  rationale: ἵνα with the subjunctive expresses purpose here. English idiom favors
    the infinitive construction 'to crucify him' over the more wooden 'so that they
    might crucify him.'
- source_word: σταυρώσωσιν
  chosen: crucify
  alternatives:
  - execute by crucifixion
  lexicon: BDAG
  rationale: The verb specifically denotes crucifixion. The direct rendering 'crucify'
    is both precise and familiar, avoiding unnecessary expansion.
