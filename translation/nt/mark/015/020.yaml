theological_decisions:
- issue: Narrative description of Jesus' humiliation before crucifixion
  chosen_reading: Render the actions straightforwardly as historical mockery, removal
    of the mock royal garment, restoration of his own clothes, and leading him out
    for crucifixion.
  rationale: The verse is narratively direct and does not present a doctrinally contested
    term from the provided table. The translation avoids importing interpretive embellishment
    while preserving the humiliation implicit in the actions.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §§1, 3, 6'
