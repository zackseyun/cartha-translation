id: MRK.15.5
reference: Mark 15:5
source:
  edition: SBLGNT
  text: ὁ δὲ Ἰησοῦς οὐκέτι οὐδὲν ἀπεκρίθη, ὥστε θαυμάζειν τὸν Πιλᾶτον.
translation:
  text: But Jesus no longer answered anything, so that Pilate was amazed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'But Jesus no longer made any reply, with the result that Pilate marveled.'
    reason: lexical_alternative
lexical_decisions:
- source_word: δὲ
  chosen: But
  alternatives:
  - And
  - Now
  lexicon: BDAG
  rationale: Marks a mild contrast or narrative development from the previous accusations
    and responses. 'But' best captures the adversative nuance in context.
- source_word: οὐκέτι
  chosen: no longer
  alternatives:
  - not anymore
  - no more
  lexicon: BDAG
  rationale: Conveys cessation from a prior pattern of answering. 'No longer' is idiomatic
    and preserves the temporal force.
- source_word: οὐδὲν
  chosen: anything
  alternatives:
  - nothing
  lexicon: BDAG
  rationale: With the negated verb, English idiom prefers 'did not answer anything'
    rather than the double-negative-sounding 'answered nothing,' while preserving
    the totality of Jesus' silence.
- source_word: ἀπεκρίθη
  chosen: answered
  alternatives:
  - replied
  - responded
  lexicon: BDAG
  rationale: Standard rendering of ἀποκρίνομαι in dialogue/legal-examination contexts.
    'Answered' fits the judicial setting and keeps the wording straightforward.
- source_word: ὥστε
  chosen: so that
  alternatives:
  - with the result that
  - therefore
  lexicon: BDAG
  rationale: Introduces the result of Jesus' silence. 'So that' is concise and natural
    while preserving the resultative sense.
- source_word: θαυμάζειν
  chosen: was amazed
  alternatives:
  - marveled
  - was marveling
  lexicon: BDAG
  rationale: The present infinitive after ὥστε expresses resulting amazement. 'Was
    amazed' gives natural English for Pilate's reaction without overstating duration;
    'marveled' is possible but slightly more traditional in tone.
- source_word: Πιλᾶτον
  chosen: Pilate
  rationale: Personal name is transliterated according to the project's policy to
    transliterate names rather than translate them.
