id: MRK.15.29
reference: Mark 15:29
source:
  edition: SBLGNT
  text: Καὶ οἱ παραπορευόμενοι ἐβλασφήμουν αὐτὸν κινοῦντες τὰς κεφαλὰς αὐτῶν καὶ λέγοντες·
    Οὐὰ ὁ καταλύων τὸν ναὸν καὶ ⸂οἰκοδομῶν ἐν τρισὶν ἡμέραις⸃,
translation:
  text: And those passing by were reviling him, shaking their heads and saying, “Aha!
    You who would tear down the temple and build it in three days,”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more specifically, “the sanctuary.”
    reason: lexical_alternative
  - marker: b
    text: Or “rebuild it in three days.” The Greek verb is simply “build,” though
      the context may imply rebuilding.
    reason: lexical_alternative
lexical_decisions:
- source_word: παραπορευόμενοι
  chosen: those passing by
  alternatives:
  - passersby
  - those who were going past
  lexicon: BDAG
  rationale: The participle denotes people going past the scene. 'Those passing by'
    is natural modern English and preserves the ongoing action better than the more
    nominal 'passersby.'
- source_word: ἐβλασφήμουν
  chosen: were reviling
  alternatives:
  - were blaspheming
  - were mocking
  - were insulting
  lexicon: BDAG
  rationale: Although βλασφημέω can mean 'blaspheme,' here the object is Jesus in
    the mouths of hostile bystanders, so 'reviling' best captures abusive speech without
    implying a narrower technical sense in English. The imperfect is reflected with
    'were reviling.'
- source_word: κινοῦντες τὰς κεφαλὰς αὐτῶν
  chosen: shaking their heads
  alternatives:
  - wagging their heads
  - moving their heads
  lexicon: BDAG
  rationale: This idiom expresses derision. 'Shaking their heads' is clear contemporary
    English; 'wagging' is traditional but less natural today.
- source_word: Οὐὰ
  chosen: Aha!
  alternatives:
  - Ha!
  - Woe!
  lexicon: BDAG
  rationale: As an exclamation of taunt or derision in this context, 'Aha!' best conveys
    the mocking force. 'Woe!' would sound like lament or denunciation in English and
    is less fitting here.
- source_word: ὁ καταλύων
  chosen: You who would tear down
  alternatives:
  - you who destroy
  - you who would demolish
  lexicon: BDAG
  rationale: The article with participle is vocative-like in direct address. 'You
    who would tear down' captures the reported accusation/allusion and sounds idiomatic
    in English. 'Tear down' fits the temple context well.
- source_word: ναὸν
  chosen: the temple
  alternatives:
  - the sanctuary
  lexicon: BDAG
  rationale: ναός can denote the sanctuary proper, but in this accusation the standard
    and intelligible rendering is 'the temple.' A footnote preserves the more specific
    nuance.
- source_word: οἰκοδομῶν ἐν τρισὶν ἡμέραις
  chosen: build it in three days
  alternatives:
  - rebuild it in three days
  - build it within three days
  lexicon: BDAG
  rationale: The participle continues the taunt. 'Build it in three days' is a direct
    rendering of the Greek. 'Rebuild' is interpretive, since the verb itself is simply
    'build,' though the context of tearing down may imply rebuilding.
