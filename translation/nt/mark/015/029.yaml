theological_decisions:
- issue: Reference of the temple saying
  chosen_reading: Translate the mockers' words straightforwardly as an accusation/allusion
    without importing John's interpretive identification of the temple with Jesus'
    body into the main text.
  alternative_readings:
  - Render more interpretively to signal that Jesus spoke metaphorically about his
    body
  rationale: Mark presents the bystanders' taunt at the crucifixion. The translation
    should preserve the narrative perspective and not resolve the intertextual/theological
    meaning in the main text beyond what this verse states.
  doctrine_reference: Preserve theological tension rather than resolve it.
