theological_decisions:
- issue: Relation of the participle καταβάς to the imperative σῶσον
  chosen_reading: 'Render the participle adverbially as means/attendant action: ''Save
    yourself by coming down from the cross!'''
  alternative_readings:
  - Save yourself; come down from the cross!
  - Save yourself, after coming down from the cross!
  rationale: The Greek uses an aorist imperative followed by an aorist participle,
    a compressed taunt that in English can be represented either with coordinate commands
    or with an adverbial participial sense. 'By coming down' best captures the mockers'
    challenge that descent from the cross would demonstrate self-saving power, while
    remaining faithful to the syntax and natural in modern English.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve theological
    tension rather than resolve it'
