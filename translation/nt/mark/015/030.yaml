id: MRK.15.30
reference: Mark 15:30
source:
  edition: SBLGNT
  text: σῶσον σεαυτὸν ⸀καταβὰς ἀπὸ τοῦ σταυροῦ.
translation:
  text: Save yourself by coming down from the cross!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or, more formally: ''Save yourself, having come down from the cross,''
      or ''Save yourself; come down from the cross!'''
    reason: lexical_alternative
lexical_decisions:
- source_word: σῶσον
  chosen: Save
  alternatives:
  - Rescue
  - Deliver
  lexicon: BDAG
  rationale: Aorist imperative, second person singular, functioning as a taunt/command.
    'Save' is the most direct and idiomatic rendering in this mockery context and
    preserves the verbal link with salvation language without overinterpreting it
    as merely physical rescue.
- source_word: σεαυτόν
  chosen: yourself
  lexicon: BDAG
  rationale: Reflexive pronoun in the accusative, the direct object of σῶσον. 'Yourself'
    is the straightforward English equivalent and preserves the mocking self-directed
    force.
- source_word: καταβάς
  chosen: by coming down
  alternatives:
  - come down
  - after coming down
  - having come down
  lexicon: BDAG
  rationale: 'Aorist active participle of καταβαίνω. In this imperative-taunt construction,
    English is most natural if the participle is rendered adverbially: ''by coming
    down'' expresses the means or attendant action tied to the command. A more formally
    literal ''having come down'' is less natural in contemporary English.'
- source_word: ἀπὸ τοῦ σταυροῦ
  chosen: from the cross
  lexicon: BDAG
  rationale: Standard prepositional phrase indicating movement away from the cross.
    'Cross' is the normal rendering of σταυρός in this passion context.
