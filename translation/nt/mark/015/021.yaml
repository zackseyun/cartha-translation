theological_decisions:
- issue: Nature of the coercion placed on Simon
  chosen_reading: Simon was compelled by the soldiers/authorities to carry Jesus'
    cross.
  alternative_readings:
  - Simon was merely asked or enlisted without coercion.
  rationale: The verb ἀγγαρεύω carries the sense of forced service or impressment.
    The translation should preserve that historical and narrative force rather than
    soften it.
  doctrine_reference: Translation philosophy §1, §5
- issue: Specificity of what Simon carried
  chosen_reading: Render σταυρός as 'cross' without specifying 'crossbeam' in the
    main text.
  alternative_readings:
  - crossbeam
  rationale: While historical reconstructions sometimes specify a crossbeam, the Greek
    text says σταυρός. Optimal equivalence favors the standard rendering 'cross' and
    avoids importing a narrower historical claim than the text itself states.
  doctrine_reference: Translation philosophy §1, §5
