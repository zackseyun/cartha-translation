id: MRK.15.21
reference: Mark 15:21
source:
  edition: SBLGNT
  text: Καὶ ἀγγαρεύουσιν παράγοντά τινα Σίμωνα Κυρηναῖον ἐρχόμενον ἀπ’ ἀγροῦ, τὸν
    πατέρα Ἀλεξάνδρου καὶ Ῥούφου, ἵνα ἄρῃ τὸν σταυρὸν αὐτοῦ.
translation:
  text: And they compelled a certain passerby, Simon of Cyrene, who was coming from
    the country, the father of Alexander and Rufus, to carry his cross.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'coming in from the countryside'; literally 'coming from the field/country.'
    reason: lexical_alternative
  - marker: b
    text: The verb rendered 'compelled' refers to forced service or impressment.
    reason: cultural_note
  - marker: c
    text: Some understand 'cross' more specifically as 'crossbeam,' but the Greek
      text says simply 'cross.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀγγαρεύουσιν
  chosen: compelled
  alternatives:
  - forced
  - pressed into service
  lexicon: BDAG
  rationale: The verb denotes compulsory service or impressment, not a mere request.
    'Compelled' is natural English and preserves the coercive sense better than a
    softer rendering.
- source_word: παράγοντά τινα
  chosen: a certain passerby
  alternatives:
  - someone passing by
  - a certain man passing by
  lexicon: BDAG
  rationale: The participle παράγοντα indicates someone passing along/by. τινα adds
    indefiniteness, here reflected by 'a certain.' 'Passerby' gives concise, idiomatic
    English while preserving the incidental nature of Simon's presence.
- source_word: Σίμωνα Κυρηναῖον
  chosen: Simon of Cyrene
  alternatives:
  - Simon the Cyrenian
  lexicon: BDAG
  rationale: Personal name is transliterated; the ethnic/geographic identifier Κυρηναῖον
    is rendered by the standard English expression 'of Cyrene,' which is more natural
    than 'Cyrenian' for modern readers.
- source_word: ἐρχόμενον ἀπ’ ἀγροῦ
  chosen: who was coming from the country
  alternatives:
  - coming from the field
  - coming in from the countryside
  lexicon: BDAG
  rationale: ἀγρός can mean field, farm, or country/countryside. In this narrative
    setting, 'from the country' communicates that Simon was arriving from outside
    the city area. 'Field' is possible but sounds overly specific in English.
- source_word: τὸν πατέρα Ἀλεξάνδρου καὶ Ῥούφου
  chosen: the father of Alexander and Rufus
  lexicon: BDAG
  rationale: This appositional identification is retained straightforwardly. It likely
    serves to identify Simon for readers familiar with Alexander and Rufus, but the
    translation should not overinterpret that function in the main text.
- source_word: ἵνα ἄρῃ
  chosen: to carry
  alternatives:
  - so that he might carry
  - to take up
  lexicon: BDAG
  rationale: ἵνα with the aorist subjunctive expresses purpose. In idiomatic English
    after a verb of compulsion, an infinitive ('to carry') best conveys the sense
    without awkwardness. 'Carry' fits the context of bearing the cross.
- source_word: σταυρὸν
  chosen: cross
  alternatives:
  - crossbeam
  lexicon: BDAG
  rationale: σταυρός is conventionally and accurately rendered 'cross' in the passion
    narratives. Although some argue for the specific object carried being the crossbeam,
    the Greek term here is σταυρός, and the translation should not narrow the reference
    beyond the text.
- source_word: αὐτοῦ
  chosen: his
  alternatives:
  - Jesus'
  lexicon: BDAG
  rationale: The pronoun most naturally refers to Jesus in context. Rendering it as
    'his' preserves the Greek form and avoids replacing the pronoun with an explicit
    noun not present in the text.
