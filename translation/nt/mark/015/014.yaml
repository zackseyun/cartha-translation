id: MRK.15.14
reference: Mark 15:14
source:
  edition: SBLGNT
  text: ὁ δὲ Πιλᾶτος ἔλεγεν αὐτοῖς· Τί γὰρ ⸂ἐποίησεν κακόν⸃; οἱ δὲ ⸀περισσῶς ἔκραξαν·
    Σταύρωσον αὐτόν.
translation:
  text: But Pilate was saying to them, “For what evil has he done?” But they cried
    out all the more, “Crucify him!”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “Why, what wrong has he done?”
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔλεγεν
  chosen: was saying
  alternatives:
  - said
  - kept saying
  lexicon: BDAG
  rationale: Imperfect tense suggests repeated or ongoing speech; 'was saying' preserves
    that aspect without overinterpreting frequency.
- source_word: Τί γὰρ ἐποίησεν κακόν
  chosen: For what evil has he done?
  alternatives:
  - Why, what evil has he done?
  - What wrong has he done?
  lexicon: BDAG
  rationale: This idiom asks for the basis of accusation. 'For what evil has he done?'
    keeps γάρ explicit and preserves κακόν as 'evil' rather than softening to 'wrong,'
    while remaining natural English.
- source_word: κακόν
  chosen: evil
  alternatives:
  - wrong
  lexicon: BDAG
  rationale: κακόν denotes something bad/evil. 'Evil' preserves the moral force of
    the accusation more directly than the milder 'wrong.'
- source_word: περισσῶς
  chosen: all the more
  alternatives:
  - even more
  - exceedingly
  lexicon: BDAG
  rationale: The adverb intensifies the crowd's response. 'All the more' is idiomatic
    modern English and captures the comparative escalation.
- source_word: ἔκραξαν
  chosen: cried out
  alternatives:
  - shouted
  - cried
  lexicon: BDAG
  rationale: κράζω conveys loud public outcry. 'Cried out' preserves the force without
    becoming too colloquial.
- source_word: Σταύρωσον αὐτόν
  chosen: Crucify him!
  alternatives:
  - Have him crucified!
  lexicon: BDAG
  rationale: Aorist imperative directly addresses Pilate with a demand. 'Crucify him!'
    is the most direct and established rendering of the command.
- source_word: δὲ
  chosen: But
  alternatives:
  - And
  - Now
  lexicon: BDAG
  rationale: δέ marks contrast at both clause transitions. 'But' fits the adversative
    movement between Pilate's question and the crowd's intensified response.
- source_word: Πιλᾶτος
  chosen: Pilate
  rationale: Personal name is transliterated by standard English convention, following
    the project's policy to transliterate names.
