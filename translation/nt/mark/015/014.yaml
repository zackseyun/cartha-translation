theological_decisions:
- issue: Degree of moral force in κακόν within Pilate's question
  chosen_reading: Rendered as 'evil' rather than 'wrong'
  alternative_readings:
  - wrong
  rationale: The verse concerns legal and moral accusation, and κακόν naturally carries
    moral weight. Using 'evil' avoids minimizing Pilate's challenge to the crowd's
    demand while not importing additional doctrinal claims.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; readable modern English'
