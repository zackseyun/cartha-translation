id: MRK.15.16
reference: Mark 15:16
source:
  edition: SBLGNT
  text: Οἱ δὲ στρατιῶται ἀπήγαγον αὐτὸν ἔσω τῆς αὐλῆς, ὅ ἐστιν πραιτώριον, καὶ συγκαλοῦσιν
    ὅλην τὴν σπεῖραν.
translation:
  text: Then the soldiers led him inside the courtyard, which is the praetorium, and
    they call together the whole cohort.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'which is the governor’s headquarters.'
    reason: lexical_alternative
  - marker: b
    text: A 'cohort' was a Roman military unit; here it refers to the soldiers assembled
      under Roman authority.
    reason: cultural_note
lexical_decisions:
- source_word: Οἱ δὲ
  chosen: Then
  alternatives:
  - Now
  - And
  lexicon: BDAG
  rationale: δέ here marks narrative progression/transition rather than strong contrast;
    'Then' gives natural English flow in context.
- source_word: στρατιῶται
  chosen: soldiers
  alternatives:
  - troops
  lexicon: BDAG
  rationale: The standard sense is individual soldiers; 'soldiers' is the most direct
    and natural rendering.
- source_word: ἀπήγαγον
  chosen: led
  alternatives:
  - took away
  - brought
  lexicon: BDAG
  rationale: ἀπάγω commonly means to lead or take someone away. In this context, with
    ἔσω specifying destination, 'led' is idiomatic and sufficiently precise.
- source_word: ἔσω τῆς αὐλῆς
  chosen: inside the courtyard
  alternatives:
  - into the courtyard
  - inside the palace courtyard
  lexicon: BDAG
  rationale: ἔσω with the genitive means 'inside' or 'within.' αὐλή can denote a courtyard,
    often of a palace or official residence. 'Inside the courtyard' preserves the
    spatial sense without over-specifying beyond the text.
- source_word: ὅ ἐστιν πραιτώριον
  chosen: which is the praetorium
  alternatives:
  - that is, the governor's headquarters
  - which is the governor's residence
  lexicon: BDAG
  rationale: πραιτώριον is a Roman administrative term. Retaining 'praetorium' preserves
    the historical specificity; the explanatory clause in Greek already signals a
    gloss. A more interpretive equivalent is worth preserving in a footnote.
- source_word: συγκαλοῦσιν
  chosen: they call together
  alternatives:
  - they summon
  - they gather
  lexicon: BDAG
  rationale: The present tense is vivid in Mark's narrative style. 'Call together'
    reflects the compound sense of summoning people into an assembled group.
- source_word: ὅλην τὴν σπεῖραν
  chosen: the whole cohort
  alternatives:
  - the whole company
  - the whole battalion
  lexicon: BDAG
  rationale: σπεῖρα refers to a Roman cohort or military unit. 'Cohort' best preserves
    the technical military sense; 'battalion' is anachronistically imprecise, and
    'company' is less specific.
