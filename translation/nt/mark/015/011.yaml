id: MRK.15.11
reference: Mark 15:11
source:
  edition: SBLGNT
  text: οἱ δὲ ἀρχιερεῖς ἀνέσεισαν τὸν ὄχλον ἵνα μᾶλλον τὸν Βαραββᾶν ἀπολύσῃ αὐτοῖς.
translation:
  text: But the chief priests stirred up the crowd so that he would release Barabbas
    to them instead.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'incited the crowd.' The Greek verb can mean to arouse or stir up a group
      toward a desired action.
    reason: lexical_alternative
  - marker: b
    text: Or 'rather.' The sense is that Barabbas was to be released in preference
      to the alternative implied by the context.
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ δὲ
  chosen: But
  alternatives:
  - Now
  - And
  lexicon: BDAG
  rationale: δέ marks a mild contrast or narrative development. 'But' fits the adversative
    sense here, contrasting the chief priests' action with the prior expectation.
- source_word: ἀρχιερεῖς
  chosen: the chief priests
  alternatives:
  - the high priests
  - the leading priests
  lexicon: BDAG
  rationale: Standard rendering for the plural referring to the Jerusalem priestly
    leadership. 'Chief priests' is idiomatic and precise in Gospel narrative context.
- source_word: ἀνέσεισαν
  chosen: stirred up
  alternatives:
  - incited
  - agitated
  - roused
  lexicon: BDAG
  rationale: ἀνασείω here means to arouse or incite a group to action. 'Stirred up'
    is natural modern English and preserves the sense of provoking the crowd's response
    without overtranslating.
- source_word: τὸν ὄχλον
  chosen: the crowd
  alternatives:
  - the multitude
  lexicon: BDAG
  rationale: ὄχλος commonly denotes a crowd. 'Crowd' is clear, contemporary, and fits
    the narrative setting better than the more traditional but less natural 'multitude.'
- source_word: ἵνα
  chosen: so that
  alternatives:
  - in order that
  lexicon: BDAG
  rationale: Introduces purpose/result. 'So that' is idiomatic English and preserves
    the clause relationship.
- source_word: μᾶλλον
  chosen: instead
  alternatives:
  - rather
  - rather than Jesus
  lexicon: BDAG
  rationale: μᾶλλον marks preference for Barabbas over the implied alternative in
    context. 'Instead' communicates the comparative force naturally in English without
    adding an explicit object not present in the Greek of this verse.
- source_word: τὸν Βαραββᾶν
  chosen: Barabbas
  lexicon: BDAG
  rationale: Personal name is transliterated per translation philosophy.
- source_word: ἀπολύσῃ
  chosen: would release
  alternatives:
  - might release
  - should release
  - release
  lexicon: BDAG
  rationale: Aorist subjunctive after ἵνα expresses intended outcome. 'Would release'
    gives smooth English in indirect-purpose style and fits the narrative sequence
    involving Pilate as the implied subject.
- source_word: αὐτοῖς
  chosen: to them
  alternatives:
  - for them
  lexicon: BDAG
  rationale: Dative pronoun indicates the beneficiaries/recipients of the release.
    'To them' is the most direct rendering in English.
