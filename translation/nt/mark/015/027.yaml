theological_decisions:
- issue: Rendering λῃσταί in the crucifixion account
  chosen_reading: robbers
  alternative_readings:
  - bandits
  - rebels
  rationale: The term can denote violent robbers or brigands and in some contexts
    may overlap with insurrectionary activity. This verse alone does not require the
    more politically charged 'rebels,' so the main text keeps the broader 'robbers'
    while preserving alternatives in a footnote for auditability.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; preserve theological tension rather than resolve it.'
