id: MRK.15.27
reference: Mark 15:27
source:
  edition: SBLGNT
  text: καὶ σὺν αὐτῷ σταυροῦσιν δύο λῃστάς, ἕνα ἐκ δεξιῶν καὶ ἕνα ἐξ εὐωνύμων ⸀αὐτοῦ.
translation:
  text: And with him they crucify two robbers, one at his right and one at his left.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'bandits'; possibly 'rebels' if the term is understood with political
      overtones.
    reason: lexical_alternative
lexical_decisions:
- source_word: σὺν αὐτῷ
  chosen: with him
  alternatives:
  - along with him
  lexicon: BDAG
  rationale: σύν with the dative indicates accompaniment. 'With him' is the most natural
    and direct English rendering.
- source_word: σταυροῦσιν
  chosen: they crucify
  alternatives:
  - they are crucifying
  - they crucified
  lexicon: BDAG
  rationale: Present active indicative 3rd plural. Mark frequently uses the historical
    present for vivid narration; rendering it as English present preserves that effect
    better than shifting to past.
- source_word: δύο λῃστάς
  chosen: two robbers
  alternatives:
  - two bandits
  - two rebels
  lexicon: BDAG
  rationale: λῃστής commonly denotes a robber, brigand, or bandit. 'Robbers' is the
    standard, accessible rendering and fits the immediate narrative without importing
    a more specific political nuance that the verse itself does not make explicit.
- source_word: ἕνα ἐκ δεξιῶν
  chosen: one at his right
  alternatives:
  - one on his right
  - one from the right side
  lexicon: BDAG
  rationale: The idiom ἐκ δεξιῶν in this positional context indicates placement on
    the right side. 'At his right' is natural English and pairs well with the following
    phrase.
- source_word: ἕνα ἐξ εὐωνύμων αὐτοῦ
  chosen: one at his left
  alternatives:
  - one on his left
  - one from the left side
  lexicon: BDAG
  rationale: εὐώνυμος literally relates to the left side, often used euphemistically
    opposite 'right.' In this crucifixion scene it clearly marks spatial position.
    'At his left' gives the intended sense in idiomatic English. The pronoun αὐτοῦ
    is carried by 'his' and applies to both parallel phrases in translation.
