id: MRK.15.6
reference: Mark 15:6
source:
  edition: SBLGNT
  text: Κατὰ δὲ ἑορτὴν ἀπέλυεν αὐτοῖς ἕνα δέσμιον ⸂ὃν παρῃτοῦντο⸃.
translation:
  text: Now at the feast he would release for them one prisoner whom they requested.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "whom they asked for."
    reason: lexical_alternative
lexical_decisions:
- source_word: Κατὰ δὲ ἑορτὴν
  chosen: Now at the feast
  alternatives:
  - At the feast
  - During the feast
  - Now at the festival
  lexicon: BDAG
  rationale: 'κατά with the accusative here is temporal, indicating customary time:
    ''at/during the feast.'' δέ is lightly connective; ''Now'' brings the narrative
    forward in natural English without overstating contrast. ἑορτή can be ''feast''
    or ''festival''; ''feast'' fits the Passover setting and traditional Gospel idiom.'
- source_word: ἀπέλυεν
  chosen: he would release
  alternatives:
  - he released
  - he used to release
  lexicon: BDAG
  rationale: Imperfect active indicative signals customary past action rather than
    a single punctiliar event. 'Would release' communicates habitual practice in idiomatic
    English better than the simple past, while remaining concise.
- source_word: αὐτοῖς
  chosen: for them
  alternatives:
  - to them
  lexicon: BDAG
  rationale: The dative here marks the people for whose benefit the release was made.
    'For them' reads more naturally in English in this construction, though 'to them'
    is possible.
- source_word: ἕνα δέσμιον
  chosen: one prisoner
  alternatives:
  - a prisoner
  - one captive
  lexicon: BDAG
  rationale: ἕνα explicitly marks the number 'one,' so it is retained. δέσμιος means
    'prisoner' or 'captive'; 'prisoner' is the most natural and contextually precise
    rendering in this judicial setting.
- source_word: ὃν παρῃτοῦντο
  chosen: whom they requested
  alternatives:
  - whom they asked for
  - whom they were requesting
  lexicon: BDAG
  rationale: παραιτέομαι in this context means to ask for or request. The imperfect
    may suggest repeated/customary asking, but in English the broader customary force
    is already carried by ἀπέλυεν; 'whom they requested' is smooth and sufficiently
    reflects the sense. 'Asked for' is also viable and perhaps more colloquial.
