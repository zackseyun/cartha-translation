id: MRK.15.4
reference: Mark 15:4
source:
  edition: SBLGNT
  text: ὁ δὲ Πιλᾶτος πάλιν ⸀ἐπηρώτα αὐτὸν λέγων· Οὐκ ἀποκρίνῃ οὐδέν; ἴδε πόσα σου
    ⸀κατηγοροῦσιν.
translation:
  text: But Pilate again questioned him, saying, “Do you give no answer? Look how
    many charges they are bringing against you.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, “See how many things they are accusing you of.”
    reason: lexical_alternative
lexical_decisions:
- source_word: δὲ
  chosen: But
  alternatives:
  - And
  - Now
  lexicon: BDAG
  rationale: Marks narrative development with mild contrast; 'But' fits the scene
    transition naturally in English.
- source_word: πάλιν
  chosen: again
  alternatives:
  - once more
  lexicon: BDAG
  rationale: Straightforward adverb indicating repeated action; 'again' is the most
    natural modern rendering.
- source_word: ἐπηρώτα
  chosen: questioned
  alternatives:
  - asked
  - interrogated
  lexicon: BDAG
  rationale: The imperfect indicates repeated or continued asking. 'Questioned' captures
    more than a single simple request and fits Pilate's judicial setting without overstating
    it as 'interrogated.'
- source_word: λέγων
  chosen: saying
  alternatives:
  - and said
  lexicon: BDAG
  rationale: Standard participial speech introducer; 'saying' preserves the Greek
    structure smoothly.
- source_word: Οὐκ ἀποκρίνῃ οὐδέν;
  chosen: Do you give no answer?
  alternatives:
  - Do you answer nothing?
  - Have you no answer?
  lexicon: BDAG
  rationale: The construction expects a negative answer and presses Jesus' silence.
    'Do you give no answer?' is idiomatic modern English while preserving the force
    of οὐκ...οὐδέν.
- source_word: ἴδε
  chosen: Look
  alternatives:
  - See
  - Behold
  lexicon: BDAG
  rationale: Imperative drawing attention to the situation. 'Look' is readable modern
    English; 'behold' would sound archaic.
- source_word: πόσα
  chosen: how many charges
  alternatives:
  - how many things
  - how many accusations
  lexicon: BDAG
  rationale: Though πόσα literally means 'how many things,' the judicial context and
    following verb κατηγοροῦσιν make explicit that these are accusations/charges.
    Supplying 'charges' clarifies the implied object in natural English.
- source_word: σου
  chosen: against you
  alternatives:
  - of you
  lexicon: BDAG
  rationale: With κατηγορέω, the genitive marks the person accused; idiomatic English
    requires 'against you.'
- source_word: κατηγοροῦσιν
  chosen: they are bringing against you
  alternatives:
  - they accuse you of
  - they testify against you
  lexicon: BDAG
  rationale: In legal context κατηγορέω means to bring charges or accuse. The present
    tense is well represented by 'are bringing,' emphasizing the ongoing accusations.
