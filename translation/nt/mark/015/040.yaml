id: MRK.15.40
reference: Mark 15:40
source:
  edition: SBLGNT
  text: Ἦσαν δὲ καὶ γυναῖκες ἀπὸ μακρόθεν θεωροῦσαι, ἐν ⸀αἷς καὶ ⸀Μαρία ἡ Μαγδαληνὴ
    καὶ Μαρία ⸀ἡ Ἰακώβου τοῦ μικροῦ καὶ ⸀Ἰωσῆτος μήτηρ καὶ Σαλώμη,
translation:
  text: There were also women watching from a distance, among whom were Mary Magdalene,
    Mary the mother of James the younger and of Joses, and Salome,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from afar.'
    reason: lexical_alternative
  - marker: b
    text: Or 'Mary the mother of James the Less and Joses.'
    reason: lexical_alternative
  - marker: c
    text: The Greek name here is Joses, a form distinct from Joseph.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἦσαν δὲ καὶ
  chosen: There were also
  alternatives:
  - Now there were also
  - And there were also
  lexicon: BDAG
  rationale: Renders the imperfect of εἰμί with δέ and καί in natural English narrative
    style. 'There were also' preserves the additive force without overtranslating
    δέ.
- source_word: γυναῖκες
  chosen: women
  alternatives:
  - womenfolk
  lexicon: BDAG
  rationale: Standard rendering of γυνή in plural here, referring specifically to
    female followers present at the crucifixion scene.
- source_word: ἀπὸ μακρόθεν
  chosen: from a distance
  alternatives:
  - from afar
  - at a distance
  lexicon: BDAG
  rationale: Idiomatic English equivalent preserving the spatial sense of observing
    from far away. 'From afar' is possible but slightly more literary.
- source_word: θεωροῦσαι
  chosen: watching
  alternatives:
  - looking on
  - observing
  lexicon: BDAG
  rationale: Present participle indicating sustained visual attention. 'Watching'
    is clear modern English and fits the crucifixion context.
- source_word: ἐν αἷς
  chosen: among whom were
  alternatives:
  - among them were
  - including
  lexicon: BDAG
  rationale: The construction identifies certain women within the larger group. 'Among
    whom were' is slightly more formal but accurately reflects the relative phrase.
- source_word: Μαρία ἡ Μαγδαληνή
  chosen: Mary Magdalene
  alternatives:
  - Mariam Magdalene
  lexicon: BDAG
  rationale: Standard English transliteration and established identification of the
    person. The article with the epithet is naturally rendered as the familiar name
    form.
- source_word: Μαρία ἡ Ἰακώβου τοῦ μικροῦ καὶ Ἰωσῆτος μήτηρ
  chosen: Mary the mother of James the younger and of Joses
  alternatives:
  - Mary the mother of James the Less and Joses
  - Mary, mother of James the younger and Joses
  lexicon: BDAG
  rationale: μήτηρ governs both genitives, so 'mother of James ... and of Joses' makes
    the relationship explicit in English. τοῦ μικροῦ is best rendered 'the younger'
    rather than the traditional 'the Less,' which is less transparent in modern English.
- source_word: Ἰακώβου
  chosen: James
  alternatives:
  - Jacob
  lexicon: BDAG
  rationale: Standard NT English form for the personal name Ἰάκωβος/Ἰακώβου in this
    context.
- source_word: τοῦ μικροῦ
  chosen: the younger
  alternatives:
  - the little
  - the less
  lexicon: BDAG
  rationale: μικρός can denote smallness or lesser status/age. In personal designation
    here, 'the younger' is the clearest natural English identifier without importing
    more than the text states.
- source_word: Ἰωσῆτος
  chosen: Joses
  alternatives:
  - Joses
  - Joseph
  lexicon: BDAG
  rationale: Retains the distinct Greek name form Ἰωσῆτος rather than harmonizing
    to 'Joseph.' This follows the principle of transliterating names and preserving
    source-text distinctions.
- source_word: Σαλώμη
  chosen: Salome
  lexicon: BDAG
  rationale: Standard English transliteration of the personal name.
