theological_decisions:
- issue: Identification and descriptor of James in 'Mary the mother of James the younger
    and of Joses'
  chosen_reading: Render τοῦ μικροῦ as 'the younger' and leave the exact nuance unspecified
    beyond the descriptor.
  alternative_readings:
  - '''the Less'' as a traditional rendering'
  - '''the little'' if emphasizing stature'
  rationale: The phrase functions as a distinguishing label, not a doctrinally weighty
    title. 'The younger' is clearer for modern readers and avoids preserving a traditional
    but opaque English expression. The text itself does not explain whether the distinction
    is age, stature, or prominence, so the translation should not overdefine it.
  doctrine_reference: 'Translation philosophy: readable modern English, not archaic
    or academic; original-language primacy over translation tradition.'
