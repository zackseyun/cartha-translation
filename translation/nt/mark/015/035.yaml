id: MRK.15.35
reference: Mark 15:35
source:
  edition: SBLGNT
  text: καί τινες τῶν παρεστηκότων ἀκούσαντες ἔλεγον· ⸀Ἴδε Ἠλίαν φωνεῖ.
translation:
  text: And some of those standing there, when they heard it, were saying, “Look,
    he is calling Elijah.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “Look, he is calling for Elijah.”
    reason: lexical_alternative
lexical_decisions:
- source_word: καί
  chosen: And
  alternatives:
  - Now
  - Then
  lexicon: BDAG
  rationale: Standard connective linking this reaction to Jesus' preceding cry; 'And'
    preserves the narrative flow without adding temporal nuance.
- source_word: τινες
  chosen: some
  alternatives:
  - certain ones
  - some people
  lexicon: BDAG
  rationale: Indefinite plural referring to an unspecified subset of bystanders. 'Some'
    is natural modern English and sufficiently precise.
- source_word: τῶν παρεστηκότων
  chosen: of those standing there
  alternatives:
  - of the bystanders
  - of those who were standing by
  lexicon: BDAG
  rationale: The perfect participle of παρίστημι functions substantivally for people
    present at the scene. 'Those standing there' preserves the concrete spatial sense
    better than the more interpretive 'bystanders,' while remaining idiomatic.
- source_word: ἀκούσαντες
  chosen: when they heard it
  alternatives:
  - having heard
  - on hearing
  lexicon: BDAG
  rationale: Aorist participle indicating antecedent action relative to 'were saying.'
    'When they heard it' expresses the temporal relationship naturally in English.
    'It' is supplied for English clarity from context, referring to Jesus' cry.
- source_word: ἔλεγον
  chosen: were saying
  alternatives:
  - said
  - kept saying
  lexicon: BDAG
  rationale: Imperfect tense suggests ongoing or repeated speech. 'Were saying' preserves
    the imperfective aspect without overinterpreting repetition.
- source_word: Ἴδε
  chosen: Look
  alternatives:
  - See
  - Behold
  lexicon: BDAG
  rationale: An attention-getting imperative. 'Look' is clear modern English; 'Behold'
    is archaic, and 'See' is less natural in direct speech here.
- source_word: Ἠλίαν
  chosen: Elijah
  alternatives:
  - Elias
  lexicon: BDAG
  rationale: Standard English transliteration of the prophet's name, consistent with
    the translation philosophy to transliterate personal names by standard conventions.
- source_word: φωνεῖ
  chosen: he is calling
  alternatives:
  - he calls
  - he is crying out for
  lexicon: BDAG
  rationale: Present tense in reported speech is best rendered progressively in English
    here. 'Calling' fits the direct object 'Elijah' and the misunderstanding of Jesus'
    cry. 'Crying out for' is interpretive and stronger than the Greek requires.
