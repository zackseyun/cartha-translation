theological_decisions:
- issue: Whether to make explicit that the bystanders misunderstood Jesus' cry as
    an appeal to Elijah
  chosen_reading: Retain the surface-level statement 'he is calling Elijah' without
    explanatory expansion in the main text
  alternative_readings:
  - he is calling for Elijah
  - they thought he was calling Elijah
  rationale: The Greek reports what the bystanders said, not an explicit narrator
    explanation. The misunderstanding is evident from context and should not be overexplained
    in the main text. A lexical alternative can be preserved in a footnote.
  doctrine_reference: 'Translation philosophy: Preserve theological tension rather
    than resolve it; Never paraphrase beyond what the source text warrants.'
