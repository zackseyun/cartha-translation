theological_decisions:
- issue: Rendering of Ἰουδαίων in the crucifixion title
  chosen_reading: the Jews
  alternative_readings:
  - the Judeans
  rationale: This verse reports the Roman charge/title attached to Jesus. The phrase
    Ὁ βασιλεὺς τῶν Ἰουδαίων is a stock expression in the Gospel passion narratives
    and points to the people-group designation as presented in the accusation. Rendering
    it 'the Jews' preserves the recognized title while avoiding importing a narrower
    geographical sense not explicit in the immediate context. Because Ἰουδαῖος can
    in some contexts mean 'Judean,' that alternative is preserved in a footnote for
    transparency.
  doctrine_reference: Translation philosophy §1, §5
