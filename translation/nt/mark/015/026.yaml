id: MRK.15.26
reference: Mark 15:26
source:
  edition: SBLGNT
  text: καὶ ἦν ἡ ἐπιγραφὴ τῆς αἰτίας αὐτοῦ ἐπιγεγραμμένη· Ὁ βασιλεὺς τῶν Ἰουδαίων.
translation:
  text: 'And the inscription of the charge against him was written: “The King of the
    Jews.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “The King of the Judeans.”
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπιγραφή
  chosen: inscription
  alternatives:
  - written notice
  - placard
  - title
  lexicon: BDAG
  rationale: Refers to the written notice posted on or above the cross. 'Inscription'
    is natural English and preserves the formal sense of a written statement better
    than the more interpretive 'title.'
- source_word: αἰτία
  chosen: charge against him
  alternatives:
  - accusation against him
  - cause of his condemnation
  lexicon: BDAG
  rationale: In this judicial context αἰτία denotes the stated basis of accusation
    or charge. 'Charge against him' is idiomatic and conveys the legal sense without
    overexpanding the text.
- source_word: ἐπιγεγραμμένη
  chosen: was written
  alternatives:
  - had been written
  - was inscribed
  lexicon: BDAG
  rationale: Perfect participle with ἦν forms a periphrastic construction indicating
    the inscription stood written. 'Was written' is clear modern English; 'was inscribed'
    is possible but slightly less natural here.
- source_word: βασιλεὺς
  chosen: King
  alternatives:
  - king
  lexicon: BDAG
  rationale: A royal title in the wording of the accusation. Capitalized in the quotation
    because it functions as the formal content of the posted charge.
- source_word: Ἰουδαίων
  chosen: the Jews
  alternatives:
  - the Judeans
  lexicon: BDAG
  rationale: In Mark's passion narrative this phrase is the standard title placed
    on Jesus and is conventionally rendered 'the Jews.' 'Judeans' is lexically possible,
    but here the fixed political-religious designation in the charge is best preserved
    in its familiar form; the alternative is worth noting because of ongoing scholarly
    discussion.
