id: MRK.15.46
reference: Mark 15:46
source:
  edition: SBLGNT
  text: καὶ ἀγοράσας ⸀σινδόνα καθελὼν αὐτὸν ἐνείλησεν τῇ σινδόνι καὶ ⸀ἔθηκεν αὐτὸν
    ἐν ⸀μνημείῳ ὃ ἦν λελατομημένον ἐκ πέτρας, καὶ προσεκύλισεν λίθον ἐπὶ τὴν θύραν
    τοῦ μνημείου.
translation:
  text: And after buying a linen cloth, he took him down, wrapped him in the linen
    cloth, and laid him in a tomb that had been cut out of rock. Then he rolled a
    stone against the entrance of the tomb.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'linen sheet' or 'burial shroud' for 'linen cloth' (σινδών).
    reason: lexical_alternative
  - marker: b
    text: Traditional English often has 'hewn out of rock' for 'had been cut out of
      rock.'
    reason: lexical_alternative
  - marker: c
    text: Or 'against the door of the tomb'; the Greek θύρα can mean 'door' or 'entrance.'
    reason: lexical_alternative
lexical_decisions:
- source_word: σινδόνα / σινδόνι
  chosen: linen cloth / the linen cloth
  alternatives:
  - linen sheet
  - burial shroud
  lexicon: BDAG
  rationale: σινδών denotes a linen cloth, often used as a burial wrapping. 'Linen
    cloth' is clear, natural English and avoids over-specifying 'shroud' while preserving
    the material and function implied by the context. The article in the second occurrence
    is reflected as 'the linen cloth.'
- source_word: καθελών
  chosen: took him down
  alternatives:
  - having taken him down
  - removed him
  lexicon: BDAG
  rationale: From καθαιρέω, in this context it refers to taking Jesus' body down from
    the cross. 'Took him down' is idiomatic and precise in English.
- source_word: ἐνείλησεν
  chosen: wrapped him
  alternatives:
  - bound him
  - enfolded him
  lexicon: BDAG
  rationale: The verb means to wrap or enfold. 'Wrapped him' is the most natural modern
    English rendering and fits burial preparation context without adding details not
    explicit in the text.
- source_word: ἔθηκεν
  chosen: laid him
  alternatives:
  - placed him
  - put him
  lexicon: BDAG
  rationale: '''Laid him'' is slightly more dignified and contextually appropriate
    for burial than the more generic ''put him,'' while remaining faithful to τίθημι.'
- source_word: μνημείῳ / μνημείου
  chosen: tomb / the tomb
  alternatives:
  - grave
  - memorial tomb
  lexicon: BDAG
  rationale: μνημεῖον here refers to a burial place, specifically a rock-cut tomb.
    'Tomb' is the standard and most accurate English equivalent; 'grave' would understate
    the structure described.
- source_word: λελατομημένον ἐκ πέτρας
  chosen: that had been cut out of rock
  alternatives:
  - hewn out of rock
  - cut from stone
  lexicon: BDAG
  rationale: 'The perfect passive participle indicates a completed state: the tomb
    had been cut out. ''Rock'' better matches πέτρα here as bedrock or rock face,
    rather than a worked ''stone.'' ''Hewn'' is traditional but less accessible than
    ''cut out.'''
- source_word: προσεκύλισεν
  chosen: rolled
  alternatives:
  - rolled up
  - moved by rolling
  lexicon: BDAG
  rationale: The verb means to roll toward or against. In context, the object is a
    stone used to close the tomb. English naturally expresses the directional force
    with the following prepositional phrase rather than in the verb alone.
- source_word: ἐπὶ τὴν θύραν τοῦ μνημείου
  chosen: against the entrance of the tomb
  alternatives:
  - to the door of the tomb
  - against the door of the tomb
  lexicon: BDAG
  rationale: θύρα can mean 'door' or 'entrance/opening.' Since a tomb typically has
    an opening rather than a hinged door in modern readers' minds, 'entrance' communicates
    the sense more clearly. 'Against' reflects ἐπί with motion in this closing context.
- source_word: ἀγοράσας
  chosen: after buying
  alternatives:
  - having bought
  - when he had bought
  lexicon: BDAG
  rationale: The aorist participle is antecedent to the main actions. 'After buying'
    conveys the sequence smoothly in modern English while preserving the participial
    relationship.
