id: MRK.15.38
reference: Mark 15:38
source:
  edition: SBLGNT
  text: καὶ τὸ καταπέτασμα τοῦ ναοῦ ἐσχίσθη εἰς δύο ἀπ’ ἄνωθεν ἕως κάτω.
translation:
  text: And the curtain of the temple was torn in two, from top to bottom.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'veil of the temple.'
    reason: lexical_alternative
  - marker: b
    text: The Greek can refer more specifically to the inner temple sanctuary.
    reason: lexical_alternative
lexical_decisions:
- source_word: καταπέτασμα
  chosen: curtain
  alternatives:
  - veil
  lexicon: BDAG
  rationale: Refers to the hanging/curtain within the temple. 'Curtain' is clearer
    in modern English than the more traditional 'veil,' while still preserving the
    concrete image without importing interpretation.
- source_word: ναοῦ
  chosen: temple
  alternatives:
  - sanctuary
  lexicon: BDAG
  rationale: ναός often denotes the temple sanctuary rather than the broader temple
    complex. 'Temple' is retained for readability and familiarity, with the genitive
    construction 'of the temple' naturally conveying the location; 'sanctuary' is
    a viable alternative but less idiomatic here.
- source_word: ἐσχίσθη
  chosen: was torn
  alternatives:
  - was split
  - was torn apart
  lexicon: BDAG
  rationale: Aorist passive of σχίζω, indicating that the curtain underwent tearing.
    'Was torn' is the most natural and direct English rendering.
- source_word: εἰς δύο
  chosen: in two
  alternatives:
  - into two pieces
  lexicon: BDAG
  rationale: Idiomatic expression indicating division into two parts. 'In two' is
    concise and natural English.
- source_word: ἀπ’ ἄνωθεν ἕως κάτω
  chosen: from top to bottom
  alternatives:
  - from above to below
  - from the top to the bottom
  lexicon: BDAG
  rationale: This phrase marks the direction and extent of the tearing. 'From top
    to bottom' is idiomatic English and preserves the spatial emphasis of the Greek.
- source_word: καὶ
  chosen: And
  alternatives:
  - Then
  - Now
  lexicon: BDAG
  rationale: Simple connective linking this event to the preceding narrative. 'And'
    preserves the narrative flow without adding temporal nuance not explicit in the
    Greek.
