theological_decisions:
- issue: Potential interpretive significance of the temple curtain tearing
  chosen_reading: Render the event descriptively without explaining its symbolism
    in the main text.
  alternative_readings:
  - The tearing signifies access to God
  - The tearing signifies judgment on the temple system
  rationale: The verse reports the event itself but does not explicitly state its
    theological meaning. In keeping with the translation philosophy, the text should
    preserve the narrative fact without resolving later theological interpretations
    in translation.
  doctrine_reference: Preserve theological tension rather than resolve it.
