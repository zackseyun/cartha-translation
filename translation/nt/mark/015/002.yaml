id: MRK.15.2
reference: Mark 15:2
source:
  edition: SBLGNT
  text: καὶ ἐπηρώτησεν αὐτὸν ὁ Πιλᾶτος· Σὺ εἶ ὁ βασιλεὺς τῶν Ἰουδαίων; ὁ δὲ ἀποκριθεὶς
    ⸂αὐτῷ λέγει⸃· Σὺ λέγεις.
translation:
  text: And Pilate asked him, “Are you the king of the Jews?” And answering him, he
    says, “You say so.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the Judeans.” Here the phrase “king of the Jews” reflects the standard
      political charge brought before Pilate.
    reason: lexical_alternative
  - marker: b
    text: Or “You say,” or more explicitly, “That is what you say.” Jesus’ reply is
      terse and leaves a measure of ambiguity.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐπηρώτησεν
  chosen: asked
  alternatives:
  - questioned
  - interrogated
  lexicon: BDAG
  rationale: The verb means to ask or question. In this context, simple 'asked' best
    fits readable modern English without overstating the force as a formal interrogation.
- source_word: Σὺ εἶ
  chosen: Are you
  alternatives:
  - You are
  lexicon: BDAG
  rationale: In direct-question context, the explicit pronoun plus verb is naturally
    rendered as an English interrogative, with the pronoun carrying emphasis.
- source_word: βασιλεὺς
  chosen: king
  alternatives:
  - ruler
  lexicon: BDAG
  rationale: The standard sense is 'king.' 'Ruler' is broader and loses the royal
    and messianic-political charge of the accusation.
- source_word: Ἰουδαίων
  chosen: the Jews
  alternatives:
  - the Judeans
  lexicon: BDAG
  rationale: In the passion narrative before Pilate, the phrase 'king of the Jews'
    is a fixed political charge and widely recognized title. 'Judeans' is lexically
    possible, but here 'the Jews' better reflects the established expression in context.
- source_word: ἀποκριθεὶς
  chosen: answering
  alternatives:
  - in reply
  - answered
  lexicon: BDAG
  rationale: The participle is formally preserved with 'answering,' though somewhat
    smoothed in English by the following finite verb. This keeps the Greek structure
    visible without becoming unnatural.
- source_word: λέγει
  chosen: he says
  alternatives:
  - he said
  lexicon: BDAG
  rationale: Mark frequently uses the historical present. Rendering it as 'he says'
    preserves Mark's vivid narrative style and reflects the present-tense Greek.
- source_word: Σὺ λέγεις
  chosen: You say so
  alternatives:
  - You say
  - That is what you say
  lexicon: BDAG
  rationale: The expression is elliptical and somewhat indirect. 'You say so' is idiomatic
    English that preserves the ambiguity of Jesus' reply without overinterpreting
    it as either a full affirmation or denial.
