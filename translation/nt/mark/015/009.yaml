theological_decisions:
- issue: Rendering the title τὸν βασιλέα τῶν Ἰουδαίων
  chosen_reading: the King of the Jews
  alternative_readings:
  - the king of the Judeans
  rationale: This is a political and ironic title in the passion narrative, not a
    translator-supplied theological affirmation. 'Jews' is retained because the phrase
    is a recognized title in the Gospel context and in Roman usage within the narrative.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    theological tension rather than resolve it.'
