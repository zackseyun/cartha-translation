id: MRK.15.9
reference: Mark 15:9
source:
  edition: SBLGNT
  text: ὁ δὲ Πιλᾶτος ἀπεκρίθη αὐτοῖς λέγων· Θέλετε ἀπολύσω ὑμῖν τὸν βασιλέα τῶν Ἰουδαίων;
translation:
  text: But Pilate answered them, saying, “Do you want me to release to you the King
    of the Jews?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “the king of the Judeans.” The Greek Ἰουδαίων can mean either “Jews”
      or “Judeans,” but in this fixed passion-title the traditional and contextually
      fitting rendering is “Jews.”
    reason: lexical_alternative
lexical_decisions:
- source_word: δὲ
  chosen: But
  alternatives:
  - And
  - Now
  lexicon: BDAG
  rationale: Marks a mild contrast or continuation with the preceding context. 'But'
    fits the narrative turn as Pilate responds to the crowd.
- source_word: ἀπεκρίθη
  chosen: answered
  alternatives:
  - replied
  lexicon: BDAG
  rationale: Standard narrative rendering of ἀποκρίνομαι. 'Answered' is natural English
    and preserves the responsive force.
- source_word: αὐτοῖς
  chosen: them
  alternatives:
  - to them
  lexicon: BDAG
  rationale: The dative indirect object is naturally expressed in English as 'them'
    after 'answered,' while the sense remains 'answered them.'
- source_word: λέγων
  chosen: saying
  alternatives:
  - and said
  lexicon: BDAG
  rationale: Retains the participial construction in readable English and reflects
    the Greek narrative style without over-literal awkwardness.
- source_word: Θέλετε
  chosen: Do you want
  alternatives:
  - Do you wish
  - Are you willing
  lexicon: BDAG
  rationale: θέλω here expresses desire or intention. 'Do you want' is clear, idiomatic
    modern English.
- source_word: ἀπολύσω
  chosen: me to release
  alternatives:
  - that I release
  - me to set free
  lexicon: BDAG
  rationale: In this judicial context ἀπολύω means to release or free a prisoner.
    'Release' is the most precise and natural choice here.
- source_word: ὑμῖν
  chosen: to you
  alternatives:
  - for you
  lexicon: BDAG
  rationale: The dative is best rendered 'to you' with ἀπολύω in this context, indicating
    the people as the recipients of Pilate's action.
- source_word: βασιλέα
  chosen: King
  alternatives:
  - the king
  lexicon: BDAG
  rationale: Rendered as 'King' within the full title 'the King of the Jews.' The
    capitalization reflects its use as part of the specific royal designation in direct
    speech, not a doctrinal claim imported by the translator.
- source_word: Ἰουδαίων
  chosen: the Jews
  alternatives:
  - the Judeans
  lexicon: BDAG
  rationale: In Mark's passion narrative this phrase is a fixed political title, 'King
    of the Jews,' used by Roman authorities and others. 'Jews' preserves the conventional
    and contextually appropriate sense better than 'Judeans' in this titular expression.
