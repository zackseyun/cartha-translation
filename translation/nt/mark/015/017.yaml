theological_decisions:
- issue: Mock-royal imagery in Jesus' humiliation
  chosen_reading: Use 'crown' rather than 'wreath' for στέφανος.
  alternative_readings:
  - wreath
  - garland
  rationale: The soldiers are parodying kingship by clothing Jesus in purple and placing
    a thorn crown on him. 'Crown' preserves the narrative's royal mockery without
    adding doctrinal interpretation beyond the text.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve source
    meaning without flattening theological weight.'
