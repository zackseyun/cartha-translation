id: MRK.15.17
reference: Mark 15:17
source:
  edition: SBLGNT
  text: καὶ ⸀ἐνδιδύσκουσιν αὐτὸν πορφύραν καὶ περιτιθέασιν αὐτῷ πλέξαντες ἀκάνθινον
    στέφανον·
translation:
  text: And they dress him in purple, and after weaving a crown of thorns, they place
    it on him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they clothe him with purple'; the Greek does not explicitly say 'robe'
      in this verse, though the context implies a garment.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐνδιδύσκουσιν
  chosen: dress ... in
  alternatives:
  - clothe ... with
  - put ... on
  lexicon: BDAG
  rationale: The verb means to put clothing on someone. 'Dress him in' is natural
    modern English and preserves the causative sense better than the more wooden 'clothe
    him with.'
- source_word: πορφύραν
  chosen: purple
  alternatives:
  - a purple robe
  - purple cloth
  lexicon: BDAG
  rationale: The noun can denote purple cloth or a purple garment. The Greek does
    not explicitly supply 'robe' in this verse, so 'purple' keeps closer to the text
    while still making sense with 'dress him in.'
- source_word: περιτιθέασιν
  chosen: they place it on him
  alternatives:
  - they put on him
  - they set on him
  lexicon: BDAG
  rationale: The verb means to put around or place upon. Because the direct object
    'crown' is implied by the participial phrase, 'they place it on him' makes the
    English explicit and clear.
- source_word: πλέξαντες
  chosen: after weaving
  alternatives:
  - having woven
  - twisting together
  lexicon: BDAG
  rationale: The aorist participle is antecedent in action to the main verb, so 'after
    weaving' clearly conveys the sequence in idiomatic English.
- source_word: ἀκάνθινον
  chosen: of thorns
  alternatives:
  - thorny
  - made of thorns
  lexicon: BDAG
  rationale: The adjective denotes something made of thorns. English idiom prefers
    the genitive construction 'crown of thorns.'
- source_word: στέφανον
  chosen: crown
  alternatives:
  - wreath
  - garland
  lexicon: BDAG
  rationale: Although στέφανος can refer to a wreath, in this mocking royal context
    'crown' best communicates the intended irony and matches the object being placed
    on Jesus' head.
