id: MRK.15.31
reference: Mark 15:31
source:
  edition: SBLGNT
  text: ὁμοίως καὶ οἱ ἀρχιερεῖς ἐμπαίζοντες πρὸς ἀλλήλους μετὰ τῶν γραμματέων ἔλεγον·
    Ἄλλους ἔσωσεν, ἑαυτὸν οὐ δύναται σῶσαι·
translation:
  text: In the same way the chief priests, mocking one another with the scribes, were
    saying, “He saved others; he cannot save himself.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “mocking among themselves with the scribes.” The Greek phrase could emphasize
      reciprocal speech among the chief priests, with the scribes joining them.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁμοίως
  chosen: In the same way
  alternatives:
  - Likewise
  - Similarly
  lexicon: BDAG
  rationale: Introduces parallel mockery with the preceding groups. 'In the same way'
    is natural modern English and preserves the comparative force.
- source_word: ἀρχιερεῖς
  chosen: chief priests
  alternatives:
  - high priests
  lexicon: BDAG
  rationale: Standard rendering for the plural referring to the leading priestly authorities,
    not a claim that multiple men simultaneously held the singular office of high
    priest.
- source_word: ἐμπαίζοντες
  chosen: mocking
  alternatives:
  - ridiculing
  - scoffing at
  lexicon: BDAG
  rationale: Captures the participle's sense of derisive mockery in a concise, readable
    way.
- source_word: πρὸς ἀλλήλους
  chosen: one another
  alternatives:
  - among themselves
  - to one another
  lexicon: BDAG
  rationale: The phrase indicates reciprocal interaction. 'One another' preserves
    that force; in English it works idiomatically with 'mocking' to show they were
    speaking among themselves in mutual derision.
- source_word: μετὰ τῶν γραμματέων
  chosen: with the scribes
  alternatives:
  - along with the scribes
  lexicon: BDAG
  rationale: Shows the scribes joined the chief priests in the mockery. 'Scribes'
    is retained as the established and accurate designation for this group.
- source_word: ἔλεγον
  chosen: were saying
  alternatives:
  - said
  - kept saying
  lexicon: BDAG
  rationale: Imperfect tense suggests ongoing or repeated speech; 'were saying' preserves
    that aspect without overtranslating.
- source_word: Ἄλλους
  chosen: others
  alternatives:
  - other people
  lexicon: BDAG
  rationale: Indefinite plural object referring to those Jesus had saved or delivered.
    'Others' is direct and idiomatic.
- source_word: ἔσωσεν
  chosen: saved
  alternatives:
  - rescued
  - delivered
  lexicon: BDAG
  rationale: The verb σῴζω can mean save, rescue, or deliver. Here the mockers likely
    speak with deliberate irony, alluding both to Jesus' acts of deliverance and to
    the claim of salvation. 'Saved' best preserves that layered force.
- source_word: ἑαυτὸν
  chosen: himself
  lexicon: BDAG
  rationale: Reflexive pronoun straightforwardly rendered as 'himself.'
- source_word: οὐ δύναται σῶσαι
  chosen: cannot save
  alternatives:
  - is not able to save
  - cannot rescue
  lexicon: BDAG
  rationale: Combines ability language with the infinitive naturally in English. 'Cannot
    save' preserves both the verbal link to ἔσωσεν and the taunt's irony.
