theological_decisions:
- issue: Rendering σῴζω consistently in both clauses
  chosen_reading: saved ... save
  alternative_readings:
  - rescued ... rescue
  - delivered ... deliver
  rationale: Using 'saved' in both clauses preserves the Greek repetition and the
    theological irony of the mockers' statement without importing a narrower doctrinal
    sense than the context warrants.
  doctrine_reference: Translation philosophy §§1, 5
