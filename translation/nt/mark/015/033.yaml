theological_decisions:
- issue: Scope of γῆ in the crucifixion darkness
  chosen_reading: land
  alternative_readings:
  - earth
  rationale: The Greek γῆ is lexically broad. Rendering it as 'land' avoids importing
    a definitive claim that the darkness covered the entire globe, while still allowing
    readers to perceive the event's gravity. Because the term remains genuinely ambiguous,
    the alternative 'earth' is preserved in a footnote rather than resolved dogmatically.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
