id: MRK.15.33
reference: Mark 15:33
source:
  edition: SBLGNT
  text: ⸂Καὶ γενομένης⸃ ὥρας ἕκτης σκότος ἐγένετο ἐφ’ ὅλην τὴν γῆν ἕως ὥρας ἐνάτης.
translation:
  text: And when the sixth hour had come, darkness came over the whole land until
    the ninth hour.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the whole earth.' The Greek word can mean either 'land' or 'earth.'
    reason: alternative_reading
  - marker: b
    text: That is, from about noon until about three in the afternoon.
    reason: cultural_note
lexical_decisions:
- source_word: γενομένης ὥρας ἕκτης
  chosen: when the sixth hour had come
  alternatives:
  - when it was the sixth hour
  - at the sixth hour
  - when noon came
  lexicon: BDAG
  rationale: 'The genitive absolute with γίνομαι is naturally rendered temporally:
    ''when ... had come.'' ''Sixth hour'' preserves the source expression and avoids
    prematurely converting to modern clock time in the main text. ''When noon came''
    is interpretive and better left implicit or footnoted if needed.'
- source_word: σκότος
  chosen: darkness
  alternatives:
  - gloom
  lexicon: BDAG
  rationale: The noun straightforwardly denotes darkness. 'Darkness' is the standard
    and clearest English equivalent.
- source_word: ἐγένετο
  chosen: came
  alternatives:
  - fell
  - came to be
  - occurred
  lexicon: BDAG
  rationale: Using 'came' in 'darkness came over' yields natural English while preserving
    the eventive force of ἐγένετο. 'Fell' is idiomatic but slightly more interpretive;
    'came to be' is too wooden.
- source_word: ἐφ’ ὅλην τὴν γῆν
  chosen: over the whole land
  alternatives:
  - over the whole earth
  - over all the land
  lexicon: BDAG
  rationale: γῆ can mean 'land' or 'earth.' In this narrative context, 'land' best
    preserves the ambiguity without overstating a global cosmological claim in English.
    'Whole earth' remains a viable lexical alternative and is preserved in a footnote.
- source_word: ἕως ὥρας ἐνάτης
  chosen: until the ninth hour
  alternatives:
  - until three in the afternoon
  - until the ninth hour of the day
  lexicon: BDAG
  rationale: This preserves the source time expression consistently with 'sixth hour.'
    Converting to modern time is interpretive; a footnote can clarify for readers
    if desired.
