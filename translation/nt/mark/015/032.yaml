id: MRK.15.32
reference: Mark 15:32
source:
  edition: SBLGNT
  text: ὁ χριστὸς ὁ ⸀βασιλεὺς Ἰσραὴλ καταβάτω νῦν ἀπὸ τοῦ σταυροῦ, ἵνα ἴδωμεν καὶ
    ⸀πιστεύσωμεν. καὶ οἱ συνεσταυρωμένοι ⸀σὺν αὐτῷ ὠνείδιζον αὐτόν.
translation:
  text: Let the Messiah, the King of Israel, come down now from the cross, so that
    we may see and believe.” And those who were crucified with him were also insulting
    him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Christ.' The Greek title Χριστός is rendered 'Messiah' here to preserve
      its royal-anointed sense in context.
    reason: alternative_reading
  - marker: b
    text: Or 'were reviling him' or 'were reproaching him.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ χριστός
  chosen: the Messiah
  alternatives:
  - the Christ
  lexicon: BDAG
  rationale: Rendered as the title 'Messiah' rather than transliterated 'Christ' in
    keeping with the doctrine guideline for Χριστός when used as a title. Here it
    is part of the mockers' royal-messianic taunt, not a name-like usage.
- source_word: ὁ βασιλεὺς Ἰσραήλ
  chosen: the King of Israel
  alternatives:
  - Israel's King
  lexicon: BDAG
  rationale: A straightforward titular genitive. 'The King of Israel' preserves the
    formal force and echoes the mockery of Jesus' claimed kingship.
- source_word: καταβάτω
  chosen: let ... come down
  alternatives:
  - let ... descend
  - let ... come down here
  lexicon: BDAG
  rationale: Third-person aorist imperative expressing a taunting demand. 'Come down'
    is idiomatic modern English and fits the context better than the more formal 'descend.'
- source_word: νῦν
  chosen: now
  alternatives:
  - at once
  lexicon: BDAG
  rationale: Retained to preserve the immediacy and derision of the challenge.
- source_word: ἀπὸ τοῦ σταυροῦ
  chosen: from the cross
  alternatives:
  - down from the cross
  lexicon: BDAG
  rationale: Rendered with standard English prepositional phrasing. The downward motion
    is already conveyed by 'come down,' so 'from the cross' avoids redundancy in the
    main text.
- source_word: ἵνα ἴδωμεν καὶ πιστεύσωμεν
  chosen: so that we may see and believe
  alternatives:
  - that we may see and believe
  - so that we may see and put our faith
  lexicon: BDAG
  rationale: ἵνα with subjunctives expresses purpose/result in the speakers' taunt.
    'See and believe' is concise and natural. πιστεύω here is the ordinary verb 'believe,'
    not a context requiring a more expanded gloss.
- source_word: οἱ συνεσταυρωμένοι σὺν αὐτῷ
  chosen: those who were crucified with him
  alternatives:
  - the men crucified with him
  - those crucified alongside him
  lexicon: BDAG
  rationale: The perfect participle refers to the others sharing crucifixion with
    Jesus. 'Those who were crucified with him' is clear and preserves the passive
    sense without over-specifying gender beyond what the context already implies.
- source_word: ὠνείδιζον αὐτόν
  chosen: were also insulting him
  alternatives:
  - were reproaching him
  - were reviling him
  lexicon: BDAG
  rationale: The imperfect indicates ongoing action; 'were ... insulting' captures
    the durative sense in accessible modern English. 'Also' is supplied to reflect
    καί linking their action with the mockery already described.
