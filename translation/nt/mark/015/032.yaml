theological_decisions:
- issue: Rendering Χριστός in a mockery context
  chosen_reading: Messiah
  alternative_readings:
  - Christ
  rationale: The term functions as a title in a Jewish royal-messianic accusation/mockery,
    so 'Messiah' best preserves the semantic content rather than inherited church
    transliteration. This follows the stated default for Χριστός where title usage
    is in view.
  doctrine_reference: 'DOCTRINE.md: Contested terms — Χριστός → Messiah (where title;
    Christ where name-like)'
