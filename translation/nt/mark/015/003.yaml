id: MRK.15.3
reference: Mark 15:3
source:
  edition: SBLGNT
  text: καὶ κατηγόρουν αὐτοῦ οἱ ἀρχιερεῖς πολλά.
translation:
  text: And the chief priests were accusing him of many things.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'were bringing many accusations against him.'
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ
  chosen: And
  alternatives:
  - Now
  lexicon: BDAG
  rationale: Standard connective linking this verse to the preceding narrative. 'And'
    preserves the simple paratactic flow of Mark.
- source_word: κατηγόρουν
  chosen: were accusing
  alternatives:
  - accused
  - were bringing charges against
  lexicon: BDAG
  rationale: Imperfect active indicates ongoing or repeated action in past time. 'Were
    accusing' preserves the durative sense better than simple 'accused.'
- source_word: αὐτοῦ
  chosen: him
  alternatives:
  - against him
  lexicon: BDAG
  rationale: Genitive after κατηγορέω marks the person accused. In idiomatic English
    this is expressed as the direct object 'him'; the adversative sense can be made
    explicit in translation but is not required if the verb already carries it.
- source_word: οἱ ἀρχιερεῖς
  chosen: the chief priests
  alternatives:
  - the high priests
  lexicon: BDAG
  rationale: Standard rendering for the plural title referring to the leading priestly
    authorities, not multiple holders of the singular office of high priest.
- source_word: πολλά
  chosen: of many things
  alternatives:
  - many things
  - many charges
  lexicon: BDAG
  rationale: Accusative neuter plural functions adverbially/objectively with κατηγορέω,
    indicating the many matters on which accusations were made. 'Of many things' is
    idiomatic with 'accusing him' and preserves the breadth without over-specifying
    formal legal 'charges.'
