id: MRK.15.13
reference: Mark 15:13
source:
  edition: SBLGNT
  text: οἱ δὲ πάλιν ἔκραξαν· Σταύρωσον αὐτόν.
translation:
  text: But they cried out again, “Crucify him!”
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: οἱ
  chosen: they
  alternatives:
  - the people
  - the crowd
  lexicon: BDAG
  rationale: The nominative plural article functions substantivally, referring back
    to the group already in view. English requires an explicit pronoun rather than
    a bare article; 'they' is the most natural and contextually faithful rendering.
- source_word: δὲ
  chosen: But
  alternatives:
  - And
  - Then
  - Now
  lexicon: BDAG
  rationale: δέ marks a mild contrast or development. 'But' best captures the adversative
    force here in response to Pilate's preceding words, without overstating it.
- source_word: πάλιν
  chosen: again
  alternatives:
  - once more
  lexicon: BDAG
  rationale: πάλιν straightforwardly indicates repetition. 'Again' is concise, idiomatic,
    and preserves the narrative emphasis that this was a repeated cry.
- source_word: ἔκραξαν
  chosen: cried out
  alternatives:
  - shouted
  - cried
  lexicon: BDAG
  rationale: κράζω denotes a loud cry or shout. 'Cried out' preserves the intensity
    while remaining natural modern English; 'shouted' is possible but slightly flattens
    the emotional force.
- source_word: Σταύρωσον
  chosen: Crucify
  alternatives:
  - Have him crucified
  - Execute by crucifixion
  lexicon: BDAG
  rationale: 'Aorist active imperative, second singular, addressed to Pilate: ''Crucify!''
    The direct imperative is the plain sense. ''Have him crucified'' is interpretive
    and more indirect than the Greek.'
- source_word: αὐτόν
  chosen: him
  lexicon: BDAG
  rationale: Direct object pronoun referring to Jesus. 'Him' is the simple and accurate
    rendering.
