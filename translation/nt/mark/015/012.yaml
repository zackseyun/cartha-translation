theological_decisions:
- issue: Whether to phrase Pilate's wording as endorsing Jesus' kingship or as reflecting
    the crowd's designation
  chosen_reading: Rendered 'the one you call the king of the Jews' to keep the title
    within the crowd's attribution.
  alternative_readings:
  - '''him whom you call the King of the Jews'''
  rationale: The Greek relative clause ὃν λέγετε places emphasis on what 'you' say/call
    him. The translation preserves that rhetorical distance and does not import Pilate's
    personal confession or denial.
  doctrine_reference: Preserve theological tension rather than resolve it.
