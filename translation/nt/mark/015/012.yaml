id: MRK.15.12
reference: Mark 15:12
source:
  edition: SBLGNT
  text: ὁ δὲ Πιλᾶτος ⸂πάλιν ἀποκριθεὶς ἔλεγεν⸃ αὐτοῖς· Τί οὖν ⸀θέλετε ποιήσω ⸂ὃν λέγετε⸃
    ⸀τὸν βασιλέα τῶν Ἰουδαίων;
translation:
  text: Pilate answered them again, “Then what do you want me to do with the one you
    call the king of the Jews?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “him whom you call the King of the Jews.”
    reason: lexical_alternative
lexical_decisions:
- source_word: πάλιν
  chosen: again
  alternatives:
  - in reply
  - once more
  lexicon: BDAG
  rationale: The adverb marks repeated speech by Pilate in the ongoing exchange. 'Again'
    is the most natural concise rendering in English and preserves the discourse flow.
- source_word: ἀποκριθεὶς ἔλεγεν
  chosen: answered ...
  alternatives:
  - answered and said
  - responding, was saying
  lexicon: BDAG
  rationale: This participle + imperfect construction is a common Semitic-influenced
    narrative expression. English idiom is best served by 'answered' rather than the
    more wooden 'answered and was saying.' The imperfect ἔλεγεν is adequately represented
    by direct speech introduction in context.
- source_word: Τί οὖν
  chosen: Then what
  alternatives:
  - What then
  - So what
  lexicon: BDAG
  rationale: οὖν draws an inference from the crowd's prior demand. 'Then what' preserves
    the logical connection while sounding natural in modern English.
- source_word: θέλετε
  chosen: do you want
  alternatives:
  - do you wish
  - are you willing
  lexicon: BDAG
  rationale: In this context θέλω expresses desire or preference. 'Do you want' is
    clear modern English and fits the crowd's demanded course of action.
- source_word: ποιήσω
  chosen: me to do
  alternatives:
  - that I should do
  - for me to do
  lexicon: BDAG
  rationale: 'The aorist subjunctive after θέλετε is naturally rendered in English
    as an infinitival complement: ''do you want me to do.'' This is idiomatic and
    semantically accurate.'
- source_word: ὃν λέγετε
  chosen: the one you call
  alternatives:
  - him whom you call
  - the one you say is
  lexicon: BDAG
  rationale: The relative clause identifies Jesus from the crowd's perspective. 'The
    one you call' preserves the direct force of λέγετε without adding an explicit
    'is,' which the Greek does not require.
- source_word: τὸν βασιλέα τῶν Ἰουδαίων
  chosen: the king of the Jews
  alternatives:
  - King of the Jews
  lexicon: BDAG
  rationale: This is the standard title in the passion narrative. Lowercase 'king'
    reflects that this is a descriptive/political title in the speakers' mouths, not
    necessarily a confessional christological title here.
