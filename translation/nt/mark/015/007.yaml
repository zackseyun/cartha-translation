id: MRK.15.7
reference: Mark 15:7
source:
  edition: SBLGNT
  text: ἦν δὲ ὁ λεγόμενος Βαραββᾶς μετὰ τῶν ⸀στασιαστῶν δεδεμένος οἵτινες ἐν τῇ στάσει
    φόνον πεποιήκεισαν.
translation:
  text: Now the man called Barabbas was bound with the rebels who had committed murder
    in the rebellion.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with the insurrectionists' / 'in the uprising.' The Greek uses related
      terms for those involved in a revolt.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἦν δὲ
  chosen: Now ... was
  alternatives:
  - And ... was
  - Now there was
  lexicon: BDAG
  rationale: δέ is a mild connective; 'Now' gives natural English narrative progression
    without overtranslating. ἦν is rendered simply as 'was.'
- source_word: ὁ λεγόμενος
  chosen: the man called
  alternatives:
  - the one called
  - the so-called
  lexicon: BDAG
  rationale: The article plus participle identifies Barabbas descriptively. 'The man
    called' is idiomatic and preserves the sense of designation without the pejorative
    nuance that 'so-called' can carry.
- source_word: Βαραββᾶς
  chosen: Barabbas
  rationale: Personal name transliterated per translation philosophy.
- source_word: μετὰ τῶν στασιαστῶν
  chosen: with the rebels
  alternatives:
  - with the insurrectionists
  - with the revolutionaries
  lexicon: BDAG
  rationale: στασιασταί refers to participants in an uprising or revolt. 'Rebels'
    is clear modern English and fits the immediate context of στάσις below. 'Insurrectionists'
    is more technical but less readable.
- source_word: δεδεμένος
  chosen: was bound
  alternatives:
  - was imprisoned
  - was in chains
  lexicon: BDAG
  rationale: Perfect passive participle of δέω denotes being bound or tied; in this
    custodial context it implies imprisonment, but 'was bound' stays closer to the
    Greek while remaining natural.
- source_word: οἵτινες
  chosen: who
  alternatives:
  - men who
  - and they
  lexicon: BDAG
  rationale: The relative pronoun introduces a descriptive clause about the rebels.
    Simple 'who' is sufficient in English.
- source_word: ἐν τῇ στάσει
  chosen: in the rebellion
  alternatives:
  - in the uprising
  - during the riot
  lexicon: BDAG
  rationale: στάσις here denotes a revolt or insurrection, not merely civil disorder.
    'Rebellion' matches the political-criminal context and pairs well with 'rebels'
    for lexical coherence.
- source_word: φόνον πεποιήκεισαν
  chosen: had committed murder
  alternatives:
  - had committed a murder
  - had killed someone
  lexicon: BDAG
  rationale: The periphrastic/pluperfect-like sense indicates prior completed action.
    φόνος is 'murder' or 'killing'; 'murder' best reflects the criminal force in context.
