id: MRK.15.37
reference: Mark 15:37
source:
  edition: SBLGNT
  text: ὁ δὲ Ἰησοῦς ἀφεὶς φωνὴν μεγάλην ἐξέπνευσεν.
translation:
  text: But Jesus, letting out a loud cry, breathed his last.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a great cry' or 'a loud voice.'
    reason: lexical_alternative
  - marker: b
    text: Or 'expired' or simply 'died'; literally, 'breathed out.'
    reason: lexical_alternative
lexical_decisions:
- source_word: δὲ
  chosen: But
  alternatives:
  - And
  - Now
  lexicon: BDAG
  rationale: δέ is a mild connective. 'But' preserves the narrative turn and solemn
    contrast at this climactic moment better than the flatter 'and,' while remaining
    natural English.
- source_word: ἀφεὶς
  chosen: letting out
  alternatives:
  - uttering
  - releasing
  - giving
  lexicon: BDAG
  rationale: The aorist participle of ἀφίημι here idiomatically means to emit or let
    out a sound. 'Letting out' is natural modern English and fits the construction
    with φωνὴν μεγάλην.
- source_word: φωνὴν μεγάλην
  chosen: a loud cry
  alternatives:
  - a great cry
  - a loud voice
  lexicon: BDAG
  rationale: φωνή can mean 'sound,' 'voice,' or 'cry.' In this context, with ἀφεὶς
    and the passion narrative setting, 'cry' best conveys a forceful vocal outburst.
    μεγάλην is rendered 'loud' rather than the more literal 'great' because that is
    the idiomatic English equivalent for volume/intensity.
- source_word: ἐξέπνευσεν
  chosen: breathed his last
  alternatives:
  - expired
  - died
  - gave up his spirit
  lexicon: BDAG
  rationale: ἐκπνέω literally refers to breathing out and idiomatically to dying.
    'Breathed his last' preserves the bodily imagery and solemnity of the Greek better
    than the bare 'died.' 'Gave up his spirit' is more interpretive and reflects wording
    associated with other passages rather than this verb's plain sense here.
- source_word: ὁ δὲ Ἰησοῦς
  chosen: But Jesus
  alternatives:
  - And Jesus
  - Now Jesus
  lexicon: BDAG
  rationale: The article with the proper name is not separately represented in English.
    The phrase is rendered smoothly as the subject 'Jesus' with the connective carried
    by 'But'.
