theological_decisions:
- issue: Rendering Jesus' death without importing additional theological nuance
  chosen_reading: breathed his last
  alternative_readings:
  - died
  - gave up his spirit
  rationale: The verse states Jesus' death in concise narrative terms. 'Breathed his
    last' reflects the Greek verb's imagery without adding doctrinal interpretation
    beyond the text. 'Gave up his spirit' may suggest harmonization with other Gospel
    wording and is therefore kept as an alternative rather than adopted in the main
    text.
  doctrine_reference: Translation philosophy §§1, 3, 6
