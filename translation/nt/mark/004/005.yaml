id: MRK.4.5
reference: Mark 4:5
source:
  edition: SBLGNT
  text: ⸂καὶ ἄλλο⸃ ἔπεσεν ἐπὶ τὸ πετρῶδες ⸀ὅπου οὐκ εἶχεν γῆν πολλήν, καὶ ⸀εὐθὺς ἐξανέτειλεν
    διὰ τὸ μὴ ἔχειν βάθος γῆς·
translation:
  text: And other seed fell on the rocky ground, where it did not have much soil,
    and it sprang up at once because it had no depth of soil.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'stony ground.' The Greek describes rocky terrain with only a thin layer
      of soil.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄλλο
  chosen: other seed
  alternatives:
  - another
  - other
  lexicon: BDAG
  rationale: Neuter singular adjective used substantivally in the parable sequence,
    referring implicitly to seed from the prior context. Supplying 'seed' in English
    is necessary for clarity and faithful to the ellipsis.
- source_word: πετρῶδες
  chosen: rocky ground
  alternatives:
  - rocky place
  - stony ground
  lexicon: BDAG
  rationale: Refers to rocky terrain or a rock-filled/shallow-soil area, not merely
    scattered stones. 'Rocky ground' is natural modern English and fits the agricultural
    image better than the more traditional but less precise 'stony ground.'
- source_word: γῆν πολλήν
  chosen: much soil
  alternatives:
  - much earth
  - a lot of soil
  lexicon: BDAG
  rationale: Here γῆ refers to soil/earth suitable for growth rather than land in
    a broad sense. 'Much soil' preserves the comparative agricultural sense and pairs
    naturally with the later 'depth of soil.'
- source_word: εὐθὺς
  chosen: at once
  alternatives:
  - immediately
  - quickly
  lexicon: BDAG
  rationale: Marks promptness. 'At once' is idiomatic modern English and preserves
    the suddenness without sounding overly formulaic.
- source_word: ἐξανέτειλεν
  chosen: sprang up
  alternatives:
  - came up
  - grew up
  lexicon: BDAG
  rationale: In agricultural context the verb denotes sprouting or shooting up. 'Sprang
    up' captures the sudden emergence more vividly and accurately than the broader
    'grew up.'
- source_word: διὰ τὸ μὴ ἔχειν βάθος γῆς
  chosen: because it had no depth of soil
  alternatives:
  - because it had no deep soil
  - because the soil was not deep
  lexicon: BDAG
  rationale: The διά + articular infinitive construction expresses cause. Rendering
    it as a finite clause is good English. 'Depth of soil' closely reflects βάθος
    γῆς and preserves the image of a thin soil layer over rock.
- source_word: ὅπου
  chosen: where
  alternatives:
  - in a place where
  lexicon: BDAG
  rationale: Simple locative relative adverb; 'where' is the most direct and natural
    rendering.
