id: MRK.4.6
reference: Mark 4:6
source:
  edition: SBLGNT
  text: ⸂καὶ ὅτε ἀνέτειλεν ὁ ἥλιος⸃ ⸀ἐκαυματίσθη καὶ διὰ τὸ μὴ ἔχειν ῥίζαν ἐξηράνθη.
translation:
  text: And when the sun rose, it was scorched, and because it had no root, it withered
    away.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'dried up.' The Greek verb can denote becoming dry or withered.
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ
  chosen: And
  alternatives:
  - Now
  - Then
  lexicon: BDAG
  rationale: Standard connective linking this clause to the previous verse; 'And'
    preserves the simple narrative flow without adding temporal nuance beyond the
    Greek.
- source_word: ὅτε
  chosen: when
  alternatives:
  - after
  - as
  lexicon: BDAG
  rationale: Introduces a temporal clause. 'When' is the most direct and natural rendering.
- source_word: ἀνέτειλεν
  chosen: rose
  alternatives:
  - came up
  - sprang up
  lexicon: BDAG
  rationale: Aorist of ἀνατέλλω with ὁ ἥλιος refers to the sun's rising. 'Rose' is
    idiomatic English and matches the subject.
- source_word: ὁ ἥλιος
  chosen: the sun
  lexicon: BDAG
  rationale: Direct lexical rendering of the nominative subject.
- source_word: ἐκαυματίσθη
  chosen: was scorched
  alternatives:
  - was burned
  - was seared
  lexicon: BDAG
  rationale: Passive of καυματίζω, 'to burn with heat, scorch.' 'Was scorched' captures
    damage from the sun's heat without overstating total destruction.
- source_word: διὰ τὸ μὴ ἔχειν
  chosen: because it had no
  alternatives:
  - because it did not have
  - since it had no
  lexicon: BDAG
  rationale: διά with the articular infinitive expresses cause. Rendering as 'because
    it had no' gives natural English while preserving the causal force.
- source_word: ῥίζαν
  chosen: root
  alternatives:
  - roots
  lexicon: BDAG
  rationale: Singular in Greek; 'root' works idiomatically in English for a plant
    lacking depth or anchoring.
- source_word: ἐξηράνθη
  chosen: withered away
  alternatives:
  - dried up
  - withered
  lexicon: BDAG
  rationale: Passive/intransitive sense of ξηραίνω, becoming dry or withered. 'Withered
    away' communicates the result clearly in contemporary English and fits the agricultural
    imagery.
