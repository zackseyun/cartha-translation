id: MRK.4.9
reference: Mark 4:9
source:
  edition: SBLGNT
  text: καὶ ἔλεγεν· ⸂Ὃς ἔχει⸃ ὦτα ἀκούειν ἀκουέτω.
translation:
  text: And he was saying, “Whoever has ears to hear, let him hear.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, “He who has ears to hear, let him hear.”
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ
  chosen: And
  alternatives:
  - Then
  - Also
  lexicon: BDAG
  rationale: Standard connective; 'And' preserves the simple narrative linkage without
    adding temporal nuance not explicit in the conjunction.
- source_word: ἔλεγεν
  chosen: he was saying
  alternatives:
  - he said
  - he kept saying
  lexicon: BDAG
  rationale: Imperfect indicative of λέγω. 'He was saying' preserves the imperfect
    aspect more transparently than the simple past 'he said,' while remaining natural
    English. 'He kept saying' is possible but may overemphasize repetition beyond
    what the context requires.
- source_word: Ὃς ἔχει
  chosen: Whoever has
  alternatives:
  - He who has
  - The one who has
  lexicon: BDAG
  rationale: The relative construction is generic/summarizing. 'Whoever has' communicates
    the representative force in natural modern English. 'He who has' is more formally
    gender-marked and archaic in English; the Greek masculine singular here functions
    generically rather than specifying a male referent.
- source_word: ὦτα
  chosen: ears
  lexicon: BDAG
  rationale: Literal rendering of the plural noun οὖς. The plural is retained because
    it is idiomatic in both Greek and English and supports the proverbial force of
    the saying.
- source_word: ἀκούειν
  chosen: to hear
  alternatives:
  - for hearing
  - to listen
  lexicon: BDAG
  rationale: 'The infinitive complements ''ears'' idiomatically: ''ears to hear.''
    ''To hear'' preserves the lexical repetition with the following imperative ἀκουέτω
    better than ''to listen.'''
- source_word: ἀκουέτω
  chosen: let him hear
  alternatives:
  - let him listen
  - he must hear
  lexicon: BDAG
  rationale: Third-person present imperative. 'Let him hear' is the established and
    accurate English equivalent, preserving both the imperative force and the rhetorical
    echo with ἀκούειν. 'Let him listen' is possible but weakens the lexical repetition;
    'he must hear' is too interpretive.
