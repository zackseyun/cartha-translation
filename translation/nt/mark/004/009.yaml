theological_decisions:
- issue: Generic masculine expression in a proverbial saying
  chosen_reading: Render generically as 'Whoever ... let him ...'
  alternative_readings:
  - He who has ears to hear, let him hear
  - Whoever has ears to hear, let them hear
  rationale: The Greek uses a grammatically masculine singular relative construction
    with generic force. Following the project's gender-accurate principle, the main
    text avoids archaic male-specific phrasing ('He who') while not flattening the
    singular structure into the plural-singular mismatch of 'whoever ... let them.'
    Retaining singular 'him' best reflects the source syntax and proverbial address.
  doctrine_reference: 'DOCTRINE.md: Gender-accurate over gender-neutral'
