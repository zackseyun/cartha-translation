id: MRK.4.28
reference: Mark 4:28
source:
  edition: SBLGNT
  text: ⸀αὐτομάτη ἡ γῆ καρποφορεῖ, πρῶτον χόρτον, ⸂εἶτα στάχυν, εἶτα⸃ ⸂πλήρης σῖτον⸃
    ἐν τῷ στάχυϊ.
translation:
  text: 'The soil bears fruit by itself: first the stalk, then the head, then the
    full grain in the head.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'first the blade, then the ear, then the full grain in the ear.'
    reason: lexical_alternative
lexical_decisions:
- source_word: αὐτομάτη
  chosen: by itself
  alternatives:
  - automatically
  - of itself
  - on its own
  lexicon: BDAG
  rationale: The adjective modifies ἡ γῆ and conveys that the earth produces without
    visible human agency. 'By itself' is idiomatic modern English and preserves the
    sense better than the more mechanical-sounding 'automatically.'
- source_word: γῆ
  chosen: soil
  alternatives:
  - earth
  - land
  - ground
  lexicon: BDAG
  rationale: In this agricultural parable the referent is the cultivated ground that
    produces a crop. 'Soil' is more contextually precise than the broader 'earth'
    or 'land,' while remaining natural English.
- source_word: καρποφορεῖ
  chosen: bears fruit
  alternatives:
  - produces fruit
  - yields fruit
  lexicon: BDAG
  rationale: The verb means to bear or produce fruit/crop. 'Bears fruit' preserves
    the agricultural imagery and also resonates with broader biblical usage without
    becoming overly wooden.
- source_word: πρῶτον
  chosen: first
  lexicon: BDAG
  rationale: Straightforward temporal sequencing in the growth process.
- source_word: χόρτον
  chosen: the stalk
  alternatives:
  - blade
  - grass
  - green shoot
  lexicon: BDAG
  rationale: In this crop-growth context χόρτος refers to the first visible growth
    of the grain plant. Traditional 'blade' is possible, but 'stalk' is more immediately
    understandable to modern readers while still fitting the sequence of plant development.
- source_word: εἶτα
  chosen: then
  alternatives:
  - next
  - after that
  lexicon: BDAG
  rationale: Marks the successive stages of growth in simple narrative sequence.
- source_word: στάχυν
  chosen: the head
  alternatives:
  - ear
  - head of grain
  lexicon: BDAG
  rationale: στάχυς denotes the ear/head of grain. 'Head' is natural contemporary
    English; 'ear' is traditional but less transparent for some readers.
- source_word: πλήρης
  chosen: full
  alternatives:
  - fully formed
  - ripe
  lexicon: BDAG
  rationale: The adjective describes the grain as full or complete within the head.
    'Ripe' would add an interpretive nuance of maturity not explicitly stated by the
    adjective itself.
- source_word: σῖτον
  chosen: grain
  alternatives:
  - wheat
  - kernel
  lexicon: BDAG
  rationale: σῖτος can denote grain, wheat, or the grain crop/seed. 'Grain' is broad
    enough to avoid over-specifying the species while fitting the parable's imagery.
    'Wheat' is possible but not required by the context.
- source_word: ἐν τῷ στάχυϊ
  chosen: in the head
  alternatives:
  - in the ear
  - in the head of grain
  lexicon: BDAG
  rationale: This phrase locates the full grain within the grain head. Rendering it
    with the same English term used earlier for στάχυς preserves consistency.
