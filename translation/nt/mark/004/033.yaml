id: MRK.4.33
reference: Mark 4:33
source:
  edition: SBLGNT
  text: Καὶ τοιαύταις παραβολαῖς πολλαῖς ἐλάλει αὐτοῖς τὸν λόγον, καθὼς ἠδύναντο ἀκούειν·
translation:
  text: And with many such parables he was speaking the word to them, as they were
    able to hear it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the message' or 'the teaching' for 'the word.'
    reason: lexical_alternative
  - marker: b
    text: Or 'as much as they were able to hear' or 'to the degree they could hear.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τοιαύταις
  chosen: such
  alternatives:
  - these kinds of
  - like this
  lexicon: BDAG
  rationale: Demonstrative adjective referring back to the kind of parables just given;
    'such' is concise and natural in English while preserving the comparative sense.
- source_word: παραβολαῖς
  chosen: parables
  alternatives:
  - illustrations
  - comparisons
  lexicon: BDAG
  rationale: '''Parables'' is the standard and contextually precise rendering for
    Jesus'' teaching stories in Mark; alternatives are possible but less established
    and less exact here.'
- source_word: πολλαῖς
  chosen: many
  alternatives:
  - numerous
  lexicon: BDAG
  rationale: Straightforward quantitative adjective modifying 'parables'; 'many' is
    the most natural modern English equivalent.
- source_word: ἐλάλει
  chosen: he was speaking
  alternatives:
  - he spoke
  - he kept speaking
  lexicon: BDAG
  rationale: Imperfect tense suggests ongoing or customary action. 'He was speaking'
    preserves that imperfective aspect without overinterpreting frequency.
- source_word: αὐτοῖς
  chosen: to them
  alternatives:
  - with them
  lexicon: BDAG
  rationale: Dative indirect object after λαλέω is naturally rendered 'to them.'
- source_word: τὸν λόγον
  chosen: the word
  alternatives:
  - the message
  - the teaching
  lexicon: BDAG
  rationale: λόγος here refers to the content of Jesus' proclamation/teaching. 'The
    word' preserves the Greek expression and Markan resonance, while the object is
    clarified by the following 'hear it.'
- source_word: καθὼς
  chosen: as
  alternatives:
  - according as
  - to the degree that
  - in keeping with how
  lexicon: BDAG
  rationale: Introduces a measure or correspondence clause. 'As' is idiomatic and
    captures the sense that Jesus accommodated his teaching to their capacity.
- source_word: ἠδύναντο
  chosen: they were able
  alternatives:
  - they could
  lexicon: BDAG
  rationale: Imperfect middle/passive of δύναμαι indicates continuing capacity. 'They
    were able' pairs well with the imperfect main verb and keeps the nuance of ability.
- source_word: ἀκούειν
  chosen: to hear it
  alternatives:
  - to listen
  - to understand
  lexicon: BDAG
  rationale: ἀκούω primarily means 'hear.' In context it may imply receptive comprehension,
    but translating 'understand' would interpret beyond the lexical core. 'It' is
    supplied in English for clarity, referring back to 'the word.'
