theological_decisions:
- issue: Sense of τὸν λόγον in Jesus' teaching ministry
  chosen_reading: Rendered as 'the word' rather than 'the message' in the main text.
  alternative_readings:
  - the message
  - the teaching
  rationale: The phrase likely denotes the content of Jesus' proclamation. 'The word'
    preserves the Greek wording and biblical idiom without importing a narrower doctrinal
    claim; alternatives are viable but not required in the main text.
  doctrine_reference: Translation philosophy §1, §5
- issue: Implication of ἀκούειν
  chosen_reading: Rendered as 'hear it' rather than 'understand it.'
  alternative_readings:
  - understand it
  - receive it
  rationale: The text states the crowd's capacity to hear; while hearing may imply
    comprehension, the translation preserves the lexical surface and theological tension
    rather than resolving it into a stronger interpretive claim.
  doctrine_reference: Translation philosophy §3
