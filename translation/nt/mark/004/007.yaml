id: MRK.4.7
reference: Mark 4:7
source:
  edition: SBLGNT
  text: καὶ ἄλλο ἔπεσεν εἰς τὰς ἀκάνθας, καὶ ἀνέβησαν αἱ ἄκανθαι καὶ συνέπνιξαν αὐτό,
    καὶ καρπὸν οὐκ ἔδωκεν.
translation:
  text: And other seed fell among the thorns, and the thorns came up and choked it,
    and it yielded no fruit.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'into the thorns.' The Greek preposition is literally 'into,' though
      'among the thorns' is more natural English in this context.
    reason: lexical_alternative
  - marker: b
    text: Or 'it bore no fruit.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄλλο
  chosen: other seed
  alternatives:
  - another
  - something else
  lexicon: BDAG
  rationale: Neuter singular 'other' refers elliptically to seed from the prior context
    of the sower parable. Supplying 'seed' in English is necessary for clarity and
    reflects the implied referent without adding new content.
- source_word: ἔπεσεν
  chosen: fell
  alternatives:
  - dropped
  - was sown
  lexicon: BDAG
  rationale: Aorist of πίπτω is most naturally 'fell.' 'Was sown' would import interpretation
    from the broader parable rather than translate the verb used here.
- source_word: εἰς τὰς ἀκάνθας
  chosen: among the thorns
  alternatives:
  - into the thorns
  lexicon: BDAG
  rationale: Although εἰς is literally 'into,' idiomatic English in this agricultural
    setting is 'among the thorns.' This preserves the scene naturally while keeping
    the sense of falling into a thorn-infested area.
- source_word: ἀνέβησαν
  chosen: came up
  alternatives:
  - grew up
  - sprang up
  lexicon: BDAG
  rationale: The verb means 'went up/came up.' 'Came up' is natural modern English
    for plant growth and avoids overstating the process. 'Grew up' is possible but
    slightly more interpretive.
- source_word: συνέπνιξαν
  chosen: choked
  alternatives:
  - crowded out
  - strangled
  lexicon: BDAG
  rationale: '''Choked'' is the standard and accurate rendering for vegetation preventing
    growth. It preserves the vivid metaphor without paraphrase.'
- source_word: αὐτό
  chosen: it
  alternatives:
  - the seed
  - itself
  lexicon: BDAG
  rationale: The pronoun refers back to the seed/sown thing in singular form. English
    'it' is sufficient and avoids unnecessary repetition.
- source_word: καρπὸν οὐκ ἔδωκεν
  chosen: it yielded no fruit
  alternatives:
  - it gave no fruit
  - it bore no fruit
  lexicon: BDAG
  rationale: The clause literally says 'it did not give fruit.' 'Yielded no fruit'
    is idiomatic agricultural English and preserves the result. 'Bore no fruit' is
    also strong and traditional, but 'yielded' fits the sowing imagery well.
