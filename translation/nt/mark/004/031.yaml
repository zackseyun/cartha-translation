theological_decisions:
- issue: Comparative vs. superlative description of the mustard seed
  chosen_reading: Render μικρότερον with the comparative 'smaller' rather than the
    traditional superlative 'smallest.'
  alternative_readings:
  - the smallest of all the seeds on the earth
  rationale: The Greek text uses the comparative form μικρότερον, not an explicit
    superlative. Translating it as 'smaller than all the seeds' best reflects the
    source wording while preserving the parabolic point about insignificance at the
    beginning. This avoids importing a more polished traditional phrasing not demanded
    by the Greek.
  doctrine_reference: Translation philosophy §1, §5
