id: MRK.4.31
reference: Mark 4:31
source:
  edition: SBLGNT
  text: ὡς ⸀κόκκῳ σινάπεως, ὃς ὅταν σπαρῇ ἐπὶ τῆς γῆς, ⸂μικρότερον ὂν⸃ πάντων τῶν
    ⸀σπερμάτων τῶν ἐπὶ τῆς γῆς—
translation:
  text: It is like a mustard seed, which, when it is sown on the ground, is smaller
    than all the seeds on the ground—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a grain of mustard.'
    reason: lexical_alternative
  - marker: b
    text: Greek has the comparative 'smaller,' not the superlative 'smallest.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὡς
  chosen: It is like
  alternatives:
  - like
  lexicon: BDAG
  rationale: Introduces the comparison in the parable. Because the Greek phrase is
    elliptical and depends on the previous verse's question about what the kingdom
    of God is like, English supplies 'It is' for natural sense while preserving the
    simile force of ὡς.
- source_word: κόκκῳ σινάπεως
  chosen: a mustard seed
  alternatives:
  - a grain of mustard
  - a mustard grain
  lexicon: BDAG
  rationale: 'κόκκος can mean ''grain'' or ''seed''; in contemporary English ''mustard
    seed'' is the most natural and idiomatic rendering for the plant image. The dative
    after ὡς is comparative: ''like a mustard seed.'''
- source_word: ὃς
  chosen: which
  alternatives:
  - that
  lexicon: BDAG
  rationale: Refers back to the neuter idea of the seed in sense, though grammatically
    masculine in attraction/construction. English idiom prefers 'which' for a non-personal
    antecedent.
- source_word: ὅταν σπαρῇ
  chosen: when it is sown
  alternatives:
  - whenever it is sown
  - when it has been sown
  lexicon: BDAG
  rationale: ὅταν with the aorist subjunctive gives an indefinite temporal sense,
    but in this generic illustrative context 'when it is sown' is the most natural
    English rendering.
- source_word: ἐπὶ τῆς γῆς
  chosen: on the ground
  alternatives:
  - upon the earth
  - in the ground
  lexicon: BDAG
  rationale: γῆ here refers to soil/ground in an agricultural setting, not the world
    as a whole. 'On the ground' follows the preposition ἐπί more closely than 'in
    the ground,' while remaining natural English.
- source_word: μικρότερον ὂν
  chosen: is smaller
  alternatives:
  - being smaller
  - though it is the smallest
  lexicon: BDAG
  rationale: The participial construction is rendered with a finite verb for clear
    English. The comparative μικρότερον means 'smaller,' not strictly the superlative
    'smallest'; the translation preserves the Greek form rather than harmonizing to
    a traditional English superlative.
- source_word: πάντων τῶν σπερμάτων
  chosen: than all the seeds
  alternatives:
  - than every seed
  - than all the seed kinds
  lexicon: BDAG
  rationale: A partitive/comparative genitive after μικρότερον. 'Than all the seeds'
    is a straightforward rendering that preserves the broad comparison without over-specifying
    botanical precision.
- source_word: τῶν ἐπὶ τῆς γῆς
  chosen: on the ground
  alternatives:
  - on the earth
  - in the soil
  lexicon: BDAG
  rationale: This repeated qualifier is retained rather than omitted, since it is
    present in the Greek and narrows the comparison to seeds sown in the earth/ground.
