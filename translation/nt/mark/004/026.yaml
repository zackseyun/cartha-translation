id: MRK.4.26
reference: Mark 4:26
source:
  edition: SBLGNT
  text: Καὶ ἔλεγεν· Οὕτως ἐστὶν ἡ βασιλεία τοῦ θεοῦ ⸀ὡς ἄνθρωπος βάλῃ τὸν σπόρον ἐπὶ
    τῆς γῆς
translation:
  text: 'And he was saying, “The kingdom of God is like this: as when a man casts
    the seed upon the ground,”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “The kingdom of God is as if a man should sow seed on the ground.” The
      comparison continues into the next verse, and the Greek is somewhat compressed.
    reason: alternative_reading
  - marker: b
    text: Greek 'a man'; the masculine form is retained because the source uses a
      grammatically masculine representative figure.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔλεγεν
  chosen: he was saying
  alternatives:
  - he said
  lexicon: BDAG
  rationale: Imperfect tense in narrative commonly conveys repeated or ongoing speech;
    'was saying' preserves the aspect better than the simple past 'said.'
- source_word: Οὕτως
  chosen: like this
  alternatives:
  - thus
  - in this way
  lexicon: BDAG
  rationale: Introduces the manner of comparison in the parable. 'Like this' is natural
    modern English and prepares for the explanatory clause that follows.
- source_word: βασιλεία τοῦ θεοῦ
  chosen: the kingdom of God
  alternatives:
  - the reign of God
  - the kingship of God
  lexicon: BDAG
  rationale: Traditional and accurate rendering that can denote both realm and reign.
    'Kingdom' remains the most recognizable and contextually suitable in Gospel parables.
- source_word: ὡς
  chosen: as when
  alternatives:
  - like
  - as
  lexicon: BDAG
  rationale: Here ὡς introduces a comparison whose full sense continues into the next
    verse. 'As when' best captures the elliptical comparison in idiomatic English
    without over-paraphrasing.
- source_word: ἄνθρωπος
  chosen: a man
  alternatives:
  - someone
  - a person
  lexicon: BDAG
  rationale: The Greek is grammatically masculine singular and, per translation philosophy,
    should be rendered gender-accurately. In this parabolic setting it refers to a
    representative human figure, so 'a man' is preferred over gender-neutral alternatives.
- source_word: βάλῃ
  chosen: casts
  alternatives:
  - sows
  - throws
  lexicon: BDAG
  rationale: βάλλω literally means 'throw/cast.' In this agricultural context it refers
    to sowing seed, but 'casts' preserves the verbal imagery of the Greek while remaining
    understandable.
- source_word: σπόρον
  chosen: the seed
  alternatives:
  - seed
  lexicon: BDAG
  rationale: The article is present in Greek. 'The seed' is a natural English rendering
    and may function generically for seed being sown.
- source_word: ἐπὶ τῆς γῆς
  chosen: upon the ground
  alternatives:
  - on the earth
  - on the soil
  lexicon: BDAG
  rationale: In this farming context γῆ refers to the ground/soil rather than 'earth'
    in a cosmic sense. 'Upon the ground' fits the imagery and the preposition ἐπί.
