theological_decisions:
- issue: Rendering the introductory comparison in an incomplete sentence spanning
    into the next verse
  chosen_reading: Retain the open-ended comparison with a colon and 'as when' rather
    than smoothing it into a complete paraphrase.
  alternative_readings:
  - The kingdom of God is as if a man should scatter seed on the ground.
  rationale: The Greek comparison is syntactically compressed and continues into verse
    27. Preserving that tension respects the source text's flow and avoids importing
    explanatory wording not present in this verse alone.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather
    than resolve it.
