theological_decisions:
- issue: Rendering the introductory comparison in an incomplete sentence spanning into the next verse
  chosen_reading: Retain the open-ended comparison with a colon and 'as when' rather than smoothing it into a complete paraphrase.
  alternative_readings:
  - The kingdom of God is as if a man should scatter seed on the ground.
  rationale: The Greek comparison is syntactically compressed and continues into verse 27. Preserving that tension respects the source text's flow and avoids importing explanatory wording not present in this verse alone.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather than resolve it.
revisions:
- timestamp: '2026-04-21T17:54:21Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/high_scrutiny/nt/mark/004/026.job-5086.json
  category: awkward_english
  tier: 1
  from: 'is like this: as when'
  to: 'is like this: a man'
  rationale: 'The current rendering ''is like this: as when'' is redundant in English. It explicitly translates both parts of the Greek comparative construction (Οὕτως... ὡς...) in a way that is not idiomatic. The colon after ''like this'' is sufficient to introduce the comparison, making ''as when'' superfluous. Rewriting to ''is like this: a man...'' removes the redundancy and improves the English flow while still preserving the intended syntactic structure and the open-ended nature of the parable which continues in the next verse.'
