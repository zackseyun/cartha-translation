theological_decisions:
- issue: Referent of 'the ones sown' in the parable explanation
  chosen_reading: Retain the parabolic wording 'the ones sown on the rocky ground'
    rather than interpretively replacing it with 'those whose hearts are like rocky
    ground.'
  alternative_readings:
  - those sown among rocky places
  - those on rocky soil
  rationale: Jesus' explanation intentionally preserves the imagery of sowing while
    identifying the people represented. A more interpretive paraphrase would import
    explanatory language not present in the Greek.
  doctrine_reference: Translation philosophy §1, §3
