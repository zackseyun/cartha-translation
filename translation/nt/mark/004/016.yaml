id: MRK.4.16
reference: Mark 4:16
source:
  edition: SBLGNT
  text: καὶ οὗτοί εἰσιν ⸀ὁμοίως οἱ ἐπὶ τὰ πετρώδη σπειρόμενοι, οἳ ὅταν ἀκούσωσιν τὸν
    λόγον ⸀εὐθὺς μετὰ χαρᾶς λαμβάνουσιν αὐτόν,
translation:
  text: 'And these are likewise the ones sown on the rocky ground: when they hear
    the word, they immediately receive it with joy,'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'on the rocky soil' or 'upon the rocky places.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁμοίως
  chosen: likewise
  alternatives:
  - in the same way
  - similarly
  lexicon: BDAG
  rationale: Adverb linking this group analogically to the previous explanation in
    the parable. 'Likewise' is concise and preserves the discourse connection.
- source_word: ἐπὶ τὰ πετρώδη
  chosen: on the rocky ground
  alternatives:
  - upon the rocky places
  - on the rocky soil
  lexicon: BDAG
  rationale: The phrase refers to the location characterized by rocky substrate in
    the parable. 'Rocky ground' is natural English and matches the agricultural image
    without over-literal awkwardness.
- source_word: σπειρόμενοι
  chosen: sown
  alternatives:
  - being sown
  - seeded
  lexicon: BDAG
  rationale: Although formally a present participle, in this parabolic explanation
    it functions adjectivally for the seed/people represented as those 'sown' in that
    place. English idiom prefers the simple participial adjective 'sown' here.
- source_word: τὸν λόγον
  chosen: the word
  alternatives:
  - the message
  lexicon: BDAG
  rationale: In Mark's parable context, λόγος refers to the proclaimed word/message
    of the kingdom. 'The word' preserves the repeated terminology and biblical resonance;
    'message' is possible but less consistent with the immediate context.
- source_word: εὐθύς
  chosen: immediately
  alternatives:
  - at once
  - right away
  lexicon: BDAG
  rationale: Mark frequently uses εὐθύς; 'immediately' preserves both the adverb's
    force and Markan style better than more colloquial alternatives.
- source_word: μετὰ χαρᾶς
  chosen: with joy
  alternatives:
  - joyfully
  lexicon: BDAG
  rationale: The prepositional phrase is best rendered straightforwardly as 'with
    joy,' preserving the manner of reception without compressing it into an adverb.
- source_word: λαμβάνουσιν αὐτόν
  chosen: receive it
  alternatives:
  - accept it
  - welcome it
  lexicon: BDAG
  rationale: λαμβάνω commonly means 'receive.' 'Receive it' fits the metaphor of hearing
    and taking in the word, while remaining neutral and not overstating enduring faith.
