id: MRK.4.40
reference: Mark 4:40
source:
  edition: SBLGNT
  text: καὶ εἶπεν αὐτοῖς· Τί δειλοί ἐστε; ⸀οὔπω ἔχετε πίστιν;
translation:
  text: And he said to them, “Why are you so fearful? Do you still have no faith?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, “Why are you cowardly?”
    reason: lexical_alternative
  - marker: b
    text: Or “Do you not yet have faith?”
    reason: lexical_alternative
  - marker: c
    text: πίστις can also be understood here as “trust.”
    reason: alternative_reading
lexical_decisions:
- source_word: καὶ
  chosen: And
  lexicon: BDAG
  rationale: Standard connective linking this statement to the preceding narrative;
    simple coordination is sufficient.
- source_word: εἶπεν
  chosen: he said
  alternatives:
  - he told
  lexicon: BDAG
  rationale: λέγω in narrative commonly introduces direct speech. 'Said' is the most
    natural and transparent English rendering.
- source_word: αὐτοῖς
  chosen: to them
  lexicon: BDAG
  rationale: Dative plural pronoun marking the addressees of Jesus' speech.
- source_word: Τί
  chosen: Why
  alternatives:
  - What
  lexicon: BDAG
  rationale: Although literally 'what,' in this idiom with an adjective and 'to be'
    it functions adverbially as a rebuke meaning 'Why are you...?' This is standard
    idiomatic English.
- source_word: δειλοί
  chosen: fearful
  alternatives:
  - afraid
  - cowardly
  - timid
  lexicon: BDAG
  rationale: δειλός can carry the stronger sense 'cowardly,' but in this immediate
    context Jesus rebukes the disciples' fear during the storm rather than issuing
    a character verdict. 'Fearful' preserves the negative force without overstating
    it. 'Afraid' is possible but slightly flatter; 'cowardly' is preserved as an alternative
    because of the word's stronger lexical range.
- source_word: ἐστε
  chosen: are
  lexicon: BDAG
  rationale: Present indicative of 'to be,' completing the predicate 'are ... fearful.'
- source_word: οὔπω
  chosen: still
  alternatives:
  - not yet
  lexicon: BDAG
  rationale: οὔπω means 'not yet,' but in an English question after the preceding
    events, 'Do you still have no faith?' better conveys the temporal and rhetorical
    force. The more literal 'not yet' is preserved in a footnote.
- source_word: ἔχετε
  chosen: have
  lexicon: BDAG
  rationale: Straightforward present-tense possession/state verb governing πίστιν.
- source_word: πίστιν
  chosen: faith
  alternatives:
  - trust
  - faithfulness
  lexicon: BDAG
  rationale: Per doctrine defaults, πίστις is rendered 'faith' in the main text. In
    this context the sense overlaps with 'trust' in Jesus, but 'faith' remains the
    best default and preserves consistency. 'Trust' is preserved in a footnote as
    a contextual lexical alternative; 'faithfulness' is less likely here because the
    object is implicit confidence rather than fidelity.
