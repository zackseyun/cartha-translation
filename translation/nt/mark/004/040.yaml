theological_decisions:
- issue: Rendering πίστις in a context where 'trust' is contextually plausible
  chosen_reading: faith
  alternative_readings:
  - trust
  rationale: The doctrine excerpt specifies 'faith' as the default rendering for πίστις,
    with alternatives preserved in footnotes where contested. Here Jesus' rebuke concerns
    the disciples' confidence in him amid danger, so 'trust' is a viable contextual
    gloss, but the main text retains 'faith' for consistency and because the Greek
    noun itself is not explicitly expanded.
  doctrine_reference: 'DOCTRINE.md: Contested terms table (πίστις → faith; alternatives
    faithfulness, trust) and Translation philosophy #5'
