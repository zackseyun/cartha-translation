id: MRK.4.36
reference: Mark 4:36
source:
  edition: SBLGNT
  text: καὶ ἀφέντες τὸν ὄχλον παραλαμβάνουσιν αὐτὸν ὡς ἦν ἐν τῷ πλοίῳ, καὶ ἄλλα ⸀πλοῖα
    ἦν μετ’ αὐτοῦ.
translation:
  text: And leaving the crowd, they take him with them just as he was in the boat,
    and other boats were with him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'they took him along as he was.' The Greek may emphasize either that
      Jesus was already in the boat or that they took him without additional preparation.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀφέντες
  chosen: leaving
  alternatives:
  - having left
  - sending away
  lexicon: BDAG
  rationale: Aorist participle of ἀφίημι here introduces attendant action prior to
    the main verb. 'Leaving' is natural modern English and fits the sense of departing
    from the crowd without overstating a formal dismissal.
- source_word: ὄχλον
  chosen: the crowd
  alternatives:
  - the multitude
  lexicon: BDAG
  rationale: ὄχλος commonly refers to a gathered crowd. 'The crowd' is clear, contemporary,
    and contextually appropriate.
- source_word: παραλαμβάνουσιν
  chosen: they take him with them
  alternatives:
  - they take him
  - they receive him
  lexicon: BDAG
  rationale: παραλαμβάνω often means to take along or take with oneself. Including
    'with them' brings out the compound verb's nuance better than bare 'take'.
- source_word: ὡς ἦν
  chosen: just as he was
  alternatives:
  - as he was
  - in the condition he was in
  lexicon: BDAG
  rationale: The phrase most naturally indicates that they took Jesus without further
    preparation, in the state he was already in. 'Just as he was' is idiomatic and
    preserves that nuance.
- source_word: ἐν τῷ πλοίῳ
  chosen: in the boat
  alternatives:
  - in the ship
  lexicon: BDAG
  rationale: πλοῖον in this narrative setting is best rendered 'boat' in modern English.
    The prepositional phrase is retained with ὡς ἦν to show that he was already in
    the boat when they took him along.
- source_word: ἄλλα πλοῖα
  chosen: other boats
  alternatives:
  - other small boats
  lexicon: BDAG
  rationale: The plural noun with ἄλλα straightforwardly means 'other boats.' No adjective
    like 'small' is explicit in the Greek, so it should not be added.
- source_word: ἦν μετ’ αὐτοῦ
  chosen: were with him
  alternatives:
  - were accompanying him
  lexicon: BDAG
  rationale: 'Although ἦν is singular with a neuter plural subject, the sense in English
    is plural: ''were.'' μετ’ αὐτοῦ is most simply ''with him,'' preserving the understated
    narrative note that additional boats accompanied Jesus.'
