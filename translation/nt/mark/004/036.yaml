  from: they take him with them just as he was in the boat
  to: they take him with them in the boat, just as he was
  rationale: 'The Greek phrase `ὡς ἦν ἐν τῷ πλοίῳ` contains two distinct elements: Jesus''s state (`ὡς ἦν` - ''as he was'') and his location (`ἐν τῷ πλοίῳ` - ''in the boat''). The current rendering, ''just as he was in the boat,'' combines these into a single, slightly awkward English phrase that can be misread. Separating the elements, as in ''...in the boat, just as he was,'' more clearly distinguishes the location of the action from the state of the person, improving readability and naturalness without altering the meaning.'
