id: MRK.4.38
reference: Mark 4:38
source:
  edition: SBLGNT
  text: καὶ ⸂αὐτὸς ἦν⸃ ⸀ἐν τῇ πρύμνῃ ἐπὶ τὸ προσκεφάλαιον καθεύδων· καὶ ⸀ἐγείρουσιν
    αὐτὸν καὶ λέγουσιν αὐτῷ· Διδάσκαλε, οὐ μέλει σοι ὅτι ἀπολλύμεθα;
translation:
  text: But he himself was in the stern, asleep on the cushion; and they woke him
    and said to him, “Teacher, do you not care that we are perishing?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “on the pillow.” The Greek term can refer to a head-cushion or pillow.
    reason: lexical_alternative
lexical_decisions:
- source_word: αὐτὸς ἦν
  chosen: he himself was
  alternatives:
  - he was
  - he himself was there
  lexicon: BDAG
  rationale: The explicit pronoun αὐτός with ἦν is emphatic, so 'he himself' preserves
    the contrastive/emphatic force better than a simple 'he was.'
- source_word: πρύμνῃ
  chosen: stern
  alternatives:
  - back of the boat
  - rear
  lexicon: BDAG
  rationale: πρύμνα refers specifically to the stern or rear section of a boat. 'Stern'
    is precise yet still readable modern English.
- source_word: ἐπὶ τὸ προσκεφάλαιον
  chosen: on the cushion
  alternatives:
  - on the pillow
  - with his head on the cushion
  lexicon: BDAG
  rationale: προσκεφάλαιον denotes a cushion or pillow used for the head. 'Cushion'
    fits the likely boat setting and avoids over-specifying beyond the Greek.
- source_word: καθεύδων
  chosen: asleep
  alternatives:
  - sleeping
  lexicon: BDAG
  rationale: The participle describes Jesus' state at the time. 'Asleep' is idiomatic
    in English after 'was in the stern,' while preserving the sense of ongoing sleep.
- source_word: ἐγείρουσιν
  chosen: woke
  alternatives:
  - awoke
  - roused
  lexicon: BDAG
  rationale: Though formally present tense in the Greek narrative, English idiom normally
    renders this historical present with a past tense in narrative. 'Woke' is natural
    and accurate.
- source_word: λέγουσιν
  chosen: said
  alternatives:
  - say
  lexicon: BDAG
  rationale: Like ἐγείρουσιν, this is a historical present. English narrative style
    prefers past tense here.
- source_word: Διδάσκαλε
  chosen: Teacher
  alternatives:
  - Master
  lexicon: BDAG
  rationale: διδάσκαλος means 'teacher.' 'Master' would import a different nuance
    and is less lexically exact here.
- source_word: οὐ μέλει σοι
  chosen: do you not care
  alternatives:
  - does it not matter to you
  - are you not concerned
  lexicon: BDAG
  rationale: The idiom expresses concern or care. 'Do you not care' is the most direct
    and idiomatic rendering in this rebuking question.
- source_word: ἀπολλύμεθα
  chosen: we are perishing
  alternatives:
  - we are dying
  - we are being destroyed
  lexicon: BDAG
  rationale: The middle/passive form here conveys imminent ruin or death. 'We are
    perishing' preserves the vividness and urgency without flattening it to a mere
    statement of fear.
