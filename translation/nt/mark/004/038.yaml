theological_decisions:
- issue: Narrative force of the disciples' question to Jesus
  chosen_reading: Rendered as a sharp question, 'do you not care that we are perishing?'
  alternative_readings:
  - Rendered more softly as 'does it not matter to you that we are about to die?'
  rationale: The Greek wording is accusatory and urgent, not merely informational.
    The translation preserves the emotional force without adding theological interpretation
    about Jesus' motives or the disciples' faith.
  doctrine_reference: Preserve theological tension rather than resolve it.
