id: MRK.4.23
reference: Mark 4:23
source:
  edition: SBLGNT
  text: εἴ τις ἔχει ὦτα ἀκούειν ἀκουέτω.
translation:
  text: If anyone has ears to hear, let him hear.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more inclusively in English style, 'If anyone has ears to hear, let
      them hear.' The Greek is singular.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἴ
  chosen: If
  alternatives:
  - Whoever
  lexicon: BDAG
  rationale: Introduces a conditional-style saying. 'If' preserves the Greek form
    more directly than smoothing to 'whoever,' while still reading naturally in English.
- source_word: τις
  chosen: anyone
  alternatives:
  - someone
  - whoever
  lexicon: BDAG
  rationale: Indefinite pronoun with generic force. 'Anyone' is natural modern English
    and preserves the open, general address.
- source_word: ἔχει
  chosen: has
  alternatives:
  - possesses
  lexicon: BDAG
  rationale: Simple present indicative of possession; 'has' is the plain and idiomatic
    rendering.
- source_word: ὦτα
  chosen: ears
  lexicon: BDAG
  rationale: Literal plural of 'ear.' The plural is retained because the expression
    is idiomatic and conventional in English as well.
- source_word: ἀκούειν
  chosen: to hear
  alternatives:
  - for hearing
  - to listen
  lexicon: BDAG
  rationale: Present infinitive expressing purpose or capacity. 'To hear' preserves
    the idiom 'ears to hear' and echoes the repeated verb in the verse.
- source_word: ἀκουέτω
  chosen: let him hear
  alternatives:
  - let him listen
  - he should hear
  lexicon: BDAG
  rationale: Third-person present active imperative. 'Let him hear' is the established
    and accurate imperative form in English. 'Hear' is preferred over 'listen' to
    preserve the verbal repetition with ἀκούειν and the broader biblical sense of
    receptive hearing.
