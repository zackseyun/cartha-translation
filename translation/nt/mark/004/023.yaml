theological_decisions:
- issue: Generic masculine force in the imperative
  chosen_reading: let him hear
  alternative_readings:
  - let them hear
  rationale: The Greek uses an indefinite singular τις followed by a third-person
    singular imperative. Per the translation philosophy's gender-accurate principle,
    the representative singular is preserved as 'him' rather than flattened to plural
    'them.'
