id: MRK.4.29
reference: Mark 4:29
source:
  edition: SBLGNT
  text: ὅταν δὲ ⸀παραδοῖ ὁ καρπός, ⸀εὐθὺς ἀποστέλλει τὸ δρέπανον, ὅτι παρέστηκεν ὁ
    θερισμός.
translation:
  text: But when the crop permits it, he immediately sends in the sickle, because
    the harvest has arrived.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'yields,' 'is ripe,' or more literally 'gives itself up.' The Greek uses
      an unusual active expression with 'the crop' as subject.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅταν δὲ
  chosen: But when
  alternatives:
  - And when
  - Now when
  lexicon: BDAG
  rationale: ὅταν introduces an indefinite temporal clause ('when/whenever'), and
    δέ is lightly adversative or transitional. 'But when' preserves the discourse
    movement in readable English.
- source_word: παραδοῖ
  chosen: permits it
  alternatives:
  - yields
  - is ripe
  - delivers itself up
  lexicon: BDAG
  rationale: 'παραδίδωμι normally means ''hand over, deliver.'' Here, with ὁ καρπός
    as subject, the sense is idiomatic: the crop ''gives itself up'' or ''permits''
    harvesting, i.e., becomes ready. ''Permits it'' preserves the unusual active wording
    better than the interpretive ''is ripe,'' while remaining intelligible in English.'
- source_word: ὁ καρπός
  chosen: the crop
  alternatives:
  - the fruit
  - the grain
  lexicon: BDAG
  rationale: καρπός can mean 'fruit' broadly, but in an agricultural parable immediately
    followed by harvest imagery and a sickle, 'crop' best fits the field setting without
    narrowing too specifically to one kind of produce.
- source_word: εὐθὺς
  chosen: immediately
  alternatives:
  - at once
  - right away
  lexicon: BDAG
  rationale: Mark characteristically uses εὐθύς for prompt action. 'Immediately' is
    the standard clear rendering and preserves Mark's sense of urgency.
- source_word: ἀποστέλλει τὸ δρέπανον
  chosen: sends in the sickle
  alternatives:
  - puts in the sickle
  - sends the sickle
  lexicon: BDAG
  rationale: The Greek literally says 'sends the sickle,' an idiom for beginning reaping.
    'Sends in the sickle' preserves the metaphorical personification while sounding
    natural in English. 'Puts in the sickle' is also possible, but 'sends in' more
    closely reflects ἀποστέλλει.
- source_word: ὅτι
  chosen: because
  alternatives:
  - for
  lexicon: BDAG
  rationale: ὅτι here gives the reason for the immediate action. 'Because' is clearer
    in modern English than the more formal 'for.'
- source_word: παρέστηκεν
  chosen: has arrived
  alternatives:
  - is present
  - has come
  - is at hand
  lexicon: BDAG
  rationale: The perfect of παρίστημι conveys that the harvest has come and is now
    present. 'Has arrived' captures both the ingressive and resultant sense in idiomatic
    English.
- source_word: ὁ θερισμός
  chosen: the harvest
  alternatives:
  - harvest time
  - the reaping
  lexicon: BDAG
  rationale: θερισμός denotes the harvest/reaping. 'The harvest' is the most natural
    and sufficiently broad rendering in context.
