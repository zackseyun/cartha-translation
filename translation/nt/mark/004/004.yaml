id: MRK.4.4
reference: Mark 4:4
source:
  edition: SBLGNT
  text: καὶ ἐγένετο ἐν τῷ σπείρειν ὃ μὲν ἔπεσεν παρὰ τὴν ὁδόν, καὶ ἦλθεν τὰ πετεινὰ
    καὶ κατέφαγεν αὐτό.
translation:
  text: And as he was sowing, some seed fell along the path, and the birds came and
    devoured it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'beside the road.' The Greek phrase means 'alongside the ճանապարհ/pathway.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγένετο ἐν τῷ σπείρειν
  chosen: as he was sowing
  alternatives:
  - it happened while he was sowing
  - during the sowing
  lexicon: BDAG
  rationale: The construction ἐγένετο ἐν + articular infinitive is an idiomatic narrative
    way of introducing what occurred during an action. Rendering it as 'as he was
    sowing' gives natural English while preserving the temporal sense without the
    wooden 'it happened.'
- source_word: ὃ μὲν
  chosen: some seed
  alternatives:
  - one part
  - some
  lexicon: BDAG
  rationale: The neuter relative with μέν refers back distributively to the seed being
    sown. English requires an explicit subject; 'some seed' captures the partitive
    sense naturally in the parable context.
- source_word: ἔπεσεν
  chosen: fell
  lexicon: BDAG
  rationale: A straightforward rendering of the aorist verb πίπτω in this context.
- source_word: παρὰ τὴν ὁδόν
  chosen: along the path
  alternatives:
  - beside the road
  - by the path
  lexicon: BDAG
  rationale: παρά with the accusative here indicates position alongside. 'Along the
    path' is idiomatic and fits the agricultural image. 'Path' is preferable to 'road'
    in this field-setting context.
- source_word: τὰ πετεινὰ
  chosen: the birds
  alternatives:
  - the birds of the air
  - the birds of heaven
  lexicon: BDAG
  rationale: πετεινά commonly denotes birds. The shorter 'the birds' matches the Greek
    here, which does not include an added qualifier in this verse.
- source_word: κατέφαγεν
  chosen: devoured
  alternatives:
  - ate up
  - consumed
  lexicon: BDAG
  rationale: The compound verb κατεσθίω intensifies simple eating; 'devoured' preserves
    that force better than the flatter 'ate.'
- source_word: αὐτό
  chosen: it
  alternatives:
  - it up
  lexicon: BDAG
  rationale: The pronoun refers to the seed collectively represented by the distributive
    expression. Singular 'it' is natural English for the collective seed portion.
