theological_decisions:
- issue: Referent of 'the word' in the parable explanation
  chosen_reading: Rendered generically as 'the word' without specifying 'word of God'
    or 'gospel' in the main text.
  alternative_readings:
  - the message
  - the word of God
  rationale: The Greek text says only τὸν λόγον. While the broader context implies
    proclaimed divine message, expanding the phrase in translation would import interpretive
    content not explicit in this verse. This preserves theological tension and avoids
    over-interpretation.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Preserve theological tension rather than resolve it.'
