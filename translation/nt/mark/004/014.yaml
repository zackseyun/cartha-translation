id: MRK.4.14
reference: Mark 4:14
source:
  edition: SBLGNT
  text: ὁ σπείρων τὸν λόγον σπείρει.
translation:
  text: The sower sows the word.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the message.' The Greek word λόγος can mean 'word' or 'message' depending
      on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ σπείρων
  chosen: The sower
  alternatives:
  - The one who sows
  - The farmer
  lexicon: BDAG
  rationale: The articular present participle functions substantivally, referring
    to the person characterized by sowing. 'The sower' is concise, natural English
    and preserves the parabolic imagery better than the more wooden 'the one who sows.'
    'The farmer' is too interpretive, since the Greek specifically highlights the
    act of sowing rather than the broader occupation.
- source_word: τὸν λόγον
  chosen: the word
  alternatives:
  - the message
  lexicon: BDAG
  rationale: λόγος has a broad semantic range including 'word,' 'message,' and 'account.'
    In this immediate context Jesus is explaining the parable, and 'the word' is both
    the standard and sufficiently transparent rendering, preserving the connection
    to proclamation without narrowing it prematurely. 'The message' is possible but
    slightly more interpretive.
- source_word: σπείρει
  chosen: sows
  alternatives:
  - is sowing
  lexicon: BDAG
  rationale: The present indicative states the general action in proverbial/parabolic
    explanation. English simple present best matches this gnomic sense. Rendering
    both cognate forms from σπείρω with 'sower' and 'sows' preserves the rhetorical
    repetition in Greek.
