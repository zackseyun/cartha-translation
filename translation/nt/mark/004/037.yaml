id: MRK.4.37
reference: Mark 4:37
source:
  edition: SBLGNT
  text: καὶ γίνεται λαῖλαψ ⸂μεγάλη ἀνέμου⸃, ⸂καὶ τὰ⸃ κύματα ἐπέβαλλεν εἰς τὸ πλοῖον,
    ὥστε ⸂ἤδη γεμίζεσθαι τὸ πλοῖον⸃.
translation:
  text: And a great windstorm arose, and the waves were breaking into the boat, so
    that the boat was already filling.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'a great storm of wind.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the waves were beating into the boat.' The Greek imperfect verb portrays
      repeated action.
    reason: lexical_alternative
  - marker: c
    text: Or 'the boat was already being filled.'
    reason: lexical_alternative
lexical_decisions:
- source_word: γίνεται
  chosen: arose
  alternatives:
  - came about
  - began
  - happened
  lexicon: BDAG
  rationale: Although the verb is formally present ('comes to be'), in Mark's vivid
    narrative style it commonly functions as a historical present. 'Arose' gives natural
    English narrative flow while preserving the ingressive sense of the storm's onset.
- source_word: λαῖλαψ μεγάλη ἀνέμου
  chosen: a great windstorm
  alternatives:
  - a great storm of wind
  - a violent windstorm
  lexicon: BDAG
  rationale: λαῖλαψ denotes a whirlwind, squall, or violent storm; ἀνέμου specifies
    that it is wind-driven. 'Great windstorm' preserves both μέγαλη and the genitive
    qualifier without sounding wooden. 'Violent' is possible contextually, but 'great'
    more directly reflects μέγαλη.
- source_word: κύματα
  chosen: the waves
  alternatives:
  - waves
  - billows
  lexicon: BDAG
  rationale: Standard rendering of κῦμα. The article is naturally retained in English
    because the scene is specific and vivid.
- source_word: ἐπέβαλλεν εἰς τὸ πλοῖον
  chosen: were breaking into the boat
  alternatives:
  - were beating into the boat
  - were throwing themselves into the boat
  - kept coming into the boat
  lexicon: BDAG
  rationale: The imperfect ἐπέβαλλεν conveys repeated or ongoing action. In context,
    the subject is 'the waves,' so the sense is that wave after wave was striking
    and entering the boat. 'Were breaking into' captures both the repeated force and
    the movement into the boat in idiomatic English.
- source_word: πλοῖον
  chosen: boat
  alternatives:
  - ship
  lexicon: BDAG
  rationale: In the Sea of Galilee setting, 'boat' is the most natural modern English
    equivalent; 'ship' would sound too large and archaic for the likely vessel.
- source_word: ὥστε
  chosen: so that
  alternatives:
  - with the result that
  - so that as a result
  lexicon: BDAG
  rationale: ὥστε introduces result. 'So that' is concise, natural, and accurately
    reflects the clause connection.
- source_word: ἤδη
  chosen: already
  alternatives:
  - by now
  - even now
  lexicon: BDAG
  rationale: ἤδη marks that the filling had progressed to an advanced point. 'Already'
    is the most direct and idiomatic rendering.
- source_word: γεμίζεσθαι τὸ πλοῖον
  chosen: the boat was already filling
  alternatives:
  - the boat was already being filled
  - the boat was already filling up
  lexicon: BDAG
  rationale: The present infinitive γεμίζεσθαι after ὥστε expresses the resulting
    process. The passive/middle form can be rendered naturally in English as 'was
    filling,' which communicates the boat's state without awkwardness. 'Being filled'
    is more formally literal but less idiomatic.
