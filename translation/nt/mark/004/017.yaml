id: MRK.4.17
reference: Mark 4:17
source:
  edition: SBLGNT
  text: καὶ οὐκ ἔχουσιν ῥίζαν ἐν ἑαυτοῖς ἀλλὰ πρόσκαιροί εἰσιν, εἶτα γενομένης θλίψεως
    ἢ διωγμοῦ διὰ τὸν λόγον ⸀εὐθὺς σκανδαλίζονται.
translation:
  text: and they have no root in themselves, but are temporary; then, when affliction
    or persecution arises because of the word, they immediately fall away.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'stumble' or 'are caused to stumble.' The Greek verb can also carry the
      sense of taking offense or being tripped up.
    reason: lexical_alternative
lexical_decisions:
- source_word: ῥίζαν
  chosen: root
  alternatives:
  - deep root
  - firm root
  lexicon: BDAG
  rationale: Literal agricultural metaphor should be preserved, matching the seed/soil
    imagery in the parable. Adding 'deep' or 'firm' would over-interpret what the
    Greek does not explicitly state.
- source_word: ἐν ἑαυτοῖς
  chosen: in themselves
  alternatives:
  - within themselves
  lexicon: BDAG
  rationale: A direct rendering that preserves the reflexive sense. 'Within themselves'
    is possible, but 'in themselves' is slightly more formal and concise while remaining
    natural.
- source_word: πρόσκαιροί
  chosen: temporary
  alternatives:
  - short-lived
  - lasting only a while
  - inconstant
  lexicon: BDAG
  rationale: The adjective denotes something enduring only for a time. 'Temporary'
    is clear modern English and avoids importing a psychological nuance like 'inconstant'
    that is not explicit in the term itself.
- source_word: εἶτα
  chosen: then
  alternatives:
  - afterward
  - next
  lexicon: BDAG
  rationale: Marks subsequent development in a straightforward way. 'Then' fits the
    narrative flow naturally.
- source_word: γενομένης θλίψεως ἢ διωγμοῦ
  chosen: when affliction or persecution arises
  alternatives:
  - when trouble or persecution comes
  - when tribulation or persecution occurs
  lexicon: BDAG
  rationale: The genitive absolute is best rendered temporally with 'when ... arises.'
    θλῖψις is rendered 'affliction' to preserve the pressure/distress sense without
    archaic 'tribulation'; διωγμός is specifically 'persecution.' Singular verb in
    English naturally covers the paired nouns as a circumstance.
- source_word: διὰ τὸν λόγον
  chosen: because of the word
  alternatives:
  - on account of the word
  - because of the message
  lexicon: BDAG
  rationale: λόγος here refers to the proclaimed word/message in the parable context.
    'Word' preserves the repeated terminology of the passage and is sufficiently understandable;
    'message' is interpretive and less textually consistent.
- source_word: εὐθὺς
  chosen: immediately
  alternatives:
  - at once
  - right away
  lexicon: BDAG
  rationale: A standard rendering in Mark that preserves the Gospel's characteristic
    urgency. 'Immediately' is also useful for consistency across Mark.
- source_word: σκανδαλίζονται
  chosen: fall away
  alternatives:
  - stumble
  - are caused to stumble
  - take offense
  lexicon: BDAG
  rationale: In this context of initial reception followed by collapse under pressure,
    'fall away' best conveys the resulting apostasy/defection rather than mere emotional
    offense. The more literal 'stumble' is possible, but in English it can sound too
    mild unless footnoted.
