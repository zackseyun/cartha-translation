theological_decisions:
- issue: Rendering of σκανδαλίζονται in a discipleship/apostasy context
  chosen_reading: fall away
  alternative_readings:
  - stumble
  - are caused to stumble
  - take offense
  rationale: The verse describes those who receive the word briefly but do not endure
    under affliction or persecution. In context, the verb points beyond mere offense
    to abandonment of prior reception. 'Fall away' preserves that seriousness without
    making a stronger doctrinal claim about final salvation than the text itself states.
  doctrine_reference: Preserve theological tension rather than resolve it.
