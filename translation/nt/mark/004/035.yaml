id: MRK.4.35
reference: Mark 4:35
source:
  edition: SBLGNT
  text: Καὶ λέγει αὐτοῖς ἐν ἐκείνῃ τῇ ἡμέρᾳ ὀψίας γενομένης· Διέλθωμεν εἰς τὸ πέραν.
translation:
  text: And he says to them on that day, when evening had come, “Let us go across
    to the other side.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Let us cross over to the other side.”
    reason: lexical_alternative
lexical_decisions:
- source_word: λέγει
  chosen: he says
  alternatives:
  - he said
  lexicon: BDAG
  rationale: Rendered as present tense ('says') to preserve Mark's historical present,
    a notable narrative feature of this Gospel. English can bear the present here
    without undue awkwardness.
- source_word: ἐν ἐκείνῃ τῇ ἡμέρᾳ
  chosen: on that day
  alternatives:
  - in that day
  lexicon: BDAG
  rationale: Idiomatic English for the temporal dative phrase with ἐν is 'on that
    day.' This preserves the temporal reference without wooden phrasing.
- source_word: ὀψίας γενομένης
  chosen: when evening had come
  alternatives:
  - when it became evening
  - after evening came
  lexicon: BDAG
  rationale: This genitive absolute marks attendant time. 'When evening had come'
    is natural English and preserves the temporal sense without over-paraphrase.
- source_word: Διέλθωμεν
  chosen: Let us go across
  alternatives:
  - Let us cross over
  - Let us pass over
  lexicon: BDAG
  rationale: First person plural aorist subjunctive used hortatorily. 'Let us go across'
    is clear modern English and fits the immediate context of crossing the lake. 'Cross
    over' is possible, but 'go across' is slightly more natural here.
- source_word: εἰς τὸ πέραν
  chosen: to the other side
  alternatives:
  - to the far side
  - across
  lexicon: BDAG
  rationale: In this narrative context πέραν refers to the opposite side of the sea/lake.
    'To the other side' is the standard contextual sense and avoids ambiguity.
