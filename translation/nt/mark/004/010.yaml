id: MRK.4.10
reference: Mark 4:10
source:
  edition: SBLGNT
  text: ⸂Καὶ ὅτε⸃ ἐγένετο κατὰ μόνας, ⸀ἠρώτων αὐτὸν οἱ περὶ αὐτὸν σὺν τοῖς δώδεκα
    ⸂τὰς παραβολάς⸃.
translation:
  text: And when he was alone, those around him with the Twelve were asking him about
    the parables.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "those with him"; the phrase refers to Jesus' surrounding followers,
      not necessarily only the Twelve.
    reason: lexical_alternative
lexical_decisions:
- source_word: Καὶ ὅτε
  chosen: And when
  alternatives:
  - When
  lexicon: BDAG
  rationale: Retains the connective καί along with the temporal conjunction ὅτε. English
    can omit 'And' for style, but keeping it reflects Mark's narrative flow without
    sounding unnatural.
- source_word: ἐγένετο κατὰ μόνας
  chosen: he was alone
  alternatives:
  - he was by himself
  - it happened that he was alone
  lexicon: BDAG
  rationale: The idiom γίνομαι + κατὰ μόνας means being in private or alone. 'He was
    alone' is natural English and captures the sense better than a wooden 'it happened
    according to private.'
- source_word: ἠρώτων
  chosen: were asking
  alternatives:
  - asked
  - kept asking
  lexicon: BDAG
  rationale: Imperfect tense suggests ongoing or repeated action. 'Were asking' preserves
    that aspect in readable English; 'kept asking' is possible but slightly more interpretive.
- source_word: οἱ περὶ αὐτὸν
  chosen: those around him
  alternatives:
  - those with him
  - his companions
  lexicon: BDAG
  rationale: This expression refers to the broader circle surrounding Jesus, not merely
    spatial proximity at that instant. 'Those around him' is both literal enough and
    idiomatic, while leaving room for the distinction from 'the Twelve' that follows.
- source_word: σὺν τοῖς δώδεκα
  chosen: with the Twelve
  alternatives:
  - together with the Twelve
  lexicon: BDAG
  rationale: σύν marks accompaniment. 'With the Twelve' is concise and clear, preserving
    the distinction between the larger group and the Twelve.
- source_word: τὰς παραβολάς
  chosen: the parables
  alternatives:
  - the parable
  - these parables
  lexicon: BDAG
  rationale: The plural is strongly supported by the provided Greek text and should
    be reflected in translation. It likely refers to Jesus' parabolic teaching just
    given, not only a single saying.
