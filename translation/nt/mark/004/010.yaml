theological_decisions:
- issue: Identity of the questioning group
  chosen_reading: A broader group around Jesus, including the Twelve, asked him.
  alternative_readings:
  - Only the Twelve asked him
  - A private inner circle distinct from but accompanied by the Twelve asked him
  rationale: The syntax οἱ περὶ αὐτὸν σὺν τοῖς δώδεκα most naturally indicates those
    around Jesus together with the Twelve. The translation preserves the textual distinction
    without collapsing the group into the Twelve alone.
