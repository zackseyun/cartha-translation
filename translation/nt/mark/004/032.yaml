theological_decisions:
- issue: Intertextual imagery of birds sheltering in branches
  chosen_reading: Retain the imagery straightforwardly without making the allusive
    background explicit in the main text.
  alternative_readings:
  - Translate more literally as 'dwell' to preserve possible echoes of OT kingdom-tree
    imagery (e.g., Ezekiel 17; Daniel 4).
  rationale: The verse likely evokes Old Testament imagery of nations or creatures
    finding shelter in a great tree, but the Greek itself presents the image without
    explicit interpretation. The translation preserves the picture and leaves theological
    inference to readers and notes rather than importing it into the main text.
  doctrine_reference: Preserve theological tension rather than resolve it.
