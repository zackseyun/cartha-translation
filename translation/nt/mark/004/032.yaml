id: MRK.4.32
reference: Mark 4:32
source:
  edition: SBLGNT
  text: καὶ ὅταν σπαρῇ, ἀναβαίνει καὶ γίνεται ⸂μεῖζον πάντων τῶν λαχάνων⸃ καὶ ποιεῖ
    κλάδους μεγάλους, ὥστε δύνασθαι ὑπὸ τὴν σκιὰν αὐτοῦ τὰ πετεινὰ τοῦ οὐρανοῦ κατασκηνοῦν.
translation:
  text: and when it is sown, it comes up and becomes larger than all the garden plants,
    and it produces large branches, so that the birds of the sky are able to nest
    under its shade.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the birds of heaven' or, more traditionally, 'the birds of the air.'
    reason: lexical_alternative
  - marker: b
    text: Or 'to dwell' or 'to settle.' The wording may echo Old Testament imagery
      of birds finding shelter in a great tree (for example, Ezek 17:23; Dan 4:12).
    reason: cross_reference
lexical_decisions:
- source_word: σπαρῇ
  chosen: it is sown
  alternatives:
  - it has been sown
  - it is planted
  lexicon: BDAG
  rationale: Aorist passive subjunctive after ὅταν is naturally rendered as an indefinite
    temporal clause, 'when it is sown.' 'Planted' is possible in context, but 'sown'
    preserves the agricultural imagery and verbal link to the parable's seed language.
- source_word: ἀναβαίνει
  chosen: it comes up
  alternatives:
  - it rises
  - it grows up
  lexicon: BDAG
  rationale: In agricultural context ἀναβαίνω refers to upward emergence from the
    ground. 'Comes up' is idiomatic modern English and fits optimal equivalence better
    than the more wooden 'rises.'
- source_word: γίνεται
  chosen: becomes
  alternatives:
  - grows to be
  - is
  lexicon: BDAG
  rationale: 'γίνομαι here marks resulting state: the plant ''becomes'' something
    greater. This keeps the developmental sense without over-paraphrasing.'
- source_word: μεῖζον πάντων τῶν λαχάνων
  chosen: larger than all the garden plants
  alternatives:
  - greater than all the vegetables
  - the largest of all the garden plants
  lexicon: BDAG
  rationale: λάχανα refers to garden herbs/plants rather than trees. 'Garden plants'
    is natural English and avoids the narrower modern sense of 'vegetables' while
    preserving the contrast that the mustard seed grows beyond expected garden scale.
    'Larger than all' reflects the comparative construction directly.
- source_word: ποιεῖ κλάδους μεγάλους
  chosen: it produces large branches
  alternatives:
  - it makes great branches
  - it puts out large branches
  lexicon: BDAG
  rationale: ποιέω with κλάδους is idiomatically about producing or putting forth
    branches. 'Produces' is clear and faithful; 'makes' is too wooden in English.
- source_word: ὥστε δύνασθαι
  chosen: so that ... are able to
  alternatives:
  - with the result that ... can
  - so that ... can
  lexicon: BDAG
  rationale: ὥστε with infinitive expresses result. 'So that ... are able to' preserves
    the result nuance while remaining readable. The infinitival construction is represented
    in natural English.
- source_word: ὑπὸ τὴν σκιὰν αὐτοῦ
  chosen: under its shade
  alternatives:
  - under its shadow
  - beneath its shade
  lexicon: BDAG
  rationale: σκιά can be 'shadow' or 'shade'; in this context of sheltering birds,
    'shade' is the more idiomatic and contextually appropriate English choice.
- source_word: τὰ πετεινὰ τοῦ οὐρανοῦ
  chosen: the birds of the sky
  alternatives:
  - the birds of heaven
  - the birds of the air
  lexicon: BDAG
  rationale: A formally close rendering is 'birds of the sky.' 'Birds of the air'
    is traditional English, but 'sky' more directly reflects οὐρανός here without
    importing older idiom. The phrase also echoes scriptural imagery of birds finding
    shelter.
- source_word: κατασκηνοῦν
  chosen: to nest
  alternatives:
  - to dwell
  - to settle
  - to make nests
  lexicon: BDAG
  rationale: κατασκηνόω can mean dwell, settle, or encamp; with birds and shade/branches,
    'nest' captures the avian context naturally. This is a contextual rendering rather
    than a strictly wooden one, but it best communicates the image in idiomatic English.
