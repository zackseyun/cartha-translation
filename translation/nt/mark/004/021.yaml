id: MRK.4.21
reference: Mark 4:21
source:
  edition: SBLGNT
  text: Καὶ ἔλεγεν ⸀αὐτοῖς· Μήτι ⸂ἔρχεται ὁ λύχνος⸃ ἵνα ὑπὸ τὸν μόδιον τεθῇ ἢ ὑπὸ
    τὴν κλίνην, οὐχ ἵνα ἐπὶ τὴν λυχνίαν ⸀τεθῇ;
translation:
  text: And he was saying to them, “A lamp does not come to be put under a basket
    or under a bed, does it? Is it not to be put on the lampstand?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, “Does the lamp come to be put under the basket or under
      the bed?” The Greek uses a vivid, personified expression.
    reason: lexical_alternative
  - marker: b
    text: The Greek μόδιος refers to a measuring container; traditionally, “bushel.”
    reason: cultural_note
lexical_decisions:
- source_word: ἔλεγεν
  chosen: was saying
  alternatives:
  - said
  lexicon: BDAG
  rationale: Imperfect tense suggests ongoing or repeated speech in the narrative,
    so 'was saying' better reflects the aspect than simple 'said.'
- source_word: Μήτι
  chosen: does not ... does it?
  alternatives:
  - surely not
  - is it not the case that
  lexicon: BDAG
  rationale: Μήτι introduces a question expecting a negative answer. In idiomatic
    English this is best conveyed by a negatively framed question with a tag, preserving
    the rhetorical force.
- source_word: ἔρχεται ὁ λύχνος
  chosen: a lamp does not come
  alternatives:
  - the lamp comes
  - is a lamp brought
  lexicon: BDAG
  rationale: The Greek literally says 'does the lamp come,' personifying the lamp
    in a proverbial way. 'A lamp does not come' preserves the vividness better than
    smoothing to passive 'is brought,' while using the indefinite article suits proverbial
    English.
- source_word: λύχνος
  chosen: lamp
  alternatives:
  - light
  lexicon: BDAG
  rationale: λύχνος refers to the portable oil lamp itself, not light in the abstract.
    'Lamp' is the precise concrete rendering.
- source_word: μόδιον
  chosen: basket
  alternatives:
  - measuring basket
  - bushel basket
  - bushel
  lexicon: BDAG
  rationale: μόδιος is a dry measure and by extension the container used for it. 'Basket'
    is clear modern English; 'bushel' is traditional but can sound archaic or overly
    tied to English measurement systems.
- source_word: κλίνην
  chosen: bed
  alternatives:
  - couch
  lexicon: BDAG
  rationale: κλίνη can denote a bed or couch. 'Bed' is the most natural and broadly
    understandable choice in this domestic image.
- source_word: λυχνίαν
  chosen: lampstand
  alternatives:
  - stand
  lexicon: BDAG
  rationale: λυχνία is specifically a stand for a lamp. 'Lampstand' preserves the
    concrete image and avoids the vagueness of 'stand.'
- source_word: τεθῇ
  chosen: be put
  alternatives:
  - be placed
  - be set
  lexicon: BDAG
  rationale: Passive subjunctive of τίθημι after ἵνα is naturally rendered 'be put'
    in contemporary English; it is simple and fits the household metaphor.
- source_word: ἵνα ... τεθῇ
  chosen: to be put
  alternatives:
  - in order that it might be put
  - so that it may be placed
  lexicon: BDAG
  rationale: Here ἵνα expresses purpose/result within a rhetorical question. 'To be
    put' gives natural English while preserving the purposive sense.
