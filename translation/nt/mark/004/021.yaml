theological_decisions:
- issue: Whether to preserve the literal personification in 'the lamp comes' or interpret
    it more dynamically as 'is a lamp brought'
  chosen_reading: 'Preserve the active image: ''A lamp does not come ...'''
  alternative_readings:
  - Is a lamp brought ...?
  rationale: The saying is proverbial and intentionally vivid. Retaining the active
    wording keeps closer to the Greek and preserves the rhetorical force without creating
    serious misunderstanding in English.
  doctrine_reference: Translation philosophy §1, §6
- issue: Definiteness of ὁ λύχνος in a proverbial statement
  chosen_reading: Render generically as 'a lamp'
  alternative_readings:
  - the lamp
  rationale: Although the noun is articular in Greek, English proverbs commonly use
    the indefinite for generic reference. 'A lamp' communicates the general principle
    more naturally.
  doctrine_reference: Translation philosophy §6
