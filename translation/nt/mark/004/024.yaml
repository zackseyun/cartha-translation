id: MRK.4.24
reference: Mark 4:24
source:
  edition: SBLGNT
  text: καὶ ἔλεγεν αὐτοῖς· Βλέπετε τί ἀκούετε. ἐν ᾧ μέτρῳ μετρεῖτε μετρηθήσεται ὑμῖν
    καὶ προστεθήσεται ⸀ὑμῖν.
translation:
  text: And he was saying to them, “Pay attention to what you hear. With the measure
    you use, it will be measured to you, and more will be added to you.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'With whatever measure you measure, it will be measured to you.'
    reason: lexical_alternative
  - marker: b
    text: Some understand 'and more will be added to you' as referring to increased
      understanding for those who receive Jesus' teaching.
    reason: alternative_reading
lexical_decisions:
- source_word: ἔλεγεν
  chosen: he was saying
  alternatives:
  - he said
  - he kept saying
  lexicon: BDAG
  rationale: Imperfect tense suggests ongoing or repeated speech in narrative. 'He
    was saying' preserves that aspect more transparently than simple past, while remaining
    natural English.
- source_word: Βλέπετε
  chosen: Pay attention
  alternatives:
  - See to it
  - Watch out
  - Take heed
  lexicon: BDAG
  rationale: Though literally 'see/look,' in this idiom it functions as a warning
    or exhortation to careful attention. 'Pay attention' is clear modern English and
    fits optimal equivalence.
- source_word: τί ἀκούετε
  chosen: what you hear
  alternatives:
  - what you are hearing
  - how you hear
  lexicon: BDAG
  rationale: The direct object τί naturally yields 'what.' Luke 8:18 has 'how you
    hear,' but Mark's wording here is distinct and should not be harmonized. The present
    tense is naturally rendered in English as 'hear.'
- source_word: ἐν ᾧ μέτρῳ
  chosen: With the measure
  alternatives:
  - By the measure
  - In whatever measure
  lexicon: BDAG
  rationale: This dative construction introduces the standard or instrument by which
    measuring is done. 'With the measure' is idiomatic and preserves the metaphor.
- source_word: μετρεῖτε
  chosen: you use
  alternatives:
  - you measure
  - you mete out
  lexicon: BDAG
  rationale: Because English normally requires an object for 'measure,' and the object
    is implicit from μέτρῳ, 'you use' makes the metaphor readable without over-paraphrasing.
    The measuring idea is retained by the following passive 'it will be measured.'
- source_word: μετρηθήσεται ὑμῖν
  chosen: it will be measured to you
  alternatives:
  - it will be measured back to you
  - you will be measured by it
  lexicon: BDAG
  rationale: Future passive preserves the reciprocity principle. 'Back' is interpretive
    and not explicit in the Greek, so it is omitted from the main text.
- source_word: προστεθήσεται ὑμῖν
  chosen: more will be added to you
  alternatives:
  - it will be added to you
  - more will be given to you
  lexicon: BDAG
  rationale: The verb means 'to add.' Since the context implies increase beyond the
    original measure, 'more' makes the sense explicit and reflects common contextual
    understanding, while still staying close to the Greek idea of addition.
