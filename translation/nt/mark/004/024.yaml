theological_decisions:
- issue: Interpretation of the reciprocity saying
  chosen_reading: The saying is rendered as a general principle of reciprocal response
    to one's receptivity to Jesus' teaching, without specifying a narrower doctrinal
    application.
  alternative_readings:
  - A principle of judgment
  - A principle of generosity
  - A principle of spiritual receptivity and understanding
  rationale: The immediate context concerns hearing and receiving Jesus' message,
    so the translation preserves the broad metaphor without importing a specific theological
    system or limiting it to money, judgment, or merit.
  doctrine_reference: Preserve theological tension rather than resolve it.
