id: MRK.4.25
reference: Mark 4:25
source:
  edition: SBLGNT
  text: ὃς γὰρ ⸀ἔχει, δοθήσεται αὐτῷ· καὶ ὃς οὐκ ἔχει, καὶ ⸀ὃ ἔχει ἀρθήσεται ἀπ’ αὐτοῦ.
translation:
  text: For whoever has, more will be given to him; and whoever does not have, even
    what he has will be taken away from him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek simply 'will be given to him'; 'more' is implied by the saying's contrast
      and is supplied for natural English.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὃς
  chosen: whoever
  alternatives:
  - the one who
  - he who
  lexicon: BDAG
  rationale: Indefinite relative with generic force; 'whoever' conveys the proverbial,
    general application more naturally than the more formal 'he who.'
- source_word: γὰρ
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: BDAG
  rationale: Marks explanation/grounding of the previous saying; 'For' preserves the
    connective force succinctly.
- source_word: ἔχει
  chosen: has
  alternatives:
  - possesses
  lexicon: BDAG
  rationale: Simple present of possession. 'Has' is the most natural English equivalent
    and fits the proverb's concise style.
- source_word: δοθήσεται αὐτῷ
  chosen: more will be given to him
  alternatives:
  - it will be given to him
  - will be given to him
  lexicon: BDAG
  rationale: The Greek omits an explicit object ('will be given to him'), but English
    idiom in this construction normally supplies 'more,' reflecting the comparative
    sense implied by the parallel saying and common English usage without over-paraphrasing.
- source_word: καὶ
  chosen: and
  alternatives:
  - also
  - indeed
  lexicon: BDAG
  rationale: Coordinates the two halves of the antithetical proverb. 'And' preserves
    the straightforward connective structure.
- source_word: οὐκ ἔχει
  chosen: does not have
  alternatives:
  - has not
  lexicon: BDAG
  rationale: Standard negated possession; 'does not have' is clear modern English.
- source_word: ὃ ἔχει
  chosen: what he has
  alternatives:
  - that which he has
  - what he possesses
  lexicon: BDAG
  rationale: Neuter relative pronoun points to whatever possession is in view. 'What
    he has' is idiomatic and preserves the broad, unspecified reference.
- source_word: ἀρθήσεται ἀπ’ αὐτοῦ
  chosen: will be taken away from him
  alternatives:
  - will be removed from him
  lexicon: BDAG
  rationale: Future passive of αἴρω with ἀπό indicates removal. 'Taken away' is the
    standard, natural rendering in this context and matches the force of loss.
