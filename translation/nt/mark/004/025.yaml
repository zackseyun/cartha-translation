theological_decisions:
- issue: Supplying an implicit object in δοθήσεται
  chosen_reading: Render the clause as 'more will be given to him' in English.
  alternative_readings:
  - '''will be given to him'' with no supplied object'
  rationale: The Greek leaves the object unstated, but the saying's antithetical structure
    and normal English idiom strongly imply increase for the one who has. Supplying
    'more' clarifies the sense without importing a new theological claim; the context
    concerns increase and loss in response to receptivity.
  doctrine_reference: Translation philosophy §1, §6
- issue: Generic masculine reference
  chosen_reading: Use 'whoever ... him' rather than gender-neutral recasting.
  alternative_readings:
  - '''those who have ... them'''
  - '''whoever has ... them'''
  rationale: The Greek uses grammatically masculine singular forms with representative/generic
    force. Per doctrine, gender-accurate rendering is preferred over gender-neutral
    smoothing when the source is singular masculine.
  doctrine_reference: Translation philosophy §4
