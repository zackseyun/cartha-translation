id: MRK.4.20
reference: Mark 4:20
source:
  edition: SBLGNT
  text: καὶ ⸀ἐκεῖνοί εἰσιν οἱ ἐπὶ τὴν γῆν τὴν καλὴν σπαρέντες, οἵτινες ἀκούουσιν τὸν
    λόγον καὶ παραδέχονται καὶ καρποφοροῦσιν ⸂ἓν τριάκοντα καὶ ἓν ἑξήκοντα καὶ ἓν⸃
    ἑκατόν.
translation:
  text: 'And those are the ones sown on the good soil: they hear the word and receive
    it and bear fruit—thirtyfold and sixtyfold and a hundredfold.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'accept it' or 'welcome it' for 'receive it' (παραδέχονται).
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκεῖνοί
  chosen: those
  alternatives:
  - these
  lexicon: BDAG
  rationale: Demonstrative referring back to the final category in the parable explanation.
    'Those' fits the contrast with the other groups already described.
- source_word: οἱ ἐπὶ τὴν γῆν τὴν καλὴν σπαρέντες
  chosen: the ones sown on the good soil
  alternatives:
  - those sown upon the good ground
  - those planted in the good soil
  lexicon: BDAG
  rationale: Retains the passive participial image from the parable. 'Soil' is more
    natural modern English than 'ground' here, while preserving the agricultural metaphor.
    'On' reflects ἐπί with the accusative as in the seed-on-soils imagery of the context.
- source_word: γῆν τὴν καλὴν
  chosen: the good soil
  alternatives:
  - the good ground
  lexicon: BDAG
  rationale: γῆ can mean land/earth/ground; in this parable 'soil' best conveys cultivable
    earth in readable modern English. καλὴν is rendered 'good' in line with the evaluative
    contrast among soils.
- source_word: οἵτινες
  chosen: they
  alternatives:
  - who
  - such people as
  lexicon: BDAG
  rationale: The relative pronoun introduces the defining characteristics of this
    group. Rendering with a new clause 'they' produces natural English while preserving
    the explanatory force.
- source_word: ἀκούουσιν τὸν λόγον
  chosen: hear the word
  alternatives:
  - hear the message
  lexicon: BDAG
  rationale: λόγος in this context is the proclaimed word/message of the kingdom.
    'Word' preserves the parable's repeated terminology and intertextual resonance
    in Mark 4.
- source_word: παραδέχονται
  chosen: receive it
  alternatives:
  - accept it
  - welcome it
  lexicon: BDAG
  rationale: The verb conveys favorable reception/acceptance. 'Receive it' is concise,
    idiomatic, and preserves the sequence hear → receive → bear fruit. The object
    'it' is supplied in English from 'the word' for clarity.
- source_word: καρποφοροῦσιν
  chosen: bear fruit
  alternatives:
  - are fruitful
  - produce fruit
  lexicon: BDAG
  rationale: Standard agricultural metaphor that preserves both literal imagery and
    spiritual implication without over-interpreting.
- source_word: ἓν τριάκοντα καὶ ἓν ἑξήκοντα καὶ ἓν ἑκατόν
  chosen: thirtyfold and sixtyfold and a hundredfold
  alternatives:
  - thirty and sixty and a hundred
  - thirty times and sixty times and a hundred times
  lexicon: BDAG
  rationale: The idiom expresses yield amounts. 'Fold' makes the agricultural sense
    explicit in idiomatic English. The repeated καὶ is preserved with repeated 'and'
    rather than compressed into a list, matching the Greek rhythm.
