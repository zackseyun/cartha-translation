id: MRK.4.1
reference: Mark 4:1
source:
  edition: SBLGNT
  text: Καὶ πάλιν ἤρξατο διδάσκειν παρὰ τὴν θάλασσαν. καὶ ⸀συνάγεται πρὸς αὐτὸν ὄχλος
    ⸀πλεῖστος, ὥστε αὐτὸν ⸂εἰς πλοῖον ἐμβάντα⸃ καθῆσθαι ἐν τῇ θαλάσσῃ, καὶ πᾶς ὁ ὄχλος
    πρὸς τὴν θάλασσαν ἐπὶ τῆς γῆς ⸀ἦσαν.
translation:
  text: And again he began to teach beside the sea. And a very large crowd gathers
    to him, so that he got into a boat and sat on the sea, and the whole crowd was
    by the sea on the land.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'is gathering to him'; Mark frequently uses the historical present for
      vivid narration.
    reason: lexical_alternative
  - marker: b
    text: That is, on the water in a boat, while the crowd remained on land.
    reason: cultural_note
lexical_decisions:
- source_word: πάλιν
  chosen: again
  alternatives:
  - once more
  lexicon: BDAG
  rationale: Marks repetition of Jesus' teaching activity; 'again' is the most natural
    concise rendering.
- source_word: ἤρξατο διδάσκειν
  chosen: began to teach
  alternatives:
  - started teaching
  lexicon: BDAG
  rationale: Standard ingressive construction with complementary infinitive; 'began
    to teach' preserves the verbal aspect without unnecessary paraphrase.
- source_word: παρὰ τὴν θάλασσαν
  chosen: beside the sea
  alternatives:
  - by the sea
  - along the sea
  lexicon: BDAG
  rationale: παρά with the accusative here indicates location alongside. 'Sea' reflects
    θάλασσα directly; in Mark this refers to the Sea of Galilee, but the text itself
    says 'sea,' not 'lake.'
- source_word: συνάγεται
  chosen: gathers
  alternatives:
  - is gathering
  - gathered
  lexicon: BDAG
  rationale: Present tense in Mark often functions as a historical present. Rendering
    it as 'gathers' preserves the vivid narrative style better than flattening it
    to a simple past.
- source_word: ὄχλος πλεῖστος
  chosen: a very large crowd
  alternatives:
  - an extremely large crowd
  - a great crowd
  lexicon: BDAG
  rationale: πλεῖστος intensifies the size of the crowd. 'Very large crowd' is natural
    modern English and preserves the superlative force without sounding wooden.
- source_word: πρὸς αὐτόν
  chosen: to him
  alternatives:
  - around him
  lexicon: BDAG
  rationale: πρός here indicates movement toward Jesus. 'To him' is the most direct
    rendering.
- source_word: ὥστε
  chosen: so that
  alternatives:
  - with the result that
  lexicon: BDAG
  rationale: Introduces the result of the crowd's size. 'So that' is idiomatic and
    sufficiently precise.
- source_word: εἰς πλοῖον ἐμβάντα
  chosen: he got into a boat
  alternatives:
  - having stepped into a boat
  - entering a boat
  lexicon: BDAG
  rationale: The participle ἐμβάντα is subordinate to καθῆσθαι and describes Jesus
    boarding the boat. 'Got into a boat' is idiomatic English and preserves the action.
- source_word: πλοῖον
  chosen: boat
  alternatives:
  - small boat
  - vessel
  lexicon: BDAG
  rationale: πλοῖον in this setting is best rendered 'boat' in accessible modern English.
- source_word: καθῆσθαι
  chosen: sat
  alternatives:
  - was sitting
  - took his seat
  lexicon: BDAG
  rationale: Infinitive of result after ὥστε; 'sat' is concise and natural in English
    narrative.
- source_word: ἐν τῇ θαλάσσῃ
  chosen: on the sea
  alternatives:
  - in the sea
  - out on the sea
  lexicon: BDAG
  rationale: Although ἐν is literally 'in,' with a boat the sense is location on the
    water. 'On the sea' is the most natural English expression here.
- source_word: πᾶς ὁ ὄχλος
  chosen: the whole crowd
  alternatives:
  - all the crowd
  - the entire crowd
  lexicon: BDAG
  rationale: Collective singular in Greek is best rendered by a collective singular
    in English.
- source_word: πρὸς τὴν θάλασσαν
  chosen: by the sea
  alternatives:
  - facing the sea
  - toward the sea
  lexicon: BDAG
  rationale: In this context it describes the crowd's position at the shoreline. 'By
    the sea' is idiomatic and clear.
- source_word: ἐπὶ τῆς γῆς
  chosen: on the land
  alternatives:
  - on the shore
  - on the ground
  lexicon: BDAG
  rationale: γῆ can mean land/ground/earth. Here the contrast is between Jesus in
    the boat and the crowd on land. 'On the land' preserves that contrast more directly
    than the interpretive 'on the shore.'
