id: MRK.4.34
reference: Mark 4:34
source:
  edition: SBLGNT
  text: χωρὶς δὲ παραβολῆς οὐκ ἐλάλει αὐτοῖς, κατ’ ἰδίαν δὲ τοῖς ⸂ἰδίοις μαθηταῖς⸃
    ἐπέλυεν πάντα.
translation:
  text: And he was not speaking to them without a parable, but in private he was explaining
    everything to his own disciples.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'he explained all things' or 'he interpreted everything.' The verb can
      mean explain, interpret, or expound.
    reason: lexical_alternative
  - marker: b
    text: '''His own disciples'' preserves the emphasis of the Greek adjective meaning
      ''his own.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: χωρὶς
  chosen: without
  alternatives:
  - apart from
  lexicon: BDAG
  rationale: The preposition straightforwardly means 'without/apart from.' 'Without'
    is the most natural modern English rendering here.
- source_word: παραβολῆς
  chosen: a parable
  alternatives:
  - parable
  lexicon: BDAG
  rationale: 'Singular after χωρίς is idiomatic: ''without a parable.'' This preserves
    the concrete sense of Jesus'' mode of speaking rather than abstracting it.'
- source_word: ἐλάλει
  chosen: was speaking
  alternatives:
  - spoke
  lexicon: BDAG
  rationale: Imperfect tense suggests customary or ongoing action in this narrative
    summary. 'Was speaking' better reflects the imperfect than simple past 'spoke,'
    though the sense is iterative/habitual.
- source_word: αὐτοῖς
  chosen: to them
  lexicon: BDAG
  rationale: Dative indirect object referring to the crowds/listeners in context;
    standard rendering is sufficient.
- source_word: κατ’ ἰδίαν
  chosen: in private
  alternatives:
  - privately
  - by himself
  lexicon: BDAG
  rationale: This idiom means 'in private' or 'privately.' 'In private' is idiomatic
    English and fits the contrast with public parabolic speech.
- source_word: τοῖς ἰδίοις μαθηταῖς
  chosen: to his own disciples
  alternatives:
  - to his disciples
  - to the disciples who were his own
  lexicon: BDAG
  rationale: The adjective ἰδίοις adds possessive emphasis beyond the article+noun
    alone. 'His own disciples' preserves that emphasis better than simply 'his disciples.'
- source_word: ἐπέλυεν
  chosen: was explaining
  alternatives:
  - was interpreting
  - was expounding
  - explained
  lexicon: BDAG
  rationale: ἐπιλύω here means to explain or interpret. 'Was explaining' reflects
    both the imperfect aspect and accessible modern English. 'Interpreting' is possible
    but may sound overly technical; 'expounding' is less natural.
- source_word: πάντα
  chosen: everything
  alternatives:
  - all things
  - all of it
  lexicon: BDAG
  rationale: Neuter plural used comprehensively. 'Everything' is natural English and
    captures the totalizing sense.
