theological_decisions:
- issue: Scope of Jesus' private explanation
  chosen_reading: Rendered πάντα as 'everything' without narrowing it to only the
    parables in translation.
  alternative_readings:
  - everything he had said
  - all the parables
  - all things
  rationale: The Greek says simply 'everything.' Context may imply the content of
    his teaching/parables, but the translation should not restrict the scope beyond
    the text. This preserves the narrative emphasis that Jesus gave fuller explanation
    privately to his disciples.
  doctrine_reference: Preserve theological tension rather than resolve it.
