id: MRK.4.13
reference: Mark 4:13
source:
  edition: SBLGNT
  text: Καὶ λέγει αὐτοῖς· Οὐκ οἴδατε τὴν παραβολὴν ταύτην, καὶ πῶς πάσας τὰς παραβολὰς
    γνώσεσθε;
translation:
  text: And he says to them, “Do you not understand this parable? Then how will you
    understand all the parables?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, “Do you not know this parable? And how will you know
      all the parables?” The Greek verbs can be rendered 'know,' but here they carry
      the sense of understanding.
    reason: lexical_alternative
lexical_decisions:
- source_word: λέγει
  chosen: he says
  alternatives:
  - he said
  lexicon: BDAG
  rationale: Rendered as present tense ('says') to preserve Mark's characteristic
    historical present, which contributes to the narrative vividness.
- source_word: οἴδατε
  chosen: understand
  alternatives:
  - know
  lexicon: BDAG
  rationale: Although οἶδα often means 'know,' in this context with 'parable' the
    sense is comprehension rather than mere acquaintance. 'Understand' is more natural
    and accurately conveys the rebuke.
- source_word: παραβολὴν
  chosen: parable
  alternatives:
  - figure
  - illustration
  lexicon: BDAG
  rationale: '''Parable'' is the standard and contextually precise rendering for Jesus''
    teaching form here.'
- source_word: ταύτην
  chosen: this
  lexicon: BDAG
  rationale: Straightforward demonstrative referring to the immediately preceding
    parable.
- source_word: πῶς
  chosen: Then how
  alternatives:
  - and how
  - how
  lexicon: BDAG
  rationale: The conjunction plus interrogative introduces an inference from the first
    question to the second. 'Then how' makes the logic clear in idiomatic English
    without adding content beyond the Greek sense.
- source_word: πάσας τὰς παραβολὰς
  chosen: all the parables
  alternatives:
  - every parable
  lexicon: BDAG
  rationale: The plural with πᾶς is best represented as 'all the parables,' referring
    broadly to Jesus' parabolic teaching.
- source_word: γνώσεσθε
  chosen: will you understand
  alternatives:
  - will you know
  - will you come to know
  lexicon: BDAG
  rationale: Future middle of γινώσκω here concerns grasping the meaning of parables.
    'Understand' matches the contextual sense and pairs naturally with οἴδατε in the
    first clause.
