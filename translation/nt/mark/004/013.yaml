theological_decisions:
- issue: Relation between οἶδατε and γνώσεσθε
  chosen_reading: Both verbs are rendered with 'understand' in English for contextual
    coherence.
  alternative_readings:
  - Render first as 'know' and second as 'understand'
  - Render both as 'know'
  rationale: The verse concerns comprehension of Jesus' parables, not possession of
    information in the abstract. Using 'understand' for both clauses preserves the
    rhetorical force in natural English while reflecting the semantic overlap of οἶδα
    and γινώσκω in context.
  doctrine_reference: Translation philosophy §1, §5
