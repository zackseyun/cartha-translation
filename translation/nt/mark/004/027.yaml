id: MRK.4.27
reference: Mark 4:27
source:
  edition: SBLGNT
  text: καὶ καθεύδῃ καὶ ἐγείρηται νύκτα καὶ ἡμέραν, καὶ ὁ σπόρος ⸀βλαστᾷ καὶ μηκύνηται
    ὡς οὐκ οἶδεν αὐτός.
translation:
  text: and he sleeps and rises night and day, and the seed sprouts and grows long,
    though he himself does not know how.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'sprouts and grows' or 'sprouts and becomes tall.' The second verb specifically
      suggests lengthening or increasing in stature.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'as he does not know'; the sense is 'though he himself does not
      know how.'
    reason: lexical_alternative
lexical_decisions:
- source_word: καθεύδῃ
  chosen: he sleeps
  alternatives:
  - he should sleep
  - he is sleeping
  lexicon: BDAG
  rationale: Present subjunctive in this parabolic sequence functions idiomatically
    with the following verbs to describe repeated/ongoing action. English simple present
    best captures the general, iterative sense.
- source_word: ἐγείρηται
  chosen: rises
  alternatives:
  - gets up
  - is raised
  lexicon: BDAG
  rationale: Middle/passive form here is intransitive and idiomatic for waking/getting
    up. 'Rises' is concise and preserves the rhythm of the Greek without implying
    resurrection.
- source_word: νύκτα καὶ ἡμέραν
  chosen: night and day
  alternatives:
  - by night and by day
  - night after day
  lexicon: BDAG
  rationale: This accusative expression is an idiom for the ongoing cycle of time.
    'Night and day' is natural English and preserves the merism.
- source_word: σπόρος
  chosen: the seed
  alternatives:
  - seed
  - the grain
  lexicon: BDAG
  rationale: With the article, 'the seed' refers back to the seed sown in the parable.
    'Seed' is preferable to 'grain' because the emphasis is on what was sown and its
    growth process.
- source_word: βλαστᾷ
  chosen: sprouts
  alternatives:
  - springs up
  - germinates
  lexicon: BDAG
  rationale: '''Sprouts'' is clear modern English for the beginning of plant growth.
    ''Springs up'' is traditional but slightly more interpretive and less precise
    for the first stage of growth.'
- source_word: μηκύνηται
  chosen: grows long
  alternatives:
  - grows
  - becomes tall
  lexicon: BDAG
  rationale: The verb specifically conveys becoming longer/taller, not merely generic
    growth. 'Grows long' preserves that nuance more closely than the flatter 'grows,'
    while remaining readable.
- source_word: ὡς
  chosen: though
  alternatives:
  - as
  - how
  lexicon: BDAG
  rationale: 'In this construction with οὐκ οἶδεν, the sense is concessive/resultative
    in context: the growth happens while the man does not understand the manner of
    it. Rendering the clause with ''though'' communicates the relationship naturally
    in English.'
- source_word: οὐκ οἶδεν αὐτός
  chosen: he himself does not know how
  alternatives:
  - he does not know how
  - he himself does not know
  lexicon: BDAG
  rationale: The idiom ὡς οὐκ οἶδεν αὐτός is commonly understood as 'how he does not
    know.' Including 'how' in English makes the sense explicit and natural. 'Himself'
    reflects the emphatic αὐτός.
