theological_decisions:
- issue: Personal agency of Satan in the parable's explanation
  chosen_reading: Render ὁ Σατανᾶς straightforwardly as the personal figure 'Satan'
    who comes and removes the word.
  alternative_readings:
  - A more impersonal rendering such as 'the adversary'
  rationale: The Greek uses the articular proper name/title in a way that naturally
    denotes the personal evil one in Jesus' teaching. The translation should not demythologize
    or reduce this to a mere abstraction.
  doctrine_reference: Affirmations; preserve theological tension rather than resolve
    it
