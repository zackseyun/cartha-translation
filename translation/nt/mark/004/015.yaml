id: MRK.4.15
reference: Mark 4:15
source:
  edition: SBLGNT
  text: οὗτοι δέ εἰσιν οἱ παρὰ τὴν ὁδὸν ὅπου σπείρεται ὁ λόγος, καὶ ὅταν ἀκούσωσιν
    ⸀εὐθὺς ἔρχεται ὁ Σατανᾶς καὶ αἴρει τὸν λόγον τὸν ἐσπαρμένον ⸂εἰς αὐτούς⸃.
translation:
  text: 'And these are the ones along the road where the word is sown: when they hear,
    Satan immediately comes and takes away the word that was sown in them.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the word that was sown into them.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οὗτοι δέ εἰσιν
  chosen: And these are
  alternatives:
  - Now these are
  - These are
  lexicon: BDAG
  rationale: οὗτοι with εἰσιν identifies the referent in Jesus' explanation of the
    parable. δέ is lightly connective; 'And' preserves discourse flow without overtranslating
    contrast.
- source_word: οἱ παρὰ τὴν ὁδόν
  chosen: the ones along the road
  alternatives:
  - those beside the path
  - the ones by the roadside
  lexicon: BDAG
  rationale: παρά with the accusative here indicates position alongside. ὁδός can
    be 'road,' 'way,' or 'path'; 'road' is a natural rendering that still matches
    the agricultural image. 'The ones' makes explicit that the seed image refers to
    people.
- source_word: ὅπου
  chosen: where
  alternatives:
  - in the place where
  lexicon: BDAG
  rationale: Simple locative relative adverb linking the people metaphorically to
    the place where sowing occurs.
- source_word: σπείρεται ὁ λόγος
  chosen: the word is sown
  alternatives:
  - the message is sown
  lexicon: BDAG
  rationale: λόγος in this parable refers to the proclaimed word/message. 'Word' preserves
    the repeated term and biblical resonance; passive 'is sown' reflects the Greek.
- source_word: ὅταν ἀκούσωσιν
  chosen: when they hear
  alternatives:
  - whenever they hear
  - when they have heard
  lexicon: BDAG
  rationale: ὅταν with aorist subjunctive gives a general temporal sense. 'When they
    hear' is idiomatic and fits the explanatory style.
- source_word: εὐθύς
  chosen: immediately
  alternatives:
  - at once
  - right away
  lexicon: BDAG
  rationale: Mark characteristically uses εὐθύς for immediacy. 'Immediately' preserves
    that urgency and is standard modern English.
- source_word: ὁ Σατανᾶς
  chosen: Satan
  alternatives:
  - the Adversary
  lexicon: BDAG
  rationale: Proper name/title used personally here; standard transliteration is appropriate
    and matches NT usage.
- source_word: ἔρχεται
  chosen: comes
  alternatives:
  - arrives
  lexicon: BDAG
  rationale: Present tense in narrative explanation is naturally rendered 'comes.'
- source_word: αἴρει
  chosen: takes away
  alternatives:
  - snatches away
  - removes
  lexicon: BDAG
  rationale: αἴρω can mean lift, take, remove. 'Takes away' is broad and faithful;
    'snatches away' is possible but slightly more interpretive than the Greek requires
    here.
- source_word: τὸν λόγον
  chosen: the word
  alternatives:
  - the message
  lexicon: BDAG
  rationale: Repeated term should remain consistent within the verse; 'word' preserves
    the thematic repetition.
- source_word: τὸν ἐσπαρμένον εἰς αὐτούς
  chosen: that was sown in them
  alternatives:
  - that was sown into them
  - that was sown among them
  lexicon: BDAG
  rationale: The participle is adjectival, modifying 'the word.' εἰς αὐτούς is best
    taken as 'into/in them,' reflecting internal reception of the word. 'Among them'
    is less likely because the explanation concerns individual hearers rather than
    a crowd setting.
