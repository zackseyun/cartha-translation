id: MRK.4.19
reference: Mark 4:19
source:
  edition: SBLGNT
  text: καὶ αἱ μέριμναι τοῦ ⸀αἰῶνος καὶ ἡ ἀπάτη τοῦ πλούτου καὶ αἱ περὶ τὰ λοιπὰ ἐπιθυμίαι
    εἰσπορευόμεναι συμπνίγουσιν τὸν λόγον, καὶ ἄκαρπος γίνεται.
translation:
  text: and the cares of the age, and the deceitfulness of riches, and the desires
    for other things entering in choke the word, and it becomes unfruitful.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the cares of the world.' The Greek word can mean 'age' or, by extension,
      the present world-order; 'age' is preferred here to preserve the source term's
      temporal nuance.
    reason: lexical_alternative
  - marker: b
    text: Or 'the deceit of wealth.'
    reason: lexical_alternative
  - marker: c
    text: Or 'the word becomes barren' or 'the hearer becomes unfruitful.' The Greek
      most directly says 'it becomes unfruitful,' with 'the word' as the nearest antecedent.
    reason: alternative_reading
  - marker: d
    text: Or 'and desires for other things entering in, choke the word'.
    reason: previous_rendering
lexical_decisions:
- source_word: μέριμναι
  chosen: cares
  alternatives:
  - anxieties
  - worries
  lexicon: BDAG
  rationale: μέριμνα denotes cares or anxieties. 'Cares' is concise and idiomatic
    here, while preserving the burdening sense without over-psychologizing the term.
- source_word: αἰῶνος
  chosen: age
  alternatives:
  - world
  lexicon: BDAG
  rationale: αἰών more basically means 'age' than 'world.' 'Age' preserves the temporal
    and moral sense of the present order better than the traditional 'world,' in keeping
    with original-language primacy.
- source_word: ἀπάτη
  chosen: deceitfulness
  alternatives:
  - deceit
  - delusion
  lexicon: BDAG
  rationale: The noun here describes the misleading character of wealth. 'Deceitfulness'
    makes explicit that riches deceive, fitting the genitival construction and common
    English usage in this context.
- source_word: πλούτου
  chosen: riches
  alternatives:
  - wealth
  lexicon: BDAG
  rationale: '''Riches'' is a natural rendering with ''deceitfulness'' and reflects
    the broader idea of material abundance, not merely financial systems.'
- source_word: αἱ περὶ τὰ λοιπὰ ἐπιθυμίαι
  chosen: desires for other things
  alternatives:
  - desires for the rest of the things
  - cravings for other things
  lexicon: BDAG
  rationale: The phrase refers to desires directed toward other matters besides the
    word. 'Desires for other things' is clear modern English and preserves the broad
    scope of λοιπά without unnecessary literal awkwardness.
- source_word: εἰσπορευόμεναι
  chosen: entering in
  alternatives:
  - coming in
  - entering
  lexicon: BDAG
  rationale: The participle depicts these competing influences as intruding upon the
    person/soil. 'Entering in' preserves the vivid process and echoes the agricultural
    imagery.
- source_word: συμπνίγουσιν
  chosen: choke
  alternatives:
  - crowd out
  - strangle
  lexicon: BDAG
  rationale: The verb literally conveys choking together or suffocating. 'Choke' is
    the most direct and image-preserving choice in the parable context.
- source_word: τὸν λόγον
  chosen: the word
  alternatives:
  - the message
  lexicon: BDAG
  rationale: In Mark's parable context, λόγος refers to the proclaimed word/message.
    'The word' preserves the biblical idiom and intertextual resonance while remaining
    understandable.
- source_word: ἄκαρπος γίνεται
  chosen: it becomes unfruitful
  alternatives:
  - it proves unfruitful
  - it bears no fruit
  lexicon: BDAG
  rationale: The singular adjective with γίνεται describes the resulting state of
    the word/seed. 'It becomes unfruitful' closely follows the Greek and preserves
    the process-result sense.
