theological_decisions:
- issue: Portrayal of Jesus' authority over creation
  chosen_reading: Retain the straightforward language of the disciples' astonishment
    without expanding it into an explicit doctrinal statement.
  alternative_readings:
  - Use more interpretive wording that foregrounds divine identity, such as 'Who can
    this be?' with explanatory expansion
  rationale: The verse itself presents the disciples' question and the obedience of
    wind and sea, strongly implying extraordinary authority. The translation should
    preserve that theological weight without importing conclusions beyond the text's
    wording.
  doctrine_reference: 'Affirmations; Translation philosophy #3'
