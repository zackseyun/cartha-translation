id: MRK.4.41
reference: Mark 4:41
source:
  edition: SBLGNT
  text: καὶ ἐφοβήθησαν φόβον μέγαν, καὶ ἔλεγον πρὸς ἀλλήλους· Τίς ἄρα οὗτός ἐστιν
    ὅτι καὶ ὁ ἄνεμος καὶ ἡ θάλασσα ⸀ὑπακούει αὐτῷ;
translation:
  text: And they were filled with great fear, and they said to one another, “Who then
    is this, that even the wind and the sea obey him?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'they feared a great fear.' The Greek uses an intensified
      expression.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐφοβήθησαν φόβον μέγαν
  chosen: were filled with great fear
  alternatives:
  - feared a great fear
  - became very afraid
  lexicon: BDAG
  rationale: The verb with cognate accusative intensifies the idea. A wooden rendering
    ('feared a great fear') is possible but unnatural in modern English. 'Were filled
    with great fear' preserves the emphatic force while remaining readable.
- source_word: ἔλεγον
  chosen: they said
  alternatives:
  - they were saying
  - they kept saying
  lexicon: BDAG
  rationale: The imperfect can suggest ongoing or repeated speech, but in English
    narrative simple past is often the best optimal-equivalence rendering unless durative
    force is especially prominent. The context supports a natural narrative past.
- source_word: πρὸς ἀλλήλους
  chosen: to one another
  alternatives:
  - among themselves
  - to each other
  lexicon: BDAG
  rationale: This directly conveys reciprocal speech in idiomatic English.
- source_word: Τίς ἄρα οὗτός ἐστιν
  chosen: Who then is this
  alternatives:
  - Who is this, then
  - Who indeed is this
  lexicon: BDAG
  rationale: ἄρα adds an inferential or astonished 'then/after all' nuance. 'Who then
    is this' preserves the sense of startled inference after the calming of the storm.
- source_word: ὅτι
  chosen: that
  alternatives:
  - for
  - because
  lexicon: BDAG
  rationale: 'Here ὅτι introduces the content or result that grounds their question:
    ''that even the wind and the sea obey him.'' ''That'' is the most natural connector
    in English.'
- source_word: καὶ ὁ ἄνεμος καὶ ἡ θάλασσα
  chosen: even the wind and the sea
  alternatives:
  - both the wind and the sea
  - the wind and even the sea
  lexicon: BDAG
  rationale: The καὶ before ὁ ἄνεμος functions adverbially ('even'), heightening astonishment;
    the second καὶ coordinates the two subjects. 'Even the wind and the sea' best
    captures the emphasis.
- source_word: ὑπακούει αὐτῷ
  chosen: obey him
  alternatives:
  - listen to him
  - submit to him
  lexicon: BDAG
  rationale: ὑπακούω commonly means 'obey' or 'heed.' 'Obey him' best fits the personified
    portrayal of wind and sea responding to Jesus' command and preserves the force
    of his authority.
