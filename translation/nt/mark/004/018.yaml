theological_decisions:
- issue: Metaphorical identification of people with seed in the parable explanation
  chosen_reading: 'Retain the literal parabolic metaphor: ''those sown among the thorns'''
  alternative_readings:
  - those planted among the thorns
  - those who are sown in thorny ground
  rationale: The Greek explicitly continues the seed metaphor rather than immediately
    unpacking it into a non-metaphorical paraphrase. Preserving the metaphor maintains
    the literary structure of Jesus' explanation without importing interpretive expansion.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve the source
    text''s plain sense without paraphrase beyond what it warrants.'
