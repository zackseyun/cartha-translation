theological_decisions:
- issue: Meaning of μυστήριον in relation to the kingdom
  chosen_reading: Retain 'mystery' rather than interpretively expanding it to 'secret
    plan' or similar.
  alternative_readings:
  - secret
  - secret of the kingdom of God
  rationale: The term carries theological weight in biblical usage as divine truth
    hidden and revealed. Preserving 'mystery' maintains that tension without importing
    a narrower doctrinal explanation.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather
    than resolve it.
- issue: Identity of τοῖς ἔξω
  chosen_reading: Render as 'those outside' rather than a more defined theological
    category.
  alternative_readings:
  - outsiders
  - those who are not among the disciples
  rationale: The Greek marks a contrast between Jesus' hearers/disciples and others,
    but does not explicitly define the outsiders' spiritual status here. The translation
    should not sharpen the category beyond the text.
  doctrine_reference: Affirmations; Translation philosophy §1 and §3.
