id: MRK.4.11
reference: Mark 4:11
source:
  edition: SBLGNT
  text: καὶ ἔλεγεν αὐτοῖς· Ὑμῖν ⸂τὸ μυστήριον δέδοται⸃ τῆς βασιλείας τοῦ θεοῦ· ἐκείνοις
    δὲ τοῖς ἔξω ἐν παραβολαῖς τὰ πάντα γίνεται,
translation:
  text: And he was saying to them, “To you the mystery of the kingdom of God has been
    given, but to those outside everything comes in parables,”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “but to outsiders everything happens in parables.”
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔλεγεν
  chosen: was saying
  alternatives:
  - said
  lexicon: BDAG
  rationale: Imperfect tense suggests ongoing or repeated speech in narrative context;
    'was saying' preserves that aspect better than simple past 'said,' while remaining
    natural English.
- source_word: Ὑμῖν
  chosen: to you
  alternatives:
  - for you
  lexicon: BDAG
  rationale: Dative pronoun here marks the recipients of what has been given; 'to
    you' is the most direct and natural rendering.
- source_word: μυστήριον
  chosen: mystery
  alternatives:
  - secret
  - hidden truth
  lexicon: BDAG
  rationale: '''Mystery'' best preserves the biblical-theological sense of something
    once hidden and now disclosed by God. ''Secret'' is possible but can sound trivial
    or merely esoteric.'
- source_word: δέδοται
  chosen: has been given
  alternatives:
  - is given
  - was given
  lexicon: BDAG
  rationale: Perfect passive indicates a completed act with present result; 'has been
    given' reflects both the passive voice and the continuing state.
- source_word: βασιλείας
  chosen: kingdom
  alternatives:
  - reign
  - rule
  lexicon: BDAG
  rationale: '''Kingdom'' is the standard and contextually fitting rendering, though
    ''reign'' or ''rule'' can emphasize dynamic kingship. Here the established phrase
    ''kingdom of God'' is both accurate and readable.'
- source_word: ἐκείνοις δὲ τοῖς ἔξω
  chosen: but to those outside
  alternatives:
  - but to outsiders
  - but to those who are outside
  lexicon: BDAG
  rationale: This preserves the dative construction and the spatial-metaphorical force
    of ἔξω without overinterpreting group identity. 'Outsiders' is concise but slightly
    more interpretive.
- source_word: ἐν παραβολαῖς
  chosen: in parables
  alternatives:
  - by parables
  - through parables
  lexicon: BDAG
  rationale: '''In parables'' is the most straightforward rendering of ἐν + dative
    and matches common English usage in Gospel contexts.'
- source_word: τὰ πάντα
  chosen: everything
  alternatives:
  - all things
  lexicon: BDAG
  rationale: '''Everything'' is idiomatic modern English and adequately represents
    the comprehensive force of the phrase.'
- source_word: γίνεται
  chosen: comes
  alternatives:
  - happens
  - takes place
  - is done
  - comes about
  lexicon: BDAG
  rationale: In this context γίνομαι conveys that matters come to those outside in
    the form of parables. 'Comes' is concise and natural; 'is done' is too wooden,
    and 'happens' is too vague.
