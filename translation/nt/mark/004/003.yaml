id: MRK.4.3
reference: Mark 4:3
source:
  edition: SBLGNT
  text: Ἀκούετε. ἰδοὺ ἐξῆλθεν ὁ ⸀σπείρων σπεῖραι.
translation:
  text: Listen! Behold, the sower went out to sow.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Hear! Look, the one sowing went out to sow.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀκούετε
  chosen: Listen!
  alternatives:
  - Hear!
  lexicon: BDAG
  rationale: Present active imperative, second person plural, functioning as an attention-command.
    'Listen!' is idiomatic modern English and preserves the force better than the
    more archaic-sounding 'Hear!'.
- source_word: ἰδού
  chosen: Behold,
  alternatives:
  - Look,
  - See,
  lexicon: BDAG
  rationale: Discourse particle drawing attention to what follows. 'Behold' preserves
    the marked, narrative-alerting force of the Greek, though 'Look' or 'See' are
    possible in more dynamic renderings.
- source_word: ἐξῆλθεν
  chosen: went out
  alternatives:
  - came out
  - went forth
  lexicon: BDAG
  rationale: Aorist active indicative of ἐξέρχομαι, denoting movement outward. 'Went
    out' is the most natural English equivalent in this context.
- source_word: ὁ σπείρων
  chosen: the sower
  alternatives:
  - the one sowing
  - the one who sows
  lexicon: BDAG
  rationale: Articular present participle used substantivally. In context it functions
    as a role designation, so 'the sower' is the clearest and most idiomatic rendering.
- source_word: σπεῖραι
  chosen: to sow
  alternatives:
  - for sowing
  lexicon: BDAG
  rationale: Aorist active infinitive expressing purpose after ἐξῆλθεν. 'To sow' straightforwardly
    conveys the infinitival purpose construction.
