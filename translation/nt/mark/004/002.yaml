id: MRK.4.2
reference: Mark 4:2
source:
  edition: SBLGNT
  text: καὶ ἐδίδασκεν αὐτοὺς ἐν παραβολαῖς πολλά καὶ ἔλεγεν αὐτοῖς ἐν τῇ διδαχῇ αὐτοῦ·
translation:
  text: 'And he was teaching them many things in parables, and in his teaching he
    was saying to them:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'he taught them much in parables.' The Greek πολλά may be rendered 'many
      things' or more compactly 'much.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐδίδασκεν
  chosen: he was teaching
  alternatives:
  - he taught
  lexicon: BDAG
  rationale: Imperfect tense indicates ongoing or repeated action in the scene; 'was
    teaching' preserves the narrative aspect better than simple past.
- source_word: ἐν παραβολαῖς
  chosen: in parables
  alternatives:
  - with parables
  - by parables
  lexicon: BDAG
  rationale: A straightforward rendering of ἐν + dative here, expressing manner or
    medium. 'In parables' is idiomatic and preserves the Greek phrasing.
- source_word: πολλά
  chosen: many things
  alternatives:
  - much
  lexicon: BDAG
  rationale: Neuter plural accusative used adverbially/objectively with ἐδίδασκεν;
    'many things' is the most natural English expression and reflects the breadth
    of his instruction.
- source_word: ἔλεγεν
  chosen: he was saying
  alternatives:
  - he said
  lexicon: BDAG
  rationale: Like ἐδίδασκεν, this imperfect verb presents ongoing discourse. 'Was
    saying' keeps the narrative flow into the direct speech that follows in the next
    verse.
- source_word: ἐν τῇ διδαχῇ αὐτοῦ
  chosen: in his teaching
  alternatives:
  - in his instruction
  - as he taught
  lexicon: BDAG
  rationale: διδαχή can mean 'teaching' or 'instruction.' 'In his teaching' closely
    follows the Greek construction and links what follows to the content/mode of Jesus'
    instruction rather than paraphrasing it away.
- source_word: καὶ
  chosen: And
  alternatives:
  - Now
  - Then
  lexicon: BDAG
  rationale: Retained at the start for narrative continuity with the previous verse.
    Mark frequently uses καί paratactically, and preserving it here reflects his style.
- source_word: αὐτοὺς / αὐτοῖς
  chosen: them / to them
  lexicon: BDAG
  rationale: The accusative with ἐδίδασκεν is naturally 'them' as direct object, while
    the dative with ἔλεγεν is 'to them.' English requires the distinction to reflect
    the Greek syntax accurately.
