theological_decisions:
- issue: Purpose/result nuance in the repeated ἵνα clauses
  chosen_reading: 'Render the clauses with purposive force: hidden/concealed things
    are so ''to be revealed'' / ''to come into the open.'''
  alternative_readings:
  - 'Render as simple result: ''except that it will be revealed'''
  - Treat as a Semitic idiom meaning merely 'but only' without strong purpose nuance
  rationale: The Greek uses ἵνα in both halves, which normally signals purpose, though
    in Koine it can shade toward result. The saying emphasizes that hiddenness is
    not ultimate but ordered toward disclosure. The translation preserves that tension
    without overstating a theological claim about divine causation.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
