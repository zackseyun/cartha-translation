id: MRK.4.22
reference: Mark 4:22
source:
  edition: SBLGNT
  text: οὐ γάρ ἐστιν ⸀κρυπτὸν ἐὰν μὴ ⸀ἵνα φανερωθῇ, οὐδὲ ἐγένετο ἀπόκρυφον ἀλλ’ ἵνα
    ⸂ἔλθῃ εἰς φανερόν⸃.
translation:
  text: For nothing is hidden except to be revealed, nor has anything become concealed
    except to come into the open.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'For nothing is hidden except that it may be revealed … except that it
      may come to light.' The Greek ἵνα clauses can be heard with either purpose or
      result nuance.
    reason: alternative_reading
  - marker: b
    text: Literally, 'come into the visible/open.'
    reason: lexical_alternative
lexical_decisions:
- source_word: κρυπτόν
  chosen: hidden
  alternatives:
  - secret
  lexicon: BDAG
  rationale: κρυπτός denotes what is hidden or concealed. 'Hidden' is natural English
    and pairs well with the later contrast of revelation. 'Secret' is possible, but
    'hidden' better preserves the adjective's basic sense without implying intentional
    secrecy.
- source_word: ἐὰν μὴ ἵνα
  chosen: except to
  alternatives:
  - unless
  - except that
  lexicon: BDAG
  rationale: 'In this idiom the combination functions effectively as an exception
    with purposive force: ''except in order that.'' Rendering ''except to'' preserves
    the sense concisely in English. A more literal ''unless'' would be awkward here
    and could obscure the purpose nuance carried by ἵνα.'
- source_word: φανερωθῇ
  chosen: be revealed
  alternatives:
  - be made manifest
  - be disclosed
  lexicon: BDAG
  rationale: The passive of φανερόω means to make visible or known. 'Be revealed'
    is idiomatic, clear, and preserves the passive sense. 'Be made manifest' is more
    formal but less natural for modern readers.
- source_word: ἀπόκρυφον
  chosen: concealed
  alternatives:
  - hidden
  - secret
  lexicon: BDAG
  rationale: ἀπόκρυφος overlaps with κρυπτός but carries the sense of being kept out
    of sight. Using 'concealed' avoids flattening the parallelism by repeating 'hidden'
    and reflects a slightly more marked nuance.
- source_word: ἐγένετο
  chosen: has become
  alternatives:
  - came to be
  - was made
  lexicon: BDAG
  rationale: γίνομαι here indicates coming into a state. 'Has become' communicates
    resultant state in smooth English. Because English style prefers an explicit subject,
    this is expanded as 'has anything become concealed' to reflect the Greek's impersonal/neuter
    construction.
- source_word: ἔλθῃ εἰς φανερόν
  chosen: come into the open
  alternatives:
  - come to light
  - come into plain view
  lexicon: BDAG
  rationale: The phrase literally means 'come into the visible/open.' 'Come into the
    open' is idiomatic and preserves the movement imagery of ἔλθῃ ('come'). 'Come
    to light' is also good, but 'come into the open' better matches the spatial force
    of εἰς.
- source_word: γάρ
  chosen: For
  alternatives:
  - Indeed
  - Because
  lexicon: BDAG
  rationale: γάρ links this saying to the preceding context as an explanation. 'For'
    is the most straightforward connective in English and preserves the discourse
    relation.
