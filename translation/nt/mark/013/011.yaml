theological_decisions:
- issue: Agency of inspired speech under persecution
  chosen_reading: The verse states that the disciples' speech in that moment is enabled by the Holy Spirit, expressed through the passive 'is given to you' and the contrast 'not you ... but the Holy Spirit,' without erasing the disciples as real speakers.
  alternative_readings:
  - A stronger dictation model in which the disciples are merely passive instruments
  - A weaker reading in which 'Holy Spirit' means only a general divine influence
  rationale: 'The Greek preserves both divine agency and human participation: the disciples are told to speak what is given, yet the ultimate speaking source is identified as the Holy Spirit. The translation keeps this tension rather than resolving it into either mechanical dictation or mere subjective inspiration.'
  doctrine_reference: Preserve theological tension rather than resolve it.
revisions:
- timestamp: '2026-04-21T05:23:38Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/nt/mark/013/011.json
  category: awkward_english
  tier: 1
  from: lead you away, handing you over
  to: lead you away and hand you over
  rationale: The current rendering, while a literal translation of the main verb and attendant participle, is slightly clunky in English. The two Greek verbs, ἄγωσιν and παραδιδόντες, describe a single, continuous event of arrest. Translating the participle as a second finite verb in a coordinated clause ('...and hand you over') is a standard and more fluid English construction for this type of Greek syntax.
