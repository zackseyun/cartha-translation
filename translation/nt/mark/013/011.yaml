id: MRK.13.11
reference: Mark 13:11
source:
  edition: SBLGNT
  text: ⸂καὶ ὅταν⸃ ⸀ἄγωσιν ὑμᾶς παραδιδόντες, μὴ προμεριμνᾶτε τί ⸀λαλήσητε, ἀλλ’ ὃ ἐὰν δοθῇ ὑμῖν ἐν ἐκείνῃ τῇ ὥρᾳ τοῦτο λαλεῖτε, οὐ γάρ ἐστε ὑμεῖς οἱ λαλοῦντες ἀλλὰ τὸ πνεῦμα τὸ ἅγιον.
translation:
  text: And when they lead you away and hand you over, do not worry beforehand about what you should speak; but whatever is given to you in that hour, speak that. For it is not you who are speaking, but the Holy Spirit.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, 'what you should say' and 'say that.' The Greek uses forms of 'speak' (λαλέω) in both places, which this translation preserves for consistency.
    reason: lexical_alternative
  - marker: b
    text: Or 'lead you away, handing you over'.
    reason: previous_rendering
lexical_decisions:
- source_word: καὶ ὅταν
  chosen: And when
  alternatives:
  - Whenever
  lexicon: BDAG
  rationale: Introduces a future contingency in connected discourse. 'And when' preserves the narrative linkage and expected circumstance without overformal stiffness.
- source_word: ἄγωσιν
  chosen: they lead ... away
  alternatives:
  - they bring
  - they lead
  lexicon: BDAG
  rationale: In this persecution context, ἄγω commonly means to lead or bring before authorities. 'Lead ... away' captures the coercive movement implied by the setting and reads naturally in English.
- source_word: παραδιδόντες
  chosen: handing ... over
  alternatives:
  - delivering up
  - betraying
  lexicon: BDAG
  rationale: παραδίδωμι here refers to being turned over to authorities. 'Handing over' is idiomatic and preserves the juridical force better than the archaic 'deliver up.' 'Betraying' would be too narrow in this immediate context.
- source_word: μὴ προμεριμνᾶτε
  chosen: do not worry beforehand
  alternatives:
  - do not be anxious beforehand
  - do not be concerned in advance
  lexicon: BDAG
  rationale: The compound verb includes the sense of anxious preoccupation in advance. 'Do not worry beforehand' is accessible modern English and preserves the temporal prefix προ-.
- source_word: τί λαλήσητε
  chosen: what you should speak
  alternatives:
  - what you should say
  - what to say
  lexicon: BDAG
  rationale: λαλέω is broadly 'speak/say.' 'What you should speak' keeps closer formal correspondence with the Greek subjunctive construction, though slightly less idiomatic than 'what to say.' This is balanced by the surrounding readable phrasing.
- source_word: ὃ ἐὰν δοθῇ ὑμῖν
  chosen: whatever is given to you
  alternatives:
  - whatever may be given to you
  - whatever is granted to you
  lexicon: BDAG
  rationale: The passive implies divine provision without explicitly naming the giver. 'Whatever is given to you' preserves that passive form and the open-ended force of ὃ ἐὰν.
- source_word: ἐν ἐκείνῃ τῇ ὥρᾳ
  chosen: in that hour
  alternatives:
  - at that time
  - in that moment
  lexicon: BDAG
  rationale: A conventional biblical expression for the decisive moment. 'In that hour' preserves the wording and solemnity better than the flatter 'at that time.'
- source_word: τοῦτο λαλεῖτε
  chosen: speak that
  alternatives:
  - say that
  - speak it
  lexicon: BDAG
  rationale: 'The demonstrative τοῦτο is emphatic: speak precisely what is given. ''Speak that'' preserves the directness and repetition with λαλέω, though slightly formal.'
- source_word: οὐ γάρ ἐστε ὑμεῖς οἱ λαλοῦντες
  chosen: For it is not you who are speaking
  alternatives:
  - for you are not the ones speaking
  - for it is not you speaking
  lexicon: BDAG
  rationale: This rendering captures the emphatic pronoun ὑμεῖς and the participial construction in natural English while preserving the contrast with the following clause.
- source_word: τὸ πνεῦμα τὸ ἅγιον
  chosen: the Holy Spirit
  alternatives:
  - the Holy Ghost
  lexicon: BDAG
  rationale: Standard modern English rendering of the title. It preserves the personal and divine reference without archaic diction.
