id: MRK.13.13
reference: Mark 13:13
source:
  edition: SBLGNT
  text: καὶ ἔσεσθε μισούμενοι ὑπὸ πάντων διὰ τὸ ὄνομά μου. ὁ δὲ ὑπομείνας εἰς τέλος οὗτος σωθήσεται.
translation:
  text: And you will be hated by all because of my name. But the one who endures to the end will be saved.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for my name's sake.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the one who perseveres' or 'remains steadfast to the end.'
    reason: lexical_alternative
  - marker: c
    text: Or 'will be delivered.' The Greek can denote rescue or salvation; the context leaves the full nuance open.
    reason: alternative_reading
  - marker: d
    text: Or 'the one who endures to the end, this one will be saved'.
    reason: previous_rendering
lexical_decisions:
- source_word: μισούμενοι
  chosen: hated
  alternatives:
  - being hated
  lexicon: BDAG
  rationale: The participle with ἔσεσθε forms a future periphrastic idea, naturally rendered in English as 'will be hated.' 'Being hated' is more wooden and less idiomatic.
- source_word: ὑπὸ πάντων
  chosen: by all
  alternatives:
  - by everyone
  - by all people
  lexicon: BDAG
  rationale: πάντων is an unqualified plural genitive after ὑπό, meaning 'by all.' This preserves the stark universality of the saying without softening it. English readers will understand the representative force contextually.
- source_word: διὰ τὸ ὄνομά μου
  chosen: because of my name
  alternatives:
  - for my name's sake
  - on account of my name
  lexicon: BDAG
  rationale: διά with the accusative expresses cause or reason. 'Because of my name' is clear modern English and preserves the biblical sense that Jesus' 'name' stands for his person, authority, and allegiance to him.
- source_word: ὁ δὲ ὑπομείνας
  chosen: the one who endures
  alternatives:
  - the one who remains steadfast
  - the one who perseveres
  lexicon: BDAG
  rationale: 'The articular aorist participle functions substantivally: ''the one who endures.'' ''Endures'' best matches ὑπομένω''s sense of remaining under pressure without importing later theological terminology too strongly.'
- source_word: εἰς τέλος
  chosen: to the end
  alternatives:
  - until the end
  lexicon: BDAG
  rationale: This phrase can denote continuance up to the endpoint. 'To the end' is concise and idiomatic, while preserving the ambiguity of whether the endpoint is the end of a trial, one's life, or the eschatological end.
- source_word: οὗτος
  chosen: this one
  alternatives:
  - he
  - that person
  lexicon: BDAG
  rationale: οὗτος is emphatic and resumptive after the participial phrase. Rendering it as 'this one' preserves the emphasis better than simply 'he,' though the English remains natural enough in context.
- source_word: σωθήσεται
  chosen: will be saved
  alternatives:
  - will be delivered
  lexicon: BDAG
  rationale: σῴζω can mean rescue/deliver or save in a fuller theological sense. In this eschatological discipleship context, 'will be saved' best preserves the term's theological weight while allowing the context to inform its scope.
