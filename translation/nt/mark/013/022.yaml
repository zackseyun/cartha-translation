theological_decisions:
- issue: Rendering of ψευδόχριστοι in light of contested title Χριστός
  chosen_reading: false messiahs
  alternative_readings:
  - false Christs
  rationale: The project default is to translate Χριστός as 'Messiah' where it functions as a title. In this compound, the title sense is clear, so 'false messiahs' best preserves meaning and Jewish messianic context while remaining intelligible in English.
  doctrine_reference: 'DOCTRINE.md: Contested terms table (Χριστός → Messiah where title; Christ where name-like)'
- issue: Implication of εἰ δυνατόν with respect to whether the elect can finally be deceived
  chosen_reading: if possible
  alternative_readings:
  - if it were possible
  rationale: The Greek leaves the statement as a conditional expression without explicitly resolving whether such deception is ultimately possible. The translation preserves that tension rather than sharpening it toward either certainty or impossibility, in keeping with the project's instruction not to resolve genuine ambiguity beyond the source text.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §3, Preserve theological tension rather than resolve it'
