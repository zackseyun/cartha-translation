id: MRK.13.22
reference: Mark 13:22
source:
  edition: SBLGNT
  text: ἐγερθήσονται γὰρ ψευδόχριστοι καὶ ψευδοπροφῆται καὶ δώσουσιν σημεῖα καὶ τέρατα πρὸς τὸ ἀποπλανᾶν εἰ ⸀δυνατὸν τοὺς ἐκλεκτούς·
translation:
  text: For false messiahs and false prophets will arise and will give signs and wonders in order to lead the elect astray, if possible.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'false Christs.' The Greek term is built on Christos, here used as a title meaning 'Messiah.'
    reason: alternative_reading
  - marker: b
    text: Or 'if it were possible.' The Greek wording does not explicitly settle whether the elect can in fact be led astray; it states the deceivers' aim.
    reason: lexical_alternative
  - marker: c
    text: Or 'in order to lead astray, if possible, the elect'.
    reason: previous_rendering
lexical_decisions:
- source_word: ἐγερθήσονται
  chosen: will arise
  alternatives:
  - will appear
  - will be raised up
  lexicon: BDAG
  rationale: In this context ἐγείρω in the future passive functions idiomatically for the appearance or emergence of persons. 'Will arise' is natural English and preserves the prophetic warning tone better than the more ambiguous 'will appear.' 'Will be raised up' is possible more formally, but could imply divine agency too strongly where the focus is simply on their emergence.
- source_word: γὰρ
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: BDAG
  rationale: γάρ gives explanatory support for the preceding warning. 'For' preserves the connective force concisely and naturally in English.
- source_word: ψευδόχριστοι
  chosen: false messiahs
  alternatives:
  - false Christs
  - false anointed ones
  lexicon: BDAG
  rationale: Following the project's default for Χριστός as a title, the compound is best rendered 'false messiahs.' 'False Christs' preserves tradition but obscures meaning for modern readers. 'False anointed ones' is too wooden and misses the established messianic sense in this Jewish context.
- source_word: ψευδοπροφῆται
  chosen: false prophets
  lexicon: BDAG
  rationale: Standard and transparent rendering of the compound noun; it matches both lexical sense and biblical usage.
- source_word: δώσουσιν
  chosen: will give
  alternatives:
  - will perform
  - will produce
  lexicon: BDAG
  rationale: The verb is literally 'will give.' In context of signs and wonders, English can also say 'perform,' but 'will give' stays closer to the Greek while remaining understandable.
- source_word: σημεῖα
  chosen: signs
  alternatives:
  - miraculous signs
  lexicon: BDAG
  rationale: σημεῖα commonly means 'signs.' Adding 'miraculous' would interpret rather than translate; the paired expression with τέρατα already conveys extraordinary phenomena.
- source_word: τέρατα
  chosen: wonders
  alternatives:
  - portents
  lexicon: BDAG
  rationale: The established pair 'signs and wonders' accurately reflects the Greek collocation and preserves biblical resonance. 'Portents' is possible but less natural here.
- source_word: πρὸς τὸ ἀποπλανᾶν
  chosen: in order to lead astray
  alternatives:
  - to deceive
  - for the purpose of misleading
  lexicon: BDAG
  rationale: The construction expresses purpose. ἀποπλανάω is more literally 'lead astray' than simply 'deceive,' preserving the image of causing someone to wander from the truth.
- source_word: εἰ δυνατόν
  chosen: if possible
  alternatives:
  - if it were possible
  lexicon: BDAG
  rationale: The Greek phrase is concise and idiomatic. 'If possible' is the most direct rendering. 'If it were possible' is a viable interpretive expansion that can suggest impossibility more strongly than the Greek itself states here.
- source_word: τοὺς ἐκλεκτούς
  chosen: the elect
  alternatives:
  - the chosen ones
  lexicon: BDAG
  rationale: ἐκλεκτοί is a theologically significant term meaning those chosen/elect. 'The elect' is concise and standard; 'the chosen ones' is possible but less idiomatic in this warning discourse. The translation preserves the term's theological weight without importing a denominational reading.
