  from: in order to lead astray, if possible, the elect
  to: in order to lead the elect astray, if possible
  rationale: The current word order, while defensible as it mirrors the Greek structure, creates a slightly awkward construction in English by separating the verb ('lead astray') from its object ('the elect'). Reordering the phrase improves the natural flow and readability of the English sentence without any loss of meaning or change in emphasis.
