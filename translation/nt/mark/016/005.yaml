id: MRK.16.5
reference: Mark 16:5
source:
  edition: SBLGNT
  text: καὶ εἰσελθοῦσαι εἰς τὸ μνημεῖον εἶδον νεανίσκον καθήμενον ἐν τοῖς δεξιοῖς
    περιβεβλημένον στολὴν λευκήν, καὶ ἐξεθαμβήθησαν.
translation:
  text: And when they entered the tomb, they saw a young man sitting on the right,
    clothed in a white robe, and they were alarmed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'angel.' Mark describes him here as 'a young man,' though the wider context
      and parallel accounts indicate an angelic messenger.
    reason: alternative_reading
lexical_decisions:
- source_word: εἰσελθοῦσαι
  chosen: when they entered
  alternatives:
  - having entered
  - entering
  lexicon: BDAG
  rationale: Aorist participle feminine plural referring to the women from context.
    Rendered temporally as 'when they entered' for natural English while preserving
    the participial relation to the main verb.
- source_word: μνημεῖον
  chosen: tomb
  alternatives:
  - grave
  - memorial tomb
  lexicon: BDAG
  rationale: In resurrection context, 'tomb' is the standard and clearest rendering
    for the burial place.
- source_word: νεανίσκον
  chosen: young man
  alternatives:
  - young man/young male
  - youth
  lexicon: BDAG
  rationale: The Greek denotes a young man. The text itself does not explicitly identify
    him here as an angel, so 'young man' preserves the narrative wording without importing
    interpretation.
- source_word: καθήμενον
  chosen: sitting
  alternatives:
  - seated
  lexicon: BDAG
  rationale: Present participle describing the young man's posture. 'Sitting' is straightforward
    and natural.
- source_word: ἐν τοῖς δεξιοῖς
  chosen: on the right
  alternatives:
  - at the right side
  - on the right side
  lexicon: BDAG
  rationale: Idiomatic locative expression indicating position within the tomb. 'On
    the right' is concise and natural English.
- source_word: περιβεβλημένον στολὴν λευκήν
  chosen: clothed in a white robe
  alternatives:
  - wearing a white robe
  - dressed in a white robe
  lexicon: BDAG
  rationale: The perfect participle plus object conveys being clothed/wearing. 'White
    robe' reflects στολή as a long garment or robe and λευκήν as white.
- source_word: στολή
  chosen: robe
  alternatives:
  - garment
  - long robe
  lexicon: BDAG
  rationale: '''Robe'' best captures the sense of a distinctive outer garment in readable
    modern English.'
- source_word: ἐξεθαμβήθησαν
  chosen: they were alarmed
  alternatives:
  - they were amazed
  - they were greatly astonished
  - they were terrified
  lexicon: BDAG
  rationale: The verb conveys strong emotional shock or alarm, stronger than mere
    surprise. 'They were alarmed' fits the immediate reaction without overstating
    to full terror.
