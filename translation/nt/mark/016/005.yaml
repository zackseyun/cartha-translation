theological_decisions:
- issue: Identity of the νεανίσκος
  chosen_reading: Render descriptively as 'young man' in the main text without identifying
    him as an angel.
  alternative_readings:
  - angel
  rationale: Although the wider resurrection narratives and the white robe suggest
    an angelic figure, Mark 16:5 itself uses the descriptive term νεανίσκος. Following
    original-language primacy and avoiding imported doctrinal claims, the translation
    preserves Mark's wording and leaves identification to context or cross-reference
    rather than the main text.
  doctrine_reference: Translation philosophy §1, §3
