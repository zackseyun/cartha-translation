id: MRK.16.20
reference: Mark 16:20
source:
  edition: SBLGNT
  text: ἐκεῖνοι δὲ ἐξελθόντες ἐκήρυξαν πανταχοῦ, τοῦ κυρίου συνεργοῦντος καὶ τὸν λόγον
    βεβαιοῦντος διὰ τῶν ἐπακολουθούντων ⸀σημείων.⟧
translation:
  text: And they went out and proclaimed everywhere, while the Lord worked with them
    and confirmed the message through the signs that accompanied it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the word.' Greek λόγον can mean 'word,' but here it refers to the proclaimed
      message.
    reason: lexical_alternative
  - marker: b
    text: Or 'through the accompanying signs' or 'through the signs that followed.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκεῖνοι
  chosen: they
  alternatives:
  - those ones
  - those men
  lexicon: BDAG
  rationale: The demonstrative refers back to the disciples/apostolic group just mentioned.
    English naturally uses the pronoun 'they' here; 'those ones' is overly wooden,
    and 'those men' would over-specify gender beyond the discourse need.
- source_word: δὲ
  chosen: And
  alternatives:
  - Now
  - Then
  - but
  lexicon: BDAG
  rationale: δέ here marks continuation rather than strong contrast. 'And' gives smooth
    narrative progression in modern English.
- source_word: ἐξελθόντες
  chosen: went out
  alternatives:
  - having gone out
  - departed
  lexicon: BDAG
  rationale: The aorist participle is most naturally rendered as attendant circumstance
    in English narrative. 'Went out' preserves the movement without awkwardly retaining
    the participial form.
- source_word: ἐκήρυξαν
  chosen: proclaimed
  alternatives:
  - preached
  - announced
  - heralded
  lexicon: BDAG
  rationale: κηρύσσω denotes public proclamation. 'Proclaimed' preserves that sense
    while remaining accessible; 'preached' is possible but can sound more narrowly
    ecclesiastical than the Greek requires.
- source_word: πανταχοῦ
  chosen: everywhere
  alternatives:
  - in every place
  - throughout all places
  lexicon: BDAG
  rationale: A straightforward adverbial rendering that is both accurate and idiomatic.
- source_word: τοῦ κυρίου
  chosen: the Lord
  alternatives:
  - the master
  lexicon: BDAG
  rationale: Per doctrine defaults, κύριος is rendered 'Lord.' In Mark 16:19 the referent
    is Jesus, so 'the Lord' here naturally continues that reference.
- source_word: συνεργοῦντος
  chosen: worked with them
  alternatives:
  - cooperating with them
  - working together with them
  lexicon: BDAG
  rationale: The genitive absolute describes the Lord's concurrent action in support
    of their mission. 'Worked with them' is idiomatic and preserves the συνεργ- sense
    of joint activity.
- source_word: τὸν λόγον
  chosen: the message
  alternatives:
  - the word
  - the proclamation
  lexicon: BDAG
  rationale: λόγος here refers to the preached gospel message rather than a single
    lexical 'word.' 'The message' communicates the sense clearly in contemporary English;
    'the word' is possible and traditional, but less transparent to modern readers.
- source_word: βεβαιοῦντος
  chosen: confirmed
  alternatives:
  - established
  - validated
  - made sure
  lexicon: BDAG
  rationale: βεβαιόω here means to confirm or validate. 'Confirmed' fits the context
    of divine attestation of apostolic proclamation.
- source_word: διὰ
  chosen: through
  alternatives:
  - by means of
  - by
  lexicon: BDAG
  rationale: διά with the genitive indicates means or instrumentality. 'Through' is
    concise and natural.
- source_word: τῶν ἐπακολουθούντων σημείων
  chosen: the signs that accompanied it
  alternatives:
  - the accompanying signs
  - the signs that followed
  lexicon: BDAG
  rationale: ἐπακολουθέω can mean 'follow' or 'accompany.' In context the signs attend
    and authenticate the preached message, so 'accompanied it' makes the relation
    explicit in idiomatic English. The pronoun 'it' refers back to 'the message,'
    clarifying the object of attestation.
