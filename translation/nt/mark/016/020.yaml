theological_decisions:
- issue: Referent of 'the Lord'
  chosen_reading: Jesus, the risen Lord, is the one working with the disciples and
    confirming their proclamation.
  alternative_readings:
  - God more generally
  rationale: The immediate context (16:19) identifies Jesus as 'the Lord' who was
    taken up into heaven. Rendering simply 'the Lord' preserves the title while the
    translation notes the contextual referent without importing extra doctrinal content.
  doctrine_reference: 'Contested terms: κύριος → Lord'
- issue: Function of the signs
  chosen_reading: The signs are presented as divine confirmation of the apostolic
    message.
  alternative_readings:
  - The signs merely followed the preachers without explicit attesting function
  rationale: The syntax links 'confirming the message' with 'through the signs that
    accompanied it/them,' indicating attestation. This reflects the verse's plain
    sense without making claims about the duration or normativity of such signs beyond
    the text.
