id: MRK.16.8
reference: Mark 16:8
source:
  edition: SBLGNT
  text: καὶ ἐξελθοῦσαι ἔφυγον ἀπὸ τοῦ μνημείου, εἶχεν ⸀γὰρ αὐτὰς τρόμος καὶ ἔκστασις·
    καὶ οὐδενὶ οὐδὲν εἶπαν, ἐφοβοῦντο ⸁γάρ. ⟦Πάντα δὲ τὰ παρηγγελμένα τοῖς περὶ τὸν
    Πέτρον συντόμως ἐξήγγειλαν. μετὰ δὲ ταῦτα καὶ αὐτὸς ὁ Ἰησοῦς ἀπὸ ἀνατολῆς καὶ
    ἄχρι δύσεως ἐξαπέστειλεν δι’ αὐτῶν τὸ ἱερὸν καὶ ἄφθαρτον κήρυγμα τῆς αἰωνίου σωτηρίας.
    ἀμήν.⟧
translation:
  text: And after they came out, they fled from the tomb, because trembling and astonishment
    had seized them. And they said nothing to anyone, for they were afraid.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Some manuscripts add the so-called shorter ending: ''And they reported
      briefly to those around Peter all that they had been commanded. And after these
      things, Jesus himself also sent out through them, from east to west, the sacred
      and imperishable proclamation of eternal salvation. Amen.'''
    reason: textual_variant
lexical_decisions:
- source_word: ἐξελθοῦσαι
  chosen: after they came out
  alternatives:
  - having gone out
  - when they came out
  lexicon: BDAG
  rationale: Aorist participle feminine plural referring to the women; rendered temporally
    in natural English while preserving the sequence before the main verb ἔφυγον.
- source_word: ἔφυγον
  chosen: they fled
  alternatives:
  - they ran away
  lexicon: BDAG
  rationale: Direct and vivid rendering of φεύγω; 'fled' preserves the force better
    than the more colloquial 'ran away'.
- source_word: μνημείου
  chosen: the tomb
  alternatives:
  - the grave
  - the memorial tomb
  lexicon: BDAG
  rationale: In resurrection narrative context, 'tomb' is the standard and most precise
    rendering for μνημεῖον.
- source_word: γὰρ
  chosen: because
  alternatives:
  - for
  lexicon: BDAG
  rationale: The first γάρ introduces the reason for their flight. 'Because' communicates
    the causal force more clearly in contemporary English than repeated 'for'.
- source_word: εἶχεν αὐτὰς
  chosen: had seized them
  alternatives:
  - had gripped them
  - held them
  lexicon: BDAG
  rationale: Although literally 'was having them,' the idiom with emotional nouns
    means that trembling and astonishment had taken hold of them. 'Had seized them'
    preserves the intensity.
- source_word: τρόμος
  chosen: trembling
  alternatives:
  - terror
  - fearful shaking
  lexicon: BDAG
  rationale: '''Trembling'' reflects the concrete sense of bodily shaking and pairs
    well with ἔκστασις. ''Terror'' would overlap too much with the later explicit
    fear statement.'
- source_word: ἔκστασις
  chosen: astonishment
  alternatives:
  - amazement
  - bewilderment
  - ecstasy
  lexicon: BDAG
  rationale: In this context the term denotes a state of being beside oneself in shock
    or amazement. 'Astonishment' is clear modern English and avoids the misleading
    modern sense of 'ecstasy'.
- source_word: οὐδενὶ οὐδὲν
  chosen: nothing to anyone
  alternatives:
  - nothing to anybody
  - not anything to anyone
  lexicon: BDAG
  rationale: The double negative is preserved idiomatically in English as an emphatic
    universal negation.
- source_word: ἐφοβοῦντο
  chosen: they were afraid
  alternatives:
  - they were fearful
  - they were frightened
  lexicon: BDAG
  rationale: Imperfect middle/passive conveys their ongoing state; 'they were afraid'
    is the most natural equivalent.
- source_word: γάρ
  chosen: for
  alternatives:
  - because
  lexicon: BDAG
  rationale: The final γάρ is retained as 'for' to preserve Mark's abrupt ending and
    explanatory close without over-smoothing the style.
