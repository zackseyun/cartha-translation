id: MRK.16.11
reference: Mark 16:11
source:
  edition: SBLGNT
  text: κἀκεῖνοι ἀκούσαντες ὅτι ζῇ καὶ ἐθεάθη ὑπ’ αὐτῆς ἠπίστησαν.
translation:
  text: And they, when they heard that he was alive and had been seen by her, did
    not believe.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'he is alive' or 'he lives.' The Greek has a present-tense verb.
    reason: lexical_alternative
  - marker: b
    text: Or, 'was seen by her.'
    reason: lexical_alternative
lexical_decisions:
- source_word: κἀκεῖνοι
  chosen: And they
  alternatives:
  - And those
  - And they also
  lexicon: BDAG
  rationale: κἀκεῖνοι combines καί with ἐκεῖνοι, marking continuity with the previous
    narrative and referring to the group just mentioned. 'And they' is natural English
    and preserves the connective force without overtranslating the demonstrative.
- source_word: ἀκούσαντες
  chosen: when they heard
  alternatives:
  - having heard
  - after hearing
  lexicon: BDAG
  rationale: The aorist participle is adverbial, most naturally temporal here. 'When
    they heard' gives clear modern English while preserving the sequence of events.
- source_word: ὅτι
  chosen: that
  alternatives:
  - that indeed
  lexicon: BDAG
  rationale: Introduces the content of what was heard. Simple 'that' is sufficient
    and idiomatic.
- source_word: ζῇ
  chosen: he was alive
  alternatives:
  - he lives
  - he is alive
  lexicon: BDAG
  rationale: Present tense indicates ongoing life. In this resurrection context, English
    commonly expresses the reported content as 'he was alive,' which is idiomatic
    after a past-tense reporting verb while still conveying that Jesus is living.
- source_word: καὶ
  chosen: and
  alternatives:
  - also
  lexicon: BDAG
  rationale: 'Coordinates the two reported facts: that he was alive and that he had
    been seen by her.'
- source_word: ἐθεάθη
  chosen: had been seen
  alternatives:
  - was seen
  - appeared
  lexicon: BDAG
  rationale: Aorist passive of θεάομαι means 'was seen' or 'was beheld.' 'Had been
    seen' fits the reported-speech sequence in English. 'Appeared' would shift the
    perspective from Mary's seeing him to his self-manifestation, which the passive
    form does not require.
- source_word: ὑπ’ αὐτῆς
  chosen: by her
  alternatives:
  - by Mary
  lexicon: BDAG
  rationale: The pronoun refers back to the woman in the preceding context. 'By her'
    preserves the Greek wording; supplying 'Mary' would be interpretive expansion
    beyond the verse itself.
- source_word: ἠπίστησαν
  chosen: did not believe
  alternatives:
  - disbelieved
  - refused to believe
  lexicon: BDAG
  rationale: ἀπιστέω here denotes failure or refusal to believe the report. 'Did not
    believe' is the most direct and idiomatic rendering without adding interpretive
    force beyond the text.
