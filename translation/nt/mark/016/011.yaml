theological_decisions:
- issue: Resurrection-life expression in reported speech
  chosen_reading: he was alive
  alternative_readings:
  - he is alive
  - he lives
  rationale: The Greek present ζῇ refers to Jesus as living after death. In English
    narrative after a past reporting verb, 'heard that he was alive' is idiomatic
    and does not deny his continuing life. Alternatives are viable and preserved for
    auditability.
  doctrine_reference: Preserve theological tension rather than resolve it; readable
    modern English, not archaic or academic.
