id: MRK.16.13
reference: Mark 16:13
source:
  edition: SBLGNT
  text: κἀκεῖνοι ἀπελθόντες ἀπήγγειλαν τοῖς λοιποῖς· οὐδὲ ἐκείνοις ἐπίστευσαν.
translation:
  text: And those men went away and reported it to the rest, but they did not believe
    them either.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "to the others."
    reason: lexical_alternative
lexical_decisions:
- source_word: κἀκεῖνοι
  chosen: those men
  alternatives:
  - those
  - those ones
  - they
  lexicon: BDAG
  rationale: The compound form means 'and those' or 'those also.' Because the referent
    in context is the two disciples and the Greek is masculine plural, 'those men'
    makes the subject explicit in natural English while preserving gender accuracy.
- source_word: ἀπελθόντες
  chosen: went away
  alternatives:
  - having gone away
  - departed
  - went
  lexicon: BDAG
  rationale: Aorist participle of ἀπέρχομαι, indicating departure prior to the main
    verb. 'Went away' is natural English and preserves the movement sense without
    over-formal participial wording.
- source_word: ἀπήγγειλαν
  chosen: reported it
  alternatives:
  - announced it
  - told it
  - reported
  lexicon: BDAG
  rationale: ἀπαγγέλλω commonly means to report or announce. 'Reported it' fits the
    narrative context of relaying what they had experienced; 'it' is supplied in English
    from context because the object is implicit in Greek.
- source_word: τοῖς λοιποῖς
  chosen: to the rest
  alternatives:
  - to the others
  - to the remaining ones
  lexicon: BDAG
  rationale: λοιπός here refers to the remaining disciples or group members. 'The
    rest' is idiomatic and concise.
- source_word: οὐδὲ
  chosen: but ... either
  alternatives:
  - and not
  - nor
  - not even
  lexicon: BDAG
  rationale: οὐδέ links this clause with the previous narrative and adds the sense
    'not ... either.' In English, 'but they did not believe them either' best conveys
    the adversative narrative turn and the additive force.
- source_word: ἐκείνοις
  chosen: them
  alternatives:
  - those men
  - those ones
  lexicon: BDAG
  rationale: Dative plural pronoun referring back to the two who reported. English
    uses the object pronoun 'them' naturally after 'believe.'
- source_word: ἐπίστευσαν
  chosen: did not believe
  alternatives:
  - did not trust
  - did not have faith in
  lexicon: BDAG
  rationale: πιστεύω in this context means to believe the testimony being given. 'Believe'
    is the standard and clearest rendering; 'trust' would shift the nuance toward
    personal reliance rather than acceptance of report.
