id: MRK.16.17
reference: Mark 16:17
source:
  edition: SBLGNT
  text: σημεῖα δὲ τοῖς πιστεύσασιν ⸂ταῦτα παρακολουθήσει⸃, ἐν τῷ ὀνόματί μου δαιμόνια
    ἐκβαλοῦσιν, γλώσσαις λαλήσουσιν ⸀καιναῖς,
translation:
  text: 'And these signs will accompany those who have believed: in my name they will
    cast out demons; they will speak in new tongues.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'languages.' The Greek can refer to languages more generally; 'tongues'
      preserves the ambiguity of the expression here.
    reason: lexical_alternative
  - marker: b
    text: Traditional English often has 'will follow.' The Greek verb can also mean
      'will accompany,' emphasizing that these signs attend those who have believed.
    reason: lexical_alternative
lexical_decisions:
- source_word: σημεῖα
  chosen: signs
  alternatives:
  - attesting signs
  - miracles
  lexicon: BDAG
  rationale: σημεῖον commonly denotes a sign or attesting wonder. 'Signs' preserves
    the Greek term's evidential nuance better than the broader 'miracles.'
- source_word: τοῖς πιστεύσασιν
  chosen: those who have believed
  alternatives:
  - those who believe
  - the believers
  lexicon: BDAG
  rationale: The aorist participle πιστεύσασιν is rendered with an English perfect-like
    sense ('have believed') to reflect completed entry into belief while still functioning
    generically. 'Believers' is possible but less transparent to the verbal form.
- source_word: ταῦτα
  chosen: these
  alternatives:
  - the following
  lexicon: BDAG
  rationale: A straightforward demonstrative referring forward to the listed signs.
    'These' is more formally aligned than the interpretive 'the following.'
- source_word: παρακολουθήσει
  chosen: will accompany
  alternatives:
  - will follow
  - will attend
  lexicon: BDAG
  rationale: Although traditionally rendered 'will follow,' παρακολουθέω here conveys
    accompanying or attending. 'Will accompany' avoids suggesting mere sequence and
    better expresses association with believers.
- source_word: ἐν τῷ ὀνόματί μου
  chosen: in my name
  alternatives:
  - by my name
  - through my name
  lexicon: BDAG
  rationale: This is the standard idiomatic rendering for action done under Jesus'
    authority. It is both accurate and natural English.
- source_word: δαιμόνια
  chosen: demons
  alternatives:
  - unclean spirits
  lexicon: BDAG
  rationale: δαιμόνια directly means 'demons.' 'Unclean spirits' would import a different
    though related expression not used here.
- source_word: ἐκβαλοῦσιν
  chosen: will cast out
  alternatives:
  - will drive out
  lexicon: BDAG
  rationale: '''Cast out'' is the established and accurate rendering for exorcistic
    contexts, preserving the force of expulsion.'
- source_word: γλώσσαις
  chosen: tongues
  alternatives:
  - languages
  lexicon: BDAG
  rationale: γλῶσσα can mean either 'tongue' or 'language.' In this charismatic context,
    'tongues' preserves the traditional and contextually plausible sense without over-resolving
    whether known human languages or ecstatic speech is intended.
- source_word: λαλήσουσιν
  chosen: they will speak
  alternatives:
  - they will talk
  lexicon: BDAG
  rationale: λαλέω is the ordinary verb 'to speak.' 'Talk' is too informal for the
    register.
- source_word: καιναῖς
  chosen: new
  alternatives:
  - unfamiliar
  - fresh
  lexicon: BDAG
  rationale: καινός denotes newness in kind or quality. 'New' is the most direct rendering
    and leaves the exact nuance appropriately open.
