theological_decisions:
- issue: Meaning of 'tongues' in the phrase 'they will speak in new tongues'
  chosen_reading: Render as 'tongues' in the main text without specifying whether
    these are human languages or ecstatic utterances.
  alternative_readings:
  - languages
  - ecstatic speech
  rationale: The Greek γλώσσαις can denote languages, but in this context the text
    itself does not define the phenomenon with precision. To preserve theological
    tension and avoid importing a denominational reading, the main text keeps 'tongues,'
    while an alternative is preserved in a footnote.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
