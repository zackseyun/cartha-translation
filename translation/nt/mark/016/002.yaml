id: MRK.16.2
reference: Mark 16:2
source:
  edition: SBLGNT
  text: καὶ λίαν πρωῒ ⸂τῇ μιᾷ τῶν⸃ σαββάτων ἔρχονται ἐπὶ τὸ μνημεῖον ἀνατείλαντος
    τοῦ ἡλίου.
translation:
  text: And very early on the first day of the week, they come to the tomb after the
    sun had risen.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek literally, 'on the first of the Sabbaths,' an idiom meaning 'on the
      first day of the week.'
    reason: lexical_alternative
  - marker: b
    text: Mark uses the historical present 'they come,' where many English translations
      use the past tense 'they came.'
    reason: lexical_alternative
  - marker: c
    text: Or 'when the sun had risen'; the Greek is a genitive absolute indicating
      the time of their arrival.
    reason: lexical_alternative
lexical_decisions:
- source_word: λίαν πρωῒ
  chosen: very early
  alternatives:
  - very early in the morning
  - extremely early
  lexicon: BDAG
  rationale: The adverb λίαν intensifies πρωῒ. Rendering the pair as 'very early'
    is natural English and preserves the emphatic timing without unnecessary redundancy.
- source_word: τῇ μιᾷ τῶν σαββάτων
  chosen: on the first day of the week
  alternatives:
  - on the first of the week
  - on the first day after the Sabbath
  lexicon: BDAG
  rationale: This is a standard Semitic/Koine idiom literally 'on the first of the
    Sabbaths,' meaning the first day of the week. 'On the first day of the week' communicates
    the idiomatic sense clearly in modern English.
- source_word: ἔρχονται
  chosen: they come
  alternatives:
  - they are coming
  - they go
  lexicon: BDAG
  rationale: The present tense is retained as a historical present, common in Mark,
    giving narrative vividness. 'They come' preserves this better than shifting to
    a simple past. 'Go' is possible contextually from the women's perspective of movement,
    but ἔρχομαι more directly means 'come'.
- source_word: ἐπὶ τὸ μνημεῖον
  chosen: to the tomb
  alternatives:
  - to the grave
  - to the memorial tomb
  lexicon: BDAG
  rationale: μνημεῖον in this burial context is best rendered 'tomb.' The preposition
    ἐπί with the accusative here conveys movement toward the location, naturally expressed
    as 'to the tomb'.
- source_word: ἀνατείλαντος τοῦ ἡλίου
  chosen: after the sun had risen
  alternatives:
  - when the sun had risen
  - at sunrise
  lexicon: BDAG
  rationale: The genitive absolute marks a temporal circumstance. 'After the sun had
    risen' is a clear English equivalent that preserves the completed action relative
    to their arrival. 'At sunrise' is smoother but slightly compresses the participial
    construction.
