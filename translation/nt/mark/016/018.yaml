theological_decisions:
- issue: Nature of the promised protections and healings
  chosen_reading: The verse is translated straightforwardly as describing signs accompanying
    believers, without adding interpretive qualifiers about whether these signs are
    universal, normative, symbolic, or limited to a particular period.
  alternative_readings:
  - These signs are normative for all believers in all times
  - These signs were limited to the apostolic era
  - The language is purely symbolic
  rationale: The Greek presents future actions and outcomes plainly. The translation
    should not import a denominational stance on continuationism, cessationism, or
    symbolic interpretation beyond what the text itself states.
  doctrine_reference: Affirmations; Translation philosophy §3 Preserve theological
    tension rather than resolve it.
- issue: Text-critical status of Mark 16:9–20
  chosen_reading: Translate the verse as given in the provided SBLGNT text, while
    preserving the broader textual issue in a footnote.
  alternative_readings:
  - Omit the verse as secondary
  - Bracket the verse in the main text
  rationale: The task provides the SBLGNT wording for this verse and asks for a verse
    draft. Because Mark 16:9–20 is a well-known textual variant, transparency requires
    noting that some early manuscripts lack the longer ending, without refusing to
    translate the supplied text.
