id: MRK.16.18
reference: Mark 16:18
source:
  edition: SBLGNT
  text: ⸀ὄφεις ἀροῦσιν κἂν θανάσιμόν τι πίωσιν οὐ μὴ αὐτοὺς βλάψῃ, ἐπὶ ἀρρώστους χεῖρας
    ἐπιθήσουσιν καὶ καλῶς ἕξουσιν.
translation:
  text: They will pick up snakes, and if they drink anything deadly, it will certainly
    not harm them; they will lay hands on the sick, and they will recover.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Some early manuscripts do not include Mark 16:9–20; this verse belongs to
      the longer ending of Mark.
    reason: textual_variant
  - marker: b
    text: Or 'serpents.'
    reason: lexical_alternative
  - marker: c
    text: Or 'any deadly thing'; the phrase is broad and not limited strictly to poison.
    reason: lexical_alternative
  - marker: d
    text: Literally, 'they will be well.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὄφεις
  chosen: snakes
  alternatives:
  - serpents
  lexicon: BDAG
  rationale: Rendered with the common modern English term 'snakes' for readability.
    'Serpents' is more traditional but less natural in contemporary English and adds
    no needed nuance here.
- source_word: ἀροῦσιν
  chosen: will pick up
  alternatives:
  - will take up
  - will lift
  lexicon: BDAG
  rationale: αἴρω commonly means 'take up, pick up, lift.' 'Pick up' best fits the
    likely physical action with snakes in clear modern English.
- source_word: κἂν
  chosen: and if
  alternatives:
  - even if
  lexicon: BDAG
  rationale: This contraction of καὶ ἐάν introduces a conditional clause. 'And if'
    preserves the flow of the sentence naturally in English; the concessive force
    is still conveyed by the following emphatic negation.
- source_word: θανάσιμόν τι
  chosen: anything deadly
  alternatives:
  - any deadly thing
  - anything poisonous
  lexicon: BDAG
  rationale: The adjective means 'deadly' or 'causing death.' 'Anything deadly' is
    idiomatic and broad enough to match the Greek without narrowing it specifically
    to poison, though poison is included.
- source_word: πίωσιν
  chosen: they drink
  alternatives:
  - they should drink
  lexicon: BDAG
  rationale: 'Aorist subjunctive in the conditional clause is best rendered in English
    with a simple present after ''if'': ''if they drink.'''
- source_word: οὐ μὴ
  chosen: certainly not
  alternatives:
  - by no means
  - surely not
  - not at all
  lexicon: BDAG
  rationale: This construction is strongly emphatic. Rather than a bare 'not,' 'certainly
    not' preserves the force of the Greek in natural English.
- source_word: βλάψῃ
  chosen: harm
  alternatives:
  - injure
  - hurt
  lexicon: BDAG
  rationale: βλάπτω here denotes causing harm or injury. 'Harm' is broad and idiomatic,
    fitting the context of deadly danger.
- source_word: ἐπὶ ἀρρώστους
  chosen: on the sick
  alternatives:
  - upon sick people
  - on sick people
  lexicon: BDAG
  rationale: With ἐπιτίθημι and χεῖρας, ἐπί plus accusative naturally yields 'lay
    hands on.' ἄρρωστος means 'sick' or 'ill'; 'the sick' is concise and idiomatic.
- source_word: χεῖρας ἐπιθήσουσιν
  chosen: they will lay hands
  alternatives:
  - they will place their hands
  lexicon: BDAG
  rationale: This is a standard idiom for placing hands on someone. 'Lay hands' preserves
    the idiomatic and biblical sense without unnecessary expansion.
- source_word: καλῶς ἕξουσιν
  chosen: they will recover
  alternatives:
  - they will be well
  - they will get well
  lexicon: BDAG
  rationale: Literally 'they will have well' or 'be well.' In context of the sick
    after laying on of hands, 'they will recover' expresses the result naturally and
    clearly in English.
