id: MRK.16.1
reference: Mark 16:1
source:
  edition: SBLGNT
  text: Καὶ διαγενομένου τοῦ σαββάτου ⸀Μαρία ἡ Μαγδαληνὴ καὶ Μαρία ⸂ἡ τοῦ⸃ Ἰακώβου
    καὶ Σαλώμη ἠγόρασαν ἀρώματα ἵνα ἐλθοῦσαι ἀλείψωσιν αὐτόν.
translation:
  text: And when the Sabbath was over, Mary Magdalene, Mary the mother of James, and
    Salome bought spices so that they might come and anoint him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek literally, 'Mary the one of James'; that is, Mary identified in relation
      to James, traditionally understood as his mother.
    reason: lexical_alternative
lexical_decisions:
- source_word: διαγενομένου τοῦ σαββάτου
  chosen: when the Sabbath was over
  alternatives:
  - after the Sabbath had passed
  - when the Sabbath had ended
  lexicon: BDAG
  rationale: The genitive absolute marks time prior to the main action. 'When the
    Sabbath was over' is natural modern English and preserves the temporal sense without
    unnecessary stiffness.
- source_word: Μαρία ἡ Μαγδαληνὴ
  chosen: Mary Magdalene
  alternatives:
  - Mariam Magdalene
  lexicon: BDAG
  rationale: Standard English transliteration of the personal name and epithet; this
    is the conventional and recognizable form.
- source_word: Μαρία ἡ τοῦ Ἰακώβου
  chosen: Mary the mother of James
  alternatives:
  - Mary of James
  - Mary, James's mother
  lexicon: BDAG
  rationale: The elliptical expression 'the [one] of James' idiomatically identifies
    her by relation to James. In this context English requires the supplied relationship
    for clarity; 'mother of James' matches common usage in the Gospel tradition better
    than the overly literal 'of James'.
- source_word: Σαλώμη
  chosen: Salome
  lexicon: BDAG
  rationale: Standard English transliteration of the personal name.
- source_word: ἠγόρασαν
  chosen: bought
  alternatives:
  - purchased
  lexicon: BDAG
  rationale: Simple aorist narrative verb; 'bought' is the most natural modern equivalent.
- source_word: ἀρώματα
  chosen: spices
  alternatives:
  - aromatic spices
  - perfumes
  lexicon: BDAG
  rationale: Refers to fragrant substances used in burial preparation. 'Spices' is
    concise and idiomatic; 'perfumes' is possible but less concrete in this burial
    context.
- source_word: ἵνα ἐλθοῦσαι ἀλείψωσιν αὐτόν
  chosen: so that they might come and anoint him
  alternatives:
  - so that, after coming, they might anoint him
  - in order to go and anoint him
  lexicon: BDAG
  rationale: ἵνα introduces purpose. The participle ἐλθοῦσαι is antecedent in sense
    ('having come'), but in idiomatic English 'come and anoint' communicates the intended
    action sequence clearly without awkwardness. 'Anoint him' preserves the burial-preparation
    sense of ἀλείφω.
- source_word: ἀλείψωσιν
  chosen: anoint
  alternatives:
  - apply spices to
  - prepare
  lexicon: BDAG
  rationale: The verb literally means to anoint or smear/apply ointment. 'Anoint'
    is the most direct rendering and fits the funerary context; broader paraphrases
    like 'prepare' are too interpretive.
