theological_decisions:
- issue: Supplying the relationship in 'Mary the mother of James' from the elliptical
    Greek expression
  chosen_reading: Mary the mother of James
  alternative_readings:
  - Mary of James
  rationale: This is not a doctrinally contested issue but an interpretive decision
    required by idiomatic English. The supplied relationship reflects the Gospel usage
    and avoids an unnatural literalism that would obscure identification.
  doctrine_reference: 'Translation philosophy: optimal equivalence; translate for
    plain sense while documenting exceptions.'
