theological_decisions:
- issue: Rendering the ascension and exaltation language without doctrinal overstatement
  chosen_reading: was taken up into heaven and sat down at the right hand of God
  alternative_readings:
  - was received up into heaven and took his seat at the right hand of God
  rationale: The verse plainly states Jesus' ascension and exaltation. The translation
    preserves these affirmations in straightforward language without adding interpretive
    commentary beyond the Greek text. 'At the right hand of God' retains the biblical
    idiom of exaltation recognized in historic orthodoxy.
  doctrine_reference: Affirmations; Translation philosophy §§1, 3, 6
- issue: Rendering κύριος as a christological title
  chosen_reading: the Lord Jesus
  alternative_readings:
  - the Master Jesus
  rationale: Per the contested terms table, κύριος defaults to 'Lord.' This preserves
    the title's theological weight and standard NT usage without flattening it to
    a merely social title.
  doctrine_reference: 'Contested terms: κύριος → Lord'
