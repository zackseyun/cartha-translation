id: MRK.16.19
reference: Mark 16:19
source:
  edition: SBLGNT
  text: Ὁ μὲν οὖν κύριος ⸀Ἰησοῦς μετὰ τὸ λαλῆσαι αὐτοῖς ἀνελήμφθη εἰς τὸν οὐρανὸν
    καὶ ἐκάθισεν ἐκ δεξιῶν τοῦ θεοῦ.
translation:
  text: So then, the Lord Jesus, after speaking to them, was taken up into heaven
    and sat down at the right hand of God.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: μὲν οὖν
  chosen: So then
  alternatives:
  - then
  - therefore
  - so
  lexicon: BDAG
  rationale: The particle combination marks transition and conclusion. 'So then' preserves
    the inferential and resumptive force in natural English without over-translating.
- source_word: κύριος Ἰησοῦς
  chosen: the Lord Jesus
  alternatives:
  - the Lord, Jesus
  - Lord Jesus
  lexicon: BDAG
  rationale: κύριος is rendered 'Lord' per the project's default for Kyrios; Ἰησοῦς
    is transliterated as the personal name 'Jesus.' The article is naturally carried
    by 'the Lord Jesus' in English.
- source_word: μετὰ τὸ λαλῆσαι αὐτοῖς
  chosen: after speaking to them
  alternatives:
  - after he had spoken to them
  - after talking with them
  lexicon: BDAG
  rationale: The construction μετά + articular infinitive is temporal, meaning 'after.'
    λαλῆσαι is well represented by 'speaking'; 'to them' reflects αὐτοῖς. This is
    concise and natural while preserving the sequence.
- source_word: ἀνελήμφθη
  chosen: was taken up
  alternatives:
  - was taken up into heaven
  - was received up
  lexicon: BDAG
  rationale: The aorist passive of ἀναλαμβάνω here denotes ascension. 'Was taken up'
    preserves the passive voice and avoids importing more than the verb itself states;
    the destination is supplied by the following phrase εἰς τὸν οὐρανόν.
- source_word: εἰς τὸν οὐρανόν
  chosen: into heaven
  alternatives:
  - into the heaven
  - to heaven
  lexicon: BDAG
  rationale: Idiomatic English omits the article here. 'Into heaven' closely reflects
    εἰς plus accusative and fits standard English usage.
- source_word: ἐκάθισεν
  chosen: sat down
  alternatives:
  - sat
  - took his seat
  lexicon: BDAG
  rationale: The aorist active indicates the act of taking the seated position. 'Sat
    down' is the most natural equivalent and preserves the completed action.
- source_word: ἐκ δεξιῶν τοῦ θεοῦ
  chosen: at the right hand of God
  alternatives:
  - at God's right hand
  - from the right hand of God
  lexicon: BDAG
  rationale: Although ἐκ literally means 'from/out of,' the idiom ἐκ δεξιῶν means
    'at the right hand.' This is a fixed biblical expression of exalted position and
    should be rendered idiomatically rather than woodenly.
