id: MRK.16.6
reference: Mark 16:6
source:
  edition: SBLGNT
  text: ὁ δὲ λέγει αὐταῖς· Μὴ ἐκθαμβεῖσθε· Ἰησοῦν ζητεῖτε τὸν Ναζαρηνὸν τὸν ἐσταυρωμένον·
    ἠγέρθη, οὐκ ἔστιν ὧδε· ἴδε ὁ τόπος ὅπου ἔθηκαν αὐτόν·
translation:
  text: But he says to them, “Do not be alarmed. You are looking for Jesus the Nazarene,
    the one who has been crucified. He has been raised; he is not here. Look—the place
    where they laid him.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “the Nazorean” or “of Nazareth.” The Greek uses a designation derived
      from Nazareth.
    reason: lexical_alternative
  - marker: b
    text: 'Or, “He is risen” or “He has risen.” The Greek verb is passive: “He has
      been raised.”'
    reason: alternative_reading
lexical_decisions:
- source_word: ἐκθαμβεῖσθε
  chosen: be alarmed
  alternatives:
  - be amazed
  - be greatly distressed
  - be astonished
  lexicon: BDAG
  rationale: The verb conveys strong emotional disturbance or alarm, not mere surprise.
    'Be alarmed' is natural modern English and fits the context of the women encountering
    the angelic messenger at the tomb.
- source_word: Ναζαρηνὸν
  chosen: the Nazarene
  alternatives:
  - of Nazareth
  - the Nazorean
  lexicon: BDAG
  rationale: The Greek uses the adjectival form as a designation or epithet. 'The
    Nazarene' preserves the form and force better than smoothing to 'of Nazareth.'
- source_word: ἐσταυρωμένον
  chosen: the one who has been crucified
  alternatives:
  - the crucified one
  - who was crucified
  lexicon: BDAG
  rationale: The perfect participle highlights the completed event with abiding significance.
    'The one who has been crucified' preserves that aspect more clearly than a simple
    past, while remaining readable.
- source_word: ἠγέρθη
  chosen: He has been raised
  alternatives:
  - He is risen
  - He was raised
  - He has risen
  lexicon: BDAG
  rationale: The passive form is best represented as 'has been raised,' preserving
    the Greek voice and the implied divine action without overexplaining it. 'He is
    risen' is traditional but less transparent to the form; 'has risen' would shift
    to active voice.
- source_word: ὧδε
  chosen: here
  alternatives:
  - in this place
  lexicon: BDAG
  rationale: A straightforward locative adverb; 'here' is the natural English equivalent.
- source_word: ἴδε
  chosen: Look
  alternatives:
  - See
  - Behold
  lexicon: BDAG
  rationale: The particle directs attention emphatically. 'Look' is readable modern
    English; 'behold' is too archaic for the stated philosophy.
- source_word: τόπος
  chosen: place
  alternatives:
  - spot
  lexicon: BDAG
  rationale: '''Place'' is the standard and sufficiently concrete rendering in context.'
- source_word: ἔθηκαν
  chosen: they laid
  alternatives:
  - they placed
  - they put
  lexicon: BDAG
  rationale: The aorist active refers to those who placed Jesus in the tomb. 'Laid'
    is idiomatic in burial context and slightly more dignified than 'put'.
- source_word: ζητεῖτε
  chosen: You are looking for
  alternatives:
  - you seek
  - you are seeking
  lexicon: BDAG
  rationale: Present tense in context is naturally rendered as progressive English.
    'Looking for' is idiomatic and clear for contemporary readers.
- source_word: λέγει αὐταῖς
  chosen: he says to them
  alternatives:
  - he said to them
  lexicon: BDAG
  rationale: The Greek uses the historical present. Rendering it as present preserves
    Mark's vivid narrative style; English can bear this naturally here.
