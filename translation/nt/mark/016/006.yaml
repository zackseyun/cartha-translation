theological_decisions:
- issue: Resurrection wording and voice
  chosen_reading: He has been raised
  alternative_readings:
  - He is risen
  - He has risen
  - He was raised
  rationale: The Greek ἠγέρθη is passive, and preserving that voice reflects the text
    more closely while maintaining the resurrection claim central to historic orthodoxy.
    This avoids importing a different verbal nuance while still communicating the
    event clearly.
  doctrine_reference: Affirmations; Translation philosophy §§1, 3, 6
