id: MRK.16.9
reference: Mark 16:9
source:
  edition: SBLGNT
  text: ⟦Ἀναστὰς δὲ πρωῒ πρώτῃ σαββάτου ἐφάνη πρῶτον Μαρίᾳ τῇ Μαγδαληνῇ, ⸀παρ’ ἧς
    ἐκβεβλήκει ἑπτὰ δαιμόνια.
translation:
  text: Now after he had risen, early on the first day of the week, he appeared first
    to Mary Magdalene, from whom he had cast out seven demons.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Verses 9–20 are absent from some early manuscripts of Mark; other manuscripts
      include them, sometimes with variation.
    reason: textual_variant
lexical_decisions:
- source_word: Ἀναστὰς
  chosen: after he had risen
  alternatives:
  - having risen
  - when he rose
  lexicon: BDAG
  rationale: Aorist participle of ἀνίστημι, here temporal in relation to the main
    verb ἐφάνη. 'After he had risen' makes the sequence clear in natural English without
    over-paraphrasing.
- source_word: δὲ
  chosen: Now
  alternatives:
  - and
  - but
  - ''
  lexicon: BDAG
  rationale: δέ is a mild connective. 'Now' preserves discourse movement better than
    a stronger adversative 'but'; omission was possible, but a light connective helps
    English flow.
- source_word: πρωῒ
  chosen: early
  alternatives:
  - early in the morning
  - in the morning
  lexicon: BDAG
  rationale: The adverb denotes early morning. 'Early' is concise and natural, especially
    with the following temporal phrase.
- source_word: πρώτῃ σαββάτου
  chosen: on the first day of the week
  alternatives:
  - on the first day after the Sabbath
  - on the first of the week
  lexicon: BDAG
  rationale: This is the standard idiomatic sense in Koine Jewish/Christian usage.
    'First day of the week' is clear modern English and reflects the temporal idiom.
- source_word: ἐφάνη
  chosen: he appeared
  alternatives:
  - he was seen
  - he became visible
  lexicon: BDAG
  rationale: Passive/deponent form used in resurrection appearance contexts. 'He appeared'
    is the idiomatic English equivalent and matches the event sense better than the
    more wooden 'was seen.'
- source_word: πρῶτον
  chosen: first
  alternatives:
  - first of all
  lexicon: BDAG
  rationale: Adverbial accusative indicating sequence of appearances. 'First' is sufficient
    and natural.
- source_word: Μαρίᾳ τῇ Μαγδαληνῇ
  chosen: to Mary Magdalene
  alternatives:
  - to Mariam the Magdalene
  lexicon: BDAG
  rationale: Personal name is transliterated by standard English convention per project
    philosophy. The dative marks the indirect object of appearance.
- source_word: παρ’ ἧς
  chosen: from whom
  alternatives:
  - out of whom
  lexicon: BDAG
  rationale: With ἐκβεβλήκει, the phrase indicates source/origin from which the demons
    were expelled. 'From whom' is idiomatic; 'out of whom' is possible but less natural
    here.
- source_word: ἐκβεβλήκει
  chosen: he had cast out
  alternatives:
  - he had driven out
  - he cast out
  lexicon: BDAG
  rationale: Pluperfect indicates prior action relative to the appearance. 'Cast out'
    is a standard rendering for exorcistic contexts and preserves the force of ἐκβάλλω.
- source_word: ἑπτὰ δαιμόνια
  chosen: seven demons
  alternatives:
  - seven evil spirits
  lexicon: BDAG
  rationale: δαιμόνια in Gospel exorcism contexts is best rendered 'demons.' 'Seven'
    is retained literally; no reason to soften the term.
