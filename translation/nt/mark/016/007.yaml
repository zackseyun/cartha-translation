theological_decisions:
- issue: Separate mention of Peter after 'his disciples'
  chosen_reading: Retain the plain coordinated wording 'his disciples and Peter' without
    making the implication explicit in the main text.
  alternative_readings:
  - his disciples, especially Peter
  - his disciples—including Peter
  rationale: The Greek explicitly singles Peter out, likely for narrative and pastoral
    significance, but it does not grammatically state 'especially' or 'including.'
    To preserve theological and narrative tension without overinterpretation, the
    main text keeps the simple coordination.
  doctrine_reference: Preserve theological tension rather than resolve it.
