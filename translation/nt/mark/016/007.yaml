id: MRK.16.7
reference: Mark 16:7
source:
  edition: SBLGNT
  text: ἀλλὰ ὑπάγετε εἴπατε τοῖς μαθηταῖς αὐτοῦ καὶ τῷ Πέτρῳ ὅτι Προάγει ὑμᾶς εἰς
    τὴν Γαλιλαίαν· ἐκεῖ αὐτὸν ὄψεσθε, καθὼς εἶπεν ὑμῖν.
translation:
  text: But go, tell his disciples and Peter, ‘He is going ahead of you into Galilee.
    There you will see him, just as he told you.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Peter is named separately from 'his disciples.' This may highlight his restoration
      after his denial, but the Greek does not explicitly say 'especially Peter.'
    reason: alternative_reading
  - marker: b
    text: Or 'to Galilee.' The Greek preposition can be rendered either 'into' or
      'to' in this context.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀλλὰ
  chosen: But
  alternatives:
  - Instead
  - Now
  lexicon: BDAG
  rationale: Marks a strong contrast/transition from fear and silence to the commanded
    action. 'But' is the most natural concise English equivalent here.
- source_word: ὑπάγετε
  chosen: go
  alternatives:
  - be on your way
  - depart
  lexicon: BDAG
  rationale: Present imperative plural functioning as an urgent command to leave and
    proceed. 'Go' is idiomatic and preserves the force without overtranslating aspect.
- source_word: εἴπατε
  chosen: tell
  alternatives:
  - say to
  - report to
  lexicon: BDAG
  rationale: Aorist imperative plural from λέγω in indirect-message context. 'Tell'
    fits natural English with the dative recipients and following content clause.
- source_word: τοῖς μαθηταῖς αὐτοῦ
  chosen: his disciples
  alternatives:
  - the disciples of him
  lexicon: BDAG
  rationale: Standard possessive rendering of the dative phrase; natural English while
    preserving reference to Jesus' disciples.
- source_word: καὶ τῷ Πέτρῳ
  chosen: and Peter
  alternatives:
  - especially Peter
  lexicon: BDAG
  rationale: The Greek simply coordinates Peter with the disciples by καί plus dative.
    The translation preserves the explicit separate mention without importing an interpretive
    nuance such as 'especially,' though the separate naming may imply pastoral significance.
- source_word: ὅτι
  chosen: ‘He is going ahead of you into Galilee. There you will see him, just as
    he told you.’
  alternatives:
  - that ...
  - namely ...
  lexicon: BDAG
  rationale: Introduces the content of the message to be delivered. In English, direct
    quotation with quotation marks is the clearest way to present the content naturally.
- source_word: Προάγει
  chosen: He is going ahead of you
  alternatives:
  - He goes before you
  - He precedes you
  lexicon: BDAG
  rationale: Present indicative of προάγω conveys Jesus' prior movement/leading ahead.
    'Is going ahead of you' is clear modern English and preserves the directional
    sense better than the more formal 'precedes.'
- source_word: εἰς τὴν Γαλιλαίαν
  chosen: into Galilee
  alternatives:
  - to Galilee
  lexicon: BDAG
  rationale: εἰς commonly means 'into' or 'to.' 'Into Galilee' reflects the preposition
    more closely while remaining natural in English.
- source_word: ἐκεῖ
  chosen: There
  alternatives:
  - in that place
  lexicon: BDAG
  rationale: Simple locative adverb referring to Galilee; 'There' is the direct and
    natural rendering.
- source_word: αὐτὸν ὄψεσθε
  chosen: you will see him
  alternatives:
  - you will catch sight of him
  lexicon: BDAG
  rationale: Future middle of ὁράω is straightforwardly future perception/encounter.
    'You will see him' is the standard and sufficient rendering.
- source_word: καθὼς εἶπεν ὑμῖν
  chosen: just as he told you
  alternatives:
  - just as he said to you
  lexicon: BDAG
  rationale: καθώς marks correspondence with Jesus' prior statement. 'Told' is slightly
    more idiomatic in English for prior instruction to disciples, while preserving
    the sense of εἶπεν.
