theological_decisions:
- issue: Nature of the resurrection appearance described by ἐν ἑτέρᾳ μορφῇ
  chosen_reading: Render descriptively as 'in a different form' without explaining
    how the difference operated.
  alternative_readings:
  - with a different appearance
  - in another form
  rationale: The verse states that Jesus appeared in a different form but does not
    specify whether this refers to altered appearance, perception, or another mode
    of recognition. The translation preserves the textual claim without importing
    a more developed theological explanation.
  doctrine_reference: Preserve theological tension rather than resolve it.
