id: MRK.16.12
reference: Mark 16:12
source:
  edition: SBLGNT
  text: Μετὰ δὲ ταῦτα δυσὶν ἐξ αὐτῶν περιπατοῦσιν ἐφανερώθη ἐν ἑτέρᾳ μορφῇ πορευομένοις
    εἰς ἀγρόν·
translation:
  text: After these things, he appeared in a different form to two of them as they
    were walking on their way into the countryside.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in another form.'
    reason: lexical_alternative
  - marker: b
    text: Or 'to a field'; here 'into the countryside' reflects the likely sense of
      ἀγρός in this context.
    reason: lexical_alternative
lexical_decisions:
- source_word: Μετὰ δὲ ταῦτα
  chosen: After these things
  alternatives:
  - After this
  - Later
  lexicon: BDAG
  rationale: A fairly formal rendering preserves the temporal sequence marked by μετά
    + accusative and the resumptive δέ. 'After these things' is slightly more literal
    than 'After this,' while still natural enough in English.
- source_word: δυσὶν ἐξ αὐτῶν
  chosen: to two of them
  alternatives:
  - to two from among them
  - to two of their number
  lexicon: BDAG
  rationale: The dative δυσίν with ἐξ αὐτῶν identifies the recipients as two drawn
    from the larger group. 'To two of them' is idiomatic English and preserves that
    sense without over-literal awkwardness.
- source_word: περιπατοῦσιν
  chosen: as they were walking
  alternatives:
  - while they were walking
  - walking
  lexicon: BDAG
  rationale: The present participle is contemporaneous with the main verb and describes
    their ongoing action. 'As they were walking' brings out the durative sense in
    natural English.
- source_word: ἐφανερώθη
  chosen: he appeared
  alternatives:
  - he was revealed
  - he became visible
  - he was made manifest
  lexicon: BDAG
  rationale: In this context the passive of φανερόω functions idiomatically for a
    post-resurrection appearance. 'He appeared' is the clearest natural English equivalent
    and avoids overly wooden phrasing.
- source_word: ἐν ἑτέρᾳ μορφῇ
  chosen: in a different form
  alternatives:
  - in another form
  - with a different appearance
  lexicon: BDAG
  rationale: ἑτέρᾳ marks otherness/difference, and μορφή here refers to outward form
    or appearance. 'In a different form' is both accurate and traditional enough,
    while 'another form' is preserved as a lexical alternative.
- source_word: πορευομένοις
  chosen: on their way
  alternatives:
  - as they were going
  - traveling
  lexicon: BDAG
  rationale: The participle overlaps semantically with the preceding walking language
    and points to purposeful movement. Rendering it as 'on their way' avoids clumsy
    repetition ('walking...going') while preserving the sense of travel.
- source_word: εἰς ἀγρόν
  chosen: into the countryside
  alternatives:
  - into the country
  - to a field
  lexicon: BDAG
  rationale: Although ἀγρός can mean 'field,' in this idiom and narrative setting
    it likely denotes a rural area rather than a single plot of land. 'Into the countryside'
    communicates the destination naturally in modern English.
