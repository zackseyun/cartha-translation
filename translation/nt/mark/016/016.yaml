id: MRK.16.16
reference: Mark 16:16
source:
  edition: SBLGNT
  text: ὁ πιστεύσας καὶ βαπτισθεὶς σωθήσεται, ὁ δὲ ἀπιστήσας κατακριθήσεται.
translation:
  text: The one who has believed and been baptized will be saved, but the one who
    has disbelieved will be condemned.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, 'whoever believes and is baptized will be saved,
      but whoever does not believe will be condemned.'
    reason: lexical_alternative
  - marker: b
    text: Or 'has believed and has been baptized'.
    reason: previous_rendering
lexical_decisions:
- source_word: ὁ πιστεύσας
  chosen: the one who has believed
  alternatives:
  - whoever believes
  - the one who believed
  lexicon: BDAG
  rationale: The article with the aorist participle functions substantivally, referring
    to a person characterized by the action. 'The one who has believed' preserves
    the representative singular and the completed-action sense in relation to the
    future main verb, while remaining natural English. 'Whoever believes' is smoother
    but weakens the participial form and shifts aspect.
- source_word: βαπτισθεὶς
  chosen: has been baptized
  alternatives:
  - is baptized
  - having been baptized
  lexicon: BDAG
  rationale: 'The aorist passive participle is best represented as prior to the future
    result: ''has been baptized.'' This keeps the passive voice explicit and avoids
    flattening the form into a simple present. ''Having been baptized'' is more formal
    but less idiomatic in running English.'
- source_word: σωθήσεται
  chosen: will be saved
  alternatives:
  - will be rescued
  - will be delivered
  lexicon: BDAG
  rationale: σῴζω in this context carries the standard soteriological sense, not merely
    temporal rescue. 'Will be saved' is the clearest and most established rendering
    without importing extra doctrinal explanation.
- source_word: ὁ δὲ ἀπιστήσας
  chosen: but the one who has disbelieved
  alternatives:
  - but the one who does not believe
  - but the unbelieving one
  lexicon: BDAG
  rationale: ἀπιστέω is the verbal opposite of πιστεύω, so 'has disbelieved' preserves
    the lexical contrast more directly than the idiomatic 'does not believe.' The
    substantival participle is again represented by 'the one who.'
- source_word: κατακριθήσεται
  chosen: will be condemned
  alternatives:
  - will be judged guilty
  - will be sentenced
  lexicon: BDAG
  rationale: The future passive of κατακρίνω denotes adverse judgment resulting in
    condemnation. 'Will be condemned' is the most direct and natural equivalent in
    this context.
- source_word: καὶ
  chosen: and
  alternatives:
  - also
  lexicon: BDAG
  rationale: The conjunction simply coordinates the two participles in the first clause.
    'And' preserves the straightforward linkage without adding emphasis.
- source_word: δὲ
  chosen: but
  alternatives:
  - and
  - now
  lexicon: BDAG
  rationale: δέ here marks contrast between the positive and negative outcomes. 'But'
    best captures that adversative force in English.
