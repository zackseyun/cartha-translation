theological_decisions:
- issue: Relationship of belief and baptism to salvation
  chosen_reading: Render both participles straightforwardly without making baptism
    the explicit efficient cause of salvation or weakening its stated association
    with the saved person.
  alternative_readings:
  - A stronger sacramental reading in which baptism is presented as instrumentally
    necessary
  - A weaker reading that treats baptism as merely incidental and not part of the
    stated description
  rationale: The Greek joins 'having believed' and 'having been baptized' as the description
    of the person who 'will be saved,' but the second clause condemns the one who
    has disbelieved, not explicitly the unbaptized. To preserve theological tension
    and avoid denominational overreach, the translation states the text plainly and
    leaves doctrinal synthesis to interpretation.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Representative singular masculine construction
  chosen_reading: Use 'the one who' rather than a plural or gender-neutral paraphrase.
  alternative_readings:
  - those who believe ... those who disbelieve
  - whoever believes ... whoever disbelieves
  rationale: The Greek uses masculine singular substantival participles with generic
    force. 'The one who' preserves the representative singular accurately in readable
    modern English without implying male-only reference.
  doctrine_reference: Gender-accurate over gender-neutral.
