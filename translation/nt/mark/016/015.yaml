theological_decisions:
- issue: Scope of πάσῃ τῇ κτίσει in the commissioning statement
  chosen_reading: Rendered broadly as 'to all creation' to preserve the universal
    scope of the Greek.
  alternative_readings:
  - to every creature
  - to everyone
  rationale: The phrase can be heard either corporately/cosmically ('all creation')
    or distributively ('every creature'). The broader rendering preserves the text's
    expansive horizon without narrowing it prematurely to individual persons only.
    Because the command concerns gospel proclamation, readers will naturally understand
    humanity as centrally in view, but the Greek wording is wider and should remain
    so.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
