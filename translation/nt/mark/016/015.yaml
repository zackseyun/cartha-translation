id: MRK.16.15
reference: Mark 16:15
source:
  edition: SBLGNT
  text: καὶ εἶπεν αὐτοῖς· Πορευθέντες εἰς τὸν κόσμον ἅπαντα κηρύξατε τὸ εὐαγγέλιον
    πάσῃ τῇ κτίσει.
translation:
  text: And he said to them, “Go into all the world and proclaim the good news to
    all creation.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “to every creature.” The Greek phrase can be rendered either distributively
      or corporately.
    reason: alternative_reading
  - marker: b
    text: Or “the gospel.” Greek εὐαγγέλιον literally means “good news.”
    reason: lexical_alternative
lexical_decisions:
- source_word: Πορευθέντες
  chosen: Go
  alternatives:
  - Having gone
  - As you go
  lexicon: BDAG
  rationale: Aorist participle of πορεύομαι preceding the main imperative κηρύξατε.
    In idiomatic English, the attendant-circumstance force is best conveyed as an
    imperative, 'Go,' rather than the more wooden 'having gone.' 'As you go' is possible
    but can weaken the commissioning force.
- source_word: κόσμον ἅπαντα
  chosen: all the world
  alternatives:
  - the whole world
  - the entire world
  lexicon: BDAG
  rationale: κόσμος here denotes the inhabited world/order of humanity as the sphere
    of mission. ἅπαντα intensifies totality. 'All the world' is natural English and
    preserves the universal scope.
- source_word: κηρύξατε
  chosen: proclaim
  alternatives:
  - preach
  - announce
  lexicon: BDAG
  rationale: κηρύσσω means to herald or publicly proclaim. 'Proclaim' preserves the
    authoritative public-announcement sense while remaining accessible modern English;
    'preach' is traditional but can sound narrower or more ecclesiastical.
- source_word: τὸ εὐαγγέλιον
  chosen: the good news
  alternatives:
  - the gospel
  lexicon: BDAG
  rationale: εὐαγγέλιον literally means 'good news.' Following source-language primacy
    and readable modern English, 'the good news' communicates the meaning directly.
    'The gospel' is preserved as a lexical alternative because of its established
    Christian usage.
- source_word: πάσῃ τῇ κτίσει
  chosen: to all creation
  alternatives:
  - to every creature
  - to the whole creation
  lexicon: BDAG
  rationale: κτίσις can mean creation/creature. In this commissioning context, the
    dative phrase expresses the universal scope of the proclamation. 'To all creation'
    preserves the breadth of the Greek and echoes the cosmic language without forcing
    the narrower 'every creature.' The alternative is worth preserving because many
    English versions render it 'every creature.'
- source_word: εἶπεν αὐτοῖς
  chosen: he said to them
  alternatives:
  - he told them
  lexicon: BDAG
  rationale: Standard narrative introduction. 'Said to them' is the straightforward
    rendering of λέγω with indirect object αὐτοῖς and avoids adding interpretive force.
