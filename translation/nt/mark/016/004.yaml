id: MRK.16.4
reference: Mark 16:4
source:
  edition: SBLGNT
  text: καὶ ἀναβλέψασαι θεωροῦσιν ὅτι ⸀ἀποκεκύλισται ὁ λίθος, ἦν γὰρ μέγας σφόδρα.
translation:
  text: And looking up, they saw that the stone had been rolled away—for it was extremely
    large.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they noticed that the stone has been rolled away.' The Greek perfect
      verb emphasizes that the stone was already in a rolled-away state when they
      saw it.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀναβλέψασαι
  chosen: looking up
  alternatives:
  - having looked up
  - raising their eyes
  lexicon: BDAG
  rationale: Aorist participle from ἀναβλέπω here most naturally describes the women
    lifting their gaze toward the tomb area. 'Looking up' is idiomatic and concise
    in English while preserving the participial sense.
- source_word: θεωροῦσιν
  chosen: they saw
  alternatives:
  - they observe
  - they notice
  - they behold
  lexicon: BDAG
  rationale: Although θεωρέω can mean 'observe' or 'behold,' in this narrative context
    simple past 'they saw' communicates the perception clearly in natural English.
    It avoids stiffness while retaining the force of visual recognition.
- source_word: ὅτι
  chosen: that
  alternatives:
  - ''
  - namely that
  lexicon: BDAG
  rationale: Introduces the content of what they saw. In English this is naturally
    rendered by 'that,' though it may be implicit in smooth translation.
- source_word: ἀποκεκύλισται
  chosen: had been rolled away
  alternatives:
  - has been rolled away
  - was rolled away
  lexicon: BDAG
  rationale: 'Perfect passive indicates a completed action with resulting state: the
    stone stood in a rolled-away condition. English past perfect fits the narrative
    viewpoint well: upon looking, they saw that it had already been rolled away.'
- source_word: ὁ λίθος
  chosen: the stone
  alternatives:
  - the tombstone
  lexicon: BDAG
  rationale: λίθος here refers to the stone closing the tomb. 'The stone' is the standard
    and sufficiently clear rendering without adding explanatory material not explicit
    in the Greek.
- source_word: ἦν γὰρ μέγας σφόδρα
  chosen: for it was extremely large
  alternatives:
  - for it was very large
  - for it was exceedingly great
  lexicon: BDAG
  rationale: γάρ gives explanatory force; μέγας means 'large/great'; σφόδρα intensifies
    strongly. 'Extremely large' is natural modern English and preserves the emphatic
    description.
- source_word: καὶ
  chosen: And
  alternatives:
  - Now
  - Then
  lexicon: BDAG
  rationale: Simple connective continuing the narrative. 'And' preserves the Greek
    flow without overinterpreting temporal nuance.
