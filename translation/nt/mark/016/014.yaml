theological_decisions:
- issue: Resurrection wording in ἐγηγερμένον
  chosen_reading: after he had been raised
  alternative_readings:
  - him risen
  - him having risen
  rationale: The Greek perfect passive participle naturally supports a passive rendering,
    preserving the text's wording without collapsing it into an active form. This
    maintains the resurrection claim while avoiding unnecessary interpretive expansion.
  doctrine_reference: Affirmations; Translation philosophy §§1, 3
- issue: Force of σκληροκαρδία
  chosen_reading: hardness of heart
  alternative_readings:
  - stubbornness
  rationale: The metaphorical expression is retained because it carries important
    biblical-theological resonance about spiritual resistance. A more interpretive
    gloss would reduce that resonance.
  doctrine_reference: Translation philosophy §§1, 6
