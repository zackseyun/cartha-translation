id: MRK.16.14
reference: Mark 16:14
source:
  edition: SBLGNT
  text: Ὕστερον ⸀δὲ ἀνακειμένοις αὐτοῖς τοῖς ἕνδεκα ἐφανερώθη, καὶ ὠνείδισεν τὴν ἀπιστίαν
    αὐτῶν καὶ σκληροκαρδίαν ὅτι τοῖς θεασαμένοις αὐτὸν ⸀ἐγηγερμένον οὐκ ἐπίστευσαν.
translation:
  text: Later, he appeared to the eleven themselves as they were reclining at the
    table, and he rebuked their unbelief and hardness of heart, because they had not
    believed those who had seen him after he had been raised.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Afterward.'
    reason: lexical_alternative
  - marker: b
    text: Or 'as they were reclining'; the Greek refers to the customary posture for
      eating.
    reason: cultural_note
  - marker: c
    text: Or 'those who had seen him risen.' The Greek more literally says 'those
      who had seen him having been raised/raised.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ὕστερον
  chosen: Later
  alternatives:
  - Afterward
  lexicon: BDAG
  rationale: Temporal adverb marking a subsequent appearance. 'Later' is natural modern
    English and preserves the sequence without unnecessary formality.
- source_word: ἀνακειμένοις
  chosen: as they were reclining at the table
  alternatives:
  - as they were reclining
  - as they sat at table
  lexicon: BDAG
  rationale: The participle refers to the customary posture for eating. 'Reclining
    at the table' makes the meal setting explicit for modern readers while remaining
    faithful to the cultural sense of ἀνάκειμαι.
- source_word: τοῖς ἕνδεκα
  chosen: the eleven themselves
  alternatives:
  - the eleven
  lexicon: BDAG
  rationale: Refers to the apostolic group after Judas's loss. 'Themselves' lightly
    reflects αὐτοῖς with the dative phrase, emphasizing that this appearance was to
    that specific group.
- source_word: ἐφανερώθη
  chosen: he appeared
  alternatives:
  - he was revealed
  - he made himself visible
  lexicon: BDAG
  rationale: In resurrection-appearance contexts, 'appeared' is the most idiomatic
    and accurate rendering of the passive form.
- source_word: ὠνείδισεν
  chosen: he rebuked
  alternatives:
  - he reproached
  - he upbraided
  lexicon: BDAG
  rationale: '''Rebuked'' communicates strong verbal censure in clear contemporary
    English without archaic tone.'
- source_word: ἀπιστίαν
  chosen: unbelief
  alternatives:
  - lack of faith
  lexicon: BDAG
  rationale: '''Unbelief'' best matches the noun''s force here: refusal or failure
    to believe the testimony given. It is more direct than ''lack of faith'' in this
    context.'
- source_word: σκληροκαρδίαν
  chosen: hardness of heart
  alternatives:
  - stubbornness
  - hard-heartedness
  lexicon: BDAG
  rationale: This preserves the biblical metaphor and theological resonance of a resistant
    inner disposition better than a flattened rendering like 'stubbornness.'
- source_word: θεασαμένοις
  chosen: those who had seen
  alternatives:
  - those who had looked upon
  - those who had witnessed
  lexicon: BDAG
  rationale: The participle refers to eyewitnesses of the risen Jesus. 'Those who
    had seen' is straightforward and sufficiently captures the evidentiary force.
- source_word: ἐγηγερμένον
  chosen: after he had been raised
  alternatives:
  - risen
  - having been raised
  lexicon: BDAG
  rationale: 'The perfect passive participle of ἐγείρω is rendered with divine-passive
    sensitivity: ''had been raised'' preserves the passive form and resurrection meaning
    more explicitly than the intransitive ''risen.'''
- source_word: οὐκ ἐπίστευσαν
  chosen: they had not believed
  alternatives:
  - they did not believe
  lexicon: BDAG
  rationale: Pluperfect English sense fits the prior testimony they had refused to
    accept before this appearance. It also aligns naturally with the causal clause
    introduced by ὅτι.
