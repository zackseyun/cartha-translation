id: MRK.16.3
reference: Mark 16:3
source:
  edition: SBLGNT
  text: καὶ ἔλεγον πρὸς ἑαυτάς· Τίς ἀποκυλίσει ἡμῖν τὸν λίθον ⸀ἐκ τῆς θύρας τοῦ μνημείου;
translation:
  text: And they were saying to one another, “Who will roll away the stone for us
    from the entrance of the tomb?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “from the door of the tomb.”
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔλεγον
  chosen: they were saying
  alternatives:
  - they said
  - they kept saying
  lexicon: BDAG
  rationale: The imperfect indicates ongoing or repeated speech as they were on the
    way, so 'were saying' preserves the aspect better than a simple past.
- source_word: πρὸς ἑαυτάς
  chosen: to one another
  alternatives:
  - among themselves
  - to themselves
  lexicon: BDAG
  rationale: Although literally 'to themselves,' the reciprocal sense in context is
    that the women were speaking with each other. 'To one another' is idiomatic English
    and reflects the plural reciprocal force.
- source_word: Τίς
  chosen: Who
  alternatives:
  - Who is it that
  lexicon: BDAG
  rationale: An indefinite interrogative asking about the person who could perform
    the action; simple 'Who' is the natural equivalent.
- source_word: ἀποκυλίσει
  chosen: will roll away
  alternatives:
  - will move away
  - will roll back
  lexicon: BDAG
  rationale: The verb specifically denotes rolling something away from a position.
    'Roll away' preserves the concrete imagery of a stone moved from blocking the
    tomb.
- source_word: ἡμῖν
  chosen: for us
  alternatives:
  - to us
  lexicon: BDAG
  rationale: 'The dative here expresses advantage: who will do this on our behalf.
    ''For us'' is the most natural English rendering.'
- source_word: λίθον
  chosen: the stone
  alternatives:
  - the large stone
  lexicon: BDAG
  rationale: The noun simply means 'stone.' Although the context implies a large tomb-stone,
    'large' is not explicit here and should not be added to the main text.
- source_word: ἐκ τῆς θύρας
  chosen: from the entrance
  alternatives:
  - from the door
  - away from the doorway
  lexicon: BDAG
  rationale: θύρα can mean 'door' or 'entrance.' Since a tomb opening is in view rather
    than a hinged wooden door, 'entrance' communicates the sense more clearly in modern
    English while remaining faithful to the source.
- source_word: τοῦ μνημείου
  chosen: of the tomb
  alternatives:
  - of the grave
  - of the memorial tomb
  lexicon: BDAG
  rationale: μνημεῖον in this context refers to a burial tomb. 'Tomb' is the standard
    and clearest rendering in resurrection narratives.
