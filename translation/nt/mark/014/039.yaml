id: MRK.14.39
reference: Mark 14:39
source:
  edition: SBLGNT
  text: καὶ πάλιν ἀπελθὼν προσηύξατο τὸν αὐτὸν λόγον εἰπών.
translation:
  text: And again he went away and prayed, saying the same words.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the same thing' or 'the same saying.' The Greek has 'the same word,' using λόγος for the repeated content of his prayer.
    reason: lexical_alternative
  - marker: b
    text: Or 'the same word'.
    reason: previous_rendering
lexical_decisions:
- source_word: πάλιν
  chosen: again
  alternatives:
  - once more
  - a second time
  lexicon: BDAG
  rationale: Adverb marking repetition. 'Again' is the most natural concise English equivalent and preserves the narrative sequence.
- source_word: ἀπελθὼν
  chosen: he went away
  alternatives:
  - having gone away
  - departing
  lexicon: BDAG
  rationale: Aorist participle of ἀπέρχομαι, indicating movement away before the main verb. 'He went away' renders the action in natural English while preserving the sense of withdrawal.
- source_word: προσηύξατο
  chosen: prayed
  alternatives:
  - offered prayer
  - was praying
  lexicon: BDAG
  rationale: Aorist middle of προσεύχομαι. 'Prayed' is the standard and clear rendering; the middle voice does not require special expression in English here.
- source_word: τὸν αὐτὸν λόγον
  chosen: the same word
  alternatives:
  - the same saying
  - the same message
  - the same thing
  lexicon: BDAG
  rationale: λόγος can mean 'word,' 'statement,' 'message,' or 'matter.' Here it refers to the content of Jesus' repeated prayer. 'The same word' stays close to the Greek and preserves the singular expression, though idiomatic English could also use 'the same thing.'
- source_word: εἰπών
  chosen: saying
  alternatives:
  - having said
  lexicon: BDAG
  rationale: Aorist participle of λέγω, attendant to the main verb and explaining the manner/content of the prayer. 'Saying' is idiomatic in English and links naturally with 'prayed.'
