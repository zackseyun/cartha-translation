  rationale: The Greek 'λόγος' here refers to the content of Jesus' prayer from v. 36, which is a multi-word utterance. Translating it as the singular 'word' is overly literal and potentially misleading in English, suggesting he repeated only a single word. Using the plural 'words' is a common and clear way to render 'λόγος' when it refers to a statement or utterance, improving readability without losing fidelity.
