id: MRK.14.68
reference: Mark 14:68
source:
  edition: SBLGNT
  text: ὁ δὲ ἠρνήσατο λέγων· ⸂Οὔτε οἶδα οὔτε ἐπίσταμαι σὺ τί⸃ λέγεις, καὶ ἐξῆλθεν
    ἔξω εἰς τὸ προαύλιον ⸂καὶ ἀλέκτωρ ἐφώνησεν⸃.
translation:
  text: But he denied it, saying, “I neither know nor understand what you are saying.”
    And he went out into the forecourt, and a rooster crowed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Some manuscripts omit: ''and a rooster crowed.'''
    reason: textual_variant
lexical_decisions:
- source_word: ἠρνήσατο
  chosen: denied it
  alternatives:
  - denied
  - denied him
  lexicon: BDAG
  rationale: The middle form here means to deny or disclaim. English idiom prefers
    an object, and the context is Peter's denial of the accusation/claim just made,
    so 'denied it' is clearer than the bare 'denied' while avoiding the more interpretive
    'denied him,' since Jesus is not named in the clause itself.
- source_word: Οὔτε οἶδα οὔτε ἐπίσταμαι
  chosen: I neither know nor understand
  alternatives:
  - I neither know nor comprehend
  - I neither know nor am acquainted with
  lexicon: BDAG
  rationale: The paired verbs intensify Peter's denial. οἶδα can mean 'know,' while
    ἐπίσταμαι can carry the sense 'understand' or 'be acquainted with.' In this speech
    context, 'know nor understand' best preserves the rhetorical doubling without
    sounding wooden.
- source_word: σὺ τί λέγεις
  chosen: what you are saying
  alternatives:
  - what you mean
  - what you are talking about
  lexicon: BDAG
  rationale: Literally, 'what you are saying.' This is the most direct rendering and
    preserves the verbal connection to λέγων/λέγεις in the verse. More idiomatic alternatives
    are possible, but the literal wording is natural enough in English.
- source_word: ἐξῆλθεν ἔξω
  chosen: he went out
  alternatives:
  - he went outside
  - he went out there
  lexicon: BDAG
  rationale: The verb plus adverb is somewhat emphatic ('went out outside'), but in
    English 'went out' sufficiently conveys the movement. The following phrase 'into
    the forecourt' supplies the destination, so adding 'outside' would be slightly
    redundant.
- source_word: προαύλιον
  chosen: forecourt
  alternatives:
  - courtyard entrance
  - vestibule
  - gateway
  lexicon: BDAG
  rationale: προαύλιον refers to the area before the inner courtyard/house, not simply
    the main courtyard itself. 'Forecourt' preserves that spatial nuance better than
    'courtyard,' while remaining readable modern English.
- source_word: ἀλέκτωρ ἐφώνησεν
  chosen: a rooster crowed
  alternatives:
  - the rooster crowed
  lexicon: BDAG
  rationale: This is the natural English expression for the idiom. The anarthrous
    noun is well represented by 'a rooster,' though English usage can also take it
    generically as 'the rooster.' The chosen wording fits the Greek form and the narrative
    flow.
