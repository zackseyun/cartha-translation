id: MRK.14.14
reference: Mark 14:14
source:
  edition: SBLGNT
  text: καὶ ὅπου ⸀ἐὰν εἰσέλθῃ εἴπατε τῷ οἰκοδεσπότῃ ὅτι Ὁ διδάσκαλος λέγει· Ποῦ ἐστιν
    τὸ κατάλυμά ⸀μου ὅπου τὸ πάσχα μετὰ τῶν μαθητῶν μου φάγω;
translation:
  text: And wherever he enters, say to the master of the house, ‘The Teacher says,
    “Where is my guest room, where I may eat the Passover with my disciples?”’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'lodging' or 'room'; the Greek term refers to a place to stay, here likely
      a guest room in a private home rather than a commercial inn.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅπου ἐὰν εἰσέλθῃ
  chosen: wherever he enters
  alternatives:
  - wherever he goes in
  - wherever he comes in
  lexicon: BDAG
  rationale: The combination ὅπου + ἐάν with the aorist subjunctive expresses an indefinite
    relative sense, best rendered 'wherever.' 'Enters' is a natural English equivalent
    for εἰσέλθῃ in this narrative context.
- source_word: εἴπατε
  chosen: say
  alternatives:
  - tell
  lexicon: BDAG
  rationale: Aorist imperative plural directing the two disciples what to say. 'Say'
    preserves the direct-speech setup more closely than 'tell.'
- source_word: οἰκοδεσπότῃ
  chosen: master of the house
  alternatives:
  - householder
  - owner of the house
  - head of the household
  lexicon: BDAG
  rationale: οἰκοδεσπότης denotes the person in charge of the household. 'Master of
    the house' is idiomatic and preserves the social authority implied by the term
    better than the less natural 'householder.'
- source_word: Ὁ διδάσκαλος
  chosen: The Teacher
  alternatives:
  - the teacher
  - Master
  lexicon: BDAG
  rationale: Used here as a recognized title for Jesus. Capitalizing 'Teacher' reflects
    titular use in context without importing a different christological title.
- source_word: κατάλυμά
  chosen: guest room
  alternatives:
  - lodging
  - inn
  - room
  lexicon: BDAG
  rationale: κατάλυμα refers here to a place of lodging or guest room in a private
    house, not a commercial inn. 'Guest room' fits the immediate context and avoids
    confusion with πανδοχεῖον ('inn').
- source_word: μου
  chosen: my
  lexicon: BDAG
  rationale: The possessive pronoun is textually present in the SBLGNT and should
    be translated. It likely conveys the room intended or reserved for Jesus and his
    group.
- source_word: τὸ πάσχα
  chosen: the Passover
  alternatives:
  - the Passover meal
  lexicon: BDAG
  rationale: πάσχα can denote the festival or the meal. Here the following verb 'eat'
    makes meal participation explicit, so 'the Passover' is sufficient and idiomatic
    without over-specifying.
- source_word: μετὰ τῶν μαθητῶν μου
  chosen: with my disciples
  alternatives:
  - with my learners
  lexicon: BDAG
  rationale: μαθηταί in the Gospels conventionally refers to Jesus' disciples. 'Disciples'
    preserves both the relational and formative sense better than 'learners.'
- source_word: φάγω
  chosen: I may eat
  alternatives:
  - I will eat
  - I can eat
  lexicon: BDAG
  rationale: Aorist subjunctive in a relative clause of purpose or contemplated action
    after ὅπου is well represented by 'where I may eat.' This preserves the nuance
    of sought location rather than a simple future assertion.
