theological_decisions:
- issue: Rendering of Jesus' self-designation διδάσκαλος
  chosen_reading: The Teacher
  alternative_readings:
  - Master
  rationale: The term is not one of the doctrine file's specially contested christological
    titles and should be translated according to ordinary lexical sense. 'The Teacher'
    preserves the narrative designation without importing stronger authority-language
    than the Greek itself states.
