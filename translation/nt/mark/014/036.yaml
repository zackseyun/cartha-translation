theological_decisions:
- issue: Rendering Jesus' address to God with both the Aramaic and Greek forms
  chosen_reading: Abba, Father
  alternative_readings:
  - Abba, my Father
  rationale: The text itself preserves both the Aramaic address and its Greek explanation.
    Keeping both reflects the source text and preserves the intimacy of the address
    without importing additional possessive language not explicit in this verse.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; readable modern English, not archaic or academic.'
- issue: Metaphorical force of 'cup'
  chosen_reading: this cup
  alternative_readings:
  - this suffering
  - this fate
  rationale: The metaphor should be preserved rather than interpreted away. In context
    it refers to the suffering appointed for Jesus, but the Greek uses the image 'cup,'
    and the translation should retain that theological tension and intertextual resonance.
  doctrine_reference: 'Translation philosophy: Preserve theological tension rather
    than resolve it.'
