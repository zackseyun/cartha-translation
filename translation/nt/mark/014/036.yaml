id: MRK.14.36
reference: Mark 14:36
source:
  edition: SBLGNT
  text: καὶ ἔλεγεν· Αββα ὁ πατήρ, πάντα δυνατά σοι· παρένεγκε τὸ ποτήριον ⸂τοῦτο ἀπ’
    ἐμοῦ⸃· ἀλλ’ οὐ τί ἐγὼ θέλω ἀλλὰ τί σύ.
translation:
  text: And he was saying, “Abba, Father, all things are possible for you. Take this
    cup away from me. Yet not what I will, but what you will.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or, ''he said.'' The Greek imperfect may suggest repeated or continued
      speech: ''he was saying.'''
    reason: lexical_alternative
  - marker: b
    text: '''Abba'' is an Aramaic form of address for father, retained here alongside
      the Greek ''Father.'''
    reason: cultural_note
  - marker: c
    text: '''Cup'' is a biblical metaphor for the suffering appointed to him; compare
      Mark 10:38.'
    reason: cross_reference
lexical_decisions:
- source_word: ἔλεγεν
  chosen: he was saying
  alternatives:
  - he said
  lexicon: BDAG
  rationale: Imperfect indicative suggests ongoing or repeated speech in the scene;
    'was saying' preserves that aspect better than simple past 'said,' while remaining
    natural English.
- source_word: Αββα ὁ πατήρ
  chosen: Abba, Father
  alternatives:
  - Abba, my Father
  lexicon: BDAG
  rationale: Retains the Aramaic vocative 'Abba' and translates the following Greek
    apposition 'the Father' as direct address, 'Father.' This preserves both the Semitic
    form and the explanatory Greek without adding 'my,' which is not explicit here.
- source_word: πάντα δυνατά σοι
  chosen: all things are possible for you
  alternatives:
  - everything is possible for you
  lexicon: BDAG
  rationale: A natural rendering of the neuter plural with predicate adjective and
    dative; 'all things are possible for you' is idiomatic and preserves the comprehensive
    scope.
- source_word: παρένεγκε
  chosen: Take ... away
  alternatives:
  - remove
  - carry away
  lexicon: BDAG
  rationale: The aorist imperative of παραφέρω here asks for the cup to be taken away.
    'Take away' is clear modern English and fits the prayer context better than the
    more wooden 'carry away.'
- source_word: τὸ ποτήριον τοῦτο
  chosen: this cup
  alternatives:
  - this drinking cup
  lexicon: BDAG
  rationale: '''Cup'' is the standard and contextually loaded biblical metaphor for
    impending suffering/judgment; expanding to ''drinking cup'' would flatten the
    metaphorical force.'
- source_word: ἀπ’ ἐμοῦ
  chosen: away from me
  alternatives:
  - from me
  lexicon: BDAG
  rationale: In English, 'take this cup away from me' best conveys the force of the
    preposition with the imperative verb.
- source_word: ἀλλ’ οὐ τί ἐγὼ θέλω ἀλλὰ τί σύ
  chosen: Yet not what I will, but what you will
  alternatives:
  - But not what I want, but what you want
  - Yet not what I desire, but what you desire
  lexicon: BDAG
  rationale: Supplies the implied verb in the second clause for clear English. 'Will'
    preserves the verbal and theological weight of θέλω in this prayer better than
    'want,' while avoiding archaic phrasing.
