id: MRK.14.7
reference: Mark 14:7
source:
  edition: SBLGNT
  text: πάντοτε γὰρ τοὺς πτωχοὺς ἔχετε μεθ’ ἑαυτῶν, καὶ ὅταν θέλητε δύνασθε ⸀αὐτοῖς
    εὖ ποιῆσαι, ἐμὲ δὲ οὐ πάντοτε ἔχετε·
translation:
  text: For you always have the poor with you, and whenever you want, you are able
    to do good to them; but you do not always have me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'you can do good to them.' The Greek idiom means to act beneficially
      toward them, not merely to feel goodwill.
    reason: lexical_alternative
lexical_decisions:
- source_word: πάντοτε
  chosen: always
  alternatives:
  - at all times
  - continually
  lexicon: BDAG
  rationale: Standard adverbial sense indicating continual availability. 'Always'
    is natural modern English and preserves the repeated contrast in the verse.
- source_word: γὰρ
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: BDAG
  rationale: Marks explanation for the preceding statement. 'For' preserves the connective
    force without overinterpreting the logic.
- source_word: πτωχούς
  chosen: the poor
  alternatives:
  - poor people
  - the needy
  lexicon: BDAG
  rationale: Substantival adjective referring to poor persons. 'The poor' is concise,
    idiomatic, and preserves the class reference.
- source_word: ἔχετε μεθ’ ἑαυτῶν
  chosen: have with you
  alternatives:
  - have among you
  - have in your presence
  lexicon: BDAG
  rationale: The phrase denotes ongoing presence/availability. 'Have with you' is
    the most direct and idiomatic rendering in this context.
- source_word: ὅταν θέλητε
  chosen: whenever you want
  alternatives:
  - whenever you wish
  - when you desire
  lexicon: BDAG
  rationale: ὅταν with the subjunctive expresses an indefinite temporal condition.
    'Whenever you want' is natural English and preserves the open-ended timing.
- source_word: δύνασθε
  chosen: you are able
  alternatives:
  - you can
  lexicon: BDAG
  rationale: Expresses capability. 'You are able' slightly better preserves the verbal
    force than the more compressed 'you can,' while remaining readable.
- source_word: αὐτοῖς εὖ ποιῆσαι
  chosen: to do good to them
  alternatives:
  - to help them
  - to treat them well
  lexicon: BDAG
  rationale: The idiom εὖ ποιέω means to do good/benefit someone. 'Do good to them'
    preserves the lexical content without narrowing it merely to almsgiving or assistance.
- source_word: ἐμὲ δὲ
  chosen: but ... me
  alternatives:
  - but as for me
  - yet me
  lexicon: BDAG
  rationale: δέ marks contrast with the poor. English requires restructuring; 'but
    you do not always have me' captures the contrast clearly.
- source_word: οὐ πάντοτε ἔχετε
  chosen: do not always have
  alternatives:
  - will not always have
  - do not have at all times
  lexicon: BDAG
  rationale: Present tense with πάντοτε expresses the contrast in availability. 'Do
    not always have' is the most direct rendering; 'will not always have' is interpretive
    and shifts the tense.
