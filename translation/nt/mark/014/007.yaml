theological_decisions:
- issue: Potential misunderstanding that Jesus devalues care for the poor
  chosen_reading: The verse contrasts the continual presence of the poor with Jesus'
    limited bodily presence, without denying the obligation or opportunity to do good
    to the poor.
  alternative_readings:
  - Jesus dismisses concern for the poor in favor of devotion to himself
  rationale: The clause 'whenever you want, you are able to do good to them' explicitly
    affirms ongoing opportunity for beneficence. The contrast is temporal and situational,
    not a denial of mercy toward the poor.
  doctrine_reference: Preserve theological tension rather than resolve it; do not
    import doctrinal claims the text does not make.
