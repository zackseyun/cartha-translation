id: MRK.14.23
reference: Mark 14:23
source:
  edition: SBLGNT
  text: καὶ ⸀λαβὼν ποτήριον εὐχαριστήσας ἔδωκεν αὐτοῖς, καὶ ἔπιον ἐξ αὐτοῦ πάντες.
translation:
  text: And taking a cup, after giving thanks he gave it to them, and they all drank
    from it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the cup.' The Greek says 'cup' without the article, though the meal
      context may imply a specific cup.
    reason: lexical_alternative
lexical_decisions:
- source_word: λαβὼν
  chosen: taking
  alternatives:
  - having taken
  - took
  lexicon: BDAG
  rationale: Aorist participle preceding the main verb; 'taking' preserves the participial
    sequence in natural English without over-formal stiffness. 'Having taken' is more
    formal but less readable; 'took' would flatten the subordinate action into a coordinate
    finite verb.
- source_word: ποτήριον
  chosen: a cup
  alternatives:
  - the cup
  lexicon: BDAG
  rationale: The noun lacks the article in Greek, so 'a cup' is the most direct rendering.
    Although the narrative context may imply a specific cup in the meal, the anarthrous
    form does not require 'the cup' here.
- source_word: εὐχαριστήσας
  chosen: after giving thanks
  alternatives:
  - having given thanks
  - giving thanks
  lexicon: BDAG
  rationale: The aorist participle indicates action prior to the main verb. 'After
    giving thanks' communicates that temporal relationship clearly in idiomatic English.
    It avoids importing later liturgical terminology while preserving the sense of
    thanksgiving.
- source_word: ἔδωκεν αὐτοῖς
  chosen: he gave it to them
  alternatives:
  - he gave to them
  lexicon: BDAG
  rationale: English idiom normally supplies the object pronoun 'it' from the immediately
    preceding 'cup.' This makes the sentence natural and explicit without adding meaning
    beyond what the Greek context already supplies.
- source_word: ἔπιον
  chosen: drank
  alternatives:
  - drank of
  lexicon: BDAG
  rationale: Standard English rendering of the aorist verb. 'Drank of' is possible
    but archaic in this context.
- source_word: ἐξ αὐτοῦ
  chosen: from it
  alternatives:
  - from him
  - out of it
  lexicon: BDAG
  rationale: The pronoun refers back to the neuter noun 'cup,' so 'from it' is the
    natural English equivalent. 'Out of it' is slightly more explicit but unnecessary.
- source_word: πάντες
  chosen: they all
  alternatives:
  - all of them
  - all
  lexicon: BDAG
  rationale: Placed with the verb in English to preserve the emphasis that every one
    of them drank. 'They all drank' is idiomatic and clear.
