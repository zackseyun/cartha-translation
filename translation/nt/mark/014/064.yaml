id: MRK.14.64
reference: Mark 14:64
source:
  edition: SBLGNT
  text: ἠκούσατε τῆς βλασφημίας· τί ὑμῖν φαίνεται; οἱ δὲ πάντες κατέκριναν αὐτὸν ⸂ἔνοχον
    εἶναι⸃ θανάτου.
translation:
  text: You have heard the blasphemy. What does it seem to you? And they all condemned
    him as deserving death.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more idiomatically, 'What do you think?'
    reason: lexical_alternative
  - marker: b
    text: Or 'condemned him to be worthy of death,' 'judged him liable to death,'
      or 'condemned him as guilty of death.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἠκούσατε
  chosen: You have heard
  alternatives:
  - You heard
  lexicon: BDAG
  rationale: Aorist indicative in direct speech can be rendered as a simple past,
    but English present perfect fits the immediate force of the high priest's appeal
    to what they have just heard and sounds natural in courtroom-like discourse.
- source_word: βλασφημίας
  chosen: the blasphemy
  alternatives:
  - this blasphemy
  - blasphemous speech
  lexicon: BDAG
  rationale: The genitive after ἀκούω is idiomatic ('hear of/hear') and the article
    is retained as 'the' to reflect the specific charge just uttered. 'Blasphemy'
    preserves the legal-religious weight better than a paraphrase.
- source_word: τί ὑμῖν φαίνεται
  chosen: What does it seem to you?
  alternatives:
  - What do you think?
  - What is your judgment?
  lexicon: BDAG
  rationale: This phrase idiomatically asks for an opinion or verdict. The chosen
    rendering stays close to the Greek wording while remaining understandable. A more
    idiomatic English alternative is preserved in a footnote.
- source_word: πάντες
  chosen: they all
  alternatives:
  - all of them
  lexicon: BDAG
  rationale: Placed explicitly in English to preserve the unanimity emphasized by
    πάντες.
- source_word: κατέκριναν
  chosen: condemned
  alternatives:
  - judged against
  - sentenced
  lexicon: BDAG
  rationale: κατακρίνω is a judicial term meaning to condemn or pronounce guilty.
    'Condemned' is the clearest and most standard legal equivalent here.
- source_word: ἔνοχον εἶναι θανάτου
  chosen: as deserving death
  alternatives:
  - to be guilty of death
  - liable to death
  - worthy of death
  lexicon: BDAG
  rationale: The construction means being subject to or deserving the death penalty.
    'Deserving death' communicates the judicial sense in clear modern English without
    sounding wooden. Alternatives are preserved because 'guilty of death' and 'worthy
    of death' are traditional renderings.
