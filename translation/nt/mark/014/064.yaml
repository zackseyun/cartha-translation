theological_decisions:
- issue: Rendering the charge βλασφημία in a trial context
  chosen_reading: blasphemy
  alternative_readings:
  - blasphemous speech
  rationale: The text presents the Sanhedrin's accusation, not the narrator's endorsement
    of its justice. Retaining the formal term 'blasphemy' preserves the legal and
    theological gravity of the charge without importing a judgment beyond the text.
  doctrine_reference: Preserve theological tension rather than resolve it.
