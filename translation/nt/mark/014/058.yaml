id: MRK.14.58
reference: Mark 14:58
source:
  edition: SBLGNT
  text: ὅτι Ἡμεῖς ἠκούσαμεν αὐτοῦ λέγοντος ὅτι Ἐγὼ καταλύσω τὸν ναὸν τοῦτον τὸν χειροποίητον
    καὶ διὰ τριῶν ἡμερῶν ἄλλον ἀχειροποίητον οἰκοδομήσω·
translation:
  text: that, ‘We heard him saying, “I will destroy this temple made with hands, and
    within three days I will build another not made with hands.”’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “in three days.” The Greek expression διὰ τριῶν ἡμερῶν here most naturally
      indicates the span within which the action would occur.
    reason: lexical_alternative
  - marker: b
    text: “Made with hands” and “not made with hands” preserve the Greek contrast
      between χειροποίητον and ἀχειροποίητον.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅτι
  chosen: that
  alternatives:
  - because
  lexicon: BDAG
  rationale: Introduces the content of the accusation/testimony. In this context it
    is declarative ('that'), not causal ('because').
- source_word: Ἡμεῖς
  chosen: We
  lexicon: BDAG
  rationale: 'Explicit pronoun is retained for emphasis, matching the witnesses''
    self-assertion: ''We heard...''.'
- source_word: ἠκούσαμεν αὐτοῦ λέγοντος
  chosen: we heard him saying
  alternatives:
  - we heard him say
  lexicon: BDAG
  rationale: The genitive participial construction is represented naturally in English
    as 'heard him saying.' 'Heard him say' is possible, but 'saying' better reflects
    the participle while remaining idiomatic.
- source_word: καταλύσω
  chosen: I will destroy
  alternatives:
  - I will tear down
  - I will demolish
  lexicon: BDAG
  rationale: In context of a building/temple, the verb denotes dismantling or destroying.
    'Destroy' is the clearest modern English rendering and matches the force of the
    accusation.
- source_word: ναὸν
  chosen: temple
  alternatives:
  - sanctuary
  lexicon: BDAG
  rationale: ναός can denote the sanctuary/temple proper. In this accusation about
    the Jerusalem temple, 'temple' is the most natural and recognizable rendering
    in English.
- source_word: τοῦτον
  chosen: this
  lexicon: BDAG
  rationale: 'The demonstrative is retained to preserve the deictic force: the temple
    presently in view.'
- source_word: χειροποίητον
  chosen: made with hands
  alternatives:
  - handmade
  - made by human hands
  lexicon: BDAG
  rationale: A transparent rendering preserves the contrast with ἀχειροποίητον. 'Made
    with hands' is idiomatic and keeps the verbal parallel visible.
- source_word: διὰ τριῶν ἡμερῶν
  chosen: within three days
  alternatives:
  - in three days
  - after three days
  lexicon: BDAG
  rationale: With διά plus genitive in a temporal expression, the sense is duration/within
    the span of. 'Within three days' best reflects the Greek here. 'In three days'
    is possible but less explicit; 'after three days' would reflect different wording.
- source_word: ἄλλον
  chosen: another
  alternatives:
  - a different one
  lexicon: BDAG
  rationale: Standard rendering of ἄλλος. It preserves the claim that a second temple
    would be built in place of the first.
- source_word: ἀχειροποίητον
  chosen: not made with hands
  alternatives:
  - not handmade
  - not made by human hands
  lexicon: BDAG
  rationale: Rendered in deliberate parallel with χειροποίητον to preserve the rhetorical
    contrast. 'Not made with hands' is clear and echoes established biblical usage
    without becoming archaic.
- source_word: οἰκοδομήσω
  chosen: I will build
  alternatives:
  - I will rebuild
  lexicon: BDAG
  rationale: The verb means 'build.' Although 'rebuild' might fit the broader sense,
    the Greek does not include the prefix that would require it, so 'build' is preferred.
