theological_decisions:
- issue: Whether to make explicit that the statement is part of hostile testimony
    rather than a narrator-endorsed quotation
  chosen_reading: Retain the accusation as reported speech without interpretive expansion
  alternative_readings:
  - Paraphrase to signal alleged distortion of Jesus' words
  rationale: The verse reports what the witnesses claimed they heard. The translation
    should not import harmonizing explanation from other passages into the main text.
    Quotation structure in English makes clear this is reported testimony.
  doctrine_reference: Translation philosophy §1, §3
- issue: Rendering the temple contrast in a way that preserves possible theological
    resonance without over-interpreting it
  chosen_reading: Use 'made with hands' / 'not made with hands' in the main text
  alternative_readings:
  - Use more interpretive renderings such as 'man-made' / 'divine'
  rationale: The Greek contrast may carry theological significance, but the translation
    should preserve the wording rather than resolve its meaning. A more interpretive
    rendering would import explanation not stated in the text.
  doctrine_reference: Translation philosophy §3
