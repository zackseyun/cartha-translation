id: MRK.14.6
reference: Mark 14:6
source:
  edition: SBLGNT
  text: ὁ δὲ Ἰησοῦς εἶπεν· Ἄφετε αὐτήν· τί αὐτῇ κόπους παρέχετε; καλὸν ἔργον ἠργάσατο
    ἐν ἐμοί·
translation:
  text: But Jesus said, “Leave her alone. Why are you causing her trouble? She has
    done a beautiful work for me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “Why do you trouble her?”
    reason: lexical_alternative
  - marker: b
    text: Or, “She has done a good work for me.”
    reason: lexical_alternative
  - marker: c
    text: Literally, “in me”; the phrase is rendered idiomatically here as “for me.”
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἄφετε αὐτήν
  chosen: Leave her alone
  alternatives:
  - Let her be
  - Leave her
  lexicon: BDAG
  rationale: The aorist imperative Ἄφετε calls for an immediate cessation or release.
    In idiomatic English, 'Leave her alone' best conveys both the command to stop
    interfering and the protective force of Jesus' words.
- source_word: τί αὐτῇ κόπους παρέχετε;
  chosen: Why are you causing her trouble?
  alternatives:
  - Why do you trouble her?
  - Why are you giving her trouble?
  - Why are you bothering her?
  lexicon: BDAG
  rationale: κόπους παρέχετε is literally 'provide troubles/labors to her,' an idiom
    for causing difficulty or harassment. 'Causing her trouble' preserves the sense
    naturally in modern English without over-paraphrasing. 'Bothering her' is possible
    but slightly lighter than the rebuking tone here.
- source_word: καλὸν ἔργον
  chosen: a beautiful work
  alternatives:
  - a good work
  - a noble deed
  - a fine thing
  lexicon: BDAG
  rationale: καλός can mean good, beautiful, noble, or fitting. In this context of
    an act of devotion, 'beautiful' captures the commendatory and aesthetically fitting
    nuance better than the flatter 'good,' while still remaining faithful to the semantic
    range.
- source_word: ἠργάσατο
  chosen: has done
  alternatives:
  - worked
  - performed
  lexicon: BDAG
  rationale: The middle form here is well represented by simple English 'has done.'
    'Worked' would sound awkward with ἔργον in English, and 'performed' is too formal
    for the register.
- source_word: ἐν ἐμοί
  chosen: for me
  alternatives:
  - to me
  - on me
  - in me
  lexicon: BDAG
  rationale: Although ἐν is literally 'in,' in this idiom with an act directed toward
    Jesus, English 'for me' best expresses the relational sense. 'On me' is possible
    in light of the anointing context, but this verse's wording is broader and evaluative
    rather than merely spatial.
- source_word: δὲ
  chosen: But
  alternatives:
  - And
  - Now
  lexicon: BDAG
  rationale: δέ marks a mild contrast or development. 'But' fits the narrative turn
    as Jesus responds against the criticism of the woman.
