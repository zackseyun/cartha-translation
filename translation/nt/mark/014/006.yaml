theological_decisions:
- issue: Nuance of καλὸν ἔργον in relation to the woman's act of anointing
  chosen_reading: Rendered as 'a beautiful work'
  alternative_readings:
  - a good work
  - a noble deed
  rationale: The phrase commends the act without importing sacramental or merit theology.
    'Beautiful work' preserves Jesus' positive valuation and the fittingness of the
    act in context, while avoiding reduction to mere moral utility.
  doctrine_reference: Translation philosophy §1, §6
- issue: Force of ἐν ἐμοί
  chosen_reading: Rendered idiomatically as 'for me'
  alternative_readings:
  - on me
  - to me
  - in me
  rationale: The translation avoids over-specifying the physical action while still
    reflecting that the deed was directed toward Jesus personally. This preserves
    the text's meaning without importing additional doctrinal claims.
  doctrine_reference: Translation philosophy §1, §3
