id: MRK.14.31
reference: Mark 14:31
source:
  edition: SBLGNT
  text: ὁ δὲ ⸂ἐκπερισσῶς ἐλάλει⸃· Ἐὰν ⸂δέῃ με⸃ συναποθανεῖν σοι, οὐ μή σε ⸀ἀπαρνήσομαι.
    ὡσαύτως δὲ καὶ πάντες ἔλεγον.
translation:
  text: But he kept insisting all the more, “If I must die together with you, I will
    certainly not deny you.” And they all were saying the same thing.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “he was speaking most emphatically.”
    reason: lexical_alternative
  - marker: b
    text: Literally, “die together with you.”
    reason: lexical_alternative
  - marker: c
    text: Or, “I will never deny you.” The Greek uses a strong negation.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκπερισσῶς
  chosen: all the more
  alternatives:
  - vehemently
  - exceedingly
  - most emphatically
  lexicon: BDAG
  rationale: The adverb intensifies Peter's speech beyond a simple 'again' or 'strongly.'
    'All the more' captures the comparative force in natural English while preserving
    the escalation of his insistence.
- source_word: ἐλάλει
  chosen: kept insisting
  alternatives:
  - was speaking
  - kept saying
  - was insisting
  lexicon: BDAG
  rationale: The imperfect indicates continued or repeated action. Since the content
    is emphatic protest, 'kept insisting' conveys both the iterative aspect and the
    force of the speech better than the flatter 'was speaking.'
- source_word: Ἐὰν δέῃ με
  chosen: If I must
  alternatives:
  - If it is necessary for me
  - If I should have to
  lexicon: BDAG
  rationale: δέῃ expresses necessity, not mere possibility. 'If I must' is concise,
    idiomatic, and preserves the sense of compulsion.
- source_word: συναποθανεῖν σοι
  chosen: die together with you
  alternatives:
  - die with you
  lexicon: BDAG
  rationale: The compound verb with σύν explicitly includes the idea of dying together
    with someone. 'Die together with you' preserves that force more transparently
    than the more idiomatic but slightly less explicit 'die with you.'
- source_word: οὐ μή
  chosen: certainly not
  alternatives:
  - never
  - by no means
  lexicon: BDAG
  rationale: 'οὐ μή is a strong negation. ''Certainly not'' preserves the emphatic
    denial without sounding archaic. The force is then carried into the full clause:
    ''I will certainly not deny you.'''
- source_word: ἀπαρνήσομαι
  chosen: deny
  alternatives:
  - disown
  - renounce
  lexicon: BDAG
  rationale: '''Deny'' is the standard and clearest rendering in this narrative context,
    matching the later fulfillment of Peter''s denial of Jesus.'
- source_word: ὡσαύτως
  chosen: the same thing
  alternatives:
  - likewise
  - in the same way
  lexicon: BDAG
  rationale: In context this refers to the content of the disciples' speech. 'The
    same thing' makes the referent explicit in natural English.
- source_word: πάντες
  chosen: they all
  alternatives:
  - all of them
  - all
  lexicon: BDAG
  rationale: The pronoun is supplied in English for clarity, and 'they all' naturally
    renders the inclusive force of πάντες in this narrative sentence.
- source_word: ἔλεγον
  chosen: were saying
  alternatives:
  - said
  - kept saying
  lexicon: BDAG
  rationale: The imperfect again suggests ongoing or repeated speech. 'Were saying'
    preserves the aspect without overloading the sentence; the preceding 'the same
    thing' already conveys the collective repetition.
