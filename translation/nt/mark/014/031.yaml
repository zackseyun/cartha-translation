theological_decisions:
- issue: Strength of Peter's denial vow
  chosen_reading: Rendered οὐ μή with emphatic future as 'I will certainly not deny
    you'
  alternative_readings:
  - I will never deny you
  - I will by no means deny you
  rationale: The verse presents Peter's emphatic self-assurance before his later failure.
    The translation preserves the force of the Greek negation without importing theological
    interpretation beyond the narrative irony.
  doctrine_reference: Preserve theological tension rather than resolve it.
