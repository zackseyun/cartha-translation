id: MRK.14.25
reference: Mark 14:25
source:
  edition: SBLGNT
  text: ἀμὴν λέγω ὑμῖν ὅτι οὐκέτι οὐ μὴ πίω ἐκ τοῦ γενήματος τῆς ἀμπέλου ἕως τῆς ἡμέρας
    ἐκείνης ὅταν αὐτὸ πίνω καινὸν ἐν τῇ βασιλείᾳ τοῦ θεοῦ.
translation:
  text: Truly I tell you, I will certainly not drink again from the fruit of the vine
    until that day when I drink it new in the kingdom of God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I will never again drink from the fruit of the vine.' The Greek uses
      an emphatic negation.
    reason: lexical_alternative
  - marker: b
    text: '''Fruit of the vine'' is the Greek expression here; that is, the drink
      from the vine used at the meal.'
    reason: lexical_alternative
  - marker: c
    text: Or 'drink it anew.' The Greek adjective can mean 'new' and may imply eschatological
      newness.
    reason: alternative_reading
lexical_decisions:
- source_word: ἀμὴν
  chosen: Truly
  alternatives:
  - Amen
  - Truly, truly
  lexicon: BDAG
  rationale: In the Synoptic formula ἀμὴν λέγω ὑμῖν, English idiom is best served
    by 'Truly I tell you.' 'Amen' is possible but less transparent in contemporary
    English.
- source_word: λέγω ὑμῖν
  chosen: I tell you
  alternatives:
  - I say to you
  lexicon: BDAG
  rationale: '''I tell you'' is natural modern English while preserving the direct
    address and solemn declaration formula.'
- source_word: οὐκέτι οὐ μὴ πίω
  chosen: I will certainly not drink again
  alternatives:
  - I will never again drink
  - I will no longer ever drink
  lexicon: BDAG
  rationale: οὐκέτι conveys 'no longer/again no more,' and οὐ μὴ with the aorist subjunctive
    is an emphatic future negation. 'Will certainly not drink again' preserves both
    the temporal and emphatic force without awkwardness.
- source_word: ἐκ τοῦ γενήματος τῆς ἀμπέλου
  chosen: from the fruit of the vine
  alternatives:
  - of the produce of the vine
  - from vine fruit
  lexicon: BDAG
  rationale: γενήμα can mean product/fruit/progeny; in this idiom referring to what
    is drunk at the meal, 'fruit of the vine' is the established and accurate expression.
    It avoids over-specifying 'wine,' which the Greek does not state directly.
- source_word: ἕως τῆς ἡμέρας ἐκείνης
  chosen: until that day
  alternatives:
  - until the day
  - up to that day
  lexicon: BDAG
  rationale: This is a straightforward temporal expression; 'that day' preserves the
    demonstrative emphasis.
- source_word: ὅταν
  chosen: when
  alternatives:
  - whenever
  lexicon: BDAG
  rationale: In this eschatological-looking temporal clause, 'when' fits the singular
    future event in view better than the more iterative 'whenever.'
- source_word: αὐτὸ
  chosen: it
  alternatives:
  - this
  lexicon: BDAG
  rationale: The pronoun most naturally refers back to the drink just mentioned. 'It'
    is the simplest and most coherent English rendering.
- source_word: πίνω
  chosen: I drink
  alternatives:
  - I shall drink
  lexicon: BDAG
  rationale: Present subjunctive after ὅταν commonly has future reference; English
    present after 'when' communicates this naturally.
- source_word: καινὸν
  chosen: new
  alternatives:
  - anew
  - fresh
  lexicon: BDAG
  rationale: καινός emphasizes newness in kind or quality. 'New' is the most direct
    rendering; whether it means newly in the eschatological sense or anew is left
    open by the main text.
- source_word: ἐν τῇ βασιλείᾳ τοῦ θεοῦ
  chosen: in the kingdom of God
  alternatives:
  - in God's kingdom
  lexicon: BDAG
  rationale: This preserves the standard NT expression with full theological weight
    and avoids unnecessary paraphrase.
