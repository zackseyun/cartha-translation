theological_decisions:
- issue: Meaning of καινὸν in the final clause
  chosen_reading: Rendered simply as 'new' without specifying whether the sense is
    'new in quality' or 'anew.'
  alternative_readings:
  - anew
  - newly in the eschatological kingdom banquet
  rationale: The adjective can suggest qualitative newness, but the verse does not
    explicitly explain the mode of newness. Preserving the broader term maintains
    the eschatological tension rather than resolving it beyond the Greek.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
- issue: Referent of 'fruit of the vine'
  chosen_reading: Kept as 'fruit of the vine' rather than interpreting it directly
    as 'wine.'
  alternative_readings:
  - wine
  rationale: Although the phrase clearly refers to the cup's contents in context,
    the Greek uses the idiom 'fruit of the vine.' Retaining it avoids importing a
    more specific term than the text itself uses.
  doctrine_reference: 'Translation philosophy §1: Original-language primacy over translation
    tradition.'
