theological_decisions:
- issue: Retention of Mark's historical presents
  chosen_reading: Kept the main narrative verbs in the present tense ('comes,' 'finds,'
    'says').
  alternative_readings:
  - Shift all verbs to simple past for smoother English narrative.
  rationale: This is not a doctrinal issue but affects how the evangelist's style
    is represented. Mark frequently uses historical presents for vividness; preserving
    them reflects original-language primacy unless English becomes unnatural. Here
    the present tense remains readable.
  doctrine_reference: Translation philosophy §1, §6
- issue: Rendering of γρηγορέω in context
  chosen_reading: Translated as 'stay awake.'
  alternative_readings:
  - '''keep watch'''
  - '''watch'''
  rationale: The verse's immediate contrast is with sleeping, so the concrete sense
    should be foregrounded. 'Keep watch' is possible and thematically connected to
    the surrounding passage, but 'stay awake' best communicates the direct force of
    Jesus' question in accessible modern English while preserving the watchfulness
    nuance in context.
  doctrine_reference: Translation philosophy §6
