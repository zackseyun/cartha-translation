id: MRK.14.37
reference: Mark 14:37
source:
  edition: SBLGNT
  text: καὶ ἔρχεται καὶ εὑρίσκει αὐτοὺς καθεύδοντας, καὶ λέγει τῷ Πέτρῳ· Σίμων, καθεύδεις;
    οὐκ ἴσχυσας μίαν ὥραν γρηγορῆσαι;
translation:
  text: And he comes and finds them sleeping, and he says to Peter, “Simon, are you
    sleeping? Were you not strong enough to stay awake one hour?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Could you not keep watch for one hour?”
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔρχεται
  chosen: he comes
  alternatives:
  - he came
  - he arrives
  lexicon: BDAG
  rationale: Rendered as historical present ('comes') to reflect Mark's vivid narrative
    style rather than smoothing to a simple past.
- source_word: εὑρίσκει
  chosen: finds
  alternatives:
  - found
  lexicon: BDAG
  rationale: Also a historical present in Greek; retained as present for narrative
    immediacy and consistency with ἔρχεται.
- source_word: καθεύδοντας
  chosen: sleeping
  alternatives:
  - asleep
  lexicon: BDAG
  rationale: The participle denotes the ongoing action/state of sleeping; 'sleeping'
    preserves the verbal force better than the adjectival 'asleep'.
- source_word: λέγει
  chosen: he says
  alternatives:
  - he said
  lexicon: BDAG
  rationale: Historical present retained, matching Mark's style and the surrounding
    present-tense verbs.
- source_word: τῷ Πέτρῳ
  chosen: to Peter
  alternatives:
  - to Petros
  lexicon: BDAG
  rationale: Personal names are transliterated by standard English convention; dative
    rendered naturally with 'to'.
- source_word: Σίμων
  chosen: Simon
  lexicon: BDAG
  rationale: Jesus addresses Peter by his personal name Σίμων; this should be preserved
    distinctly from the preceding reference to Peter.
- source_word: καθεύδεις
  chosen: are you sleeping
  alternatives:
  - are you asleep
  - do you sleep
  lexicon: BDAG
  rationale: Present indicative in direct question; 'are you sleeping' is idiomatic
    and preserves the immediate rebuke.
- source_word: οὐκ ἴσχυσας
  chosen: were you not strong enough
  alternatives:
  - could you not
  - were you not able
  lexicon: BDAG
  rationale: ἰσχύω fundamentally concerns having strength or capability. 'Were you
    not strong enough' preserves the lexical force more transparently than the more
    idiomatic but less explicit 'could you not.'
- source_word: μίαν ὥραν
  chosen: one hour
  alternatives:
  - for one hour
  lexicon: BDAG
  rationale: Accusative of extent of time; English can express this naturally as 'one
    hour' after the infinitive phrase.
- source_word: γρηγορῆσαι
  chosen: to stay awake
  alternatives:
  - to keep watch
  - to be watchful
  - to watch
  lexicon: BDAG
  rationale: In this immediate context, contrasted with sleeping, the sense is literal
    wakefulness with watchful alertness. 'Stay awake' is clear modern English and
    fits the rebuke better than the potentially ambiguous 'watch'.
