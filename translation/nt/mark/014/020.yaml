id: MRK.14.20
reference: Mark 14:20
source:
  edition: SBLGNT
  text: ὁ ⸀δὲ εἶπεν αὐτοῖς· ⸀Εἷς τῶν δώδεκα, ὁ ἐμβαπτόμενος μετ’ ἐμοῦ εἰς ⸀τὸ τρύβλιον·
translation:
  text: And he said to them, “One of the twelve, the one dipping with me into the
    bowl.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the dish.” The Greek τρύβλιον can refer to a bowl or a dish used for
      eating.
    reason: lexical_alternative
lexical_decisions:
- source_word: δὲ
  chosen: And
  alternatives:
  - Then
  - But
  lexicon: BDAG
  rationale: Here δέ functions as a mild connective continuing the narrative rather
    than marking a strong contrast, so 'And' gives natural English flow.
- source_word: εἶπεν αὐτοῖς
  chosen: he said to them
  alternatives:
  - he told them
  lexicon: BDAG
  rationale: λέγω is most straightforwardly 'say'; 'said to them' preserves the direct-speech
    introduction without adding interpretive nuance.
- source_word: Εἷς τῶν δώδεκα
  chosen: One of the twelve
  alternatives:
  - One of the Twelve
  lexicon: BDAG
  rationale: The phrase identifies the betrayer as belonging to Jesus's inner group.
    Lowercase 'twelve' is clear and natural in running text, though capitalization
    is possible as a quasi-title.
- source_word: ὁ ἐμβαπτόμενος
  chosen: the one dipping
  alternatives:
  - the one who is dipping
  - the one dipping in
  - the one who dips
  lexicon: BDAG
  rationale: The present middle/passive participle is rendered with an English participial
    expression that preserves the ongoing/immediate action in context. 'The one dipping'
    is concise and natural while retaining the article's identifying force.
- source_word: μετ’ ἐμοῦ
  chosen: with me
  alternatives:
  - along with me
  lexicon: BDAG
  rationale: μετά with the genitive denotes accompaniment; 'with me' is the plain
    and natural rendering.
- source_word: εἰς τὸ τρύβλιον
  chosen: into the bowl
  alternatives:
  - into the dish
  - in the bowl
  lexicon: BDAG
  rationale: τρύβλιον refers to a dish or bowl used at table. 'Bowl' is accessible
    modern English; 'into' reflects εἰς more precisely than a static 'in'.
