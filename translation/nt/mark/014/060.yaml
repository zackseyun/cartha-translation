id: MRK.14.60
reference: Mark 14:60
source:
  edition: SBLGNT
  text: καὶ ἀναστὰς ὁ ἀρχιερεὺς εἰς μέσον ἐπηρώτησεν τὸν Ἰησοῦν λέγων· Οὐκ ἀποκρίνῃ
    οὐδέν; τί οὗτοί σου καταμαρτυροῦσιν;
translation:
  text: And the high priest stood up in the middle and questioned Jesus, saying, “Do
    you answer nothing? What is it that these men are testifying against you?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “into the midst.” The phrase indicates that the high priest took a central
      position before the assembly.
    reason: lexical_alternative
  - marker: b
    text: Or “Do you make no answer?”
    reason: lexical_alternative
  - marker: c
    text: Literally “these men”; Greek has a masculine plural demonstrative referring
      to the witnesses present.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀναστὰς
  chosen: stood up
  alternatives:
  - rose
  lexicon: BDAG
  rationale: Aorist participle of ἀνίστημι here denotes the physical action of getting
    up. 'Stood up' is natural modern English and preserves the narrative movement.
- source_word: ὁ ἀρχιερεὺς
  chosen: the high priest
  alternatives:
  - the chief priest
  lexicon: BDAG
  rationale: Standard rendering for ἀρχιερεύς in this context, referring to the presiding
    Jewish high priest rather than priests generally.
- source_word: εἰς μέσον
  chosen: in the middle
  alternatives:
  - into the midst
  - in the center
  lexicon: BDAG
  rationale: The phrase indicates moving or standing in a central position before
    the assembly. 'In the middle' is idiomatic and preserves the spatial sense without
    archaic wording.
- source_word: ἐπηρώτησεν
  chosen: questioned
  alternatives:
  - asked
  - interrogated
  lexicon: BDAG
  rationale: ἐπερωτάω can mean ask or question. 'Questioned' fits the judicial setting
    better than the simpler 'asked' without overstating the force as 'interrogated.'
- source_word: ἀποκρίνῃ οὐδέν
  chosen: Do you answer nothing?
  alternatives:
  - Do you make no answer?
  - Have you no answer?
  lexicon: BDAG
  rationale: This preserves the blunt rhetorical challenge of the Greek. Although
    slightly formal in English, it closely reflects the wording and tone of the accusation.
- source_word: τί
  chosen: What is it that
  alternatives:
  - What
  - Why do
  lexicon: BDAG
  rationale: τί introduces the content of the challenge regarding the testimony. 'What
    is it that' makes the English question complete and natural while preserving the
    focus on the accusation being made.
- source_word: οὗτοί
  chosen: these men
  alternatives:
  - these
  - these people
  lexicon: BDAG
  rationale: The demonstrative is masculine plural and refers to the witnesses present.
    'These men' makes the referent explicit in English and reflects the gendered form
    of the Greek.
- source_word: καταμαρτυροῦσιν
  chosen: are testifying against you
  alternatives:
  - testify against you
  - bear witness against you
  - accuse you
  lexicon: BDAG
  rationale: καταμαρτυρέω means to bear testimony against someone. 'Are testifying
    against you' captures the present-tense action and legal nuance better than the
    more interpretive 'accuse you.'
