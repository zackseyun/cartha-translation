theological_decisions:
- issue: Gendered reference of οὗτοί
  chosen_reading: these men
  alternative_readings:
  - these
  - these people
  rationale: Following the translation philosophy's gender-accurate principle, the
    masculine plural demonstrative is rendered with an explicitly masculine English
    term because it refers to specific male witnesses in the trial scene, not a generic
    mixed group.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
