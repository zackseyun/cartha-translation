id: MRK.14.51
reference: Mark 14:51
source:
  edition: SBLGNT
  text: Καὶ ⸂νεανίσκος τις⸃ ⸀συνηκολούθει αὐτῷ περιβεβλημένος σινδόνα ἐπὶ γυμνοῦ,
    καὶ κρατοῦσιν ⸀αὐτόν,
translation:
  text: And a certain young man was following him, wearing only a linen cloth over
    his naked body, and they seize him,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a linen sheet.' The Greek σινδών can refer to a linen cloth or sheet-like
      garment.
    reason: lexical_alternative
lexical_decisions:
- source_word: νεανίσκος τις
  chosen: a certain young man
  alternatives:
  - a young man
  - a certain युवक
  lexicon: BDAG
  rationale: νεανίσκος denotes a young man/youth; τις adds indefiniteness with a slight
    particularizing force, well captured by 'a certain.' This preserves the narrative
    introduction of an otherwise unnamed individual.
- source_word: συνηκολούθει
  chosen: was following
  alternatives:
  - followed
  - was accompanying
  lexicon: BDAG
  rationale: The imperfect indicates ongoing action in past time. 'Was following'
    preserves the progressive sense better than simple 'followed.'
- source_word: αὐτῷ
  chosen: him
  lexicon: BDAG
  rationale: The dative pronoun refers to Jesus in context; English idiom with 'follow'
    takes a direct object, so 'him' is the natural rendering.
- source_word: περιβεβλημένος
  chosen: wearing
  alternatives:
  - wrapped in
  - clothed with
  lexicon: BDAG
  rationale: The participle from περιβάλλω describes being clothed or wrapped. 'Wearing'
    is concise, idiomatic English that fits the construction with σινδόνα.
- source_word: σινδόνα
  chosen: a linen cloth
  alternatives:
  - a linen sheet
  - a linen garment
  lexicon: BDAG
  rationale: σινδών refers to a linen cloth, sheet, or garment. 'Linen cloth' is broad
    enough to fit the term here without over-specifying the exact form of the fabric.
- source_word: ἐπὶ γυμνοῦ
  chosen: over his naked body
  alternatives:
  - over his bare skin
  - on his naked body
  lexicon: BDAG
  rationale: The phrase indicates the linen cloth was worn directly on the body with
    nothing underneath. 'Over his naked body' makes the sense explicit in natural
    English while preserving the force of γυμνοῦ.
- source_word: κρατοῦσιν
  chosen: they seize
  alternatives:
  - they grab
  - they arrest
  lexicon: BDAG
  rationale: The historical present is vivid and should be preserved where possible.
    'Seize' matches the force of κρατέω here better than the more interpretive 'arrest.'
- source_word: αὐτόν
  chosen: him
  lexicon: BDAG
  rationale: Direct object referring to the young man just introduced.
