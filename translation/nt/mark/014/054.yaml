id: MRK.14.54
reference: Mark 14:54
source:
  edition: SBLGNT
  text: καὶ ὁ Πέτρος ἀπὸ μακρόθεν ἠκολούθησεν αὐτῷ ἕως ἔσω εἰς τὴν αὐλὴν τοῦ ἀρχιερέως
    καὶ ἦν συγκαθήμενος μετὰ τῶν ὑπηρετῶν καὶ θερμαινόμενος πρὸς τὸ φῶς.
translation:
  text: And Peter followed him from a distance, as far as inside the courtyard of
    the high priest. He was sitting with the officers and warming himself by the fire.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'by the light.' The Greek reads literally 'toward/by the light,' likely
      referring to the firelight in the courtyard.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπὸ μακρόθεν
  chosen: from a distance
  alternatives:
  - from afar
  - at a distance
  lexicon: BDAG
  rationale: Idiomatic English equivalent that preserves the spatial and narrative
    sense of Peter's cautious following without archaic tone.
- source_word: ἠκολούθησεν αὐτῷ
  chosen: followed him
  alternatives:
  - was following him
  lexicon: BDAG
  rationale: Aorist indicative is naturally rendered as simple past in narrative.
    'Followed him' is the plain sense.
- source_word: ἕως ἔσω εἰς
  chosen: as far as inside
  alternatives:
  - up to the inside of
  - right into
  lexicon: BDAG
  rationale: The combination intensifies the extent of Peter's movement. 'As far as
    inside' preserves the sense that he followed to the interior area of the high
    priest's courtyard without overstating entry into the house itself.
- source_word: αὐλήν
  chosen: courtyard
  alternatives:
  - court
  - palace courtyard
  lexicon: BDAG
  rationale: In this context αὐλή refers to the enclosed court area of the high priest's
    residence. 'Courtyard' is clear modern English and more precise than 'palace'
    or bare 'court'.
- source_word: ἀρχιερέως
  chosen: the high priest
  alternatives:
  - the chief priest
  lexicon: BDAG
  rationale: Standard and contextually accurate rendering for ἀρχιερεύς in the Gospel
    passion narrative.
- source_word: ἦν συγκαθήμενος
  chosen: He was sitting
  alternatives:
  - he was seated
  - he was sitting together
  lexicon: BDAG
  rationale: Periphrastic imperfect conveys ongoing scene-setting. 'Sitting' is natural
    English; the σύν element is represented by the following phrase 'with the officers.'
- source_word: μετὰ τῶν ὑπηρετῶν
  chosen: with the officers
  alternatives:
  - with the servants
  - with the attendants
  - with the guards
  lexicon: BDAG
  rationale: In this arrest-and-hearing context, ὑπηρέται are temple/palace functionaries
    with security roles, not household slaves. 'Officers' best captures their official
    function in readable English.
- source_word: θερμαινόμενος
  chosen: warming himself
  alternatives:
  - keeping himself warm
  lexicon: BDAG
  rationale: Middle/passive participle in context describes Peter's action by the
    fire. 'Warming himself' is concise and idiomatic.
- source_word: πρὸς τὸ φῶς
  chosen: by the fire
  alternatives:
  - by the light
  - toward the light
  lexicon: BDAG
  rationale: Although φῶς literally means 'light,' in this context the light is produced
    by the courtyard fire, and the idiomatic sense is Peter warming himself at it.
    'By the fire' communicates the intended scene more clearly in English while remaining
    faithful to context.
