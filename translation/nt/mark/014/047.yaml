id: MRK.14.47
reference: Mark 14:47
source:
  edition: SBLGNT
  text: εἷς δέ ⸀τις τῶν παρεστηκότων σπασάμενος τὴν μάχαιραν ἔπαισεν τὸν δοῦλον τοῦ
    ἀρχιερέως καὶ ἀφεῖλεν αὐτοῦ τὸ ⸀ὠτάριον.
translation:
  text: But one of those standing nearby drew his sword and struck the high priest’s
    slave, and cut off his ear.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "servant" for "slave" (Greek δοῦλος).
    reason: lexical_alternative
lexical_decisions:
- source_word: εἷς δέ τις
  chosen: But one
  alternatives:
  - But a certain one
  - Now one
  lexicon: BDAG
  rationale: 'The combination εἷς ... τις is an idiomatic, somewhat indefinite way
    to introduce a single person from a group: ''one'' or ''a certain one.'' ''But
    one'' preserves δέ as a mild narrative contrast/continuation and keeps the subject
    indefinite, matching Mark''s non-identification here.'
- source_word: τῶν παρεστηκότων
  chosen: of those standing nearby
  alternatives:
  - of those standing by
  - of those present
  lexicon: BDAG
  rationale: The perfect participle of παρίστημι denotes those who were standing there/present.
    'Standing nearby' is natural modern English and preserves the spatial sense better
    than the flatter 'present.'
- source_word: σπασάμενος
  chosen: drew
  alternatives:
  - having drawn
  - pulled out
  lexicon: BDAG
  rationale: 'In context with μάχαιρα, σπάομαι means to draw a weapon. English normally
    expresses the participle idiomatically with a finite verb sequence: ''drew his
    sword and struck.'' This preserves the action without awkwardness.'
- source_word: τὴν μάχαιραν
  chosen: his sword
  alternatives:
  - the sword
  - his dagger
  lexicon: BDAG
  rationale: μάχαιρα can denote a sword, large knife, or dagger. In this arrest scene,
    'sword' is the standard and clearest rendering in English. Although the Greek
    has the article ('the sword'), English idiom naturally uses the possessive for
    a weapon drawn by the subject; this does not materially alter the sense.
- source_word: ἔπαισεν
  chosen: struck
  alternatives:
  - hit
  - smote
  lexicon: BDAG
  rationale: '''Struck'' is the most natural modern equivalent for παίω here, retaining
    the force of a violent blow without archaic diction.'
- source_word: τὸν δοῦλον
  chosen: the ... slave
  alternatives:
  - the servant
  lexicon: BDAG
  rationale: Per project guidance, δοῦλος should be rendered 'slave' where bonded
    status is in view. Here the referent is the high priest's δοῦλος, denoting a subordinate
    in a household/institutional relationship; 'slave' better preserves the social
    reality than the softer 'servant.'
- source_word: τοῦ ἀρχιερέως
  chosen: the high priest’s
  alternatives:
  - of the high priest
  lexicon: BDAG
  rationale: The genitive is naturally rendered as an English possessive. 'High priest'
    is the standard translation of ἀρχιερεύς in this context.
- source_word: ἀφεῖλεν
  chosen: cut off
  alternatives:
  - removed
  - took off
  lexicon: BDAG
  rationale: Although ἀφαιρέω literally means 'take away/remove,' in this violent
    context with 'ear' the idiomatic English equivalent is 'cut off,' which communicates
    the result clearly.
- source_word: αὐτοῦ τὸ ὠτάριον
  chosen: his ear
  alternatives:
  - his little ear
  - his right ear
  lexicon: BDAG
  rationale: ὠτάριον is a diminutive form meaning 'ear' (literally 'little ear'),
    but English normally does not preserve the diminutive here. 'Right ear' is not
    in Mark's text and should not be imported from parallel accounts.
