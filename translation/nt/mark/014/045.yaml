id: MRK.14.45
reference: Mark 14:45
source:
  edition: SBLGNT
  text: καὶ ἐλθὼν ⸀εὐθὺς προσελθὼν αὐτῷ λέγει· ⸀Ῥαββί, καὶ κατεφίλησεν αὐτόν.
translation:
  text: And when he came, he immediately went up to him and said, “Rabbi!” and kissed
    him fervently.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “kissed him repeatedly” or “kissed him warmly”; the Greek verb is more
      emphatic than a simple “kissed.”
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐλθὼν
  chosen: when he came
  alternatives:
  - having come
  - after coming
  lexicon: BDAG
  rationale: Aorist participle of ἔρχομαι, functioning temporally. 'When he came'
    is natural English and preserves the sequence without woodenness.
- source_word: εὐθὺς
  chosen: immediately
  alternatives:
  - at once
  - straightway
  lexicon: BDAG
  rationale: Mark frequently uses εὐθύς for rapid narrative movement. 'Immediately'
    is the standard clear modern equivalent.
- source_word: προσελθὼν αὐτῷ
  chosen: went up to him
  alternatives:
  - approached him
  - came up to him
  lexicon: BDAG
  rationale: The participle indicates physical approach. 'Went up to him' reads naturally
    in context and avoids awkward repetition with the previous 'came' while preserving
    the movement toward Jesus.
- source_word: λέγει
  chosen: said
  alternatives:
  - says
  lexicon: BDAG
  rationale: Although the Greek uses the historical present, English narrative style
    commonly renders it as past tense for smoothness. The speech act is preserved
    without forcing an unnatural present.
- source_word: Ῥαββί
  chosen: Rabbi
  alternatives:
  - Teacher
  lexicon: BDAG
  rationale: This is a transliterated address/title in the Greek text. Retaining 'Rabbi'
    preserves the historical and cultural setting; 'Teacher' is a possible sense but
    is less textually transparent here.
- source_word: κατεφίλησεν
  chosen: kissed him fervently
  alternatives:
  - kissed him
  - kissed him repeatedly
  - embraced and kissed him
  lexicon: BDAG
  rationale: The compound verb καταφιλέω can intensify φιλέω and in context conveys
    an emphatic demonstrative kiss, not merely a neutral peck. 'Kissed him fervently'
    captures the force without overcommitting to repetition, while signaling the marked
    nature of Judas's act.
