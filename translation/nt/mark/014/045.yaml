theological_decisions:
- issue: Rendering Judas's greeting Ῥαββί
  chosen_reading: Rabbi
  alternative_readings:
  - Teacher
  rationale: The verse presents Judas addressing Jesus with the Semitic title actually
    used in the scene. Preserving 'Rabbi' maintains the irony and historical texture
    without importing additional doctrinal interpretation.
  doctrine_reference: 'Translation philosophy: Translate titles; transliterate names.'
