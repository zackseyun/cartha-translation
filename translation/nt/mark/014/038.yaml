id: MRK.14.38
reference: Mark 14:38
source:
  edition: SBLGNT
  text: γρηγορεῖτε καὶ προσεύχεσθε, ἵνα μὴ ⸀ἔλθητε εἰς πειρασμόν· τὸ μὲν πνεῦμα πρόθυμον
    ἡ δὲ σὰρξ ἀσθενής.
translation:
  text: Stay awake and pray, so that you may not enter into temptation. The spirit
    indeed is willing, but the flesh is weak.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'testing' or 'trial' for 'temptation' (πειρασμόν).
    reason: lexical_alternative
lexical_decisions:
- source_word: γρηγορεῖτε
  chosen: Stay awake
  alternatives:
  - Keep watch
  - Be watchful
  lexicon: BDAG
  rationale: Imperative plural from γρηγορέω, literally 'be awake/watch.' In this
    Gethsemane context, 'Stay awake' is natural modern English and preserves both
    the literal and vigilance sense without sounding archaic.
- source_word: προσεύχεσθε
  chosen: pray
  alternatives:
  - be praying
  lexicon: BDAG
  rationale: Present middle/passive imperative plural; the straightforward imperative
    'pray' best fits idiomatic English while preserving the ongoing exhortational
    force.
- source_word: ἵνα μὴ ἔλθητε
  chosen: so that you may not enter
  alternatives:
  - lest you enter
  - so that you may not come into
  lexicon: BDAG
  rationale: ἵνα with μή and aorist subjunctive expresses purpose/prevention. 'So
    that you may not enter' is clear contemporary English and preserves the telic
    nuance better than the more archaic 'lest.'
- source_word: εἰς πειρασμόν
  chosen: into temptation
  alternatives:
  - into testing
  - into trial
  lexicon: BDAG
  rationale: πειρασμός can mean temptation, testing, or trial. In this warning context,
    'temptation' is the most established and contextually fitting rendering, while
    the broader sense of testing is worth preserving in a footnote.
- source_word: τὸ μὲν πνεῦμα
  chosen: The spirit indeed
  alternatives:
  - The spirit on the one hand
  - The Spirit indeed
  lexicon: BDAG
  rationale: πνεῦμα here most naturally refers to the human inner disposition rather
    than the Holy Spirit, especially in contrast with 'the flesh.' 'Indeed' reflects
    μέν in a natural paired contrast with δέ. Capitalizing 'Spirit' would overinterpret
    the referent.
- source_word: πρόθυμον
  chosen: is willing
  alternatives:
  - is eager
  - is ready
  lexicon: BDAG
  rationale: πρόθυμος denotes readiness, willingness, or eagerness. 'Willing' is the
    most idiomatic in the familiar contrast and fits the disciples' sincere but failing
    intent.
- source_word: ἡ δὲ σὰρξ
  chosen: but the flesh
  alternatives:
  - but the body
  - but human weakness
  lexicon: BDAG
  rationale: Per doctrine, σάρξ should be rendered 'flesh' when literal or in a broad
    anthropological contrast, and 'sinful nature' only when the metaphorical moral
    sense clearly demands it. Here the contrast is between inward willingness and
    human frailty, so 'flesh' best preserves the wording and theological tension without
    importing a stronger doctrinal interpretation.
- source_word: ἀσθενής
  chosen: is weak
  alternatives:
  - is feeble
  - is powerless
  lexicon: BDAG
  rationale: ἀσθενής means weak, sick, or powerless depending on context. Here 'weak'
    best captures human frailty in the contrast with willing spirit.
