theological_decisions:
- issue: Referent of πνεῦμα
  chosen_reading: human spirit / inner willingness
  alternative_readings:
  - the Holy Spirit
  rationale: The immediate contrast with 'the flesh' and the setting of Jesus addressing
    sleepy disciples favors the human spirit as the seat of intention rather than
    a statement about the Holy Spirit. This avoids importing a doctrinal claim not
    required by the text.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
- issue: Rendering of σάρξ
  chosen_reading: flesh
  alternative_readings:
  - sinful nature
  - body
  rationale: The doctrine excerpt specifies 'flesh (literal) / sinful nature (metaphorical)'
    context-dependently. In this verse, the emphasis is human frailty and weakness,
    not specifically indwelling sin as a doctrinal category, so 'flesh' is preferred.
  doctrine_reference: 'Contested terms table: σάρξ → ''flesh'' (literal) / ''sinful
    nature'' (metaphorical).'
