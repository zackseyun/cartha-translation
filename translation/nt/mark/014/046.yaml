id: MRK.14.46
reference: Mark 14:46
source:
  edition: SBLGNT
  text: οἱ δὲ ἐπέβαλαν ⸂τὰς χεῖρας αὐτῷ⸃ καὶ ἐκράτησαν αὐτόν.
translation:
  text: Then they laid hands on him and seized him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'put their hands on him.' The Greek expression is an idiom for taking
      hold of someone, often in order to arrest him.
    reason: lexical_alternative
  - marker: b
    text: Or 'arrested him.'
    reason: alternative_reading
lexical_decisions:
- source_word: οἱ δὲ
  chosen: Then they
  alternatives:
  - But they
  - And they
  lexicon: BDAG
  rationale: οἱ functions substantivally ('the ones/they'), and δέ marks a mild narrative
    development or contrast. 'Then they' gives natural English narrative progression
    without overstating adversative force.
- source_word: ἐπέβαλαν τὰς χεῖρας αὐτῷ
  chosen: laid hands on him
  alternatives:
  - put their hands on him
  - laid their hands on him
  lexicon: BDAG
  rationale: The idiom ἐπιβάλλω + χεῖρας means to lay hands on someone, often with
    hostile intent such as arrest. 'Laid hands on him' preserves the idiomatic force
    and prepares for the following explicit arrest verb.
- source_word: ἐκράτησαν αὐτόν
  chosen: seized him
  alternatives:
  - arrested him
  - took hold of him
  lexicon: BDAG
  rationale: κρατέω here denotes forceful taking/holding in the arrest scene. 'Seized
    him' is vivid and closely matches the Greek without importing the more procedural
    nuance of 'arrested,' though that sense is contextually present.
