id: MRK.14.42
reference: Mark 14:42
source:
  edition: SBLGNT
  text: ἐγείρεσθε ἄγωμεν· ἰδοὺ ὁ παραδιδούς με ἤγγικεν.
translation:
  text: Get up; let us go. Look, the one betraying me has come near.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'the one handing me over has come near.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγείρεσθε
  chosen: Get up
  alternatives:
  - Rise
  - Wake up
  lexicon: BDAG
  rationale: Second person plural present middle/passive imperative of ἐγείρω. In
    context Jesus is urging the disciples to stand and move, not primarily to awaken
    from sleep, so 'Get up' is natural modern English and fits the immediate action.
- source_word: ἄγωμεν
  chosen: let us go
  alternatives:
  - let us be going
  - let us leave
  lexicon: BDAG
  rationale: First person plural present subjunctive used hortatorily. 'Let us go'
    is the clearest idiomatic English equivalent. 'Be going' is possible but less
    natural in contemporary English.
- source_word: ἰδού
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: BDAG
  rationale: Deictic/interjection drawing attention to what follows. 'Look' preserves
    the force in readable modern English better than the archaic 'Behold.'
- source_word: ὁ παραδιδούς
  chosen: the one betraying
  alternatives:
  - the one handing over
  - my betrayer
  - the one delivering up
  lexicon: BDAG
  rationale: Present active participle of παραδίδωμι with article, functioning substantivally.
    In the passion context, 'betray' is the established and contextually accurate
    sense, though the more literal idea is 'hand over.' Rendering it as 'the one betraying'
    preserves the participial force and avoids importing a noun not present in Greek.
- source_word: με
  chosen: me
  lexicon: BDAG
  rationale: Direct object pronoun referring to Jesus.
- source_word: ἤγγικεν
  chosen: has come near
  alternatives:
  - is near
  - has arrived
  lexicon: BDAG
  rationale: Perfect active indicative of ἐγγίζω. The perfect conveys a completed
    approach with present relevance. 'Has come near' preserves that aspect better
    than the flatter 'is near,' while also fitting the imminent arrival of Judas.
