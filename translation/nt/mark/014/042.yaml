theological_decisions:
- issue: Rendering παραδίδωμι in the passion context
  chosen_reading: betraying
  alternative_readings:
  - handing over
  - delivering up
  rationale: In Mark's passion narrative, παραδίδωμι can be rendered more literally
    as 'hand over,' but here the referent is Judas and the relational/moral force
    of betrayal is contextually prominent. 'Betraying' communicates the narrative
    sense without adding doctrinal interpretation beyond the scene itself.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; preserve theological tension rather than resolve it.'
