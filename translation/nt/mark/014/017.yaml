id: MRK.14.17
reference: Mark 14:17
source:
  edition: SBLGNT
  text: Καὶ ὀψίας γενομένης ἔρχεται μετὰ τῶν δώδεκα.
translation:
  text: And when evening came, he comes with the twelve.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with the Twelve,' treating the phrase as a recognized designation for
      Jesus' apostolic group.
    reason: lexical_alternative
lexical_decisions:
- source_word: Καὶ
  chosen: And
  alternatives:
  - Now
  lexicon: BDAG
  rationale: Standard connective introducing the next event in narrative sequence.
    'And' preserves Mark's paratactic style better than a more interpretive transition.
- source_word: ὀψίας γενομένης
  chosen: when evening came
  alternatives:
  - when it was evening
  - after evening had come
  lexicon: BDAG
  rationale: Genitive absolute marking temporal circumstance. 'When evening came'
    is natural modern English and preserves the temporal force without over-literal
    awkwardness.
- source_word: ἔρχεται
  chosen: he comes
  alternatives:
  - he arrives
  - he came
  lexicon: BDAG
  rationale: Present middle/passive indicative in Mark's vivid historical present.
    'He comes' preserves the discourse effect of the Greek better than smoothing to
    past tense, though English readers may perceive it as stylistically marked.
- source_word: μετὰ τῶν δώδεκα
  chosen: with the twelve
  alternatives:
  - with the Twelve
  lexicon: BDAG
  rationale: μετά with the genitive means accompaniment, 'with.' The phrase refers
    to Jesus' twelve disciples/apostles. Lowercase 'the twelve' is understandable
    and transparent; the capitalized form is a possible stylistic alternative reflecting
    quasi-titular usage.
