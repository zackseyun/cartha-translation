theological_decisions:
- issue: Reference of 'the twelve'
  chosen_reading: the phrase refers to Jesus' inner apostolic group, including Judas
    at this point in the narrative
  rationale: This is the plain narrative referent and does not require expansion in
    the main text. The translation leaves the phrase concise rather than interpretively
    adding 'disciples' or 'apostles.'
