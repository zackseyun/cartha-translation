id: MRK.14.52
reference: Mark 14:52
source:
  edition: SBLGNT
  text: ὁ δὲ καταλιπὼν τὴν σινδόνα γυμνὸς ⸀ἔφυγεν.
translation:
  text: But he left the linen cloth behind and fled naked.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'linen sheet' or 'linen garment' for 'linen cloth' (σινδόνα).
    reason: lexical_alternative
  - marker: b
    text: '''Naked'' (γυμνός) can in some contexts mean inadequately clothed, but
      here the immediate sense is that he escaped without the garment.'
    reason: lexical_alternative
lexical_decisions:
- source_word: δὲ
  chosen: But
  alternatives:
  - And
  lexicon: BDAG
  rationale: δέ here marks a mild contrast or continuation with the previous action;
    'But' fits the narrative turn as the young man escapes after being seized.
- source_word: καταλιπὼν
  chosen: left ... behind
  alternatives:
  - leaving
  - abandoning
  lexicon: BDAG
  rationale: The aorist participle of καταλείπω denotes leaving something behind.
    'Left ... behind' is idiomatic English and preserves the sense of relinquishing
    the garment in order to escape.
- source_word: σινδόνα
  chosen: linen cloth
  alternatives:
  - linen sheet
  - linen garment
  lexicon: BDAG
  rationale: σινδών refers to a linen cloth or sheet-like garment. 'Linen cloth' is
    broad enough to fit the context without over-specifying its exact form, while
    preserving the material reference.
- source_word: γυμνὸς
  chosen: naked
  alternatives:
  - bare
  - lightly clothed
  lexicon: BDAG
  rationale: γυμνός most naturally means 'naked' here. Although in some contexts it
    can mean inadequately clothed, this scene implies that after leaving the garment
    he escaped unclothed, so 'naked' is the plainest rendering.
- source_word: ἔφυγεν
  chosen: fled
  alternatives:
  - ran away
  - escaped
  lexicon: BDAG
  rationale: φεύγω means to flee or run away. 'Fled' is concise, natural, and preserves
    the urgency of the aorist narrative verb.
