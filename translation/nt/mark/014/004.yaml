id: MRK.14.4
reference: Mark 14:4
source:
  edition: SBLGNT
  text: ἦσαν δέ τινες ἀγανακτοῦντες πρὸς ⸀ἑαυτούς· Εἰς τί ἡ ἀπώλεια αὕτη τοῦ μύρου
    γέγονεν;
translation:
  text: 'But some were indignant among themselves: “Why has this waste of the perfume
    happened?”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “to one another” or “within themselves.” The Greek phrase can indicate
      mutual complaint within the group or inward reaction.
    reason: lexical_alternative
  - marker: b
    text: Or “ointment.” The Greek μύρον refers to perfumed oil or ointment.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἦσαν δέ
  chosen: But ... were
  alternatives:
  - Now ... were
  - And ... were
  lexicon: BDAG
  rationale: δέ is mildly connective/adversative here, moving the narrative forward
    while marking a contrast with the woman's action. 'But' captures the reactional
    contrast in natural English.
- source_word: τινες
  chosen: some
  alternatives:
  - some people
  - certain ones
  lexicon: BDAG
  rationale: An indefinite plural pronoun; 'some' is the most natural concise rendering
    and preserves the lack of specificity.
- source_word: ἀγανακτοῦντες
  chosen: were indignant
  alternatives:
  - were angry
  - were upset
  lexicon: BDAG
  rationale: The participle conveys strong displeasure or indignation. 'Were indignant'
    best preserves the moralized tone rather than mere irritation.
- source_word: πρὸς ἑαυτούς
  chosen: among themselves
  alternatives:
  - to one another
  - within themselves
  lexicon: BDAG
  rationale: The phrase can suggest speaking among themselves or directed to themselves.
    In this context of voiced complaint, 'among themselves' is idiomatic and fits
    the ensuing quotation, while preserving the internal group-directed sense.
- source_word: Εἰς τί
  chosen: Why
  alternatives:
  - For what purpose
  - To what end
  lexicon: BDAG
  rationale: An idiomatic question of purpose/result. 'Why' is the most natural English
    equivalent here.
- source_word: ἡ ἀπώλεια αὕτη
  chosen: this waste
  alternatives:
  - this loss
  - this destruction
  lexicon: BDAG
  rationale: ἀπώλεια can denote loss, ruin, or waste. In the context of expensive
    perfume being poured out, 'waste' best matches the speakers' complaint.
- source_word: τοῦ μύρου
  chosen: of the perfume
  alternatives:
  - of the ointment
  - of the fragrant oil
  lexicon: BDAG
  rationale: μύρον refers to perfumed ointment/oil. 'Perfume' is clear modern English
    and fits the luxury item in context, though 'ointment' is more traditional.
- source_word: γέγονεν
  chosen: has ... happened
  alternatives:
  - has come about
  - has occurred
  - was made
  lexicon: BDAG
  rationale: Perfect of γίνομαι here asks how this state/event has come to be. 'Has
    happened' is natural English and preserves the completed-event sense with present
    relevance.
