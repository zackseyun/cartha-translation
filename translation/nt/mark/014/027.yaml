id: MRK.14.27
reference: Mark 14:27
source:
  edition: SBLGNT
  text: Καὶ λέγει αὐτοῖς ὁ Ἰησοῦς ὅτι Πάντες ⸀σκανδαλισθήσεσθε, ὅτι γέγραπται· Πατάξω
    τὸν ποιμένα, καὶ ⸂τὰ πρόβατα διασκορπισθήσονται⸃.
translation:
  text: 'And Jesus says to them, “You will all fall away, because it is written: ‘I
    will strike the shepherd, and the sheep will be scattered.’”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, “You will all stumble” or “You will all be caused to
      stumble.”
    reason: lexical_alternative
lexical_decisions:
- source_word: λέγει
  chosen: says
  alternatives:
  - said
  lexicon: BDAG
  rationale: Rendered as the historical present 'says' to reflect Mark's vivid narrative
    style and the present-tense Greek form.
- source_word: σκανδαλισθήσεσθε
  chosen: will all fall away
  alternatives:
  - will all stumble
  - will all be caused to stumble
  - will all take offense
  lexicon: BDAG
  rationale: In this context of disciples failing and deserting Jesus, the passive/future
    of σκανδαλίζω is best conveyed idiomatically as 'fall away.' 'Stumble' is more
    literal but can sound too mild or ambiguous in English; the sense here is apostasy/desertion
    under pressure.
- source_word: γέγραπται
  chosen: it is written
  alternatives:
  - it stands written
  lexicon: BDAG
  rationale: Standard rendering of the perfect passive formula introducing Scripture
    citation; preserves the authoritative scriptural appeal.
- source_word: Πατάξω
  chosen: I will strike
  alternatives:
  - I will smite
  lexicon: BDAG
  rationale: '''Strike'' is clear modern English and preserves the force of the verb
    without archaic diction.'
- source_word: ποιμένα
  chosen: the shepherd
  lexicon: BDAG
  rationale: Direct rendering of ποιμήν; the singular with article is preserved, matching
    the cited prophetic imagery and its application to Jesus.
- source_word: τὰ πρόβατα
  chosen: the sheep
  lexicon: BDAG
  rationale: Standard rendering of the flock metaphor; natural English equivalent
    for the plural noun.
- source_word: διασκορπισθήσονται
  chosen: will be scattered
  alternatives:
  - will be dispersed
  lexicon: BDAG
  rationale: Preserves the passive future and the imagery of the flock breaking apart
    after the shepherd is struck.
