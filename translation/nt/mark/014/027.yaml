theological_decisions:
- issue: Rendering of σκανδαλισθήσεσθε in relation to the disciples' response to Jesus
  chosen_reading: fall away
  alternative_readings:
  - stumble
  - be caused to stumble
  rationale: The verse predicts the disciples' failure and dispersal in direct connection
    with the Scripture citation about the shepherd being struck and the sheep scattered.
    'Fall away' best communicates the relational and covenantal rupture implied in
    context, while avoiding overstatement beyond the immediate desertion. Alternatives
    are preserved in a footnote because the Greek verb can also be rendered more literally
    as 'stumble.'
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
