id: MRK.14.15
reference: Mark 14:15
source:
  edition: SBLGNT
  text: καὶ αὐτὸς ὑμῖν δείξει ἀνάγαιον μέγα ἐστρωμένον ἕτοιμον· ⸀καὶ ἐκεῖ ἑτοιμάσατε
    ἡμῖν.
translation:
  text: And he himself will show you a large upper room, furnished and ready; and
    prepare for us there.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a large upstairs room, arranged and ready.' The participle ἐστρωμένον
      can denote a room set out or prepared, not merely containing furniture.
    reason: lexical_alternative
lexical_decisions:
- source_word: αὐτὸς
  chosen: he himself
  alternatives:
  - he
  lexicon: BDAG
  rationale: The pronoun is emphatic in position and form, so 'he himself' preserves
    the emphasis better than a simple 'he'.
- source_word: δείξει
  chosen: will show
  alternatives:
  - will point out
  - will show you
  lexicon: BDAG
  rationale: Future indicative of δείκνυμι naturally means 'will show.' The indirect
    object 'to you' is supplied from ὑμῖν in the English clause.
- source_word: ἀνάγαιον
  chosen: upper room
  alternatives:
  - upstairs room
  - guest room upstairs
  lexicon: BDAG
  rationale: Refers to a room in the upper part of a house. 'Upper room' is idiomatic,
    accurate, and fits the narrative setting.
- source_word: μέγα
  chosen: large
  alternatives:
  - big
  - spacious
  lexicon: BDAG
  rationale: '''Large'' is the most natural modern English equivalent and preserves
    the straightforward descriptive force.'
- source_word: ἐστρωμένον
  chosen: furnished
  alternatives:
  - spread
  - arranged
  - laid out
  lexicon: BDAG
  rationale: The participle from στρώννυμι literally suggests something spread or
    arranged, likely with couches or dining preparations. 'Furnished' communicates
    the room's prepared setup in natural English without over-specifying.
- source_word: ἕτοιμον
  chosen: ready
  alternatives:
  - prepared
  lexicon: BDAG
  rationale: ἕτοιμος means 'ready' or 'prepared.' 'Ready' pairs well with 'furnished'
    and avoids redundancy with the later imperative ἑτοιμάσατε.
- source_word: ἐκεῖ
  chosen: there
  alternatives:
  - in that place
  lexicon: BDAG
  rationale: Simple locative adverb; 'there' is the natural English equivalent.
- source_word: ἑτοιμάσατε
  chosen: prepare
  alternatives:
  - make ready
  - get ready
  lexicon: BDAG
  rationale: Aorist imperative plural calling for action by the disciples. 'Prepare'
    is direct and matches the context of making Passover arrangements.
- source_word: ἡμῖν
  chosen: for us
  alternatives:
  - for me and my disciples
  lexicon: BDAG
  rationale: The dative pronoun is best rendered simply as 'for us.' Expanding the
    referent would import interpretation beyond the wording.
