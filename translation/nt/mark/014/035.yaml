id: MRK.14.35
reference: Mark 14:35
source:
  edition: SBLGNT
  text: καὶ ⸂προελθὼν μικρὸν ἔπιπτεν⸃ ἐπὶ τῆς γῆς, καὶ προσηύχετο ἵνα εἰ δυνατόν ἐστιν
    παρέλθῃ ἀπ’ αὐτοῦ ἡ ὥρα,
translation:
  text: And going a little farther, he fell to the ground and was praying that, if
    it were possible, the hour might pass from him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'having gone a little ahead.'
    reason: lexical_alternative
lexical_decisions:
- source_word: προελθὼν μικρὸν
  chosen: going a little farther
  alternatives:
  - having gone a little ahead
  - going on a little
  lexicon: BDAG
  rationale: The participle προελθών with adverbial μικρόν indicates movement a short
    distance beyond the others. 'Farther' is idiomatic modern English and preserves
    the comparative sense without over-literal awkwardness.
- source_word: ἔπιπτεν ἐπὶ τῆς γῆς
  chosen: he fell to the ground
  alternatives:
  - he was falling on the ground
  - he fell on the ground
  lexicon: BDAG
  rationale: The imperfect ἔπιπτεν can be ingressive/descriptive in narrative. English
    simple past best conveys the action naturally here. 'To the ground' is more idiomatic
    than 'on the ground' for the motion of collapsing.
- source_word: προσηύχετο
  chosen: was praying
  alternatives:
  - prayed
  lexicon: BDAG
  rationale: The imperfect middle indicates ongoing or repeated action in the scene.
    'Was praying' preserves the durative aspect better than a simple past.
- source_word: ἵνα
  chosen: that
  alternatives:
  - so that
  - in order that
  lexicon: BDAG
  rationale: Here ἵνα introduces the content/purpose of the prayer. 'That' is natural
    English and avoids implying a stronger purposive nuance than the context requires.
- source_word: εἰ δυνατόν ἐστιν
  chosen: if it were possible
  alternatives:
  - if it is possible
  - if possible
  lexicon: BDAG
  rationale: Although the Greek has present ἐστιν, English idiom in reported prayer
    commonly uses 'were' in this kind of tentative condition. This preserves the sense
    of contingency and solemnity without wooden literalism.
- source_word: παρέλθῃ ἀπ’ αὐτοῦ ἡ ὥρα
  chosen: the hour might pass from him
  alternatives:
  - the hour may pass from him
  - this hour might pass from him
  lexicon: BDAG
  rationale: παρέλθῃ means 'pass by/pass away.' 'The hour' is retained literally because
    in context it carries the weight of the appointed time of suffering; adding 'this'
    would be interpretive since the article alone does not require it.
