theological_decisions:
- issue: Meaning of 'the hour'
  chosen_reading: Retain 'the hour' as a literal expression for the appointed time
    of Jesus' suffering and impending death, without paraphrasing it.
  alternative_readings:
  - the time
  - the moment of suffering
  rationale: The phrase is theologically loaded in Mark and should remain as the text's
    own expression rather than being resolved into an explanatory paraphrase. This
    preserves the narrative and theological tension.
  doctrine_reference: Preserve theological tension rather than resolve it.
