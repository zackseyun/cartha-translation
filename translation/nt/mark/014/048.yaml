theological_decisions:
- issue: Nuance of λῃστής in relation to Jesus' rhetorical question
  chosen_reading: robber in the main text, with broader 'bandit/rebel' nuance preserved
    in a footnote
  alternative_readings:
  - bandit
  - outlaw
  - rebel
  rationale: 'The verse does not make a doctrinal claim but does carry historical
    nuance: λῃστής can denote a violent brigand or insurgent, not merely a thief.
    To preserve readability and traditional recognizability, ''robber'' is retained
    in the main text while the broader semantic range is documented.'
