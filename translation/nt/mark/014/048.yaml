id: MRK.14.48
reference: Mark 14:48
source:
  edition: SBLGNT
  text: καὶ ἀποκριθεὶς ὁ Ἰησοῦς εἶπεν αὐτοῖς· Ὡς ἐπὶ λῃστὴν ἐξήλθατε μετὰ μαχαιρῶν
    καὶ ξύλων συλλαβεῖν με;
translation:
  text: And Jesus answered and said to them, “Have you come out as against a robber,
    with swords and clubs, to arrest me?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “bandit,” “outlaw,” or “rebel”; the Greek λῃστής can refer to a violent
      brigand or insurgent, not only a thief.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀποκριθεὶς
  chosen: answered
  alternatives:
  - responded
  lexicon: BDAG
  rationale: A standard participial formula introducing speech. 'Answered' preserves
    the idiomatic narrative style of the Greek without overcomplicating the English.
- source_word: εἶπεν
  chosen: said
  alternatives:
  - spoke
  lexicon: BDAG
  rationale: Combined with ἀποκριθεὶς, the common Greek expression is naturally rendered
    'answered and said,' preserving the formal narrative cadence.
- source_word: Ὡς ἐπὶ λῃστὴν
  chosen: as against a robber
  alternatives:
  - as against a bandit
  - as against an outlaw
  lexicon: BDAG
  rationale: The construction conveys treating Jesus as though he were the kind of
    dangerous criminal one mounts an armed expedition against. 'Robber' is the most
    direct and traditional gloss for λῃστής, while 'as against' preserves the force
    of ὡς ἐπί better than a flatter 'like'.
- source_word: λῃστὴν
  chosen: robber
  alternatives:
  - bandit
  - rebel
  lexicon: BDAG
  rationale: λῃστής can denote more than a petty thief and may include brigand or
    insurrectionist, but in this context 'robber' is a clear, established English
    rendering. The broader nuance is worth preserving in a footnote rather than overtranslating
    the main text.
- source_word: ἐξήλθατε
  chosen: have you come out
  alternatives:
  - did you come out
  - have you gone out
  lexicon: BDAG
  rationale: The aorist is well represented in English by 'have you come out' in this
    rhetorical question, capturing the sense of their coming out in force to seize
    him.
- source_word: μετὰ μαχαιρῶν
  chosen: with swords
  alternatives:
  - with daggers
  lexicon: BDAG
  rationale: μάχαιρα commonly refers to a sword or large knife. 'Swords' is the most
    natural plural rendering in this arrest scene.
- source_word: καὶ ξύλων
  chosen: and clubs
  alternatives:
  - and sticks
  lexicon: BDAG
  rationale: ξύλα literally means 'pieces of wood' or 'sticks,' but in this context
    refers to wooden weapons carried by the arresting party. 'Clubs' communicates
    the intended function in natural English.
- source_word: συλλαβεῖν
  chosen: to arrest
  alternatives:
  - to seize
  - to capture
  lexicon: BDAG
  rationale: In this legal-arrest context, 'to arrest' best conveys the purpose of
    the armed party. 'Seize' is possible but less specific in English.
