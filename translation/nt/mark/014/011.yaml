theological_decisions:
- issue: Rendering παραδίδωμι in Judas's action
  chosen_reading: betray
  alternative_readings:
  - hand over
  - deliver up
  rationale: In this immediate narrative context, Judas's contemplated action is not
    a neutral transfer but treacherous cooperation with Jesus's opponents. 'Betray'
    communicates the contextual force without adding doctrinal interpretation beyond
    the narrative situation.
