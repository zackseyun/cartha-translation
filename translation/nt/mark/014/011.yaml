id: MRK.14.11
reference: Mark 14:11
source:
  edition: SBLGNT
  text: οἱ δὲ ἀκούσαντες ἐχάρησαν καὶ ἐπηγγείλαντο αὐτῷ ἀργύριον δοῦναι. καὶ ἐζήτει
    πῶς ⸂αὐτὸν εὐκαίρως παραδοῖ⸃.
translation:
  text: When they heard it, they rejoiced and promised to give him money. And he began
    seeking how he might betray him at an opportune time.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'silver.' The Greek term can refer literally to silver or more generally
      to money.
    reason: lexical_alternative
  - marker: b
    text: Or 'hand him over.' The Greek verb can mean 'deliver up' or 'hand over';
      here 'betray' reflects the treacherous context involving Judas.
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ δὲ ἀκούσαντες
  chosen: When they heard it
  alternatives:
  - And when they heard
  - After hearing
  lexicon: BDAG
  rationale: The articular participle with δέ introduces the reaction of the chief
    priests to Judas's proposal. 'When they heard it' makes the temporal force explicit
    in natural English. 'It' is supplied idiomatically from context, since English
    normally requires an object for 'heard' here.
- source_word: ἐχάρησαν
  chosen: they rejoiced
  alternatives:
  - they were glad
  - they became glad
  lexicon: BDAG
  rationale: Aorist passive/deponent of χαίρω here denotes gladness/rejoicing. 'Rejoiced'
    preserves the verbal force and the morally charged reaction better than the flatter
    'were glad,' though that remains a viable alternative.
- source_word: ἐπηγγείλαντο αὐτῷ ἀργύριον δοῦναι
  chosen: promised to give him money
  alternatives:
  - agreed to give him money
  - promised him silver
  lexicon: BDAG
  rationale: ἐπαγγέλλομαι means to promise or pledge. ἀργύριον can denote silver or
    money; here no amount is specified, so 'money' is the clearest idiomatic rendering,
    while 'silver' is preserved as an alternative because of the term's literal metallic
    sense and intertextual resonance with betrayal payment traditions.
- source_word: ἀργύριον
  chosen: money
  alternatives:
  - silver
  lexicon: BDAG
  rationale: Though literally 'silver,' in Koine usage the term commonly refers to
    money. Since Mark does not specify coins or amount, 'money' communicates the sense
    naturally in modern English without over-literalizing.
- source_word: ἐζήτει
  chosen: he began seeking
  alternatives:
  - he was seeking
  - he kept looking for
  lexicon: BDAG
  rationale: The imperfect indicates ongoing or inceptive action. 'Began seeking'
    captures the narrative transition after the agreement, while still implying continued
    intent. 'Was seeking' is also possible, but the inceptive nuance fits the flow
    well.
- source_word: πῶς
  chosen: how
  alternatives:
  - how he could
  - a way to
  lexicon: BDAG
  rationale: πῶς introduces the manner or means by which Judas would carry out the
    betrayal. 'How' is the most direct rendering; English naturally expands the clause
    with 'might' to reflect the subjunctive that follows.
- source_word: εὐκαίρως
  chosen: at an opportune time
  alternatives:
  - conveniently
  - at a favorable opportunity
  lexicon: BDAG
  rationale: The adverb denotes a favorable or suitable occasion. 'At an opportune
    time' is idiomatic and preserves the sense of strategic timing, likely avoiding
    public interference, without importing details not stated in this verse.
- source_word: παραδοῖ
  chosen: he might betray him
  alternatives:
  - he might hand him over
  - he might deliver him up
  lexicon: BDAG
  rationale: παραδίδωμι can mean 'hand over' in a neutral sense or 'betray' in contexts
    of treachery. Given Judas as subject and the passion context, 'betray' best conveys
    the relational and moral force in English. The more literal 'hand him over' is
    preserved as an alternative.
