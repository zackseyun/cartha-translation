id: MRK.14.41
reference: Mark 14:41
source:
  edition: SBLGNT
  text: καὶ ἔρχεται τὸ τρίτον καὶ λέγει αὐτοῖς· Καθεύδετε ⸀τὸ λοιπὸν καὶ ἀναπαύεσθε·
    ἀπέχει· ἦλθεν ἡ ὥρα, ἰδοὺ παραδίδοται ὁ υἱὸς τοῦ ἀνθρώπου εἰς τὰς χεῖρας τῶν ἁμαρτωλῶν.
translation:
  text: And he comes the third time and says to them, “Sleep on now and rest. It is
    enough; the hour has come. Look, the Son of Man is being handed over into the
    hands of sinners.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Are you still sleeping and resting?' The Greek wording can be taken
      either as an ironic statement/permission or as a rhetorical question.
    reason: alternative_reading
  - marker: b
    text: Or, more literally, 'for the rest' after 'Sleep on'; the phrase is idiomatic
      and difficult in context.
    reason: lexical_alternative
  - marker: c
    text: '''It is enough'' translates a difficult expression. Other proposals include
      ''Enough!'' or, less likely here, a commercial sense such as ''the payment is
      received in full.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔρχεται τὸ τρίτον
  chosen: he comes the third time
  alternatives:
  - he comes a third time
  - he came the third time
  lexicon: BDAG
  rationale: Present-tense narrative verb retained as English present for vividness,
    with τὸ τρίτον rendered idiomatically as 'the third time.' 'A third time' is possible,
    but the article supports the more definite phrasing.
- source_word: Καθεύδετε
  chosen: Sleep on
  alternatives:
  - Are you still sleeping?
  - Sleep
  lexicon: BDAG
  rationale: Formally the verb is indicative ('you are sleeping'), but in context
    it can function imperativally/ironically. Rendering 'Sleep on' preserves the traditional
    and contextually plausible force without overexplaining. The interrogative alternative
    reflects one common interpretive construal but is not explicit in the Greek text.
- source_word: τὸ λοιπὸν
  chosen: now
  alternatives:
  - for the rest of the time
  - from now on
  lexicon: BDAG
  rationale: In this idiomatic expression with Καθεύδετε, a wooden 'for the rest'
    is awkward in English. 'Now' captures the adverbial sense in context while keeping
    the line natural. A more literal alternative is preserved in a footnote because
    the phrase is debated.
- source_word: ἀναπαύεσθε
  chosen: rest
  alternatives:
  - take your rest
  lexicon: BDAG
  rationale: Simple, natural English for the middle/passive form in context. 'Take
    your rest' is slightly more idiomatic in older English but less concise.
- source_word: ἀπέχει
  chosen: It is enough
  alternatives:
  - Enough!
  - It is paid in full
  - He is far away
  lexicon: BDAG
  rationale: This expression is notoriously difficult, but in this context the idiomatic
    sense 'it is enough' best fits the transition from the disciples' sleep to the
    arrival of the decisive moment. Other proposals are less likely here and are preserved
    in a footnote due to the interpretive difficulty.
- source_word: ἦλθεν ἡ ὥρα
  chosen: the hour has come
  alternatives:
  - the time has come
  lexicon: BDAG
  rationale: '''Hour'' preserves the Johannine/Synoptic theological resonance of the
    appointed moment, and is standard English here.'
- source_word: ἰδοὺ
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: BDAG
  rationale: '''Look'' is readable modern English and preserves the deictic force
    without archaic tone.'
- source_word: παραδίδοται
  chosen: is being handed over
  alternatives:
  - is betrayed
  - is delivered up
  lexicon: BDAG
  rationale: The verb's core sense is 'hand over/deliver.' 'Betrayed' narrows the
    meaning to Judas's treachery, whereas the broader wording preserves the process
    and allows the larger passion context to stand.
- source_word: ὁ υἱὸς τοῦ ἀνθρώπου
  chosen: the Son of Man
  lexicon: BDAG
  rationale: Standard rendering of the self-designation, preserving both its idiomatic
    and titular force. It should not be flattened to 'the human one' here.
- source_word: εἰς τὰς χεῖρας
  chosen: into the hands of
  alternatives:
  - to
  - over to
  lexicon: BDAG
  rationale: This preserves the concrete idiom of transfer into another's power, which
    is important to the verse's imagery.
- source_word: τῶν ἁμαρτωλῶν
  chosen: sinners
  alternatives:
  - sinful men
  lexicon: BDAG
  rationale: The substantival adjective is naturally rendered 'sinners.' 'Sinful men'
    is possible, but the Greek does not require explicit gender marking here in English.
