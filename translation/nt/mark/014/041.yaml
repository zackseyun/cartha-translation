theological_decisions:
- issue: Force of Καθεύδετε ... καὶ ἀναπαύεσθε
  chosen_reading: An ironic/permissive statement ('Sleep on now and rest') rather
    than a direct question.
  alternative_readings:
  - 'A rebuke in question form: ''Are you still sleeping and resting?'''
  rationale: The Greek punctuation in earliest witnesses does not settle the matter.
    The indicative forms can be heard either as ironic permission or as a rhetorical
    question. The chosen reading preserves the surface form of the Greek and the dramatic
    turn created by ἀπέχει / 'It is enough,' while the interrogative option is preserved
    in a footnote.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Meaning of ἀπέχει
  chosen_reading: Idiomatic 'It is enough.'
  alternative_readings:
  - '''Enough!'''
  - A commercial sense such as 'the payment is received in full'
  rationale: The phrase is lexically difficult and context-dependent. 'It is enough'
    best fits the immediate narrative transition without importing a speculative technical
    sense. Alternatives are preserved in a footnote because the expression is genuinely
    debated.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Rendering παραδίδοται
  chosen_reading: '''is being handed over'' rather than ''is betrayed'''
  alternative_readings:
  - is betrayed
  - is delivered up
  rationale: This avoids prematurely narrowing the agency to Judas alone and preserves
    the broader theological and narrative range of παραδίδωμι in the passion predictions.
