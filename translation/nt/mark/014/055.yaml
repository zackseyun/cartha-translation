id: MRK.14.55
reference: Mark 14:55
source:
  edition: SBLGNT
  text: οἱ δὲ ἀρχιερεῖς καὶ ὅλον τὸ συνέδριον ἐζήτουν κατὰ τοῦ Ἰησοῦ μαρτυρίαν εἰς
    τὸ θανατῶσαι αὐτόν, καὶ οὐχ ηὕρισκον·
translation:
  text: Now the chief priests and the whole council were seeking testimony against
    Jesus in order to put him to death, and they were not finding any.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more specifically, 'the whole Sanhedrin.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ δὲ
  chosen: Now
  alternatives:
  - And
  - But
  - Now
  lexicon: BDAG
  rationale: δέ is a mild connective marking narrative progression or contrast. 'Now'
    fits readable modern English and signals a scene shift without overstating adversative
    force.
- source_word: ἀρχιερεῖς
  chosen: the chief priests
  alternatives:
  - the high priests
  - the leading priests
  lexicon: BDAG
  rationale: Standard rendering for the plural referring to the Jerusalem priestly
    leadership, not a single high priest. 'Chief priests' is both accurate and idiomatic
    in Gospel trial contexts.
- source_word: ὅλον τὸ συνέδριον
  chosen: the whole council
  alternatives:
  - the whole Sanhedrin
  - the entire council
  lexicon: BDAG
  rationale: συνέδριον denotes the ruling council. 'Council' translates the meaning
    rather than transliterating; 'whole' preserves ὅλον. 'Sanhedrin' is a possible
    contextual gloss but is less transparent for some readers and is not required
    by the Greek itself.
- source_word: ἐζήτουν
  chosen: were seeking
  alternatives:
  - were looking for
  - kept seeking
  - sought
  lexicon: BDAG
  rationale: Imperfect tense indicates ongoing or repeated action. 'Were seeking'
    preserves the durative sense better than simple past 'sought'.
- source_word: κατὰ τοῦ Ἰησοῦ
  chosen: against Jesus
  alternatives:
  - concerning Jesus
  - to use against Jesus
  lexicon: BDAG
  rationale: 'κατά with the genitive here carries adversative force: testimony hostile
    to Jesus. ''Against Jesus'' is the plain and natural rendering.'
- source_word: μαρτυρίαν
  chosen: testimony
  alternatives:
  - evidence
  - witness
  lexicon: BDAG
  rationale: μαρτυρία refers to testimony/witness borne in a judicial setting. 'Testimony'
    best matches the legal context. 'Evidence' is interpretive; 'witness' can suggest
    the person rather than the content.
- source_word: εἰς τὸ θανατῶσαι αὐτόν
  chosen: in order to put him to death
  alternatives:
  - so that they might kill him
  - for the purpose of executing him
  lexicon: BDAG
  rationale: The articular infinitive with εἰς expresses purpose. θανατόω means to
    put to death/kill. 'Put him to death' preserves the formal judicial sense appropriate
    to the trial setting.
- source_word: καὶ οὐχ ηὕρισκον
  chosen: and they were not finding any
  alternatives:
  - but they were not finding any
  - and they found none
  - and they could not find any
  lexicon: BDAG
  rationale: 'Imperfect ηὕρισκον continues the durative narrative: despite seeking,
    they were not finding testimony. ''Any'' is supplied naturally in English from
    the object ''testimony.'' ''But'' is possible contextually, but καί is simply
    ''and'' in the Greek.'
