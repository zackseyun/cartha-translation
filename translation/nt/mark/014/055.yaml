theological_decisions:
- issue: Identification of συνέδριον
  chosen_reading: Rendered as 'the whole council' in the main text rather than 'the
    whole Sanhedrin.'
  alternative_readings:
  - the whole Sanhedrin
  rationale: This is primarily a lexical and cultural decision, not a doctrinal one.
    The Greek names the council; transliteration is not necessary in the main text.
    A footnote preserves 'Sanhedrin' as the familiar historical designation.
  doctrine_reference: 'Translation philosophy: readable modern English; translate
    meaning rather than preserve tradition where the source text''s plain sense is
    clear.'
