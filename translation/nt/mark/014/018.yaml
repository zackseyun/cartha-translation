theological_decisions:
- issue: Rendering παραδώσει in the passion prediction
  chosen_reading: will betray
  alternative_readings:
  - will hand me over
  - will deliver me up
  rationale: The Greek verb itself does not always mean 'betray,' but here the immediate
    context identifies a close associate sharing table fellowship who will act against
    Jesus. 'Betray' communicates that treachery clearly without importing extra doctrinal
    claims. A more literal alternative is preserved in a footnote for transparency.
  doctrine_reference: Translation philosophy §1, §3
