id: MRK.14.18
reference: Mark 14:18
source:
  edition: SBLGNT
  text: καὶ ἀνακειμένων αὐτῶν καὶ ἐσθιόντων ⸂ὁ Ἰησοῦς εἶπεν⸃· Ἀμὴν λέγω ὑμῖν ὅτι εἷς
    ἐξ ὑμῶν παραδώσει με ὁ ἐσθίων μετ’ ἐμοῦ.
translation:
  text: And while they were reclining and eating, Jesus said, “Truly I tell you, one
    of you will betray me—one who is eating with me.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, “Amen, I say to you.”
    reason: lexical_alternative
  - marker: b
    text: Or, “will hand me over.” The Greek verb can mean hand over, deliver up,
      or betray; here it refers to treacherous handing over by one of Jesus' own companions.
    reason: lexical_alternative
  - marker: c
    text: Reclining was the customary posture for a formal meal.
    reason: cultural_note
lexical_decisions:
- source_word: ἀνακειμένων
  chosen: were reclining
  alternatives:
  - were sitting at the table
  - were lying down
  lexicon: BDAG
  rationale: The participle refers to the customary table posture at a formal meal
    in the ancient Mediterranean world. 'Were reclining' preserves the historical
    scene more precisely than 'were sitting,' while remaining natural English.
- source_word: ἐσθιόντων / ἐσθίων
  chosen: eating / is eating
  alternatives:
  - dining
  - sharing the meal
  lexicon: BDAG
  rationale: The verb simply means 'eat.' 'Eating' is the most direct rendering. The
    final participle is rendered relatively ('one who is eating with me') to reflect
    the articular participle ὁ ἐσθίων.
- source_word: Ἀμὴν λέγω ὑμῖν
  chosen: Truly I tell you
  alternatives:
  - Amen, I say to you
  - Truly I say to you
  lexicon: BDAG
  rationale: This is Jesus' solemn introductory formula. 'Truly I tell you' is idiomatic
    modern English that preserves the force of Ἀμήν without unnecessary archaism.
    'Amen' is preserved as an alternative in a footnote for auditability.
- source_word: εἷς ἐξ ὑμῶν
  chosen: one of you
  alternatives:
  - one from among you
  lexicon: BDAG
  rationale: Standard idiomatic rendering of the partitive expression; it clearly
    conveys that the betrayer is one member of the group.
- source_word: παραδώσει
  chosen: will betray
  alternatives:
  - will hand over
  - will deliver up
  lexicon: BDAG
  rationale: Although παραδίδωμι can more literally mean 'hand over,' in this context
    of Judas's action against Jesus, 'betray' best communicates the relational and
    moral force in natural English. The more literal alternative is preserved in a
    footnote.
- source_word: μετ’ ἐμοῦ
  chosen: with me
  alternatives:
  - along with me
  lexicon: BDAG
  rationale: Simple accompaniment; 'with me' is the natural and accurate English equivalent.
