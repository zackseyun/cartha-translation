theological_decisions:
- issue: Whether to make explicit the female subject from context though not stated
    in this clause
  chosen_reading: She did what she could; she anointed my body beforehand for burial.
  alternative_readings:
  - What she had, she did; she came beforehand to anoint my body for burial.
  rationale: The Greek verbs are third person singular without an explicit subject
    in this verse, but the immediate context identifies the woman. Supplying 'she'
    is required for natural English and does not add new theological content. The
    translation avoids overexpanding προέλαβεν into 'she came beforehand,' since the
    verb itself concerns prior action, not motion.
  doctrine_reference: Translation philosophy §6 (readable modern English) and §1 (original-language
    primacy)
