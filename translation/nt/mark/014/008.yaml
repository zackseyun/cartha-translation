id: MRK.14.8
reference: Mark 14:8
source:
  edition: SBLGNT
  text: ὃ ⸀ἔσχεν ἐποίησεν, προέλαβεν μυρίσαι ⸂τὸ σῶμά μου⸃ εἰς τὸν ἐνταφιασμόν.
translation:
  text: She did what she could; she anointed my body beforehand for burial.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'What she had, she did.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὃ
  chosen: what
  alternatives:
  - that which
  lexicon: BDAG
  rationale: 'Neuter relative pronoun functioning substantivally: ''what'' is natural
    English and preserves the sense ''whatever she had/was able [to do].'''
- source_word: ἔσχεν
  chosen: could
  alternatives:
  - had
  lexicon: BDAG
  rationale: Although literally 'had,' in the idiom ὃ ἔσχεν ἐποίησεν it means 'she
    did what she could' or 'what she had [to give/do].' 'Could' best captures the
    idiomatic force in clear English.
- source_word: ἐποίησεν
  chosen: she did
  alternatives:
  - she has done
  lexicon: BDAG
  rationale: Aorist indicative summarizing the completed action. 'She did' is the
    straightforward rendering and pairs idiomatically with ὃ ἔσχεν.
- source_word: προέλαβεν
  chosen: beforehand
  alternatives:
  - in advance
  - she anticipated
  lexicon: BDAG
  rationale: The verb means to do something ahead of time. In English, the adverbial
    sense is best brought out in 'she anointed ... beforehand,' which is smoother
    than a more wooden 'she anticipated to anoint.'
- source_word: μυρίσαι
  chosen: anointed
  alternatives:
  - perfumed
  - prepared with perfume
  lexicon: BDAG
  rationale: The infinitive from μυρίζω refers to applying perfume/ointment. 'Anointed'
    is the established and accurate rendering in this burial-preparation context,
    while still understandable in modern English.
- source_word: τὸ σῶμά μου
  chosen: my body
  lexicon: BDAG
  rationale: Direct and literal rendering of the object phrase.
- source_word: εἰς τὸν ἐνταφιασμόν
  chosen: for burial
  alternatives:
  - for my burial
  - for entombment
  lexicon: BDAG
  rationale: The prepositional phrase expresses purpose/result with reference to burial
    preparation. 'For burial' is natural English and sufficiently explicit in context;
    'entombment' is too technical.
