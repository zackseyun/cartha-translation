id: MRK.14.10
reference: Mark 14:10
source:
  edition: SBLGNT
  text: ⸀Καὶ Ἰούδας ⸂Ἰσκαριὼθ ὁ⸃ εἷς τῶν δώδεκα ἀπῆλθεν πρὸς τοὺς ἀρχιερεῖς ἵνα αὐτὸν
    ⸂παραδοῖ αὐτοῖς⸃.
translation:
  text: And Judas Iscariot, one of the Twelve, went to the chief priests in order
    to hand him over to them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "betray him to them." The Greek verb can mean "hand over," and in Judas's
      case this handing over is an act of betrayal.
    reason: lexical_alternative
lexical_decisions:
- source_word: Καὶ
  chosen: And
  alternatives:
  - Now
  lexicon: BDAG
  rationale: Standard connective linking this event to the preceding narrative. 'And'
    preserves the simple narrative flow without adding interpretive nuance.
- source_word: Ἰούδας Ἰσκαριὼθ
  chosen: Judas Iscariot
  lexicon: BDAG
  rationale: 'Personal name and epithet are transliterated per translation philosophy:
    names are transliterated rather than translated.'
- source_word: ὁ εἷς τῶν δώδεκα
  chosen: one of the Twelve
  alternatives:
  - one of the twelve
  lexicon: BDAG
  rationale: The article with 'Twelve' functions as a recognized group designation,
    so 'the Twelve' is capitalized to reflect the established circle of Jesus's apostles
    rather than a mere numeral.
- source_word: ἀπῆλθεν
  chosen: went
  alternatives:
  - departed
  - went away
  lexicon: BDAG
  rationale: Aorist narrative verb of movement. 'Went' is natural modern English and
    sufficiently reflects the simple action without overstating separation.
- source_word: πρὸς τοὺς ἀρχιερεῖς
  chosen: to the chief priests
  alternatives:
  - to the high priests
  - to the leading priests
  lexicon: BDAG
  rationale: ἀρχιερεῖς in the plural commonly refers to the Jerusalem priestly leadership,
    not merely one high priest. 'Chief priests' is the standard and most accurate
    institutional rendering in this context.
- source_word: ἵνα
  chosen: in order to
  alternatives:
  - so that
  - to
  lexicon: BDAG
  rationale: Introduces purpose. 'In order to' makes the purposive force explicit
    in clear English.
- source_word: παραδοῖ
  chosen: hand ... over
  alternatives:
  - betray
  - deliver over
  lexicon: BDAG
  rationale: παραδίδωμι literally means 'hand over' or 'deliver over.' In this passion
    context it carries betrayal implications, but 'hand over' preserves the lexical
    sense and avoids importing a more interpretive gloss into the main text.
- source_word: αὐτὸν ... αὐτοῖς
  chosen: him ... to them
  lexicon: BDAG
  rationale: The pronouns are left explicit in English to preserve the personal object
    ('him,' i.e., Jesus) and the recipients ('to them,' the chief priests), matching
    the Greek structure.
