theological_decisions:
- issue: Rendering of παραδοῖ in the betrayal context
  chosen_reading: hand him over
  alternative_readings:
  - betray him to them
  - deliver him over to them
  rationale: Although Judas's act is morally betrayal, the Greek verb itself is broader
    and repeatedly used in the passion narrative for being handed over. 'Hand him
    over' preserves the narrative and theological tension without narrowing the term
    prematurely; the betrayal nuance can be preserved in a footnote.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather
    than resolve it.
