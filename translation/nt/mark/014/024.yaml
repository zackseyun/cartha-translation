theological_decisions:
- issue: Whether to render διαθήκη with covenantal or testamentary sense
  chosen_reading: covenant
  alternative_readings:
  - testament
  rationale: In the Last Supper context, with explicit blood language echoing covenant-establishing
    passages such as Exodus 24:8, 'covenant' is the clear contextual sense rather
    than 'testament' or 'will.'
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    theological weight without importing extra claims.'
- issue: Whether to add 'new' before 'covenant' from parallel tradition or theological
    expectation
  chosen_reading: of the covenant
  alternative_readings:
  - of the new covenant
  rationale: The SBLGNT text of Mark 14:24 here lacks καινῆς ('new'). The translation
    must not harmonize Mark to Matthew/Luke/Paul by adding a word absent from the
    source text. The alternative is preserved in a footnote because readers may expect
    it from parallel passages.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition.'
- issue: Implication of ὑπὲρ πολλῶν for extent of atonement
  chosen_reading: for many
  alternative_readings:
  - for all
  - on behalf of many
  rationale: The verse should preserve Jesus' own wording 'many' and not resolve broader
    theological debates by substituting 'all.' At the same time, 'for many' should
    not be overinterpreted in the translation itself; any doctrinal synthesis belongs
    outside the verse rendering.
  doctrine_reference: Affirmations; preserve theological tension rather than resolve
    it.
