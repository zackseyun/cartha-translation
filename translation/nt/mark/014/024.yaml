id: MRK.14.24
reference: Mark 14:24
source:
  edition: SBLGNT
  text: καὶ εἶπεν αὐτοῖς· Τοῦτό ἐστιν τὸ αἷμά μου ⸀τῆς διαθήκης τὸ ⸂ἐκχυννόμενον ὑπὲρ
    πολλῶν⸃.
translation:
  text: And he said to them, “This is my blood of the covenant, which is poured out
    for many.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Some manuscripts and parallel passages read 'my blood of the new covenant.'
      Mark's Greek text here is best read as 'my blood of the covenant.'
    reason: textual_variant
  - marker: b
    text: Or 'which is being poured out'; traditionally, 'which is shed.'
    reason: lexical_alternative
  - marker: c
    text: Or 'on behalf of many.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Τοῦτό ἐστιν
  chosen: This is
  alternatives:
  - This means
  - This represents
  lexicon: BDAG
  rationale: A direct copular rendering best reflects the Greek wording without importing
    a sacramental interpretation beyond the text. Alternatives are interpretive rather
    than lexical here.
- source_word: τὸ αἷμά μου
  chosen: my blood
  lexicon: BDAG
  rationale: Straightforward possessive construction; 'blood' should be retained rather
    than paraphrased as 'death' because the sacrificial/covenantal imagery is explicit
    in context.
- source_word: τῆς διαθήκης
  chosen: of the covenant
  alternatives:
  - of the new covenant
  lexicon: BDAG
  rationale: The Greek text here reads simply 'of the covenant' without 'new.' Although
    some parallel passages include 'new covenant' language, Mark 14:24 in this form
    does not, so the translation should not add it.
- source_word: ἐκχυννόμενον
  chosen: which is poured out
  alternatives:
  - being poured out
  - shed
  lexicon: BDAG
  rationale: The present passive participle modifying 'blood' is naturally rendered
    with a relative clause in English. 'Poured out' preserves the sacrificial imagery
    more transparently than the more traditional but slightly interpretive 'shed.'
- source_word: ὑπὲρ πολλῶν
  chosen: for many
  alternatives:
  - on behalf of many
  - for the many
  lexicon: BDAG
  rationale: '''For many'' is the most natural and sufficiently precise rendering
    of ὑπέρ with the genitive here, preserving representative/substitutionary force
    without over-specifying the atonement theology. ''On behalf of many'' is possible
    but less idiomatic.'
