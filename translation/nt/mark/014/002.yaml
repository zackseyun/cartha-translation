id: MRK.14.2
reference: Mark 14:2
source:
  edition: SBLGNT
  text: ἔλεγον ⸀γάρ· Μὴ ἐν τῇ ἑορτῇ, μήποτε ⸂ἔσται θόρυβος⸃ τοῦ λαοῦ.
translation:
  text: For they were saying, “Not during the feast, lest there be an uproar from
    the people.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “among the people.” The Greek genitive τοῦ λαοῦ may indicate the uproar
      would arise from the crowd or occur within it.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔλεγον
  chosen: they were saying
  alternatives:
  - they said
  - they kept saying
  lexicon: BDAG
  rationale: Imperfect tense indicates ongoing or repeated speech in context; 'were
    saying' preserves that aspect in natural English.
- source_word: γάρ
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: BDAG
  rationale: Marks explanation of the previous statement; 'For' is concise and preserves
    the connective force.
- source_word: Μὴ
  chosen: Not
  alternatives:
  - 'No'
  - Do not
  lexicon: BDAG
  rationale: Elliptical negative in deliberative speech, introducing the implied idea
    'not [do it] during the feast.' 'Not' best preserves the terseness of the Greek.
- source_word: ἐν τῇ ἑορτῇ
  chosen: during the feast
  alternatives:
  - at the feast
  - in the festival
  lexicon: BDAG
  rationale: ἐν with temporal sense is naturally rendered 'during.' ἑορτή here refers
    to the festal period surrounding Passover/Unleavened Bread; 'feast' is idiomatic
    and sufficiently specific in context.
- source_word: μήποτε
  chosen: lest
  alternatives:
  - otherwise
  - so that not
  - in case
  lexicon: BDAG
  rationale: Introduces a feared result. 'Lest' is compact and accurately conveys
    preventive concern without over-paraphrase.
- source_word: ἔσται
  chosen: there be
  alternatives:
  - there will be
  - there might be
  lexicon: BDAG
  rationale: Future middle of εἰμί in an impersonal construction. After 'lest,' English
    commonly uses subjunctive-style 'there be' for naturalness while preserving the
    prospective sense.
- source_word: θόρυβος
  chosen: an uproar
  alternatives:
  - a disturbance
  - a riot
  - commotion
  lexicon: BDAG
  rationale: θόρυβος denotes noisy disorder or public tumult. 'Uproar' captures the
    social volatility without overstating to a full-scale 'riot'.
- source_word: τοῦ λαοῦ
  chosen: from the people
  alternatives:
  - of the people
  - among the people
  - by the people
  lexicon: BDAG
  rationale: 'The genitive is most naturally understood as source or involvement:
    the uproar would arise from the crowd. ''From the people'' makes that relation
    clear in idiomatic English.'
