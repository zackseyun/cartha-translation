id: MRK.14.56
reference: Mark 14:56
source:
  edition: SBLGNT
  text: πολλοὶ γὰρ ἐψευδομαρτύρουν κατ’ αὐτοῦ, καὶ ἴσαι αἱ μαρτυρίαι οὐκ ἦσαν.
translation:
  text: For many were giving false testimony against him, and their testimonies were
    not consistent.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'were bearing false witness against him, and the testimonies
      were not in agreement.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πολλοὶ
  chosen: many
  alternatives:
  - many people
  - many witnesses
  lexicon: BDAG
  rationale: The adjective functions substantivally, referring to numerous persons.
    'Many' is concise and natural; 'witnesses' is implied by the verb but not explicit,
    so it is not supplied in the main text.
- source_word: γὰρ
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: BDAG
  rationale: γάρ gives explanatory support to the surrounding narrative. 'For' preserves
    the connective force without overinterpreting the relation.
- source_word: ἐψευδομαρτύρουν
  chosen: were giving false testimony
  alternatives:
  - were bearing false witness
  - were testifying falsely
  lexicon: BDAG
  rationale: The imperfect indicates ongoing/repeated action in the scene, so 'were
    giving' captures the aspect. 'False testimony' is clear modern English and preserves
    the legal-witness sense of ψευδομαρτυρέω.
- source_word: κατ’ αὐτοῦ
  chosen: against him
  alternatives:
  - concerning him
  lexicon: BDAG
  rationale: κατά with the genitive in this legal context conveys hostile testimony
    directed against Jesus. 'Against him' best reflects the adversative forensic sense.
- source_word: ἴσαι
  chosen: consistent
  alternatives:
  - equal
  - the same
  - in agreement
  lexicon: BDAG
  rationale: Literally 'equal,' but in context modifying testimonies it means matching
    or agreeing with one another. 'Consistent' communicates the idiomatic legal sense
    in natural English.
- source_word: αἱ μαρτυρίαι
  chosen: their testimonies
  alternatives:
  - the testimonies
  - the witness statements
  lexicon: BDAG
  rationale: The article points to the testimonies just mentioned; English naturally
    uses the possessive 'their testimonies' to make the referent explicit. 'Testimonies'
    preserves the forensic register better than the more paraphrastic 'witness statements'.
- source_word: οὐκ ἦσαν
  chosen: were not
  alternatives:
  - did not prove to be
  lexicon: BDAG
  rationale: Simple negated imperfect of 'to be.' Combined with ἴσαι, 'were not consistent'
    yields idiomatic English while preserving the verbal simplicity.
