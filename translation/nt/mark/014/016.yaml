id: MRK.14.16
reference: Mark 14:16
source:
  edition: SBLGNT
  text: καὶ ἐξῆλθον οἱ ⸀μαθηταὶ καὶ ἦλθον εἰς τὴν πόλιν καὶ εὗρον καθὼς εἶπεν αὐτοῖς,
    καὶ ἡτοίμασαν τὸ πάσχα.
translation:
  text: And the disciples went out and came into the city, and found it just as he
    had told them, and they prepared the Passover.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Passover meal.' The Greek τὸ πάσχα can refer either to Passover
      generally or, in context, to the meal being prepared.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξῆλθον
  chosen: went out
  alternatives:
  - departed
  - went forth
  lexicon: BDAG
  rationale: Aorist of ἐξέρχομαι, denoting departure from their previous location.
    'Went out' is the most natural and sufficiently formal rendering in context.
- source_word: μαθηταὶ
  chosen: the disciples
  alternatives:
  - the learners
  lexicon: BDAG
  rationale: Standard Gospel term for Jesus' followers. 'Disciples' preserves the
    established relational and instructional sense without flattening it.
- source_word: ἦλθον εἰς τὴν πόλιν
  chosen: came into the city
  alternatives:
  - went into the city
  - came to the city
  lexicon: BDAG
  rationale: The Greek literally says 'came into the city.' English could also say
    'went into,' but 'came into' preserves the verbal distinction from the preceding
    ἐξῆλθον while remaining natural.
- source_word: πόλιν
  chosen: the city
  alternatives:
  - town
  lexicon: BDAG
  rationale: πόλις normally means 'city.' In this Passover-Jerusalem context, 'city'
    is the appropriate and straightforward rendering.
- source_word: εὗρον
  chosen: found it
  alternatives:
  - found
  lexicon: BDAG
  rationale: 'The verb''s object is implicit from context: they found matters as Jesus
    had said, especially the prepared location and circumstances. Supplying ''it''
    makes idiomatic English without adding new content.'
- source_word: καθὼς εἶπεν αὐτοῖς
  chosen: just as he had told them
  alternatives:
  - as he said to them
  - just as he had said to them
  lexicon: BDAG
  rationale: καθώς marks correspondence, and the aorist εἶπεν refers to Jesus' prior
    instruction. 'Had told them' is idiomatic English for prior speech and fits the
    narrative sequence.
- source_word: ἡτοίμασαν
  chosen: they prepared
  alternatives:
  - made ready
  - got ready
  lexicon: BDAG
  rationale: Aorist of ἑτοιμάζω, meaning to prepare or make ready. 'Prepared' is clear,
    direct, and suitably formal.
- source_word: τὸ πάσχα
  chosen: the Passover
  alternatives:
  - the Passover meal
  lexicon: BDAG
  rationale: πάσχα can denote Passover generally or the meal in context. 'The Passover'
    preserves the Greek wording while allowing readers to infer the meal-preparation
    setting from context.
