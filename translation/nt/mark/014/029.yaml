theological_decisions:
- issue: Meaning of σκανδαλισθήσονται in discipleship-failure context
  chosen_reading: fall away
  alternative_readings:
  - stumble
  - be caused to stumble
  rationale: The verse concerns Peter's denial that he will fail as the others do.
    Rendering the verb as 'fall away' preserves the seriousness of apostasy-like desertion
    in context without overstating a final theological judgment. It reflects the narrative
    setting better than a merely physical or momentary 'stumble.'
  doctrine_reference: 'Translation philosophy: preserve theological tension rather
    than resolve it; optimal equivalence'
