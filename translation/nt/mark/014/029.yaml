id: MRK.14.29
reference: Mark 14:29
source:
  edition: SBLGNT
  text: ὁ δὲ Πέτρος ἔφη αὐτῷ· ⸂Εἰ καὶ⸃ πάντες σκανδαλισθήσονται, ἀλλ’ οὐκ ἐγώ.
translation:
  text: But Peter said to him, “Even if all fall away, yet I will not.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “stumble” or “be caused to stumble.” The Greek verb can mean to be tripped
      up, offended, or to fall away.
    reason: lexical_alternative
lexical_decisions:
- source_word: δὲ
  chosen: But
  alternatives:
  - And
  - Now
  lexicon: BDAG
  rationale: Marks contrast with Jesus' preceding prediction; 'But' best conveys Peter's
    oppositional response in natural English.
- source_word: ἔφη
  chosen: said
  alternatives:
  - declared
  - told
  lexicon: BDAG
  rationale: A standard narrative speech verb; 'said' is the most natural and sufficiently
    precise rendering here.
- source_word: αὐτῷ
  chosen: to him
  alternatives:
  - to Jesus
  lexicon: BDAG
  rationale: The dative pronoun refers to Jesus from context. The pronoun is retained
    rather than replacing it with the name, since the Greek uses a pronoun.
- source_word: Εἰ καὶ
  chosen: Even if
  alternatives:
  - Although
  - If indeed even
  lexicon: BDAG
  rationale: This conditional-concessive expression introduces a hypothetical extreme
    case. 'Even if' captures the force clearly and idiomatically.
- source_word: πάντες
  chosen: all
  alternatives:
  - everyone
  - all of them
  lexicon: BDAG
  rationale: Refers to the whole group of disciples in context. 'All' is concise and
    matches the Greek's broad scope.
- source_word: σκανδαλισθήσονται
  chosen: fall away
  alternatives:
  - stumble
  - be caused to stumble
  - take offense
  lexicon: BDAG
  rationale: In this context of disciples failing and deserting Jesus, 'fall away'
    best communicates the relational and spiritual defection implied by σκανδαλίζω,
    more clearly than the more literal but potentially weaker 'stumble.' The future
    passive is naturally rendered in English without an explicit passive form here.
- source_word: ἀλλ’ οὐκ ἐγώ
  chosen: yet I will not
  alternatives:
  - but not I
  - but I will not
  lexicon: BDAG
  rationale: This elliptical clause contrasts Peter with the others. 'Yet I will not'
    preserves the emphatic self-distinction while supplying the implied verb from
    the previous clause for clear English.
