id: MRK.14.70
reference: Mark 14:70
source:
  edition: SBLGNT
  text: ὁ δὲ πάλιν ἠρνεῖτο. καὶ μετὰ μικρὸν πάλιν οἱ παρεστῶτες ἔλεγον τῷ Πέτρῳ· Ἀληθῶς
    ἐξ αὐτῶν εἶ, καὶ γὰρ Γαλιλαῖος εἶ ⸂καὶ ἡ λαλιά σου ὁμοιάζει⸃·
translation:
  text: But he again denied it. And after a little while, those standing nearby again
    were saying to Peter, “Surely you are one of them, for you are also a Galilean,
    and your speech matches it.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your accent is similar' or 'your way of speaking is like theirs.' The
      Greek λαλιά can refer to speech-pattern, dialect, or accent.
    reason: lexical_alternative
  - marker: b
    text: Some manuscripts omit 'and your speech matches it.'
    reason: textual_variant
lexical_decisions:
- source_word: ἠρνεῖτο
  chosen: denied it
  alternatives:
  - was denying
  - denied
  lexicon: BDAG
  rationale: 'The imperfect middle/passive form conveys repeated or continued denial
    in context. English idiom prefers the simple past here, but adding ''it'' makes
    explicit the implied object from the surrounding narrative: he denied the accusation/association.'
- source_word: μετὰ μικρὸν
  chosen: after a little while
  alternatives:
  - after a little
  - a little later
  - soon after
  lexicon: BDAG
  rationale: This idiom refers to a short lapse of time. 'After a little while' is
    natural modern English and preserves the temporal sense without over-paraphrase.
- source_word: οἱ παρεστῶτες
  chosen: those standing nearby
  alternatives:
  - the bystanders
  - those standing there
  - those present
  lexicon: BDAG
  rationale: The participle literally refers to those who were standing by/present.
    'Those standing nearby' preserves the spatial nuance more transparently than the
    more interpretive 'bystanders.'
- source_word: ἔλεγον
  chosen: were saying
  alternatives:
  - said
  - kept saying
  lexicon: BDAG
  rationale: The imperfect indicates ongoing or repeated speech. 'Were saying' preserves
    that aspect in readable English.
- source_word: Ἀληθῶς
  chosen: Surely
  alternatives:
  - truly
  - certainly
  lexicon: BDAG
  rationale: The adverb marks confident assertion. 'Surely' fits natural direct speech
    in English while retaining the force of certainty.
- source_word: ἐξ αὐτῶν εἶ
  chosen: you are one of them
  alternatives:
  - you are from among them
  - you belong to them
  lexicon: BDAG
  rationale: The expression identifies Peter as belonging to the group associated
    with Jesus. 'One of them' is the clearest idiomatic rendering.
- source_word: καὶ γὰρ
  chosen: for ... also
  alternatives:
  - for indeed
  - because also
  - for
  lexicon: BDAG
  rationale: γάρ gives the reason for their assertion, while καί before Γαλιλαῖος
    adds 'also/even.' In English the sense is best represented by 'for you are also
    a Galilean.'
- source_word: Γαλιλαῖος
  chosen: a Galilean
  alternatives:
  - Galilean
  lexicon: BDAG
  rationale: Used substantivally to denote a person from Galilee. The indefinite article
    is natural in English.
- source_word: ἡ λαλιά σου
  chosen: your speech
  alternatives:
  - your way of speaking
  - your accent
  lexicon: BDAG
  rationale: λαλιά refers to manner of speech, dialect, or speech-pattern. 'Your speech'
    is broad enough to preserve the lexical range without prematurely narrowing it
    to accent alone.
- source_word: ὁμοιάζει
  chosen: matches it
  alternatives:
  - is similar
  - is like theirs
  - gives you away
  lexicon: BDAG
  rationale: The verb means to be like or resemble. Because the object of comparison
    is implicit from context (the group from Galilee), 'matches it' supplies the implied
    comparison while staying close to the Greek sense. More idiomatic expansions like
    'gives you away' are more interpretive.
