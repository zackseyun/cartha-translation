id: MRK.14.72
reference: Mark 14:72
source:
  edition: SBLGNT
  text: καὶ ⸀εὐθὺς ἐκ δευτέρου ἀλέκτωρ ἐφώνησεν· καὶ ἀνεμνήσθη ὁ Πέτρος τὸ ῥῆμα ⸀ὡς
    εἶπεν αὐτῷ ὁ Ἰησοῦς ὅτι Πρὶν ἀλέκτορα ⸂φωνῆσαι δὶς τρίς με ἀπαρνήσῃ⸃, καὶ ἐπιβαλὼν
    ἔκλαιεν.
translation:
  text: And immediately a rooster crowed a second time. And Peter remembered the word,
    how Jesus had said to him, “Before a rooster crows twice, you will deny me three
    times.” And breaking down, he wept.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'when he thought on it, he wept'; the participle ἐπιβαλών is difficult
      and has been understood in several ways, including an inward mental turn or
      an outward physical gesture.
    reason: lexical_alternative
lexical_decisions:
- source_word: εὐθὺς
  chosen: immediately
  alternatives:
  - at once
  - right away
  lexicon: BDAG
  rationale: Standard temporal adverb meaning 'immediately/at once.' 'Immediately'
    preserves Mark's characteristic urgency and is natural English.
- source_word: ἐκ δευτέρου
  chosen: a second time
  alternatives:
  - for the second time
  - again
  lexicon: BDAG
  rationale: Idiomatic expression meaning 'for the second time.' Rendered as 'a second
    time' for smooth modern English while preserving the explicit numbering.
- source_word: ἀλέκτωρ
  chosen: rooster
  alternatives:
  - cock
  lexicon: BDAG
  rationale: Refers to a rooster. 'Rooster' is preferred in contemporary English;
    'cock' is traditional but now potentially distracting.
- source_word: ἐφώνησεν
  chosen: crowed
  alternatives:
  - called out
  lexicon: BDAG
  rationale: In context with ἀλέκτωρ, the natural English verb is 'crowed,' not the
    more generic 'made a sound' or 'called.'
- source_word: ἀνεμνήσθη
  chosen: remembered
  alternatives:
  - was reminded
  - recalled
  lexicon: BDAG
  rationale: Aorist passive/deponent here functions naturally as 'remembered.' This
    is the straightforward idiomatic rendering in context.
- source_word: τὸ ῥῆμα
  chosen: the word
  alternatives:
  - the saying
  - what was said
  lexicon: BDAG
  rationale: ῥῆμα often means 'word, saying, statement.' 'The word' is formally closer,
    while the following clause explains its content. Alternative 'the saying' is viable
    but less literal.
- source_word: ὡς εἶπεν αὐτῷ ὁ Ἰησοῦς
  chosen: how Jesus had said to him
  alternatives:
  - what Jesus had said to him
  - just as Jesus had said to him
  lexicon: BDAG
  rationale: ὡς here introduces the content/remembrance in a way well conveyed by
    'how.' The pluperfect sense in English ('had said') fits the narrative sequence.
- source_word: Πρὶν ἀλέκτορα φωνῆσαι δὶς
  chosen: Before a rooster crows twice
  alternatives:
  - Before the rooster crows twice
  lexicon: BDAG
  rationale: πρίν with infinitive gives a temporal clause. The anarthrous ἀλέκτορα
    is naturally rendered indefinitely in English, though English can also use the
    generic definite article. 'A rooster' avoids implying a specific identified bird.
- source_word: τρίς με ἀπαρνήσῃ
  chosen: you will deny me three times
  alternatives:
  - you will disown me three times
  lexicon: BDAG
  rationale: ἀπαρνέομαι means 'deny, disown, repudiate.' 'Deny me' matches standard
    usage and preserves the relational force without overinterpreting.
- source_word: ἐπιβαλών
  chosen: breaking down
  alternatives:
  - throwing himself into it
  - covering his head
  - when he thought on it
  lexicon: BDAG
  rationale: This participle is notoriously difficult in this idiom. In context it
    signals the onset/intensification of Peter's emotional collapse before weeping.
    'Breaking down' best captures the probable sense in readable English without forcing
    an obscure literalism. Alternatives are preserved in a footnote because the expression
    is debated.
- source_word: ἔκλαιεν
  chosen: he wept
  alternatives:
  - he began to weep
  - he kept weeping
  lexicon: BDAG
  rationale: Imperfect indicates ongoing action, but English often expresses this
    naturally with simple past in narrative. 'He wept' is concise and dignified; aspectual
    alternatives are noted by the surrounding context and could be expanded if desired.
