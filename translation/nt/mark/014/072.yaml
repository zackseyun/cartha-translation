theological_decisions:
- issue: Rendering the difficult participle ἐπιβαλών
  chosen_reading: Rendered idiomatically as 'breaking down' before 'he wept.'
  alternative_readings:
  - '''when he thought on it, he wept'''
  - '''throwing himself out, he wept'''
  - '''covering his head, he wept'''
  rationale: This is primarily a lexical/syntactical issue rather than a doctrinal
    one, but it affects how Peter's repentance is portrayed. The chosen rendering
    preserves the emotional force without importing a specific physical gesture not
    clearly demanded by the Greek. Alternatives are preserved in a footnote to maintain
    transparency.
  doctrine_reference: Translation philosophy §3, preserve theological tension rather
    than resolve it; §5, documented exception where context demands variance.
