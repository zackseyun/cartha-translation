id: MRK.14.9
reference: Mark 14:9
source:
  edition: SBLGNT
  text: ἀμὴν ⸀δὲ λέγω ὑμῖν, ὅπου ⸀ἐὰν κηρυχθῇ τὸ ⸀εὐαγγέλιον εἰς ὅλον τὸν κόσμον,
    καὶ ὃ ἐποίησεν αὕτη λαληθήσεται εἰς μνημόσυνον αὐτῆς.
translation:
  text: Truly I tell you, wherever the good news is proclaimed in the whole world,
    what this woman has done will also be spoken of in memory of her.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or: “the gospel.”'
    reason: lexical_alternative
  - marker: b
    text: 'Or: “as a memorial to her.”'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀμὴν
  chosen: Truly
  alternatives:
  - Amen
  - Truly, truly
  lexicon: BDAG
  rationale: Introduces a solemn, authoritative saying. In English narrative discourse,
    'Truly' communicates the force naturally without leaving the Hebrew/Aramaic form
    untranslated.
- source_word: δὲ
  chosen: '[implicit in English flow]'
  alternatives:
  - and
  - but
  - now
  lexicon: BDAG
  rationale: δέ is a mild connective; English idiom does not require an explicit conjunction
    here after 'Truly.' Its discourse function is preserved by the sentence flow.
- source_word: λέγω ὑμῖν
  chosen: I tell you
  alternatives:
  - I say to you
  lexicon: BDAG
  rationale: A standard idiomatic rendering in contemporary English. 'I tell you'
    preserves the direct address and solemnity while reading naturally.
- source_word: ὅπου ἐὰν
  chosen: wherever
  alternatives:
  - wherever it may be that
  - in whatever place
  lexicon: BDAG
  rationale: 'The combination expresses indefiniteness with generality: any place
    where the condition is met. ''Wherever'' captures this compactly and accurately.'
- source_word: κηρυχθῇ
  chosen: is proclaimed
  alternatives:
  - is preached
  - is announced
  lexicon: BDAG
  rationale: κηρύσσω is public proclamation. 'Proclaimed' preserves the heraldic/public
    sense and avoids narrowing to specifically sermonic activity implied by 'preached'
    in some modern contexts.
- source_word: τὸ εὐαγγέλιον
  chosen: the good news
  alternatives:
  - the gospel
  lexicon: BDAG
  rationale: εὐαγγέλιον literally means 'good news.' This rendering follows source-language
    primacy and remains accessible modern English. 'The gospel' is preserved as an
    alternative because of its established Christian usage.
- source_word: εἰς ὅλον τὸν κόσμον
  chosen: in the whole world
  alternatives:
  - throughout the whole world
  - into all the world
  lexicon: BDAG
  rationale: κόσμος here refers to the inhabited world in broad universal scope. 'In
    the whole world' is natural English and adequately reflects the global extent
    signaled by εἰς + accusative.
- source_word: καὶ
  chosen: also
  alternatives:
  - and
  lexicon: BDAG
  rationale: 'Here καί adds the accompanying result: not only will the good news be
    proclaimed, but this deed will also be spoken of. ''Also'' makes the additive
    force explicit in English.'
- source_word: ὃ ἐποίησεν αὕτη
  chosen: what this woman has done
  alternatives:
  - what she did
  - what this one has done
  lexicon: BDAG
  rationale: The demonstrative αὕτη points to the woman present in context. Supplying
    'woman' makes the referent clear in English without altering meaning. The perfect-like
    English 'has done' fits the continuing significance of the completed act, though
    the Greek aorist simply states the deed.
- source_word: λαληθήσεται
  chosen: will be spoken of
  alternatives:
  - will be told
  - will be spoken
  lexicon: BDAG
  rationale: Passive future of λαλέω here indicates that her act will become part
    of the spoken proclamation/tradition. 'Spoken of' is idiomatic and fits the object
    'what this woman has done.'
- source_word: εἰς μνημόσυνον αὐτῆς
  chosen: in memory of her
  alternatives:
  - as a memorial to her
  - for a remembrance of her
  lexicon: BDAG
  rationale: μνημόσυνον denotes memorial/remembrance. 'In memory of her' is clear
    modern English; 'as a memorial to her' is a slightly more formal alternative preserved
    in a footnote because it closely reflects the noun form.
