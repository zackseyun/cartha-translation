theological_decisions:
- issue: Rendering εὐαγγέλιον in a saying about the worldwide proclamation of Jesus'
    message
  chosen_reading: the good news
  alternative_readings:
  - the gospel
  rationale: No doctrinal dispute is at stake, but the phrase is central to Christian
    proclamation. Following the translation philosophy's source-language primacy and
    readable modern English, 'the good news' was chosen in the main text, while the
    traditional term 'the gospel' is preserved in a footnote for readers who recognize
    its technical Christian usage.
  doctrine_reference: Translation philosophy §§1, 6
- issue: Explicitly identifying αὕτη as 'this woman'
  chosen_reading: what this woman has done
  alternative_readings:
  - what she has done
  - what this one has done
  rationale: The Greek demonstrative is feminine singular and refers to the woman
    in the immediate narrative context. Making the referent explicit in English improves
    clarity without importing interpretation beyond the context.
  doctrine_reference: Translation philosophy §6
