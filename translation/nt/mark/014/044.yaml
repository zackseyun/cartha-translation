id: MRK.14.44
reference: Mark 14:44
source:
  edition: SBLGNT
  text: δεδώκει δὲ ὁ παραδιδοὺς αὐτὸν σύσσημον αὐτοῖς λέγων· Ὃν ἂν φιλήσω αὐτός ἐστιν·
    κρατήσατε αὐτὸν καὶ ⸀ἀπάγετε ἀσφαλῶς.
translation:
  text: Now the one betraying him had given them a signal, saying, “The one I kiss
    is he. Seize him and lead him away securely.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “a sign”; the Greek term refers to an agreed identifying signal.
    reason: lexical_alternative
  - marker: b
    text: A kiss was a customary greeting and here serves as Judas’s identifying signal.
    reason: cultural_note
  - marker: c
    text: Or “lead him away safely.” Here “securely” likely means making sure he is
      kept under firm control.
    reason: alternative_reading
lexical_decisions:
- source_word: δεδώκει
  chosen: had given
  alternatives:
  - gave
  lexicon: BDAG
  rationale: Pluperfect sense is best represented by English past perfect, indicating
    Judas had already arranged the signal before the arrest scene unfolds.
- source_word: ὁ παραδιδοὺς αὐτόν
  chosen: the one betraying him
  alternatives:
  - his betrayer
  - the one handing him over
  lexicon: BDAG
  rationale: A participial construction is preserved with natural English. 'Betraying'
    fits Mark's narrative and common semantic force of παραδίδωμι here; 'handing over'
    is more literal but less idiomatic in this context.
- source_word: σύσσημον
  chosen: a signal
  alternatives:
  - a sign
  - a prearranged signal
  lexicon: BDAG
  rationale: The noun denotes an agreed identifying sign. 'Signal' better conveys
    a prearranged marker than the broader 'sign.'
- source_word: λέγων
  chosen: saying
  alternatives:
  - and said
  lexicon: BDAG
  rationale: The participle is naturally rendered as 'saying,' preserving the flow
    from the giving of the signal to its content.
- source_word: Ὃν ἂν φιλήσω
  chosen: The one I kiss
  alternatives:
  - Whomever I kiss
  - The man I kiss
  lexicon: BDAG
  rationale: The construction is indefinite-relative with ἄν. 'The one I kiss' is
    idiomatic and keeps the identifying force without adding 'man,' which is not explicit.
- source_word: φιλήσω
  chosen: kiss
  alternatives:
  - greet with a kiss
  lexicon: BDAG
  rationale: The simple verb 'kiss' is sufficient in context. The cultural function
    as a greeting can be noted in a footnote rather than expanded in the main text.
- source_word: αὐτός ἐστιν
  chosen: is he
  alternatives:
  - is the one
  - that is him
  lexicon: BDAG
  rationale: This concise rendering preserves the emphatic identification. 'Is he'
    is natural enough in direct speech and reflects the Greek emphasis.
- source_word: κρατήσατε
  chosen: Seize
  alternatives:
  - Arrest
  - Take hold of
  lexicon: BDAG
  rationale: κρατέω here means to take hold of forcibly. 'Seize' preserves the physical
    and urgent sense without importing the more procedural nuance of 'arrest.'
- source_word: ἀπάγετε
  chosen: lead him away
  alternatives:
  - take him away
  - bring him away
  lexicon: BDAG
  rationale: The verb here means to lead or carry off from the place. 'Lead him away'
    is clear and fits the arrest context.
- source_word: ἀσφαλῶς
  chosen: securely
  alternatives:
  - safely
  - under guard
  - carefully
  lexicon: BDAG
  rationale: The adverb can mean securely/safely. In this arrest context, 'securely'
    best conveys making sure he does not escape, rather than concern for his well-being.
