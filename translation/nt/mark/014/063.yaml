id: MRK.14.63
reference: Mark 14:63
source:
  edition: SBLGNT
  text: ὁ δὲ ἀρχιερεὺς διαρρήξας τοὺς χιτῶνας αὐτοῦ λέγει· Τί ἔτι χρείαν ἔχομεν μαρτύρων;
translation:
  text: Then the high priest tore his garments and said, “What further need do we
    have of witnesses?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “his robes” or more specifically “his tunics.”
    reason: lexical_alternative
  - marker: b
    text: 'Greek uses a historical present: “says.”'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀρχιερεὺς
  chosen: the high priest
  alternatives:
  - the chief priest
  lexicon: BDAG
  rationale: Standard rendering for the singular office-holder presiding in the hearing.
    'High priest' is the established and most precise English equivalent for ἀρχιερεύς
    in this context.
- source_word: διαρρήξας
  chosen: tore
  alternatives:
  - rent
  - ripped
  lexicon: BDAG
  rationale: Aorist participle indicating the action of tearing apart. 'Tore' is clear
    modern English and preserves the force without archaic 'rent.'
- source_word: τοὺς χιτῶνας αὐτοῦ
  chosen: his garments
  alternatives:
  - his robes
  - his tunics
  lexicon: BDAG
  rationale: χιτών can refer specifically to a tunic, but in this idiomatic scene
    of grief/outrage the plural is best rendered more naturally as 'garments.' 'Robes'
    is possible, but 'garments' avoids over-specifying ceremonial attire while preserving
    the plural.
- source_word: λέγει
  chosen: said
  alternatives:
  - says
  lexicon: BDAG
  rationale: Although the Greek uses the historical present, English narrative style
    commonly shifts this to simple past for natural readability. This is a standard
    optimal-equivalence adjustment.
- source_word: Τί ἔτι χρείαν ἔχομεν
  chosen: What further need do we have
  alternatives:
  - What need do we still have
  - Why do we still need
  lexicon: BDAG
  rationale: This reproduces the interrogative force and the sense of ἔτι ('still/further/yet')
    with idiomatic English. 'Further' captures the idea that additional testimony
    is now unnecessary.
- source_word: μαρτύρων
  chosen: of witnesses
  alternatives:
  - for witnesses
  lexicon: BDAG
  rationale: Genitive after χρείαν ἔχομεν is naturally expressed in English as 'need
    of witnesses.' 'For witnesses' is possible but less idiomatic here.
