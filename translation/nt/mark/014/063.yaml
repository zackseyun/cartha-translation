theological_decisions:
- issue: Rendering the high priest's tearing of clothing
  chosen_reading: Translated as a literal act of tearing his garments without importing
    an interpretive gloss such as grief, outrage, or accusation of blasphemy.
  alternative_readings:
  - Interpreting the gesture explicitly as outrage at perceived blasphemy
  rationale: The verse narrates the action and speech but does not itself explain
    the gesture's meaning. To preserve theological and narrative restraint, the translation
    leaves the act uninterpreted in the main text.
  doctrine_reference: Preserve theological tension rather than resolve it.
