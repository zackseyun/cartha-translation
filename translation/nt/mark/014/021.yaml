theological_decisions:
- issue: Rendering παραδίδοται in a passion context
  chosen_reading: is betrayed
  alternative_readings:
  - is handed over
  - is delivered up
  rationale: The immediate context is Judas's treachery, so 'betrayed' best conveys
    the event's moral character in English. However, because παραδίδωμι can also be
    rendered more literally as 'hand over,' that alternative is preserved in a footnote
    for auditability and to avoid obscuring the broader lexical pattern in the passion
    narratives.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Implication of divine sovereignty and human responsibility
  chosen_reading: For the Son of Man is going just as it is written about him, but
    woe to that man...
  rationale: 'The translation preserves both clauses without softening either: the
    Son of Man''s path accords with what is written, yet the betrayer remains under
    woe. This maintains the text''s theological tension rather than resolving it toward
    determinism or exculpation.'
  doctrine_reference: Translation philosophy §3
