id: MRK.14.21
reference: Mark 14:21
source:
  edition: SBLGNT
  text: ⸀ὅτι ὁ μὲν υἱὸς τοῦ ἀνθρώπου ὑπάγει καθὼς γέγραπται περὶ αὐτοῦ, οὐαὶ δὲ τῷ
    ἀνθρώπῳ ἐκείνῳ δι’ οὗ ὁ υἱὸς τοῦ ἀνθρώπου παραδίδοται· ⸀καλὸν αὐτῷ εἰ οὐκ ἐγεννήθη
    ὁ ἄνθρωπος ἐκεῖνος.
translation:
  text: For the Son of Man is going just as it is written about him, but woe to that
    man through whom the Son of Man is betrayed. It would have been good for him if
    that man had not been born.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, “through whom the Son of Man is handed over.”
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅτι
  chosen: For
  alternatives:
  - because
  - that
  lexicon: BDAG
  rationale: In this context introducing Jesus' explanatory statement, 'For' reads
    naturally in English and preserves the causal/explanatory force better than a
    bare 'that'.
- source_word: ὁ μὲν ... δὲ
  chosen: is going ... but woe
  alternatives:
  - indeed ... but
  - on the one hand ... but on the other
  lexicon: BDAG
  rationale: The μέν...δέ contrast marks two coordinated but contrasting assertions.
    English usually leaves μέν implicit and expresses the contrast with 'but'.
- source_word: ὁ υἱὸς τοῦ ἀνθρώπου
  chosen: the Son of Man
  lexicon: BDAG
  rationale: This is Jesus' established self-designation and should be translated
    literally rather than paraphrased, preserving both its idiomatic and possible
    Danielic resonance.
- source_word: ὑπάγει
  chosen: is going
  alternatives:
  - goes
  - is departing
  - is on his way
  lexicon: BDAG
  rationale: The present tense here conveys movement toward the appointed outcome.
    'Is going' is a natural English rendering that preserves the verbal aspect without
    overinterpreting it as merely spatial departure.
- source_word: καθὼς γέγραπται περὶ αὐτοῦ
  chosen: just as it is written about him
  alternatives:
  - as it has been written concerning him
  - according as it is written about him
  lexicon: BDAG
  rationale: This preserves the comparative force of καθώς and the scriptural perfect
    γέγραπται ('it stands written') in idiomatic modern English.
- source_word: οὐαὶ
  chosen: woe
  alternatives:
  - alas
  - judgment
  lexicon: BDAG
  rationale: '''Woe'' is the standard prophetic/interjectional rendering and retains
    the solemn denunciatory force better than softer English options.'
- source_word: τῷ ἀνθρώπῳ ἐκείνῳ
  chosen: to that man
  alternatives:
  - to that person
  lexicon: BDAG
  rationale: ἄνθρωπος here refers to a specific male individual, Judas in context,
    so 'man' is both accurate and consistent with the gender-accurate policy.
- source_word: δι’ οὗ
  chosen: through whom
  alternatives:
  - by whom
  lexicon: BDAG
  rationale: διά with the genitive commonly expresses agency or instrumentality. 'Through
    whom' is slightly more literal and preserves the mediating sense.
- source_word: παραδίδοται
  chosen: is betrayed
  alternatives:
  - is handed over
  - is delivered up
  lexicon: BDAG
  rationale: Although παραδίδωμι literally means 'hand over/deliver,' in this passion
    context the treacherous sense is foregrounded. 'Is betrayed' communicates the
    meaning most clearly in English. The more literal alternative is worth preserving
    in a footnote because of the term's broader theological usage in the passion narratives.
- source_word: καλὸν αὐτῷ
  chosen: It would have been good for him
  alternatives:
  - It were better for him
  - It is good for him
  lexicon: BDAG
  rationale: This idiom expresses a counterfactual evaluation, not a simple present
    statement. 'It would have been good for him' is clear modern English and fits
    the following contrary-to-fact condition.
- source_word: εἰ οὐκ ἐγεννήθη
  chosen: if ... had not been born
  alternatives:
  - if ... had never been born
  lexicon: BDAG
  rationale: The aorist passive with εἰ here forms a contrary-to-fact condition. 'Had
    not been born' is precise; 'never' is interpretive emphasis not required by the
    Greek.
- source_word: ὁ ἄνθρωπος ἐκεῖνος
  chosen: that man
  alternatives:
  - the man
  lexicon: BDAG
  rationale: The repeated demonstrative is retained for emphasis and specificity,
    matching the Greek's solemn repetition.
