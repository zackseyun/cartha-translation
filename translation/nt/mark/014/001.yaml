id: MRK.14.1
reference: Mark 14:1
source:
  edition: SBLGNT
  text: Ἦν δὲ τὸ πάσχα καὶ τὰ ἄζυμα μετὰ δύο ἡμέρας. καὶ ἐζήτουν οἱ ἀρχιερεῖς καὶ
    οἱ γραμματεῖς πῶς αὐτὸν ἐν δόλῳ κρατήσαντες ἀποκτείνωσιν,
translation:
  text: Now the Passover and the Feast of Unleavened Bread were two days away. And
    the chief priests and the scribes were seeking how, by deceit, they might arrest
    him and kill him,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'after two days.' The phrase refers to the Passover
      and the Feast of Unleavened Bread as imminent.
    reason: lexical_alternative
  - marker: b
    text: Greek 'the unleavened [things],' a customary way of referring to the Feast
      of Unleavened Bread.
    reason: cultural_note
  - marker: c
    text: Or 'seize him' or 'take him by stealth.'
    reason: alternative_reading
lexical_decisions:
- source_word: Ἦν δὲ
  chosen: Now ... were
  alternatives:
  - And ... was/were
  - Now ... was/were
  lexicon: BDAG
  rationale: δέ is rendered with a mild transitional 'Now' to mark narrative progression
    without overemphasizing coordination. Although Ἦν is singular, the compound subject
    'the Passover and the Feast of Unleavened Bread' is naturally rendered with plural
    'were' in English.
- source_word: τὸ πάσχα
  chosen: the Passover
  lexicon: BDAG
  rationale: Standard rendering for the Jewish festival; definite article preserved.
    In context it refers to the feast period rather than the sacrificial lamb specifically.
- source_word: τὰ ἄζυμα
  chosen: the Feast of Unleavened Bread
  alternatives:
  - the Unleavened Bread
  - the unleavened loaves
  lexicon: BDAG
  rationale: Although literally 'the unleavened [things/breads],' in festival context
    it denotes the feast. Expanding to 'the Feast of Unleavened Bread' makes the referent
    clear in natural English.
- source_word: μετὰ δύο ἡμέρας
  chosen: were two days away
  alternatives:
  - after two days
  - in two days
  lexicon: BDAG
  rationale: The idiom can be rendered woodenly as 'after two days,' but in this temporal
    setting 'were two days away' communicates the impending time reference clearly
    in modern English while preserving the sense.
- source_word: ἐζήτουν
  chosen: were seeking
  alternatives:
  - were looking for
  - kept trying
  lexicon: BDAG
  rationale: Imperfect tense suggests ongoing or repeated effort. 'Were seeking' preserves
    that durative sense without adding interpretive force.
- source_word: οἱ ἀρχιερεῖς
  chosen: the chief priests
  alternatives:
  - the high priests
  lexicon: BDAG
  rationale: Conventional and accurate rendering for the leading priestly authorities,
    not merely one high priest.
- source_word: οἱ γραμματεῖς
  chosen: the scribes
  alternatives:
  - the teachers of the law
  lexicon: BDAG
  rationale: '''Scribes'' is the direct lexical equivalent and remains understandable
    in modern English; the more interpretive alternative is not necessary here.'
- source_word: πῶς
  chosen: how
  alternatives:
  - in what way
  lexicon: BDAG
  rationale: Direct and natural rendering introducing the manner of their intended
    action.
- source_word: ἐν δόλῳ
  chosen: by deceit
  alternatives:
  - by stealth
  - with treachery
  - craftily
  lexicon: BDAG
  rationale: δόλος denotes deceit, trickery, or cunning. 'By deceit' preserves the
    moral character of the action without overparaphrasing. 'By stealth' is possible
    but narrows the sense toward secrecy rather than deception.
- source_word: κρατήσαντες
  chosen: arrest
  alternatives:
  - seize
  - take hold of
  lexicon: BDAG
  rationale: The participle means to seize or take into custody. In this context of
    hostile authorities plotting against Jesus, 'arrest' best conveys the intended
    official hostile seizure in idiomatic English.
- source_word: ἀποκτείνωσιν
  chosen: kill him
  alternatives:
  - put him to death
  lexicon: BDAG
  rationale: The verb means 'kill' or 'put to death.' 'Kill him' is direct and natural;
    'put him to death' is possible but slightly more formal and juridical than the
    Greek itself requires here.
