theological_decisions:
- issue: Relationship between Passover and Unleavened Bread
  chosen_reading: 'Render both terms distinctly: ''the Passover and the Feast of Unleavened
    Bread'''
  alternative_readings:
  - Treat the two expressions as a single festival title
  rationale: Mark names both observances explicitly. The translation preserves the
    distinction while allowing that they are closely associated in Jewish festival
    practice. This avoids collapsing the terms into one label not stated by the Greek.
  doctrine_reference: Translation philosophy §1, §5
- issue: Moral characterization of the leaders' plan
  chosen_reading: Explicitly render ἐν δόλῳ as 'by deceit'
  alternative_readings:
  - by stealth
  - secretly
  rationale: The Greek states not merely secrecy but deceitful intent. The translation
    preserves the ethical force of the wording without adding commentary.
  doctrine_reference: Translation philosophy §1, §6
