theological_decisions:
- issue: Whether to render Ἐγώ εἰμι as a simple affirmation or as an expanded identification
  chosen_reading: Simple 'I am' in the main text
  alternative_readings:
  - I am he
  rationale: The Greek text itself contains no explicit predicate. Rendering it as
    'I am' preserves both the immediate affirmative answer and the possibility of
    deeper resonance without forcing either a merely idiomatic or a heavily theological
    reading. This follows the principle of preserving theological tension rather than
    resolving it beyond the source text.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
- issue: How explicitly to identify τῆς δυνάμεως
  chosen_reading: Render as 'Power' rather than substituting 'God'
  alternative_readings:
  - God
  - the Mighty One
  rationale: The Greek uses a reverential circumlocution rather than the direct divine
    name/title. Translating the circumlocution preserves the wording and tone of the
    source while still allowing readers to recognize the divine reference from context.
  doctrine_reference: Translation philosophy §1 (Original-language primacy over translation
    tradition)
