theological_decisions:
- issue: Elliptical purpose clause and divine purpose
  chosen_reading: But this has happened so that the Scriptures might be fulfilled
  alternative_readings:
  - But so that the Scriptures might be fulfilled
  rationale: The Greek leaves the main verb implied after ἀλλ’ ἵνα. Supplying 'this
    has happened' clarifies the sense in idiomatic English while preserving the text's
    emphasis that the events unfold in accordance with Scripture, without importing
    a stronger deterministic formulation than the Greek states.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather
    than resolve it.
