id: MRK.14.49
reference: Mark 14:49
source:
  edition: SBLGNT
  text: καθ’ ἡμέραν ἤμην πρὸς ὑμᾶς ἐν τῷ ἱερῷ διδάσκων καὶ οὐκ ἐκρατήσατέ με· ἀλλ’
    ἵνα πληρωθῶσιν αἱ γραφαί.
translation:
  text: Day after day I was with you in the temple, teaching, and you did not seize
    me. But this has happened so that the Scriptures might be fulfilled.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'But so that the Scriptures might be fulfilled.' The
      Greek is elliptical, leaving the main verb implied.
    reason: lexical_alternative
  - marker: b
    text: Or 'you did not arrest me.'
    reason: lexical_alternative
  - marker: c
    text: '''Temple'' here refers to the temple complex or precincts, not specifically
      the inner sanctuary.'
    reason: cultural_note
lexical_decisions:
- source_word: καθ’ ἡμέραν
  chosen: Day after day
  alternatives:
  - Every day
  - Daily
  lexicon: BDAG
  rationale: Idiomatic distributive expression meaning 'each day' or 'day by day.'
    'Day after day' preserves the repeated, ongoing sense in natural English.
- source_word: ἤμην πρὸς ὑμᾶς
  chosen: I was with you
  alternatives:
  - I was among you
  - I was before you
  lexicon: BDAG
  rationale: πρός with persons here conveys presence in relation to them. 'With you'
    is the most natural English rendering and fits the scene of Jesus' public presence.
- source_word: ἐν τῷ ἱερῷ
  chosen: in the temple
  alternatives:
  - in the temple courts
  - in the temple precincts
  lexicon: BDAG
  rationale: ἱερόν refers to the temple complex rather than the inner sanctuary. 'In
    the temple' is standard and sufficiently clear in English; more specific alternatives
    are possible but not necessary in the main text.
- source_word: διδάσκων
  chosen: teaching
  alternatives:
  - while teaching
  lexicon: BDAG
  rationale: Present participle expressing Jesus' ongoing public activity. 'Teaching'
    is concise and preserves the participial force without overcomplicating the sentence.
- source_word: οὐκ ἐκρατήσατέ με
  chosen: you did not seize me
  alternatives:
  - you did not arrest me
  - you did not take hold of me
  lexicon: BDAG
  rationale: κρατέω can mean seize, arrest, or take hold of. 'Seize' preserves the
    physical and juridical sense without narrowing it too quickly to a technical legal
    term, while fitting the arrest context.
- source_word: ἀλλ’ ἵνα
  chosen: But this has happened so that
  alternatives:
  - But so that
  - Yet in order that
  lexicon: BDAG
  rationale: The Greek is elliptical after the preceding clause. English normally
    requires an implied verbal idea. 'This has happened so that' makes the ellipsis
    explicit and readable without adding more than the context warrants.
- source_word: πληρωθῶσιν
  chosen: might be fulfilled
  alternatives:
  - may be fulfilled
  - might come to fulfillment
  lexicon: BDAG
  rationale: Aorist passive subjunctive after ἵνα, expressing purpose/result. 'Might
    be fulfilled' is natural English and preserves the passive sense.
- source_word: αἱ γραφαί
  chosen: the Scriptures
  alternatives:
  - the writings
  - the scriptural writings
  lexicon: BDAG
  rationale: γραφή in the plural in this context refers to the sacred writings of
    Israel recognized as Scripture. Capitalized 'Scriptures' reflects that established
    referent in English.
