id: MRK.14.57
reference: Mark 14:57
source:
  edition: SBLGNT
  text: καί τινες ἀναστάντες ἐψευδομαρτύρουν κατ’ αὐτοῦ λέγοντες
translation:
  text: And some stood up and were giving false testimony against him, saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more traditionally, 'were bearing false witness against him.'
    reason: lexical_alternative
lexical_decisions:
- source_word: καί
  chosen: And
  alternatives:
  - Now
  - Then
  lexicon: BDAG
  rationale: Standard connective introducing the next action in the narrative. 'And'
    preserves the simple paratactic flow of Mark.
- source_word: τινες
  chosen: some
  alternatives:
  - certain ones
  - some people
  lexicon: BDAG
  rationale: Indefinite plural referring to unspecified individuals. 'Some' is natural
    English and preserves the indefiniteness.
- source_word: ἀναστάντες
  chosen: stood up
  alternatives:
  - rose
  - got up
  lexicon: BDAG
  rationale: Aorist participle of ἀνίστημι, here describing the action accompanying
    their testimony. 'Stood up' fits the courtroom setting and is idiomatic in English.
- source_word: ἐψευδομαρτύρουν
  chosen: were giving false testimony
  alternatives:
  - were bearing false witness
  - testified falsely
  lexicon: BDAG
  rationale: Imperfect verb indicates ongoing or repeated action. 'Were giving false
    testimony' preserves the imperfect aspect better than simple past and communicates
    the forensic sense clearly in modern English. 'Bearing false witness' is possible
    but more traditional/idiomatic than contemporary.
- source_word: κατ’ αὐτοῦ
  chosen: against him
  alternatives:
  - concerning him
  lexicon: BDAG
  rationale: κατά with the genitive commonly has adversative force here in a legal
    context. 'Against him' best reflects the hostile testimonial setting.
- source_word: λέγοντες
  chosen: saying,
  alternatives:
  - and saying,
  - as they said,
  lexicon: BDAG
  rationale: Present participle introducing the content of the testimony in the following
    verse. 'Saying,' is the natural English lead-in and preserves the connection to
    the quoted accusation.
