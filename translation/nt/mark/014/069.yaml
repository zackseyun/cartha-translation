id: MRK.14.69
reference: Mark 14:69
source:
  edition: SBLGNT
  text: καὶ ἡ παιδίσκη ἰδοῦσα αὐτὸν ⸂ἤρξατο πάλιν⸃ λέγειν τοῖς ⸀παρεστῶσιν ὅτι Οὗτος
    ἐξ αὐτῶν ἐστιν.
translation:
  text: And the servant girl, seeing him, began again to say to those standing nearby,
    “This man is one of them.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “to the bystanders” for those present there.
    reason: lexical_alternative
lexical_decisions:
- source_word: παιδίσκη
  chosen: servant girl
  alternatives:
  - slave girl
  - maid
  lexicon: BDAG
  rationale: Refers to a young female servant/maidservant. 'Servant girl' is natural
    modern English and fits the courtyard setting. 'Slave girl' is possible lexically,
    but the bonded status is not the focus in this narrative moment; 'maid' is understandable
    but sounds dated.
- source_word: ἰδοῦσα
  chosen: seeing
  alternatives:
  - when she saw
  - having seen
  lexicon: BDAG
  rationale: The aorist participle is rendered with a natural participial form in
    English to preserve the narrative flow without overformal stiffness. It indicates
    the circumstance prompting her speech.
- source_word: ἤρξατο πάλιν λέγειν
  chosen: began again to say
  alternatives:
  - began to say again
  - started again saying
  lexicon: BDAG
  rationale: This preserves both the ingressive force of ἤρξατο ('began') and the
    adverb πάλιν ('again'). 'Began again to say' is slightly more natural in English
    narrative than a more wooden ordering.
- source_word: τοῖς παρεστῶσιν
  chosen: to those standing nearby
  alternatives:
  - to the bystanders
  - to those standing there
  lexicon: BDAG
  rationale: The participle denotes people present/standing by. 'Those standing nearby'
    preserves the spatial sense more explicitly than the idiomatic 'bystanders,' while
    remaining readable.
- source_word: Οὗτος
  chosen: This man
  alternatives:
  - This one
  - This fellow
  lexicon: BDAG
  rationale: The demonstrative points directly to Peter. English commonly supplies
    'man' for naturalness in this accusatory context. 'This one' is more literal but
    less idiomatic; 'this fellow' adds a dismissive tone not required by the Greek.
- source_word: ἐξ αὐτῶν
  chosen: is one of them
  alternatives:
  - is from among them
  - belongs to them
  lexicon: BDAG
  rationale: The idiom means membership in the group associated with Jesus. 'Is one
    of them' is the clearest natural English equivalent.
