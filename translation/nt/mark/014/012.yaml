theological_decisions:
- issue: Reference of πάσχα in two occurrences within the verse
  chosen_reading: First occurrence rendered as 'Passover lamb' in the sacrificial
    clause; second occurrence rendered as 'the Passover' for the meal.
  alternative_readings:
  - Render both occurrences simply as 'Passover'
  - Render both as 'Passover lamb'
  rationale: The immediate verbal context controls the nuance. With θύω, the term
    points to the sacrificial victim; with φάγῃς, it points to the meal. This is a
    lexical-contextual decision, not a harmonization move, and preserves the narrative's
    cultic setting clearly in English.
  doctrine_reference: Translation philosophy §1, §5
