id: MRK.14.12
reference: Mark 14:12
source:
  edition: SBLGNT
  text: Καὶ τῇ πρώτῃ ἡμέρᾳ τῶν ἀζύμων, ὅτε τὸ πάσχα ἔθυον, λέγουσιν αὐτῷ οἱ μαθηταὶ
    αὐτοῦ· Ποῦ θέλεις ἀπελθόντες ἑτοιμάσωμεν ἵνα φάγῃς τὸ πάσχα;
translation:
  text: And on the first day of Unleavened Bread, when they were sacrificing the Passover
    lamb, his disciples said to him, “Where do you want us to go and prepare so that
    you may eat the Passover?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'when they sacrificed the Passover.' The Greek says 'the Passover,'
      which in this context likely refers to the Passover lamb being sacrificed.
    reason: lexical_alternative
lexical_decisions:
- source_word: τῇ πρώτῃ ἡμέρᾳ τῶν ἀζύμων
  chosen: on the first day of Unleavened Bread
  alternatives:
  - on the first day of the Feast of Unleavened Bread
  - on the first day of unleavened bread
  lexicon: BDAG
  rationale: A natural English rendering of the genitive construction. 'Unleavened
    Bread' is capitalized as the festal designation. 'Feast of' is interpretive and
    not explicit in the Greek, so it is left out of the main text.
- source_word: ὅτε τὸ πάσχα ἔθυον
  chosen: when they were sacrificing the Passover lamb
  alternatives:
  - when they sacrificed the Passover
  - when the Passover was being sacrificed
  lexicon: BDAG
  rationale: The imperfect ἔθυον is best represented as ongoing/customary past action,
    hence 'were sacrificing.' Although πάσχα can denote the Passover meal/feast broadly,
    with θύω ('sacrifice') the referent is specifically the sacrificial victim, so
    'Passover lamb' makes the sense explicit in idiomatic English.
- source_word: λέγουσιν
  chosen: said
  alternatives:
  - say
  lexicon: BDAG
  rationale: Greek often uses the historical present in narrative. English normally
    shifts this to simple past for readable narrative style.
- source_word: Ποῦ θέλεις
  chosen: Where do you want
  alternatives:
  - Where do you wish
  - Where are you willing
  lexicon: BDAG
  rationale: θέλω here expresses desire/intention. 'Want' is the most natural modern
    English equivalent.
- source_word: ἀπελθόντες
  chosen: us to go
  alternatives:
  - after going
  - having gone
  lexicon: BDAG
  rationale: 'The participle is subordinate to ἑτοιμάσωμεν and in English is best
    folded into the complementary infinitive construction: ''want us to go and prepare.''
    This preserves the sequence without wooden phrasing.'
- source_word: ἑτοιμάσωμεν
  chosen: prepare
  alternatives:
  - make preparations
  - get ready
  lexicon: BDAG
  rationale: Aorist subjunctive after θέλεις in an indirect deliberative/request context.
    'Prepare' is concise and fits the Passover setting.
- source_word: ἵνα φάγῃς τὸ πάσχα
  chosen: so that you may eat the Passover
  alternatives:
  - that you may eat the Passover
  - for you to eat the Passover
  lexicon: BDAG
  rationale: ἵνα introduces purpose. 'So that' makes the purpose relation explicit.
    πάσχα here refers to the Passover meal, not the sacrificial act, so it is rendered
    simply 'the Passover.'
