theological_decisions:
- issue: Resurrection wording in ἐγερθῆναί με
  chosen_reading: after I am raised up
  alternative_readings:
  - after I have been raised
  - after I rise
  rationale: The passive infinitive is retained to reflect the Greek form and to avoid
    importing an interpretive smoothing. This preserves the text's resurrection claim
    in language consistent with historic orthodoxy while staying close to the source.
  doctrine_reference: Affirmations; Translation philosophy §§1, 3
