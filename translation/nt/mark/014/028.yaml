id: MRK.14.28
reference: Mark 14:28
source:
  edition: SBLGNT
  text: ἀλλὰ μετὰ τὸ ἐγερθῆναί με προάξω ὑμᾶς εἰς τὴν Γαλιλαίαν.
translation:
  text: But after I am raised up, I will go ahead of you into Galilee.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'after I have been raised.' The Greek uses a passive infinitive of 'raise,'
      a common resurrection expression.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀλλὰ
  chosen: But
  alternatives:
  - Yet
  - However
  lexicon: BDAG
  rationale: Adversative conjunction marking contrast with the preceding prediction
    of scattering. 'But' is the most natural concise English equivalent here.
- source_word: μετὰ τὸ ἐγερθῆναί με
  chosen: after I am raised up
  alternatives:
  - after I have been raised
  - after my resurrection
  lexicon: BDAG
  rationale: The construction μετά + articular infinitive expresses temporal sequence,
    'after.' ἐγερθῆναί is aorist passive infinitive of ἐγείρω. 'Am raised up' preserves
    the passive form and resurrection sense without over-paraphrasing. 'After my resurrection'
    is smoother but less formally tied to the verbal expression.
- source_word: ἐγερθῆναί
  chosen: am raised up
  alternatives:
  - am raised
  - rise
  lexicon: BDAG
  rationale: The passive form is significant in resurrection contexts and should be
    preserved rather than converted to the intransitive 'rise.' 'Raised up' reflects
    common resurrection usage of ἐγείρω and retains the verbal imagery.
- source_word: προάξω
  chosen: I will go ahead of
  alternatives:
  - I will precede
  - I will go before
  - I will lead the way before
  lexicon: BDAG
  rationale: Future active of προάγω here indicates going before others to a destination.
    'Go ahead of' is idiomatic modern English and preserves the directional nuance
    better than the more formal 'precede.'
- source_word: ὑμᾶς
  chosen: you
  lexicon: BDAG
  rationale: Second person plural object. English 'you' is number-ambiguous, but no
    natural plural marker is needed in the main text.
- source_word: εἰς τὴν Γαλιλαίαν
  chosen: into Galilee
  alternatives:
  - to Galilee
  lexicon: BDAG
  rationale: εἰς normally marks movement into/toward. 'Into Galilee' is slightly more
    formally precise, though 'to Galilee' would also be acceptable idiomatic English.
