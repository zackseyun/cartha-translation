id: MRK.14.53
reference: Mark 14:53
source:
  edition: SBLGNT
  text: Καὶ ἀπήγαγον τὸν Ἰησοῦν πρὸς τὸν ἀρχιερέα, καὶ ⸀συνέρχονται πάντες οἱ ἀρχιερεῖς
    καὶ οἱ πρεσβύτεροι καὶ οἱ γραμματεῖς.
translation:
  text: And they led Jesus away to the high priest, and all the chief priests and
    the elders and the scribes gathered together.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''gather together'' (historical present), a vivid present-tense
      form within past narration.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπήγαγον
  chosen: led ... away
  alternatives:
  - took away
  - brought away
  lexicon: BDAG
  rationale: The verb ἀπάγω commonly means to lead or take away. 'Led ... away' is
    natural English and preserves the custodial sense without overinterpreting the
    manner.
- source_word: ἀρχιερέα
  chosen: the high priest
  alternatives:
  - the chief priest
  lexicon: BDAG
  rationale: Singular ἀρχιερεύς here refers to the presiding high priestly figure,
    not the broader group later in the verse. 'High priest' is the standard and clearest
    rendering in this context.
- source_word: συνέρχονται
  chosen: gathered together
  alternatives:
  - came together
  - assembled
  lexicon: BDAG
  rationale: Although the Greek shifts to a present tense ('they gather/come together'),
    English commonly smooths this historical present in narrative. 'Gathered together'
    conveys the collective assembly clearly and reads naturally alongside the surrounding
    past-tense narration.
- source_word: πάντες
  chosen: all
  alternatives:
  - all of them
  lexicon: BDAG
  rationale: πάντες emphasizes the comprehensiveness of the assembled leadership groups.
    'All' preserves that emphasis succinctly.
- source_word: ἀρχιερεῖς
  chosen: the chief priests
  alternatives:
  - the high priests
  lexicon: BDAG
  rationale: In the plural, ἀρχιερεῖς refers to the high-priestly leadership class,
    commonly rendered 'chief priests' in English. This avoids confusion with the singular
    office-holder already mentioned.
- source_word: πρεσβύτεροι
  chosen: the elders
  alternatives:
  - the older men
  lexicon: BDAG
  rationale: In this institutional setting, πρεσβύτεροι denotes recognized leaders,
    not merely older males. 'The elders' is the established and contextually accurate
    rendering.
- source_word: γραμματεῖς
  chosen: the scribes
  alternatives:
  - the teachers of the law
  lexicon: BDAG
  rationale: γραμματεῖς literally denotes scribes, and this term is both accurate
    and familiar in Gospel contexts. A more interpretive rendering like 'teachers
    of the law' is possible but narrower than the lexical form.
