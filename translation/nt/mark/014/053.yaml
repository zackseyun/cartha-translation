theological_decisions:
- issue: Historical present συνέρχονται in a past narrative
  chosen_reading: 'Rendered with English past tense: ''gathered together'''
  alternative_readings:
  - '''gather together'' to preserve the vivid historical present'
  rationale: This is a translation-philosophy decision rather than a doctrinal one.
    Optimal equivalence favors natural English narrative flow here while preserving
    the event sense. The historical present does not materially alter theology.
  doctrine_reference: 'Translation philosophy: optimal equivalence; readable modern
    English, not archaic or academic'
