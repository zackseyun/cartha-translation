id: MRK.14.40
reference: Mark 14:40
source:
  edition: SBLGNT
  text: καὶ ⸂πάλιν ἐλθὼν εὗρεν αὐτοὺς⸃ καθεύδοντας, ἦσαν γὰρ ⸂αὐτῶν οἱ ὀφθαλμοὶ⸃ ⸀καταβαρυνόμενοι,
    καὶ οὐκ ᾔδεισαν τί ⸂ἀποκριθῶσιν αὐτῷ⸃.
translation:
  text: And coming again, he found them sleeping, for their eyes were weighed down,
    and they did not know what they should answer him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'for their eyes were heavy.' The Greek image is that their eyes were
      being burdened or weighed down with sleep.
    reason: lexical_alternative
lexical_decisions:
- source_word: πάλιν
  chosen: again
  alternatives:
  - once more
  lexicon: BDAG
  rationale: Marks repeated action in the narrative; 'again' is the most natural concise
    English equivalent.
- source_word: ἐλθὼν
  chosen: coming
  alternatives:
  - having come
  - when he came
  lexicon: BDAG
  rationale: Aorist participle preceding the main verb. 'Coming' keeps the participial
    linkage in readable English without overformal stiffness.
- source_word: εὗρεν αὐτοὺς καθεύδοντας
  chosen: he found them sleeping
  alternatives:
  - he found them asleep
  lexicon: BDAG
  rationale: The participle καθεύδοντας is verbal ('sleeping'), and this rendering
    preserves the ongoing action more directly than the adjectival 'asleep.'
- source_word: ἦσαν γὰρ αὐτῶν οἱ ὀφθαλμοὶ καταβαρυνόμενοι
  chosen: for their eyes were weighed down
  alternatives:
  - for their eyes were heavy
  - for their eyes were being weighed down
  lexicon: BDAG
  rationale: This clause explains why they were sleeping. καταβαρυνόμενοι conveys
    being burdened or weighed down; 'were weighed down' is idiomatic and preserves
    the image better than the traditional but slightly interpretive 'were heavy.'
- source_word: οἱ ὀφθαλμοὶ
  chosen: eyes
  lexicon: BDAG
  rationale: Literal body-part reference; no reason to paraphrase.
- source_word: οὐκ ᾔδεισαν
  chosen: they did not know
  alternatives:
  - they did not understand
  lexicon: BDAG
  rationale: οἶδα here denotes knowledge rather than comprehension alone; 'did not
    know' is the straightforward rendering.
- source_word: τί ἀποκριθῶσιν αὐτῷ
  chosen: what they should answer him
  alternatives:
  - what they should reply to him
  - what to answer him
  lexicon: BDAG
  rationale: ἀποκριθῶσιν is aorist subjunctive in an indirect question after 'did
    not know.' 'What they should answer him' is natural English and preserves the
    sense of response directed to Jesus.
