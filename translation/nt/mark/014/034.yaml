id: MRK.14.34
reference: Mark 14:34
source:
  edition: SBLGNT
  text: καὶ λέγει αὐτοῖς· Περίλυπός ἐστιν ἡ ψυχή μου ἕως θανάτου· μείνατε ὧδε καὶ
    γρηγορεῖτε.
translation:
  text: And he says to them, “My soul is deeply grieved, even to death. Remain here
    and keep watch.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “very sorrowful” or “overwhelmed with sorrow.”
    reason: lexical_alternative
  - marker: b
    text: Or “to the point of death.”
    reason: lexical_alternative
  - marker: c
    text: Or “stay awake”; the command can include both literal wakefulness and vigilant
      watchfulness.
    reason: alternative_reading
lexical_decisions:
- source_word: λέγει
  chosen: he says
  alternatives:
  - he said
  lexicon: BDAG
  rationale: Rendered as present-tense historical present ('he says') to reflect Mark’s
    vivid narrative style rather than smoothing it into a simple past.
- source_word: Περίλυπός
  chosen: deeply grieved
  alternatives:
  - very sorrowful
  - overwhelmed with sorrow
  lexicon: BDAG
  rationale: The adjective denotes intense distress or sorrow. 'Deeply grieved' is
    natural modern English and preserves the emotional weight without sounding archaic.
- source_word: ψυχή
  chosen: soul
  alternatives:
  - self
  - life
  lexicon: BDAG
  rationale: Retained as 'soul' because the expression refers to Jesus’ inner life
    or whole person in anguish, and 'soul' preserves the traditional and theological
    depth of the term here better than the flatter 'self.'
- source_word: ἕως θανάτου
  chosen: even to death
  alternatives:
  - to the point of death
  - unto death
  lexicon: BDAG
  rationale: 'This idiom expresses extremity: sorrow so intense that it reaches the
    point of death. ''Even to death'' is concise, idiomatic, and preserves the force
    of the Greek.'
- source_word: μείνατε
  chosen: Remain
  alternatives:
  - stay
  lexicon: BDAG
  rationale: The aorist imperative calls for staying in place. 'Remain' fits the solemn
    tone slightly better than 'stay' while remaining clear.
- source_word: ὧδε
  chosen: here
  alternatives:
  - in this place
  lexicon: BDAG
  rationale: Simple locative adverb best rendered by the natural English 'here.'
- source_word: γρηγορεῖτε
  chosen: keep watch
  alternatives:
  - stay awake
  - be watchful
  - watch
  lexicon: BDAG
  rationale: In context Jesus is exhorting the disciples to vigilant wakefulness in
    prayerful alertness. 'Keep watch' captures both wakefulness and vigilance better
    than the narrower 'stay awake.'
