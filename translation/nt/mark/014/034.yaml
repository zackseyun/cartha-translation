theological_decisions:
- issue: Rendering ψυχή in Jesus' statement
  chosen_reading: soul
  alternative_readings:
  - self
  - life
  rationale: The verse depicts the true human anguish of Jesus without diminishing
    his full humanity or importing later doctrinal explanation. 'Soul' best preserves
    the anthropological and emotional depth of the Greek while remaining within orthodox
    Christological bounds.
  doctrine_reference: 'Affirmations: Chalcedon (451 AD, on the two natures of Christ)'
- issue: Force of γρηγορεῖτε
  chosen_reading: keep watch
  alternative_readings:
  - stay awake
  rationale: The command likely includes literal wakefulness, but in this context
    it also carries the broader sense of spiritual vigilance. The translation preserves
    that tension rather than reducing it to mere physical sleeplessness.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it'
