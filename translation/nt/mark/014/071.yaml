theological_decisions:
- issue: Nature of Peter's self-imprecation in ἀναθεματίζειν
  chosen_reading: Render the action as invoking curses without specifying that Peter
    cursed Jesus or explicitly cursed himself.
  alternative_readings:
  - He began to curse
  - He began to invoke a curse on himself
  rationale: The context is Peter's intensified denial, and the verb can imply self-imprecation
    in oath contexts. However, the Greek text does not explicitly identify the object
    of the curse. To avoid importing a more specific claim than the text states, the
    main text preserves the broader sense 'call down curses,' while alternatives are
    documented in a footnote.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Preserve theological tension rather than resolve it.'
