id: MRK.14.71
reference: Mark 14:71
source:
  edition: SBLGNT
  text: ὁ δὲ ἤρξατο ἀναθεματίζειν καὶ ὀμνύναι ὅτι Οὐκ οἶδα τὸν ἄνθρωπον τοῦτον ὃν
    λέγετε.
translation:
  text: But he began to call down curses and to swear, “I do not know this man you
    are talking about.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to curse'; possibly 'to invoke a curse on himself.' The Greek does not
      explicitly state the object of the curse.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἤρξατο
  chosen: began
  alternatives:
  - started
  lexicon: BDAG
  rationale: The ingressive sense of ἄρχω with complementary infinitives is naturally
    rendered 'began.' 'Started' is possible but slightly less idiomatic in this solemn
    narrative context.
- source_word: ἀναθεματίζειν
  chosen: to call down curses
  alternatives:
  - to curse
  - to invoke a curse on himself
  lexicon: BDAG
  rationale: The verb denotes invoking a curse, not merely using profanity. 'Call
    down curses' preserves the force without over-specifying the exact object of the
    curse. 'Invoke a curse on himself' is a plausible contextual interpretation, but
    the Greek does not explicitly state 'on himself,' so that is not placed in the
    main text.
- source_word: ὀμνύναι
  chosen: to swear
  alternatives:
  - to take an oath
  - to swear an oath
  lexicon: BDAG
  rationale: The verb means to swear or take an oath. 'To swear' is concise and idiomatic,
    while still conveying formal oath-language rather than vulgar speech.
- source_word: ὅτι
  chosen: “
  alternatives:
  - that
  lexicon: BDAG
  rationale: Here ὅτι introduces the content of Peter's oath and denial. In English,
    direct quotation is the most natural way to render this content clause.
- source_word: οὐκ οἶδα
  chosen: I do not know
  alternatives:
  - I do not recognize
  lexicon: BDAG
  rationale: The standard sense is 'I do not know.' While contextually it implies
    disavowal of association or recognition, 'know' best matches the Greek and preserves
    the starkness of the denial.
- source_word: τὸν ἄνθρωπον τοῦτον
  chosen: this man
  alternatives:
  - the man
  - this fellow
  lexicon: BDAG
  rationale: The demonstrative τοῦτον adds deictic force, so 'this man' is preferable
    to simply 'the man.' 'This fellow' would add a dismissive tone not required by
    the Greek.
- source_word: ὃν λέγετε
  chosen: you are talking about
  alternatives:
  - whom you speak of
  - whom you mention
  - the one you are talking about
  lexicon: BDAG
  rationale: λέγετε here refers to the person the bystanders are mentioning. 'You
    are talking about' is natural modern English and accurately conveys the reference.
    A more formal 'whom you speak of' is possible but less readable.
- source_word: ὁ δὲ
  chosen: But he
  alternatives:
  - And he
  - Then he
  lexicon: BDAG
  rationale: δέ marks narrative development with mild contrast. 'But he' fits the
    escalation from the previous accusation and denial.
