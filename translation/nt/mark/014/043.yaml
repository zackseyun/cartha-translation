theological_decisions:
- issue: Rendering the historical present παραγίνεται
  chosen_reading: Translate as simple past ('arrived') in English narrative
  alternative_readings:
  - retain present tense ('comes') to mirror Greek vividness
  rationale: The Greek historical present heightens vividness, but idiomatic modern
    English usually prefers past tense in this narrative setting. This is a stylistic
    translation decision, not a theological one, but it affects how the scene is perceived.
  doctrine_reference: 'Translation philosophy: optimal equivalence; readable modern
    English, not archaic or academic.'
- issue: Force of παρὰ with the governing authorities
  chosen_reading: Render as 'from the chief priests and the scribes and the elders'
  alternative_readings:
  - '''sent by the chief priests and the scribes and the elders'''
  rationale: The text identifies the crowd's source/authorization without explicitly
    stating the mechanics of dispatch. The translation preserves that institutional
    connection without adding unstated detail.
  doctrine_reference: 'Translation philosophy: Never paraphrase beyond what the source
    text warrants; preserve the source''s plain sense.'
