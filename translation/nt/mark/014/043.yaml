id: MRK.14.43
reference: Mark 14:43
source:
  edition: SBLGNT
  text: Καὶ ⸀εὐθὺς ἔτι αὐτοῦ λαλοῦντος παραγίνεται ⸀Ἰούδας ⸀εἷς τῶν δώδεκα καὶ μετ’
    αὐτοῦ ⸀ὄχλος μετὰ μαχαιρῶν καὶ ξύλων παρὰ τῶν ἀρχιερέων καὶ τῶν γραμματέων καὶ
    τῶν πρεσβυτέρων.
translation:
  text: And immediately, while he was still speaking, Judas arrived, one of the Twelve,
    and with him a crowd with swords and clubs, from the chief priests and the scribes
    and the elders.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'came' for 'arrived'; the Greek uses a historical present ('comes') for
      vividness.
    reason: lexical_alternative
  - marker: b
    text: Or 'mob' for 'crowd'; the Greek word itself means 'crowd,' though the context
      is hostile.
    reason: lexical_alternative
  - marker: c
    text: Literally 'wood'; here it refers to clubs or cudgels used as weapons.
    reason: lexical_alternative
  - marker: d
    text: Or 'sent by'; the Greek more literally says the crowd came 'from' the chief
      priests, scribes, and elders, indicating source or authorization.
    reason: alternative_reading
lexical_decisions:
- source_word: εὐθὺς
  chosen: immediately
  alternatives:
  - at once
  - right away
  lexicon: BDAG
  rationale: Marks the suddenness and urgency typical of Mark's narrative style. 'Immediately'
    is natural modern English and preserves the temporal force.
- source_word: ἔτι αὐτοῦ λαλοῦντος
  chosen: while he was still speaking
  alternatives:
  - while he was yet speaking
  - while he was still talking
  lexicon: BDAG
  rationale: Genitive absolute indicating contemporaneous action. 'Speaking' is slightly
    more formal and fits the narrative register better than 'talking.' 'Still' renders
    ἔτι.
- source_word: παραγίνεται
  chosen: arrived
  alternatives:
  - came
  - appeared
  - came up
  lexicon: BDAG
  rationale: Historical present in Greek is rendered with simple past in idiomatic
    English narrative. 'Arrived' conveys the sense of coming on the scene without
    sounding wooden.
- source_word: Ἰούδας
  chosen: Judas
  rationale: Personal name transliterated according to standard English convention,
    following the translation philosophy to transliterate names.
- source_word: εἷς τῶν δώδεκα
  chosen: one of the Twelve
  alternatives:
  - one of the twelve disciples
  lexicon: BDAG
  rationale: Keeps the compact, recognized designation used in the Greek. 'The Twelve'
    functions as a quasi-title for Jesus' inner apostolic group; adding 'disciples'
    would be interpretive expansion beyond the text.
- source_word: ὄχλος
  chosen: a crowd
  alternatives:
  - a mob
  - a multitude
  lexicon: BDAG
  rationale: ὄχλος commonly means 'crowd.' 'Mob' would front-load a more hostile nuance
    than the noun itself requires, though the context is hostile. 'Crowd' preserves
    the lexical sense and lets the surrounding details convey menace.
- source_word: μετὰ μαχαιρῶν
  chosen: with swords
  alternatives:
  - with short swords
  - with knives
  lexicon: BDAG
  rationale: μάχαιρα can denote a sword or dagger/short sword, but 'swords' is the
    standard and sufficiently precise rendering in this arrest context.
- source_word: ξύλων
  chosen: clubs
  alternatives:
  - sticks
  - wooden clubs
  lexicon: BDAG
  rationale: ξύλα literally means 'wooden objects/wood,' but in this context refers
    to cudgels or clubs carried as weapons. 'Clubs' gives the contextual sense without
    unnecessary literal awkwardness.
- source_word: παρὰ τῶν ἀρχιερέων καὶ τῶν γραμματέων καὶ τῶν πρεσβυτέρων
  chosen: from the chief priests and the scribes and the elders
  alternatives:
  - sent by the chief priests and the scribes and the elders
  lexicon: BDAG
  rationale: 'παρά with genitive here indicates source/origin: the crowd came from,
    i.e., under the authority of, these leaders. ''From'' is the most direct rendering;
    ''sent by'' is interpretive and stronger than the preposition alone warrants.'
- source_word: ἀρχιερέων
  chosen: chief priests
  alternatives:
  - high priests
  lexicon: BDAG
  rationale: Plural ἀρχιερεῖς in the Gospels refers to the chief-priestly leadership
    class, not multiple acting high priests simultaneously. 'Chief priests' is the
    established and accurate rendering.
- source_word: γραμματέων
  chosen: scribes
  alternatives:
  - teachers of the law
  lexicon: BDAG
  rationale: '''Scribes'' is the direct lexical equivalent. ''Teachers of the law''
    is explanatory and broader than the term itself.'
- source_word: πρεσβυτέρων
  chosen: elders
  alternatives:
  - leaders
  - council elders
  lexicon: BDAG
  rationale: In this institutional context, πρεσβύτεροι refers to recognized Jewish
    leaders. 'Elders' is the standard direct rendering and preserves the socio-political
    nuance.
