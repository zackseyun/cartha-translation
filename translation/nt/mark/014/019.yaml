id: MRK.14.19
reference: Mark 14:19
source:
  edition: SBLGNT
  text: ⸀ἤρξαντο λυπεῖσθαι καὶ λέγειν αὐτῷ εἷς κατὰ εἷς· Μήτι ⸀ἐγώ;
translation:
  text: They began to be grieved and to say to him, one by one, “Surely not I?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, “Is it not I?” The Greek question uses μήτι, which expects
      a negative answer.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἤρξαντο
  chosen: They began
  alternatives:
  - They started
  lexicon: BDAG
  rationale: Aorist middle of ἄρχω with complementary infinitives λυπεῖσθαι and λέγειν
    marks the inception of the actions. 'Began' is the standard, natural English rendering.
- source_word: λυπεῖσθαι
  chosen: to be grieved
  alternatives:
  - to be sorrowful
  - to be distressed
  lexicon: BDAG
  rationale: The infinitive denotes becoming sorrowful or distressed. 'Be grieved'
    preserves the passive/inchoative sense and fits the solemn context better than
    the more generic 'be sad'.
- source_word: καὶ λέγειν
  chosen: and to say
  alternatives:
  - and to ask
  lexicon: BDAG
  rationale: λέγω is broadly 'say/speak.' Although the content is interrogative, the
    Greek verb itself is not specifically 'ask,' so 'say' better reflects the source
    while remaining natural in English.
- source_word: αὐτῷ
  chosen: to him
  alternatives:
  - to Jesus
  lexicon: BDAG
  rationale: The pronoun refers to Jesus from context, but the Greek uses a pronoun,
    so 'to him' preserves the discourse form without unnecessary explicitation.
- source_word: εἷς κατὰ εἷς
  chosen: one by one
  alternatives:
  - one after another
  - each one in turn
  lexicon: BDAG
  rationale: This distributive expression indicates sequential individual responses.
    'One by one' is concise, idiomatic, and accurate.
- source_word: Μήτι ἐγώ;
  chosen: Surely not I?
  alternatives:
  - Is it not I?
  - It is not I, is it?
  - Surely I am not the one?
  lexicon: BDAG
  rationale: μήτι introduces a question expecting a negative answer. 'Surely not I?'
    captures both the elliptical Greek and the expectation of denial in natural English.
    The fuller alternative 'Surely I am not the one?' is interpretive and slightly
    expands the text.
