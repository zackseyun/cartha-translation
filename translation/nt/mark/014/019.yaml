theological_decisions:
- issue: Force of the disciples' question
  chosen_reading: 'Render the question as expecting a negative answer: ''Surely not
    I?'''
  alternative_readings:
  - '''Is it I?'''
  rationale: The particle μήτι signals that the speaker expects the answer 'no.' Translating
    merely 'Is it I?' loses this nuance and flattens the emotional force of protest
    or alarm present in the Greek.
  doctrine_reference: Translation philosophy §1, §3
