id: MRK.14.65
reference: Mark 14:65
source:
  edition: SBLGNT
  text: καὶ ἤρξαντό τινες ἐμπτύειν αὐτῷ καὶ περικαλύπτειν ⸂αὐτοῦ τὸ πρόσωπον⸃ καὶ
    κολαφίζειν αὐτὸν καὶ λέγειν αὐτῷ· Προφήτευσον, καὶ οἱ ὑπηρέται ῥαπίσμασιν αὐτὸν
    ⸀ἔλαβον.
translation:
  text: And some began to spit on him, and to cover his face, and to strike him with
    their fists, and to say to him, “Prophesy!” And the officers received him with
    blows.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'blindfold him.' The Greek literally says 'cover his face.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the guards struck him' / 'they took him with blows.' The Greek expression
      is literally 'the officers received him with blows.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἤρξαντό
  chosen: began
  alternatives:
  - started
  lexicon: BDAG
  rationale: The ingressive sense of ἄρχομαι + infinitive is naturally rendered 'began'
    in English and preserves the narrative progression.
- source_word: τινες
  chosen: some
  alternatives:
  - certain ones
  - some people
  lexicon: BDAG
  rationale: Indefinite plural referring to unspecified members of the group; 'some'
    is concise and natural.
- source_word: ἐμπτύειν αὐτῷ
  chosen: to spit on him
  alternatives:
  - to spit at him
  lexicon: BDAG
  rationale: The dative with ἐμπτύω is idiomatically rendered 'spit on him,' expressing
    direct insult and abuse.
- source_word: περικαλύπτειν αὐτοῦ τὸ πρόσωπον
  chosen: to cover his face
  alternatives:
  - to blindfold him
  - to veil his face
  lexicon: BDAG
  rationale: The Greek says literally 'cover his face.' Although the action likely
    functioned as a blindfolding, 'cover his face' stays closer to the wording while
    remaining clear. The more interpretive 'blindfold him' is preserved in a footnote
    as a lexical alternative.
- source_word: κολαφίζειν αὐτὸν
  chosen: to strike him with their fists
  alternatives:
  - to beat him
  - to punch him
  lexicon: BDAG
  rationale: κολαφίζω commonly denotes striking with the fist. 'Strike him with their
    fists' preserves that more specific force better than the broader 'beat him.'
- source_word: λέγειν αὐτῷ· Προφήτευσον
  chosen: to say to him, “Prophesy!”
  alternatives:
  - to tell him, 'Prophesy!'
  lexicon: BDAG
  rationale: A direct imperative taunt. 'Prophesy!' preserves the mocking demand without
    adding explanatory material into the main text.
- source_word: ὑπηρέται
  chosen: the officers
  alternatives:
  - the attendants
  - the guards
  - the servants
  lexicon: BDAG
  rationale: In this judicial setting, ὑπηρέται refers to subordinate officials/guards
    rather than domestic servants. 'Officers' best captures their institutional role
    in readable modern English.
- source_word: ῥαπίσμασιν
  chosen: with blows
  alternatives:
  - with slaps
  - with strikes
  lexicon: BDAG
  rationale: The dative is instrumental. ῥάπισμα can denote a blow, often with the
    hand or rod. 'With blows' is broad enough to avoid overprecision while preserving
    the physical abuse.
- source_word: ἔλαβον
  chosen: received him
  alternatives:
  - took him
  - handled him
  lexicon: BDAG
  rationale: The idiom ῥαπίσμασιν αὐτὸν ἔλαβον is traditionally rendered 'received
    him with blows.' While less idiomatic in contemporary English, it closely reflects
    the Greek construction and preserves the vivid, contemptuous sense. A more idiomatic
    alternative is preserved in a footnote.
