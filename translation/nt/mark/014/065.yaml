theological_decisions:
- issue: Rendering of the mock command Προφήτευσον in context of Jesus' identity
  chosen_reading: Prophesy!
  alternative_readings:
  - Prophesy to us!
  - Show that you are a prophet!
  rationale: The text presents a taunt during Jesus' abuse, but it does not explicitly
    expand the mockery. The translation preserves the bare imperative without importing
    explanatory wording, thus retaining the narrative irony without adding doctrinal
    interpretation.
  doctrine_reference: Preserve theological tension rather than resolve it.
