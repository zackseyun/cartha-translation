id: MRK.14.59
reference: Mark 14:59
source:
  edition: SBLGNT
  text: καὶ οὐδὲ οὕτως ἴση ἦν ἡ μαρτυρία αὐτῶν.
translation:
  text: And not even in this way was their testimony consistent.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'was not in agreement,' or more literally, 'was not equal.'
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ
  chosen: And
  alternatives:
  - Even
  - Also
  lexicon: BDAG
  rationale: Standard connective linking this statement to the preceding account of
    conflicting witness testimony. 'And' preserves the narrative flow without adding
    emphasis not explicit in the Greek.
- source_word: οὐδὲ
  chosen: not even
  alternatives:
  - nor
  - and not
  lexicon: BDAG
  rationale: οὐδὲ adds emphatic negation. 'Not even' captures the force better in
    English than a bare 'nor' in this sentence structure.
- source_word: οὕτως
  chosen: in this way
  alternatives:
  - thus
  - so
  lexicon: BDAG
  rationale: Refers back to the immediately preceding form of accusation/testimony.
    'In this way' is natural modern English and preserves the demonstrative sense
    better than the more ambiguous 'so'.
- source_word: ἴση
  chosen: consistent
  alternatives:
  - equal
  - the same
  - in agreement
  lexicon: BDAG
  rationale: Literally 'equal,' but in context of multiple witnesses/testimonies the
    sense is that their testimony did not match or agree. 'Consistent' communicates
    the idiomatic force in readable English while staying close to the legal context.
- source_word: ἦν
  chosen: was
  lexicon: BDAG
  rationale: Imperfect of εἰμί rendered with simple past in English, which is idiomatic
    here and sufficient for the narrative statement.
- source_word: ἡ μαρτυρία
  chosen: their testimony
  alternatives:
  - the testimony
  - their witness
  lexicon: BDAG
  rationale: μαρτυρία in this judicial context refers to witness testimony. Although
    the Greek has the singular with article ('the testimony'), English naturally expresses
    the collective sense as 'their testimony' when followed by αὐτῶν.
- source_word: αὐτῶν
  chosen: their
  alternatives:
  - of them
  lexicon: BDAG
  rationale: Genitive plural possessive, naturally rendered 'their' in English.
