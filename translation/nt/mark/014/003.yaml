id: MRK.14.3
reference: Mark 14:3
source:
  edition: SBLGNT
  text: Καὶ ὄντος αὐτοῦ ἐν Βηθανίᾳ ἐν τῇ οἰκίᾳ Σίμωνος τοῦ λεπροῦ κατακειμένου αὐτοῦ
    ἦλθεν γυνὴ ἔχουσα ἀλάβαστρον μύρου νάρδου πιστικῆς πολυτελοῦς· ⸀συντρίψασα ⸀τὴν
    ἀλάβαστρον κατέχεεν ⸀αὐτοῦ τῆς κεφαλῆς.
translation:
  text: And while he was in Bethany, reclining at the house of Simon the leper, a
    woman came with an alabaster jar of very expensive pure nard perfume; she broke
    the jar and poured it on his head.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'genuine nard'; the adjective translated 'pure' (πιστικῆς) is debated.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὄντος αὐτοῦ ... κατακειμένου αὐτοῦ
  chosen: while he was ... reclining
  alternatives:
  - as he was ... reclining
  - when he was ... reclining
  lexicon: BDAG
  rationale: The genitive absolute sets the scene circumstantially. 'While he was
    ... reclining' is natural English and preserves the ongoing background sense better
    than a more wooden repetition.
- source_word: Βηθανίᾳ
  chosen: Bethany
  rationale: Standard transliteration of the place name.
- source_word: οἰκίᾳ Σίμωνος τοῦ λεπροῦ
  chosen: the house of Simon the leper
  alternatives:
  - Simon the former leper
  lexicon: BDAG
  rationale: The Greek apposition literally identifies Simon as 'the leper.' English
    should preserve the source wording rather than infer 'former,' since the text
    itself does not state that qualification.
- source_word: γυνὴ
  chosen: a woman
  lexicon: BDAG
  rationale: Indefinite in context; no identifying detail is supplied in Mark at this
    point.
- source_word: ἀλάβαστρον
  chosen: an alabaster jar
  alternatives:
  - an alabaster flask
  - an alabaster vial
  lexicon: BDAG
  rationale: The noun can denote an alabaster container, not necessarily the stone
    material alone. 'Jar' is clear modern English; the repeated second occurrence
    is likewise rendered 'the jar' for coherence.
- source_word: μύρου
  chosen: perfume
  alternatives:
  - ointment
  - fragrant oil
  lexicon: BDAG
  rationale: μύρον refers to perfumed ointment/oil. 'Perfume' communicates the costly
    fragrant substance naturally in modern English without over-specifying texture.
- source_word: νάρδου
  chosen: nard
  alternatives:
  - spikenard
  lexicon: BDAG
  rationale: '''Nard'' is concise modern English for the aromatic substance; ''spikenard''
    is traditional but less common. The specific plant-derived perfume should be retained
    rather than generalized away.'
- source_word: πιστικῆς
  chosen: pure
  alternatives:
  - genuine
  - liquid
  lexicon: BDAG
  rationale: πιστικός is notoriously difficult. 'Pure' is a common and contextually
    fitting rendering, yielding 'pure nard' in line with the sense of genuineness/authenticity.
    Because the term is debated, alternatives are preserved in a footnote.
- source_word: πολυτελοῦς
  chosen: very expensive
  alternatives:
  - costly
  - precious
  lexicon: BDAG
  rationale: The adjective denotes high value/cost. 'Very expensive' is idiomatic
    modern English and makes explicit the economic force that motivates the later
    reaction in context.
- source_word: συντρίψασα τὴν ἀλάβαστρον
  chosen: she broke the jar
  alternatives:
  - having broken the jar
  - she shattered the jar
  lexicon: BDAG
  rationale: The participle is antecedent to the main verb and indicates breaking
    the container before pouring. English can coordinate the actions smoothly as narrative
    sequence. 'Broke' is sufficient without overstating the violence.
- source_word: κατέχεεν αὐτοῦ τῆς κεφαλῆς
  chosen: poured it on his head
  alternatives:
  - poured it over his head
  lexicon: BDAG
  rationale: The verb means to pour down/upon. 'On his head' is straightforward and
    idiomatic; 'over' is possible but not necessary.
