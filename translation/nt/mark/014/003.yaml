theological_decisions:
- issue: Whether to soften 'Simon the leper' to avoid implying ritual uncleanness
    or active disease
  chosen_reading: Retain 'Simon the leper' in the main text
  alternative_readings:
  - Simon the former leper
  rationale: The text gives the designation without explanation. Adding 'former' imports
    an inference, however plausible historically, and exceeds the source. This follows
    the translation philosophy of original-language primacy and not importing claims
    the text does not make.
  doctrine_reference: Translation philosophy §1, §3
