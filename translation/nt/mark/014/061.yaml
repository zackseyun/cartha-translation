id: MRK.14.61
reference: Mark 14:61
source:
  edition: SBLGNT
  text: ὁ δὲ ἐσιώπα καὶ ⸂οὐκ ἀπεκρίνατο οὐδέν⸃. πάλιν ὁ ἀρχιερεὺς ἐπηρώτα αὐτὸν καὶ
    λέγει αὐτῷ· Σὺ εἶ ὁ χριστὸς ὁ υἱὸς τοῦ εὐλογητοῦ;
translation:
  text: But he kept silent and answered nothing. Again the high priest questioned
    him and says to him, “Are you the Messiah, the Son of the Blessed One?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Christ.” The Greek title is Χριστός (Christos), here rendered “Messiah”
      because it functions as a title in a Jewish messianic context.
    reason: alternative_reading
  - marker: b
    text: “The Blessed One” is a reverential Jewish way of referring to God.
    reason: cultural_note
lexical_decisions:
- source_word: ἐσιώπα
  chosen: kept silent
  alternatives:
  - was silent
  - remained silent
  lexicon: BDAG
  rationale: Imperfect tense conveys continued silence rather than a punctiliar act;
    'kept silent' captures the ongoing aspect in natural English.
- source_word: ἀπεκρίνατο οὐδέν
  chosen: answered nothing
  alternatives:
  - made no answer
  - did not answer anything
  lexicon: BDAG
  rationale: This is a natural English rendering of the negated middle verb with οὐδέν.
    'Answered nothing' preserves the emphatic totality without sounding archaic.
- source_word: πάλιν
  chosen: Again
  alternatives:
  - once more
  lexicon: BDAG
  rationale: Marks repetition of the high priest's questioning; 'Again' is concise
    and idiomatic.
- source_word: ἀρχιερεὺς
  chosen: high priest
  lexicon: BDAG
  rationale: Standard and precise rendering for the Jewish chief priestly office in
    this trial context.
- source_word: ἐπηρώτα
  chosen: questioned
  alternatives:
  - asked
  - interrogated
  lexicon: BDAG
  rationale: The imperfect indicates repeated or continued questioning. 'Questioned'
    fits the judicial setting better than the simpler 'asked' while avoiding overstatement.
- source_word: λέγει
  chosen: says
  alternatives:
  - said
  lexicon: BDAG
  rationale: Mark frequently uses the historical present for vivid narration. Rendering
    it as 'says' preserves Mark's style, even following past-tense verbs.
- source_word: χριστός
  chosen: Messiah
  alternatives:
  - Christ
  lexicon: BDAG
  rationale: Per doctrine, Χριστός as a title is rendered 'Messiah' rather than 'Christ'
    to preserve the Hebraic messianic sense in the high priest's question.
- source_word: ὁ υἱὸς τοῦ εὐλογητοῦ
  chosen: the Son of the Blessed One
  alternatives:
  - the Son of the Blessed
  - the Son of God
  lexicon: BDAG
  rationale: The genitive τοῦ εὐλογητοῦ is a reverential circumlocution for God. 'The
    Blessed One' preserves the Jewish idiom and the indirectness of the expression
    better than replacing it in the main text with 'God'.
