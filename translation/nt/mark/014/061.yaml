theological_decisions:
- issue: Rendering of Χριστός in a direct messianic title
  chosen_reading: Messiah
  alternative_readings:
  - Christ
  rationale: The term functions here as a title in a Jewish trial setting, not as
    a name-like designation. Following the stated doctrine, 'Messiah' best preserves
    the source meaning and context.
  doctrine_reference: 'DOCTRINE.md: Contested terms — Χριστός default ''Messiah''
    where title; Translation philosophy §2'
- issue: Rendering of τοῦ εὐλογητοῦ
  chosen_reading: the Blessed One
  alternative_readings:
  - God
  - the Blessed
  rationale: The phrase is a reverential substitute for the divine name/title. Preserving
    the circumlocution avoids flattening the Jewish courtroom context and lets the
    text retain its theological and cultural texture without adding explicit wording
    not present in Greek.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §1, §6'
