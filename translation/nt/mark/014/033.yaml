theological_decisions:
- issue: Rendering Jesus' emotional state in Gethsemane
  chosen_reading: 'Translate the two verbs straightforwardly as real, intense human
    distress: ''deeply distressed and troubled.'''
  alternative_readings:
  - Use milder language such as 'amazed and troubled'
  - Use stronger interpretive language such as 'horrified and anguished'
  rationale: The verse presents Jesus experiencing profound emotional turmoil. In
    line with Chalcedonian orthodoxy, the translation should neither mute his true
    humanity nor import speculative theological explanation beyond the text. The chosen
    wording preserves the gravity of the scene while remaining lexically defensible.
  doctrine_reference: 'Affirmations: Definition of Chalcedon (451 AD); Translation
    philosophy §3 preserve theological tension rather than resolve it'
