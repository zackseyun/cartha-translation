id: MRK.14.33
reference: Mark 14:33
source:
  edition: SBLGNT
  text: καὶ παραλαμβάνει τὸν Πέτρον καὶ ⸂Ἰάκωβον καὶ⸃ Ἰωάννην μετ’ ⸀αὐτοῦ, καὶ ἤρξατο
    ἐκθαμβεῖσθαι καὶ ἀδημονεῖν,
translation:
  text: And he takes Peter and James and John with him, and he began to be deeply
    distressed and troubled,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'began to be greatly alarmed and troubled.' The first verb can denote
      intense alarm, shock, or distress in this context.
    reason: lexical_alternative
lexical_decisions:
- source_word: παραλαμβάνει
  chosen: takes
  alternatives:
  - takes along
  - brings with him
  lexicon: BDAG
  rationale: Present-tense historical narrative is commonly rendered in English with
    a vivid present. 'Takes' is concise and natural, while still reflecting the sense
    of taking selected companions along.
- source_word: μετ’ αὐτοῦ
  chosen: with him
  alternatives:
  - along with him
  lexicon: BDAG
  rationale: Standard rendering of μετά with the genitive. It clarifies that Peter,
    James, and John accompany Jesus.
- source_word: ἤρξατο
  chosen: he began
  alternatives:
  - he started
  lexicon: BDAG
  rationale: The ingressive force of ἄρχομαι with infinitives is preserved by 'began.'
    This keeps the narrative development explicit rather than smoothing it away.
- source_word: ἐκθαμβεῖσθαι
  chosen: to be deeply distressed
  alternatives:
  - to be greatly alarmed
  - to be overwhelmed with horror
  - to be astonished
  lexicon: BDAG
  rationale: In this Gethsemane context, the verb conveys intense emotional shock
    or distress rather than mere amazement. 'Deeply distressed' communicates the severity
    in idiomatic modern English without over-paraphrasing.
- source_word: ἀδημονεῖν
  chosen: troubled
  alternatives:
  - anguished
  - in great distress
  - heavy with sorrow
  lexicon: BDAG
  rationale: The verb denotes acute inner distress or anguish. 'Troubled' is readable
    and pairs well with 'deeply distressed,' preserving the twofold expression without
    collapsing them into one term. Stronger alternatives are possible, but this choice
    avoids overstating beyond the lexical warrant while keeping the emotional weight.
- source_word: καὶ ... καὶ
  chosen: and ... and
  lexicon: N/A
  rationale: The repeated conjunctions are retained to reflect Mark's paratactic style
    and the cumulative movement of the scene.
