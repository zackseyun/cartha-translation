id: MRK.14.30
reference: Mark 14:30
source:
  edition: SBLGNT
  text: καὶ λέγει αὐτῷ ὁ Ἰησοῦς· Ἀμὴν λέγω σοι ὅτι σὺ σήμερον ⸂ταύτῃ τῇ νυκτὶ⸃ πρὶν
    ἢ δὶς ἀλέκτορα φωνῆσαι τρίς ⸂με ἀπαρνήσῃ⸃.
translation:
  text: And Jesus says to him, “Truly I tell you, you today, this very night, before
    a rooster crows twice, will deny me three times.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'before a rooster crow twice, you will deny me three
      times.'
    reason: lexical_alternative
lexical_decisions:
- source_word: λέγει
  chosen: says
  alternatives:
  - said
  lexicon: BDAG
  rationale: Rendered as present-tense 'says' to reflect Mark's historical present,
    preserving the narrative vividness of the Greek rather than smoothing to English
    past tense.
- source_word: Ἀμὴν
  chosen: Truly
  alternatives:
  - Amen
  - Truly, truly
  lexicon: BDAG
  rationale: In Gospel speech introductions, ἀμήν functions as a solemn affirmation.
    'Truly' communicates the force in natural English better than leaving it untranslated
    as 'Amen' here.
- source_word: λέγω σοι
  chosen: I tell you
  alternatives:
  - I say to you
  lexicon: BDAG
  rationale: '''I tell you'' is a natural modern-English rendering that preserves
    the direct address and solemn declaration without unnecessary stiffness.'
- source_word: σὺ
  chosen: you
  lexicon: BDAG
  rationale: 'The explicit pronoun is retained in translation for emphasis, since
    Greek includes σὺ overtly. English reflects this by placing ''you'' prominently:
    ''you today, this very night...''.'
- source_word: σήμερον
  chosen: today
  alternatives:
  - this day
  lexicon: BDAG
  rationale: The adverb means 'today.' It is retained alongside 'this very night'
    because both appear in the Greek and together intensify the immediacy of the prediction.
- source_word: ταύτῃ τῇ νυκτί
  chosen: this very night
  alternatives:
  - this night
  - on this night
  lexicon: BDAG
  rationale: The demonstrative plus dative noun is emphatic. 'This very night' captures
    the force more naturally than the somewhat archaic 'this night'.
- source_word: πρὶν ἢ
  chosen: before
  alternatives:
  - before that
  lexicon: BDAG
  rationale: Standard temporal conjunction introducing the event that will precede
    Peter's denial.
- source_word: δὶς
  chosen: twice
  lexicon: BDAG
  rationale: Direct rendering of the adverb; significant because Mark's wording specifies
    two rooster crows.
- source_word: ἀλέκτορα φωνῆσαι
  chosen: a rooster crows
  alternatives:
  - the rooster crows
  - a cock crows
  lexicon: BDAG
  rationale: Rendered idiomatically in English as 'a rooster crows.' The Greek infinitive
    construction after πρὶν ἢ is naturally expressed with a finite verb in English.
    'Rooster' is preferred over archaic 'cock' for modern readability.
- source_word: τρίς
  chosen: three times
  lexicon: BDAG
  rationale: Direct rendering of the adverb, preserving the numerical contrast with
    'twice' earlier in the sentence.
- source_word: με ἀπαρνήσῃ
  chosen: will deny me
  alternatives:
  - will disown me
  lexicon: BDAG
  rationale: Future middle verb meaning to deny or repudiate. 'Deny me' is the standard
    and clearest English equivalent in this context; 'disown' is possible but narrower
    and less established in this prediction scene.
