theological_decisions:
- issue: Temporal expression combining σήμερον and ταύτῃ τῇ νυκτί
  chosen_reading: 'Both expressions are retained: ''you today, this very night'''
  alternative_readings:
  - Conflate as 'this very night' only
  - Smooth to 'today—yes, tonight'
  rationale: The Greek includes both adverbial expressions, likely for emphasis. Retaining
    both avoids omitting a significant lexical element and preserves the solemn immediacy
    of Jesus' prediction without importing further interpretation.
  doctrine_reference: Translation philosophy §1, §5
- issue: Mark's historical present
  chosen_reading: Preserve present tense with 'Jesus says'
  alternative_readings:
  - Normalize to past tense 'Jesus said'
  rationale: The source text uses the historical present λέγει. Preserving it reflects
    original-language primacy and keeps Mark's narrative style visible in English.
  doctrine_reference: Translation philosophy §1, §6
