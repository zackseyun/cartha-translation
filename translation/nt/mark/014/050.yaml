- issue: Extent of the disciples' desertion
  chosen_reading: they all fled
  alternative_readings:
  - all fled
  - all of them fled
  rationale: The verse emphasizes the complete abandonment of Jesus by his companions
    at this moment. The translation preserves that totality without softening or expanding
    the claim beyond the Greek text.
