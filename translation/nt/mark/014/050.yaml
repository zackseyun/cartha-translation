id: MRK.14.50
reference: Mark 14:50
source:
  edition: SBLGNT
  text: καὶ ἀφέντες αὐτὸν ⸂ἔφυγον πάντες⸃.
translation:
  text: And leaving him, they all fled.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: καὶ
  chosen: And
  alternatives:
  - Then
  - So
  lexicon: BDAG
  rationale: Standard coordinating conjunction linking this action to the preceding
    arrest scene. 'And' preserves the simple narrative flow without adding temporal
    or inferential nuance.
- source_word: ἀφέντες
  chosen: leaving
  alternatives:
  - abandoning
  - forsaking
  lexicon: BDAG
  rationale: Aorist active participle of ἀφίημι here means to leave behind or abandon.
    'Leaving' is the most natural English participial rendering and fits the concise
    narrative style; 'abandoning' is possible but slightly more interpretive and emphatic.
- source_word: αὐτὸν
  chosen: him
  lexicon: BDAG
  rationale: Direct object pronoun referring to Jesus. 'Him' is the straightforward
    and contextually clear rendering.
- source_word: ἔφυγον
  chosen: fled
  alternatives:
  - ran away
  - escaped
  lexicon: BDAG
  rationale: Aorist indicative of φεύγω, denoting flight from danger. 'Fled' is concise,
    idiomatic, and preserves the gravity of fearful retreat better than the more colloquial
    'ran away'.
- source_word: πάντες
  chosen: they all
  alternatives:
  - all of them
  - all
  lexicon: BDAG
  rationale: Predicate emphasis on the totality of the disciples' flight. Rendering
    as 'they all' makes explicit the implied subject in English while preserving the
    emphasis of πάντες.
