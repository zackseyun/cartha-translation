id: MRK.14.66
reference: Mark 14:66
source:
  edition: SBLGNT
  text: Καὶ ὄντος τοῦ Πέτρου ⸂κάτω ἐν τῇ αὐλῇ⸃ ἔρχεται μία τῶν παιδισκῶν τοῦ ἀρχιερέως,
translation:
  text: And while Peter was below in the courtyard, one of the high priest’s servant
    girls came,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'one of the high priest’s slave girls.' The Greek παιδίσκη can denote
      a female household servant or slave; here 'servant girl' is used because the
      narrative emphasizes her role in the household rather than her legal status.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὄντος τοῦ Πέτρου
  chosen: while Peter was
  alternatives:
  - with Peter being
  - as Peter was
  lexicon: BDAG
  rationale: The genitive absolute with present participle is best rendered as a temporal
    circumstantial clause in natural English. 'While Peter was' preserves the ongoing
    scene-setting force without awkward literalism.
- source_word: κάτω
  chosen: below
  alternatives:
  - down below
  - beneath
  lexicon: BDAG
  rationale: κάτω indicates a lower spatial position. 'Below' is concise and fits
    the narrative contrast with the proceedings above in the high priest's residence.
- source_word: αὐλή
  chosen: courtyard
  alternatives:
  - court
  - palace courtyard
  lexicon: BDAG
  rationale: αὐλή here refers to the open court area within the high priest's residence.
    'Courtyard' is the clearest modern English equivalent.
- source_word: ἔρχεται
  chosen: came
  alternatives:
  - comes
  - approached
  lexicon: BDAG
  rationale: Although the Greek uses the historical present, English narrative style
    commonly shifts this to simple past for readability. 'Came' preserves the event
    sense without sounding stilted.
- source_word: μία τῶν παιδισκῶν
  chosen: one of the servant girls
  alternatives:
  - one of the slave girls
  - one of the maids
  lexicon: BDAG
  rationale: παιδίσκη denotes a female servant/slave, often a young maidservant. In
    this context, 'servant girl' is natural English and conveys both gender and subordinate
    household status. 'Slave girl' is possible lexically, but the bonded nature is
    not the narrative focus here, so 'servant girl' fits the project's context-sensitive
    approach.
- source_word: τοῦ ἀρχιερέως
  chosen: of the high priest
  alternatives:
  - belonging to the high priest
  lexicon: BDAG
  rationale: The genitive indicates household association. 'Of the high priest' is
    idiomatic and sufficiently clear in English.
