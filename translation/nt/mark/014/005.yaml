id: MRK.14.5
reference: Mark 14:5
source:
  edition: SBLGNT
  text: ἠδύνατο γὰρ τοῦτο ⸂τὸ μύρον⸃ πραθῆναι ἐπάνω ⸂δηναρίων τριακοσίων⸃ καὶ δοθῆναι
    τοῖς πτωχοῖς· καὶ ἐνεβριμῶντο αὐτῇ.
translation:
  text: For this perfume could have been sold for more than three hundred denarii
    and given to the poor.” And they scolded her.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'ointment' or 'fragrant oil' for 'perfume.'
    reason: lexical_alternative
  - marker: b
    text: Or 'they rebuked her.' The Greek verb conveys strong displeasure or stern
      censure.
    reason: lexical_alternative
lexical_decisions:
- source_word: μύρον
  chosen: perfume
  alternatives:
  - ointment
  - fragrant oil
  lexicon: BDAG
  rationale: μύρον refers to perfumed ointment/oil. 'Perfume' is natural modern English
    and fits the costly aromatic substance in context without sounding archaic like
    'ointment.'
- source_word: πραθῆναι
  chosen: been sold
  alternatives:
  - sold
  lexicon: BDAG
  rationale: Aorist passive infinitive of πιπράσκω, expressing potential action after
    ἠδύνατο. English idiom requires 'could have been sold.'
- source_word: ἐπάνω
  chosen: for more than
  alternatives:
  - above
  - over
  lexicon: BDAG
  rationale: With a genitive of amount, ἐπάνω conveys excess over a stated sum. 'For
    more than' is the clearest idiomatic rendering in English.
- source_word: δηναρίων τριακοσίων
  chosen: three hundred denarii
  alternatives:
  - three hundred denars
  lexicon: BDAG
  rationale: δηνάριον is best transliterated as 'denarius/denarii' rather than converted
    into a modern currency, preserving the historical setting. Plural 'denarii' is
    standard English usage.
- source_word: δοθῆναι τοῖς πτωχοῖς
  chosen: given to the poor
  alternatives:
  - given to poor people
  lexicon: BDAG
  rationale: πτωχοῖς here denotes the poor as a social class. 'Given to the poor'
    is concise, idiomatic, and faithful.
- source_word: ἐνεβριμῶντο αὐτῇ
  chosen: they scolded her
  alternatives:
  - they rebuked her
  - they were indignant with her
  - they snarled at her
  lexicon: BDAG
  rationale: ἐμβριμάομαι can convey strong displeasure or stern censure. In this context,
    directed toward the woman, 'scolded her' captures the interpersonal force in readable
    English. 'Rebuked' is possible but slightly more formal; 'were indignant with
    her' weakens the direct verbal force.
- source_word: γὰρ
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: BDAG
  rationale: γάρ gives the reason for the preceding complaint. 'For' preserves the
    explanatory connection compactly.
- source_word: ἠδύνατο
  chosen: could have been
  alternatives:
  - was able to be
  - might have been
  lexicon: BDAG
  rationale: Imperfect middle of δύναμαι here expresses unrealized possibility in
    context. 'Could have been' is the natural English equivalent.
