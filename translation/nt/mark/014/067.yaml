theological_decisions:
- issue: Rendering the designation Ναζαρηνοῦ in relation to Ἰησοῦ
  chosen_reading: Jesus the Nazarene
  alternative_readings:
  - the Nazarene Jesus
  - Jesus of Nazareth
  rationale: The phrase identifies Jesus by epithet, not by a christological title
    requiring doctrinal interpretation. 'Jesus the Nazarene' preserves the Greek designation
    closely while remaining natural English. 'Jesus of Nazareth' is possible but slightly
    interpretive, since the Greek uses Ναζαρηνός rather than an explicit place-name
    construction.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; readable modern English'
