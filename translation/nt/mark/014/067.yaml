id: MRK.14.67
reference: Mark 14:67
source:
  edition: SBLGNT
  text: καὶ ἰδοῦσα τὸν Πέτρον θερμαινόμενον ἐμβλέψασα αὐτῷ λέγει· Καὶ σὺ μετὰ τοῦ
    Ναζαρηνοῦ ⸂ἦσθα τοῦ Ἰησοῦ⸃·
translation:
  text: And seeing Peter warming himself, she looked at him and says, “You also were
    with Jesus the Nazarene.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “she looked intently at him.”
    reason: lexical_alternative
  - marker: b
    text: Or, “You also were with the Nazarene, Jesus,” reflecting the Greek word
      order more closely.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἰδοῦσα
  chosen: seeing
  alternatives:
  - when she saw
  - having seen
  lexicon: BDAG
  rationale: Aorist participle of ὁράω, introducing the circumstance for her speech.
    'Seeing' preserves the participial flow without overformal English.
- source_word: θερμαινόμενον
  chosen: warming himself
  alternatives:
  - warming himself by the fire
  - keeping warm
  lexicon: BDAG
  rationale: Present middle/passive participle indicates Peter was in the act of warming
    himself. 'By the fire' is contextually inferable from the surrounding passage
    but not explicit in this verse, so it is not added to the main text.
- source_word: ἐμβλέψασα αὐτῷ
  chosen: she looked at him
  alternatives:
  - fixing her gaze on him
  - looking intently at him
  lexicon: BDAG
  rationale: ἐμβλέπω often conveys a direct or intent look. 'Looked at him' is natural
    English; the stronger nuance is preserved as an alternative.
- source_word: λέγει
  chosen: says
  alternatives:
  - said
  lexicon: BDAG
  rationale: Historical present in Greek. Rendering as 'says' preserves Mark's vivid
    narrative style.
- source_word: Καὶ σὺ
  chosen: You also
  alternatives:
  - And you too
  - You as well
  lexicon: BDAG
  rationale: καί with σύ is emphatic/additive. 'You also' captures the force idiomatically.
- source_word: μετὰ
  chosen: with
  alternatives:
  - among the company of
  - in association with
  lexicon: BDAG
  rationale: μετά with the genitive here denotes association or accompaniment. 'With'
    is the plain and sufficient rendering.
- source_word: τοῦ Ναζαρηνοῦ
  chosen: the Nazarene
  alternatives:
  - the Nazarene man
  - the man from Nazareth
  lexicon: BDAG
  rationale: Ναζαρηνός functions as a designation/title-like epithet for Jesus in
    the Gospels. 'The Nazarene' is the most natural and established English equivalent
    here.
- source_word: ἦσθα
  chosen: were
  alternatives:
  - had been
  lexicon: BDAG
  rationale: Imperfect of εἰμί here is best rendered with simple past in English in
    this accusation scene.
- source_word: τοῦ Ἰησοῦ
  chosen: Jesus
  alternatives:
  - Jesus'
  lexicon: BDAG
  rationale: 'The genitive is appositional or epexegetical with ''the Nazarene'':
    literally ''the Nazarene, Jesus.'' English idiom places the personal name before
    the epithet: ''Jesus the Nazarene.'''
