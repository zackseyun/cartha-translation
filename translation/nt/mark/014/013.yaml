id: MRK.14.13
reference: Mark 14:13
source:
  edition: SBLGNT
  text: καὶ ἀποστέλλει δύο τῶν μαθητῶν αὐτοῦ καὶ λέγει αὐτοῖς· Ὑπάγετε εἰς τὴν πόλιν,
    καὶ ἀπαντήσει ὑμῖν ἄνθρωπος κεράμιον ὕδατος βαστάζων· ἀκολουθήσατε αὐτῷ,
translation:
  text: And he sends two of his disciples and says to them, “Go into the city, and
    a man carrying a jar of water will meet you. Follow him,”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'an earthenware jar of water' for κεράμιον ὕδατος.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀποστέλλει
  chosen: sends
  alternatives:
  - sent
  lexicon: BDAG
  rationale: Rendered as present-tense 'sends' to preserve Mark's vivid historical
    present, a common narrative feature in this Gospel.
- source_word: δύο τῶν μαθητῶν αὐτοῦ
  chosen: two of his disciples
  alternatives:
  - two of his followers
  lexicon: BDAG
  rationale: '''Disciples'' is the standard and contextually precise rendering of
    μαθηταί; the partitive construction is naturally expressed as ''two of his disciples.'''
- source_word: λέγει
  chosen: says
  alternatives:
  - said
  lexicon: BDAG
  rationale: Also preserved as a historical present ('says') for consistency with
    Mark's narrative style and the Greek present tense.
- source_word: Ὑπάγετε
  chosen: Go
  alternatives:
  - Go on
  - Depart
  lexicon: BDAG
  rationale: Simple imperative 'Go' best fits idiomatic English while preserving the
    command force.
- source_word: εἰς τὴν πόλιν
  chosen: into the city
  alternatives:
  - to the city
  lexicon: BDAG
  rationale: εἰς commonly indicates movement into; 'into the city' reflects the directional
    sense more clearly than 'to the city.'
- source_word: ἀπαντήσει ὑμῖν
  chosen: will meet you
  alternatives:
  - will encounter you
  - will come to meet you
  lexicon: BDAG
  rationale: Future verb with dative object naturally means 'will meet you' in this
    context; this is idiomatic and sufficiently precise.
- source_word: ἄνθρωπος
  chosen: a man
  alternatives:
  - a person
  lexicon: BDAG
  rationale: The noun is grammatically masculine and here refers to a specific male
    individual, not generic humanity; 'a man' is therefore gender-accurate per translation
    policy.
- source_word: κεράμιον ὕδατος
  chosen: a jar of water
  alternatives:
  - an earthenware jar of water
  - a water jar
  lexicon: BDAG
  rationale: '''Jar of water'' is clear modern English and captures the object without
    overloading the line with unnecessary material detail; ''earthenware'' is possible
    but not required in the main text.'
- source_word: βαστάζων
  chosen: carrying
  alternatives:
  - bearing
  lexicon: BDAG
  rationale: Present participle describing the man's action is best rendered with
    the natural English participle 'carrying.'
- source_word: ἀκολουθήσατε αὐτῷ
  chosen: Follow him
  alternatives:
  - Go after him
  lexicon: BDAG
  rationale: Aorist imperative calls for a direct command; 'Follow him' is the standard,
    clear rendering in context.
