theological_decisions:
- issue: Eucharistic/Supper wording in Jesus' declaration
  chosen_reading: Rendered τοῦτό ἐστιν τὸ σῶμά μου as 'this is my body' without interpretive
    qualification.
  alternative_readings:
  - this represents my body
  - this means my body
  rationale: The Greek uses the ordinary copula ἐστιν. In keeping with the translation
    philosophy, the text preserves the wording and theological tension rather than
    resolving sacramental debates in translation.
  doctrine_reference: Preserve theological tension rather than resolve it.
