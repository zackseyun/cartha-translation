id: MRK.14.22
reference: Mark 14:22
source:
  edition: SBLGNT
  text: Καὶ ἐσθιόντων αὐτῶν ⸀λαβὼν ἄρτον εὐλογήσας ἔκλασεν καὶ ἔδωκεν αὐτοῖς καὶ εἶπεν·
    ⸀Λάβετε, τοῦτό ἐστιν τὸ σῶμά μου.
translation:
  text: And as they were eating, he took bread, blessed it, broke it, and gave it
    to them, and said, “Take; this is my body.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'this represents my body' / 'this means my body.' The Greek reads literally,
      'this is my body.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἐσθιόντων αὐτῶν
  chosen: as they were eating
  alternatives:
  - while they were eating
  lexicon: BDAG
  rationale: Genitive absolute with present participle indicates contemporaneous action.
    'As they were eating' is natural modern English and preserves the ongoing sense.
- source_word: λαβὼν ἄρτον
  chosen: he took bread
  alternatives:
  - taking bread
  - he took a loaf of bread
  lexicon: BDAG
  rationale: Aorist participle followed by main verbs is idiomatically rendered with
    a finite verb in English narrative. ἄρτον lacks the article; 'bread' is the most
    natural English in meal context without over-specifying 'loaf'.
- source_word: εὐλογήσας
  chosen: blessed it
  alternatives:
  - gave thanks over it
  - said a blessing
  lexicon: BDAG
  rationale: In meal context εὐλογέω can refer to pronouncing a blessing over the
    bread. English commonly supplies the object for clarity. 'Blessed it' preserves
    the traditional and lexical sense without importing a more interpretive paraphrase.
- source_word: ἔκλασεν
  chosen: broke it
  alternatives:
  - broke the bread
  lexicon: BDAG
  rationale: The verb refers to breaking the bread for distribution. 'It' is supplied
    naturally from the prior object and keeps the sequence concise.
- source_word: ἔδωκεν αὐτοῖς
  chosen: gave it to them
  alternatives:
  - gave to them
  - distributed it to them
  lexicon: BDAG
  rationale: Direct object is implied from context. 'Gave it to them' is straightforward
    and avoids over-interpretive 'distributed'.
- source_word: Λάβετε
  chosen: Take
  alternatives:
  - Take it
  - Receive
  lexicon: BDAG
  rationale: Aorist imperative invites the disciples to take the bread. 'Take' is
    the most direct rendering; 'it' is not explicit in Greek and need not be added.
- source_word: τοῦτό ἐστιν
  chosen: this is
  alternatives:
  - this means
  - this represents
  lexicon: BDAG
  rationale: The copula construction is direct and should be translated plainly as
    'this is.' Alternative interpretive renderings reflect theological explanation
    rather than the Greek wording.
- source_word: τὸ σῶμά μου
  chosen: my body
  lexicon: BDAG
  rationale: σῶμα straightforwardly means 'body.' No contextual reason warrants a
    figurative gloss in translation; interpretation belongs beyond the main text.
