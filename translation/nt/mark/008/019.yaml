theological_decisions:
- issue: Representative force of πεντακισχιλίους
  chosen_reading: the five thousand
  alternative_readings:
  - the five thousand men
  rationale: The verse recalls the well-known feeding of the five thousand. While
    the masculine form can in some contexts be rendered with explicit male reference,
    this verse itself uses the conventional crowd designation, and adding 'men' in
    the main text would import a specificity not required for clear English here.
    This follows the project's gender-accurate principle by not neutralizing or over-specifying
    beyond context.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
