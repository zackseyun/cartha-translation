id: MRK.8.19
reference: Mark 8:19
source:
  edition: SBLGNT
  text: ὅτε τοὺς πέντε ἄρτους ἔκλασα εἰς τοὺς πεντακισχιλίους, πόσους κοφίνους ⸂κλασμάτων
    πλήρεις⸃ ἤρατε; λέγουσιν αὐτῷ· Δώδεκα.
translation:
  text: When I broke the five loaves for the five thousand, how many baskets full
    of broken pieces did you pick up?” They said to him, “Twelve.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'fragments.' The Greek term refers to pieces left over from the broken
      loaves.
    reason: lexical_alternative
  - marker: b
    text: Or 'did you take up?'
    reason: lexical_alternative
  - marker: c
    text: Literally 'the five thousand'; some translations render 'the five thousand
      men.'
    reason: alternative_reading
lexical_decisions:
- source_word: ὅτε
  chosen: When
  alternatives:
  - At the time when
  lexicon: BDAG
  rationale: Introduces a temporal clause referring back to the feeding miracle. 'When'
    is the natural English equivalent and preserves the directness of Jesus' question.
- source_word: ἔκλασα
  chosen: I broke
  alternatives:
  - I broke apart
  lexicon: BDAG
  rationale: Aorist active of κλάω, used of breaking bread/loaves. 'Broke' is the
    standard and sufficiently concrete rendering in this context.
- source_word: ἄρτους
  chosen: loaves
  alternatives:
  - bread
  lexicon: BDAG
  rationale: In feeding narratives, ἄρτος commonly refers to loaves rather than bread
    in the abstract. 'Loaves' fits the countable context with 'five.'
- source_word: εἰς τοὺς πεντακισχιλίους
  chosen: for the five thousand
  alternatives:
  - for the five thousand men
  - to the five thousand
  lexicon: BDAG
  rationale: εἰς here expresses direction/purpose toward the group fed. 'For the five
    thousand' is idiomatic English. Although the masculine form can sometimes imply
    men, Mark's wording here functions as the conventional designation of the crowd;
    adding 'men' would over-specify beyond the immediate wording of this verse.
- source_word: πόσους
  chosen: how many
  alternatives:
  - how many of
  lexicon: BDAG
  rationale: Direct interrogative asking for a number; 'how many' is the straightforward
    equivalent.
- source_word: κοφίνους
  chosen: baskets
  alternatives:
  - hand-baskets
  lexicon: BDAG
  rationale: κόφινος denotes a basket, often a smaller hand-basket in distinction
    from σπυρίς elsewhere. 'Baskets' is clear and standard; the more specific nuance
    is not necessary in the main text here.
- source_word: κλασμάτων
  chosen: broken pieces
  alternatives:
  - fragments
  - pieces
  lexicon: BDAG
  rationale: Refers to the pieces resulting from the broken loaves. 'Broken pieces'
    makes the connection to the preceding breaking explicit and is natural modern
    English.
- source_word: πλήρεις
  chosen: full of
  alternatives:
  - filled with
  - full
  lexicon: BDAG
  rationale: 'Used attributively with κοφίνους and κλασμάτων: baskets full of broken
    pieces. ''Full of'' is the most idiomatic English construction.'
- source_word: ἤρατε
  chosen: did you pick up
  alternatives:
  - did you take up
  - did you carry away
  lexicon: BDAG
  rationale: Aorist of αἴρω in this context refers to gathering up leftovers. 'Pick
    up' communicates the action naturally in English better than the more wooden 'take
    up.'
- source_word: λέγουσιν αὐτῷ
  chosen: They said to him
  alternatives:
  - They tell him
  lexicon: BDAG
  rationale: Although the present tense can be rendered vividly, English narrative
    style here is best served by simple past, matching the surrounding discourse.
- source_word: Δώδεκα
  chosen: Twelve
  lexicon: BDAG
  rationale: Direct numerical reply; no expansion is needed since the referent is
    clear from the question.
