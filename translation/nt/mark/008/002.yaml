id: MRK.8.2
reference: Mark 8:2
source:
  edition: SBLGNT
  text: Σπλαγχνίζομαι ἐπὶ τὸν ὄχλον ὅτι ἤδη ἡμέραι τρεῖς προσμένουσίν μοι καὶ οὐκ
    ἔχουσιν τί φάγωσιν·
translation:
  text: I have compassion on the crowd, because they have already remained with me
    three days and have nothing to eat.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Σπλαγχνίζομαι
  chosen: I have compassion
  alternatives:
  - I feel compassion
  - I am moved with compassion
  - my heart goes out
  lexicon: BDAG
  rationale: The verb denotes deep compassion or pity. 'I have compassion' is natural
    modern English and preserves the present-tense force without adding emotive paraphrase.
    'Am moved with compassion' is traditional but slightly more interpretive and less
    concise.
- source_word: ἐπὶ τὸν ὄχλον
  chosen: on the crowd
  alternatives:
  - for the crowd
  - toward the crowd
  lexicon: BDAG
  rationale: With σπλαγχνίζομαι, ἐπί plus accusative marks the object of compassion.
    In idiomatic English this is best expressed as 'on the crowd' after 'have compassion,'
    though 'for the crowd' is also possible. 'Crowd' is the standard rendering of
    ὄχλος in Mark.
- source_word: ὅτι
  chosen: because
  alternatives:
  - for
  - that
  lexicon: BDAG
  rationale: Here ὅτι introduces the reason for Jesus' compassion, so 'because' is
    the clearest contemporary rendering.
- source_word: ἤδη
  chosen: already
  alternatives:
  - now already
  - by now
  lexicon: BDAG
  rationale: ἤδη marks that the duration has already reached three days. 'Already'
    is direct and idiomatic.
- source_word: ἡμέραι τρεῖς
  chosen: three days
  alternatives:
  - for three days
  lexicon: BDAG
  rationale: The accusative-like duration idea is conveyed in English by 'three days.'
    The preposition is supplied naturally by the English verbal construction rather
    than translated separately.
- source_word: προσμένουσίν μοι
  chosen: have already remained with me
  alternatives:
  - have stayed with me
  - continue with me
  - have been with me
  lexicon: BDAG
  rationale: προσμένω means to remain with, stay near, or continue with someone. 'Remained
    with me' preserves the sense of continued presence. 'Have been with me' is smoother
    but slightly less specific; 'stayed with me' is also viable.
- source_word: μοι
  chosen: with me
  alternatives:
  - by me
  - near me
  lexicon: BDAG
  rationale: The dative with προσμένω is relational; 'with me' is the most natural
    English expression.
- source_word: οὐκ ἔχουσιν τί φάγωσιν
  chosen: have nothing to eat
  alternatives:
  - do not have anything to eat
  - have nothing they may eat
  lexicon: BDAG
  rationale: The construction means they lack food to eat. 'Have nothing to eat' is
    idiomatic and accurately conveys the force of ἔχω + τί + subjunctive.
- source_word: φάγωσιν
  chosen: to eat
  alternatives:
  - that they may eat
  lexicon: BDAG
  rationale: 'The aorist subjunctive after τί in this idiom is best rendered with
    an English infinitive: ''to eat.'' A more literal ''that they may eat'' is less
    natural and does not improve accuracy.'
