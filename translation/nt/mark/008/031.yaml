theological_decisions:
- issue: Rendering of Jesus' passion prediction with δεῖ
  chosen_reading: must
  alternative_readings:
  - it is necessary
  rationale: The verse presents the suffering, rejection, death, and resurrection
    of the Son of Man as divinely necessary, but the translation should not over-specify
    the mechanism of that necessity beyond the Greek. 'Must' preserves the theological
    weight without importing a fuller doctrinal explanation into the wording.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Temporal expression μετὰ τρεῖς ἡμέρας
  chosen_reading: after three days
  alternative_readings:
  - on the third day
  - in three days
  rationale: The Greek text says 'after three days.' To render it as 'on the third
    day' would harmonize this verse to other passages rather than translate Mark's
    wording. Historic orthodoxy affirms the resurrection; this translation preserves
    the evangelist's own phrasing.
  doctrine_reference: Original-language primacy over translation tradition.
