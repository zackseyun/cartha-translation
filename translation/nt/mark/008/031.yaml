id: MRK.8.31
reference: Mark 8:31
source:
  edition: SBLGNT
  text: Καὶ ἤρξατο διδάσκειν αὐτοὺς ὅτι δεῖ τὸν υἱὸν τοῦ ἀνθρώπου πολλὰ παθεῖν καὶ
    ἀποδοκιμασθῆναι ⸀ὑπὸ τῶν πρεσβυτέρων καὶ τῶν ἀρχιερέων καὶ τῶν γραμματέων καὶ
    ἀποκτανθῆναι καὶ μετὰ τρεῖς ἡμέρας ἀναστῆναι·
translation:
  text: And he began to teach them that the Son of Man must suffer many things, and
    be rejected by the elders and the chief priests and the scribes, and be killed,
    and after three days rise again.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in three days.' Mark's Greek reads 'after three days'; some English
      traditions render the expression more idiomatically or harmonize it with parallels
      that say 'on the third day.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἤρξατο διδάσκειν
  chosen: began to teach
  alternatives:
  - started teaching
  lexicon: BDAG
  rationale: The ingressive sense of ἄρχομαι with an infinitive is naturally rendered
    'began to teach.' This preserves the narrative transition without unnecessary
    paraphrase.
- source_word: δεῖ
  chosen: must
  alternatives:
  - it is necessary
  lexicon: BDAG
  rationale: δεῖ expresses necessity, here with strong force in relation to the Son
    of Man's coming suffering, rejection, death, and resurrection. 'Must' is concise
    and preserves that force better in natural English than the more wooden 'it is
    necessary.'
- source_word: τὸν υἱὸν τοῦ ἀνθρώπου
  chosen: the Son of Man
  lexicon: BDAG
  rationale: This is the established and semantically transparent rendering of the
    title, preserving both its idiomatic force and its intertextual resonance with
    Danielic and Gospel usage. It should be translated, not paraphrased.
- source_word: πολλὰ παθεῖν
  chosen: suffer many things
  alternatives:
  - suffer much
  lexicon: BDAG
  rationale: πολλά is neuter plural functioning adverbially/objectively with πάσχω.
    'Suffer many things' closely reflects the Greek wording and preserves the breadth
    of suffering implied. 'Suffer much' is possible but slightly less concrete.
- source_word: ἀποδοκιμασθῆναι
  chosen: be rejected
  alternatives:
  - be repudiated
  - be rejected after examination
  lexicon: BDAG
  rationale: The verb carries the sense of being rejected/disapproved after evaluation.
    'Be rejected' is the clearest idiomatic English rendering and fits the context
    of official repudiation by leadership.
- source_word: ὑπὸ τῶν πρεσβυτέρων
  chosen: by the elders
  lexicon: BDAG
  rationale: πρεσβύτεροι here refers to the recognized Jewish leadership group, not
    merely older men. 'Elders' is the standard and accurate rendering.
- source_word: τῶν ἀρχιερέων
  chosen: the chief priests
  alternatives:
  - the high priests
  lexicon: BDAG
  rationale: In plural, ἀρχιερεῖς commonly refers to the chief-priestly class or leading
    priests, not multiple holders of the singular high-priest office. 'Chief priests'
    is the best established and most accurate rendering.
- source_word: τῶν γραμματέων
  chosen: the scribes
  alternatives:
  - the legal experts
  - the teachers of the law
  lexicon: BDAG
  rationale: γραμματεῖς is conventionally rendered 'scribes.' While they functioned
    as legal experts, 'scribes' preserves the lexical form and historical specificity;
    explanatory alternatives are possible but less direct.
- source_word: ἀποκτανθῆναι
  chosen: be killed
  alternatives:
  - be put to death
  lexicon: BDAG
  rationale: The passive infinitive is straightforward. 'Be killed' is direct, natural,
    and sufficiently weighty. 'Be put to death' is also possible but slightly more
    interpretive in legal nuance.
- source_word: μετὰ τρεῖς ἡμέρας
  chosen: after three days
  alternatives:
  - in three days
  lexicon: BDAG
  rationale: μετά with the accusative normally means 'after.' In Mark this wording
    should be rendered according to its plain Greek sense rather than harmonized to
    other Gospel phrasings such as 'on the third day.'
- source_word: ἀναστῆναι
  chosen: rise again
  alternatives:
  - rise
  - be raised
  lexicon: BDAG
  rationale: The intransitive aorist infinitive of ἀνίστημι here is naturally 'rise.'
    'Again' is supplied in idiomatic English because resurrection is a return from
    death and because many English readers expect the phrase this way; it does not
    distort the sense. 'Be raised' would shift the voice and obscure the Greek form.
