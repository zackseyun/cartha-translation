id: MRK.8.10
reference: Mark 8:10
source:
  edition: SBLGNT
  text: καὶ ⸀εὐθὺς ἐμβὰς εἰς τὸ πλοῖον μετὰ τῶν μαθητῶν αὐτοῦ ἦλθεν εἰς τὰ μέρη Δαλμανουθά.
translation:
  text: And immediately, getting into the boat with his disciples, he went to the
    region of Dalmanutha.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the district of Dalmanutha.' The Greek phrase literally uses a plural
      expression, 'the parts/regions of Dalmanutha.'
    reason: lexical_alternative
lexical_decisions:
- source_word: εὐθὺς
  chosen: immediately
  alternatives:
  - at once
  - straightway
  lexicon: BDAG
  rationale: Marks the characteristic urgency in Mark's narrative. 'Immediately' is
    natural modern English and preserves the temporal force better than the archaic
    'straightway.'
- source_word: ἐμβὰς
  chosen: getting into
  alternatives:
  - having boarded
  - entering
  lexicon: BDAG
  rationale: Aorist participle of ἐμβαίνω, indicating the action preceding the main
    verb. 'Getting into' is idiomatic and clear in English while preserving the participial
    sense.
- source_word: πλοῖον
  chosen: boat
  alternatives:
  - ship
  lexicon: BDAG
  rationale: In the Gospel setting on the Sea of Galilee, 'boat' is the most natural
    and contextually appropriate rendering; 'ship' would sound too large in modern
    English.
- source_word: μετὰ τῶν μαθητῶν αὐτοῦ
  chosen: with his disciples
  alternatives:
  - together with his disciples
  lexicon: BDAG
  rationale: Standard rendering of μετά with the genitive expressing accompaniment.
    'With his disciples' is concise and accurate.
- source_word: ἦλθεν
  chosen: he went
  alternatives:
  - he came
  - he arrived
  lexicon: BDAG
  rationale: Although ἔρχομαι often means 'come,' in narrative movement toward a destination
    from the speaker's external viewpoint, 'went' is the more idiomatic English choice.
- source_word: τὰ μέρη
  chosen: the region
  alternatives:
  - the district
  - the parts
  lexicon: BDAG
  rationale: The plural expression refers idiomatically to an area or district. 'The
    region' communicates the geographic sense in natural English better than the overly
    literal 'the parts.'
- source_word: Δαλμανουθά
  chosen: Dalmanutha
  lexicon: BDAG
  rationale: Proper place name, so transliteration follows the translation philosophy
    of transliterating names rather than translating them.
