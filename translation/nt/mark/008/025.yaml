id: MRK.8.25
reference: Mark 8:25
source:
  edition: SBLGNT
  text: εἶτα πάλιν ⸀ἐπέθηκεν τὰς χεῖρας ἐπὶ τοὺς ὀφθαλμοὺς αὐτοῦ, καὶ ⸂διέβλεψεν καὶ
    ἀπεκατέστη καὶ ἐνέβλεπεν⸃ τηλαυγῶς ⸀ἅπαντα.
translation:
  text: Then again he laid his hands on his eyes, and he saw clearly and was restored,
    and he was seeing everything distinctly.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Some manuscripts read wording reflected in translations such as 'and he
      looked intently and was restored, and saw everything clearly.'
    reason: textual_variant
  - marker: b
    text: Or 'he could see everything clearly'; the final clause combines an imperfect
      verb with an adverb of clear/distinct sight.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἶτα πάλιν
  chosen: Then again
  alternatives:
  - Then once more
  - After that again
  lexicon: BDAG
  rationale: εἶτα marks sequence ('then/after that'), and πάλιν adds repetition ('again').
    'Then again' preserves both temporal progression and the second action of Jesus
    without unnecessary expansion.
- source_word: ἐπέθηκεν τὰς χεῖρας ἐπὶ τοὺς ὀφθαλμοὺς αὐτοῦ
  chosen: he laid his hands on his eyes
  alternatives:
  - he placed his hands on his eyes
  lexicon: BDAG
  rationale: ἐπιτίθημι with χεῖρας is a standard idiom for laying hands on someone.
    Rendering the plural explicitly as 'hands' preserves the concrete physical action
    in the healing narrative.
- source_word: διέβλεψεν
  chosen: he saw clearly
  alternatives:
  - he looked up and saw
  - he regained sight
  lexicon: BDAG
  rationale: διαβλέπω commonly conveys seeing clearly or regaining clear sight. 'He
    saw clearly' fits the immediate context of partial-to-complete healing and avoids
    importing the 'looked up' wording from other textual traditions.
- source_word: ἀπεκατέστη
  chosen: was restored
  alternatives:
  - was healed
  - was restored to normal
  lexicon: BDAG
  rationale: ἀποκαθίστημι means restore to a former or proper condition. The passive-like
    English 'was restored' best captures the result state without over-specifying
    beyond the Greek.
- source_word: ἐνέβλεπεν
  chosen: he was seeing
  alternatives:
  - he saw
  - he kept seeing
  - he could see
  lexicon: BDAG
  rationale: 'The imperfect tense is significant here. ''He was seeing'' is slightly
    wooden but preserves the ongoing/resultative sense following the aorists. This
    helps reflect the narrative progression: clear sight, restoration, ongoing seeing.'
- source_word: τηλαυγῶς
  chosen: distinctly
  alternatives:
  - clearly
  - plainly
  - from afar and clearly
  lexicon: BDAG
  rationale: τηλαυγῶς denotes brightness/clarity, possibly with the nuance of seeing
    at a distance. Since 'clearly' is already used for διέβλεψεν, 'distinctly' avoids
    redundancy while preserving the adverbial force.
- source_word: ἅπαντα
  chosen: everything
  alternatives:
  - all things
  - everything around him
  lexicon: BDAG
  rationale: ἅπας in the neuter plural here functions idiomatically as 'everything.'
    This is natural English and preserves the comprehensiveness of the man's restored
    sight.
