theological_decisions:
- issue: Narrative portrayal of the two-stage healing
  chosen_reading: The translation preserves the sequential, progressive nature of
    the healing without smoothing it into a single instantaneous event.
  alternative_readings:
  - Render all verbs simply as completed past actions with no nuance of progression
  rationale: The Greek uses a sequence of verbs, including an imperfect (ἐνέβλεπεν),
    which suggests an unfolding/resultant state. Preserving this avoids flattening
    the text and respects the narrative's theological tension without adding interpretation.
  doctrine_reference: Translation philosophy §3 Preserve theological tension rather
    than resolve it.
