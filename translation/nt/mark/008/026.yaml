theological_decisions:
- issue: Scope of Jesus' prohibition regarding the village
  chosen_reading: Render the command as a straightforward prohibition against entering
    the village, without importing motives or harmonizing with longer textual traditions.
  alternative_readings:
  - Some manuscript traditions expand the saying to include telling no one in the
    village.
  rationale: The SBLGNT text contains only the prohibition against entering the village.
    The translation should not import the expanded wording from other textual traditions
    into the main text.
