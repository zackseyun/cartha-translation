id: MRK.8.26
reference: Mark 8:26
source:
  edition: SBLGNT
  text: καὶ ἀπέστειλεν αὐτὸν ⸀εἰς οἶκον αὐτοῦ λέγων· Μηδὲ εἰς τὴν κώμην ⸀εἰσέλθῃς.
translation:
  text: And he sent him to his home, saying, “Do not even enter the village.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Some manuscripts add, “and do not tell anyone in the village.”
    reason: textual_variant
lexical_decisions:
- source_word: ἀπέστειλεν
  chosen: sent
  alternatives:
  - dismissed
  - sent away
  lexicon: BDAG
  rationale: Aorist of ἀποστέλλω here denotes Jesus sending the man off. 'Sent' is
    the most natural modern English rendering and fits the narrative context without
    over-specifying distance or mission.
- source_word: εἰς οἶκον αὐτοῦ
  chosen: to his home
  alternatives:
  - into his house
  - to his house
  lexicon: BDAG
  rationale: Although literally 'into his house,' English idiom in this context is
    better expressed as 'to his home,' conveying destination naturally. This preserves
    the sense of returning to his own dwelling without awkwardness.
- source_word: λέγων
  chosen: saying
  alternatives:
  - and said
  - telling him
  lexicon: BDAG
  rationale: The present participle introduces attendant speech. 'Saying' preserves
    the participial linkage to the main verb and is standard narrative English.
- source_word: Μηδὲ
  chosen: Do not even
  alternatives:
  - and do not
  - nor
  lexicon: BDAG
  rationale: μηδέ adds emphatic negation, not merely simple coordination. 'Do not
    even' captures the force that the village is not to be entered at all.
- source_word: κώμην
  chosen: the village
  alternatives:
  - the town
  lexicon: BDAG
  rationale: κώμη commonly refers to a village or small settlement. 'Village' is the
    most direct and contextually appropriate rendering.
- source_word: εἰσέλθῃς
  chosen: enter
  alternatives:
  - go into
  lexicon: BDAG
  rationale: Aorist subjunctive in a prohibition after μηδέ is well rendered by English
    imperative-style prohibition. 'Enter' is concise and matches the directional force
    of εἰς + accusative.
