id: MRK.8.15
reference: Mark 8:15
source:
  edition: SBLGNT
  text: καὶ διεστέλλετο αὐτοῖς λέγων· Ὁρᾶτε, βλέπετε ἀπὸ τῆς ζύμης τῶν Φαρισαίων καὶ
    τῆς ζύμης Ἡρῴδου.
translation:
  text: And he kept instructing them, saying, “Watch out; beware of the leaven of
    the Pharisees and the leaven of Herod.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'yeast.' 'Leaven' is retained to preserve the biblical metaphor of a
      permeating influence.
    reason: lexical_alternative
  - marker: b
    text: That is, the corrupting influence associated with the Pharisees and with
      Herod; compare Matt 16:6, 12 and Luke 12:1 for related uses of 'leaven.'
    reason: cross_reference
lexical_decisions:
- source_word: διεστέλλετο
  chosen: he kept instructing
  alternatives:
  - he charged
  - he warned
  - he strictly ordered
  lexicon: BDAG
  rationale: The imperfect middle indicates ongoing or repeated action in past time.
    In this context Jesus is giving a serious caution rather than a formal command
    only once, so 'kept instructing' captures the iterative force while remaining
    natural English. 'Warned' is possible, but the following direct imperatives already
    carry the warning force.
- source_word: λέγων
  chosen: saying
  alternatives:
  - and said
  lexicon: BDAG
  rationale: The participle introduces the content of the instruction. 'Saying' preserves
    the Greek structure naturally in English.
- source_word: Ὁρᾶτε
  chosen: Watch out
  alternatives:
  - See
  - Take heed
  - Be on guard
  lexicon: BDAG
  rationale: As an imperative in warning context, this is not merely visual perception
    but alertness. 'Watch out' is idiomatic modern English and pairs well with the
    following imperative.
- source_word: βλέπετε
  chosen: beware
  alternatives:
  - watch
  - be careful
  - keep watch
  lexicon: BDAG
  rationale: The two imperatives are near-synonymous and emphatic. Rendering them
    with two distinct but related English warnings preserves the rhetorical doubling
    without sounding wooden. 'Beware' communicates caution against danger.
- source_word: ἀπὸ
  chosen: of
  alternatives:
  - from
  lexicon: BDAG
  rationale: With verbs of warning, English idiom commonly uses 'beware of,' though
    the Greek preposition literally means 'from.' The sense of separation from a corrupting
    influence is retained.
- source_word: ζύμης
  chosen: leaven
  alternatives:
  - yeast
  lexicon: BDAG
  rationale: '''Leaven'' preserves the metaphorical and biblical resonance better
    than ''yeast,'' especially in a saying about corrupting influence. It is still
    accessible in modern English.'
- source_word: Φαρισαίων
  chosen: the Pharisees
  lexicon: BDAG
  rationale: Standard transliteration of the group name; the genitive is possessive/associative
    with 'leaven.'
- source_word: Ἡρῴδου
  chosen: Herod
  alternatives:
  - Herod's household
  - Herodian influence
  lexicon: BDAG
  rationale: The text names Herod directly in the genitive parallel to 'the Pharisees.'
    The translation should not expand the referent interpretively in the main text.
    The implied meaning is the corrupting influence associated with Herod.
