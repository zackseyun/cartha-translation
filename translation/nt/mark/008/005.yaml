id: MRK.8.5
reference: Mark 8:5
source:
  edition: SBLGNT
  text: καὶ ⸀ἠρώτα αὐτούς· Πόσους ἔχετε ἄρτους; οἱ δὲ εἶπαν· Ἑπτά.
translation:
  text: And he asked them, “How many loaves do you have?” They said, “Seven.”
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: καὶ
  chosen: And
  alternatives:
  - Then
  lexicon: BDAG
  rationale: Standard connective; 'And' preserves the simple narrative flow of Mark
    without adding temporal nuance beyond the Greek.
- source_word: ἠρώτα
  chosen: he asked
  alternatives:
  - he was asking
  - he questioned
  lexicon: BDAG
  rationale: Imperfect of ἐρωτάω can be rendered progressively, but in English narrative
    style 'he asked' is the most natural and sufficient way to convey the action here.
- source_word: αὐτούς
  chosen: them
  lexicon: BDAG
  rationale: Direct object pronoun referring to the disciples; straightforward accusative
    plural rendering.
- source_word: Πόσους
  chosen: How many
  alternatives:
  - How many of
  lexicon: BDAG
  rationale: Idiomatic English interrogative corresponding to the quantitative question
    posed by πόσος in the accusative plural.
- source_word: ἔχετε
  chosen: do you have
  alternatives:
  - have you
  lexicon: BDAG
  rationale: Present active indicative, second plural; 'do you have' is natural modern
    English in a direct question.
- source_word: ἄρτους
  chosen: loaves
  alternatives:
  - bread loaves
  - breads
  lexicon: BDAG
  rationale: ἄρτος can mean bread or a loaf of bread; in a counting context with Πόσους,
    'loaves' best reflects the discrete units in view.
- source_word: οἱ δὲ εἶπαν
  chosen: They said
  alternatives:
  - And they said
  - But they said
  - They answered
  lexicon: BDAG
  rationale: The article with δέ marks the responding group. 'They said' is concise
    and natural; 'answered' is possible but the Greek verb is simply 'said.' The connective
    δέ is adequately carried by the sentence transition without forcing an English
    conjunction.
- source_word: Ἑπτά
  chosen: Seven
  lexicon: BDAG
  rationale: Cardinal numeral given as the disciples' direct reply; rendered plainly.
