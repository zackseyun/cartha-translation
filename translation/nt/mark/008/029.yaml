id: MRK.8.29
reference: Mark 8:29
source:
  edition: SBLGNT
  text: καὶ αὐτὸς ⸂ἐπηρώτα αὐτούς⸃· Ὑμεῖς δὲ τίνα με λέγετε εἶναι; ⸀ἀποκριθεὶς ὁ Πέτρος
    λέγει αὐτῷ· Σὺ εἶ ὁ χριστός.
translation:
  text: And he was asking them, “But who do you say that I am?” Peter answered him,
    “You are the Messiah.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “the Christ.”
    reason: alternative_reading
lexical_decisions:
- source_word: ἐπηρώτα
  chosen: was asking
  alternatives:
  - asked
  - questioned
  lexicon: BDAG
  rationale: The imperfect tense suggests ongoing or iterative action in narrative,
    so 'was asking' better reflects the Greek aspect than the simple past 'asked,'
    while remaining natural English.
- source_word: Ὑμεῖς δὲ
  chosen: But who do you
  alternatives:
  - But you, who do you
  - And you, who do you
  lexicon: BDAG
  rationale: The pronoun is emphatic and δέ marks contrast with the previous question
    about others' opinions. 'But who do you' preserves the contrast and enough of
    the emphasis without awkward over-literalism.
- source_word: τίνα με λέγετε εἶναι
  chosen: who do you say that I am
  alternatives:
  - who do you say me to be
  - who do you say I am
  lexicon: BDAG
  rationale: This is the idiomatic English equivalent of the Greek accusative-plus-infinitive
    construction. 'That I am' makes the clause natural in English while preserving
    the sense.
- source_word: ἀποκριθεὶς
  chosen: answered
  alternatives:
  - replying
  - in answer
  lexicon: BDAG
  rationale: 'The participle introducing Peter''s response is commonly and naturally
    rendered with a finite verb in English narrative: ''answered.'' This preserves
    the discourse function rather than forcing a wooden participial form.'
- source_word: λέγει αὐτῷ
  chosen: answered him
  alternatives:
  - said to him
  - says to him
  lexicon: BDAG
  rationale: Although λέγει is formally present, Mark frequently uses the historical
    present. In English, simple past is the most natural narrative rendering here.
    'Answered him' also captures the combined force of ἀποκριθεὶς ... λέγει αὐτῷ in
    concise English.
- source_word: Σὺ εἶ
  chosen: You are
  alternatives:
  - You yourself are
  lexicon: BDAG
  rationale: The pronoun is explicit and therefore somewhat emphatic, but standard
    English naturally conveys the force with 'You are' in this confessional context
    without adding undue stress.
- source_word: ὁ χριστός
  chosen: the Messiah
  alternatives:
  - the Christ
  lexicon: BDAG
  rationale: 'Per doctrine, Χριστός as a title should be translated ''Messiah'' rather
    than transliterated ''Christ,'' preserving the Jewish messianic sense in context.
    The article supports a titular reading: ''the Messiah.'''
