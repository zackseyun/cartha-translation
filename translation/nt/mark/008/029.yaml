theological_decisions:
- issue: Rendering of Χριστός as title
  chosen_reading: the Messiah
  alternative_readings:
  - the Christ
  rationale: In this confession, Χριστός functions as a title rather than a name-like
    designation. The project default is to translate the title to preserve its meaning
    and Hebraic context. The traditional 'the Christ' is preserved in a footnote as
    a recognizable alternative.
