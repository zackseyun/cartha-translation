theological_decisions:
- issue: Referent of 'Satan' in Jesus' address to Peter
  chosen_reading: Jesus directly rebukes Peter with the vocative 'Satan,' identifying
    Peter's words as aligned with satanic opposition, without requiring that Peter
    is literally Satan.
  alternative_readings:
  - Jesus addresses Satan standing behind Peter rather than Peter himself
  - '''Satan'' means only ''adversary'' in a non-personal sense'
  rationale: The immediate object of the rebuke is Peter (ἐπετίμησεν Πέτρῳ), and the
    direct speech addresses him. The translation preserves the text's sharpness without
    importing a metaphysical explanation beyond what the verse states.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Rendering of ἀνθρώπων
  chosen_reading: men
  alternative_readings:
  - people
  - humans
  rationale: The Greek is generic for human beings, but the project prefers gender-accurate
    renderings matching source intent. Here 'men' preserves the traditional antithesis
    'the things of God ... the things of men' while a footnote can clarify the generic
    sense.
  doctrine_reference: Gender-accurate over gender-neutral.
