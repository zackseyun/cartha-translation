id: MRK.8.33
reference: Mark 8:33
source:
  edition: SBLGNT
  text: ὁ δὲ ἐπιστραφεὶς καὶ ἰδὼν τοὺς μαθητὰς αὐτοῦ ἐπετίμησεν ⸀Πέτρῳ ⸂καὶ λέγει⸃·
    Ὕπαγε ὀπίσω μου, Σατανᾶ, ὅτι οὐ φρονεῖς τὰ τοῦ θεοῦ ἀλλὰ τὰ τῶν ἀνθρώπων.
translation:
  text: But turning around and seeing his disciples, he rebuked Peter and said, “Get
    behind me, Satan, because you are not setting your mind on the things of God,
    but on the things of men.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the things of people' or 'human things'; Greek 'of men' uses a generic
      term for human beings.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπιστραφεὶς
  chosen: turning around
  alternatives:
  - turning
  - having turned
  lexicon: BDAG
  rationale: Aorist passive participle used intransitively; 'turning around' captures
    the physical reorientation in context before Jesus addresses Peter.
- source_word: ἰδὼν
  chosen: seeing
  alternatives:
  - looking at
  - having seen
  lexicon: BDAG
  rationale: The participle indicates Jesus' visual regard toward the disciples. 'Seeing'
    is natural English and preserves the sequence with the previous participle.
- source_word: μαθητὰς
  chosen: disciples
  alternatives:
  - followers
  lexicon: BDAG
  rationale: Standard rendering for μαθητής in Gospel contexts; preserves the technical
    sense of Jesus' committed learners.
- source_word: ἐπετίμησεν
  chosen: rebuked
  alternatives:
  - warned
  - censured
  lexicon: BDAG
  rationale: ἐπιτιμάω in the Gospels commonly denotes a sharp verbal reprimand. 'Rebuked'
    best matches the force and is consistent with nearby usage.
- source_word: καὶ λέγει
  chosen: and said
  alternatives:
  - and says
  lexicon: BDAG
  rationale: The present λέγει is a historical present. English commonly smooths this
    to past tense in narrative for readability while preserving sense.
- source_word: Ὕπαγε ὀπίσω μου
  chosen: Get behind me
  alternatives:
  - Go behind me
  - Go away behind me
  lexicon: BDAG
  rationale: 'This is the established and contextually apt sense: Jesus commands Peter/Satan
    to take the place behind him rather than in front as a tempter or obstacle. ''Get
    behind me'' is idiomatic and preserves the force better than a wooden rendering.'
- source_word: Σατανᾶ
  chosen: Satan
  alternatives:
  - Adversary
  lexicon: BDAG
  rationale: As a vocative proper name/title in this Gospel context, 'Satan' is the
    natural transliteration. Although the underlying sense is 'adversary,' the NT
    usage here is personal and conventional.
- source_word: φρονεῖς
  chosen: are not setting your mind on
  alternatives:
  - are not thinking about
  - do not have in mind
  - are not minded toward
  lexicon: BDAG
  rationale: φρονέω includes mindset, orientation, and concern, not mere cognition.
    'Setting your mind on' captures the volitional and dispositional nuance in accessible
    English.
- source_word: τὰ τοῦ θεοῦ
  chosen: the things of God
  alternatives:
  - God's interests
  - the concerns of God
  lexicon: BDAG
  rationale: The articular neuter plural with genitive is broad and somewhat idiomatic.
    'The things of God' preserves the wording and theological openness without over-interpreting.
- source_word: τὰ τῶν ἀνθρώπων
  chosen: the things of men
  alternatives:
  - human things
  - the things of people
  - the concerns of men
  lexicon: BDAG
  rationale: ἄνθρωποι here contrasts human concerns with God's concerns. Per the project's
    gender-accurate policy, 'men' is retained because the phrase is generic humanity
    in a traditional contrastive expression; the representative sense can be clarified
    in a footnote.
