theological_decisions:
- issue: Meaning of 'from heaven' in the request for a sign
  chosen_reading: A sign of divine/heavenly origin or authorization
  alternative_readings:
  - a sign from the sky
  rationale: Given Gospel usage and the Pharisees' challenge, the phrase most naturally
    refers to a sign authenticated by God rather than a merely atmospheric phenomenon.
    The main text keeps the literal 'from heaven,' which preserves the theological
    resonance without over-interpretation.
  doctrine_reference: Translation philosophy §1, §3
