theological_decisions:
- issue: Rendering of ψυχή in a discipleship saying with possible 'life'/'soul' ambiguity
  chosen_reading: life
  alternative_readings:
  - soul
  rationale: The immediate literary context in Mark 8:35 uses ψυχή in the sense of
    one's life as something one may save or lose for Jesus and the gospel. Rendering
    it as 'life' preserves the contextual coherence and avoids importing a narrower
    anthropological claim. The traditional rendering 'soul' remains possible and is
    preserved in a footnote because the term can carry that sense and readers may
    expect it.
  doctrine_reference: Translation philosophy §3, §6
