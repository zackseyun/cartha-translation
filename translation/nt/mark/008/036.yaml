id: MRK.8.36
reference: Mark 8:36
source:
  edition: SBLGNT
  text: τί γὰρ ⸀ὠφελεῖ ⸀ἄνθρωπον ⸂κερδῆσαι τὸν κόσμον ὅλον καὶ ζημιωθῆναι⸃ τὴν ψυχὴν
    αὐτοῦ;
translation:
  text: For what does it profit a man to gain the whole world and forfeit his life?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his soul.' The Greek word ψυχή can mean 'life,' 'soul,' or 'self,' depending
      on context.
    reason: lexical_alternative
  - marker: b
    text: '''A man'' here represents a generic human being.'
    reason: cultural_note
lexical_decisions:
- source_word: τί γὰρ
  chosen: For what
  alternatives:
  - For what indeed
  - What for
  lexicon: BDAG
  rationale: τί introduces a rhetorical question, and γάρ links it to the preceding
    teaching with explanatory force. 'For what' preserves both the interrogative and
    the connective in natural English.
- source_word: ὠφελεῖ
  chosen: does it profit
  alternatives:
  - benefits
  - gains
  lexicon: BDAG
  rationale: ὠφελέω means to benefit or profit. 'Does it profit' is idiomatic in this
    rhetorical construction and preserves the economic metaphor that fits the surrounding
    language of gain and loss.
- source_word: ἄνθρωπον
  chosen: a man
  alternatives:
  - a person
  - someone
  lexicon: BDAG
  rationale: ἄνθρωπος here is singular and generic. Following the gender-accurate
    philosophy, 'a man' preserves the representative masculine form used in Greek,
    while still functioning generically in context.
- source_word: κερδῆσαι
  chosen: to gain
  alternatives:
  - to win
  - to acquire
  lexicon: BDAG
  rationale: κερδαίνω commonly means to gain or profit. 'To gain' matches the commercial
    contrast with ὠφελεῖ and ζημιωθῆναι.
- source_word: τὸν κόσμον ὅλον
  chosen: the whole world
  alternatives:
  - the entire world
  lexicon: BDAG
  rationale: κόσμος here refers to the world in its comprehensive scope, and ὅλον
    intensifies that totality. 'The whole world' is the most natural and established
    rendering.
- source_word: ζημιωθῆναι
  chosen: and forfeit
  alternatives:
  - and lose
  - and suffer loss of
  lexicon: BDAG
  rationale: ζημιόω in the passive can mean to suffer loss or forfeit. 'Forfeit' fits
    the gain/loss contrast and conveys the sense of losing something of ultimate value
    through exchange.
- source_word: τὴν ψυχὴν αὐτοῦ
  chosen: his life
  alternatives:
  - his soul
  - his self
  lexicon: BDAG
  rationale: ψυχή can denote life, soul, or self depending on context. In Mark 8:35–37
    the immediate context contrasts saving and losing one's ψυχή, where 'life' best
    preserves the paradox of discipleship in accessible English. Because 'soul' is
    also a longstanding and theologically weighty alternative, it is preserved in
    a footnote.
