id: MRK.8.17
reference: Mark 8:17
source:
  edition: SBLGNT
  text: καὶ ⸀γνοὺς λέγει αὐτοῖς· Τί διαλογίζεσθε ὅτι ἄρτους οὐκ ἔχετε; οὔπω νοεῖτε
    οὐδὲ συνίετε; ⸀πεπωρωμένην ἔχετε τὴν καρδίαν ὑμῶν;
translation:
  text: And knowing this, he says to them, “Why are you discussing that you have no
    bread? Do you not yet perceive nor understand? Do you have your heart hardened?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'loaves.' Greek has the plural 'loaves,' but English often uses 'bread'
      naturally in this context.
    reason: lexical_alternative
  - marker: b
    text: Or 'Is your heart hardened?' The Greek more literally says, 'Do you have
      your heart hardened?'
    reason: alternative_reading
lexical_decisions:
- source_word: γνοὺς
  chosen: knowing this
  alternatives:
  - becoming aware
  - perceiving
  lexicon: BDAG
  rationale: Aorist participle of γινώσκω here introduces Jesus' awareness of the
    disciples' discussion. 'Knowing this' is concise and natural in English, making
    explicit the implied object from context without overparaphrasing.
- source_word: διαλογίζεσθε
  chosen: are you discussing
  alternatives:
  - are you reasoning
  - are you debating among yourselves
  lexicon: BDAG
  rationale: The middle/passive form often conveys internal discussion or deliberation.
    'Discussing' fits the immediate context of the disciples talking about bread and
    is more natural than the more wooden 'reasoning.'
- source_word: ἄρτους
  chosen: bread
  alternatives:
  - loaves
  lexicon: BDAG
  rationale: Although plural in Greek ('loaves'), English commonly uses 'bread' as
    a mass noun in this context. This preserves readability while still conveying
    the food shortage under discussion.
- source_word: νοεῖτε
  chosen: perceive
  alternatives:
  - understand
  - grasp
  lexicon: BDAG
  rationale: νοέω often carries the sense of mental perception or apprehension. Rendering
    it as 'perceive' helps preserve the distinction from the following συνίετε, which
    more directly denotes understanding.
- source_word: συνίετε
  chosen: understand
  alternatives:
  - comprehend
  - grasp
  lexicon: BDAG
  rationale: συνίημι commonly means to understand or comprehend. Using 'understand'
    after 'perceive' preserves the rhetorical pairing without collapsing the two verbs
    into identical English.
- source_word: πεπωρωμένην
  chosen: hardened
  alternatives:
  - calloused
  - made dull
  lexicon: BDAG
  rationale: Perfect passive participle of πωρόω describes a state of hardness or
    insensibility. 'Hardened' is the standard and clearest rendering, preserving the
    biblical metaphor of spiritual dullness.
- source_word: καρδίαν
  chosen: heart
  lexicon: BDAG
  rationale: In biblical usage καρδία denotes the inner person, including understanding
    and responsiveness, not merely emotion. 'Heart' preserves the source metaphor
    and theological resonance.
