theological_decisions:
- issue: Rendering the final question about the disciples' condition
  chosen_reading: Do you have your heart hardened?
  alternative_readings:
  - Is your heart hardened?
  - Do you still have a hardened heart?
  rationale: The Greek is literally 'Do you have your heart hardened?' with ἔχετε
    + object + participle. This draft keeps the verbal force of 'have' rather than
    smoothing fully to a predicate adjective, preserving the sharpness of Jesus' rebuke
    while remaining intelligible English.
  doctrine_reference: Translation philosophy §1, §3, §6
