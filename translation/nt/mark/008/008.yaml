id: MRK.8.8
reference: Mark 8:8
source:
  edition: SBLGNT
  text: ⸂καὶ ἔφαγον⸃ καὶ ἐχορτάσθησαν, καὶ ἦραν περισσεύματα κλασμάτων ἑπτὰ σπυρίδας.
translation:
  text: And they ate and were satisfied, and they picked up seven baskets of leftover
    pieces.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek σπυρίδας refers to baskets, likely larger hampers; Mark uses a different
      word in the feeding of the five thousand (κόφινοι, 6:43).
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔφαγον
  chosen: they ate
  alternatives:
  - they ate up
  lexicon: BDAG
  rationale: Aorist active indicative of ἐσθίω, straightforward narrative past. Simple
    'ate' best matches the plain sense without adding emphasis not required by the
    context.
- source_word: ἐχορτάσθησαν
  chosen: were satisfied
  alternatives:
  - were filled
  - had enough to eat
  lexicon: BDAG
  rationale: χορτάζω here denotes being fed to the point of sufficiency. 'Were satisfied'
    is natural modern English and preserves the sense of full provision better than
    the more wooden 'were filled.'
- source_word: ἦραν
  chosen: they picked up
  alternatives:
  - they took up
  - they gathered up
  lexicon: BDAG
  rationale: Although αἴρω literally means 'take up' or 'lift,' in this collection
    context 'picked up' is idiomatic English and accurately conveys the action of
    gathering the remaining fragments.
- source_word: περισσεύματα
  chosen: leftover
  alternatives:
  - what was left over
  - surplus
  lexicon: BDAG
  rationale: The noun refers to what remained in excess after the meal. Rendering
    it adjectivally with 'leftover' in English produces a natural phrase with 'pieces'
    while preserving the idea of abundance remaining.
- source_word: κλασμάτων
  chosen: pieces
  alternatives:
  - fragments
  - broken pieces
  lexicon: BDAG
  rationale: κλάσματα are pieces broken from bread or food. 'Pieces' is clear and
    readable; 'fragments' is possible but slightly more formal. The genitive is represented
    in the English phrase 'leftover pieces.'
- source_word: ἑπτὰ σπυρίδας
  chosen: seven baskets
  alternatives:
  - seven large baskets
  lexicon: BDAG
  rationale: σπυρίς denotes a basket, and in Mark's feeding narratives it is distinct
    from κόφινος used elsewhere. Because English readers may not track the distinction
    in the main text, 'seven baskets' keeps the text readable, while the size/distinction
    can be preserved in a footnote.
