id: MRK.8.7
reference: Mark 8:7
source:
  edition: SBLGNT
  text: καὶ εἶχον ἰχθύδια ὀλίγα· καὶ εὐλογήσας ⸀αὐτὰ εἶπεν ⸂καὶ ταῦτα παρατιθέναι⸃.
translation:
  text: And they had a few small fish; and after blessing them, he told them to set these also before them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'he said to serve these also.' The Greek infinitive παρατιθέναι can be rendered more dynamically as 'to serve.'
    reason: lexical_alternative
  - marker: b
    text: Or 'he said that these also should be set before them'.
    reason: previous_rendering
lexical_decisions:
- source_word: ἰχθύδια
  chosen: small fish
  alternatives:
  - little fish
  - fish
  lexicon: BDAG
  rationale: The diminutive form suggests small fish rather than simply generic 'fish.' 'Small fish' is natural modern English and preserves the nuance without sounding childish.
- source_word: ὀλίγα
  chosen: a few
  alternatives:
  - few
  - a small number of
  lexicon: BDAG
  rationale: Idiomatic English prefers 'a few' with countable items here. It conveys the limited quantity naturally.
- source_word: εὐλογήσας
  chosen: after blessing
  alternatives:
  - having blessed
  - after giving thanks
  lexicon: BDAG
  rationale: The aorist participle is best represented as antecedent action. 'Blessing' is closer to εὐλογέω than 'giving thanks,' though the practical sense in meal contexts overlaps.
- source_word: αὐτά
  chosen: them
  alternatives:
  - it
  lexicon: BDAG
  rationale: The pronoun is neuter plural and refers to the small fish, so 'them' is required in English.
- source_word: καὶ ταῦτα
  chosen: these also
  alternatives:
  - also these
  - these too
  lexicon: BDAG
  rationale: This preserves the additive force of καί and the demonstrative emphasis of ταῦτα in natural English order.
- source_word: παρατιθέναι
  chosen: should be set before them
  alternatives:
  - should be served
  - to set before them
  lexicon: BDAG
  rationale: In meal contexts παρατίθημι means to set food before someone or serve it. 'Should be set before them' preserves the infinitival command sense while remaining clear.
- source_word: εἶπεν
  chosen: he said
  alternatives:
  - he told them
  - he instructed
  lexicon: BDAG
  rationale: λέγω is the standard verb 'say.' The content of the saying implies instruction, but 'said' avoids over-interpretation.
