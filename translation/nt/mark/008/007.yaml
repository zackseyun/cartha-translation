  from: he said that these also should be set before them
  to: he told them to set these also before them
  rationale: The Greek infinitive παρατιθέναι is active, and in constructions with εἶπεν, it typically conveys a direct command or instruction to an implied subject (the disciples). The current passive construction 'should be set before them' is less direct and loses the active voice of the infinitive, making the English slightly awkward and less precise in conveying the command. A more direct active construction would better reflect the Greek, as suggested by the footnote's alternative 'he said to serve these also.'
