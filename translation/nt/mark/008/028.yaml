id: MRK.8.28
reference: Mark 8:28
source:
  edition: SBLGNT
  text: οἱ δὲ ⸂εἶπαν αὐτῷ λέγοντες⸃ ⸀ὅτι Ἰωάννην τὸν βαπτιστήν, καὶ ἄλλοι Ἠλίαν, ἄλλοι
    δὲ ⸂ὅτι εἷς⸃ τῶν προφητῶν.
translation:
  text: They told him, saying, “John the Baptist; and others, Elijah; but others,
    one of the prophets.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more explicitly, “They said to him, ‘John the Baptist; and others, Elijah;
      and others, one of the prophets.’” The Greek leaves the repeated verb ‘say’
      and the implied ‘you are’ unstated in the later clauses.
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ δὲ
  chosen: They
  alternatives:
  - And they
  - So they
  lexicon: BDAG
  rationale: The article with δέ functions as a resumptive subject, referring to the
    disciples from the prior context. English naturally renders this simply as 'They,'
    while the mild connective force of δέ is left implicit.
- source_word: εἶπαν αὐτῷ λέγοντες
  chosen: told him, saying
  alternatives:
  - said to him
  - answered him, saying
  lexicon: BDAG
  rationale: The Greek has a finite verb plus participle from the same lemma (λέγω),
    a common Semitic-style or emphatic reporting construction. 'Told him, saying'
    preserves the doubled speech formula more transparently than collapsing it entirely,
    while remaining readable English.
- source_word: ὅτι
  chosen: — (represented by direct quotation punctuation)
  alternatives:
  - that
  lexicon: BDAG
  rationale: Here ὅτι introduces indirect/direct reported content. In idiomatic English,
    quotation punctuation best conveys the sense without an awkward repeated 'that.'
- source_word: Ἰωάννην τὸν βαπτιστήν
  chosen: John the Baptist
  alternatives:
  - John the Baptizer
  lexicon: BDAG
  rationale: The conventional title 'John the Baptist' is clear and standard in English.
    'Baptizer' is possible and more transparent to the verbal root, but 'Baptist'
    is the established title for the historical figure and does not import denominational
    meaning in this context.
- source_word: ἄλλοι ... ἄλλοι δὲ
  chosen: and others ... but others
  alternatives:
  - others ... and others
  - some ... others
  lexicon: BDAG
  rationale: 'This preserves the distributive contrast in the Greek: one group says
    one thing, another group something else. The second δέ is reflected with ''but''
    to mark the final contrast.'
- source_word: Ἠλίαν
  chosen: Elijah
  alternatives:
  - Elias
  lexicon: BDAG
  rationale: Personal names are transliterated by standard conventions. 'Elijah' is
    the standard English form.
- source_word: ὅτι εἷς τῶν προφητῶν
  chosen: one of the prophets
  alternatives:
  - that you are one of the prophets
  lexicon: BDAG
  rationale: The Greek ellipsis assumes the same implied predicate from the earlier
    clauses ('they say [you are]'). English can preserve the concise verbless style
    in the quotation while still being understandable. The second ὅτι is likewise
    absorbed into the quotation format.
- source_word: προφητῶν
  chosen: prophets
  lexicon: BDAG
  rationale: Standard rendering of προφήτης in this context, referring to Israel's
    prophetic figures.
