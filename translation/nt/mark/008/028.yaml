theological_decisions:
- issue: Rendering the popular identifications of Jesus
  chosen_reading: The verse is translated as a list of reported identifications without
    expanding the implied 'you are' in every clause.
  alternative_readings:
  - They answered him, 'John the Baptist; and others say Elijah; and others, one of
    the prophets.'
  - They told him, 'That you are John the Baptist, and others that you are Elijah,
    and others that you are one of the prophets.'
  rationale: The Greek is elliptical after the first report marker, and the text's
    force lies in the range of public opinions about Jesus rather than in a fully
    explicit syntactic restatement. Preserving the compressed list reflects the source
    while remaining intelligible.
  doctrine_reference: Translation philosophy §3, §6
