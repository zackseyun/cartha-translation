theological_decisions:
- issue: Force of the discipleship commands
  chosen_reading: A general call to any prospective disciple, expressed with imperative
    force as 'let him deny himself, take up his cross, and follow me.'
  alternative_readings:
  - A more wooden rendering with repeated 'must' language
  rationale: The Greek uses a conditional clause followed by third-person imperatives.
    The translation preserves the open invitation ('If anyone wants') and the binding
    demand of discipleship without importing a denominational framework.
  doctrine_reference: Translation philosophy §§3, 6
- issue: Meaning of σταυρός in context
  chosen_reading: Rendered literally as 'cross' without paraphrasing it as suffering,
    burden, or martyrdom alone.
  alternative_readings:
  - burden
  - instrument of execution
  rationale: The text's metaphor is anchored in the literal Roman cross and should
    remain theologically weighty and historically concrete. Paraphrases would narrow
    or domesticate the image beyond what the Greek states.
  doctrine_reference: Translation philosophy §§1, 6
