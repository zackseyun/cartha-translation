id: MRK.8.18
reference: Mark 8:18
source:
  edition: SBLGNT
  text: ὀφθαλμοὺς ἔχοντες οὐ βλέπετε καὶ ὦτα ἔχοντες οὐκ ἀκούετε; καὶ οὐ μνημονεύετε
translation:
  text: Having eyes, do you not see? And having ears, do you not hear? And do you
    not remember?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Though you have eyes, do you not perceive? And though you have ears,
      do you not understand?' The Greek uses the ordinary verbs 'see' and 'hear,'
      which in context can also imply spiritual perception.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὀφθαλμοὺς ἔχοντες
  chosen: Having eyes
  alternatives:
  - Though you have eyes
  - You have eyes
  lexicon: BDAG
  rationale: A participial construction used concessively/rhetorically. 'Having eyes'
    preserves the Greek form while remaining natural in English; alternatives are
    possible but slightly more interpretive.
- source_word: βλέπετε
  chosen: do you not see
  alternatives:
  - are you not seeing
  - do you not perceive
  lexicon: BDAG
  rationale: Present indicative in a rhetorical question. 'See' is the most direct
    rendering; 'perceive' captures possible figurative force but is more interpretive
    than the immediate lexical sense.
- source_word: ὦτα ἔχοντες
  chosen: having ears
  alternatives:
  - though you have ears
  - you have ears
  lexicon: BDAG
  rationale: Parallel to the first participial phrase and best rendered consistently.
    It preserves the rhetorical structure of the Greek.
- source_word: ἀκούετε
  chosen: do you not hear
  alternatives:
  - do you not listen
  - do you not understand
  lexicon: BDAG
  rationale: The basic sense is 'hear.' In context it may imply failure to heed or
    understand, but 'hear' best preserves the lexical wording and lets the context
    carry the deeper implication.
- source_word: μνημονεύετε
  chosen: do you not remember
  alternatives:
  - do you not recall
  - do you not keep in mind
  lexicon: BDAG
  rationale: '''Remember'' is the clearest and most idiomatic rendering of the present
    indicative here, fitting Jesus'' rebuke about the disciples'' failure to retain
    prior understanding.'
- source_word: καὶ
  chosen: And
  alternatives:
  - also
  - even
  lexicon: BDAG
  rationale: Rendered straightforwardly as 'And' to preserve the cumulative force
    of the repeated clauses in Jesus' questioning.
- source_word: οὐ / οὐκ
  chosen: not
  lexicon: BDAG
  rationale: 'Standard negation in each rhetorical question; in English it is naturally
    incorporated with do-support: ''do you not ...?'''
