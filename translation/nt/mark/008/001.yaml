theological_decisions:
- issue: Narrative tense in Mark's historical present
  chosen_reading: Retain present tense in 'says to them'
  alternative_readings:
  - 'Smooth to past tense: ''said to them'''
  rationale: This is not a doctrinal issue but a translation-philosophy decision affecting
    how Mark's style is represented. Preserving the historical present reflects the
    Greek discourse feature and keeps the narrative vivid.
  doctrine_reference: DOCTRINE.md Translation philosophy §5-6
