id: MRK.8.1
reference: Mark 8:1
source:
  edition: SBLGNT
  text: Ἐν ἐκείναις ταῖς ἡμέραις ⸂πάλιν πολλοῦ⸃ ὄχλου ὄντος καὶ μὴ ἐχόντων τί φάγωσιν,
    ⸀προσκαλεσάμενος τοὺς ⸀μαθητὰς λέγει αὐτοῖς·
translation:
  text: In those days, when again a large crowd was present and they had nothing to
    eat, he called his disciples to himself and says to them,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''there was again a great crowd.'' The Greek uses a genitive absolute:
      ''again, a large crowd being present.'''
    reason: lexical_alternative
  - marker: b
    text: Greek 'says to them'; Mark often uses the historical present where English
      translations sometimes use the past tense 'said.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐν ἐκείναις ταῖς ἡμέραις
  chosen: In those days
  alternatives:
  - During those days
  lexicon: BDAG
  rationale: Standard temporal idiom; 'In those days' is natural English and preserves
    the narrative setting without over-specifying duration.
- source_word: πάλιν
  chosen: again
  alternatives:
  - once more
  lexicon: BDAG
  rationale: Marks recurrence of a similar situation in Mark's narrative; 'again'
    is the most direct and idiomatic rendering.
- source_word: πολλοῦ ὄχλου ὄντος
  chosen: a large crowd was present
  alternatives:
  - there was a great crowd
  - a large crowd being there
  lexicon: BDAG
  rationale: The genitive absolute indicates circumstantial background. 'A large crowd
    was present' renders the sense clearly in modern English while preserving the
    substantial size indicated by πολλοῦ ὄχλου.
- source_word: καὶ μὴ ἐχόντων τί φάγωσιν
  chosen: and they had nothing to eat
  alternatives:
  - and they had nothing they could eat
  - and they had nothing to eat with
  lexicon: BDAG
  rationale: Refers to the crowd's lack of food. The indefinite/interrogative τί with
    subjunctive φάγωσιν is idiomatically expressed in English as 'nothing to eat.'
- source_word: προσκαλεσάμενος
  chosen: he called ... to himself
  alternatives:
  - summoning
  - calling over
  lexicon: BDAG
  rationale: The middle participle of προσκαλέομαι commonly means to call or summon
    to oneself. Including 'to himself' reflects the middle nuance more fully than
    a bare 'called.'
- source_word: τοὺς μαθητάς
  chosen: his disciples
  alternatives:
  - the disciples
  lexicon: BDAG
  rationale: Although αὐτοῦ is not explicit, English idiom naturally supplies possession
    in this narrative context, since these are Jesus' disciples. This avoids awkwardness
    while not changing the referent.
- source_word: λέγει αὐτοῖς
  chosen: says to them
  alternatives:
  - said to them
  lexicon: BDAG
  rationale: Mark frequently uses the historical present λέγει. Rendering it as 'says'
    preserves Mark's vivid narrative style better than smoothing it to the past tense.
