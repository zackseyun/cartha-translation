id: MRK.8.38
reference: Mark 8:38
source:
  edition: SBLGNT
  text: ὃς γὰρ ἐὰν ἐπαισχυνθῇ με καὶ τοὺς ἐμοὺς λόγους ἐν τῇ γενεᾷ ταύτῃ τῇ μοιχαλίδι
    καὶ ἁμαρτωλῷ, καὶ ὁ υἱὸς τοῦ ἀνθρώπου ἐπαισχυνθήσεται αὐτὸν ὅταν ἔλθῃ ἐν τῇ δόξῃ
    τοῦ πατρὸς αὐτοῦ μετὰ τῶν ἀγγέλων τῶν ἁγίων.
translation:
  text: For whoever is ashamed of me and of my words in this adulterous and sinful
    generation, the Son of Man will also be ashamed of him when he comes in the glory
    of his Father with the holy angels.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'unfaithful and sinful generation.' 'Adulterous' is kept in the main
      text because the Greek uses the concrete prophetic metaphor of adultery for
      covenantal unfaithfulness.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπαισχυνθῇ / ἐπαισχυνθήσεται
  chosen: is ashamed of / will also be ashamed of
  alternatives:
  - is embarrassed by / will be embarrassed by
  - disowns / will disown
  lexicon: BDAG
  rationale: The verb denotes shame in relation to a person or message. 'Ashamed of'
    is the most direct and idiomatic rendering and preserves the reciprocal force
    between present human response and future response of the Son of Man. 'Disown'
    is interpretive and stronger than the lexical sense here.
- source_word: λόγους
  chosen: words
  alternatives:
  - message
  - sayings
  lexicon: BDAG
  rationale: Plural 'words' reflects the Greek plural and keeps the personal, verbal
    emphasis. 'Message' is smoother but more interpretive; 'sayings' is possible but
    narrower and less natural in this warning context.
- source_word: γενεᾷ
  chosen: generation
  alternatives:
  - age
  - people
  lexicon: BDAG
  rationale: '''Generation'' is the standard and contextually fitting rendering, referring
    to the present moral community/time. ''Age'' would shift toward a more temporal
    abstraction not required by the Greek.'
- source_word: μοιχαλίδι
  chosen: adulterous
  alternatives:
  - unfaithful
  lexicon: BDAG
  rationale: Literally 'adulterous,' here used metaphorically for covenantal/moral
    unfaithfulness in prophetic style. The literal term should be preserved in the
    main text; the metaphorical nuance can be understood from context.
- source_word: ἁμαρτωλῷ
  chosen: sinful
  alternatives:
  - wicked
  lexicon: BDAG
  rationale: '''Sinful'' is the straightforward adjectival equivalent and pairs naturally
    with ''adulterous.'' ''Wicked'' adds intensity not demanded by the term.'
- source_word: ὁ υἱὸς τοῦ ἀνθρώπου
  chosen: the Son of Man
  lexicon: BDAG
  rationale: This is the established translation of the title and preserves both its
    idiomatic form and its Danielic/theological resonance. Rendering it more dynamically
    would obscure the title's significance.
- source_word: δόξῃ
  chosen: glory
  alternatives:
  - splendor
  - majesty
  lexicon: BDAG
  rationale: '''Glory'' is the standard biblical rendering and best preserves the
    theological weight of divine honor and radiance. Alternatives are possible but
    less consistent with broader biblical usage.'
- source_word: μετὰ τῶν ἀγγέλων τῶν ἁγίων
  chosen: with the holy angels
  alternatives:
  - with the angels, the holy ones
  - with his holy angels
  lexicon: BDAG
  rationale: '''With the holy angels'' is natural English and reflects the attributive
    construction. ''His holy angels'' is a common harmonizing rendering, but the possessive
    is not present in the Greek and should not be added.'
- source_word: ὃς γὰρ ἐὰν
  chosen: For whoever
  alternatives:
  - For if anyone
  - Whoever indeed
  lexicon: BDAG
  rationale: This construction introduces a general conditional statement. 'For whoever'
    captures the generic force cleanly in English and connects with the explanatory
    γάρ.
- source_word: ἐν τῇ γενεᾷ ταύτῃ
  chosen: in this ... generation
  alternatives:
  - among this ... generation
  lexicon: BDAG
  rationale: '''In this generation'' is the most natural rendering of ἐν with the
    dative here, indicating the social-moral setting in which the shame is manifested.'
