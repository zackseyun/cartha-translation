theological_decisions:
- issue: Metaphorical force of 'adulterous'
  chosen_reading: Retain 'adulterous' in the main text as a prophetic metaphor for
    spiritual and moral unfaithfulness.
  alternative_readings:
  - Render as 'unfaithful' to make the metaphor explicit
  rationale: The Greek uses the concrete moral term μοιχαλίδι, echoing biblical prophetic
    language about covenant infidelity. Preserving the metaphor maintains intertextual
    and theological depth without over-paraphrasing.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; never paraphrase beyond what the source warrants.'
- issue: Reference of 'the Son of Man'
  chosen_reading: Keep the self-referential messianic title 'the Son of Man' rather
    than substituting 'I' or 'the Messiah.'
  alternative_readings:
  - '''I'''
  - '''the Messiah'''
  rationale: The Greek presents a distinct christological title with eschatological
    significance. Replacing it with a pronoun or another title would flatten the text's
    theological texture and remove the allusive force.
  doctrine_reference: 'Affirmations: Nicene/Chalcedonian orthodoxy; Translation philosophy:
    translate titles to preserve meaning where possible, while preserving theological
    tension rather than resolving it.'
- issue: Gendered pronoun αὐτόν
  chosen_reading: Render as 'him'
  alternative_readings:
  - them
  rationale: The Greek singular masculine pronoun matches the generic singular construction.
    Per the gender-accurate policy, the English should reflect the source grammar
    and representative force rather than neutralize it in the main text.
  doctrine_reference: 'Translation philosophy: gender-accurate over gender-neutral.'
