theological_decisions:
- issue: Generic ἄνθρωποι in Jesus' question
  chosen_reading: people
  alternative_readings:
  - men
  rationale: The noun is grammatically masculine but semantically generic in this
    context, referring to the public at large. Rendering it as 'people' preserves
    the source intent without implying only males are in view, consistent with the
    gender-accurate policy.
