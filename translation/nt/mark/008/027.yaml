id: MRK.8.27
reference: Mark 8:27
source:
  edition: SBLGNT
  text: Καὶ ἐξῆλθεν ὁ Ἰησοῦς καὶ οἱ μαθηταὶ αὐτοῦ εἰς τὰς κώμας Καισαρείας τῆς Φιλίππου·
    καὶ ἐν τῇ ὁδῷ ἐπηρώτα τοὺς μαθητὰς αὐτοῦ λέγων αὐτοῖς· Τίνα με λέγουσιν οἱ ἄνθρωποι
    εἶναι;
translation:
  text: And Jesus went out, with his disciples, to the villages of Caesarea Philippi.
    And on the way he was asking his disciples, saying to them, “Who do people say
    that I am?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, “Who do men say that I am?” The Greek uses ἄνθρωποι
      generically for people, not specifically males.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξῆλθεν
  chosen: went out
  alternatives:
  - went forth
  - departed
  lexicon: BDAG
  rationale: Aorist of ἐξέρχομαι is naturally rendered 'went out.' This preserves
    the movement sense without archaic English ('went forth') or overinterpreting
    destination nuance ('departed').
- source_word: κώμας
  chosen: villages
  alternatives:
  - towns
  - settlements
  lexicon: BDAG
  rationale: κώμη commonly denotes a village or rural settlement rather than a major
    city. 'Villages' best matches the ordinary sense and fits the regional setting
    around Caesarea Philippi.
- source_word: Καισαρείας τῆς Φιλίππου
  chosen: Caesarea Philippi
  alternatives:
  - the Caesarea of Philip
  lexicon: BDAG
  rationale: This is a standard place-name in English. Per translation philosophy,
    names are transliterated by standard conventions rather than translated woodenly.
- source_word: ἐν τῇ ὁδῷ
  chosen: on the way
  alternatives:
  - on the road
  - along the way
  lexicon: BDAG
  rationale: The phrase can be rendered literally as 'on the road,' but 'on the way'
    is idiomatic modern English and preserves the narrative movement motif that is
    prominent in Mark.
- source_word: ἐπηρώτα
  chosen: was asking
  alternatives:
  - asked
  - kept asking
  - questioned
  lexicon: BDAG
  rationale: The imperfect tense suggests ongoing or inceptive action in past time.
    'Was asking' preserves that aspect better than the simple past 'asked.'
- source_word: λέγων αὐτοῖς
  chosen: saying to them
  alternatives:
  - and said to them
  lexicon: BDAG
  rationale: 'The participial construction is retained in natural English to reflect
    the Greek flow: he was asking them, saying to them. This avoids flattening the
    syntax more than necessary.'
- source_word: Τίνα με λέγουσιν οἱ ἄνθρωποι εἶναι;
  chosen: Who do people say that I am?
  alternatives:
  - Who do men say that I am?
  - Who are people saying that I am?
  lexicon: BDAG
  rationale: 'τίνα ... εἶναι asks about identity: ''Who ... am I?'' ἄνθρωποι here
    refers generically to people, not specifically males, so ''people'' is more accurate
    than ''men'' under the gender-accurate policy. ''Do people say'' is idiomatic
    English for the present tense λέγουσιν.'
- source_word: οἱ μαθηταὶ αὐτοῦ / τοὺς μαθητὰς αὐτοῦ
  chosen: his disciples
  alternatives:
  - the disciples
  lexicon: BDAG
  rationale: The possessive αὐτοῦ is explicit in both occurrences and should be represented.
    'Disciples' is the standard and contextually appropriate rendering of μαθηταί.
