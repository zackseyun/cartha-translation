theological_decisions:
- issue: Force of παρρησίᾳ in relation to Jesus' passion prediction
  chosen_reading: Rendered as 'openly' to emphasize that Jesus stated this plainly
    and without concealment.
  alternative_readings:
  - plainly
  - boldly
  rationale: 'This is primarily a lexical decision, but it also affects interpretation:
    the verse underscores the clarity of Jesus'' teaching, which explains Peter''s
    direct reaction. The rendering avoids importing a theological nuance beyond the
    text while preserving the narrative contrast.'
  doctrine_reference: 'Translation philosophy: preserve the source text''s plain sense;
    readable modern English.'
