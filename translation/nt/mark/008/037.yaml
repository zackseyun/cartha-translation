theological_decisions:
- issue: Rendering of ψυχή in a salvation-context saying
  chosen_reading: life
  alternative_readings:
  - soul
  rationale: The context in Mark 8:35–37 contrasts gaining the world with losing one's
    ψυχή, where the term includes earthly life yet extends to the person's deepest
    self. Using 'life' in the main text preserves readability and contextual coherence,
    while a footnote preserves 'soul' to avoid collapsing the theological depth of
    the term into merely biological life.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather
    than resolve it); §6 (readable modern English, not archaic or academic)
