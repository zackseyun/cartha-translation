id: MRK.8.37
reference: Mark 8:37
source:
  edition: SBLGNT
  text: ⸂τί γὰρ⸃ ⸀δοῖ ἄνθρωπος ἀντάλλαγμα τῆς ψυχῆς αὐτοῦ;
translation:
  text: For what can a man give in exchange for his life?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "soul"; the Greek word can mean "life," "self," or "soul" depending on
      context.
    reason: lexical_alternative
lexical_decisions:
- source_word: τί γὰρ
  chosen: For what
  alternatives:
  - For what indeed
  - For what then
  lexicon: BDAG
  rationale: τί introduces the interrogative 'what?' and γάρ gives explanatory force
    linking this verse to the previous statement. 'For what' preserves both the question
    and the explanatory connection in natural English.
- source_word: δοῖ
  chosen: can give
  alternatives:
  - would give
  - might give
  lexicon: BDAG
  rationale: δοῖ is aorist active subjunctive of δίδωμι in a deliberative/rhetorical
    question. 'Can give' communicates practical possibility in idiomatic English and
    fits the rhetorical force better than a stiffer 'would give.'
- source_word: ἄνθρωπος
  chosen: a man
  alternatives:
  - a person
  - someone
  lexicon: BDAG
  rationale: The noun is singular masculine with representative/generic force. Per
    the translation philosophy's gender-accurate principle, 'a man' best matches the
    source form and idiom, while still functioning generically.
- source_word: ἀντάλλαγμα
  chosen: in exchange
  alternatives:
  - as an exchange
  - as a substitute price
  - in return
  lexicon: BDAG
  rationale: The noun denotes something given in return or exchange. Rendering it
    with the English prepositional phrase 'in exchange' is the most natural way to
    express the sense after 'give' without awkwardness.
- source_word: τῆς ψυχῆς αὐτοῦ
  chosen: for his life
  alternatives:
  - for his soul
  - for himself
  lexicon: BDAG
  rationale: ψυχή can mean 'life,' 'self,' or 'soul' depending on context. In the
    immediate context (vv. 35–37), ψυχή carries the layered sense of one's life as
    the whole self that cannot be recovered by worldly gain. 'Life' is the clearest
    main-text rendering in contemporary English and aligns with the preceding context,
    while 'soul' remains an important alternative to preserve in a footnote because
    of the term's theological resonance.
