theological_decisions:
- issue: Narrative sequence and eucharistic resonance
  chosen_reading: Rendered εὐχαριστήσας straightforwardly as 'after giving thanks'
    without importing sacramental terminology.
  alternative_readings:
  - gave thanks [with explicit eucharistic overtones]
  rationale: The verse uses ordinary meal language that may echo later Christian practice,
    but the text itself does not explicitly teach sacramental theology here. The translation
    preserves the wording without doctrinal expansion.
  doctrine_reference: 'Translation philosophy: Never import doctrinal claims the text
    does not make; preserve theological tension rather than resolve it.'
