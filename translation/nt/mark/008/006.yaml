id: MRK.8.6
reference: Mark 8:6
source:
  edition: SBLGNT
  text: καὶ ⸀παραγγέλλει τῷ ὄχλῳ ἀναπεσεῖν ἐπὶ τῆς γῆς· καὶ λαβὼν τοὺς ἑπτὰ ἄρτους
    εὐχαριστήσας ἔκλασεν καὶ ἐδίδου τοῖς μαθηταῖς αὐτοῦ ἵνα ⸀παρατιθῶσιν καὶ παρέθηκαν
    τῷ ὄχλῳ.
translation:
  text: And he instructed the crowd to recline on the ground. Then, taking the seven
    loaves, after giving thanks he broke them and kept giving them to his disciples
    so that they might set them before the crowd, and they set them before the crowd.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'sit down.' The Greek verb more specifically suggests reclining for a
      meal.
    reason: lexical_alternative
  - marker: b
    text: Or 'serve them.' The Greek literally means 'set before.'
    reason: lexical_alternative
lexical_decisions:
- source_word: παραγγέλλει
  chosen: instructed
  alternatives:
  - commanded
  - directed
  lexicon: BDAG
  rationale: The verb denotes giving an order or instruction. 'Instructed' fits readable
    modern English while preserving the authoritative sense without sounding overly
    harsh. The historical present is rendered as simple past for natural English narrative
    style.
- source_word: ἀναπεσεῖν
  chosen: to recline
  alternatives:
  - to sit down
  - to lie down
  lexicon: BDAG
  rationale: The verb commonly refers to reclining for a meal rather than merely sitting.
    'Recline' preserves the meal-setting nuance better than the more generic 'sit
    down.'
- source_word: ἐπὶ τῆς γῆς
  chosen: on the ground
  alternatives:
  - on the earth
  - on the land
  lexicon: BDAG
  rationale: In this context γῆ refers to the surface on which the crowd reclines.
    'On the ground' is the natural contextual rendering.
- source_word: λαβὼν τοὺς ἑπτὰ ἄρτους
  chosen: taking the seven loaves
  alternatives:
  - having taken the seven loaves
  - taking the seven breads
  lexicon: BDAG
  rationale: ἄρτους here refers to loaves of bread in a feeding context. 'Loaves'
    is idiomatic and specific. The participle is rendered with a natural English participial
    clause.
- source_word: εὐχαριστήσας
  chosen: after giving thanks
  alternatives:
  - having given thanks
  - after thanking God
  lexicon: BDAG
  rationale: The participle indicates thanksgiving said over the food. 'After giving
    thanks' is natural English and avoids adding an explicit object ('God') not stated
    in the Greek.
- source_word: ἔκλασεν
  chosen: broke them
  alternatives:
  - broke
  lexicon: BDAG
  rationale: The object is implicit from the preceding 'loaves' and is supplied in
    English for clarity.
- source_word: ἐδίδου
  chosen: kept giving
  alternatives:
  - gave
  - was giving
  lexicon: BDAG
  rationale: The imperfect tense suggests continued or repeated action. 'Kept giving'
    captures the distributive, ongoing sense better than simple 'gave.'
- source_word: ἵνα παρατιθῶσιν
  chosen: so that they might set them before the crowd
  alternatives:
  - so that they might serve them
  - for them to place before the crowd
  lexicon: BDAG
  rationale: παρατίθημι literally means to place or set before, especially food. 'Set
    them before' preserves the concrete serving imagery better than the more interpretive
    'serve.'
- source_word: παρέθηκαν
  chosen: they set them before the crowd
  alternatives:
  - they served the crowd
  - they placed them before the crowd
  lexicon: BDAG
  rationale: The aorist narrates the disciples' completed action. Repeating 'set them
    before the crowd' maintains lexical consistency with παρατιθῶσιν while remaining
    idiomatic.
- source_word: ὄχλος
  chosen: crowd
  alternatives:
  - multitude
  - people
  lexicon: BDAG
  rationale: '''Crowd'' is the most natural modern English rendering in this narrative
    context and avoids archaic tone.'
