id: MRK.8.16
reference: Mark 8:16
source:
  edition: SBLGNT
  text: καὶ διελογίζοντο πρὸς ⸀ἀλλήλους ὅτι ἄρτους οὐκ ⸀ἔχουσιν.
translation:
  text: And they were discussing with one another that they had no bread.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'they had no loaves.'
    reason: lexical_alternative
lexical_decisions:
- source_word: διελογίζοντο
  chosen: were discussing
  alternatives:
  - were reasoning
  - were debating
  - were talking over
  lexicon: BDAG
  rationale: The imperfect middle indicates an ongoing internal discussion among the
    disciples. 'Were discussing' is natural modern English and preserves the durative
    sense better than the more wooden 'were reasoning.'
- source_word: πρὸς ἀλλήλους
  chosen: with one another
  alternatives:
  - among themselves
  - to one another
  lexicon: BDAG
  rationale: This idiom marks reciprocal interaction. 'With one another' is clear
    and idiomatic in English; 'among themselves' is also possible but slightly less
    direct.
- source_word: ὅτι
  chosen: that
  alternatives:
  - because
  lexicon: BDAG
  rationale: Here ὅτι introduces the content of their discussion rather than a causal
    clause. Thus 'that' best reflects the syntax and sense.
- source_word: ἄρτους
  chosen: bread
  alternatives:
  - loaves
  lexicon: BDAG
  rationale: Although the plural noun literally means 'loaves,' English commonly uses
    'bread' as a mass noun in this context. This yields natural English without materially
    losing the sense. The alternative 'loaves' is worth preserving because the immediate
    narrative context concerns counted loaves.
- source_word: οὐκ ἔχουσιν
  chosen: they had no
  alternatives:
  - they do not have
  - they did not have
  lexicon: BDAG
  rationale: Within indirect discourse after an imperfect main verb, English commonly
    backshifts the present to past ('they had no') to reflect the narrative frame.
    This is smoother than a more literal present-tense rendering while preserving
    the meaning.
