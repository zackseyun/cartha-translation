theological_decisions:
- issue: Rendering of healing actions without softening their physicality
  chosen_reading: Retain the concrete sequence of Jesus spitting on the man's eyes
    and laying hands on him.
  alternative_readings:
  - Use a smoother paraphrase that minimizes the physical detail
  rationale: The verse narrates a tangible healing process. Optimal equivalence should
    preserve the embodied, even startling, details rather than sanitize them for modern
    readers.
  doctrine_reference: Translation philosophy §§1, 6
- issue: Potential ritual implication of 'laying hands'
  chosen_reading: Translate as 'laying his hands on him' without adding sacramental
    or ordination language.
  alternative_readings:
  - Interpret as a formal ritual act
  rationale: The phrase is a straightforward description of Jesus' healing touch in
    context. The translation should not import later ecclesial meanings not demanded
    by the text.
  doctrine_reference: Affirmations; Translation philosophy §1
