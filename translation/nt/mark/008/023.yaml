id: MRK.8.23
reference: Mark 8:23
source:
  edition: SBLGNT
  text: καὶ ἐπιλαβόμενος τῆς χειρὸς τοῦ τυφλοῦ ⸀ἐξήνεγκεν αὐτὸν ἔξω τῆς κώμης, καὶ
    πτύσας εἰς τὰ ὄμματα αὐτοῦ, ἐπιθεὶς τὰς χεῖρας αὐτῷ, ἐπηρώτα αὐτόν· Εἴ τι ⸀βλέπεις;
translation:
  text: And taking the blind man by the hand, he led him out of the village; and after
    spitting on his eyes and laying his hands on him, he asked him, “Do you see anything?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more literally, “spitting into his eyes.”
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπιλαβόμενος τῆς χειρὸς
  chosen: taking ... by the hand
  alternatives:
  - taking hold of his hand
  - grasping the hand
  lexicon: BDAG
  rationale: The participle ἐπιλαβόμενος with the genitive of χείρ idiomatically means
    taking hold of someone by the hand. 'Taking ... by the hand' is natural English
    and preserves the concrete action.
- source_word: τοῦ τυφλοῦ
  chosen: the blind man
  alternatives:
  - the blind one
  lexicon: BDAG
  rationale: The adjective τυφλός is substantival here. 'The blind man' is idiomatic
    English and reflects the masculine singular referent without awkwardness.
- source_word: ἐξήνεγκεν
  chosen: led ... out
  alternatives:
  - brought ... out
  - took ... out
  lexicon: BDAG
  rationale: Although ἐκφέρω often means 'carry out' or 'bring out,' in this context
    Jesus is taking a man by the hand and moving him outside the village. 'Led ...
    out' best fits the scene in natural English while preserving the directional force.
- source_word: ἔξω τῆς κώμης
  chosen: out of the village
  alternatives:
  - outside the village
  - out of the town
  lexicon: BDAG
  rationale: κώμη refers to a village or small settlement. 'Village' is the most straightforward
    rendering. 'Out of the village' matches the motion expressed by ἔξω with the genitive.
- source_word: πτύσας εἰς τὰ ὄμματα αὐτοῦ
  chosen: after spitting on his eyes
  alternatives:
  - spitting into his eyes
  - having spat on his eyes
  lexicon: BDAG
  rationale: The aorist participle πτύσας is rendered temporally as 'after spitting.'
    εἰς with ὄμματα is somewhat vivid; English idiom prefers 'on his eyes' here, though
    'into his eyes' is a possible more literal alternative preserved in the footnote.
- source_word: ἐπιθεὶς τὰς χεῖρας αὐτῷ
  chosen: laying his hands on him
  alternatives:
  - placing his hands on him
  - putting his hands on him
  lexicon: BDAG
  rationale: This is a common idiom for physical touch with the hands. 'Laying his
    hands on him' is both natural and consistent with biblical usage, without importing
    later ritual connotations beyond the text.
- source_word: ἐπηρώτα
  chosen: he asked
  alternatives:
  - he was asking
  - he questioned
  lexicon: BDAG
  rationale: The imperfect can suggest ongoing or inceptive action, but in English
    narrative 'he asked' is the clearest rendering. The context presents a direct
    question following the healing action.
- source_word: Εἴ τι βλέπεις;
  chosen: Do you see anything?
  alternatives:
  - Can you see anything?
  - Do you see something?
  lexicon: BDAG
  rationale: The construction expects a direct question about whether any sight is
    present. 'Do you see anything?' is idiomatic and preserves the indefinite τι without
    overinterpreting it.
