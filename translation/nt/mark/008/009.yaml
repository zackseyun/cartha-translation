id: MRK.8.9
reference: Mark 8:9
source:
  edition: SBLGNT
  text: ἦσαν ⸀δὲ ὡς τετρακισχίλιοι. καὶ ἀπέλυσεν αὐτούς.
translation:
  text: Now there were about four thousand, and he sent them away.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'dismissed them.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἦσαν
  chosen: there were
  alternatives:
  - they were
  lexicon: BDAG
  rationale: The existential use of εἰμί here is best rendered idiomatically in English
    as 'there were,' introducing the size of the crowd rather than predicating a quality
    about them.
- source_word: δὲ
  chosen: Now
  alternatives:
  - and
  - then
  - ', (left untranslated)'
  lexicon: BDAG
  rationale: δέ is a mild connective. 'Now' preserves the discourse transition in
    readable English without overstating sequence.
- source_word: ὡς
  chosen: about
  alternatives:
  - approximately
  - some
  lexicon: BDAG
  rationale: ὡς with a number marks approximation. 'About' is natural modern English
    and accurately conveys the non-exact figure.
- source_word: τετρακισχίλιοι
  chosen: four thousand
  lexicon: BDAG
  rationale: The numeral is straightforward and refers to the size of the assembled
    group.
- source_word: ἀπέλυσεν
  chosen: sent away
  alternatives:
  - dismissed
  - released
  lexicon: BDAG
  rationale: ἀπολύω in this context means to dismiss or send people away. 'Sent away'
    is clear, natural, and fits the narrative context of dispersing the crowd after
    feeding them.
- source_word: αὐτούς
  chosen: them
  lexicon: BDAG
  rationale: The pronoun refers back to the crowd and is naturally rendered 'them'
    in English.
