theological_decisions:
- issue: Force of Jesus' command in the so-called messianic secrecy context
  chosen_reading: Render the command as a strong warning not to disclose his identity,
    without importing a broader theory into the translation.
  alternative_readings:
  - Render more literally as 'rebuked them'
  - Render more strongly as 'strictly ordered them'
  rationale: The verse clearly presents a forceful prohibition, but the translation
    should not embed an interpretive theory about why Jesus imposed secrecy. 'Warned
    them to tell no one about him' preserves the narrative force without overreading
    the theology.
  doctrine_reference: Preserve theological tension rather than resolve it.
