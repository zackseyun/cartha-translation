id: MRK.8.13
reference: Mark 8:13
source:
  edition: SBLGNT
  text: καὶ ἀφεὶς αὐτοὺς ⸂πάλιν ἐμβὰς⸃ ἀπῆλθεν εἰς τὸ πέραν.
translation:
  text: And leaving them, he got back into the boat and went to the other side.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'again, having boarded, he went away to the other side.' The adverb πάλιν
      may be rendered 'again' rather than 'back.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀφεὶς
  chosen: leaving
  alternatives:
  - having left
  - leaving behind
  lexicon: BDAG
  rationale: Aorist participle of ἀφίημι here has the straightforward sense of departing
    from or leaving persons behind. 'Leaving' is natural English and preserves the
    participial linkage to the main verb without overformal stiffness.
- source_word: αὐτοὺς
  chosen: them
  lexicon: BDAG
  rationale: Direct object referring to the Pharisees in the immediate context. Simple
    pronoun is sufficient and accurate.
- source_word: πάλιν
  chosen: back
  alternatives:
  - again
  - once more
  lexicon: BDAG
  rationale: πάλιν can mean 'again' or 'back.' In this travel context with ἐμβὰς ('having
    boarded'), 'back' best conveys return into the boat in idiomatic English. This
    avoids an awkward 'again boarding' while preserving the sense of repeated movement.
- source_word: ἐμβὰς
  chosen: got into the boat
  alternatives:
  - boarded
  - got in
  lexicon: BDAG
  rationale: The participle means 'having gone in/boarded,' and in Mark's narrative
    context the implied object is the boat. Supplying 'the boat' is warranted by context
    and produces clear English. 'Got into the boat' is more readable than the bare
    'boarded' for modern readers.
- source_word: ἀπῆλθεν
  chosen: went
  alternatives:
  - departed
  - went away
  lexicon: BDAG
  rationale: Aorist indicative of ἀπέρχομαι denotes departure. 'Went' is concise and
    natural here; the directional phrase that follows supplies the destination, so
    'departed' is unnecessary.
- source_word: εἰς τὸ πέραν
  chosen: to the other side
  alternatives:
  - to the far side
  - across
  lexicon: BDAG
  rationale: This is a common Markan expression for crossing to the other side of
    the sea/lake. 'To the other side' is the standard and clearest English rendering,
    preserving the geographical sense without overcompression.
