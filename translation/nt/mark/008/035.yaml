theological_decisions:
- issue: Anthropological sense of ψυχή in Jesus' paradoxical saying
  chosen_reading: Render ψυχή as 'life' in the main text
  alternative_readings:
  - Render ψυχή as 'soul'
  rationale: The immediate context concerns discipleship, self-denial, and the paradox of preserving versus losing one's life for Jesus and the gospel. 'Life' best captures the saying's force without narrowing it to the immaterial aspect of the person. Because 'soul' is a longstanding traditional rendering and can reflect the term's broader semantic range, it is preserved in a footnote rather than excluded.
  doctrine_reference: Translation philosophy §3; §6
- issue: Generic masculine reference
  chosen_reading: Retain 'his' rather than using gender-neutral 'their'
  alternative_readings:
  - their
  rationale: The Greek singular masculine has representative force. Following the project's gender-accurate policy, the translation keeps the singular masculine form rather than neutralizing it, while recognizing that the statement applies generically.
  doctrine_reference: Translation philosophy §4
