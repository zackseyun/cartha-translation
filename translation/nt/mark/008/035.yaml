  category: awkward_english
  tier: 1
  from: for my sake and for the sake of the gospel
  to: for my sake and for the gospel
  rationale: The Greek preposition ἕνεκεν ('for the sake of') governs the compound object ἐμοῦ καὶ τοῦ εὐαγγελίου ('me and the gospel'). Repeating 'for the sake of' in the English rendering is grammatically correct but slightly verbose and less natural than the more common rendering 'for my sake and for the gospel,' where the prepositional idea carries over to the second element without being explicitly repeated.
