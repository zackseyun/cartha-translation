id: MRK.8.35
reference: Mark 8:35
source:
  edition: SBLGNT
  text: ὃς γὰρ ⸀ἐὰν θέλῃ τὴν ⸂ψυχὴν αὐτοῦ⸃ σῶσαι ἀπολέσει αὐτήν· ὃς δ’ ἂν ⸀ἀπολέσει τὴν ⸄ψυχὴν αὐτοῦ⸅ ἕνεκεν ἐμοῦ καὶ τοῦ εὐαγγελίου ⸀σώσει αὐτήν.
translation:
  text: For whoever wants to save his life will lose it, but whoever loses his life for my sake and for the gospel will save it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or soul throughout the verse; the Greek word can mean either 'life' or 'soul' depending on context.
    reason: lexical_alternative
  - marker: b
    text: Or 'for my sake and for the sake of the gospel'.
    reason: previous_rendering
lexical_decisions:
- source_word: ψυχή
  chosen: life
  alternatives:
  - soul
  lexicon: BDAG
  rationale: In this saying, ψυχή carries the sense of one's life/self rather than an explicitly immaterial 'soul.' Rendering it as 'life' preserves the paradox of preserving earthly life versus losing it for Jesus' sake, while avoiding importing a narrower anthropological sense. The alternative 'soul' is worth preserving in a footnote because of traditional familiarity and possible broader resonance.
- source_word: σῶσαι / σώσει
  chosen: save / will save
  alternatives:
  - preserve / will preserve
  lexicon: BDAG
  rationale: The verb σῴζω is rendered 'save' to preserve the verbal correspondence and paradox across the verse and to retain its theological weight. 'Preserve' is possible in context, but 'save' better matches the deliberate contrast with ἀπόλλυμι and the broader Markan usage.
- source_word: ἀπολέσει
  chosen: will lose
  alternatives:
  - will destroy
  - will forfeit
  lexicon: BDAG
  rationale: Here ἀπόλλυμι in relation to ψυχή is best rendered 'lose,' matching the paradoxical saying and standard idiomatic English. 'Destroy' is too strong in this context, and 'forfeit' is interpretive rather than directly lexical.
- source_word: ἕνεκεν ἐμοῦ καὶ τοῦ εὐαγγελίου
  chosen: for my sake and for the sake of the gospel
  alternatives:
  - because of me and the gospel
  lexicon: BDAG
  rationale: ἕνεκεν expresses cause or motive. 'For my sake and for the sake of the gospel' preserves the personal and mission-oriented force and reflects the repeated relation to both ἐμοῦ and τοῦ εὐαγγελίου in natural English.
- source_word: εὐαγγέλιον
  chosen: gospel
  alternatives:
  - good news
  lexicon: BDAG
  rationale: Although 'good news' is a transparent gloss, 'gospel' is concise, natural in this context, and retains the term's established theological and literary force in Mark, where εὐαγγέλιον functions as a key motif.
- source_word: ὃς ... ὃς
  chosen: whoever ... whoever
  alternatives:
  - the one who ... the one who
  lexicon: BDAG
  rationale: The construction is generic and indefinite. 'Whoever' communicates the open, proverbial force more naturally than the more formal 'the one who.'
- source_word: θέλῃ
  chosen: wants to
  alternatives:
  - desires to
  - wishes to
  lexicon: BDAG
  rationale: '''Wants to'' is clear modern English and accurately conveys volition without sounding stilted.'
- source_word: αὐτοῦ / αὐτήν
  chosen: his / it
  alternatives:
  - their / it
  - his own / it
  lexicon: N/A
  rationale: The Greek uses grammatically masculine singular forms in a generic construction. Per the project's gender-accurate policy, 'his' is retained rather than shifting to plural or singular 'their.' The object pronoun is rendered 'it' to refer back to 'life' idiomatically in English.
