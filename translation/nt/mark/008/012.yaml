theological_decisions:
- issue: Rendering the oath-like εἰ clause after ἀμὴν λέγω ὑμῖν
  chosen_reading: 'Interpret as an emphatic negation: ''no sign will be given to this
    generation.'''
  alternative_readings:
  - A highly literal but obscure 'if a sign will be given to this generation'
  rationale: This is not a doctrinally contested issue so much as an exegetical and
    translational one. The Greek idiom functions as a strong denial, and translating
    the negation explicitly communicates the intended force without misleading the
    reader.
  doctrine_reference: Translation philosophy §6 (readable modern English, not archaic
    or academic)
