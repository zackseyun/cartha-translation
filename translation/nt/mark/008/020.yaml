id: MRK.8.20
reference: Mark 8:20
source:
  edition: SBLGNT
  text: ὅτε ⸀καὶ τοὺς ἑπτὰ εἰς τοὺς τετρακισχιλίους, πόσων σπυρίδων πληρώματα κλασμάτων
    ἤρατε; ⸂καὶ λέγουσιν αὐτῷ⸃· Ἑπτά.
translation:
  text: And when the seven were for the four thousand, how many large baskets full
    of broken pieces did you pick up? They said to him, “Seven.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek σπυρίς refers to a large basket, distinct from the smaller basket
      term used in Mark 8:19.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅτε καὶ
  chosen: And when
  alternatives:
  - When also
  - And when also
  lexicon: BDAG
  rationale: Introduces the second half of Jesus' comparison with the previous feeding
    miracle. English omits a separate 'also' as awkward, while 'And when' preserves
    the connective force and temporal sense naturally.
- source_word: τοὺς ἑπτὰ
  chosen: the seven
  alternatives:
  - the seven loaves
  - seven
  lexicon: BDAG
  rationale: The article with the numeral points back to the seven loaves mentioned
    in context (8:5–6). 'The seven' preserves the elliptical Greek while remaining
    understandable in context; 'loaves' is implied rather than explicit here.
- source_word: εἰς τοὺς τετρακισχιλίους
  chosen: for the four thousand
  alternatives:
  - for the four thousand people
  - among the four thousand
  lexicon: BDAG
  rationale: In this feeding context, εἰς with the accusative expresses relation/benefit
    toward the group fed. 'For the four thousand' is concise and idiomatic.
- source_word: πόσων σπυρίδων
  chosen: how many large baskets
  alternatives:
  - how many baskets
  - how many hampers
  lexicon: BDAG
  rationale: σπυρίς denotes a large basket, distinct from κόφινος in the previous
    feeding account. 'Large baskets' preserves the lexical distinction important in
    Mark 8:19–20.
- source_word: πληρώματα
  chosen: full
  alternatives:
  - full amounts
  - basketfuls
  lexicon: BDAG
  rationale: πληρώματα modifies the baskets as filled quantities. In English, 'large
    baskets full of...' communicates the sense more naturally than a more wooden 'full
    amounts'.
- source_word: κλασμάτων
  chosen: of broken pieces
  alternatives:
  - of fragments
  - of pieces
  lexicon: BDAG
  rationale: κλάσματα refers to pieces broken off from the bread. 'Broken pieces'
    is clear modern English and preserves the concrete image.
- source_word: ἤρατε
  chosen: did you pick up
  alternatives:
  - did you take up
  - did you carry away
  lexicon: BDAG
  rationale: In this context αἴρω refers to gathering up leftovers. 'Pick up' is idiomatic
    and contextually precise.
- source_word: καὶ λέγουσιν αὐτῷ
  chosen: They said to him
  alternatives:
  - And they say to him
  lexicon: BDAG
  rationale: Although λέγουσιν is present tense, English commonly renders this narrative
    present as simple past for natural readability in optimal equivalence.
- source_word: Ἑπτά
  chosen: Seven
  lexicon: BDAG
  rationale: Direct numeric reply to Jesus' question; straightforward rendering.
