theological_decisions:
- issue: Whether to make Jesus' question more interpretive by adding an object such
    as 'this' or 'it'
  chosen_reading: 'Leave the object unstated: ''Do you still not understand?'''
  alternative_readings:
  - Do you still not understand this?
  - Do you not yet perceive?
  rationale: The Greek leaves the object implicit. Retaining the open-ended question
    preserves the force of Jesus' rebuke without narrowing it to a specific object
    not stated in the text.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Preserve theological tension rather than resolve it.'
