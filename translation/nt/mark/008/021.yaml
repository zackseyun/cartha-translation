id: MRK.8.21
reference: Mark 8:21
source:
  edition: SBLGNT
  text: καὶ ἔλεγεν αὐτοῖς· ⸀Οὔπω συνίετε;
translation:
  text: And he was saying to them, “Do you still not understand?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “Do you not yet understand?”
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ
  chosen: And
  alternatives:
  - Then
  lexicon: BDAG
  rationale: Standard coordinating conjunction. 'And' preserves the simple narrative
    linkage without adding temporal force beyond the Greek.
- source_word: ἔλεγεν
  chosen: he was saying
  alternatives:
  - he said
  lexicon: BDAG
  rationale: Imperfect active indicative of λέγω. 'He was saying' preserves the imperfective
    aspect, suggesting continued or repeated speech in context, though idiomatic English
    could compress to 'he said.'
- source_word: αὐτοῖς
  chosen: to them
  alternatives:
  - to his disciples
  lexicon: BDAG
  rationale: Dative plural pronoun with no explicit noun in this verse. 'To them'
    translates the Greek directly without importing the referent from context into
    the text.
- source_word: Οὔπω
  chosen: still not
  alternatives:
  - not yet
  lexicon: BDAG
  rationale: The adverb means 'not yet' or 'still not.' In an English question paired
    with present-tense 'understand,' 'still not' is the most natural rendering while
    preserving the sense that understanding remains absent up to this point.
- source_word: συνίετε
  chosen: understand
  alternatives:
  - perceive
  - comprehend
  lexicon: BDAG
  rationale: Present active indicative, second plural, from συνίημι. 'Understand'
    is the clearest and most natural English equivalent here, capturing mental grasp
    rather than mere sensory perception.
