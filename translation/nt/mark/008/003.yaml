id: MRK.8.3
reference: Mark 8:3
source:
  edition: SBLGNT
  text: καὶ ἐὰν ἀπολύσω αὐτοὺς νήστεις εἰς οἶκον αὐτῶν, ἐκλυθήσονται ἐν τῇ ὁδῷ· ⸂καί
    τινες⸃ αὐτῶν ⸀ἀπὸ μακρόθεν ⸀ἥκασιν.
translation:
  text: And if I send them away to their homes hungry, they will collapse on the way—and
    some of them have come from far away.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'faint on the road.' The Greek verb can denote becoming weak or exhausted
      to the point of collapse.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπολύσω
  chosen: send ... away
  alternatives:
  - dismiss
  - release
  lexicon: BDAG
  rationale: In this feeding-context, ἀπολύω refers to dismissing the crowd rather
    than releasing from bondage or divorce. 'Send ... away' is natural English and
    preserves the action of letting them depart.
- source_word: νήστεις
  chosen: hungry
  alternatives:
  - fasting
  - without food
  lexicon: BDAG
  rationale: Though literally 'fasting,' here it describes their state of having gone
    without food. 'Hungry' communicates the practical sense in clear modern English
    without overstating intentional religious fasting.
- source_word: εἰς οἶκον αὐτῶν
  chosen: to their homes
  alternatives:
  - to their house
  - to their home
  lexicon: BDAG
  rationale: 'The plural pronoun makes the distributive sense natural in English:
    each person to his own home. ''Homes'' is idiomatic and accurate.'
- source_word: ἐκλυθήσονται
  chosen: they will collapse
  alternatives:
  - they will faint
  - they will give out
  - they will become exhausted
  lexicon: BDAG
  rationale: The verb conveys becoming weak or giving out from exhaustion. 'Collapse'
    best captures the seriousness in context, while remaining natural English. 'Faint'
    is possible but can sound momentary rather than total physical failure.
- source_word: ἐν τῇ ὁδῷ
  chosen: on the way
  alternatives:
  - on the road
  - along the way
  lexicon: BDAG
  rationale: A standard idiomatic rendering for travel context. It preserves the sense
    of the journey without unnecessary formality.
- source_word: καί τινες αὐτῶν
  chosen: and some of them
  alternatives:
  - for some of them
  - and certain ones of them
  lexicon: BDAG
  rationale: This straightforwardly introduces a subset of the crowd. 'And some of
    them' follows the Greek coordination and reads naturally.
- source_word: ἀπὸ μακρόθεν
  chosen: from far away
  alternatives:
  - from a distance
  - from far off
  lexicon: BDAG
  rationale: In context this refers to the distance from which they have traveled,
    not merely their present location. 'From far away' is the clearest idiomatic English.
- source_word: ἥκασιν
  chosen: have come
  alternatives:
  - have arrived
  - came
  lexicon: BDAG
  rationale: The perfect form highlights their present state as those who have arrived
    from afar. 'Have come' preserves that aspect better than simple past 'came'.
