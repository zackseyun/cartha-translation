id: MRK.8.24
reference: Mark 8:24
source:
  edition: SBLGNT
  text: καὶ ἀναβλέψας ἔλεγεν· Βλέπω τοὺς ἀνθρώπους ὅτι ὡς δένδρα ὁρῶ περιπατοῦντας.
translation:
  text: And looking up, he said, “I see people, because I see them walking around
    like trees.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'I see people; I see them like trees, walking.' The Greek syntax is
      compressed, and some translations attach 'walking' more directly to 'people'
      rather than to the comparison.
    reason: alternative_reading
  - marker: b
    text: The participle translated 'looking up' can also carry the sense 'regaining
      sight' in healing contexts.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀναβλέψας
  chosen: looking up
  alternatives:
  - regaining sight
  - looking up and seeing
  lexicon: BDAG
  rationale: The participle can mean either 'look up' or, in healing contexts, 'receive
    sight again.' Here the immediate context is the gradual restoration of the blind
    man's sight, but the verse also naturally describes the physical act of lifting
    his eyes after Jesus' touch. 'Looking up' preserves the participial imagery without
    over-interpreting; the sense of restored sight is conveyed by the following verbs
    'I see' and 'I perceive.'
- source_word: ἔλεγεν
  chosen: he said
  alternatives:
  - he was saying
  - he began to say
  lexicon: BDAG
  rationale: The imperfect may suggest inceptive or progressive force, but idiomatic
    English in direct speech commonly uses simple past. 'He said' is natural and sufficient
    here.
- source_word: Βλέπω
  chosen: I see
  alternatives:
  - I can see
  lexicon: BDAG
  rationale: A straightforward present indicative. 'I see' is the most direct rendering
    and preserves the immediacy of the man's report.
- source_word: τοὺς ἀνθρώπους
  chosen: people
  alternatives:
  - the people
  - men
  lexicon: BDAG
  rationale: ἄνθρωπος here refers to human beings generally, not specifically males.
    'People' is the most natural English equivalent in context and reflects the likely
    referent without unnecessary specificity.
- source_word: ὅτι
  chosen: because
  alternatives:
  - that
  lexicon: BDAG
  rationale: 'In this construction ὅτι is best taken as introducing the content/explanation
    of what he sees: he sees people because they appear to him as tree-like figures
    in motion. Rendering it ''because'' produces clear English and captures the explanatory
    force better than a wooden ''that.'''
- source_word: ὡς δένδρα
  chosen: like trees
  alternatives:
  - as trees
  lexicon: BDAG
  rationale: ὡς marks comparison. 'Like trees' is idiomatic modern English and preserves
    the simile.
- source_word: ὁρῶ
  chosen: I see them
  alternatives:
  - I perceive
  - I behold
  lexicon: BDAG
  rationale: ὁράω overlaps with βλέπω but can carry a nuance of perception. In English,
    repeating 'I see' is acceptable and reflects the Greek's vividness. 'Them' is
    supplied because the participle 'walking around' clearly refers back to the people.
- source_word: περιπατοῦντας
  chosen: walking around
  alternatives:
  - walking
  - moving about
  lexicon: BDAG
  rationale: The present participle describes ongoing movement. 'Walking around' captures
    the durative sense and sounds natural in contemporary English.
