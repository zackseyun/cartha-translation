id: MRK.7.13
reference: Mark 7:13
source:
  edition: SBLGNT
  text: ἀκυροῦντες τὸν λόγον τοῦ θεοῦ τῇ παραδόσει ὑμῶν ᾗ παρεδώκατε· καὶ παρόμοια τοιαῦτα πολλὰ ποιεῖτε.
translation:
  text: thus nullifying the word of God by your tradition that you have handed down. And you do many other similar things.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'invalidating' or 'making void' the word of God.
    reason: lexical_alternative
  - marker: b
    text: Or 'that you passed on.'
    reason: lexical_alternative
  - marker: c
    text: Or 'many similar things like these'.
    reason: previous_rendering
lexical_decisions:
- source_word: ἀκυροῦντες
  chosen: nullifying
  alternatives:
  - invalidating
  - setting aside
  - making void
  lexicon: BDAG
  rationale: The participle continues Jesus' accusation from the prior verse and denotes rendering something ineffective or invalid. 'Nullifying' preserves the force of canceling the authority/effect of God's word without sounding overly archaic like 'making void.'
- source_word: λόγον
  chosen: word
  alternatives:
  - message
  lexicon: BDAG
  rationale: '''Word'' is the most direct rendering of λόγος here and fits the context of divine command/instruction. ''Message'' is possible but less precise in this dispute over scriptural authority.'
- source_word: τὸν λόγον τοῦ θεοῦ
  chosen: the word of God
  alternatives:
  - God's word
  lexicon: BDAG
  rationale: The fuller phrase is retained for clarity and gravity. It reflects the genitive construction directly and preserves the contrast with 'your tradition.'
- source_word: τῇ παραδόσει ὑμῶν
  chosen: by your tradition
  alternatives:
  - through your tradition
  - with your tradition
  lexicon: BDAG
  rationale: 'The dative is instrumental here: their tradition is the means by which they nullify God''s word. ''By your tradition'' is concise and natural English.'
- source_word: παραδόσει
  chosen: tradition
  alternatives:
  - teaching handed down
  lexicon: BDAG
  rationale: '''Tradition'' is the standard and contextually appropriate rendering of παράδοσις in this polemical context. It refers to inherited human practice, not divine revelation.'
- source_word: ᾗ παρεδώκατε
  chosen: that you have handed down
  alternatives:
  - which you handed down
  - that you passed on
  lexicon: BDAG
  rationale: This relative clause explains the tradition as something transmitted by them. 'Have handed down' communicates the force naturally in English and matches the semantic connection with παράδοσις.
- source_word: παρόμοια τοιαῦτα πολλὰ
  chosen: many similar things like these
  alternatives:
  - many such similar things
  - many things like these
  lexicon: BDAG
  rationale: The combination is somewhat emphatic and overlapping in Greek. 'Many similar things like these' preserves the rhetorical force without flattening the repetition entirely.
- source_word: ποιεῖτε
  chosen: you do
  alternatives:
  - you are doing
  lexicon: BDAG
  rationale: The present indicative expresses customary action. Simple present in English best conveys ongoing habitual practice in a readable way.
