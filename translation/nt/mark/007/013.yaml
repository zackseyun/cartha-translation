theological_decisions:
- issue: Nature of 'tradition' in Jesus' accusation
  chosen_reading: Rendered neutrally as 'tradition' while allowing the context to show that this specific human tradition stands opposed to God's word.
  alternative_readings:
  - Rendered more explicitly as 'human tradition'
  rationale: The Greek text itself says 'your tradition' and does not include the adjective 'human' in this verse, though the broader context implies it. The translation avoids importing extra wording while preserving the theological contrast already present in the text.
  doctrine_reference: 'Translation philosophy: Never paraphrase beyond what the source text warrants; preserve theological tension rather than resolve it.'
revisions:
- timestamp: '2026-04-21T12:46:23Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/nt/mark/007/013.json
  category: awkward_english
  tier: 1
  from: many similar things like these
  to: many other similar things
  rationale: The Greek phrase 'παρόμοια τοιαῦτα πολλὰ' is indeed emphatic and contains some redundancy. While the draft's intention to reflect this is noted, the resulting English 'many similar things like these' is unidiomatic. The words 'similar' and 'like these' are redundant in a way that sounds unnatural in English. A better rendering, such as 'many other similar things' or 'many such similar things,' would preserve the emphatic sense without sacrificing idiomatic English.
