theological_decisions:
- issue: Description of Jesus' healing gesture
  chosen_reading: Render the physical actions straightforwardly without adding interpretive
    explanation about symbolic meaning or healing mechanics.
  alternative_readings:
  - Interpret the spitting as applying saliva to the tongue
  - Expand the wording to explain ritual or medicinal significance
  rationale: The Greek states only that Jesus spat and touched the man's tongue. It
    does not explicitly say where the saliva went or explain the significance. To
    preserve theological and narrative restraint, the translation reports the actions
    without importing later interpretation.
  doctrine_reference: 'Translation philosophy: Preserve theological tension rather
    than resolve it; Never import doctrinal claims the text does not make.'
