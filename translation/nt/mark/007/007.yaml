id: MRK.7.7
reference: Mark 7:7
source:
  edition: SBLGNT
  text: μάτην δὲ σέβονταί με, διδάσκοντες διδασκαλίας ἐντάλματα ἀνθρώπων·
translation:
  text: But they worship me in vain, teaching as doctrines the commandments of men.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'teaching human commandments as doctrines.'
    reason: lexical_alternative
lexical_decisions:
- source_word: μάτην
  chosen: in vain
  alternatives:
  - vainly
  - for nothing
  lexicon: BDAG
  rationale: Adverb meaning 'to no purpose' or 'in vain.' 'In vain' is the most natural
    and established English equivalent here and preserves the prophetic citation's
    force without sounding archaic.
- source_word: δὲ
  chosen: But
  alternatives:
  - and
  - now
  lexicon: BDAG
  rationale: Here δέ marks contrast with the preceding statement about honoring with
    lips while the heart is far away. 'But' best conveys that adversative sense in
    English.
- source_word: σέβονταί
  chosen: they worship
  alternatives:
  - they revere
  - they honor
  lexicon: BDAG
  rationale: σέβομαι commonly denotes worship or reverence directed toward deity.
    Because the object is 'me' in a divine citation, 'worship' is the clearest and
    strongest fit.
- source_word: με
  chosen: me
  lexicon: BDAG
  rationale: Direct object pronoun retained straightforwardly. In context this is
    God speaking in the Isaiah citation, applied by Jesus to his audience's behavior.
- source_word: διδάσκοντες
  chosen: teaching
  alternatives:
  - while teaching
  - as they teach
  lexicon: BDAG
  rationale: 'Present participle expressing attendant manner or means: their vain
    worship is characterized by teaching. Simple ''teaching'' preserves the Greek
    structure and reads naturally.'
- source_word: διδασκαλίας
  chosen: as doctrines
  alternatives:
  - doctrines
  - teachings
  lexicon: BDAG
  rationale: 'The accusative works with ἐντάλματα in apposition-like relation: ''teaching
    teachings/doctrines [that are] commandments of men.'' Rendering ''as doctrines''
    makes the sense idiomatic in English and reflects that human commands are being
    presented in doctrinal form.'
- source_word: ἐντάλματα
  chosen: the commandments
  alternatives:
  - commands
  - precepts
  lexicon: BDAG
  rationale: ἔνταλμα refers to an authoritative order or command. 'Commandments' preserves
    the formal, religiously charged tone of the citation better than the flatter 'commands.'
- source_word: ἀνθρώπων
  chosen: of men
  alternatives:
  - of people
  - human
  lexicon: BDAG
  rationale: 'The genitive denotes source: commandments originating from humans. Per
    the project''s gender-accurate policy, ''men'' is acceptable where the Greek plural
    can denote human beings generically and where the contrast is between divine and
    human origin, not male versus female.'
