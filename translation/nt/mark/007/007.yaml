theological_decisions:
- issue: Rendering the citation's contrast between divine worship and human authority
  chosen_reading: teaching as doctrines the commandments of men
  alternative_readings:
  - teaching doctrines, the commandments of men
  - teaching human commandments as doctrines
  rationale: 'The Greek compresses the idea that human commands are being taught in
    the status of doctrine. The chosen rendering makes that relationship explicit
    in clear English without adding content beyond the source. It also preserves the
    theological critique: worship becomes empty when human commands are elevated to
    doctrinal authority.'
  doctrine_reference: Translation philosophy §§1, 3, 4, 6
