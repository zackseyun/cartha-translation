theological_decisions:
- issue: Purity terminology in κοινόω
  chosen_reading: defile
  alternative_readings:
  - make unclean
  rationale: The context is a dispute over ritual purity, not moral corruption alone.
    'Defile' communicates the impurity concept in readable English, while 'make unclean'
    is preserved in a footnote to make the ritual nuance explicit and avoid importing
    later doctrinal assumptions.
  doctrine_reference: Translation philosophy §§3, 6
