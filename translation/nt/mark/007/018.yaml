id: MRK.7.18
reference: Mark 7:18
source:
  edition: SBLGNT
  text: καὶ λέγει αὐτοῖς· Οὕτως καὶ ὑμεῖς ἀσύνετοί ἐστε; οὐ νοεῖτε ὅτι πᾶν τὸ ἔξωθεν
    εἰσπορευόμενον εἰς τὸν ἄνθρωπον οὐ δύναται αὐτὸν κοινῶσαι,
translation:
  text: And he said to them, “So are you also without understanding? Do you not understand
    that everything entering into the man from outside is not able to defile him,”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or: “make him unclean.” The Greek verb carries ritual-purity overtones
      in this context.'
    reason: lexical_alternative
lexical_decisions:
- source_word: λέγει
  chosen: he said
  alternatives:
  - he says
  lexicon: BDAG
  rationale: Historical present in Greek is commonly rendered with English past tense
    in narrative for natural readability while preserving the discourse function.
- source_word: Οὕτως καὶ ὑμεῖς
  chosen: So are you also
  alternatives:
  - Are you also in this way
  - So you too are
  lexicon: BDAG
  rationale: Captures the emphatic force of οὕτως with καί and ὑμεῖς in idiomatic
    English, expressing Jesus' surprised rebuke to the disciples.
- source_word: ἀσύνετοί
  chosen: without understanding
  alternatives:
  - uncomprehending
  - senseless
  - lacking insight
  lexicon: BDAG
  rationale: Conveys lack of discernment or understanding without the harsher English
    connotations of 'senseless.' It fits the immediate parallel with νοεῖτε ('understand').
- source_word: νοεῖτε
  chosen: understand
  alternatives:
  - perceive
  - grasp
  lexicon: BDAG
  rationale: A clear, natural rendering that matches the cognitive sense in context
    and preserves the repetition with ἀσύνετοι.
- source_word: πᾶν τὸ ἔξωθεν εἰσπορευόμενον
  chosen: everything entering ... from outside
  alternatives:
  - whatever enters from outside
  - everything that enters from outside
  lexicon: BDAG
  rationale: πᾶν with the substantival participle is best rendered generically as
    'everything that enters.' 'From outside' reflects ἔξωθεν and clarifies the source
    of entry.
- source_word: εἰς τὸν ἄνθρωπον
  chosen: into the man
  alternatives:
  - into a person
  - into the person
  lexicon: BDAG
  rationale: Retains the singular generic ἄνθρωπον with gender-accurate wording per
    project philosophy. Here 'the man' functions representatively for a human being
    in general.
- source_word: κοινῶσαι
  chosen: defile
  alternatives:
  - make unclean
  - render impure
  lexicon: BDAG
  rationale: In this purity-context, κοινόω refers to making someone ritually/common-unclean.
    'Defile' is concise and idiomatic in English, while the ritual nuance is preserved
    in a footnote.
