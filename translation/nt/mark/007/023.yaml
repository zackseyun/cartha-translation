id: MRK.7.23
reference: Mark 7:23
source:
  edition: SBLGNT
  text: πάντα ταῦτα τὰ πονηρὰ ἔσωθεν ἐκπορεύεται καὶ κοινοῖ τὸν ἄνθρωπον.
translation:
  text: All these evil things come out from within and defile the man.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the person'; the Greek has singular 'the man' used generically for a
      human being.
    reason: lexical_alternative
lexical_decisions:
- source_word: πάντα ταῦτα τὰ πονηρά
  chosen: All these evil things
  alternatives:
  - All these wicked things
  - All these evils
  lexicon: BDAG
  rationale: 'The phrase is emphatic and comprehensive: πάντα + ταῦτα + article +
    adjective functions substantivally, referring back to the vices listed in the
    preceding context. ''Evil things'' is natural modern English and preserves the
    plural concreteness better than the more abstract ''evils.'''
- source_word: ἔσωθεν
  chosen: from within
  alternatives:
  - from inside
  - from the inside
  lexicon: BDAG
  rationale: The adverb denotes interior origin. 'From within' is idiomatic and preserves
    the moral/theological contrast with external sources of impurity in the surrounding
    passage.
- source_word: ἐκπορεύεται
  chosen: come out
  alternatives:
  - proceed
  - go out
  lexicon: BDAG
  rationale: Although singular in form, the verb takes the neuter plural subject according
    to common Greek usage. 'Come out' is clearer and more natural in contemporary
    English than 'proceed,' while still reflecting movement from an inner source.
- source_word: κοινοῖ
  chosen: defile
  alternatives:
  - make unclean
  - render common
  lexicon: BDAG
  rationale: In this Markan purity context, κοινόω refers to ritual/moral defilement
    rather than merely making something 'common.' 'Defile' best captures the impurity
    sense in concise English. 'Make unclean' is a viable alternative but less idiomatic
    here.
- source_word: τὸν ἄνθρωπον
  chosen: the man
  alternatives:
  - the person
  - the human being
  lexicon: BDAG
  rationale: The Greek is singular and grammatically masculine with representative
    force. Per translation philosophy, a gender-accurate rendering is preferred over
    a gender-neutral one. Here 'the man' preserves the singular generic sense and
    echoes the repeated wording in the immediate context.
