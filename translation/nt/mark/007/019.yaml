theological_decisions:
- issue: Interpretation of καθαρίζων πάντα τὰ βρώματα
  chosen_reading: 'Narratorial aside: ''thus declaring all foods clean'''
  alternative_readings:
  - 'Physiological sense: ''cleansing/purging all foods'''
  rationale: The masculine singular participle is widely taken as Mark's explanatory
    comment summarizing the implication of Jesus' teaching, especially given the punctuation
    tradition and the broader Markan context about purity. The alternative physiological
    reading is grammatically possible and should be preserved in a footnote because
    the phrase is genuinely debated and has theological significance for food laws.
  doctrine_reference: Preserve theological tension rather than resolve it; footnote
    genuine ambiguity.
