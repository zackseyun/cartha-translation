id: MRK.7.19
reference: Mark 7:19
source:
  edition: SBLGNT
  text: ὅτι οὐκ εἰσπορεύεται αὐτοῦ εἰς τὴν καρδίαν ἀλλ’ εἰς τὴν κοιλίαν, καὶ εἰς τὸν
    ἀφεδρῶνα ἐκπορεύεται; —⸀καθαρίζων πάντα τὰ βρώματα.
translation:
  text: because it does not enter into his heart but into his stomach, and goes out
    into the latrine"—thus declaring all foods clean.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'thus purging all foods,' taking the final phrase as referring to the
      digestive process rather than as Mark's explanatory comment.
    reason: alternative_reading
lexical_decisions:
- source_word: καρδίαν
  chosen: heart
  alternatives:
  - inner self
  - mind
  lexicon: BDAG
  rationale: Rendered literally as 'heart' to preserve the biblical anthropology contrast
    between the inner person and the digestive tract. Dynamic alternatives would over-interpret.
- source_word: κοιλίαν
  chosen: stomach
  alternatives:
  - belly
  lexicon: BDAG
  rationale: '''Stomach'' gives the plain physiological sense in modern English more
    naturally than ''belly,'' while remaining faithful to the digestive context.'
- source_word: ἀφεδρῶνα
  chosen: latrine
  alternatives:
  - sewer
  - toilet
  lexicon: BDAG
  rationale: Refers to the place of evacuation/excrement. 'Latrine' is concrete and
    suitably dignified; 'toilet' is anachronistically specific, and 'sewer' may suggest
    plumbing rather than bodily elimination.
- source_word: καθαρίζων
  chosen: thus declaring ... clean
  alternatives:
  - cleansing
  - purging
  - thereby cleansing
  lexicon: BDAG
  rationale: The participle is syntactically difficult and commonly understood as
    a narrator's explanatory comment. Rendering it as 'thus declaring' makes explicit
    the implied subject and sense in idiomatic English while preserving the resultative
    force.
- source_word: βρώματα
  chosen: foods
  alternatives:
  - foods
  - food
  lexicon: BDAG
  rationale: Plural 'foods' reflects the Greek plural and fits the discussion of categories
    of edible items under purity regulations.
- source_word: αὐτοῦ
  chosen: his
  alternatives:
  - a person's
  - it
  lexicon: BDAG
  rationale: The genitive pronoun refers back to the person under discussion. 'His'
    is a natural singular representative rendering in context.
- source_word: εἰσπορεύεται / ἐκπορεύεται
  chosen: enter / goes out
  alternatives:
  - goes into / comes out
  lexicon: BDAG
  rationale: Kept the movement imagery straightforward and idiomatic in English, preserving
    the contrast between ingestion and excretion.
