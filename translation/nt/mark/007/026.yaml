id: MRK.7.26
reference: Mark 7:26
source:
  edition: SBLGNT
  text: ⸂ἡ δὲ γυνὴ ἦν⸃ Ἑλληνίς, Συροφοινίκισσα τῷ γένει· καὶ ἠρώτα αὐτὸν ἵνα τὸ δαιμόνιον
    ἐκβάλῃ ἐκ τῆς θυγατρὸς αὐτῆς.
translation:
  text: Now the woman was a Greek, a Syrophoenician by birth, and she kept asking
    him to cast the demon out of her daughter.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a Gentile'; the Greek says 'a Greek,' which in this context likely marks
      her as non-Jewish as well as culturally Greek.
    reason: lexical_alternative
  - marker: b
    text: Literally 'a Syrophoenician by kind/origin'; that is, of Syrophoenician
      descent.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἑλληνίς
  chosen: a Greek
  alternatives:
  - a Gentile
  lexicon: BDAG
  rationale: In this context the term most naturally denotes a Greek-speaking/non-Jewish
    woman, but the lexical form is specifically 'Greek.' 'Gentile' captures the broader
    ethnic-religious implication yet is less precise to the wording, so it is preserved
    as an alternative rather than adopted in the main text.
- source_word: Συροφοινίκισσα τῷ γένει
  chosen: a Syrophoenician by birth
  alternatives:
  - a Syrophoenician by race
  - a Syrophoenician by descent
  lexicon: BDAG
  rationale: The phrase identifies her ethnic/geographic origin. 'By birth' is natural
    modern English for τῷ γένει while preserving the sense of lineage/origin. 'By
    race' can sound biologized in modern English, and 'by descent' is possible but
    slightly less idiomatic here.
- source_word: ἠρώτα
  chosen: she kept asking
  alternatives:
  - she asked
  - she was begging
  lexicon: BDAG
  rationale: The imperfect tense suggests ongoing or repeated action, so 'kept asking'
    best reflects aspect. 'Asked' is too flat, and 'was begging' may overstate the
    emotional force beyond what ἐρωτάω itself requires.
- source_word: ἵνα ... ἐκβάλῃ
  chosen: to cast ... out
  alternatives:
  - that he might drive ... out
  - to expel
  lexicon: BDAG
  rationale: This construction expresses the content/purpose of her request. 'To cast
    out' is the standard and contextually clear rendering for exorcistic contexts,
    preserving the force of ἐκβάλλω without sounding overly technical.
- source_word: τὸ δαιμόνιον
  chosen: the demon
  alternatives:
  - the unclean spirit
  - the demon spirit
  lexicon: BDAG
  rationale: The Greek here is specifically δαιμόνιον, 'demon,' not 'unclean spirit'
    (though that expression appears in the surrounding context). 'The demon' is the
    most direct lexical equivalent.
- source_word: ἐκ τῆς θυγατρὸς αὐτῆς
  chosen: out of her daughter
  alternatives:
  - from her daughter
  lexicon: BDAG
  rationale: '''Out of'' matches ἐκ more concretely and fits idiomatic English in
    exorcism contexts. ''From'' is possible but less vivid and slightly less aligned
    with the Greek preposition.'
- source_word: δὲ
  chosen: Now
  alternatives:
  - And
  - But
  lexicon: BDAG
  rationale: δέ here marks a mild narrative transition rather than strong contrast.
    'Now' gives readable English discourse flow without overstating adversative force.
