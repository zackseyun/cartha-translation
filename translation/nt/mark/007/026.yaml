theological_decisions:
- issue: Ethnic identification of the woman
  chosen_reading: 'The verse is rendered with both descriptors: ''a Greek, a Syrophoenician
    by birth.'''
  alternative_readings:
  - '''a Gentile, of Syrophoenician origin'''
  - '''a Greek woman, Syrophoenician by race'''
  rationale: The Greek text intentionally preserves two layers of identity, likely
    cultural/religious and ethnic/geographic. The translation keeps both without collapsing
    one into the other, preserving the narrative's social and historical specificity.
  doctrine_reference: Translation philosophy §§1, 5
- issue: Nature of the daughter's affliction
  chosen_reading: The text states that she asked Jesus to cast 'the demon' out of
    her daughter.
  alternative_readings:
  - '''evil spirit'''
  rationale: The translation follows the explicit lexical choice δαιμόνιον and does
    not soften or reinterpret the text's supernatural claim.
  doctrine_reference: Affirmations; Translation philosophy §1
