source:
  edition: robinson-pierpont-2005-byzantine
  text: Εἴ τις ἔχει ὦτα ἀκούειν ἀκουέτω.
  language: Greek
translation:
  text: If [a] anyone has ears to hear, let him hear.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: This verse is absent from the earliest Greek manuscripts (including the 4th-century Sinaiticus and Vaticanus) and early Coptic versions, but is present in the Byzantine majority tradition, the Latin tradition, and most Syriac witnesses. It is likely a later scribal addition echoing the identical phrase found earlier in Mark 4:9 and 4:23.
    reason: textual_critical
lexical_decisions:
- source_word: ὦτα
  chosen: ears
  alternatives:
  - hearing
  lexicon: BDAG
  rationale: The literal physical organ is used metaphorically here to denote spiritual receptivity and comprehension.
- source_word: ἀκουέτω
  chosen: let him hear
  alternatives:
  - let them listen
  - he must hear
  lexicon: BDAG
  rationale: The third-person singular present active imperative is traditionally and accurately rendered 'let him hear,' capturing the jussive force of the command.
