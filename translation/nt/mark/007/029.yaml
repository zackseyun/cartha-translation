id: MRK.7.29
reference: Mark 7:29
source:
  edition: SBLGNT
  text: καὶ εἶπεν αὐτῇ· Διὰ τοῦτον τὸν λόγον ὕπαγε, ἐξελήλυθεν ⸂ἐκ τῆς θυγατρός σου
    τὸ δαιμόνιον⸃.
translation:
  text: And he said to her, “Because of this word, go; the demon has gone out of your
    daughter.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “For this saying, go; the demon has gone out of your daughter.”
    reason: lexical_alternative
lexical_decisions:
- source_word: Διὰ τοῦτον τὸν λόγον
  chosen: Because of this word
  alternatives:
  - For this saying
  - Because of this statement
  lexicon: BDAG
  rationale: διά with the accusative commonly expresses reason or cause ('because
    of, on account of'). λόγος here refers to the woman's preceding reply, so 'word'
    is a transparent rendering that preserves the singular and the causal force. 'Saying'
    or 'statement' are possible, but 'word' keeps closer to the Greek while remaining
    natural enough in context.
- source_word: ὕπαγε
  chosen: go
  alternatives:
  - go your way
  - be on your way
  lexicon: BDAG
  rationale: The present imperative of ὑπάγω here functions as a dismissal or release.
    'Go' is the clearest modern English equivalent. 'Go your way' is traditional and
    idiomatic, but adds wording not explicit in the Greek.
- source_word: ἐξελήλυθεν
  chosen: has gone out
  alternatives:
  - has departed
  - has come out
  lexicon: BDAG
  rationale: 'The perfect tense indicates a completed action with continuing result:
    the demon is gone and remains gone. ''Has gone out'' preserves both the verbal
    aspect and the exorcistic idiom of ἐξέρχομαι in this context better than the more
    interpretive ''has departed''.'
- source_word: ἐκ τῆς θυγατρός σου
  chosen: of your daughter
  alternatives:
  - from your daughter
  lexicon: BDAG
  rationale: With ἐξέρχομαι, ἐκ marks the person from whom the demon has exited. In
    English, 'gone out of your daughter' is idiomatic and preserves the spatial imagery
    of the Greek. 'From your daughter' is possible but less natural with 'gone out.'
- source_word: τὸ δαιμόνιον
  chosen: the demon
  alternatives:
  - the unclean spirit
  - the demon spirit
  lexicon: BDAG
  rationale: δαιμόνιον in Mark regularly denotes a demon. 'The demon' is the direct
    lexical equivalent and fits the immediate context, where the daughter's affliction
    has been described in terms of demonic possession. 'Unclean spirit' would import
    wording from nearby verses but is not the term used in this clause.
- source_word: καὶ εἶπεν αὐτῇ
  chosen: And he said to her
  alternatives:
  - Then he said to her
  lexicon: BDAG
  rationale: This is a straightforward narrative introduction. 'And' reflects καί
    without overinterpreting sequence. 'Then' is possible in English narrative style,
    but the Greek conjunction does not require that nuance.
