theological_decisions:
- issue: Rendering of exorcism language without softening the supernatural claim
  chosen_reading: the demon has gone out of your daughter
  alternative_readings:
  - the evil spirit has left your daughter
  rationale: The Greek explicitly names a δαιμόνιον and states that it has exited
    the daughter. In keeping with historic Christian orthodoxy and original-language
    primacy, the translation preserves the personal demonic reference rather than
    reducing it to a vague illness or metaphorical evil influence.
  doctrine_reference: Affirmations; Translation philosophy §1
