id: MRK.7.36
reference: Mark 7:36
source:
  edition: SBLGNT
  text: καὶ διεστείλατο αὐτοῖς ἵνα μηδενὶ ⸀λέγωσιν· ὅσον δὲ ⸂αὐτοῖς διεστέλλετο, αὐτοὶ⸃
    μᾶλλον περισσότερον ἐκήρυσσον.
translation:
  text: And he ordered them to tell no one. But the more he ordered them, the more
    abundantly they proclaimed it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the more he charged them, the more they proclaimed it' / 'all the more
      they proclaimed it.'
    reason: lexical_alternative
lexical_decisions:
- source_word: διεστείλατο
  chosen: ordered
  alternatives:
  - strictly charged
  - instructed
  - commanded
  lexicon: BDAG
  rationale: The middle of διαστέλλομαι here conveys giving a firm directive or charge.
    'Ordered' is natural modern English and preserves the force better than the softer
    'instructed.' 'Strictly charged' is possible but sounds archaic.
- source_word: αὐτοῖς
  chosen: them
  lexicon: BDAG
  rationale: Dative plural pronoun referring to those present; standard English object
    pronoun is sufficient.
- source_word: ἵνα μηδενὶ λέγωσιν
  chosen: to tell no one
  alternatives:
  - that they should tell no one
  - to say nothing to anyone
  lexicon: BDAG
  rationale: This purpose/content clause expresses the substance of the command. 'Tell
    no one' is idiomatic and fits the context of reporting what happened. 'Say nothing
    to anyone' is also possible, but 'tell' better reflects the communicative sense
    in context.
- source_word: ὅσον ... διεστέλλετο
  chosen: the more he ordered them
  alternatives:
  - as much as he kept ordering them
  - however much he charged them
  lexicon: BDAG
  rationale: 'ὅσον with the imperfect forms an iterative/comparative idea: to the
    degree that he kept commanding them. ''The more he ordered them'' captures the
    correlative structure naturally in English.'
- source_word: μᾶλλον περισσότερον
  chosen: the more abundantly
  alternatives:
  - all the more
  - even more
  - more and more
  lexicon: BDAG
  rationale: The paired adverbs intensify the response. Rather than flattening one
    of them away, 'the more abundantly' preserves the emphatic increase while remaining
    readable. A footnote preserves the more literal 'all the more' nuance.
- source_word: ἐκήρυσσον
  chosen: they proclaimed it
  alternatives:
  - they were proclaiming it
  - they announced it
  - they preached it
  lexicon: BDAG
  rationale: κηρύσσω means to proclaim publicly. 'Proclaimed' preserves the public-heralding
    sense better than 'announced.' 'Preached' could sound overly technical or sermonic
    here. 'It' is supplied in English for the implied content of what had happened.
