theological_decisions:
- issue: Messianic secrecy motif / force of Jesus' command
  chosen_reading: Render the command straightforwardly as a real prohibition without
    importing a theory about why Jesus gave it.
  alternative_readings:
  - A stronger rendering such as 'strictly warned' to emphasize severity
  - An interpretive rendering that explains the motive for silence
  rationale: The verse clearly states that Jesus gave a firm command not to tell anyone,
    and that the people disobeyed by proclaiming it more widely. The translation should
    preserve that tension without embedding a theological explanation of the so-called
    messianic secret.
  doctrine_reference: Preserve theological tension rather than resolve it.
