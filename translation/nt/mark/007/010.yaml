theological_decisions:
- issue: Rendering the legal penalty formula θανάτῳ τελευτάτω
  chosen_reading: must surely die
  alternative_readings:
  - must be put to death
  - let him die the death
  rationale: The phrase is a citation of Torah legal language and is best represented
    by the established idiom 'must surely die,' which reflects the solemn legal force
    without over-specifying the mechanism. 'Must be put to death' is a plausible interpretive
    rendering, but the Greek phrase itself more directly mirrors the stock formula
    of certain death.
