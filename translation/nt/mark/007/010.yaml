id: MRK.7.10
reference: Mark 7:10
source:
  edition: SBLGNT
  text: Μωϋσῆς γὰρ εἶπεν· Τίμα τὸν πατέρα σου καὶ τὴν μητέρα σου, καί· Ὁ κακολογῶν
    πατέρα ἢ μητέρα θανάτῳ τελευτάτω·
translation:
  text: For Moses said, ‘Honor your father and your mother,’ and, ‘Whoever speaks
    evil of father or mother must surely die.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “Whoever curses father or mother must surely die.” The verb can mean
      speak evil of, revile, or curse.
    reason: lexical_alternative
  - marker: b
    text: Or, “must be put to death.” The Greek uses a legal formula literally, “must
      die by death.”
    reason: alternative_reading
lexical_decisions:
- source_word: Μωϋσῆς
  chosen: Moses
  lexicon: BDAG
  rationale: Standard transliteration of the personal name, following the philosophy
    of transliterating names rather than translating them.
- source_word: γὰρ
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: BDAG
  rationale: Marks explanatory support for Jesus' argument. 'For' preserves the connective
    force naturally in English.
- source_word: εἶπεν
  chosen: said
  alternatives:
  - declared
  - spoke
  lexicon: BDAG
  rationale: Simple past reporting verb is the most natural equivalent for λέγω here
    in citation formula.
- source_word: Τίμα
  chosen: Honor
  alternatives:
  - Respect
  - Show honor to
  lexicon: BDAG
  rationale: Imperative from τιμάω in the commandment context is best rendered 'Honor,'
    preserving both the ethical weight and the traditional command form.
- source_word: τὸν πατέρα σου καὶ τὴν μητέρα σου
  chosen: your father and your mother
  alternatives:
  - your father and mother
  lexicon: BDAG
  rationale: Retains both objects explicitly as in the Greek and echoes the commandment
    wording.
- source_word: Ὁ κακολογῶν
  chosen: Whoever speaks evil of
  alternatives:
  - The one who curses
  - Whoever reviles
  - Whoever insults
  lexicon: BDAG
  rationale: κακολογέω denotes speaking evil of, reviling, or cursing. 'Whoever speaks
    evil of' closely reflects the lexical sense without narrowing it only to formal
    cursing. The generic force of the articular participle is conveyed by 'Whoever.'
- source_word: πατέρα ἢ μητέρα
  chosen: father or mother
  alternatives:
  - his father or mother
  lexicon: BDAG
  rationale: The Greek lacks an explicit possessive pronoun in this clause; English
    idiom does not require one. 'Father or mother' preserves the coordinate alternative.
- source_word: θανάτῳ
  chosen: surely
  alternatives:
  - by death
  - with death
  lexicon: BDAG
  rationale: In the idiom θανάτῳ τελευτάω, the dative with the verb forms a Semitic-style
    legal formula meaning 'must surely die.' Rendering the dative separately as 'by
    death' would be wooden in English.
- source_word: τελευτάτω
  chosen: must ... die
  alternatives:
  - let him die
  - must be put to death
  lexicon: BDAG
  rationale: The third-person imperative in legal citation carries obligatory force.
    'Must ... die' is idiomatic and preserves the legal seriousness. 'Must be put
    to death' is possible interpretively, but the Greek wording here is the stock
    formula 'must surely die,' so that is preferred.
