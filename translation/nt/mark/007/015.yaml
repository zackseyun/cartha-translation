id: MRK.7.15
reference: Mark 7:15
source:
  edition: SBLGNT
  text: οὐδέν ἐστιν ἔξωθεν τοῦ ἀνθρώπου εἰσπορευόμενον εἰς αὐτὸν ὃ δύναται ⸂κοινῶσαι αὐτόν⸃· ἀλλὰ τὰ ⸂ἐκ τοῦ ἀνθρώπου ἐκπορευόμενά⸃ ἐστιν τὰ κοινοῦντα τὸν ⸀ἄνθρωπον.
translation:
  text: There is nothing outside a man that by going into him is able to defile him; rather, the things that come out from the man are what defile the man.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'make him unclean.' The Greek verb can refer to rendering someone unclean in a purity sense; 'defile' is used here because it also carries the broader moral force present in the context.
    reason: lexical_alternative
  - marker: b
    text: '''Man'' here is used generically for a human being, reflecting the singular Greek ἄνθρωπος.'
    reason: lexical_alternative
  - marker: c
    text: Or 'that, by going into him,'.
    reason: previous_rendering
lexical_decisions:
- source_word: οὐδέν
  chosen: nothing
  alternatives:
  - not one thing
  lexicon: BDAG
  rationale: Indefinite neuter singular used absolutely; 'nothing' is the most natural and precise English equivalent.
- source_word: ἔξωθεν
  chosen: outside
  alternatives:
  - from outside
  lexicon: BDAG
  rationale: Adverb/preposition-like term indicating external source or location. 'Outside' preserves the contrast with what comes 'out from' the man later in the verse.
- source_word: τοῦ ἀνθρώπου / τὸν ἄνθρωπον
  chosen: a man / the man
  alternatives:
  - a person / the person
  - a human being / the human being
  lexicon: BDAG
  rationale: Following the gender-accurate philosophy, ἄνθρωπος here is grammatically masculine with representative force. 'A man' preserves the singular generic form and the rhetorical parallelism of the verse better than the more neutral 'person.'
- source_word: εἰσπορευόμενον εἰς αὐτόν
  chosen: by going into him
  alternatives:
  - entering into him
  - that enters into him
  lexicon: BDAG
  rationale: The participle modifies 'nothing' and describes the manner by which an external thing would affect the man. 'By going into him' is idiomatic and preserves the participial force without overcomplicating the sentence.
- source_word: δύναται
  chosen: is able to
  alternatives:
  - can
  lexicon: BDAG
  rationale: '''Is able to'' slightly more explicitly reflects the verbal idea of capability, though functionally close to ''can.'''
- source_word: κοινῶσαι / κοινοῦντα
  chosen: defile / defile
  alternatives:
  - make unclean
  - make common
  lexicon: BDAG
  rationale: In this purity-context, κοινόω refers to rendering someone ritually or morally unclean. 'Defile' is concise, idiomatic, and preserves the seriousness of the term better than the less natural literalism 'make common.' 'Make unclean' is a viable alternative but less stylistically compact.
- source_word: ἀλλὰ
  chosen: rather
  alternatives:
  - but
  lexicon: BDAG
  rationale: Marks strong contrast. 'Rather' captures the corrective force of Jesus' statement more clearly than a simple adversative 'but.'
- source_word: τὰ ἐκ τοῦ ἀνθρώπου ἐκπορευόμενα
  chosen: the things that come out from the man
  alternatives:
  - the things coming out of the man
  - what comes out from the man
  lexicon: BDAG
  rationale: The neuter plural substantive participle is best rendered as 'the things that come out.' 'From the man' preserves the repeated preposition ἐκ and the deliberate contrast with what comes from outside.
