theological_decisions:
- issue: Meaning of κοινόω in a dispute about purity
  chosen_reading: defile
  alternative_readings:
  - make unclean
  rationale: The context concerns purity categories, but Jesus' saying also carries broader moral force in the immediate context. 'Defile' preserves both ritual and ethical resonance without narrowing the statement to ceremonial impurity alone.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Rendering ἄνθρωπος generically
  chosen_reading: man
  alternative_readings:
  - person
  - human being
  rationale: The doctrine excerpt directs gender-accurate rendering over gender-neutral where the source is grammatically masculine and representative. Here singular 'man' preserves the Greek form and rhetorical structure while still functioning generically in English.
  doctrine_reference: Translation philosophy §4
