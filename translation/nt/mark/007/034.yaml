theological_decisions:
- issue: Referent of αὐτῷ
  chosen_reading: to him (the deaf man)
  alternative_readings:
  - to the man's ears or speech faculties indirectly
  rationale: The Greek dative most naturally refers to the man Jesus is addressing,
    even though the command concerns the opening of his impeded faculties. The translation
    keeps the personal address rather than paraphrasing the implied object.
