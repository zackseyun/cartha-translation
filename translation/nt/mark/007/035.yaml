theological_decisions:
- issue: Whether to render the speech-healing phrase in a more literal or more interpretive
    way
  chosen_reading: Retain the metaphor 'the bond of his tongue was released' in the
    main text
  alternative_readings:
  - the impediment of his tongue was removed
  - his tongue was freed
  rationale: The verse describes a miraculous healing, but the Greek uses concrete
    metaphorical language rather than a clinical term. Preserving that imagery avoids
    over-interpretation while still communicating the miracle clearly in English.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve source-text
    sense without paraphrase beyond what the text warrants.'
