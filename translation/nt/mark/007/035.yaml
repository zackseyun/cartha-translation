id: MRK.7.35
reference: Mark 7:35
source:
  edition: SBLGNT
  text: ⸀καὶ ⸀ἠνοίγησαν αὐτοῦ αἱ ἀκοαί, καὶ ἐλύθη ὁ δεσμὸς τῆς γλώσσης αὐτοῦ, καὶ
    ἐλάλει ὀρθῶς·
translation:
  text: And his ears were opened, and the bond of his tongue was released, and he
    spoke plainly.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his hearing was opened.' The Greek ἀκοαί can refer to hearing as a faculty
      as well as to ears.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'the bond of his tongue was released'; that is, his speech impediment
      was removed.
    reason: lexical_alternative
  - marker: c
    text: Or 'correctly' or 'distinctly.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἠνοίγησαν
  chosen: were opened
  alternatives:
  - opened
  lexicon: BDAG
  rationale: Aorist passive plural from ἀνοίγω. Rendered as passive ('were opened')
    to reflect the Greek form and the sudden restoration of hearing. An active-like
    English rendering ('opened') is possible but less explicit.
- source_word: αἱ ἀκοαί
  chosen: his ears
  alternatives:
  - his hearing
  - his ears/hearing
  lexicon: BDAG
  rationale: Although ἀκοαί can denote 'hearing' or 'ears,' in this healing context
    the plural idiom naturally refers to the organs/function of hearing. 'His ears'
    is idiomatic English and matches the concrete sense implied by the plural.
- source_word: ἐλύθη
  chosen: was released
  alternatives:
  - was loosed
  - was untied
  lexicon: BDAG
  rationale: Aorist passive of λύω. 'Was released' communicates the passive removal
    of impediment in clear modern English. 'Was loosed' is more traditional but less
    natural for contemporary readers.
- source_word: ὁ δεσμὸς τῆς γλώσσης αὐτοῦ
  chosen: the bond of his tongue
  alternatives:
  - the impediment of his tongue
  - the restraint of his tongue
  lexicon: BDAG
  rationale: δεσμός literally denotes a bond, chain, or fetter. The phrase is metaphorical
    for the condition restricting speech. 'Bond of his tongue' preserves the imagery
    of the Greek better than the more interpretive 'speech impediment,' while remaining
    understandable in context.
- source_word: ἐλάλει
  chosen: he spoke
  alternatives:
  - he began to speak
  - he was speaking
  lexicon: BDAG
  rationale: Imperfect of λαλέω can suggest ongoing action, but in narrative English
    after the healing, 'he spoke' best conveys the restored ability without awkwardness.
    'Began to speak' adds an inceptive nuance not explicit in the verb itself.
- source_word: ὀρθῶς
  chosen: plainly
  alternatives:
  - correctly
  - properly
  - distinctly
  lexicon: BDAG
  rationale: ὀρθῶς means rightly/correctly, and in this context of healed speech it
    refers to speaking normally and intelligibly. 'Plainly' captures clear, proper
    speech in natural English. 'Correctly' could sound morally or grammatically focused
    rather than medically restorative.
