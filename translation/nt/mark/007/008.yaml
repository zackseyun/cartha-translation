theological_decisions:
- issue: Contrast between divine command and human tradition
  chosen_reading: 'Render the verse to preserve the sharp opposition: ''the commandment
    of God'' versus ''the tradition of men.'''
  alternative_readings:
  - Use 'people' instead of 'men' for contemporary inclusivity
  rationale: The verse's theological force lies in Jesus' rebuke of elevating humanly
    derived tradition over God's command. The translation should preserve that contrast
    without importing a broader anti-tradition claim beyond the text. 'Men' keeps
    the representative human/divine contrast in line with the project's gender-accurate
    policy.
