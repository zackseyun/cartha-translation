id: MRK.7.8
reference: Mark 7:8
source:
  edition: SBLGNT
  text: ⸀ἀφέντες τὴν ἐντολὴν τοῦ θεοῦ κρατεῖτε τὴν παράδοσιν τῶν ⸀ἀνθρώπων.
translation:
  text: Leaving the commandment of God, you hold fast to the tradition of men.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''people'' / ''human beings.'' Greek: ''men,'' contrasting what is human
      with what is from God.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀφέντες
  chosen: Leaving
  alternatives:
  - Having left
  - Abandoning
  lexicon: BDAG
  rationale: Aorist active participle from ἀφίημι, here indicating prior/concurrent
    action relative to the main verb. 'Leaving' is concise and natural in English
    while preserving the force of setting aside. 'Abandoning' is possible but slightly
    more interpretive and rhetorically stronger than the Greek requires.
- source_word: ἐντολή
  chosen: commandment
  alternatives:
  - command
  lexicon: BDAG
  rationale: '''Commandment'' preserves the formal, covenantal-religious sense of
    ἐντολή in a dispute about divine obligation. ''Command'' is possible but slightly
    flatter and less resonant in this context.'
- source_word: τοῦ θεοῦ
  chosen: of God
  lexicon: BDAG
  rationale: Straightforward possessive genitive indicating the divine source of the
    commandment.
- source_word: κρατεῖτε
  chosen: hold fast to
  alternatives:
  - hold to
  - keep firmly
  - cling to
  lexicon: BDAG
  rationale: κρατέω here conveys firm adherence. 'Hold fast to' captures the sense
    of tenacious attachment better than the more neutral 'hold to,' while remaining
    idiomatic and not overly paraphrastic.
- source_word: παράδοσιν
  chosen: tradition
  alternatives:
  - tradition handed down
  lexicon: BDAG
  rationale: '''Tradition'' is the standard and most natural rendering for παράδοσις
    here, referring to inherited human practices. The expanded alternative is accurate
    but unnecessarily verbose in the main text.'
- source_word: ἀνθρώπων
  chosen: men
  alternatives:
  - human beings
  - people
  lexicon: BDAG
  rationale: The genitive plural contrasts what is human with what is divine. Per
    the project's gender-accurate philosophy, 'men' is retained because the term here
    denotes humans in general in a representative contrast, not specifically males
    as opposed to females. 'People' is possible but softens the sharp biblical contrast
    between God's commandment and human tradition.
