id: MRK.7.27
reference: Mark 7:27
source:
  edition: SBLGNT
  text: ⸂καὶ ἔλεγεν⸃ αὐτῇ· Ἄφες πρῶτον χορτασθῆναι τὰ τέκνα, οὐ γὰρ ⸂καλόν ἐστιν⸃
    λαβεῖν τὸν ἄρτον τῶν τέκνων καὶ ⸂τοῖς κυναρίοις βαλεῖν⸃.
translation:
  text: And he was saying to her, “Let the children be fed first, for it is not right
    to take the children’s bread and throw it to the little dogs.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “house dogs” or simply “dogs.” The Greek uses a diminutive term, suggesting
      small or household dogs rather than emphasizing wild scavenger dogs.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔλεγεν
  chosen: was saying
  alternatives:
  - said
  lexicon: BDAG
  rationale: Imperfect tense suggests ongoing or iterative speech; 'was saying' preserves
    that aspect better than the simple past 'said,' while remaining natural English.
- source_word: Ἄφες
  chosen: Let
  alternatives:
  - Allow
  - Permit
  lexicon: BDAG
  rationale: Aorist imperative of ἀφίημι here functions idiomatically as 'let' or
    'allow.' 'Let' is concise and idiomatic in English for permitting an action to
    occur.
- source_word: πρῶτον
  chosen: first
  alternatives:
  - first of all
  - beforehand
  lexicon: BDAG
  rationale: '''First'' preserves the temporal/sequential force and leaves intact
    the implication that the present priority does not necessarily exclude a later
    extension beyond ''the children.'''
- source_word: χορτασθῆναι
  chosen: be fed
  alternatives:
  - be satisfied
  - be filled
  lexicon: BDAG
  rationale: The passive infinitive can mean to be fed to satisfaction. 'Be fed' fits
    the bread/meal imagery and is more natural in English here than 'be satisfied,'
    while still implying nourishment.
- source_word: τὰ τέκνα
  chosen: the children
  alternatives:
  - the sons and daughters
  - the little children
  lexicon: BDAG
  rationale: τέκνα is the ordinary plural for children. 'The children' is natural
    and preserves the familial metaphor without over-specifying age or gender.
- source_word: καλόν ἐστιν
  chosen: it is not right
  alternatives:
  - it is not good
  - it is not proper
  lexicon: BDAG
  rationale: καλός can denote what is fitting, proper, or good. In this context of
    social and moral propriety within a household metaphor, 'it is not right' best
    conveys the sense of what is fitting rather than merely aesthetically 'good.'
- source_word: λαβεῖν
  chosen: to take
  alternatives:
  - to take away
  lexicon: BDAG
  rationale: The infinitive straightforwardly means 'to take.' The context already
    implies removal from one party for another, so the simple gloss is sufficient.
- source_word: ἄρτον
  chosen: bread
  alternatives:
  - loaf
  - food
  lexicon: BDAG
  rationale: '''Bread'' is the direct lexical equivalent and preserves the concrete
    household image. Broader ''food'' would flatten the metaphor.'
- source_word: κυναρίοις
  chosen: little dogs
  alternatives:
  - dogs
  - house dogs
  - puppies
  lexicon: BDAG
  rationale: The diminutive form κυνάριον likely softens the image relative to scavenger
    dogs and fits a household setting. 'Little dogs' preserves the lexical diminutive
    more transparently than 'dogs,' while avoiding the potentially overly cute modern
    connotations of 'puppies.'
- source_word: βαλεῖν
  chosen: throw it to
  alternatives:
  - cast to
  - give to
  lexicon: BDAG
  rationale: βάλλω literally means 'throw' or 'cast.' 'Throw it to' preserves the
    vividness of the image better than the weaker 'give to.' The pronoun 'it' is supplied
    naturally in English from 'bread'.
