theological_decisions:
- issue: Metaphorical force of 'children' and 'little dogs' in Jesus' saying
  chosen_reading: Retain the household metaphor without explicating its referents
    in the main text.
  alternative_readings:
  - Interpretively paraphrasing 'children' as Israel/Jews and 'little dogs' as Gentiles
    in the translation
  rationale: The verse's historical and theological force depends on the metaphor,
    but the Greek itself presents it as a metaphor rather than an explicit interpretive
    gloss. Preserving the image avoids importing explanatory material into the text
    while allowing readers to infer or learn the referents from context.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Nuance of πρῶτον ('first')
  chosen_reading: Preserve 'first' in the main text.
  alternative_readings:
  - Omit the sequential nuance for smoother English
  rationale: 'Including ''first'' preserves an important theological and narrative
    tension: priority to ''the children'' without necessarily implying permanent exclusion
    of others. This aligns with the instruction to preserve theological tension rather
    than resolve it.'
  doctrine_reference: Translation philosophy §3
