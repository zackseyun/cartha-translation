theological_decisions:
- issue: Rendering of πνεῦμα ἀκάθαρτον
  chosen_reading: unclean spirit
  alternative_readings:
  - impure spirit
  - demon
  rationale: The phrase is rendered literally to preserve Mark's terminology and its
    ritual/moral connotations. Using 'demon' would be interpretive rather than directly
    lexical, even though the referent overlaps.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented
    exception)
