id: MRK.7.25
reference: Mark 7:25
source:
  edition: SBLGNT
  text: ⸂ἀλλ’ εὐθὺς ἀκούσασα⸃ γυνὴ περὶ αὐτοῦ, ἧς εἶχεν τὸ θυγάτριον αὐτῆς πνεῦμα
    ἀκάθαρτον, ἐλθοῦσα προσέπεσεν πρὸς τοὺς πόδας αὐτοῦ·
translation:
  text: But immediately a woman whose little daughter had an unclean spirit heard
    about him, came, and fell at his feet.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'little girl.' The Greek θυγάτριον is a diminutive form of 'daughter.'
    reason: lexical_alternative
  - marker: b
    text: Or 'impure spirit'; traditionally also understood as a demon.
    reason: alternative_reading
lexical_decisions:
- source_word: ἀλλ’
  chosen: But
  alternatives:
  - Now
  - And
  lexicon: BDAG
  rationale: Retains the mild adversative/continuative force linking this verse to
    the preceding context. 'But' reflects the Greek transition naturally in English
    narrative.
- source_word: εὐθὺς
  chosen: immediately
  alternatives:
  - at once
  - right away
  lexicon: BDAG
  rationale: Mark characteristically uses εὐθύς for narrative urgency. 'Immediately'
    preserves that stylistic feature more formally than 'right away.'
- source_word: ἀκούσασα ... περὶ αὐτοῦ
  chosen: heard about him
  alternatives:
  - having heard about him
  - heard concerning him
  lexicon: BDAG
  rationale: The participle with περί + genitive indicates hearing news/reports about
    Jesus. 'Heard about him' is idiomatic modern English while preserving the sense.
- source_word: γυνὴ
  chosen: a woman
  alternatives:
  - the woman
  lexicon: BDAG
  rationale: 'Anarthrous γυνή is best introduced as indefinite here: a woman enters
    the scene.'
- source_word: ἧς εἶχεν τὸ θυγάτριον αὐτῆς πνεῦμα ἀκάθαρτον
  chosen: whose little daughter had an unclean spirit
  alternatives:
  - whose daughter had an unclean spirit
  - whose little girl had an unclean spirit
  lexicon: BDAG
  rationale: The relative clause identifies the woman by her daughter's condition.
    θυγάτριον is a diminutive, so 'little daughter' preserves the nuance without becoming
    overly colloquial. 'Had an unclean spirit' follows the Greek idiom directly.
- source_word: θυγάτριον
  chosen: little daughter
  alternatives:
  - little girl
  - daughter
  lexicon: BDAG
  rationale: The diminutive form suggests smallness or tenderness. 'Little daughter'
    keeps the familial relationship explicit and preserves the diminutive nuance better
    than simply 'daughter.'
- source_word: πνεῦμα ἀκάθαρτον
  chosen: unclean spirit
  alternatives:
  - impure spirit
  - demon
  lexicon: BDAG
  rationale: This is Mark's regular expression and should be translated consistently.
    'Unclean spirit' preserves the source wording; 'demon' is interpretive and less
    lexically transparent.
- source_word: ἐλθοῦσα
  chosen: came
  alternatives:
  - having come
  - went
  lexicon: BDAG
  rationale: The participle is naturally rendered in sequence in English narrative.
    'Came' fits the viewpoint of the scene and avoids awkward over-literalism.
- source_word: προσέπεσεν πρὸς τοὺς πόδας αὐτοῦ
  chosen: fell at his feet
  alternatives:
  - fell before his feet
  - prostrated herself at his feet
  lexicon: BDAG
  rationale: προσπίπτω here denotes a gesture of urgent supplication and humility.
    'Fell at his feet' is idiomatic, accurate, and preserves the physical imagery
    without over-specifying the posture.
