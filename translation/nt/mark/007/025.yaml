  from: But immediately a woman whose little daughter had an unclean spirit heard
    about him, came, and fell at his feet.
  to: But a woman whose little daughter had an unclean spirit heard about him, and
    immediately came and fell at his feet.
  rationale: The current word order places a long relative clause ('whose little daughter
    had an unclean spirit') between the adverb 'immediately' and the verb it modifies
    ('heard'), which is syntactically awkward. Furthermore, the Greek phrase 'εὐθὺς
    ἀκούσασα' implies an immediate reaction *to* the hearing. The current rendering
    suggests the hearing itself was immediate, which is less logical. The suggested
    rewrite improves readability and more accurately places the immediacy on the actions
    of coming and falling, which is the most natural reading of the Greek.
