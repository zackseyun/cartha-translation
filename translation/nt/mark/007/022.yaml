theological_decisions:
- issue: Rendering of βλασφημία in a vice list
  chosen_reading: slander
  alternative_readings:
  - blasphemy
  rationale: Because the surrounding items are interpersonal and moral vices, a broader
    speech-sin sense fits naturally here. However, since the Greek term can also denote
    blasphemy against God, the alternative is preserved in a footnote rather than
    excluded.
  doctrine_reference: Preserve theological tension rather than resolve it.
