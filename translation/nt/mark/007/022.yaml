id: MRK.7.22
reference: Mark 7:22
source:
  edition: SBLGNT
  text: μοιχεῖαι⸃, πλεονεξίαι, πονηρίαι, δόλος, ἀσέλγεια, ὀφθαλμὸς πονηρός, βλασφημία,
    ὑπερηφανία, ἀφροσύνη·
translation:
  text: adulteries, greed, wickednesses, deceit, sensuality, an evil eye, slander,
    pride, foolishness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'envy' or 'a grudging eye'; literally 'an evil eye,' an idiom for envious
      or malicious outlook.
    reason: lexical_alternative
  - marker: b
    text: Or 'blasphemy.' The Greek term can refer either to slander against people
      or blasphemous speech against God.
    reason: alternative_reading
lexical_decisions:
- source_word: μοιχεῖαι
  chosen: adulteries
  alternatives:
  - acts of adultery
  - adultery
  lexicon: BDAG
  rationale: Plural noun; rendering with the English plural preserves the list structure
    and repeated acts implied by the Greek better than the abstract singular 'adultery'.
- source_word: πλεονεξίαι
  chosen: greed
  alternatives:
  - covetousness
  - greedy desires
  lexicon: BDAG
  rationale: The term denotes grasping desire for more, often with material or exploitative
    force. 'Greed' is clear modern English and fits the vice list naturally.
- source_word: πονηρίαι
  chosen: wickednesses
  alternatives:
  - evil deeds
  - malice
  - wickedness
  lexicon: BDAG
  rationale: The plural is explicit in Greek and likely denotes multiple expressions
    of moral corruption. 'Wickednesses' is slightly less idiomatic but preserves the
    plural form better than singular 'wickedness.'
- source_word: δόλος
  chosen: deceit
  alternatives:
  - guile
  - treachery
  lexicon: BDAG
  rationale: '''Deceit'' is the most natural contemporary rendering for intentional
    deception; ''guile'' is accurate but archaic for many readers.'
- source_word: ἀσέλγεια
  chosen: sensuality
  alternatives:
  - debauchery
  - licentiousness
  - lewdness
  lexicon: BDAG
  rationale: The word refers to shameless, unrestrained conduct, often sexual. 'Sensuality'
    is readable modern English and preserves the moral force without sounding overly
    archaic.
- source_word: ὀφθαλμὸς πονηρός
  chosen: an evil eye
  alternatives:
  - envy
  - a grudging eye
  lexicon: BDAG
  rationale: This is an idiomatic expression in Greek and Jewish usage. The main text
    preserves the metaphor literally for transparency; an explanatory alternative
    is preserved in a footnote.
- source_word: βλασφημία
  chosen: slander
  alternatives:
  - blasphemy
  - abusive speech
  lexicon: BDAG
  rationale: In this vice list, the term likely refers broadly to injurious, reviling
    speech against others or against God. 'Slander' is the clearest contextual rendering
    in English, while 'blasphemy' remains a viable alternative worth preserving.
- source_word: ὑπερηφανία
  chosen: pride
  alternatives:
  - arrogance
  - haughtiness
  lexicon: BDAG
  rationale: The noun denotes arrogant self-exaltation. 'Pride' is concise and idiomatic,
    though 'arrogance' is a close contextual alternative.
- source_word: ἀφροσύνη
  chosen: foolishness
  alternatives:
  - folly
  - senselessness
  lexicon: BDAG
  rationale: The term denotes moral and practical lack of sense, not mere low intelligence.
    'Foolishness' communicates this well in a vice list.
