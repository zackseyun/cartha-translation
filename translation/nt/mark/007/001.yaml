id: MRK.7.1
reference: Mark 7:1
source:
  edition: SBLGNT
  text: Καὶ συνάγονται πρὸς αὐτὸν οἱ Φαρισαῖοι καί τινες τῶν γραμματέων ἐλθόντες ἀπὸ
    Ἱεροσολύμων
translation:
  text: And the Pharisees and some of the scribes, having come from Jerusalem, gather
    around him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'gather to him.' The Greek expression is more literally 'gather to him,'
      but 'gather around him' is more natural English in this context.
    reason: lexical_alternative
lexical_decisions:
- source_word: συνάγονται
  chosen: gather around
  alternatives:
  - gather to
  - come together around
  - assemble before
  lexicon: BDAG
  rationale: Present middle/passive indicative conveys an in-progress narrative present
    in Mark. 'Gather around' gives natural English while preserving the sense of assembling
    in relation to Jesus. 'Gather to' is more literal but less idiomatic in English.
- source_word: πρὸς αὐτὸν
  chosen: around him
  alternatives:
  - to him
  - before him
  - toward him
  lexicon: BDAG
  rationale: With συνάγονται, πρός + accusative indicates movement/association toward
    Jesus. In idiomatic English, 'gather around him' best captures the combined force
    of the verb and prepositional phrase. 'To him' is possible but sounds incomplete
    with 'gather' in English.
- source_word: Φαρισαῖοι
  chosen: the Pharisees
  lexicon: BDAG
  rationale: Standard transliteration for the Jewish sect/group; title-like group
    name is conventionally transliterated rather than translated.
- source_word: τινες τῶν γραμματέων
  chosen: some of the scribes
  alternatives:
  - some scribes
  - certain of the scribes
  lexicon: BDAG
  rationale: The partitive genitive is best represented by 'some of the scribes,'
    making explicit that only a subset is in view. 'Some scribes' is smoother but
    slightly less precise.
- source_word: γραμματέων
  chosen: scribes
  alternatives:
  - teachers of the law
  - experts in the law
  lexicon: BDAG
  rationale: '''Scribes'' is the most direct and established rendering of γραμματεῖς
    in the Gospels. Alternatives interpret their function more explicitly but move
    away from the lexical form.'
- source_word: ἐλθόντες
  chosen: having come
  alternatives:
  - who had come
  - after coming
  lexicon: BDAG
  rationale: Aorist participle antecedent to the main verb indicates prior action
    relative to the gathering. 'Having come' preserves the participial structure and
    temporal sequence without overinterpreting.
- source_word: ἀπὸ Ἱεροσολύμων
  chosen: from Jerusalem
  lexicon: BDAG
  rationale: Straightforward source/location phrase. 'Jerusalem' is the standard English
    form of Ἱεροσόλυμα.
- source_word: Καὶ
  chosen: And
  alternatives:
  - Now
  lexicon: BDAG
  rationale: Mark frequently uses καί for narrative progression. 'And' preserves the
    connective force more transparently than the more stylistic 'Now'.
