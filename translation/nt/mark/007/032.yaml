theological_decisions:
- issue: Nature of the man's impairment
  chosen_reading: The man is described as deaf and as having impaired speech, not
    as completely mute.
  alternative_readings:
  - deaf and mute
  rationale: The separate adjectives κωφός and μογιλάλος suggest deafness plus difficulty
    speaking. Rendering him as 'mute' would overstate μογιλάλος and blur the distinction
    made in the Greek.
