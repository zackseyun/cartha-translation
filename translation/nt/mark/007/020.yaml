theological_decisions:
- issue: Purity-language of κοινόω in Jesus' teaching
  chosen_reading: defiles
  alternative_readings:
  - makes unclean
  rationale: The context concerns ritual and moral impurity. 'Defiles' communicates
    the theological force in natural English, while 'makes unclean' preserves the
    more explicit purity-category and is noted in a footnote. This avoids flattening
    the Jewish purity background while keeping the main text readable.
  doctrine_reference: Translation philosophy §§1, 5, 6
