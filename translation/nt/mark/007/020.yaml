id: MRK.7.20
reference: Mark 7:20
source:
  edition: SBLGNT
  text: ἔλεγεν δὲ ὅτι Τὸ ἐκ τοῦ ἀνθρώπου ἐκπορευόμενον ἐκεῖνο κοινοῖ τὸν ἄνθρωπον·
translation:
  text: And he was saying, “What comes out from the man—that defiles the man.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “makes the man unclean.” The Greek verb is purity-language used for rendering
      someone defiled or unclean.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔλεγεν
  chosen: he was saying
  alternatives:
  - he said
  lexicon: BDAG
  rationale: Imperfect tense indicates ongoing or repeated speech in narrative; 'was
    saying' preserves that aspect better than simple past, while remaining natural
    English.
- source_word: δὲ
  chosen: And
  alternatives:
  - Now
  - Then
  - ', and'
  lexicon: BDAG
  rationale: δέ here functions as a mild connective in narrative. 'And' is a natural
    English equivalent that preserves continuity without overstating contrast.
- source_word: ὅτι
  chosen: “
  alternatives:
  - that
  lexicon: BDAG
  rationale: Introduces direct discourse content after a verb of speaking. English
    idiom prefers quotation rather than an explicit 'that' clause here.
- source_word: Τὸ ἐκ τοῦ ἀνθρώπου ἐκπορευόμενον
  chosen: What comes out from the man
  alternatives:
  - The thing coming out of the man
  - What proceeds out of the man
  lexicon: BDAG
  rationale: The articular participial construction is substantival and best rendered
    idiomatically as 'what comes out.' 'From the man' preserves ἐκ while keeping readable
    English. 'Man' is retained for gender-accurate representative force in line with
    project philosophy.
- source_word: ἀνθρώπου / ἄνθρωπον
  chosen: the man
  alternatives:
  - a person
  - a human being
  - the person
  lexicon: BDAG
  rationale: ἄνθρωπος here has generic/representative force, but the Greek uses the
    singular with article. Per doctrine, gender-accurate rendering is preferred over
    gender-neutral where representative force is intended. 'The man' preserves the
    source form and the rhetorical parallelism.
- source_word: ἐκπορευόμενον
  chosen: comes out
  alternatives:
  - proceeds
  - goes out
  lexicon: BDAG
  rationale: '''Comes out'' is clear modern English and fits the concrete metaphor.
    ''Proceeds'' is more formal but less natural for the target audience.'
- source_word: ἐκεῖνο
  chosen: that
  alternatives:
  - that thing
  - it
  lexicon: BDAG
  rationale: 'Demonstrative pronoun gives emphasis: that very thing is what defiles.
    ''That'' preserves the emphasis without awkwardness.'
- source_word: κοινοῖ
  chosen: defiles
  alternatives:
  - makes unclean
  - makes common
  lexicon: BDAG
  rationale: In this purity-context, κοινόω means to render defiled/unclean rather
    than literally 'make common.' 'Defiles' is the clearest concise rendering in context;
    'makes unclean' is a viable alternative worth preserving in a footnote because
    of the ritual-purity background.
