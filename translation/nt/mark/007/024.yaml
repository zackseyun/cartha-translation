id: MRK.7.24
reference: Mark 7:24
source:
  edition: SBLGNT
  text: ⸂Ἐκεῖθεν δὲ⸃ ἀναστὰς ἀπῆλθεν εἰς τὰ ⸀ὅρια ⸀Τύρου. καὶ εἰσελθὼν εἰς οἰκίαν
    οὐδένα ἤθελεν γνῶναι, καὶ οὐκ ἠδυνήθη λαθεῖν·
translation:
  text: From there he got up and went away to the region of Tyre. After entering a
    house, he wanted no one to know it, yet he could not remain hidden.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "to the territory of Tyre"; the Greek can refer to the district or border-region
      associated with Tyre, not necessarily only its boundary line.
    reason: lexical_alternative
  - marker: b
    text: Literally, "he wanted no one to know"; the object is implicit in Greek,
      referring to his presence or whereabouts.
    reason: lexical_alternative
  - marker: c
    text: Or "he could not escape notice."
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐκεῖθεν δὲ
  chosen: From there
  alternatives:
  - And from there
  - Now from there
  lexicon: BDAG
  rationale: Ἐκεῖθεν denotes movement from the previous location; δέ is lightly connective
    and is naturally absorbed into smooth English rather than rendered with a heavy
    adversative.
- source_word: ἀναστὰς
  chosen: he got up
  alternatives:
  - arising
  - having arisen
  lexicon: BDAG
  rationale: The aorist participle commonly introduces the next action in narrative.
    'He got up' preserves the concrete movement without sounding wooden.
- source_word: ἀπῆλθεν
  chosen: went away
  alternatives:
  - departed
  - went
  lexicon: BDAG
  rationale: ἀπέρχομαι carries the sense of departure from one place to another. 'Went
    away' preserves the directional nuance better than the flatter 'went' and is more
    natural than 'departed'.
- source_word: εἰς τὰ ὅρια Τύρου
  chosen: to the region of Tyre
  alternatives:
  - into the territory of Tyre
  - to the borders of Tyre
  lexicon: BDAG
  rationale: ὅρια can mean borders, region, or territory. In this narrative context
    it refers to the district/area associated with Tyre, not merely a boundary line.
    'Region of Tyre' is clear modern English.
- source_word: καὶ εἰσελθὼν εἰς οἰκίαν
  chosen: After entering a house
  alternatives:
  - And entering a house
  - When he entered a house
  lexicon: BDAG
  rationale: The participle is temporal/sequential. The anarthrous οἰκίαν is indefinite,
    so 'a house' is preferable to 'the house' or simply 'house' in English.
- source_word: οὐδένα ἤθελεν γνῶναι
  chosen: he wanted no one to know it
  alternatives:
  - he wanted no one to know
  - he wanted no one to know where he was
  lexicon: BDAG
  rationale: The construction means he desired that nobody become aware of his presence/situation.
    English idiom usually requires an object, so 'it' is supplied to convey the implied
    content without over-specifying.
- source_word: καὶ οὐκ ἠδυνήθη λαθεῖν
  chosen: yet he could not remain hidden
  alternatives:
  - and he could not escape notice
  - and he could not be hidden
  lexicon: BDAG
  rationale: λανθάνω here means to escape notice or remain concealed. 'Remain hidden'
    captures the resultative sense in natural English; 'yet' brings out the contrast
    with his intention.
