id: MRK.7.28
reference: Mark 7:28
source:
  edition: SBLGNT
  text: ἡ δὲ ἀπεκρίθη καὶ λέγει αὐτῷ· ⸀Κύριε, ⸀καὶ τὰ κυνάρια ὑποκάτω τῆς τραπέζης
    ⸀ἐσθίουσιν ἀπὸ τῶν ψιχίων τῶν παιδίων.
translation:
  text: But she answered and said to him, “Lord, even the little dogs under the table
    eat from the children's crumbs.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "Sir." The Greek κύριε can function as a respectful form of address as
      well as the title "Lord."
    reason: alternative_reading
  - marker: b
    text: The Greek term means small or household dogs; "little dogs" preserves the
      diminutive nuance.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπεκρίθη
  chosen: answered
  alternatives:
  - replied
  lexicon: BDAG
  rationale: Standard narrative rendering for ἀποκρίνομαι; 'answered' fits the dialogue
    context and preserves the formal response sense.
- source_word: λέγει
  chosen: said
  alternatives:
  - says
  lexicon: BDAG
  rationale: Although the Greek uses the historical present, English narrative style
    commonly smooths this to past tense in aorist-present sequences; 'said' is natural
    modern English while preserving the sense.
- source_word: Κύριε
  chosen: Lord
  alternatives:
  - Sir
  lexicon: BDAG
  rationale: Following the doctrine default for κύριος, 'Lord' is preferred. In this
    direct address it can also carry respectful address, but the default title rendering
    is retained.
- source_word: καὶ
  chosen: even
  alternatives:
  - also
  - 'yes'
  lexicon: BDAG
  rationale: Here καί is concessive/additive in the woman's response to Jesus' metaphor.
    'Even' best captures her point that the little dogs too receive something.
- source_word: κυνάρια
  chosen: little dogs
  alternatives:
  - dogs
  - house dogs
  - puppies
  lexicon: BDAG
  rationale: The diminutive form suggests small/household dogs rather than a generic
    harsh term. 'Little dogs' preserves the lexical nuance without becoming overly
    colloquial like 'puppies.'
- source_word: ὑποκάτω τῆς τραπέζης
  chosen: under the table
  alternatives:
  - beneath the table
  lexicon: BDAG
  rationale: A straightforward spatial phrase; 'under the table' is idiomatic and
    accurate.
- source_word: ἐσθίουσιν
  chosen: eat
  alternatives:
  - are eating
  lexicon: BDAG
  rationale: Present tense here expresses customary action in the illustration. Simple
    present 'eat' communicates the proverbial/general sense.
- source_word: ἀπὸ τῶν ψιχίων
  chosen: from the crumbs
  alternatives:
  - some of the crumbs
  - from the scraps
  lexicon: BDAG
  rationale: ψιχίων refers to small bits or crumbs. 'From the crumbs' preserves the
    partitive force of ἀπό without overtranslating.
- source_word: τῶν παιδίων
  chosen: the children's
  alternatives:
  - the children's food
  - the little children's
  lexicon: BDAG
  rationale: παιδίων means children; the genitive naturally modifies 'crumbs' as belonging
    to or associated with the children. Supplying 'food' would go beyond the explicit
    wording.
