theological_decisions:
- issue: Rendering of κύριος in the woman's address to Jesus
  chosen_reading: Lord
  alternative_readings:
  - Sir
  rationale: The doctrine excerpt specifies 'Lord' as the default rendering for κύριος.
    While the immediate context allows a respectful 'Sir,' retaining 'Lord' preserves
    consistency and does not overstate the text beyond a respectful address to Jesus.
