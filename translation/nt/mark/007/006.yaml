id: MRK.7.6
reference: Mark 7:6
source:
  edition: SBLGNT
  text: ὁ ⸀δὲ εἶπεν ⸀αὐτοῖς· Καλῶς ἐπροφήτευσεν Ἠσαΐας περὶ ὑμῶν τῶν ὑποκριτῶν, ὡς
    γέγραπται ⸀ὅτι Οὗτος ὁ λαὸς τοῖς χείλεσίν με τιμᾷ, ἡ δὲ καρδία αὐτῶν πόρρω ἀπέχει
    ἀπ’ ἐμοῦ·
translation:
  text: 'But he said to them, “Isaiah prophesied well about you hypocrites, as it
    is written: ‘This people honors me with their lips, but their heart is far from
    me.’”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'This people honors me with its lips, but its heart is far from me.'
      Greek uses singular nouns ('people,' 'heart'), but English commonly uses plural
      possessives for a collective group.
    reason: lexical_alternative
lexical_decisions:
- source_word: δὲ
  chosen: But
  alternatives:
  - And
  lexicon: BDAG
  rationale: Marks a mild contrast or transition from the preceding exchange; 'But'
    fits the argumentative turn in Jesus' reply better than simple 'And.'
- source_word: εἶπεν αὐτοῖς
  chosen: he said to them
  alternatives:
  - he told them
  lexicon: BDAG
  rationale: Standard narrative rendering of λέγω with dative indirect object; 'said
    to them' is more formally aligned with the Greek than 'told them.'
- source_word: Καλῶς
  chosen: well
  alternatives:
  - rightly
  - accurately
  lexicon: BDAG
  rationale: Adverb modifying ἐπροφήτευσεν. 'Well' preserves the straightforward evaluative
    force without overinterpreting whether the emphasis is moral ('rightly') or exactness
    ('accurately').
- source_word: ἐπροφήτευσεν
  chosen: prophesied
  alternatives:
  - spoke prophetically
  lexicon: BDAG
  rationale: Direct and standard rendering of the aorist verb; keeps the prophetic
    citation formula clear.
- source_word: περὶ ὑμῶν
  chosen: about you
  alternatives:
  - concerning you
  lexicon: BDAG
  rationale: περί with genitive here indicates reference. 'About you' is natural modern
    English while remaining accurate.
- source_word: τῶν ὑποκριτῶν
  chosen: you hypocrites
  alternatives:
  - you pretenders
  lexicon: BDAG
  rationale: The genitive phrase is appositional to ὑμῶν, identifying the audience.
    'Hypocrites' is the established and accurate gloss for ὑποκριταί in this moral-religious
    sense.
- source_word: ὡς γέγραπται ὅτι
  chosen: 'as it is written:'
  alternatives:
  - just as it is written that
  lexicon: BDAG
  rationale: Idiomatic citation formula. English normally omits an explicit 'that'
    after 'it is written' when introducing a quotation; the colon reflects the quotation
    structure.
- source_word: Οὗτος ὁ λαὸς
  chosen: This people
  alternatives:
  - These people
  lexicon: BDAG
  rationale: The singular demonstrative and noun echo the scriptural citation (Isa
    29:13 LXX). 'This people' preserves the prophetic tone better than the more colloquial
    'these people.'
- source_word: τοῖς χείλεσίν με τιμᾷ
  chosen: honors me with their lips
  alternatives:
  - honors me with its lips
  lexicon: BDAG
  rationale: τιμάω here means 'honor.' Although λαός is grammatically singular, English
    naturally uses plural possessive 'their' for a collective noun referring to a
    group of people. This preserves sense without awkwardness.
- source_word: ἡ δὲ καρδία αὐτῶν
  chosen: but their heart
  alternatives:
  - but its heart
  lexicon: BDAG
  rationale: καρδία is singular in Greek, functioning collectively for the inner disposition
    of the people. 'Their heart' preserves the singular metaphor while using natural
    English reference to the group.
- source_word: πόρρω ἀπέχει ἀπ’ ἐμοῦ
  chosen: is far from me
  alternatives:
  - stands far away from me
  - keeps far from me
  lexicon: BDAG
  rationale: The expression denotes relational/spiritual distance, not merely spatial
    separation. 'Is far from me' is idiomatic and faithful.
