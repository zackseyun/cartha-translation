theological_decisions:
- issue: Quotation of Isaiah 29:13 applied by Jesus to his opponents
  chosen_reading: Retained the direct prophetic indictment 'This people' and 'you
    hypocrites' without softening, preserving Jesus' application of Isaiah to the
    present audience.
  alternative_readings:
  - Softer paraphrases that generalize the statement rather than directly indict the
    hearers
  rationale: The verse presents Jesus explicitly applying Isaiah's words to the religious
    leaders before him. The translation should preserve that force without importing
    additional doctrinal interpretation.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
