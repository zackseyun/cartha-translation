theological_decisions:
- issue: Tone of Jesus' statement
  chosen_reading: An ironic rebuke rather than straightforward commendation
  alternative_readings:
  - A literal commendation ('You do well to set aside...')
  rationale: In context Jesus is condemning the Pharisaic practice of elevating human
    tradition over God's command. Rendering καλῶς with an ironic English adverb preserves
    the rebuke without implying approval.
  doctrine_reference: Translation philosophy §3 (preserve the source's tension without
    importing doctrine)
