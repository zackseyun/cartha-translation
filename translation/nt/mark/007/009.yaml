id: MRK.7.9
reference: Mark 7:9
source:
  edition: SBLGNT
  text: Καὶ ἔλεγεν αὐτοῖς· Καλῶς ἀθετεῖτε τὴν ἐντολὴν τοῦ θεοῦ, ἵνα τὴν παράδοσιν
    ὑμῶν ⸀τηρήσητε·
translation:
  text: And he was saying to them, “You neatly set aside the commandment of God so
    that you may keep your tradition.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'You do well at setting aside the commandment of God in order to keep
      your tradition'—the Greek adverb is ironic here, not approving.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔλεγεν
  chosen: he was saying
  alternatives:
  - he said
  - he kept saying
  lexicon: BDAG
  rationale: Imperfect tense suggests ongoing or iterative speech. 'He was saying'
    preserves that aspect more transparently than simple past, while remaining natural
    English.
- source_word: Καλῶς
  chosen: neatly
  alternatives:
  - well
  - finely
  - admirably
  - nicely
  lexicon: BDAG
  rationale: 'Here καλῶς is used with irony. A bare ''well'' in contemporary English
    can sound approving rather than sarcastic. ''Neatly'' conveys the cutting irony:
    they have skillfully managed to nullify God''s command.'
- source_word: ἀθετεῖτε
  chosen: set aside
  alternatives:
  - reject
  - nullify
  - invalidate
  lexicon: BDAG
  rationale: ἀθετέω can mean reject, set aside, or nullify. 'Set aside' is idiomatic
    and clear in modern English, expressing deliberate disregard without overtechnical
    wording. It also fits the contrast with 'keep' their tradition.
- source_word: ἐντολήν
  chosen: commandment
  alternatives:
  - command
  lexicon: BDAG
  rationale: '''Commandment'' preserves the formal religious force of ἐντολή in this
    dispute about divine authority and echoes common biblical usage.'
- source_word: τοῦ θεοῦ
  chosen: of God
  alternatives:
  - God's
  lexicon: BDAG
  rationale: The genitive is rendered straightforwardly. 'Of God' keeps the formal
    contrast with 'your tradition' and sounds suitably weighty in context.
- source_word: ἵνα
  chosen: so that
  alternatives:
  - in order that
  lexicon: BDAG
  rationale: ἵνα introduces purpose or intended result. 'So that' is natural modern
    English and preserves the purposive force.
- source_word: παράδοσιν
  chosen: tradition
  alternatives:
  - teaching handed down
  - tradition handed down
  lexicon: BDAG
  rationale: παράδοσις commonly means tradition, especially inherited human tradition
    in this context. The simple gloss is accurate and readable.
- source_word: τηρήσητε
  chosen: keep
  alternatives:
  - observe
  - maintain
  - hold to
  lexicon: BDAG
  rationale: τηρέω here means to keep or observe. 'Keep' is concise and creates a
    sharp contrast with 'set aside' God's commandment.
