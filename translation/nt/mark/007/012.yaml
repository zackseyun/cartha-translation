id: MRK.7.12
reference: Mark 7:12
source:
  edition: SBLGNT
  text: ⸀οὐκέτι ἀφίετε αὐτὸν οὐδὲν ποιῆσαι τῷ ⸀πατρὶ ἢ τῇ ⸀μητρί,
translation:
  text: you no longer allow him to do anything for his father or mother,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'do anything to help his father or mother.' The broader Greek wording
      can include practical or financial support in this context.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐκέτι
  chosen: no longer
  alternatives:
  - no more
  - not any longer
  lexicon: BDAG
  rationale: Conveys cessation from a previous state in natural modern English. 'No
    longer' is idiomatic and preserves the temporal force.
- source_word: ἀφίετε
  chosen: allow
  alternatives:
  - permit
  - let
  lexicon: BDAG
  rationale: In this context ἀφίημι means to permit or allow, not its other common
    senses such as 'forgive' or 'leave.' 'Allow' fits the legal/practical sense of
    preventing action by tradition.
- source_word: αὐτὸν
  chosen: him
  lexicon: BDAG
  rationale: Direct object referring to the person who had something to give; masculine
    singular should be retained.
- source_word: οὐδὲν
  chosen: anything
  alternatives:
  - nothing
  lexicon: BDAG
  rationale: With the infinitive construction after a verb of permitting, English
    idiom prefers 'do anything' rather than 'do nothing.' This preserves the sense
    that they forbid any act of support.
- source_word: ποιῆσαι
  chosen: to do
  alternatives:
  - to do anything
  - to perform
  lexicon: BDAG
  rationale: 'Basic infinitive of action. The fuller English sense emerges in combination
    with οὐδὲν and the dative phrase: ''to do anything for.'''
- source_word: τῷ πατρὶ ἢ τῇ μητρί
  chosen: for his father or mother
  alternatives:
  - for the father or mother
  - for his father or his mother
  lexicon: BDAG
  rationale: The datives are best rendered with 'for' to express benefit. Although
    the Greek articles are present, English naturally uses the possessive 'his' because
    the referent is the man's own parents in context.
