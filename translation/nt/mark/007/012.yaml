theological_decisions:
- issue: Whether to make explicit the financial/support nuance from the broader Corban
    context
  chosen_reading: Keep the wording general as 'do anything for his father or mother'
  alternative_readings:
  - do anything to help his father or mother
  - do anything for the support of his father or mother
  rationale: The immediate Greek says broadly 'do anything for' his parents. The surrounding
    context implies material support, but the verse itself does not specify that narrower
    sense. Optimal equivalence preserves the broader wording and lets context supply
    the implication.
  doctrine_reference: 'Translation philosophy: Never paraphrase beyond what the source
    text warrants; preserve theological tension rather than resolve it.'
