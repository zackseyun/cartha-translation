id: MRK.7.37
reference: Mark 7:37
source:
  edition: SBLGNT
  text: καὶ ὑπερπερισσῶς ἐξεπλήσσοντο λέγοντες· Καλῶς πάντα πεποίηκεν, καὶ τοὺς κωφοὺς
    ποιεῖ ἀκούειν ⸀καὶ ἀλάλους λαλεῖν.
translation:
  text: And they were utterly astonished, saying, “He has done everything well. He
    even makes the deaf hear and the mute speak.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, “He has done all things well,” which may echo scriptural
      language about God's works.
    reason: lexical_alternative
  - marker: b
    text: This wording recalls Isaiah 35:5–6, where in God's restoration the deaf
      hear and the mute speak.
    reason: cross_reference
lexical_decisions:
- source_word: ὑπερπερισσῶς
  chosen: utterly
  alternatives:
  - beyond measure
  - exceedingly
  - more than exceedingly
  lexicon: BDAG
  rationale: The adverb is an intensive superlative meaning 'to an extraordinary degree.'
    'Utterly' conveys the emphatic force in natural modern English without awkward
    literalism.
- source_word: ἐξεπλήσσοντο
  chosen: were astonished
  alternatives:
  - were amazed
  - were utterly astounded
  lexicon: BDAG
  rationale: The imperfect middle/passive indicates an ongoing state of amazement.
    'Were astonished' preserves the strong sense and works smoothly with the preceding
    intensive adverb.
- source_word: λέγοντες
  chosen: saying
  alternatives:
  - and saying
  - as they said
  lexicon: BDAG
  rationale: A participle of attendant circumstance introducing the content of their
    reaction. 'Saying' is the most direct and idiomatic rendering.
- source_word: Καλῶς
  chosen: well
  alternatives:
  - beautifully
  - rightly
  - finely
  lexicon: BDAG
  rationale: Here the adverb evaluates the quality of Jesus' works. 'Well' is the
    plain and natural English equivalent and may also echo the creation motif without
    overtranslating.
- source_word: πάντα
  chosen: everything
  alternatives:
  - all things
  - all
  lexicon: BDAG
  rationale: The accusative neuter plural is idiomatically rendered 'everything' in
    English. This preserves the comprehensive scope of the crowd's statement.
- source_word: πεποίηκεν
  chosen: has done
  alternatives:
  - has made
  - has accomplished
  lexicon: BDAG
  rationale: The perfect tense highlights a completed action with present significance.
    'Has done' is idiomatic and fits the evaluative phrase 'everything well.'
- source_word: κωφοὺς
  chosen: the deaf
  alternatives:
  - deaf people
  lexicon: BDAG
  rationale: In this context κωφός refers to those unable to hear. 'The deaf' is concise
    and idiomatic in English, functioning as a substantive adjective.
- source_word: ποιεῖ ἀκούειν
  chosen: makes ... hear
  alternatives:
  - causes ... to hear
  - enables ... to hear
  lexicon: BDAG
  rationale: ποιέω with infinitive expresses causation. 'Makes the deaf hear' is both
    faithful and natural, and it preserves the vividness of the Greek.
- source_word: ἀλάλους
  chosen: the mute
  alternatives:
  - those unable to speak
  - the speechless
  lexicon: BDAG
  rationale: ἄλαλος denotes inability to speak. 'The mute' is concise and parallel
    to 'the deaf'; it is semantically accurate in this healing context.
- source_word: λαλεῖν
  chosen: speak
  alternatives:
  - talk
  lexicon: BDAG
  rationale: λαλέω commonly means 'speak.' 'Speak' is the standard English equivalent
    and best matches the miracle description.
- source_word: καὶ
  chosen: even
  alternatives:
  - and
  lexicon: BDAG
  rationale: The second καί before 'the mute' can be rendered simply 'and,' but 'even'
    brings out the climactic force of the crowd's exclamation in idiomatic English
    without changing the sense.
