theological_decisions:
- issue: Ritual status implied by κοινός
  chosen_reading: Rendered as 'defiled' to indicate ceremonial impurity rather than
    moral evil or mere physical dirtiness.
  alternative_readings:
  - unclean
  - common
  rationale: The dispute concerns Pharisaic purity tradition, not hygiene. 'Defiled'
    preserves the religious/ritual force without importing later doctrinal conclusions.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
