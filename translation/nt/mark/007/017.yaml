id: MRK.7.17
reference: Mark 7:17
source:
  edition: SBLGNT
  text: Καὶ ὅτε εἰσῆλθεν ⸀εἰς οἶκον ἀπὸ τοῦ ὄχλου, ἐπηρώτων αὐτὸν οἱ μαθηταὶ αὐτοῦ
    ⸂τὴν παραβολήν⸃.
translation:
  text: And when he entered a house away from the crowd, his disciples asked him about
    the parable.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "the saying" or "the illustration." The Greek word is παραβολή.
    reason: lexical_alternative
lexical_decisions:
- source_word: Καὶ
  chosen: And
  alternatives:
  - Now
  lexicon: BDAG
  rationale: Standard connective; retained to reflect Mark's narrative flow rather
    than smoothing it away.
- source_word: ὅτε
  chosen: when
  alternatives:
  - after
  lexicon: BDAG
  rationale: Temporal conjunction introducing the circumstance in which the disciples
    questioned him.
- source_word: εἰσῆλθεν εἰς οἶκον
  chosen: he entered a house
  alternatives:
  - he went into the house
  - he entered the house
  lexicon: BDAG
  rationale: The Greek lacks the article before οἶκον, so 'a house' better reflects
    the anarthrous form than the traditional 'the house.' 'Entered' preserves the
    verbal force of εἰσῆλθεν.
- source_word: ἀπὸ τοῦ ὄχλου
  chosen: away from the crowd
  alternatives:
  - from the crowd
  - apart from the crowd
  lexicon: BDAG
  rationale: This phrase modifies the setting after entering the house, indicating
    separation from the crowd. 'Away from' makes the sense natural in English without
    adding content.
- source_word: ἐπηρώτων
  chosen: asked
  alternatives:
  - were asking
  - questioned
  lexicon: BDAG
  rationale: Imperfect verb can suggest ongoing or repeated asking, but simple past
    is idiomatic in English narrative. The plural subject is explicit in English through
    'his disciples.'
- source_word: οἱ μαθηταὶ αὐτοῦ
  chosen: his disciples
  alternatives:
  - the disciples of him
  lexicon: BDAG
  rationale: Natural English rendering of the possessive construction while preserving
    the referent.
- source_word: τὴν παραβολήν
  chosen: the parable
  alternatives:
  - the saying
  - the illustration
  lexicon: BDAG
  rationale: παραβολή is most naturally rendered 'parable' here, even though the preceding
    material is brief and proverb-like. This preserves the Gospel's own category for
    Jesus' figurative teaching.
