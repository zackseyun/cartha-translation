theological_decisions:
- issue: Rendering παραβολή in a context where the saying could be taken more broadly
    as a figurative statement
  chosen_reading: the parable
  alternative_readings:
  - the saying
  - the illustration
  rationale: No doctrinal controversy is at stake, but the term carries interpretive
    weight. Retaining 'parable' follows the Greek term directly and preserves Mark's
    presentation of Jesus' teaching form rather than narrowing or paraphrasing it.
  doctrine_reference: Translation philosophy §1, §5
