id: MRK.7.11
reference: Mark 7:11
source:
  edition: SBLGNT
  text: ὑμεῖς δὲ λέγετε· Ἐὰν εἴπῃ ἄνθρωπος τῷ πατρὶ ἢ τῇ μητρί· Κορβᾶν, ὅ ἐστιν Δῶρον,
    ὃ ἐὰν ἐξ ἐμοῦ ὠφεληθῇς,
translation:
  text: But you say, ‘If a man says to his father or his mother, “Corban” (that is,
    a gift), whatever you might have benefited from me—’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Corban is a term for something dedicated as a gift to God, and thus withheld
      from ordinary family use.
    reason: cultural_note
  - marker: b
    text: Or 'that is, an offering.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὑμεῖς δὲ λέγετε
  chosen: But you say
  alternatives:
  - But you are saying
  - Yet you say
  lexicon: BDAG
  rationale: 'δὲ marks contrast with the preceding divine command/tradition contrast,
    and the present indicative λέγετε is naturally rendered as a general present in
    direct discourse: ''But you say.'''
- source_word: Ἐὰν εἴπῃ
  chosen: If ... says
  alternatives:
  - If ... should say
  lexicon: BDAG
  rationale: ἐὰν with aorist subjunctive introduces a conditional/prospective case.
    In idiomatic English, 'If ... says' best balances form and readability.
- source_word: ἄνθρωπος
  chosen: a man
  alternatives:
  - a person
  - someone
  lexicon: BDAG
  rationale: The noun is singular and grammatically masculine with representative
    force. Per doctrine, gender-accurate rendering is preferred over gender-neutral
    where it matches the source intent. Here 'a man' preserves the Greek form while
    still functioning generically.
- source_word: τῷ πατρὶ ἢ τῇ μητρί
  chosen: to his father or his mother
  alternatives:
  - to his father or mother
  lexicon: BDAG
  rationale: The dative marks the addressee. Repeating 'his' and both kinship terms
    keeps the formal balance of the Greek and the familial specificity of the saying.
- source_word: Κορβᾶν
  chosen: Corban
  alternatives:
  - an offering dedicated to God
  lexicon: BDAG
  rationale: This is a transliterated Semitic term used in the Greek text. Per philosophy,
    names/loanwords may be transliterated when the text itself preserves them, with
    explanation supplied in apposition and footnote rather than replacing the term
    in the main text.
- source_word: ὅ ἐστιν Δῶρον
  chosen: that is, a gift
  alternatives:
  - that is, an offering
  lexicon: BDAG
  rationale: Mark glosses the Semitic term for his audience. δῶρον broadly means 'gift'
    or 'offering'; 'gift' is the more direct lexical equivalent, while the cultic
    nuance is preserved by context and footnote.
- source_word: ὃ ἐὰν ἐξ ἐμοῦ ὠφεληθῇς
  chosen: whatever you might have benefited from me
  alternatives:
  - whatever profit you might have received from me
  - whatever you might have gained from me
  lexicon: BDAG
  rationale: 'The relative pronoun with ἐὰν gives an indefinite sense: ''whatever.''
    ὠφεληθῇς means ''be helped/benefited.'' The phrase refers to support the parent
    might otherwise receive from the speaker. ''Benefited from me'' preserves the
    relational and material sense without over-specifying. The dash reflects that
    v. 12 completes the consequence syntactically.'
