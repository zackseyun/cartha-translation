theological_decisions:
- issue: Rendering of the vow formula Κορβᾶν in a context involving temple dedication
    and human tradition
  chosen_reading: Retain the transliteration 'Corban' in the main text and explain
    it as 'that is, a gift.'
  alternative_readings:
  - Translate directly as 'offering' or 'gift dedicated to God' in the main text
  rationale: The Greek text itself preserves the Semitic term and then glosses it.
    Keeping 'Corban' maintains the historical and religious specificity of Jesus's
    example, while Mark's own explanation supplies meaning. This avoids importing
    later doctrinal assumptions about vow mechanics beyond what the text states.
  doctrine_reference: Translation philosophy §§1, 6
