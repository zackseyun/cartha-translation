id: MRK.7.21
reference: Mark 7:21
source:
  edition: SBLGNT
  text: ἔσωθεν γὰρ ἐκ τῆς καρδίας τῶν ἀνθρώπων οἱ διαλογισμοὶ οἱ κακοὶ ἐκπορεύονται,
    ⸂πορνεῖαι, κλοπαί, φόνοι,
translation:
  text: 'For from within, out of the heart of men, evil thoughts come out: sexual
    immoralities, thefts, murders,'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'people' or 'humans' for 'men' (ἀνθρώπων); the Greek is a generic masculine
      plural referring to human beings generally.
    reason: lexical_alternative
  - marker: b
    text: Or 'sexual immorality'; Greek πορνεῖαι is plural, referring broadly to illicit
      sexual acts.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔσωθεν
  chosen: from within
  alternatives:
  - within
  - from inside
  lexicon: BDAG
  rationale: Adverb indicating interior source. 'From within' preserves the spatial/metaphorical
    contrast with external defilement in the surrounding context better than the bare
    'within'.
- source_word: γὰρ
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: BDAG
  rationale: Marks explanation grounding the previous statement. 'For' is concise
    and natural in English discourse here.
- source_word: καρδίας
  chosen: heart
  alternatives:
  - inner self
  lexicon: BDAG
  rationale: '''Heart'' is the standard biblical anthropological term for the inner
    moral and volitional center; it should be preserved rather than interpreted away.'
- source_word: ἀνθρώπων
  chosen: men
  alternatives:
  - people
  - humans
  lexicon: BDAG
  rationale: Genitive plural of ἄνθρωπος here is generic for human beings, but per
    the project's gender-accurate philosophy, 'men' is retained as the representative
    term, especially in the familiar biblical expression 'the heart of men.'
- source_word: διαλογισμοὶ
  chosen: thoughts
  alternatives:
  - reasonings
  - schemes
  - deliberations
  lexicon: BDAG
  rationale: Refers to internal thoughts/reflections; with κακοὶ it denotes morally
    corrupt inner reasonings. 'Thoughts' is the clearest modern English rendering,
    while the adjective carries the moral force.
- source_word: κακοὶ
  chosen: evil
  alternatives:
  - wicked
  - bad
  lexicon: BDAG
  rationale: Moral evil is in view, not mere inferiority or unpleasantness. 'Evil'
    best preserves the ethical weight.
- source_word: ἐκπορεύονται
  chosen: come out
  alternatives:
  - proceed
  - go out
  lexicon: BDAG
  rationale: Present middle/passive deponent meaning 'come out/proceed.' 'Come out'
    is readable modern English and keeps the imagery of emergence from within.
- source_word: πορνεῖαι
  chosen: sexual immoralities
  alternatives:
  - sexual immorality
  - fornications
  lexicon: BDAG
  rationale: Plural noun listing acts of illicit sexual conduct. The plural should
    be reflected in English if possible; 'sexual immoralities' is somewhat unusual
    but preserves the Greek number better than a singular abstraction.
- source_word: κλοπαί
  chosen: thefts
  alternatives:
  - stealings
  - acts of theft
  lexicon: BDAG
  rationale: Plural concrete acts in a vice list; 'thefts' is the natural plural equivalent.
- source_word: φόνοι
  chosen: murders
  alternatives:
  - killings
  lexicon: BDAG
  rationale: Refers to unlawful killing in a vice list; 'murders' preserves the moral/juridical
    force better than the broader 'killings'.
