theological_decisions:
- issue: Anthropological term ἀνθρώπων in a generic statement
  chosen_reading: Rendered as 'men' in keeping with gender-accurate representative
    usage
  alternative_readings:
  - people
  - humans
  rationale: The Greek is grammatically masculine plural and generic. The project's
    philosophy prefers matching the source's representative form rather than flattening
    to a gender-neutral term, unless context clearly demands otherwise.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Rendering πορνεῖαι
  chosen_reading: Translated as 'sexual immoralities'
  alternative_readings:
  - sexual immorality
  - fornications
  rationale: The term denotes illicit sexual acts without narrowing to one modern
    category. The plural is preserved to reflect the Greek vice-list form and avoid
    importing a more specific doctrinal definition than the text itself states.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3
