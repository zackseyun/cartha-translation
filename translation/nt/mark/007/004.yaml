theological_decisions:
- issue: Meaning of βαπτίσωνται / βαπτισμοὺς in a ritual-purity context
  chosen_reading: Render with 'wash' / 'washings' rather than 'baptize' / 'baptisms.'
  alternative_readings:
  - baptize themselves / baptisms
  - immerse themselves / immersions
  rationale: The verse concerns Pharisaic purity practices, not Christian baptism.
    Using 'wash' preserves the Jewish ritual context and avoids anachronistic sacramental
    associations.
  doctrine_reference: Translation philosophy §1, original-language primacy over translation
    tradition; §6, readable modern English
