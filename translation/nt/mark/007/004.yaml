id: MRK.7.4
reference: Mark 7:4
source:
  edition: SBLGNT
  text: καὶ ἀπ’ ⸀ἀγορᾶς ἐὰν μὴ ⸀βαπτίσωνται οὐκ ἐσθίουσιν, καὶ ἄλλα πολλά ἐστιν ἃ
    παρέλαβον κρατεῖν, βαπτισμοὺς ποτηρίων καὶ ξεστῶν καὶ χαλκίων ⸂καὶ κλινῶν⸃—
translation:
  text: 'And when they come from the marketplace, they do not eat unless they wash,
    and there are many other things that they have received to keep: washings of cups
    and pitchers and copper vessels and dining couches—'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'unless they immerse themselves'; the Greek uses a form of the verb often
      translated 'baptize,' but here it refers to ritual washing in the context of
      purity customs.
    reason: lexical_alternative
  - marker: b
    text: Some manuscripts omit 'and dining couches.'
    reason: textual_variant
lexical_decisions:
- source_word: ἀγορᾶς
  chosen: marketplace
  alternatives:
  - market
  lexicon: BDAG
  rationale: ἀγορά refers to the public market area or marketplace. 'Marketplace'
    is slightly more precise and natural in modern English than simply 'market.'
- source_word: βαπτίσωνται
  chosen: wash
  alternatives:
  - purify themselves
  - immerse themselves
  lexicon: BDAG
  rationale: Although βαπτίζω often means 'baptize' or 'immerse,' in this ritual-purity
    context the sense is washing before eating after returning from the marketplace.
    Rendering it 'wash' avoids importing sacramental overtones not present in the
    context while preserving the concrete action.
- source_word: παρέλαβον κρατεῖν
  chosen: they have received to keep
  alternatives:
  - they have received and hold fast
  - they have handed down to observe
  lexicon: BDAG
  rationale: The construction expresses traditions received and maintained. 'They
    have received to keep' stays close to the Greek while remaining intelligible.
    'Handed down' would shift the focus from reception to transmission.
- source_word: βαπτισμοὺς
  chosen: washings
  alternatives:
  - ceremonial washings
  - immersions
  lexicon: BDAG
  rationale: βαπτισμός here denotes ritual washings of utensils. 'Washings' is the
    most straightforward rendering; 'ceremonial washings' is interpretive and 'immersions'
    is too narrow.
- source_word: ξεστῶν
  chosen: pitchers
  alternatives:
  - jugs
  - pots
  lexicon: BDAG
  rationale: ξέστης refers to a vessel, likely a jar or pitcher. 'Pitchers' gives
    a concrete, readable English equivalent without over-specifying.
- source_word: χαλκίων
  chosen: copper vessels
  alternatives:
  - bronze vessels
  - brass vessels
  lexicon: BDAG
  rationale: χαλκίον denotes an item made of copper/alloyed metal. 'Copper vessels'
    is a clear modern rendering; 'bronze' is also possible, but 'copper' more directly
    reflects the lexical root.
- source_word: κλινῶν
  chosen: dining couches
  alternatives:
  - beds
  - couches
  - tables
  lexicon: BDAG
  rationale: κλίνη can mean bed or couch; in a dining/purity context it likely refers
    to couches used at meals. 'Dining couches' makes the cultural setting explicit
    without flattening the term to 'tables.'
- source_word: ἄλλα πολλά
  chosen: many other things
  alternatives:
  - many other traditions
  - many other practices
  lexicon: BDAG
  rationale: The Greek is broad ('many other things'). More specific renderings like
    'traditions' are contextually plausible but not explicit here.
