theological_decisions:
- issue: Purity-language nuance in κοινός
  chosen_reading: Rendered 'common' in the main text, with explanatory footnote preserving
    'defiled/unclean' as alternatives.
  alternative_readings:
  - defiled
  - unclean
  rationale: The verse concerns ritual purity, not hygiene alone. 'Common' is closer
    to the lexical value of κοινός and lets Mark's own gloss explain the meaning.
    Because many English readers may miss the ritual nuance, the more interpretive
    alternatives are preserved in a footnote.
  doctrine_reference: Translation philosophy §§1, 3, 6
