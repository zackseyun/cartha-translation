id: MRK.7.2
reference: Mark 7:2
source:
  edition: SBLGNT
  text: καὶ ἰδόντες τινὰς τῶν μαθητῶν αὐτοῦ ⸂ὅτι κοιναῖς χερσίν, τοῦτ’ ἔστιν ἀνίπτοις,
    ἐσθίουσιν⸃ ⸀τοὺς ⸀ἄρτους—
translation:
  text: and they saw that some of his disciples were eating the bread with common
    hands—that is, unwashed hands—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with defiled hands' or 'with unclean hands'; the Greek literally says
      'with common hands,' referring to ritual impurity rather than merely physical
      dirt.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἰδόντες
  chosen: they saw
  alternatives:
  - seeing
  - having seen
  - they noticed
  lexicon: BDAG
  rationale: Aorist participle from ὁράω, functioning adverbially with the implied
    subject from context (the Pharisees and some scribes in v. 1). English finite
    verb 'they saw' is natural and preserves the observational force without awkward
    participial style.
- source_word: τινὰς τῶν μαθητῶν αὐτοῦ
  chosen: some of his disciples
  alternatives:
  - certain of his disciples
  lexicon: BDAG
  rationale: τινάς with the partitive genitive τῶν μαθητῶν naturally means 'some of
    his disciples.' 'Certain' is possible but less natural in modern English.
- source_word: ὅτι
  chosen: that
  alternatives:
  - because
  lexicon: BDAG
  rationale: 'Here ὅτι introduces the content of what they saw: they saw that some
    disciples were eating. ''Because'' is less likely in this construction.'
- source_word: κοιναῖς χερσίν
  chosen: with common hands
  alternatives:
  - with defiled hands
  - with unclean hands
  lexicon: BDAG
  rationale: κοινός literally means 'common' and in Jewish purity contexts can mean
    ritually defiled/common rather than physically dirty. Rendering it as 'common'
    preserves the culturally specific purity sense, while Mark's own gloss immediately
    explains it for readers. This avoids importing a stronger interpretive gloss into
    the main text.
- source_word: τοῦτ’ ἔστιν ἀνίπτοις
  chosen: that is, unwashed hands
  alternatives:
  - that is, with unwashed hands
  lexicon: BDAG
  rationale: Mark provides an explanatory gloss for non-Jewish readers. 'Unwashed
    hands' is the plain sense of ἀνίπτοις and clarifies the preceding idiom. Repeating
    'hands' in English makes the apposition clear.
- source_word: ἐσθίουσιν
  chosen: were eating
  alternatives:
  - eat
  - were eating bread
  lexicon: BDAG
  rationale: Present tense in narrative can be rendered as English progressive for
    naturalness. The action is contemporaneous with what was observed.
- source_word: τοὺς ἄρτους
  chosen: the bread
  alternatives:
  - the loaves
  - bread
  lexicon: BDAG
  rationale: ἄρτους is literally 'loaves/breads,' but in idiomatic English 'the bread'
    best conveys the food being eaten. The article is retained. 'Loaves' would sound
    overly specific here unless the context emphasized individual loaves.
