id: MRK.7.31
reference: Mark 7:31
source:
  edition: SBLGNT
  text: Καὶ πάλιν ἐξελθὼν ἐκ τῶν ὁρίων Τύρου ⸂ἦλθεν διὰ Σιδῶνος εἰς⸃ τὴν θάλασσαν
    τῆς Γαλιλαίας ἀνὰ μέσον τῶν ὁρίων Δεκαπόλεως.
translation:
  text: And again, after departing from the region of Tyre, he came through Sidon
    to the Sea of Galilee, through the midst of the region of the Decapolis.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'by way of Sidon.' The Greek phrase can describe travel through or via
      Sidon.
    reason: lexical_alternative
  - marker: b
    text: Or 'between the region(s) of the Decapolis.' The Greek expression ἀνὰ μέσον
      can be rendered more literally as 'between/in the midst of,' and the route description
      is geographically difficult.
    reason: lexical_alternative
lexical_decisions:
- source_word: πάλιν
  chosen: again
  alternatives:
  - once more
  lexicon: BDAG
  rationale: Marks a renewed movement in the narrative; 'again' is the most natural
    concise rendering.
- source_word: ἐξελθὼν
  chosen: after departing
  alternatives:
  - having gone out
  - after going out
  lexicon: BDAG
  rationale: Aorist participle antecedent to the main verb; 'after departing' gives
    clear English sequence without over-literal awkwardness.
- source_word: ἐκ τῶν ὁρίων Τύρου
  chosen: from the region of Tyre
  alternatives:
  - out of the borders of Tyre
  - from the territory of Tyre
  lexicon: BDAG
  rationale: ὅρια here refers to territorial bounds/region rather than a precise border
    line; 'region' is natural modern English.
- source_word: ἦλθεν
  chosen: he came
  alternatives:
  - he went
  - he arrived
  lexicon: BDAG
  rationale: ἔρχομαι is commonly 'come'; although English might prefer 'went' from
    a map perspective, 'came' preserves the Greek narrative wording.
- source_word: διὰ Σιδῶνος
  chosen: through Sidon
  alternatives:
  - by way of Sidon
  - via Sidon
  lexicon: BDAG
  rationale: διά with genitive indicates movement through or by way of a place. 'Through
    Sidon' is straightforward and preserves the route description.
- source_word: εἰς τὴν θάλασσαν τῆς Γαλιλαίας
  chosen: to the Sea of Galilee
  alternatives:
  - to the lake of Galilee
  lexicon: BDAG
  rationale: θάλασσα is literally 'sea'; 'Sea of Galilee' is the standard geographic
    name in English and accurately reflects the Greek.
- source_word: ἀνὰ μέσον
  chosen: through the midst of
  alternatives:
  - through
  - in the midst of
  - between
  lexicon: BDAG
  rationale: The phrase is somewhat unusual and emphasizes movement through the area
    between/among the surrounding territory. 'Through the midst of' preserves that
    spatial force better than a flattened 'through' alone.
- source_word: τῶν ὁρίων Δεκαπόλεως
  chosen: the region of the Decapolis
  alternatives:
  - the territory of the Decapolis
  - the borders of the Decapolis
  lexicon: BDAG
  rationale: As earlier with ὅρια, the sense is territorial district. 'Decapolis'
    is transliterated as a proper regional name.
