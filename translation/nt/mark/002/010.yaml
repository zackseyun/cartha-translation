theological_decisions:
- issue: Rendering of Jesus' title ὁ υἱὸς τοῦ ἀνθρώπου
  chosen_reading: the Son of Man
  alternative_readings:
  - the Human One
  rationale: The phrase is left as 'the Son of Man' to preserve both its idiomatic
    force and its possible allusion to Daniel 7, without resolving debates over whether
    emphasis falls on humanity, messianic authority, or apocalyptic identity. This
    aligns with preserving theological tension rather than collapsing it into an interpretive
    paraphrase.
  doctrine_reference: Translation philosophy §3; §2 translate titles
- issue: Meaning of ἐξουσία in relation to forgiving sins
  chosen_reading: authority
  alternative_readings:
  - power
  - right
  rationale: The context concerns Jesus' legitimate prerogative to forgive sins, not
    merely his capacity to perform an act. 'Authority' best preserves the theological
    claim being demonstrated by the healing miracle.
  doctrine_reference: Translation philosophy §1 original-language primacy
