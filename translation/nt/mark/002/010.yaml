id: MRK.2.10
reference: Mark 2:10
source:
  edition: SBLGNT
  text: ἵνα δὲ εἰδῆτε ὅτι ἐξουσίαν ἔχει ὁ υἱὸς τοῦ ἀνθρώπου ⸂ἐπὶ τῆς γῆς ἀφιέναι ἁμαρτίας⸃—
    λέγει τῷ παραλυτικῷ·
translation:
  text: But so that you may know that the Son of Man has authority on earth to forgive
    sins—he says to the paralyzed man,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "the Human One." The Greek title "the Son of Man" may carry both an idiomatic
      sense of humanity and an allusion to Daniel 7.
    reason: alternative_reading
  - marker: b
    text: Or "he says to the paralytic."
    reason: lexical_alternative
lexical_decisions:
- source_word: ἵνα δὲ
  chosen: But so that
  alternatives:
  - But that
  - Yet so that
  lexicon: BDAG
  rationale: ἵνα introduces purpose ('so that'), while δέ adds a mild adversative
    or continuative sense. 'But so that' preserves both the discourse shift and the
    purpose clause naturally in English.
- source_word: εἰδῆτε
  chosen: you may know
  alternatives:
  - you may realize
  - you may understand
  lexicon: BDAG
  rationale: Aorist subjunctive after ἵνα expresses intended result/purpose. 'Know'
    is the most direct rendering and fits the evidential force of the coming miracle.
- source_word: ἐξουσίαν ἔχει
  chosen: has authority
  alternatives:
  - has power
  - has the right
  lexicon: BDAG
  rationale: ἐξουσία commonly denotes authority, right, or delegated power. 'Authority'
    best captures the juridical and theological sense in this context of forgiving
    sins, better than mere ability ('power').
- source_word: ὁ υἱὸς τοῦ ἀνθρώπου
  chosen: the Son of Man
  alternatives:
  - the Human One
  lexicon: BDAG
  rationale: This is Jesus' self-designation and a recognized title with Danielic
    resonance. 'The Son of Man' preserves the traditional and textually grounded title
    without flattening its ambiguity or theological depth.
- source_word: ἐπὶ τῆς γῆς
  chosen: on earth
  alternatives:
  - upon the earth
  - on the land
  lexicon: BDAG
  rationale: The phrase most naturally means 'on earth' in contrast to a heavenly
    sphere and highlights the exercise of authority within the earthly realm.
- source_word: ἀφιέναι ἁμαρτίας
  chosen: to forgive sins
  alternatives:
  - to release sins
  - to pardon sins
  lexicon: BDAG
  rationale: ἀφίημι in this context means forgive/remit. 'Forgive sins' is the standard
    and clearest English rendering for the idiom.
- source_word: λέγει τῷ παραλυτικῷ
  chosen: he says to the paralyzed man
  alternatives:
  - he says to the paralytic
  lexicon: BDAG
  rationale: παραλυτικός functions substantivally for the afflicted person. 'Paralyzed
    man' is more immediately readable modern English, while still accurately reflecting
    the referent. 'He says' preserves the historical present λέγει.
