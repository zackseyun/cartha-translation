theological_decisions:
- issue: Tone and force of Jesus' healing command
  chosen_reading: 'A direct, authoritative personal command: ''I say to you, get up,
    pick up your mat, and go to your house.'''
  alternative_readings:
  - 'A more traditional but less contemporary rendering: ''I say to you, rise, take
    up your bed, and go home.'''
  rationale: The verse presents Jesus speaking with immediate authority; the translation
    preserves that force without importing additional theological interpretation.
    Modern imperatives were chosen for clarity while retaining the command sequence.
  doctrine_reference: 'Translation philosophy: optimal equivalence; readable modern
    English, not archaic or academic.'
