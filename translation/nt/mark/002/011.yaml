id: MRK.2.11
reference: Mark 2:11
source:
  edition: SBLGNT
  text: Σοὶ λέγω, ⸀ἔγειρε ἆρον τὸν κράβαττόν σου καὶ ὕπαγε εἰς τὸν οἶκόν σου.
translation:
  text: I say to you, get up, pick up your mat, and go to your house.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'take up your bed.' The Greek κράβαττος refers to a simple sleeping mat
      or pallet.
    reason: lexical_alternative
  - marker: b
    text: 'Or ''go home.'' Greek: ''go to your house.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: Σοὶ
  chosen: to you
  alternatives:
  - to you personally
  - to you
  lexicon: BDAG
  rationale: Dative pronoun placed first for emphasis. English naturally renders this
    with the prepositional phrase 'to you' after 'I say,' preserving the direct address
    without overtranslating the emphasis.
- source_word: λέγω
  chosen: I say
  alternatives:
  - I tell
  lexicon: BDAG
  rationale: Present indicative first person singular. 'I say' is the most direct
    and idiomatic rendering here and preserves the solemn, authoritative speech formula
    common in the Gospels.
- source_word: ἔγειρε
  chosen: get up
  alternatives:
  - rise
  - stand up
  lexicon: BDAG
  rationale: Aorist imperative of ἐγείρω. 'Get up' is clear modern English and fits
    the immediate command to a paralyzed man. 'Rise' is more traditional but less
    natural for the target register.
- source_word: ἆρον
  chosen: pick up
  alternatives:
  - take up
  - carry
  lexicon: BDAG
  rationale: Aorist imperative of αἴρω. 'Pick up' communicates the concrete physical
    action in accessible English. 'Take up' is traditional and viable, but 'pick up'
    is more immediately understandable to modern readers.
- source_word: κράβαττόν
  chosen: mat
  alternatives:
  - bed
  - pallet
  - stretcher
  lexicon: BDAG
  rationale: Refers to a poor person's sleeping pad or portable bed. 'Mat' best conveys
    a lightweight portable sleeping surface in modern English without suggesting a
    full bed frame. 'Pallet' is dated; 'bed' can sound too substantial; 'stretcher'
    is too medicalized.
- source_word: ὕπαγε
  chosen: go
  alternatives:
  - go away
  - depart
  lexicon: BDAG
  rationale: Present/aoristic imperative in idiomatic command sequence. 'Go' is the
    natural English equivalent here; stronger options like 'depart' are unnecessarily
    formal.
- source_word: εἰς τὸν οἶκόν σου
  chosen: to your house
  alternatives:
  - home
  - to your home
  lexicon: BDAG
  rationale: Literally 'into/to your house.' 'To your house' preserves the concrete
    noun οἶκος and the directional force of εἰς. 'Home' is idiomatic but slightly
    less formally tied to the Greek noun.
