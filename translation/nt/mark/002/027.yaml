id: MRK.2.27
reference: Mark 2:27
source:
  edition: SBLGNT
  text: καὶ ἔλεγεν αὐτοῖς· Τὸ σάββατον διὰ τὸν ἄνθρωπον ἐγένετο ⸀καὶ οὐχ ὁ ἄνθρωπος
    διὰ τὸ σάββατον·
translation:
  text: And he was saying to them, “The Sabbath came into being for man, and not man
    for the Sabbath.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “for humanity” / “for humankind.” Greek has singular ἄνθρωπος (“man”)
      used representatively for human beings in general.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔλεγεν
  chosen: was saying
  alternatives:
  - said
  lexicon: BDAG
  rationale: Imperfect tense (3IAI) suggests ongoing or repeated speech in narrative;
    'was saying' preserves that aspect more transparently than the simple past 'said,'
    while remaining natural English.
- source_word: σάββατον
  chosen: Sabbath
  alternatives:
  - Sabbath day
  lexicon: BDAG
  rationale: The singular with article refers to the Sabbath institution/day. 'Sabbath'
    is the standard and sufficiently clear rendering; adding 'day' would be interpretive
    and unnecessary here.
- source_word: διὰ τὸν ἄνθρωπον
  chosen: for man
  alternatives:
  - for humanity
  - for humankind
  - for the sake of man
  lexicon: BDAG
  rationale: διά with the accusative expresses purpose/benefit ('for the sake of').
    ἄνθρωπος here is generic, referring representatively to human beings. Per the
    project's gender-accurate policy, 'man' is retained in the main text because the
    Greek is singular masculine with representative force; an inclusive alternative
    is preserved in a footnote.
- source_word: ἐγένετο
  chosen: came into being
  alternatives:
  - was made
  - came to be
  lexicon: BDAG
  rationale: γίνομαι commonly means 'come into being, become, be made.' 'Came into
    being' best reflects the verb's sense without implying a narrower act of manufacture.
    It also fits the statement about the origin/purpose of the Sabbath institution.
- source_word: οὐχ ὁ ἄνθρωπος διὰ τὸ σάββατον
  chosen: and not man for the Sabbath
  alternatives:
  - and not humanity for the Sabbath
  - and not humankind for the Sabbath
  lexicon: BDAG
  rationale: 'The clause is antithetical and elliptical, contrasting purpose: the
    human being does not exist for the Sabbath''s sake. ''Man'' matches the singular
    representative ἄνθρωπος in the Greek and preserves the rhetorical symmetry with
    the first clause.'
