theological_decisions:
- issue: Generic masculine ἄνθρωπος in a principle statement
  chosen_reading: Render as 'man' in the main text, with an inclusive alternative
    footnoted.
  alternative_readings:
  - humanity
  - humankind
  rationale: The saying states a general principle about the Sabbath's purpose for
    human beings. The Greek uses singular masculine ἄνθρωπος representatively. Following
    the doctrine's gender-accurate policy, the main text keeps 'man' rather than flattening
    the source to a plural or abstract collective, while a footnote preserves the
    inclusive sense for modern readers.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over
    gender-neutral)
