theological_decisions:
- issue: Sabbath terminology
  chosen_reading: on the Sabbath
  alternative_readings:
  - on the Sabbaths
  rationale: The plural Greek form is understood idiomatically as singular in this
    context. This is a linguistic rather than doctrinal decision and does not alter
    the Sabbath setting of the controversy narrative.
- issue: Meaning of ὁδὸν ποιεῖν in relation to Sabbath controversy
  chosen_reading: to make their way
  alternative_readings:
  - to make a path
  rationale: Rendering the phrase idiomatically avoids suggesting that the disciples
    were engaged in road construction. The text describes movement through the field
    while plucking grain, which sets up the later dispute without exaggerating the
    action.
  doctrine_reference: Translation philosophy §1, §5
