id: MRK.2.23
reference: Mark 2:23
source:
  edition: SBLGNT
  text: Καὶ ἐγένετο ⸂αὐτὸν ἐν τοῖς σάββασιν παραπορεύεσθαι⸃ διὰ τῶν σπορίμων, καὶ
    ⸂οἱ μαθηταὶ αὐτοῦ ἤρξαντο⸃ ὁδὸν ποιεῖν τίλλοντες τοὺς στάχυας.
translation:
  text: And it happened that on the Sabbath he was passing through the grainfields,
    and his disciples began to make their way, plucking the heads of grain.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "through the standing grain."
    reason: lexical_alternative
  - marker: b
    text: Literally "began to make a way," an idiom here meaning they proceeded through
      the field while plucking the heads of grain.
    reason: lexical_alternative
  - marker: c
    text: Or "ears of grain."
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγένετο
  chosen: it happened
  alternatives:
  - it came to pass
  - it happened that
  lexicon: BDAG
  rationale: Uses natural modern English for the narrative formula while preserving
    the event-introducing force of the aorist middle. 'It came to pass' is more traditional
    but too archaic for the stated philosophy.
- source_word: ἐν τοῖς σάββασιν
  chosen: on the Sabbath
  alternatives:
  - on the Sabbaths
  - during the Sabbath
  lexicon: BDAG
  rationale: Although the Greek uses the plural form σάββασιν, in Koine this commonly
    functions idiomatically for a singular Sabbath day. English singular best reflects
    the sense in context.
- source_word: παραπορεύεσθαι
  chosen: was passing through
  alternatives:
  - was going along
  - was making his way through
  lexicon: BDAG
  rationale: The infinitive with αὐτὸν after ἐγένετο yields a periphrastic-like construction
    describing what was happening. 'Was passing through' preserves the movement sense
    without overtranslating.
- source_word: διὰ τῶν σπορίμων
  chosen: through the grainfields
  alternatives:
  - through the standing grain
  - through the grainfields
  lexicon: BDAG
  rationale: σπόριμος refers to sown fields or grainfields. 'Grainfields' is clear
    modern English and fits the agricultural setting. 'Standing grain' is possible
    but less idiomatic here.
- source_word: ἤρξαντο
  chosen: began
  alternatives:
  - started
  lexicon: BDAG
  rationale: Standard rendering of ἄρχομαι with complementary infinitive; 'began'
    is slightly more formal and suits narrative style.
- source_word: ὁδὸν ποιεῖν
  chosen: to make their way
  alternatives:
  - to make a path
  - to go along
  lexicon: BDAG
  rationale: The idiom literally means 'to make a road/way,' but in context it refers
    to proceeding through the field while doing what follows. 'Make their way' preserves
    the idiomatic sense without implying formal road-building.
- source_word: τίλλοντες
  chosen: plucking
  alternatives:
  - picking
  lexicon: BDAG
  rationale: τίλλω means to pluck or pull off. 'Plucking' is precise and matches the
    action done to the grain.
- source_word: τοὺς στάχυας
  chosen: the heads of grain
  alternatives:
  - the ears of grain
  - the grain heads
  lexicon: BDAG
  rationale: στάχυς denotes an ear/head of grain. 'Heads of grain' is clear in contemporary
    English; 'ears of grain' is traditional but less immediately transparent for some
    readers.
- source_word: αὐτὸν
  chosen: he
  alternatives:
  - him
  lexicon: BDAG
  rationale: 'Although αὐτόν is formally accusative in the construction after ἐγένετο,
    idiomatic English requires a nominative subject in the subordinate clause: ''he
    was passing through.'''
