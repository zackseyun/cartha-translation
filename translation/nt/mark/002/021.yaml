id: MRK.2.21
reference: Mark 2:21
source:
  edition: SBLGNT
  text: ⸀Οὐδεὶς ἐπίβλημα ῥάκους ἀγνάφου ἐπιράπτει ἐπὶ ⸂ἱμάτιον παλαιόν⸃· εἰ δὲ μή,
    αἴρει τὸ πλήρωμα ⸀ἀπ’ αὐτοῦ τὸ καινὸν τοῦ παλαιοῦ, καὶ χεῖρον σχίσμα γίνεται.
translation:
  text: No one sews a patch of unshrunk cloth onto an old garment; otherwise, the
    patch pulls away from it—the new from the old—and a worse tear results.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'of unfulled cloth.' The Greek describes cloth not yet processed so that
      it would shrink if used as a patch.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'it takes away the fullness from it, the new from the old.' The
      sense is that the new patch pulls away from the old garment, making the tear
      worse.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπίβλημα
  chosen: patch
  alternatives:
  - piece
  - patch piece
  lexicon: BDAG
  rationale: Refers to a piece laid on as a patch. 'Patch' is the most natural modern
    English equivalent in this clothing-repair context.
- source_word: ῥάκους ἀγνάφου
  chosen: of unshrunk cloth
  alternatives:
  - of unfulled cloth
  - of unfinished cloth
  lexicon: BDAG
  rationale: ἄγναφος literally refers to cloth not processed by fulling/shrinking.
    'Unshrunk cloth' communicates the practical sense clearly for modern readers while
    preserving the image.
- source_word: ἐπιράπτει
  chosen: sews ... onto
  alternatives:
  - stitches ... onto
  - sews ... on
  lexicon: BDAG
  rationale: The verb means to sew on or attach by sewing. 'Sews ... onto' is idiomatic
    and preserves the concrete action.
- source_word: ἱμάτιον παλαιόν
  chosen: an old garment
  alternatives:
  - an old cloak
  - an old piece of clothing
  lexicon: BDAG
  rationale: ἱμάτιον is a general outer garment or clothing item. 'Garment' is broad
    enough to avoid over-specifying while remaining natural.
- source_word: εἰ δὲ μή
  chosen: otherwise
  alternatives:
  - if not
  - or else
  lexicon: BDAG
  rationale: This compactly conveys the conditional consequence in smooth English
    without loss of meaning.
- source_word: αἴρει
  chosen: pulls away
  alternatives:
  - tears away
  - takes away
  lexicon: BDAG
  rationale: In context the sense is that the new patch pulls away from the old garment,
    worsening the tear. 'Pulls away' fits the clothing metaphor and avoids an overly
    wooden 'takes away.'
- source_word: τὸ πλήρωμα
  chosen: the patch
  alternatives:
  - the filling piece
  - the fullness
  lexicon: BDAG
  rationale: Here πλήρωμα refers to the piece that fills the tear, i.e., the patch.
    This is contextually precise and intelligible.
- source_word: τὸ καινὸν τοῦ παλαιοῦ
  chosen: the new from the old
  alternatives:
  - the new piece from the old garment
  - the new patch from the old
  lexicon: BDAG
  rationale: This difficult phrase is rendered in a way that preserves the Greek contrast
    between new and old while remaining readable. The sense is that the new piece
    separates from the old garment.
- source_word: χεῖρον σχίσμα γίνεται
  chosen: a worse tear results
  alternatives:
  - the tear becomes worse
  - a worse rip occurs
  lexicon: BDAG
  rationale: σχίσμα is a tear or split; γίνεται marks the resulting state. 'A worse
    tear results' is concise and natural.
