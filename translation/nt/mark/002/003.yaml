id: MRK.2.3
reference: Mark 2:3
source:
  edition: SBLGNT
  text: καὶ ἔρχονται ⸂φέροντες πρὸς αὐτὸν παραλυτικὸν⸃ αἰρόμενον ὑπὸ τεσσάρων.
translation:
  text: And they came, bringing to him a paralyzed man, carried by four.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'by four men'; the Greek says simply 'by four.'
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ
  chosen: And
  alternatives:
  - Then
  lexicon: BDAG
  rationale: Standard connective linking this event to the preceding narrative. 'And'
    preserves Mark's paratactic style better than the more interpretive 'Then'.
- source_word: ἔρχονται
  chosen: they came
  alternatives:
  - they are coming
  - they arrive
  lexicon: BDAG
  rationale: Historical present in Greek is naturally rendered as simple past in readable
    English narrative. 'They came' preserves the event sequence without sounding awkward.
- source_word: φέροντες
  chosen: bringing
  alternatives:
  - carrying
  lexicon: BDAG
  rationale: Present participle expressing attendant action with ἔρχονται. 'Bringing'
    fits the construction 'bringing to him' more idiomatically in English, while the
    more specific carrying action is already expressed by αἰρόμενον.
- source_word: πρὸς αὐτὸν
  chosen: to him
  alternatives:
  - toward him
  lexicon: BDAG
  rationale: Idiomatic rendering of motion toward a person. In context it indicates
    that the man is being brought to Jesus.
- source_word: παραλυτικὸν
  chosen: a paralyzed man
  alternatives:
  - a paralytic
  - a man who was paralyzed
  lexicon: BDAG
  rationale: The adjective is substantival. 'A paralyzed man' is readable modern English
    and avoids reducing the person to a condition, while still accurately conveying
    the meaning.
- source_word: αἰρόμενον
  chosen: carried
  alternatives:
  - being carried
  - borne
  lexicon: BDAG
  rationale: Passive participle modifying the paralyzed man. 'Carried' is concise
    and natural in English; 'being carried' is more explicit but less smooth. The
    sense is that others are physically bearing him.
- source_word: ὑπὸ τεσσάρων
  chosen: by four
  alternatives:
  - by four men
  lexicon: BDAG
  rationale: The Greek states only 'by four.' English can preserve the ellipsis naturally
    here. 'Men' is likely implied by context but not explicit, so it is not added
    to the main text.
