theological_decisions:
- issue: Potential resurrection overtones in ἠγέρθη
  chosen_reading: Rendered as 'he got up' in the immediate healing context
  alternative_readings:
  - he was raised
  - he rose
  rationale: Although ἐγείρω can carry resurrection associations elsewhere, here the
    narrative context is the healed paralytic obeying Jesus' command. The translation
    avoids importing resurrection theology into a verse where the plain sense is physical
    rising.
  doctrine_reference: Translation philosophy §1, §3
