id: MRK.2.12
reference: Mark 2:12
source:
  edition: SBLGNT
  text: καὶ ἠγέρθη ⸂καὶ εὐθὺς⸃ ἄρας τὸν κράβαττον ἐξῆλθεν ⸀ἔμπροσθεν πάντων, ὥστε
    ἐξίστασθαι πάντας καὶ δοξάζειν τὸν θεὸν λέγοντας ὅτι ⸂Οὕτως οὐδέποτε⸃ εἴδομεν.
translation:
  text: And he got up, and immediately picked up the mat and went out in front of
    everyone, so that they were all amazed and glorified God, saying, “We have never
    seen anything like this.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, “We never saw thus.” The Greek idiom means that what
      happened was unprecedented to them.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἠγέρθη
  chosen: he got up
  alternatives:
  - he was raised
  - he rose
  lexicon: BDAG
  rationale: In this healing narrative, the passive/intransitive aorist is best rendered
    idiomatically as the man standing up in response to Jesus' command. 'Was raised'
    would sound overly theological in English here and could suggest resurrection
    language not foregrounded in this immediate context.
- source_word: εὐθύς
  chosen: immediately
  alternatives:
  - at once
  - right away
  lexicon: BDAG
  rationale: Mark frequently uses εὐθύς as a narrative marker of immediacy. 'Immediately'
    preserves that characteristic Markan urgency in clear modern English.
- source_word: ἄρας
  chosen: picked up
  alternatives:
  - taking up
  - lifting
  lexicon: BDAG
  rationale: The participle from αἴρω denotes lifting/carrying the mat. 'Picked up'
    is natural English and fits the sequence of actions without sounding wooden.
- source_word: κράβαττον
  chosen: the mat
  alternatives:
  - pallet
  - bed
  - stretcher
  lexicon: BDAG
  rationale: κράβαττος refers to a simple sleeping pad or pallet. 'Mat' is accessible
    and avoids the misleading connotations of a full bed; 'stretcher' is possible
    in context but is more interpretive than the term itself requires.
- source_word: ἔμπροσθεν πάντων
  chosen: in front of everyone
  alternatives:
  - before them all
  - before everyone
  lexicon: BDAG
  rationale: This phrase emphasizes the public visibility of the miracle. 'In front
    of everyone' is idiomatic modern English and preserves the sense of open public
    witness.
- source_word: ὥστε ἐξίστασθαι πάντας
  chosen: so that they were all amazed
  alternatives:
  - so that everyone was beside themselves
  - so that all were astounded
  lexicon: BDAG
  rationale: ἐξίστημι in this middle/passive infinitive construction conveys astonishment
    or amazement. 'Were all amazed' communicates the result clearly in natural English.
- source_word: δοξάζειν τὸν θεόν
  chosen: glorified God
  alternatives:
  - praised God
  - gave glory to God
  lexicon: BDAG
  rationale: δοξάζω is well represented by 'glorify,' and the phrase is common biblical
    diction. It preserves the God-directed response without flattening it to mere
    praise.
- source_word: Οὕτως οὐδέποτε εἴδομεν
  chosen: We have never seen anything like this
  alternatives:
  - We never saw it this way
  - We have never seen such a thing
  lexicon: BDAG
  rationale: The Greek idiom literally says 'Thus never did we see,' expressing unprecedented
    experience. 'Anything like this' captures the idiomatic force in natural English
    better than a more wooden rendering.
