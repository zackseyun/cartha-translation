id: MRK.2.17
reference: Mark 2:17
source:
  edition: SBLGNT
  text: καὶ ἀκούσας ὁ Ἰησοῦς λέγει αὐτοῖς ⸀ὅτι Οὐ χρείαν ἔχουσιν οἱ ἰσχύοντες ἰατροῦ
    ἀλλ’ οἱ κακῶς ἔχοντες· οὐκ ἦλθον καλέσαι δικαίους ἀλλὰ ⸀ἁμαρτωλούς.
translation:
  text: And when Jesus heard it, he says to them, “Those who are strong have no need
    of a physician, but those who are sick. I did not come to call the righteous,
    but sinners.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'those who are healthy' for 'those who are strong'; the Greek literally
      refers to those who are strong or well.
    reason: lexical_alternative
  - marker: b
    text: '''The righteous'' may be heard ironically in context, that is, those regarded
      as righteous or who consider themselves righteous; the Greek text itself simply
      says ''the righteous.'''
    reason: alternative_reading
lexical_decisions:
- source_word: ἀκούσας
  chosen: when Jesus heard it
  alternatives:
  - after hearing
  - having heard
  lexicon: BDAG
  rationale: Aorist participle preceding the main verb is naturally rendered temporally
    in English. 'When ... heard' is idiomatic and preserves the sequence. 'It' is
    supplied from context because English normally requires an object, though Greek
    leaves it implicit.
- source_word: λέγει
  chosen: he says
  alternatives:
  - he said
  lexicon: BDAG
  rationale: Present-tense historical present in narrative. Rendering as 'he says'
    preserves Mark's vivid style better than flattening to past tense.
- source_word: ὅτι
  chosen: quotation marker rendered by punctuation
  alternatives:
  - that
  lexicon: BDAG
  rationale: Introduces direct discourse. English idiom prefers quotation punctuation
    rather than an explicit 'that' before a direct quote.
- source_word: οἱ ἰσχύοντες
  chosen: those who are strong
  alternatives:
  - the healthy
  - those who are well
  lexicon: BDAG
  rationale: The participle from ἰσχύω literally denotes being strong or having strength.
    'Those who are strong' keeps the lexical sense while fitting the physician metaphor.
    'Healthy' is interpretive and therefore left as an alternative.
- source_word: χρείαν ἔχουσιν
  chosen: have no need
  alternatives:
  - do not need
  lexicon: BDAG
  rationale: This is the standard idiom for having need. 'Have no need' is slightly
    more formal and matches the proverbial tone.
- source_word: ἰατροῦ
  chosen: physician
  alternatives:
  - doctor
  lexicon: BDAG
  rationale: Both are possible, but 'physician' better matches the register of the
    saying and avoids overly contemporary tone while remaining accessible.
- source_word: οἱ κακῶς ἔχοντες
  chosen: those who are sick
  alternatives:
  - those who are ill
  - those who are unwell
  - those who are badly off
  lexicon: BDAG
  rationale: The idiom literally means those who are doing badly, commonly used for
    being ill. 'Those who are sick' communicates the intended sense clearly in the
    medical contrast.
- source_word: οὐκ ἦλθον
  chosen: I did not come
  alternatives:
  - I have not come
  lexicon: BDAG
  rationale: Aorist indicative referring to Jesus' mission is well rendered as simple
    past in English. Present perfect is possible but less direct here.
- source_word: καλέσαι
  chosen: to call
  alternatives:
  - to summon
  - to invite
  lexicon: BDAG
  rationale: '''Call'' is the broad and contextually appropriate gloss, preserving
    the verbal link to discipleship and summons without over-specifying.'
- source_word: δικαίους
  chosen: the righteous
  alternatives:
  - righteous people
  - the just
  lexicon: BDAG
  rationale: As an adjective used substantivally, it refers to righteous persons.
    'The righteous' is concise and preserves the moral-religious category.
- source_word: ἁμαρτωλούς
  chosen: sinners
  alternatives:
  - sinful people
  lexicon: BDAG
  rationale: Standard rendering of the substantival adjective, preserving the recognized
    moral-religious designation used in the Gospel context.
