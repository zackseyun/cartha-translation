theological_decisions:
- issue: Whether to make explicit the implied object of 'heard'
  chosen_reading: Supplied 'it' in English
  alternative_readings:
  - 'Left the object implicit: ''And hearing, Jesus says to them'''
  rationale: The Greek leaves the object unstated, but the immediate context makes
    clear that Jesus heard their complaint or discussion. Supplying 'it' is an English
    necessity, not an interpretive expansion of doctrine.
  doctrine_reference: Translation philosophy §1, §6
- issue: Rendering Mark's historical present
  chosen_reading: Preserved as 'he says'
  alternative_readings:
  - 'Flattened to past tense: ''he said'''
  rationale: Keeping the historical present reflects the Greek narrative texture without
    affecting doctrine. It honors original-language primacy and avoids unnecessary
    smoothing.
  doctrine_reference: Translation philosophy §1, §6
- issue: Whether 'the righteous' is ironic or straightforward
  chosen_reading: Retained the literal phrase 'the righteous' without signaling irony
    in the main text
  alternative_readings:
  - 'Interpreted as ironic: ''those who think they are righteous'''
  rationale: The verse may carry irony in context, but the Greek text itself simply
    says 'the righteous.' To preserve theological tension and avoid importing an interpretive
    conclusion, the main text remains literal.
  doctrine_reference: Translation philosophy §3
