theological_decisions:
- issue: Nature of Jesus' knowledge in 'perceiving in his spirit'
  chosen_reading: Retain the wording 'in his spirit' and present Jesus as perceiving
    their inner reasoning without specifying the mechanism.
  alternative_readings:
  - a statement of supernatural divine omniscience
  - a statement only of acute human intuition
  rationale: The verse clearly presents Jesus as knowing their internal reasoning,
    but the phrase τῷ πνεύματι αὐτοῦ does not itself require the translator to define
    whether the emphasis is on divine omniscience, Spirit-enabled perception, or profound
    inner discernment. Preserving the wording maintains the theological force while
    avoiding interpretive overreach, in line with preserving theological tension.
  doctrine_reference: Translation philosophy §3; Chalcedonian bounds affirmed in DOCTRINE.md
