theological_decisions:
- issue: Anthropological idiom καρδίαις
  chosen_reading: in their hearts
  alternative_readings:
  - within themselves
  - in their minds
  rationale: The verse uses the biblical idiom of the heart as the locus of inner
    thought. Preserving 'hearts' maintains the text's conceptual world without importing
    a modern mind/heart dichotomy.
  doctrine_reference: Translation philosophy §1, §6
