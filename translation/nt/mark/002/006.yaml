id: MRK.2.6
reference: Mark 2:6
source:
  edition: SBLGNT
  text: ἦσαν δέ τινες τῶν γραμματέων ἐκεῖ καθήμενοι καὶ διαλογιζόμενοι ἐν ταῖς καρδίαις
    αὐτῶν·
translation:
  text: 'But some of the scribes were sitting there, reasoning in their hearts:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'thinking within themselves' or 'reasoning in their minds.' The Greek
      literally says 'in their hearts,' a biblical idiom for inward thought.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἦσαν δέ
  chosen: But ... were
  alternatives:
  - Now ... were
  - And ... were
  lexicon: BDAG
  rationale: δέ is mildly connective/adversative here, marking a shift to the internal
    response of another group. 'But' best signals the narrative contrast in natural
    English without overstating it.
- source_word: τινες τῶν γραμματέων
  chosen: some of the scribes
  alternatives:
  - some scribes
  - certain scribes
  lexicon: BDAG
  rationale: The partitive genitive τῶν γραμματέων with τινες is naturally rendered
    'some of the scribes,' preserving that only a subset is in view. 'Scribes' is
    the standard rendering for γραμματεῖς in Gospel contexts.
- source_word: ἐκεῖ
  chosen: there
  alternatives:
  - in that place
  lexicon: BDAG
  rationale: A straightforward locative adverb. 'There' is idiomatic and preserves
    the scene-setting function.
- source_word: καθήμενοι
  chosen: sitting
  alternatives:
  - seated
  lexicon: BDAG
  rationale: The participle describes their posture in the scene. 'Sitting' is natural
    narrative English and keeps the ongoing aspect.
- source_word: διαλογιζόμενοι
  chosen: reasoning
  alternatives:
  - thinking
  - questioning
  - debating
  lexicon: BDAG
  rationale: διαλογίζομαι can denote inward deliberation or reasoning. In this context,
    before their objection is voiced, 'reasoning' captures reflective internal processing
    better than the more interpretive 'questioning' while remaining readable.
- source_word: ἐν ταῖς καρδίαις αὐτῶν
  chosen: in their hearts
  alternatives:
  - within themselves
  - in their minds
  lexicon: BDAG
  rationale: This is a common biblical idiom for inward thought/reflection. 'In their
    hearts' preserves the source expression and its anthropological texture better
    than flattening it to 'in their minds.'
