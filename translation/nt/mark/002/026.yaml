id: MRK.2.26
reference: Mark 2:26
source:
  edition: SBLGNT
  text: ⸀πῶς εἰσῆλθεν εἰς τὸν οἶκον τοῦ θεοῦ ἐπὶ Ἀβιαθὰρ ἀρχιερέως καὶ τοὺς ἄρτους
    τῆς προθέσεως ἔφαγεν, οὓς οὐκ ἔξεστιν φαγεῖν εἰ μὴ ⸂τοὺς ἱερεῖς⸃, καὶ ἔδωκεν καὶ
    τοῖς σὺν αὐτῷ οὖσιν;
translation:
  text: how he entered into the house of God in the time of Abiathar the high priest,
    and ate the bread of the Presence, which it is not lawful to eat except for the
    priests, and also gave some to those who were with him?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'during the high priesthood of Abiathar.' The phrase may also be understood
      more broadly as referring to the time or narrative setting associated with Abiathar
      the high priest.
    reason: alternative_reading
  - marker: b
    text: '''Bread of the Presence'' refers to the consecrated bread set before God
      in the sanctuary; traditionally, ''showbread.'''
    reason: cultural_note
lexical_decisions:
- source_word: πῶς
  chosen: how
  alternatives:
  - in what way
  lexicon: BDAG
  rationale: Introduces the content of what David did; 'how' is idiomatic in English
    and matches the narrative-recounting force here.
- source_word: εἰσῆλθεν εἰς τὸν οἶκον τοῦ θεοῦ
  chosen: entered into the house of God
  alternatives:
  - went into the house of God
  - entered the house of God
  lexicon: BDAG
  rationale: A fairly direct rendering of the aorist verb with the prepositional phrase.
    'House of God' preserves the wording of the Greek and the sacred setting.
- source_word: ἐπὶ Ἀβιαθὰρ ἀρχιερέως
  chosen: in the time of Abiathar the high priest
  alternatives:
  - during the high priesthood of Abiathar
  - under Abiathar the high priest
  lexicon: BDAG
  rationale: The preposition ἐπί with the genitive in temporal expressions can mean
    'in the time of' or 'during.' This rendering preserves the Greek naturally in
    English without forcing a narrower claim than the phrase itself requires.
- source_word: ἄρτους τῆς προθέσεως
  chosen: the bread of the Presence
  alternatives:
  - the showbread
  - the bread set out before God
  lexicon: BDAG
  rationale: '''Bread of the Presence'' is a transparent, modern rendering of the
    cultic expression and preserves the connection to God''s presence better than
    the traditional but less transparent ''showbread.'''
- source_word: ἔφαγεν
  chosen: ate
  alternatives:
  - ate from
  lexicon: BDAG
  rationale: Simple past is the natural rendering of the aorist narrative verb.
- source_word: οὓς οὐκ ἔξεστιν φαγεῖν
  chosen: which it is not lawful to eat
  alternatives:
  - which it is not permitted to eat
  - which one may not eat
  lexicon: BDAG
  rationale: ἔξεστιν expresses what is permitted or lawful. 'It is not lawful' fits
    the legal-sacral context and reads naturally.
- source_word: εἰ μὴ τοὺς ἱερεῖς
  chosen: except for the priests
  alternatives:
  - except the priests alone
  - except by the priests
  lexicon: BDAG
  rationale: This conveys the exception clearly in idiomatic English. 'For the priests'
    reflects the sense that only priests were permitted to eat it.
- source_word: ἔδωκεν καὶ τοῖς σὺν αὐτῷ οὖσιν
  chosen: and also gave some to those who were with him
  alternatives:
  - and gave also to those with him
  - and also gave it to his companions
  lexicon: BDAG
  rationale: The participial phrase literally means 'those being with him.' 'Those
    who were with him' is clear and close to the Greek. 'Some' is supplied idiomatically
    in English because the object is understood from context.
