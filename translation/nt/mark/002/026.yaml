theological_decisions:
- issue: Temporal phrase involving Abiathar and its relation to the Old Testament
    parallel
  chosen_reading: Render ἐπὶ Ἀβιαθὰρ ἀρχιερέως as 'in the time of Abiathar the high
    priest' in the main text.
  alternative_readings:
  - during the high priesthood of Abiathar
  - in the section about Abiathar the high priest
  rationale: The Greek phrase is capable of a broader temporal sense, and this avoids
    overstating a precise chronological claim in English while remaining faithful
    to the wording. Because readers may notice the tension with 1 Samuel 21, an alternative
    explanation is worth preserving in a footnote rather than resolving the issue
    in translation.
  doctrine_reference: Preserve theological tension rather than resolve it.
