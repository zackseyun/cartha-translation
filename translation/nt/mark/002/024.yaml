id: MRK.2.24
reference: Mark 2:24
source:
  edition: SBLGNT
  text: καὶ οἱ Φαρισαῖοι ἔλεγον αὐτῷ· Ἴδε τί ⸀ποιοῦσιν τοῖς σάββασιν ὃ οὐκ ἔξεστιν;
translation:
  text: And the Pharisees were saying to him, “Look, why are they doing on the Sabbath
    what is not permitted?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “Look, what are they doing on the Sabbath that is not lawful?” The Greek
      can be read with τί as “what,” though the sense in context is likely “why.”
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ
  chosen: And
  alternatives:
  - Now
  - Then
  lexicon: BDAG
  rationale: Standard connective; 'And' preserves the narrative flow without adding
    temporal nuance not explicit in the Greek.
- source_word: οἱ Φαρισαῖοι
  chosen: the Pharisees
  lexicon: BDAG
  rationale: Conventional transliteration of the group name; definite article retained
    in natural English form.
- source_word: ἔλεγον
  chosen: were saying
  alternatives:
  - said
  - kept saying
  lexicon: BDAG
  rationale: Imperfect verb suggests ongoing or repeated speech; 'were saying' preserves
    that aspect more transparently than simple past 'said.'
- source_word: αὐτῷ
  chosen: to him
  lexicon: BDAG
  rationale: Dative indirect object naturally rendered 'to him,' referring to Jesus.
- source_word: Ἴδε
  chosen: Look
  alternatives:
  - See
  - Behold
  lexicon: BDAG
  rationale: An attention-getting imperative. 'Look' is natural modern English; 'Behold'
    is too archaic, and 'See' is less idiomatic here.
- source_word: τί
  chosen: why
  alternatives:
  - what
  lexicon: BDAG
  rationale: 'Although τί is formally ''what/why,'' in this idiom with a following
    finite verb and complaint context, it functions adverbially: ''why are they doing...?''
    This best reflects the sense in English.'
- source_word: ποιοῦσιν
  chosen: are they doing
  alternatives:
  - they do
  - they are doing
  lexicon: BDAG
  rationale: Present tense retained with progressive force in direct speech for natural
    English.
- source_word: τοῖς σάββασιν
  chosen: on the Sabbath
  alternatives:
  - on the Sabbaths
  - during the Sabbath
  lexicon: BDAG
  rationale: The plural form σάββασιν is a common idiomatic Semitic-influenced Greek
    expression for the singular Sabbath day. English idiom calls for singular 'on
    the Sabbath.'
- source_word: ὃ οὐκ ἔξεστιν
  chosen: what is not permitted
  alternatives:
  - what is not lawful
  - what is not allowed
  lexicon: BDAG
  rationale: ἔξεστιν denotes what is permitted or lawful. 'Not permitted' is clear
    modern English and preserves the legal/halakhic force without sounding overly
    technical.
