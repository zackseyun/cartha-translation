theological_decisions:
- issue: Nature of the Pharisees' objection
  chosen_reading: Render the complaint in terms of permissibility/lawfulness without
    specifying whether the issue is biblical law, Pharisaic tradition, or broader
    halakhic interpretation.
  alternative_readings:
  - what is unlawful
  - what is against the law
  rationale: The Greek states only that the action is 'not permitted' (οὐκ ἔξεστιν).
    A translation should preserve the accusation's legal-religious force without importing
    a more specific doctrinal judgment than the text itself states.
  doctrine_reference: Preserve theological tension rather than resolve it.
