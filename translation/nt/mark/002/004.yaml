id: MRK.2.4
reference: Mark 2:4
source:
  edition: SBLGNT
  text: καὶ μὴ δυνάμενοι ⸀προσενέγκαι αὐτῷ διὰ τὸν ὄχλον ἀπεστέγασαν τὴν στέγην ὅπου
    ἦν, καὶ ἐξορύξαντες χαλῶσι τὸν κράβαττον ⸀ὅπου ὁ παραλυτικὸς κατέκειτο.
translation:
  text: And since they were not able to bring him to him because of the crowd, they
    removed the roof where he was, and after digging through it, they lower the mat
    on which the paralyzed man was lying.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'to bring him to him,' with the first 'him' referring
      to the paralyzed man and the second to Jesus.
    reason: lexical_alternative
  - marker: b
    text: Or 'they let down the mat.' The Greek verb can be rendered either 'lower'
      or 'let down.'
    reason: lexical_alternative
  - marker: c
    text: Greek 'the paralytic.' The translation renders the term as 'the paralyzed
      man' for natural English.
    reason: lexical_alternative
lexical_decisions:
- source_word: μὴ δυνάμενοι
  chosen: since they were not able
  alternatives:
  - not being able
  - because they could not
  lexicon: BDAG
  rationale: The participial construction introduces the circumstance motivating the
    following action. 'Since they were not able' preserves the causal force in natural
    English without over-paraphrasing.
- source_word: προσενέγκαι αὐτῷ
  chosen: to bring him to him
  alternatives:
  - to bring him
  - to present him to him
  lexicon: BDAG
  rationale: The Greek has both the direct object and dative pronoun, indicating the
    men sought to bring the paralytic to Jesus. 'To bring him to him' sounds slightly
    repetitive in English but preserves the two referents explicitly present in the
    Greek.
- source_word: διὰ τὸν ὄχλον
  chosen: because of the crowd
  alternatives:
  - on account of the crowd
  - because of the mob
  lexicon: BDAG
  rationale: A straightforward causal use of διά with the accusative. 'Crowd' is the
    most natural rendering of ὄχλος here.
- source_word: ἀπεστέγασαν τὴν στέγην
  chosen: they removed the roof
  alternatives:
  - they unroofed the roof
  - they uncovered the roof
  lexicon: BDAG
  rationale: The rare verb ἀποστεγάζω means to remove or uncover the roof covering.
    'They removed the roof' is idiomatic English and conveys the action clearly.
- source_word: ὅπου ἦν
  chosen: where he was
  alternatives:
  - above where he was
  - at the place where he was
  lexicon: BDAG
  rationale: The clause identifies the location of the opening relative to Jesus.
    'Where he was' is the plain sense; English readers infer the vertical relation
    from the roof context.
- source_word: ἐξορύξαντες
  chosen: after digging through it
  alternatives:
  - having dug through
  - after breaking it up
  lexicon: BDAG
  rationale: The participle denotes an action accompanying or preceding the lowering.
    Because roofs in this setting could involve mud/clay and other materials, 'after
    digging through it' captures the physical action without over-specifying materials.
- source_word: χαλῶσι
  chosen: they lower
  alternatives:
  - they let down
  - they are lowering
  lexicon: BDAG
  rationale: The historical present gives vividness. Rendering it as present tense
    in English preserves the narrative immediacy better than a simple past.
- source_word: κράβαττον
  chosen: the mat
  alternatives:
  - the pallet
  - the stretcher
  - the bed
  lexicon: BDAG
  rationale: κράβαττος refers to a simple sleeping pad or pallet rather than a substantial
    bed. 'Mat' is clear, modern, and fits the likely object.
- source_word: ὅπου ὁ παραλυτικὸς κατέκειτο
  chosen: on which the paralyzed man was lying
  alternatives:
  - where the paralytic was lying
  - on which the paralytic lay
  lexicon: BDAG
  rationale: 'The relative clause most naturally modifies κράβαττον in context: the
    mat on which the man was lying. ''Paralyzed man'' is more natural contemporary
    English than the substantival adjective ''paralytic,'' while preserving the meaning.'
