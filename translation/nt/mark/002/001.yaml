id: MRK.2.1
reference: Mark 2:1
source:
  edition: SBLGNT
  text: Καὶ ⸀εἰσελθὼν πάλιν εἰς Καφαρναοὺμ δι’ ⸀ἡμερῶν ἠκούσθη ὅτι ⸂ἐν οἴκῳ⸃ ἐστίν·
translation:
  text: And after he entered Capernaum again some days later, it was heard that he
    was at home.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'in the house.'
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰσελθὼν
  chosen: after he entered
  alternatives:
  - having entered
  - when he entered
  lexicon: BDAG
  rationale: Aorist participle preceding the main verb is rendered temporally in natural
    English. 'After he entered' preserves the sequence without sounding wooden.
- source_word: πάλιν
  chosen: again
  alternatives:
  - once more
  lexicon: BDAG
  rationale: Standard adverbial sense indicating return/repetition; 'again' is the
    most natural concise rendering.
- source_word: Καφαρναούμ
  chosen: Capernaum
  rationale: Personal/place names are transliterated by standard English convention
    per translation philosophy.
- source_word: δι’ ἡμερῶν
  chosen: some days later
  alternatives:
  - after some days
  - after a few days
  lexicon: BDAG
  rationale: The idiom means an interval of days had passed. 'Some days later' communicates
    the temporal sense in idiomatic modern English while preserving the indefinite
    duration.
- source_word: ἠκούσθη
  chosen: it was heard
  alternatives:
  - it was reported
  - people heard
  lexicon: BDAG
  rationale: The passive is retained to reflect the Greek's impersonal report formula.
    'It was reported' is possible, but 'it was heard' stays closer to the source while
    remaining intelligible.
- source_word: ἐν οἴκῳ
  chosen: at home
  alternatives:
  - in the house
  - indoors
  lexicon: BDAG
  rationale: The expression can mean being in a house generally or being at home.
    In Markan context, this likely refers to Jesus being in a house in Capernaum,
    traditionally understood as a home base. 'At home' is idiomatic and fits the narrative
    flow, while the more literal alternative is preserved in a footnote because the
    phrase is somewhat ambiguous.
- source_word: ἐστίν
  chosen: he was
  alternatives:
  - he is
  lexicon: BDAG
  rationale: 'Although the Greek uses present tense in indirect discourse (''he is''),
    English narrative style commonly backshifts after a past reporting verb: ''it
    was heard that he was...''. This preserves natural English without changing the
    sense.'
