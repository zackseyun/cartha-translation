id: MRK.2.15
reference: Mark 2:15
source:
  edition: SBLGNT
  text: Καὶ ⸀γίνεται κατακεῖσθαι αὐτὸν ἐν τῇ οἰκίᾳ αὐτοῦ, καὶ πολλοὶ τελῶναι καὶ ἁμαρτωλοὶ
    συνανέκειντο τῷ Ἰησοῦ καὶ τοῖς μαθηταῖς αὐτοῦ, ἦσαν γὰρ πολλοὶ καὶ ⸀ἠκολούθουν
    αὐτῷ.
translation:
  text: And it happened that he was reclining at table in his house, and many tax
    collectors and sinners were reclining with Jesus and his disciples, for there
    were many, and they were following him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'at Levi’s house'; some understand 'in Jesus’ house.' The Greek says
      only 'in his house.'
    reason: alternative_reading
lexical_decisions:
- source_word: γίνεται
  chosen: it happened
  alternatives:
  - it came to pass
  - it happened that
  lexicon: BDAG
  rationale: Historical present used by Mark for vivid narrative progression. Rendered
    with natural English past narrative idiom rather than a wooden present ('it happens').
- source_word: κατακεῖσθαι
  chosen: was reclining at table
  alternatives:
  - was reclining
  - was lying down to eat
  lexicon: BDAG
  rationale: Refers to the customary dining posture, not merely lying down. 'At table'
    makes the meal setting explicit in idiomatic English.
- source_word: ἐν τῇ οἰκίᾳ αὐτοῦ
  chosen: in his house
  alternatives:
  - at his house
  - in the house of him
  lexicon: BDAG
  rationale: Straightforward locative phrase. 'In his house' preserves the Greek possessive;
    English leaves the antecedent of 'his' implicit as in the Greek.
- source_word: τελῶναι
  chosen: tax collectors
  alternatives:
  - tax gatherers
  lexicon: BDAG
  rationale: Standard and clear rendering for revenue agents; avoids archaic phrasing.
- source_word: ἁμαρτωλοὶ
  chosen: sinners
  alternatives:
  - sinful people
  lexicon: BDAG
  rationale: Conventional and direct rendering. In context it likely reflects a socially
    and religiously marked class as viewed by others, but the text itself uses the
    simple label.
- source_word: συνανέκειντο
  chosen: were reclining with
  alternatives:
  - were dining with
  - were sitting at table with
  lexicon: BDAG
  rationale: Keeps the meal posture imagery and the association conveyed by the compound
    verb. 'Dining with' is interpretive; 'reclining with' stays closer to the Greek
    while remaining understandable.
- source_word: μαθηταῖς
  chosen: disciples
  alternatives:
  - learners
  - followers
  lexicon: BDAG
  rationale: Standard NT rendering preserving the relational and instructional sense.
- source_word: ἦσαν γὰρ πολλοὶ
  chosen: for there were many
  alternatives:
  - for many were there
  - for they were many
  lexicon: BDAG
  rationale: Most natural English rendering of the explanatory clause, preserving
    γάρ as explanation.
- source_word: ἠκολούθουν αὐτῷ
  chosen: they were following him
  alternatives:
  - they followed him
  lexicon: BDAG
  rationale: 'Imperfect rendered progressively to reflect ongoing action/background:
    these many people were in the habit of following Jesus.'
