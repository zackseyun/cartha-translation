theological_decisions:
- issue: Antecedent of 'his house' (αὐτοῦ)
  chosen_reading: Left as 'his house' without specifying the owner in the main text.
  alternative_readings:
  - Levi's house
  - Jesus' house
  rationale: The Greek pronoun is ambiguous in immediate context. Many interpreters
    take it as Levi's house from the preceding verse, while some understand it as
    Jesus' house. To preserve the source-text ambiguity rather than resolve it interpretively,
    the translation retains 'his house' and notes the alternatives.
  doctrine_reference: Preserve theological tension rather than resolve it.
