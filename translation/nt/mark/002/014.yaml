theological_decisions:
- issue: Narrative tense in Mark's historical present
  chosen_reading: Preserve λέγει as present ('he says') while keeping surrounding
    aorists in past narration.
  alternative_readings:
  - 'Regularize to past tense throughout: ''he said'''
  rationale: This is primarily a translational rather than doctrinal issue, but preserving
    Mark's historical present retains the narrative vividness of the Greek without
    distorting meaning.
  doctrine_reference: Translation philosophy §6 (readable modern English) and §5 (consistency
    of key terms, or documented exception)
