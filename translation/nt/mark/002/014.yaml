id: MRK.2.14
reference: Mark 2:14
source:
  edition: SBLGNT
  text: καὶ παράγων εἶδεν Λευὶν τὸν τοῦ Ἁλφαίου καθήμενον ἐπὶ τὸ τελώνιον, καὶ λέγει
    αὐτῷ· Ἀκολούθει μοι. καὶ ἀναστὰς ἠκολούθησεν αὐτῷ.
translation:
  text: And as he was passing by, he saw Levi the son of Alphaeus sitting at the tax
    booth, and he says to him, “Follow me.” And he rose and followed him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “at the toll booth.” The Greek term can refer to a place where taxes
      or customs duties were collected.
    reason: lexical_alternative
lexical_decisions:
- source_word: παράγων
  chosen: as he was passing by
  alternatives:
  - passing by
  - going along
  lexicon: BDAG
  rationale: Present participle with imperfective force, setting the scene contemporaneously
    with εἶδεν. 'As he was passing by' gives natural English while preserving the
    ongoing action.
- source_word: εἶδεν
  chosen: he saw
  alternatives:
  - he noticed
  lexicon: BDAG
  rationale: Aorist indicative of ὁράω is straightforwardly rendered 'he saw'; 'noticed'
    is possible but adds interpretive nuance not required by the text.
- source_word: Λευὶν
  chosen: Levi
  rationale: Personal name transliterated according to the translation philosophy.
- source_word: τὸν τοῦ Ἁλφαίου
  chosen: the son of Alphaeus
  alternatives:
  - son of Alphaeus
  lexicon: BDAG
  rationale: This genitival construction identifies Levi by parentage. English idiom
    normally supplies 'son of' to make the relationship explicit.
- source_word: καθήμενον
  chosen: sitting
  alternatives:
  - seated
  lexicon: BDAG
  rationale: Present middle/passive participle describing Levi's posture/state at
    the time Jesus saw him. 'Sitting' is the most natural and direct rendering.
- source_word: ἐπὶ τὸ τελώνιον
  chosen: at the tax booth
  alternatives:
  - at the tax office
  - at the toll booth
  lexicon: BDAG
  rationale: τελώνιον refers to the place where taxes/tolls are collected. 'Tax booth'
    is idiomatic and concrete in modern English; 'toll booth' is narrower and may
    over-specify.
- source_word: λέγει
  chosen: he says
  alternatives:
  - he said
  lexicon: BDAG
  rationale: Mark's historical present is preserved here as 'he says' to reflect the
    vivid narrative style, since readable modern English can still bear the present
    tense.
- source_word: Ἀκολούθει μοι
  chosen: Follow me
  alternatives:
  - Come, follow me
  lexicon: BDAG
  rationale: Present imperative calls for ongoing discipleship/allegiance. 'Follow
    me' is the standard and sufficient rendering without adding 'come,' which is not
    explicit in the Greek.
- source_word: ἀναστὰς
  chosen: he rose
  alternatives:
  - getting up
  - he got up
  lexicon: BDAG
  rationale: Aorist participle of ἀνίστημι preceding the main verb. 'He rose' is concise
    and preserves the sequence without colloquial flattening.
- source_word: ἠκολούθησεν αὐτῷ
  chosen: followed him
  alternatives:
  - became his follower
  lexicon: BDAG
  rationale: Aorist indicative narrates Levi's response. 'Followed him' preserves
    the verbal link with Jesus' command and avoids paraphrase.
