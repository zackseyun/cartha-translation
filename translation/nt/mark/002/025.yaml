id: MRK.2.25
reference: Mark 2:25
source:
  edition: SBLGNT
  text: καὶ ⸀λέγει αὐτοῖς· Οὐδέποτε ἀνέγνωτε τί ἐποίησεν Δαυὶδ ὅτε χρείαν ἔσχεν καὶ
    ἐπείνασεν αὐτὸς καὶ οἱ μετ’ αὐτοῦ;
translation:
  text: And he said to them, “Have you never read what David did when he was in need
    and was hungry, he and those with him?”
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: λέγει
  chosen: he said
  alternatives:
  - he says
  lexicon: BDAG
  rationale: Although the Greek uses the historical present, idiomatic modern English
    commonly renders this narrative present as a simple past in this context. This
    preserves natural readability without changing the discourse function.
- source_word: Οὐδέποτε
  chosen: never
  alternatives:
  - at no time
  - ever ... not
  lexicon: BDAG
  rationale: 'The adverb intensifies the rhetorical question: ''Have you never read...?''
    ''Never'' is the most natural and forceful English equivalent.'
- source_word: ἀνέγνωτε
  chosen: have you ... read
  alternatives:
  - did you ... read
  lexicon: BDAG
  rationale: 'An English present perfect fits the rhetorical force of the aorist here
    in a question about familiarity with Scripture: ''Have you never read...?'' This
    is standard idiomatic rendering in such contexts.'
- source_word: τί ἐποίησεν
  chosen: what ... did
  alternatives:
  - what ... made
  - what happened that ... did
  lexicon: BDAG
  rationale: ποιέω here refers to David's action, so 'did' is the straightforward
    and idiomatic rendering.
- source_word: Δαυὶδ
  chosen: David
  rationale: Personal name transliterated by standard English convention, in keeping
    with the translation philosophy.
- source_word: ὅτε
  chosen: when
  alternatives:
  - at the time when
  lexicon: BDAG
  rationale: Simple temporal conjunction; 'when' is the natural equivalent.
- source_word: χρείαν ἔσχεν
  chosen: was in need
  alternatives:
  - had need
  - was needy
  lexicon: BDAG
  rationale: The idiom literally means 'had need,' but 'was in need' is clearer, natural
    modern English and preserves the sense of necessity or lack.
- source_word: ἐπείνασεν
  chosen: was hungry
  alternatives:
  - became hungry
  - hungered
  lexicon: BDAG
  rationale: The verb denotes experiencing hunger. 'Was hungry' is idiomatic English;
    'hungered' is understandable but less natural, and 'became hungry' is too inceptive
    for the context.
- source_word: αὐτὸς καὶ οἱ μετ’ αὐτοῦ
  chosen: he and those with him
  alternatives:
  - he himself and those with him
  - he and his companions
  lexicon: BDAG
  rationale: This phrase explicitly includes David and his associates. 'He and those
    with him' stays close to the Greek while remaining natural. 'His companions' is
    possible but slightly more interpretive than the source wording.
