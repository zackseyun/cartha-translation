theological_decisions:
- issue: Rendering of David's example in Jesus' Sabbath argument
  chosen_reading: Translate the statement straightforwardly as a rhetorical appeal
    to Scripture without importing interpretive conclusions into the verse itself.
  alternative_readings:
  - Expand the wording to make explicit that Jesus is defending his disciples' conduct
    on the Sabbath
  rationale: The verse itself only introduces David's action as a scriptural precedent.
    The translation should preserve the rhetorical setup without adding explanatory
    material not present in the Greek.
  doctrine_reference: Preserve theological tension rather than resolve it; do not
    import doctrinal claims the text does not make.
