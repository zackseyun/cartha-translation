theological_decisions:
- issue: Metaphorical identification of Jesus as the bridegroom
  chosen_reading: Retain the metaphor without making its theological implication explicit
    in the main text.
  alternative_readings:
  - Translate more interpretively to foreground messianic/bridegroom imagery
  rationale: The verse presents Jesus using bridegroom imagery for himself, which
    carries theological significance, but the translation should not import explanatory
    claims beyond the text. 'Bridegroom' preserves the image and its resonance while
    leaving interpretation to readers and notes.
  doctrine_reference: Preserve theological tension rather than resolve it.
