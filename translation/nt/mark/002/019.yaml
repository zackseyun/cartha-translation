id: MRK.2.19
reference: Mark 2:19
source:
  edition: SBLGNT
  text: καὶ εἶπεν αὐτοῖς ὁ Ἰησοῦς· Μὴ δύνανται οἱ υἱοὶ τοῦ νυμφῶνος ἐν ᾧ ὁ νυμφίος
    μετ’ αὐτῶν ἐστιν νηστεύειν; ὅσον χρόνον ⸂ἔχουσιν τὸν νυμφίον μετ’ αὐτῶν⸃ οὐ δύνανται
    νηστεύειν·
translation:
  text: And Jesus said to them, “The wedding guests cannot fast while the bridegroom
    is with them, can they? As long as they have the bridegroom with them, they cannot
    fast.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, “the sons of the wedding hall” or “the sons of the bridal chamber,”
      an idiom for those participating in the wedding celebration.
    reason: lexical_alternative
lexical_decisions:
- source_word: Μὴ δύνανται ... νηστεύειν;
  chosen: cannot fast ... can they?
  alternatives:
  - are not able to fast
  - surely they cannot fast
  lexicon: BDAG
  rationale: μή with the indicative introduces a rhetorical question expecting a negative
    answer. English idiom is best captured by a negative statement with a confirming
    tag question rather than a wooden 'Are they not able...?'.
- source_word: οἱ υἱοὶ τοῦ νυμφῶνος
  chosen: the wedding guests
  alternatives:
  - the sons of the bridal chamber
  - the bridegroom's attendants
  lexicon: BDAG
  rationale: The idiom literally reads 'sons of the wedding hall/bridal chamber' and
    refers to those associated with the wedding celebration, especially the groom's
    companions. 'Wedding guests' communicates the social role in natural English without
    preserving an opaque Semitic/Greek idiom. The more specific 'bridegroom's attendants'
    is possible but narrower than the phrase requires.
- source_word: νυμφῶνος
  chosen: wedding
  alternatives:
  - bridal chamber
  - wedding hall
  lexicon: BDAG
  rationale: Within the idiom οἱ υἱοὶ τοῦ νυμφῶνος, the noun points to the wedding
    setting rather than a literal room in English. Rendering the whole phrase idiomatically
    avoids awkwardness.
- source_word: ἐν ᾧ ... ἐστιν
  chosen: while ... is with them
  alternatives:
  - in which ... is with them
  - during the time that ... is with them
  lexicon: BDAG
  rationale: The construction is temporal in sense here, not primarily spatial. 'While'
    gives the intended force in clear English.
- source_word: ὁ νυμφίος / τὸν νυμφίον
  chosen: the bridegroom
  alternatives:
  - the groom
  lexicon: BDAG
  rationale: '''Bridegroom'' preserves the metaphorical and biblical resonance of
    the image more fully than the more colloquial ''groom,'' while remaining understandable
    in modern English.'
- source_word: μετ’ αὐτῶν
  chosen: with them
  alternatives:
  - among them
  lexicon: BDAG
  rationale: The preposition μετά with the genitive here denotes accompaniment. 'With
    them' is the most direct rendering.
- source_word: ὅσον χρόνον
  chosen: As long as
  alternatives:
  - for as much time as
  - while
  lexicon: BDAG
  rationale: This idiom marks duration. 'As long as' is natural English and matches
    the temporal emphasis.
- source_word: ἔχουσιν τὸν νυμφίον μετ’ αὐτῶν
  chosen: they have the bridegroom with them
  alternatives:
  - the bridegroom is with them
  lexicon: BDAG
  rationale: The second clause explicitly uses ἔχουσιν ('they have'), not simply 'he
    is.' Preserving 'have' reflects the Greek wording while remaining idiomatic.
- source_word: καὶ εἶπεν αὐτοῖς ὁ Ἰησοῦς
  chosen: And Jesus said to them
  alternatives:
  - And Jesus told them
  lexicon: BDAG
  rationale: Standard narrative introduction; 'said to them' is straightforward and
    sufficiently formal.
