id: MRK.2.5
reference: Mark 2:5
source:
  edition: SBLGNT
  text: ⸂καὶ ἰδὼν⸃ ὁ Ἰησοῦς τὴν πίστιν αὐτῶν λέγει τῷ παραλυτικῷ· Τέκνον, ⸂ἀφίενταί
    σου⸃ αἱ ⸀ἁμαρτίαι.
translation:
  text: And Jesus, seeing their faith, says to the paralyzed man, “Child, your sins
    are forgiven.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Son”; Greek τέκνον, a tender address meaning “child.”
    reason: lexical_alternative
lexical_decisions:
- source_word: ἰδὼν
  chosen: seeing
  alternatives:
  - when he saw
  - having seen
  lexicon: BDAG
  rationale: A participial form of ὁράω. 'Seeing' preserves the participial connection
    to the main verb and reads naturally in English without over-paraphrasing.
- source_word: πίστιν
  chosen: faith
  alternatives:
  - trust
  - faithfulness
  lexicon: BDAG
  rationale: Per doctrine defaults, πίστις is rendered 'faith.' Here it refers to
    the evident trust/confidence of the group in bringing the man to Jesus, not primarily
    'faithfulness.'
- source_word: αὐτῶν
  chosen: their
  alternatives:
  - theirs
  lexicon: BDAG
  rationale: 'The genitive plural naturally modifies ''faith'': Jesus sees the faith
    belonging to the group present with the paralyzed man.'
- source_word: λέγει
  chosen: says
  alternatives:
  - said
  - is saying
  lexicon: BDAG
  rationale: The Greek present is often used as a historical present in narrative.
    Rendering it as 'says' preserves the vividness of Mark's style.
- source_word: παραλυτικῷ
  chosen: the paralyzed man
  alternatives:
  - the paralytic
  lexicon: BDAG
  rationale: The adjective used substantivally denotes a paralyzed person. 'The paralyzed
    man' is more readable modern English than 'the paralytic' while preserving the
    referent.
- source_word: Τέκνον
  chosen: Child
  alternatives:
  - Son
  - My child
  lexicon: BDAG
  rationale: τέκνον is a tender form of address meaning 'child.' 'Child' preserves
    the familial warmth without importing a male-specific nuance that the Greek term
    itself does not require. 'Son' is traditional in some English versions but is
    less lexically precise.
- source_word: ἀφίενταί σου αἱ ἁμαρτίαι
  chosen: your sins are forgiven
  alternatives:
  - your sins are being forgiven
  - your sins have been forgiven
  lexicon: BDAG
  rationale: The present passive form naturally yields 'are forgiven.' This keeps
    the declarative force of Jesus' pronouncement without forcing a more interpretive
    English tense. The passive leaves the implied divine agency unstated, as in the
    Greek.
- source_word: ἁμαρτίαι
  chosen: sins
  alternatives:
  - sinful acts
  lexicon: BDAG
  rationale: Standard rendering for ἁμαρτίαι; plural is preserved.
