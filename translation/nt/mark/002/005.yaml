theological_decisions:
- issue: Nature of Jesus' pronouncement of forgiveness
  chosen_reading: 'Render as a direct declaration: ''your sins are forgiven'''
  alternative_readings:
  - your sins have been forgiven
  - your sins are being forgiven
  rationale: The Greek present passive states forgiveness as a present reality in
    Jesus' address. The translation should preserve the force of the pronouncement
    without adding explanatory theology about mechanism or timing beyond the text
    itself.
  doctrine_reference: Preserve theological tension rather than resolve it.
