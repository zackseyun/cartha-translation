id: MRK.2.7
reference: Mark 2:7
source:
  edition: SBLGNT
  text: Τί οὗτος οὕτως λαλεῖ; ⸀βλασφημεῖ· τίς δύναται ἀφιέναι ἁμαρτίας εἰ μὴ εἷς ὁ
    θεός;
translation:
  text: Why does this man speak like this? He is blaspheming! Who can forgive sins
    except God alone?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'What does this man speak like this?' The Greek idiom
      here means 'Why does this man speak like this?'
    reason: lexical_alternative
  - marker: b
    text: Or 'except the one God.'
    reason: alternative_reading
lexical_decisions:
- source_word: Τί
  chosen: Why
  alternatives:
  - What
  lexicon: BDAG
  rationale: In the idiom Τί ... λαλεῖ; the interrogative is best rendered as 'Why'
    rather than a wooden 'What,' since the scribes are objecting to the manner or
    grounds of his speech, not asking for the content of it.
- source_word: οὗτος
  chosen: this man
  alternatives:
  - this one
  - this fellow
  lexicon: BDAG
  rationale: The demonstrative is used of Jesus with dismissive distance. 'This man'
    conveys the referential force naturally in English without adding excessive contempt.
    'This fellow' would sharpen the scorn beyond what the Greek explicitly requires.
- source_word: οὕτως
  chosen: like this
  alternatives:
  - thus
  - in this way
  lexicon: BDAG
  rationale: A natural modern-English rendering of the adverb modifying 'speak.' 'Like
    this' preserves the objection to the manner/content of Jesus' words.
- source_word: λαλεῖ
  chosen: speak
  alternatives:
  - talk
  - say
  lexicon: BDAG
  rationale: '''Speak'' is the most neutral and fitting English equivalent here. ''Talk''
    is too informal; ''say'' would flatten the durative verbal idea.'
- source_word: βλασφημεῖ
  chosen: is blaspheming
  alternatives:
  - blasphemes
  - speaks blasphemy
  lexicon: BDAG
  rationale: The present tense is rendered progressively to reflect the immediate
    accusation arising from Jesus' words. 'Is blaspheming' is idiomatic and preserves
    the charge's theological weight.
- source_word: τίς δύναται
  chosen: Who can
  alternatives:
  - Who is able to
  lexicon: BDAG
  rationale: This is the natural English equivalent for a question of capability/authority.
    The compressed form is clear and idiomatic.
- source_word: ἀφιέναι ἁμαρτίας
  chosen: forgive sins
  alternatives:
  - release sins
  - send away sins
  lexicon: BDAG
  rationale: In this context ἀφίημι with ἁμαρτίας clearly means 'forgive.' More literal
    options would obscure the established semantic value in sin-forgiveness contexts.
- source_word: εἰ μὴ εἷς ὁ θεός
  chosen: except God alone
  alternatives:
  - except the one God
  - if not God alone
  lexicon: BDAG
  rationale: 'This construction expresses exception: ''except God alone.'' This wording
    is idiomatic in English and preserves the exclusivity of the claim. ''The one
    God'' is possible but sounds more interpretive here than necessary.'
