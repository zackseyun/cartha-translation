theological_decisions:
- issue: Whether οὗτος should be rendered with heightened contempt
  chosen_reading: this man
  alternative_readings:
  - this one
  - this fellow
  rationale: The scribes' objection is hostile, but the translation should not intensify
    the insult beyond the Greek. 'This man' preserves the distancing tone without
    importing extra derision.
  doctrine_reference: Translation philosophy §1, §6
- issue: Force of the accusation βλασφημεῖ
  chosen_reading: He is blaspheming!
  alternative_readings:
  - He blasphemes!
  - This is blasphemy!
  rationale: The text presents the scribes' theological judgment against Jesus' claim
    to forgive sins. The translation preserves their accusation without resolving
    the larger christological question in the wording itself, thus maintaining the
    narrative tension.
  doctrine_reference: Translation philosophy §3
