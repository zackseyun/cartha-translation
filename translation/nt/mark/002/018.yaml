id: MRK.2.18
reference: Mark 2:18
source:
  edition: SBLGNT
  text: Καὶ ἦσαν οἱ μαθηταὶ Ἰωάννου καὶ οἱ ⸀Φαρισαῖοι νηστεύοντες. καὶ ἔρχονται καὶ
    λέγουσιν αὐτῷ· Διὰ τί οἱ μαθηταὶ Ἰωάννου καὶ οἱ ⸀μαθηταὶ τῶν Φαρισαίων νηστεύουσιν,
    οἱ δὲ σοὶ μαθηταὶ οὐ νηστεύουσιν;
translation:
  text: Now John's disciples and the Pharisees were fasting. And they come and say
    to him, "Why do John's disciples and the disciples of the Pharisees fast, but
    your disciples do not fast?"
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'people came and said to him.' The Greek leaves the subject of 'come'
      and 'say' unstated.
    reason: alternative_reading
lexical_decisions:
- source_word: ἦσαν ... νηστεύοντες
  chosen: were fasting
  alternatives:
  - were engaged in fasting
  - were observing a fast
  lexicon: BDAG
  rationale: The periphrastic construction with imperfect εἰμί + present participle
    naturally conveys ongoing action in past time. 'Were fasting' is idiomatic and
    preserves the aspect without overtranslating.
- source_word: οἱ μαθηταὶ Ἰωάννου
  chosen: John's disciples
  alternatives:
  - the disciples of John
  lexicon: BDAG
  rationale: The genitive is possessive/associative. The English possessive is natural
    and concise while preserving the relationship.
- source_word: οἱ Φαρισαῖοι
  chosen: the Pharisees
  lexicon: BDAG
  rationale: Standard transliteration of the group name; this is the established English
    form for the Jewish sect.
- source_word: ἔρχονται καὶ λέγουσιν
  chosen: they come and say
  alternatives:
  - people came and said
  - they are coming and saying
  lexicon: BDAG
  rationale: These are historical presents, common in Mark. Rendering them as present
    tense preserves Mark's vivid narrative style better than flattening them into
    simple past.
- source_word: αὐτῷ
  chosen: to him
  lexicon: BDAG
  rationale: Simple dative indirect object; 'to him' is the natural English equivalent.
- source_word: Διὰ τί
  chosen: Why
  alternatives:
  - For what reason
  lexicon: BDAG
  rationale: Idiomatic interrogative in English; concise and accurate.
- source_word: οἱ μαθηταὶ τῶν Φαρισαίων
  chosen: the disciples of the Pharisees
  alternatives:
  - the Pharisees' disciples
  lexicon: BDAG
  rationale: The fuller phrasing avoids awkward repetition with the earlier 'the Pharisees'
    and clearly reflects the genitive relationship.
- source_word: νηστεύουσιν
  chosen: fast
  alternatives:
  - are fasting
  lexicon: BDAG
  rationale: The present tense here expresses customary practice rather than necessarily
    action at that exact moment. 'Fast' reads naturally in the question and matches
    the contrast with 'do not fast.'
- source_word: οἱ δὲ σοὶ μαθηταὶ
  chosen: but your disciples
  alternatives:
  - but the disciples of you
  lexicon: BDAG
  rationale: δέ marks contrast, and σοί/σός here is possessive in force. 'But your
    disciples' is idiomatic and preserves the contrast.
