theological_decisions:
- issue: Identity of the speakers in 'they come and say to him'
  chosen_reading: Rendered generically as 'they come and say to him' without specifying
    the subject.
  alternative_readings:
  - Some translations supply 'people came' or identify the speakers more specifically
    from context.
  rationale: The Greek leaves the subject implicit. Supplying a specific group would
    import more precision than the text states. The translation preserves the narrative
    ambiguity.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
