id: MRK.2.28
reference: Mark 2:28
source:
  edition: SBLGNT
  text: ὥστε κύριός ἐστιν ὁ υἱὸς τοῦ ἀνθρώπου καὶ τοῦ σαββάτου.
translation:
  text: So the Son of Man is Lord even of the Sabbath.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'therefore the Son of Man is Lord also of the Sabbath.' The Greek conjunction
      can be rendered simply 'and/also,' but here likely has the sense 'even,' emphasizing
      the extent of his authority.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὥστε
  chosen: So
  alternatives:
  - therefore
  - consequently
  lexicon: BDAG
  rationale: Introduces an inference from the preceding argument. 'So' is natural
    modern English and preserves the logical conclusion without sounding overly formal.
- source_word: κύριος
  chosen: Lord
  alternatives:
  - master
  lexicon: BDAG
  rationale: Per doctrine default, κύριος is rendered 'Lord.' In this context it denotes
    authority/sovereignty, and the capitalized form fits its christological force
    in reference to the Son of Man.
- source_word: ὁ υἱὸς τοῦ ἀνθρώπου
  chosen: the Son of Man
  alternatives:
  - the human one
  lexicon: BDAG
  rationale: This is Jesus' established self-designation in the Gospels and should
    be preserved as the traditional yet still transparent title. Rendering it more
    dynamically would obscure intertextual and christological resonance.
- source_word: καὶ
  chosen: even
  alternatives:
  - also
  - and
  lexicon: BDAG
  rationale: 'With the genitive phrase ''of the Sabbath,'' καί has an ascensive sense:
    not merely ''and'' but ''even,'' highlighting the surprising extent of the Son
    of Man''s lordship.'
- source_word: σαββάτου
  chosen: the Sabbath
  alternatives:
  - the sabbath day
  lexicon: BDAG
  rationale: '''The Sabbath'' is the natural English rendering of the singular genitive
    here and matches the immediate controversy context about Sabbath observance.'
