theological_decisions:
- issue: Christological force of Jesus' claim to authority over the Sabbath
  chosen_reading: Render the statement straightforwardly as a claim that the Son of
    Man is Lord over the Sabbath.
  alternative_readings:
  - Render more weakly as 'has authority with respect to the Sabbath'
  rationale: The predicate nominative κύριος naturally conveys lordship, not merely
    limited permission. This preserves the strong christological claim without adding
    doctrinal explanation beyond the text itself.
  doctrine_reference: Affirmations; Contested terms table for κύριος
- issue: Reference of 'Son of Man'
  chosen_reading: Retain 'the Son of Man' as Jesus' title rather than paraphrasing
    it generically.
  alternative_readings:
  - '''the human one'''
  - '''man'' in a representative sense'
  rationale: In Mark this expression functions as Jesus' self-referential title and
    carries theological tension and possible Danielic resonance. The translation should
    preserve that tension rather than resolve it.
  doctrine_reference: Translation philosophy §3; §4
