theological_decisions:
- issue: Social-religious force of table fellowship
  chosen_reading: Render the accusation plainly as eating 'with sinners and tax collectors'
    without adding interpretive explanation in the main text.
  alternative_readings:
  - Render more dynamically as 'shares meals with' to foreground fellowship significance
  rationale: The verse's theological and social tension lies in Jesus' association
    with stigmatized groups. The Greek states this through the ordinary verb 'eat'
    plus 'with'; preserving that wording lets the narrative carry the implication
    without interpretive expansion.
  doctrine_reference: Translation philosophy §§1, 3, 6
