id: MRK.2.16
reference: Mark 2:16
source:
  edition: SBLGNT
  text: καὶ οἱ γραμματεῖς ⸂τῶν Φαρισαίων⸃ ⸀ἰδόντες ⸂ὅτι ἐσθίει⸃ μετὰ τῶν ⸂ἁμαρτωλῶν
    καὶ τελωνῶν⸃ ἔλεγον τοῖς μαθηταῖς αὐτοῦ· ⸀Ὅτι μετὰ τῶν ⸂τελωνῶν καὶ ἁμαρτωλῶν⸃
    ⸀ἐσθίει;
translation:
  text: And the scribes of the Pharisees, seeing that he was eating with sinners and
    tax collectors, were saying to his disciples, “Why does he eat with tax collectors
    and sinners?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more dynamically, 'shares meals with tax collectors and sinners.' The
      Greek literally says 'eats with,' which in context implies table fellowship.
    reason: lexical_alternative
lexical_decisions:
- source_word: γραμματεῖς
  chosen: scribes
  alternatives:
  - teachers of the law
  - experts in the law
  lexicon: BDAG
  rationale: '''Scribes'' is the standard and sufficiently transparent rendering for
    γραμματεῖς in Gospel contexts, referring to recognized textual/legal experts without
    over-specifying their function.'
- source_word: τῶν Φαρισαίων
  chosen: of the Pharisees
  alternatives:
  - who were Pharisees
  - the Pharisaic scribes
  lexicon: BDAG
  rationale: 'The genitive is rendered straightforwardly as affiliation: these are
    scribes associated with the Pharisees. ''Of the Pharisees'' preserves the Greek
    construction without forcing a more interpretive paraphrase.'
- source_word: ἰδόντες
  chosen: seeing
  alternatives:
  - when they saw
  - noticing
  lexicon: BDAG
  rationale: The aorist participle is naturally rendered as 'seeing,' with the temporal-circumstantial
    sense carried by English context. This keeps the flow close to the Greek while
    remaining idiomatic.
- source_word: ὅτι ἐσθίει
  chosen: that he was eating
  alternatives:
  - that he eats
  - that he was dining
  lexicon: BDAG
  rationale: The imperfect ἐσθίει in narrative context is well represented by English
    past progressive, highlighting the ongoing scene. 'Eating' is preferred over 'dining'
    as the more basic lexical equivalent.
- source_word: μετὰ
  chosen: with
  alternatives:
  - in company with
  lexicon: BDAG
  rationale: μετά with the genitive here denotes association/table fellowship. 'With'
    is the natural English equivalent and leaves the social significance to context
    rather than paraphrase.
- source_word: ἁμαρτωλῶν
  chosen: sinners
  alternatives:
  - sinful people
  lexicon: BDAG
  rationale: '''Sinners'' is the direct lexical equivalent and preserves the social-religious
    labeling present in the text. A softer paraphrase would understate the force of
    the accusation.'
- source_word: τελωνῶν
  chosen: tax collectors
  alternatives:
  - revenue collectors
  - toll collectors
  lexicon: BDAG
  rationale: '''Tax collectors'' is the established and accurate rendering in Gospel
    contexts, conveying the socially stigmatized group in view.'
- source_word: ἔλεγον
  chosen: were saying
  alternatives:
  - said
  - kept saying
  lexicon: BDAG
  rationale: The imperfect is represented as 'were saying' to preserve the ongoing
    or repeated nature of the complaint. 'Said' would flatten the aspect.
- source_word: τοῖς μαθηταῖς αὐτοῦ
  chosen: to his disciples
  alternatives:
  - to his followers
  lexicon: BDAG
  rationale: '''Disciples'' is the standard rendering for μαθηταί and preserves the
    formal teacher-disciple relationship better than the broader ''followers.'''
- source_word: Ὅτι
  chosen: Why
  alternatives:
  - Is it that
  - How is it that
  - That
  lexicon: BDAG
  rationale: In this interrogative context, ὅτι functions idiomatically to introduce
    the complaint/question. 'Why' gives the sense in natural English better than a
    wooden 'that.'
- source_word: ἐσθίει
  chosen: does he eat
  alternatives:
  - is he eating
  lexicon: BDAG
  rationale: In the direct question, English present 'does he eat' is idiomatic for
    the Greek present/imperfective sense. It communicates the objection to his customary
    or characteristic association at table.
