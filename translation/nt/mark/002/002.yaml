id: MRK.2.2
reference: Mark 2:2
source:
  edition: SBLGNT
  text: ⸀καὶ συνήχθησαν πολλοὶ ὥστε μηκέτι χωρεῖν μηδὲ τὰ πρὸς τὴν θύραν, καὶ ἐλάλει
    αὐτοῖς τὸν λόγον.
translation:
  text: And many were gathered together, so that there was no longer room, not even
    at the door, and he was speaking the word to them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the message.' Greek 'the word.'
    reason: lexical_alternative
lexical_decisions:
- source_word: συνήχθησαν
  chosen: were gathered together
  alternatives:
  - gathered
  - assembled
  lexicon: BDAG
  rationale: Aorist passive indicates that many came to be assembled; 'were gathered
    together' preserves the passive sense and the συν- intensification without sounding
    wooden.
- source_word: πολλοὶ
  chosen: many
  alternatives:
  - a crowd
  - many people
  lexicon: BDAG
  rationale: The adjective functions substantivally. 'Many' is concise and natural,
    leaving the implied people understood from context.
- source_word: ὥστε
  chosen: so that
  alternatives:
  - with the result that
  lexicon: BDAG
  rationale: Introduces the result clause. 'So that' is idiomatic modern English and
    preserves the causal-result relationship.
- source_word: μηκέτι
  chosen: no longer
  alternatives:
  - not any more
  lexicon: BDAG
  rationale: Conveys the sense that available space had been exhausted.
- source_word: χωρεῖν
  chosen: there was no longer room
  alternatives:
  - to contain
  - to have space
  lexicon: BDAG
  rationale: Here χωρέω refers to having capacity or space. Rendering the infinitive
    idiomatically as 'there was no longer room' communicates the sense clearly in
    English.
- source_word: μηδὲ τὰ πρὸς τὴν θύραν
  chosen: not even at the door
  alternatives:
  - not even the space by the door
  - not even near the door
  lexicon: BDAG
  rationale: The neuter plural article with πρός + accusative is idiomatic for the
    area/space toward the door. 'Not even at the door' is natural English that captures
    the meaning without over-literal awkwardness.
- source_word: ἐλάλει
  chosen: he was speaking
  alternatives:
  - he spoke
  - he was preaching
  lexicon: BDAG
  rationale: The imperfect indicates ongoing action. 'He was speaking' preserves the
    durative aspect better than simple past. 'Preaching' is possible contextually
    but is more interpretive than λαλέω itself warrants.
- source_word: αὐτοῖς
  chosen: to them
  alternatives:
  - to the crowd
  lexicon: BDAG
  rationale: The pronoun refers to those gathered. 'To them' preserves the Greek without
    specifying beyond the text.
- source_word: τὸν λόγον
  chosen: the word
  alternatives:
  - the message
  - the word of God
  lexicon: BDAG
  rationale: λόγος here likely refers to Jesus' spoken message. 'The word' preserves
    the Greek expression and avoids importing 'of God,' which is not explicit in this
    verse. 'The message' is a viable dynamic alternative but less textually transparent.
