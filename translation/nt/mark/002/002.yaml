theological_decisions:
- issue: Meaning of τὸν λόγον in Jesus' speech
  chosen_reading: the word
  alternative_readings:
  - the message
  - the word of God
  rationale: The verse states only that Jesus was speaking 'the word' to them. Rendering
    it this way preserves the text's wording and avoids adding a fuller theological
    specification not explicit here, while still allowing readers to infer that it
    is his proclaimed message.
  doctrine_reference: Translation philosophy §§1, 3, 6
