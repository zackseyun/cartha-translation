id: MRK.2.13
reference: Mark 2:13
source:
  edition: SBLGNT
  text: Καὶ ἐξῆλθεν πάλιν παρὰ τὴν θάλασσαν· καὶ πᾶς ὁ ὄχλος ἤρχετο πρὸς αὐτόν, καὶ
    ἐδίδασκεν αὐτούς.
translation:
  text: And he went out again beside the sea, and the whole crowd was coming to him,
    and he was teaching them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'by the sea.'
    reason: lexical_alternative
  - marker: b
    text: Or 'all the crowd.'
    reason: lexical_alternative
  - marker: c
    text: The verbs 'was coming' and 'was teaching' translate Greek imperfects, which
      can suggest ongoing action in past time.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξῆλθεν
  chosen: went out
  alternatives:
  - went forth
  - went out from there
  lexicon: BDAG
  rationale: Aorist of ἐξέρχομαι is naturally rendered 'went out.' 'Went forth' is
    archaic, and 'went out from there' adds location not explicit in the Greek.
- source_word: πάλιν
  chosen: again
  alternatives:
  - once more
  lexicon: BDAG
  rationale: πάλιν straightforwardly marks repetition. 'Again' is the most natural
    modern English equivalent.
- source_word: παρὰ τὴν θάλασσαν
  chosen: beside the sea
  alternatives:
  - by the sea
  - along the sea
  lexicon: BDAG
  rationale: παρά with the accusative here indicates movement or location alongside
    the shoreline. 'Beside the sea' preserves the spatial sense clearly; 'by the sea'
    is possible but slightly less specific.
- source_word: πᾶς ὁ ὄχλος
  chosen: the whole crowd
  alternatives:
  - all the crowd
  - the entire crowd
  lexicon: BDAG
  rationale: The idiom πᾶς ὁ + singular collective noun is best rendered idiomatically
    as 'the whole crowd.' 'All the crowd' is more literal but less natural in English.
- source_word: ἤρχετο
  chosen: was coming
  alternatives:
  - came
  - kept coming
  lexicon: BDAG
  rationale: The imperfect middle/passive form conveys ongoing or repeated action
    in past time. 'Was coming' preserves the progressive aspect without overinterpreting;
    'kept coming' is possible but slightly more interpretive.
- source_word: πρὸς αὐτόν
  chosen: to him
  alternatives:
  - toward him
  lexicon: BDAG
  rationale: πρός with the accusative commonly indicates movement toward a person.
    'To him' is idiomatic and sufficient in context.
- source_word: ἐδίδασκεν
  chosen: he was teaching
  alternatives:
  - he taught
  - he kept teaching
  lexicon: BDAG
  rationale: The imperfect indicates ongoing activity. 'He was teaching' preserves
    the aspect better than the simple past 'he taught,' while remaining natural English.
- source_word: αὐτούς
  chosen: them
  lexicon: BDAG
  rationale: Direct object pronoun referring back to the crowd; 'them' is the straightforward
    English equivalent.
