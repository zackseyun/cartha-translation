theological_decisions:
- issue: Metaphorical identification of Jesus as the bridegroom
  chosen_reading: Retain 'the bridegroom' as a metaphor without making the identification
    explicit in the translation.
  alternative_readings:
  - Paraphrase as 'when I am taken away from them'
  rationale: The context makes clear that Jesus speaks of himself, but the Greek text
    uses the metaphor rather than an explicit self-identification. Preserving the
    metaphor maintains the literary and theological force without importing explanatory
    material into the main text.
  doctrine_reference: Translation philosophy §1, §3
- issue: Nature of the bridegroom's removal
  chosen_reading: Use the passive 'is taken away' without specifying by whom or explicitly
    naming the crucifixion.
  alternative_readings:
  - '''is taken away in death'''
  - '''is taken away from them by force'''
  rationale: The verse anticipates Jesus' removal, commonly understood as pointing
    toward his death, but the text itself leaves the agent unstated and does not explicitly
    define the manner here. The translation preserves that tension rather than resolving
    it.
  doctrine_reference: Translation philosophy §3
