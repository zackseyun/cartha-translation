id: MRK.2.20
reference: Mark 2:20
source:
  edition: SBLGNT
  text: ἐλεύσονται δὲ ἡμέραι ὅταν ἀπαρθῇ ἀπ’ αὐτῶν ὁ νυμφίος, καὶ τότε νηστεύσουσιν
    ἐν ⸂ἐκείνῃ τῇ ἡμέρᾳ⸃.
translation:
  text: But days will come when the bridegroom is taken away from them, and then they
    will fast in that day.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''on that day.'' The Greek phrase is singular: ''in/on that day,'' not
      ''in those days.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐλεύσονται δὲ ἡμέραι
  chosen: But days will come
  alternatives:
  - But the days will come
  - Yet days are coming
  lexicon: BDAG
  rationale: A natural English rendering of the idiom 'days will come.' δέ is represented
    by 'But' to mark contrast with the present situation in the previous verse. The
    anarthrous ἡμέραι does not require 'the days' in English, though that is possible.
- source_word: ὅταν
  chosen: when
  alternatives:
  - whenever
  lexicon: BDAG
  rationale: With the aorist subjunctive ἀπαρθῇ, ὅταν introduces a future contingency
    best rendered 'when' in this context rather than the more iterative 'whenever.'
- source_word: ἀπαρθῇ
  chosen: is taken away
  alternatives:
  - is removed
  - is taken from them
  lexicon: BDAG
  rationale: The passive of ἀπαίρω conveys forcible removal. 'Is taken away' preserves
    the passive and the solemn sense without over-interpreting the agent. It also
    echoes the abrupt loss implied in the metaphor.
- source_word: ἀπ’ αὐτῶν
  chosen: from them
  alternatives:
  - away from them
  lexicon: BDAG
  rationale: This phrase marks separation from the bridegroom's companions/disciples.
    'From them' is concise and idiomatic, with the separation already carried by 'taken
    away.'
- source_word: ὁ νυμφίος
  chosen: the bridegroom
  alternatives:
  - the groom
  lexicon: BDAG
  rationale: '''Bridegroom'' is the standard and more precise rendering for νυμφίος,
    preserving the wedding metaphor and its biblical resonance.'
- source_word: καὶ τότε
  chosen: and then
  alternatives:
  - then
  - and at that time
  lexicon: BDAG
  rationale: 'This keeps the sequence explicit: after the bridegroom''s removal, fasting
    follows.'
- source_word: νηστεύσουσιν
  chosen: they will fast
  alternatives:
  - they will go without food
  lexicon: BDAG
  rationale: The straightforward future of νηστεύω is best rendered with the established
    religious term 'fast,' which is clear in modern English and preserves the practice's
    theological significance.
- source_word: ἐν ἐκείνῃ τῇ ἡμέρᾳ
  chosen: in that day
  alternatives:
  - on that day
  - in those days
  lexicon: BDAG
  rationale: The Greek is singular and should remain singular. 'In that day' is a
    close rendering of ἐν + dative and preserves the marked specificity of the phrase.
    'On that day' is also idiomatic English, but 'in that day' more transparently
    reflects the Greek wording.
