theological_decisions:
- issue: Nature of the saying's final elliptical clause
  chosen_reading: Rendered as a general principle ('new wine is for fresh wineskins')
    rather than an explicit command.
  alternative_readings:
  - But new wine must be put into fresh wineskins
  - But one puts new wine into fresh wineskins
  rationale: The Greek omits the verb in the final clause. Supplying a simple principle
    best reflects the concise proverbial style and avoids importing an imperative
    force not explicitly present.
