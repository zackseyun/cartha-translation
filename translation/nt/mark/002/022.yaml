id: MRK.2.22
reference: Mark 2:22
source:
  edition: SBLGNT
  text: καὶ οὐδεὶς βάλλει οἶνον νέον εἰς ἀσκοὺς παλαιούς· εἰ δὲ μή, ⸂ῥήξει ὁ οἶνος⸃
    τοὺς ἀσκούς, καὶ ὁ οἶνος ⸂ἀπόλλυται καὶ οἱ ἀσκοί⸃. ἀλλὰ οἶνον νέον εἰς ἀσκοὺς
    ⸀καινούς.
translation:
  text: And no one puts new wine into old wineskins. Otherwise, the wine will burst
    the wineskins, and the wine is ruined, and the wineskins too. But new wine is
    for fresh wineskins.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the wine is lost.'
    reason: lexical_alternative
  - marker: b
    text: Greek 'new wineskins'; rendered 'fresh wineskins' to reflect the qualitative
      nuance of καινούς in contrast to 'old' (παλαιούς).
    reason: lexical_alternative
lexical_decisions:
- source_word: βάλλει
  chosen: puts
  alternatives:
  - throws
  - pours
  lexicon: BDAG
  rationale: In this context of placing wine into skins, 'puts' is idiomatic modern
    English and broad enough to cover the act without the awkwardness of 'throws.'
    'Pours' is possible by sense, but the Greek verb is more general than a liquid-specific
    verb.
- source_word: οἶνον νέον
  chosen: new wine
  lexicon: BDAG
  rationale: Standard rendering preserving the adjective-noun pairing. 'New' here
    refers to recently made wine, fitting the image of fermenting wine.
- source_word: ἀσκοὺς
  chosen: wineskins
  alternatives:
  - skins
  - wine bags
  lexicon: BDAG
  rationale: The referent is animal-skin containers used for wine. 'Wineskins' is
    the clearest natural English equivalent and preserves the cultural image better
    than the bare 'skins.'
- source_word: παλαιούς
  chosen: old
  alternatives:
  - worn-out
  lexicon: BDAG
  rationale: '''Old'' directly matches the adjective and preserves the contrast with
    the final adjective καινούς. ''Worn-out'' interprets the implication rather than
    translating the term itself.'
- source_word: ῥήξει
  chosen: will burst
  alternatives:
  - will tear open
  - will break
  lexicon: BDAG
  rationale: The future verb describes the result of pressure on the skins. 'Will
    burst' is the most natural English expression for wineskins under fermentation
    pressure.
- source_word: ἀπόλλυται
  chosen: is ruined
  alternatives:
  - is lost
  - perishes
  lexicon: BDAG
  rationale: '''Is ruined'' best fits the context of spoiled or wasted wine in contemporary
    English. ''Is lost'' is also possible and more literal, but ''ruined'' communicates
    the practical result more clearly for modern readers.'
- source_word: καινούς
  chosen: fresh
  alternatives:
  - new
  lexicon: BDAG
  rationale: Greek distinguishes παλαιός ('old') from καινός ('new/fresh in quality').
    Rendering καινούς as 'fresh' preserves the qualitative nuance and avoids a flat
    repetition of 'new' that would obscure the contrast in Greek.
- source_word: ἀλλὰ οἶνον νέον εἰς ἀσκοὺς καινούς
  chosen: But new wine is for fresh wineskins
  alternatives:
  - But one puts new wine into fresh wineskins
  - But new wine must be put into fresh wineskins
  lexicon: BDAG
  rationale: The Greek final clause is elliptical, lacking an explicit verb. English
    requires completion. 'Is for' preserves the aphoristic force without adding the
    stronger modal sense of 'must be put' or repeating the earlier verb too mechanically.
