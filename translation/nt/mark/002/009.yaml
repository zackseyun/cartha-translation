theological_decisions:
- issue: Rendering of forgiveness declaration
  chosen_reading: Your sins are forgiven
  alternative_readings:
  - Your sins have been forgiven
  rationale: The verse presents Jesus contrasting two spoken declarations/commands.
    The chosen rendering preserves the passive declaration without importing a more
    developed theological explanation of agency or timing. It maintains the tension
    of the narrative, where Jesus' authority to forgive sins is being tested by visible
    healing.
  doctrine_reference: Preserve theological tension rather than resolve it.
