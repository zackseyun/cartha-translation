id: MRK.2.9
reference: Mark 2:9
source:
  edition: SBLGNT
  text: τί ἐστιν εὐκοπώτερον, εἰπεῖν τῷ παραλυτικῷ· ⸀Ἀφίενταί σου αἱ ἁμαρτίαι, ἢ εἰπεῖν·
    ⸀Ἔγειρε καὶ ἆρον ⸂τὸν κράβαττόν σου⸃ καὶ περιπάτει;
translation:
  text: 'Which is easier: to say to the paralyzed man, ‘Your sins are forgiven,’ or
    to say, ‘Get up, pick up your mat, and walk’?”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Your sins have been forgiven.' The Greek verb can be understood as
      emphasizing the resulting state of forgiveness.
    reason: lexical_alternative
lexical_decisions:
- source_word: τί ἐστιν εὐκοπώτερον
  chosen: Which is easier
  alternatives:
  - What is easier
  - Which is easier to do
  lexicon: BDAG
  rationale: The neuter comparative εὐκοπώτερον with τί forms a natural question of
    relative ease. 'Which is easier' is idiomatic modern English and preserves the
    comparative force without adding explanatory material.
- source_word: εἰπεῖν
  chosen: to say
  alternatives:
  - to tell
  lexicon: BDAG
  rationale: λέγω here introduces direct speech in both clauses. 'To say' is the most
    direct and consistent rendering.
- source_word: τῷ παραλυτικῷ
  chosen: to the paralyzed man
  alternatives:
  - to the paralytic
  - to the paralyzed one
  lexicon: BDAG
  rationale: παραλυτικός denotes a person afflicted with paralysis. 'Paralyzed man'
    is clear, natural English and avoids overly technical or potentially stigmatizing
    nominal usage while preserving the referent.
- source_word: Ἀφίενταί σου αἱ ἁμαρτίαι
  chosen: Your sins are forgiven
  alternatives:
  - Your sins have been forgiven
  - Your sins are being forgiven
  lexicon: BDAG
  rationale: 'The present passive/middle form ἀφίενταί is well rendered as a present-state
    passive in English: ''are forgiven.'' This preserves the declarative force of
    Jesus'' statement without over-specifying aspect. ''Have been forgiven'' is possible
    but slightly shifts the focus to prior completed action.'
- source_word: ἁμαρτίαι
  chosen: sins
  alternatives:
  - sin-debts
  - offenses
  lexicon: BDAG
  rationale: Standard and contextually appropriate rendering for ἁμαρτίαι. No special
    metaphor in this context requires expansion.
- source_word: Ἔγειρε
  chosen: Get up
  alternatives:
  - Rise
  - Stand up
  lexicon: BDAG
  rationale: The imperative calls for the man to arise. 'Get up' is natural modern
    English and fits the translation philosophy better than the more traditional but
    less contemporary 'Rise.'
- source_word: ἆρον
  chosen: pick up
  alternatives:
  - take up
  - carry
  lexicon: BDAG
  rationale: αἴρω here means to lift and carry away the object. 'Pick up' is idiomatic
    and concrete in contemporary English. 'Take up' is traditional and viable, but
    'pick up' is clearer for modern readers.
- source_word: τὸν κράβαττόν σου
  chosen: your mat
  alternatives:
  - your pallet
  - your bed
  - your stretcher
  lexicon: BDAG
  rationale: κράβαττος refers to a simple sleeping pad or mat. 'Mat' best conveys
    a lightweight portable bed in accessible English. 'Bed' can sound too substantial
    in modern usage; 'pallet' is dated; 'stretcher' is too medicalized.
- source_word: περιπάτει
  chosen: walk
  alternatives:
  - be walking
  - walk around
  lexicon: BDAG
  rationale: The present imperative is naturally rendered 'walk' in English as part
    of a sequence of commands. More durative renderings would sound unnatural here.
