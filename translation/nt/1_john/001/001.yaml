id: 1JN.1.1
reference: 1 John 1:1
source:
  edition: SBLGNT
  text: Ὃ ἦν ἀπ’ ἀρχῆς, ὃ ἀκηκόαμεν, ὃ ἑωράκαμεν τοῖς ὀφθαλμοῖς ἡμῶν, ὃ ἐθεασάμεθα
    καὶ αἱ χεῖρες ἡμῶν ἐψηλάφησαν, περὶ τοῦ λόγου τῆς ζωῆς—
translation:
  text: What was from the beginning, what we have heard, what we have seen with our
    eyes, what we looked upon and our hands touched, concerning the word of life—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'That which was from the beginning.' The Greek uses a neuter relative
      pronoun, which may point broadly to the apostolic witness concerning the Son
      rather than naming him directly as 'he.'
    reason: alternative_reading
  - marker: b
    text: Or 'the Word of life.' The phrase may refer personally to the Son, in deliberate
      resonance with John 1:1, or to the life-giving message concerning him.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ὃ / ὃ
  chosen: What
  alternatives:
  - That which
  - He who
  lexicon: BDAG
  rationale: The repeated neuter relative pronoun points to the totality of what is
    being testified to, not merely a masculine personal referent. 'What' is the most
    natural English rendering while preserving the neuter breadth. 'That which' is
    more formal but less readable; 'He who' would over-specify the referent in the
    main text, though the context is christological.
- source_word: ἦν ἀπ’ ἀρχῆς
  chosen: was from the beginning
  alternatives:
  - has been from the beginning
  - was from the first
  lexicon: BDAG
  rationale: Imperfect ἦν with ἀπ’ ἀρχῆς is best rendered straightforwardly as 'was
    from the beginning,' echoing Johannine idiom and preserving the temporal depth
    without importing additional aspectual nuance.
- source_word: ἀκηκόαμεν
  chosen: we have heard
  alternatives:
  - we heard
  lexicon: BDAG
  rationale: The perfect tense naturally supports 'have heard,' emphasizing abiding
    witness from a past encounter.
- source_word: ἑωράκαμεν τοῖς ὀφθαλμοῖς ἡμῶν
  chosen: we have seen with our eyes
  alternatives:
  - we saw with our eyes
  lexicon: BDAG
  rationale: The perfect ἑωράκαμεν is rendered 'have seen' to preserve the continuing
    force of eyewitness testimony. The explicit phrase 'with our eyes' is retained
    for emphasis and concreteness.
- source_word: ἐθεασάμεθα
  chosen: we looked upon
  alternatives:
  - we gazed at
  - we beheld
  lexicon: BDAG
  rationale: 'θεάομαι suggests more than a mere glance: attentive seeing or beholding.
    ''Looked upon'' is readable modern English that preserves deliberateness better
    than simple ''saw.'' ''Beheld'' is traditional but somewhat archaic.'
- source_word: αἱ χεῖρες ἡμῶν ἐψηλάφησαν
  chosen: our hands touched
  alternatives:
  - our hands handled
  - our hands felt
  lexicon: BDAG
  rationale: ψηλαφάω can mean touch, feel, or handle. 'Touched' is the clearest modern
    rendering and preserves the physicality of the witness claim. 'Handled' is possible
    but can sound more active or prolonged than the Greek requires.
- source_word: περὶ
  chosen: concerning
  alternatives:
  - about
  - with regard to
  lexicon: BDAG
  rationale: περὶ here introduces the topic of apostolic testimony. 'Concerning' is
    slightly more formal than 'about' and fits the elevated style of the prologue.
- source_word: τοῦ λόγου τῆς ζωῆς
  chosen: the word of life
  alternatives:
  - the message of life
  - the Word of life
  lexicon: BDAG
  rationale: λόγος can mean 'word,' 'message,' or 'account.' Here the phrase likely
    carries deliberate resonance with Johannine theology while still allowing proclamation
    as a nuance. Lowercase 'word' avoids importing a capitalization decision not marked
    in the Greek text, while preserving the phrase's ambiguity and theological richness.
