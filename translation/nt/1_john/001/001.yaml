theological_decisions:
- issue: Referent of the neuter relative clauses and λόγος
  chosen_reading: Render the opening with neuter 'What' and 'the word of life' without
    capitalizing 'Word' in the main text.
  alternative_readings:
  - Render personally as 'He who was from the beginning'
  - Capitalize as 'the Word of life' to make the christological identification explicit
  rationale: The verse clearly participates in Johannine christological witness, yet
    the Greek uses neuter relative pronouns and does not itself mark capitalization.
    The translation preserves the textual form and theological tension rather than
    resolving it too explicitly. This allows both the personal referent (the Son/Messiah)
    and the proclaimed message embodied in him to remain in view.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
