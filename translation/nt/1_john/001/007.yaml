id: 1JN.1.7
reference: 1 John 1:7
source:
  edition: SBLGNT
  text: ἐὰν δὲ ἐν τῷ φωτὶ περιπατῶμεν ὡς αὐτός ἐστιν ἐν τῷ φωτί, κοινωνίαν ἔχομεν
    μετ’ ἀλλήλων καὶ τὸ αἷμα ⸀Ἰησοῦ τοῦ υἱοῦ αὐτοῦ καθαρίζει ἡμᾶς ἀπὸ πάσης ἁμαρτίας.
translation:
  text: But if we walk in the light, as he himself is in the light, we have fellowship
    with one another, and the blood of Jesus his Son cleanses us from every sin.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with each other.' Some interpreters take 'with one another' to mean
      fellowship between believers and God, but the reciprocal Greek most naturally
      refers to mutual fellowship among believers.
    reason: alternative_reading
  - marker: b
    text: Or 'from all sin.' The Greek can be understood distributively ('every sin')
      or collectively ('all sin').
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐὰν δὲ
  chosen: But if
  alternatives:
  - And if
  - Now if
  lexicon: BDAG
  rationale: δέ marks contrast with the previous verse's claim about walking in darkness;
    'But if' preserves the adversative force naturally in English.
- source_word: ἐν τῷ φωτὶ
  chosen: in the light
  alternatives:
  - in light
  lexicon: BDAG
  rationale: The article is retained idiomatically. 'Light' is both metaphorical and
    thematically loaded in the immediate context, so the familiar phrase best preserves
    Johannine imagery without overexplaining it.
- source_word: περιπατῶμεν
  chosen: we walk
  alternatives:
  - we live
  - we conduct our lives
  lexicon: BDAG
  rationale: Johannine ethical metaphor is preserved with 'walk' rather than interpreted
    as 'live.' This keeps the source metaphor and its ongoing aspect.
- source_word: ὡς αὐτός ἐστιν ἐν τῷ φωτί
  chosen: as he himself is in the light
  alternatives:
  - just as he is in the light
  - as he is in the light
  lexicon: BDAG
  rationale: αὐτός is given slight emphasis with 'himself' to reflect the explicit
    pronoun. 'As' preserves comparison without forcing exact equivalence beyond the
    Greek.
- source_word: κοινωνίαν ἔχομεν
  chosen: we have fellowship
  alternatives:
  - we have communion
  - we share fellowship
  lexicon: BDAG
  rationale: '''Fellowship'' is the most natural and contextually established rendering
    for κοινωνία in 1 John, conveying shared participation and relational communion
    without importing specifically sacramental overtones.'
- source_word: μετ’ ἀλλήλων
  chosen: with one another
  alternatives:
  - with each other
  lexicon: BDAG
  rationale: Standard reciprocal rendering. It preserves the mutuality of the Greek
    and reads naturally in English.
- source_word: τὸ αἷμα Ἰησοῦ
  chosen: the blood of Jesus
  alternatives:
  - Jesus' blood
  lexicon: BDAG
  rationale: A more formal phrasing preserves the theological weight and foregrounds
    'blood' as the subject of the clause.
- source_word: τοῦ υἱοῦ αὐτοῦ
  chosen: his Son
  alternatives:
  - the Son of him
  lexicon: BDAG
  rationale: Natural English genitive rendering. Capitalized 'Son' is appropriate
    because the referent is clearly Jesus in relation to God, and it reflects established
    christological usage without adding content.
- source_word: καθαρίζει
  chosen: cleanses
  alternatives:
  - purifies
  - is cleansing
  lexicon: BDAG
  rationale: '''Cleanses'' best captures both moral and cultic dimensions of καθαρίζω
    in this context. Present tense is rendered as a simple English present, which
    can naturally convey ongoing action in context.'
- source_word: ἀπὸ πάσης ἁμαρτίας
  chosen: from every sin
  alternatives:
  - from all sin
  lexicon: BDAG
  rationale: πάσης with singular ἁμαρτίας can be rendered either distributively ('every
    sin') or collectively ('all sin'). 'Every sin' preserves the distributive force
    more transparently, while still fitting idiomatic English.
