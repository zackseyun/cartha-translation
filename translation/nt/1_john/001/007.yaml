theological_decisions:
- issue: Referent of 'with one another' (μετ’ ἀλλήλων)
  chosen_reading: mutual fellowship among believers
  alternative_readings:
  - fellowship between believers and God
  rationale: 'The reciprocal expression ἀλλήλων most naturally denotes mutual human
    fellowship. The verse then adds a second result: Jesus'' blood cleanses ''us.''
    This preserves the text''s sequence without collapsing fellowship with God and
    fellowship among believers into one phrase. The broader context certainly includes
    fellowship with God (v. 3), but this clause is best left with its plain reciprocal
    sense.'
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Force of the present tense καθαρίζει
  chosen_reading: ongoing cleansing expressed by English simple present
  alternative_readings:
  - punctiliar cleansing
  - explicitly progressive 'keeps cleansing'
  rationale: The Greek present indicative naturally suggests ongoing or characteristic
    action here, but English simple present can convey this without overinterpreting.
    'Cleanses' preserves the aspectual force better than a one-time past sense, while
    avoiding an overly interpretive expansion such as 'keeps on cleansing' in the
    main text.
  doctrine_reference: 'Translation philosophy: optimal equivalence; do not paraphrase
    beyond what the source warrants.'
