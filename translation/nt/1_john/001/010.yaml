id: 1JN.1.10
reference: 1 John 1:10
source:
  edition: SBLGNT
  text: ἐὰν εἴπωμεν ὅτι οὐχ ἡμαρτήκαμεν, ψεύστην ποιοῦμεν αὐτὸν καὶ ὁ λόγος αὐτοῦ
    οὐκ ἔστιν ἐν ἡμῖν.
translation:
  text: If we say that we have not sinned, we make him a liar, and his word is not
    in us.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'we did not sin.' The Greek uses a perfect verb, which is naturally rendered
      'we have not sinned' to express a past action with present significance.
    reason: lexical_alternative
  - marker: b
    text: '''His word'' could also be rendered ''his message.'' The Greek λόγος can
      carry either sense; ''word'' is retained to preserve Johannine wording.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐὰν εἴπωμεν
  chosen: If we say
  alternatives:
  - If we claim
  - If we should say
  lexicon: BDAG
  rationale: The construction ἐὰν with the aorist subjunctive introduces a third-class
    conditional clause. 'If we say' is natural English and preserves the conditional
    force without adding interpretive nuance such as 'claim,' though that is a viable
    contextual alternative.
- source_word: ὅτι
  chosen: that
  lexicon: BDAG
  rationale: Standard content conjunction introducing the statement being asserted.
- source_word: οὐχ ἡμαρτήκαμεν
  chosen: we have not sinned
  alternatives:
  - we did not sin
  - we have never sinned
  lexicon: BDAG
  rationale: The perfect ἡμαρτήκαμεν naturally conveys a completed action with present
    relevance, best represented by the English present perfect 'have not sinned.'
    'Did not sin' is too simple-past, and 'have never sinned' overstates the scope
    beyond what the Greek explicitly says, even if context points toward denial of
    sinfulness.
- source_word: ψεύστην
  chosen: a liar
  alternatives:
  - 'false'
  - deceptive
  lexicon: BDAG
  rationale: ψεύστης is a noun meaning 'liar.' The direct and personal force should
    be preserved rather than softened into an adjective.
- source_word: ποιοῦμεν αὐτὸν
  chosen: we make him
  alternatives:
  - we show him to be
  - we treat him as
  lexicon: BDAG
  rationale: ποιέω with a predicate accusative here means 'make' in the sense of rendering
    or declaring someone to be something. 'Make him' is the most straightforward and
    idiomatic rendering in this context.
- source_word: ὁ λόγος αὐτοῦ
  chosen: his word
  alternatives:
  - his message
  lexicon: BDAG
  rationale: λόγος can mean 'word,' 'message,' or 'teaching.' 'His word' preserves
    Johannine diction and possible resonance with both God's spoken truth and the
    proclaimed message, while remaining natural English.
- source_word: οὐκ ἔστιν ἐν ἡμῖν
  chosen: is not in us
  alternatives:
  - is not among us
  - does not dwell in us
  lexicon: BDAG
  rationale: The phrase is rendered literally to preserve the inward, relational sense
    common in Johannine usage. 'Does not dwell in us' is interpretive and adds imagery
    not explicit in the Greek.
