theological_decisions:
- issue: Referent of αὐτόν / αὐτοῦ
  chosen_reading: 'God is the referent: ''we make him a liar, and his word is not
    in us.'''
  alternative_readings:
  - An unspecified divine referent carried from context
  rationale: In the immediate context (1 John 1:5-10), the one whose testimony is
    contradicted is God, especially in light of v. 5 ('the message we have heard from
    him') and v. 9 ('he is faithful and righteous'). The translation keeps the pronoun
    rather than replacing it with 'God' in the main text, preserving the Greek while
    allowing the contextual referent to stand.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
