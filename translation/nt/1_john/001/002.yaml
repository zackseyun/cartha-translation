theological_decisions:
- issue: Whether to render the repeated 'life' in an impersonal or personalizing way
  chosen_reading: Kept 'the life' / 'the eternal life' as the main text, allowing
    the personal referent to emerge from context rather than substituting 'he' or
    directly naming the Son.
  alternative_readings:
  - and he was revealed...
  - the life, that is, the eternal life
  rationale: The verse speaks of the Son under the designation 'life,' but the Greek
    itself uses the noun ζωὴ and not an explicit masculine personal pronoun or name.
    Preserving the nominal expression maintains Johannine theological richness without
    importing explanatory wording into the text.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: How explicitly to reflect preexistence in πρὸς τὸν πατέρα
  chosen_reading: was with the Father
  alternative_readings:
  - was in the presence of the Father
  rationale: This rendering preserves the verse's affirmation of personal relation
    with the Father and coheres with historic orthodox Christology, while remaining
    a direct translation of the Greek rather than an expanded doctrinal paraphrase.
  doctrine_reference: 'Affirmations: Nicene Creed; Translation philosophy: original-language
    primacy over translation tradition.'
