id: 1JN.1.2
reference: 1 John 1:2
source:
  edition: SBLGNT
  text: καὶ ἡ ζωὴ ἐφανερώθη, καὶ ἑωράκαμεν καὶ μαρτυροῦμεν καὶ ἀπαγγέλλομεν ὑμῖν τὴν
    ζωὴν τὴν αἰώνιον ἥτις ἦν πρὸς τὸν πατέρα καὶ ἐφανερώθη ἡμῖν—
translation:
  text: and the life was revealed, and we have seen and testify and proclaim to you
    the eternal life, which was with the Father and was revealed to us—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'appeared' / 'was made manifest' for 'was revealed' (ἐφανερώθη).
    reason: lexical_alternative
  - marker: b
    text: The phrase 'the eternal life' is grammatically expressed as a thing, but
      in context refers personally to the Son, the one who was with the Father and
      was revealed to the apostles.
    reason: cross_reference
lexical_decisions:
- source_word: ἡ ζωὴ / τὴν ζωὴν
  chosen: the life
  alternatives:
  - life
  lexicon: BDAG
  rationale: Retained the article as 'the life' because in context John refers not
    merely to life in the abstract but to a definite, personal reality tied to the
    Son and then appositionally identified as 'the eternal life.' This preserves the
    theological and literary force of the repeated noun.
- source_word: ἐφανερώθη
  chosen: was revealed
  alternatives:
  - appeared
  - was made manifest
  - was manifested
  lexicon: BDAG
  rationale: Used passive 'was revealed' to reflect the aorist passive form and to
    keep accessible modern English. 'Appeared' is possible but can sound less weighty
    and less connected to disclosure of what was previously hidden.
- source_word: ἑωράκαμεν
  chosen: we have seen
  alternatives:
  - we saw
  lexicon: BDAG
  rationale: Rendered the perfect as 'we have seen' to preserve the sense of completed
    eyewitness experience with continuing significance, important in Johannine testimony
    language.
- source_word: μαρτυροῦμεν
  chosen: testify
  alternatives:
  - bear witness
  - witness
  lexicon: BDAG
  rationale: '''Testify'' is concise, natural English and preserves the forensic/witness
    sense. ''Bear witness'' is more traditional but slightly less natural in contemporary
    prose.'
- source_word: ἀπαγγέλλομεν
  chosen: proclaim
  alternatives:
  - announce
  - report
  - declare
  lexicon: BDAG
  rationale: Chose 'proclaim' to distinguish it from 'testify' while preserving the
    public declarative sense. 'Announce' is possible but slightly flatter; 'report'
    is too weak for the context.
- source_word: ὑμῖν
  chosen: to you
  lexicon: BDAG
  rationale: Standard dative of indirect object; explicit in English for clarity.
- source_word: τὴν ζωὴν τὴν αἰώνιον
  chosen: the eternal life
  alternatives:
  - eternal life
  lexicon: BDAG
  rationale: Kept both articles with a natural English rendering. 'The eternal life'
    best reflects the definiteness of the Greek and the identification of this life
    as a specific reality/person known in relation to the Father.
- source_word: ἥτις
  chosen: which
  alternatives:
  - who
  - that which
  lexicon: BDAG
  rationale: Rendered as 'which' because the grammatical antecedent is 'the eternal
    life.' Although the referent is personal in context, the Greek expression is framed
    around 'life' rather than directly naming the Son here. This preserves John's
    wording without over-resolving the personification.
- source_word: ἦν πρὸς τὸν πατέρα
  chosen: was with the Father
  alternatives:
  - was toward the Father
  - was in the presence of the Father
  lexicon: BDAG
  rationale: '''Was with the Father'' is the most idiomatic rendering and echoes Johannine
    usage in 1:1. It preserves relational proximity without forcing a more interpretive
    gloss.'
- source_word: τὸν πατέρα
  chosen: the Father
  lexicon: BDAG
  rationale: Capitalized as a divine title in context, referring to God the Father.
- source_word: ἡμῖν
  chosen: to us
  lexicon: BDAG
  rationale: Standard dative; explicit in English and important for the eyewitness
    emphasis.
