theological_decisions:
- issue: Pronoun in the phrase ἡ χαρὰ ἡμῶν
  chosen_reading: our joy
  alternative_readings:
  - your joy
  rationale: The provided Greek text reads ἡμῶν ('our'), which should be translated
    as such. Because 'your joy' is a well-known variant in the manuscript tradition
    and in some translations, it is preserved in a footnote rather than adopted in
    the main text.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it; preserve alternatives in footnotes where ambiguity or contested
    readings are significant.'
