id: 1JN.1.5
reference: 1 John 1:5
source:
  edition: SBLGNT
  text: Καὶ ἔστιν αὕτη ἡ ἀγγελία ἣν ἀκηκόαμεν ἀπ’ αὐτοῦ καὶ ἀναγγέλλομεν ὑμῖν, ὅτι
    ὁ θεὸς φῶς ἐστιν καὶ σκοτία ⸂ἐν αὐτῷ οὐκ ἔστιν⸃ οὐδεμία.
translation:
  text: 'And this is the message that we have heard from him and announce to you:
    that God is light, and there is no darkness at all in him.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "proclaim to you."
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀγγελία
  chosen: message
  alternatives:
  - announcement
  lexicon: BDAG
  rationale: '"Message" is the most natural modern English rendering here and fits
    the content being proclaimed. "Announcement" is possible, but sounds less idiomatic
    in this epistolary context.'
- source_word: ἀκηκόαμεν
  chosen: we have heard
  alternatives:
  - we heard
  lexicon: BDAG
  rationale: The Greek perfect naturally conveys a present state resulting from prior
    hearing; English present perfect preserves that nuance better than simple past.
- source_word: ἀπ’ αὐτοῦ
  chosen: from him
  alternatives:
  - from Jesus
  - from the Son
  lexicon: BDAG
  rationale: The pronoun should remain as in the Greek. Although the antecedent is
    contextually identifiable, supplying a noun would import interpretation into the
    translation.
- source_word: ἀναγγέλλομεν
  chosen: announce
  alternatives:
  - proclaim
  - report
  - declare
  lexicon: BDAG
  rationale: '"Announce" preserves the verbal link with ἀγγελία and communicates public
    transmission of received content. "Proclaim" is also strong, but "announce" better
    reflects the cognate relationship in this sentence.'
- source_word: ὅτι
  chosen: that
  alternatives:
  - namely, that
  lexicon: BDAG
  rationale: Introduces the content of the message straightforwardly. No expansion
    is needed in English.
- source_word: ὁ θεὸς φῶς ἐστιν
  chosen: God is light
  alternatives:
  - God is the light
  lexicon: BDAG
  rationale: The predicate noun is anarthrous; English idiom and the likely qualitative
    sense favor "God is light," expressing God's nature/character rather than identifying
    him as a particular object called "the light."
- source_word: σκοτία
  chosen: darkness
  alternatives:
  - gloom
  lexicon: BDAG
  rationale: '"Darkness" is the standard and contextually appropriate rendering, preserving
    both literal and moral-metaphorical resonance in Johannine usage.'
- source_word: ἐν αὐτῷ
  chosen: in him
  alternatives:
  - within him
  lexicon: BDAG
  rationale: '"In him" is the natural rendering and preserves the relational/metaphorical
    force without overinterpreting.'
- source_word: οὐδεμία
  chosen: at all
  alternatives:
  - none whatsoever
  - not any
  lexicon: BDAG
  rationale: 'Used adverbially in English to intensify the negation: "there is no
    darkness at all in him." This preserves the emphatic force of οὐδεμία in idiomatic
    modern English.'
