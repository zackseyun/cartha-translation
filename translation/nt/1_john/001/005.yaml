theological_decisions:
- issue: Metaphorical predicate 'God is light'
  chosen_reading: Retained the metaphor directly without explanatory expansion.
  alternative_readings:
  - God is pure light
  - God is holy light
  rationale: The Greek states the metaphor plainly and powerfully. Expanding it to
    "pure" or "holy" would interpret the metaphor rather than translate it, reducing
    the text's theological breadth and literary force.
  doctrine_reference: 'Translation philosophy: Preserve theological tension rather
    than resolve it.'
