id: 1JN.1.8
reference: 1 John 1:8
source:
  edition: SBLGNT
  text: ἐὰν εἴπωμεν ὅτι ἁμαρτίαν οὐκ ἔχομεν, ἑαυτοὺς πλανῶμεν καὶ ἡ ἀλήθεια ⸂οὐκ ἔστιν
    ἐν ἡμῖν⸃.
translation:
  text: If we say that we have no sin, we deceive ourselves, and the truth is not
    in us.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more interpretively, 'sinfulness'; the Greek says literally 'sin.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐὰν
  chosen: If
  alternatives:
  - Whenever
  lexicon: BDAG
  rationale: Introduces a third-class conditional. 'If' is the natural English rendering
    in this context.
- source_word: εἴπωμεν
  chosen: we say
  alternatives:
  - we should say
  - we were to say
  lexicon: BDAG
  rationale: Aorist subjunctive after ἐὰν forms the conditional protasis. Idiomatic
    English uses present 'we say' rather than a more wooden subjunctive expression.
- source_word: ὅτι
  chosen: that
  lexicon: BDAG
  rationale: Introduces the content of what is said.
- source_word: ἁμαρτίαν
  chosen: sin
  alternatives:
  - a sin
  - sinfulness
  lexicon: BDAG
  rationale: Anarthrous singular is best rendered as the mass noun 'sin,' referring
    to the presence of sin rather than a single act. 'A sin' is too individualizing,
    and 'sinfulness' is more interpretive than the Greek requires.
- source_word: οὐκ ἔχομεν
  chosen: we have no
  alternatives:
  - we do not have
  lexicon: BDAG
  rationale: Straightforward negated possession. 'We have no sin' is idiomatic and
    preserves the force of the claim being denied.
- source_word: ἑαυτοὺς
  chosen: ourselves
  lexicon: BDAG
  rationale: Reflexive pronoun referring back to the first person plural subject.
- source_word: πλανῶμεν
  chosen: we deceive
  alternatives:
  - we lead astray
  - we mislead
  lexicon: BDAG
  rationale: In reflexive construction, the sense is self-deception. 'We deceive ourselves'
    is the clearest natural English equivalent.
- source_word: ἡ ἀλήθεια
  chosen: the truth
  alternatives:
  - truth
  lexicon: BDAG
  rationale: The article is retained. In Johannine usage, 'the truth' can denote both
    truthfulness/reality and alignment with God's revealed truth; the standard rendering
    preserves that theological resonance without over-specifying it.
- source_word: οὐκ ἔστιν ἐν ἡμῖν
  chosen: is not in us
  alternatives:
  - is not among us
  - is not within us
  lexicon: BDAG
  rationale: A literal but natural rendering of the existential clause with ἐν. 'In
    us' best preserves the inward, personal dimension of John's statement.
