theological_decisions:
- issue: Meaning of 'sin' in the claim 'we have no sin'
  chosen_reading: Rendered as 'sin' in the singular mass-noun sense, referring to
    the presence of sin in a person rather than merely isolated sinful acts.
  alternative_readings:
  - '''we have committed no sin'' (more fitting 1 John 1:10)'
  - '''sinfulness'''
  rationale: The Greek uses ἁμαρτίαν with ἔχομεν ('have sin'), which differs from
    speaking of committing sins. The translation preserves John's distinction between
    denying indwelling/present sin here and denying past acts of sin in v.10.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
- issue: Johannine sense of 'the truth is not in us'
  chosen_reading: Kept as 'the truth is not in us' without expanding it to 'God's
    truth' or 'truthfulness.'
  alternative_readings:
  - '''truth is not in us'''
  - '''we are not living in the truth'''
  rationale: John's wording may encompass both objective divine truth and subjective
    truthfulness. Expanding the phrase would resolve a theological nuance the Greek
    leaves compact and evocative.
  doctrine_reference: Preserve theological tension rather than resolve it.
