theological_decisions:
- issue: Rendering of Χριστοῦ
  chosen_reading: Messiah
  alternative_readings:
  - Christ
  rationale: The doctrinal guidance prefers translating Χριστός as 'Messiah' where
    title is in view. In this verse, 'Jesus the Messiah' preserves the christological
    meaning rather than defaulting to the traditional name-like 'Jesus Christ.'
  doctrine_reference: 'DOCTRINE.md: Contested terms table; ''Χριστός Christos → Messiah
    (where title; Christ where name-like)'''
- issue: Sense of κοινωνία
  chosen_reading: fellowship
  alternative_readings:
  - communion
  - participation
  - sharing
  rationale: The verse speaks both of believers' shared life with the apostolic witnesses
    and of that shared life being with the Father and the Son. 'Fellowship' preserves
    the relational and participatory tension without narrowing it to either merely
    social association or sacramental communion.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it'
