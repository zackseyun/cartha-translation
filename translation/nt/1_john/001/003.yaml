id: 1JN.1.3
reference: 1 John 1:3
source:
  edition: SBLGNT
  text: ὃ ἑωράκαμεν καὶ ἀκηκόαμεν ἀπαγγέλλομεν ⸀καὶ ὑμῖν, ἵνα καὶ ὑμεῖς κοινωνίαν
    ἔχητε μεθ’ ἡμῶν· καὶ ἡ κοινωνία δὲ ἡ ἡμετέρα μετὰ τοῦ πατρὸς καὶ μετὰ τοῦ υἱοῦ
    αὐτοῦ Ἰησοῦ Χριστοῦ·
translation:
  text: What we have seen and heard we also proclaim to you, so that you too may have
    fellowship with us; and indeed our fellowship is with the Father and with his
    Son, Jesus the Messiah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Jesus Christ.' The Greek title Χριστός can be rendered 'Christ' or translated
      'Messiah'; here it is rendered 'Messiah' to preserve its meaning as a title.
    reason: alternative_reading
  - marker: b
    text: '''Fellowship'' may also be rendered ''communion,'' ''sharing,'' or ''participation,''
      emphasizing shared life and relationship.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὃ
  chosen: What
  alternatives:
  - That which
  - Whatsoever
  lexicon: BDAG
  rationale: Neuter singular relative pronoun referring back to the manifested 'life'
    in the surrounding context; 'What' is natural English and preserves the broad,
    non-personalized reference better than 'who.'
- source_word: ἑωράκαμεν
  chosen: we have seen
  alternatives:
  - we saw
  lexicon: BDAG
  rationale: Perfect tense is best represented by English present perfect, emphasizing
    abiding witness from a past encounter.
- source_word: ἀκηκόαμεν
  chosen: heard
  alternatives:
  - have heard
  lexicon: BDAG
  rationale: Paired with 'have seen'; in English the auxiliary need not be repeated
    after 'have seen and heard.' The sense remains perfective in the combined expression.
- source_word: ἀπαγγέλλομεν
  chosen: we also proclaim
  alternatives:
  - we report
  - we announce
  - we declare
  lexicon: BDAG
  rationale: The verb denotes reporting or announcing what has been witnessed. 'Proclaim'
    fits Johannine testimony language and communicates public declaration without
    excessive archaism. 'Also' reflects καὶ before ὑμῖν.
- source_word: καὶ ὑμῖν
  chosen: to you also
  alternatives:
  - also to you
  - to you
  lexicon: BDAG
  rationale: 'The καὶ is textually present and should be represented. English style
    places ''also'' naturally near the verb: ''we also proclaim to you.'''
- source_word: ἵνα
  chosen: so that
  alternatives:
  - in order that
  - that
  lexicon: BDAG
  rationale: Introduces purpose; 'so that' is clear modern English.
- source_word: κοινωνίαν
  chosen: fellowship
  alternatives:
  - sharing
  - communion
  - participation
  lexicon: BDAG
  rationale: In this relational and theological context, 'fellowship' best captures
    shared participation and communion between believers and with God. 'Communion'
    may sound overly sacramental here; 'sharing' is too weak.
- source_word: ἔχητε μεθ’ ἡμῶν
  chosen: may have fellowship with us
  alternatives:
  - may share with us
  - may participate with us
  lexicon: BDAG
  rationale: The construction expresses entering or possessing shared fellowship with
    the apostolic witnesses/community.
- source_word: καὶ ἡ κοινωνία δὲ ἡ ἡμετέρα
  chosen: and indeed our fellowship
  alternatives:
  - and our fellowship indeed
  - and the fellowship that is ours
  lexicon: BDAG
  rationale: δέ here adds explanatory or mildly contrastive force; 'indeed' brings
    out the emphasis naturally. The possessive adjective is rendered simply as 'our.'
- source_word: πατρὸς
  chosen: the Father
  alternatives:
  - the father
  lexicon: BDAG
  rationale: Definite and clearly titular in Johannine usage, referring to God as
    Father.
- source_word: υἱοῦ αὐτοῦ
  chosen: his Son
  alternatives:
  - the Son of him
  lexicon: BDAG
  rationale: Standard idiomatic English for the genitival possessive; preserves the
    filial relation central to the verse.
- source_word: Ἰησοῦ Χριστοῦ
  chosen: Jesus the Messiah
  alternatives:
  - Jesus Christ
  lexicon: BDAG
  rationale: 'Per doctrine, Χριστός is translated as ''Messiah'' where functioning
    as a title rather than a fixed name-like form. Here the phrase remains appositional
    and titular: ''his Son, Jesus the Messiah.'''
