id: 1JN.1.6
reference: 1 John 1:6
source:
  edition: SBLGNT
  text: ἐὰν εἴπωμεν ὅτι κοινωνίαν ἔχομεν μετ’ αὐτοῦ καὶ ἐν τῷ σκότει περιπατῶμεν,
    ψευδόμεθα καὶ οὐ ποιοῦμεν τὴν ἀλήθειαν·
translation:
  text: If we say that we have fellowship with him and yet walk in the darkness, we
    are lying and are not practicing the truth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in darkness.' The Greek has 'in the darkness,' which may emphasize the
      moral-spiritual realm opposed to God in Johannine usage.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'do not do the truth.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐὰν εἴπωμεν
  chosen: If we say
  alternatives:
  - If we claim
  - If we should say
  lexicon: BDAG
  rationale: Introduces a third-class conditional with aorist subjunctive; 'If we
    say' is natural English and preserves the conditional force without adding interpretive
    weight such as 'claim,' though that is contextually possible.
- source_word: κοινωνίαν ἔχομεν
  chosen: we have fellowship
  alternatives:
  - we share fellowship
  - we are in fellowship
  lexicon: BDAG
  rationale: The idiom literally uses 'have fellowship.' This preserves the relational
    sense of κοινωνία without over-paraphrasing. 'Are in fellowship' is smoother but
    slightly less transparent to the Greek construction.
- source_word: μετ’ αὐτοῦ
  chosen: with him
  lexicon: BDAG
  rationale: Standard rendering of μετά with genitive indicating association. The
    antecedent in context is God, but the pronoun should remain as in the Greek rather
    than be expanded.
- source_word: ἐν τῷ σκότει
  chosen: in the darkness
  alternatives:
  - in darkness
  lexicon: BDAG
  rationale: The article is present in Greek, and in Johannine usage 'the darkness'
    carries moral-spiritual force. Retaining the article preserves that thematic weight.
- source_word: περιπατῶμεν
  chosen: walk
  alternatives:
  - live
  - conduct our lives
  lexicon: BDAG
  rationale: '''Walk'' is the established and still intelligible metaphor for manner
    of life, especially in Johannine and broader biblical usage. More dynamic alternatives
    explain rather than translate the metaphor.'
- source_word: ψευδόμεθα
  chosen: we are lying
  alternatives:
  - we lie
  - we are false
  lexicon: BDAG
  rationale: Present middle indicative conveys ongoing action/state. 'We are lying'
    captures the verbal force in idiomatic English and fits the contrast with present
    'walk.' 'We lie' is also possible but slightly less vivid.
- source_word: οὐ ποιοῦμεν τὴν ἀλήθειαν
  chosen: are not practicing the truth
  alternatives:
  - do not do the truth
  - are not living out the truth
  lexicon: BDAG
  rationale: The Greek is literally 'do not do the truth,' a Johannine idiom. 'Practicing
    the truth' preserves the concrete verbal aspect while remaining natural English.
    'Living out the truth' is interpretive; 'do the truth' is overly wooden in contemporary
    English.
