theological_decisions:
- issue: Moral-spiritual metaphor of darkness
  chosen_reading: Retain 'walk in the darkness' as an ethical-spiritual metaphor rather
    than flattening it to merely immoral behavior.
  alternative_readings:
  - live in sin
  - live in darkness
  rationale: In Johannine theology, darkness is a loaded category involving moral
    evil, falsehood, and alienation from God. The translation preserves the metaphorical
    tension rather than resolving it into one doctrinal paraphrase.
  doctrine_reference: Preserve theological tension rather than resolve it.
