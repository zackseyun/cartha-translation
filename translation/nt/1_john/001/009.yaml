id: 1JN.1.9
reference: 1 John 1:9
source:
  edition: SBLGNT
  text: ἐὰν ὁμολογῶμεν τὰς ἁμαρτίας ἡμῶν, πιστός ἐστιν καὶ δίκαιος ἵνα ἀφῇ ἡμῖν τὰς
    ἁμαρτίας καὶ καθαρίσῃ ἡμᾶς ἀπὸ πάσης ἀδικίας.
translation:
  text: If we confess our sins, he is faithful and righteous to forgive us our sins
    and to cleanse us from all unrighteousness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''just'': ''he is faithful and just to forgive us our sins and to cleanse
      us from all unrighteousness.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐὰν
  chosen: If
  alternatives:
  - Whenever
  lexicon: BDAG
  rationale: Introduces a third-class conditional. 'If' is the most natural English
    rendering and preserves the conditional force without overstating repetition.
- source_word: ὁμολογῶμεν
  chosen: we confess
  alternatives:
  - we acknowledge
  - we admit
  lexicon: BDAG
  rationale: ὁμολογέω here means to acknowledge or confess openly. 'Confess' is the
    established and precise rendering in a sin-context, preserving both verbal acknowledgment
    and moral seriousness.
- source_word: τὰς ἁμαρτίας ἡμῶν
  chosen: our sins
  alternatives:
  - the sins of ours
  lexicon: BDAG
  rationale: Straightforward accusative object with possessive pronoun. 'Our sins'
    is idiomatic and exact.
- source_word: πιστός
  chosen: faithful
  alternatives:
  - trustworthy
  lexicon: BDAG
  rationale: Describes God's reliability in keeping his word and character. 'Faithful'
    is the standard theological and lexical equivalent and pairs naturally with 'righteous.'
- source_word: δίκαιος
  chosen: righteous
  alternatives:
  - just
  lexicon: BDAG
  rationale: δίκαιος can mean 'righteous' or 'just.' Here either is possible, but
    'righteous' preserves the moral character emphasis and avoids narrowing the sense
    to judicial fairness alone. The alternative is worth preserving because many English
    versions use 'just.'
- source_word: ἵνα
  chosen: to
  alternatives:
  - so that
  lexicon: BDAG
  rationale: After adjectives such as 'faithful and righteous,' ἵνα with the subjunctive
    can express contemplated result or purpose. In idiomatic English, 'to forgive
    ... and to cleanse' best conveys the sense without awkwardness. 'So that' is possible
    but less natural here.
- source_word: ἀφῇ
  chosen: forgive
  alternatives:
  - release
  - pardon
  lexicon: BDAG
  rationale: In a sin-context, ἀφίημι regularly means 'forgive.' This is the clearest
    and most idiomatic rendering.
- source_word: ἡμῖν τὰς ἁμαρτίας
  chosen: us our sins
  alternatives:
  - our sins to us
  lexicon: BDAG
  rationale: The dative plus direct object is naturally rendered 'forgive us our sins'
    in English.
- source_word: καθαρίσῃ
  chosen: cleanse
  alternatives:
  - purify
  lexicon: BDAG
  rationale: καθαρίζω can mean 'cleanse' or 'purify.' 'Cleanse' preserves the imagery
    of moral defilement being removed and fits the parallel with forgiveness. 'Purify'
    is a viable alternative but slightly less direct in this context.
- source_word: ἀπὸ πάσης ἀδικίας
  chosen: from all unrighteousness
  alternatives:
  - from all wrongdoing
  - from every injustice
  lexicon: BDAG
  rationale: ἀδικία denotes unrighteousness, wrongdoing, or injustice. 'Unrighteousness'
    best preserves the moral-theological breadth of the term in Johannine usage. 'Wrongdoing'
    is more colloquial but somewhat narrower.
