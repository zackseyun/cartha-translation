theological_decisions:
- issue: Rendering δίκαιος in relation to divine forgiveness
  chosen_reading: righteous
  alternative_readings:
  - just
  rationale: The verse grounds forgiveness and cleansing in God's character. 'Righteous'
    preserves both moral rectitude and covenantal rightness without forcing a narrower
    forensic reading. Because 'just' is also a strong lexical option and common in
    translation tradition, it is preserved in a footnote rather than excluded.
  doctrine_reference: Translation philosophy §3; Contested terms table notes preserving
    theological tension where genuine ambiguity exists.
