id: 1JN.5.19
reference: 1 John 5:19
source:
  edition: SBLGNT
  text: οἴδαμεν ὅτι ἐκ τοῦ θεοῦ ἐσμεν, καὶ ὁ κόσμος ὅλος ἐν τῷ πονηρῷ κεῖται.
translation:
  text: We know that we are from God, and the whole world lies in the power of the
    evil one.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more formally, 'the whole world lies in the evil one.'
    reason: lexical_alternative
  - marker: b
    text: '''The evil one'' may also be understood by some as ''evil,'' but in Johannine
      usage the personal sense is more likely.'
    reason: alternative_reading
lexical_decisions:
- source_word: οἴδαμεν
  chosen: We know
  alternatives:
  - We are aware
  - We understand
  lexicon: BDAG
  rationale: οἶδα commonly expresses settled knowledge or certainty. 'We know' is
    the natural and direct English equivalent and preserves the epistolary assurance
    tone in 1 John.
- source_word: ἐκ τοῦ θεοῦ
  chosen: from God
  alternatives:
  - of God
  - born of God
  lexicon: BDAG
  rationale: ἐκ with θεοῦ here denotes source/origin or belonging. 'From God' is idiomatic
    and preserves the relational/source sense without importing the more specific
    rebirth language 'born of God,' which is not explicitly present in this clause.
- source_word: ὁ κόσμος ὅλος
  chosen: the whole world
  alternatives:
  - the entire world
  - the world as a whole
  lexicon: BDAG
  rationale: κόσμος in Johannine usage often refers to the world-order in rebellion
    against God, and ὅλος intensifies comprehensiveness. 'The whole world' is both
    natural English and faithful to the scope of the Greek.
- source_word: ἐν τῷ πονηρῷ
  chosen: in the power of the evil one
  alternatives:
  - in the evil one
  - under the evil one
  - in the power of evil
  lexicon: BDAG
  rationale: The dative with ἐν plus the substantivized adjective πονηρῷ is most naturally
    personal in Johannine context, referring to the evil one/Satan rather than abstract
    evil. Because English 'lies in the evil one' is opaque, 'lies in the power of
    the evil one' brings out the idiomatic force without over-paraphrasing. The alternative
    more formal rendering is preserved in a footnote.
- source_word: κεῖται
  chosen: lies
  alternatives:
  - is situated
  - rests
  - is under
  lexicon: BDAG
  rationale: κεῖμαι literally means 'lies' or 'is laid,' but in context it conveys
    a state or condition of being under sway. Retaining 'lies' preserves the metaphor
    while the phrase 'in the power of' clarifies the sense in English.
