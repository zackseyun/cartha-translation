theological_decisions:
- issue: Whether τῷ πονηρῷ refers to abstract evil or a personal evil one
  chosen_reading: 'personal: ''the evil one'''
  alternative_readings:
  - 'abstract: ''evil'''
  rationale: In Johannine literature, ὁ πονηρός commonly refers to the evil one personally
    (cf. 1 John 2:13-14; 3:12; 5:18). The article and masculine dative favor a personal
    referent. This avoids flattening the text into mere abstraction while not adding
    claims beyond the Greek.
  doctrine_reference: Preserve theological tension rather than resolve it; document
    ambiguity where present.
