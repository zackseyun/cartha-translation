id: 1JN.5.15
reference: 1 John 5:15
source:
  edition: SBLGNT
  text: καὶ ἐὰν οἴδαμεν ὅτι ἀκούει ἡμῶν ὃ ⸀ἐὰν αἰτώμεθα, οἴδαμεν ὅτι ἔχομεν τὰ αἰτήματα
    ἃ ᾐτήκαμεν ⸀ἀπ’ αὐτοῦ.
translation:
  text: And if we know that he hears us in whatever we ask, we know that we have the
    requests that we have asked from him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'whatever we may ask.' The Greek construction expresses an open-ended
      'whatever' sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀκούει ἡμῶν
  chosen: he hears us
  alternatives:
  - he listens to us
  - he hears from us
  lexicon: BDAG
  rationale: ἀκούω with a genitive pronoun commonly means 'hear' in the sense of hearing
    a person's prayer or appeal. 'Hears us' is idiomatic English and fits the prayer
    context without overinterpreting as 'answers.'
- source_word: ὃ ἐὰν αἰτώμεθα
  chosen: in whatever we ask
  alternatives:
  - whatever we ask
  - whatever we may ask
  lexicon: BDAG
  rationale: 'The relative pronoun with ἐάν forms an indefinite relative clause, expressing
    breadth: ''whatever'' or ''whatever we may ask.'' Adding ''in'' smooths the English
    connection to ''he hears us'' and reflects the sense ''with respect to whatever
    we ask'' without changing meaning.'
- source_word: αἰτώμεθα
  chosen: we ask
  alternatives:
  - we request
  - we petition
  lexicon: BDAG
  rationale: αἰτέω in this context refers to asking in prayer. 'Ask' is the most natural
    and consistent English rendering in Johannine usage; 'request' or 'petition' are
    possible but less direct.
- source_word: ἔχομεν
  chosen: we have
  alternatives:
  - we possess
  - we receive
  lexicon: BDAG
  rationale: The Greek verb is present tense and straightforwardly means 'have.' Rendering
    it as 'receive' would import an interpretive nuance not stated in the text.
- source_word: τὰ αἰτήματα
  chosen: the requests
  alternatives:
  - the things requested
  - the petitions
  lexicon: BDAG
  rationale: αἴτημα denotes what is asked for, hence 'requests.' This keeps the lexical
    connection with αἰτέω ('ask') visible in English.
- source_word: ἃ ᾐτήκαμεν
  chosen: that we have asked
  alternatives:
  - which we asked
  - that we requested
  lexicon: BDAG
  rationale: The perfect form ᾐτήκαμεν can be represented in English by 'have asked,'
    preserving the completed action with present relevance. This also mirrors the
    Greek aspect better than a simple past.
- source_word: ἀπ’ αὐτοῦ
  chosen: from him
  alternatives:
  - of him
  lexicon: BDAG
  rationale: 'ἀπό marks source: the requests are those asked from him. ''From him''
    is clear modern English and preserves the directional nuance of prayer addressed
    to God.'
- source_word: οἴδαμεν
  chosen: we know
  alternatives:
  - we are assured
  - we understand
  lexicon: BDAG
  rationale: οἶδα is a key Johannine verb of knowledge and assurance. 'We know' preserves
    the author's repeated emphasis and avoids paraphrastic expansion.
