theological_decisions:
- issue: Generic force of ἀνθρώπων
  chosen_reading: men
  alternative_readings:
  - people
  - human beings
  rationale: The Greek is grammatically masculine plural and contrasts human testimony
    with divine testimony. Following the project's gender-accurate policy, the main
    text preserves that form rather than neutralizing it, while recognizing the generic
    human reference.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
- issue: Function of the second ὅτι
  chosen_reading: content clause ('that he has testified concerning his Son')
  alternative_readings:
  - causal clause ('because he has testified concerning his Son')
  rationale: 'The clause most naturally explains what God''s testimony is, not an
    additional reason clause. This preserves the verse''s internal logic: God''s testimony
    is greater because it is God''s own testimony, namely, that he has testified concerning
    his Son.'
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 3
