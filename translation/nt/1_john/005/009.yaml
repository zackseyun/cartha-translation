id: 1JN.5.9
reference: 1 John 5:9
source:
  edition: SBLGNT
  text: εἰ τὴν μαρτυρίαν τῶν ἀνθρώπων λαμβάνομεν, ἡ μαρτυρία τοῦ θεοῦ μείζων ἐστίν,
    ὅτι αὕτη ἐστὶν ἡ μαρτυρία τοῦ θεοῦ ⸀ὅτι μεμαρτύρηκεν περὶ τοῦ υἱοῦ αὐτοῦ.
translation:
  text: 'If we receive the testimony of men, the testimony of God is greater, because
    this is the testimony of God: that he has testified concerning his Son.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the testimony of people.' The Greek says 'men' in a generic sense, contrasting
      human testimony with God's testimony.
    reason: lexical_alternative
  - marker: b
    text: Or 'has borne witness concerning his Son.'
    reason: lexical_alternative
  - marker: c
    text: 'The final clause may also be understood causally: ''because he has testified
      concerning his Son.'''
    reason: alternative_reading
lexical_decisions:
- source_word: μαρτυρίαν / μαρτυρία
  chosen: testimony
  alternatives:
  - witness
  lexicon: BDAG
  rationale: Repeated throughout the verse; 'testimony' fits the juridical/evidentiary
    sense in context and reads naturally in English. 'Witness' is possible, but here
    the focus is on the content received rather than the person bearing witness.
- source_word: ἀνθρώπων
  chosen: men
  alternatives:
  - people
  - human beings
  lexicon: BDAG
  rationale: The genitive plural of ἄνθρωπος here refers generically to human testimony
    in contrast with God's testimony. Per the project's gender-accurate policy, 'men'
    preserves the traditional representative sense of the Greek; more inclusive alternatives
    are possible but less formally aligned.
- source_word: λαμβάνομεν
  chosen: receive
  alternatives:
  - accept
  lexicon: BDAG
  rationale: λαμβάνω commonly means 'receive' or 'accept.' 'Receive' preserves the
    verbal link to taking in testimony without over-interpreting whether the emphasis
    is mere reception or full acceptance.
- source_word: μείζων
  chosen: greater
  alternatives:
  - superior
  lexicon: BDAG
  rationale: Comparative adjective indicating that God's testimony surpasses human
    testimony. 'Greater' is the most direct and idiomatic rendering.
- source_word: ὅτι
  chosen: because
  alternatives:
  - for
  - that
  lexicon: BDAG
  rationale: The first ὅτι introduces the reason God's testimony is greater. 'Because'
    makes the causal force explicit in modern English.
- source_word: αὕτη ἐστὶν ἡ μαρτυρία τοῦ θεοῦ
  chosen: this is the testimony of God
  alternatives:
  - this is God's testimony
  lexicon: BDAG
  rationale: Rendered transparently and with repetition preserved, matching the Greek
    emphasis on μαρτυρία. The more compact alternative is possible but slightly reduces
    the rhetorical repetition.
- source_word: ὅτι
  chosen: that
  alternatives:
  - because
  lexicon: BDAG
  rationale: 'The second ὅτι is best taken as introducing the content of the testimony:
    ''that he has testified concerning his Son.'' A causal reading is possible but
    less likely in this construction.'
- source_word: μεμαρτύρηκεν
  chosen: has testified
  alternatives:
  - has borne witness
  lexicon: BDAG
  rationale: Perfect tense indicates completed testimony with abiding relevance. 'Has
    testified' is clear and keeps lexical consistency with μαρτυρία.
- source_word: περὶ τοῦ υἱοῦ αὐτοῦ
  chosen: concerning his Son
  alternatives:
  - about his Son
  lexicon: BDAG
  rationale: περί with genitive here means 'concerning/about.' 'Concerning' is slightly
    more formal and suits the solemn tone.
- source_word: τοῦ υἱοῦ αὐτοῦ
  chosen: his Son
  lexicon: BDAG
  rationale: Straightforward rendering. Capitalizing 'Son' is appropriate in context
    because it refers to Jesus in a divine filial sense, consistent with orthodox
    Christological usage without adding content beyond the text.
