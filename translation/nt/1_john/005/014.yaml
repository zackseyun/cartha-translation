theological_decisions:
- issue: Meaning of divine hearing in prayer
  chosen_reading: Rendered 'he hears us' as God's hearing/attending to prayer, without
    importing the stronger idea that every request is granted.
  alternative_readings:
  - he answers us
  - he grants our requests
  rationale: The verse states that God hears requests made according to his will;
    the following verse develops confidence about receiving. This verse alone should
    not be translated as an unconditional promise of immediate granting.
  doctrine_reference: Preserve theological tension rather than resolve it.
