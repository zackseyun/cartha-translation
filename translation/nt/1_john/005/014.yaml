id: 1JN.5.14
reference: 1 John 5:14
source:
  edition: SBLGNT
  text: καὶ αὕτη ἐστὶν ἡ παρρησία ἣν ἔχομεν πρὸς αὐτόν, ὅτι ἐάν τι αἰτώμεθα κατὰ τὸ
    θέλημα αὐτοῦ ἀκούει ἡμῶν.
translation:
  text: 'And this is the confidence that we have before him: that if we ask anything
    according to his will, he hears us.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'boldness' or 'assurance' for 'confidence.'
    reason: lexical_alternative
lexical_decisions:
- source_word: παρρησία
  chosen: confidence
  alternatives:
  - boldness
  - assurance
  lexicon: BDAG
  rationale: In Johannine usage, παρρησία often conveys confident openness before
    God rather than mere public boldness. 'Confidence' fits the prayer context and
    reads naturally in modern English.
- source_word: πρὸς αὐτόν
  chosen: before him
  alternatives:
  - toward him
  - with him
  lexicon: BDAG
  rationale: πρός with a personal object can indicate relational orientation or presence.
    In this context of prayerful approach to God, 'before him' idiomatically conveys
    access in his presence better than the more wooden 'toward him.'
- source_word: ὅτι
  chosen: that
  alternatives:
  - because
  lexicon: BDAG
  rationale: Here ὅτι introduces the content of the confidence rather than a causal
    clause. 'That' best reflects the explanatory/content sense.
- source_word: ἐάν τι αἰτώμεθα
  chosen: if we ask anything
  alternatives:
  - if we ask something
  - whenever we ask anything
  lexicon: BDAG
  rationale: ἐάν with the present middle subjunctive expresses a general condition.
    'If we ask anything' is idiomatic and preserves the open-ended scope of τι.
- source_word: κατὰ τὸ θέλημα αὐτοῦ
  chosen: according to his will
  alternatives:
  - in keeping with his will
  - according to what he wills
  lexicon: BDAG
  rationale: This is a standard and clear rendering of κατά with the accusative indicating
    conformity or norm. 'Will' preserves the theological weight of θέλημα without
    paraphrase.
- source_word: ἀκούει ἡμῶν
  chosen: he hears us
  alternatives:
  - he listens to us
  - he hears from us
  lexicon: BDAG
  rationale: Although the Greek construction is literally 'he hears of/from us,' idiomatic
    English in a prayer context is 'he hears us.' This preserves the sense of God
    attending to believers' requests without overinterpreting the response as granting
    them.
