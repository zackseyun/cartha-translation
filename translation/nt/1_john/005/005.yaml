id: 1JN.5.5
reference: 1 John 5:5
source:
  edition: SBLGNT
  text: τίς ⸂δέ ἐστιν⸃ ὁ νικῶν τὸν κόσμον εἰ μὴ ὁ πιστεύων ὅτι Ἰησοῦς ἐστιν ὁ υἱὸς
    τοῦ θεοῦ;
translation:
  text: And who is the one who overcomes the world except the one who believes that
    Jesus is the Son of God?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'he who overcomes ... he who believes.' The Greek uses
      masculine singular participles with representative force.
    reason: lexical_alternative
lexical_decisions:
- source_word: τίς
  chosen: who
  alternatives:
  - who is it that
  - who indeed
  lexicon: BDAG
  rationale: Interrogative pronoun introducing a rhetorical question. Simple 'who'
    is natural English and preserves the force of the Greek.
- source_word: δέ
  chosen: And
  alternatives:
  - Now
  - But
  lexicon: BDAG
  rationale: δέ here lightly connects with the previous statement rather than sharply
    contrasting. 'And' preserves continuity in readable English.
- source_word: ὁ νικῶν
  chosen: the one who overcomes
  alternatives:
  - he who overcomes
  - the victor over
  lexicon: BDAG
  rationale: Articular present participle functions substantivally. 'The one who overcomes'
    is gender-accurate and natural, avoiding the more archaic 'he who' while preserving
    the ongoing/characteristic sense.
- source_word: κόσμον
  chosen: the world
  alternatives:
  - the world system
  lexicon: BDAG
  rationale: κόσμος in Johannine usage often refers to the fallen world order opposed
    to God, but the text itself says simply 'the world.' Theologically fuller paraphrases
    such as 'world system' are interpretive and exceed the source.
- source_word: εἰ μὴ
  chosen: except
  alternatives:
  - if not
  - except for
  lexicon: BDAG
  rationale: In this rhetorical construction, εἰ μὴ idiomatically means 'except.'
    This yields clear English while preserving exclusivity.
- source_word: ὁ πιστεύων
  chosen: the one who believes
  alternatives:
  - he who believes
  - the believer
  lexicon: BDAG
  rationale: Another substantival present participle. 'The one who believes' best
    preserves the verbal force of ongoing trust/belief better than the nominal 'the
    believer.'
- source_word: ὅτι
  chosen: that
  alternatives:
  - because
  lexicon: BDAG
  rationale: Here ὅτι introduces the content of belief, not a causal clause. 'That'
    is the straightforward rendering.
- source_word: Ἰησοῦς
  chosen: Jesus
  lexicon: BDAG
  rationale: Standard transliteration of the personal name, in keeping with the translation
    philosophy to transliterate names.
- source_word: ὁ υἱὸς τοῦ θεοῦ
  chosen: the Son of God
  alternatives:
  - God's Son
  lexicon: BDAG
  rationale: This is a christological title. 'The Son of God' preserves the definite
    article and the formal confessional weight of the phrase in Johannine theology.
