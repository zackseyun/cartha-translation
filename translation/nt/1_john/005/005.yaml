theological_decisions:
- issue: Rendering of the substantival masculine participles ὁ νικῶν and ὁ πιστεύων
  chosen_reading: the one who overcomes / the one who believes
  alternative_readings:
  - he who overcomes / he who believes
  - the person who overcomes / the person who believes
  rationale: The Greek forms are grammatically masculine singular but function generically.
    Per doctrine, gender-accurate rendering is preferred over flattening to a neutral
    abstraction; 'the one who...' preserves representative force without unnecessary
    male-specific English.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Christological confession in ὁ υἱὸς τοῦ θεοῦ
  chosen_reading: the Son of God
  alternative_readings:
  - God's Son
  rationale: The verse presents a confessional claim about Jesus' identity. The translation
    preserves the title directly without expanding or reducing its theological content,
    in keeping with historic orthodoxy and the instruction not to import doctrinal
    claims beyond the text.
  doctrine_reference: DOCTRINE.md §Affirmations; §Translation philosophy 1, 3
