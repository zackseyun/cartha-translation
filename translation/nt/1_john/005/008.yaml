theological_decisions:
- issue: Whether εἰς τὸ ἕν εἰσιν should be rendered in a way that suggests ontological
    unity or testimonial agreement
  chosen_reading: 'testimonial agreement: ''the three are in agreement'''
  alternative_readings:
  - '''the three are one'''
  rationale: In context, the Spirit, the water, and the blood are presented as witnesses.
    The phrase therefore most naturally means that their testimony converges. Rendering
    it 'are one' is formally possible, but in English it may imply a stronger metaphysical
    claim than the immediate context warrants. This preserves theological precision
    and avoids importing Trinitarian claims from the later textual variant in v. 7
    into v. 8.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
