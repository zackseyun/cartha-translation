theological_decisions:
- issue: Meaning of the present-tense statement οὐχ ἁμαρτάνει
  chosen_reading: The clause denies ongoing/practiced sin rather than asserting absolute
    sinless perfection.
  alternative_readings:
  - The believer does not sin at all.
  rationale: This reading best fits the imperfective aspect of the present tense and
    preserves coherence with 1 John 1:8-10 and 2:1, where believers' sin is acknowledged.
    The translation reflects aspect without paraphrasing beyond the Greek.
  doctrine_reference: Preserve theological tension rather than resolve it; optimal
    equivalence.
- issue: Referent of ὁ γεννηθεὶς ἐκ τοῦ θεοῦ
  chosen_reading: Rendered ambiguously in the main text as 'the one who was born of
    God,' with footnote preserving the alternative identification as Jesus/the Son.
  alternative_readings:
  - The phrase refers to the believer born of God.
  - The phrase refers specifically to Jesus, the Son of God.
  rationale: The Greek expression is syntactically ambiguous. Many interpreters take
    the aorist participle as referring to Jesus, who protects the believer; others
    take it as the believer guarding himself. The main text preserves the ambiguity
    as much as English allows, while the footnote documents the christological alternative.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Referents of αὐτόν / αὐτοῦ
  chosen_reading: Both pronouns are rendered 'him,' preserving the likely sense that
    the protected person is the believer.
  alternative_readings:
  - 'If ὁ γεννηθεὶς refers to the believer, αὐτόν may be reflexive in sense: ''keeps
    himself.'''
  rationale: The manuscript reading αὐτόν is not reflexive, and αὐτοῦ naturally refers
    back to the believer as the one untouched by the evil one. English 'him' preserves
    the Greek wording while the footnote notes the self-guarding interpretation tied
    to a different construal of the subject.
  doctrine_reference: Original-language primacy over translation tradition; preserve
    ambiguity where genuine.
