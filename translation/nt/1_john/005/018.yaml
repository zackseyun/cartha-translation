id: 1JN.5.18
reference: 1 John 5:18
source:
  edition: SBLGNT
  text: Οἴδαμεν ὅτι πᾶς ὁ γεγεννημένος ἐκ τοῦ θεοῦ οὐχ ἁμαρτάνει, ἀλλ’ ὁ γεννηθεὶς
    ἐκ τοῦ θεοῦ τηρεῖ ⸀αὐτόν, καὶ ὁ πονηρὸς οὐχ ἅπτεται αὐτοῦ.
translation:
  text: We know that everyone who has been born of God does not keep sinning; rather,
    the one who was born of God keeps him, and the evil one does not touch him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the one born of God keeps himself.' Many interpreters, however, understand
      'the one who was born of God' to refer to Jesus, the Son, who keeps the believer.
    reason: alternative_reading
  - marker: b
    text: '''Does not keep sinning'' reflects the Greek present tense, which here
      likely refers to ongoing or habitual sin rather than claiming that believers
      never commit any sin (compare 1 John 1:8-10; 2:1).'
    reason: cross_reference
  - marker: c
    text: '''Touch'' can carry the sense of laying hold of so as to harm.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Οἴδαμεν
  chosen: We know
  alternatives:
  - We have known
  lexicon: BDAG
  rationale: Perfect-form οἶδα functions idiomatically as a present stative, so 'We
    know' is standard and natural English.
- source_word: πᾶς ὁ γεγεννημένος ἐκ τοῦ θεοῦ
  chosen: everyone who has been born of God
  alternatives:
  - everyone begotten of God
  - everyone born from God
  lexicon: BDAG
  rationale: πᾶς ὁ + participle is distributive ('everyone who...'). γεγεννημένος
    is perfect passive participle of γεννάω, emphasizing resulting state. 'Born of
    God' is established Johannine idiom and clear modern English.
- source_word: οὐχ ἁμαρτάνει
  chosen: does not keep sinning
  alternatives:
  - does not sin
  - is not sinning
  lexicon: BDAG
  rationale: The present tense in Johannine ethical statements commonly carries imperfective
    force. Rendering as 'does not keep sinning' preserves the sense of ongoing/practiced
    sin without overstating sinless perfection, which would be in tension with 1 John
    1:8-10.
- source_word: ἀλλ’
  chosen: rather
  alternatives:
  - but
  lexicon: BDAG
  rationale: Marks contrast; 'rather' slightly sharpens the corrective contrast in
    smooth English.
- source_word: ὁ γεννηθεὶς ἐκ τοῦ θεοῦ
  chosen: the one who was born of God
  alternatives:
  - he who was begotten of God
  - the one begotten of God
  lexicon: BDAG
  rationale: Aorist passive participle may refer either to the believer just mentioned
    or, more likely in context and traditional interpretation, to the Son. The wording
    preserves the Greek expression without importing 'Son' into the main text.
- source_word: τηρεῖ αὐτόν
  chosen: keeps him
  alternatives:
  - guards him
  - protects him
  lexicon: BDAG
  rationale: τηρέω often means 'keep, guard, preserve.' 'Keeps him' is closer formally
    and leaves room for the protective nuance supplied by context. Because αὐτόν is
    ambiguous, a more interpretive 'protects him' is left as an alternative rather
    than main text.
- source_word: ὁ πονηρὸς
  chosen: the evil one
  alternatives:
  - the wicked one
  - evil
  lexicon: BDAG
  rationale: With article and Johannine usage, this most naturally refers personally
    to Satan rather than abstract evil.
- source_word: οὐχ ἅπτεται αὐτοῦ
  chosen: does not touch him
  alternatives:
  - does not lay hold of him
  - does not cling to him
  - does not harm him
  lexicon: BDAG
  rationale: ἅπτομαι literally means 'touch' but can imply harmful grasp. 'Does not
    touch him' preserves the lexical form while allowing readers to hear the protective
    force in context.
