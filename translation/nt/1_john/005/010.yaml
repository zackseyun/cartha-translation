id: 1JN.5.10
reference: 1 John 5:10
source:
  edition: SBLGNT
  text: ὁ πιστεύων εἰς τὸν υἱὸν τοῦ θεοῦ ἔχει τὴν μαρτυρίαν ἐν ⸀αὑτῷ· ὁ μὴ πιστεύων
    τῷ θεῷ ψεύστην πεποίηκεν αὐτόν, ὅτι οὐ πεπίστευκεν εἰς τὴν μαρτυρίαν ἣν μεμαρτύρηκεν
    ὁ θεὸς περὶ τοῦ υἱοῦ αὐτοῦ.
translation:
  text: The one who believes in the Son of God has the testimony in himself; the one
    who does not believe God has made him a liar, because he has not believed in the
    testimony that God has testified about his Son.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'has made him out to be a liar.' The Greek is more literally 'has made
      him a liar,' meaning that rejecting God's testimony treats God as false.
    reason: lexical_alternative
  - marker: b
    text: Some manuscripts read 'in him' instead of 'in himself,' which could be understood
      as 'in the Son' rather than 'in himself.'
    reason: textual_variant
lexical_decisions:
- source_word: ὁ πιστεύων
  chosen: The one who believes
  alternatives:
  - Whoever believes
  - He who believes
  lexicon: BDAG
  rationale: Articular present participle used substantivally; 'the one who believes'
    preserves the generic singular force without archaic diction.
- source_word: εἰς τὸν υἱὸν τοῦ θεοῦ
  chosen: in the Son of God
  alternatives:
  - into the Son of God
  lexicon: BDAG
  rationale: With πιστεύω, εἰς idiomatically expresses personal trust/belief directed
    toward someone; standard English is 'believes in.'
- source_word: μαρτυρίαν
  chosen: testimony
  alternatives:
  - witness
  lexicon: BDAG
  rationale: In Johannine usage μαρτυρία often denotes borne witness/testimony. 'Testimony'
    fits both the content and the legal-witness nuance in this context.
- source_word: ἐν αὑτῷ
  chosen: in himself
  alternatives:
  - within him
  lexicon: BDAG
  rationale: The reflexive pronoun naturally refers back to the believer. 'In himself'
    is a close rendering and preserves the internal possession of the testimony.
- source_word: ὁ μὴ πιστεύων τῷ θεῷ
  chosen: the one who does not believe God
  alternatives:
  - the one who does not believe in God
  - the one who does not trust God
  lexicon: BDAG
  rationale: The dative with πιστεύω here is best rendered 'believe God' in the sense
    of accepting God's testimony as true, not merely believing that God exists. This
    distinction matters because the next clause explains unbelief as rejecting God's
    testimony.
- source_word: ψεύστην πεποίηκεν αὐτόν
  chosen: has made him a liar
  alternatives:
  - has made him out to be a liar
  - has treated him as a liar
  lexicon: BDAG
  rationale: Perfect tense indicates a present state resulting from the action. The
    idiom means that by refusing God's testimony, the unbeliever effectively regards
    God as a liar. The more literal 'has made him a liar' is retained in the main
    text.
- source_word: οὐ πεπίστευκεν
  chosen: has not believed
  alternatives:
  - has refused to believe
  lexicon: BDAG
  rationale: Perfect tense is preserved with 'has not believed,' indicating continuing
    unbelief with present relevance.
- source_word: ἣν μεμαρτύρηκεν ὁ θεὸς
  chosen: that God has testified
  alternatives:
  - which God has borne witness to
  - that God has given as testimony
  lexicon: BDAG
  rationale: 'The cognate verb-noun pairing is preserved as much as natural English
    allows: ''testimony'' / ''has testified.'' This keeps John''s rhetorical emphasis.'
- source_word: περὶ τοῦ υἱοῦ αὐτοῦ
  chosen: about his Son
  alternatives:
  - concerning his Son
  lexicon: BDAG
  rationale: περί with genitive here means 'about/concerning.' 'About his Son' is
    natural modern English while preserving the referential content.
