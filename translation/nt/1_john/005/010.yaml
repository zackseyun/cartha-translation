theological_decisions:
- issue: Referent of 'the testimony in himself'
  chosen_reading: The testimony is possessed internally by the believer.
  alternative_readings:
  - The testimony is in God's Son rather than in the believer (reflecting a different
    textual reading).
  rationale: The provided SBLGNT text reads ἐν αὑτῷ, which most naturally refers to
    the believer just mentioned. This is translated directly without importing a fuller
    doctrinal explanation from nearby verses.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Force of 'does not believe God'
  chosen_reading: The clause refers specifically to rejecting God's testimony, not
    merely lacking belief in God's existence.
  alternative_readings:
  - General unbelief in God
  rationale: The explanatory ὅτι-clause defines the unbelief as failure to believe
    the testimony God has given about his Son. The translation therefore keeps 'believe
    God' rather than 'believe in God.'
  doctrine_reference: Original-language primacy over translation tradition.
