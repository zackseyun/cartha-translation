id: 1JN.5.11
reference: 1 John 5:11
source:
  edition: SBLGNT
  text: καὶ αὕτη ἐστὶν ἡ μαρτυρία, ὅτι ζωὴν αἰώνιον ἔδωκεν ⸂ὁ θεὸς ἡμῖν⸃, καὶ αὕτη
    ἡ ζωὴ ἐν τῷ υἱῷ αὐτοῦ ἐστιν.
translation:
  text: 'And this is the testimony: that God has given us eternal life, and this life
    is in his Son.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "witness" for "testimony."
    reason: lexical_alternative
  - marker: b
    text: Or "gave us eternal life"; the Greek aorist can be rendered more formally
      this way, though "has given" brings out the present result.
    reason: lexical_alternative
  - marker: c
    text: '"In his Son" preserves the Greek wording; alternatively, some English renderings
      use "with his Son," but that weakens the Johannine idiom.'
    reason: lexical_alternative
lexical_decisions:
- source_word: μαρτυρία
  chosen: testimony
  alternatives:
  - witness
  lexicon: BDAG
  rationale: '"Testimony" fits the Johannine legal-evidentiary sense in context, referring
    to the content of what is borne witness to. "Witness" is possible, but in English
    can more easily suggest the person rather than the content.'
- source_word: ὅτι
  chosen: that
  alternatives:
  - namely that
  lexicon: BDAG
  rationale: Introduces the content of the testimony straightforwardly. A more expansive
    rendering such as "namely that" is interpretively possible but unnecessary.
- source_word: ζωὴν αἰώνιον
  chosen: eternal life
  alternatives:
  - everlasting life
  lexicon: BDAG
  rationale: Standard and natural rendering in Johannine usage, preserving both duration
    and the theological quality of life from God.
- source_word: ἔδωκεν
  chosen: has given
  alternatives:
  - gave
  lexicon: BDAG
  rationale: 'The aorist is rendered with English present perfect for idiomatic sense
    in context: God''s giving has present abiding result for believers. "Gave" is
    more formally close but less natural in this declaration of present possession.'
- source_word: ὁ θεὸς
  chosen: God
  lexicon: BDAG
  rationale: Direct rendering of the subject without expansion. The article is not
    normally represented in English.
- source_word: ἡμῖν
  chosen: us
  lexicon: BDAG
  rationale: Simple dative indirect object; no contextual reason to narrow or expand
    the referent beyond the author's believing community.
- source_word: ἐν τῷ υἱῷ αὐτοῦ
  chosen: in his Son
  alternatives:
  - with his Son
  lexicon: BDAG
  rationale: '"In" preserves the Greek preposition ἐν and the Johannine theological
    idiom of life located in, found in, and mediated through the Son. "With" would
    flatten the relational and locative force.'
- source_word: υἱῷ
  chosen: Son
  lexicon: BDAG
  rationale: Capitalized as a christological title referring uniquely to Jesus in
    relation to God the Father, consistent with orthodox and Johannine usage.
- source_word: αὕτη ... αὕτη ἡ ζωή
  chosen: this ... this life
  alternatives:
  - such is ... this life
  lexicon: BDAG
  rationale: The repeated demonstrative is preserved to reflect the Greek emphasis
    and cohesion between the testimony and the life just mentioned.
