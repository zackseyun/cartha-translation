theological_decisions:
- issue: Force of the aorist ἔδωκεν in relation to present possession of life
  chosen_reading: Rendered as "has given us eternal life"
  alternative_readings:
  - '"gave us eternal life"'
  rationale: This preserves the completed divine act while communicating its ongoing
    present significance in context. It does not import a doctrinal system beyond
    the verse's assertion that eternal life is now granted by God.
  doctrine_reference: Translation philosophy §6; Preserve theological tension rather
    than resolve it
- issue: Meaning of life being "in his Son"
  chosen_reading: Retained the Johannine expression "in his Son" without interpretive
    expansion
  alternative_readings:
  - '"through his Son"'
  - '"with his Son"'
  rationale: The verse states the location/source of eternal life in relation to the
    Son. Expanding to a more explanatory phrase would resolve theological nuance the
    Greek leaves compact and rich.
  doctrine_reference: Translation philosophy §3
