id: 1JN.5.16
reference: 1 John 5:16
source:
  edition: SBLGNT
  text: ἐάν τις ἴδῃ τὸν ἀδελφὸν αὐτοῦ ἁμαρτάνοντα ἁμαρτίαν μὴ πρὸς θάνατον, αἰτήσει,
    καὶ δώσει αὐτῷ ζωήν, τοῖς ἁμαρτάνουσιν μὴ πρὸς θάνατον. ἔστιν ἁμαρτία πρὸς θάνατον·
    οὐ περὶ ἐκείνης λέγω ἵνα ἐρωτήσῃ.
translation:
  text: If anyone sees his brother committing a sin not leading to death, he shall
    ask, and God will give him life—to those committing sins not leading to death.
    There is sin leading to death; I am not saying that he should ask about that.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'There is a sin unto death.' The Greek does not specify whether 'death'
      here is physical death, spiritual death, or final condemnation.
    reason: alternative_reading
  - marker: b
    text: '''Brother'' is singular masculine in Greek and likely refers to a fellow
      believer; the term may include a fellow Christian more broadly in context.'
    reason: cultural_note
  - marker: c
    text: The Greek simply says 'and he will give him life'; the translation makes
      'God' explicit because the giver is understood from the context of prayer.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀδελφὸν
  chosen: brother
  alternatives:
  - fellow believer
  - brother or sister
  lexicon: BDAG
  rationale: The Greek is singular masculine and in Johannine usage commonly refers
    to a fellow believer within the Christian community. Per doctrine, gender-accurate
    rendering is preferred over gender-neutral. 'Brother' preserves the source form;
    broader inclusive sense can be noted in a footnote if needed, but the main text
    should match the Greek.
- source_word: ἁμαρτάνοντα ἁμαρτίαν
  chosen: committing a sin
  alternatives:
  - sinning a sin
  - committing sin
  lexicon: BDAG
  rationale: The participle plus cognate accusative emphasizes the act of sinning.
    Idiomatic English is 'committing a sin.' This preserves the concrete instance
    better than the more abstract 'committing sin.'
- source_word: μὴ πρὸς θάνατον
  chosen: not leading to death
  alternatives:
  - not unto death
  - not resulting in death
  lexicon: BDAG
  rationale: πρός with θάνατον here indicates movement/result toward death. 'Not leading
    to death' is clear modern English and preserves the ambiguity of what kind of
    death is meant, rather than over-interpreting as physical or spiritual death.
- source_word: αἰτήσει
  chosen: he shall ask
  alternatives:
  - he should ask
  - let him ask
  lexicon: BDAG
  rationale: Future indicative can function imperativally or predictively in context.
    'He shall ask' preserves the Greek form while still sounding natural in English.
    The verse presents what the observer is to do in response.
- source_word: δώσει αὐτῷ ζωήν
  chosen: God will give him life
  alternatives:
  - he will give him life
  lexicon: BDAG
  rationale: The Greek subject is implicit in δώσει. English requires an explicit
    subject for clarity. Given the context of prayer and divine granting, the giver
    is best understood as God, not the petitioner. Supplying 'God' makes explicit
    what is strongly implied by the Greek syntax and context.
- source_word: ζωήν
  chosen: life
  alternatives:
  - spiritual life
  lexicon: BDAG
  rationale: ζωή in Johannine literature is theologically rich, often denoting life
    from God or eternal life. The main text should retain the simple term 'life' and
    not narrow it interpretively to 'spiritual life,' though that may be discussed
    theologically.
- source_word: τοῖς ἁμαρτάνουσιν μὴ πρὸς θάνατον
  chosen: to those committing sins not leading to death
  alternatives:
  - for those who sin not leading to death
  - namely, those committing sin not leading to death
  lexicon: BDAG
  rationale: This dative phrase is syntactically difficult. Rendering it appositionally
    after a dash preserves the explanatory force without forcing a more speculative
    restructuring. The plural 'those' reflects the Greek plural participle.
- source_word: ἔστιν ἁμαρτία πρὸς θάνατον
  chosen: There is sin leading to death
  alternatives:
  - There is a sin leading to death
  - There is sin unto death
  lexicon: BDAG
  rationale: The anarthrous construction can be rendered either generically or as
    an instance/category. 'There is sin leading to death' preserves the Greek's terseness
    and avoids over-specifying whether John means a particular act or a category of
    sin.
- source_word: οὐ περὶ ἐκείνης λέγω ἵνα ἐρωτήσῃ
  chosen: I am not saying that he should ask about that
  alternatives:
  - I do not say that he should pray about that
  - I am not saying that he should make request concerning that
  lexicon: BDAG
  rationale: ἐρωτάω and αἰτέω are distinct but overlapping request verbs. Since αἰτέω
    was rendered 'ask' earlier, retaining 'ask' here preserves verbal connection while
    allowing the contextual sense of prayer to remain evident. 'About that' naturally
    renders περὶ ἐκείνης.
