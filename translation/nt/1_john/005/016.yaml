theological_decisions:
- issue: Meaning of 'death' in 'sin leading to death'
  chosen_reading: Retain the ambiguous 'death' without specifying physical, spiritual,
    or eternal death.
  alternative_readings:
  - physical death as divine judgment
  - spiritual/eternal death
  - eschatological condemnation
  rationale: The phrase is notoriously disputed, and the verse itself does not define
    the nature of the death. Per translation philosophy, theological tension should
    be preserved rather than resolved in the main text.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
- issue: Identity of the giver in 'will give him life'
  chosen_reading: Make God the explicit subject in English.
  alternative_readings:
  - leave the subject implicit as 'he will give him life'
  - take the petitioner as the subject
  rationale: While the Greek leaves the subject unstated, the context of prayer strongly
    implies God as the giver of life. Making this explicit clarifies the sentence
    in English without adding a new doctrinal claim.
  doctrine_reference: 'Translation philosophy §1 and §6: source-text primacy with
    readable modern English.'
