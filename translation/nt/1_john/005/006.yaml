theological_decisions:
- issue: Referent of 'the Spirit'
  chosen_reading: Holy Spirit
  alternative_readings:
  - a generic spirit
  rationale: The immediate context of divine testimony in 1 John and Johannine usage
    strongly support the Holy Spirit as the witness. Capitalization reflects referential
    judgment, not added doctrinal expansion.
  doctrine_reference: Affirmations; Preserve theological tension rather than resolve
    it
- issue: Sense of 'water and blood'
  chosen_reading: Left untranslated as 'water and blood' without interpretive specification
  alternative_readings:
  - Jesus' baptism and crucifixion
  - physical birth and death
  - sacramental reference to baptism and the Lord's Supper
  rationale: The phrase is theologically debated, and the Greek itself names the elements
    without explanation. The translation preserves that tension rather than resolving
    it in the main text.
  doctrine_reference: Translation philosophy §3 Preserve theological tension rather
    than resolve it
- issue: Rendering of Χριστός
  chosen_reading: Messiah
  alternative_readings:
  - Christ
  rationale: DOCTRINE.md specifies 'Messiah' where Χριστός functions as a title. In
    this verse the appositional identification favors title force.
  doctrine_reference: 'Contested terms table: Χριστός → Messiah (where title; Christ
    where name-like)'
