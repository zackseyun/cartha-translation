id: 1JN.5.6
reference: 1 John 5:6
source:
  edition: SBLGNT
  text: Οὗτός ἐστιν ὁ ἐλθὼν δι’ ὕδατος καὶ αἵματος, Ἰησοῦς Χριστός· οὐκ ἐν τῷ ὕδατι
    μόνον ἀλλ’ ἐν τῷ ὕδατι καὶ ⸀ἐν τῷ αἵματι· καὶ τὸ πνεῦμά ἐστιν τὸ μαρτυροῦν, ὅτι
    τὸ πνεῦμά ἐστιν ἡ ἀλήθεια.
translation:
  text: This is the one who came by water and blood—Jesus the Messiah; not by the
    water only, but by the water and by the blood. And the Spirit is the one testifying,
    because the Spirit is the truth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'through water and blood.' The phrase itself is debated; interpreters
      variously understand 'water and blood' as referring to Jesus' baptism and death,
      his birth and death, or sacramental imagery. The translation preserves the Greek
      expression without choosing among these views.
    reason: alternative_reading
  - marker: b
    text: Greek 'Jesus Christ'; rendered 'Jesus the Messiah' here because Χριστός
      functions as a title.
    reason: lexical_alternative
  - marker: c
    text: Or 'that the Spirit is the truth.' The conjunction can be read as introducing
      content or cause; 'because' best fits the flow here.
    reason: lexical_alternative
lexical_decisions:
- source_word: Οὗτός
  chosen: This is the one
  alternatives:
  - This one is
  - He is the one
  lexicon: BDAG
  rationale: Demonstrative points emphatically to Jesus just named/apposed in the
    clause. 'This is the one' is natural English and preserves the identificational
    force.
- source_word: ὁ ἐλθὼν
  chosen: who came
  alternatives:
  - the one having come
  - the one who has come
  lexicon: BDAG
  rationale: Aorist participle used substantivally; 'who came' is idiomatic and fits
    the historical reference without overtranslating aspect.
- source_word: δι’ ὕδατος καὶ αἵματος
  chosen: by water and blood
  alternatives:
  - through water and blood
  lexicon: BDAG
  rationale: διά with genitive commonly denotes means or attendant circumstance. 'By'
    is concise and natural here; the phrase is left interpretively open rather than
    specifying baptism/birth/crucifixion in the translation.
- source_word: Ἰησοῦς Χριστός
  chosen: Jesus the Messiah
  alternatives:
  - Jesus Christ
  lexicon: BDAG
  rationale: Per doctrine, Χριστός as a title is translated 'Messiah' where context
    supports title force. Here the apposition identifies Jesus with the messianic
    office rather than functioning merely as a surname-like name.
- source_word: οὐκ ἐν τῷ ὕδατι μόνον ἀλλ’ ἐν τῷ ὕδατι καὶ ἐν τῷ αἵματι
  chosen: not by the water only, but by the water and by the blood
  alternatives:
  - not in the water only, but in the water and in the blood
  - not with the water only, but with the water and with the blood
  lexicon: BDAG
  rationale: Repeated ἐν is rendered consistently with 'by' here to match the preceding
    διά phrase in English and to preserve the contrastive emphasis on both water and
    blood. Repeating 'by the' reflects the Greek repetition and emphasis.
- source_word: τὸ πνεῦμά
  chosen: the Spirit
  alternatives:
  - the spirit
  lexicon: BDAG
  rationale: In Johannine context this refers to the Holy Spirit as divine witness,
    not a generic spirit or human spirit; capitalization signals referent in English
    without adding content beyond context.
- source_word: τὸ μαρτυροῦν
  chosen: the one testifying
  alternatives:
  - the one bearing witness
  - the witness
  lexicon: BDAG
  rationale: Present participle conveys ongoing witness. 'Testifying' is readable
    modern English and preserves verbal force better than a nominal paraphrase.
- source_word: ὅτι
  chosen: because
  alternatives:
  - that
  lexicon: BDAG
  rationale: 'Here ὅτι is best taken as causal, giving the ground for the Spirit''s
    testimony: the Spirit is the truth. This yields the most coherent flow in context.'
- source_word: ἡ ἀλήθεια
  chosen: the truth
  alternatives:
  - truth
  lexicon: BDAG
  rationale: 'The article is retained in English because the predicate is definite/identificational
    in context: the Spirit is ''the truth,'' not merely ''truthful''.'
