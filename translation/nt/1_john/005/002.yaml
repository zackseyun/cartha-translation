theological_decisions:
- issue: Relation between love for God's children and love for God
  chosen_reading: The verse states that love for God's children is recognized by love
    for God and doing his commandments, without resolving broader theological debates
    about whether this is evidential, causal, or definitional.
  alternative_readings:
  - strictly evidential test
  - causal basis of neighbor-love
  - mutual definition of love for God and believers
  rationale: The Greek presents a Johannine criterion in concise form. The translation
    preserves the wording and tension rather than interpreting the logical relation
    beyond the text.
  doctrine_reference: Preserve theological tension rather than resolve it.
