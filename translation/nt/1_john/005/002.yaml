id: 1JN.5.2
reference: 1 John 5:2
source:
  edition: SBLGNT
  text: ἐν τούτῳ γινώσκομεν ὅτι ἀγαπῶμεν τὰ τέκνα τοῦ θεοῦ, ὅταν τὸν θεὸν ἀγαπῶμεν
    καὶ τὰς ἐντολὰς αὐτοῦ ⸀ποιῶμεν·
translation:
  text: 'By this we know that we love the children of God: when we love God and do
    his commandments.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'keep his commandments' or 'obey his commandments.' The Greek verb here
      is literally 'do' (ποιῶμεν), not the more usual 'keep' (τηρέω).
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν τούτῳ
  chosen: By this
  alternatives:
  - In this
  - From this
  lexicon: BDAG
  rationale: Idiomatic Johannine expression introducing the basis or indicator by
    which something is known. 'By this' is natural English and preserves the demonstrative
    force better than the less idiomatic 'in this' here.
- source_word: γινώσκομεν
  chosen: we know
  alternatives:
  - we come to know
  - we recognize
  lexicon: BDAG
  rationale: Present tense in Johannine style commonly expresses ongoing recognition
    or knowledge. 'We know' is the standard, clear rendering and fits the epistolary
    argument.
- source_word: ὅτι
  chosen: that
  alternatives:
  - —
  lexicon: BDAG
  rationale: Introduces the content of what is known. Retained explicitly in English
    for clarity.
- source_word: ἀγαπῶμεν
  chosen: we love
  alternatives:
  - we are loving
  lexicon: BDAG
  rationale: From ἀγαπάω, rendered consistently as 'love' per doctrine guidance on
    lexical cognates. English simple present best represents the Greek present here.
- source_word: τὰ τέκνα τοῦ θεοῦ
  chosen: the children of God
  alternatives:
  - God's children
  lexicon: BDAG
  rationale: τέκνα is best rendered 'children' rather than 'sons' to reflect the neuter
    plural and inclusive filial sense. The more literal 'the children of God' preserves
    the genitival construction and Johannine diction.
- source_word: ὅταν
  chosen: when
  alternatives:
  - whenever
  lexicon: BDAG
  rationale: With present subjunctives, ὅταν can mean 'when/whenever.' 'When' reads
    more smoothly in English while still conveying the conditional-temporal sense
    in context.
- source_word: τὸν θεὸν
  chosen: God
  alternatives:
  - the God
  lexicon: BDAG
  rationale: English normally omits the article with proper-reference 'God.' The object
    is definite from context.
- source_word: καὶ
  chosen: and
  alternatives:
  - also
  lexicon: BDAG
  rationale: Simple coordination of the two marks of love for God's children.
- source_word: τὰς ἐντολὰς αὐτοῦ ποιῶμεν
  chosen: do his commandments
  alternatives:
  - keep his commandments
  - obey his commandments
  lexicon: BDAG
  rationale: ποιέω is literally 'do,' and ἐντολή is 'commandment.' Although English
    often says 'keep commandments,' the Greek here uses ποιέω rather than τηρέω. 'Do
    his commandments' preserves the source wording and avoids importing a different
    verb, while remaining understandable.
