theological_decisions:
- issue: Reference of πᾶν τὸ γεγεννημένον
  chosen_reading: 'personal and collective: ''everyone who has been born of God'''
  alternative_readings:
  - impersonal 'whatever is born of God'
  rationale: The neuter form could be rendered more literally as 'whatever,' but the
    context concerns believers and their relation to God, so an English personal rendering
    best reflects the intended referent while remaining faithful to the Greek sense.
  doctrine_reference: Translation philosophy §4 (gender-accurate over gender-neutral)
- issue: Rendering of πίστις
  chosen_reading: faith
  alternative_readings:
  - faithfulness
  - trust
  rationale: The doctrine table sets 'faith' as the default rendering for πίστις,
    with alternatives preserved where contested. In this verse, 'our faith' is the
    most natural reading, but 'our faithfulness' is worth preserving as a lexical
    alternative in a footnote for auditability.
  doctrine_reference: 'Contested terms table: πίστις → faith'
