id: 1JN.5.4
reference: 1 John 5:4
source:
  edition: SBLGNT
  text: ὅτι πᾶν τὸ γεγεννημένον ἐκ τοῦ θεοῦ νικᾷ τὸν κόσμον. καὶ αὕτη ἐστὶν ἡ νίκη
    ἡ νικήσασα τὸν κόσμον, ἡ πίστις ἡμῶν·
translation:
  text: 'For everyone who has been born of God overcomes the world. And this is the
    victory that has overcome the world: our faith.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'whatever has been born of God,' with the neuter Greek phrasing expressing
      the whole class of those born of God.
    reason: lexical_alternative
  - marker: b
    text: Or 'our faithfulness.' The Greek word can in some contexts mean 'faith,'
      'trust,' or 'faithfulness'; here the main text follows the default rendering
      'faith.'
    reason: alternative_reading
lexical_decisions:
- source_word: ὅτι
  chosen: For
  alternatives:
  - because
  lexicon: BDAG
  rationale: In context, ὅτι introduces the ground for the preceding statement, so
    'For' gives natural English while preserving the causal force.
- source_word: πᾶν τὸ γεγεννημένον
  chosen: everyone who has been born
  alternatives:
  - whatever has been born
  - everything born
  lexicon: BDAG
  rationale: Although πᾶν with the neuter participle is formally neuter singular,
    in Johannine usage it refers collectively to persons begotten of God. 'Everyone
    who has been born' communicates the personal reference in idiomatic English without
    flattening the perfect participle.
- source_word: γεγεννημένον
  chosen: has been born
  alternatives:
  - has been begotten
  lexicon: BDAG
  rationale: The perfect passive participle indicates a completed begetting/birth
    with ongoing result. 'Has been born' is standard, natural English and fits Johannine
    new-birth language better than the more wooden 'begotten'.
- source_word: ἐκ τοῦ θεοῦ
  chosen: of God
  alternatives:
  - from God
  lexicon: BDAG
  rationale: '''Of God'' is a well-established and accurate rendering in Johannine
    contexts of spiritual origin/birth, preserving the relational nuance of divine
    begetting. ''From God'' is possible but slightly less idiomatic here.'
- source_word: νικᾷ
  chosen: overcomes
  alternatives:
  - conquers
  - is victorious over
  lexicon: BDAG
  rationale: '''Overcomes'' is the most natural and contextually fitting rendering
    in Johannine literature, and it preserves lexical consistency with the cognate
    noun νίκη and participle νικήσασα in the same verse.'
- source_word: κόσμον
  chosen: the world
  lexicon: BDAG
  rationale: κόσμος in 1 John commonly denotes the fallen world-order in opposition
    to God, not merely the created universe. 'The world' preserves the established
    Johannine sense without over-interpreting it in the main text.
- source_word: αὕτη ἐστὶν ἡ νίκη
  chosen: this is the victory
  alternatives:
  - this is the conquering power
  - this is the triumph
  lexicon: BDAG
  rationale: A straightforward rendering that preserves the demonstrative emphasis
    and the noun cognate with 'overcomes.' 'Victory' is the clearest English equivalent
    for νίκη.
- source_word: ἡ νικήσασα
  chosen: that has overcome
  alternatives:
  - that overcame
  - which overcomes
  lexicon: BDAG
  rationale: The aorist participle is rendered with English perfect relative clause
    for smoothness and to show the accomplished character of the victory in relation
    to the present statement. This also keeps the lexical link with νικᾷ/νίκη.
- source_word: ἡ πίστις ἡμῶν
  chosen: our faith
  alternatives:
  - our trust
  - our faithfulness
  lexicon: BDAG
  rationale: 'Per doctrine defaults, πίστις is rendered ''faith'' in the main text.
    Here the genitive ἡμῶν is naturally possessive: ''our faith.'' ''Faithfulness''
    is lexically possible in some contexts but less likely here, where the verse identifies
    the means/instrument by which believers overcome.'
