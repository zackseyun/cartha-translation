id: 1JN.5.12
reference: 1 John 5:12
source:
  edition: SBLGNT
  text: ὁ ἔχων τὸν υἱὸν ἔχει τὴν ζωήν· ὁ μὴ ἔχων τὸν υἱὸν τοῦ θεοῦ τὴν ζωὴν οὐκ ἔχει.
translation:
  text: The one who has the Son has life; the one who does not have the Son of God
    does not have life.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'eternal life'; in Johannine usage, 'life' here refers to the life found
      in the Son.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ ἔχων
  chosen: the one who has
  alternatives:
  - whoever has
  - he who has
  lexicon: BDAG
  rationale: The article with present participle functions substantivally, referring
    to a person characterized by possessing the Son. 'The one who has' is natural
    modern English and preserves the generic singular force without archaic diction.
- source_word: τὸν υἱόν
  chosen: the Son
  alternatives:
  - the Son [of God]
  lexicon: BDAG
  rationale: The first clause has simply 'the Son'; retaining the shorter form preserves
    the Greek's variation while clearly referring to the same figure in context.
- source_word: ἔχει
  chosen: has
  alternatives:
  - possesses
  lexicon: BDAG
  rationale: A straightforward rendering of ἔχω. 'Has' is idiomatic and matches Johannine
    usage about relational possession/participation without over-interpreting it.
- source_word: τὴν ζωήν
  chosen: life
  alternatives:
  - the life
  - eternal life
  lexicon: BDAG
  rationale: Although the Greek includes the article, English idiom normally omits
    it here. 'Life' preserves the Johannine theological weight and allows the immediate
    context to supply the sense of eternal life without adding words not present in
    this verse.
- source_word: ὁ μὴ ἔχων
  chosen: the one who does not have
  alternatives:
  - whoever does not have
  - he who does not have
  lexicon: BDAG
  rationale: μή with the participle negates the substantival participial phrase. This
    rendering mirrors the first clause and preserves the balanced antithesis.
- source_word: τὸν υἱὸν τοῦ θεοῦ
  chosen: the Son of God
  alternatives:
  - God's Son
  lexicon: BDAG
  rationale: This is the full christological title in the second clause. 'The Son
    of God' is the most transparent and standard rendering, preserving the explicit
    genitive relation.
- source_word: οὐκ ἔχει
  chosen: does not have
  alternatives:
  - has not
  lexicon: BDAG
  rationale: οὐκ negates the finite verb in the second clause. 'Does not have' is
    standard modern English and keeps the parallelism with the positive clause.
