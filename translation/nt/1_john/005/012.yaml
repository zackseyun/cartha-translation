theological_decisions:
- issue: Meaning of 'life' in Johannine context
  chosen_reading: Render ζωή as 'life' without expanding to 'eternal life' in the
    main text.
  alternative_readings:
  - eternal life
  rationale: In 1 John, ζωή often carries the theological sense of eternal life in
    the Son, but this verse itself says simply ζωή. To avoid importing explanatory
    wording into the text, the main translation keeps 'life' while allowing context
    to convey its fuller sense.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Never paraphrase beyond what the source text warrants.'
- issue: Generic masculine substantival participles
  chosen_reading: Use 'the one who...' rather than masculine-specific 'he who...'
    or pluralizing.
  alternative_readings:
  - he who...
  - whoever...
  rationale: The Greek is grammatically masculine singular but generically representative.
    'The one who...' is gender-accurate to intent and natural in modern English without
    unnecessarily narrowing or pluralizing the statement.
  doctrine_reference: 'Translation philosophy: Gender-accurate over gender-neutral.'
