id: 1JN.5.17
reference: 1 John 5:17
source:
  edition: SBLGNT
  text: πᾶσα ἀδικία ἁμαρτία ἐστίν, καὶ ἔστιν ἁμαρτία οὐ πρὸς θάνατον.
translation:
  text: All unrighteousness is sin, and there is sin not leading to death.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'All wrongdoing is sin' or 'All injustice is sin.'
    reason: lexical_alternative
  - marker: b
    text: Or 'there is sin not resulting in death' or more formally, 'there is sin
      not unto death.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πᾶσα
  chosen: All
  alternatives:
  - Every
  lexicon: BDAG
  rationale: 'With the anarthrous singular noun ἀδικία, πᾶσα has a comprehensive force:
    ''all'' or ''every kind of.'' ''All'' is idiomatic and preserves the universal
    scope.'
- source_word: ἀδικία
  chosen: unrighteousness
  alternatives:
  - wrongdoing
  - injustice
  lexicon: BDAG
  rationale: ἀδικία can denote wrongdoing, injustice, or unrighteousness. 'Unrighteousness'
    best preserves the moral-theological sense in Johannine context while keeping
    the lexical link to righteousness language. 'Injustice' is too narrow, and 'wrongdoing'
    is less theologically weighty.
- source_word: ἁμαρτία
  chosen: sin
  lexicon: BDAG
  rationale: Standard and contextually precise rendering for ἁμαρτία in both occurrences.
- source_word: καὶ
  chosen: and
  alternatives:
  - indeed
  - also
  lexicon: BDAG
  rationale: Simple connective joining the general statement to the qualifying clarification.
    'And' is the most natural and sufficiently formal rendering.
- source_word: οὐ πρὸς θάνατον
  chosen: not leading to death
  alternatives:
  - not unto death
  - not resulting in death
  lexicon: BDAG
  rationale: The prepositional phrase πρὸς θάνατον here expresses direction/result
    in the idiom established by the previous verse ('sin leading to death'). 'Not
    leading to death' is clear modern English and preserves the verbal force implied
    by the phrase better than the more archaic 'not unto death'.
- source_word: θάνατον
  chosen: death
  lexicon: BDAG
  rationale: Direct rendering of θάνατος. The verse does not specify physical versus
    spiritual death, so the translation should preserve that interpretive openness.
