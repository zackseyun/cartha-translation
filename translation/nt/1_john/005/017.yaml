theological_decisions:
- issue: Nature of 'death' in the phrase 'sin not leading to death'
  chosen_reading: Render simply as 'death' without interpretive qualifier
  alternative_readings:
  - physical death
  - spiritual death
  - eschatological condemnation
  rationale: The Greek text gives only θάνατον without further specification. Because
    interpreters differ on whether John means physical death, spiritual death, or
    final judgment, the translation preserves the ambiguity rather than resolving
    it doctrinally.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
- issue: Rendering ἀδικία in relation to moral theology
  chosen_reading: Use 'unrighteousness' in the main text
  alternative_readings:
  - wrongdoing
  - injustice
  rationale: The statement is a broad moral-theological claim, not merely a social
    or legal one. 'Unrighteousness' best reflects the scope of ἀδικία while avoiding
    reduction to only interpersonal injustice.
  doctrine_reference: 'Translation philosophy §1 and §5: original-language primacy
    and consistency of key terms.'
