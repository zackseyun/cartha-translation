theological_decisions:
- issue: Antecedent of οὗτός ἐστιν ὁ ἀληθινὸς θεὸς καὶ ζωὴ αἰώνιος
  chosen_reading: Render the clause straightforwardly as 'He is the true God and eternal
    life' while allowing the nearest antecedent to be Jesus Messiah in the main text.
  alternative_readings:
  - '''This one'' refers to Jesus Messiah explicitly, making the verse a direct identification
    of the Son as true God and eternal life.'
  - '''This one'' refers to the True One/the Father, with the preceding phrase ''in
    his Son Jesus Messiah'' as the means by which believers are in the True One.'
  rationale: The Greek demonstrative οὗτός most naturally points to the nearest personal
    antecedent, 'his Son Jesus Messiah,' and this reading coheres with orthodox Christology
    affirmed in DOCTRINE.md. At the same time, the syntax has been historically discussed,
    and the translation should preserve that tension rather than overstate certainty.
    Therefore the main text uses natural English 'He,' and a footnote preserves the
    alternative antecedent possibility.
  doctrine_reference: Preserve theological tension rather than resolve it; Nicene
    orthodoxy affirmed.
