id: 1JN.5.20
reference: 1 John 5:20
source:
  edition: SBLGNT
  text: οἴδαμεν δὲ ὅτι ὁ υἱὸς τοῦ θεοῦ ἥκει, καὶ δέδωκεν ἡμῖν διάνοιαν ἵνα ⸀γινώσκωμεν
    τὸν ἀληθινόν· καὶ ἐσμὲν ἐν τῷ ἀληθινῷ, ἐν τῷ υἱῷ αὐτοῦ Ἰησοῦ Χριστῷ. οὗτός ἐστιν
    ὁ ἀληθινὸς θεὸς καὶ ζωὴ αἰώνιος.
translation:
  text: And we know that the Son of God has come and has given us understanding so
    that we may know the True One; and we are in the True One, in his Son Jesus Messiah.
    He is the true God and eternal life.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'This one is the true God and eternal life.' The demonstrative may refer
      specifically to Jesus Messiah, though some understand it to refer to 'the True
      One' (the Father) in the preceding clause.
    reason: alternative_reading
lexical_decisions:
- source_word: οἴδαμεν
  chosen: we know
  alternatives:
  - we have known
  lexicon: BDAG
  rationale: Perfect-form οἶδα functions idiomatically as a present stative, expressing
    settled knowledge.
- source_word: ἥκει
  chosen: has come
  alternatives:
  - has arrived
  - is here
  lexicon: BDAG
  rationale: ἥκω commonly denotes having come/arrived with present result. 'Has come'
    is natural English and preserves the completed-yet-present force.
- source_word: δέδωκεν
  chosen: has given
  alternatives:
  - gave
  lexicon: BDAG
  rationale: Perfect tense suggests a gift given with abiding effect; 'has given'
    preserves that nuance.
- source_word: διάνοιαν
  chosen: understanding
  alternatives:
  - mind
  - insight
  lexicon: BDAG
  rationale: In context this is the capacity to perceive spiritual truth, not merely
    the faculty of mind in the abstract. 'Understanding' is clear modern English.
- source_word: ἵνα γινώσκωμεν
  chosen: so that we may know
  alternatives:
  - that we might know
  - so that we may come to know
  lexicon: BDAG
  rationale: ἵνα with present subjunctive expresses purpose. 'May know' preserves
    purpose without overtranslating aspect.
- source_word: τὸν ἀληθινόν / τῷ ἀληθινῷ
  chosen: the True One
  alternatives:
  - him who is true
  - the true one
  lexicon: BDAG
  rationale: The adjective is substantival. Capitalizing 'True One' signals a divine
    referent in English without changing the lexical sense. Using the same phrase
    in both accusative and dative contexts preserves Johannine repetition.
- source_word: ἐσμὲν ἐν
  chosen: we are in
  alternatives:
  - we abide in
  - we are united with
  lexicon: BDAG
  rationale: μένω is not used here; the text simply says 'we are in.' This preserves
    Johannine relational language without interpretive expansion.
- source_word: ἐν τῷ υἱῷ αὐτοῦ
  chosen: in his Son
  alternatives:
  - in the Son of him
  lexicon: BDAG
  rationale: Natural English rendering of the prepositional phrase while preserving
    the possessive relation.
- source_word: Ἰησοῦ Χριστῷ
  chosen: Jesus Messiah
  alternatives:
  - Jesus Christ
  lexicon: BDAG
  rationale: Per doctrine, Χριστός is translated as 'Messiah' where it functions as
    a title. Here the appositional phrase 'his Son Jesus Messiah' still carries titular
    force more than a fixed surname-like usage.
- source_word: οὗτός
  chosen: He
  alternatives:
  - This one
  lexicon: BDAG
  rationale: English normally uses 'he' for a personal antecedent. The demonstrative
    force is preserved in the theological note and footnote because the antecedent
    is interpretively contested.
- source_word: ὁ ἀληθινὸς θεὸς
  chosen: the true God
  alternatives:
  - the real God
  lexicon: BDAG
  rationale: Standard and accurate rendering of the predicate nominative phrase; 'true
    God' matches Johannine diction.
- source_word: ζωὴ αἰώνιος
  chosen: eternal life
  alternatives:
  - life of the age
  lexicon: BDAG
  rationale: Established and contextually correct rendering in Johannine literature;
    preserves both duration and quality of life in idiomatic English.
