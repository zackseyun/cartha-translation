id: 1JN.5.3
reference: 1 John 5:3
source:
  edition: SBLGNT
  text: αὕτη γάρ ἐστιν ἡ ἀγάπη τοῦ θεοῦ ἵνα τὰς ἐντολὰς αὐτοῦ τηρῶμεν, καὶ αἱ ἐντολαὶ
    αὐτοῦ βαρεῖαι οὐκ εἰσίν,
translation:
  text: 'For this is the love of God: that we keep his commandments, and his commandments
    are not burdensome.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'God's love'; the Greek phrase can be read either as love directed toward
      God or love that comes from God, though the immediate context favors 'love for
      God.'
    reason: alternative_reading
lexical_decisions:
- source_word: αὕτη
  chosen: this
  alternatives:
  - herein
  - this is what
  lexicon: BDAG
  rationale: Demonstrative pointing forward to the explanatory clause; simple 'this'
    is natural and sufficiently formal.
- source_word: γάρ
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: BDAG
  rationale: Marks explanation/grounding from the previous statement; 'For' preserves
    the connective force well in English.
- source_word: ἀγάπη τοῦ θεοῦ
  chosen: the love of God
  alternatives:
  - love for God
  - God's love
  lexicon: BDAG
  rationale: The immediate context (vv. 2–3) concerns believers' love expressed in
    obedience, so the genitive is best taken objectively as love directed toward God
    rather than God's love for us. The more literal 'the love of God' preserves the
    Greek form while allowing the following clause to define it.
- source_word: ἵνα
  chosen: that
  alternatives:
  - namely, that
  - in that
  lexicon: BDAG
  rationale: Here ἵνα introduces the content/explanation of what the love of God consists
    in, not merely purpose. 'That' is concise and idiomatic.
- source_word: ἐντολάς
  chosen: commandments
  alternatives:
  - commands
  lexicon: BDAG
  rationale: '''Commandments'' preserves the weight and familiar Johannine usage of
    ἐντολή better than the slightly lighter ''commands.'''
- source_word: τηρῶμεν
  chosen: we keep
  alternatives:
  - we obey
  - we observe
  - we guard
  lexicon: BDAG
  rationale: τηρέω in Johannine literature commonly carries the sense of keeping/observing
    commandments. 'Keep' preserves the lexical connection and is standard without
    being archaic.
- source_word: βαρεῖαι
  chosen: burdensome
  alternatives:
  - heavy
  - hard to bear
  - weighty
  lexicon: BDAG
  rationale: The adjective denotes something weighty in the sense of oppressive or
    difficult to bear. 'Burdensome' communicates the idiomatic sense in clear modern
    English.
