theological_decisions:
- issue: Genitive sense in ἡ ἀγάπη τοῦ θεοῦ
  chosen_reading: 'objective genitive: believers'' love for God'
  alternative_readings:
  - 'subjective genitive: God''s love for believers'
  - plenary ambiguity preserving both senses
  rationale: The preceding verse links loving God with doing his commandments, and
    this verse immediately defines that love as keeping his commandments. Therefore
    the context strongly favors 'love for God.' Retaining the more literal phrase
    'the love of God' in English preserves some transparency to the Greek while the
    rationale documents the intended sense.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
