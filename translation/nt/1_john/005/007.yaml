id: 1JN.5.7
reference: 1 John 5:7
source:
  edition: SBLGNT
  text: ὅτι τρεῖς εἰσιν οἱ μαρτυροῦντες,
translation:
  text: 'For there are three who testify:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Later manuscripts add a longer reading often known as the Comma Johanneum:
      ''in heaven: the Father, the Word, and the Holy Spirit, and these three are
      one. And there are three that bear witness on earth ...'' This wording is absent
      from the earliest Greek manuscript evidence and is not included in the SBLGNT
      text.'
    reason: textual_variant
lexical_decisions:
- source_word: ὅτι
  chosen: For
  alternatives:
  - because
  - that
  lexicon: BDAG
  rationale: In context, ὅτι introduces the explanation for the preceding claim, so
    'For' best captures its explanatory force in natural English. 'Because' is possible,
    and 'that' is too wooden here.
- source_word: τρεῖς
  chosen: three
  lexicon: BDAG
  rationale: Straightforward cardinal numeral; no contextual reason to vary the basic
    gloss.
- source_word: εἰσιν
  chosen: are
  lexicon: BDAG
  rationale: Standard present-tense copula, naturally rendered 'are'.
- source_word: οἱ μαρτυροῦντες
  chosen: who testify
  alternatives:
  - the ones testifying
  - the witnesses
  lexicon: BDAG
  rationale: 'The articular present participle functions substantivally: ''the ones
    who testify.'' ''Who testify'' is smoother English while preserving the verbal
    sense of ongoing witness. ''The witnesses'' is possible but shifts from participial
    action to a noun and slightly reduces the emphasis on active testimony.'
