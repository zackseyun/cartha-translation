theological_decisions:
- issue: Scope of 'idols'
  chosen_reading: Translate concretely as 'idols' without expanding to a broader paraphrase
    such as 'anything that takes God's place.'
  alternative_readings:
  - anything that becomes an idol
  - false worship generally
  rationale: The Greek names idols directly. While theologically the warning may extend
    by implication to all idolatry, the translation should not broaden the wording
    beyond the source text. The concrete term also fits the epistle's contrast between
    the true God and false worship.
  doctrine_reference: 'Translation philosophy: Never paraphrase beyond what the source
    text warrants; preserve theological tension rather than resolve it.'
