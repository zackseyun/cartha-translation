id: 1JN.5.21
reference: 1 John 5:21
source:
  edition: SBLGNT
  text: Τεκνία, φυλάξατε ἑαυτὰ ἀπὸ τῶν ⸀εἰδώλων.
translation:
  text: Little children, guard yourselves from idols.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Children' or 'Dear children.' The Greek term is an affectionate diminutive
      used by John in direct address.
    reason: lexical_alternative
lexical_decisions:
- source_word: Τεκνία
  chosen: Little children
  alternatives:
  - Children
  - Dear children
  lexicon: BDAG
  rationale: Vocative plural diminutive of τεκνίον, used by John as an affectionate
    pastoral address. 'Little children' preserves both the familial imagery and the
    diminutive tenderness better than the flatter 'children.' 'Dear children' captures
    tone but imports an adjective not present in the Greek.
- source_word: φυλάξατε
  chosen: guard
  alternatives:
  - keep
  - watch over
  - protect
  lexicon: BDAG
  rationale: Aorist active imperative, second person plural, calling for decisive
    vigilance. 'Guard' is concise, idiomatic, and preserves the sense of active watchfulness
    better than 'keep,' which can sound too general in English.
- source_word: ἑαυτὰ
  chosen: yourselves
  alternatives:
  - yourselves personally
  lexicon: BDAG
  rationale: Reflexive pronoun functioning as the object of the imperative. 'Yourselves'
    straightforwardly preserves the reflexive force without expansion.
- source_word: ἀπὸ
  chosen: from
  alternatives:
  - away from
  lexicon: BDAG
  rationale: The preposition marks separation or distance. 'From' is the most direct
    rendering; the imperative plus context already conveys avoidance, so 'away from'
    is possible but slightly more interpretive.
- source_word: εἰδώλων
  chosen: idols
  alternatives:
  - images
  - false gods
  lexicon: BDAG
  rationale: εἴδωλον commonly denotes an idol or cult image, and by extension what
    is worshiped falsely. 'Idols' is the standard and clearest rendering here. 'Images'
    is too weak and potentially misleading; 'false gods' interprets beyond the lexical
    form.
