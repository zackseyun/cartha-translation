id: 1JN.5.13
reference: 1 John 5:13
source:
  edition: SBLGNT
  text: Ταῦτα ἔγραψα ⸀ὑμῖν ἵνα εἰδῆτε ὅτι ζωὴν ⸂ἔχετε αἰώνιον⸃, ⸂τοῖς πιστεύουσιν⸃
    εἰς τὸ ὄνομα τοῦ υἱοῦ τοῦ θεοῦ.
translation:
  text: I have written these things to you who believe in the name of the Son of God,
    so that you may know that you have eternal life.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or, less smoothly but more closely to the Greek order: ''These things I
      wrote to you, so that you may know that you have eternal life, to those who
      believe in the name of the Son of God.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: Ταῦτα
  chosen: these things
  alternatives:
  - this
  lexicon: BDAG
  rationale: Neuter plural demonstrative naturally refers to the contents of the letter
    or preceding discussion; 'these things' preserves the plural form and common Johannine
    usage.
- source_word: ἔγραψα
  chosen: I have written
  alternatives:
  - I wrote
  lexicon: BDAG
  rationale: The aorist epistolary usage can be rendered idiomatically in English
    as present perfect ('I have written'), which fits the letter context and standard
    English style without losing the completed action.
- source_word: ὑμῖν
  chosen: to you
  lexicon: BDAG
  rationale: Simple dative indirect object; 'to you' is the natural English rendering.
- source_word: ἵνα εἰδῆτε
  chosen: so that you may know
  alternatives:
  - that you may know
  - so that you will know
  lexicon: BDAG
  rationale: ἵνα introduces purpose, and εἰδῆτε is best represented with a modal sense
    in English. 'So that you may know' preserves the purpose nuance clearly.
- source_word: ζωὴν αἰώνιον
  chosen: eternal life
  alternatives:
  - everlasting life
  lexicon: BDAG
  rationale: Standard and accurate rendering of the Johannine expression, preserving
    both duration and theological quality of life in relation to God.
- source_word: ἔχετε
  chosen: you have
  alternatives:
  - you possess
  lexicon: BDAG
  rationale: Present indicative indicates present possession, important in 1 John
    for assurance in the present, not merely future hope.
- source_word: τοῖς πιστεύουσιν
  chosen: to you who believe
  alternatives:
  - to the ones believing
  - to those who believe
  lexicon: BDAG
  rationale: The dative participial phrase is most naturally taken in apposition to
    ὑμῖν, identifying the recipients. 'To you who believe' keeps the direct address
    and reads naturally in English.
- source_word: πιστεύουσιν εἰς
  chosen: believe in
  alternatives:
  - trust in
  lexicon: BDAG
  rationale: For πιστεύω with εἰς in Johannine usage, 'believe in' is the standard
    rendering. 'Trust in' is a possible nuance, but 'believe in' better preserves
    the familiar theological idiom while remaining faithful to the Greek.
- source_word: τὸ ὄνομα
  chosen: the name
  lexicon: BDAG
  rationale: Retains the biblical idiom of believing in the revealed person and authority
    signified by the 'name,' rather than paraphrasing it away.
- source_word: τοῦ υἱοῦ τοῦ θεοῦ
  chosen: the Son of God
  lexicon: BDAG
  rationale: Direct and traditional rendering of the christological title; it accurately
    reflects the Greek genitive construction and preserves the theological weight
    of the title.
