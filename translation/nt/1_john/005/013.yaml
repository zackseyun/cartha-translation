theological_decisions:
- issue: Placement and syntactical relation of τοῖς πιστεύουσιν
  chosen_reading: 'Attached to ὑμῖν: ''to you who believe in the name of the Son of
    God'''
  alternative_readings:
  - 'Appended after the assurance clause: ''that you have eternal life—you who believe
    in the name of the Son of God'''
  rationale: 'The Greek word order allows either a recipient-identifying apposition
    or a resumptive apposition after the main clause. Attaching it to ''you'' yields
    the smoothest English and best reflects the likely sense: John states his purpose
    in writing to believers so that they may know they have eternal life. The alternative
    does not materially change doctrine, so it is preserved only in documentation,
    not a footnote.'
  doctrine_reference: Preserve theological tension rather than resolve it, where ambiguity
    is genuine.
