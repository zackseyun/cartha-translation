theological_decisions:
- issue: Referent of repeated pronouns αὐτῷ / αὐτός / μένει ἐν ἡμῖν
  chosen_reading: The pronouns refer to God, with the final 'he remains in us' likewise
    referring to God.
  alternative_readings:
  - The final 'he remains in us' could be taken more broadly in relation to Christological
    indwelling within Johannine theology.
  rationale: The immediate context in 1 John 3:23 names 'his Son Jesus Messiah' distinctly
    and then returns to God as the one whose commandments are kept and who gives the
    Spirit. Retaining 'him/he' rather than substituting 'God' preserves the Greek
    while the theological referent remains clear from context.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
- issue: Rendering πνεῦμα as the Holy Spirit
  chosen_reading: '''Spirit'' is capitalized to indicate the Holy Spirit.'
  alternative_readings:
  - Lowercase 'spirit'
  rationale: The clause 'whom he gave to us' and the broader Johannine context point
    to the divine Spirit as God's gift to believers. Capitalization is an English
    interpretive convention, but here it accurately reflects the referent without
    adding content absent from the text.
  doctrine_reference: Historic ecumenical orthodoxy affirmed; no denominationally
    distinctive reading imposed.
