theological_decisions:
- issue: Referent of ἐκεῖνος
  chosen_reading: The pronoun refers most naturally to Christ in the immediate context,
    but is left as 'that one' in the main text.
  alternative_readings:
  - God/Father as the referent
  - an intentionally reverential but somewhat open divine referent
  rationale: In 1 John, ἐκεῖνος commonly refers to Jesus in ethical imitation contexts
    (cf. nearby usage), and historic orthodoxy is not threatened by either divine
    referent. To preserve theological tension rather than over-resolve it, the translation
    keeps the pronoun in the text while documenting the likely Christological reference.
  doctrine_reference: Preserve theological tension rather than resolve it.
