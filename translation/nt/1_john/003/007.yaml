id: 1JN.3.7
reference: 1 John 3:7
source:
  edition: SBLGNT
  text: τεκνία, μηδεὶς πλανάτω ὑμᾶς· ὁ ποιῶν τὴν δικαιοσύνην δίκαιός ἐστιν, καθὼς
    ἐκεῖνος δίκαιός ἐστιν·
translation:
  text: Little children, let no one deceive you. The one who practices righteousness
    is righteous, just as that one is righteous.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'let no one lead you astray.'
    reason: lexical_alternative
  - marker: b
    text: Greek 'that one'; likely referring to Christ, though some understand it
      as referring to God.
    reason: alternative_reading
  - marker: c
    text: Or 'justice'; here the sense is upright conduct consistent with being righteous.
    reason: lexical_alternative
lexical_decisions:
- source_word: τεκνία
  chosen: Little children
  alternatives:
  - Children
  - Dear children
  lexicon: BDAG
  rationale: Vocative plural diminutive of τεκνίον used affectionately by the author.
    'Little children' preserves both the familial address and the diminutive tenderness
    better than the flatter 'children'; 'dear children' captures tone but adds an
    adjective not present in the Greek.
- source_word: μηδεὶς πλανάτω ὑμᾶς
  chosen: let no one deceive you
  alternatives:
  - let no one lead you astray
  - let no one mislead you
  lexicon: BDAG
  rationale: 'Present active imperative with μηδείς gives a prohibition: ''let no
    one deceive you.'' πλανάω can mean ''lead astray'' or ''deceive''; here the immediate
    concern is false moral/theological teaching, so ''deceive'' is concise and natural,
    while the alternatives remain viable.'
- source_word: ὁ ποιῶν
  chosen: The one who practices
  alternatives:
  - Whoever does
  - The one doing
  lexicon: BDAG
  rationale: Articular present participle denotes a characteristic or ongoing pattern,
    not a mere single act. 'Practices' communicates habitual conduct in idiomatic
    English better than the wooden 'doing' and more precisely than the broader 'whoever
    does.'
- source_word: τὴν δικαιοσύνην
  chosen: righteousness
  alternatives:
  - justice
  lexicon: BDAG
  rationale: Per the doctrine table, δικαιοσύνη normally defaults to 'righteousness,'
    with 'justice' preserved where relevant. In 1 John 3:7 the focus is upright moral
    conduct corresponding to being δίκαιος, so 'righteousness' best preserves the
    lexical and thematic link.
- source_word: δίκαιός ἐστιν
  chosen: is righteous
  alternatives:
  - is just
  lexicon: BDAG
  rationale: δίκαιος here describes the person's moral status/character in direct
    parallel with δικαιοσύνη. 'Righteous' preserves the cognate relationship in English;
    'just' is possible but weaker in this Johannine ethical context.
- source_word: καθὼς
  chosen: just as
  alternatives:
  - even as
  - as
  lexicon: BDAG
  rationale: Comparative conjunction introducing the standard of comparison. 'Just
    as' is clear modern English and preserves the force of correspondence.
- source_word: ἐκεῖνος
  chosen: that one
  alternatives:
  - he
  - Christ
  lexicon: BDAG
  rationale: Johannine usage often uses ἐκεῖνος reverentially for Christ or God depending
    on context. 'That one' preserves the Greek demonstrative explicitly and avoids
    prematurely replacing the pronoun with an interpretive noun in the main text.
