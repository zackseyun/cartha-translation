id: 1JN.3.8
reference: 1 John 3:8
source:
  edition: SBLGNT
  text: ὁ ποιῶν τὴν ἁμαρτίαν ἐκ τοῦ διαβόλου ἐστίν, ὅτι ἀπ’ ἀρχῆς ὁ διάβολος ἁμαρτάνει.
    εἰς τοῦτο ἐφανερώθη ὁ υἱὸς τοῦ θεοῦ ἵνα λύσῃ τὰ ἔργα τοῦ διαβόλου.
translation:
  text: 'The one who practices sin is from the devil, because the devil has been sinning
    from the beginning. For this purpose the Son of God was revealed: to destroy the
    works of the devil.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'The one who does sin' / 'whoever commits sin.' The Greek expression
      uses a present participle, suggesting ongoing or characteristic practice rather
      than a single isolated act.
    reason: lexical_alternative
  - marker: b
    text: Or 'is of the devil.' The Greek literally uses 'from' (ἐκ), expressing source
      or moral-spiritual origin/alignment.
    reason: alternative_reading
  - marker: c
    text: Or 'appeared' for 'was revealed.' The Greek emphasizes manifestation or
      disclosure.
    reason: lexical_alternative
  - marker: d
    text: Or 'to undo the works of the devil.' The verb literally means 'to loose'
      and by extension 'to break up' or 'destroy.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ ποιῶν τὴν ἁμαρτίαν
  chosen: the one who practices sin
  alternatives:
  - the one doing sin
  - whoever commits sin
  lexicon: BDAG
  rationale: The present participle ποιῶν with the object ἁμαρτίαν conveys ongoing
    or characteristic action, not merely a single act. 'Practices sin' captures Johannine
    habitual force in readable English better than the overly literal 'does sin' or
    the potentially punctiliar 'commits sin'.
- source_word: ἐκ τοῦ διαβόλου
  chosen: is from the devil
  alternatives:
  - is of the devil
  - belongs to the devil
  lexicon: BDAG
  rationale: ἐκ here marks source/origin in a moral-spiritual sense. 'Is from the
    devil' preserves the metaphor of source without overstating ontological derivation.
    'Of the devil' is traditional but less transparent in modern English.
- source_word: διάβολος
  chosen: the devil
  alternatives:
  - the slanderer
  lexicon: BDAG
  rationale: Although διάβολος can lexically mean 'slanderer,' in this context it
    functions as the established personal designation for Satan. 'The devil' is the
    clearest idiomatic rendering.
- source_word: ὅτι ἀπ’ ἀρχῆς
  chosen: because ... from the beginning
  alternatives:
  - for ... from the beginning
  - since ... from the beginning
  lexicon: BDAG
  rationale: ὅτι gives the reason for the preceding statement. ἀπ’ ἀρχῆς is best rendered
    'from the beginning,' preserving Johannine diction and its broad temporal-theological
    resonance without specifying whether the beginning is creation, the devil's rebellion,
    or the beginning of human sin.
- source_word: ἁμαρτάνει
  chosen: has been sinning
  alternatives:
  - sins
  - is sinning
  lexicon: BDAG
  rationale: The present tense in context expresses ongoing characteristic activity
    extending from 'the beginning.' English present perfect progressive best conveys
    durative force from past to present.
- source_word: εἰς τοῦτο
  chosen: for this purpose
  alternatives:
  - for this reason
  - to this end
  lexicon: BDAG
  rationale: The phrase points forward to the purpose clause introduced by ἵνα. 'For
    this purpose' makes the teleological sense explicit.
- source_word: ἐφανερώθη
  chosen: was revealed
  alternatives:
  - appeared
  - was made manifest
  lexicon: BDAG
  rationale: '''Was revealed'' preserves the passive form and Johannine manifestation
    language. ''Appeared'' is possible but can sound merely visual; the Greek includes
    disclosure of identity and mission.'
- source_word: ὁ υἱὸς τοῦ θεοῦ
  chosen: the Son of God
  lexicon: BDAG
  rationale: Standard and precise rendering of the christological title; it preserves
    the text's explicit filial language without reduction.
- source_word: ἵνα λύσῃ
  chosen: to destroy
  alternatives:
  - that he might destroy
  - to undo
  - to loose
  lexicon: BDAG
  rationale: λύω literally means 'loose' or 'untie,' but in this context with 'the
    works of the devil' it carries the sense of breaking up, undoing, or destroying.
    'Destroy' is idiomatic and communicates decisive nullification of the devil's
    works.
- source_word: τὰ ἔργα τοῦ διαβόλου
  chosen: the works of the devil
  alternatives:
  - the devil's works
  - the deeds of the devil
  lexicon: BDAG
  rationale: A straightforward rendering preserving the plural and the genitive relation.
    'Works' is broad enough to include the devil's sinful activity and its effects.
