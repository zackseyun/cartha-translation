theological_decisions:
- issue: Force of the present-tense sin language in Johannine ethics
  chosen_reading: Habitual/characteristic action is reflected in English ('practices
    sin'; 'has been sinning')
  alternative_readings:
  - Absolute statement about any single act of sin
  rationale: In 1 John, present-tense formulations about sin commonly distinguish
    settled pattern from isolated act, especially in light of nearby statements (e.g.,
    1:8–2:2; 3:6, 9). Rendering the verbs as characteristic action preserves the epistle's
    theological tension rather than creating a contradiction with John's acknowledgment
    that believers do sin.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather
    than resolve it
- issue: Meaning of 'from the devil'
  chosen_reading: Moral-spiritual source/alignment, not ontological generation
  alternative_readings:
  - Literal derivation from the devil
  rationale: The phrase describes ethical-spiritual belonging or source in Johannine
    dualism. The translation keeps the source metaphor while avoiding wording that
    would imply the devil literally begets humans.
- issue: Purpose of the Son's revelation
  chosen_reading: The Son of God was revealed in order to destroy/undo the devil's
    works
  alternative_readings:
  - Merely to expose the devil's works
  rationale: The ἵνα + aorist subjunctive clause is purposive and λύσῃ here denotes
    decisive dismantling, not mere disclosure. This aligns with the text's direct
    claim without importing later doctrinal elaboration beyond the verse.
  doctrine_reference: 'Affirmations: Nicene Creed; Translation philosophy §1'
