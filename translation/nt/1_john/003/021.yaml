id: 1JN.3.21
reference: 1 John 3:21
source:
  edition: SBLGNT
  text: ἀγαπητοί, ἐὰν ἡ καρδία ⸂μὴ καταγινώσκῃ ἡμῶν⸃, παρρησίαν ἔχομεν πρὸς τὸν θεόν,
translation:
  text: Beloved, if our heart does not condemn us, we have confidence before God,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'does not accuse us' or 'does not find fault with us.'
    reason: lexical_alternative
  - marker: b
    text: Or 'boldness' or 'assurance before God.'
    reason: lexical_alternative
  - marker: c
    text: '''Heart'' here refers to the inner self or moral consciousness; compare
      the sense of ''conscience.'''
    reason: cultural_note
lexical_decisions:
- source_word: ἀγαπητοί
  chosen: Beloved
  alternatives:
  - Dear friends
  lexicon: BDAG
  rationale: Vocative plural adjective used as a term of affectionate address. 'Beloved'
    preserves the lexical connection to love language in 1 John and keeps the elevated
    but still readable tone better than the more interpretive 'Dear friends'.
- source_word: ἐὰν
  chosen: if
  alternatives:
  - whenever
  lexicon: BDAG
  rationale: Introduces a conditional clause with the subjunctive. 'If' is the most
    natural English rendering here.
- source_word: καρδία
  chosen: heart
  lexicon: BDAG
  rationale: Standard rendering for καρδία. In context it refers to the inner moral
    consciousness or self-assessment, but 'heart' preserves the source metaphor without
    over-interpreting it as 'conscience' in the main text.
- source_word: μὴ καταγινώσκῃ ἡμῶν
  chosen: does not condemn us
  alternatives:
  - does not accuse us
  - does not find fault with us
  lexicon: BDAG
  rationale: καταγινώσκω here carries the sense of pronouncing against, blaming, or
    condemning. 'Condemn' best fits the immediate context from the previous verse
    and the moral/judicial nuance, while remaining idiomatic in English.
- source_word: παρρησίαν
  chosen: confidence
  alternatives:
  - boldness
  - assurance
  lexicon: BDAG
  rationale: παρρησία can denote boldness, openness, or confidence. In the context
    of approaching God, 'confidence' communicates the relational and devotional sense
    clearly in modern English. 'Boldness' is possible but can sound more confrontational
    in English.
- source_word: πρὸς τὸν θεόν
  chosen: before God
  alternatives:
  - toward God
  - with God
  lexicon: BDAG
  rationale: πρός with the accusative can indicate direction or relation. Here, in
    combination with παρρησία, it expresses confident standing in relation to God.
    'Before God' is idiomatic and fits the context of moral self-examination and divine
    presence.
