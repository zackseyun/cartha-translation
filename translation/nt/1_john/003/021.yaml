theological_decisions:
- issue: Rendering the inward faculty denoted by καρδία
  chosen_reading: heart
  alternative_readings:
  - conscience
  rationale: The verse speaks of the inner self that may condemn or not condemn. Translating
    as 'heart' preserves Johannine diction and avoids collapsing the metaphor into
    a narrower psychological category. The functional sense of conscience is acknowledged
    as an alternative but not placed in the main text.
  doctrine_reference: Translation philosophy §1, §6
- issue: Nuance of παρρησίαν in relation to God
  chosen_reading: confidence before God
  alternative_readings:
  - boldness toward God
  - assurance before God
  rationale: The text describes the believer's open, unashamed stance in God's presence.
    'Confidence' preserves the theological tension of reverent access without overstating
    emotional certainty or diminishing divine holiness.
  doctrine_reference: Translation philosophy §3, §6
