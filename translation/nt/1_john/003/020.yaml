theological_decisions:
- issue: How to understand God's being 'greater than our heart'
  chosen_reading: Render the statement without narrowing it to only mercy, only authority,
    or only omniscience.
  alternative_readings:
  - God is more merciful than our condemning conscience
  - God's verdict overrules self-condemnation
  - God knows the full truth beyond our partial self-assessment
  rationale: The Greek states broadly that God is greater than our heart and then
    adds that he knows all things. The translation should preserve this theological
    breadth rather than resolve the verse into a single doctrinal paraphrase. The
    following clause suggests knowledge is central, but the comparative itself remains
    wider.
  doctrine_reference: Preserve theological tension rather than resolve it.
