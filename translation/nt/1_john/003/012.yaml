theological_decisions:
- issue: Whether τοῦ πονηροῦ is personal ('the evil one') or impersonal ('evil')
  chosen_reading: 'personal: ''the evil one'''
  alternative_readings:
  - 'impersonal: ''evil'''
  rationale: The article with πονηρός in Johannine literature often denotes the personal
    evil one/Satan (cf. nearby usage in 1 John). This preserves the theological contrast
    of spiritual origin without overexpanding the text.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
