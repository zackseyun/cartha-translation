id: 1JN.3.12
reference: 1 John 3:12
source:
  edition: SBLGNT
  text: οὐ καθὼς Κάϊν ἐκ τοῦ πονηροῦ ἦν καὶ ἔσφαξεν τὸν ἀδελφὸν αὐτοῦ· καὶ χάριν τίνος
    ἔσφαξεν αὐτόν; ὅτι τὰ ἔργα αὐτοῦ πονηρὰ ἦν, τὰ δὲ τοῦ ἀδελφοῦ αὐτοῦ δίκαια.
translation:
  text: not like Cain, who was from the evil one and slaughtered his brother. And
    why did he slaughter him? Because his works were evil, but those of his brother
    were righteous.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from evil.' The Greek expression can be read more abstractly, but in
      Johannine usage it commonly refers to the personal evil one.
    reason: alternative_reading
  - marker: b
    text: Or 'murdered.' The Greek verb is more vivid, literally 'slaughtered.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐ καθὼς
  chosen: not like
  alternatives:
  - not as
  lexicon: BDAG
  rationale: Introduces a negative comparison with the prior exhortation; 'not like'
    is idiomatic modern English while preserving the comparative force of καθώς under
    negation.
- source_word: ἐκ τοῦ πονηροῦ
  chosen: from the evil one
  alternatives:
  - of the evil one
  - from evil
  lexicon: BDAG
  rationale: In Johannine usage, ὁ πονηρός commonly refers personally to the evil
    one rather than abstract evil. 'From' preserves ἐκ as indicating source/origin
    rather than mere quality.
- source_word: ἔσφαξεν
  chosen: slaughtered
  alternatives:
  - murdered
  - killed
  - slew
  lexicon: BDAG
  rationale: σφάζω is stronger and more graphic than a generic 'kill'; 'slaughtered'
    preserves the violent force without archaic tone. 'Murdered' captures legality/morality
    but loses the verb's vividness.
- source_word: ἀδελφὸν αὐτοῦ
  chosen: his brother
  lexicon: BDAG
  rationale: Literal and natural rendering; the familial relationship is central to
    the verse's moral contrast.
- source_word: χάριν τίνος
  chosen: why
  alternatives:
  - for what reason
  - because of what
  lexicon: BDAG
  rationale: Idiomatic English equivalent of the causal interrogative phrase; preserves
    the sense without wooden phrasing.
- source_word: ὅτι
  chosen: Because
  alternatives:
  - For
  - That
  lexicon: BDAG
  rationale: Introduces the reason for Cain's act. 'Because' is the clearest modern
    English causal connector here.
- source_word: τὰ ἔργα αὐτοῦ πονηρὰ ἦν
  chosen: his works were evil
  alternatives:
  - his deeds were evil
  lexicon: BDAG
  rationale: ἔργα can be 'works' or 'deeds'; 'works' maintains lexical continuity
    with Johannine ethical language and remains readable. πονηρά is rendered 'evil'
    to match the moral category already present in 'the evil one' while distinguishing
    person from quality by context.
- source_word: τὰ δὲ τοῦ ἀδελφοῦ αὐτοῦ δίκαια
  chosen: but those of his brother were righteous
  alternatives:
  - but his brother's were righteous
  - but the works of his brother were righteous
  - but those of his brother were just
  lexicon: BDAG
  rationale: The Greek omits 'works' in the second clause, so 'those of his brother'
    preserves the ellipsis naturally. δίκαια is rendered 'righteous' rather than 'just'
    because the contrast is ethical/moral character of deeds, not judicial fairness.
