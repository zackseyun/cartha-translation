theological_decisions:
- issue: Force of ἵνα ἀγαπῶμεν ἀλλήλους
  chosen_reading: 'Rendered as the content/ethical thrust of the message: ''that we
    should love one another.'''
  alternative_readings:
  - '''so that we may love one another'''
  - '''let us love one another'''
  rationale: The verse states the substance of the message heard from the beginning,
    not merely its purpose. 'We should love one another' preserves the moral imperative
    without converting the clause into a liturgical exhortation or weakening it into
    mere possibility.
  doctrine_reference: Translation philosophy §3, §6
