id: 1JN.3.11
reference: 1 John 3:11
source:
  edition: SBLGNT
  text: Ὅτι αὕτη ἐστὶν ἡ ἀγγελία ἣν ἠκούσατε ἀπ’ ἀρχῆς, ἵνα ἀγαπῶμεν ἀλλήλους·
translation:
  text: 'For this is the message that you have heard from the beginning: that we should
    love one another.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'which you heard from the beginning.'
    reason: lexical_alternative
  - marker: b
    text: Or 'so that we may love one another' or 'let us love one another.'
    reason: alternative_reading
lexical_decisions:
- source_word: Ὅτι
  chosen: For
  alternatives:
  - Because
  - That
  lexicon: BDAG
  rationale: In context, ὅτι introduces an explanation of the preceding statement,
    so 'For' best captures the explanatory force in natural English without sounding
    wooden.
- source_word: αὕτη ἐστὶν
  chosen: this is
  alternatives:
  - this is what
  lexicon: BDAG
  rationale: A straightforward demonstrative + copula construction; 'this is' preserves
    the directness of the Greek.
- source_word: ἀγγελία
  chosen: message
  alternatives:
  - announcement
  - proclamation
  lexicon: BDAG
  rationale: '''Message'' is clear modern English and fits Johannine usage well. ''Announcement''
    or ''proclamation'' are possible but sound less natural here.'
- source_word: ἣν ἠκούσατε
  chosen: that you have heard
  alternatives:
  - which you heard
  - that you heard
  lexicon: BDAG
  rationale: The perfect 'have heard' is idiomatic in English for a past reception
    with continuing relevance, even though the Greek form is aorist. This reflects
    optimal equivalence while preserving the sense of received teaching.
- source_word: ἀπ’ ἀρχῆς
  chosen: from the beginning
  alternatives:
  - from the start
  lexicon: BDAG
  rationale: This is the standard Johannine expression and should be kept consistently.
    'From the beginning' preserves both familiarity and theological resonance in John's
    writings.
- source_word: ἵνα
  chosen: that
  alternatives:
  - so that
  - in order that
  lexicon: BDAG
  rationale: Here ἵνα introduces the content of the message in a way that is natural
    in English as 'that.' A more purpose-heavy rendering ('so that') would overstate
    purposive nuance.
- source_word: ἀγαπῶμεν
  chosen: we should love
  alternatives:
  - we love
  - let us love
  lexicon: BDAG
  rationale: 'The present subjunctive after ἵνα is best rendered here as an exhortational/content
    clause: ''we should love.'' ''Let us love'' would shift the statement into a direct
    exhortation, while ''we love'' would flatten the modal force.'
- source_word: ἀλλήλους
  chosen: one another
  alternatives:
  - each other
  lexicon: BDAG
  rationale: '''One another'' is the standard reciprocal expression in English Bible
    style and matches the communal ethical emphasis of the passage.'
