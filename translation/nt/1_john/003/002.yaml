id: 1JN.3.2
reference: 1 John 3:2
source:
  edition: SBLGNT
  text: ἀγαπητοί, νῦν τέκνα θεοῦ ἐσμεν, καὶ οὔπω ἐφανερώθη τί ἐσόμεθα. ⸀οἴδαμεν ὅτι
    ἐὰν φανερωθῇ ὅμοιοι αὐτῷ ἐσόμεθα, ὅτι ὀψόμεθα αὐτὸν καθώς ἐστιν.
translation:
  text: Beloved, now we are children of God, and what we will be has not yet been
    revealed. We know that if he is revealed, we will be like him, because we will
    see him as he is.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'if it is revealed,' referring to what we will be; the Greek subject
      is implicit. Context favors 'he,' referring to Christ.
    reason: alternative_reading
  - marker: b
    text: Many translations render this clause 'when he appears.' The Greek is more
      literally 'if he is revealed,' using the same verb as earlier in the verse.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀγαπητοί
  chosen: Beloved
  alternatives:
  - Dear friends
  - Loved ones
  lexicon: BDAG
  rationale: Vocative plural adjective used as a warm address. 'Beloved' preserves
    both the affectionate tone and the lexical connection to ἀγαπάω/ἀγάπη better than
    the more idiomatic 'dear friends'.
- source_word: νῦν
  chosen: now
  alternatives:
  - already
  - at present
  lexicon: BDAG
  rationale: Temporal adverb marking present status in contrast with future revelation.
    'Now' is concise and preserves the present/future tension of the verse.
- source_word: τέκνα θεοῦ
  chosen: children of God
  alternatives:
  - God's children
  lexicon: BDAG
  rationale: τέκνα emphasizes filial relationship rather than age or gender. 'Children
    of God' is natural English and preserves the genitival construction without importing
    gendered language not present in the Greek.
- source_word: οὔπω ἐφανερώθη
  chosen: has not yet been revealed
  alternatives:
  - has not yet appeared
  - has not yet been made known
  lexicon: BDAG
  rationale: φανερόω in the passive here denotes being made manifest or disclosed.
    The perfect-like English 'has not yet been revealed' best conveys a present state
    resulting from the prior non-manifestation, even though the Greek is aorist passive.
- source_word: τί ἐσόμεθα
  chosen: what we will be
  alternatives:
  - what we shall be
  lexicon: BDAG
  rationale: τί is neuter singular and refers to the nature/state of believers' future
    condition, not personal identity in a narrow sense. 'What we will be' is the most
    direct rendering in modern English.
- source_word: οἴδαμεν
  chosen: We know
  alternatives:
  - And we know
  lexicon: BDAG
  rationale: Straightforward rendering of the perfect-form verb with present meaning.
    The conjunction is not repeated in Greek at this point, so 'We know' is sufficient.
- source_word: ἐὰν φανερωθῇ
  chosen: if he is revealed
  alternatives:
  - when he appears
  - if it is revealed
  lexicon: BDAG
  rationale: The passive singular verb lacks an explicit subject. In context, the
    nearest and most natural referent is Christ, yielding 'if he is revealed.' This
    preserves the lexical link with ἐφανερώθη earlier in the verse. 'When he appears'
    is interpretive and shifts passive to active.
- source_word: ὅμοιοι αὐτῷ
  chosen: like him
  alternatives:
  - similar to him
  lexicon: BDAG
  rationale: ὅμοιος denotes likeness or similarity, not identity. 'Like him' is idiomatic
    and theologically careful, avoiding any suggestion of ontological equality.
- source_word: ὀψόμεθα αὐτὸν
  chosen: we will see him
  alternatives:
  - we shall see him
  lexicon: BDAG
  rationale: Future middle of ὁράω is naturally rendered as a simple future in English.
    'See him' preserves the direct object and the beatific-vision emphasis of the
    clause.
- source_word: καθώς ἐστιν
  chosen: as he is
  alternatives:
  - just as he is
  lexicon: BDAG
  rationale: καθώς introduces manner/comparison. 'As he is' is concise and preserves
    the force of direct perception of Christ in his true reality.
