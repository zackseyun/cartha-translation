theological_decisions:
- issue: Referent of the implicit subject in ἐὰν φανερωθῇ
  chosen_reading: 'The subject is Christ: ''if he is revealed.'''
  alternative_readings:
  - 'The subject is the believers'' future state: ''if it is revealed'''
  - 'More interpretive: ''when he appears'''
  rationale: The immediate context of seeing 'him' and being 'like him' strongly favors
    Christ as the referent. Rendering the passive as 'is revealed' preserves the Greek
    voice and the thematic repetition with the earlier ἐφανερώθη, while avoiding over-resolving
    the timing nuance into 'when.'
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Nature of believers' future likeness
  chosen_reading: '''we will be like him'' denotes real likeness to Christ without
    implying identity of essence.'
  alternative_readings:
  - Stronger paraphrases such as 'we will become as he is'
  rationale: ὅμοιοι indicates similarity, not sameness. The translation must preserve
    orthodox Creator-creature and Christological distinctions while still expressing
    the text's strong promise of transformation.
  doctrine_reference: 'Affirmations: Nicene Creed (381 AD), Definition of Chalcedon
    (451 AD)'
