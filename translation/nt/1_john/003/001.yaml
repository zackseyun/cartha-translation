id: 1JN.3.1
reference: 1 John 3:1
source:
  edition: SBLGNT
  text: ἴδετε ποταπὴν ἀγάπην δέδωκεν ἡμῖν ὁ πατὴρ ἵνα τέκνα θεοῦ κληθῶμεν, ⸂καὶ ἐσμέν⸃.
    διὰ τοῦτο ὁ κόσμος οὐ γινώσκει ⸀ἡμᾶς ὅτι οὐκ ἔγνω αὐτόν.
translation:
  text: 'See what kind of love the Father has given to us, that we should be called
    children of God—and we are. For this reason the world does not know us: because
    it did not know him.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'what sort of love'; traditionally 'how great a love.' The Greek emphasizes
      the kind or quality of the Father's love, expressed with astonishment.
    reason: lexical_alternative
  - marker: b
    text: Some manuscripts omit 'and we are.'
    reason: textual_variant
  - marker: c
    text: Or 'does not recognize us ... did not recognize him.'
    reason: lexical_alternative
  - marker: d
    text: '''Him'' most naturally refers to the Father in this verse; some understand
      it as referring to Christ in Johannine context.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἴδετε
  chosen: See
  alternatives:
  - Behold
  - Look
  lexicon: BDAG
  rationale: Aorist imperative plural functioning as an attention-getting summons.
    'See' is natural modern English and preserves the direct exhortation without archaic
    tone; 'Behold' is too traditional/archaic here.
- source_word: ποταπὴν
  chosen: what kind of
  alternatives:
  - how great
  - what sort of
  lexicon: BDAG
  rationale: The adjective expresses qualitative astonishment ('of what sort/from
    what country'), not merely degree. 'What kind of' preserves the sense of wonder
    at the nature of the Father's love better than the more interpretive 'how great.'
- source_word: ἀγάπην
  chosen: love
  lexicon: BDAG
  rationale: Default rendering per doctrine table. Simple and consistent.
- source_word: δέδωκεν
  chosen: has given
  alternatives:
  - gave
  - has bestowed
  lexicon: BDAG
  rationale: Perfect tense suggests a past act with abiding result. 'Has given' preserves
    that better than simple past. 'Has bestowed' is possible but less natural for
    the target register.
- source_word: ὁ πατὴρ
  chosen: the Father
  alternatives:
  - the father
  lexicon: BDAG
  rationale: Definite title for God in Johannine usage; capitalization in English
    appropriately signals divine referent without adding content.
- source_word: ἵνα
  chosen: that
  alternatives:
  - so that
  lexicon: BDAG
  rationale: Introduces the content/result of the Father's gift. 'That' is concise
    and idiomatic with the following passive clause in English.
- source_word: τέκνα θεοῦ
  chosen: children of God
  alternatives:
  - God's children
  - sons and daughters of God
  lexicon: BDAG
  rationale: τέκνα is gender-inclusive 'children,' not specifically 'sons.' 'Children
    of God' is both accurate and theologically established in Johannine context. 'God's
    children' is possible but slightly less formal; 'sons and daughters' over-specifies.
- source_word: κληθῶμεν
  chosen: should be called
  alternatives:
  - may be called
  - would be called
  lexicon: BDAG
  rationale: Aorist passive subjunctive after ἵνα. 'Should be called' is idiomatic
    English that preserves the clause's telic/result nuance without sounding uncertain.
- source_word: καὶ ἐσμέν
  chosen: and we are
  alternatives:
  - and so we are
  lexicon: BDAG
  rationale: The shorter rendering keeps the emphatic affirmation present in the Greek.
    'And so we are' is also strong and idiomatic, but the simple 'and we are' more
    directly mirrors the text.
- source_word: διὰ τοῦτο
  chosen: For this reason
  alternatives:
  - Because of this
  - Therefore
  lexicon: BDAG
  rationale: Signals the explanatory inference to what precedes. 'For this reason'
    is clear and natural.
- source_word: ὁ κόσμος
  chosen: the world
  lexicon: BDAG
  rationale: In Johannine usage this commonly denotes the human order in rebellion
    against God, but the literal term 'world' should be retained rather than interpreted
    in the main text.
- source_word: οὐ γινώσκει ἡμᾶς
  chosen: does not know us
  alternatives:
  - does not recognize us
  lexicon: BDAG
  rationale: γινώσκω can mean know/recognize. 'Know us' is the more direct and traditional
    rendering and fits the parallel with 'did not know him.' 'Recognize' is a viable
    nuance preserved in a footnote.
- source_word: ὅτι
  chosen: because
  alternatives:
  - that
  lexicon: BDAG
  rationale: Here ὅτι gives the reason the world does not know believers. 'Because'
    makes the causal relation explicit in English.
- source_word: οὐκ ἔγνω αὐτόν
  chosen: it did not know him
  alternatives:
  - it did not recognize him
  lexicon: BDAG
  rationale: Aorist refers to the world's failure regarding God/the Father in context.
    'Know' preserves the lexical repetition with γινώσκει/ἔγνω and the theological
    force of relational non-recognition.
