theological_decisions:
- issue: Referent of αὐτόν
  chosen_reading: him = the Father
  alternative_readings:
  - him = Christ
  rationale: The nearest explicit antecedent in the verse is 'the Father,' and the
    immediate logic is that the world does not know God's children because it did
    not know God. Johannine theology often links ignorance of believers with ignorance
    of God. Since the Greek pronoun is formally ambiguous in broader theological context,
    the alternative christological referent is preserved in a footnote rather than
    resolved dogmatically beyond the verse's immediate syntax.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Inclusion of καὶ ἐσμέν
  chosen_reading: include in main text as 'and we are'
  alternative_readings:
  - omit as a textual variant
  rationale: The SBLGNT text includes καὶ ἐσμέν, and the phrase is both well attested
    and exegetically significant as an emphatic affirmation that believers are not
    only called but truly are God's children. A textual-variant footnote preserves
    awareness of the omission in some witnesses.
