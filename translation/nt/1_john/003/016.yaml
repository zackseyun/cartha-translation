id: 1JN.3.16
reference: 1 John 3:16
source:
  edition: SBLGNT
  text: ἐν τούτῳ ἐγνώκαμεν τὴν ἀγάπην, ὅτι ἐκεῖνος ὑπὲρ ἡμῶν τὴν ψυχὴν αὐτοῦ ἔθηκεν·
    καὶ ἡμεῖς ὀφείλομεν ὑπὲρ τῶν ἀδελφῶν τὰς ψυχὰς ⸀θεῖναι.
translation:
  text: 'By this we have come to know love: that he laid down his life for us, and
    we ought to lay down our lives for the brothers.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'In this' or 'By this means.'
    reason: lexical_alternative
  - marker: b
    text: Greek 'the brothers'; in context, this likely refers to fellow believers
      generally, including sisters.
    reason: cultural_note
lexical_decisions:
- source_word: ἐν τούτῳ
  chosen: By this
  alternatives:
  - In this
  - By this means
  lexicon: BDAG
  rationale: The demonstrative construction introduces the means or basis by which
    love is known. 'By this' is idiomatic in English and preserves the explanatory
    force better than a more wooden 'in this.'
- source_word: ἐγνώκαμεν
  chosen: we have come to know
  alternatives:
  - we know
  - we have known
  lexicon: BDAG
  rationale: Perfect tense indicates a present state resulting from prior realization.
    'Have come to know' captures both the completed recognition and its ongoing significance.
- source_word: ἀγάπην
  chosen: love
  lexicon: BDAG
  rationale: Follows the default rendering for ἀγάπη in DOCTRINE.md. The anarthrous/arthrous
    nuance is adequately conveyed by simple 'love' in English.
- source_word: ἐκεῖνος
  chosen: he
  alternatives:
  - that one
  - that one there
  lexicon: BDAG
  rationale: In Johannine usage this pronoun often points emphatically to Christ.
    English normally renders it as 'he' in this context; the referent is clear from
    the epistle's discourse.
- source_word: ὑπὲρ ἡμῶν
  chosen: for us
  alternatives:
  - on our behalf
  - for our sake
  lexicon: BDAG
  rationale: ὑπέρ here expresses benefactive/substitution-adjacent self-giving. 'For
    us' is natural and preserves the theological weight without over-specifying a
    theory of atonement.
- source_word: τὴν ψυχὴν αὐτοῦ ἔθηκεν
  chosen: laid down his life
  alternatives:
  - laid down his soul
  - gave up his life
  lexicon: BDAG
  rationale: ψυχή in this idiom refers to one's life, and τίθημι with ψυχή is a fixed
    Johannine expression for voluntary self-sacrifice. 'Laid down his life' is both
    accurate and idiomatic.
- source_word: ὀφείλομεν
  chosen: we ought
  alternatives:
  - we are obligated
  - we owe it
  lexicon: BDAG
  rationale: The verb denotes moral obligation. 'We ought' communicates ethical duty
    in readable modern English without sounding overly technical.
- source_word: τῶν ἀδελφῶν
  chosen: the brothers
  alternatives:
  - the brothers and sisters
  - the brethren
  - our brothers
  lexicon: BDAG
  rationale: Per doctrine, gender-accurate over gender-neutral. ἀδελφοί is grammatically
    masculine plural and in Johannine church context likely refers to fellow believers
    collectively, including women by representative force. The inclusive sense is
    preserved in a footnote rather than flattened in the main text.
- source_word: τὰς ψυχὰς θεῖναι
  chosen: to lay down our lives
  alternatives:
  - to lay down our souls
  - to give up our lives
  lexicon: BDAG
  rationale: Matches the earlier idiom and preserves lexical consistency with ψυχή/τίθημι.
    Plural 'lives' is the natural English equivalent.
