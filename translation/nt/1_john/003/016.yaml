theological_decisions:
- issue: Referent of ἐκεῖνος
  chosen_reading: A reference to Jesus the Son, whose self-sacrificial death defines
    love.
  alternative_readings:
  - A more generic 'that one' without explicit christological identification
  rationale: Within 1 John and especially in light of the immediately preceding context
    and the parallel Johannine idiom of laying down one's life, the referent is Jesus.
    Rendering simply 'he' preserves the Greek while allowing the discourse context
    to identify him.
  doctrine_reference: 'Affirmations: Nicene Creed; Translation philosophy §1'
- issue: Scope of ἀδελφῶν
  chosen_reading: Rendered 'the brothers' in the main text, with inclusive ecclesial
    sense noted in a footnote.
  alternative_readings:
  - the brothers and sisters
  rationale: The Greek is masculine plural and likely representative for fellow believers
    generally. Per doctrine, the translation keeps the gendered form in the main text
    while annotating inclusivity where contextually relevant.
  doctrine_reference: Translation philosophy §4
