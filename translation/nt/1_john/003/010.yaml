id: 1JN.3.10
reference: 1 John 3:10
source:
  edition: SBLGNT
  text: ἐν τούτῳ φανερά ἐστιν τὰ τέκνα τοῦ θεοῦ καὶ τὰ τέκνα τοῦ διαβόλου· πᾶς ὁ μὴ
    ποιῶν δικαιοσύνην οὐκ ἔστιν ἐκ τοῦ θεοῦ, καὶ ὁ μὴ ἀγαπῶν τὸν ἀδελφὸν αὐτοῦ.
translation:
  text: 'By this the children of God and the children of the devil are evident: everyone
    who does not practice righteousness is not from God, and neither is the one who
    does not love his brother.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'In this' or 'From this.' The Greek phrase can indicate the basis by
      which this distinction is recognized.
    reason: lexical_alternative
  - marker: b
    text: Or 'justice.' The Greek word can denote righteousness or justice, though
      'righteousness' best fits the ethical contrast here.
    reason: lexical_alternative
  - marker: c
    text: Or 'his brother or sister,' that is, a fellow believer. The Greek reads
      'his brother' with a masculine singular form.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐν τούτῳ
  chosen: By this
  alternatives:
  - In this
  - From this
  lexicon: BDAG
  rationale: The phrase points to the means or basis by which something is made evident
    in the preceding and following context. 'By this' is idiomatic English and preserves
    the demonstrative force without over-specifying whether it is inferential ('from
    this') or locative ('in this').
- source_word: φανερά
  chosen: are evident
  alternatives:
  - are manifest
  - are plain
  - are revealed
  lexicon: BDAG
  rationale: The predicate adjective means visible or evident. 'Are evident' is clear
    modern English and preserves the stative sense better than the more archaic 'are
    manifest.'
- source_word: τέκνα
  chosen: children
  alternatives:
  - offspring
  lexicon: BDAG
  rationale: τέκνα commonly denotes children in a relational sense. 'Children' is
    the natural English equivalent and preserves the familial/theological contrast
    between belonging to God and to the devil.
- source_word: διάβολος
  chosen: the devil
  alternatives:
  - the slanderer
  lexicon: BDAG
  rationale: In this context διάβολος functions as the established personal designation
    for Satan, so 'the devil' is the standard and clearest rendering rather than the
    more literal but misleading 'slanderer.'
- source_word: πᾶς ὁ μὴ ποιῶν
  chosen: everyone who does not practice
  alternatives:
  - whoever does not do
  - everyone not doing
  lexicon: BDAG
  rationale: The articular present participle expresses a characteristic pattern rather
    than a single act. 'Everyone who does not practice' captures the gnomic, habitual
    force better than a bare 'does not do.'
- source_word: δικαιοσύνην
  chosen: righteousness
  alternatives:
  - justice
  lexicon: BDAG
  rationale: Per the doctrine default, δικαιοσύνη is rendered 'righteousness.' In
    Johannine ethical context this refers to right conduct in conformity with God's
    character, not primarily social justice, so 'righteousness' best fits the immediate
    sense.
- source_word: οὐκ ἔστιν ἐκ τοῦ θεοῦ
  chosen: is not from God
  alternatives:
  - is not of God
  - does not come from God
  lexicon: BDAG
  rationale: ἐκ with God here denotes source/origin and belonging. 'Is not from God'
    is natural modern English and preserves the source language without importing
    later doctrinal categories.
- source_word: ὁ μὴ ἀγαπῶν
  chosen: the one who does not love
  alternatives:
  - whoever does not love
  lexicon: BDAG
  rationale: The repeated articular participle is rendered with a parallel English
    construction to preserve the verse's rhetorical balance.
- source_word: ἀδελφὸν αὐτοῦ
  chosen: his brother
  alternatives:
  - his fellow believer
  - his brother or sister
  lexicon: BDAG
  rationale: ἀδελφός is grammatically masculine singular. Per the doctrine's gender-accurate
    principle, the main text preserves the masculine form. In 1 John the term often
    refers to a fellow believer, but the Greek wording itself is 'his brother,' so
    that is retained in the text rather than interpreted more expansively.
- source_word: καὶ
  chosen: and neither is
  alternatives:
  - and also
  - and
  lexicon: BDAG
  rationale: The second καὶ links an implied parallel clause back to 'is not from
    God.' Rendering it as 'and neither is' makes the ellipsis explicit in idiomatic
    English and preserves the logical force of the Greek.
