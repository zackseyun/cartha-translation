theological_decisions:
- issue: Familial language for moral/spiritual identity
  chosen_reading: children of God and children of the devil
  alternative_readings:
  - people belonging to God and people belonging to the devil
  rationale: The Greek uses explicit familial language (τέκνα), and the verse contrasts
    spiritual parentage or belonging through observable conduct. Retaining 'children'
    preserves Johannine theology and imagery without softening it into a generic category
    of 'people.'
  doctrine_reference: 'Affirmations; Translation philosophy #1 and #5'
- issue: Gendered term ἀδελφός
  chosen_reading: his brother
  alternative_readings:
  - his brother or sister
  - his fellow believer
  rationale: The source is grammatically masculine singular and the doctrine requires
    gender-accurate rendering over gender-neutral smoothing. Because the representative
    force may be broader in context, an inclusive alternative is preserved in a footnote
    rather than moved into the main text.
  doctrine_reference: 'Translation philosophy #4'
