id: 1JN.3.9
reference: 1 John 3:9
source:
  edition: SBLGNT
  text: πᾶς ὁ γεγεννημένος ἐκ τοῦ θεοῦ ἁμαρτίαν οὐ ποιεῖ, ὅτι σπέρμα αὐτοῦ ἐν αὐτῷ
    μένει, καὶ οὐ δύναται ἁμαρτάνειν, ὅτι ἐκ τοῦ θεοῦ γεγέννηται.
translation:
  text: Everyone who has been born of God does not practice sin, because his seed
    remains in him; and he is not able to keep sinning, because he has been born of
    God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'does not do sin' / 'does not commit sin.' The Greek
      wording likely refers to the ongoing practice of sin rather than a single act.
    reason: lexical_alternative
  - marker: b
    text: Or 'abides in him.'
    reason: lexical_alternative
  - marker: c
    text: More literally, 'he cannot sin.' In context, the Greek present infinitive
      likely carries the sense 'keep sinning' or 'go on sinning.'
    reason: alternative_reading
lexical_decisions:
- source_word: πᾶς ὁ γεγεννημένος
  chosen: Everyone who has been born
  alternatives:
  - Whoever has been born
  - Everyone born
  lexicon: BDAG
  rationale: πᾶς with the substantival perfect participle gives a generic class statement.
    'Everyone who has been born' preserves both the universal scope and the perfect
    aspect's resulting state better than a compressed form.
- source_word: ἐκ τοῦ θεοῦ
  chosen: of God
  alternatives:
  - from God
  lexicon: BDAG
  rationale: In Johannine new-birth language, ἐκ with γεννάω idiomatically expresses
    origin/source. 'Born of God' is established English that accurately conveys source
    without awkwardness.
- source_word: ἁμαρτίαν οὐ ποιεῖ
  chosen: does not practice sin
  alternatives:
  - does not do sin
  - does not commit sin
  lexicon: BDAG
  rationale: ποιέω with ἁμαρτίαν is more durative or characteristic than a single-act
    English 'commit' may suggest, especially in this context with the present tense
    and the following infinitive ἁμαρτάνειν. 'Practice sin' best captures ongoing
    pattern without overstating sinless perfection.
- source_word: σπέρμα αὐτοῦ
  chosen: his seed
  alternatives:
  - his offspring
  - his life-giving seed
  lexicon: BDAG
  rationale: σπέρμα is literally 'seed.' Because the referent is metaphorical and
    debated (God's life, word, generative principle), the translation keeps the concrete
    metaphor rather than interpreting it in the main text.
- source_word: ἐν αὐτῷ μένει
  chosen: remains in him
  alternatives:
  - abides in him
  lexicon: BDAG
  rationale: μένω is a key Johannine verb. 'Remains' is clear modern English and preserves
    the durative sense; 'abides' is possible but more traditional and less natural
    for the target audience.
- source_word: οὐ δύναται ἁμαρτάνειν
  chosen: he is not able to keep sinning
  alternatives:
  - he cannot sin
  - he is not able to sin
  lexicon: BDAG
  rationale: The present infinitive ἁμαρτάνειν in context most naturally points to
    ongoing or habitual action. Rendering it as 'keep sinning' preserves the aspectual
    force and avoids implying absolute incapacity to commit any individual sin, which
    would clash with 1 John 1:8–2:1.
- source_word: γεγέννηται
  chosen: he has been born
  alternatives:
  - he is born
  lexicon: BDAG
  rationale: The perfect tense again emphasizes the abiding result of new birth. 'Has
    been born' is more precise than the simple present 'is born' in contemporary English.
