theological_decisions:
- issue: Whether the verse teaches absolute sinless perfection or the incompatibility
    of new birth with ongoing sinful practice
  chosen_reading: The main text renders the Greek as excluding a continuing practice
    of sin, not every possible act of sin.
  alternative_readings:
  - Absolute incapacity to commit any sin
  rationale: The present-tense verbs ποιεῖ and ἁμαρτάνειν, especially in Johannine
    context, support a habitual/ongoing sense. This preserves tension with 1 John
    1:8–2:1 rather than flattening the epistle into contradiction. The translation
    therefore avoids the misleadingly absolute English 'cannot sin' in the main text
    while preserving it in a footnote as a formal alternative.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather
    than resolve it
- issue: Meaning of 'his seed'
  chosen_reading: The metaphor is left untranslated as 'his seed' rather than interpreted.
  alternative_readings:
  - God's word
  - God's life
  - God's nature
  rationale: The text itself does not specify the exact referent of σπέρμα. To avoid
    importing a doctrinally loaded interpretation, the concrete metaphor is preserved
    in the main text.
  doctrine_reference: Translation philosophy §1 and §3
