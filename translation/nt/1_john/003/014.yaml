theological_decisions:
- issue: Referent and gender force of ἀδελφοί
  chosen_reading: Rendered as 'the brothers' in the main text, with the likely inclusive
    sense preserved in a footnote.
  alternative_readings:
  - the brothers and sisters
  rationale: The Greek is grammatically masculine plural. Per doctrine, gender-accurate
    rendering is preferred over gender-neutral smoothing, while footnoting inclusivity
    where context makes it relevant. In 1 John, 'brothers' commonly refers to fellow
    believers as a community, likely including women, but the translation should not
    erase the source form in the main text.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Nature of 'death' and 'life'
  chosen_reading: Retained as 'death' and 'life' without interpretive expansion.
  alternative_readings:
  - spiritual death and eternal life
  - death's realm and life's realm
  rationale: The verse clearly speaks of a profound theological transition, but the
    text itself states it in compact metaphorical terms. To preserve theological tension
    and avoid importing more specificity than the Greek supplies, the translation
    leaves the terms unexpanded.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
