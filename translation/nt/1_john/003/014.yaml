id: 1JN.3.14
reference: 1 John 3:14
source:
  edition: SBLGNT
  text: ἡμεῖς οἴδαμεν ὅτι μεταβεβήκαμεν ἐκ τοῦ θανάτου εἰς τὴν ζωήν, ὅτι ἀγαπῶμεν
    τοὺς ἀδελφούς· ὁ μὴ ⸀ἀγαπῶν μένει ἐν τῷ θανάτῳ.
translation:
  text: We know that we have passed from death into life, because we love the brothers.
    The one who does not love remains in death.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the brothers and sisters'; the Greek says 'brothers' and in this context
      likely refers to fellow believers generally.
    reason: lexical_alternative
lexical_decisions:
- source_word: οἴδαμεν
  chosen: we know
  alternatives:
  - we have known
  lexicon: BDAG
  rationale: Perfect-form οἶδα functions as a present stative verb in Koine; 'we know'
    is the natural English equivalent.
- source_word: μεταβεβήκαμεν
  chosen: we have passed
  alternatives:
  - we have crossed over
  - we have transferred
  lexicon: BDAG
  rationale: Perfect tense indicates a completed transition with continuing result.
    'Have passed' preserves both the movement metaphor and the present state resulting
    from it.
- source_word: ἐκ τοῦ θανάτου εἰς τὴν ζωήν
  chosen: from death into life
  alternatives:
  - out of death into life
  - from death to life
  lexicon: BDAG
  rationale: The paired prepositions ἐκ...εἰς mark movement out of one realm and into
    another. 'Into life' better preserves εἰς than the flatter 'to life.'
- source_word: ἀγαπῶμεν
  chosen: we love
  alternatives:
  - we are loving
  lexicon: BDAG
  rationale: Present indicative expresses ongoing characteristic action. The default
    rendering for the ἀγαπάω/ἀγάπη word group is 'love' per doctrine guidance.
- source_word: τοὺς ἀδελφούς
  chosen: the brothers
  alternatives:
  - the brothers and sisters
  - the brethren
  lexicon: BDAG
  rationale: Gender-accurate policy favors retaining the masculine form where the
    Greek is masculine and representative. In Johannine usage this likely refers to
    fellow believers broadly, but the main text preserves the source form; an inclusive
    alternative is worth noting in a footnote.
- source_word: ὁ μὴ ἀγαπῶν
  chosen: the one who does not love
  alternatives:
  - whoever does not love
  - the one not loving
  lexicon: BDAG
  rationale: The articular present participle denotes a general class or characteristic
    person. 'The one who does not love' is clear modern English and preserves the
    generic singular force.
- source_word: μένει
  chosen: remains
  alternatives:
  - abides
  - stays
  lexicon: BDAG
  rationale: μένω is a key Johannine term often rendered 'abide,' but here 'remains'
    is more accessible while still conveying continued state. This is a documented
    readability-based exception.
- source_word: ἐν τῷ θανάτῳ
  chosen: in death
  alternatives:
  - in the realm of death
  - in death's domain
  lexicon: BDAG
  rationale: The prepositional phrase is metaphorical, denoting continued existence
    within the sphere of death. 'In death' is concise and faithful without over-interpreting
    the metaphor.
