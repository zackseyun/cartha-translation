theological_decisions:
- issue: Referent of ἐκεῖνος
  chosen_reading: A reference to Jesus Christ
  alternative_readings:
  - a more generic 'that one'
  rationale: In the immediate Johannine context, the one who 'appeared' to take away
    sins and in whom there is no sin is Jesus Christ. Rendering with 'he' keeps the
    Christological reference clear without importing extra doctrinal wording.
  doctrine_reference: 'Affirmations: Nicene Creed; Chalcedon'
- issue: Meaning of αἴρω with sins
  chosen_reading: remove/take away sins
  alternative_readings:
  - bear sins
  rationale: The verse emphasizes the purpose of Christ's appearing as the removal
    of sins. 'Take away' preserves this without narrowing the theology to one atonement
    model, thus maintaining the text's own emphasis and preserving theological tension
    where broader canonical theology may elaborate further.
  doctrine_reference: Translation philosophy §3 Preserve theological tension rather
    than resolve it
