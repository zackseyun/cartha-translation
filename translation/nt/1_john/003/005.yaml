id: 1JN.3.5
reference: 1 John 3:5
source:
  edition: SBLGNT
  text: καὶ οἴδατε ὅτι ἐκεῖνος ἐφανερώθη ἵνα τὰς ⸀ἁμαρτίας ἄρῃ, καὶ ἁμαρτία ἐν αὐτῷ
    οὐκ ἔστιν.
translation:
  text: And you know that he appeared in order to take away sins, and in him there
    is no sin.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to bear away sins.' The Greek verb can mean 'take away,' 'remove,' or
      'carry/bear away.'
    reason: lexical_alternative
  - marker: b
    text: Or 'was manifested.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οἴδατε
  chosen: you know
  alternatives:
  - you have known
  - you are aware
  lexicon: BDAG
  rationale: Perfect-form οἶδα commonly functions with present meaning in Koine; 'you
    know' is the natural English equivalent.
- source_word: ἐκεῖνος
  chosen: he
  alternatives:
  - that one
  lexicon: BDAG
  rationale: Though literally 'that one,' in Johannine usage it often refers emphatically
    to Christ. English 'he' is idiomatic here; the antecedent is clear from context.
- source_word: ἐφανερώθη
  chosen: appeared
  alternatives:
  - was revealed
  - was manifested
  lexicon: BDAG
  rationale: Passive of φανερόω here refers to Christ's historical appearing. 'Appeared'
    is clear modern English; 'was manifested' is more traditional but less natural.
- source_word: ἵνα
  chosen: in order to
  alternatives:
  - so that
  - for the purpose that
  lexicon: BDAG
  rationale: Marks purpose. 'In order to' preserves the purposive force more explicitly
    than a bare infinitive.
- source_word: ἁμαρτίας
  chosen: sins
  alternatives:
  - sinful acts
  lexicon: BDAG
  rationale: Plural accusative is best represented by plural 'sins,' preserving the
    concrete plurality in the Greek rather than flattening to singular.
- source_word: ἄρῃ
  chosen: take away
  alternatives:
  - remove
  - bear away
  lexicon: BDAG
  rationale: αἴρω can mean lift, carry, remove, or take away. In this context of Christ's
    appearing and sins as object, 'take away' best captures removal without over-specifying
    mechanism. 'Bear away' is possible but less transparent in modern English.
- source_word: ἁμαρτία
  chosen: sin
  alternatives:
  - sinfulness
  lexicon: BDAG
  rationale: Singular anarthrous noun in the clause 'sin is not in him' is best rendered
    simply 'sin,' expressing absolute moral sinlessness.
- source_word: ἐν αὐτῷ
  chosen: in him
  alternatives:
  - within him
  lexicon: BDAG
  rationale: Standard rendering of ἐν + dative; 'in him' preserves Johannine idiom
    and theological resonance.
