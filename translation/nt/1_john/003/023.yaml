theological_decisions:
- issue: Rendering Χριστός
  chosen_reading: Messiah
  alternative_readings:
  - Christ
  rationale: The doctrine file directs that Χριστός be translated as 'Messiah' where
    title is in view, with 'Christ' reserved for name-like usage. In this verse the
    phrase identifies the Son by his messianic title, so 'Jesus Messiah' is preferred.
  doctrine_reference: 'DOCTRINE.md Contested terms: Χριστός'
- issue: Force of πιστεύω τῷ ὀνόματι
  chosen_reading: believe in the name
  alternative_readings:
  - believe the name
  - trust in the name
  rationale: The phrase concerns faith directed toward Jesus as revealed in his name,
    not merely assent to a verbal label. 'Believe in the name' preserves Johannine
    theological usage without overexplaining it.
  doctrine_reference: DOCTRINE.md Translation philosophy §3
revisions:
- timestamp: '2026-04-21T01:21:48Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/nt/1_john/003/023.json
  category: awkward_english
  tier: 1
  from: just as he gave us command
  to: just as he gave us a command
  rationale: The current rendering 'gave us command' is unidiomatic English. While
    the Greek noun ἐντολὴν is anarthrous (lacks an article), the English construction
    'give [indirect object] command' is unnatural; 'gave us a command' is standard.
    The drafter's rationale to preserve lexical repetition is understandable, but
    it comes at the cost of natural English, and the Greek itself varies the form
    from ἡ ἐντολὴ to ἐντολήν. The suggested rewrite is more readable without losing
    meaning.
