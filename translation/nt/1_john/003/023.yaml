id: 1JN.3.23
reference: 1 John 3:23
source:
  edition: SBLGNT
  text: καὶ αὕτη ἐστὶν ἡ ἐντολὴ αὐτοῦ, ἵνα ⸀πιστεύσωμεν τῷ ὀνόματι τοῦ υἱοῦ αὐτοῦ
    Ἰησοῦ Χριστοῦ καὶ ἀγαπῶμεν ἀλλήλους, καθὼς ἔδωκεν ἐντολὴν ⸀ἡμῖν.
translation:
  text: 'And this is his command: that we believe in the name of his Son Jesus Christ
    and love one another, just as he gave us command.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Jesus Christ.' The Greek title Χριστός is rendered 'Messiah' here because
      it functions as a title rather than a name-like surname.
    reason: alternative_reading
  - marker: b
    text: Or 'trust in the name of his Son.'
    reason: lexical_alternative
  - marker: c
    text: Greek literally, 'just as he gave us command' or 'gave us a command.'
    reason: lexical_alternative
  - marker: d
    text: Or 'just as he gave us command'.
    reason: previous_rendering
lexical_decisions:
- source_word: ἐντολή
  chosen: command
  alternatives:
  - commandment
  lexicon: BDAG
  rationale: Rendered as 'command' for readable modern English while preserving the
    authoritative force of the noun. 'Commandment' is possible but sounds more traditional
    and less natural here. Kept singular in both occurrences to match the Greek.
- source_word: ἵνα πιστεύσωμεν
  chosen: that we believe
  alternatives:
  - that we may believe
  - that we should believe
  lexicon: BDAG
  rationale: After 'this is his command,' ἵνα introduces the content of the command.
    'That we believe' is idiomatic English and preserves the hortatory/subjunctive
    force without overtranslating.
- source_word: πιστεύω
  chosen: believe
  alternatives:
  - trust
  - have faith
  lexicon: BDAG
  rationale: The verb is rendered 'believe' as the most direct equivalent in Johannine
    usage. 'Trust' is a viable nuance, but 'believe' better matches the recurring
    diction of John and avoids importing a narrower emotional sense.
- source_word: τῷ ὀνόματι
  chosen: in the name
  alternatives:
  - the name
  - into the name
  lexicon: BDAG
  rationale: With πιστεύω plus dative, the sense is believing in or placing faith
    in the person as represented by the name. 'In the name' is standard and clear
    in English, preserving the biblical sense that the name signifies the person's
    revealed identity and authority.
- source_word: υἱοῦ
  chosen: Son
  lexicon: BDAG
  rationale: Capitalized as a christological reference to Jesus in relation to God
    the Father. This reflects the referential force of the phrase 'his Son' in context,
    not a change in lexical meaning.
- source_word: Ἰησοῦ Χριστοῦ
  chosen: Jesus Messiah
  alternatives:
  - Jesus Christ
  lexicon: BDAG
  rationale: Per project doctrine, Χριστός is translated as 'Messiah' where it functions
    as a title rather than a name-like fixed form. Here the phrase identifies 'his
    Son' and retains clear titular force, so 'Jesus Messiah' best preserves meaning.
- source_word: ἀγαπῶμεν
  chosen: love
  lexicon: BDAG
  rationale: Rendered with the project's default for ἀγαπάω/ἀγάπη. 'Love' is the natural
    and consistent English equivalent.
- source_word: ἀλλήλους
  chosen: one another
  alternatives:
  - each other
  lexicon: BDAG
  rationale: '''One another'' is the standard reciprocal expression in English Bible
    style and fits the communal ethic emphasized in 1 John.'
- source_word: καθὼς
  chosen: just as
  alternatives:
  - as
  - even as
  lexicon: BDAG
  rationale: Rendered 'just as' to mark comparison and correspondence with what was
    previously given.
- source_word: ἔδωκεν ἐντολὴν ἡμῖν
  chosen: he gave us command
  alternatives:
  - he commanded us
  - he gave us a command
  lexicon: BDAG
  rationale: The Greek uses the noun ἐντολή with δίδωμι, literally 'gave command/a
    command.' English normally requires the article 'a'; therefore the most idiomatic
    rendering would be 'gave us a command.' However, the phrase is kept close to the
    Greek structure here to preserve lexical repetition with the earlier singular
    'command.'
