id: 1JN.3.6
reference: 1 John 3:6
source:
  edition: SBLGNT
  text: πᾶς ὁ ἐν αὐτῷ μένων οὐχ ἁμαρτάνει· πᾶς ὁ ἁμαρτάνων οὐχ ἑώρακεν αὐτὸν οὐδὲ
    ἔγνωκεν αὐτόν.
translation:
  text: Everyone who remains in him does not keep on sinning; everyone who keeps on
    sinning has not seen him nor known him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'does not sin ... everyone who sins.' The Greek present-tense
      forms can be understood as describing ongoing or characteristic action, hence
      'does not keep on sinning ... keeps on sinning.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πᾶς ὁ
  chosen: Everyone who
  alternatives:
  - Whoever
  - Every one who
  lexicon: BDAG
  rationale: The articular construction with πᾶς functions generically, referring
    to any person in the stated category. 'Everyone who' is natural modern English
    and preserves the universal force.
- source_word: ἐν αὐτῷ μένων
  chosen: remains in him
  alternatives:
  - abides in him
  - stays in him
  lexicon: BDAG
  rationale: μένω is a key Johannine term often rendered 'abide,' but 'remains' communicates
    the continuing relational sense in accessible modern English. 'In him' is retained
    formally to preserve the union/relationship language.
- source_word: οὐχ ἁμαρτάνει
  chosen: does not keep on sinning
  alternatives:
  - does not sin
  - is not sinning
  lexicon: BDAG
  rationale: The present tense in this Johannine context is best represented as ongoing
    or characteristic action, especially in light of 1 John 1:8–2:2, which rules out
    an absolute claim of sinless perfection. 'Keep on sinning' preserves the durative/habitual
    force without paraphrasing beyond the context.
- source_word: ὁ ἁμαρτάνων
  chosen: who keeps on sinning
  alternatives:
  - who sins
  - the one sinning
  lexicon: BDAG
  rationale: The present participle likewise suggests ongoing or characteristic practice.
    Rendering it with 'keeps on sinning' maintains the parallel with the previous
    clause and avoids implying a single isolated act.
- source_word: οὐχ ἑώρακεν
  chosen: has not seen him
  alternatives:
  - has never seen him
  lexicon: BDAG
  rationale: The perfect tense indicates a present state resulting from not having
    seen him. 'Has not seen him' is sufficiently clear and preserves the verbal aspect
    without overtranslation.
- source_word: οὐδὲ ἔγνωκεν
  chosen: nor known him
  alternatives:
  - nor has known him
  - or known him
  lexicon: BDAG
  rationale: γινώσκω in Johannine usage often carries relational knowledge, not mere
    cognition. 'Known him' preserves that force. 'Nor' reflects οὐδὲ and keeps the
    tight linkage with the preceding perfect verb.
- source_word: αὐτῷ / αὐτόν
  chosen: him
  alternatives:
  - the Son
  - God
  - Christ
  lexicon: BDAG
  rationale: The pronoun's antecedent is left as 'him' in the Greek. The translation
    preserves the text's pronominal form rather than resolving the referent more explicitly
    than the source does.
