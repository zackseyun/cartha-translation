id: 1JN.3.13
reference: 1 John 3:13
source:
  edition: SBLGNT
  text: ⸀μὴ θαυμάζετε, ⸀ἀδελφοί, εἰ μισεῖ ὑμᾶς ὁ κόσμος.
translation:
  text: Do not be surprised, brothers, if the world hates you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: “Brothers” translates the masculine plural form and here likely addresses
      the whole community of believers, including women.
    reason: lexical_alternative
lexical_decisions:
- source_word: μὴ θαυμάζετε
  chosen: Do not be surprised
  alternatives:
  - Do not marvel
  - Do not wonder
  lexicon: BDAG
  rationale: Present active imperative with μή gives a prohibition. In contemporary
    English, 'be surprised' best conveys θαυμάζω here idiomatically without sounding
    archaic ('marvel') or overly cognitive ('wonder').
- source_word: ἀδελφοί
  chosen: brothers
  alternatives:
  - brothers and sisters
  - siblings
  lexicon: BDAG
  rationale: 'Vocative plural of ἀδελφός. Per doctrine, gender-accurate over gender-neutral:
    the Greek is grammatically masculine and likely addresses the Christian community
    representatively. ''Brothers'' preserves the form of address; inclusivity can
    be noted in a footnote.'
- source_word: εἰ
  chosen: if
  alternatives:
  - when
  - that
  lexicon: BDAG
  rationale: Standard conditional particle. Although the sense may imply a realistic
    condition, 'if' is the plain and sufficiently natural rendering without over-interpreting
    the force.
- source_word: μισεῖ
  chosen: hates
  alternatives:
  - is hating
  - detests
  lexicon: BDAG
  rationale: Present active indicative, third singular. Simple present 'hates' is
    natural English and reflects the ongoing general reality expressed in the Greek.
- source_word: ὁ κόσμος
  chosen: the world
  alternatives:
  - the world system
  - the world order
  lexicon: BDAG
  rationale: κόσμος in Johannine usage often denotes the human order in rebellion
    against God, but the standard rendering 'the world' preserves the theological
    breadth and familiar Johannine idiom without importing an interpretive expansion
    into the main text.
