theological_decisions:
- issue: Representative masculine address in ἀδελφοί
  chosen_reading: Retain 'brothers' in the main text
  alternative_readings:
  - brothers and sisters
  - siblings
  rationale: 'The translation follows the stated gender-accurate policy: preserve
    the masculine representative form in the main text rather than neutralizing it.
    Because the address likely includes the whole believing community, an inclusive
    explanation is preserved in a footnote rather than altering the main text.'
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over
    gender-neutral)
- issue: Johannine sense of κόσμος
  chosen_reading: Render as 'the world' without interpretive expansion
  alternative_readings:
  - the world system
  - society opposed to God
  rationale: In 1 John, κόσμος often carries theological weight as humanity organized
    in opposition to God. The main text preserves the lexical form 'world' and leaves
    the fuller theological nuance to context, avoiding paraphrase beyond what the
    source text warrants.
  doctrine_reference: DOCTRINE.md Translation philosophy §1 and §6
