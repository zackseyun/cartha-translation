theological_decisions:
- issue: Scope of 'brother'
  chosen_reading: Retain 'his brother' in the main text, with the sense of a fellow
    believer left implicit.
  alternative_readings:
  - his brother or sister
  - a fellow believer
  rationale: The immediate Johannine context concerns love within the believing community,
    but the Greek wording is masculine singular. Per doctrine, the translation keeps
    the gender-accurate form rather than resolving the representative force into an
    inclusive paraphrase in the main text.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Rendering of Johannine μένω
  chosen_reading: Use 'remaining' rather than 'abiding' in the main text.
  alternative_readings:
  - abiding in him
  rationale: This preserves the theological idea of continuing indwelling without
    relying on more traditional ecclesiastical diction. The alternative is worth preserving
    because μένω is a recurring Johannine theme often rendered 'abide.'
  doctrine_reference: DOCTRINE.md Translation philosophy §6
