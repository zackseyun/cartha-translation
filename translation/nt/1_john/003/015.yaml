id: 1JN.3.15
reference: 1 John 3:15
source:
  edition: SBLGNT
  text: πᾶς ὁ μισῶν τὸν ἀδελφὸν αὐτοῦ ἀνθρωποκτόνος ἐστίν, καὶ οἴδατε ὅτι πᾶς ἀνθρωποκτόνος
    οὐκ ἔχει ζωὴν αἰώνιον ἐν ⸀αὐτῷ μένουσαν.
translation:
  text: Everyone who hates his brother is a murderer, and you know that no murderer
    has eternal life remaining in him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'abiding in him.' The verb μένω is a key Johannine term often translated
      'abide' or 'remain.'
    reason: lexical_alternative
  - marker: b
    text: '''His brother'' likely refers in context to a fellow believer; the Greek
      is masculine singular.'
    reason: cultural_note
lexical_decisions:
- source_word: πᾶς ὁ μισῶν
  chosen: Everyone who hates
  alternatives:
  - Whoever hates
  - Everyone hating
  lexicon: BDAG
  rationale: 'The articular present participle expresses a general class: ''everyone
    who hates.'' This gives natural English while preserving the ongoing/characterizing
    force of the present participle.'
- source_word: ἀδελφὸν αὐτοῦ
  chosen: his brother
  alternatives:
  - his fellow believer
  - his brother or sister
  lexicon: BDAG
  rationale: The Greek is singular masculine and, in Johannine usage, commonly refers
    to a fellow member of the believing community. Per doctrine, gender-accurate rendering
    is preferred over gender-neutral. 'His brother' preserves the source form; broader
    inclusive implications can be noted in a footnote.
- source_word: ἀνθρωποκτόνος
  chosen: murderer
  alternatives:
  - manslayer
  - human-killer
  lexicon: BDAG
  rationale: The standard idiomatic English equivalent is 'murderer.' It preserves
    the moral force of the term better than the wooden 'human-killer' and is more
    natural than 'manslayer' in modern English.
- source_word: οἴδατε
  chosen: you know
  alternatives:
  - you all know
  - you know well
  lexicon: BDAG
  rationale: Second person plural is naturally rendered 'you know' in contemporary
    English. The plural is implicit in English and does not require expansion unless
    emphasis is needed.
- source_word: πᾶς ἀνθρωποκτόνος οὐκ ἔχει
  chosen: no murderer has
  alternatives:
  - every murderer does not have
  - every murderer has no
  lexicon: BDAG
  rationale: English idiom prefers 'no murderer has' rather than a more literal but
    awkward negated universal construction. The meaning is unchanged.
- source_word: ζωὴν αἰώνιον
  chosen: eternal life
  alternatives:
  - everlasting life
  lexicon: BDAG
  rationale: '''Eternal life'' is the standard and contextually appropriate rendering
    in Johannine literature, preserving both duration and theological quality of life.'
- source_word: ἐν αὐτῷ μένουσαν
  chosen: remaining in him
  alternatives:
  - abiding in him
  - dwelling in him
  lexicon: BDAG
  rationale: μένω is a key Johannine term often rendered 'abide/remain.' 'Remaining'
    is chosen for readable modern English while preserving the durative sense. Because
    'abiding' is also an important Johannine rendering, it is preserved in a footnote
    as a lexical alternative.
