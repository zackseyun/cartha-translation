theological_decisions:
- issue: Referent of αὐτῷ and ἐκεῖνος
  chosen_reading: Both most naturally refer to Christ/the Son in the immediate context,
    but the translation leaves the pronouns explicit rather than replacing them with
    a title.
  alternative_readings:
  - αὐτῷ refers to God the Father
  - the pronouns intentionally retain some ambiguity between Father and Son
  rationale: The preceding context (especially the expectation of seeing him as he
    is) strongly favors reference to Christ, yet the Greek text itself uses pronouns
    rather than naming the referent. To preserve theological tension rather than resolve
    it beyond the text, the English keeps 'him' and 'that one.'
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
- issue: Generic masculine reflexive ἑαυτὸν
  chosen_reading: Render as 'himself' in line with the masculine singular generic
    construction.
  alternative_readings:
  - oneself
  - themselves
  rationale: The project's policy is gender-accurate over gender-neutral where the
    source is grammatically masculine with representative force. Because 'everyone'
    already signals generic scope, 'himself' best reflects the Greek form while remaining
    understandable.
  doctrine_reference: 'Translation philosophy §4: Gender-accurate over gender-neutral.'
