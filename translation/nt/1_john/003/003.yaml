id: 1JN.3.3
reference: 1 John 3:3
source:
  edition: SBLGNT
  text: καὶ πᾶς ὁ ἔχων τὴν ἐλπίδα ταύτην ἐπ’ αὐτῷ ἁγνίζει ἑαυτὸν καθὼς ἐκεῖνος ἁγνός
    ἐστιν.
translation:
  text: And everyone who has this hope set on him purifies himself, just as that one
    is pure.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'has this hope in him.' The Greek phrase can be rendered either way;
      'set on him' makes the object of hope more explicit.
    reason: lexical_alternative
  - marker: b
    text: '''That one'' most likely refers to the Son/Christ in context, though the
      Greek leaves the referent as a pronoun.'
    reason: alternative_reading
lexical_decisions:
- source_word: πᾶς ὁ ἔχων
  chosen: everyone who has
  alternatives:
  - everyone having
  - everyone who holds
  lexicon: BDAG
  rationale: The articular participle functions substantivally and generically. 'Everyone
    who has' is natural English and preserves the ongoing, characteristic sense of
    the present participle without wooden phrasing.
- source_word: ἐλπίδα
  chosen: hope
  lexicon: BDAG
  rationale: Standard rendering for ἐλπίς; in context it denotes confident expectation
    grounded in the preceding promise, not mere wishfulness.
- source_word: ταύτην
  chosen: this
  alternatives:
  - this very
  lexicon: BDAG
  rationale: Simple demonstrative pointing back to the hope just mentioned in the
    context; 'this' is sufficient in English.
- source_word: ἐπ’ αὐτῷ
  chosen: set on him
  alternatives:
  - in him
  - on him
  lexicon: BDAG
  rationale: The preposition ἐπί with dative here expresses the object or basis on
    which the hope rests. 'Set on him' makes the relational force clear in idiomatic
    English. 'In him' is possible and traditional, but can sound less precise about
    the direction of hope.
- source_word: ἁγνίζει
  chosen: purifies
  alternatives:
  - makes pure
  - cleanses
  lexicon: BDAG
  rationale: ἁγνίζω denotes purification, often with moral or ritual overtones. 'Purifies'
    preserves the verbal connection with ἁγνός ('pure') later in the verse and fits
    Johannine ethical emphasis.
- source_word: ἑαυτὸν
  chosen: himself
  alternatives:
  - oneself
  lexicon: BDAG
  rationale: The Greek is grammatically masculine singular in a generic construction.
    Per the translation philosophy, gender-accurate rendering is preferred over flattening
    to gender-neutral language. The generic force is carried by 'everyone'.
- source_word: καθὼς
  chosen: just as
  alternatives:
  - as
  - even as
  lexicon: BDAG
  rationale: '''Just as'' clearly marks comparison and is idiomatic modern English.'
- source_word: ἐκεῖνος
  chosen: that one
  alternatives:
  - he
  - Christ
  lexicon: BDAG
  rationale: Johannine usage often uses ἐκεῖνος reverentially for Christ or God depending
    on context. 'That one' preserves the Greek demonstrative emphasis without over-interpreting
    by inserting a title not present in the text.
- source_word: ἁγνός
  chosen: pure
  alternatives:
  - clean
  - undefiled
  lexicon: BDAG
  rationale: Best lexical match in this ethical context, and it preserves the wordplay/cognate
    relation with ἁγνίζει ('purifies').
