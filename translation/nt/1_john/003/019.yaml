id: 1JN.3.19
reference: 1 John 3:19
source:
  edition: SBLGNT
  text: ⸀ἐν τούτῳ ⸀γνωσόμεθα ὅτι ἐκ τῆς ἀληθείας ἐσμέν, καὶ ἔμπροσθεν αὐτοῦ πείσομεν
    ⸂τὴν καρδίαν⸃ ἡμῶν
translation:
  text: By this we will know that we are from the truth, and before him we will reassure
    our hearts,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'we are of the truth' or 'we belong to the truth.'
    reason: lexical_alternative
  - marker: b
    text: Or 'we will persuade our heart' or 'we will set our hearts at ease before
      him.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν τούτῳ
  chosen: By this
  alternatives:
  - In this
  - By this means
  lexicon: BDAG
  rationale: The phrase is idiomatic and points to the means or basis by which the
    following knowledge is obtained. 'By this' is natural English and preserves the
    demonstrative force without over-paraphrasing.
- source_word: γνωσόμεθα
  chosen: we will know
  alternatives:
  - we will come to know
  - we shall know
  lexicon: BDAG
  rationale: Future middle indicative of γινώσκω. 'We will know' is the most straightforward
    rendering in modern English. 'Come to know' is possible but adds an ingressive
    nuance not required by the form alone.
- source_word: ἐκ τῆς ἀληθείας ἐσμέν
  chosen: we are from the truth
  alternatives:
  - we are of the truth
  - we belong to the truth
  lexicon: BDAG
  rationale: ἐκ with 'truth' expresses source/origin or derivation. 'From the truth'
    is more transparent to the Greek than the traditional 'of the truth,' while still
    readable. 'Belong to the truth' is interpretive and therefore left as an alternative
    rather than the main text.
- source_word: ἀληθείας
  chosen: truth
  lexicon: BDAG
  rationale: Standard rendering of ἀλήθεια. In Johannine usage it can carry rich theological
    force, but nothing in this verse warrants expanding it beyond 'truth'.
- source_word: ἔμπροσθεν αὐτοῦ
  chosen: before him
  alternatives:
  - in his presence
  lexicon: BDAG
  rationale: A spatial-relational expression meaning 'before' or 'in the presence
    of.' 'Before him' is concise and formally close; 'in his presence' is a valid
    dynamic alternative.
- source_word: πείσομεν
  chosen: we will reassure
  alternatives:
  - we will persuade
  - we will set at ease
  - we will convince
  lexicon: BDAG
  rationale: Future active of πείθω. In this context with 'our heart' as object, the
    sense is not mere persuasion in argument but calming or assuring the inner person
    before God. 'Reassure' best captures the contextual meaning in natural English
    while remaining faithful to the semantic range.
- source_word: τὴν καρδίαν ἡμῶν
  chosen: our hearts
  alternatives:
  - our heart
  lexicon: BDAG
  rationale: Although Greek has singular 'heart,' English commonly uses the distributive
    plural with a plural subject ('our hearts'). This preserves the sense idiomatically
    without changing meaning. A more formally singular rendering is possible but less
    natural in English.
