id: 1JN.3.4
reference: 1 John 3:4
source:
  edition: SBLGNT
  text: Πᾶς ὁ ποιῶν τὴν ἁμαρτίαν καὶ τὴν ἀνομίαν ποιεῖ, καὶ ἡ ἁμαρτία ἐστὶν ἡ ἀνομία.
translation:
  text: Everyone who practices sin also practices lawlessness, and sin is lawlessness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Everyone who does sin also does lawlessness'; the Greek present forms
      can be rendered more literally as 'does,' but here 'practices' brings out the
      characteristic or ongoing sense in context.
    reason: lexical_alternative
  - marker: b
    text: Or 'sin is the lawlessness.' Greek uses the article with both nouns, but
      idiomatic English usually omits it in this kind of definitional statement.
    reason: lexical_alternative
lexical_decisions:
- source_word: Πᾶς ὁ ποιῶν
  chosen: Everyone who practices
  alternatives:
  - Everyone who does
  - Whoever commits
  lexicon: BDAG
  rationale: 'The articular present participle has a generic force: ''everyone/whoever
    who is doing.'' ''Everyone who practices'' best captures the customary or characteristic
    sense often conveyed by the present participle in this context, without overstating
    it as a technical habitual tense. ''Everyone'' avoids an unnecessarily masculine
    English form while preserving the generic reference.'
- source_word: τὴν ἁμαρτίαν
  chosen: sin
  alternatives:
  - the sin
  lexicon: BDAG
  rationale: Although the noun is articular in Greek, English idiom normally omits
    the article in a generic or abstract use. Here it refers to sin as a category
    or practice, not a specific act previously identified.
- source_word: καὶ τὴν ἀνομίαν ποιεῖ
  chosen: also practices lawlessness
  alternatives:
  - also does lawlessness
  - also commits lawlessness
  lexicon: BDAG
  rationale: Repeating 'practices' preserves the verbal parallel with ποιῶν/ποιεῖ
    and keeps the clause readable in modern English. 'Lawlessness' is the most direct
    rendering of ἀνομία, preserving the relation to νόμος ('law') and avoiding interpretive
    paraphrases such as 'breaking God's law' in the main text.
- source_word: ἀνομία
  chosen: lawlessness
  alternatives:
  - lawbreaking
  - iniquity
  lexicon: BDAG
  rationale: '''Lawlessness'' is the most transparent lexical equivalent and preserves
    the theological weight of the term. ''Lawbreaking'' is more interpretive and narrower;
    ''iniquity'' is traditional but less accessible for modern readers.'
- source_word: καὶ ἡ ἁμαρτία ἐστὶν ἡ ἀνομία
  chosen: and sin is lawlessness
  alternatives:
  - and sin is the lawlessness
  - and sin is law-breaking
  lexicon: BDAG
  rationale: This clause is definitional. English naturally drops the articles in
    a predicate nominative construction of abstract nouns. 'Sin is lawlessness' preserves
    the stark equivalence John states without softening it into a mere example or
    consequence.
