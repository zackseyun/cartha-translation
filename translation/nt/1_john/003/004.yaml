theological_decisions:
- issue: Whether to render John's present-tense verbs as simple occurrence ('does/commits')
    or characteristic action ('practices')
  chosen_reading: 'characteristic action: ''practices'''
  alternative_readings:
  - does
  - commits
  rationale: In the immediate context of 1 John 3, the present forms commonly describe
    ongoing or characteristic conduct rather than a single isolated act. Rendering
    with 'practices' helps preserve that aspectual force and avoids implying that
    any one act is the sole point of the statement. This reflects translation rather
    than doctrinal harmonization.
  doctrine_reference: Translation philosophy §3, §5
- issue: Meaning of ἀνομία in the defining clause
  chosen_reading: lawlessness
  alternative_readings:
  - law-breaking
  - iniquity
  rationale: The text identifies sin with ἀνομία in a compressed, theological definition.
    'Lawlessness' preserves the lexical and theological tension without importing
    a fuller doctrinal explanation such as explicit reference to Mosaic law or merely
    civil transgression.
  doctrine_reference: Translation philosophy §1, §3
