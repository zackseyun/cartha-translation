id: 1JN.3.18
reference: 1 John 3:18
source:
  edition: SBLGNT
  text: ⸀Τεκνία, μὴ ἀγαπῶμεν λόγῳ μηδὲ τῇ γλώσσῃ ἀλλὰ ἐν ἔργῳ καὶ ἀληθείᾳ.
translation:
  text: Little children, let us not love in word or with the tongue, but in deed and
    truth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'nor in speech'; Greek literally 'nor with the tongue.'
    reason: lexical_alternative
  - marker: b
    text: Or 'in action and truth.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Τεκνία
  chosen: Little children
  alternatives:
  - Children
  - Dear children
  lexicon: BDAG
  rationale: Vocative plural diminutive of τεκνίον, used affectionately by the author.
    'Little children' preserves both the familial address and the diminutive tenderness
    better than the flatter 'children.' 'Dear children' captures tone but imports
    'dear,' which is not explicit in the Greek.
- source_word: μὴ ἀγαπῶμεν
  chosen: let us not love
  alternatives:
  - we should not love
  - do not let us love
  lexicon: BDAG
  rationale: Present active subjunctive with μή in a hortatory/prohibitive sense.
    'Let us not love' naturally reflects the first-person plural exhortation without
    over-paraphrasing.
- source_word: λόγῳ
  chosen: in word
  alternatives:
  - with words
  - by word
  lexicon: BDAG
  rationale: Dative singular of λόγος here denotes verbal expression. 'In word' preserves
    the concise idiom and pairs well with the following contrast. 'With words' is
    possible but slightly more interpretive.
- source_word: μηδὲ τῇ γλώσσῃ
  chosen: or with the tongue
  alternatives:
  - nor with the tongue
  - nor in speech
  lexicon: BDAG
  rationale: γλῶσσα literally means 'tongue' and here functions metonymically for
    speech. Rendering it literally preserves the rhetorical parallelism with λόγῳ
    while remaining intelligible in English. 'In speech' is smoother but loses the
    concrete imagery.
- source_word: ἀλλὰ
  chosen: but
  alternatives:
  - rather
  lexicon: BDAG
  rationale: Strong adversative marking contrast between merely verbal love and enacted
    love. 'But' is the most natural English equivalent here.
- source_word: ἐν ἔργῳ
  chosen: in deed
  alternatives:
  - in action
  - with deeds
  lexicon: BDAG
  rationale: ἔργον denotes deed/action/work. 'In deed' preserves the formal parallel
    with 'in word' and echoes established English phrasing without becoming archaic
    in this context. 'In action' is possible but less tightly paired.
- source_word: καὶ ἀληθείᾳ
  chosen: and truth
  alternatives:
  - and in truth
  - and sincerity
  - and genuineness
  lexicon: BDAG
  rationale: ἀλήθεια commonly means 'truth.' Here it likely denotes love that is genuine
    and aligned with reality, but 'truth' best preserves the lexical value and Johannine
    resonance. More interpretive renderings like 'sincerity' narrow the sense too
    much.
