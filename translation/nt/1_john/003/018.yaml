theological_decisions:
- issue: Sense of 'truth' in the phrase 'in deed and truth'
  chosen_reading: Retain 'truth' rather than interpretively narrowing it to 'sincerity'
    or 'genuineness.'
  alternative_readings:
  - sincerity
  - genuineness
  rationale: 'Johannine usage gives ἀλήθεια theological depth beyond mere subjective
    sincerity. Keeping ''truth'' preserves the text''s possible double force: authentic
    love expressed in concrete action and love consistent with God''s truth.'
  doctrine_reference: 'Translation philosophy #3, preserve theological tension rather
    than resolve it.'
