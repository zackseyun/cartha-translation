theological_decisions:
- issue: Meaning of 'the love of God' (genitive ambiguity)
  chosen_reading: Rendered literally as 'the love of God' without resolving whether
    it means God's love in the person or the person's love for God.
  alternative_readings:
  - God's love
  - love for God
  rationale: The Greek genitive is capable of more than one construal, and Johannine
    theology intentionally intertwines divine love received and expressed. Preserving
    the literal phrase maintains the theological tension rather than collapsing it
    into one interpretation.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
- issue: Gender rendering of ἀδελφὸν
  chosen_reading: brother
  alternative_readings:
  - brother or sister
  - fellow believer
  rationale: The source is masculine singular and should be rendered in a gender-accurate
    way in the main text. Broader application can be acknowledged in a footnote rather
    than neutralizing the lexical form.
  doctrine_reference: 'Translation philosophy §4: Gender-accurate over gender-neutral.'
