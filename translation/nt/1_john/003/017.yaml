id: 1JN.3.17
reference: 1 John 3:17
source:
  edition: SBLGNT
  text: ὃς δ’ ἂν ἔχῃ τὸν βίον τοῦ κόσμου καὶ θεωρῇ τὸν ἀδελφὸν αὐτοῦ χρείαν ἔχοντα
    καὶ κλείσῃ τὰ σπλάγχνα αὐτοῦ ἀπ’ αὐτοῦ, πῶς ἡ ἀγάπη τοῦ θεοῦ μένει ἐν αὐτῷ;
translation:
  text: But whoever has the world's goods and sees his brother in need, yet closes
    his heart against him—how does the love of God remain in him?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'brother or sister'; the Greek says 'brother' and may refer representatively
      to a fellow believer.
    reason: lexical_alternative
  - marker: b
    text: Or 'shuts his compassion from him'; literally, 'closes his inward parts
      from him,' an idiom for withholding heartfelt compassion.
    reason: lexical_alternative
  - marker: c
    text: '''The love of God'' may mean God''s love present in him, or his love for
      God.'
    reason: alternative_reading
lexical_decisions:
- source_word: βίον τοῦ κόσμου
  chosen: the world's goods
  alternatives:
  - the livelihood of the world
  - the world's possessions
  - this world's goods
  lexicon: BDAG
  rationale: βίος can denote means of life, livelihood, or material possessions. In
    this context of meeting a brother's need, the sense is material resources rather
    than 'life' abstractly. 'The world's goods' is idiomatic modern English and preserves
    the genitive sense of worldly/material possessions.
- source_word: θεωρῇ
  chosen: sees
  alternatives:
  - observes
  - looks at
  - notices
  lexicon: BDAG
  rationale: θεωρέω can mean to observe or behold, but in this ethical context a simple
    present 'sees' best conveys direct awareness without sounding overly formal.
- source_word: ἀδελφὸν
  chosen: brother
  alternatives:
  - brother or sister
  - fellow believer
  lexicon: BDAG
  rationale: The Greek is grammatically masculine singular. Per doctrine, gender-accurate
    rendering is preferred over gender-neutral. In Johannine usage, 'brother' can
    represent a fellow believer, but the translation should not replace the lexical
    form with an interpretive gloss in the main text.
- source_word: χρείαν ἔχοντα
  chosen: in need
  alternatives:
  - having need
  - being needy
  lexicon: BDAG
  rationale: The participial expression literally means 'having need.' 'In need' is
    natural English and accurately conveys the state of lacking necessities.
- source_word: κλείσῃ τὰ σπλάγχνα αὐτοῦ ἀπ’ αὐτοῦ
  chosen: closes his heart against him
  alternatives:
  - shuts up his compassion from him
  - closes his affections against him
  - shuts his heart to him
  lexicon: BDAG
  rationale: σπλάγχνα literally refers to inward parts and idiomatically to compassion
    or deep affections. 'Closes his heart against him' communicates the metaphor clearly
    in modern English while preserving the force of deliberate refusal. 'Against him'
    reflects ἀπ’ αὐτοῦ as withdrawal from the needy brother.
- source_word: πῶς
  chosen: how does
  alternatives:
  - how can
  - in what way does
  lexicon: BDAG
  rationale: πῶς introduces a rhetorical question. 'How does' preserves the Greek
    form without adding the interpretive modal force of 'how can,' though the rhetorical
    impossibility is still implied.
- source_word: ἡ ἀγάπη τοῦ θεοῦ
  chosen: the love of God
  alternatives:
  - God's love
  - love for God
  lexicon: BDAG
  rationale: ἀγάπη is rendered by the doctrinal default 'love.' The genitive τοῦ θεοῦ
    could grammatically be understood as either God's love for the person or the person's
    love for God, but in Johannine ethical contexts the phrase commonly points to
    God's love operative in the believer. The more literal 'the love of God' preserves
    this ambiguity better than paraphrase.
- source_word: μένει ἐν αὐτῷ
  chosen: remain in him
  alternatives:
  - abide in him
  - stay in him
  lexicon: BDAG
  rationale: μένω is a key Johannine term often rendered 'abide' or 'remain.' 'Remain'
    is more accessible modern English while preserving the durative relational sense.
