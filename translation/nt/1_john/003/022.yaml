id: 1JN.3.22
reference: 1 John 3:22
source:
  edition: SBLGNT
  text: καὶ ὃ ⸀ἐὰν αἰτῶμεν λαμβάνομεν ⸀ἀπ’ αὐτοῦ, ὅτι τὰς ἐντολὰς αὐτοῦ τηροῦμεν καὶ
    τὰ ἀρεστὰ ἐνώπιον αὐτοῦ ποιοῦμεν.
translation:
  text: And whatever we ask, we receive from him, because we keep his commandments
    and do what is pleasing before him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in his sight.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὃ ἐὰν
  chosen: whatever
  alternatives:
  - whatever things
  - whatever ... if
  lexicon: BDAG
  rationale: The relative pronoun with ἐάν forms an indefinite relative construction
    meaning 'whatever' or 'whatever thing(s).' English idiom favors the compact 'whatever.'
- source_word: αἰτῶμεν
  chosen: we ask
  alternatives:
  - we request
  lexicon: BDAG
  rationale: αἰτέω commonly means 'ask' or 'request,' especially in petitionary contexts.
    'Ask' is the most natural and standard rendering here.
- source_word: λαμβάνομεν
  chosen: we receive
  alternatives:
  - we are receiving
  - we obtain
  lexicon: BDAG
  rationale: 'Present indicative is best rendered as a general present: ''we receive.''
    ''Obtain'' is possible but less natural in this context.'
- source_word: ἀπ’ αὐτοῦ
  chosen: from him
  alternatives:
  - from Him
  lexicon: BDAG
  rationale: 'ἀπό with the genitive marks source: ''from him.'' Lowercase pronouns
    are standard in modern English and do not diminish reverence.'
- source_word: ὅτι
  chosen: because
  alternatives:
  - that
  lexicon: BDAG
  rationale: Here ὅτι gives the reason for receiving what is asked, not merely content.
    'Because' makes the causal force explicit in English.
- source_word: τὰς ἐντολὰς αὐτοῦ
  chosen: his commandments
  alternatives:
  - his commands
  lexicon: BDAG
  rationale: ἐντολή is well rendered as 'commandment' in Johannine literature, preserving
    continuity with the author's ethical and theological vocabulary. 'Commands' is
    possible but slightly flatter.
- source_word: τηροῦμεν
  chosen: we keep
  alternatives:
  - we obey
  - we observe
  lexicon: BDAG
  rationale: τηρέω in Johannine usage often carries the sense of keeping, guarding,
    or observing commandments. 'Keep' preserves this established nuance better than
    the more interpretive 'obey.'
- source_word: τὰ ἀρεστὰ
  chosen: what is pleasing
  alternatives:
  - the things that are pleasing
  - what pleases him
  lexicon: BDAG
  rationale: The neuter plural adjective used substantivally refers to things pleasing
    to God. 'What is pleasing' is natural English and preserves the broad ethical
    sense without over-specifying the object.
- source_word: ἐνώπιον αὐτοῦ
  chosen: before him
  alternatives:
  - in his sight
  - in his presence
  lexicon: BDAG
  rationale: ἐνώπιον literally means 'before' or 'in the sight of.' 'Before him' is
    a transparent rendering; 'in his sight' is also possible and idiomatic.
- source_word: ποιοῦμεν
  chosen: we do
  alternatives:
  - we practice
  lexicon: BDAG
  rationale: ποιέω is the ordinary verb 'do' or 'make.' 'We do' fits the immediate
    object 'what is pleasing' and avoids importing a more habitual nuance than the
    Greek requires.
