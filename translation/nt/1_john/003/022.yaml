theological_decisions:
- issue: Relationship between answered prayer and obedience
  chosen_reading: 'The verse is translated with its stated causal connection intact:
    believers receive from him because they keep his commandments and do what pleases
    him.'
  alternative_readings:
  - A looser rendering that weakens the causal force to mere association
  rationale: The Greek explicitly uses ὅτι to give a reason. The translation should
    preserve the text's theological tension without softening it into a non-causal
    statement or expanding it into a mechanistic formula for prayer.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
