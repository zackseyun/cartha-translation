theological_decisions:
- issue: Whether τὸ πνεῦμα τοῦ θεοῦ refers specifically to the Holy Spirit or generically to a spirit from God
  chosen_reading: Rendered 'the Spirit of God' as a reference to God's Spirit, contrasted with 'every spirit' in the following clause.
  alternative_readings:
  - the spirit from God
  - the divine spirit generically
  rationale: In context, the verse gives the criterion by which one discerns the true divine Spirit over against false spirits. The singular with article naturally points to God's Spirit. This does not overread the text but reflects the immediate argument of 4:1–3.
  doctrine_reference: 'Affirmations: Nicene Creed; Translation philosophy §1, §6'
- issue: Christological force of ἐν σαρκὶ ἐληλυθότα
  chosen_reading: Rendered to affirm real incarnation without importing later creedal terminology into the main text.
  alternative_readings:
  - come as a human
  - come in human nature
  rationale: The phrase directly affirms that Jesus Messiah truly came in flesh. Because the doctrine statement affirms Chalcedonian orthodoxy, the translation must not weaken the incarnation; however, it should also not insert technical theological language absent from the Greek. 'Having come in the flesh' preserves the text's own wording and force.
  doctrine_reference: 'Affirmations: Definition of Chalcedon; Translation philosophy §3'
revisions:
- timestamp: '2026-04-21T01:19:48Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/nt/1_john/004/002.json
  category: awkward_english
  tier: 1
  from: confesses Jesus Messiah as having come in the flesh
  to: confesses that Jesus Messiah has come in the flesh
  rationale: The current rendering of the accusative + participle construction (Ἰησοῦν Χριστὸν... ἐληλυθότα) with 'as having come' is grammatically literal but awkward in English. A more idiomatic and clearer translation of this common Greek construction is a 'that' clause. The suggested rewrite is more natural, accurately reflects the meaning, and captures the perfect tense of the participle. The nuance of the perfect participle's ongoing results is already well-handled by the existing footnote, making the main text a good place for this smoother rendering.
