theological_decisions:
- issue: Sense of ἐν ἡμῖν in the first clause
  chosen_reading: 'locative/communal: ''among us'''
  alternative_readings:
  - '''in us'' as inward indwelling'
  - '''for us'' as benefactive'
  rationale: The phrase can be heard as inwardly locative, but in this immediate context
    John moves between God's love manifested in the community and mutual indwelling.
    'Among us' best captures the communal dimension without denying personal participation.
    'For us' is too interpretive and weakly supported by ἐν.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    theological tension rather than resolve it beyond the text'
- issue: Rendering of αὐτῷ
  chosen_reading: '''him'' in the main text'
  alternative_readings:
  - '''that person'''
  rationale: The Greek is grammatically masculine singular and representative. Per
    doctrine, gender-accurate rendering is preferred over gender-neutral smoothing;
    inclusivity can be noted in a footnote rather than altering the main text.
  doctrine_reference: 'Translation philosophy §4: Gender-accurate over gender-neutral'
