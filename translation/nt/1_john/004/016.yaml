  from: have come to know and have believed
  to: have come to know and believe
  rationale: The current rendering is precise in its handling of the two parallel
    perfect verbs. However, the repetition of the auxiliary 'have' is slightly cumbersome
    in English. A more natural and idiomatic phrasing would be 'have come to know
    and believe,' where the perfect aspect from 'have' is understood to carry over
    to the second verb. This change would improve the flow of the sentence without
    losing any significant meaning.
