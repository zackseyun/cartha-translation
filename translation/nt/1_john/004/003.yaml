id: 1JN.4.3
reference: 1 John 4:3
source:
  edition: SBLGNT
  text: καὶ πᾶν πνεῦμα ὃ μὴ ὁμολογεῖ ⸀τὸν ⸀Ἰησοῦν ἐκ τοῦ θεοῦ οὐκ ἔστιν· καὶ τοῦτό ἐστιν τὸ τοῦ ἀντιχρίστου, ὃ ἀκηκόατε ὅτι ἔρχεται, καὶ νῦν ἐν τῷ κόσμῳ ἐστὶν ἤδη.
translation:
  text: and every spirit that does not confess Jesus is not from God. And this is the spirit of the antichrist, which you have heard is coming, and now is already in the world.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Some manuscripts read, 'does not confess that Jesus Messiah has come in the flesh.'
    reason: textual_variant
  - marker: b
    text: 'Or, more explicitly, ''this is the spirit of the antichrist.'' The Greek is elliptical: literally, ''this is that of the antichrist.'''
    reason: lexical_alternative
  - marker: c
    text: Or 'this is that of the antichrist'.
    reason: previous_rendering
lexical_decisions:
- source_word: πᾶν πνεῦμα
  chosen: every spirit
  alternatives:
  - every Spirit
  lexicon: BDAG
  rationale: 'πᾶν with neuter singular πνεῦμα is distributive: ''every spirit.'' In context John is testing spiritual influences/claims, not referring to the Holy Spirit here, so lowercase ''spirit'' is appropriate.'
- source_word: ὁμολογεῖ τὸν Ἰησοῦν
  chosen: confess Jesus
  alternatives:
  - acknowledge Jesus
  - confess that Jesus has come in the flesh
  lexicon: BDAG
  rationale: The SBLGNT text here reads simply 'confess Jesus,' not the longer expansion found in some manuscripts. 'Confess' preserves the verbal and public-allegiance sense of ὁμολογέω better than 'acknowledge.' The fuller christological wording is preserved as a textual-variant footnote.
- source_word: ἐκ τοῦ θεοῦ
  chosen: from God
  alternatives:
  - of God
  lexicon: BDAG
  rationale: ἐκ denotes source/origin. 'From God' is idiomatic modern English and preserves the sense of derivation better than the more traditional but less natural 'of God.'
- source_word: τοῦτό ἐστιν τὸ τοῦ ἀντιχρίστου
  chosen: this is that of the antichrist
  alternatives:
  - this is the spirit of the antichrist
  - this belongs to the antichrist
  lexicon: BDAG
  rationale: The Greek text is elliptical and does not repeat πνεῦμα. A more explicit English expansion ('the spirit of') is interpretive and reflects later/traditional wording. 'That of the antichrist' preserves the ellipsis while remaining intelligible, with the common expanded rendering noted as an alternative.
- source_word: ἀντιχρίστου
  chosen: the antichrist
  alternatives:
  - antichrist
  lexicon: BDAG
  rationale: With the article in Greek, the phrase points to the known antichrist expectation in Johannine usage. Rendering with 'the' preserves that specificity.
- source_word: ἀκηκόατε ὅτι ἔρχεται
  chosen: you have heard is coming
  alternatives:
  - you heard that it is coming
  - you have heard that he is coming
  lexicon: BDAG
  rationale: The relative pronoun ὃ is neuter, agreeing with the preceding neuter expression, so 'which ... is coming' is the most direct syntactic match. English smooths this as 'you have heard is coming.' A masculine 'he' would over-interpret the antecedent.
- source_word: ἐν τῷ κόσμῳ
  chosen: in the world
  lexicon: BDAG
  rationale: κόσμος in Johannine literature often denotes the human world-order in rebellion or estrangement from God; 'in the world' is the standard and contextually fitting rendering.
- source_word: ἤδη
  chosen: already
  alternatives:
  - even now
  lexicon: BDAG
  rationale: ἤδη emphasizes present realized presence. 'Already' is concise and natural in English.
