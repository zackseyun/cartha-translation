theological_decisions:
- issue: Textual form of the confession denied
  chosen_reading: Follow the SBLGNT shorter reading 'does not confess Jesus' in the main text.
  alternative_readings:
  - '''does not confess that Jesus Messiah has come in the flesh'''
  - '''dissolves Jesus'' / other minor variant forms in later textual traditions'
  rationale: The critical text supports the shorter reading, and the immediate context (v. 2) already supplies the christological content of the confession. Using the shorter reading avoids importing a harmonized expansion into v. 3 while preserving the longer traditional form in a footnote.
  doctrine_reference: Translation philosophy §1 (original-language primacy) and §3 (preserve tension/alternatives in footnotes)
- issue: How explicit to make the ellipsis in 'this is that of the antichrist'
  chosen_reading: Retain the Greek ellipsis rather than supplying 'spirit' in the main text.
  alternative_readings:
  - '''this is the spirit of the antichrist'''
  rationale: The Greek does not explicitly repeat πνεῦμα. Supplying it is understandable but interpretive. Retaining the ellipsis better reflects the source while remaining readable.
  doctrine_reference: 'Translation philosophy: optimal equivalence; original-language primacy'
revisions:
- timestamp: '2026-04-21T00:41:47Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/nt/1_john/004/003.json
  category: awkward_english
  tier: 1
  from: this is that of the antichrist
  to: this is the spirit of the antichrist
  rationale: The current rendering is a stilted and overly literal translation of the Greek ellipsis (`τὸ τοῦ ἀντιχρίστου`). While the drafter's intent to preserve the source text's form is noted, the result is unnatural English that can hinder comprehension. Since the implied noun is clearly `πνεῦμα` (spirit) from the first clause, supplying it for clarity ('the spirit of the antichrist') is a standard and justifiable move in an optimal-equivalence translation. This improves readability significantly without introducing foreign concepts. The existing footnote already provides the justification for this move.
