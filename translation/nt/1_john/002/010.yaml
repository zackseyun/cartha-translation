id: 1JN.2.10
reference: 1 John 2:10
source:
  edition: SBLGNT
  text: ὁ ἀγαπῶν τὸν ἀδελφὸν αὐτοῦ ἐν τῷ φωτὶ μένει, καὶ σκάνδαλον ἐν αὐτῷ οὐκ ἔστιν·
translation:
  text: The one who loves his brother remains in the light, and there is no cause
    for stumbling in him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “there is no stumbling block for him.” The Greek phrase can be understood
      either as describing what is not present in him or what does not confront him.
    reason: alternative_reading
lexical_decisions:
- source_word: ὁ ἀγαπῶν
  chosen: The one who loves
  alternatives:
  - Whoever loves
  - He who loves
  lexicon: BDAG
  rationale: Articular present participle functioning substantivally; 'The one who
    loves' preserves the ongoing/generic force without sounding archaic. 'Loves' reflects
    the lexical cognate of ἀγαπάω with ἀγάπη per project consistency.
- source_word: τὸν ἀδελφὸν αὐτοῦ
  chosen: his brother
  alternatives:
  - his brother or sister
  - his fellow believer
  lexicon: BDAG
  rationale: ἀδελφός is grammatically masculine singular. Per doctrine, gender-accurate
    renderings are preferred over gender-neutral ones unless context clearly demands
    otherwise. In 1 John this often refers to a fellow member of the believing community,
    but 'brother' best matches the source wording; broader interpretive expansions
    are avoided in the main text.
- source_word: ἐν τῷ φωτὶ
  chosen: in the light
  alternatives:
  - in light
  lexicon: BDAG
  rationale: The prepositional phrase is both literal in form and metaphorical in
    Johannine theology; 'in the light' is the natural and established English equivalent
    that preserves the imagery.
- source_word: μένει
  chosen: remains
  alternatives:
  - abides
  - stays
  lexicon: BDAG
  rationale: μένω is a key Johannine verb. 'Remains' is readable modern English and
    preserves the durative relational sense better than 'stays,' while avoiding the
    slightly archaic register of 'abides' in the main text.
- source_word: σκάνδαλον
  chosen: cause for stumbling
  alternatives:
  - stumbling block
  - offense
  lexicon: BDAG
  rationale: σκάνδαλον can denote a stumbling block, trap, or cause of offense. Here
    'cause for stumbling' best captures the likely ethical sense in context and reads
    naturally in English. It also avoids implying a literal object while preserving
    the metaphor.
- source_word: ἐν αὐτῷ
  chosen: in him
  alternatives:
  - in it
  - for him
  lexicon: BDAG
  rationale: The pronoun is masculine singular and most naturally refers back to the
    person who loves. The phrase is syntactically ambiguous enough that some understand
    it as 'for him' (i.e., no cause for him to stumble), but the more direct rendering
    is 'in him,' with the alternative preserved in a footnote.
- source_word: οὐκ ἔστιν
  chosen: there is no
  alternatives:
  - is not
  lexicon: BDAG
  rationale: Existential English construction is the most natural way to render the
    clause with σκάνδαλον as the subject complement.
