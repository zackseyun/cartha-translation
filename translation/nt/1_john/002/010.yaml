theological_decisions:
- issue: Referent and nuance of the final clause καὶ σκάνδαλον ἐν αὐτῷ οὐκ ἔστιν
  chosen_reading: The clause states that in the one who loves his brother there is
    no cause for stumbling.
  alternative_readings:
  - there is no stumbling block for him
  - there is nothing in him that causes others to stumble
  rationale: The Greek permits more than one nuance because ἐν αὐτῷ may be taken with
    slightly different force. The chosen reading preserves the internal moral sense
    without over-specifying whether the stumbling concerns himself or others. An alternative
    is preserved in a footnote to maintain the interpretive tension rather than resolve
    it dogmatically.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it; §6: Readable modern English'
