theological_decisions:
- issue: Nature of the conditional promise in the final clause
  chosen_reading: 'Render the future indicative straightforwardly: ''you also will
    remain in the Son and in the Father,'' without importing debates about perseverance,
    assurance, or sacramental union.'
  alternative_readings:
  - Interpret as an exhortation rather than a promise
  - Interpret as proof of perseverance in a later systematic-theological sense
  rationale: The Greek presents a conditional statement tied to continuing in the
    apostolic message. The translation should preserve John's wording and theological
    tension without resolving it into a specific denominational framework.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Referent of 'what you heard from the beginning'
  chosen_reading: Keep the expression general rather than specifying 'gospel' or 'apostolic
    teaching' in the main text.
  alternative_readings:
  - the gospel you heard from the beginning
  - the apostolic message you heard from the beginning
  rationale: Although the context strongly suggests the original apostolic proclamation
    about the Son, the Greek itself leaves the object expressed as a relative pronoun.
    The main text should not narrow it beyond the source wording.
  doctrine_reference: Original-language primacy over translation tradition.
