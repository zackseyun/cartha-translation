theological_decisions:
- issue: Referent of αὐτόν / αὐτοῦ
  chosen_reading: Refers to God ('him' / 'his') in the immediate context.
  alternative_readings:
  - Refers more specifically to Christ
  rationale: The immediate context in 1 John 2:3 speaks of knowing 'him' through keeping
    'his commandments,' most naturally referring to God, though Johannine theology
    closely links God and the Son. The English leaves the pronoun as 'him' without
    over-specifying, preserving the text's wording and theological closeness.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Force of Johannine 'know' language
  chosen_reading: Relational knowledge expressed as 'have come to know.'
  alternative_readings:
  - Cognitive knowledge expressed simply as 'know'
  rationale: The perfect of γινώσκω in Johannine context commonly denotes relational
    knowledge with continuing effect. The rendering avoids reducing the claim to mere
    intellectual awareness while not overstating mystical union.
