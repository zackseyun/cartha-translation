id: 1JN.2.4
reference: 1 John 2:4
source:
  edition: SBLGNT
  text: ὁ λέγων ⸀ὅτι Ἔγνωκα αὐτὸν καὶ τὰς ἐντολὰς αὐτοῦ μὴ τηρῶν ψεύστης ἐστίν, καὶ
    ἐν τούτῳ ἡ ἀλήθεια οὐκ ἔστιν·
translation:
  text: The one who says, “I have come to know him,” and does not keep his commandments
    is a liar, and the truth is not in him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or: “I know him.” The Greek perfect can be rendered more simply, but “I
      have come to know him” better reflects the aspect of a present relationship
      resulting from prior coming-to-know.'
    reason: lexical_alternative
  - marker: b
    text: 'Or: “the truth is not in this one” or “in such a person.”'
    reason: alternative_reading
lexical_decisions:
- source_word: ὁ λέγων
  chosen: The one who says
  alternatives:
  - Whoever says
  - He who says
  lexicon: BDAG
  rationale: Articular present participle functioning substantivally; 'The one who
    says' preserves the generic singular force in natural modern English without importing
    unnecessary gender.
- source_word: ὅτι
  chosen: “
  alternatives:
  - that
  lexicon: BDAG
  rationale: Introduces direct discourse after λέγων. English idiom is best served
    by quotation marks rather than an explicit 'that'.
- source_word: Ἔγνωκα
  chosen: I have come to know
  alternatives:
  - I know
  - I have known
  lexicon: BDAG
  rationale: Perfect tense of γινώσκω conveys a present state resulting from prior
    coming-to-know. 'I have come to know' preserves the aspect better than the flatter
    'I know' and fits Johannine usage of relational knowledge.
- source_word: αὐτὸν
  chosen: him
  alternatives:
  - He
  lexicon: BDAG
  rationale: Direct object referring back to God in context; lower-case 'him' follows
    normal English style and avoids adding interpretive emphasis not present in Greek.
- source_word: τὰς ἐντολὰς αὐτοῦ
  chosen: his commandments
  alternatives:
  - his commands
  lexicon: BDAG
  rationale: ἐντολή is commonly 'commandment' in Johannine literature and preserves
    intertextual resonance with divine commands. 'Commands' is possible but slightly
    less traditional and less weighty.
- source_word: μὴ τηρῶν
  chosen: does not keep
  alternatives:
  - does not obey
  - is not keeping
  lexicon: BDAG
  rationale: Present participle with μή describes ongoing failure to observe. τηρέω
    in Johannine usage often means 'keep' in the sense of observe/guard; 'keep' preserves
    this established nuance better than the more interpretive 'obey'.
- source_word: ψεύστης
  chosen: a liar
  alternatives:
  - lying
  - 'false'
  lexicon: BDAG
  rationale: Predicate noun is most directly rendered 'a liar.' This preserves the
    personal moral characterization rather than reducing it to an adjectival description.
- source_word: ἐν τούτῳ
  chosen: in him
  alternatives:
  - in this one
  - in such a person
  lexicon: BDAG
  rationale: τούτῳ is masculine/neuter dative singular and in context most naturally
    refers back to the person just described. Rendering it 'in him' yields coherent
    English and matches the anaphoric force. The alternative 'in this one' is more
    wooden.
- source_word: ἡ ἀλήθεια
  chosen: the truth
  alternatives:
  - truthfulness
  - what is true
  lexicon: BDAG
  rationale: Johannine usage often carries both propositional and moral/spiritual
    force. 'The truth' preserves this theological density better than narrower paraphrases.
- source_word: οὐκ ἔστιν
  chosen: is not
  alternatives:
  - is absent
  - does not exist
  lexicon: BDAG
  rationale: Simple negated copula should remain simple in English.
