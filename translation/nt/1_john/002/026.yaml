id: 1JN.2.26
reference: 1 John 2:26
source:
  edition: SBLGNT
  text: Ταῦτα ἔγραψα ὑμῖν περὶ τῶν πλανώντων ὑμᾶς.
translation:
  text: I have written these things to you concerning those who are trying to lead
    you astray.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'those who deceive you' or 'those who are misleading you.' The Greek
      participle can describe either active deception or attempted leading astray.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ταῦτα
  chosen: these things
  alternatives:
  - this
  lexicon: BDAG
  rationale: Neuter plural demonstrative, naturally rendered 'these things,' referring
    back to the preceding written material rather than a singular point.
- source_word: ἔγραψα
  chosen: I have written
  alternatives:
  - I wrote
  lexicon: BDAG
  rationale: Aorist indicative can be rendered as an English simple past ('I wrote'),
    but in epistolary context English often uses the present perfect ('I have written')
    to reflect the writer's completed act with present relevance. This is idiomatic
    and preserves the force of the statement.
- source_word: ὑμῖν
  chosen: to you
  alternatives:
  - for you
  lexicon: BDAG
  rationale: Dative pronoun marking the recipients of the writing; 'to you' is the
    most straightforward English equivalent.
- source_word: περὶ
  chosen: concerning
  alternatives:
  - about
  - regarding
  lexicon: BDAG
  rationale: The preposition introduces the topic or subject matter of the writing.
    'Concerning' is slightly more formal than 'about' and fits the tone while remaining
    clear.
- source_word: τῶν πλανώντων ὑμᾶς
  chosen: those who are trying to lead you astray
  alternatives:
  - those who deceive you
  - those who are misleading you
  - the ones leading you astray
  lexicon: BDAG
  rationale: The present active participle of πλανάω denotes people who are causing
    or attempting to cause the readers to wander from truth. 'Lead astray' preserves
    the directional metaphor better than the flatter 'deceive.' Adding 'trying to'
    reflects the participial action aimed at the readers without implying their success.
- source_word: πλανάω
  chosen: lead astray
  alternatives:
  - deceive
  - mislead
  lexicon: BDAG
  rationale: πλανάω commonly carries the sense of causing someone to wander or go
    astray, whether morally or doctrinally. 'Lead astray' best preserves that imagery
    and theological nuance in Johannine context.
