theological_decisions:
- issue: Whether πλανώντων should be rendered as successful deception or attempted
    misleading
  chosen_reading: those who are trying to lead you astray
  alternative_readings:
  - those who deceive you
  - those who are misleading you
  rationale: The participle identifies the opponents by their activity toward the
    audience. The Greek does not require that the deception has already succeeded;
    rendering it as 'trying to lead you astray' preserves the hostile intent without
    overstating the result. This also fits the pastoral purpose of warning the readers.
  doctrine_reference: Preserve theological tension rather than resolve it.
