theological_decisions:
- issue: Rendering σάρξ in a morally charged Johannine list
  chosen_reading: flesh
  alternative_readings:
  - sinful nature
  rationale: The doctrine guidance gives 'flesh' as the default literal rendering
    and allows 'sinful nature' when the metaphorical sense must be made explicit.
    Here 'desire of the flesh' is intelligible in English and preserves the theological
    tension without resolving the phrase into a specific anthropological system.
  doctrine_reference: 'DOCTRINE.md: Contested terms table for σάρξ; Preserve theological
    tension rather than resolve it.'
- issue: Interpretation of κόσμος
  chosen_reading: world
  alternative_readings:
  - world-system
  - fallen world order
  rationale: The verse contrasts what is 'from the Father' with what is 'from the
    world.' Translating with an interpretive gloss would narrow the term beyond the
    Greek. The theological sense is left to context rather than embedded in the wording.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy; Preserve theological
    tension rather than resolve it.'
