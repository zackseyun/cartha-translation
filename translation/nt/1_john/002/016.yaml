id: 1JN.2.16
reference: 1 John 2:16
source:
  edition: SBLGNT
  text: ὅτι πᾶν τὸ ἐν τῷ κόσμῳ, ἡ ἐπιθυμία τῆς σαρκὸς καὶ ἡ ἐπιθυμία τῶν ὀφθαλμῶν
    καὶ ἡ ἀλαζονεία τοῦ βίου, οὐκ ἔστιν ἐκ τοῦ πατρός, ἀλλὰ ἐκ τοῦ κόσμου ἐστίν·
translation:
  text: For everything in the world—the desire of the flesh, the desire of the eyes,
    and the boastful pride of life—is not from the Father, but is from the world.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the lust of the flesh.' The Greek word can mean strong desire, craving,
      or lust; 'desire' is used here to avoid narrowing the sense to sexual desire
      alone.
    reason: lexical_alternative
  - marker: b
    text: Or 'the desire of the sinful nature.' Greek 'flesh' can, in some contexts,
      refer metaphorically to fallen human nature.
    reason: alternative_reading
  - marker: c
    text: Or 'the arrogance of life' or 'the pretension of worldly living.' The phrase
      may include pride in one's status, possessions, or way of life.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅτι
  chosen: For
  alternatives:
  - because
  lexicon: BDAG
  rationale: Introduces the explanatory ground for the previous command not to love
    the world. 'For' reads naturally in English while preserving the causal force.
- source_word: πᾶν τὸ ἐν τῷ κόσμῳ
  chosen: everything in the world
  alternatives:
  - all that is in the world
  - everything that is in the world
  lexicon: BDAG
  rationale: The neuter singular construction functions collectively. 'Everything
    in the world' is concise modern English and preserves the comprehensive scope.
- source_word: κόσμῳ / κόσμου
  chosen: world
  alternatives:
  - world-system
  lexicon: BDAG
  rationale: κόσμος here refers to the fallen human order opposed to God, but the
    standard rendering 'world' should be retained in the main text; interpretive expansions
    like 'world-system' go beyond the wording.
- source_word: ἐπιθυμία
  chosen: desire
  alternatives:
  - lust
  - craving
  lexicon: BDAG
  rationale: ἐπιθυμία can denote strong desire, often negative in context. 'Desire'
    is broad enough to preserve the lexical sense without importing a narrowly sexual
    meaning that 'lust' may suggest in modern English.
- source_word: τῆς σαρκὸς
  chosen: of the flesh
  alternatives:
  - of the sinful nature
  lexicon: BDAG
  rationale: Per doctrine guidance, σάρξ is rendered 'flesh' when possible, with 'sinful
    nature' reserved for contexts where the metaphorical sense must be made explicit.
    Here the traditional and lexical sense 'flesh' preserves Johannine theological
    texture and avoids over-interpretation.
- source_word: τῶν ὀφθαλμῶν
  chosen: of the eyes
  alternatives:
  - of the eye
  lexicon: BDAG
  rationale: A straightforward genitive preserving the plural in Greek. The phrase
    is idiomatic in English and mirrors the source structure.
- source_word: ἀλαζονεία
  chosen: boastful pride
  alternatives:
  - arrogance
  - pretension
  - vainglory
  lexicon: BDAG
  rationale: The term denotes arrogant pretension or boastfulness. 'Boastful pride'
    captures both the inward arrogance and outward self-exalting display better than
    'pride' alone.
- source_word: τοῦ βίου
  chosen: of life
  alternatives:
  - of livelihood
  - about possessions in life
  lexicon: BDAG
  rationale: βίος can refer to life in the sense of one's manner or means of living,
    even possessions. In this established phrase, 'of life' is the most natural and
    sufficiently broad rendering; the nuance of worldly life/status is carried by
    context.
- source_word: οὐκ ἔστιν ἐκ τοῦ πατρός
  chosen: is not from the Father
  alternatives:
  - does not come from the Father
  - is not out of the Father
  lexicon: BDAG
  rationale: ἐκ marks source/origin. 'Is not from the Father' is clear, direct, and
    preserves the theological contrast of origin.
- source_word: τοῦ πατρός
  chosen: the Father
  alternatives:
  - God the Father
  lexicon: BDAG
  rationale: The article with πατήρ in Johannine usage naturally refers to God as
    Father. 'The Father' preserves the relational and literary force without unnecessary
    expansion.
- source_word: ἀλλὰ ἐκ τοῦ κόσμου ἐστίν
  chosen: but is from the world
  alternatives:
  - but comes from the world
  lexicon: BDAG
  rationale: Maintains the parallelism with 'is not from the Father.' The contrast
    in source/origin is central to the verse's argument.
