theological_decisions:
- issue: Referent of αὐτόν ('him')
  chosen_reading: Retain the pronoun 'him' without specifying God or Jesus in the
    main text.
  alternative_readings:
  - Specify 'God'
  - Specify 'Jesus/Christ'
  rationale: The Greek uses a pronoun, and the immediate literary context in 1 John
    intentionally sustains close theological connection between knowing God and relation
    to the Son. Preserving the pronoun avoids importing a narrower doctrinal identification
    than the verse itself states.
  doctrine_reference: Preserve theological tension rather than resolve it.
