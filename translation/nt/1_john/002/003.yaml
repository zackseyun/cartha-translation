id: 1JN.2.3
reference: 1 John 2:3
source:
  edition: SBLGNT
  text: Καὶ ἐν τούτῳ γινώσκομεν ὅτι ἐγνώκαμεν αὐτόν, ἐὰν τὰς ἐντολὰς αὐτοῦ τηρῶμεν.
translation:
  text: 'And by this we know that we have come to know him: if we keep his commandments.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'that we have known him'; the Greek perfect likely carries
      the sense 'have come to know him.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν τούτῳ
  chosen: by this
  alternatives:
  - in this
  - from this
  lexicon: BDAG
  rationale: Idiomatic Johannine expression introducing the basis or evidence by which
    something is known. 'By this' is natural English and preserves the demonstrative
    force better than the more wooden 'in this' here.
- source_word: γινώσκομεν
  chosen: we know
  alternatives:
  - we are knowing
  - we come to know
  lexicon: BDAG
  rationale: Present indicative expressing current recognition or assurance. Simple
    present 'we know' is the natural English equivalent.
- source_word: ὅτι ἐγνώκαμεν αὐτόν
  chosen: that we have come to know him
  alternatives:
  - that we know him
  - that we have known him
  lexicon: BDAG
  rationale: The perfect ἐγνώκαμεν suggests a completed coming-to-know with continuing
    result. 'Have come to know' captures the ingressive/resultative nuance better
    than a flat 'have known' or simple present.
- source_word: αὐτόν
  chosen: him
  alternatives:
  - God
  - Christ
  lexicon: BDAG
  rationale: The pronoun's immediate referent is left as 'him' rather than specifying
    beyond the Greek. Context in 1 John allows discussion of God and Christ in close
    relation; the translation should not over-resolve the referent here.
- source_word: ἐὰν
  chosen: if
  alternatives:
  - whenever
  - provided that
  lexicon: BDAG
  rationale: Standard conditional marker introducing the test/evidence clause. 'If'
    is the most direct and natural rendering.
- source_word: ἐντολάς
  chosen: commandments
  alternatives:
  - commands
  - instructions
  lexicon: BDAG
  rationale: '''Commandments'' preserves the moral and covenantal weight of ἐντολή
    in Johannine usage better than the lighter ''instructions.'' ''Commands'' is possible,
    but ''commandments'' better reflects the established biblical register without
    sounding archaic here.'
- source_word: τηρῶμεν
  chosen: we keep
  alternatives:
  - we obey
  - we observe
  - we guard
  lexicon: BDAG
  rationale: τηρέω commonly means to keep, observe, or guard. 'Keep' preserves the
    lexical connection and Johannine style, while also implying obedient observance
    without reducing the term to mere compliance.
