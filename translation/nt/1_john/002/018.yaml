id: 1JN.2.18
reference: 1 John 2:18
source:
  edition: SBLGNT
  text: Παιδία, ἐσχάτη ὥρα ἐστίν, καὶ καθὼς ἠκούσατε ⸀ὅτι ἀντίχριστος ἔρχεται, καὶ
    νῦν ἀντίχριστοι πολλοὶ γεγόνασιν· ὅθεν γινώσκομεν ὅτι ἐσχάτη ὥρα ἐστίν.
translation:
  text: Children, it is the last hour, and just as you heard that antichrist is coming,
    even now many antichrists have arisen. From this we know that it is the last hour.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the antichrist is coming.' The Greek noun is anarthrous ('antichrist'
      without the article), but English may also express it with the article to indicate
      a recognized expected figure.
    reason: alternative_reading
  - marker: b
    text: Or 'have appeared' or 'have come.' The Greek perfect verb emphasizes that
      many antichrists have arisen and are now present.
    reason: lexical_alternative
lexical_decisions:
- source_word: Παιδία
  chosen: Children
  alternatives:
  - Little children
  - Dear children
  lexicon: BDAG
  rationale: Vocative plural of παιδίον used as a pastoral address. 'Children' is
    natural modern English and preserves the familial tone without adding diminutive
    force not explicit in the form. 'Little children' is traditional but can sound
    more diminutive than necessary.
- source_word: ἐσχάτη ὥρα
  chosen: the last hour
  alternatives:
  - the final hour
  lexicon: BDAG
  rationale: A definite eschatological expression. 'The last hour' is the most transparent
    rendering and preserves the temporal-metaphorical force without overinterpreting
    it as a precise chronological hour.
- source_word: καθὼς
  chosen: just as
  alternatives:
  - as
  lexicon: BDAG
  rationale: Marks correspondence with what the readers had previously heard. 'Just
    as' brings out the comparative force more clearly than the flatter 'as'.
- source_word: ἠκούσατε
  chosen: you heard
  alternatives:
  - you have heard
  lexicon: BDAG
  rationale: Aorist indicative referring to prior instruction received by the audience.
    Simple past is idiomatic in English here and fits the discourse flow.
- source_word: ὅτι
  chosen: that
  lexicon: BDAG
  rationale: Introduces the content of what they heard.
- source_word: ἀντίχριστος
  chosen: antichrist
  alternatives:
  - the antichrist
  lexicon: BDAG
  rationale: 'The noun lacks the article in Greek. English idiom can still express
    a known category without the article here: ''antichrist is coming.'' This avoids
    overstating definiteness while preserving the traditional term used in Johannine
    literature.'
- source_word: ἔρχεται
  chosen: is coming
  alternatives:
  - comes
  lexicon: BDAG
  rationale: Present tense with future-oriented force. 'Is coming' best conveys the
    expected arrival in natural English.
- source_word: καὶ νῦν
  chosen: even now
  alternatives:
  - and now
  - already now
  lexicon: BDAG
  rationale: The combination heightens the contrast between the expected singular
    figure and the present reality of many such opponents. 'Even now' captures the
    emphatic sense.
- source_word: ἀντίχριστοι πολλοὶ
  chosen: many antichrists
  alternatives:
  - many antichrist figures
  lexicon: BDAG
  rationale: Straightforward plural rendering of the same term. Retaining 'antichrists'
    preserves the lexical link with the singular earlier in the verse.
- source_word: γεγόνασιν
  chosen: have arisen
  alternatives:
  - have come
  - have appeared
  - have become
  lexicon: BDAG
  rationale: Perfect tense of γίνομαι indicates that such figures have come into existence
    and are now present. 'Have arisen' communicates emergence into the scene more
    clearly than the overly generic 'have become'.
- source_word: ὅθεν
  chosen: From this
  alternatives:
  - Therefore
  - From which
  lexicon: BDAG
  rationale: Signals inference from the preceding observation. 'From this' preserves
    the demonstrative connection to the present evidence better than a bare inferential
    'therefore.'
- source_word: γινώσκομεν
  chosen: we know
  alternatives:
  - we recognize
  lexicon: BDAG
  rationale: Common Johannine verb of knowing/recognizing. 'We know' is both natural
    and consistent with Johannine usage.
