theological_decisions:
- issue: Meaning of 'the last hour'
  chosen_reading: An eschatological period indicating the decisive final stage of
    redemptive history, not necessarily a literal sixty-minute period.
  alternative_readings:
  - A strictly imminent chronological moment
  - A purely rhetorical expression for crisis
  rationale: The phrase should be translated transparently and not narrowed in the
    main text. The context of antichrist/antichrists indicates eschatological significance,
    but the translation preserves the text's metaphorical temporal language rather
    than resolving detailed end-times schemes.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Reference of singular 'antichrist' versus plural 'antichrists'
  chosen_reading: Retain both the expected singular figure/category and the present
    plurality in the main text without harmonizing them.
  alternative_readings:
  - Interpret the singular as only a generic category
  - Interpret the singular as a fully defined individual and make that explicit in
    translation
  rationale: John deliberately juxtaposes what the readers had heard about 'antichrist'
    with the present reality of 'many antichrists.' The translation should preserve
    that tension and not force a systematized eschatological conclusion.
  doctrine_reference: Preserve theological tension rather than resolve it.
