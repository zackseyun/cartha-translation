theological_decisions:
- issue: Referent of the pronouns and eschatological manifestation
  chosen_reading: The pronouns refer to the Son/Jesus Christ, and the verse speaks
    of his future eschatological revelation and coming.
  alternative_readings:
  - A more general reference to God without specifying the Son
  rationale: The immediate context in 1 John 2 centers on abiding in the Son and the
    promise associated with his appearing. Rendering with lowercase pronouns avoids
    importing capitalization conventions while the translation still reflects the
    contextual referent as Christ. 'Coming' for παρουσία aligns with historic Christian
    eschatological reading without adding details beyond the text.
  doctrine_reference: 'Affirmations: Nicene Creed; Translation philosophy §1, §3'
- issue: Nuance of shame expression at Christ's coming
  chosen_reading: The text depicts believers potentially recoiling in shame at his
    coming, not necessarily judicial condemnation.
  alternative_readings:
  - The phrase means simply 'be ashamed before him' without the nuance of shrinking
    away
  rationale: The combination of αἰσχυνθῶμεν with ἀπ’ αὐτοῦ suggests shame in relation
    to his presence, plausibly with the nuance of drawing back. This preserves the
    warning's force without overstating it as final condemnation.
  doctrine_reference: Translation philosophy §3
