id: 1JN.2.28
reference: 1 John 2:28
source:
  edition: SBLGNT
  text: Καὶ νῦν, τεκνία, μένετε ἐν αὐτῷ, ἵνα ⸀ἐὰν φανερωθῇ ⸀σχῶμεν παρρησίαν καὶ μὴ
    αἰσχυνθῶμεν ἀπ’ αὐτοῦ ἐν τῇ παρουσίᾳ αὐτοῦ.
translation:
  text: And now, little children, remain in him, so that if he is revealed, we may
    have confidence and not shrink away from him in shame at his coming.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'if he appears.' The Greek verb is passive ('is revealed'/'is made manifest').
    reason: lexical_alternative
  - marker: b
    text: Or 'be ashamed before him.' The phrase may also be understood more literally
      as shame in his presence rather than shrinking away from him.
    reason: alternative_reading
  - marker: c
    text: Or 'at his presence.' In this context, 'coming' reflects the eschatological
      sense of the Greek term.
    reason: lexical_alternative
lexical_decisions:
- source_word: τεκνία
  chosen: little children
  alternatives:
  - dear children
  - children
  lexicon: BDAG
  rationale: Vocative diminutive expressing affectionate pastoral address. 'Little
    children' preserves both the familial imagery and the diminutive force better
    than plain 'children'; 'dear children' captures affection but loses the literal
    child-language.
- source_word: μένετε
  chosen: remain
  alternatives:
  - abide
  - continue
  lexicon: BDAG
  rationale: μένω is a key Johannine term. 'Remain' is clear modern English and preserves
    the durative relational sense without the archaic feel of 'abide.' 'Continue'
    is possible but weaker in expressing ongoing union.
- source_word: ἐν αὐτῷ
  chosen: in him
  alternatives:
  - in union with him
  lexicon: BDAG
  rationale: A straightforward rendering that preserves Johannine relational theology
    without over-explicating the metaphor. 'In union with him' interprets the phrase
    more than the Greek requires.
- source_word: φανερωθῇ
  chosen: he is revealed
  alternatives:
  - he appears
  - he is made manifest
  lexicon: BDAG
  rationale: The passive form is best preserved with 'is revealed.' In context it
    refers to the eschatological manifestation of Christ. 'He appears' is idiomatic
    and common, but it smooths over the passive morphology; 'is made manifest' is
    more formal but less natural.
- source_word: σχῶμεν παρρησίαν
  chosen: we may have confidence
  alternatives:
  - we may have boldness
  - we may have assurance
  lexicon: BDAG
  rationale: παρρησία in Johannine usage often denotes confident openness before God.
    'Confidence' is natural modern English and fits the eschatological setting. 'Boldness'
    is possible but can sound more confrontational than intended; 'assurance' is slightly
    more interpretive.
- source_word: αἰσχυνθῶμεν
  chosen: shrink away from him in shame
  alternatives:
  - be ashamed before him
  - be put to shame by him
  lexicon: BDAG
  rationale: The verb denotes shame, and with ἀπ’ αὐτοῦ in this context likely conveys
    recoiling or shrinking away from his presence in shame. This rendering captures
    both the emotional and relational force. 'Be ashamed before him' is simpler but
    underrepresents the preposition; 'be put to shame by him' risks implying direct
    causation.
- source_word: ἀπ’ αὐτοῦ
  chosen: from him
  alternatives:
  - before him
  - away from him
  lexicon: BDAG
  rationale: ἀπό most naturally means 'from/away from.' In combination with αἰσχυνθῶμεν,
    the sense is best brought out idiomatically in English as 'shrink away from him
    in shame.' A footnote preserves the more traditional 'before him' interpretation.
- source_word: παρουσίᾳ
  chosen: coming
  alternatives:
  - presence
  - arrival
  lexicon: BDAG
  rationale: In this eschatological context παρουσία conventionally refers to Christ's
    future coming. 'Coming' is the clearest idiomatic rendering. 'Presence' is more
    literal etymologically but less natural here and can obscure the eventive sense;
    'arrival' is possible but less established in biblical English.
