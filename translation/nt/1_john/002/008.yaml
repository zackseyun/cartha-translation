theological_decisions:
- issue: Referent of αὐτῷ
  chosen_reading: 'The phrase refers to Christ: ''true in him and in you.'''
  alternative_readings:
  - 'The phrase refers to the commandment itself: ''true in it and in you.'''
  rationale: The masculine pronoun naturally points to a personal referent, and in
    Johannine context Christ is the most plausible antecedent. This also fits the
    theology of the commandment being realized in Messiah and then in believers. The
    alternative is grammatically discussed because the relative clause is conceptually
    complex, so it is preserved in a footnote.
  doctrine_reference: Preserve theological tension rather than resolve it.
