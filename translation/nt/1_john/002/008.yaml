id: 1JN.2.8
reference: 1 John 2:8
source:
  edition: SBLGNT
  text: πάλιν ἐντολὴν καινὴν γράφω ὑμῖν, ὅ ἐστιν ἀληθὲς ἐν αὐτῷ καὶ ἐν ὑμῖν, ὅτι ἡ
    σκοτία παράγεται καὶ τὸ φῶς τὸ ἀληθινὸν ἤδη φαίνει.
translation:
  text: Again, I am writing to you a new commandment, which is true in him and in
    you, because the darkness is passing away and the true light is already shining.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'which is true in it and in you,' taking the pronoun to refer to the
      commandment rather than to him personally.
    reason: alternative_reading
lexical_decisions:
- source_word: πάλιν
  chosen: Again
  alternatives:
  - On the other hand
  - In turn
  lexicon: BDAG
  rationale: 'Here πάλιν most naturally signals a renewed or contrasting statement
    following v. 7: John is, in another sense, writing a new commandment. ''Again''
    preserves the compact discourse marker without over-interpreting the contrast.'
- source_word: ἐντολὴν καινὴν
  chosen: a new commandment
  alternatives:
  - a fresh commandment
  lexicon: BDAG
  rationale: Standard rendering of the noun-adjective pair. καινός emphasizes newness
    in kind or quality, not merely recent origin; 'new commandment' is both accurate
    and idiomatic, and resonates with Johannine usage.
- source_word: γράφω
  chosen: I am writing
  alternatives:
  - I write
  lexicon: BDAG
  rationale: The Greek present can be rendered as an epistolary or progressive present.
    'I am writing' sounds natural in contemporary English and reflects the ongoing
    act of composition without changing meaning.
- source_word: ὅ
  chosen: which
  alternatives:
  - what thing
  - that which
  lexicon: BDAG
  rationale: The neuter singular relative pronoun likely refers to the preceding idea/commandment
    as a conceptual whole rather than matching the feminine noun by strict grammatical
    agreement. 'Which' is idiomatic English for this relative connection.
- source_word: ἀληθὲς
  chosen: 'true'
  alternatives:
  - real
  - genuine
  lexicon: BDAG
  rationale: ἀληθής in Johannine literature can carry the sense of true/genuine/real.
    'True' best preserves the theological and literary resonance with the later phrase
    'the true light' while remaining natural.
- source_word: ἐν αὐτῷ
  chosen: in him
  alternatives:
  - in it
  lexicon: BDAG
  rationale: The masculine pronoun most naturally refers to Christ in context, not
    to the commandment. 'In him' preserves the likely personal reference and the Johannine
    pattern of truth embodied in Christ.
- source_word: ἐν ὑμῖν
  chosen: in you
  alternatives:
  - among you
  lexicon: BDAG
  rationale: The phrase can denote reality present in the readers themselves or operative
    among them. 'In you' is the more direct and traditional rendering and fits the
    parallel with 'in him.'
- source_word: ὅτι
  chosen: because
  alternatives:
  - for
  - that
  lexicon: BDAG
  rationale: This conjunction gives the ground for the preceding claim. 'Because'
    makes the causal relation explicit in clear modern English.
- source_word: ἡ σκοτία
  chosen: the darkness
  alternatives:
  - darkness
  lexicon: BDAG
  rationale: The article is retained in English because John speaks of darkness as
    a recognizable moral-spiritual reality, not merely an abstract quality.
- source_word: παράγεται
  chosen: is passing away
  alternatives:
  - is passing by
  - is disappearing
  lexicon: BDAG
  rationale: The present passive/middle here denotes an ongoing process of disappearance
    or passing. 'Is passing away' is the most idiomatic and contextually fitting expression
    for the fading of darkness.
- source_word: τὸ φῶς τὸ ἀληθινὸν
  chosen: the true light
  alternatives:
  - the real light
  - the genuine light
  lexicon: BDAG
  rationale: This is a key Johannine expression. 'True light' preserves established
    Johannine diction and the contrast with darkness without flattening the theological
    nuance of ἀληθινός.
- source_word: ἤδη
  chosen: already
  alternatives:
  - now already
  - even now
  lexicon: BDAG
  rationale: 'ἤδη marks realized present action. ''Already'' concisely conveys inaugurated
    fulfillment: the light has begun to shine now, even before final consummation.'
- source_word: φαίνει
  chosen: is already shining
  alternatives:
  - shines already
  - is giving light
  lexicon: BDAG
  rationale: φαίνω here denotes shining rather than merely appearing. Rendering it
    with a progressive English form pairs naturally with 'is passing away' and highlights
    the ongoing present reality.
