id: 1JN.2.1
reference: 1 John 2:1
source:
  edition: SBLGNT
  text: Τεκνία μου, ταῦτα γράφω ὑμῖν ἵνα μὴ ἁμάρτητε. καὶ ἐάν τις ἁμάρτῃ, παράκλητον
    ἔχομεν πρὸς τὸν πατέρα Ἰησοῦν Χριστὸν δίκαιον,
translation:
  text: My little children, I am writing these things to you so that you may not sin.
    But if anyone does sin, we have an advocate with the Father—Jesus Messiah, the
    Righteous One.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'advocate' may also be understood more broadly as 'helper,' 'counselor,'
      or 'comforter'; the Greek term is παράκλητος.
    reason: lexical_alternative
  - marker: b
    text: 'Traditional rendering: ''Jesus Christ.'' The Greek title Χριστός can mean
      ''Messiah'' or function name-like as ''Christ.'''
    reason: alternative_reading
lexical_decisions:
- source_word: Τεκνία μου
  chosen: My little children
  alternatives:
  - My children
  - Dear children
  lexicon: BDAG
  rationale: τεκνία is the diminutive plural of τεκνίον and conveys affectionate pastoral
    address. 'My little children' preserves both the familial metaphor and the diminutive
    tenderness better than the flatter 'my children.' 'Dear children' is idiomatic
    but weakens the literal filial imagery.
- source_word: ταῦτα γράφω ὑμῖν
  chosen: I am writing these things to you
  alternatives:
  - I write these things to you
  lexicon: BDAG
  rationale: γράφω is present indicative. English present progressive is natural in
    epistolary discourse and reflects the ongoing act of composition. 'These things'
    preserves ταῦτα without over-specifying the referent.
- source_word: ἵνα μὴ ἁμάρτητε
  chosen: so that you may not sin
  alternatives:
  - so that you might not sin
  - in order that you not sin
  lexicon: BDAG
  rationale: ἵνα with aorist subjunctive expresses purpose. 'So that you may not sin'
    is clear modern English and preserves the author's stated purpose without implying
    sinless perfection beyond the clause itself.
- source_word: καὶ ἐάν τις ἁμάρτῃ
  chosen: But if anyone does sin
  alternatives:
  - And if anyone sins
  - But if anyone sins
  lexicon: BDAG
  rationale: καὶ here is mildly adversative in context, contrasting the purpose clause
    with the contingency of failure; 'But' captures the discourse flow better than
    a wooden 'And.' The aorist subjunctive after ἐάν is well rendered by an English
    present contingency; 'does sin' adds slight emphasis matching the concessive force
    in context.
- source_word: παράκλητον
  chosen: advocate
  alternatives:
  - helper
  - counselor
  - comforter
  lexicon: BDAG
  rationale: παράκλητος has a range including legal representative, helper, and intercessory
    supporter. In this context, with 'with the Father' and the following description
    of Jesus, 'advocate' best captures the representative/intercessory sense without
    importing the Johannine Spirit-title nuances too strongly. Alternatives are worth
    preserving because the term is theologically significant and semantically broad.
- source_word: πρὸς τὸν πατέρα
  chosen: with the Father
  alternatives:
  - before the Father
  lexicon: BDAG
  rationale: πρός with the accusative can denote orientation toward or presence with
    someone. 'With the Father' is the standard and contextually fitting rendering,
    expressing relational access and presence rather than merely spatial movement.
- source_word: Ἰησοῦν Χριστὸν
  chosen: Jesus Messiah
  alternatives:
  - Jesus Christ
  lexicon: BDAG
  rationale: 'Per doctrine, Χριστός is rendered ''Messiah'' where it functions as
    a title rather than a name-like element. Here the appositional structure with
    δίκαιον favors a titular sense: ''Jesus Messiah, the Righteous One.'' The traditional
    ''Jesus Christ'' is preserved as an alternative.'
- source_word: δίκαιον
  chosen: the Righteous One
  alternatives:
  - righteous
  - the just one
  lexicon: BDAG
  rationale: δίκαιον is adjectival accusative agreeing with Ἰησοῦν Χριστόν. Rendering
    it as the appositional title 'the Righteous One' brings out its christological
    force in idiomatic English better than the bare adjective 'righteous,' while remaining
    faithful to the Greek.
