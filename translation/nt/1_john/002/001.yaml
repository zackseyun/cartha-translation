theological_decisions:
- issue: Rendering Χριστός in a Johannine christological title
  chosen_reading: Messiah
  alternative_readings:
  - Christ
  rationale: The doctrine excerpt directs that Χριστός be translated 'Messiah' where
    title is in view, and 'Christ' where the term functions name-like. In this verse,
    the construction 'Jesus Messiah, the Righteous One' reads naturally as titular/appositional,
    so 'Messiah' is preferred while preserving 'Christ' in a footnote for readers
    familiar with traditional English usage.
  doctrine_reference: 'DOCTRINE.md Contested terms: Χριστός → Messiah (where title;
    Christ where name-like)'
- issue: Potential implication of sinless perfection in ἵνα μὴ ἁμάρτητε
  chosen_reading: purpose clause without doctrinal overstatement
  alternative_readings:
  - statement implying absolute sinlessness
  rationale: The translation preserves John's purpose ('so that you may not sin')
    while the following conditional clause ('if anyone does sin') maintains the text's
    tension. This avoids importing a doctrinal claim of realized sinless perfection
    that the verse itself does not force.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological
    tension rather than resolve it'
