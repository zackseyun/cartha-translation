theological_decisions:
- issue: Sense of κόσμος in Johannine context
  chosen_reading: the world as the transient rebellious world-order opposed to God
  alternative_readings:
  - the physical created world
  rationale: The immediate context (2:15–16) defines 'the world' by its desires and
    pride, so the verse contrasts the passing world-system with the enduring life
    of the obedient believer. The translation keeps the broad term 'world' in the
    main text while understanding its ethical-theological sense from context rather
    than narrowing it in translation.
  doctrine_reference: Translation philosophy §1, §5
- issue: Force of μένει εἰς τὸν αἰῶνα
  chosen_reading: enduring permanence of the one who does God's will
  alternative_readings:
  - a more technical statement about eternal life
  rationale: The Greek states enduring continuance without explicitly unpacking the
    doctrinal mechanism. 'Remains forever' preserves the theological weight without
    importing additional categories not stated in the verse.
  doctrine_reference: Translation philosophy §3
