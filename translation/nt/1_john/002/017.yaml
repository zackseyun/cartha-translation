id: 1JN.2.17
reference: 1 John 2:17
source:
  edition: SBLGNT
  text: καὶ ὁ κόσμος παράγεται καὶ ἡ ἐπιθυμία αὐτοῦ, ὁ δὲ ποιῶν τὸ θέλημα τοῦ θεοῦ
    μένει εἰς τὸν αἰῶνα.
translation:
  text: And the world is passing away, along with its desire, but the one who does
    the will of God remains forever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the world passes away, and so does its lust.' The Greek ἐπιθυμία can
      also be rendered 'lust' or 'craving,' but here it refers broadly to the world's
      disordered desire.
    reason: lexical_alternative
  - marker: b
    text: The Greek μένει is often translated 'abides' in Johannine literature; here
      'remains' is used for clearer contemporary English.
    reason: lexical_alternative
lexical_decisions:
- source_word: κόσμος
  chosen: the world
  alternatives:
  - the present world order
  lexicon: BDAG
  rationale: In Johannine usage, κόσμος often refers not merely to the physical creation
    but to the human world-system in rebellion against God. 'The world' is the standard,
    sufficiently broad rendering and fits the immediate context of 2:15–16, where
    worldly values and desires are in view.
- source_word: παράγεται
  chosen: is passing away
  alternatives:
  - passes away
  - is fading away
  lexicon: BDAG
  rationale: Present passive/middle indicative conveys an ongoing process rather than
    a simple timeless statement. 'Is passing away' preserves the durative aspect and
    the sense of transience better than the bare simple present.
- source_word: ἐπιθυμία
  chosen: desire
  alternatives:
  - lust
  - craving
  lexicon: BDAG
  rationale: The noun can denote strong desire, often negative in this context. 'Desire'
    is more readable modern English and avoids importing a narrowly sexual sense that
    'lust' can suggest, while still matching the broader moral sense established in
    2:16.
- source_word: αὐτοῦ
  chosen: its
  alternatives:
  - his
  lexicon: BDAG
  rationale: The pronoun refers back to κόσμος, which is grammatically masculine in
    Greek but naturally rendered by the English neuter 'its' for a non-personal antecedent.
- source_word: ὁ δὲ ποιῶν
  chosen: but the one who does
  alternatives:
  - but whoever does
  - but he who does
  lexicon: BDAG
  rationale: The substantival participle denotes a person characterized by doing God's
    will. 'The one who does' preserves the singular representative force without archaic
    diction. 'Whoever does' is possible but slightly more dynamic.
- source_word: θέλημα
  chosen: the will
  alternatives:
  - what ... wants
  lexicon: BDAG
  rationale: '''Will'' is the natural and theologically weighty rendering for θέλημα
    here, preserving the connection to obedience to God''s expressed purpose rather
    than reducing it to preference.'
- source_word: μένει
  chosen: remains
  alternatives:
  - abides
  - stays
  lexicon: BDAG
  rationale: μένω is a key Johannine verb often rendered 'abide.' Here 'remains' is
    clearer in contemporary English while still conveying enduring continuance. 'Abides'
    is a viable alternative but more ecclesiastical in tone.
- source_word: εἰς τὸν αἰῶνα
  chosen: forever
  alternatives:
  - for the age
  - unto eternity
  lexicon: BDAG
  rationale: The idiom means enduring without end in this context. 'Forever' is idiomatic
    modern English and communicates the force of the phrase better than a more wooden
    'for the age.'
