id: 1JN.2.29
reference: 1 John 2:29
source:
  edition: SBLGNT
  text: ἐὰν εἰδῆτε ὅτι δίκαιός ἐστιν, γινώσκετε ⸀ὅτι πᾶς ὁ ποιῶν τὴν δικαιοσύνην ἐξ
    αὐτοῦ γεγέννηται.
translation:
  text: If you know that he is righteous, you know that everyone who practices righteousness
    has been born of him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from him.' The Greek expression can be rendered either way.
    reason: lexical_alternative
  - marker: b
    text: The pronoun 'him' may refer to God the Father or to the Son; the Greek does
      not explicitly specify the referent here.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐὰν
  chosen: If
  alternatives:
  - Whenever
  lexicon: BDAG
  rationale: Introduces a conditional clause. 'If' is the most natural English rendering
    here; 'whenever' is possible but less direct in this context.
- source_word: εἰδῆτε
  chosen: you know
  alternatives:
  - you have known
  - you perceive
  lexicon: BDAG
  rationale: From οἶδα, which commonly carries the sense of knowing/perceiving. In
    this conditional construction, present English 'you know' best communicates the
    force without awkwardness.
- source_word: δίκαιός
  chosen: righteous
  alternatives:
  - just
  lexicon: BDAG
  rationale: '''Righteous'' best matches the moral/theological sense in Johannine
    usage and aligns with the related noun δικαιοσύνη in the same verse.'
- source_word: γινώσκετε
  chosen: you know
  alternatives:
  - know
  - recognize
  lexicon: BDAG
  rationale: Indicative form is taken as a statement rather than an imperative. Rendering
    it again as 'you know' preserves the parallelism with εἰδῆτε, though the verbs
    differ in Greek. 'Recognize' is possible but less natural in the flow of English
    here.
- source_word: πᾶς ὁ ποιῶν
  chosen: everyone who practices
  alternatives:
  - everyone who does
  - everyone doing
  lexicon: BDAG
  rationale: The present participle conveys characteristic or ongoing action. 'Practices'
    communicates habitual conduct better than the flatter 'does' in this ethical context.
- source_word: τὴν δικαιοσύνην
  chosen: righteousness
  alternatives:
  - justice
  lexicon: BDAG
  rationale: Per doctrine defaults, δικαιοσύνη is rendered 'righteousness.' In 1 John
    this refers to upright conduct consistent with God's character more than social
    justice in isolation.
- source_word: ἐξ αὐτοῦ
  chosen: of him
  alternatives:
  - from him
  lexicon: BDAG
  rationale: Both are possible for ἐκ/ἐξ. 'Born of him' is idiomatic English in biblical/theological
    usage and preserves the source's filial imagery.
- source_word: γεγέννηται
  chosen: has been born
  alternatives:
  - is begotten
  - has been begotten
  lexicon: BDAG
  rationale: Perfect passive indicates a completed begetting/birth with continuing
    result. 'Has been born' is natural modern English and avoids archaic 'begotten'
    while preserving the passive sense.
