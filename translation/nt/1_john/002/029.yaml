theological_decisions:
- issue: Referent of 'he/him' (δίκαιός ἐστιν ... ἐξ αὐτοῦ)
  chosen_reading: Retain the pronoun 'he/him' without specifying whether the referent
    is God the Father or the Son.
  alternative_readings:
  - God the Father
  - the Son
  rationale: The immediate context allows debate over the antecedent, and the verse
    itself does not explicitly name the referent. To preserve theological tension
    rather than resolve it, the translation keeps the pronoun as in Greek rather than
    importing an interpretive specification.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
