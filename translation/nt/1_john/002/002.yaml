theological_decisions:
- issue: Scope of 'the whole world'
  chosen_reading: Retain the full expression 'the whole world' without interpretive
    narrowing.
  alternative_readings:
  - people from the whole world
  - the elect throughout the world
  rationale: The translation should preserve the text's breadth and not import a denominationally
    specific limitation where the Greek does not state one. This follows the doctrine
    guideline to preserve theological tension rather than resolve contested interpretive
    questions beyond the text.
  doctrine_reference: 'DOCTRINE.md: ''Preserve theological tension rather than resolve
    it'' and ''does not advocate for a particular denominational distinctive'''
- issue: Atonement terminology for ἱλασμός
  chosen_reading: Use 'atoning sacrifice' in the main text.
  alternative_readings:
  - propitiation
  - expiation
  rationale: The project avoids unnecessary ecclesiastical jargon in the main text
    while preserving significant theological alternatives in footnotes. 'Atoning sacrifice'
    communicates the core sense accessibly without deciding later theological debates
    more narrowly than the Greek requires.
  doctrine_reference: 'DOCTRINE.md: ''Readable modern English'' and contested-terms
    rationale for ἱλαστήριον'
