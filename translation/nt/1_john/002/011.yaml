id: 1JN.2.11
reference: 1 John 2:11
source:
  edition: SBLGNT
  text: ὁ δὲ μισῶν τὸν ἀδελφὸν αὐτοῦ ἐν τῇ σκοτίᾳ ἐστὶν καὶ ἐν τῇ σκοτίᾳ περιπατεῖ,
    καὶ οὐκ οἶδεν ποῦ ὑπάγει, ὅτι ἡ σκοτία ἐτύφλωσεν τοὺς ὀφθαλμοὺς αὐτοῦ.
translation:
  text: But the one who hates his brother is in the darkness and walks in the darkness,
    and does not know where he is going, because the darkness has blinded his eyes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'brother or sister'; the Greek says 'brother' and likely refers to a
      fellow believer within the Christian community.
    reason: lexical_alternative
lexical_decisions:
- source_word: μισῶν
  chosen: hates
  alternatives:
  - is hating
  lexicon: BDAG
  rationale: Present participle used substantivally with ὁ; English idiom is best
    captured by 'the one who hates,' expressing a characteristic stance rather than
    a momentary act.
- source_word: ἀδελφὸν
  chosen: brother
  alternatives:
  - brother or sister
  - fellow believer
  lexicon: BDAG
  rationale: The Greek is singular masculine and, in Johannine usage, commonly refers
    to a fellow member of the believing community. Per gender-accurate policy, 'brother'
    is retained in the main text rather than neutralizing; broader referential force
    can be noted in a footnote.
- source_word: ἐν τῇ σκοτίᾳ
  chosen: in the darkness
  alternatives:
  - in darkness
  lexicon: BDAG
  rationale: The article is present both times in Greek, and Johannine style often
    treats 'the darkness' as a morally/theologically charged sphere. Retaining the
    article preserves that force and the repetition.
- source_word: περιπατεῖ
  chosen: walks
  alternatives:
  - lives
  - conducts himself
  lexicon: BDAG
  rationale: '''Walks'' preserves the metaphor of conduct central to Johannine and
    broader biblical usage; more interpretive alternatives flatten the imagery.'
- source_word: οὐκ οἶδεν ποῦ ὑπάγει
  chosen: does not know where he is going
  alternatives:
  - does not know where he goes
  - does not know where he is headed
  lexicon: BDAG
  rationale: Natural modern English that preserves the present movement metaphor.
    'Is going' communicates ποῦ ὑπάγει without unnecessary stiffness.
- source_word: ἐτύφλωσεν
  chosen: has blinded
  alternatives:
  - blinded
  lexicon: BDAG
  rationale: 'The aorist can be rendered simply as past, but English present perfect
    fits the resulting present state in context: the darkness has acted and the blindness
    remains operative.'
- source_word: τοὺς ὀφθαλμοὺς αὐτοῦ
  chosen: his eyes
  alternatives:
  - the eyes of him
  lexicon: BDAG
  rationale: Standard English possessive rendering of the accusative object plus genitive
    pronoun; preserves the concrete image rather than abstracting to 'him.'
