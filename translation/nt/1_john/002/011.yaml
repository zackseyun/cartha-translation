theological_decisions:
- issue: Moral-spiritual sense of darkness in Johannine dualism
  chosen_reading: Render σκοτία literally as 'darkness' rather than interpretively
    as 'evil' or 'spiritual darkness.'
  alternative_readings:
  - evil
  - darkness of sin
  rationale: John's imagery intentionally preserves metaphorical and theological depth.
    A literal rendering keeps the symbolic contrast with light without importing a
    narrower doctrinal explanation into the text.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Referent of 'brother'
  chosen_reading: Retain 'brother' in the main text with representative force, rather
    than replacing it with an inclusive paraphrase.
  alternative_readings:
  - brother or sister
  - fellow believer
  rationale: The source is grammatically masculine singular and likely representative
    of a fellow believer within the community. Per the gender-accurate policy, the
    main text should match the source's form and intent while allowing clarification
    in a footnote.
  doctrine_reference: Translation philosophy §4
