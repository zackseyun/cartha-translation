id: 1JN.2.27
reference: 1 John 2:27
source:
  edition: SBLGNT
  text: καὶ ὑμεῖς τὸ χρῖσμα ὃ ἐλάβετε ἀπ’ αὐτοῦ ⸂μένει ἐν ὑμῖν⸃, καὶ οὐ χρείαν ἔχετε
    ἵνα τις διδάσκῃ ὑμᾶς· ἀλλ’ ὡς τὸ ⸀αὐτοῦ χρῖσμα διδάσκει ὑμᾶς περὶ πάντων, καὶ
    ἀληθές ἐστιν καὶ οὐκ ἔστιν ψεῦδος, καὶ καθὼς ἐδίδαξεν ὑμᾶς, ⸀μένετε ἐν αὐτῷ.
translation:
  text: And as for you, the anointing that you received from him remains in you, and
    you have no need that anyone should teach you. But as his anointing teaches you
    about all things, and is true and is not a lie, and just as it taught you, remain
    in him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, in some manuscripts, 'and just as it taught you, you remain in him.'
    reason: textual_variant
  - marker: b
    text: Or 'abides in you' / 'abide in him'; the same Greek verb is used throughout
      this verse.
    reason: lexical_alternative
lexical_decisions:
- source_word: χρῖσμα
  chosen: anointing
  alternatives:
  - anointing oil
  - unction
  lexicon: BDAG
  rationale: The noun literally denotes an anointing/anointing substance, but in this
    Johannine context it functions metaphorically for what believers have received
    from God, likely the Holy Spirit or the Spirit's consecrating/teaching work. 'Anointing'
    preserves the metaphor without over-interpreting it as 'Spirit' in the main text.
- source_word: ἀπ’ αὐτοῦ
  chosen: from him
  alternatives:
  - from the Holy One
  - from God
  lexicon: BDAG
  rationale: The pronoun refers back to the prior context rather than restating the
    antecedent here. 'From him' preserves the Greek wording and lets the reader connect
    it contextually, avoiding importing a more explicit identification into the verse
    itself.
- source_word: μένει ἐν ὑμῖν
  chosen: remains in you
  alternatives:
  - abides in you
  lexicon: BDAG
  rationale: '''Remain'' is clear modern English and preserves Johannine μένω language
    consistently. ''Abide'' is traditional but more archaic for many readers.'
- source_word: οὐ χρείαν ἔχετε ἵνα τις διδάσκῃ ὑμᾶς
  chosen: you have no need that anyone should teach you
  alternatives:
  - you have no need for anyone to teach you
  lexicon: BDAG
  rationale: This closely follows the Greek structure while remaining natural English.
    It should not be paraphrased into an absolute denial of all human teaching; the
    wording preserves the statement as given.
- source_word: διδάσκῃ / διδάσκει / ἐδίδαξεν
  chosen: teach / teaches / taught
  alternatives:
  - instruct / instructs / instructed
  lexicon: BDAG
  rationale: A consistent rendering preserves the repetition and rhetorical force
    of the verse.
- source_word: περὶ πάντων
  chosen: about all things
  alternatives:
  - concerning everything
  - about everything
  lexicon: BDAG
  rationale: A fairly literal rendering preserves the breadth of the phrase without
    narrowing its scope. 'All things' reflects πάντων more transparently than a more
    interpretive limitation.
- source_word: ἀληθές ἐστιν
  chosen: is true
  alternatives:
  - is real
  - is truthful
  lexicon: BDAG
  rationale: The predicate likely describes the anointing as true/genuine in contrast
    to falsehood. 'Is true' is the most direct rendering.
- source_word: οὐκ ἔστιν ψεῦδος
  chosen: is not a lie
  alternatives:
  - is no lie
  - is not falsehood
  lexicon: BDAG
  rationale: This preserves the stark Johannine antithesis between truth and lie in
    accessible English.
- source_word: καθὼς ἐδίδαξεν ὑμᾶς
  chosen: just as it taught you
  alternatives:
  - as it taught you
  lexicon: BDAG
  rationale: The comparative conjunction is retained to connect the exhortation with
    the prior teaching activity of the anointing.
- source_word: μένετε ἐν αὐτῷ
  chosen: remain in him
  alternatives:
  - abide in him
  lexicon: BDAG
  rationale: The printed text reads the imperative/plural form, yielding an exhortation.
    'Remain' keeps Johannine terminology consistent with earlier μένει and is more
    readable than 'abide.' The pronoun is left as 'him' rather than interpreted as
    'it' to reflect the masculine pronoun in Greek and the likely personal referent
    in context.
