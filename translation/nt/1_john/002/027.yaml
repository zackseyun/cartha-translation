theological_decisions:
- issue: Referent of 'the anointing' (χρῖσμα)
  chosen_reading: Rendered as 'anointing' without identifying it explicitly in the
    main text.
  alternative_readings:
  - the Holy Spirit
  - the message/gospel received
  rationale: The verse likely refers to the Spirit's consecrating and teaching presence,
    but the text itself uses the metaphor 'anointing.' To avoid importing a doctrinally
    specific gloss beyond the wording of the verse, the metaphor is preserved in the
    main text.
  doctrine_reference: Translation philosophy §1, §3
- issue: Force of 'you have no need that anyone should teach you'
  chosen_reading: Kept as stated, without softening or absolutizing.
  alternative_readings:
  - a hyperbolic denial of any human teachers
  - a contextual denial that the secessionists are needed as teachers
  rationale: The statement must not be paraphrased into a doctrinal claim that eliminates
    all human teaching in the church, nor should it be weakened beyond the Greek.
    The translation preserves the wording while allowing context to govern interpretation.
  doctrine_reference: Translation philosophy §3
- issue: Final verb μένετε
  chosen_reading: 'Imperative: ''remain in him.'''
  alternative_readings:
  - 'Indicative: ''you remain in him'''
  rationale: The SBLGNT text reads μένετε, naturally taken as an imperative in this
    context. Because some manuscripts support an indicative reading, the alternative
    is preserved in a footnote rather than resolved silently.
  doctrine_reference: Translation philosophy §3
