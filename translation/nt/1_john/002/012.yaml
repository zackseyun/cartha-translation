theological_decisions:
- issue: Referent of 'his' in 'his name'
  chosen_reading: Left as 'his' without explicit identification in the main text
  alternative_readings:
  - God
  - Jesus Messiah
  rationale: The immediate verse does not explicitly name the referent, and interpreters
    differ based on the wider context of 1 John. To preserve the text's own wording
    and avoid importing a resolution the verse itself does not state, the pronoun
    is retained.
  doctrine_reference: Preserve theological tension rather than resolve it.
