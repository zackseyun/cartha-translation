id: 1JN.2.12
reference: 1 John 2:12
source:
  edition: SBLGNT
  text: Γράφω ὑμῖν, τεκνία, ὅτι ἀφέωνται ὑμῖν αἱ ἁμαρτίαι διὰ τὸ ὄνομα αὐτοῦ·
translation:
  text: I am writing to you, little children, because your sins have been forgiven
    for the sake of his name.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I write to you.' The Greek present may be rendered either as a simple
      present or as 'I am writing' in epistolary context.
    reason: lexical_alternative
  - marker: b
    text: Or 'that your sins have been forgiven.' The conjunction can be read as introducing
      content, though here it likely gives the reason for John's writing.
    reason: alternative_reading
  - marker: c
    text: The referent of 'his' may be understood from context as God or as Jesus;
      the Greek leaves it implicit.
    reason: alternative_reading
lexical_decisions:
- source_word: Γράφω
  chosen: I am writing
  alternatives:
  - I write
  lexicon: BDAG
  rationale: Present indicative can be rendered as a simple present ('I write') or
    as a progressive present in epistolary context. 'I am writing' reads naturally
    in English and reflects the ongoing act of composition without changing the sense.
- source_word: τεκνία
  chosen: little children
  alternatives:
  - dear children
  - children
  lexicon: BDAG
  rationale: The diminutive vocative conveys affection, not merely age. 'Little children'
    preserves the familial and tender force more transparently than the more interpretive
    'dear children.'
- source_word: ὅτι
  chosen: because
  alternatives:
  - that
  lexicon: BDAG
  rationale: In this context ὅτι introduces the reason John is writing to them, not
    merely the content of what he writes. 'Because' best fits the discourse pattern
    in the surrounding verses.
- source_word: ἀφέωνται
  chosen: have been forgiven
  alternatives:
  - are forgiven
  - have been sent away
  lexicon: BDAG
  rationale: This perfect/passive form denotes a completed act with abiding result.
    'Have been forgiven' captures both the passive voice and the continuing state
    better than the simple present 'are forgiven.' The more literal etymological idea
    'sent away' is not idiomatic here.
- source_word: αἱ ἁμαρτίαι
  chosen: your sins
  alternatives:
  - the sins
  lexicon: BDAG
  rationale: 'Although the article is present in Greek, English idiom naturally uses
    the possessive implied by the dative ὑμῖν with forgiveness language: ''your sins
    have been forgiven.'' This makes explicit what the Greek construction communicates.'
- source_word: διὰ τὸ ὄνομα αὐτοῦ
  chosen: for the sake of his name
  alternatives:
  - because of his name
  - on account of his name
  lexicon: BDAG
  rationale: διά with the accusative expresses reason or basis. 'For the sake of his
    name' preserves the biblical-theological weight of acting in relation to a person's
    name, while remaining natural English. It avoids flattening 'name' into mere reputation.
- source_word: ὄνομα
  chosen: name
  alternatives:
  - reputation
  lexicon: BDAG
  rationale: The Greek term carries covenantal and personal significance beyond reputation
    alone. 'Name' preserves that theological resonance and allows readers to hear
    the biblical idiom.
