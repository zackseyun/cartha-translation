theological_decisions:
- issue: Rendering Χριστός in a christological confession/denial formula
  chosen_reading: Messiah
  alternative_readings:
  - Christ
  rationale: The verse concerns denial that Jesus is ὁ χριστός. Because the term is
    titular here, the doctrinal default is to translate rather than transliterate.
    This preserves the messianic claim at stake without importing later name-like
    usage.
  doctrine_reference: 'DOCTRINE.md: Contested terms table (Χριστός → Messiah where
    title; Christ where name-like)'
- issue: Reference of ἀντίχριστος
  chosen_reading: the antichrist
  alternative_readings:
  - antichrist
  rationale: The article in Greek supports a definite rendering. In Johannine usage
    the term can denote a type or representative opponent rather than only a single
    end-time individual; the translation preserves the Greek wording without narrowing
    the theological referent beyond the text.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it'
