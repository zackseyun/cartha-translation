id: 1JN.2.22
reference: 1 John 2:22
source:
  edition: SBLGNT
  text: τίς ἐστιν ὁ ψεύστης εἰ μὴ ὁ ἀρνούμενος ὅτι Ἰησοῦς οὐκ ἔστιν ὁ χριστός; οὗτός
    ἐστιν ὁ ἀντίχριστος, ὁ ἀρνούμενος τὸν πατέρα καὶ τὸν υἱόν.
translation:
  text: 'Who is the liar except the one who denies that Jesus is the Messiah? This
    is the antichrist: the one who denies the Father and the Son.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “the Christ.” The Greek title is ὁ χριστός; here it is rendered “the
      Messiah” because it functions as a title rather than a name.
    reason: alternative_reading
  - marker: b
    text: 'Or simply, “antichrist.” The Greek has the article: “the antichrist.” In
      John’s letters the term can denote the kind of opponent characterized by denying
      the Father and the Son.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ψεύστης
  chosen: the liar
  alternatives:
  - a liar
  lexicon: BDAG
  rationale: With the article ὁ, the noun is definite and points to the paradigmatic
    liar in this polemical context, not merely any liar.
- source_word: ἀρνούμενος
  chosen: the one who denies
  alternatives:
  - the one rejecting
  - the denier
  lexicon: BDAG
  rationale: The present middle participle functions substantivally. 'The one who
    denies' preserves the ongoing/characterizing force and reads naturally in English.
- source_word: ὅτι Ἰησοῦς οὐκ ἔστιν ὁ χριστός
  chosen: that Jesus is not the Messiah
  alternatives:
  - that Jesus is not the Christ
  lexicon: BDAG
  rationale: ὅτι introduces the content of the denial. Per project doctrine, Χριστός
    as a title is translated 'Messiah' rather than transliterated 'Christ' to preserve
    its meaning and Jewish messianic context.
- source_word: ὁ χριστός
  chosen: the Messiah
  alternatives:
  - the Christ
  lexicon: BDAG
  rationale: Here Χριστός is clearly titular, not name-like, so the default doctrinal
    rendering 'Messiah' applies.
- source_word: ἀντίχριστος
  chosen: antichrist
  alternatives:
  - the antichrist
  - anti-Messiah
  lexicon: BDAG
  rationale: The Greek has the article, and English can express this class/title idiomatically
    as 'the antichrist.' In the sentence 'This is the antichrist,' the demonstrative
    plus article marks the identified figure/type. 'Anti-Messiah' is more etymologically
    transparent but not standard English usage.
- source_word: πατέρα
  chosen: Father
  lexicon: BDAG
  rationale: Capitalized because in Johannine usage with 'the Son' this refers specifically
    to God the Father, not fatherhood in general.
- source_word: υἱόν
  chosen: Son
  lexicon: BDAG
  rationale: Capitalized because the referent is the Son in the Father-Son relation
    central to Johannine Christology.
- source_word: οὗτός ἐστιν
  chosen: This is
  alternatives:
  - This one is
  - He is
  lexicon: BDAG
  rationale: The demonstrative points back to the person just described. 'This is'
    is direct and idiomatic, preserving the force of identification.
