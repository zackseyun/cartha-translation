theological_decisions:
- issue: Rendering ἀδελφός in a representative singular ethical statement
  chosen_reading: brother
  alternative_readings:
  - brother or sister
  - fellow believer
  rationale: Following the translation philosophy's gender-accurate principle, the
    masculine singular is rendered 'brother' in the main text. Because modern readers
    may hear this more narrowly than the Greek intends, an inclusive alternative is
    preserved in a footnote. 'Fellow believer' is interpretive and therefore not preferred
    for the main text, though context in 1 John often points in that direction.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
