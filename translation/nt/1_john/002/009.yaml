id: 1JN.2.9
reference: 1 John 2:9
source:
  edition: SBLGNT
  text: ὁ λέγων ἐν τῷ φωτὶ εἶναι καὶ τὸν ἀδελφὸν αὐτοῦ μισῶν ἐν τῇ σκοτίᾳ ἐστὶν ἕως
    ἄρτι.
translation:
  text: The one who says he is in the light and hates his brother is in the darkness
    until now.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his brother or sister.' The Greek has the masculine singular 'brother,'
      which may function representatively in this ethical context.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ λέγων
  chosen: The one who says
  alternatives:
  - Whoever says
  - The person who says
  lexicon: BDAG
  rationale: The article with present participle functions substantivally, referring
    to a representative person. 'The one who says' preserves the Greek structure and
    ongoing characteristic force better than a more paraphrastic rendering.
- source_word: ἐν τῷ φωτὶ
  chosen: in the light
  alternatives:
  - in light
  lexicon: BDAG
  rationale: A straightforward locative/metaphorical expression. Retaining the article
    matches the Greek and preserves Johannine imagery of the moral/spiritual sphere
    of divine truth and life.
- source_word: εἶναι
  chosen: he is
  alternatives:
  - to be
  lexicon: BDAG
  rationale: English idiom requires finite expression after 'says.' The supplied pronoun
    'he' reflects the singular representative subject and keeps the sentence natural.
- source_word: τὸν ἀδελφὸν αὐτοῦ
  chosen: his brother
  alternatives:
  - his fellow believer
  - his brother or sister
  lexicon: BDAG
  rationale: ἀδελφός is grammatically masculine singular. Per doctrine, gender-accurate
    rendering is preferred over gender-neutral. In 1 John the term likely refers to
    a fellow believer, but 'brother' preserves the lexical form and leaves the relational/theological
    scope to context rather than importing an interpretation into the main text.
- source_word: μισῶν
  chosen: hates
  alternatives:
  - is hating
  lexicon: BDAG
  rationale: Present participle denotes an ongoing characteristic attitude. English
    simple present best conveys this habitual force without awkwardness.
- source_word: ἐν τῇ σκοτίᾳ
  chosen: in the darkness
  alternatives:
  - in darkness
  lexicon: BDAG
  rationale: Mirrors the earlier phrase 'in the light' and preserves Johannine dualism.
    The article is retained for stylistic and conceptual parallelism.
- source_word: ἕως ἄρτι
  chosen: until now
  alternatives:
  - until the present
  - still
  lexicon: BDAG
  rationale: This idiom indicates continuance up to the present moment. 'Until now'
    is the most direct and natural rendering, preserving the temporal emphasis that
    the person's claim has not altered his actual state.
