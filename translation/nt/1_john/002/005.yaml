theological_decisions:
- issue: Genitive sense in 'ἡ ἀγάπη τοῦ θεοῦ'
  chosen_reading: the love of God
  alternative_readings:
  - God's love
  - love for God
  rationale: The Greek genitive is genuinely ambiguous, and Johannine usage can support
    either God's love operative in the believer or the believer's love directed toward
    God. To preserve theological tension rather than resolve it, the main text keeps
    the more literal 'the love of God,' with alternatives footnoted.
  doctrine_reference: 'Translation philosophy §3 (Preserve theological tension rather
    than resolve it); Contested terms table: ἀγάπη → love'
- issue: Referent of 'ἐν τούτῳ' in the first clause
  chosen_reading: personal sense reflected as 'in him'
  alternative_readings:
  - in this
  - in this one
  rationale: The dative demonstrative can be read more literally ('in this') or personally
    with reference to the obedient person. Because English 'truly in this the love
    of God has been perfected' is awkward and potentially misleading, the main text
    uses 'in him' for clarity, while preserving the more literal option in a footnote.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve ambiguity
    where genuine'
