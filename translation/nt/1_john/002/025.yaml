theological_decisions:
- issue: Referent of 'he himself' (αὐτός)
  chosen_reading: Retained as 'he himself' without specifying beyond the Greek pronoun.
  alternative_readings:
  - the Father
  - the Son
  rationale: The immediate Greek text does not explicitly restate the antecedent,
    and interpreters differ on whether the referent is primarily the Father or the
    Son in context. The translation preserves the text's wording and theological openness
    rather than resolving the referent beyond what the verse states.
  doctrine_reference: Preserve theological tension rather than resolve it.
