id: 1JN.2.25
reference: 1 John 2:25
source:
  edition: SBLGNT
  text: καὶ αὕτη ἐστὶν ἡ ἐπαγγελία ἣν αὐτὸς ἐπηγγείλατο ἡμῖν, τὴν ζωὴν τὴν αἰώνιον.
translation:
  text: 'And this is the promise that he himself promised us: eternal life.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the eternal life.' The Greek has the article, but English idiom normally
      renders the phrase as 'eternal life.'
    reason: lexical_alternative
  - marker: b
    text: The pronoun 'he himself' is emphatic in Greek. The text does not explicitly
      restate whether the referent is the Father or the Son.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐπαγγελία
  chosen: promise
  alternatives:
  - what was promised
  lexicon: BDAG
  rationale: The noun denotes a promise or pledged gift. 'Promise' is the most direct
    and natural rendering in English and preserves the connection with the cognate
    verb ἐπηγγείλατο later in the verse.
- source_word: αὐτός
  chosen: he himself
  alternatives:
  - he
  lexicon: BDAG
  rationale: The pronoun is emphatic in position and form. Rendering it as 'he himself'
    preserves the emphasis rather than flattening it to a simple subject pronoun.
- source_word: ἐπηγγείλατο
  chosen: promised
  alternatives:
  - made a promise
  - promised personally
  lexicon: BDAG
  rationale: The aorist middle of ἐπαγγέλλομαι means 'promised' or 'made a promise.'
    English 'promised' is concise and keeps the cognate link with ἐπαγγελία. The middle
    voice does not require a special English reflexive beyond the emphatic αὐτός already
    rendered as 'he himself.'
- source_word: ἡμῖν
  chosen: us
  alternatives:
  - to us
  lexicon: BDAG
  rationale: The dative indirect object is naturally expressed in English as 'us'
    after 'promised.' 'To us' would also be possible but is less idiomatic here.
- source_word: τὴν ζωὴν τὴν αἰώνιον
  chosen: eternal life
  alternatives:
  - the eternal life
  - life everlasting
  lexicon: BDAG
  rationale: This accusative phrase stands in apposition to 'the promise' and identifies
    its content. 'Eternal life' is the standard, clear rendering of ζωή αἰώνιος in
    Johannine usage. Omitting the article in English is idiomatic, while preserving
    the definite sense.
- source_word: καὶ αὕτη ἐστίν
  chosen: And this is
  alternatives:
  - And this is what
  lexicon: BDAG
  rationale: This introductory clause points back to the preceding discussion and
    introduces the content now specified. 'And this is' is straightforward and sufficiently
    formal without adding interpretive material.
