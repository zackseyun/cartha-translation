id: 1JN.2.14
reference: 1 John 2:14
source:
  edition: SBLGNT
  text: ⸀ἔγραψα ὑμῖν, παιδία, ὅτι ἐγνώκατε τὸν πατέρα· ἔγραψα ὑμῖν, πατέρες, ὅτι ἐγνώκατε
    τὸν ἀπ’ ἀρχῆς· ἔγραψα ὑμῖν, νεανίσκοι, ὅτι ἰσχυροί ἐστε καὶ ὁ λόγος τοῦ θεοῦ ἐν
    ὑμῖν μένει καὶ νενικήκατε τὸν πονηρόν.
translation:
  text: I have written to you, children, because you have known the Father. I have
    written to you, fathers, because you have known him who is from the beginning.
    I have written to you, young men, because you are strong, and the word of God
    remains in you, and you have overcome the evil one.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'I wrote to you' throughout the verse. The Greek aorist can be rendered
      as a simple past, but here 'I have written' better reflects the epistolary context
      and present relevance.
    reason: lexical_alternative
  - marker: b
    text: '''Him who is from the beginning'' likely refers to the preexistent Son
      in Johannine usage, though the text does not name the referent explicitly.'
    reason: alternative_reading
  - marker: c
    text: Or, 'abides in you' for 'remains in you.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔγραψα
  chosen: I have written
  alternatives:
  - I wrote
  lexicon: BDAG
  rationale: Although the form is aorist, in this epistolary context English present
    perfect best conveys the force of a completed act with present relevance and preserves
    the repeated rhetorical pattern across the verse.
- source_word: παιδία
  chosen: children
  alternatives:
  - little children
  - dear children
  lexicon: BDAG
  rationale: The term is a diminutive/plural address for John's readers. 'Children'
    is natural modern English and preserves the familial metaphor without adding the
    affectionate nuance of 'dear' or the more interpretive 'little' unless context
    requires it.
- source_word: ἐγνώκατε
  chosen: you have known
  alternatives:
  - you know
  - you have come to know
  lexicon: BDAG
  rationale: The perfect indicates a settled knowledge resulting from prior coming-to-know.
    'You have known' preserves the perfect aspect more closely than simple present,
    while remaining readable.
- source_word: τὸν πατέρα
  chosen: the Father
  alternatives:
  - the father
  lexicon: BDAG
  rationale: In Johannine usage this is a clear divine title referring to God. Capitalization
    signals titular reference in English without altering the meaning.
- source_word: πατέρες
  chosen: fathers
  alternatives:
  - older men
  lexicon: BDAG
  rationale: The vocative likely addresses a group metaphorically or by spiritual
    maturity. 'Fathers' preserves the source term and the rhetorical triad, rather
    than flattening it to age alone.
- source_word: τὸν ἀπ’ ἀρχῆς
  chosen: him who is from the beginning
  alternatives:
  - him who was from the beginning
  - the one from the beginning
  lexicon: BDAG
  rationale: The phrase likely refers to the Son in Johannine idiom, but the text
    does not explicitly name him here. 'Him who is from the beginning' preserves the
    present force of the articular phrase and avoids over-specification.
- source_word: νεανίσκοι
  chosen: young men
  alternatives:
  - younger men
  lexicon: BDAG
  rationale: The masculine plural should be rendered gender-accurately per project
    philosophy. 'Young men' is the straightforward lexical equivalent and preserves
    the contrast with 'fathers' and 'children'.
- source_word: ἰσχυροί
  chosen: strong
  alternatives:
  - mighty
  lexicon: BDAG
  rationale: '''Strong'' is the natural and direct rendering in this moral-spiritual
    context.'
- source_word: ὁ λόγος τοῦ θεοῦ
  chosen: the word of God
  alternatives:
  - God's word
  lexicon: BDAG
  rationale: This preserves the familiar Johannine and biblical phrasing and leaves
    open whether the emphasis is on God's message generally or the proclaimed gospel
    specifically.
- source_word: μένει
  chosen: remains
  alternatives:
  - abides
  - stays
  lexicon: BDAG
  rationale: μένω is a key Johannine term. 'Remains' is readable modern English and
    preserves the durative sense without the slightly archaic feel of 'abides'.
- source_word: νενικήκατε
  chosen: you have overcome
  alternatives:
  - you have conquered
  - you have been victorious over
  lexicon: BDAG
  rationale: The perfect again indicates a completed victory with ongoing significance.
    'Overcome' is idiomatic and fits Johannine usage.
- source_word: τὸν πονηρόν
  chosen: the evil one
  alternatives:
  - the wicked one
  - evil
  lexicon: BDAG
  rationale: With the article and masculine form, the phrase is best taken personally
    rather than abstractly. 'The evil one' is the standard clear rendering for Satan/the
    devil in this context.
