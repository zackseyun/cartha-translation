theological_decisions:
- issue: Referent of 'him who is from the beginning'
  chosen_reading: Left implicit as 'him who is from the beginning' rather than identifying
    explicitly as Christ.
  alternative_readings:
  - Interpreted explicitly as Christ/the Son
  - Interpreted more generally as God
  rationale: Johannine usage strongly suggests a personal referent associated with
    preexistence, likely the Son, but the Greek text itself does not name the referent
    here. To preserve theological tension and avoid importing an explicit identification
    not stated in the verse, the translation keeps the phrase as written.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
- issue: Gendered addressees in the triad
  chosen_reading: Rendered παιδία as 'children' and νεανίσκοι/πατέρες as 'young men'/'fathers'.
  alternative_readings:
  - Render all three generically as age-group metaphors for the whole church
  rationale: 'The Greek uses a mixed pattern: a gender-inclusive term for one group
    and masculine terms for the other two. Per project philosophy, the translation
    should be gender-accurate rather than flatten masculine forms into neutral language.
    The metaphorical or representative force can be noted without changing the lexical
    form.'
  doctrine_reference: 'Translation philosophy §4: Gender-accurate over gender-neutral.'
