id: 1JN.2.6
reference: 1 John 2:6
source:
  edition: SBLGNT
  text: ὁ λέγων ἐν αὐτῷ μένειν ὀφείλει καθὼς ἐκεῖνος περιεπάτησεν καὶ ⸀αὐτὸς περιπατεῖν.
translation:
  text: The one who says he remains in him ought also to walk just as that one walked.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'abides in him.' The Greek verb μένω is a key Johannine term for continuing,
      remaining, or abiding in relationship.
    reason: lexical_alternative
  - marker: b
    text: '''That one'' refers to Jesus and preserves the emphatic demonstrative force
      of the Greek; many translations simply read ''he.'''
    reason: alternative_reading
  - marker: c
    text: '''Walk'' is a biblical metaphor for one''s manner of life; that is, one
      ought to live as Jesus lived.'
    reason: cultural_note
lexical_decisions:
- source_word: ὁ λέγων
  chosen: The one who says
  alternatives:
  - Whoever says
  - The person who says
  lexicon: BDAG
  rationale: The articular participle functions substantivally, referring to a representative
    person. 'The one who says' preserves the Greek structure and generic force without
    over-paraphrase.
- source_word: ἐν αὐτῷ μένειν
  chosen: he remains in him
  alternatives:
  - he abides in him
  - to remain in him
  lexicon: BDAG
  rationale: μένω is a key Johannine term often rendered 'remain' or 'abide.' 'Remain'
    is more accessible modern English while preserving the relational and persevering
    sense. The infinitive depends on λέγων as the content of the claim. The supplied
    'he' reflects the generic singular subject implied by the participle; 'him' preserves
    the masculine singular pronoun of the Greek.
- source_word: ὀφείλει
  chosen: ought
  alternatives:
  - is obligated
  - must
  lexicon: BDAG
  rationale: ὀφείλω here expresses moral obligation. 'Ought' captures ethical duty
    in natural English without sounding overly legal ('is obligated') or stronger
    than necessary ('must').
- source_word: καθὼς
  chosen: just as
  alternatives:
  - as
  - in the same way as
  lexicon: BDAG
  rationale: καθώς marks correspondence or manner. 'Just as' clearly signals the exemplary
    comparison intended.
- source_word: ἐκεῖνος
  chosen: that one
  alternatives:
  - he
  - that person
  lexicon: BDAG
  rationale: In Johannine usage, ἐκεῖνος can function as an emphatic or reverential
    pronoun, here most naturally referring to Christ. 'That one' preserves the Greek
    demonstrative force better than a simple 'he,' while remaining understandable
    in English.
- source_word: περιεπάτησεν ... περιπατεῖν
  chosen: walked ... to walk
  alternatives:
  - lived ... to live
  - conducted himself ... to conduct himself
  lexicon: BDAG
  rationale: περιπατέω is a common biblical metaphor for manner of life. Retaining
    'walk' preserves the metaphor and intertextual consistency, especially in Johannine
    and broader NT ethical language. The aorist plus infinitive are reflected as 'walked'
    and 'to walk.'
- source_word: καὶ αὐτὸς
  chosen: also
  alternatives:
  - himself also
  - he too
  lexicon: BDAG
  rationale: The pronoun αὐτός adds emphasis to the subject's corresponding obligation.
    In idiomatic English, 'also' adequately conveys the additive force without awkwardness;
    the subject is already explicit in the clause.
