theological_decisions:
- issue: Referent of αὐτῷ / ἐκεῖνος
  chosen_reading: Both pronouns are rendered with lowercase 'him' / 'that one,' with
    the referent understood as Christ/Jesus from the immediate context.
  alternative_readings:
  - Capitalize as 'Him' to signal deity
  - Render ἐκεῖνος simply as 'he'
  rationale: The context of 1 John 2 points to Jesus as the model whose walk believers
    are to imitate. However, English capitalization of pronouns for deity is an interpretive
    convention not marked in Greek, so lowercase is preferred. 'That one' preserves
    the demonstrative emphasis of ἐκεῖνος while allowing the Christological referent
    to remain contextually clear.
  doctrine_reference: Affirmations; Translation philosophy §§1, 3, 6
- issue: Generic masculine representation
  chosen_reading: Use 'The one who says he remains in him' rather than a pluralized
    or gender-neutral recast.
  alternative_readings:
  - Whoever says they remain in him
  - Those who say they remain in him
  rationale: The Greek is grammatically masculine singular with representative force.
    Per the gender-accurate policy, the translation keeps the singular form rather
    than neutralizing or pluralizing it, while understanding it as generic.
  doctrine_reference: Translation philosophy §4
