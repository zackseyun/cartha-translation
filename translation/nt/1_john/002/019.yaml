theological_decisions:
- issue: Whether 'of us' should be rendered in a way that settles the theological
    question of visible versus invisible community membership
  chosen_reading: Retain the relational phrase 'of us' rather than interpretively
    expanding it to 'truly believers' or 'really saved people.'
  alternative_readings:
  - they did not really belong to the church
  - they were never truly believers
  rationale: The verse distinguishes departure from genuine belonging, but the Greek
    itself uses community language rather than later systematic-theological categories.
    Preserving 'of us' maintains the text's theological tension and avoids importing
    a denominationally loaded formulation.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
