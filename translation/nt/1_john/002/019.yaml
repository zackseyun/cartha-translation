id: 1JN.2.19
reference: 1 John 2:19
source:
  edition: SBLGNT
  text: ἐξ ἡμῶν ἐξῆλθαν, ἀλλ’ οὐκ ἦσαν ἐξ ἡμῶν· εἰ γὰρ ⸂ἐξ ἡμῶν ἦσαν⸃, μεμενήκεισαν
    ἂν μεθ’ ἡμῶν· ἀλλ’ ἵνα φανερωθῶσιν ὅτι οὐκ εἰσὶν πάντες ἐξ ἡμῶν.
translation:
  text: They went out from us, but they were not of us; for if they had been of us,
    they would have remained with us. But this happened so that it might be made clear
    that not all are of us.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they would have continued with us.'
    reason: lexical_alternative
  - marker: b
    text: Or 'so that they might be revealed' or 'made manifest.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξ ἡμῶν
  chosen: from us / of us
  alternatives:
  - out from us / from among us
  - belonging to us
  lexicon: BDAG
  rationale: 'The repeated phrase carries two related senses in context: departure
    from the community (''from us'') and lack of true belonging/origin (''of us'').
    Rendering the first occurrence as ''from us'' and later occurrences as ''of us''
    preserves the Greek repetition while making the relational sense natural in English.'
- source_word: ἐξῆλθαν
  chosen: went out
  alternatives:
  - departed
  - went out from among
  lexicon: BDAG
  rationale: Aorist of ἐξέρχομαι is straightforwardly 'went out.' This keeps the concrete
    imagery of departure without overinterpreting it as apostasy in the verb itself.
- source_word: οὐκ ἦσαν ἐξ ἡμῶν
  chosen: they were not of us
  alternatives:
  - they did not belong to us
  - they were not from us
  lexicon: BDAG
  rationale: '''Of us'' best captures the idiomatic sense of belonging/identity while
    staying close to the Greek. ''Did not belong to us'' is interpretive and slightly
    more expansive.'
- source_word: εἰ γὰρ ἐξ ἡμῶν ἦσαν
  chosen: for if they had been of us
  alternatives:
  - for if they were of us
  - for if they had belonged to us
  lexicon: BDAG
  rationale: English conditional style calls for pluperfect sense in the protasis
    to match the contrary-to-fact condition. 'Of us' maintains the same relational
    language as the Greek.
- source_word: μεμενήκεισαν ἂν μεθ’ ἡμῶν
  chosen: they would have remained with us
  alternatives:
  - they would have stayed with us
  - they would have continued with us
  lexicon: BDAG
  rationale: Pluperfect of μένω with ἄν expresses a contrary-to-fact result. 'Remained'
    preserves the Johannine resonance of μένω ('remain/abide') better than 'stayed,'
    while still sounding natural.
- source_word: ἀλλ’ ἵνα φανερωθῶσιν
  chosen: But this happened so that it might be made clear
  alternatives:
  - but in order that they might be revealed
  - but so that they might be shown
  lexicon: BDAG
  rationale: The passive φανερωθῶσιν means 'be revealed/made manifest.' Adding 'this
    happened' makes the English clause complete and reflects the implied result/purpose
    connection after the adversative ἀλλά. 'Made clear' is idiomatic and communicates
    the passive sense accessibly.
- source_word: ὅτι οὐκ εἰσὶν πάντες ἐξ ἡμῶν
  chosen: that not all are of us
  alternatives:
  - that they are not all of us
  - that not all belong to us
  lexicon: BDAG
  rationale: The Greek places πάντες before ἐξ ἡμῶν; 'not all are of us' preserves
    the emphasis without forcing an explicit pronoun. This leaves the statement broad
    and close to the source.
