theological_decisions:
- issue: Referent of 'the Holy One'
  chosen_reading: Kept as 'the Holy One' without specifying whether this refers to
    the Father or to the Son.
  alternative_readings:
  - the Father
  - the Son/Jesus Messiah
  rationale: The text itself does not explicitly identify the referent, and Johannine
    usage allows either divine referent in context. Preserving the title maintains
    the text's theological tension rather than resolving it interpretively.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
- issue: Sense of χρῖσμα
  chosen_reading: Rendered as 'anointing' and left metaphorical rather than explicated
    as 'the Holy Spirit.'
  alternative_readings:
  - the Holy Spirit
  - the Spirit's anointing
  - an anointing gift
  rationale: While many interpreters understand the anointing as the Holy Spirit or
    the Spirit's work, the Greek uses the metaphor χρῖσμα. The translation preserves
    that wording and leaves fuller interpretation to teaching or notes.
  doctrine_reference: 'Translation philosophy §1 and §3: original-language primacy;
    preserve ambiguity where genuine.'
