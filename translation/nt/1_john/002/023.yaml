id: 1JN.2.23
reference: 1 John 2:23
source:
  edition: SBLGNT
  text: πᾶς ὁ ἀρνούμενος τὸν υἱὸν οὐδὲ τὸν πατέρα ἔχει· ⸂ὁ ὁμολογῶν τὸν υἱὸν καὶ τὸν
    πατέρα ἔχει⸃.
translation:
  text: Everyone who denies the Son does not have the Father either; whoever confesses
    the Son has the Father also.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Some manuscripts omit: ''whoever confesses the Son has the Father also.'''
    reason: textual_variant
lexical_decisions:
- source_word: πᾶς ὁ ἀρνούμενος
  chosen: Everyone who denies
  alternatives:
  - Whoever denies
  - Every one denying
  lexicon: BDAG
  rationale: 'The articular present participle functions substantivally and generically:
    ''everyone/whoever who denies.'' ''Everyone who denies'' is natural modern English
    and preserves the universal scope and ongoing/generic force better than a wooden
    participial rendering.'
- source_word: ἀρνούμενος
  chosen: denies
  alternatives:
  - rejects
  - disowns
  lexicon: BDAG
  rationale: ἀρνέομαι commonly means 'deny' in confessional contexts. 'Denies' best
    matches Johannine theological usage concerning repudiation of Jesus' identity,
    without adding interpretive nuance such as social disowning or broader rejection.
- source_word: τὸν υἱὸν
  chosen: the Son
  alternatives:
  - the Son of God
  lexicon: BDAG
  rationale: The Greek reads simply 'the Son.' Expanding to 'the Son of God' would
    import contextually true theology not explicitly stated in this clause. The article
    signals a definite christological title, so 'the Son' is retained.
- source_word: οὐδὲ
  chosen: either
  alternatives:
  - also not
  - not even
  lexicon: BDAG
  rationale: 'In this construction οὐδὲ links the negation from the first object to
    the second: one who denies the Son does not have the Father either. ''Either''
    is idiomatic English and preserves the correlative force.'
- source_word: τὸν πατέρα ἔχει
  chosen: have the Father
  alternatives:
  - possesses the Father
  - is in relationship with the Father
  lexicon: BDAG
  rationale: ἔχω is literally 'have.' In Johannine theology this implies relational
    possession/communion, but the translation should not paraphrase that implication
    into the main text. 'Have the Father' preserves the source wording and theological
    weight.
- source_word: ὁ ὁμολογῶν
  chosen: whoever confesses
  alternatives:
  - the one confessing
  - everyone who acknowledges
  lexicon: BDAG
  rationale: Like the first participle, this is a substantival present participle
    with generic force. 'Whoever confesses' is idiomatic and balances the first clause.
    'Confesses' preserves the public/explicit acknowledgment sense of ὁμολογέω better
    than the weaker 'acknowledges.'
- source_word: καὶ
  chosen: also
  alternatives:
  - and
  lexicon: BDAG
  rationale: 'Although καὶ often means ''and,'' in this balanced antithetical construction
    English ''also'' best brings out the corresponding relation: the confessor of
    the Son has the Father also. This mirrors the force of οὐδὲ... in the first clause.'
