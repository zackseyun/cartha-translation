theological_decisions:
- issue: Bracketed second clause in the printed Greek text
  chosen_reading: 'Included in the main text as authentic: ''whoever confesses the
    Son has the Father also.'''
  alternative_readings:
  - Omit the second clause as absent in some manuscripts
  rationale: The SBLGNT prints the second clause in brackets, signaling textual variation
    but including it in the text. Because the source text provided includes the clause,
    it is translated in the main text, while the textual variation is preserved in
    a footnote for auditability.
- issue: Relational force of 'have the Father'
  chosen_reading: Retain the literal expression 'have the Father' without paraphrasing.
  alternative_readings:
  - Interpretively expand to 'have fellowship with the Father'
  - Interpretively expand to 'belong to the Father'
  rationale: The verse makes a strong theological claim about the inseparability of
    confessing the Son and having the Father. To preserve theological tension and
    avoid importing a narrower doctrinal formulation, the translation keeps the Johannine
    idiom rather than resolving it into one specific relational category.
  doctrine_reference: Translation philosophy §3
