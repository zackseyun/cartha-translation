theological_decisions:
- issue: Referent of 'him who is from the beginning'
  chosen_reading: Rendered as 'him who is from the beginning' without making the referent
    explicit in the text
  alternative_readings:
  - a reference to the Son/Messiah
  - a reference to God more broadly
  rationale: Johannine usage strongly suggests a personal referent and likely points
    to the Son, but the Greek expression itself does not name the referent here. Preserving
    the phrase maintains the text's theological texture without importing a more explicit
    identification than the verse states.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Meaning of 'the evil one'
  chosen_reading: Personal evil adversary
  alternative_readings:
  - abstract evil
  rationale: The masculine singular form with article strongly favors a personal referent,
    commonly understood as Satan. The translation reflects this grammatical signal
    while avoiding adding the proper name where the Greek does not.
  doctrine_reference: Original-language primacy over translation tradition.
