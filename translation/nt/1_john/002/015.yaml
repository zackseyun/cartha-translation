theological_decisions:
- issue: Meaning of 'the world' in Johannine ethics
  chosen_reading: Rendered as 'the world' without interpretive expansion in the main
    text, referring contextually to the fallen order opposed to God rather than creation
    itself.
  alternative_readings:
  - the world system
  - the worldly order
  rationale: The verse warns against disordered allegiance, not against loving God's
    created order or human beings as such. A more interpretive gloss would narrow
    the term too quickly; the plain rendering preserves the theological tension and
    lets context define it.
  doctrine_reference: Translation philosophy §3, §5
- issue: Genitive in 'ἡ ἀγάπη τοῦ πατρὸς'
  chosen_reading: Kept as 'the love of the Father' in the main text, with the likely
    sense being love for the Father.
  alternative_readings:
  - love for the Father
  - the Father's love
  rationale: The Greek genitive can be understood as objective or subjective. The
    immediate contrast with loving the world favors 'love for the Father,' but the
    literal rendering best preserves the ambiguity without forcing a doctrinally loaded
    resolution.
  doctrine_reference: Translation philosophy §3
