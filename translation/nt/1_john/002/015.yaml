id: 1JN.2.15
reference: 1 John 2:15
source:
  edition: SBLGNT
  text: Μὴ ἀγαπᾶτε τὸν κόσμον μηδὲ τὰ ἐν τῷ κόσμῳ. ἐάν τις ἀγαπᾷ τὸν κόσμον, οὐκ ἔστιν
    ἡ ἀγάπη τοῦ πατρὸς ἐν αὐτῷ·
translation:
  text: Do not love the world or the things in the world. If anyone loves the world,
    the love of the Father is not in him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'nor the things in the world.'
    reason: lexical_alternative
  - marker: b
    text: '''The love of the Father'' may mean ''love for the Father''; less likely,
      ''the Father''s love.'''
    reason: alternative_reading
  - marker: c
    text: The Greek says 'in him,' using a masculine singular form generically.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀγαπᾶτε
  chosen: Do not love
  alternatives:
  - Do not keep loving
  - Stop loving
  lexicon: BDAG
  rationale: Present imperative with μή can prohibit an action in progress or give
    a general prohibition. In this context, simple English imperative 'Do not love'
    best preserves the force without over-interpreting aspect.
- source_word: κόσμον
  chosen: the world
  alternatives:
  - the worldly order
  - the present world system
  lexicon: BDAG
  rationale: κόσμος here refers not to the physical creation as such but to the human
    order in rebellion against God. 'The world' is the standard and sufficiently broad
    rendering, with the contextual sense carried by the surrounding exhortation.
- source_word: μηδὲ τὰ ἐν τῷ κόσμῳ
  chosen: or the things in the world
  alternatives:
  - nor the things in the world
  - or anything in the world
  lexicon: BDAG
  rationale: The phrase expands the prohibition from the world as a system to its
    constituent objects of desire or allegiance. 'Or the things in the world' is natural
    modern English and closely follows the Greek.
- source_word: ἐάν τις ἀγαπᾷ
  chosen: If anyone loves
  alternatives:
  - If someone loves
  lexicon: BDAG
  rationale: '''Anyone'' captures the indefinite τις naturally in English and preserves
    the generic scope of the conditional statement.'
- source_word: ἡ ἀγάπη τοῦ πατρὸς
  chosen: the love of the Father
  alternatives:
  - love for the Father
  - the Father's love
  lexicon: BDAG
  rationale: The genitive τοῦ πατρὸς is ambiguous in isolation, but in Johannine context
    the phrase most naturally means the believer's love directed toward the Father,
    contrasted with love for the world. Rendering it literally as 'the love of the
    Father' preserves the Greek wording while leaving some of the genitival breadth
    intact.
- source_word: πατρὸς
  chosen: the Father
  alternatives:
  - God the Father
  lexicon: BDAG
  rationale: With the article and Johannine usage, 'the Father' is the natural rendering
    and preserves the relational title used in the text.
- source_word: ἐν αὐτῷ
  chosen: is not in him
  alternatives:
  - is not in that person
  lexicon: BDAG
  rationale: The Greek is grammatically masculine singular and generic. Per translation
    philosophy, gender-accurate rendering is preferred, so 'in him' is retained rather
    than neutralizing to 'in them' or 'in that person' in the main text.
