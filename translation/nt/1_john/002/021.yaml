theological_decisions:
- issue: Nature of 'the truth' in Johannine usage
  chosen_reading: Rendered as 'the truth' without expanding it into a doctrinal paraphrase.
  alternative_readings:
  - the true message
  - the gospel truth
  rationale: John's wording likely carries theological depth, but the verse itself
    does not specify a narrower doctrinal label. Preserving 'the truth' maintains
    the text's breadth and avoids importing a more specific claim than the Greek states.
  doctrine_reference: Translation philosophy items 1, 3, and 6
- issue: Relation of falsehood to truth
  chosen_reading: Rendered 'no lie comes from the truth' as a statement about source/origin.
  alternative_readings:
  - no lie is of the truth
  - falsehood has no place in the truth
  rationale: The Greek ἐκ indicates origin. The translation preserves the theological
    contrast between truth and falsehood without turning it into a broader metaphysical
    statement beyond the text.
  doctrine_reference: Translation philosophy items 1 and 3
