id: 1JN.2.21
reference: 1 John 2:21
source:
  edition: SBLGNT
  text: οὐκ ἔγραψα ὑμῖν ὅτι οὐκ οἴδατε τὴν ἀλήθειαν, ἀλλ’ ὅτι οἴδατε αὐτήν, καὶ ὅτι
    πᾶν ψεῦδος ἐκ τῆς ἀληθείας οὐκ ἔστιν.
translation:
  text: I have not written to you because you do not know the truth, but because you
    do know it, and because no lie comes from the truth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'I did not write to you.' The Greek aorist may be rendered
      as a simple past; 'I have written' reflects the epistolary setting.
    reason: lexical_alternative
  - marker: b
    text: Or, 'no lie is from the truth.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἔγραψα
  chosen: I have not written
  alternatives:
  - I did not write
  lexicon: BDAG
  rationale: The aorist can be rendered as a simple past, but in this epistolary context
    English present perfect naturally conveys a letter the recipients now possess.
    This preserves the force without sounding wooden.
- source_word: οἴδατε
  chosen: you do know
  alternatives:
  - you know
  lexicon: BDAG
  rationale: The verb means 'know.' The auxiliary 'do' is added in English for emphasis
    because the clause contrasts sharply with 'you do not know' in the preceding phrase.
- source_word: ἀλήθεια / τῆς ἀληθείας
  chosen: the truth
  alternatives:
  - truth
  lexicon: BDAG
  rationale: The article is present in both occurrences, and 'the truth' fits Johannine
    usage, where truth is not merely abstract correctness but the reality disclosed
    by God. The English remains accessible while preserving the definite form.
- source_word: αὐτήν
  chosen: it
  alternatives:
  - her
  lexicon: BDAG
  rationale: The pronoun refers back to the feminine noun ἀλήθεια. English uses the
    neuter pronoun 'it' for an abstract noun.
- source_word: πᾶν ψεῦδος
  chosen: no lie
  alternatives:
  - every lie is not
  - nothing false
  lexicon: BDAG
  rationale: Although formally 'every lie ... is not,' idiomatic English expresses
    the universal negation as 'no lie.' This preserves the sense that falsehood in
    any instance does not derive from truth.
- source_word: ἐκ τῆς ἀληθείας
  chosen: comes from the truth
  alternatives:
  - is from the truth
  - has its source in the truth
  lexicon: BDAG
  rationale: ἐκ marks source or origin. 'Comes from' is natural modern English and
    clearly communicates derivation without over-paraphrasing.
