id: 1JN.2.7
reference: 1 John 2:7
source:
  edition: SBLGNT
  text: ⸀Ἀγαπητοί, οὐκ ἐντολὴν καινὴν γράφω ὑμῖν, ἀλλ’ ἐντολὴν παλαιὰν ἣν εἴχετε ἀπ’
    ἀρχῆς· ἡ ἐντολὴ ἡ παλαιά ἐστιν ὁ λόγος ὃν ⸀ἠκούσατε.
translation:
  text: Beloved, I am not writing a new commandment to you, but an old commandment
    that you have had from the beginning. The old commandment is the message that
    you heard.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''word'': ''The old commandment is the word that you heard.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀγαπητοί
  chosen: Beloved
  alternatives:
  - Dear friends
  lexicon: BDAG
  rationale: Vocative plural adjective used as a form of affectionate address. 'Beloved'
    preserves the lexical connection to ἀγαπάω/ἀγάπη and keeps John's warm pastoral
    tone better than the more interpretive 'Dear friends'.
- source_word: ἐντολήν
  chosen: commandment
  alternatives:
  - command
  lexicon: BDAG
  rationale: John frequently uses ἐντολή in a theologically weighty way; 'commandment'
    preserves that resonance and intertextual connection better than the slightly
    flatter 'command'.
- source_word: καινήν
  chosen: new
  alternatives:
  - fresh
  lexicon: BDAG
  rationale: Standard rendering of καινός here, contrasting with παλαιός. 'Fresh'
    would over-interpret the nuance.
- source_word: γράφω
  chosen: I am writing
  alternatives:
  - I write
  lexicon: BDAG
  rationale: Present indicative in epistolary context is naturally rendered as progressive
    English, reflecting the act of writing now underway.
- source_word: παλαιάν / παλαιά
  chosen: old
  alternatives:
  - ancient
  - former
  lexicon: BDAG
  rationale: '''Old'' best matches the direct contrast with ''new'' and fits the argument
    that this commandment is longstanding from the readers'' initial reception of
    the gospel.'
- source_word: εἴχετε
  chosen: you have had
  alternatives:
  - you had
  - you possessed
  lexicon: BDAG
  rationale: Imperfect indicates continued possession in past time; English present
    perfect ('have had') naturally conveys an abiding possession from the beginning
    until now.
- source_word: ἀπ’ ἀρχῆς
  chosen: from the beginning
  alternatives:
  - from the start
  lexicon: BDAG
  rationale: A characteristic Johannine phrase. 'From the beginning' preserves both
    the diction and possible resonance with the beginning of their Christian instruction,
    without over-specifying.
- source_word: λόγος
  chosen: message
  alternatives:
  - word
  lexicon: BDAG
  rationale: Here λόγος refers to the proclaimed content the readers heard. 'Message'
    communicates that sense clearly in modern English, while 'word' could sound opaque
    or overly traditional.
- source_word: ἠκούσατε
  chosen: you heard
  alternatives:
  - you have heard
  lexicon: BDAG
  rationale: Aorist indicative points to the readers' reception of the proclamation;
    simple past is the most straightforward rendering in English.
