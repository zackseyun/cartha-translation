theological_decisions:
- issue: Referent of 'from the beginning'
  chosen_reading: left as 'from the beginning' without specifying whether it means
    the beginning of the readers' Christian instruction or an absolute beginning
  alternative_readings:
  - from the beginning of your Christian life
  - from the beginning of the gospel proclamation
  rationale: The phrase is intentionally preserved in its Johannine breadth. The immediate
    context favors the beginning of what the readers heard, but the text itself does
    not narrowly define it, so the translation avoids importing a more specific doctrinal
    or historical claim.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
- issue: Identity of the 'old commandment' as 'the message that you heard'
  chosen_reading: rendered straightforwardly without harmonizing or expanding the
    relationship between commandment and message
  alternative_readings:
  - the old commandment is the word/message you have heard from the beginning
  rationale: The Greek equates the old commandment with the proclaimed message heard
    by the audience. The translation preserves that equation without adding explanatory
    material from nearby verses or broader theology.
  doctrine_reference: Translation philosophy §1 and §3.
