id: GAL.5.1
reference: Galatians 5:1
source:
  edition: SBLGNT
  text: τῇ ἐλευθερίᾳ ⸂ἡμᾶς Χριστὸς ἠλευθέρωσεν· στήκετε οὖν⸃ καὶ μὴ πάλιν ζυγῷ δουλείας
    ἐνέχεσθε.
translation:
  text: For freedom the Messiah set us free; therefore stand firm, and do not be held
    again by a yoke of slavery.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'In freedom Messiah has set us free.' The opening dative phrase is compressed
      and can be understood in more than one closely related way.
    reason: alternative_reading
  - marker: b
    text: Traditional English often has 'do not be entangled again with a yoke of
      slavery.' The Greek verb can carry the sense of becoming subject to or ensnared
      by something.
    reason: lexical_alternative
lexical_decisions:
- source_word: τῇ ἐλευθερίᾳ
  chosen: For freedom
  alternatives:
  - For freedom's sake
  - In freedom
  lexicon: BDAG
  rationale: The dative is best taken as expressing purpose or result in this compressed
    Pauline construction. 'For freedom' preserves the emphasis and rhetorical force
    better than smoothing it into a more interpretive phrase.
- source_word: Χριστὸς
  chosen: the Messiah
  alternatives:
  - Christ
  lexicon: BDAG
  rationale: Here Χριστός functions as a title rather than a name-like element. Per
    doctrine guidance, the title is translated as 'Messiah' to preserve its meaning
    and Jewish messianic context.
- source_word: ἠλευθέρωσεν
  chosen: set us free
  alternatives:
  - freed us
  - liberated us
  lexicon: BDAG
  rationale: The verb ἐλευθερόω means to free or liberate. 'Set us free' is idiomatic
    modern English and echoes the cognate noun ἐλευθερία in the opening phrase, preserving
    the rhetorical wordplay.
- source_word: στήκετε
  chosen: stand firm
  alternatives:
  - stand fast
  - keep standing
  lexicon: BDAG
  rationale: The present imperative calls for continued steadfastness. 'Stand firm'
    is natural modern English and preserves the exhortational force without archaic
    diction.
- source_word: οὖν
  chosen: therefore
  alternatives:
  - then
  - so
  lexicon: BDAG
  rationale: Marks inference from the preceding declaration. 'Therefore' clearly signals
    Paul's logical conclusion.
- source_word: ζυγῷ δουλείας
  chosen: a yoke of slavery
  alternatives:
  - a yoke of bondage
  - slavery's yoke
  lexicon: BDAG
  rationale: ζυγός is literally 'yoke,' a metaphor for subjection; δουλεία denotes
    slavery or bondage. 'A yoke of slavery' preserves the metaphor and the strong
    sense of enslavement.
- source_word: ἐνέχεσθε
  chosen: be held
  alternatives:
  - be subject
  - submit
  - be entangled
  lexicon: BDAG
  rationale: In this passive/middle imperative context, the sense is to become subject
    to or be ensnared by something. 'Be held' fits the passive force and pairs well
    with the yoke metaphor. 'Be entangled' reflects traditional English but is less
    directly tied to the image of being under a yoke.
- source_word: πάλιν
  chosen: again
  alternatives:
  - once more
  lexicon: BDAG
  rationale: Simple adverb indicating a return to a former state; 'again' is the most
    direct rendering.
