theological_decisions:
- issue: Whether to render Χριστός as title or name-like form
  chosen_reading: the Messiah
  alternative_readings:
  - Christ
  rationale: The verse presents Jesus in his messianic office as the one who brings
    covenantal freedom. Translating the title preserves meaning rather than defaulting
    to inherited church vocabulary.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; Contested
    terms table for Χριστός'
- issue: How strongly to render δουλεία
  chosen_reading: slavery
  alternative_readings:
  - bondage
  rationale: The context contrasts freedom with its opposite in a theologically weighty
    way. 'Slavery' better preserves the bonded nature of the term than the more abstract
    'bondage.'
  doctrine_reference: 'DOCTRINE.md: Contested terms table for δοῦλος family; original-language
    primacy'
