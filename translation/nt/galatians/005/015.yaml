id: GAL.5.15
reference: Galatians 5:15
source:
  edition: SBLGNT
  text: εἰ δὲ ἀλλήλους δάκνετε καὶ κατεσθίετε, βλέπετε μὴ ὑπ’ ἀλλήλων ἀναλωθῆτε.
translation:
  text: But if you bite and devour one another, watch out that you are not consumed
    by one another.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'beware lest you be consumed by one another.'
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰ δὲ
  chosen: But if
  alternatives:
  - If, however
  - But if indeed
  lexicon: BDAG
  rationale: εἰ introduces a conditional clause, while δέ adds mild contrast or development
    from the previous exhortation. 'But if' is natural English and preserves the adversative
    turn.
- source_word: ἀλλήλους
  chosen: one another
  alternatives:
  - each other
  lexicon: BDAG
  rationale: The reciprocal pronoun indicates mutual action within the community.
    'One another' is standard and clear in English.
- source_word: δάκνετε
  chosen: bite
  alternatives:
  - keep biting
  lexicon: BDAG
  rationale: The verb literally means 'bite.' The present tense here likely portrays
    ongoing or characteristic action, but English simple present communicates the
    warning well without overtranslating aspect.
- source_word: κατεσθίετε
  chosen: devour
  alternatives:
  - consume
  - eat up
  lexicon: BDAG
  rationale: The compound verb intensifies the imagery beyond ordinary eating. 'Devour'
    preserves the metaphorical violence and pairs naturally with 'bite.'
- source_word: βλέπετε
  chosen: watch out
  alternatives:
  - beware
  - see to it
  lexicon: BDAG
  rationale: As an imperative, the verb calls for vigilance. 'Watch out' is idiomatic
    modern English and conveys urgent warning better than the more formal 'see to
    it.'
- source_word: μὴ
  chosen: that ... not
  alternatives:
  - lest
  lexicon: BDAG
  rationale: With the following subjunctive/passive form, μή introduces a negative
    warning of possible result. English expresses this naturally as 'that ... not'
    after 'watch out.' 'Lest' is accurate but less natural for the target audience.
- source_word: ὑπ’ ἀλλήλων
  chosen: by one another
  alternatives:
  - by each other
  lexicon: BDAG
  rationale: ὑπό with the genitive marks agency in the passive construction. Retaining
    'by one another' preserves the reciprocal force and the irony of mutual destruction.
- source_word: ἀναλωθῆτε
  chosen: are not consumed
  alternatives:
  - are not destroyed
  - are not used up
  lexicon: BDAG
  rationale: The passive subjunctive of ἀναλίσκω here continues the predatory metaphor
    and warns of being brought to ruin. 'Consumed' best preserves the imagery and
    verbal connection with 'devour' without collapsing the distinction between the
    two Greek verbs.
