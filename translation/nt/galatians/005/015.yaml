theological_decisions:
- issue: Metaphorical violence within the Christian community
  chosen_reading: Retain the animalistic imagery literally ('bite,' 'devour,' 'consumed')
    rather than softening it to general conflict language.
  alternative_readings:
  - If you keep harming and destroying one another...
  rationale: Paul's rhetoric is intentionally vivid and morally urgent. A softened
    rendering would reduce the force of his warning about communal self-destruction
    and import interpretation beyond the lexical sense.
  doctrine_reference: Translation philosophy §§1, 6
