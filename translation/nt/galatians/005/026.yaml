theological_decisions:
- issue: Relation of the participles to the main exhortation
  chosen_reading: 'The participles are rendered as attendant descriptions of what
    conceit produces: ''provoking one another, envying one another.'''
  alternative_readings:
  - 'The participles could be taken as near-imperatival expansions: ''Let us not become
    conceited by provoking one another and envying one another.'''
  rationale: The Greek structure most naturally presents κενόδοξοι as the main predicate
    after γινώμεθα, with the participles describing accompanying behaviors. The translation
    preserves that syntax and avoids over-interpreting the exact logical relation.
  doctrine_reference: Translation philosophy §3, preserve theological tension rather
    than resolve it.
