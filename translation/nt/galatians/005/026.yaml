id: GAL.5.26
reference: Galatians 5:26
source:
  edition: SBLGNT
  text: μὴ γινώμεθα κενόδοξοι, ἀλλήλους προκαλούμενοι, ἀλλήλοις φθονοῦντες.
translation:
  text: Let us not become conceited, provoking one another, envying one another.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'vainglorious.' The Greek term denotes being driven by empty glory or
      self-importance.
    reason: lexical_alternative
lexical_decisions:
- source_word: μὴ γινώμεθα
  chosen: Let us not become
  alternatives:
  - Let us not be
  - We should not become
  lexicon: BDAG
  rationale: μή with the first person plural present middle subjunctive functions
    as a prohibitive hortatory expression. 'Let us not become' preserves both the
    exhortational force and the ingressive nuance of γίνομαι better than the stative
    'be'.
- source_word: κενόδοξοι
  chosen: conceited
  alternatives:
  - vainglorious
  - vain
  - boastful
  lexicon: BDAG
  rationale: κενόδοξος denotes being driven by empty glory or groundless self-importance.
    'Conceited' is natural modern English and captures the vice in context; 'vainglorious'
    is more literal etymologically but less readable.
- source_word: ἀλλήλους
  chosen: one another
  alternatives:
  - each other
  lexicon: BDAG
  rationale: Standard reciprocal rendering in English. 'One another' fits the formal
    tone and clearly reflects mutual action.
- source_word: προκαλούμενοι
  chosen: provoking
  alternatives:
  - challenging
  - irritating
  lexicon: BDAG
  rationale: The participle describes the outworking of conceit in interpersonal rivalry.
    'Provoking' preserves the broad sense of stirring up or challenging others without
    narrowing it to mere annoyance.
- source_word: ἀλλήλοις
  chosen: one another
  alternatives:
  - each other
  lexicon: BDAG
  rationale: Dative reciprocal pronoun rendered idiomatically as 'one another' in
    coordination with the following participle.
- source_word: φθονοῦντες
  chosen: envying
  alternatives:
  - being envious of
  - begrudging
  lexicon: BDAG
  rationale: φθονέω means to feel envy toward another. 'Envying' is concise and preserves
    the participial parallelism with 'provoking'.
