theological_decisions:
- issue: Whether Paul's statement should be translated in a way that settles debates
    about loss of salvation versus loss of grace as principle
  chosen_reading: 'Retain the direct warning language without importing a denominational
    conclusion: ''have been severed from the Messiah; you have fallen away from grace.'''
  alternative_readings:
  - Translate more weakly as 'are estranged' to avoid implications about apostasy
  - Translate more interpretively as 'have abandoned the way of grace' to frame grace
    as a principle rather than relationship
  rationale: The verse is theologically contested across traditions. The translation
    should preserve Paul's severe language and relational imagery while not resolving
    the doctrinal debate beyond what the Greek states. 'Severed from the Messiah'
    and 'fallen away from grace' reflect the text's force without specifying a systematic-theology
    conclusion.
  doctrine_reference: Preserve theological tension rather than resolve it.
