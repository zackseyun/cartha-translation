id: GAL.5.4
reference: Galatians 5:4
source:
  edition: SBLGNT
  text: κατηργήθητε ⸀ἀπὸ Χριστοῦ οἵτινες ἐν νόμῳ δικαιοῦσθε, τῆς χάριτος ἐξεπέσατε.
translation:
  text: You who are seeking to be justified by law have been severed from the Messiah;
    you have fallen away from grace.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'alienated from Christ' or 'cut off from Christ.'
    reason: lexical_alternative
  - marker: b
    text: Or 'You who are being justified by law.' The Greek present passive may be
      rendered more formally this way; here it is translated to reflect Paul's argument
      about seeking justification on the basis of law.
    reason: lexical_alternative
  - marker: c
    text: Or 'from Christ.' Greek Christos can be rendered 'Christ' or, when functioning
      clearly as a title, 'Messiah.'
    reason: alternative_reading
lexical_decisions:
- source_word: κατηργήθητε
  chosen: have been severed
  alternatives:
  - have been alienated
  - have been cut off
  - have been brought to nothing
  lexicon: BDAG
  rationale: In this context with ἀπὸ Χριστοῦ, the passive of καταργέω conveys being
    separated from or rendered ineffective in relation to the Messiah. 'Severed' preserves
    the sharp relational force without overparaphrasing. 'Alienated' is possible but
    less direct; 'cut off' is vivid but may overstate finality; 'brought to nothing'
    fits other contexts better than this one.
- source_word: ἀπὸ Χριστοῦ
  chosen: from the Messiah
  alternatives:
  - from Christ
  lexicon: BDAG
  rationale: ἀπό marks separation. Χριστοῦ is rendered 'the Messiah' per project policy
    for Χριστός as a title where context supports it. Paul is speaking of relation
    to the anointed redeemer, not merely using a name-like form.
- source_word: οἵτινες
  chosen: You who
  alternatives:
  - whoever among you
  - those who
  lexicon: BDAG
  rationale: The relative pronoun identifies the subset being addressed within the
    Galatian audience. 'You who' makes the direct second-person force natural in English
    while preserving the restrictive sense.
- source_word: ἐν νόμῳ
  chosen: by law
  alternatives:
  - in law
  - by the law
  lexicon: BDAG
  rationale: The prepositional phrase expresses means or sphere in Paul's argument.
    'By law' is idiomatic and captures justification sought on the basis of law observance.
    The article is absent in Greek, so 'law' is preferable to 'the law' here.
- source_word: δικαιοῦσθε
  chosen: are seeking to be justified
  alternatives:
  - are justified
  - are being justified
  - are declared righteous
  lexicon: BDAG
  rationale: The present passive can be rendered more woodenly as 'are being justified,'
    but in context Paul addresses those attempting or claiming justification by law.
    'Seeking to be justified' brings out the argumentative force without denying the
    passive sense. 'Declared righteous' is interpretive and less concise.
- source_word: τῆς χάριτος
  chosen: from grace
  alternatives:
  - from the grace
  lexicon: BDAG
  rationale: The genitive with ἐκπίπτω is idiomatically rendered 'fall from grace'
    or 'fall away from grace.' English normally omits the article here.
- source_word: ἐξεπέσατε
  chosen: have fallen away
  alternatives:
  - have fallen
  - have fallen from
  lexicon: BDAG
  rationale: The aorist indicates a decisive result in Paul's warning. 'Have fallen
    away from grace' is idiomatic English and preserves the metaphor of losing one's
    standing with respect to grace.
