theological_decisions:
- issue: Rendering of ἀδελφοί in a mixed-audience epistolary address
  chosen_reading: brothers
  alternative_readings:
  - brothers and sisters
  - siblings
  rationale: The Greek is grammatically masculine plural and often representative.
    Per doctrine, the translation keeps the gender-accurate form in the main text
    and may clarify inclusive reference in a footnote rather than neutralizing the
    term.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Rendering of σάρξ in Pauline ethical context
  chosen_reading: the flesh
  alternative_readings:
  - the sinful nature
  rationale: This context is metaphorical/ethical rather than merely physical, but
    the project's policy prefers preserving Paul's term 'flesh' unless a paraphrastic
    rendering is necessary. A footnote can preserve the interpretive alternative without
    collapsing the theological tension.
  doctrine_reference: 'DOCTRINE.md Contested terms: σάρξ'
- issue: Rendering of δουλεύετε with reciprocal object
  chosen_reading: serve one another
  alternative_readings:
  - be slaves to one another
  rationale: The verb carries slave-service imagery, but optimal equivalence favors
    idiomatic English in this exhortational context. The stronger bonded nuance is
    documented lexically rather than forced into the main text.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §1, §6; Contested terms:
    δοῦλος'
