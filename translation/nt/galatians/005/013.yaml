id: GAL.5.13
reference: Galatians 5:13
source:
  edition: SBLGNT
  text: Ὑμεῖς γὰρ ἐπ’ ἐλευθερίᾳ ἐκλήθητε, ἀδελφοί· μόνον μὴ τὴν ἐλευθερίαν εἰς ἀφορμὴν
    τῇ σαρκί, ἀλλὰ διὰ τῆς ἀγάπης δουλεύετε ἀλλήλοις·
translation:
  text: For you were called to freedom, brothers; only do not use your freedom as
    an opportunity for the flesh, but through love serve one another.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '"Brothers" translates the masculine plural Greek term, which in this letter
      addresses the whole believing community, including women.'
    reason: lexical_alternative
  - marker: b
    text: Or "as an occasion for the flesh"; that is, as a base or opportunity for
      self-directed sinful desire.
    reason: lexical_alternative
  - marker: c
    text: '"The flesh" here refers not merely to the physical body but to fallen human
      impulses; some translations render it "the sinful nature."'
    reason: alternative_reading
  - marker: d
    text: The verb rendered "serve" is related to the word for "slave" and carries
      the sense of giving oneself in service to others.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ὑμεῖς
  chosen: you
  alternatives:
  - you yourselves
  lexicon: BDAG
  rationale: Second-person plural pronoun is explicit for emphasis. English 'you'
    carries the referent naturally; added reflexive emphasis would overstate the force
    in smooth English, while the emphasis is sufficiently conveyed by word order with
    'For you were called'.
- source_word: γὰρ
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: BDAG
  rationale: Connective gives explanatory support to the preceding argument. 'For'
    preserves the logical connection more transparently than the more causal 'because'
    or the weaker 'indeed'.
- source_word: ἐπ’ ἐλευθερίᾳ
  chosen: to freedom
  alternatives:
  - for freedom
  - in freedom
  lexicon: BDAG
  rationale: The phrase with ἐπί and dative here expresses goal/purpose or basis of
    calling. 'To freedom' is idiomatic and clearly conveys that freedom is the state
    into which they were called. 'For freedom' is possible and traditional, but 'to
    freedom' reads more naturally in this sentence.
- source_word: ἐκλήθητε
  chosen: were called
  alternatives:
  - were summoned
  lexicon: BDAG
  rationale: Passive aorist of καλέω in Pauline usage commonly denotes God's effectual
    or covenantal calling. 'Were called' is the standard and most transparent rendering
    without importing a narrower theological system.
- source_word: ἀδελφοί
  chosen: brothers
  alternatives:
  - brothers and sisters
  - siblings
  lexicon: BDAG
  rationale: Per doctrine, gender-accurate over gender-neutral. The masculine plural
    form is retained as 'brothers' while recognizing the mixed audience context; inclusivity
    is preserved in a footnote rather than the main text.
- source_word: μόνον
  chosen: only
  alternatives:
  - just
  - except that
  lexicon: BDAG
  rationale: Marks an important qualification to the preceding statement. 'Only' is
    concise and preserves the adversative-limiting force.
- source_word: μὴ...εἰς ἀφορμὴν
  chosen: do not use ... as an opportunity
  alternatives:
  - do not make ... a base of operations for
  - not as an occasion for
  lexicon: BDAG
  rationale: ἀφορμή can denote a point of departure, occasion, or opportunity. 'Opportunity'
    is idiomatic modern English and preserves the warning against turning freedom
    into a launching point for sinful desire.
- source_word: σάρξ
  chosen: the flesh
  alternatives:
  - the sinful nature
  lexicon: BDAG
  rationale: Per doctrine, default is 'flesh' when possible, with 'sinful nature'
    only where the metaphor must be unpacked. Here Paul uses a theologically loaded
    term that should be preserved rather than interpreted away in the main text; the
    metaphorical sense can be clarified in a footnote.
- source_word: διὰ τῆς ἀγάπης
  chosen: through love
  alternatives:
  - by love
  lexicon: BDAG
  rationale: ἀγάπη is rendered consistently as 'love' per doctrine. 'Through love'
    preserves the instrumental nuance of διά with the genitive.
- source_word: δουλεύετε
  chosen: serve
  alternatives:
  - be slaves to
  lexicon: BDAG
  rationale: Although the verb is cognate with δοῦλος and can mean 'serve as a slave,'
    in this reciprocal ethical context 'serve' is the best English idiom. The bonded/slave
    nuance is present rhetorically, but 'be slaves to one another' could mislead in
    English without context. The lexical tension is preserved in documentation.
- source_word: ἀλλήλοις
  chosen: one another
  alternatives:
  - each other
  lexicon: BDAG
  rationale: Standard reciprocal pronoun rendering; 'one another' fits the register
    of the sentence.
