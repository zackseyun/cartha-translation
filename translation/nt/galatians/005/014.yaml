theological_decisions:
- issue: Meaning of Paul's claim about the law's relation to the love command
  chosen_reading: Paul states that the law as a whole finds its fulfillment in the
    command to love one's neighbor.
  alternative_readings:
  - Paul means the law is merely summarized by this command.
  - Paul means only the ethical portions of the law are in view.
  rationale: The verb πληρόω most naturally conveys fulfillment rather than mere summary,
    though the summarizing sense is closely related in context. The translation preserves
    Paul's stronger wording without importing a broader doctrinal conclusion about
    abolishing the law. 'Law' is left unqualified because the Greek does not explicitly
    limit it to a subset, even if the immediate ethical context highlights interpersonal
    commandments.
  doctrine_reference: Translation philosophy §§1, 3, 5
