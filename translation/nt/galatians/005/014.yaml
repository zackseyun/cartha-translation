id: GAL.5.14
reference: Galatians 5:14
source:
  edition: SBLGNT
  text: ὁ γὰρ πᾶς νόμος ἐν ἑνὶ λόγῳ ⸀πεπλήρωται, ἐν τῷ· Ἀγαπήσεις τὸν πλησίον σου
    ὡς ⸀σεαυτόν.
translation:
  text: 'For the whole law is fulfilled in one statement: “You shall love your neighbor
    as yourself.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “in one word.” The Greek says literally “in one word/statement,” meaning
      in a single saying or command.
    reason: lexical_alternative
  - marker: b
    text: Or “has been fulfilled” or, interpretively, “is summed up.” The Greek verb
      more literally means “is fulfilled,” which may also imply that the law’s intent
      reaches its completion in this command.
    reason: alternative_reading
lexical_decisions:
- source_word: ὁ γὰρ
  chosen: For
  alternatives:
  - for
  - because
  lexicon: BDAG
  rationale: γάρ introduces an explanation or ground for the preceding exhortation.
    'For' is the most natural concise English connector here.
- source_word: πᾶς νόμος
  chosen: the whole law
  alternatives:
  - all the law
  - the entire law
  lexicon: BDAG
  rationale: With the article and singular νόμος, Paul refers to the law as a whole.
    'The whole law' is idiomatic English and preserves the comprehensive force of
    πᾶς.
- source_word: ἐν ἑνὶ λόγῳ
  chosen: in one statement
  alternatives:
  - in one word
  - in one saying
  lexicon: BDAG
  rationale: λόγος can mean 'word,' 'statement,' or 'message.' Here it introduces
    a summarized command quotation, so 'statement' communicates the sense clearly
    in modern English. 'In one word' is more literal but can sound misleading in English
    since the quotation is not a single lexical item.
- source_word: πεπλήρωται
  chosen: is fulfilled
  alternatives:
  - has been fulfilled
  - is summed up
  - is completed
  lexicon: BDAG
  rationale: The perfect passive indicates a present state resulting from fulfillment.
    'Is fulfilled' preserves both the passive form and the idea that the law finds
    its fulfillment in this command. 'Is summed up' is interpretive and better suits
    ἀνακεφαλαιόω than πληρόω.
- source_word: ἐν τῷ
  chosen: in
  alternatives:
  - namely in
  - that is in
  lexicon: BDAG
  rationale: This construction introduces the content in which the fulfillment occurs,
    followed by the quotation. English naturally renders it with a colon after 'statement'
    rather than repeating 'in' more explicitly.
- source_word: Ἀγαπήσεις
  chosen: You shall love
  alternatives:
  - Love
  - You must love
  lexicon: BDAG
  rationale: 'This is a future indicative used in the citation of the commandment
    from Leviticus 19:18, conventionally and accurately rendered as an imperative-like
    command: ''You shall love.'' This preserves the scriptural citation form.'
- source_word: τὸν πλησίον σου
  chosen: your neighbor
  alternatives:
  - the one near you
  - your fellow human
  lexicon: BDAG
  rationale: πλησίον in this ethical context means 'neighbor.' This is the established
    and accurate rendering, especially given the direct quotation of Lev 19:18.
- source_word: ὡς σεαυτόν
  chosen: as yourself
  alternatives:
  - like yourself
  lexicon: BDAG
  rationale: This is the standard and precise rendering of the comparison in the commandment
    quotation.
