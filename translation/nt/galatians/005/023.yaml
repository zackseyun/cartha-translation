id: GAL.5.23
reference: Galatians 5:23
source:
  edition: SBLGNT
  text: πραΰτης, ἐγκράτεια· κατὰ τῶν τοιούτων οὐκ ἔστιν νόμος.
translation:
  text: gentleness, self-control; against such things there is no law.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'against such people there is no law,' though here the phrase most likely
      refers to the listed qualities rather than to the people who display them.
    reason: lexical_alternative
  - marker: b
    text: Or 'there is no law against such things.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πραΰτης
  chosen: gentleness
  alternatives:
  - meekness
  - humility
  lexicon: BDAG
  rationale: In this virtue list, πραΰτης denotes a mild, humble, non-harsh disposition.
    'Gentleness' is clear modern English and fits the ethical context better than
    the potentially misleading or archaic-sounding 'meekness,' while still preserving
    the virtue's moral force.
- source_word: ἐγκράτεια
  chosen: self-control
  alternatives:
  - temperance
  - self-mastery
  lexicon: BDAG
  rationale: The term refers to mastery over one's desires and impulses. 'Self-control'
    is the most natural contemporary rendering and communicates the ethical sense
    without the narrower or older connotations of 'temperance.'
- source_word: κατὰ τῶν τοιούτων
  chosen: against such things
  alternatives:
  - against such people
  - with respect to such things
  lexicon: BDAG
  rationale: Although the genitive plural τοιούτων could in isolation refer to persons
    or things, in this context it points back to the listed qualities as the fruit
    of the Spirit. 'Against such things' is the most idiomatic and contextually precise
    English rendering.
- source_word: νόμος
  chosen: law
  alternatives:
  - the law
  lexicon: BDAG
  rationale: νόμος here is anarthrous, so 'law' best reflects the Greek form while
    preserving the broader principle that no law stands opposed to these virtues.
    Rendering it 'the law' is possible interpretively, especially in Galatians, but
    would narrow the statement more than the Greek requires.
