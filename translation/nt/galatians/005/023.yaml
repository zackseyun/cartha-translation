theological_decisions:
- issue: Scope of νόμος in Paul's statement
  chosen_reading: Rendered broadly as 'law' rather than specifically 'the law.'
  alternative_readings:
  - '''the law'' as a specific reference to the Mosaic law'
  rationale: 'Paul''s argument in Galatians certainly engages the Mosaic law, but
    the anarthrous wording here makes the aphoristic statement broader: no law is
    opposed to such virtues. This preserves the text''s rhetorical force without excluding
    the Mosaic-law backdrop.'
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather
    than resolve it.
