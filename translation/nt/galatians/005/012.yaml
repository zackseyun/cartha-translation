theological_decisions:
- issue: Interpretation of Paul's rhetorical wish in relation to circumcision
  chosen_reading: Paul is using sharp irony/hyperbole to wish that the circumcision
    advocates would go beyond circumcision and emasculate themselves.
  alternative_readings:
  - Paul merely wishes they would 'cut themselves off' from the community
  - Paul wishes for their destruction in a more general sense
  rationale: The immediate context is the circumcision controversy (Gal 5), making
    the wordplay on cutting the most contextually grounded reading. The translation
    should preserve the force of Paul's rhetoric without softening it into a generic
    exclusion formula.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; preserve the source text''s plain sense.'
