id: GAL.5.3
reference: Galatians 5:3
source:
  edition: SBLGNT
  text: μαρτύρομαι δὲ πάλιν παντὶ ἀνθρώπῳ περιτεμνομένῳ ὅτι ὀφειλέτης ἐστὶν ὅλον τὸν
    νόμον ποιῆσαι.
translation:
  text: And I testify again to every man who receives circumcision that he is obligated
    to keep the whole law.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to every person.' The Greek says 'every man' with a representative/generic
      sense.
    reason: lexical_alternative
  - marker: b
    text: Or 'who is circumcised' or 'who lets himself be circumcised.' The Greek
      participle can be rendered in several close ways; the context favors one submitting
      to circumcision in this dispute.
    reason: alternative_reading
  - marker: c
    text: Literally 'is a debtor'; that is, he is under obligation.
    reason: lexical_alternative
lexical_decisions:
- source_word: μαρτύρομαι
  chosen: I testify
  alternatives:
  - I bear witness
  - I solemnly declare
  - I warn
  lexicon: BDAG
  rationale: The middle/passive form here functions as a personal assertion or solemn
    attestation. 'I testify' preserves the formal force without becoming archaic.
    'Warn' captures contextual force but is too interpretive for the main text.
- source_word: δὲ
  chosen: And
  alternatives:
  - Now
  - But
  lexicon: BDAG
  rationale: δέ here links Paul's statement to the previous verse with mild continuity
    rather than strong contrast. 'And' is natural English and preserves the connection.
- source_word: πάλιν
  chosen: again
  alternatives:
  - once more
  - further
  lexicon: BDAG
  rationale: πάλιν marks repetition or renewed emphasis. 'Again' is the most direct
    and idiomatic rendering.
- source_word: παντὶ ἀνθρώπῳ
  chosen: to every man
  alternatives:
  - to every person
  - to everyone
  lexicon: BDAG
  rationale: The Greek is grammatically masculine singular with representative force.
    Per doctrine, gender-accurate rendering is preferred where it matches source intent.
    'Every man' preserves the singular distributive form; the generic sense can be
    clarified in a footnote.
- source_word: περιτεμνομένῳ
  chosen: who receives circumcision
  alternatives:
  - who is circumcised
  - who lets himself be circumcised
  lexicon: BDAG
  rationale: The present participle likely refers to one submitting to circumcision
    in this controversy context, not merely one already circumcised by birth. 'Who
    receives circumcision' captures the act of undergoing circumcision without over-specifying
    agency. 'Lets himself be circumcised' is possible but more colloquial and interpretive.
- source_word: ὀφειλέτης
  chosen: obligated
  alternatives:
  - a debtor
  - under obligation
  - bound
  lexicon: BDAG
  rationale: The noun denotes one under obligation. Rendering it as 'obligated' in
    English produces a natural clause with the infinitive that follows. 'Debtor' is
    more literal but can mislead modern readers toward financial debt rather than
    covenantal/legal obligation.
- source_word: ὅλον τὸν νόμον
  chosen: the whole law
  alternatives:
  - the entire law
  - all the law
  lexicon: BDAG
  rationale: This phrase emphasizes totality. 'The whole law' is idiomatic and preserves
    Paul's point that accepting circumcision entails obligation to the law in its
    entirety.
- source_word: ποιῆσαι
  chosen: to keep
  alternatives:
  - to do
  - to observe
  lexicon: BDAG
  rationale: Although ποιέω is literally 'to do,' with νόμος in this context idiomatic
    English is 'to keep' or 'to observe.' 'Keep' best communicates required obedience
    to the law without wooden phrasing.
