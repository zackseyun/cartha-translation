theological_decisions:
- issue: Rendering of σάρξ in a Pauline ethical context
  chosen_reading: flesh
  alternative_readings:
  - sinful nature
  rationale: The doctrine excerpt specifies 'flesh' for literal uses and 'sinful nature'
    as a possible metaphorical rendering, documented per verse. In Galatians 5, Paul
    contrasts flesh and Spirit in a theologically loaded way. Rendering σάρξ as 'flesh'
    preserves Paul's metaphor and avoids collapsing the term into one interpretive
    explanation, while the alternative is preserved in a footnote.
  doctrine_reference: 'DOCTRINE.md: Contested terms table for σάρξ; Translation philosophy
    #3'
