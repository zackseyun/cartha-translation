id: GAL.5.19
reference: Galatians 5:19
source:
  edition: SBLGNT
  text: φανερὰ δέ ἐστιν τὰ ἔργα τῆς σαρκός, ἅτινά ⸀ἐστιν πορνεία, ἀκαθαρσία, ἀσέλγεια,
translation:
  text: 'Now the works of the flesh are evident: sexual immorality, impurity, sensuality,'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the sinful nature.' The Greek word is 'flesh' (σάρξ), which Paul uses
      here metaphorically for fallen human desires and orientation.
    reason: alternative_reading
lexical_decisions:
- source_word: φανερὰ
  chosen: evident
  alternatives:
  - obvious
  - plain
  - manifest
  lexicon: BDAG
  rationale: The adjective denotes something clearly visible or apparent. 'Evident'
    is natural modern English and preserves the sense of being plainly seen without
    sounding overly colloquial ('obvious') or archaic ('manifest').
- source_word: δέ
  chosen: Now
  alternatives:
  - But
  - And
  lexicon: BDAG
  rationale: δέ marks a mild transition/contrast from the preceding discussion. 'Now'
    fits English discourse well here, signaling a shift without overstating adversative
    force.
- source_word: τὰ ἔργα
  chosen: the works
  alternatives:
  - the deeds
  - the acts
  lexicon: BDAG
  rationale: ἔργα commonly means 'works' or 'deeds.' 'Works' preserves the lexical
    connection with Paul's vice/virtue contrast in the immediate context ('works of
    the flesh' / 'fruit of the Spirit').
- source_word: τῆς σαρκός
  chosen: of the flesh
  alternatives:
  - of the sinful nature
  lexicon: BDAG
  rationale: Per doctrine guidance, σάρξ is rendered context-dependently. Here Paul
    uses it metaphorically for fallen human orientation, but 'flesh' preserves Paul's
    wording and theological tension better than the interpretive gloss 'sinful nature.'
    The alternative is preserved in a footnote.
- source_word: ἅτινά ἐστιν
  chosen: ':'
  alternatives:
  - which are
  - namely
  lexicon: BDAG
  rationale: The clause introduces a representative list. In English, a colon communicates
    the appositional/listing function smoothly and idiomatically without unnecessary
    repetition.
- source_word: πορνεία
  chosen: sexual immorality
  alternatives:
  - fornication
  lexicon: BDAG
  rationale: The term broadly denotes illicit sexual behavior. 'Sexual immorality'
    is the clearest accessible rendering in modern English; 'fornication' is narrower
    in contemporary usage and more archaic.
- source_word: ἀκαθαρσία
  chosen: impurity
  alternatives:
  - uncleanness
  lexicon: BDAG
  rationale: The noun denotes moral uncleanness/impurity. 'Impurity' is clear modern
    English and avoids the archaic feel of 'uncleanness' while preserving the ethical
    sense.
- source_word: ἀσέλγεια
  chosen: sensuality
  alternatives:
  - debauchery
  - licentiousness
  - indecency
  lexicon: BDAG
  rationale: The term refers to shameless self-indulgence, especially in sexual conduct.
    'Sensuality' is a standard modern rendering that is readable and suitably broad;
    alternatives either sound more interpretive ('debauchery') or less accessible
    ('licentiousness').
