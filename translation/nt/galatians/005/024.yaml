theological_decisions:
- issue: Rendering Χριστοῦ
  chosen_reading: Messiah
  alternative_readings:
  - Christ
  rationale: The genitive refers to Jesus in his messianic office/title. The doctrine
    excerpt directs translating Χριστός as 'Messiah' where title is in view, while
    preserving 'Christ' as an alternative where name-like usage is possible.
  doctrine_reference: 'DOCTRINE.md: Contested terms — Χριστός default ''Messiah''
    where title; ''Christ'' where name-like'
- issue: Rendering σάρξ in Pauline ethical contrast
  chosen_reading: flesh
  alternative_readings:
  - sinful nature
  rationale: The context is ethical and metaphorical, but the doctrine excerpt explicitly
    lists 'flesh (literal) / sinful nature (metaphorical)' and emphasizes preserving
    theological tension rather than resolving it. 'Flesh' keeps Paul's terminology;
    the interpretive gloss 'sinful nature' is preserved in a footnote rather than
    moved into the main text.
  doctrine_reference: 'DOCTRINE.md: Contested terms — σάρξ default ''flesh'' (literal)
    / ''sinful nature'' (metaphorical); preserve tension where possible'
