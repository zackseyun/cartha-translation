id: GAL.5.24
reference: Galatians 5:24
source:
  edition: SBLGNT
  text: οἱ δὲ τοῦ ⸀Χριστοῦ τὴν σάρκα ἐσταύρωσαν σὺν τοῖς παθήμασιν καὶ ταῖς ἐπιθυμίαις.
translation:
  text: Now those who belong to the Messiah have crucified the flesh along with its
    passions and desires.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'those who belong to Christ.'
    reason: alternative_reading
  - marker: b
    text: '''The flesh'' here refers to fallen human nature in opposition to the Spirit;
      some translations render it ''the sinful nature.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ ... τοῦ Χριστοῦ
  chosen: those who belong to the Messiah
  alternatives:
  - those of the Messiah
  - those who are Christ's
  - those who belong to Christ
  lexicon: BDAG
  rationale: The articular construction with the genitive denotes people identified
    as belonging to or being possessed by Christ/Messiah. 'Belong to' is idiomatic
    English that preserves the relational sense. Per doctrine, Χριστός is rendered
    'Messiah' where functioning as a title rather than a name-like proper designation.
- source_word: δὲ
  chosen: Now
  alternatives:
  - but
  - and
  lexicon: BDAG
  rationale: δέ marks a mild contrast or transition from the preceding description
    of the fruit of the Spirit. 'Now' captures the discourse shift in readable English
    without overstating adversative force.
- source_word: σάρκα
  chosen: the flesh
  alternatives:
  - the sinful nature
  lexicon: BDAG
  rationale: σάρξ here is metaphorical for fallen human nature in contrast with the
    Spirit, but the doctrine guidelines specify the default 'flesh' for literal or
    metaphorical uses unless context demands otherwise. Retaining 'flesh' preserves
    Paul's theological vocabulary and tension; the interpretive alternative is preserved
    in a footnote.
- source_word: ἐσταύρωσαν
  chosen: have crucified
  alternatives:
  - crucified
  lexicon: BDAG
  rationale: The aorist is rendered with English present perfect to convey a decisive
    past action with abiding relevance in the believer's present state, which fits
    the paraenetic context. 'Crucified' is kept rather than weakened to 'put to death'
    because the verb explicitly evokes the cross.
- source_word: σὺν
  chosen: along with
  alternatives:
  - with
  - together with
  lexicon: BDAG
  rationale: σύν expresses accompaniment. 'Along with' is natural modern English and
    clearly links the flesh with what accompanies it.
- source_word: παθήμασιν
  chosen: passions
  alternatives:
  - sufferings
  - passions/affections
  lexicon: BDAG
  rationale: In this vice-context, πάθημα refers not to sufferings but to emotional
    impulses or passions associated with the flesh. 'Passions' best fits the semantic
    range here and pairs naturally with 'desires'.
- source_word: ἐπιθυμίαις
  chosen: desires
  alternatives:
  - lusts
  - cravings
  lexicon: BDAG
  rationale: ἐπιθυμία often denotes strong desire, frequently illicit in Paul. 'Desires'
    is accessible modern English and broad enough to cover the moral sense here without
    importing a narrower sexual meaning that 'lusts' might suggest.
