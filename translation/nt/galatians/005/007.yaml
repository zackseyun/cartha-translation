theological_decisions:
- issue: Sense of πείθεσθαι with ἀληθείᾳ
  chosen_reading: obeying the truth
  alternative_readings:
  - being persuaded by the truth
  rationale: The immediate context concerns the Galatians' practical response to the
    gospel and their deviation from it. Rendering πείθεσθαι as 'obey' preserves the
    ethical-response dimension without importing a denominational framework. Because
    the verb can also carry the sense 'be persuaded,' the alternative is preserved
    in a footnote rather than excluded.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
