id: GAL.5.7
reference: Galatians 5:7
source:
  edition: SBLGNT
  text: Ἐτρέχετε καλῶς· τίς ὑμᾶς ἐνέκοψεν ⸀τῇ ἀληθείᾳ μὴ πείθεσθαι;
translation:
  text: You were running well. Who hindered you from obeying the truth?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Who hindered you from being persuaded by the truth?' The Greek verb
      can mean either 'obey' or 'be persuaded.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐτρέχετε
  chosen: You were running
  alternatives:
  - You were running the race
  - You were progressing
  lexicon: BDAG
  rationale: Imperfect indicative conveys ongoing past action. 'Running' preserves
    Paul's athletic metaphor without adding 'the race,' which is implied but not explicit.
- source_word: καλῶς
  chosen: well
  alternatives:
  - finely
  - nobly
  lexicon: BDAG
  rationale: Adverb modifying Ἐτρέχετε; 'well' is the natural modern English equivalent
    and fits the metaphor of proper progress.
- source_word: τίς
  chosen: Who
  alternatives:
  - What person
  lexicon: BDAG
  rationale: Interrogative pronoun is personal here, asking for the agent who caused
    the hindrance.
- source_word: ἐνέκοψεν
  chosen: hindered
  alternatives:
  - cut in on
  - obstructed
  - held back
  lexicon: BDAG
  rationale: The verb can evoke the image of cutting in or impeding a runner. 'Hindered'
    communicates the sense clearly in modern English; the more vivid 'cut in on' is
    possible but less natural in this context. The athletic nuance is preserved by
    the surrounding 'running' language.
- source_word: τῇ ἀληθείᾳ
  chosen: the truth
  alternatives:
  - truth
  lexicon: BDAG
  rationale: Dative with the infinitive construction is best taken with πείθεσθαι
    in the sense 'obeying the truth.' The article is naturally represented in English
    as 'the truth,' likely referring to the gospel truth already received.
- source_word: μὴ πείθεσθαι
  chosen: from obeying
  alternatives:
  - from being persuaded by
  - from obeying
  lexicon: BDAG
  rationale: πείθομαι can mean 'obey' in the middle/passive, especially in contexts
    of response to truth or authority. Here 'obeying the truth' is the established
    and contextually fitting sense in Galatians, though the semantic overlap with
    'being persuaded' is worth preserving in a footnote.
