id: GAL.5.8
reference: Galatians 5:8
source:
  edition: SBLGNT
  text: ἡ πεισμονὴ οὐκ ἐκ τοῦ καλοῦντος ὑμᾶς.
translation:
  text: This persuasion is not from the one who calls you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'This influence is not from the one who calls you.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πεισμονὴ
  chosen: persuasion
  alternatives:
  - influence
  - persuasiveness
  - being persuaded
  lexicon: BDAG
  rationale: πεισμονή is a rare noun referring to persuasion or the state/effect of
    being won over. In context Paul is referring to the Galatians' present susceptibility
    to the agitators' message, so 'persuasion' captures the abstract noun without
    over-paraphrasing into something like 'way of thinking' or 'obedience.'
- source_word: ἐκ
  chosen: from
  alternatives:
  - out of
  - comes from
  lexicon: BDAG
  rationale: ἐκ marks source or origin. 'From' is the most natural English rendering
    here and preserves Paul's point that this persuasion does not originate with the
    caller.
- source_word: τοῦ καλοῦντος ὑμᾶς
  chosen: the one who calls you
  alternatives:
  - him who calls you
  - the one calling you
  lexicon: BDAG
  rationale: The present participle καλοῦντος functions substantivally. 'The one who
    calls you' is clear modern English and preserves the ongoing verbal force better
    than a simple pronoun. In Galatians this most naturally refers to God, but the
    translation leaves the expression as Paul states it.
- source_word: οὐκ
  chosen: not
  lexicon: BDAG
  rationale: Straightforward negation; retained directly to preserve the force of
    Paul's denial.
