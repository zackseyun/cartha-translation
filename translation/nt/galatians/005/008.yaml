theological_decisions:
- issue: Identity of 'the one who calls you'
  chosen_reading: Rendered generically as 'the one who calls you' without explicitly
    supplying 'God' in the main text.
  alternative_readings:
  - '''God who calls you'' as an interpretive expansion'
  rationale: The broader context strongly suggests God, but the Greek text itself
    uses a participial expression rather than the explicit noun 'God.' Following optimal
    equivalence and the instruction not to import doctrinal claims beyond the text,
    the translation preserves Paul's wording while allowing the referent to be inferred.
  doctrine_reference: 'Translation philosophy: Preserve theological tension rather
    than resolve it; Original-language primacy over translation tradition.'
