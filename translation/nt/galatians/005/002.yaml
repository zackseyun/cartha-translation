theological_decisions:
- issue: Rendering Χριστός
  chosen_reading: the Messiah
  alternative_readings:
  - Christ
  rationale: The project's default is to translate Χριστός as 'Messiah' where the
    title sense is active. In this warning about the saving significance of submitting
    to circumcision, the titular force remains meaningful and should be preserved.
  doctrine_reference: 'DOCTRINE.md: Contested terms table; ''Χριστός Christos | Messiah
    (where title; Christ where name-like)'''
- issue: Force of Paul's warning about circumcision
  chosen_reading: The verse is rendered to state that accepting circumcision as the
    relevant covenantal marker nullifies any saving benefit from the Messiah, without
    importing a broader claim that circumcision as a medical or ethnic practice is
    inherently condemned.
  alternative_readings:
  - A broader condemnation of all circumcision in every sense
  rationale: The immediate Galatian context concerns circumcision as an obligation
    tied to law observance for justification. The translation stays close to the wording
    and avoids overextending the theological claim beyond Paul's argument.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it'
