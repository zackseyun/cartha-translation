id: GAL.5.2
reference: Galatians 5:2
source:
  edition: SBLGNT
  text: Ἴδε ἐγὼ Παῦλος λέγω ὑμῖν ὅτι ἐὰν περιτέμνησθε Χριστὸς ὑμᾶς οὐδὲν ὠφελήσει.
translation:
  text: 'Look: I, Paul, say to you that if you receive circumcision, the Messiah will
    benefit you nothing.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'if you are circumcised' or 'if you let yourselves be circumcised.'
    reason: lexical_alternative
  - marker: b
    text: Greek 'Christ'; translated here as 'the Messiah' because Χριστός functions
      as a title.
    reason: alternative_reading
lexical_decisions:
- source_word: Ἴδε
  chosen: 'Look:'
  alternatives:
  - See
  - Take note
  lexicon: BDAG
  rationale: Used as an attention-getting particle. 'Look' is natural modern English
    and preserves the force of Paul's emphatic warning better than the more archaic
    'behold.'
- source_word: ἐγὼ Παῦλος
  chosen: I, Paul,
  alternatives:
  - I, Paul myself,
  lexicon: BDAG
  rationale: The explicit pronoun with the proper name is emphatic. Retaining both
    in apposition preserves Paul's self-identification and rhetorical emphasis.
- source_word: λέγω ὑμῖν
  chosen: say to you
  alternatives:
  - tell you
  lexicon: BDAG
  rationale: A straightforward rendering that preserves the directness of λέγω with
    the dative pronoun. 'Tell you' is possible but slightly more interpretive.
- source_word: ἐὰν περιτέμνησθε
  chosen: if you receive circumcision
  alternatives:
  - if you are circumcised
  - if you let yourselves be circumcised
  lexicon: BDAG
  rationale: The present passive/subjunctive form indicates undergoing circumcision.
    'Receive circumcision' is idiomatic enough in English while preserving the passive
    sense and the idea of submitting to the rite. 'Let yourselves be circumcised'
    is also strong, but slightly more expansive than the Greek form itself.
- source_word: Χριστὸς
  chosen: the Messiah
  alternatives:
  - Christ
  lexicon: BDAG
  rationale: Per doctrine, Χριστός is translated as 'Messiah' where it functions as
    a title rather than a name-like form. Here it refers to Jesus in his messianic
    office, so 'the Messiah' best preserves meaning.
- source_word: οὐδὲν ὠφελήσει
  chosen: will benefit you nothing
  alternatives:
  - will profit you nothing
  - will be of no advantage to you
  lexicon: BDAG
  rationale: This future expression states total lack of benefit. 'Benefit you nothing'
    is clear, modern, and close to the Greek. 'Profit' is traditional but can sound
    commercial or dated.
