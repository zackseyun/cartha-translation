theological_decisions:
- issue: Meaning of σάρξ in Pauline ethical context
  chosen_reading: Retain 'flesh' in the main text as Paul's metaphor for fallen human
    inclination rather than paraphrasing it as 'sinful nature.'
  alternative_readings:
  - the sinful nature
  rationale: The doctrine guidance lists σάρξ as context-dependent and requires per-verse
    documentation. Here the ethical sense is clear, but 'flesh' better preserves Paul's
    theological vocabulary and the tension of the passage without collapsing it into
    one interpretive gloss.
  doctrine_reference: 'DOCTRINE.md: Contested terms — σάρξ'
- issue: Referent of πνεῦμα
  chosen_reading: Translate as 'Spirit' (Holy Spirit) rather than 'spirit' (human
    spirit).
  alternative_readings:
  - the spirit
  rationale: In Galatians 5, Paul repeatedly contrasts life by the Spirit with life
    according to the flesh. Capitalization in English communicates that likely referent.
    The immediate and broader context favors the Holy Spirit rather than merely the
    human inner life.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it; original-language primacy over translation tradition'
