id: GAL.5.17
reference: Galatians 5:17
source:
  edition: SBLGNT
  text: ἡ γὰρ σὰρξ ἐπιθυμεῖ κατὰ τοῦ πνεύματος, τὸ δὲ πνεῦμα κατὰ τῆς σαρκός, ταῦτα
    ⸀γὰρ ⸂ἀλλήλοις ἀντίκειται⸃, ἵνα μὴ ἃ ⸀ἐὰν θέλητε ταῦτα ποιῆτε.
translation:
  text: For the flesh desires what is against the Spirit, and the Spirit what is against
    the flesh; for these oppose each other, so that you do not do the things you want.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the sinful nature' for 'the flesh'; the Greek word is σάρξ (sarx), which
      Paul uses with a broader ethical sense here than mere physical body.
    reason: lexical_alternative
  - marker: b
    text: Or 'the spirit' if taken as the human spirit rather than the Holy Spirit.
    reason: alternative_reading
lexical_decisions:
- source_word: σὰρξ
  chosen: the flesh
  alternatives:
  - the sinful nature
  lexicon: BDAG
  rationale: Rendered 'the flesh' in the main text to preserve Paul's metaphor and
    avoid prematurely resolving it into an interpretive paraphrase. The context is
    ethical and anthropological, so 'sinful nature' is a possible interpretive alternative,
    but the doctrine guidance prefers documenting such context-dependent variance
    rather than importing it into the text.
- source_word: ἐπιθυμεῖ
  chosen: desires
  alternatives:
  - sets its desire against
  - lusts against
  lexicon: BDAG
  rationale: '''Desires'' is natural modern English and captures the verb''s sense
    without the archaic or overly sexualized connotations of ''lusts.'' The hostile
    direction is already conveyed by κατά + genitive.'
- source_word: κατὰ τοῦ πνεύματος / κατὰ τῆς σαρκός
  chosen: what is against the Spirit / what is against the flesh
  alternatives:
  - against the Spirit / against the flesh
  lexicon: BDAG
  rationale: Supplying 'what is' makes the English idiomatic after 'desires' while
    preserving the adversative force of κατά with the genitive. A more literal 'desires
    against' is awkward in English.
- source_word: πνεῦμα
  chosen: the Spirit
  alternatives:
  - the spirit
  lexicon: BDAG
  rationale: Capitalized as 'Spirit' because in this immediate context Paul contrasts
    flesh with the Holy Spirit in the believer's life (cf. surrounding verses in Gal
    5). This is a theological and contextual judgment, but it best fits Paul's argument.
- source_word: ἀλλήλοις ἀντίκειται
  chosen: oppose each other
  alternatives:
  - are opposed to one another
  - are in conflict with each other
  lexicon: BDAG
  rationale: '''Oppose each other'' is concise, accurate, and readable. It reflects
    mutual hostility without overexpanding the phrase.'
- source_word: ἵνα μὴ
  chosen: so that ... not
  alternatives:
  - in order that ... not
  - with the result that ... not
  lexicon: BDAG
  rationale: Rendered with a purpose/result nuance that preserves the Greek construction
    while reading naturally in English. The clause expresses the practical effect
    of this opposition.
- source_word: ἃ ἐὰν θέλητε
  chosen: the things you want
  alternatives:
  - whatever you want
  - what you may wish
  lexicon: BDAG
  rationale: This captures the indefinite relative construction in clear English.
    'The things you want' fits the plural object carried forward by ταῦτα.
- source_word: ταῦτα ποιῆτε
  chosen: do
  alternatives:
  - practice
  - carry out
  lexicon: BDAG
  rationale: Simple 'do' best matches ποιέω here and avoids adding a habitual nuance
    stronger than the Greek requires.
