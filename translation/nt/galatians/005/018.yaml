id: GAL.5.18
reference: Galatians 5:18
source:
  edition: SBLGNT
  text: εἰ δὲ πνεύματι ἄγεσθε, οὐκ ἐστὲ ὑπὸ νόμον.
translation:
  text: But if you are led by the Spirit, you are not under the law.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'if you are being led by the Spirit.'
    reason: lexical_alternative
  - marker: b
    text: '''Under the law'' refers to being under the law''s authority or jurisdiction;
      compare Galatians 5:23.'
    reason: cross_reference
lexical_decisions:
- source_word: εἰ
  chosen: if
  lexicon: BDAG
  rationale: Introduces a conditional clause; straightforwardly rendered as 'if'.
- source_word: δὲ
  chosen: but
  alternatives:
  - and
  - now
  lexicon: BDAG
  rationale: Marks a mild contrast with the surrounding discussion of flesh and Spirit;
    'but' best captures the adversative force in context.
- source_word: πνεύματι
  chosen: the Spirit
  alternatives:
  - spirit
  lexicon: BDAG
  rationale: Dative singular of πνεῦμα here refers to the Holy Spirit in Paul's contrast
    between flesh and Spirit in the immediate context (Gal 5:16–25). The article is
    supplied in English for naturalness and specificity.
- source_word: ἄγεσθε
  chosen: are led
  alternatives:
  - are being led
  - are guided
  lexicon: BDAG
  rationale: Present passive indicative, second plural, from ἄγω. 'Are led' is idiomatic
    English and preserves the passive sense without overtranslating aspect.
- source_word: οὐκ ἐστὲ
  chosen: you are not
  lexicon: BDAG
  rationale: Standard negated copular expression; directly rendered.
- source_word: ὑπὸ νόμον
  chosen: under the law
  alternatives:
  - under law
  - under the Law
  lexicon: BDAG
  rationale: Pauline idiom indicating subjection to the Mosaic law as a governing
    regime. 'The law' is the most natural English rendering here and reflects the
    contextual reference to Torah, while avoiding an overly wooden omission of the
    article in English.
