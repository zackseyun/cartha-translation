theological_decisions:
- issue: Referent of πνεύματι
  chosen_reading: the Holy Spirit
  alternative_readings:
  - human spirit
  rationale: In Galatians 5 the repeated contrast is between flesh and the Spirit,
    with the Spirit as the divine agent empowering believers. Rendering 'the Spirit'
    preserves this contextual and theological sense without importing more than the
    passage itself supports.
  doctrine_reference: Translation philosophy §1, §3
- issue: Sense of ὑπὸ νόμον
  chosen_reading: not under the law
  alternative_readings:
  - not under law in a more general sense
  rationale: In Pauline usage, especially in Galatians, the phrase commonly refers
    to being under the Mosaic law's jurisdiction or regime. The translation preserves
    Paul's theological contrast without expanding it into a full doctrinal system.
  doctrine_reference: Translation philosophy §3, §5
