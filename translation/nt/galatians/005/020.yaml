id: GAL.5.20
reference: Galatians 5:20
source:
  edition: SBLGNT
  text: εἰδωλολατρία, φαρμακεία, ἔχθραι, ⸂ἔρις, ζῆλος⸃, θυμοί, ἐριθεῖαι, διχοστασίαι,
    αἱρέσεις,
translation:
  text: idolatry, sorcery, hostilities, strife, jealousy, outbursts of anger, selfish
    ambition, divisions, factions,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'witchcraft' for sorcery.
    reason: lexical_alternative
  - marker: b
    text: Or 'sects' or, in later church usage, 'heresies' for factions.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰδωλολατρία
  chosen: idolatry
  alternatives:
  - idol worship
  lexicon: BDAG
  rationale: Standard and precise rendering for the worship or service of idols. 'Idolatry'
    is concise, natural English and preserves the moral-religious force of the term.
- source_word: φαρμακεία
  chosen: sorcery
  alternatives:
  - witchcraft
  - magic arts
  lexicon: BDAG
  rationale: In this vice list the term refers not to medicine in general but to occult
    practices associated with potions/spells. 'Sorcery' is the clearest modern rendering;
    'witchcraft' is traditional but can sound culturally narrower.
- source_word: ἔχθραι
  chosen: hostilities
  alternatives:
  - enmities
  - hatreds
  lexicon: BDAG
  rationale: Plural noun denoting states or expressions of hostility. 'Hostilities'
    communicates ongoing antagonism in readable modern English better than the more
    formal 'enmities.'
- source_word: ἔρις
  chosen: strife
  alternatives:
  - quarreling
  - contention
  lexicon: BDAG
  rationale: The term denotes contentious conflict. 'Strife' is concise and fits a
    vice list well, while preserving the interpersonal conflict sense.
- source_word: ζῆλος
  chosen: jealousy
  alternatives:
  - zeal
  - envy
  lexicon: BDAG
  rationale: In this negative vice-list context the word carries the adverse sense
    of jealous rivalry rather than positive zeal. 'Envy' overlaps but is less exact
    here.
- source_word: θυμοί
  chosen: outbursts of anger
  alternatives:
  - fits of rage
  - wraths
  lexicon: BDAG
  rationale: Plural form points to repeated eruptions of anger rather than a settled
    disposition. 'Outbursts of anger' captures that episodic force more clearly than
    the archaic 'wraths.'
- source_word: ἐριθεῖαι
  chosen: selfish ambition
  alternatives:
  - rivalries
  - self-seeking
  lexicon: BDAG
  rationale: The term often denotes partisan self-advancement or canvassing for one's
    own advantage. 'Selfish ambition' is established and communicates motive as well
    as behavior.
- source_word: διχοστασίαι
  chosen: divisions
  alternatives:
  - dissensions
  - discords
  lexicon: BDAG
  rationale: The word denotes standing apart in opposed groups. 'Divisions' is clear,
    idiomatic, and suitably broad in a communal vice list.
- source_word: αἱρέσεις
  chosen: factions
  alternatives:
  - parties
  - sects
  - heresies
  lexicon: BDAG
  rationale: In this context the term refers to divisive groupings or parties, not
    primarily later doctrinal 'heresies.' 'Factions' best fits the immediate social
    sense and avoids importing later technical theology.
