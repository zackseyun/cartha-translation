theological_decisions:
- issue: Rendering αἱρέσεις
  chosen_reading: factions
  alternative_readings:
  - heresies
  - sects
  rationale: The immediate context is a list of relational and communal sins, so the
    social-divisive sense is primary. Rendering it 'heresies' would risk anachronistically
    importing later ecclesiastical categories not demanded by the Greek here.
  doctrine_reference: Affirmations; Translation philosophy §§1, 3, 6
