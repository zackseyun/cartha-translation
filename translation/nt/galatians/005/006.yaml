id: GAL.5.6
reference: Galatians 5:6
source:
  edition: SBLGNT
  text: ἐν γὰρ Χριστῷ Ἰησοῦ οὔτε περιτομή τι ἰσχύει οὔτε ἀκροβυστία, ἀλλὰ πίστις δι’
    ἀγάπης ἐνεργουμένη.
translation:
  text: For in Messiah Jesus neither circumcision nor uncircumcision counts for anything,
    but faith working through love.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Christ Jesus.' The Greek title Χριστός is rendered 'Messiah' here to
      preserve its meaning as a title.
    reason: alternative_reading
  - marker: b
    text: πίστις can also be rendered 'faithfulness' or 'trust'; the main text follows
      the project's default 'faith.'
    reason: lexical_alternative
  - marker: c
    text: Or 'faith being active through love,' 'faith expressing itself through love,'
      or 'faith made effective through love.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν Χριστῷ Ἰησοῦ
  chosen: in Messiah Jesus
  alternatives:
  - in Christ Jesus
  lexicon: BDAG
  rationale: Χριστός is a title here rather than a name-like element, so 'Messiah'
    follows the project's default for Christological titles. ἐν is retained as 'in,'
    preserving Paul's union-with-Christ language rather than paraphrasing it away.
- source_word: γὰρ
  chosen: For
  alternatives:
  - because
  lexicon: BDAG
  rationale: γάρ introduces an explanatory ground for the preceding argument; 'For'
    is the most natural concise English connector in this context.
- source_word: περιτομή
  chosen: circumcision
  lexicon: BDAG
  rationale: Standard lexical sense; in Galatians this carries both literal and covenantal/identity-marker
    force, which 'circumcision' preserves without interpretive expansion.
- source_word: τι ἰσχύει
  chosen: counts for anything
  alternatives:
  - has any power
  - is of any value
  - means anything
  lexicon: BDAG
  rationale: The idiom conveys practical significance or efficacy, not mere physical
    strength. 'Counts for anything' is idiomatic modern English that captures Paul's
    point that neither status has saving/covenantal leverage in this sphere.
- source_word: ἀκροβυστία
  chosen: uncircumcision
  alternatives:
  - being uncircumcised
  lexicon: BDAG
  rationale: The noun is best matched by the corresponding English abstract noun,
    preserving the circumcision/uncircumcision contrast as parallel identity categories.
- source_word: ἀλλὰ
  chosen: but
  alternatives:
  - rather
  lexicon: BDAG
  rationale: Marks strong contrast between what has no value and what does matter.
- source_word: πίστις
  chosen: faith
  alternatives:
  - faithfulness
  - trust
  lexicon: BDAG
  rationale: Per project default, πίστις is rendered 'faith' in the main text. Here
    the noun is not explicitly marked as Christ's faithfulness but as the believer's
    faith characterized by its operation through love; alternative nuances are preserved
    in a footnote.
- source_word: δι’ ἀγάπης
  chosen: through love
  alternatives:
  - by means of love
  lexicon: BDAG
  rationale: διά with the genitive normally indicates means or instrumentality. 'Through
    love' is natural English and preserves the relation between faith and love without
    over-specifying causation.
- source_word: ἀγάπης
  chosen: love
  lexicon: BDAG
  rationale: Follows the project's default rendering of ἀγάπη as 'love.'
- source_word: ἐνεργουμένη
  chosen: working
  alternatives:
  - being active
  - expressing itself
  - becoming effective
  lexicon: BDAG
  rationale: The present middle/passive participle modifying πίστις can be understood
    as faith being active or operative. 'Working' is concise and preserves the verbal
    force without forcing a strictly middle ('expressing itself') or passive ('being
    energized') interpretation.
