id: GAL.5.5
reference: Galatians 5:5
source:
  edition: SBLGNT
  text: ἡμεῖς γὰρ πνεύματι ἐκ πίστεως ἐλπίδα δικαιοσύνης ἀπεκδεχόμεθα.
translation:
  text: For we, by the Spirit, from faith, eagerly await the hope of righteousness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'by faith.' The Greek phrase is literally 'from faith'; compare Paul's
      frequent use of πίστις ('faith'), which can in some contexts also be understood
      as 'faithfulness' or 'trust.'
    reason: lexical_alternative
  - marker: b
    text: Or 'justice.' The Greek δικαιοσύνη can denote righteousness or justice;
      in Paul, 'righteousness' is the default rendering here.
    reason: alternative_reading
  - marker: c
    text: Or 'in the Spirit.' The dative πνεύματι may be understood instrumentally
      ('by the Spirit') or as sphere ('in the Spirit').
    reason: lexical_alternative
lexical_decisions:
- source_word: ἡμεῖς
  chosen: we
  alternatives:
  - we ourselves
  lexicon: BDAG
  rationale: First-person plural pronoun, somewhat emphatic in position. English 'we'
    captures the subject naturally; stronger emphasis like 'we ourselves' is possible
    but unnecessary in the main text.
- source_word: γὰρ
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: BDAG
  rationale: Connective giving explanation or support for the preceding statement.
    'For' preserves the argumentative flow of Paul better than the more colloquial
    'because' here.
- source_word: πνεύματι
  chosen: by the Spirit
  alternatives:
  - in the Spirit
  - by spirit
  lexicon: BDAG
  rationale: Dative of means/sphere with likely reference to the Holy Spirit in Pauline
    usage, especially in contrast to flesh and law in this context. Capitalized 'Spirit'
    reflects that probable referent. 'By the Spirit' best conveys instrumental agency
    without overinterpreting.
- source_word: ἐκ πίστεως
  chosen: from faith
  alternatives:
  - by faith
  - on the basis of faith
  lexicon: BDAG
  rationale: ἐκ marks source or basis. Because πίστις is a contested term in Pauline
    usage, the default rendering 'faith' is retained in the main text. 'From faith'
    is slightly more formal but preserves the preposition's force better than simply
    'by faith'.
- source_word: ἐλπίδα
  chosen: the hope
  alternatives:
  - hope
  lexicon: BDAG
  rationale: Accusative object of ἀπεκδεχόμεθα. The anarthrous Greek can still be
    rendered with the English article for idiomatic clarity in the phrase 'the hope
    of righteousness.'
- source_word: δικαιοσύνης
  chosen: righteousness
  alternatives:
  - justice
  lexicon: BDAG
  rationale: Default doctrinal rendering is 'righteousness,' especially in Pauline
    theological contexts. Because 'justice' is a viable alternative nuance, it is
    preserved in a footnote per doctrine guidance.
- source_word: ἀπεκδεχόμεθα
  chosen: eagerly await
  alternatives:
  - wait for
  - expect eagerly
  lexicon: BDAG
  rationale: The verb carries the sense of eager, patient expectation. 'Eagerly await'
    captures both expectancy and futurity more fully than plain 'wait for'.
