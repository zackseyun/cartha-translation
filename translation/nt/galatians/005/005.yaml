theological_decisions:
- issue: Referent of πνεύματι
  chosen_reading: Holy Spirit
  alternative_readings:
  - human spirit
  rationale: In Galatians 5 the contrastive and redemptive context strongly favors
    the Holy Spirit rather than the human spirit. Rendering with capital 'Spirit'
    reflects this while remaining textually grounded.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather
    than resolve it; here the context sufficiently supports the Holy Spirit reading.'
- issue: Sense of ἐλπίδα δικαιοσύνης
  chosen_reading: 'objective genitive-like sense: ''the hope of righteousness'''
  alternative_readings:
  - '''the hoped-for righteousness'''
  - '''the hope produced by righteousness'''
  rationale: The phrase most naturally refers to the eschatological hope associated
    with righteousness/justification rather than righteousness as merely the source
    of hope. The English keeps the Greek ambiguity to the extent possible without
    paraphrase.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve theological
    tension where ambiguity remains.'
