id: GAL.5.10
reference: Galatians 5:10
source:
  edition: SBLGNT
  text: ἐγὼ πέποιθα εἰς ὑμᾶς ἐν κυρίῳ ὅτι οὐδὲν ἄλλο φρονήσετε· ὁ δὲ ταράσσων ὑμᾶς
    βαστάσει τὸ κρίμα, ὅστις ⸀ἐὰν ᾖ.
translation:
  text: I am confident about you in the Lord, that you will think nothing else; but
    the one who is troubling you will bear the judgment, whoever he may be.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'you will adopt no other view.' The Greek verb can refer not only to
      thinking in general but to holding a particular mindset or judgment.
    reason: lexical_alternative
  - marker: b
    text: Or 'whoever he is' or 'no matter who he is.'
    reason: alternative_reading
lexical_decisions:
- source_word: πέποιθα
  chosen: I am confident
  alternatives:
  - I have confidence
  - I trust
  lexicon: BDAG
  rationale: Perfect active indicative of πείθω used idiomatically for a settled state
    of confidence. 'I am confident' gives natural English while preserving the present
    force of the perfect.
- source_word: εἰς ὑμᾶς
  chosen: about you
  alternatives:
  - in you
  - concerning you
  lexicon: BDAG
  rationale: With πέποιθα, εἰς can express confidence directed toward persons. 'About
    you' communicates Paul's confidence regarding the Galatians' response more clearly
    than the less idiomatic 'in you,' while avoiding over-interpretation.
- source_word: ἐν κυρίῳ
  chosen: in the Lord
  alternatives:
  - through the Lord
  lexicon: BDAG
  rationale: Standard Pauline locution indicating the sphere or basis of confidence.
    'In the Lord' preserves the theological and relational force of the phrase and
    follows the default rendering of κύριος as 'Lord'.
- source_word: οὐδὲν ἄλλο
  chosen: nothing else
  alternatives:
  - no other thing
  - nothing different
  lexicon: BDAG
  rationale: The phrase negates any alternative mindset or conclusion. 'Nothing else'
    is concise and natural, preserving the absolute force.
- source_word: φρονήσετε
  chosen: you will think
  alternatives:
  - you will take this view
  - you will adopt no other view
  lexicon: BDAG
  rationale: φρονέω concerns thinking, mindset, or attitude. 'You will think' is the
    most direct rendering; the object 'nothing else' supplies the contrast. More interpretive
    options were avoided in the main text.
- source_word: ταράσσων
  chosen: is troubling
  alternatives:
  - is disturbing
  - is unsettling
  lexicon: BDAG
  rationale: Present participle denotes the person currently causing agitation among
    the Galatians. 'Troubling' is a natural and sufficiently strong rendering in context.
- source_word: βαστάσει
  chosen: will bear
  alternatives:
  - will carry
  - will suffer
  lexicon: BDAG
  rationale: βαστάζω literally means 'bear/carry.' Here it governs κρίμα and conveys
    bearing the consequence of judgment. 'Will bear' preserves the metaphor and avoids
    prematurely specifying the nature of the penalty.
- source_word: τὸ κρίμα
  chosen: the judgment
  alternatives:
  - the condemnation
  - the sentence
  lexicon: BDAG
  rationale: κρίμα can denote judgment, verdict, or resulting penalty. 'The judgment'
    preserves the ambiguity between verdict and punishment and avoids importing a
    stronger sense like final condemnation unless context demands it.
- source_word: ὅστις ἐὰν ᾖ
  chosen: whoever he may be
  alternatives:
  - whoever he is
  - no matter who he is
  lexicon: BDAG
  rationale: 'Indefinite relative construction with ἐάν expresses indefiniteness:
    the troubler''s identity does not matter. ''Whoever he may be'' captures the concessive-indefinite
    force in idiomatic English.'
