theological_decisions:
- issue: Whether Paul's warning refers to isolated acts or a settled pattern of life
  chosen_reading: Rendered πράσσοντες as 'those who practice such things' to reflect
    habitual conduct.
  alternative_readings:
  - those who do such things
  - those who keep doing such things
  rationale: The present participle in a vice-list warning most naturally denotes
    characteristic practice. This preserves the text's moral seriousness without importing
    a doctrinal claim about every single lapse.
  doctrine_reference: Preserve theological tension rather than resolve it.
