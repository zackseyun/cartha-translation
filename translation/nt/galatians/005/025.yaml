id: GAL.5.25
reference: Galatians 5:25
source:
  edition: SBLGNT
  text: εἰ ζῶμεν πνεύματι, πνεύματι καὶ στοιχῶμεν.
translation:
  text: If we live by the Spirit, let us also walk by the Spirit.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'If we live in the Spirit, let us also keep in step with the Spirit.'
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰ
  chosen: If
  alternatives:
  - Since
  lexicon: BDAG
  rationale: The conditional particle is rendered 'If' to preserve the Greek form
    and Paul's exhortational logic. 'Since' is possible contextually, but 'If' better
    maintains the conditional structure without over-interpreting the force.
- source_word: ζῶμεν
  chosen: we live
  alternatives:
  - we are alive
  lexicon: BDAG
  rationale: Present active indicative of ζάω is rendered 'we live' as the natural
    English equivalent. In context it refers to life derived from the Spirit, not
    merely biological existence.
- source_word: πνεύματι
  chosen: by the Spirit
  alternatives:
  - in the Spirit
  - by spirit
  lexicon: BDAG
  rationale: The dative is rendered instrumentally/associatively as 'by the Spirit.'
    Given the immediate context in Galatians 5 contrasts flesh and Spirit, and Paul's
    usage commonly refers to the Holy Spirit here, the capitalized rendering is warranted.
    'In the Spirit' is possible, but 'by the Spirit' better matches the life-source/instrument
    nuance in English.
- source_word: καὶ
  chosen: also
  alternatives:
  - and
  lexicon: BDAG
  rationale: 'Rendered ''also'' to bring out the ascensive force in the exhortation:
    if one reality is true, a corresponding conduct should follow.'
- source_word: στοιχῶμεν
  chosen: let us walk
  alternatives:
  - let us keep in step
  - let us follow in line
  - let us conduct ourselves
  lexicon: BDAG
  rationale: The present active subjunctive in hortatory use is naturally rendered
    'let us walk.' Although στοιχέω can more specifically mean 'to be in line with'
    or 'keep in step with,' 'walk' preserves Paul's ethical metaphor in readable English
    and aligns with nearby context, while the more specific nuance is preserved in
    a footnote.
