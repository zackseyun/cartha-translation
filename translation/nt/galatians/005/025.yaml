theological_decisions:
- issue: Referent of πνεύματι
  chosen_reading: the Holy Spirit
  alternative_readings:
  - human spirit
  rationale: In Galatians 5 the contrast between flesh and Spirit strongly indicates
    the Holy Spirit rather than the human spirit. Capitalization in English communicates
    this interpretive judgment without adding content beyond the contextual sense.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    theological tension rather than resolve it only where ambiguity is genuine.'
