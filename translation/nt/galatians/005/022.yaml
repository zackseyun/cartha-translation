theological_decisions:
- issue: Referent of πνεῦμα
  chosen_reading: Holy Spirit
  alternative_readings:
  - human spirit
  rationale: The immediate contrast with 'flesh' in Galatians 5 and Paul's broader
    argument support reading πνεῦμα here as the Holy Spirit's work in believers, not
    merely the human spirit.
  doctrine_reference: Affirmations; Translation philosophy §3
- issue: Rendering of πίστις in a virtue list
  chosen_reading: faith
  alternative_readings:
  - faithfulness
  rationale: The project's contested-terms table sets 'faith' as the default for πίστις,
    while requiring alternatives to be preserved in footnotes where contested. In
    Galatians 5:22, both 'faith' and 'faithfulness' are defensible; the default is
    retained in the main text and the alternative is footnoted.
  doctrine_reference: 'Contested terms: πίστις'
