id: GAL.5.22
reference: Galatians 5:22
source:
  edition: SBLGNT
  text: Ὁ δὲ καρπὸς τοῦ πνεύματός ἐστιν ἀγάπη, χαρά, εἰρήνη, μακροθυμία, χρηστότης,
    ἀγαθωσύνη, πίστις,
translation:
  text: But the fruit of the Spirit is love, joy, peace, patience, kindness, goodness,
    faith,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'faithfulness.' The Greek word pistis can denote faith, trust, or faithfulness;
      in this virtue list, 'faithfulness' is a plausible alternative.
    reason: alternative_reading
lexical_decisions:
- source_word: δὲ
  chosen: But
  alternatives:
  - Now
  - And
  lexicon: BDAG
  rationale: Marks contrast with the preceding 'works of the flesh' list in v. 19–21;
    'But' best preserves the adversative force in natural English.
- source_word: καρπὸς
  chosen: fruit
  alternatives:
  - produce
  - harvest
  lexicon: BDAG
  rationale: Standard metaphorical rendering in Pauline usage; singular 'fruit' should
    be preserved because Paul presents these qualities as a unified product rather
    than separate 'fruits.'
- source_word: τοῦ πνεύματός
  chosen: of the Spirit
  alternatives:
  - of the spirit
  lexicon: BDAG
  rationale: Capitalized 'Spirit' because in this Pauline context the referent is
    the Holy Spirit, contrasted with the flesh in the surrounding passage.
- source_word: ἀγάπη
  chosen: love
  alternatives:
  - charity
  lexicon: BDAG
  rationale: Follows the project's default rendering for ἀγάπη; 'charity' is archaic
    and less accurate for modern readers.
- source_word: χαρά
  chosen: joy
  alternatives:
  - gladness
  lexicon: BDAG
  rationale: '''Joy'' is the standard concise rendering and fits the virtue-list context.'
- source_word: εἰρήνη
  chosen: peace
  alternatives:
  - wholeness
  lexicon: BDAG
  rationale: '''Peace'' is the normal lexical equivalent and preserves both interpersonal
    and inward dimensions without over-specifying.'
- source_word: μακροθυμία
  chosen: patience
  alternatives:
  - longsuffering
  - forbearance
  lexicon: BDAG
  rationale: '''Patience'' is clear modern English; ''longsuffering'' is traditional
    but archaic, and ''forbearance'' is narrower.'
- source_word: χρηστότης
  chosen: kindness
  alternatives:
  - gentleness
  - benevolence
  lexicon: BDAG
  rationale: '''Kindness'' is the most natural and widely accepted rendering for this
    virtue in context.'
- source_word: ἀγαθωσύνη
  chosen: goodness
  alternatives:
  - uprightness
  - generosity
  lexicon: BDAG
  rationale: '''Goodness'' best captures the broad moral quality intended in the list.'
- source_word: πίστις
  chosen: faith
  alternatives:
  - faithfulness
  - trust
  lexicon: BDAG
  rationale: Per DOCTRINE.md, the default rendering is 'faith.' In this virtue-list
    context, 'faithfulness' is also plausible and worth preserving in a footnote rather
    than resolving the tension absolutely.
