theological_decisions:
- issue: Referent of πνεύματι
  chosen_reading: Holy Spirit
  alternative_readings:
  - human spirit
  - a general spiritual principle
  rationale: In the immediate context of Galatians 5, Paul contrasts Spirit and flesh
    in a way that points to the Holy Spirit's agency in Christian life. Capitalizing
    'Spirit' reflects this contextual judgment without adding content beyond the discourse.
  doctrine_reference: Translation philosophy §3; preserve theological tension rather
    than resolve it beyond what context supports.
- issue: Rendering of σάρξ
  chosen_reading: the flesh
  alternative_readings:
  - the sinful nature
  rationale: The doctrine table lists 'flesh (literal) / sinful nature (metaphorical)'
    as context-dependent. Although the metaphorical moral sense is present here, 'the
    flesh' is retained in the main text to preserve Paul's own category and avoid
    collapsing the term into one interpretive gloss. The alternative is preserved
    in a footnote.
  doctrine_reference: 'Contested terms table: σάρξ'
