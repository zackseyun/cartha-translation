id: GAL.5.16
reference: Galatians 5:16
source:
  edition: SBLGNT
  text: Λέγω δέ, πνεύματι περιπατεῖτε καὶ ἐπιθυμίαν σαρκὸς οὐ μὴ τελέσητε.
translation:
  text: But I say, walk by the Spirit, and you will certainly not carry out the desire
    of the flesh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the sinful nature.' The Greek word is 'flesh,' which in Paul can denote
      fallen human nature in its opposition to the Spirit.
    reason: alternative_reading
lexical_decisions:
- source_word: Λέγω δέ
  chosen: But I say
  alternatives:
  - Now I say
  - So I say
  lexicon: BDAG
  rationale: δέ is mildly adversative or transitional here; 'But I say' preserves
    Paul's rhetorical turn from the previous exhortation without overstating contrast.
- source_word: πνεύματι
  chosen: by the Spirit
  alternatives:
  - in the Spirit
  - by spirit
  lexicon: BDAG
  rationale: The dative is best taken instrumentally or sphere-related with περιπατεῖτε.
    In Galatians 5 the referent is the Holy Spirit, not the human spirit, so 'by the
    Spirit' is the clearest idiomatic rendering in English and preserves the likely
    personal reference.
- source_word: περιπατεῖτε
  chosen: walk
  alternatives:
  - live
  - conduct yourselves
  lexicon: BDAG
  rationale: Paul's metaphor of 'walking' is common and important; retaining it preserves
    the source image while remaining natural in English.
- source_word: ἐπιθυμίαν
  chosen: the desire
  alternatives:
  - desire
  - craving
  - lust
  lexicon: BDAG
  rationale: ἐπιθυμία can denote desire positively or negatively depending on context.
    Here it is negative because it is qualified by 'of the flesh,' but 'desire' is
    broader and less interpretively loaded than 'lust,' while the article in English
    helps mark the specific desire in view.
- source_word: σαρκὸς
  chosen: the flesh
  alternatives:
  - the sinful nature
  lexicon: BDAG
  rationale: Per doctrine guidance, σάρξ is rendered contextually. Here Paul uses
    it in a morally negative, anthropological sense opposed to the Spirit. 'The flesh'
    preserves Paul's terminology and theological tension better than resolving it
    to 'sinful nature' in the main text.
- source_word: οὐ μὴ τελέσητε
  chosen: you will certainly not carry out
  alternatives:
  - you will by no means fulfill
  - you will never accomplish
  lexicon: BDAG
  rationale: οὐ μὴ with the aorist subjunctive is a strong negation. 'Will certainly
    not' captures the emphatic force in natural English. τελέω here means to bring
    to completion or carry out, so 'carry out' is clearer for modern readers than
    the traditional 'fulfill' while preserving the sense of enacting desire.
