id: GAL.5.9
reference: Galatians 5:9
source:
  edition: SBLGNT
  text: μικρὰ ζύμη ὅλον τὸ φύραμα ζυμοῖ.
translation:
  text: A little leaven leavens the whole batch of dough.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'A little yeast leavens the whole lump.'
    reason: lexical_alternative
lexical_decisions:
- source_word: μικρὰ
  chosen: a little
  alternatives:
  - small
  - a small amount of
  lexicon: BDAG
  rationale: The adjective modifies ζύμη and here denotes a small quantity rather
    than merely small size. 'A little' is idiomatic in English proverbial speech and
    matches the sense of a small amount having broad effect.
- source_word: ζύμη
  chosen: leaven
  alternatives:
  - yeast
  lexicon: BDAG
  rationale: ζύμη refers to fermenting agent used in dough. 'Leaven' preserves the
    biblical/proverbial register and the metaphorical resonance found elsewhere in
    Scripture, while remaining understandable. 'Yeast' is possible but slightly narrows
    the ancient referent and loses some intertextual familiarity.
- source_word: ὅλον
  chosen: the whole
  alternatives:
  - all
  - the entire
  lexicon: BDAG
  rationale: ὅλον intensifies the totality of the effect. 'The whole' is the most
    natural modifier with the following singular noun phrase in English.
- source_word: φύραμα
  chosen: batch of dough
  alternatives:
  - lump
  - whole lump
  - dough
  lexicon: BDAG
  rationale: φύραμα denotes mixed dough or a batch/kneaded mass. 'Batch of dough'
    communicates the concrete image in clear modern English better than the traditional
    'lump,' which can sound opaque or awkward to contemporary readers. Because Paul
    is using a proverb, preserving the dough imagery is important.
- source_word: ζυμοῖ
  chosen: leavens
  alternatives:
  - works through
  - ferments
  lexicon: BDAG
  rationale: The verb means to cause to be leavened. 'Leavens' is the direct lexical
    equivalent and preserves the compact proverbial force. More interpretive options
    like 'works through' explain the metaphor but move beyond the source wording.
