theological_decisions:
- issue: Metaphorical force of the proverb
  chosen_reading: Retain the concrete image of leaven and dough without making the
    implied application explicit in the translation.
  alternative_readings:
  - A little false teaching spreads through the whole community
  - A little yeast works through the whole batch
  rationale: Paul uses a proverbial metaphor in context to warn about corrupting influence,
    but the verse itself states the proverb rather than its interpretation. Preserving
    the image maintains the text's rhetorical force and avoids importing explanatory
    material into the main text.
  doctrine_reference: Translation philosophy §§1, 3, 6
