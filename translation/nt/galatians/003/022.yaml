theological_decisions:
- issue: πίστεως Ἰησοῦ Χριστοῦ genitive construction
  chosen_reading: 'objective genitive: ''faith in Jesus Messiah'''
  alternative_readings:
  - 'subjective genitive: ''the faithfulness of Jesus Messiah'''
  rationale: The phrase is genuinely contested in Pauline studies. To preserve theological
    tension rather than erase it, the main text adopts the project's default rendering
    of πίστις as 'faith' with the common objective-genitive sense, while the alternative
    is retained in a footnote.
  doctrine_reference: 'DOCTRINE.md: preserve theological tension for pistis Christou;
    main text may render one reading, with the alternative preserved in a footnote.'
