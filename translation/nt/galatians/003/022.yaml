id: GAL.3.22
reference: Galatians 3:22
source:
  edition: SBLGNT
  text: ἀλλὰ συνέκλεισεν ἡ γραφὴ τὰ πάντα ὑπὸ ἁμαρτίαν ἵνα ἡ ἐπαγγελία ἐκ πίστεως
    Ἰησοῦ Χριστοῦ δοθῇ τοῖς πιστεύουσιν.
translation:
  text: But the Scripture imprisoned everything under sin, so that the promise by
    faith in Jesus the Messiah might be given to those who believe.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'by the faithfulness of Jesus Messiah.'
    reason: alternative_reading
  - marker: b
    text: Or, 'imprisoned all things under sin.'
    reason: lexical_alternative
lexical_decisions:
- source_word: συνέκλεισεν
  chosen: imprisoned
  alternatives:
  - confined
  - shut up
  lexicon: BDAG
  rationale: Captures the force of being enclosed under restraint more clearly in
    modern English than the more literal but less natural 'shut up.'
- source_word: ἡ γραφή
  chosen: the Scripture
  alternatives:
  - Scripture
  lexicon: BDAG
  rationale: The singular with article is a standard Pauline personification of Scripture;
    retaining the article preserves the Greek form and the sense of Scripture acting
    as a unified witness.
- source_word: τὰ πάντα
  chosen: everything
  alternatives:
  - all things
  - everyone and everything
  lexicon: BDAG
  rationale: The neuter plural is broad and comprehensive. 'Everything' is natural
    English and preserves the universal scope without over-specifying only people.
- source_word: ὑπὸ ἁμαρτίαν
  chosen: under sin
  alternatives:
  - under the power of sin
  - under the dominion of sin
  lexicon: BDAG
  rationale: A relatively transparent rendering that preserves Paul's metaphor of
    subjection without importing an interpretive expansion into the main text.
- source_word: ἡ ἐπαγγελία
  chosen: the promise
  alternatives:
  - the promised gift
  lexicon: BDAG
  rationale: The noun normally means 'promise'; this keeps the wording close to the
    Greek while remaining clear.
- source_word: ἐκ πίστεως Ἰησοῦ Χριστοῦ
  chosen: by faith in Jesus Messiah
  alternatives:
  - from the faithfulness of Jesus Messiah
  - by faith of Jesus Messiah
  lexicon: BDAG
  rationale: This is the contested pistis Christou construction. Following the project's
    default for πίστις, the main text uses 'faith' and takes the genitive in the common
    objective sense ('faith in'). The alternative subjective-genitive reading ('faithfulness
    of Jesus Messiah') is preserved in a footnote.
- source_word: Χριστοῦ
  chosen: Messiah
  alternatives:
  - Christ
  lexicon: BDAG
  rationale: Here Χριστοῦ functions as a title with Jesus, so 'Messiah' follows the
    project's default for Christological titles.
- source_word: δοθῇ
  chosen: might be given
  alternatives:
  - may be given
  lexicon: BDAG
  rationale: The aorist passive subjunctive after ἵνα is well represented by 'might
    be given,' expressing purpose without overstating aspect.
- source_word: τοῖς πιστεύουσιν
  chosen: to those who believe
  alternatives:
  - to the believing ones
  - to believers
  lexicon: BDAG
  rationale: This preserves the participial force in clear English and avoids reducing
    the expression to a label where the Greek describes an active response of faith.
