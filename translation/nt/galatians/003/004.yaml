id: GAL.3.4
reference: Galatians 3:4
source:
  edition: SBLGNT
  text: τοσαῦτα ἐπάθετε εἰκῇ; εἴ γε καὶ εἰκῇ.
translation:
  text: Did you suffer so many things in vain?—if indeed it really was in vain.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Did you experience so many things in vain?'
    reason: lexical_alternative
lexical_decisions:
- source_word: τοσαῦτα
  chosen: so many things
  alternatives:
  - so much
  - such things
  lexicon: BDAG
  rationale: The neuter plural points broadly to the many things the Galatians had
    undergone; 'so many things' is natural English and preserves the plural sense.
- source_word: ἐπάθετε
  chosen: did you suffer
  alternatives:
  - did you experience
  lexicon: BDAG
  rationale: πάσχω can mean either 'suffer' or more generally 'experience.' In Galatians'
    context of hardship connected to faith, 'suffer' best preserves Paul's likely
    force, while the broader alternative is noted in a footnote.
- source_word: εἰκῇ
  chosen: in vain
  alternatives:
  - for nothing
  - to no purpose
  lexicon: BDAG
  rationale: '''In vain'' is the standard and most precise rendering here, conveying
    futility without unnecessary expansion.'
- source_word: εἴ γε
  chosen: if indeed
  alternatives:
  - if really
  - if it is true that
  lexicon: BDAG
  rationale: This conditional particle combination introduces a guarded qualification.
    'If indeed' preserves Paul's rhetorical hesitation.
- source_word: καὶ
  chosen: really
  alternatives:
  - even
  - actually
  lexicon: BDAG
  rationale: Here καὶ works idiomatically with εἰκῇ to intensify the qualification.
    Rendering it as 'really' communicates the emphasis in smooth English rather than
    leaving a wooden 'even in vain.'
- source_word: εἰκῇ
  chosen: in vain
  alternatives:
  - for nothing
  - to no purpose
  lexicon: BDAG
  rationale: The repeated adverb should remain repeated in English for rhetorical
    effect, reinforcing the fear that their suffering may have been pointless.
