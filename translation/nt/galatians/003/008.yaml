id: GAL.3.8
reference: Galatians 3:8
source:
  edition: SBLGNT
  text: προϊδοῦσα δὲ ἡ γραφὴ ὅτι ἐκ πίστεως δικαιοῖ τὰ ἔθνη ὁ θεὸς προευηγγελίσατο
    τῷ Ἀβραὰμ ὅτι Ἐνευλογηθήσονται ἐν σοὶ πάντα τὰ ἔθνη.
translation:
  text: 'And the Scripture, foreseeing that God justifies the nations by faith, proclaimed
    the good news beforehand to Abraham: “In you all the nations will be blessed.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the Gentiles”; Greek ἔθνη can mean “nations” or “Gentiles.”
    reason: lexical_alternative
  - marker: b
    text: Or “preached the gospel beforehand to Abraham.”
    reason: lexical_alternative
lexical_decisions:
- source_word: προϊδοῦσα
  chosen: foreseeing
  alternatives:
  - having foreseen
  - seeing beforehand
  lexicon: BDAG
  rationale: The aorist participle denotes prior perception. “Foreseeing” is clear
    modern English and preserves the temporal sense without sounding wooden.
- source_word: ἡ γραφή
  chosen: the Scripture
  alternatives:
  - Scripture
  - the writing
  lexicon: BDAG
  rationale: γραφή here is the standard Pauline personified reference to Scripture,
    not merely a generic writing. The article is retained.
- source_word: ἐκ πίστεως
  chosen: by faith
  alternatives:
  - from faith
  - on the basis of faith
  lexicon: BDAG
  rationale: Following the project’s default rendering of πίστις as “faith.” “By faith”
    is idiomatic and accurately conveys means/basis in this context.
- source_word: δικαιοῖ
  chosen: justifies
  alternatives:
  - declares righteous
  - counts righteous
  lexicon: BDAG
  rationale: δικαιόω in Paul commonly carries forensic covenantal force. “Justifies”
    is the most concise and standard rendering here without over-paraphrasing.
- source_word: τὰ ἔθνη ... πάντα τὰ ἔθνη
  chosen: the nations ... all the nations
  alternatives:
  - the Gentiles ... all the nations
  - the Gentiles ... all the Gentiles
  lexicon: BDAG
  rationale: ἔθνη can mean either “nations” or “Gentiles.” Here retaining “nations”
    in both occurrences preserves the explicit link between Paul’s statement and the
    Abrahamic quotation, showing that the justified peoples are the same worldwide
    peoples envisioned in the promise.
- source_word: προευηγγελίσατο
  chosen: proclaimed the good news beforehand
  alternatives:
  - preached the gospel beforehand
  - announced beforehand
  lexicon: BDAG
  rationale: The verb explicitly contains the εὐαγγελ- idea. “Proclaimed the good
    news beforehand” preserves that gospel sense in accessible English.
- source_word: τῷ Ἀβραὰμ
  chosen: to Abraham
  lexicon: BDAG
  rationale: A straightforward dative indirect object with standard English transliteration
    of the name.
- source_word: Ἐνευλογηθήσονται
  chosen: will be blessed
  alternatives:
  - will be blessed in
  - will find blessing
  lexicon: BDAG
  rationale: The future passive is best represented directly as “will be blessed.”
    This keeps the promise form intact and avoids importing an interpretive paraphrase.
- source_word: ἐν σοὶ
  chosen: In you
  alternatives:
  - by you
  - in union with you
  lexicon: BDAG
  rationale: This closely follows the Greek and the Genesis citation form. It preserves
    the Abrahamic representative/covenantal wording without over-interpreting the
    preposition.
