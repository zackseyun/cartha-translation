theological_decisions:
- issue: Whether to render ἔθνη as “Gentiles” or “nations”
  chosen_reading: “nations” in both occurrences
  alternative_readings:
  - “Gentiles” in the first occurrence and “nations” in the quotation
  rationale: Although Pauline usage often supports “Gentiles,” using “nations” throughout
    better preserves Paul’s appeal to the Abrahamic promise and the lexical repetition
    in Greek. This keeps the theological connection between justification by faith
    and the promise to the nations transparent.
  doctrine_reference: Consistency of key terms, or documented exception; preserve
    theological tension rather than resolve it
