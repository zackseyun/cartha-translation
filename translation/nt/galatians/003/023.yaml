id: GAL.3.23
reference: Galatians 3:23
source:
  edition: SBLGNT
  text: Πρὸ τοῦ δὲ ἐλθεῖν τὴν πίστιν ὑπὸ νόμον ἐφρουρούμεθα ⸀συγκλειόμενοι εἰς τὴν
    μέλλουσαν πίστιν ἀποκαλυφθῆναι.
translation:
  text: But before faith came, we were being guarded under the law, confined for the
    faith that was about to be revealed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'before the faith came'; the Greek includes the article and may point
      to the era of faith inaugurated with Christ.
    reason: alternative_reading
  - marker: b
    text: Or 'held in custody' for 'were being guarded.'
    reason: lexical_alternative
  - marker: c
    text: Or 'imprisoned' or 'shut up' for 'confined.'
    reason: lexical_alternative
  - marker: d
    text: πίστις can also mean 'faithfulness' or 'trust,' though 'faith' best fits
      the context here.
    reason: lexical_alternative
lexical_decisions:
- source_word: Πρὸ τοῦ ... ἐλθεῖν
  chosen: before ... came
  alternatives:
  - before the coming of ...
  - prior to ... coming
  lexicon: BDAG
  rationale: The articular infinitive with πρό is naturally temporal. 'Before ...
    came' is idiomatic English and preserves the clause-level force without unnecessary
    stiffness.
- source_word: δὲ
  chosen: But
  alternatives:
  - Now
  - And
  lexicon: BDAG
  rationale: δέ marks a mild contrast with the preceding argument. 'But' best reflects
    the transition here.
- source_word: τὴν πίστιν
  chosen: faith
  alternatives:
  - the faith
  - faithfulness
  - trust
  lexicon: BDAG
  rationale: Following project defaults, πίστις is rendered 'faith' in the main text.
    The article likely signals the salvation-historical arrival of faith as a new
    covenant reality, but English reads more naturally here without repeating 'the'
    in a heavily marked way.
- source_word: ὑπὸ νόμον
  chosen: under the law
  alternatives:
  - under law
  lexicon: BDAG
  rationale: This is a standard Pauline expression for being under the regime or authority
    of the Mosaic law. 'Under the law' is the clearest natural rendering in English.
- source_word: ἐφρουρούμεθα
  chosen: were being guarded
  alternatives:
  - were being kept
  - were being held in custody
  lexicon: BDAG
  rationale: The imperfect passive indicates ongoing past action. 'Guarded' preserves
    the lexical link to φρουρέω while leaving the negative nuance to the following
    participle.
- source_word: συγκλειόμενοι
  chosen: confined
  alternatives:
  - shut up
  - imprisoned
  - hemmed in
  lexicon: BDAG
  rationale: The participle adds the sense of enclosure or confinement. 'Confined'
    is natural modern English and avoids over-paraphrase while still conveying the
    restrictive force.
- source_word: εἰς
  chosen: for
  alternatives:
  - until
  - unto
  - with a view to
  lexicon: BDAG
  rationale: Here εἰς expresses orientation toward the forthcoming revelation of faith.
    'For' is concise and works well with the participial construction in English.
- source_word: τὴν μέλλουσαν πίστιν
  chosen: the faith that was about to be revealed
  alternatives:
  - the coming faith that would be revealed
  - the faith soon to be revealed
  lexicon: BDAG
  rationale: μέλλουσαν is preserved with an explicit future-oriented sense. Rendering
    πίστιν again as 'faith' keeps consistency and highlights Paul's salvation-historical
    contrast.
- source_word: ἀποκαλυφθῆναι
  chosen: to be revealed
  alternatives:
  - to be disclosed
  - to be made known
  lexicon: BDAG
  rationale: The aorist passive infinitive is well represented by 'to be revealed,'
    which also preserves Paul's revelatory vocabulary.
