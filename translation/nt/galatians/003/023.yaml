theological_decisions:
- issue: Whether πίστις here should be read as subjective faith generally or as a
    salvation-historical reality tied to the coming of Christ
  chosen_reading: Rendered as 'faith' while preserving the salvation-historical sense
    in context.
  alternative_readings:
  - the faith as the new covenant order
  - faithfulness
  rationale: In Galatians 3, Paul contrasts the era before and after Christ's coming.
    The repeated articular πίστις likely carries more than individual believing, but
    'faith' remains the best main-text rendering under project defaults. More interpretive
    expansions would over-specify the text.
  doctrine_reference: Preserve theological tension rather than resolve it; πίστις
    defaults to 'faith' unless context requires otherwise.
