id: GAL.3.18
reference: Galatians 3:18
source:
  edition: SBLGNT
  text: εἰ γὰρ ἐκ νόμου ἡ κληρονομία, οὐκέτι ἐξ ἐπαγγελίας· τῷ δὲ Ἀβραὰμ δι’ ἐπαγγελίας
    κεχάρισται ὁ θεός.
translation:
  text: For if the inheritance is from the law, it is no longer from a promise; but
    God has graciously given it to Abraham through a promise.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “has granted it to Abraham by promise.”
    reason: lexical_alternative
lexical_decisions:
- source_word: κληρονομία
  chosen: inheritance
  alternatives:
  - heritage
  lexicon: BDAG
  rationale: “Inheritance” is the standard Pauline sense here, referring to what is
    received as an heir, and it fits the argument contrasting law and promise.
- source_word: νόμου
  chosen: the law
  alternatives:
  - law
  lexicon: BDAG
  rationale: Although the noun is anarthrous in Greek after ἐκ, English idiom and
    Pauline context favor “the law,” referring to the Mosaic law as the covenantal
    principle under discussion.
- source_word: ἐκ νόμου
  chosen: from the law
  alternatives:
  - based on the law
  - by the law
  lexicon: BDAG
  rationale: “From the law” preserves the source preposition and Paul’s source/origin
    contrast with “from a promise.”
- source_word: ἐπαγγελίας
  chosen: a promise
  alternatives:
  - promise
  lexicon: BDAG
  rationale: The anarthrous form is represented naturally with “a promise” in English,
    while still referring within Paul’s argument to the promise given to Abraham.
- source_word: οὐκέτι
  chosen: no longer
  alternatives:
  - not anymore
  lexicon: BDAG
  rationale: '“No longer” clearly expresses Paul’s exclusion: inheritance cannot be
    simultaneously grounded in law if it is grounded in promise.'
- source_word: τῷ δὲ Ἀβραὰμ
  chosen: but to Abraham
  alternatives:
  - but for Abraham
  lexicon: BDAG
  rationale: The dative is best rendered with “to Abraham,” preserving the personal
    recipient of God’s action.
- source_word: δι’ ἐπαγγελίας
  chosen: through a promise
  alternatives:
  - by a promise
  - through promise
  lexicon: BDAG
  rationale: “Through a promise” preserves διά with its instrumental sense and keeps
    the contrast with law explicit.
- source_word: κεχάρισται
  chosen: has graciously given
  alternatives:
  - has granted
  - has freely given
  lexicon: BDAG
  rationale: The perfect tense is represented by “has ... given,” and “graciously”
    preserves the grace-related force of χαρίζομαι rather than flattening it to a
    bare “gave.”
- source_word: ὁ θεός
  chosen: God
  lexicon: BDAG
  rationale: Standard rendering of the subject; explicit subject placement in English
    after the contrastive clause reads naturally as “but God...”.
