theological_decisions:
- issue: Whether to make the gracious nuance of χαρίζομαι explicit
  chosen_reading: Rendered κεχάρισται as “has graciously given.”
  alternative_readings:
  - has granted
  - has given
  rationale: Paul’s argument contrasts inheritance by law with inheritance by promise;
    retaining the grace-colored nuance of χαρίζομαι strengthens that contrast without
    importing extra doctrine.
  doctrine_reference: Translation philosophy §§1, 5, 6
