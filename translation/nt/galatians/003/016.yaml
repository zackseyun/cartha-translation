theological_decisions:
- issue: Rendering Χριστός in a Pauline identification formula
  chosen_reading: Messiah
  alternative_readings:
  - Christ
  rationale: The doctrine guidance directs Χριστός to be translated as 'Messiah' where
    the titular sense is active. In 'who is the Messiah,' Paul identifies the promised
    offspring as the anointed deliverer, so the title's meaning should remain explicit.
  doctrine_reference: 'DOCTRINE.md Contested terms: Χριστός → Messiah (where title;
    Christ where name-like)'
