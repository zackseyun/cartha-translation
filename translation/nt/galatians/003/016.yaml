id: GAL.3.16
reference: Galatians 3:16
source:
  edition: SBLGNT
  text: τῷ δὲ Ἀβραὰμ ἐρρέθησαν αἱ ἐπαγγελίαι καὶ τῷ σπέρματι αὐτοῦ· οὐ λέγει· Καὶ
    τοῖς σπέρμασιν, ὡς ἐπὶ πολλῶν, ἀλλ’ ὡς ἐφ’ ἑνός· Καὶ τῷ σπέρματί σου, ὅς ἐστιν
    Χριστός.
translation:
  text: Now the promises were spoken to Abraham and to his offspring. It does not
    say, “And to offsprings,” as referring to many, but as referring to one, “And
    to your offspring,” who is the Messiah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'seed' throughout this verse; the Greek uses a singular collective noun
      central to Paul's argument.
    reason: lexical_alternative
  - marker: b
    text: Greek 'And to seeds'; Paul highlights the singular form of the wording.
    reason: lexical_alternative
  - marker: c
    text: Or 'Christ.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἐρρέθησαν
  chosen: were spoken
  alternatives:
  - were said
  - were declared
  lexicon: BDAG
  rationale: Passive of λέγω is best rendered naturally in English as 'were spoken,'
    preserving the verbal idea without awkwardness.
- source_word: ἐπαγγελίαι
  chosen: promises
  alternatives:
  - promise-words
  - pledges
  lexicon: BDAG
  rationale: Standard Pauline sense is God's promises; 'promises' is clear, idiomatic,
    and formally close.
- source_word: σπέρμα / σπέρματι
  chosen: offspring
  alternatives:
  - seed
  - descendant
  lexicon: BDAG
  rationale: '''Offspring'' preserves the singular collective force needed for Paul''s
    argument while remaining natural modern English. ''Seed'' is more traditional
    but less transparent for many readers.'
- source_word: τοῖς σπέρμασιν
  chosen: offsprings
  alternatives:
  - seeds
  lexicon: BDAG
  rationale: The plural must remain visible because Paul's argument turns on singular
    versus plural. 'Offsprings' is awkward in English, but that awkwardness reflects
    the deliberate grammatical contrast in the Greek.
- source_word: ὡς ἐπὶ πολλῶν
  chosen: as referring to many
  alternatives:
  - as concerning many
  - as though about many
  lexicon: BDAG
  rationale: This expresses Paul's explanatory point idiomatically in English rather
    than reproducing the preposition woodenly.
- source_word: ἀλλ’ ὡς ἐφ’ ἑνός
  chosen: but as referring to one
  alternatives:
  - but to one
  - but as concerning one
  lexicon: BDAG
  rationale: Balances accuracy and readability, matching the prior phrase and preserving
    the singular emphasis.
- source_word: Χριστός
  chosen: Messiah
  alternatives:
  - Christ
  lexicon: BDAG
  rationale: Here Χριστός functions as a christological title, not merely a name-like
    label, so 'Messiah' follows the project's default rendering and preserves the
    title's meaning.
