theological_decisions:
- issue: Rendering υἱοί in a representative context
  chosen_reading: sons
  alternative_readings:
  - children
  rationale: Paul’s wording uses sonship language, which can carry theological weight
    in Galatians. The main text preserves that wording rather than neutralizing it.
    A footnote can clarify inclusive reference if needed.
  doctrine_reference: Gender-accurate over gender-neutral.
