id: GAL.3.7
reference: Galatians 3:7
source:
  edition: SBLGNT
  text: Γινώσκετε ἄρα ὅτι οἱ ἐκ πίστεως, οὗτοι ⸂υἱοί εἰσιν⸃ Ἀβραάμ.
translation:
  text: Know, then, that those of faith—these are Abraham’s sons.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “children of Abraham.”
    reason: lexical_alternative
  - marker: b
    text: Lit. “those of faith.”
    reason: lexical_alternative
  - marker: c
    text: πίστις can also be rendered “trust” or, in some contexts, “faithfulness.”
    reason: alternative_reading
lexical_decisions:
- source_word: Γινώσκετε
  chosen: Know
  alternatives:
  - Understand
  - Recognize
  lexicon: BDAG
  rationale: Present active imperative, second plural; rendered as a direct plural
    command. “Know” is concise, natural English and preserves the exhortatory force
    better than a more diluted paraphrase.
- source_word: ἄρα
  chosen: then
  alternatives:
  - therefore
  - accordingly
  - so
  lexicon: BDAG
  rationale: Marks inference from the preceding argument. “Then” preserves the connective
    force in readable modern English without sounding overly formal.
- source_word: οἱ ἐκ πίστεως
  chosen: those of faith
  alternatives:
  - those who are of faith
  - those from faith
  - those who have faith
  lexicon: BDAG
  rationale: ἐκ with πίστις identifies source/basis/identity. “Those of faith” is
    compact and close to the Greek structure. It avoids over-paraphrasing while still
    reading naturally.
- source_word: πίστεως
  chosen: faith
  alternatives:
  - trust
  - faithfulness
  lexicon: BDAG
  rationale: Per doctrine defaults, πίστις is rendered “faith” in the main text unless
    context makes another nuance clearly preferable. Here the phrase contrasts reliance
    on faith with law-works in Paul’s argument; “faith” is the best default rendering.
- source_word: οὗτοι
  chosen: these
  alternatives:
  - these ones
  - they
  lexicon: BDAG
  rationale: 'The demonstrative is emphatic in Greek. Rendering it as “these” preserves
    the rhetorical emphasis: these, and not others, are in view.'
- source_word: υἱοί
  chosen: sons
  alternatives:
  - children
  lexicon: BDAG
  rationale: Rendered as “sons” to preserve the masculine lexical form and its representative
    force, in keeping with the project’s gender-accurate rather than gender-neutral
    policy. “Children” is smoother in English but weakens the specific sonship language
    Paul uses.
- source_word: Ἀβραάμ
  chosen: Abraham’s
  alternatives:
  - of Abraham
  lexicon: BDAG
  rationale: The genitive is expressed idiomatically in English with the possessive,
    yielding natural phrasing while preserving the relationship of descent/identity.
