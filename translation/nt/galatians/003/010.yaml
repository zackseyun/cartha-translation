id: GAL.3.10
reference: Galatians 3:10
source:
  edition: SBLGNT
  text: Ὅσοι γὰρ ἐξ ἔργων νόμου εἰσὶν ὑπὸ κατάραν εἰσίν, γέγραπται γὰρ ⸀ὅτι Ἐπικατάρατος
    πᾶς ὃς οὐκ ⸀ἐμμένει πᾶσιν τοῖς γεγραμμένοις ἐν τῷ βιβλίῳ τοῦ νόμου τοῦ ποιῆσαι
    αὐτά.
translation:
  text: For all who are of works of the law are under a curse, for it is written,
    “Cursed is everyone who does not continue in all the things written in the book
    of the law, to do them.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “rely on works of the law.”
    reason: alternative_reading
  - marker: b
    text: Lit. “everyone who does not continue in all the things written in the book
      of the law, to do them.”
    reason: lexical_alternative
lexical_decisions:
- source_word: Ὅσοι
  chosen: For all who
  alternatives:
  - All who
  - Whoever
  lexicon: BDAG
  rationale: Introduces a general class; “for all who” preserves both the plural scope
    and the explanatory force with γάρ.
- source_word: ἐξ ἔργων νόμου
  chosen: are of works of the law
  alternatives:
  - rely on works of the law
  - are from works of the law
  lexicon: BDAG
  rationale: A relatively literal rendering preserves Paul’s source-language formulation
    without prematurely resolving it into an interpretive paraphrase like “rely on.”
    The phrase denotes those whose standing is characterized by works of the law.
- source_word: νόμου
  chosen: the law
  alternatives:
  - Law
  lexicon: BDAG
  rationale: Rendered with the article to match the Greek expression and Paul’s covenantal/Jewish
    frame here.
- source_word: ὑπὸ κατάραν
  chosen: under a curse
  alternatives:
  - under curse
  - under the curse
  lexicon: BDAG
  rationale: Idiomatic English for subjection to curse. The anarthrous Greek does
    not require “the curse,” and “a curse” avoids over-specifying while remaining
    natural.
- source_word: γέγραπται
  chosen: it is written
  alternatives:
  - it stands written
  lexicon: BDAG
  rationale: Standard English rendering of the citation formula, preserving the scriptural-authority
    nuance of the perfect passive.
- source_word: Ἐπικατάρατος
  chosen: Cursed
  alternatives:
  - Accursed
  lexicon: BDAG
  rationale: “Cursed” is clear modern English and fits the register of a Scripture
    quotation without unnecessary archaism.
- source_word: πᾶς ὃς
  chosen: everyone who
  alternatives:
  - every person who
  - whoever
  lexicon: BDAG
  rationale: Conveys the universal force in natural English. This is gender-accurate
    to the representative sense of the masculine singular.
- source_word: ἐμμένει
  chosen: continue in
  alternatives:
  - abide by
  - remain in
  - persist in
  lexicon: BDAG
  rationale: Captures ongoing adherence. “Continue in” preserves the durative sense
    and echoes the covenantal demand of persistent obedience.
- source_word: πᾶσιν τοῖς γεγραμμένοις
  chosen: in all the things written
  alternatives:
  - in everything written
  - by all the things written
  lexicon: BDAG
  rationale: Makes explicit the dative object of adherence while preserving the comprehensiveness
    of πᾶσιν.
- source_word: ἐν τῷ βιβλίῳ τοῦ νόμου
  chosen: in the book of the law
  alternatives:
  - in the scroll of the law
  lexicon: BDAG
  rationale: “Book” is the most natural modern rendering here; “scroll” is possible
    historically, but the idiom in English biblical style is “book of the law.”
- source_word: τοῦ ποιῆσαι αὐτά
  chosen: to do them
  alternatives:
  - to keep them
  - to practice them
  lexicon: BDAG
  rationale: Preserves the infinitival purpose/result force closely and reflects the
    concrete obedience implied by ποιέω.
