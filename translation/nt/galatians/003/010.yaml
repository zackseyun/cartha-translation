theological_decisions:
- issue: Interpretation of ἐξ ἔργων νόμου
  chosen_reading: Rendered relatively literally as “are of works of the law” rather
    than interpretively as “rely on works of the law.”
  alternative_readings:
  - rely on works of the law
  - depend on works of the law
  rationale: The phrase is theologically charged in Paul. A more literal rendering
    preserves interpretive tension and avoids importing a full doctrinal explanation
    into the translation line itself.
  doctrine_reference: Preserve theological tension rather than resolve it.
