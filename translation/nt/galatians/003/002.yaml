id: GAL.3.2
reference: Galatians 3:2
source:
  edition: SBLGNT
  text: τοῦτο μόνον θέλω μαθεῖν ἀφ’ ὑμῶν, ἐξ ἔργων νόμου τὸ πνεῦμα ἐλάβετε ἢ ἐξ ἀκοῆς
    πίστεως;
translation:
  text: 'This only I want to learn from you: did you receive the Spirit by works of
    the law, or by hearing with faith?'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'by the hearing of faith'; the phrase may also mean hearing the message
      in faith.
    reason: alternative_reading
  - marker: b
    text: '''Faithfulness'' is a less likely nuance for ''faith'' here but is sometimes
      discussed because the Greek construction is compressed.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τοῦτο μόνον
  chosen: This only
  alternatives:
  - Only this
  - Just this
  rationale: Keeps Paul's emphatic fronting and pointed rhetorical force in natural
    English without adding paraphrastic wording.
- source_word: θέλω μαθεῖν
  chosen: I want to learn
  alternatives:
  - I want to know
  - I want to find out
  lexicon: BDAG
  rationale: A straightforward rendering of θέλω + infinitive that preserves the personal
    and interrogative tone. 'Learn' reflects μαθεῖν more directly than 'know.'
- source_word: ἀφ’ ὑμῶν
  chosen: from you
  alternatives:
  - from you all
  lexicon: BDAG
  rationale: Directly reflects the preposition and plural pronoun. English does not
    require marking the plural explicitly here.
- source_word: ἐξ ἔργων νόμου
  chosen: by works of the law
  alternatives:
  - from works of law
  - by works of law
  lexicon: BDAG
  rationale: This preserves the established Pauline expression while remaining idiomatic
    in English. 'By' fits the instrumental contrast in the question, and 'the law'
    is the most natural English expression for νόμου in this construction.
- source_word: τὸ πνεῦμα
  chosen: the Spirit
  alternatives:
  - the Holy Spirit
  - the spirit
  lexicon: BDAG
  rationale: In Galatians 3 the referent is best understood as the Holy Spirit given
    to believers, so 'Spirit' is capitalized. 'Holy' is not added because it is not
    explicit in the Greek.
- source_word: ἐλάβετε
  chosen: did you receive
  alternatives:
  - have you received
  lexicon: BDAG
  rationale: The aorist is best represented here by simple past in English within
    Paul's rhetorical question.
- source_word: ἐξ ἀκοῆς πίστεως
  chosen: by hearing with faith
  alternatives:
  - from hearing of faith
  - by the hearing of faith
  - by hearing the message with faith
  lexicon: BDAG
  rationale: This best captures the contrast with 'works of the law' as a means or
    manner of reception. It preserves πίστις as 'faith' per default rendering while
    expressing the genitive construction idiomatically in English.
- source_word: πίστεως
  chosen: faith
  alternatives:
  - trust
  - faithfulness
  lexicon: BDAG
  rationale: Per the project's default, πίστις is rendered 'faith.' In this phrase,
    'faithfulness' is less likely, but an alternative nuance should be preserved in
    a footnote because the construction is somewhat compressed.
