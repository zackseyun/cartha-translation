id: GAL.3.3
reference: Galatians 3:3
source:
  edition: SBLGNT
  text: οὕτως ἀνόητοί ἐστε; ἐναρξάμενοι πνεύματι νῦν σαρκὶ ἐπιτελεῖσθε;
translation:
  text: Are you so foolish? Having begun by the Spirit, are you now being perfected
    by the flesh?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the Spirit.'
    reason: lexical_alternative
  - marker: b
    text: Or 'by human effort'; also possibly 'by the sinful nature.'
    reason: lexical_alternative
  - marker: c
    text: Or 'are being completed.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οὕτως
  chosen: so
  alternatives:
  - thus
  - in this way
  lexicon: BDAG
  rationale: 'Idiomatic in the rhetorical question: Paul expresses degree (''so foolish'')
    rather than manner as the main emphasis.'
- source_word: ἀνόητοί
  chosen: foolish
  alternatives:
  - senseless
  - unthinking
  lexicon: BDAG
  rationale: Conveys lack of understanding or discernment in direct but natural modern
    English without overstating to 'stupid.'
- source_word: ἐναρξάμενοι
  chosen: having begun
  alternatives:
  - after beginning
  - having started
  lexicon: BDAG
  rationale: 'The aorist participle is best represented as antecedent action relative
    to the main verb: they began one way and are now shifting to another.'
- source_word: πνεύματι
  chosen: by the Spirit
  alternatives:
  - in the Spirit
  - by the spirit
  lexicon: BDAG
  rationale: In Galatians 3 the referent is the Holy Spirit received through faith,
    so capitalization is warranted. 'By' best reflects the likely instrumental dative
    in contrast with 'by the flesh.'
- source_word: νῦν
  chosen: now
  alternatives:
  - at this point
  lexicon: BDAG
  rationale: Keeps the temporal contrast sharp and concise in Paul's rebuke.
- source_word: σαρκὶ
  chosen: by the flesh
  alternatives:
  - in the flesh
  - by human effort
  - by the sinful nature
  lexicon: BDAG
  rationale: The verse contrasts Spirit and flesh in Pauline idiom. 'Flesh' preserves
    Paul's theological language and avoids prematurely resolving it into either mere
    human effort or sinful nature alone. Alternatives are preserved in a footnote
    per doctrine guidance on contested Pauline usage.
- source_word: ἐπιτελεῖσθε
  chosen: are being perfected
  alternatives:
  - are being completed
  - are you finishing
  lexicon: BDAG
  rationale: 'The present middle/passive here is naturally rendered as a passive-like
    process: being brought toward completion. ''Perfected'' preserves the rhetorical
    force of moving from spiritual beginning to claimed maturity by fleshly means;
    ''completed'' is possible but flatter.'
