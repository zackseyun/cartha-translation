theological_decisions:
- issue: Referent of πνεύματι
  chosen_reading: the Holy Spirit
  alternative_readings:
  - human spirit
  - spiritual principle
  rationale: The immediate context in Galatians 3 concerns receiving the Spirit, miracles,
    and life under faith rather than law, making the Holy Spirit the best contextual
    reading.
- issue: Sense of σάρξ in contrast with Spirit
  chosen_reading: flesh
  alternative_readings:
  - human effort
  - sinful nature
  rationale: Because the context contrasts divine agency with human/fleshly means,
    and because Pauline σάρξ can carry layered meaning, the main text retains 'flesh'
    to preserve the tension rather than collapsing it into one interpretive gloss.
  doctrine_reference: 'Contested terms: σάρξ → flesh (literal) / sinful nature (metaphorical),
    context-dependent; per-verse documented'
