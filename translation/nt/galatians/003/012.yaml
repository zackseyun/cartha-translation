id: GAL.3.12
reference: Galatians 3:12
source:
  edition: SBLGNT
  text: ὁ δὲ νόμος οὐκ ἔστιν ἐκ πίστεως, ἀλλ’· Ὁ ποιήσας ⸀αὐτὰ ζήσεται ἐν αὐτοῖς.
translation:
  text: But the law is not from faith; rather, “The one who does them will live by
    them.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “will live in them.”
    reason: lexical_alternative
  - marker: b
    text: Quotation from Leviticus 18:5.
    reason: cross_reference
lexical_decisions:
- source_word: νόμος
  chosen: law
  alternatives:
  - the Law
  lexicon: BDAG
  rationale: Rendered as “law” to preserve the broad Pauline expression while allowing
    the Mosaic law to remain in view from context. Capitalization was not used in
    the main text because the Greek itself does not mark it.
- source_word: ἐκ
  chosen: from
  alternatives:
  - of
  - based on
  lexicon: BDAG
  rationale: Rendered as “from” to reflect the Greek preposition directly and preserve
    Paul’s contrast of source/principle between law and faith.
- source_word: πίστεως
  chosen: faith
  alternatives:
  - trust
  - faithfulness
  lexicon: BDAG
  rationale: Per doctrine default, πίστις is rendered “faith.” In this verse the sense
    is the principle of faith, not an explicit subjective/genitive construction requiring
    a footnoted contested alternative.
- source_word: ἀλλὰ
  chosen: rather
  alternatives:
  - but
  - instead
  lexicon: BDAG
  rationale: “Rather” clearly marks the sharp contrast and introduces the scriptural
    counterstatement smoothly in English.
- source_word: ὁ ποιήσας
  chosen: the one who does
  alternatives:
  - the one who has done
  - whoever does
  lexicon: BDAG
  rationale: The substantival participle is best represented by “the one who does,”
    which is natural English and preserves the generic singular force.
- source_word: αὐτά
  chosen: them
  alternatives:
  - these things
  lexicon: BDAG
  rationale: Rendered as “them” because the pronoun points back to the law’s commands/requirements
    without needing to make the object more explicit than Greek does.
- source_word: ζήσεται
  chosen: will live
  alternatives:
  - shall live
  lexicon: BDAG
  rationale: Future middle is represented with straightforward modern English, echoing
    the scriptural citation without archaic diction.
- source_word: ἐν αὐτοῖς
  chosen: by them
  alternatives:
  - in them
  lexicon: BDAG
  rationale: 'Rendered “by them” because in this citation the phrase expresses means
    or basis: life comes by doing the commandments. “In them” is more formally literal
    and is preserved in a footnote.'
