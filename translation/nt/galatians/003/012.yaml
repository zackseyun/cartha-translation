theological_decisions:
- issue: Paul’s contrast between law and faith
  chosen_reading: 'The verse is rendered to preserve Paul’s antithesis without softening
    it: the law is not characterized as arising from faith, but speaks in terms of
    doing.'
  alternative_readings:
  - The law is not based on faith
  - The law does not operate on the principle of faith
  rationale: “Is not from faith” stays close to the Greek while leaving Paul’s theological
    tension intact, rather than importing a more interpretive paraphrase.
  doctrine_reference: Preserve theological tension rather than resolve it.
