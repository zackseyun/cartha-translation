theological_decisions:
- issue: How to render εἰς Χριστόν in relation to the law's role
  chosen_reading: The phrase is rendered contextually as 'until the Messiah,' expressing
    the law's temporary custodial function with the Messiah as its goal/terminus.
  alternative_readings:
  - unto the Messiah
  - leading to the Messiah
  rationale: The context in Galatians 3 emphasizes the law's role before the coming/realization
    of faith in relation to the Messiah. 'Until the Messiah' best conveys that temporal-teleological
    sense in clear English, while the alternatives are preserved because εἰς can be
    heard more literally or more dynamically.
  doctrine_reference: Preserve theological tension rather than resolve it.
