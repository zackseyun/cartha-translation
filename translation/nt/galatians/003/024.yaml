id: GAL.3.24
reference: Galatians 3:24
source:
  edition: SBLGNT
  text: ὥστε ὁ νόμος παιδαγωγὸς ἡμῶν γέγονεν εἰς Χριστόν, ἵνα ἐκ πίστεως δικαιωθῶμεν·
translation:
  text: So then, the law has become our guardian until the Messiah, so that we might
    be justified by faith.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'our custodian'; traditionally 'our tutor.' The Greek παιδαγωγός refers
      to a household guardian or supervisor for a child, not primarily a classroom
      teacher.
    reason: lexical_alternative
  - marker: b
    text: Literally 'unto the Messiah'; the phrase may also be understood as 'leading
      to the Messiah.'
    reason: alternative_reading
lexical_decisions:
- source_word: ὥστε
  chosen: So then
  alternatives:
  - therefore
  - so that
  lexicon: BDAG
  rationale: Here ὥστε draws an inferential conclusion from the preceding argument,
    so 'So then' communicates the logical result more naturally than a bare 'therefore'
    while avoiding a purposive sense.
- source_word: νόμος
  chosen: the law
  lexicon: BDAG
  rationale: In Galatians this regularly refers to the Mosaic law as a recognizable
    category, so the established and precise rendering 'the law' fits the context.
- source_word: παιδαγωγός
  chosen: guardian
  alternatives:
  - custodian
  - tutor
  - disciplinarian
  lexicon: BDAG
  rationale: A παιδαγωγός in Greco-Roman usage was not primarily a classroom teacher
    but a household guardian/supervisor for a minor. 'Guardian' best captures that
    social role in readable modern English.
- source_word: ἡμῶν
  chosen: our
  lexicon: BDAG
  rationale: The genitive pronoun marks possession or relation with παιδαγωγός, naturally
    rendered 'our.'
- source_word: γέγονεν
  chosen: has become
  alternatives:
  - became
  - has been
  lexicon: BDAG
  rationale: The perfect tense indicates a resulting state arising from a past action.
    'Has become' preserves that force better than the simple past.
- source_word: εἰς Χριστόν
  chosen: until the Messiah
  alternatives:
  - unto the Messiah
  - leading to the Messiah
  lexicon: BDAG
  rationale: In context εἰς marks direction toward the goal or terminus of the law's
    custodial role. 'Until the Messiah' expresses the contextual sense clearly in
    English, while the more literal 'unto the Messiah' and the interpretive 'leading
    to the Messiah' are preserved in a footnote.
- source_word: Χριστόν
  chosen: the Messiah
  alternatives:
  - Christ
  lexicon: BDAG
  rationale: Per project philosophy, Χριστός is translated as the title 'Messiah'
    where title-force is present rather than retained as the name-like 'Christ.'
- source_word: ἵνα
  chosen: so that
  alternatives:
  - in order that
  lexicon: BDAG
  rationale: ἵνα introduces purpose here. 'So that' is natural, accurate modern English.
- source_word: ἐκ πίστεως
  chosen: by faith
  alternatives:
  - from faith
  lexicon: BDAG
  rationale: The prepositional phrase expresses means or basis in Pauline usage. 'By
    faith' is the most idiomatic and contextually accurate rendering. The default
    project rendering of πίστις is retained.
- source_word: δικαιωθῶμεν
  chosen: might be justified
  alternatives:
  - might be declared righteous
  lexicon: BDAG
  rationale: The aorist passive subjunctive following ἵνα is well represented by 'might
    be justified.' This preserves Paul's legal-forensic wording without over-paraphrase.
