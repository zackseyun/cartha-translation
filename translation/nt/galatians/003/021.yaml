theological_decisions:
- issue: Meaning of δικαιοσύνη in a Pauline argument
  chosen_reading: righteousness
  alternative_readings:
  - justice
  rationale: The project's doctrinal guidance specifies "righteousness" as the default
    rendering for δικαιοσύνη, while preserving "justice" in a footnote for Pauline
    passages. In this context Paul argues about right standing before God in relation
    to law and promise, so "righteousness" best fits the argument without excluding
    the broader justice dimension.
