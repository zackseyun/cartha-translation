id: GAL.3.21
reference: Galatians 3:21
source:
  edition: SBLGNT
  text: Ὁ οὖν νόμος κατὰ τῶν ἐπαγγελιῶν τοῦ θεοῦ; μὴ γένοιτο· εἰ γὰρ ἐδόθη νόμος ὁ
    δυνάμενος ζῳοποιῆσαι, ὄντως ⸂ἐκ νόμου ἂν⸃ ἦν ἡ δικαιοσύνη.
translation:
  text: Is the law then against the promises of God? May it never be! For if a law
    had been given that was able to give life, then righteousness really would have
    been from the law.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "justice."
    reason: lexical_alternative
lexical_decisions:
- source_word: νόμος
  chosen: law
  alternatives:
  - the Law
  lexicon: BDAG
  rationale: Rendered as "law" to preserve Paul's general argument here; although
    Mosaic-law resonance is present, the syntax in this verse speaks hypothetically
    of law as a category while still including the Mosaic law in view.
- source_word: κατὰ
  chosen: against
  alternatives:
  - contrary to
  - opposed to
  lexicon: BDAG
  rationale: With the genitive, κατά here expresses opposition. "Against" is the clearest
    natural English equivalent in this rhetorical question.
- source_word: ἐπαγγελιῶν
  chosen: promises
  alternatives:
  - promise
  lexicon: BDAG
  rationale: The plural is explicit in Greek and should be preserved. It refers to
    the divine promises already discussed in context.
- source_word: μὴ γένοιτο
  chosen: May it never be!
  alternatives:
  - Certainly not!
  - By no means!
  lexicon: BDAG
  rationale: This idiom is Paul's strong repudiation formula. "May it never be!" preserves
    the force and form more transparently than the more idiomatic but less literal
    alternatives.
- source_word: ἐδόθη
  chosen: had been given
  alternatives:
  - was given
  lexicon: BDAG
  rationale: The aorist passive is rendered with English past perfect in context to
    fit the conditional construction smoothly and naturally.
- source_word: δυνάμενος
  chosen: was able to
  alternatives:
  - could
  - having power to
  lexicon: BDAG
  rationale: This participle modifies "law" and expresses capability. "Was able to"
    is clear modern English and preserves the sense of capacity.
- source_word: ζῳοποιῆσαι
  chosen: give life
  alternatives:
  - make alive
  - impart life
  lexicon: BDAG
  rationale: '"Give life" is the most natural contemporary English rendering while
    preserving the verb''s life-giving sense.'
- source_word: ὄντως
  chosen: really
  alternatives:
  - indeed
  - truly
  lexicon: BDAG
  rationale: This adverb strengthens the conclusion. "Really" communicates the emphasis
    in accessible modern English.
- source_word: ἐκ νόμου
  chosen: from the law
  alternatives:
  - by law
  - out of law
  lexicon: BDAG
  rationale: '"From the law" preserves the preposition ἐκ more transparently than
    "by law," while remaining readable in English.'
- source_word: δικαιοσύνη
  chosen: righteousness
  alternatives:
  - justice
  lexicon: BDAG
  rationale: Following the project's default for this contested Pauline term, the
    main text uses "righteousness." "Justice" remains a viable contextual alternative
    and is preserved in a footnote.
