theological_decisions:
- issue: Rendering the Pauline quotation Ὁ δίκαιος ἐκ πίστεως ζήσεται
  chosen_reading: The righteous will live by faith
  alternative_readings:
  - The righteous will live by faithfulness
  - The one who is righteous by faith will live
  rationale: The main text keeps the most straightforward reading of the Greek as
    cited by Paul and aligns with the project default for πίστις. Because πίστις can
    also be understood as "faithfulness" in some contexts, that alternative is preserved
    in a footnote rather than elevated into the main text.
  doctrine_reference: Preserve theological tension rather than resolve it; πίστις
    default rendering is faith, with alternatives footnoted where contested.
