id: GAL.3.11
reference: Galatians 3:11
source:
  edition: SBLGNT
  text: ὅτι δὲ ἐν νόμῳ οὐδεὶς δικαιοῦται παρὰ τῷ θεῷ δῆλον, ὅτι Ὁ δίκαιος ἐκ πίστεως
    ζήσεται,
translation:
  text: Now it is evident that no one is justified before God by the law, because
    "The righteous will live by faith."
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, "The righteous will live by faithfulness."
    reason: lexical_alternative
  - marker: b
    text: Paul is citing Habakkuk 2:4.
    reason: cross_reference
lexical_decisions:
- source_word: ὅτι δὲ
  chosen: Now ... that
  alternatives:
  - But ... that
  - And ... that
  lexicon: BDAG
  rationale: δὲ marks a mild transition in Paul’s argument. "Now" gives natural English
    discourse flow without overstating contrast.
- source_word: ἐν νόμῳ
  chosen: by the law
  alternatives:
  - in the law
  - under law
  lexicon: BDAG
  rationale: Here ἐν with νόμος expresses means or sphere in a juridical argument.
    "By the law" is the clearest idiomatic English rendering in context.
- source_word: οὐδεὶς
  chosen: no one
  alternatives:
  - nobody
  lexicon: BDAG
  rationale: '"No one" is standard, clear English and preserves the universal negation.'
- source_word: δικαιοῦται
  chosen: is justified
  alternatives:
  - is declared righteous
  - is acquitted
  lexicon: BDAG
  rationale: In Paul this verb commonly has forensic force. "Is justified" preserves
    the established juridical sense while remaining natural English.
- source_word: παρὰ τῷ θεῷ
  chosen: before God
  alternatives:
  - in God's sight
  - with God
  lexicon: BDAG
  rationale: The phrase indicates standing in relation to God’s judgment. "Before
    God" is concise and preserves the courtroom nuance.
- source_word: δῆλον
  chosen: it is evident
  alternatives:
  - it is clear
  - it is obvious
  lexicon: BDAG
  rationale: This impersonal predicate is well represented by "it is evident," which
    fits both the syntax and the argumentative tone.
- source_word: Ὁ δίκαιος
  chosen: The righteous
  alternatives:
  - The righteous one
  - The just
  lexicon: BDAG
  rationale: This follows the citation naturally in English. "The righteous" is readable
    and preserves the adjectival substantive form.
- source_word: ἐκ πίστεως
  chosen: by faith
  alternatives:
  - from faith
  - by faithfulness
  lexicon: BDAG
  rationale: Per project defaults, πίστις is rendered "faith" in the main text. "By
    faith" is idiomatic in this Pauline citation, while the lexical alternative "faithfulness"
    is preserved in a footnote.
- source_word: ζήσεται
  chosen: will live
  alternatives:
  - shall live
  lexicon: BDAG
  rationale: The future verb is best rendered "will live" in contemporary English;
    "shall" is more archaic.
