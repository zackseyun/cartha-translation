id: GAL.3.26
reference: Galatians 3:26
source:
  edition: SBLGNT
  text: πάντες γὰρ υἱοὶ θεοῦ ἐστε διὰ τῆς πίστεως ἐν Χριστῷ Ἰησοῦ.
translation:
  text: For you are all sons of God through faith in Messiah Jesus.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''children of God.'' Greek: ''sons,'' preserving the filial and inheritance
      nuance of Paul''s wording.'
    reason: lexical_alternative
  - marker: b
    text: 'Traditional English: ''Christ Jesus.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: πάντες
  chosen: all
  alternatives:
  - all of you
  - everyone
  lexicon: BDAG
  rationale: With the 2nd person plural verb ἐστε, πάντες emphasizes the whole addressed
    group; 'all' is concise and natural in English.
- source_word: γὰρ
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: BDAG
  rationale: γάρ gives the reason or grounding for the previous statement; 'For' preserves
    the connective force with good readability.
- source_word: υἱοὶ
  chosen: sons
  alternatives:
  - children
  lexicon: BDAG
  rationale: The Greek is explicitly masculine plural, and the translation philosophy
    prefers gender-accurate rendering. 'Sons' also preserves the inheritance/status
    nuance of Pauline sonship language better than the flatter 'children'.
- source_word: θεοῦ
  chosen: of God
  lexicon: BDAG
  rationale: 'A straightforward possessive genitive: they are identified as God''s
    sons.'
- source_word: διὰ τῆς πίστεως
  chosen: through faith
  alternatives:
  - through trust
  - by faith
  lexicon: BDAG
  rationale: πίστις defaults to 'faith' per doctrine. διά with the genitive is well
    rendered 'through,' expressing means or instrument.
- source_word: ἐν Χριστῷ Ἰησοῦ
  chosen: in Messiah Jesus
  alternatives:
  - in Christ Jesus
  lexicon: BDAG
  rationale: Χριστῷ is a title and is therefore translated rather than transliterated,
    in keeping with the stated philosophy. ἐν is retained as 'in,' preserving Paul's
    union-with-Christ language rather than reducing it to mere object of belief.
