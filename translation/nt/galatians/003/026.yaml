theological_decisions:
- issue: Gendered filial language
  chosen_reading: sons of God
  alternative_readings:
  - children of God
  rationale: The Greek uses υἱοὶ, not a gender-neutral term. Retaining 'sons' preserves
    both the grammatical form and the Pauline adoption/inheritance nuance, while a
    footnote can clarify representative scope for mixed audiences.
  doctrine_reference: Gender-accurate over gender-neutral
- issue: Rendering Χριστός
  chosen_reading: Messiah Jesus
  alternative_readings:
  - Christ Jesus
  rationale: Because Χριστός functions as a title here, translating it as 'Messiah'
    better preserves the semantic content of the Greek than the traditional transliteration
    'Christ.'
  doctrine_reference: Translate titles; transliterate names
