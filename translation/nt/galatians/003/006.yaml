id: GAL.3.6
reference: Galatians 3:6
source:
  edition: SBLGNT
  text: καθὼς Ἀβραὰμ ἐπίστευσεν τῷ θεῷ, καὶ ἐλογίσθη αὐτῷ εἰς δικαιοσύνην.
translation:
  text: Just as Abraham believed God, and it was counted to him as righteousness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "justice."
    reason: lexical_alternative
lexical_decisions:
- source_word: καθὼς
  chosen: Just as
  alternatives:
  - just as
  - as
  lexicon: BDAG
  rationale: Introduces the comparison with Abraham that grounds Paul's argument;
    'Just as' is natural English and preserves the comparative force.
- source_word: Ἀβραὰμ
  chosen: Abraham
  rationale: Standard English transliteration of the personal name, in keeping with
    the policy to transliterate names.
- source_word: ἐπίστευσεν
  chosen: believed
  alternatives:
  - had faith
  - trusted
  lexicon: BDAG
  rationale: Aorist active of πιστεύω; 'believed' is the most direct rendering here
    and matches the Genesis citation tradition without adding interpretive nuance
    beyond the Greek.
- source_word: τῷ θεῷ
  chosen: God
  alternatives:
  - in God
  lexicon: BDAG
  rationale: The dative with πιστεύω here is best rendered 'believed God,' emphasizing
    taking God at his word rather than the more interpretive 'believed in God.'
- source_word: ἐλογίσθη
  chosen: was counted
  alternatives:
  - was credited
  - was reckoned
  lexicon: BDAG
  rationale: Passive form of λογίζομαι; 'was counted' is clear modern English and
    preserves the forensic/accounting sense central to Paul's argument.
- source_word: αὐτῷ
  chosen: to him
  alternatives:
  - for him
  lexicon: BDAG
  rationale: Dative pronoun indicating the one to whom righteousness was counted.
- source_word: εἰς δικαιοσύνην
  chosen: as righteousness
  alternatives:
  - for righteousness
  lexicon: BDAG
  rationale: The phrase is traditionally and accurately rendered 'as righteousness';
    it communicates result/status without over-paraphrasing. Because δικαιοσύνη is
    a contested Pauline term, the alternative 'justice' is preserved in a footnote.
