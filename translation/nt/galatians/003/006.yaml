theological_decisions:
- issue: Rendering δικαιοσύνη in a Pauline citation
  chosen_reading: righteousness
  alternative_readings:
  - justice
  rationale: DOCTRINE.md gives 'righteousness' as the default rendering of δικαιοσύνη,
    while requiring that 'justice' be preserved in a footnote for Pauline passages.
    In Galatians 3:6, 'righteousness' best fits Paul's argument about covenant standing
    and counted status.
