id: GAL.3.27
reference: Galatians 3:27
source:
  edition: SBLGNT
  text: ὅσοι γὰρ εἰς Χριστὸν ἐβαπτίσθητε, Χριστὸν ἐνεδύσασθε·
translation:
  text: For as many of you as were baptized into Messiah have put on Messiah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Christ” for both instances of “Messiah.”
    reason: lexical_alternative
  - marker: b
    text: Literally “have clothed yourselves with Messiah.”
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅσοι
  chosen: as many of you as
  alternatives:
  - all of you who
  - those of you who
  lexicon: BDAG
  rationale: Keeps the correlative force of ὅσοι while making the direct address to
    the Galatian audience explicit in natural English.
- source_word: γὰρ
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: BDAG
  rationale: Retains the explanatory connection to the preceding argument rather than
    smoothing it away.
- source_word: εἰς
  chosen: into
  alternatives:
  - in relation to
  - unto
  lexicon: BDAG
  rationale: Into is the most direct rendering and preserves the union/incorporation
    sense of the baptismal expression without importing a fuller doctrinal explanation.
- source_word: Χριστόν
  chosen: Messiah
  alternatives:
  - Christ
  lexicon: BDAG
  rationale: Per doctrine, Χριστός is translated as Messiah where the titular sense
    is active. Here the phrase speaks of incorporation into the anointed one, so the
    title sense is prominent.
- source_word: ἐβαπτίσθητε
  chosen: were baptized
  alternatives:
  - were immersed
  lexicon: BDAG
  rationale: Baptized is the standard and contextually appropriate rendering, preserving
    the passive verbal form and avoiding denominationally loaded specificity about
    mode.
- source_word: ἐνεδύσασθε
  chosen: have put on
  alternatives:
  - have clothed yourselves with
  lexicon: BDAG
  rationale: Put on communicates the clothing metaphor clearly in contemporary English
    while remaining close to the Greek middle voice sense.
