theological_decisions:
- issue: Whether the baptismal wording should be rendered in a way that implies a
    specific sacramental theology or baptismal mode.
  chosen_reading: were baptized into Messiah
  alternative_readings:
  - were immersed into Messiah
  - were baptized in relation to Messiah
  rationale: The Greek states incorporation 'into' Christ/Messiah but does not itself
    settle later doctrinal debates about sacramental efficacy or physical mode. The
    translation preserves that tension rather than resolving it.
  doctrine_reference: Preserve theological tension rather than resolve it.
