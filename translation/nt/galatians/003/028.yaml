theological_decisions:
- issue: Whether to render ἄρσεν καὶ θῆλυ in a more idiomatic but less literal way
  chosen_reading: male and female
  alternative_readings:
  - male nor female
  - man and woman
  rationale: The Greek shifts from οὐδὲ in the first two pairs to καὶ here, likely
    echoing Genesis 1:27. Preserving 'male and female' keeps both the lexical precision
    and the possible creation allusion.
  doctrine_reference: Preserve theological tension rather than resolve it; gender-accurate
    over gender-neutral.
- issue: Whether εἷς ἐστε should be expanded interpretively
  chosen_reading: you are all one
  alternative_readings:
  - you are all one person
  - you are all united
  rationale: The text affirms unity in Messiah Jesus without specifying the erasure
    of all creaturely distinctions. A minimal rendering preserves the theological
    claim without importing more than the verse states.
  doctrine_reference: Never import doctrinal claims the text does not make.
