id: GAL.3.28
reference: Galatians 3:28
source:
  edition: SBLGNT
  text: οὐκ ἔνι Ἰουδαῖος οὐδὲ Ἕλλην, οὐκ ἔνι δοῦλος οὐδὲ ἐλεύθερος, οὐκ ἔνι ἄρσεν
    καὶ θῆλυ· ⸀πάντες γὰρ ὑμεῖς εἷς ἐστε ἐν Χριστῷ Ἰησοῦ.
translation:
  text: There is no Jew or Greek, there is no slave or free, there is no male and
    female; for you are all one in Messiah Jesus.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'There is not male nor female'; the Greek literally has 'male and female,'
      likely echoing Genesis 1:27.
    reason: alternative_reading
  - marker: b
    text: Greek 'in Christ Jesus'; rendered 'in Messiah Jesus' because Χριστός is
      a title here.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐκ ἔνι
  chosen: There is no
  alternatives:
  - there is not
  - there is no such thing as
  lexicon: BDAG
  rationale: Idiomatic English equivalent for the repeated existential negation, preserving
    Paul's emphatic pattern without sounding wooden.
- source_word: Ἰουδαῖος
  chosen: Jew
  alternatives:
  - Judean
  lexicon: BDAG
  rationale: In this contrast with Ἕλλην, the ethnic-religious sense is primary; 'Jew'
    is the clearest and most established English rendering here.
- source_word: Ἕλλην
  chosen: Greek
  alternatives:
  - Gentile
  lexicon: BDAG
  rationale: The Greek text says 'Greek,' not the broader 'Gentile.' Retaining 'Greek'
    preserves the concrete pair Paul uses.
- source_word: δοῦλος
  chosen: slave
  alternatives:
  - servant
  - bondservant
  lexicon: BDAG
  rationale: In this social-status pairing with 'free,' the bonded status is salient,
    so 'slave' best reflects the contrast, in keeping with the doctrine guidance.
- source_word: ἐλεύθερος
  chosen: free
  alternatives:
  - freeman
  lexicon: BDAG
  rationale: '''Free'' is the natural English counterpart to ''slave'' and preserves
    the concise social contrast.'
- source_word: ἄρσεν
  chosen: male
  alternatives:
  - man
  lexicon: BDAG
  rationale: The term is biological/sexed rather than the ordinary word for an adult
    man; 'male' is more precise and preserves the likely echo of Genesis 1:27.
- source_word: θῆλυ
  chosen: female
  alternatives:
  - woman
  lexicon: BDAG
  rationale: Paired with ἄρσεν, this is best rendered biologically as 'female,' again
    preserving the wording and probable creation-text echo.
- source_word: καὶ
  chosen: and
  alternatives:
  - nor
  lexicon: BDAG
  rationale: Unlike the prior pairs joined by οὐδὲ, Paul uses καὶ here. Rendering
    it as 'and' preserves the formal difference and the likely allusion to 'male and
    female' in Genesis 1:27.
- source_word: πάντες
  chosen: all
  alternatives:
  - all of you
  lexicon: BDAG
  rationale: Combined with ὑμεῖς, the sense is already explicit; 'all' keeps the clause
    readable while preserving the collective emphasis.
- source_word: ὑμεῖς
  chosen: you
  alternatives:
  - you yourselves
  lexicon: BDAG
  rationale: The pronoun is retained to preserve the direct second-person emphasis
    addressed to the Galatian believers.
- source_word: εἷς
  chosen: one
  alternatives:
  - one person
  - united
  lexicon: BDAG
  rationale: The singular predicate stresses corporate unity. 'One' preserves Paul's
    terse wording better than an interpretive paraphrase like 'united.'
- source_word: ἐν Χριστῷ Ἰησοῦ
  chosen: in Messiah Jesus
  alternatives:
  - in Christ Jesus
  lexicon: BDAG
  rationale: Per doctrine guidance, Χριστός is translated as the title 'Messiah' where
    title force is active. Here the phrase identifies union with Jesus in his messianic
    office, not merely a name-like form.
