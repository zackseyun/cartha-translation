id: GAL.3.9
reference: Galatians 3:9
source:
  edition: SBLGNT
  text: ὥστε οἱ ἐκ πίστεως εὐλογοῦνται σὺν τῷ πιστῷ Ἀβραάμ.
translation:
  text: So then, those who are of faith are blessed with faithful Abraham.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “with Abraham the believer” or “with believing Abraham.”
    reason: alternative_reading
lexical_decisions:
- source_word: ὥστε
  chosen: So then
  alternatives:
  - therefore
  - so
  lexicon: BDAG
  rationale: Draws the inferential sense from the prior argument while sounding natural
    in English.
- source_word: οἱ ἐκ πίστεως
  chosen: those who are of faith
  alternatives:
  - those of faith
  - those who have faith
  lexicon: BDAG
  rationale: Keeps the Greek construction's identity-marker force more closely than
    a simpler verbal paraphrase. 'Faith' follows the project's default rendering for
    πίστις.
- source_word: πίστεως
  chosen: faith
  alternatives:
  - faithfulness
  - trust
  lexicon: BDAG
  rationale: The doctrine excerpt specifies 'faith' as the default rendering for πίστις.
    In this context Paul speaks of people characterized by faith, not primarily by
    faithfulness.
- source_word: εὐλογοῦνται
  chosen: are blessed
  alternatives:
  - receive blessing
  - are being blessed
  lexicon: BDAG
  rationale: A clear passive rendering that matches the present tense and preserves
    the theological emphasis on blessing received rather than achieved.
- source_word: σὺν
  chosen: with
  alternatives:
  - along with
  - together with
  lexicon: BDAG
  rationale: Simple and direct; it preserves Abraham's companionship in shared blessing
    without over-expanding the phrasing.
- source_word: τῷ πιστῷ Ἀβραάμ
  chosen: faithful Abraham
  alternatives:
  - believing Abraham
  - Abraham the believer
  lexicon: BDAG
  rationale: This is the most natural English equivalent of the adjectival phrase,
    while still echoing the immediate context of Abraham's faith. Because 'πιστός'
    can also be understood as 'believing,' that alternative is preserved in a footnote.
