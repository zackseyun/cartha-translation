theological_decisions:
- issue: How to render πιστός with Abraham in a context centered on faith
  chosen_reading: faithful Abraham
  alternative_readings:
  - believing Abraham
  - Abraham the believer
  rationale: The Greek adjective πιστός can denote either faithfulness or belief.
    Here the broader argument in Galatians 3 links Abraham especially with faith,
    but 'faithful Abraham' is the most idiomatic main-text rendering. The alternative
    is preserved in a footnote so the translation does not over-resolve the nuance.
  doctrine_reference: Preserve theological tension rather than resolve it; document
    contested or ambiguous readings.
