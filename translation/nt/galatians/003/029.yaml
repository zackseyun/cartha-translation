theological_decisions:
- issue: Whether to render σπέρμα with a smoother collective term or preserve the
    singular 'seed' that echoes Paul’s earlier messianic argument in Galatians 3.
  chosen_reading: seed
  alternative_readings:
  - offspring
  - descendants
  rationale: Because Galatians 3:29 stands in immediate literary continuity with Paul’s
    argument about Abraham’s 'seed' earlier in the chapter, preserving 'seed' keeps
    the theological and lexical thread visible to the reader.
