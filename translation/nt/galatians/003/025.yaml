id: GAL.3.25
reference: Galatians 3:25
source:
  edition: SBLGNT
  text: ἐλθούσης δὲ τῆς πίστεως οὐκέτι ὑπὸ παιδαγωγόν ἐσμεν.
translation:
  text: But now that faith has come, we are no longer under a guardian.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'now that the faith has come.'
    reason: alternative_reading
  - marker: b
    text: The Greek παιδαγωγός refers to a household guardian or supervisor of a minor,
      not chiefly a classroom teacher.
    reason: cultural_note
lexical_decisions:
- source_word: ἐλθούσης
  chosen: now that ... has come
  alternatives:
  - with ... having come
  - after ... came
  lexicon: BDAG
  rationale: Aorist participle in a genitive absolute is best rendered as a temporal
    clause in natural English. 'Now that ... has come' preserves the completed arrival
    with present relevance.
- source_word: δὲ
  chosen: But
  alternatives:
  - and
  - now
  lexicon: BDAG
  rationale: δέ marks a mild contrast with the previous verse; 'But' brings out the
    transition from the prior custodial period to the present situation.
- source_word: πίστεως
  chosen: faith
  alternatives:
  - the faith
  - faithfulness
  lexicon: BDAG
  rationale: Per doctrine, πίστις defaults to 'faith.' Here it refers to the arrival
    of the faith-era in contrast to the law's prior custodial role. 'Faithfulness'
    is possible in some Pauline contexts but is less natural here.
- source_word: οὐκέτι
  chosen: no longer
  alternatives:
  - not any longer
  lexicon: BDAG
  rationale: This directly conveys the cessation of a prior state.
- source_word: ὑπὸ
  chosen: under
  alternatives:
  - subject to
  lexicon: BDAG
  rationale: Paul's metaphor of being under supervision is preserved most transparently
    by 'under.'
- source_word: παιδαγωγόν
  chosen: guardian
  alternatives:
  - custodian
  - disciplinarian
  - tutor
  lexicon: BDAG
  rationale: A παιδαγωγός was a household guardian/supervisor for a minor, not primarily
    a classroom teacher. 'Guardian' is the clearest modern rendering in this context.
- source_word: ἐσμεν
  chosen: we are
  alternatives:
  - we exist as
  lexicon: BDAG
  rationale: Simple present of εἰμί; the English copula is sufficient and idiomatic.
