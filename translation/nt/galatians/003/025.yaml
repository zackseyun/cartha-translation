theological_decisions:
- issue: Meaning of 'the coming of faith' in context
  chosen_reading: Rendered as 'faith has come,' expressing the salvation-historical
    transition Paul is describing.
  alternative_readings:
  - Rendered more explicitly as 'the faith has come' to stress the era inaugurated
    by Messiah
  rationale: The article with πίστις likely has a contextual, salvation-historical
    force, but English reads more naturally without forcing 'the faith' into the main
    text. The temporal contrast with the law is still preserved.
  doctrine_reference: Preserve theological tension rather than resolve it; πίστις
    defaults to 'faith' unless context requires otherwise.
