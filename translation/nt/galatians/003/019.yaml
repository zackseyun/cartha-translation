theological_decisions:
- issue: Meaning of 'because of transgressions'
  chosen_reading: Rendered broadly as 'because of transgressions' without specifying
    whether the law was given to restrain, expose, or multiply transgressions.
  alternative_readings:
  - to restrain transgressions
  - to expose transgressions
  - with reference to transgressions
  rationale: Paul's phrase is concise and debated; the translation preserves the theological
    tension rather than resolving it beyond what the Greek states.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Rendering σπέρμα in a Pauline argument
  chosen_reading: Used 'seed' in the main text.
  alternative_readings:
  - offspring
  - descendant
  rationale: Although 'offspring' is often smoother in English, 'seed' better preserves
    the intertextual and argumentative link to the Abraham promise in this context.
  doctrine_reference: Original-language primacy over translation tradition; consistency
    of key terms, or documented exception.
