id: GAL.3.19
reference: Galatians 3:19
source:
  edition: SBLGNT
  text: Τί οὖν ὁ νόμος; τῶν παραβάσεων χάριν προσετέθη, ἄχρις ⸀οὗ ἔλθῃ τὸ σπέρμα ᾧ
    ἐπήγγελται, διαταγεὶς δι’ ἀγγέλων ἐν χειρὶ μεσίτου·
translation:
  text: Why then the law? It was added because of transgressions until the seed should
    come to whom the promise had been made, having been put into effect through angels
    by the hand of a mediator.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "offspring" or "descendant."
    reason: lexical_alternative
  - marker: b
    text: '"Because of transgressions" may mean to address, expose, or restrain transgressions;
      the Greek does not specify more narrowly.'
    reason: alternative_reading
  - marker: c
    text: Or "having been ordained" or "having been arranged."
    reason: lexical_alternative
lexical_decisions:
- source_word: Τί οὖν ὁ νόμος;
  chosen: Why then the law?
  alternatives:
  - What then is the law?
  - Why, then, the law?
  lexicon: BDAG
  entry: τίς; οὖν; νόμος
  rationale: 'Takes the elliptical question in its idiomatic Pauline sense: asking
    the purpose of the law, not defining its essence. This is the most natural English
    rendering and fits the argument flow.'
- source_word: νόμος
  chosen: the law
  alternatives:
  - Law
  lexicon: BDAG
  entry: νόμος
  rationale: Standard Pauline usage here points to the Mosaic law as a recognizable
    covenantal entity, so the article is retained in English.
- source_word: τῶν παραβάσεων χάριν
  chosen: because of transgressions
  alternatives:
  - for the sake of transgressions
  - on account of transgressions
  lexicon: BDAG
  entry: χάριν; παράβασις
  rationale: χάριν with the genitive commonly expresses reason or purpose. 'Because
    of transgressions' is natural English and preserves the phrase's ambiguity without
    over-interpreting whether the law restrains, exposes, or multiplies transgressions.
- source_word: προσετέθη
  chosen: was added
  alternatives:
  - was appended
  lexicon: BDAG
  entry: προστίθημι
  rationale: The passive aorist is straightforwardly rendered 'was added,' preserving
    the sense that the law was supplementary rather than primary in the argument.
- source_word: ἄχρις οὗ ἔλθῃ
  chosen: until ... should come
  alternatives:
  - until ... came
  - until ... would come
  lexicon: BDAG
  entry: ἄχρις; ἔρχομαι
  rationale: This construction marks a terminus awaiting a future event from the standpoint
    of the law's addition. 'Should come' is good literary English for the aorist subjunctive
    after ἄχρις.
- source_word: τὸ σπέρμα
  chosen: the seed
  alternatives:
  - the offspring
  - the descendant
  lexicon: BDAG
  entry: σπέρμα
  rationale: Retaining 'seed' preserves Paul's lexical continuity with the Abrahamic
    promise language in the immediate context, especially the singular-focused argument
    in Galatians 3. A more idiomatic alternative is preserved in a footnote.
- source_word: ᾧ ἐπήγγελται
  chosen: to whom the promise had been made
  alternatives:
  - to whom he had promised
  - to whom it had been promised
  lexicon: BDAG
  entry: ἐπαγγέλλομαι
  rationale: This rendering makes the dative explicit and expresses the perfect as
    a prior, abiding promise. 'The promise' is supplied because the verb naturally
    evokes the promise already central to the context.
- source_word: διαταγεὶς
  chosen: having been put into effect
  alternatives:
  - having been ordained
  - having been arranged
  lexicon: BDAG
  entry: διατάσσω
  rationale: The participle describes the law as instituted or arranged. 'Put into
    effect' is readable modern English while preserving the sense of formal establishment.
- source_word: δι’ ἀγγέλων
  chosen: through angels
  alternatives:
  - by angels
  lexicon: BDAG
  entry: ἄγγελος
  rationale: διά with the genitive is well rendered as agency or instrumentality.
    'Through angels' preserves the mediated character of the law's giving.
- source_word: ἐν χειρὶ μεσίτου
  chosen: by the hand of a mediator
  alternatives:
  - through a mediator
  - in the hand of a mediator
  lexicon: BDAG
  entry: χείρ; μεσίτης
  rationale: This is a traditional idiom meaning mediated agency. 'By the hand of
    a mediator' preserves the concrete Greek expression while remaining intelligible
    in English.
