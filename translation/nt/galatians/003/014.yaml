theological_decisions:
- issue: Rendering Χριστῷ as title or name-like form
  chosen_reading: Messiah Jesus
  alternative_readings:
  - Christ Jesus
  rationale: The phrase still bears recognizable titular force in Paul's argument
    about Abrahamic promise and blessing. Following the doctrine's contested-terms
    guidance, the title is translated rather than simply transliterated.
  doctrine_reference: 'DOCTRINE.md: ''Translate titles; transliterate names'' and
    ''Χριστός Christos → Messiah (where title; Christ where name-like)''.'
- issue: Sense of τοῦ πνεύματος
  chosen_reading: the promise of the Spirit
  alternative_readings:
  - the promised Spirit
  rationale: The main text preserves the Greek genitival form without collapsing the
    ambiguity. Because 'the promised Spirit' is a plausible interpretive rendering
    in context, it is preserved in a footnote rather than imported into the main text.
  doctrine_reference: 'DOCTRINE.md: ''Preserve theological tension rather than resolve
    it.'''
