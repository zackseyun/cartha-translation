id: GAL.3.14
reference: Galatians 3:14
source:
  edition: SBLGNT
  text: ἵνα εἰς τὰ ἔθνη ἡ εὐλογία τοῦ Ἀβραὰμ γένηται ἐν ⸂Χριστῷ Ἰησοῦ⸃, ἵνα τὴν ἐπαγγελίαν
    τοῦ πνεύματος λάβωμεν διὰ τῆς πίστεως.
translation:
  text: so that the blessing of Abraham might come to the Gentiles in Messiah Jesus,
    so that we might receive the promise of the Spirit through faith.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to the nations.'
    reason: lexical_alternative
  - marker: b
    text: 'Traditional: ''in Christ Jesus.'''
    reason: lexical_alternative
  - marker: c
    text: Or 'receive the promised Spirit.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἵνα
  chosen: so that
  alternatives:
  - in order that
  lexicon: BDAG
  rationale: Marks purpose in both clauses; 'so that' is natural modern English while
    preserving the verse's twofold purpose structure.
- source_word: εἰς τὰ ἔθνη
  chosen: to the Gentiles
  alternatives:
  - to the nations
  lexicon: BDAG
  rationale: In Pauline usage here, ἔθνη most naturally refers to the Gentiles rather
    than nations in a geopolitical sense. 'To the Gentiles' best captures the Jew/Gentile
    contrast in context, while 'nations' is preserved in a footnote.
- source_word: εὐλογία
  chosen: blessing
  lexicon: BDAG
  rationale: Standard sense here, referring to the Abrahamic blessing.
- source_word: τοῦ Ἀβραὰμ
  chosen: of Abraham
  lexicon: BDAG
  rationale: A straightforward genitive identifying the blessing as the one associated
    with Abraham.
- source_word: γένηται
  chosen: might come
  alternatives:
  - might be
  - might happen
  - might become
  lexicon: BDAG
  rationale: Although γίνομαι is broadly 'become' or 'come into being,' in this construction
    'might come to the Gentiles' expresses the intended sense idiomatically in English
    without wooden phrasing.
- source_word: ἐν Χριστῷ Ἰησοῦ
  chosen: in Messiah Jesus
  alternatives:
  - in Christ Jesus
  lexicon: BDAG
  rationale: Per doctrine, Χριστός is translated as 'Messiah' where the title sense
    is active. 'In Messiah Jesus' preserves Paul's covenantal and redemptive framework
    more transparently than retaining the traditional 'Christ.'
- source_word: ἐπαγγελίαν
  chosen: promise
  lexicon: BDAG
  rationale: The noun is best kept as 'promise,' preserving its connection to the
    Abrahamic promise argument in the surrounding context.
- source_word: τοῦ πνεύματος
  chosen: of the Spirit
  alternatives:
  - the promised Spirit
  lexicon: BDAG
  rationale: The genitive is left transparent as 'of the Spirit,' which preserves
    the Greek wording without overresolving whether the sense is promise given by
    the Spirit or, more likely in context, the promised Spirit. The smoother interpretive
    alternative is preserved in a footnote.
- source_word: λάβωμεν
  chosen: we might receive
  alternatives:
  - we may receive
  lexicon: BDAG
  rationale: Aorist subjunctive under ἵνα is well represented by 'might receive' in
    English purpose style.
- source_word: διὰ τῆς πίστεως
  chosen: through faith
  alternatives:
  - through trust
  lexicon: BDAG
  rationale: Per doctrine, πίστις defaults to 'faith.' This instance is not a major
    contested pistis construction like pistis Christou, so the main text keeps the
    default rendering.
