theological_decisions:
- issue: Whether διαθήκη should be rendered 'covenant' or 'will/testament'
  chosen_reading: covenant
  alternative_readings:
  - will
  - testament
  rationale: In Galatians 3 Paul is arguing from the Abrahamic covenant and promise,
    so rendering διαθήκη as 'covenant' best preserves the theological and contextual
    continuity of the passage. The alternative legal sense is real but less fitting
    here.
