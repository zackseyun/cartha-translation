id: GAL.3.15
reference: Galatians 3:15
source:
  edition: SBLGNT
  text: Ἀδελφοί, κατὰ ἄνθρωπον λέγω· ὅμως ἀνθρώπου κεκυρωμένην διαθήκην οὐδεὶς ἀθετεῖ
    ἢ ἐπιδιατάσσεται.
translation:
  text: 'Brothers, I am speaking in human terms: even a covenant ratified by a man,
    no one sets aside or adds to it.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '''Brothers'' translates the masculine plural adelphoi; Paul is addressing
      fellow believers, likely including women.'
    reason: cultural_note
  - marker: b
    text: Or 'will' / 'testament' for 'covenant.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀδελφοί
  chosen: Brothers
  alternatives:
  - Brothers and sisters
  - Siblings
  lexicon: BDAG
  rationale: Vocative plural of ἀδελφός. Following the project's gender-accurate principle,
    the masculine form is preserved in the main text rather than replaced with a gender-neutral
    collective, while the likely mixed audience can be clarified in a footnote.
- source_word: κατὰ ἄνθρωπον λέγω
  chosen: I am speaking in human terms
  alternatives:
  - I speak according to man
  - I am speaking from a human perspective
  lexicon: BDAG
  rationale: This is an idiomatic expression introducing a human analogy or ordinary
    legal example. 'In human terms' preserves the idiom's force in natural English
    without over-paraphrasing.
- source_word: ὅμως
  chosen: even
  alternatives:
  - nevertheless
  - yet
  - even so
  lexicon: BDAG
  rationale: 'Here ὅμως marks a strengthening transition into the example. ''Even''
    fits the argumentative flow in English: even in an ordinary human case, the stated
    principle holds.'
- source_word: ἀνθρώπου
  chosen: by a man
  alternatives:
  - human
  - man's
  - human-made
  lexicon: BDAG
  rationale: The genitive singular is retained concretely as 'by a man' rather than
    abstracted to 'human' or expanded to 'human-made.' This keeps closer to the Greek
    while still reading naturally in context.
- source_word: κεκυρωμένην
  chosen: ratified
  alternatives:
  - confirmed
  - validated
  - legally confirmed
  lexicon: BDAG
  rationale: The perfect passive participle indicates something formally established
    and in force. 'Ratified' best captures the legal/official sense relevant to Paul's
    analogy.
- source_word: διαθήκην
  chosen: covenant
  alternatives:
  - will
  - testament
  - agreement
  lexicon: BDAG
  rationale: Although διαθήκη can mean 'will' or 'testament' in some contexts, 'covenant'
    best fits Paul's immediate argument about God's promise to Abraham and maintains
    consistency with Pauline usage unless context demands otherwise. The legal nuance
    remains clear with 'ratified.'
- source_word: ἀθετεῖ
  chosen: sets aside
  alternatives:
  - annuls
  - invalidates
  - nullifies
  lexicon: BDAG
  rationale: The verb means to invalidate or set aside. 'Sets aside' is clear modern
    English and preserves the legal force without sounding overly technical.
- source_word: ἐπιδιατάσσεται
  chosen: adds to it
  alternatives:
  - adds provisions to it
  - modifies it further
  lexicon: BDAG
  rationale: The verb conveys adding further stipulations or provisions. 'Adds to
    it' is concise, natural, and sufficient in context, with the legal nuance inferable
    from the covenant language.
