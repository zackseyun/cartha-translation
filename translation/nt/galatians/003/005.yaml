theological_decisions:
- issue: The phrase ἀκοῆς πίστεως is syntactically compact and can be understood in
    more than one closely related way.
  chosen_reading: hearing with faith
  alternative_readings:
  - hearing of faith
  - the message heard with faith
  rationale: The chosen reading best preserves Paul's rhetorical contrast between
    receiving by law-works and receiving through hearing that is met by faith. The
    alternatives are plausible and are preserved in a footnote rather than being collapsed
    without comment.
  doctrine_reference: Preserve theological tension rather than resolve it.
