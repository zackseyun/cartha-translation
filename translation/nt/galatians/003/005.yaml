id: GAL.3.5
reference: Galatians 3:5
source:
  edition: SBLGNT
  text: ὁ οὖν ἐπιχορηγῶν ὑμῖν τὸ πνεῦμα καὶ ἐνεργῶν δυνάμεις ἐν ὑμῖν ἐξ ἔργων νόμου
    ἢ ἐξ ἀκοῆς πίστεως;
translation:
  text: So then, does the one who supplies the Spirit to you and works miracles among
    you do so by works of the law, or by hearing with faith?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “in you.”
    reason: lexical_alternative
  - marker: b
    text: Or “by hearing of faith,” or “by the message heard with faith.”
    reason: alternative_reading
lexical_decisions:
- source_word: ἐπιχορηγῶν
  chosen: supplies
  alternatives:
  - provides
  - gives generously
  lexicon: BDAG
  rationale: Conveys ongoing provision in a natural but still fairly formal way. 'Supplies'
    preserves the sense of furnishing what is needed without sounding overly paraphrastic.
- source_word: τὸ πνεῦμα
  chosen: the Spirit
  alternatives:
  - the Holy Spirit
  lexicon: BDAG
  rationale: The article and Pauline usage support a definite reference to the Spirit.
    'The Spirit' is sufficiently clear here without expanding beyond the Greek.
- source_word: ἐνεργῶν δυνάμεις
  chosen: works miracles
  alternatives:
  - works mighty deeds
  - works powers
  lexicon: BDAG
  rationale: This is the most natural English rendering of the verbal-nominal combination
    in context. 'Works powers' is more literal but less clear; 'miracles' captures
    the evident sense of mighty divine acts.
- source_word: ἐν ὑμῖν
  chosen: among you
  alternatives:
  - in you
  lexicon: BDAG
  rationale: In this context of observable mighty works in the Galatian communities,
    'among you' is the clearest English sense. 'In you' remains possible and is preserved
    in a footnote because the Greek preposition can bear either nuance.
- source_word: ἐξ ἔργων νόμου
  chosen: by works of the law
  alternatives:
  - from works of the law
  lexicon: BDAG
  rationale: This is standard Pauline language. 'By' communicates the instrumental
    force naturally in English while preserving the recognized expression 'works of
    the law.'
- source_word: νόμου
  chosen: the law
  alternatives:
  - law
  lexicon: BDAG
  rationale: The article is not explicit in Greek, but in Paul's argument the phrase
    conventionally refers to the Mosaic law. English idiom normally supplies 'the'
    here.
- source_word: ἀκοῆς πίστεως
  chosen: hearing with faith
  alternatives:
  - hearing of faith
  - the message heard with faith
  lexicon: BDAG
  rationale: 'This rendering best communicates the contrast with ''works of the law''
    in idiomatic English: hearing that is accompanied by faith. Because the genitive
    construction is compact and somewhat ambiguous, alternatives are preserved in
    a footnote.'
- source_word: πίστεως
  chosen: faith
  alternatives:
  - faithfulness
  - trust
  lexicon: BDAG
  rationale: Per the doctrine's default, πίστις is rendered 'faith' in the main text.
    In this phrase, 'faith' fits Paul's contrast most naturally; other possibilities
    are less likely here.
