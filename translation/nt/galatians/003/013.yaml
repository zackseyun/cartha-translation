theological_decisions:
- issue: Scope of ὑπὲρ ἡμῶν in relation to atonement language
  chosen_reading: for us
  alternative_readings:
  - on our behalf
  - in our place
  rationale: The verse clearly states benefaction and representation, but the preposition
    ὑπέρ itself does not require the translator to encode a narrower doctrinal model
    in the main text. “For us” preserves the theological force while avoiding over-resolution.
  doctrine_reference: Preserve theological tension rather than resolve it.
