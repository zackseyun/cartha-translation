id: GAL.3.13
reference: Galatians 3:13
source:
  edition: SBLGNT
  text: Χριστὸς ἡμᾶς ἐξηγόρασεν ἐκ τῆς κατάρας τοῦ νόμου γενόμενος ὑπὲρ ἡμῶν κατάρα,
    ⸂ὅτι γέγραπται⸃· Ἐπικατάρατος πᾶς ὁ κρεμάμενος ἐπὶ ξύλου,
translation:
  text: 'The Messiah redeemed us from the curse of the law by becoming a curse for
    us, because it is written: “Cursed is everyone who hangs on a tree.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Christ redeemed us.”
    reason: lexical_alternative
  - marker: b
    text: Or “on our behalf”; possibly “in our place.”
    reason: lexical_alternative
  - marker: c
    text: Or “for it is written.”
    reason: alternative_reading
  - marker: d
    text: ξύλον literally means “wood” or “tree”; “tree” preserves the wording of
      the Scripture citation.
    reason: lexical_alternative
lexical_decisions:
- source_word: Χριστός
  chosen: The Messiah
  alternatives:
  - Christ
  lexicon: BDAG
  rationale: Rendered as the translated title “Messiah” rather than the transliterated
    “Christ,” following the project’s default for Χριστός where the titular sense
    is active.
- source_word: ἐξηγόρασεν
  chosen: redeemed
  alternatives:
  - bought out
  - ransomed
  lexicon: BDAG
  rationale: Conveys liberation by costly purchase in idiomatic but still transparent
    English; “redeemed” best preserves both commercial and salvific force in Pauline
    usage.
- source_word: κατάρας
  chosen: curse
  alternatives:
  - accursed state
  lexicon: BDAG
  rationale: The straightforward noun “curse” preserves the juridical and covenantal
    weight of the Greek without interpretive expansion.
- source_word: νόμου
  chosen: the law
  alternatives:
  - Law
  lexicon: BDAG
  rationale: Rendered as “the law” to preserve the genitive phrase’s plain sense;
    capitalization was avoided in the main text since the Greek itself does not mark
    that distinction here, though the Mosaic law is in view contextually.
- source_word: γενόμενος
  chosen: by becoming
  alternatives:
  - having become
  - when he became
  lexicon: BDAG
  rationale: The participle is rendered with “by becoming” to express the means by
    which the redemption was accomplished, in natural English while retaining the
    participial relationship.
- source_word: ὑπὲρ ἡμῶν
  chosen: for us
  alternatives:
  - on our behalf
  - in our place
  lexicon: BDAG
  rationale: “For us” preserves the semantic breadth of ὑπέρ without over-specifying
    the mode of benefit. More explicit substitutional language is possible contextually,
    but the Greek preposition itself is broader.
- source_word: κατάρα
  chosen: a curse
  alternatives:
  - accursed
  lexicon: BDAG
  rationale: The anarthrous predicate noun is best represented as “a curse,” preserving
    the shock and force of Paul’s wording rather than softening it to an adjective.
- source_word: ὅτι γέγραπται
  chosen: because it is written
  alternatives:
  - for it is written
  lexicon: BDAG
  rationale: Rendered causally as “because it is written,” which fits the explanatory
    force of the citation. “For it is written” is also viable and is preserved in
    a footnote.
- source_word: Ἐπικατάρατος
  chosen: Cursed
  alternatives:
  - Accursed
  lexicon: BDAG
  rationale: “Cursed” is the most natural English equivalent and matches established
    biblical idiom without losing force.
- source_word: κρεμάμενος
  chosen: hangs
  alternatives:
  - is hanging
  - is hung
  lexicon: BDAG
  rationale: The participle is rendered generically as “hangs” in English proverbial
    style, fitting the scriptural citation.
- source_word: ξύλου
  chosen: tree
  alternatives:
  - wood
  - wooden stake
  lexicon: BDAG
  rationale: “Tree” preserves the wording of the Deuteronomy citation as echoed in
    early Christian usage. Although ξύλον can denote wood or wooden object, “tree”
    is the clearest here and maintains the intertextual link.
