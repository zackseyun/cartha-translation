theological_decisions:
- issue: Rendering Χριστός in the Pauline name-title expression Ἰησοῦς Χριστός
  chosen_reading: Jesus the Messiah
  alternative_readings:
  - Jesus Christ
  rationale: The project default prefers translating Χριστός as 'Messiah' where its
    titular force can still be heard. In this verse Paul stresses the proclaimed identity
    and work of Jesus, so preserving the title's meaning is preferable while noting
    the traditional English form.
  doctrine_reference: 'DOCTRINE.md: ''Translate titles; transliterate names'' and
    contested terms table for Χριστός.'
