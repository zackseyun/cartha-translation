id: GAL.3.1
reference: Galatians 3:1
source:
  edition: SBLGNT
  text: Ὦ ἀνόητοι Γαλάται, τίς ὑμᾶς ⸀ἐβάσκανεν, οἷς κατ’ ὀφθαλμοὺς Ἰησοῦς Χριστὸς
    ⸀προεγράφη ἐσταυρωμένος;
translation:
  text: You foolish Galatians, who has bewitched you? Before your eyes Jesus the Messiah
    was publicly portrayed as crucified.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or: ''who has deceived you?'' The verb literally evokes bewitching or casting
      a spell.'
    reason: lexical_alternative
  - marker: b
    text: Greek 'Jesus Christ'; translated here as 'Jesus the Messiah' to preserve
      the title's meaning.
    reason: lexical_alternative
  - marker: c
    text: 'Or: ''was clearly set forth'' or ''was publicly placarded as crucified.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνόητοι
  chosen: foolish
  alternatives:
  - senseless
  - unthinking
  lexicon: BDAG
  rationale: Conveys rebuke for lack of understanding without adding stronger moral
    condemnation than the adjective itself requires.
- source_word: Γαλάται
  chosen: Galatians
  rationale: Standard transliteration for the ethnic/regional address.
- source_word: ἐβάσκανεν
  chosen: bewitched
  alternatives:
  - cast a spell on
  - deceived
  lexicon: BDAG
  rationale: Retains the vivid metaphor of harmful influence or enchantment present
    in βασκαίνω. A flatter rendering like 'deceived' loses Paul's rhetorical sharpness.
- source_word: οἷς κατ’ ὀφθαλμοὺς
  chosen: Before your eyes
  alternatives:
  - before whose eyes
  - in your sight
  lexicon: BDAG
  rationale: Idiomatic English rendering of the relational dative plus κατά phrase,
    preserving the force of direct public visibility.
- source_word: Ἰησοῦς Χριστός
  chosen: Jesus the Messiah
  alternatives:
  - Jesus Christ
  rationale: Χριστός is treated here as a meaningful title rather than a bare surname-like
    element, so 'Messiah' better preserves the source sense under the project's stated
    philosophy.
- source_word: προεγράφη
  chosen: was publicly portrayed
  alternatives:
  - was publicly presented
  - was placarded
  - was clearly set forth
  lexicon: BDAG
  rationale: Captures the sense of something openly displayed or vividly set before
    others. 'Publicly portrayed' communicates both visibility and rhetorical vividness
    in natural English.
- source_word: ἐσταυρωμένος
  chosen: as crucified
  alternatives:
  - crucified
  lexicon: BDAG
  rationale: 'The participle functions predicatively with προεγράφη, so ''as crucified''
    best reflects the syntax: Jesus was portrayed in that crucified state.'
