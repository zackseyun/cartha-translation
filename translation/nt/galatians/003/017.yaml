id: GAL.3.17
reference: Galatians 3:17
source:
  edition: SBLGNT
  text: τοῦτο δὲ λέγω· διαθήκην προκεκυρωμένην ὑπὸ τοῦ ⸀θεοῦ ὁ μετὰ ⸂τετρακόσια καὶ
    τριάκοντα ἔτη⸃ γεγονὼς νόμος οὐκ ἀκυροῖ, εἰς τὸ καταργῆσαι τὴν ἐπαγγελίαν.
translation:
  text: 'Now this is what I mean: the law, which came four hundred and thirty years
    later, does not invalidate a covenant previously ratified by God, so as to abolish
    the promise.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'does not annul.'
    reason: lexical_alternative
  - marker: b
    text: Or 'so as to nullify' or 'set aside' the promise.
    reason: lexical_alternative
lexical_decisions:
- source_word: τοῦτο δὲ λέγω
  chosen: Now this is what I mean
  alternatives:
  - Now I say this
  - This is what I am saying
  lexicon: BDAG
  entry: λέγω
  rationale: Uses natural English to introduce Paul's explanatory statement while
    preserving the present-tense discourse force.
- source_word: διαθήκην
  chosen: a covenant
  alternatives:
  - a testament
  - an agreement
  lexicon: BDAG
  entry: διαθήκη
  rationale: In Galatians 3 the argument is built on God's covenantal promise to Abraham,
    so 'covenant' best matches the theological and lexical sense here.
- source_word: προκεκυρωμένην
  chosen: previously ratified
  alternatives:
  - previously confirmed
  - previously validated
  lexicon: BDAG
  entry: προκυρόω
  rationale: Conveys prior legal establishment with clear temporal force from the
    perfect participle and the prefixed idea of prior action.
- source_word: ὑπὸ τοῦ θεοῦ
  chosen: by God
  alternatives:
  - by God himself
  lexicon: BDAG
  entry: θεός
  rationale: A straightforward agentive rendering of the prepositional phrase; no
    added emphasis beyond the Greek is necessary in the main text.
- source_word: ὁ ... γεγονὼς νόμος
  chosen: the law, which came
  alternatives:
  - the law that appeared
  - the law that came into being
  lexicon: BDAG
  entry: γίνομαι
  rationale: Idiomatic English that captures the law as arriving later in history,
    fitting Paul's temporal contrast.
- source_word: μετὰ τετρακόσια καὶ τριάκοντα ἔτη
  chosen: four hundred and thirty years later
  alternatives:
  - after four hundred and thirty years
  - 430 years later
  lexicon: BDAG
  entry: μετά
  rationale: Expresses the chronological interval clearly in contemporary English
    while preserving the comparative 'later' sense in context.
- source_word: οὐκ ἀκυροῖ
  chosen: does not invalidate
  alternatives:
  - does not annul
  - does not nullify
  lexicon: BDAG
  entry: ἀκυρόω
  rationale: '''Invalidate'' communicates the legal force well in modern English and
    fits the covenant-law contrast.'
- source_word: εἰς τὸ καταργῆσαι
  chosen: so as to abolish
  alternatives:
  - so as to nullify
  - with the result of setting aside
  lexicon: BDAG
  entry: καταργέω
  rationale: Represents purpose/result force with an infinitive phrase and preserves
    the strong sense of rendering something ineffective.
- source_word: τὴν ἐπαγγελίαν
  chosen: the promise
  alternatives:
  - the promised gift
  lexicon: BDAG
  entry: ἐπαγγελία
  rationale: '''Promise'' is the standard and contextually precise rendering in Paul''s
    Abrahamic argument.'
