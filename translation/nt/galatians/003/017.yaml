theological_decisions:
- issue: Meaning of διαθήκη in Paul's argument
  chosen_reading: covenant
  alternative_readings:
  - testament
  - legal disposition
  rationale: The surrounding context centers on God's prior promise to Abraham, so
    'covenant' preserves Paul's salvation-historical argument better than 'testament.'
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    theological tension rather than resolve it beyond the text'
