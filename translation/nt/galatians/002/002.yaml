theological_decisions:
- issue: Whether Paul's private presentation implies submission of his gospel to apostolic
    correction
  chosen_reading: 'The wording remains neutral: Paul ''laid before them'' the gospel
    without implying doctrinal inferiority or mere consultation for authorization.'
  alternative_readings:
  - Paul submitted his gospel for approval
  - Paul merely informed them with no evaluative component at all
  rationale: The verse indicates a private presentation motivated by concern about
    running in vain, but the Greek verb does not itself require a strong notion of
    formal submission. A neutral rendering best preserves the text's tension.
