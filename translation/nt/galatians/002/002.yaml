id: GAL.2.2
reference: Galatians 2:2
source:
  edition: SBLGNT
  text: ἀνέβην δὲ κατὰ ἀποκάλυψιν· καὶ ἀνεθέμην αὐτοῖς τὸ εὐαγγέλιον ὃ κηρύσσω ἐν
    τοῖς ἔθνεσιν, κατ’ ἰδίαν δὲ τοῖς δοκοῦσιν, μή πως εἰς κενὸν τρέχω ἢ ἔδραμον.
translation:
  text: But I went up in response to a revelation, and I laid before them the gospel
    that I proclaim among the Gentiles—though privately before those of repute—lest
    somehow I should be running, or had run, in vain.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'because of a revelation.'
    reason: lexical_alternative
  - marker: b
    text: Or 'those who seemed influential.'
    reason: lexical_alternative
  - marker: c
    text: Or 'lest somehow I was running or had run in vain.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνέβην
  chosen: I went up
  alternatives:
  - I went up to Jerusalem
  - I went up there
  lexicon: BDAG
  rationale: ἀναβαίνω commonly means 'go up.' The destination is implicit from context,
    but not stated in this verse, so the English keeps the simple verbal sense without
    adding 'to Jerusalem'.
- source_word: κατὰ ἀποκάλυψιν
  chosen: in response to a revelation
  alternatives:
  - because of a revelation
  - according to a revelation
  lexicon: BDAG
  rationale: This phrase explains the basis or cause of Paul's going. 'In response
    to' is natural English that preserves the idea that a revelation prompted the
    journey.
- source_word: ἀνεθέμην
  chosen: I laid before them
  alternatives:
  - I presented to them
  - I submitted to them
  lexicon: BDAG
  rationale: ἀνατίθημι here carries the sense of setting something before others for
    consideration. 'Laid before them' is idiomatic and avoids the potentially misleading
    implication of formal subordination that 'submitted' may suggest.
- source_word: τὸ εὐαγγέλιον
  chosen: the gospel
  alternatives:
  - the good news
  lexicon: BDAG
  rationale: '''The gospel'' is the standard concise rendering of εὐαγγέλιον and fits
    Paul''s usage here. ''Good news'' is possible but less natural in this tightly
    Pauline context.'
- source_word: ἐν τοῖς ἔθνεσιν
  chosen: among the Gentiles
  alternatives:
  - among the nations
  lexicon: BDAG
  rationale: In Paul's letters, ἔθνη in this context normally refers to non-Jews rather
    than nations in a geopolitical sense. 'Gentiles' best conveys that meaning.
- source_word: κατ’ ἰδίαν
  chosen: privately
  alternatives:
  - in private
  - in a private meeting
  lexicon: BDAG
  rationale: The adverbial phrase indicates a private setting distinct from the broader
    presentation. 'Privately' is concise and clear.
- source_word: τοῖς δοκοῦσιν
  chosen: those of repute
  alternatives:
  - those who seemed influential
  - those who were recognized leaders
  lexicon: BDAG
  rationale: The participle δοκοῦσιν here refers to persons regarded as significant.
    'Those of repute' preserves that sense without overinterpreting whether Paul is
    affirming or subtly qualifying their status.
- source_word: μή πως εἰς κενὸν τρέχω ἢ ἔδραμον
  chosen: lest somehow I should be running, or had run, in vain
  alternatives:
  - for fear that I was running or had run in vain
  - lest somehow I run or ran in vain
  lexicon: BDAG
  rationale: The clause expresses Paul's concern to avoid fruitless labor. 'In vain'
    is the standard rendering of εἰς κενόν here, and keeping both present and aorist
    verbs preserves the contrast between present effort and past labor.
