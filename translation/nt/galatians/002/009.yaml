theological_decisions:
- issue: Whether to render κοινωνίας as 'fellowship' or 'partnership'
  chosen_reading: partnership
  alternative_readings:
  - fellowship
  rationale: The context is apostolic recognition and division of missionary labor,
    so the term points to shared mission and formal cooperation more than general
    relational warmth.
