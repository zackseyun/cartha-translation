id: GAL.2.9
reference: Galatians 2:9
source:
  edition: SBLGNT
  text: καὶ γνόντες τὴν χάριν τὴν δοθεῖσάν μοι, Ἰάκωβος καὶ Κηφᾶς καὶ Ἰωάννης, οἱ
    δοκοῦντες στῦλοι εἶναι, δεξιὰς ἔδωκαν ἐμοὶ καὶ Βαρναβᾷ κοινωνίας, ἵνα ⸀ἡμεῖς εἰς
    τὰ ἔθνη, αὐτοὶ δὲ εἰς τὴν περιτομήν·
translation:
  text: and recognizing the grace that had been given to me, James and Cephas and
    John, who were regarded as pillars, gave to Barnabas and me the right hand of
    partnership, so that we would go to the Gentiles and they to the circumcised.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the right hands of fellowship.'
    reason: lexical_alternative
  - marker: b
    text: Or 'nations.'
    reason: lexical_alternative
  - marker: c
    text: Literally 'to the circumcision,' that is, to the Jews.
    reason: lexical_alternative
lexical_decisions:
- source_word: γνόντες
  chosen: recognizing
  alternatives:
  - knowing
  - acknowledging
  lexicon: BDAG
  rationale: The aorist participle introduces the basis for the action that follows.
    'Recognizing' captures both perception and acknowledgment in natural English.
- source_word: χάριν
  chosen: grace
  alternatives:
  - favor
  - gracious commission
  lexicon: BDAG
  rationale: Paul regularly uses 'grace' for divine favor operative in his apostolic
    calling. The broader sense is best retained rather than narrowing it in the main
    text.
- source_word: δοθεῖσάν μοι
  chosen: had been given to me
  alternatives:
  - given to me
  lexicon: BDAG
  rationale: The participial phrase is naturally rendered with an English pluperfect-style
    passive for smoothness and to show prior action relative to the handshake described.
- source_word: Κηφᾶς
  chosen: Cephas
  alternatives:
  - Peter
  lexicon: BDAG
  rationale: The Greek text uses the personal name Κηφᾶς, so the translation follows
    the stated policy to transliterate names rather than substitute the more familiar
    equivalent.
- source_word: οἱ δοκοῦντες στῦλοι εἶναι
  chosen: who were regarded as pillars
  alternatives:
  - who seemed to be pillars
  - who were reputed to be pillars
  lexicon: BDAG
  rationale: This rendering preserves the sense of public standing without importing
    an unnecessarily dismissive tone into Paul's wording.
- source_word: δεξιὰς ... κοινωνίας
  chosen: the right hand of partnership
  alternatives:
  - the right hands of fellowship
  - right hands of partnership
  lexicon: BDAG
  rationale: The idiom denotes a formal gesture of agreement. Singular 'the right
    hand' is idiomatic in English, and 'partnership' better conveys shared mission
    than the more church-coded 'fellowship' in this context.
- source_word: ἔθνη
  chosen: Gentiles
  alternatives:
  - nations
  lexicon: BDAG
  rationale: In Galatians this term commonly refers to non-Jews rather than nations
    in a geopolitical sense, so 'Gentiles' best fits the context.
- source_word: περιτομήν
  chosen: the circumcised
  alternatives:
  - the circumcision
  lexicon: BDAG
  rationale: Here the noun functions as a metonym for the Jewish people. 'The circumcised'
    makes the referent clear in English while preserving the contrast with 'Gentiles'.
