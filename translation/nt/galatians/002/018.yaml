id: GAL.2.18
reference: Galatians 2:18
source:
  edition: SBLGNT
  text: εἰ γὰρ ἃ κατέλυσα ταῦτα πάλιν οἰκοδομῶ, παραβάτην ἐμαυτὸν ⸀συνιστάνω.
translation:
  text: For if I rebuild the things I tore down, I prove myself to be a transgressor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I show myself to be a transgressor.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the things I destroyed' or 'the things I dismantled.'
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰ γὰρ
  chosen: For if
  alternatives:
  - If indeed
  - For when
  lexicon: BDAG
  rationale: γάρ links this sentence to Paul’s prior argument, so 'For if' preserves
    both the conditional force of εἰ and the explanatory force of γάρ in natural English.
- source_word: ἃ ... ταῦτα
  chosen: the things ...
  alternatives:
  - what ... that
  - those things which
  lexicon: BDAG
  rationale: The correlative structure is best represented by 'the things ...' in
    contemporary English; it keeps the plural and the object’s concreteness without
    sounding wooden.
- source_word: κατέλυσα
  chosen: tore down
  alternatives:
  - destroyed
  - dismantled
  - abolished
  lexicon: BDAG
  rationale: Paired with 'rebuild,' 'tore down' preserves the construction metaphor
    clearly and naturally. 'Abolished' is possible contextually but is more interpretive
    than the immediate building imagery warrants.
- source_word: πάλιν οἰκοδομῶ
  chosen: rebuild
  alternatives:
  - build again
  - am building again
  lexicon: BDAG
  rationale: '''Rebuild'' compresses πάλιν plus οἰκοδομῶ into idiomatic English while
    preserving the present-tense conditional sense.'
- source_word: παραβάτην
  chosen: transgressor
  alternatives:
  - lawbreaker
  - violator
  lexicon: BDAG
  rationale: '''Transgressor'' best preserves the moral-legal nuance of παραβάτης
    in Paul’s argument. ''Lawbreaker'' is more colloquial but slightly narrows the
    term.'
- source_word: ἐμαυτὸν συνιστάνω
  chosen: I prove myself to be
  alternatives:
  - I show myself to be
  - I demonstrate myself to be
  - I present myself as
  lexicon: BDAG
  rationale: In this context συνιστάνω means to show or establish someone as something.
    'I prove myself to be' communicates the self-implicating force of the reflexive
    construction in clear English.
