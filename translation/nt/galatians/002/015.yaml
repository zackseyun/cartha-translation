id: GAL.2.15
reference: Galatians 2:15
source:
  edition: SBLGNT
  text: Ἡμεῖς φύσει Ἰουδαῖοι καὶ οὐκ ἐξ ἐθνῶν ἁμαρτωλοί,
translation:
  text: We are Jews by birth and not sinners from among the Gentiles,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or: "not Gentile sinners."'
    reason: lexical_alternative
  - marker: b
    text: '"By birth" renders a phrase literally meaning "by nature," here referring
      to natural ethnic origin.'
    reason: cultural_note
lexical_decisions:
- source_word: Ἡμεῖς
  chosen: We
  alternatives:
  - We ourselves
  lexicon: BDAG
  rationale: The explicit pronoun is retained as 'We' to preserve the clause's personal
    and slightly emphatic force without over-translating it.
- source_word: φύσει
  chosen: by birth
  alternatives:
  - by nature
  lexicon: BDAG
  rationale: In this context the sense is ethnic/natural origin rather than inward
    moral constitution. 'By birth' gives the intended force in clear modern English
    while reflecting the idiom.
- source_word: Ἰουδαῖοι
  chosen: Jews
  alternatives:
  - Jewish people
  lexicon: BDAG
  rationale: '''Jews'' is the natural nominal rendering of the plural adjective here
    and preserves the ethnic identity contrast in the verse.'
- source_word: ἐξ ἐθνῶν
  chosen: from among the Gentiles
  alternatives:
  - from the nations
  - Gentile
  lexicon: BDAG
  rationale: The phrase is rendered explicitly to preserve the prepositional construction
    and the ethnic contrast with 'Jews.' 'Gentiles' is the standard contextual sense
    of ἔθνη in Pauline usage.
- source_word: ἁμαρτωλοί
  chosen: sinners
  alternatives:
  - sinful people
  lexicon: BDAG
  rationale: The conventional Pauline term 'sinners' should be preserved. It reflects
    the quoted Jewish way of distinguishing Jews from Gentiles in this context.
