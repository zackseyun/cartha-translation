theological_decisions:
- issue: Whether the verse should sound like Paul is endorsing Jewish moral superiority
    over Gentiles
  chosen_reading: The translation preserves Paul's quoted ethnic contrast without
    softening it, while not expanding it into a doctrinal claim of inherent Jewish
    righteousness.
  alternative_readings:
  - Render more interpretively as 'not counted as sinners like the Gentiles'
  rationale: The Greek states the contrast tersely and directly. The broader context
    qualifies the statement, but that qualification should not be imported into this
    single verse.
