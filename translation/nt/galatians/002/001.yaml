id: GAL.2.1
reference: Galatians 2:1
source:
  edition: SBLGNT
  text: Ἔπειτα διὰ δεκατεσσάρων ἐτῶν πάλιν ἀνέβην εἰς Ἱεροσόλυμα μετὰ Βαρναβᾶ συμπαραλαβὼν
    καὶ Τίτον·
translation:
  text: Then after fourteen years I went up again to Jerusalem with Barnabas, also
    taking Titus along.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Ἔπειτα
  chosen: Then
  alternatives:
  - Afterward
  - Next
  lexicon: BDAG
  rationale: Marks continuation in Paul’s narrative with a natural English discourse
    connector; 'Then' is concise and readable while preserving sequence.
- source_word: διὰ δεκατεσσάρων ἐτῶν
  chosen: after fourteen years
  alternatives:
  - through fourteen years
  - after an interval of fourteen years
  lexicon: BDAG
  rationale: 'In this temporal construction, διά with the genitive is best rendered
    idiomatically as elapsed time before the next event: ''after fourteen years.'''
- source_word: πάλιν
  chosen: again
  alternatives:
  - once more
  - anew
  lexicon: BDAG
  rationale: Signals a repeated journey and is most naturally expressed here as 'again.'
- source_word: ἀνέβην
  chosen: I went up
  alternatives:
  - I went
  - I traveled up
  lexicon: BDAG
  rationale: Retains the conventional 'went up' wording for travel to Jerusalem, reflecting
    both geography and standard idiom in the source.
- source_word: εἰς Ἱεροσόλυμα
  chosen: to Jerusalem
  alternatives:
  - into Jerusalem
  lexicon: BDAG
  rationale: Standard destination sense of εἰς with the well-established English form
    'Jerusalem.'
- source_word: μετὰ Βαρναβᾶ
  chosen: with Barnabas
  alternatives:
  - accompanied by Barnabas
  lexicon: BDAG
  rationale: Simple accompaniment is in view; 'with Barnabas' is clear and direct.
- source_word: συμπαραλαβὼν
  chosen: taking along
  alternatives:
  - bringing along
  - having taken along
  lexicon: BDAG
  rationale: The participle indicates accompanying action relative to the main verb;
    'taking along' preserves that sense in smooth English.
- source_word: καὶ Τίτον
  chosen: also taking Titus along
  alternatives:
  - and Titus along
  - taking Titus too
  lexicon: BDAG
  rationale: Here καί has an additive force best reflected by 'also,' making clear
    that Titus accompanied Paul in addition to Barnabas.
