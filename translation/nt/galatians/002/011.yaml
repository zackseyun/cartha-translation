id: GAL.2.11
reference: Galatians 2:11
source:
  edition: SBLGNT
  text: Ὅτε δὲ ἦλθεν ⸀Κηφᾶς εἰς Ἀντιόχειαν, κατὰ πρόσωπον αὐτῷ ἀντέστην, ὅτι κατεγνωσμένος
    ἦν·
translation:
  text: But when Cephas came to Antioch, I opposed him to his face, because he stood
    condemned.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Cephas is the Aramaic name of Peter.
    reason: cross_reference
  - marker: b
    text: Or, 'because he was clearly in the wrong.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ὅτε δὲ
  chosen: But when
  alternatives:
  - Now when
  - When, however
  rationale: Keeps the temporal transition and mild contrast from δέ in natural modern
    English without over-translating it.
- source_word: Κηφᾶς
  chosen: Cephas
  alternatives:
  - Peter
  rationale: Personal names are transliterated by policy. Since the Greek text has
    Κηφᾶς, 'Cephas' preserves the source form more transparently than substituting
    the more familiar 'Peter'.
- source_word: ἦλθεν
  chosen: came
  alternatives:
  - arrived
  lexicon: BDAG
  rationale: '''Came'' is the plain English equivalent of ἔρχομαι here and fits readable
    modern style.'
- source_word: εἰς Ἀντιόχειαν
  chosen: to Antioch
  alternatives:
  - into Antioch
  rationale: Standard idiomatic English for motion toward a city; 'into Antioch' would
    be overly wooden.
- source_word: κατὰ πρόσωπον αὐτῷ
  chosen: to his face
  alternatives:
  - face to face
  - directly
  lexicon: BDAG
  rationale: This preserves the idiom's force of direct personal confrontation. 'Directly'
    is accurate but loses the vivid metaphor.
- source_word: ἀντέστην
  chosen: I opposed
  alternatives:
  - I resisted
  - I stood against
  lexicon: BDAG
  rationale: '''I opposed'' best conveys Paul''s open confrontation in context and
    reads naturally in English.'
- source_word: ὅτι
  chosen: because
  alternatives:
  - for
  rationale: Introduces the reason for Paul's opposition in straightforward modern
    English.
- source_word: κατεγνωσμένος ἦν
  chosen: he stood condemned
  alternatives:
  - he was condemned
  - he was clearly in the wrong
  lexicon: BDAG
  rationale: This preserves the passive and the resultant-state nuance of the periphrastic
    construction. It is more transparent to the Greek than the more interpretive 'he
    was clearly in the wrong,' while remaining understandable.
