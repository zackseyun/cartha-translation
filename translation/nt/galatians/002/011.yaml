theological_decisions:
- issue: Identity and rendering of Κηφᾶς
  chosen_reading: Retain 'Cephas' in the main text
  alternative_readings:
  - Render as 'Peter' for reader familiarity
  rationale: This is a translation decision about name form rather than doctrine.
    Because the Greek text reads Κηφᾶς and project policy says to transliterate names,
    'Cephas' is preferred; the familiar identification can be preserved in a footnote.
  doctrine_reference: Translate titles; transliterate names.
