id: GAL.2.4
reference: Galatians 2:4
source:
  edition: SBLGNT
  text: διὰ δὲ τοὺς παρεισάκτους ψευδαδέλφους, οἵτινες παρεισῆλθον κατασκοπῆσαι τὴν
    ἐλευθερίαν ἡμῶν ἣν ἔχομεν ἐν Χριστῷ Ἰησοῦ, ἵνα ἡμᾶς ⸀καταδουλώσουσιν—
translation:
  text: But because of the false brothers secretly brought in, who slipped in to spy
    out our freedom that we have in Messiah Jesus, so that they might enslave us—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Christ Jesus.'
    reason: alternative_reading
  - marker: b
    text: '''False brothers'' keeps Paul’s familial term; the phrase refers to people
      presenting themselves as fellow believers.'
    reason: cultural_note
lexical_decisions:
- source_word: παρεισάκτους
  chosen: secretly brought in
  alternatives:
  - smuggled in
  - secretly introduced
  lexicon: BDAG
  rationale: Conveys covert introduction from outside while keeping readable English.
    It distinguishes this adjective from the following verb παρεισῆλθον without flattening
    the clandestine sense.
- source_word: ψευδαδέλφους
  chosen: false brothers
  alternatives:
  - false believers
  - false brethren
  lexicon: BDAG
  rationale: A formally close rendering preserves Paul’s familial language and polemical
    force. 'Brothers' matches the masculine form and source imagery better than a
    neutral paraphrase.
- source_word: παρεισῆλθον
  chosen: slipped in
  alternatives:
  - crept in
  - came in secretly
  lexicon: BDAG
  rationale: Captures the covert nuance naturally in modern English and pairs well
    with the preceding description without sounding wooden.
- source_word: κατασκοπῆσαι
  chosen: to spy out
  alternatives:
  - to spy on
  - to observe secretly
  lexicon: BDAG
  rationale: '''Spy out'' preserves the hostile investigative sense more sharply than
    the flatter ''observe''.'
- source_word: ἐλευθερίαν
  chosen: freedom
  alternatives:
  - liberty
  lexicon: BDAG
  rationale: '''Freedom'' is the most natural contemporary equivalent and retains
    the theological and social force of Paul’s term.'
- source_word: ἐν Χριστῷ Ἰησοῦ
  chosen: in Messiah Jesus
  alternatives:
  - in Christ Jesus
  lexicon: BDAG
  rationale: Per project guidance, Χριστός is translated as 'Messiah' where its title
    sense is still meaningful. Here the phrase remains transparently titular rather
    than merely a fixed surname-like expression.
- source_word: καταδουλώσουσιν
  chosen: enslave
  alternatives:
  - bring into slavery
  - bring into bondage
  lexicon: BDAG
  rationale: This verb explicitly carries the idea of reducing someone to slavery;
    'enslave' preserves that bonded-force clearly and aligns with the project’s handling
    of slavery language where salient.
- source_word: ἵνα ... καταδουλώσουσιν
  chosen: so that they might enslave us
  alternatives:
  - in order to enslave us
  - so that they would enslave us
  lexicon: Greek grammar
  rationale: This expresses intended purpose in idiomatic English. Although the Greek
    uses a future indicative after ἵνα, the sense is well represented by 'might' here.
