theological_decisions:
- issue: Rendering Χριστῷ as title or name-like form
  chosen_reading: Messiah Jesus
  alternative_readings:
  - Christ Jesus
  rationale: The translation follows the project’s default of translating Χριστός
    as 'Messiah' where the titular force can still be heard. In this context Paul’s
    phrase still meaningfully identifies Jesus as the Messiah, not merely as a proper
    name.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; Contested
    terms table for Χριστός'
