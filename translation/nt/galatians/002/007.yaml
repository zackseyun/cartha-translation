id: GAL.2.7
reference: Galatians 2:7
source:
  edition: SBLGNT
  text: ἀλλὰ τοὐναντίον ἰδόντες ὅτι πεπίστευμαι τὸ εὐαγγέλιον τῆς ἀκροβυστίας καθὼς
    Πέτρος τῆς περιτομῆς,
translation:
  text: But on the contrary, when they saw that I had been entrusted with the gospel
    for the uncircumcised, just as Peter had been for the circumcised,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'the gospel of the uncircumcision … of the circumcision,' that
      is, the gospel entrusted for those groups.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀλλὰ
  chosen: But
  alternatives:
  - instead
  - rather
  lexicon: BDAG
  rationale: Marks a strong contrast with the previous statement; 'But' is the most
    natural English adversative here.
- source_word: τοὐναντίον
  chosen: on the contrary
  alternatives:
  - the opposite
  - instead
  lexicon: BDAG
  rationale: This idiom intensifies the contrast introduced by ἀλλὰ; 'on the contrary'
    preserves that force in natural English.
- source_word: ἰδόντες
  chosen: when they saw
  alternatives:
  - seeing
  - having seen
  lexicon: BDAG
  rationale: An aorist participle giving the circumstance for the main idea. 'When
    they saw' is clearer idiomatic English than a bare participial form.
- source_word: πεπίστευμαι
  chosen: I had been entrusted
  alternatives:
  - I have been entrusted
  lexicon: BDAG
  rationale: The perfect passive of πιστεύω here carries the sense of being entrusted
    with a commission. English past perfect fits the reported perception in context,
    though 'have been entrusted' is also possible.
- source_word: τὸ εὐαγγέλιον
  chosen: the gospel
  alternatives:
  - the good news
  lexicon: BDAG
  rationale: '''The gospel'' is the established and accurate rendering for εὐαγγέλιον
    in Pauline context, preserving its theological weight.'
- source_word: τῆς ἀκροβυστίας
  chosen: for the uncircumcised
  alternatives:
  - of the uncircumcision
  - to the Gentiles
  lexicon: BDAG
  rationale: The genitive is best understood by sense as referring to the sphere or
    audience of Paul's commission. 'For the uncircumcised' is more transparent than
    the literal but less natural 'of the uncircumcision.' 'To the Gentiles' is interpretive
    and slightly broader than the Greek wording.
- source_word: καθὼς
  chosen: just as
  alternatives:
  - as
  lexicon: BDAG
  rationale: Expresses comparison between Paul's and Peter's commissions; 'just as'
    makes the parallel explicit.
- source_word: Πέτρος
  chosen: Peter
  lexicon: BDAG
  rationale: Personal names are transliterated by standard convention per project
    philosophy.
- source_word: τῆς περιτομῆς
  chosen: for the circumcised
  alternatives:
  - of the circumcision
  - to the Jews
  lexicon: BDAG
  rationale: Balances the preceding phrase and preserves the Jewish marker in the
    Greek. 'For the circumcised' is clearer English than the more literal 'of the
    circumcision,' while 'to the Jews' would over-interpret.
- source_word: '[ellipsis after Πέτρος τῆς περιτομῆς]'
  chosen: had been
  alternatives:
  - —
  lexicon: Greek grammar
  rationale: English normally requires the entrusted-with-gospel idea to be supplied
    after 'just as Peter…'. This is an implied repetition from the first clause, not
    an added concept.
