theological_decisions:
- issue: Whether to render ἀκροβυστία / περιτομή ethnically ('Gentiles' / 'Jews')
    or by the covenantal markers actually used in the Greek.
  chosen_reading: Rendered as 'the uncircumcised' and 'the circumcised' in the main
    text.
  alternative_readings:
  - the Gentiles / the Jews
  - uncircumcision / circumcision
  rationale: The Greek uses covenantal-ethnic designations grounded in circumcision
    status. Preserving those terms retains Paul's own framing without collapsing it
    into a purely ethnic paraphrase.
