theological_decisions:
- issue: Meaning of πίστις with genitive in τῇ τοῦ υἱοῦ τοῦ θεοῦ
  chosen_reading: by faith in the Son of God
  alternative_readings:
  - by the faithfulness of the Son of God
  rationale: This is a genuine and well-known Pauline ambiguity. Following the doctrine
    excerpt, the main text uses the default rendering “faith,” expressed as an objective
    genitive in English, while preserving the subjective-genitive alternative in a
    footnote to retain the theological tension rather than resolve it absolutely.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy #3; Contested terms table
    for πίστις'
