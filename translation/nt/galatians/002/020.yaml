id: GAL.2.20
reference: Galatians 2:20
source:
  edition: SBLGNT
  text: ζῶ δὲ οὐκέτι ἐγώ, ζῇ δὲ ἐν ἐμοὶ Χριστός· ὃ δὲ νῦν ζῶ ἐν σαρκί, ἐν πίστει ζῶ
    τῇ τοῦ ⸂υἱοῦ τοῦ θεοῦ⸃ τοῦ ἀγαπήσαντός με καὶ παραδόντος ἑαυτὸν ὑπὲρ ἐμοῦ.
translation:
  text: It is no longer I who live, but the Messiah lives in me. And the life that
    I now live in the flesh, I live by faith in the Son of God, who loved me and gave
    himself for me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “I live by the faithfulness of the Son of God.”
    reason: alternative_reading
lexical_decisions:
- source_word: Χριστός
  chosen: the Messiah
  alternatives:
  - Christ
  rationale: Rendered as the translated title “Messiah” rather than the transliterated
    “Christ,” since Χριστός here functions as a christological title and the doctrine
    excerpt prefers translating titles where context supports it.
- source_word: ὃ ... νῦν ζῶ
  chosen: the life that I now live
  alternatives:
  - what I now live
  - what I now live as to my life
  rationale: The neuter relative construction is idiomatic and elliptical in Greek.
    English requires the implied sense to be made explicit; “the life that I now live”
    is the clearest natural rendering without adding interpretive content beyond the
    syntax.
- source_word: σάρξ
  chosen: flesh
  alternatives:
  - body
  - mortal body
  rationale: Rendered as “flesh” because the phrase ἐν σαρκί refers to present embodied
    earthly existence, not explicitly to ‘sinful nature’ in this context. This preserves
    the key Pauline term while remaining understandable in context.
- source_word: πίστει
  chosen: faith
  alternatives:
  - faithfulness
  - trust
  rationale: Per the doctrine excerpt, πίστις defaults to “faith.” Because this genitival
    construction is contested, the alternative is preserved in a footnote rather than
    omitted.
- source_word: τῇ τοῦ υἱοῦ τοῦ θεοῦ
  chosen: in the Son of God
  alternatives:
  - of the Son of God
  rationale: The genitive after πίστις is syntactically ambiguous. The main text adopts
    the objective sense, “faith in the Son of God,” because it is the most straightforward
    and widely intelligible reading in context, while the subjective-genitive alternative
    is preserved in a footnote as required.
- source_word: παραδόντος ἑαυτὸν ὑπὲρ ἐμοῦ
  chosen: gave himself for me
  alternatives:
  - handed himself over for me
  rationale: “Gave himself for me” is a natural optimal-equivalence rendering of παραδιδόναι
    ἑαυτόν in a sacrificial/self-giving context. “Handed himself over” is more formal
    but less idiomatic in contemporary English.
