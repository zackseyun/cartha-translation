theological_decisions:
- issue: Whether to make Paul's statement about the law more interpretive
  chosen_reading: Retain the compact wording 'through the law I died to the law' without
    expanding its meaning.
  alternative_readings:
  - through the law's condemnation I died to the law
  - through the law I became dead to legal observance
  rationale: The Greek is terse and theologically dense. Expanding it would import
    an interpretation beyond what the text explicitly states. The translation preserves
    the tension and lets interpretation remain in commentary rather than the main
    text.
  doctrine_reference: Preserve theological tension rather than resolve it.
