id: GAL.2.19
reference: Galatians 2:19
source:
  edition: SBLGNT
  text: ἐγὼ γὰρ διὰ νόμου νόμῳ ἀπέθανον ἵνα θεῷ ζήσω· Χριστῷ συνεσταύρωμαι·
translation:
  text: For through the law I died to the law, so that I might live to God. I have
    been crucified with the Messiah.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: γὰρ
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: BDAG
  rationale: Marks explanation grounding the previous statement; 'For' preserves the
    argumentative flow naturally in English.
- source_word: διὰ νόμου
  chosen: through the law
  alternatives:
  - by means of the law
  - through law
  lexicon: BDAG
  rationale: διά with the genitive is best rendered instrumentally here. The article
    is not explicit in Greek, but 'the law' is the natural Pauline sense for νόμος
    in this context.
- source_word: νόμῳ
  chosen: to the law
  alternatives:
  - for the law
  - with respect to the law
  lexicon: BDAG
  rationale: The dative is rendered in the idiomatic sense 'died to the law,' expressing
    a broken relation to the law's jurisdiction.
- source_word: ἀπέθανον
  chosen: I died
  alternatives:
  - I have died
  lexicon: BDAG
  rationale: The aorist is best represented by simple past in English; it states a
    decisive past event in Paul's argument.
- source_word: ἵνα
  chosen: so that
  alternatives:
  - in order that
  - that
  lexicon: BDAG
  rationale: Expresses purpose clearly and naturally in modern English.
- source_word: θεῷ ζήσω
  chosen: I might live to God
  alternatives:
  - I might live for God
  - I might live unto God
  lexicon: BDAG
  rationale: Keeps the dative-oriented Pauline expression without flattening it into
    mere usefulness; 'to God' preserves relational and directional force.
- source_word: Χριστῷ
  chosen: the Messiah
  alternatives:
  - Christ
  lexicon: BDAG
  rationale: Per project guidance, Χριστός is rendered 'Messiah' where the title sense
    is active rather than functioning as a bare name.
- source_word: συνεσταύρωμαι
  chosen: I have been crucified with
  alternatives:
  - I am crucified with
  - I was crucified with
  lexicon: BDAG
  rationale: The perfect tense conveys a past event with abiding result; 'have been
    crucified with' best preserves that force in readable English.
