theological_decisions:
- issue: Force of Paul's refusal toward the opponents
  chosen_reading: Paul states that he did not yield to them at all, preserving the
    integrity of the gospel message.
  alternative_readings:
  - Paul refused to submit himself personally
  - Paul refused to grant institutional concession
  rationale: The Greek speaks broadly of refusing yielding 'in submission' and does
    not require narrowing the statement to only personal or only institutional terms.
    The draft preserves the textual tension without importing a more specific doctrinal
    claim.
  doctrine_reference: Preserve theological tension rather than resolve it.
