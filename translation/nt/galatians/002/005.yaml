id: GAL.2.5
reference: Galatians 2:5
source:
  edition: SBLGNT
  text: οἷς οὐδὲ πρὸς ὥραν εἴξαμεν τῇ ὑποταγῇ, ἵνα ἡ ἀλήθεια τοῦ εὐαγγελίου διαμείνῃ
    πρὸς ὑμᾶς.
translation:
  text: To them we did not yield in submission even for a moment, so that the truth
    of the gospel might remain for you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'not even for an hour,' an idiom meaning 'not even for a moment.'
    reason: lexical_alternative
  - marker: b
    text: Or 'might remain with you.'
    reason: alternative_reading
lexical_decisions:
- source_word: οἷς
  chosen: To them
  alternatives:
  - to whom
  lexicon: BDAG
  rationale: The dative relative pronoun points back to the men just mentioned in
    the previous verse. 'To them' is natural English while preserving the referential
    force.
- source_word: οὐδὲ πρὸς ὥραν
  chosen: even for a moment
  alternatives:
  - not even for an hour
  - not even briefly
  lexicon: BDAG
  rationale: This is an idiomatic expression meaning not even for a short time. 'Even
    for a moment' communicates the force in clear modern English better than the more
    literal but potentially misleading 'for an hour.'
- source_word: εἴξαμεν
  chosen: did not yield
  alternatives:
  - did not give in
  - did not submit
  lexicon: BDAG
  rationale: The verb means to yield or give way. 'Did not yield' preserves the active
    refusal without collapsing it into the following noun ὑποταγή.
- source_word: τῇ ὑποταγῇ
  chosen: in submission
  alternatives:
  - by submission
  - to subjection
  lexicon: BDAG
  rationale: The dative expresses the manner or sphere of yielding. 'In submission'
    is concise and idiomatic, preserving the sense that Paul refused compliant subordination.
- source_word: ἵνα
  chosen: so that
  alternatives:
  - in order that
  lexicon: BDAG
  rationale: This introduces purpose. 'So that' is a natural English rendering that
    preserves the purposive force.
- source_word: ἡ ἀλήθεια τοῦ εὐαγγελίου
  chosen: the truth of the gospel
  alternatives:
  - the truth of the good news
  lexicon: BDAG
  rationale: This is a key Pauline phrase. 'Gospel' remains widely intelligible and
    preserves the established theological sense of εὐαγγέλιον without paraphrase.
- source_word: διαμείνῃ
  chosen: might remain
  alternatives:
  - might continue
  - might endure
  lexicon: BDAG
  rationale: The aorist subjunctive after ἵνα expresses intended continuance or preservation.
    'Might remain' reflects the verb's sense straightforwardly.
- source_word: πρὸς ὑμᾶς
  chosen: for you
  alternatives:
  - with you
  - among you
  lexicon: BDAG
  rationale: Here πρός with the accusative likely conveys direction toward the Galatians
    in the sense of benefit or reference. 'For you' reads naturally and fits Paul's
    concern that the gospel's truth be preserved on their behalf, though 'with you'
    is also possible.
