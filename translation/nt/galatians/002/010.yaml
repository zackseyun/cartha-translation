id: GAL.2.10
reference: Galatians 2:10
source:
  edition: SBLGNT
  text: μόνον τῶν πτωχῶν ἵνα μνημονεύωμεν, ὃ καὶ ἐσπούδασα αὐτὸ τοῦτο ποιῆσαι.
translation:
  text: only that we should remember the poor, which was exactly what I was eager
    to do.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: μόνον
  chosen: only
  alternatives:
  - except
  - just
  lexicon: BDAG
  rationale: Marks the sole stipulation attached to the agreement; 'only' is the most
    natural and precise English equivalent here.
- source_word: τῶν πτωχῶν
  chosen: the poor
  alternatives:
  - the needy
  lexicon: BDAG
  rationale: πτωχός ordinarily denotes poor persons; 'the poor' is the plain and established
    sense in this context of practical care.
- source_word: ἵνα μνημονεύωμεν
  chosen: that we should remember
  alternatives:
  - that we might remember
  - to keep in mind
  lexicon: BDAG
  rationale: After μόνον, ἵνα introduces the content of the one request. 'Remember'
    preserves the Greek wording while naturally implying active concern in context
    without over-paraphrasing.
- source_word: ὃ
  chosen: which
  alternatives:
  - that
  lexicon: BDAG
  rationale: The relative pronoun refers back to the preceding request as a whole;
    'which' gives a smooth English connection.
- source_word: ἐσπούδασα
  chosen: was eager
  alternatives:
  - was diligent
  - made every effort
  - was zealous
  lexicon: BDAG
  rationale: σπουδάζω here conveys earnest readiness and active intention. 'Was eager'
    captures both the volitional and practical sense in readable modern English.
- source_word: αὐτὸ τοῦτο ποιῆσαι
  chosen: exactly what I was eager to do
  alternatives:
  - this very thing to do
  lexicon: BDAG
  rationale: The doubled demonstrative intensifies the referent ('this very thing').
    English expresses that emphasis most naturally as 'exactly what,' while retaining
    the focus on doing the requested action.
