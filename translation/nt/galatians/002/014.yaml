theological_decisions:
- issue: How to render Ἰουδαΐζειν without importing later doctrinal polemics
  chosen_reading: to live like Jews
  alternative_readings:
  - to Judaize
  - to adopt Jewish customs
  rationale: The context concerns table fellowship and ethnic boundary markers, not
    a later technical theological system. The chosen rendering stays close to the
    immediate social-religious issue while avoiding anachronistic overtones.
  doctrine_reference: Preserve theological tension rather than resolve it; readable
    modern English, not archaic or academic.
