id: GAL.2.14
reference: Galatians 2:14
source:
  edition: SBLGNT
  text: ἀλλ’ ὅτε εἶδον ὅτι οὐκ ὀρθοποδοῦσιν πρὸς τὴν ἀλήθειαν τοῦ εὐαγγελίου, εἶπον
    τῷ ⸀Κηφᾷ ἔμπροσθεν πάντων· Εἰ σὺ Ἰουδαῖος ὑπάρχων ἐθνικῶς ⸂καὶ ⸀οὐκ Ἰουδαϊκῶς
    ζῇς⸃, ⸀πῶς τὰ ἔθνη ἀναγκάζεις Ἰουδαΐζειν;
translation:
  text: But when I saw that they were not walking in step with the truth of the gospel,
    I said to Cephas before them all, “If you, though a Jew, live like a Gentile and
    not like a Jew, how can you compel the Gentiles to live like Jews?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'were not walking straight' with the truth of the gospel.
    reason: lexical_alternative
  - marker: b
    text: 'Traditional rendering: ''How can you compel the Gentiles to Judaize?'''
    reason: lexical_alternative
lexical_decisions:
- source_word: ὀρθοποδοῦσιν
  chosen: were not walking in step
  alternatives:
  - were not walking straight
  - were not walking rightly
  - were not aligned
  lexicon: BDAG
  rationale: The verb literally evokes walking straight, but idiomatically refers
    to conduct in proper alignment. 'Walking in step' preserves the metaphor in readable
    English and fits the following phrase 'with the truth of the gospel.'
- source_word: πρὸς τὴν ἀλήθειαν τοῦ εὐαγγελίου
  chosen: with the truth of the gospel
  alternatives:
  - toward the truth of the gospel
  - in line with the truth of the gospel
  lexicon: BDAG
  rationale: With ὀρθοποδοῦσιν, πρός expresses conformity or alignment rather than
    simple direction. 'With the truth of the gospel' is concise and natural in English
    while preserving the sense of conduct measured against gospel truth.
- source_word: Κηφᾷ
  chosen: Cephas
  alternatives:
  - Peter
  lexicon: BDAG
  rationale: Per project philosophy, personal names are transliterated rather than
    replaced with interpretive equivalents. Paul here writes 'Cephas,' so the draft
    preserves that form.
- source_word: ἐθνικῶς
  chosen: like a Gentile
  alternatives:
  - in a Gentile manner
  - as a Gentile
  lexicon: BDAG
  rationale: The adverb describes manner of life. 'Like a Gentile' is natural modern
    English and preserves the ethnic-social contrast in context.
- source_word: Ἰουδαϊκῶς
  chosen: like a Jew
  alternatives:
  - in a Jewish manner
  - as a Jew
  lexicon: BDAG
  rationale: 'This adverb is paired antithetically with ἐθνικῶς, so the English is
    kept parallel: ''like a Gentile ... like a Jew.'''
- source_word: ἀναγκάζεις
  chosen: compel
  alternatives:
  - force
  - pressure
  lexicon: BDAG
  rationale: '''Compel'' best preserves the coercive force of the verb while matching
    common Pauline usage in English.'
- source_word: Ἰουδαΐζειν
  chosen: to live like Jews
  alternatives:
  - to Judaize
  - to adopt Jewish customs
  lexicon: BDAG
  rationale: The infinitive means to adopt distinctly Jewish ways of life. 'To live
    like Jews' communicates the sense clearly for modern readers; the traditional
    term 'Judaize' is preserved in a footnote.
