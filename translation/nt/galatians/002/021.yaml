id: GAL.2.21
reference: Galatians 2:21
source:
  edition: SBLGNT
  text: οὐκ ἀθετῶ τὴν χάριν τοῦ θεοῦ· εἰ γὰρ διὰ νόμου δικαιοσύνη, ἄρα Χριστὸς δωρεὰν
    ἀπέθανεν.
translation:
  text: I do not nullify the grace of God, for if righteousness comes through the
    law, then the Messiah died for nothing.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'justice' for 'righteousness.'
    reason: lexical_alternative
  - marker: b
    text: Or 'died in vain.'
    reason: lexical_alternative
  - marker: c
    text: Greek 'Christos'; translated here as 'the Messiah' because it functions
      as a title.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀθετῶ
  chosen: nullify
  alternatives:
  - set aside
  - reject
  lexicon: BDAG
  rationale: Conveys rendering something ineffective or invalid, fitting Paul's argument
    better than the weaker 'reject.'
- source_word: χάριν
  chosen: grace
  alternatives:
  - favor
  lexicon: BDAG
  rationale: '''Grace'' is the standard theological rendering and accurately preserves
    Paul''s meaning here.'
- source_word: διὰ νόμου
  chosen: comes through the law
  alternatives:
  - is through law
  - comes by law
  lexicon: BDAG
  rationale: Using 'comes through' makes the implied verbal sense natural in English
    while preserving the Greek construction with διά + genitive.
- source_word: δικαιοσύνη
  chosen: righteousness
  alternatives:
  - justice
  lexicon: BDAG
  rationale: The doctrine guidance sets 'righteousness' as the default in Pauline
    usage; 'justice' remains a viable contextual alternative and is preserved in a
    footnote.
- source_word: Χριστὸς
  chosen: the Messiah
  alternatives:
  - Christ
  lexicon: BDAG
  rationale: Here Χριστός functions as a title rather than a name-like label, so 'Messiah'
    best follows the stated translation philosophy.
- source_word: δωρεὰν
  chosen: for nothing
  alternatives:
  - in vain
  - without cause
  lexicon: BDAG
  rationale: In this context it expresses futility or pointlessness; 'for nothing'
    is clear modern English and preserves the force of Paul's conditional argument.
