theological_decisions:
- issue: Implication of δικαιοσύνη and law in Paul's argument
  chosen_reading: The verse states that if righteousness were obtainable through the
    law, the Messiah's death would be pointless.
  alternative_readings:
  - If δικαιοσύνη is heard more as 'justice,' the line would stress covenant rectification
    rather than individual right standing.
  rationale: The immediate polemical context in Galatians favors Paul's argument about
    right standing before God not being secured through the law. The translation preserves
    that without over-expanding the doctrinal implication.
  doctrine_reference: Preserve theological tension rather than resolve it; δικαιοσύνη
    default rendering guidance.
