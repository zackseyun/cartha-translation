theological_decisions:
- issue: Meaning of πίστις Χριστοῦ / πίστεως Ἰησοῦ Χριστοῦ
  chosen_reading: 'objective genitive: ''faith in Jesus Messiah'' / ''faith in Messiah'''
  alternative_readings:
  - 'subjective genitive: ''faithfulness of Jesus Messiah'' / ''faithfulness of Messiah'''
  rationale: The construction is genuinely disputed in Pauline scholarship. Per project
    doctrine, the main text follows the default rendering of πίστις as 'faith,' while
    the alternative is preserved in footnotes rather than being erased.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension; Contested terms
    table for πίστις'
- issue: Rendering of ἄνθρωπος
  chosen_reading: generic singular 'a man'
  alternative_readings:
  - a person
  - someone
  rationale: The Greek is grammatically masculine singular with representative force.
    Per project philosophy, this is rendered with gender-accurate English rather than
    neutralizing the form in the main text.
  doctrine_reference: 'DOCTRINE.md: Gender-accurate over gender-neutral'
