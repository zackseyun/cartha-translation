id: GAL.2.16
reference: Galatians 2:16
source:
  edition: SBLGNT
  text: εἰδότες ⸀δὲ ὅτι οὐ δικαιοῦται ἄνθρωπος ἐξ ἔργων νόμου ἐὰν μὴ διὰ πίστεως ⸂Ἰησοῦ
    Χριστοῦ⸃, καὶ ἡμεῖς εἰς Χριστὸν Ἰησοῦν ἐπιστεύσαμεν, ἵνα δικαιωθῶμεν ἐκ πίστεως
    Χριστοῦ καὶ οὐκ ἐξ ἔργων νόμου, ⸂ὅτι ἐξ ἔργων νόμου οὐ δικαιωθήσεται⸃ πᾶσα σάρξ.
translation:
  text: Yet knowing that a man is not justified by works of the law except through
    faith in Jesus Messiah, even we have believed in Messiah Jesus, so that we might
    be justified by faith in Messiah and not by works of the law, because by works
    of the law no flesh will be justified.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'through the faithfulness of Jesus Messiah.'
    reason: alternative_reading
  - marker: b
    text: Or, 'by the faithfulness of Messiah.'
    reason: alternative_reading
  - marker: c
    text: Lit. 'no flesh.'
    reason: lexical_alternative
lexical_decisions:
- source_word: δικαιοῦται / δικαιωθῶμεν / δικαιωθήσεται
  chosen: is justified / might be justified / will be justified
  alternatives:
  - is declared righteous
  - is counted righteous
  lexicon: BDAG
  rationale: Kept the judicial Pauline term with a consistent English gloss across
    the verse. 'Justified' preserves the theological and forensic force without importing
    a narrower paraphrase.
- source_word: ἄνθρωπος
  chosen: a man
  alternatives:
  - a person
  - someone
  lexicon: BDAG
  rationale: Rendered with gender-accurate singular language per project philosophy.
    Here the singular generic construction is preserved rather than flattened to an
    abstract plural.
- source_word: ἐξ ἔργων νόμου
  chosen: by works of the law
  alternatives:
  - from works of the law
  - by doing the law
  lexicon: BDAG
  rationale: Maintains the Pauline phrase in a transparent, recognizable form. 'Works
    of the law' is more precise than a broader paraphrase like 'good works' or 'law-keeping.'
- source_word: διὰ πίστεως Ἰησοῦ Χριστοῦ
  chosen: through faith in Jesus Messiah
  alternatives:
  - through the faithfulness of Jesus Messiah
  lexicon: BDAG
  rationale: Following the project's default, πίστις is rendered 'faith' in the main
    text. Because the genitive construction is genuinely contested, the alternative
    subjective-genitive reading is preserved in a footnote.
- source_word: εἰς Χριστὸν Ἰησοῦν ἐπιστεύσαμεν
  chosen: we have believed in Messiah Jesus
  alternatives:
  - we believed into Messiah Jesus
  lexicon: BDAG
  rationale: Used idiomatic English for πιστεύω with εἰς while preserving the completed
    act with present relevance through 'have believed.'
- source_word: ἐκ πίστεως Χριστοῦ
  chosen: by faith in Messiah
  alternatives:
  - by the faithfulness of Messiah
  lexicon: BDAG
  rationale: Kept the same main-text decision as the earlier πίστις Χριστοῦ construction
    for consistency, while preserving the contested alternative in a footnote.
- source_word: Χριστοῦ / Χριστόν
  chosen: Messiah
  alternatives:
  - Christ
  lexicon: BDAG
  rationale: Translated the title rather than transliterating it, in keeping with
    project policy for Χριστός where its titular force is still active.
- source_word: πᾶσα σάρξ
  chosen: no flesh
  alternatives:
  - no human being
  - nobody
  lexicon: BDAG
  rationale: Preserves the scriptural idiom and its echo of biblical language rather
    than replacing it with a flatter contemporary expression.
- source_word: εἰδότες δὲ
  chosen: Yet knowing
  alternatives:
  - But knowing
  - And knowing
  lexicon: BDAG
  rationale: '''Yet'' captures the mild adversative force of δέ in context and keeps
    the participial linkage to the previous argument.'
- source_word: ἐὰν μὴ
  chosen: except through
  alternatives:
  - unless by means of
  lexicon: BDAG
  rationale: 'This compresses the Greek idiom into natural English while preserving
    the exclusionary force: justification is not from works of law, but through faith.'
