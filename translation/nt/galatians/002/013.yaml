id: GAL.2.13
reference: Galatians 2:13
source:
  edition: SBLGNT
  text: καὶ συνυπεκρίθησαν αὐτῷ ⸀καὶ οἱ λοιποὶ Ἰουδαῖοι, ὥστε καὶ Βαρναβᾶς συναπήχθη
    αὐτῶν τῇ ὑποκρίσει.
translation:
  text: And the rest of the Jews also joined him in hypocrisy, so that even Barnabas
    was carried away by their hypocrisy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "the other Jews."
    reason: lexical_alternative
  - marker: b
    text: Or "was swept along by their hypocrisy."
    reason: lexical_alternative
lexical_decisions:
- source_word: συνυπεκρίθησαν
  chosen: joined him in hypocrisy
  alternatives:
  - acted hypocritically with him
  - joined in pretending with him
  lexicon: BDAG
  rationale: The compound verb conveys participating together in hypocritical behavior,
    not merely private insincerity. 'Joined him in hypocrisy' is natural English and
    preserves the corporate force of the σύν- prefix.
- source_word: αὐτῷ
  chosen: him
  alternatives:
  - with him
  lexicon: BDAG
  rationale: The dative marks association with Peter's conduct. English idiom expresses
    this association smoothly in 'joined him in hypocrisy,' which includes the relational
    sense.
- source_word: λοιποὶ
  chosen: the rest of
  alternatives:
  - the other
  lexicon: BDAG
  rationale: '''The rest of'' best conveys the remaining members of the group already
    under discussion, with clear contrast to Peter.'
- source_word: Ἰουδαῖοι
  chosen: Jews
  alternatives:
  - Judeans
  lexicon: BDAG
  rationale: In this Pauline context the word refers to Jewish people as an ethnic-religious
    group, not merely residents of Judea, so 'Jews' is the clearest rendering.
- source_word: συναπήχθη
  chosen: was carried away
  alternatives:
  - was swept along
  - was led away
  lexicon: BDAG
  rationale: The passive verb suggests being drawn along by others' influence. 'Was
    carried away' preserves both the passive force and the moral/social pressure in
    the scene.
- source_word: ὑποκρίσει
  chosen: hypocrisy
  alternatives:
  - pretense
  - insincerity
  lexicon: BDAG
  rationale: This noun names the dissembling behavior at issue. 'Hypocrisy' is the
    standard and most transparent rendering, and repeating it in English reflects
    Paul's emphasis.
