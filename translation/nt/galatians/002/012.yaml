id: GAL.2.12
reference: Galatians 2:12
source:
  edition: SBLGNT
  text: πρὸ τοῦ γὰρ ἐλθεῖν τινας ἀπὸ Ἰακώβου μετὰ τῶν ἐθνῶν συνήσθιεν· ὅτε δὲ ⸀ἦλθον,
    ὑπέστελλεν καὶ ἀφώριζεν ἑαυτόν, φοβούμενος τοὺς ἐκ περιτομῆς.
translation:
  text: For before certain men came from James, he used to eat with the Gentiles;
    but when they came, he began to draw back and separate himself, fearing those
    of the circumcision.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'some men' instead of 'certain men.'
    reason: lexical_alternative
  - marker: b
    text: Or 'from the company of James'; the Greek does not by itself specify whether
      James formally sent them.
    reason: alternative_reading
  - marker: c
    text: Or 'those of the circumcision party.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πρὸ τοῦ ἐλθεῖν
  chosen: before ... came
  alternatives:
  - before the coming of ...
  - before ... arrived
  lexicon: BDAG
  rationale: Uses natural English for the articular infinitive with πρό while preserving
    the temporal force.
- source_word: τινας
  chosen: certain men
  alternatives:
  - some men
  - certain ones
  lexicon: BDAG
  rationale: The masculine plural is contextually personal; 'certain men' is idiomatic
    and preserves the indefiniteness without sounding vague.
- source_word: ἀπὸ Ἰακώβου
  chosen: from James
  alternatives:
  - from the company of James
  - from James's side
  lexicon: BDAG
  rationale: This is the plainest rendering of ἀπό with a personal name. It preserves
    the ambiguity of association without implying James personally authorized their
    stance.
- source_word: μετὰ τῶν ἐθνῶν
  chosen: with the Gentiles
  alternatives:
  - with the nations
  - with the Gentile believers
  lexicon: BDAG
  rationale: In Pauline usage ἔθνη regularly refers to Gentiles. 'Believers' is not
    stated and would over-interpret.
- source_word: συνήσθιεν
  chosen: used to eat
  alternatives:
  - was eating
  - ate
  lexicon: BDAG
  rationale: The imperfect indicates customary past action; 'used to eat' captures
    the ongoing habitual sense better than a simple past.
- source_word: ὑπέστελλεν
  chosen: began to draw back
  alternatives:
  - was withdrawing
  - drew back
  lexicon: BDAG
  rationale: The verb conveys shrinking back or withdrawing. 'Began to draw back'
    communicates the imperfect as an incipient, repeated movement away in context.
- source_word: ἀφώριζεν ἑαυτόν
  chosen: separate himself
  alternatives:
  - keep himself separate
  - set himself apart
  lexicon: BDAG
  rationale: This preserves the reflexive force and the social separation in view
    without adding interpretive nuance.
- source_word: φοβούμενος
  chosen: fearing
  alternatives:
  - because he feared
  - out of fear of
  lexicon: BDAG
  rationale: The participle is kept compactly as 'fearing,' preserving the causal
    nuance without over-expansion.
- source_word: τοὺς ἐκ περιτομῆς
  chosen: those of the circumcision
  alternatives:
  - those of the circumcision party
  - the circumcision group
  lexicon: BDAG
  rationale: This closely follows the Greek and avoids supplying 'party,' which is
    interpretive though possible in context.
