theological_decisions:
- issue: Whether ἀπὸ Ἰακώβου should imply James's endorsement of these men
  chosen_reading: from James
  alternative_readings:
  - from the company of James
  - sent by James
  rationale: The Greek marks source/association but does not explicitly state authorization.
    The main text preserves that ambiguity rather than attributing responsibility
    to James beyond the wording of the verse.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Whether τοὺς ἐκ περιτομῆς should be rendered with the more interpretive 'circumcision
    party'
  chosen_reading: those of the circumcision
  alternative_readings:
  - those of the circumcision party
  rationale: The text identifies the group by circumcision without explicitly naming
    a faction. The more literal rendering avoids importing a stronger sociological
    label than the Greek requires.
  doctrine_reference: Original-language primacy over translation tradition.
