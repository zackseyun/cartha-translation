theological_decisions:
- issue: Whether Paul's wording should be translated in a way that implies Christ
    causes sin.
  chosen_reading: is Messiah then a servant of sin?
  alternative_readings:
  - is Christ a minister of sin?
  rationale: The Greek frames a rhetorical question about implication, not a doctrinal
    assertion that Christ produces sin. 'Servant of sin' preserves the accusation
    being rejected without importing extra theological explanation into the text.
  doctrine_reference: Preserve theological tension rather than resolve it.
