id: GAL.2.17
reference: Galatians 2:17
source:
  edition: SBLGNT
  text: εἰ δὲ ζητοῦντες δικαιωθῆναι ἐν Χριστῷ εὑρέθημεν καὶ αὐτοὶ ἁμαρτωλοί, ἆρα Χριστὸς
    ἁμαρτίας διάκονος; μὴ γένοιτο·
translation:
  text: But if, while seeking to be justified in Messiah, we ourselves also were found
    to be sinners, is Messiah then a servant of sin? May it never be!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Messiah: traditionally rendered “Christ” here and in the next occurrence.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ζητοῦντες
  chosen: while seeking
  alternatives:
  - seeking
  - as we seek
  lexicon: BDAG
  rationale: Rendered as a contemporaneous participle introducing the circumstance
    of the main clause, with smooth English sense preserved.
- source_word: δικαιωθῆναι
  chosen: to be justified
  alternatives:
  - to be declared righteous
  lexicon: BDAG
  rationale: Kept the established Pauline forensic term 'justified' because it is
    both accurate and natural in English; the alternative is interpretively helpful
    but less idiomatic in the main text.
- source_word: ἐν Χριστῷ
  chosen: in Messiah
  alternatives:
  - in Christ
  lexicon: BDAG
  rationale: DOCTRINE.md directs Χριστός to be rendered 'Messiah' where it functions
    as a title. Here the phrase denotes union/identity with the Messiah, so the title
    sense is retained.
- source_word: εὑρέθημεν
  chosen: were found
  alternatives:
  - were discovered
  - proved to be
  lexicon: BDAG
  rationale: Preserves the passive form and rhetorical force without overinterpreting
    how the finding occurred.
- source_word: καὶ αὐτοὶ ἁμαρτωλοί
  chosen: we ourselves also were found to be sinners
  alternatives:
  - we ourselves also proved to be sinners
  lexicon: BDAG
  rationale: '''Ourselves'' brings out αὐτοὶ for emphasis, and ''sinners'' preserves
    the predicate adjective plainly.'
- source_word: Χριστὸς
  chosen: Messiah
  alternatives:
  - Christ
  lexicon: BDAG
  rationale: Rendered consistently with the title sense in this verse per the project's
    contested-terms guidance.
- source_word: ἁμαρτίας διάκονος
  chosen: a servant of sin
  alternatives:
  - a minister of sin
  lexicon: BDAG
  rationale: '''Servant'' is the most natural rendering here and clearly expresses
    agency/association without suggesting formal office language.'
- source_word: μὴ γένοιτο
  chosen: May it never be!
  alternatives:
  - Absolutely not!
  - By no means!
  lexicon: BDAG
  rationale: This preserves the strength of Paul's repudiation while retaining the
    optative-like force more fully than a flatter modern negative.
