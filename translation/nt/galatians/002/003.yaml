theological_decisions:
- issue: Rendering Ἕλλην as an ethnic term versus interpretive religious shorthand
  chosen_reading: Greek
  alternative_readings:
  - Gentile
  rationale: The verse states Titus's ethnic-cultural identity directly. While 'Greek'
    implies uncircumcised Gentile status in context, the translation should preserve
    the source wording rather than generalize it.
  doctrine_reference: Original-language primacy over translation tradition
