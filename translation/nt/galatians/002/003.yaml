id: GAL.2.3
reference: Galatians 2:3
source:
  edition: SBLGNT
  text: ἀλλ’ οὐδὲ Τίτος ὁ σὺν ἐμοί, Ἕλλην ὤν, ἠναγκάσθη περιτμηθῆναι·
translation:
  text: But not even Titus, who was with me, though he was a Greek, was compelled
    to be circumcised.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'although he was Greek.'
    reason: lexical_alternative
  - marker: b
    text: Greek here implies that Titus was uncircumcised, but the text specifically
      says 'Greek,' not merely 'Gentile.'
    reason: cultural_note
lexical_decisions:
- source_word: ἀλλ’
  chosen: But
  alternatives:
  - Yet
  - Nevertheless
  lexicon: BDAG
  rationale: Marks contrast with the preceding context; 'But' is the most natural
    concise English adversative here.
- source_word: οὐδὲ
  chosen: not even
  alternatives:
  - nor even
  lexicon: BDAG
  rationale: Adds emphatic negation focused on Titus; 'not even' best preserves the
    force in idiomatic English.
- source_word: Τίτος
  chosen: Titus
  rationale: Personal names are transliterated by standard convention.
- source_word: ὁ σὺν ἐμοί
  chosen: who was with me
  alternatives:
  - the one with me
  - my companion
  lexicon: BDAG
  rationale: The article plus prepositional phrase identifies Titus descriptively.
    'Who was with me' is clear modern English without adding nuance not explicit in
    the Greek.
- source_word: Ἕλλην ὤν
  chosen: though he was a Greek
  alternatives:
  - being a Greek
  - although he was Greek
  lexicon: BDAG
  rationale: 'The participial phrase gives concessive background in context: despite
    being Greek, he was not compelled. ''Though he was a Greek'' brings out that force
    naturally.'
- source_word: Ἕλλην
  chosen: Greek
  alternatives:
  - Gentile
  lexicon: BDAG
  rationale: The lexical sense is specifically 'Greek,' not the broader interpretive
    category 'Gentile.' The more precise ethnic-cultural term should be retained in
    the main text.
- source_word: ἠναγκάσθη
  chosen: was compelled
  alternatives:
  - was forced
  lexicon: BDAG
  rationale: The passive verb indicates external pressure or coercion. 'Was compelled'
    is accurate and fits Pauline usage well.
- source_word: περιτμηθῆναι
  chosen: to be circumcised
  alternatives:
  - to undergo circumcision
  lexicon: BDAG
  rationale: This infinitive is best rendered directly and transparently in standard
    English.
