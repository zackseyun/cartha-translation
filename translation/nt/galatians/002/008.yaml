theological_decisions:
- issue: Whether to make the subject explicitly 'God' in English
  chosen_reading: For the one who worked through Peter...
  alternative_readings:
  - For God, who worked through Peter...
  - For he who worked through Peter...
  rationale: The Greek uses an articular participle, literally 'the one who worked.'
    Retaining that form stays closer to the source and avoids inserting an explicit
    noun not present in the text, while still allowing the implied divine subject
    from context.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
