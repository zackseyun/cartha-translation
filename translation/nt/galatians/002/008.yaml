id: GAL.2.8
reference: Galatians 2:8
source:
  edition: SBLGNT
  text: ὁ γὰρ ἐνεργήσας Πέτρῳ εἰς ἀποστολὴν τῆς περιτομῆς ἐνήργησεν καὶ ἐμοὶ εἰς τὰ
    ἔθνη,
translation:
  text: For the one who worked through Peter for apostleship to the circumcised also
    worked through me for the Gentiles,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'for apostleship of the circumcision.'
    reason: lexical_alternative
  - marker: b
    text: Or 'for the nations.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐνεργήσας
  chosen: worked
  alternatives:
  - was at work
  - empowered
  - worked effectively
  lexicon: BDAG
  rationale: Rendered with the simple verb 'worked' to match the cognate finite verb
    later in the verse and preserve the parallel structure without overinterpreting
    the manner of divine action.
- source_word: Πέτρῳ
  chosen: through Peter
  alternatives:
  - in Peter
  - for Peter
  lexicon: BDAG
  rationale: 'The dative is best taken instrumentally here in context: God worked
    through Peter in his apostolic ministry, rather than merely in him inwardly or
    for his benefit.'
- source_word: εἰς ἀποστολὴν
  chosen: for apostleship
  alternatives:
  - for an apostolic mission
  - for the apostleship
  lexicon: BDAG
  rationale: This preserves the formal sense of ἀποστολή while keeping natural English.
    The phrase expresses appointment/effective direction toward apostolic ministry.
- source_word: τῆς περιτομῆς
  chosen: to the circumcised
  alternatives:
  - of the circumcision
  - to the Jews
  lexicon: BDAG
  rationale: Although literally 'of the circumcision,' Paul uses 'circumcision' metonymically
    for the circumcised Jewish people. 'To the circumcised' communicates the sense
    clearly in modern English while preserving the Jewish/Gentile contrast.
- source_word: ἐνήργησεν
  chosen: worked
  alternatives:
  - was at work
  - worked effectively
  - empowered
  lexicon: BDAG
  rationale: Kept the same English gloss as ἐνεργήσας to preserve the deliberate verbal
    repetition and parallelism between Peter's and Paul's ministries.
- source_word: ἐμοὶ
  chosen: through me
  alternatives:
  - in me
  - for me
  lexicon: BDAG
  rationale: 'As with Πέτρῳ, the dative is best rendered instrumentally in context:
    God worked through Paul in his apostolic calling and ministry.'
- source_word: τὰ ἔθνη
  chosen: the Gentiles
  alternatives:
  - the nations
  lexicon: BDAG
  rationale: In Pauline context this term regularly contrasts with Jews/circumcision
    and refers specifically to non-Jewish peoples. 'Gentiles' is the most accurate
    contextual rendering; 'nations' is a valid but less explicit alternative.
