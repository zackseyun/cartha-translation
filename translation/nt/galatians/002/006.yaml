id: GAL.2.6
reference: Galatians 2:6
source:
  edition: SBLGNT
  text: ἀπὸ δὲ τῶν δοκούντων εἶναί τι— ὁποῖοί ποτε ἦσαν οὐδέν μοι διαφέρει· πρόσωπον
    ⸀θεὸς ἀνθρώπου οὐ λαμβάνει— ἐμοὶ γὰρ οἱ δοκοῦντες οὐδὲν προσανέθεντο,
translation:
  text: But from those who were reputed to be something—whatever they once were makes
    no difference to me; God shows no partiality—to me, in fact, those of reputation
    added nothing.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'those who seemed to be something.'
    reason: lexical_alternative
  - marker: b
    text: Literally, 'God does not receive the face of a man,' an idiom meaning 'God
      shows no partiality.'
    reason: cultural_note
  - marker: c
    text: Or 'imposed nothing further on me.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τῶν δοκούντων εἶναί τι / οἱ δοκοῦντες
  chosen: those who were reputed to be something / those of reputation
  alternatives:
  - those who seemed to be something
  - those who were considered important
  - the influential
  lexicon: BDAG
  rationale: δοκέω here refers to perceived standing or reputation rather than mere
    subjective appearance. 'Reputed' and 'those of reputation' preserve Paul's slightly
    distancing tone without overstating contempt.
- source_word: ὁποῖοί ποτε ἦσαν
  chosen: whatever they once were
  alternatives:
  - whatever they were
  - whatever sort they were
  lexicon: BDAG
  rationale: The phrase dismisses the relevance of their prior standing. 'Once' reflects
    ποτε naturally in context without requiring a strong temporal contrast beyond
    Paul's point that their status is irrelevant now.
- source_word: οὐδέν μοι διαφέρει
  chosen: makes no difference to me
  alternatives:
  - means nothing to me
  - matters nothing to me
  lexicon: BDAG
  rationale: This is a straightforward idiomatic rendering of the Greek expression,
    preserving Paul's claim that their status does not affect his evaluation.
- source_word: πρόσωπον θεὸς ἀνθρώπου οὐ λαμβάνει
  chosen: God shows no partiality
  alternatives:
  - God does not receive a man's face
  - God is not swayed by appearances
  lexicon: BDAG
  rationale: The underlying idiom means to show favoritism or partiality. The chosen
    rendering conveys the idiomatic sense in clear modern English while avoiding a
    misleadingly literal expression.
- source_word: πρόσωπον ... ἀνθρώπου
  chosen: partiality
  alternatives:
  - a man's face
  - human appearance
  lexicon: BDAG
  rationale: Although ἄνθρωπος is singular and literally 'man,' the idiom concerns
    impartiality toward humans generally. English idiom requires the abstract sense
    rather than a gender-marked literalism.
- source_word: ἐμοὶ γὰρ
  chosen: to me, in fact
  alternatives:
  - for to me
  - for in my case
  lexicon: BDAG
  rationale: This keeps the dative ἐμοί explicit while rendering γάρ in a natural
    way that connects the statement to Paul's personal experience.
- source_word: οὐδὲν προσανέθεντο
  chosen: added nothing
  alternatives:
  - contributed nothing
  - imposed nothing further
  - laid nothing additional upon me
  lexicon: BDAG
  rationale: προσανατίθημι here means to add or contribute nothing further to Paul's
    message or standing. 'Added nothing' is concise, transparent, and fits the immediate
    context.
