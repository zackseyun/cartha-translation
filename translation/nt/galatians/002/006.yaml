theological_decisions:
- issue: Whether Paul's statement should imply contempt for the Jerusalem leaders
    or simply independence from their status
  chosen_reading: The translation preserves a measured distancing tone without turning
    the line into an attack on the leaders.
  alternative_readings:
  - A sharper rendering such as 'those who seemed important' could sound more dismissive.
  - A softer rendering such as 'those who were recognized leaders' could mute Paul's
    rhetorical edge.
  rationale: Paul's point is that their status did not determine the truth of his
    gospel, not necessarily that their leadership was illegitimate. 'Reputed' preserves
    that tension.
