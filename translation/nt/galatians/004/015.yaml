id: GAL.4.15
reference: Galatians 4:15
source:
  edition: SBLGNT
  text: ⸀ποῦ ⸀οὖν ὁ μακαρισμὸς ὑμῶν; μαρτυρῶ γὰρ ὑμῖν ὅτι εἰ δυνατὸν τοὺς ὀφθαλμοὺς
    ὑμῶν ⸀ἐξορύξαντες ἐδώκατέ μοι.
translation:
  text: Where then is your sense of blessing? For I testify to you that, if possible,
    you would have torn out your eyes and given them to me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your blessedness' or 'your blessing.' The Greek μακαρισμός can refer
      to a state or declaration of being blessed.
    reason: lexical_alternative
  - marker: b
    text: Literally 'having gouged out your eyes.' The expression is likely hyperbolic
      for their former devotion, though some take it as hinting at Paul's bodily condition.
    reason: lexical_alternative
lexical_decisions:
- source_word: ποῦ οὖν
  chosen: Where then
  alternatives:
  - Where, then
  - What then became of
  lexicon: BDAG
  rationale: Taken as an idiomatic rhetorical question asking what has become of their
    former attitude. 'Then' reflects οὖν's inferential/resumptive force without overtranslating.
- source_word: μακαρισμὸς ὑμῶν
  chosen: your sense of blessing
  alternatives:
  - your blessing
  - your blessedness
  - your joy
  - your self-congratulation
  lexicon: BDAG
  rationale: μακαρισμός can denote a state/declaration of blessedness or congratulation.
    In context Paul refers to the Galatians' former attitude of considering themselves
    blessed in receiving him, not merely an abstract emotion. 'Sense of blessing'
    aims to preserve that nuance better than the more opaque 'blessedness.'
- source_word: μαρτυρῶ γὰρ ὑμῖν
  chosen: For I testify to you
  alternatives:
  - For I bear you witness
  - For I testify on your behalf
  lexicon: BDAG
  rationale: Standard forensic/solemn sense of μαρτυρέω. 'Testify to you' is natural
    modern English and keeps the solemn evidential tone.
- source_word: ὅτι
  chosen: that
  alternatives:
  - because
  lexicon: BDAG
  rationale: Introduces the content of Paul's testimony rather than a causal clause.
- source_word: εἰ δυνατὸν
  chosen: if possible
  alternatives:
  - if it had been possible
  - if it were possible
  lexicon: BDAG
  rationale: Compact idiomatic rendering of the conditional expression. The context
    is contrary-to-fact in effect, but the Greek itself is succinct; English can convey
    this naturally with 'if possible.'
- source_word: τοὺς ὀφθαλμοὺς ὑμῶν ἐξορύξαντες
  chosen: you would have torn out your eyes
  alternatives:
  - having gouged out your eyes
  - you would have plucked out your eyes
  lexicon: BDAG
  rationale: ἐξορύσσω is vivid and forceful ('dig/gouge out'). 'Torn out' is idiomatic
    and preserves the extremity of the image. 'Eyes' is retained literally, as the
    phrase likely alludes to their extraordinary devotion and possibly Paul's bodily
    condition.
- source_word: ἐδώκατέ μοι
  chosen: and given them to me
  alternatives:
  - and given them to me
  lexicon: BDAG
  rationale: Simple aorist main verb completed by the participle's action. English
    supplies 'them' for clarity from the antecedent 'eyes.'
