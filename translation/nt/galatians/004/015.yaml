theological_decisions:
- issue: Whether the eye-language should be taken literally or softened into a general
    expression of generosity
  chosen_reading: Retain the literal image 'torn out your eyes' in the main text.
  alternative_readings:
  - Render more generally as 'you would have given me anything'
  rationale: The Greek explicitly names 'eyes' and uses a vivid verb. While the phrase
    may be hyperbolic and may suggest Paul's physical ailment, the translation should
    preserve the concrete wording and let interpretation remain open.
  doctrine_reference: Preserve theological/interpretive tension rather than resolve
    it.
