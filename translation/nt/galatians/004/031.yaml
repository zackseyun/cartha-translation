id: GAL.4.31
reference: Galatians 4:31
source:
  edition: SBLGNT
  text: ⸀διό, ἀδελφοί, οὐκ ἐσμὲν παιδίσκης τέκνα ἀλλὰ τῆς ἐλευθέρας.
translation:
  text: Therefore, brothers, we are not children of the slave woman, but of the free
    woman.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'brothers and sisters'; the Greek says 'brothers' and can address a mixed
      group representatively.
    reason: lexical_alternative
  - marker: b
    text: Or 'children of the servant girl'; the Greek term denotes a female slave
      or servant, here contrasting Hagar with Sarah in Paul's allegory (Gal 4:21–31).
    reason: lexical_alternative
lexical_decisions:
- source_word: διό
  chosen: Therefore
  alternatives:
  - For this reason
  - So then
  lexicon: BDAG
  rationale: Marks an inferential conclusion from the preceding allegorical argument;
    'Therefore' is natural English and preserves the logical force.
- source_word: ἀδελφοί
  chosen: brothers
  alternatives:
  - brothers and sisters
  - siblings
  lexicon: BDAG
  rationale: Vocative plural from ἀδελφός. Per the project's gender-accurate policy,
    masculine familial language with representative force is retained as 'brothers'
    rather than neutralized; the mixed-gender audience nuance is better handled in
    a footnote.
- source_word: οὐκ ἐσμὲν
  chosen: we are not
  alternatives:
  - we are no longer
  - we are by no means
  lexicon: BDAG
  rationale: Straightforward present indicative negation; no temporal element such
    as 'no longer' is explicit in the Greek.
- source_word: παιδίσκης
  chosen: of the slave woman
  alternatives:
  - of the servant girl
  - of the slave girl
  lexicon: BDAG
  rationale: In this Sarah-Hagar contrast, the bonded status is central to Paul's
    argument, so 'slave woman' best conveys the social and theological contrast more
    clearly than the softer 'servant girl.'
- source_word: τέκνα
  chosen: children
  alternatives:
  - offspring
  - sons
  lexicon: BDAG
  rationale: τέκνα is gender-inclusive and denotes children/offspring rather than
    specifically sons; 'children' is the most natural and accurate rendering.
- source_word: ἀλλὰ
  chosen: but
  alternatives:
  - rather
  - instead
  lexicon: BDAG
  rationale: Simple adversative conjunction contrasting two identities; 'but' is sufficient
    and idiomatic.
- source_word: τῆς ἐλευθέρας
  chosen: of the free woman
  alternatives:
  - of the free one
  lexicon: BDAG
  rationale: The feminine article plus adjective functions substantivally and refers
    back to Sarah in the allegory; 'free woman' makes the feminine referent explicit
    in English.
