theological_decisions:
- issue: How explicitly to render Paul's allegorical contrast between Hagar and Sarah
  chosen_reading: Render παιδίσκης and τῆς ἐλευθέρας as 'the slave woman' and 'the
    free woman' in the main text
  alternative_readings:
  - the bondwoman ... the freewoman
  - the servant girl ... the free woman
  rationale: Paul's theological contrast hinges on slavery versus freedom under the
    covenantal allegory of 4:21–31. Using 'slave woman' preserves the sharpness of
    the contrast without importing additional doctrinal claims beyond the text.
- issue: How to render ἀδελφοί in a mixed audience
  chosen_reading: Keep 'brothers' in the main text with an inclusivity footnote
  alternative_readings:
  - brothers and sisters
  - siblings
  rationale: 'This follows the stated gender-accurate policy: preserve the masculine
    familial form where it carries representative force, while noting the broader
    referent for modern readers.'
  doctrine_reference: 'DOCTRINE.md: Gender-accurate over gender-neutral'
