id: GAL.4.25
reference: Galatians 4:25
source:
  edition: SBLGNT
  text: τὸ ⸀δὲ Ἁγὰρ Σινᾶ ὄρος ἐστὶν ἐν τῇ Ἀραβίᾳ, συστοιχεῖ δὲ τῇ νῦν Ἰερουσαλήμ,
    δουλεύει ⸀γὰρ μετὰ τῶν τέκνων αὐτῆς·
translation:
  text: Now Hagar is Mount Sinai in Arabia, and she corresponds to the present Jerusalem,
    for she is in slavery with her children.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Now this Hagar is Mount Sinai in Arabia.' The Greek includes an article
      before 'Hagar,' yielding a syntactically difficult clause that some translations
      reflect more explicitly.
    reason: lexical_alternative
lexical_decisions:
- source_word: τὸ δὲ Ἁγὰρ
  chosen: Now Hagar
  alternatives:
  - Now this Hagar
  - Now Hagar indeed
  lexicon: BDAG
  rationale: Takes δέ as a mild continuative/adversative particle introducing the
    next explanatory statement. The article τὸ before Ἁγὰρ is syntactically difficult;
    in idiomatic English it is not naturally represented, so the clause is rendered
    smoothly as 'Now Hagar.'
- source_word: Σινᾶ ὄρος
  chosen: Mount Sinai
  alternatives:
  - Sinai mountain
  lexicon: BDAG
  rationale: Standard English order for the place name plus common noun. This preserves
    the appositional identification in Paul's allegorical argument.
- source_word: ἐστὶν ἐν τῇ Ἀραβίᾳ
  chosen: is ... in Arabia
  alternatives:
  - is located in Arabia
  - is in the region of Arabia
  lexicon: BDAG
  rationale: Rendered straightforwardly and compactly. 'Arabia' reflects the geographic
    term without over-specifying Roman provincial boundaries.
- source_word: συστοιχεῖ
  chosen: corresponds to
  alternatives:
  - stands in the same row as
  - matches
  - is parallel to
  lexicon: BDAG
  rationale: The verb conveys belonging to the same category/column or corresponding
    in Paul's allegorical comparison. 'Corresponds to' is clear modern English that
    preserves the conceptual pairing.
- source_word: τῇ νῦν Ἰερουσαλήμ
  chosen: the present Jerusalem
  alternatives:
  - the Jerusalem now
  - the current Jerusalem
  lexicon: BDAG
  rationale: νῦν modifies Jerusalem temporally, distinguishing the earthly Jerusalem
    of Paul's present era from the 'Jerusalem above' in the next verse. 'Present Jerusalem'
    is natural and precise.
- source_word: δουλεύει
  chosen: is in slavery
  alternatives:
  - is enslaved
  - serves as a slave
  lexicon: BDAG
  rationale: Given the slavery/freedom contrast in this passage, the bonded condition
    is theologically salient. Following the project's guidance on doul- language,
    the rendering foregrounds slavery rather than generic service.
- source_word: μετὰ τῶν τέκνων αὐτῆς
  chosen: with her children
  alternatives:
  - together with her children
  lexicon: BDAG
  rationale: 'τέκνα is best rendered ''children'' here in the familial/allegorical
    sense. μετά with the genitive indicates association: she is in slavery along with
    her children.'
