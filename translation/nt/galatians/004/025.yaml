theological_decisions:
- issue: Paul's allegorical identification of Hagar with Sinai/Jerusalem
  chosen_reading: 'Render the statement directly without softening the identification:
    ''Hagar is Mount Sinai in Arabia, and she corresponds to the present Jerusalem.'''
  alternative_readings:
  - Render more interpretively as 'Hagar represents Mount Sinai'
  rationale: The Greek uses direct equational language and then the correspondence
    verb. The translation preserves Paul's rhetorical force without expanding the
    allegorical explanation beyond the text.
