id: GAL.4.18
reference: Galatians 4:18
source:
  edition: SBLGNT
  text: καλὸν ⸀δὲ ζηλοῦσθαι ἐν καλῷ πάντοτε, καὶ μὴ μόνον ἐν τῷ παρεῖναί με πρὸς ὑμᾶς,
translation:
  text: But it is good to be sought eagerly for a good purpose at all times, and not
    only when I am present with you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to be zealous' / 'to show zeal.' The Greek infinitive ζηλοῦσθαι can
      be understood differently, but the passive sense fits the immediate contrast
      with those who seek the Galatians in the previous verse.
    reason: alternative_reading
  - marker: b
    text: Literally 'in a good [thing/matter].' The phrase likely means with good
      motives or for a good purpose.
    reason: lexical_alternative
lexical_decisions:
- source_word: καλὸν
  chosen: it is good
  alternatives:
  - good
  lexicon: BDAG
  rationale: Predicate adjective used impersonally with the infinitive ζηλοῦσθαι;
    English commonly supplies 'it is' for natural sense.
- source_word: δὲ
  chosen: But
  alternatives:
  - Now
  - And
  lexicon: BDAG
  rationale: Marks contrast with the preceding rebuke of the false teachers' motives
    in v.17; 'But' best preserves the adversative turn.
- source_word: ζηλοῦσθαι
  chosen: to be sought eagerly
  alternatives:
  - to be courted
  - to be zealously pursued
  - to be the object of zeal
  lexicon: BDAG
  rationale: Present passive infinitive of ζηλόω. In this context the passive sense
    fits the contrast with others zealously seeking the Galatians in v.17. 'Sought
    eagerly' preserves the zeal component without sounding archaic; 'courted' is possible
    idiomatically but narrower and more interpretive.
- source_word: ἐν καλῷ
  chosen: for a good purpose
  alternatives:
  - in a good matter
  - in a good way
  - for what is good
  lexicon: BDAG
  rationale: The prepositional phrase is idiomatic and contextually contrasts good
    motives with bad motives. 'For a good purpose' brings out moral quality of the
    zeal rather than mere sphere.
- source_word: πάντοτε
  chosen: at all times
  alternatives:
  - always
  lexicon: BDAG
  rationale: Both are viable; 'at all times' pairs clearly with the following temporal
    limitation 'not only when I am present with you.'
- source_word: καὶ μὴ μόνον
  chosen: and not only
  alternatives:
  - and not merely
  lexicon: BDAG
  rationale: Straightforward rendering of the coordinating and limiting particles.
- source_word: ἐν τῷ παρεῖναί με πρὸς ὑμᾶς
  chosen: when I am present with you
  alternatives:
  - during my presence with you
  - while I am with you
  lexicon: BDAG
  rationale: Articular infinitive with ἐν expresses time. 'When I am present with
    you' is natural English and preserves Paul's contrast between his presence and
    absence.
