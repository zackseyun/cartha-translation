id: GAL.4.8
reference: Galatians 4:8
source:
  edition: SBLGNT
  text: Ἀλλὰ τότε μὲν οὐκ εἰδότες θεὸν ἐδουλεύσατε τοῖς ⸂φύσει μὴ⸃ οὖσι θεοῖς·
translation:
  text: But at that time, when you did not know God, you were enslaved to those who
    by nature are not gods.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'formerly, not knowing God, you served those that are not really gods
      by nature.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀλλὰ
  chosen: But
  alternatives:
  - However
  - Yet
  lexicon: BDAG
  rationale: Marks a contrast with the preceding argument; 'But' is natural and sufficiently
    strong in context.
- source_word: τότε μὲν
  chosen: at that time
  alternatives:
  - formerly
  - then
  lexicon: BDAG
  rationale: The combination points to a former period in the Galatians' past. 'At
    that time' preserves the temporal contrast without over-paraphrasing; the μέν
    sets up contrast with what follows in the next verse.
- source_word: οὐκ εἰδότες θεὸν
  chosen: when you did not know God
  alternatives:
  - not knowing God
  - though you did not know God
  lexicon: BDAG
  rationale: The participial construction is most naturally rendered temporally here,
    tied to their former state. 'Know' rather than 'recognize' best matches Pauline
    usage for relational knowledge of the true God.
- source_word: θεὸν
  chosen: God
  lexicon: BDAG
  rationale: Anarthrous singular refers to the true God in contrast with the plural
    'gods' later in the verse.
- source_word: ἐδουλεύσατε
  chosen: you were enslaved
  alternatives:
  - you served
  - you were slaves to
  lexicon: BDAG
  rationale: From δουλεύω, the sense of bondage is theologically salient in Galatians'
    slavery/freedom argument. In line with the doctrine guidance on doulos-family
    terms, 'were enslaved' better preserves the bonded sense than the weaker 'served'.
- source_word: τοῖς ... οὖσι θεοῖς
  chosen: to those ... are not gods
  alternatives:
  - to beings that are not gods
  - to the so-called gods that are not gods
  lexicon: BDAG
  rationale: The dative with δουλεύω is rendered with 'to.' 'Those ... are not gods'
    stays close to the Greek while remaining readable; it leaves implicit the referents
    rather than importing 'idols' or 'demons' into the main text.
- source_word: φύσει μὴ
  chosen: by nature are not
  alternatives:
  - are not by nature
  - are naturally not
  lexicon: BDAG
  rationale: φύσει modifies the negated participial phrase and indicates what these
    entities are in reality, not merely by reputation. 'By nature are not' is idiomatic
    and preserves Paul's ontological contrast.
- source_word: θεοῖς
  chosen: gods
  alternatives:
  - divine beings
  - deities
  lexicon: BDAG
  rationale: Lowercase 'gods' reflects the plural common noun and the contrast with
    the one true God. 'Divine beings' is possible but less direct than the Greek.
