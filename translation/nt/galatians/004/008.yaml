theological_decisions:
- issue: Nature of the former objects of worship
  chosen_reading: 'Main text renders Paul''s statement as an ontological denial: ''those
    who by nature are not gods.'''
  alternative_readings:
  - '''things that are not really gods'''
  - '''beings falsely called gods'''
  rationale: The phrase φύσει μὴ οὖσι θεοῖς speaks of what these objects/beings are
    in reality. The translation avoids specifying idols versus demonic powers in the
    main text, since Paul does not do so here, thereby preserving the text's theological
    tension and precision.
  doctrine_reference: Preserve theological tension rather than resolve it.
