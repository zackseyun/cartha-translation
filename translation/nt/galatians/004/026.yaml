id: GAL.4.26
reference: Galatians 4:26
source:
  edition: SBLGNT
  text: ἡ δὲ ἄνω Ἰερουσαλὴμ ἐλευθέρα ἐστίν, ἥτις ἐστὶν ⸀μήτηρ ἡμῶν·
translation:
  text: But the Jerusalem above is free, and she is our mother.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'which is our mother.' The Greek relative pronoun can be rendered more
      formally, but the verse personifies Jerusalem as a mother.
    reason: lexical_alternative
lexical_decisions:
- source_word: δὲ
  chosen: But
  alternatives:
  - Now
  - And
  lexicon: BDAG
  rationale: Marks contrast with the present Jerusalem in the preceding context; 'But'
    best captures the adversative force in natural English.
- source_word: ἄνω
  chosen: above
  alternatives:
  - heavenly
  - from above
  lexicon: BDAG
  rationale: Literally denotes spatial elevation, here contrasting the earthly/present
    Jerusalem with the transcendent Jerusalem. 'Above' preserves the metaphor without
    over-interpreting it as simply 'heavenly'.
- source_word: Ἰερουσαλήμ
  chosen: Jerusalem
  lexicon: BDAG
  rationale: Proper name transliterated by standard English convention, in keeping
    with the translation philosophy for names.
- source_word: ἐλευθέρα
  chosen: free
  alternatives:
  - a free woman
  lexicon: BDAG
  rationale: Predicate adjective describing the status of the Jerusalem above in the
    allegory. 'Free' is concise and preserves the connection to the slave/free contrast
    in the surrounding passage without adding 'woman,' which is not explicit here.
- source_word: ἥτις
  chosen: and she
  alternatives:
  - which
  - who indeed
  - which kind of
  lexicon: BDAG
  rationale: Although formally a qualitative relative pronoun ('which indeed / which
    is of such a kind as'), in English a personal rendering is most natural because
    Jerusalem is personified as female in the allegory. 'And she' smoothly conveys
    continuation and personification.
- source_word: μήτηρ
  chosen: mother
  lexicon: BDAG
  rationale: Straightforward gloss; preserves the maternal metaphor central to Paul's
    Sarah/Hagar-Jerusalem allegory.
- source_word: ἡμῶν
  chosen: our
  alternatives:
  - of us
  lexicon: BDAG
  rationale: Standard possessive rendering in idiomatic English.
