theological_decisions:
- issue: Referent and personification of 'the Jerusalem above'
  chosen_reading: 'Render as a personified feminine figure: ''and she is our mother.'''
  alternative_readings:
  - Render more formally as 'which is our mother'
  rationale: Paul's allegorical argument personifies Jerusalem as a maternal figure
    corresponding to Sarah and the free woman. Using 'she' makes the metaphor clear
    in English without adding theological content beyond the text.
