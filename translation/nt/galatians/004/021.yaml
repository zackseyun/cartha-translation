id: GAL.4.21
reference: Galatians 4:21
source:
  edition: SBLGNT
  text: Λέγετέ μοι, οἱ ὑπὸ νόμον θέλοντες εἶναι, τὸν νόμον οὐκ ἀκούετε;
translation:
  text: Tell me, you who want to be under the law, do you not listen to the law?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'do you not hear the Law?' The Greek verb can mean either 'hear' or 'listen
      to,' and 'the law' likely refers to the Mosaic Law, especially the scriptural
      account Paul cites next.
    reason: lexical_alternative
lexical_decisions:
- source_word: Λέγετέ μοι
  chosen: Tell me
  alternatives:
  - Say to me
  lexicon: BDAG
  rationale: λέγω in the present imperative plural here introduces a direct challenge
    or summons for response. 'Tell me' is idiomatic modern English and preserves the
    imperative force better than the wooden 'Say to me.'
- source_word: οἱ ὑπὸ νόμον θέλοντες εἶναι
  chosen: you who want to be under the law
  alternatives:
  - you who desire to be under law
  - you who want to be under the Law
  lexicon: BDAG
  rationale: The articular participle οἱ...θέλοντες addresses a group characterized
    by this desire, naturally rendered 'you who want.' ὑπὸ νόμον is kept as 'under
    the law' to preserve Paul's covenantal/legal idiom; the article is omitted in
    English because 'under the law' is idiomatic. Capitalizing 'Law' is possible if
    taken specifically as the Mosaic Law, but lower-case in English avoids overinterpreting
    while still allowing that referent from context.
- source_word: νόμον / τὸν νόμον
  chosen: the law
  alternatives:
  - law
  - the Law
  lexicon: BDAG
  rationale: νόμος in Galatians commonly refers to the Mosaic law and also to the
    scriptural Law/Pentateuch. The first occurrence in ὑπὸ νόμον is rendered idiomatically
    as 'under the law'; the second with the article, τὸν νόμον, is 'the law.' Using
    the same English term preserves Paul's wordplay between being under the law and
    hearing the law.
- source_word: οὐκ ἀκούετε
  chosen: do you not listen to
  alternatives:
  - do you not hear
  - are you not listening to
  lexicon: BDAG
  rationale: ἀκούω can mean 'hear' or 'listen to.' Here the sense is not mere auditory
    reception but heeding/attending to what the law says, especially in view of the
    argument from Scripture that follows. 'Listen to' communicates that nuance in
    clear modern English.
