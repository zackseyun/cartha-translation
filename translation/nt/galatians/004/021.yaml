theological_decisions:
- issue: Reference of 'the law'
  chosen_reading: Rendered as 'the law' without capitalization, while allowing the
    contextual sense to point to the Mosaic Law/Scripture.
  alternative_readings:
  - '''the Law'' to mark a specific reference to the Mosaic Torah'
  rationale: Paul's rhetorical question trades on νόμος as both the covenantal sphere
    one seeks to be under and the scriptural text one ought to hear. Lower-case preserves
    that tension without narrowing the term too quickly in translation.
