theological_decisions:
- issue: Christ's true humanity in γενόμενον ἐκ γυναικός
  chosen_reading: Render as 'born of a woman' to express real human birth.
  alternative_readings:
  - made of a woman
  - come from a woman
  rationale: The verse affirms the Son's genuine human birth without negating his
    preexistence implied by 'God sent out his Son.' 'Born' best preserves both the
    incarnation context and natural English.
  doctrine_reference: Nicene Creed; Definition of Chalcedon
- issue: Reference of νόμος in ὑπὸ νόμον
  chosen_reading: Understand as the Mosaic law and render 'under the law.'
  alternative_readings:
  - under law in a more general sense
  rationale: In Galatians, Paul's usage strongly points to the Mosaic law's covenantal
    jurisdiction. The translation keeps Paul's wording while allowing the epistolary
    context to specify the reference.
