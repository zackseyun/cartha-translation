id: GAL.4.4
reference: Galatians 4:4
source:
  edition: SBLGNT
  text: ὅτε δὲ ἦλθεν τὸ πλήρωμα τοῦ χρόνου, ἐξαπέστειλεν ὁ θεὸς τὸν υἱὸν αὐτοῦ, γενόμενον
    ἐκ γυναικός, γενόμενον ὑπὸ νόμον,
translation:
  text: But when the fullness of time had come, God sent out his Son, born of a woman,
    born under the law,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the full time' or 'the completion of the time.'
    reason: lexical_alternative
  - marker: b
    text: Or 'sent'; the Greek verb is an intensified form meaning 'sent out.'
    reason: lexical_alternative
  - marker: c
    text: Or 'from a woman.' The phrase stresses the Son's real human birth.
    reason: lexical_alternative
  - marker: d
    text: That is, under the jurisdiction of the Mosaic law.
    reason: cross_reference
lexical_decisions:
- source_word: ὅτε δὲ
  chosen: But when
  alternatives:
  - Now when
  - When
  lexicon: BDAG
  rationale: Renders the temporal conjunction ὅτε with δέ as a mild transition plus
    time marker. 'But when' preserves the discourse movement from the previous context
    without overstating contrast.
- source_word: ἦλθεν
  chosen: had come
  alternatives:
  - came
  - arrived
  lexicon: BDAG
  rationale: Aorist indicative of ἔρχομαι. 'Had come' fits idiomatic English after
    'when' and clearly marks the completion of the decisive moment before the main
    action 'God sent out.'
- source_word: τὸ πλήρωμα τοῦ χρόνου
  chosen: the fullness of time
  alternatives:
  - the full time
  - the completion of the time
  - the fullness of the time
  lexicon: BDAG
  rationale: A well-established and accurate rendering of the idiom, expressing the
    divinely appointed point at which time reached its intended completion. 'Time'
    is preferable to 'the time' in natural English while preserving the genitival
    sense.
- source_word: ἐξαπέστειλεν
  chosen: sent out
  alternatives:
  - sent
  - dispatched
  lexicon: BDAG
  rationale: The compound verb ἐξαποστέλλω is stronger than simple ἀποστέλλω. 'Sent
    out' preserves the verbal force without becoming wooden; it also fits the context
    of divine mission.
- source_word: ὁ θεὸς
  chosen: God
  lexicon: BDAG
  rationale: Straightforward nominative subject; no article is needed in natural English.
- source_word: τὸν υἱὸν αὐτοῦ
  chosen: his Son
  alternatives:
  - the Son of him
  lexicon: BDAG
  rationale: Natural English rendering of the accusative object with possessive pronoun.
    Capitalizing 'Son' reflects the christological referent in context while not adding
    content beyond the referent clearly intended by Paul.
- source_word: γενόμενον
  chosen: born
  alternatives:
  - having become
  - having come to be
  - having been born
  lexicon: BDAG
  rationale: Although γίνομαι literally means 'become/come to be,' in the construction
    γενόμενον ἐκ γυναικός it idiomatically refers to human birth. 'Born' is the clearest
    and most natural English equivalent here.
- source_word: ἐκ γυναικός
  chosen: of a woman
  alternatives:
  - from a woman
  - from woman
  lexicon: BDAG
  rationale: '''Of a woman'' is idiomatic English and preserves the genitival source/origin
    idea conveyed by ἐκ. It also echoes traditional phrasing without obscuring the
    meaning of genuine human birth.'
- source_word: γενόμενον ὑπὸ νόμον
  chosen: born under the law
  alternatives:
  - having come to be under the law
  - born subject to the law
  lexicon: BDAG
  rationale: Repeating 'born' reflects the parallel participial structure and keeps
    the phrase readable. ὑπὸ νόμον in Paul commonly denotes being under the Mosaic
    law's jurisdiction; 'under the law' is concise and standard.
- source_word: νόμον
  chosen: the law
  alternatives:
  - law
  - the Mosaic law
  lexicon: BDAG
  rationale: Although Greek lacks the article, Paul's idiom ὑπὸ νόμον commonly refers
    specifically to the law covenant, especially the Mosaic law. English idiom normally
    supplies 'the' here. 'The law' preserves Paul's compact expression without overexpanding
    the text.
