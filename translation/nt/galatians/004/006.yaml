theological_decisions:
- issue: Rendering of υἱοί in an adoption/inheritance context
  chosen_reading: sons
  alternative_readings:
  - children
  rationale: Paul's argument in Galatians 4 explicitly hinges on sonship and heirship,
    not merely generic filial status. Retaining 'sons' preserves the legal and theological
    force of adoption language while allowing application to all believers by context.
  doctrine_reference: Translation philosophy §4 (Gender-accurate over gender-neutral)
- issue: Textual variant in the possessive pronoun with 'hearts'
  chosen_reading: our hearts
  alternative_readings:
  - your hearts
  rationale: The provided SBLGNT text reads ἡμῶν ('our'). This is followed in the
    main text. Because many translations read 'your hearts' based on a well-known
    variant, the alternative is preserved in a footnote for transparency.
- issue: Who is 'crying'
  chosen_reading: the Spirit is the one crying
  alternative_readings:
  - believers cry by the Spirit
  rationale: Grammatically, the neuter singular participle κρᾶζον agrees with τὸ πνεῦμα,
    making the Spirit the explicit subject of the cry in this clause, though this
    also implies believers' filial address through the Spirit.
