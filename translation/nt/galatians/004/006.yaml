id: GAL.4.6
reference: Galatians 4:6
source:
  edition: SBLGNT
  text: ὅτι δέ ἐστε υἱοί, ἐξαπέστειλεν ὁ θεὸς τὸ πνεῦμα τοῦ υἱοῦ αὐτοῦ εἰς τὰς καρδίας
    ⸀ἡμῶν, κρᾶζον· Αββα ὁ πατήρ.
translation:
  text: And because you are sons, God sent the Spirit of his Son into our hearts,
    crying, “Abba, Father.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Some manuscripts read 'your hearts' instead of 'our hearts.'
    reason: textual_variant
  - marker: b
    text: '''Sons'' preserves Paul''s adoption-and-inheritance language here; the
      reference includes all believers, not males only.'
    reason: cultural_note
  - marker: c
    text: Abba is an Aramaic form of address for 'Father,' retained here for its original
      emphasis and intimacy.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅτι δέ
  chosen: And because
  alternatives:
  - Because
  - And since
  lexicon: BDAG
  rationale: ὅτι introduces the ground or explanation, while δέ adds mild connective
    force. 'And because' preserves both the explanatory and connective sense in readable
    English.
- source_word: ἐστε
  chosen: you are
  alternatives:
  - you have become
  lexicon: BDAG
  rationale: 'Present indicative of εἰμί is straightforwardly stative here: Paul grounds
    the following action in the readers'' present status.'
- source_word: υἱοί
  chosen: sons
  alternatives:
  - children
  lexicon: BDAG
  rationale: The Greek is explicitly masculine plural and, in context, tied to sonship/adoption
    imagery and inheritance language in Galatians 3–4. Per the project's gender-accurate
    philosophy, 'sons' is retained rather than neutralizing to 'children'.
- source_word: ἐξαπέστειλεν
  chosen: sent
  alternatives:
  - dispatched
  - sent forth
  lexicon: BDAG
  rationale: Aorist active indicates a completed divine action. 'Sent' is natural
    English and adequately conveys the force of ἐξαποστέλλω without unnecessary stiffness;
    'sent forth' is possible but less idiomatic.
- source_word: τὸ πνεῦμα τοῦ υἱοῦ αὐτοῦ
  chosen: the Spirit of his Son
  alternatives:
  - his Son's Spirit
  lexicon: BDAG
  rationale: This preserves the genitival relation and the theological weight of the
    phrase. 'Spirit of his Son' closely follows the Greek while remaining clear.
- source_word: εἰς τὰς καρδίας ἡμῶν
  chosen: into our hearts
  alternatives:
  - into our inner being
  lexicon: BDAG
  rationale: A direct, idiomatic rendering of the prepositional phrase. 'Hearts' preserves
    the biblical anthropological term rather than interpreting it away.
- source_word: κρᾶζον
  chosen: crying
  alternatives:
  - calling out
  - shouting
  lexicon: BDAG
  rationale: The present participle agrees with πνεῦμα and depicts the Spirit's ongoing
    cry. 'Crying' preserves both the vividness and the participial relation without
    overtranslating.
- source_word: Αββα
  chosen: Abba
  alternatives:
  - Father
  lexicon: BDAG
  rationale: As an Aramaic form embedded in Greek, it is best transliterated per project
    policy to transliterate names/forms where appropriate and preserve the original
    address.
- source_word: ὁ πατήρ
  chosen: Father
  alternatives:
  - the Father
  lexicon: BDAG
  rationale: In apposition to Αββα, this functions vocatively in sense. English idiom
    prefers 'Father' rather than the more wooden 'the Father' in direct address.
