id: GAL.4.12
reference: Galatians 4:12
source:
  edition: SBLGNT
  text: Γίνεσθε ὡς ἐγώ, ὅτι κἀγὼ ὡς ὑμεῖς, ἀδελφοί, δέομαι ὑμῶν. οὐδέν με ἠδικήσατε·
translation:
  text: Become as I am, because I also became as you are, brothers. I beg you, you
    did me no wrong.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'like me.'
    reason: lexical_alternative
  - marker: b
    text: '''Brothers'' here addresses the believing community and likely includes
      both men and women.'
    reason: cultural_note
  - marker: c
    text: Or 'I too am as you are'; the Greek is elliptical, and 'became' is supplied
      to make the sense clear in context.
    reason: alternative_reading
lexical_decisions:
- source_word: Γίνεσθε
  chosen: Become
  alternatives:
  - Be
  lexicon: BDAG
  rationale: Present middle/passive imperative, second plural of γίνομαι. 'Become'
    better reflects a call to adopt a state or stance, rather than simple stative
    'be.' The present imperative carries ongoing force.
- source_word: ὡς ἐγώ
  chosen: as I am
  alternatives:
  - like me
  lexicon: BDAG
  rationale: ὡς with ἐγώ expresses comparison. 'As I am' is slightly more formal and
    preserves the implied state of Paul's present condition; 'like me' is possible
    but less explicit.
- source_word: ὅτι
  chosen: because
  alternatives:
  - for
  - that
  lexicon: BDAG
  rationale: 'Here ὅτι most naturally gives the reason for the appeal: ''because I
    also...'' rather than introducing content.'
- source_word: κἀγὼ ὡς ὑμεῖς
  chosen: I also became as you are
  alternatives:
  - I also am as you are
  - I too became like you
  lexicon: BDAG
  rationale: Although no finite verb is repeated in Greek, the clause is commonly
    understood elliptically from Γίνεσθε. In context Paul refers to his having identified
    with the Galatians/Gentiles, so supplying 'became' best conveys the sense in natural
    English. 'As you are' preserves the comparison more literally than 'like you.'
- source_word: ἀδελφοί
  chosen: brothers
  alternatives:
  - brothers and sisters
  - siblings
  lexicon: BDAG
  rationale: 'Vocative plural of ἀδελφός. Per translation policy, gender-accurate
    over gender-neutral: render the masculine form as ''brothers'' while noting inclusive
    force in a footnote where relevant.'
- source_word: δέομαι ὑμῶν
  chosen: I beg you
  alternatives:
  - I entreat you
  - I ask you
  lexicon: BDAG
  rationale: δέομαι with genitive expresses earnest request. 'I beg you' best communicates
    the emotional force without sounding archaic.
- source_word: οὐδέν
  chosen: 'no'
  alternatives:
  - nothing in
  lexicon: BDAG
  rationale: 'Accusative neuter used adverbially/objectively with ἠδικήσατε: ''in
    no respect'' / ''not at all.'' In idiomatic English with the verb this is best
    rendered ''did no wrong''.'
- source_word: με ἠδικήσατε
  chosen: you did me no wrong
  alternatives:
  - you have done me no wrong
  - you did not wrong me
  lexicon: BDAG
  rationale: Aorist active indicative, second plural of ἀδικέω. 'You did me no wrong'
    is natural English and preserves the direct object με. Simple past fits the Greek
    aorist in context.
