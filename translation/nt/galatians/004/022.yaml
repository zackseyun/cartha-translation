id: GAL.4.22
reference: Galatians 4:22
source:
  edition: SBLGNT
  text: γέγραπται γὰρ ὅτι Ἀβραὰμ δύο υἱοὺς ἔσχεν, ἕνα ἐκ τῆς παιδίσκης καὶ ἕνα ἐκ
    τῆς ἐλευθέρας·
translation:
  text: For it is written that Abraham had two sons, one by the slave woman and one
    by the free woman.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'one from the servant girl.' The Greek παιδίσκη can denote a female servant,
      but here 'slave woman' makes the slavery/freedom contrast in Paul's argument
      explicit.
    reason: lexical_alternative
lexical_decisions:
- source_word: γέγραπται
  chosen: it is written
  alternatives:
  - it has been written
  lexicon: BDAG
  rationale: Standard rendering of the perfect passive formula introducing Scripture
    citation/allusion; 'it is written' is idiomatic in English and preserves the scriptural
    authority nuance.
- source_word: γὰρ
  chosen: for
  alternatives:
  - because
  lexicon: BDAG
  rationale: Retains the connective force linking this statement to Paul's prior argument;
    'for' is concise and natural here.
- source_word: ὅτι
  chosen: that
  alternatives:
  - namely that
  lexicon: BDAG
  rationale: Introduces the content of what is written in a straightforward way.
- source_word: Ἀβραὰμ
  chosen: Abraham
  lexicon: BDAG
  rationale: Standard English transliteration of the personal name.
- source_word: δύο υἱοὺς
  chosen: two sons
  alternatives:
  - two children
  lexicon: BDAG
  rationale: υἱούς specifically denotes sons, not merely children; gender-accurate
    rendering follows the stated philosophy.
- source_word: ἔσχεν
  chosen: had
  alternatives:
  - fathered
  lexicon: BDAG
  rationale: Idiomatic and sufficiently precise in context for possession/parentage;
    'fathered' is possible but more interpretive and less natural in this sentence.
- source_word: ἕνα ... καὶ ἕνα
  chosen: one ... and one
  alternatives:
  - one ... and the other
  lexicon: BDAG
  rationale: Preserves the balanced parallel structure of the Greek.
- source_word: ἐκ
  chosen: by
  alternatives:
  - from
  - through
  lexicon: BDAG
  rationale: In this genealogical context, English idiom prefers 'by' to express maternity
    ('one by the slave woman'). 'From' would be overly literal and less natural.
- source_word: παιδίσκης
  chosen: slave woman
  alternatives:
  - servant girl
  - maidservant
  lexicon: BDAG
  rationale: The term refers to a female slave/servant. Given the translation philosophy
    favoring 'slave' where bonded status is salient, and because Paul's allegory depends
    on slavery versus freedom, 'slave woman' best preserves the contrast.
- source_word: ἐλευθέρας
  chosen: free woman
  alternatives:
  - freewife
  - the free woman
  lexicon: BDAG
  rationale: Substantival adjective meaning a free woman. Rendering it in parallel
    with 'slave woman' preserves Paul's contrast clearly and naturally.
