theological_decisions:
- issue: Social-status contrast central to Paul's allegory
  chosen_reading: Render παιδίσκη/ἐλευθέρα as 'slave woman'/'free woman'
  alternative_readings:
  - servant girl/free woman
  - maidservant/free woman
  rationale: Paul's argument in the surrounding context turns on the theological significance
    of slavery and freedom. Using 'slave woman' keeps that contrast explicit without
    adding claims beyond the text.
