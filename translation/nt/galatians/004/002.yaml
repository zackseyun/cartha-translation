id: GAL.4.2
reference: Galatians 4:2
source:
  edition: SBLGNT
  text: ἀλλὰ ὑπὸ ἐπιτρόπους ἐστὶ καὶ οἰκονόμους ἄχρι τῆς προθεσμίας τοῦ πατρός.
translation:
  text: but he is under guardians and stewards until the time set by his father.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'managers' for 'stewards'; the Greek term refers to those managing a
      household or estate.
    reason: lexical_alternative
  - marker: b
    text: Or 'until the appointed time set by the father.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀλλὰ
  chosen: but
  alternatives:
  - rather
  - instead
  lexicon: BDAG
  rationale: Adversative conjunction contrasting the heir's legal status as a child
    with his practical lack of freedom in the preceding verse. 'But' is the most natural
    concise English rendering.
- source_word: ὑπὸ
  chosen: under
  alternatives:
  - subject to
  lexicon: BDAG
  rationale: With the accusative nouns following, the sense is subjection to authority
    or supervision. 'Under' preserves the metaphor of being under authority and reads
    naturally in English.
- source_word: ἐπιτρόπους
  chosen: guardians
  alternatives:
  - guardianship supervisors
  - trustees
  lexicon: BDAG
  rationale: Refers to persons entrusted with the care of a minor. 'Guardians' best
    captures personal oversight of the heir, as distinct from management of property.
- source_word: ἐστὶ
  chosen: he is
  alternatives:
  - is
  lexicon: BDAG
  rationale: Supplying the English pronoun is necessary for idiomatic translation
    and reflects the understood subject from the previous verse, the heir.
- source_word: καὶ
  chosen: and
  alternatives:
  - both ... and
  lexicon: BDAG
  rationale: Simple coordinating conjunction joining two classes of supervisors. A
    more emphatic 'both ... and' is possible but unnecessary in the main text.
- source_word: οἰκονόμους
  chosen: stewards
  alternatives:
  - managers
  - household managers
  lexicon: BDAG
  rationale: In this context the term denotes those who manage household or estate
    affairs. 'Stewards' preserves the historical household-management nuance better
    than the more generic 'managers.'
- source_word: ἄχρι
  chosen: until
  alternatives:
  - up to the time of
  lexicon: BDAG
  rationale: Temporal preposition marking the limit of the arrangement. 'Until' is
    direct and idiomatic.
- source_word: τῆς προθεσμίας
  chosen: the time set
  alternatives:
  - the appointed time
  - the date fixed
  lexicon: BDAG
  rationale: The noun denotes a fixed or predetermined time. 'The time set' is clear
    modern English and preserves the notion of prior determination without sounding
    overly formal.
- source_word: τοῦ πατρός
  chosen: by his father
  alternatives:
  - by the father
  - of the father
  lexicon: BDAG
  rationale: The genitive is most naturally understood as the father being the one
    who determines the time. 'His father' makes explicit the relation to the heir
    in context and yields idiomatic English.
