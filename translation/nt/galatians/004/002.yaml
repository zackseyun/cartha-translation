theological_decisions:
- issue: Understanding the genitive in τοῦ πατρός
  chosen_reading: 'Rendered as agency/possession within the household analogy: ''by
    his father.'''
  alternative_readings:
  - more literal but less idiomatic 'of the father'
  - generic 'by the father'
  rationale: The verse is part of Paul's analogy of a minor heir under supervision.
    The genitive most likely indicates the father as the one who fixes the date when
    the heir comes of age. This is a contextual, not doctrinal, decision and does
    not import additional theological claims.
