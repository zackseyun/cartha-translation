theological_decisions:
- issue: Rendering παιδίσκη in Paul's Sarah/Hagar allegory
  chosen_reading: slave woman
  alternative_readings:
  - bondwoman
  - maidservant
  rationale: Paul's theological contrast in the surrounding context turns on slavery
    versus freedom. Rendering παιδίσκη as 'slave woman' preserves that contrast explicitly
    and aligns with the project's policy to use 'slave' where bonded status is salient.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1; Contested terms table
    for δοῦλος/related slavery language'
- issue: Force of the exclusion in οὐ γὰρ μὴ κληρονομήσει
  chosen_reading: will certainly not inherit
  alternative_readings:
  - shall by no means inherit
  - will never inherit
  rationale: The text presents a categorical exclusion within the scriptural citation.
    The rendering preserves the strength of the Greek negation without adding interpretive
    theological content beyond the verse itself.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3'
