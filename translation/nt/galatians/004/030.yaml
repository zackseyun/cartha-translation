id: GAL.4.30
reference: Galatians 4:30
source:
  edition: SBLGNT
  text: ἀλλὰ τί λέγει ἡ γραφή; Ἔκβαλε τὴν παιδίσκην καὶ τὸν υἱὸν αὐτῆς, οὐ γὰρ μὴ
    ⸀κληρονομήσει ὁ υἱὸς τῆς παιδίσκης μετὰ τοῦ υἱοῦ τῆς ἐλευθέρας.
translation:
  text: But what does the Scripture say? “Cast out the slave woman and her son, for
    the son of the slave woman will certainly not inherit with the son of the free
    woman.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “bondwoman.” The Greek term denotes a female slave/servant; “slave woman”
      is used here because the slavery/freedom contrast is central to the passage.
    reason: lexical_alternative
  - marker: b
    text: The quotation echoes Genesis 21:10.
    reason: cross_reference
  - marker: c
    text: 'Greek has an emphatic negation: “will certainly not inherit,” alternatively
      “will by no means inherit.”'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀλλὰ
  chosen: But
  alternatives:
  - But rather
  - Nevertheless
  lexicon: BDAG
  rationale: Marks a contrastive transition from the preceding argument; simple 'But'
    is natural and sufficient in English.
- source_word: τί λέγει ἡ γραφή
  chosen: what does the Scripture say
  alternatives:
  - what does Scripture say
  lexicon: BDAG
  rationale: Retains the present tense and the personified citation formula. The article
    with γραφή supports 'the Scripture' as a recognized authoritative source.
- source_word: Ἔκβαλε
  chosen: Cast out
  alternatives:
  - Drive out
  - Send away
  lexicon: BDAG
  rationale: Imperative quotation from Scripture with forceful expulsion sense. 'Cast
    out' preserves the sharpness of ἐκβάλλω better than the softer 'send away'.
- source_word: παιδίσκην
  chosen: slave woman
  alternatives:
  - bondwoman
  - maidservant
  - servant girl
  lexicon: BDAG
  rationale: In this Hagar/Sarah context the bonded status is central to Paul's allegorical
    argument, so per translation philosophy the more explicit 'slave woman' is preferred
    over softer traditional renderings.
- source_word: υἱὸν αὐτῆς
  chosen: her son
  lexicon: BDAG
  rationale: Straightforward possessive construction; no reason to expand beyond the
    Greek.
- source_word: οὐ γὰρ μὴ κληρονομήσει
  chosen: for ... will certainly not inherit
  alternatives:
  - for ... shall by no means inherit
  - for ... will never inherit
  lexicon: BDAG
  rationale: The emphatic negation οὐ μὴ with the future indicates strong denial.
    'Will certainly not inherit' conveys the force in contemporary English without
    archaism.
- source_word: κληρονομήσει
  chosen: inherit
  alternatives:
  - receive as an heir
  lexicon: BDAG
  rationale: '''Inherit'' is the standard and sufficiently clear rendering in this
    legal/familial context.'
- source_word: μετὰ τοῦ υἱοῦ
  chosen: with the son
  alternatives:
  - along with the son
  - together with the son
  lexicon: BDAG
  rationale: μετά with the genitive here expresses association/participation in inheritance;
    'with' is concise and clear.
- source_word: τῆς ἐλευθέρας
  chosen: the free woman
  alternatives:
  - the freewoman
  lexicon: BDAG
  rationale: Supplies the implied noun in English from the adjectival substantive.
    Two-word form is more readable in modern English.
