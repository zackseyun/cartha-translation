id: GAL.4.14
reference: Galatians 4:14
source:
  edition: SBLGNT
  text: καὶ τὸν πειρασμὸν ⸀ὑμῶν ἐν τῇ σαρκί μου οὐκ ἐξουθενήσατε οὐδὲ ἐξεπτύσατε,
    ἀλλὰ ὡς ἄγγελον θεοῦ ἐδέξασθέ με, ὡς Χριστὸν Ἰησοῦν.
translation:
  text: And you did not treat my bodily trial with contempt or disgust; rather, you
    welcomed me as an angel of God, as Messiah Jesus.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your trial in my flesh,' reflecting the textual and syntactical difficulty
      of the phrase.
    reason: alternative_reading
  - marker: b
    text: Literally 'you did not spit out'—an expression of revulsion or rejection.
    reason: lexical_alternative
  - marker: c
    text: Greek 'Christ Jesus'; rendered 'Messiah Jesus' here because Χριστός functions
      as a title.
    reason: lexical_alternative
lexical_decisions:
- source_word: πειρασμὸν
  chosen: trial
  alternatives:
  - temptation
  - testing
  lexicon: BDAG
  rationale: In context Paul refers to the affliction associated with his physical
    condition, not an enticement to sin. 'Trial' naturally conveys a burdensome circumstance
    undergone by Paul and faced by the Galatians in receiving him.
- source_word: ὑμῶν
  chosen: you
  alternatives:
  - your
  lexicon: BDAG
  rationale: The genitive is text-critically difficult and can be taken with 'trial'
    ('your trial') or understood as relating to the Galatians' experience of Paul's
    condition. In idiomatic English, 'you did not treat my bodily trial...' best captures
    the sense without over-literal awkwardness, while the alternative is preserved
    in a footnote.
- source_word: ἐν τῇ σαρκί μου
  chosen: my bodily
  alternatives:
  - in my flesh
  - in my body
  lexicon: BDAG
  rationale: Here σάρξ refers to Paul's physical condition, not the metaphorical 'sinful
    nature.' 'Bodily' expresses the adjectival force smoothly in English while retaining
    the literal physical sense required by context.
- source_word: σάρξ
  chosen: bodily
  alternatives:
  - flesh
  lexicon: BDAG
  rationale: Per project guidance, σάρξ is rendered literally in physical contexts.
    Because English 'in my flesh' can sound wooden or be misconstrued, 'bodily' is
    an optimal-equivalence rendering of the literal physical sense.
- source_word: ἐξουθενήσατε
  chosen: treat with contempt
  alternatives:
  - despise
  - scorn
  lexicon: BDAG
  rationale: The verb denotes looking down on or rejecting as insignificant. 'Treat
    with contempt' captures the interpersonal action in readable modern English.
- source_word: ἐξεπτύσατε
  chosen: disgust
  alternatives:
  - spit out
  - spurn
  lexicon: BDAG
  rationale: The verb literally refers to spitting out/at as a sign of revulsion.
    In English, 'disgust' communicates the idiomatic force in the paired expression,
    while the more literal image is preserved in a footnote.
- source_word: ἐδέξασθέ
  chosen: welcomed
  alternatives:
  - received
  lexicon: BDAG
  rationale: The middle voice here emphasizes personal reception. 'Welcomed' better
    reflects warm acceptance in natural English than the more neutral 'received.'
- source_word: ἄγγελον θεοῦ
  chosen: an angel of God
  alternatives:
  - a messenger of God
  lexicon: BDAG
  rationale: Although ἄγγελος can mean 'messenger,' the comparison here is elevated
    and parallel to 'as Messiah Jesus,' favoring the common sense 'angel' rather than
    reducing it to a merely human envoy.
- source_word: Χριστὸν Ἰησοῦν
  chosen: Messiah Jesus
  alternatives:
  - Christ Jesus
  lexicon: BDAG
  rationale: Per doctrine guidelines, Χριστός is translated 'Messiah' when functioning
    as a title rather than a name-like form. Here the appositional comparison retains
    clear titular force.
