theological_decisions:
- issue: Meaning of Paul's comparison in 'as an angel of God, as Messiah Jesus'
  chosen_reading: The verse describes the Galatians' extraordinarily honoring reception
    of Paul, not an identification of Paul with Christ.
  alternative_readings:
  - The second comparison heightens the first rhetorically without implying ontology.
  rationale: The two ὡς phrases indicate manner of reception. Rendering them straightforwardly
    preserves the strong Christological language without suggesting Paul was considered
    divine or identical with Jesus.
  doctrine_reference: Nicene Creed; Chalcedonian Definition
- issue: Sense of σάρξ
  chosen_reading: Physical bodily condition
  alternative_readings:
  - sinful nature
  rationale: In this context Paul's illness or physical weakness is in view, so a
    metaphorical moral reading would import theology not warranted by the immediate
    context.
