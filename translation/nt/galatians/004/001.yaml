theological_decisions:
- issue: Rendering of δοῦλος in Paul's analogy
  chosen_reading: slave
  alternative_readings:
  - servant
  - bondservant
  rationale: The doctrinal guidance prefers 'slave' when the bonded nature is theologically
    or rhetorically salient. In this inheritance analogy, Paul's point depends on
    the heir's temporary lack of practical distinction from one under authority, making
    'slave' the stronger and more transparent rendering.
