id: GAL.4.1
reference: Galatians 4:1
source:
  edition: SBLGNT
  text: Λέγω δέ, ἐφ’ ὅσον χρόνον ὁ κληρονόμος νήπιός ἐστιν, οὐδὲν διαφέρει δούλου
    κύριος πάντων ὤν,
translation:
  text: Now I say that as long as the heir is a child, he differs in nothing from
    a slave, though he is lord of all,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a minor.' The Greek νήπιος can refer to an immature child and, in this
      context, carries the sense of one not yet of age.
    reason: lexical_alternative
  - marker: b
    text: Or 'servant.' The Greek δοῦλος often denotes a slave or bonded person; here
      'slave' is used to preserve the force of Paul's comparison.
    reason: lexical_alternative
lexical_decisions:
- source_word: Λέγω δέ
  chosen: Now I say
  alternatives:
  - But I say
  - What I am saying is
  lexicon: BDAG
  rationale: λέγω is a present discourse marker introducing an explanation or inference;
    δέ is mildly connective/adversative. 'Now I say' is natural English that preserves
    Paul's transition without overstating contrast.
- source_word: ἐφ’ ὅσον χρόνον
  chosen: as long as
  alternatives:
  - for as long a time as
  - while
  lexicon: BDAG
  rationale: The idiom expresses duration up to a limit. 'As long as' is concise and
    accurate in modern English.
- source_word: ὁ κληρονόμος
  chosen: the heir
  alternatives:
  - the inheritor
  lexicon: BDAG
  rationale: κληρονόμος refers to one who receives an inheritance. 'Heir' is the standard
    and most natural rendering.
- source_word: νήπιός
  chosen: a child
  alternatives:
  - a minor
  - an infant
  lexicon: BDAG
  rationale: νήπιος can denote an infant or, more broadly, an immature child/minor.
    In this legal-inheritance analogy, 'a child' communicates minority status naturally
    without over-specifying age; 'minor' is possible but more technical.
- source_word: οὐδὲν διαφέρει
  chosen: differs in nothing
  alternatives:
  - is no different
  - differs not at all
  lexicon: BDAG
  rationale: This phrase states no practical distinction. 'Differs in nothing' stays
    close to the Greek while remaining readable.
- source_word: δούλου
  chosen: a slave
  alternatives:
  - a servant
  - a bondservant
  lexicon: BDAG
  rationale: Per doctrine guidelines, δοῦλος should be rendered 'slave' where bonded
    status is salient. Here Paul contrasts the heir's lack of practical freedom with
    that of a slave, so the bonded nature is important.
- source_word: κύριος πάντων ὤν
  chosen: though he is lord of all
  alternatives:
  - although he is master of everything
  - being lord of all
  lexicon: BDAG
  rationale: κύριος here denotes ownership/authority rather than a divine title. 'Lord
    of all' preserves the Greek wording and the irony of the comparison. 'Though'
    makes explicit the concessive force implied by the participial construction.
