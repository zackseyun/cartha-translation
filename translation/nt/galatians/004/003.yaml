theological_decisions:
- issue: Meaning of τὰ στοιχεῖα τοῦ κόσμου
  chosen_reading: Rendered non-personally as 'the elemental principles of the world'
    in the main text
  alternative_readings:
  - the elemental spirits of the world
  - the basic elements of the universe
  rationale: The phrase is debated in Galatians and Colossians. Because the immediate
    context emphasizes minority status under preparatory structures, a non-personal
    rendering fits well, yet the term may also evoke cosmic powers. To preserve theological
    tension rather than resolve it, the alternative is retained in a footnote.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it'
