id: GAL.4.3
reference: Galatians 4:3
source:
  edition: SBLGNT
  text: οὕτως καὶ ἡμεῖς, ὅτε ἦμεν νήπιοι, ὑπὸ τὰ στοιχεῖα τοῦ κόσμου ⸀ἤμεθα δεδουλωμένοι·
translation:
  text: So also we, when we were children, were enslaved under the elemental principles
    of the world.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "the elemental spirits of the world"; the Greek term may refer either
      to basic principles/elements or to cosmic spiritual powers.
    reason: alternative_reading
lexical_decisions:
- source_word: οὕτως καὶ
  chosen: So also
  alternatives:
  - Likewise
  - In the same way also
  lexicon: BDAG
  rationale: Marks the analogy with the preceding illustration about an heir under
    guardians; 'So also' is concise and natural while preserving the comparative force.
- source_word: ἡμεῖς
  chosen: we
  lexicon: BDAG
  rationale: Straightforward first-person plural pronoun, retained explicitly for
    emphasis as in Greek.
- source_word: ὅτε
  chosen: when
  alternatives:
  - while
  lexicon: BDAG
  rationale: Temporal conjunction introducing the time circumstance.
- source_word: ἦμεν
  chosen: we were
  lexicon: BDAG
  rationale: Imperfect of εἰμί, rendered with simple past in idiomatic English within
    the temporal clause.
- source_word: νήπιοι
  chosen: children
  alternatives:
  - minors
  - infants
  lexicon: BDAG
  rationale: In context Paul extends the prior heir analogy, referring to immaturity
    rather than literal infancy. 'Children' is natural and broad enough; 'minors'
    is possible but sounds overly technical, while 'infants' is too narrow.
- source_word: ὑπὸ
  chosen: under
  alternatives:
  - subject to
  lexicon: BDAG
  rationale: Retains the metaphor of subjection/control and matches Paul's repeated
    'under' language in the context.
- source_word: τὰ στοιχεῖα τοῦ κόσμου
  chosen: the elemental principles of the world
  alternatives:
  - the elemental spirits of the world
  - the basic principles of the world
  - the elements of the world
  lexicon: BDAG
  rationale: στοιχεῖα is contested in Pauline usage, potentially meaning basic elements/principles
    or cosmic powers. Here 'elemental principles' preserves the semantic breadth without
    over-specifying to personal spirits in the main text; 'of the world' keeps the
    genitive intact.
- source_word: ἤμεθα δεδουλωμένοι
  chosen: were enslaved
  alternatives:
  - were held in slavery
  - were in bondage
  lexicon: BDAG
  rationale: Per translation philosophy, bonded language should be preserved where
    salient. The periphrastic pluperfect/imperfect passive sense is well conveyed
    by 'were enslaved,' which is clear and appropriately strong.
