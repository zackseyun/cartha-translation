id: GAL.4.29
reference: Galatians 4:29
source:
  edition: SBLGNT
  text: ἀλλ’ ὥσπερ τότε ὁ κατὰ σάρκα γεννηθεὶς ἐδίωκε τὸν κατὰ πνεῦμα, οὕτως καὶ νῦν.
translation:
  text: But just as then the one born according to the flesh persecuted the one born
    according to the Spirit, so also it is now.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "the one born by ordinary human means"; literally, "the one born according
      to the flesh."
    reason: lexical_alternative
  - marker: b
    text: Or "the one according to the Spirit"; the word "born" is supplied from the
      first clause to make the parallel explicit in English.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀλλ’
  chosen: But
  alternatives:
  - Yet
  - However
  lexicon: BDAG
  rationale: Marks contrast with the preceding allegorical explanation; 'But' is the
    most natural and concise English adversative here.
- source_word: ὥσπερ τότε ... οὕτως καὶ νῦν
  chosen: just as then ... so also it is now
  alternatives:
  - just as at that time ... so also now
  - as then ... so now
  lexicon: BDAG
  rationale: Preserves the correlative comparison structure and temporal contrast.
    Adding 'it is' in English makes the elliptical Greek idiomatic without changing
    sense.
- source_word: ὁ ... γεννηθεὶς
  chosen: the one born
  alternatives:
  - the one having been born
  - he who was born
  lexicon: BDAG
  rationale: The substantival aorist passive participle is best rendered as a nominal
    expression in clear modern English. Repeating 'born' for both figures preserves
    Paul's parallelism.
- source_word: κατὰ σάρκα
  chosen: according to the flesh
  alternatives:
  - by the flesh
  - in the ordinary way
  - according to human means
  lexicon: BDAG
  rationale: The doctrine guide defaults σάρξ to 'flesh' when literal and 'sinful
    nature' when metaphorical. Here the phrase contrasts natural/human procreation
    with Spirit-origin, not moral depravity, so 'according to the flesh' preserves
    Paul's wording and theological contrast without overinterpreting.
- source_word: ἐδίωκε
  chosen: persecuted
  alternatives:
  - was persecuting
  - harassed
  - opposed
  lexicon: BDAG
  rationale: διώκω in this context denotes hostile pursuit/oppression; 'persecuted'
    is the standard and theologically recognizable rendering. The imperfect is conveyed
    as customary/past action within the historical analogy rather than requiring an
    English progressive.
- source_word: τὸν κατὰ πνεῦμα
  chosen: the one born according to the Spirit
  alternatives:
  - the one according to the Spirit
  - the one born by the Spirit
  lexicon: BDAG
  rationale: Although 'born' is only explicit in the first half, English benefits
    from repeating it to make the parallel clear. 'According to the Spirit' mirrors
    the Greek and avoids narrowing κατά to instrumental 'by' alone.
- source_word: πνεῦμα
  chosen: Spirit
  alternatives:
  - spirit
  lexicon: BDAG
  rationale: In Galatians, the contrast with 'flesh' in salvation-historical and covenantal
    context points to the Holy Spirit rather than a merely human spiritual principle;
    capitalization communicates this interpretive judgment.
- source_word: νῦν
  chosen: now
  alternatives:
  - at the present time
  lexicon: BDAG
  rationale: Simple temporal adverb connecting the ancient pattern to Paul's present
    situation; 'now' is sufficient and idiomatic.
