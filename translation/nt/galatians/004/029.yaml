theological_decisions:
- issue: Meaning of κατὰ σάρκα in the Ishmael/Isaac contrast
  chosen_reading: Refers to birth by ordinary human procreation/human means, not specifically
    to a sinful nature.
  alternative_readings:
  - born by sinful nature
  - born merely in a worldly way
  rationale: The immediate context (Gal 4:23, 29) contrasts Ishmael's natural birth
    with Isaac's birth through promise/Spirit. Rendering 'flesh' in the main text
    preserves the lexical link while the rationale guards against importing a moral-anthropological
    sense not required here.
  doctrine_reference: 'DOCTRINE.md: σάρξ default ''flesh'' (literal) / ''sinful nature''
    (metaphorical), context-dependent'
- issue: Referent of πνεῦμα
  chosen_reading: Holy Spirit
  alternative_readings:
  - human spirit
  - spiritual realm/principle
  rationale: Within Paul's Sarah/Hagar allegory and the contrast with promise, the
    Spirit is best understood as the divine agent associated with the promised child
    and with believers' present identity. Capitalization reflects that judgment while
    leaving the phrase itself close to the Greek.
