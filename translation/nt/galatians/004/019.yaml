theological_decisions:
- issue: Sense of 'Christ/Messiah formed in you'
  chosen_reading: The phrase refers to the Messiah's character/life taking shape within
    the Galatian believers, without specifying a later doctrinal mechanism beyond
    Paul's pastoral metaphor.
  alternative_readings:
  - The Messiah being formed among you corporately as a community
  - A reference primarily to conversion/new birth imagery
  rationale: The Greek permits both individual and corporate nuance, but 'in you'
    most directly expresses inward formation while still allowing the plural audience
    to retain a communal aspect. The translation preserves the metaphor rather than
    resolving it into a technical doctrinal statement.
  doctrine_reference: Preserve theological tension rather than resolve it.
