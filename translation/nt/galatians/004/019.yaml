id: GAL.4.19
reference: Galatians 4:19
source:
  edition: SBLGNT
  text: ⸀τέκνα μου, οὓς πάλιν ὠδίνω ⸀μέχρις οὗ μορφωθῇ Χριστὸς ἐν ὑμῖν·
translation:
  text: My children, for whom I am again suffering birth pains until the Messiah is
    formed in you,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Christ is formed in you.' 'Messiah' translates the title Χριστός; 'Christ'
      remains a familiar alternative.
    reason: alternative_reading
  - marker: b
    text: Or 'among you' for 'in you,' highlighting the possible corporate sense.
    reason: lexical_alternative
  - marker: c
    text: Literally, 'I am in labor again' or 'I suffer birth pains again.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τέκνα μου
  chosen: My children
  alternatives:
  - My little children
  lexicon: BDAG
  rationale: τέκνα is an affectionate vocative plural, naturally rendered 'children.'
    'Little children' can over-specify tenderness not explicit in the noun itself.
- source_word: οὓς
  chosen: for whom
  alternatives:
  - whom
  lexicon: BDAG
  rationale: Although formally accusative ('whom'), in English the relative pronoun
    is best brought into the idiom of the labor metaphor with 'for whom I am suffering
    birth pains.' This preserves the object relation without awkwardness.
- source_word: πάλιν
  chosen: again
  alternatives:
  - anew
  lexicon: BDAG
  rationale: πάλιν marks repetition. 'Again' is the most natural and direct English
    equivalent.
- source_word: ὠδίνω
  chosen: am again suffering birth pains
  alternatives:
  - am in labor again
  - am again in the pains of childbirth
  lexicon: BDAG
  rationale: ὠδίνω evokes labor/birth pangs metaphorically. 'Suffering birth pains'
    preserves the vivid maternal image while remaining readable modern English.
- source_word: μέχρις οὗ
  chosen: until
  alternatives:
  - until the time when
  lexicon: BDAG
  rationale: This conjunction introduces the temporal goal of Paul's metaphor. Simple
    'until' is accurate and idiomatic.
- source_word: μορφωθῇ
  chosen: is formed
  alternatives:
  - takes shape
  - comes to be formed
  lexicon: BDAG
  rationale: The aorist passive subjunctive indicates the forming of Christ in the
    Galatians. 'Is formed' is the closest natural English rendering and preserves
    the passive sense.
- source_word: Χριστὸς
  chosen: the Messiah
  alternatives:
  - Christ
  lexicon: BDAG
  rationale: Per project guidance, Χριστός is translated as 'Messiah' where functioning
    as a title rather than a name-like designation. Here the title sense remains intelligible
    and meaningful.
- source_word: ἐν ὑμῖν
  chosen: in you
  alternatives:
  - among you
  lexicon: BDAG
  rationale: ἐν with the dative can mean 'in' or 'among,' but in this context the
    metaphor of Christ being formed points most naturally to inward formation within
    the Galatian believers. The corporate dimension is not excluded.
