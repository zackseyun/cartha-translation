id: GAL.4.9
reference: Galatians 4:9
source:
  edition: SBLGNT
  text: νῦν δὲ γνόντες θεόν, μᾶλλον δὲ γνωσθέντες ὑπὸ θεοῦ, πῶς ἐπιστρέφετε πάλιν
    ἐπὶ τὰ ἀσθενῆ καὶ πτωχὰ στοιχεῖα, οἷς πάλιν ἄνωθεν ⸀δουλεύειν θέλετε;
translation:
  text: But now, having come to know God—or rather, having been known by God—how can
    you turn back again to the weak and poor elemental principles, to which you want
    to be enslaved all over again?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'elemental spirits,' 'basic principles,' or 'elementary things' for στοιχεῖα.
    reason: lexical_alternative
lexical_decisions:
- source_word: γνόντες
  chosen: having come to know
  alternatives:
  - having known
  - after knowing
  lexicon: BDAG
  rationale: 'Aorist participle of γινώσκω is rendered with an ingressive sense in
    context: the Galatians entered into knowledge of God. ''Having come to know''
    is natural English and preserves the participial relation to the main clause.'
- source_word: θεόν
  chosen: God
  lexicon: BDAG
  rationale: Direct object of γνόντες; straightforwardly refers to the true God in
    contrast with former pagan bondage.
- source_word: μᾶλλον δὲ γνωσθέντες ὑπὸ θεοῦ
  chosen: or rather, having been known by God
  alternatives:
  - rather, being known by God
  - more importantly, having been known by God
  lexicon: BDAG
  rationale: 'Paul corrects and deepens the prior expression: their knowing God is
    secondary to God''s prior knowing them. The passive is kept explicit, and ''or
    rather'' captures the corrective force of μᾶλλον δέ idiomatically.'
- source_word: πῶς
  chosen: how can
  alternatives:
  - how
  - why
  lexicon: BDAG
  rationale: In rhetorical questions πῶς often carries incredulous force; 'how can'
    communicates Paul's astonishment better than a bare 'how' in contemporary English.
- source_word: ἐπιστρέφετε πάλιν
  chosen: you turn back again
  alternatives:
  - you are turning back again
  - you return again
  lexicon: BDAG
  rationale: Present indicative is rendered as a present action/process. 'Turn back
    again' preserves both ἐπιστρέφετε and πάλιν, even if slightly emphatic in English,
    because Paul is stressing reversal.
- source_word: ἐπὶ τὰ ἀσθενῆ καὶ πτωχὰ στοιχεῖα
  chosen: to the weak and poor elemental principles
  alternatives:
  - to the weak and beggarly elements
  - to the weak and miserable elemental spirits
  - to the weak and poor basic principles
  lexicon: BDAG
  rationale: στοιχεῖα is contested in Paul and can denote elemental principles, basic
    components, or cosmic powers. Here 'elemental principles' keeps the term somewhat
    open without over-specifying. 'Poor' is preferred to archaic 'beggarly' for πτωχά,
    and 'weak' straightforwardly renders ἀσθενῆ.
- source_word: οἷς
  chosen: to which
  alternatives:
  - to whom
  lexicon: BDAG
  rationale: Neuter dative plural relative pronoun agrees with στοιχεῖα, so an impersonal
    rendering fits the grammar unless one decides for personal powers; the main text
    preserves the neuter reference.
- source_word: πάλιν ἄνωθεν
  chosen: all over again
  alternatives:
  - again from the beginning
  - again anew
  lexicon: BDAG
  rationale: The combination intensifies repetition/reset. 'All over again' is idiomatic
    modern English that conveys both repeated return and renewed subjection.
- source_word: δουλεύειν
  chosen: to be enslaved
  alternatives:
  - to serve
  - to be slaves
  lexicon: BDAG
  rationale: Given the doctrinal guidance on δοῦλος/δουλεύω and the salience of bondage
    imagery in Galatians, 'to be enslaved' better preserves the bonded nature than
    the weaker 'serve'.
- source_word: θέλετε
  chosen: you want
  alternatives:
  - you desire
  - you are willing
  lexicon: BDAG
  rationale: θέλω here expresses volition/intention. 'You want' is the clearest contemporary
    equivalent and preserves Paul's rebuke.
