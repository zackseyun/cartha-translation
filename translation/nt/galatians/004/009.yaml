theological_decisions:
- issue: Meaning of στοιχεῖα in Galatians 4:9
  chosen_reading: elemental principles
  alternative_readings:
  - elemental spirits
  - basic principles
  - elementary things
  rationale: The term is debated in Pauline usage, with possible reference either
    to basic religious principles or to cosmic powers associated with the old order.
    The immediate context allows some overlap. The main text uses 'elemental principles'
    to preserve ambiguity without forcing a demonological or purely pedagogical interpretation;
    alternatives are preserved in a footnote.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Force of 'known by God'
  chosen_reading: God's knowing them is presented as primary and corrective to their
    knowing God
  alternative_readings:
  - purely relational emphasis without implication of divine initiative
  rationale: Paul's μᾶλλον δέ marks a real correction, not merely stylistic variation.
    The translation keeps the passive explicit to reflect divine initiative while
    not importing later doctrinal systems beyond the text.
  doctrine_reference: Do not import doctrinal claims the text does not make; preserve
    the text's emphasis.
