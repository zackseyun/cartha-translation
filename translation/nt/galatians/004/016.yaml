theological_decisions:
- issue: Sense of ἀληθεύων in Pauline rhetoric
  chosen_reading: Paul asks whether his truthful speech to the Galatians has made
    him seem like their enemy.
  alternative_readings:
  - Paul asks whether his general truthfulness toward them has made him their enemy.
  rationale: The immediate context concerns Paul's direct rebuke and appeal. Rendering
    the participle as 'telling you the truth' best reflects the communicative force
    without importing additional doctrinal content.
