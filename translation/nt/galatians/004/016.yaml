id: GAL.4.16
reference: Galatians 4:16
source:
  edition: SBLGNT
  text: ὥστε ἐχθρὸς ὑμῶν γέγονα ἀληθεύων ὑμῖν;
translation:
  text: So then, have I become your enemy by telling you the truth?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'by speaking truth to you.' The Greek participle ἀληθεύων can mean 'speaking
      truthfully' or 'telling the truth.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὥστε
  chosen: So then
  alternatives:
  - So
  - Therefore
  - Thus
  lexicon: BDAG
  rationale: Inferential conjunction drawing a conclusion from the preceding argument;
    'So then' preserves the rhetorical transition naturally in English.
- source_word: ἐχθρὸς
  chosen: enemy
  alternatives:
  - hostile one
  - adversary
  lexicon: BDAG
  rationale: Predicate adjective/substantival use meaning one who is hostile or regarded
    as an enemy. 'Enemy' is the clear, idiomatic English equivalent.
- source_word: ὑμῶν
  chosen: your
  alternatives:
  - of you
  lexicon: BDAG
  rationale: Genitive pronoun dependent on 'enemy'; idiomatic English expresses this
    as the possessive 'your.'
- source_word: γέγονα
  chosen: have I become
  alternatives:
  - have I turned into
  - am I become
  lexicon: BDAG
  rationale: 'Perfect of γίνομαι emphasizes resultant state: ''have I become'' captures
    both the completed transition and present implication better than a simple past.'
- source_word: ἀληθεύων
  chosen: by telling
  alternatives:
  - while speaking truth
  - by being truthful
  - by telling the truth
  lexicon: BDAG
  rationale: Present participle from ἀληθεύω means to speak/communicate truthfully
    or tell the truth. In this context, with dative ὑμῖν, it refers to Paul's truthful
    address to the Galatians. 'By telling' renders the participial means/circumstance
    naturally in English; the object 'the truth' is supplied because the verb commonly
    carries that sense and English requires explicitness.
- source_word: ὑμῖν
  chosen: you
  alternatives:
  - to you
  lexicon: BDAG
  rationale: Dative pronoun marking the audience of the truthful speech. English can
    render this either explicitly ('to you') or more smoothly as 'telling you the
    truth'; the latter is idiomatic and preserves the sense.
