id: GAL.4.5
reference: Galatians 4:5
source:
  edition: SBLGNT
  text: ἵνα τοὺς ὑπὸ νόμον ἐξαγοράσῃ, ἵνα τὴν υἱοθεσίαν ἀπολάβωμεν.
translation:
  text: so that he might redeem those under the law, so that we might receive adoption
    as sons.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or simply, “adoption.” The Greek term is literally “adoption as sons,” highlighting
      full filial status and inheritance rights; the referent includes all believers,
      women and men alike.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἵνα
  chosen: so that
  alternatives:
  - in order that
  lexicon: BDAG
  rationale: Introduces purpose in both clauses. 'So that' is natural modern English
    while preserving the telic force.
- source_word: τοὺς ὑπὸ νόμον
  chosen: those under the law
  alternatives:
  - those under law
  - those subject to the law
  lexicon: BDAG
  rationale: The articular phrase is substantival and refers to persons under the
    Mosaic law's jurisdiction. Including 'the' before 'law' is idiomatic English and
    reflects Paul's likely reference to the Torah covenantal economy.
- source_word: νόμον
  chosen: the law
  alternatives:
  - law
  lexicon: BDAG
  rationale: In Galatians, νόμος commonly denotes the Mosaic law rather than law in
    the abstract. The article is not present in Greek but is warranted in English
    for clarity and contextual specificity.
- source_word: ἐξαγοράσῃ
  chosen: redeem
  alternatives:
  - buy back
  - free by purchase
  lexicon: BDAG
  rationale: Aorist subjunctive after ἵνα expressing purpose. 'Redeem' best captures
    the commercial/liberative sense in a theologically established but still accessible
    way.
- source_word: τὴν υἱοθεσίαν
  chosen: adoption as sons
  alternatives:
  - adoption
  - sonship
  lexicon: BDAG
  rationale: υἱοθεσία is literally 'adoption as sons.' This rendering preserves the
    filial and inheritance-oriented force of the masculine term in Greco-Roman and
    Pauline usage better than bare 'adoption,' while remaining intelligible.
- source_word: ἀπολάβωμεν
  chosen: we might receive
  alternatives:
  - we might obtain
  - we might receive back
  lexicon: BDAG
  rationale: Aorist subjunctive after ἵνα expressing intended result/purpose. 'Receive'
    is the clearest English equivalent here; 'obtain' is possible but less natural.
    The compound sense 'receive back' is not prominent in this context.
