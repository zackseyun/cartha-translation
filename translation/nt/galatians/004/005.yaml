theological_decisions:
- issue: Rendering of υἱοθεσία in relation to gendered language
  chosen_reading: adoption as sons
  alternative_readings:
  - adoption
  - sonship
  rationale: Following the gender-accurate principle, the masculine filial term should
    be preserved where it carries representative and inheritance significance. In
    Paul's argument, believers receive the status of sons in relation to inheritance,
    not merely a generic family inclusion. A footnote can clarify inclusive referent
    without flattening the source term.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Referent of 'those under the law'
  chosen_reading: those under the law refers primarily to persons under the Mosaic
    law
  alternative_readings:
  - those under law in a broader universal sense
  rationale: In Galatians 4:4–5, the immediate context is the Son born of woman, born
    under law, in order to redeem those under law. The phrase most naturally points
    to Jews/Israel under the Torah, though the resulting adoption extends to 'we'
    as Paul frames shared Christian identity.
