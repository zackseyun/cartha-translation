id: GAL.4.13
reference: Galatians 4:13
source:
  edition: SBLGNT
  text: οἴδατε δὲ ὅτι δι’ ἀσθένειαν τῆς σαρκὸς εὐηγγελισάμην ὑμῖν τὸ πρότερον,
translation:
  text: But you know that it was because of an illness of the flesh that I first proclaimed
    the good news to you,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'because of a bodily weakness.' The Greek phrase literally says 'because
      of a weakness/illness of the flesh.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οἴδατε
  chosen: you know
  alternatives:
  - you know well
  - you are aware
  lexicon: BDAG
  rationale: Perfect-form οἶδα functions with present sense; 'you know' is the natural
    English equivalent and preserves Paul's appeal to the Galatians' prior knowledge.
- source_word: δὲ
  chosen: But
  alternatives:
  - Now
  - And
  lexicon: BDAG
  rationale: δέ marks a mild contrast/transition from the previous argument; 'But'
    best reflects the discourse turn here.
- source_word: ὅτι
  chosen: that
  alternatives:
  - because
  - how
  lexicon: BDAG
  rationale: Introduces the content of what the Galatians know. 'That' is the straightforward
    complementizer in English.
- source_word: δι’ ἀσθένειαν
  chosen: because of an illness
  alternatives:
  - through weakness
  - because of a bodily weakness
  - on account of sickness
  lexicon: BDAG
  rationale: διά with the accusative commonly expresses reason/cause ('because of').
    ἀσθένεια can mean weakness or illness; in this context, with 'of the flesh,' a
    physical malady is most likely, so 'illness' communicates the probable sense in
    clear English.
- source_word: τῆς σαρκὸς
  chosen: of the flesh
  alternatives:
  - bodily
  - physical
  lexicon: BDAG
  rationale: σάρξ is a contested term whose default rendering is 'flesh' when literal.
    Here it refers to Paul's bodily condition rather than the ethical sense 'sinful
    nature,' so 'of the flesh' preserves the wording while allowing the physical sense
    to be understood from context.
- source_word: εὐηγγελισάμην
  chosen: I proclaimed the good news
  alternatives:
  - I preached the gospel
  - I announced the good news
  lexicon: BDAG
  rationale: Aorist middle of εὐαγγελίζω refers to evangelistic proclamation. 'Proclaimed
    the good news' is clear modern English and avoids unexplained church jargon while
    preserving the verbal force.
- source_word: ὑμῖν
  chosen: to you
  alternatives:
  - among you
  lexicon: BDAG
  rationale: Dative indirect object is most naturally rendered 'to you' in English.
- source_word: τὸ πρότερον
  chosen: I first
  alternatives:
  - the first time
  - formerly
  - at first
  lexicon: BDAG
  rationale: 'The idiom points to Paul''s earlier visit/initial occasion of evangelizing
    them. Rendering it with ''first'' produces idiomatic English when placed with
    the verb: ''I first proclaimed...''.'
