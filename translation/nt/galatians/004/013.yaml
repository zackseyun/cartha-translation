theological_decisions:
- issue: Meaning of σάρξ in the phrase ἀσθένειαν τῆς σαρκὸς
  chosen_reading: 'literal/physical sense: ''illness of the flesh'''
  alternative_readings:
  - metaphorical weakness
  - sinful nature
  rationale: In this context Paul is recounting the circumstances of his earlier visit
    to Galatia. The phrase refers to a bodily ailment, not to moral corruption. This
    follows the doctrine guideline to render σάρξ as 'flesh' when literal and avoid
    importing theological claims the text does not make.
  doctrine_reference: 'DOCTRINE.md: Contested terms table for σάρξ'
