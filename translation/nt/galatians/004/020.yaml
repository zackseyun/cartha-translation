theological_decisions:
- issue: Meaning of φωνή in context
  chosen_reading: Paul refers to changing his manner or tone of address, not merely
    his literal voice.
  alternative_readings:
  - Paul wishes to change the sound of his physical voice
  rationale: The immediate context is pastoral rebuke and concern; the phrase naturally
    points to how he would address them if present. This is a contextual, not doctrinal,
    decision.
