theological_decisions:
- issue: Interpretation of κατὰ σάρκα versus δι’ ἐπαγγελίας
  chosen_reading: The verse contrasts natural human birth with birth resulting from
    God's promise, without implying that physical birth itself is sinful.
  alternative_readings:
  - The phrase could be paraphrased more dynamically as 'in the ordinary human way'
    versus 'as the result of God's promise.'
  rationale: Paul's argument in context is allegorical and covenantal, not a denigration
    of material embodiment. Retaining 'flesh' in the main text preserves Pauline terminology
    while documenting the contextual sense.
  doctrine_reference: Translation philosophy §3, §5; Contested terms table for σάρξ
