id: GAL.4.23
reference: Galatians 4:23
source:
  edition: SBLGNT
  text: ἀλλ’ ὁ μὲν ἐκ τῆς παιδίσκης κατὰ σάρκα γεγέννηται, ὁ δὲ ἐκ τῆς ἐλευθέρας ⸀δι’
    ἐπαγγελίας.
translation:
  text: But the son by the slave woman was born according to the flesh, while the
    son by the free woman was born through promise.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''in the ordinary human way'' / ''according to human means.'' Greek:
      ''according to the flesh.'''
    reason: lexical_alternative
  - marker: b
    text: Or 'by promise.' The phrase points to birth resulting from God's promise
      rather than merely ordinary human procreation.
    reason: lexical_alternative
lexical_decisions:
- source_word: παιδίσκη
  chosen: slave woman
  alternatives:
  - slave girl
  - servant girl
  - maidservant
  lexicon: BDAG
  rationale: In the Sarah-Hagar contrast, the bonded status is central to Paul's allegorical
    argument, so 'slave woman' better preserves the social and theological force than
    softer traditional renderings like 'bondwoman' or 'maidservant.'
- source_word: κατὰ σάρκα
  chosen: according to the flesh
  alternatives:
  - in the ordinary way
  - according to human means
  lexicon: BDAG
  rationale: The phrase should retain Paul's key term σάρξ as 'flesh' per the project's
    default unless context compels an interpretive paraphrase. Here it contrasts natural
    human procreation with divine promise. A more interpretive rendering is possible,
    but the formal phrase best preserves the theological tension.
- source_word: σάρξ
  chosen: flesh
  alternatives:
  - human nature
  - ordinary human means
  lexicon: BDAG
  rationale: This is not the ethical/metaphorical sense 'sinful nature' but the literal-human
    sphere of natural generation. 'Flesh' preserves intertextual Pauline usage while
    avoiding overinterpretation.
- source_word: γεγέννηται
  chosen: was born
  alternatives:
  - has been born
  - was begotten
  lexicon: BDAG
  rationale: English idiom favors 'was born' for the perfect passive here. 'Has been
    born' is more formally aligned but awkward in this contrastive statement; 'begotten'
    is archaic in modern English.
- source_word: ἐλευθέρα
  chosen: free woman
  alternatives:
  - freewife
  - free
  lexicon: BDAG
  rationale: The adjective is substantival and contrasts with παιδίσκη. 'Free woman'
    is the clearest natural English equivalent and preserves the social contrast important
    to Paul's argument.
- source_word: δι’ ἐπαγγελίας
  chosen: through promise
  alternatives:
  - through the promise
  - by promise
  lexicon: BDAG
  rationale: The anarthrous phrase is best rendered without the article. 'Through
    promise' captures divine agency/instrumentality and echoes the surrounding context
    about God's promise to Abraham and Sarah.
- source_word: ὁ μὲν ... ὁ δὲ
  chosen: the son ... while the son
  alternatives:
  - the one ... but the other
  - one ... and the other
  lexicon: BDAG
  rationale: Supplying 'the son' in both clauses makes explicit the implied referent
    in English and clarifies the comparison between Ishmael and Isaac without adding
    new content.
