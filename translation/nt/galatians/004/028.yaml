id: GAL.4.28
reference: Galatians 4:28
source:
  edition: SBLGNT
  text: ⸂ὑμεῖς δέ, ἀδελφοί, κατὰ Ἰσαὰκ ἐπαγγελίας τέκνα ἐστέ⸃·
translation:
  text: Now you, brothers, like Isaac, are children of promise.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '''Brothers'' here uses the masculine plural form as a representative address
      to the congregation, likely including both men and women.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὑμεῖς
  chosen: you
  alternatives:
  - you yourselves
  lexicon: BDAG
  rationale: Second-person plural pronoun, explicitly retained for emphasis but rendered
    naturally in English without overtranslating the emphatic force.
- source_word: δέ
  chosen: Now
  alternatives:
  - but
  - and
  lexicon: BDAG
  rationale: Marks a mild transition/contrast from the allegorical argument just made;
    'Now' conveys the discourse shift smoothly in modern English.
- source_word: ἀδελφοί
  chosen: brothers
  alternatives:
  - brothers and sisters
  - siblings
  lexicon: BDAG
  rationale: Vocative plural. Per translation philosophy, gender-accurate rendering
    is preferred; Paul commonly uses the masculine plural representationally for the
    mixed congregation. The inclusive sense is preserved in a footnote rather than
    replacing the source-form in the main text.
- source_word: κατὰ Ἰσαὰκ
  chosen: like Isaac
  alternatives:
  - according to Isaac
  - in the manner of Isaac
  lexicon: BDAG
  rationale: 'The idiom means correspondence or pattern: the Galatian believers are
    being compared to Isaac as children born in fulfillment of promise. ''Like Isaac''
    is the most natural optimal-equivalence rendering.'
- source_word: ἐπαγγελίας
  chosen: of promise
  alternatives:
  - belonging to the promise
  - promised
  lexicon: BDAG
  rationale: Genitive modifying 'children'; 'children of promise' preserves the Pauline
    expression and its theological resonance better than a paraphrastic alternative.
- source_word: τέκνα
  chosen: children
  alternatives:
  - offspring
  - sons and daughters
  lexicon: BDAG
  rationale: Neutral plural noun emphasizing filial status rather than sex; 'children'
    is the most accurate and natural rendering.
- source_word: ἐστέ
  chosen: are
  lexicon: BDAG
  rationale: Straightforward second-person plural present indicative of 'to be,' linking
    the addressees with the predicate 'children of promise'.
