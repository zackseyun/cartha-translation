theological_decisions:
- issue: Identification of believers with Isaac in Paul's allegorical argument
  chosen_reading: Rendered as 'like Isaac, are children of promise' to preserve both
    the comparison with Isaac and the covenantal status Paul assigns to the readers.
  alternative_readings:
  - Rendered more dynamically as 'are promised children like Isaac'
  rationale: The Greek syntax places Isaac as the pattern and 'children of promise'
    as the predicate. This preserves Paul's theological analogy without importing
    a stronger doctrinal formulation than the text states.
