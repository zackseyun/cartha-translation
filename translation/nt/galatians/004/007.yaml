theological_decisions:
- issue: Gendered filial language in υἱός
  chosen_reading: son
  alternative_readings:
  - child
  rationale: The Greek uses masculine singular 'son' in an adoption-and-inheritance
    argument. Rendering it as 'child' would obscure the legal-heir nuance that is
    central to Paul's point, even though the application includes all believers. Inclusivity
    is better addressed in a footnote than by flattening the lexical distinction in
    the text.
  doctrine_reference: 'DOCTRINE.md: Gender-accurate over gender-neutral'
- issue: Textual reading at the close of the verse
  chosen_reading: through God
  alternative_readings:
  - heir of God through Messiah
  - heir of God through Christ
  rationale: The provided source text is SBLGNT, which reads διὰ θεοῦ. The main text
    should follow the base Greek text, while notable manuscript alternatives are preserved
    in a footnote.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy; preserve alternatives
    in footnotes where warranted'
