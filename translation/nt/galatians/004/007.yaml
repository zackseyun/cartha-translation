id: GAL.4.7
reference: Galatians 4:7
source:
  edition: SBLGNT
  text: ὥστε οὐκέτι εἶ δοῦλος ἀλλὰ υἱός· εἰ δὲ υἱός, καὶ κληρονόμος ⸂διὰ θεοῦ⸃.
translation:
  text: So you are no longer a slave but a son; and if a son, then also an heir through
    God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'child.' Greek 'son' preserves the inheritance/adoption logic of the
      passage, though Paul applies this status to all believers.
    reason: lexical_alternative
  - marker: b
    text: Some manuscripts read 'an heir of God through Christ' (or 'through Messiah')
      instead of 'an heir through God.'
    reason: textual_variant
lexical_decisions:
- source_word: ὥστε
  chosen: So
  alternatives:
  - therefore
  - thus
  lexicon: BDAG
  rationale: Marks the inferential conclusion from the preceding argument. 'So' gives
    natural modern English while preserving the logical force.
- source_word: οὐκέτι
  chosen: no longer
  alternatives:
  - not anymore
  lexicon: BDAG
  rationale: Standard temporal negation indicating a changed status.
- source_word: εἶ
  chosen: you are
  alternatives:
  - thou art
  lexicon: BDAG
  rationale: Second person singular present of 'to be'; rendered directly and naturally.
- source_word: δοῦλος
  chosen: slave
  alternatives:
  - servant
  - bondservant
  lexicon: BDAG
  rationale: Per doctrine guidance, 'slave' is preferred where bonded status is theologically
    salient. Here Paul contrasts bondage with filial status and inheritance, so the
    stronger term best preserves the argument.
- source_word: ἀλλὰ
  chosen: but
  alternatives:
  - rather
  lexicon: BDAG
  rationale: Simple adversative contrasting former and present status.
- source_word: υἱός
  chosen: son
  alternatives:
  - child
  lexicon: BDAG
  rationale: Rendered 'son' to match the masculine singular noun in Greek and to preserve
    the inheritance/adoption logic in context. This follows the gender-accurate principle;
    the representative force can be clarified in a footnote rather than neutralized
    in the main text.
- source_word: εἰ δὲ
  chosen: and if
  alternatives:
  - now if
  - but if
  lexicon: BDAG
  rationale: Introduces the next step of the argument. 'And if' reads smoothly in
    English while preserving the connective progression.
- source_word: καὶ
  chosen: also
  alternatives:
  - indeed
  - even
  lexicon: BDAG
  rationale: Adds the consequent status of heir in addition to sonship.
- source_word: κληρονόμος
  chosen: heir
  alternatives:
  - inheritor
  lexicon: BDAG
  rationale: Standard rendering for one who receives an inheritance; fits Paul's adoption/inheritance
    theme.
- source_word: διὰ θεοῦ
  chosen: through God
  alternatives:
  - through God the Father
  - through Christ
  - by God
  lexicon: BDAG
  rationale: The SBLGNT reads διὰ θεοῦ, and this should be translated straightforwardly
    as 'through God.' 'By God' is possible idiomatically, but 'through' preserves
    the preposition. Alternatives involving 'Christ' reflect textual variants, not
    the adopted reading.
