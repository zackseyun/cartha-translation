id: GAL.4.11
reference: Galatians 4:11
source:
  edition: SBLGNT
  text: φοβοῦμαι ὑμᾶς μή πως εἰκῇ κεκοπίακα εἰς ὑμᾶς.
translation:
  text: I fear for you, that somehow I may have labored over you in vain.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I am afraid for you, lest somehow I have labored for you in vain.'
    reason: lexical_alternative
lexical_decisions:
- source_word: φοβοῦμαι
  chosen: I fear
  alternatives:
  - I am afraid
  - I fear for
  lexicon: BDAG
  rationale: Present middle/passive deponent, first singular; expresses Paul's present
    apprehension. 'I fear' is concise and natural. The concern is directed toward
    the Galatians' condition, which is brought out in English by the following phrase
    'for you'.
- source_word: ὑμᾶς
  chosen: for you
  alternatives:
  - you
  - about you
  lexicon: BDAG
  rationale: With φοβοῦμαι, the accusative can mark the object of concern. In English,
    'fear for you' best conveys concern for their spiritual welfare rather than fear
    of them.
- source_word: μή πως
  chosen: that somehow
  alternatives:
  - lest somehow
  - perhaps
  lexicon: BDAG
  rationale: μή πως introduces the content of Paul's fear with a nuance of apprehension.
    'That somehow' is idiomatic modern English and preserves the uncertainty without
    archaic 'lest'.
- source_word: εἰκῇ
  chosen: in vain
  alternatives:
  - for nothing
  - to no purpose
  lexicon: BDAG
  rationale: Adverb meaning 'without result' or 'in vain.' 'In vain' is a standard
    and clear rendering here.
- source_word: κεκοπίακα
  chosen: I may have labored
  alternatives:
  - I have labored
  - I have worked hard
  - I have toiled
  lexicon: BDAG
  rationale: Perfect active indicative first singular of κοπιάω, emphasizing labor
    already expended with present relevance. Because it stands under μή πως after
    φοβοῦμαι, English commonly uses a modal form ('may have labored') to convey the
    feared possibility. 'Labored' preserves the strenuous sense better than the flatter
    'worked'.
- source_word: εἰς ὑμᾶς
  chosen: over you
  alternatives:
  - for you
  - among you
  - on you
  lexicon: BDAG
  rationale: The preposition εἰς with persons after κοπιάω can denote labor directed
    toward them. 'Over you' in English communicates invested effort on their behalf
    without implying merely spatial presence; 'for you' would be possible but could
    blur the directional force already represented earlier.
