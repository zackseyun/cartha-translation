id: GAL.4.27
reference: Galatians 4:27
source:
  edition: SBLGNT
  text: γέγραπται γάρ· Εὐφράνθητι, στεῖρα ἡ οὐ τίκτουσα, ῥῆξον καὶ βόησον, ἡ οὐκ ὠδίνουσα·
    ὅτι πολλὰ τὰ τέκνα τῆς ἐρήμου μᾶλλον ἢ τῆς ἐχούσης τὸν ἄνδρα.
translation:
  text: 'For it is written: “Rejoice, barren woman who is not bearing children; break
    forth and cry out, you who are not in labor; because the children of the desolate
    woman are more numerous than those of the woman who has a husband.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Quotation from Isaiah 54:1.
    reason: cross_reference
  - marker: b
    text: Or “Be glad, barren woman who does not give birth … burst out and shout.”
    reason: lexical_alternative
  - marker: c
    text: “Desolate woman” renders a term that can also mean “deserted” or “forsaken”
      in this figurative context.
    reason: lexical_alternative
lexical_decisions:
- source_word: γέγραπται
  chosen: it is written
  alternatives:
  - it stands written
  lexicon: BDAG
  rationale: Conventional and accurate rendering of the perfect passive introductory
    formula for Scripture quotation; preserves the ongoing authority implied by the
    perfect.
- source_word: Εὐφράνθητι
  chosen: Rejoice
  alternatives:
  - Be glad
  lexicon: BDAG
  rationale: Imperative of rejoicing/gladness. 'Rejoice' fits prophetic citation style
    and preserves the elevated tone.
- source_word: στεῖρα
  chosen: barren woman
  alternatives:
  - barren
  - infertile woman
  lexicon: BDAG
  rationale: The adjective is used substantivally in address. 'Barren woman' is natural
    English and makes explicit the person addressed.
- source_word: ἡ οὐ τίκτουσα
  chosen: who is not bearing children
  alternatives:
  - who does not give birth
  - who is not giving birth
  lexicon: BDAG
  rationale: Present participle describing ongoing childlessness. 'Bearing children'
    is idiomatic and avoids awkward repetition with 'give birth' later in the verse.
- source_word: ῥῆξον
  chosen: break forth
  alternatives:
  - burst out
  lexicon: BDAG
  rationale: In this idiom with shouting, the sense is sudden emotional outburst.
    'Break forth' preserves the prophetic cadence and intertextual echo of Isaiah
    54:1.
- source_word: βόησον
  chosen: cry out
  alternatives:
  - shout
  lexicon: BDAG
  rationale: Captures the loud vocal expression commanded here; pairs naturally with
    'break forth'.
- source_word: ἡ οὐκ ὠδίνουσα
  chosen: you who are not in labor
  alternatives:
  - you who do not suffer birth pains
  - you who are not travailing
  lexicon: BDAG
  rationale: ὠδίνω refers to labor pains. 'Not in labor' is clear modern English while
    preserving the maternal metaphor.
- source_word: πολλὰ τὰ τέκνα
  chosen: the children ... are more numerous
  alternatives:
  - many are the children
  - more are the children
  lexicon: BDAG
  rationale: Restructured slightly for natural English while preserving the comparative
    assertion about offspring.
- source_word: τῆς ἐρήμου
  chosen: of the desolate woman
  alternatives:
  - of the deserted woman
  - of the barren one
  lexicon: BDAG
  rationale: In this Isaianic citation, ἔρημος carries the sense of desolation/abandonment,
    not merely wilderness. 'Desolate woman' best matches the metaphorical personal
    referent.
- source_word: μᾶλλον ἢ
  chosen: more numerous than
  alternatives:
  - more than
  lexicon: BDAG
  rationale: Makes the comparison explicit in idiomatic English with reference to
    children/offspring.
- source_word: τῆς ἐχούσης τὸν ἄνδρα
  chosen: those of the woman who has a husband
  alternatives:
  - those of her who has the husband
  - those of the married woman
  lexicon: BDAG
  rationale: ἀνήρ here means 'husband' in contrast to the desolate woman. 'The woman
    who has a husband' is more literal than 'married woman' and preserves the contrast
    structure.
