theological_decisions:
- issue: OT citation and allegorical context in Galatians 4
  chosen_reading: Translate the Isaiah 54:1 quotation straightforwardly without importing
    Paul's later allegorical identification into the wording of the citation itself.
  alternative_readings:
  - Render in a way that anticipates the Jerusalem-above/Sarah referent more explicitly
  rationale: The verse is an explicit Scripture quotation. Optimal equivalence requires
    preserving the quoted prophetic imagery in its own terms and letting Paul's argument
    supply the interpretation in context.
