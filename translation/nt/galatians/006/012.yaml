id: GAL.6.12
reference: Galatians 6:12
source:
  edition: SBLGNT
  text: ὅσοι θέλουσιν εὐπροσωπῆσαι ἐν σαρκί, οὗτοι ἀναγκάζουσιν ὑμᾶς περιτέμνεσθαι,
    μόνον ⸀ἵνα τῷ σταυρῷ τοῦ ⸀Χριστοῦ ⸀μὴ διώκωνται·
translation:
  text: As many as want to make a good showing in the flesh, these are forcing you
    to be circumcised, only so that they may not be persecuted for the cross of the
    Messiah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'make a favorable impression outwardly.'
    reason: lexical_alternative
  - marker: b
    text: 'Traditional: ''the cross of Christ.'''
    reason: alternative_reading
  - marker: c
    text: Or 'so that they may not be persecuted because of the cross of the Messiah.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅσοι
  chosen: As many as
  alternatives:
  - Those who
  - All who
  lexicon: BDAG
  rationale: Introduces a class of people comprehensively. 'As many as' preserves
    the distributive force more formally, while remaining natural enough in context.
- source_word: θέλουσιν
  chosen: want to
  alternatives:
  - desire to
  - wish to
  lexicon: BDAG
  rationale: Expresses volition plainly in modern English. 'Want to' is readable and
    accurately conveys the present active indicative without sounding stilted.
- source_word: εὐπροσωπῆσαι
  chosen: make a good showing
  alternatives:
  - make a favorable impression
  - look good
  lexicon: BDAG
  rationale: The verb refers to presenting oneself favorably or making an outwardly
    impressive appearance. 'Make a good showing' preserves the idiomatic sense and
    the likely critique of external display.
- source_word: ἐν σαρκί
  chosen: in the flesh
  alternatives:
  - outwardly
  - in outward matters
  lexicon: BDAG
  rationale: Given Paul's usage and the doctrine table for σάρξ, 'flesh' should be
    retained where possible. Here the phrase points to outward, bodily, or merely
    external religious markers, especially circumcision. A footnote preserves the
    more interpretive alternative 'outwardly.'
- source_word: οὗτοι
  chosen: these are
  alternatives:
  - they are
  - such people are
  lexicon: BDAG
  rationale: 'The demonstrative adds emphasis: these very people are the ones acting
    this way. ''These are'' preserves that rhetorical force better than a simple ''they.'''
- source_word: ἀναγκάζουσιν
  chosen: are forcing
  alternatives:
  - compel
  - are compelling
  lexicon: BDAG
  rationale: The present tense suggests ongoing pressure. 'Are forcing' communicates
    coercion clearly in contemporary English; 'compel' is possible but slightly less
    immediate.
- source_word: ὑμᾶς περιτέμνεσθαι
  chosen: you to be circumcised
  alternatives:
  - you to receive circumcision
  lexicon: BDAG
  rationale: This infinitival construction is naturally rendered in English as 'you
    to be circumcised.' It preserves the passive sense and the concrete issue in Galatians.
- source_word: μόνον ἵνα
  chosen: only so that
  alternatives:
  - simply in order that
  - only in order that
  lexicon: BDAG
  rationale: Marks the sole motive Paul attributes to them. 'Only so that' is concise
    and preserves the purposive force of ἵνα with the limiting adverb μόνον.
- source_word: τῷ σταυρῷ
  chosen: for the cross
  alternatives:
  - because of the cross
  - on account of the cross
  lexicon: BDAG
  rationale: 'With διώκω in the passive, the dative is best understood as reference/cause:
    persecution in relation to the cross. ''For the cross'' is compact and idiomatic,
    while a footnote preserves the more explicit causal paraphrase.'
- source_word: τοῦ Χριστοῦ
  chosen: of the Messiah
  alternatives:
  - of Christ
  lexicon: BDAG
  rationale: Per DOCTRINE.md, Χριστός is rendered 'Messiah' where functioning as a
    title rather than a name-like form. Here it is a titular genitive modifying 'cross,'
    so 'Messiah' best preserves the meaning.
- source_word: μὴ διώκωνται
  chosen: they may not be persecuted
  alternatives:
  - they might not be persecuted
  lexicon: BDAG
  rationale: Passive subjunctive after ἵνα expresses intended avoidance of persecution.
    'May not be persecuted' is natural and preserves the purpose nuance.
