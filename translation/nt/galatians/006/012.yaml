theological_decisions:
- issue: Rendering Χριστοῦ in Pauline phrase τῷ σταυρῷ τοῦ Χριστοῦ
  chosen_reading: the cross of the Messiah
  alternative_readings:
  - the cross of Christ
  rationale: The translation philosophy directs that Χριστός be translated as 'Messiah'
    where title is in view, and retained as 'Christ' where name-like. In this genitival
    phrase, the titular sense remains active and meaningful, so 'Messiah' is preferred
    while preserving the traditional rendering in a footnote.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; Contested
    terms table for Χριστός'
- issue: Sense of ἐν σαρκί
  chosen_reading: in the flesh
  alternative_readings:
  - outwardly
  - in outward matters
  rationale: Paul's use of σάρξ is theologically loaded, and the doctrine guidance
    prefers 'flesh' when context allows, documenting contextual nuance. Here the phrase
    likely points to external bodily markers and worldly appearance rather than 'sinful
    nature' specifically. The main text preserves the Pauline term; the footnote gives
    the idiomatic sense.
  doctrine_reference: 'DOCTRINE.md: Contested terms table for σάρξ; Preserve theological
    tension rather than resolve it'
