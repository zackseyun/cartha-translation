id: GAL.6.10
reference: Galatians 6:10
source:
  edition: SBLGNT
  text: ἄρα οὖν ὡς καιρὸν ⸀ἔχομεν, ἐργαζώμεθα τὸ ἀγαθὸν πρὸς πάντας, μάλιστα δὲ πρὸς
    τοὺς οἰκείους τῆς πίστεως.
translation:
  text: So then, as we have opportunity, let us do what is good toward everyone, and
    especially toward those who are of the household of faith.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'while we have time.' The Greek καιρός emphasizes an opportune or fitting
      time, not merely time in general.
    reason: lexical_alternative
  - marker: b
    text: Or 'the family of faith' or 'members of the household of faith.' The Greek
      uses household language for those who belong to the believing community.
    reason: lexical_alternative
  - marker: c
    text: '''Faith'' could also be understood as ''the faith'' in the sense of the
      shared Christian confession.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἄρα οὖν
  chosen: So then
  alternatives:
  - Therefore
  - Consequently then
  lexicon: BDAG
  rationale: The paired inferential particles draw a conclusion from the preceding
    argument. 'So then' is natural modern English and preserves the logical force
    without sounding wooden.
- source_word: ὡς καιρὸν ἔχομεν
  chosen: as we have opportunity
  alternatives:
  - while we have time
  - as we have occasion
  lexicon: BDAG
  rationale: καιρός here denotes a fitting or opportune time rather than mere chronological
    duration. 'As we have opportunity' captures the idiomatic sense of having occasion
    or favorable time to act.
- source_word: ἐργαζώμεθα
  chosen: let us do
  alternatives:
  - let us work
  - let us practice
  lexicon: BDAG
  rationale: 'The present middle subjunctive is hortatory: Paul exhorts the community
    to ongoing action. ''Let us do'' is idiomatic with the object τὸ ἀγαθόν and avoids
    an overly literal ''work the good''.'
- source_word: τὸ ἀγαθὸν
  chosen: what is good
  alternatives:
  - the good
  - good
  lexicon: BDAG
  rationale: The articular neuter adjective functions substantivally. 'What is good'
    is clear English and preserves the moral quality of the action better than the
    more abstract 'the good' in this context.
- source_word: πρὸς πάντας
  chosen: toward everyone
  alternatives:
  - to all
  - for all people
  lexicon: BDAG
  rationale: πρός with the accusative here marks direction of action toward persons.
    'Toward everyone' is natural and inclusive of all people without adding words
    not in the Greek.
- source_word: μάλιστα δὲ
  chosen: and especially
  alternatives:
  - but especially
  - most of all
  lexicon: BDAG
  rationale: μάλιστα marks a special priority within the broader command, not an exclusion
    of others. 'And especially' fits the additive flow in English while preserving
    the emphasis.
- source_word: τοὺς οἰκείους τῆς πίστεως
  chosen: those who are of the household of faith
  alternatives:
  - the family of the faith
  - those belonging to the faith
  - members of the household of faith
  lexicon: BDAG
  rationale: οἰκεῖοι denotes members of a household or those belonging to a household.
    The genitive τῆς πίστεως identifies the household by faith. 'Those who are of
    the household of faith' preserves the familial metaphor and avoids over-specifying
    institutional membership.
- source_word: πίστεως
  chosen: faith
  alternatives:
  - faithfulness
  - the faith
  lexicon: BDAG
  rationale: Per project defaults, πίστις is rendered 'faith' unless context strongly
    requires otherwise. Here the genitive likely denotes the shared sphere or identity
    of believers; English 'faith' preserves that while the idiom 'household of faith'
    remains recognizable.
