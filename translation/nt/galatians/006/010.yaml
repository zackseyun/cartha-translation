theological_decisions:
- issue: Scope and priority of Christian beneficence
  chosen_reading: The verse commands doing good to all people, with particular priority
    given to fellow believers.
  alternative_readings:
  - The verse commands doing good only to believers
  - The verse erases any special obligation to fellow believers
  rationale: The Greek sets a universal scope (πρὸς πάντας) and then adds a special
    emphasis (μάλιστα ... πρὸς τοὺς οἰκείους τῆς πίστεως). The translation preserves
    both the universal command and the intensified obligation toward the believing
    community without collapsing either side.
  doctrine_reference: Preserve theological tension rather than resolve it
- issue: Meaning of τῆς πίστεως in the phrase 'household of faith'
  chosen_reading: '''Faith'' is retained in the main text as the identifying characteristic
    of the household.'
  alternative_readings:
  - '''the faith'' as a more creedal or confessional sense'
  - '''faithfulness'' as a quality'
  rationale: The project default for πίστις is 'faith.' In this idiom, English readers
    may also hear 'the faith,' but the source does not require a more institutional
    or doctrinally narrowed sense. Retaining 'faith' keeps the phrase broad and textually
    grounded.
  doctrine_reference: 'Contested terms: πίστις → faith'
