theological_decisions:
- issue: Relation of Galatians 6:5 to 6:2
  chosen_reading: The verse is rendered to preserve the lexical distinction between
    'burdens' in v.2 and 'load' here, without forcing a theological contradiction
    or harmonization beyond the Greek.
  alternative_readings:
  - Render both verses with 'burden' and leave the distinction implicit
  - Interpret v.5 specifically as eschatological accountability and encode that in
    translation
  rationale: Paul uses different nouns in the immediate context. Translating φορτίον
    as 'load' preserves the tension that believers are to help carry overwhelming
    burdens (v.2) while each person remains responsible for his own load (v.5). The
    translation avoids importing a specific doctrinal resolution into the main text.
  doctrine_reference: Translation philosophy §§3, 5
