id: GAL.6.5
reference: Galatians 6:5
source:
  edition: SBLGNT
  text: ἕκαστος γὰρ τὸ ἴδιον φορτίον βαστάσει.
translation:
  text: For each one will carry his own load.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'bear his own burden.' The Greek uses φορτίον ('load') here, distinct
      from βάρη ('burdens') in verse 2.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἕκαστος
  chosen: each one
  alternatives:
  - each
  - everyone
  lexicon: BDAG
  rationale: Indefinite distributive singular, emphasizing each individual person.
    'Each one' preserves the singular force more clearly than 'everyone.'
- source_word: γὰρ
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: BDAG
  rationale: Standard explanatory connective linking this statement to the preceding
    context. 'For' best preserves the logical relation without overinterpreting it.
- source_word: τὸ ἴδιον
  chosen: his own
  alternatives:
  - one's own
  - their own
  lexicon: BDAG
  rationale: ἴδιος stresses what belongs peculiarly to oneself. Because ἕκαστος is
    grammatically masculine singular with representative force, 'his own' follows
    the project's gender-accurate policy. More inclusive alternatives are possible
    in English but would soften the source's grammatical form.
- source_word: φορτίον
  chosen: load
  alternatives:
  - burden
  - cargo
  lexicon: BDAG
  rationale: 'φορτίον denotes a load or burden to be carried. ''Load'' is preferred
    here to distinguish it from βάρη (''burdens'') in the immediately preceding verse,
    preserving Paul''s nuance: v.2 speaks of burdens believers help bear, while v.5
    speaks of each person''s own load/responsibility.'
- source_word: βαστάσει
  chosen: will carry
  alternatives:
  - will bear
  lexicon: BDAG
  rationale: Future active indicative, expressing what each person will do. 'Will
    carry' is natural modern English and pairs well with 'load'; 'will bear' is possible
    but slightly more formal and less concrete.
