theological_decisions:
- issue: Rendering of Χριστός in a Pauline closing benediction
  chosen_reading: Messiah
  alternative_readings:
  - Christ
  rationale: The project default is to translate Χριστός as 'Messiah' where it functions
    as a title. In this blessing formula, the titular sense remains intelligible in
    English and preserves the term's meaning rather than relying on inherited transliteration.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; Contested
    terms table for Χριστός'
- issue: Rendering of ἀδελφοί for a mixed Christian audience
  chosen_reading: brothers
  alternative_readings:
  - brothers and sisters
  rationale: The Greek form is grammatically masculine plural and likely addresses
    the whole congregation representatively. Per doctrine, the main text remains gender-accurate
    to the source, with inclusivity noted in a footnote rather than absorbed into
    the main text.
  doctrine_reference: 'DOCTRINE.md: Gender-accurate over gender-neutral'
