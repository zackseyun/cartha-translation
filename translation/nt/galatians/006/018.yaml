id: GAL.6.18
reference: Galatians 6:18
source:
  edition: SBLGNT
  text: Ἡ χάρις τοῦ κυρίου ἡμῶν Ἰησοῦ Χριστοῦ μετὰ τοῦ πνεύματος ὑμῶν, ἀδελφοί· ἀμήν.
translation:
  text: The grace of our Lord Jesus Messiah be with your spirit, brothers. Amen.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more traditionally, 'Jesus Christ.' The Greek title Χριστός is rendered
      'Messiah' here to preserve its meaning.
    reason: alternative_reading
  - marker: b
    text: '''Brothers'' here addresses the believing community and can include both
      men and women; alternatively, ''brothers and sisters.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: χάρις
  chosen: grace
  alternatives:
  - favor
  - gracious gift
  lexicon: BDAG
  rationale: Standard Pauline benediction term; 'grace' preserves both theological
    weight and idiomatic familiarity in closing blessings.
- source_word: κυρίου
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Follows the project's default rendering for κύριος and matches early
    Christian confessional usage.
- source_word: Ἰησοῦ Χριστοῦ
  chosen: Jesus Messiah
  alternatives:
  - Jesus Christ
  lexicon: BDAG
  rationale: Χριστός functions as a title here rather than merely a name-like second
    element, so 'Messiah' best preserves meaning per project philosophy, while 'Jesus
    Christ' is preserved as a familiar alternative.
- source_word: μετὰ
  chosen: be with
  alternatives:
  - with
  lexicon: BDAG
  rationale: The Greek is verbless in benedictory style; supplying 'be' is required
    in natural English and accurately conveys the blessing formula.
- source_word: πνεύματος ὑμῶν
  chosen: your spirit
  alternatives:
  - you
  - your inner being
  lexicon: BDAG
  rationale: A more literal rendering preserves Paul's wording and avoids flattening
    πνεῦμα into a generic pronoun. Singular 'spirit' with plural 'your' reflects the
    Greek construction addressed to the community.
- source_word: ἀδελφοί
  chosen: brothers
  alternatives:
  - brothers and sisters
  - siblings
  lexicon: BDAG
  rationale: Per project philosophy, gender-accurate rendering is preferred. The masculine
    plural vocative is retained as 'brothers,' while the mixed-group sense is preserved
    in a footnote.
- source_word: ἀμήν
  chosen: Amen
  lexicon: BDAG
  rationale: Conventional transliteration appropriately preserves the liturgical closing
    formula.
