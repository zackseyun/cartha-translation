id: GAL.6.11
reference: Galatians 6:11
source:
  edition: SBLGNT
  text: Ἴδετε πηλίκοις ὑμῖν γράμμασιν ἔγραψα τῇ ἐμῇ χειρί.
translation:
  text: See with what large letters I have written to you with my own hand.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'See what a long letter I have written to you with my own hand.'
    reason: alternative_reading
lexical_decisions:
- source_word: Ἴδετε
  chosen: See
  alternatives:
  - Look
  - Notice
  lexicon: BDAG
  rationale: Aorist imperative plural from ὁράω functioning as an attention-getter.
    'See' is concise and idiomatic in English, preserving the direct exhortation better
    than the slightly more interpretive 'notice.'
- source_word: πηλίκοις
  chosen: large
  alternatives:
  - how large
  - what large
  - how big
  lexicon: BDAG
  rationale: πηλίκος can denote size or degree ('how large/how great'). In this construction
    with γράμμασιν, the most natural sense is the size of the letters. English idiom
    requires an adjective such as 'large' rather than a more wooden rendering alone.
- source_word: γράμμασιν
  chosen: letters
  alternatives:
  - characters
  - writing
  lexicon: BDAG
  rationale: γράμμα commonly means 'letter' of the alphabet or written characters.
    Here the dative plural with πηλίκοις naturally yields 'with what large letters,'
    referring to the physical script rather than to the length of the epistle.
- source_word: ὑμῖν
  chosen: to you
  alternatives:
  - for you
  lexicon: BDAG
  rationale: 'The dative pronoun is best taken as the indirect object of ἔγραψα: Paul
    wrote to the Galatians. ''To you'' is the most straightforward rendering.'
- source_word: ἔγραψα
  chosen: I have written
  alternatives:
  - I wrote
  lexicon: BDAG
  rationale: The aorist can be rendered as simple past, but in epistolary context
    English often uses the present perfect naturally to refer to what stands written
    in the letter now received. This preserves the immediacy of the written document
    without overinterpreting the tense.
- source_word: τῇ ἐμῇ χειρί
  chosen: with my own hand
  alternatives:
  - by my own hand
  - with my hand
  lexicon: BDAG
  rationale: The dative phrase is instrumental. Adding 'own' brings out the emphatic
    force of ἐμῇ in natural English and highlights that Paul is personally writing
    this portion rather than using a secretary.
