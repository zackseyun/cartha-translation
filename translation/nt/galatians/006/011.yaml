theological_decisions:
- issue: Interpretation of πηλίκοις γράμμασιν
  chosen_reading: physical size of the letters
  alternative_readings:
  - how long a letter I have written to you
  rationale: The phrase can be taken either as referring to large handwriting or to
    the length of the letter. Given the normal sense of γράμματα as letters/characters
    and the immediate mention of writing 'with my own hand,' the physical-size reading
    is more likely here. The alternative is preserved in a footnote because it has
    historical support and affects interpretation of Paul's emphasis.
  doctrine_reference: 'Translation philosophy §3: preserve theological tension rather
    than resolve it where ambiguity is genuine.'
