- issue: Rendering Χριστοῦ
  chosen_reading: the Messiah
  alternative_readings:
  - Christ
  rationale: The phrase τὸν νόμον τοῦ Χριστοῦ uses Χριστός as a title. Following the
    project's default, the title is translated to preserve its meaning and Jewish-messianic
    context. 'Christ' is preserved as an alternative because of strong English tradition.
