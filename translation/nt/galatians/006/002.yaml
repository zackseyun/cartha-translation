id: GAL.6.2
reference: Galatians 6:2
source:
  edition: SBLGNT
  text: ἀλλήλων τὰ βάρη βαστάζετε, καὶ οὕτως ⸀ἀναπληρώσετε τὸν νόμον τοῦ Χριστοῦ.
translation:
  text: Carry one another’s burdens, and in this way you will fulfill the law of the
    Messiah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or: “the law of Christ.”'
    reason: alternative_reading
lexical_decisions:
- source_word: ἀλλήλων
  chosen: one another’s
  alternatives:
  - each other’s
  lexicon: BDAG
  rationale: Reciprocal pronoun indicating mutuality within the community. 'One another’s'
    is standard, natural English and preserves the reciprocal force.
- source_word: βάρη
  chosen: burdens
  alternatives:
  - loads
  - weights
  lexicon: BDAG
  rationale: βάρος commonly denotes a weight or burden, here metaphorically the difficulties
    or pressures borne by believers. 'Burdens' is the clearest idiomatic rendering
    in this ethical context.
- source_word: βαστάζετε
  chosen: Carry
  alternatives:
  - bear
  - help carry
  lexicon: BDAG
  rationale: Present imperative plural calls for ongoing action. 'Carry' is natural
    modern English and fits well with 'burdens'; 'bear' is possible but slightly less
    accessible. The imperative force is preserved.
- source_word: οὕτως
  chosen: in this way
  alternatives:
  - thus
  - so
  lexicon: BDAG
  rationale: Adverb linking the command to its result. 'In this way' is clearer in
    contemporary English than 'thus' and makes the inferential connection explicit
    without overtranslation.
- source_word: ἀναπληρώσετε
  chosen: you will fulfill
  alternatives:
  - you will complete
  - you will fully carry out
  lexicon: BDAG
  rationale: 'Future indicative plural. The future here expresses the result of obeying
    the command: by carrying one another''s burdens, the readers will fulfill the
    law in question. ''Fulfill'' is the most idiomatic rendering with νόμον.'
- source_word: νόμον
  chosen: law
  alternatives:
  - principle
  lexicon: BDAG
  rationale: νόμος normally means 'law.' Although some interpret it more broadly as
    an ethical principle, 'law' best preserves Paul's wording and the intertextual
    resonance with covenantal/ethical obligation.
- source_word: τοῦ Χριστοῦ
  chosen: of the Messiah
  alternatives:
  - of Christ
  lexicon: BDAG
  rationale: 'Per project doctrine, Χριστός is translated as ''Messiah'' where used
    as a title rather than a name-like form. Here the genitive modifies ''law'' and
    functions titulary: the law belonging to or characterized by the Messiah.'
