id: GAL.6.4
reference: Galatians 6:4
source:
  edition: SBLGNT
  text: τὸ δὲ ἔργον ἑαυτοῦ δοκιμαζέτω ἕκαστος, καὶ τότε εἰς ἑαυτὸν μόνον τὸ καύχημα
    ἕξει καὶ οὐκ εἰς τὸν ἕτερον,
translation:
  text: But let each one test his own work, and then he will have his reason for boasting
    in himself alone and not in the other person,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'ground for boasting' or simply 'boast.' The Greek term can refer either
      to the act of boasting or to the basis for it.
    reason: lexical_alternative
  - marker: b
    text: Greek 'the other,' meaning another person in contrast to oneself.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔργον
  chosen: work
  alternatives:
  - deed
  - action
  lexicon: BDAG
  rationale: '''Work'' is the broadest natural English equivalent here, covering one''s
    conduct or output without narrowing to a single act. In context Paul speaks of
    examining one''s own conduct rather than comparing oneself with others.'
- source_word: δοκιμαζέτω
  chosen: let ... test
  alternatives:
  - examine
  - prove
  - approve after testing
  lexicon: BDAG
  rationale: The imperative calls for personal evaluation. 'Test' preserves the sense
    of examining something to determine its quality, without overinterpreting the
    result as necessarily positive.
- source_word: ἕκαστος
  chosen: each one
  alternatives:
  - each person
  - everyone
  lexicon: BDAG
  rationale: '''Each one'' keeps the distributive force and matches the singular verbs
    that follow.'
- source_word: ἑαυτοῦ
  chosen: his own
  alternatives:
  - one's own
  lexicon: BDAG
  rationale: The reflexive points to the subject's own work. 'His own' reflects the
    grammatically masculine singular in a representative sense, in keeping with the
    project's gender-accurate policy.
- source_word: εἰς ἑαυτὸν μόνον
  chosen: in himself alone
  alternatives:
  - with respect to himself alone
  - for himself alone
  lexicon: BDAG
  rationale: The phrase contrasts self-assessment with comparison to another. 'In
    himself alone' is idiomatic English that preserves the reflexive focus and the
    limiting force of μόνον.
- source_word: καύχημα
  chosen: reason for boasting
  alternatives:
  - ground for boasting
  - boast
  lexicon: BDAG
  rationale: καύχημα can denote the basis or matter of boasting, not merely the act
    itself. 'Reason for boasting' communicates that nuance clearly in modern English.
- source_word: ἕξει
  chosen: he will have
  alternatives:
  - he will possess
  lexicon: BDAG
  rationale: A straightforward future is best here, expressing the result that follows
    from testing one's own work.
- source_word: τὸν ἕτερον
  chosen: the other person
  alternatives:
  - another
  - the other man
  lexicon: BDAG
  rationale: ἕτερον refers to another person in contrast to oneself. 'The other person'
    makes the interpersonal comparison explicit and avoids an overly literal but less
    natural 'the other.'
- source_word: δέ
  chosen: But
  alternatives:
  - Now
  - And
  lexicon: BDAG
  rationale: δέ marks a mild contrast with the preceding instruction. 'But' best signals
    that Paul is shifting from bearing another's burdens to examining one's own work.
