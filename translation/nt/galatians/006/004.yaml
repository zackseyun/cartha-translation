theological_decisions:
- issue: Sense of καύχημα in Pauline context
  chosen_reading: Rendered as 'reason for boasting' rather than a flat 'boast.'
  alternative_readings:
  - '''boast'''
  - '''ground for pride'''
  rationale: This preserves Paul's wording without importing a positive modern notion
    of 'pride.' It also avoids resolving whether the boasting is commendable self-satisfaction
    or simply a legitimate basis for confidence before God; the text itself focuses
    on non-comparative evaluation.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Representative masculine language
  chosen_reading: Used 'his own' and 'he will have' for the singular generic subject.
  alternative_readings:
  - '''their own'' / ''they will have'''
  - '''one''s own'' / ''one will have'''
  rationale: The Greek is grammatically masculine singular with generic force. Per
    the project's gender-accurate policy, the translation reflects the source form
    rather than neutralizing it in the main text.
  doctrine_reference: 'Translation philosophy §4: Gender-accurate over gender-neutral.'
