id: GAL.6.6
reference: Galatians 6:6
source:
  edition: SBLGNT
  text: Κοινωνείτω δὲ ὁ κατηχούμενος τὸν λόγον τῷ κατηχοῦντι ἐν πᾶσιν ἀγαθοῖς.
translation:
  text: Now let the one who is taught the word share in all good things with the one
    who teaches.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'share all good things with the one who teaches,' likely including material
      support.
    reason: lexical_alternative
lexical_decisions:
- source_word: Κοινωνείτω
  chosen: let ... share
  alternatives:
  - have fellowship
  - share with
  - contribute to
  lexicon: BDAG
  rationale: The present active imperative calls for an ongoing practice. κοινωνέω
    here most naturally means to share materially or practically, not merely to enjoy
    fellowship, given the object phrase 'in all good things' and the dative recipient.
    'Let ... share' preserves the imperative force and allows the following dative
    phrase to indicate the person with whom the sharing is done.
- source_word: δὲ
  chosen: Now
  alternatives:
  - And
  - But
  - ''
  lexicon: BDAG
  rationale: δέ marks a mild transition rather than strong contrast. 'Now' gives a
    natural English connective without overstating adversative force.
- source_word: ὁ κατηχούμενος
  chosen: the one who is taught
  alternatives:
  - the one being instructed
  - the catechumen
  lexicon: BDAG
  rationale: The present passive participle denotes the person receiving instruction.
    'The one who is taught' is clear modern English and avoids importing later technical
    ecclesial sense through 'catechumen,' though the Greek is the source of that term.
- source_word: τὸν λόγον
  chosen: the word
  alternatives:
  - the message
  - the teaching
  lexicon: BDAG
  rationale: λόγος here refers to the Christian message/instruction being taught.
    'The word' preserves the familiar Pauline expression while remaining understandable;
    'message' is possible but less textually transparent.
- source_word: τῷ κατηχοῦντι
  chosen: the one who teaches
  alternatives:
  - the instructor
  - the one instructing
  lexicon: BDAG
  rationale: The present active participle identifies the person giving instruction.
    'The one who teaches' is idiomatic and matches the passive participle earlier
    in the verse.
- source_word: ἐν πᾶσιν ἀγαθοῖς
  chosen: in all good things
  alternatives:
  - with all good things
  - in every good thing
  lexicon: BDAG
  rationale: The phrase likely refers to material and practical goods shared with
    the teacher. Retaining 'in all good things' stays close to the Greek while allowing
    the breadth of the expression; English readers can infer tangible support from
    context. 'With all good things' is also viable and is preserved in a footnote
    as a lexical alternative.
