theological_decisions:
- issue: Nature of the sharing commanded
  chosen_reading: The verse instructs the taught person to share good things, likely
    including material support, with the teacher of the word.
  alternative_readings:
  - The verse speaks only of general spiritual fellowship, not material support.
  rationale: The combination of κοινωνέω with the dative recipient and the phrase
    'in all good things' strongly suggests practical sharing, commonly understood
    as material support, though the wording is broad enough not to limit it exclusively
    to money. The translation preserves that breadth rather than narrowing the command.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather
    than resolve it
