theological_decisions:
- issue: Relationship between the two perseverance expressions (ἐγκακῶμεν / ἐκλυόμενοι)
  chosen_reading: 'Render them with differentiated but related English: ''grow weary''
    and ''give up.'''
  alternative_readings:
  - '''lose heart'' ... ''fainting'''
  - '''be discouraged'' ... ''not becoming weary'''
  rationale: Paul uses two related but not identical expressions. Differentiating
    them avoids flattening the rhetoric while preserving the exhortation to perseverance.
    No doctrinal issue is resolved beyond the text's own emphasis.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented
    exception)
