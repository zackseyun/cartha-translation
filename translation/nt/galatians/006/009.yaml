id: GAL.6.9
reference: Galatians 6:9
source:
  edition: SBLGNT
  text: τὸ δὲ καλὸν ποιοῦντες μὴ ⸀ἐγκακῶμεν, καιρῷ γὰρ ἰδίῳ θερίσομεν μὴ ἐκλυόμενοι.
translation:
  text: And let us not grow weary in doing good, for in due time we will reap, if
    we do not give up.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'let us not lose heart in doing what is good.'
    reason: lexical_alternative
  - marker: b
    text: Or 'at the proper time.'
    reason: lexical_alternative
  - marker: c
    text: Literally, 'not becoming exhausted' or 'not fainting.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τὸ καλὸν
  chosen: doing good
  alternatives:
  - what is good
  - the good
  lexicon: BDAG
  rationale: The articular neuter adjective with ποιέω forms an idiom meaning to do
    what is good or noble. 'Doing good' is natural English and preserves the ethical
    sense without over-literal awkwardness.
- source_word: ποιοῦντες
  chosen: in doing
  alternatives:
  - while doing
  - as we do
  lexicon: BDAG
  rationale: The present participle modifies the exhortation and is best represented
    adverbially in English. 'In doing' fits the idiom with τὸ καλὸν and keeps the
    ongoing aspect.
- source_word: μὴ ἐγκακῶμεν
  chosen: let us not grow weary
  alternatives:
  - let us not lose heart
  - let us not become discouraged
  lexicon: BDAG
  rationale: The verb can mean to lose courage or become weary in the sense of giving
    in. 'Grow weary' fits the agricultural perseverance context and pairs well with
    the later warning not to give up.
- source_word: καιρῷ ... ἰδίῳ
  chosen: in due time
  alternatives:
  - at the proper time
  - in its own time
  lexicon: BDAG
  rationale: καιρός denotes an appointed or fitting time, and ἴδιος adds the sense
    of what is proper or one's own. 'In due time' is idiomatic English that conveys
    the idea of the fitting appointed season.
- source_word: θερίσομεν
  chosen: we will reap
  alternatives:
  - we will harvest
  lexicon: BDAG
  rationale: The future verb continues the agricultural metaphor already present in
    the surrounding context. 'Reap' is the standard English equivalent and preserves
    the metaphorical force.
- source_word: μὴ ἐκλυόμενοι
  chosen: if we do not give up
  alternatives:
  - not fainting
  - without becoming exhausted
  - if we do not lose heart
  lexicon: BDAG
  rationale: The participle denotes becoming exhausted, discouraged, or giving out.
    In English, 'if we do not give up' clearly expresses the conditional force and
    distinguishes it from the earlier ἐγκακῶμεν while preserving the perseverance
    theme.
