theological_decisions:
- issue: Meaning of σάρξ in this context
  chosen_reading: literal bodily 'flesh' referring to the physical mark of circumcision
  alternative_readings:
  - metaphorical 'sinful nature'
  rationale: Because the immediate context is circumcision, Paul's reference is to
    the Galatians' physical bodies as the sphere in which the agitators seek a visible
    basis for boasting. Rendering as 'sinful nature' would import a theological sense
    not warranted here.
  doctrine_reference: 'DOCTRINE.md Contested terms: σάρξ = ''flesh'' (literal) / ''sinful
    nature'' (metaphorical), context-dependent'
- issue: Force of the participle περιτεμνόμενοι
  chosen_reading: descriptive label 'those who are circumcised'
  alternative_readings:
  - '''those who have themselves circumcised'''
  - '''those promoting circumcision'''
  rationale: The participle most naturally identifies the group by circumcision status/practice.
    The broader context shows these are the circumcision advocates, but the translation
    should not collapse the wording into an interpretive paraphrase.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; never paraphrase beyond what the source warrants'
