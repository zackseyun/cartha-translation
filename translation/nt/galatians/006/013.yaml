id: GAL.6.13
reference: Galatians 6:13
source:
  edition: SBLGNT
  text: οὐδὲ γὰρ οἱ ⸀περιτεμνόμενοι αὐτοὶ νόμον φυλάσσουσιν, ἀλλὰ θέλουσιν ὑμᾶς περιτέμνεσθαι
    ἵνα ἐν τῇ ὑμετέρᾳ σαρκὶ καυχήσωνται.
translation:
  text: For not even those who are circumcised themselves keep the law, but they want
    you to be circumcised so that they may boast in your flesh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''the circumcised.'' The Greek uses a substantival participle: ''those
      being circumcised / those who are circumcised.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐδὲ γὰρ
  chosen: For not even
  alternatives:
  - For even ... not
  - Indeed not even
  lexicon: BDAG
  rationale: Combines γάρ's explanatory force ('for') with οὐδέ's emphatic negation
    ('not even'). This preserves Paul's argumentative connection to the previous verse
    and the emphasis that the very people in view fail in what they promote.
- source_word: οἱ περιτεμνόμενοι
  chosen: those who are circumcised
  alternatives:
  - the circumcised
  - those advocating circumcision
  lexicon: BDAG
  rationale: The present participle with article functions substantivally. 'Those
    who are circumcised' is clear modern English and stays close to the Greek. 'Those
    advocating circumcision' would over-interpret; the text identifies them by circumcision,
    not merely advocacy.
- source_word: αὐτοὶ
  chosen: themselves
  alternatives:
  - themselves also
  - they themselves
  lexicon: BDAG
  rationale: 'Adds emphasis to the subject: even they themselves do not keep the law.
    English ''themselves'' captures the reflexive/emphatic force naturally.'
- source_word: νόμον φυλάσσουσιν
  chosen: keep the law
  alternatives:
  - observe the law
  - guard the law
  lexicon: BDAG
  rationale: Standard idiomatic rendering in Pauline context. 'Keep' best matches
    common English for obeying Torah requirements without sounding wooden.
- source_word: ἀλλὰ θέλουσιν
  chosen: but they want
  alternatives:
  - but they desire
  - but they wish
  lexicon: BDAG
  rationale: Simple, direct English that preserves the volitional sense without unnecessary
    formality.
- source_word: ὑμᾶς περιτέμνεσθαι
  chosen: you to be circumcised
  alternatives:
  - you to get circumcised
  - you to undergo circumcision
  lexicon: BDAG
  rationale: Natural English infinitival construction reflecting the passive/middle
    infinitive. 'Be circumcised' is more formal and textually transparent than 'get
    circumcised.'
- source_word: ἵνα
  chosen: so that
  alternatives:
  - in order that
  - so they can
  lexicon: BDAG
  rationale: Expresses purpose clearly and directly.
- source_word: ἐν τῇ ὑμετέρᾳ σαρκὶ
  chosen: in your flesh
  alternatives:
  - because of your flesh
  - in your bodily flesh
  lexicon: BDAG
  rationale: Here σάρξ refers literally to the physical body in relation to circumcision,
    not metaphorically to sinful nature. The default rendering 'flesh' is retained
    per doctrine guidance, since the bodily sense is contextually salient.
- source_word: καυχήσωνται
  chosen: they may boast
  alternatives:
  - they may brag
  - they may glory
  lexicon: BDAG
  rationale: '''Boast'' is standard Pauline English and preserves the negative rhetorical
    force here without colloquial flattening.'
