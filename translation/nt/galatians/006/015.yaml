id: GAL.6.15
reference: Galatians 6:15
source:
  edition: SBLGNT
  text: ⸂οὔτε γὰρ⸃ περιτομή τί ⸀ἐστιν οὔτε ἀκροβυστία, ἀλλὰ καινὴ κτίσις.
translation:
  text: For neither circumcision is anything, nor uncircumcision, but a new creation.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'counts for anything' or 'is of any value.'
    reason: lexical_alternative
  - marker: b
    text: Or simply 'new creation'; alternatively, less likely in context, 'a new
      creature.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οὔτε γὰρ
  chosen: For neither
  alternatives:
  - For not even
  - Indeed neither
  lexicon: BDAG
  rationale: γάρ is retained as explanatory 'for,' linking this statement to the prior
    argument; οὔτε introduces the first member of the neither/nor construction.
- source_word: περιτομή
  chosen: circumcision
  lexicon: BDAG
  rationale: Standard lexical sense; in Pauline context it refers both to the physical
    rite and to Jewish covenantal identity marked by that rite. 'Circumcision' preserves
    the concrete and theological force.
- source_word: τί ἐστιν
  chosen: is anything
  alternatives:
  - counts for anything
  - is of any value
  lexicon: BDAG
  rationale: The idiom τί ἐστιν here expresses insignificance or lack of decisive
    value. 'Is anything' is a close, natural rendering that preserves the terse Greek
    without over-interpreting.
- source_word: οὔτε ἀκροβυστία
  chosen: nor uncircumcision
  alternatives:
  - nor foreskin
  - nor being uncircumcised
  lexicon: BDAG
  rationale: In Paul this term functions as the counterpart to 'circumcision,' denoting
    Gentile uncircumcised status. 'Uncircumcision' is the established and accurate
    contextual gloss; 'foreskin' would be too literal and misleading in English here.
- source_word: ἀλλὰ
  chosen: but
  alternatives:
  - rather
  - except
  lexicon: BDAG
  rationale: Strong adversative marking the true point of significance in contrast
    to both prior categories.
- source_word: καινὴ κτίσις
  chosen: a new creation
  alternatives:
  - new creation
  - a new creature
  lexicon: BDAG
  rationale: καινὴ emphasizes newness in kind, and κτίσις can denote creation or creature.
    In Pauline usage here, 'a new creation' best preserves the breadth of renewed
    reality in Messiah rather than reducing it merely to an individual 'creature.'
    The supplied English article makes the verbless contrast idiomatic.
