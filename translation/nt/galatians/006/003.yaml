id: GAL.6.3
reference: Galatians 6:3
source:
  edition: SBLGNT
  text: εἰ γὰρ δοκεῖ τις εἶναί τι μηδὲν ὤν, ⸂φρεναπατᾷ ἑαυτόν⸃·
translation:
  text: For if anyone thinks he is something when he is nothing, he deceives himself.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'deludes himself.'
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰ γὰρ
  chosen: For if
  alternatives:
  - If indeed
  - For whenever
  lexicon: BDAG
  rationale: The combination introduces an explanatory conditional tied to the previous
    exhortation. 'For if' preserves both γάρ's explanatory force and εἰ's conditional
    sense in natural English.
- source_word: δοκεῖ
  chosen: thinks
  alternatives:
  - supposes
  - imagines
  - seems
  lexicon: BDAG
  rationale: Here δοκέω refers to a person's self-assessment rather than outward appearance.
    'Thinks' is idiomatic and clear; 'seems' would suggest appearance to others rather
    than self-estimation.
- source_word: τις
  chosen: anyone
  alternatives:
  - someone
  - a person
  lexicon: BDAG
  rationale: Indefinite τις is generic. 'Anyone' communicates the broad, representative
    force naturally in English.
- source_word: εἶναί τι
  chosen: he is something
  alternatives:
  - to be something
  - he is important
  - he amounts to something
  lexicon: BDAG
  rationale: The idiom τι εἶναι means to be 'something,' that is, to regard oneself
    as significant. The more literal 'he is something' preserves Paul's concise contrast
    with 'nothing.'
- source_word: μηδὲν ὤν
  chosen: when he is nothing
  alternatives:
  - though he is nothing
  - being nothing
  lexicon: BDAG
  rationale: μηδέν functions predicatively with ὤν. 'When he is nothing' preserves
    the participial relation in smooth English without overstating concession. 'Though
    he is nothing' is possible, but 'when' better leaves the syntax less interpretively
    loaded.
- source_word: φρεναπατᾷ
  chosen: deceives
  alternatives:
  - deludes
  - misleads
  lexicon: BDAG
  rationale: The verb means to deceive or lead astray in one's mind. 'Deceives' is
    the clearest standard English equivalent; 'deludes' is possible but slightly more
    interpretive.
- source_word: ἑαυτόν
  chosen: himself
  alternatives:
  - his own self
  lexicon: BDAG
  rationale: Reflexive pronoun referring back to the generic singular subject. 'Himself'
    matches the grammatically masculine singular form and follows the project's gender-accurate
    policy for representative masculine usage.
