id: GAL.6.16
reference: Galatians 6:16
source:
  edition: SBLGNT
  text: καὶ ὅσοι τῷ κανόνι τούτῳ στοιχήσουσιν, εἰρήνη ἐπ’ αὐτοὺς καὶ ἔλεος, καὶ ἐπὶ
    τὸν Ἰσραὴλ τοῦ θεοῦ.
translation:
  text: And as many as will walk by this rule—peace be upon them and mercy, and upon
    the Israel of God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all who will follow this standard.' The verb carries the sense of walking
      in line with or keeping in step with a rule.
    reason: lexical_alternative
  - marker: b
    text: '''The Israel of God'' is debated: Paul may mean believing Jews, the whole
      church, or God''s people more broadly. The translation preserves the Greek wording
      without resolving the debate.'
    reason: alternative_reading
  - marker: c
    text: The final 'and' may be read either as adding a further group ('and upon
      the Israel of God') or as restating the same group ('even upon the Israel of
      God').
    reason: alternative_reading
lexical_decisions:
- source_word: ὅσοι
  chosen: as many as
  alternatives:
  - all who
  - whoever
  lexicon: BDAG
  rationale: Retains the distributive/indefinite force of the relative pronoun in
    a natural but still fairly formal English expression. 'All who' is possible, but
    'as many as' better mirrors the Greek structure.
- source_word: κανόνι
  chosen: rule
  alternatives:
  - standard
  - principle
  lexicon: BDAG
  rationale: κανών here refers to a norm or standard by which one orders conduct.
    'Rule' is concise and traditional without being archaic; 'standard' is viable
    but slightly more interpretive.
- source_word: στοιχήσουσιν
  chosen: will walk by
  alternatives:
  - will follow
  - will live according to
  - will keep in step with
  lexicon: BDAG
  rationale: στοιχέω literally conveys walking in line or keeping in step according
    to a standard. 'Walk by' preserves the metaphor and fits Pauline ethical usage
    better than the flatter 'follow.'
- source_word: εἰρήνη
  chosen: peace
  lexicon: BDAG
  rationale: Standard rendering for εἰρήνη; here it functions as part of a benedictory
    wish.
- source_word: ἔλεος
  chosen: mercy
  lexicon: BDAG
  rationale: Standard rendering; paired with 'peace' in a blessing formula.
- source_word: ἐπ’ αὐτοὺς ... καὶ ἐπὶ
  chosen: upon them ... and upon
  alternatives:
  - on them ... and on
  - to them ... and to
  lexicon: BDAG
  rationale: Using 'upon' preserves the repeated preposition ἐπί and the benedictory
    tone. 'To' would be smoother English but would obscure the Greek repetition.
- source_word: Ἰσραὴλ τοῦ θεοῦ
  chosen: the Israel of God
  alternatives:
  - God's Israel
  lexicon: BDAG
  rationale: A formally transparent rendering that preserves the genitival construction
    and leaves the phrase's referential scope open rather than resolving an interpretive
    debate in translation.
