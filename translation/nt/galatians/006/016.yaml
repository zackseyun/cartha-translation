theological_decisions:
- issue: Referent of 'the Israel of God'
  chosen_reading: Rendered literally as 'the Israel of God' without specifying whether
    Paul means believing Jews specifically, the whole church, or the people of God
    viewed eschatologically.
  alternative_readings:
  - believing Jews within the church
  - the church as the new/true Israel
  - all God's people including Jew and Gentile believers
  rationale: The phrase is theologically contested, and the Greek itself does not
    force a single interpretive resolution in translation. A literal rendering best
    preserves the ambiguity/tension rather than importing a denominational conclusion.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Force of the final καί before 'upon the Israel of God'
  chosen_reading: Translated as a second 'and upon,' allowing either an additional
    group or an appositional/restated group to remain possible.
  alternative_readings:
  - 'epexegetical/appositional sense: ''even upon the Israel of God'''
  - 'distinct additive sense: a second group in addition to the first'
  rationale: The conjunction can be read in more than one way in context. Rendering
    it simply as 'and' avoids deciding the debated syntactical/theological question
    in the main text.
  doctrine_reference: Preserve theological tension rather than resolve it.
