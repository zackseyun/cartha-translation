theological_decisions:
- issue: Gendered language in Ἀδελφοί and ἄνθρωπος
  chosen_reading: Retain 'Brothers' and 'a man' in the main text, with footnotes noting
    representative/generic force.
  alternative_readings:
  - Brothers and sisters
  - someone
  - a person
  rationale: The doctrine requires gender-accurate rendering over gender-neutral smoothing.
    In context Paul addresses the congregation and uses representative masculine forms;
    preserving them in the main text is more transparent to the Greek while footnotes
    can clarify inclusivity.
  doctrine_reference: Translation philosophy §4 (Gender-accurate over gender-neutral)
- issue: Nuance of προλημφθῇ
  chosen_reading: Render as 'is caught' in the main text, preserving 'is overtaken'/'is
    caught by surprise' as alternatives in a footnote.
  alternative_readings:
  - is overtaken
  - is caught by surprise
  rationale: The verb may suggest being surprised by sin rather than merely discovered
    in it. The main text uses accessible English, while the footnote preserves the
    interpretive nuance without overcommitting.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
