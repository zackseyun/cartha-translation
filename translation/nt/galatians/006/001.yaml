id: GAL.6.1
reference: Galatians 6:1
source:
  edition: SBLGNT
  text: Ἀδελφοί, ἐὰν καὶ προλημφθῇ ἄνθρωπος ἔν τινι παραπτώματι, ὑμεῖς οἱ πνευματικοὶ
    καταρτίζετε τὸν τοιοῦτον ἐν πνεύματι πραΰτητος, σκοπῶν σεαυτόν, μὴ καὶ σὺ πειρασθῇς.
translation:
  text: Brothers, even if a man is caught in some trespass, you who are spiritual
    should restore such a one in a spirit of gentleness, watching yourself, lest you
    also be tempted.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '''Brothers'' translates a masculine plural form that can address a mixed
      group of fellow believers; compare ''brothers and sisters.'''
    reason: lexical_alternative
  - marker: b
    text: Or 'is overtaken' or 'is caught by surprise' in some trespass.
    reason: alternative_reading
  - marker: c
    text: '''A man'' renders a singular generic term for a human being; alternatively,
      ''someone'' or ''a person.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀδελφοί
  chosen: Brothers
  alternatives:
  - Brothers and sisters
  - Siblings
  lexicon: BDAG
  rationale: 'Vocative plural of ἀδελφός. Per doctrine, gender-accurate over gender-neutral:
    retain the masculine form while recognizing its likely mixed-gender referent in
    context; inclusivity is best noted in a footnote rather than flattened in the
    main text.'
- source_word: ἐὰν καὶ
  chosen: even if
  alternatives:
  - if even
  - if
  lexicon: BDAG
  rationale: The combination introduces a conditional clause with concessive force;
    'even if' best captures the nuance that such a case may arise unexpectedly.
- source_word: προλημφθῇ
  chosen: is caught
  alternatives:
  - is overtaken
  - is detected
  - is caught by surprise
  lexicon: BDAG
  rationale: Aorist passive subjunctive of προλαμβάνω here likely means being overtaken
    or caught in the act/by circumstance. 'Is caught' is concise and natural English,
    while a footnote preserves the more specific nuance 'overtaken'/'caught by surprise'.
- source_word: ἄνθρωπος
  chosen: a man
  alternatives:
  - someone
  - a person
  lexicon: BDAG
  rationale: Singular generic ἄνθρωπος can denote a human being generally, but per
    doctrine the translation should be gender-accurate rather than automatically gender-neutral.
    'A man' preserves the Greek form and representative force.
- source_word: ἔν τινι παραπτώματι
  chosen: in some trespass
  alternatives:
  - in any trespass
  - in some transgression
  - in some wrongdoing
  lexicon: BDAG
  rationale: παράπτωμα commonly denotes a false step, trespass, or transgression.
    'Trespass' preserves moral seriousness without becoming overly technical; 'some'
    reflects τινι.
- source_word: οἱ πνευματικοὶ
  chosen: you who are spiritual
  alternatives:
  - you spiritual ones
  - you who are led by the Spirit
  lexicon: BDAG
  rationale: Substantival adjective referring to those characterized by spiritual
    maturity or life by the Spirit. 'You who are spiritual' is idiomatic and leaves
    the precise nuance broad, as in Paul.
- source_word: καταρτίζετε
  chosen: should restore
  alternatives:
  - restore
  - set right
  - mend
  lexicon: BDAG
  rationale: Present active imperative plural. The core sense is to restore to proper
    condition, mend, or set in order. 'Should restore' conveys the imperative naturally
    in English within the conditional structure.
- source_word: τὸν τοιοῦτον
  chosen: such a one
  alternatives:
  - such a person
  - that person
  lexicon: BDAG
  rationale: Demonstrative expression referring to the person just mentioned. 'Such
    a one' is slightly formal but precise and preserves the singular focus.
- source_word: ἐν πνεύματι πραΰτητος
  chosen: in a spirit of gentleness
  alternatives:
  - with a spirit of meekness
  - in gentleness
  lexicon: BDAG
  rationale: The phrase can denote either the human disposition or the manner shaped
    by the Spirit. 'In a spirit of gentleness' preserves the wording and the possible
    resonance with the Spirit-produced virtue without over-specifying.
- source_word: σκοπῶν σεαυτόν
  chosen: watching yourself
  alternatives:
  - keeping watch on yourself
  - looking to yourself
  lexicon: BDAG
  rationale: 'Present participle expressing attendant manner/circumstance: the restorer
    must keep careful watch over himself. ''Watching yourself'' is clear modern English.'
- source_word: μὴ καὶ σὺ πειρασθῇς
  chosen: lest you also be tempted
  alternatives:
  - so that you too may not be tempted
  - lest you yourself also be tested
  lexicon: BDAG
  rationale: Negative purpose/result with aorist passive subjunctive. πειράζω can
    mean tempt or test; in this moral context 'tempted' is the most likely sense.
    'Also' reflects καὶ and warns the restorer of shared vulnerability.
