theological_decisions:
- issue: Nature of Paul's στίγματα
  chosen_reading: Rendered neutrally as 'the marks of Jesus' without specifying whether
    these are literal scars, metaphorical signs of allegiance, or both.
  alternative_readings:
  - literal scars from persecution
  - brand-marks signifying belonging to Jesus
  - a metaphor for apostolic suffering and identification with Jesus
  rationale: The term likely evokes physical marks from suffering that also signify
    belonging to Jesus, but the verse itself does not force a narrower interpretation.
    The translation preserves the theological and interpretive tension rather than
    resolving it.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
