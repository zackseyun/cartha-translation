id: GAL.6.17
reference: Galatians 6:17
source:
  edition: SBLGNT
  text: Τοῦ λοιποῦ κόπους μοι μηδεὶς παρεχέτω, ἐγὼ γὰρ τὰ στίγματα ⸀τοῦ Ἰησοῦ ἐν τῷ
    σώματί μου βαστάζω.
translation:
  text: From now on let no one cause me trouble, for I bear the marks of Jesus on
    my body.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'brand-marks'; the term can refer to marks on the body that identify
      ownership or allegiance.
    reason: lexical_alternative
lexical_decisions:
- source_word: Τοῦ λοιποῦ
  chosen: From now on
  alternatives:
  - For the rest
  - Henceforth
  lexicon: BDAG
  rationale: Idiomatic temporal expression meaning 'from now on' or 'henceforth.'
    'From now on' is natural modern English and fits Paul's concluding admonition.
- source_word: κόπους
  chosen: trouble
  alternatives:
  - labors
  - difficulties
  - burdens
  lexicon: BDAG
  rationale: 'Although κόπος often denotes labor or toil, in the idiom κόπους παρέχειν
    it means to cause trouble or annoyance. ''Trouble'' best captures the sense in
    context: Paul is telling others to stop bothering him.'
- source_word: μοι μηδεὶς παρεχέτω
  chosen: let no one cause me
  alternatives:
  - let no one give me
  - let no one bring me
  lexicon: BDAG
  rationale: 'Third-person present active imperative with μηδείς gives a prohibition:
    ''let no one ...'' παρέχω here means to cause or bring upon someone. The dative
    μοι is retained as ''me.'''
- source_word: στίγματα
  chosen: marks
  alternatives:
  - brand-marks
  - scars
  lexicon: BDAG
  rationale: στίγματα refers to marks impressed on the body, often brands or identifying
    marks. 'Marks' is the most transparent main-text rendering; 'brand-marks' is more
    specific but less natural, while 'scars' may over-interpret the physical nature
    of the marks. A footnote preserves the more specific nuance.
- source_word: τοῦ Ἰησοῦ
  chosen: of Jesus
  alternatives:
  - belonging to Jesus
  - for Jesus
  lexicon: BDAG
  rationale: The genitive is most naturally rendered 'of Jesus.' It likely denotes
    marks that identify Paul as belonging to Jesus, but the simple genitive should
    be preserved in the main text without over-specifying the relationship.
- source_word: ἐν τῷ σώματί μου
  chosen: on my body
  alternatives:
  - in my body
  lexicon: BDAG
  rationale: Although ἐν is literally 'in,' English idiom for visible bodily marks
    is 'on my body.' This communicates the physical location clearly and naturally.
- source_word: βαστάζω
  chosen: I bear
  alternatives:
  - I carry
  lexicon: BDAG
  rationale: βαστάζω commonly means to carry or bear. 'I bear' is idiomatic in English
    for enduring or carrying marks on the body and preserves the solemn tone.
