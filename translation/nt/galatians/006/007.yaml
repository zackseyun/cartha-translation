id: GAL.6.7
reference: Galatians 6:7
source:
  edition: SBLGNT
  text: μὴ πλανᾶσθε, θεὸς οὐ μυκτηρίζεται· ὃ γὰρ ⸀ἐὰν σπείρῃ ἄνθρωπος, τοῦτο καὶ θερίσει·
translation:
  text: 'Do not be deceived: God is not mocked, for whatever a man sows, this he will
    also reap.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a person'—the Greek says 'a man' as a representative singular for a
      human being in general.
    reason: lexical_alternative
lexical_decisions:
- source_word: μὴ πλανᾶσθε
  chosen: Do not be deceived
  alternatives:
  - Do not be led astray
  - Do not be misled
  lexicon: BDAG
  rationale: Present passive imperative, second person plural. The passive sense is
    best preserved in English. 'Do not be deceived' is idiomatic and direct, matching
    Paul's warning tone.
- source_word: θεὸς
  chosen: God
  lexicon: BDAG
  rationale: Standard rendering of θεός here, referring to the one true God in a straightforward
    declarative statement.
- source_word: οὐ μυκτηρίζεται
  chosen: is not mocked
  alternatives:
  - is not ridiculed
  - is not treated with contempt
  - is not sneered at
  lexicon: BDAG
  rationale: μυκτηρίζω carries the sense of mocking, sneering at, or treating with
    contempt. 'Is not mocked' is the most natural concise English rendering and preserves
    the proverbial force. The passive form is retained.
- source_word: ὃ γὰρ ἐὰν
  chosen: for whatever
  alternatives:
  - for whatever it is that
  - for whatever thing
  lexicon: BDAG
  rationale: This construction introduces a general condition. 'For whatever' captures
    the indefinite relative sense cleanly in modern English.
- source_word: σπείρῃ
  chosen: sows
  alternatives:
  - plants
  lexicon: BDAG
  rationale: Agricultural metaphor should be preserved literally. 'Sows' is the standard
    equivalent and prepares for the paired harvest metaphor.
- source_word: ἄνθρωπος
  chosen: a man
  alternatives:
  - a person
  - someone
  - a human being
  lexicon: BDAG
  rationale: The Greek is grammatically masculine singular with generic force. Per
    translation philosophy, gender-accurate rendering is preferred over flattening
    to gender-neutral language. 'A man' preserves the representative singular; inclusivity
    can be clarified in a footnote.
- source_word: τοῦτο καὶ θερίσει
  chosen: this he will also reap
  alternatives:
  - that he will also reap
  - this too he will reap
  lexicon: BDAG
  rationale: 'The correlative structure is emphatic: what is sown is precisely what
    will be reaped. ''This he will also reap'' preserves the demonstrative force of
    τοῦτο and the corresponding καί.'
