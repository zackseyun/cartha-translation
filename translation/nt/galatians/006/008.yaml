theological_decisions:
- issue: Rendering of σάρξ in Pauline ethical contrast
  chosen_reading: flesh
  alternative_readings:
  - sinful nature
  rationale: The doctrine table specifies σάρξ as 'flesh' literally or 'sinful nature'
    metaphorically, context-dependent. Although the ethical contrast could justify
    'sinful nature,' the main text retains 'flesh' to preserve Paul's terminology
    and the theological tension of the passage without resolving it into a more interpretive
    gloss.
  doctrine_reference: 'DOCTRINE.md: Contested terms — σάρξ; Translation philosophy
    #3 and #5'
- issue: Referent of πνεῦμα
  chosen_reading: Spirit
  alternative_readings:
  - spirit
  rationale: Within Galatians, especially in the flesh/Spirit antithesis, πνεῦμα most
    naturally refers to the Holy Spirit. Capitalization communicates the likely referent
    in English while remaining faithful to the contextual theology of the letter.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy — original-language primacy;
    preserve theological tension where genuine ambiguity exists'
