id: GAL.6.8
reference: Galatians 6:8
source:
  edition: SBLGNT
  text: ὅτι ὁ σπείρων εἰς τὴν σάρκα ἑαυτοῦ ἐκ τῆς σαρκὸς θερίσει φθοράν, ὁ δὲ σπείρων
    εἰς τὸ πνεῦμα ἐκ τοῦ πνεύματος θερίσει ζωὴν αἰώνιον.
translation:
  text: For the one who sows to his own flesh will reap corruption from the flesh,
    but the one who sows to the Spirit will reap eternal life from the Spirit.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to his own sinful nature.' The Greek word sarx can mean 'flesh' literally
      or, in Paul's ethical contrasts, the fallen human orientation opposed to the
      Spirit.
    reason: lexical_alternative
  - marker: b
    text: Or 'destruction' or 'decay.' The Greek word can denote corruption, ruin,
      or decay.
    reason: lexical_alternative
  - marker: c
    text: That is, the Holy Spirit; some render 'spirit' in lowercase, but in Galatians
      this contrast commonly refers to the Spirit of God.
    reason: alternative_reading
lexical_decisions:
- source_word: ὅτι
  chosen: For
  alternatives:
  - because
  lexicon: BDAG
  rationale: In context this conjunction grounds the preceding exhortation with an
    explanatory statement. 'For' preserves the inferential/explanatory force in natural
    English.
- source_word: ὁ σπείρων
  chosen: the one who sows
  alternatives:
  - whoever sows
  - the sower
  lexicon: BDAG
  rationale: The articular present participle is rendered as a substantival participle.
    'The one who sows' preserves the generic, proverbial force without over-paraphrase.
- source_word: εἰς τὴν σάρκα ἑαυτοῦ
  chosen: to his own flesh
  alternatives:
  - into his own flesh
  - to his own sinful nature
  lexicon: BDAG
  rationale: εἰς with σπείρω is idiomatically 'sow to/for.' For σάρξ, the doctrine
    table allows 'flesh' literally or 'sinful nature' metaphorically. Here Paul contrasts
    flesh and Spirit in an ethical sense, but 'flesh' better preserves Paul's theological
    vocabulary and tension without importing an interpretive paraphrase. ἑαυτοῦ is
    retained as 'his own' to reflect the reflexive emphasis.
- source_word: ἐκ τῆς σαρκὸς
  chosen: from the flesh
  alternatives:
  - out of the flesh
  lexicon: BDAG
  rationale: ἐκ marks source/origin. 'From the flesh' is idiomatic and preserves the
    parallel with 'from the Spirit' in the second clause.
- source_word: θερίσει
  chosen: will reap
  alternatives:
  - will harvest
  lexicon: BDAG
  rationale: Agricultural imagery is maintained by matching σπείρω with 'reap.' 'Harvest'
    is possible but less direct as a verbal counterpart.
- source_word: φθοράν
  chosen: corruption
  alternatives:
  - destruction
  - decay
  lexicon: BDAG
  rationale: φθορά can denote ruin, decay, or corruption. 'Corruption' best preserves
    the broad semantic range here, including moral and eschatological ruin, without
    narrowing it to annihilation or merely physical decay.
- source_word: ὁ δὲ σπείρων
  chosen: but the one who sows
  alternatives:
  - but whoever sows
  lexicon: BDAG
  rationale: δέ marks contrast. Repeating the same substantival participle structure
    preserves the balanced antithesis of the verse.
- source_word: εἰς τὸ πνεῦμα
  chosen: to the Spirit
  alternatives:
  - to the spirit
  lexicon: BDAG
  rationale: In Galatians, the flesh/Spirit contrast regularly refers to the Holy
    Spirit rather than the human spirit. Capitalizing 'Spirit' reflects this contextual
    referent while preserving the Greek term's theological force.
- source_word: ἐκ τοῦ πνεύματος
  chosen: from the Spirit
  alternatives:
  - out of the Spirit
  lexicon: BDAG
  rationale: As in the first clause, ἐκ denotes source. The parallelism strongly supports
    the same English preposition.
- source_word: ζωὴν αἰώνιον
  chosen: eternal life
  alternatives:
  - life of the age to come
  - everlasting life
  lexicon: BDAG
  rationale: '''Eternal life'' is the standard and accurate rendering for this established
    expression. ''Life of the age to come'' is more explicit semantically but less
    natural in English; ''everlasting life'' is acceptable but less idiomatic here.'
