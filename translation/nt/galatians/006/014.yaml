id: GAL.6.14
reference: Galatians 6:14
source:
  edition: SBLGNT
  text: ἐμοὶ δὲ μὴ γένοιτο καυχᾶσθαι εἰ μὴ ἐν τῷ σταυρῷ τοῦ κυρίου ἡμῶν Ἰησοῦ Χριστοῦ,
    δι’ οὗ ἐμοὶ κόσμος ἐσταύρωται ⸀κἀγὼ κόσμῳ.
translation:
  text: But far be it from me to boast except in the cross of our Lord Jesus Messiah,
    through which the world has been crucified to me, and I to the world.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'through whom,' if the relative pronoun is taken to refer to the Lord
      Jesus Messiah rather than to 'the cross.'
    reason: alternative_reading
  - marker: b
    text: Greek 'Jesus Christ.' The title Χριστός is rendered 'Messiah' here to preserve
      its meaning.
    reason: lexical_alternative
lexical_decisions:
- source_word: μὴ γένοιτο
  chosen: far be it from me
  alternatives:
  - may it never be
  - by no means
  lexicon: BDAG
  rationale: Idiomatic optative of strong repudiation. 'Far be it from me' preserves
    the personal force with natural English better than the more wooden 'may it never
    be' in this context.
- source_word: καυχᾶσθαι
  chosen: to boast
  alternatives:
  - to glory
  - to take pride
  lexicon: BDAG
  rationale: Standard Pauline term for boasting/exulting. 'Boast' is the clearest
    modern English equivalent and preserves the rhetorical contrast with boasting
    in circumcision or fleshly markers in context.
- source_word: εἰ μὴ
  chosen: except
  alternatives:
  - unless
  lexicon: BDAG
  rationale: Here it marks the sole legitimate ground of boasting. 'Except' is the
    most natural English rendering in this construction.
- source_word: σταυρῷ
  chosen: cross
  alternatives:
  - stake
  lexicon: BDAG
  rationale: Conventional and contextually appropriate rendering for σταυρός in the
    passion and Pauline theological context.
- source_word: κυρίου
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Follows the project's default rendering for κύριος and fits both confessional
    and contextual NT usage.
- source_word: Χριστοῦ
  chosen: Messiah
  alternatives:
  - Christ
  lexicon: BDAG
  rationale: Used as a title here in the full designation 'Jesus Messiah,' in keeping
    with the project's default to translate Χριστός where title sense is active.
- source_word: δι’ οὗ
  chosen: through which
  alternatives:
  - through whom
  lexicon: BDAG
  rationale: The relative pronoun agrees grammatically with 'cross' (σταυρῷ), so the
    instrumental sense is best rendered 'through which.' This avoids shifting the
    antecedent to the person of Christ when the Greek most directly points to the
    cross as the means.
- source_word: κόσμος
  chosen: the world
  alternatives:
  - the present world order
  lexicon: BDAG
  rationale: κόσμος here refers to the world in its alienated order relative to God,
    but 'the world' is the standard and sufficiently broad rendering; the fuller nuance
    is interpretive rather than lexical.
- source_word: ἐσταύρωται
  chosen: has been crucified
  alternatives:
  - is crucified
  - has been put to death on a cross
  lexicon: BDAG
  rationale: Perfect passive indicates a completed action with abiding result. 'Has
    been crucified' preserves both the metaphor and the aspect better than a simple
    present.
- source_word: κἀγὼ κόσμῳ
  chosen: and I to the world
  alternatives:
  - and I have been crucified to the world
  lexicon: BDAG
  rationale: The verb is ellipsed in Greek and naturally supplied from the previous
    clause. Keeping the ellipsis in English preserves the compact parallelism while
    remaining intelligible.
