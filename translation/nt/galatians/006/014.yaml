theological_decisions:
- issue: Rendering Χριστοῦ in the title 'Ἰησοῦ Χριστοῦ'
  chosen_reading: Jesus Messiah
  alternative_readings:
  - Jesus Christ
  rationale: The phrase functions as a christological title-name combination. Per
    project doctrine, Χριστός is translated as 'Messiah' where title sense is active.
    This preserves the semantic content without importing a denominational distinctive.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; Contested
    terms table for Χριστός'
- issue: Antecedent and force of δι’ οὗ
  chosen_reading: 'the cross is the antecedent and means: ''through which'''
  alternative_readings:
  - 'Christ is the implied antecedent: ''through whom'''
  rationale: The nearest and grammatically matching antecedent is σταυρῷ (masculine
    singular), making 'through which' the most textually grounded rendering. Theologically,
    this still attributes efficacy to Christ's cross without obscuring the Greek syntax.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy over translation tradition;
    Preserve theological tension rather than resolve it'
