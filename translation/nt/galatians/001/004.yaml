id: GAL.1.4
reference: Galatians 1:4
source:
  edition: SBLGNT
  text: τοῦ δόντος ἑαυτὸν ⸀ὑπὲρ τῶν ἁμαρτιῶν ἡμῶν ὅπως ἐξέληται ἡμᾶς ἐκ τοῦ ⸂αἰῶνος
    τοῦ ἐνεστῶτος⸃ πονηροῦ κατὰ τὸ θέλημα τοῦ θεοῦ καὶ πατρὸς ἡμῶν,
translation:
  text: who gave himself for our sins so that he might rescue us from the present
    evil age, according to the will of our God and Father,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'deliver us from the present evil world.'
    reason: lexical_alternative
lexical_decisions:
- source_word: δόντος
  chosen: gave
  alternatives:
  - gave over
  - handed over
  lexicon: BDAG
  rationale: The participle from δίδωμι is most naturally rendered 'gave.' 'Gave over'
    or 'handed over' are possible in sacrificial contexts, but 'gave himself' is clear,
    natural English and preserves the voluntary force of the Greek.
- source_word: ὑπὲρ
  chosen: for
  alternatives:
  - on behalf of
  - for the sake of
  lexicon: BDAG
  rationale: With 'our sins,' ὑπέρ here expresses representation or reference in a
    sacrificial/redemptive sense. 'For' is idiomatic and preserves the theological
    weight without over-specifying the mechanism.
- source_word: ἁμαρτιῶν
  chosen: sins
  alternatives:
  - sinful acts
  lexicon: BDAG
  rationale: The plural noun is straightforwardly 'sins.' A more interpretive gloss
    would add specificity not present in the text.
- source_word: ἐξέληται
  chosen: rescue
  alternatives:
  - deliver
  - save
  lexicon: BDAG
  rationale: ἐξαιρέω means to bring out of danger or remove from a controlling situation.
    'Rescue' best captures the force in contemporary English, while 'deliver' is a
    viable traditional alternative.
- source_word: αἰῶνος
  chosen: age
  alternatives:
  - world
  - era
  lexicon: BDAG
  rationale: αἰών refers primarily to an age or era, not the physical world. 'Age'
    better reflects the Greek than the traditional but less precise 'world.'
- source_word: ἐνεστῶτος
  chosen: present
  alternatives:
  - presently existing
  - current
  lexicon: BDAG
  rationale: The participle functions adjectivally here and denotes what is now present.
    'Present' is the most natural rendering.
- source_word: πονηροῦ
  chosen: evil
  alternatives:
  - wicked
  lexicon: BDAG
  rationale: πονηρός here characterizes the age morally. 'Evil' is the standard and
    clearest choice.
- source_word: κατὰ τὸ θέλημα
  chosen: according to the will
  alternatives:
  - in accordance with the will
  lexicon: BDAG
  rationale: This phrase signals conformity to God's purpose. 'According to the will'
    is both precise and idiomatic.
- source_word: τοῦ θεοῦ καὶ πατρὸς ἡμῶν
  chosen: of our God and Father
  alternatives:
  - of God our Father
  - of God, who is our Father
  lexicon: BDAG
  rationale: The construction refers to one person, not two. 'Our God and Father'
    preserves the Greek order reasonably well and clearly communicates the single
    referent.
