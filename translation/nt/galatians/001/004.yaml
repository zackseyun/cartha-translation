theological_decisions:
- issue: Whether ὑπὲρ τῶν ἁμαρτιῶν ἡμῶν should be rendered in a way that narrows the
    atoning sense
  chosen_reading: for our sins
  alternative_readings:
  - on behalf of our sins
  - because of our sins
  rationale: The Greek supports a redemptive, representative sense, but the text does
    not itself specify a full theory of atonement. 'For our sins' preserves the theological
    force without importing a more technical doctrinal formulation.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Whether αἰών should be rendered 'age' or 'world'
  chosen_reading: the present evil age
  alternative_readings:
  - the present evil world
  rationale: Paul's term is temporal-cosmic rather than merely spatial. 'Age' better
    preserves the source text's plain sense and avoids translation-tradition inertia.
  doctrine_reference: Original-language primacy over translation tradition.
