theological_decisions:
- issue: Whether James is being counted among 'the apostles' in this construction
  chosen_reading: 'The main text preserves the most natural syntactic sense: Paul
    saw no other apostles except James, implying James is included within that exception.'
  alternative_readings:
  - Some interpret the line to mean Paul saw no apostle other than Peter, and additionally
    saw James without necessarily classing him as an apostle.
  rationale: The Greek εἰ μὴ most naturally introduces an exception to 'none of the
    other apostles.' The translation preserves that syntax without adding interpretive
    explanation to the main text.
