id: GAL.1.19
reference: Galatians 1:19
source:
  edition: SBLGNT
  text: ἕτερον δὲ τῶν ἀποστόλων οὐκ εἶδον, εἰ μὴ Ἰάκωβον τὸν ἀδελφὸν τοῦ κυρίου.
translation:
  text: But I saw none of the other apostles except James, the Lord’s brother.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'I did not see any other apostle—only James, the Lord’s brother.' Some
      understand this wording not to classify James as an apostle.
    reason: alternative_reading
lexical_decisions:
- source_word: ἕτερον
  chosen: other
  alternatives:
  - another
  - different
  lexicon: BDAG
  rationale: In the partitive construction with τῶν ἀποστόλων, ἕτερον naturally means
    'another/other one from among.' 'Other' is the most natural English in this sentence.
- source_word: δέ
  chosen: But
  alternatives:
  - Now
  - And
  lexicon: BDAG
  rationale: δέ marks a mild contrast or development. 'But' best fits the immediate
    contrast with the previous statement.
- source_word: ἀποστόλων
  chosen: apostles
  alternatives:
  - messengers
  - sent ones
  lexicon: BDAG
  rationale: In Pauline context this refers to the recognized apostolic circle, so
    the established term 'apostles' is the clearest rendering.
- source_word: οὐκ εἶδον
  chosen: I saw none
  alternatives:
  - I did not see
  - I saw no one else
  lexicon: BDAG
  rationale: This preserves the straightforward past-tense negation while reading
    naturally in English with the partitive phrase.
- source_word: εἰ μὴ
  chosen: except
  alternatives:
  - unless
  - except for
  lexicon: BDAG
  rationale: Here εἰ μή functions idiomatically as an exception clause, not a condition.
    'Except' is the most idiomatic rendering.
- source_word: Ἰάκωβον
  chosen: James
  lexicon: BDAG
  rationale: Standard English transliteration of the personal name Ἰάκωβος.
- source_word: ἀδελφὸν
  chosen: brother
  alternatives:
  - relative
  - kinsman
  lexicon: BDAG
  rationale: The ordinary and most direct sense is 'brother.' Broader kinship renderings
    are possible in some contexts, but nothing here requires weakening the familial
    term.
- source_word: τοῦ κυρίου
  chosen: the Lord’s
  alternatives:
  - of the Lord
  lexicon: BDAG
  rationale: κύριος is rendered 'Lord' per the project's default for the title. The
    possessive form 'the Lord’s brother' is natural English and preserves the sense.
