id: GAL.1.1
reference: Galatians 1:1
source:
  edition: SBLGNT
  text: Παῦλος ἀπόστολος, οὐκ ἀπ’ ἀνθρώπων οὐδὲ δι’ ἀνθρώπου ἀλλὰ διὰ Ἰησοῦ Χριστοῦ
    καὶ θεοῦ πατρὸς τοῦ ἐγείραντος αὐτὸν ἐκ νεκρῶν,
translation:
  text: Paul, an apostle—not from men nor through man, but through Jesus Messiah and
    God the Father, who raised him from the dead,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'through Jesus Christ.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπόστολος
  chosen: apostle
  alternatives:
  - messenger
  - delegate
  lexicon: BDAG
  rationale: The term is a recognized commissioning title in Paul’s self-identification,
    so 'apostle' preserves both the formal role and its theological weight better
    than a more generic substitute.
- source_word: ἀπ’ ἀνθρώπων
  chosen: from men
  alternatives:
  - from human beings
  - from people
  lexicon: BDAG
  rationale: ἀπό with the genitive expresses source/origin. 'From men' preserves the
    contrast with the following singular phrase and reflects the masculine plural
    form without flattening the rhetorical structure.
- source_word: δι’ ἀνθρώπου
  chosen: through man
  alternatives:
  - through a human being
  - by means of a man
  lexicon: BDAG
  rationale: διά with the genitive here expresses agency or instrumentality. The singular
    is rhetorically important in contrast with the plural before it, so 'through man'
    is preserved rather than generalized.
- source_word: διὰ Ἰησοῦ Χριστοῦ
  chosen: through Jesus Messiah
  alternatives:
  - through Jesus Christ
  lexicon: BDAG
  rationale: The repeated διά balances the negated human source/agency with the true
    divine agency of Paul’s apostleship. Χριστοῦ is rendered 'Messiah' per project
    doctrine where the title sense is active rather than merely name-like.
- source_word: θεοῦ πατρὸς
  chosen: God the Father
  alternatives:
  - God, the Father
  lexicon: BDAG
  rationale: This is a natural genitival title construction in context. 'God the Father'
    is idiomatic, clear modern English and preserves the coordinated divine source
    of Paul’s commissioning.
- source_word: τοῦ ἐγείραντος αὐτὸν ἐκ νεκρῶν
  chosen: who raised him from the dead
  alternatives:
  - who raised him out of the dead
  lexicon: BDAG
  rationale: The articular participle modifies 'God the Father.' 'From the dead' is
    standard, accurate English for ἐκ νεκρῶν and preserves the resurrection claim
    without awkward literalism.
