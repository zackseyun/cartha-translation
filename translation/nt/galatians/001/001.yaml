theological_decisions:
- issue: Rendering Χριστοῦ in Ἰησοῦ Χριστοῦ
  chosen_reading: Messiah
  alternative_readings:
  - Christ
  rationale: In this salutation the term still carries titular force, not merely a
    frozen surname-like form, so 'Messiah' best reflects the Greek while following
    the project’s default for Χριστός where title is in view.
